    \ = CGPointMake(-10, -10);\n     return userLocationView;\n}\n\n我们需要实现的最后一个关键部分是处理用户在地图上选中某个标注时的代码。当这种情况发生时，`MKMapView`\
    \ 会调用其委托的 `mapView:didSelectAnnotationView:` 方法。在我们的 Facebook 示例中，我们将使用这个方法演示如何将用户签到某个地点。现在让我们来看看这部分内容。\n\
    \n## Facebook 地点（搜索）、签到（获取与发布）以及附近好友\n\n在 Facebook 应用本身中，通过“附近”页面来进行地点签到，该页面会自动搜索当前位置附近的地点。如果\
    \ Facebook 应用未被授予使用位置服务的权限，它会显示如下界面（见图 9–25）。\n\n![images](img/0925.jpg)\n\n**图\
    \ 9–25.** *Facebook iOS 应用的“签到”功能中位置不可用*\n\n假设 Facebook 应用已被授予使用位置服务的权限，你会看到返回的地点匹配列表（见图\
    \ 9–26），以及某个地点的详细信息。Facebook 应用通过这种方式让用户社区管理地点。地点档案（本质上类似于 Facebook 页面）如图 9–27\
    \ 所示；用户可以通过图 9–28 所示的方式对地点进行操作。\n\n![images](img/0926.jpg)\n\n**图 9–26.** *在 Facebook\
    \ iOS 应用中搜索附近地点和活动*\n\n![images](img/0927.jpg)\n\n**图 9–27.** *Facebook iOS 应用中某个地点的详细信息*\n\
    \n![images](img/0928.jpg)\n\n**图 9–28.** *在 Facebook iOS 应用中标记地点*\n\n在我们的示例应用中，我们希望让用户能够将某人签到\
    \ Facebook 上的某个地点。请注意，我们设置了应用在地图上显示一个图钉。当用户选中该图钉时，`MKMapViewDelegate` 的 `mapView:didSelectAnnotationView:`\
    \ 方法会被调用。在 `MapViewController` 的该方法实现中，我们向 Facebook 发起一个搜索请求，以获取该标注位置附近的地点列表。向\
    \ Facebook 发起搜索请求时，我们只需将 Facebook 的 `requestWithGraphPath:andParams:andDelegate:`\
    \ 方法的 graph path 设置为 `search`。需要提供的附加参数是一个字典，包含 `type`、`center` 和 `distance` 键。`MapViewController`\
    \ 类遵循 `FBRequestDelegate` 协议，因此我们将其作为委托传入：\n\n```\n- (void)mapView:(MKMapView\
    \ *)mapView\n    didSelectAnnotationView:(MKAnnotationView *)view\n{\n    NSString\
    \ *centerString = [NSString stringWithFormat: @\"%f,%f\",\n        view.annotation.coordinate.latitude,\n\
    \        view.annotation.coordinate.longitude];\n\n    NSMutableDictionary *params\
    \ =\n                [NSMutableDictionary dictionaryWithObjectsAndKeys:\n    \
    \            @\"place\", @\"type\",\n                centerString, @\"center\"\
    ,\n                @\"1000\", @\"distance\", // 单位米（1000m = 0.62 英里）\n       \
    \      nil];\n\n    [facebook requestWithGraphPath:@\"search\"\n             \
    \            andParams:params\n                       andDelegate:self];\n}\n\
    ```\n\n当 `FBRequestDelegate` 的 `request:didLoad:` 方法被调用时，结果参数是一个字典，其中包含一个地点字典数组。每个地点字典都包含一个\
    \ id、一个类别、一个名称，以及一个包含城市、国家、州、纬度和经度的 `location` 字典：\n\n```\n{\n    data =     (\n\
    \                {\n            category = \"Local business\";\n            id\
    \ = 151247078226083;\n            location =             {\n                city\
    \ = \"Monta Vista\";\n                country = \"United States\";\n         \
    \       latitude = \"37.3316086\";\n                longitude = \"-122.05885\"\
    ;\n                state = CA;\n            };\n            name = \"Somerset\
    \ Square Park\";\n        }\n        );\n}\n```\n\n在下面的代码中，我们取结果中字典数组的第一个匹配项，并通过以下\
    \ graph path 向 Facebook 发布一条签到信息：\n\n```\n\"me/checkins\"\n```\n"
- fmt: "We set the parameters for the post request in a dictionary with values for\
    \ `place`, `coordinates`, and `message` keys. Note that the `latitude` and `longitude`\
    \ values for the `coordinates` key need to be in JSON format, so we use `SBJSON`\
    \ (which is included in the Facebook SDK) to convert these values to a `JSON`\
    \ string:\n\n```\n- (void)request:(FBRequest *)request didLoad:(id)result {\n\
    \    NSLog(@\"didLoad:\");\n\n    NSArray *places = [(NSDictionary*)result objectForKey:@\"\
    data\"];\n    if (0 < [places count]) {\n        NSDictionary *dictionary = [places\
    \ objectAtIndex:0];\n        if (nil != dictionary) {\n        NSDictionary *locDictionary\
    \ =\n                [dictionary objectForKey:@\"location\"];\n\n        NSMutableDictionary\
    \ *coordinatesDictionary =\n               [NSMutableDictionary dictionaryWithObjectsAndKeys:\n\
    \               [locDictionary objectForKey:@\"latitude\"], @\"latitude\",\n \
    \              [locDictionary objectForKey:@\"longitude\"], @\"longitude\",\n\
    \               nil];\n\n            SBJSON *jsonWriter = [[SBJSON new] autorelease];\n\
    \            NSString *coordinates =\n               [jsonWriter stringWithObject:coordinatesDictionary];\n\
    \n            NSMutableDictionary *params =\n               [NSMutableDictionary\
    \ dictionaryWithObjectsAndKeys:\n               [dictionary objectForKey:@\"id\"\
    ], @\"place\",\n               coordinates, @\"coordinates\",\n              \
    \ @\"This is a test checkin\", @\"message\",\n               nil];\n\n       \
    \     [facebook requestWithGraphPath:@\"me/checkins\"\n                      \
    \                andParams:params\n                                 andHttpMethod:@\"\
    POST\"\n                                    andDelegate:self];\n        }\n  \
    \  }\n}\n```\n\nNote that you can also include a user's friends in a check-in\
    \ by tagging them in the `checkin` POST. To do this, add an additional key entitled\
    \ `tags` to the `params` dictionary and set its value to a comma-delimited list\
    \ of Facebook user ids.\n\nPosting check-ins to a user's Facebook account requires\
    \ `publish_checkins` permissions, so we have to update our login code to include\
    \ this additional permission:\n\n```\n- (void)login {\n    [facebook authorize:[NSArray\
    \ arrayWithObjects:\n                         @\"user_groups\", @\"user_events\"\
    ,\n                         @\"offline_access\", @\"publish_checkins\", nil]\n\
    \               delegate:self];\n}\n```\n\nWhen logging in with this additional\
    \ permission, the following `OAuth` screen is displayed (see [Figure 9–29](#Chapter09.html#fig_9_29)).\n\
    \n![images](images/0929.jpg)\n\n**Figure 9–29.** *Permission via OAuth to check\
    \ into places on Facebook*\n\nOnce the check-in is posted, it will show up in\
    \ the user's Facebook iOS app (and on Facebook.com, of course), as shown in [Figure\
    \ 9–30](#Chapter09.html#fig_9_30).\n\n![images](images/0930.jpg)\n\n**Figure 9–30.**\
    \ *Check-ins in Facebook's iOS application*\n\nSelecting a check-in shows a small\
    \ map and description of the place, as well as any comments on the check-in (see\
    \ [Figure 9–31](#Chapter09.html#fig_9_31)).\n\n![images](images/0931.jpg)\n\n\
    **Figure 9–31.** *Details about a Facebook check-in*\n\nThe place can be viewed\
    \ on a larger map within the Facebook iOS app (see [Figure 9–32](#Chapter09.html#fig_9_32)).\n\
    \n![images](images/0932.jpg)\n\n**Figure 9–32.** *A larger map view of a Facebook\
    \ check-in*\n\nNext, you are given the choice to view the map in the main Maps\
    \ application on the device or to get directions (see [Figure 9–33](#Chapter09.html#fig_9_33)).\n\
    \n![images](images/0933.jpg)\n\n**Figure 9–33.** *Actions that can be taken on\
    \ a check-in in Facebook's iOS application*\n\nJust as we can post check-ins for\
    \ a user, we can also retrieve a user's check-ins via the Facebook graph path,\
    \ `me/checkins`:\n\n```\n[facebook requestWithGraphPath:@\"me/checkins\"\n   \
    \                  andParams:nil\n                   andDelegate:self];\n```\n\
    \nThe returned result is an array of dictionaries where each dictionary contains\
    \ information about an individual check-in. This information includes the application\
    \ that posted the check-in, the time of creation, the user who posted the check-in,\
    \ the Facebook id for the check-in, the message associated with the check-in,\
    \ and the place associated with the check-in:\n\n```\n(\n{\n    application =\
    \     {\n        id = 114442211957627;\n        name = \"Beginning iOS Social\
    \ Development\";\n    };\n    \"created_time\" = \"2011-04-09T16:14:19+0000\"\
    ;\n    from =     {\n        id = 623441509;\n        name = \"Christopher White\"\
    ;\n    };\n    id = 10150149394136510;\n    message = \"This is a test checkin\"\
    ;\n    place =     {\n        id = 144940418859769;\n        location =      \
    \   {\n            latitude = \"37.332301584174\";\n            longitude = \"\
    -122.08672354097\";\n        };\n        name = \"Rancho San Antonio County Park\"\
    ;\n    };\n}\n)\n```\n\nRetrieving check-ins from a user's Facebook account requires\
    \ `user_checkins` permissions, so we have to update our login code to include\
    \ this additional permission:\n\n```\n- (void)login {\n   [facebook authorize:[NSArray\
    \ arrayWithObjects:\n                        @\"user_groups\", @\"user_events\"\
    ,\n                        @\"offline_access\", @\"publish_checkins\",\n     \
    \                   @\"user_checkins\", nil]\n              delegate:self];\n\
    }\n```\n\nWhen logging in with this additional permission, the following `OAuth`\
    \ screen is displayed (see [Figure 9–34](#Chapter09.html#fig_9_34)).\n\n![images](images/0934.jpg)\n\
    \n**Figure 9–34.** *Facebook check-in permissions*"
  raw: 'We set the parameters for the post request in a dictionary with values for
    `place`, `coordinates`, and `message` keys. Note that the `latitude` and `longitude`
    values for the `coordinates` key need to be in JSON format, so we use `SBJSON`
    (which is included in the Facebook SDK) to convert these values to a `JSON` string:


    `- (void)request:(FBRequest *)request didLoad:(id)result {`

    `    NSLog(@"didLoad:");`


    `    NSArray *places = [(NSDictionary*)result objectForKey:@"data"];`

    `    if (0 < [places count]) {`

    `        NSDictionary *dictionary = [places objectAtIndex:0];`

    `        if (nil != dictionary) {`

    `        NSDictionary *locDictionary =`

    `                [dictionary objectForKey:@"location"];`


    `        NSMutableDictionary *coordinatesDictionary =`

    `               [NSMutableDictionary dictionaryWithObjectsAndKeys:`

    `               [locDictionary objectForKey:@"latitude"], @"latitude",`

    `               [locDictionary objectForKey:@"longitude"], @"longitude",`

    `               nil];`


    `            SBJSON *jsonWriter = [[SBJSON new] autorelease];`

    `            NSString *coordinates =`

    `               [jsonWriter stringWithObject:coordinatesDictionary];`


    `            NSMutableDictionary *params =`

    `               [NSMutableDictionary dictionaryWithObjectsAndKeys:`

    `               [dictionary objectForKey:@"id"], @"place",`

    `               coordinates, @"coordinates",`

    `               @"This is a test checkin", @"message",`

    `               nil];`


    `            [facebook requestWithGraphPath:@"me/checkins"`

    `                                      andParams:params`

    `                                 andHttpMethod:@"POST"`

    `                                    andDelegate:self];`

    `        }`

    `    }`

    `}`


    Note that you can also include a user''s friends in a check-in by tagging them
    in the `checkin` POST. To do this, add an additional key entitled `tags` to the
    `params` dictionary and set its value to a comma-delimited list of Facebook user
    ids.


    Posting check-ins to a user''s Facebook account requires `publish_checkins` permissions,
    so we have to update our login code to include this additional permission:


    `- (void)login {`

    `    [facebook authorize:[NSArray arrayWithObjects:`

    `                         @"user_groups", @"user_events",`

    `                         @"offline_access", @"publish_checkins", nil]`

    `               delegate:self];`

    `}`


    When logging in with this additional permission, the following `OAuth` screen
    is displayed (see [Figure 9–29](#Chapter09.html#fig_9_29)).


    ![images](images/0929.jpg)


    **Figure 9–29.** *Permission via OAuth to check into places on Facebook*


    Once the check-in is posted, it will show up in the user''s Facebook iOS app (and
    on Facebook.com, of course), as shown in [Figure 9–30](#Chapter09.html#fig_9_30).


    ![images](images/0930.jpg)


    **Figure 9–30.** *Check-ins in Facebook''s iOS application*


    Selecting a check-in shows a small map and description of the place, as well as
    any comments on the check-in (see [Figure 9–31](#Chapter09.html#fig_9_31)).


    ![images](images/0931.jpg)


    **Figure 9–31.** *Details about a Facebook check-in*


    The place can be viewed on a larger map within the Facebook iOS app (see [Figure
    9–32](#Chapter09.html#fig_9_32)).


    ![images](images/0932.jpg)


    **Figure 9–32.** *A larger map view of a Facebook check-in*


    Next, you are given the choice to view the map in the main Maps application on
    the device or to get directions (see [Figure 9–33](#Chapter09.html#fig_9_33)).


    ![images](images/0933.jpg)


    **Figure 9–33.** *Actions that can be taken on a check-in in Facebook''s iOS application*


    Just as we can post check-ins for a user, we can also retrieve a user''s check-ins
    via the Facebook graph path, "me/checkins":


    `[facebook requestWithGraphPath:@"me/checkins"`

    `                     andParams:nil`

    `                   andDelegate:self];`


    The returned result is an array of dictionaries where each dictionary contains
    information about an individual check-in. This information includes the application
    that posted the check-in, the time of creation, the user who posted the check-in,
    the Facebook id for the check-in, the message associated with the check-in, and
    the place associated with the check-in:


    `(`

    `{`

    `    application =     {`

    `        id = 114442211957627;`

    `        name = "Beginning iOS Social Development";`

    `    };`

    `    "created_time" = "2011-04-09T16:14:19+0000";`

    `    from =     {`

    `        id = 623441509;`

    `        name = "Christopher White";`

    `    };`

    `    id = 10150149394136510;`

    `    message = "This is a test checkin";`

    `    place =     {`

    `        id = 144940418859769;`

    `        location =         {`

    `            latitude = "37.332301584174";`

    `            longitude = "-122.08672354097";`

    `        };`

    `        name = "Rancho San Antonio County Park";`

    `    };`

    `}`

    `)`


    Retrieving check-ins from a user''s Facebook account requires `user_checkins`
    permissions, so we have to update our login code to include this additional permission:


    `- (void)login {`

    `   [facebook authorize:[NSArray arrayWithObjects:`

    `                        @"user_groups", @"user_events",`

    `                        @"offline_access", @"publish_checkins",`

    `                        @"user_checkins", nil]`

    `              delegate:self];`

    `}`


    When logging in with this additional permission, the following `OAuth` screen
    is displayed (see [Figure 9–34](#Chapter09.html#fig_9_34)).


    ![images](images/0934.jpg)


    **Figure 9–34.** *Facebook check-in permissions*'
