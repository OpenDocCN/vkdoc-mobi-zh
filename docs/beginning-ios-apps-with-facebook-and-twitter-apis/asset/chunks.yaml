    ;\ntype = video;\n\"updated_time\" = \"2011-02-26T00:28:32+0000\";\n}\n```\n\n\
    当然，你也可以获取用户被标记的照片、相册和视频。这需要扩展权限 `user_photos`，图形路径分别为 `photos`、`albums` 或 `videos`（参见图\
    \ 7-5）。以下代码片段获取用户被标记的照片：\n\n```\nNSMutableDictionary *params = [NSMutableDictionary\
    \ dictionary];\n// 需要 'user_photos' 扩展权限\n[facebook requestWithGraphPath:@\"me/photos\"\
    \n                     andParams:params\n                   andDelegate:self];\
    \ //被标记的照片\n```\n\n类似地，以下代码片段获取用户被标记的相册：\n\n```\n[facebook requestWithGraphPath:@\"\
    me/albums\"\n                     andParams:params\n                   andDelegate:self];\n\
    ```\n\n最后，以下代码片段获取用户被标记的视频：\n\n```\n[facebook requestWithGraphPath:@\"me/videos\"\
    \n                     andParams:params\n                   andDelegate:self];\n\
    ```\n\n请注意，如果在授权用户时未包含正确的用户权限，则会调用 `request:didFailWithError` 委托方法。\n\n### 限制结果\n\
    \n一个实用的功能是限制 Facebook 在前述示例中为每个条目返回的字典字段数量。无论请求什么内容，方法都是相同的。这通过 `fields` 参数实现。例如，在请求好友时，你可能只想要每个好友的\
    \ Facebook ID、姓名和头像。可以通过使用 `requestWithGraphPath:andParams:andDelegate` 方法来实现：\n\
    \n```\nNSMutableDictionary *params = [NSMutableDictionary dictionary];\n[params\
    \ setObject:@\"id,name,picture\" forKey:@\"fields\"];\n[facebook requestWithGraphPath:@\"\
    me/friends\"\n                     andParams:params\n                   andDelegate:self];\n\
    ```\n\n#### 日期格式\n\n你会注意到，前面的示例中很多返回信息都包含像创建时间这样的时间戳。默认情况下，Facebook 返回的所有日期字段都是\
    \ ISO-8601 格式的字符串。如果你希望这些字符串采用不同的格式，可以在请求中添加一个额外的 `date_format` 参数：\n\n```\nNSMutableDictionary\
    \ *params = [NSMutableDictionary dictionary];\n[params setObject:@\"U\" forKey:@\"\
    date_format\"];\n[facebook requestWithGraphPath:@\"me/feed\"\n               \
    \      andParams:params\n                   andDelegate:self];\n```\n\n上述示例通过指定\
    \ `U` 作为 `date_format` 的值，请求所有日期字符串采用 Unix 时间戳格式。更多可用的日期格式选项请参见以下链接：\n\n`http://php.net/manual/en/function.date.php`\n\
    \n### 更多 Twitter API 的趣味用法\n\n上一章结尾我们展示了如何检索并显示用户在 Twitter 上关注的人。Twitter 还提供了一系列其他有用的功能，接下来看看如何实现更多操作。这些功能包括获取某人的收藏推文、发布推文、发送私信以及许多其他操作。和往常一样，我们对示例应用做了一些调整，以便展示如何使用\
    \ `MGTwitterEngine` 中的 API 来访问所有内容。如果你运行本章的 Twitter 示例应用，会看到一个名为“Tweetin”的选项卡，其中包含一个“Twitter”按钮。修改\
    \ `TimelineViewController` 中 `twitterButtonClick:` 方法的代码，尝试我们在这里讨论的不同请求。敬请观赏！\n"
- fmt: "# A Tweetin’ We Will Go\n\nYou’re probably itching to Tweet something directly\
    \ from an iOS app, right? Well, beginning with iOS 5, Apple has made it easy for\
    \ developers to include Twitter posting functionality in their apps. Users can\
    \ login to Twitter from inside iOS, and new Tweet posting buttons can be found\
    \ in several preloaded apps including Camera, Photos, Safari, YouTube and Maps.\
    \ However, Apple's support for Twitter functions stop at POSTing, so we're going\
    \ to show you how to roll your own Twitter integration in case your app needs\
    \ to do something a little more powerful. To Tweet something for the currently\
    \ logged in user, use the following `MGTwitterEngine` method:\n\n`- (NSString\
    \ *)sendUpdate:(NSString *)status;`\n\nIt’s as easy as pie. Tweets can be at most\
    \ 140 UCS-2 characters long. If this length is exceeded, the Tweet is truncated.\
    \ For the `status` parameter, just pass in what you want to Tweet and you’re done:\n\
    \n`[sa_OAuthTwitterEngine sendUpdate:@\"this is a test tweet! tweet tweet!\"];`\n\
    \nWe won’t go over the `MGTwitterEngineDelegate` again in too much detail; however,\
    \ recall that we set up our main application delegate as a `MGTwitterEngineDelegate`,\
    \ so you can see what happens when you make each of these calls by going to that\
    \ class. We will refer to the methods here and assume that you can find them in\
    \ `AppDelegate.m`. Remember that if the request is successful, the first thing\
    \ that happens is `requestSucceeded:` is called; next, a follow-up delegate method\
    \ is called, depending on the request.\n\nUltimately, when you Tweet something,\
    \ the `statusesReceived:` delegate method is called with the actual details of\
    \ the Tweet returned from Twitter. We’ve modified the `statusesReceived:` method\
    \ to show you some more information. The main parameter that you receive in this\
    \ method is an array of items from Twitter. Each element in this array is a dictionary\
    \ that represents one item. The set of key value pairs that represent an item\
    \ changes, depending on what you originally requested from Twitter. In our new\
    \ implementation of `statusesReceived:`, we take the first item in the array and,\
    \ if it exists, get the Twitter ID for the Tweet and print it out to the console\
    \ log. Check out how in this example:\n\n```\n- (void)statusesReceived:(NSArray\
    \ *)statuses\n              forRequest:(NSString *)connectionIdentifier {\n  \
    \  NSLog(@\"Status received for connectionIdentifier = %@, %@\",\n           \
    \     connectionIdentifier, [statuses description]);\n\n    NSDictionary *dictionary\
    \ = [statuses objectAtIndex:0];\n    if (dictionary) {\n        NSString *twitterID\
    \ = [dictionary objectForKey:@\"id\"];\n        NSLog(@\"TwitterID = %@\", twitterID);\n\
    \    }\n}\n```\n\n**NOTE:** Here’s something to keep in mind about Twitter IDs:\
    \ like the Facebook graph, everything in Twitter has a unique ID. These IDs are\
    \ used through a number of Twitter’s APIs, so we just wanted to make a quick mention\
    \ of them.\n\nThe ID for an item from Twitter is always stored in the `id` key\
    \ in the dictionary of the item. The `MGTwitterEngine` code was originally written\
    \ to accept unsigned `longs` for these IDs; however, the Twitter IDs have since\
    \ grown and can no longer be held in an unsigned `long` variable. To make our\
    \ lives (and hopefully yours) easier, we modified the version of `MGTwitterEngine`\
    \ that is used for this book to take a string whenever a method needs a Twitter\
    \ ID.\n\nThe entire dictionary for a Tweet contains a ton of useful information.\
    \ For example, we would see this if we were to print out the entire dictionary\
    \ in the `statusesReceived:` method:\n\n```\n{\n    contributors = \"\";\n   \
    \ coordinates = \"\";\n    \"created_at\" = \"Fri Mar 04 04:18:55 +0000 2011\"\
    ;\n    favorited = false;\n    geo = \"\";\n    id = 43525805485199360;\n    \"\
    in_reply_to_screen_name\" = \"\";\n    \"in_reply_to_status_id\" = \"\";\n   \
    \ \"in_reply_to_user_id\" = \"\";\n    place = \"\";\n    \"retweet_count\" =\
    \ 0;\n    retweeted = false;\n    source = \"<a href=\\\"http://www.apress.com\\\
    \"\n                      rel=\\\"nofollow\\\">Tweetin' iOS OAuth</a>\";\n   \
    \ \"source_api_request_type\" = 5;\n    text = \"this is a test tweet! tweet tweet!\"\
    ;\n    truncated = 0;\n    user =     {\n        \"contributors_enabled\" = false;\n\
    \        \"created_at\" = \"Sat Jan 09 21:25:41 +0000 2010\";\n        description\
    \ = \"\";\n        \"favourites_count\" = 4;\n        \"follow_request_sent\"\
    \ = false;\n        \"followers_count\" = 24;\n        following = 0;\n      \
    \  \"friends_count\" = 186;\n        \"geo_enabled\" = false;\n        id = <twitter\
    \ user id>;\n        \"is_translator\" = false;\n        lang = en;\n        \"\
    listed_count\" = 0;\n        location = \"\";\n        name = Christopher;\n \
    \       notifications = false;\n        \"profile_background_color\" = C0DEED;\n\
    \        \"profile_background_image_url\" = \"URL\";\n        \"profile_background_tile\"\
    \ = false;\n        \"profile_image_url\" = \"URL\";\n        \"profile_link_color\"\
    \ = 0084B4;\n        \"profile_sidebar_border_color\" = C0DEED;\n        \"profile_sidebar_fill_color\"\
    \ = DDEEF6;\n        \"profile_text_color\" = 333333;\n        \"profile_use_background_image\"\
    \ = true;\n        protected = 1;\n        \"screen_name\" = christhepiss;\n \
    \       \"show_all_inline_media\" = false;\n        \"statuses_count\" = 451;\n\
    \        \"time_zone\" = \"Eastern Time (US & Canada)\";\n        url = \"http://christhepiss.tumblr.com\"\
    ;\n        \"utc_offset\" = \"-18000\";\n        verified = false;\n    };\n}\n\
    ```\n\nTake note of the `id` that we mentioned before. Also take note of the `text`\
    \ and the `source` of the Tweet. Since we’re using the app identifier for this\
    \ book when authorizing users, the source is listed as “Tweetin' iOS OAuth.” On\
    \ Twitter, this would look like what you see in [Figure 7–6](#Chapter07.html#fig_7_6).\n\
    \n![images](images/0706.jpg)\n\n**Figure 7–6.** *A test Tweet. And it works!*\n\
    \nSo now that you’ve tweeted, you must be feeling pretty good. We know we feel\
    \ good. However, let’s say you want to see all of your Tweets. Doing so is simple:\n\
    \n`[sa_OAuthTwitterEngine getUserTimeline];`\n\nIn the world of Twitter, tweets\
    \ exist along a timeline since each Tweet occurs at a specific point in time.\
    \ So you can get a user’s timeline of tweets (as we did earlier), or you can get\
    \ the timeline of the user and all of her followers:\n\n`[sa_OAuthTwitterEngine\
    \ getHomeTimeline];`\n\nYou can even get the entire public timeline on Twitter\
    \ of all Twitter users who have public Tweets:\n\n`[sa_OAuthTwitterEngine getPublicTimeline];`\n\
    \nSimilarly, you can get the favorite Tweets of the currently logged in user:\n\
    \n`[sa_OAuthTwitterEngine getFavoriteUpdatesFor:nil startingAtPage:0];`\n\nFor\
    \ each of these cases (and others), Twitter returns an array of dictionaries (via\
    \ `statusesReceived:`), where each dictionary is the same as the preceding one,\
    \ contains all of the relevant info and stats for the given Tweet, and indicates\
    \ where it originated from.\n\nWith the Twitter API, you can also delete Tweets.\
    \ If we wanted to delete the preceding Tweet, we would do the following, where\
    \ we pass in the ID of the Tweet:\n\n`[sa_OAuthTwitterEngine deleteUpdate:@\"\
    43525805485199360\"];`\n\nIn [Chapter 6](#Chapter06.html#ch6), we showed you how\
    \ to get someone’s followers; however, you can also request information about\
    \ a specific Twitter user at any time using his Twitter name or his Twitter ID:\n\
    \n`[sa_OAuthTwitterEngine getUserInformationFor:@\"TWITTER USERNAME HERE\"];`"
  raw: '#### A Tweetin’ We Will Go


    You’re probably itching to Tweet something directly from an iOS app, right? Well,
    beginning with iOS 5, Apple has made it easy for deveopers to include Twitter
    posting functionality in their apps. Users can login to Twitter from inside iOS,
    and new Tweet posting buttons can be found in several preloaded apps including
    Camera, Photos, Safari, YouTube and Maps. However, Apple''s support for Twitter
    functions stop at POSTing, so we''re going to show you how to roll your own Twitter
    integration in case your app needs to do something a little more powerful. To
    Tweet something for the currently logged in user, use the following `MGTwitterEngine`
    method:


    `- (NSString *)sendUpdate:(NSString *)status;`


    It’s as easy as pie. Tweets can be at most 140 UCS-2 characters long. If this
    length is exceeded, the Tweet is truncated. For the `status` parameter, just pass
    in what you want to Tweet and you’re done:


    `[sa_OAuthTwitterEngine sendUpdate:@"this is a test tweet! tweet tweet!"];`


    We won’t go over the `MGTwitterEngineDelegate` again in too much detail; however,
    recall that we set up our main application delegate as a `MGTwitterEngineDelegate`,
    so you can see what happens when you make each of these calls by going to that
    class. We will refer to the methods here and assume that you can find them in
    `AppDelegate.m`. Remember that if the request is successful, the first thing that
    happens is `requestSucceeded:` is called; next, a follow-up delegate method is
    called, depending on the request.


    Ultimately, when you Tweet something, the `statusesReceived:` delegate method
    is called with the actual details of the Tweet returned from Twitter. We’ve modified
    the `statusesReceived:` method to show you some more information. The main parameter
    that you receive in this method is an array of items from Twitter. Each element
    in this array is a dictionary that represents one item. The set of key value pairs
    that represent an item changes, depending on what you originally requested from
    Twitter. In our new implementation of `statusesReceived:`, we take the first item
    in the array and, if it exists, get the Twitter ID for the Tweet and print it
    out to the console log. Check out how in this example:


    `    -    (void)statusesReceived:(NSArray *)statuses`

    `    -                forRequest:(NSString *)connectionIdentifier {`

    `    NSLog(@"Status received for connectionIdentifier = %@, %@",`

    `                    connectionIdentifier, [statuses description]);`


    `    NSDictionary *dictionary = [statuses objectAtIndex:0];`

    `    if (dictionary) {`

    `        NSString *twitterID = [dictionary objectForKey:@"id"];`

    `        NSLog(@"TwitterID = %@", twitterID);`

    `    }`

    `}`


    **NOTE:** Here’s something to keep in mind about Twitter IDs: like the Facebook
    graph, everything in Twitter has a unique ID. These IDs are used through a number
    of Twitter’s APIs, so we just wanted to make a quick mention of them.


    The ID for an item from Twitter is always stored in the `id` key in the dictionary
    of the item. The `MGTwitterEngine` code was originally written to accept unsigned
    `longs` for these IDs; however, the Twitter IDs have since grown and can no longer
    be held in an unsigned `long` variable. To make our lives (and hopefully yours)
    easier, we modified the version of `MGTwitterEngine` that is used for this book
    to take a string whenever a method needs a Twitter ID.


    The entire dictionary for a Tweet contains a ton of useful information. For example,
    we would see this if we were to print out the entire dictionary in the `statusesReceived:`
    method:


    `{`

    `    contributors = "";`

    `    coordinates = "";`

    `    "created_at" = "Fri Mar 04 04:18:55 +0000 2011";`

    `    favorited = false;`

    `    geo = "";`

    `    id = 43525805485199360;`

    `    "in_reply_to_screen_name" = "";`

    `    "in_reply_to_status_id" = "";`

    `    "in_reply_to_user_id" = "";`

    `    place = "";`

    `    "retweet_count" = 0;`

    `    retweeted = false;`

    `    source = "<a href=\"http://www.apress.com\"`

    `                      rel=\"nofollow\">Tweetin'' iOS OAuth</a>";`

    `    "source_api_request_type" = 5;`

    `    text = "this is a test tweet! tweet tweet!";`

    `    truncated = 0;`

    `    user =     {`

    `        "contributors_enabled" = false;`

    `        "created_at" = "Sat Jan 09 21:25:41 +0000 2010";`

    `        description = "";`

    `        "favourites_count" = 4;`

    `        "follow_request_sent" = false;`

    `        "followers_count" = 24;`

    `        following = 0;`

    `        "friends_count" = 186;`

    `        "geo_enabled" = false;`

    `        id = <twitter user id>;`

    `        "is_translator" = false;`

    `        lang = en;`

    `        "listed_count" = 0;`

    `        location = "";`

    `        name = Christopher;`

    `        notifications = false;`

    `        "profile_background_color" = C0DEED;`

    `        "profile_background_image_url" = "URL";`

    `        "profile_background_tile" = false;`

    `        "profile_image_url" = "URL";`

    `        "profile_link_color" = 0084B4;`

    `        "profile_sidebar_border_color" = C0DEED;`

    `        "profile_sidebar_fill_color" = DDEEF6;`

    `        "profile_text_color" = 333333;`

    `        "profile_use_background_image" = true;`

    `        protected = 1;`

    `        "screen_name" = christhepiss;`

    `        "show_all_inline_media" = false;`

    `        "statuses_count" = 451;`

    `        "time_zone" = "Eastern Time (US & Canada)";`

    `        url = "http://christhepiss.tumblr.com";`

    `        "utc_offset" = "-18000";`

    `        verified = false;`

    `    };`

    `}`


    Take note of the id that we mentioned before. Also take note of the text and the
    source of the Tweet. Since we’re using the app identifier for this book when authorizing
    users, the source is listed as “Tweetin'' iOS OAuth.” On Twitter, this would look
    like what you see in [Figure 7–6](#Chapter07.html#fig_7_6).


    ![images](images/0706.jpg)


    **Figure 7–6.** *A test Tweet. And it works!*


    So now that you’ve tweeted, you must be feeling pretty good. We know we feel good.
    However, let’s say you want to see all of your Tweets. Doing so is simple:


    `[sa_OAuthTwitterEngine getUserTimeline];`


    In the world of Twitter, tweets exist along a timeline since each Tweet occurs
    at a specific point in time. So you can get a user’s timeline of tweets (as we
    did earlier), or you can get the timeline of the user and all of her followers:


    `[sa_OAuthTwitterEngine getHomeTimeline];`


    You can even get the entire public timeline on Twitter of all Twitter users who
    have public Tweets:


    `[sa_OAuthTwitterEngine getPublicTimeline];`


    Similarly, you can get the favorite Tweets of the currently logged in user:


    `[sa_OAuthTwitterEngine getFavoriteUpdatesFor:nil startingAtPage:0];`


    For each of these cases (and others), Twitter returns an array of dictionaries
    (via `statusesReceived:`), where each dictionary is the same as the preceding
    one, contains all of the relevant info and stats for the given Tweet, and indicates
    where it originated from.


    With the Twitter API, you can also delete Tweets. If we wanted to delete the preceding
    Tweet, we would do the following, where we pass in the ID of the Tweet:


    `[sa_OAuthTwitterEngine deleteUpdate:@"43525805485199360"];`


    In [Chapter 6](#Chapter06.html#ch6), we showed you how to get someone’s followers;
    however, you can also request information about a specific Twitter user at any
    time using his Twitter name or his Twitter ID:


    `[sa_OAuthTwitterEngine getUserInformationFor:@"TWITTER USERNAME HERE"];`'
  trans: "\n# 推特，走起！\n\n你可能正迫不及待地想直接从 iOS 应用发推文，对吧？从 iOS 5 开始，Apple 已经让开发者可以轻松地在应用中集成\
    \ Twitter 发推功能。用户可以在 iOS 系统内登录 Twitter，而且在相机、照片、Safari、YouTube 和地图等多个预装应用中都能找到新的发推按钮。不过，Apple\
    \ 对 Twitter 函数的支持仅止步于 POST 请求，因此我们将向你展示如何自行集成 Twitter 功能，以便你的应用需要执行更强大的操作。要为当前登录的用户发推，请使用以下\
    \ `MGTwitterEngine` 方法：\n\n`- (NSString *)sendUpdate:(NSString *)status;`\n\n\
    这简直易如反掌。推文最多可包含 140 个 UCS-2 字符。如果超出此长度，推文会被截断。对于 `status` 参数，只需传入你要发送的内容即可：\n\n\
    `[sa_OAuthTwitterEngine sendUpdate:@\"this is a test tweet! tweet tweet!\"];`\n\
    \n我们不会再次详细讲解 `MGTwitterEngineDelegate`；不过，回想一下，我们将主应用委托设置为了 `MGTwitterEngineDelegate`，因此你可以通过查看该类来了解每次调用这些方法时会发生什么。我们将在此处提及这些方法，并假设你可以在\
    \ `AppDelegate.m` 中找到它们。请记住，如果请求成功，首先调用的是 `requestSucceeded:`；接着，根据请求类型，会调用一个后续的委托方法。\n\
    \n最终，当你发推时，`statusesReceived:` 委托方法会被调用，并传入从 Twitter 返回的推文的实际详细信息。我们修改了 `statusesReceived:`\
    \ 方法，以向你展示更多信息。在此方法中接收到的主要参数是一个来自 Twitter 的项目数组。该数组中的每个元素都是一个表示单个项目的字典。根据你最初向\
    \ Twitter 请求的内容，表示项目的键值对集合会有所不同。在我们新的 `statusesReceived:` 实现中，我们取数组中的第一个项目，如果它存在，则获取该推文的\
    \ Twitter ID 并将其打印到控制台日志。看看这个例子是如何实现的：\n\n```\n- (void)statusesReceived:(NSArray\
    \ *)statuses\n              forRequest:(NSString *)connectionIdentifier {\n  \
    \  NSLog(@\"Status received for connectionIdentifier = %@, %@\",\n           \
    \     connectionIdentifier, [statuses description]);\n\n    NSDictionary *dictionary\
    \ = [statuses objectAtIndex:0];\n    if (dictionary) {\n        NSString *twitterID\
    \ = [dictionary objectForKey:@\"id\"];\n        NSLog(@\"TwitterID = %@\", twitterID);\n\
    \    }\n}\n```\n\n**注意：** 关于 Twitter ID 有一点需要牢记：与 Facebook 图谱类似，Twitter 中的每个实体都有唯一的\
    \ ID。这些 ID 在 Twitter 的许多 API 中都会用到，所以我们想在此简单提一下。\n\n来自 Twitter 的项目的 ID 始终存储在该项目字典的\
    \ `id` 键中。`MGTwitterEngine` 代码最初编写时接受无符号长整型作为这些 ID；然而，Twitter ID 后来变大了，无法再容纳在一个无符号长整型变量中。为了让我们的生活（希望也包括你的）更轻松，我们修改了本书使用的\
    \ `MGTwitterEngine` 版本，使其在需要 Twitter ID 的地方都接受字符串参数。\n\n一条推文的完整字典包含大量有用的信息。例如，如果我们在\
    \ `statusesReceived:` 方法中打印出整个字典，我们会看到如下内容：\n\n```\n{\n    contributors = \"\"\
    ;\n    coordinates = \"\";\n    \"created_at\" = \"Fri Mar 04 04:18:55 +0000 2011\"\
    ;\n    favorited = false;\n    geo = \"\";\n    id = 43525805485199360;\n    \"\
    in_reply_to_screen_name\" = \"\";\n    \"in_reply_to_status_id\" = \"\";\n   \
    \ \"in_reply_to_user_id\" = \"\";\n    place = \"\";\n    \"retweet_count\" =\
    \ 0;\n    retweeted = false;\n    source = \"<a href=\\\"http://www.apress.com\\\
    \"\n                      rel=\\\"nofollow\\\">Tweetin' iOS OAuth</a>\";\n   \
    \ \"source_api_request_type\" = 5;\n    text = \"this is a test tweet! tweet tweet!\"\
    ;\n    truncated = 0;\n    user =     {\n        \"contributors_enabled\" = false;\n\
    \        \"created_at\" = \"Sat Jan 09 21:25:41 +0000 2010\";\n        description\
    \ = \"\";\n        \"favourites_count\" = 4;\n        \"follow_request_sent\"\
    \ = false;\n        \"followers_count\" = 24;\n        following = 0;\n      \
    \  \"friends_count\" = 186;\n        \"geo_enabled\" = false;\n        id = <twitter\
    \ user id>;\n        \"is_translator\" = false;\n        lang = en;\n        \"\
    listed_count\" = 0;\n        location = \"\";\n        name = Christopher;\n \
    \       notifications = false;\n        \"profile_background_color\" = C0DEED;\n\
    \        \"profile_background_image_url\" = \"URL\";\n        \"profile_background_tile\"\
    \ = false;\n        \"profile_image_url\" = \"URL\";\n        \"profile_link_color\"\
    \ = 0084B4;\n        \"profile_sidebar_border_color\" = C0DEED;\n        \"profile_sidebar_fill_color\"\
    \ = DDEEF6;\n        \"profile_text_color\" = 333333;\n        \"profile_use_background_image\"\
    \ = true;\n        protected = 1;\n        \"screen_name\" = christhepiss;\n \
    \       \"show_all_inline_media\" = false;\n        \"statuses_count\" = 451;\n\
    \        \"time_zone\" = \"Eastern Time (US & Canada)\";\n        url = \"http://christhepiss.tumblr.com\"\
    ;\n        \"utc_offset\" = \"-18000\";\n        verified = false;\n    };\n}\n\
    ```\n\n请注意我们之前提到的 `id`。同时也要注意推文的 `text` 和 `source`。由于我们在授权用户时使用了本书的应用标识符，所以来源显示为“Tweetin'\
    \ iOS OAuth”。在 Twitter 上，它的显示效果与你在图 7-6 中看到的类似。\n\n![images](img/0706.jpg)\n\n\
    **图 7-6.** *一条测试推文。而且它成功了！*\n\n所以现在你已经发了推文，感觉一定很好。我们知道我们感觉很好。不过，假设你想查看自己所有的推文。操作很简单：\n\
    \n`[sa_OAuthTwitterEngine getUserTimeline];`\n\n在 Twitter 的世界里，推文沿时间线存在，因为每条推文都发生在特定的时间点。因此，你可以获取用户的时间线（就像我们之前做的那样），或者获取该用户及其所有关注者的时间线：\n\
    \n`[sa_OAuthTwitterEngine getHomeTimeline];`\n\n你甚至可以获取 Twitter 上所有公开推文用户的完整公共时间线：\n\
    \n`[sa_OAuthTwitterEngine getPublicTimeline];`\n\n类似地，你还可以获取当前登录用户收藏的推文：\n\n`[sa_OAuthTwitterEngine\
    \ getFavoriteUpdatesFor:nil startingAtPage:0];`\n\n对于上述每种情况（以及其他情况），Twitter 都会通过\
    \ `statusesReceived:` 返回一个字典数组，其中每个字典与前面的字典相同，包含给定推文的所有相关信息和统计数据，并指明其来源。\n\n使用\
    \ Twitter API，你还可以删除推文。如果我们想删除上面的推文，可以这样做，传入该推文的 ID：\n\n`[sa_OAuthTwitterEngine\
    \ deleteUpdate:@\"43525805485199360\"];`\n\n在第 6 章中，我们向你展示了如何获取某人的关注者；然而，你也可以随时使用某位\
    \ Twitter 用户的名称或其 Twitter ID 来请求关于该用户的特定信息：\n\n`[sa_OAuthTwitterEngine getUserInformationFor:@\"\
    此处填入 Twitter 用户名\"];`\n"
