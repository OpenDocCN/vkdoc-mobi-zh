  trans: '

    ## 社交类 iOS 应用的 UI 设计与体验指南


    在上一章中，我们讨论了 Facebook 和 Twitter 以“保护用户体验”为名制定的所有规则和条例。当然，这些指南仅涉及那些可能给平台带来负面影响的方面。本章将提供一些指导，帮助你打造一款不仅在字面上合规，而且实际上直观易用的应用。


    如果你是第一次设计 iOS 应用，本节是必读内容。它将涉及苹果人机界面指南（HIG）中的几个部分，这些部分对社交应用尤为重要。它还将告诉你如何正确运用视觉和交互设计，避免用户困惑和商标冲突。遵循这些规则，你将获得用户的良好反馈——并且不会受到
    Twitter 和 Facebook 平台代表的刁难。


    作为作者，我们认为最好的 iOS 应用通常会遵循苹果的 HIG，除非它们有意偏离以改进界面。换句话说，我们认为最好的设计应当胜出，开发者可以并且应该互相借鉴最佳的交互方式，以期创建出自然的
    UI 标准。


    我们想表达的核心是：如果你要获得打破规则的力量，掌握规则至关重要。如果你之前设计过应用，那么本章是可选的。不过，你可能还是想快速翻阅一下，以回顾某些范例。


    ### Facebook 与 Twitter 的 UI 基础


    本章从 iOS 社交应用设计的一些非常基础的建议开始。官方的 Twitter 和 Facebook 应用（以及它们庞大的现有应用开发者群体）已经标准化了这些应用的交互和视觉设计，因此用户对你设计的任何
    UI 都有极高的期望。遵循本章的建议将帮助你善待用户，并避免触犯我们在第 11 章中讨论的所有规则所带来的麻烦。


    首先，这里有两条基本建议：


    -   在设置过程中谨慎处理账户。

    -   允许用户在你的应用中通过 Twitter 和 Facebook API 集成进行注册、登录和退出。


    我们先来看一下如何在设置账户时处理账户。仅仅因为用户尚未登录就显示错误或空白视图，会造成糟糕的用户体验。我们不愿针对任何人，但这里有一个我们在 App Store
    上找到的匿名 Twitter 应用。启动时，它看起来就像图 12-1 所示。


    ![images](img/1201.jpg)


    **图 12-1.** *错误信息绝不应该是用户在应用中看到的第一样东西。*


    在首次启动时向用户显示“警告”这一错误信息，是一种非常糟糕的应用介绍方式。更糟的是，如果你点击确定，并且没有在此应用中输入账户信息（在本例中，隐藏在“更多”![images](img/U001.jpg)“配置”中），那么下次启动应用时，你只会得到一个空白的时间线。同样，这也是一种处理用户账户的糟糕方式。


    在 Twitterific 中可以看到一种更好的启动序列处理方式（见图 12-2）。这个应用也恰好是我们第二条——可能显得过于基础——建议的一个良好引子。


    ![images](img/1202.jpg)


    **图 12-2.** *Twitterific 的注册屏幕呈现得十分得体。*


    也就是说，你应该允许用户在你的应用中通过 Twitter 和 Facebook API 集成进行注册、登录和退出。两个平台都要求你这样做，并且对用户公平也要求你贯彻执行。同样，你的应用应该具备处理手机启动时处于离线状态或在登录过程中网络连接失败等场景的能力。


    #### 注重细节：从图标开始


    设计在 iOS 上至关重要，因此你必须对视觉资产的细节给予一丝不苟的关注。我们将从确保你了解图标设计的适当尺寸开始。这是你的应用面向世界的名片，因此，如果它要在
    Retina 屏幕上看起来很棒，就必须有正确的尺寸。


    以下是 iPhone 和 iPod 的适当图标尺寸：


    -   iPhone 4 图标：`114x114px`（旧的 iPhone 图标标准分辨率为 `57x57`，这是最低可接受尺寸）。

    -   App Store 图标：`512x512px`

    -   聚焦搜索：`29x29px`

    -   iPhone 4 聚焦：`58x58px`


    下表是苹果要求的图标尺寸。


    ![images](img/t1201.jpg)


    你需要制作的最大视觉资产是 `512 × 512` 像素。这是应用在 iTunes Cover Flow 中查看或位于 App Store 顶部横幅上时显示的图像。通常，所有图标设计都从
    `512` 像素开始，然后调整到所需尺寸。简单地将单个图标缩小到其他尺寸会导致图标模糊。


    **注意：** 所有图像和图标都推荐使用 `PNG` 格式。图标和图像的标准位深是 `24` 位（红、绿、蓝各 `8` 位），外加一个 `8` 位的 alpha
    通道。虽然你可以在导航栏、工具栏和标签栏的图标中使用 alpha 透明度，但请不要在应用图标中使用此功能。你不必局限于 Web 安全色。


    以下是 iPad 的标准应用尺寸：


    -   应用图标：`72x72px`

    -   App Store 图标：`512x512px`

    -   聚焦搜索：`50x50px`

    -   设置图标：`29x29px`


    **注意：** App Store 只接受图标为 `PNG` 文件的应用。


    你无需为图标添加光泽；这会自动完成。如果你想要未经修饰的外观，可以使用一个布尔开关来切换光泽效果。


    应用图标的圆角也是如此：让你的图形保持直角边，它们将自动被裁剪为圆角。

