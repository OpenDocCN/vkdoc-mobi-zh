    The tests need to be written for the `TwitterDataStore_SQLite` class; therefore,
    the `TwitterDataStore_SQLite`, `TwitterDataStore`, and `Tweet` classes need to
    be added to the `OfflineTwitterTest` Target, so that the `OfflineTwitterTest`
    Target will link when actual test code is added (see [Figures 10–19](#Chapter10.html#fig_10_19)
    through 10–21).


    ![images](images/1019.jpg)


    **Figure 10–19.** *Add Tweet.m to OfflineTwitterTest Target*


