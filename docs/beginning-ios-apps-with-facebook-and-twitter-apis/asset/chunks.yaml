- fmt: "### Splash Screens\n\nSplash screens aren't really necessary on today's iOS\
    \ devices, which load apps quickly. However, you should test your app on multiple\
    \ generations of devices. If an older iOS device experience lags, see what you\
    \ can do programmatically to improve load times. If there's nothing to be done\
    \ under the hood, consider adding a splash screen to your app to welcome waiting\
    \ users. It passes the time, and it offers you a second to present your branding\
    \ and make a good impression. If more than a moment or two is required to load\
    \ your app, consider moving out of the splash screen briskly and presenting a\
    \ reduced-functionality view of your app's interface. Also, continue to show that\
    \ your app is loading information, and be sure to inform the user if there is\
    \ a break in connectivity.\n\n### Visual Assets (a.k.a., the Exceptions)\n\nThe\
    \ visual indicators shown in Figure 13–10 are available for download and allowed\
    \ for use in your app, per the guidelines discussed in this chapter. PNG versions,\
    \ which are preferred for iOS, are also available as *sprites*. To download these\
    \ graphics, go to the following URL:\n\n[`http://dev.twitter.com/pages/image-resources`](http://dev.twitter.com/pages/image-resources)\n\
    \n![images](images/1310.jpg)\n\n**Figure 13–10.** *Twitter's sprites, which are\
    \ available for use in your app*\n\n### Naming Your Project\n\nTwitter has compiled\
    \ a list of dos-and-don'ts for referencing Twitter when you name your project,\
    \ which we'll cover in this section.¹\n\nDo the following when naming your project\
    \ and referencing Twitter:\n\n- Name your website, product, or application with\
    \ something unique. Uses of *Tw-* and *Twit-* are generally okay.\n- Feel free\
    \ to include language on your site explaining that your application is built on\
    \ the Twitter platform, so people understand your product.\n- Use *Tweet* in the\
    \ name of your application only if it is designed to be used exclusively with\
    \ the Twitter platform.\n\n*Don't* do the following when naming your project and\
    \ referencing Twitter:\n\n- Use *Twitter* in the name of your website or application.\n\
    - Use *Tweet* by itself or in conjunction with a simple letter or number combination\
    \ (e.g., *1Tweet*, *Tweet*, or *Tweets*).\n- Register a domain containing *twitter*\
    \ (or misspellings of twitter).\n- Apply for a trademark with a name that includes\
    \ *Twitter*, *Tweet*, or similar variations thereof.\n- Use *Tweet* in the name\
    \ of your application if used with any other platform.\n\n### Offline Display\
    \ Guidelines\n\nIf you are making some kind of Twitter visualizer or plan for\
    \ your app to be viewed on a larger display via the iPad, then you should follow\
    \ the offline display requirements outlined in this section.\n\nFor example, you\
    \ are permitted to do the following:\n\n- Include the Twitter logo in close proximity\
    \ to Tweets for the duration that Tweets appear in a broadcast.\n- Make sure that\
    \ the Twitter logo is a reasonable size in relation to the content.\n- Include\
    \ the username with each Tweet. If you have concerns about user privacy or broadcast\
    \ standards, please contact Twitter regarding exceptions, unless you have a prior\
    \ agreement with Twitter.\n- Use the full text of the Tweet. If privacy or broadcast\
    \ standards are concerned, please contact Twitter regarding exceptions, unless\
    \ you have a prior agreement with Twitter.\n\nAnd here are some things you should\
    \ not do: delete, obscure, or alter the identification of the user. You may show\
    \ Tweets in anonymous form in exceptional cases, such as concerns over user security.\
    \ Showing unattributed data in aggregate or visualized form is permitted, but\
    \ you must still include the Twitter logo.\n\nTo see Twitter's complete list of\
    \ offline display and broadcast media guidelines, go to the following URL:\n\n\
    [`http://support.twitter.com/entries/77641`](http://support.twitter.com/entries/77641)\n\
    \n### Working with Notifications\n\nUntil Spring 2011, the official Twitter app\
    \ dealt with notifications conservatively: it only delivered a Push alert if you\
    \ were pinged by an `@reply` or a direct message. Generally, the authors agree\
    \ this is really all the notifications a Twitter app requires.\n\nHowever, in\
    \ March 2011 Twitter introduced something called the *QuickBar*, which was supposed\
    \ to be a way for the editorial powers at Twitter to introduce a trending topic\
    \ (or, ahem, paid promotional Tweets) to the top of users' timelines. Instead,\
    \ it became a raging source of user ire and is commonly nicknamed the *Dickbar*.\n\
    \nOn an app that is a veritable godfather of iOS design, this was a major blunder.\
    \ Outlets everywhere panned Twitter's folly, and they pummeled the company until\
    \ it erased the QuickBar from a subsequent update.² Mac developer Marco Arment's\
    \ reaction on his blog was particularly articulate and provided a sense of what's\
    \ so important about good iOS apps: the clarity of purpose that underpins every\
    \ screen.\n\nNote that near the end of his rant, he evaluates the QuickBar against\
    \ three criteria:\n\n- Am I supposed to Tweet about this?\n- Am I supposed to\
    \ save this search?\n- Am I supposed to read these Tweets?\n\nThese are the core\
    \ functions of Twitter, so any feature that uses the API should be in some way\
    \ related to at least a couple of them. An edited version of Arment's post follows:³\n\
    \n> *Twitter's official iPhone app, formerly Loren Brichter's Tweetie and an otherwise\
    \ awesome client, got a lot of negative reactions from the recent addition of\
    \ the QuickBar, a mandatory trending-topics banner on top of the tweet list. A\
    \ lot of people really hate it, calling it the \"dicker\" and often abandoning\
    \ the Twitter app entirely because of it.*\n> \n> *Its initial implementation\
    \ as a floating overlay over anything you were doing in the app was far worse.\
    \ Now, it's just at the top of the main timeline, and it scrolls with the list.\
    \ But it's still offensive to most people who hated its debut, because making\
    \ it scroll with the list didn't solve the problem of it being there and being\
    \ mandatory.*\n\n¹ [`http://support.twitter.com/entries/77641`](http://support.twitter.com/entries/77641)\n\
    \n² [`http://blog.twitter.com/2011/03/so-bar-walks-into-app.html`](http://blog.twitter.com/2011/03/so-bar-walks-into-app.html)\n\
    \n³ [`http://www.marco.org/2011/03/20/why-the-quick-bar-dickbar-is-still-sooffensive`](http://www.marco.org/2011/03/20/why-the-quick-bar-dickbar-is-still-sooffensive)"
