    Notice that the actual array of places is in a dictionary entitled `result`. Each
    place is itself a dictionary of values, but the value that we are most interested
    in is the value for the `id` key. When we get a notification that we have received
    place results from Twitter, we take the dictionary for the first place in the
    array, extract its place id, and then submit a status update with an additional
    dictionary of params. In conforming with Twitter''s API, we supply a parameter
    with the key `place_id`:


    `- (void)twitterPlacesRequestDidComplete:(NSNotification*)notification {`


    `    [[NSNotificationCenter defaultCenter] removeObserver:self];`


    `    NSArray *places = [notification.userInfo objectForKey:@"places"];`

    `    if (0 < [places count]) {`

    `        //grab the first place`

    `        NSDictionary *placesDict = [places objectAtIndex:0];`

    `        NSDictionary *resultDict = [placesDict objectForKey:@"result"];`

    `        NSArray *resultPlaces = [resultDict objectForKey:@"places"];`

    `        if (0 < [resultPlaces count]) {`

    `            NSDictionary *firstPlace = [resultPlaces objectAtIndex:0];`


    `            NSMutableDictionary *params =`

    `                [NSMutableDictionary dictionary];`

    `            [params setObject:[firstPlace objectForKey:@"id"]`

    `                       forKey:@"place_id"];`

    `            [sa_OAuthTwitterEngine sendUpdate:@"location tweet!"`

    `                                   withParams:params];`

    `        }`

    `    }`

    `}`


    If we then go to Twitter on the Web, lo and behold, we see our Tweet with a location
    (see [Figure 9–36](#Chapter09.html#fig_9_36)). Note that you have to enable location
    with Tweets in your settings on Twitter, as discussed earlier in this chapter.


    There are a lot of fun things that you can do with location in Twitter, so give
    this code a go. The actual sample code has some other example code that you can
    uncomment to see how the other Twitter geo APIs work. They are all closely related
    and take almost identical parameters.


    Before we close out this chapter, we''d also like to note that you can use MapKit''s
    `MKReverseGeocoder` class if you don''t want to use Twitter or Facebook to look
    up places for coordinates. It''s up to you. The sample code also has `MKReverseGeocoder`
    implemented, so that you can tinker with this at your leisure.


    ![images](images/0936.jpg)


    **Figure 9–36.** *A Tweet with location information*


    ### Conclusion


    Working with location is a lot of fun, but it also has its perils. When working
    with location in your application and with social networks like Facebook and Twitter,
    it is paramount for you to put yourself in your user''s shoes and ask yourself
    important questions about how you are using her location. Every application has
    a unique user interface design, but we encourage you to incorporate a disclosure
    about what you are doing with a user''s location in your application and to display
    it immediately on the first run of your application or the first time that a user
    is going to perform an action where her location will be used.


    This is just one of the many design and interface guidelines you should follow.
    You''ll read more about them in Chapters 11 through 14.


    That''s it for location. We''ve given you the basic building blocks, so have some
    fun. In the next chapter, we cover a grab bag of technical issues that will improve
    your applications overall integration with Facebook and Twitter.


