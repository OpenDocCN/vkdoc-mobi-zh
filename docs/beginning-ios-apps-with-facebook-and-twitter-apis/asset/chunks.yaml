    `}`


    ### Conclusion


    We covered some really interesting new ground in this chapter with respect to
    uploading photos and building a simple data model for our application using Core
    Data. There are other options available for building a data model—such as SQLite—so
    we recommend you explore other ways of storing data for offline or quick retrieval
    within your application. Be aware that you may want to build some smarts into
    your model that limit the amount of storage that your application uses. For instance,
    you may want to store only a certain number of recent Tweets or perhaps only Tweets
    within the last 12 hours.


    In the next chapter, we will go over different location-based scenarios; explain
    how to integrate location information into your app, as well as with social networking
    data for Facebook and Twitter; and also continue to refine how we integrate these
    services into our application by setting up a stand alone controller that we can
    use anywhere within our app.


    ## Chapter 9


    ## Working with Location Awareness and Streaming Data


    This chapter covers the nuts and bolts of using location on iOS with Facebook
    and Twitter. We''ll also discuss working with streaming APIs.


    One of the main trends to have emerged within social applications is adding a
    location context to user experiences. In the worlds of Facebook and Twitter, this
    involves letting users *check in* to places on Facebook or search for nearby Tweets
    on Twitter, as well as a host of other scenarios. We''re going to walk you through
    the ins and outs of using iOS''sCoreLocation and MapKit libraries to incorporate
    location and maps into your application, and then use the location information
    from these libraries to show some location-based features of Facebook and Twitter.


    ### Here, There, and Everywhere


    At first glance, incorporating location information into your application seems
    like a trivial task; however, there are a number of considerations to make with
    respect to privacy for your users, power/battery conservation on a device, and
    the CoreLocation and MapKit APIs. The sample applications for this chapter incorporate
    all of the techniques that follow. Since CoreLocation and Map Kit are themselves
    extensive APIs, it''s necessary to run through the core features that these APIs
    provide and highlight some new features that debuted iOS 4.0. After that, this
    chapter will delve into the Facebook and Twitter APIs for location.'
