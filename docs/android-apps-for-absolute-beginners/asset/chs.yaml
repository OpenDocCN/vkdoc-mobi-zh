  \n**图 10-7** 方向和重力的全方位展示\n\n### 更多布局选项\n\nAndroid 提供了一系列其他布局类型，其中许多类型在 Android 的各个版本中流行程度有所起伏。以下是需要了解的主要布局类型——更多关于这些布局的示例可从网站\
  \ [`www.beginningandroid.org`](http://www.beginningandroid.org) 获取。\n\n#### 表格布局\n\
  \n早在互联网初期，网页设计师经常使用简单的 HTML 表格在页面上放置内容。虽然网页设计已经突飞猛进，但基于表格的布局概念仍然有用，Android 在 `TableLayout`\
  \ 容器中采用了它们。\n\n与 HTML 一样，Android 中的 `TableLayout` 使用起来很便捷，它依赖于 `TableLayout` 拥有\
  \ `TableRow` 子元素来控制大小、位置等概念。与旧的 HTML 网页方法还有一个相似之处：高精度的布局很难做到完美。\n\n#### 网格布局\n\n\
  如果 `TableLayout` 的想法让你浮想联翩，那么你肯定会喜欢 `GridLayout`。作为 `TableLayout` 的近亲，`GridLayout`\
  \ 将其子控件和 UI 元素放置在一个由无限精细的线条组成的网格上，这些线条将你的 Activity 所渲染的区域分割成多个单元格。`GridLayout` 精确控制的秘诀在于，用于描述单元格的单元格数量或网格线数量没有限制或阈值。只需添加更多网格线，就能将你的\
  \ UI 更精细地划分成子单元格，用于放置控件。\n\n### 掌握基于 XML 的布局与 Java 逻辑：两全其美！\n\n随着你对 XML 布局和 Java\
  \ 管理的布局越来越熟悉，你最终会意识到你可以两全其美，并且随时可以改变主意。你可能更喜欢在 XML 中制作原型并使用图形布局编辑器，或者你可能更喜欢使用 Java\
  \ 来尝试真正微妙的运行时布局选择。无论采用哪种方法，你都可以随时通过一些代码或调整 XML 来改变主意。为了说明这一点，代码清单 10-5 列出了你的 `ButtonExample`\
