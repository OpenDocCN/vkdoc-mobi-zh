  \ 1.0，编码为 UTF-8。该特殊标签采用以下形式，使用特殊的 `<?xml` 和 `?>` 作为开始与结束标记：\n\n```\n这有助于任何读取和使用\
  \ XML 文档的程序理解如何解释文本及 XML 结构。\n```\n\n### XML 元素\n\n元素是 XML 的基本构建块，它们是为数据提供含义和结构的“标签”，但其本身并非数据。XML\
  \ 元素是嵌套的，因此 XML 文档中的第一个、最外层的元素被称为**根元素**，它可以包含（在其内部嵌套）一个或多个**子元素**。一个 XML 文档中仅有一个根元素。\n\
  \n元素标签由 `<`（大于号）和 `>`（小于号）符号括起。对于我定义和使用的每个元素，都需要一个开始标签和一个名称相同、但在名称前添加了 `/`（反斜杠）的匹配结束标签。必须使用此方法才能保证\
  \ XML 在语法上正确——在 XML 术语中称为“格式良好”。例如，我可能决定创建一个 XML 文档来存储人员的联系方式，其数据结构类似于通讯录，并决定将根元素命名为\
  \ `<addressbook>`。\n\n我的 XML 文档起初看起来像这样：\n\n```\n<?xml version=\"1.0\" encoding=\"\
  UTF-8\"?>\n<addressbook>\n</addressbook>\n```\n\n这包含了版本和编码的特殊标签以及 `<addressbook>`\
  \ 根元素的开始标签，并以匹配的 `</addressbook>` 结束标签正确闭合。到目前为止，一切顺利。\n\n我可以为一个人包含一个子元素，并在该人员元素内包含名字和姓氏的子元素，如下所示：\n\
  \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person>\n\
  \        <firstname>Jane</firstname>\n        <lastname>Smith</lastname>\n    </person>\n\
  </addressbook>\n```\n\n到目前为止，一切顺利。请记住，元素名称以及它们隐含的作用都是由我来决定的。\n\n**注意：** 元素的结束标签不必总是独占一行。实际上，XML\
  \ 的任何部分都不一定要有换行。但是，这样做确实能让 XML 更易读。对于可读性好的 XML，普遍接受的规范是：开始标签出现在新行；当某个标签没有子元素时，结束标签可以放在与开始标签同一行的末尾（如前面的\
  \ `<firstname>` 和 `</firstname>`）；或者，开始和结束标签各自独占一行，并将任何子元素嵌套在其中（如前面的 `<person>`\
  \ 和 `</person>` 标签）。标签也会缩进以表明它们是子元素，但同样，这只是为了方便人类阅读的约定。\n\n如果这是一个真实的通讯录，里面应该不止一个人。但您可能会注意到，对于读取此\
  \ XML 的计算机（甚至人类）来说，很难区分哪个人是哪个。如果我们执行以下操作，任何试图追踪人员对应关系的程序都会遇到问题：\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person>\n        <firstname>Jane</firstname>\n\
  \        <lastname>Smith</lastname>\n    </person>\n    <person>\n        <firstname>John</firstname>\n\
  \        <lastname>Jones</lastname>\n    </person>\n</addressbook>\n```\n\nXML 对此的解决方案之一是使用**属性**，它们类似于元素的参数。\n\
  \n### XML 属性\n\n任何 XML 元素都可以拥有零个或多个与之关联的属性。属性与元素本身提供的数据不同，它们出现在元素名称的 `< >` 标记内，紧跟在标签名称之后。属性采用以下形式：\n\
  \n```\nattribute_name=\"value in double quotes\"\n```\n\n继续我们的通讯录示例，我们可以通过向 `<person>`\
  \ 元素添加一个 ID 属性，并使用数值为每个人分配不同的 ID，来区分 XML 数据中的不同人员。结果如下：\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person id=\"1\">\n        <firstname>Jane</firstname>\n\
  \        <lastname>Smith</lastname>\n    </person>\n    <person id=\"2\">\n    \
  \    <firstname>John</firstname>\n        <lastname>Jones</lastname>\n    </person>\n\
  </addressbook>\n```\n\n请注意，即使您和我可能会将此处呈现的 ID 值视为整数，甚至编写程序将其作为整数处理，但 XML 总是将属性放在双引号内，使其看起来像是字符串。\n\
  \n如果某个元素有多个属性，只需用空格分隔即可。例如，我们可以使用 `dateadded` 属性来记录将某人添加到通讯录的日期：\n\n```\n<?xml version=\"\
  1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person id=\"1\" dateadded=\"2023-01-15\"\
  >\n        <firstname>Jane</firstname>\n        <lastname>Smith</lastname>\n   \
  \ </person>\n    <person id=\"2\" dateadded=\"2023-02-20\">\n        <firstname>John</firstname>\n\
  \        <lastname>Jones</lastname>\n    </person>\n</addressbook>\n```\n\n### XML\
  \ 值\n\nXML 文档中封装的实际数据是包含在元素开始和结束标签内的值。在我们一直使用的通讯录示例中，值包括 `<firstname>` 元素中的 \"Jane\"\
  \ 和 `<lastname>` 元素中的 \"Smith\"。为传递这些信息而设置所有这些 XML 语法和元素标签可能显得有些多余（这种冗余性也是对 XML\
  \ 的常见批评之一），但对于阅读 XML 的人类来说，它具有良好的自描述性，并且还能提供关于结构、完整性等方面的保证。\n\n说到完整性，元素完全可以不包含任何数据，就像本章前面第一个通讯录\
  \ XML 文档所示那样。有几种选项可以让元素存在但不包含任何数据：既可以使用您已经见过的开始标签和结束标签方法，也可以使用简写的自闭合标签方法——这种方法下元素标签名称只出现一次，并在末尾添加一个\
  \ `/`（反斜杠）。让我们向 `<person>` 结构添加一个 `<middleinitial>` 元素，展示这两种选项，如下所示：\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person id=\"1\">\n \
  \       <firstname>Jane</firstname>\n        <middleinitial></middleinitial>\n \
  \       <lastname>Smith</lastname>\n    </person>\n    <person id=\"2\">\n     \
  \   <firstname>John</firstname>\n        <middleinitial/>\n        <lastname>Jones</lastname>\n\
  \    </person>\n</addressbook>\n```\n\n对于没有数据的元素，`<middleinitial></middleinitial>`\
  \ 和 `<middleinitial/>` 这两种形式都是有效的。请注意，不能在自闭合标签下嵌套任何子元素。\n\n### XML 命名空间\n\nXML 的一大优势在于它极大地简化了开发者和使用数据的系统之间的数据交换。一旦您习惯了以\
  \ XML 格式共享数据，它就会变得像第二天性一样自然。但所有这些易于传输和共享的特性也可能带来问题。一个特殊的问题是：由于您可以定义自己的 XML 标签（甚至可能定义自己的\
  \ XML 模式），您可能会发现其他人也开发了自己的模式，并且使用的元素名称与您的冲突。如果您和他们从不共享数据，这没什么大不了的；但如果您成为分享 XML 格式数据的实践者，那么在尝试混合来自多个来源的数据时，几乎肯定会遇到名称冲突。那么该怎么办呢？\n\
  \nXML 标准提供了一种包含两个部分的方法来解决这种名称冲突问题。首先，您可以为任何喜欢的元素添加一个标识字符串作为前缀，这是一个标记，用于指示给定元素源自哪个来源。所以，如果我们知道，我们要将来自我们自己的\
  \ `<addressbook>` 以及我们自己定义的 `<person>` 元素的数据，与来自其他人的、可能具有完全不同结构和一组元素的数据进行混合，我们可以为我们的元素添加前缀以进行区分，例如：\n\
  \n```\n<ab:addressbook xmlns:ab=\"http://www.example.com/addressbook\">\n    <ab:person\
  \ id=\"1\">\n        <ab:firstname>Jane</ab:firstname>\n        <ab:lastname>Smith</ab:lastname>\n\
  \    </ab:person>\n    <ab:person id=\"2\">\n        <ab:firstname>John</ab:firstname>\n\
  \        <ab:lastname>Jones</ab:lastname>\n    </ab:person>\n</ab:addressbook>\n\
  ```\n\n这个前缀充当了这些元素的命名空间。而来自另一个 XML 文档、具有令人混淆的 person 版本的元素将使用不同的命名空间前缀，例如：\n\n```\n\
  <other:person xmlns:other=\"http://www.othercompany.com/schema\">\n    <other:firstname>Judy</other:firstname>\n\
  \    <other:lastname>Walsh</other:lastname>\n</other:person>\n```\n\nXML 标准要求我们提供一个\
  \ URI 作为命名空间的唯一区分符——基本上，这是一个保证唯一并能反映我们为文档定义的 XML 结构的属性。这通过在元素的开始标签中使用 `xmlns` 属性来指定——通常您会在\
  \ XML 文档的根元素中看到它，如下所示：\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<ab:addressbook\
  \ xmlns:ab=\"http://www.example.com/addressbook\">\n    <ab:person id=\"1\">\n \
  \       <ab:firstname>Jane</ab:firstname>\n        <ab:lastname>Smith</ab:lastname>\n\
  \    </ab:person>\n    <ab:person id=\"2\">\n        <ab:firstname>John</ab:firstname>\n\
  \        <ab:lastname>Jones</ab:lastname>\n    </ab:person>\n</ab:addressbook>\n\
  ```\n\n### XML 世界的其他部分\n\nXML 标准中还有其他部分我们不会在本章中介绍，随着您知识的增长，这些内容可能会引起您的兴趣。\n\n\n\n\
  #### 1. CDATA\n\n`CDATA` 值是特殊的 XML 值，它们会被视为逐字数据，并且不会被处理或解析以发现其中是否包含更多嵌套的 XML 标签。这起初可能不太容易理解，但你会发现它常用于在\
  \ XML 文档中传递其他形式的数据标记或展示标记（如 HTML）。其作用是防止那些旨在强制执行 XML 标准的 XML 解析器和程序，在遇到看起来像 XML、但实际并非\
  \ XML 且不遵循 XML 规则的内容时意外出错。\n\n#### 2. XML 路径和 XQuery\n\n`XML 路径`与 `XQuery` 提供了一种遍历\
  \ XML 文档、通过浏览标签层次结构、评估属性等方式来查找数据的方法。默认情况下，这些工具不会用于 Android 应用的基本设计和构建，不过，如果你构建的\
  \ Android 应用需要自行处理基于 XML 的数据，那么你当然可以使用它们。\n\n#### 3. XSLT 和转换\n\n`XSLT` 是 XML 样式表转换语言，它是一种编程语言，旨在查询和转换\
  \ XML 的结构与数据，并以此生成衍生数据作为输出。XSLT 转换的输出通常是另一个 XML 文档，但它也可以是不同格式的数据。\n\n实际上，有成千上万个网站可以帮助你进一步学习\
  \ XML，但现在你已掌握了足够的基础知识，可以深入探究 Android 如何使用 XML，并开始为你的 Android 应用编写和编辑 XML 文件了。\n\n\
  ## 在 Android 应用中使用 XML\n\n正如本章开头所提到的，Android 主要通过三个主要领域使用 XML 来帮助构建和运行应用。回顾一下，它们分别是：\n\
  \n1.  应用清单，我们已经介绍过\n2.  资源定义，尤其是像字符串等常量\n3.  活动布局，这是一个宏大的主题，但可以循序渐进地学习\n\n### 审视\
  \ Android 清单 XML 文件\n\n无论你对 XML 的熟悉程度如何——无论你已使用多年，还是刚刚学习了本章前半部分提供的速成课程——我们现在都可以详细探讨\
  \ Android 清单。为了便于参考，代码清单 8-1 再次给出了 `androidmanifest.xml` 的内容：\n\n```\n代码清单 8-1\n\
  回顾 androidmanifest.xml 文件\n```\n\n在第 4 章中，我们强调了该文件的一些元素和其他部分，例如，使用命名空间来唯一标识所有使用\
  \ `\"android\"` 命名空间的 Android 资源元素，并将其绑定到唯一的 `xmlns` 引用 `xmlns:android=\"http://schemas.android.com/apk/res/android\"\
  `，以及使用 `<manifest>` 作为 Android 清单 XML 文档的根元素。但现在我们可以回顾一些其他的元素和属性。\n\n> **注意**\n\
  > \n> 如果你还没注意到，Google 倾向于在 Android 开发的 XML 使用中广泛运用属性。有时，许多人会指出这种做法有些过度，许多属性繁多的元素可以重新设计，改用包含数据值的子元素。这是一个永无止境的理论争论，现在你已具备参与讨论的能力了！\n\
  \n你的清单中通常会有一个 `<application>` 元素标签。该标签的主要属性包括 `android:icon` 和 `android:roundIcon`\
  \ 选项，以及 `android:label` 和 `android:theme` 属性——后者作为一个名称，代表一整套其他样式和设计 XML 设置，你可以采用它们来为应用赋予特定的外观和感觉。你会注意到它们都使用了\
  \ `\"@path/detail\"` 这种形式。`\"@\"` 符号是引用项目 `res/` 层次结构内关键资源的简写——无论是 mipmap 图片控制的应用图标，还是值层次结构中\
  \ `strings.xml` 文件（稍后讨论）里的字符串值等等。我们已经简要介绍过你在代码清单 8-1 中看到的 `<activity>` 元素，并说明了这个特定条目如何将你的\
  \ `MainActivity` Java 活动链接到 Android 应用启动时触发的 `\"MAIN\"` 操作。你的清单可以而且会逐渐包含更多的 `<activity>`\
  \ 元素，为你创建的每个应用活动对应一个元素。请记住，你为应用创建的活动数量实际上没有限制，所以你最终可能会看到很多这样的元素。随着本书的深入，我们将继续深化你对\
  \ Android 清单及其 XML 细微之处的理解。\n\n### 使用 XML 进行资源定义\n\nAndroid 利用 XML 的另一个主要领域是常量和引用值的定义与使用，在这些场景中，给定的数据以只读方式用于一系列用例。有大量的例子可以说明常量数据如何有助于简化应用构建过程，并减少所需的工作量，从确保所有活动和视觉元素具有一致的外观和感觉，到确保诸如珠穆朗玛峰的高度（8848\
  \ 米）、你的应用名称（`\"MyFirstApp\"`）或其他不变的数据值可以在一个地方声明，但在许多其他地方使用。\n\n一些关键的资源定义文件包括：\n\n\
  1.  `colors.xml`：一个提供有用名称（对你而言有意义的）的参考文件，对应各种颜色的红绿蓝（RGB）十六进制表示。\n2.  `strings.xml`：一个用于抽象文本字符串的参考文件，例如简单的单词、短语、句子和段落，这样它们就可以在各种源代码和其他文件中被引用，而无需将文本复制到许多地方。\n\
  3.  `styles.xml`：一个参考文件，用于在自定义样式的名下收集一组颜色定义和其他样式元素，以便该样式可以在整个应用中用作常见的设计主题。\n4. \
  \ `dimens.xml`：一个参考文件，用于提供不同尺寸和大小设置的抽象表示，允许你在一个位置控制密度/大小的变化，而无需在许多不同的文件中编辑许多值。\n\
  \n这些资源文件的定义对于高层次的概念理解来说还不错，但要理解它们*如何*被使用，则还欠缺一些。让我们深入实践，亲自动手，将这些资源文件的内容混搭并添加新的内容。\n\
  \n#### 更改颜色\n\n最容易摆弄的 XML 文件是你的 `colors.xml` 文件。该文件可以根据你的需要包含任意数量的颜色别名。默认内容如代码清单\
  \ 8-2 所示。\n\n```\n#6200EE\n#3700B3\n#03DAC5\n\n代码清单 8-2\n默认的 colors.xml 文件内容\n```\n\
  \n是时候对你的 `MyFirstApp` 应用进行更多更改了。通过修改名称为 `\"colorPrimary\"` 的颜色元素，无论布局在何处引用此颜色资源定义，我们都可以更改应用的外观。你可以看到，在应用整个设计中保持颜色选择和配色方案的一致性时，这如何简化了开发过程。\n\
  \n\n\n选择哪种你喜欢的 RGB 颜色表示法都可以。我个人非常偏爱一种漂亮的森林绿，所以我会选择十六进制值`#2F8800`，因此你的`colors.xml`定义将更新，如代码清单\
  \ 8-3 所示。\n\n```\n#2F8800\n#3700B3\n#03DAC5\n\n代码清单 8-3\n通过 colors.xml 集中修改颜色定义\n\
  ```\n\n保存这些更改，然后再次运行你的`MyFirstApp`应用。你应该能看到颜色变化生效了，如图 8-1 所示。\n\n![../images/499629_1_En_8_Chapter/499629_1_En_8_Fig1_HTML.jpg](img/499629_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1\nMyFirstApp 中更改后的颜色\n\n将此与你项目中使用 Android 默认设置运行同一应用时的效果进行比较，如第 3 章的图 3-19\
  \ 所示。颜色差异在你运行的应用中应该很明显，即使它们在本书中以黑白印刷看起来差别不大。\n\n### 增加描述性\n\n在 Android 世界中，`strings.xml`文件就像一个沉睡的巨人。你可以在此定义各种常量，这些常量基本上是很少变化，或者至少在你的应用上下文中初始值为固定值的东西。当你考虑常量时，可以超越我之前给出的幽默示例（为什么要把自己限制在珠穆朗玛峰以米为单位的高度上——为什么不用英尺、杆、弗隆或链呢？！）。更严肃地说，你应该时刻留意（此处非双关）任何在代码中输入字面字符串的情况，并问问自己，将单个条目放入`strings.xml`文件中是否会更好。程序员们几十年来艰难领悟到的教训，归结起来就是一句格言：“将字面字符串从你的代码中抽象出来——你以后会感谢我的。”\n\
  \n现在让我们向`strings.xml`文件添加一个条目，目的是替换你在`MyFirstApp`应用中看到的屏幕文本。要做的工作不仅仅是定义新的引用值，我们将在下一节中处理。现在，请打开`strings.xml`文件，它看起来应该很像代码清单\
  \ 8-4。\n\n```\nMyFirstApp\n\n代码清单 8-4\nMyFirstApp 的默认 strings.xml 文件\n```\n\n添加新的一行，并创建一个带有`name`属性的`<string>`元素条目，该属性值等于一个名为`welcome_text`的文本字符串。`<string>`元素的值应该是你实际希望用户在屏幕上看到的任何文本。你的`strings.xml`文件应该看起来像代码清单\
  \ 8-5 这样。\n\n```\nMyFirstApp\nHello Android, from the strings.xml file!\n\n代码清单\
  \ 8-5\n向 strings.xml 添加新的 <string> 元素\n```\n\n请记住，这是 XML。`name`属性的值可以是任何你喜欢的——`\"\
  welcome_text\"`、`\"look_at_my_great_string\"`、`\"text1\"`等等。只要你在以后正确引用它，你就享受到了可扩展标记语言（XML）带来的“可扩展”好处！让我们在下一节看看如何使用这个新字符串。\n\
  \n### 用 XML 定义 Activity 布局\n\nAndroid 依赖 XML 的、也许是最大也最复杂的领域是视图布局的定义和管理——也就是说，定义和控制屏幕用户界面如何呈现给用户，以及如何通过你的应用以编程方式进行控制。\n\
  \n```\n\n代码清单 8-6\nMyFirstApp 的默认 activity_main.xml 布局文件\n```\n\n我们默认的`MyFirstApp`应用是通过新建项目向导生成的，默认情况下它为你的`MainActivity`活动选择了`\"\
  ConstraintLayout\"`布局。这是你的活动可用的众多布局类型之一，它们都派生自父类`View`。我们将在接下来的几章中深入探讨视图、布局及其众多变体。现在，让我们开始修改你现有的布局。`ConstraintLayout`旨在让你对出现在其中的其他\
  \ UI 元素（称为控件）的大小和位置拥有非常灵活的控制。从代码清单 8-6 可以看出，我们只描述了一个控件，即一个`TextView`。我们将在接下来的两章中添加更多控件。现在，让我们利用`strings.xml`引用值为控件文本提供支持（而不是硬编码值），从而使屏幕问候语更加灵活。\n\
  \n让我们更新布局 XML，将硬编码的字符串`\"Hello Android!\"`替换为对我们在上一节`s`trings.xml`文件中定义的`welcome_text`常量的引用。更改`android:text`属性，使其引用`\"\
  @string/welcome_text\"`，即之前创建的字符串别名的名称。你的布局现在应该看起来像代码清单 8-7 这样，更改部分以粗体显示。\n\n```\n\
  \n代码清单 8-7\n更改 TextView 文本以引用 strings.xml 常量\n```\n\n**注意**\n\n有点烦人的是，虽然引用值 XML\
  \ 文件是以复数形式命名的——`strings.xml`、`colors.xml`和`styles.xml`——但当我们实际引用它们包含的定义时，我们使用的是单数引用——`@string`、`@color`和`@style`。Android\
  \ Studio 会在你输入时通过提示来帮助你。\n\n将布局 XML 更改为引用我们的`strings.xml`中的`welcome_text`值后，是时候再次运行你的应用来看看效果了，如图\
  \ 8-2 所示。\n\n![../images/499629_1_En_8_Chapter/499629_1_En_8_Fig2_HTML.jpg](img/499629_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\nMyFirstApp 中完全通过 XML 定义控制的新欢迎文本\n\n瞧！你仅通过可用的 XML 定义就更改了应用中的颜色和欢迎文本。Android\
  \ 应用从使用 XML 作为定义和控制机制中获益良多，当结合 Java 操作 XML 的能力时，结果可能令人惊叹。但现在，你已经掌握了继续你的 Android\
  \ 之旅所需的基础 XML 知识。\n\n## 本章小结\n\n这一章让你对 XML 以及 Android 如何利用 XML 有了一个旋风般的介绍。XML 是一个如此庞大的主题，一章内容无法全面涵盖，我鼓励你在网上和其他书籍中寻找更多信息。在\
  \ Android 开发领域中，XML 最大的优势之一是既能用它来控制应用逻辑，又能通过应用逻辑来控制它。我们将在接下来的两章中更深入地探讨这一点，届时我们将更深入地进入\
  \ Android 布局和控件的世界！\n\n"
- '# 9. 探索 Android 概念：核心 UI 控件




  '
- '# 在本书的第 1 部分中，您快速浏览了为 Android 应用创建新 Android Studio 项目所需的步骤，并探索了默认 Android 项目各组成部分的结构、文件及其用途。您深入了解了通过
  XML 配置为应用配色方案创建自定义行为的初步步骤，并利用文本资源工具在应用的主活动中个性化欢迎信息。


  在本章中，我们将超越前几章的表层修改，深入探讨所有 Android 应用中都可用且将成为您未来所有 Android 工作所开发和部署的众多活动核心支柱的主要用户界面元素。您将学习如何部署、适配和控制作为
  Android 开发者可用的众多用户界面控件，并开启构建更复杂的 Android 用户体验之旅。


  ## 一切始于 `View`


  在 Android 世界中，您可以在用户界面（即活动）上显示的每个主要元素都继承自一个名为 `View` 的基类。任何派生自 `View` 的控件（无论是文本框、按钮、选择列表还是其他控件），都为您提供了一系列源自此
  `View` 血统的通用行为和优势。这些通用行为和属性包括一致地设置和控制字体、颜色及其他样式特征的方法。


  除了这些通用特性之外，得益于所有控件共有的 `View` 继承关系，还可使用一系列方法和属性。接下来我们将介绍这些继承的特性。


  ## 源自 `View` 的关键方法


  任何派生自 `View` 基类的控件都会继承一系列方法和属性，这些方法和属性有助于管理基本状态管理、与其他控件分组、布局中的父对象和子对象等。您将看到的属性包括：


  1.  `findViewById()`: 通过给定 ID 查找控件，广泛用于将 XML 中定义的控件链接到 Java（以及 Kotlin）中的控制逻辑。

  2.  `getParent()`: 查找父对象，无论是控件还是容器。

  3.  `getRootView()`: 获取活动最初调用 `setContentView()` 所提供的视图树的根节点。

  4.  `setEnabled()`、`isEnabled()`: 设置和检查任何控件的启用状态，例如用于复选框、单选按钮等。

  5.  `isClickable()`: 报告此视图（例如按钮）是否响应点击或按下事件。

  6.  `onClickListener()`: 对于可点击的视图（如按钮），定义一个回调函数，当关联视图被点击时触发。回调函数实现中包含您认为需要的任何逻辑。


  ## 源自 `View` 的关键属性和特性


  除了 `View` 基类的核心方法外，所有控件还继承了一些关键属性。这些属性包括：


  1.  `android:contentDescription`：这是与任何控件关联的文本值，可供无障碍工具使用，当控件的视觉效果对用户帮助甚微或毫无帮助时，此属性尤为重要。

  2.  `android:visibility`：决定控件在首次实例化时是可见还是不可见。

  3.  `android:padding`、`android:paddingLeft`、`android:paddingRight`、`android:paddingTop`、`android:paddingBottom`：在控件各边设置内边距的不同方法。


  **注意** 控件的内边距也可以在运行时使用 `setPadding()` 方法进行设置。


  ## Android 核心 UI 控件简介


  在构建 Android 应用时，您会反复使用一组核心 UI 控件，因为它们提供了计算机、智能手机等用户在过去几十年中已经习以为常的常见用户界面体验。让我们逐一了解这些核心控件的示例。


  ### 用 `TextView` 标记内容


  提供可读的文本标签可能是所有 UI 控件中最基础的，您几乎会在所有已发明的设计工具包中找到标签或静态文本的等价物。Android 提供了 `TextView`
  控件来实现此功能，让您可以在活动 UI 的任何位置放置静态字符串（或至少最初是静态的，因为 `TextView` 的值可以通过编程方式更改）。此字符串的文本完全由您决定，无论是提供相邻控件的描述、标题、评论还是注释——都取决于您。


  Android 提供了两种主要方式来定义 `TextView` 以及所有 UI 控件。第一种方法是通过 Java 代码完全定义 `TextView`，设置诸如屏幕位置、大小、文本内容等属性。任何有开发复杂用户界面经验的人都会告诉您，这是一种费力的工作，容易出错，并且您很快就会看到代码增长到难以管理的地步。但还有更好的方法，而您已经用过它了！


  使用 Android 的另一种 UI 设计方法（通过声明式 XML）要快得多，也容易得多。在第 3 章中，您创建了 `MyFirstApp` 应用，并控制了 `TextView`
  控件中的文本。在第 7 章中，您进一步尝试了控制 `TextView` 字符串的源以及其他一些装饰属性。您可以根据需要随时添加任意数量的 `TextView`
  控件，既可以直接在活动的 XML 定义文件中定义更多的 `<TextView>` 元素，也可以使用图形布局编辑器。


  图形布局编辑器让您可以专注于视觉样式，并在后台自动生成必要的匹配 XML 来描述您的 `TextView` 控件。


  现在让我们来实际操作一下。尽管您的 `MyFirstApp` 应用运行良好，但我们先把它放在一边。在 Android Studio 中，通过 `文件` ➤ `新建...`
  ➤ `新建项目` 菜单选项创建一个新项目。就像我们在第 3 章中所做的那样，为您的项目起一个有意义的名称，例如 `TextViewExample`，并选择“空活动”模板。这将创建您的新项目，并默认在
  `activity_main.xml` 文件中放置一个 `TextView` 控件（就像您创建 `MyFirstApp` 应用时一样）。您的 `activity_main.xml`
  内容应如清单 9-1 所示。


  ```

  清单 9-1

  一个使用“空活动”模板的全新 Android Studio 应用

  ```


  这里我们不编辑 XML，而是通过点击 Android Studio 视图最右侧的 **设计** 按钮来调用图形布局设计器。这将隐藏 XML 内容，并为您呈现如图
  9-1 所示的等效图形布局。


