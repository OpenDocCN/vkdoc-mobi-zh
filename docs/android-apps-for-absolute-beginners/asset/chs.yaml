  \n你需要至少有一个系统映像供你的`AVD`使用，因此如果你只看到带有下载链接的系统映像名称，则应选择下载最新的一个。在图 3-5 所示的示例中，这将是 Android\
  \ `R`系统映像。选择下载将触发许可接受屏幕，如图 3-6 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig6_HTML.jpg](img/499629_1_En_3_Fig6_HTML.jpg)\n\
  \n**图 3-6**  AVD 系统映像的许可接受屏幕示例\n\n我不是律师，当然也不会在电视上扮演律师！更严肃地说，这意味着我无法就许可文本的含义或暗示向你提供建议。如果你有任何疑虑，请寻求法律咨询。但从一个外行的角度来看，用于\
  \ Android 系统映像的开源许可通常无需过分担心。我假设你接受显示的文本，并在单击`Next`按钮后，现在正盯着如图 3-7 所示的 Android 虚拟设备（AVD）配置验证屏幕。\n\
  \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig7_HTML.jpg](img/499629_1_En_3_Fig7_HTML.jpg)\n\
  \n**图 3-7**  Android 虚拟设备（AVD）配置验证屏幕\n\n使用此屏幕确认你对新`AVD`的配置感到满意，并且最重要的是，给它起一个容易记住的名字。你可以随意命名你的`AVD`——无需保留可能继承自某个预配置系统映像的型号或品牌名称，尽管将其作为名字的一部分保留有助于快速提醒你模拟设备的功能。选择一个名称，然后单击`Finish`按钮，进入`AVD\
  \ Manager`主屏幕，如图 3-8 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig8_HTML.jpg](img/499629_1_En_3_Fig8_HTML.jpg)\n\
  \n**图 3-8**  填充后的`AVD Manager`主屏幕\n\n现在你应该能在可用模拟设备列表中看到你新创建的`AVD`。创建第一个 Android\
  \ 虚拟设备就是这样——你现在已经准备好编写自己的应用程序并在其上运行了！\n\n\n\n## 开始创建你的第一个安卓应用！\n\n现在，你已经具备了开始创建第一个安卓应用所需的所有前提条件。虽然还有很多东西要学，但你已经掌握了关键工具，包括\
  \ Android Studio 和一个新创建的、随时可以测试你编写的任何程序的安卓虚拟设备。希望这个准备就绪的状态不会让你感到惊讶。我在第 2 章中概述了 IDE\
  \ 的一些优点，而你现在即将在搭建新应用的框架和结构时直接体验到这一点。\n\n不再卖关子了，我们开始吧。如果你已经按照本章前面的步骤完成了 AVD 的创建，那么你可能已经回到了本章前面图\
  \ 3-1 所示的 Android Studio 主页画面。在该主页画面中，选择屏幕顶部的 `Start a new Android Studio project`\
  \ 选项，稍后你就会看到“创建新项目”向导的第一个界面。\n\n如果因为某种原因，你没有看到那个主页画面，或者重启了 Android Studio 但它没有显示主页向导，那么你可能会看到一个空白的\
  \ Android Studio 界面，或者一个加载了现有项目的界面，如图 3-9 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig9_HTML.jpg](img/499629_1_En_3_Fig9_HTML.jpg)\n\
  \n*图 3-9*  \n主页画面消失后 Android Studio 的显示状态\n\n别慌！你也可以从这里启动一个新项目，方法是打开 `File` 菜单，选择\
  \ `New` ➤ `New Project`。这同样会启动“创建新项目”向导。无论你走哪条路，很快就会看到如图 3-10 所示的向导界面。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig10_HTML.jpg](img/499629_1_En_3_Fig10_HTML.jpg)\n\
  \n*图 3-10*  \nAndroid Studio 中的“创建新项目”向导\n\n向导的第一个界面已经提示你要为你想要构建的应用类型做出一些选择。在屏幕顶部，你会看到设备类别，例如“手机和平板”、“Wear\
  \ OS”、“电视”等等。目前，我们将坚持使用“手机和平板”向导选项。看着“手机和平板”下方显示的图标，你可能正在挠头，对 `activity`、`fragment`\
  \ 等术语的含义感到困惑。别担心。你很快就会掌握它们。在此阶段，你可以将这个界面理解为 Android Studio 在问你，对于你的新应用，你希望获得多少脚手架搭建工作，以及你希望它为你预先准备好哪些现成的部件。例如，如果你预计要开发一个依赖地图和导航功能的应用，“Google\
  \ Maps Activity”模板会为开发者添加一系列现成的地图、GPS 和位置支持选项。该界面上的其他选项也会相应地引入其他好东西，例如用于 Google\
  \ AdMob 广告 Activity 的 Ad 库支持。\n\n我们将从一个非常朴素、标准的安卓应用开始，创建这个简单应用的各种变体，以展示我们在后续章节中讨论的每个功能。所以现在，你可以选择“Empty\
  \ Activity”选项。不要让“Empty”这个词欺骗了你，因为“Empty Activity”选项仍然会部署你的应用所需的大部分样板代码和基本项目结构。选择“Empty\
  \ Activity”后，点击“Next”按钮，你应该会看到“配置你的项目”界面，如图 3-11 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig11_HTML.jpg](img/499629_1_En_3_Fig11_HTML.jpg)\n\
  \n*图 3-11*  \nAndroid Studio 中的“配置你的项目”界面\n\n此界面显示的选项是你将自有代码和特色添加到应用之前的最后一步。对于你当前的\
  \ `MyFirstApp` 项目，你需要指定以下设置：\n\n- **项目名**: 这应该是你的应用的一个有意义的名称。它将是运行应用时屏幕上显示的标题，是安卓启动器屏幕上应用图标下方显示的说明文字，如果你将来在\
  \ Google Play 商店或其他地方发布这个应用，它也将是那里显示的名称。为此，请输入 `MyFirstApp` 作为名称。\n\n- **包名**: 在一个有成千上万名开发者、为安卓创建了成千上万个应用的世界里，如何确保没有两个应用在命名上产生冲突？安卓并没有强制要求使用唯一名称（尽管像\
  \ Google Play 这样的地方在这方面确实有一些限制），而是利用了源自 Java 标准的包名这一基本机制。我们将在第 7 章详细讨论 Java 包的命名，所以现在你可以使用一个来自我个人域名的包名\
  \ – `org.beginningandroid.myfirstapp`。\n\n- **保存位置**: 保存位置是指磁盘上用于存储此应用整个代码层级结构的文件夹。这包括菜单子文件夹，其中包含源码、配置文件、图片、视频等内容，具体取决于我们将这个应用做得有多复杂。一开始，一个新项目占用的空间将低于\
  \ 1 MB。但这可能会迅速增长，所以最好选择一个你知道有充足空闲空间的磁盘位置。如果你对默认位置满意，可以接受它——即你操作系统用户主目录下的一个名为 `AndroidStudioProject/MyFirstApp`\
  \ 的目录。\n\n- **语言**: 打开你看到的选取列表，会出现两个选项：Kotlin 或 Java。Kotlin 是安卓支持的用于编写应用的语言家族中较新的一员。而\
  \ Java 是第一个，并且到目前为止，仍是安卓开发中使用最广泛、最流行的语言。为 MyFirstApp 选择 Java 作为语言。\n\n- **最低 SDK**:\
  \ 这正是我们在第 2 章和本章中讨论的安卓版本、安卓 Studio 版本和安卓 SDK 版本相关内容开始发挥作用的地方。你在此处的选择将决定此应用使用哪个版本的\
  \ SDK，进而在很大程度上决定它在安卓设备发展历史上与哪些设备兼容。较新的安卓 SDK 版本提供对较新功能的支持，而较旧的版本则更有可能在较旧（因此数量也更多）的设备上得到支持。你会在你的选择旁边看到附加文本，该文本显示了全球范围内有多少比例的在用激活谷歌设备会支持你所选的\
  \ SDK 版本。在新功能和广泛支持之间，没有完美的平衡方案。目前，我们的初始应用不会使用安卓 SDK 最新版本中的任何前沿功能，因此你可以使用默认选项，选择\
  \ API 16，该版本最初是与几年前发布的 Android 4.1 Jelly Bean 一同推出的。如果你愿意，你也可以滚动列表选择其他 SDK 版本。如果你选择的\
  \ SDK 版本当前没有安装在你的计算机上，它将在完成此初始应用设置的步骤中被下载——请务必考虑到每个 SDK 版本会占用 100 多 MB 的磁盘空间。\n\n\
  \n\n### 使用旧版 Android 支持库\n\n多年来，Google 尝试了多种方法来应对活跃 Android 设备中存在的版本碎片化问题。其中一种方法（至今仍在使用）是使用一个不绑定于特定\
  \ SDK 版本的额外支持库，并让应用程序利用这个支持库。其精妙之处在于，与任何特定设备的 Android 系统安装相比，Google 能够更频繁地推送支持库的更新。在接下来的章节中，当我们讨论\
  \ `androidx` 和 `Jetpack` 时，将会对此进行更多介绍。现在，你可以将此设置保留为默认的未选中状态，这意味着我们不会引入对这些库的支持。\n\
  \n现在，距离构建一个可运行的 Android 应用程序仅一步之遥。点击 **Finish** 按钮，Android Studio 将启动工作，为你的新 Android\
  \ 应用程序及其项目文件夹生成结构和脚手架。稍等片刻，你最终应该会看到完整的项目以及 Android Studio 的完整开发者界面，如图 3-12 所示。\n\
  \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig12_HTML.jpg](img/499629_1_En_3_Fig12_HTML.jpg)\n\
  \n*图 3-12*  \nAndroid Studio 显示打开 `MyFirstApp` 项目以供编辑\n\n### 编写你的第一段代码\n\n如果你查看图\
  \ 3-12 所示的新项目布局，你会看到一个包含各种名称（如 `manifests`、`java`、`res` 等）的文件夹/目录层级结构。我们将在下一章中全面探讨项目布局、你所看到的目录、填充其中的起始文件以及你需要构建的各个部分。\n\
  \n现在，为了让你能够构建一个带有个人印记的可运行应用程序，我们将跳过对这些内容的解释，直接开始编辑你的第一个应用程序组件。使用你在 Android Studio\
  \ 布局左侧看到的 **Project** 层级视图，点击展开 `res` 文件夹，然后是 `layout` 子文件夹。你应该会看到一个名为 `activity_main.xml`\
  \ 的文件条目（实际上，这些**就是**文件！）。双击 `activity_main.xml` 文件，它将在 Android Studio 的编辑器视图中打开，如图\
  \ 3-13 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig13_HTML.jpg](img/499629_1_En_3_Fig13_HTML.jpg)\n\
  \n*图 3-13*  \n在 Android Studio 中打开你的第一个源文件\n\n查看代码截图很繁琐，所以我们直接来看 `activity_main.xml`\
  \ 文件的内容。你的文件内容应该类似于代码清单 3-1。\n\n```\n代码清单 3-1\n新 Android Studio 项目中 activity_main.xml\
  \ 文件的内容\n```\n\n这个文件中有几个部分将来会引起我们的兴趣，但现在我们只关注代码中加粗显示的那一部分。你会注意到，在文件中间附近有一行：\n\n\
  ```\nandroid:text=\"Hello World!\"\n```\n\n继续编辑双引号内的字符串，将 `\"Hello World!\"` 修改为你喜欢的文本，比如\
  \ `\"Hello Android!\"` 等。编辑完这个文件后，保存你的更改。你已经完成了对 Android 应用程序的第一次自定义编辑！\n\n### 准备运行你的应用程序\n\
  \n现在，你可以让 Android Studio 在本章前面创建的 AVD 模拟器中运行你的新应用程序了。为了让 Android Studio 做到这一点，它需要知道当你要求它运行应用程序时的具体偏好。例如，你是只想让它正常运行以便与之交互，还是希望它以调试模式或其他方式运行，从而让你仔细检查代码中发生的事情、应用程序与\
  \ Android 宿主机、你可能调用的其他 API 或诸如云端 API 等外部服务之间的交互？\n\nAndroid Studio 通过所谓的“运行配置”来控制这些不同的应用程序运行方式。这些配置是预设的指令，用于精确指定运行应用程序时“运行”的具体含义。\n\
  \n你可以立即尝试运行你的应用程序，从而触发 Android Studio 引导你设置第一个运行配置。打开 `Run` 菜单，选择 `Run...` 选项。由于尚未存在任何运行配置，Android\
  \ Studio 将提示你编辑一个配置，如图 3-14 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig14_HTML.jpg](img/499629_1_En_3_Fig14_HTML.jpg)\n\
  \n*图 3-14*  \n提示你编辑第一个运行配置\n\n**注意：**  \n你总是可以通过从 `Run` 菜单中选择 **Edit Configurations…**\
  \ 选项，直接编辑运行配置，而无需强制运行应用程序。\n\n无论你通过哪种方式触发创建第一个运行配置，都会看到 **Run/Debug Configurations**\
  \ 屏幕显示出来。该屏幕上的文字会提示你点击“`+`”按钮来添加新配置，请照做。你将看到如图 3-15 所示的选项列表。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig15_HTML.jpg](img/499629_1_En_3_Fig15_HTML.jpg)\n\
  \n*图 3-15*  \n选择一个新的基础运行配置\n\n在显示的列表顶部选择 **Android App** 选项，然后你将看到如图 3-16 所示的详细配置屏幕。\n\
  \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig16_HTML.jpg](img/499629_1_En_3_Fig16_HTML.jpg)\n\
  \n*图 3-16*  \n新运行配置的详细设置\n\n你需要进行两项设置。第一项是为你的运行配置提供一个易于记忆的名称。我建议你使用名称 **Run Config\
  \ 1**。接下来，你需要指定运行配置在运行你的应用程序时应启动哪个代码模块。列表中唯一的选项是 `app`，幸运的是，这正是你想要的选项。你可以在图 3-16\
  \ 中看到这两项设置。\n\n点击 **Apply** 和 **OK** 按钮保存你的配置。\n\n\n\n## 安装（附加）SDK 软件包\n\n根据你在本章前面选择的应用最低\
  \ SDK 设置，以及首次安装 Android Studio 时选择的选项，你的计算机上可能未安装 Android Studio 构建应用所需的相应 SDK 包。你可以轻松发现这一点，因为\
  \ Android Studio 的默认视图会在屏幕左下角显示当前的构建状态。\n\n如果你查看“构建：同步”区域并看到如下错误或警告，则可能需要下载与你项目所选版本匹配的\
  \ SDK 包：\n\n```\nLicense for package Android SDK Platform 29 not accepted\n```\n\
  \n或\n\n```\nModule 'app': platform 'android-29' not found\n```\n\n警告或错误中提到的版本号可能与你的安装环境不同。无论版本如何，只需调用\
  \ SDK 管理器功能（IDE 提供的另一项集成功能）即可轻松解决。在 Android Studio 的“工具”菜单中，选择 **SDK 管理器** 选项，你应该会看到如图\
  \ 3-17 所示的 SDK 管理器界面。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig17_HTML.jpg](img/499629_1_En_3_Fig17_HTML.jpg)\n\
  \n图 3-17\n\nAndroid SDK 管理器\n\n要添加项目所需的 SDK，只需勾选相应版本旁的复选框——在我的例子中是“Android 10.0\
  \ (Q)”，它对应于 API 级别 29，换句话说，就是 Android SDK 的 29 版本。点击“应用”按钮，SDK 管理器将触发下载此版本的 SDK。如果你稍作思考，就会意识到随着你构建越来越多的应用，并可能为它们选择不同的目标\
  \ SDK 版本，你的机器上最终可能会安装多个不同版本的 Android SDK，这些版本加起来会占用相当可观的磁盘空间。我们将在第 6 章深入探讨你的整体开发者系统设置时，重新讨论这个话题。\n\
  \n一旦所需 Android SDK 版本的下载完成，你应该会看到如图 3-18 所示的状态。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig18_HTML.jpg](img/499629_1_En_3_Fig18_HTML.jpg)\n\
  \n图 3-18\n\nAndroid SDK 管理器提示新 SDK 版本下载并安装成功\n\n此时，你需要让 Android Studio 刷新集成的 Gradle\
  \ 构建工具的配置，以便它意识到新 SDK 已就位。Android Studio 可以自动完成所有必要的步骤——所以如果你对 Gradle 作为构建工具一无所知，此刻也不必惊慌。只需打开\
  \ `File` 菜单，选择 `Sync Project with Gradle Files` 选项。\n\n当此同步活动完成时，在屏幕左下角的“构建”窗口中，你应该会看到之前的警告和错误已消失，唯一显示的消息应该是\
  \ `MyFirstApp successful at` *某个日期和时间*。\n\n### 运行你的应用\n\n在 Android Studio 完成符合你应用需求的设置，且\
  \ Gradle 同步完成并准备好构建你的应用后，你的运行配置现在应该能够实际运行你的新应用了。继续操作，从“运行”菜单中选择“运行”，或直接选择 `Run 'Run\
  \ Config 1'` 以跳过运行配置选择步骤。\n\n一系列操作现在会自动执行，但这可能需要一些时间——根据你计算机的性能，最多可能需要几分钟。首先，将调用\
  \ Gradle 来构建你的应用。我们将在后续章节中更详细地介绍此过程，但现在你需要知道的是，Gradle 会整合你编写的所有代码、应用引用的库、相关的 Android\
  \ SDK 以及其他基础设施，并生成一个已准备好部署为你的应用的软件包。这被称为 Android 包，即 APK。\n\n接下来，Android Studio\
  \ 会调用你的 AVD，并在模拟器启动所需的时间后，将 Gradle 构建的 APK 复制过去。根据你的运行配置，Android Studio 知道你想要运行应用模块，从而有效触发你的新\
  \ MyFirstApp 应用在 AVD 中运行，就像你在 Android 启动器窗口中点击了它的图标一样。\n\n你的应用将运行，并且你那些不朽的文字“Hello\
  \ Android！”（或你选择的任何内容）应该会出现在标题为 MyFirstApp 的应用屏幕内，正如图 3-19 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig19_HTML.jpg](img/499629_1_En_3_Fig19_HTML.jpg)\n\
  \n图 3-19\n\n在你的 AVD 中运行着的 MyFirstApp Android 应用\n\n就是这样！你已经编写并运行了你的第一个 Android 应用。做得好。深吸一口气，因为在第\
  \ 4 章中，我们将深入幕后，详细检查 Android Studio 刚刚为你构建的一切。\n\n## 探索你的第一个项目\n\n在第 3 章中，我向你介绍了如何设置编写并运行你的第一个\
  \ Android 应用在 AVD 上所需的一切，目的是让你尽快沉浸于 Android Studio、模拟器以及你的第一段编码中。我们很快取得了成果！但当你快速浏览时，几乎肯定会涌现出一大堆未解答的问题。在本章中，我们将开始更深入地探讨许多主题，首先从你的新\
  \ Android 项目的结构和特性入手。这应该会开始回答这些问题并构建你的知识体系。\n\n### 查看整个 Android 项目结构\n\n要熟悉 Android\
  \ 项目各个部分的结构和用途，从三万英尺（或一万米，对于公制思维的人来说）的高度来观察会有所帮助。回顾上一章中项目的整体布局，发现它出奇地庞大。虽然你只编辑了一个文件，但新建项目向导为你创建了许多其他文件，并且在你创建项目时，像\
  \ Java 库、Android SDK 等其他文件也被复制或添加了引用。\n\n要查看这个完整视图，请使用 Android Studio 窗口左侧的窗格（称为项目浏览器视图）来展开\
  \ `app` 文件夹；然后展开其下的文件夹，如 `manifests`、`java` 等；以及从顶层向下的所有其他文件夹。最终你将得到一个类似于图 4-1 所示的整个项目视图（请注意，为了节省空间，我并排显示了长项目浏览器的连续视图）。\n\
  \n![../images/499629_1_En_4_Chapter/499629_1_En_4_Fig1_HTML.jpg](img/499629_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\n项目浏览器中项目的逻辑 Android 视图\n\n你看到的默认视图称为 Android 视图，旨在简化项目所有组成部分的显示方式。这种简化的目标是让你能够专注于你（开发者）编写或编辑的部分，并将大部分其他支持性文件放在次要位置。\n\
  \n从这个全项目 Android 视图中，你可以看到项目被分解为五个主要文件组，它们代表了项目的不同部分。\n\n\n\n#### 使用清单文件\n\n在项目资源管理器的\
  \ Android 视图中，显示的第一组文件就是你的清单文件。对于像 `MyFirstApp` 这样的新项目，只会有一个你需要关注的清单文件，即名为 `AndroidManifest.xml`\
  \ 的文件。\n\n这就是你的 Android 清单文件，它几乎扮演着 Android 应用总控文件的角色。在 Android 清单文件中，你可以控制应用的许多主要参数和行为，包括声明应用运行所需权限、它可能交互的服务、构成应用的\
  \ Activity，以及应用需要和支持的 Android SDK 版本。\n\n我们将在本章稍后部分更深入地探讨其中一些核心概念，包括定义 Activity\
  \ 和服务在 Android 语境下的含义。现在，让我们先查看一下 `AndroidManifest.xml` 文件的内容，如代码清单 4-1 所示。\n\n\
  ```\n代码清单 4-1\n你的新 AndroidManifest.xml 文件的内容\n```\n\n正如你可能从文件名中猜到的那样，其内容是 XML 格式的。对于初次接触\
  \ XML 的读者，第 8 章提供了关于 Android 开发中 XML 的完整介绍。你可以先跳到那一章了解相关内容，待你熟悉了 XML 的基础知识后再回到这里。\n\
  \nAndroid 使用根元素 `<manifest>` 作为 XML 文档的起始，然后引入了两个关键属性：命名空间声明和包声明。就命名空间而言，Android\
  \ 的惯例是仅在属性层面使用它们，而不是在元素层面也使用。包名 `org.beginningandroid.myfirstapp` 应该看起来很熟悉，因为这是我们在第\
  \ 3 章的项目设置向导中提供的包名。除了提供这个至关重要的映射以确保应用完全限定包名的唯一性外，这种技术还允许我们将来在引用应用自身的各个方面时使用简写形式。\n\
  \n你可以在清单文件的稍后部分看到这一点，当引入第一个 `<activity>` 元素时，其形式为 `<activity android:name=\".MainActivity\"\
  >`。在这里，开头的点是 `<manifest>` 包属性中引用的完整包名的简写。实际上，这意味着内部引用的名称会更短。因此在本例中，使用 `.MainActivity`\
  \ 而不是 `org.beginningandroid.myfirstapp.MainActivity`。我相信你知道我更愿意输入哪个。\n\n清单文件还包含其他关键特性。例如，`android:icon`\
  \ 和 `android:roundIcon` 属性引用了两个资源文件，它们分别为你的应用提供了在 Android 设备启动器屏幕和小部件屏幕上的方形和圆形图标版本。`android:label`\
  \ 属性保存着你应用的名称。\n\n另一个重要的条目是前面提到的 `<activity android:name=\".MainActivity\">`。这个条目，包括其子元素\
  \ `<intent-filter>`，向 Android 指明了当应用启动并且触发了关键 Intent `android.intent.action.MAIN`\
  \ 时，应该响应哪个 Activity。我们将在本章稍后部分详细介绍这些概念，但现在你可以将其视为 Android 标记应用启动时首先向用户显示内容的方式。\n\
  \n#### 与 Java 互动\n\nAndroid 项目资源管理器视图中的第二个和第三个主要区域是你的 Java 源文件。这些是写入 Java 代码的文本文件，用于让你的应用活起来，并执行你为应用设定的操作、功能和特性。\n\
  \n你会看到两个顶层文件夹，一个名为 `Java`，另一个名为 `Java (generated)`。事实上，在这个阶段，这两个区域中的所有文件都是为你生成的，但通常在你开发应用时，你会更改\
  \ `Java` 树中的文件、添加新文件等，而让 Android Studio 及其集成工具自动处理 `Java (generated)` 文件。\n\n现在特别注意其中一个文件，那就是\
  \ `Java` ➤ `org.beginningandroid.myfirstapp` 文件夹下的 `MainActivity` 文件。磁盘上的文件实际名为\
  \ `MainActivity.java`，而项目资源管理器中的 Android 视图隐藏了文件扩展名。根据前面 Android 清单文件中提到的配置，这个 `MainActivity`\
  \ 文件是应用启动时将运行的代码。\n\n我们将在本章稍后部分以及本书后续许多章节中深入探讨 Activity 的含义。\n\n#### 善用资源\n\n新项目中文件的第四个主要区域是资源文件，位于\
  \ `res` 文件夹及其子文件夹中。最初生成了相当多的项目供你使用，它们属于不同的资源类别。\n\n##### 可绘制对象\n\n可绘制对象是 Android\
  \ 将作为应用的一部分在屏幕上绘制或渲染的内容。这既包括普通图像，如插画、图表和其他静态图像，也包括 Android 根据给出的指令在运行时需要生成的图像。\n\
  \n第一种可绘制对象以你熟悉的典型图像文件格式表示，例如 GIF、JPEG 和 PNG 文件。Android 具有缩放图像以适配各种密度屏幕/显示器的机制，也允许你存储同一图像的不同分辨率版本以避免缩放。我们将在第\
  \ 14 章深入探讨 Android 应用的图像、照片和插画创作及技术世界。\n\nAndroid 支持的第二种可绘制对象是它在运行时根据 XML 文件中提供的规范创建的矢量图像。在你的新项目中可以看到两个提供矢量图形指令的\
  \ XML 文件示例：`ic_launcher_background.xml` 和 `ic_launcher_foreground.xml`。\n\n#####\
  \ 布局\n\n在第 9 章和第 10 章中，我们将详细探讨布局和设计应用的 UI，涵盖一系列选项和样式。你在第 3 章创建新项目时，应该记得为项目选择了“Empty\
  \ Activity”选项。Android Studio 利用这个选择为你设置了一个默认布局，该布局出现在 `layout` 子文件夹下的 `activity_main.xml`\
  \ 文件中。\n\n同样，这是一个 XML 文件，Android 广泛使用 XML 来定义 Activity 的初始布局和行为特性。如果你将 Activity\
  \ 视为 Android 应用中用户使用的屏幕或窗口，那么 XML 布局就提供了如何创建和渲染界面的描述。这个 `activity_main.xml` 布局被你的\
  \ `MainActivity` Java 代码用来在屏幕上绘制 Activity。这个过程在 Android 领域被称为“填充”，它适用于布局整个 Activity\
  \ 界面的过程，也适用于其中的任何子集，例如创建菜单或在一个布局内动态添加另一个布局。随着你的应用不断增长，此文件夹中的 Activity 布局 XML 文件数量也会增加。\n\
  \n\n\n#### Mipmaps\n\n你可以将 `mipmap` 文件夹视为 `drawable` 文件夹的一种特殊情况。`drawable` 用于存放任何用途的图片或图形，而\
  \ `mipmap` 条目专门用于你的应用程序以及 Android 设备启动器屏幕所使用的图标文件。`ic_launcher` 文件夹存放图标方形版本，`ic_launcher_round`\
  \ 存放相同图标的圆角版本。每个文件的多个实例以不同分辨率（显示密度）存储，Android 会根据设备的显示特性以及应用程序或设备可能使用的任何显式配置覆盖，自动决定使用哪个密度版本。\n\
  \n我们将在后续章节中进一步讨论显示密度及其影响。\n\n#### 从 Values 中寻找价值\n\n在 `values` 文件夹中，你会找到专门存放字符串、尺寸、样式和其他参考信息数据的文件。这种方法体现了你在几乎所有编程语言和环境中都能找到的简单抽象技术。与其在应用程序代码和配置文件中到处散布可能被多次重复使用的硬编码值，不如使用抽象来引用远离代码的值的单一定义，这样可以使代码更简洁、更不易出错。这在许多方面都有帮助，例如为创建和使用适用于多种屏幕尺寸和分辨率的资源提供了一种良好管理的机制。\n\
  \n在你当前的项目中，可以看到应用程序名称存在于 `strings.xml` 文件中。我们可以引用 `strings.xml` 文件中的这个条目，而不是将 `\"\
  MyFirstApp\"` 作为字面字符串嵌入到项目中所有需要它的地方。如果我们将来需要更改这个值，只需在一个地方进行修改，并且可以确保所有引用都会自动且正确地更新。虽然我们自己不会这样做，但这种方法在应用程序的国际化和本地化（翻译成其他语言）方面具有切实的好处。\n\
  \n#### 使用 Gradle 文件构建一切\n\n到目前为止，即使是你的第一个 Android 应用程序，它所包含的各种类型的文件数量也已经增长到了两位数。将这些文件整合在一起，创建一个最终可用的\
  \ Android 应用程序，是构建系统的工作，而 Android Studio 默认依赖一个名为 Gradle 的构建工具集。\n\n`Gradle Scripts`\
  \ 文件夹展示了用于从各个组件构建完整应用程序所需的各种脚本。目前最值得注意的两个文件是同名的 `build.gradle` 文件。你会注意到第一个文件被标记为项目级别的——在本例中为\
  \ `Project: MyFirstApp`。第二个文件被标记为 `Module: app`。\n\n你可能会问：“为什么会有两个 `build.gradle`\
  \ 文件？”长话短说，实际上你可能有超过两个这样的文件。你现在看到的是所有 Android 项目都有的一个项目级别的 `build.gradle` 文件。然后，你的项目定义的每个模块都有一个额外的\
  \ `build.gradle` 文件，允许每个模块处理任何模块特定的构建活动和参数。由于你的项目只定义了一个 `\"app\"` 模块，所以你只看到了另一个\
  \ `build.gradle` 文件，总共两个。随着我们本书的深入，我们将会使用包含多个模块的项目示例，届时你会在相关项目中看到更多的 `build.gradle`\
  \ 文件。\n\n目前，项目级别的 `build.gradle` 文件最值得关注，你可以在清单 4-2 中查看其内容。\n\n```\napply plugin:\
  \ 'com.android.application'\nandroid {\ncompileSdkVersion 29\nbuildToolsVersion\
  \ \"30.0.0\"\ndefaultConfig {\napplicationId \"org.beginningandroid.myfirstapp\"\
  \nminSdkVersion 16\ntargetSdkVersion 29\nversionCode 1\nversionName \"1.0\"\ntestInstrumentationRunner\
  \ \"androidx.test.runner.AndroidJUnitRunner\"\n}\nbuildTypes {\nrelease {\nminifyEnabled\
  \ false\nproguardFiles getDefaultProguardFile('proguard-android-optimize.txt'),\
  \ 'proguard-rules.pro'\n}\n}\n}\ndependencies {\nimplementation fileTree(dir: \"\
  libs\", include: [\"*.jar\"])\nimplementation 'androidx.appcompat:appcompat:1.1.0'\n\
  implementation 'androidx.constraintlayout:constraintlayout:1.1.3'\ntestImplementation\
  \ 'junit:junit:4.12'\nandroidTestImplementation 'androidx.test.ext:junit:1.1.1'\n\
  androidTestImplementation 'androidx.test.espresso:espresso-core:3.2.0'\n}\n```\n\
  清单 4-2 项目级别的 `build.gradle` 文件\n\n你拥有各种配置设置来控制应用程序的构建方式，这些设置主要分为几个关键领域。它们是 SDK 版本管理和应用程序版本管理、构建目标的应用类型，以及作为项目基础所需的依赖项、插件和库的包含。\n\
  \n##### 理解 SDK 版本参数\n\n你会注意到有几个参数提到了 SDK 版本，包括 `compileSdkVersion`、`minSdkVersion`\
  \ 和 `targetSdkVersion`。它们服务于不同但互补的目的：\n\n1.  `compileSdkVersion`：指示 Android Studio\
  \ 在你实际编译和构建应用程序时使用哪个版本的 SDK（从你安装的多个可能版本中选取）。通常你会选择你拥有的最新 Android SDK 版本。\n2.  `minSdkVersion`：为应用程序中原生\
  \ API 功能的使用设置门槛，并由此决定哪些版本的 Android 和 Android SDK 能原生支持你的应用程序。这进而设定了可以使用你应用程序的最旧设备。较新\
  \ API 级别引入的功能将尽可能通过支持库或 Android Jetpack（稍后讨论）来处理。\n3.  `targetSdkVersion`：控制你的应用程序将尝试使用的最新\
  \ API 功能，即使 `compileSdkVersion` 是比它更新的版本也是如此。这意味着你可以受益于更新 SDK 在编译时提供的效率，但不必被迫接受应用程序行为的重大改变，直到你显式地提升\
  \ `targetSdkVersion`。\n\n##### 理解应用程序版本管理\n\n在发布 Android 应用程序时，与几乎所有其他软件一样，版本管理的概念用于标识修复错误、添加新功能、改进现有行为等的后续版本。\n\
  \nAndroid 使用你在 `build.gradle` 文件中找到的两个参数。最重要的是 `versionCode` 参数，它传统上是跟踪应用程序的特定构建/发布版本号的参数。`versionCode`\
  \ 参数是一个整数，当你发布新版本时，它只应递增。\n\n**注意**\n\n在内部，从 SDK 版本 28 开始，Android 还提供了更新的 `versionCodeMajor`\
  \ 参数。这是一个 `long` 值，而不是 `integer`，因此可以保存更大的值。目前，只有通过在 Android 清单 XML 文件中加入 `versionCodeMajor=\"\
  n\"` 表示法才能成功设置此值。Gradle 构建文件目前不支持此参数。\n\nAndroid 也提供了一种机制来向用户显示某种有意义的、人类可读的版本信息，这个信息源自\
  \ `versionName` 字符串值。如果你想尝试向用户传达关于主要版本和次要版本之类的信息（这是软件开发中的传统习惯，尽管并非必需），这对你作为开发者会有所帮助。\n\
  \n\n\n##### 包含向前与向后版本支持的库\n\n目前需要关注的 Gradle 构建文件的最后一个方面是依赖项部分。现阶段我不会深入介绍每个被声明的依赖项，因为我们会在后续关于测试、设备/版本兼容性等章节中，在讨论具体细节时再逐一回顾它们。我要强调的一个共同点是许多依赖项的命名空间。你会注意到主要的组件名是\
  \ `androidx`。`androidx` 指的是 Android Jetpack，这是 Android 近期的一次更新和重构，它让你作为开发者能够面向众多不同版本的\
  \ SDK 进行开发，而无需预先了解它们——实际上，这使你的应用程序能够在一定程度上抵御后续 SDK 版本中引入的某些变化，同时还能让你利用当代 SDK 的功能构建应用，并让\
  \ Android 和 Jetpack 来处理在运行不直接支持你的 SDK 版本的旧版 Android 设备上，如何模拟这些新行为。Jetpack 还通过减少样板代码、帮助你遵循\
  \ Android 开发者社区长期积累的良好实践，来降低用 Java 编写软件时的冗余度。\n\nJetpack 正在取代旧的方法，即 Android 支持库（Support\
  \ Libraries），但在许多参考资料和讨论中你仍会看到支持库的身影，并且这两者在未来一段时间内将并存。\n\n## 解释 Android 应用的关键逻辑构建块\n\
  \n现在你对 Android Studio 中的项目结构和布局有了一定的了解。但在本章的多个地方，我都提到了 Android 应用程序的一些基本逻辑构建块，例如\
  \ Activity 和服务。现在是时候深入理解这些构建块是什么，以及它们如何协同工作，让你的应用程序变得生动起来。\n\n### Activity（活动）\n\
  \n如果你使用过任何现有的 Android 应用程序，你会体验到它具备大多数带有用户界面的软件所共有的一些特点。与其他拥有 UI 的软件一样，Android 使用了“屏幕”或“视图”的概念，让用户与你的程序进行实际交互。Android\
  \ 将这些称为 Activity。无论你是想让用户阅读文本、观看视频、输入数据、拨打电话、玩游戏还是做其他事情，你的用户都将通过与你设计的一个或多个 Activity\
  \ 屏幕或布局进行交互来完成操作。\n\nActivity 是 Android 开发中最简单、计算成本最低的部分之一，你应该在应用程序中慷慨地创建和使用它们。这不仅有助于用户从你的应用中获得极佳的体验，而且\
  \ Android 操作系统本身的设计就考虑到了 Activity 的广泛使用，并提供了大量帮助来管理它们。\n\n### Intent（意图）\n\nIntent\
  \ 是 Android 的内部消息系统，允许在应用程序之间以及在 Android 环境之间传递信息片段。通过这种方式，你的应用程序可以触发操作、与 Android\
  \ 及其他应用程序共享数据，同时也能监听发生的事件并在适当时采取行动。\n\nAndroid 操作系统已经提供了非常广泛的 Intent，供你的应用程序与之交互。作为开发者，你还可以根据自己的用途定义和开发自己的\
  \ Intent。\n\n### Service（服务）\n\n服务在计算机领域是一个常见概念，虽然在 Android 中处理服务时有一些细微差别，但许多通用概念仍然适用。服务通常是没有用户界面、在后台运行的应用程序。服务提供了一系列通常被多个应用程序需要的特性、能力或行为。服务通常是长时间运行的，在后台默默运行，按需为你的应用程序和其他程序提供支持。\n\
  \n### Content Provider（内容提供器）\n\n你的应用程序可能需要使用许多自己无法控制的数据类型和数据源。许多其他应用程序也有类似的数据需求，因此\
  \ Android 内置了内容提供器（Content Providers）的概念，这是一种抽象化数据集和数据源的方式。这种抽象化试图简化与各种不同数据源（包括文件、数据库、流协议和其他数据访问方式）的交互，为开发者带来逻辑上的一致性。你无需为每一组或每一种你想使用的数据学习不同的自定义数据操作方法，只需学习一次内容提供器的方法，就可以在众多不同的内容提供器数据源上重复使用它。\n\
  \n你还可以构建并共享自己的内容提供器，以方便与其他应用程序进行数据共享和交互。\n\n## 总结\n\n现在你已经了解了典型的 Android 开发项目是如何构建的，以及\
  \ Android 应用程序的一些主要构建块如何在逻辑上以及在构建应用过程中被整合在一起，以创建一个完整的应用程序。我们将继续基于本章描述的这些部件进行扩展，深入探索其中的许多部件，以便你理解越来越复杂的应用程序是如何构建的。\n\
  \n"
- "# 5. 深入理解 Android Studio\n\n长期使用像 Android Studio 这样的 IDE 的用户，通常会对他们所选择的 IDE 的重要性形成非常强烈且固执的看法——不仅关乎他们的生产力，也关乎他们编写应用程序的愉悦感。在本章中，我的目标是揭示并探索\
  \ Android Studio 的一些关键特性，这些特性将使你在构建 Android 应用程序时效率更高、心情更愉快。\n\nAndroid Studio 本身就是一个庞大的话题。市面上有整本书专门介绍\
  \ Android Studio 本身以及如何作为 IDE 最大限度地发挥其作用。来自本书出版商 Apress 的一些优秀例子包括 *《Android Studio\
  \ IDE 快速参考》*（作者 Ted Hagos，ISBN 978-1-4842-4953-6）和 *《学习 Android Studio》* 系列（同样由\
  \ Ted Hagos 编写）。我们在本书中没有余裕将所有剩余章节都奉献给 Android Studio，但如果本章能让你对强大 IDE 所提供的可能性感到兴奋，你就知道接下来该去哪里了。现在，让我们深入探讨一些你现在就应该了解的\
  \ Android Studio 的关键部分。\n\n## 从项目资源管理器开始\n\n回到第 4 章，我们简要介绍了项目资源管理器及其部分功能，展示了 Android\
  \ 视角和项目文件视角。我们简单探讨了项目的这两种视图，但没有详述项目资源管理器的其他视图选项。这让我们不禁好奇，所有这些其他视图是做什么用的？\n\n很高兴你问起。总的来说，项目资源管理器的其他视图选项旨在满足两个相互兼容的需求。首先，这些视图为你提供了不同的方式来查看你的项目，通常着重关注某一特定领域，以便你能将时间花在完成工作上，而不是与\
  \ Android Studio 的布局作斗争。其次，这些视图也支持你作为开发者的个人偏好和习惯，以及你更喜欢的工作方式。\n\n\n\n### 轻松切换项目资源管理器视图\n\
  \n让我们看看其中一些视图的实际效果，你可以探索所有其他视图，找到自己喜欢的感觉。图 5-1 展示了我们将 `MyFirstApp` 项目切换为使用`项目源文件`视图后的样子（同样，为避免图片过长，我将两个屏幕截图并排放置）。\n\
  \n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig1_HTML.jpg](img/499629_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n\nAndroid Studio 项目资源管理器中的`项目源文件`视图\n\n你可以在 `src` 文件夹层级下看到一些熟悉的条目，例如你的\
  \ `myfirstapp` Java 源文件及其 `MainActivity` 代码。如果在此视图中稍作浏览，你还会看到其他源文件，比如用于测试代码的模板文件，以及一些可编辑的\
  \ `XML` 文件，它们用于控制视觉布局、可复用的字符串值等。\n\n但最值得注意的是那些**没有**显示的内容。你再也看不到 Gradle 构建文件、IntelliJ\
  \ IDEA 偏好设置与配置文件、构建产物以及其他非代码项了。所有这些都被隐藏起来了，这样你就能专注于代码！我听到你在问：“为什么要这样做？” 除了前面提到的个人偏好和专业需求外，`项目文件`视图尤其受到一些开发者的青睐，他们发现自己在“心流”状态下工作效率最高：这是一种深度沉浸于代码、不受干扰的心智状态。\n\
  \n另一个流行的视图是`项目`视图，它按照许多传统 Java IDE 的方式排列项目元素和组成部分。图 5-2 展示了这个视图，你会注意到一些明显差异，特别是在外部库和引用的呈现方式上。\n\
  \n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig2_HTML.jpg](img/499629_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n\nAndroid Studio 项目资源管理器中的`项目`视图\n\n我强烈建议你探索项目资源管理器中的所有视图选项，找到最适合你工作方式的变体。\n\
  \n有一件非常有用的事情需要记住：无论你使用哪种视图，也不管你切换多少次视图，Android Studio 实际上并不会物理地改变你的项目或移动文件。它只是为你提供了一个不同的虚拟视图。\n\
  \n### 使用项目资源管理器的上下文菜单\n\n与你可能使用过的许多其他应用程序一样，Android Studio 也提供了可以通过鼠标右键（或在 Mac 上使用\
  \ Command+单击）访问的上下文菜单。在探索项目资源管理器中的视图时，你应该对所有看到的内容调用上下文菜单，以了解它提供了哪些功能。无论是比较、查找等文件管理操作，快速编辑选项，还是启动更重要的代码管理操作，上下文菜单都是你应该熟悉使用的专业工具之一。\n\
  \n上下文菜单中的所有选项都可以在 Android Studio 的主菜单中找到，但它们通常深藏在三四级菜单之下。\n\n## 使用 Android Studio\
  \ 运行和调试\n\n如你在第 3 章所见，让 Android Studio 以模拟器或设备方式运行程序的主要方法之一，是配置运行配置。我们稍后会重新讨论运行配置，但了解还有其他运行应用程序的方法也是件好事。\n\
  \n### 使用运行配置运行：回顾\n\n我们在第 3 章的目标是尽快让你的第一个应用程序运行起来，因此我们跳过了运行配置的许多细节。有些关键方面值得重新审视，因为你很快会想开始创建更多具有不同特性的运行配置，以帮助你在应用程序开发的不同阶段工作。\n\
  \n通过 Android Studio 的 `运行` ➤ `编辑配置…` 菜单，调出“运行配置 1”（或你之前用于保存运行配置的任何名称）的详细信息。你应该会看到熟悉的屏幕，显示你的运行配置，如图\
  \ 3-16 所示。对于任何运行配置，都有各种选项分布在四个子窗口中。有些你可以自行探索，但需要熟悉的主要配置项如下。\n\n#### 运行配置：常规选项\n\n\
  - **模块** ：指定构建过程要针对的具体模块；如果未指定，则表示应针对整个项目。在实际应用中，这有助于处理较大的多模块项目，在某些情况下你可能只想重建/重制一个特定模块——通常是因为只有那个模块发生了更改。\n\
  - **安装选项 – 部署** ：指示 Android 应用程序构建完成后应该执行什么操作。是应该在设备或模拟器上运行（因此需要部署），还是你只关心确认应用程序能无错误地成功构建，而无需实际运行？\n\
  - **启动选项 – 启动** ：此设置控制在成功构建被部署并启动后发生什么。应用程序应该按照 Android Manifest XML 文件运行并启动默认 Activity，还是在此特定运行配置中应使用不同的启动点（例如应用程序中的替代\
  \ Activity，或不启动任何 Activity）？\n- **安装标志** 和 **启动标志** 超出了我们目前对运行配置的讨论范围。\n\n#### 运行配置：杂项\n\
  \n杂项选项控制在构建被部署和启动时，你的目标环境“清理”的程度。这里的“清理”指的是像日志、应用程序的先前版本等产物，是作为运行配置的一部分被保留还是被清理。\n\
  \n- **Logcat** ：我们将在本章后面详细讨论 `Logcat`，但这些设置决定了是否默认通过 `Logcat` 工具始终向你显示 `Logcat`\
  \ 输出，以及是否应清理先前运行的输出。如果不加管理，这些日志会变得非常庞大，所以如果它们变得难以掌控，请记住使用清除日志设置。\n- **安装选项** ：如果没有任何更改，你可能希望跳过再次部署应用程序，这可以在更广泛的工作流程中节省时间。了解你不会影响正在运行的应用程序实例可能很重要，例如，当涉及到保存状态或从一个已知的良好起始条件运行时。\n\
  \n\n\n#### 运行配置：调试器\n\n那些熟稔各类软件编写的读者都会明白，软件开发并非一项尽善尽美的任务。问题频发、意外行为层出不穷、应用因不可预测的原因崩溃，诸如此类的情况比比皆是！\n\
  \n随着你花时间编写、调试和审查代码，调试器屏幕上的选项会随着时间的推移变得更有意义。无论你的经验水平如何，都需要关注以下几个关键选项：\n\n- **调试类型**：本质上，这为\
  \ Android Studio 提供了关于项目中应包含何种代码的指引。可以明确设置为 `Java`、`Native`（通常指通过 Android NDK 扩展实现的\
  \ C++）、`Dual`（Java 和 Native 混合）或 `autodetect`。与依赖 `autodetect` 相比，明确指定语言类型的一个好处是，可以节省少量时间，避免\
  \ Android Studio 扫描你的项目以确定语言类型，并且不会为不存在的语言加载调试工具。\n\n- **显示静态/全局变量**：当出现问题时，许多开发人员首先使用的工具之一是检查工具——即，在遇到问题时能显示部分代码当前状态的工具，例如特定变量分配的值。此选项将静态/全局变量与你代码中在方法内定义的变量一同显示在你的视图中。\n\
  \n- **调试优化代码时发出警告**：语言编译器一个非常有用的特性是，它们能够优化人工编写的代码，使其运行得更高效。当发生这种情况时，实际运行的代码并非严格意义上你编写的代码，尽管结果应该是一致的。此设置允许在你转而调试已被编译器优化过的代码时收到警告。\n\
  \n其他设置（如符号目录和 LLDB 选项）超出了本书的讨论范围。\n\n#### 运行配置：性能分析\n\n任何形式的 Android 性能分析工具，都花了很长时间才达到开发人员所需的那种成熟度和洞察力，以帮助他们了解其应用对环境资源的需求。即使在几年前，无论是在\
  \ Android Studio 还是 Eclipse 中，这些工具仍然达不到大多数人的期望。如今，这些工具在不断完善，我们将在后面的章节中深入探讨一些领域时，提及其中部分工具。其中一些改进后的选项可以直接在你的运行配置中进行配置，如下所示：\n\
  \n- **启用高级性能分析**：对于在目标 SDK 为 API 级别 26 或更低版本上工作的开发者来说，要确定应用即时环境中发生的事情可能会令人沮丧，例如，网络行为和流量、已处理或丢弃的事件等等。`Enable\
  \ Advanced Profiling` 选项能够为较旧的目标 API 级别捕获更多指标。对于瞄准当代 API 级别（例如 30+）的开发者来说，这现在是 Android\
  \ Studio 及相关工具中标准性能分析行为的默认部分。\n\n- **启动时开始记录 CPU 活动**：此设置旨在分析应用使用过程中 CPU 周期消耗在何处。这至少有两个好处：第一是了解应用各个部分将如何执行，这在考虑用户满意度时非常重要——运行缓慢的应用可能导致用户对你的应用感到沮丧。第二个好处则更为抽象。由于\
  \ CPU 使用是智能手机电池最耗电的方面，因此 CPU 活动记录有助于你了解你的应用在使用时是否是导致电池耗电的主要因素。CPU 活动设置可能不适合你在 Android\
  \ 学习初期就开始使用，但一旦你开始探索诸如视频使用、设备端计算等 CPU 密集型 Android 功能，它将成为你开发工作流程中的主要工具。\n\n### 使用\
  \ AVD 和已连接的设备进行更深入的运行\n\n在第 3 章中，我们逐步创建了一个初始运行配置，然后使用我们创建的第一个 AVD（名为 `Pixel 2 API\
  \ 30`）来实际运行你的应用，并向你展示结果活动屏幕。使用 AVD 是 Android Studio 为你提供的最强大功能之一，它使你能够在各种虚拟设备上进行测试和实验。\n\
  \n从技术上讲，AVD 管理器是一个独立的工具，Android Studio 将其集成并提供出来，以简化你的开发工作——这就是我在第 2 章中介绍的“集成”理念。除了可以从\
  \ Android Studio 的“工具”菜单或显示为小手机图标的工具栏按钮启动 AVD 管理器外，你还可以直接从命令行或 shell 运行 AVD 管理器的命令行版本，作为\
  \ SDK 工具目录下的一个独立工具。\n\n要找到 SDK 工具目录，请从你 Android 安装路径的根目录（例如，macOS 上的 `~/Library/Android`，或者你在第\
  \ 2 章中为 Linux 或 Windows 安装所选择的 Android 目录）下找到 `sdk` 子目录。在 `sdk` 子目录内，继续进入子目录 `tools\
  \ ➤ bin`。其中包含一个名为 `avdmanager` 的二进制可执行文件。从名称可以猜到，这就是独立的 AVD 管理器可执行文件。如果查找 SDK 工具目录有任何困难，请使用操作系统的搜索功能。\n\
  \n当从命令行运行时，你会得到命令行输出，如代码清单 5-1 所示，具体取决于你传递给 `avdmanager` 命令的选项。\n\n```\n$ avdmanager\
  \ list avd\n可用的 Android 虚拟设备：\n名称: Pixel_C_Tablet_API_30\n设备: pixel_c (Google)\n\
  路径: /Users/alleng/.android/avd/Pixel_C_Tablet_API_30.avd\n目标: Google APIs (Google\
  \ Inc.)\n基于: Android API 30 标签/ABI: google_apis/x86\n皮肤: pixel_c\nSD 卡: 128 MB\n\
  代码清单 5-1\navdmanager 工具的命令行输出\n```\n\n\n\n## 重温 AVD 管理器\n\n既然你已经掌握了多种启动 `AVD 管理器`的方法，现在就请通过\
  \ Android Studio 的 `工具` 菜单启动它，因为我们将为后续练习创建第二个 `AVD`。如果需要帮助，你可以重新查看第 2 章中的逐步操作指南，但以下是创建第二个\
  \ `AVD` 的目标：\n\n- **类别 – 平板电脑**：我们想要创建一个平板电脑尺寸的 `AVD`，这将有助于使用书中的示例测试更大的设备。\n- **名称和类型\
  \ – Pixel C 平板电脑 API 30**：这是最出色的通用平板电脑之一，也是最近发布的一款搭载谷歌直接提供的纯净版 Android 系统的设备，是测试平板设备的绝佳基准。\n\
  - **系统映像 – R (API 级别 30)**：这是最新的 SDK，带来了 Android 为平板电脑形态设备提供的最新功能。\n\n**注意**：你可能会看到\
  \ `R` 系统映像旁边有一个蓝色的下载链接。这表明必要的 Intel x86 系统映像尚未安装到你的机器上。你需要点击下载链接并安装该系统映像，此 `AVD`\
  \ 才能成功启动并工作。\n\n- **AVD 名称 – Pixel C 平板电脑 API 30**：你可以使用任何喜欢的名称，但此示例名称在 `AVD 管理器`中看到该\
  \ `AVD`，或在活跃运行、测试和调试代码时看到这个正在运行的模拟器进程时，会提供一些有用的线索。\n\n完成后，你应该会在 `你的虚拟设备` 窗口中看到（至少）两个\
  \ `AVD`，如图 5-3 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig3_HTML.jpg](img/499629_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3 – 在 AVD 管理器中配置多个 AVD\n\n创建第二个（或第三、第四个）`AVD` 的目的不仅仅是为了展示另一张 `AVD 管理器`的截图。拥有两个或更多\
  \ `AVD` 是使用 Android Studio 同时在多个设备或 `AVD` 上运行相同代码的必要条件。\n\n在 Android 开发工作中，你会希望锻炼这种同时在多个不同的\
  \ `AVD` 和设备上进行测试的能力，原因有很多。在前面的章节中，我们提到了全球销售和使用的设备的多样性、支持的 Android 版本和 SDK 版本的分裂特性，以及其他一些因素，这些都意味着你的应用程序可能在一系列细微不同的设置中运行。首先，在多种设备上并排运行你的应用程序，有助于你发现用户可能在现实世界中看到的某些奇特现象和差异。这种能力的第二个主要好处是，可以观察你的应用程序在小屏幕（一次只显示一个\
  \ Activity）与大屏幕（例如平板电脑）上的表现。在大屏幕上，你的 Activity 可能会缩放成不同尺寸，或者作为使用 Fragment 的多 Activity\
  \ 显示的一部分（我们将在第 11 章中介绍）。使用多设备或 `AVD` 测试的第三个原因是，查看 Android 如何在不同显示密度和分辨率的屏幕上缩放或插值特定分辨率的图像。\n\
  \n你现在就应该尝试在多个 `AVD` 上运行你的 `MyFirstApp` 应用程序。你可以从 `工具` ➤ `选择设备` 菜单选项触发此操作，或者使用同等的设备选择工具栏下拉菜单，如图\
  \ 5-4 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig4_HTML.jpg](img/499629_1_En_5_Fig4_HTML.jpg)\n\
  \n图 5-4 – 设备选择工具栏下拉菜单\n\n选择 `在多个设备上运行` 选项，系统将提示你打开标题为 `选择部署目标` 的对话框。选择两个或多个设备或 `AVD`，例如，我们到目前为止在书中创建的\
  \ `Pixel C 平板电脑` 和 `Pixel 2` `AVD`，如图 5-5 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig5_HTML.jpg](img/499629_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5 – 选择多个目标以在 Android Studio 中启动你的应用程序\n\n同时启动多个 `AVD` 会花费一些时间，但稍等片刻后，你应该会看到你的\
  \ `AVD` 启动，并且 `MyFirstApp` 应用程序已部署并在所有 AVD 上运行，如图 5-6 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig6_HTML.jpg](img/499629_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6 – 应用同时部署在多个 AVD 上\n\n## 在真实设备上运行你的代码\n\n虚拟设备对任何开发者来说都是一大福音，但有时，在真实设备上看到你的代码运行也是势在必行的。在最近的\
  \ Android Studio 版本中，Google 在测试和在真实设备上运行你的应用程序方面取得了巨大进展。从历史上看，将应用程序部署到真实手机上需要一长串命令行步骤，虽然你今天仍然可以走这条路，但\
  \ Android Studio 使得检测和使用通过 USB 电缆连接到开发机器的 Android 设备变得非常容易。\n\n为了在开发应用时使用 Android\
  \ 手机进行测试，你需要在手机上启用开发者选项。Google 一直以来都有一个启用此功能的技巧：打开手机上的 `设置`，滚动到 `关于手机` 选项。`关于手机`\
  \ 屏幕上的最后一个选项是版本号。连续点击版本号显示的数字七次（没错，七次），你会看到一个倒计时提示，告诉你离启用开发者模式只剩几次点击了。\n\n一旦你点击了足够的次数，你会看到一个屏幕通知，提示开发者选项现已启用，并且\
  \ `设置` 下会出现一个名为 `开发者选项` 的新菜单选项。默认情况下，该选项下会有一个名为 `USB 调试` 的子选项已启用。请再次确认你的手机上是否如此，如果尚未启用，请将其打开。\n\
  \n在手机上启用开发者模式后，通过 USB 电缆将其连接到你的开发电脑。你的手机应该会被自动检测到，然后 Android Studio 会将其识别为运行 Android\
  \ 应用程序的潜在目标。\n\n要测试这一点，请从菜单中选择 `运行` ➤ `选择设备`，或者打开工具栏上用于 `AVD`/设备的下拉菜单，如图 5-7 所示。\n\
  \n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig7_HTML.jpg](img/499629_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7 – 从 Android Studio 中选择一个已连接的、处于开发者模式的 Android 设备\n\n选择你连接的设备，在我的例子中是 `Nexus\
  \ 5` 手机。等待几秒钟，让 Android Studio 构建、打包并将应用程序部署到连接的设备上，然后你应该会看到你的应用程序在你的手机上加载并运行，如图\
  \ 5-8 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig8_HTML.jpg](img/499629_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8 – 在已连接的 Android 手机上运行 MyFirstApp\n\n\n\n## 调试而非运行代码\n\n任何应用开发的新手最终都需要面对代码“出错”时的情况。无论是意外结果、异常行为、应用崩溃还是其他问题，调试都是找出应用中发生情况的主要方法。\n\
  \n调试是一个庞大的主题，因此与其试图在一章专门介绍 Android Studio 工具的章节中掌握它，不如先集中了解 Android Studio 中手头的主要调试工具，然后在本书后续介绍更复杂的\
  \ Android 应用时，再扩展讲解调试及相关主题。你还可以在本书网站 [`www.beginningandroid.org`](http://www.beginningandroid.org)\
  \ 上阅读更多关于调试的内容。\n\n在 Android Studio 中，有助于调试的四个关键概念如下。\n\n### 设置和清除断点\n\n断点是源代码中的一个标记，指示你想要中断或停止代码执行的位置，以便更详细地检查行为或问题。要在代码中设置断点，请双击项目资源管理器中的文件或对象，打开要处理的代码——在我的例子中，将是\
  \ `MainActivity.java` 文件。打开文件后，点击文件旁边行号右侧较暗的灰色页边距，如图 5-9 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig9_HTML.jpg](img/499629_1_En_5_Fig9_HTML.jpg)\n\
  \n*图 5-9 在 Android Studio 中为调试设置断点*\n\n你应该会看到点击处出现一个红色圆圈，表示已设置断点。如果出于某种原因，代表断点的红色圆圈没有出现，请打开“工具”菜单，选择“切换行断点”。再次点击或再次选择切换选项，将移除该断点。\n\
  \n### 启动应用进行调试\n\n就像你可以通过单击“运行”选项或选择已设置的运行配置来运行应用一样，你也可以启动应用进行调试。这实质上执行相同的操作：调用\
  \ `Gradle` 构建应用，将应用部署到指定设备或 AVD 等。唯一不同的是，Android Studio 会预先准备好帮助你进行调试。\n\n要以调试模式启动应用，只需从“运行”菜单中选择“调试\
  \ '运行配置 1'”（或类似选项）。除了构建和部署步骤外，你还会看到 Android Studio 的下方视图自动打开并显示调试窗口，其中包含调试器、控制台和其他调试工具的访问入口，如图\
  \ 5-10 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig10_HTML.jpg](img/499629_1_En_5_Fig10_HTML.jpg)\n\
  \n*图 5-10 Android Studio 中自动触发的调试视图*\n\n根据你正在调试的内容以及是否设置了断点，你还会在“运行”菜单中看到额外的菜单项被激活，如图\
  \ 5-11 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig11_HTML.jpg](img/499629_1_En_5_Fig11_HTML.jpg)\n\
  \n*图 5-11 用于单步进入、跳过和跳出代码部分的调试选项*\n\n我将在下一个标题下解释这些“单步执行”选项。\n\n### 调试时单步执行代码\n\n\
  你在图 5-11 中看到的“单步跳过”、“单步进入”、“单步跳出”等选项对于仔细检查代码正在执行的操作至关重要。通过一次一行地进入、跳过或跳出代码，而不是运行整个代码库，你可以一次一个动作地逐步执行应用逻辑，并结合变量检查以及查看\
  \ Activity UI 中的视觉或行为变化等其他工具，看到每一行逻辑的结果。\n\n### 附加调试器\n\n你并不总是能清楚地知道在哪里设置断点或单步进入/跳过代码。有时，你可能只是想更深入地了解应用中发生了什么，以理解某些难以解释的行为或问题。这正是调试器工具发挥作用的地方。我们无法在短短几页甚至一整章中详尽介绍调试器，所以我们不必为此纠结。你可以在本书网站\
  \ [`www.beginningandroid.org`](http://www.beginningandroid.org) 上了解更多关于调试器强大功能的信息。\n\
  \n要调用调试器并将其附加到正在运行的应用以帮助你了解情况，你可以使用“运行”菜单中的最后一个选项——“将调试器附加到 Android 进程”。你的应用必须已经在运行，此操作才能生效。\n\
  \n## 查看已运行的内容\n\n你现在已经看到了足够多的第一个应用在 AVD 或真实设备上运行的示例，可能会想知道我说的“查看已运行的内容”是什么意思。为了解开这个谜团，“查看”你的应用运行不仅仅是指观察最终应用中呈现的\
  \ Activity。\n\nAndroid Studio 提供了几个非常有用（有些人会说至关重要）的工具，让你可以查看应用在 Gradle 脚本（或其他工具）构建过程中发生了什么，以及应用运行时发生了什么诊断和日志信息。\n\
  \n在 Android Studio 窗口的底部，状态栏的上方，你会看到一组按钮，它们可以让你快速访问这些工具，名称如“TODO”、“构建”、“Logcat”等，你可以在图\
  \ 5-12 中看到它们。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig12_HTML.jpg](img/499629_1_En_5_Fig12_HTML.jpg)\n\
  \n*图 5-12 在 Android Studio 中轻松访问事件日志、构建输出、Logcat 等*\n\n让我们来看看这里的一些关键工具，这样你就能自如地将它们的使用融入到不断扩展的开发工具集中。\n\
  \n### 理解你的构建过程\n\n“构建”工具会在“构建输出”窗口中显示构建过程的摘要，要么是“构建：已完成”消息（带有绿色勾号和一些时间信息，如图 5-13\
  \ 所示），要么是阻止构建工作的一组错误或问题。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig13_HTML.jpg](img/499629_1_En_5_Fig13_HTML.jpg)\n\
  \n*图 5-13 Android Studio 中项目构建的构建输出视图*\n\n你还会看到实际执行应用构建所执行的任务列表（在我的例子中是 20 个独立的构建步骤），以及一个指向“构建分析器”的链接，该分析器能更深入地了解每个任务花费的时间以及如何改进。\n\
  \n\n\n## 理解事件日志中的事件\n\n另一个与 `Build` 工具相辅相成的工具是 `Event Log`。`Event Log` 以更高层次的视角展示所执行的操作，例如将新构建的应用加载到设备或\
  \ AVD 上所采取的步骤，以及从这些步骤中识别出的任何问题。清单 5-2 展示了构建 `MyFirstApp` 应用并在多个 AVD 实例上启动后的 `Event\
  \ Log` 输出。\n\n```\n22:17 Executing tasks: [:app:assembleDebug] in project /Users/alleng/AndroidStudioProjects/MyFirstApp\n\
  22:17 Gradle build finished in 9 s 5 ms\n22:17 Install successfully finished in\
  \ 11 s 455 ms.\n22:17 Install successfully finished in 2 s 612 ms.\n22:18 Emulator:\
  \ emulator: INFO: QtLogger.cpp:68: Warning: Error receiving trust for a CA certificate\
  \ ((null):0, (null))\n22:18 Emulator: Process finished with exit code 0\n清单 5-2\n\
  在两个 AVD 上构建并启动 MyFirstApp 后的事件日志\n```\n\n你在 `Event Log` 中可能看到的典型错误，通常是那些阻止了构建或构建后活动的问题，例如为模拟设备指定了本机上不存在的\
  \ SDK 或基础镜像。后一类问题在 `Event Log` 中的显示示例如下：\n\n```\nEmulator: emulator: ERROR: This\
  \ AVD's configuration is missing a kernel file! Please ensure the file \"kernel-ranchu\"\
  \ is in the same location as your system image.\n```\n\n## 理解 Logcat\n\n`Logcat`\
  \ 是测试和调试工具集中最有用的工具之一。它的职责是在你的应用运行期间，以及应用意外停止运行、崩溃、出现问题、冻结等情况发生时，帮助从设备或 AVD 上收集诊断和运行时信息。\n\
  \n`Logcat` 会提供一个类似控制台的界面，用于检查和审查来自设备或模拟器的关键系统消息，包括应用在运行中遇到错误或异常时所发生的所有重要堆栈跟踪信息。当代码在一个环境（例如开发者工作站的\
  \ AVD）中运行完美，但在特定品牌或型号的手机上运行时却遇到意外问题时，这种能力极其有用。\n\n要使用 `Logcat`，只需在应用运行期间，或设备/AVD\
  \ 正在执行其他任务（例如启动）时，点击工具栏上的按钮即可。默认情况下，你会看到一长串从应用和设备当前状态中收集到的 `Logcat` 条目，如图 5-14 所示。\n\
  \n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig14_HTML.jpg](img/499629_1_En_5_Fig14_HTML.jpg)\n\
  \n**图 5-14**  \nAndroid Studio 中的 `Logcat` 输出\n\n此示例中的 `Logcat` 输出相对无害，但当问题出现时，`Logcat`\
  \ 中的堆栈跟踪和其他诊断信息将变得无比宝贵。\n\n## 重新审视 SDK Manager\n\n通过 Android Studio 可用的主要工具中，最后一个要重新审视的是你在第\
  \ 3 章首次见到的 `SDK Manager`。你可以随时通过打开 `Tools` 菜单并选择 `SDK Manager` 条目来调用和使用它。通过此操作，你可以查看已安装的\
  \ SDK 版本，以及尚未安装或有可用更新的版本，如图 5-15 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig15_HTML.jpg](img/499629_1_En_5_Fig15_HTML.jpg)\n\
  \n**图 5-15**  \n重新审视 Android SDK Manager\n\n正如你所料，你可以勾选任何尚未安装的 SDK 版本，然后点击 `Apply`，`SDK\
  \ Manager` 将在后台开始下载并安装这些版本。在以下两种工作场景中，你很可能会需要这样做：第一，确保你拥有代表常见或流行的 Android 版本（例如\
  \ 4.4 “KitKat”）的 SDK；第二，当 Google 随新版本 Android 发布新 SDK 时，你需要测试这些新功能。\n\n但使用 `SDK\
  \ Manager` 还有另一个原因，那就是它能够帮助你在 Android Studio 体验中添加额外的“好东西”。切换到 `SDK Manager` 的第二个标签页，名为\
  \ `SDK Tools`，你将看到一个宝藏库，其中包含的众多额外工具很快就会成为你最爱用的工具。我们将在本书后续的相关章节中重新审视其中一些工具，但我先标记两类开发者经常使用的工具。它们是\
  \ `Android SDK Command-Line Tools`，它提供了从命令行管理和控制 SDK 包的额外功能；以及各种额外的 Google Play\
  \ 库和 SDK，它们能帮助你构建使用 Google 专有 Google Play 服务的依赖项和库的应用。\n\n你可以现在勾选这些工具进行下载，也可以等到本书后续章节再操作。\n\
  \n## 突出 Android Studio 的其他主要功能\n\n本章介绍了 Android Studio 的一些关键功能，这些功能可用于管理、执行、检查和诊断你在构建中的应用，以及管理和使用作为应用开发工作一部分的关联\
  \ SDK 及其他工具。\n\n但 Android Studio 中最大的一组工具，毫无疑问是与编写代码、审查代码、详细检查代码、重写代码等直接相关的。我们将在本书的第二部分中，结合介绍\
  \ Android 应用编码的诸多方面，来介绍 Android Studio 的这些功能。\n\n## 总结\n\n本章向你介绍了任何软件开发者都会用到的主要工具——IDE。现在你应该有信心进一步探索\
  \ Android Studio 中的更多选项了，并知道总能找到项目所需的核心工具。\n\n"
- "# 6. 掌握你的整个开发者生态系统\n\n为 Android 开发进行设置，不仅仅只是安装 Android Studio。虽然你可以只做这一步——并且只做这一步——但你最终会发现，计算机的其他方面，以及它运行的软件，将对你作为\
  \ Android 开发者的生产力、抱负和能力产生重大影响。本章虽非详尽无遗，但确实提供了一些重要的基础性考量，以及进一步学习的链接。请继续阅读！\n\n##\
  \ 选择专用开发者硬件\n\n在第 2 章中，我为认真的 Android 开发者介绍了一个关于计算机方面考量的简短清单。以下是再次总结：\n\n1.  我将使用什么台式机或笔记本电脑硬件来进行\
  \ Android 开发？\n\n2.  我将在台式机/笔记本电脑上运行什么操作系统？\n\n3.  在使用 Android Studio 之前，我的系统需要哪些先决条件？\n\
  \n4.  在开发过程中，我将使用哪些 Android 手机（如果有的话）？\n\n我当时提出的准则依然适用。近年来生产的几乎任何一台手头可用的电脑，都可以作为一台不错的开发者工作站。无论是台式电脑还是笔记本电脑，它都能胜任工作。\n\
  \n但本书的目的不仅仅是“胜任工作”。如果你真正渴望成为一名专业的 Android 开发者，那么就像其他专业人士依赖工具和设备来提高效率和杠杆作用一样，你也应该思考哪些工具能够提升你的开发工作以及你创建优秀应用的能力。\n\
  \n让我们首先来看看，如果你正在寻找能让你在构建 Android 应用时获得不公平优势的开发者硬件，你可能需要考虑哪些因素。\n\n\n\n### 如何选择适合你的\
  \ CPU\n\n2020 年，`x86_64` 架构的 CPU 选择众多：AMD 的锐龙（Ryzen）和线程撕裂者（Threadripper），以及英特尔（Intel）的酷睿（Core）系列。关于哪款最好，众说纷纭，而这些评判通常着眼于原始\
  \ CPU 速度（`时钟频率`）、封装内的核心数量、各级板上缓存以及其他几项特性。\n\n就一台专用的 Android 开发者电脑而言，任何当代的英特尔或 AMD\
  \ CPU 都绰绰有余。如果你想要针对 2020 年代 CPU 的具体推荐，可以关注英特尔酷睿 i5 和 i7 系列，以及 AMD 锐龙 7 和锐龙 9 系列。它们拥有足够的速度、可观的核心数量（通常为四核或以上）以及良好的\
  \ `L1`/`L2`/`L3` 缓存。\n\nAMD 和英特尔都有性能更强的 CPU，但通常你会发现它们主要通过更多核心来区分，偶尔还会支持其他功能。在 Android\
  \ 开发领域，核心多并不总是更好。对你而言，并行运行的关键活动包括：在 Android Studio 中工作并在一个或多个 AVD 中查看结果时的任何同步操作；对于足够大的多项目应用，如果\
  \ Gradle 配置支持，还包括并行构建活动。我的建议是，别让钱包为最昂贵的酷睿 i9 及类似 AMD 处理器买单，而是将这笔钱投入到开发者工作站的其它部分，比如更大的内存或更好的屏幕。\n\
  \n另一种日益流行的 CPU 架构是 Arm。Arm 是当今全球几乎所有移动设备的核心，这得益于“片上系统”（SoC）设计的广泛普及，这些设计都采用了 Arm\
  \ 架构。基于 Arm 的台式机已经面市，甚至 Arm 服务器市场也在萌芽，但这里有一个有趣的难题。\n\n尽管全球销售和使用的绝大多数 Android 设备都采用\
  \ Arm 处理器，但使用基于 Arm 的计算机进行计算密集型工作负载（例如构建/编译 Android 应用）仍然是一个挑战。可以肯定的是，这并非不可能。但速度和性能上的权衡仍然显著。而最大的障碍在于，你期望使用的工具是否能在基于\
  \ Arm 的计算机上使用。最值得注意的是，`Android Studio` 并不支持 Arm——它只能在 `x86` 架构的计算机上运行。同样，Google\
  \ 也只将其多个版本的 Android SDK 打包成 `x86` 格式，而非 Arm 格式。这意味着如果你选择基于 Arm 的开发机，你将需要使用自己的构建工具来启动所有工作，规避缺少易于捆绑的\
  \ Android SDK 等问题，以及其他更多麻烦。我不建议你去挑战这个难题。\n\n### 内存再多也不嫌多！\n\n有时我真希望给自己增加内存能像给台式电脑加内存一样简单。就目前而言，为了获得更强的开发火力，你和我只能满足于购买\
  \ RAM 了。\n\n回想一下第 2 章，你会记得 Google 建议 Android Studio 的最低内存为 4 GB，首选基础级别为 8 GB。实际上，现在很难买到只有\
  \ 4 GB 内存的新电脑了。所以，引用一句经典电影台词：8 GB 就够了吧？\n\n别急！你当然可以用 8 GB 内存的电脑高效地开发 Android 应用。事实上，我正是在一台\
  \ 2015 年款、拥有 8 GB 内存的 MacBook Air 上撰写了本书的很大一部分，并构建了你们看到的某些示例，所以这远非只是理论上的可能。不过，我可以告诉你，它存在明显的局限和令人沮丧之处。一些明显的例子是，当我试图同时运行\
  \ Android Studio、一个 AVD，以及我在本章及全书后面讨论的图像和视频处理开源工具时，8 GB 内存很快就被耗尽，然后这台 MacBook 会尽职尽责地开始增加——并越来越多地使用——磁盘上的交换空间，以在真实内存和我提出的更高需求之间进行调度。\n\
  \n对比之下，我信赖的台式机则大不相同。它甚至更老，是一台将近十年前生产的“经典”Dell Precision 工作站——我都不确定戴尔现在是否还生产这种机型。但它拥有\
  \ 32 GB 内存，在同时运行 Android Studio、多个 AVD，以及为了稳妥起见再开的几个其他工具时，也毫不费力。\n\n**注意**\n\n从我的配置可以看出，我推荐硬件并非为了收取推广费或回扣。如果你有时光机，请务必跳到\
  \ 2010 年或 2015 年，去买我当年用的那款硬件吧！\n\n如果你正在规划自己的 Android 开发者系统，我给你的简洁建议是：从来没有人抱怨过自己的内存太多！如果条件允许，至少配备\
  \ 32 GB；追求奢华的话，64 GB 足以应对未来多年的 Android 开发需求。\n\n对于那些打算购买笔记本作为主力开发机的人，要特别关注你中意型号的最大支持内存是多少，以及购买后能否更换内存。也就是说，内存是焊接还是固定死的，以至于如果不进行昂贵且可能使保修失效的操作就无法更换或升级？你可能会发现自己受限于\
  \ 16 GB——如果你能选择一个支持 32 GB 的型号，未来你会感谢自己的决定（或许也会感谢我！）。\n\n\n\n### 存储一切！\n\n随着你开始构建越来越多的\
  \ Android 应用，对磁盘空间的需求也会增加，以容纳各种项目、资源等。有些地方显然会消耗磁盘空间，例如源代码文件（体积很小）以及图像和视频文件（体积可能非常非常大）所占用的空间。\n\
  \n还有一些 Android 开发特有的方面，仔细想想也很明显，比如不同版本的 Android SDK，每个版本可能需要高达 1 GB 的空间。\n\n在考虑存储需求时，`AVD`\
  \ 是一个隐藏因素。因为创建一个新的 `AVD` 镜像来测试某种屏幕尺寸或设备格式非常容易，所以在你意识到之前，很可能就已经有 20、30 甚至更多个 `AVD`\
  \ 了。如果你要认真地在多种屏幕尺寸和分辨率上进行测试，那么拥有几十个 `AVD` 是最低要求。\n\n当你在系统中配置了数十个 `AVD` 后，很容易就会消耗掉\
  \ 50 GB 甚至更多的空间。`AVD` 最大的存储消耗因素之一，是你为其分配的板载存储或模拟 SD 卡存储的大小。这些选项是通过分配你的实际磁盘空间来模拟的，这意味着如果你想模拟一台拥有\
  \ 128 GB 存储的最新 OnePlus 7 设备，那么你的 `AVD` 就会占用你真实磁盘空间的 128 GB 甚至更多！当然，你不必为模拟 SD 卡和设备存储分配如此大的空间，但通常你至少会分配一个可用的容量，所有这些加起来就很可观了。\n\
  \n在开始 Android 应用开发之旅时，一个比较实用的存储空间预估值大约是 50 GB。这足以让你安装几个版本的 Android SDK、一定数量的各种尺寸和配置的\
  \ `AVD`，以及 Android Studio 和其他工具。为了未来用起来更舒适，特别是为了测试目的而准备大量 `AVD` 时，你应该争取拥有 100 GB\
  \ 或更多的空间。\n\n与存储空间大小同等重要的是存储类型及其速度。传统的机械硬盘当然便宜，但代价是数据传输速度，也就是 IOPS（每秒输入/输出操作次数）。现代存储选项，例如固态硬盘\
  \ (SSD)，在数据传输性能方面有显著提升，因此从构建和运行 `AVD`、部署大型应用以及依赖大量图像和视频资源的应用，到任何数据密集型的计算或操作，其运行速度都会更快。\n\
  \n如果你有选择余地，请始终选择固态存储方案，尤其是当你计划进行数据密集或计算密集的开发时。对于那些正在考虑购买专用笔记本电脑用于开发的人来说，由于近年来市场已大幅转向\
  \ SSD，你会发现自己有非常多的选择。\n\n### 查看一切！\n\n如果你要成为一名专注的 Android 应用开发者，你将需要长时间盯着屏幕。鉴于此，你可能需要考虑如何充分利用你将要观看的屏幕，以及你是否需要不止一个屏幕。\n\
  \n在显示器或屏幕方面，开发者的满意度很大程度上取决于高度个人化的因素。你喜欢大屏幕吗？你更喜欢多屏吗？不同朝向的屏幕（横屏或竖屏）对你更有帮助吗？你会将笔记本电脑的屏幕与固定显示器混合使用吗？需要考虑的因素远不止这些，但我会重点指出两个对你产生长期有益影响的关键特性：尺寸和清晰度。\n\
  \n说到屏幕尺寸，一些实际考量会让你相信，至少买一个大屏幕是值得的。回顾第 5 章的图 5.6，你会看到两个并排运行的 `AVD`，一个代表普通手机屏幕，另一个代表平板电脑屏幕。你不会惊讶于图中视图几乎占满了我\
  \ MacBook Air 的 13 英寸屏幕。如果仔细看，你可以看到隐藏在 `AVD` 屏幕后面的 Android Studio 会话的微小片段。但你能看到的也就这些了。在这个尺寸的屏幕上，如果不做出一些非常别扭的妥协，你根本无法在\
  \ Android Studio 中进行有效的并排开发，同时又在 `AVD` 中观察效果。你可以在 Android Studio 中调整屏幕和窗口的大小，也可以平铺窗口，试图在运行单个\
  \ `AVD` 的情况下把所有内容都塞进去，如图 6-1 所示。\n\n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig1_HTML.jpg](img/499629_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\n在 13 英寸笔记本电脑屏幕上并排运行 Android Studio 和一个 `AVD`\n\n如果你认为这样有助于实时调试或同时比较不同布局，我得说这根本不行。这简直就是个大麻烦！相比之下，在\
  \ 24 英寸屏幕上，Android Studio 和多个 `AVD` 可以愉快地生活在一个拥有充足空间的屏幕上，如图 6-2 所示。\n\n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig2_HTML.png](img/499629_1_En_6_Fig2_HTML.png)\n\
  \n图 6-2\n\n在 24 英寸屏幕上运行 Android Studio 和多个 `AVD`\n\n就让这些图片胜过千言万语吧。等你仔细看完之后，我对屏幕尺寸的总结性陈述将无需更多佐证。如果可以，买一个大屏幕吧！\n\
  \n说到屏幕质量，特别是像素密度，我们又进入了一个非常主观的领域。在撰写本书的 2020 年市场，你可以从多代“高密度”屏幕中选择，还包括 4k、5k，甚至 8k！你的个人品味和偏好是最重要的考虑因素，但我建议你牢记以下两点：\n\
  \n1.  **亲眼看看屏幕的实际效果**。如果可能的话，去一个能给你展示实际连接到任何类型电脑上的屏幕的零售商那里看看。这能让你直观感受显示器实际表现如何，并让你可以调节亮度、白平衡、对比度和刷新率等参数，以确保屏幕的表现令你满意。\n\
  \n2.  **选择分辨率密度与你要构建的应用相当或更高的屏幕**。在本书后续章节中，我们将更多地讨论 Android 屏幕分辨率的选项和机制。为了确保在开发和测试中能尽可能真实地展示你的作品、图片、视频和其他应用资源在真实设备上的显示效果，请确保你为开发系统选择的屏幕至少不差于（甚至优于）你的目标设备。否则，你会对事物在实际运行中的样子产生扭曲的认知。\n\
  \n\n\n### 整合所有配置！\n\n在搭建开发环境时，还需考虑以下其他方面：\n\n1.  **键盘和鼠标**：这看似平常，但你会大量使用这些外设。不要将就不喜欢的设备！\n\
  \n2.  **USB 端口与数据线**：如果你计划通过连接安卓设备进行大量应用测试，那么配备充足的 USB 端口、数据线以及合适的转接头是值得的。大多数较旧的安卓设备使用\
  \ micro-USB 接口，而较新型号已转向 USB-C 接口。\n\n3.  **充电线、底座和设备**：同样，如果你计划使用大量实体安卓设备，保持它们的电量充足会变成一项琐事。虽然可以通过连接开发机的\
  \ USB 接口充电，但旧版 USB 协议能提供的电力有限。直到 USB-C 出现，“标准” USB 才能提供超过 500 mA 的电流。尽可能腾出空间，并考虑使用可直接插入墙插的充电器。\n\
  \n这些要点很容易被忽视，但它们能让你的开发体验更顺畅、更愉快；反之，如果忽略它们，你会发现这些细节会带来摩擦和挫败感，破坏你最好的努力。\n\n## 测试手机和平板\n\
  \n在开始讨论测试手机话题之前，我想先说明一点：并没有硬性规定要求你必须拥有实体安卓手机来测试你的应用。许多应用完全是基于模拟环境（例如 AVD 等）进行构建和发布的。\n\
  \n然而，许多应用是基于在多种安卓设备上进行真实世界测试和反馈而构建的，这些设备的特殊之处和差异会在真实场景中被发现并处理。而且差异确实存在！虽然安卓 SDK\
  \ 和安卓核心平台功能（几乎）是通用的，但手机厂商和电信公司调整及修改安卓默认行为的方式数不胜数。通常，这些“电信公司”这样做是为了试图使自己与其他手机公司区分开来，或者从更\
  \ cynic 的角度来看，他们试图将自己置于一个让用户觉得他们比实际更重要位置。\n\n无论原因如何，在你安卓开发之旅的某个时刻，你都会问自己是否需要花钱购买不同的安卓手机来测试你的应用。我无法给你一个明确的答案，但我可以提供一些建议，帮助你决定在购买测试手机这件事上投入多少宝贵的时间和金钱。\n\
  \n### 选项 1：全虚拟测试\n\n在你的开发之旅初期，坚持使用安卓虚拟设备是一个完全可行的策略。坦白说，这对许多成功的开发者来说，就是贯穿整个职业生涯的方法。随着每个版本的\
  \ Android Studio、安卓 SDK 以及来自 Intel 等其他厂商的支持工具的发布，选择这条路径，不在专用测试硬件上花费额外的时间或金钱，变得越来越可行。\n\
  \n其缺点在于，你有时难以复现真实世界的体验，例如准确评估应用的真实性能，并且可能成为我之前提到的电信公司引入的“特殊功能”的受害者。\n\n### 选项 2：虚拟起步，辅以顶级设备\n\
  \n将广泛使用 AVD 与有选择地补充一些关键硬件设备相结合的混合方法恰好是我的偏好。这有几个原因：\n\n1.  使用 AVD 越来越有效，如前文选项 1 所述。\n\
  \n2.  市场的一大部分份额仅由一个厂商占据：三星。购买一台（或几台）三星设备，就能让你接触到全球大部分正在使用的真实安卓设备。\n\n3.  谷歌自己已经推出了几代原生安卓设备，先是\
  \ Nexus 系列，最近是 Pixel 系列。拥有一台这样的设备，你就能看到应用在未经过电信公司“魔改”的设备上的外观和表现。\n\n如果采用这种方法，购买少量手机就能让你在相当数量的潜在用户所拥有的真实设备上测试体验。\n\
  \n### 选项 3：买，买，再买点\n\n尝试测试所有极端情况、怪癖、异常行为和 bug 的选项吸引着一些开发者。要在安卓领域做到这一点，需要极大的耐心，更重要的是，雄厚的财力！你很容易就能积攒数十台、几十台甚至上百台设备，但仍然无法覆盖所有那些奇怪的设备——以及它们奇怪的问题——你的用户可能会在现实世界中遇到这些问题。到那时，你的银行余额可能也会显示出一些奇怪的问题！\n\
  \n我不推荐这种方法，但我承认我的安卓开发和应用程序并没有深入到那些会暴露大量此类问题的高要求领域。我尝试积累测试设备库的成果如图 6-3 所示。\n\n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig3_HTML.jpg](img/499629_1_En_6_Fig3_HTML.jpg)\n\
  \n**图 6-3** 我的安卓设备收藏，跨越了十多年的安卓历史\n\n我止步于 20 多台设备，我的银行余额因此感谢我！\n\n### 选项 4：他人的硬件\n\
  \n关于云计算，我最喜欢的一个笑话是：它只是在别人的硬件上运行你的代码。如果你理解我的日常工作是什么，这个笑话会更有趣！然而，幽默背后是一个有用的见解：在实体设备上测试你的安卓应用，最好是由别人来负责拥有和提供这些设备。\n\
  \n在本书写作时，已有多种商业选择，可以让你在一批你无需自行购买的实体设备上测试你的应用。你以服务的形式租赁或付费使用这些设备，便能获得在多种手机上测试的所有好处，而无需承担购买它们的前期成本，也无需承担维护它们的后续成本。\n\
  \n要详尽列出此类服务超出了本书的范围，但以下是当今商业供应商提供的主要选项，你可以从中进一步搜索其他竞争选项：\n\n1.  **AWS Device Farm**：来自云计算巨头亚马逊——AWS\
  \ Device Farm 应运而生。亚马逊提供来自众多制造商的约 400 种不同设备的访问权限，并配有实用工具，可直接在浏览器中管理测试工作负载。更多详情请访问\
  \ [`https://aws.amazon.com/device-farm/`](https://aws.amazon.com/device-farm/)。\n\
  \n2.  **Google Firebase Test Lab**：谷歌提供的远程访问多种安卓设备的方案（它们也包含对各种苹果 iPhone 和 iPad 的访问权限）。谷歌还提供了一些优秀的附加工具，用于\
  \ UI 测试以及在其设备集群上自动化运行测试。更多详情请访问 [`https://firebase.google.com/docs/test-lab/`](https://firebase.google.com/docs/test-lab/)。\n\
  \n3.  **Samsung Remote Test Lab**：作为安卓设备领域的巨无霸，三星是测试应用的明显选择。三星远程测试实验室几乎提供了他们制造过的所有设备，并配有便捷工具，这应该是你测试即服务（testing-as-a-service）候选清单上的首选。更多详情请访问\
  \ [`https://developer.samsung.com/remote-test-lab`](https://developer.samsung.com/remote-test-lab)。\n\
  \n还有其他商业服务可用，以及从世界各地安卓开发者社区共享或借用设备的选项。请将以上内容视为一个起点，而非最终指南。\n\n\n\n## 使用构建工具进行构建\n\
  \n如前文所述，`Gradle` 是 `Android Studio` 所使用的构建工具，负责将 Android 应用的所有部分整合起来并生成最终产品。`Gradle`\
  \ 还拥有大量的选项配置，这些配置足以（实际上也确实）写成整本书。我鼓励你去探索 `Gradle` 的各种选项，以便在构建 Android 应用时发挥出更强大的能力。以下是三个快速入门技巧，可以帮助你开始探索并找到更多内容。\n\
  \n### 更新你的 `gradle.properties` 文件\n\n不要害怕打开项目的 `gradle.properties` 文件并查看其中的设置。默认文件中有很多解释性注释，你可以放心地进行尝试。例如，你会看到一条用于设置\
  \ Java 虚拟机内存的条目，如下所示：\n\n```\norg.gradle.jvmargs=-Xmx2048m\n```\n\n尝试将该值改为 `Xmx1024m`，看看这对构建时间有何影响——你实际上是将\
  \ JVM 的可用内存减半了。如果你的内存充足，可以试试 `Xmx4096m`，给 JVM 分配双倍于默认值的内存，看看是否能加快构建速度。随着你对 Gradle\
  \ 配置了解的加深，请重新查看你的属性文件，将所学知识应用其中。\n\n### 使用 Gradle 命令行\n\n`Gradle` 的许多功能都已巧妙地集成到\
  \ `Android Studio` 中，并在你执行各种操作时触发。但你的项目中还会有一个名为 `gradlew` 的 `Gradle` 命令行工具。它位于项目的根目录中。如果你在那里打开一个\
  \ shell 或命令提示符，并运行以下命令行可执行文件：\n\n```\n./gradlew\n```\n\n你会看到一个有用的列表，列出了 `Gradle`\
  \ 可直接使用的命令行选项和工具。你还可以运行：\n\n```\n./gradlew --help\n```\n\n来获取所有命令行选项和工具的详尽列表。首先值得探索的一个非常有用的选项是性能分析选项，它可以查看构建应用程序时哪些操作耗费了时间。调用它并查看结果，如下面的代码清单\
  \ 6-1 所示。\n\n```\nWelcome to Gradle 6.1.1.\nTo run a build, run gradlew  ...\nTo\
  \ see a list of available tasks, run gradlew tasks\nTo see a list of command-line\
  \ options, run gradlew --help\nTo see more detail about a task, run gradlew help\
