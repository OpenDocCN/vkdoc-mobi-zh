  清单 12-4

  activity_color_twopane.xml 布局

  ```


  与拼接在一起的单独布局相比，唯一的区别在于`android:layout_weight`的值，这些值将用于管理两个片段在同一个 Activity 中同时呈现时所占据的屏幕空间比例。通过选择
  1:3 的比例，主列表片段将获得四分之一的屏幕空间，而详情片段则占据剩余的四分之三。


  ### 选择要填充的布局


  您的 Android 应用程序如何决定使用哪个布局以及显示哪些片段的排列方式？答案在于使用项目中`res/`资源文件夹层次结构中的多个`refs.xml`文件。在我们的示例中，`res/values-large`和`res/values-sw600dp`文件夹中各有一个`refs.xml`文件。


  当代码运行时，Android 会在运行时检查所有不同的尺寸特定`res/`目录（数量可能不止两个，正如您在本书前面探索 Android 项目结构时所看到的）中是否存在任何尺寸特定的
  XML 资源。对于大屏幕和`sw600dp`尺寸的屏幕，`refs.xml`中只有一个子元素，如下所示：


  ```

  @layout/activity_color_twopane

  ```


  任何被 Android 归类为"large"或满足`sw600dp`分辨率标准的屏幕，都会触发 Android 使用来自同名 XML 文件的`activity_color_twopane`布局。


  ### 为片段编写代码


  在为基于片段的应用程序编写代码时，需要注意的差异非常少。主要的不同之处在于我们之前在第 11 章中介绍的生命周期相关回调，以及您以 UI 为核心的逻辑和任何相关的数据处理将转移到片段级别。您的
  Activity 仍然存在，它们处理 Activity 生命周期事件和跨片段功能性的逻辑也保持不变。


  我们的`ColorListActivity`是使用片段时编码负担较低的一个绝佳示例。清单 12-5 显示了应用程序的完整逻辑，包括处理应用程序在父 Activity
  中最终显示为一个还是两个片段的情况。


  ```

  package org.beginningandroid.colorfragmentexample;

  import android.content.Intent;

  import android.os.Bundle;

  public class ColorListActivity extends FragmentActivity

  implements ColorListFragment.Callbacks {

  private boolean mTwoPane;

  @Override

  protected void onCreate(Bundle savedInstanceState) {

  super.onCreate(savedInstanceState);

  setContentView(R.layout.activity_color_list);

  if (findViewById(R.id.color_detail_container) != null) {

  mTwoPane = true;

  ((ColorListFragment) getSupportFragmentManager()

  .findFragmentById(R.id.color_list))

  .setActivateOnItemClick(true);

  }

  }

  @Override

  public void onItemSelected(String id) {

  if (mTwoPane) {

  Bundle arguments = new Bundle();

  arguments.putString(ColorDetailFragment.ARG_ITEM_ID, id);

  ColorDetailFragment fragment = new ColorDetailFragment();

  fragment.setArguments(arguments);

  getSupportFragmentManager().beginTransaction()

  .replace(R.id.color_detail_container, fragment)

  .commit();

  } else {

  Intent detailIntent = new Intent(this, ColorDetailActivity.class);

  detailIntent.putExtra(ColorDetailFragment.ARG_ITEM_ID, id);

  startActivity(detailIntent);

  }

  }

  }

  ```


  清单 12-5

  ColorListActivity 的代码




  ### ColorFragmentExample 示例


  总体而言，逻辑非常直接。当调用 `onCreate()` 时，我们将 `activity_color_list` 布局加载到用户界面中。接着，我们通过测试来判断
  `color_detail_container` 视图对象是否已被实例化（无论其是否显示）。这为我们提供了一个代理，用于根据 Android 的屏幕检测规则和我们的
  `refs.xml` 规则，判断应用程序是否在 `activity_color_twopane` 布局内运行。如果在此状态下运行，我们将布尔值 `mTwoPane`
  设置为 true，并使用 `getSupportFragmentManager()` 通过 `setActivateOnItemClick()` 方法设置点击处理。


  然后，重写的 `onItemSelected()` 方法负责判断当用户点击一种颜色时该执行什么操作。我们是应该使用 `color_detail_fragment`
  布局及 `ColorDetailFragment.java` 中的关联代码创建一个额外的 fragment，还是应该触发 `startActivity()`，并显式调用
  `color_detail_activity` 布局及关联的 `ColorDetailActivity.java` 代码？


  `Ch12/ColorFragmentExample` 中的源代码还展示了显示颜色细节的机制以及辅助类 `ColorContent`，它只是一个用 Java 封装颜色项目集和一些管理函数的方法（请记住，Android
  对 Java 的支持尚未超越 Java 8，因此像数据类这样更现代的方法不可用）。其他可以提供此列表的选项包括 Content Provider 或其他数据源。


