  \ SQLite 数据库交互的常用方法。`execSQL()`方法有众多参数和返回信息的变体，但最直接的方式是接收一个`String`类型的 SQL 语句作为参数，该语句即由\
  \ SQLite 库执行的 SQL 命令。通常情况下，SQL 语句执行成功不会提供返回值——这正是“没有消息就是好消息”原则的体现。\n\n用于`execSQL()`调用的每条\
  \ SQL 语句，都是在类顶部的常量声明中构建的。这种基于常量的语句构建方式并非新概念，但此处使用的几个额外常量值得注意：\n\n*   三个`COLNO_*`常量各自代表我所定义的表中列的列号（或序数位置）。因此，`_id`列（将在下文讨论）位于位置\
  \ 0，`model_name`列位于位置 1，依此类推。这些位置对于某些隐式使用表默认列顺序返回数据的 SQLite 辅助方法很重要。\n\n*   `TABLE_COLUMNS`是一个`String`数组，包含了表中各列的名称。我们即将探索的许多方法都会用到这个名称集合。\n\
  \n回到表中的`_id`列，它利用了 SQLite 的自增特性，为每一行生成一个唯一的整数值，作为表的主键。`_id`这个名称是许多内置 Android 工具、辅助类和方法所使用和期望的约定。我建议你为所有\
  \ SQLite 表都沿用这种设计传统，至少在你充分理解不同做法所带来的后果之前应如此。\n\n通过`execSQL()`调用的下一条 SQL 语句是`INITIAL_DATA_INSERT`语句。该语句执行多行插入，用于向我们模式中的唯一一张表填充初始数据集。这种数据播种完全是可选的，你肯定会遇到需要这样做的情况，当然也会有不需要的时候。插入语句所使用的语法仅在较新版本的\
  \ SQLite 中受支持，因此也仅限于较新版本的 Android。有关 SQLite 版本、特性与 Android 版本之间更详细的对应关系，请查阅本书网站[`www.beginningandroid.org`](http://www.beginningandroid.org)上的补充材料。\n\
  \n辅助类中的最后一个方法是`onUpgrade()`的框架。在示例应用中，我们处理的是应用的第一版（`DBVERSION` 等于 1，并在构造函数调用中使用）。我留下了一个逻辑框架，你可以利用它来处理提供的`oldVersion`和`newVersion`值，从而决定在应用升级过程中可能需要哪些模式变更、数据变更或其他修改操作。谈到数据库模式升级，你会在网上看到许多示例，其中人们只是简单地删除并重新创建数据库作为`onUpgrade()`的实现。这是一种实用的\
  \ hack 方法，但仅在你不关心用户数据时才能在一定程度上有效！如果你期望用户存储任何有价值的数据，并且希望在数据库模式升级后仍保留这些数据，请警惕这种方法！\n\
  \n## 创建数据库驱动的 Activity\n\n理解了`SQLiteOpenHelper`类的用途和结构后，你就可以使用它来构建一个有用的数据库驱动应用了。在`Ch20/SQLiteExample`应用中，你将看到如代码清单\
  \ 20-3 所示的逻辑。这份代码清单相当长，不过我省略了我编写的另一个名为`DialogWrapper`的辅助类，从而节省了篇幅。请继续阅读 Java 代码以及随后的逻辑详解。\n\
