- "# 使用`EditText`编辑和输入文本  \n\n在你迄今对 Android 控件的探索中，你已经了解了静态文本标签、可触发活动的按钮以及显示图像的方法。几乎每个应用程序在某个时刻都需要用户输入，而输入通常是文本。没有某种可编辑表单或字段控件的控件集是不完整的，Android\
  \ 通过`EditText`控件满足了这一需求。  \n\n`EditText`的类层级结构显示它派生自你已经熟悉的`TextView`类，并最终派生自`View`类。作为`TextView`的子类，`EditText`继承了你在`TextView`中见过的许多能力、方法和数据成员，例如`textAppearance`。`EditText`还引入了一系列新的属性和特性，使你能精细控制文本字段的外观和行为。这些新属性包括：\
  \  \n\n1. `android:singleLine`：管理回车键的行为，确定回车键是应在文本字段内创建新行，还是将焦点移动到活动布局中的下一个控件。 \
  \ \n2. `android:autoText`：管理内置拼写校正功能的使用。  \n3. `android:password`：配置字段，在输入字符时显示密码圆点。\
  \  \n4. `android:digits`：限制输入仅接受数字，隐藏字母类型的字符。  \n\nAndroid 还提供了一种更细致——有人会说更精密——的方法来指定`EditText`的字段特性。可以使用`inputType`属性，将`EditText`字段的所有期望属性和特性集中在一起。我们将在第\
  \ 10 章中介绍`inputType`以及键盘和输入方法的相关主题。清单 9-6 展示了`inputType`与其他选项配合使用的情况。  \n\n清单 9-6\
  \ 展示了`android:inputType`属性的基本用法，此处标记用户文本应自动将第一个单词的首字母大写。我们还使用了常规属性`android:singleLine`并设置为\
  \ false，从而在`EditText`字段中启用多行文本。  \n\n```  \n清单 9-6  \n使用 XML 属性配置 EditText 字段的行为\
  \  \n```  \n\n清单 9-7 展示了如何通过附带的 Java 包以编程方式操作`EditText`字段。你可以在`Ch09/EditTextExample`中找到此示例。\
  \  \n\n```  \npackage org.beginningandroid.edittextexample;  \nimport androidx.appcompat.app.AppCompatActivity;\
  \  \nimport android.os.Bundle;  \nimport android.widget.EditText;  \npublic class\
  \ MainActivity extends AppCompatActivity {  \n@Override  \nprotected void onCreate(Bundle\
  \ savedInstanceState) {  \nsuper.onCreate(savedInstanceState);  \nsetContentView(R.layout.activity_main);\
  \  \nEditText myfield=(EditText)findViewById(R.id.myfield);  \nmyfield.setText(\"\
  Our EditText widget\");  \n}  \n}  \n清单 9-7  \nEditText 控件可以轻松地从代码中操作  \n```  \n\
  \n请注意，我们在该清单中引入了`findViewById`方法。你可以想象，当你有任意数量的控件时，你需要一种编程方式来找到程序逻辑中要操作的那个控件。通过使用`R.id.named_id_from_XML_definition`形式的资源\
  \ ID 引用，你可以隐式地查找并链接到 XML 布局中通过该控件的`android:id`属性定义的匹配控件。因此，在此例中，`R.id.myfield`查找并匹配你的`EditText`的`android:id`，即`@+id/myfield`。\
  \  \n\n你可以在图 9-6 中看到`EditText`示例的结果。  \n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig6_HTML.jpg](img/499629_1_En_9_Fig6_HTML.jpg)\
  \  \n\n**图 9-6**  \n`EditText`控件运行中，通过键盘完整编辑文本  \n\n还有其他典型迹象表明这是一个可编辑字段。内置的字典和拼写检查器可用——尝试拼错一个单词，它将以红色下划线显示。当字段获得文本输入焦点时，闪烁的光标也显而易见。你还可以通过选择称为`AutoCompleteTextView`变体（同样继承自`TextView`和`View`）的兄弟控件来帮助用户更快地输入，它会在用户输入时提示自动补全的建议词。\
  \  \n\n> **注意**  \n> 在使用`EditText`控件时，你可以通过使用名为`TextInputLayout`的布局实现更精密的功能，该布局包装并扩展了默认的`EditText`行为，提供了文本提示、高亮、帮助提示等功能。你可以在`developer.android.com`上找到更多关于`TextInputLayout`的信息。\
  \  \n\n"
- "# 初探`CheckBox`  \n\nAndroid 中另一个经典的 UI 控件是`CheckBox`，它提供了一种二元开关/是/否/选中/未选中的控件。`CheckBox`是`View`（你猜对了）和`TextView`（这可能会让你惊讶）的子类。这种类继承关系意味着你可以通过继承获得一系列有用的属性。`CheckBox`对象为你提供了一些\
  \ Java 辅助方法，用于对复选框执行有用的操作：  \n\n1. `toggle()`：切换`CheckBox`的状态  \n2. `setChecked()`：无论当前状态如何，都选中（设置）`CheckBox`\
  \  \n3. `isChecked()`：用于检查`CheckBox`是否被选中的方法  \n\n在清单 9-8 中，我们有一个示例复选框布局及简单的附带 Java\
  \ 逻辑，你可以在`Ch09/CheckboxExample`项目中找到它。  \n\n```  \n清单 9-8  \n一个包含 CheckBox 的布局 \
  \ \n```  \n\n虽然一个略显吸引人的`CheckBox`单独看起来可能不错，但它真正需要*做*些什么，才能对你或你的用户有用。我们通过添加 Java\
  \ 逻辑来配合布局，从而释放`CheckBox`的能力。清单 9-9 是演示如何将逻辑链接到复选框的 Java 包。  \n\n```  \npackage org.beginningandroid.checkboxexample;\
  \  \nimport androidx.appcompat.app.AppCompatActivity;  \nimport android.os.Bundle;\
  \  \nimport android.widget.CheckBox;  \nimport android.widget.CompoundButton;  \n\
  import android.widget.CompoundButton.OnCheckedChangeListener;  \npublic class MainActivity\
  \ extends AppCompatActivity {  \nCheckBox myCheckbox;  \n@Override  \nprotected\
  \ void onCreate(Bundle savedInstanceState) {  \nsuper.onCreate(savedInstanceState);\
  \  \nsetContentView(R.layout.activity_main);  \nmyCheckbox = (CheckBox)findViewById(R.id.check);\
  \  \nmyCheckbox.setOnCheckedChangeListener(new OnCheckedChangeListener() {  \n@Override\
  \  \npublic void onCheckedChanged(CompoundButton buttonView, boolean isChecked)\
  \ {  \nif (buttonView.isChecked()) {  \nmyCheckbox.setText(\"The checkbox is checked\"\
  );  \n}  \nelse  \n{  \nmyCheckbox.setText(\"The checkbox is unchecked\");  \n}\
  \  \n}  \n});  \n}  \n}  \n清单 9-9  \n用一些编程逻辑启动 CheckBox  \n```  \n\n\n\n\n显然，这里的\
  \ `CheckBox` 代码比之前的 `EditText` 等示例要复杂一些。首先看看导入的类，就能对发生的事情有所了解。我导入了 `OnCheckedChangeListener`\
  \ 并提供了 `onCheckedChanged()` 回调方法的实现。这意味着我们将 `CheckBox` 设置为其自身状态变更事件（如被点击）的事件监听器。当用户点击\
  \ `CheckBox` 进行切换时，`onCheckChanged()` 回调会被触发。我们回调实现中的逻辑会测试切换后 `CheckBox` 的当前状态，并用文字描述更新复选框的文本，以反映其新状态。这是一种很好的方式，可以将小部件的所有行为集中在一个地方，并让我们能够在用户输入时的同一逻辑流中执行表单验证等操作，而无需传递一堆用户或数据状态。你的代码和相关的运行时输入检查将优雅地并排呈现。\n\
  \n图 9‑7 和图 9‑8 展示了我们的 `CheckBoxExample` 应用在选中和未选中状态下的界面。\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig8_HTML.jpg](img/499629_1_En_9_Fig8_HTML.jpg)\n\
  \n**图 9‑8：** 复选框现在处于选中状态。\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig7_HTML.jpg](img/499629_1_En_9_Fig7_HTML.jpg)\n\
  \n**图 9‑7：** 复选框处于未选中状态。\n\n## 用 Switch 进行切换\n\n`Switch` 小部件是在 Android 开发后期引入的，但其用途正如其名。`Switch`\
  \ 就像一个二元开关，提供开/关式状态，用户可以通过手指滑动或拖动来激活它，就像拨动电灯开关一样。用户也可以像对待 `Checkbox` 一样，直接点击 `Switch`\
  \ 小部件来改变其状态。在 Android 的多个版本中，`Switch` 小部件经过了调整以解决兼容性和其他问题，因此有时会使用 `SwitchCompat`\
  \ 等其他变体来代替原始的 `Switch` 小部件，但总体用途和处理方式类似。\n\n除了从 `View` 等继承的属性外，`Switch` 小部件还提供了\
  \ `android:text` 属性，用于显示与 `Switch` 状态关联的文本。该文本通过两个辅助方法 `setTextOn()` 和 `setTextOff()`\
  \ 进行控制。\n\n`Switch` 小部件还有其他可用方法，包括：\n\n1.  `setChecked()`：将当前 `Switch` 状态更改为开（就像\
  \ `Checkbox` 一样）。\n2.  `getTextOn()`：返回开关打开时使用的文本。\n3.  `getTextOff()`：返回开关关闭时使用的文本。\n\
  \n`Ch09/SwitchExample` 项目提供了一个 `Switch` 的工作示例。清单 9‑10 展示了一个简单的开关布局。\n\n```\n清单 9‑10：SwitchExample\
  \ 的布局。\n```\n\n> **注意：**  \n> 不要试图将你的 `android:id` 设置为“switch”，例如 `@+id/switch`。Java\
  \ 保留 `switch` 一词用于其 case 风格的分支逻辑语句，因此你需要像本示例中那样使用其他名称。\n\n配置开关行为的逻辑位于我们的 Java 代码中，如清单\
  \ 9‑11 所示。\n\n```\npackage org.beginningandroid.switchexample;\nimport androidx.appcompat.app.AppCompatActivity;\n\
  import android.os.Bundle;\nimport android.widget.Switch;\nimport android.widget.CompoundButton;\n\
  import android.widget.CompoundButton.OnCheckedChangeListener;\npublic class MainActivity\
  \ extends AppCompatActivity {\n    Switch mySwitch;\n    @Override\n    protected\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.activity_main);\n        mySwitch = (Switch) findViewById(R.id.switchexample);\n\
  \        mySwitch.setOnCheckedChangeListener(new OnCheckedChangeListener() {\n \
  \           @Override\n            public void onCheckedChanged(CompoundButton buttonView,\
  \ boolean isChecked) {\n                if (buttonView.isChecked()) {\n        \
  \            mySwitch.setText(\"The switch is on\");\n                } else {\n\
  \                    mySwitch.setText(\"The switch is off\");\n                }\n\
  \            }\n        });\n    }\n}\n清单 9‑11：在代码中控制开关行为。\n```\n\n如果这段代码结构和逻辑看起来眼熟，那就对了！从概念上讲，`Switch`\
  \ 和 `CheckBox` 几乎相同，并且对它们进行操作时的逻辑，至少在入门级别，几乎是可互换的。你可以在图 9‑9 和 9‑10 中看到开关在开启和关闭状态下的实际效果。\n\
  \n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig10_HTML.jpg](img/499629_1_En_9_Fig10_HTML.jpg)\n\
  \n**图 9‑10：** 开关已打开，逻辑已触发以更改其文本。\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig9_HTML.jpg](img/499629_1_En_9_Fig9_HTML.jpg)\n\
  \n**图 9‑9：** 开关小部件处于关闭位置。\n\n## 使用单选按钮选择项目\n\n在结束对 Android 核心 UI 小部件的详细探讨之前，是时候介绍\
  \ `RadioButton` 了。与大多数其他小部件工具包一样，Android 的 `RadioButton` 共享了你在 `CheckBox` 和 `Switch`\
  \ 小部件中已经体验过的双状态逻辑，并且通过同样是 `View` 和 `CompoundButton` 的子类，获得了许多相同的特性。正如你在之前的示例中看到的那样，你可以通过\
  \ `toggle()` 和 `isChecked()` 等方法设置或测试状态，并通过样式属性控制文本大小、颜色等。\n\nAndroid 的 `RadioButton`\
  \ 小部件进一步扩展了这些能力，它增加了一层额外的功能，允许将多个单选按钮分组到一个逻辑集合中，并且任何时候只允许设置其中一个按钮。如果你在近年使用过任何其他\
  \ UI 工具包、网页或智能手机应用，这听起来应该很熟悉。为了对多个 `RadioButton` 进行分组，在 XML 布局中，每个按钮都被添加到一个称为 `RadioGroup`\
  \ 的容器元素中。\n\n与其他小部件一样，你可以通过 `android:id` 属性为 `RadioGroup` 分配一个 ID，并以该引用为起点，利用整个\
  \ `RadioButton` 组上可用的方法。这些方法包括：\n\n1.  `check()`：通过 ID 选中/设置特定的单选按钮，无论其当前状态如何。\n\
  2.  `clearCheck()`：清除 `RadioGroup` 中的所有单选按钮。\n3.  `getCheckedRadioButtonId()`：返回当前选中的\
  \ `RadioButton` 的 ID（如果没有 `RadioButton` 被选中，则返回 `-1`）。\n\n清单 9‑12 展示了一个包含 `RadioButton`\
  \ 的 `RadioGroup` 布局。\n\n```\n清单 9‑12：RadioButton 和 RadioGroup 布局。\n```\n\n你还可以在\
  \ `RadioGroup` 结构中穿插添加其他小部件，它们将根据 `ConstraintLayout` 的约束规则或我们将在下一章讨论的其他布局放置规则在组内渲染。你可以在图\
  \ 9‑11 中看到基本的 `RadioButton` 的实际效果。\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig11_HTML.jpg](img/499629_1_En_9_Fig11_HTML.jpg)\n\
  \n**图 9‑11：** `RadioGroup` 和 `RadioButton` 的实际效果。\n\n## 学习更多 UI 小部件\n\n\n\nAndroid\
  \ 平台上总有许多新的微件等待你去学习或掌握，你可以在网站 [`www.beginningandroid.org`](http://www.beginningandroid.org)\
  \ 上找到更多示例。在这里，你将看到诸如以下微件的更多示例：\n\n1. `Slider`（滑块）\n2. `AnalogClock`（模拟时钟）\n3. `DigitalClock`（数字时钟）\n\
  \n我们还会在第 13 章和第 14 章中介绍更多侧重于音频和视频的微件。\n\n## 本章小结\n\n在本章中，你已经了解了构建 Android 用户界面时可用的许多基础微件（或称视图）。下一章，我们将进一步探讨用户界面设计概念，并介绍布局。布局作为一种容器和框架，用于在\
  \ Activity 及其他用户界面中放置、组织和嵌套你的微件。\n\n"
- "# 10. 探索 Android 概念：布局与更多内容\n\n理解 Android 中提供的各种 UI 微件，确实能让你对应用中的特定功能和行为的呈现方式做出多种设计选择。然而，Activity\
  \ 的设计远不止选择单选按钮或 `TextView`。布局是 Android 的一种声明式机制，它让你能够完全掌控应用的屏幕显示布局。从概念上讲，布局既是你在应用或\
  \ Activity 中希望使用的微件的容器，也是一份蓝图和框架，规定了所有微件应如何显示、交互以及相互配合。当你开始构思使用超过一两个微件的设计方案时，你会希望借助布局的强大功能，从而避免手动控制位置、缓冲区和空白区域、分组等繁琐工作。\n\
  \n在接下来的部分中，我们将回顾一些 Android 支持的最有用、最流行的布局类型，而网站上则包含了一些更专业或较少使用的布局的更多示例。\n\n### 什么是\
  \ Android Jetpack\n\n任何对 Android 设计的粗略搜索或回顾，都会浮现出一些有趣的里程碑，有些人甚至会称之为 Android 近期发展史上的分岔路口。你很可能会从近几年的搜索结果中看到两个专业术语。首先，你会看到“Material\
  \ Design”这个术语，这是谷歌在 2012 年向世界推出的一种样式和设计理念，它影响着 Android 中的默认调色板、微件样式以及其他设计特性。第二个你会遇到的术语是“Android\
  \ Jetpack”，毫无疑问，你会看到关于它如何让设计（包括布局）变得“更简单”、“更好”以及“全新且与众不同”的评论。这些说法没错，但它们可能会给新开发者带来一些困惑。我是否在使用\
  \ Jetpack？我怎么才能“获得”Jetpack？等等。\n\n在 2018 年的 Google I/O 开发者大会上，谷歌推出了 Android Jetpack。抛开这些宣传，你会发现\
  \ Jetpack 本身并非什么“不同”的东西，而是对许多零散的 Android UI 框架组件和基础元素的一次重新打包，以及对 Android 支持库的一次修订和扩展后的方法。Jetpack\
  \ 并不是另一种构建事物的竞争方式。相反，它几乎会渗透到你所做的所有事情中，从引用 `androidx` 命名空间中的任何库，到管理向后兼容性和对历史版 Android\
  \ 的支持。因此，你实际上并不是“添加”Jetpack 到你的设计工作中。相反，当你利用那些在构建应用和借助 Android Studio 帮助时自然会用到的功能时，它会隐式地、几乎是自动地介入进来。\n\
  \n在 `android.com` 网站上，谷歌提供了对 Android Jetpack 旗下内容的快速概览。被纳入 Jetpack 旗下的现有 Android\
  \ 部分分为四个领域：\n\n1.  基础组件\n2.  架构组件\n3.  行为组件\n4.  UI 组件\n\n谷歌提供了图 10-1 所示的图表（来源：android-developers.googleblog.com/2018/05/use-android-jetpack-to-accelerate-your.html），用以展示这四个领域中\
  \ Android Jetpack 的特定部分。\n\n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig1_HTML.jpg](img/499629_1_En_10_Fig1_HTML.jpg)\n\
  \n**图 10-1** 理解 Android Jetpack 的概念组件 (¹)\n\n如果你从这一节只带走一个观点，那就是你不必担心问自己“我是不是在使用\
  \ Jetpack？”，因为你肯定已经在用了！你可能没有使用所有的特性和功能组，但也没必要试图去全部使用。\n\n### 使用流行的布局设计\n\n在接下来的小节中，我们将介绍以下主要的布局容器：\n\
  \n1.  `ConstraintLayout`：当前 Android 新项目的默认布局，是 Jetpack 的一部分。它使用最少的定位约束来表达微件，且没有（或几乎没有）树状层次结构。\n\
  2.  `RelativeLayout`：从 Android 4.0 到引入 Jetpack 和 `ConstraintLayout` 之前的多年间使用的默认布局。它采用规则引导的方法来实现\
  \ UI 元素的自动排列。\n3.  `LinearLayout`：最初的默认布局，在许多早期的 Android 应用中普遍使用。它遵循传统的盒模型，将所有微件想象为彼此嵌套或并列的盒子。\n\
  \n在本书的网站 [`www.beginningandroid.org`](http://www.beginningandroid.org) 上，你还会找到关于\
  \ Android 提供的其他布局的补充材料，包括：\n\n1.  `TableLayout`：一种类似网格的方法，类似于在 Web 开发中使用 HTML 表格。\n\
  2.  `GridLayout`：与 `TableLayout` 看似相似，`GridLayout` 使用任意精度的网格线将你的显示区域分割成越来越具体的区域，以便在其中放置微件。\n\
  \n在讨论了这些主题之后，我们将转向如何从 Java 代码中操作 XML 布局，并通过对 ButtonExample 应用的修改版本来演示如何在代码中查找和处理你的布局。\n\
  \n> **注意**  \n> 虽然本章我们将花大量篇幅讨论布局的 XML，但请始终记住，图形布局编辑器拥有设计模式，允许你直观地添加微件、放置和排列它们、设置关系等等。虽然你很可能总是混合使用手写\
  \ XML 和布局编辑器，但随着你开始偏好某一种方法，不时地切换到“另一种”方法也是值得的。这也是学习布局 XML 更多细微差别的好方法，通过观察当你使用图形布局编辑器时，Android\
  \ Studio 在自动生成的 XML 中做了什么。\n\n### 重新审视约束布局\n\n在前面的章节中，你已经通过非常基础的 `ConstraintLayout`\
  \ 设计实践过，包括你的 `MyFirstApp` 和第 9 章中的许多微件示例。虽然你可以继续将 `ConstraintLayout` 用作微件的简单容器，为\
  \ Android 提供约束设置以便其为你管理布局，但 `ConstraintLayout` 还有一些更高级的特性，你绝对应该了解并探索，以使你的 Activity\
  \ 设计更上一层楼。\n\n`ConstraintLayout` 提供了许多非常令人兴奋的特性，但我想重点介绍其中三个最新、最有用的特性。\n\n\n\n####\
  \ 进入流动布局\n\n随着 Android 的最新更新，`ConstraintLayout` 新增了一项可选功能，可以像倾倒一样将界面中的小部件“流动”排列在屏幕上，并能根据特定设备的界面尺寸和密度，在运行时自动换行和调整小部件的位置。\n\
  \n用 Flow 的术语来说，您可以将小部件集合链接到一个虚拟的 Flow 布局中，该布局充当基础 `ConstraintLayout` 的辅助工具。在布局 XML\
  \ 文件中，通过 `<androidx.constraintlayout.helper.widget.Flow>` 元素来指定分组的 Flow 链式连接，然后由两个关键属性控制\
  \ Flow 的链式连接及其行为。\n\n第一个属性是 `app:constraint_referenced_ids`，它接受一个逗号分隔的小部件 ID 字符串，告知\
  \ Android 界面中的哪些部分被分组到特定的虚拟 Flow 布局中。\n\n第二个属性是 `app:flow_wrapMode`，它接受三个字符串值之一，用于指示\
  \ Android 如何管理 Flow 组中小部件的流动。`app:flow_wrapMode` 的可能取值及相关行为如下：\n\n1.  `none`：默认方式——为组内所有小部件创建单一的逻辑链，如果小部件超出活动（Activity）的尺寸，则会溢出。\n\
  2.  `chain`：如果发生溢出，则将溢出的小部件添加到后续的链中进行容纳。\n3.  `align`：与 chain 方式大致相似，区别在于会将行对齐成列。\n\
  \n熟悉 `ConstraintLayouts` 中的 Flow 选项非常容易。清单 10-1 显示了 `Ch10/FlowExample` 项目中 `FlowExample`\
  \ 的相关布局 XML 文件。\n\n```\n清单 10-1\n在 ConstraintLayout 中设置 Flow\n```\n\n`FlowExample`\
  \ 布局非常简单。我们有三个 `TextView`，它们通过约束进行定义，正常情况下你会（尝试）先放置 `text1 TextView`，然后在它右侧放置 `text2\
  \ TextView`，再在 `text2` 右侧放置 `text3 TextView`。我特意选择了长文本和大字体来演示我的观点。在布局底部，你会看到在 `<androidx.constraintlayout.helper.widget.Flow>`\
  \ 元素中定义的 Flow，其中我将 `flow_wrapMode` 指定为 `chain`，并将组的引用 ID 设置为 `\"text1, text2, text3\"\
  `——也就是我的 `TextView` ID。\n\n如果我省略了虚拟的 Flow 布局（参见控制此功能的 XML 布局中的注释），Android 会尝试按照常规的\
  \ `ConstraintLayout` 规则渲染活动，结果如图 10-2 所示。\n\n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig2_HTML.jpg](img/499629_1_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** 没有 Flow 时，ConstraintLayout 将小部件渲染到屏幕之外\n\n你可以立刻发现问题。我特意使用了一个屏幕尺寸较小的\
  \ AVD。我的 `text1 TextView` 正常渲染，`text2` 的一半也显示在了屏幕上。但 `text2` 的其余部分被截断了，`text3` 则完全不可见。实际上，它已经被渲染，但由于布局没有\
  \ Flow 选项来适应屏幕尺寸，因此不可见。你可以尝试在多种不同屏幕尺寸的 AVD 上运行移除了 Flow 元素的示例，看看小部件在何处以及如何被截断或无法显示。\n\
  \n在添加 Flow 元素后，重新运行 `FlowExample` 应用，Flow 的能力立刻显现。图 10-3 显示了同样的三个 `TextView`，但这次有了虚拟\
  \ Flow 布局的帮助，Android 能够遵循我指定的链式规则，将小部件流动到新行中，从而完整显示布局中的所有内容。\n\n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig3_HTML.jpg](img/499629_1_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3** 使用 Flow 后，ConstraintLayout 渲染出了所有内容\n\nFlow 是一个极易掌握的全新功能。你可以获取 `FlowExample`\
  \ 示例代码，开始添加更多小部件，扩展 Flow 引用 ID 集合，甚至可以更改 `flow_wrapMode`，以观察 Flow 的行为。\n\n#### 使用\
  \ Layer 进行分层\n\nLayer 将小部件和视图的自适应能力向前推进了一步。在界面设计中，“Layer” 这个名称的用法非常多，所以需要明确说明：Layer\
  \ 并不直接布局小部件，也不帮助构建一系列 UI 组件的“堆叠”。通过扩展 `ConstraintLayout` 并使用 Layer，你可以获得一种统一的方法，通过单一机制来旋转、平移和缩放一组小部件和视图。\n\
  \n举个例子，你可能正在开发一个图形化的拼图游戏，并希望弱化用户当前未选中的任何图片块。借助 Layer，你可以将所有其他 `ImageView` 小部件添加到同一个\
  \ Layer 中，从而对它们应用相同的布局更改，然后将所需的变换一次性应用到 Layer 上，Layer 会将其应用到其组成的小部件上。\n\n#### 使用\
  \ Motion 实现动画\n\n最新版本 Android 中备受关注的一个功能是 `ConstraintLayout` 的扩展——`MotionLayout`。通过\
  \ `MotionLayout`，你可以将各种静态视图变得生动，通过定义和使用 `ConstraintSets` 来构建动画变化，例如旋转、淡入淡出、尺寸变化等。本质上，描述小部件和视图如何关联与定位的约束本身，就可以被视为控制运动和流动的变量。\n\
  \n手动构建基于 `MotionLayout` 的应用及其使用的各种 `ConstraintSet` 配置可能非常繁琐。考虑到这一点，Google 在 Android\
  \ Studio 中引入了 Motion 编辑器，为你提供了一个动画画布，用于构建引人入胜的动画布局。\n\n为了在 Motion 编辑器中开始使用 Motion\
  \ 和 `MotionLayout` 设计，Android 引入了 `androidx.constraintlayout.motion.widget.MotionLayout`\
  \ 作为 `ConstraintLayout` 的变体。`MotionLayout` 仍处于早期阶段，存在不少粗糙之处和手动设置步骤，并且会随着 Android\
  \ Studio 的小版本更新而频繁变更。带有运动效果的布局也不适合在像本书这样的静态书籍中展示。\n\n因此，为了确保你能获得关于 `MotionLayout`\
  \ 的最新教程，并且能够看到这些选项如何在动态、运动的布局中发挥作用，相关教程和 `MotionExample` 演示可从网站 [`www.beginningandroid.org`](http://www.beginningandroid.org)\
  \ 获取。\n\n### 使用相对布局\n\n`RelativeLayout` 长期以来一直是 Android 的默认布局，并且仍然是活动和片段设计的流行选择。正如“相对”一词所暗示的，`RelativeLayout`\
  \ 利用小部件之间以及小部件与父活动之间的关系来控制小部件的布局。这种相对概念很容易理解，例如，你可以规定一个小部件相对于另一个小部件的位置放置在其下方，或者使其顶部边缘与某个相关小部件对齐等等。\n\
  \n所有这些关系设置都使用一组标准化的属性，这些属性定义在布局 XML 文件中的小部件 XML 定义中。\n\n#### 相对于父容器放置小部件\n\n理解 `RelativeLayout`\
  \ 的一个良好起点是探索那些允许你相对于父容器定位小部件的属性。有一组核心属性可用于基于父容器（例如活动）及其顶部边缘、底部边缘、侧边等来锚定位置。这些属性包括：\n\
  \n1.  `android:layout_alignParentTop`：将小部件的顶部边缘与容器的顶部对齐。\n2.  `android:layout_alignParentBottom`：将小部件的底部边缘与容器的底部对齐。\n\
  \n\n\n### 3. `android:layout_alignParentStart`：将微件的起始侧与容器的左侧对齐，适用于考虑从右到左和从左到右书写脚本的情况。例如，在美式英语的从左到右布局中，这将控制微件的左侧。\n\
  \n### 4. `android:layout_alignParentEnd`：将微件的结束侧与容器的左侧对齐，适用于考虑从右到左和从左到右书写脚本的情况。\n\
  \n### 5. `android:layout_centerHorizontal`：将微件水平居中放置在容器中。\n\n### 6. `android:layout_centerVertical`：将微件垂直居中放置在容器中。如果您希望同时水平和垂直居中，可以使用组合属性`layout_centerInParent`。\n\
  \n在确定微件边缘的最终位置时，会考虑各种其他属性，包括内边距和外边距宽度。如果您要进行像素级的精确相对定位，请务必注意这些属性。\n\n#### 使用 ID\
  \ 控制相对布局属性\n\n为`RelativeLayout`正确引用微件的关键在于使用被引用微件的标识符，这一点您已经遇到过：即微件的`android:id`标识符。例如，在之前章节的`ButtonExample`项目中，按钮的标识符为`@+id/button`。为了进一步控制微件的布局并描述它们相对于布局中其他微件的位置，您需要提供布局容器中微件的标识符。这可以通过在任何您想要引用的微件上使用`android:id`标识符属性来实现。\n\
  \n首次引用`android:id`值时，请确保使用加号修饰符（例如`@+id/button`）。后续对同一标识符（微件）的引用可以省略加号。在首次引用标识符时使用加号有助于\
  \ Android 代码检查工具检测标识符不匹配的情况，即您未在布局文件中正确命名微件的情况。可以将其视为在使用变量前先声明变量。\n\n有了 ID 之后，我们之前的示例`@+id/button`现在可以被另一个微件（例如另一个名为`button2`的按钮）通过在其自身布局相关属性中引用该\
  \ ID 字符串的机制来引用。\n\n注意：像`button`、`button1`和`button2`这样简单的名称对于此类示例来说没有问题，但在您的应用程序中，您非常希望使用有意义的微件标识符和名称。\n\
  \n#### 相对定位属性\n\n现在您已经牢固掌握了标识符的机制，可以理解使用以下六个属性来控制微件相对于彼此的位置：\n\n1.  `android:layout_above`：用于将\
  \ UI 微件放置在属性中引用的微件上方。\n2.  `android:layout_below`：用于将 UI 微件放置在属性中引用的微件下方。\n3.  `android:layout_toStartOf`：用于指示该微件的结束边缘应放置在属性中引用的微件的起始边缘处。\n\
  4.  `android:layout_toEndOf`：用于指示该微件的起始边缘应放置在属性中引用的微件的结束边缘处。\n5.  `android:layout_toLeftOf`：用于将\
  \ UI 微件放置在属性中引用的微件左侧。\n6.  `android:layout_toRightOf`：用于将 UI 微件放置在属性中引用的微件右侧。\n\n\
  更微妙地，您还可以使用众多其他属性来控制微件相对于另一个微件的对齐方式。其中一些属性包括：\n\n1.  `android:layout_alignStart`：标记微件的起始边缘应与属性中引用的微件的起始边缘对齐。\n\
  2.  `android:layout_alignEnd`：标记微件的结束边缘应与属性中引用的微件的结束边缘对齐。\n3.  `android:layout_alignBaseline`：标记两个微件中任何文本的基线（无论边框或内边距如何）应对齐（详见下文）。\n\
  4.  `android:layout_alignTop`：标记微件的顶部应与属性中引用的微件的顶部对齐。\n5.  `android:layout_alignBottom`：标记微件的底部应与属性中引用的微件的底部对齐。\n\
  \n#### 使用 RelativeLayout 的示例\n\n您已经了解了`RelativeLayout`的能力和行为，足以进入一个实际示例。清单 10-2\
  \ 提供了来自`ch10/RelativeLayoutExample`项目、使用`RelativeLayout`的布局 XML。\n\n```\n清单 10-2\n\
  RelativeLayoutExample 应用程序的 XML 布局\n```\n\n在这个`RelativeLayoutExample`布局中，我们基于前几章的学习内容进行构建，以提供更丰富的理解。首先，您看到根元素是`<RelativeLayout>`，这是决定该活动将使用`RelativeLayout`方法进行布局和放置的关键因素。在常规的样板\
  \ XML 命名空间属性之上，引入了另外三个属性。\n\n为了确保`RelativeLayout`跨越所用任何尺寸屏幕上的全部可用宽度，使用了`android:layout_width=\"\
  match_parent\"`属性。高度也可以这样做，但我们也可以告诉`RelativeLayout`仅使用容纳所含微件所需的垂直空间——因此使用了`android:layout_height=\"\
  wrap_content\"`属性。\n\n借助我们在第 9 章中介绍的微件，我们为活动引入了四个元素：一个用作标签的`TextView`，一个用于可编辑字段的`EditText`，以及`OK`和`Cancel`两个按钮。\n\
  \n对于`TextView`标签，布局指示 Android 将其左边缘与父`RelativeLayout`的左边缘对齐，使用`android:layout_alignParentLeft=\"\
  true\"`。我们还希望一旦引入相邻的`EditText`，`TextView`的基线就能够自动管理，因此我们使用`android:layout_alignBaseline=\"\
  @+id/entry\"`来调用像素级微调。注意，我们引入带加号的 ID，是因为我们尚未描述`EditText`，所以需要预先告知其即将存在。\n\n对于`EditText`，我们希望它位于标签的右侧，并且自身位于布局的顶部，占用`TextView`右侧的所有剩余空间。我们使用`android:layout_toRightOf=\"\
  @id/label\"`（该 ID 已引入，因此无需添加加号标记）指示它布局到右侧。我们使用`android:layout_alignParentTop=\"\
  true\"`强制`EditText`在`RelativeLayout`的剩余空间中尽可能高地放置，并通过使用`android:layout_width=\"\
  match_parent\"`占据画布上`TextView`右侧的剩余空间。这样做是可行的，因为我们知道也要求父布局使用最大可用剩余空间作为宽度。\n\n最后，我们将两个按钮的位置绑定到之前引入的微件。我们希望`OK`按钮放置在`EditText`下方，并与它的右侧对齐，因此为其赋予属性`android:layout_below=\"\
  @id/entry\"`和`android:layout_alignRight=\"@id/entry\"`。然后我们告诉 Android 将`Cancel`按钮放置在`OK`按钮的右侧，并使两个按钮的顶部对齐，使用`android:layout_toLeft=\"\
  @id/ok\"`和`android:layout_alignTop=\"@id/ok\"`。\n\n图 10-4 展示了我们对一个全新的空活动项目进行这些布局更改后的布局效果。\n\
  \n![../images/499629\\_1\\_En\\_10\\_Chapter/499629\\_1\\_En\\_10\\_Fig4\\_HTML.jpg](img/499629_1_En_10_Fig4_HTML.jpg)\n\
  \n**图 10-4**  \n`RelativeLayout`的实际应用\n\n\n\n#### 相对布局中的重叠控件\n\nAndroid 支持的每种布局都为您提供了独特且专业的功能，而`RelativeLayout`则具备一些关键能力，包括让控件相互重叠或实现一个控件看起来位于另一个控件前方或与之重叠的效果。这是通过\
  \ Android 跟踪 XML 定义中的子元素，并为布局中的每个单独子元素应用一个图层来实现的。这意味着，如果在布局 XML 文件中靠后定义的项与较早定义的项使用了\
  \ UI 中的同一空间，那么前者将位于后者之上。\n\n没有什么比实际演示更能直观地展示这种效果以及它在应用设计中的帮助了。图 10-5 展示了一个包含两个按钮的布局，其中第二个按钮将位于第一个按钮的前方或之上。\n\
  \n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig5_HTML.jpg](img/499629_1_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5** `RelativeLayout` 的重叠特性效果演示\n\n关于你想要叠加的控件类型和数量，几乎没有任何限制。你可能也会好奇，为什么有人会想要以这种方式叠加控件。除了实现一些非传统的布局构想外，`RelativeLayout`\
  \ 的重叠可能性意味着可以让控件在屏幕上显示但处于不可见状态，同时仍然对活动行为产生影响。\n\n### 使用线性布局进行排列\n\n在设计布局时，有时你不需要或不想使用约束或相对定位这种复杂方式，而只想依赖一些久经考验的传统布局方法。任何熟悉图形设计或界面设计历史的人都会听说过盒子模型，该模型将构成界面的所有项目（或控件）视为排列成行和列的元素。`LinearLayout`\
  \ 遵循此模型，并且是早期 Android 版本使用的原始默认布局。它可能不再是当前首选的布局，但你始终可以依靠 `LinearLayout` 作为一种简单直接的选项来调整控件的排列、嵌套等。`LinearLayout`\
  \ 缺少的是我们在 `ConstraintLayout` 和 `RelativeLayout` 中讨论过的一些巧妙、省时或实用的功能，但有时简单的解决方案正是我们所需要的一切。\n\
  \n#### 掌握 `LinearLayout` 的五大主要限定符\n\n使用 `LinearLayout` 时，一组五个关键属性可帮助你控制整体布局及其中任何控件的几乎所有放置和外观方面：\n\
  \n- **方向（Orientation）**：对于 `LinearLayout`，首要且最基本的控制是确定盒子模型应被视为水平逐行填充还是垂直逐列填充。这就是\
  \ `LinearLayout` 的所谓方向，由 `android:orientation` 属性控制，其取值可以是字符串 `HORIZONTAL` 或 `VERTICAL`。方向也可以在运行时通过\
  \ Java 代码使用 `setOrientation()` 方法并传入类似参数进行设置。\n\n- **外边距（Margins）**：默认情况下，你放置的任何控件与相邻控件之间都没有缓冲或间距。外边距让你可以控制这一点，并使用\
  \ `android:layout_margin`（影响控件的所有边）或单边属性（如 `android:layout_marginTop`）等属性来添加缓冲（正如其名，即外边距）。任何外边距属性都接受像素大小作为值，例如\
  \ 10 dip。这在概念上与 `RelativeLayout` 的内边距类似，但仅当控件具有非透明背景（例如按钮）时才适用。\n\n- **填充方式（Fill\
  \ method）**：我们之前已经介绍过 `RelativeLayout` 中的 `wrap_content` 和 `match_parent` 概念。在 `LinearLayout`\
  \ 方法中，所有控件都必须通过 `android:layout_width` 和 `android:layout_height` 属性指定填充方式。这些属性可以采用以下三个值之一：`wrap_content`，根据你之前所学，这指示控件仅大到足以容纳文本或图像内容；`match_parent`，占据父布局提供的最大空间量；或者一个以设备独立像素为单位的特定像素值，例如\
  \ 125 dip。\n\n- **权重（Weight）**：当 `LinearLayout` 中的两个或多个控件都指定了 `match_parent` 时，哪个控件会获胜？它们如何都能占据父布局提供的最大空间？答案是\
  \ `android:layout_weight` 属性，它允许你为每个控件应用一个简单的数值，例如 1、2、3、4 等。Android 会累加 `LinearLayout`\
  \ 中所有控件的权重总和，然后根据每个控件在布局中所有控件总权重中所占的份额来分配 UI 空间。例如，如果我们有两个都配置为 `match_parent` 的\
  \ `TextView`，第一个 `TextView` 的 `android:layout_weight` 为 5，第二个为 10，那么第一个按钮将获得可用空间的三分之一（5/(5+10)），第二个按钮将获得三分之二。还有一些其他设置权重的方法，但都没有\
  \ `android:layout_weight` 方法直观。\n\n- **重力（Gravity）**：使用 `LinearLayout` 时，Android\
  \ 采取的默认布局方式是在使用 `HORIZONTAL` 方向时将所有控件从左侧对齐，在使用 `VERTICAL` 方向时将所有控件从顶部对齐。有时，你可能希望覆盖此行为，以强制布局采用自下而上或向右对齐的偏好。XML\
  \ 属性 `android:layout_gravity` 允许你控制此行为，运行时方法 `setGravity()` 也是如此。对于 `VERTICAL` 方向，`android:layout_gravity`\
  \ 可接受的值有 `left`、`center_horizontal` 和 `right`。对于 `HORIZONTAL` 方向，Android 默认会相对于控件文本的不可见基线进行对齐。使用值\
  \ `center_vertical` 可让 Android 改用控件的概念中心点进行对齐。\n\n#### 一个 `LinearLayout` 示例\n\n\
  一开始就审视 `LinearLayout` 的理论可能会让人感到有些不知所措，因此从探索一些概念入手是有意义的，这有助于直观地理解如何使用、何时以及何处运用这些关键的\
  \ `LinearLayout` 杠杆。\n\n如果纯粹从理论角度思考，所有 `LinearLayout` 选项可能会令人望而生畏。清单 10-3 中的动态示例展示了这些选项中的许多是如何工作的。\n\
  \n```\n清单 10-3\n演示 LinearLayout 提供的选项\n```\n\n该示例使用了两个简单的构建块来帮助我们理解方向和重力。我定义了两个独立的\
  \ `RadioGroup` 控件，其中第一个包含一组用于控制方向的 `RadioButton`，另一个包含一组用于控制重力的 `RadioButton`。作为起点，我们通过选择\
