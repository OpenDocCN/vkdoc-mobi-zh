- '# Mobile Video Playback


  近年来，移动设备使用增长最快的领域之一是视频。无论是在通勤时流式观看 Netflix 节目、在 YouTube 上追看猫咪的搞笑视频，还是使用基于视频的聊天和消息应用，视频在
  Android 领域从未像现在这样占据核心地位。为你的应用添加视频功能非常简单，不过你也需要了解 Android 中关于视频的一些奇特且出乎意料的方面。


  在本章中，我们将探讨为应用添加视频内容的最简单方式，然后花时间介绍更广泛的视频工具集——如果你打算认真对待 Android 视频开发，就应该掌握这些工具。在本书后续章节中，我们还将提到使用
  Android 的 `ContentProvider` 机制进行视频播放的选项。


  ## 播放视频


  与音频和声音一样，Android 提供了多种方式将视频播放功能引入你的应用。实际上，其中一些方式与你在前一章中已经接触过的类和框架相同，例如 `Media` 框架。视频播放有其独特的方面，其中最重要的是使用专用小部件
  `VideoView`，它用于实际显示视频，控制视频在播放期间的某些行为，以及控制用户在播放过程中对视频的操作。


  在 Android 中处理视频可以非常直接。虽然你可以构建复杂的层次结构，但从最基础的内容入手是理解视频播放过程中内部机制的好方法，同时也能让你熟悉那些更复杂方法所隐藏的基本构建块。


  我们将通过一个示例应用来开始探索视频播放，你可以在 `Ch14/VideoPlayExample` 项目文件夹中找到它。


  ### 设计基于 `VideoView` 的布局


  为了显示视频进行播放，我们需要一个带有 `VideoView` 对象的合适 Activity。清单 14-1 显示了 `VideoPlayExample` 应用的布局，其中就包含这样一个
  `VideoView`。


  ```

  Listing 14-1

  Layout XML including VideoView object for VideoPlayExample

  ```


  审视我们的布局，你会注意到我们有以下三个小部件：


  1.  一个“Start Video”按钮，其 `android:id` 为 `startButton`，并且 `android:onClick` 属性设置为
  `"onClick"`。

  2.  一个“Stop Video”按钮，其 `android:id` 为 `stopButton`，并且 `android:onClick` 属性也设置为 `"onClick"`，与
  `startButton` 相同。

  3.  一个 `VideoView` 小部件，其 `android:id` 为 `video`。


  我们使用了 `ConstraintLayout` 布局，并将 `startButton` 约束到父布局顶部（即 Activity 窗口顶部）。`stopButton`
  被约束为与 `startButton` 底部对齐，而 `video` 的 `VideoView` 被约束为与 `stopButton` 底部对齐。在显示任何视频之前，最终的布局看起来很像图
  14-1 中的图像。


  ![../images/499629_1_En_14_Chapter/499629_1_En_14_Fig1_HTML.jpg](img/499629_1_En_14_Fig1_HTML.jpg)


  **图 14-1** `VideoPlayExample` 应用的视觉布局


  该布局特意设计得非常简单，以便更容易理解访问视频文件、播放视频等逻辑。考虑到两个按钮都使用了 `android:onClick="onClick"` 属性，你可能已经能猜到基本结构了。


  ### 在代码中控制视频播放


  查看与布局配套的 Java 逻辑，你会立刻发现一个模式，它与我在第 13 章中介绍的音频和声音示例相似。正如我们在 `AudioPlayExample` 和 `AudioStreamExample`
  应用中看到的那样，大部分控制逻辑都围绕着使用 `onClick()` 方法来驱动 Activity 行为。我们的 Java 代码如下，如清单 14-2 所示。


  ```

  package org.beginningandroid.videoplayexample;

  import androidx.appcompat.app.AppCompatActivity;

  import android.net.Uri;

  import android.os.Bundle;

  import android.view.View;

  import android.widget.MediaController;

  import android.widget.VideoView;

  public class MainActivity extends AppCompatActivity {

  private VideoView vv;

  private MediaController mc;

  @Override

  protected void onCreate(Bundle savedInstanceState) {

  super.onCreate(savedInstanceState);

  setContentView(R.layout.activity_main);

  }

  public void onClick(View view) {

  switch(view.getId()) {

  case R.id.startButton:

  doPlayVideo();

  break;

  case R.id.stopButton:

  doStopVideo();

  break;

  }

  }

  private void doPlayVideo() {

  vv =(VideoView)findViewById(R.id.video);

  mc = new MediaController(this);

  mc.setAnchorView(vv);

  vv.setMediaController(mc);

  vv.setVideoURI(Uri.parse("android.resource://" + getPackageName() + "/" + R.raw.video_file));

  vv.requestFocus();

  vv.start();

  }

  private void doStopVideo() {

  if (vv != null) {

  vv.stopPlayback();

  }

  }

  }

  ```


  **清单 14-2** 视频播放的 Java 逻辑


  > **注意**：此代码示例使用了一个名为 `video_file.m4a` 的视频文件。如果你因任何原因需要访问原始视频文件，可以从 `beginningandroid.org`
  网站获取。


  从我们的 `MainActivity` 开始，你会观察到我们创建了两个对象。第一个是 `VideoView` 对象，名为 `vv`，它将用于后续绑定到已加载布局的
  `<VideoView>` 元素。第二个是 `MediaController` 对象，名为 `mc`，我们稍后会讨论它。`onCreate()` 重写方法执行了加载布局的基本操作，仅此而已。


  接下来，你会看到 `onClick()` 方法，就像在音频示例中一样，它接受一个 `View` 作为参数，然后使用基于视图 `android:id` 的 `switch`
  语句来判断哪个按钮被点击：`startButton` 或 `stopButton`。这与第 13 章示例中使用的模式几乎相同——你可以看出这是我觉得非常有价值且反复使用的模式！


  如果检测到 `startButton` 是被点击的 `View`（按钮），则会调用 `doPlayVideo()` 方法。该方法首先通过使用现在已经很熟悉的 `findViewById()`
  技术，并利用布局中 `VideoView` 持有的 `android:id` 为 `"video"` 的 `R.id.video` 样式表示，确保 `vv` 的
  `VideoView` 对象绑定到 `VideoView` UI 小部件。


  接着，我们实例化新的 `MediaController` 对象 `mc`，然后立即调用 `setAnchorView()` 方法。这会将 `MediaController`
  绑定起来，并允许它在应用中使用时，呈现一组浮动控件，这些控件将显示在 `VideoView` 对象之上。当你运行 `VideoPlayExample` 应用时，你将能够看到其中一些控件。同样地，我们向
  `VideoView` 指示，`mc` 的 `MediaController` 负责管理在 `vv` 的 `VideoView` 中显示的任何视频的播放某些方面。


  调用 `vv.setVideoURI()` 会构建一个符合规范的 URI，该 URI 引用了一个名为 `video_file.m4v` 的视频，该视频已放置到项目的
  `raw` 文件夹中。要查看完整形成的 URI 是什么样子，你可以在 Android Studio 中调试代码并设置断点。




  将视频的 URI 传递给`VideoView`后，我们调用`requestFocus()`确保该小部件获得焦点，然后通过调用`start()`方法开始播放。假设一切按描述正常工作，你将看到视频开始播放，如图
  14-2 所示（至少为静态截图）。


