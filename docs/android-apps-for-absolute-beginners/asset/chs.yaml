  ### 颜色详情的双面板父 Activity


  当转移到更大的屏幕时，更合适的布局会将所有片段和 UI 控件同时显示在屏幕上，最大化利用空间。


  `activity_color_twopane.xml`布局文件可能会让您觉得工作量更大，但仔细检查后，您会发现它实际上只是一个组合，包含了我们为小屏幕分离到单独布局中的`<fragment>`和`<FrameLayout>`。清单
  12-4 显示了此 XML。


