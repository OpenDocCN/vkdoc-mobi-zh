  \ XML 标准和规则约束——这被称为 XML 文档。无论 XML 文档变得多么复杂或令人费解，你始终可以退后一步，将其视为纯粹的文本——某些地方具有特殊含义、并遵循约定的结构和语法规则的文本，但归根结底仍是文本。\n\
