  \ 20-3** SQLiteExample 主活动\n```\n\n\n### 关键实现步骤与 SQLite 查询方法\n\n以下是前述代码中需要记住的一些关键实现步骤，适用于所有基于\
  \ SQLite 的 Android 开发。任何基于 SQLite 的 Android 应用的关键步骤是：从你的辅助类创建一个对象，并确保它在需要它的活动（**Activity**）的整个生命周期内保持有效。这通常不难，我在启动活动（Launcher\
  \ Activity）中创建该对象的方式是一种常见做法。\n\n现在你已经有了可用的辅助对象，每当需要操作数据库时，与数据库的交互都将从调用其`getReadableDatabase()`或`getWritableDatabase()`方法开始，这两个方法会返回一个底层\
  \ SQLite 数据库的数据库对象。正如方法名所示，只读数据库对象仅用于通过`SELECT`查询读取数据，而可写版本则允许执行 DML 语句（如`INSERT`、`UPDATE`、`DELETE`）以及用于创建和修改对象的\
  \ DDL 语句，就像我们在辅助类的`onCreate()`方法中使用的那样。\n\n当使用数据库对象完成特定任务后，只需调用其`.close()`方法，辅助类就会清理资源。这通常在活动的`onDestroy()`或类似方法中完成。\n\
  \n`SQLiteExample`应用创建了辅助对象，并使用`getWritableDatabase()`以可写模式访问数据库，接着通过`getModels()`方法填充`modelEntries`列表。利用这些结果，它为`ArrayAdapter`提供所需数据，以将数据库返回的数据填充到`ListView`中。`getModels()`方法虽短，但功能强大，因为它引入并使用了两个关于\
  \ SQLite 数据库和 Android 的重要能力。第一个概念是查询辅助方法（Query Helper），用于从 SQLite 数据库中收集数据；第二个概念是游标对象（**Cursor**），用于管理返回的结果。熟练使用\
  \ SQLite（及其他）数据库需要掌握这两种技术，让我们更深入地研究它们。\n\n#### 为 SQLite 和 Android 选择查询方法\n\n在应用中使用\
  \ SQLite 数据库时，你可以选择两种主要方式来检索其存储的数据。每种方式都使用`SELECT`语句，但在提供给开发者的辅助程度和假定结构方面有所不同。\n\
  \n##### 使用查询构建过程\n\n方法一，如`SQLiteExample`应用的`getModels()`方法所示，是使用`query()`方法。通过使用`query()`，你可以获得一条结构化的路径来构建查询所需的列、源表、谓词逻辑等，直到形成最终将在\
  \ SQLite 数据库上执行的查询。\n\n使用`query()`时，你不需要直接编写 SQL `SELECT`语句。相反，你需要按照一组预定义的构建阶段逐步操作，`query()`方法会在底层为你构建\
  \ SQL 语句：\n\n1.  提供要用于查询的表名。\n2.  提供要选择的列名（如果你熟悉关系数据库术语，也可称为“投影”）。\n3.  为`WHERE`子句提供谓词，包括任何可选的占位参数。\n\
  4.  如果使用了占位参数，则提供这些参数的值。\n5.  提供任何`GROUP BY`、`HAVING`或`ORDER BY`子句。\n\n如果不需要查询的某一部分，只需在`query()`调用的相应参数位置传入`null`即可。你可以在`SQLiteExample`代码中对`query`的调用中看到这一点：\n\
  \n```java\nmyDB.query(MySQLiteHelper.TABLE_NAME, MySQLiteHelper.TABLE_COLUMNS,\n\
  null, null, null, null, null)\n```\n\n这意味着我们没有使用任何谓词来为 SQL 语句的`WHERE`子句添加逻辑，没有为该语句提供参数，也没有使用任何`GROUP\
  \ BY`、`HAVING`或`ORDER BY`选项。这看起来非常简单直接，实际使用中也是如此。这种方法的一个显著局限性就隐藏在第 1 步中：你为查询提供了表名——但只能是一个表。这就是它的缺点！使用`query()`方法，你只能查询单个表，这意味着无法进行连接（Join），更微妙的是，你也不能使用任何像子查询、关联查询或其他会引用其他表的技术。\n\
  \n##### 使用 SQL 的原始能力\n\n如果你渴望突破`query()`方法的限制，那么`rawQuery()`可以为你提供几乎完整的 SQL 能力。顾名思义，`rawQuery()`接受一个代表\
  \ SQL 语句的“原始”字符串作为参数，并接受一个可选的占位参数数组（如果你选择在 SQL 语句中使用它们）。当你的查询不需要参数化时，你可以将`null`作为第二个参数传入。\n\
  \n你可以在`SQLiteExample`逻辑的`getModelInfo()`实现中看到`rawQuery()`的实际应用：\n\n```java\nmyDB.rawQuery(\"\
  select _id, model_name, release_year \" +\n\"from devices\", null)\n```\n\n使用`rawQuery()`，你可以尽情施展你所能掌握的任何\
  \ SQL 技巧，包括 SQLite 支持的 SQL 标准中的任何内容，如嵌套子查询、连接等。这种广泛的能力也带来了其自身的考量。使用`rawQuery()`管理一组小的静态查询是没有问题的，然而，当表示查询的字符串变得复杂，或者通过动态生成\
  \ SQL 文本来构建越来越大的语句时，就需要关注一些普遍问题。首要的是被称为 SQL 注入的安全问题。SQL 注入漏洞本身并非 Android 问题，也非 SQLite\
  \ 问题。这些问题可能影响任何使用数据库的应用程序。避免 SQL 注入的关键在于字符串“净化”，即确保生成的 SQL 不仅有效，而且不超出你原本预期的范围。\n\
  \n> **注意**\n>\n> 使用原始 SQL 的强大能力，也带来了当你完全控制并完全负责查询语法、正确性等方面时可能出现的所有复杂问题。如果你是 SQL\
  \ 初学者，我建议先用查询构建器方法进行测试，然后再将`rawQuery()`和查询构建器进行对比学习，以便了解其中存在的陷阱和风险！\n\n#### 使用游标管理查询结果\n\
  \n无论你选择哪种查询执行模型来操作数据库，查询结果都会以一个名为**Cursor**的对象呈现给你（或你的应用）。**Cursor**本质上与你在几乎所有数据库库中能找到的概念相同，因此如果你曾使用过其他数据库及其编程接口，以下描述会非常熟悉。如果你是数据库和/或游标的新手，可以将它们想象成：一个由查询产生的完整数据集，以及一个指向结果集中当前关注行的指针（或游标位置）。想象一下你最喜欢的文本编辑器或文字处理器中光标位于文档整个文本的某个位置，你就有了一个粗略的概念。在数据库库中，你可以将游标视为整个结果集以及在该结果集中的当前位置。\n\
  \n这种“数据集加位置指针”的比喻是理解**Cursor**对象强大功能的关键。**Cursor**使你能够执行以下操作及其他更多操作：\n\n1.  使用`moveToFirst()`和`moveToNext()`等方法移动游标位置并遍历结果集，并使用`isAfterLast()`测试位置。\n\
  \n\n```markdown\n2. 使用 `getString()`、`getInt()` 以及其他等效方法从当前行中提取单个列的值。\n\n3. 使用 `getColumnNames()`\
  \ 和 `getColumnIndex()` 查询结果集，以了解列名、列序号位置等信息。\n\n4. 使用 `getCount()` 获取结果集的统计信息。但请注意，尝试对结果进行计数会强制按顺序读取\
  \ `Cursor` 的整个结果集，这可能会消耗大量内存，并且对于大型结果集需要较长时间。\n\n5. 使用 `close()` 方法释放所有 `Cursor`\
  \ 资源。\n\n处理 `Cursor` 中结果的一种常见方法是使用循环逻辑结构遍历其行，并对每一行执行所需的任何应用程序逻辑。`SQLiteExample`\
  \ 应用程序在几个地方执行此操作，例如 `getModels()` 中的这段代码：\n\n```java\nCursor cursor = myDB.query(MySQLiteHelper.TABLE_NAME,\n\
  MySQLiteHelper.TABLE_COLUMNS, null, null, null, null, null);\ncursor.moveToFirst();\n\
  while (!cursor.isAfterLast()) {\nString model = cursor.getString(MySQLiteHelper.COLNO_MODEL_NAME);\n\
  models.add(model);\ncursor.moveToNext();\n}\ncursor.close();\n```\n\n这展示了 `SQLiteDatabase`\
  \ 对象的 `query()` 方法的用法，我们将表名和包含我们感兴趣的列名的 `String` 数组传递给它。我们返回一个包含结果集的 `Cursor`，如下所示：\n\
  \n```\n_id  model_name          release_year\n---  ------------------  ------------\n\
  1    Pixel 3             2018\n2    Pixel 5             2020\n3    Samsung Galaxy\
  \ S21  2021\nListing 20-4\nSample cursor result set for the SQLiteExample activity\n\
  ```\n\n为了处理返回的 `Cursor`，我们在进入循环之前调用 `.moveToFirst()` 方法，该方法将游标的当前行定位到 `_id=1` 的行。在逐步循环时，我们使用\
  \ `isAfterLast()` 测试是否已移动到游标结果集的末尾，从而避免因读取超出游标范围而导致的任何错误。我们通过传递 `COLNO_MODEL_NAME`\
  \ 常量（表示 `model_name` 列的列位置）来调用 `getString()`。此字符串被添加到我们的 `ArrayList` 中，然后我们调用 `moveToNext()`\
  \ 继续处理下一行。\n\n**注意**\n\n在处理数据库（无论是 SQLite 还是其他数据库）时，很容易总是依赖这种迭代行处理的方法。然而，这种模式隐藏了所有数据库相关编程中最常见的性能陷阱。`While`\
  \ 循环和 `for` 循环易于编码，但无法与数据库引擎使用原生 SQL 执行集合逻辑的能力相匹配。无论你是编程新手还是经验丰富的开发者，都值得记住，对于大规模计算和处理数据，SQL\
  \ 几乎总是最佳选择。在你的代码中，对于数据处理逻辑之外的事情，例如将数据绑定到 UI 小部件或执行非 SQL 类处理，使用基于 Java 或 Kotlin 的迭代循环是可以的。但要保持警惕，以确保为用户提供良好的性能！\n\
  \n超越简单的迭代和手动处理，你可以使用 `Cursor` 对象来填充 `SimpleCursorAdapter`，以便与 `ListView` 或其他选择 UI\
  \ 小部件进行绑定。在使用任何 `CursorAdapter` 选项或其子类时，你需要遵循本章前面介绍的表结构模式。你必须创建一个名为 `_id` 的主键列，并为其设置自增属性。适配器的所有方法（例如\
  \ `onListItemClick()`）都期望 `_id` 列及其值的存在。当你遇到游标的限制时，还有更高级的方法来处理结果，例如 `SQLiteDatabase.CursorFactory`\
  \ 对象以及与其配合使用的 `queryWithFactory()` 和 `rawQueryWithFactory()` 方法。这些已超出本书的讨论范围，但你可以在\
  \ `developer.android.com` 上了解更多信息。\n\n**使用你的 Android 应用程序修改数据**\n\n从数据库读取数据当然非常有用，但对于数据库驱动的应用程序来说，这只是故事的一半。在几乎所有情况下，你都会希望用户能够从你的\
  \ SQLite 数据库中添加、更新和删除信息，这意味着希望使用 SQL 的 `INSERT`、`UPDATE` 和 `DELETE` SQL DML 语句对你的数据库进行操作。\n\
  \nAndroid 对 SQLite 的支持扩展到了提供两种执行修改数据的 DML 语句的方式。第一种是使用 `execSQL()` 方法，你需要向其传递一个结构完整的\
  \ SQL 语句。回顾一下 `SQLiteExample` 应用程序，它在数据库首次创建时通过辅助类使用了这种方法。如前所述，`execSQL()` 适用于任何不期望返回结果或游标的语句。由于\
  \ `INSERT`、`UPDATE` 和 `DELETE` 语句不返回结果，因此它们符合要求。在最新版本的 Android（以及相应的 SQLite 3.24\
  \ 及更高版本）中，这包括 `INSERT` 的 “`UPSERT`” 变体，该变体通过 `INSERT` 语句实现了 `ON CONFLICT` 支持以更新现有行。\n\
  \n如果 `execSQL()` 让你感觉像是在冒险操作，那么另一种选择是使用 `SQLiteDatabase` 对象的 `.insert()`、`.update()`\
  \ 和 `.delete()` 方法，采用逐步执行 DML 的方法，就像 `.query()` 方法帮助你构建所需的 `SELECT` 语句一样。这些方法都使用\
  \ `ContentValues` 对象，该对象为你提供了一个针对 SQLite 定制的值和列映射。\n\n**插入数据**\n\n查看 `SQLiteExample`\
  \ 中的 `insertModelRow()` 方法，你将看到 `.insert()` 方法的实际运用：\n\n```java\nprivate void insertModelRow(DialogWrapper\
  \ wrapper) {\nContentValues myValues=new ContentValues(2);\nmyValues.put(MySQLiteHelper.COLNAME_MODEL,\
  \ wrapper.getModel());\nmyValues.put(MySQLiteHelper.COLNAME_YEAR,\nCalendar.getInstance().get(Calendar.YEAR));\n\
  myDB.insert(MySQLiteHelper.TABLE_NAME,\nMySQLiteHelper.COLNAME_MODEL, myValues);\n\
  //uncomment if you want inserts to be displayed immediately\n//displayModels();\n\
  }\n```\n\n由于使用了辅助类常量，该代码段中对 `.insert()` 的调用非常清晰。查看这些常量本身，第一个参数接受我们正在插入数据的表名，第二个参数提供一个可以接受\
  \ `null` 值的列，这是 Android 的要求，而不是我个人的设计选择。其目的是规避 SQLite 有时在最后一个参数（`ContentValues`\
  \ 对象）为空时的奇怪插入行为，这被称为“空插入技巧”。\n```\n\n\n在使用`ContentValues`对象之前，通常需要先用相关数据填充它。在`SQLiteExample`应用程序中，我们通过`DialogWrapper`对象的`.getModel()`方法，用来自该对象的`String`数据填充它。打开`DialogWrapper`的\
  \ Java 源代码，你会看到`.getModel()`方法返回用户在点击“Add New Model”按钮触发的弹出对话框中输入的文本，如图 20-2 所示。\n\
  \n![../images/499629_1_En_20_Chapter/499629_1_En_20_Fig2_HTML.jpg](img/499629_1_En_20_Fig2_HTML.jpg)\n\
  \n**图 20-2** 提示在 SQLiteExample 应用程序中插入新数据\n\n输入的文本成为`ContentValues`对象上`.put()`调用的值，同时`COLNAME_MODEL`常量的`String`值作为键。为了生成年份值，我们使用一种常见的\
  \ Java 技术来确定当前年份。如果你对扩展`SQLiteExample`应用程序感兴趣，可以将此逻辑调整为弹出对话框的一部分。\n\n#### 更新数据\n\
  \n使用`.update()`方法更新数据与`.insert()`方法大致相似。除了需要提供表示要更新表名的`String`和表示要更新的列新值的`ContentValues`对象外，还可以提供一个可选的`where`子句。这个`where`子句允许你添加任何谓词逻辑来精确定位要更新的行。它可以包含问号`?`作为占位符，这些占位符的值在执行语句之前被替换，此外还有一个最终参数，该参数是一个值列表，用作任何`?`参数占位符的替换值。这是一种非常常见的参数替换技术，也是防止\
  \ SQL 注入的技术之一（但不是唯一的技术）。你可以使用你认为必要的任何逻辑来保护`.update()`中使用的任何参数值，而不是仅仅信任用户的直接输入。\n\
  \n`.update()`方法易于使用，但其简洁性也有代价。用于更新的值必须是实际的静态值。不能通过`.update()`方法传递公式或计算供 SQLite 评估。在需要这种能力的情况下，请改用`execSQL()`方法。\n\
  \n#### 删除数据\n\n在管理 SQLite 数据的辅助方法之旅的最后一站是`.delete()`语句。它与你已经见过的`.insert()`和`.update()`语句非常相似，最接近`.update()`。`.delete()`的关键区别在于你不需要提供任何新数据值，因为你是删除数据，而不是修改数据！\n\
  \n调用`.delete()`时，需要提供包含要删除数据的表名，并可选地包含`where`子句以及谓词所需的所有参数值，以定位要影响的行子集（假设你不是要删除表中的所有数据）。例如：\n\
  \n```\nmyDB.delete(MySQLiteHelper.TABLE_NAME, \"_id=?\", args);\n```\n\n你需要提供一个填充好的`args`值，在我们的例子中，这将是某行手机型号数据的`_id`值，例如，`_id`为\
  \ 2 的行的`args`值为`\"2\"`。SQLite 看到并执行的语句如下所示：\n\n```\ndelete from devices where _id=2\n\
  ```\n\n与`.update()`一样，同样的警告也适用于`.delete()`。不能在参数中传递计算或动态公式供 SQLite 评估。若要达到这种复杂度，你应再次选择`execSQL()`。\n\
  \n#### 使用 Room 持久化库\n\n使用原始 SQL 语句，甚至通过 Query Builder 方法寻求帮助，仍然要求你掌握 SQL 作为一门语言和关系型数据库概念的知识。总的来说，这是一个非常好的主意。一些开发人员回避\
  \ SQL，认为它与 Java 和 Kotlin 等语言相比太难用或太“奇怪”。还有第三种使用数据库的方法，称为对象关系映射（ORM）库。这些方法有很多优点和缺点，但本质上提供了一种更类似\
  \ Java（或 Kotlin）的方式来操作数据库。在 Android 世界中，Google 提供了作为 androidx（Jetpack）一部分的 Room\
  \ 持久化库。学习 ORM（包括 Room）可以帮助你的代码更少出现原始 SQL 错误，并且更容易理解。Room 本身是一个非常庞大的话题，你可以在[这里](https://developer.android.com/jetpack/androidx/releases/room)阅读更多相关信息。作为新开发人员，建立对\
  \ SQL 的基本理解对于使用 Android 提供的任何方法（无论是 Query Builder、原始 SQL 还是 Room）都至关重要，因此从 SQL 开始是正确的选择。\n\
  \n## 为 Android 打包和管理 SQLite 数据库\n\n在将 SQLite 添加到应用程序时，有一些超越编码的考量因素，它们将帮助你在设计、构建和支持以数据库为中心的应用程序时做出正确的选择。在\
  \ I/O、文件位置和种子数据库等关键问题上投入一点时间和思考会很有回报。\n\n## 管理 Android 存储以提升数据库性能\n\n第 19 章详细介绍了使用\
  \ Android 应用程序管理文件的内容。本章无需重复这些内容，但我们未涉及的一个主题是用于存储这些文件的硬件技术。几乎所有 Android 设备都配备基于闪存的板载存储，通常采用\
  \ NAND 硬件构建。不同品牌和制造商之间的内存质量和可靠性差异很大。\n\n在使用 SQLite 数据库构建 Android 应用程序时，当你的应用程序代表用户插入、更新和删除数据时，你将隐式地触发对此硬件存储的读取和写入。闪存的一个特点是快速写入的可预测性较差。在\
  \ 99%的情况下，你可能会获得极快的写入性能，却突然发现下一次写入的速度下降，因为闪存触发了某种内部清理或管理。最常见的原因是“磨损均衡管理”，闪存管理层试图延长其部分存储的使用寿命。\n\
  \n这可能很难发现其导致的性能问题，尤其是在 AVD 中测试应用程序时，因为 AVD 的内存几乎肯定是由笔记本或台式电脑的非常快速且可靠的 RAM 模拟的。你可以通过使用第\
  \ 18 章中描述的`AsyncTask()`方法将数据库更改放在异步线程上（远离主 UI 线程），来缓解一系列写入性能的不确定性。\n\n数据库管理的另一个怪癖是考虑设备故障时会发生什么——无论是电量不足、意外崩溃，还是用户恰好在数据库活动的关键时刻选择关机按钮。SQLite\
  \ 能够从崩溃和故障中恢复，使用 ACID 数据库原则来持久化（用 ACID 术语来说是“持久化”）数据的更改。了解这种情况的发生很重要，因为任何名副其实的数据库的\
  \ ACID 保证都包括：为了保持完整性，可能需要回滚事务。\n\n### ACID 数据库原则\n\n\n\n在所有的关系型数据库中，包括 SQLite，都有四个关键原则，它们是确保数据得到保护、完整并按预期可用的标准方式。这些原则被称为\
  \ **ACID** 原则，其中字母分别代表原子性（Atomicity）、一致性（Consistency）、隔离性（Isolation）和持久性（Durability）。\n\
  \n**原子性**是指针对数据库的一个事务中的所有工作要么全部成功，要么全部回滚。不允许出现半完成的工作。\n\n**一致性**是指数据库中的数据始终处于一致状态，事务只能将数据从一个一致状态调整到另一个一致状态。\n\
  \n**隔离性**是指一个事务的工作过程，在该事务对数据所做的全部原子性、一致性的更改集变为可见之前，对数据库的其他用户是不可见的。\n\n**持久性**是指一旦对数据做出的更改将得以持久保存，即使发生异常的系统事件、灾难等情况也是如此。\n\
  \n你应该考虑为应用程序添加健全性检查逻辑，以便在能够预先获知问题的情况下进行追踪并采取行动。低电量状态是你能够检测到的最常见情况，方法是在你的应用中注册一个接收器来监听诸如\
  \ `ACTION_BATTERY_CHANGED` 之类的广播。通过检查意图（intent）的有效载荷，你可以判断电量是否不足，并可能推迟写入密集型任务。\n\
  \n### 将 SQLite 数据库打包到应用中\n\n我的 `SQLiteExample` 应用程序附带了一个辅助类，它可以方便地将三行数据填充到设备的表中，从而为数据库播种（seed\
  \ the database）。对于这个示例来说，这很好，但它可能会让你思考：如果我需要几百行甚至几千行数据才能使我的数据库从一开始就有用，该怎么办？在首次创建数据库时执行此类批量插入活动，会导致程序的首次执行速度可能非常慢，因为需要执行所有这些\
  \ I/O 操作。这不仅可能让用户失望，而且这种长时间运行的工作也增加了应用程序在运行时遇到各种错误的可能性。\n\n如果你希望在应用程序中提供一个填充了相当数量数据的\
  \ SQLite 数据库，可以将其与其他资源一起打包到 `.apk` 文件中。存放 SQLite 文件的合适位置是在你的 `assets/` 文件夹下的一个特定子文件夹中，这样它的路径就可以传递给重载的\
  \ `openDatabase()` 方法，该方法接受一个完整的文件路径作为其第一个参数。\n\nSQLite 数据库文件必须放置在 `assets/` 文件夹下的文件系统路径\
  \ `/data/data/your.package.name/databases/` 中。将表示你的文件名的 `String`（例如，我们示例应用中的 `devices.db`）附加到该路径后，你就得到了可以传递给\
  \ `openDatabase()` 的参数值。对于 `SQLiteExample` 应用，这个完整的路径和文件名实际上是：\n```\n/data/data/org.beginningandroid.sqliteexample/devices.db\n\
  ```\n\n## 选择 SQLite 管理工具来准备要打包的数据库\n\n手工设计任何类型的数据库都是一件繁琐的事情，因此如果你希望将一个数据库文件与你的 Android\
  \ 应用程序一起打包，你几乎肯定需要一些工具来帮助设计数据库并填充数据。\n\n### 使用内置工具\n\nSQLite 附带了一些有用的管理工具，例如 `sqlite3`\
  \ shell 程序，该程序随几乎所有操作系统（不包括 Windows）一起提供（即使在 Windows 下，也可以从 `sqlite.org` 轻松下载）。AVD\
  \ 工具也提供了对 `sqlite3` 实用程序的访问，一旦你连接到模拟设备，就可以从 `adb` shell 实用程序中调用它。例如，\n```\n$ sqlite3\
  \ /data/data/org.beginningandroid.sqliteexample/devices.db\n```\n\n\n\n查阅 `sqlite.org`\
  \ 文档，获取关于 `sqlite3` 实用程序的更多详细信息。`adb` 工具还提供了一些其他有用的通用文件管理命令，可用于管理你的 SQLite 数据库文件，例如使用\
  \ `adb push` 将文件移动到设备，以及使用 `adb pull` 从设备复制文件。\n\n### 使用第三方数据库工具\n\n当简单的命令行工具无法满足你的严苛需求时，还有许多其他更复杂的\
  \ GUI 工具可用来帮助你管理 SQLite 数据库。其中一些最流行的工具包括：\n\n- **DBeaver**：一个因其支持众多数据库（不仅仅是 SQLite）而越来越受欢迎的工具。支持跨平台，并提供免费的社区版。了解更多信息请访问\
  \ `https://dbeaver.io`。\n- **SQLite 的数据库浏览器**：另一个跨平台工具，专注于 SQLite 管理。了解更多信息请访问 `https://sqlitebrowser.org`。\n\
  \n历史上，还有一个名为 SQLite Manager 的工具曾非常流行且实用，因为它被打包成一个 Firefox 浏览器插件。不幸的是，随着 Firefox\
  \ 在其插件工作方式上的重大架构变革，SQLite Manager 不再得到支持。我在此提及它，是为了避免你走弯路去寻找它——它在许多与 SQLite 相关的历史性在线文章和网站中仍然被广泛提及。\n\
  \n## 总结\n\n现在，你已经扎实掌握了将 SQLite 数据库集成到应用程序中，并构建由其中数据驱动和支持的功能与逻辑的关键步骤。我们也到达了本书的终点——至少是印刷版和打包版的终点。本书中提到的许多主题都有额外的专题和补充示例，可在网站\
  \ `www.beginningandroid.org` 上获取。我祝愿你在成为 Android 应用程序开发者的道路上取得圆满成功！\n\n## 索引\n\n\
