  \ `AudioRecordExample` 代码\n\n\n\n#### `AudioRecordExample` 代码详解\n\n`AudioRecordExample`\
  \ 的代码看起来应该大致熟悉，因为它模拟了我们之前在`onClick()`方法中使用过的控制逻辑。在`onClick()`中，我们根据用户点击的按钮进行切换（`switch`），播放开始和停止基本模仿了`AudioPlayExample`的早期代码，而`doStopRecording()`方法与`doStopAudio()`几乎相同，只是分别改变了`MediaRecorder`和`MediaPlayer`对象的基础。这两个类之间的这种平行设计是有意为之，其中共同的目标由概念上匹配的方法来实现。\n\
  \n我们代码中主要的新逻辑体现在`doStartRecording()`方法中。首先，`doStartRecording()`确保`File`对象`myRecording`是新创建的，必要时会删除任何先前存在的对象。在这种情况下，我们使用`java.io.File`包来提供文件处理能力——严格来说，这是标准的\
  \ Java 在运行，访问一个标准的 Java 库，并且超出了 Android 的常规框架范围。我们将在本书后续部分介绍更多关于使用标准 Java 库的能力。\n\
  \n然后，我们创建一个名为`mr`的`MediaRecorder`对象，并调用其`setAudioSource()`方法来指示应用程序想要访问麦克风（`MIC`），以便能够录制声音。正是这个逻辑要求我们在清单文件中声明`RECORD_AUDIO`权限。\n\
  \n在授予应用程序访问麦克风的权限后，我们能够设置音频所需的输出容器格式，以及用于编码将要录制并放入容器中的声音的编解码器。这些分别是`.setOutputFormat()`和`.setAudioEncoder()`调用。在我们的示例中，我们在每种情况下都使用了`DEFAULT`选项，这在实践中会根据所用硬件设备和\
  \ Android 版本的具体支持情况来选择容器和音频编解码器。\n\n##### Android 支持的主要输出格式\n\n1.  `AAC_ADTS`：由\
  \ Apple 推广的容器和 AAC 音频格式。\n2.  `AMR_NB`：当你希望在 Android 设备间获得最大可移植性时，推荐使用 AMR 窄带容器类型。\n\
  3.  `MPEG_4`：MPEG-4 容器格式是最古老之一，但也最有可能在旧平台和设备上被错误解释。请谨慎使用。\n4.  `THREE_GPP`：另一个为广泛\
  \ Android 支持而推荐的容器格式。\n5.  `WEBM`：用于 Google 的`WEBM`格式以及无专利阻碍的 Ogg 编码文件格式的容器。\n\n\
  容器格式以及音频和视频编解码器的主题非常广泛，并且充满了历史纷争和行业故事。它本身可以写成一本好书，但可惜我们无法在此深入探讨。为了帮助您开始编写利用音频的 Android\
  \ 应用程序，以下是 Android 中用于音频（和视频）编码的更流行的编解码器列表：\n\n1.  `AAC`（以及`AAC_ELD`和`HE_AAC`）：用于高级音频编码（AAC）标准的音频编解码器。被\
  \ Apple 和其他设备及平台广泛支持。\n2.  `AMR_NB`：AMR 窄带的实际音频编码器。虽然在 Android 之外使用不广，但此编解码器在 Android\
  \ 版本和设备上提供了广泛的支持。\n3.  `VORBIS`：Ogg Vorbis 音频编解码器格式。\n\n如果您再看一下`.doStartRecording()`方法，`.setOutputFile()`调用将我们之前创建的\
  \ Java `File`对象配置为用户将要录制的音频流的存储库。\n\n最后，我们进入正常的两步操作：为我们的`MediaRecorder`对象调用`.prepare()`和`.start()`。就像`MediaPlayer`对象必须应对一系列潜在的延迟一样，`MediaRecorder`也是如此。这些延迟可能来自无响应的远程服务、缓慢的内部存储等等。无论何种情况，`.prepare()`会处理准备工作，以便允许您的录制数据被存储，并在一切就绪后将控制权返回给调用者（您的应用程序）。正是在这一点上，对`.start()`的调用才真正开始捕获音频输入。\n\
  \n体验这一切的最佳方式是在您选择的设备或 AVD 上亲自运行示例`Ch13/AudioRecordExample`。\n\n### 扩展您的开发者音频工具箱\n\
  \n在向您介绍了 Android 下音频和声音的第一方面之后，还有其他关于将音频内容引入 Android 应用程序的知识值得了解。这些领域包括计算机和移动设备音频的一些基础知识，以及在\
  \ Android Studio 之外对于在应用程序中最佳利用声音和音频至关重要的各种工具。\n\n数字音频——即为在计算机、手机和其他数字设备上再现和使用而以数字形式捕获或创建的音频——是一个巨大的主题。本章的其余部分将为您提供进一步探索的起点。\n\
  \n### 理解关键音频方面\n\n在评估音频“好”的程度时，存在很多主观意见——我不会分享我的音乐偏好，尽管它们很棒！但也有一些客观的音频方面您应该熟悉，这样您才能首先理解哪些属性有助于提高音频质量，以及然后如何影响这些质量以产生“更好的声音”。\n\
  \n#### 音频采样与频率\n\n您的 Android 设备及其音频播放、您编写的音频应用程序、您用来听音乐的计算机以及大多数现代电子音频设备都基于音频或声音的数字编码。这种编码通过以下两种方式之一产生：要么直接创建数字值，要么更典型的是（至少在历史上）对连续的音频源或信号进行采样，并以足够高的频率采集足够多的样本，从而在数字“快照”中创建音频信号的良好近似值。这是音频采样的基本原则。\n\
  \n当您考虑应该以多高的频率对模拟信号进行采样以获得足够的数字快照以提供一定的保真度——使得重放时听起来与模拟原始声音几乎无法区分时，事情就变得复杂了。这里使用的术语是采样频率。对于音频，您通常会看到每秒\
  \ 44100 次的采样率——例如，44.1 kHz。还存在其他更高和更低的频率，选择会影响最终音频的质量和用于表示它的数据量。\n\n\n\n#### 音频分辨率\n\
  \n如果以 44.1 kHz 的频率对音频进行采样，那么在采样模拟信号时，我们究竟在捕捉什么？答案是在采样时间点上，关于声波振幅（大小）的信息比特。分配给存储一个样本的空间越多，就越能覆盖信号幅度中的绝对高点和低点，但更重要的是，就越能精细地区分信号中的微小步进。这也就是音频样本的“比特率”。\n\
  \n一些历史上著名的音频分辨率比特率示例包括光盘（CD），其在 CD 标准中使用了 8 位比特率。这实现了不错的采样保真度，并在 44.1 kHz 采样率下，每秒产生的数据约为\
  \ 44 kB。DVD 提升了比特率水平，支持高达 16 位的音频，而当代的“高清”音频通常被认为比特率为 24 位或更高。这一切都有助于更好地捕捉数据，理论上也能带来更好的音质和保真度，但代价是需要越来越多的存储空间来保存最终数据。正是这些存储方面的考量，导致了那些以牺牲质量为代价来节省空间的格式（即编解码器领域）的激增。\n\
  \n#### 编码、解码与数据丢失\n\n人们探索了多种途径，力求找到能大幅减少所需存储空间的音频编码方式。简而言之，一系列研究和技巧在研究机构和商业环境中被开发出来，它们对采样音频进行处理，以丢弃或移除那些代表声音或声音特征的数据，而这些被丢弃的部分大多数人通常注意不到。最著名的例子是德国弗劳恩霍夫研究所开发的标准\
  \ MPEG-1 Audio Layer 3——也就是广为人知的 **MP3**。它利用频率剪切和其他技术，捕捉到远少于原始数据量的信息，却仍能用于生成保真度相当高的原始音频再现。\n\
  \n这种音频编码方法通常被称为“有损”压缩或编码，因为部分数据会丢失。另一种方法是“无损”编码，即不丢弃任何源数据。包括 WAVE（或 WAV，一种脉冲编码调制形式）和\
  \ FLAC 在内的编码标准都是无损格式。您会经常听到所有这些方法被统称为编解码器（codec），这个词是两个缩写的组合词：code 来自单词 encode（编码），dec\
  \ 来自单词 decode（解码）。\n\n对于您使用音频开发 Android 应用程序的工作而言，您可以明白，编解码器的选择以及有损与无损捕捉的方式，将直接影响您所用音频的大小和质量。\n\
  \n"
- '# 更多音频理论


  关于音频理论，还有大量内容需要学习和理解，一本 Android 书籍的篇幅无法涵盖这一切。诸如序列、合成等话题都有成书库的著作，而且在线上也能找到关于这些主题的丰富信息。维基百科是一个不错的起点。至于关于采样、比特率、编码格式等内容的实践和教程，可以查看下一节介绍的工具。


  ### 选择更多音频工具


  回放已创建的音频是对您应用程序的一个很好的补充，无论是音乐、播客还是应用程序的音效。在某个时候，您很可能需要超越使用他人音频资源的层面，想要创建自己的音频，或者混音和调整其他预先录制的音频。音频录制和编辑软件是一个庞大的领域，但作为入门，查阅一些流行的（且免费的！）可选方案是不会错的。


  #### 认识 Audacity


  在某些软件领域，免费开源软件具有强大影响力甚至占据主导地位，音频编辑就是其中之一。Audacity 十多年来一直是一个受欢迎的音频编辑套件。用 Audacity
  网站关于页面的话来说：


  *[Audacity] 是一个免费的、易于使用的多轨音频编辑器和录音机，适用于 Windows、macOS、GNU/Linux 和其他操作系统。其界面已被翻译成多种语言。*


  Audacity 拥有海量功能，其中最重要的可以总结如下：


  1.  录制实时音频——来自您计算机可用的任何输入源

  2.  录制计算机回放——捕捉您可能正在运行的其他系统的音频

  3.  完整的编辑功能，支持所有关键的音频格式，包括 `MP3`、`WAV`、`AIFF`、`FLAC`、`Ogg Vorbis` 等（显然，这涵盖了几乎所有
  Android 支持的格式——一个额外的好处！）

  4.  通过丰富的插件库系统编辑其他格式，例如 `M4A` 和 `WMA`

  5.  用于复制、剪切、拼接、混音、音高和速度调整以及变速的完整工具

  6.  支持 16 位、24 位和 32 位质量以及全频谱采样率

  7.  高级功能，如频谱图分析和其他强大选项


  我还可以列举更多特性和功能，但您可以自行在 Audacity 自己优秀的文档网站上阅读更多信息，网址是 [`https://manual.audacityteam.org`](https://manual.audacityteam.org)。在撰写本书时，Audacity
  的版本是 2.4.2。由于它是开源且免费的，我强烈建议您至少下载并安装它来试用一下。[`https://manual.audacityteam.org/man/tutorials.html`](https://manual.audacityteam.org/man/tutorials.html)
  上有非常易学的教程，其中我推荐每位刚接触音频的爱好者都从两个教程开始：编辑音频文件和创建新录音。您很快就能为您的 Android 应用程序创建素材了。


  #### 使用 WavePad


  另一个强大的视频编辑工具是 WavePad，它在近年来声名鹊起。WavePad 拥有至少与 Audacity 一样强大的功能集，在某些情况下甚至更进一步。WavePad
  一个关键的优势领域是，它支持更多生僻和罕见的音频文件格式，例如 `VOX`。WavePad 最引人注目的部分可能是它拥有自身的移动版本，包括一个 Android
  版本。这意味着您可以使用自己的移动设备来创建、编辑和优化您正在为同一设备编写的新应用程序所需的音频。


  WavePad 采用“免费增值”模式，部分功能免费提供，但其他功能需要付费许可证。您可以在 [`www.nch.com.au/wavepad/index.html`](http://www.nch.com.au/wavepad/index.html)
  找到关于 WavePad 的更多信息。


  #### 苹果 Mac 用户的选择：GarageBand


  如果您拥有 Mac 电脑，还有一个值得考虑的选择。过去十年（或更久）出厂的每一台 Mac 都预装了苹果自己的音乐编辑和创作软件 GarageBand。GarageBand
  拥有许多出色的功能，并围绕它形成了一个非常强大的社区。显然，由于 GarageBand 是 Mac 的捆绑软件，我无法为您提供下载链接，如果您有 Mac，GarageBand
  已经包含在您购买机器所付的款项中——因此开始使用它无需额外费用。


  ## 总结


  在本章中，我们介绍了 Android 的一些核心音频和声音处理能力，包括 Media 包以及 `MediaPlayer` 和 `MediaRecorder`。我们看到了多种播放和录制声音的方法，并简要介绍了
  Android 提供的其他音频包，包括 `SoundPool` 和 `JetPlayer`。


  我们将在下一章继续这个话题，届时我们将探讨视频，并再次领略 Media 包的功能。


