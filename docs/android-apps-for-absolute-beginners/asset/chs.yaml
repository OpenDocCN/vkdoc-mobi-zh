  查看`RawFileExample`的代码时，你会立即注意到我们导入的大量外部 Java 库，用于处理文件 I/O 和 XML 解析。这就是 Android 中
  Java 遗产的实际力量。即使你选择转向 Kotlin 作为首选编程语言，庞大的 Java 库也能为你提供功能支持。


  `onCreate()`方法首先创建一个`InputStream`对象，然后我们调用`getResources().openRawResource()`来在`.apk`中找到该文件，分配其文件描述符，将它们与`InputStream`关联起来，最后让系统准备好使用来自该文件的数据流。从那时起，剩余的逻辑就是解释文件内容所需的部分。


  在初始文件处理之后，我们使用`DocumentBuilder`对象解析文件内容，并将结果表示存储在一个名为`myDoc`的`Document`对象中。利用 DOM
  语义，我们调用`getElementsByTagName()`将所有`<color>`元素收集到我们的`NodeList`对象中。鉴于我们的文件非常简单，这看起来可能有些过度，但想象一个包含其他元素、子元素等的更复杂的
  XML 模式，你就能看到这种方法如何高效地筛选出我们想要的元素。


  最后，我们使用`for`循环遍历`NodeList`中的`<color>`条目，提取`value`属性的文本——即我们想要在`ListView`中显示的实际颜色名称字符串。填充好`NodeList`后，我们可以通过配置为使用颜色名称列表的`ArrayAdapter`来填充`ListView`，并要求它使用默认的内置
  XML 布局`simple_list_item_1`来渲染结果。


  处理用户点击颜色的逻辑会检索颜色字符串，并将用户选择的条目填充到`TextView`中。


