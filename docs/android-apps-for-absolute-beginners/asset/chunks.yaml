  trans: "\n\n显然，这里的 `CheckBox` 代码比之前的 `EditText` 等示例要复杂一些。首先看看导入的类，就能对发生的事情有所了解。我导入了\
    \ `OnCheckedChangeListener` 并提供了 `onCheckedChanged()` 回调方法的实现。这意味着我们将 `CheckBox`\
    \ 设置为其自身状态变更事件（如被点击）的事件监听器。当用户点击 `CheckBox` 进行切换时，`onCheckChanged()` 回调会被触发。我们回调实现中的逻辑会测试切换后\
    \ `CheckBox` 的当前状态，并用文字描述更新复选框的文本，以反映其新状态。这是一种很好的方式，可以将小部件的所有行为集中在一个地方，并让我们能够在用户输入时的同一逻辑流中执行表单验证等操作，而无需传递一堆用户或数据状态。你的代码和相关的运行时输入检查将优雅地并排呈现。\n\
    \n图 9‑7 和图 9‑8 展示了我们的 `CheckBoxExample` 应用在选中和未选中状态下的界面。\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig8_HTML.jpg](img/499629_1_En_9_Fig8_HTML.jpg)\n\
    \n**图 9‑8：** 复选框现在处于选中状态。\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig7_HTML.jpg](img/499629_1_En_9_Fig7_HTML.jpg)\n\
    \n**图 9‑7：** 复选框处于未选中状态。\n\n## 用 Switch 进行切换\n\n`Switch` 小部件是在 Android 开发后期引入的，但其用途正如其名。`Switch`\
    \ 就像一个二元开关，提供开/关式状态，用户可以通过手指滑动或拖动来激活它，就像拨动电灯开关一样。用户也可以像对待 `Checkbox` 一样，直接点击 `Switch`\
    \ 小部件来改变其状态。在 Android 的多个版本中，`Switch` 小部件经过了调整以解决兼容性和其他问题，因此有时会使用 `SwitchCompat`\
    \ 等其他变体来代替原始的 `Switch` 小部件，但总体用途和处理方式类似。\n\n除了从 `View` 等继承的属性外，`Switch` 小部件还提供了\
    \ `android:text` 属性，用于显示与 `Switch` 状态关联的文本。该文本通过两个辅助方法 `setTextOn()` 和 `setTextOff()`\
    \ 进行控制。\n\n`Switch` 小部件还有其他可用方法，包括：\n\n1.  `setChecked()`：将当前 `Switch` 状态更改为开（就像\
    \ `Checkbox` 一样）。\n2.  `getTextOn()`：返回开关打开时使用的文本。\n3.  `getTextOff()`：返回开关关闭时使用的文本。\n\
    \n`Ch09/SwitchExample` 项目提供了一个 `Switch` 的工作示例。清单 9‑10 展示了一个简单的开关布局。\n\n```\n清单\
    \ 9‑10：SwitchExample 的布局。\n```\n\n> **注意：**  \n> 不要试图将你的 `android:id` 设置为“switch”，例如\
    \ `@+id/switch`。Java 保留 `switch` 一词用于其 case 风格的分支逻辑语句，因此你需要像本示例中那样使用其他名称。\n\n\
    配置开关行为的逻辑位于我们的 Java 代码中，如清单 9‑11 所示。\n\n```\npackage org.beginningandroid.switchexample;\n\
    import androidx.appcompat.app.AppCompatActivity;\nimport android.os.Bundle;\n\
    import android.widget.Switch;\nimport android.widget.CompoundButton;\nimport android.widget.CompoundButton.OnCheckedChangeListener;\n\
    public class MainActivity extends AppCompatActivity {\n    Switch mySwitch;\n\
    \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n   \
    \     super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \        mySwitch = (Switch) findViewById(R.id.switchexample);\n        mySwitch.setOnCheckedChangeListener(new\
    \ OnCheckedChangeListener() {\n            @Override\n            public void\
    \ onCheckedChanged(CompoundButton buttonView, boolean isChecked) {\n         \
    \       if (buttonView.isChecked()) {\n                    mySwitch.setText(\"\
    The switch is on\");\n                } else {\n                    mySwitch.setText(\"\
    The switch is off\");\n                }\n            }\n        });\n    }\n\
    }\n清单 9‑11：在代码中控制开关行为。\n```\n\n如果这段代码结构和逻辑看起来眼熟，那就对了！从概念上讲，`Switch` 和 `CheckBox`\
    \ 几乎相同，并且对它们进行操作时的逻辑，至少在入门级别，几乎是可互换的。你可以在图 9‑9 和 9‑10 中看到开关在开启和关闭状态下的实际效果。\n\n\
    ![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig10_HTML.jpg](img/499629_1_En_9_Fig10_HTML.jpg)\n\
    \n**图 9‑10：** 开关已打开，逻辑已触发以更改其文本。\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig9_HTML.jpg](img/499629_1_En_9_Fig9_HTML.jpg)\n\
    \n**图 9‑9：** 开关小部件处于关闭位置。\n\n## 使用单选按钮选择项目\n\n在结束对 Android 核心 UI 小部件的详细探讨之前，是时候介绍\
    \ `RadioButton` 了。与大多数其他小部件工具包一样，Android 的 `RadioButton` 共享了你在 `CheckBox` 和 `Switch`\
    \ 小部件中已经体验过的双状态逻辑，并且通过同样是 `View` 和 `CompoundButton` 的子类，获得了许多相同的特性。正如你在之前的示例中看到的那样，你可以通过\
    \ `toggle()` 和 `isChecked()` 等方法设置或测试状态，并通过样式属性控制文本大小、颜色等。\n\nAndroid 的 `RadioButton`\
    \ 小部件进一步扩展了这些能力，它增加了一层额外的功能，允许将多个单选按钮分组到一个逻辑集合中，并且任何时候只允许设置其中一个按钮。如果你在近年使用过任何其他\
    \ UI 工具包、网页或智能手机应用，这听起来应该很熟悉。为了对多个 `RadioButton` 进行分组，在 XML 布局中，每个按钮都被添加到一个称为\
    \ `RadioGroup` 的容器元素中。\n\n与其他小部件一样，你可以通过 `android:id` 属性为 `RadioGroup` 分配一个 ID，并以该引用为起点，利用整个\
    \ `RadioButton` 组上可用的方法。这些方法包括：\n\n1.  `check()`：通过 ID 选中/设置特定的单选按钮，无论其当前状态如何。\n\
    2.  `clearCheck()`：清除 `RadioGroup` 中的所有单选按钮。\n3.  `getCheckedRadioButtonId()`：返回当前选中的\
    \ `RadioButton` 的 ID（如果没有 `RadioButton` 被选中，则返回 `-1`）。\n\n清单 9‑12 展示了一个包含 `RadioButton`\
    \ 的 `RadioGroup` 布局。\n\n```\n清单 9‑12：RadioButton 和 RadioGroup 布局。\n```\n\n你还可以在\
    \ `RadioGroup` 结构中穿插添加其他小部件，它们将根据 `ConstraintLayout` 的约束规则或我们将在下一章讨论的其他布局放置规则在组内渲染。你可以在图\
    \ 9‑11 中看到基本的 `RadioButton` 的实际效果。\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig11_HTML.jpg](img/499629_1_En_9_Fig11_HTML.jpg)\n\
    \n**图 9‑11：** `RadioGroup` 和 `RadioButton` 的实际效果。\n\n## 学习更多 UI 小部件\n"
- fmt: "There are always more widgets to learn or master with Android, and you can\
    \ find out about additional examples on the website, at [`www.beginningandroid.org`](http://www.beginningandroid.org).\
    \ Here, you’ll find further examples for widgets such as:\n\n1. `Slider`\n2. `AnalogClock`\n\
    3. `DigitalClock`\n\nWe’ll also look at more audio- and video-centric widgets\
    \ in Chapters [13](#499629_1_En_13_Chapter.xhtml) and [14](#499629_1_En_14_Chapter.xhtml).\n\
    \n## Summary\n\nIn this chapter, you have learned about many of the fundamental\
    \ widgets – or views – that are available when building Android user interfaces.\
    \ In the next chapter, we will take the user interface design concept further\
    \ and introduce layouts that act as a container and framework for placing, organizing,\
    \ and nesting your widgets in activities and other user interfaces.\n\n## 10.\
    \ Exploring Android Concepts: Layouts and More\n\nUnderstanding the various UI\
    \ widgets available in Android definitely empowers you to make various design\
    \ choices about how specific functions and behaviors in your application should\
    \ present themselves, but there is more to activity design than picking a radio\
    \ button or `TextView`. Layouts are Android’s declarative mechanism that arms\
    \ you with control over the complete on-screen landscape for your application.\
    \ Conceptually, a layout acts as both a container of the widgets you wish to use\
    \ in an application or activity and the blueprint and scaffolding for how all\
    \ of the widgets should appear, interact, and complement each other. As soon as\
    \ you conceive of designs that use more than one or two widgets, you will want\
    \ the power of layouts to help you avoid the tedium of manually controlling position,\
    \ buffers and whitespace, grouping, and so on.\n\nIn the coming sections, we’ll\
    \ review some of the most useful, and most popular, layout types supported by\
    \ Android, and the website contains further examples for some of the more specialized\
    \ or rarely used layouts.\n\n### What Is Android Jetpack\n\nAny cursory search\
    \ or review of Android design will surface some interesting milestones, and some\
    \ would say forks in the road, over Android’s recent history. You will very likely\
    \ see two terms of art crop up from any results from recent years. First, you\
    \ will discover the term “Material Design,” which is a styling and design philosophy\
    \ Google introduced to the world in 2012 and which influences things like the\
    \ default color palette, widget styling, and other design features in Android.\
    \ The second term you’ll encounter is “Android Jetpack,” and you’ll doubtlessly\
    \ find commentary about it making design – including layouts – “easier,” “better,”\
    \ and “new and different.” Those claims are true, but they can lead to some confusion\
    \ for a new developer. Am I using Jetpack? How do I even “get” Jetpack? And so\
    \ on.\n\nAt the Google I/O developer conference in 2018, Google introduced Android\
    \ Jetpack. Behind the headlines, it turns out that Jetpack is not something “different”\
    \ per se, but rather a repacking of many disparate Android UI framework pieces\
    \ and foundational elements and a revised and expanded approach to the Android\
    \ Support Libraries. Jetpack is not a competing way of building things. Rather,\
    \ Jetpack will filter through most of what you are doing, from referencing any\
    \ library in the `androidx` namespace through managing backward compatibility\
    \ and historic Android release support. In this way, you don’t really “add” Jetpack\
    \ to your design work. Instead, it implicitly and almost automatically steps in\
    \ when you leverage features you would naturally reach for in building your application\
    \ and using Android Studio to help you.\n\nA quick view of what is considered\
    \ under the auspices of Android Jetpack is provided by Google on the `android.com`\
    \ website. The existing parts of Android placed under the Jetpack banner fall\
    \ into four areas:\n\n1. Foundational components\n2. Architectural components\n\
    3. Behavioral components\n4. UI components\n\nGoogle provides the diagram shown\
    \ in Figure [10-1](#499629_1_En_10_Chapter.xhtml#Fig1) (source: android-developers.googleblog.com/2018/05/use-android-jetpack-to-accelerate-your.html)\
    \ to demonstrate the specific parts of Android Jetpack in each of these four realms.\n\
    \n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig1_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1** Understanding the Android Jetpack conceptual components ([¹](#fn1))\n\
    \nIf you take one thing away from this section, it’s that you needn’t worry about\
    \ asking yourself “Am I using Jetpack?” because you certainly are already! You\
    \ may not be using all of the features and functional groups, but there’s no need\
    \ to try to do that.\n\n### Using Popular Layout Designs\n\nWe will cover the\
    \ following major layout containers in the following sections:\n\n1. `ConstraintLayout`:\
    \ The current default in Android for new projects, and part of Jetpack, where\
    \ widgets are expressed with a minimal set of positioning constraints and no (or\
    \ little) tree-style hierarchy.\n2. `RelativeLayout`: A default for many years\
    \ following Android 4.0 until the introduction of Jetpack and `ConstraintLayout`,\
    \ it uses a rules-guided approach for self-arranging UI elements.\n3. `LinearLayout`:\
    \ The original default, commonly used in many early Android applications, this\
    \ follows a traditional box model, imagining all widgets as boxes to fit within\
    \ and around each other.\n\nAt the book’s website, [`www.beginningandroid.org`](http://www.beginningandroid.org),\
    \ you will also find extra material on other layouts Android offers, including:\n\
    \n1. `TableLayout`: A grid-like approach, similar to using an HTML table in web\
    \ development.\n2. `GridLayout`: Deceptively similar to `TableLayout`, the `GridLayout`\
    \ uses arbitrary-precision grid lines to split your display into successively\
    \ more specific regions in which to house widgets.\n\nAfter those topics, we’ll\
    \ turn to how to manipulate XML layouts from your Java code and embark on a modified\
    \ version of the ButtonExample application to show how to find and work with your\
    \ layouts in code.\n\n> **Note**  \n> While we will spend lots of the chapter\
    \ looking at XML for layouts, always remember that the Graphical Layout Editor\
    \ has a design mode, letting you visually add widgets, place and arrange them,\
    \ set relationships, and so forth. While you will likely always use a blend of\
    \ both handwritten XML and the layout editor, it’s worth jumping to the “other”\
    \ one from time to time as you start favoring an approach. It’s also a great way\
    \ to learn more of the nuances of layout XML, by observing what Android Studio\
    \ is doing in automatically generated XML when you use the Graphical Layout Editor.\n\
    \n### Revisiting the Constraint Layout\n\nYou already got your hands dirty with\
    \ very minimal `ConstraintLayout` designs in the earlier chapters, including your\
    \ `MyFirstApp` and the many widget examples in Chapter [9](#499629_1_En_9_Chapter.xhtml).\
    \ While you can continue to use `ConstraintLayout` as a simple container for widgets,\
    \ providing constraint settings to Android so it can manage layout for you, there\
    \ are more advanced features of `ConstraintLayout` that you should definitely\
    \ know about and explore to take your activity design to higher levels.\n\nThere\
    \ are a lot of very exciting features that `ConstraintLayout` offers, but I will\
    \ flag three of the most recent and most useful."
