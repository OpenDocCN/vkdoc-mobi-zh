    \ `AndroidManifest.xml`\nfile:\n\nOne extra permission step will be required at\
    \ runtime, with the user\nprompted to allow writing to external storage. With\
    \ the relevant\npermissions set, your code can now access recordings and store\
    \ them\naway. Listing [13-5](#499629_1_En_13_Chapter.xhtml#PC7) shows the Java\n\
    logic for AudioRecordExample.\n\n```\npackage org.beginningandroid.audiorecordexample;\n\
    import androidx.appcompat.app.AppCompatActivity;\nimport android.media.AudioManager;\n\
    import android.media.MediaPlayer;\nimport android.media.MediaRecorder;\nimport\
    \ android.os.Bundle;\nimport android.view.View;\nimport java.io.File;\npublic\
    \ class MainActivity extends AppCompatActivity {\nprivate MediaRecorder mr;\n\
    private MediaPlayer mp;\nprivate String myRecording=\"myAudioRecording\";\n@Override\n\
    protected void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
    setContentView(R.layout.activity_main);\n}\npublic void onClick(View view) {\n\
    switch(view.getId()) {\ncase R.id.startRecordingButton:\ndoStartRecording();\n\
    break;\ncase R.id.stopRecordingButton:\ndoStopRecording();\nbreak;\ncase R.id.startButton:\n\
    doPlayAudio();\nbreak;\ncase R.id.stopButton:\ndoStopAudio();\nbreak;\n}\n}\n\
    private void doStartRecording() {\nFile recFile = new File(myRecording);\nif(recFile.exists())\
    \ {\ntry {\nrecFile.delete();\n} catch (Exception e) {\n// This code can be extended\
    \ to deal with errors in recording here.\n}\n}\nmr = new MediaRecorder();\nmr.setAudioSource(MediaRecorder.AudioSource.MIC);\n\
    mr.setOutputFormat(MediaRecorder.OutputFormat.DEFAULT);\nmr.setAudioEncoder(MediaRecorder.AudioEncoder.DEFAULT);\n\
    mr.setOutputFile(myRecording);\ntry {\nmr.prepare();\n} catch (Exception e) {\n\
    // do exception handling here\n}\nmr.start();\n}\nprivate void doStopRecording()\
    \ {\nif (mr != null) {\nmr.stop();\n}\n}\nprivate void doPlayAudio() {\nmp = new\
    \ MediaPlayer();\ntry {\nmp.setDataSource(myRecording);\n} catch (Exception e)\
    \ {\n// do exception handling here\n}\nmp.setAudioStreamType(AudioManager.STREAM_MUSIC);\n\
    try {\nmp.prepare();\n} catch (Exception e) {\n// This code can be extended to\
    \ deal with errors in playback here.\n}\nmp.start();\n}\nprivate void doStopAudio()\
    \ {\nif (mp != null) {\nmp.stop();\n}\n}\n@Override\nprotected void onDestroy()\
    \ {\nsuper.onDestroy();\nif(mr != null) {\nmr.release();\n}\nif(mp != null) {\n\
    mp.release();\n}\n}\n}\nListing 13-5\nThe AudioRecordExample code\n```"
  trans: "\n# 在 Android 中播放音频\n\n## 即时播放的优缺点\n\n尝试即时播放音频（无论其来源如何）都存在利弊。简而言之，作为开发者，你需要回答这样一个问题：在用户点击“播放”（或等效操作）与实际准备好通过设备播放音乐之间的这段时间内，会发生什么？你是阻止所有活动并等待，还是让其他事情继续进行？这是一个颇具深度的主题，存在一系列细微差别，你可以在书籍网站\
    \ [`www.beginningandroid.org`](http://www.beginningandroid.org) 上阅读更多内容。\n\n###\
    \ 播放音频流\n\n掌握了这些变化后，我们的 `AudioStreamExample` 最终将接收到对 `onPrepared()` 的回调，从而开始播放音乐（或语音、鸟鸣声等）。`onPrepared`\
    \ 的逻辑与之前的示例保持一致。\n\n## 探索其他播放选项\n\n使用 Media 包和 `MediaPlayer` 对象并非你在 Android 下处理音频和音乐的唯一选择。其他选项包括：\n\
    \n- **SoundPool**：作为 `MediaPlayer` 的精简版本，`SoundPool` 简化了处理设备上声音文件的方法。它摒弃了任何流式传输或服务提供的音频，并利用文件/资源访问，通过\
    \ `FileDescriptor` 来访问与应用 `.apk` 文件打包在一起的音频文件，这通过包括 `.load()` 和 `.getAssets().openFd()`\
    \ 在内的简单方法实现。\n\n- **AsyncPlayer**：`MediaPlayer` 为音频播放的异步准备提供了一些支持，但正如你在 `AudioPlayExample`\
    \ 应用中所见，实际播放的大部分机制是同步的。`AsyncPlayer` 则采用完全异步的两步法。首先，实例化一个 `AsyncPlayer` 对象，然后调用其\
    \ `.play()` 方法，并传入要播放音频的 URI。在此之后的某个时刻，音频将开始播放，但由于此方法的异步特性，所涉及的时间是不确定的。\n\n- **JetPlayer**：在复杂度的另一端则是\
    \ `JetPlayer`。使用 `JetPlayer`，你可以利用 Android SDK 和 API 附带的外部工具来打包和管理应用的音频，并通过 MIDI\
    \ 标准呈现对其的访问。随后，你的 Android 应用便可以使用该音频，并访问一些相当复杂的操作选项，但这些超出了本书的范围。\n\n- **ExoPlayer**：最新且日益流行的播放方法。`ExoPlayer`\
    \ 是谷歌提供的开源产品，独立于常规 Android 机制发布，并提供诸如 SmoothStreaming 自适应播放等实验性或新颖的功能。它专为像你这样的开发者进行扩展和修改而设计。更多详情请参见\
    \ [`https://github.com/google/ExoPlayer`](https://github.com/google/ExoPlayer)。\n\
    \n`android.com` 网站上提供了大量关于这些音频替代方案的文档。\n\n## 录制音频\n\n在掌握了音频播放的基本原理之后，现在我们将注意力转向录制音频和分享这些声音。正如播放有多种替代方法一样，在\
    \ Android 中录制音频也有一系列多样的可能性。\n\n### 使用 MediaRecorder 录制音频\n\n作为本章开头介绍的 `MediaPlayer`\
    \ 的补充，`MediaRecorder` 提供了一套广泛的工具，用于在各种情况下录制声音。学习其功能的最佳方法是通过一个示例深入实践。我们将通过扩展之前的示例，在\
    \ `Ch13/AudioRecordExample` 代码中整合录制功能来做到这一点。在图 13-4 中，你看到了扩展后的用户界面——虽然仍然简单——它在你已经见过的现有播放示例基础上添加了录制按钮。\n\
    \n![../images/499629_1_En_13_Chapter/499629_1_En_13_Fig4_HTML.jpg](img/499629_1_En_13_Fig4_HTML.jpg)\n\
    \n**图 13-4** 为 `AudioRecordExample` 的 UI 添加的录制按钮\n\n`AudioRecordExample` 的布局 XML\
    \ 如代码清单 13-4 所示。最值得注意的一点是，按照之前的模式，所有按钮都会触发 `onClick()` 回调方法，这意味着录制和播放（以及两者的停止）将在相应的\
    \ Java 代码中处理。\n\n```\n代码清单 13-4\nAudioRecordExample 布局 XML\n```\n\n`AudioRecordExample`\
    \ 布局包含用于启动和停止录制及播放的按钮，这些按钮的作用不言自明。与我们之前的示例相比，一个显著的区别发生在幕后。为了访问任何 Android 设备的录制功能，你的应用都需要权限。此外，它还需要将录制的内容写入存储的权限（假设你想要存储录制的音频）。我们将在第\
    \ 19 章详细讨论权限和安全性，但现在是时候将以下两个权限声明添加到 `AndroidManifest.xml` 文件中：\n\n运行时还需要一个额外的权限步骤，即提示用户允许写入外部存储。设置好相关权限后，你的代码现在便可以访问录制的内容并将其存储起来。代码清单\
    \ 13-5 显示了 `AudioRecordExample` 的 Java 逻辑。\n\n```java\npackage org.beginningandroid.audiorecordexample;\n\
    import androidx.appcompat.app.AppCompatActivity;\nimport android.media.AudioManager;\n\
    import android.media.MediaPlayer;\nimport android.media.MediaRecorder;\nimport\
    \ android.os.Bundle;\nimport android.view.View;\nimport java.io.File;\npublic\
    \ class MainActivity extends AppCompatActivity {\n    private MediaRecorder mr;\n\
    \    private MediaPlayer mp;\n    private String myRecording=\"myAudioRecording\"\
    ;\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n \
    \       super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \    }\n    public void onClick(View view) {\n        switch(view.getId()) {\n\
    \            case R.id.startRecordingButton:\n                doStartRecording();\n\
    \                break;\n            case R.id.stopRecordingButton:\n        \
    \        doStopRecording();\n                break;\n            case R.id.startButton:\n\
    \                doPlayAudio();\n                break;\n            case R.id.stopButton:\n\
    \                doStopAudio();\n                break;\n        }\n    }\n  \
    \  private void doStartRecording() {\n        File recFile = new File(myRecording);\n\
    \        if(recFile.exists()) {\n            try {\n                recFile.delete();\n\
    \            } catch (Exception e) {\n                // 此处可扩展代码以处理录制过程中的错误。\n\
    \            }\n        }\n        mr = new MediaRecorder();\n        mr.setAudioSource(MediaRecorder.AudioSource.MIC);\n\
    \        mr.setOutputFormat(MediaRecorder.OutputFormat.DEFAULT);\n        mr.setAudioEncoder(MediaRecorder.AudioEncoder.DEFAULT);\n\
    \        mr.setOutputFile(myRecording);\n        try {\n            mr.prepare();\n\
    \        } catch (Exception e) {\n            // 在此处进行异常处理\n        }\n      \
    \  mr.start();\n    }\n    private void doStopRecording() {\n        if (mr !=\
    \ null) {\n            mr.stop();\n        }\n    }\n    private void doPlayAudio()\
    \ {\n        mp = new MediaPlayer();\n        try {\n            mp.setDataSource(myRecording);\n\
    \        } catch (Exception e) {\n            // 在此处进行异常处理\n        }\n      \
    \  mp.setAudioStreamType(AudioManager.STREAM_MUSIC);\n        try {\n        \
    \    mp.prepare();\n        } catch (Exception e) {\n            // 此处可扩展代码以处理播放过程中的错误。\n\
    \        }\n        mp.start();\n    }\n    private void doStopAudio() {\n   \
    \     if (mp != null) {\n            mp.stop();\n        }\n    }\n    @Override\n\
    \    protected void onDestroy() {\n        super.onDestroy();\n        if(mr !=\
    \ null) {\n            mr.release();\n        }\n        if(mp != null) {\n  \
    \          mp.release();\n        }\n    }\n}\n```\n\n**代码清单 13-5** `AudioRecordExample`\
    \ 代码\n"
- fmt: '### `AudioRecordExample` 代码详解


    `AudioRecordExample` 的代码看起来应该大致熟悉，因为它模拟了我们之前在`onClick()`方法中使用过的控制逻辑。在`onClick()`中，我们根据用户点击的按钮进行切换（`switch`），播放开始和停止基本模仿了`AudioPlayExample`的早期代码，而`doStopRecording()`方法与`doStopAudio()`几乎相同，只是分别改变了`MediaRecorder`和`MediaPlayer`对象的基础。这两个类之间的这种平行设计是有意为之，其中共同的目标由概念上匹配的方法来实现。


    我们代码中主要的新逻辑体现在`doStartRecording()`方法中。首先，`doStartRecording()`确保`File`对象`myRecording`是新创建的，必要时会删除任何先前存在的对象。在这种情况下，我们使用`java.io.File`包来提供文件处理能力——严格来说，这是标准的Java在运行，访问一个标准的Java库，并且超出了Android的常规框架范围。我们将在本书后续部分介绍更多关于使用标准Java库的能力。


    然后，我们创建一个名为`mr`的`MediaRecorder`对象，并调用其`setAudioSource()`方法来指示应用程序想要访问麦克风（`MIC`），以便能够录制声音。正是这个逻辑要求我们在清单文件中声明`RECORD_AUDIO`权限。


    在授予应用程序访问麦克风的权限后，我们能够设置音频所需的输出容器格式，以及用于编码将要录制并放入容器中的声音的编解码器。这些分别是`.setOutputFormat()`和`.setAudioEncoder()`调用。在我们的示例中，我们在每种情况下都使用了`DEFAULT`选项，这在实践中会根据所用硬件设备和Android版本的具体支持情况来选择容器和音频编解码器。


    #### Android支持的主要输出格式


    1.  `AAC_ADTS`：由Apple推广的容器和AAC音频格式。

    2.  `AMR_NB`：当你希望在Android设备间获得最大可移植性时，推荐使用AMR窄带容器类型。

    3.  `MPEG_4`：MPEG-4容器格式是最古老之一，但也最有可能在旧平台和设备上被错误解释。请谨慎使用。

    4.  `THREE_GPP`：另一个为广泛Android支持而推荐的容器格式。

    5.  `WEBM`：用于Google的`WEBM`格式以及无专利阻碍的Ogg编码文件格式的容器。


    容器格式以及音频和视频编解码器的主题非常广泛，并且充满了历史纷争和行业故事。它本身可以写成一本好书，但可惜我们无法在此深入探讨。为了帮助您开始编写利用音频的Android应用程序，以下是Android中用于音频（和视频）编码的更流行的编解码器列表：


    1.  `AAC`（以及`AAC_ELD`和`HE_AAC`）：用于高级音频编码（AAC）标准的音频编解码器。被Apple和其他设备及平台广泛支持。

    2.  `AMR_NB`：AMR窄带的实际音频编码器。虽然在Android之外使用不广，但此编解码器在Android版本和设备上提供了广泛的支持。

    3.  `VORBIS`：Ogg Vorbis音频编解码器格式。


    如果您再看一下`.doStartRecording()`方法，`.setOutputFile()`调用将我们之前创建的Java `File`对象配置为用户将要录制的音频流的存储库。


    最后，我们进入正常的两步操作：为我们的`MediaRecorder`对象调用`.prepare()`和`.start()`。就像`MediaPlayer`对象必须应对一系列潜在的延迟一样，`MediaRecorder`也是如此。这些延迟可能来自无响应的远程服务、缓慢的内部存储等等。无论何种情况，`.prepare()`会处理准备工作，以便允许您的录制数据被存储，并在一切就绪后将控制权返回给调用者（您的应用程序）。正是在这一点上，对`.start()`的调用才真正开始捕获音频输入。


    体验这一切的最佳方式是在您选择的设备或AVD上亲自运行示例`Ch13/AudioRecordExample`。


    ### 扩展您的开发者音频工具箱


    在向您介绍了Android下音频和声音的第一方面之后，还有其他关于将音频内容引入Android应用程序的知识值得了解。这些领域包括计算机和移动设备音频的一些基础知识，以及在Android
    Studio之外对于在应用程序中最佳利用声音和音频至关重要的各种工具。


    数字音频——即为在计算机、手机和其他数字设备上再现和使用而以数字形式捕获或创建的音频——是一个巨大的主题。本章的其余部分将为您提供进一步探索的起点。


    ### 理解关键音频方面


    在评估音频“好”的程度时，存在很多主观意见——我不会分享我的音乐偏好，尽管它们很棒！但也有一些客观的音频方面您应该熟悉，这样您才能首先理解哪些属性有助于提高音频质量，以及然后如何影响这些质量以产生“更好的声音”。


    ### 音频采样与频率


    您的Android设备及其音频播放、您编写的音频应用程序、您用来听音乐的计算机以及大多数现代电子音频设备都基于音频或声音的数字编码。这种编码通过以下两种方式之一产生：要么直接创建数字值，要么更典型的是（至少在历史上）对连续的音频源或信号进行采样，并以足够高的频率采集足够多的样本，从而在数字“快照”中创建音频信号的良好近似值。这是音频采样的基本原则。


    当您考虑应该以多高的频率对模拟信号进行采样以获得足够的数字快照以提供一定的保真度——使得重放时听起来与模拟原始声音几乎无法区分时，事情就变得复杂了。这里使用的术语是采样频率。对于音频，您通常会看到每秒44100次的采样率——例如，44.1
    kHz。还存在其他更高和更低的频率，选择会影响最终音频的质量和用于表示它的数据量。'
  raw: "The code for `AudioRecordExample`\nshould look broadly familiar, as it models\
    \ the control logic we have\npreviously used with the `onClick()` method. In\n\
    `onClick()`, we\nswitch based on the button clicked by the user, with the playback\
    \ start\nand stop basically mimicking the earlier code of `AudioPlayExample` and\n\
    the `doStopRecording()`\nmethod being almost identical to `doStopAudio()` with\n\
    only the basis of MediaRecorder and MediaPlayer objects changing\nrespectively.\
    \ This parallel between the two classes is intended, where\ncommon objectives\
    \ are served by conceptually matched methods.\nThe major new logic in our code\
    \ is with the `doStartRecording()`\nmethod. To begin, `doStartRecording()`\nensures\
    \ the File object, myRecording, is newly created, deleting any\npreviously existing\
    \ object if necessary. We make use of the `java.io.File` package\nto provide the\
    \ file handling capabilities in this case – strictly, this\nis vanilla Java in\
    \ action, accessing a standard Java library, and\noutside the guide rails of Android.\
    \ We will cover more of the\ncapabilities of using standard Java libraries later\
    \ in the book.\nWe then create a MediaRecorder object, named mr, and invoke its\n\
    .`setAudioSource()`\nmethod  to signal\nthat the application wants to access the\
    \ microphone (MIC) so that it can\nrecord sound. This is the logic that mandates\
    \ the `RECORD_AUDIO`\npermission in our manifest file.\nHaving given our application\
    \ access to the microphone, we are able to\nset the desired output container format\
    \ for the audio and the desired\ncodec to use to encode the sound that will be\
    \ recorded and placed in the\ncontainer. These are the `.setOutputFormat()`\n\
    and `.setAudioEncoder()`\ncalls. In our example, we use the `DEFAULT` option in\n\
    each case, which in practice chooses a container and audio codec based\non the\
    \ particular support offered by the hardware device and version of\nAndroid in\
    \ use.\n\nKey output formats supported by Android include\n\n1.  AAC_ADTS: The\
    \ container popularized by Apple and AAC audio\n    format.\n\n2.  AMR_NB: The\
    \ AMR narrow band container type is recommended when you\n    would like maximum\
    \ portability across Android devices.\n\n3.  MPEG_4: The MPEG-4 container format\
    \ is one of the most venerable, but\n    also the most likely to be misinterpreted\
    \ on older platforms and\n    devices. Use with caution.\n\n4.  THREE_GPP: Another\
    \ recommended container format for broad Android\n    support.\n\n5.  WEBM: The\
    \ container used for both Google’s WEBM format and then\n    patent-unencumbered\
    \ Ogg encoded file format.\n\nThe topic of container formats and audio and video\
    \ codecs is wide and\nfilled with a lot of history and industry intrigue. It would\
    \ make for a\ngreat book in itself, but alas, we don’t have space to explore it\n\
    in-depth here. To help you as you start writing Android applications\nthat leverage\
    \ audio, here is a list of the more popular codecs used for\naudio (and video)\
    \ encoding in Android:\n\n1.  AAC (and also AAC_ELD and HE_AAC): Audio codecs\
    \ for the Advanced\n    Audio Coding standard. Widely supported by Apple and other\
    \ devices and\n    platforms.\n\n2.  AMR_NB: The actual audio encoder for AMR\
    \ narrow band. While not\n    widely used outside Android, this codec provides\
    \ broad support across\n    Android versions and devices.\n\n3.  VORBIS: The Ogg\
    \ Vorbis audio codec format.\n\nIf you look again at the `.doStartRecording()`\n\
    method  , the `.setOutputFile()` call\nconfigures the Java File object we created\
    \ earlier, as the repository\nfor the audio stream the user will record.\nFinally,\
    \ we get to the normal two steps of calling `.prepare()` and `.start()` for our\n\
    `MediaRecorder`\nobject. Just as the `MediaPlayer` object\nhas to cope with a\
    \ range of potential delays, so too does the `MediaRecorder`. These\ndelays could\
    \ be nonresponding remote services, slow on-board storage, or\nwhat have you.\
    \ Whatever the situation, `.prepare()` takes care\nof the work to allow your recording\
    \ to be stored and returns control to\nthe caller (your application) once all\
    \ is in place. It is at this point\nthat the call to `.start()` actually\nbegins\
    \ capturing the audio input.\nThe best way to experience all of this in action\
    \ is to run the\nexample `Ch13/AudioRecordExample`\nfor yourself on your chosen\
    \ device or AVD.\n\nExpanding Your Developer Audio Toolset\nHaving introduced\
    \ you to the first aspects of audio and sound under\nAndroid, there are other\
    \ parts of bringing audio content into an Android\napplication that are worth\
    \ knowing. These areas include some of the\nfundamentals around audio for computers\
    \ and mobile devices, as well as\nthe kinds of tools outside of Android Studio\
    \ that are vital to making\nthe best use of sound and audio in your applications.\n\
    Digital audio – that is, audio captured or created in digital form\nfor reproduction\
    \ and use on computers, phones, and other digital devices\n– is a huge topic.\
    \ The remainder of the chapter will give you starting\npoints from which to explore\
    \ further.\n\nUnderstanding Key Audio Aspects\nWhen it comes to assessing how\
    \ “good” audio is, there are a lot of\nsubjective opinions – I will spare you\
    \ my music preferences, as good as\nthey are! But there are also some objective\
    \ aspects of audio that you\nshould familiarize yourself with so that you can\
    \ first understand what\nproperties contribute to audio quality and then how you\
    \ can go about\naffecting those qualities to make “better sound.”\n\nAudio Sampling\
    \ and Frequency\nYour Android device and its audio\nplayback, the sound applications\
    \ you write, the computer you use to\nlisten to music, and most modern electronics\
    \ audio equipment are based\non digital encoding of audio or sound. This encoding\
    \ is produced in one\nof two ways: either by directly creating the digital values\
    \ or more\ntypically (at least historically) by sampling a continuous audio source\n\
    or signal and using enough samples taken frequently enough that a good\napproximation\
    \ of the audio signal is created in digital “snapshots.”\nThis is the basic tenet\
    \ of audio sampling. Things get more\ncomplicated as you consider how often you\
    \ should sample an analogue\nsignal to get enough of a digital snapshot to provide\
    \ some fidelity –\nsomething that when replayed sounds nearly indistinguishable\
    \ from the\nanalogue original. Sampling frequency is the term used here, and\n\
    typically for audio you will see sampling rates at 44100 times per\nsecond – for\
    \ example, 44.1 kHz. There are other higher and lower rates\npossible, with the\
    \ choice affecting both the quality of the final audio\nand the amount of data\
    \ used to represent it."
