- fmt: "# Figure 9-5\n\nThe running `ImageViewExample` application showing the `ImageView`\
    \ with its resource\n\nYou can find the code for this example in the `Ch09/ImageViewExample`\
    \ folder.\n\n# Editing and Inputting Text with `EditText`\n\nIn your tour of Android\
    \ widgets so far, you've seen static text labels, buttons that can trigger activity,\
    \ and ways to display images. Nearly every application at some point needs input\
    \ from the user, and that input is usually text. No widget set would be complete\
    \ without some kind of editable form or field widget, and Android covers this\
    \ need with the `EditText` widget.\n\n`EditText` has a class hierarchy that sees\
    \ it derived from the `TextView` class you already know and then ultimately the\
    \ `View` class. Being a subclass of `TextView` means `EditText` inherits many\
    \ of the capabilities, methods, and data members you have seen in use for `TextView`,\
    \ such as `textAppearance`. `EditText` introduces a range of new properties and\
    \ attributes as well, giving you fine-grained control over exactly how your text\
    \ fields look and behave. These new attributes include:\n\n1. `android:singleLine`:\
    \ Manages behavior of the Enter key, determining if this should create a new line\
    \ within the text field or shift focus to the next widget in your activity layout\n\
    2. `android:autoText`: Manages the use of the built-in spelling correction features\n\
    3. `android:password`: Configures the field to display password dots as characters\
    \ are typed in\n4. `android:digits`: Restricts input to only accepting digits,\
    \ hiding the alphabetic-typed characters\n\nAndroid also offers a more nuanced\
    \ – some would say sophisticated – approach to specifying field characteristics\
    \ for `EditText`. The `inputType` property can be used instead, to bundle up all\
    \ desired properties and attributes for an `EditText` field. We will cover `inputType`\
    \ and related topics of keyboards and input methods in Chapter 10. Listing 9-6\
    \ shows `inputType` in action with other options.\n\nListing 9-6 shows an introductory\
    \ use of the `android:inputType` attribute, in this instance flagging that the\
    \ user's text should have the first letter of the first word automatically capitalized.\
    \ We have also used the regular attribute `android:singleLine` set to false, enabling\
    \ multiple lines of text within the `EditText` field.\n\n```\nListing 9-6\nConfiguring\
    \ EditText field behavior with XML properties\n```\n\nListing 9-7 shows how to\
    \ also work with an `EditText` field programmatically from your accompanying Java\
    \ package. You can find this example in `Ch09/EditTextExample`.\n\n```\npackage\
    \ org.beginningandroid.edittextexample;\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.os.Bundle;\nimport android.widget.EditText;\npublic class MainActivity\
    \ extends AppCompatActivity {\n@Override\nprotected void onCreate(Bundle savedInstanceState)\
    \ {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
    EditText myfield=(EditText)findViewById(R.id.myfield);\nmyfield.setText(\"Our\
    \ EditText widget\");\n}\n}\nListing 9-7\nThe EditText widget can be manipulated\
    \ easily from your code\n```\n\nNote that we have introduced the `findViewById`\
    \ method in this listing. You can imagine that where you have any number of widgets,\
    \ you need a programmatic way of finding which one you want to work with as part\
    \ of your program logic. By using a resource ID reference, of the form `R.id.named_id_from_XML_definition`,\
    \ you implicitly look for, and link to, the matching widget defined within your\
    \ XML layout via the `android:id` attribute of that widget. So in this case, `R.id.myfield`\
    \ finds and matches the `android:id` of your `EditText`, `@+id/myfield`.\n\nYou\
    \ can see the results from the `EditText` example in Figure 9-6.\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig6_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig6_HTML.jpg)\n\
    \n**Figure 9-6**  \n`EditText` widget in action, complete with editing text via\
    \ the keyboard\n\nThere are other typical signs that this is an editable field.\
    \ The built-in dictionary and spelling checker are available – try misspelling\
    \ a word, and it will be presented with red underlining. The blinking cursor is\
    \ also evident when the field has focus for text input. You can also help your\
    \ users type more quickly by choosing the sibling widget known as the `AutoCompleteTextView`\
    \ variant (again subclassed from `TextView` and `View`), which will prompt with\
    \ auto-completed suggested words as the user types.\n\n> **Note**  \n> You can\
    \ get more sophisticated when working with `EditText` widgets, by using a layout\
    \ known as a `TextInputLayout`, which wraps and extends the default `EditText`\
    \ behavior with features like text hinting, highlighting, helper prompts, and\
    \ so forth. You can find out more about `TextInputLayout` at `developer.android.com`.\n\
    \n# Checking Out the `CheckBox`\n\nAnother classic UI widget included with Android\
    \ is the `CheckBox`, providing a binary on/off, yes/no, or checked/unchecked widget.\
    \ `CheckBox` is a subclass of `View` (you guessed it) and `TextView` (which might\
    \ surprise you). This class ancestry means you get access to a range of useful\
    \ properties via inheritance. The `CheckBox` object provides you with some Java\
    \ helper methods to do useful things with your checkboxes:\n\n1. `toggle()`: Toggles\
    \ the state of the `CheckBox`\n2. `setChecked()`: Checks (sets) the `CheckBox`\
    \ regardless of current state\n3. `isChecked()`: A method to examine if the `CheckBox`\
    \ is checked\n\nIn Listing 9-8, we have an example checkbox layout with simple\
    \ accompanying Java logic you can find in the `Ch09/CheckboxExample` project.\n\
    \n```\nListing 9-8\nA layout featuring a CheckBox\n```\n\nWhile a mildly attractive\
    \ `CheckBox` might look nice by itself, it really needs to *do* something for\
    \ you or your users to be useful. We unlock the capabilities of a `CheckBox` by\
    \ adding Java logic to partner our layout. Listing 9-9 is the Java package that\
    \ demonstrates how to link logic to the checkbox.\n\n```\npackage org.beginningandroid.checkboxexample;\n\
    import androidx.appcompat.app.AppCompatActivity;\nimport android.os.Bundle;\n\
    import android.widget.CheckBox;\nimport android.widget.CompoundButton;\nimport\
    \ android.widget.CompoundButton.OnCheckedChangeListener;\npublic class MainActivity\
    \ extends AppCompatActivity {\nCheckBox myCheckbox;\n@Override\nprotected void\
    \ onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
    setContentView(R.layout.activity_main);\nmyCheckbox = (CheckBox)findViewById(R.id.check);\n\
    myCheckbox.setOnCheckedChangeListener(new OnCheckedChangeListener() {\n@Override\n\
    public void onCheckedChanged(CompoundButton buttonView, boolean isChecked) {\n\
    if (buttonView.isChecked()) {\nmyCheckbox.setText(\"The checkbox is checked\"\
    );\n}\nelse\n{\nmyCheckbox.setText(\"The checkbox is unchecked\");\n}\n}\n});\n\
    }\n}\nListing 9-9\nFiring up a CheckBox with some programmatic logic\n```"
