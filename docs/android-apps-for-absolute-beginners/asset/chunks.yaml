    ## 确保外部存储在需要时可用


    当我之前介绍使用外部存储时，我概述了一些潜在的缺点，包括其是否可靠的不可确定性。您的用户可能会做出疯狂的事情，比如物理移除设备中的SD卡，即使对于那些通过内部内存分区模拟外部存储的设备，Android仍然允许将该外部存储作为USB设备挂载到其他地方，这隐式地切断了其他应用程序对该存储的访问。


    作为开发者，您的目标应该是创建行为良好的应用程序，即使您的用户并非如此！这意味着，在您的应用程序尝试使用外部存储之前，对其进行存在性和可用性检查是明智的。


    为此，Android提供了一些有用的环境方法，其中最有用的是`Environment.getExternalStorageState()`，它从预定义的枚举中返回一个字符串，描述外部存储的当前状态。您可以使用此状态来确定外部存储的可用性、健康状况等。常见的返回值包括：


    - `MEDIA_BAD_REMOVAL`：此状态表示物理SD卡在卸载之前被移除，可能由于缓存的页面未被刷新而导致文件处于不一致状态（请参阅本章后面的文件系统讨论）。

    - `MEDIA_REMOVED`：当板载设备未映射外部存储且没有SD卡存在时，返回此值。

    - `MEDIA_SHARED`：当设备的外部存储作为USB设备挂载到其他外部平台时，返回此值，表示外部存储此时不可用，即使它存在于设备中。

    - `MEDIA_CHECKING`：当插入SD卡时，会执行检查以确定该卡是否已格式化以及使用何种文件系统。这些过程进行时返回此值。

    - `MEDIA_MOUNTED`：可用的外部存储的正常状态。

    - `MEDIA_MOUNTED_READ_ONLY`：通常在SD卡的物理开关设置为只读位置时出现，意味着无法对该部分外部存储执行写入操作。


    developer.android.com 上的 Android 文档列出了所有可能的外部存储状态值。


    ## Android 文件系统的其他注意事项


    现在您已经熟悉了在Android中处理文件的多种方法，还有一些微妙和不太微妙的管理注意事项需要考虑，以确保在文件系统上使用文件的长期可行性。


    ### Android 文件系统发展史


    纵观Android作为智能手机操作系统的历史，它支持了一系列用于板载存储的文件系统标准。这段历史中的三种主要格式是：


    1.  `YAFFS`，即另一种闪存文件系统：作为基于NAND存储的原始文件系统，它提供了许多有用的好处，包括磨损均衡支持，使得闪存因多次写入而随时间衰减的问题得到管理，并在一定程度上对操作系统和应用程序隐藏；同时还提供了文件系统级别的垃圾回收工具，帮助将存储的坏区移入“废弃池”，不用于有意义的存储。

    2.  `YAFFS2`：是`YAFFS`的演进和调整版本，为底层存储提供更好的长期健康管理。

    3.  `EXT4`：由Linux推广的文件系统，具备成熟文件系统的所有“高级”管理特性，包括每文件锁定语义、权限等。


    基于较旧的`YAFFS`和`YAFFS2`文件系统及其使用的设备的一个问题是缺乏文件锁定语义。简而言之，作为开发者，两者都不提供锁定单个文件的选项（例如，在编辑共享文件时），而是依赖于锁定“整个文件系统”来确保一致的访问。这有许多缺点，从阻塞可能同时尝试写入该文件的其他应用程序，到如果文件输入/输出发生在主线程上时阻碍高效的UI行为。


    作为开发者，您的主要问题只是不知道用户设备可能使用何种文件系统。即使问题可能出在Android本身，您也很可能因输入/输出锁定和阻塞问题导致的性能不佳而受到指责。


    ### 避免文件输入/输出引起的UI问题


    作为开发者，您可以使用一系列技术来缓解`YAFFS`或`YAFFS2`文件系统的锁定和争用问题。这些技术通常也有助于处理其他类型的网络端点输入/输出。'
