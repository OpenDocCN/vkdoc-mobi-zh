    ## Summary


    Now that you have the core concepts of fragments in mind, the best way to explore
    the full power of the fragment approach is to practice with more and more applications.
    We have further examples through the rest of the book that use fragments and more
    on the book website at [`www.beginningandoid.org`](http://www.beginningandoid.org).
    You can find thousands of more examples across the Web.


