    ```java

    package com.beginningandroid.clientexample;

    import android.app.Service;

    import android.content.Intent;

    import android.os.IBinder;

    import android.util.Log;

    public class ServiceExample extends Service {

    public static final String EXTRA_ALBUM="EXTRA_ALBUM";

    private boolean isShared=false;

    @Override

    public IBinder onBind(Intent intent) {

    // 作为 Service 的子类，我们需要实现 onBind 方法

    // 在这个案例中我们实际上不需要它，因此可以简单地返回 null

    return(null);

    }

    @Override

    public int onStartCommand(Intent intent, int flags, int startId) {

    String album=intent.getStringExtra(EXTRA_ALBUM);

    startSharing(album);

    return(START_NOT_STICKY);

    }

    @Override

    public void onDestroy() {

    stopSharing(); }

    private void startSharing(String album) {

    if(!isShared) {

    // 简化的逻辑——你可能在这里有更多复杂的操作

    Log.w(getClass().getName(), "相册已成功分享");

    isShared=true;

    }

    }

    private void stopSharing() {

    if(isShared) {

    // 简化的逻辑——你可能在这里有更多复杂的操作

    Log.w(getClass().getName(), "相册分享已移除");

    isShared=false;

    }

    }

    }

    ```


    **清单 18-3** `ServiceExample.java` 的服务实现


    在服务启动时，我们不需要执行任何特定于服务的设置，因此可以省略 `onCreate()` 调用中的额外逻辑，并依赖父类来处理它。我们实现了 `onStartCommand()`，以便在客户端调用
    `startService()` 时能够执行所需操作。这意味着我们需要检查用于指定服务的 Intent，并询问 `ServiceExample` 需要哪些附加信息，例如要分享的照片相册名称。获取相册名称后，我们调用为此服务实现的
    `startSharing()` 方法。


    如前所述，我已将 `startSharing()` 方法的大部分后续步骤进行了桩代码处理。在此示例中，我们可以实现的一个有用功能是使用 Android 的日志记录基础设施，在多个关键点输出相关信息，从而告知我们服务处于活动状态并正在工作，即使它缺少用户界面。在实际的服务中，这项技术也有助于你进行各种调试、性能计量等操作。通过示例应用程序和服务，你可以通过
    Logcat 中的输出来判断服务正在运行并执行其服务逻辑的各个部分。如果你什么都没有看到，这也很有用——没有日志记录能提示你出了问题。


    我实现了 `onDestroy()` 方法，目前它只调用我们服务的 `stopSharing()` 方法。与 `startSharing()` 一样，这里大部分也是桩代码处理，只包含一些日志记录，帮助你确认服务代码在被调用时能正常工作。


    如前所述，尽管我们计划不使用绑定方法，但我们仍然需要基于从 `Service` 继承的子类来实现 `onBind()`。在本实例中，它可以返回 `null`。未来的增强功能可能允许其他客户端绑定并执行更复杂的操作，例如创建照片蒙太奇、显示相册缩略图等。


    ## 创建使用服务的示例客户端


    为了完整性，最好能看到一个客户端实际使用该服务，而不是仅仅依赖我关于服务功能正常运行的承诺。清单 18-4 提供了一个供客户端驱动 `ServiceExample`
    服务的简单布局。


    ```

    清单 18-4

    ClientExample 应用的布局

    ```


    你可以看到我创建了一个非常简单的用户界面，`ClientExample` 应用只有两个按钮，一个标记为“开始分享”，另一个标记为“停止分享”。请记住，此处的目标是理解服务机制，而不是追求界面的美观性。


    由于我们采用命令式的 `startService()` 方法与服务进行一次性交互，因此我们的 Java 逻辑也非常直接。清单 18-5 展示了完整的客户端逻辑。


    ```java

    package org.beginningandroid.clientexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.Intent;

    import android.os.Bundle;

    import android.view.View;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    }

    public void onClick(View view) {

    switch(view.getId()) {

    case R.id.startSharing:

    startSharing(view);

    break;

    case R.id.stopSharing:

    stopSharing(view);

    break;

    }

    }

    public void startSharing(View view) {

    Intent myIntent=new Intent(this, ServiceExample.class);

    myIntent.putExtra(ServiceExample.EXTRA_ALBUM, "我的假期快照");

    startService(myIntent);

    }

    public void stopSharing(View v) {

    stopService(new Intent(this, ServiceExample.class));

    }

    }

    ```


    **清单 18-5** 示例 `ClientExample` 应用的 Java 代码


    你现在应该非常熟悉基本的 `onCreate()` 方法，在 `ClientExample` 中它只是加载了布局。`onClick()` 实现遵循了通过检查传入的视图来判断用户点击了哪个按钮的模式，并根据需要触发
    `startSharing()` 或 `stopSharing()` 方法。


    如果调用了 `startSharing()`，它会为服务实例化一个 Intent，并传递一个非常可信的、我们希望分享的照片集的相册名称。通过 `startService()`
    传递 Intent 来调用服务。我们的 `stopSharing()` 实现基本上是用一个与原始服务调用匹配的新 Intent（类型恰当）来调用 `stopService()`
    命令，从而将目标指向我们的服务以进行关闭。


    ## 实际测试服务


    你可以继续测试运行服务并观察结果。请确保在清单文件中添加了 `<service>` 条目，例如：


    ```


    当你运行 `ClientExample` 应用时，它触发了对 `ServiceExample` 服务的调用，使你能够在 Logcat 中看到如下条目：


    ```

    ...org.beginningandroid.clientexample.ServiceExample: 相册已成功分享

    ...org.beginningandroid.clientexample.ServiceExample: 相册分享已移除

    ```


    ## 小结


    你现在已经探讨了关于服务的所有基础知识，并准备好在未来的应用程序设计中加入它们。请务必尝试构建你自己的服务变体，使用我们在本章中探讨过的不同服务与客户端通信方法。


    # 19. 在 Android 中处理文件


    在本章中，我们将详细探讨文件，包括 Android 为应用程序存储、检索和管理数据的方法。在下一章中，我们将处理关于数据库的配套工具，它们与文件一起为应用程序中的数据管理提供了丰富的选项。我们还将把这些与内容提供者进行对比，后者是
    Android 更高级的数据访问和管理模型。


    本章中的示例集中介绍 Android 提供的两种基于文件数据的主要方法。方法一可以视为“应用内嵌”模型，它使用与应用一同打包的原始资源和资产。方法二是“Java
    I/O”方法，它利用广为人知的 `java.io` 包来操作文件、数据流等，就像你在任何其他操作系统上使用基于 Java 的文件管理一样。


    每种方法都有其优点和缺点，我们将会讨论，你可以放心，没有所谓的最佳方法——只有最适合当前问题的方法。

