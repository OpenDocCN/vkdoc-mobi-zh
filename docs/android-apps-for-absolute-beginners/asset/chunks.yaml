    ## 增加描述性


    在 Android 世界中，`strings.xml`文件就像一个沉睡的巨人。你可以在此定义各种常量，这些常量基本上是很少变化，或者至少在你的应用上下文中初始值为固定值的东西。当你考虑常量时，可以超越我之前给出的幽默示例（为什么要把自己限制在珠穆朗玛峰以米为单位的高度上——为什么不用英尺、杆、弗隆或链呢？！）。更严肃地说，你应该时刻留意（此处非双关）任何在代码中输入字面字符串的情况，并问问自己，将单个条目放入`strings.xml`文件中是否会更好。程序员们几十年来艰难领悟到的教训，归结起来就是一句格言：“将字面字符串从你的代码中抽象出来——你以后会感谢我的。”


    现在让我们向`strings.xml`文件添加一个条目，目的是替换你在`MyFirstApp`应用中看到的屏幕文本。要做的工作不仅仅是定义新的引用值，我们将在下一节中处理。现在，请打开`strings.xml`文件，它看起来应该很像代码清单
    8-4。


    ```

    MyFirstApp


    代码清单 8-4

    MyFirstApp 的默认 strings.xml 文件

    ```


    添加新的一行，并创建一个带有`name`属性的`<string>`元素条目，该属性值等于一个名为`welcome_text`的文本字符串。`<string>`元素的值应该是你实际希望用户在屏幕上看到的任何文本。你的`strings.xml`文件应该看起来像代码清单
    8-5 这样。


    ```

    MyFirstApp

    Hello Android, from the strings.xml file!


    代码清单 8-5

    向 strings.xml 添加新的 <string> 元素

    ```


    请记住，这是 XML。`name`属性的值可以是任何你喜欢的——`"welcome_text"`、`"look_at_my_great_string"`、`"text1"`等等。只要你在以后正确引用它，你就享受到了可扩展标记语言（XML）带来的“可扩展”好处！让我们在下一节看看如何使用这个新字符串。


    ## 用 XML 定义 Activity 布局


    Android 依赖 XML 的、也许是最大也最复杂的领域是视图布局的定义和管理——也就是说，定义和控制屏幕用户界面如何呈现给用户，以及如何通过你的应用以编程方式进行控制。


    ```


    代码清单 8-6

    MyFirstApp 的默认 activity_main.xml 布局文件

    ```


    我们默认的`MyFirstApp`应用是通过新建项目向导生成的，默认情况下它为你的`MainActivity`活动选择了`"ConstraintLayout"`布局。这是你的活动可用的众多布局类型之一，它们都派生自父类`View`。我们将在接下来的几章中深入探讨视图、布局及其众多变体。现在，让我们开始修改你现有的布局。`ConstraintLayout`旨在让你对出现在其中的其他
    UI 元素（称为控件）的大小和位置拥有非常灵活的控制。从代码清单 8-6 可以看出，我们只描述了一个控件，即一个`TextView`。我们将在接下来的两章中添加更多控件。现在，让我们利用`strings.xml`引用值为控件文本提供支持（而不是硬编码值），从而使屏幕问候语更加灵活。


    让我们更新布局 XML，将硬编码的字符串`"Hello Android!"`替换为对我们在上一节`s`trings.xml`文件中定义的`welcome_text`常量的引用。更改`android:text`属性，使其引用`"@string/welcome_text"`，即之前创建的字符串别名的名称。你的布局现在应该看起来像代码清单
    8-7 这样，更改部分以粗体显示。


    ```


    代码清单 8-7

    更改 TextView 文本以引用 strings.xml 常量

    ```


    **注意**


    有点烦人的是，虽然引用值 XML 文件是以复数形式命名的——`strings.xml`、`colors.xml`和`styles.xml`——但当我们实际引用它们包含的定义时，我们使用的是单数引用——`@string`、`@color`和`@style`。Android
    Studio 会在你输入时通过提示来帮助你。


    将布局 XML 更改为引用我们的`strings.xml`中的`welcome_text`值后，是时候再次运行你的应用来看看效果了，如图 8-2 所示。


    ![../images/499629_1_En_8_Chapter/499629_1_En_8_Fig2_HTML.jpg](img/499629_1_En_8_Fig2_HTML.jpg)


    图 8-2

    MyFirstApp 中完全通过 XML 定义控制的新欢迎文本


    瞧！你仅通过可用的 XML 定义就更改了应用中的颜色和欢迎文本。Android 应用从使用 XML 作为定义和控制机制中获益良多，当结合 Java 操作 XML
    的能力时，结果可能令人惊叹。但现在，你已经掌握了继续你的 Android 之旅所需的基础 XML 知识。


    ## 本章小结


    这一章让你对 XML 以及 Android 如何利用 XML 有了一个旋风般的介绍。XML 是一个如此庞大的主题，一章内容无法全面涵盖，我鼓励你在网上和其他书籍中寻找更多信息。在
    Android 开发领域中，XML 最大的优势之一是既能用它来控制应用逻辑，又能通过应用逻辑来控制它。我们将在接下来的两章中更深入地探讨这一点，届时我们将更深入地进入
    Android 布局和控件的世界！


    # 9. 探索 Android 概念：核心 UI 控件

