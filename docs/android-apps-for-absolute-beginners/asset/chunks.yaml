- fmt: 'SQLite supports the normal SQL commands like `SELECT`, `INSERT`, `UPDATE`,
    and `DELETE`, but may not support some key features of later SQL evolutions depending
    on the version. This can include:


    1. Only supporting a subset of ANSI outer join syntax

    2. Minimal alter table support, allowing you to rename and add columns, but not
    drop columns or morph data types

    3. Support for row-level triggers, but not statement-level triggers

    4. Views being read-only

    5. No support for window functions and common table expressions, even though these
    were added to SQLite in version 3.25 – only devices supporting Android SDK level
    29 or higher will provide a version of SQLite that supports window functions


    You might worry about those missing features, but in reality they are mostly at
    the higher end of database usage and not a daily requirement for most uses of
    a small embeddable database library. You still get the tremendous power of SQL
    even without those more recent features.


    ## Creating SQLite Databases for Your Applications


    When it comes to kick-starting your application with a SQLite database, you have
    two approaches from which you can choose:


    1. Create a SQLite database file as part of your development environment, or source
    it externally and copy it as a resource into your Android project.

    2. Have your Android application create the database it needs and optionally populate
    with any beginning data.


    Each approach has benefits and drawbacks. By packaging a premade SQLite database,
    you sign yourself up to keeping the database schema and code development in sync
    – though this is a problem not unique to Android. Having your application create
    the database spares you this burden, but depending on the kind and amount of data
    your SQLite database might need, it could place a heavy startup burden on your
    application. Android can help with this, as it provides a range of SQLite setup
    assistance options.


    Android provides the `SQLiteOpenHelper` class, designed for you to subclass in
    your application. `SQLiteOpenHelper` takes care of all the initial setup of a
    SQLite database and deals with future changes and upgrades. Your job is to implement
    (at least) three of the methods from the parent `SQLiteOpenHelper` class, with
    a fourth method for downgrades also available as an option.


    Your first job is for you to add logic to the `SQLiteOpenHelper` constructor,
    calling that parent constructor as a basis. The parent class takes care of checking
    to see if the nominated database file already exists and creates the file if needed.
    The constructor also performs a version check against the provided version and
    can call the `onUpgrade()` and `onDowngrade()` methods as necessary, as well as
    some other more esoteric tasks beyond the scope of this introduction.


    Second, you must implement the logic for the `onCreate()` method. This is where
    you build and execute the Data Definition Language (DDL) SQL commands to create
    your tables, indexes, views, and so on, according to your database schema design.
    Following object creation in the SQLite database, you should then populate any
    data you need via insert and update statements.


    Finally, you will need to implement `onUpgrade()` (and optionally the `onDowngrade()`
    method). These methods handle the DDL that implements schema changes and any related
    data changes you wish to make as you upgrade your application and decide the SQLite
    database structure needs to change to support your desired application behavior.


    With the theory of using SQLite in your application covered, it’s time to explore
    an example application that will help bring the concepts to life.


    ## Introducing the SQLiteExample Application


    For the remainder of the chapter, the `ch20/SQLiteExample` application will be
    used to highlight all of the key SQLite capabilities you might want to use when
    building database-driven Android applications. We will use simple `LinearLayout`
    and `ListView` to help demonstrate the use, and display, of data from a SQLite
    database.


    Figure [20-1](#499629_1_En_20_Chapter.xhtml#Fig1) shows the UI that houses a `ListView`
    for showing known Android device models from a SQLite database. We have buttons
    for adding new device models and showing information about known devices.


    ![../images/499629_1_En_20_Chapter/499629_1_En_20_Fig1_HTML.jpg](images/499629_1_En_20_Chapter/499629_1_En_20_Fig1_HTML.jpg)


    **Figure 20-1** The SQLiteExample main activity and appearance


    This kind of simple layout and view should be familiar to you by now, so we won’t
    dwell on that. Listing [20-1](#499629_1_En_20_Chapter.xhtml#PC1) shows the layout.


    ```

    Listing 20-1

    The SQLiteExample main activity layout

    ```


    There are two points to note about this layout. First, I have defined two nested
    `LinearLayouts`. The outermost `LinearLayout` has the attribute `orientation=vertical`
    and contains the inner `LinearLayout` and the `ListView` with the stock Android
    id. The inner `LinearLayout` holds the two buttons, `addNewModel` and `getModelInfo`,
    with `orientation=horizontal`. This is a useful trick to have the UI widgets flow
    as we want them, but a more elegant solution could be devised with suitable weightings,
    gravity, and layout references.


    Second, I’m using my common pattern of both buttons calling an `onClick()` method,
    which will have matching Java code determine which button was clicked and direct
    the logic from there.


    Looking back at Figure [20-1](#499629_1_En_20_Chapter.xhtml#Fig1), you can see
    some data about several devices is already listed. This means there is data in
    a database somewhere already being used to demonstrate the application. I performed
    this in the implementation of `SQLiteOpenHelper` used in the `SQLiteExample` application.
    The Java for this implementation is shown in Listing [20-2](#499629_1_En_20_Chapter.xhtml#PC2).


    ```java

