    ## 借助 ImageView 和 ImageButton 获取图像


    如果您的 Android 应用程序仅由文本和几个按钮组成，那么事情会变得非常乏味——也许字谜游戏除外。图像和图片是 UI 设计的核心部分，许多应用程序不仅将它们用于装饰，还作为核心应用功能的一部分，例如相册、图像编辑器等。


    Android 有一对图像功能的等效组件，对应于您已经使用过的 `TextView` 和 `Button`——它们是 `ImageView` 和 `ImageButton`
    小部件，并且同样派生自基类 `View`。


    与本章中的许多小部件一样，通常最好在蓝图/设计模式和随附的代码视图中使用布局编辑器，以 XML 方式定义您的 `ImageView` 或 `ImageButton`，而不是费力地在
    Java 中以编程方式定义它们。


    `ImageView` 和 `ImageButton` 都在其相对元素的 XML 定义中引入了一个额外属性，即 `android:src` 值。此属性的值是对您提供的图像资源的引用，无论该资源是
    `.png` 文件、`.jpg/.jpeg` 文件、`.gif` 文件还是其他支持的图像格式。在第 4 章中，我介绍了项目结构，包括 `res/drawable`
    层次结构。您应该将图像文件放置在此文件夹中以供引用，Gradle 将在构建时在此处查找引用的图像，以便将它们打包到应用程序包中。


    `ImageButton` 与 `ImageView` 的不同之处在于，它支持您在本章前面已经了解的常规 `Button` 小部件的按钮式行为。这意味着 `ImageButton`
    小部件可以（并且应该）定义 `onClick` 监听器，并构建后续逻辑来处理您希望在点击 `ImageButton` 时应用程序执行的任何操作或行为，就像您为
    `Button` 小部件所做的那样。


    如果您还记得我们在第 3 章中对典型项目布局的概述，您可能已经猜到，指定 `android:src` 值的默认方法是引用您放置在项目的 `res/drawable`
    目录（和/或其密度特定变体）中的图形资源。


    清单 9-5 展示了一个配置为引用 `res/drawable` 文件夹中图像的 `ImageView` 示例，本例中的图像是我在大英博物馆拍摄的罗塞塔石碑照片。


    ```

    清单 9-5

    为 ImageViewExample 布局使用 ImageView 小部件

    ```


    正在运行的应用程序如图 9-5 所示。


