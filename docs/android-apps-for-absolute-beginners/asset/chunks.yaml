    ```


    关于此布局有两点需要注意。首先，我定义了两个嵌套的 `LinearLayout`。最外层的 `LinearLayout` 设置了 `orientation=vertical`
    属性，并包含内部的 `LinearLayout` 和使用 Android 标准 id 的 `ListView`。内部的 `LinearLayout` 包含了两个按钮
    `addNewModel` 和 `getModelInfo`，并设置了 `orientation=horizontal` 属性。这是一个让 UI 组件按我们想要的方式排列的有用技巧，但可以通过适当的权重、重力属性和布局引用来设计出更优雅的解决方案。


    其次，我使用了我常用的模式，即两个按钮都调用 `onClick()` 方法，该方法将使用匹配的 Java 代码来确定点击了哪个按钮，并从那里引导逻辑。


