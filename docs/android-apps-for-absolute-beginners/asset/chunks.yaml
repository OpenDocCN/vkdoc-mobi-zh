    and mechanisms throughout the rest of the book. To ensure that your development
    and testing show you as best as possible how your artwork, images, video, and
    other application resources will look on real devices, ensure you choose a screen
    for your development system that is at least as good as, if not better than, the
    devices you are targeting. Otherwise, you will get a distorted idea of how things
    look when running in the real world.'
  trans: '

    ### 存储一切！


    随着你开始构建越来越多的 Android 应用，对磁盘空间的需求也会增加，以容纳各种项目、资源等。有些地方显然会消耗磁盘空间，例如源代码文件（体积很小）以及图像和视频文件（体积可能非常非常大）所占用的空间。


    还有一些 Android 开发特有的方面，仔细想想也很明显，比如不同版本的 Android SDK，每个版本可能需要高达 1 GB 的空间。


    在考虑存储需求时，`AVD` 是一个隐藏因素。因为创建一个新的 `AVD` 镜像来测试某种屏幕尺寸或设备格式非常容易，所以在你意识到之前，很可能就已经有 20、30
    甚至更多个 `AVD` 了。如果你要认真地在多种屏幕尺寸和分辨率上进行测试，那么拥有几十个 `AVD` 是最低要求。


    当你在系统中配置了数十个 `AVD` 后，很容易就会消耗掉 50 GB 甚至更多的空间。`AVD` 最大的存储消耗因素之一，是你为其分配的板载存储或模拟 SD
    卡存储的大小。这些选项是通过分配你的实际磁盘空间来模拟的，这意味着如果你想模拟一台拥有 128 GB 存储的最新 OnePlus 7 设备，那么你的 `AVD`
    就会占用你真实磁盘空间的 128 GB 甚至更多！当然，你不必为模拟 SD 卡和设备存储分配如此大的空间，但通常你至少会分配一个可用的容量，所有这些加起来就很可观了。


    在开始 Android 应用开发之旅时，一个比较实用的存储空间预估值大约是 50 GB。这足以让你安装几个版本的 Android SDK、一定数量的各种尺寸和配置的
    `AVD`，以及 Android Studio 和其他工具。为了未来用起来更舒适，特别是为了测试目的而准备大量 `AVD` 时，你应该争取拥有 100 GB
    或更多的空间。


    与存储空间大小同等重要的是存储类型及其速度。传统的机械硬盘当然便宜，但代价是数据传输速度，也就是 IOPS（每秒输入/输出操作次数）。现代存储选项，例如固态硬盘
    (SSD)，在数据传输性能方面有显著提升，因此从构建和运行 `AVD`、部署大型应用以及依赖大量图像和视频资源的应用，到任何数据密集型的计算或操作，其运行速度都会更快。


    如果你有选择余地，请始终选择固态存储方案，尤其是当你计划进行数据密集或计算密集的开发时。对于那些正在考虑购买专用笔记本电脑用于开发的人来说，由于近年来市场已大幅转向
    SSD，你会发现自己有非常多的选择。


    ### 查看一切！


    如果你要成为一名专注的 Android 应用开发者，你将需要长时间盯着屏幕。鉴于此，你可能需要考虑如何充分利用你将要观看的屏幕，以及你是否需要不止一个屏幕。


    在显示器或屏幕方面，开发者的满意度很大程度上取决于高度个人化的因素。你喜欢大屏幕吗？你更喜欢多屏吗？不同朝向的屏幕（横屏或竖屏）对你更有帮助吗？你会将笔记本电脑的屏幕与固定显示器混合使用吗？需要考虑的因素远不止这些，但我会重点指出两个对你产生长期有益影响的关键特性：尺寸和清晰度。


    说到屏幕尺寸，一些实际考量会让你相信，至少买一个大屏幕是值得的。回顾第 5 章的图 5.6，你会看到两个并排运行的 `AVD`，一个代表普通手机屏幕，另一个代表平板电脑屏幕。你不会惊讶于图中视图几乎占满了我
    MacBook Air 的 13 英寸屏幕。如果仔细看，你可以看到隐藏在 `AVD` 屏幕后面的 Android Studio 会话的微小片段。但你能看到的也就这些了。在这个尺寸的屏幕上，如果不做出一些非常别扭的妥协，你根本无法在
    Android Studio 中进行有效的并排开发，同时又在 `AVD` 中观察效果。你可以在 Android Studio 中调整屏幕和窗口的大小，也可以平铺窗口，试图在运行单个
    `AVD` 的情况下把所有内容都塞进去，如图 6-1 所示。


    ![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig1_HTML.jpg](img/499629_1_En_6_Fig1_HTML.jpg)


    图 6-1


    在 13 英寸笔记本电脑屏幕上并排运行 Android Studio 和一个 `AVD`


    如果你认为这样有助于实时调试或同时比较不同布局，我得说这根本不行。这简直就是个大麻烦！相比之下，在 24 英寸屏幕上，Android Studio 和多个
    `AVD` 可以愉快地生活在一个拥有充足空间的屏幕上，如图 6-2 所示。


    ![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig2_HTML.png](img/499629_1_En_6_Fig2_HTML.png)


    图 6-2


    在 24 英寸屏幕上运行 Android Studio 和多个 `AVD`


    就让这些图片胜过千言万语吧。等你仔细看完之后，我对屏幕尺寸的总结性陈述将无需更多佐证。如果可以，买一个大屏幕吧！


    说到屏幕质量，特别是像素密度，我们又进入了一个非常主观的领域。在撰写本书的 2020 年市场，你可以从多代“高密度”屏幕中选择，还包括 4k、5k，甚至 8k！你的个人品味和偏好是最重要的考虑因素，但我建议你牢记以下两点：


    1.  **亲眼看看屏幕的实际效果**。如果可能的话，去一个能给你展示实际连接到任何类型电脑上的屏幕的零售商那里看看。这能让你直观感受显示器实际表现如何，并让你可以调节亮度、白平衡、对比度和刷新率等参数，以确保屏幕的表现令你满意。


    2.  **选择分辨率密度与你要构建的应用相当或更高的屏幕**。在本书后续章节中，我们将更多地讨论 Android 屏幕分辨率的选项和机制。为了确保在开发和测试中能尽可能真实地展示你的作品、图片、视频和其他应用资源在真实设备上的显示效果，请确保你为开发系统选择的屏幕至少不差于（甚至优于）你的目标设备。否则，你会对事物在实际运行中的样子产生扭曲的认知。

    '
- fmt: '### Connecting It All!


    Other aspects of your developer setup to consider include the following:


    1.  **Keyboard and mouse** : It seems mundane, but you will be using these peripherals
    a lot. Don’t settle for ones you don’t like!


    2.  **USB ports and cables** : If you plan on extensive testing of your applications
    with tethered Android devices, then it pays to have ample available USB ports
    and cables with appropriate adapters. Most older Android devices use micro-USB
    connectors, with recent models switching to USB-C-style connectors.


    3.  **Charging cables, cradles, and devices:** Again, if you plan on using a lot
    of real Android devices, keeping them powered up becomes somewhat of a chore.
    While they can be charged via the USB connection to your developer machine, the
    power drawn over historic USB protocol versions was limited. It was not until
    USB-C that “standard” USB could draw more than 500 mA current. Where possible,
    make space and account for power charges that plug into a wall socket.


    It’s easy to overlook these points, but they can contribute to making your developer
    experience smoother and more enjoyable, and if you ignore them, you can find them
    adding friction and frustration that undermine your best endeavors.


    ## Test Handsets and Tablets


    Let me start the topic of test handsets by stating that there is no cast-iron
    rule that says you must have physical Android phones on which to test your applications.
    Many apps are built and launched based on testing in entirely simulated environments,
    such as AVDs and the like.


    Many applications, however, are built based on real-world testing and feedback
    on a range of Android devices, where the quirks and differences are detected and
    addressed in real-world situations. And there are differences! While the Android
    SDK and the core platform features of Android are (almost) universal, there are
    countless ways in which both handset vendors and phone companies tweak and change
    Android’s default behavior. Often these “telcos” are doing this to attempt to
    differentiate themselves from other phone companies, or from a more cynical perspective,
    they are trying to inject themselves into a position that hopes their users think
    they are more important than they really are.


    Whatever the reason, you will find yourself at some point in your Android developer
    journey asking if you need to spend money to acquire different Android handsets
    on which to test your application. I can’t give you a definitive answer, but I
    can make some recommendations to help you decide how much of your precious time
    and money to devote to acquiring test handsets.


    ### Option 1: All-Virtual Testing


    Sticking with Android Virtual Devices is a perfectly good strategy when you are
    beginning your development journey. And to be honest, it serves many successful
    developers throughout their entire career. With each release of Android Studio,
    Android SDKs, and supporting tools from other vendors like Intel, it is more and
    more feasible to take this path and not spend any additional time or money on
    dedicated testing hardware.


    The drawbacks are that you will sometimes struggle to replicate real-world experiences,
    such as appreciating the true performance of your application, and you might also
    fall victim to the “special features” introduced by telcos that I alluded to in
    the preceding.


    ### Option 2: Start Virtual and Augment with Top Devices


    The blended approach of using AVDs extensively and selectively augmenting with
    some key hardware choices happens to be my preference. This is for several reasons:


    1.  Using AVDs is increasingly effective, as outlined in option 1 in the preceding.


    2.  A huge part of the market is represented by just one vendor: Samsung. Purchasing
    one Samsung device (or a few devices) will give you exposure to the majority of
    real Android devices used around the world.


    3.  Google themselves have pushed several generations of stock Android devices
    under successive brands, first with the Nexus line and more recently with the
    Pixel line. Having one of these devices allows you to see your application as
    it looks and behaves on a device free of telco “enhancements.”


    If you take this approach, buying a small number of handsets gives you the ability
    to test the real-world experience of a significant number of your potential users.


    ### Option 3: Buy, Buy, and Buy Some More


    The option of trying to test all edge cases, quirks, strange behaviors, and bugs
    appeals to some developers. To do this in the Android space requires a lot of
    patience and more importantly deep pockets! You could easily amass dozens, scores,
    or even hundreds of devices and still not cover all of the strange devices – and
    their strange issues – that your users might encounter in the real world. Your
    bank balance might be showing a few strange issues by this point as well!


    I don’t recommend this approach, but I will admit I do not push Android development
    and applications into the kinds of demanding spaces that uncover lots of these
    issues. My attempt at amassing a testing library of devices is shown in Figure
    [6-3](#499629_1_En_6_Chapter.xhtml#Fig3).


    ![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig3_HTML.jpg](images/499629_1_En_6_Chapter/499629_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3** My collection of Android devices, spanning over a decade of Android
    history


    I stopped at 20-odd devices, and my bank balance thanked me!


    ### Option 4: Other People’s Hardware


    One of my favorite jokes about cloud computing is that it is just running your
    code on other people’s hardware. It’s funnier still if you understand what I do
    as my day job! Behind the humor is a useful insight, however, that testing your
    Android application on real devices is best done when someone else is taking care
    of owning and provisioning those devices.


    There are a range of commercial options available as of the time of writing this
    book that let you test your application on a bank of real devices that you don’t
    have to buy yourself. You rent or pay for access as a service and get all the
    benefits of testing across a wide variety of handsets, with none of the up-front
    cost of buying them nor the trailing cost of maintaining them.


    It’s beyond the scope of this book to present an exhaustive list of such services,
    but here are the dominant options you can access from commercial vendors today,
    and from there you can certainly search for competing options:


    1.  **AWS Device Farm** : From the vendor of all things cloud – Amazon – comes
    AWS Device Farm. Amazon offers access to around 400 different devices from a huge
    range of manufacturers, with useful tools to manage your testing workloads from
    within your browser. More details at [`https://aws.amazon.com/device-farm/`](https://aws.amazon.com/device-farm/).


    2.  **Google Firebase Test Lab** : Google’s version of lots of Android devices
    available remotely (they also include access to various Apple iPhones and iPads).
    Google also provides some great add-on tools for UI testing and automating your
    test runs across their fleet of devices. More details at [`https://firebase.google.com/docs/test-lab/`](https://firebase.google.com/docs/test-lab/).


    3.  **Samsung Remote Test Lab** : As the 800-pound gorilla of Android devices,
    Samsung is the obvious choice against which to test your applications. With almost
    every device they’ve ever made available in their test lab, plus handy tools,
    Samsung’s Remote Test Lab should be on your shortlist for testing-as-a-service.
    More details at [`https://developer.samsung.com/remote-test-lab`](https://developer.samsung.com/remote-test-lab).


    There are other commercial services available, as well as options to share or
    borrow devices from Android developer communities around the world. Consider the
    preceding a starting point, rather than a definitive guide.'
