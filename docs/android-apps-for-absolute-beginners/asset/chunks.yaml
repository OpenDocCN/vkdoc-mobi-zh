    To declare your service application, you will need to make appropriate declarations
    in the `AndroidManifest.xml` file. This begins with the core definition of a `<service>`
    element as a child of the `<application>` element. Listing [18-2](#499629_1_En_18_Chapter.xhtml#PC2)
    shows the basic entry for a service, including the required `android:name` attribute,
    which in this case is “`Skeleton`”.


    ```

    Listing 18-2

    A minimal service definition in the AndroidManifest.xml file

    ```


    You are free to mingle the definitions for a service and activities in the same
    project and therefore in the same `AndroidManifest.xml` file. You will find this
    commonly done for applications that are developed in conjunction with their own
    services. When you do create services, you don’t always want to allow just any
    application to bind to them and use them. In these cases, you can use an `android:permission`
    attribute in your `<service>` element to restrict access.


    ## Service Communication


    Defining your new service is no more complicated than the steps already outlined
    in this chapter. Once you have your service created, controlling how client applications
    such as activities and other services interact with your service is a little more
    involved. Clients (activities or services) communicating with a service take either
    of two possible paths: starting commands or binding. When it comes to your service
    communicating back to clients, things expand to quite a few options from which
    you as the developer can choose.


    ### Client-to-Service Communication


    When a client of any kind wants to work with a service, whether that client is
    an activity, fragment, or some other service, there is one central question that
    will guide you in choosing which of the two communication approaches is best suited
    to the task. Is this a one-time, never-to-be-repeated request for a service to
    do something for the client? In these single-interaction cases, the command approach
    to service communication is best. If the client needs to work with the service
    over a sequence of actions, maintaining ongoing interaction with the service,
    then service binding is the way to go.


    ## Invoking Commands with `startService()`


    The easiest way to have your service carry out tasks for a client application,
    whether it’s an activity or some other source, is a call to the `startService()`
    method. In Chapter [17](#499629_1_En_17_Chapter.xhtml), we introduced the `startActivity()`
    method that can trigger an arbitrary activity by taking an intent and some parameters,
    and in a similar way, the `startService()` method also accepts an intent and a
    set of intent extras as parameters to let you pass a context-specific payload
    to the receiving service. The most basic form of calling `startService()` is as
    follows:


    ```

    startService(someSignatureIntent);

    ```


    This basic form of calling `startService()` provides the intended `Intent` class
    as the sole parameter. Calling `startService()` is asynchronous, and your application’s
    main thread – which manages the primary UI – will not block waiting for a response
    and instead will continue immediately with its normal lifecycle. Calling `startService()`
    will trigger Android to start the service if it is not started, and in both the
    started and to-be-started flows, Android then passes the intent from the first
    parameter to the `onStartCommand()` method. Your service implementation can inspect
    and use the intent, and optionally the data payload in a second parameter, as
    you desire in the logic you code for the `onStartCommand()` method.


    Whereas the calling application is not blocked by the service invocation, your
    service will process the `onStartCommand()` method in its main thread, so you
    should take care not to undertake too much heavy processing, blocking external
    calls, or any other time-consuming work that might prevent a speedy response.
    Where you do need to perform such long-running work as part of your service logic,
    you can explore adding further threads with the `java.util.concurrent` package
    and its executor and related abilities to carry out this work off the main service
    thread.


    The fire-and-forget nature of using `startService()` means that it will not return
    payloads or a response in the normal sense to the calling application. For those
    circumstances where this is desired, the service-to-client communication approach
    is more appropriate and covered later in the chapter. The `startService()` call
    does return a value to signal whether the call completed successfully or was killed
    for resource starvation or other reasons. This return value is from a small predefined
    set, from which you will commonly see the following:


    1. `START_STICKY`: Restart the service once Android has enough free memory to
    do so, but don’t worry about the triggering intent, and pass a null intent instead.

    2. `START_NON_STICKY`: Don’t automatically restart the service at all, even if
    Android resource pressure drops to a low enough level to allow it. Implicitly
    this means the service will not be started until your application or some other
    explicitly calls `startService()` or otherwise invokes the need for the service
    again.

    3. `START_REDELIVER_INTENT`: Restart the service once Android has enough free
    memory, and also attempt to redeliver the original `Intent` object passed to the
    service when the original (failing) call was made.


    Once a service starts, whether from a `startService()` invocation or otherwise,
    it will run indefinitely, barring any low-resource conditions on the device that
    might see Android kill it as part of wider resource management. This is in keeping
    with the notion that once your client has what it wants, it doesn’t really care
    what happens to the service afterward. From a developer standpoint, you might
    consider from time to time whether your service is doing anything useful, and
    for want of client demand determine that it has nothing to do and to gracefully
    shut down. There are two main options for a service to terminate itself, as follows:


    1. Use the `stopService()` method. Analogous to `startService()`, you call `stopService()`
    with a parameter of the same intent used to start the service or an intent of
    a derived class. The service will be stopped and all resources released and state
    destroyed. As Android does not track the origin or number of `startService()`
    calls to a service, it similarly doesn’t differentiate as to which client sends
    the appropriate `stopService()` call. Only one `stopService()` command is required,
    regardless of how many `startService()` calls were received in the service’s lifetime.'
