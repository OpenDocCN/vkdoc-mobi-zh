    # 管理 Activity 配置变更


    通过本章前面的描述，我强调了正常的 Activity 生命周期至少有一个例外情况，即 Activity 配置变更。配置变更通常被定义为影响整个应用、Android
    用户空间或整个 Android 设备的事件。这可能会让你以为我在谈论地震事件——也许是 Android 地震。实际情况要平淡得多。被归类为配置变更的事件包括：更改设备的界面语言、将设备插入电源、与另一台设备配对，或者简单地将设备从竖屏旋转为横屏，反之亦然。


    ## 使用默认方法处理配置变更


    首先有个好消息：Android 会通过向所有正在运行的应用发送通知回调来告知特定变更，从而为你跟踪设备发生的所有配置变更。除了这个基本通知之外，Android
    还竭力避免让你承担过多工作来确定配置变更应如何在应用中体现。Android 通过利用程序中的现有结构来实现这一点。


    Android 为你做的最有价值的操作之一就是监控发生的任何配置变更，并引用你为应用创建的所有可用布局，执行重新创建 Activity 所需的所有布局工作，使用与配置变更结果相匹配的布局——无论是将旋转匹配到相关的竖屏/横屏布局，还是从左到右到从右到左的语言变更，等等。


    由于布局行为和重新创建已为你处理完毕，接下来只需要关注你为特定 Activity 创建或获取的任何资源。由于 Android 会销毁之前的 Activity
    并重新创建它，因此你需要作为配置变更的一部分来保存和恢复这些资源。你的 Activity 有机会干净地保存其当前状态和资源，以便在重新创建时，新的 Activity
    可以恢复它们，使 Activity 状态恢复到与销毁前相同的状态。以下回调涵盖了允许你在配置变更过程中保存和恢复状态与资源的流程：


    1. `onSaveInstanceState()`：当触发任何配置变更时，在 Android 销毁当前 Activity 之前，会立即调用 `onSaveInstanceState()`。这是保存你需要保留的任何临时或正在使用的资源或数据的好时机。创建并使用一个
    `Bundle` 对象来保存你想要保留的所有项目，以便在随后的 Activity 重新创建中使用。如果你回顾本书中已经展示的示例，可以看到 `Bundle`
    对象在 `onCreate()` 时是如何被使用的（稍后会详细说明）。`onSaveInstanceState()` 的超类祖先还会在幕后为你执行一系列非常有用的工作，包括为任何已声明
    ID 的对象（如小部件、UI 元素等）保存视图状态，以便在需要时随时重新创建。


    2. `onCreate()`：当 Activity 即将启动时，它要么是全新创建的，要么（在当前讨论中）会接收到所需的 `Bundle` 对象，以便恢复已保存的资源和其他数据。你只需确保调用父类
    `super.onCreate()` 方法，无需进行更复杂的操作。你始终可以选择添加自定义状态并在 `onSaveInstanceState()` 期间保存它——随后你还需要在
    `onCreate()` 或下一个在（重新）创建 Activity 时调用的方法 `onRestoreInstanceState()` 中提供自定义的恢复逻辑。


    3. `onRestoreInstanceState()`：你的 `Bundle` 对象也会传递给此方法，你可以选择此时检索和恢复你希望保存的任何其他资源。等到
    Activity 生命周期的这个节点有一个好处，那就是你可以确保 Activity 的布局已经被填充（inflated）并设置了内容视图，从而使 Activity
    的所有视觉方面都已就位。


    ## 总结


    现在你已经对 Activity 生命周期以及你可用的、在需要时能被重写的回调方法的重要性有了扎实的了解。我们将在第 12 章中继续讨论生命周期，届时将介绍
    Fragment，并展示一个综合的示例应用，说明在实际中如何以及在哪里使用生命周期回调方法的重写。


    # 12. 初识 Fragment


    在迄今为止我们关于 Android 布局基础的讲解中，我们涵盖了基本的基于 View 的 UI 小部件，并介绍了 Activity 及其生命周期。多年来，在
    Android 世界中创建应用仅此而已——设计你的 Activity，添加你为应用所需的逻辑，然后在用户浏览应用功能时创建并销毁由此产生的已填充（或渲染）的
    Activity。


    大约在 2011 年，情况发生了爆炸性变化。或者更具体地说，随着平板电脑及其更大显示屏的出现和流行，屏幕尺寸发生了爆炸性增长。快进几年，我们发现汽车中出现了类似平板电脑的显示屏、巨大的电视屏幕等等，所有这些都由
    Android 驱动。如何最大限度地利用突然可用的屏幕空间，促使 Google 匆忙推出了自 Android UI 诞生以来最大的变革之一：Fragment。


    Fragment 解决了许多问题。从确保没有大面积的浪费空间，到克服那些看起来糟糕透顶的粗暴缩放技巧，Fragment 提供了一种机制，让你能够从多个相关的小部件集合中组合
    UI，然后灵活地在 Activity 中显示 Fragment，从而能够在一个屏幕中展示更多内容或提供更多功能。


    ## 从 Fragment 类开始


    随着大屏幕的出现，以及用户体验通常涉及更多的设备旋转——例如，先以竖屏模式阅读，然后以横屏模式观看电影——开发者面临着选择：要么创建更多的 Activity，要么找到更好的方式来重用已为应用构建的
    Activity 集合。Fragment 倾向于后者的重用范式，并在 Activity 与它们被渲染的布局容器以及用于实现功能的 UI 小部件之间引入了一个中间层。这有助于在处理几乎无休止的屏幕尺寸
    proliferations 时降低复杂性。使用应用的一些方面会发生变化，特别是 Activity 的生命周期。我们接下来将详细讨论这一点。


    ## Fragment 与向后兼容性


    Fragment 早在 Android 3.0（代号 Honeycomb）版本中就被引入了。你可以通过 Jetpack 或更早的 Android 兼容性库，在更旧的版本中获得良好的支持。


    ## 为应用使用基于 Fragment 的设计


    在深入探讨以 Fragment 为中心的设计之前，你应该知道使用 Fragment 完全是可选的。如果你现在喜欢设计大量 Activity 的想法，则无需放弃这种方法。但如果你更愿意利用
    Fragment 提供的优势，那么请继续阅读。

    '
- fmt: '# To Design with Fragments in Mind


    To design with fragments in mind, think of your existing layouts and where the
    various widgets like `TextView`, `Button`, `RadioGroup`, and other views have
    been placed. Anywhere you have a subset of widgets that are conceptually related
    and sit together – such as a `TextView` acting as a label alongside an `EditText`
    – then you can consider that subset ripe for wrapping in a fragment. To present
    this visually, Figure 12-1 shows this kind of grouping, with the fragment intermediary
    layer between the widgets and the overall activity.


    ![../images/499629_1_En_12_Chapter/499629_1_En_12_Fig1_HTML.jpg](images/499629_1_En_12_Chapter/499629_1_En_12_Fig1_HTML.jpg)


    **Figure 12-1** Fragments as the intermediary group between widgets and activities


    With this model, you can see how the fragment groupings can be moved around, and
    potentially more fragments and their contained widgets displayed, on larger screens
    and in different orientations. You still maintain the ability to show a well-polished
    UI on a smaller phone screen, without having to compromise at either end of the
    scale. To achieve this feat, fragments start by adding XML to your layouts using
    `<fragment>` element blocks. You will see this in practice in the example that
    follows. The rest of your layout definitions remain mostly unchanged, meaning
    all that you have learned up to this moment is still 100% useable in a fragment
    setting. This lets you continue to use hierarchies of views and have those inflated
    to create the resulting screens a user interacts with, just as before.


    Using fragments also introduces an additional case where you use a `Bundle` object,
    providing for initialization, saving of state, and recreation, in much the same
    way as with activities discussed earlier in Chapter 11. There are other features
    of fragments that are worth knowing, including the following:


    1.  You can subclass the base fragment class and add your own custom logic, but
    you must provide a constructor for the derived class.

    2.  When using fragments, a `FragmentManager` will be created by Android to handle
    bidirectional interplay between your fragments – you don’t need to code for this.


    The other major change to be aware of is how the overall activity and fragment
    lifecycle changes.


    ## Working with the Fragment Lifecycle


    A lot of shared behavior and concepts exist between the fragment lifecycle and
    the activity lifecycle I introduced earlier in Chapter 11. As with the activity
    lifecycle, a visual diagram of the fragment lifecycle helps conceptualize the
    states and transitions. The full fragment lifecycle is shown in Figure 12-2.


    ![../images/499629_1_En_12_Chapter/499629_1_En_12_Fig2_HTML.jpg](images/499629_1_En_12_Chapter/499629_1_En_12_Fig2_HTML.jpg)


    **Figure 12-2** The fragment lifecycle


    The primary differences between the original activity lifecycle and the fragment
    lifecycle are related to the interaction of host activities with constituent fragments.
    There can be added complexity and more than one event transition for a fragment
    when compared to the parent activity’s single state transition.


    ### Reviewing the Fragment Lifecycle Callback Methods


    Many of the fragment lifecycle callback methods share names with ones you saw
    for activities, but you should take care to note this doesn’t mean they do exactly
    the same thing. The following list presents the key differences, as well as the
    fragment-only callback methods.


    #### `onInflate()`


    The `onInflate()` method is called in order to inflate into the on-screen UI the
    layout of fragments defined in your layout XML files using the `<fragment>` element.
    You can also directly call `onInflate()` if you explicitly create new fragments
    programmatically in your code via the `newInstance()` call. Parameters passed
    to this include the reference activity in which the fragment will live and an
    `AttributeSet` with any additional XML attributes from the `<fragment>` tag. At
    this stage, Android is determining what your fragment will look like when rendered,
    even though it is not currently going to display it. That step happens during
    the `onAttach()` callback.


    #### `onCreate()`


    The `onCreate()` for fragments is similar to that for activities, with a few minor
    tweaks. The main change is that you cannot rely on any activity view hierarchy
    being in place to reference in the `onCreate()` call. If you think about it, this
    makes sense, as the activity with which the fragment is associated is transiting
    through its own lifecycle, and just when you think you can start relying on it,
    it may well cease to exist or undergo a configuration change or another event
    that causes the view hierarchy to be destroyed or recreated.


    #### `onAttach()`


    The `onAttach()` callback happens immediately following Android’s determination
    of which activity the fragment is attached to. This is the point at which you
    can do things with the activity relationship safely, such as get and use context
    for other operations. Any fragment has an inherited method `getActivity()` that
    will return the activity to which it is attached. Your fragment can also use the
    `getArguments()` method to fetch and work with any initialization parameters.


    #### `onCreateView()`


    The `onCreateView()` callback provides you the mechanism to return your selected
    view hierarchy for your fragment. It takes a `LayoutInflater` object, `ViewGroup`,
    and the `Bundle` of instance state and then relies on Android to choose a suitable
    layout based on all the usual screen size and density attributes, inflate it with
    the `.inflate()` method of the `LayoutInflater`, modify layout in whatever way
    you think necessary, and then hand back the resultant view object for rendering.


    #### `onViewCreated()`


    Immediately after `onCreateView()` returns, `onViewCreated()` is triggered. It
    can perform further post-processing work before any saved state is used to modify
    the view.


    #### `onViewStateRestored()`


    The `onViewStateRestored()` method is called in the cases when your fragment’s
    view hierarchy has all of its state restored. This is handy for differentiating
    cases of new creation vs. resumption after a configuration change and so on.


    #### `onStart()`


    The fragment’s `onStart()` callback is directly associated with the parent activity’s
    equivalent `onStart()` and is called immediately after the fragment is displayed
    in the user’s UI. Any logic you thought of placing in an activity-level `onStart()`
    callback should instead be placed into the relevant fragment `onStart()` method.


    #### `onResume()`


    The fragment `onResume()` method is also closely mapped to the equivalent activity
    `onResume()` method. It is the last call made before the user takes full control
    of the activity and its fragments.


    #### `onPause()`


    The `onPause()` callback is also closely matched with the overall activity’s `onPause()`
    method. Should you move logic to your fragments, then the rules from the activity
    variant about pausing audio or video, halting or releasing other actions and resources,
    and so on all apply here.'
