- fmt: "Check out the documentation at `sqlite.org` for more details about using the\
    \ `sqlite3` utility. The `adb` tool also provides some other useful general file\
    \ management commands that you can harness for your SQLite database files, such\
    \ as `adb push` to move a file to a device and `adb pull` to copy a file from\
    \ a device.\n\n## Working with Third-Party Database Tools\n\nWhen simple command-line\
    \ tools don’t stack up for your demanding needs, there are plenty of other, more\
    \ sophisticated GUI tools available for you to help manage your SQLite databases.\
    \ Some of the most popular include:\n\n- **DBeaver**: A tool growing in popularity\
    \ for its support of many databases, not just SQLite. Cross-platform and offers\
    \ a free community edition. Learn more at `https://dbeaver.io`.\n- **DB Browser\
    \ for SQLite**: Another cross-platform tool, specializing in SQLite management.\
    \ Learn more at `https://sqlitebrowser.org`.\n\nHistorically, another tool called\
    \ SQLite Manager was incredibly popular and very useful as it was packaged as\
    \ a Firefox browser plugin. Unfortunately, with Firefox’s significant architectural\
    \ change in how its plugins worked, SQLite Manager ceased being supported. I mention\
    \ it here so you don’t go down the rabbit hole trying to find it – it’s still\
    \ mentioned widely in historic online posts and websites relating to SQLite.\n\
    \n## Summary\n\nYou now have a firm working knowledge of the key steps to incorporate\
    \ SQLite databases into your applications and build features and logic driven\
    \ by and supporting the data contained therein. We have also reached the end of\
    \ the book – or at least the end of the printed and packaged version. There are\
    \ additional topics and extra examples for many of the topics mentioned in the\
    \ book, available from the website at `www.beginningandroid.org`. I wish you every\
    \ success as you continue on your path to becoming an Android application developer!\n\
