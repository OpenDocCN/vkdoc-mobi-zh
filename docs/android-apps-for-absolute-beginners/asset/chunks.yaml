- fmt: '# Using StrictMode to Profile an Application


    The Android ecosystem comes with a range of tools available to help with performing
    application behavior and performance. The `StrictMode` policy tool is one such
    tool and helps with any I/O delay issues by profiling the operation of all of
    your code looking for issues defined in its policies.


    `StrictMode` has a range of policies available, though you will likely find yourself
    using two of its original offerings. The first policy is the Virtual Machine policy
    that covers generally poor behavior or practices across an entire application,
    such as leaking database connection objects. The second set of policies are the
    Thread policies, and these look in particular for poorly behaved code happening
    on the main UI thread. This can help spot code – both yours and Android’s – that
    is going to slow or interrupt a user’s smooth experience with the UI.


    You can activate a `StrictMode` policy by calling the static `StrictMode.enableDefaults()`
    method from your `onCreate()` callback. Invoking this call will report a range
    of useful information in your Logcat output regarding UI thread issues including
    file I/O concerns. You can also define your own policies if you desire – the specifics
    are beyond the scope of this book, but the Android documentation has more detail
    should you be interested.


    ## Caution


    As useful as `StrictMode` policies can be, never leave them defined in your final
    shipped code and applications. Leaving `StrictMode` in place will create a very
    large volume of log data on your users’ devices, consuming the very file system
    space you have carefully been trying to manage.


    # Moving Logic to Asynchronous Threads


    The preceding discussion on `StrictMode` opens up the world of moving logic away
    from the main UI thread and interface for your application. At almost all times,
    it is worth thinking about whether there is other logic in your application that
    doesn’t need to happen on the critical path, such as background lookup of data
    from an online service, messaging or pub/sub-style notifications, cached items,
    and so forth.


    Anything that could happen off the critical path should be considered for asynchronous
    operation, and that is where Android’s `AsyncTask` shines, being able to spawn
    additional threads to take on any logic you throw at it. This is well worth mastering
    as part of your Android learning, as most developers use it as the workhorse for
    managing threading across their applications.


    The `AsyncTask` class is provided in a form that means you, as the developer,
    must subclass it to create specific implementations for the work you want to do.
    This makes sense, as Android can’t know the details of your application in advance
    nor cover the millions of tasks developers around the world would want it to handle.
    To use `AsyncTask`, you take its provided `doInBackground()` method and implement
    the actual logic you want performed on another thread. There are optional additional
    methods you can implement to provide pre- and post-execution logic, interact with
    the UI in a controlled way, and so on.


    Listing [19-5](#499629_1_En_19_Chapter.xhtml#PC6) gives you a stub showing the
    subclassing of `AsyncTask` to illustrate how it can be used to perform file saving
    operations. There are countless other ways this could be implemented, but you
    will appreciate the overall idea.


    ```

    private class SmartFileSaver extends AsyncTask {

    protected void onPreExecute() {

    // This method will fire on the UI thread

    // Show a Toast message

    Toast.makeText(this, "Saving File", Toast.LENGTH_LONG).show();

    }

    protected void doInBackground() {

    // This method will spawn a background thread

    // All work happens off the UI thread

    // create output stream

    // call .write()

    // catch exceptions

    // etc.

    }

    protected void onPostExecute() {

    // This method will fire on the UI thread

    // Show a Toast message

    Toast.makeText(this, "File Saved", Toast.LENGTH_LONG).show();

    }

    }

    Listing 19-5

    An example AsyncTask subclassing

    ```


    Using the `SmartFileSaver.execute()` method will invoke our various `onPreExecute()`,
    `doInBackground()`, and `onPostExecute()` methods with Android managing the related
    thread lifetime and UI interaction.


    # Summary


    You now have a firm introduction to the basic mechanics of file I/O under Android
    and in particular a low-level understanding of the file systems, file handling,
    and stream and file content mechanics that are part of any approach to working
    with files.


    # 20. Working with Databases in Android


    Files are not the only way to store information from your application onto an
    Android device. Android provides two more major approaches to information management:
    a fully fledged relational database option based on SQLite and the Android Content
    Provider framework. In this chapter, we will explore the SQLite database – for
    those of you interested in Content Providers, you can learn more on the book’s
    website at [`www.beginningandroid.org`](http://www.beginningandroid.org).


    If you are familiar with SQLite, you realize it represents a rock-solid database
    engine shipped as a single include or library for any kind of application. SQLite
    recently chalked up 25 years as a shipping product, proving itself one of the
    all-time mainstays of software development.


    ## Working with SQLite: The World’s Most Popular Database!


    Any of you who have worked in the field of databases will be familiar with SQLite,
    but as popular as it is, those of you from other fields may have never heard of
    it. Without a word of hyperbole, SQLite is “the most popular” relational database
    technology on the planet. That’s a bold claim, so let me provide some supporting
    evidence.


    To give you an idea of how universal and popular SQLite is, I’ve compiled this
    short list of data points to help.


    SQLite is:


    1. The default and core relational database offered on every smartphone operating
    system. We’re obviously talking about Android in this book, but every other smartphone
    OS you’ve ever heard of – like iOS – and OSs you maybe haven’t, like Symbian,
    all use SQLite as the default database for almost all their internal needs.


    2. Chosen by every web browser as the key technology for local caching, bookmarks,
    and more. Whether you use Chrome, Safari, Opera, Edge, or Internet Explorer (remember
    that?!), you are using SQLite every day.


    3. Included in “millions” of commercial and open source products. I’m not exaggerating
    when I say millions!


    One of my favorite ways of illustrating exactly how popular SQLite has become
    is to frame it as follows. You, dear reader, have used or benefited from SQLite
    every day since the first day you bought a smartphone. Even if you didn’t realize
    it, you are a walking, talking SQLite beneficiary!


    ### Note


    To delve further into the world of SQLite, I can recommend *The Definitive Guide
    to SQLite*, Second Edition, ISBN 9781430232254. In the interests of full disclosure,
    I am one of the co-authors of that book.


    Many of you will not be familiar with SQLite at all. You will not have explored
    SQLite’s capabilities under Android or leveraged its benefits. That’s completely
    expected and why this chapter exists. From here on, we will walk through the fundamentals
    of using SQLite as a database and core capability of Android, and we’ll build
    a working database-driven example application to hone your skills.


    ## Quickly Learning SQLite for Android Development


    `SQLite` is targeted very much as a straightforward database library providing
    all the core things you might want from a relational database query and transaction
    engine. This means you get access to a fully compliant Structured Query Language,
    or SQL, interface, though it is always important to remember what level of SQL
    – such as SQL-92 and SQL-99 – is introduced in any feature you might be interested
    in. This is doubly important, as the version of SQLite shipped with a user’s device
    usually trails the latest release by several years.'
