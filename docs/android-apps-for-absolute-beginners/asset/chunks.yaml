    # 使用 Android Studio 的替代方案


    如果说软件世界——尤其是软件开发——能提供什么，那就是选择！无论是浏览器、邮件软件，还是你喜欢的游戏，选择无处不在。为 Android 开发应用也不例外，尽管
    Android Studio 是一个强大的默认选择。然而，其他选择也依然存在，即使你不打算使用其中任何一个，了解其他 IDE 和工具的存在也是有用的，因为你会在网上、会议以及其他讨论
    Android 开发的论坛中看到它们的身影。


    以下是一个简短但并非详尽无遗的列表，列出了你在初涉 Android 应用开发职业生涯中可能遇到的替代方案。


    ## Eclipse


    正如本章前面提到的，Eclipse 是谷歌支持 Android 开发的第一个 IDE。在 2007 年左右 Android 诞生之初，谷歌需要提供一个有吸引力的开发者工具，以便其新收购的智能手机操作系统能够吸引开发者。当时，它选择了开源的
    Eclipse IDE 作为官方认可的开发环境。这一选择被普遍接受，并被认为是巨大的推动力，让数百万 Android 开发者能够免费使用工具，从而开发出一波又一波的
    Android 应用。


    Eclipse 在聚光灯下闪耀了十年，直到 2014 年 Android Studio 1.0 发布。即使在发布之后，Eclipse 仍然得到谷歌的全力支持，直到
    2016 年 Android Studio 2.2 发布。谷歌当时宣布，将不再将 Eclipse 作为一级开发环境提供支持，也不会认证 Android 开发者工具未来能无故障运行。


    这听起来似乎 Eclipse 不再是构建 Android 应用的可行环境。但事实远非如此。现实情况是，谷歌不再为想要使用 Eclipse 的开发者提供打磨、便利或直接支持。然而，有两个主要因素确保
    Eclipse 仍然是寻求使用它的开发者的一个选择。


    首先，Eclipse 在应对 Android 应用的基础方面积累了十多年的微调、集成和专业技能。归根结底，构建 Android 应用的工作归结为处理文本形式的
    Java 代码、XML 数据以及相关工件。正如我们将在本书第二部分看到的，这些方面并不会因为你选择不同的 IDE 来协助开发而改变。


    其次，Eclipse 是有史以来最流行的 IDE 之一，它在 Android 之外也有优势，这意味着在需要构建超越单一目标平台应用的开发环境中，它常常是 IDE
    的首选。


    这并非暗示选择 Eclipse 作为你的 IDE 会像 Android Studio 一样流畅或高效。一旦你超出本书的范围，你会发现许多当代的在线信息来源会假设你使用的是
    Android Studio，而不是 Eclipse。但你们中的一些人——特别是经验丰富的开发者——会超越这一点，看到 Eclipse 已经吸引人的地方。如果你正在踏上开发者之旅，并且对
    Eclipse 还没有大量经验，那么我强烈建议你选择 Android Studio 作为你的 IDE。


    ## IntelliJ IDEA


    在本章开头，我解释了 Android Studio 的起源，并概述了它基于 IntelliJ IDEA 的基础。所以你可能会想，既然 Android Studio
    是基于它的，为什么我还要选择 IntelliJ IDEA 呢，它们有什么区别，我又为什么要在意呢？


    很好的问题！本质上，作为一名新开发者，没有压倒性的理由让你考虑选择 IntelliJ IDEA 作为你的 IDE。然而，经验丰富的开发者，或者那些为除 Android
    之外更多平台开发基于 Java 应用的开发者，通常会发现将 IDE 标准化是提高效率的重要驱动力。此外，IntelliJ 背后的公司 JetBrains 只在完整商业包中提供某些功能，例如与
    Java 的 Spring 框架无缝协作的能力。如果你属于这些类别，我们非常欢迎你采用 IntelliJ IDEA 作为你偏好的 IDE。


    要了解更多关于如何使用 IntelliJ IDEA 专门进行 Android 开发的信息，请查看拥有并构建 IntelliJ IDEA 的公司 JetBrains
    专门为此主题设立的网页，网址为 [`www.jetbrains.com/help/idea/android.html`](http://www.jetbrains.com/help/idea/android.html)
    和 [`www.jetbrains.com/help/idea/getting-started-with-android-development.html`](http://www.jetbrains.com/help/idea/getting-started-with-android-development.html)。


    ## 针对多操作系统和移动平台的工具


    在第 1 章中，你看到了智能手机市场份额的细分，其中 Android 占据了绝大多数。但不要因此忽视存在替代方案的事实，比如苹果的 iPhone，并且存在帮助开发者同时针对这两个平台以及其他一些你可能没听说过的平台的工具。一些关键的多平台
    IDE 和开发环境包括 Xamarin、PhoneGap、Flutter 和 Apache Cordova 等产品。


    跨平台工具本身就值得单独写一本书，事实上，上述提到的这些工具都有不止一本专门介绍它们的书籍，以及无数可在线获取的内容页面。如果你对这些工具的功能感兴趣，我强烈建议你从它们各自的产品主页入手，然后从那里扩展你的搜索。


    ## 传统平台无关的开发工具


    为了结束本章以及开发者工具的话题，我应该带你回到本章的开头。IDE 的出现是为了帮助开发者管理用于创建现代应用的所有工具。这包括代码编辑器、调试器、编译器等等。但
    IDE 并非适合所有人。


    有些读者可能是经验丰富的开发者，他们非常习惯于组装自己的一套工具来帮助创建 Android 应用。有很多开发者喜欢选择自己的编辑器，比如 Vim、Emacs
    或 Sublime Text；编译和构建管道工具，比如 Ant、Jenkins 和 Hudson；以及其他用于性能管理、调试等的工具。


    如果你想走这条路，谷歌提供了一套 Android 命令行开发工具，可以从本章开头提到的 Android Studio 下载页面获取。这些工具包括 `sdkmanager`，它负责下载和管理多个
    Android SDK 包；`adb`，这是 Android 开发者桥接工具，用于将你的应用从开发机器移动到你的虚拟设备和真实设备；以及其他工具。


    虽然本书并非针对想要走这条路的开发者，但至少你知道这是一个可行的选择。现在，我们假设你满意地使用 Android Studio，我们将在紧接着的下一章（从下一页开始）直接深入开发你的第一个
    Android 应用！


    # 你的第一个 Android 应用，现在就动手！


    既然你的电脑上已经安装好了 Android Studio，你就可以开始创建你的第一个 Android 应用了。是的，就是现在！对于那些不熟悉 Java 代码开发的读者，不要惊慌。我们将在本章的示例中假设你不具备任何
    Java 知识或技能。对于那些确实懂 Java 的读者，无论如何也请继续阅读，因为我们将介绍本章以及后续章节中运行示例所需的重要第一步：创建一个 Android
    虚拟设备（AVD）。

