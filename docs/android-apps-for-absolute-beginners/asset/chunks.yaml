    '
- fmt: 'Next, we need to provide some oomph for our button, to have it actually do
    something. As such, open the `MainActivity.java` source file for `ButtonExample`,
    and replace its content with the Java code in Listing [9-4](#499629_1_En_9_Chapter.xhtml#PC5).


    ```

    package org.beginningandroid.buttonexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.Button;

    public class MainActivity extends AppCompatActivity implements View.OnClickListener{

    Button myButton;

    Integer myInt;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    myButton = new Button(this);

    myButton.setOnClickListener(this);

    myInt = 0;

    updateClickCounter();

    setContentView(myButton);

    }

    @Override

    public void onClick(View v) {

    updateClickCounter();

    }

    private void updateClickCounter() {

    myInt++;

    myButton.setText(myInt.toString());

    }

    }

    Listing 9-4

    Modified Java code for ButtonExample

    ```


    Breaking this code down section by section will help you understand what’s going
    on and also demonstrate some of the common approaches you will use for all of
    your development, not just a button-clicking app!


    The first few lines from the preceding listing introduce the package name and
    any desired or necessary Java class imports:


    ```

    package org.beginningandroid.buttonexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.Button;

    ```


    The package name will have been set for you based on the name you entered in the
    new project wizard. The class library imports for `androidx.appcompat.app.AppCompatActivity`
    and `android.os.Bundle` were also included by default by the new project wizard.
    I then explicitly added the `android.widget.Button` class, as that is the pre-built
    class that provides all of the common logic and behavior that I would want to
    wire up to the button I’ve placed in my layout. I lastly added the `android.view.View`
    class as it provides the pre-built ability to define listeners for events that
    happen on widgets derived from the `View` class – which means every widget we
    are discussing in this chapter. In particular, as shown in the next few paragraphs,
    I define and use an `OnClick` listener so the `ButtonExample` app can be notified
    of click events and trigger my desired logic.


    You can see the first step of enabling `OnClick` listening by the change in the
    class definition for `MainActivity`. I have altered the default class declaration
    provided by the new project wizard, by also adding implements `View.OnClickListener`,
    as repeated in the following:


    ```

    public class MainActivity extends AppCompatActivity implements View.OnClickListener{

    Button myButton;

    Integer myInt;

    // more code here

    }

    ```


    This modification to the class sets us up to provide the `OnClick` logic later
    – and Android Studio will prompt you to do this with a warning and also prompt
    you to add the `android.view.View` import if you haven’t already done so. I define
    two handy variables next, a `Button` named `myButton`, which will be wired up
    to the UI widget, and an `Integer` named `myInt`, which I use as a counter to
    track how many times the button is clicked.


    Next, the `onCreate()` method is enhanced to have it do the setup tasks we need
    when the activity is first run. We will delve into the four main lifecycle methods
    of an activity in Chapter [12](#499629_1_En_12_Chapter.xhtml), but for now you
    can rely on the fact that `onCreate()` is called only once, when your activity
    starts. In the `ButtonExample` code, we are defining and instantiating the `myButton`
    object, setting the `OnClick` listener for `myButton`, setting the value of `myInt`
    to `0` (zero) initially, and then calling the private method `updateClickCounter()`.


    Two very simple steps make up the entire `updateClickCounter()` method, as repeated
    in the following:


    ```

    private void updateClickCounter() {

    myInt++;

    myButton.setText(myInt.toString());

    }

    ```


    First, the `myInt` value is incremented by 1. Subsequently, the `.setText()` helper
    method for the `myButton` object is called, and the `String` representation of
    the `myInt` value is passed to it, so that the text displayed on your button widget
    is updated to reflect the new value of `myInt`. In short, we increment the value
    of our click counter and have that displayed as the button text.


    The final piece of the code that we skipped over is the `onClick()` method, which
    is invoked by the listener we defined any time the button is clicked. The logic
    within this method simply calls the private `updateClickCounter()` method, meaning
    that we reuse the same logic both at `onCreate()` time and in any subsequent button
    click.


    Go ahead and run your code – or the `Ch09/ButtonExample` code from the book –
    and you should see a button-filled application, with an incrementing counter as
    the button label, similar to that shown in Figure [9-4](#499629_1_En_9_Chapter.xhtml#Fig4).


    ![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig4_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig4_HTML.jpg)


