    # 进入流动布局


    随着 Android 的最新更新，`ConstraintLayout` 新增了一项可选功能，可以像倾倒一样将界面中的小部件“流动”排列在屏幕上，并能根据特定设备的界面尺寸和密度，在运行时自动换行和调整小部件的位置。


    用 Flow 的术语来说，您可以将小部件集合链接到一个虚拟的 Flow 布局中，该布局充当基础 `ConstraintLayout` 的辅助工具。在布局 XML
    文件中，通过 `<androidx.constraintlayout.helper.widget.Flow>` 元素来指定分组的 Flow 链式连接，然后由两个关键属性控制
    Flow 的链式连接及其行为。


    第一个属性是 `app:constraint_referenced_ids`，它接受一个逗号分隔的小部件 ID 字符串，告知 Android 界面中的哪些部分被分组到特定的虚拟
    Flow 布局中。


    第二个属性是 `app:flow_wrapMode`，它接受三个字符串值之一，用于指示 Android 如何管理 Flow 组中小部件的流动。`app:flow_wrapMode`
    的可能取值及相关行为如下：


    1.  `none`：默认方式——为组内所有小部件创建单一的逻辑链，如果小部件超出活动（Activity）的尺寸，则会溢出。

    2.  `chain`：如果发生溢出，则将溢出的小部件添加到后续的链中进行容纳。

    3.  `align`：与 chain 方式大致相似，区别在于会将行对齐成列。


    熟悉 `ConstraintLayouts` 中的 Flow 选项非常容易。清单 10-1 显示了 `Ch10/FlowExample` 项目中 `FlowExample`
    的相关布局 XML 文件。


    ```

    清单 10-1

    在 ConstraintLayout 中设置 Flow

    ```


    `FlowExample` 布局非常简单。我们有三个 `TextView`，它们通过约束进行定义，正常情况下你会（尝试）先放置 `text1 TextView`，然后在它右侧放置
    `text2 TextView`，再在 `text2` 右侧放置 `text3 TextView`。我特意选择了长文本和大字体来演示我的观点。在布局底部，你会看到在
    `<androidx.constraintlayout.helper.widget.Flow>` 元素中定义的 Flow，其中我将 `flow_wrapMode`
    指定为 `chain`，并将组的引用 ID 设置为 `"text1, text2, text3"`——也就是我的 `TextView` ID。


    如果我省略了虚拟的 Flow 布局（参见控制此功能的 XML 布局中的注释），Android 会尝试按照常规的 `ConstraintLayout` 规则渲染活动，结果如图
    10-2 所示。


    ![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig2_HTML.jpg](img/499629_1_En_10_Fig2_HTML.jpg)


    **图 10-2** 没有 Flow 时，ConstraintLayout 将小部件渲染到屏幕之外


    你可以立刻发现问题。我特意使用了一个屏幕尺寸较小的 AVD。我的 `text1 TextView` 正常渲染，`text2` 的一半也显示在了屏幕上。但 `text2`
    的其余部分被截断了，`text3` 则完全不可见。实际上，它已经被渲染，但由于布局没有 Flow 选项来适应屏幕尺寸，因此不可见。你可以尝试在多种不同屏幕尺寸的
    AVD 上运行移除了 Flow 元素的示例，看看小部件在何处以及如何被截断或无法显示。


    在添加 Flow 元素后，重新运行 `FlowExample` 应用，Flow 的能力立刻显现。图 10-3 显示了同样的三个 `TextView`，但这次有了虚拟
    Flow 布局的帮助，Android 能够遵循我指定的链式规则，将小部件流动到新行中，从而完整显示布局中的所有内容。


    ![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig3_HTML.jpg](img/499629_1_En_10_Fig3_HTML.jpg)


    **图 10-3** 使用 Flow 后，ConstraintLayout 渲染出了所有内容


    Flow 是一个极易掌握的全新功能。你可以获取 `FlowExample` 示例代码，开始添加更多小部件，扩展 Flow 引用 ID 集合，甚至可以更改 `flow_wrapMode`，以观察
    Flow 的行为。


    # 使用 Layer 进行分层


    Layer 将小部件和视图的自适应能力向前推进了一步。在界面设计中，“Layer” 这个名称的用法非常多，所以需要明确说明：Layer 并不直接布局小部件，也不帮助构建一系列
    UI 组件的“堆叠”。通过扩展 `ConstraintLayout` 并使用 Layer，你可以获得一种统一的方法，通过单一机制来旋转、平移和缩放一组小部件和视图。


    举个例子，你可能正在开发一个图形化的拼图游戏，并希望弱化用户当前未选中的任何图片块。借助 Layer，你可以将所有其他 `ImageView` 小部件添加到同一个
    Layer 中，从而对它们应用相同的布局更改，然后将所需的变换一次性应用到 Layer 上，Layer 会将其应用到其组成的小部件上。


    # 使用 Motion 实现动画


    最新版本 Android 中备受关注的一个功能是 `ConstraintLayout` 的扩展——`MotionLayout`。通过 `MotionLayout`，你可以将各种静态视图变得生动，通过定义和使用
    `ConstraintSets` 来构建动画变化，例如旋转、淡入淡出、尺寸变化等。本质上，描述小部件和视图如何关联与定位的约束本身，就可以被视为控制运动和流动的变量。


    手动构建基于 `MotionLayout` 的应用及其使用的各种 `ConstraintSet` 配置可能非常繁琐。考虑到这一点，Google 在 Android
    Studio 中引入了 Motion 编辑器，为你提供了一个动画画布，用于构建引人入胜的动画布局。


    为了在 Motion 编辑器中开始使用 Motion 和 `MotionLayout` 设计，Android 引入了 `androidx.constraintlayout.motion.widget.MotionLayout`
    作为 `ConstraintLayout` 的变体。`MotionLayout` 仍处于早期阶段，存在不少粗糙之处和手动设置步骤，并且会随着 Android
    Studio 的小版本更新而频繁变更。带有运动效果的布局也不适合在像本书这样的静态书籍中展示。


    因此，为了确保你能获得关于 `MotionLayout` 的最新教程，并且能够看到这些选项如何在动态、运动的布局中发挥作用，相关教程和 `MotionExample`
    演示可从网站 [`www.beginningandroid.org`](http://www.beginningandroid.org) 获取。


    # 使用相对布局


    `RelativeLayout` 长期以来一直是 Android 的默认布局，并且仍然是活动和片段设计的流行选择。正如“相对”一词所暗示的，`RelativeLayout`
    利用小部件之间以及小部件与父活动之间的关系来控制小部件的布局。这种相对概念很容易理解，例如，你可以规定一个小部件相对于另一个小部件的位置放置在其下方，或者使其顶部边缘与某个相关小部件对齐等等。


    所有这些关系设置都使用一组标准化的属性，这些属性定义在布局 XML 文件中的小部件 XML 定义中。


    ## 相对于父容器放置小部件


    理解 `RelativeLayout` 的一个良好起点是探索那些允许你相对于父容器定位小部件的属性。有一组核心属性可用于基于父容器（例如活动）及其顶部边缘、底部边缘、侧边等来锚定位置。这些属性包括：


    1.  `android:layout_alignParentTop`：将小部件的顶部边缘与容器的顶部对齐。

    2.  `android:layout_alignParentBottom`：将小部件的底部边缘与容器的底部对齐。

