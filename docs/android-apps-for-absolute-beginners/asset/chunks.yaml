- fmt: '# Figure 19-2

    An activity with fields and buttons for testing external file management


    The supporting logic for our application follows the pattern I have used several
    times, with a central `onClick()` method receiving the button clicks, switching
    to the appropriate method based on which view (button) the user chooses at runtime.
    The code is shown in Listing [19-4](#499629_1_En_19_Chapter.xhtml#PC5).


    ```

    package org.beginningandroid.externalfilesexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.Context;

    import android.os.Bundle;

    import android.view.View;

    import android.view.inputmethod.InputMethodManager;

    import android.widget.EditText;

    import java.io.BufferedReader;

    import java.io.IOException;

    import java.io.InputStream;

    import java.io.InputStreamReader;

    import java.io.OutputStreamWriter;

    public class MainActivity extends AppCompatActivity {

    public final static String FILENAME="ExternalFilesExample.txt";

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    }

    public void onClick(View view) {

    switch(view.getId()) {

    case R.id.btnRead:

    try {

    doReadFromFile();

    }

    catch (Exception e) {

    e.printStackTrace();

    }

    break;

    case R.id.btnSave:

    doSaveToFile();

    break;

    }

    }

    public void doReadFromFile() throws Exception {

    doHideKeyboard();

    EditText readField;

    readField=(EditText)findViewById(R.id.editTextRead);

    try {

    InputStream inStrm=openFileInput(FILENAME);

    if (inStrm!=null) {

    // We will use the traditional Java I/O streams and builders.

    // This is cumbersome, and we''ll return with a better version

    // in chapter 20 using the IOUtils external library

    InputStreamReader inStrmRdr=new InputStreamReader(inStrm);

    BufferedReader buffRdr=new BufferedReader(inStrmRdr);

    String fileContent;

    StringBuilder strBldr=new StringBuilder();

    while ((fileContent=buffRdr.readLine())!=null) {

    strBldr.append(fileContent);

    }

    inStrm.close();

    readField.setText(strBldr.toString());

    }

    }

    catch (Throwable t) {

    // perform exception handling here

    }

    }

    public void doSaveToFile() {

    doHideKeyboard();

    EditText saveField;

    saveField=(EditText)findViewById(R.id.editText);

    try {

    OutputStreamWriter outStrm=

    new OutputStreamWriter(openFileOutput

    (FILENAME, Context.MODE_PRIVATE));

    try {

    outStrm.write(saveField.getText().toString());

    }

    catch (IOException i) {

    i.printStackTrace();

    }

    outStrm.close();

    }

    catch (Exception e) {

    e.printStackTrace();

    }

    }

    public void doHideKeyboard() {

    View view = this.getCurrentFocus();

    if (view != null) {

    InputMethodManager myIMM=(InputMethodManager)

    this.getSystemService(Context.INPUT_METHOD_SERVICE);

    myIMM.hideSoftInputFromWindow

    (view.getWindowToken(), InputMethodManager.HIDE_NOT_ALWAYS);

    }

    }

    }

    ```


    **Listing 19-4** The `ExternalFilesExample` Java code


    ## What Goes into Saving and Reading Files


    Exploring the `ExternalFilesExample` project, we see two key methods. First is
    the `doSaveToFile()` method, which performs some preparation and housekeeping
    with a call to `doHideKeyboard()` (covered in a moment), followed by creating
    the local `saveField` variable and binding it to the `EditText` view in the layout.
    This is done so we can eventually reference the text in the UI for saving.


    The main `try/catch` block follows, defining the output stream to be used to stream
    the text to the file nominated by the variable `FILENAME`. We then invoke the
    `.write()` method to attempt to actually write out the text through the stream
    to the file.


    It probably won’t escape your notice that there are many nested layers of exception
    handling in the `ExternalFilesExample` code. Writing to files can run into many,
    many issues, from full storage through to users spontaneously removing an SD card
    to which you were writing in the midst of the writing process! In short, taking
    extra care with exceptions is always prudent around file access.


    Second, to read from the file, we use the `doReadFromFile()` method, following
    similar setup work as we used with the `doSaveToFile()` method. We call `doHideKeyboard()`
    first (covered in the following), and then local variable `readField` is created
    and bound to the `editTextRead` widget. This will be used to show the contents
    of the file once read.


    Next, we add a `try/catch` block that encompasses some textbook Java file handling.
    We use a stream reader to access the file and pass that buffer to allow consumers
    to control access to the data. The buffer is used to access the stream line by
    line with the `while` block, and we gradually build up the full content of the
    file in the string builder. With all of the lines read from the stream (and, therefore,
    the file), the stream is closed, and we then transfer everything from the buffer
    via the `strBldr` object to the `readField EditText` widget in our layout.


    There are more streamlined, modern ways to accomplish all of the preceding, but
    crucially they hide the fundamental mechanics of what is happening. In the `ExternalFilesExample`
    code, you see the messy details of how Java I/O happens at the lowest level, to
    build an appreciation of both the objects and work required and also all the points
    where things can go wrong! No one in their right mind would expose a programming
    pattern for file access like this today – they’d hide it away, even though under
    the hood all of these steps would still be happening.


    ## Helping Streamline IMEs


    Our code deviates a little from strict file handling with the `doHideKeyboard()`
    method. This is a helper method you’ll find useful again and again, and it helps
    reduce the steps required of your users when entering text and proceeding with
    their desired action. When your user types text in the `EditText` field, the IME
    is triggered and presents the soft keyboard for the user to enter their desired
    text. We could customize the IME to add a “Done” button using the IME “accessory
    button” option, but that’s an additional key press to ask of your users.


    Instead I have crafted the layout to ensure the save (and read) button will be
    visible even when the IME is active, which means the user can type away and then
    immediately click the save button. The call to `doSaveToFile()` invokes `doHideKeyboard()`,
    which determines first which `View` the user interacted and whether or not the
    Input Method Framework is active and presenting a keyboard. If one is shown, we
    invoke `.hideSoftInputFromWindow()` to hide the keyboard. While the user doesn’t
    see all of these mechanics, they benefit from the simplicity gained in the user
    experience – one less key press to have their file saved!


    ## Saving and Reading Files in Action'
