    **代码清单 19-4** `ExternalFilesExample` Java 代码


    ## 保存和读取文件的原理


    探索 `ExternalFilesExample` 项目，我们可以看到两个关键方法。首先是 `doSaveToFile()` 方法，它会调用 `doHideKeyboard()`（稍后介绍）进行一些准备和清理工作，然后创建局部变量
    `saveField` 并将其绑定到布局中的 `EditText` 视图。这样做的目的是为了最终能够引用 UI 中的文本以便保存。


    接着是主要的 `try/catch` 块，定义用于将文本流式传输到由变量 `FILENAME` 指定的文件的输出流。然后我们调用 `.write()` 方法，尝试实际通过流将文本写入文件。


    你可能已经注意到，在 `ExternalFilesExample` 代码中，有许多嵌套的异常处理层。写入文件可能会遇到许多问题，从存储空间已满，到用户在写入过程中突然拔出正在写入的
    SD 卡！简而言之，在对文件进行访问时，对异常多加小心总是明智的。


    其次，为了从文件中读取数据，我们使用 `doReadFromFile()` 方法，其设置工作与 `doSaveToFile()` 方法类似。我们首先调用 `doHideKeyboard()`（将在后面介绍），然后创建局部变量
    `readField` 并将其绑定到 `editTextRead` 控件。这个控件将用于显示读取后的文件内容。


    接下来，我们添加一个 `try/catch` 块，其中包含了一些教科书式的 Java 文件处理方法。我们使用流读取器来访问文件，并将该缓冲区传递过去，以便消费者可以控制对数据的访问。通过
    `while` 块逐行访问流中的内容，并在字符串构建器中逐步构建文件的完整内容。当从流（即文件）中读取完所有行后，关闭流，然后通过 `strBldr` 对象将缓冲区中的所有内容传输到布局中的
    `readField EditText` 控件。


    当然，有更精简、更现代的方式来实现上述所有功能，但关键是这些方式会掩盖底层的运作机制。在 `ExternalFilesExample` 代码中，你将看到 Java
    I/O 在最底层运作时的繁琐细节，从而帮助你理解所需的对象和工作，以及所有可能出现问题的地方！在今天，任何理智的人都不会暴露这种文件访问的编程模式——他们都会将其隐藏起来，尽管在幕后所有这些步骤仍然会发生。


    ## 助力优化输入法


    我们的代码在 `doHideKeyboard()` 方法上稍微偏离了严格的文件处理逻辑。这是一个你会反复用到的辅助方法，它有助于减少用户在输入文本并继续执行所需操作时的步骤。当用户在
    `EditText` 字段中输入文本时，输入法会被触发并显示软键盘供用户输入。我们可以自定义输入法，通过使用输入法的“附件按钮”选项来添加一个“完成”按钮，但这会要求用户额外点击一次。


    因此，我特意设计了布局，确保即使输入法处于活动状态，保存（和读取）按钮也始终可见，这意味着用户可以输入文本后立即点击保存按钮。调用 `doSaveToFile()`
    时会调用 `doHideKeyboard()`，该方法首先确定用户与哪个 `View` 进行了交互，以及输入法框架是否处于活动状态并显示了键盘。如果键盘已显示，我们会调用
    `.hideSoftInputFromWindow()` 来隐藏键盘。虽然用户看不到所有这些机制，但他们受益于用户体验的简化——保存文件时可以少按一次键！


    ## 保存和读取文件的实际操作

