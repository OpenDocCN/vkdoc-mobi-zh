  raw: "Check out the documentation at `sqlite.org` for more\ndetails about using\
    \ the `sqlite3` utility. The\n`adb` tool also\nprovides some other useful general\
    \ file management commands that you can\nharness for your SQLite database files,\
    \ such as `adb push` to move a\nfile to a device and `adb pull` to copy a\nfile\
    \ from a device.\n\nWorking with Third-Party Database Tools\n\nWhen simple command-line\
    \ tools don’t stack up for your demanding needs,\nthere are plenty of other, more\n\
    sophisticated GUI tools available for you to help manage your SQLite\ndatabases.\
    \ Some of the most popular include\n\n*   DBeaver: A tool growing in popularity\
    \ for its support of many\n    databases, not just SQLite. Cross-platform and\
    \ offers a free community\n    edition. Learn more at [`https://dbeaver.io`](https://dbeaver.io).\n\
    \n*   DB Browser for SQLite: Another cross-platform tool, specializing\n    in\
    \ SQLite management. Learn more at [`https://sqlitebrowser.org`](https://sqlitebrowser.org).\n\
    \nHistorically, another tool called SQLite Manager was incredibly\npopular and\
    \ very useful as it was packaged as a Firefox browser plugin.\nUnfortunately,\
    \ with Firefox’s significant architectural change in how\nits plugins worked,\
    \ SQLite Manager ceased being supported. I mention it\nhere so you don’t go down\
    \ the rabbit hole trying to find it – it’s still\nmentioned widely in historic\
    \ online posts and websites relating to\nSQLite.\n\nSummary\nYou now have a firm\
    \ working knowledge of the key steps to incorporate\nSQLite databases into your\
    \ applications and build features and logic\ndriven by and supporting the data\
    \ contained therein.\nWe have also reached the end of the book – or at least the\
    \ end of the\nprinted and packaged version. There are additional topics and extra\n\
    examples for many of the topics mentioned in the book, available from\nthe website\
    \ at [`www.beginningandroid.org`](http://www.beginningandroid.org).\nI wish you\
    \ every success as you continue on your path to becoming an\nAndroid application\
