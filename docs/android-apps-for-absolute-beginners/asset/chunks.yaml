- fmt: '# Working with Files from the File System


    If you have any prior experience with file I/O with general Java applications
    on traditional file systems, then the Android approach will be very familiar to
    you. For those of you not familiar with Java-based file reading and writing, here
    is a quick introduction. From a Java point of view, files are treated as streams
    of data, and two objects become central to any reading or writing of files: `InputStream`
    and `OutputStream`. These streams are provided by invoking the `openFileInput()`
    and `openFileOutput()` methods from your code. With a stream in hand, your program
    logic is then responsible for actions such as reading from the `InputStream` or
    writing to the `OutputStream`, as well as cleaning up all of the resources when
    you are done.


    # Android’s File System Model


    Thanks to Android’s history and Google’s overly paternalistic thoughts on whether
    people should have full access to their own device, you as a developer will be
    confronted with two concepts when dealing with local file storage on a device.
    All storage will be divided between “internal” and “external,” but those terms
    have a skewed meaning. In contemporary Android, “internal” mostly means what you
    think, but “external” means both traditional external storage like SD cards and
    a portion of the on-board storage that ordinary people would consider internal,
    but that Android calls external to indicate you have more liberal access to it
    for traditional file I/O.


    As well as using the “internal” area for system-related purposes, there are also
    other differences in thinking about file systems under Android that represent
    advantages and disadvantages to both internal and external storage.


    Internal storage is as follows:


    1. Is found on every Android device and is always in place.

    2. Files that form part of your application designated to be placed on internal
    storage are considered an integral part of your application. The files are installed
    when the application is installed and removed when the application is removed.

    3. The default security boundary for internally saved files is private to your
    application. Sharing requires explicit additional steps.

    4. Is usually significantly smaller than the available external storage, and users
    can see this storage fill up and present space management problems, even when
    ample external storage is available.


    External storage is different, as follows:


    1. Android provides a USB abstraction layer and interface for external storage.
    When in use as a USB device, applications on the device cannot access external
    storage.

    2. The default security boundary is to make all files on external storage world-readable.
    Other applications can read your externally stored files without developer or
    user knowledge or permission.

    3. Depending on the save method invoked, externally stored files might not be
    removed when your application is uninstalled.


    Now that you’re aware of those aspects of both internal and external storage,
    read on!


    # Permissions for Reading and Writing Files


    If you choose to use internal storage, then your application always has permissions
    to write to, and read from, the portion of internal storage reserved for it. To
    find the details of any internal storage for your application, call `getFilesDir()`.
    You can also use `getDir()` to return a named (sub)directory for you to use, creating
    it in the process if it doesn’t already exist.


    You can open a file for output streaming – otherwise known as writing – through
    a call to `openFileOutput()`. If the file doesn’t already exist, it will be created
    for you. The `openFileInput()` method performs file opening for an `InputStream`
    to satisfy your reading requirements, though note that for this call your specified
    file must already exist.


    Both `openFileOutput()` and `openFileInput()` accept a number of `MODE_*` options
    that control the file and stream behavior. The most commonly used `MODE_*` options
    include:


    - `MODE_APPEND`: None of the existing data in the file is changed, with the data
    from the string appended to the existing content in the file.

    - `MODE_PRIVATE`: Permissions on the file are set to only allow the application
    that creates it (and any other that runs as the same user) to access the file.
    This is the default.

    - `MODE_WORLD_READABLE`: Opening permissions for reading to all applications and
    users on the device. This is considered poor security practice, but is often seen
    when using Content Providers or services is considered overkill.

    - `MODE_WORLD_WRITABLE`: Even more dangerous than world-readable is world-writable.
    Any application or user can write to the file. Just because other developers use
    this doesn’t mean you should!


    For your application users, no specific permissions are needed to create, open,
    or write to an internal file within the application’s allocated internal file
    system space. The simplest example of creating a file stored within the internal
    device storage is as follows:


    ```

    FILE myFile = new FILE(context.getFilesDir(), "myFileName");

    ```


    The situation differs when you start working with external storage. Different
    methods are at your disposal, and the permission model strictly enforces appropriate
    controls and safeguards. In order to write to external storage, your Android Manifest
    will need to include the privilege `android.permission.WRITE_EXTERNAL_STORAGE`,
    just as we saw in the audio and video examples in Chapters 13 and 14. Older versions
    of Android, up to Android Marshmallow, allow your application to read freely from
    external storage without specifying or requiring any particular permission. For
    more recent versions of Android, you need to include `android.permission.READ_EXTERNAL_STORAGE`
    in your manifest. As there is no impact in including this for old versions, you
    should simply default to adding this regardless of your plans for version support.


    The methods available for external storage access closely match in name the previously
    introduced methods for internal storage, but tend to add the word “external” or
    “public.” The `getExternalStoragePublicDirectory()` method is designed to allocate
    well-structured directories and files into which you can store documents, audio,
    pictures, video, and more. The method takes an enum signifying one of the predefined
    application directories and a filename of your choosing.


    Android has dozens of application directories, including:


    - `DIRECTORY_DOCUMENTS`: For storing traditional text or other editable documents
    created by the user.

    - `DIRECTORY_MUSIC`: A place to keep all kinds of music and audio files.

    - `DIRECTORY_PICTURES`: For storing still image files such as photos, drawings,
    and so on.


    All of these predefined locations are helpful, with reassuring predictability
    for those circumstances where they are a good fit, but there will be occasions
    when you have distinctly different types of files you want to store. For these
    situations, the general-purpose `getExternalStorageDirectory()` method is used,
    providing similar functionality to the `getFilesDir()` noted earlier in the chapter
    for internal storage.


    # Examining External Files in Action


    With a bunch more theory digested, it’s time to explore external files with a
    working example. The `ExternalFilesExample` app, found in `ch19/ExternalFilesExample`,
    walks through the mechanics of saving a file and reading back its content.


    Figure 19-2 is the layout used to provide a text entry field, buttons for file
    writing and reading, and a text reading field. The corresponding layout XML file
    is in the `ch19/ExternalFilesExample` project, but we will save some space by
    not repeating it here.


    ![../images/499629_1_En_19_Chapter/499629_1_En_19_Fig2_HTML.jpg](images/499629_1_En_19_Chapter/499629_1_En_19_Fig2_HTML.jpg)'
