- fmt: '# What to Expect for the Rest of This Book


    *Android for Absolute Beginners* is written to take you, the reader, on your first
    journey writing software, learning the practices, techniques, and approaches that
    will arm you for your future application development goals, as well as many of
    the fundamentals upon which computer programs are built. We will of course be
    using Android as both the target environment for your learning, as well as the
    inspiration for what’s possible, and the basis for covering many topics that you’ll
    encounter in other areas of software development as well.


    I have laid out the book in four broad parts, each targeting your growing understanding
    of how to write apps for Android, and Android itself, as you progress through
    the content and examples. The chapters in each part cover the following topics.


    ## Detailing More of the Remaining Chapters


    **Chapter** [**1**](#499629_1_En_1_Chapter.xhtml)**, Introducing Android:** You’re
    reading it! You have already covered much of the introduction to Android and in
    just a few pages will embark on your first Android application.


    **Chapter** [**2**](#499629_1_En_2_Chapter.xhtml)**, Introducing Android Studio:**
    We will look at the most popular toolset with which to build Android applications
    – Android Studio – and how to go about getting this free software. We will also
    briefly examine some alternatives to Android Studio and how to stay informed about
    new releases, new features, and other changes in how Android applications can
    be built. Lastly, we’ll introduce the idea of an “emulated” Android phone – an
    Android Virtual Device (AVD) – which is a way of having your computer simulate
    an Android handset and provides a playground on which to test your applications
    without needing to tinker with your actual phone.


    **Chapter** [**3**](#499629_1_En_3_Chapter.xhtml)**, Your First Android Application,
    Already!:** Yes, that’s right. You’ll get straight into creating your very first
    Android application. No need to wait until you’ve finished the book! Our first
    example will be very simple, but it will lay the foundation from which we will
    expand in all of the remaining chapters.


    **Chapter** [**4**](#499629_1_En_4_Chapter.xhtml)**, Exploring Your First Project:**
    In this chapter, we will take a virtual magnifying glass to the example you created
    in Chapter [3](#499629_1_En_3_Chapter.xhtml) and walk through each of the pieces
    of your first application to begin understanding where they came from, what they
    do, and why they are where they are.


    **Chapter** [**5**](#499629_1_En_5_Chapter.xhtml)**, Android Studio In-Depth:**
    If you are going to use an integrated set of tools for your future development,
    then diving deep into their capabilities will be a must. In this chapter, we will
    explore all of the key aspects of Android Studio, including code editing features,
    debuggers, profiling tools, and more.


    **Chapter** [**6**](#499629_1_En_6_Chapter.xhtml)**, Mastering Your Entire Developer
    Ecosystem:** This rounds out your understanding of all of the tools you can, and
    will, use in your development journey. This chapter will explore the tools that
    sit outside Android Studio’s integrated environment, but nevertheless are vital
    to it, including the Java Developer Kit (JDK), Gradle, source control systems
    for your code and applications, management of Android Virtual Devices, and other
    key parts of your environment. We’ll also look at aspects of your developer hardware
    that can influence your path to Android development.


    **Chapter** [**7**](#499629_1_En_7_Chapter.xhtml)**, Introducing Java for Android
    Development:** Ready to “level up” with Java? Regardless of your current knowledge
    level, this chapter will highlight the key areas of Java coding that you need
    for Android development, along with further resources to expand your Java expertise.


    **Chapter** [**8**](#499629_1_En_8_Chapter.xhtml)**, Introducing XML for Android
    Development:** Many aspects of Android application behavior are controlled by
    XML (Extensible Markup Language) data. This chapter walks you through the fundamentals
    of XML and how to apply XML for various aspects of your Android applications,
    including an application’s manifest, its user interface, and more.


    **Chapter** [**9**](#499629_1_En_9_Chapter.xhtml)**, Exploring Android Concepts:
    Core UI Widgets:** Building on Chapter [8](#499629_1_En_8_Chapter.xhtml), we explore
    how to lay out Android user interfaces with stock components such as menus, on-screen
    widgets like fields, lists, images, and other visual items. This chapter will
    also introduce the key concept of an activity – the fundamental building block
    of Android user interfaces. Lastly, we will give an overview of Android Jetpack,
    which is a modern library offering contemporary layout approaches while offering
    backward compatibility.'
