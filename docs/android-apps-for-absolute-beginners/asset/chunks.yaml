    The running ButtonExample application


    ## Getting the Picture with ImageView and ImageButton


    If your Android applications only consisted of text and a few buttons, things
    would get very dull – with perhaps the possible exception of a crossword game.
    Images and pictures are a core part of UI design, and many applications don’t
    just use them decoratively, but as part of the core application features such
    as photo albums, image editors, and so on.


    Android has a pair of image-enabled equivalents to the `TextView` and `Button`
    you’ve already worked with – these are the `ImageView` and `ImageButton` widgets,
    and again they are derived from the base `View` class.


    As with many of the widgets in this chapter, it is often best to use the layout
    editor in both blueprint/design mode and the accompanying code view, to define
    your `ImageView` or `ImageButton` in XML, rather than laboring away at programmatically
    defining these in Java.


    Both `ImageView` and `ImageButton` introduce one additional attribute to their
    relative element XML definition, in the `android:src` value. The value of this
    attribute is a reference to an image resource you provide, whether that’s a `.png`
    file, `.jpg/.jpeg` file, `.gif` file, or some other supported image format. In
    Chapter [4](#499629_1_En_4_Chapter.xhtml), I covered the project structure including
    the `res/drawable` hierarchy. It is in this folder you would place your image
    files for reference and where Gradle will look to find the referenced images for
    bundling into the application package at build time.


    `ImageButton` differs from `ImageView` in supporting button-like behaviors that
    you have already seen earlier in this chapter for the regular `Button` widget.
    This means `ImageButton` widgets can (and should) have `onClick` listeners defined
    and subsequent logic built to handle whatever actions or behaviors you want your
    application to undertake when the `ImageButton` is clicked, just as you did for
    the `Button` widget.


    If you remember back to our overview of the typical project layout in Chapter
    [3](#499629_1_En_3_Chapter.xhtml), you can likely guess that the default approach
    for specifying `android:src` values is to refer to graphics resources you have
    placed in your project’s `res/drawable` directory (and/or density-specific variants
    thereof).


    Listing [9-5](#499629_1_En_9_Chapter.xhtml#PC9) shows an example of an `ImageView`
    configured to reference an image in the `res/drawable` folder, which in this case
    is a photo I took of the Rosetta Stone in the British Museum.


    ```

