  trans: '

    # 调试而非运行代码


    任何应用开发的新手最终都需要面对代码“出错”时的情况。无论是意外结果、异常行为、应用崩溃还是其他问题，调试都是找出应用中发生情况的主要方法。


    调试是一个庞大的主题，因此与其试图在一章专门介绍 Android Studio 工具的章节中掌握它，不如先集中了解 Android Studio 中手头的主要调试工具，然后在本书后续介绍更复杂的
    Android 应用时，再扩展讲解调试及相关主题。你还可以在本书网站 [`www.beginningandroid.org`](http://www.beginningandroid.org)
    上阅读更多关于调试的内容。


    在 Android Studio 中，有助于调试的四个关键概念如下。


    ## 设置和清除断点


    断点是源代码中的一个标记，指示你想要中断或停止代码执行的位置，以便更详细地检查行为或问题。要在代码中设置断点，请双击项目资源管理器中的文件或对象，打开要处理的代码——在我的例子中，将是
    `MainActivity.java` 文件。打开文件后，点击文件旁边行号右侧较暗的灰色页边距，如图 5-9 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig9_HTML.jpg](img/499629_1_En_5_Fig9_HTML.jpg)


    *图 5-9 在 Android Studio 中为调试设置断点*


    你应该会看到点击处出现一个红色圆圈，表示已设置断点。如果出于某种原因，代表断点的红色圆圈没有出现，请打开“工具”菜单，选择“切换行断点”。再次点击或再次选择切换选项，将移除该断点。


    ## 启动应用进行调试


    就像你可以通过单击“运行”选项或选择已设置的运行配置来运行应用一样，你也可以启动应用进行调试。这实质上执行相同的操作：调用 `Gradle` 构建应用，将应用部署到指定设备或
    AVD 等。唯一不同的是，Android Studio 会预先准备好帮助你进行调试。


    要以调试模式启动应用，只需从“运行”菜单中选择“调试 ''运行配置 1''”（或类似选项）。除了构建和部署步骤外，你还会看到 Android Studio
    的下方视图自动打开并显示调试窗口，其中包含调试器、控制台和其他调试工具的访问入口，如图 5-10 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig10_HTML.jpg](img/499629_1_En_5_Fig10_HTML.jpg)


    *图 5-10 Android Studio 中自动触发的调试视图*


    根据你正在调试的内容以及是否设置了断点，你还会在“运行”菜单中看到额外的菜单项被激活，如图 5-11 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig11_HTML.jpg](img/499629_1_En_5_Fig11_HTML.jpg)


    *图 5-11 用于单步进入、跳过和跳出代码部分的调试选项*


    我将在下一个标题下解释这些“单步执行”选项。


    ## 调试时单步执行代码


    你在图 5-11 中看到的“单步跳过”、“单步进入”、“单步跳出”等选项对于仔细检查代码正在执行的操作至关重要。通过一次一行地进入、跳过或跳出代码，而不是运行整个代码库，你可以一次一个动作地逐步执行应用逻辑，并结合变量检查以及查看
    Activity UI 中的视觉或行为变化等其他工具，看到每一行逻辑的结果。


    ## 附加调试器


    你并不总是能清楚地知道在哪里设置断点或单步进入/跳过代码。有时，你可能只是想更深入地了解应用中发生了什么，以理解某些难以解释的行为或问题。这正是调试器工具发挥作用的地方。我们无法在短短几页甚至一整章中详尽介绍调试器，所以我们不必为此纠结。你可以在本书网站
    [`www.beginningandroid.org`](http://www.beginningandroid.org) 上了解更多关于调试器强大功能的信息。


    要调用调试器并将其附加到正在运行的应用以帮助你了解情况，你可以使用“运行”菜单中的最后一个选项——“将调试器附加到 Android 进程”。你的应用必须已经在运行，此操作才能生效。


    # 查看已运行的内容


    你现在已经看到了足够多的第一个应用在 AVD 或真实设备上运行的示例，可能会想知道我说的“查看已运行的内容”是什么意思。为了解开这个谜团，“查看”你的应用运行不仅仅是指观察最终应用中呈现的
    Activity。


    Android Studio 提供了几个非常有用（有些人会说至关重要）的工具，让你可以查看应用在 Gradle 脚本（或其他工具）构建过程中发生了什么，以及应用运行时发生了什么诊断和日志信息。


    在 Android Studio 窗口的底部，状态栏的上方，你会看到一组按钮，它们可以让你快速访问这些工具，名称如“TODO”、“构建”、“Logcat”等，你可以在图
    5-12 中看到它们。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig12_HTML.jpg](img/499629_1_En_5_Fig12_HTML.jpg)


    *图 5-12 在 Android Studio 中轻松访问事件日志、构建输出、Logcat 等*


    让我们来看看这里的一些关键工具，这样你就能自如地将它们的使用融入到不断扩展的开发工具集中。


    ## 理解你的构建过程


    “构建”工具会在“构建输出”窗口中显示构建过程的摘要，要么是“构建：已完成”消息（带有绿色勾号和一些时间信息，如图 5-13 所示），要么是阻止构建工作的一组错误或问题。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig13_HTML.jpg](img/499629_1_En_5_Fig13_HTML.jpg)


    *图 5-13 Android Studio 中项目构建的构建输出视图*


    你还会看到实际执行应用构建所执行的任务列表（在我的例子中是 20 个独立的构建步骤），以及一个指向“构建分析器”的链接，该分析器能更深入地了解每个任务花费的时间以及如何改进。

