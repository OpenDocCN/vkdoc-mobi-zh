  trans: "\n### XML 版本与编码\n\nXML 文档开头应包含一个特殊标签，用于指明其遵循的 XML 标准版本以及文本所使用的字符编码（如 ASCII、UTF-8\
    \ 等）。在默认情况下，并且在几乎所有 Android 开发中，此声明都将指定 XML 版本为 1.0，编码为 UTF-8。该特殊标签采用以下形式，使用特殊的\
    \ `<?xml` 和 `?>` 作为开始与结束标记：\n\n```\n这有助于任何读取和使用 XML 文档的程序理解如何解释文本及 XML 结构。\n```\n\
    \n### XML 元素\n\n元素是 XML 的基本构建块，它们是为数据提供含义和结构的“标签”，但其本身并非数据。XML 元素是嵌套的，因此 XML 文档中的第一个、最外层的元素被称为**根元素**，它可以包含（在其内部嵌套）一个或多个**子元素**。一个\
    \ XML 文档中仅有一个根元素。\n\n元素标签由 `<`（大于号）和 `>`（小于号）符号括起。对于我定义和使用的每个元素，都需要一个开始标签和一个名称相同、但在名称前添加了\
    \ `/`（反斜杠）的匹配结束标签。必须使用此方法才能保证 XML 在语法上正确——在 XML 术语中称为“格式良好”。例如，我可能决定创建一个 XML 文档来存储人员的联系方式，其数据结构类似于通讯录，并决定将根元素命名为\
    \ `<addressbook>`。\n\n我的 XML 文档起初看起来像这样：\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<addressbook>\n</addressbook>\n```\n\n这包含了版本和编码的特殊标签以及 `<addressbook>`\
    \ 根元素的开始标签，并以匹配的 `</addressbook>` 结束标签正确闭合。到目前为止，一切顺利。\n\n我可以为一个人包含一个子元素，并在该人员元素内包含名字和姓氏的子元素，如下所示：\n\
    \n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person>\n\
    \        <firstname>Jane</firstname>\n        <lastname>Smith</lastname>\n   \
    \ </person>\n</addressbook>\n```\n\n到目前为止，一切顺利。请记住，元素名称以及它们隐含的作用都是由我来决定的。\n\n\
    **注意：** 元素的结束标签不必总是独占一行。实际上，XML 的任何部分都不一定要有换行。但是，这样做确实能让 XML 更易读。对于可读性好的 XML，普遍接受的规范是：开始标签出现在新行；当某个标签没有子元素时，结束标签可以放在与开始标签同一行的末尾（如前面的\
    \ `<firstname>` 和 `</firstname>`）；或者，开始和结束标签各自独占一行，并将任何子元素嵌套在其中（如前面的 `<person>`\
    \ 和 `</person>` 标签）。标签也会缩进以表明它们是子元素，但同样，这只是为了方便人类阅读的约定。\n\n如果这是一个真实的通讯录，里面应该不止一个人。但您可能会注意到，对于读取此\
    \ XML 的计算机（甚至人类）来说，很难区分哪个人是哪个。如果我们执行以下操作，任何试图追踪人员对应关系的程序都会遇到问题：\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person>\n        <firstname>Jane</firstname>\n\
    \        <lastname>Smith</lastname>\n    </person>\n    <person>\n        <firstname>John</firstname>\n\
    \        <lastname>Jones</lastname>\n    </person>\n</addressbook>\n```\n\nXML\
    \ 对此的解决方案之一是使用**属性**，它们类似于元素的参数。\n\n### XML 属性\n\n任何 XML 元素都可以拥有零个或多个与之关联的属性。属性与元素本身提供的数据不同，它们出现在元素名称的\
    \ `< >` 标记内，紧跟在标签名称之后。属性采用以下形式：\n\n```\nattribute_name=\"value in double quotes\"\
    \n```\n\n继续我们的通讯录示例，我们可以通过向 `<person>` 元素添加一个 ID 属性，并使用数值为每个人分配不同的 ID，来区分 XML\
    \ 数据中的不同人员。结果如下：\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n\
    \    <person id=\"1\">\n        <firstname>Jane</firstname>\n        <lastname>Smith</lastname>\n\
    \    </person>\n    <person id=\"2\">\n        <firstname>John</firstname>\n \
    \       <lastname>Jones</lastname>\n    </person>\n</addressbook>\n```\n\n请注意，即使您和我可能会将此处呈现的\
    \ ID 值视为整数，甚至编写程序将其作为整数处理，但 XML 总是将属性放在双引号内，使其看起来像是字符串。\n\n如果某个元素有多个属性，只需用空格分隔即可。例如，我们可以使用\
    \ `dateadded` 属性来记录将某人添加到通讯录的日期：\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
    ?>\n<addressbook>\n    <person id=\"1\" dateadded=\"2023-01-15\">\n        <firstname>Jane</firstname>\n\
    \        <lastname>Smith</lastname>\n    </person>\n    <person id=\"2\" dateadded=\"\
    2023-02-20\">\n        <firstname>John</firstname>\n        <lastname>Jones</lastname>\n\
    \    </person>\n</addressbook>\n```\n\n### XML 值\n\nXML 文档中封装的实际数据是包含在元素开始和结束标签内的值。在我们一直使用的通讯录示例中，值包括\
    \ `<firstname>` 元素中的 \"Jane\" 和 `<lastname>` 元素中的 \"Smith\"。为传递这些信息而设置所有这些 XML\
    \ 语法和元素标签可能显得有些多余（这种冗余性也是对 XML 的常见批评之一），但对于阅读 XML 的人类来说，它具有良好的自描述性，并且还能提供关于结构、完整性等方面的保证。\n\
    \n说到完整性，元素完全可以不包含任何数据，就像本章前面第一个通讯录 XML 文档所示那样。有几种选项可以让元素存在但不包含任何数据：既可以使用您已经见过的开始标签和结束标签方法，也可以使用简写的自闭合标签方法——这种方法下元素标签名称只出现一次，并在末尾添加一个\
    \ `/`（反斜杠）。让我们向 `<person>` 结构添加一个 `<middleinitial>` 元素，展示这两种选项，如下所示：\n\n```\n\
    <?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person id=\"1\"\
    >\n        <firstname>Jane</firstname>\n        <middleinitial></middleinitial>\n\
    \        <lastname>Smith</lastname>\n    </person>\n    <person id=\"2\">\n  \
    \      <firstname>John</firstname>\n        <middleinitial/>\n        <lastname>Jones</lastname>\n\
    \    </person>\n</addressbook>\n```\n\n对于没有数据的元素，`<middleinitial></middleinitial>`\
    \ 和 `<middleinitial/>` 这两种形式都是有效的。请注意，不能在自闭合标签下嵌套任何子元素。\n\n### XML 命名空间\n\nXML\
    \ 的一大优势在于它极大地简化了开发者和使用数据的系统之间的数据交换。一旦您习惯了以 XML 格式共享数据，它就会变得像第二天性一样自然。但所有这些易于传输和共享的特性也可能带来问题。一个特殊的问题是：由于您可以定义自己的\
    \ XML 标签（甚至可能定义自己的 XML 模式），您可能会发现其他人也开发了自己的模式，并且使用的元素名称与您的冲突。如果您和他们从不共享数据，这没什么大不了的；但如果您成为分享\
    \ XML 格式数据的实践者，那么在尝试混合来自多个来源的数据时，几乎肯定会遇到名称冲突。那么该怎么办呢？\n\nXML 标准提供了一种包含两个部分的方法来解决这种名称冲突问题。首先，您可以为任何喜欢的元素添加一个标识字符串作为前缀，这是一个标记，用于指示给定元素源自哪个来源。所以，如果我们知道，我们要将来自我们自己的\
    \ `<addressbook>` 以及我们自己定义的 `<person>` 元素的数据，与来自其他人的、可能具有完全不同结构和一组元素的数据进行混合，我们可以为我们的元素添加前缀以进行区分，例如：\n\
    \n```\n<ab:addressbook xmlns:ab=\"http://www.example.com/addressbook\">\n    <ab:person\
    \ id=\"1\">\n        <ab:firstname>Jane</ab:firstname>\n        <ab:lastname>Smith</ab:lastname>\n\
    \    </ab:person>\n    <ab:person id=\"2\">\n        <ab:firstname>John</ab:firstname>\n\
    \        <ab:lastname>Jones</ab:lastname>\n    </ab:person>\n</ab:addressbook>\n\
    ```\n\n这个前缀充当了这些元素的命名空间。而来自另一个 XML 文档、具有令人混淆的 person 版本的元素将使用不同的命名空间前缀，例如：\n\n\
    ```\n<other:person xmlns:other=\"http://www.othercompany.com/schema\">\n    <other:firstname>Judy</other:firstname>\n\
    \    <other:lastname>Walsh</other:lastname>\n</other:person>\n```\n\nXML 标准要求我们提供一个\
    \ URI 作为命名空间的唯一区分符——基本上，这是一个保证唯一并能反映我们为文档定义的 XML 结构的属性。这通过在元素的开始标签中使用 `xmlns`\
    \ 属性来指定——通常您会在 XML 文档的根元素中看到它，如下所示：\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<ab:addressbook xmlns:ab=\"http://www.example.com/addressbook\">\n\
    \    <ab:person id=\"1\">\n        <ab:firstname>Jane</ab:firstname>\n       \
    \ <ab:lastname>Smith</ab:lastname>\n    </ab:person>\n    <ab:person id=\"2\"\
    >\n        <ab:firstname>John</ab:firstname>\n        <ab:lastname>Jones</ab:lastname>\n\
    \    </ab:person>\n</ab:addressbook>\n```\n\n### XML 世界的其他部分\n\nXML 标准中还有其他部分我们不会在本章中介绍，随着您知识的增长，这些内容可能会引起您的兴趣。\n"
- fmt: "# 1. CDATA\n\n`CDATA` values are special XML values that are treated as verbatim\
    \ data and are not processed or parsed to discover if there are further nested\
    \ XML tags within. This might not make a lot of sense initially, but you will\
    \ find this is often used to pass other forms of data markup, or presentation\
    \ markup like HTML, as data within an XML document – it prevents XML parsers and\
    \ programs looking to enforce XML standards from accidentally tripping up on things\
    \ that look like they might be XML, but in fact are not – and certainly they don’t\
    \ follow XML rules.\n\n# 2. XML Path and XQuery\n\n`XML Path` and `XQuery` provide\
    \ ways to traverse an XML document, looking for data by navigating the hierarchy\
    \ of tags, evaluating attributes, and so on. These tools aren’t used in the basic\
    \ design and build of Android applications by default, though you certainly can\
    \ use them if you build Android applications that themselves manipulate XML-based\
    \ data.\n\n# 3. XSLT and Transformations\n\n`XSLT` is the XML stylesheet transformation\
    \ language, which is a programming language designed to interrogate and transform\
    \ the structure and data of XML, creating derived data as an output. The output\
    \ of an XSLT transformation is typically another XML document, though it can also\
    \ be data in different formats.\n\nThere are literally thousands of websites that\
    \ will help you learn more about XML, but now you know enough of the basics to\
    \ dive into how Android uses XML and to start writing and editing your XML files\
    \ for Android applications.\n\n# Using XML in Your Android Applications\n\nAs\
    \ mentioned at the very start of this chapter, there are three main areas in which\
    \ Android uses XML to help build and run applications. To recap, these are:\n\n\
    1.  The application manifest, which we’ve already introduced\n2.  Resource definitions,\
    \ in particular constants like strings and so on\n3.  Activity layouts, which\
    \ are a huge topic but one that can be approached in a stepwise fashion\n\n##\
    \ Reviewing the Android Manifest XML File\n\nRegardless of your level of familiarity\
    \ with XML – whether you’ve used it for years or taken the crash course outlined\
    \ in the first half of this chapter – we can now explore the Android Manifest\
    \ in detail. Listing [8-1](#499629_1_En_8_Chapter.xhtml#PC12) has the `androidmanifest.xml`\
    \ content again for reference:\n\n```\nListing 8-1\nThe androidmanifest.xml file\
    \ revisited\n```\n\nIn Chapter [4](#499629_1_En_4_Chapter.xhtml), we highlighted\
    \ some of the elements and other parts of this file, for instance, the use of\
    \ a namespace to uniquely identify all Android resource elements with an `\"android\"\
    ` namespace, tied to the unique `xmlns` reference `xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    `, and the use of `<manifest>` as the root element for an Android Manifest XML\
    \ document. But we can now review some of the other elements and attributes.\n\
    \n> **Note**\n> \n> If you haven’t already spotted it, Google tends to leverage\
    \ attributes extensively across all uses of XML in Android development. At times\
    \ many people highlight that this goes too far and that many attribute-heavy elements\
    \ could be restyled to have child elements encompassing data values instead. It’s\
    \ a never-ending theoretical argument, which you will now be equipped to join!\n\
    \nThere will typically be one `<application>` element tag in your manifest. Prominent\
    \ attributes of this tag are the `android:icon` and `android:roundIcon` options\
    \ and the `android:label` and `android:theme` attributes – this latter example\
    \ acts as a name for a bundle of other style and design XML settings that you\
    \ can adopt to give your applications a specific look and feel. You’ll note that\
    \ they all use a `\"@path/detail\"` form. The `\"@\"` notation is shorthand for\
    \ referencing key resources within the `res/` hierarchy of your project – whether\
    \ that’s application icons controlled by the mipmap images, string values in the\
    \ `strings.xml` file within the values hierarchy (discussed shortly), and so on.\
    \ We already briefly covered the `<activity>` element you see presented in Listing\
    \ [8-1](#499629_1_En_8_Chapter.xhtml#PC12) and indicated how this specific entry\
    \ links your `MainActivity` java activity to the `\"MAIN\"` action that is triggered\
    \ when an Android application launches. Your manifest can and will grow to include\
    \ further `<activity>` elements, one for each of the activities you create for\
    \ your application. Remember, there are no real limits to how many activities\
    \ you might create for your application, so you can eventually see a lot of such\
    \ elements. We will return to build on your knowledge of the Android Manifest\
    \ and its XML nuances as we progress through the book.\n\n## Using XML for Resource\
    \ Definitions\n\nAnother major area where Android leverages XML is in the definition\
    \ and use of constants or reference values, where a given piece of data is used\
    \ in a read-only fashion in a range of use cases. There are a huge range of examples\
    \ of how constant data can help streamline building your application and reduce\
    \ the effort required in everything from ensuring a consistent look and feel in\
    \ all activities and visual elements through to ensuring that key data values\
    \ such as the height of Mount Everest (8848 meters), the name of your application\
    \ (`\"MyFirstApp\"`), or other unchanging data values can be declared in one place\
    \ but used in many others.\n\nSome of the key resource definition files are:\n\
    \n1.  `colors.xml`: A reference file for providing useful names, meaningful to\
    \ you, for various Red-Green-Blue (RGB) hexadecimal representations of colors.\n\
    2.  `strings.xml`: A reference file for abstracting textual strings, such as simple\
    \ words, phrases, sentences, and paragraphs, so that these can be referenced in\
    \ various source code and other files without needing to copy the text into many\
    \ places.\n3.  `styles.xml`: A reference file for collecting sets of color definitions\
    \ and other styling elements under the banner of a self-declared style, so that\
    \ the style can be used as a common design theme throughout your application.\n\
    4.  `dimens.xml`: A reference file for providing abstract representations of different\
    \ dimension and size settings, allowing you to control changes in density/size\
    \ in one location rather than having to edit many values in many different files.\n\
    \nThose definitions of resource files are fine for a high-level conceptual understanding,\
    \ but leave something to be desired to understand *how* they are used. Let’s dive\
    \ in and get our hands dirty mixing things up and adding new content to these\
    \ resource files.\n\n### Changing Colors\n\nThe easiest XML file to tinker with\
    \ is your `colors.xml` file. This file can contain as many aliases for colors\
    \ as you desire. The default content is shown in Listing [8-2](#499629_1_En_8_Chapter.xhtml#PC13).\n\
    \n```\n#6200EE\n#3700B3\n#03DAC5\n\nListing 8-2\nThe default colors.xml file content\n\
    ```\n\nTime to make some more changes to your `MyFirstApp` application. By altering\
    \ the color element with the name attribute of `\"colorPrimary\"`, we can alter\
    \ the look of your application wherever the layout references this color resource\
    \ definition. You can see how this makes development easier when it comes to consistent\
    \ color choice and color palette throughout an application’s design."
