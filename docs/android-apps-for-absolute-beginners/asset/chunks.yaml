- fmt: '# 使用多活动与 Android Intents


    当你阅读到本书的后半部分时，你已经接触了许多设计和构建活动的技术。你已经牢固掌握了活动的生命周期，以及在活动启动、等待、暂停和最终结束时，各种回调触发的时机。到目前为止，分享的大多数示例应用都只包含一个单一的活动。这与我在本书开头所提到的“活动易于创建、使用和销毁，你应该大量使用它们”的观点如何保持一致呢？


    我很高兴你提出这个问题！我们希望确保你能够轻松地使用和部署多个活动。虽然早期的视频播放器、电话拨号器等示例都是很好的例子，但这些示例应用在启动时，都通过 `AndroidManifest.xml`
    文件中指定了活动，并在一个名为 `<intent-filter>` 的子元素中设置了几个引人注目的属性，从而启动了其单一活动。这为我们提供了一些关于如何处理多个活动的线索，但是，当应用启动时并非必然需要启动其他活动的情况下，我们应该在何处以及如何指定第二个或后续的活动，又如何在需要时启动它们呢？现在，让我们来解开这些谜团。


    ## 介绍 Android Intents


    在你的应用中使用多个活动这一谜题的答案，在于 Android 的事件驱动或消息驱动系统，它被称为“Intents”。与许多其他操作系统（如 Linux、Windows
    和 macOS）一样，它们基于发送和响应事件，Android 也使用了许多与 Intents 类似的概念，包括触发和响应那些需要向应用呈现不同活动的操作。Android
    在这方面的工作原理有一些细微差别，所以请继续阅读！


    在最简单的形式中，一个 `Intent` 是从 Android 上的应用或服务发送的消息，表明该应用或服务的用户想要执行某些操作。这个“某些操作”可能是一个非常明确的动作，比如根据用户的操作精确地知道要显示哪个活动。但
    Android 也提供了在你的应用内部，使用来自基础平台和其他应用的其他活动的可能性。在这些情况下，你可能无法控制哪些其他活动可用，如果存在多种方式满足用户的
    `Intent`，你也不能决定设备用户更偏好哪一个。Android 通过使用消息系统的匹配部分（称为接收器）涵盖了已知和未知的选项。


    接收器的职责——无论是你编写的还是来自其他应用的——是监听 `Intent`，如果该接收器能够处理所请求的 `Intent` 类型，就以多种方式做出响应。我们将在本章后面介绍
    Intents 的机制之后，再讨论接收器。Intents 和接收器共同构成了触发后续活动，并将你希望在应用中使用的所有活动连接起来以创建最终体验的核心机制。额外的好处是，当对你的应用有意义时，同样的机制允许你利用其他应用的活动。


    ## 理解 Intent 行为


    Android 的 `Intent` 结构由两个基本部分组成：用户或应用期望的动作，以及触发该期望动作的上下文。当我们谈论期望的动作时，我们指的是诸如“查看这个东西”、“新建一个这种东西”等简单概念。我们稍后将介绍一个更详尽的动作列表。至于上下文，它可能更加多样化，最好将其看作是一系列支持数据，这些数据有助于理解
    `Intent`、其任何细微差别或特殊情况，以便它可以被恰当地定向并服务于最终的活动。


    这种支持数据的概念采用 `Uri` 的形式，例如 `content://contacts/people/4`，这是 Android 联系人存储中第四条联系数据的
    `Uri` 表示法。如果你将该 `Uri` 与一个像 `ACTION_VIEW` 这样的动作配对，你就拥有了一个 `Intent` 的所有基本要素。Android
    会解释这个 `Intent`，并找到一个能够向用户展示（或提供到一个视图以供填充）一组联系人详细信息的活动。如果你改为对一个指向集合的 `Uri`（如 `content://contacts/people`）执行诸如
    `ACTION_PICK` 这样的动作，Android 将寻找任何能够呈现多个联系人并提供从中选择能力的活动。


    虽然一个 `Uri` 与一个动作的结合是最简单的 `Intent` 形式，但这并非其所能包含的全部内容。你可以在你构建的任何 `Intent` 中包含另外四个方面，以扩展
    `Intent` 的有效载荷，并帮助改善 Android 和应用对 `Intent` 及其数据有效载荷的处理能力。每个方面都构成了 `Intent` 对象的一部分：


    *   **Intent 类别**：`Intent` 的类别有助于定义哪个活动可以满足其基本动作。例如，你希望用户开始与应用交互的“主”活动将是 `LAUNCHER`
    类别。通过这种方式，你向 Android 发出信号，表明该活动适合包含在 Launcher 菜单（你的 Android 主屏幕）中。其他活动/`Intent`
    类别包括 `DEFAULT` 和 `ALTERNATIVE`。


    *   **MIME 类型规范**：有时，无法为诸如联系人或照片之类的项目集合知道或定义一个特定的 `Uri`。为了帮助 Android 在这些情况下找到能够处理数据集的合适的活动，你可以指定一个
    MIME 类型，例如，对于图像文件指定 `image/jpeg`，以在处理照片集时提供帮助。


    *   **组件提名**：Android 的优势之一是能够在运行时利用你在构建应用时不知道的活动。但在其他时候，你确切知道你想用你的 `Intent` 调用哪个活动。实现这一点的一种方法是在
    `Intent` 的（期望）组件中指定该活动的类。这样，你就不需要添加其他上下文提示以期触发正确的 `Intent`，但代价是承担了对组件类实现的假设性知识风险。这违背了面向对象编程中称为封装的原则。


    *   **附加信息 (Extras)**：有时，由于各种原因，你希望让接收器获得其他上下文线索和数据。当这些内容无法整齐地融入 `Uri` 命名方案时，`Extras`
    就派上用场了。这是一个简单的 `Bundle` 对象，可以包含你想要的任何其他内容。唯一需要注意的是，提供这样一个 `Bundle` 并不能保证接收器会使用它。'
