  trans: '

    ### 2. 使用 `stopSelf()` 调用编写你的服务


    你的服务可以控制自身的终止，你可能希望在服务工作的某个逻辑终点执行此操作，例如当一首音乐播放完毕或文件下载完成时。


    在构建自己的服务时，可以自由探索这两种管理其终止的方法。或者，你也可以将这一任务交给 Android 的通用服务清理机制。如果你选择使用服务绑定作为与服务交互的方式，其清理和关闭机制则截然不同。


    ## 使用服务的绑定方法


    使用 `startService()` 进行一次性服务交互的单次触发方法是一个非常有用的机制。但有些情况下，你可能需要与服务进行多次交互，或处理更复杂的场景，这些场景需要多次往返通信，例如发送连续命令或双向交换数据，以便你的应用程序能为用户执行一些有用的工作。


    此时就需要用到 `bindService()` 的绑定方法。绑定到服务会建立一个双向通信通道，使你的应用程序可以通过服务的 `Binder` 访问其 API。`Binder`
    是从 `bindService()` 调用返回给调用应用程序的对象，并用于后续的所有活动。使用绑定方法的客户端可以通过 `BIND_AUTO_CREATE`
    标志向 Android 发出信号，指示如果服务当前已停止，希望启动它。与 `startService()` 方法的一个区别是，一旦客户端释放与服务的绑定，该服务将被标记为可被关闭。我们将在本章后面部分详细介绍这种场景下的关闭机制。


    ### 警告


    当调用一个可能未运行的服务时，如果你没有在 `bindService()` 调用中提供 `BIND_AUTO_CREATE` 标志，那么如果服务尚未运行，该方法可能返回
    `false`（并且不向你提供 `Binder` 对象）。这里要吸取的教训是不要依赖对服务状态的猜测或假设。相反，始终要编写清晰的异常处理代码，并且无论何种情况，都要检查
    `bindService()` 是否失败。


    当 Android 面临内存压力时，使用 `BIND_ALLOW_OOM_MANAGEMENT` 标志可以表明你能够应对所使用服务的突然关闭。此标志表明你的应用程序的绑定不被视为关键任务，并且它可以容忍由于内存不足而导致的服务突然终止。简单来说，你是在声明为了设备及其上运行的所有其他应用程序的更大利益，愿意牺牲你的绑定（以及
    `Binder` 对象）。


    应用程序对 `bindService()` 的调用是一个异步调用，其中包含用于标识服务的 intent，以及可选的 `BIND_AUTO_CREATE` 标志。由于
    `bindService()` 是异步的，你需要查询 `ServiceConnection` 对象并从 `onBind()` 返回相应的 `Binder`
    对象，才能知道服务的结果和后续状态。一旦确认这些对象已被实例化并可用，你就可以开始调用 `Binder` 方法，并实际与服务的功能进行交互。通常，你会对 `Binder`
    方法进行子类化，以实现你希望服务具备的任何逻辑。


    你的应用程序可以按照需要长时间保留 `ServiceConnection` 对象（以及与之隐式连接的服务）。当完成与服务的交互后，你调用 `unbindService()`
    方法来指示可以释放你的服务绑定，此时 `ServiceConnection` 对象及相关资源会被释放。这种解除绑定最终会导致 `onServiceDisconnected()`
    被调用，同时 `Binder` 对象超出作用域，这意味着你通过其类似 API 的方法构建并提供的任何自定义逻辑都不应再被调用。如果有其他应用程序也绑定到了该服务，你调用
    `unbindService()` 不会导致该服务被停止。实际上，最后一个解除绑定的客户端应用程序才会触发 Android 关闭该服务。


    ## 服务到客户端的通信


    正如我们在本章中对服务的探讨，你可以看到客户端到服务的通信通过命令方法和绑定方法得到了很好的支持。当涉及到从服务向客户端通信时，有各种选项可以覆盖你几乎能想象到的任何场景。让我们探讨主要的选项，并请记住，这些方法在结构化程度上不如用于客户端到服务通信的
    `startService()` 和 `bindService()` 选项。


    ### 使用 `bindService()` 方法进行所有通信


    在考虑服务如何向其感兴趣的客户端回传通信时，首先可以考虑通过 `bindService()` 以及你为客户端创建的方法来实现交互。绑定方法的优势在于，你可以通过服务方法返回的对象和信息精确控制客户端接收的内容，并且可以保证客户端确实得到了它请求的内容，因为客户端获取所需内容的唯一途径就是调用你的
    API 方法。


    这种方法的明显缺点是，未使用 `bindService()` 与服务建立持久双工通道的客户端将无法接收到任何信息——任何通过 `startService()`
    调用进行交互的客户端都无法获得服务！这听起来现在可能可以接受，但良好的实践是设计你的服务以适应多种不同的客户端使用模式。

    '
- fmt: '# Intents and Broadcast Receivers


    In Chapter [17](#499629_1_En_17_Chapter.xhtml), we introduced Android’s foundational
    approach to communicating between applications, in the intent and broadcast receiver
    mechanisms. As introduced, you experimented with examples that broadcast an intent
    from your code. Services are also at liberty to use this approach!


    In practice, you leverage intents and receivers by registering a `BroadcastReceiver`
    object using the `registerReceiver()` method in your client application and use
    that to capture component-specific broadcasts from the service imperative that
    you would document, so that the client can correctly identify the broadcast intents
    and process them as needed.


    Taking an intent approach has benefits, but does come with the drawback that the
    intent must be action-orientated, rather than relying on some activity to volunteer
    to act on it. You are also assuming that the client activity itself is still running
    with its receiver and that it hasn’t been paused or chosen for termination due
    to resource pressure or other on-device events.


    ## Use PendingIntent Objects


    Android provides the `PendingIntent` object to signal an intent with associated
    action that needs to be performed. When it comes to services, your client would
    call `onActivityResult()` to deal with the downstream logic once the service performs
    its work. The client passes the `PendingIntent` object to the service, through
    `startService()` calls’ ability to take an extra payload, and the service would
    then signal the client by calling the `send()` method on it.


    There is extra work required to make this approach effective, as you will need
    client code to interpret and identify which of the variety of `send()` method
    invocations has been used.


    ## Use Messenger and Message Objects


    Should `PendingIntent` objects not be enough by way of alternatives, Android additionally
    provides the `Messenger` object for inter-context communication, such as from
    services to activities. An individual activity comes with a `Handler` object,
    which can be used for the activity to send messages itself. However, the `Handler`
    is not exposed for activity-to-service or intra-activity interaction. This is
    where the `Messenger` object saves the day. It can send messages to any `Handler`
    and thus can be used to bridge the gap and reach any activity.


    To make use of `Messenger` objects, you add one as an extra to your intent prior
    to invoking the service. The service receives the intent in typical fashion and
    can extract the `Messenger` object, and when the time comes to communicate to
    the client, the service should create and populate a `Message` object and then
    call the Messenger’s `send()` method to pass the Message as a parameter back to
    the client. On your client side, you receive this via the Handler and its `handleMessage()`
    method.


    While this is conceptually very neat, there are the extra steps to create and
    exchange `Messenger` and `Message` objects. There is also a potential performance
    impact as you must deal with the `handleMessage()` method in the main application
    thread of your activity – so keep such handling lightweight!


    ## Use Independent Messaging


    As well as the various Android-native and on-device methods we’ve covered in the
    preceding sections, you have further options via external messaging or pub/sub
    systems to deal with service-to-client communication. This is more and more popular
    as options like Google Cloud Messaging and its clones develop more and more useful
    features. The times when it makes sense to use this kind of third-party approach
    are typically when your use case can tolerate asynchronous messaging.


    For more details on Google Cloud Messaging, check out the documentation at the
    developer website at [`https://developers.google.com/cloud-messaging/android`](https://developers.google.com/cloud-messaging/android).


    ## Create Callbacks and Listeners


    The `Messenger` and `PendingIntent` examples in the earlier sections demonstrate
    how easy it is to attach objects to the intent extras that are passed to a service.
    Using this approach requires that your object is “`Parcelable`, ” and you can
    create your own objects to satisfy this need, including callbacks or listeners
    of your own.


    Taking this approach requires you to define your listener objects and at runtime
    have the client and service coded deploy and dispose of listeners when communication
    is needed. You would also be responsible for registering and retracting listeners,
    so that you aren’t left with any orphans and the attendant resource waste/loss
    that would entail.


    ## Use Notifications


    A service has no direct UI itself, but it can interact with another application’s
    UI. Think back to the topic of notifications we introduced in Chapter [15](#499629_1_En_15_Chapter.xhtml),
    and you can see how this could be leveraged by a service to present information
    and responses directly to the user.


    # Services in Action


    We’ve covered the many aspects of services, client communication, and overall
    behavior with Android, so now it’s time to build and run your own example service
    and client application. For the purposes of having a useful example that doesn’t
    take an entire chapter to cover itself, we will create a simple photo sharing
    service and simple client example to put service theory into action. This won’t
    be an Instagram or Flickr clone – the goal is simplicity so you can focus on engineering
    a service.


    ## Choosing the Service Design


    A simple photo sharing application is a perfect scenario for using the `startService()`
    model of service interaction, where we will send a “please share this” instruction
    to a service and not need to do any follow-up that would require binding to the
    service. We shall device our service from the base `Service` class and then implement
    the `onStartCommand()` method and the `onBind()` method (even though it is not
    used by our example client, we still need to do this to correctly extend the `Service`
    base class).


    We could have chosen another `Service` subclass such as `IntentService`, which
    offers to cover much of the implementation for you such as neatly calling `stopService()`,
    `startService()`, and so forth, but as we do not want or need some of those helpers,
    we’ll stick with the preceding approach. In particular, I want the service to
    live on after the `startService()` call so that we can later stop sharing if we
    want to.


    Which photos you choose to share is not that important to the example, so I have
    stubbed those out in the example. You can tinker with this and add images or other
    resources if you wish.


    ## Creating the Java Logic for the Service


    The `ServiceExample` implementation is quite straightforward, focusing on the
    core parts of the implementation of overrides expected from the base `Service`
    class, plus my custom service-specific logic for photo sharing. Listing [18-3](#499629_1_En_18_Chapter.xhtml#PC4)
    has the full service implementation from the example in `ch18/ClientExample`.'
