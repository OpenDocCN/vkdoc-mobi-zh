    清单 9-4

    修改后的 ButtonExample Java 代码

    ```


    逐段分析这段代码将有助于你理解其运行原理，并演示你将在整个开发过程中（而不仅仅是按钮点击应用）用到的一些常见方法。


    上述清单的前几行引入了包名以及所需或必要的 Java 类导入：


    ```

    package org.beginningandroid.buttonexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.Button;

    ```


    包名将根据你在新建项目向导中输入的名称自动设置。类库导入 `androidx.appcompat.app.AppCompatActivity` 和 `android.os.Bundle`
    也是新建项目向导默认包含的。然后我显式添加了 `android.widget.Button` 类，因为这是一个预构建的类，提供了所有我希望能与我放置在布局中的按钮关联的通用逻辑和行为。最后，我添加了
    `android.view.View` 类，因为它提供了为派生自 `View` 类的小部件（即本章中讨论的所有小部件）定义事件监听器的预建能力。特别是，如下文所述，我定义并使用了
    `OnClick` 监听器，以便 `ButtonExample` 应用能够接收点击事件通知并触发我所需的逻辑。


    你可以从 `MainActivity` 类定义的修改中看出启用 `OnClick` 监听的第一步。我改变了新建项目向导提供的默认类声明，添加了 `implements
    View.OnClickListener`，如下所示：


    ```

    public class MainActivity extends AppCompatActivity implements View.OnClickListener{

    Button myButton;

    Integer myInt;

    // 更多代码在此

    }

    ```


    此修改为后续提供 `OnClick` 逻辑做好了准备——Android Studio 会通过警告提示你完成此操作，如果你尚未添加 `android.view.View`
    的导入，它也会提示你添加。接下来我定义了两个便捷变量：一个名为 `myButton` 的 `Button` 对象，它将与 UI 小部件关联；以及一个名为 `myInt`
    的 `Integer` 对象，我将其用作计数器来跟踪按钮被点击的次数。


    接下来，`onCreate()` 方法被增强，以便在 Activity 首次运行时执行我们所需的设置任务。我们将在第 12 章深入探讨 Activity 的四个主要生命周期方法，但现在你可以依赖这样一个事实：`onCreate()`
    在你的 Activity 启动时仅被调用一次。在 `ButtonExample` 代码中，我们定义并实例化了 `myButton` 对象，为 `myButton`
    设置了 `OnClick` 监听器，将 `myInt` 的初始值设置为 `0`（零），然后调用了私有方法 `updateClickCounter()`。


    整个 `updateClickCounter()` 方法由两个非常简单的步骤组成，如下所示：


    ```

    private void updateClickCounter() {

    myInt++;

    myButton.setText(myInt.toString());

    }

    ```


    首先，`myInt` 值递增 1。随后，调用 `myButton` 对象的 `.setText()` 辅助方法，并将 `myInt` 值的字符串表示形式传递给它，以便按钮小部件上显示的文本更新为反映
    `myInt` 的新值。简而言之，我们递增点击计数器的值，并将其作为按钮文本显示出来。


    我们跳过的代码最后一部分是 `onClick()` 方法，该方法由我们定义的监听器在按钮被点击时调用。此方法内的逻辑简单地调用了私有方法 `updateClickCounter()`，这意味着我们在
    `onCreate()` 时和后续任何按钮点击中都重复使用了相同的逻辑。


    继续运行你的代码——或本书中的 `Ch09/ButtonExample` 代码——你应该会看到一个充满按钮的应用程序，按钮标签上显示一个递增的计数器，类似于图
    9-4 所示。


    ![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig4_HTML.jpg](img/499629_1_En_9_Fig4_HTML.jpg)


