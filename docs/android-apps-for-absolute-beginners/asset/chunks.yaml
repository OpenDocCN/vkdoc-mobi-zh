    # 音频分辨率


    如果以 44.1 kHz 的频率对音频进行采样，那么在采样模拟信号时，我们究竟在捕捉什么？答案是在采样时间点上，关于声波振幅（大小）的信息比特。分配给存储一个样本的空间越多，就越能覆盖信号幅度中的绝对高点和低点，但更重要的是，就越能精细地区分信号中的微小步进。这也就是音频样本的“比特率”。


    一些历史上著名的音频分辨率比特率示例包括光盘（CD），其在 CD 标准中使用了 8 位比特率。这实现了不错的采样保真度，并在 44.1 kHz 采样率下，每秒产生的数据约为
    44 kB。DVD 提升了比特率水平，支持高达 16 位的音频，而当代的“高清”音频通常被认为比特率为 24 位或更高。这一切都有助于更好地捕捉数据，理论上也能带来更好的音质和保真度，但代价是需要越来越多的存储空间来保存最终数据。正是这些存储方面的考量，导致了那些以牺牲质量为代价来节省空间的格式（即编解码器领域）的激增。


    # 编码、解码与数据丢失


    人们探索了多种途径，力求找到能大幅减少所需存储空间的音频编码方式。简而言之，一系列研究和技巧在研究机构和商业环境中被开发出来，它们对采样音频进行处理，以丢弃或移除那些代表声音或声音特征的数据，而这些被丢弃的部分大多数人通常注意不到。最著名的例子是德国弗劳恩霍夫研究所开发的标准
    MPEG-1 Audio Layer 3——也就是广为人知的 **MP3**。它利用频率剪切和其他技术，捕捉到远少于原始数据量的信息，却仍能用于生成保真度相当高的原始音频再现。


    这种音频编码方法通常被称为“有损”压缩或编码，因为部分数据会丢失。另一种方法是“无损”编码，即不丢弃任何源数据。包括 WAVE（或 WAV，一种脉冲编码调制形式）和
    FLAC 在内的编码标准都是无损格式。您会经常听到所有这些方法被统称为编解码器（codec），这个词是两个缩写的组合词：code 来自单词 encode（编码），dec
    来自单词 decode（解码）。


    对于您使用音频开发 Android 应用程序的工作而言，您可以明白，编解码器的选择以及有损与无损捕捉的方式，将直接影响您所用音频的大小和质量。


    # 更多音频理论


    关于音频理论，还有大量内容需要学习和理解，一本 Android 书籍的篇幅无法涵盖这一切。诸如序列、合成等话题都有成书库的著作，而且在线上也能找到关于这些主题的丰富信息。维基百科是一个不错的起点。至于关于采样、比特率、编码格式等内容的实践和教程，可以查看下一节介绍的工具。


    # 选择更多音频工具


    回放已创建的音频是对您应用程序的一个很好的补充，无论是音乐、播客还是应用程序的音效。在某个时候，您很可能需要超越使用他人音频资源的层面，想要创建自己的音频，或者混音和调整其他预先录制的音频。音频录制和编辑软件是一个庞大的领域，但作为入门，查阅一些流行的（且免费的！）可选方案是不会错的。


    ## 认识 Audacity


    在某些软件领域，免费开源软件具有强大影响力甚至占据主导地位，音频编辑就是其中之一。Audacity 十多年来一直是一个受欢迎的音频编辑套件。用 Audacity
    网站关于页面的话来说：


    *[Audacity] 是一个免费的、易于使用的多轨音频编辑器和录音机，适用于 Windows、macOS、GNU/Linux 和其他操作系统。其界面已被翻译成多种语言。*


    Audacity 拥有海量功能，其中最重要的可以总结如下：


    1.  录制实时音频——来自您计算机可用的任何输入源

    2.  录制计算机回放——捕捉您可能正在运行的其他系统的音频

    3.  完整的编辑功能，支持所有关键的音频格式，包括 `MP3`、`WAV`、`AIFF`、`FLAC`、`Ogg Vorbis` 等（显然，这涵盖了几乎所有
    Android 支持的格式——一个额外的好处！）

    4.  通过丰富的插件库系统编辑其他格式，例如 `M4A` 和 `WMA`

    5.  用于复制、剪切、拼接、混音、音高和速度调整以及变速的完整工具

    6.  支持 16 位、24 位和 32 位质量以及全频谱采样率

    7.  高级功能，如频谱图分析和其他强大选项


    我还可以列举更多特性和功能，但您可以自行在 Audacity 自己优秀的文档网站上阅读更多信息，网址是 [`https://manual.audacityteam.org`](https://manual.audacityteam.org)。在撰写本书时，Audacity
    的版本是 2.4.2。由于它是开源且免费的，我强烈建议您至少下载并安装它来试用一下。[`https://manual.audacityteam.org/man/tutorials.html`](https://manual.audacityteam.org/man/tutorials.html)
    上有非常易学的教程，其中我推荐每位刚接触音频的爱好者都从两个教程开始：编辑音频文件和创建新录音。您很快就能为您的 Android 应用程序创建素材了。


    ## 使用 WavePad


    另一个强大的视频编辑工具是 WavePad，它在近年来声名鹊起。WavePad 拥有至少与 Audacity 一样强大的功能集，在某些情况下甚至更进一步。WavePad
    一个关键的优势领域是，它支持更多生僻和罕见的音频文件格式，例如 `VOX`。WavePad 最引人注目的部分可能是它拥有自身的移动版本，包括一个 Android
    版本。这意味着您可以使用自己的移动设备来创建、编辑和优化您正在为同一设备编写的新应用程序所需的音频。


    WavePad 采用“免费增值”模式，部分功能免费提供，但其他功能需要付费许可证。您可以在 [`www.nch.com.au/wavepad/index.html`](http://www.nch.com.au/wavepad/index.html)
    找到关于 WavePad 的更多信息。


    ## 苹果 Mac 用户的选择：GarageBand


    如果您拥有 Mac 电脑，还有一个值得考虑的选择。过去十年（或更久）出厂的每一台 Mac 都预装了苹果自己的音乐编辑和创作软件 GarageBand。GarageBand
    拥有许多出色的功能，并围绕它形成了一个非常强大的社区。显然，由于 GarageBand 是 Mac 的捆绑软件，我无法为您提供下载链接，如果您有 Mac，GarageBand
    已经包含在您购买机器所付的款项中——因此开始使用它无需额外费用。


    # 总结


    在本章中，我们介绍了 Android 的一些核心音频和声音处理能力，包括 Media 包以及 `MediaPlayer` 和 `MediaRecorder`。我们看到了多种播放和录制声音的方法，并简要介绍了
    Android 提供的其他音频包，包括 `SoundPool` 和 `JetPlayer`。


    我们将在下一章继续这个话题，届时我们将探讨视频，并再次领略 Media 包的功能。


    # 14. 在 Android 中处理视频与电影

    '
- fmt: '# 移动视频播放


    近年来，移动设备使用增长最快的领域之一是视频。无论是在通勤时流式观看 Netflix 节目、在 YouTube 上追看猫咪的搞笑视频，还是使用基于视频的聊天和消息应用，视频在
    Android 领域从未像现在这样占据核心地位。为你的应用添加视频功能非常简单，不过你也需要了解 Android 中关于视频的一些奇特且出乎意料的方面。


    在本章中，我们将探讨为应用添加视频内容的最简单方式，然后花时间介绍更广泛的视频工具集——如果你打算认真对待 Android 视频开发，就应该掌握这些工具。在本书后续章节中，我们还将提到使用
    Android 的 `ContentProvider` 机制进行视频播放的选项。


    ## 播放视频


    与音频和声音一样，Android 提供了多种方式将视频播放功能引入你的应用。实际上，其中一些方式与你在前一章中已经接触过的类和框架相同，例如 `Media`
    框架。视频播放有其独特的方面，其中最重要的是使用专用小部件 `VideoView`，它用于实际显示视频，控制视频在播放期间的某些行为，以及控制用户在播放过程中对视频的操作。


    在 Android 中处理视频可以非常直接。虽然你可以构建复杂的层次结构，但从最基础的内容入手是理解视频播放过程中内部机制的好方法，同时也能让你熟悉那些更复杂方法所隐藏的基本构建块。


    我们将通过一个示例应用来开始探索视频播放，你可以在 `Ch14/VideoPlayExample` 项目文件夹中找到它。


    ### 设计基于 `VideoView` 的布局


    为了显示视频进行播放，我们需要一个带有 `VideoView` 对象的合适 Activity。清单 14-1 显示了 `VideoPlayExample`
    应用的布局，其中就包含这样一个 `VideoView`。


    ```

    Listing 14-1

    Layout XML including VideoView object for VideoPlayExample

    ```


    审视我们的布局，你会注意到我们有以下三个小部件：


    1.  一个“Start Video”按钮，其 `android:id` 为 `startButton`，并且 `android:onClick` 属性设置为
    `"onClick"`。

    2.  一个“Stop Video”按钮，其 `android:id` 为 `stopButton`，并且 `android:onClick` 属性也设置为
    `"onClick"`，与 `startButton` 相同。

    3.  一个 `VideoView` 小部件，其 `android:id` 为 `video`。


    我们使用了 `ConstraintLayout` 布局，并将 `startButton` 约束到父布局顶部（即 Activity 窗口顶部）。`stopButton`
    被约束为与 `startButton` 底部对齐，而 `video` 的 `VideoView` 被约束为与 `stopButton` 底部对齐。在显示任何视频之前，最终的布局看起来很像图
    14-1 中的图像。


    ![../images/499629_1_En_14_Chapter/499629_1_En_14_Fig1_HTML.jpg](images/499629_1_En_14_Chapter/499629_1_En_14_Fig1_HTML.jpg)


    **图 14-1** `VideoPlayExample` 应用的视觉布局


    该布局特意设计得非常简单，以便更容易理解访问视频文件、播放视频等逻辑。考虑到两个按钮都使用了 `android:onClick="onClick"` 属性，你可能已经能猜到基本结构了。


    ## 在代码中控制视频播放


    查看与布局配套的 Java 逻辑，你会立刻发现一个模式，它与我在第 13 章中介绍的音频和声音示例相似。正如我们在 `AudioPlayExample` 和
    `AudioStreamExample` 应用中看到的那样，大部分控制逻辑都围绕着使用 `onClick()` 方法来驱动 Activity 行为。我们的
    Java 代码如下，如清单 14-2 所示。


    ```

    package org.beginningandroid.videoplayexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.net.Uri;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.MediaController;

    import android.widget.VideoView;

    public class MainActivity extends AppCompatActivity {

    private VideoView vv;

    private MediaController mc;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    }

    public void onClick(View view) {

    switch(view.getId()) {

    case R.id.startButton:

    doPlayVideo();

    break;

    case R.id.stopButton:

    doStopVideo();

    break;

    }

    }

    private void doPlayVideo() {

    vv =(VideoView)findViewById(R.id.video);

    mc = new MediaController(this);

    mc.setAnchorView(vv);

    vv.setMediaController(mc);

    vv.setVideoURI(Uri.parse("android.resource://" + getPackageName() + "/" + R.raw.video_file));

    vv.requestFocus();

    vv.start();

    }

    private void doStopVideo() {

    if (vv != null) {

    vv.stopPlayback();

    }

    }

    }

    ```


    **清单 14-2** 视频播放的 Java 逻辑


    > **注意**：此代码示例使用了一个名为 `video_file.m4a` 的视频文件。如果你因任何原因需要访问原始视频文件，可以从 `beginningandroid.org`
    网站获取。


    从我们的 `MainActivity` 开始，你会观察到我们创建了两个对象。第一个是 `VideoView` 对象，名为 `vv`，它将用于后续绑定到已加载布局的
    `<VideoView>` 元素。第二个是 `MediaController` 对象，名为 `mc`，我们稍后会讨论它。`onCreate()` 重写方法执行了加载布局的基本操作，仅此而已。


    接下来，你会看到 `onClick()` 方法，就像在音频示例中一样，它接受一个 `View` 作为参数，然后使用基于视图 `android:id` 的 `switch`
    语句来判断哪个按钮被点击：`startButton` 或 `stopButton`。这与第 13 章示例中使用的模式几乎相同——你可以看出这是我觉得非常有价值且反复使用的模式！


    如果检测到 `startButton` 是被点击的 `View`（按钮），则会调用 `doPlayVideo()` 方法。该方法首先通过使用现在已经很熟悉的
    `findViewById()` 技术，并利用布局中 `VideoView` 持有的 `android:id` 为 `"video"` 的 `R.id.video`
    样式表示，确保 `vv` 的 `VideoView` 对象绑定到 `VideoView` UI 小部件。


    接着，我们实例化新的 `MediaController` 对象 `mc`，然后立即调用 `setAnchorView()` 方法。这会将 `MediaController`
    绑定起来，并允许它在应用中使用时，呈现一组浮动控件，这些控件将显示在 `VideoView` 对象之上。当你运行 `VideoPlayExample` 应用时，你将能够看到其中一些控件。同样地，我们向
    `VideoView` 指示，`mc` 的 `MediaController` 负责管理在 `vv` 的 `VideoView` 中显示的任何视频的播放某些方面。


    调用 `vv.setVideoURI()` 会构建一个符合规范的 URI，该 URI 引用了一个名为 `video_file.m4v` 的视频，该视频已放置到项目的
    `raw` 文件夹中。要查看完整形成的 URI 是什么样子，你可以在 Android Studio 中调试代码并设置断点。'
