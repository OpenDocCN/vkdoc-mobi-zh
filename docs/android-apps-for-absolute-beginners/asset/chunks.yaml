- fmt: "If you look closely, you will see the small waving hand icon at the top of\
    \ the screen. If it is hard to see on the printed (or on-screen) page, be sure\
    \ to try running the example for yourself to see it appear in your own virtual\
    \ device. Depending on the API levels supported by your AVD, you may or may not\
    \ see the additional status text associated with the `Notification` object. Clicking\
    \ the `Clear Notification` button makes the icon disappear, and if you are fast\
    \ enough to click it while the pop sound is still playing or a real device is\
    \ still vibrating, those additional customizations will also stop.\n\nThe notification\
    \ endures throughout the lifecycle of the `NotificationBuilderExample` activity\
    \ and even after you have sent it to the background in favor of using other applications\
    \ or returned to the launcher home screen. Try it for yourself, and you should\
    \ still see the notification icon as in Figure [15-3](#499629_1_En_15_Chapter.xhtml#Fig3).\n\
    \n![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig3_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3** Notification icon persists even after leaving activity\n\nOnce\
    \ the notification has fired, and at any point thereafter, the user can access\
    \ the notification drawer that collects all the notifications from all the applications\
    \ on the device (and potentially groups them via channel if using a sufficiently\
    \ recent API level and compatible device). In Android you open the notification\
    \ drawer by “grabbing” the bar at the top of the screen and dragging all the way\
    \ to the bottom. In Figure [15-4](#499629_1_En_15_Chapter.xhtml#Fig4), you can\
    \ see the example notification with the additional details I added, including\
    \ the notification title and additional text.\n\n![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig4_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig4_HTML.jpg)\n\
    \n**Figure 15-4** The notifications drawer open, showing our notification\n\n\
    What you see in the notification drawer depends directly on the release of Android\
    \ in use. The examples in the preceding figures are from an Android 10.0 AVD instance,\
    \ with our icon chosen from the appropriate screen density resource or scaled\
    \ from the nearest available resource packaged with the application. Our 25-by-25-pixel\
    \ waving hand is far more recognizable in the notification drawer. The title and\
    \ additional text are shown, along with the timestamp passed to the `Notification`\
    \ object at creation time.\n\nYou will also notice the number value presented\
    \ in the notification drawer of newer Android releases, instead of as an overlay\
    \ on the icon in the icon bar. Google made this change to Android to deal with\
    \ the clutter that was starting to creep into icon displays on smaller phone screens.\
    \ By shifting the number to the notification drawer, people’s launcher screens\
    \ grew a little less overwhelmed.\n\nThe user can click the icon to trigger the\
    \ follow-on activity or simply dismiss the notification – just as if they had\
    \ clicked the `Clear Notification` button on the activity home screen. On recent\
    \ versions of Android, you will see the three slightly offset horizontal bars\
    \ below the notifications, which are the `Dismiss All` option. Even newer versions\
    \ of Android will show the \"Clear All\" and \"Manage\" options at the bottom\
    \ of the notification drawer. In our example, whichever clearing technique you\
    \ choose will trigger the `cancelAll()` method on all active `NotificationManager`\
    \ objects, completely clearing the notification drawer in the process.\n\nA completely\
    \ clear notification drawer then looks like the depiction in Figure [15-5](#499629_1_En_15_Chapter.xhtml#Fig5).\n\
    \n![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig5_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig5_HTML.jpg)\n\
    \n**Figure 15-5** All notifications cleared from the device\n\nNote that clearing\
    \ notifications in this fashion will not necessarily clear the notification count\
    \ you might have been tracking in your application. Remember, even though you\
    \ have switched away from the application, Android hasn’t necessarily triggered\
    \ `onDestroy()` or reaped the application for its resources.\n\n## Summary\n\n\
    You now have a firm grounding in the notification system available with Android\
    \ and experience of using notifications. There are more advanced topics that expand\
    \ notifications and their uses, which you can find on the book’s website at [www.beginningandroid.org](http://www.beginningandroid.org).\
    \ These advanced notification topics include timeline notifications, bundled notifications\
    \ for groups or sets of related notifications, expandable notifications, and specialized\
    \ notification types for Wear OS and embedded uses of Android such as Android\
    \ Auto.\n\n---\n\n# 16. Exploring Device Capabilities with Calls\n\nWith all of\
    \ the ideas we have already covered in the book, and will still cover in later\
    \ chapters, it is easy to delve headlong into all kinds of application development\
    \ that only deal with the great software platform Android provides. It is so easy,\
    \ in fact, that often you overlook one of the other tremendous opportunities you\
    \ have as an Android developer: working with the Android hardware as well.\n\n\
    In this chapter, we will very briefly look at how to start using device capabilities\
    \ – specifically, calling and sensors. This will be super-brief, but should give\
    \ you the start to continue learning more about hardware capabilities independently.\n\
    \n## Calling the Shots\n\nAndroid has come a long way from the early days when\
    \ it was all about phones. With the explosion in devices and form factors that\
    \ now use Android – as I outlined in Chapter [1](#499629_1_En_1_Chapter.xhtml)\
    \ – it can be worth thinking in advance about how and why your application might\
    \ want to add telephony support and how it might adapt to circumstances and devices\
    \ where there is \"no phone.\"\n\n### Specifying Telephony Support\n\nTo flag\
    \ to Android that your application requires access to the hardware features associated\
    \ with telephony, you should add the following hardware requirement entry to your\
    \ `AndroidManifest.xml` file:\n\n```\nThe android.hardware.telephony feature indicates\
    \ that your\napplication requires cellular access and support and means that users\n\
    can be guided in advance about whether the application is suitable for\ntheir\
    \ device, such as when searching or downloading applications on\nGoogle Play.\n\
    ```\n\n### Making Telephony Support Optional\n\nIf it strikes you that it’s a\
    \ bit extreme to hang an entire application on whether or not it has cellular\
    \ access granted, you would be right. Where you are considering building an application\
    \ where telephone access is a bonus, but not a hard requirement, then you can\
    \ make use of techniques to check for telephony support in your application logic\
    \ at application runtime and handle both cases of having and not having access\
    \ to the cellular hardware.\n\nAndroid uses the `PackageManager` class to help\
    \ detect all manner of hardware, from accelerometers and microphones all the way\
    \ through to the capabilities around phone hardware. The most common approach\
    \ is to use the `hasSystemFeature()` method, as shown in the pseudo-code snippet\
    \ in Listing [16-1](#499629_1_En_16_Chapter.xhtml#PC2).\n\n```\nPackageManager\
    \ myDevice = getPackageManager();\nif (myDevice.hasSystemFeature(PackageManager.FEATURE_TELEPHONY)\
    \ {\n    // the user's device has telephony support\n    // add your call-related\
    \ logic here\n} else {\n    // the user's device lacks telephony support\n   \
    \ // do something that doesn't require making calls\n};\n```\n\n**Listing 16-1**\
    \ A code fragment showing detection of cellular hardware access\n\nYou can also\
    \ check for other useful aspects of telephony support, such as network type and\
    \ voice implementation, for example, VoLTE, LTE, GSM, CDMA, and so on."
  raw: 'If you look closely, you will see the small waving hand icon at the

    top of the screen. If it is hard to see on the printed (or on-screen)

    page, be sure to try running the example for yourself to see it appear

    in your own virtual device. Depending on the API levels supported by

    your AVD, you may or may not see the additional status text associated

    with the Notification object.

    Clicking the Clear Notification button makes the icon disappear, and

    if you are fast enough to click it while the pop sound is still playing

    or a real device is still vibrating, those additional customizations

    will also stop.


    The notification endures throughout the lifecycle of the `NotificationBuilderExample`

    activity and even after you have sent it to the background in favor of

    using other applications or returned to the launcher home screen. Try it

    for yourself, and you should still see the notification icon as in

    Figure [15-3](#499629_1_En_15_Chapter.xhtml#Fig3).


    ![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig3_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig3_HTML.jpg)


    Figure 15-3

    Notification icon persists even after leaving activity


    Once the notification has fired, and at any point thereafter, the user

    can access the notification drawer that collects all the notifications

    from all the applications on the device (and potentially groups them via

    channel if using a sufficiently recent API level and compatible device).

    In Android you open the notification drawer by “grabbing” the bar at the

    top of the screen and dragging all the way to the bottom. In Figure

    [15-4](#499629_1_En_15_Chapter.xhtml#Fig4), you can see

    the example notification with the additional details I added, including

    the notification title and additional text.


    ![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig4_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig4_HTML.jpg)


    Figure 15-4

    The notifications drawer open, showing our notification


    What you see in the notification drawer depends directly on the

    release of Android in use. The examples in the preceding figures are

    from an Android 10.0 AVD instance, with our icon chosen from the

    appropriate screen density resource or scaled from the nearest available

    resource packaged with the application. Our 25-by-25-pixel waving hand

    is far more recognizable in the notification drawer. The title and

    additional text are shown, along with the timestamp passed to the `Notification`
    object

    at creation time.

    You will also notice the number value presented in the notification

    drawer of newer Android releases, instead of as an overlay on the icon

    in the icon bar. Google made this change to Android to deal with the

    clutter that was starting to creep into icon displays on smaller phone

    screens. By shifting the number to the notification drawer, people’s

    launcher screens grew a little less overwhelmed.

    The user can click the icon to trigger the follow-on activity or

    simply dismiss the notification – just as if they had clicked the Clear

    Notification button on the activity home screen. On recent versions of

    Android, you will see the three slightly offset horizontal bars below

    the notifications, which are the Dismiss All option. Even newer versions

    of Android will show the “Clear All” and “Manage” options at the bottom

    of the notification drawer. In our example, whichever clearing technique

    you choose will trigger the `cancelAll()`

    method  on all

    active NotificationManager objects, completely clearing the notification

    drawer in the process.


    A completely clear notification drawer then looks like the depiction in

    Figure [15-5](#499629_1_En_15_Chapter.xhtml#Fig5).


    ![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig5_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig5_HTML.jpg)


    Figure 15-5

    All notifications cleared from the device


    Note that clearing notifications in this fashion will not necessarily

    clear the notification count you might have been tracking in your

    application. Remember, even though you have switched away from the

    application, Android hasn’t necessarily triggered `onDestroy()` or reaped

    the application for its resources.


    Summary

    You now have a firm grounding in the notification system available

    with Android and experience of using notifications. There are more

    advanced topics that expand notifications and their uses, which you can

    find on the book’s website at [`www.beginningandroid.org`](http://www.beginningandroid.org).

    These advanced notification topics include timeline notifications,

    bundled notifications for groups or sets of related notifications,

    expandable notifications, and specialized notification types for Wear OS

    and embedded uses of Android such as Android Auto.


    16. Exploring Device Capabilities

    with Calls


    With all of the ideas we have already covered in the book, and will

    still cover in later chapters, it is easy to delve headlong into all

    kinds of application development that only deal with the great software

    platform Android provides. It is so easy, in fact, that often you

    overlook one of the other tremendous opportunities you have as an

    Android developer: working with the Android hardware as well.

    In this chapter, we will very briefly look at how to start using

    device capabilities – specifically, calling and sensors. This will be

    super-brief, but should give you the start to continue learning more

    about hardware capabilities independently.


    Calling the Shots

    Android has come a long way from the early days when it was all about

    phones. With the explosion in devices and form factors that now use

    Android – as I outlined in Chapter [1](#499629_1_En_1_Chapter.xhtml) – it can
    be worth thinking in

    advance about how and why your application might want to add telephony

    support and how it might adapt to circumstances and devices where there

    is “no phone.”


    Specifying Telephony Support


    To flag to Android

    that your application requires access to the hardware features

    associated with telephony, you should add the following hardware

    requirement entry to your `AndroidManifest.xml`

    file:


    ```

    The android.hardware.telephony feature indicates that your

    application requires cellular access and support and means that users

    can be guided in advance about whether the application is suitable for

    their device, such as when searching or downloading applications on

    Google Play.


    Making Telephony Support Optional

    If it strikes

    you that it’s a bit extreme to hang an entire application on whether or

    not it has cellular access granted, you would be right. Where you are

    considering building an application where telephone access is a bonus,

    but not a hard requirement, then you can make use of techniques to check

    for telephony support in your application logic at application runtime

    and handle both cases of having and not having access to the cellular

    hardware.


    Android uses the `PackageManager` class

    to help detect all manner of hardware, from accelerometers and

    microphones all the way through to the capabilities around phone

    hardware. The most common approach is to use the `hasSystemFeature()`

    method , as shown

    in the pseudo-code snippet in Listing [16-1](#499629_1_En_16_Chapter.xhtml#PC2).


    ```

    PackageManager myDevice = getPackageManager();

    if (myDevice.hasSystemFeature(PackageManager.FEATURE_TELEPHONY) {

    // the user''s device has telephony support

    // add your call-related logic here

    } else {

    // the user''s device lacks telephony support

    // do something that doesn''t require making calls

    };

    Listing 16-1

    A code fragment showing detection of cellular hardware access

    ```


    You can also check for other useful aspects of telephony support,

    such as network type and voice implementation, for example, VoLTE, LTE,

    GSM, CDMA, and so on.'
  trans: "\n如果你仔细观察，就会在屏幕顶部看到一个小挥手图标。如果在打印（或屏幕）页面上难以看清，请务必亲自运行示例，看看它是否出现在你自己的虚拟设备中。根据你的\
