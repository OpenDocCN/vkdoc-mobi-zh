    \ or image content; `match_parent`, taking\n    the maximum amount of space the\
    \ parent makes available; or a specific\n    pixel value, measured in device-independent\
    \ pixels, such as 125\n    dip.\n\n*   Weight: When two or more widgets in a `LinearLayout`\
