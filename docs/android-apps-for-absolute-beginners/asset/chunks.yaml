    # `onPause()`


    Android 从底层设计之初就支持多个应用程序同时运行，并依赖应用能够简单、轻松地暂停其活动，以便为用户决定使用的其他活动释放资源。为了支持这一点，应用程序会频繁地从前台状态切换到后台状态。在此之前，系统会立即调用
    `onPause()` 方法。


    在 `onPause()` 调用期间，最重要的任务包括：保存任何尚未放入 Activity 的 `Bundle` 中的状态，以及处理自定义动画、视频、音频或逻辑中的其他实时方面。此外，`onPause()`
    调用也是一个临界点，超过此点后，Android 可以单方面终止你的 Activity 并回收其资源。这意味着一旦 `onPause()` 调用结束，就无法保证你的进程和
    Activity 还能再次接收到任何事件——因此，请保存你需要的内容，并且不要假设在此之后，没有你的干预，Activity 的状态依然会持续存在。


    # `onStop()`


    如果说 `onStart()` 负责管理 Activity 移入前台，那么你可以将 `onStop()` 视为其反向操作：负责将你的 Activity 移入后台。在
    `onStop()` 完成后，你的 Activity 将不再可见，尽管相关的视图层级和属性仍然保持不变。


    在 Android 积极的内存资源管理策略下，你应当时刻牢记，`onStop()` 可能永远不会在你的 Activity 中被调用，因此依赖于在此处编写自定义逻辑并不明智。你可能需要考虑重写默认行为的一个场景是，与通常不需要前台交互性的
    Android 服务进行任何交互。


    # `onSaveInstanceState()`


    `onSaveInstanceState()` 方法的名字及其在图 11-1 生命周期图中的位置，都非常清晰地表明了它的用途。该方法的作用是为任何即将被 `onDestroy()`
    方法销毁的 Activity 保存其状态，从而避免用户发现重要的状态丢失，而他们却未意识到 Activity 可能已经结束并被重新创建。这种情况在发生任何配置变更事件时经常出现，因此需要为用户提供透明且自动的体验。


    > **注意**

    > 目前有一种趋势，即开始倾向于使用 `ViewModel` 的概念，并通过该技术保存任何临时状态。然而，`onSaveInstanceState()` 方法仍然得到全面支持。你可以在
    `developer.android.com` 上阅读更多关于 ViewModel 的内容。


    # `onRestart()`


    每当 Activity 从停止状态移动至启动状态时，都会调用 `onRestart()` 方法。该方法使你可以灵活地处理新启动的 Activity 版本，使其不同于那些曾被停止而现在又重新启动的版本。例如，在重新启动的情况下，可以利用保留的视图层级结构来加速某些初始化活动。


    # `onRetainNonConfigurationInstance()`


    这是一个方法名非常长且奇怪的方法，仔细查看生命周期图会发现，它甚至没有出现在图上！原因是 `onRetainNonConfigurationInstance()`
    严格来说并不与 Activity 的生命周期绑定。相反，其目的是在 Android 系统发生配置变更时，提供一个可被调用的回调机制。


    你可能会问：“什么是配置变更？”有几种重要的操作，Android 将其视为整个设备配置的变更，必须通知所有正在运行的应用程序，并且应用程序需要执行必要的步骤来适应这种变更。这些配置变更操作包括：


    1.  将设备从横屏旋转为竖屏，或反之亦然

    2.  将设备连接到 USB 电源

    3.  将设备放入底座

    4.  添加或移除 SD 类存储设备

    5.  更改 Android 操作系统的输入或显示语言


    你的 Activity 可能需要处理部分或全部这些事件。最明显的例子是，需要根据设备的新方向重新绘制（或者严格来说是重新创建）布局。在这些情况下，Android
    会保留 Activity 先前实例的所有资源，调用配套的 `getLastNonConfiguationInstance()` 方法将返回对这些资源的引用，使你能够执行所需的任何进一步变更处理。


    随着无头 Fragment 的出现，这种方法在现代应用开发中已不常见。我们将在第 12 章中介绍 Fragment。


    # `onDestroy()`


    我们已到达生命周期方法的终点，恰如其分的，这最后一个方法就是 `onDestroy()`，它本身完全关乎于结束 Activity。我们知道 Activity
    是廉价且丰富的，在构建应用时，你应该随时使用它们并在需要时将其丢弃。你可以考虑添加到 `onDestroy()` 重写中的核心逻辑是任何以 Activity
    为中心的清理工作。由于无法保证 `onDestroy()` 一定会被你的 Activity 调用，因此你不应依赖它，也不应期望在此处与其他资源或服务进行交互。


    # 领悟 Activity 生命周期的目标


    对于新开发者来说，掌握回调的整个概念对于更广泛地理解消息机制和基于事件的开发至关重要。然而，如果你仅仅将 Android 应用程序视为处于特定状态的 Activity，等待回调信号来触发行动，你就会错过一些更宏大的设计理念。


    总的来说，廉价且易于操控的 Activity，以及精心封装的回调方法（意味着每个 Activity 都携带了如何从“这里”到达“那里”的指令），其最大的目标是给用户呈现一个无缝衔接的应用程序，能够响应用户的输入和需求。这种以用户为中心的观点对于提供连贯的体验至关重要，因为你的用户倾向于将你的应用视为一组或一系列层级的屏幕，而不是一堆松散关联、随时可以被轻易创建和销毁的
    Activity。


    当你开始编写包含越来越多 Activity 的应用程序时，牢记以下原则将对你有益：


    1.  **Activity 应有重点。** 你创建的每个 Activity 应服务于一个单一的（但不一定简单的）目的或结果，而不是成为无关选项、操作和结果的大杂烩。

    2.  **保存状态，然后再次保存。** 用户是不可预测的，他们会在使用你的应用时做出最意想不到的事情——从关闭手机到反复切换进出你的应用，甚至更多。为了让用户相信你的应用能够直观地处理任何意外情况，经常保存状态非常重要。可以将其视为一个自然的安全网，既廉价又有效。

    3.  **为每个视图设置 ID。** 每个控件、每个视图、每个 `ViewGroup` 都应带有 `android:id` 属性。这有助于你帮助自己，因为当每个视图都有
    ID 时，保存实例状态会变得容易得多。

    4.  **应用和 Activity 可能消失。** 存在一些你无法控制的情况，尤其是无论你如何使应用高效和轻量，用户仍可能决定将其与那些占用大量内存和资源（“内存大户”和“资源恶霸”）的应用一同安装。如果用户在这种环境下暂停了你的应用，Android
    操作系统可能会来终止你正在运行的应用程序，以释放急需的内存。

