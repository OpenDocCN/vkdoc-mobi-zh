    Everything you need for working with an object comes neatly wrapped up (encapsulated)
    with its class. There are a myriad benefits to this approach, which you can read
    about extensively in many object-oriented design texts such as Apress’ *Interactive
    Object-Oriented Programming in Java* (Sarcar, ISBN 9781484254035) and in countless
    online web pages. Remember too that when you write your own classes, you have
    the freedom and liberty to make whatever class methods you wish available.'
  trans: '

    要运行你的代码，请使用 `java` 命令（小写），并将 `FirstJavaDemo.class` 文件的完整路径传递给它，但要从文件名中省略文件扩展名（即
    `.class` 部分），例如：


    ```

    $ java /FirstJavaDemo

    ```


    在回答完屏幕上出现的提示问题后，输出内容将如下所示：


    ```

    $ java FirstJavaDemo

    Tell me something about yourself: I program in Java

    Interesting!  You said you: I program in Java

    ```


    你做到了！通过使用 Java 特有的工具和一些新学的代码，你创建了一个纯 Java 应用程序。继续阅读以了解更多关于 Java 语言的知识，以及如何深入理解
    `FirstDemoJava` 应用程序中的每一个词、每一行代码和每一个奇怪的标点符号。


    ## Android 开发的关键 Java 构建模块


    本书剩余部分的所有示例都将依赖于一定程度的 Java 知识。在本章的剩余部分，我们将为你提供一个涵盖基础知识的主题总览列表，你至少需要掌握这些内容才能跟上进度，但更重要的是，这也会为你提供一个起点，让你能够从网上、书店、学校和学院等海量的免费和商业资源中进一步学习和自我提升。我们还将直接链接到其中一些资源，以确保你的
    Java 学习之旅不会中断——我鼓励你在阅读本章时点击这些链接，因为深入探索 Java 主题永远不会嫌早！


    为了最高效地学习用于 Android 开发的 Java，以下主题至关重要：


    通用软件开发知识：


    1.  代码的结构与布局

    2.  面向对象的设计与编程，包括类与对象

    3.  类方法与数据成员


    Java 特有的编码知识：


    1.  接口与实现

    2.  线程与并发

    3.  垃圾回收

    4.  异常处理

    5.  文件处理

    6.  泛型

    7.  集合


    显然，这并不是 Java 的全部内容，但它足以构成一个子集，为你立即开始 Android 开发提供构建模块！


    ### 代码结构


    回顾 `FirstJavaDemo` 的源代码，你可以了解到 Java 代码在最简单情况下的结构。Java 可以被看作是一个不断叠加的“洋葱层”，从最基本的构造层层叠加，直至最深远、最复杂的构造。从最简单到最复杂，我们有：


    *   **标记**：Java 的最小构建模块，一个标记代表事物的名称，例如我们创建的或者系统提供的对象实例（如 `FirstJavaDemo` 代码中的
    `String` 对象）、Java 语言的关键字（如 `return`）、运算符、标点符号（如括号）等等。


    *   **表达式**：一个或多个标记与运算符（如 `+`）或方法调用组合在一起，构成一段逻辑。在 `FirstJavaDemo` 示例中，我们在 `"Interesting!
    You said: " + something` 中看到了一个表达式，这是一个使用 `+` 运算符连接两个字符串的表达式。


    *   **语句**：由标记和表达式构建的完整逻辑单元，以分号结束。它通常等同于一行代码，但实际上可以跨越多行。


    *   **方法**：一组逻辑上相关的语句，构成一个完整的逻辑单元，并可以通过方法名进行调用。在 `FirstJavaDemo` 代码中，我们为类的 `main`
    方法创建了逻辑，同时也引用了其他类的方法，例如用于在控制台读取文本输入的 `readLine()` 方法和用于向控制台输出结果的 `println()` 方法。


    *   **类**：表示一个概念化对象及其所有方法和数据成员，这些成员用于表示该对象并允许对其进行操作并利用其能力。类的概念与面向对象设计的概念紧密相关，我们稍后将提到这一点。


    *   **包**：虽然在我们的示例中没有展示，但包是一组类的集合，通常用于将支持特定相关逻辑组（例如文件处理或图形渲染）的类捆绑在一起。


    Java 代码还有许多其他结构方面，但掌握上述内容将使你能够基于对基础知识的理解，解读并利用更特殊的构造。


    ### Android 与 Main


    这可不是一个十字路口，但它确实可以像那样理解。在 `FirstJavaDemo` 示例中，你会看到我们定义了一个名为 `main` 的方法。Java 的设计规定，Java
    程序的少数强制性要求之一就是存在一个名为 `main` 的方法，并且它将是 JVM 在运行程序时调用的第一个方法。可以将其视为 Java 中一个写着“从这里开始”的巨型标志。


    但是看看我们在前面章节中编写的 Android 示例，比如 `MyFirstApp` 应用程序。`MainActivity.java` 文件中缺少 `main`
    方法。这是怎么回事？别担心。你的应用程序确实有一个 `main` 方法，但它隐藏在 Android Studio 提供的辅助框架中。Android 并没有让你去处理
    `main` 方法以及所有为用户提供运行应用程序体验的流程或事件处理工作，而是提供了一个活动生命周期，其中包含一些定义好的节点，你作为开发者可以专注于这些节点，处理你的活动被创建、使用、暂停和销毁的时刻。这个活动生命周期将在第
    11 章中深入介绍。


    如果你查看已经编写的 Android Java 代码，包括 `MyFirstApp` 应用程序，你可以在实践中看到 Java 语言层次结构的许多方面——在你没有意识到的情况下，你已经在你最初的应用程序中运用了这些概念。


    ### 理解面向对象设计、类和对象


    Java 编程语言从设计之初就旨在拥抱并表达面向对象设计（有时简称为“OO”）的概念。其核心是，面向对象设计使用对象（或实体）（例如“人”或“动物”）来表达你在应用程序中创建的几乎所有的概念模型，然后利用一些强大的设计理念来塑造对象的定义、操作、扩展和改进方式。这是一个庞大的主题，但你可以从一些优秀的在线资料开始，这些资料会随着时间推移帮助你理解关键的
    OO 概念，包括封装、继承、多态等。


    ### 使用类方法和数据成员


    采用面向对象方法进行编码的一个固有概念是，关于对象和对象实例的数据属于这些实体本身，而要操作和查询这些数据，应该使用生成这些对象的类所设计提供（并规定）的技术。简而言之，这意味着使用该类定义并向开发者提供的方法（或函数）。


    对于刚接触面向对象开发的你来说，这并不像最初看起来那样具有约束性。它体现了面向对象的原则之一：封装。处理一个对象所需的一切都与其类整洁地打包在一起（封装起来）。这种方法有无数好处，你可以在许多面向对象设计的文献中（例如
    Apress 出版社的 *Interactive Object-Oriented Programming in Java*，Sarcar 著，ISBN 9781484254035）以及无数的网页中广泛阅读到。请记住，当编写自己的类时，你可以自由地决定提供哪些类方法。

