    # 4. 关闭


    这是最终状态，此时所有持久化数据、视图层级结构、缓存数据等都将从操作系统内存中清除（并且，隐式地，任何不处于`Launched`、`Running`或`Killed`状态的应用程序都将如此）。


    这些状态的含义不言自明。而乐趣的起点在于，是什么促使应用程序在这些状态之间切换——这正是生命周期回调方法的领域。


    ## 理解 Activity 生命周期回调方法


    图 11-1 中展示的每个生命周期方法都具有特定的行为和用途，您应该熟悉它们。您可能不需要立即为应用程序的这些生命周期阶段添加自定义逻辑，但了解在何处添加内容，将为未来作为
    Android 开发者的快速进步奠定基础。我们将逐一讲解每个方法，以突出其具体用途。


    每个方法都具有与其他方法相同的共性，例如，几乎无一例外地，当任何回调方法被调用时，其第一个动作都是调用相应父类中的等效方法。例如，在本书前面的示例中，您会看到
    `onCreate()` 方法的第一个动作是调用 `super.onCreate()`，这会调用父类的对应版本。当您不希望自动调用父类方法时存在例外情况，但我会在遇到这些情况时明确指出。目前，请默认遵循“调用父类”这一良好实践。


    ### `onCreate()`


    每个 Activity 的生命周期都始于 `onCreate()` 方法。无论用户是点击了 Android 主屏幕上的图标来启动您的应用程序，还是配置变更触发了重建显示的需求，`onCreate()`
    都会被调用。该方法接收一个 `Bundle` 对象，用于应对后续的重建情况，因为 `Bundle` 会存储之前的状态、数据以及激活 Activity 所需的资源——这些统称为实例状态。


    对于 Activity 的 `onCreate()` 方法，您应考虑执行以下操作：


    1.  将所有计划使用的布局加载到内容视图中，以便 Android 在 `onStart()` 方法被调用时，能在显示 UI 之前创建好它。

    2.  初始化您在 Activity 类定义中定义的所有 Activity 级别变量。


    您可能还需要做一些工作来使用作为应用程序一部分而创建的全局资源或变量。我们将在稍后讨论 `onRetainNonConfigurationInstance()`
    时，以及在本书本章及后续章节中介绍偏好设置时，探讨更多示例用法，届时再回到全局资源这个主题。


    ### `onStart()`


    一旦 `onCreate()` 完成了从布局定义中构建所有对象以及任何其他初始化工作，`onStart()` 的工作就开始了。`onStart()` 的职责是将最终的
    UI 实际渲染到用户屏幕上。在前面的生命周期模型中，`onStart()` 方法也会在 `onRestart()` 之后被调用。


    您很少需要重写 `onStart()` 并提供自己的逻辑。即使您想这样做，也需要意识到，如果您的 Activity 正沿着 `onRestart()` 路径执行，此时实例状态尚未完全恢复，并且直到随后调用
    `onRestoreInstanceState()` 时才能恢复。


    实现自定义 `onStart()` 重写的一个有用场景是，当您拥有某些长期存在的自定义资源，并且基于 Activity 不可见时，您已经优雅地冻结或暂停了这些资源——做一个好公民，在不需要时就不使用资源。如果您选择设置这样的资源管理，那么
    `onStart()` 方法就是恢复或解冻此类自定义资源的地方。请务必调用 `super.onStart()` 方法来调用父类的等效方法，即使您知道父类中没有重写代码。在这种情况下，Android
    本身仍然需要执行其内部工作。


    ### `onRestoreInstanceState()`


    如果用户通过返回按钮或其他方式结束一个 Activity，从当前 Activity 切换到另一个，则表示他们已结束与原始 Activity 及其所有关联状态的操作。这向作为应用程序开发者的您表明，除了需要维护的长期存在的资源外，您可以丢弃该
    Activity。当 Android 自身终止一个 Activity 时，情况通常不同。Android 终止 Activity 主要是由配置变更引起的，并且它确实需要关心重建该
    Activity 以满足用户需求所需的内容。这意味着不仅要重建 Activity 的视觉显示，还要重建其所有实例状态。


    您可能希望在此处执行任何自定义的实例状态恢复，并请记住，实例状态与长期存储不同。存在其他机制来处理长期存储，包括偏好设置，我们将在本书后面介绍。如果您希望持久化的数据类型比偏好设置系统设计的更复杂或更大，那么文件和数据库等基础计算概念是最佳方法，我们将在第
    18 章中介绍它们。


    ### `onResume()`


    在 Android UI 方面，`onResume()` 方法是关键时刻。`onResume()` 方法是使完全渲染和填充的布局变为可见的关键方法，将所有累积的对象、逻辑等置于前台。`onResume()`
    与 `onPause()` 一起，在 Activity 的生命周期中，进出前台的转换会多次触发，因为其他 Activity 和应用程序会抢占它、获得焦点、被用户关闭等。


    您通常应考虑添加到 `onResume()` 中的唯一逻辑是与改变 Activity 的实时视觉方面相关的，包括：


    1.  动画

    2.  视频

    3.  自定义视图过渡效果


    在所有其他方面，您应避免在 `onResume()` 中添加任何其他自定义逻辑。

    '
- fmt: '# `onPause()`


    Android is designed from the ground up to support many applications running simultaneously
    and relies on applications being able to simply and easily pause their activity
    in order to free resources for other activities that the user has decided to use.
    To support this, applications will frequently move from foreground state to background
    state. Immediately prior to this, the `onPause()` method will be called.


    The most important tasks to consider during the `onPause()` call include saving
    any state not yet placed in the `Bundle` for your activity and taking care of
    any custom animation, video, audio, or other real-time aspects of your logic.
    Additionally, the `onPause()` call also acts as the threshold past which Android
    can unilaterally terminate your activity and reclaim its resources. This means
    that once the `onPause()` call exits, there is no guarantee your process and activity
    will ever receive an event again – so save what you need and don’t assume your
    activity state persists without your intervention beyond this point.


    # `onStop()`


    If `onStart()` governs activities moving to the foreground, you can think of `onStop()`
    as the reverse: in charge of shifting your activity to the background. After `onStop()`
    completes, your activity is no longer visible, even though the related view hierarchy
    and properties remain intact.


    Under Android’s zealous resource management approach, you should always keep in
    mind that `onStop()` may never be called for your activity, so it isn’t wise to
    rely on custom logic here. The one area where you might consider overriding the
    default is for any interaction with an Android service where foreground interactivity
    is not normally required anyway.


    # `onSaveInstanceState()`


    Both the name of the `onSaveInstanceState()` method and its position in the lifecycle
    diagram in Figure [11-1](#499629_1_En_11_Chapter.xhtml#Fig1) give a very good
    indication of its purpose. The role of this method is to save activity state for
    any activity that is about to be destroyed by the `onDestroy()` method, thus avoiding
    the situation where a user finds important state has gone missing without them
    realizing their activity has potentially ended and been recreated. This happens
    frequently under any configuration change event, so the experience for users needs
    to make this transparent and automatic.


    > **Note**

    > There is a trend to start favoring the concept of a `ViewModel` and to save
    any transient state using that technique. However, the `onSaveInstanceState()`
    method is still fully supported. You can read more about ViewModel at `developer.android.com`.


    # `onRestart()`


    The `onRestart()` method is called each time an activity moves from the stopped
    state to the started state. The method gives you the flexibility to handle freshly
    started versions of your activity differently from those that were stopped and
    have now restarted, such as by having a preserved view hierarchy in the restarted
    case that you can leverage to speed up some initialization activity.


    # `onRetainNonConfigurationInstance()`


    This is a very long, strange name for a method, and close inspection of the lifecycle
    diagram shows you it isn’t there either! The reason for this is that `onRetainNonConfigurationInstance()`
    is not strictly tied to an activity’s lifecycle. Rather, its purpose is to provide
    the callback mechanism to invoke whenever an Android system undergoes a configuration
    change.


    “What is a configuration change?” you might ask. There are several prominent actions
    that Android considers a change in the entire device’s configuration that all
    running applications must then be notified about and perform any necessary steps
    to accommodate such a change. These configuration change actions include:


    1.  Rotating the device from landscape to portrait or vice versa

    2.  Connecting the device to a USB power source

    3.  Docking the device in a cradle

    4.  Adding or removing an SD-style storage device

    5.  Changing the input or display language for the Android operating system


    Your activity might need to deal with some or all of these events. The most obvious
    example is needing to redraw (or, strictly, recreate) the layout based on new
    orientation of the device. In these instances, Android will have preserved all
    resources from the prior incarnation of the activity, and a call to the `getLastNonConfiguationInstance()`
    companion method will return a reference to these, enabling you to perform any
    further change handling you might need.


    This approach is less common in contemporary application development, with the
    advent of headless fragments. We will cover fragments next in Chapter [12](#499629_1_En_12_Chapter.xhtml).


    # `onDestroy()`


    We’ve reached the end of the lifecycle methods, and fittingly it is the `onDestroy()`
    method, which itself is all about ending activities. We know that activities are
    cheap and plentiful and should be used and then discarded whenever desired as
    you build your application. The core logic you could consider adding to an override
    of `onDestroy()` is any activity-centric cleanup. As there is no guarantee that
    `onDestroy()` is ever called for your activity, you should not rely on it nor
    expect to interact with other resources or services.


    # Appreciating the Objectives of the Activity Lifecycle


    For new developers, mastering the whole notion of callbacks is crucial to a wider
    mastery of messages and event-based development. However, if you only think of
    your Android applications as activities in certain states, waiting to jump when
    signaled by a callback, you miss some of the bigger ideas at play.


    Overall, the single biggest goal of cheap, easily manipulated activities and the
    neat packaging of callback methods that mean each activity carries its own instructions
    on how to get “there” from “here” is the appearance to your users of one seamless
    application that is responsive to their input and desires. This user-centric view
    is vital to providing a cohesive experience, as your users will tend to think
    of your applications as sets or hierarchies of screens and not as a loose affiliation
    of activities that are created and destroyed easily and often.


    As you start composing applications with ever greater numbers of activities, it
    will serve you well to keep the following principles in mind:


    1.  **Activities should have a focus.** Each activity you create should help serve
    a single (but not necessarily simple) purpose or outcome, rather than being a
    catch-all of unrelated options, actions, and outcomes.

    2.  **Save state, and then save it again.** Users are unpredictable, and they
    will do the darndest things when using your application – everything from shutting
    down the phone to repeatedly switching in and out of your application and beyond.
    To give your users the confidence that your application intuitively handles any
    surprises, it is important to save state often. Think of it as a natural safety
    net that is both cheap and effective.

    3.  **Give every view an ID.** Each widget, each view, and each `ViewGroup` should
    be annotated with an `android:id` attribute. This helps you help yourself, as
    saving instance state becomes so much easier when every view has an ID.

    4.  **Applications and activities can disappear.** There are circumstances beyond
    your control, particularly where no matter how efficient and lightweight you make
    your application, your users decide to install it side by side with other applications
    that are memory hogs and resource villains. If the user pauses your app in such
    an environment, the Android OS could come knocking to kill your running application
    to free up much-needed memory.'
