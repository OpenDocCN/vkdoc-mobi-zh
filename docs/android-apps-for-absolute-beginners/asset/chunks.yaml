  trans: '

    # 下载与安装 HandBrake


    我喜爱 HandBrake 的原因之一，是它支持所有主流操作系统。无论你使用的是 macOS、Windows 还是 Linux，都能在系统上运行原生版本的
    HandBrake。请访问 HandBrake 官网 [`https://handbrake.fr/`](https://handbrake.fr/)，下载适用于你操作系统的软件包或软件包配置。在接下来的示例中，我们将使用
    Ubuntu（Debian）Linux 安装，其中包含配置包管理器以便为你下载 HandBrake 的额外步骤。之后的步骤无论使用何种平台，基本完全相同。


    在基于 Debian 的系统上，按照网站说明将 HandBrake 仓库添加到仓库配置中，然后运行：


    ```

    sudo apt install handbrake-gtk

    ```


    你也可以选择同时安装命令行版本，例如：


    ```

    sudo apt install handbrake-gtk handbrake-cli

    ```


    对于基于 RPM 的 Linux 系统（如 Fedora、CentOS、Red Hat 等），请使用等效的 `yum` 包管理命令。Windows 用户请使用可下载的安装程序来安装
    HandBrake。macOS 用户请下载 HandBrake 的 `DMG` 镜像文件，双击挂载后，将 HandBrake 应用程序拖拽到“应用程序”文件夹中。


    # 运行与使用 HandBrake


    根据你的操作系统启动 HandBrake，你应该会看到如图 14-5 所示的主屏幕。


    ![../images/499629_1_En_14_Chapter/499629_1_En_14_Fig5_HTML.jpg](img/499629_1_En_14_Fig5_HTML.jpg)


    图 14-5 HandBrake 主屏幕


    正如你所料，从主屏幕出发可以探索众多选项。为了演示 HandBrake 的关键功能，我们将选择一个现有的视频文件，将其转码为适用于 Android 的格式。选择文件时，请点击
    HandBrake 窗口左上角的“Open Source”按钮。在我的例子中，我将选择从另一台设备捕获的文件，名为`IMG_9111.MOV`。文件选择器如图
    14-6 所示——如果你按照这些说明操作自己的视频文件，源文件名显然会不同。


    ![../images/499629_1_En_14_Chapter/499629_1_En_14_Fig6_HTML.jpg](img/499629_1_En_14_Fig6_HTML.jpg)


    图 14-6 在 HandBrake 中选择要转码的源视频文件


    HandBrake 最出色的功能之一，是能够自动识别源文件的容器格式、视频和音频的编解码器等信息。无需你指定任何这些输入参数——当然，你也可以根据自己的专业知识在
    HandBrake 中进行覆盖调整。选择源文件后，你的主要任务是指示 HandBrake 将视频转码为基于 Android 支持的编解码器的格式，并将其打包到同样支持的容器格式中。HandBrake
    在这方面表现出色，预装了一系列现成选项，只需点击几下即可满足 Android 要求的格式和编解码器支持。


    要让 HandBrake 使用针对 Android 预配置的目标格式，请点击 `Preset` 字段右侧的右箭头。这将弹出一个包含 `General`、`Web`、`Devices`
    等选项的菜单。选择 `Devices` 子菜单，将显示进一步的子菜单，类似于图 14-7 所示。


    ![../images/499629_1_En_14_Chapter/499629_1_En_14_Fig7_HTML.jpg](img/499629_1_En_14_Fig7_HTML.jpg)


    图 14-7 HandBrake 中 `Devices` 子菜单下的预配置选项


    如图所示，这里为众多设备（不仅仅是 Android 设备）提供了许多预配置选项。我们需要在整体分辨率和帧率之间找到一个良好的平衡，以确保转码后的视频不会过大。在我的示例中，我选择了
    `Android 720p30` 这个预配置选项，它将为我的转码视频自动设置以下属性：


    1.  Android 支持的容器格式：此示例中为 MPEG-4 容器格式。

    2.  Android 支持的视频编解码器：`Android 720p30` 预配置设置使用 H.264 作为视频编解码器。

    3.  Android 支持的音频编解码器：AAC 将被用作音频编解码器。

    4.  分辨率：视频每帧最多允许 720 条“逐行”扫描线（因此简称为 720p）。

    5.  帧率：每秒 30 帧。


    我将指定目标文件来保存转码后的视频，本例中命名为 `IMG_9111.m4v`。点击“Start”按钮开始转码，完成后，HandBrake 会显示一条俏皮的消息，告诉你放下咖啡，因为转换好的视频已经准备好了。在我的例子中，最终产品是一个大小为
    1.1 MB 的视频文件，在 Android 设备上播放时画质依然非常好。这与 14 MB 的原始视频文件相比优势明显。


    # Android 视频进阶


    你可以通过查看本章开头介绍的 `VideoPlayExample` 应用，亲自体验我的示例视频转码效果有多好，以及视频播放的基本机制。我鼓励你在这个示例基础上进一步探索，以了解
    Android 下视频的优势和挑战。首先，尝试替换为你自己的视频，包括你使用 HandBrake 或其他工具编辑和转码的视频。你可以开始用 `VideoPlayExample`
    作为各种视频实验的简易测试工具，自行判断哪些方法适合你的应用。


    第二件事是将 `VideoPlayExample` 改造为使用 URI 并流式传输其源文件。你可以从第 [13](https://www.beginningandroid.org/)
    章的音频流式传输示例中复制相关逻辑，或访问本书网站 [`www.beginningandroid.org/`](http://www.beginningandroid.org/)
    获取更多视频流播放的示例代码。


    # 本章小结


    在本章中，我们介绍了 Android 应用的视频世界，并展示了如何为你的应用添加基本的视频播放功能。你还了解到，在开发者工具包中添加其他视频编辑和创作软件，将极大地扩展你使用视频的能力。


    # 15. 通知简介


    几乎历史上所有的操作系统都发明了一种机制来提醒你注意有趣、重要或紧急的信息。从“点赞”统计到电量不足警告，通知几乎是所有设备体验中无处不在的一部分。Android
    提供了一个现代化的通知生态系统，并通过其通知框架中的一些非常实用的功能，将基础知识进一步拓展。


    从手机到平板电脑再到车载娱乐系统，每台 Android 设备都拥有一系列通知机制，我们将在本章中对此进行探讨。如果你使用过 Android 设备，你应该对出现在屏幕顶部或锁屏上的托盘图标很熟悉。你可能也见过弹出式对话框通知，它们各有优缺点。


    除了软件的通知功能之外，Android 还提供了各种硬件选项来协助通知的处理。无论是通过震动来增强传入通知的提示效果，还是通过触觉反馈来确保用户得到即时的触感回馈，Android
    都通过一个全面的框架，为你的通知需求提供了统一的解决方案。

