    # 意图与广播接收器


    在第 17 章中，我们介绍了 Android 在应用程序间通信的基础方法，即通过意图和广播接收器机制。如文中所述，你通过从代码中广播意图的示例进行了实践。服务也同样可以自由使用这种方法！


    在实际应用中，你可以通过在客户端应用中使用 `registerReceiver()` 方法注册一个 `BroadcastReceiver` 对象来利用意图和接收器，并用它来捕获服务中组件特定的广播，这在你记录服务指令时是必需的，这样客户端就能正确识别广播意图并按需处理它们。


    采用意图方法有其优势，但也存在一个缺点，即意图必须面向操作，而非依赖某个活动主动执行操作。你还需要假设客户端活动本身仍在运行并持有其接收器，且未因资源压力或其他设备事件而被暂停或选中终止。


    ## 使用 PendingIntent 对象


    Android 提供了 `PendingIntent` 对象，用于发出带有需要执行的关联操作的意图。当涉及到服务时，客户端会在服务执行完工作后调用 `onActivityResult()`
    来处理后续逻辑。客户端通过 `startService()` 调用能够携带额外负载的能力，将 `PendingIntent` 对象传递给服务，然后服务通过调用其
    `send()` 方法来向客户端发送信号。


    要使这种方法行之有效，还需要额外的工作，因为你需要编写客户端代码来解释和识别使用了哪种 `send()` 方法调用。


    ## 使用 Messenger 和 Message 对象


    如果 `PendingIntent` 对象作为替代方案还不够用，Android 还提供了 `Messenger` 对象用于跨上下文通信，例如从服务到活动。每个活动都带有一个
    `Handler` 对象，该对象可用于活动自身发送消息。然而，`Handler` 并不暴露给活动到服务或活动内部交互。这时 `Messenger` 对象就能解决问题了。它可以向任何
    `Handler` 发送消息，因此可以用来弥合差距并到达任何活动。


    要使用 `Messenger` 对象，你需要在调用服务之前，将其作为额外数据添加到意图中。服务以典型方式接收意图，并可以提取出 `Messenger` 对象。当需要与客户端通信时，服务应创建并填充一个
    `Message` 对象，然后调用 Messenger 的 `send()` 方法，将该 Message 作为参数传回给客户端。在客户端，你通过 Handler
    及其 `handleMessage()` 方法来接收该消息。


    虽然这在概念上非常简洁，但需要额外的步骤来创建和交换 `Messenger` 和 `Message` 对象。同时，还可能存在潜在的性能影响，因为你必须在活动的主应用线程中处理
    `handleMessage()` 方法——因此请确保此类处理保持轻量级！


    ## 使用独立消息传递


    除了我们在前面章节中介绍的各种 Android 原生及设备内方法之外，你还可以通过外部消息传递或发布/订阅系统来处理服务到客户端的通信。随着 Google
    Cloud Messaging 及其类似产品开发出越来越多有用的功能，这种方式越来越受欢迎。当你的用例能够容忍异步消息传递时，通常就是采用这种第三方方法的最佳时机。


    有关 Google Cloud Messaging 的更多详细信息，请查看开发者网站上的文档：[`https://developers.google.com/cloud-messaging/android`](https://developers.google.com/cloud-messaging/android)。


    ## 创建回调和监听器


    前面章节中的 `Messenger` 和 `PendingIntent` 示例展示了将对象附加到传递给服务的意图附加数据中是多么容易。使用这种方法要求你的对象是“`Parcelable`”的，你可以创建自己的对象来满足此需求，包括你自己的回调或监听器。


    采用这种方法需要你定义监听器对象，并在运行时让客户端和服务代码在需要通信时部署和释放监听器。你还需要负责注册和撤销监听器，以免留下任何孤儿监听器及其随之而来的资源浪费/损耗。


    ## 使用通知


    服务本身没有直接的 UI，但它可以与其他应用程序的 UI 进行交互。回顾我们在第 15 章中介绍的通知主题，你可以看到服务如何利用这一点来直接向用户呈现信息和响应。


    # 服务实战


    我们已经介绍了服务的诸多方面、客户端通信以及 Android 中的整体行为，现在是时候构建并运行你自己的示例服务和客户端应用了。为了提供一个有用且不会占用整章篇幅的示例，我们将创建一个简单的照片分享服务和简单的客户端示例，将服务理论付诸实践。这不会是一个
    Instagram 或 Flickr 的克隆——目标是简洁，以便你能专注于设计服务。


    ## 选择服务设计


    一个简单的照片分享应用程序是使用 `startService()` 服务交互模型的完美场景。我们将向服务发送一条“请分享这个”的指令，并且不需要进行任何需要绑定服务的后续操作。我们将从基础的
    `Service` 类派生我们的服务，然后实现 `onStartCommand()` 方法和 `onBind()` 方法（即使我们的示例客户端未使用它，我们仍需要这样做来正确扩展
    `Service` 基类）。


    我们本可以选择另一个 `Service` 子类，例如 `IntentService`，它为你处理了许多实现细节，例如干净地调用 `stopService()`、`startService()`
    等，但由于我们不需要这些辅助功能中的某些部分，我们将坚持使用前面的方法。特别地，我希望服务在 `startService()` 调用之后继续运行，以便我们以后如果需要可以停止分享。


    你选择分享哪些照片对于示例来说并不重要，因此我在示例中对此进行了模拟。如果你愿意，可以自行修改并添加图片或其他资源。


    ## 创建服务的 Java 逻辑


    `ServiceExample` 的实现相当直接，重点关注对基础 `Service` 类预期重写实现的核心部分，再加上我为照片分享自定义的服务特定逻辑。清单
    18-3 显示了 `ch18/ClientExample` 示例中的完整服务实现。

    '
