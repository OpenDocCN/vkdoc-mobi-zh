  trans: "\n# 使用构建工具进行构建\n\n如前文所述，`Gradle` 是 `Android Studio` 所使用的构建工具，负责将 Android\
    \ 应用的所有部分整合起来并生成最终产品。`Gradle` 还拥有大量的选项配置，这些配置足以（实际上也确实）写成整本书。我鼓励你去探索 `Gradle`\
    \ 的各种选项，以便在构建 Android 应用时发挥出更强大的能力。以下是三个快速入门技巧，可以帮助你开始探索并找到更多内容。\n\n## 更新你的 `gradle.properties`\
    \ 文件\n\n不要害怕打开项目的 `gradle.properties` 文件并查看其中的设置。默认文件中有很多解释性注释，你可以放心地进行尝试。例如，你会看到一条用于设置\
    \ Java 虚拟机内存的条目，如下所示：\n\n```\norg.gradle.jvmargs=-Xmx2048m\n```\n\n尝试将该值改为 `Xmx1024m`，看看这对构建时间有何影响——你实际上是将\
    \ JVM 的可用内存减半了。如果你的内存充足，可以试试 `Xmx4096m`，给 JVM 分配双倍于默认值的内存，看看是否能加快构建速度。随着你对 Gradle\
    \ 配置了解的加深，请重新查看你的属性文件，将所学知识应用其中。\n\n## 使用 Gradle 命令行\n\n`Gradle` 的许多功能都已巧妙地集成到\
    \ `Android Studio` 中，并在你执行各种操作时触发。但你的项目中还会有一个名为 `gradlew` 的 `Gradle` 命令行工具。它位于项目的根目录中。如果你在那里打开一个\
    \ shell 或命令提示符，并运行以下命令行可执行文件：\n\n```\n./gradlew\n```\n\n你会看到一个有用的列表，列出了 `Gradle`\
    \ 可直接使用的命令行选项和工具。你还可以运行：\n\n```\n./gradlew --help\n```\n\n来获取所有命令行选项和工具的详尽列表。首先值得探索的一个非常有用的选项是性能分析选项，它可以查看构建应用程序时哪些操作耗费了时间。调用它并查看结果，如下面的代码清单\
    \ 6-1 所示。\n\n```\nWelcome to Gradle 6.1.1.\nTo run a build, run gradlew  ...\n\
    To see a list of available tasks, run gradlew tasks\nTo see a list of command-line\
    \ options, run gradlew --help\nTo see more detail about a task, run gradlew help\
    \ --task \nFor troubleshooting, visit https://help.gradle.org\nBUILD SUCCESSFUL\
    \ in 24s\n1 actionable task: 1 executed\nSee the profiling report at: file:///Users/alleng/AndroidStudioProjects/MyFirstApp/build/reports/profile/profile-2020-09-01-10-08-13.html\n\
    A fine-grained performance profile is available: use the --scan option.\n代码清单\
    \ 6-1\n从命令行调用 Gradle 性能分析\n```\n\n`Gradle` 已生成一份 HTML 格式的报告，并将其放置在输出中所示的文件路径下。在你选择的浏览器中打开该文件，即可看到\
    \ `Gradle` 关于项目构建时间的分析结果，如图 6-4 所示。\n\n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig4_HTML.jpg](img/499629_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4\n\n`Gradle` 性能分析报告\n\n## 访问 `gradle.org` 了解更多\n\n网上有大量关于 `Gradle` 的丰富信息，其项目主页是一个很好的起点。一旦你体验到它的强大功能，你会发现它将成为你的常用工具之一。\n\
    \n# 使用源代码管理来管理代码\n\n许多严肃的开发者面临的另一个重要领域是如何随着时间的推移管理他们的源代码、项目以及相关资源。源代码管理（也称为版本控制）是指利用一个专门的数据库，该数据库擅长管理基于文件的软件源代码——它能同时解决两个大问题。首先，随着你的开发工作增多，你最终可能会拥有数十个甚至数百个项目，每个项目都有大量的文件和相关资源，正如你在第\
    \ 4 章中所见。源代码管理系统使得管理这些文件集变得简单得多，并且可以作为你编码工作的可靠备份和真实来源。源代码管理的第二个好处是它为你提供了自由，让你可以试验、更改代码，甚至犯错误，并在需要时回退到早期版本（通常是曾经可用的版本）。\n\
    \n`Android Studio` 开箱即用地提供了对三种不同系统的直接集成支持：`Git`、`Mercurial` 和 `Subversion`。每种系统在开发者社区中都有一定的人气，如果你有偏好的系统，可以继续使用它。要为你的项目启用源代码管理集成，请打开\
    \ `Android Studio` 中的 `VCS` 菜单，并选择 `启用版本控制集成` 选项。它将弹出如图 6-5 所示的对话框，供你选择所需的版本控制选项。\n\
    \n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig5_HTML.jpg](img/499629_1_En_6_Fig5_HTML.jpg)\n\
    \n图 6-5\n\n启用源代码管理\n\n启用源代码管理后，你会在 `VCS` 菜单以及任何项目视图的上下文菜单中看到更多可用选项。当你首次尝试使用某个功能时，例如导入一个\
    \ `Git` 分支或从 `Subversion` 签出项目，系统会提示你输入访问所选系统所需的 URL 和凭据。之后，你便可以使用图 6-6 菜单中显示的一系列功能。\n\
    \n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig6_HTML.jpg](img/499629_1_En_6_Fig6_HTML.jpg)\n\
    \n图 6-6\n\n`VCS` 菜单中启用的源代码管理功能\n\n源代码管理是一个庞大的主题，正如你已经猜到的，有大量专门的书籍和资源介绍这些工具。如果你是源代码管理工具的新手，我建议你访问\
    \ [`https://git-scm.com/`](https://git-scm.com/)、[`www.mercurial-scm.org/`](http://www.mercurial-scm.org/)\
    \ 或 [`https://subversion.apache.org/`](https://subversion.apache.org/) 来开始使用 `Android\
    \ Studio` 原生支持的任何一种系统。\n"
- fmt: '# Completing Your Software Repertoire


    As well as the tools and complementary systems for Android Studio I’ve already
    mentioned in this chapter, there are additional tools you might need or want in
    order to build various extra resources for your development. This can include
    things like images, animation, sound recordings, music, and more.


    There are a lot of commercial tools that serve these purposes, and you may already
    know and use some of them. I’m going to highlight some key open source tools,
    which are strong competitors and in some cases leaders in their respective fields.
    I am a strong advocate for open source, which is why I tend to prefer open source
    tools where possible. You might not share that perspective, but the list that
    follows will outline what is available, even if you choose commercial alternatives.


    Open source tools you should consider for your development environment include


    **Blender** : For the top tool in all of 2D and 3D animation, you need look no
    further than Blender. It has a massive following in professional and amateur circles,
    is used in industries such as movies and TV, and is breathtakingly capable for
    almost any animation development you might have in mind. Find out more at [`www.blender.org`](http://www.blender.org).


    **GIMP (GNU Image Manipulation Program)**: A well-known image editing and manipulation
    tool, GIMP usually finds equal amounts of love and hate depending on who you ask.
    It is very capable for many common tasks, such as resizing, scaling, cropping,
    red-eye reduction, layer development/flattening, and more. Those who don’t love
    it usually point to Adobe Photoshop as the gold-standard commercial product. These
    people aren’t wrong – Photoshop is truly comprehensive and capable. But for an
    open source alternative, give GIMP a try ([`www.gimp.org`](http://www.gimp.org)).


    **Inkscape** : Vector graphics can become a very large part of your Android development
    world, particularly if you venture into game development. Inkscape is a fantastic
    open source vector graphics program with a long history. Again, there are those
    who do say various commercial packages are better – and they might be right. Learn
    more about Inkscape at [`https://inkscape.org`](https://inkscape.org).


    **Audacity**: Another application considered one of the best in its field, Audacity
    is one of the premier multi-track audio editing suites and supports all popular
    operating systems. Find Audacity at [`www.audacityteam.org/`](http://www.audacityteam.org/).


    **LAME**: One of the original audio tools (and one that is embedded in many other
    tools mentioned in this chapter), LAME is a command-line tool and embeddable library
    that performs MP3 encoding of audio from a variety of sources ([`https://lame.sourceforge.io`](https://lame.sourceforge.io)).


    **OpenShot** : One of many open source video (and audio) editing suites, OpenShot
    has some great features including curve-based key frame animations, advanced timeline
    and frame-by-frame features, and cross-platform support. More details at [`www.openshot.org`](http://www.openshot.org).


    **Olive** : Another video editing tool, with an avid following ([`www.olivevideoeditor.org/`](http://www.olivevideoeditor.org/)).


    **DaVinci Resolve** : Another immensely powerful video editing tool, which currently
    has the claim to fame of being one of the few tools to support very high-resolution
    video up to 8k. It also has strong support for collaboration across multiple users
    working on the same video projects. Learn more at [`www.blackmagicdesign.com/`](http://www.blackmagicdesign.com/).


    You will see some of these tools in action in Part 3 of the book, when we work
    with images, sound, video, and other resources in Android applications.


    # Summary


    As you can see from the topics covered in this chapter, thinking through your
    hardware and software landscape can greatly aid you in your journey to becoming
    a dedicated Android developer. There is one more software topic that should be
    covered – Java and the JDK. This is a topic with literally hundreds of books written,
    and while we don’t have that much space, we will devote an entire chapter to Java,
    starting on the very next page in Chapter 7!


    # Part II Get the Android Development Know-how


    # 7. Introducing Java for Android Development


    In this chapter, we’ll explore how to get started with Java for developing Android
    applications, with a particular focus on how to tackle a topic as massive as Java
    without getting discouraged or daunted by its size. Those of you who already have
    some familiarity with Java development can skim most of the content, but there
    are some key points on Android specifics that I will recommend any reader review.


    Learning Java to an expert level is a huge endeavor. Even learning it to a “happy
    beginner” level would take far more than a single chapter in this book or even
    a whole book in its own right. Literally “thousands” of books have been written
    on Java and its many aspects. Instead of providing an incomplete and ultimately
    less-than-useful introduction, we will focus on three key preparatory points to
    launch you on the path to learning Java with tools and resources beyond this book.


    First, we’ll review Java from a software perspective, including the Java Development
    Kit (`JDK`) and Java Runtime Environment (`JRE`), and the peculiarities of Android’s
    use and adoption of Java’s virtual machine environment – `JVM` – including its
    promise to enable run-anywhere software and the long history of Java versions.


    Second, we will dive into a basic pure Java application that you can run on any
    machine with Java, starting you with one or two parts of the basics as a point
    from which to expand your understanding of Java and how that does (and doesn’t)
    translate to Android applications.


    Finally, we’ll cover the key areas or themes in Java you should look to learn
    over time and links to some of the best free and commercial resources available
    to carry on your journey after this chapter.


    ## Other Development Language Choices For Android


    Java has a long history with Android being (equal) first choice as the development
    language when Android launched. But it is not the only language supported for
    developing applications. Along with Java, Android has supported a “Native” form
    of development with C++ from its early days, via the “Native Development Kit,”
    or `NDK`. In 2016, Google took the plunge and added Kotlin to the stable of supported
    languages and as of last year decided Kotlin would be the new first-choice language.
    Java is still the leading language in Android development in terms of application
    use, at nearly 90%. But many new applications mix Kotlin and Java or opt just
    for Kotlin. You can learn more about Kotlin development for Android in Apress’
    *Learn Kotlin for Android Development* (Späth, ISBN 9781484244661).'
