  trans: '

    ### 整合所有配置！


    在搭建开发环境时，还需考虑以下其他方面：


    1.  **键盘和鼠标**：这看似平常，但你会大量使用这些外设。不要将就不喜欢的设备！


    2.  **USB 端口与数据线**：如果你计划通过连接安卓设备进行大量应用测试，那么配备充足的 USB 端口、数据线以及合适的转接头是值得的。大多数较旧的安卓设备使用
    micro-USB 接口，而较新型号已转向 USB-C 接口。


    3.  **充电线、底座和设备**：同样，如果你计划使用大量实体安卓设备，保持它们的电量充足会变成一项琐事。虽然可以通过连接开发机的 USB 接口充电，但旧版
    USB 协议能提供的电力有限。直到 USB-C 出现，“标准” USB 才能提供超过 500 mA 的电流。尽可能腾出空间，并考虑使用可直接插入墙插的充电器。


    这些要点很容易被忽视，但它们能让你的开发体验更顺畅、更愉快；反之，如果忽略它们，你会发现这些细节会带来摩擦和挫败感，破坏你最好的努力。


    ## 测试手机和平板


    在开始讨论测试手机话题之前，我想先说明一点：并没有硬性规定要求你必须拥有实体安卓手机来测试你的应用。许多应用完全是基于模拟环境（例如 AVD 等）进行构建和发布的。


    然而，许多应用是基于在多种安卓设备上进行真实世界测试和反馈而构建的，这些设备的特殊之处和差异会在真实场景中被发现并处理。而且差异确实存在！虽然安卓 SDK
    和安卓核心平台功能（几乎）是通用的，但手机厂商和电信公司调整及修改安卓默认行为的方式数不胜数。通常，这些“电信公司”这样做是为了试图使自己与其他手机公司区分开来，或者从更
    cynic 的角度来看，他们试图将自己置于一个让用户觉得他们比实际更重要位置。


    无论原因如何，在你安卓开发之旅的某个时刻，你都会问自己是否需要花钱购买不同的安卓手机来测试你的应用。我无法给你一个明确的答案，但我可以提供一些建议，帮助你决定在购买测试手机这件事上投入多少宝贵的时间和金钱。


    ### 选项 1：全虚拟测试


    在你的开发之旅初期，坚持使用安卓虚拟设备是一个完全可行的策略。坦白说，这对许多成功的开发者来说，就是贯穿整个职业生涯的方法。随着每个版本的 Android
    Studio、安卓 SDK 以及来自 Intel 等其他厂商的支持工具的发布，选择这条路径，不在专用测试硬件上花费额外的时间或金钱，变得越来越可行。


    其缺点在于，你有时难以复现真实世界的体验，例如准确评估应用的真实性能，并且可能成为我之前提到的电信公司引入的“特殊功能”的受害者。


    ### 选项 2：虚拟起步，辅以顶级设备


    将广泛使用 AVD 与有选择地补充一些关键硬件设备相结合的混合方法恰好是我的偏好。这有几个原因：


    1.  使用 AVD 越来越有效，如前文选项 1 所述。


    2.  市场的一大部分份额仅由一个厂商占据：三星。购买一台（或几台）三星设备，就能让你接触到全球大部分正在使用的真实安卓设备。


    3.  谷歌自己已经推出了几代原生安卓设备，先是 Nexus 系列，最近是 Pixel 系列。拥有一台这样的设备，你就能看到应用在未经过电信公司“魔改”的设备上的外观和表现。


    如果采用这种方法，购买少量手机就能让你在相当数量的潜在用户所拥有的真实设备上测试体验。


    ### 选项 3：买，买，再买点


    尝试测试所有极端情况、怪癖、异常行为和 bug 的选项吸引着一些开发者。要在安卓领域做到这一点，需要极大的耐心，更重要的是，雄厚的财力！你很容易就能积攒数十台、几十台甚至上百台设备，但仍然无法覆盖所有那些奇怪的设备——以及它们奇怪的问题——你的用户可能会在现实世界中遇到这些问题。到那时，你的银行余额可能也会显示出一些奇怪的问题！


    我不推荐这种方法，但我承认我的安卓开发和应用程序并没有深入到那些会暴露大量此类问题的高要求领域。我尝试积累测试设备库的成果如图 6-3 所示。


    ![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig3_HTML.jpg](img/499629_1_En_6_Fig3_HTML.jpg)


    **图 6-3** 我的安卓设备收藏，跨越了十多年的安卓历史


    我止步于 20 多台设备，我的银行余额因此感谢我！


    ### 选项 4：他人的硬件


    关于云计算，我最喜欢的一个笑话是：它只是在别人的硬件上运行你的代码。如果你理解我的日常工作是什么，这个笑话会更有趣！然而，幽默背后是一个有用的见解：在实体设备上测试你的安卓应用，最好是由别人来负责拥有和提供这些设备。


    在本书写作时，已有多种商业选择，可以让你在一批你无需自行购买的实体设备上测试你的应用。你以服务的形式租赁或付费使用这些设备，便能获得在多种手机上测试的所有好处，而无需承担购买它们的前期成本，也无需承担维护它们的后续成本。


    要详尽列出此类服务超出了本书的范围，但以下是当今商业供应商提供的主要选项，你可以从中进一步搜索其他竞争选项：


    1.  **AWS Device Farm**：来自云计算巨头亚马逊——AWS Device Farm 应运而生。亚马逊提供来自众多制造商的约 400 种不同设备的访问权限，并配有实用工具，可直接在浏览器中管理测试工作负载。更多详情请访问
    [`https://aws.amazon.com/device-farm/`](https://aws.amazon.com/device-farm/)。


    2.  **Google Firebase Test Lab**：谷歌提供的远程访问多种安卓设备的方案（它们也包含对各种苹果 iPhone 和 iPad 的访问权限）。谷歌还提供了一些优秀的附加工具，用于
    UI 测试以及在其设备集群上自动化运行测试。更多详情请访问 [`https://firebase.google.com/docs/test-lab/`](https://firebase.google.com/docs/test-lab/)。


    3.  **Samsung Remote Test Lab**：作为安卓设备领域的巨无霸，三星是测试应用的明显选择。三星远程测试实验室几乎提供了他们制造过的所有设备，并配有便捷工具，这应该是你测试即服务（testing-as-a-service）候选清单上的首选。更多详情请访问
    [`https://developer.samsung.com/remote-test-lab`](https://developer.samsung.com/remote-test-lab)。


    还有其他商业服务可用，以及从世界各地安卓开发者社区共享或借用设备的选项。请将以上内容视为一个起点，而非最终指南。

