    as (optional) parameter. In practice this approach is a long-term style in many
    programming languages, where parameters (or arguments) can be passed to a program
    when it first runs, to be used for any purpose the developer has in mind, such
    as to turn options on or off in the program or seed it with key startup data.


    We then define and create an object named `console` (in lowercase), based on the
    `Console` object provided by the `System.console()` method , which itself is one
    of the utilities we have access to, thanks to importing the `java.util` library.
    That method hides away a whole host of operating system interaction between the
    `FirstJavaDemo` program and the JVM to hook up your program to a console – which
    is typically a shell or command prompt window or a similarly styled part of a
    more complex program like the console window in the Android Studio IDE.


    Key Concepts: Data Types and Variables


    This example of a Console object and a working copy or container named “console”
    introduces two of the fundamental aspects of almost all programming languages,
    including Java. These concepts are variables and data types.


    A variable can be thought of as a container or a placeholder for some as-yet unspecified
    value – just as in high school mathematics or algebra. In Java, a variable is
    first defined in such a way as to identify the kind of information it will contain,
    known as its data type.


    A data type in Java is a specification of the kind of information or data used
    for a variable or in other circumstances. Data types come in two forms: The first
    are very simple data types known as primitives, which represent simple integer
    or floating-point numbers in several forms – int, short, long, float, and double
    – as well as simple character text known as char and boolean, which represents
    true or false values.


    The second kind of data type is a more complex object, such as in our Console
    case. You can think of this more complex kind of data type as a compound collection
    of multiple primitive data types and the predefined logic that can be used to
    work with that data. This is the essence of a class in Java and other object-oriented
    programming languages.


    Sometimes creating a console will fail for strange reasons – permissions issues
    are an example. We use Java’s If-Then logic to introduce a logic test, represented
    by the `==` sign, to determine if our `console` exists or is undefined – `null`
    in Java parlance. If the `console` is undefined, we use the `System.out.println()`
    method that we have access to, thanks to the import of the `java.io` library,
    and write out some helpful literal string text that is meaningful to a human who
    might read it. We then exit the program at that point using the `System.exit()`
    method.


    Key Concept: Branching and Looping Structures In Java – If, While, For


    The code in Listing [7-1](#499629_1_En_7_Chapter.xhtml#PC3) shows one of the main
    logic control structures in Java – the If statement. There are several other such
    structures that allow you to make decisions in your code based on testing a value
    and deciding on a suitable branch of logic or repeating actions based on testing
    a value until a condition changes. As well as the If statement, Java provides
    the For loop, the While loop, and the Do While loop. Each of these latter structures
    has many nuances, which we will explore later in this book, but about which you
    can learn more at [`http://en.wikibooks.org/wiki/Java_Programming/`](http://en.wikibooks.org/wiki/Java_Programming/).


    In the far more reliable and common scenario that all was well with creating the
    `console` object, we then use the `System.print()` method to print the text of
    a question in the console and the `System.readln()` method to accept a response
    typed by you and store that in a `String` variable named `something` we have defined
    as a place to hold your input text. Finally we use `System.println()` again with
    some `String` concatenation features provided by the `+` operator to respond to
    you.


    That short description should help you understand what the `FirstJavaDemo` app
    does, but does not really give you a deep feel for the Java syntax, structure,
    or rules beyond a very cursory level. We’ll build your understanding further in
    a moment. For now, let’s practice compiling and running this program.


    To compile the program, open a shell or command prompt, and if desired change
    directory to the JDK as noted earlier for your operating system. Note where on
    disk you have placed the `FirstJavaDemo.java` file from `Ch07/FirstJavaDemo.zip`.
    Then invoke the `javac` binary, passing it the full path and filename for `FirstJavaDemo.java`,
    for example, as follows on macOS or Linux:


    ```

    $ javac /FirstJavaDemo.java

    ```


    You should, after a brief moment, see the command or shell prompt return to your
    control. So what happened? The `javac` utility has processed the source code and
    generated an intermediary version of your code that the JVM can now understand
    and run. In your directory, you should see a new file, named `FirstJavaDemo.class`,
    which is the output of the `javac` command.'
