    and [11](#499629_1_En_11_Chapter.xhtml) when we delve into the depths of user
    interface design. For now, you can scroll back to the top of the device definition
    list and choose the Pixel 2 pre-configured device definition. Click the Next button,
    and you should see the System Image selection screen shown in Figure [3-5](#499629_1_En_3_Chapter.xhtml#Fig5).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig5_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    The AVD System Image selection screen in AVD Manager


    Choosing a system image can be considered the complementary step to your earlier
    choice of device definition. Whereas your device choice selected the hardware
    aspects of your AVD, the system image determines the key software aspects: Android
    API/SDK level and ABI, which is basically a decision of which chip architecture
    to emulate in software, Intel’s x86 or one of the Arm-based architectures, and
    which release of Android these pieces most closely match.


    Android Software Development Kit: A Second Look'
  trans: '

    # 创建你的第一个安卓虚拟设备


    在 Android Studio 集成环境中，最实用的功能之一就是能够创建安卓虚拟设备（AVD）。借助 AVD，你可以模拟真实的安卓设备，控制其多种功能和特性，而无需拥有实体物理设备。


    AVD 方法并非要阻止你使用真实设备来测试和运行应用，但如果你回想一下在前两章中提到的种类繁多的安卓设备、版本和外形规格，你就会明白，作为开发者，要拥有市面上正在运行的安卓设备中的一小部分都是不切实际的。AVD
    帮助你弥合了你所拥有（且能负担得起）的设备与你用户群实际将使用的设备之间的差距。


    要开始创建你的第一个 AVD，请启动 Android Studio（如果尚未启动），你会看到启动画面，然后是“欢迎使用 Android Studio”界面，正如你可能在第
    2 章中记得的那样。在欢迎界面的右下角，你应该会看到一个齿轮图标和菜单选项 `Configure`，点击它即可显示一系列配置选项，如图 3-1 所示。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig1_HTML.jpg](img/499629_1_En_3_Fig1_HTML.jpg)


    图 3-1


    来自“欢迎使用 Android Studio”界面的配置菜单


    你会看到配置项列表中的第一个选项就是 `AVD Manager` 选项。点击此选项，`AVD Manager` 将在几秒后启动，并显示如图 3-2 所示的
    Android Virtual Device Manager 介绍界面。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig2_HTML.jpg](img/499629_1_En_3_Fig2_HTML.jpg)


    图 3-2


    Android Virtual Device Manager 欢迎界面


    在屏幕中央，你应该会看到一个按钮，如图 3-2 所示，上面写着 `+ Create Virtual Device...`。请继续点击该按钮，开始 AVD 创建过程。然后你会看到虚拟设备配置硬件选择界面，如图
    3-3 所示。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig3_HTML.jpg](img/499629_1_En_3_Fig3_HTML.jpg)


    图 3-3


    用于创建新 AVD 的“选择硬件”选项


    硬件选择界面上有很多内容，但不要感到不知所措。这里的众多选项反映了你在现实世界设备中会发现的变量，所以这并不奇怪。让我们逐一浏览这些区域，以便你开始熟悉 `AVD
    Manager` 以及创建和使用 AVD。


    从硬件选择界面的左侧开始，“类别”列表提供了基于外形规格和使用模式的设备模拟器分组。你至少应该看到图 3-3 中显示的五个常规选项：电视、手机、Wear OS（原
    Android Wear）、平板电脑和汽车。你可以随意点击每个选项，看看设备列表（屏幕中央）和尺寸详情窗口如何变化，但完成后，请选择“手机”作为类别。选中“手机”后，你应该会看到最初在图
    3-3 中显示的预打包模拟设备列表。


    此时，我们不会急于选择列表中第一个设备作为我们 AVD 的基础。相反，花点时间滚动浏览列表，并留意一些数据点，这些数据点将在本书后面再次出现，并且会逐渐变得更加有意义，对你的应用程序设计产生更大的影响。


    从设备定义列表的顶部开始，你会看到智能手机的品牌和型号，其中一些可能非常熟悉。各种 Pixel 选项，如 Pixel 3、Pixel 2 等，以及 AVD
    镜像都尽可能模拟了那些名称对应的真实物理设备。同样，Nexus 6、Nexus 5 等也是模拟其同名设备物理特性的虚拟设备，无论是板载存储、运行内存、屏幕分辨率还是其他功能。在滚动查看列表其余部分之前，先看一下
    `Resolution` 和 `Density` 列中显示的值。你会看到两者的度量值：分辨率以像素布局表示（例如，Pixel 2 AVD 的 1080 `×`
    1920），密度以每英寸点数或 dpi 表示（再次以 Pixel 2 为例，420 dpi）。你可能对笔记本电脑或台式电脑屏幕的分辨率和密度度量很熟悉，因此不会对你在这里看到的数值多加思考。但是，值得将这些值与列表中的其他
    AVD 进行比较。


    如果你继续向列表底部滚动，将开始看到一系列更晦涩的设备名称，如图 3-4 所示。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig4_HTML.jpg](img/499629_1_En_3_Fig4_HTML.jpg)


    图 3-4


    更多可用的 AVD 模板


    这些设备没有关联任何品牌名称，但它们通过使用通常与各种屏幕尺寸和分辨率相关的缩写，提供了一些关于其功能特性的指示。我们将在本书中频繁遇到这些术语，所以现在你可以先记住诸如
    QVGA、WQVGA、mdpi、hdpi 等名称，而不用费力去理解它们的含义。


    好像所有这些当前和历史上的选项还不够，你会看到设备定义列表下方有两个按钮，允许你指定自己的自定义虚拟设备配置文件，以及从其他来源导入配置文件。就我们的目的而言，这些选项并不需要，但你可以体会到它们提供的价值——特别是对于那些最终可能想要针对非常特异的非典型设备设计应用程序的人来说。


    我们将在第 9 章、第 10 章和第 11 章中深入探讨用户界面设计时，重新审视安卓设备分辨率和密度的概念和原理。现在，你可以滚动回到设备定义列表的顶部，选择预配置的
    Pixel 2 设备定义。点击“下一步”按钮，你应该会看到如图 3-5 所示的系统镜像选择界面。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig5_HTML.jpg](img/499629_1_En_3_Fig5_HTML.jpg)


    图 3-5


    `AVD Manager` 中的 AVD 系统镜像选择界面


    选择系统镜像可以被视为与你之前选择设备定义互补的步骤。你选择的设备决定了 AVD 的硬件方面，而系统镜像则决定了关键的软件方面：安卓 API/SDK 级别和
    ABI，这基本上是在决定要在软件中模拟哪种芯片架构——Intel 的 x86 还是基于 Arm 的架构之一，以及这些组件最匹配哪个安卓版本。


    # 安卓软件开发工具包：再看一眼

    '
- fmt: '# 排版后的文本


    在[第2章](#499629_1_En_2_Chapter.xhtml)中，我介绍了`SDK`（软件开发工具包）这个术语。虽然很容易将其理解为“一个帮助我开发软件的套件”，但有必要回顾一下`Android
    SDK`真正提供的内容。首先，`Android SDK`是一组软件库，这些是访问任何 Android 智能手机及其操作系统功能和能力的基本工具。你可以将`SDK`视为一个杠杆，它让你能够将
    Google 内置于 Android 中的所有功能和能力运用到自己的应用中，而无需从头开始构建一切。


    `Android SDK`——每个 Android 版本都有对应的后续版本——提供了与`Android Studio`的连接，让你能够轻松调用 Android
    行为；构建工具，让你能够将代码转换为可运行的 Android 程序；平台工具，让你能够管理仍处于开发阶段并以“草稿”形式运行的应用程序，包括用于从仍在开发中的代码控制模拟器或真实设备行为的`adb`（Android
    调试桥）；等等。哦，`SDK`还提供了模拟器框架和设备模拟本身！


    根据你之前是否在你选择的计算机上使用过某个版本的`Android Studio`，或者之前是否完成过此向导，你可能会看到列出的发布名称（如`R`或`Oreo`），名称旁边可能带有下载链接，也可能没有。简而言之，如果系统映像已存在于你的机器上，则不会显示下载链接。如果尚未在你的机器上使用过，则会显示下载链接，你可以直接从系统映像步骤点击它来获取相应的系统映像。


    你需要至少有一个系统映像供你的`AVD`使用，因此如果你只看到带有下载链接的系统映像名称，则应选择下载最新的一个。在图[3-5](#499629_1_En_3_Chapter.xhtml#Fig5)所示的示例中，这将是
    Android `R`系统映像。选择下载将触发许可接受屏幕，如图[3-6](#499629_1_En_3_Chapter.xhtml#Fig6)所示。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig6_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig6_HTML.jpg)


    **图 3-6**  AVD 系统映像的许可接受屏幕示例


    我不是律师，当然也不会在电视上扮演律师！更严肃地说，这意味着我无法就许可文本的含义或暗示向你提供建议。如果你有任何疑虑，请寻求法律咨询。但从一个外行的角度来看，用于
    Android 系统映像的开源许可通常无需过分担心。我假设你接受显示的文本，并在单击`Next`按钮后，现在正盯着如图[3-7](#499629_1_En_3_Chapter.xhtml#Fig7)所示的
    Android 虚拟设备（AVD）配置验证屏幕。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig7_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig7_HTML.jpg)


    **图 3-7**  Android 虚拟设备（AVD）配置验证屏幕


    使用此屏幕确认你对新`AVD`的配置感到满意，并且最重要的是，给它起一个容易记住的名字。你可以随意命名你的`AVD`——无需保留可能继承自某个预配置系统映像的型号或品牌名称，尽管将其作为名字的一部分保留有助于快速提醒你模拟设备的功能。选择一个名称，然后单击`Finish`按钮，进入`AVD
    Manager`主屏幕，如图[3-8](#499629_1_En_3_Chapter.xhtml#Fig8)所示。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig8_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig8_HTML.jpg)


    **图 3-8**  填充后的`AVD Manager`主屏幕


    现在你应该能在可用模拟设备列表中看到你新创建的`AVD`。创建第一个 Android 虚拟设备就是这样——你现在已经准备好编写自己的应用程序并在其上运行了！'
  raw: 'In Chapter [2](#499629_1_En_2_Chapter.xhtml) I introduced the term SDK, or
    Software Development Kit. While it’s easy to parse that phrase and think “Great,
    a kit to help me develop software,” it’s worth reviewing what the Android SDK
    really offers. First and foremost, the Android SDK is a set of software libraries,
    which are the fundamental tools needed to access the capabilities and power of
    any Android smartphone and its operating system. You can think of the SDK as the
    lever that lets you bring all of the power and capabilities Google has built into
    Android to bear in your own application, without needing to build everything from
    the ground up.


    The Android SDKs – and there are successive versions released for every version
    of Android – provide the connection to Android Studio that lets you easily invoke
    Android behavior; build tools that let you turn your code into a working Android
    program; platform tools that let you manage applications that are still in development
    and running in “draft” form, including “adb,” the Android Debug Bridge, for controlling
    behavior on an emulator or real device from still-in-development code; and more.
    Oh, and the SDK provides the emulator framework and device emulation itself!


    Depending on whether you have ever previously used a version of Android Studio
    on the computer you’ve chosen to use or have stepped through this wizard before,
    you will see the listed release names like “R” or “Oreo” with or without a download
    link next to the name. In short, if the system image is already available on your
    machine, it won’t show a download link. If it is yet to be used on your machine,
    the download link will show, and you can click it straight from the system image
    stage to fetch the relevant system image.


    You will need to have at least one system image for your AVDs to use, so if all
    you see are system image names accompanied by download links, you should choose
    to download the latest one. In the example shown in Figure [3-5](#499629_1_En_3_Chapter.xhtml#Fig5),
    this would be the Android “R” system image. Selecting the download will trigger
    a license acceptance screen, shown in Figure [3-6](#499629_1_En_3_Chapter.xhtml#Fig6).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig6_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    An example license acceptance screen for AVD system images


    I am not a lawyer, and I certainly don’t play one on TV! More seriously, that
    means I can’t advise you what the text of the license means or implies. If you
    are at all worried, seek legal counsel. But from a layperson’s perspective, the
    open source licenses used for Android system images are generally nothing to lose
    sleep over. I will assume you accept the text shown and, having clicked the Next
    button, are now staring at the Android Virtual Device (AVD) configuration verification
    screen shown in Figure [3-7](#499629_1_En_3_Chapter.xhtml#Fig7).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig7_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    The Android Virtual Device (AVD) configuration verification screen


    Use this screen to check you are happy with the configuration of your new AVD
    and, most importantly, to give it a memorable name. You can call your AVDs anything
    you like – there’s no need to keep model or make names that might have been inherited
    from one of the pre-configured system images, though it can help to keep it as
    part of the name as a quick reminder of the features of your emulated device.
    Choose a name, and then click the Finish button, to head to the AVD Manager home
    screen, as shown in Figure [3-8](#499629_1_En_3_Chapter.xhtml#Fig8).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig8_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    The populated AVD Manager home screen


    You should now see your newly created AVD in the list of available emulated devices.
    That’s it for creating your first Android Virtual Device – you are now ready to
    get your own application written and running on it!'
