    **注意**


    要在实践中看到此示例的运行效果，您需要先在 AVD 或设备上创建一些联系人，并保留 AVD 的状态，以便重启 AVD 时这些联系人不会丢失。这样，当 intent
    触发时，才会有实际的联系人显示出来！


    运行`IntentExample`项目后，`IntentExample`活动将如图 17-1 所示。


    ![../images/499629_1_En_17_Chapter/499629_1_En_17_Fig1_HTML.jpg](img/499629_1_En_17_Fig1_HTML.jpg)


    **图 17-1** 启动后显示的主`IntentExample`活动


    您首先看到此活动的原因是，Android Studio（或您使用的任何其他 IDE）的自动项目设置已将其添加到清单文件中，并添加了必要的属性和`LAUNCHER`类别的数据值。


    在`EditText`字段中输入联系人的编号，然后点击“查看联系人”按钮，intent 和接收器就会施展它们的魔力。您的联系人`Uri`被捆绑到 intent
    中，而`startActivity()`的调用则指示 Android 系统筛选设备上所有应用的所有活动，以找到最适合处理您 intent 中`ACTION_VIEW`操作的活动。结果如图
    17-2 所示。


    ![../images/499629_1_En_17_Chapter/499629_1_En_17_Fig2_HTML.jpg](img/499629_1_En_17_Fig2_HTML.jpg)


    **图 17-2** 为满足我们的 intent 而选中的联系人活动


    图 17-2 所示的屏幕中显示的是当前 Android 原生的联系人查看活动，而不是我在`IntentExample`项目中编写的任何内容。您可以认为这是从您的应用外部安全地调用活动，因为我们采取了正确的步骤来提供`Uri`，并且可以放心地期望
    Android 系统本身能找到正确的活动来执行我们的 intent。我们没有使用组件命名方法强行要求启动特定活动。


    ## 介绍接收器


    在本章中，我们探讨了如何使用 intent 在您的应用内创建和激活多个活动，目的是处理应用中响应于用户交互和需求的多种操作。但是，并非所有对用户意愿的响应或触发
    intent 的处理都必须在（另一个）活动的范围内完成。有许多现实世界中的例子表明，在处理某个 intent 时，您实际上并不需要活动所提供的全部功能和复杂性（尽管活动本身已经很轻量）。一些例子包括数据操作、执行计算等，这些场景可以在不涉及任何用户界面的情况下确定计算结果，或者希望将
    intent 指向一个 Android 服务，而不是面向最终用户的应用。例如，您可能想构建一个音乐分享服务，该服务能在没有任何用户交互的情况下，将所有音乐发送到云存储提供商进行备份。还有一些更高级的情况，即在运行时才知道是否需要完整的
    UI 活动，这意味着您需要同时设计和规划依赖活动的和“无活动”的两种方式。


    ### 无需 UI 时使用接收器


    为了处理这些“无活动”的情况，Android 提供了`BroadcastReceiver`接口和接收器的概念。您现在应该已经熟悉了基于活动的 UI 屏幕在处理用户交互方面的轻量特性，而接收器是对此的补充，它提供了轻量级的对象，这些对象被创建出来用于接收和处理广播
    intent，然后即可被丢弃。Android 文档指出，`BroadcastReceiver`的定义中只有一个名为`onReceive()`的方法。`onReceive()`方法可以被视为接收器的“开始操作！”方法。您需要自行在接收器中实现所需的逻辑，并确保它按照您设想的方式与关联的
    intent 协作。


    实现`BroadcastReceiver`的方式与实现活动相同，首先在您的`AndroidManifest.xml`文件中进行声明。使用元素名称`<receiver>`，并指定一个`android:name`属性，其值为实现了`BroadcastReceiver`的类，例如：


    ```

    <receiver android:name=".MyReceiver" />

    ```


    您实现的任何接收器都是短暂的，其存在时间仅够执行您为`onReceive()`方法所创建的逻辑，之后它就会被丢弃并进行垃圾回收。接收器的行为有一些限制，有些是意料之中的，有些则令人惊讶。正如您对这种专为非
    UI 场景设计的方法所预期的那样，您不能在接收器逻辑中调用任何 UI 元素。不太常见但仍然重要的是，您不能在接收器中发起任何回调。这些限制对于在服务或活动（一种允许的组合）上实现的接收器会有所放宽，在这些情况下，接收器的生命周期与相关对象的生命周期相同。您不能通过清单文件为服务或活动创建接收器。对于这些情况，您可以在`onResume()`中使用`registerReceiver()`动态生成接收器，以标记您的活动能够接收特定操作/类别/MIME
    类型组合的 intent。如果使用这种方法，您还必须在`onPause()`回调期间进行清理，调用`unregisterReceiver()`。


    ### 处理接收器的限制


    除了上一节提到的限制之外，您还需要了解接收器的另一个限制。到目前为止所描述的 intent 和广播接收器机制可能会让您认为可以将两者结合使用，作为应用通用的消息传递方法。但这个想法中的“拦路虎”是活动的生命周期。特别是当活动被暂停时，它们将无法接收
    intent。暂停时无法接收 intent 意味着您将面临消息丢失（intent 广播）的问题，因此您需要避免将接收器绑定到活动，而更倾向于通过`AndroidManifest.xml`进行声明。您还需要考虑“重新发送消息”和重试逻辑，以便能够从丢失的消息中恢复，或者考虑使用更复杂的第三方消息总线系统或类似的方法。


    ### 总结


    在本章中，我介绍了将您的应用从单活动程序扩展到拥有众多活动领域所需的所有机制！您已经对 Android 的 intent 和广播接收器机制有了良好的基础，应该能够在您计划编写的应用中扩展活动的使用范围。


    ## 18. 介绍 Android 服务

