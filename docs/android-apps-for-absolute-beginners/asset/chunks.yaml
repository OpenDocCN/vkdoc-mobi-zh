    ### 处理来电


    处理来电比接听电话要复杂得多，并且超出了本书的范围。但完全接管来电并不总是必需的，即使您的应用程序不是处理通话管理这一主要任务的应用，当有电话呼入时，您也可以让您的应用程序执行其他有用的操作。


    让辅助应用程序响应来电的主要方法是在`AndroidManifest.xml`文件中为广播意图`ACTION_PHONE_STATE_CHANGED`注册一个广播接收器。我们将在下一章更深入地探讨广播接收器。目前，只需知道当有电话呼入时，`TelephonyManager`框架会触发`ACTION_PHONE_STATE_CHANGED`意图就足够了。代码清单
    16-4 说明了您清单文件中的接收器声明。


    ```

    代码清单 16-4

    在 AndroidManifest.xml 中设置来电接收器

    ```


    当有电话打入设备时，`TelephonyManager`会触发该意图，任何接收器（包括您的接收器）都会通过回调到各自指定的方法而被通知。`ACTION_PHONE_STATE_CHANGED`意图还可以包含两个可选的数据片段，您可以用它们来驱动您的逻辑。一个是通话的状态值，例如`CALL_STATE_OFFHOOK`（通话已摘机）或`CALL_STATE_RINGING`（电话仍在响铃等待接听）。如果使用了`CALL_STATE_RINGING`值，还有一个可选的附加值`EXTRA_INCOMING_NUMBER`，如果网络提供了该信息，它将提供主叫方
    ID。


    代码清单 16-5 是`MyPhoneStateChangedReceiver`类的一个 Java 方法示例，让您了解在回调中可以做什么。


    ```java

    public class MyPhoneStateChangedReceiver extends BroadcastReceiver {

    @override

    public void onReceive(Context context, Intent intent) {

    String deviceCallState = intent.getStringExtra(TelephonyManager.EXTRA_STATE);

    if (deviceCallState.equals(TelephonyManager.EXTRA_STATE_RINGING) {

    // 电话仍在响铃，可能包含主叫方 ID

    String callerID =

    intent.getStringExtra(TelephonyManager.EXTRA_INCOMING_NUMBER);

    // 尝试显示号码等

    } else {

    // 执行其他操作

    }

    }

    }

    代码清单 16-5

    处理来电的 Java 方法片段

    ```


    与其他硬件功能一样，处理来电被视为一项敏感任务，需要明确的安全权限。您的应用程序需要在清单文件中具有`READ_PHONE_STATE`权限，才能接收`ACTION_PHONE_STATE_CHANGED`意图。


