    # 本书后续内容预览


    《Android 入门经典》旨在带领读者开启首次软件编写之旅，学习那些能为未来应用开发目标奠定基础的方法、技巧与思路，同时掌握计算机程序构建的诸多基本原理。我们自然会将
    Android 作为学习的目标环境，也会以其为灵感源泉探索各种可能性，并以此为基础涵盖许多你在其他软件开发领域也会遇到的主题。


    本书共分为四大板块，每个板块都针对你在阅读内容和示例的过程中，逐步加深对 Android 应用开发及 Android 系统本身的理解而设计。各板块章节涵盖以下主题。


    ## 剩余章节详解


    **第 1 章 Android 简介：** 你正在阅读的就是它！你已经了解了 Android 的大部分介绍内容，再过几页就将开始你的第一个 Android
    应用开发。


    **第 2 章 Android Studio 简介：** 我们将介绍构建 Android 应用最流行的工具集——Android Studio，以及如何获取这款免费软件。我们还会简要了解一些
    Android Studio 的替代方案，以及如何关注新版本、新功能和其他 Android 应用构建方式的变化。最后，我们将介绍"模拟"Android 手机的概念——Android
    虚拟设备（AVD），它能让你的电脑模拟 Android 手机，为你提供一个无需操作真机即可测试应用的"游乐场"。


    **第 3 章 你的第一个 Android 应用，现在就开始！：** 没错，就是这样。你将直接着手创建自己的第一个 Android 应用，无需等到读完本书！第一个示例会非常简单，但它将为我们后续所有章节的扩展奠定基础。


    **第 4 章 探索你的第一个项目：** 在本章中，我们将用虚拟放大镜仔细审视你在第 3 章中创建的示例，逐一分析第一个应用的各个组成部分，了解它们从何而来、有何作用以及为何处于相应位置。


    **第 5 章 深入 Android Studio：** 如果你打算在未来的开发中使用这套集成工具，那么深入掌握其功能将是必修课。本章将探讨 Android
    Studio 的所有关键方面，包括代码编辑功能、调试器、性能分析工具等。


    **第 6 章 掌握你的完整开发者生态系统：** 这将完善你对开发过程中可以且将会使用的所有工具的理解。本章将探讨 Android Studio 集成环境之外但对其至关重要的工具，包括
    Java 开发工具包（JDK）、Gradle、代码与应用版本控制系统、Android 虚拟设备管理，以及环境中的其他关键部分。我们还将讨论可能影响你 Android
    开发之路的开发者硬件因素。


    **第 7 章 Java for Android 开发入门：** 准备好用 Java"升级"了吗？无论你当前的知识水平如何，本章都将重点介绍 Android
    开发所需的 Java 编码关键领域，并提供扩展 Java 专业知识的更多资源。


    **第 8 章 XML for Android 开发入门：** Android 应用行为的许多方面都由 XML（可扩展标记语言）数据控制。本章将带你了解 XML
    的基础知识，以及如何将 XML 应用于 Android 应用的各个方面，包括应用的清单文件、用户界面等。


    **第 9 章 探索 Android 概念：核心 UI 组件：** 在第 8 章的基础上，我们将探讨如何使用标准组件布局 Android 用户界面，例如菜单、字段、列表、图像等屏幕控件。本章还将介绍活动的关键概念——Android
    用户界面的基本构建块。最后，我们将概述 Android Jetpack，这是一个现代化的库，在提供当代布局方法的同时保持向后兼容性。

