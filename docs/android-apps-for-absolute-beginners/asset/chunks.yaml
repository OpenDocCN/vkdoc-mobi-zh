    # ColorFragmentExample 示例


    总体而言，逻辑非常直接。当调用 `onCreate()` 时，我们将 `activity_color_list` 布局加载到用户界面中。接着，我们通过测试来判断
    `color_detail_container` 视图对象是否已被实例化（无论其是否显示）。这为我们提供了一个代理，用于根据 Android 的屏幕检测规则和我们的
    `refs.xml` 规则，判断应用程序是否在 `activity_color_twopane` 布局内运行。如果在此状态下运行，我们将布尔值 `mTwoPane`
    设置为 true，并使用 `getSupportFragmentManager()` 通过 `setActivateOnItemClick()` 方法设置点击处理。


    然后，重写的 `onItemSelected()` 方法负责判断当用户点击一种颜色时该执行什么操作。我们是应该使用 `color_detail_fragment`
    布局及 `ColorDetailFragment.java` 中的关联代码创建一个额外的 fragment，还是应该触发 `startActivity()`，并显式调用
