  trans: '

    # 以碎片化思维进行设计


    以碎片化思维进行设计时，请思考你现有的布局，以及 `TextView`、`Button`、`RadioGroup` 等各类小部件放置的位置。任何在概念上相关并组合在一起的小部件子集——例如，用作标签的
    `TextView` 与 `EditText` 相邻——都可以考虑将其包裹在一个碎片中。为了更直观地展示，图 12-1 展示了这种分组方式，其中碎片作为小部件与整体活动之间的中介层。


    ![../images/499629_1_En_12_Chapter/499629_1_En_12_Fig1_HTML.jpg](img/499629_1_En_12_Fig1_HTML.jpg)


    **图 12-1** 碎片作为小部件与活动之间的中介组


    通过这种模型，你可以看到碎片分组如何在更大屏幕或不同方向上移动，以及如何显示更多碎片及其包含的小部件。你仍然能够在较小的手机屏幕上展示精良的用户界面，而无需在屏幕尺寸的两端做出妥协。为了实现这一目标，碎片首先通过在布局中添加使用
    `<fragment>` 元素块的 XML 来实现。你将在接下来的示例中看到这一实践。布局定义的其他部分基本保持不变，这意味着你到目前为止学到的所有知识在碎片环境中仍然
    100% 可用。这使你能够像以前一样继续使用视图层级结构，并通过填充这些层级结构来生成用户与之交互的最终屏幕。


    使用碎片还会引入一个额外场景，即你使用 `Bundle` 对象进行初始化、保存状态和重新创建，这与第 11 章中讨论的活动生命周期非常相似。碎片还有其他值得了解的特性，包括以下几点：


    1.  你可以继承基础碎片类并添加自己的自定义逻辑，但必须为派生类提供构造函数。

    2.  在使用碎片时，Android 会创建一个 `FragmentManager` 来处理碎片之间的双向交互——你无需为此编写代码。


    另一个需要了解的主要变化是整体活动与碎片生命周期的改变。


    ## 使用碎片生命周期


    碎片生命周期与我之前在第 11 章介绍的活动生命周期之间存在着许多共享的行为和概念。与活动生命周期一样，碎片生命周期的可视化图有助于理解其状态和转换。完整的碎片生命周期如图
    12-2 所示。


    ![../images/499629_1_En_12_Chapter/499629_1_En_12_Fig2_HTML.jpg](img/499629_1_En_12_Fig2_HTML.jpg)


    **图 12-2** 碎片生命周期


    原始活动生命周期与碎片生命周期的主要区别在于宿主活动与组成碎片之间的交互。与父活动的单一状态转换相比，碎片的转换可能带来额外的复杂性，并且可能包含多个事件转换。


    ### 审视碎片生命周期回调方法


    许多碎片生命周期回调方法与你在活动中看到的回调方法名称相同，但要注意，这并不意味着它们执行完全相同的操作。以下列表列出了主要差异，以及碎片独有的回调方法。


    #### `onInflate()`


    调用 `onInflate()` 方法是为了将布局 XML 文件中使用 `<fragment>` 元素定义的碎片布局填充到屏幕上的 UI 中。如果你通过代码中的
    `newInstance()` 调用以编程方式显式创建新的碎片，也可以直接调用 `onInflate()`。传递给它的参数包括碎片将驻留的引用活动，以及一个
    `AttributeSet`，其中包含来自 `<fragment>` 标签的任何额外 XML 属性。在此阶段，Android 正在确定你的碎片在渲染时的外观，尽管它当前不会显示它。这一步将在
    `onAttach()` 回调期间发生。


    #### `onCreate()`


    碎片的 `onCreate()` 方法与活动的类似，但有一些微小的调整。主要的变化是，你不能依赖任何活动的视图层级结构在 `onCreate()` 调用中作为引用。仔细想想，这很有道理，因为与碎片关联的活动正在经历其自身的生命周期，而就在你认为可以开始依赖它时，它很可能会停止存在，或经历配置变更或其他导致视图层级结构被销毁或重新创建的事件。


    #### `onAttach()`


    `onAttach()` 回调紧随 Android 确定碎片附加到哪个活动之后发生。此时，你可以安全地进行与活动关系相关的操作，例如获取并使用上下文进行其他操作。任何碎片都有一个继承的
    `getActivity()` 方法，该方法将返回其附加到的活动。你的碎片还可以使用 `getArguments()` 方法来获取并处理任何初始化参数。


    #### `onCreateView()`


    `onCreateView()` 回调为你提供了一种机制，用于返回碎片所选的视图层级结构。它接收一个 `LayoutInflater` 对象、`ViewGroup`
    以及实例状态的 `Bundle`，然后依靠 Android 根据所有常见的屏幕尺寸和密度属性选择合适的布局，使用 `LayoutInflater` 的 `.inflate()`
    方法对其进行填充，按你认为必要的方式修改布局，最后返回生成的视图对象进行渲染。


    #### `onViewCreated()`


    在 `onCreateView()` 返回后立即触发 `onViewCreated()`。它可以在使用任何已保存状态修改视图之前执行进一步的后处理工作。


    #### `onViewStateRestored()`


    当碎片的视图层级结构的所有状态都已恢复时，会调用 `onViewStateRestored()` 方法。这对于区分新创建与配置变更后恢复等情况非常有用。


    #### `onStart()`


    碎片的 `onStart()` 回调直接与父活动对应的 `onStart()` 相关联，并在碎片显示在用户 UI 中后立即调用。你原先打算放在活动级 `onStart()`
    回调中的任何逻辑，都应改为放入相关碎片的 `onStart()` 方法中。


    #### `onResume()`


    碎片的 `onResume()` 方法也与对应的活动 `onResume()` 方法紧密映射。它是在用户完全控制活动及其碎片之前进行的最后一次调用。


    #### `onPause()`


    `onPause()` 回调也与整个活动的 `onPause()` 方法紧密匹配。如果将逻辑移到碎片中，那么关于暂停音频或视频、停止或释放其他操作和资源等活动变体的规则在此处同样适用。

    '
- fmt: '# Fragment Lifecycle Methods


    ## `onSaveInstanceState()`


    The fragment version of `onSaveInstanceState()` is identical to the activity equivalent.
    You should use `onSaveInstanceState()` to persist any resources or data you want
    to keep between fragment incarnations via the `Bundle` object for the fragment.
    Do not go overboard saving huge amounts of data and state – remember that you
    can use identifier references for long-lived objects outside the fragment itself
    and just refer to, and save, those.


    ## `onStop()`


    The `onStop()` method is equivalent to the same method for an activity.


    ## `onDestroyView()`


    `onDestroyView()` is called as the fragment moves to the end-of-life stage. When
    Android has detached the view hierarchy associated with the fragment, `onDestroyView()`
    is then triggered.


    ## `onDestroy()`


    Once the fragment is no longer in use, the `onDestroy()` method is called. The
    fragment is still attached to and associated with its activity at this point,
    even though it is soon to be sent to the scrap heap!


    ## `onDetach()`


    The final step in terminating a fragment comes when it is detached from its parent
    activity. This also marks the moment when all other resources, references, and
    other lingering identifiers should be destroyed, removed, or released.


    # Starting Simple with Fragment Lifecycle Events


    The preceding set of lifecycle stages and associated callback methods for fragments
    might have left your head spinning, and you might be worried you have to code
    for all of those methods immediately in order to use and benefit from fragments.
    You need not worry! Just as with the introduction to the activity lifecycle, you
    do not have to override all of the stub methods with your own logic. Only if there
    is something you need or want to do at a particular state transition do you need
    to provide supporting code. You can start with the bare minimum of providing an
    override for the `onCreateView()` method and call it quits.


    In the following `ColorFragmentsExample` code, I do just this, keeping the callback
    logic to an absolute minimum.


    # Creating a Fragment-Based Application


    It is time to see fragments in action! I will use a simple set of color-themed
    widgets and activities to illustrate the ease with which you can start using fragments.


    ## Creating Fragment Layouts: The Color List


    Listing [12-1](#499629_1_En_12_Chapter.xhtml#PC1) shows the fragment-based layout
    that will be used within the parent activity to show a list of colors.


    ```

    Listing 12-1

    Fragment layout for displaying a list of colors

    ```


    This definition incorporates the `<fragment>` XML element and in turn relies on
    the stock `list_content` layout to show `TextView` entries in a list. We will
    use this fragment for all the different possible display sizes and orientations,
    whether it is for a single-pane view on a phone screen or a multi-pane view layout
    on a giant screen.


    ## Creating Fragment Layouts: The Color Detail


    I will use a `TextView` widget to show details of a color, which will then be
    placed within the fragment, and that fragment will be placed in a parent activity.
    The simple layout for the `TextView` is available in the `fragment_color_detail.xml`
    file in the `Ch12/ColorFragmentExample` project. Listing [12-2](#499629_1_En_12_Chapter.xhtml#PC2)
    shows the contents.


    ```

    Listing 12-2

    The TextView layout used to show color details

    ```


    ## The Single-Pane Parent Activity for Color Details


    When running on a small-screen device, we will lay out our `TextView` in an activity
    suited for such a size. The only task for the activity is to create the fragment
    housing the `TextView`, and you can see this code in Listing [12-3](#499629_1_En_12_Chapter.xhtml#PC3).


    ```

    Listing 12-3

    The activity_color_detail.xml layout

    ```


    This is a simple `<FrameLayout>` with some basic flourishes. The `TextView` will
    be placed within this layout via a fragment.


    ## The Dual-Pane Parent Activity for Color Details


    When we move to a much larger screen, a more appropriate layout will place all
    of the fragments and UI widgets on the screen at once, maximizing the use of space.


    The `activity_color_twopane.xml` layout file might strike you as yet more work
    to do, but on closer inspection, you will see that it really is just a composition
    that includes the `<fragment>` and `<FrameLayout>` that we pulled into separate
    layouts for smaller screens. Listing [12-4](#499629_1_En_12_Chapter.xhtml#PC4)
    shows this XML.


    ```

    Listing 12-4

    The activity_color_twopane.xml layout

    ```


    The only differences when compared to the separate layouts concatenated together
    are the `android:layout_weight` values, which will be used to manage the comparative
    screen space used by the two fragments when presented together in a single activity.
    By selecting a 1:3 ratio, this will give the master list fragment a quarter of
    the space and the detail fragment the remaining three-quarters.


    ## Selecting Which Layout to Inflate


    How does your Android application decide which layout to use and what arrangement
    of fragments to display? The answer lies in the use of multiple `refs.xml` files
    sitting in your `res/` resource folder hierarchy for your project. In our example,
    we have a `refs.xml` file in each of the `res/values-large` and `res/values-sw600dp`
    folders.


    When our code runs, Android will check at runtime for any size-specific XML resources
    across all of the different size-specific `res/` directories (and there can be
    more than two, as you saw in our exploration of the Android project structure
    earlier in the book). There is only one child element in `refs.xml` for large-
    and `sw600dp`-sized screens, as follows:


    ```

    @layout/activity_color_twopane

    ```


    Any screen that Android categorizes as "large" or meeting `sw600dp` resolution
    standard will trigger Android to use the `activity_color_twopane` layout from
    the XML file of the same name.


    # Coding for Fragments


    There are very few differences to concern yourself with when writing code for
    a fragment-based application. The primary areas that do differ are the lifecycle-related
    callbacks we covered earlier in Chapter [11](#499629_1_En_11_Chapter.xhtml) and
    that your UI-centric logic and any related data handling would move to the fragment
    level. Your activities still remain, and their logic for handling activity lifecycle
    events and functionality that spans fragments also stays in place.


    Our `ColorListActivity` is an excellent example of the low burden for coding when
    using fragments. Listing [12-5](#499629_1_En_12_Chapter.xhtml#PC6) shows the full
    logic for our application, including handling whether our application ends up
    displaying as one or two fragments within the parent activity.


    ```

    package org.beginningandroid.colorfragmentexample;

    import android.content.Intent;

    import android.os.Bundle;

    public class ColorListActivity extends FragmentActivity

    implements ColorListFragment.Callbacks {

    private boolean mTwoPane;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_color_list);

    if (findViewById(R.id.color_detail_container) != null) {

    mTwoPane = true;

    ((ColorListFragment) getSupportFragmentManager()

    .findFragmentById(R.id.color_list))

    .setActivateOnItemClick(true);

    }

    }

    @Override

    public void onItemSelected(String id) {

    if (mTwoPane) {

    Bundle arguments = new Bundle();

    arguments.putString(ColorDetailFragment.ARG_ITEM_ID, id);

    ColorDetailFragment fragment = new ColorDetailFragment();

    fragment.setArguments(arguments);

    getSupportFragmentManager().beginTransaction()

    .replace(R.id.color_detail_container, fragment)

    .commit();

    } else {

    Intent detailIntent = new Intent(this, ColorDetailActivity.class);

    detailIntent.putExtra(ColorDetailFragment.ARG_ITEM_ID, id);

    startActivity(detailIntent);

    }

    }

    }

    ```


