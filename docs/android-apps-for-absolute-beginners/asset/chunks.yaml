    # 关键实现步骤与 SQLite 查询方法


    以下是前述代码中需要记住的一些关键实现步骤，适用于所有基于 SQLite 的 Android 开发。任何基于 SQLite 的 Android 应用的关键步骤是：从你的辅助类创建一个对象，并确保它在需要它的活动（**Activity**）的整个生命周期内保持有效。这通常不难，我在启动活动（Launcher
    Activity）中创建该对象的方式是一种常见做法。


    现在你已经有了可用的辅助对象，每当需要操作数据库时，与数据库的交互都将从调用其`getReadableDatabase()`或`getWritableDatabase()`方法开始，这两个方法会返回一个底层
    SQLite 数据库的数据库对象。正如方法名所示，只读数据库对象仅用于通过`SELECT`查询读取数据，而可写版本则允许执行 DML 语句（如`INSERT`、`UPDATE`、`DELETE`）以及用于创建和修改对象的
    DDL 语句，就像我们在辅助类的`onCreate()`方法中使用的那样。


    当使用数据库对象完成特定任务后，只需调用其`.close()`方法，辅助类就会清理资源。这通常在活动的`onDestroy()`或类似方法中完成。


    `SQLiteExample`应用创建了辅助对象，并使用`getWritableDatabase()`以可写模式访问数据库，接着通过`getModels()`方法填充`modelEntries`列表。利用这些结果，它为`ArrayAdapter`提供所需数据，以将数据库返回的数据填充到`ListView`中。`getModels()`方法虽短，但功能强大，因为它引入并使用了两个关于
    SQLite 数据库和 Android 的重要能力。第一个概念是查询辅助方法（Query Helper），用于从 SQLite 数据库中收集数据；第二个概念是游标对象（**Cursor**），用于管理返回的结果。熟练使用
    SQLite（及其他）数据库需要掌握这两种技术，让我们更深入地研究它们。


    ## 为 SQLite 和 Android 选择查询方法


    在应用中使用 SQLite 数据库时，你可以选择两种主要方式来检索其存储的数据。每种方式都使用`SELECT`语句，但在提供给开发者的辅助程度和假定结构方面有所不同。


    ### 使用查询构建过程


    方法一，如`SQLiteExample`应用的`getModels()`方法所示，是使用`query()`方法。通过使用`query()`，你可以获得一条结构化的路径来构建查询所需的列、源表、谓词逻辑等，直到形成最终将在
    SQLite 数据库上执行的查询。


    使用`query()`时，你不需要直接编写 SQL `SELECT`语句。相反，你需要按照一组预定义的构建阶段逐步操作，`query()`方法会在底层为你构建
    SQL 语句：


    1.  提供要用于查询的表名。

    2.  提供要选择的列名（如果你熟悉关系数据库术语，也可称为“投影”）。

    3.  为`WHERE`子句提供谓词，包括任何可选的占位参数。

    4.  如果使用了占位参数，则提供这些参数的值。

    5.  提供任何`GROUP BY`、`HAVING`或`ORDER BY`子句。


    如果不需要查询的某一部分，只需在`query()`调用的相应参数位置传入`null`即可。你可以在`SQLiteExample`代码中对`query`的调用中看到这一点：


    ```java

    myDB.query(MySQLiteHelper.TABLE_NAME, MySQLiteHelper.TABLE_COLUMNS,

    null, null, null, null, null)

    ```


    这意味着我们没有使用任何谓词来为 SQL 语句的`WHERE`子句添加逻辑，没有为该语句提供参数，也没有使用任何`GROUP BY`、`HAVING`或`ORDER
    BY`选项。这看起来非常简单直接，实际使用中也是如此。这种方法的一个显著局限性就隐藏在第 1 步中：你为查询提供了表名——但只能是一个表。这就是它的缺点！使用`query()`方法，你只能查询单个表，这意味着无法进行连接（Join），更微妙的是，你也不能使用任何像子查询、关联查询或其他会引用其他表的技术。


    ### 使用 SQL 的原始能力


    如果你渴望突破`query()`方法的限制，那么`rawQuery()`可以为你提供几乎完整的 SQL 能力。顾名思义，`rawQuery()`接受一个代表
    SQL 语句的“原始”字符串作为参数，并接受一个可选的占位参数数组（如果你选择在 SQL 语句中使用它们）。当你的查询不需要参数化时，你可以将`null`作为第二个参数传入。


    你可以在`SQLiteExample`逻辑的`getModelInfo()`实现中看到`rawQuery()`的实际应用：


    ```java

    myDB.rawQuery("select _id, model_name, release_year " +

    "from devices", null)

    ```


    使用`rawQuery()`，你可以尽情施展你所能掌握的任何 SQL 技巧，包括 SQLite 支持的 SQL 标准中的任何内容，如嵌套子查询、连接等。这种广泛的能力也带来了其自身的考量。使用`rawQuery()`管理一组小的静态查询是没有问题的，然而，当表示查询的字符串变得复杂，或者通过动态生成
    SQL 文本来构建越来越大的语句时，就需要关注一些普遍问题。首要的是被称为 SQL 注入的安全问题。SQL 注入漏洞本身并非 Android 问题，也非 SQLite
    问题。这些问题可能影响任何使用数据库的应用程序。避免 SQL 注入的关键在于字符串“净化”，即确保生成的 SQL 不仅有效，而且不超出你原本预期的范围。


    > **注意**

    >

    > 使用原始 SQL 的强大能力，也带来了当你完全控制并完全负责查询语法、正确性等方面时可能出现的所有复杂问题。如果你是 SQL 初学者，我建议先用查询构建器方法进行测试，然后再将`rawQuery()`和查询构建器进行对比学习，以便了解其中存在的陷阱和风险！


    ## 使用游标管理查询结果


    无论你选择哪种查询执行模型来操作数据库，查询结果都会以一个名为**Cursor**的对象呈现给你（或你的应用）。**Cursor**本质上与你在几乎所有数据库库中能找到的概念相同，因此如果你曾使用过其他数据库及其编程接口，以下描述会非常熟悉。如果你是数据库和/或游标的新手，可以将它们想象成：一个由查询产生的完整数据集，以及一个指向结果集中当前关注行的指针（或游标位置）。想象一下你最喜欢的文本编辑器或文字处理器中光标位于文档整个文本的某个位置，你就有了一个粗略的概念。在数据库库中，你可以将游标视为整个结果集以及在该结果集中的当前位置。


    这种“数据集加位置指针”的比喻是理解**Cursor**对象强大功能的关键。**Cursor**使你能够执行以下操作及其他更多操作：


    1.  使用`moveToFirst()`和`moveToNext()`等方法移动游标位置并遍历结果集，并使用`isAfterLast()`测试位置。

    '
- fmt: '2. 使用`getString()`、`getInt()`以及其他等效方法从当前行中提取单个列的值。


    3. 使用`getColumnNames()`和`getColumnIndex()`查询结果集，以了解列名、列序号位置等信息。


    4. 使用`getCount()`获取结果集的统计信息。但请注意，尝试对结果进行计数会强制按顺序读取`Cursor`的整个结果集，这可能会消耗大量内存，并且对于大型结果集需要较长时间。


    5. 使用`close()`方法释放所有`Cursor`资源。


    处理`Cursor`中结果的一种常见方法是使用循环逻辑结构遍历其行，并对每一行执行所需的任何应用程序逻辑。`SQLiteExample`应用程序在几个地方执行此操作，例如`getModels()`中的这段代码：


    ```

    Cursor cursor = myDB.query(MySQLiteHelper.TABLE_NAME,

    MySQLiteHelper.TABLE_COLUMNS, null, null, null, null, null);

    cursor.moveToFirst();

    while (!cursor.isAfterLast()) {

    String model = cursor.getString(MySQLiteHelper.COLNO_MODEL_NAME);

    models.add(model);

    cursor.moveToNext();

    }

    cursor.close();

    ```


    这展示了`SQLiteDatabase`对象的`query()`方法的用法，我们将表名和包含我们感兴趣的列名的`String`数组传递给它。我们返回一个包含结果集的`Cursor`，如下所示：


    ```

    _id  model_name          release_year

    ---  ------------------  ------------

    1    Pixel 3             2018

    2    Pixel 5             2020

    3    Samsung Galaxy S21  2021

    Listing 20-4

    Sample cursor result set for the SQLiteExample activity

    ```


    为了处理返回的`Cursor`，我们在进入循环之前调用`.moveToFirst()`方法，该方法将游标的当前行定位到`_id=1`的行。在逐步循环时，我们使用`isAfterLast()`测试是否已移动到游标结果集的末尾，从而避免因读取超出游标范围而导致的任何错误。我们通过传递`COLNO_MODEL_NAME`常量（表示`model_name`列的列位置）来调用`getString()`。此字符串被添加到我们的`ArrayList`中，然后我们调用`moveToNext()`继续处理下一行。


    **注意**


    在处理数据库（无论是SQLite还是其他数据库）时，很容易总是依赖这种迭代行处理的方法。然而，这种模式隐藏了所有数据库相关编程中最常见的性能陷阱。`While`循环和`for`循环易于编码，但无法与数据库引擎使用原生SQL执行集合逻辑的能力相匹配。无论你是编程新手还是经验丰富的开发者，都值得记住，对于大规模计算和处理数据，SQL几乎总是最佳选择。在你的代码中，对于数据处理逻辑之外的事情，例如将数据绑定到UI小部件或执行非SQL类处理，使用基于Java或Kotlin的迭代循环是可以的。但要保持警惕，以确保为用户提供良好的性能！


    超越简单的迭代和手动处理，你可以使用`Cursor`对象来填充`SimpleCursorAdapter`，以便与`ListView`或其他选择UI小部件进行绑定。在使用任何`CursorAdapter`选项或其子类时，你需要遵循本章前面介绍的表结构模式。你必须创建一个名为`_id`的主键列，并为其设置自增属性。适配器的所有方法（例如`onListItemClick()`）都期望`_id`列及其值的存在。当你遇到游标的限制时，还有更高级的方法来处理结果，例如`SQLiteDatabase.CursorFactory`对象以及与其配合使用的`queryWithFactory()`和`rawQueryWithFactory()`方法。这些已超出本书的讨论范围，但你可以在`developer.android.com`上了解更多信息。


    **使用你的Android应用程序修改数据**


    从数据库读取数据当然非常有用，但对于数据库驱动的应用程序来说，这只是故事的一半。在几乎所有情况下，你都会希望用户能够从你的SQLite数据库中添加、更新和删除信息，这意味着希望使用SQL的`INSERT`、`UPDATE`和`DELETE`
    SQL DML语句对你的数据库进行操作。


    Android对SQLite的支持扩展到了提供两种执行修改数据的DML语句的方式。第一种是使用`execSQL()`方法，你需要向其传递一个结构完整的SQL语句。回顾一下`SQLiteExample`应用程序，它在数据库首次创建时通过辅助类使用了这种方法。如前所述，`execSQL()`适用于任何不期望返回结果或游标的语句。由于`INSERT`、`UPDATE`和`DELETE`语句不返回结果，因此它们符合要求。在最新版本的Android（以及相应的SQLite
    3.24及更高版本）中，这包括`INSERT`的“`UPSERT`”变体，该变体通过`INSERT`语句实现了`ON CONFLICT`支持以更新现有行。


    如果`execSQL()`让你感觉像是在冒险操作，那么另一种选择是使用`SQLiteDatabase`对象的`.insert()`、`.update()`和`.delete()`方法，采用逐步执行DML的方法，就像`.query()`方法帮助你构建所需的`SELECT`语句一样。这些方法都使用`ContentValues`对象，该对象为你提供了一个针对SQLite定制的值和列映射。


    **插入数据**


    查看`SQLiteExample`中的`insertModelRow()`方法，你将看到`.insert()`方法的实际运用：


    ```

    private void insertModelRow(DialogWrapper wrapper) {

    ContentValues myValues=new ContentValues(2);

    myValues.put(MySQLiteHelper.COLNAME_MODEL, wrapper.getModel());

    myValues.put(MySQLiteHelper.COLNAME_YEAR,

    Calendar.getInstance().get(Calendar.YEAR));

    myDB.insert(MySQLiteHelper.TABLE_NAME,

    MySQLiteHelper.COLNAME_MODEL, myValues);

    //uncomment if you want inserts to be displayed immediately

    //displayModels();

    }

    ```


    由于使用了辅助类常量，该代码段中对`.insert()`的调用非常清晰。查看这些常量本身，第一个参数接受我们正在插入数据的表名，第二个参数提供一个可以接受`null`值的列，这是Android的要求，而不是我个人的设计选择。其目的是规避SQLite有时在最后一个参数（`ContentValues`对象）为空时的奇怪插入行为，这被称为“空插入技巧”。'
