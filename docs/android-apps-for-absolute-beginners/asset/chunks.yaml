    # 第三部分 – 进阶


    ## 13. 为 Android 处理声音、音频和音乐


    是时候转向 Android 应用开发中一些更复杂、更有趣的方面了。在接下来的几章中，我们将探讨为应用程序添加音频、视频和静态图像，以及创建和录制这些媒体类型、显示和使用它们的机制。


    让我们从音频功能的概述开始。本章剩余部分有一个注意事项：印刷书籍无法真正提供音频示例（尽管在线版本可以）。为了充分利用本章的示例代码，您绝对应该在真实设备或
    AVD 上运行这些应用程序。


    ### 播放音频


    Android 提供了丰富的方式让您在应用中使用音频。事实上，随着时间的推移，这些方式已经多到让选择变得令人眼花缭乱。不过别担心。Android 还构建了一个结构良好的方法来帮助管理所有这些不同的方法——即
    Media 包，我们稍后将介绍。


    #### 选择您的音频方法


    首先，让我们看看在 Android 中利用音频播放的主要方式。根据您的需求以及您计划从哪里获取音频，每种不同的方法都为您提供了优势和各种选项。


    ##### 使用原始音频资源


    原始音频资源是一种声音文件或音频源，它被打包成文件并与您的应用程序一起捆绑在 `raw` 文件夹中。原始方法意味着您可以保证所需的音频始终可用，这种方法非常常用于游戏中的音效、通知等音频。原始方法的缺点是，更改与应用程序
    APK 捆绑的音频只能通过替换（升级）整个应用程序来实现。


    ##### 使用音频资产


    音频资产也与您的应用程序捆绑在一起，因此具有与原始方法相同的优点和缺点。资产方法提供的额外好处是可以通过 URI 命名方案来访问您的音频，例如 `file:///android_asset/some_URL`。这在您使用任何期望或需要
    URI 的 API 时会带来便利，而 Android 中有许多这样的 API。


    ##### 使用文件存储存储音频


    文件存储方法比原始方法更基础，不适合胆小者。您使用设备的内置或可移动存储来保存音频文件。通过文件 I/O API（我们将在本书后面介绍）进行访问。虽然管理起来负担更重，但这意味着理论上您可以下载新文件、更改文件和删除文件，而无需升级应用程序。


    ##### 访问音频流服务


    如果您完全不想操心音频存储问题，流式传输就是答案。您可以从设备上的其他服务或 Android Content Provider（它们本身可能从其他地方流式传输）流式传输音频，或者直接从基于互联网的服务流式传输。流式传输使您无需担心存储、文件管理、空间需求或升级。但它将这些担忧换成了对连接性的焦虑——您只能在拥有可用数据连接时进行流式传输。


    ### 使用 Media 包


    处理音频的各种选项既可以是福音，也可以是诅咒。有适合您各种想法的机制，但选择也带来了复杂性。幸运的是，Android 配备了多才多艺的 Media 包，帮助简化您作为开发者的生活，同时保留您可用的选项。


    Media 包提供了两个关键类供您使用：`MediaPlayer` 用于播放音频，我们将首先介绍它；以及 `MediaRecorder` 用于设备端录制，我们将在本章后面介绍。

    '
- fmt: '# Creating an Audio Application


    To bring the `Media` package – and `MediaPlayer` class – to life, we are going
    to create an iconic application that you would almost certainly be familiar with.
    If you’ve ever owned an iPod, smartphone, or the like, you have likely played
    MP3 audio files of your favorite music, podcasts, or similar. It’s time to make
    your own MP3 player application.


    ## Choosing Between Assets and Resources


    As outlined earlier in the chapter, you have options as to which method to use
    to manage audio files to make them accessible to your application.


    If we wanted to use a raw audio resource, we would first need to create a `raw`
    folder within our project to host audio files. This can be done in Android Studio,
    by navigating to the `res` folder in the hierarchy and choosing the menu option
    `File` ➤ `New` ➤ `Directory`. Name the directory “raw,” and your `raw` folder
    will now be in place.


    If we wanted to use the asset-based approach, we would have the same initial need
    to create the `assets` folder for our application. To create an `assets` folder
    in Android Studio, highlight the `app` parent-level folder in your project hierarchy,
    and then choose the `File` ➤ `New` ➤ `Folder` ➤ `Assets Folder` menu option in
    Android Studio, which will prompt for the creation of an `assets` folder for your
    project, as shown in Figure [13-1](#499629_1_En_13_Chapter.xhtml#Fig1).


    ![../images/499629_1_En_13_Chapter/499629_1_En_13_Fig1_HTML.jpg](images/499629_1_En_13_Chapter/499629_1_En_13_Fig1_HTML.jpg)


    **Figure 13-1** Prompt to add an `assets` folder to your project in Android Studio


    The corresponding file system location for your Android Studio `assets` folder
    within your project is `./app/src/main/assets` (or `.\app\source\main\assets`
    under Windows). If you want to continue using the traditional `raw` folder, you
    can find (or create) it under the `./app/src/main/res` folder of your project.


    ## Writing the Code for Audio Playback


    In the spirit of learning `MediaPlayer` and the fundamentals of how all of the
    parts of putting an audio player together work, we are going to sidestep some
    of the other goodies that are part of the `Media` package, including bundle special
    on-screen widgets and other attractive assets that would give you a great-looking
    media player quickly, but rob you of any chance to learn how and why it works.


    We will start simply and build things up over the next few chapters, exploring
    successive parts of the `Media` framework as we go.


    ### Playing Back Audio the Simple Way


    For our initial exploration of the `Media` framework for audio playing, we will
    use a very simple initial interface as shown in Figure [13-2](#499629_1_En_13_Chapter.xhtml#Fig2).
    Don’t worry. We will expand and improve this over the next few chapters.


    ![../images/499629_1_En_13_Chapter/499629_1_En_13_Fig2_HTML.jpg](images/499629_1_En_13_Chapter/499629_1_En_13_Fig2_HTML.jpg)


    **Figure 13-2** The initial simplistic audio player interface


    While this austere design is not fancy, it lets us explore the mechanics of starting
    playback and stopping it. The layout XML is shown in Listing [13-1](#499629_1_En_13_Chapter.xhtml#PC1)
    and is available as part of the `Ch13/AudioPlayExample` project.


    ```

    Listing 13-1

    The layout for the AudioPlayExample project

    ```


    Briefly, the layout provides for the two buttons, labeled “Start” and “Stop” with
    a Unicode symbol for a musical note appended. Importantly, each of the two buttons
    adds the `android:onClick` attribute, which enables us to wire up a method to
    invoke when the buttons are clicked. We’ve used the same target method name for
    each button – `onClick`. This method will be invoked when either button is clicked,
    and we’ll use the `android:id` values to drive the logic in that method to determine
    what to do.


    ### Coding the Java Logic for AudioPlayExample


    Our Java logic for the `AudioPlayExample` is shown in Listing [13-2](#499629_1_En_13_Chapter.xhtml#PC2)
    and is also available in the `Ch13/AudioPlayExample` project.


    ```java

    package org.beginningandroid.audioplayexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.media.AudioManager;

    import android.media.MediaPlayer;

    import android.os.Bundle;

    import android.view.View;

    public class MainActivity extends AppCompatActivity {

    private MediaPlayer mp;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    }

    public void onClick(View view) {

    switch(view.getId()) {

    case R.id.startButton:

    doPlayAudio();

    break;

    case R.id.stopButton:

    doStopAudio();

    break;

    }

    }

    private void doPlayAudio() {

    mp = MediaPlayer.create(this, R.raw.audio_file);

    mp.setAudioStreamType(AudioManager.STREAM_MUSIC);

    mp.start();

    }

    private void doStopAudio() {

    if (mp != null) {

    mp.stop();

    }

    }

    public void onPrepared(MediaPlayer mp) {

    mp.start();

    }

    @Override

    protected void onDestroy() {

    super.onDestroy();

    if(mp != null) {

    mp.release();

    }

    }

    }

    ```


    **Listing 13-2** The Java code supporting the `AudioPlayExample` application


    Before we delve into the code, step back and look at how many lines of code there
    are. Very few, and many of those are the lifecycle callback method boilerplate
    you would expect to see. As you’ll see, that’s because even using `MediaPlayer`
    in a low-level way is still very efficient to code.


    As well as the expected imports of `view.View` (for all the standard Android widgets
    and others) and `os.Bundle`, we import the key `Media` framework packages for
    audio playback:


    - `Android.media.AudioManager`: The `AudioManager` provides a range of support
    functions to make audio handling of all sorts of audio easier. You use `AudioManager`
    to flag that an audio source is a stream, voice, machine-generated tone, and so
    on.

    - `Android.media.MediaPlayer`: The workhorse of the `Media` package, `MediaPlayer`
    gives you total control over preparing and playing back audio from local and remote
    sources.

    - `Android.media.MediaPlayer.OnPreparedListener`: The key to asynchronous playback,
    `OnPreparedListener` is the interface that enables callbacks to playback music
    after off-thread preparation has been done.'
