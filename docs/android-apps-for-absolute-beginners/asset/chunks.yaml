    [3-19](#499629_1_En_3_Chapter.xhtml#Fig19).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig19_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig19_HTML.jpg)


    Figure 3-19


    Your running MyFirstApp Android application within your AVD


    That’s it! You have written and run your first Android application. Well done.
    Take a deep breath, because in Chapter [4](#499629_1_En_4_Chapter.xhtml) we are
    going to dive under the hood and examine everything that Android Studio has just
    built for you in great detail.


    # 4. Exploring Your First Project


    In Chapter [3](#499629_1_En_3_Chapter.xhtml), I introduced you to setting up everything
    you needed to get your first Android application written and running on an AVD,
    with the goal of very quickly getting you immersed in Android Studio, emulators,
    and your first part of coding. We got results fast! But you almost certainly have
    a whole bunch of unanswered questions that cropped up as we zoomed through. In
    this chapter, we’ll start a deeper dive into many of the topics, starting with
    the structure and features of your new Android project. This should start to answer
    those questions and build your knowledge.


    ## Viewing the Whole Android Project Structure


    To get familiar with the structure and purpose of the various parts of an Android
    project, it can help to start with the view from 30000 feet up (or 10000 meters,
    for the metric-minded). Looking at the entire layout of your project from the
    previous chapter, it turns out to be surprisingly large. While you only edited
    one file, many others were created for you by the new project wizard, and other
    files like Java libraries, the Android SDK, and so on were copied or had references
    added as your project was created.


    To see this full view, use the left-hand pane of the Android Studio window, known
    as the Project Explorer view, to expand the app folder; then the folders under
    it such as manifests, java, and so on; and all the other folders from the top
    level down. You will end up with a view of the entire project that looks similar
    to Figure [4-1](#499629_1_En_4_Chapter.xhtml#Fig1) (note that I am showing successive
    views of the long Project Explorer side by side, to save space).


    ![../images/499629_1_En_4_Chapter/499629_1_En_4_Fig1_HTML.jpg](images/499629_1_En_4_Chapter/499629_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    The logical Android view of your project in the Project Explorer


    The default view you see is known as the Android view and is designed to simplify
    the way all of your project’s constituent parts are displayed to you. The goal
    with this simplification is to let you focus on the parts you, the developer,
    write or edit and to keep much of the rest of the supporting files out of the
    way.


    From this whole-of-project Android view, you can see that the project is broken
    down into five major groups of files that represent different parts of your project.'
  trans: '

    # 安装（附加）SDK 软件包


    根据你在本章前面选择的应用最低 SDK 设置，以及首次安装 Android Studio 时选择的选项，你的计算机上可能未安装 Android Studio
    构建应用所需的相应 SDK 包。你可以轻松发现这一点，因为 Android Studio 的默认视图会在屏幕左下角显示当前的构建状态。


    如果你查看“构建：同步”区域并看到如下错误或警告，则可能需要下载与你项目所选版本匹配的 SDK 包：


    ```

    License for package Android SDK Platform 29 not accepted

    ```


    或


    ```

    Module ''app'': platform ''android-29'' not found

    ```


    警告或错误中提到的版本号可能与你的安装环境不同。无论版本如何，只需调用 SDK 管理器功能（IDE 提供的另一项集成功能）即可轻松解决。在 Android
    Studio 的“工具”菜单中，选择 **SDK 管理器** 选项，你应该会看到如图 3-17 所示的 SDK 管理器界面。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig17_HTML.jpg](img/499629_1_En_3_Fig17_HTML.jpg)


    图 3-17


    Android SDK 管理器


    要添加项目所需的 SDK，只需勾选相应版本旁的复选框——在我的例子中是“Android 10.0 (Q)”，它对应于 API 级别 29，换句话说，就是 Android
    SDK 的 29 版本。点击“应用”按钮，SDK 管理器将触发下载此版本的 SDK。如果你稍作思考，就会意识到随着你构建越来越多的应用，并可能为它们选择不同的目标
    SDK 版本，你的机器上最终可能会安装多个不同版本的 Android SDK，这些版本加起来会占用相当可观的磁盘空间。我们将在第 6 章深入探讨你的整体开发者系统设置时，重新讨论这个话题。


    一旦所需 Android SDK 版本的下载完成，你应该会看到如图 3-18 所示的状态。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig18_HTML.jpg](img/499629_1_En_3_Fig18_HTML.jpg)


    图 3-18


    Android SDK 管理器提示新 SDK 版本下载并安装成功


    此时，你需要让 Android Studio 刷新集成的 Gradle 构建工具的配置，以便它意识到新 SDK 已就位。Android Studio 可以自动完成所有必要的步骤——所以如果你对
    Gradle 作为构建工具一无所知，此刻也不必惊慌。只需打开 `File` 菜单，选择 `Sync Project with Gradle Files` 选项。


    当此同步活动完成时，在屏幕左下角的“构建”窗口中，你应该会看到之前的警告和错误已消失，唯一显示的消息应该是 `MyFirstApp successful at`
    *某个日期和时间*。


    ## 运行你的应用


    在 Android Studio 完成符合你应用需求的设置，且 Gradle 同步完成并准备好构建你的应用后，你的运行配置现在应该能够实际运行你的新应用了。继续操作，从“运行”菜单中选择“运行”，或直接选择
    `Run ''Run Config 1''` 以跳过运行配置选择步骤。


    一系列操作现在会自动执行，但这可能需要一些时间——根据你计算机的性能，最多可能需要几分钟。首先，将调用 Gradle 来构建你的应用。我们将在后续章节中更详细地介绍此过程，但现在你需要知道的是，Gradle
    会整合你编写的所有代码、应用引用的库、相关的 Android SDK 以及其他基础设施，并生成一个已准备好部署为你的应用的软件包。这被称为 Android
    包，即 APK。


    接下来，Android Studio 会调用你的 AVD，并在模拟器启动所需的时间后，将 Gradle 构建的 APK 复制过去。根据你的运行配置，Android
    Studio 知道你想要运行应用模块，从而有效触发你的新 MyFirstApp 应用在 AVD 中运行，就像你在 Android 启动器窗口中点击了它的图标一样。


    你的应用将运行，并且你那些不朽的文字“Hello Android！”（或你选择的任何内容）应该会出现在标题为 MyFirstApp 的应用屏幕内，正如图 3-19
    所示。


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig19_HTML.jpg](img/499629_1_En_3_Fig19_HTML.jpg)


    图 3-19


    在你的 AVD 中运行着的 MyFirstApp Android 应用


    就是这样！你已经编写并运行了你的第一个 Android 应用。做得好。深吸一口气，因为在第 4 章中，我们将深入幕后，详细检查 Android Studio
    刚刚为你构建的一切。


    # 探索你的第一个项目


    在第 3 章中，我向你介绍了如何设置编写并运行你的第一个 Android 应用在 AVD 上所需的一切，目的是让你尽快沉浸于 Android Studio、模拟器以及你的第一段编码中。我们很快取得了成果！但当你快速浏览时，几乎肯定会涌现出一大堆未解答的问题。在本章中，我们将开始更深入地探讨许多主题，首先从你的新
    Android 项目的结构和特性入手。这应该会开始回答这些问题并构建你的知识体系。


    ## 查看整个 Android 项目结构


    要熟悉 Android 项目各个部分的结构和用途，从三万英尺（或一万米，对于公制思维的人来说）的高度来观察会有所帮助。回顾上一章中项目的整体布局，发现它出奇地庞大。虽然你只编辑了一个文件，但新建项目向导为你创建了许多其他文件，并且在你创建项目时，像
    Java 库、Android SDK 等其他文件也被复制或添加了引用。


    要查看这个完整视图，请使用 Android Studio 窗口左侧的窗格（称为项目浏览器视图）来展开 `app` 文件夹；然后展开其下的文件夹，如 `manifests`、`java`
    等；以及从顶层向下的所有其他文件夹。最终你将得到一个类似于图 4-1 所示的整个项目视图（请注意，为了节省空间，我并排显示了长项目浏览器的连续视图）。


    ![../images/499629_1_En_4_Chapter/499629_1_En_4_Fig1_HTML.jpg](img/499629_1_En_4_Fig1_HTML.jpg)


    图 4-1


    项目浏览器中项目的逻辑 Android 视图


    你看到的默认视图称为 Android 视图，旨在简化项目所有组成部分的显示方式。这种简化的目标是让你能够专注于你（开发者）编写或编辑的部分，并将大部分其他支持性文件放在次要位置。


    从这个全项目 Android 视图中，你可以看到项目被分解为五个主要文件组，它们代表了项目的不同部分。

