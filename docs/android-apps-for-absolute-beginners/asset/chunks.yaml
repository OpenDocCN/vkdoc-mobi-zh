- fmt: '### Mipmaps


    你可以将`mipmap`文件夹视为`drawable`文件夹的一种特殊情况。`drawable`用于存放任何用途的图片或图形，而`mipmap`条目专门用于你的应用程序以及Android设备启动器屏幕所使用的图标文件。`ic_launcher`文件夹存放图标方形版本，`ic_launcher_round`存放相同图标的圆角版本。每个文件的多个实例以不同分辨率（显示密度）存储，Android会根据设备的显示特性以及应用程序或设备可能使用的任何显式配置覆盖，自动决定使用哪个密度版本。


    我们将在后续章节中进一步讨论显示密度及其影响。


    ### 从Values中寻找价值


    在`values`文件夹中，你会找到专门存放字符串、尺寸、样式和其他参考信息数据的文件。这种方法体现了你在几乎所有编程语言和环境中都能找到的简单抽象技术。与其在应用程序代码和配置文件中到处散布可能被多次重复使用的硬编码值，不如使用抽象来引用远离代码的值的单一定义，这样可以使代码更简洁、更不易出错。这在许多方面都有帮助，例如为创建和使用适用于多种屏幕尺寸和分辨率的资源提供了一种良好管理的机制。


    在你当前的项目中，可以看到应用程序名称存在于`strings.xml`文件中。我们可以引用`strings.xml`文件中的这个条目，而不是将`"MyFirstApp"`作为字面字符串嵌入到项目中所有需要它的地方。如果我们将来需要更改这个值，只需在一个地方进行修改，并且可以确保所有引用都会自动且正确地更新。虽然我们自己不会这样做，但这种方法在应用程序的国际化和本地化（翻译成其他语言）方面具有切实的好处。


    ### 使用Gradle文件构建一切


    到目前为止，即使是你的第一个Android应用程序，它所包含的各种类型的文件数量也已经增长到了两位数。将这些文件整合在一起，创建一个最终可用的Android应用程序，是构建系统的工作，而Android
    Studio默认依赖一个名为Gradle的构建工具集。


    `Gradle Scripts`文件夹展示了用于从各个组件构建完整应用程序所需的各种脚本。目前最值得注意的两个文件是同名的`build.gradle`文件。你会注意到第一个文件被标记为项目级别的——在本例中为`Project:
    MyFirstApp`。第二个文件被标记为`Module: app`。


    你可能会问：“为什么会有两个`build.gradle`文件？”长话短说，实际上你可能有超过两个这样的文件。你现在看到的是所有Android项目都有的一个项目级别的`build.gradle`文件。然后，你的项目定义的每个模块都有一个额外的`build.gradle`文件，允许每个模块处理任何模块特定的构建活动和参数。由于你的项目只定义了一个`"app"`模块，所以你只看到了另一个`build.gradle`文件，总共两个。随着我们本书的深入，我们将会使用包含多个模块的项目示例，届时你会在相关项目中看到更多的`build.gradle`文件。


    目前，项目级别的`build.gradle`文件最值得关注，你可以在清单[4-2](#499629_1_En_4_Chapter.xhtml#PC2)中查看其内容。


    ```

    apply plugin: ''com.android.application''

    android {

    compileSdkVersion 29

    buildToolsVersion "30.0.0"

    defaultConfig {

    applicationId "org.beginningandroid.myfirstapp"

    minSdkVersion 16

    targetSdkVersion 29

    versionCode 1

    versionName "1.0"

    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

    }

    buildTypes {

    release {

    minifyEnabled false

    proguardFiles getDefaultProguardFile(''proguard-android-optimize.txt''), ''proguard-rules.pro''

    }

    }

    }

    dependencies {

    implementation fileTree(dir: "libs", include: ["*.jar"])

    implementation ''androidx.appcompat:appcompat:1.1.0''

    implementation ''androidx.constraintlayout:constraintlayout:1.1.3''

    testImplementation ''junit:junit:4.12''

    androidTestImplementation ''androidx.test.ext:junit:1.1.1''

    androidTestImplementation ''androidx.test.espresso:espresso-core:3.2.0''

    }

    ```

    清单 4-2 项目级别的`build.gradle`文件


    你拥有各种配置设置来控制应用程序的构建方式，这些设置主要分为几个关键领域。它们是SDK版本管理和应用程序版本管理、构建目标的应用类型，以及作为项目基础所需的依赖项、插件和库的包含。


    #### 理解SDK版本参数


    你会注意到有几个参数提到了SDK版本，包括`compileSdkVersion`、`minSdkVersion`和`targetSdkVersion`。它们服务于不同但互补的目的：


    1.  `compileSdkVersion`：指示Android Studio在你实际编译和构建应用程序时使用哪个版本的SDK（从你安装的多个可能版本中选取）。通常你会选择你拥有的最新Android
    SDK版本。

    2.  `minSdkVersion`：为应用程序中原生API功能的使用设置门槛，并由此决定哪些版本的Android和Android SDK能原生支持你的应用程序。这进而设定了可以使用你应用程序的最旧设备。较新API级别引入的功能将尽可能通过支持库或Android
    Jetpack（稍后讨论）来处理。

    3.  `targetSdkVersion`：控制你的应用程序将尝试使用的最新API功能，即使`compileSdkVersion`是比它更新的版本也是如此。这意味着你可以受益于更新SDK在编译时提供的效率，但不必被迫接受应用程序行为的重大改变，直到你显式地提升`targetSdkVersion`。


    #### 理解应用程序版本管理


    在发布Android应用程序时，与几乎所有其他软件一样，版本管理的概念用于标识修复错误、添加新功能、改进现有行为等的后续版本。


    Android使用你在`build.gradle`文件中找到的两个参数。最重要的是`versionCode`参数，它传统上是跟踪应用程序的特定构建/发布版本号的参数。`versionCode`参数是一个整数，当你发布新版本时，它只应递增。


    **注意**


    在内部，从SDK版本28开始，Android还提供了更新的`versionCodeMajor`参数。这是一个`long`值，而不是`integer`，因此可以保存更大的值。目前，只有通过在Android清单XML文件中加入`versionCodeMajor="n"`表示法才能成功设置此值。Gradle构建文件目前不支持此参数。


    Android也提供了一种机制来向用户显示某种有意义的、人类可读的版本信息，这个信息源自`versionName`字符串值。如果你想尝试向用户传达关于主要版本和次要版本之类的信息（这是软件开发中的传统习惯，尽管并非必需），这对你作为开发者会有所帮助。'
  raw: '#### Mipmaps


    You can think of the `mipmap` folder as a special case of the `drawable` folder.
    Where drawables are images or artwork for any purpose, the mipmap entries are
    specifically for the icon files used for your application and an Android device’s
    launcher screen(s). The `ic_launcher` folder holds square versions of the icons,
    and the `ic_launcher_round` holds rounded versions of the same icons. Multiple
    instances of each file are stored at different resolutions (display densities),
    and Android will automatically determine which density version to use based on
    display characteristics of a device and any explicit configuration overrides an
    application or device might use.


    We will talk more about display densities and their implications in later chapters.


    #### Finding Value in Values


    Within the `values` folder , you will find files dedicated to holding data about
    strings, dimensions, styles, and other reference information. This approach embodies
    the simple abstraction technique you will find in almost all programming languages
    and environments. Rather than peppering your application code and configuration
    files with hard-coded values that might often be repeated in many places, using
    an abstraction to reference a single definition of a value away from the code
    makes for cleaner, less error-prone code. This helps in many ways, such as providing
    a well-managed mechanism for creating and using value resources for many different
    screen sizes and resolutions.


    In your current project, you can see the application name is present in the `strings.xml`
    file. Rather than embed our `"MyFirstApp"` as a literal string everywhere it is
    needed through the project, a reference to this entry in the `strings.xml` file
    can be used. If we ever need to change this value, we can do it in one place,
    and know that all references will be updated automatically and correctly. While
    we won’t be doing this ourselves, this has concrete benefits in areas such as
    internationalization and localization of your application into other languages.


    ### Building Everything with Gradle Files


    By now, your tally of the number of separate files of various types that make
    up even your first Android application is growing, well into double digits. Bringing
    all these files together to create a final, working Android application is the
    job of the build system, and Android Studio by default relies on a build toolset
    known as Gradle.


    The `Gradle Scripts` folder shows you the various scripts that exist to do the
    work of building a complete application from its constituent components. The two
    most notable files right now are the identically named `build.gradle` files .
    You’ll notice the first one flagged as being for the project – in this case, `Project:
    MyFirstApp`. The second is labeled as `Module: app`.


    “Why two `build.gradle` files?” you might ask. The long answer is that you could
    in fact have more than two. What you are seeing is the project-level `build.gradle`
    file that all Android projects have one of. Then you are seeing one additional
    `build.gradle` file for each module your project defines, allowing each module
    to handle any module-specific build activities and parameters. As your project
    only defines a single `"app"` module, you only see one more `build.gradle` file,
    giving you a total of two. As we progress through the book, we’ll work with examples
    that have multiple modules incorporated into a given project, and thus you’ll
    see additional `build.gradl`e files in the relevant projects.


    Right now, the project-level build.gradle file is of most interest, and you can
    review its contents in Listing [4-2](#499629_1_En_4_Chapter.xhtml#PC2).


    ```

    apply plugin: ''com.android.application''

    android {

    compileSdkVersion 29

    buildToolsVersion "30.0.0"

    defaultConfig {

    applicationId "org.beginningandroid.myfirstapp"

    minSdkVersion 16

    targetSdkVersion 29

    versionCode 1

    versionName "1.0"

    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

    }

    buildTypes {

    release {

    minifyEnabled false

    proguardFiles getDefaultProguardFile(''proguard-android-optimize.txt''), ''proguard-rules.pro''

    }

    }

    }

    dependencies {

    implementation fileTree(dir: "libs", include: ["*.jar"])

    implementation ''androidx.appcompat:appcompat:1.1.0''

    implementation ''androidx.constraintlayout:constraintlayout:1.1.3''

    testImplementation ''junit:junit:4.12''

    androidTestImplementation ''androidx.test.ext:junit:1.1.1''

    androidTestImplementation ''androidx.test.espresso:espresso-core:3.2.0''

    }

    Listing 4-2

    The project-level build.gradle file

    ```


    You have a variety of configuration settings that control how your application
    is built, which fall into a few key areas. These are SDK versioning and application
    versioning, the type of application build being targeted, and the inclusion of
    dependencies, plugins, and libraries that are required as the foundation for your
    project.


    #### Understanding SDK Version Parameters


    There are several parameters you’ll observe that mention SDK versions, including
    `compileSdkVersion`, `minSdkVersion`, and `targetSdkVersion`. These serve different
    but complementary purposes:


    1.  compileSdkVersion: Instructs Android Studio what version of the SDK – from
    the potentially many versions you have installed – to use when actually compiling
    and building your application. Normally you will choose the latest version of
    the Android SDK you have available.


    2.  minSdkVersion: Sets the threshold for native API feature use in your application
    and, by implication, determines the oldest versions of Android and Android SDK
    that would support your application. This in turn sets the oldest devices that
    could use your application. Features introduced in newer API levels will be handled
    by Support Libraries or Android Jetpack (discussed in a moment), where possible.


    3.  targetSdkVersion : Controls the newest API features your application will
    attempt to use, even if the `compileSdkVersion` is a later release than this.
    This means that you can benefit from efficiencies at compile time offered by newer
    SDKs, but not be forced to adopt sometimes significant changes to your application’s
    behavior until you explicitly advance the `targetSdkVersion`.


    #### Understanding Application Versioning


    When releasing Android applications, just as with almost all other software, the
    concept of versioning is used to indicate later releases that fix bugs, add new
    features, improve existing behavior, and so on.


    Android uses two parameters that you’ll find in the build.gradle file. The most
    important is the `versionCode` parameter, which traditionally has been the parameter
    that tracks the version number for a given build/release of your application.
    The `versionCode` parameter is an integer that should only ever increase as you
    release new values.


    Note


    Internally, since SDK version 28, Android has also offered the newer `versionCodeMajor`
    parameter . This is a `long` value, rather than an `integer`, so can hold much
    higher values. This can currently only be successfully set by incorporating `versionCodeMajor="n"`
    notation in your Android Manifest XML file. Gradle build files don’t currently
    support this parameter.


    Android provides a mechanism to show some kind of meaningful human-readable version
    to your users as well, sourced from the `versionName` string value. This helps
    you as a developer if you want to try to signal things like major and minor releases
    to your users, which is a traditional (though not essential) habit for software
    development.'
