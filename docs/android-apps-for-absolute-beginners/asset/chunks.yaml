  raw: '## Java, Java, Everywhere


    That catchy heading is one I mean in two ways – Java was meant to be a write-once,
    run-anywhere language. To quite a surprising degree, it has succeeded in that
    goal despite a lot of doubt, resistance, and even legal impediments. Java is also
    everywhere in the sense that it is the name of the programming language, but also
    often the shorthand name given to the software used to make that run-anywhere
    promise come true. The Java Virtual Machine (or JVM), and the way it is packaged
    for deployment on computers, is also often just referred to as Java. And as if
    that wasn’t ample opportunity for confusion, once you become immersed in Java,
    you’ll find yourself and other practitioners also referring to the core libraries
    that provide essential functionality as Java.


    Naming complications are one issue you will adapt to as a Java developer, but
    Java has also had a torrid history when it comes to how that “run-anywhere” ability
    was actually delivered. JVMs are complemented by Java distributions as either
    a runtime known as Java Runtime Environment – JRE – or full developer tooling
    known as Java Development Kit, or JDK. How versions have been and are handled
    has been one of the most twisted tales in software, such that it is not uncommon
    to find systems trying to support five parallel major versions of Java at the
    same time – Java 6, Java 8, Java 9, Java 11, and whatever Java flavor was most
    recently released.


    You are saved from some of the versioning headaches, thanks to Google’s actions,
    where Android Studio took the plunge in its version 2.3 release to implicitly
    bundle a JDK and to fully manage this for you, so you never need to roll your
    own again. However, it can sometimes be useful to test out code outside of Android
    and also to learn more about Java in non-Android applications. Later in this chapter,
    we’ll demonstrate how to do that if you are not already familiar with the approach
    and also use that as part of your springboard to learn Java – the language – if
    you are an absolute beginner in the space.


    Java Security


    This topic isn’t complete without discussing security. Whether it is as a stand-alone
    install or part of Android Studio, Java and its runtimes and JVMs have a very
    long, very troubling history of security issues. I won’t delve into the thousands
    of vulnerabilities, bugs, and exploits that have been found – and fixed! – over
    the last two decades, but I will say this. Always patch your Java installs, including
    always keeping Android Studio up to date. Always!


    To learn more about historic Java vulnerabilities that have affected Android,
    feel free to read more at [`www.beginningandroid.org`](http://www.beginningandroid.org).


    ### Android’s Java Time Warp


    When first released, Google chose the then-current version of Java as the basis
    for Android, Java version 6 – or Java 1.6 as it was known at the time. As future
    versions of Android were released, Java releases were comparatively slow-moving,
    and there was significant upside in keeping Android compatible with Java 6\. Over
    time, release patterns changed, particularly with Java, which, after slow releases
    for Java 7 and Java 8, picked up speed. We are now at Java 15 at the time of writing
    this book, but for a variety of technical and nontechnical reasons, Java compatibility
    got “stuck” in Android with Java 7 and partial support for Java 8\. If you are
    learning Java for the purposes of writing Android applications, keep this in mind!


    Concepts and features from Java 9 and beyond are simply not available for use
    when developing for Android. This means things such as modules introduced in Java
    9, data class sharing introduced in Java 10, or the enhanced safety and utility
    of switch statements from Java 12 are not at your disposal. In practice, this
    doesn’t present a huge impediment, but can take some time adjusting to if you
    are experienced with modern Java and have gotten used to the latest features it
    offers.


    ### Using a JDK Installation for Learning Java


    Thanks to Android Studio bundling the JDK with its installation, you have a ready-made
    “pure Java” environment to also use, on top of the great Android Studio IDE experience.
    To use the JDK on its own, you can look for the directory on disk where Android
    Studio places the JDK. You can find this directly from Android Studio itself,
    with any project open. Choose the `File` ➤ `Other Settings` ➤ `Default Project
    Structure` menu. You will see a dialog as shown in Figure [7-1](#499629_1_En_7_Chapter.xhtml#Fig1),
    showing the JDK location.


    ![../images/499629_1_En_7_Chapter/499629_1_En_7_Fig1_HTML.jpg](images/499629_1_En_7_Chapter/499629_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Android Studio showing the location of the JDK


    To summarize for each supported operating system for Android Studio


    *   On macOS/OSX: The JDK is found at `/Applications/Android Studio.app/Contents/jre/jdk/Contents/Home`.


    *   On Linux: The JDK location can vary depending on where you instruct the Android
    Studio installer to place the IDE, but it is found in the `./android-studio/jre`
    folder under that location.


    *   On Windows: The JDK location can vary depending on where you instruct the
    Android Studio installer to place the IDE, but by default it is in `C:\Android\Android
    Studio\jre\bin`.


    For the examples in this chapter that are pure (non-Android) Java, you can use
    a command prompt or shell to navigate to the directory via the `"cd"` command.
    You can also test to see if this directory is included in the `PATH` environment
    variable on your computer – which means your operating system will know where
    to find the JDK’s key tools regardless of what directory you are working from.
    For example, the `"which javac"` command on macOS and Linux will return a path
    to the first installation of the `javac` binary, which is the Java compiler, if
    it is found in the directories specified in `PATH`. For instance, on my MacBook
    Air, I see the following:


    ```

    $ which javac

    /usr/bin/javac

    ```


    What could be easier? Well, you might recall, in the prior heading about Java
    being everywhere, that it is common to have multiple versions of Java installed
    on the same machine and that those versions might be the full JDK, providing developer
    tools for Java, or just the JRE, which provides the runtime JVM and some supporting
    utilities, but not developer tools like the compiler.


    If you want to be absolutely certain that you are using the compiler (`javac`
    binary ) and JVM (`java` binary ) that are bundled with Android Studio, use the
    full path to those programs when calling them. For instance, to be sure I’m using
    javac from Android Studio in the following example, I would invoke it as


    ```

    $ "/Applications/Android Studio.app/Contents/jre/jdk/Contents/Home/bin/javac"
    somejavafile.java

    ```


    There are a lot of ways to interrogate which of the installed versions of Java
    you are using by default and to switch between them for various reasons – even
    within Android Studio itself. However, that’s beyond the scope of this book. For
    beginners, I’d warn against tinkering with Android Studio’s setting in this regard.'
  trans: '

    # Java，无处不在


    这个引人注目的标题有两层含义——`Java` 被设计为一种“一次编写，随处运行”的语言。尽管面临诸多质疑、阻力，甚至法律障碍，它在很大程度上仍成功实现了这一目标。同时，`Java`
    的“无处不在”还体现在：它既是编程语言的名称，也常作为实现“随处运行”承诺的软件的简称。Java 虚拟机（即 `JVM`），以及为在计算机上部署而打包的方式，也常被简称为
    `Java`。似乎这还不够令人困惑，一旦你深入接触 `Java`，你还会发现自己和其他从业者也将提供核心功能的核心库称为 `Java`。


    命名上的复杂性是你作为 `Java` 开发者需要适应的一个问题，但 `Java` 在真正实现“随处运行”能力方面，也经历了一段曲折的历史。`JVM` 配合
    `Java` 发行版使用，这些发行版要么是被称为 Java 运行时环境（`JRE`）的运行时，要么是被称为 Java 开发工具包（`JDK`）的完整开发者工具。其版本管理方式一直是软件领域最复杂的故事之一，以至于经常能发现系统试图同时支持五个主版本——`Java
    6`、`Java 8`、`Java 9`、`Java 11`，以及最新发布的某个 `Java` 版本。


    多亏了谷歌的行动，你得以避免部分版本管理的烦恼。`Android Studio` 在其 `2.3` 版本中大胆地将 `JDK` 隐式捆绑，并为你全面管理它，因此你永远无需再自行配置。然而，在
    Android 之外测试代码，以及学习非 Android 应用中的 `Java` 知识，有时仍会很有用。在本章后面，如果你还不熟悉这种方法，我们将演示如何操作，并将其作为跳板的一部分，帮助你学习
    `Java` 这门语言——如果你是绝对的初学者。


    ## Java 安全


    不讨论安全，这个话题就不完整。无论是作为独立安装还是 `Android Studio` 的一部分，`Java` 及其运行时和 `JVM` 在安全问题上都有着漫长而令人担忧的历史。我不会深入探讨过去二十年间已被发现并修复的成千上万个漏洞、缺陷和攻击手段，但我要说的是：请始终更新你的
    `Java` 安装，包括始终让 `Android Studio` 保持最新。切记！


    要了解更多曾影响 Android 的历史 `Java` 漏洞，请随意访问 [`www.beginningandroid.org`](http://www.beginningandroid.org)
    进一步阅读。


    ## Android 的 Java 时间扭曲


    在首次发布时，谷歌选择了当时主流的 `Java` 版本作为 Android 的基础，即 `Java` 版本 `6`（当时称为 `Java 1.6`）。随着未来
    Android 版本的发布，`Java` 版本的更新相对缓慢，而保持 Android 与 `Java 6` 的兼容性有显著好处。随着时间的推移，发布模式发生了变化，尤其是
    `Java`，在 `Java 7` 和 `Java 8` 的缓慢发布之后，速度加快了。在撰写本书时，我们已到了 `Java 15`，但出于各种技术和非技术原因，Android
    对 `Java` 的兼容性“卡”在了 `Java 7` 和对 `Java 8` 的部分支持上。如果你是为了编写 Android 应用而学习 `Java`，请牢记这一点！


    在开发 Android 应用时，`Java 9` 及更高版本的概念和功能根本无法使用。这意味着诸如 `Java 9` 引入的模块、`Java 10` 引入的数据类共享，或
    `Java 12` 中 `switch` 语句增强的安全性和实用性等功能，你都无法使用。在实践中，这并不构成巨大障碍，但如果你熟悉现代 `Java` 并习惯了其最新功能，可能需要一段时间来适应。


    ## 使用 JDK 安装学习 Java


    得益于 `Android Studio` 将 `JDK` 捆绑在其安装中，除了出色的 `Android Studio IDE` 体验外，你还拥有一个现成的“纯
    Java”环境可供使用。要单独使用 `JDK`，你可以查找 `Android Studio` 放置 `JDK` 的磁盘目录。你可以直接在 `Android
    Studio` 中，打开任意项目，选择 `File` ➤ `Other Settings` ➤ `Default Project Structure` 菜单来找到它。你将看到一个如图
    7-1 所示的对话框，其中显示了 `JDK` 的位置。


    ![../images/499629_1_En_7_Chapter/499629_1_En_7_Fig1_HTML.jpg](img/499629_1_En_7_Fig1_HTML.jpg)


    图 7-1


    `Android Studio` 显示 `JDK` 的位置


    总结一下，对于 `Android Studio` 支持的各操作系统：


    *   在 macOS/OSX 上：`JDK` 位于 `/Applications/Android Studio.app/Contents/jre/jdk/Contents/Home`。

    *   在 Linux 上：`JDK` 的位置可能因你指示 `Android Studio` 安装程序放置 IDE 的位置而异，但它位于该位置下的 `./android-studio/jre`
    文件夹中。

    *   在 Windows 上：`JDK` 的位置可能因你指示 `Android Studio` 安装程序放置 IDE 的位置而异，但默认位于 `C:\Android\Android
    Studio\jre\bin`。


    对于本章中纯（非 Android）`Java` 的示例，你可以使用命令提示符或 shell，通过 `cd` 命令导航到该目录。你也可以测试该目录是否已包含在计算机的
    `PATH` 环境变量中——这意味着无论你在哪个目录下工作，操作系统都知道去哪里找到 `JDK` 的关键工具。例如，在 macOS 和 Linux 上，`which
    javac` 命令会返回 `javac` 二进制文件（即 Java 编译器）第一个安装位置的路径（如果在 `PATH` 指定的目录中找到）。例如，在我的 `MacBook
    Air` 上，我看到以下内容：


    ```

    $ which javac

    /usr/bin/javac

    ```


    还有比这更简单的吗？嗯，你可能还记得，在之前关于 Java 无处不在的标题中，提到在同一个机器上安装多个 `Java` 版本是很常见的，这些版本可能是提供
    `Java` 开发工具的全功能 `JDK`，也可能只是提供运行时 `JVM` 和一些支持工具的 `JRE`，但不包括编译器这样的开发工具。


    如果你想绝对确定自己使用的是 `Android Studio` 捆绑的编译器（`javac` 二进制文件）和 `JVM`（`java` 二进制文件），则在调用这些程序时请使用它们的完整路径。例如，为了确保我在以下示例中使用的是来自
    `Android Studio` 的 `javac`，我会这样调用：


    ```

    "/Applications/Android Studio.app/Contents/jre/jdk/Contents/Home/bin/javac" somejavafile.java

    ```


    有很多方法可以查问你默认使用的是哪个安装版本的 `Java`，并且出于各种原因（甚至在 `Android Studio` 内部）在不同版本之间切换。然而，这超出了本书的范围。对于初学者，我建议不要随意修改
    `Android Studio` 在这方面的设置。

    '
- fmt: '## Your First Java Concepts in Code


    It is traditional to start learning a programming language by writing a “Hello
    World” application. We’re going to skip past that and go to a slightly more advanced
    example to show you the very basics of working Java code. Listing [7-1](#499629_1_En_7_Chapter.xhtml#PC3)
    shows the code for our sample non-Android Java application, `FirstJavaDemo`, which
    you can find in the `Ch07/FirstJavaDemo.zip`.


    ```

    import java.io.*;

    import java.util.*;

    public class FirstJavaDemo {

    public static void main(String[] args) {

    Console console = System.console();

    if (console == null) {

    System.out.println("Console not found");

    System.out.println("Please re-run from a command line, shell, or console window");

    System.exit(0);

    }

    System.out.print("Tell me something about yourself: ");

    String something = console.readLine();

    System.out.println("Interesting!  You said: " + something);

    }

    }

    Listing 7-1

    Source code from the FirstJavaDemo.java file

    ```


    In the following sections, we will step through what effect(s) individual pieces
    of this code have. At a slightly larger level, let’s walk through the whole structure
    and explain in plain English what is happening. This will then allow you to cross-reference
    a layperson explanation, with the Java-specific aspects.


    The first lines are `import` statements, instructing our program to use Java’s
    library system (where other Java capabilities are bundled for you to use, without
    having to build them all from scratch yourself). The syntax looks a little weird,
    but at its heart we are instructing Java to bring in all aspects of the `java.io`
    library and `java.util` library. These libraries handle things like file and console
    input and output and other ubiquitous features you will often want or need.


    We then have a `class` declaration. Classes are the central concept to the object-oriented
    (OO) design school of application development, and we talk more about them later
    in the chapter. Importantly, this is a class definition of my (or your) choosing.
    I chose the name `FirstJavaDemo`. The Java keyword `"public"` means that, if desired,
    other Java programs could look to import my class and reuse it.


    The body of the class and other subblocks of logic are wrapped in curly braces
    – the `{` and `}` symbols you see. These curly braces are significant punctuation
    (tokens, in the parlance of programming and compilers) and must be used to group
    nested sets of logic – be it classes, their methods, inner logic blocks such as
    loops and conditional tests, and so on.


    Next, we have the mandatory `main()` method, which we define as having a `void`
    return type, which in essence means on exit the program does not return any data
    from variables or other method calls, and taking a `String` array named `args`
    as (optional) parameter. In practice this approach is a long-term style in many
    programming languages, where parameters (or arguments) can be passed to a program
    when it first runs, to be used for any purpose the developer has in mind, such
    as to turn options on or off in the program or seed it with key startup data.


    We then define and create an object named `console` (in lowercase), based on the
    `Console` object provided by the `System.console()` method, which itself is one
    of the utilities we have access to, thanks to importing the `java.util` library.
    That method hides away a whole host of operating system interaction between the
    `FirstJavaDemo` program and the JVM to hook up your program to a console – which
    is typically a shell or command prompt window or a similarly styled part of a
    more complex program like the console window in the Android Studio IDE.


    ## Key Concepts: Data Types and Variables


    This example of a `Console` object and a working copy or container named “console”
    introduces two of the fundamental aspects of almost all programming languages,
    including Java. These concepts are variables and data types.


    A variable can be thought of as a container or a placeholder for some as-yet unspecified
    value – just as in high school mathematics or algebra. In Java, a variable is
    first defined in such a way as to identify the kind of information it will contain,
    known as its data type.


    A data type in Java is a specification of the kind of information or data used
    for a variable or in other circumstances. Data types come in two forms: The first
    are very simple data types known as primitives, which represent simple integer
    or floating-point numbers in several forms – `int`, `short`, `long`, `float`,
    and `double` – as well as simple character text known as `char` and `boolean`,
    which represents `true` or `false` values.


    The second kind of data type is a more complex object, such as in our `Console`
    case. You can think of this more complex kind of data type as a compound collection
    of multiple primitive data types and the predefined logic that can be used to
    work with that data. This is the essence of a class in Java and other object-oriented
    programming languages.


    Sometimes creating a console will fail for strange reasons – permissions issues
    are an example. We use Java’s If-Then logic to introduce a logic test, represented
    by the `==` sign, to determine if our `console` exists or is undefined – `null`
    in Java parlance. If the `console` is undefined, we use the `System.out.println()`
    method that we have access to, thanks to the import of the `java.io` library,
    and write out some helpful literal string text that is meaningful to a human who
    might read it. We then exit the program at that point using the `System.exit()`
    method.


    ## Key Concept: Branching and Looping Structures In Java – If, While, For


    The code in Listing [7-1](#499629_1_En_7_Chapter.xhtml#PC3) shows one of the main
    logic control structures in Java – the `If` statement. There are several other
    such structures that allow you to make decisions in your code based on testing
    a value and deciding on a suitable branch of logic or repeating actions based
    on testing a value until a condition changes. As well as the `If` statement, Java
    provides the `For` loop, the `While` loop, and the `Do While` loop. Each of these
    latter structures has many nuances, which we will explore later in this book,
    but about which you can learn more at [`http://en.wikibooks.org/wiki/Java_Programming/`](http://en.wikibooks.org/wiki/Java_Programming/).


    In the far more reliable and common scenario that all was well with creating the
    `console` object, we then use the `System.print()` method to print the text of
    a question in the console and the `System.readln()` method to accept a response
    typed by you and store that in a `String` variable named `something` we have defined
    as a place to hold your input text. Finally we use `System.println()` again with
    some `String` concatenation features provided by the `+` operator to respond to
    you.


    That short description should help you understand what the `FirstJavaDemo` app
    does, but does not really give you a deep feel for the Java syntax, structure,
    or rules beyond a very cursory level. We’ll build your understanding further in
    a moment. For now, let’s practice compiling and running this program.


    To compile the program, open a shell or command prompt, and if desired change
    directory to the JDK as noted earlier for your operating system. Note where on
    disk you have placed the `FirstJavaDemo.java` file from `Ch07/FirstJavaDemo.zip`.
    Then invoke the `javac` binary, passing it the full path and filename for `FirstJavaDemo.java`,
    for example, as follows on macOS or Linux:


    ```

    $ javac /FirstJavaDemo.java

    ```


    You should, after a brief moment, see the command or shell prompt return to your
    control. So what happened? The `javac` utility has processed the source code and
    generated an intermediary version of your code that the JVM can now understand
    and run. In your directory, you should see a new file, named `FirstJavaDemo.class`,
    which is the output of the `javac` command.'
