- fmt: "### 3. `android:layout_alignParentStart`: Aligns the widget’s start side with\
    \ the left side of the container, used when taking account of right-to-left and\
    \ left-to-right written scripts. For instance, in a US English left-to-right layout,\
    \ this would control the widget’s left-hand side.\n\n### 4. `android:layout_alignParentEnd`:\
    \ Aligns the widget’s end side with the left side of the container, used when\
    \ taking account of right-to-left and left-to-right written scripts.\n\n### 5.\
    \ `android:layout_centerHorizontal`: Positions the widget horizontally at the\
    \ center of the container.\n\n### 6. `android:layout_centerVertical`: Positions\
    \ the widget vertically at the center of the container. If you’d like both horizontal\
    \ and vertical centering, you can use the combined `layout_centerInParent`.\n\n\
    When determining the final position of an edge for a widget, various other attributes\
    \ are taken into account, including padding and margin widths. Be careful to allow\
    \ for these if you delve into pixel-precise relative positioning.\n\n## Controlling\
    \ Relative Layout Properties with IDs\n\nThe key to properly referring to widgets\
    \ for `RelativeLayout` purposes is to use the identity of the referred widget,\
    \ which you have already encountered: this is the `android:id` identifier of the\
    \ widget in question. For example, in the `ButtonExample` project from earlier\
    \ chapters, the button has the identifier `@+id/button`. To further control the\
    \ layout of widgets and describe their relative position to other widgets in the\
    \ layout, you will need to provide the identity of the widget in the layout container.\
    \ This is done by using the `android:id` identifier attribute on any widget that\
    \ you want to refer to.\n\nThe first time you reference an `android:id` value,\
    \ ensure you use the plus modifier (e.g., `@+id/button`). Any further references\
    \ to the same identifier (widget) can omit the plus sign. Using the plus sign\
    \ in the first reference to an identifier helps the Android linting tools detect\
    \ identifier mismatches, where you have not correctly named a widget in a layout\
    \ file. Think of this as the equivalent to declaring variables before using them.\n\
    \nWith an id in place, our preceding example `@+id/button` could now be referenced\
    \ by another widget, such as another button like `button2`, through the mechanism\
    \ of referring to that id string in its own layout-related properties.\n\nNote:\
    \ Simplistic names like `button`, `button1`, and `button2` are fine for examples\
    \ like these, but you will very much want to use meaningful widget identifiers\
    \ and names in your applications.\n\n## Relative Positioning Properties\n\nNow\
    \ that you have a firm understanding of the mechanics of identifiers, you can\
    \ appreciate the use of these six properties to control the position of widgets\
    \ relative to each other:\n\n1.  `android:layout_above`: Used to place a UI widget\
    \ above the widget referenced in the property.\n2.  `android:layout_below`: Used\
    \ to place a UI widget below the widget referenced in the property.\n3.  `android:layout_toStartOf`:\
    \ Used to indicate the end edge of this widget should be placed at the start edge\
    \ of the widget referenced in the property.\n4.  `android:layout_toEndOf`: Used\
    \ to indicate the start edge of this widget should be placed at the end edge of\
    \ the widget referenced in the property.\n5.  `android:layout_toLeftOf`: Used\
    \ to place a UI widget left of the widget referenced in the property.\n6.  `android:layout_toRightOf`:\
    \ Used to place a UI widget right of the widget referenced in the property.\n\n\
    More subtly, you can also use one of numerous other properties to control the\
    \ alignment of a widget in comparison to another. Some of these properties include:\n\
    \n1.  `android:layout_alignStart`: Flags that the widget’s starting edge should\
    \ be aligned with the start of the widget referenced in the property.\n2.  `android:layout_alignEnd`:\
    \ Flags that the widget’s ending edge should be aligned with the end of the widget\
    \ referenced in the property.\n3.  `android:layout_alignBaseline`: Flags that\
    \ the baseline of any text, regardless of borders or padding, of the two widgets\
    \ should be aligned (see in the following).\n4.  `android:layout_alignTop`: Flags\
    \ that the top of the widget should be aligned with the top of the widget referenced\
    \ in the property.\n5.  `android:layout_alignBottom`: Flags that the bottom of\
    \ the widget should be aligned with the bottom of the referenced widget in the\
    \ property.\n\n## Working with a RelativeLayout Example\n\nYou have enough coverage\
    \ of the abilities and behaviors of `RelativeLayout` to dive into a working example.\
    \ Listing [10-2](#499629_1_En_10_Chapter.xhtml#PC2) provides the layout XML using\
    \ `RelativeLayout` from the `ch10/RelativeLayoutExample` project.\n\n```\nListing\
    \ 10-2\nThe XML layout for the RelativeLayoutExample application\n```\n\nIn this\
    \ `RelativeLayoutExample` layout, we are building on your learning from earlier\
    \ chapters to provide a richer understanding. To begin, you see the root element\
    \ is `<RelativeLayout>`, which is the determining factor that this activity will\
    \ use the `RelativeLayout` approach to layout and placement. On top of the normal\
    \ boilerplate XML namespace attributes, three other attributes are introduced.\n\
    \nTo ensure the `RelativeLayout` spans the entire width available on whatever\
    \ sized screen is in use, the `android:layout_width=\"match_parent\"` attribute\
    \ is used. We can do the same for the height, but we can also tell the `RelativeLayout`\
    \ to only use as much vertical space as is required to enclose the contained widgets\
    \ – thus the use of the `android:layout_height=\"wrap_content\"` attribute.\n\n\
    Leaning on the widgets we introduced in Chapter [9](#499629_1_En_9_Chapter.xhtml),\
    \ we introduce four pieces for our activity: a `TextView` to act as our label,\
    \ an `EditText` for our editable field, and the buttons `OK` and `Cancel`.\n\n\
    For the `TextView` label, the layout directs Android to place its left edge in\
    \ alignment with the left edge of the parent `RelativeLayout`, using `android:layout_alignParentLeft=\"\
    true\"`. We also want the `TextView` to have its baseline automatically managed\
    \ once we’ve introduced the adjacent `EditText`, so we invoke the pixel-nudging\
    \ perfection using `android:layout_alignBaseline=\"@+id/entry\"`. Note that we\
    \ introduce the id with a plus sign because we haven’t yet described the `EditText`,\
    \ so we need to forewarn of its impending existence.\n\nWith the `EditText`, we\
    \ would like this to sit to the right of the label and itself sit at the top of\
    \ the layout consuming all the remaining space to the right of the `TextView`.\
    \ We instruct it to lay out to the right using `android:layout_toRightOf=\"@id/label\"\
    ` (which was already introduced, so no need to add the plus notation). We force\
    \ the `EditText` to sit as high as possible in the remaining space of the `RelativeLayout`\
    \ using `android:layout_alignParentTop=\"true\"` and take the remaining space\
    \ on the canvas to the right of the `TextView` by using `android:layout_width=\"\
    match_parent\"`. This works because we know we also asked the parent to use the\
    \ maximum available remaining space for width.\n\nFinally, we tie the position\
    \ of our two buttons to the widgets introduced earlier. We want `OK` placed below\
    \ the `EditText` and aligned with its right side, so give it the attributes `android:layout_below=\"\
    @id/entry\"` and `android:layout_alignRight=\"@id/entry\"`. We then tell Android\
    \ to place the `Cancel` button to the right of the `OK` button with the tops of\
    \ the buttons in alignment, using `android:layout_toLeft=\"@id/ok\"` and `android:layout_alignTop=\"\
    @id/ok\"`.\n\nFigure [10-4](#499629_1_En_10_Chapter.xhtml#Fig4) shows our layout\
    \ in action after we make these layout changes to a vanilla new Empty Activity\
    \ project.\n\n![../images/499629\\_1\\_En\\_10\\_Chapter/499629\\_1\\_En\\_10\\\
    _Fig4\\_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig4_HTML.jpg)\n\
    \n**Figure 10-4**  \n`RelativeLayout` in action"
