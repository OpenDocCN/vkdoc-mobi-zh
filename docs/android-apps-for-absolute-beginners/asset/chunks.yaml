- fmt: '# Managing Activity Configuration Changes


    Through the descriptions earlier in this chapter, I highlighted that the normal
    activity lifecycle has at least one exception, being an activity configuration
    change. A configuration change is typically defined as an event that affects the
    entire application, user space of Android, or entire Android device. This might
    make you think I’m talking about seismic events – an Android earthquake perhaps.
    The reality is a little more mundane. The kinds of events that are classed as
    a configuration change include changing the interface language of the device,
    plugging the device into a power source, pairing with another device, or simply
    rotating the device from portrait to landscape or vice versa.


    ## Working with the Default Approach to Configuration Change


    First, the good news: Android tracks all configuration changes that happen to
    the device for you, through the use of a notification callback to all running
    applications to inform them of a particular change. Together with this base notification,
    Android then goes to great lengths to avoid burdening you with excessive work
    to determine how the configuration change should manifest in your application.
    Android does this through leveraging existing structures in your program.


    One of the most valuable actions Android takes on your behalf is to monitor any
    configuration change that has occurred and to refer to all of the available layouts
    you have created for your application and perform all of the layout work required
    to recreate your activity with the layout that matches the result of the configuration
    change, whether that is matching a rotation to the relevant portrait/landscape
    layout, a language change from left-to-right to right-to-left, and so on.


    With layout behavior and recreation done for you, that leaves only needing to
    take care of any resource you have created or acquired for a given activity. You
    need to save and restore these as part of a configuration change, as Android destroys
    the prior activity and recreates it. Your activity gets the chance to cleanly
    save its current state and resources, so that when recreated your new activity
    can restore them to bring the activity state back to the equivalent of the pre-destruction
    state. The following callbacks cover the flow that allows you to save and restore
    state and resources across a configuration change:


    1. `onSaveInstanceState()`: When any configuration change is triggered, a call
    to `onSaveInstanceState()` is made immediately prior to Android destroying the
    current activity. That is the time to save any transient or in-use resources or
    data you need to keep. Create and use a `Bundle` object to hold all of the items
    you wish to keep, ready to then use in subsequent activity recreation. If you
    look back at the examples already shown throughout the book, you can see where
    a `Bundle` object is used at `onCreate()` time (more on that shortly). The `onSaveInstanceState()`
    superclass ancestor also performs a range of very helpful work for you behind
    the scenes, including saving view state for any object – widget, UI element, and
    so on – that has been declared with an ID, ready for recreation when needed.


    2. `onCreate()`: When it is time for an activity to come to life, it is either
    created afresh, or in our current discussion, it is passed the desired `Bundle`
    object so that resources and other data saved away can be restored. You don’t
    need to do anything more sophisticated than ensuring you call the parent class
    `super.onCreate()` method. You can always choose to add custom state and save
    it during `onSaveInstanceState()` – you would need to then provide your custom
    restore logic to `onCreate()` as well or to the next method called when (re)creating
    an activity, `onRestoreInstanceState()`.


    3. `onRestoreInstanceState()`: Your `Bundle` object is also passed to this method,
    and you can optionally retrieve and restore any further resources you wish at
    this time. One advantage of waiting until this point in the activity lifecycle
    is that you can be sure your activity’s layout has been inflated, and the content
    view set, such that all visual aspects of your activity are in place.


    ## Summary


    You now have a firm grounding in the activity lifecycle and the importance of
    the callback methods that you have available and can override when needed. We
    continue discussing lifecycles in Chapter [12](#499629_1_En_12_Chapter.xhtml)
    when we introduce fragments and will then present a consolidated example application
    that shows how and where to use lifecycle callback method overrides in real life.


    # 12. Introducing Fragments


    In our tour of Android layout fundamentals up to now, we’ve covered the essential
    View-based UI widgets and introduced activities and their lifecycle. For many
    years, this was all there was to creating applications in the Android world –
    design your activities, add the logic you desired for your application, and create
    and dispose of the resulting inflated (or rendered) activities as users moved
    through the features of your application.


    Around 2011, things exploded. Or, more specifically, screen sizes exploded with
    the emergence and popularity of tablets and their larger displays. Fast-forward
    a few years, and we have tablet-like displays in cars, giant TV screen displays,
    and more, all driven by Android. Using the sudden available screen real estate
    to maximum advantage drove Google to rush out one of the biggest changes to the
    Android UI world since its inception: fragments.


    Fragments solve many problems. From ensuring there are no vast areas of wasted
    space to overcoming brute-force scaling tricks that just look terrible, fragments
    give you the mechanism to compose UIs from multiple related sets of widgets and
    then flexibly show fragments in activities and thus be able to show more content,
    or provide more functionality, in one screen.


    ## Starting with the Fragment Class


    With the advent of large screens and user experiences that typically see much
    more device rotation – for example, reading in portrait mode, followed by watching
    a movie in landscape mode – developers have to choose between creating many more
    activities or a better way to reuse the activity collection already built for
    an application. Fragments are biased toward the latter reuse paradigm and introduce
    an intermediary layer between activities and the layout containers in which they
    are rendered and the UI widgets used for functionality. This helps reduce complexity
    while dealing with the nearly endless proliferation in screen sizes. Some aspects
    of working with your application change, in particular the lifecycle of your activities.
    We will cover that in detail next.


    ## Fragments And Backward Compatibility


    Fragments were introduced way back with the Android 3.0 release (known as Honeycomb).
    You can rely on good support in even older releases via Jetpack or the older Android
    compatibility library.


    ## Using Fragment-Based Design for Your Applications


    Before diving into fragment-centric design, you should know that using fragments
    is entirely optional. If you now love the idea of designing lots of activities,
    there is no need to move away from that approach. But if you would prefer to leverage
    the benefits fragments offer, read on.'
