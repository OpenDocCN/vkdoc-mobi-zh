  trans: '

    # 配置通知


    在正常使用应用程序的过程中，它有许多方式来呈现新的或重要信息以吸引用户的注意力。有时发生了值得注意的事情，但用户已经离开应用，或者应用处于后台或暂停状态。对于像没有界面的服务这类应用，没有正常的面向用户的可见性，因此在需要引起注意时存在额外障碍。


    Android 通过其 `NotificationManager` 系统服务来处理这些情况以及其他更多情况。你可以通过向 `getSystemService()`
    方法调用传递一个结构适当的参数，在应用程序中获取 `NotificationManager`。这可以像以下代码片段一样简单：


    ```

    getSystemService(NOTIFICATION_SERVICE)

    ```


    调用 `getSystemService()` 将为你提供一个 `NotificationManager` 对象，然后你就可以访问它提供的通知管理方法。你将与
    `NotificationManager` 对象一起使用的一些最常见方法包括：


    1.  `notify()`：顾名思义，这是用于根据你认为需要用户注意的任何触发条件或情况来激活通知的方法。它接收一个 `Notification` 对象作为参数，该对象在有效载荷中包含通知的详细信息（文本、图像等），以及你选择的希望
    Android 通知基础设施提醒用户的方式。


    2.  `cancel()`：使用此方法取消通知。Android 也可以响应用户的某些操作（例如“滑动以消除”等手势）来取消通知。


    3.  `cancelAll()`：这是最终选择！当你想要清除 `NotificationManager` 对象激活的所有通知时，只需调用 `cancelAll()`。


    # 使用通知对象自定义通知


    在通知用户方面，Android 的默认通知行为能够胜任你想要的绝大多数事情。但有时，你想更进一步，真正寻求用户的关注。`Notification` 对象提供了增强和自定义通知的方法。


    ## 了解增强通知的旧方式和新方式


    通知随着 Android 的发展而演变，因此存在原始（旧）方式，即使用单独的额外方法来调整和增强你的效果，以及更新的方式，即使用 `NotificationBuilder`
    对象一次性完成所有自定义。我将展示这两种方法，并指出，如果你的目标版本是 Android 7 之前的旧版本，那么旧方法更可能满足你的需求。


    # 为通知添加声音


    让我们从较旧的传统方法开始探索通知，特别是 Android 对多种不同类型通知的声音支持。通过利用基础 Android 层的一系列用户可配置的声音，如果你不想自己管理音频资源，就可以避免这样做。你可以通过调用
    `.defaults()` 方法让 `Notification` 对象使用设备的默认声音（无论用户是否配置），如下所示：


    ```

    Notification myNotification = new Notification(...);

    myNotification.defaults = Notification.DEFAULT_SOUND;

    ```


    你可以更进一步，通过使用指向音频资源的 `Uri` 引用（无论是你提供的原始文件或资源管理文件，还是 Android 捆绑的众多声音之一）来提供自己的声音。


    下面的示例展示了如何使用 Android 自带的“Kalimba”声音，通过 `ContentResolver` 类获取此资源的 `Uri` 并相应地分配声音：


    ```

    Notification myNotification = new Notificiation(...);

    myNotification.sound = Uri.parse(ContentResolver.SCHEME_ANDROID_RESOURCE +

    "://" +

    getPackageName() +

    "/raw/kalimba");

    ```


    由于有多种触发通知的机制，因此了解存在优先级层次结构很重要。任何通过 `.sound()` 分配的语音通知（或其他使用其相关方法的通知形式）将被通过 `.defaults()`
    方法设置的任何等效设置覆盖，前提是该调用包含通知类型的参数，例如用于声音的 `DEFAULTS_SOUND` 标志。无论你调用这些方法的顺序如何，都会发生这种情况。


    在 Android 较新的通知世界中，你通过构建一个 `NotificationBuilder` 对象来设置诸如你想使用的声音等属性，然后在设置完所有所需属性后，最终让
    `Notification` 使用该 `NotificationBuilder`。使用新方法设置声音的等效操作如下所示：


    ```

    Notification.Builder myBuilder = new Notification.Builder(this, ...)

    myBuilder.setSound(Uri.parse(ContentResolver.SCHEME_ANDROID_RESOURCE +

    "://" +

    getPackageName() +

    "/raw/kalimba"));

    ```


    # 使用设备灯光进行通知


    很少有 Android 手机或平板电脑缺乏内置 LED 灯作为前置显示屏的一部分。这种灯光可用于多种用途，包括作为通知用户的另一途径（而不只是让您忠实的作者我在凌晨
    3 点保持清醒）。可以通过基于 `Notification` 对象的配置进行设置，以多种方式控制 Android 设备的内置灯光：


    1.  当向 `.lights()` 方法传递布尔值 TRUE 时，它会激活 LED。

    2.  在支持的设备上，你可以通过 `ledARGB` 参数和与你想要使用的 RGB 颜色匹配的十六进制代码来更改 LED 的颜色。

    3.  使用 `ledOnMS` 和 `ledOffMS` 值（以毫秒为单位表示开启和关闭时间）使灯光闪烁和循环。


    对于使用 `Notification.Builder` 的较新 Android 版本，等效的方法是 `.setLights()`。你可能能开始猜测如何从直接使用基础
    `Notification` 对象的旧方法推断出使用构建器模式的新方法，反之亦然。


    **注意：** `Notification.Builder()` 方式是在 Android 8 中引入的，并且旧的样式已弃用。对于 API 级别高于 24
    的情况，你应该始终使用 `Notification.Builder()`，并让 Android 的兼容性库处理旧版本上的行为。


    除了你想使用的特定通知特效之外，请务必设置 `Notification.flags` 字段以包含 `Notification.FLASH_SHOW_LIGHTS`
    标志。在使用单色 LED 的基本设备上，你可能会发现你的颜色选择不适用，设备会改变 LED 的亮度。对于具有支持多色输出 LED 的设备，如果制造商没有包含必要的智能功能使
    `Notification` 类能够控制颜色，则在小部分情况下也会发生这种情况。还有某些设备没有用于通知的 LED，例如电视、Android Auto 系统以及一些
    Android 的嵌入式用途。鉴于这种多样化的设备格局，你应该将闪烁 LED 通知视为一种锦上添花的手段，而不是一种关键的吸引注意力的方法。


    # 振动吧！


    你的用户拥有的感官不仅仅是你可以利用来吸引他们注意力的视觉和听觉。当闪烁的灯光和引人注目的声音不够时，你可以转向振动（双关语）。Android 的原始通知模型包含一个默认标志，允许使用设备范围的默认设置来振动：


    ```

    myNotification.defaults = Notifcation.DEFAULT_VIBRATE;

    ```


    较新的通知方法使用 `Builder` 对象上的 `.setVibrate()` 方法来达到相同的效果。


    要使任何基于振动的通知实际触发物理振动，你需要在清单文件中添加以下权限：


    ```'
- fmt: '当默认振动不够时，你可以通过`.vibrate()`和`.setVibrate()`方法执行自定义振动，提供一个以毫秒为单位的`long[]`值，例如：


    ```

    new long[] {1000, 500, 1000, 500, 1000}

    ```


    是一个有效的序列，会触发三次各一秒的振动，每次振动之间有半秒的间隔。


    ## 为通知添加图标


    我们之前介绍的通知方法旨在及时吸引用户的注意。Android还提供了使用图形（图标形式）的功能，以便为用户提供关于通知的更多信息和上下文。图标是图像文件，在Android的资源管理中视为可绘制对象（drawable）。你需要提供一个`contentIntent`值，该值在用户点击你在通知中提供的图标时作为`PendingIntent`传递。这个`PendingIntent`作为一个占位符和延时函数，允许提前准备一个`Intent`，以便稍后由活动或其他技术触发。


    ### 理解`PendingIntent`


    `PendingIntent`是Android使用的一种机制，用于提前向设备上运行的其他应用或服务传递令牌或权限。通过`PendingIntent`，接收方应用可以在未来的某个时间点——无论你的应用本身是否正在运行——从你的应用中执行选定的代码片段，并使用你应用的权限来完成此操作。


    除了能够添加你选择的图标和相关的`contentIntent`，你还可以使用`tickerText`属性添加简短的文本描述。这段文本应包含你希望用户看到的最重要的通知内容，例如发送消息的联系人姓名、电子邮件主题、社交媒体帖子的标题等。`setLatestEventInfo()`方法允许你在一次调用中指定`icon`、`contentIntent`和`tickerText`这三个属性。无论你使用哪种通知模型（旧版或新版），这种`PendingIntent`方法都适用。


    ### 不同Android版本的图标尺寸


    添加图标使你可以根据所需的艺术水平定制图标，但需要注意各种Android版本，因为这会影响支持的图标图像分辨率。为了最大程度地支持Android设备及其相关的通知样式和尺寸，你应至少创建四个代表图标的可绘制对象：


    1.  一个12x19像素的边界框，内含一个12x16像素的方形图标，用于低密度屏幕。此图标应放置在`res/drawable-ldpi-v9`项目文件夹中。

    2.  一个16x25像素的边界框，内含一个16x16像素的方形图标，用于中密度屏幕。此图标应放置在`res/drawable-mdpi`文件夹中。

    3.  一个24x38像素的边界框，内含一个24x24像素的方形图标，用于高密度、超高密度和超超高密度屏幕。此图标应放置在`res/drawable-hdpi-v9`、`res/drawable-xhdpi-v9`和`res/drawable-xxhdpi-v9`文件夹中。

    4.  一个25x25像素的方形图标，适用于所有2.3版本之前的Android设备（无论这些旧设备的实际屏幕密度如何）。此图标应放置在`res/drawable`资源文件夹中。


    这些变化会随着时间而改变，Android支持不同分辨率的建议方法也是如此。因此，请务必查看Android开发者网站上关于图标样式的详细信息。该网站包含一些有用的信息，涉及在你决定不提供或无法提供应用所需的任何预期保真度级别时，如何向上和向下缩放可绘制对象。如果你跳过了其中某个图标也不必惊慌，但要注意Android会尝试缩放你提供的其他图标来填补空缺，而最终屏幕上的图像效果可能并不理想。


    ### 浮动数字以增加信息


    通知还有最后一个你可能已经见过并可能依赖的变体：应用启动器图标上的浮动数字。它提供了针对该应用的相似通知或未读/未响应通知的计数。通过设置`Notification`对象的公共数据成员`number`（你可以将其设置为任意数字），即可实现该浮动数字功能。该数字将作为叠加层显示在应用启动器图标的右上角或左上角（取决于区域设置和设备的从右到左或从左到右惯例）。默认情况下，该值未设置，Android会忽略它，除非你为`number`设置了一个值。


    ### 在API级别中引入通知渠道


    随着API 26的出现，Android摒弃了所有应用和服务共用通知空间的概念，并引入了渠道（channels）的概念。渠道的目标是允许用户（以及隐式地允许应用）将通知分组和分区到不同的组中，然后对这些组进行差异化处理。一个典型的用例是，将某些通知视为信息性通知，在“正常”时间显示，但在用户指定免打扰时段时隐藏。其他通知可以分配到“紧急关注”或“紧急情况”渠道，并以不同方式处理。由于Google不断调整和改变通知格局，渠道概念在实际应用中并未完全普及。然而，作为开发者，如果你在使用Android
    9.0、10.0、11.0或更高版本的新设备上使用任何形式的通知，都需要考虑这一点。本章后面的`NotificationBuilderExample`展示了定义和使用渠道，以及处理新旧API级别下的新旧Android设备行为是多么简单。


    ### 通知的实际应用


    你已经了解了Android在多个版本中一直依赖的原始且仍然有用的通知概念。让我们在`NotificationBuilderExample`应用中看看通知的实际使用情况，该应用位于`ch15/NotificationBuilderExample`项目文件夹中。


    我使用了一个简单的布局，为节省空间，此处省略其XML。你可以在图[15-1](#499629_1_En_15_Chapter.xhtml#Fig1)中看到UI。


    ![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig1_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig1_HTML.jpg)


    **图15-1** 基本的`NotificationBuilderExample`布局，未显示任何通知


    ### 支持创建通知的逻辑


    `NotificationBuilderExample`的核心是用户与UI交互时，将用户通知变为现实的代码，如列表[15-1](#499629_1_En_15_Chapter.xhtml#PC8)所示。'
  raw: "When the default vibration is not enough, you can perform custom\nvibration\
    \ via `.vibrate()` and `.setVibrate()`\nmethods, providing a `long[]` value in\n\
    milliseconds, for example:\n\n```\nnew long[] {1000, 500, 1000, 500, 1000}\n```\n\
    \nis a valid sequence that would trigger three one-second-long\nvibrations, with\
    \ a half-second gap between each vibration.\n\nAdding Icons for Notifications\n\
    The notification methods we’ve covered so far seek to grab the user’s\nattention\
    \ in the moment. Android also\noffers the ability to use graphics, in the form\
    \ of icons, to provide\nmore information and context to the user about a notification.\n\
    Icons are image files and therefore considered drawables for\nAndroid’s resource\
    \ management purposes. You need to provide a `contentIntent` value,\nwhich is\
    \ passed as the `PendingIntent` when\nthe user actually taps the icon you provide\
    \ in a notification. This\n`PendingIntent`\nacts as a placeholder and time-delay\
    \ function allowing an Intent to be\nprepared, so that it can later be triggered\
    \ by an activity or another\ntechnique.\n\nUnderstanding Pendingintent\n\nA PendingIntent\
    \ is a\nmechanism Android uses to pass a token, or permission in advance, to\n\
    another application or service running on the device. With a\nPendingIntent, the\
    \ receiving application can run a chosen piece of code\nfrom your application\
    \ at some future point – whether or not your\napplication itself is running –\
    \ and use the permissions of your\napplication to do so.\n\nAs well as being able\
    \ to add your chosen icon and related `contentIntent`, you\ncan also add a brief\
    \ text description with the `tickerText` attribute.\nThis text should be used\
    \ for the most important part of the notification\ntext you want the user to see,\
    \ such as the name of a contact sending a\nmessage, the subject of an email message,\
    \ the caption of a social media\npost, and so on. The `setLatestEventInfo()`\n\
    method  allows\nyou to specify all three of the `icon`, `contentIntent`, and\n\
    `tickerText` in a\nsingle call.\nThis `PendingIntent`\napproach is applicable\
    \ regardless of the notification model you are\nusing – old or new.\n\nIcon Sizes\
    \ for Different Android Versions\nAdding icons allows you to tailor icons to your\
    \ desired level of\nartistry, but there are considerations for the various versions\
    \ of\nAndroid you need to keep in mind, as these affect the resolution of icon\n\
    images supported.\n\nTo maximize the\nrange of Android devices you can support\
    \ and their related notification\nstyles and sizes, you should create at least\
    \ four drawables representing\nyour icon:\n\n1.  A 12-pixel by 19-pixel bounding\
    \ box, housing a 12-pixel square icon,\n    for use on low-density screens. This\
    \ icon would be placed in the\n    res/drawable-ldpi-v9 project folder.\n\n2.\
    \  A 16-pixel by 25-pixel bounding box, housing a 16-pixel square icon,\n    for\
    \ use on medium-density screens. This icon would be placed in the\n    res/drawable-mdpi\
    \ folder.\n\n3.  A 24-pixel by 38-pixel bounding box, housing a 24-pixel square\
    \ icon,\n    for use on high-density, extra-high-density, and\n    extra-extra-high-density\
    \ screens. This icon would be placed in the\n    res/drawable-hdpi-v9, res/drawable-xhdpi-v9,\
    \ and res/drawable-xxhdpi-v9\n    folders.\n\n4.  A 25-pixel square for all Android\
    \ versions prior to 2.3 (and\n    regardless of actual screen density on those\
    \ old devices). This would be\n    placed in the res/drawable resource folder.\n\
    \nThese variations change over time, as does Android’s suggested\napproach to\
    \ supporting different resolutions, so be sure to check the\ndetails on icon styling\
    \ at the Android developer site. The site includes\nsome useful information on\
    \ upscaling and downscaling drawables where you\ndecide you won’t, or can’t, provide\
    \ any of the expected fidelity levels\nfor your application. Don’t panic if you\
    \ skip one of these icons, but be\naware that Android will attempt to scale another\
    \ of your icons to fill\nthe gap, and the resulting on-screen image might not\
    \ be fantastic.\n\nFloating Numbers for Added Information\nThere is one last twist\
    \ to notifications you may have already seen\nand possibly have relied on. This\
    \ is the “number” overlaying a launcher\nicon for an application, which provides\
    \ a count of\nsimilar notifications, or unread/unresponded notifications, for\
    \ that\ngiven application.\nThe floating number tweak is achieved by using a public\
    \ data member\nnamed `number` of\nthe `Notification` object,\nwhich you can set\
    \ to any arbitrary number you wish. It will be displayed\nas an overlay to your\
    \ application’s launcher icon in the top-right or\ntop-left corner of the icon\
    \ (depending on locale and right-to-left or\nleft-to-right convention on the device).\
    \ By default this value is not\nset and is ignored by Android unless and until\
    \ you set a value for\nnumber.\n\nIntroducing Notification Channels in API Level\n\
    \nWith the advent of API 26, Android dispensed\nwith the notion of a common notification\
    \ space for all applications and\nservices and introduced the concept of channels.\
    \ The goal of channels is\nto allow users (and implicitly applications) to group\
    \ and partition\nnotifications into different groups and then treat those groups\n\
    differently.\nA classic use case for this is to have some notifications be\nconsidered\
    \ informational and show up at “normal” times, but to be hidden\nwhen the user\
    \ specifies a do-not-disturb period. Other notifications\ncould be assigned to\
    \ channels for “urgent attention” or “emergencies”\nand be handled in different\
    \ ways.\nAs Google is constantly adjusting and shifting the notification\nlandscape,\
    \ the channels concept has patchy use in real life. However, as\na developer,\
    \ you need to consider this if you are using any form of\nnotification on newer\
    \ devices with Android releases 9.0, 10.0, 11.0, or\nhigher.\nThe `NotificationBuilderExample`\n\
    later in the chapter shows how simple it is to define and use a channel\nand handle\
    \ behavior on old and new Android devices with old and new API\nlevel support.\n\
    \nNotifications in Action\nYou have now covered the original, and still useful,\
    \ notification\nconcepts that Android has relied on for many releases. Let’s take\
    \ a look\nat notifications in use in the `NotificationBuilderExample`\napp, which\
    \ you will find in the `ch15/NotificationBuilderExample`\nproject folder.\n\n\
    I am using a straightforward layout,\nso will omit its XML here to save space.\
    \ You can see the UI in Figure\n[15-1](#499629_1_En_15_Chapter.xhtml#Fig1).\n\n\
    ![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig1_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1\nThe basic NotificationBuilderExample layout, with no notifications\n\
    showing\n\nSupporting Logic to Create the Notifications\n\nThe heart of the `NotificationBuilderExample`\n\
    is the code that brings to life user notifications when interacting with\nthe\
    \ UI, shown in Listing [15-1](#499629_1_En_15_Chapter.xhtml#PC8)."
