    *To all the aspiring new Android developers in the world, may you have fun while
    you learn to build new and wonderful applications!*


    ## Introduction


    A book for beginners with Android development should provide enough subject matter
    to spur the imagination and lay a foundation for future learning and experimentation.
    The trick is to make sure the content doesn’t overload you, the reader, or leave
    you at your wit’s end as to how to get started.


    In this book, I have tried to balance giving you a firm foundation in the core
    concepts and techniques you will need to get started, without packing in every
    possible topic that might be of use to you eventually. That would have resulted
    in thousands and thousands more pages of content, which gets to the point of being
    counterproductive.


    You will see and create a wide range of applications based on the topics covered
    in the 20 chapters presented here, and I’ve also provided a range of pointers
    to more online content at Apress, Google, and other websites that take some of
    the topics beyond the beginner’s realm. This book is a beginning, and where you
    go from here is entirely up to you!


    ## Acknowledgments


    Writing a book during a global pandemic is a strange experience and only made
    possible with the help of all the folks at Apress and the technical reviewer.
    I’d like to thank Steve Anglin, Val Okafor, Mark Powers, Matthew Moodie, and all
    the other people at Apress who made this book a reality.


    I would also like to thank Google for continuing to make Android a fun and dynamic
    platform on which to learn to develop applications.


    ## About the Author


    ## About the Technical Reviewer


    # Part I: Get Android, Get Started


    # Chapter 1: Introducing Android


    Welcome to the start of your developer journey with Android. Perhaps you already
    own and use an Android phone, tablet, or other devices. You would be in great
    company, with over a billion devices around the world used every day based on
    the Android operating system. Even if you think you don’t already use Android,
    you may be surprised to learn that it has made its way into an astonishing range
    of devices and products, many of which you might have used without even realizing
    the power of Android was helping you out.


    Android now powers an amazing range of devices beyond phones and tablets, including
    smart watches, fitness devices, car entertainment and navigation systems, game
    consoles, toys, kitchen appliances, garden watering systems, plumbing and heating
    controls, and even barbecues! Yes, barbecues! This expansion in devices that use
    Android shows no signs of slowing down, but the most popular and likely place
    in which to find Android is still on phones and tablets. As a budding developer
    for Android, this means that you’ll learn many aspects that apply to all – or
    at least many – of the types of devices mentioned here, but your initial focus
    is likely to be best applied learning to build applications for Android phones
    and tablets.


    ## Working with Android: The Best Parts


    Mobile and smartphone development has been one of the most exciting technology
    stories of the last decade or more. You might not personally have experienced
    every twist and turn, but you are likely to have been exposed to devices across
    one or more of the recent eras of smartphones, and you have likely heard names
    like Nokia, Apple, Microsoft, Google, and Android mentioned in many combinations.


    Today, Android presents you with the benefits learned from all of the great technology
    battles between these companies and platforms over the last 10 years and lets
    you ride that wave, serving up fantastic tools, capabilities, and help to get
    you on the path to Android application development. That is perhaps Android’s
    most compelling appeal right now, as this book is written. It is neck and neck
    at the forefront of all smartphone and mobile technology (along with iOS from
    Apple), and by choosing Android, you immediately gain access to the benefits it
    provides, which include


    1. Developer tools and platforms: We’ll cover many of these items in this very
    book, from `Android Studio`, the `Android SDK`, `Google Play services`, and the
    `Google Play` online store, to name just a few.


    2. A massive existing market: I’m not joking when I say a billion-plus users are
    waiting for your application, with many more potential future users on the horizon.
    As Figure 1-1 shows, the global market penetration for Android is breathtaking.


    3. A global community of like-minded developers: You are not alone in pursuing
    your Android application development dreams. There are tens of thousands, hundreds
    of thousands, or possibly even millions of other developers who have experiences
    to share.


    4. A rock-solid technology foundation: Android started life using the Java programming
    language as the predominant technology with which to build applications. Today
    it also supports `Kotlin` and `C++`. We will stick to Java for the examples and
    techniques explored in this book, as it is one of the most widely used, widely
    respected, and mature development technologies in existence – the vast majority
    of Android applications are built with Java.


    ![../images/499629_1_En_1_Chapter/499629_1_En_1_Fig1_HTML.jpg](images/499629_1_En_1_Chapter/499629_1_En_1_Fig1_HTML.jpg)


    **Figure 1-1** Android’s global market share among smartphone users


    I could go on with more examples of the breadth and depth of the Android development
    world and its advantages, but instead I’ll let the rest of this book help demonstrate
    many more of them.'
