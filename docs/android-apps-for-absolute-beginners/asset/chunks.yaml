- fmt: '# Creating Your First Android Virtual Device


    One of the most useful features provided in the wider Android Studio integrated
    environment is the ability to create Android Virtual Devices, or AVDs. With an
    AVD, you get the ability to emulate a real Android device, controlling a range
    of its capabilities and features, without having to have an actual physical device.


    The AVD approach isn’t meant to prohibit you from using a real device on which
    to test and use your applications, but if you think about the plethora of Android
    devices, versions, and form factors that we’ve touched on in the first two chapters,
    you can see how it would be impractical for you as a developer to own even a fraction
    of the number of devices found in the wild running Android. AVDs help you bridge
    the gap between what you have (and can afford) and what your user base will actually
    be using.


    To start creating your first AVD, start Android Studio if it is not already running,
    and you will see the splash screen and then the Welcome to Android Studio screen
    as you might remember from Chapter [2](#499629_1_En_2_Chapter.xhtml). In the lower
    right of the welcome screen, you should see a cog icon and the menu option `Configure`,
    which you should click to reveal a range of configuration options as shown in
    Figure [3-1](#499629_1_En_3_Chapter.xhtml#Fig1).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig1_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    The Configuration menu from the Welcome to Android Studio screen


    You will see that the very first option on the list of configuration items presented
    is the `AVD Manager` option. Click this option, and the `AVD Manager` will start
    after a few seconds, and you should be presented with the introductory Android
    Virtual Device Manager screen shown in Figure [3-2](#499629_1_En_3_Chapter.xhtml#Fig2).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig2_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The Android Virtual Device Manager welcome screen


    In the middle of the screen, you should see the button as shown in Figure [3-2](#499629_1_En_3_Chapter.xhtml#Fig2)
    that reads `+ Create Virtual Device...`. Go ahead and click that button to start
    the AVD creation process. You will then see the Virtual Device Configuration hardware
    selection screen, as shown in Figure [3-3](#499629_1_En_3_Chapter.xhtml#Fig3).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig3_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The Select Hardware option for new AVD creation


    There is a lot going on in the hardware selection screen, but don’t feel overwhelmed.
    The multitude of options here convey the variables you will find in devices in
    the real world, so it really isn’t surprising. Let’s step through the areas one
    by one so you begin to feel at home with the `AVD Manager` and creating and using
    AVDs.


    Starting on the left-hand side of the hardware selection screen, the Category
    list provides a grouping of device emulators based on form factor and usage pattern.
    You should see at least the five normal options shown in Figure [3-3](#499629_1_En_3_Chapter.xhtml#Fig3):
    TV, Phone, Wear OS (formerly Android Wear), Tablet, and Automotive. Feel free
    to click through each of these to see how the device list (middle of the screen)
    and dimension detail window change, but when you’re done, choose Phone as the
    Category. With Phone selected, you should then see the original list of prepackaged
    emulated devices originally shown in Figure [3-3](#499629_1_En_3_Chapter.xhtml#Fig3).


    At this point, we won’t just race ahead to choose one of the first devices shown
    as the basis for our AVD. Instead, spend a moment to scroll through the list,
    and take note of a few data points that will resurface later in the book and will
    gradually make more sense and have more impact on your application design.


    From the upper end of the list of device definitions, you will see makes and models
    of smartphones and brands, some of which might be very familiar. The various Pixel
    options, like Pixel 3, Pixel 2, and so on, and AVD images emulate as near as possible
    the real, physical devices that bear those names. Similarly, Nexus 6, Nexus 5,
    and so on are virtual devices that mimic the physical characteristics of their
    namesakes, whether it is on-board storage, working memory, screen resolution,
    or other capabilities. Before you scroll to see the rest of the list, take a look
    at the values shown in the `Resolution` and `Density` columns. You’ll see measurements
    for both, expressed in pixel layout for Resolution (e.g., 1080 `×` 1920 for the
    Pixel 2 AVD) and dots per inch, or dpi, for Density (again, 420 dpi for Pixel
    2). You might be familiar with resolution and density measures for laptop or desktop
    screens and not give a second thought to the values you see here. But it is worth
    comparing these to the other AVDs in the list.


    If you scroll further toward the bottom of the list, you will start to see a range
    of more cryptic device names, as shown in Figure [3-4](#499629_1_En_3_Chapter.xhtml#Fig4).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig4_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Further AVD templates available to you


    These devices don’t have any brand names associated with them, but they do possess
    some indicators of what they offer, through using the abbreviations commonly associated
    with various screen sizes and resolutions. We will encounter these terms throughout
    this book, so for now you can bookmark names like QVGA, WQVGA, mdpi, hdpi, and
    so on and not labor over their meaning.


    As if all of those current and historic options weren’t enough, you’ll see two
    buttons below the device definition list that allow for specifying your own custom
    virtual device profile and for importing a profile from another source. For our
    purposes, these options won’t be needed, but you can appreciate the value they
    offer – in particular for those of you who might eventually want to design applications
    targeting very specific, atypical devices.


    We will revisit the concepts and principles of Android device resolution and density
    in Chapters [9](#499629_1_En_9_Chapter.xhtml), [10](#499629_1_En_10_Chapter.xhtml),
    and [11](#499629_1_En_11_Chapter.xhtml) when we delve into the depths of user
    interface design. For now, you can scroll back to the top of the device definition
    list and choose the Pixel 2 pre-configured device definition. Click the Next button,
    and you should see the System Image selection screen shown in Figure [3-5](#499629_1_En_3_Chapter.xhtml#Fig5).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig5_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    The AVD System Image selection screen in `AVD Manager`


    Choosing a system image can be considered the complementary step to your earlier
    choice of device definition. Whereas your device choice selected the hardware
    aspects of your AVD, the system image determines the key software aspects: Android
    API/SDK level and ABI, which is basically a decision of which chip architecture
    to emulate in software, Intel’s x86 or one of the Arm-based architectures, and
    which release of Android these pieces most closely match.


