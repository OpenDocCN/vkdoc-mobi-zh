    \ 活动的整个生命周期内持续存在，甚至在你将其发送到后台以使用其他应用或返回启动器主屏幕后仍然存在。亲自尝试一下，你仍应看到通知图标，如图 15-3 所示。\n\
    \n![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig3_HTML.jpg](img/499629_1_En_15_Fig3_HTML.jpg)\n\
    \n**图 15-3** 即使离开活动，通知图标仍然存在\n\n一旦通知触发，并且在之后的任何时刻，用户可以访问通知抽屉，该抽屉会收集设备上所有应用的所有通知（如果使用足够新的\
    \ API 级别和兼容设备，还可能通过渠道对它们进行分组）。在 Android 中，你可以通过“抓住”屏幕顶部的栏并将其一直拖到底部来打开通知抽屉。在图 15-4\
    \ 中，你可以看到示例通知及其我添加的附加详情，包括通知标题和附加文本。\n\n![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig4_HTML.jpg](img/499629_1_En_15_Fig4_HTML.jpg)\n\
    \n**图 15-4** 通知抽屉打开，显示我们的通知\n\n你在通知抽屉中看到的内容直接取决于正在使用的 Android 版本。前面图示中的示例来自 Android\
    \ 10.0 AVD 实例，我们的图标是从适当的屏幕密度资源中选择的，或者从与应用打包的最接近可用资源缩放而来。我们 25x25 像素的挥手图标在通知抽屉中更容易识别。标题和附加文本会与创建时传递给\
    \ `Notification` 对象的时间戳一起显示。\n\n你还会注意到，在较新版本的 Android 中，通知抽屉中显示的是数值，而不是作为图标栏中图标上的叠加层。Google\
    \ 对 Android 做出这一更改是为了处理开始涌入较小手机屏幕图标显示中的杂乱信息。通过将数字移至通知抽屉，人们的启动器屏幕变得不那么拥挤。\n\n用户可以点击图标触发后续活动，或者直接清除通知——就像他们在活动主屏幕上点击了\
    \ `Clear Notification` 按钮一样。在最近的 Android 版本中，你会在通知下方看到三个略微偏移的水平条，这是 `Dismiss All`（全部清除）选项。甚至更新的\
    \ Android 版本会在通知抽屉底部显示“清除全部”和“管理”选项。在我们的示例中，无论你选择哪种清除方式，都会在所有活动的 `NotificationManager`\
    \ 对象上触发 `cancelAll()` 方法，从而完全清除通知抽屉中的内容。\n\n一个完全清空的通知抽屉看起来就像图 15-5 中描述的那样。\n\n\
    ![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig5_HTML.jpg](img/499629_1_En_15_Fig5_HTML.jpg)\n\
    \n**图 15-5** 设备上的所有通知已被清除\n\n请注意，以这种方式清除通知不一定会清除你可能在应用中跟踪的通知计数。请记住，即使你已经切换到其他应用，Android\
    \ 也不一定会触发 `onDestroy()` 或回收应用的资源。\n\n## 总结\n\n现在，你已经对 Android 可用的通知系统有了扎实的理解，并获得了使用通知的经验。还有一些更高级的主题可以扩展通知及其用途，你可以在本书的网站\
    \ [www.beginningandroid.org](http://www.beginningandroid.org) 上找到它们。这些高级通知主题包括时间线通知、针对相关通知组或集合的捆绑通知、可展开通知，以及适用于\
    \ Wear OS 和 Android 嵌入式用途（如 Android Auto）的专用通知类型。\n\n---\n\n# 16. 使用通话探索设备能力\n\
    \n结合我们在本书中已经涵盖以及将在后续章节中涵盖的所有想法，很容易一头扎进只处理 Android 提供的出色软件平台的各种应用开发中。事实上，这非常容易，以至于你常常忽略了作为\
    \ Android 开发者所拥有的另一个巨大机会：同时使用 Android 硬件。\n\n在本章中，我们将非常简要地介绍如何开始使用设备能力——具体来说，是通话和传感器。这将会非常简短，但应该能为你提供一个起点，让你能继续独立学习更多关于硬件能力的知识。\n\
    \n## 掌控通话\n\nAndroid 从早期专注于手机的阶段已经走过了很长一段路。正如我在第 1 章中概述的那样，随着现在使用 Android 的设备数量和形态的激增，提前思考你的应用如何以及为何需要添加电话支持，以及它如何适应没有“电话”的环境和设备，是很有价值的。\n\
    \n### 指定电话支持\n\n要向 Android 表明你的应用需要访问与电话功能相关的硬件特性，你应该将以下硬件需求条目添加到你的 `AndroidManifest.xml`\
    \ 文件中：\n\n```\nandroid.hardware.telephony 特性表明你的应用需要蜂窝网络访问和支持，\n意味着可以提前引导用户判断该应用是否适合他们的设备，\n\
    例如在 Google Play 上搜索或下载应用时。\n```\n\n### 使电话支持变为可选\n\n如果你觉得将整个应用完全取决于是否拥有蜂窝网络访问权限有点极端，那你是对的。当你考虑构建一个应用，其中电话访问是锦上添花而非硬性要求时，你可以利用一些技术，在应用运行时检查电话支持，并同时处理拥有和无法访问蜂窝硬件这两种情况。\n\
    \nAndroid 使用 `PackageManager` 类来帮助检测各种硬件，从加速度计和麦克风，一直到电话硬件相关的能力。最常见的方法是使用 `hasSystemFeature()`\
    \ 方法，如清单 16-1 中的伪代码片段所示。\n\n```\nPackageManager myDevice = getPackageManager();\n\
    if (myDevice.hasSystemFeature(PackageManager.FEATURE_TELEPHONY) {\n    // 用户的设备支持电话功能\n\
    \    // 在此处添加与通话相关的逻辑\n} else {\n    // 用户的设备不支持电话功能\n    // 执行不需要拨打电话的操作\n};\n\
    ```\n\n**清单 16-1** 一个展示检测蜂窝硬件访问的代码片段\n\n你还可以检查电话支持的其他有用方面，例如网络类型和语音实现方式，例如 VoLTE、LTE、GSM、CDMA\
    \ 等。\n"
- fmt: '# Making Calls


    Now that you have the mechanism in place to determine either the requirement or
    desirability of having device call support, you can start leveraging that for
    interesting uses in your application. Thankfully, Android makes this very straightforward,
    thanks to its roots in being a smartphone operating system – the emphasis is on
    the phone.


    Android’s very helpful approach to making calls and other aspects of telephony
    easy to access and use centers on the `TelephonyManager` class. As its name suggests,
    `TelephonyManager` takes care of a range of call management and associated tasks,
    including things like call handling, call state, network details, and more. You
    will typically find yourself using these methods:


    1. `getPhoneType()`: Returns details about the phone and network, including radio
    support for GSM, LTE, and so on.


    2. `getNetworkType()`: This method provides details of the data capabilities from
    the currently connected cellular network. This is helpful in understanding classes
    of network, such as LTE, 4G, 3G, and other variants.


    3. `getCallState()`: A very handy method to help you determine if the phone is
    idle (not engaged in a call), in call setup mode, or currently in a call – known
    as being “off the hook” or “offhook.”


    To actually dial a number and start a call, you would invoke one of the `ACTION_DIAL`
    or `ACTION_CALL` intents. The use of, and differences in, these approaches will
    be covered shortly. Both approaches share a starting point of an intent that takes
    a `Uri` representing the number your user wishes to call, as a string in the format
    `tel:`*nnnnnnnn*. In the Uri string, *nnnnnnnn* represents the digits of the phone
    number to call. Seeing the process in action will help make the steps in calling
    a number clear.


    ## Caution


    It is good practice to examine the current call state before initiating any new
    calls. Android has a range of options to deal with multiple incoming and outgoing
    calls simultaneously, but that topic is firmly in the realm of advanced cellular
    wrangling and beyond the scope of this book. For now, make good use of the `getCallState()`
    method and base your actions on the results it delivers.


    ## Laying Out the CallExample Application


    The working example of a call-making application can be found in the `Ch16/CallExample`
    project. This project uses a very straightforward layout to allow you to focus
    on the calling and dialing options it exposes. To begin with, you can see the
    layout used in Listing [16-2](#499629_1_En_16_Chapter.xhtml#PC3).


    ```

    Listing 16-2

    The layout of the CallExample application

    ```


    Looking at the fields specified in the layout, you see a combination of `TextView`
    and `EditText`, which acts as the input field for the user to specify the number
    they wish to call. There are then two buttons, `"Call with ACTION DIAL"` and `"Call
    with ACTION_CALL"`, which, as you can guess, trigger the respective methods to
    fire the intent of each type and thus make the phone call.


    You can see the resulting rendered layout in Figure [16-1](#499629_1_En_16_Chapter.xhtml#Fig1).


    ![../images/499629_1_En_16_Chapter/499629_1_En_16_Fig1_HTML.jpg](images/499629_1_En_16_Chapter/499629_1_En_16_Fig1_HTML.jpg)


    *Figure 16-1 The CallExample layout for calling a number specified by the user*


    I have deliberately chosen a few new features to include in this layout, beyond
    just the parts needed to showcase calling features – let’s get those out of the
    way first. For a little variety, I have based this layout on a `LinearLayout`.
    You will see the `EditText` view with the id `phonenumber` has an attribute of
    `inputType="number"`. This will trigger Android to modify the Input Method parameters
    for this view so that input is only provided for digits and some limited punctuation.
    You can see the effect of this when running the application, as the virtual keyboard
    – or Input Method Editor (IME) – shown for input will look like a phone dialing
    pad rather than a full-blown keyboard.


    ### The Android Input Method Framework


    Android provides a very powerful abstraction layer for dealing with user input,
    so that it can work flexibly with physical keyboards, soft keyboards that appear
    on-screen, and even handwriting recognition hardware and software. This is the
    Input Method Framework. Whenever you use a view that triggers user input, you
    implicitly work with the framework by being presented one of the default editor
    views – an IME. You can live with the defaults and configure them as we have done
    in the phone dialing example, as well as for other common cases such as date input.
    You can also customize any IME to add or restrict what “keys” or values appear
    in the editor for the user to “press”. You can read more about the Input Method
    Framework and IMEs on the book’s website, at [`www.beginningandroid.org`](http://www.beginningandroid.org).


    The `usedialintent` and `usecallintent` buttons have those IDs to give a strong
    hint of what is to come when each one is clicked. Using the first button `"Call
    with ACTION_DIAL"` will follow the code path that triggers the `ACTION_DIAL` intent,
    and the `"Call with ACTION_CALL"` will similarly trigger an `ACTION_CALL` intent.
    We will cover intents in more detail in Chapter [17](#499629_1_En_17_Chapter.xhtml),
    but for now, what is the difference between the two?


    With an `ACTION_DIAL` intent, Android is notified that it needs to show an IME
    to the user, to confirm (or adjust) the number to be called before initiating
    the telephony magic behind the scenes. You can see this in Figure [16-2](#499629_1_En_16_Chapter.xhtml#Fig2)
    further on in this chapter. In the alternative scenario, triggering an `ACTION_CALL`
    intent immediately initiates the call with the number provided in the Uri, without
    any further user interface or confirmation.


    ![../images/499629_1_En_16_Chapter/499629_1_En_16_Fig2_HTML.jpg](images/499629_1_En_16_Chapter/499629_1_En_16_Fig2_HTML.jpg)


    *Figure 16-2 The CallExample application triggering ACTION_DIAL*


    There are many reasons for these two different approaches, but the main one is
    to do with ensuring the user is aware that a call is about to be initiated and
    to provide them control over the process, with `ACTION_DIAL`. This is very important
    when you consider that this is one of the built-in parts of Android that can cost
    the user real money. Making calls is cheap in some locations, but in many countries
    and areas is still something considered a nontrivial expense.


    Because `ACTION_CALL` moves immediately to make a call without the confirmation
    step offered by `ACTION_DIAL`, Android offers a measure of protection for `ACTION_CALL`
    by requiring any use of it in an application to have the `CALL_PHONE` permission
    in its manifest before a `startActivity()` call with `ACTION_CALL` intent will
    work. Note also that the `CALL_PHONE` permission is considered to be in the highest
    category of permissions due to the potential for misuse, and therefore not only
    must you have this permission in your application manifest, but at runtime your
    users will also be prompted to allow the application to make calls. Defense in
    depth, so to speak.


    ## Working Logic for the CallExample Application


    With the options for calling understood and a straightforward layout ready to
    present to our users, it is time to look at the logic to bring calling to life.
    Listing [16-3](#499629_1_En_16_Chapter.xhtml#PC4) shows the Java code to plumb
    in the logic for our `CallExample` application.'
