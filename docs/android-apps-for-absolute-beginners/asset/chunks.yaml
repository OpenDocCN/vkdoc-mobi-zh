  trans: "\n### 3. `android:layout_alignParentStart`：将微件的起始侧与容器的左侧对齐，适用于考虑从右到左和从左到右书写脚本的情况。例如，在美式英语的从左到右布局中，这将控制微件的左侧。\n\
    \n### 4. `android:layout_alignParentEnd`：将微件的结束侧与容器的左侧对齐，适用于考虑从右到左和从左到右书写脚本的情况。\n\
    \n### 5. `android:layout_centerHorizontal`：将微件水平居中放置在容器中。\n\n### 6. `android:layout_centerVertical`：将微件垂直居中放置在容器中。如果您希望同时水平和垂直居中，可以使用组合属性`layout_centerInParent`。\n\
    \n在确定微件边缘的最终位置时，会考虑各种其他属性，包括内边距和外边距宽度。如果您要进行像素级的精确相对定位，请务必注意这些属性。\n\n## 使用 ID\
    \ 控制相对布局属性\n\n为`RelativeLayout`正确引用微件的关键在于使用被引用微件的标识符，这一点您已经遇到过：即微件的`android:id`标识符。例如，在之前章节的`ButtonExample`项目中，按钮的标识符为`@+id/button`。为了进一步控制微件的布局并描述它们相对于布局中其他微件的位置，您需要提供布局容器中微件的标识符。这可以通过在任何您想要引用的微件上使用`android:id`标识符属性来实现。\n\
    \n首次引用`android:id`值时，请确保使用加号修饰符（例如`@+id/button`）。后续对同一标识符（微件）的引用可以省略加号。在首次引用标识符时使用加号有助于\
    \ Android 代码检查工具检测标识符不匹配的情况，即您未在布局文件中正确命名微件的情况。可以将其视为在使用变量前先声明变量。\n\n有了 ID 之后，我们之前的示例`@+id/button`现在可以被另一个微件（例如另一个名为`button2`的按钮）通过在其自身布局相关属性中引用该\
    \ ID 字符串的机制来引用。\n\n注意：像`button`、`button1`和`button2`这样简单的名称对于此类示例来说没有问题，但在您的应用程序中，您非常希望使用有意义的微件标识符和名称。\n\
    \n## 相对定位属性\n\n现在您已经牢固掌握了标识符的机制，可以理解使用以下六个属性来控制微件相对于彼此的位置：\n\n1.  `android:layout_above`：用于将\
    \ UI 微件放置在属性中引用的微件上方。\n2.  `android:layout_below`：用于将 UI 微件放置在属性中引用的微件下方。\n3.\
    \  `android:layout_toStartOf`：用于指示该微件的结束边缘应放置在属性中引用的微件的起始边缘处。\n4.  `android:layout_toEndOf`：用于指示该微件的起始边缘应放置在属性中引用的微件的结束边缘处。\n\
    5.  `android:layout_toLeftOf`：用于将 UI 微件放置在属性中引用的微件左侧。\n6.  `android:layout_toRightOf`：用于将\
    \ UI 微件放置在属性中引用的微件右侧。\n\n更微妙地，您还可以使用众多其他属性来控制微件相对于另一个微件的对齐方式。其中一些属性包括：\n\n1. \
    \ `android:layout_alignStart`：标记微件的起始边缘应与属性中引用的微件的起始边缘对齐。\n2.  `android:layout_alignEnd`：标记微件的结束边缘应与属性中引用的微件的结束边缘对齐。\n\
    3.  `android:layout_alignBaseline`：标记两个微件中任何文本的基线（无论边框或内边距如何）应对齐（详见下文）。\n4.  `android:layout_alignTop`：标记微件的顶部应与属性中引用的微件的顶部对齐。\n\
    5.  `android:layout_alignBottom`：标记微件的底部应与属性中引用的微件的底部对齐。\n\n## 使用 RelativeLayout\
    \ 的示例\n\n您已经了解了`RelativeLayout`的能力和行为，足以进入一个实际示例。清单 10-2 提供了来自`ch10/RelativeLayoutExample`项目、使用`RelativeLayout`的布局\
    \ XML。\n\n```\n清单 10-2\nRelativeLayoutExample 应用程序的 XML 布局\n```\n\n在这个`RelativeLayoutExample`布局中，我们基于前几章的学习内容进行构建，以提供更丰富的理解。首先，您看到根元素是`<RelativeLayout>`，这是决定该活动将使用`RelativeLayout`方法进行布局和放置的关键因素。在常规的样板\
    \ XML 命名空间属性之上，引入了另外三个属性。\n\n为了确保`RelativeLayout`跨越所用任何尺寸屏幕上的全部可用宽度，使用了`android:layout_width=\"\
    match_parent\"`属性。高度也可以这样做，但我们也可以告诉`RelativeLayout`仅使用容纳所含微件所需的垂直空间——因此使用了`android:layout_height=\"\
    wrap_content\"`属性。\n\n借助我们在第 9 章中介绍的微件，我们为活动引入了四个元素：一个用作标签的`TextView`，一个用于可编辑字段的`EditText`，以及`OK`和`Cancel`两个按钮。\n\
    \n对于`TextView`标签，布局指示 Android 将其左边缘与父`RelativeLayout`的左边缘对齐，使用`android:layout_alignParentLeft=\"\
    true\"`。我们还希望一旦引入相邻的`EditText`，`TextView`的基线就能够自动管理，因此我们使用`android:layout_alignBaseline=\"\
    @+id/entry\"`来调用像素级微调。注意，我们引入带加号的 ID，是因为我们尚未描述`EditText`，所以需要预先告知其即将存在。\n\n对于`EditText`，我们希望它位于标签的右侧，并且自身位于布局的顶部，占用`TextView`右侧的所有剩余空间。我们使用`android:layout_toRightOf=\"\
    @id/label\"`（该 ID 已引入，因此无需添加加号标记）指示它布局到右侧。我们使用`android:layout_alignParentTop=\"\
    true\"`强制`EditText`在`RelativeLayout`的剩余空间中尽可能高地放置，并通过使用`android:layout_width=\"\
    match_parent\"`占据画布上`TextView`右侧的剩余空间。这样做是可行的，因为我们知道也要求父布局使用最大可用剩余空间作为宽度。\n\n\
    最后，我们将两个按钮的位置绑定到之前引入的微件。我们希望`OK`按钮放置在`EditText`下方，并与它的右侧对齐，因此为其赋予属性`android:layout_below=\"\
    @id/entry\"`和`android:layout_alignRight=\"@id/entry\"`。然后我们告诉 Android 将`Cancel`按钮放置在`OK`按钮的右侧，并使两个按钮的顶部对齐，使用`android:layout_toLeft=\"\
    @id/ok\"`和`android:layout_alignTop=\"@id/ok\"`。\n\n图 10-4 展示了我们对一个全新的空活动项目进行这些布局更改后的布局效果。\n\
    \n![../images/499629\\_1\\_En\\_10\\_Chapter/499629\\_1\\_En\\_10\\_Fig4\\_HTML.jpg](img/499629_1_En_10_Fig4_HTML.jpg)\n\
    \n**图 10-4**  \n`RelativeLayout`的实际应用\n"
- fmt: '# Overlapping Widgets in Relative Layouts


    Each layout supported by Android provides you with specialized and unique features,
    and `RelativeLayout` is armed with some key capabilities, including the ability
    to have widgets overlap each other or appear as if one is in front of, or overlapping,
    another. This is achieved by Android tracking the child elements from the XML
    definition and applying a layer for each individual child element in the layout.
    This means that items defined later in the layout XML file will sit on top of
    older/earlier items if they use the same space within the UI.


    There’s nothing like seeing this in action to understand what this looks like
    and how this might help you in your application design. Figure [10-5](#499629_1_En_10_Chapter.xhtml#Fig5)
    shows a layout with two buttons declared, the second of which will sit in front
    of, or over, the first.


    ![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig5_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig5_HTML.jpg)


    **Figure 10-5** `RelativeLayout`’s overlapping features in action


    The sky is the limit in terms of what types of widgets, and how many, you might
    want to overlay. You might also be wondering why anyone would want to overlay
    items in this way. As well as targeting some eccentric layout ideas, the overlapping
    possibility with `RelativeLayout` means it is possible to have widgets on-screen
    but unseen, still contributing to activity behavior.


    # Lining Up with Linear Layouts


    There are times when designing layouts where you don’t need or want the sophistication
    of constrained or relative widget positioning and instead you just want to rely
    on some of the age-old tested approaches to layout. Anyone familiar with the history
    of graphics design or interface design will have heard of the box model, where
    all the items (or widgets) that compose an interface are considered as elements
    that fall into rows and columns. The `LinearLayout` follows this model and was
    the original default used by early versions of Android. It may no longer be the
    layout of the day, but you can always rely on `LinearLayout` to be supported as
    a straightforward option for tweaking how your widgets are boxed, nested, and
    so on. What `LinearLayout` lacks is some of the clever, time-saving, or useful
    features we’ve talked about in `ConstraintLayout` and `RelativeLayout`, but at
    times simple solutions are all that’s really required.


    # Mastering the Five Main Qualifiers for `LinearLayout`


    When using a `LinearLayout`, a set of five key attributes help you control pretty
    much all aspects of placement and appearance for the overall layout and any contained
    widgets:


    - **Orientation**: The first and most fundamental control for a `LinearLayout`
    is to determine whether the box model should be considered one that is filled
    horizontally, line by line, or vertically, column by column. This is known as
    orientation for a `LinearLayout`, as is controlled by the `android:orientation`
    attribute, and takes string values of either `HORIZONTAL` or `VERTICAL`. Orientation
    can also be set at runtime from your Java code, with the `setOrientation()` method
    using similar parameters.


    - **Margins**: By default, any widgets you place will have no buffer or spacing
    between them and adjacent widgets. Margin lets you control this and add a buffer
    (or margin, as the name suggests) using attributes such as `android:layout_margin`,
    which affects all sides of a widget, or one of the one-sided attributes such as
    `android:layout_marginTop`. Any margin attribute takes a pixel size as the value,
    such as 10 dip. This is conceptually similar to padding for `RelativeLayout`,
    but only applies when the widget has a nontransparent background (such as on a
    button).


    - **Fill method**: We have already introduced the notions of `wrap_content` and
    `match_parent` for `RelativeLayout`. In the `LinearLayout` approach, all widgets
    must have specified a fill method, via the attributes `android:layout_width` and
    `android:layout_height`. These can take one of three values: `wrap_content`, which
    as per your earlier understanding instructs the widget to be only as large as
    needed to accommodate the text or image content; `match_parent`, taking the maximum
    amount of space the parent makes available; or a specific pixel value, measured
    in device-independent pixels, such as 125 dip.


    - **Weight**: When two or more widgets in a `LinearLayout` both specify `match_parent`,
    which one wins? How can they both take the maximum space the parent provides?
    The answer is the `android:layout_weight` attribute, which allows you apply a
    simple number value to each widget, for example, 1, 2, 3, 4, and so on. Android
    will sum all of the weights present in the `LinearLayout` and then provide UI
    space to a widget based on its fraction of the total weights of all widgets in
    the layout. So, for instance, if we have two `TextView`s both configured to `match_parent`,
    with `android:layout_weight` of 5 for the first `TextView` and 10 for the second
    `TextView`, then the first button will get one-third of the available space (5/(5+10)),
    and the second button will get two-thirds. There are some further methods for
    setting weights, but none are as intuitive as the `android:layout_weight` approach.


    - **Gravity**: When using a `LinearLayout`, the default layout approach Android
    takes is to align all widgets from the left if using `HORIZONTAL` orientation
    and all widgets from the top if using `VERTICAL` orientation. From time to time,
    you might want to override this behavior to force a bottom-up or right-sided bias
    to your layout. The XML attribute `android:layout_gravity` allows you to control
    the behavior, as does the method `setGravity()` at runtime. Acceptable values
    for `VERTICAL` orientation for `android:layout_gravity` are `left`, `center_horizontal`,
    and `right`. For `HORIZONTAL` orientation, Android will default to aligning with
    respect to the invisible base of the text of your widgets. Use the value `center_vertical`
    to have Android use the notional center of the widget instead.


    # A `LinearLayout` Example


    Reviewing the theory of `LinearLayout`s is somewhat overwhelming to begin with,
    so it makes sense to start exploring some of the concepts to help build an intuitive
    grasp of how, when, and where to work with the key `LinearLayout` levers.


    All of the `LinearLayout` options can be daunting when thinking in purely theoretical
    terms. The dynamic example in Listing [10-3](#499629_1_En_10_Chapter.xhtml#PC3)
    shows how many of these options work.


    ```

    Listing 10-3

    Demonstrating the options provided by LinearLayout

    ```


    The example uses two straightforward building blocks to help us with understanding
    orientation and gravity. I have defined two separate `RadioGroup` widgets, such
    that the first has a set of `RadioButton`s to control orientation and the other
    a set of `RadioButton`s to control gravity. To give us a starting point, we use
    the XML definition for vertical orientation by choosing `android:orientation="vertical"`,
    which will place the `RadioGroup`s one above the other and the `RadioButton`s
    within them in vertical fashion as well.


    I then override the vertical stacking of the two radio buttons in the initial
    `RadioGroup`, switching them to horizontal layout using `android:orientation="horizontal"`.
    While I wanted to inherit the other attributes from the parent `RadioGroup`, I
    flexed the ability to override specific attributes in the child `RadioButton`s.
    Lastly, we set padding around all of our widgets of 5 dip and set the `wrap_content`
    option.'
  raw: "Overlapping Widgets in Relative Layouts\nEach layout supported by Android\
    \ provides you with specialized and\nunique features, and `RelativeLayout` is\n\
    armed with some key capabilities, including the ability to have widgets overlap\
    \ each\nother or appear as if one is in front of, or overlapping, another. This\n\
    is achieved by Android tracking the child elements from the XML\ndefinition and\
    \ applying a layer for each individual child element in the\nlayout. This means\
    \ that items defined later in the layout XML file will\nsit on top of older/earlier\
    \ items if they use the same space within the\nUI.\n\nThere’s nothing like seeing\
    \ this in action to understand what this looks\nlike and how this might help you\
    \ in your application design. Figure\n[10-5](#499629_1_En_10_Chapter.xhtml#Fig5)\
    \ shows a layout\nwith two buttons declared, the second of which will sit in front\
    \ of, or\nover, the first.\n\n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig5_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5\nRelativeLayout’s overlapping features in action\n\nThe sky is the\
    \ limit in terms of what types of widgets, and how many,\nyou might want to overlay.\
    \ You might also be wondering why anyone would\nwant to overlay items in this\
    \ way. As well as targeting some eccentric\nlayout ideas, the overlapping possibility\
    \ with `RelativeLayout` means\nit is possible to\nhave widgets on-screen but unseen,\
    \ still contributing to activity\nbehavior.\n\nLining Up with Linear Layouts\n\
    There are times when designing layouts where you don’t need or want\nthe sophistication\
    \ of constrained or relative widget positioning and\ninstead you just want to\
    \ rely on some of the age-old tested approaches\nto layout. Anyone familiar with\
    \ the history of graphics design or\ninterface design will have heard of the box\
    \ model, where all the items\n(or widgets) that compose an interface are considered\
    \ as elements that\nfall into rows and columns. The `LinearLayout` \nfollows this\
    \ model and was the original default used by early versions\nof Android. It may\
    \ no longer be the layout of the day, but you can\nalways rely on `LinearLayout`\
    \ to be\nsupported as a straightforward option for tweaking how your widgets are\n\
    boxed, nested, and so on. What `LinearLayout` lacks is\nsome of the clever, time-saving,\
    \ or useful features we’ve talked about\nin ConstraintLayout and RelativeLayout,\
    \ but at times simple solutions\nare all that’s really required.\n\nMastering\
    \ the Five Main Qualifiers for\nLinearLayout\n\nWhen using a LinearLayout, a set\
    \ of five key attributes help you control\npretty much all aspects of placement\
    \ and appearance for the overall\nlayout and any contained widgets:\n\n*   Orientation:\
    \ The first and most fundamental control for a `LinearLayout` is to\n    determine\
    \ whether the box model should be considered one that is filled\n    horizontally,\
    \ line by line, or vertically, column by column. This is\n    known as orientation\
    \ for a `LinearLayout`, as is\n    controlled by the android:orientation attribute,\
    \ and takes string values\n    of either `HORIZONTAL` or `VERTICAL`. Orientation\n\
    \    can also be set at runtime from your Java code, with the `setOrientation()`\n\
    \    method using similar parameters.\n\n*   Margins: By default, any widgets\
    \ you place will have no buffer or\n    spacing between them and adjacent widgets.\
    \ Margin lets you control this\n    and add a buffer (or margin, as the name suggests)\
    \ using attributes such\n    as `android:layout_margin`,\n    which affects all\
    \ sides of a widget, or one of the one-sided attributes\n    such as `android:layout_marginTop`.\n\
    \    Any margin attribute takes a pixel size as the value, such as 10 dip.\n \
    \   This is conceptually similar to padding for `RelativeLayout`, but\n    only\
    \ applies when the widget has a nontransparent background (such as on\n    a button).\n\
    \n*   Fill method: We have already introduced the notions of `wrap_content` and\n\
    \    `match_parent`\n    for `RelativeLayout`. In\n    the `LinearLayout`\n  \
    \  approach, all widgets must have specified a fill method, via the\n    attributes\
    \ `android:layout_width`\n    and `android:layout_height`.\n    These can take\
