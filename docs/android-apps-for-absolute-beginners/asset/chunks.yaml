- fmt: "# Creating Your First Android Application, Already!\n\nYou have all the prerequisites\
    \ in place to get started with your first Android application. There is still\
    \ a great deal to learn, but you already have the key pieces at hand, including\
    \ Android Studio and a newly created Android Virtual Device ready to try out whatever\
    \ you write. Hopefully this ready-to-go status isn’t surprising to you. I outlined\
    \ some of the benefits of IDEs in Chapter [2](#499629_1_En_2_Chapter.xhtml), and\
    \ you’re about to experience this directly in the area of setting up the scaffolding\
    \ and framework of a new application.\n\nWithout any further suspense, let’s get\
    \ started. If you have followed along with the earlier steps in this chapter,\
    \ completing the creation of an AVD, you will likely be back at the Android Studio\
    \ home screen you saw earlier in the chapter, in Figure [3-1](#499629_1_En_3_Chapter.xhtml#Fig1).\
    \ From that home screen, choose the `Start a new Android Studio project` option\
    \ at the top of the screen, and you will shortly see the first screen of the Create\
    \ New Project wizard.\n\nIf, for whatever reason, you don’t have that home screen\
    \ visible or have restarted Android Studio and it doesn’t show the home screen\
    \ wizard, you might instead be looking at an empty Android Studio screen or one\
    \ that has loaded a pre-existing project, as shown in Figure [3-9](#499629_1_En_3_Chapter.xhtml#Fig9).\n\
    \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig9_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig9_HTML.jpg)\n\
    \n*Figure 3-9*  \nAndroid Studio as it appears when the home screen disappears\n\
    \nDon’t panic! You can also initiate a new project from here, but opening the\
    \ File menu and choosing `New` ➤ `New Project`. This will also launch the Create\
    \ New Project wizard. Regardless of the path you’ve taken, you should shortly\
    \ see the wizard as shown in Figure [3-10](#499629_1_En_3_Chapter.xhtml#Fig10).\n\
    \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig10_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig10_HTML.jpg)\n\
    \n*Figure 3-10*  \nThe Create New Project wizard in Android Studio\n\nThe first\
    \ page of the wizard is already prompting you to make some choices about what\
    \ kind of application you would like to build. Across the top of the screen, you\
    \ will see device categories, such as Phone and Tablet, Wear OS, TV, and so on.\
    \ At this moment, we will stick with the Phone and Tablet wizard option. Looking\
    \ at the icons displayed beneath Phone and Tablet, you are likely scratching your\
    \ head, perplexed as to what terms like `activity`, `fragment`, and so forth mean.\
    \ Fear not. You’ll soon master these. At this stage, you can treat this screen\
    \ as Android Studio asking you exactly how much bootstrapping you want for your\
    \ new application and what ready-made pieces you would like it to put in place\
    \ on your behalf. For instance, if you anticipate making an application reliant\
    \ on maps and navigation capabilities, the Google Maps Activity template adds\
    \ in a bunch of mapping, GPS, and location support options ready-made for developers.\
    \ Other options on this screen similarly pull in other goodies, such as Ad library\
    \ support for the Google AdMob Ads Activity.\n\nWe are going to start with a very\
    \ plain, vanilla Android application, creating variants of this simple application\
    \ showing each feature discussed as we work through the coming chapters. So for\
    \ now, you can choose the Empty Activity option. Don’t let the word Empty fool\
    \ you, as the Empty Activity option still deploys much of the boilerplate and\
    \ basic project structure you need for your application. With Empty Activity selected,\
    \ click the Next button, and you should see the Configure Your Project screen,\
    \ as shown in Figure [3-11](#499629_1_En_3_Chapter.xhtml#Fig11).\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig11_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig11_HTML.jpg)\n\
    \n*Figure 3-11*  \nThe Configure Your Project screen in Android Studio\n\nThe\
    \ options shown on this screen are all that stand between you and adding your\
    \ own code and touches to your application. For your current MyFirstApp project,\
    \ you will want to specify the following settings:\n\n- **Name**: This should\
    \ be a meaningful name for your application. It’s the title that will appear on-screen\
    \ when running the app, it’s the caption that will appear under the app’s icon\
    \ from Android launcher screens, and should you even publish this app in the Google\
    \ Play store or elsewhere, it’s the name that will appear there. For our purposes,\
    \ enter `MyFirstApp` as the name.\n\n- **Package name**: In a world with tens\
    \ of thousands of developers creating hundreds of thousands of applications for\
    \ Android, how do you ensure no two apps conflict when it comes to naming? Rather\
    \ than enforce unique names (though places like Google Play do have some restrictions\
    \ in this regard), Android leverages the fundamental mechanism of package names\
    \ derived from the Java standard. We will talk more about Java package naming\
    \ in Chapter [7](#499629_1_En_7_Chapter.xhtml), so for now you can use a package\
    \ name derived from one of my own domain names – `org.beginningandroid.myfirstapp`.\n\
    \n- **Save location**: The save location is the folder on disk where the entire\
    \ hierarchy of code for this application will be stored. This will include menu\
    \ subfolders, holding contents like source code, configuration files, images,\
    \ video, and more, depending on how sophisticated we make this application. To\
    \ begin with, the space used by a new project will be under 1 MB. But this can\
    \ grow quickly, so it’s best to choose a location on disk that you know has ample\
    \ spare space. If you’re happy with the default, you can accept it – a directory\
    \ named `AndroidStudioProject/MyFirstApp` under your user’s home directory on\
    \ your operating system.\n\n- **Language**: Open the pick list you see, and you\
    \ are presented with two options: Kotlin or Java. Kotlin is a newer addition to\
    \ the family of languages that Android supports for authoring applications. Java\
    \ is the first and still by a massive margin the largest used and most popular\
    \ language for Android development. Choose Java as the language for MyFirstApp.\n\
    \n- **Minimum SDK**: Here is where our discussion of Android versions, Android\
    \ Studio versions, and Android SDK versions from Chapter [2](#499629_1_En_2_Chapter.xhtml)\
    \ and this chapter starts to pay off. Your selection here will dictate what version\
    \ of the SDK is used for this application and therefore to a large degree what\
    \ devices it will be compatible with from the history of Android devices. Newer\
    \ releases of the Android SDK provide support for newer features, whereas older\
    \ releases are more likely to be supported on older – and therefore more – devices.\
    \ You will see the additional text next to your selection that indicates what\
    \ percentage of activated Google devices in use throughout the world would support\
    \ the SDK version of your choice. There is no perfect answer to the best trade-off\
    \ between new features and broad support. For now, our initial application is\
    \ not going to use any cutting-edge features from the latest release of the Android\
    \ SDK, so you can go with the default, choosing API 16, which was first released\
    \ to coincide with the Android 4.1 Jelly Bean release from several years ago.\
    \ You can scroll through the list to choose another SDK release if you wish. If\
    \ your chosen SDK version is not currently installed on your computer, it will\
    \ be downloaded along with the steps taken to complete setting up this initial\
    \ application – be sure to account for the 100+ MB of disk space used for each\
    \ SDK version."
  raw: '## Creating Your First Android Application, Already!


    You have all the prerequisites in place to get started with your first Android
    application. There is still a great deal to learn, but you already have the key
    pieces at hand, including Android Studio and a newly created Android Virtual Device
    ready to try out whatever you write. Hopefully this ready-to-go status isn’t surprising
    to you. I outlined some of the benefits of IDEs in Chapter [2](#499629_1_En_2_Chapter.xhtml),
    and you’re about to experience this directly in the area of setting up the scaffolding
    and framework of a new application.


    Without any further suspense, let’s get started. If you have followed along with
    the earlier steps in this chapter, completing the creation of an AVD, you will
    likely be back at the Android Studio home screen you saw earlier in the chapter,
    in Figure [3-1](#499629_1_En_3_Chapter.xhtml#Fig1). From that home screen, choose
    the `Start a new Android Studio project` option at the top of the screen, and
    you will shortly see the first screen of the Create New Project wizard.


    If, for whatever reason, you don’t have that home screen visible or have restarted
    Android Studio and it doesn’t show the home screen wizard, you might instead be
    looking at an empty Android Studio screen or one that has loaded a pre-existing
    project, as shown in Figure [3-9](#499629_1_En_3_Chapter.xhtml#Fig9).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig9_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    Android Studio as it appears when the home screen disappears


    Don’t panic! You can also initiate a new project from here, but opening the File
    menu and choosing `New` ➤ `New Project`. This will also launch the Create New
    Project wizard. Regardless of the path you’ve taken, you should shortly see the
    wizard as shown in Figure [3-10](#499629_1_En_3_Chapter.xhtml#Fig10)


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig10_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    The Create New Project wizard in Android Studio


    The first page of the wizard is already prompting you to make some choices about
    what kind of application you would like to build. Across the top of the screen,
    you will see device categories, such as Phone and Tablet, Wear OS, TV, and so
    on. At this moment, we will stick with the Phone and Tablet wizard option. Looking
    at the icons displayed beneath Phone and Tablet, you are likely scratching your
    head, perplexed as to what terms like `activity`, `fragment,` and so forth mean.
    Fear not. You’ll soon master these. At this stage, you can treat this screen as
    Android Studio asking you exactly how much bootstrapping you want for your new
    application and what ready-made pieces you would like it to put in place on your
    behalf. For instance, if you anticipate making an application reliant on maps
    and navigation capabilities, the Google Maps Activity template adds in a bunch
    of mapping, GPS, and location support options ready-made for developers. Other
    options on this screen similarly pull in other goodies, such as Ad library support
    for the Google AdMob Ads Activity.


    We are going to start with a very plain, vanilla Android application, creating
    variants of this simple application showing each feature discussed as we work
    through the coming chapters. So for now, you can choose the Empty Activity option.
    Don’t let the word Empty fool you, as the Empty Activity option still deploys
    much of the boilerplate and basic project structure you need for your application.
    With Empty Activity selected, click the Next button, and you should see the Configure
    Your Project screen, as shown in Figure [3-11](#499629_1_En_3_Chapter.xhtml#Fig11).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig11_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig11_HTML.jpg)


    Figure 3-11


    The Configure Your Project screen in Android Studio


    The options shown on this screen are all that stand between you and adding your
    own code and touches to your application. For your current MyFirstApp project,
    you will want to specify the following settings:


    Name: This should be a meaningful name for your application. It’s the title that
    will appear on-screen when running the app, it’s the caption that will appear
    under the app’s icon from Android launcher screens, and should you even publish
    this app in the Google Play store or elsewhere, it’s the name that will appear
    there. For our purposes, enter `MyFirstApp` as the name.


    Package name: In a world with tens of thousands of developers creating hundreds
    of thousands of applications for Android, how do you ensure no two apps conflict
    when it comes to naming? Rather than enforce unique names (though places like
    Google Play do have some restrictions in this regard), Android leverages the fundamental
    mechanism of package names derived from the Java standard. We will talk more about
    Java package naming in Chapter [7](#499629_1_En_7_Chapter.xhtml), so for now you
    can use a package name derived from one of my own domain names – `org.beginningandroid.myfirstapp.`


    Save location: The save location is the folder on disk where the entire hierarchy
    of code for this application will be stored. This will include menu subfolders,
    holding contents like source code, configuration files, images, video, and more,
    depending on how sophisticated we make this application. To begin with, the space
    used by a new project will be under 1 MB. But this can grow quickly, so it’s best
    to choose a location on disk that you know has ample spare space. If you’re happy
    with the default, you can accept it – a directory named `AndroidStudioProject/MyFirstApp`
    under your user’s home directory on your operating system.


    Language: Open the pick list you see, and you are presented with two options:
    Kotlin or Java. Kotlin is a newer addition to the family of languages that Android
    supports for authoring applications. Java is the first and still by a massive
    margin the largest used and most popular language for Android development. Choose
    Java as the language for MyFirstApp.


    Minimum SDK: Here is where our discussion of Android versions, Android Studio
    versions, and Android SDK versions from Chapter [2](#499629_1_En_2_Chapter.xhtml)
    and this chapter starts to pay off. Your selection here will dictate what version
    of the SDK is used for this application and therefore to a large degree what devices
    it will be compatible with from the history of Android devices. Newer releases
    of the Android SDK provide support for newer features, whereas older releases
    are more likely to be supported on older – and therefore more – devices. You will
    see the additional text next to your selection that indicates what percentage
    of activated Google devices in use throughout the world would support the SDK
    version of your choice. There is no perfect answer to the best trade-off between
    new features and broad support. For now, our initial application is not going
    to use any cutting-edge features from the latest release of the Android SDK, so
    you can go with the default, choosing API 16, which was first released to coincide
    with the Android 4.1 Jelly Bean release from several years ago. You can scroll
    through the list to choose another SDK release if you wish. If your chosen SDK
    version is not currently installed on your computer, it will be downloaded along
    with the steps taken to complete setting up this initial application – be sure
    to account for the 100+ MB of disk space used for each SDK version.'
  trans: "\n# 开始创建你的第一个安卓应用！\n\n现在，你已经具备了开始创建第一个安卓应用所需的所有前提条件。虽然还有很多东西要学，但你已经掌握了关键工具，包括\
    \ Android Studio 和一个新创建的、随时可以测试你编写的任何程序的安卓虚拟设备。希望这个准备就绪的状态不会让你感到惊讶。我在第 2 章中概述了\
    \ IDE 的一些优点，而你现在即将在搭建新应用的框架和结构时直接体验到这一点。\n\n不再卖关子了，我们开始吧。如果你已经按照本章前面的步骤完成了 AVD\
    \ 的创建，那么你可能已经回到了本章前面图 3-1 所示的 Android Studio 主页画面。在该主页画面中，选择屏幕顶部的 `Start a new\
    \ Android Studio project` 选项，稍后你就会看到“创建新项目”向导的第一个界面。\n\n如果因为某种原因，你没有看到那个主页画面，或者重启了\
    \ Android Studio 但它没有显示主页向导，那么你可能会看到一个空白的 Android Studio 界面，或者一个加载了现有项目的界面，如图\
    \ 3-9 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig9_HTML.jpg](img/499629_1_En_3_Fig9_HTML.jpg)\n\
    \n*图 3-9*  \n主页画面消失后 Android Studio 的显示状态\n\n别慌！你也可以从这里启动一个新项目，方法是打开 `File` 菜单，选择\
    \ `New` ➤ `New Project`。这同样会启动“创建新项目”向导。无论你走哪条路，很快就会看到如图 3-10 所示的向导界面。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig10_HTML.jpg](img/499629_1_En_3_Fig10_HTML.jpg)\n\
    \n*图 3-10*  \nAndroid Studio 中的“创建新项目”向导\n\n向导的第一个界面已经提示你要为你想要构建的应用类型做出一些选择。在屏幕顶部，你会看到设备类别，例如“手机和平板”、“Wear\
    \ OS”、“电视”等等。目前，我们将坚持使用“手机和平板”向导选项。看着“手机和平板”下方显示的图标，你可能正在挠头，对 `activity`、`fragment`\
    \ 等术语的含义感到困惑。别担心。你很快就会掌握它们。在此阶段，你可以将这个界面理解为 Android Studio 在问你，对于你的新应用，你希望获得多少脚手架搭建工作，以及你希望它为你预先准备好哪些现成的部件。例如，如果你预计要开发一个依赖地图和导航功能的应用，“Google\
    \ Maps Activity”模板会为开发者添加一系列现成的地图、GPS 和位置支持选项。该界面上的其他选项也会相应地引入其他好东西，例如用于 Google\
    \ AdMob 广告 Activity 的 Ad 库支持。\n\n我们将从一个非常朴素、标准的安卓应用开始，创建这个简单应用的各种变体，以展示我们在后续章节中讨论的每个功能。所以现在，你可以选择“Empty\
    \ Activity”选项。不要让“Empty”这个词欺骗了你，因为“Empty Activity”选项仍然会部署你的应用所需的大部分样板代码和基本项目结构。选择“Empty\
    \ Activity”后，点击“Next”按钮，你应该会看到“配置你的项目”界面，如图 3-11 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig11_HTML.jpg](img/499629_1_En_3_Fig11_HTML.jpg)\n\
    \n*图 3-11*  \nAndroid Studio 中的“配置你的项目”界面\n\n此界面显示的选项是你将自有代码和特色添加到应用之前的最后一步。对于你当前的\
    \ `MyFirstApp` 项目，你需要指定以下设置：\n\n- **项目名**: 这应该是你的应用的一个有意义的名称。它将是运行应用时屏幕上显示的标题，是安卓启动器屏幕上应用图标下方显示的说明文字，如果你将来在\
    \ Google Play 商店或其他地方发布这个应用，它也将是那里显示的名称。为此，请输入 `MyFirstApp` 作为名称。\n\n- **包名**:\
    \ 在一个有成千上万名开发者、为安卓创建了成千上万个应用的世界里，如何确保没有两个应用在命名上产生冲突？安卓并没有强制要求使用唯一名称（尽管像 Google\
    \ Play 这样的地方在这方面确实有一些限制），而是利用了源自 Java 标准的包名这一基本机制。我们将在第 7 章详细讨论 Java 包的命名，所以现在你可以使用一个来自我个人域名的包名\
    \ – `org.beginningandroid.myfirstapp`。\n\n- **保存位置**: 保存位置是指磁盘上用于存储此应用整个代码层级结构的文件夹。这包括菜单子文件夹，其中包含源码、配置文件、图片、视频等内容，具体取决于我们将这个应用做得有多复杂。一开始，一个新项目占用的空间将低于\
    \ 1 MB。但这可能会迅速增长，所以最好选择一个你知道有充足空闲空间的磁盘位置。如果你对默认位置满意，可以接受它——即你操作系统用户主目录下的一个名为 `AndroidStudioProject/MyFirstApp`\
    \ 的目录。\n\n- **语言**: 打开你看到的选取列表，会出现两个选项：Kotlin 或 Java。Kotlin 是安卓支持的用于编写应用的语言家族中较新的一员。而\
    \ Java 是第一个，并且到目前为止，仍是安卓开发中使用最广泛、最流行的语言。为 MyFirstApp 选择 Java 作为语言。\n\n- **最低 SDK**:\
    \ 这正是我们在第 2 章和本章中讨论的安卓版本、安卓 Studio 版本和安卓 SDK 版本相关内容开始发挥作用的地方。你在此处的选择将决定此应用使用哪个版本的\
    \ SDK，进而在很大程度上决定它在安卓设备发展历史上与哪些设备兼容。较新的安卓 SDK 版本提供对较新功能的支持，而较旧的版本则更有可能在较旧（因此数量也更多）的设备上得到支持。你会在你的选择旁边看到附加文本，该文本显示了全球范围内有多少比例的在用激活谷歌设备会支持你所选的\
    \ SDK 版本。在新功能和广泛支持之间，没有完美的平衡方案。目前，我们的初始应用不会使用安卓 SDK 最新版本中的任何前沿功能，因此你可以使用默认选项，选择\
    \ API 16，该版本最初是与几年前发布的 Android 4.1 Jelly Bean 一同推出的。如果你愿意，你也可以滚动列表选择其他 SDK 版本。如果你选择的\
    \ SDK 版本当前没有安装在你的计算机上，它将在完成此初始应用设置的步骤中被下载——请务必考虑到每个 SDK 版本会占用 100 多 MB 的磁盘空间。\n"
- fmt: "### Use Legacy Android Support Libraries\n\nOver the years, Google has tried\
    \ a number of approaches to deal with the version fragmentation seen in use by\
    \ active Android devices. One approach was (and still is) to use an additional\
    \ support library not tied to any one particular SDK version and have applications\
    \ utilize this support library. The subtlety was that Google was much more able\
    \ to push updates for the support library, as compared to the Android installation\
    \ of any particular device. We will talk more about this in coming chapters when\
    \ we discuss `androidx` and `Jetpack`. For now, you can leave this setting at\
    \ the default of unchecked, meaning we won’t pull in support for these libraries.\n\
    \nYou are now one step away from a runnable Android application. Click the **Finish**\
    \ button, and Android Studio will spring to life, generating the structure and\
    \ scaffolding for your new Android application and its project folders. After\
    \ a short time, you should eventually see the full project and the full developer\
    \ interface for Android Studio appear, as shown in Figure [3-12](#499629_1_En_3_Chapter.xhtml#Fig12).\n\
    \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig12_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig12_HTML.jpg)\n\
    \n*Figure 3-12*  \nAndroid Studio showing the `MyFirstApp` project open for editing\n\
    \n### Getting Your First Code Written\n\nIf you review the layout of your new\
    \ project as shown in Figure [3-12](#499629_1_En_3_Chapter.xhtml#Fig12), you will\
    \ see a folder/directory hierarchy with all manner of names, such as `manifests`,\
    \ `java`, `res`, and more. We are going to explore the full project layout, the\
    \ directories you see, the starter files that populate them, and the pieces you\
    \ build in the very next chapter.\n\nRight now, in the interests of getting you\
    \ a working application with your own personal touch, we are going to skip the\
    \ explanations of those items and dive straight into editing your first application\
    \ component. Use the **Project** hierarchy view you see on the left of the Android\
    \ Studio layout, and click down through the `res` folder and then the `layout`\
    \ subfolder. You should see a file-like entry named `activity_main.xml` (because\
    \ these are, actually, files!). Double-click the `activity_main.xml` file, and\
    \ it will open in the editor view of Android Studio, as you can see in Figure\
    \ [3-13](#499629_1_En_3_Chapter.xhtml#Fig13).\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig13_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig13_HTML.jpg)\n\
    \n*Figure 3-13*  \nOpening your first source file in Android Studio\n\nLooking\
    \ at screenshots of code is tedious, so let’s look at the content of the `activity_main.xml`\
    \ file. Your file should look like Listing [3-1](#499629_1_En_3_Chapter.xhtml#PC1).\n\
    \n```\nListing 3-1\nThe contents of the activity_main.xml file in a new Android\
    \ Studio project\n```\n\nThere are a few different parts of this file that will\
    \ interest us in the future, but for now we are only interested in one part of\
    \ the code here, which you see in bold. You will note that about halfway through\
    \ the file is the line:\n\n```\nandroid:text=\"Hello World!\"\n```\n\nGo ahead\
    \ and edit the string within the double quotes, so instead of reading `\"Hello\
    \ World!\"`, it reads something like `\"Hello Android!\"` or whatever takes your\
    \ fancy. Once you are done editing this file, save your changes. You’ve just made\
    \ your first custom edit to an Android application!\n\n### Getting Ready to Run\
    \ Your Application\n\nYou are now ready to have Android Studio run your new application\
    \ inside the AVD emulator you created earlier in the chapter. In order for Android\
    \ Studio to do this, it needs to know what your particular preferences are when\
    \ you ask it to run the application. For example, do you just want it to run normally,\
    \ so you can interact with it, or do you want it to run in a debugging mode or\
    \ some other way that lets you carefully examine what is happening in the code\
    \ or to the interactions between your application and the Android host device,\
    \ other APIs you may be calling, or external services such as cloud-based APIs?\n\
    \nAndroid Studio controls these alternative approaches to running your applications\
    \ through what are known as run configurations. These are preset instructions\
    \ on exactly what you mean by “run” when running an application.\n\nYou can trigger\
    \ Android Studio to walk you through setting up your first run configuration by\
    \ simply trying to run your application right now. Open the `Run` menu, and choose\
    \ the `Run...` option. Without any pre-existing run configurations in place, Android\
    \ Studio will now prompt you to edit a configuration, as shown in Figure [3-14](#499629_1_En_3_Chapter.xhtml#Fig14).\n\
    \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig14_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig14_HTML.jpg)\n\
    \n*Figure 3-14*  \nThe prompt to edit your first run configuration\n\n**Note:**\
    \  \nYou can always directly edit run configurations without forcibly running\
    \ an application, by choosing the **Edit Configurations…** option from the `Run`\
    \ menu.\n\nWhichever way you’ve triggered the creation of your first run configuration,\
    \ you will see the **Run/Debug Configurations** screen displayed. The text on\
    \ that screen will indicate to click the “`+`” button to add a new configuration,\
    \ and you should do that. You will see the list of options shown in Figure [3-15](#499629_1_En_3_Chapter.xhtml#Fig15).\n\
    \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig15_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig15_HTML.jpg)\n\
    \n*Figure 3-15*  \nSelecting a new base run configuration\n\nChoose the **Android\
    \ App** option at the top of the list presented, and you will then see the detailed\
    \ configuration screen as shown in Figure [3-16](#499629_1_En_3_Chapter.xhtml#Fig16).\n\
    \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig16_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig16_HTML.jpg)\n\
    \n*Figure 3-16*  \nDetailed configuration for a new run configuration\n\nThere\
    \ are two settings you will need to make. The first setting is to provide your\
    \ run configuration with a memorable name. I am going to suggest you use the name\
    \ **Run Config 1**. Next, you need to nominate which module of code the run configuration\
    \ should initiate when running your application. The only option in the list is\
    \ `app`, which is fortunate, as that’s the option you want. You can see both of\
    \ these settings in Figure [3-16](#499629_1_En_3_Chapter.xhtml#Fig16).\n\nClick\
    \ the **Apply** and **OK** buttons to save away your configuration."
  raw: 'Use legacy android.support libraries: Over the years, Google has tried a number
    of approaches to deal with the version fragmentation seen in use by active Android
    devices. One approach was (and still is) to use an additional support library
    not tied to any one particular SDK version and have applications utilize this
    support library. The subtlety was that Google was much more able to push updates
    for the support library, as compared to the Android installation of any particular
    device. We will talk more about this in coming chapters when we discuss androidx
    and Jetpack. For now, you can leave this setting at the default of unchecked,
    meaning we won’t pull in support for these libraries.


    You are now one step away from a runnable Android application. Click the Finish
    button, and Android Studio will spring to life, generating the structure and scaffolding
    for your new Android application and its project folders. After a short time,
    you should eventually see the full project and the full developer interface for
    Android Studio appear, as shown in Figure [3-12](#499629_1_En_3_Chapter.xhtml#Fig12).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig12_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig12_HTML.jpg)


    Figure 3-12


    Android Studio showing the MyFirstApp project open for editing


    ### Getting Your First Code Written


    If you review the layout of your new project as shown in Figure [3-12](#499629_1_En_3_Chapter.xhtml#Fig12),
    you will see a folder/directory hierarchy with all manner of names, such as `manifests`,
    `java` , `res,` and more. We are going to explore the full project layout, the
    directories you see, the starter files that populate them, and the pieces you
    build in the very next chapter.


    Right now, in the interests of getting you a working application with your own
    personal touch, we are going to skip the explanations of those items and dive
    straight into editing your first application component. Use the Project hierarchy
    view you see on the left of the Android Studio layout, and click down through
    the `res` folder and then the `layout` subfolder. You should see a file-like entry
    named `activity_main.xml` (because these are, actually, files!). Double-click
    the `activity_main.xml` file, and it will open in the editor view of Android Studio,
    as you can see in Figure [3-13](#499629_1_En_3_Chapter.xhtml#Fig13).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig13_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Opening your first source file in Android Studio


    Looking at screenshots of code is tedious, so let’s look at the content of the
    `activity_main.xml` file. Your file should look like Listing [3-1](#499629_1_En_3_Chapter.xhtml#PC1).


    ```


    Listing 3-1

    The contents of the activity_main.xml file in a new Android Studio project

    ```


    There are a few different parts of this file that will interest us in the future,
    but for now we are only interested in one part of the code here, which you see
    in bold. You will note that about halfway through the file is the line


    ```

    android:text="Hello World!"

    ```


    Go ahead and edit the string within the double quotes, so instead of reading `"Hello
    World!"`, it reads something like `"Hello Android!"` or whatever takes your fancy.
    Once you are done editing this file, save your changes. You’ve just made your
    first custom edit to an Android application!


    ### Getting Ready to Run Your Application


    You are now ready to have Android Studio run your new application inside the AVD
    emulator you created earlier in the chapter. In order for Android Studio to do
    this, it needs to know what your particular preferences are when you ask it to
    run the application. For example, do you just want it to run normally, so you
    can interact with it, or do you want it to run in a debugging mode or some other
    way that lets you carefully examine what is happening in the code or to the interactions
    between your application and the Android host device, other APIs you may be calling,
    or external services such as cloud-based APIs?


    Android Studio controls these alternative approaches to running your applications
    through what are known as run configurations. These are preset instructions on
    exactly what you mean by “run” when running an application.


    You can trigger Android Studio to walk you through setting up your first run configuration
    by simply trying to run your application right now. Open the `Run` menu, and choose
    the `Run...` option. Without any pre-existing run configurations in place, Android
    Studio will now prompt you to edit a configuration, as shown in Figure [3-14](#499629_1_En_3_Chapter.xhtml#Fig14).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig14_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig14_HTML.jpg)


    Figure 3-14


    The prompt to edit your first run configuration


    Note


    You can always directly edit run configurations without forcibly running an application,
    by choosing the Edit Configurations… option from the Run menu.


    Whichever way you’ve triggered the creation of your first run configuration, you
    will see the Run/Debug Configurations screen displayed. The text on that screen
    will indicate to click the “`+`” button to add a new configuration, and you should
    do that. You will see the list of options shown in Figure [3-15](#499629_1_En_3_Chapter.xhtml#Fig15).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig15_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig15_HTML.jpg)


    Figure 3-15


    Selecting a new base run configuration


    Choose the Android App option at the top of the list presented, and you will then
    see the detailed configuration screen as shown in Figure [3-16](#499629_1_En_3_Chapter.xhtml#Fig16).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig16_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig16_HTML.jpg)


    Figure 3-16


    Detailed configuration for a new run configuration


    There are two settings you will need to make. The first setting is to provide
    your run configuration with a memorable name. I am going to suggest you use the
    name Run Config 1. Next, you need to nominate which module of code the run configuration
    should initiate when running your application. The only option in the list is
    app, which is fortunate, as that’s the option you want. You can see both of these
    settings in Figure [3-16](#499629_1_En_3_Chapter.xhtml#Fig16).


    Click the Apply and OK buttons to save away your configuration.'
  trans: "\n### 使用旧版 Android 支持库\n\n多年来，Google 尝试了多种方法来应对活跃 Android 设备中存在的版本碎片化问题。其中一种方法（至今仍在使用）是使用一个不绑定于特定\
    \ SDK 版本的额外支持库，并让应用程序利用这个支持库。其精妙之处在于，与任何特定设备的 Android 系统安装相比，Google 能够更频繁地推送支持库的更新。在接下来的章节中，当我们讨论\
    \ `androidx` 和 `Jetpack` 时，将会对此进行更多介绍。现在，你可以将此设置保留为默认的未选中状态，这意味着我们不会引入对这些库的支持。\n\
    \n现在，距离构建一个可运行的 Android 应用程序仅一步之遥。点击 **Finish** 按钮，Android Studio 将启动工作，为你的新 Android\
    \ 应用程序及其项目文件夹生成结构和脚手架。稍等片刻，你最终应该会看到完整的项目以及 Android Studio 的完整开发者界面，如图 3-12 所示。\n\
    \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig12_HTML.jpg](img/499629_1_En_3_Fig12_HTML.jpg)\n\
    \n*图 3-12*  \nAndroid Studio 显示打开 `MyFirstApp` 项目以供编辑\n\n### 编写你的第一段代码\n\n如果你查看图\
    \ 3-12 所示的新项目布局，你会看到一个包含各种名称（如 `manifests`、`java`、`res` 等）的文件夹/目录层级结构。我们将在下一章中全面探讨项目布局、你所看到的目录、填充其中的起始文件以及你需要构建的各个部分。\n\
    \n现在，为了让你能够构建一个带有个人印记的可运行应用程序，我们将跳过对这些内容的解释，直接开始编辑你的第一个应用程序组件。使用你在 Android Studio\
    \ 布局左侧看到的 **Project** 层级视图，点击展开 `res` 文件夹，然后是 `layout` 子文件夹。你应该会看到一个名为 `activity_main.xml`\
    \ 的文件条目（实际上，这些**就是**文件！）。双击 `activity_main.xml` 文件，它将在 Android Studio 的编辑器视图中打开，如图\
    \ 3-13 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig13_HTML.jpg](img/499629_1_En_3_Fig13_HTML.jpg)\n\
    \n*图 3-13*  \n在 Android Studio 中打开你的第一个源文件\n\n查看代码截图很繁琐，所以我们直接来看 `activity_main.xml`\
    \ 文件的内容。你的文件内容应该类似于代码清单 3-1。\n\n```\n代码清单 3-1\n新 Android Studio 项目中 activity_main.xml\
    \ 文件的内容\n```\n\n这个文件中有几个部分将来会引起我们的兴趣，但现在我们只关注代码中加粗显示的那一部分。你会注意到，在文件中间附近有一行：\n\n\
    ```\nandroid:text=\"Hello World!\"\n```\n\n继续编辑双引号内的字符串，将 `\"Hello World!\"` 修改为你喜欢的文本，比如\
    \ `\"Hello Android!\"` 等。编辑完这个文件后，保存你的更改。你已经完成了对 Android 应用程序的第一次自定义编辑！\n\n###\
    \ 准备运行你的应用程序\n\n现在，你可以让 Android Studio 在本章前面创建的 AVD 模拟器中运行你的新应用程序了。为了让 Android\
    \ Studio 做到这一点，它需要知道当你要求它运行应用程序时的具体偏好。例如，你是只想让它正常运行以便与之交互，还是希望它以调试模式或其他方式运行，从而让你仔细检查代码中发生的事情、应用程序与\
    \ Android 宿主机、你可能调用的其他 API 或诸如云端 API 等外部服务之间的交互？\n\nAndroid Studio 通过所谓的“运行配置”来控制这些不同的应用程序运行方式。这些配置是预设的指令，用于精确指定运行应用程序时“运行”的具体含义。\n\
    \n你可以立即尝试运行你的应用程序，从而触发 Android Studio 引导你设置第一个运行配置。打开 `Run` 菜单，选择 `Run...` 选项。由于尚未存在任何运行配置，Android\
    \ Studio 将提示你编辑一个配置，如图 3-14 所示。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig14_HTML.jpg](img/499629_1_En_3_Fig14_HTML.jpg)\n\
    \n*图 3-14*  \n提示你编辑第一个运行配置\n\n**注意：**  \n你总是可以通过从 `Run` 菜单中选择 **Edit Configurations…**\
    \ 选项，直接编辑运行配置，而无需强制运行应用程序。\n\n无论你通过哪种方式触发创建第一个运行配置，都会看到 **Run/Debug Configurations**\
    \ 屏幕显示出来。该屏幕上的文字会提示你点击“`+`”按钮来添加新配置，请照做。你将看到如图 3-15 所示的选项列表。\n\n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig15_HTML.jpg](img/499629_1_En_3_Fig15_HTML.jpg)\n\
    \n*图 3-15*  \n选择一个新的基础运行配置\n\n在显示的列表顶部选择 **Android App** 选项，然后你将看到如图 3-16 所示的详细配置屏幕。\n\
    \n![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig16_HTML.jpg](img/499629_1_En_3_Fig16_HTML.jpg)\n\
    \n*图 3-16*  \n新运行配置的详细设置\n\n你需要进行两项设置。第一项是为你的运行配置提供一个易于记忆的名称。我建议你使用名称 **Run Config\
    \ 1**。接下来，你需要指定运行配置在运行你的应用程序时应启动哪个代码模块。列表中唯一的选项是 `app`，幸运的是，这正是你想要的选项。你可以在图 3-16\
    \ 中看到这两项设置。\n\n点击 **Apply** 和 **OK** 按钮保存你的配置。\n"
- fmt: '# Installing (Additional) SDK Packages


    Depending on how you choose your application’s minimum SDK setting earlier in
    this chapter and the options you selected when first installing Android Studio,
    you might not have the relevant SDK bundle installed on your machine for Android
    Studio to use in building your application. You can spot this easily, as your
    default view in Android Studio includes the current build status in the lower
    left of the screen.


    If you look at the “Build: Sync” area and see an error or warning worded as follows,
    you likely need to download an SDK package to match the one selected for your
    project:


    ```

    License for package Android SDK Platform 29 not accepted

    ```


    or


    ```

    Module ''app'': platform ''android-29'' not found

    ```


    The version number mentioned in the warnings or errors might differ in your installation.
    Whatever the version, this is easily fixed by invoking the SDK Manager feature
    (yet another piece of integration offered by the IDE). From the Tools menu of
    Android Studio, choose the SDK Manager option, and you should see the SDK Manager
    appear as shown in Figure [3-17](#499629_1_En_3_Chapter.xhtml#Fig17).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig17_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig17_HTML.jpg)


    Figure 3-17


    The Android SDK Manager


    To add the SDK needed for your project, simply check the box next to the relevant
    version – in my case, that is “Android 10.0 (Q),” which equates to API level 29
    or, in other words, version 29 of the Android SDK. Click the Apply button, and
    the SDK Manager will then trigger the download of this version of the SDK. If
    you sit back and think about it for a moment, you will realize that as you build
    more and more applications and potentially choose different target SDK versions
    for them, you will likely end up with quite a few different versions of the Android
    SDK installed on your machine, and together, these will take a considerable amount
    of disk space. We’ll revisit this topic in Chapter [6](#499629_1_En_6_Chapter.xhtml),
    when we look in depth at your overall developer system setup.


    Once the download of any needed Android SDK version is complete, you should see
    the status as shown in Figure [3-18](#499629_1_En_3_Chapter.xhtml#Fig18).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig18_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig18_HTML.jpg)


    Figure 3-18


    The Android SDK Manager indicating successful download and install of a new SDK
    version


    At this point, you will need to have Android Studio refresh the configuration
    for the integrated Gradle build tool so it realizes the new SDK is in place. Android
    Studio can take all the necessary steps to do this – so don’t panic at this point
    if you know nothing about Gradle as a build tool. Simply open the `File` menu,
    and select the option that reads `Sync Project with Gradle Files`.


    When this sync activity completes, in the Build window in the lower left of the
    screen, you should see the previous warnings and errors are now gone, and the
    only message present should read `MyFirstApp successful at` *some-date-and-time*.


    ## Running Your Application


    With a completed setup in Android Studio matching the needs of your application
    and Gradle in sync and ready to build your application, your run configuration
    should now be able to actually run your new application. Go ahead and choose Run
    from the Run menu, or directly choose `Run ''Run Config 1''` to skip the run configuration
    selection step.


    A bunch of actions will now happen automatically, but they can take a little time
    – up to a few minutes depending on the capabilities of your computer. First, Gradle
    will be invoked to build your application. We will cover this process in more
    detail in later chapters, but for now what you need to know is that Gradle is
    pulling together all of the code you wrote, the libraries referenced by your application,
    the relevant Android SDK, and other plumbing and generating a bundle ready to
    deploy as your application. This is known as an Android Package, or APK.


    Next, Android Studio invokes your AVD, and after the time it takes for that emulator
    to start, it copies over the APK built by Gradle. Based on your run configuration,
    Android Studio knows that you want to run the app module, in effect triggering
    your new MyFirstApp application to run in the AVD, just as if you’d pressed its
    icon in the Android launcher window.


    Your app will run, and your immortal words “Hello Android!” (or whatever you chose)
    should appear within an app screen titled MyFirstApp, just as you see in Figure
    [3-19](#499629_1_En_3_Chapter.xhtml#Fig19).


    ![../images/499629_1_En_3_Chapter/499629_1_En_3_Fig19_HTML.jpg](images/499629_1_En_3_Chapter/499629_1_En_3_Fig19_HTML.jpg)


    Figure 3-19


    Your running MyFirstApp Android application within your AVD


    That’s it! You have written and run your first Android application. Well done.
    Take a deep breath, because in Chapter [4](#499629_1_En_4_Chapter.xhtml) we are
    going to dive under the hood and examine everything that Android Studio has just
    built for you in great detail.


    # Exploring Your First Project


    In Chapter [3](#499629_1_En_3_Chapter.xhtml), I introduced you to setting up everything
    you needed to get your first Android application written and running on an AVD,
    with the goal of very quickly getting you immersed in Android Studio, emulators,
    and your first part of coding. We got results fast! But you almost certainly have
    a whole bunch of unanswered questions that cropped up as we zoomed through. In
    this chapter, we’ll start a deeper dive into many of the topics, starting with
    the structure and features of your new Android project. This should start to answer
    those questions and build your knowledge.


    ## Viewing the Whole Android Project Structure


    To get familiar with the structure and purpose of the various parts of an Android
    project, it can help to start with the view from 30000 feet up (or 10000 meters,
    for the metric-minded). Looking at the entire layout of your project from the
    previous chapter, it turns out to be surprisingly large. While you only edited
    one file, many others were created for you by the new project wizard, and other
    files like Java libraries, the Android SDK, and so on were copied or had references
    added as your project was created.


    To see this full view, use the left-hand pane of the Android Studio window, known
    as the Project Explorer view, to expand the app folder; then the folders under
    it such as manifests, java, and so on; and all the other folders from the top
    level down. You will end up with a view of the entire project that looks similar
    to Figure [4-1](#499629_1_En_4_Chapter.xhtml#Fig1) (note that I am showing successive
    views of the long Project Explorer side by side, to save space).


    ![../images/499629_1_En_4_Chapter/499629_1_En_4_Fig1_HTML.jpg](images/499629_1_En_4_Chapter/499629_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    The logical Android view of your project in the Project Explorer


    The default view you see is known as the Android view and is designed to simplify
    the way all of your project’s constituent parts are displayed to you. The goal
    with this simplification is to let you focus on the parts you, the developer,
    write or edit and to keep much of the rest of the supporting files out of the
    way.


    From this whole-of-project Android view, you can see that the project is broken
    down into five major groups of files that represent different parts of your project.'
