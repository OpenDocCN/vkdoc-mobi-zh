    ## The Key Java Building Blocks for Android Development


    All of the examples throughout the remainder of this book will rely on a certain
    level of knowledge of Java. In the remainder of this chapter, we will give you
    a master list of topics covering the fundamentals you’ll need to at least follow
    along, but more importantly will also give you the starting point from which to
    further learn and educate yourself from the vast corpus of free and commercial
    sources available online, in bookstores, from schools and colleges, and so on
    for learning Java. We will link directly to some of these so your Java journey
    is not interrupted – I encourage you to follow some of these links as you work
    through this chapter, as it’s never too early to go deeper on a Java topic!


    To maximize your efficient learning of Java for Android Development, the following
    topics are key:


    General software development knowledge:


    1. Structure and layout of code

    2. Object-oriented design and programming, including classes and objects

    3. Class methods and data members


    Java-specific coding knowledge:


    1. Interfaces and implementations

    2. Threading and concurrency

    3. Garbage collection

    4. Exception handling

    5. File handling

    6. Generics

    7. Collections


    Obviously this is not all of Java, but it is enough of a subset of Java to give
    you the building blocks to start on Android development immediately!


    ### Structure of Code


    Looking back at the `FirstJavaDemo` source code, you can appreciate how Java code
    is structured in the simplest case. Java can be thought of as an onion layering
    of the most basic constructs that build layer over layer to the most far-reaching
    and complex constructs. From simplest to most sophisticated, we have


    * Token: The smallest building block of Java, a token represents names of things
    like instances of objects that we have created, or that are system provided, such
    as the `String` object in our `FirstJavaDemo` code, keywords from the Java language
    like `return`, operators, punctuation characters like parentheses, and more.


    * Expression: One or more tokens along with operators like `+`, or method calls,
    that form a piece of logic. In our `FirstJavaDemo` example, we see an expression
    in `"Interesting! You said: " + something`, which is an expression to concatenate
    two strings with the `+` operator.


    * Statement: A complete set of logic built from tokens and expressions, delimited
    by a semicolon. This is often synonymous with one "line" of code, but it can actually
    span an arbitrary number of lines.


    * Method: A logical grouping of statements that form a coherent set of logic and
    can be invoked by use of a method''s name. In our `FirstJavaDemo` code, we create
    the logic for the `main` method of our class, but we also reference methods from
    other classes, such as the `readLine()` method for reading text input at a console
    and the `println()` method to print back to a console.


    * Class: A representation of a conceptual object and all of the methods and data
    members that are used to represent that object and allow manipulation of it and
    its capabilities. The class concept is tied closely with the notion of object-oriented
    design, which we will touch on shortly.


    * Package: While not shown in our example, a package is a collection of classes
    and usually is used to bundle together those classes that support a specific related
    group of logic, for instance, file handling or graphics rendering.


    There are many other structural aspects to Java code, but mastering the preceding
    will enable you to decipher, and exploit, more esoteric constructs based on your
    understanding of fundamentals.


    ### Android and Main


    No, that''s not a street intersection, but it could be. In the `FirstJavaDemo`
    example, you will see we have one method defined, called `main`. Java''s design
    stipulates that one of the few mandatory requirements of a Java program be that
    a method named `main` exist and that it will be the first method called by the
    JVM when running the program. Think of this as the Java equivalent of a large
    sign that reads "Start Here."


    But take a look at the Android examples we''ve written already in prior chapters,
    like the `MyFirstApp` application. The `MainActivity.java` file is missing a `main`
    method. What''s going on? Never fear. Your application does have a `main` method,
    but it is buried away in the supporting scaffolding that Android Studio put in
    place. Rather than force you to juggle `main` methods and then all of the flow
    or event handling work that would provide the running application experience to
    your users, Android provides an activity lifecycle, with defined points around
    which you as the developer can focus, dealing with the points at which your activities
    are created, used, paused, and disposed. This activity lifecycle is covered in
    depth in Chapter [11](#499629_1_En_11_Chapter.xhtml).


    If you look at the Android Java you''ve already written, including the `MyFirstApp`
    application, you can see many aspects of this hierarchy of the Java language in
    practice – without realizing it, you''ve already been exercising these concepts
    in your first applications.


    ### Understanding Object-Oriented Design, Classes, and Objects


    The Java programming language was designed from inception to embrace and express
    the notions of object-oriented design (sometimes abbreviated to "OO"). At its
    heart, object-oriented design uses the idea of expressing almost everything about
    the conceptual model you create in your applications with objects (or entities),
    such as "person" or "animal," and then using some strong design philosophy to
    shape how objects are defined, manipulated, extended, and refined. This is a huge
    topic, but you can begin with some excellent online material that builds over
    time to help you understand key OO concepts including encapsulation, inheritance,
    polymorphism, and more.


    ### Working with Class Methods and Data Members


    Part and parcel of adopting the object-oriented approach to coding is the concept
    that data about objects and instances of objects belongs to those entities, and
    to manipulate and interrogate that data, one should use the techniques offered
    (and prescribed) by the design of the class that generates those objects. In short,
    that means the methods (or functions) the class defines and offers to you the
    developer.


    To those of you new to object-oriented development, this isn''t as constraining
    as it first seems. It embodies one of the principles of object orientation, encapsulation.
    Everything you need for working with an object comes neatly wrapped up (encapsulated)
    with its class. There are a myriad benefits to this approach, which you can read
    about extensively in many object-oriented design texts such as Apress'' *Interactive
    Object-Oriented Programming in Java* (Sarcar, ISBN 9781484254035) and in countless
    online web pages. Remember too that when you write your own classes, you have
    the freedom and liberty to make whatever class methods you wish available.'
