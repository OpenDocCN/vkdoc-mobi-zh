    ### 使用清单文件


    在项目资源管理器的 Android 视图中，显示的第一组文件就是你的清单文件。对于像 `MyFirstApp` 这样的新项目，只会有一个你需要关注的清单文件，即名为
    `AndroidManifest.xml` 的文件。


    这就是你的 Android 清单文件，它几乎扮演着 Android 应用总控文件的角色。在 Android 清单文件中，你可以控制应用的许多主要参数和行为，包括声明应用运行所需权限、它可能交互的服务、构成应用的
    Activity，以及应用需要和支持的 Android SDK 版本。


    我们将在本章稍后部分更深入地探讨其中一些核心概念，包括定义 Activity 和服务在 Android 语境下的含义。现在，让我们先查看一下 `AndroidManifest.xml`
    文件的内容，如代码清单 4-1 所示。


    ```

    代码清单 4-1

    你的新 AndroidManifest.xml 文件的内容

    ```


    正如你可能从文件名中猜到的那样，其内容是 XML 格式的。对于初次接触 XML 的读者，第 8 章提供了关于 Android 开发中 XML 的完整介绍。你可以先跳到那一章了解相关内容，待你熟悉了
    XML 的基础知识后再回到这里。


    Android 使用根元素 `<manifest>` 作为 XML 文档的起始，然后引入了两个关键属性：命名空间声明和包声明。就命名空间而言，Android
    的惯例是仅在属性层面使用它们，而不是在元素层面也使用。包名 `org.beginningandroid.myfirstapp` 应该看起来很熟悉，因为这是我们在第
    3 章的项目设置向导中提供的包名。除了提供这个至关重要的映射以确保应用完全限定包名的唯一性外，这种技术还允许我们将来在引用应用自身的各个方面时使用简写形式。


    你可以在清单文件的稍后部分看到这一点，当引入第一个 `<activity>` 元素时，其形式为 `<activity android:name=".MainActivity">`。在这里，开头的点是
    `<manifest>` 包属性中引用的完整包名的简写。实际上，这意味着内部引用的名称会更短。因此在本例中，使用 `.MainActivity` 而不是 `org.beginningandroid.myfirstapp.MainActivity`。我相信你知道我更愿意输入哪个。


    清单文件还包含其他关键特性。例如，`android:icon` 和 `android:roundIcon` 属性引用了两个资源文件，它们分别为你的应用提供了在
    Android 设备启动器屏幕和小部件屏幕上的方形和圆形图标版本。`android:label` 属性保存着你应用的名称。


    另一个重要的条目是前面提到的 `<activity android:name=".MainActivity">`。这个条目，包括其子元素 `<intent-filter>`，向
    Android 指明了当应用启动并且触发了关键 Intent `android.intent.action.MAIN` 时，应该响应哪个 Activity。我们将在本章稍后部分详细介绍这些概念，但现在你可以将其视为
    Android 标记应用启动时首先向用户显示内容的方式。


    ### 与 Java 互动


    Android 项目资源管理器视图中的第二个和第三个主要区域是你的 Java 源文件。这些是写入 Java 代码的文本文件，用于让你的应用活起来，并执行你为应用设定的操作、功能和特性。


    你会看到两个顶层文件夹，一个名为 `Java`，另一个名为 `Java (generated)`。事实上，在这个阶段，这两个区域中的所有文件都是为你生成的，但通常在你开发应用时，你会更改
    `Java` 树中的文件、添加新文件等，而让 Android Studio 及其集成工具自动处理 `Java (generated)` 文件。


    现在特别注意其中一个文件，那就是 `Java` ➤ `org.beginningandroid.myfirstapp` 文件夹下的 `MainActivity`
    文件。磁盘上的文件实际名为 `MainActivity.java`，而项目资源管理器中的 Android 视图隐藏了文件扩展名。根据前面 Android 清单文件中提到的配置，这个
    `MainActivity` 文件是应用启动时将运行的代码。


    我们将在本章稍后部分以及本书后续许多章节中深入探讨 Activity 的含义。


    ### 善用资源


    新项目中文件的第四个主要区域是资源文件，位于 `res` 文件夹及其子文件夹中。最初生成了相当多的项目供你使用，它们属于不同的资源类别。


    #### 可绘制对象


    可绘制对象是 Android 将作为应用的一部分在屏幕上绘制或渲染的内容。这既包括普通图像，如插画、图表和其他静态图像，也包括 Android 根据给出的指令在运行时需要生成的图像。


    第一种可绘制对象以你熟悉的典型图像文件格式表示，例如 GIF、JPEG 和 PNG 文件。Android 具有缩放图像以适配各种密度屏幕/显示器的机制，也允许你存储同一图像的不同分辨率版本以避免缩放。我们将在第
    14 章深入探讨 Android 应用的图像、照片和插画创作及技术世界。


    Android 支持的第二种可绘制对象是它在运行时根据 XML 文件中提供的规范创建的矢量图像。在你的新项目中可以看到两个提供矢量图形指令的 XML 文件示例：`ic_launcher_background.xml`
    和 `ic_launcher_foreground.xml`。


    #### 布局


    在第 9 章和第 10 章中，我们将详细探讨布局和设计应用的 UI，涵盖一系列选项和样式。你在第 3 章创建新项目时，应该记得为项目选择了“Empty Activity”选项。Android
    Studio 利用这个选择为你设置了一个默认布局，该布局出现在 `layout` 子文件夹下的 `activity_main.xml` 文件中。


    同样，这是一个 XML 文件，Android 广泛使用 XML 来定义 Activity 的初始布局和行为特性。如果你将 Activity 视为 Android
    应用中用户使用的屏幕或窗口，那么 XML 布局就提供了如何创建和渲染界面的描述。这个 `activity_main.xml` 布局被你的 `MainActivity`
    Java 代码用来在屏幕上绘制 Activity。这个过程在 Android 领域被称为“填充”，它适用于布局整个 Activity 界面的过程，也适用于其中的任何子集，例如创建菜单或在一个布局内动态添加另一个布局。随着你的应用不断增长，此文件夹中的
    Activity 布局 XML 文件数量也会增加。

