  trans: '

    #### 包含向前与向后版本支持的库


    目前需要关注的 Gradle 构建文件的最后一个方面是依赖项部分。现阶段我不会深入介绍每个被声明的依赖项，因为我们会在后续关于测试、设备/版本兼容性等章节中，在讨论具体细节时再逐一回顾它们。我要强调的一个共同点是许多依赖项的命名空间。你会注意到主要的组件名是
    `androidx`。`androidx` 指的是 Android Jetpack，这是 Android 近期的一次更新和重构，它让你作为开发者能够面向众多不同版本的
    SDK 进行开发，而无需预先了解它们——实际上，这使你的应用程序能够在一定程度上抵御后续 SDK 版本中引入的某些变化，同时还能让你利用当代 SDK 的功能构建应用，并让
    Android 和 Jetpack 来处理在运行不直接支持你的 SDK 版本的旧版 Android 设备上，如何模拟这些新行为。Jetpack 还通过减少样板代码、帮助你遵循
    Android 开发者社区长期积累的良好实践，来降低用 Java 编写软件时的冗余度。


    Jetpack 正在取代旧的方法，即 Android 支持库（Support Libraries），但在许多参考资料和讨论中你仍会看到支持库的身影，并且这两者在未来一段时间内将并存。


    ## 解释 Android 应用的关键逻辑构建块


    现在你对 Android Studio 中的项目结构和布局有了一定的了解。但在本章的多个地方，我都提到了 Android 应用程序的一些基本逻辑构建块，例如
    Activity 和服务。现在是时候深入理解这些构建块是什么，以及它们如何协同工作，让你的应用程序变得生动起来。


    ### Activity（活动）


    如果你使用过任何现有的 Android 应用程序，你会体验到它具备大多数带有用户界面的软件所共有的一些特点。与其他拥有 UI 的软件一样，Android 使用了“屏幕”或“视图”的概念，让用户与你的程序进行实际交互。Android
    将这些称为 Activity。无论你是想让用户阅读文本、观看视频、输入数据、拨打电话、玩游戏还是做其他事情，你的用户都将通过与你设计的一个或多个 Activity
    屏幕或布局进行交互来完成操作。


    Activity 是 Android 开发中最简单、计算成本最低的部分之一，你应该在应用程序中慷慨地创建和使用它们。这不仅有助于用户从你的应用中获得极佳的体验，而且
    Android 操作系统本身的设计就考虑到了 Activity 的广泛使用，并提供了大量帮助来管理它们。


    ### Intent（意图）


    Intent 是 Android 的内部消息系统，允许在应用程序之间以及在 Android 环境之间传递信息片段。通过这种方式，你的应用程序可以触发操作、与
    Android 及其他应用程序共享数据，同时也能监听发生的事件并在适当时采取行动。


    Android 操作系统已经提供了非常广泛的 Intent，供你的应用程序与之交互。作为开发者，你还可以根据自己的用途定义和开发自己的 Intent。


    ### Service（服务）


    服务在计算机领域是一个常见概念，虽然在 Android 中处理服务时有一些细微差别，但许多通用概念仍然适用。服务通常是没有用户界面、在后台运行的应用程序。服务提供了一系列通常被多个应用程序需要的特性、能力或行为。服务通常是长时间运行的，在后台默默运行，按需为你的应用程序和其他程序提供支持。


    ### Content Provider（内容提供器）


    你的应用程序可能需要使用许多自己无法控制的数据类型和数据源。许多其他应用程序也有类似的数据需求，因此 Android 内置了内容提供器（Content Providers）的概念，这是一种抽象化数据集和数据源的方式。这种抽象化试图简化与各种不同数据源（包括文件、数据库、流协议和其他数据访问方式）的交互，为开发者带来逻辑上的一致性。你无需为每一组或每一种你想使用的数据学习不同的自定义数据操作方法，只需学习一次内容提供器的方法，就可以在众多不同的内容提供器数据源上重复使用它。


    你还可以构建并共享自己的内容提供器，以方便与其他应用程序进行数据共享和交互。


    ## 总结


    现在你已经了解了典型的 Android 开发项目是如何构建的，以及 Android 应用程序的一些主要构建块如何在逻辑上以及在构建应用过程中被整合在一起，以创建一个完整的应用程序。我们将继续基于本章描述的这些部件进行扩展，深入探索其中的许多部件，以便你理解越来越复杂的应用程序是如何构建的。


    # 5. 深入理解 Android Studio


    长期使用像 Android Studio 这样的 IDE 的用户，通常会对他们所选择的 IDE 的重要性形成非常强烈且固执的看法——不仅关乎他们的生产力，也关乎他们编写应用程序的愉悦感。在本章中，我的目标是揭示并探索
    Android Studio 的一些关键特性，这些特性将使你在构建 Android 应用程序时效率更高、心情更愉快。


    Android Studio 本身就是一个庞大的话题。市面上有整本书专门介绍 Android Studio 本身以及如何作为 IDE 最大限度地发挥其作用。来自本书出版商
    Apress 的一些优秀例子包括 *《Android Studio IDE 快速参考》*（作者 Ted Hagos，ISBN 978-1-4842-4953-6）和
    *《学习 Android Studio》* 系列（同样由 Ted Hagos 编写）。我们在本书中没有余裕将所有剩余章节都奉献给 Android Studio，但如果本章能让你对强大
    IDE 所提供的可能性感到兴奋，你就知道接下来该去哪里了。现在，让我们深入探讨一些你现在就应该了解的 Android Studio 的关键部分。


    ## 从项目资源管理器开始


    回到第 4 章，我们简要介绍了项目资源管理器及其部分功能，展示了 Android 视角和项目文件视角。我们简单探讨了项目的这两种视图，但没有详述项目资源管理器的其他视图选项。这让我们不禁好奇，所有这些其他视图是做什么用的？


    很高兴你问起。总的来说，项目资源管理器的其他视图选项旨在满足两个相互兼容的需求。首先，这些视图为你提供了不同的方式来查看你的项目，通常着重关注某一特定领域，以便你能将时间花在完成工作上，而不是与
    Android Studio 的布局作斗争。其次，这些视图也支持你作为开发者的个人偏好和习惯，以及你更喜欢的工作方式。

    '
- fmt: '### Getting Comfortable Switching Project Explorer Views


    Let’s look at some of these views in action, and you can explore all the others
    to get a feel for what you like. Figure [5-1](#499629_1_En_5_Chapter.xhtml#Fig1)
    shows our `MyFirstApp` project switched to use the `Project Source Files` view
    (again, instead of a very long image, I’ve pasted two screens side by side).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig1_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The `Project Source Files` view in Android Studio Project Explorer


    You can see some familiar entries there under the `src` folder hierarchy, for
    instance, your `myfirstapp` Java source file and its `MainActivity` code. If you
    browse around a little in this view, you will see other source files, such as
    the template files for testing your code, and some of the editable XML files that
    control things like visual layout, reusable string values, and more.


    But what is most notable is what is not shown. You are no longer seeing things
    like Gradle build files nor IntelliJ IDEA preference and configuration files,
    build artifacts, and other non-code items. All of those are hidden, so you can
    focus on the code! “Why do this?” I hear you ask. As well as the personal preference
    and specialization points I made in the preceding, the `Project Files` view in
    particular is a favorite of some developers who find they work best when they
    are in “the flow”: a state of mind where you are deeply enmeshed with your code,
    without distractions.


    Another popular view is the `Project` view, which arranges itself to look like
    many traditional Java IDEs in how they lay out the elements and constituent parts
    of a project. Figure [5-2](#499629_1_En_5_Chapter.xhtml#Fig2) shows this view,
    and you will note some immediate differences particularly with how external libraries
    and references are surfaced.


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig2_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The `Project` view in Android Studio Project Explorer


    I strongly encourage you to explore all of the view options in the Project Explorer
    and find the variants that best suit your way of working.


    One really useful point to remember is that, regardless of what view you use or
    how many times you switch views, Android Studio isn’t physically changing your
    project or moving files. It is just giving you a different virtual view.


    ### Using the Project Explorer Context Menu


    As with many other applications you might have used, Android Studio provides context
    menus that you can access with a right-click of a mouse (or command-click on a
    Mac). As you explore views in Project Explorer, you should invoke the context
    menu on everything you see, to get a feel for what is offered. Whether it’s file
    management actions like comparison, find, and so on, quick editing choices, or
    starting a more serious code management action, the context menu is one of the
    pro tools you should get familiar with using.


    All of the options in the context menus can be found in the main menus in Android
    Studio, but these can often be buried three or four menu levels deep.


    ## Running and Debugging with Android Studio


    As you saw in Chapter [3](#499629_1_En_3_Chapter.xhtml), one of the principal
    ways to have Android Studio run your program, in either an emulated or on-device
    way, is to configure a run configuration. We will revisit run configurations in
    just a moment, but it is good to know that there are other ways to run your applications
    as well.


    ### Running with Run Configs: A Recap


    Our goal in Chapter [3](#499629_1_En_3_Chapter.xhtml) was to get your first application
    running as quickly as possible, so we skipped many of the details of run configurations.
    There are some key aspects that are worth revisiting, as you will soon want to
    start creating further run configurations with different characteristics to help
    you in different phases of application development.


    Bring up the details of “Run Config 1” (or whatever name you used to save your
    run configuration earlier) via the `Run` ➤ `Edit Configurations…` menu of Android
    Studio. You should see the familiar screen showing your run configurations, as
    per Figure [3-16](#499629_1_En_3_Chapter.xhtml#Fig16) from Chapter [3](#499629_1_En_3_Chapter.xhtml).
    There are various options spread over four subwindows for any run configuration.
    Some of these you can explore in your own time, but the major configuration items
    to familiarize yourself with are as follows.


    #### Run Configuration: General Options


    - **Module** : Specifies which specific module to target for the make process,
    or, if not specified, implies that the whole project should be the target. In
    practical terms, this helps with larger multimodule projects, where in certain
    circumstance you might only want to rebuild/remake one specific module – typically
    because that’s the only one that’s changed.

    - **Install Options – Deploy** : Indicates what should happen once the Android
    application is built. Should it be run on a device or emulator, and therefore
    it needs to be deployed, or are you only interested in confirming the application
    will build cleanly and without errors, without needing to actually run it?

    - **Launch Options – Launch** : This setting controls what happens when a successful
    build is deployed and launched. Should the application run as per the Android
    Manifest XML file and launch the default activity, or is there a different starting
    point that should be used in this particular run configuration (such as a substitute
    activity in the application or no activity at all)?

    - **Install Flags** and **Launch Flags** are beyond the scope of our coverage
    of run configurations for now.


    #### Run Configuration: Miscellaneous


    The miscellaneous options control how “clean” your target environment is when
    a build is deployed and launched. By clean, I mean what artifacts like logs, prior
    versions of the application, and so forth are left behind or cleaned up as part
    of a run configuration.


    - **Logcat** : We’ll talk more about `Logcat` later in this chapter, but these
    settings determine if `Logcat` output should always be shown to you via the `Logcat`
    tool by default and whether output from prior runs should be cleaned up. These
    logs can get very large if left to grow, so remember the clear log setting if
    these get unwieldy for you.

    - **Installation Options** : You might like to skip deploying your application
    again if nothing has changed, which can save time in your wider workflow. Knowing
    that you are not impacting a running instance of your application can be important,
    for example, when it comes to saving state or running from a known good starting
    condition.'
  raw: '### Getting Comfortable Switching Project Explorer Views


    Let’s look at some of these views in action, and you can explore all the others
    to get a feel for what you like. Figure [5-1](#499629_1_En_5_Chapter.xhtml#Fig1)
    shows our MyFirstApp project switched to use the Project Source Files view (again,
    instead of a very long image, I’ve pasted two screens side by side).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig1_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    The Project Source Files view in Android Studio Project Explorer


    You can see some familiar entries there under the src folder hierarchy, for instance,
    your myfirstapp Java source file and its MainActivity code. If you browse around
    a little in this view, you will see other source files, such as the template files
    for testing your code, and some of the editable XML files that control things
    like visual layout, reusable string values, and more.


    But what is most notable is what is not shown. You are no longer seeing things
    like Gradle build files nor IntelliJ IDEA preference and configuration files,
    build artifacts, and other non-code items. All of those are hidden, so you can
    focus on the code! “Why do this?” I hear you ask. As well as the personal preference
    and specialization points I made in the preceding, the Project Files view in particular
    is a favorite of some developers who find they work best when they are in “the
    flow”: a state of mind where you are deeply enmeshed with your code, without distractions.


    Another popular view is the Project view, which arranges itself to look like many
    traditional Java IDEs in how they lay out the elements and constituent parts of
    a project. Figure [5-2](#499629_1_En_5_Chapter.xhtml#Fig2) shows this view, and
    you will note some immediate differences particularly with how external libraries
    and references are surfaced.


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig2_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The Project view in Android Studio Project Explorer


    I strongly encourage you to explore all of the view options in the Project Explorer
    and find the variants that best suit your way of working.


    One really useful point to remember is that, regardless of what view you use or
    how many times you switch views, Android Studio isn’t physically changing your
    project or moving files. It is just giving you a different virtual view.


    ### Using the Project Explorer Context Menu


    As with many other applications you might have used, Android Studio provides context
    menus that you can access with a right-click of a mouse (or command-click on a
    Mac). As you explore views in Project Explorer, you should invoke the context
    menu on everything you see, to get a feel for what is offered. Whether it’s file
    management actions like comparison, find, and so on, quick editing choices, or
    starting a more serious code management action, the context menu is one of the
    pro tools you should get familiar with using.


    All of the options in the context menus can be found in the main menus in Android
    Studio, but these can often be buried three or four menu levels deep.


    ## Running and Debugging with Android Studio


    As you saw in Chapter [3](#499629_1_En_3_Chapter.xhtml), one of the principal
    ways to have Android Studio run your program, in either an emulated or on-device
