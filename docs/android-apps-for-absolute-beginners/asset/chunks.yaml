    ## 更新数据


    使用`.update()`方法更新数据与`.insert()`方法大致相似。除了需要提供表示要更新表名的`String`和表示要更新的列新值的`ContentValues`对象外，还可以提供一个可选的`where`子句。这个`where`子句允许你添加任何谓词逻辑来精确定位要更新的行。它可以包含问号`?`作为占位符，这些占位符的值在执行语句之前被替换，此外还有一个最终参数，该参数是一个值列表，用作任何`?`参数占位符的替换值。这是一种非常常见的参数替换技术，也是防止SQL注入的技术之一（但不是唯一的技术）。你可以使用你认为必要的任何逻辑来保护`.update()`中使用的任何参数值，而不是仅仅信任用户的直接输入。


    `.update()`方法易于使用，但其简洁性也有代价。用于更新的值必须是实际的静态值。不能通过`.update()`方法传递公式或计算供SQLite评估。在需要这种能力的情况下，请改用`execSQL()`方法。


    ## 删除数据


    在管理SQLite数据的辅助方法之旅的最后一站是`.delete()`语句。它与你已经见过的`.insert()`和`.update()`语句非常相似，最接近`.update()`。`.delete()`的关键区别在于你不需要提供任何新数据值，因为你是删除数据，而不是修改数据！


    调用`.delete()`时，需要提供包含要删除数据的表名，并可选地包含`where`子句以及谓词所需的所有参数值，以定位要影响的行子集（假设你不是要删除表中的所有数据）。例如：


    ```

    myDB.delete(MySQLiteHelper.TABLE_NAME, "_id=?", args);

    ```


    你需要提供一个填充好的`args`值，在我们的例子中，这将是某行手机型号数据的`_id`值，例如，`_id`为2的行的`args`值为`"2"`。SQLite看到并执行的语句如下所示：


    ```

    delete from devices where _id=2

    ```


    与`.update()`一样，同样的警告也适用于`.delete()`。不能在参数中传递计算或动态公式供SQLite评估。若要达到这种复杂度，你应再次选择`execSQL()`。


    ## 使用Room持久化库


    使用原始SQL语句，甚至通过Query Builder方法寻求帮助，仍然要求你掌握SQL作为一门语言和关系型数据库概念的知识。总的来说，这是一个非常好的主意。一些开发人员回避SQL，认为它与Java和Kotlin等语言相比太难用或太“奇怪”。还有第三种使用数据库的方法，称为对象关系映射（ORM）库。这些方法有很多优点和缺点，但本质上提供了一种更类似Java（或Kotlin）的方式来操作数据库。在Android世界中，Google提供了作为androidx（Jetpack）一部分的Room持久化库。学习ORM（包括Room）可以帮助你的代码更少出现原始SQL错误，并且更容易理解。Room本身是一个非常庞大的话题，你可以在`https://developer.android.com/jetpack/androidx/releases/room`阅读更多相关信息。作为新开发人员，建立对SQL的基本理解对于使用Android提供的任何方法（无论是Query
    Builder、原始SQL还是Room）都至关重要，因此从SQL开始是正确的选择。


    ## 为Android打包和管理SQLite数据库


    在将SQLite添加到应用程序时，有一些超越编码的考量因素，它们将帮助你在设计、构建和支持以数据库为中心的应用程序时做出正确的选择。在I/O、文件位置和种子数据库等关键问题上投入一点时间和思考会很有回报。


    ## 管理Android存储以提升数据库性能


    第19章详细介绍了使用Android应用程序管理文件的内容。本章无需重复这些内容，但我们未涉及的一个主题是用于存储这些文件的硬件技术。几乎所有Android设备都配备基于闪存的板载存储，通常采用NAND硬件构建。不同品牌和制造商之间的内存质量和可靠性差异很大。


    在使用SQLite数据库构建Android应用程序时，当你的应用程序代表用户插入、更新和删除数据时，你将隐式地触发对此硬件存储的读取和写入。闪存的一个特点是快速写入的可预测性较差。在99%的情况下，你可能会获得极快的写入性能，却突然发现下一次写入的速度下降，因为闪存触发了某种内部清理或管理。最常见的原因是“磨损均衡管理”，闪存管理层试图延长其部分存储的使用寿命。


    这可能很难发现其导致的性能问题，尤其是在AVD中测试应用程序时，因为AVD的内存几乎肯定是由笔记本或台式电脑的非常快速且可靠的RAM模拟的。你可以通过使用第18章中描述的`AsyncTask()`方法将数据库更改放在异步线程上（远离主UI线程），来缓解一系列写入性能的不确定性。


    数据库管理的另一个怪癖是考虑设备故障时会发生什么——无论是电量不足、意外崩溃，还是用户恰好在数据库活动的关键时刻选择关机按钮。SQLite能够从崩溃和故障中恢复，使用ACID数据库原则来持久化（用ACID术语来说是“持久化”）数据的更改。了解这种情况的发生很重要，因为任何名副其实的数据库的ACID保证都包括：为了保持完整性，可能需要回滚事务。


    ## ACID数据库原则'
