    \nReturning to the `_id` column of the table, this makes use of the autoincrement\
    \ feature of SQLite to have it generate a unique integer value for each row, as\
    \ the primary key for your table. The name `_id` is a convention used and expected\
    \ by a number of the built-in Android tools, helper classes, and methods. I would\
    \ recommend picking up this design tradition for all of your SQLite tables, at\
