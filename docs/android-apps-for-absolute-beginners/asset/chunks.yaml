    \ good news” principle in action.\n\nEach of the SQL statements used with the\
    \ `execSQL()` calls is constructed in constant declarations at the top of the\
    \ class. This approach to constant-based statements is not new, but it’s worth\
    \ noting a few of the additional constants in use here:\n\n*   Each of the three\
    \ `COLNO_*` constants represents the column number (or ordinal position) of the\
    \ columns in the table as I have defined it. So the `_id` column (discussed in\
    \ the following) is at position 0, the `model_name` column is at position 1, and\
