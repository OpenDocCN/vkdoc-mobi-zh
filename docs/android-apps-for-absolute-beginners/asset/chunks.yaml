    \    for example, 1, 2, 3, 4, and so on. Android will sum all of the weights\n\
    \    present in the `LinearLayout` and then\n    provide UI space to a widget\
    \ based on its fraction of the total weights\n    of all widgets in the layout.\
    \ So, for instance, if we have two `TextViews` both\n    configured to `match_parent`,\
    \ with\n    `android:layout_weight`\n    of 5 for the first `TextView` and 10\
    \ for\n    the second `TextView`, then the\n    first button will get one-third\
    \ of the available space (5/(5+10)), and\n    the second button will get two-thirds.\
    \ There are some further methods\n    for setting weights, but none are as intuitive\
    \ as the `android:layout_weight`\n    approach.\n\n*   Gravity: When using a `LinearLayout`,\
    \ the\n    default layout approach Android takes is to align all widgets from\
    \ the\n    left if using `HORIZONTAL`\n    orientation and all widgets from the\
    \ top if using `VERTICAL` orientation.\n    From time to time, you might want\
    \ to override this behavior to force a\n    bottom-up or right-sided bias to your\
    \ layout. The XML attribute `android:layout_gravity`\n    allows you to control\
