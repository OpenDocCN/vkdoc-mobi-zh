    \ SQLite Databases for\nAndroid\nWhen it comes to adding SQLite to your applications,\
    \ there are some\nconsiderations\nbeyond coding that will help you make good choices\
    \ in designing,\nbuilding, and supporting database-centric applications. Investing\
    \ a\nlittle time and thought on some key issues like I/O, file placement, and\n\
    seeding databases can payoff.\n\nManaging Android Storage for Database\nPerformance\n\
    Chapter [19](#499629_1_En_19_Chapter.xhtml) covered the details of managing\n\
    and using files with your Android applications. There’s no need to\nrepeat that\
    \ content again in this chapter, but a topic we didn’t cover\nwas the hardware\
    \ technology used for storing those files. Almost all\nAndroid devices ship with\
    \ on-board storage based on flash memory, built\ntypically with NAND hardware.\
    \ The quality and reliability of that memory\ndiffers markedly across different\
    \ brands and manufacturers.\nWhen building Android applications using SQLite databases,\
    \ you will\nimplicitly trigger reads from, and\nwrites to, this hardware storage\
    \ as your applications insert, update,\nand delete data on behalf of your users.\
    \ One quirk of flash memory is\nits lack of predictability around fast writes.\
    \ Ninety-nine times out of\na hundred, you might get great, fast write performance,\
    \ only to discover\nrandomly that the next write you issue drops in speed because\
    \ the flash\nstorage has triggered some internal cleanup or management. The most\n\
    common cause of this is “wear-level management,” in which the flash\nstorage management\
    \ layer is trying to preserve the longevity of parts of\nits storage.\nIt can\
    \ be hard to spot the performance problems this might cause,\nespecially when\
    \ testing your app in an AVD that almost certainly has its\nmemory emulated by\
    \ your notebook or desktop computer’s very fast and\nvery reliable RAM. You can\
    \ mitigate a range of write performance\nuncertainties by using the `AsnycTask()`\
    \ approach\ndescribed in Chapter [18](#499629_1_En_18_Chapter.xhtml) to have database\
    \ changes happen\non an asynchronous thread, away from the main UI thread.\nAnother\
    \ quirk of database management is thinking about what happens\nwhen the device\
    \ fails – either from low power, unexpected crash, or the\nuser simply choosing\
    \ the power off button at a crucial moment of\ndatabase activity. You are well\
    \ supported by SQLite’s abilities to\nrecover from crashes and failures, using\
    \ ACID database principles to\npreserve (make durable, in ACID parlance) changes\
    \ to data. Being aware\nthis happens is important, as part of the ACID guarantees\
    \ of any\ndatabase worthy of the name include the determination that transactions\n\
    might need to be rolled back in order to preserve integrity.\n\nAcid Database\
    \ Principles"
  trans: '

    在使用`ContentValues`对象之前，通常需要先用相关数据填充它。在`SQLiteExample`应用程序中，我们通过`DialogWrapper`对象的`.getModel()`方法，用来自该对象的`String`数据填充它。打开`DialogWrapper`的
    Java 源代码，你会看到`.getModel()`方法返回用户在点击“Add New Model”按钮触发的弹出对话框中输入的文本，如图 20-2 所示。


    ![../images/499629_1_En_20_Chapter/499629_1_En_20_Fig2_HTML.jpg](img/499629_1_En_20_Fig2_HTML.jpg)


    **图 20-2** 提示在 SQLiteExample 应用程序中插入新数据


    输入的文本成为`ContentValues`对象上`.put()`调用的值，同时`COLNAME_MODEL`常量的`String`值作为键。为了生成年份值，我们使用一种常见的
    Java 技术来确定当前年份。如果你对扩展`SQLiteExample`应用程序感兴趣，可以将此逻辑调整为弹出对话框的一部分。


    ## 更新数据


    使用`.update()`方法更新数据与`.insert()`方法大致相似。除了需要提供表示要更新表名的`String`和表示要更新的列新值的`ContentValues`对象外，还可以提供一个可选的`where`子句。这个`where`子句允许你添加任何谓词逻辑来精确定位要更新的行。它可以包含问号`?`作为占位符，这些占位符的值在执行语句之前被替换，此外还有一个最终参数，该参数是一个值列表，用作任何`?`参数占位符的替换值。这是一种非常常见的参数替换技术，也是防止
    SQL 注入的技术之一（但不是唯一的技术）。你可以使用你认为必要的任何逻辑来保护`.update()`中使用的任何参数值，而不是仅仅信任用户的直接输入。


    `.update()`方法易于使用，但其简洁性也有代价。用于更新的值必须是实际的静态值。不能通过`.update()`方法传递公式或计算供 SQLite 评估。在需要这种能力的情况下，请改用`execSQL()`方法。


    ## 删除数据


    在管理 SQLite 数据的辅助方法之旅的最后一站是`.delete()`语句。它与你已经见过的`.insert()`和`.update()`语句非常相似，最接近`.update()`。`.delete()`的关键区别在于你不需要提供任何新数据值，因为你是删除数据，而不是修改数据！


    调用`.delete()`时，需要提供包含要删除数据的表名，并可选地包含`where`子句以及谓词所需的所有参数值，以定位要影响的行子集（假设你不是要删除表中的所有数据）。例如：


    ```

    myDB.delete(MySQLiteHelper.TABLE_NAME, "_id=?", args);

    ```


    你需要提供一个填充好的`args`值，在我们的例子中，这将是某行手机型号数据的`_id`值，例如，`_id`为 2 的行的`args`值为`"2"`。SQLite
    看到并执行的语句如下所示：


    ```

    delete from devices where _id=2

    ```


    与`.update()`一样，同样的警告也适用于`.delete()`。不能在参数中传递计算或动态公式供 SQLite 评估。若要达到这种复杂度，你应再次选择`execSQL()`。


    ## 使用 Room 持久化库


    使用原始 SQL 语句，甚至通过 Query Builder 方法寻求帮助，仍然要求你掌握 SQL 作为一门语言和关系型数据库概念的知识。总的来说，这是一个非常好的主意。一些开发人员回避
    SQL，认为它与 Java 和 Kotlin 等语言相比太难用或太“奇怪”。还有第三种使用数据库的方法，称为对象关系映射（ORM）库。这些方法有很多优点和缺点，但本质上提供了一种更类似
    Java（或 Kotlin）的方式来操作数据库。在 Android 世界中，Google 提供了作为 androidx（Jetpack）一部分的 Room
    持久化库。学习 ORM（包括 Room）可以帮助你的代码更少出现原始 SQL 错误，并且更容易理解。Room 本身是一个非常庞大的话题，你可以在[这里](https://developer.android.com/jetpack/androidx/releases/room)阅读更多相关信息。作为新开发人员，建立对
    SQL 的基本理解对于使用 Android 提供的任何方法（无论是 Query Builder、原始 SQL 还是 Room）都至关重要，因此从 SQL 开始是正确的选择。


    ## 为 Android 打包和管理 SQLite 数据库


    在将 SQLite 添加到应用程序时，有一些超越编码的考量因素，它们将帮助你在设计、构建和支持以数据库为中心的应用程序时做出正确的选择。在 I/O、文件位置和种子数据库等关键问题上投入一点时间和思考会很有回报。


    ## 管理 Android 存储以提升数据库性能


    第 19 章详细介绍了使用 Android 应用程序管理文件的内容。本章无需重复这些内容，但我们未涉及的一个主题是用于存储这些文件的硬件技术。几乎所有 Android
    设备都配备基于闪存的板载存储，通常采用 NAND 硬件构建。不同品牌和制造商之间的内存质量和可靠性差异很大。


    在使用 SQLite 数据库构建 Android 应用程序时，当你的应用程序代表用户插入、更新和删除数据时，你将隐式地触发对此硬件存储的读取和写入。闪存的一个特点是快速写入的可预测性较差。在
    99%的情况下，你可能会获得极快的写入性能，却突然发现下一次写入的速度下降，因为闪存触发了某种内部清理或管理。最常见的原因是“磨损均衡管理”，闪存管理层试图延长其部分存储的使用寿命。


    这可能很难发现其导致的性能问题，尤其是在 AVD 中测试应用程序时，因为 AVD 的内存几乎肯定是由笔记本或台式电脑的非常快速且可靠的 RAM 模拟的。你可以通过使用第
    18 章中描述的`AsyncTask()`方法将数据库更改放在异步线程上（远离主 UI 线程），来缓解一系列写入性能的不确定性。


    数据库管理的另一个怪癖是考虑设备故障时会发生什么——无论是电量不足、意外崩溃，还是用户恰好在数据库活动的关键时刻选择关机按钮。SQLite 能够从崩溃和故障中恢复，使用
    ACID 数据库原则来持久化（用 ACID 术语来说是“持久化”）数据的更改。了解这种情况的发生很重要，因为任何名副其实的数据库的 ACID 保证都包括：为了保持完整性，可能需要回滚事务。


    ## ACID 数据库原则

    '
- fmt: '在所有的关系型数据库中，包括 SQLite，都有四个关键原则，它们是确保数据得到保护、完整并按预期可用的标准方式。这些原则被称为 ACID 原则，其中字母分别代表原子性（Atomicity）、一致性（Consistency）、隔离性（Isolation）和持久性（Durability）。


    原子性是指针对数据库的一个事务中的所有工作要么全部成功，要么全部回滚。不允许出现半完成的工作。


    一致性是指数据库中的数据始终处于一致状态，事务只能将数据从一个一致状态调整到另一个一致状态。


    隔离性是指一个事务的工作过程，在该事务对数据所做的全部原子性、一致性的更改集变为可见之前，对数据库的其他用户是不可见的。


    持久性是指一旦对数据做出的更改将得以持久保存，即使发生异常的系统事件、灾难等情况也是如此。


    你应该考虑为应用程序添加健全性检查逻辑，以便在能够预先获知问题的情况下进行追踪并采取行动。低电量状态是你能够检测到的最常见情况，方法是在你的应用中注册一个接收器来监听诸如
    `ACTION_BATTERY_CHANGED` 之类的广播。通过检查意图（intent）的有效载荷，你可以判断电量是否不足，并可能推迟写入密集型任务。


    ## 将 SQLite 数据库打包到应用中


    我的 `SQLiteExample` 应用程序附带了一个辅助类，它可以方便地将三行数据填充到设备的表中，从而为数据库播种（seed the database）。对于这个示例来说，这很好，但它可能会让你思考：如果我需要几百行甚至几千行数据才能使我的数据库从一开始就有用，该怎么办？在首次创建数据库时执行此类批量插入活动，会导致程序的首次执行速度可能非常慢，因为需要执行所有这些
    I/O 操作。这不仅可能让用户失望，而且这种长时间运行的工作也增加了应用程序在运行时遇到各种错误的可能性。


    如果你希望在应用程序中提供一个填充了相当数量数据的 SQLite 数据库，可以将其与其他资源一起打包到 `.apk` 文件中。存放 SQLite 文件的合适位置是在你的
    `assets/` 文件夹下的一个特定子文件夹中，这样它的路径就可以传递给重载的 `openDatabase()` 方法，该方法接受一个完整的文件路径作为其第一个参数。


    SQLite 数据库文件必须放置在 `assets/` 文件夹下的文件系统路径 `/data/data/your.package.name/databases/`
    中。将表示你的文件名的 `String`（例如，我们示例应用中的 `devices.db`）附加到该路径后，你就得到了可以传递给 `openDatabase()`
    的参数值。对于 `SQLiteExample` 应用，这个完整的路径和文件名实际上是：

    ```

    /data/data/org.beginningandroid.sqliteexample/devices.db

    ```


    ## 选择 SQLite 管理工具来准备要打包的数据库


    手工设计任何类型的数据库都是一件繁琐的事情，因此如果你希望将一个数据库文件与你的 Android 应用程序一起打包，你几乎肯定需要一些工具来帮助设计数据库并填充数据。


    ### 使用内置工具


    SQLite 附带了一些有用的管理工具，例如 `sqlite3` shell 程序，该程序随几乎所有操作系统（不包括 Windows）一起提供（即使在 Windows
    下，也可以从 `sqlite.org` 轻松下载）。AVD 工具也提供了对 `sqlite3` 实用程序的访问，一旦你连接到模拟设备，就可以从 `adb`
    shell 实用程序中调用它。例如，

    ```

    $ sqlite3 /data/data/org.beginningandroid.sqliteexample/devices.db

    ```'
  raw: 'In all relational databases, including SQLite, there are four key

    principles that are the standard way to ensure data is protected,

    intact, and available when expected. These are known as the ACID principles, where
    those

    letters stand for Atomicity, Consistency, Isolation, and Durability.

    Atomicity is the principle that all of the work in one transaction

    against the database either succeeds or is rolled back. No half-complete

    work should be allowed.

    Consistency is the principle that data in the database is always in a

    consistent state and transactions can only adjust the data from one

    consistent state to another consistent state.

    Isolation is the principle that the workings of a transaction will be

    invisible to other users of the database, until the entire atomic,

    consistent set of changes to the data caused by the transaction are made

    visible.

    Durability is the principle that changes once made to the data will

    endure, even in the event of abnormal system events, catastrophes, and

    so on.


    You should think about adding sanity-checking logic to your

    application to track and take action in those circumstances where you

    can be forewarned of issues. Low-power state

    is the most common situation you

    can detect, by registering a receiver in your application to watch for

    broadcasts like `ACTION_BATTERY_CHANGED`.

    By examining the intent payload, you can determine if power is running

    low and potentially defer write-heavy tasks.


    Packaging SQLite Databases with Your

    Applications

    My `SQLiteExample`

    application comes complete with a helper class that conveniently

    populates three rows of data to the device’s table to seed the database. Great
    for

    this example, but it might leave you thinking, what if I need a few

    hundred, or even a few thousand, rows of data to make my database useful

    from the start? Performing this kind of mass-insert activity when first

    creating the database will present the user with a potentially very slow

    first execution of the program as all of that I/O is performed. Not only

    might this disappoint the user but such a long-running piece of work

    increases the exposure of your application to the chance of various

    errors at runtime.

    If you want to provide a SQLite database populated with nontrivial

    amounts of data as part of your application, you package it with your

    other assets in the .apk. The appropriate place for the SQLite file is

    in a particular subfolder under your `assets/` folder, so

    that its location can be passed to the overloaded `openDatabase()`

    method, which accepts a full file location as its first parameter.


    SQLite database files must be placed under the assets/ folder into the

    file system folder `/data/data/your.package.name/databases/`.

    Append the `String` representing

    your filename (e.g., `devices.db` from our

    example application), and you have the value to pass as a parameter to

    `openDatabase()`.

    In practice, for the `SQLiteExample`

    application, this full path and filename is


    ```

    /data/data/org.beginningandroid.sqliteexample/devices.db

    ```


    Choosing SQLite Management Tools to Prepare

    Databases for Packaging

    Hand-crafting databases of any type is a tedious affair, so you will

    almost certainly want some tools to help design your database and

    populate it if you want to package a database file with your Android

    application.


    Working with Built-In Tools


    SQLite comes packaged with useful

    management tools, such as the `sqlite3` shell program

    that is shipped with almost all operating systems bar Windows (and even

    under Windows, it is trivial to download from `sqlite.org`). The AVD

    tools also provide access to the `sqlite3` utility, and

    you can invoke it from the `adb` shell utility

    once you are connected to your emulated device. For example,


    ```

    $ sqlite3 /data/data/org.beginningandroid.sqliteexample/devices.db

    ```'
