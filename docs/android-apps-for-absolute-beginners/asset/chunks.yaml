    \ with\n`execSQL()`, but\nthe most straightforward takes a `String` SQL statement\n\
    as a parameter, which is the SQL command executed by the SQLite library.\nA successful\
    \ execution of the SQL statement normally won’t provide a\nreturn value – the\
    \ “no news is good news” principle in action.\n\nEach of the SQL statements used\
    \ with the `execSQL()` calls is\nconstructed in constant declarations at the top\
    \ of the class. This\napproach to constant-based statements is not new, but it’s\
    \ worth noting\na few of the additional constants in use here:\n\n*   Each of\
    \ the three `COLNO_*` constants\n    represents the column number (or ordinal\
    \ position) of the columns in the\n    table as I have defined it. So the _id\
    \ column (discussed in the\n    following) is at position 0, the model_name column\
    \ is at position 1, and\n    so on. These positions are important for some of\
    \ the SQLite helper\n    methods that implicitly use the default column order\
    \ of a table for\n    returning data.\n\n*   `TABLE_COLUMNS` is a\n    `String`\
    \ array of\n    the column names in the table. A number of the methods we are\
    \ about to\n    explore make use of this collection of names.\n\nReturning to\
    \ the `_id` column of the\ntable, this makes use of the autoincrement feature\
    \ of SQLite to have it\ngenerate a unique integer value for each row, as the primary\
    \ key for\nyour table. The name `_id` is a convention\nused and expected by a\
    \ number of the built-in Android tools, helper\nclasses, and methods. I would\
    \ recommend picking up this design tradition\nfor all of your SQLite tables, at\
    \ least until you feel you understand\nthe consequences of doing things differently.\n\
    The next SQL statement invoked via an `execSQL()` call is the\n`INITIAL_DATA_INSERT`\n\
    statement . The\nstatement performs a multi-row insert to bootstrap an initial\
    \ set of\ndata into the one table in our schema. This kind of data seeding is\n\
    entirely optional, and you certainly will have situations where you do\nwant to\
    \ do this and others where you won’t need it. The syntax used for\nthe insert\
    \ statement itself is only supported in later versions of\nSQLite and therefore\
    \ later versions of Android. For more details on\nSQLite versions and features\
    \ vs. Android versions, check out the extra\nmaterial on the book website at [`www.beginningandroid.org`](http://www.beginningandroid.org).\n\
    The final method in the helper class is a skeleton for `onUpgrade()`. In the\n\
    example application, we are dealing with the first version of the\napplication\
    \ (`DBVERSION` equals 1\nand is used in the constructor call). I left the outline\
    \ of logic that\nyou could use to work with the provided `oldVersion` and `newVersion`\
    \ values to\ndecide what schema changes, data changes, or other alteration actions\n\
    might be needed as part of an upgrade to your application. When it comes\nto database\
    \ schema upgrades, you will see many examples online of people\nsimply dropping\
    \ and recreating a database as the `onUpgrade()`\nimplementation. It’s a pragmatic\
    \ hack, but it works to a degree, so long\nas you don’t care about your users’\
    \ data! Beware of this approach if you\nexpect your users to store any data of\
    \ value and want it retained even\nas the database schema is upgraded!\n\nCreating\
    \ a Database-Driven Activity\n\nWith an understanding of the purpose and structure\
    \ of the `SQLiteOpenHelper`\nclass , you are\nready to use it in building a useful\
    \ database-driven application. In the\n`Ch20/SQLiteExample`\napplication, you\
    \ see the logic as shown in Listing [20-3](#499629_1_En_20_Chapter.xhtml#PC3).\
    \ This listing\nis quite long, though I’ve saved space by omitting another helper\
    \ class\nI wrote named `DialogWrapper`. Read\non for the Java code and then a\
    \ walk-through of the logic.\n\n```\npackage org.beginningandroid.sqliteexample;\n\
    import android.app.AlertDialog;\nimport android.app.ListActivity;\nimport android.content.ContentValues;\n\
    import android.content.DialogInterface;\nimport android.os.Bundle;\nimport android.database.Cursor;\n\
    import android.database.sqlite.SQLiteDatabase;\nimport android.view.LayoutInflater;\n\
    import android.view.View;\nimport android.widget.ArrayAdapter;\nimport android.widget.Toast;\n\
    import java.util.ArrayList;\nimport java.util.Calendar;\nimport java.util.List;\n\
    public class MainActivity extends ListActivity {\nprivate SQLiteDatabase myDB;\n\
    private MySQLiteHelper myDBHelper;\n@Override\nprotected void onCreate(Bundle\
    \ savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
    myDBHelper = new MySQLiteHelper(this);\nmyDB = myDBHelper.getWritableDatabase();\n\
    displayModels();\n}\npublic void onClick(View view) {\nswitch(view.getId()) {\n\
    case R.id.addNewModel:\naddModel();\nbreak;\ncase R.id.getModelInfo:\ngetModelInfo(view);\n\
    break;\n}\n}\npublic List getModels() {\nList models = new ArrayList();\nCursor\
    \ cursor = myDB.query(MySQLiteHelper.TABLE_NAME,\nMySQLiteHelper.TABLE_COLUMNS,\
    \ null, null, null, null, null);\ncursor.moveToFirst();\nwhile (!cursor.isAfterLast())\
    \ {\nString model = cursor.getString(MySQLiteHelper.COLNO_MODEL_NAME);\nmodels.add(model);\n\
    cursor.moveToNext();\n}\ncursor.close();\nreturn models;\n}\npublic void displayModels()\
    \ {\nList modelEntries = getModels();\nArrayAdapter adapter = new ArrayAdapter(this,\n\
    android.R.layout.simple_list_item_1, modelEntries);\nsetListAdapter(adapter);\n\
    }\npublic void getModelInfo(View view) {\nCursor cursor = myDB.rawQuery(\n\"select\
    \ _id, model_name, release_year \" +\n\"from devices\", null);\ncursor.moveToFirst();\n\
    while (!cursor.isAfterLast()) {\nString model = cursor.getString(MySQLiteHelper.COLNO_MODEL_NAME);\n\
    Integer year = cursor.getInt(MySQLiteHelper.COLNO_RELEASE_YEAR);\nToast.makeText(this,\
    \ \"The \" + model +\n\" was released in \" + year.toString(),\nToast.LENGTH_LONG).show();\n\
    cursor.moveToNext();\n}\ncursor.close();\n}\nprivate void addModel() {\nLayoutInflater\
    \ myInflater=LayoutInflater.from(this);\nView addView=myInflater.inflate(R.layout.add_model_edittext,\
    \ null);\nfinal DialogWrapper myWrapper=new DialogWrapper(addView);\nnew AlertDialog.Builder(this)\n\
    .setTitle(R.string.add_model_title)\n.setView(addView)\n.setPositiveButton(R.string.ok,\n\
    new DialogInterface.OnClickListener() {\npublic void onClick(DialogInterface dialog,\n\
    int whichButton) {\ninsertModelRow(myWrapper);\n}\n})\n.setNegativeButton(R.string.cancel,\n\
    new DialogInterface.OnClickListener() {\npublic void onClick(DialogInterface dialog,\n\
    int whichButton) {\n// Nothing to do here\n}\n})\n.show();\n}\nprivate void insertModelRow(DialogWrapper\
    \ wrapper) {\nContentValues myValues=new ContentValues(2);\nmyValues.put(MySQLiteHelper.COLNAME_MODEL,\
    \ wrapper.getModel());\nmyValues.put(MySQLiteHelper.COLNAME_YEAR,\nCalendar.getInstance().get(Calendar.YEAR));\n\
    myDB.insert(MySQLiteHelper.TABLE_NAME,\nMySQLiteHelper.COLNAME_MODEL, myValues);\n\
    //uncomment if you want inserts to be displayed immediately\n//displayModels();\n\
    }\n@Override\npublic void onDestroy() {\nsuper.onDestroy();\nmyDB.close();\n}\n\
    }\nListing 20-3\nThe main SQLiteExample activity\n```"
  trans: "\n```markdown\n`MySQLiteHelper`的 Java 代码展示了本章前面概述的辅助类需求。构造函数接收文件名和版本信息，并用其检查\
    \ SQLite 数据库文件是否存在，必要时会创建该文件。我选择`devices.db`作为 SQLite 数据库文件的文件名，意在使其含义稍显明确。\n\n\
    观察`onCreate()`方法，可以看到它连续两次调用了`execSQL()`方法，这是你首次接触到与 SQLite 数据库交互的常用方法。`execSQL()`方法有众多参数和返回信息的变体，但最直接的方式是接收一个`String`类型的\
    \ SQL 语句作为参数，该语句即由 SQLite 库执行的 SQL 命令。通常情况下，SQL 语句执行成功不会提供返回值——这正是“没有消息就是好消息”原则的体现。\n\
    \n用于`execSQL()`调用的每条 SQL 语句，都是在类顶部的常量声明中构建的。这种基于常量的语句构建方式并非新概念，但此处使用的几个额外常量值得注意：\n\
    \n*   三个`COLNO_*`常量各自代表我所定义的表中列的列号（或序数位置）。因此，`_id`列（将在下文讨论）位于位置 0，`model_name`列位于位置\
    \ 1，依此类推。这些位置对于某些隐式使用表默认列顺序返回数据的 SQLite 辅助方法很重要。\n\n*   `TABLE_COLUMNS`是一个`String`数组，包含了表中各列的名称。我们即将探索的许多方法都会用到这个名称集合。\n\
    \n回到表中的`_id`列，它利用了 SQLite 的自增特性，为每一行生成一个唯一的整数值，作为表的主键。`_id`这个名称是许多内置 Android 工具、辅助类和方法所使用和期望的约定。我建议你为所有\
    \ SQLite 表都沿用这种设计传统，至少在你充分理解不同做法所带来的后果之前应如此。\n\n通过`execSQL()`调用的下一条 SQL 语句是`INITIAL_DATA_INSERT`语句。该语句执行多行插入，用于向我们模式中的唯一一张表填充初始数据集。这种数据播种完全是可选的，你肯定会遇到需要这样做的情况，当然也会有不需要的时候。插入语句所使用的语法仅在较新版本的\
    \ SQLite 中受支持，因此也仅限于较新版本的 Android。有关 SQLite 版本、特性与 Android 版本之间更详细的对应关系，请查阅本书网站[`www.beginningandroid.org`](http://www.beginningandroid.org)上的补充材料。\n\
    \n辅助类中的最后一个方法是`onUpgrade()`的框架。在示例应用中，我们处理的是应用的第一版（`DBVERSION` 等于 1，并在构造函数调用中使用）。我留下了一个逻辑框架，你可以利用它来处理提供的`oldVersion`和`newVersion`值，从而决定在应用升级过程中可能需要哪些模式变更、数据变更或其他修改操作。谈到数据库模式升级，你会在网上看到许多示例，其中人们只是简单地删除并重新创建数据库作为`onUpgrade()`的实现。这是一种实用的\
    \ hack 方法，但仅在你不关心用户数据时才能在一定程度上有效！如果你期望用户存储任何有价值的数据，并且希望在数据库模式升级后仍保留这些数据，请警惕这种方法！\n\
    \n## 创建数据库驱动的 Activity\n\n理解了`SQLiteOpenHelper`类的用途和结构后，你就可以使用它来构建一个有用的数据库驱动应用了。在`Ch20/SQLiteExample`应用中，你将看到如代码清单\
