- fmt: '# In Part 1 of the book, you had a whirlwind tour of the steps required to
    create a new Android Studio project for your Android application and explored
    the structure, files, and purpose of the various parts of a default Android project.
    You delved into the initial steps of creating your own behavior with the XML configuration
    for your application’s color scheme and leveraged the utility of text resources
    to personalize the welcome message in your application’s main activity.


    In this chapter, we will go beyond the surface changes from the earlier chapters
    and dive right into the major user interface elements you have available in all
    Android applications and those that will become the mainstay of many of the activities
    you develop and deploy for all of your future Android work. You will learn how
    to deploy, adapt, and control the many user interface widgets that are available
    to you as an Android developer and begin your journey crafting more sophisticated
    Android user experiences.


    ## Everything Starts with `View`


    In the Android world, every major element you can display on a user interface
    – an activity – inherits from a base class know as `View`. Any `View`-derived
    widget, be it a text box, button, pick list, or what have you, provides you with
    a range of common behaviors and benefits derived from this `View` lineage. These
    common behaviors and attributes include things like consistent ways to set and
    control fonts, colors, and other styling characteristics.


    Over and above these common characteristics, a range of methods and attributes
    are available, thanks to the common `View` heritage all widgets have. We will
    cover these inherited characteristics next.


    ## Key Methods Derived from `View`


    Any widget derived from the `View` base class inherits a range of methods and
    properties that help manage things like basic state management, grouping with
    other widgets, parent and child objects in the layout, and so forth. The attributes
    you’ll see include:


    1.  `findViewById()`: Finds the widget with a given ID, used extensively to link
    a widget defined in XML to control logic in Java (and Kotlin).

    2.  `getParent()`: Finds the parent object, whether it’s a widget or container.

    3.  `getRootView()`: Gets the root of the tree provided from the activity’s original
    call to `setContentView()`.

    4.  `setEnabled()`, `isEnabled()`: Sets and checks the enabled state of any widget,
    for example, for things like checkboxes, radio buttons, and more.

    5.  `isClickable()`: Reports whether this view (e.g., button) reacts to click
    or press events.

    6.  `onClickListener()`: For views like buttons that can be clicked, defines a
    callback that will be triggered when the associated view is clicked. The callback
    implementation holds whatever logic you decide is needed.


    ## Key Attributes and Properties Derived from `View`


    Along with core methods from the `View` base class, all widgets also inherit some
    key properties. These properties include:


    1.  `android:contentDescription`: This is a text value associated with any widget
    that can be used by accessibility tools, where the visual aspect of the widget
    is of little or no help to the user.

    2.  `android:visibility`: Determines if the widget should be visible or invisible
    at first instantiation.

    3.  `android:padding`, `android:paddingLeft`, `android:paddingRight`, `android:paddingTop`,
    `android:paddingBottom`: Various approaches to pad values on all sides of the
    widget.


    **Note** Padding for a widget can also be set at runtime with the `setPadding()`
    method.


    ## Introducing the Core UI Widgets in Android


    There are a core set of UI widgets you will turn to again and again when building
    Android applications, as they provide many of the common user interface experiences
    users of computers, smartphones, and so on have learned to expect over the last
    few decades. Let’s step through examples of each of these core widgets.


    ### Labeling Things with `TextView`


    Providing a readable text label is probably the most fundamental of all UI widgets,
    and you’ll find a label or static text equivalent in almost every design toolkit
    ever invented. Android provides the `TextView` widget to carry out this function,
    letting you place a static string (or at least static to begin with, as the value
    of a `TextView` can be changed programmatically) anywhere on an activity’s UI.
    The text of this string is entirely at your mercy, whether it’s providing a description
    of an adjacent widget, a caption, some commentary, or notes – the choice is yours.


    Android provides two major ways to define a `TextView` and indeed all UI widgets.
    The first approach is define your `TextView` entirely through the use of Java
    code, setting attributes like on-screen position, size, text payload, and so forth.
    Anyone who has prior experience developing nontrivial user interfaces will tell
    you this is a lot of work, it is error prone, and you will quickly see your code
    grow to unmanageable size. But there is a better way, and you’ve already used
    it!


    It is far faster and easier to use Android’s other methods for UI design, which
    is via declarative XML. In Chapter [3](#499629_1_En_3_Chapter.xhtml), you created
    your `MyFirstApp` application and took charge of the text within a `TextView`
    widget. In Chapter [7](#499629_1_En_7_Chapter.xhtml), you dabbled further with
    controlling the source of the `TextView` string and some other decorative attributes.
    You can add as many `TextView` widgets as you think make sense at any time, either
    directly through defining further `<TextView>` elements in the activity’s XML
    definition file or by using the Graphical Layout Editor.


    The Graphical Layout Editor lets you worry about the visual styling and automatically
    generates the necessary matching XML behind the scenes to describe your `TextView`
    widget.


    Let’s put this through its paces right now. Even though your `MyFirstApp` app
    is perfectly fine, let’s leave it out of the picture. In Android Studio, create
    a new project via the `File` ➤ `New...` ➤ `New Project` menu option. Just as we
    did in Chapter [3](#499629_1_En_3_Chapter.xhtml), give your project a meaningful
    name, such as `TextViewExample`, and choose the Empty Activity template. This
    will create your new project and place a `TextView` widget by default in the `activity_main.xml`
    file (just as happened when you created your `MyFirstApp` application). Your `activity_main.xml`
    content should look like Listing [9-1](#499629_1_En_9_Chapter.xhtml#PC1).


    ```

    Listing 9-1

    A fresh Android Studio application using the Empty Activity template

    ```


    Rather than edit the XML here, invoke the Graphical Layout Designer by clicking
    the **Design** button on the far right-hand side of your Android Studio view.
    This should hide the XML content and instead present you with the equivalent graphical
    layout for your application as shown in Figure [9-1](#499629_1_En_9_Chapter.xhtml#Fig1).


    ![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig1_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig1_HTML.jpg)


    Figure 9-1 Invoking the Graphical Layout Designer'
