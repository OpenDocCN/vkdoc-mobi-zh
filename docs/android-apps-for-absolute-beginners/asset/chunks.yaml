    本章将扩展您对 Android 所有用户界面组件的掌握范围和理解深度，并基于第 [8](#499629_1_En_8_Chapter.xhtml) 章和第
    [9](#499629_1_En_9_Chapter.xhtml) 章的内容进一步展开。


    ## 2. 理解 Activity


    掌握了前几章的用户界面概念后，您将探索作为所有 Android 应用程序基本构建块的 Activity 的全部功能。


    ## 3. 介绍 Fragment


    您将学习 Fragment 的广义概念，该概念为支持多种屏幕尺寸和布局选项的开发提供了强大动力。


    ## 4. 在 Android 中使用声音、音频和音乐


    在本章中，我们将探讨应用程序中音频的所有方面，包括音频播放、应用程序中的声音使用、音频录制，甚至在 Android 设备上创建音频。


    ## 5. 在 Android 中使用视频和电影


    如果您是一位初露头角的史蒂文·斯皮尔伯格、索菲亚·科波拉，甚至只是 YouTube 明星，本章正适合您。我们将介绍 Android 的视频捕获和播放功能，以及如何将这些功能整合到您的应用程序中。


    ## 6. 介绍通知


    通过使用 Android 提供的事件框架和通知系统，突破应用程序的边界。


    ## 7. 通过调用探索设备功能


    Android 世界的可能性远不止屏幕上显示的内容。我们将研究呼叫能力、访问传感器以及其他信息。


    ## 8. 理解 Intent、事件和接收器


    在每个 Android 应用程序的背后，都有大量的后台功能在维持其运行。本章涵盖了 Android 平台的核心概念，并展示了它们如何塑造和影响您的应用程序。


    ## 9. 介绍 Android 服务


    在本章中，我们将探讨如何与其他代码和应用程序协作，以丰富您自己的应用程序及其为用户提供的功能。


    ## 10. 在 Android 中使用文件


    Android 使您能够处理多种数据、配置文件和其他文件。本章将带您了解 Android 应用程序在何处以及如何利用传统文件来增强用户体验。


    ## 11. 在 Android 中使用数据库


    数据驱动着每一个应用程序，了解如何存储、管理和使用应用程序数据是打造优秀应用的关键。本章将介绍 Android 提供的多种数据处理方式。


    以上对未来内容的预览到此结束。事不宜迟，让我们马上开始。第 [2](#499629_1_En_2_Chapter.xhtml) 章就在下一页等着您！


    # 2. 介绍 Android Studio


    在本章中，我们将介绍 Android Studio，这是您编写 Android 应用程序软件时使用的主要工具。虽然您还会依赖一系列其他软件，但 Android
    Studio 集成开发环境（IDE）将是让您想法成真的核心。您可以将它视为用于编写软件的软件。


    如果您过去有过任何软件开发的经历，可能会觉得其中一些概念很熟悉。如果是这样，请直接跳到本章后面的部分，那里会直接深入探讨如何在您选择的平台上安装 Android
    Studio。当然，您也可以继续阅读，看看这个主题有没有什么新的或有趣的内容。


    现在，让我们深入探讨您作为 Android 应用程序开发者将使用的最重要工具集——Android Studio！


    ## 理解什么是集成开发环境（IDE）


    在深入之前，让我们为那些从未接触过此术语或完全编程新手定义一下 IDE 的含义。“集成开发环境”这个术语几乎是不言自明的，但也不完全是。我们来拆解一下：“开发环境”部分简单地指代开发者进行开发的环境（从软件意义上讲）。这类似于说
    Microsoft Word 或 Google Docs 是作者的“写作环境”——他们进行写作的地方。


    “集成”这个词也很直接，但知道集成了什么，是理解 IDE 整体的关键。为了进一步延伸我们的写作类比，作为一名软件开发者，您也将进行“写作”，但您的写作内容将是
    Java 以及可能的其他几种语言编写的、人类可读的编程代码。为此，每个 IDE 都包含（集成）了一个代码编辑器，您可以在其中编写实际的原始代码。目前看来，一切都很简单。


    正如 Microsoft Word 为作者提供了一些额外的捆绑工具，如拼写检查和在线词典释义查询，IDE 同样会将其他工具整合进来，并以集成的方式提供给软件开发者。除了代码编辑器之外，通常还有语言参考工具，以便您查阅软件库的工作原理；构建工具，将您编写的代码编译成可工作的软件；调试工具，帮助您识别和理解问题与错误；以及众多其他工具，如性能分析器、代码格式化器、语法高亮器、实时检查工具、网络监视器等。


    IDE 的核心在于所有这些工具都是集成的，并且或多或少能良好地协同工作，无需开发者手动在工具之间传递信息。在 IDE 出现之前，这就是开发者不那么光鲜的日常工作。有了像
    Android Studio 这样的 IDE 来处理繁琐、复杂和重复的操作，您就可以解放出来，专注于编写应用程序时创造性的问题解决方面，而无需过多担心底层的基础设施。


    ## Android Studio 的历史与渊源


    当 Google 首次为 Android 发布开发者工具时，它瞄准了当时最流行的开源开发环境之一——Eclipse。它发布了一套插入 Eclipse 的工具，称为
    Android 开发者工具（ADT）。这种 Eclipse 与 ADT 的组合满足了许多 Android 开发者多年的需求。时光飞逝，十多年过去了，尽管 Eclipse
    仍然是一个非常流行的 IDE，但许多其他 IDE 已崛起或衰落，而 Google 向来热衷于处于此类变革的前沿。


    2013 年，Google 宣布与 JetBrains 公司合作。JetBrains 开发了一款名为 IntelliJ IDEA 的现代 IDE，主要专注于为构建基于
    Java 的应用程序的开发者提供一流的体验。这款新的合作产品将基于 IntelliJ IDEA，并命名为 Android Studio，作为完全免费的 Android
    开发 IDE 发布。Android Studio 1.0 版本于 2014 年底发布。在随后的几年里，Google 宣布 Android Studio 将是开发
    Android 应用程序的首要 IDE，并且将停止对其他工具的投入。但这并没有阻止 Eclipse 的粉丝们继续使用 Eclipse、ADT 以及其他一系列工具——我们将在本章末尾讨论这类替代方案。'
  raw: '**Chapter** [**10**](#499629_1_En_10_Chapter.xhtml)**, Exploring Android Concepts:**
    Layouts and More: This chapter expands your repertoire and breadth of understanding
    for all of Android’s user interface components and builds further on the work
    from Chapters [8](#499629_1_En_8_Chapter.xhtml) and [9](#499629_1_En_9_Chapter.xhtml).


    **Chapter** [**11**](#499629_1_En_11_Chapter.xhtml)**, Understanding Activities:**
    Armed with the UI concepts from earlier chapters, you will explore the full power
    of activities as the basic building block of all Android applications.


    **Chapter** [**12**](#499629_1_En_12_Chapter.xhtml)**, Introducing Fragments:**
    You will learn the wider concept of fragments that power development for many
    different screen sizes and layout options.


    **Chapter** [**13**](#499629_1_En_13_Chapter.xhtml)**, Working with Sound, Audio,
    and Music for Android:** In this chapter, we will explore all aspects of audio
    for your applications, including playback of audio and use of sounds in applications,
    recording audio, and even creating audio on Android devices.


    **Chapter** [**14**](#499629_1_En_14_Chapter.xhtml)**, Working with Video and
    Movies for Android:** If you are a budding Steven Spielberg, Sophia Coppola, or
    even just YouTube star, this chapter is for you. We will cover Android’s video
    capabilities for both capture and playback and how to work these capabilities
    into your applications.


    **Chapter** [**15**](#499629_1_En_15_Chapter.xhtml)**, Introducing Notifications:**
    Branch out beyond the boundaries of your application by using the event frameworks
    and notification systems that Android provides.


    **Chapter** [**16**](#499629_1_En_16_Chapter.xhtml)**, Exploring Device Capabilities
    with Calls:** There is more to your Android world of possibilities than just what
    can be shown on-screen. We will look at call capabilities, accessing sensors,
    and other information.


    **Chapter** [**17**](#499629_1_En_17_Chapter.xhtml)**, Understanding Intents,
    Events, and Receivers:** Behind the scenes of every Android application, a wealth
    of background features keep things moving. This chapter covers the core concepts
    central to the Android platform and shows how they shape and influence your applications.


    **Chapter** [**18**](#499629_1_En_18_Chapter.xhtml)**, Introducing Android Services:**
    In this chapter, we’ll explore working with other code and other applications
    to enrich your own application and what it can do for your users.


    **Chapter** [**19**](#499629_1_En_19_Chapter.xhtml)**, Working with Files in Android:**
    Android enables you to work with many kinds of data, configuration, and other
    files. This chapter will start your journey understanding where and how Android
    applications can leverage traditional files for powering your user experiences.


    **Chapter** [**20**](#499629_1_En_20_Chapter.xhtml)**, Working with Databases
    in Android:** Data drives every application, and knowing how to store, manage,
    and use data for applications is key to making them great. This chapter will cover
    the many ways Android provides for working with data.


    With that foretaste of what’s to come complete, there’s no time like the present
    to get started. Chapter [2](#499629_1_En_2_Chapter.xhtml) awaits on the next page!


    # 2. Introducing Android Studio


    In this chapter, we will introduce Android Studio, the primary tool you will use
    to write the software for your Android applications. While there are a range of
    other pieces of software you will rely on, the Android Studio Integrated Development
    Environment (IDE) will be central to bringing your ideas to life. You can think
    of it as the software you use to write further software.


    If you have done any kind of software development in the past, you might find
    some of the concepts familiar. If that is the case, feel free to skip ahead to
    the sections later in this chapter that dive straight into the mechanics of installing
    Android Studio for your chosen platform. You can of course keep reading, to see
    if there’s anything new or interesting on the topic.


    Let’s now delve into the most important toolset you will use as an Android apps
    developer – Android Studio!


    ## Understanding What Is Meant by Integrated Development Environment, or IDE


    Before we dive in, let’s define what is meant by IDE for those who haven’t encountered
    the term or are completely new to programming. The term Integrated Development
    Environment is almost self-explanatory, but not quite. If we pull it apart, the
    “Development Environment” bit is simply referring to the fact that it is the environment
    (in the software sense) where developers develop. That’s akin to saying Microsoft
    Word, or Google Docs, is an author’s “Writing Environment” – the place where they
    do their writing.


    The term “Integrated” is also straightforward, but knowing what is being integrated
    is key to an overall understanding of an IDE. To extend our writing analogy a
    little further, as a software developer you will also be writing, but in your
    case, it will be human-readable programming code in Java and potentially several
    other languages. To that end, every IDE includes (integrates) a code editor, where
    you write the actual raw code. So far, so good.


    Just as Microsoft Word provides some extra bundled tools for an author, like spelling
    check and online dictionary definition lookup, so too an IDE pulls in other tools
    and makes them available in an integrated way to a software developer. Alongside
    the code editor, there are usually language reference tools so you can look up
    how a software library works, build tools that take your written code and compile
    it into a working piece of software, debugging tools to help you identify and
    understand problems and errors, and a host of other tools like performance profilers,
    code formatters, syntax highlighters, live inspection tools, network monitors,
    and more.


    The crux of the IDE is that all of these tools are integrated, and more or less
    work well together, without needing the developer to manually pass things around
    between the tools. Prior to the emergence of IDEs, this was the less glamorous
    life of a developer. With an IDE like Android Studio in place to handle mundane,
    convoluted, and repetitive actions, you are left free to focus on the creative
    problem-solving aspects of writing applications, worrying less about the low-level
    plumbing.


    ## The History and Provenance of Android Studio


    When Google first released developer tools for Android, it targeted one of the
    most popular open source development environments of the day, Eclipse. It released
    a set of tools that plugged into Eclipse, known as the Android Developer Tools,
    or ADT. This combination – Eclipse and ADT – satisfied many Android developers
    for many years. Fast-forward over a decade, and while Eclipse is still a hugely
    popular IDE, a range of other IDEs have risen and fallen in prominence, and Google
    is nothing if not keen to be at the leading edge of these sorts of changes.


    In 2013, Google announced that it was cooperating with JetBrains, a company that
    had developed a modern IDE known as IntelliJ IDEA that focused primarily on first-class
    developer experiences for those building Java-based applications, and the new
    collaborative product would be based on IntelliJ IDEA and known as Android Studio
    and released as a completely free IDE for Android development. Android Studio
    version 1.0 was released later in 2014\. In subsequent years, Google announced
    that Android Studio would be the premier IDE for developing Android applications
    and it would cease focusing on and investing in other tools. This hasn’t stopped
    Eclipse fans from continuing to use Eclipse, the ADT, and a range of other tools
    – we’ll touch on such alternatives at the end of this chapter.'
