- fmt: '# Using Assets and Raw Files


    In Chapters [13](#499629_1_En_13_Chapter.xhtml) and [14](#499629_1_En_14_Chapter.xhtml),
    we introduced audio and video examples that relied on some of Android’s features
    dealing directly with files. Use of the `raw` and `asset` locations such as we
    explored in the examples in those chapters isn’t limited to just media files like
    audio, images, and video. You can put pretty much any type of file in those locations,
    so long as you take on the developer responsibility for knowing how to access
    and manipulate their content. As an example, you could store a `.csv` file for
    holding some useful data.


    Android provides easy access to files via the `Resources` class and its `getResources()`
    method. With a raw resource file, you present its content through an `InputStream`
    by a call to the `openRawResources()` method. Your task as a developer is to know
    what the data in the `InputStream` means.


    Before we look at an example, there are some important pros and cons to working
    with data sources from raw or asset files to know.


    ## Advantages of the raw-based approach


    1. Your files can be packaged with your application, thanks to the Android Asset
    Packaging Tool, AAPT.

    2. You can co-locate resources in a library project, so you can access them from
    many applications when needed.

    3. Files are private by default, with external access requiring full knowledge
    of the package name and resource name to reference or appropriate library or API
    calls, as well as file access permissions granted in the manifest file or at runtime.

    4. Read-only and static data can be packaged in common formats, like JSON or XML.


    ## Disadvantages of the raw-based approach


    1. Read-only by default. Editing existing resources packaged with the application
    is not straightforward.

    2. Sharing is nontrivial for other applications or service users.

    3. Static nature imposes issues keeping information up to date.


    Armed with those benefits and disadvantages, you can make an informed choice of
    whether this is the right approach for your application and desired functionality.


    # Populating Lists from Resource Files


    Understanding the benefits and drawbacks of file management is best demonstrated
    with an example. For this example, we will introduce the `ListView` UI widget
    and adapter logic and use them as the mechanism with which to read data from an
    XML file and populate a list of values from the file’s data dynamically at application
    runtime. Listing 19-1 shows a simple layout providing a `ListView` to ultimately
    display the data from our XML resource file.


    ```

    Listing 19-1

    The layout for the RawFileExample

    ```


    For this example application, we will have our `ListView` show the names of colors
    and take those color names from the XML file `colors.xml` we provide in the `ch19/RawFileExample`
    project. You can see the content of the file `colors.xml` in Listing 19-2.


    ```

    Listing 19-2

    The colors.xml file content

    ```


    You can see that the `colors.xml` file is very simple, which is intentional. Our
    focus is the logic required to actually open this file, read and parse its content,
    and use the resulting data in an appropriate data structure for our application,
    rather than XML complexity. Listing 19-3 shows the logic for a straightforward
    `ListActivity`-based application that will display the color names from the `colors.xml`
    file in a list and then let the user click to choose a particular color.


    ```

    package org.beginningandroid.rawfileexample;

    import android.app.ListActivity;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.ArrayAdapter;

    import android.widget.ListView;

    import android.widget.TextView;

    import org.w3c.dom.Document;

    import org.w3c.dom.Element;

    import org.w3c.dom.NodeList;

    import java.io.InputStream;

    import java.util.ArrayList;

    import javax.xml.parsers.DocumentBuilder;

    import javax.xml.parsers.DocumentBuilderFactory;

    public class MainActivity extends ListActivity {

    private TextView mySelection;

    ArrayList colorItems = new ArrayList();

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    mySelection = (TextView) findViewById(R.id.mySelection);

    try {

    InputStream inStream = getResources().openRawResource(R.raw.colors);

    DocumentBuilder docBuild = DocumentBuilderFactory

    .newInstance().newDocumentBuilder();

    Document myDoc = docBuild.parse(inStream, null);

    NodeList colors = myDoc.getElementsByTagName("color");

    for (int i = 0; i < colors.getLength(); i++) {

    colorItems.add(((Element) colors.item(i)).getAttribute("value"));

    }

    } catch (Exception e) {

    e.printStackTrace();

    }

    setListAdapter(new ArrayAdapter(this,

    android.R.layout.simple_list_item_1, colorItems));

    }

    public void onListItemClick(ListView parent, View v, int position,

    long id) {

    mySelection.setText(colorItems.get(position).toString());

    }

    }

    Listing 19-3

    RawFileExample Java logic for processing the XML resource file

    ```


    Reviewing the code for `RawFileExample`, you will immediately notice the number
    of external Java libraries we are importing to handle file I/O and XML parsing.
    This is the power of the Java heritage for Android in action. Even if you choose
    to move on to Kotlin as your preferred programming language, the huge breadth
    of Java libraries are available to help you with functionality.


    The `onCreate()` method first creates an `InputStream` object, and then we call
    `getResources().openRawResource()` to perform the act of finding the file within
    the `.apk`, allocating its file descriptor, associating them with the `InputStream`,
    and finally readying the system for subsequent use of the data stream from our
    file. From that point on, the remaining logic is what’s needed to interpret what
    is in the file.


    Following the initial file handling, we use a `DocumentBuilder` object to parse
    the content of the file and store the resulting representation in a `Document`
    object, named `myDoc`. Using DOM semantics, we call `getElementsByTagName()` to
    collect all of the `<color>` elements into our `NodeList` object. This might seem
    excessive given our file’s simplicity, but imagine a more complicated XML schema
    with other elements, child elements, and so on, and you can see how this efficiently
    sifts to find our desired elements.


    Finally, we use a `for` loop, iterating through the `NodeList` `<color>` entries,
    to extract the value attribute’s text – which is the actual color name string
    we want to present in the `ListView`. With our `NodeList` populated, we can then
    inflate the `ListView` with the `ArrayAdapter` configured to use the list of color
    names, asking it to render the result using the default `simple_list_item_1` built-in
    XML layout.


    The logic for handling the user clicking a color retrieves the color string and
    populates the `TextView` with the user’s chosen entry.


    Running the application shows the data from the `colors.xml` file rendered in
    our `ListView`, as shown in Figure 19-1.


    ![../images/499629_1_En_19_Chapter/499629_1_En_19_Fig1_HTML.jpg](images/499629_1_En_19_Chapter/499629_1_En_19_Fig1_HTML.jpg)


    Figure 19-1

    The RawFileExample application showing the contents of an XML file'
