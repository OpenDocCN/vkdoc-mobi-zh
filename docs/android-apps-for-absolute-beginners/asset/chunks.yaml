- fmt: '# Configuring Notifications


    In the normal course of using an application, it has a lot of ways to present
    new or important information to grab the user’s attention. There are times when
    something notable has happened, but the user has navigated away from the application,
    or it’s in the background or paused. For applications like services with no UI,
    there’s no normal user-facing visibility, so an extra hurdle exists in those circumstances
    when trying to be noticed.


    Android handles these cases and more via its `NotificationManager` system service.
    The `NotificationManager` is available to you through your application via the
    passing of an appropriately structured parameter to a `getSystemService()` method
    call. This can be as simple as the following code snippet:


    ```

    getSystemService(NOTIFICATION_SERVICE)

    ```


    The call to `getSystemService()` will provide you with a resulting `NotificationManager`
    object, and you then have access to notification management methods it provides.
    Some of the most common methods you will use with the `NotificationManager` object
    are:


    1. `notify()`: As the name suggests, this is the method used to activate a notification
    according to whatever trigger or circumstance you think warrants the user’s attention.
    It takes a `Notification` object as a parameter, which carries the details of
    your notification – text, images, and so on – in the payload, and the chosen ways
    in which you want the Android notification infrastructure to alert the user.


    2. `cancel()`: Use this method to dismiss a notification. Android can also cancel
    notifications in response to certain user actions, including gestures like “swipe
    to dismiss.”


    3. `cancelAll()`: The nuclear option! When you simply want all notifications that
    a `NotificationManager` object has active to go, invoke `cancelAll()`.


    # Customizing Notifications with the Notification Object


    Default notification behavior in Android is quite capable of doing most of the
    things you want when it comes to notifying users. But there are times when you
    want to go the extra mile and really seek the user’s attention. The `Notification`
    object has methods to enhance and customize your notification.


    ## Understanding Old and New Ways of Enhancing Notifications


    Notifications have evolved over time with Android, such that there is the original
    (old) way of enhancing notifications using individual additional methods to tweak
    and amplify your effort and the more recent method of using a `NotificationBuilder`
    object to tackle all of the customization in one go. I will show both approaches
    and flag that if you are targeting older builds of Android prior to version 7,
    the older method is more likely to be reliable for your needs.


    # Adding Sounds to Your Notification


    Let’s start our notification exploration with the older/traditional approach and
    in particular Android’s support of sound for many different types of notifications.
    By leveraging a range of user-configurable sounds at the base Android level, you
    can avoid having to manage audio resources if you prefer not to. You can have
    your `Notification` object leverage the device’s default sound (whether or not
    configured by the user) by invoking its `.defaults()` method as follows:


    ```

    Notification myNotification = new Notification(...);

    myNotification.defaults = Notification.DEFAULT_SOUND;

    ```


    You can take the extra step of providing your own sound by using a `Uri` reference
    to an audio resource, whether it is a raw or assets-managed file you have provided
    or a reference to one of the many sounds that come bundled with Android.


    An example of using the stock Android “Kalimba” sound is shown in the following,
    using the `Uri` for this resource via the `ContentResolver` class and assigning
    the sound accordingly:


    ```

    Notification myNotification = new Notificiation(...);

    myNotification.sound = Uri.parse(ContentResolver.SCHEME_ANDROID_RESOURCE +

    "://" +

    getPackageName() +

    "/raw/kalimba");

    ```


    As there are multiple mechanisms to triggering a notification, it is important
    to know there is a hierarchy of priorities. Any sound notification assigned with
    `.sound()` – or other notification form for that matter using its own relevant
    method – will be overridden by any equivalent set with the `.defaults()` method
    if such a call includes a parameter for the notification type, such as the flag
    `DEFAULTS_SOUND` for sounds. This will happen regardless of the order in which
    you call these methods.


    In the newer world of notifications in Android, you set properties like the sound
    you wish to use by building up a `NotificationBuilder` object and then finally
    having the `Notification` use the `NotificationBuilder` when you’ve set all of
    your desired properties. The equivalent effort to set a sound using the newer
    approach would look as follows:


    ```

    Notification.Builder myBuilder = new Notification.Builder(this, ...)

    myBuilder.setSound(Uri.parse(ContentResolver.SCHEME_ANDROID_RESOURCE +

    "://" +

    getPackageName() +

    "/raw/kalimba"));

    ```


    # Using Device Lights for Your Notification


    It’s rare to find an Android phone or tablet that lacks a built-in LED light as
    part of the front-facing display. This light can be put to many uses, including
    acting as another vector for notifying users of notifications (and not just keeping
    me, your trusty author, awake at 3:00 a.m.). The built-in light for an Android
    device can be controlled in several ways by configuring based on your `Notification`
    object’s configuration:


    1. The `.lights()` method activates the LED when passed a Boolean TRUE value.


    2. You can change the color of the LED, on supported devices, via the `ledARGB`
    parameter and the matching hex code for the RGB-based color you wish to use.


    3. Blink and cycle the light using the `ledOnMS` and `ledOffMS` values, expressing
    on and off times in milliseconds.


    The equivalent approach for newer Android builds using `Notification.Builder`
    is the `.setLights()` method. You can probably start to guess how to infer the
    new methods using the builder approach from the old methods using a base `Notification`
    object directly and vice versa.


    **Note:** The `Notification.Builder()` approach was introduced with Android 8
    and the older notification style deprecated. With API levels beyond 24, you should
    always use `Notification.Builder()` and let Android’s compatibility libraries
    deal with behavior on older versions.


    As well as the particular notification flourish you wish to use, be sure to set
    the `Notification.flags` field to include the `Notification.FLASH_SHOW_LIGHTS`
    flag. On basic devices with monochromatic LEDs, you might find your color choice
    isn’t applicable, and instead the device will vary the brightness of the LED.
    For devices that have LEDs supporting multiple color output, there will be a small
    subset of cases where this also happens if the manufacturer hasn’t included the
    necessary smarts for the `Notification` class to be able to control color. There
    is also the case of devices where there is no LED for notification use, including
    things like TVs, Android Auto systems, and some embedded uses of Android. Given
    this varied device landscape, you should consider flashing LED notification as
    a bonus, rather than a critical method of gaining attention.


    # Shaking It!


    Your users have more senses than just sight and hearing that you can use to attract
    their attention. When blinking lights and catchy sounds aren’t enough, you can
    move (pun intended) on to vibration. Android’s original notification model includes
    a default flag to allow use of the device-wide default for shaking things up:


    ```

    myNotification.defaults = Notifcation.DEFAULT_VIBRATE;

    ```


    The newer approaches to notification use the `.setVibrate()` method on the `Builder`
    object to the same effect.


    To have any vibration-based notifications actually trigger physical vibration,
    you will need the following permission in your manifest:


