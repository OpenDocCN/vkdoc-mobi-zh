- fmt: '# 视图中的大量内容


    这个视图中包含很多内容，但最佳的学习方式是逐一尝试每个区域。从 **Palette**（面板）部分开始，你会看到一系列小部件类型——Common（通用）、Text（文本）、Buttons（按钮）等——旁边是对应的实际小部件列表。在此列表顶部，你会看到`TextView`，如图[9-1](#499629_1_En_9_Chapter.xhtml#Fig1)所示。将其拖放到屏幕中央的微型屏幕示意图上，你会看到一个微小的浮动标签在移动，直到你松开鼠标按钮。请在你认为“合适”的位置进行操作。


    第二个`TextView`现在会显示在相应位置，但你会看到一个红色错误标志——点击它会提示你尚未在新`TextView`上设置“约束”（constraints），因此如果你实际构建并运行此应用程序，你放置的位置将不会被保留。别担心！我们马上就会修复这个问题，但需要在你的
    XML 定义中处理，并在此过程中了解更多关于`TextView`小部件的知识。点击最右侧的 **Code** 按钮，切换回布局的代码视图。


    你的`activity_main.xml`文件现在应与清单[9-2](#499629_1_En_9_Chapter.xhtml#PC2)相似，其中包含一个新的`<TextView>`元素及其关联属性。


    ```

    Listing 9-2

    Your revised activity_main.xml file

    ```


    我们已经在之前的章节中修改过`<TextView>`的属性，现在我们要更进一步！让我们介绍一些有助于控制`TextView`和其他小部件的新属性：


    1.  `android:layout_marginStart`

    2.  `android:layout_marginEnd`

    3.  `android:layout_marginLeft`

    4.  `android:layout_marginRight`

    5.  `android:layout_marginBottom`


    正如其名称所示，每个属性都用于设置小部件各边缘的边距。


    我们还受益于应用程序使用的默认布局方法，称为`ConstraintLayout`。我们将在后续章节中更详细地讨论布局，但目前你可以将其理解为帮助你放置小部件到活动（activity）中的各种方法。某些布局为你处理了大量设置，但代价是稍微减少了艺术自由度；而其他布局则给予你完全的自由，但需要你完成更多工作。`ConstraintLayout`属于前者，旨在尽可能帮助你获得美观的布局。它为所有小部件的布局带来了几个关键属性，包括：


    1.  `app:layout_constraintTop_toTopOf`

    2.  `app:layout_constraintBottom_toBottomOf`

    3.  `app:layout_constraintLeft_toLeftmOf`

    4.  `app:layout_constraintRight_toRightOf`


    还有更多`layout_constraint*`风格的属性组合，它们都服务于一个目的：根据与另一个小部件的顶部、底部、左侧或右侧边缘（以及其中心、相关小部件中任何文本的定位等）的接近度和关系，来指定如何对齐和调整小部件的大小。


    我们需要这些布局边距属性和约束属性，以便为新的`TextView`提供可预测的行为，如下所示：


    ```

    The actual values are fairly easy to understand. The three different

    margin attributes are setting the size of the margins in pixels around

    the TextView. The layout constraint attributes are tying the vertical

    and horizontal constraint defaults to something called "parent". In this

    instance, that means the parent activity itself. You can instead refer

    to the `android:id` of another

    widget to have it act as the guiding factor for constraining the widget.

    ```


    完成这些更改后，你应该保存`activity_main.xml`文件，然后运行你的`TextViewExample`应用程序，查看新的标签是否已就位，并按照你的指令定位，如图[9-2](#499629_1_En_9_Chapter.xhtml#Fig2)所示。


    ![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig2_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig2_HTML.jpg)


    *图 9-2 为你的应用程序添加更多 TextView 标签*


    要完整了解`TextView`小部件，你应该知道有近100种不同的属性可以控制`TextView`标签的行为、样式、大小、颜色等。更多示例如下：


    1.  `android:hint`：要显示的提示。

    2.  `android:typeface`：设置标签使用的字体（例如，等宽字体 monospace）。

    3.  `android:textStyle`：指示应用于文本的样式组合：粗体（bold）、斜体（italic）或两者结合（bold_italic）。

    4.  `android.textAppearance`：一个综合属性，允许你一次性组合文本颜色、字体、大小和样式！

    5.  `android:textColor`：使用通用的十六进制 RGB 表示法来选择标签的文本颜色。例如，`#0000FF` 表示蓝色。


    你可以在`Ch09/TextViewExample`项目文件夹中找到此示例的代码。


    到目前为止，通过仅使用 Android 的 XML 就能完成如此多的工作，这既具启发性，也希望能让你学到东西。但开发应用程序真正的强大功能和灵活性来自于你选择的编程语言与
    Android XML 功能的结合。一旦我们转向更复杂的 UI 小部件，部署你的 Java（或 Kotlin）能力就变得既必要又理想，正如你将在后续关于其他
    UI 小部件的章节中看到的那样。


    ## 打造完美 UI 的按钮


    按钮是任何 UI 开发的基础组件，其历史可以追溯到模拟电视机、收音机（还记得吗？）和汽车仪表盘等电子设备上的真实物理按钮。Android 提供了几种类型的按钮，其中最直接的是来自`android.widget`包的`Button`小部件，它在按钮“表面”显示简单的文本。让我们开始创建一个使用按钮和
    Java 逻辑来跟踪和控制按钮上显示文本的新应用程序。你可以在`Ch09/ButtonExample`项目文件夹中查看此示例。


    首先，使用 Android Studio 的新项目向导创建一个新项目，并选择 **Empty Activity** 模板作为起点。将项目命名为`ButtonExample`（或你认为同样具有描述性的名称）。项目创建完成后，打开`activity_main.xml`文件，删除默认的`TextView`元素。切换到布局编辑器的
    **Design**（设计）视图，从 **Palette**（面板）中选择`Button`小部件并将其放置在屏幕上。按钮的精确位置无关紧要，因为我们稍后会让它自动扩展以填满整个应用程序活动。你应该会看到类似于图[9-3](#499629_1_En_9_Chapter.xhtml#Fig3)所示的布局。


    ![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig3_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig3_HTML.jpg)


    *图 9-3 在 ButtonExample 的设计蓝图中添加一个按钮*


    请注意，有两个错误提示表明按钮未被约束。这是因为当你选择使用`ConstraintLayout`布局来容纳其他子 UI 小部件时，每个小部件都需要至少一个水平和垂直的“约束”，或者说是关于它们应该如何相对于父布局或其他小部件的顶部、底部、起始端和结束端进行定位的指令。要解决此问题，请使用每边中点处的两个圆圈之一，单击并拖动连接线到设计蓝图的侧边。这将为按钮设置水平约束，使其紧贴活动的侧边（减去任何边距）。然后选择按钮顶部或底部边缘中心的圆圈，单击并拖动连接线到活动的顶部或底部边缘，以设置垂直约束。切换到`activity_main.xml`文件的代码视图，它应该类似于清单[9-3](#499629_1_En_9_Chapter.xhtml#PC4)所示。


    ```

    Listing 9-3

    ButtonExample activity_main.xml file, showing Button definition

    ```'
