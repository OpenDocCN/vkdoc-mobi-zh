  trans: '

    ### 如何选择适合你的 CPU


    2020 年，`x86_64` 架构的 CPU 选择众多：AMD 的锐龙（Ryzen）和线程撕裂者（Threadripper），以及英特尔（Intel）的酷睿（Core）系列。关于哪款最好，众说纷纭，而这些评判通常着眼于原始
    CPU 速度（`时钟频率`）、封装内的核心数量、各级板上缓存以及其他几项特性。


    就一台专用的 Android 开发者电脑而言，任何当代的英特尔或 AMD CPU 都绰绰有余。如果你想要针对 2020 年代 CPU 的具体推荐，可以关注英特尔酷睿
    i5 和 i7 系列，以及 AMD 锐龙 7 和锐龙 9 系列。它们拥有足够的速度、可观的核心数量（通常为四核或以上）以及良好的 `L1`/`L2`/`L3`
    缓存。


    AMD 和英特尔都有性能更强的 CPU，但通常你会发现它们主要通过更多核心来区分，偶尔还会支持其他功能。在 Android 开发领域，核心多并不总是更好。对你而言，并行运行的关键活动包括：在
    Android Studio 中工作并在一个或多个 AVD 中查看结果时的任何同步操作；对于足够大的多项目应用，如果 Gradle 配置支持，还包括并行构建活动。我的建议是，别让钱包为最昂贵的酷睿
    i9 及类似 AMD 处理器买单，而是将这笔钱投入到开发者工作站的其它部分，比如更大的内存或更好的屏幕。


    另一种日益流行的 CPU 架构是 Arm。Arm 是当今全球几乎所有移动设备的核心，这得益于“片上系统”（SoC）设计的广泛普及，这些设计都采用了 Arm
    架构。基于 Arm 的台式机已经面市，甚至 Arm 服务器市场也在萌芽，但这里有一个有趣的难题。


    尽管全球销售和使用的绝大多数 Android 设备都采用 Arm 处理器，但使用基于 Arm 的计算机进行计算密集型工作负载（例如构建/编译 Android
    应用）仍然是一个挑战。可以肯定的是，这并非不可能。但速度和性能上的权衡仍然显著。而最大的障碍在于，你期望使用的工具是否能在基于 Arm 的计算机上使用。最值得注意的是，`Android
    Studio` 并不支持 Arm——它只能在 `x86` 架构的计算机上运行。同样，Google 也只将其多个版本的 Android SDK 打包成 `x86`
    格式，而非 Arm 格式。这意味着如果你选择基于 Arm 的开发机，你将需要使用自己的构建工具来启动所有工作，规避缺少易于捆绑的 Android SDK 等问题，以及其他更多麻烦。我不建议你去挑战这个难题。


    ### 内存再多也不嫌多！


    有时我真希望给自己增加内存能像给台式电脑加内存一样简单。就目前而言，为了获得更强的开发火力，你和我只能满足于购买 RAM 了。


    回想一下第 2 章，你会记得 Google 建议 Android Studio 的最低内存为 4 GB，首选基础级别为 8 GB。实际上，现在很难买到只有
    4 GB 内存的新电脑了。所以，引用一句经典电影台词：8 GB 就够了吧？


    别急！你当然可以用 8 GB 内存的电脑高效地开发 Android 应用。事实上，我正是在一台 2015 年款、拥有 8 GB 内存的 MacBook Air
    上撰写了本书的很大一部分，并构建了你们看到的某些示例，所以这远非只是理论上的可能。不过，我可以告诉你，它存在明显的局限和令人沮丧之处。一些明显的例子是，当我试图同时运行
    Android Studio、一个 AVD，以及我在本章及全书后面讨论的图像和视频处理开源工具时，8 GB 内存很快就被耗尽，然后这台 MacBook 会尽职尽责地开始增加——并越来越多地使用——磁盘上的交换空间，以在真实内存和我提出的更高需求之间进行调度。


    对比之下，我信赖的台式机则大不相同。它甚至更老，是一台将近十年前生产的“经典”Dell Precision 工作站——我都不确定戴尔现在是否还生产这种机型。但它拥有
    32 GB 内存，在同时运行 Android Studio、多个 AVD，以及为了稳妥起见再开的几个其他工具时，也毫不费力。


    **注意**


    从我的配置可以看出，我推荐硬件并非为了收取推广费或回扣。如果你有时光机，请务必跳到 2010 年或 2015 年，去买我当年用的那款硬件吧！


    如果你正在规划自己的 Android 开发者系统，我给你的简洁建议是：从来没有人抱怨过自己的内存太多！如果条件允许，至少配备 32 GB；追求奢华的话，64
    GB 足以应对未来多年的 Android 开发需求。


    对于那些打算购买笔记本作为主力开发机的人，要特别关注你中意型号的最大支持内存是多少，以及购买后能否更换内存。也就是说，内存是焊接还是固定死的，以至于如果不进行昂贵且可能使保修失效的操作就无法更换或升级？你可能会发现自己受限于
    16 GB——如果你能选择一个支持 32 GB 的型号，未来你会感谢自己的决定（或许也会感谢我！）。

    '
- fmt: '### Storing It All!


    As you start building more and more Android applications, your need for disk space
    will increase to accommodate a wide range of projects, resources, and more. There
    are obvious areas where you would expect disk space to be consumed, such as the
    space on disk for your source code files (which are quite small) and image and
    video files (which can be very, very large).


    There are Android development–specific aspects that are obvious when you think
    about them, such as different versions of the Android SDKs, which can need up
    to 1 GB per version.


    `AVD`s are the hidden factor when thinking about your storage needs. Because it
    is so easy to whip up a new `AVD` image to test out a screen size or device format,
    it is very easy to end up with 20, 30, or more `AVD`s before you know it. If you
    are serious about testing across a lot of screen sizes and resolutions, having
    dozens of `AVD`s is the minimum to expect.


    With tens or scores of `AVD`s in place, you can easily chew up 50 GB or more.
    One of the biggest storage hogs for `AVD`s is your choice of how much on-board
    storage, or emulated SD card storage, to allow. These options are mimicked by
    allocating your on-disk storage, which means if you want to emulate the latest
    OnePlus 7 device with 128 GB of storage, then your `AVD` will consume 128 GB or
    more of your actual disk space! Of course you don’t have to use such large allocations
    for emulated SD cards and on-device storage, but typically you will have at least
    a workable amount, and this all adds up.


    A pragmatic allowance for storage when starting out on your Android application
    development journey would be on the order of 50 GB. This will let you make several
    generations of the Android SDK and a useful number of `AVD`s of various sizes
    and configurations available, along with Android Studio and other tools. To be
    comfortable into the future, particularly with a wide range of `AVD`s for testing
    purposes, you should aim for 100 GB or more.


    Just as important as the size of your storage is the type of storage and its associated
    speed. Traditional spinning hard disk drives are certainly cheap, but the trade-off
    is data transfer speed, or IOPS (input/output operations per second). Modern storage
    options such as solid-state drives, or SSDs, give a considerable boost in terms
    of data transfer performance and therefore speed of operation for everything from
    building and running `AVD`s, deploying large applications and those that rely
    on significant image and video aspects, and any data-intensive computations or
    actions.


    If you have the choice, always opt for a solid-state storage option, particularly
    if you plan to do any data-heavy or computation-heavy development. For those of
    you looking at dedicated notebook computers for your development needs, you will
    find yourself spoiled for choice given the very large shift toward SSDs in this
    market in recent years.


    ### Viewing It All!


    If you are going to become a dedicated developer of Android applications, you
    are going to be staring at screens a lot. Given that, you might want to consider
    how to make the most of the screen you will be viewing and whether you want more
    than one.


    When it comes to monitors or displays, a lot of developer happiness will be based
    on deeply personal factors. Do you like large screens? Do you prefer multiple
    screens? Will screens in different orientations help you – landscape or portrait?
    And will you be mixing screens from a laptop or notebook, with fixed screens?
    There are more considerations than just this, but I will flag two key characteristics
    that will make a long-term beneficial impact for you: size and density.


    When it comes to screen size, there are some practicalities that will convince
    you that at least one large screen is worth the expenditure. Look back at Figure
    5.6 in Chapter [5](#499629_1_En_5_Chapter.xhtml), and you will see two `AVD`s
    running side by side, one representing a normal phone screen and the other a tablet
    screen. You will not be surprised to learn that the view in that figure consumed
    pretty much all of the 13-inch screen on my MacBook Air. If you look really closely,
    you can see hidden behind the `AVD` screens tiny fragments of my Android Studio
    session. But that’s all you can see. There’s no chance with this size screen to
    do significant side-by-side development in Android Studio and observation in an
    `AVD`, without a set of hugely awkward compromises. You can resize screens and
    windows in Android Studio, and you can tile windows to try to squeeze everything
    in with a single `AVD` running, as shown in Figure [6-1](#499629_1_En_6_Chapter.xhtml#Fig1)


    ![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig1_HTML.jpg](images/499629_1_En_6_Chapter/499629_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Running Android Studio and an `AVD` side by side on a 13-inch laptop screen


    If you think that helps with live debugging or comparing different layouts simultaneously,
    let me state that it’s nothing of the sort. It’s just a big pain! Contrast that
    with the view on a 24-inch screen, with Android Studio and multiple `AVD`s happily
    living on a screen blessed with ample real estate, as shown in Figure [6-2](#499629_1_En_6_Chapter.xhtml#Fig2).


    ![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig2_HTML.png](images/499629_1_En_6_Chapter/499629_1_En_6_Fig2_HTML.png)


    Figure 6-2


    Running Android Studio and multiple `AVD`s on a 24-inch screen


    I will let those figures speak a thousand words. When you are done soaking them
    in, my closing statement on screen size will need no further support. If you can,
    buy a big screen!


    When it comes to screen quality, and specifically pixel density, we again enter
    some very subjective territory. In the market of 2020, when this book is being
    written, you can choose from multiple generations of "high density," as well as
    4k, 5k, and even 8k! Your personal taste and preferences will be the most important
    thing to consider, but I will recommend you keep in mind the following two points:


    1. **See the screen in action**. If you can, visit a retailer that can show you
    the screen actually hooked up to any kind of computer. This lets you get a feel
    for how the display actually behaves and lets you play with things like brightness,
    white balance, contrast, and refresh rate, to satisfy yourself that the screen
    performs in ways that please you.


    2. **Aim for a screen with as high, or higher, resolution density as the apps
    you plan to build**. We will talk more about Android screen resolution options
    and mechanisms throughout the rest of the book. To ensure that your development
    and testing show you as best as possible how your artwork, images, video, and
    other application resources will look on real devices, ensure you choose a screen
    for your development system that is at least as good as, if not better than, the
    devices you are targeting. Otherwise, you will get a distorted idea of how things
    look when running in the real world.'
