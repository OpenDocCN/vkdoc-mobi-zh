- fmt: '# Thanks to its Linux operating system heritage


    Thanks to its Linux operating system heritage, Android is blessed with many platform
    features that bring the power of Linux to an entirely new user base. Part of this
    rich heritage includes a particular group of applications that run in the background,
    without a user interface, which offer their capabilities to all other programs
    running on Android. These are known in Android as services, similar to the `daemon`
    concept in Linux and the services concept in Microsoft Windows.


    This chapter will explore some of the fundamentals of Android services, showing
    you the steps to create, start, and operate with services. To add to this exploration,
    we will also look at a range of simple service examples to broaden your understanding
    using services.


    ## Services Background


    The rationale for services comes from many needs, in particular those that arise
    when functions or tasks need to be performed by one or several applications, but
    where those tasks don’t need any form of UI interaction or user-facing activity
    to be displayed. On any Android device, there are hundreds of services that run
    at any point in time, including ones that:


    1. Provide a local interface to control a remote API such as a location service
    or mapping applications.

    2. Maintain long-lived connections for messenger and chat applications that have
    “conversations” running over days, weeks, months, or more.

    3. Continue to process a task or piece of work once invoked by a user, without
    further interaction. A great example is downloading updates for Android applications
    from Google Play store and other locations.


    These are just some of the examples you can find right now on an Android device,
    and there are obviously many more. For example, think back to our audio and video
    examples and the Media framework, where the tasks of actual audio and video playback
    relied on background services.


    You are not obliged to use services when building applications, but you can think
    of them as helpers that stand by ready to help you if needed – both the services
    you might write and the default services provided by the Android platform.


    ### Using WorkManager as an Alternative to Services


    While the balance of this chapter focuses on the tried and tested service approach
    to the needs outlined in the preceding section, Android does offer other approaches.
    One of these is the `WorkManager`, which is part of the Jetpack libraries introduced
    earlier in the book. `WorkManager` allows you to have work performed in the background
    even after your application is terminated. You can think of `WorkManager` as the
    simple, handheld way of having work performed asynchronously outside of your application.


    `WorkManager` has its strengths, and you can learn more about them at [`https://developer.android.com/topic/libraries/architecture/workmanager/basics`](https://developer.android.com/topic/libraries/architecture/workmanager/basics).


    The universal capabilities of services, and their power and utility, make for
    a compelling subject to master and add to your developer toolset, and we will
    delve into that for the rest of this chapter.


    ## Starting with Your Own Service


    Defining and creating your own service application is remarkably similar to what
    you have already learned in making normal activity-based Android applications.
    The steps to create an Android service should appear familiar to you:


    1. Using an Android-provided base class, extend it and add any necessary class
    inheritance to create your own custom service.

    2. Determine which callback methods you need to override, and then write the code
    to implement your desired logic.

    3. Add the necessary `AndroidManifest.xml` entries to provide permissions, definitions,
    and links into the wider Android platform so that your service can run and serve
    other applications.


    We will explore each of these areas to give you a full understanding in the following
    section.


    ### Implementing Your Service Class


    Within the default Android development framework, the `Service` class is provided
    as a foundation from which to build your own services. The `Service` class also
    provides several useful subclasses out of the box that match common service patterns
    many developers have, though you are free to start with the `Service` class itself
    or any of the helper subclasses depending on your needs. Of these, by far the
    most useful and commonly adopted is the `IntentService` subclass.


    The basic code outline for a simple service is shown in Listing 18-1.


    ```java

    package com.artifexdigital.android.serviceskeleton

    import android.app.service

    //more imports here

    public class SkeletonService extends Service {

    //overrides and implementation logic here

    }

    ```


    *Listing 18-1 — Outline of a service application in Android*


    ### Managing the Service Lifecycle via Callbacks


    There are a range of callbacks provided by the `Service` class and its subclasses,
    designed for you to override with your own logic implementing service control
    behavior. The `Service` callback and lifecycle notions are very similar to the
    `Activity` and `Fragment` lifecycles we explored in Chapters 11 and 12, with the
    main difference being there are fewer states in which a service will find itself.
    This simplicity means there are only five main callbacks for you to consider when
    dealing with service behavior when coding your supporting logic:


    1. `onCreate()`: Very similar to the `onCreate()` method for activities, the service''s
    `onCreate()` method is invoked when any trigger for service activity happens.

    2. `onStartCommand()`: When the related `startService()` method is called by a
    client application, the `onStartCommand()` method is invoked and its logic processed.

    3. `onBind()`: When client applications attempt to bind to the service with a
    `bindService()` call, the `onBind()` method is invoked each time.

    4. `onTrimMemory()`: As part of Android’s attempt to manage resources in an assertive
    fashion, services selected for resource reclamation while the device is under
    memory shortage will have their `onTrimMemory()` method called. This gives the
    service a more controlled way to try to return memory, before more drastic measures
    are taken.

    5. `onDestroy()`: When performing a normal graceful shutdown, `onDestroy()` is
    invoked. Just as with normal activities, graceful shutdown is not guaranteed,
    and therefore neither is a call to `onDestroy()` guaranteed.


    Your understanding of lifecycle management from activities and fragments stays
    the same. That means your service should create what it needs during its `onCreate()`
    call and clean up and dispose of any lingering resources during `onDestroy()`,
    if not before.


    One thing that differs between activities and services is that for services, there
    are no `onPause()` and `onResume()` equivalents. Your service is either running
    or it’s not. That means there is no need to provide background transition methods
    when a service is considered always in the background. This absence of pause/resume
    means you always should be mindful to minimize any state held by the service or
    use preferences or other storage where appropriate to survive unexpected service
    termination. Not only can Android terminate a service at any time for resources
    – bypassing any call to `onDestroy()` – but users can also kill your services
    via the application management systems’ setting Activity. Services with clients
    bound to them become more complicated to manage in this regard, and we will explore
    this in the examples in a moment.


    ### Providing Manifest Entries for Your Service'
