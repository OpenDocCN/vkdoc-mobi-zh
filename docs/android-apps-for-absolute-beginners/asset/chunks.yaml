    Overall, the logic is very straightforward. As `onCreate()` is called, we inflate
    the `activity_color_list` layout into the UI. Next, we test to determine if the
    `color_detail_container` view object has been instantiated (regardless of whether
    or not it is displayed). This gives us a proxy to determine if the application
    is running within the `activity_color_twopane` layout, based on the screen detection
    rules in Android and our `refs.xml` rules. If we are running in this state, we
    set a Boolean `mTwoPane` value to true and, using the `getSupportFragmentManager()`,
    set up click handling via the `setActivateOnItemClick()` method.


    The `onItemSelected()` override then takes on the task of determining what to
    do when a user clicks a color. Should we create an additional fragment using the
    `color_detail_fragment` layout and associated code in `ColorDetailFragment.java`,
    or should we fire off `startActivity()` with the intent explicitly calling for
    the `color_detail_activity` layout and associated `ColorDetailActivity.java` code?


    The source code in `Ch12/ColorFragmentExample` also reveals the mechanism for
    showing color details and the supporting `ColorContent` class, which is just a
    Java packaging approach of an item set for colors and some management functions
    (remember, Android’s Java support has not progressed past Java 8, so more modern
    approaches like data classes are not available). Other options that could have
    provided this list are a Content Provider or another data source.


