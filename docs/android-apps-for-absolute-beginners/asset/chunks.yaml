  trans: "\nAndroid 平台上总有许多新的微件等待你去学习或掌握，你可以在网站 [`www.beginningandroid.org`](http://www.beginningandroid.org)\
    \ 上找到更多示例。在这里，你将看到诸如以下微件的更多示例：\n\n1. `Slider`（滑块）\n2. `AnalogClock`（模拟时钟）\n3.\
    \ `DigitalClock`（数字时钟）\n\n我们还会在第 13 章和第 14 章中介绍更多侧重于音频和视频的微件。\n\n## 本章小结\n\n在本章中，你已经了解了构建\
    \ Android 用户界面时可用的许多基础微件（或称视图）。下一章，我们将进一步探讨用户界面设计概念，并介绍布局。布局作为一种容器和框架，用于在 Activity\
    \ 及其他用户界面中放置、组织和嵌套你的微件。\n\n## 10. 探索 Android 概念：布局与更多内容\n\n理解 Android 中提供的各种 UI\
    \ 微件，确实能让你对应用中的特定功能和行为的呈现方式做出多种设计选择。然而，Activity 的设计远不止选择单选按钮或 `TextView`。布局是 Android\
    \ 的一种声明式机制，它让你能够完全掌控应用的屏幕显示布局。从概念上讲，布局既是你在应用或 Activity 中希望使用的微件的容器，也是一份蓝图和框架，规定了所有微件应如何显示、交互以及相互配合。当你开始构思使用超过一两个微件的设计方案时，你会希望借助布局的强大功能，从而避免手动控制位置、缓冲区和空白区域、分组等繁琐工作。\n\
    \n在接下来的部分中，我们将回顾一些 Android 支持的最有用、最流行的布局类型，而网站上则包含了一些更专业或较少使用的布局的更多示例。\n\n###\
    \ 什么是 Android Jetpack\n\n任何对 Android 设计的粗略搜索或回顾，都会浮现出一些有趣的里程碑，有些人甚至会称之为 Android\
    \ 近期发展史上的分岔路口。你很可能会从近几年的搜索结果中看到两个专业术语。首先，你会看到“Material Design”这个术语，这是谷歌在 2012\
    \ 年向世界推出的一种样式和设计理念，它影响着 Android 中的默认调色板、微件样式以及其他设计特性。第二个你会遇到的术语是“Android Jetpack”，毫无疑问，你会看到关于它如何让设计（包括布局）变得“更简单”、“更好”以及“全新且与众不同”的评论。这些说法没错，但它们可能会给新开发者带来一些困惑。我是否在使用\
    \ Jetpack？我怎么才能“获得”Jetpack？等等。\n\n在 2018 年的 Google I/O 开发者大会上，谷歌推出了 Android Jetpack。抛开这些宣传，你会发现\
    \ Jetpack 本身并非什么“不同”的东西，而是对许多零散的 Android UI 框架组件和基础元素的一次重新打包，以及对 Android 支持库的一次修订和扩展后的方法。Jetpack\
    \ 并不是另一种构建事物的竞争方式。相反，它几乎会渗透到你所做的所有事情中，从引用 `androidx` 命名空间中的任何库，到管理向后兼容性和对历史版 Android\
    \ 的支持。因此，你实际上并不是“添加”Jetpack 到你的设计工作中。相反，当你利用那些在构建应用和借助 Android Studio 帮助时自然会用到的功能时，它会隐式地、几乎是自动地介入进来。\n\
    \n在 `android.com` 网站上，谷歌提供了对 Android Jetpack 旗下内容的快速概览。被纳入 Jetpack 旗下的现有 Android\
    \ 部分分为四个领域：\n\n1.  基础组件\n2.  架构组件\n3.  行为组件\n4.  UI 组件\n\n谷歌提供了图 10-1 所示的图表（来源：android-developers.googleblog.com/2018/05/use-android-jetpack-to-accelerate-your.html），用以展示这四个领域中\
    \ Android Jetpack 的特定部分。\n\n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig1_HTML.jpg](img/499629_1_En_10_Fig1_HTML.jpg)\n\
    \n**图 10-1** 理解 Android Jetpack 的概念组件 (¹)\n\n如果你从这一节只带走一个观点，那就是你不必担心问自己“我是不是在使用\
    \ Jetpack？”，因为你肯定已经在用了！你可能没有使用所有的特性和功能组，但也没必要试图去全部使用。\n\n### 使用流行的布局设计\n\n在接下来的小节中，我们将介绍以下主要的布局容器：\n\
    \n1.  `ConstraintLayout`：当前 Android 新项目的默认布局，是 Jetpack 的一部分。它使用最少的定位约束来表达微件，且没有（或几乎没有）树状层次结构。\n\
    2.  `RelativeLayout`：从 Android 4.0 到引入 Jetpack 和 `ConstraintLayout` 之前的多年间使用的默认布局。它采用规则引导的方法来实现\
    \ UI 元素的自动排列。\n3.  `LinearLayout`：最初的默认布局，在许多早期的 Android 应用中普遍使用。它遵循传统的盒模型，将所有微件想象为彼此嵌套或并列的盒子。\n\
    \n在本书的网站 [`www.beginningandroid.org`](http://www.beginningandroid.org) 上，你还会找到关于\
    \ Android 提供的其他布局的补充材料，包括：\n\n1.  `TableLayout`：一种类似网格的方法，类似于在 Web 开发中使用 HTML\
    \ 表格。\n2.  `GridLayout`：与 `TableLayout` 看似相似，`GridLayout` 使用任意精度的网格线将你的显示区域分割成越来越具体的区域，以便在其中放置微件。\n\
    \n在讨论了这些主题之后，我们将转向如何从 Java 代码中操作 XML 布局，并通过对 ButtonExample 应用的修改版本来演示如何在代码中查找和处理你的布局。\n\
    \n> **注意**  \n> 虽然本章我们将花大量篇幅讨论布局的 XML，但请始终记住，图形布局编辑器拥有设计模式，允许你直观地添加微件、放置和排列它们、设置关系等等。虽然你很可能总是混合使用手写\
    \ XML 和布局编辑器，但随着你开始偏好某一种方法，不时地切换到“另一种”方法也是值得的。这也是学习布局 XML 更多细微差别的好方法，通过观察当你使用图形布局编辑器时，Android\
    \ Studio 在自动生成的 XML 中做了什么。\n\n### 重新审视约束布局\n\n在前面的章节中，你已经通过非常基础的 `ConstraintLayout`\
    \ 设计实践过，包括你的 `MyFirstApp` 和第 9 章中的许多微件示例。虽然你可以继续将 `ConstraintLayout` 用作微件的简单容器，为\
    \ Android 提供约束设置以便其为你管理布局，但 `ConstraintLayout` 还有一些更高级的特性，你绝对应该了解并探索，以使你的 Activity\
    \ 设计更上一层楼。\n\n`ConstraintLayout` 提供了许多非常令人兴奋的特性，但我想重点介绍其中三个最新、最有用的特性。\n"
- fmt: '# Getting in the Flow


    With the most recent updates to Android, `ConstraintLayout` has been expanded
    with an optional ability, to “flow” widgets on-screen in an activity as if pouring
    them across a screen and to wrap and shift widgets at runtime depending on the
    size and density of the interface of a given device.


    In Flow parlance, you chain together sets of widgets in a virtual Flow layout
    that acts as a helper to the base `ConstraintLayout`. The Flow chaining of groups
    is specified in a `<androidx.constraintlayout.helper.widget.Flow>` element in
    your layout XML, and two key attributes then control Flow chaining and behavior.


    The first attribute is the `app:constraint_referenced_ids` attribute, which takes
    a comma-separated string of widget IDs, instructing Android which parts of your
    interface are grouped into a specific virtual Flow layout.


    The second attribute is `app:flow_wrapMode`, which takes one of three string values
    to instruct Android how to manage the flow of widgets in the Flow group. Possible
    values and related behavior for `app:flow_wrapMode` are as follows:


    1.  `none`: Default approach – this creates a single logical chain of all the
    widgets in the group and overflows them if the widgets don’t fit the dimension
    of the activity.

    2.  `chain`: If an overflow occurs, add the overflowing widgets to a follow-on
    chain to contain them.

    3.  `align`: Broadly similar to the chain approach, with the tweak that rows are
    aligned into columns.


    Getting familiar with Flow options in `ConstraintLayouts` is very easy. Listing
    [10-1](#499629_1_En_10_Chapter.xhtml#PC1) shows the relevant layout XML file for
    the `FlowExample` project in `Ch10/FlowExample`.


    ```

    Listing 10-1

    Setting up Flow in your ConstraintLayout

    ```


    The `FlowExample` layout is very straightforward. We have three `TextViews`, defined
    with constraints such that normally you would (attempt to) lay out with the `text1
    TextView` first, then the `text2 TextView` to its right, and the `text3 TextView`
    to the right again of `text2`. I have deliberately chosen long text and large
    font size that make my point for me. At the bottom of the layout, you’ll see the
    Flow defined in a `<androidx.constraintlayout.helper.widget.Flow>` element, where
    I specify my `flow_wrapMode` to `chain` and set the referenced IDs for the group
    to be `"text1, text2, text3"` – my `TextView` IDs.


    If I omit the Flow virtual layout (see the comment in the XML layout that controls
    this), Android attempts to render the activity per the normal `ConstraintLayout`
    rules, with the result as seen in Figure [10-2](#499629_1_En_10_Chapter.xhtml#Fig2).


    ![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig2_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig2_HTML.jpg)


    **Figure 10-2** Without Flow, the ConstraintLayout renders widgets off-screen


    You can see the problem straight away. I am deliberately using an AVD with a small
    virtual screen size. My `text1 TextView` rendered fine, and half of `text2` made
    it onto the screen. But the rest of `text2` is cut off, and `text3` is nowhere
    to be seen. In reality, it is rendered, but not visible due to the layout having
    no way to adapt to the screen size with the layout lacking the Flow option. You
    can try running the example with the Flow element removed on a variety of AVDs
    with different screen sizes, to see how and where widgets get truncated or not
    displayed.


    With the Flow element in place, rerunning the `FlowExample` application brings
    Flow’s capabilities right to the fore. Figure [10-3](#499629_1_En_10_Chapter.xhtml#Fig3)
    shows the same three `TextViews`, but this time with the Flow virtual layout power,
    Android has been able to follow the chain rule I specified and has flowed the
    widgets over to new rows to display everything in my layout specification.


    ![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig3_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig3_HTML.jpg)


    **Figure 10-3** With Flow, the ConstraintLayout renders all


    Flow is a super-easy new feature to master. You can take the `FlowExample` sample
    code and start adding more widgets, expand the Flow-referenced IDs set, and even
    change the `flow_wrapMode`, to see how Flow behaves.


    # Layering with Layer


    Taking the ability to adapt widgets and views one step further is the Layer. The
    name Layer is very overloaded when it comes to interface design, so to be abundantly
    clear, a Layer does not directly lay out widgets or help build “stacks” of successive
    sets of UI components. A `ConstraintLayout` can be extended with a Layer to give
    you a single approach to rotate, translate, and scale a set of widgets and views
    with one mechanism.


    As an example, you might be creating a graphical tile game and want to de-emphasize
    any picture tile a user isn’t currently selecting. With a Layer, all other `ImageView`
    widgets could have the same layout change applied by having them added to a single
    Layer, and then the desired transformation could be applied once to the Layer,
    which it in turn would apply to its constituent widgets.


    # Moving with Motion


    One much-heralded feature of the most recent releases of Android is the extension
    of `ConstraintLayout` known as `MotionLayout`. With `MotionLayout`, you can take
    boring, static views of any sort and build animated changes such as rotations,
    fade-in and fade-out, size changes, and more though defining and using `ConstraintSets`.
    Essentially, the constraints that describe how your widgets and views relate and
    position can themselves be treated as the variables that control motion and flow.


    Building `MotionLayout`-based applications and the various `ConstraintSet` configurations
    they use can be very tedious to do by hand. With this tedium in mind, Google introduced
    the Motion Editor in Android Studio to give you an animation canvas with which
    to build compelling animated layouts.


    To start using Motion and `MotionLayout` designs in the Motion Editor, Android
    introduced the `androidx.constraintlayout.motion.widget.MotionLayout` variant
    for `ConstraintLayout`. `MotionLayout` is still in its early days, with quite
    a few rough edges and manual steps required to set up and changes being made frequent
    with point releases of Android Studio. Layouts with motion effects also aren’t
    best represented in a static book like this one.


    So to ensure the most up-to-date walk-through of `MotionLayout` is available to
    you and that you have `MotionLayout` presented where you can see how the options
    play out in dynamic, moving layouts, a walk-through and `MotionExample` demo are
    available from the website at [`www.beginningandroid.org`](http://www.beginningandroid.org).


    # Using Relative Layouts


    The `RelativeLayout` was a long-time default for Android and is still a very popular
    choice for activity and fragment design. As the term “Relative” implies, a `RelativeLayout`
    uses relationships between widgets, and the parent activity, to control the layout
    of widgets. The relativity concept is easy to grasp, for example, you can dictate
    that one widget is placed below another widget in relation to the relative’s location
    or have its top edge align with a related widget and so on.


    All of the relationship settings utilize a set of standardized attributes assigned
    to the widget XML definition in your layout XML file.


    ## Placing Widgets Relative to the Parent Container


    A good starting place for understanding `RelativeLayout` is to explore the attributes
    that allow you to position a widget relative to the parent. There are a core set
    of attributes you can use to anchor position based on a parent (e.g., activity)
    and its top edge, bottom edge, sides, and the like. These attributes include:


    1.  `android:layout_alignParentTop`: Aligns the widget’s top edge with the top
    of the container.

    2.  `android:layout_alignParentBottom`: Aligns the widget’s bottom edge with the
    bottom of the container.'
