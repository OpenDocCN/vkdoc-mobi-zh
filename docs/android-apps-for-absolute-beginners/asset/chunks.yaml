    package com.beginningandroid.clientexample;

    import android.app.Service;

    import android.content.Intent;

    import android.os.IBinder;

    import android.util.Log;

    public class ServiceExample extends Service {

    public static final String EXTRA_ALBUM="EXTRA_ALBUM";

    private boolean isShared=false;

    @Override

    public IBinder onBind(Intent intent) {

    // We need to implement onBind as a Service subclass

    // In this case we do not actually need it, so can simply return

    return(null);

    }

    @Override

    public int onStartCommand(Intent intent, int flags, int startId) {

    String album=intent.getStringExtra(EXTRA_ALBUM);

    startSharing(album);

    return(START_NOT_STICKY);

    }

    @Override

    public void onDestroy() {

    stopSharing(); }

    private void startSharing(String album) {

    if(!isShared) {

    // Simplified logic - you might have much more going on here

    Log.w(getClass().getName(), "Album successfully shared");

    isShared=true;

    }

    }

    private void stopSharing() {

    if(isShared) {

    // Simplified logic - you might have much more going on here

    Log.w(getClass().getName(), "Album sharing removed");

    isShared=false;

    }

    }

    }

    ```


    Listing 18-3 Service implementation for `ServiceExample.java`


    We don’t have any service-specific setup that needs to be performed at service
    startup, so we can omit extra logic in an `onCreate()` call and rely on the parent
    class taking care of this. We implement `onStartCommand()` so that we can take
    the desired action when the client calls `startService()`. That means we want
    to examine the intent used to designate the service and interrogate the extras
    the `ServiceExample` wants, such as the name of the photo album for sharing. Once
    we have the album name, we then call `startSharing()` as implemented for this
    specific service.


    I have stubbed out most of the follow-on pieces of the `startSharing()` method
    as mentioned. One useful thing we can implement in this example is using Android’s
    logging infrastructure to emit relevant information at various points to inform
    us the service is alive and working, even though it lacks a UI. This technique
    would also help you with all kinds of debugging, usage metrics, and so on in a
    real service. From the example application and service, you’ll be able to tell
    it’s running and moving through parts of its service logic by the output in Logcat.
    This is also useful if you see nothing – no logging gives you a clue that something
    has gone wrong.


    I have implemented the `onDestroy()` method, which for now just calls our service’s
    `stopSharing()` method. Just as with `startSharing()`, this is mostly stubbed
    out, with some logging to help you confirm the service code is working when invoked.


    As mentioned earlier, even though we don’t plan to use the binding approach, we
    still need to implement `onBind()` based on our subclassing from `Service`. It
    can return `null` in this instance. A future enhancement could allow other clients
    to bind and do more sophisticated things like create a photo montage, show the
    thumbnails of the album, and so on.


    ## Creating an Example Client to Use the Service


    For completeness’ sake, it is good to see a client actually use the service, rather
    than just rely on my promise that the service does what it says. Listing [18-4](#499629_1_En_18_Chapter.xhtml#PC5)
    gives a simple layout for a client to drive the `ServiceExample` service.


    ```

    Listing 18-4

    The layout for the ClientExample application

    ```


    You can see I have created a very simple UI, as the `ClientExample` application
    has just two buttons, one labeled “Start Sharing” and one labeled “Stop Sharing.”
    Remember, the goal here is understanding service mechanics, not UI aesthetics.


    As we are using the command-style `startService()` approach to interacting once
    with the service, our Java logic is quite straightforward as well. Listing [18-5](#499629_1_En_18_Chapter.xhtml#PC6)
    shows the full client logic.


    ```java

    package org.beginningandroid.clientexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.Intent;

    import android.os.Bundle;

    import android.view.View;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    }

    public void onClick(View view) {

    switch(view.getId()) {

    case R.id.startSharing:

    startSharing(view);

    break;

    case R.id.stopSharing:

    stopSharing(view);

    break;

    }

    }

    public void startSharing(View view) {

    Intent myIntent=new Intent(this, ServiceExample.class);

    myIntent.putExtra(ServiceExample.EXTRA_ALBUM, "My Holiday Snaps");

    startService(myIntent);

    }

    public void stopSharing(View v) {

    stopService(new Intent(this, ServiceExample.class));

    }

    }

    ```


    Listing 18-5 Java code for the sample `ClientExample` application


    You will be very familiar by now with the rudimentary `onCreate()` method, which
    in `ClientExample` just inflates the layout. The `onClick()` implementation follows
    the pattern for checking which button was clicked by the user by interrogating
    the view passed and triggers either the `startSharing()` or `stopSharing()` method
    as needed.


    If `startSharing()` is invoked, it instantiates an intent for the service, passing
    a very believable album name for the set of photos we want to share. The service
    is called with `startService()` passing the intent. Our `stopSharing()` implementation
    basically calls the `stopService()` command with a new intent of the appropriate
    type, matching the original service call, and thus targets our service for shutdown.


    ## Testing the Service in Action


    You can go ahead and test running the service and watching the results. Be sure
    to add the `<service>` entry to your manifest, for example:


    ```


    When you run the `ClientExample` application, it triggers the calls to the `ServiceExample`
    service enabling you to see entries in Logcat as follows:


    ```

    ...org.beginningandroid.clientexample.ServiceExample: Album successfully shared

    ...org.beginningandroid.clientexample.ServiceExample: Album sharing removed

    ```


    ## Summary


    You have now explored all of the basics of services and are ready to include them
    in your future application designs. Be sure to try building your own service variants
    that use the different service-to-client communication methods we explored in
    this chapter.


    # 19. Working with Files in Android


    In this chapter, we will explore files in detail, including Android’s methods
    for storing, retrieving, and managing data for your applications. In the following
    chapter, we will deal with the complementary tools around databases, which together
    with files represent a wealth of options for data management in your applications.
    We will also contrast these with Content Providers, Android’s more sophisticated
    model for data access and management.


    The examples in this chapter focus on two broad approaches offered by Android
    for file-based data. Approach 1 can be considered the “application-embedded” model,
    which uses raw resources and assets packaged with your application. Approach 2
    is the “Java I/O” approach, which leverages the near-famous `java.io` package
    to manipulate files, data streams, and so on just as you would with Java-based
    file management on any other operating system.


    Each approach has merits and drawbacks, which we will cover, and you can rest
    assured there is no best approach – just the best for the problem at hand.'
