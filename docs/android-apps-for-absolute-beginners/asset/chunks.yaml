    \ a `Message` object and\nthen call the Messenger’s .`send()` method to pass\n\
    the Message as a parameter back to the client. On your client side, you\nreceive\
    \ this via the Handler and its `handleMessage()`\nmethod.\nWhile this is conceptually\
    \ very neat, there are the extra steps to\ncreate and exchange `Messenger` and\
    \ `Message` objects.\nThere is also a potential performance impact as you must\
    \ deal with the\n`handleMessage()`\nmethod in the main application thread of your\
    \ activity – so keep such\nhandling lightweight!\n\nUse Independent Messaging\n\
    As well as the various Android-native and on-device methods we’ve\ncovered in\
    \ the preceding sections, you have further options via external\nmessaging or\n\
    pub/sub systems to deal with service-to-client communication. This is\nmore and\
    \ more popular as options like Google Cloud Messaging and its\nclones develop\
    \ more and more useful features. The times when it makes\nsense to use this kind\
    \ of third-party approach are typically when your\nuse case can tolerate asynchronous\
    \ messaging.\nFor more details on Google Cloud Messaging, check out the\ndocumentation\
    \ at the developer website at [`https://developers.google.com/cloud-messaging/android`](https://developers.google.com/cloud-messaging/android).\n\
    \nCreate Callbacks and Listeners\nThe `Messenger` and `PendingIntent`\nexamples\
    \ in the earlier sections demonstrate how easy it is to attach\nobjects to the\
    \ intent extras that are passed to a service. Using this\napproach requires that\
    \ your object is “`Parcelable,`” and you\ncan create your own objects to satisfy\
    \ this need, including callbacks or\nlisteners of your own.\nTaking this approach\
    \ requires you to define your listener objects and\nat runtime have the client\
    \ and service coded deploy and dispose of\nlisteners when communication is needed.\
    \ You would also be responsible\nfor registering and retracting listeners, so\
    \ that you aren’t left with\nany orphans and the attendant resource waste/loss\
    \ that would entail.\n\nUse Notifications\nA service has no direct UI itself,\
    \ but it can\ninteract with another application’s UI. Think back to the topic\
    \ of\nnotifications we introduced in Chapter [15](#499629_1_En_15_Chapter.xhtml),\
    \ and you can see how this could\nbe leveraged by a service to present information\
    \ and responses directly\nto the user.\n\nServices in Action\nWe’ve covered the\
    \ many aspects of services, client communication, and\noverall behavior with Android,\
    \ so now it’s time to build and run your\nown example service and client application.\
    \ For the purposes of having a\nuseful example that doesn’t take an entire chapter\
    \ to cover itself, we\nwill create a simple photo sharing service and simple client\
    \ example to\nput service theory into action. This won’t be an Instagram or Flickr\n\
    clone – the goal is simplicity so you can focus on engineering a\nservice.\n\n\
    Choosing the Service Design\nA simple photo sharing application is a perfect scenario\
    \ for using\nthe `startService()`\nmodel   of service\ninteraction, where we will\
    \ send a “please share this” instruction to a\nservice and not need to do any\
    \ follow-up that would require binding to\nthe service. We shall device our service\
    \ from the base `Service` class and\nthen implement the `onStartCommand()`\nmethod\
    \  and the\n`onBind()`\nmethod  (even\nthough it is not used by our example client,\
    \ we still need to do this to\ncorrectly extend the Service base class).\nWe could\
    \ have chosen another Service subclass such as `IntentService`, which\noffers\
    \ to cover much of the implementation for you such as neatly\ncalling `stopService()`,\
    \ `startService()`, and\nso forth, but as we do not want or need some of those\
    \ helpers, we’ll\nstick with the preceding approach. In particular, I want the\
    \ service to\nlive on after the `startService()` call\nso that we can later stop\
    \ sharing if we want to.\nWhich photos you choose to share is not that important\
    \ to the\nexample, so I have stubbed those out in the example. You can tinker\
    \ with\nthis and add images or other resources if you wish.\n\nCreating the Java\
    \ Logic for the Service\n\nThe `ServiceExample`\nimplementation \nis quite straightforward,\
    \ focusing on the core parts of the\nimplementation of overrides expected from\
    \ the base `Service` class, plus\nmy custom service-specific logic for photo sharing.\
    \ Listing [18-3](#499629_1_En_18_Chapter.xhtml#PC4) has the full\nservice implementation\
    \ from the example in `ch18/ClientExample`."
