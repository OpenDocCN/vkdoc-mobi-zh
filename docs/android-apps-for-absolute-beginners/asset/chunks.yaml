- fmt: '# Debugging Instead of Running Your Code


    Anyone new to application development eventually needs to grapple with what happens
    when your code “goes wrong.” Whether it is unexpected results, strange behavior,
    application crash, or other problems, debugging is the principal approach to working
    out what is happening with your application.


    Debugging is a huge topic, so rather than attempt to master it here in a chapter
    dedicated to Android Studio tools, we’ll focus first on the principal debugging
    tools at hand in Android Studio, and then throughout the book we’ll expand on
    debugging and related topics as we introduce more complex Android applications.
    You can also read more on the topic of debugging on the book website, at [`www.beginningandroid.org`](http://www.beginningandroid.org).


    The four key concepts you should be aware of in Android Studio that help with
    debugging are as follows.


    ## Setting and Clearing Breakpoints


    A breakpoint is a marker in your source code that indicates where you want to
    break, or stop, execution of your code, in order to then examine behavior or problems
    in more detail. To set a breakpoint in your code, open the code you want to work
    with by double-clicking the file or object in the Project Explorer – in my case,
    it will be the `MainActivity.java` file. With the file open, click in the darker
    gray margin just to the right-hand side of the line numbers shown next to your
    file, as you see in Figure 5-9.


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig9_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig9_HTML.jpg)


    *Figure 5-9 Setting a breakpoint for debugging in Android Studio*


    You should see a red circle appear where you clicked, indicating a breakpoint
    is set. If for any reason this doesn’t seem to make the red circle representing
    a breakpoint appear, open the Tools menu and choose `Toggle Line Breakpoint`.
    Clicking again, or choosing the toggle option again, will remove the breakpoint.


    ## Starting Applications for Debugging


    Just as you can run your application with one click of the Run option or choosing
    a run configuration you have set up, so you can also start your application for
    debugging. This essentially does the same thing, invoking `Gradle` to build your
    application, deploying the application to the nominated device or AVD, and so
    forth. The one difference is that Android Studio will prime itself to help you
    with debugging.


    To launch your application in debug mode, simply choose the `Debug ''Run Config
    1''` (or similar option) from the Run menu. As well as the build and deployment
    steps, you will see the lower view in Android Studio automatically open and display
    the Debug window, with access to `Debugger`, `Console`, and other debugging tools,
    as shown in Figure 5-10.


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig10_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig10_HTML.jpg)


    *Figure 5-10 The Debug view automatically triggered in Android Studio*


    Depending on what you’re debugging and if you’ve set breakpoints, you will also
    see additional menu items in the Run menu activated, as shown in Figure 5-11.


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig11_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig11_HTML.jpg)


    *Figure 5-11 Debug options to step into, over, and out of parts of your code in
    Android Studio*


    I will explain these “stepping” options under the next heading.


    ## Stepping Through Code While Debugging


    The options to `Step Over`, `Step Into`, `Step Out`, and so forth you see in Figure
    5-11 are integral to carefully examining what your code is doing. Instead of running
    your entire code base, by stepping into, over, or out of your code one line at
    a time, you can step through your application logic one action at a time, and
    in conjunction with other tools like variable inspection and looking at visual
    or behavioral changes in activity UIs, you can see the results of each line of
    logic.


    ## Attaching the Debugger


    You may not always have a clear idea of where to set breakpoints or step into
    or through code. At times, you might want to simply get a deeper look at what
    is happening in your application to understand some inexplicable behavior or problem.
    This is where the `Debugger` tool comes in. We can’t do justice to the `Debugger`
    in just a few pages, or even an entire chapter, so we won’t stress over that.
    You can find out more about the great capabilities of the `Debugger` on the book’s
    website, at [`www.beginningandroid.org`](http://www.beginningandroid.org).


    To invoke the `Debugger` and have it attach itself to a running application to
    help you in learning what’s going on, you can use the very last option in the
    Run menu – `Attach Debugger to Android Process`. Your application must be running
    already for this to work.


    # Viewing What You’ve Run


    You have now seen enough examples of your first application running on an AVD
    or on a real device that you might be wondering what I mean by “viewing what you’ve
    run.” To clear up the mystery, there is more to “seeing” your application running
    than just looking at the activities being rendered in the finished application.


    Android Studio offers several very useful, and some would say critical, tools
    that let you view what has happened as your application was built by your Gradle
    scripts (or other tools) and diagnostic and logging information for what is happening
    as the application runs.


    Across the bottom of your Android Studio window, just above the status bar, you
    will see a set of buttons that give you quick access to these tools, with names
    like `TODO`, `Build`, `Logcat`, and so on, which you can see in Figure 5-12.


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig12_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig12_HTML.jpg)


    *Figure 5-12 Easily accessing Event Log, Build Output, Logcat, and more in Android
    Studio*


    Let’s look at some of the key tools here so you feel comfortable incorporating
    their use into your expanding developer toolset.


    ## Understanding Your Build


    The `Build` tool shows you the summary of the build process in the `Build Output`
    window, which will either be a “Build: finished” message, with a green tick and
    some timing information as you can see in Figure 5-13, or a set of errors or issues
    that prevented the build from working.


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig13_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig13_HTML.jpg)


    *Figure 5-13 The Build Output view of your project build in Android Studio*


    You will also see a list of the tasks that were performed to actually do the application
    building (in my case, 20 separate build steps) and a link to the `Build Analyzer`,
    which offers a deeper dive into what time each task took and how that might be
    improved.'
