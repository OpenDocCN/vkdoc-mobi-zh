- fmt: "# Understanding Events in the Event Log\n\nAnother of the tools that complements\
    \ the `Build` tool is the `Event Log`. The `Event Log` shows a higher-level view\
    \ of action that took place, such as steps taken to load your newly built application\
    \ onto a device or AVD and any issues identified from those steps. Listing [5-2](#499629_1_En_5_Chapter.xhtml#PC2)\
    \ shows the `Event Log` output from building the `MyFirstApp` application and\
    \ launching it on multiple AVD instances.\n\n```\n22:17 Executing tasks: [:app:assembleDebug]\
    \ in project /Users/alleng/AndroidStudioProjects/MyFirstApp\n22:17 Gradle build\
    \ finished in 9 s 5 ms\n22:17 Install successfully finished in 11 s 455 ms.\n\
    22:17 Install successfully finished in 2 s 612 ms.\n22:18 Emulator: emulator:\
    \ INFO: QtLogger.cpp:68: Warning: Error receiving trust for a CA certificate ((null):0,\
    \ (null))\n22:18 Emulator: Process finished with exit code 0\nListing 5-2\nThe\
    \ Event Log from building and launching MyFirstApp on two AVDs\n```\n\nTypical\
    \ errors you might see in the `Event Log` are things that may have stopped the\
    \ build or post-build activity, like specifying an SDK or base image for an emulated\
    \ device that is not present on the machine. An example of the latter issue would\
    \ look like this in the `Event Log`:\n\n```\nEmulator: emulator: ERROR: This AVD's\
    \ configuration is missing a kernel file! Please ensure the file \"kernel-ranchu\"\
    \ is in the same location as your system image.\n```\n\n# Understanding Logcat\n\
    \n`Logcat` is one of the most useful tools in your testing and debugging arsenal.\
    \ Its job is to help collect diagnostic and runtime information from a device\
    \ or AVD as your application is running and also when your application stops running\
    \ unexpectedly, crashes, has problems, freezes, and so on.\n\n`Logcat` will provide\
    \ a console-like interface to examine and review key system messages from the\
    \ device or emulator, including things like all-important stack traces of what\
    \ happened and what went wrong, when an application encountered an error or exception\
    \ when running. This ability is tremendously useful in situations where code might\
    \ run perfectly well in one environment, such as an AVD on your developer workstation,\
    \ but when run on a particular brand or model of phone encounters an unexpected\
    \ problem.\n\nTo use `Logcat`, just click the button on the bar while you have\
    \ your application running or while your device or AVD is performing other tasks\
    \ like starting up. You will see by default a long list of `Logcat` entries gathered\
    \ from what’s happening with your application and device, as shown in Figure [5-14](#499629_1_En_5_Chapter.xhtml#Fig14).\n\
    \n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig14_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig14_HTML.jpg)\n\
    \n**Figure 5-14**  \n`Logcat` output in Android Studio\n\nThis example `Logcat`\
    \ output is fairly innocuous, but when things go wrong, the stack traces and other\
    \ diagnostic information in `Logcat` are invaluable.\n\n# Revisiting the SDK Manager\n\
    \nOne last aspect of the major tools available via Android Studio is to revisit\
    \ the `SDK Manager` you first saw in Chapter [3](#499629_1_En_3_Chapter.xhtml).\
    \ You can invoke and use the `SDK Manager` at any time, by opening the `Tools`\
    \ menu and choosing the `SDK Manager` entry. You can do this to see the SDK versions\
    \ you have already installed and any that are not installed or that have updates\
    \ available, as shown in Figure [5-15](#499629_1_En_5_Chapter.xhtml#Fig15).\n\n\
    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig15_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig15_HTML.jpg)\n\
    \n**Figure 5-15**  \nRevisiting the Android SDK Manager\n\nAs you would expect,\
    \ you can check any SDK versions you don’t have and click `Apply`, and the `SDK\
    \ Manager` will commence downloading and installing those versions in the background.\
    \ You are most likely going to need to do this as you work in two scenarios: first,\
    \ when ensuring you have SDKs that represent common or popular Android releases,\
    \ such as 4.4 “KitKat” and, second, when you are testing out new capabilities\
    \ as Google releases new SDKs in conjunction with new versions of Android.\n\n\
    But there is another reason to reach for the `SDK Manager`, and that is its ability\
    \ to help you add extra goodies to your Android Studio experience. Switch to the\
    \ second tab in `SDK Manager`, titled `SDK Tools`, and you will see a treasure\
    \ trove of extras that will soon become some of your best-loved tools. We will\
    \ revisit some of these tools in relevant chapters throughout the rest of the\
    \ book, but I’ll flag two types of tools that are frequently used by developers.\
    \ These are the `Android SDK Command-Line Tools`, which offer extra features for\
    \ managing and controlling SDK packages from the command line, and the various\
    \ additional Google Play libraries and SDKs, which help you build applications\
    \ that use dependencies and libraries from Google’s proprietary Google Play services.\n\
    \nYou can check these for download now or wait until later in the book to do so.\n\
    \n# Highlighting the Other Major Features of Android Studio\n\nThis chapter has\
    \ looked at some of the key features of Android Studio that are available to manage,\
    \ execute, examine, and diagnose your applications as you build them and to manage\
    \ and use the associated SDKs and other tools that form part of your application\
    \ development work.\n\nBut by far the biggest set of tools in Android Studio that\
    \ you will use are those directly related to writing code, reviewing code, examining\
    \ code in detail, rewriting code, and so on. We will introduce many of those aspects\
    \ of Android Studio in Part 2 of the book, in conjunction with introducing the\
    \ many parts of coding for Android applications.\n\n# Summary\n\nThis chapter\
    \ has introduced you to the main tools of any software developer, the IDE. You\
    \ should now feel comfortable exploring more of the options within Android Studio,\
    \ knowing that you can always find the core tools you need for your project.\n\
    \n# 6. Mastering Your Entire Developer Ecosystem\n\nThere is more to getting set\
    \ up for Android development than just installing Android Studio. While you can\
    \ do just that – and only that – you will eventually find there are other aspects\
    \ of your computer, and the software it runs, that will make a big difference\
    \ to your productivity, ambition, and competence as an Android developer. This\
    \ chapter is not exhaustive, but does give you a lot of important foundational\
    \ considerations, as well as links to where to go next to learn more. Read on!\n\
    \n## Choosing Dedicated Developer Hardware\n\nIn Chapter [2](#499629_1_En_2_Chapter.xhtml),\
    \ I introduced a short checklist for the aspects of your computer that might be\
    \ of interest to the serious Android developer. Here is the summary again:\n\n\
    1.  What desktop or laptop hardware will I use for my Android development?\n\n\
    2.  What operating system will I run on my desktop/laptop?\n\n3.  What prerequisites\
    \ will my system need prior to using Android Studio?\n\n4.  What Android handsets,\
    \ if any, will I make use of during development?\n\nThe maxim I set out then still\
    \ applies. Pretty much any computer made in recent years that you have at hand\
    \ will serve as a decent developer workstation. Whether that is a desktop computer\
    \ or a notebook, it will get the job done.\n\nBut this book isn’t just about getting\
    \ the job done. If you really thirst to be a professional Android developer, then\
    \ just as other professionals rely on tools and equipment for efficiency and leverage,\
    \ you too should think about what tools will boost your development work and your\
    \ ability to make great applications.\n\nLet’s start by looking at the factors\
    \ you might want to consider if you are looking for developer hardware that will\
    \ give you an unfair advantage when building Android applications."
  raw: '### Understanding Events in the Event Log


    Another of the tools that complements the Build tool is the Event Log. The Event
    Log shows a higher-level view of action that took place, such as steps taken to
    load your newly built application onto a device or AVD and any issues identified
    from those steps. Listing [5-2](#499629_1_En_5_Chapter.xhtml#PC2) shows the Event
    Log output from building the MyFirstApp application and launching it on multiple
    AVD instances.


    ```

    22:17 Executing tasks: [:app:assembleDebug] in project /Users/alleng/AndroidStudioProjects/MyFirstApp

    22:17 Gradle build finished in 9 s 5 ms

    22:17 Install successfully finished in 11 s 455 ms.

    22:17 Install successfully finished in 2 s 612 ms.

    22:18 Emulator: emulator: INFO: QtLogger.cpp:68: Warning: Error receiving trust
    for a CA certificate ((null):0, (null))

    22:18 Emulator: Process finished with exit code 0

    Listing 5-2

    The Event Log from building and launching MyFirstApp on two AVDs

    ```


    Typical errors you might see in the Event Log are things that may have stopped
    the build or post-build activity, like specifying an SDK or base image for an
    emulated device that is not present on the machine. An example of the latter issue
    would look like this in the Event Log:


    ```

    Emulator: emulator: ERROR: This AVD''s configuration is missing a kernel file!
    Please ensure the file "kernel-ranchu" is in the same location as your system
    image.

    ```


    ### Understanding Logcat


    Logcat is one of the most useful tools in your testing and debugging arsenal.
    Its job is to help collect diagnostic and runtime information from a device or
    AVD as your application is running and also when your application stops running
    unexpectedly, crashes, has problems, freezes, and so on.


    Logcat will provide a console-like interface to examine and review key system
    messages from the device or emulator, including things like all-important stack
    traces of what happened and what went wrong, when an application encountered an
    error or exception when running. This ability is tremendously useful in situations
    where code might run perfectly well in one environment, such as an AVD on your
    developer workstation, but when run on a particular brand or model of phone encounters
    an unexpected problem.


    To use Logcat, just click the button on the bar while you have your application
    running or while your device or AVD is performing other tasks like starting up.
    You will see by default a long list of Logcat entries gathered from what’s happening
    with your application and device, as shown in Figure [5-14](#499629_1_En_5_Chapter.xhtml#Fig14).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig14_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig14_HTML.jpg)


    Figure 5-14


    Logcat output in Android Studio


    This example Logcat output is fairly innocuous, but when things go wrong, the
    stack traces and other diagnostic information in Logcat are invaluable.


    ## Revisiting the SDK Manager


    One last aspect of the major tools available via Android Studio is to revisit
    the SDK Manager you first saw in Chapter [3](#499629_1_En_3_Chapter.xhtml). You
    can invoke and use the SDK Manager at any time, by opening the Tools menu and
    choosing the SDK Manager entry. You can do this to see the SDK versions you have
    already installed and any that are not installed or that have updates available,
    as shown in Figure [5-15](#499629_1_En_5_Chapter.xhtml#Fig15).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig15_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Revisiting the Android SDK Manager


    As you would expect, you can check any SDK versions you don’t have and click Apply,
    and the SDK Manager will commence downloading and installing those versions in
    the background. You are most likely going to need to do this as you work in two
    scenarios: first, when ensuring you have SDKs that represent common or popular
    Android releases, such as 4.4 “KitKat” and, second, when you are testing out new
    capabilities as Google releases new SDKs in conjunction with new versions of Android.


    But there is another reason to reach for the SDK Manager, and that is its ability
    to help you add extra goodies to your Android Studio experience. Switch to the
    second tab in SDK Manager, titled SDK Tools, and you will see a treasure trove
    of extras that will soon become some of your best-loved tools. We will revisit
    some of these tools in relevant chapters throughout the rest of the book, but
    I’ll flag two types of tools that are frequently used by developers. These are
    the Android SDK Command-Line Tools, which offer extra features for managing and
    controlling SDK packages from the command line, and the various additional Google
    Play libraries and SDKs, which help you build applications that use dependencies
    and libraries from Google’s proprietary Google Play services.


    You can check these for download now or wait until later in the book to do so.


    ## Highlighting the Other Major Features of Android Studio


    This chapter has looked at some of the key features of Android Studio that are
    available to manage, execute, examine, and diagnose your applications as you build
    them and to manage and use the associated SDKs and other tools that form part
    of your application development work.


    But by far the biggest set of tools in Android Studio that you will use are those
    directly related to writing code, reviewing code, examining code in detail, rewriting
    code, and so on. We will introduce many of those aspects of Android Studio in
    Part 2 of the book, in conjunction with introducing the many parts of coding for
    Android applications.


    ## Summary


    This chapter has introduced you to the main tools of any software developer, the
    IDE. You should now feel comfortable exploring more of the options within Android
    Studio, knowing that you can always find the core tools you need for your project.


    # 6. Mastering Your Entire Developer Ecosystem


    There is more to getting set up for Android development than just installing Android
    Studio. While you can do just that – and only that – you will eventually find
    there are other aspects of your computer, and the software it runs, that will
    make a big difference to your productivity, ambition, and competence as an Android
    developer. This chapter is not exhaustive, but does give you a lot of important
    foundational considerations, as well as links to where to go next to learn more.
    Read on!


    ## Choosing Dedicated Developer Hardware


    In Chapter [2](#499629_1_En_2_Chapter.xhtml), I introduced a short checklist for
    the aspects of your computer that might be of interest to the serious Android
    developer. Here is the summary again:


    1.  What desktop or laptop hardware will I use for my Android development?


    2.  What operating system will I run on my desktop/laptop?


    3.  What prerequisites will my system need prior to using Android Studio?


    4.  What Android handsets, if any, will I make use of during development?


    The maxim I set out then still applies. Pretty much any computer made in recent
    years that you have at hand will serve as a decent developer workstation. Whether
    that is a desktop computer or a notebook, it will get the job done.


    But this book isn’t just about getting the job done. If you really thirst to be
    a professional Android developer, then just as other professionals rely on tools
    and equipment for efficiency and leverage, you too should think about what tools
    will boost your development work and your ability to make great applications.


    Let’s start by looking at the factors you might want to consider if you are looking
    for developer hardware that will give you an unfair advantage when building Android
    applications.'
  trans: "\n# 理解事件日志中的事件\n\n另一个与 `Build` 工具相辅相成的工具是 `Event Log`。`Event Log` 以更高层次的视角展示所执行的操作，例如将新构建的应用加载到设备或\
    \ AVD 上所采取的步骤，以及从这些步骤中识别出的任何问题。清单 5-2 展示了构建 `MyFirstApp` 应用并在多个 AVD 实例上启动后的 `Event\
    \ Log` 输出。\n\n```\n22:17 Executing tasks: [:app:assembleDebug] in project /Users/alleng/AndroidStudioProjects/MyFirstApp\n\
    22:17 Gradle build finished in 9 s 5 ms\n22:17 Install successfully finished in\
    \ 11 s 455 ms.\n22:17 Install successfully finished in 2 s 612 ms.\n22:18 Emulator:\
    \ emulator: INFO: QtLogger.cpp:68: Warning: Error receiving trust for a CA certificate\
    \ ((null):0, (null))\n22:18 Emulator: Process finished with exit code 0\n清单 5-2\n\
    在两个 AVD 上构建并启动 MyFirstApp 后的事件日志\n```\n\n你在 `Event Log` 中可能看到的典型错误，通常是那些阻止了构建或构建后活动的问题，例如为模拟设备指定了本机上不存在的\
    \ SDK 或基础镜像。后一类问题在 `Event Log` 中的显示示例如下：\n\n```\nEmulator: emulator: ERROR: This\
    \ AVD's configuration is missing a kernel file! Please ensure the file \"kernel-ranchu\"\
    \ is in the same location as your system image.\n```\n\n# 理解 Logcat\n\n`Logcat`\
    \ 是测试和调试工具集中最有用的工具之一。它的职责是在你的应用运行期间，以及应用意外停止运行、崩溃、出现问题、冻结等情况发生时，帮助从设备或 AVD 上收集诊断和运行时信息。\n\
    \n`Logcat` 会提供一个类似控制台的界面，用于检查和审查来自设备或模拟器的关键系统消息，包括应用在运行中遇到错误或异常时所发生的所有重要堆栈跟踪信息。当代码在一个环境（例如开发者工作站的\
    \ AVD）中运行完美，但在特定品牌或型号的手机上运行时却遇到意外问题时，这种能力极其有用。\n\n要使用 `Logcat`，只需在应用运行期间，或设备/AVD\
    \ 正在执行其他任务（例如启动）时，点击工具栏上的按钮即可。默认情况下，你会看到一长串从应用和设备当前状态中收集到的 `Logcat` 条目，如图 5-14\
    \ 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig14_HTML.jpg](img/499629_1_En_5_Fig14_HTML.jpg)\n\
    \n**图 5-14**  \nAndroid Studio 中的 `Logcat` 输出\n\n此示例中的 `Logcat` 输出相对无害，但当问题出现时，`Logcat`\
    \ 中的堆栈跟踪和其他诊断信息将变得无比宝贵。\n\n# 重新审视 SDK Manager\n\n通过 Android Studio 可用的主要工具中，最后一个要重新审视的是你在第\
    \ 3 章首次见到的 `SDK Manager`。你可以随时通过打开 `Tools` 菜单并选择 `SDK Manager` 条目来调用和使用它。通过此操作，你可以查看已安装的\
    \ SDK 版本，以及尚未安装或有可用更新的版本，如图 5-15 所示。\n\n![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig15_HTML.jpg](img/499629_1_En_5_Fig15_HTML.jpg)\n\
    \n**图 5-15**  \n重新审视 Android SDK Manager\n\n正如你所料，你可以勾选任何尚未安装的 SDK 版本，然后点击 `Apply`，`SDK\
    \ Manager` 将在后台开始下载并安装这些版本。在以下两种工作场景中，你很可能会需要这样做：第一，确保你拥有代表常见或流行的 Android 版本（例如\
    \ 4.4 “KitKat”）的 SDK；第二，当 Google 随新版本 Android 发布新 SDK 时，你需要测试这些新功能。\n\n但使用 `SDK\
    \ Manager` 还有另一个原因，那就是它能够帮助你在 Android Studio 体验中添加额外的“好东西”。切换到 `SDK Manager` 的第二个标签页，名为\
    \ `SDK Tools`，你将看到一个宝藏库，其中包含的众多额外工具很快就会成为你最爱用的工具。我们将在本书后续的相关章节中重新审视其中一些工具，但我先标记两类开发者经常使用的工具。它们是\
    \ `Android SDK Command-Line Tools`，它提供了从命令行管理和控制 SDK 包的额外功能；以及各种额外的 Google Play\
    \ 库和 SDK，它们能帮助你构建使用 Google 专有 Google Play 服务的依赖项和库的应用。\n\n你可以现在勾选这些工具进行下载，也可以等到本书后续章节再操作。\n\
    \n# 突出 Android Studio 的其他主要功能\n\n本章介绍了 Android Studio 的一些关键功能，这些功能可用于管理、执行、检查和诊断你在构建中的应用，以及管理和使用作为应用开发工作一部分的关联\
    \ SDK 及其他工具。\n\n但 Android Studio 中最大的一组工具，毫无疑问是与编写代码、审查代码、详细检查代码、重写代码等直接相关的。我们将在本书的第二部分中，结合介绍\
    \ Android 应用编码的诸多方面，来介绍 Android Studio 的这些功能。\n\n# 总结\n\n本章向你介绍了任何软件开发者都会用到的主要工具——IDE。现在你应该有信心进一步探索\
    \ Android Studio 中的更多选项了，并知道总能找到项目所需的核心工具。\n\n# 6. 掌握你的整个开发者生态系统\n\n为 Android\
    \ 开发进行设置，不仅仅只是安装 Android Studio。虽然你可以只做这一步——并且只做这一步——但你最终会发现，计算机的其他方面，以及它运行的软件，将对你作为\
    \ Android 开发者的生产力、抱负和能力产生重大影响。本章虽非详尽无遗，但确实提供了一些重要的基础性考量，以及进一步学习的链接。请继续阅读！\n\n\
    ## 选择专用开发者硬件\n\n在第 2 章中，我为认真的 Android 开发者介绍了一个关于计算机方面考量的简短清单。以下是再次总结：\n\n1.  我将使用什么台式机或笔记本电脑硬件来进行\
    \ Android 开发？\n\n2.  我将在台式机/笔记本电脑上运行什么操作系统？\n\n3.  在使用 Android Studio 之前，我的系统需要哪些先决条件？\n\
    \n4.  在开发过程中，我将使用哪些 Android 手机（如果有的话）？\n\n我当时提出的准则依然适用。近年来生产的几乎任何一台手头可用的电脑，都可以作为一台不错的开发者工作站。无论是台式电脑还是笔记本电脑，它都能胜任工作。\n\
    \n但本书的目的不仅仅是“胜任工作”。如果你真正渴望成为一名专业的 Android 开发者，那么就像其他专业人士依赖工具和设备来提高效率和杠杆作用一样，你也应该思考哪些工具能够提升你的开发工作以及你创建优秀应用的能力。\n\
    \n让我们首先来看看，如果你正在寻找能让你在构建 Android 应用时获得不公平优势的开发者硬件，你可能需要考虑哪些因素。\n"
- fmt: '### Determining Which CPU Is Right for You


    The year 2020 sees a lot of choices for `x86_64` CPUs: AMD with Ryzen and Threadripper
    and Intel with their Core series of CPUs. You can find many opinions as to which
    is the best, and typically these judgments look at raw CPU speed (`clock frequency`),
    number of cores in the package, on-board cache at various levels, and several
    other features.


    For the purposes of a dedicated Android developer machine, any contemporary Intel
    or AMD CPU is ample. If you were looking for specific recommendations for a 2020-era
    CPU, you should look at Intel Core i5 and Core i7 CPUs and AMD Ryzen 7 and Ryzen
    9 CPUs. These have ample speed, a decent core count (typically four or more),
    and good `L1`/`L2`/`L3` cache.


    There are beefier CPUs from both AMD and Intel, but typically you will see these
    differentiating themselves with even more cores and occasionally support for other
    things. In the world of Android development, more cores is not always better.
    The key activities that are running in parallel for you are any simultaneous activity
    where you are working in Android Studio and looking at results in one or more
    AVDs and, for sufficiently large multiproject applications, parallel build activities
    if Gradle is configured to support them. My advice would be spare your wallet
    the cost of the most expensive Core i9 and similar AMD processors and use those
    funds on other parts of your developer setup, such as more memory or a better
    screen.


    Another CPU architecture growing in popularity is Arm. Arm is at the heart of
    almost every mobile device on the planet today, based on the immense popularity
    of designs for "systems-on-a-chip," or SoCs, that license the Arm architecture.
    Arm-based desktop machines are available, and even a nascent market for Arm servers,
    but there is an interesting conundrum here.


    While the vast majority of Android devices sold and used globally today are built
    with Arm processors, using an Arm-based computer for computationally heavy workloads
    – such as building/compiling Android applications – is still a challenge. It can
    be done; there''s no doubt. But the speed and performance trade-offs are still
    significant. And the biggest impediment is whether the tools you expect to use
    are available for an Arm-based computer. Most notably, `Android Studio` is not
    available for Arm – it only runs on `x86` architecture computers. Likewise, Google
    only packages the Android SDK in its many versions for `x86`, not Arm. This means
    if you choose an Arm-based development machine, you will need to bootstrap all
    of your work with your own build tools, work around the absence of easily bundled
    Android SDKs, and more. That''s not a challenge I would recommend.


    ### Too Much Memory Is Never Enough!


    I sometimes wish it was as easy to add memory to myself as it is to add it to
    a desktop computer. For now, you and I will just have to be satisfied with the
    buying RAM for the sake of better developer firepower.


    If you think back to Chapter [2](#499629_1_En_2_Chapter.xhtml), you''ll recall
    that Google recommends a minimum of 4 GB of RAM for Android Studio and a preferred
    base level of 8 GB. It''s actually quite difficult to buy new computers with only
    4 GB of RAM. So, to quote a famous movie, 8 is enough, right?


    Not so fast! You can certainly be productive and make Android applications on
    a computer with 8 GB of RAM. In fact, I''m writing a good portion of this book,
    and building some of the examples you see, on a 2015-era MacBook Air with 8 GB
    of memory, so it is more than just theoretically possible. However, I can tell
    you that it has its clear limitations and frustrations. Some notable examples
    are where I am trying to run Android Studio and an AVD, plus one of the open source
    tools I discuss later in this chapter and throughout the book for image and video
    manipulation. That 8 GB gets exhausted quickly, and the MacBook dutifully starts
    increasing – and increasingly using – swap space on disk to juggle real memory
    and the greater demands I''m placing on it.


    Contrast this with my trusty desktop machine. It is even older, being a "vintage"
    Dell Precision workstation from nearly a decade ago – I''m not sure Dell even
    makes these any more. But it has 32 GB of memory and does not skip a beat using
    Android Studio, multiple AVDs simultaneously, and several other tools thrown in
    for good measure.


    **Note**


    You can tell from my setup that I''m not exactly taking affiliate fees or kickbacks
    on recommending hardware for you to buy. If you have a time machine, please do
    jump back to 2010 or 2015 to buy your version of my hardware!


    My succinct advice to you if you are specifying your own Android developer system
    is this: no one ever complained they had too much RAM! If you can, get at least
    32 GB; and for luxury, 64 GB will be ample for years of Android development to
    come.


    For those of you looking to buy or acquire a notebook as your primary development
    machine, pay particular attention to what is the maximum memory your preferred
    model can take and whether memory can be changed after purchase. That is, is the
    memory soldered or fixed in place, such that it can''t be changed or swapped without
    expensive, and possibly warranty-voiding, actions? You might find yourself limited
    to 16 GB – if you can pick a model that supports 32 GB, you will thank yourself
    in the future (and maybe me as well!).'
  raw: '### Determining Which CPU Is Right for You


    The year 2020 sees a lot of choices for x86_64 CPUs: AMD with Ryzen and Threadripper
    and Intel with their Core series of CPUS. You can find many opinions as to which
    is the best, and typically these judgments look at raw CPU speed (clock frequency),
    number of cores in the package, on-board cache at various levels, and several
    other features.


    For the purposes of a dedicated Android developer machine, any contemporary Intel
    or AMD CPU is ample. If you were looking for specific recommendations for a 2020-era
    CPU, you should look at Intel Core i5 and Core i7 CPUs and AMD Ryzen 7 and Ryzen
    9 CPUs. These have ample speed, a decent core count (typically four or more),
    and good L1/L2/L3 cache.


    There are beefier CPUs from both AMD and Intel, but typically you will see these
    differentiating themselves with even more cores and occasionally support for other
    things. In the world of Android development, more cores is not always better.
    The key activities that are running in parallel for you are any simultaneous activity
    where you are working in Android Studio and looking at results in one or more
    AVDs and, for sufficiently large multiproject applications, parallel build activities
    if Gradle is configured to support them. My advice would be spare your wallet
    the cost of the most expensive Core i9 and similar AMD processors and use those
    funds on other parts of your developer setup, such as more memory or a better
    screen.


    Another CPU architecture growing in popularity is Arm. Arm is at the heart of
    almost every mobile device on the planet today, based on the immense popularity
    of designs for “systems-on-a-chip,” or SoCs, that license the Arm architecture.
    Arm-based desktop machines are available, and even a nascent market for Arm servers,
    but there is an interesting conundrum here.


    While the vast majority of Android devices sold and used globally today are built
    with Arm processors, using an Arm-based computer for computationally heavy workloads
    – such as building/compiling Android applications – is still a challenge. It can
    be done; there’s no doubt. But the speed and performance trade-offs are still
    significant. And the biggest impediment is whether the tools you expect to use
    are available for an Arm-based computer. Most notably, Android Studio is not available
    for Arm – it only runs on x86 architecture computers. Likewise, Google only packages
