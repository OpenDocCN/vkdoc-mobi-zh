- fmt: '#### Run Configuration: Debugger


    Those readers who are seasoned in writing any kind of software will appreciate
    that it is not a task that is ever perfect. Things go wrong, unexpected behaviors
    happen, applications fail for unpredictable reasons, and more!


    The options presented on the Debugger screen make more sense over time, once you
    have spent some time writing, debugging, and reviewing code. The key options to
    pay attention to regardless of your experience level are as follows:


    - **Debug Type**: Essentially, this provides the guidance to Android Studio about
    what kind of code to expect in your project. This can set explicitly to `Java`,
    `Native` (which typically means C++ via the Native Development Kit extensions
    for Android), `Dual` (both Java and Native), or `autodetect`. The one advantage
    of specifying exactly what language to expect, rather than relying on `autodetect`,
    is you will save a small amount of time in having Android Studio review your project
    for language types and not have it load debugging tools for a language that isn’t
    present.


    - **Show static/global variables**: One of the first tools many developers reach
    for when things go wrong is an inspection tool – that is, something that shows
    the current state of parts of the code when there are problems, such as the value
    assigned to particular variables. This option adds static/global variables to
    your view along with the variables you define in methods throughout your code.


    - **Warn when debugging optimized code**: One very useful feature of language
    compilers is their ability to optimize code written by humans to run more efficiently.
    When this happens, the code being run is not strictly the code you wrote, even
    though the outcomes should be identical. This setting allows you to be warned
    when you have moved to debugging code that has been optimized on your behalf.


    Other settings such as symbol directories and LLDB options are beyond the scope
    of the book.


    #### Run Configuration: Profiling


    It has taken a long time for Android profiling tools in any form to reach the
    kind of maturity and insight developers need to help them understand the environmental
    demands their applications are making. Even a few years back, in both Android
    Studio and Eclipse, the tooling was still short of what most people would expect.
    Today, the tools are getting better all the time, and we’ll touch on some of them
    as we look at areas in depth in later chapters. Some of these improved options
    can be configured directly in your run configuration, as follows:


    - **Enable Advanced Profiling**: For anyone working with target SDKs at API level
    26 or below, it can be frustrating trying to determine what is happening in your
    application’s immediate environment, for instance, with network behavior and traffic,
    events handled or dropped, and so forth. The `Enable Advanced Profiling` option
    turns on the ability to capture more metrics for older target API levels. For
    anyone targeting contemporary API levels, for example, 30+, this is now a default
    part of the standard profiling behavior in Android Studio and associated tools.


    - **Start recording CPU activity on startup**: This setting is targeted at profiling
    where CPU cycles are being spent as your application is used. This has at least
    two benefits: The first is understanding how various parts of your application
    will perform, which is important when considering user happiness – a slow application
    can lead to users getting frustrated with your app. The second benefit is one
    level of abstraction removed. Because CPU use is the most taxing thing for a smartphone’s
    battery, the CPU activity record can help you understand if your application will
    be a significant contributor to battery drain when in use. The CPU activity setting
    is probably not one to start using in your very early Android learning experience,
    but it will become a mainstay of your developer workflow once you start exploring
    CPU-heavy Android features, like video use, on-device computation, and so on.


    ### Running Farther with AVDs and Connected Devices


    In Chapter [3](#499629_1_En_3_Chapter.xhtml), we went through the steps of creating
    an initial run configuration that then used the first AVD we created – named `Pixel
    2 API 30` – in order to actually run your application and show you the resulting
    activity screens. Using AVDs is one of the most powerful capabilities that Android
    Studio provides for you, enabling you to test and experiment across a huge range
    of virtual devices.


    Technically, the AVD Manager is a separate tool that Android Studio integrates
    and makes available to streamline your life – the “integration” mantra that I
    introduced in Chapter [2](#499629_1_En_2_Chapter.xhtml). As well as being able
    to launch the AVD Manager from the Tools menu in Android Studio or the toolbar
    button that appears as the tiny mobile phone icon, you can also run a command-line
    version of the AVD Manager directly from the command line or shell, as a stand-alone
    tool from the SDK Tools directory.


    To find the SDK Tools directory, from the root directory of your Android installation
    path (e.g., `~/Library/Android` on macOS or the Android directory you choose for
    your install under Linux or Windows in Chapter [2](#499629_1_En_2_Chapter.xhtml)),
    you will find an `sdk` subdirectory. Within the `sdk` subdirectory, follow the
    further subdirectories `tools ➤ bin`. Contained within, you’ll find a binary executable
    file named `avdmanager`. You can guess from its name that this is the stand-alone
    AVD Manager executable file. If you have any problems finding the SDK Tools directory,
    use the search feature of your operating system.


    When you run from the command line, you get command-line output, as you can see
    in Listing [5-1](#499629_1_En_5_Chapter.xhtml#PC1), depending on what options
    you pass to the `avdmanager` command.


    ```

    $ avdmanager list avd

    Available Android Virtual Devices:

    Name: Pixel_C_Tablet_API_30

    Device: pixel_c (Google)

    Path: /Users/alleng/.android/avd/Pixel_C_Tablet_API_30.avd

    Target: Google APIs (Google Inc.)

    Based on: Android API 30 Tag/ABI: google_apis/x86

    Skin: pixel_c

    Sdcard: 128 MB

    Listing 5-1

    Command-line output for the avdmanager tool

    ```'
