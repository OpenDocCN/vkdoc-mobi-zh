    \ case where implementing your own `onStart()` override is\nuseful is when you\
    \ have some custom resource that is long-lived, that\nyou have cleanly frozen\
    \ or paused based on your activity going out of\nview – being a good citizen and\
    \ not using resources when you don’t have\nto. Should you choose to set up such\
    \ resource management, then the `onStart()` method\nwould be where you would resume\
    \ or defrost such a custom resource. Be\nsure to call the `super.onStart()`\n\
    method to invoke the parent’s equivalent, even if you know there is no\noverride\
    \ code in the parent. Android itself still needs to do its own\ninternal work\
    \ in this case .\n\nonRestoreInstanceState( )\nIf a user ends an activity , either\
    \ by using the\nback button or via some other path that shifts them from your\
    \ activity\nto another, they have signaled that they are finished with the original\n\
    activity and all of the state associated with it. This would indicate to\nyou,\
    \ as the application developer, that you can also dispense with the\nactivity,\
    \ other than any long-lived resources you need to maintain. When\nAndroid itself\
    \ terminates an activity, the circumstances are usually\ndifferent. Primarily,\
    \ Android terminates an activity due to a\nconfiguration change, and it does need\
    \ to concern itself with what is\nneeded to recreate the activity to meet the\
    \ user’s needs. That means\nrecreating not just the visual display of the activity,\
    \ but all of its\ninstance state.\nYou might want to perform any custom instance\
    \ state recovery here,\nand remember that instance state is not the same as long-term\
    \ storage.\nOther mechanisms exist to handle that, including preferences, which\
    \ we\nwill cover later in the book. Where you want to persist more complex or\n\
    larger types of data than those for which the preference system is\ndesigned,\
    \ then fundamental computing concepts such as files and\ndatabases are the best\
    \ approach, and we will cover those in Chapter\n[18](#499629_1_En_18_Chapter.xhtml).\n\
    \nonResume( )\nThe `onResume()`\nmethod   is the moment of\ntruth when it comes\
    \ to Android UIs. The `onResume()` method is\nthe key method that makes the fully\
    \ rendered and inflated layout\nvisible, shifting all of the accumulated objects,\
    \ logic, and so forth\ninto the foreground. Together with `onPause()`, the\ntransitions\
    \ to and from foreground will trigger multiple times in the\nlife of your activity,\
    \ as other activities and applications preempt it,\njump to focus, are closed\
    \ by the user, and so on.\n\nThe only logic you should normally consider adding\
    \ to `onResume()` is related\nto the real-time visual aspects changing your activity,\
    \ including\n\n1.  Animation\n\n2.  Video\n\n3.  Custom view transition effects\n\
    \nIn all other respects , you should avoid any\nother custom logic in `onResume()`."
