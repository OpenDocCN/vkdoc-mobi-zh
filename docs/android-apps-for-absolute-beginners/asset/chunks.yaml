- fmt: '# 适用于各种场景的 Intent Action


    你可以在 Android 官方文档中找到完整的 Intent Action 和类别列表：[`https://developer.android.com/reference/android/content/Intent#constants_1`](https://developer.android.com/reference/android/content/Intent%2523constants_1)，因此这里不再重复。相反，让我们看看最常见和最有趣的
    Action，以便为本章及本书后续的示例提供参考：


    1.  `ACTION_AIRPLANE_MODE_CHANGED`：设备的用户已切换飞行模式设置（从开至关，或反之）。

    2.  `ACTION_CAMERA_BUTTON`：相机按钮（物理按钮或软按钮）被点击。

    3.  `ACTION_DATE_CHANGED`：日期已更改，这意味着您编写的任何使用计时器、经过时间等的应用程序逻辑可能会受到影响。

    4.  `ACTION_HEADSET_PLUG`：设备的用户已将耳机插入或从耳机插孔拔出。


    如您所见，Intent Action 涵盖了您的应用程序以及整个设备环境中发生的各种事件。

    **注意**：谷歌会在每个新的 Android 版本中为可用的 Intent 集添加新的 Action。同时，它也会弃用（并随后移除）一些它认为不再有用的旧
    Action。当您长期维护应用程序时，应检查您的应用程序所依赖的 Action 是否已被弃用或移除。


    # 理解 Intent 路由


    您可能会认为，本章前面提到的组件提名通常是调用您所需任何 Activity 的好方法，无论是您自己编写的还是其他人的。实际情况略有不同。

    如果您拥有自己编写的一个 Activity 类，并理解它为何以及如何是 Intent 的最佳接收者，那么这样做是完全没问题的。但是，当处理来自其他应用程序的
    Activity 时，这种方式并不可靠，有时甚至不安全，并且可能导致糟糕、意外或完全错误的行为。

    编程原则中的封装性是这一警告的核心。请想象一下，让其他开发人员依赖您自己的类及其内部实现。随着您作为开发者的成熟，您会不断调整和修改代码及类，这很可能导致某人对类内部实现的假设最终出错，因为您更改了逻辑。反过来也是如此，您不应依赖其他人应用程序中保持不变的实现逻辑（甚至不应依赖其一直存在）。

    为了安全地使用 Intent 模型定位您选择的应用程序或服务，应优先使用 `Uri` 和 MIME 类型。如果我们能够窥探其他人应用程序的内部，那么如何指导
    Android 将 Intent 发送给首选的 Activity 或接收器（如 Service）呢？答案在于 Android 的隐式路由方案，该方案基于一组资格规则，将
    Intent 传递给所有应该接收它们的 Activity 等。


    隐式路由方案的规则如下：


    1.  Activity 必须通过适当的清单文件条目（在下一节中讨论）表明其处理 Intent 的能力。

    2.  如果 MIME 类型是 Intent 上下文的一部分，则 Activity 必须支持该 MIME 类型。

    3.  Activity 还必须支持事件上下文中的每个类别。


    这些规则有助于将可能匹配的 Activity 集缩小到那些能够以适合您使用的方式忠实执行 Intent 的 Activity。


    # 在 Manifest 中包含 Intent


    Android 使用您的 `AndroidManifest.xml` 文件来保存 Intent 过滤器，指示您的应用程序中哪些组件可以被通知并适当响应给定的
    Intent。如果您组件的清单条目没有列出该 Intent Action，那么它就不会被选中通过隐式路由机制接收此类 Intent 的通知。您可以将其视为组件处理
    Intent 的“选择加入”方式，构建一个您希望消费的 Intent 列表。


    当您创建一个新的 Android 项目时，Android Studio 会创建您的第一个 Intent 过滤器，作为骨架 `AndroidManifest.xml`
    文件的一部分。本书至今为止的所有示例应用程序中，您都已经看到了它的实际应用。作为复习，代码清单 [17-1](#499629_1_En_17_Chapter.xhtml#PC1)
    是您第一个应用程序 `MyFirstApp`（来自第 [2](#499629_1_En_2_Chapter.xhtml) 章）的清单。以粗体显示的是 `MainActivity`
    Activity 及其指定的 Intent 过滤器。


    ```

    代码清单 17-1

    来自 AndroidManifest.xml 文件的 Intent 过滤器示例

    ```


    Intent 过滤器有两个关键部分。首先，我们指定 `MainActivity` Activity 属于 `LAUNCHER` 类别，这意味着任何触发它的
    Intent 也必须是该类别。其次，我们还指定了 Action `android.intent.action.MAIN`，用于表明任何寻找具有 `MAIN`
    能力的 Activity 的 Intent 都可以被接受。您可以为您的 `MainActivity` 设置更多可能的 Action 以及更多类别，表明它通过您为该
    Activity 类编写的任何逻辑支持更多功能。


    您的应用程序的任何其他 Activity 通常不会使用 `MAIN/LAUNCHER` 组合作为 Action 和类别——在几乎所有情况下，您的清单中只使用一个这样的标识。虽然有众多类别和
    Action 可供选择，但您通常会经常使用 `DEFAULT` 类别，特别是对于任何视图或编辑类型的 Action，并结合 `<data>` 元素来描述 Activity
    可以处理用于查看或编辑的 `mimeType`。例如，代码清单 [17-2](#499629_1_En_17_Chapter.xhtml#PC2) 显示了一个笔记类应用程序的
    Intent 过滤器。


    ```

    代码清单 17-2

    您应用程序中一个示例次要 Activity 的 Intent 过滤器

    ```


    上述定义的 Activity 包含一个 Intent 过滤器，描述了它如何被启动，以处理来自任何应用程序的 Intent，该 Intent 请求使用 `Uri`
    查看类型为 `vnd.android.cursor.dir/vnd.google.note` 的 `mimeType` 内容。这个 Intent 可以来自您自己的应用程序（例如，跟随您启动器
    Activity 中的用户操作），也可以来自任何其他能够为此 Activity 创建格式良好的 `Uri` 并将其用作其所触发 Intent 有效负载的应用程序。


    # 使用 Android 的验证链接


    处理 Intent 中 `Uri` 的另一个功能是自动验证链接机制，它专门处理同时也是有效 URL（即网址）的 `Uri`。通过验证链接，您可以在代码中添加显式规则，使来自特定网站的
    URL 与配套应用程序之间的链接 100% 得到验证，并成为处理具有匹配 URL 的 Intent 的首选方式。这包括后台机制，用于在需要时实现无缝身份验证，并避免
    Android 传统上使用的“网站或应用程序”选择器对话框。'
  raw: "An Intent Action for Every Occasion\nYou can find a full list of intent actions\
    \ and categories provided\nwith the Android documentation at [`https://developer.android.com/reference/android/content/Intent#constants_1`](https://developer.android.com/reference/android/content/Intent%2523constants_1)\n\
    so I won’t duplicate that here. Instead, let’s look at the most common\nand interesting\
    \ actions, to inform us for the forthcoming examples in\nthis chapter and the\
    \ remainder of the book:\n\n1.  ACTION_AIRPLANE_MODE_CHANGED: The user of the\
    \ device has toggled the\n    airplane mode setting from on to off or vice versa.\n\
    \n2.  ACTION_CAMERA_BUTTON: The camera button (hard button or soft button)\n \
    \   was clicked.\n\n3.  ACTION_DATE_CHANGED: The date has changed, meaning any\
    \ application\n    logic you have written that uses timers, elapsed time, and\
    \ so forth\n    might be affected.\n\n4.  ACTION_HEADSET_PLUG: The user of the\
    \ device has attached or removed\n    headphones to or from the headphone socket.\n\
    \nAs you can see, intent actions cover all kinds of things happening in\nyour\
    \ application and also the entire device environment.\nCaution: Google adds new\
    \ actions to the set available for intents\nwith each new release of Android.\
    \ It also deprecates (and later removes)\nsome older actions it deems no longer\
    \ useful. As you maintain your\napplication over time, you should check to see\
    \ if actions on which your\napplication depends have been deprecated or removed.\n\
    \nUnderstanding Intent Routing\nYou might have thought that component\nnomination,\
    \ mentioned earlier in the chapter, would ordinarily be a\ngreat way to invoke\
    \ any and all activities you desire, whether those of\nyour own writing or others.\
    \ The reality is a little different.\nIf you have an activity’s class that you\
    \ have written and understand\nhow and why it is the best recipient for an intent,\
    \ then it is perfectly\nOK to do so. But when working with activities from other\
    \ applications,\nit is not reliable and at times is unsafe and can result in poor,\n\
    unexpected, or downright incorrect behavior.\nThe programming principle of encapsulation\
    \ is at the core of this\nwarning. Think for a moment about letting other developers\
    \ rely on your\nown classes and their internal implementation. As you mature as\
    \ a\ndeveloper, you will constantly tweak and adjust code and classes, and\nthis\
    \ introduces the very real likelihood that someone’s assumption about\nthe internals\
    \ of a class will wind up wrong, because you have changed\nthe logic. The same\
    \ is true in reverse, and you shouldn’t rely on\nimplementation logic staying\
    \ unchanged (or even staying in existence at\nall) in others’ applications.\n\
    To safely target the application or service of your choice with the\nintent model,\
    \ prefer instead the use of Uris and MIME types. If we can\npeek into the innards\
    \ of other people’s applications, how then do we\ndirect Android to the preferred\
    \ activities or receivers (such as a\nservice) to receive the intent? The answer\
    \ lies in Android’s implicit\nrouting scheme, which passes intents on to all of\
    \ the activities and so\nforth that should receive them, based on a set of eligibility\
    \ rules.\n\nThe rules for the implicit routing scheme are as follows:\n\n1.  The\
    \ activity must indicate its ability to handle the intent, through\n    the appropriate\
    \ manifest file entry (discussed in the next section).\n\n2.  If a MIME type is\
    \ part of the intent context, the activity must\n    support the MIME type.\n\n\
    3.  Every category in the event context must also be supported by the\n    activity.\n\
    \nThese rules\nhelp narrow down the possible set of matching activities that can\n\
    receive your intent to only those that will do a faithful job of acting\non the\
    \ intent in a way suitable for your use.\n\nIncluding Intents in Your Manifest\n\
    Android uses your `AndroidManifest.xml`\nfile as the location to hold intent filters,\
    \ indicating which components\nin your application can be notified and respond\
    \ appropriately to given\nintents. If your component’s manifest entry doesn’t\
    \ list the intent\naction, then it won’t be chosen to receive notification of\
    \ such an\nintent via the implicit routing mechanism. You can think of this as\
    \ the\nopt-in approach to components handling intents, building a list of the\n\
    intents you do wish to consume.\n\nWhen you create a new Android project, Android\
    \ Studio\ncreates your first intent filter as part of the skeleton `AndroidManifest.xml`\n\
    file. You have already seen this in action for all of the example\napplications\
    \ so far in the book. As a refresher, Listing [17-1](#499629_1_En_17_Chapter.xhtml#PC1)\
    \ is the manifest\nfrom your very first application, `MyFirstApp`, in\nChapter\
    \ [2](#499629_1_En_2_Chapter.xhtml). In bold you can see the activity\n`MainActivity`\n\
    and its specified intent file.\n\n```\n\nListing 17-1\nExample intent filters\
    \ from an AndroidManifest.xml file\n```\n\nTwo parts of the intent filter are\
    \ key to its operation. First, we\nspecify the `MainActivity` activity\nis of\
    \ the category `LAUNCHER`, meaning any\nintent that triggers it must also be of\
    \ that category. Second, we also\nspecify the action `android.intent.action.MAIN`,\n\
    which is used to designate that any intent looking for a `MAIN`-capable activity\n\
    could be accepted. You can have more possible actions for your `MainActivity`\
    \ as well\nas more categories, signifying it has more capabilities that you are\n\
    supporting via whatever logic you have written for the activity’s\nclass.\n\n\
    Any other activities for your application would not use the `MAIN/LAUNCHER`\n\
    combination for action and category – in almost all circumstances, you\nonly use\
    \ one such designation in your manifest. While there are many\ncategories and\
    \ actions from which to choose, you will very frequently\nend up using the `DEFAULT`\
    \ category,\nparticularly with any view- or edit-style actions, together with\
    \ a `<data>` element\ndescribing the `mimeType` that an\nactivity can deal with\
    \ for viewing or editing. For example, Listing\n[17-2](#499629_1_En_17_Chapter.xhtml#PC2)\
    \ shows an intent\nfilter for a notes-style application.\n\n```\n\nListing 17-2\n\
    An intent filter for an example secondary activity in your application\n```\n\n\
    The activity defined in the preceding includes an intent filter that\ndescribes\
    \ how it can be launched to deal with an intent from any\napplication asking to\
    \ view content using the Uri for content with a\n`vnd.android.cursor.dir/vnd.google.note\
    \ mimeType`. This intent could come from your own application, such\nas following\
    \ a user action from your launcher activity, or from any\nother application that\
    \ can create a well-formed `Uri` for this activity\nand use that as the payload\
    \ for an intent it fires.\n\nUsing Android’s Verified Links\nAn additional feature\
    \ for dealing\nwith the Uris of intents is the mechanism of auto-verified links,\
    \ which\ndeals specifically with Uris that are also valid URLs (so website\naddresses).\
    \ With a verified link, you can add to your code an explicit\nrule to make the\
    \ link between URLs from a specific website and the\ncompanion application 100%\
    \ verified and the preferred way of dealing\nwith intents that have a matching\
    \ URL. This includes behind-the-scenes\nmechanisms to enable seamless authentication\
    \ if needed and avoid the\ntraditional “website or application” picker dialogs\
    \ that Android\nhistorically used."
