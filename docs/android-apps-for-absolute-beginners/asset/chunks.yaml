- fmt: "# Building with Build Tools\n\nAs mentioned in earlier chapters, `Gradle`\
    \ is the build tool used by `Android Studio` to bring together all of the pieces\
    \ of your Android application and create the finished product. `Gradle` also has\
    \ a wealth of options that could (and in fact do) span entire books. I encourage\
    \ you to start exploring `Gradle` options to expand your powers when it comes\
    \ to building your Android applications. Here are three quick tips to get you\
    \ started and help you find more.\n\n## Update Your `gradle.properties` File\n\
    \nDon’t be afraid to open the `gradle.properties` file for your project and look\
    \ at the settings it presents you. There are a lot of explanatory comments in\
    \ the default file, and you should feel comfortable experimenting. For example,\
    \ you will see an entry that sets the memory for the Java VM that looks like this:\n\
    \n```\norg.gradle.jvmargs=-Xmx2048m\n```\n\nTry changing that value to `Xmx1024m`\
    \ and see how that affects build time – you are effectively halving your JVM’s\
    \ available memory. If you have ample memory, try `Xmx4096m` to give the JVM double\
    \ the default memory, and see if that speeds things up. As you learn more about\
    \ Gradle config, revisit your properties file to apply what you have learned.\n\
    \n## Use the Gradle Command Line\n\nMany of Gradle’s features are neatly integrated\
    \ into `Android Studio` and triggered when you perform a wide array of actions.\
    \ But your project will also have a command-line tool for `Gradle`, named `gradlew`.\
    \ It is in the root directory of your project. If you open a shell or command\
    \ prompt there and run the command-line executable as follows:\n\n```\n./gradlew\n\
    ```\n\nYou’ll see a useful listing of the immediately useful command-line options\
    \ and tools `Gradle` makes available. You can also run:\n\n```\n./gradlew --help\n\
    ```\n\nFor an exhaustive list of all command-line options and tools. One very\
    \ useful option to explore to begin with is the profiling option, which looks\
    \ at what takes the time when building your application. Invoke it and see the\
    \ results as follows in Listing [6-1](#499629_1_En_6_Chapter.xhtml#PC4).\n\n```\n\
    Welcome to Gradle 6.1.1.\nTo run a build, run gradlew  ...\nTo see a list of available\
    \ tasks, run gradlew tasks\nTo see a list of command-line options, run gradlew\
    \ --help\nTo see more detail about a task, run gradlew help --task \nFor troubleshooting,\
    \ visit https://help.gradle.org\nBUILD SUCCESSFUL in 24s\n1 actionable task: 1\
    \ executed\nSee the profiling report at: file:///Users/alleng/AndroidStudioProjects/MyFirstApp/build/reports/profile/profile-2020-09-01-10-08-13.html\n\
    A fine-grained performance profile is available: use the --scan option.\nListing\
    \ 6-1\nInvoking Gradle profiling from the command line\n```\n\n`Gradle` has generated\
    \ an HTML-formatted report and placed it in the file shown in the output. Opening\
    \ that file in your browser of choice will show you `Gradle`’s insights on build\
    \ time for your project, as shown in Figure [6-4](#499629_1_En_6_Chapter.xhtml#Fig4).\n\
    \n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig4_HTML.jpg](images/499629_1_En_6_Chapter/499629_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\n`Gradle` profiling report\n\n## Visit `gradle.org` to Learn More\n\
    \nThere is a wealth of information online about `Gradle`, and the project’s home\
    \ page is a great place to start. Once you get a taste for what it can do, you’ll\
    \ find it becomes one of your go-to tools.\n\n# Managing Your Code with Source\
    \ Control\n\nAnother large topic area that confronts many serious developers is\
    \ how to manage their source code, projects, and associated resources over time.\
    \ Source control is the concept of using a dedicated database that is adept at\
    \ managing the file-based nature of software source – it is also sometimes known\
    \ as version control – and solves two large problems simultaneously. First, as\
    \ your development work grows, you will likely end up with dozens or even hundreds\
    \ of projects, each with a wealth of files and related resources as you saw in\
    \ Chapter [4](#499629_1_En_4_Chapter.xhtml). A source control system makes managing\
    \ these sets of files far simpler and acts as a reliable backup and source of\
    \ truth for your coding efforts. The second benefit from source control is the\
    \ freedom it provides you to experiment, change, and make mistakes with your code\
    \ and revert to earlier versions (usually, a version that was working) if the\
    \ need arises.\n\nOut of the box, `Android Studio` offers direct integration support\
    \ for three different systems: `Git`, `Mercurial`, and `Subversion`. Each is popular\
    \ for some section of the developer community, and if you have a preference, stick\
    \ with it. To enable source control integration with your projects, open the `VCS`\
    \ menu in `Android Studio` and choose the `Enable Version Control Integration`\
    \ option. It will present the dialog shown in Figure [6-5](#499629_1_En_6_Chapter.xhtml#Fig5)\
    \ for you to select your chosen version control option.\n\n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig5_HTML.jpg](images/499629_1_En_6_Chapter/499629_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nEnabling source control\n\nWith source control enabled, you will\
    \ now see many more options available in the `VCS` menu, as well as from the context\
    \ menu in any project view. The first time you attempt to use a feature, such\
    \ as importing a `Git` branch or checking out a project from `Subversion`, you\
    \ will be prompted for the URL and credentials needed to access your chosen system.\
    \ From there, you’ll be able to use a range of the features you see displayed\
    \ in the menu in Figure [6-6](#499629_1_En_6_Chapter.xhtml#Fig6).\n\n![../images/499629_1_En_6_Chapter/499629_1_En_6_Fig6_HTML.jpg](images/499629_1_En_6_Chapter/499629_1_En_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6\n\nSource control features enabled in the `VCS` menu\n\nSource control\
    \ is a huge topic, and as you have already guessed, a large number of dedicated\
    \ books and resources exist for these tools. If you’re new to source control tools,\
    \ I can recommend visiting [`https://git-scm.com/`](https://git-scm.com/), [`www.mercurial-scm.org/`](http://www.mercurial-scm.org/),\
    \ or [`https://subversion.apache.org/`](https://subversion.apache.org/) to get\
    \ started with any of the systems `Android Studio` natively supports."
