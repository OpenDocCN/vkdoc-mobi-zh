- fmt: "#### Developing Your Java-Specific Coding Knowledge\n\nLearning all of Java\
    \ is a huge effort, as I’ve conveyed already. Learning Java for Android is a little\
    \ less daunting, but still covers a tremendous amount of the Java landscape. To\
    \ get you started, here are the key areas to start mastering, with links to some\
    \ of the best freely available resources online. While I will reference the Java\
    \ Programming Wikibook, a free online resource, many other online sources are\
    \ just as good. You can also hugely benefit from Android-specific Java books,\
    \ such as Apress’ *Learn Java for Android Development* (Späth and Friesen, ISBN\
    \ 9781484259429).\n\n#### Interfaces and Implementations\n\nUnderstand how Java\
    \ objects can build and extend others, and provide a template of what a derived\
    \ version should do, with the mechanics of how to do it. See [`http://en.wikibooks.org/wiki/Java_Programming/Interfaces`](http://en.wikibooks.org/wiki/Java_Programming/Interfaces).\n\
    \n#### Threading and Concurrency\n\nParticularly in our multicore CPU age, concurrency\
    \ and threading provide ways to perform numerous streams of work simultaneously,\
    \ so long as care is taken. See [`http://en.wikibooks.org/wiki/Java_Programming/Threads_and_Runnables`](http://en.wikibooks.org/wiki/Java_Programming/Threads_and_Runnables).\n\
    \n#### Garbage Collection\n\nJava was an early adopter of the approach to carefully\
    \ managing resources like memory, which attempted to free the developer from having\
    \ to track and manually dispose of resource allocations – an error-prone task\
    \ to say the least! See the section on automatic memory garbage collection at\
    \ [`https://en.wikibooks.org/wiki/Java_Programming/Java_Overview`](https://en.wikibooks.org/wiki/Java_Programming/Java_Overview).\n\
    \n#### Exception Handling\n\nWhen things do go wrong, providing safe, structured,\
    \ and informative ways to gracefully deal with the problem is the goal. See [`http://en.wikibooks.org/wiki/Java_Programming/Exceptions`](http://en.wikibooks.org/wiki/Java_Programming/Exceptions).\n\
    \n#### File Handling\n\nWhile our `FirstJavaDemo` app has the user entering data\
    \ directly at the console by typing, it is far more common to consume and create\
    \ data using files and the semantics that govern them. See [`http://en.wikibooks.org/wiki/Java_Programming/BasicIO`](http://en.wikibooks.org/wiki/Java_Programming/BasicIO).\n\
    \n#### Generics\n\nJava is notionally a “strongly typed” language, which means\
    \ it provides guardrails and protections to ensure that `Strings`, `integers`,\
    \ and other types never exist with an incompatible data payload and that data\
    \ of one type can’t accidentally be placed in variables of another. This is a\
    \ key protection mechanism, but can create inflexibility in some circumstances.\
    \ Generics provide ways to maintain strong typing, but avoid needless duplication\
    \ and excessive repetition when supporting the same general logic for data of\
    \ different types. See [`http://en.wikibooks.org/wiki/Java_Programming/Generics`](http://en.wikibooks.org/wiki/Java_Programming/Generics).\n\
    \n#### Collections\n\nJust as sets of primitive data types like integers can be\
    \ grouped into arrays, so too can objects be grouped into convenient sets. Collections\
    \ are one way (but not the only way) that Java supports manipulating groups of\
    \ objects as sets. See [`http://en.wikibooks.org/wiki/Java_Programming/Collections`](http://en.wikibooks.org/wiki/Java_Programming/Collections).\n\
    \n## Summary\n\nNo single chapter – or single entire book – could get you a complete\
    \ beginner’s guide to Java, but in this chapter we’ve attempted the next best\
    \ thing. You’re now armed with an understanding of Java the language, Java the\
    \ software product, and what Java means to Android, along with a road map of what\
    \ to learn and resources to help you grow your mastery of Java. I strongly encourage\
    \ anyone new to Java to explore the other resources mentioned in the chapter and\
    \ even more of the vast amount available commercially and for free online, before\
    \ plowing on to the rest of this book. Even a little side reading and practice\
    \ will reap huge rewards for your Android understanding.\n\n# 8. Introducing XML\
    \ for Android Development\n\nThis chapter will tackle two topics. First, we’ll\
    \ take a look at XML from a beginner’s perspective, for those of you who have\
    \ never had to work with XML nor drill into its patterns of use, quirks, strengths,\
    \ and issues. The second part of the chapter will cover the three main areas in\
    \ Android development where you will commonly dip in to read, writing and editing\
    \ XML:\n\n1.  The application manifest, which we have already introduced\n\n2.\
    \  Resource definitions, in particular constants like strings and so on\n\n3.\
    \  Activity layouts, which are a huge topic but one that can be approached in\
    \ a stepwise fashion\n\n## Getting Started with XML\n\nExtensible Markup Language,\
    \ or XML, is a subset of an older standard known as SGML, Standard Generalized\
    \ Markup Language. The goal of XML is to convey data and information about that\
    \ data – known as metadata – in a standardized structure that can be interrogated\
    \ and used without any prior knowledge of what the data means or what rules exist\
    \ for the structure. That is a fairly abstract definition, I know. An alternative\
    \ definition is offered by Wikipedia:\n\n> *Extensible Markup Language (XML) is\
    \ a markup language that defines a set of rules for encoding documents in a format\
    \ that is both human-readable and machine-readable.*\n> \n> —[`https://en.wikipedia.org/wiki/XML`](https://en.wikipedia.org/wiki/XML),\
    \ July 2020\n\nThat’s not much better as far as definitions go. A more pragmatic\
    \ definition might be the following:\n\n> *XML is a markup language that defines\
    \ how to exchange data, and to describe the data being exchanged so that both\
    \ humans and machines can make some sense of the data, and its structure and relationships\
    \ to other data.*\n> \n> —Grant Allen, July 2020\n\nStill not perfect, but getting\
    \ there. Sadly, that comment can be applied to XML as a whole and not just my\
    \ curt description. Perhaps a better way to build your understanding of XML is\
    \ to actually delve into its structure and workings.\n\nSome key points about\
    \ XML. XML is not a programming language in the strict sense… Things written in\
    \ XML don’t “do” anything. XML is a markup language designed to convey meaning\
    \ and structure to data, so that programs and programming languages can do things\
    \ with that data.\n\nWhen you create XML, you are placing text into a document\
    \ with certain aspects governed by XML standards and rules – this is known as\
    \ an XML document. No matter how complicated or convoluted an XML document becomes,\
    \ you can always step back and consider it as just text – text with special meaning\
    \ in places and agreed structures and rules around syntax, but text nonetheless.\n\
    \nXML has no set definition of what predefined components are required in an XML\
    \ document. It does define the rules and syntax for how to define your own components\
    \ in a document, using basic building blocks. The overall goal for XML and its\
    \ rules is to allow a machine/program-independent way of describing and packaging\
    \ data and to have the description and structure self-described in the XML document\
    \ itself or an associated XML schema.\n\nLet’s look at the key XML building blocks."
