- fmt: "# Playing Audio in Android\n\n## Pros and Cons of Immediate Playback\n\nThere\
    \ are pros and cons to trying to immediately playback audio – regardless of its\
    \ source. In brief, as a developer, you need to answer the question: What happens\
    \ in the interval between the user clicking Play (or the equivalent) and the music\
    \ actually being ready and available to play through the device? Do you block\
    \ all activity and wait or let other things continue? This is a deeper topic that\
    \ has a range of nuances, and you can read more on the book website at [`www.beginningandroid.org`](http://www.beginningandroid.org).\n\
    \n### Playing the Music Stream\n\nWith those changes all mastered, our `AudioStreamExample`\
    \ will finally receive the callback to `onPrepared()` so that the music (or voices,\
    \ birdsong, or what have you) will start playing. The logic for `onPrepared` is\
    \ unchanged from the previous example.\n\n## Exploring Other Playback Options\n\
    \nUsing the Media package and `MediaPlayer` objects is not the only option you\
    \ have for working with audio and music under Android. Other options include the\
    \ following:\n\n- **SoundPool**: A lean version of `MediaPlayer`, `SoundPool`\
    \ simplifies the approach to dealing with on-device sound files. It dispenses\
    \ with any streaming or service-provided audio and leverages file/resource access\
    \ using a `FileDescriptor` to access audio files packaged with the application’s\
    \ `.apk` file via simple methods including `.load()` and `.getAssets().openFd()`.\n\
    \n- **AsyncPlayer**: `MediaPlayer` provides some support for asynchronous preparation\
    \ of audio playback, but much of the mechanics for actual playback as you’ve seen\
    \ in the `AudioPlayExample` application are synchronous. `AsyncPlayer` uses a\
    \ completely asynchronous two-step approach. First, an `AsyncPlayer` object is\
    \ instantiated and, then its `.play()` method is invoked with the URI of the audio\
    \ to play. Sometime thereafter, the audio will begin to play, but the time involved\
    \ is nondeterministic given the asynchronous nature of this approach.\n\n- **JetPlayer**:\
    \ At the other end of the complexity spectrum is `JetPlayer`. With `JetPlayer`,\
    \ you use an external tool bundled with the Android SDK and APIs to package and\
    \ manage audio for your application and present access to it via the MIDI standard.\
    \ From there, your Android application then uses the audio and has access to some\
    \ quite sophisticated manipulation options that are beyond the scope of this book.\n\
    \n- **ExoPlayer**: The newest, and increasingly popular, approach to playback.\
    \ `ExoPlayer` is an open source offering from Google, released outside the normal\
    \ Android mechanisms, and offers experimental or novel features like SmoothStreaming\
    \ adaptive playback. It is specifically designed to be extended and modified by\
    \ developers like you. See [`https://github.com/google/ExoPlayer`](https://github.com/google/ExoPlayer)\
    \ for more details.\n\nThere is a wealth of documentation on each of these alternatives\
    \ for audio available on the `android.com` website.\n\n## Recording Audio\n\n\
    With the first fundamentals of audio playback covered, it is time to turn our\
    \ attention to recording audio and sharing those sounds. Just as playback has\
    \ many alternative approaches, recording audio also has a diverse set of possibilities\
    \ in Android.\n\n### Recording Audio with MediaRecorder\n\nThe complement to the\
    \ `MediaPlayer` introduced at the beginning of the chapter, `MediaRecorder` provides\
    \ a broad set of tools for recording sound in a range of circumstances. The best\
    \ way to learn what it has to offer is to dive in with an example, and we will\
    \ do exactly that by extending our earlier example to incorporate recording features\
    \ in the `Ch13/AudioRecordExample` code. In Figure [13-4](#499629_1_En_13_Chapter.xhtml#Fig4),\
    \ you see the extended – though still simple – user interface that adds recording\
    \ buttons to the existing playback example you’ve already seen.\n\n![../images/499629_1_En_13_Chapter/499629_1_En_13_Fig4_HTML.jpg](images/499629_1_En_13_Chapter/499629_1_En_13_Fig4_HTML.jpg)\n\
    \n**Figure 13-4** Recording buttons added to the UI for `AudioRecordExample`\n\
    \nThe `AudioRecordExample` layout XML is shown in Listing [13-4](#499629_1_En_13_Chapter.xhtml#PC5).\
    \ The most notable point is to observe that per the previous pattern, all of the\
    \ buttons will trigger the `onClick()` callback method, which means recording\
    \ and playback (and the stopping of both) will be handled in the complementary\
    \ Java code.\n\n```\nListing 13-4\nAudioRecordExample layout XML\n```\n\nThe `AudioRecordExample`\
    \ layout has self-explanatory buttons for starting and stopping both record and\
    \ playback. One significant difference from our earlier examples sits behind the\
    \ scenes. In order to access the recording features of any Android device, your\
    \ application will need permission. It will also need permission to write what\
    \ it records to storage (assuming you want to store what you record). We will\
    \ cover permissions and security in detail in Chapter [19](#499629_1_En_19_Chapter.xhtml),\
    \ but for now the following two permission declarations should be added to the\
    \ `AndroidManifest.xml` file:\n\nOne extra permission step will be required at\
    \ runtime, with the user prompted to allow writing to external storage. With the\
    \ relevant permissions set, your code can now access recordings and store them\
    \ away. Listing [13-5](#499629_1_En_13_Chapter.xhtml#PC7) shows the Java logic\
    \ for `AudioRecordExample`.\n\n```java\npackage org.beginningandroid.audiorecordexample;\n\
    import androidx.appcompat.app.AppCompatActivity;\nimport android.media.AudioManager;\n\
    import android.media.MediaPlayer;\nimport android.media.MediaRecorder;\nimport\
    \ android.os.Bundle;\nimport android.view.View;\nimport java.io.File;\npublic\
    \ class MainActivity extends AppCompatActivity {\n    private MediaRecorder mr;\n\
    \    private MediaPlayer mp;\n    private String myRecording=\"myAudioRecording\"\
    ;\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n \
    \       super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \    }\n    public void onClick(View view) {\n        switch(view.getId()) {\n\
    \            case R.id.startRecordingButton:\n                doStartRecording();\n\
    \                break;\n            case R.id.stopRecordingButton:\n        \
    \        doStopRecording();\n                break;\n            case R.id.startButton:\n\
    \                doPlayAudio();\n                break;\n            case R.id.stopButton:\n\
    \                doStopAudio();\n                break;\n        }\n    }\n  \
    \  private void doStartRecording() {\n        File recFile = new File(myRecording);\n\
    \        if(recFile.exists()) {\n            try {\n                recFile.delete();\n\
    \            } catch (Exception e) {\n                // This code can be extended\
    \ to deal with errors in recording here.\n            }\n        }\n        mr\
    \ = new MediaRecorder();\n        mr.setAudioSource(MediaRecorder.AudioSource.MIC);\n\
    \        mr.setOutputFormat(MediaRecorder.OutputFormat.DEFAULT);\n        mr.setAudioEncoder(MediaRecorder.AudioEncoder.DEFAULT);\n\
    \        mr.setOutputFile(myRecording);\n        try {\n            mr.prepare();\n\
    \        } catch (Exception e) {\n            // do exception handling here\n\
    \        }\n        mr.start();\n    }\n    private void doStopRecording() {\n\
    \        if (mr != null) {\n            mr.stop();\n        }\n    }\n    private\
    \ void doPlayAudio() {\n        mp = new MediaPlayer();\n        try {\n     \
    \       mp.setDataSource(myRecording);\n        } catch (Exception e) {\n    \
    \        // do exception handling here\n        }\n        mp.setAudioStreamType(AudioManager.STREAM_MUSIC);\n\
    \        try {\n            mp.prepare();\n        } catch (Exception e) {\n \
    \           // This code can be extended to deal with errors in playback here.\n\
    \        }\n        mp.start();\n    }\n    private void doStopAudio() {\n   \
    \     if (mp != null) {\n            mp.stop();\n        }\n    }\n    @Override\n\
    \    protected void onDestroy() {\n        super.onDestroy();\n        if(mr !=\
    \ null) {\n            mr.release();\n        }\n        if(mp != null) {\n  \
    \          mp.release();\n        }\n    }\n}\n```\n\n**Listing 13-5** The `AudioRecordExample`\
    \ code"
