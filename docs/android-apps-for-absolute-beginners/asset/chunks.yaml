    Now that you have many ways of launching the `AVD Manager`, go ahead and launch
    it from the Android Studio `Tools` menu, as we will create a second `AVD` for
    future exercises. You can revisit the screen-by-screen how-to instructions from
    Chapter [2](#499629_1_En_2_Chapter.xhtml) if you need help, but here are our goals
    for this second `AVD`:


    - **Category – Tablet**: We want to create a tablet-sized `AVD`, which will help
    with testing larger devices with the examples in the book.

    - **Name and type – Pixel C Tablet API 30**: This is one of the best all-purpose
    tablets and one of the most recently launched with a no-frills Android installation
    directly from Google and is an excellent baseline for testing tablet devices.

    - **System image – R (API level 30)**: This is the latest SDK and brings with
    it the latest capabilities Android offers for tablet form factor devices.


    **Note**: You might see that the `R` system image is listed with a download link
    next to it, in blue. This indicates the necessary Intel x86 system image is not
    yet installed on your machine. You will need to click the download link and proceed
    to install the system image in order for this `AVD` to successfully launch and
    work.


    - **AVD name – Pixel C Tablet API 30**: You can use any name you like, but this
    example name adds some helpful clues when we see the `AVD` in `AVD Manager` or
    as one of the running emulator processes when actively running, testing, and debugging
    your code.


    When you’re done, you should see (at least) two `AVD`s in the `Your Virtual Devices`
    window, as shown in Figure [5-3](#499629_1_En_5_Chapter.xhtml#Fig3).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig3_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig3_HTML.jpg)


    Figure 5-3 – Multiple AVDs configured in AVD Manager


    The purpose of creating a second (or third or fourth) `AVD` is not just to show
    another screenshot of the `AVD Manager`. Having two or more `AVD`s is required
    in order to use Android Studio’s ability to run the same code on multiple devices
    or `AVD`s simultaneously.


    There are many reasons you will want to exercise this ability to test simultaneously
    on different `AVD`s and devices in your Android development work. In earlier chapters,
    we mentioned the diversity of devices sold and in use across the world, the fragmented
    nature of which Android releases and SDK versions were supported, and other factors
    that meant your application could be running in a multitude of subtly different
    settings. First, running your application side by side across several devices
    helps you spot some of the quirks and differences your users might see in the
    real world. A second major benefit of this capability is to see how your application
    might look on a small screen that shows one activity at a time vs. larger screens
    – such as tablets – where your activity might scale to a different size or appear
    as part of a multi-activity display using fragments (which we will introduce in
    Chapter [11](#499629_1_En_11_Chapter.xhtml)). A third reason to use multidevice
    or `AVD` testing is to view how Android scales or interpolates images of a particular
    resolution on screens of different display densities and resolutions.


    You should go ahead and test running your `MyFirstApp` application on multiple
    `AVD`s right now. You can trigger this from the `Tools` ➤ `Select Device` menu
    option or the equivalent toolbar dropdown for device selection shown in Figure
    [5-4](#499629_1_En_5_Chapter.xhtml#Fig4).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig4_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig4_HTML.jpg)


    Figure 5-4 – The device selection toolbar dropdown


    Choose the `Run on Multiple Devices` option, and you will be prompted with the
    dialog box titled `Select Deployment Targets`. Choose two or more devices or `AVD`s,
    for instance, the `Pixel C Tablet` and `Pixel 2` `AVD`s we’ve created so far in
    the book, as shown in Figure [5-5](#499629_1_En_5_Chapter.xhtml#Fig5).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig5_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig5_HTML.jpg)


    Figure 5-5 – Selecting multiple targets to launch your application in Android
    Studio


    Launching multiple `AVD`s simultaneously will take some time, but after a little
    patience, you should see your `AVD`s start and the `MyFirstApp` application deployed
    and running on all of them, as shown in Figure [5-6](#499629_1_En_5_Chapter.xhtml#Fig6).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig6_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig6_HTML.jpg)


    Figure 5-6 – App deployed on multiple AVDs simultaneously


    # Running Your Code on a Real Device


    Virtual devices are a boon for any developer, but there will be times when seeing
    your code in action on a real device is the order of the day. Google has made
    enormous strides in testing and running your applications on real devices in recent
    releases of Android Studio. Historically, there was a long chain of command-line
    steps needed to deploy an application to a real handset, and while you can still
    take that path today, Android Studio makes it easy to detect and use an Android
    device connected via a USB cable to your developer machine.


    In order to use an Android phone to test your applications as you develop them,
    you will need to enable developer options on your handset. Google has always had
    a trick to enable this, which is to open `Settings` on your phone and scroll to
    the `About Phone` option. The last option on the `About Phone` screen is the build
    number. Tap the number shown seven times (yes, seven times), and you’ll see a
    countdown appear letting you know you have only a few taps left before developer
    mode is enabled.


    Once you’ve tapped the build number enough, you’ll see an on-screen notice that
    developer options are now enabled, and a new menu option will appear under `Settings`
    that reads `Developer options`. By default, this will have a suboption named `USB
    debugging` enabled. Double-check this is the case on your handset, and turn it
    on if it is not already enabled.


    With developer mode enabled on your phone, connect it via USB cable to your developer
    computer. Your phone should automatically be detected, and Android Studio will
    then recognize it as a potential target for running your Android applications.


    To test this out, choose `Run` ➤ `Select Device` from the menus, or open the dropdown
    on the toolbar for `AVD`s/devices, as shown in Figure [5-7](#499629_1_En_5_Chapter.xhtml#Fig7).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig7_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig7_HTML.jpg)


    Figure 5-7 – Choosing a connected developer-mode Android device from Android Studio


    Choose your connected device, which in my case is the `Nexus 5` handset. Wait
    for the few seconds it will take for Android Studio to build, package, and deploy
    the application to the connected device, and then you should see your application
    load and run on your phone, as shown in Figure [5-8](#499629_1_En_5_Chapter.xhtml#Fig8).


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig8_HTML.jpg](images/499629_1_En_5_Chapter/499629_1_En_5_Fig8_HTML.jpg)


    Figure 5-8 – Running MyFirstApp on a connected Android handset'
