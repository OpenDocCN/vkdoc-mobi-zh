- fmt: '# 处理后的 Markdown 文档


    If you look at the original version of `ButtonExample`, you will note that `setContentView()`
    was called there as well. So what has changed? In `ButtonAgain`, we are passing
    a reference to the XML-based view we’ve defined, based on the AAPT utility built
    into Android Studio having parsed your XML and generated the `R` Java class for
    you. You benefit from the `R` class in being able to make simple code references
    to the XML layout and parts within it. It does not matter how many layouts you
    have nor how complex they are, AAPT will package them all into an omnibus Java
    class and make them available in the `R.layout` namespace. You reference any layout
    using the calling convention `R.layout.<your_layout_file_name_without_the_XML_extention>`.
    To find widgets within a layout returned by `setContentView()`, you invoke the
    `findViewById()` method and pass it the numeric reference for your widget. Read
    that sentence again, and you will spot the “gotcha.” What do I mean by numeric
    reference? There’s been no XML visible that claims to be a numeric identifier
    or reference for widgets. This is a mystery easily solved.


    At packaging time, AAPT will identify each widget you have in your layout(s) and
    assign them an ID number and include it as member data in the `R.java` file. Check
    for yourself by opening the `R.java` file any time you like. But don’t bother
    trying to memorize things this way. You can have Android resolve the ID number
    for any widget you want to reference using the `R.id.<widget_android:id_value>`
    parameter. You can use this to resolve the ID for any widget subclassed from the
    base `View` class (which is pretty much everything).


    With the mechanics out of the way, you should be able to see the tremendous power
    you get from a combination of AAPT packaging things neatly into `R.java` based
    on your layouts and the `setContentView()` and `findViewById()` methods. For instance,
    different activities can be passed different instances of a `View`, and more intriguingly,
    you could change the `View` based on some program logic, enabling you to, for
    instance, use a different layout when you detect a different style of device.


    ## Revisiting MyFirstApp via `ButtonAgain`


    In the original `ButtonExample` example, the button’s display would show the number
    of times the button had been pressed. The counter began at 1 for when the button
    was loaded via `onCreate()`. The majority of the existing logic, such as the code
    for counting clicks, still works in our modified `ButtonAgain` version. The main
    difference from the `ButtonExample` code is shown in Listing [10-6](#499629_1_En_10_Chapter.xhtml#PC7),
    where we substitute the previous Java calls in our activity’s `onCreate()` method
    with the definition from the `ButtonAgain` app XML `ConstraintLayout` layout.


    ```

    package org.beginningandroid.buttonagain;

    import androidx.appcompat.app.AppCompatActivity;

    import android.os.Bundle;

    import android.app.Activity;

    import android.view.View;

    import android.widget.Button;

    public class MainActivity extends AppCompatActivity implements View.OnClickListener{

    Button myButton;

    Integer myInt;

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    myButton=(Button)findViewById(R.id.button);

    myButton.setOnClickListener(this);

    myInt = 0;

    updateClickCounter();

    }

    public void onClick(View view) {

    updateClickCounter();

    }

    private void updateClickCounter() {

    myInt++;

    myButton.setText(myInt.toString());

    }

    }

    Listing 10-6

    ButtonAgain Java code, linking seamlessly to the layout XML

    ```


    You can now see the changes clearly, by reviewing the `onCreate()` method. First,
    we use `setContentView()` to the automatically generated `R` Java class for our
    specified XML layout. Then we use the `findViewById()` method, asking it to find
    the widget that has the `android:id` value of “`button`”. We are returned the
    reference we need in programmatically driving the button’s behavior, including
    changing its label to reflect our calculated click counter value.


    Putting all of the code and XML together results in a `ButtonAgain` application
    that looks and acts surprisingly similar to the `ButtonExample` application, as
    shown in Figure [10-9](#499629_1_En_10_Chapter.xhtml#Fig9).


    ![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig9_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig9_HTML.jpg)


    Figure 10-9

    The ButtonAgain application, combining Java logic and XML layout perfectly


    ## Summary


    With a whirlwind tour of layouts and some of their features complete, you should
    now be imagining where you might start using some of the containers and layout
    styles in this chapter. You can also play the game of “guess what layout style
    your favorite app uses.” This isn’t the end of our layout journey, and we will
    revisit more concepts throughout the remainder of the book.


    ## Footnotes


    11. Understanding Activities


    Your introduction to activities up until now has been focused primarily on using
    them as a vessel in which to learn about UI widgets and layouts, in the knowledge
    that they are computationally “cheap,” the fundamental building block of Android
    UIs, and designed so that you can make and use as many as you like in your applications
    in full knowledge that Android the operating system will happily reclaim resources
    and keep your activities manageable. That’s all well to say in theory, but what
    about some practice? In this chapter, we’ll delve into “how” Android manages activities
    through the activity lifecycle, experiment with the various phases of activity
    life, and then expand your baseline for constructing compelling user interfaces
    by introducing the activity’s partner in crime, fragments. You can think of fragments
    as the compositing technique used to decide when and how to leverage different
    combinations of activities and activity components for larger screens, or screens
    with extremes of dimensions.


    ### Delving into the Android Activity Lifecycle


    All of the examples in the book so far have used one activity, even though you’ve
    read multiple times now that your application can have as many as you like. Regardless
    of how many activities you have, each one’s use is governed by a lifecycle, wherein
    activities are selected to run; are created, used, paused, and/or resumed; and
    are ultimately stopped and disposed of. With a plain English description of the
    stages of the lifecycle helping you appreciate what’s going on, let’s look at
    the actual technical aspects of lifecycle states and the callback methods Android
    uses to trigger state transitions. Figure [11-1](#499629_1_En_11_Chapter.xhtml#Fig1)
    shows the big picture of these lifecycle states and accompanying callback methods.


    ![../images/499629_1_En_11_Chapter/499629_1_En_11_Fig1_HTML.jpg](images/499629_1_En_11_Chapter/499629_1_En_11_Fig1_HTML.jpg)


    Figure 11-1

    The Android activity lifecycle with callback transition methods


    An application typically exists in one of four main states:


    1. Launched: The initial state of an application once some action – usually, a
    user triggering it – has instructed the Android operating system to run said application.

    2. Running: The first moment (and ongoing state) at which a user sees your application
    and can interact with it. Typically this is after a range of preparatory steps
    have been conducted after launch.

    3. Killed: The state an app moves to after the Android operating system is signaled
    with the notification that the application is no longer needed, either because
    a user closed it or some resource-induced reaping has occurred.'
