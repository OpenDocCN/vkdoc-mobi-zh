    you focus on exactly what we have discussed in the chapter.


    **Note**


    To see this example work in practice, you will need to have used your AVD or device
    to create a few contacts and preserve the state of the AVD so that they are not
    lost when restarting the AVD. In this way, there will be contacts to actually
    display when the intent fires!


    Running the `IntentExample` project will result in the `IntentExample` activity
    showing as in Figure 17-1.


    ![../images/499629_1_En_17_Chapter/499629_1_En_17_Fig1_HTML.jpg](images/499629_1_En_17_Chapter/499629_1_En_17_Fig1_HTML.jpg)


    **Figure 17-1** The main `IntentExample` activity showing after launch


    The reason you see this activity first is because the automatic project setup
    from Android Studio (or any other IDE that you are using) has added it with the
    necessary attributes and data value of the `LAUNCHER` category in your manifest
    file.


    Enter a number for a contact in the `EditText` field, and click the View Contact
    button, and intents and receivers will do their magic. Your contact `Uri` is bundled
    up into your intent, and the call to `startActivity()` sends Android off to sift
    through all the activities from all the applications on the device, to find the
    most appropriate activity to handle the `ACTION_VIEW` action for your intent.
    You can see the result in Figure 17-2.


    ![../images/499629_1_En_17_Chapter/499629_1_En_17_Fig2_HTML.jpg](images/499629_1_En_17_Chapter/499629_1_En_17_Fig2_HTML.jpg)


    **Figure 17-2** The contact activity selected to satisfy our intent


    What you see in the screen shown in Figure 17-2 is the current Android-native
    contact view activity, rather than anything I have coded in the `IntentExample`
    project. You would consider this a safe invocation of an activity from outside
    your application as we took the right steps to provide a `Uri`, and we can safely
    expect Android itself to find the right activity to fulfill our intent. There
    was no brute-force attempt to demand a specific activity using the component-naming
    method.


    ## Introducing Receivers


    Throughout this chapter, we have explored how to use intents to create and activate
    multiple activities within your application, with the goal of handling a broad
    variety of actions in your application in response to your user’s interaction
    and desire. But not every response to the user’s wish, or the intent triggered,
    needs to be handled in the scope of (yet another) activity. There are a number
    of real-world examples of satisfying an intent where you really do not need all
    of the features and sophistication of an activity, lightweight as they are. Some
    examples include data manipulation, performing calculations, and so forth where
    the calculation or result can be determined without the involvement of any UI
    or wanting to direct the intent at an Android service rather than any end user–facing
    application. For instance, you may want to build a music sharing service that
    sends all music to a cloud storage provider for backup, without any user interaction.
    There are also more advanced circumstances where you won’t know if a full-blown
    UI activity is required until runtime, which means you need to plan and design
    for activity-driven and “activity-less” approaches simultaneously.


    ### Using Receivers When No UI Is Needed


    To deal with these “activity-less” situations, Android provides the `BroadcastReceiver`
    interface and the concept of receivers. You’re now familiar with the lightweight
    nature of activity-based UI screens for rapidly dealing with user interactions,
    and receivers are a complement to this that provide lightweight objects that are
    created to receive and process a broadcast intent and can then be discarded. The
    Android documentation shows you that there is only one method in the definition
    for a `BroadcastReceiver`, called named `onReceive()`. The `onReceive()` method
    can be thought of as the “Get to it!” method for your receiver. It is up to you
    to implement any desired logic in a receiver and ensure it works with the associated
    intent in the way(s) you have in mind.


    Implementing `BroadcastReceivers` starts in the same way as activities, with a
    declaration in your `AndroidManifest.xml` file. Use the element name `<receiver>`,
    with an `android:name` attribute of the class that implements `BroadcastReceiver`,
    for example:


    ```

    <receiver android:name=".MyReceiver" />

    ```


    Any receiver you implement is ephemeral, existing only for the time it takes to
    execute the logic you create to implement its `onReceive()` method, following
    which it is then discarded for garbage collection. There are restrictions to receiver
    behavior, some expected and some a surprise. As you would expect from an approach
    designed for when UIs are needed, you cannot invoke any UI elements in your receiver
    logic. Less expected, but still important, is the restriction that you cannot
    issue any callbacks. These restrictions are relaxed a little for receivers implemented
    on a service or an activity (an allowed combination), where in these cases the
    receiver lives for the lifetime of the related object. You cannot create receivers
    via the manifest for services or activities. You can dynamically generate receivers
    for these circumstances using `registerReceiver()` within `onResume()` to flag
    that your activity is able to receive intents of particular actions/categories/mime-type
    combinations. If you use this approach, you must also perform housecleaning by
    calling `unregisterReceiver()` during the `onPause()` callback.


    ### Working with Receiver Limitations


    There is one additional limitation of receivers you should know about, in addition
    to the ones noted in the previous section. The mechanics of intents and broadcast
    receivers described so far might lead you to think you can use both in combination
    as a general approach to messaging for you application. The “spanner in the works"
    to this idea is the activity lifecycle. In particular, when activities are paused,
    they will not receive intents. The inability to receive intents when paused means
    you open up the problem of missed messages (intent broadcasts), and you will need
    to avoid receivers bound to activities, instead preferring declarations via the
    `AndroidManifest.xml`. You will also need to think about “re-messaging” and retry
    logic to be able to recover from any missed messages or look to use a more sophisticated
    third-party message bus system or similar approach.


    ### Summary


    In this chapter, I have introduced all of the mechanisms you need to expand your
    applications from single-activity programs to the realm of activities galore!
    You have a good foundation in the intent and broadcast receiver mechanics of Android
    and should be able to expand your use of activities in the applications you plan
    to write.


    ## 18. Introducing Android Services'
