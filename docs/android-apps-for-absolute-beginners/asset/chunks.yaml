    *致全世界所有有志于成为新 Android 开发者的人们，愿你们在学习构建新奇而精彩的应用程序时，充满乐趣！*


    ## 引言


    一本面向 Android 开发初学者的书，应提供足够的主题内容来激发想象力，并为未来的学习和实践奠定基础。关键在于，确保内容不会让读者——也就是你——感到负担过重，或不知从何入手。


    在本书中，我力求在为你打下启动所需核心概念与技术的坚实基础与不堆砌所有可能最终对你有用的主题之间取得平衡。后者将导致数千页乃至更多的内容，最终适得其反。


    你将基于本书 20 章涵盖的主题，看到并创建多种多样的应用程序。我还提供了一系列指引，指向 Apress、Google 及其他网站上更多超越初学者范畴的在线内容。本书只是一个起点，你接下来走向何方完全取决于你自己！


    ## 致谢


    在全球疫情期间撰写一本书是一种奇特的经历，这只有在 Apress 全体同仁和技术审校者的帮助下才得以实现。我要感谢 Steve Anglin、Val Okafor、Mark
    Powers、Matthew Moodie 以及 Apress 所有其他让本书成为现实的人。


    我还要感谢 Google，让 Android 持续成为一个有趣且充满活力的平台，供人们学习开发应用程序。


    ## 关于作者


    ## 关于技术审校者


    # 第一部分：获取 Android，开始起步


    # 第一章：Android 介绍


    欢迎踏上你的 Android 开发者之旅。或许你已经拥有并使用 Android 手机、平板电脑或其他设备。你将加入一个庞大的群体——全球每天有超过十亿台基于
    Android 操作系统的设备被使用。即使你认为自己并未使用 Android，你可能会惊讶地发现，它已渗透到种类繁多的设备和产品中，其中许多你或许用过，却未意识到
    Android 的强大功能在为你提供帮助。


    如今，Android 驱动的设备种类惊人，远超手机和平板电脑，包括智能手表、健身设备、车载娱乐与导航系统、游戏主机、玩具、厨房电器、花园浇水系统、管道与供暖控制系统，甚至烧烤架！没错，烧烤架！Android
    在设备上的这种扩展势头丝毫未见放缓，但最普遍、最可能发现 Android 的地方仍然是手机和平板电脑。作为一名初出茅庐的 Android 开发者，这意味着你将学习许多适用于此处提及的所有（或至少是大部分）设备类型的知识，但你初期的最佳焦点很可能应放在学习为
    Android 手机和平板电脑构建应用程序上。


    ## 使用 Android：最佳之处


    移动和智能手机开发是过去十几年乃至更长时间里最激动人心的技术故事之一。你个人或许并未经历过每一次曲折，但你很可能接触过智能手机近几个时代中一个或多个时代的设备，并且你很可能听到过诺基亚、苹果、微软、Google
    和 Android 这些名字以各种组合被提及。


    如今，Android 为你呈现了过去 10 年间这些公司与平台之间伟大技术战役的累累硕果，让你得以乘风破浪，提供出色的工具、能力与帮助，助你踏上 Android
    应用开发之路。在本书撰写之际，这或许正是 Android 最引人入胜的魅力所在。它在所有智能手机与移动技术领域（与苹果的 iOS 齐头并进）并驾齐驱，位居前沿。选择
    Android，你便能立即获得它带来的诸多优势，包括：


    1.  开发者工具与平台：本书将涵盖其中许多内容，仅举几例，如`Android Studio`、`Android SDK`、`Google Play 服务`以及`Google
    Play`在线商店。


    2.  庞大的现有市场：我说有超过十亿用户正等待你的应用程序，并非玩笑，而且未来还有更多潜在用户。如图 1-1 所示，Android 在全球市场的渗透率令人惊叹。


    3.  志同道合的全球开发者社区：你在追求 Android 应用开发梦想的道路上并不孤单。有数万、数十万乃至数百万其他开发者拥有可以分享的经验。


    4.  坚如磐石的技术基础：Android 最初采用 Java 编程语言作为构建应用程序的主要技术。如今，它也支持`Kotlin`和`C++`。本书中的示例与技术探讨将坚持使用
    Java，因为它是现存使用最广泛、最受尊敬且最为成熟的开发技术之一——绝大多数 Android 应用程序都是用 Java 构建的。


    ![../images/499629_1_En_1_Chapter/499629_1_En_1_Fig1_HTML.jpg](img/499629_1_En_1_Fig1_HTML.jpg)


    **图 1-1** Android 在智能手机用户中的全球市场份额


    我还可以继续列举更多例子，来说明 Android 开发世界的广度与深度及其优势，但不如让本书的其余部分来展示更多内容。

