- fmt: '# Java, Java, Everywhere


    That catchy heading is one I mean in two ways – `Java` was meant to be a write-once,
    run-anywhere language. To quite a surprising degree, it has succeeded in that
    goal despite a lot of doubt, resistance, and even legal impediments. `Java` is
    also everywhere in the sense that it is the name of the programming language,
    but also often the shorthand name given to the software used to make that run-anywhere
    promise come true. The Java Virtual Machine (or `JVM`), and the way it is packaged
    for deployment on computers, is also often just referred to as `Java`. And as
    if that wasn’t ample opportunity for confusion, once you become immersed in `Java`,
    you’ll find yourself and other practitioners also referring to the core libraries
    that provide essential functionality as `Java`.


    Naming complications are one issue you will adapt to as a `Java` developer, but
    `Java` has also had a torrid history when it comes to how that “run-anywhere”
    ability was actually delivered. `JVM`s are complemented by `Java` distributions
    as either a runtime known as Java Runtime Environment – `JRE` – or full developer
    tooling known as Java Development Kit, or `JDK`. How versions have been and are
    handled has been one of the most twisted tales in software, such that it is not
    uncommon to find systems trying to support five parallel major versions of `Java`
    at the same time – `Java 6`, `Java 8`, `Java 9`, `Java 11`, and whatever `Java`
    flavor was most recently released.


    You are saved from some of the versioning headaches, thanks to Google’s actions,
    where `Android Studio` took the plunge in its version `2.3` release to implicitly
    bundle a `JDK` and to fully manage this for you, so you never need to roll your
    own again. However, it can sometimes be useful to test out code outside of Android
    and also to learn more about `Java` in non-Android applications. Later in this
    chapter, we’ll demonstrate how to do that if you are not already familiar with
    the approach and also use that as part of your springboard to learn `Java` – the
    language – if you are an absolute beginner in the space.


    ## Java Security


    This topic isn’t complete without discussing security. Whether it is as a stand-alone
    install or part of `Android Studio`, `Java` and its runtimes and `JVM`s have a
    very long, very troubling history of security issues. I won’t delve into the thousands
    of vulnerabilities, bugs, and exploits that have been found – and fixed! – over
    the last two decades, but I will say this. Always patch your `Java` installs,
    including always keeping `Android Studio` up to date. Always!


    To learn more about historic `Java` vulnerabilities that have affected Android,
    feel free to read more at [`www.beginningandroid.org`](http://www.beginningandroid.org).


    ## Android’s Java Time Warp


    When first released, Google chose the then-current version of `Java` as the basis
    for Android, `Java` version `6` – or `Java 1.6` as it was known at the time. As
    future versions of Android were released, `Java` releases were comparatively slow-moving,
    and there was significant upside in keeping Android compatible with `Java 6`.
    Over time, release patterns changed, particularly with `Java`, which, after slow
    releases for `Java 7` and `Java 8`, picked up speed. We are now at `Java 15` at
    the time of writing this book, but for a variety of technical and nontechnical
    reasons, `Java` compatibility got “stuck” in Android with `Java 7` and partial
    support for `Java 8`. If you are learning `Java` for the purposes of writing Android
    applications, keep this in mind!


    Concepts and features from `Java 9` and beyond are simply not available for use
    when developing for Android. This means things such as modules introduced in `Java
    9`, data class sharing introduced in `Java 10`, or the enhanced safety and utility
    of `switch` statements from `Java 12` are not at your disposal. In practice, this
    doesn’t present a huge impediment, but can take some time adjusting to if you
    are experienced with modern `Java` and have gotten used to the latest features
    it offers.


    ## Using a JDK Installation for Learning Java


    Thanks to `Android Studio` bundling the `JDK` with its installation, you have
    a ready-made “pure Java” environment to also use, on top of the great `Android
    Studio IDE` experience. To use the `JDK` on its own, you can look for the directory
    on disk where `Android Studio` places the `JDK`. You can find this directly from
    `Android Studio` itself, with any project open. Choose the `File` ➤ `Other Settings`
    ➤ `Default Project Structure` menu. You will see a dialog as shown in Figure [7-1](#499629_1_En_7_Chapter.xhtml#Fig1),
    showing the `JDK` location.


    ![../images/499629_1_En_7_Chapter/499629_1_En_7_Fig1_HTML.jpg](images/499629_1_En_7_Chapter/499629_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    `Android Studio` showing the location of the `JDK`


    To summarize for each supported operating system for `Android Studio`:


    *   On macOS/OSX: The `JDK` is found at `/Applications/Android Studio.app/Contents/jre/jdk/Contents/Home`.


    *   On Linux: The `JDK` location can vary depending on where you instruct the
    `Android Studio` installer to place the IDE, but it is found in the `./android-studio/jre`
    folder under that location.


    *   On Windows: The `JDK` location can vary depending on where you instruct the
    `Android Studio` installer to place the IDE, but by default it is in `C:\Android\Android
    Studio\jre\bin`.


    For the examples in this chapter that are pure (non-Android) `Java`, you can use
    a command prompt or shell to navigate to the directory via the `cd` command. You
    can also test to see if this directory is included in the `PATH` environment variable
    on your computer – which means your operating system will know where to find the
    `JDK`’s key tools regardless of what directory you are working from. For example,
    the `which javac` command on macOS and Linux will return a path to the first installation
    of the `javac` binary, which is the Java compiler, if it is found in the directories
    specified in `PATH`. For instance, on my `MacBook Air`, I see the following:


    ```

    $ which javac

    /usr/bin/javac

    ```


    What could be easier? Well, you might recall, in the prior heading about Java
    being everywhere, that it is common to have multiple versions of `Java` installed
    on the same machine and that those versions might be the full `JDK`, providing
    developer tools for `Java`, or just the `JRE`, which provides the runtime `JVM`
    and some supporting utilities, but not developer tools like the compiler.


    If you want to be absolutely certain that you are using the compiler (`javac`
    binary) and `JVM` (`java` binary) that are bundled with `Android Studio`, use
    the full path to those programs when calling them. For instance, to be sure I’m
    using `javac` from `Android Studio` in the following example, I would invoke it
    as


    ```

    "/Applications/Android Studio.app/Contents/jre/jdk/Contents/Home/bin/javac" somejavafile.java

    ```


