    SQLite 支持常规的 SQL 命令，如 `SELECT`、`INSERT`、`UPDATE` 和 `DELETE`，但根据版本的不同，可能不支持后期 SQL
    演进的一些关键特性。这包括：


    1.  只支持 ANSI 外连接语法的子集

    2.  极有限的 ALTER TABLE 支持，只允许重命名和添加列，但不能删除列或修改数据类型

    3.  支持行级触发器，但不支持语句级触发器

    4.  视图是只读的

    5.  不支持窗口函数和公共表表达式，即使这些功能已在 SQLite 3.25 版本中添加——只有支持 Android SDK 级别 29 或更高的设备才能提供支持窗口函数的
    SQLite 版本


    你可能会担心这些缺失的特性，但实际上，它们大多属于数据库的高级用法，对于小型嵌入式数据库库的大多数日常使用场景来说并非必需。即使没有这些较新的功能，你仍然可以享受到
    SQL 的强大能力。


    ## 为你的应用程序创建 SQLite 数据库


    在开始使用 SQLite 数据库为你的应用程序赋能时，你可以选择两种方法：


    1.  在开发环境中创建一个 SQLite 数据库文件，或者从外部获取该文件，并将其作为资源复制到你的 Android 项目中。

    2.  让你的 Android 应用程序自行创建所需的数据库，并可选地填充一些初始数据。


    每种方法都有其优缺点。通过打包一个预制的 SQLite 数据库，你需要确保数据库模式与代码开发保持同步——尽管这个问题并非 Android 独有。让应用程序自行创建数据库可以免除这个负担，但根据你的
    SQLite 数据库可能需要的数据种类和数量，可能会给应用程序的启动带来沉重负担。Android 可以帮助解决这个问题，因为它提供了一系列 SQLite 设置辅助选项。


    Android 提供了 `SQLiteOpenHelper` 类，供你在应用程序中创建其子类使用。`SQLiteOpenHelper` 负责 SQLite
    数据库的所有初始设置，并处理未来的变更和升级。你的工作是实现父类 `SQLiteOpenHelper` 中的（至少）三个方法，另外还有一个用于处理降级的方法可选。


    你的首要任务是为 `SQLiteOpenHelper` 构造函数添加逻辑，将父类构造函数作为基础进行调用。父类负责检查指定的数据库文件是否已存在，并在需要时创建该文件。构造函数还会根据提供的版本号执行版本检查，并能在必要时调用
    `onUpgrade()` 和 `onDownGrade()` 方法，以及执行一些其他超出本介绍范围的更复杂任务。


    其次，你必须实现 `onCreate()` 方法的逻辑。在这里，你将构建并执行数据定义语言（DDL）SQL 命令，根据你的数据库模式设计来创建表、索引、视图等。在
    SQLite 数据库中创建对象后，你应该通过插入和更新语句来填充所需的任何数据。


    最后，你需要实现 `onUpgrade()` 方法（并可选择实现 `onDowngrade()` 方法）。这些方法处理实现模式变更的 DDL，以及在你升级应用程序并决定需要更改
    SQLite 数据库结构以支持所需应用程序行为时，你想要进行的任何相关数据更改。


    在了解了在应用程序中使用 SQLite 的理论之后，现在是时候探索一个示例应用程序，它将帮助您将这些概念付诸实践。


    ## SQLiteExample 应用程序介绍


    在本章的剩余部分，我们将使用 `ch20/SQLiteExample` 应用程序来突出展示你在构建数据库驱动的 Android 应用程序时可能用到的所有关键
    SQLite 功能。我们将使用简单的 `LinearLayout` 和 `ListView` 来演示如何从 SQLite 数据库中使用和显示数据。


    图 20-1 显示了包含一个 `ListView` 的用户界面，用于从 SQLite 数据库中显示已知的 Android 设备型号。我们还有用于添加新设备型号和显示已知设备信息的按钮。


    ![../images/499629_1_En_20_Chapter/499629_1_En_20_Fig1_HTML.jpg](img/499629_1_En_20_Fig1_HTML.jpg)


    **图 20-1** SQLiteExample 主活动界面


    这种简单的布局和视图你现在应该已经很熟悉了，所以我们不再赘述。清单 20-1 显示了布局结构。


    ```

    清单 20-1

