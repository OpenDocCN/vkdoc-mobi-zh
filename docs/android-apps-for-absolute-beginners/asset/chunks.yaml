- fmt: '# Audio Resolution


    If we are sampling audio at 44.1 kHz, what exactly are we capturing when we sample
    the analogue signal? The answer is bits of information regarding the amplitude
    (size) of the sound wave at the sample’s point in time. The more space made available
    for storing a sample, the more we can cover both absolute highs and lows in the
    signal amplitude, but more importantly the more we can finely differentiate between
    small steps in the signal. This is also known as the “bitrate” for the audio sample.


    Some historic examples of well-known audio resolution bitrates include compact
    disks (CDs), which used an 8-bit bitrate in the CD standard. This allowed for
    decent sample fidelity and resulted in data of approximately 44 kB per second
    of sampling at 44.1 kHz sample rate. DVDs upped the game for bitrate allowing
    for up to 16-bit audio, and contemporary “HD” audio is typically considered anything
    with a bitrate of 24 bits of higher. This all contributes to better data capture
    and in theory better quality and fidelity for the sound, but the price is more
    and more storage required to hold the resulting data. It was these storage considerations
    that led to the proliferation of formats that save space in a trade-off with quality
    – the realm of codecs.


    # Encoding, Decoding, and Data Loss


    The desire to find ways of encoding the audio such that required space was greatly
    reduced followed many paths. Briefly, a range of research and techniques were
    developed in a number of research and commercial settings that saw the sampled
    audio processed to drop or remove data that represented sounds, or aspects of
    sounds, that people mostly did not notice were missing once dropped. The most
    famous example is the standard developed by the Fraunhofer Institute in Germany,
    MPEG-1 Audio Layer 3 – better known as MP3. This used frequency clipping techniques
    and other methods to capture far smaller amount of data that could still be used
    to create a reasonably high-fidelity reproduction of the original audio.


    This approach to encoding the audio is known generally as “lossy” compression
    or encoding, because some of the data is lost. The alternative is “lossless” encoding,
    where no source data is discarded. Encoding standards including WAVE (or WAV,
    a form of pulse code modulation) and FLAC are lossless formats. You will often
    hear all of these approaches referred to as codecs, which is a portmanteau of
    two abbreviations: code from the word encode and dec from the word decode.


    For your work in developing Android applications using audio, you can see how
    the choice of codec and lossy vs. lossless capture will directly affect the size
    and quality of the audio you use.


    # More Audio Theory


    There is a great deal more to learn and understand about audio theory, which an
    Android book lacks the space to convey. Topics such as sequency, synthesis, and
    more have entire libraries of books written about them, and there is also a wealth
    of information online about all of these topics. A good starting point is Wikipedia,
    and for practice and tutorials on experimenting with sampling, bitrate, encoding
    formats, and more, look at the tools introduced in the next section.


    # Choosing Further Audio Tools


    Playing back already-created audio is a nice addition to your applications, whether
    it is music, a podcast, or sound effects for your application. At some point,
    you are likely to need to move beyond using other people’s audio assets and want
    to either create your own or mix and adjust other prerecorded sounds. Audio recording
    and editing software is a big field, but to get you started, you won’t go wrong
    looking at some of the popular (and free!) options that might be available to
    you.


    ## Introducing Audacity


    There are a few software fields where free and open source software have a strong
    presence, and even dominate, and audio editing is one of them. Audacity has been
    a popular audio editing suite for over a decade, and in the words of its about
    page from the Audacity website:


    *[Audacity] is a free, easy-to-use, multi-track audio editor and recorder for
    Windows, macOS, GNU/Linux and other operating systems. The interface is translated
    into many languages.*


    Audacity has a huge range of features, but the most important can be summarized
    as follows:


    1. Recording live audio – from any input source available to your computer

    2. Recording playback on computer – capturing the audio from other systems you
    might be running

    3. Full editing capabilities and support for all key audio formats, including
    `MP3`, `WAV`, `AIFF`, `FLAC`, `Ogg Vorbis`, and more (obviously, this covers almost
    all Android-supported formats – a bonus!)

    4. Other formats editable through a rich add-on library system, such as `M4A`
    and `WMA`

    5. Full tools for copying, cutting, splicing, mixing, pitch and tempo adjustment,
    and speed alteration

    6. Support for 16-bit, 24-bit, and 32-bit quality and full spectrum of sample
    rates

    7. Advanced features such as spectrogram analysis and other powerful options


    I could go on with even more features and capabilities, but you can read more
    for yourself at Audacity’s own excellent documentation website, at [`https://manual.audacityteam.org`](https://manual.audacityteam.org).
    At the time of writing this book, Audacity is at version 2.4.2. As it is open
    source and freely available, I highly recommend you at least download and install
    it to give Audacity a tryout. There are very accessible tutorials at [`https://manual.audacityteam.org/man/tutorials.html`](https://manual.audacityteam.org/man/tutorials.html),
    including the two that I recommend everyone new to being an audio buff starts
    with: editing an audio file and creating a new recording. You’ll be creating assets
    for your Android application in no time.


    ## Working with WavePad


    Another strong contender for capable audio editing tool is WavePad, which has
    grown in prominence in recent years. WavePad boasts a feature set at least as
    strong as Audacity’s and in some cases goes even further. One key area of wider
    capability for WavePad is it has support for even more esoteric and rare audio
    file formats, such as `VOX`. Perhaps the most intriguing part of WavePad is that
    it has mobile versions of itself, including an Android version. That means that
    you could be using your own mobile device to create, edit, and perfect the audio
    you need for new applications you are writing for that very same device.


    WavePad uses a “Freemium” model, providing some features for free, but others
    require a paid-for license. You can find more about WavePad at [`www.nch.com.au/wavepad/index.html`](http://www.nch.com.au/wavepad/index.html).


    ## For Apple Mac Owners, There Is GarageBand


    For those of you in possession of a Mac computer, there is one more option worth
    considering. Every Mac for the last decade or more has shipped with GarageBand,
    Apple’s own music editing and creation software. GarageBand has a lot of great
    features and a very strong community around it. Obviously, as GarageBand is bundled
    with Macs, there’s no download for me to point you to, and if you have a Mac,
    GarageBand was included in the price you paid for your machine – so there’s no
    marginal expense to start using it.


    # Summary


    In this chapter, we’ve introduced some of Android’s core audio and sound handling
    capabilities, including the Media package and `MediaPlayer` plus `MediaRecorder`.
    We’ve seen a variety of ways of playing back and recording sound and briefly touched
    on the alternative packages Android provides for audio, including `SoundPool`
    and `JetPlayer`.


    We will pick up from this topic in the next chapter when we look at video and
    see again the power of the Media package.


    # 14. Working with Video and Movies for Android'
