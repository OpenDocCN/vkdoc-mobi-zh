    # 完善你的软件工具箱


    除了本章已提及的 Android Studio 配套工具和辅助系统外，你或许还需要其他工具来为开发构建各种额外资源，比如图片、动画、录音、音乐等等。


    市面上有很多商用的此类工具，你可能已经知晓并使用过其中一些。在此，我将重点推荐一些关键的开源工具，它们在各领域都具有强劲竞争力，有些甚至是行业翘楚。我本人非常推崇开源精神，因此只要条件允许，我都会优先选择开源工具。你或许不认同这一观点，但无论你是否选用商业替代品，以下列表都将为你阐明当前可用的选择。


    你应该考虑纳入开发环境的开源工具包括：


    **Blender**：寻找顶级 2D 和 3D 动画工具，Blender 当仁不让。它在专业和业余圈中拥有大批拥趸，广泛应用于电影电视等行业，几乎能满足你设想的任何动画开发需求，功能强大得令人惊叹。更多信息请访问
    [`www.blender.org`](http://www.blender.org)。


    **GIMP（GNU 图像处理程序）**：这是一款广为人知的图像编辑与处理工具。对于 GIMP，评价褒贬不一，爱憎分明。它在许多常见任务中表现出色，例如调整大小、缩放、裁剪、去红眼、图层开发/合并等。不看好它的人通常会将
    Adobe Photoshop 视为黄金标准的商业产品。这些人的看法不无道理——Photoshop 确实全面且强大。但作为开源替代品，不妨试试 GIMP（[`www.gimp.org`](http://www.gimp.org)）。


    **Inkscape**：矢量图形会在你的 Android 开发世界中占据很大比重，尤其是当你涉足游戏开发时。Inkscape 是一款历史悠久的出色开源矢量图形程序。同样，也有人认为各种商业软件包更胜一筹——他们可能是对的。了解更多
    Inkscape 信息请访问 [`https://inkscape.org`](https://inkscape.org)。


    **Audacity**：另一款被誉为领域最佳的应用，Audacity 是首屈一指的多轨音频编辑套件，支持所有主流操作系统。请访问 [`www.audacityteam.org/`](http://www.audacityteam.org/)
    获取 Audacity。


    **LAME**：作为最原始的音频工具之一（并且已被嵌入到本章提到的许多其他工具中），LAME 是一款命令行工具和可嵌入库，可对来自多种来源的音频进行 MP3
    编码（[`https://lame.sourceforge.io`](https://lame.sourceforge.io)）。


    **OpenShot**：众多开源视频（及音频）编辑套件之一。OpenShot 拥有一些出色的功能，包括基于曲线的关键帧动画、高级时间轴和逐帧特性，以及跨平台支持。详情请访问
    [`www.openshot.org`](http://www.openshot.org)。


    **Olive**：另一款视频编辑工具，拥有热心的用户群体（[`www.olivevideoeditor.org/`](http://www.olivevideoeditor.org/)）。


    **DaVinci Resolve**：另一款功能极其强大的视频编辑工具，其出名之处在于它是少数支持高达 8k 超高清视频的工具之一。它还强力支持多用户协作用于同一视频项目。了解更多请访问
    [`www.blackmagicdesign.com/`](http://www.blackmagicdesign.com/)。


    在本书第三部分，当我们处理 Android 应用中的图片、声音、视频及其他资源时，你将看到其中一些工具的实际应用。


    # 总结


    从本章讨论的主题可以看出，仔细规划你的硬件和软件环境，将极大地帮助你踏上成为专业 Android 开发者的旅程。还有一个软件主题需要提及：Java 和 JDK。关于这个主题的书籍有数百本之多，虽然我们篇幅有限，但我们将从下一页（第
    7 章！）开始，用整章的篇幅来介绍 Java。


    # 第二部分 掌握 Android 开发技能


    # 7. 介绍用于 Android 开发的 Java


    在本章中，我们将探讨如何入门使用 Java 进行 Android 应用开发，并特别关注如何在不被 Java 庞大的体系吓倒或挫败的情况下，攻克这门宏大的语言。已经熟悉
    Java 开发的读者可以略读大部分内容，但我会建议所有读者重点关注一些关于 Android 特性的关键点。


    将 Java 学习到专家级别是一项巨大的工程。即使只是学到“快乐的初学者”水平，也远远不止本书这一章，甚至一整本书的篇幅。关于 Java 及其众多方面的书籍确实有“数千本”之多。与其提供一个不完整且最终用途不大的介绍，我们将聚焦于三个关键的预备要点，引导你借助本书之外的资源和工具踏上学习
    Java 的征途。


    首先，我们将从软件角度审视 Java，包括 Java 开发工具包 (`JDK`) 和 Java 运行时环境 (`JRE`)，以及 Android 使用和采用
    Java 虚拟机环境 (`JVM`) 的特殊性——包括其让软件“一次编写，到处运行”的承诺，以及 Java 各版本的漫长历史。


    其次，我们将深入一个基础的纯 Java 应用程序，你可以在任何安装了 Java 的机器上运行它。我们将从一两个基础部分入手，作为你扩展理解 Java 及其如何（以及如何不）转化为
    Android 应用程序的起点。


    最后，我们将涵盖你应逐步学习的 Java 关键领域或主题，并附上一些最佳免费和商业资源的链接，以助你在本章结束后继续学习。


    ## Android 的其他开发语言选择


    Java 在 Android 起步时是（共同的）首选开发语言，与 Android 有着悠久的历史。但它并非开发应用程序唯一受支持的语言。除了 Java 之外，Android
    从早期就通过“原生开发工具包”（`NDK`）支持使用 C++ 进行“原生”形式的开发。2016 年，谷歌大胆地将 Kotlin 添加到受支持的语言阵容中，并于去年决定将
    Kotlin 作为新的首选语言。就应用使用率而言，Java 仍然是 Android 开发中的主导语言，占比接近 90%。但许多新应用混合使用 Kotlin
    和 Java，或只选择 Kotlin。您可以从 Apress 出版的 *Learn Kotlin for Android Development* （Späth
    著，ISBN 9781484244661）中了解更多关于 Kotlin 用于 Android 开发的知识。

