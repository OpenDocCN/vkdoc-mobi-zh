- fmt: "# Seeing Intent-Launched Activities in Action\n\nArmed with the knowledge\
    \ of the theory and structure of intents, you are ready to dive into an example\
    \ that illustrates their power and convenience. I have mentioned multiple times\
    \ the philosophy of Android in having many activities to support the array of\
    \ functionality you desire for your application, such as a photo album application\
    \ having a given activity to view individual pictures, another activity to view\
    \ groups or albums (perhaps using the `GridView`), and even more activities for\
    \ tagging, sharing on social media, and so on.\n\nThere is one last thought to\
    \ consider before we delve into implementing a multiactivity application. If your\
    \ application launches an activity, via an intent, from a given activity, what\
    \ information about the state of the launched activity should the invoking activity\
    \ be concerned with? Does your launching activity need to know anything about\
    \ the second (or subsequent) activity, such as when it completes or what work\
    \ it achieves, and be passed some result?\n\n## Deciding on Activity Dependency\n\
    \nTo deal with the dependency vs. no dependency issue, Android provides two primary\
    \ ways to invoke an activity with an intent.\n\nThe first approach is the `StartActivity()`\
    \ method, which is used to flag that Android should find the activity best matched\
    \ to the payload of the intent – including action, category, and MIME type. The\
    \ “winning” activity is started, and the payload from the intent will be passed\
    \ for any use the activity might make of it. The calling activity will continue\
    \ its lifecycle and will not receive any update or notification about the called\
    \ activity’s work, lifecycle events, data changes, and so forth.\n\nRelying on\
    \ a lottery, or something approaching one, might not sound the greatest way of\
    \ influencing which activity should be chosen to deal with an intent. You need\
    \ not worry, as there is a second approach known as the `startActivityForResult()`\
    \ method. In `startActivityForResult()`, more than just a well-formed intent is\
    \ used to influence which activity is triggered; it also includes a specific reference\
    \ to the desired activity and a unique calling number to the activity invocation.\
    \ A notification is sent back to the calling activity when the called activity\
    \ ends, which means you can mimic a traditional user experience of a parent window\
    \ or screen opening a child window or screen, for things like processing a login\
    \ request or selecting an option from an available list.\n\nIn detail, the callback\
    \ includes:\n\n1. The unique calling number associated with the activity specific\
    \ to this call and the original `startActivityForResult()` method. In this design,\
    \ you would opt to use a switch pattern to determine which of your child activities\
    \ had completed and continue with your application logic appropriately.\n\n2.\
    \ A numeric result code from the stock Android-provided results of `RESULT_OK`\
    \ and `RESULT_CANCELED`, along with any custom data or results you care to provide\
    \ of the form `RESULT_FIRST_USER`, `RESULT_FIRST_USER + 1`, and so on.\n\n3. (Optionally)\
    \ A `String` object with any data your called activity should return, such as\
    \ the item chosen from a `ListAdapter`.\n\n4. (Optionally) A `Bundle` containing\
    \ any additional information that doesn’t fit neatly into the first three options.\n\
    \nArmed with the choice between `startActivity()` and `startActivityForResult()`,\
    \ your main concern should be determining which is best to use at application\
    \ design time. It is possible to dynamically determine this at runtime, but juggling\
    \ all the emerging possibilities among potentially dozens or hundreds of activities\
    \ can become overwhelming.\n\n## Creating an Intent\n\nWith the knowledge of how\
    \ to invoke activities using your desired method, what remains is for you to create\
    \ the `Intent` object to use as the payload from which to trigger its launch.\
    \ Should you want to launch another activity from within the realm of your own\
    \ application, then the most direct approach is to create your intent directly\
    \ and explicitly state the component you wish to activate. This would have you\
    \ create a new `Intent` object like this:\n\n```\nnew Intent(this, SomeOtherActivity.class);\n\
    ```\n\nHere, you explicitly reference that you want to invoke your `SomeOtherActivity`\
    \ activity. For this style of direct invocation, you don’t need to construct an\
    \ intent filter in your `AndroidManifest.xml` file – your `SomeOtherActivity`\
    \ will be started whether it likes it or not! Obviously it is your responsibility\
    \ as the developer to ensure your `SomeOtherActivity` can respond accordingly.\n\
    \nI outlined in the earlier sections of this chapter the elegance and preference\
    \ for using a `Uri` and matched set of criteria to feed to Android so that it\
    \ can find appropriate activities for your uses. Android has a range of supported\
    \ `Uri` schemes, and you are free to create a `Uri` matching any one of them.\
    \ As an example, here is a snippet creating a `Uri` for a contact in the contacts\
    \ system:\n\n```\nint myContactNumber = 4;\nUri myUri = Uri.parse(\"content://contacts/people/\"\
    \ + myContactNumber.toString());\nIntent myIntent = new Intent(Intent.ACTION_VIEW,\
    \ myUri);\n```\n\nWe are using the number for the fourth contact and then constructing\
    \ the `Uri` string to reference that contact. We can then pass that `Uri` to the\
    \ `Intent` object.\n\n## Starting the Intent-Invoked Activity\n\nYou have built\
    \ your intent, so it is time to choose which of `startActivity()` or `startActivityForResult()`\
    \ to call. There are some more advanced options you could consider, but they are\
    \ beyond the scope of this book. If you are interested, the Android documentation\
    \ has more to say on options including `startActivities()`, `startActivityFromFragment()`,\
    \ and `startActivityIfNeeded()`.\n\nListing [17-3](#499629_1_En_17_Chapter.xhtml#PC5)\
    \ shows a sample layout from the `ch17/IntentExample` project, using a very simple\
    \ layout with one label, one field, and one button.\n\n```\nListing 17-3\nA layout\
    \ to demonstrate intents\n```\n\n> **Note**\n>\n> In this `ConstraintLayout` example,\
    \ I have deliberately left the `EditText` and `TextView` not fully constrained\
    \ vertically and/or horizontally. You will see warnings in Android Studio that\
    \ by not having these constraints, the widgets will “jump” to default positions\
    \ without them. In this design, this still produces the desired layout, but you\
    \ can add constraints to these views if you prefer when you run the example.\n\
    \nIf you look at the View-based widgets in the layout, you see the button will\
    \ invoke a `viewContact()` method. To give the user the experience they expect,\
    \ we’ll need to code the creation of a contact `Uri` as explained in the preceding\
    \ section and use it to create the `Intent` object that will start an activity\
    \ to (hopefully) display a contact. The example code is shown in Listing [17-4](#499629_1_En_17_Chapter.xhtml#PC6).\n\
    \n```\npackage org.beginningandroid.intentexample;\n\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.content.Intent;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
    import android.view.View;\nimport android.widget.EditText;\n\npublic class MainActivity\
    \ extends AppCompatActivity {\n    private EditText myContact;\n\n    @Override\n\
    \    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.activity_main);\n        myContact = (EditText)\
    \ findViewById(R.id.myContact);\n    }\n\n    public void viewContact(View view)\
    \ {\n        String myContactNumber = myContact.getText().toString();\n      \
    \  Uri myUri = Uri.parse(\"content://contacts/people/\" + myContactNumber);\n\
    \        startActivity(new Intent(Intent.ACTION_VIEW, myUri));\n    }\n}\n\nListing\
    \ 17-4\nJava logic for our intent-triggering contact application\n```"
  raw: "Seeing Intent-Launched Activities in Action\nArmed with the knowledge of the\
    \ theory and structure of intents, you\nare ready to dive into an example that\
    \ illustrates their power and convenience. I have\nmentioned multiple times the\
    \ philosophy of Android in having many\nactivities to support the array of functionality\
    \ you desire for your\napplication, such as a photo album application having a\
    \ given activity\nto view individual pictures, another activity to view groups\
    \ or albums\n(perhaps using the `GridView`), and even\nmore activities for tagging,\
    \ sharing on social media, and so on.\nThere is one last thought to consider before\
    \ we delve into\nimplementing a multiactivity application. If your application\
    \ launches\nan activity, via an intent, from a given activity, what information\n\
    about the state of the launched activity should the invoking activity be\nconcerned\
    \ with? Does your launching activity need to know anything about\nthe second (or\
    \ subsequent) activity, such as when it completes or what\nwork it achieves, and\
    \ be passed some result?\n\nDeciding on Activity Dependency\nTo deal with the\
    \ dependency vs. no\ndependency issue, Android provides two primary ways to invoke\
    \ an\nactivity with an intent.\nThe first approach is the `StartActivity()`\n\
    method, which is used to flag that Android should find the activity best\nmatched\
    \ to the payload of the intent – including action, category, and\nMIME type. The\
    \ “winning” activity is started, and the payload from the\nintent will be passed\
    \ for any use the activity might make of it. The\ncalling activity will continue\
    \ its lifecycle and will not receive any\nupdate or notification about the called\
    \ activity’s work, lifecycle\nevents, data changes, and so forth.\n\nRelying on\
    \ a lottery, or something approaching one, might not sound the\ngreatest way of\
    \ influencing which activity should be chosen to deal with\nan intent. You need\
    \ not worry, as there is a second approach known as\nthe `startActivityForResult()`\n\
    method. In `startActivityForResult()`,\nmore than just a well-formed intent is\
    \ used to influence which activity\nis triggered; it also includes a specific\
    \ reference to the desired\nactivity and a unique calling number to the activity\
    \ invocation. A\nnotification is sent back to the calling activity when the called\n\
    activity ends, which means you can mimic a traditional user experience\nof a parent\
    \ window or screen opening a child window or screen, for\nthings like processing\
    \ a login request or selecting an option from an\navailable list. In detail, the\
    \ callback includes\n\n1.  The unique calling number associated with the activity\
    \ specific to\n    this call and the original `startActivityForResult()`\n   \
    \ method. In this design, you would opt to use a switch pattern to\n    determine\
    \ which of your child activities had completed and continue with\n    your application\
    \ logic appropriately.\n\n2.  A numeric result code from the stock Android-provided\
    \ results of\n    `RESULT_OK` and\n    `RESULT_CANCELED`,\n    along with any\
    \ custom data or results you care to provide of the form\n    `RESULT_FIRST_USER,\
    \ RESULT_FIRST_USER + 1`, and so on.\n\n3.  (Optionally) A `String`  object with\
    \ any data\n    your called activity should return, such as the item chosen from\
    \ a `ListAdapter`.\n\n4.  (Optionally) A `Bundle` containing any\n    additional\
    \ information that doesn’t fit neatly into the first three\n    options.\n\nArmed\
    \ with the choice between `startActivity()` and\n`startActivityForResult()`,\n\
    your main concern should be determining which is best to use at\napplication design\
    \ time. It is possible to dynamically determine this at\nruntime, but juggling\
    \ all the emerging possibilities among potentially\ndozens or hundreds of activities\
    \ can become overwhelming.\n\nCreating an Intent\n\nWith the knowledge of how\
    \ to invoke activities using your desired\nmethod, what remains is for you to\
    \ create the `Intent` object to use\nas the payload\nfrom which to trigger its\
    \ launch. Should you want to launch another\nactivity from within the realm of\
    \ your own application, then the most\ndirect approach is to create your intent\
    \ directly and explicitly state\nthe component you wish to activate. This would\
    \ have you create a new\nIntent object like this:\n\n```\nnew Intent(this, SomeOtherActivity.class);\n\
    ```\n\nHere, you explicitly reference that you want to invoke your `SomeOtherActivity`\n\
    activity. For this style of direct invocation, you don’t need to\nconstruct an\
    \ intent filter in your `AndroidManifest.xml`\nfile – your `SomeOtherActivity`\
    \  will be started\nwhether it likes it or not! Obviously it is your responsibility\
    \ as the\ndeveloper to ensure your `SomeOtherActivity` can\nrespond accordingly.\n\
    \nI outlined in the earlier sections of this chapter the elegance and\npreference\
    \ for using a `Uri` and matched set\nof criteria to feed to Android so that it\
    \ can find appropriate\nactivities for your uses. Android has a range of supported\
    \ `Uri` schemes, and you\nare free to create a `Uri` matching any one\nof them.\
    \ As an example, here is a snippet creating a `Uri` for a contact in\nthe contacts\
    \ system:\n\n```\nInt myContactNumber = 4;\nUri myUri = Uri.parse(\"content://contacts/people/\"\
    +myContactNumber.toString());\nIntent myIntent = new Intent(Intent.ACTION_VIEW,\
    \ myUri);\n```\n\nWe are using the number for the fourth contact and then constructing\n\
    the `Uri` string\nto reference that contact. We can then pass that `Uri` to the\
    \ Intent\nobject.\n\nStarting the Intent-Invoked Activity\nYou have built your\
    \ intent, so it is time\nto choose which of `startActivity()` or\n`startActivityForResult()`\n\
    to call. There are some more advanced options you could consider, but\nthey are\
    \ beyond the scope of this book. If you are interested, the\nAndroid documentation\
    \ has more to say on options including `startActivities()`,\n`startActivityFromFragment()`,\n\
    and `startActivityIfNeeded()`.\n\nListing [17-3](#499629_1_En_17_Chapter.xhtml#PC5)\
    \ shows a sample\nlayout from the `ch17/IntentExample`\nproject, using a very\
    \ simple layout with one label, one field, and one\nbutton.\n\n```\n\nListing\
    \ 17-3\nA layout to demonstrate intents\n```\n\nNote\n\nIn this ConstraintLayout\
    \ example, I have deliberately left the\nEditText and TextView not fully constrained\
    \ vertically and/or\nhorizontally. You will see warnings in Android Studio that\
    \ by not having\nthese constraints, the widgets will “jump” to default positions\
    \ without\nthem. In this design, this still produces the desired layout, but you\n\
    can add constraints to these views if you prefer when you run the\nexample.\n\n\
    If you look at the View-based widgets in the layout, you see the button\nwill\
    \ invoke a `viewContact()`\nmethod . To give\nthe user the experience they expect,\
    \ we’ll need to code the creation of\na contact `Uri`\nas explained in the preceding\
    \ section and use it to create the `Intent` object  that will start an\nactivity\
    \ to (hopefully) display a contact. The example code is shown in\nListing [17-4](#499629_1_En_17_Chapter.xhtml#PC6).\n\
    \n```\npackage org.beginningandroid.intentexample;\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.content.Intent;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
    import android.view.View;\nimport android.widget.EditText;\npublic class MainActivity\
    \ extends AppCompatActivity {\nprivate EditText myContact;\n@Override\nprotected\
    \ void onCreate(Bundle savedInstanceState) {\nsuper.onCreate(savedInstanceState);\n\
    setContentView(R.layout.activity_main);\nmyContact=(EditText)findViewById(R.id.myContact);\n\
    }\npublic void viewContact(View view) {\nString myContactNumber=myContact.getText().toString();\n\
    Uri myUri = Uri.parse(\"content://contacts/people/\"+myContactNumber);\nstartActivity(new\
    \ Intent(Intent.ACTION_VIEW, myUri));\n}\n}\nListing 17-4\nJava logic for our\
    \ intent-triggering contact application\n```"
  trans: "\n# 一探意图启动的活动\n\n掌握了意图的理论与结构后，你现在可以深入一个示例，了解它们的强大与便捷。我多次提到 Android 的哲学——拥有众多活动来支持应用所需的各种功能。例如，一个相册应用可能有专门查看单张图片的活动、另一个用于查看分组或相册的活动（或许使用`GridView`），以及更多用于标记、在社交媒体上分享等操作的活动。\n\
    \n在着手实现多活动应用之前，还有最后一点需要考虑。如果应用通过意图从某个活动启动另一个活动，调用活动应关注被启动活动的哪些状态信息？启动活动是否需要了解第二个（或后续）活动的任何情况，例如它何时完成、完成了什么工作，以及是否返回某些结果？\n\
    \n## 决定活动的依赖关系\n\n为了解决依赖与非依赖的问题，Android 提供了两种主要方式通过意图调用活动。\n\n第一种方法是`StartActivity()`，用于指示\
    \ Android 找到与意图负载（包括操作、类别和 MIME 类型）最匹配的活动。匹配的活动被启动，意图的负载会传递给它使用。调用活动将继续其生命周期，不会收到关于被调用活动的工作、生命周期事件、数据更改等任何更新或通知。\n\
    \n依赖抽签或类似方式来决定选择哪个活动处理意图，听起来并不是最佳方式。但无需担心，还有第二种方法——`startActivityForResult()`。在`startActivityForResult()`中，不仅使用格式良好的意图来影响触发哪个活动，还包括对目标活动的具体引用以及一个唯一的调用编号。当被调用活动结束时，会向调用活动发送通知，这意味着你可以模拟传统的父窗口或父屏幕打开子窗口或子屏幕的用户体验，例如处理登录请求或从可用列表中选择选项。\n\
    \n具体来说，回调包括：\n\n1. 与该调用和原始`startActivityForResult()`方法相关的唯一调用编号。在这种设计中，你可以选择使用\
    \ switch 模式来判断哪个子活动已完成，并相应地继续应用逻辑。\n\n2. 一个来自 Android 系统提供的标准结果码，包括`RESULT_OK`和`RESULT_CANCELED`，以及你提供的任意自定义数据或结果，形式为`RESULT_FIRST_USER`、`RESULT_FIRST_USER\
    \ + 1`等。\n\n3. （可选）一个`String`对象，包含被调用活动应返回的任何数据，例如从`ListAdapter`中选择的项目。\n\n4.\
    \ （可选）一个`Bundle`，包含不适合前三种选项的任何附加信息。\n\n在`startActivity()`和`startActivityForResult()`之间做出选择时，主要考虑的是在应用设计阶段确定哪种方法最合适。虽然可以在运行时动态决定，但在可能涉及数十或数百个活动的情况下，应对所有可能出现的情况会变得十分复杂。\n\
    \n## 创建意图\n\n掌握了使用所需方法调用活动的知识后，接下来要创建`Intent`对象，作为触发启动的负载。如果要在自己的应用中启动另一个活动，最直接的方法是显式创建意图并明确指定要激活的组件。可以这样创建一个新的`Intent`对象：\n\
    \n```\nnew Intent(this, SomeOtherActivity.class);\n```\n\n这里明确引用了要调用的`SomeOtherActivity`活动。对于这种直接调用方式，无需在`AndroidManifest.xml`文件中配置意图过滤器——`SomeOtherActivity`会直接被启动，无论它是否“愿意”！显然，作为开发者，你有责任确保`SomeOtherActivity`能够做出相应的响应。\n\
    \n我在本章前面部分阐述了使用`Uri`和匹配条件集供 Android 查找合适活动的优雅与偏好。Android 支持多种`Uri`方案，你可以自由创建匹配其中任何一种的`Uri`。例如，以下代码片段创建了一个指向联系人系统中某个联系人的`Uri`：\n\
    \n```\nint myContactNumber = 4;\nUri myUri = Uri.parse(\"content://contacts/people/\"\
    \ + myContactNumber.toString());\nIntent myIntent = new Intent(Intent.ACTION_VIEW,\
    \ myUri);\n```\n\n我们使用第四个联系人的编号，然后构建引用该联系人的`Uri`字符串。接着可以将该`Uri`传递给`Intent`对象。\n\
    \n## 启动意图调用的活动\n\n你已经构建好意图，现在需要选择调用`startActivity()`还是`startActivityForResult()`。还有一些更高级的选项可以考虑，但超出了本书的范围。如果你感兴趣，Android\
    \ 文档对`startActivities()`、`startActivityFromFragment()`和`startActivityIfNeeded()`等选项有更详细的说明。\n\
    \n代码清单 17-3 展示了`ch17/IntentExample`项目中的一个示例布局，使用了一个非常简单的布局，包含一个标签、一个字段和一个按钮。\n\
    \n```\n代码清单 17-3\n演示意图的布局\n```\n\n> **注意**\n>\n> 在此`ConstraintLayout`示例中，我特意未将`EditText`和`TextView`完全垂直和/或水平约束。你会在\
    \ Android Studio 中看到警告，如果没有这些约束，控件会“跳转”到默认位置。在此设计中，这仍然能产生所需的布局，但如果你在运行示例时愿意，可以为这些视图添加约束。\n\
    \n如果查看布局中基于视图的控件，你会发现按钮将调用一个`viewContact()`方法。为了给用户带来预期的体验，我们需要按照前一节所述，编写创建联系人`Uri`的代码，并用它来创建`Intent`对象，从而启动一个（希望是）显示联系人的活动。示例代码如代码清单\
    \ 17-4 所示。\n\n```\npackage org.beginningandroid.intentexample;\n\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.content.Intent;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
    import android.view.View;\nimport android.widget.EditText;\n\npublic class MainActivity\
    \ extends AppCompatActivity {\n    private EditText myContact;\n\n    @Override\n\
    \    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setContentView(R.layout.activity_main);\n        myContact = (EditText)\
    \ findViewById(R.id.myContact);\n    }\n\n    public void viewContact(View view)\
    \ {\n        String myContactNumber = myContact.getText().toString();\n      \
    \  Uri myUri = Uri.parse(\"content://contacts/people/\" + myContactNumber);\n\
    \        startActivity(new Intent(Intent.ACTION_VIEW, myUri));\n    }\n}\n\n代码清单\
    \ 17-4\n用于触发意图的联系人应用的 Java 逻辑\n```\n"
