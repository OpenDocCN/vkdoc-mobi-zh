- fmt: '# 4. Shutdown


    The final state in which all persistent data, view hierarchy, cached data, and
    so on are expunged from the operating system’s memory (and, implicitly, any app
    not in the `Launched`, `Running`, or `Killed` state).


    Each of those states is quite self-explanatory. What gets an application to move
    between states is where the fun begins, in the realm of lifecycle callback methods.


    ## Understanding Activity Lifecycle Callback Methods


    Each of the lifecycle methods shown in Figure [11-1](#499629_1_En_11_Chapter.xhtml#Fig1)
    comes with specific behaviors and uses with which you should become familiar.
    You might not need to suddenly start adding custom logic to these lifecycle stages
    for your applications straight away, but knowing where to add things will set
    you up for rapid advancement as an Android developer in the future. We will step
    through each method one at a time, to highlight their specific uses.


    Each of the methods has common characteristics with the others, such as the near-universal
    use of the respective parent class’ equivalent method as the first action when
    any of the callback methods is invoked. For example, you see in earlier examples
    in the book the first act of the `onCreate()` method is to call `super.onCreate()`,
    which invokes the parent’s version. There are exceptions when you don’t want to
    automatically have the parent called, but I will flag those cases as we encounter
    them. For now, assume a default good behavior is to follow the “parent calling”
    practice.


    ### `onCreate()`


    Every activity starts life in the `onCreate()` method. Whether your user has tapped
    the icon on the Android home screen to start your application or a configuration
    change has triggered the need to recreate the display, `onCreate()` is called.
    The method takes a `Bundle` object to account for these later cases of recreation,
    as the `Bundle` will be the store of any previous state, data, and resources that
    are needed to bring the activity to life – collectively known as instance state.


    You should consider the following actions for any `onCreate()` method for your
    activities:


    1.  Load into the content view all of the layouts you plan to use, so that Android
    can create the UI prior to displaying it when the `onStart()` method is called.

    2.  Initialize any activity-level variables you have defined within the activity
    class definition.


    You might also need to do any work to use global resources or variables you might
    have created as part of your application. We will return to this topic of global
    resources shortly when we discuss `onRetainNonConfigurationInstance()` and also
    explore more example uses when we cover preferences later in this chapter and
    the remainder of the book.


    ### `onStart()`


    The work of `onStart()` begins once `onCreate()` has completed the task of building
    all the objects from your layout definitions, along with any other initialization
    work. It is the job of `onStart()` to actually render the resulting UI to the
    user on-screen. The `onStart()` method is also called on the path following `onRestart()`
    in the preceding lifecycle model.


    There are not many cases where you will need to override `onStart()` and provide
    your own logic. Even if you are tempted to, you need to be aware that if your
    activity is following the `onRestart()` path, instance state is still not fully
    restored at this point and won’t be until the subsequent call to `onRestoreInstanceState()`
    is made.


    One corner case where implementing your own `onStart()` override is useful is
    when you have some custom resource that is long-lived, that you have cleanly frozen
    or paused based on your activity going out of view – being a good citizen and
    not using resources when you don’t have to. Should you choose to set up such resource
    management, then the `onStart()` method would be where you would resume or defrost
    such a custom resource. Be sure to call the `super.onStart()` method to invoke
    the parent’s equivalent, even if you know there is no override code in the parent.
    Android itself still needs to do its own internal work in this case.


    ### `onRestoreInstanceState()`


    If a user ends an activity, either by using the back button or via some other
    path that shifts them from your activity to another, they have signaled that they
    are finished with the original activity and all of the state associated with it.
    This would indicate to you, as the application developer, that you can also dispense
    with the activity, other than any long-lived resources you need to maintain. When
    Android itself terminates an activity, the circumstances are usually different.
    Primarily, Android terminates an activity due to a configuration change, and it
    does need to concern itself with what is needed to recreate the activity to meet
    the user’s needs. That means recreating not just the visual display of the activity,
    but all of its instance state.


    You might want to perform any custom instance state recovery here, and remember
    that instance state is not the same as long-term storage. Other mechanisms exist
    to handle that, including preferences, which we will cover later in the book.
    Where you want to persist more complex or larger types of data than those for
    which the preference system is designed, then fundamental computing concepts such
    as files and databases are the best approach, and we will cover those in Chapter
    [18](#499629_1_En_18_Chapter.xhtml).


    ### `onResume()`


    The `onResume()` method is the moment of truth when it comes to Android UIs. The
    `onResume()` method is the key method that makes the fully rendered and inflated
    layout visible, shifting all of the accumulated objects, logic, and so forth into
    the foreground. Together with `onPause()`, the transitions to and from foreground
    will trigger multiple times in the life of your activity, as other activities
    and applications preempt it, jump to focus, are closed by the user, and so on.


    The only logic you should normally consider adding to `onResume()` is related
    to the real-time visual aspects changing your activity, including:


    1.  Animation

    2.  Video

    3.  Custom view transition effects


    In all other respects, you should avoid any other custom logic in `onResume()`.'
