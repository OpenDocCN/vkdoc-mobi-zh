    \ 20-3** SQLiteExample 主活动\n```"
- fmt: '# 关键实现步骤与SQLite查询方法


    以下是前述代码中需要记住的一些关键实现步骤，适用于所有基于SQLite的Android开发。任何基于SQLite的Android应用的关键步骤是：从你的辅助类创建一个对象，并确保它在需要它的活动（Activity）的整个生命周期内保持有效。这通常不难，我在启动活动（Launcher
    Activity）中创建该对象的方式是一种常见做法。


    现在你已经有了可用的辅助对象，每当需要操作数据库时，与数据库的交互都将从调用其`getReadableDatabase()`或`getWritableDatabase()`方法开始，这两个方法会返回一个底层SQLite数据库的数据库对象。正如方法名所示，只读数据库对象仅用于通过`SELECT`查询读取数据，而可写版本则允许执行DML语句（如`INSERT`、`UPDATE`、`DELETE`）以及用于创建和修改对象的DDL语句，就像我们在辅助类的`onCreate()`方法中使用的那样。


    当使用数据库对象完成特定任务后，只需调用其`.close()`方法，辅助类就会清理资源。这通常在活动的`onDestroy()`或类似方法中完成。


    `SQLiteExample`应用创建了辅助对象，并使用`getWritableDatabase()`以可写模式访问数据库，接着通过`getModels()`方法填充`modelEntries`列表。利用这些结果，它为`ArrayAdapter`提供所需数据，以将数据库返回的数据填充到`ListView`中。`getModels()`方法虽短，但功能强大，因为它引入并使用了两个关于SQLite数据库和Android的重要能力。第一个概念是查询辅助方法（Query
    Helper），用于从SQLite数据库中收集数据；第二个概念是游标对象（Cursor），用于管理返回的结果。熟练使用SQLite（及其他）数据库需要掌握这两种技术，让我们更深入地研究它们。


    ## 为SQLite和Android选择查询方法


    在应用中使用SQLite数据库时，你可以选择两种主要方式来检索其存储的数据。每种方式都使用`SELECT`语句，但在提供给开发者的辅助程度和假定结构方面有所不同。


    ### 使用查询构建过程


    方法一，如`SQLiteExample`应用的`getModels()`方法所示，是使用`query()`方法。通过使用`query()`，你可以获得一条结构化的路径来构建查询所需的列、源表、谓词逻辑等，直到形成最终将在SQLite数据库上执行的查询。


    使用`query()`时，你不需要直接编写SQL `SELECT`语句。相反，你需要按照一组预定义的构建阶段逐步操作，`query()`方法会在底层为你构建SQL语句：


    1.  提供要用于查询的表名。

    2.  提供要选择的列名（如果你熟悉关系数据库术语，也可称为“投影”）。

    3.  为`WHERE`子句提供谓词，包括任何可选的占位参数。

    4.  如果使用了占位参数，则提供这些参数的值。

    5.  提供任何`GROUP BY`、`HAVING`或`ORDER BY`子句。


    如果不需要查询的某一部分，只需在`query()`调用的相应参数位置传入`null`即可。你可以在`SQLiteExample`代码中对`query`的调用中看到这一点：


    ```java

    myDB.query(MySQLiteHelper.TABLE_NAME, MySQLiteHelper.TABLE_COLUMNS,

    null, null, null, null, null)

    ```


    这意味着我们没有使用任何谓词来为SQL语句的`WHERE`子句添加逻辑，没有为该语句提供参数，也没有使用任何`GROUP BY`、`HAVING`或`ORDER
    BY`选项。这看起来非常简单直接，实际使用中也是如此。这种方法的一个显著局限性就隐藏在第1步中：你为查询提供了表名——但只能是一个表。这就是它的缺点！使用`query()`方法，你只能查询单个表，这意味着无法进行连接（Join），更微妙的是，你也不能使用任何像子查询、关联查询或其他会引用其他表的技术。


    ### 使用SQL的原始能力


    如果你渴望突破`query()`方法的限制，那么`rawQuery()`可以为你提供几乎完整的SQL能力。顾名思义，`rawQuery()`接受一个代表SQL语句的“原始”字符串作为参数，并接受一个可选的占位参数数组（如果你选择在SQL语句中使用它们）。当你的查询不需要参数化时，你可以将`null`作为第二个参数传入。


    你可以在`SQLiteExample`逻辑的`getModelInfo()`实现中看到`rawQuery()`的实际应用：


    ```java

    myDB.rawQuery("select _id, model_name, release_year " +

    "from devices", null)

    ```


    使用`rawQuery()`，你可以尽情施展你所能掌握的任何SQL技巧，包括SQLite支持的SQL标准中的任何内容，如嵌套子查询、连接等。这种广泛的能力也带来了其自身的考量。使用`rawQuery()`管理一组小的静态查询是没有问题的，然而，当表示查询的字符串变得复杂，或者通过动态生成SQL文本来构建越来越大的语句时，就需要关注一些普遍问题。首要的是被称为SQL注入的安全问题。SQL注入漏洞本身并非Android问题，也非SQLite问题。这些问题可能影响任何使用数据库的应用程序。避免SQL注入的关键在于字符串“净化”，即确保生成的SQL不仅有效，而且不超出你原本预期的范围。


    > **注意**

    >

    > 使用原始SQL的强大能力，也带来了当你完全控制并完全负责查询语法、正确性等方面时可能出现的所有复杂问题。如果你是SQL初学者，我建议先用查询构建器方法进行测试，然后再将`rawQuery()`和查询构建器进行对比学习，以便了解其中存在的陷阱和风险！


    ## 使用游标管理查询结果


    无论你选择哪种查询执行模型来操作数据库，查询结果都会以一个名为`Cursor`的对象呈现给你（或你的应用）。`Cursor`本质上与你在几乎所有数据库库中能找到的概念相同，因此如果你曾使用过其他数据库及其编程接口，以下描述会非常熟悉。如果你是数据库和/或游标的新手，可以将它们想象成：一个由查询产生的完整数据集，以及一个指向结果集中当前关注行的指针（或游标位置）。想象一下你最喜欢的文本编辑器或文字处理器中光标位于文档整个文本的某个位置，你就有了一个粗略的概念。在数据库库中，你可以将游标视为整个结果集以及在该结果集中的当前位置。


    这种“数据集加位置指针”的比喻是理解`Cursor`对象强大功能的关键。`Cursor`使你能够执行以下操作及其他更多操作：


    1.  使用`moveToFirst()`和`moveToNext()`等方法移动游标位置并遍历结果集，并使用`isAfterLast()`测试位置。'
  raw: "There are some key implementation steps in the preceding code to\nremember\
    \ for all your SQLite-based Android development. A key step for\nany SQLite-based\
    \ Android application is to create an object from your\nhelper class and ensure\
    \ it is kept for the life of the activities that\nneed it. That usually isn’t\
    \ too hard, and my way of creating this from\nwithin the launcher activity is\
    \ a common one.\nNow that you have your helper object available, any time you\
    \ need to\nwork with the database, your interactions with it will start with\n\
    invoking its `getReadableDatabase()`\nor `getWritableDatabase()`\nmethod to return\
    \ a database object for your underlying SQLite database.\nAs the method names\
    \ suggest, a database object that is readable is used\nfor only reading the database\
    \ with `SELECT` queries,\nwhereas the writable version allows DML statements like\
    \ `INSERT`, `UPDATE`, `DELETE`, and DDL\nstatements for object creation and alteration\
