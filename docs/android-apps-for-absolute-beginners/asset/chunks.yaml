    `,\nwe can alter the look of your application wherever the layout references\n\
    this color resource definition. You can see how this makes development\neasier\
    \ when it comes to consistent color choice and color palette\nthroughout an application’s\
    \ design."
  trans: "\n# 1. CDATA\n\n`CDATA` 值是特殊的 XML 值，它们会被视为逐字数据，并且不会被处理或解析以发现其中是否包含更多嵌套的\
    \ XML 标签。这起初可能不太容易理解，但你会发现它常用于在 XML 文档中传递其他形式的数据标记或展示标记（如 HTML）。其作用是防止那些旨在强制执行\
    \ XML 标准的 XML 解析器和程序，在遇到看起来像 XML、但实际并非 XML 且不遵循 XML 规则的内容时意外出错。\n\n# 2. XML 路径和\
    \ XQuery\n\n`XML 路径`与 `XQuery` 提供了一种遍历 XML 文档、通过浏览标签层次结构、评估属性等方式来查找数据的方法。默认情况下，这些工具不会用于\
    \ Android 应用的基本设计和构建，不过，如果你构建的 Android 应用需要自行处理基于 XML 的数据，那么你当然可以使用它们。\n\n# 3.\
    \ XSLT 和转换\n\n`XSLT` 是 XML 样式表转换语言，它是一种编程语言，旨在查询和转换 XML 的结构与数据，并以此生成衍生数据作为输出。XSLT\
    \ 转换的输出通常是另一个 XML 文档，但它也可以是不同格式的数据。\n\n实际上，有成千上万个网站可以帮助你进一步学习 XML，但现在你已掌握了足够的基础知识，可以深入探究\
    \ Android 如何使用 XML，并开始为你的 Android 应用编写和编辑 XML 文件了。\n\n# 在 Android 应用中使用 XML\n\n\
    正如本章开头所提到的，Android 主要通过三个主要领域使用 XML 来帮助构建和运行应用。回顾一下，它们分别是：\n\n1.  应用清单，我们已经介绍过\n\
    2.  资源定义，尤其是像字符串等常量\n3.  活动布局，这是一个宏大的主题，但可以循序渐进地学习\n\n## 审视 Android 清单 XML 文件\n\
    \n无论你对 XML 的熟悉程度如何——无论你已使用多年，还是刚刚学习了本章前半部分提供的速成课程——我们现在都可以详细探讨 Android 清单。为了便于参考，代码清单\
    \ 8-1 再次给出了 `androidmanifest.xml` 的内容：\n\n```\n代码清单 8-1\n回顾 androidmanifest.xml\
    \ 文件\n```\n\n在第 4 章中，我们强调了该文件的一些元素和其他部分，例如，使用命名空间来唯一标识所有使用 `\"android\"` 命名空间的\
    \ Android 资源元素，并将其绑定到唯一的 `xmlns` 引用 `xmlns:android=\"http://schemas.android.com/apk/res/android\"\
    `，以及使用 `<manifest>` 作为 Android 清单 XML 文档的根元素。但现在我们可以回顾一些其他的元素和属性。\n\n> **注意**\n\
    > \n> 如果你还没注意到，Google 倾向于在 Android 开发的 XML 使用中广泛运用属性。有时，许多人会指出这种做法有些过度，许多属性繁多的元素可以重新设计，改用包含数据值的子元素。这是一个永无止境的理论争论，现在你已具备参与讨论的能力了！\n\
    \n你的清单中通常会有一个 `<application>` 元素标签。该标签的主要属性包括 `android:icon` 和 `android:roundIcon`\
    \ 选项，以及 `android:label` 和 `android:theme` 属性——后者作为一个名称，代表一整套其他样式和设计 XML 设置，你可以采用它们来为应用赋予特定的外观和感觉。你会注意到它们都使用了\
    \ `\"@path/detail\"` 这种形式。`\"@\"` 符号是引用项目 `res/` 层次结构内关键资源的简写——无论是 mipmap 图片控制的应用图标，还是值层次结构中\
    \ `strings.xml` 文件（稍后讨论）里的字符串值等等。我们已经简要介绍过你在代码清单 8-1 中看到的 `<activity>` 元素，并说明了这个特定条目如何将你的\
    \ `MainActivity` Java 活动链接到 Android 应用启动时触发的 `\"MAIN\"` 操作。你的清单可以而且会逐渐包含更多的 `<activity>`\
    \ 元素，为你创建的每个应用活动对应一个元素。请记住，你为应用创建的活动数量实际上没有限制，所以你最终可能会看到很多这样的元素。随着本书的深入，我们将继续深化你对\
    \ Android 清单及其 XML 细微之处的理解。\n\n## 使用 XML 进行资源定义\n\nAndroid 利用 XML 的另一个主要领域是常量和引用值的定义与使用，在这些场景中，给定的数据以只读方式用于一系列用例。有大量的例子可以说明常量数据如何有助于简化应用构建过程，并减少所需的工作量，从确保所有活动和视觉元素具有一致的外观和感觉，到确保诸如珠穆朗玛峰的高度（8848\
    \ 米）、你的应用名称（`\"MyFirstApp\"`）或其他不变的数据值可以在一个地方声明，但在许多其他地方使用。\n\n一些关键的资源定义文件包括：\n\
    \n1.  `colors.xml`：一个提供有用名称（对你而言有意义的）的参考文件，对应各种颜色的红绿蓝（RGB）十六进制表示。\n2.  `strings.xml`：一个用于抽象文本字符串的参考文件，例如简单的单词、短语、句子和段落，这样它们就可以在各种源代码和其他文件中被引用，而无需将文本复制到许多地方。\n\
    3.  `styles.xml`：一个参考文件，用于在自定义样式的名下收集一组颜色定义和其他样式元素，以便该样式可以在整个应用中用作常见的设计主题。\n4.\
    \  `dimens.xml`：一个参考文件，用于提供不同尺寸和大小设置的抽象表示，允许你在一个位置控制密度/大小的变化，而无需在许多不同的文件中编辑许多值。\n\
    \n这些资源文件的定义对于高层次的概念理解来说还不错，但要理解它们*如何*被使用，则还欠缺一些。让我们深入实践，亲自动手，将这些资源文件的内容混搭并添加新的内容。\n\
    \n### 更改颜色\n\n最容易摆弄的 XML 文件是你的 `colors.xml` 文件。该文件可以根据你的需要包含任意数量的颜色别名。默认内容如代码清单\
    \ 8-2 所示。\n\n```\n#6200EE\n#3700B3\n#03DAC5\n\n代码清单 8-2\n默认的 colors.xml 文件内容\n\
    ```\n\n是时候对你的 `MyFirstApp` 应用进行更多更改了。通过修改名称为 `\"colorPrimary\"` 的颜色元素，无论布局在何处引用此颜色资源定义，我们都可以更改应用的外观。你可以看到，在应用整个设计中保持颜色选择和配色方案的一致性时，这如何简化了开发过程。\n"
