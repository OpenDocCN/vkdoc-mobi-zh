- fmt: '## Working with Android: The Challenges


    I wouldn’t be honest if I didn’t flag that Android is blessed in many ways, but
    also has challenges. The good news is that many of these challenges are both well
    known and easily accommodated. Here are some of the areas that a new developer
    is likely to encounter before too long:


    1. You are developing for small devices. Whether we are talking Android phones,
    Android tablets, in-car dashboards, or a range of other form factors, one common
    constraint you will need to deal with is the size of the screen. We will explore
    this topic in depth when we discuss emulating Android devices with virtual devices,
    but always remember that your experience sitting at a desktop or laptop computer,
    building for Android, is different from the experience your users will have on
    the phones and tablets.


    2. Think beyond the screen. Don’t let small screens be your only avenue for providing
    great features and cool capabilities in your applications! As you will see, later
    chapters will explore things like sound and audio, on-board sensors, vibration,
    and more. Don’t become a captive to the screen – you have many more tools at your
    disposal.


    3. Alternatives are a single swipe away. Everyone with an Android device – or
    indeed any smartphone – has first-hand experience of many applications. Users
    have choice, and users will also be running a range of other applications on their
    phones. This means your application might be sharing resources and user attention,
    and users can do all kinds of things you never expected!


    4. Android isn’t always Android. We will be covering the latest versions of Android
    in this book, including Android version 11, which at the time of writing is nearly
    one year old, and previewing Android version 12, which will be released later
    this year as part of Google’s typical annual release cycle for Android updates.
    However, out in the marketplace, the billion or more users I mentioned earlier
    in this chapter are using earlier Android versions. And not just Android 10 or
    Android 9, but versions all the way back to Android 4 and even earlier! Android
    has a complicated history when it comes to encouraging (or even allowing) users
    to upgrade, and this is something to keep in mind when deciding how much of that
    billion-user market to target.


    Whatever you do, do not get disheartened by these points. Think of them more as
    the first set of lessons to learn as you embark on developing Android applications.


    ## Understanding Android’s Heritage and How It Affects You


    Android dates back to 2003, when in October of that year a group of developers
    in Palo Alto got together and used the Linux kernel as the basis for their dream
    of a new age of devices with much more capable interfaces. After struggling in
    its formative years, Google bought the Android business in 2005, and its pre-Google
    cofounder Andy Rubin joined Google to continue the effort developing an operating
    system for smartphones and other gadgets.


    In 2008, after a few false starts, Google and its partners HTC and T-Mobile released
    the first handset, known as the “Dream” or “G1,” depending on which country you
    were in. My very own G1 still runs to this day, but is no longer my daily go-to
    phone. Figure [1-2](#499629_1_En_1_Chapter.xhtml#Fig2) shows my G1 at the original
    lock screen.


    ![../images/499629_1_En_1_Chapter/499629_1_En_1_Fig2_HTML.jpg](images/499629_1_En_1_Chapter/499629_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    The author’s original G1 Android phone, from 2008


    After this first release, momentum slowly ramped up for Android, and updates to
    the operating system started appearing with the names of sweet treats as code
    names – Cupcake, Donut, Eclair, and so on, representing versions 1.5, 2.0, and
    2.1.


    Around the time of first public release, Google also partnered with telcos, chip
    companies, and handset manufacturers to create the Open Handset Alliance, which
    was aimed at building a broad coalition to support Android into the future. Google
    also moved to establish the “Android Open Source Project” as the custodian for
    the base open source code for Android.


    There is much more to the story of Android, with many new versions of software
    and many new manufacturers joining in the fun. But the preceding points were the
    unheralded start of several of the issues that Android developers must contend
    with as they build applications.


    With many companies moving to build Android-powered phones, Google did not directly
    control how Android was maintained on each manufacturer’s devices nor how telcos
    in major markets managed the consumer lifecycle of phones as part of contracts,
    sales, and so forth. What emerged over the coming years after the initial releases
    of Android was a market with many different devices, running many different versions
    of Android, with very patchy upgrade guarantees. This is known in the Android
    world as the fragmentation problem.


    For developers, this means that building applications for Android requires some
    extra effort in thinking about the population of devices in the wild and what
    versions of Android they run. At the time of writing this book, Google has made
    a range of efforts to make this less of a concern and encourage manufacturers
    to upgrade devices. This is having some impact. Google has also added a range
    of developer features to ease the effort required of you, the developer, to handle
    this varied market, and we will discuss several of these features in later chapters.


    In closing this topic, Figure [1-3](#499629_1_En_1_Chapter.xhtml#Fig3) shows a
    view of the current distribution of Android versions in use throughout the world
    in mid-2020.


    ![../images/499629_1_En_1_Chapter/499629_1_En_1_Fig3_HTML.jpg](images/499629_1_En_1_Chapter/499629_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Android versions and API levels in use in 2020


    Note the somewhat self-flattering presentation of these numbers. Instead of reporting
    the absolute fraction of devices in use for each version of Android, you are instead
    shown the “cumulative distribution” for devices running a particular version or
    later. It is easy enough to perform the arithmetic to work out the real absolute
    percentages. For example, 11.2% of devices run Android 6.0 “Marshmallow,” being
    the difference between its 84.9% cumulative distribution and Android 7.0’s 73.7%
    cumulative distribution. At the time of writing, Android 11 had been released
    for several months, but was not yet showing in the statistics. Android 12 is slated
    for release later in this current year, with only minor tweaks to Android 11.
    Rest assured both Android 11 and then Android 12 will rocket up the charts and
    be a good basis for learning Android development.


    The takeaway from this discussion is that to target a meaningful percentage of
    Android devices, you will want to embrace Android capabilities from several versions
    in the past, rather than only cater to the bleeding edge.


    ## Understanding Android’s Future


    A system like Android, with billions of users already, can already be considered
    a roaring success. But there’s plenty of growth and opportunity left for Android,
    in a wealth of new areas. For instance, a great deal of attention is now centered
    on how Android will be part of “hybrid” computing in the future. This hybrid model
    is where some devices use Android for part of the operation, serving up applications
    just as your smartphone does today, but switch to using a second operating system
    like Chrome OS for other tasks.


    Android will also follow a regular path of updates itself, as will many of the
    great online services like Google Play and other cloud offerings, which will further
    push the boundaries of what’s possible with Android devices and Android applications.'
  raw: '## Working with Android: The Challenges


    I wouldn’t be honest if I didn’t flag that Android is blessed in many ways, but
    also has challenges. The good news is that many of these challenges are both well
    known and easily accommodated. Here are some of the areas that a new developer
    is likely to encounter before too long:


    1.  You are developing for small devices. Whether we are talking Android phones,
    Android tablets, in-car dashboards, or a range of other form factors, one common
    constraint you will need to deal with is the size of the screen. We will explore
    this topic in depth when we discuss emulating Android devices with virtual devices,
    but always remember that your experience sitting at a desktop or laptop computer,
    building for Android, is different from the experience your users will have on
    the phones and tablets.


    2.  Think beyond the screen. Don’t let small screens be your only avenue for providing
    great features and cool capabilities in your applications! As you will see, later
    chapters will explore things like sound and audio, on-board sensors, vibration,
    and more. Don’t become a captive to the screen – you have many more tools at your
    disposal.


    3.  Alternatives are a single swipe away. Everyone with an Android device – or
    indeed any smartphone – has first-hand experience of many applications. Users
    have choice, and users will also be running a range of other applications on their
    phones. This means your application might be sharing resources and user attention,
    and users can do all kinds of things you never expected!


    4.  Android isn’t always Android. We will be covering the latest versions of Android
    in this book, including Android version 11, which at the time of writing is nearly
    one year old, and previewing Android version 12, which will be released later
    this year as part of Google’s typical annual release cycle for Android updates.
    However, out in the marketplace, the billion or more users I mentioned earlier
    in this chapter are using earlier Android versions. And not just Android 10 or
    Android 9, but versions all the way back to Android 4 and even earlier! Android
    has a complicated history when it comes to encouraging (or even allowing) users
    to upgrade, and this is something to keep in mind when deciding how much of that
    billion-user market to target.


    Whatever you do, do not get disheartened by these points. Think of them more as
    the first set of lessons to learn as you embark on developing Android applications.


    ## Understanding Android’s Heritage and How It Affects You


    Android dates back to 2003, when in October of that year a group of developers
    in Palo Alto got together and used the Linux kernel as the basis for their dream
    of a new age of devices with much more capable interfaces. After struggling in
    its formative years, Google bought the Android business in 2005, and its pre-Google
    cofounder Andy Rubin joined Google to continue the effort developing an operating
    system for smartphones and other gadgets.


    In 2008, after a few false starts, Google and its partners HTC and T-Mobile released
    the first handset, known as the “Dream” or “G1,” depending on which country you
    were in. My very own G1 still runs to this day, but is no longer my daily go-to
    phone. Figure [1-2](#499629_1_En_1_Chapter.xhtml#Fig2) shows my G1 at the original
    lock screen.


    ![../images/499629_1_En_1_Chapter/499629_1_En_1_Fig2_HTML.jpg](images/499629_1_En_1_Chapter/499629_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    The author’s original G1 Android phone, from 2008


    After this first release, momentum slowly ramped up for Android, and updates to
    the operating system started appearing with the names of sweet treats as code
    names – Cupcake, Donut, Eclair, and so on, representing versions 1.5, 2.0, and
    2.1.


    Around the time of first public release, Google also partnered with telcos, chip
    companies, and handset manufacturers to create the Open Handset Alliance, which
    was aimed at building a broad coalition to support Android into the future. Google
    also moved to establish the “Android Open Source Project” as the custodian for
    the base open source code for Android.


    There is much more to the story of Android, with many new versions of software
    and many new manufacturers joining in the fun. But the preceding points were the
    unheralded start of several of the issues that Android developers must contend
    with as they build applications.


    With many companies moving to build Android-powered phones, Google did not directly
    control how Android was maintained on each manufacturer’s devices nor how telcos
    in major markets managed the consumer lifecycle of phones as part of contracts,
    sales, and so forth. What emerged over the coming years after the initial releases
    of Android was a market with many different devices, running many different versions
    of Android, with very patchy upgrade guarantees. This is known in the Android
    world as the fragmentation problem.


    For developers, this means that building applications for Android requires some
    extra effort in thinking about the population of devices in the wild and what
    versions of Android they run. At the time of writing this book, Google has made
    a range of efforts to make this less of a concern and encourage manufacturers
    to upgrade devices. This is having some impact. Google has also added a range
    of developer features to ease the effort required of you, the developer, to handle
    this varied market, and we will discuss several of these features in later chapters.


    In closing this topic, Figure [1-3](#499629_1_En_1_Chapter.xhtml#Fig3) shows a
    view of the current distribution of Android versions in use throughout the world
    in mid-2020.


    ![../images/499629_1_En_1_Chapter/499629_1_En_1_Fig3_HTML.jpg](images/499629_1_En_1_Chapter/499629_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Android versions and API levels in use in 2020


    Note the somewhat self-flattering presentation of these numbers. Instead of reporting
    the absolute fraction of devices in use for each version of Android, you are instead
    shown the “cumulative distribution” for devices running a particular version or
    later. It is easy enough to perform the arithmetic to work out the real absolute
    percentages. For example, 11.2% of devices run Android 6.0 “Marshmallow,” being
    the difference between its 84.9% cumulative distribution and Android 7.0’s 73.7%
    cumulative distribution. At the time of writing, Android 11 had been released
    for several months, but was not yet showing in the statistics. Android 12 is slated
    for release later in this current year, with only minor tweaks to Android 11\.
    Rest assured both Android 11 and then Android 12 will rocket up the charts and
    be a good basis for learning Android development.


    The takeaway from this discussion is that to target a meaningful percentage of
    Android devices, you will want to embrace Android capabilities from several versions
    in the past, rather than only cater to the bleeding edge.


    ## Understanding Android’s Future


    A system like Android, with billions of users already, can already be considered
    a roaring success. But there’s plenty of growth and opportunity left for Android,
    in a wealth of new areas. For instance, a great deal of attention is now centered
    on how Android will be part of “hybrid” computing in the future. This hybrid model
    is where some devices use Android for part of the operation, serving up applications
    just as your smartphone does today, but switch to using a second operating system
    like Chrome OS for other tasks.


    Android will also follow a regular path of updates itself, as will many of the
    great online services like Google Play and other cloud offerings, which will further
    push the boundaries of what’s possible with Android devices and Android applications.'
