    an Arm-based development machine, you will need to bootstrap all of your work
    with your own build tools, work around the absence of easily bundled Android SDKs,
    and more. That’s not a challenge I would recommend.


    ### Too Much Memory Is Never Enough!


    I sometimes wish it was as easy to add memory to myself as it is to add it to
    a desktop computer. For now, you and I will just have to be satisfied with the
    buying RAM for the sake of better developer firepower.


    If you think back to Chapter [2](#499629_1_En_2_Chapter.xhtml), you’ll recall
    that Google recommends a minimum of 4 GB of RAM for Android Studio and a preferred
    base level of 8 GB. It’s actually quite difficult to buy new computers with only
    4 GB of RAM. So, to quote a famous movie, 8 is enough, right?


    Not so fast! You can certainly be productive and make Android applications on
    a computer with 8 GB of RAM. In fact, I’m writing a good portion of this book,
    and building some of the examples you see, on a 2015-era MacBook Air with 8 GB
    of memory, so it is more than just theoretically possible. However, I can tell
    you that it has its clear limitations and frustrations. Some notable examples
    are where I am trying to run Android Studio and an AVD, plus one of the open source
    tools I discuss later in this chapter and throughout the book for image and video
    manipulation. That 8 GB gets exhausted quickly, and the MacBook dutifully starts
    increasing – and increasingly using – swap space on disk to juggle real memory
    and the greater demands I’m placing on it.


    Contrast this with my trusty desktop machine. It is even older, being a “vintage”
    Dell Precision workstation from nearly a decade ago – I’m not sure Dell even makes
    these any more. But it has 32 GB of memory and does not skip a beat using Android
    Studio, multiple AVDs simultaneously, and several other tools thrown in for good
    measure.


    Note


    You can tell from my setup that I’m not exactly taking affiliate fees or kickbacks
    on recommending hardware for you to buy. If you have a time machine, please do
    jump back to 2010 or 2015 to buy your version of my hardware!


    My succinct advice to you if you are specifying your own Android developer system
    is this: no one ever complained they had too much RAM! If you can, get at least
