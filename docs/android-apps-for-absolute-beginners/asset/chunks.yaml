    # 服务声明与通信


    要声明你的服务应用，你需要在 `AndroidManifest.xml` 文件中进行适当的声明。首先要将 `<service>` 元素作为 `<application>`
    元素的子元素进行核心定义。清单 18-2 展示了服务的基本条目，包括必需的 `android:name` 属性，此处其值为 "`Skeleton`"。


    ```

    清单 18-2

    AndroidManifest.xml 文件中的最小服务定义

    ```


    你可以在同一个项目中自由地混合定义服务和活动，因此它们也可以放在同一个 `AndroidManifest.xml` 文件中。你会发现，这种操作方式在与其自身服务一起开发的应用程序中很常见。当你创建服务时，并不总是希望允许任意应用程序绑定并使用它们。在这些情况下，你可以使用
    `<service>` 元素中的 `android:permission` 属性来限制访问。


    ## 服务通信


    定义新服务并不比本章已概述的步骤更复杂。一旦你创建了服务，控制客户端应用（如活动和其他服务）如何与你的服务交互，就需要多费些心思。与服务通信的客户端（活动或服务）有两种可能的路径：启动命令或绑定。当涉及你的服务向客户端回传通信时，选项会扩展到很多，供开发者选择。


    ### 客户端到服务的通信


    当任何类型的客户端（无论是活动、片段还是其他服务）想要与服务协作时，一个核心问题将指导你选择两种通信方式中哪一种更适合当前任务。这个请求是一次性的、不再重复的服务为客户端执行某事的请求吗？在这些单次交互的情况下，命令方式的服务通信是最佳选择。如果客户端需要通过一系列操作与服务协作，并保持与服务持续交互，那么服务绑定是正确的方法。


    ## 使用 `startService()` 调用命令


    让服务为客户端应用（无论是活动还是其他来源）执行任务的最简单方法是调用 `startService()` 方法。在第 17 章中，我们介绍了 `startActivity()`
    方法，它可以通过接收一个意图和一些参数来触发任意活动。类似地，`startService()` 方法也接受一个意图和一组意图附加参数作为参数，让你将特定于上下文的负载传递到接收服务。调用
    `startService()` 的最基本形式如下：


    ```

    startService(someSignatureIntent);

    ```


    这种调用 `startService()` 的基本形式将预期的 `Intent` 类作为唯一的参数。调用 `startService()` 是异步的，你的应用程序的主线程（负责管理主
    UI）不会阻塞等待响应，而是会立即继续其正常的生命周期。调用 `startService()` 将触发 Android 启动该服务（如果尚未启动），并且无论是在已启动还是将启动的流程中，Android
    都会将第一个参数中的意图传递给 `onStartCommand()` 方法。你的服务实现可以根据你在 `onStartCommand()` 方法中编码的逻辑，检查并使用该意图，以及可选地在第二个参数中检查和使用数据负载。


    虽然调用方应用不会因服务调用而被阻塞，但你的服务将在其主线程中处理 `onStartCommand()` 方法，因此你应注意不要承担过多繁重的处理、阻塞外部调用或任何其他可能妨碍快速响应的耗时工作。如果你确实需要在服务逻辑中执行此类长时间运行的工作，你可以考虑使用
    `java.util.concurrent` 包及其执行器和相关功能，在主服务线程之外添加更多线程来执行这项工作。


    使用 `startService()` 的“发射后不管”特性意味着它不会向调用方应用返回常规意义上的负载或响应。对于需要返回结果的情况，服务到客户端的通信方式更为合适，这将在本章后面介绍。`startService()`
    调用确实会返回一个值，以指示调用是成功完成还是因资源不足或其他原因而被终止。此返回值来自一个小的预定义集合，你通常会看到以下内容：


    1.  `START_STICKY`：一旦 Android 有足够的空闲内存，就重启服务，但不要关心触发意图，而是传递一个空意图。

    2.  `START_NON_STICKY`：根本不要自动重启服务，即使 Android 资源压力降至足够低的水平也不重启。这隐含地意味着，在你的应用或其他应用显式调用
    `startService()` 或重新调用服务之前，该服务不会启动。

    3.  `START_REDELIVER_INTENT`：一旦 Android 有足够空闲内存，就重启服务，并尝试重新传递在原始（失败）调用时传递给服务的原始
    `Intent` 对象。


    一旦服务启动，无论是通过 `startService()` 调用还是其他方式，它都将无限期运行，除非设备上资源不足，可能由于 Android 作为更广泛的资源管理的一部分而将其终止。这符合一个概念：一旦你的客户端获得了它想要的东西，它就不会再关心之后服务会发生什么。从开发者的角度来看，你可能时不时要考虑你的服务是否在做有用的事情，如果缺乏客户端需求，则确定它无事可做并优雅地关闭。服务终止自身有两种主要方式，如下所示：


    1.  使用 `stopService()` 方法。与 `startService()` 类似，你调用 `stopService()` 并传入一个参数，该参数是用于启动服务的相同意图，或者是派生类的意图。服务将被停止，所有资源将被释放，状态将被销毁。由于
    Android 不跟踪对某个服务的 `startService()` 调用的来源或数量，因此它也同样不区分是哪个客户端发送了相应的 `stopService()`
    调用。无论服务的生命周期中接收了多少次 `startService()` 调用，都只需要一个 `stopService()` 命令。

    '
- fmt: '### 2. Code your service with a `stopSelf()` call


    Your service can control its own demise, and you might look to do this as part
    of some logical culmination to the work your service performs, such as when a
    music track has finished playing or a file download completes.


    When building your own services, feel free to explore both approaches to managing
    their termination. Alternatively, you can leave this to Android’s general service
    cleanup capabilities. If you choose to use service binding as the method for working
    with a service, the cleanup and shutdown mechanisms are very different.


    ## Using the Bind Approach with Services


    The single-shot approach of using `startService()` for one-time interaction with
    a service is a very useful mechanism. There are times where you will want to interact
    with a service multiple times or in more complex situations that need more than
    a single to-and-fro, such as sending successive commands or exchanging data in
    both directions so your application can perform some useful work for its user.


    This is where the binding approach with `bindService()` steps in. Binding to a
    service sets up a two-way communication channel so your application can access
    the service’s API via its `Binder`. A `Binder` is the object returned to the calling
    application from the `bindService()` call and is then used for all subsequent
    activity. A client using the bind approach can signal to Android that it wants
    the service started if it is currently stopped, by using the `BIND_AUTO_CREATE`
    flag. One difference from the `startService()` approach is that once a client
    releases the bind with the service, the service will be marked as capable of being
    shut down. We will cover the mechanics of shutdown in these circumstances later
    in the chapter.


    ### Caution


    When invoking a service that may not be running, if you do not provide the `BIND_AUTO_CREATE`
    flag as part of the `bindService()` call, then you risk the method returning `false`
    (and not providing you a `Binder` object) if the service was not already running.
    The lesson here is to not rely on hunches or assumed state for the service. Instead,
    always practice clean exception handling and always check for `bindService()`
    failure regardless of the circumstances.


    When Android is under memory pressure, it can help to signal that you can cope
    with a sudden shutdown of the service you are working with, using the `BIND_ALLOW_OOM_MANAGEMENT`
    flag. This flag signals that your application’s binding is not considered critical
    and it can tolerate the sudden disappearance of the service terminating in an
    out-of-memory circumstance. At its simplest, you are flagging that you are happy
    to sacrifice your binding (and `Binder` object) for the greater good of the device
    and all the other applications running on it.


    An application’s call to `bindService()` is an asynchronous call, which includes
    the intent used to identify the service and optionally the `BIND_AUTO_CREATE`
    flag. Because `bindService()` is asynchronous, you will not know the results and
    subsequent state of the service until the `ServiceConnection` object is interrogated
    and the resulting `Binder` object is returned from `onBind()`. Once you confirm
    these have been instantiated and are available, you can start calling the `Binder`
    methods and actually interact with the functionality of the service. It’s normal
    for you to subclass the `Binder` methods to actually implement whatever logic
    you intend your service to have.


    Your application can keep the `ServiceConnection` object – and the implicit connection
    to the service – in existence for as long as you like. When you have completed
    working with the service, you call the `unbindService()` method to indicate that
    your service binding can be released, and the `ServiceConnection` object and associated
    resources are freed. This unbinding eventually leads to `onServiceDisconnected()`
    being called, along with the `Binder` object falling out of scope, meaning any
    custom logic you’ve built and presented via its API-like methods should no longer
    be invoked. Should any other applications have bound to the service, your call
    to `unbindService()` will not cause the service to be stopped. In practice, the
    last client application to unbind is the one that will trigger Android to then
    shut down the service.


    ## Service-to-Client Communication


    As we have explored services so far in this chapter, you can see how client-to-service
    communication is well supported by the command approach and the bind approach.
    When it comes to communicating from a service to a client, there are a range of
    options to cover almost any scenario you can imagine. Let’s explore the main options
    and keep in mind that these approaches are not quite as structured as the `startService()`
    and `bindService()` options for client-to-service communication.


    ### Using `bindService()` Methods for All Communication


    When considering how services communicate back to their interested clients, the
    first option to consider is having interaction happen via `bindService()` and
    the methods you create for clients to use. The advantage of the bind approach
    is that you control exactly what the client receives by the returned objects and
    information from your service methods and get guarantees that the client actually
    gets what it asks for because the only way for the client to receive what it wants
    is to call your API methods.


    The clear disadvantage to this approach is that clients not using `bindService()`
    to set up a durable duplex channel with your service won’t be able to receive
    anything – any client that interacts via `startService()` calls is just out of
    luck! That might sound acceptable now, but it’s good practice to design your service
    to accommodate many different client use patterns.'
