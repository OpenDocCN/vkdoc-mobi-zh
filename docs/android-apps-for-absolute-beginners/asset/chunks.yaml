    清单 4-2 项目级别的 `build.gradle` 文件


    你拥有各种配置设置来控制应用程序的构建方式，这些设置主要分为几个关键领域。它们是 SDK 版本管理和应用程序版本管理、构建目标的应用类型，以及作为项目基础所需的依赖项、插件和库的包含。


    #### 理解 SDK 版本参数


    你会注意到有几个参数提到了 SDK 版本，包括 `compileSdkVersion`、`minSdkVersion` 和 `targetSdkVersion`。它们服务于不同但互补的目的：


    1.  `compileSdkVersion`：指示 Android Studio 在你实际编译和构建应用程序时使用哪个版本的 SDK（从你安装的多个可能版本中选取）。通常你会选择你拥有的最新
    Android SDK 版本。

    2.  `minSdkVersion`：为应用程序中原生 API 功能的使用设置门槛，并由此决定哪些版本的 Android 和 Android SDK 能原生支持你的应用程序。这进而设定了可以使用你应用程序的最旧设备。较新
    API 级别引入的功能将尽可能通过支持库或 Android Jetpack（稍后讨论）来处理。

    3.  `targetSdkVersion`：控制你的应用程序将尝试使用的最新 API 功能，即使 `compileSdkVersion` 是比它更新的版本也是如此。这意味着你可以受益于更新
    SDK 在编译时提供的效率，但不必被迫接受应用程序行为的重大改变，直到你显式地提升 `targetSdkVersion`。


    #### 理解应用程序版本管理


    在发布 Android 应用程序时，与几乎所有其他软件一样，版本管理的概念用于标识修复错误、添加新功能、改进现有行为等的后续版本。


    Android 使用你在 `build.gradle` 文件中找到的两个参数。最重要的是 `versionCode` 参数，它传统上是跟踪应用程序的特定构建/发布版本号的参数。`versionCode`
    参数是一个整数，当你发布新版本时，它只应递增。


    **注意**


    在内部，从 SDK 版本 28 开始，Android 还提供了更新的 `versionCodeMajor` 参数。这是一个 `long` 值，而不是 `integer`，因此可以保存更大的值。目前，只有通过在
    Android 清单 XML 文件中加入 `versionCodeMajor="n"` 表示法才能成功设置此值。Gradle 构建文件目前不支持此参数。


    Android 也提供了一种机制来向用户显示某种有意义的、人类可读的版本信息，这个信息源自 `versionName` 字符串值。如果你想尝试向用户传达关于主要版本和次要版本之类的信息（这是软件开发中的传统习惯，尽管并非必需），这对你作为开发者会有所帮助。

    '
- fmt: '#### Including Libraries for Forward and Backward Version Support


    The last aspect of your Gradle build files to note for now is the dependencies
    section. I won’t go into each dependency that is being declared at this stage,
    as we’ll return to each one when we discuss their particulars in later sections
    on testing, handset/version compatibility, and more. The one common aspect I will
    highlight is the namespace for many of the dependencies. You will note the leading
    component name is `androidx`. The name `androidx` refers to Android Jetpack, which
    was a recent update and refresh of the way Android allows you as a developer to
    target many different versions of SDK without needing to know of them in advance
    – in effect, future-proofing your application against some of the changes that
    get incorporated into later SDK releases while also allowing you to build applications
    with the capabilities of contemporary SDK releases and letting Android and Jetpack
    worry about how to mimic such newer behavior when running on devices with older
    versions of Android that don’t support your SDK version explicitly. Jetpack also
    helps reduce some of the verbosity of writing software in Java, by reducing boilerplate
    code and helping you follow good practices that have been learned by the Android
    developer community over time.


    Jetpack is replacing an older approach, known as the Android Support Libraries,
    but you will still see Support Libraries in many references and discussions, and
    the two will live side by side for some time to come.


    ## Explaining the Key Android Application Logical Building Blocks


    You now have some view of the project structure and layout within Android Studio.
    But at several points in this chapter, I have mentioned some of the fundamental
    logical building blocks of an Android application, such as activities and services.
    Now’s the time to get a little more understanding of what these building blocks
    are and how they fit together to bring your application to life.


    ### Activities


    If you have used any existing Android application, you would have experienced
    that it has some themes in common with most software that comes with a user interface.
    Like other software with UIs, Android uses the concept of a “screen” or “view”
    where users actually interact with your program. Android calls these activities,
    and whether you want your users to read text, watch a video, enter data, make
    a phone call, play a game, or what have you, your users will do this by interacting
    with one or many activity screens or layouts that you design.


    Activities are one of the easiest, and computationally cheapest, parts of Android
    to develop, and you should be generous with your creation and use of them in your
    application. Not only will this help your users get a great experience from your
    application but the Android operating system is designed with the proliferation
    of activities in mind and provides lots of help in managing them.


    ### Intents


    Intents are the internal messaging system of Android, allowing pieces of information
    to be passed between applications and to and from the Android environment. In
    this way, your application can trigger actions and share data with Android and
    other applications, and it can also listen out for events that are happening and
    take action when appropriate.


    The Android operating system already has a very wide range of intents that your
    application can interact with, and as a developer you can also define and develop
    your own intents for your own uses.


    ### Services


    Services are a common concept in much of the computing world, and while there
    are slight differences when dealing with them in Android, many of the common concepts
    still apply. Services are applications that typically have no user interface and
    instead run in the background. Services offer up a range of features, capabilities,
    or behaviors that are typically in demand by multiple applications. Services typically
    are long-lived, humming along in the background helping out your application and
    others as demanded.


    ### Content Providers


    There are many types and derivations of data that your application might want
    to use that you yourself don’t control. Lots of other applications have similar
    data demands, and so Android ships with the concept of Content Providers, which
    are a way of abstracting datasets and data sources. This abstraction tries to
    simplify interacting with lots of varied data sources, including files, databases,
    streaming protocols, and other ways of accessing data, bringing some logical consistency
    to you as the developer. Rather than having to learn a different custom way of
    working with data for every set or type of data you want to use, you learn the
    Content Provider approach once and can use it repeatedly across many different
    Content Provider data sources.


    You can also build and share your own Content Providers, facilitating data sharing
    and interaction with other applications.


    ## Summary


    You now have a feel for how a typical Android development project is structured
    and how some of the major building blocks of an Android application are brought
    together both logically and during building the application, to create a single
    finished application. We will continue building on the pieces described in this
    chapter, expanding our exploration of many of them so that you appreciate how
    more and more sophisticated applications are built.


    # 5. Android Studio In-Depth


    Long-time users of IDEs like Android Studio usually develop a very strong, very
    parochial view of how important their chosen IDE is – not only to their productivity
    but also to their enjoyment of writing applications. In this chapter, my goal
    is to expose and explore some of the key features of Android Studio that will
    make you more productive and happier as you build your Android applications.


    Android Studio by itself is a huge topic. There are entire books written just
    on Android Studio itself and how to squeeze the most out of it as an IDE. Some
    great examples from Apress – the publisher of this book – are *Android Studio
    IDE Quick Reference* (authored by Ted Hagos, ISBN 978-1-4842-4953-6) and the *Learn
    Android Studio* series (also authored by Ted Hagos). We don’t have the luxury
    in this book to devote all the remaining chapters to Android Studio itself, but
    if this chapter gets you excited for the possibilities a great IDE provides, you
    know where to go next. For now, let’s delve into some of the key parts of Android
    Studio you should get to know right now.


    ## Starting with the Project Explorer


    Back in Chapter 4, we briefly introduced the Project Explorer and a few of its
    capabilities, showing off the Android perspective and the Project Files perspective.
    We briefly explored those two views of your project, but didn’t dwell on the other
    Project Explorer view options. That leaves us wondering, what are all those other
    views for?


    I’m glad you asked. Broadly, the other view options for Project Explorer are meant
    to satisfy two compatible desires. First, these views provide you with different
    ways to look into your project, often emphasizing or focusing on one particular
    area so that your time can be spent getting things done, rather than fighting
    the layout of Android Studio. Second, these views also support your personal preferences
    and desires as a developer and how you prefer to work.'
