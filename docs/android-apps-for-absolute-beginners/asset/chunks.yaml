  trans: "\n#### 培养 Java 特定编码知识\n\n正如我之前所说，学习整个 Java 是一项艰巨的任务。为 Android 学习 Java 虽然不那么令人望而生畏，但仍需掌握大量\
    \ Java 相关知识。为了让你入门，以下列出需要开始掌握的关键领域，并附上一些最佳免费在线资源链接。虽然我会引用免费在线资源《Java 编程维基教科书》，但许多其他在线资料也同样优质。你还可以从\
    \ Android 专属 Java 书籍中获益良多，例如 Apress 出版社的 *《学习 Java 进行 Android 开发》*（Späth 和 Friesen\
    \ 著，ISBN 9781484259429）。\n\n#### 接口与实现\n\n理解 Java 对象如何构建和扩展其他对象，并通过具体的实现机制提供一个派生版本应遵循的模板。参见\
    \ [`http://en.wikibooks.org/wiki/Java_Programming/Interfaces`](http://en.wikibooks.org/wiki/Java_Programming/Interfaces)。\n\
    \n#### 线程与并发\n\n尤其是在多核 CPU 时代，并发和线程提供了同时执行多个工作流的方法，但需要小心谨慎。参见 [`http://en.wikibooks.org/wiki/Java_Programming/Threads_and_Runnables`](http://en.wikibooks.org/wiki/Java_Programming/Threads_and_Runnables)。\n\
    \n#### 垃圾回收\n\nJava 是最早采用精细管理内存等资源方法的语言之一，旨在将开发者从追踪和手动释放资源分配（至少可以说是一项容易出错的任务！）中解放出来。请参阅\
    \ [`https://en.wikibooks.org/wiki/Java_Programming/Java_Overview`](https://en.wikibooks.org/wiki/Java_Programming/Java_Overview)\
    \ 中关于自动内存垃圾回收的部分。\n\n#### 异常处理\n\n当问题发生时，目标是提供安全、结构化且信息丰富的方式来得体地处理问题。参见 [`http://en.wikibooks.org/wiki/Java_Programming/Exceptions`](http://en.wikibooks.org/wiki/Java_Programming/Exceptions)。\n\
    \n#### 文件处理\n\n虽然我们的 `FirstJavaDemo` 应用让用户直接在控制台通过打字输入数据，但更常见的方式是使用文件及其管理规则来消费和创建数据。参见\
    \ [`http://en.wikibooks.org/wiki/Java_Programming/BasicIO`](http://en.wikibooks.org/wiki/Java_Programming/BasicIO)。\n\
    \n#### 泛型\n\nJava 理论上是一种“强类型”语言，这意味着它提供了护栏和保护，确保 `String`、`integer` 和其他类型永远不会以不兼容的数据负载形式存在，并且一种类型的数据不会意外地被放入另一种类型的变量中。这是一个关键的保护机制，但在某些情况下会造成不灵活性。泛型提供了一种方式来保持强类型特性，同时避免在支持不同类型数据的相同通用逻辑时出现不必要的重复和过度复制。参见\
    \ [`http://en.wikibooks.org/wiki/Java_Programming/Generics`](http://en.wikibooks.org/wiki/Java_Programming/Generics)。\n\
    \n#### 集合\n\n就像整数等原始数据类型可以分组为数组一样，对象也可以分组为便捷的集合。集合是 Java 支持将对象组作为集合进行操作的一种方式（但不是唯一方式）。参见\
    \ [`http://en.wikibooks.org/wiki/Java_Programming/Collections`](http://en.wikibooks.org/wiki/Java_Programming/Collections)。\n\
    \n## 总结\n\n没有任何一个单独的章节——或一整本书——能成为你完整的 Java 入门指南，但在本章中，我们已尽了最大努力。现在，你已经掌握了关于 Java\
    \ 语言、Java 软件产品、Java 对 Android 的意义，以及学习路线图和帮助你精进 Java 技能的资源。我强烈建议 Java 新手在继续阅读本书其余部分之前，先探索本章提到的其他资源，甚至更多可在商业和网络上免费获取的海量资源。即使只是少量的附带阅读和实践，也将对你理解\
    \ Android 带来巨大回报。\n\n# 8. 为 Android 开发介绍 XML\n\n本章将探讨两个主题。首先，我们将从初学者的角度审视 XML，面向那些从未接触过\
    \ XML，也未曾深入了解其使用模式、特性、优势和问题的人。本章的第二部分将涵盖 Android 开发中你通常会接触到的三个主要领域，涉及读取、编写和编辑\
    \ XML：\n\n1.  应用清单，我们之前已经介绍过\n2.  资源定义，特别是诸如字符串等常量\n3.  活动布局，这是一个庞大的主题，但可以循序渐进地学习\n\
    \n## XML 入门\n\n可扩展标记语言，即 XML，是更早的标准 SGML（标准通用标记语言）的一个子集。XML 的目标是以标准化的结构来传递数据及其相关信息（即元数据），这种结构可以在不了解数据含义或结构规则的情况下被查询和使用。我知道，这是一个相当抽象的定义。维基百科提供了另一种定义：\n\
    \n> *可扩展标记语言（XML）是一种标记语言，它定义了一组规则，用于以人类可读且机器可读的格式对文档进行编码。*\n> \n> ——[`https://en.wikipedia.org/wiki/XML`](https://en.wikipedia.org/wiki/XML)，2020\
    \ 年 7 月\n\n作为定义，这并没有好到哪里去。一个更实用的定义可能是：\n\n> *XML 是一种标记语言，它定义了如何交换数据，以及如何描述被交换的数据，以便人类和机器都能理解数据、其结构以及与其他数据的关系。*\n\
    > \n> ——Grant Allen，2020 年 7 月\n\n这仍然不完美，但已经很接近了。遗憾的是，这个评价不仅适用于我的简短描述，也适用于整个 XML。也许构建你对\
    \ XML 理解的更好方法是实际深入其结构和运作方式。\n\n关于 XML 的一些关键点。严格来说，XML 不是一种编程语言……用 XML 编写的东西不会“执行”任何操作。XML\
    \ 是一种标记语言，旨在为数据传达含义和结构，以便程序和编程语言可以用这些数据做事情。\n\n当你创建 XML 时，你是在将文本放入一个文档中，该文档的某些方面受\
    \ XML 标准和规则约束——这被称为 XML 文档。无论 XML 文档变得多么复杂或令人费解，你始终可以退后一步，将其视为纯粹的文本——某些地方具有特殊含义、并遵循约定的结构和语法规则的文本，但归根结底仍是文本。\n\
    \nXML 没有预设定义 XML 文档中需要哪些预定义的组件。它确实定义了如何使用基本构建块在文档中定义你自己组件的规则和语法。XML 及其规则的总体目标是提供一种独立于机器/程序的方式来描述和打包数据，并使描述和结构在\
    \ XML 文档本身或相关联的 XML 模式中自描述。\n\n让我们来看看关键的 XML 构建块。\n"
- fmt: "### XML Version and Encoding\n\nThere should be a special tag at the start\
    \ of an XML document that indicates which version of the XML standard it follows\
    \ and what character encoding is used for the text in the XML (ASCII, UTF-8, etc.).\
    \ By default, and throughout almost all your Android development, this declaration\
    \ will stipulate XML version 1.0 and UTF-8 encoding. The special tag takes the\
    \ following form, using the special `<?xml` and `?>` opening and closing markers:\n\
    \n```\nThis helps any program reading and consuming your XML document\nunderstand\
    \ how to interpret the text and the XML structure.\n```\n\n### XML Elements\n\n\
    Elements are the fundamental building blocks of XML, being the \"tags\" that provide\
    \ the meaning and structure for your data, but are themselves not data. XML elements\
    \ are nested, such that your first, outermost element in your XML document is\
    \ known as the root element, and it can contain (have nested within it) one or\
    \ more child elements. There is only ever one root element in an XML document.\n\
    \nElement tags are enclosed in the `<` (greater than) and `>` (less than) symbols.\
    \ For each element I define and use, I will require an opening tag and a matching\
    \ closing tag with the same name, with a leading `/` (backslash) added to the\
    \ element name in the closing tag. This approach must be used to make my XML syntactically\
    \ correct – known as \"well formed\" in XML's jargon. For instance, I might decide\
    \ to create an XML document for holding contact details for people in a data structure\
    \ mimicking an address book and decide that my root element will be called `<addressbook>`.\n\
    \nMy XML document would start out looking like this:\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n</addressbook>\n```\n\nThat includes\
    \ the version and encoding special tag and the `<addressbook>` root element opening\
    \ tag, properly closed with a matching `</addressbook>` closing tag. So far, so\
    \ good.\n\nI can include a child element for a person and child elements within\
    \ a person for first and last names, as follows:\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<addressbook>\n    <person>\n        <firstname>Jane</firstname>\n\
    \        <lastname>Smith</lastname>\n    </person>\n</addressbook>\n```\n\nSo\
    \ far, so good. Remember, I am the one deciding what my element names are called\
    \ and implicitly what purpose they serve.\n\n**Note:** Closing tags for an element\
    \ do not have to always be on a new line by themselves. In fact, no part of your\
    \ XML has to have new lines at all. But it does make your XML more human-readable\
    \ to do this. Commonly accepted norms for human-readable XML have opening tags\
    \ appear on a new line and either have the closing tag at the end of the same\
    \ line on which the opening element tag appeared – such as the preceding `<firstname>`\
    \ and `</firstname>` – when there are no child elements for that tag, or have\
    \ the opening and closing element tags on lines by themselves with any child elements\
    \ nested within – such as the preceding `<person>` and `</person>` tags. Tags\
    \ are also indented to denote that they are child elements, but again this is\
    \ just convention for the ease of human readers.\n\nIf this were a real address\
    \ book, I would have more than one person in it. But you might notice it would\
    \ be hard to differentiate which person was which for a computer (or even human)\
    \ reading this XML. If we did the following, any program trying to keep track\
    \ of which person was which would have problems:\n\n```\n<?xml version=\"1.0\"\
    \ encoding=\"UTF-8\"?>\n<addressbook>\n    <person>\n        <firstname>Jane</firstname>\n\
    \        <lastname>Smith</lastname>\n    </person>\n    <person>\n        <firstname>John</firstname>\n\
    \        <lastname>Jones</lastname>\n    </person>\n</addressbook>\n```\n\nOne\
    \ solution to this in XML is to use attributes, which act like parameters for\
    \ elements.\n\n### XML Attributes\n\nAny XML element can have zero or more attributes\
    \ associated with it. Attributes are distinct from the data provided in the element\
    \ itself and appear within the `< >` markers of the element name, immediately\
    \ following the tag name. Attributes take the form:\n\n```\nattribute_name=\"\
    value in double quotes\"\n```\n\nContinuing our address book example, we could\
    \ differentiate between different people in the XML data by adding an ID attribute\
    \ to the `<person>` element, using numeric values to give each person a different\
    \ ID. The result would be as follows:\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<addressbook>\n    <person id=\"1\">\n        <firstname>Jane</firstname>\n\
    \        <lastname>Smith</lastname>\n    </person>\n    <person id=\"2\">\n  \
    \      <firstname>John</firstname>\n        <lastname>Jones</lastname>\n    </person>\n\
    </addressbook>\n```\n\nNote that even though you and I might think of the ID value\
    \ presented here as an integer and even have programs written to treat it like\
    \ an integer, XML always places attributes in double quotes, making them appear\
    \ to be strings.\n\nIf you have multiple attributes for an element, they are simply\
    \ separated by a space. For instance, we might track the date we added someone\
    \ to our address book using a `dateadded` attribute:\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<addressbook>\n    <person id=\"1\" dateadded=\"2023-01-15\"\
    >\n        <firstname>Jane</firstname>\n        <lastname>Smith</lastname>\n \
    \   </person>\n    <person id=\"2\" dateadded=\"2023-02-20\">\n        <firstname>John</firstname>\n\
    \        <lastname>Jones</lastname>\n    </person>\n</addressbook>\n```\n\n###\
    \ XML Values\n\nThe actual data packaged in XML documents are the values held\
    \ within the open and closing element tags. In our ongoing address book example,\
    \ our values are things like \"Jane\" for a `<firstname>` element and \"Smith\"\
    \ for a `<lastname>` element. It may seem like overkill to have all of the XML\
    \ syntax and element tags in place to convey this (and that verbosity is a common\
    \ criticism of XML in general), but as a human reading the XML, it is nicely self-descriptive\
    \ and also provides guarantees about structure, completeness, and so on.\n\nSpeaking\
    \ of completeness, it is perfectly possible to have elements that don't themselves\
    \ contain any data, just as what our very first address book XML document earlier\
    \ in the chapter showed. There are options to allow your element to be present\
    \ and not contain any data, both by using the opening and closing tag method you\
    \ have already seen and by using the shorthand self-closing tag approach that\
    \ only has the element tag name appear once, with a trailing `/` (backslash).\
    \ Let's add a `<middleinitial>` element to our `<person>` structure, showing both\
    \ options, as shown next:\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n\
    <addressbook>\n    <person id=\"1\">\n        <firstname>Jane</firstname>\n  \
    \      <middleinitial></middleinitial>\n        <lastname>Smith</lastname>\n \
    \   </person>\n    <person id=\"2\">\n        <firstname>John</firstname>\n  \
    \      <middleinitial/>\n        <lastname>Jones</lastname>\n    </person>\n</addressbook>\n\
    ```\n\nBoth the `<middleinitial></middleinitial>` and `<middleinitial/>` forms\
    \ are valid for an element with no data. Note that you cannot nest any child elements\
    \ under a self-closing tag.\n\n### XML Namespaces\n\nOne of the huge strengths\
    \ of XML is the way in which it makes exchanging data far easier for developers\
    \ and systems that use data. Once you become accustomed to sharing data in XML\
    \ format, it begins to feel like second nature. But you can run into issues with\
    \ all of this ease of transfer and sharing. One particular issue is that because\
    \ you define your own XML tags (potentially even defining your own XML schema),\
    \ you might find that other people have developed their own schemata and used\
    \ element names that conflict with yours. That's no big deal if you and they never\
    \ share data, but the chances are if you become a practitioner sharing XML-formatted\
    \ data, you'll run into name clashes at some point when trying to mix data from\
    \ multiple sources. So what do you do?\n\nThe XML standard offers a two-part approach\
    \ to help with this clash of names. First, you can prefix any element you like\
    \ with an identifying string, which is a marker designating from which source\
    \ a given element is considered to derive. So if we know that we're mixing data\
    \ from our `<addressbook>` with our own definition for `<person>` with that of\
    \ someone else who has a potentially totally different structure and set of elements,\
    \ we can prefix our elements to differentiate them, for example:\n\n```\n<ab:addressbook\
    \ xmlns:ab=\"http://www.example.com/addressbook\">\n    <ab:person id=\"1\">\n\
    \        <ab:firstname>Jane</ab:firstname>\n        <ab:lastname>Smith</ab:lastname>\n\
    \    </ab:person>\n    <ab:person id=\"2\">\n        <ab:firstname>John</ab:firstname>\n\
    \        <ab:lastname>Jones</ab:lastname>\n    </ab:person>\n</ab:addressbook>\n\
    ```\n\nThis prefix acts as the namespace for these elements, and items from the\
    \ other XML document with a confusing version of person would have a different\
    \ prefix for their namespace, for example:\n\n```\n<other:person xmlns:other=\"\
    http://www.othercompany.com/schema\">\n    <other:firstname>Judy</other:firstname>\n\
    \    <other:lastname>Walsh</other:lastname>\n</other:person>\n```\n\nThe XML standard\
    \ requires that we provide a URI to act as the unique differentiator for our namespace\
    \ – basically, an attribute that is guaranteed to be unique and reflect the XML\
    \ structure we have defined for our document. This is specified with the `xmlns`\
    \ attribute in the opening tag of an element – and typically you will see this\
    \ in the root element of an XML document, as follows:\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<ab:addressbook xmlns:ab=\"http://www.example.com/addressbook\"\
    >\n    <ab:person id=\"1\">\n        <ab:firstname>Jane</ab:firstname>\n     \
    \   <ab:lastname>Smith</ab:lastname>\n    </ab:person>\n    <ab:person id=\"2\"\
    >\n        <ab:firstname>John</ab:firstname>\n        <ab:lastname>Jones</ab:lastname>\n\
    \    </ab:person>\n</ab:addressbook>\n```\n\n### Other Parts of the XML World\n\
    \nThere are other parts of the XML standard we won't cover in this chapter that\
    \ might be of interest as your knowledge develops."
