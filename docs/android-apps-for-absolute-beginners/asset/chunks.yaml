    # Part III – Get Sophisticated


    ## 13. Working with Sound, Audio, and Music for Android


    It is time to move on to some of the more involved and interesting aspects of
    developing applications for Android. Over the next few chapters, we will explore
    adding audio, video, and still images to your applications and the mechanisms
    to both create and record these media types, as well as display and use them.


    Let’s get started with a tour of audio capabilities. One caveat for the remainder
    of this chapter: A printed book cannot really provide audio examples (though the
    online version can). To get the most out of the sample code in this chapter, you
    should absolutely try to run these applications on a device or AVD.


    ### Playing Back Audio


    Android provides a wealth of ways in which to access and use audio in your applications.
    In fact, the number of ways has grown so much over time that the choices can be
    almost too much. Never fear. Android has also built a well-structured method to
    help manage all of these different approaches – known as the Media package – which
    we will come to shortly.


    #### Choosing Your Audio Approach


    First, let’s look at the major ways to harness audio playback in Android. Depending
    on your needs and from where you are planning to source your audio, each of these
    different methods provides benefits and options to you.


    ##### Using Raw Audio Resources


    A raw audio resource is a sound file or audio source that is packaged as a file
    and bundled with your application in its `raw` folder. The raw approach means
    that you can guarantee the audio you wish to use is available at all times, and
    this approach is very commonly used for audio such as sound effects in games,
    notifications, and so forth. The drawback of the raw approach is that changing
    audio packaged with the application’s APK can only be done by replacing (upgrading)
    the whole application.


    ##### Using Audio Assets


    Audio assets are also packaged with your application, so have the same benefits
    and disadvantages of the raw approach. The additional benefit the asset approach
    provides is making your audio available via a URI naming scheme, for example,
    `file:///android_asset/some_URL`. This benefits you when using any API that expects
    or needs a URI, of which there are many across Android.


    ##### Using File Storage for Audio


    Not for the faint-hearted, the file storage approach is even more basic than the
    raw approach. You use the on-board or removable storage of the device to hold
    the audio file. Access is via file I/O APIs (which we cover later in the book).
    While this is more of a burden to manage, it means you can in theory download
    new files, change files, and remove files without having to upgrade the application.


    ##### Accessing Audio Streaming Services


    If you want to dispense with the need to worry about storing audio at all, streaming
    is the answer. You can stream audio from other on-device services or Android Content
    Providers (that may themselves stream from elsewhere) or directly stream from
    an Internet-based service. Streaming frees you from worrying about storage, file
    management, space requirements, or upgrades. It replaces those worries with connectivity
    anxiety – you can only stream when you have a working data connection.


    ### Working with the Media Package


    The wealth of options for dealing with audio can be a blessing and a curse. There
    is a mechanism to suit your every whim, but with choice comes complexity. Fortunately,
    Android comes equipped with the multitalented Media package to help simplify your
    life as a developer while preserving the options you have available.


    The Media package provides two key classes for your use, the `MediaPlayer` for
    playing audio, which we will deal with first, and the `MediaRecorder` for on-device
    recording, which we deal with later in the chapter.'
