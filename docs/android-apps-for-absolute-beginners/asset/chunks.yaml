    **Figure 14-3** The `MediaController` controls in view during playback


    ## Understanding Key Video Concepts


    With the basic mechanics of video playback mastered, there are several paths you
    can follow to start expanding your repertoire of video skills. You can try further
    combinations of activities and the `VideoView` and `MediaController` view objects
    to lay out exactly the kinds of video interfaces you desire. And you can combine
    video snippets into more complex activities, such as a video cut-scene opening
    sequence for an application or game. The other path you can and should take in
    parallel is to ensure you have a good grounding in the fundamental aspects of
    digital video, so that you can make good choices about content, its size, quality,
    and uses, when it comes to building your Android applications. Next up, we will
    cover the key concepts you should know about.


    ### Bitrate


    We introduced the concept of bitrate when talking about audio in Chapter [13](#499629_1_En_13_Chapter.xhtml).
    Conceptually, bitrate represents the same facet of video – being the amount of
    data available to represent aspects of the video, or frame of a video, at any
    given instant. The bitrate of video is usually calculated as a combination of
    (at least) two factors. First, what is the resolution of the video, or in other
    words the horizontal and vertical density of pixels governing the actual physical
    height and width of the video frame? Second, how many bits of information are
    used to describe the color, hue, and saturation of each given pixel in the overall
    resolution? In general, as we saw with audio, a higher bitrate means better fidelity,
    which typically results in perceived better quality from a person viewing the
    video. The trade-offs are also the same: a higher bitrate takes more storage,
    because more bits of information are encoded for each video frame. This then leads
    us to a discussion of frame rate.


    ### Frame Rate


    The frame rate for a video is almost self-explanatory. At what rate are frames
    of images shown such that human persistence-of-vision effects kick in to trick
    us to think that the pictures are moving? Most of the video codecs (discussed
    in the following) supported by Android default to 30 frames per second. There
    is some support for lower and higher frame rates, but you will typically only
    use these in special circumstances.


    ### Codecs


    In stark contrast to the audio world, where Android supports a vast range of audio
    codecs, in the video realm, there exists a modest list of supported video codecs
    and video container formats for Android devices. The reasons for this are a rabbit
    hole of vested interests, patent law, industry cartels, and questionable priorities
    from vendors and license holders that almost never place the user first.


    I will provide my opinion on a range of these motivating factors and constraints
    shortly, but here is the objective view of video codec support in Android at the
    time of writing. Modern Android devices, and the Android operating system, natively
    support playback of video in the following codec:


    *   **H.263**: Developed by the Video Coding Experts Group, it was designed to
    be a low-bitrate compression format.

    *   **H.264** (baseline and main profiles): Designed to increase quality over
    H.263 while also reducing bitrate and therefore file size, H.264 has dominated
    the video codec scene in recent years.

    *   **H.265**: The successor to H.264, H.265 is also known as HEVC, or the High-Efficiency
    Video Encoding scheme. Its designers assumed it would succeed H.264 to be the
    most popular codec, but its patent encumbrance meant that many online, media,
    and technology companies sought a different path, focusing on codecs like AV1
    (discussed in the following).

    *   **MPEG-4 SP**: This is a specific kind of codec, not to be confused with the
    container format MPEG-4. You will find files declaring themselves as MPEG or MPEG-4
    that in fact have H.263, H.264, or H.265 encoded video. They are claiming to be
    MPEG or MPEG-4 based on the container format (its full name is MPEG-4 part 14),
    not the video codec. More on this distinction in the following.

    *   **VP8**: Created by On2 Technologies, this was specifically designed as a
    more efficient codec for modern use. When On2 Technologies was acquired by Google,
    the codec was rereleased as an open, royalty-free codec.

    *   **VP9**: The successor to On2 Technologies’ VP8 codec, providing increased
    performance for encoding and decoding.

    *   **AV1**: A recent collaboration by many companies in the technology and media
    field. AV1’s greatest claim is that it available as an “unencumbered” format,
    meaning royalties do not need to be paid to patent holders for its use.


    That might seem like a wide-ranging list of video codecs. In truth, it is a very
    useful set and will enable you to work with all kinds of video. However, there
    are many more video codecs in use today, including many very popular, many container
    formats of which Android again only supports a subset. Most of the limitations
    and incompatibilities have nothing to do with technology and everything to do
    with patents and licensing regimes and the capricious nature of some of the interested
    parties from industries like electronics, cinema, and entertainment.


    ## Understanding the Complex World of Video Containers and Child Codecs


    To better prepare you for future video-focused development, it is definitely worth
    delving into the world of video containers, formats, codecs, and subtitles, so
    you are aware of what a video really is and what is and is not included in the
    media content you might use and distribute. What you might think of as a video
    file – that is, a file with a suffix like `.mp4`, `.m4v`, `.avi`, `.mov`, `.mkv`,
    and so on – is a representation of potentially many video, audio, and subtitle
    resources, packaged into a container. The container nomenclature is used to indicate
    a proprietary, industry-standard, or open format for the file, which means consumers
    of the file can work out where the video content, audio content, and subtitles
    exist within the file.


    Figure [14-4](#499629_1_En_14_Chapter.xhtml#Fig4) gives you a visual overview
    of a video container format and its contained media.


    ![../images/499629_1_En_14_Chapter/499629_1_En_14_Fig4_HTML.jpg](images/499629_1_En_14_Chapter/499629_1_En_14_Fig4_HTML.jpg)'
