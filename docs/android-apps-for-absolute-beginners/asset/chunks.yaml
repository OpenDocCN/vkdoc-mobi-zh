    # 重温 AVD 管理器


    既然你已经掌握了多种启动 `AVD 管理器`的方法，现在就请通过 Android Studio 的 `工具` 菜单启动它，因为我们将为后续练习创建第二个 `AVD`。如果需要帮助，你可以重新查看第
    2 章中的逐步操作指南，但以下是创建第二个 `AVD` 的目标：


    - **类别 – 平板电脑**：我们想要创建一个平板电脑尺寸的 `AVD`，这将有助于使用书中的示例测试更大的设备。

    - **名称和类型 – Pixel C 平板电脑 API 30**：这是最出色的通用平板电脑之一，也是最近发布的一款搭载谷歌直接提供的纯净版 Android
    系统的设备，是测试平板设备的绝佳基准。

    - **系统映像 – R (API 级别 30)**：这是最新的 SDK，带来了 Android 为平板电脑形态设备提供的最新功能。


    **注意**：你可能会看到 `R` 系统映像旁边有一个蓝色的下载链接。这表明必要的 Intel x86 系统映像尚未安装到你的机器上。你需要点击下载链接并安装该系统映像，此
    `AVD` 才能成功启动并工作。


    - **AVD 名称 – Pixel C 平板电脑 API 30**：你可以使用任何喜欢的名称，但此示例名称在 `AVD 管理器`中看到该 `AVD`，或在活跃运行、测试和调试代码时看到这个正在运行的模拟器进程时，会提供一些有用的线索。


    完成后，你应该会在 `你的虚拟设备` 窗口中看到（至少）两个 `AVD`，如图 5-3 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig3_HTML.jpg](img/499629_1_En_5_Fig3_HTML.jpg)


    图 5-3 – 在 AVD 管理器中配置多个 AVD


    创建第二个（或第三、第四个）`AVD` 的目的不仅仅是为了展示另一张 `AVD 管理器`的截图。拥有两个或更多 `AVD` 是使用 Android Studio
    同时在多个设备或 `AVD` 上运行相同代码的必要条件。


    在 Android 开发工作中，你会希望锻炼这种同时在多个不同的 `AVD` 和设备上进行测试的能力，原因有很多。在前面的章节中，我们提到了全球销售和使用的设备的多样性、支持的
    Android 版本和 SDK 版本的分裂特性，以及其他一些因素，这些都意味着你的应用程序可能在一系列细微不同的设置中运行。首先，在多种设备上并排运行你的应用程序，有助于你发现用户可能在现实世界中看到的某些奇特现象和差异。这种能力的第二个主要好处是，可以观察你的应用程序在小屏幕（一次只显示一个
    Activity）与大屏幕（例如平板电脑）上的表现。在大屏幕上，你的 Activity 可能会缩放成不同尺寸，或者作为使用 Fragment 的多 Activity
    显示的一部分（我们将在第 11 章中介绍）。使用多设备或 `AVD` 测试的第三个原因是，查看 Android 如何在不同显示密度和分辨率的屏幕上缩放或插值特定分辨率的图像。


    你现在就应该尝试在多个 `AVD` 上运行你的 `MyFirstApp` 应用程序。你可以从 `工具` ➤ `选择设备` 菜单选项触发此操作，或者使用同等的设备选择工具栏下拉菜单，如图
    5-4 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig4_HTML.jpg](img/499629_1_En_5_Fig4_HTML.jpg)


    图 5-4 – 设备选择工具栏下拉菜单


    选择 `在多个设备上运行` 选项，系统将提示你打开标题为 `选择部署目标` 的对话框。选择两个或多个设备或 `AVD`，例如，我们到目前为止在书中创建的 `Pixel
    C 平板电脑` 和 `Pixel 2` `AVD`，如图 5-5 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig5_HTML.jpg](img/499629_1_En_5_Fig5_HTML.jpg)


    图 5-5 – 选择多个目标以在 Android Studio 中启动你的应用程序


    同时启动多个 `AVD` 会花费一些时间，但稍等片刻后，你应该会看到你的 `AVD` 启动，并且 `MyFirstApp` 应用程序已部署并在所有 AVD
    上运行，如图 5-6 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig6_HTML.jpg](img/499629_1_En_5_Fig6_HTML.jpg)


    图 5-6 – 应用同时部署在多个 AVD 上


    # 在真实设备上运行你的代码


    虚拟设备对任何开发者来说都是一大福音，但有时，在真实设备上看到你的代码运行也是势在必行的。在最近的 Android Studio 版本中，Google 在测试和在真实设备上运行你的应用程序方面取得了巨大进展。从历史上看，将应用程序部署到真实手机上需要一长串命令行步骤，虽然你今天仍然可以走这条路，但
    Android Studio 使得检测和使用通过 USB 电缆连接到开发机器的 Android 设备变得非常容易。


    为了在开发应用时使用 Android 手机进行测试，你需要在手机上启用开发者选项。Google 一直以来都有一个启用此功能的技巧：打开手机上的 `设置`，滚动到
    `关于手机` 选项。`关于手机` 屏幕上的最后一个选项是版本号。连续点击版本号显示的数字七次（没错，七次），你会看到一个倒计时提示，告诉你离启用开发者模式只剩几次点击了。


    一旦你点击了足够的次数，你会看到一个屏幕通知，提示开发者选项现已启用，并且 `设置` 下会出现一个名为 `开发者选项` 的新菜单选项。默认情况下，该选项下会有一个名为
    `USB 调试` 的子选项已启用。请再次确认你的手机上是否如此，如果尚未启用，请将其打开。


    在手机上启用开发者模式后，通过 USB 电缆将其连接到你的开发电脑。你的手机应该会被自动检测到，然后 Android Studio 会将其识别为运行 Android
    应用程序的潜在目标。


    要测试这一点，请从菜单中选择 `运行` ➤ `选择设备`，或者打开工具栏上用于 `AVD`/设备的下拉菜单，如图 5-7 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig7_HTML.jpg](img/499629_1_En_5_Fig7_HTML.jpg)


    图 5-7 – 从 Android Studio 中选择一个已连接的、处于开发者模式的 Android 设备


    选择你连接的设备，在我的例子中是 `Nexus 5` 手机。等待几秒钟，让 Android Studio 构建、打包并将应用程序部署到连接的设备上，然后你应该会看到你的应用程序在你的手机上加载并运行，如图
    5-8 所示。


    ![../images/499629_1_En_5_Chapter/499629_1_En_5_Fig8_HTML.jpg](img/499629_1_En_5_Fig8_HTML.jpg)


    图 5-8 – 在已连接的 Android 手机上运行 MyFirstApp

