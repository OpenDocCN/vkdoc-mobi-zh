    # 相对布局中的重叠控件


    Android 支持的每种布局都为您提供了独特且专业的功能，而`RelativeLayout`则具备一些关键能力，包括让控件相互重叠或实现一个控件看起来位于另一个控件前方或与之重叠的效果。这是通过
    Android 跟踪 XML 定义中的子元素，并为布局中的每个单独子元素应用一个图层来实现的。这意味着，如果在布局 XML 文件中靠后定义的项与较早定义的项使用了
    UI 中的同一空间，那么前者将位于后者之上。


    没有什么比实际演示更能直观地展示这种效果以及它在应用设计中的帮助了。图 10-5 展示了一个包含两个按钮的布局，其中第二个按钮将位于第一个按钮的前方或之上。


    ![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig5_HTML.jpg](img/499629_1_En_10_Fig5_HTML.jpg)


    **图 10-5** `RelativeLayout` 的重叠特性效果演示


    关于你想要叠加的控件类型和数量，几乎没有任何限制。你可能也会好奇，为什么有人会想要以这种方式叠加控件。除了实现一些非传统的布局构想外，`RelativeLayout`
    的重叠可能性意味着可以让控件在屏幕上显示但处于不可见状态，同时仍然对活动行为产生影响。


    # 使用线性布局进行排列


    在设计布局时，有时你不需要或不想使用约束或相对定位这种复杂方式，而只想依赖一些久经考验的传统布局方法。任何熟悉图形设计或界面设计历史的人都会听说过盒子模型，该模型将构成界面的所有项目（或控件）视为排列成行和列的元素。`LinearLayout`
    遵循此模型，并且是早期 Android 版本使用的原始默认布局。它可能不再是当前首选的布局，但你始终可以依靠 `LinearLayout` 作为一种简单直接的选项来调整控件的排列、嵌套等。`LinearLayout`
    缺少的是我们在 `ConstraintLayout` 和 `RelativeLayout` 中讨论过的一些巧妙、省时或实用的功能，但有时简单的解决方案正是我们所需要的一切。


    # 掌握 `LinearLayout` 的五大主要限定符


    使用 `LinearLayout` 时，一组五个关键属性可帮助你控制整体布局及其中任何控件的几乎所有放置和外观方面：


    - **方向（Orientation）**：对于 `LinearLayout`，首要且最基本的控制是确定盒子模型应被视为水平逐行填充还是垂直逐列填充。这就是
    `LinearLayout` 的所谓方向，由 `android:orientation` 属性控制，其取值可以是字符串 `HORIZONTAL` 或 `VERTICAL`。方向也可以在运行时通过
    Java 代码使用 `setOrientation()` 方法并传入类似参数进行设置。


    - **外边距（Margins）**：默认情况下，你放置的任何控件与相邻控件之间都没有缓冲或间距。外边距让你可以控制这一点，并使用 `android:layout_margin`（影响控件的所有边）或单边属性（如
    `android:layout_marginTop`）等属性来添加缓冲（正如其名，即外边距）。任何外边距属性都接受像素大小作为值，例如 10 dip。这在概念上与
    `RelativeLayout` 的内边距类似，但仅当控件具有非透明背景（例如按钮）时才适用。


    - **填充方式（Fill method）**：我们之前已经介绍过 `RelativeLayout` 中的 `wrap_content` 和 `match_parent`
    概念。在 `LinearLayout` 方法中，所有控件都必须通过 `android:layout_width` 和 `android:layout_height`
    属性指定填充方式。这些属性可以采用以下三个值之一：`wrap_content`，根据你之前所学，这指示控件仅大到足以容纳文本或图像内容；`match_parent`，占据父布局提供的最大空间量；或者一个以设备独立像素为单位的特定像素值，例如
    125 dip。


    - **权重（Weight）**：当 `LinearLayout` 中的两个或多个控件都指定了 `match_parent` 时，哪个控件会获胜？它们如何都能占据父布局提供的最大空间？答案是
    `android:layout_weight` 属性，它允许你为每个控件应用一个简单的数值，例如 1、2、3、4 等。Android 会累加 `LinearLayout`
    中所有控件的权重总和，然后根据每个控件在布局中所有控件总权重中所占的份额来分配 UI 空间。例如，如果我们有两个都配置为 `match_parent` 的
    `TextView`，第一个 `TextView` 的 `android:layout_weight` 为 5，第二个为 10，那么第一个按钮将获得可用空间的三分之一（5/(5+10)），第二个按钮将获得三分之二。还有一些其他设置权重的方法，但都没有
    `android:layout_weight` 方法直观。


    - **重力（Gravity）**：使用 `LinearLayout` 时，Android 采取的默认布局方式是在使用 `HORIZONTAL` 方向时将所有控件从左侧对齐，在使用
    `VERTICAL` 方向时将所有控件从顶部对齐。有时，你可能希望覆盖此行为，以强制布局采用自下而上或向右对齐的偏好。XML 属性 `android:layout_gravity`
    允许你控制此行为，运行时方法 `setGravity()` 也是如此。对于 `VERTICAL` 方向，`android:layout_gravity` 可接受的值有
    `left`、`center_horizontal` 和 `right`。对于 `HORIZONTAL` 方向，Android 默认会相对于控件文本的不可见基线进行对齐。使用值
    `center_vertical` 可让 Android 改用控件的概念中心点进行对齐。


    # 一个 `LinearLayout` 示例


    一开始就审视 `LinearLayout` 的理论可能会让人感到有些不知所措，因此从探索一些概念入手是有意义的，这有助于直观地理解如何使用、何时以及何处运用这些关键的
    `LinearLayout` 杠杆。


    如果纯粹从理论角度思考，所有 `LinearLayout` 选项可能会令人望而生畏。清单 10-3 中的动态示例展示了这些选项中的许多是如何工作的。


    ```

    清单 10-3

    演示 LinearLayout 提供的选项

    ```


    该示例使用了两个简单的构建块来帮助我们理解方向和重力。我定义了两个独立的 `RadioGroup` 控件，其中第一个包含一组用于控制方向的 `RadioButton`，另一个包含一组用于控制重力的
    `RadioButton`。作为起点，我们通过选择 `android:orientation="vertical"` 在 XML 定义中使用垂直方向，这将使两个
    `RadioGroup` 上下排列，并且其中的 `RadioButton` 也垂直排列。


    然后，我覆盖了第一个 `RadioGroup` 中两个单选按钮的垂直堆叠方式，使用 `android:orientation="horizontal"` 将它们切换为水平布局。虽然我想从父
    `RadioGroup` 继承其他属性，但我灵活地覆盖了子 `RadioButton` 中的特定属性。最后，我们为所有控件设置了 5 dip 的内边距，并设置了
    `wrap_content` 选项。

    '
- fmt: "### Running the Example with No Supporting Java Logic\n\nRunning this example\
    \ code with no supporting Java logic – just the layout – shows these initial settings\
    \ in action, although there’s no other behavior yet to change what you see, but\
    \ that will follow in a moment. The layout is shown in Figure [10-6](#499629_1_En_10_Chapter.xhtml#Fig6).\n\
    \n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig6_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6** Setting up the orientation and gravity examples\n\n### Java\
    \ Logic to Implement Orientation and Gravity Changes\n\nIt’s nice to see the layout\
    \ rendered, but really it would be better to get some Java logic written to actually\
    \ alter the orientation and gravity in accordance with the radio button settings.\
    \ That’s exactly what Listing [10-4](#499629_1_En_10_Chapter.xhtml#PC4) shows.\n\
    \n```java\npackage org.beginningandroid.linearlayoutexample;\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import android.os.Bundle;\nimport android.view.Gravity;\nimport android.widget.LinearLayout;\n\
    import android.widget.RadioGroup;\npublic class MainActivity extends AppCompatActivity\
    \ implements RadioGroup.OnCheckedChangeListener {\n    RadioGroup orientation;\n\
    \    RadioGroup gravity;\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
    \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \        orientation=(RadioGroup)findViewById(R.id.orientation);\n        orientation.setOnCheckedChangeListener(this);\n\
    \        gravity=(RadioGroup)findViewById(R.id.gravity);\n        gravity.setOnCheckedChangeListener(this);\n\
    \    }\n    public void onCheckedChanged(RadioGroup group, int checkedId) {\n\
    \        switch (checkedId) {\n            case R.id.horizontal:\n           \
    \     orientation.setOrientation(LinearLayout.HORIZONTAL);\n                break;\n\
    \            case R.id.vertical:\n                orientation.setOrientation(LinearLayout.VERTICAL);\n\
    \                break;\n            case R.id.left:\n                gravity.setGravity(Gravity.LEFT);\n\
    \                break;\n            case R.id.center:\n                gravity.setGravity(Gravity.CENTER_HORIZONTAL);\n\
    \                break;\n            case R.id.right:\n                gravity.setGravity(Gravity.RIGHT);\n\
    \                break;\n        }\n    }\n}\n```\n\n**Listing 10-4** Java logic\
    \ to implement orientation and gravity changes based on UI selection\n\nUnderstanding\
    \ what the Java code is doing is very easy. To begin, during the application’s\
    \ `onCreate()` call, we register listeners for clicks on either `RadioGroup` using\
    \ `setOnCheckedChangedListener()`. We implement `OnCheckedChangeListener` in the\
    \ activity, which means the activity itself becomes the listener.\n\nWhen you\
    \ click any of the `RadioButtons`, the listener triggers the callback `onCheckChanged()`.\
    \ In the definition for that callback method, we determine which `RadioButton`\
    \ was clicked of the five rendered. Once we know which `RadioButton` it was, our\
    \ logic calls either `setOrientation()` to toggle from vertical to horizontal\
    \ layout flow or `setGravity()` to the relevant left, right, or center gravity\
    \ value. Two of the six possible outcomes are shown in Figures [10-7](#499629_1_En_10_Chapter.xhtml#Fig7)\
    \ and [10-8](#499629_1_En_10_Chapter.xhtml#Fig8).\n\n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig8_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig8_HTML.jpg)\n\
    \n**Figure 10-8** Another orientation and gravity example\n\n![../images/499629_1_En_10_Chapter/499629_1_En_10_Fig7_HTML.jpg](images/499629_1_En_10_Chapter/499629_1_En_10_Fig7_HTML.jpg)\n\
    \n**Figure 10-7** Up, down, and all around with orientation and gravity\n\n##\
    \ Even More Layout Options\n\nThere are a range of further layout types available\
    \ with Android, many of which have risen and fallen in popularity with successive\
    \ Android releases. Here are the main ones to know about – further examples for\
    \ these layouts are available from the website at [`www.beginningandroid.org`](http://www.beginningandroid.org).\n\
    \n### Table Layouts\n\nBack in the early days of the Internet, web page designers\
    \ often used the humble HTML table to place content on a page. While web design\
    \ has leapt forward, the concepts of table-based layout are still useful, and\
    \ Android adopted them in the `TableLayout` container.\n\nJust as with HTML, `TableLayout`\
    \ in Android is quick to use and relies on the notion that a `TableLayout` has\
    \ `TableRow` child elements to control size, placement, and more. One more similarity\
    \ with the old HTML approach for web pages is that the high-fidelity precision\
    \ is hard to perfect.\n\n### Grid Layouts\n\nIf the idea of `TableLayout` has\
    \ your imagination racing, then you will love `GridLayout`. A close cousin to\
    \ `TableLayout`, `GridLayout` places its children widgets and UI elements onto\
    \ a grid of infinitely detailed lines, which separate the area rendered by your\
    \ activity into cells. The secret to `GridLayout`'s precise control is that the\
    \ number of cells, or grid lines used to describe the cells, has no limit or threshold.\
    \ Simply add more grid lines to carve up your UI into ever-finer subcells for\
    \ placing widgets.\n\n## Mastering XML-Based Layouts with Java Logic: The Best\
    \ of Both Worlds!\n\nAs you become more familiar with XML layouts and Java-managed\
    \ layouts, you will eventually realize you can have the best of both worlds and\
    \ that you can always change your mind. You might prefer to prototype in XML and\
    \ reach for the Graphical Layout Editor, or you could prefer to try really nuanced\
    \ runtime layout selections using Java. Regardless of the approach, you can at\
    \ any time change your mind with a bit of code or tweaked XML. To illustrate,\
    \ Listing [10-5](#499629_1_En_10_Chapter.xhtml#PC5) lists the counting `Button`\
    \ code from your `ButtonExample` application, converted into an XML layout file.\
