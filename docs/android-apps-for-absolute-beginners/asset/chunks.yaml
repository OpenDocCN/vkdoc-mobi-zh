    按钮是任何 UI 开发的基础组件，其历史可以追溯到模拟电视机、收音机（还记得吗？）和汽车仪表盘等电子设备上的真实物理按钮。Android 提供了几种类型的按钮，其中最直接的是来自`android.widget`包的`Button`小部件，它在按钮“表面”显示简单的文本。让我们开始创建一个使用按钮和
    Java 逻辑来跟踪和控制按钮上显示文本的新应用程序。你可以在`Ch09/ButtonExample`项目文件夹中查看此示例。


    首先，使用 Android Studio 的新项目向导创建一个新项目，并选择 **Empty Activity** 模板作为起点。将项目命名为`ButtonExample`（或你认为同样具有描述性的名称）。项目创建完成后，打开`activity_main.xml`文件，删除默认的`TextView`元素。切换到布局编辑器的
    **Design**（设计）视图，从 **Palette**（面板）中选择`Button`小部件并将其放置在屏幕上。按钮的精确位置无关紧要，因为我们稍后会让它自动扩展以填满整个应用程序活动。你应该会看到类似于图
    9-3 所示的布局。


    ![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig3_HTML.jpg](img/499629_1_En_9_Fig3_HTML.jpg)


    *图 9-3 在 ButtonExample 的设计蓝图中添加一个按钮*


    请注意，有两个错误提示表明按钮未被约束。这是因为当你选择使用`ConstraintLayout`布局来容纳其他子 UI 小部件时，每个小部件都需要至少一个水平和垂直的“约束”，或者说是关于它们应该如何相对于父布局或其他小部件的顶部、底部、起始端和结束端进行定位的指令。要解决此问题，请使用每边中点处的两个圆圈之一，单击并拖动连接线到设计蓝图的侧边。这将为按钮设置水平约束，使其紧贴活动的侧边（减去任何边距）。然后选择按钮顶部或底部边缘中心的圆圈，单击并拖动连接线到活动的顶部或底部边缘，以设置垂直约束。切换到`activity_main.xml`文件的代码视图，它应该类似于清单
    9-3 所示。


    ```

