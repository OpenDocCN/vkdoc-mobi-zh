- fmt: '### Working with Manifests


    The first group of files shown in the Android view in Project Explorer are your
    manifest files. With a new project such as `MyFirstApp`, there is only one manifest
    file that will concern you, which is the one named `AndroidManifest.xml`.


    This is your Android Manifest file and acts almost like a master control file
    for your Android application. Within the Android Manifest file, you are able to
    control many major parameters and behaviors of your application, including declaring
    what permissions your application will require to operate, what services it may
    interact with, the activities that comprise the application, and the Android SDK
    levels that the application both needs and supports.


    We’ll cover more depth on some of these core concepts later in the chapter, including
    defining what activities and services mean in the Android sense. For now, let’s
    look at the content of your `AndroidManifest.xml` file, which you see in Listing
    [4-1](#499629_1_En_4_Chapter.xhtml#PC1).


    ```

    Listing 4-1

    The contents of your new AndroidManifest.xml file

    ```


    As you might have guessed from the filename, the contents are in XML format. For
    those of you encountering XML for the first time, Chapter [8](#499629_1_En_8_Chapter.xhtml)
    provides a full introduction to XML for Android development. It’s fine to jump
    ahead and cover that topic and return to this point once you are comfortable with
    the basics of XML.


    Android uses the root element `<manifest>` for the XML document and then introduces
    two key attributes: a namespace declaration and a package declaration. Where namespaces
    are concerned, the Android convention is to use them only at the attribute level,
    rather than also using them for elements. The package name `org.beginningandroid.myfirstapp`
    should look familiar to you, as this was the package name we provided in the project
    setup wizard in Chapter [3](#499629_1_En_3_Chapter.xhtml). As well as providing
    this essential mapping to ensure uniqueness for your application’s fully qualified
    package name, this technique allows us to then use shorthand in the future when
    wanting to refer to aspects of the application with itself.


    You can see this in action a little further down the manifest, where the first
    `<activity>` element is introduced, in the form `<activity android:name=".MainActivity">`.
    Here, the leading dot is shorthand for the full package name referenced in the
    `<manifest>` package attribute. In practice, it means much shorter names for internal
    references, so in this example, `.MainActivity` instead of `org.beginningandroid.myfirstapp.MainActivity`.
    I know which one I’d prefer to type.


    The manifest file also includes other key features. For instance, the `android:icon`
    and `android:roundIcon` attributes reference two resource files that provide the
    square and round icon versions for your application in an Android device’s launcher
    screen and widget screen. The `android:label` attribute holds the name of your
    application.


    One further important entry is the `<activity android:name=".MainActivity">` mentioned
    earlier. This entry, including the child element `<intent-filter>`, indicates
    to Android which activity it should respond with when the application launches
    and the key intent `android.intent.action.MAIN` is triggered. We’ll cover exactly
    what these concepts are shortly in this chapter, but for now you can think of
    this as an Android way of flagging what your application first shows a user when
    it starts.


    ### Jiving with Java


    The second and third main areas of your Android Project Explorer view are for
    your Java source files. These are the text files in which Java code is written
    to bring your application to life and have it perform the actions, features, and
    behaviors you intend for your app to have.


    You will see two high-level folders, one for `Java` and one for `Java (generated)`.
    In fact at this stage, all of the files in both areas have been generated for
    you, but in general as you develop your application, you will change the files
    in the `Java` tree, add new ones, and so on and leave Android Studio and its integrated
    tools to automatically handle the `Java (generated)` files.


    There is one file in particular to spot right now, and that is the `MainActivity`
    file under the `Java` ➤ `org.beginningandroid.myfirstapp` folder. The file on
    disk is actually called `MainActivity.java`, and the Android view in Project Explorer
    is hiding the file extension. This `MainActivity` file is the code that will run
    when your application starts, based on the configuration mentioned earlier in
    the Android Manifest file.


    We will look at what is meant by activity both later in this chapter and in depth
    in many future sections of the book.


    ### Getting Resourceful with Resources


    The fourth main area of files within your new project are the resource files,
    found in the `res` folder and its subfolders. There are quite a number of items
    generated for you to begin with, in different categories of resources.


    #### Drawables


    Drawables are those things that Android will draw, or render, on-screen as part
    of your application. This means both normal images, such as artwork, diagrams,
    and other static images, and images it will have to generate at runtime based
    on instructions given to it.


    The first kind of drawables are represented in typical image files that you might
    be familiar with, such as GIF, JPEG, and PNG files. Android has mechanisms to
    scale images up and down to suit various density screens/displays and also lets
    you store different resolution versions of the same image so as to avoid scaling.
    We will delve into the world of image, photo, and artwork creation and techniques
    for Android applications in Chapter [14](#499629_1_En_14_Chapter.xhtml).


    The second kind of drawables Android supports are vector images that it creates
    at runtime, based on specifications provided in XML files. You can see two examples
    of XML files providing vector graphics instructions in your new project – `ic_launcher_background.xml`
    and `ic_launcher_foreground.xml`.


    #### Layouts


    In Chapters [9](#499629_1_En_9_Chapter.xhtml) and [10](#499629_1_En_10_Chapter.xhtml),
    we will explore layouts and designing the UI of your application in detail, covering
    a range of options and styles. When you created your new project in Chapter [3](#499629_1_En_3_Chapter.xhtml),
    you will remember choosing the “Empty Activity” option for your project. This
    choice was used by Android Studio to put in place a default layout, which appears
    in the file `activity_main.xml` under the `layout` subfolder.


    Once again, this is an XML file, and Android makes extensive use of XML in defining
    the initial layout and behavioral characteristics of activities. If you think
    of an activity as a screen or window in your Android application, which is then
    used by users, it is the XML layout that provides the description of how to create
    and render the interface. This `activity_main.xml` layout is used by your `MainActivity`
    Java code when it wants to draw the activity on-screen. This process is known
    as “inflation” in the Android world and applies to the process for laying out
    an entire activities interface, as well as any subset of it such as creating a
    menu or dynamically adding one layout inside another. As your application grows,
    so too will the number of activity layout XML files in this folder.'
