  trans: "  \n# 图 9-5  \n\n运行中的`ImageViewExample`应用程序，展示了带有资源的`ImageView`  \n\n你可以在`Ch09/ImageViewExample`文件夹中找到该示例的代码。\
    \  \n\n# 使用`EditText`编辑和输入文本  \n\n在你迄今对 Android 控件的探索中，你已经了解了静态文本标签、可触发活动的按钮以及显示图像的方法。几乎每个应用程序在某个时刻都需要用户输入，而输入通常是文本。没有某种可编辑表单或字段控件的控件集是不完整的，Android\
    \ 通过`EditText`控件满足了这一需求。  \n\n`EditText`的类层级结构显示它派生自你已经熟悉的`TextView`类，并最终派生自`View`类。作为`TextView`的子类，`EditText`继承了你在`TextView`中见过的许多能力、方法和数据成员，例如`textAppearance`。`EditText`还引入了一系列新的属性和特性，使你能精细控制文本字段的外观和行为。这些新属性包括：\
    \  \n\n1. `android:singleLine`：管理回车键的行为，确定回车键是应在文本字段内创建新行，还是将焦点移动到活动布局中的下一个控件。\
    \  \n2. `android:autoText`：管理内置拼写校正功能的使用。  \n3. `android:password`：配置字段，在输入字符时显示密码圆点。\
    \  \n4. `android:digits`：限制输入仅接受数字，隐藏字母类型的字符。  \n\nAndroid 还提供了一种更细致——有人会说更精密——的方法来指定`EditText`的字段特性。可以使用`inputType`属性，将`EditText`字段的所有期望属性和特性集中在一起。我们将在第\
    \ 10 章中介绍`inputType`以及键盘和输入方法的相关主题。清单 9-6 展示了`inputType`与其他选项配合使用的情况。  \n\n清单\
    \ 9-6 展示了`android:inputType`属性的基本用法，此处标记用户文本应自动将第一个单词的首字母大写。我们还使用了常规属性`android:singleLine`并设置为\
    \ false，从而在`EditText`字段中启用多行文本。  \n\n```  \n清单 9-6  \n使用 XML 属性配置 EditText 字段的行为\
    \  \n```  \n\n清单 9-7 展示了如何通过附带的 Java 包以编程方式操作`EditText`字段。你可以在`Ch09/EditTextExample`中找到此示例。\
    \  \n\n```  \npackage org.beginningandroid.edittextexample;  \nimport androidx.appcompat.app.AppCompatActivity;\
    \  \nimport android.os.Bundle;  \nimport android.widget.EditText;  \npublic class\
    \ MainActivity extends AppCompatActivity {  \n@Override  \nprotected void onCreate(Bundle\
    \ savedInstanceState) {  \nsuper.onCreate(savedInstanceState);  \nsetContentView(R.layout.activity_main);\
    \  \nEditText myfield=(EditText)findViewById(R.id.myfield);  \nmyfield.setText(\"\
    Our EditText widget\");  \n}  \n}  \n清单 9-7  \nEditText 控件可以轻松地从代码中操作  \n``` \
    \ \n\n请注意，我们在该清单中引入了`findViewById`方法。你可以想象，当你有任意数量的控件时，你需要一种编程方式来找到程序逻辑中要操作的那个控件。通过使用`R.id.named_id_from_XML_definition`形式的资源\
    \ ID 引用，你可以隐式地查找并链接到 XML 布局中通过该控件的`android:id`属性定义的匹配控件。因此，在此例中，`R.id.myfield`查找并匹配你的`EditText`的`android:id`，即`@+id/myfield`。\
    \  \n\n你可以在图 9-6 中看到`EditText`示例的结果。  \n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig6_HTML.jpg](img/499629_1_En_9_Fig6_HTML.jpg)\
    \  \n\n**图 9-6**  \n`EditText`控件运行中，通过键盘完整编辑文本  \n\n还有其他典型迹象表明这是一个可编辑字段。内置的字典和拼写检查器可用——尝试拼错一个单词，它将以红色下划线显示。当字段获得文本输入焦点时，闪烁的光标也显而易见。你还可以通过选择称为`AutoCompleteTextView`变体（同样继承自`TextView`和`View`）的兄弟控件来帮助用户更快地输入，它会在用户输入时提示自动补全的建议词。\
    \  \n\n> **注意**  \n> 在使用`EditText`控件时，你可以通过使用名为`TextInputLayout`的布局实现更精密的功能，该布局包装并扩展了默认的`EditText`行为，提供了文本提示、高亮、帮助提示等功能。你可以在`developer.android.com`上找到更多关于`TextInputLayout`的信息。\
    \  \n\n# 初探`CheckBox`  \n\nAndroid 中另一个经典的 UI 控件是`CheckBox`，它提供了一种二元开关/是/否/选中/未选中的控件。`CheckBox`是`View`（你猜对了）和`TextView`（这可能会让你惊讶）的子类。这种类继承关系意味着你可以通过继承获得一系列有用的属性。`CheckBox`对象为你提供了一些\
    \ Java 辅助方法，用于对复选框执行有用的操作：  \n\n1. `toggle()`：切换`CheckBox`的状态  \n2. `setChecked()`：无论当前状态如何，都选中（设置）`CheckBox`\
    \  \n3. `isChecked()`：用于检查`CheckBox`是否被选中的方法  \n\n在清单 9-8 中，我们有一个示例复选框布局及简单的附带\
    \ Java 逻辑，你可以在`Ch09/CheckboxExample`项目中找到它。  \n\n```  \n清单 9-8  \n一个包含 CheckBox\
    \ 的布局  \n```  \n\n虽然一个略显吸引人的`CheckBox`单独看起来可能不错，但它真正需要*做*些什么，才能对你或你的用户有用。我们通过添加\
    \ Java 逻辑来配合布局，从而释放`CheckBox`的能力。清单 9-9 是演示如何将逻辑链接到复选框的 Java 包。  \n\n```  \npackage\
    \ org.beginningandroid.checkboxexample;  \nimport androidx.appcompat.app.AppCompatActivity;\
    \  \nimport android.os.Bundle;  \nimport android.widget.CheckBox;  \nimport android.widget.CompoundButton;\
    \  \nimport android.widget.CompoundButton.OnCheckedChangeListener;  \npublic class\
    \ MainActivity extends AppCompatActivity {  \nCheckBox myCheckbox;  \n@Override\
    \  \nprotected void onCreate(Bundle savedInstanceState) {  \nsuper.onCreate(savedInstanceState);\
    \  \nsetContentView(R.layout.activity_main);  \nmyCheckbox = (CheckBox)findViewById(R.id.check);\
    \  \nmyCheckbox.setOnCheckedChangeListener(new OnCheckedChangeListener() {  \n\
    @Override  \npublic void onCheckedChanged(CompoundButton buttonView, boolean isChecked)\
    \ {  \nif (buttonView.isChecked()) {  \nmyCheckbox.setText(\"The checkbox is checked\"\
    );  \n}  \nelse  \n{  \nmyCheckbox.setText(\"The checkbox is unchecked\");  \n\
    }  \n}  \n});  \n}  \n}  \n清单 9-9  \n用一些编程逻辑启动 CheckBox  \n```  \n"
- fmt: "Clearly, there’s a bit more going on here in the `CheckBox` code than earlier\
    \ examples such as `EditText`. If you look first at the classes imported, you\
    \ get a clue to what is happening. I have imported `OnCheckedChangeListener` and\
    \ provided the implementation for the `onCheckedChanged()` callback method. This\
    \ means we have set the `CheckBox` to be its own event listener for state change\
    \ actions like being clicked. When a user now clicks the `CheckBox` to toggle\
    \ it, the `onCheckChanged()` callback is fired. The logic of our callback implementation\
    \ tests the current state of the `CheckBox` after the toggle and updates the text\
    \ of the checkbox with a written description of its new state. This is both a\
    \ nice way to bundle up in one place all of the behavior of the widget and let\
    \ us do things like form validation in the same logic flow during user entry,\
    \ without needing to pass around a bag of user or data state. Your code and related\
    \ runtime input checks are elegantly side by side.\n\nFigures [9‑7](#499629_1_En_9_Chapter.xhtml#Fig7)\
    \ and [9‑8](#499629_1_En_9_Chapter.xhtml#Fig8) show our `CheckBoxExample` app\
    \ in both the checked and unchecked states.\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig8_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9‑8: The checkbox is now checked.\n\n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig7_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9‑7: The checkbox is unchecked.\n\n## Switching It Up with a Switch\n\
    \nThe `Switch` widget was introduced later in Android’s development, but serves\
    \ exactly the purpose its name implies. A `Switch` acts like a binary toggle,\
    \ offering on/off‑style state, which the user can activate by swiping or dragging\
    \ with their finger as if they were toggling a light switch. A user can also just\
    \ tap the `Switch` widget as if it were a `Checkbox` to change its state. Over\
    \ several versions of Android, the `Switch` widget has been tweaked to deal with\
    \ compatibility and other issues, so other variants like a `SwitchCompat` widget\
    \ are sometimes used instead of the original `Switch` widget, but the overall\
    \ purpose and handling is similar.\n\nAs well as the inherited properties from\
    \ `View` and so on, a `Switch` widget provides the `android:text` property to\
    \ display associated text with the `Switch` state. The text is controlled with\
    \ two helper methods, `setTextOn()` and `setTextOff()`.\n\nFurther methods are\
    \ available for a `Switch` widget, including:\n\n1. `setChecked()`: Changes the\
    \ current `Switch` state to on (just like `Checkbox`).\n2. `getTextOn()`: Returns\
    \ the text used when the switch is on.\n3. `getTextOff()`: Returns the text used\
    \ when the switch is off.\n\nThe `Ch09/SwitchExample` project provides a working\
    \ example of a `Switch`. Listing [9‑10](#499629_1_En_9_Chapter.xhtml#PC14) shows\
    \ a simple switch layout.\n\n```\nListing 9‑10: The layout for SwitchExample.\n\
    ```\n\n> **Note:**  \n> Don’t try to have your `android:id` be “switch,” as in\
    \ `@+id/switch`. Java reserves the word `switch` for its case‑like branch logic\
    \ statement, so you will need to use something else as I have in this example.\n\
    \nThe logic to configure the behavior of the switch lives in our Java code, shown\
    \ in Listing [9‑11](#499629_1_En_9_Chapter.xhtml#PC15).\n\n```\npackage org.beginningandroid.switchexample;\n\
    import androidx.appcompat.app.AppCompatActivity;\nimport android.os.Bundle;\n\
    import android.widget.Switch;\nimport android.widget.CompoundButton;\nimport android.widget.CompoundButton.OnCheckedChangeListener;\n\
    public class MainActivity extends AppCompatActivity {\n    Switch mySwitch;\n\
    \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n   \
    \     super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n\
    \        mySwitch = (Switch) findViewById(R.id.switchexample);\n        mySwitch.setOnCheckedChangeListener(new\
    \ OnCheckedChangeListener() {\n            @Override\n            public void\
    \ onCheckedChanged(CompoundButton buttonView, boolean isChecked) {\n         \
    \       if (buttonView.isChecked()) {\n                    mySwitch.setText(\"\
    The switch is on\");\n                } else {\n                    mySwitch.setText(\"\
    The switch is off\");\n                }\n            }\n        });\n    }\n\
    }\nListing 9‑11: Controlling switch behavior in code.\n```\n\nIf that code structure\
    \ and logic looks familiar to you, it should! Conceptually, a `Switch` and a `CheckBox`\
    \ are almost identical, and your logic to operate on them is, at least at the\
    \ entry level, almost interchangeable. You can see the switch in action, both\
    \ on and off, in Figures [9‑9](#499629_1_En_9_Chapter.xhtml#Fig9) and [9‑10](#499629_1_En_9_Chapter.xhtml#Fig10).\n\
    \n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig10_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9‑10: The switch is on, and the logic has triggered to change its text.\n\
    \n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig9_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig9_HTML.jpg)\n\
    \nFigure 9‑9: The switch widget in the off position.\n\n## Choosing Things with\
    \ Radio Buttons\n\nRounding out our detailed look at the core UI widgets of Android,\
    \ it’s time to introduce the `RadioButton`. Just as in most other widget toolkits,\
    \ Android’s `RadioButton` shares the two‑state logic that you have already experienced\
    \ with `CheckBox` and `Switch` widgets and gains many of the same features through\
    \ also being a subclass of `View` and `CompoundButton`. Just as you’ve seen in\
    \ earlier examples, you can set or test state through methods like `toggle()`\
    \ and `isChecked()` and control text size, color, and so forth through styling\
    \ attributes.\n\nThe Android `RadioButton` widget takes these capabilities further\
    \ by adding a further layer of functionality to allow multiple radio buttons to\
    \ be grouped into a logical set and then allowing only one of the buttons to be\
    \ set at any time. That should sound familiar if you have used any other UI toolkit,\
    \ web page, or smartphone application in recent years. To group multiple `RadioButton`s,\
    \ each is added to a container element known as a `RadioGroup`, in the XML layout.\n\
    \nJust like other widgets, you can assign an ID to a `RadioGroup` via the `android:id`\
    \ attribute, and using that reference as a starting point takes advantage of the\
    \ methods available on the entire group of `RadioButton`s. These methods include:\n\
    \n1. `check()`: Checks/sets a specific radio button via its ID regardless of its\
    \ current state.\n2. `clearCheck()`: Clears all radio buttons in the `RadioGroup`.\n\
    3. `getCheckedRadioButtonId()`: Returns the ID of the currently checked `RadioButton`\
    \ (this will return `-1` if no `RadioButton` is checked).\n\nListing [9‑12](#499629_1_En_9_Chapter.xhtml#PC16)\
    \ shows the layout for a `RadioGroup` with `RadioButton`s.\n\n```\nListing 9‑12:\
    \ RadioButton and RadioGroup layout.\n```\n\nYou can also intersperse and add\
    \ other widgets into the `RadioGroup` structure, and these will render within\
    \ the group per their constraint rules for `ConstraintLayout` or other placement\
    \ rules for layouts we’ll discuss in the next chapter. You can see the bare‑bones\
    \ `RadioButton`s in action in Figure [9‑11](#499629_1_En_9_Chapter.xhtml#Fig11).\n\
    \n![../images/499629_1_En_9_Chapter/499629_1_En_9_Fig11_HTML.jpg](images/499629_1_En_9_Chapter/499629_1_En_9_Fig11_HTML.jpg)\n\
    \nFigure 9‑11: `RadioGroup` and `RadioButton` in action.\n\n## Learning Even More\
    \ UI Widgets"
