- fmt: "# Figure 14-4  \nConceptual view of a video container format\n\nAs you can\
    \ see, your video file is really a combination of the four aspects shown:\n\n\
    1. The overall container format, for which Android supports MPEG-4 part 14, Matroska,\
    \ 3GPP, and WebM – but not other popular containers such as AVI.\n2. One or more\
    \ videos encoded using a supported codec (as outlined earlier in this chapter).\n\
    3. One or more audio streams encoded using a supported audio codec (as outlined\
    \ in Chapter 13).\n4. One or more subtitle/caption resources.\n\nThose factors\
    \ in combination make your life as an avid video-focused developer a little more\
    \ complex. If that’s where the complexity ended, you would probably feel happy\
    \ to work with these factors. But there is one more complication, and that revolves\
    \ around the combination of video and audio codecs Android supports inside a given\
    \ container format. Things are unfortunately not universally plug-and-play, where\
    \ you could work with any permutation of the options outlined here. Instead, you\
    \ should always reference the currently supported combinations for Android in\
    \ the Android developer reference documentation, which you can find at [`https://developer.android.com/guide/topics/media/media-formats`](https://developer.android.com/guide/topics/media/media-formats).\
    \ So what do you do when presented with great video material you want to use in\
    \ your application that happens to be in an unsupported container or when you\
    \ want to use unsupported codecs or combinations of container formats and codecs?\
    \ I’m glad you asked! In the next section, we will walk through a great range\
    \ of tools you can consider adding to your developer toolkit to advance your video\
    \ content creation, editing, and management skills.\n\n## Expanding Your Developer\
    \ Video Toolset\n\nAs an avid Android developer, you will realize quickly that\
    \ tools like `Android Studio` are designed primarily around coding, layout, and\
    \ the workflow of turning code into working applications. `Android Studio` doesn’t\
    \ come equipped with advanced tools for things like graphics or video creation\
    \ or editing, which means to build your options as a developer, you should look\
    \ at tools to complement your `IDE` that do excel at things like video editing.\n\
    \n### Reviewing the Range of Video Editing Tools Available to You\n\nWhen it comes\
    \ to the field of video production, video editing, and video content management,\
    \ there is a surprisingly vast array of software options from which you, as a\
    \ developer, can choose. These include both traditional installed software and\
    \ hosted/cloud versions of some quite powerful tools.\n\nIn deciding what tool\
    \ or tools to adopt and use, you will want to ask yourself a few questions about\
    \ how you plan to use video in your applications, as this will skew the choice\
    \ of tools accordingly. Some of the key questions to ask are as follows:\n\n1.\
    \ Will I be embedding video in my application – and therefore including it as\
    \ raw or asset files – or will I stream from an online source?\n2. Will I be creating\
    \ and recording my own videos or using other sources of videos and simply incorporating\
    \ whatever I source that way?\n3. Will I need to manage a library of videos or\
    \ video content, or do my videos total a very small set of content that I can\
    \ manage in an ad hoc fashion?\n4. Will I want to edit, change, or otherwise alter\
    \ video for inclusion in my application?\n\nThinking through those questions can\
    \ help you avoid choosing tools that don’t have strengths in the areas you need,\
    \ not to mention potentially helping you avoid cost in monetary terms and developer\
    \ time by picking better tools for what you seek to do. I have outlined in the\
    \ following a range of contemporary, popular, free, and commercial tools that\
    \ you should explore for yourself, and judge what tool or tools will match your\
    \ needs the best. Then I walk through using `HandBrake` – a very popular, free,\
    \ open source tool – for one of the most common video workflows you will encounter\
    \ as an Android developer: editing an existing video for playback on Android.\n\
    \n### Popular Open Source Video Editing Suites\n\nThis list of open source tools\
    \ is not exhaustive, but touches on a range of popular video editing tools:\n\n\
    - **FFmpeg**: A fantastically powerful library and set of command-line tools for\
    \ all forms of video editing, transcoding, and more. FFmpeg is also commonly found\
    \ as the engine doing the hard work within some of the other tools mentioned in\
    \ this book and elsewhere.\n- **VideoLAN VLC**: A video playback, editing, and\
    \ general jack-of-all-trades tool, VLC benefits from being available on every\
    \ conceivable operating system platform, including Android itself.\n- **HandBrake**:\
    \ A single-purpose, very powerful tool. HandBrake’s main goal is to provide the\
    \ best possible tools to transcode video. It does this very well – in fact, we’ll\
    \ explore its use later in the chapter.\n- **Kdenlive**: A very competent editing\
    \ and management suite for video and also one of the most mature.\n- **OpenShot**:\
    \ Newer than Kdenlive, but targeting the same comprehensive video editing and\
    \ management toolset.\n\n### Popular Commercial Video Editing Suites\n\n- **Adobe\
    \ Premiere**: As a long-time user of Premiere, I can tell you it has a wealth\
    \ of features and works reasonably well with other Adobe products. Its pricing\
    \ often leaves hobbyists or early-stage developers looking elsewhere.\n- **Final\
    \ Cut Pro**: Apple’s major commercial offering, a very capable tool but one clearly\
    \ designed for the macOS community.\n- **Lightworks**: A serious tool for serious\
    \ video editing and management, Lightworks was born in the movie industry and\
    \ is the de facto standard in that space.\n- **DaVinci Resolve**: A newer and\
    \ very interesting product, Resolve is offered under a “Freemium” model, where\
    \ the entry level is free (and very good) and more sophisticated features and\
    \ capabilities are offered in the paid-for versions.\n- **Apple iMovie**: If you\
    \ are an owner of a Mac machine, then your purchase included the bundled iMovie\
    \ software. While this is targeted at home and consumer use, it is actually a\
    \ great product that can do a lot for your initial movie editing and management\
    \ needs. Obviously Mac-only.\n\n## Introducing HandBrake for Video Editing\n\n\
    To get you familiar with the workflow of video editing, let’s review the most\
    \ straightforward task you will likely undertake, which is to transcode an existing\
    \ video from some arbitrary container format and video codec into a supported\
    \ container and codec for use in your Android applications. One of the stand-out\
    \ tools for this kind of work is `HandBrake`, which is akin to a Swiss Army knife\
    \ of video transcoding. Other tools can also do an admirable job of transcoding,\
    \ but `HandBrake` is one of the easiest in which to gain proficiency."
