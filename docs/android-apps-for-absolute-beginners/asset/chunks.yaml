    # 使用 StrictMode 分析应用性能


    Android 生态系统提供了一系列工具来帮助分析应用行为和性能。`StrictMode` 策略工具就是其中之一，它通过分析所有代码的运行情况来查找其策略中定义的问题，从而帮助解决任何
    I/O 延迟问题。


    `StrictMode` 提供了多种策略，不过你可能会发现自己主要使用它最初提供的两种策略。第一种是虚拟机策略，用于覆盖整个应用中普遍存在的不良行为或做法，例如泄漏数据库连接对象。第二种是线程策略，专门用于查找在主
    UI 线程上运行的不良代码。这有助于发现那些会减慢或中断用户与 UI 流畅交互的代码——无论是你自己的代码还是 Android 的代码。


    你可以通过从 `onCreate()` 回调中调用静态方法 `StrictMode.enableDefaults()` 来激活 `StrictMode` 策略。调用此方法会在
    Logcat 输出中报告一系列关于 UI 线程问题（包括文件 I/O 相关问题）的有用信息。你也可以根据需要定义自己的策略——具体细节超出了本书的范围，但如果你有兴趣，Android
    文档中有更详细的介绍。


    ## 警告


    尽管 `StrictMode` 策略非常有用，但切勿将其保留在最终发布的代码和应用程序中。如果保留 `StrictMode`，将会在用户设备上生成大量的日志数据，从而消耗你一直小心管理的文件系统空间。


    # 将逻辑移至异步线程


    前面关于 `StrictMode` 的讨论开启了将逻辑从应用的主 UI 线程和界面移出的世界。几乎在任何时候，都值得思考你的应用中是否存在不需要在关键路径上执行的逻辑，例如从在线服务后台查询数据、消息传递或发布/订阅风格的通知、缓存项目等等。


    任何可以在关键路径之外执行的操作都应考虑进行异步处理，这正是 Android 的 `AsyncTask` 的强项，它能够生成额外的线程来处理你交给它的任何逻辑。这非常值得你在学习
    Android 的过程中掌握，因为大多数开发者都将其作为管理跨应用线程的主力工具。


    `AsyncTask` 类以一种需要你（作为开发者）对其进行子类化的形式提供，以便为你想要完成的工作创建具体的实现。这很合理，因为 Android 无法预先了解你的应用的详细信息，也无法覆盖全世界开发者希望它处理的数百万种任务。要使用
    `AsyncTask`，你需要实现它提供的 `doInBackground()` 方法，并在其中编写你想要在另一个线程上执行的实际逻辑。你还可以选择实现一些额外的方法，用于提供执行前后的逻辑、以受控的方式与
    UI 交互等。


    代码清单 19-5 给出了一个展示子类化 `AsyncTask` 的框架，说明了如何用它来执行文件保存操作。实现方式不胜枚举，但你可以领会其总体思路。


    ```

    private class SmartFileSaver extends AsyncTask {

    protected void onPreExecute() {

    // 此方法将在 UI 线程上触发

    // 显示一条 Toast 消息

    Toast.makeText(this, "正在保存文件", Toast.LENGTH_LONG).show();

    }

    protected void doInBackground() {

    // 此方法将生成一个后台线程

    // 所有工作都在 UI 线程之外执行

    // 创建输出流

    // 调用 .write()

    // 捕获异常

    // 等等

    }

    protected void onPostExecute() {

    // 此方法将在 UI 线程上触发

    // 显示一条 Toast 消息

    Toast.makeText(this, "文件已保存", Toast.LENGTH_LONG).show();

    }

    }

    代码清单 19-5

    一个 AsyncTask 子类化示例

    ```


    使用 `SmartFileSaver.execute()` 方法将调用我们定义的各种 `onPreExecute()`、`doInBackground()`
    和 `onPostExecute()` 方法，并由 Android 管理相关的线程生命周期和 UI 交互。


    # 本章小结


    你现在已经对 Android 下文件 I/O 的基本机制有了扎实的了解，特别是对文件系统、文件处理、以及流和文件内容机制有了深入的理解，这些都是处理文件时不可或缺的部分。


    # 20. 在 Android 中使用数据库


    文件并不是将应用信息存储到 Android 设备的唯一方式。Android 还提供了两种主要的信息管理方法：一个基于 SQLite 的成熟关系型数据库，以及
    Android 内容提供者框架。在本章中，我们将探讨 SQLite 数据库——如果你对内容提供者感兴趣，可以访问本书网站 [`www.beginningandroid.org`](http://www.beginningandroid.org)
    了解更多。


    如果你熟悉 SQLite，你会知道它是一个坚如磐石的数据库引擎，可以作为单个包含文件或库提供给任何类型的应用程序。SQLite 最近迎来了作为正式发布产品的
    25 周年，证明了它自己是软件开发史上始终如一的中流砥柱。


    ## 使用 SQLite：世界上最流行的数据库！


    任何在数据库领域工作过的人都会熟悉 SQLite，但尽管它如此流行，其他领域的人可能从未听说过它。毫不夸张地说，SQLite 是地球上“最流行”的关系型数据库技术。这是一个大胆的说法，所以让我提供一些佐证。


    为了让您了解 SQLite 的普遍性和流行程度，我整理了这份简短的数据点清单来帮助说明。


    SQLite 是：


    1. 每款智能手机操作系统默认且核心的关系型数据库。显然，本书主要讨论 Android，但其他你听说过的智能手机操作系统——例如 iOS——以及你可能没听说过的操作系统，比如
    Symbian，都将 SQLite 用作几乎所有内部需求的默认数据库。


    2. 被所有网络浏览器选为本地缓存、书签等的关键技术。无论你使用的是 Chrome、Safari、Opera、Edge 还是 Internet Explorer（还记得它吗？！），你每天都在使用
    SQLite。


    3. 被包含在“数百万”商业和开源产品中。我说数百万绝非夸张！


    我最喜欢用来说明 SQLite 究竟有多流行的方法之一就是如下表述。亲爱的读者，从你购买智能手机的第一天起，你每天就都在使用或受益于 SQLite。即使你没有意识到，你也是一个活生生的、行走的
    SQLite 受益者！


    ### 注意


    要更深入地探索 SQLite 的世界，我推荐《SQLite 权威指南（第二版）》（ISBN 9781430232254）。为充分披露信息，我是该书的合著者之一。


    你们中的许多人可能完全不熟悉 SQLite。你可能没有探索过 SQLite 在 Android 下的能力，也没有利用过它的优势。这完全在意料之中，也正是本章存在的原因。从现在开始，我们将逐步介绍使用
    SQLite 作为数据库和 Android 核心功能的基础知识，并且我们将构建一个可运行的数据库驱动的示例应用程序来磨练你的技能。


    ## 快速学习用于 Android 开发的 SQLite


    `SQLite` 主要被定位为一个直接的数据库库，提供了你可能想要从关系型数据库查询和事务引擎中获得的所有核心功能。这意味着你可以访问一个完全兼容的结构化查询语言（SQL）接口，但始终要记住你感兴趣的任何特性所引入的是哪个
    SQL 级别（例如 SQL-92 和 SQL-99），这一点非常重要。这一点尤其重要，因为用户设备上附带的 SQLite 版本通常比最新版本落后好几年。

