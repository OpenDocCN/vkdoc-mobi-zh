    Java 特有的方面进行对照参考。


    第一行是 `import` 语句，指示我们的程序使用 Java 的库系统（其中打包了其他 Java 功能供你使用，无需从头开始自行构建所有内容）。其语法看起来有点奇怪，但其核心是我们指示
    Java 引入 `java.io` 库和 `java.util` 库的所有特性。这些库处理诸如文件和控制台输入输出等事务，以及你经常想要或需要的其他通用功能。


    接下来是一个 `class` 声明。类是面向对象（OO）设计范式的应用开发中的核心概念，我们将在本章后面更详细地讨论它。重要的是，这是一个由我（或你）选择的类定义。我选择了名称
    `FirstJavaDemo`。Java 关键字 `"public"` 意味着，如果需要，其他 Java 程序可以尝试导入我的类并重用。


    类的主体和其他逻辑子块都包裹在你看到的花括号 `{` 和 `}` 符号中。这些花括号是重要的标点符号（用编程和编译器的术语来说，就是标记），必须用于对嵌套的逻辑集（无论是类、类的方法，还是诸如循环和条件测试等内部逻辑块）进行分组。


    接下来，是强制性的 `main()` 方法，我们将其定义为返回类型 `void`，这本质上意味着程序退出时不从变量或其他方法调用中返回任何数据，并且它接受一个名为
    `args` 的 `String` 数组作为（可选）参数。实际上，这种方法是许多编程语言中的长期风格，即可以在程序首次运行时向其传递参数（或实参），供开发者出于任何目的使用，例如在程序中开启或关闭选项，或者用关键的启动数据初始化程序。


    然后，我们基于 `System.console()` 方法提供的 `Console` 对象，定义并创建了一个名为 `console`（小写）的对象。`System.console()`
    方法本身是我们能够使用的一个工具，这得益于我们导入了 `java.util` 库。该方法隐藏了 `FirstJavaDemo` 程序和 JVM（Java 虚拟机）之间的大量操作系统交互，以便将你的程序连接到控制台——通常是一个
    shell 或命令提示符窗口，或者类似 Android Studio IDE 中控制台窗口这样更复杂程序中的一部分。


    ## 核心概念：数据类型与变量


    这个 `Console` 对象以及名为 "console" 的工作副本或容器的示例，引入几乎所有编程语言（包括 Java）的两个基本方面。这些概念是变量和数据类型。


    变量可以被视为一个容器或占位符，用于存放某个尚未明确的值——就像高中数学或代数那样。在 Java 中，变量首先被定义，目的是标识其将包含的信息种类，即所谓的数据类型。


    Java 中的数据类型是对变量或其他情况下所用信息或数据种类的一种规范。数据类型有两种形式：第一种是非常简单的数据类型，称为原始类型，它们以几种形式表示简单的整数或浮点数——`int`、`short`、`long`、`float`
    和 `double`，以及表示简单字符文本的 `char` 和表示 `true` 或 `false` 值的 `boolean`。


    第二种数据类型是更复杂的对象，比如我们 `Console` 示例中的情况。你可以将这种更复杂的数据类型视为多个原始数据类型和可用于处理该数据的预定义逻辑的复合集合。这就是
    Java 和其他面向对象编程语言中类的本质。


    有时创建控制台会因奇怪的原因失败——权限问题就是一个例子。我们使用 Java 的 If-Then 逻辑引入一个逻辑测试，用 `==` 符号表示，以判断我们的
    `console` 是否存在或未定义——在 Java 术语中为 `null`。如果 `console` 未定义，我们使用由于导入了 `java.io` 库而可以访问的
    `System.out.println()` 方法，并输出一些有用的、对人类阅读者有意义的字面字符串文本。然后我们使用 `System.exit()` 方法在此时退出程序。


    ## 核心概念：Java 中的分支与循环结构 – If、While、For


    清单 7-1 中的代码展示了 Java 中主要的逻辑控制结构之一——`If` 语句。还有其他几种这样的结构，允许你基于测试某个值来决定执行合适的分支逻辑，或者基于测试某个值并持续到条件改变来重复执行操作。除了
    `If` 语句，Java 还提供了 `For` 循环、`While` 循环和 `Do While` 循环。这些后续的每个结构都有许多细微差别，我们将在本书后面探讨，但你可以在
    [`http://en.wikibooks.org/wiki/Java_Programming/`](http://en.wikibooks.org/wiki/Java_Programming/)
    了解更多相关信息。


    在创建 `console` 对象一切顺利这种更可靠和常见的情况下，我们接着使用 `System.print()` 方法在控制台打印一个问题的文本，并使用 `System.readln()`
    方法接收你键入的回应，并将其存储在我们定义的一个名为 `something` 的 `String` 变量中，作为存放你输入文本的位置。最后，我们再次使用 `System.println()`
    方法，结合由 `+` 运算符提供的 `String` 拼接功能来回应你。


    这段简短的描述应该能帮助你理解 `FirstJavaDemo` 应用的作用，但除了非常初步的层面外，它并不能让你深入理解 Java 的语法、结构或规则。我们稍后将进一步加深你的理解。现在，让我们练习编译和运行这个程序。


    要编译程序，请打开一个 shell 或命令提示符，如果需要的话，根据你的操作系统所述切换到 JDK 目录。记下你将 `Ch07/FirstJavaDemo.zip`
    中的 `FirstJavaDemo.java` 文件放在了磁盘的哪个位置。然后调用 `javac` 二进制程序，并传递 `FirstJavaDemo.java`
    的完整路径和文件名，例如在 macOS 或 Linux 上如下所示：


    ```

    $ javac /FirstJavaDemo.java

    ```


    稍等片刻后，你应该会看到命令或 shell 提示符重新回到你的控制之下。那么发生了什么？`javac` 工具已经处理了源代码，并生成了 JVM 现在可以理解和运行的中间版本代码。在你的目录中，你应该会看到一个名为
    `FirstJavaDemo.class` 的新文件，这就是 `javac` 命令的输出结果。

