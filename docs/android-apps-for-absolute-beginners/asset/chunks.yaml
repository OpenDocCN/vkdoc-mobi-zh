- fmt: '虽然代码量不小，且附带的`NotificationFollowon`类也是如此，但其中大部分内容你应该已经熟悉。在`onCreate()`中设置Activity时，执行了恢复或创建状态、填充布局等常规任务，此外还创建了`myNotifyMgr`对象以绑定系统通知基础设施。`NotificationBuilderExample`类本身还为通知设置了一个虚拟ID，并用一个计数器来跟踪有多少待处理的通知。请注意，你可以轻松决定从你的应用程序发送多种不同类型的通知。如果你决定这样做，请务必使用不同的ID来区分每种类型。


    `onCreate()`中的另一个主要逻辑部分执行了必要的SDK（API）级别检查，以确定是否需要使用通知通道来向用户显示所需的通知。如果SDK版本处于或高于强制使用通知通道的级别，我们会检查`MYCHANNEL`是否存在（`null`比较），如果它尚不存在，则实例化它以供使用。如果它已存在，则无需额外工作——例如，如果我们已经使用过该应用程序，并且在至少触发一次通知后让它保持运行状态。


    `onClick()`方法是我用来将按钮点击处理分组在一起的常见模式——尽管在这个例子中，你也可以让每个按钮直接调用相关的`raiseNotification()`和`dismissNotification()`方法。正是这些方法的实现包含了我们有趣的逻辑。


    在`raiseNotification()`方法中，我们执行了本章开头描述的几乎所有可选配置和自定义。首先，我们创建一个指向`NotificationFollowon`
    Activity的`PendingIntent`。如果用户决定点击通知抽屉中的挥手图标，此意图将被触发。


    接下来，创建`Notification`（或本例中的`NotificationCompat`）的`Builder`对象，并将由此构建器实例生成的任何结果通知分配到`onCreate()`方法中设置的`MYCHANNEL`通道。


    然后，我们进入使用`myNotifyBuilder`对象的核心部分，为最终要构建的`Notification`对象添加许多通知“附加功能”：


    1. 调用`.setTicker()`来提供一些滚动条文本。

    2. 调用`.setNumber()`来增加通知已被触发的次数。

    3. 调用`.setSound()`并传入`pop.mp3`声音文件作为来自`raw`文件夹的资源。

    4. 调用`.setVibrate()`，设置振动模式为响1秒、停半秒。

    5. 调用`.setAutoCancel()`来禁用自动取消选项。


    配置完所有选项后，我最终将构建的当前状态传递给`myNotification`对象，然后将这个`Notification`和`NOTIFICATION_ID`传递给`NotificationManager`，以便呈现给用户。


    从用户视角看通知


    在虚拟设备上运行`NotificationBuilderExample`应用程序可以提供大部分的通知体验（振动往往是AVD处理得不好的一个方面）。图[15-2](#499629_1_En_15_Chapter.xhtml#Fig2)显示了通知出现在主屏幕的图标栏中。


    ![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig2_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig2_HTML.jpg)


    图15-2

    在左上角触发的通知——小小的挥手图标'
  raw: "```\npackage org.beginningandroid.notificationbuilderexample;\nimport androidx.appcompat.app.AppCompatActivity;\n\
    import androidx.core.app.NotificationCompat;\nimport android.app.Notification;\n\
    import android.app.NotificationChannel;\nimport android.app.NotificationManager;\n\
    import android.app.PendingIntent;\nimport android.content.Intent;\nimport android.os.Build;\n\
    import android.os.Bundle;\nimport android.view.View;\npublic class MainActivity\
    \ extends AppCompatActivity {\nprivate static final int NOTIFICATION_ID=12345;\n\
    private static final String MYCHANNEL = \"\";\nprivate int notifyCount = 0;\n\
    private NotificationManager myNotifyMgr = null;\n@Override\nprotected void onCreate(Bundle\
    \ savedInstanceState) {\nsuper.onCreate(savedInstanceState);\nsetContentView(R.layout.activity_main);\n\
    myNotifyMgr = (NotificationManager)getSystemService(NOTIFICATION_SERVICE);\nif\
    \ (Build.VERSION.SDK_INT>=Build.VERSION_CODES.O &&\nmyNotifyMgr.getNotificationChannel(MYCHANNEL)==null)\n\
    { myNotifyMgr.createNotificationChannel(new NotificationChannel(MYCHANNEL,\n\"\
    My Channel\", NotificationManager.IMPORTANCE_DEFAULT));\n}\n}\npublic void onClick(View\
    \ view) {\nswitch(view.getId()) {\ncase R.id.notify:\nraiseNotification(view);\n\
    break;\ncase R.id.clearNotify:\ndismissNotification(view);\nbreak;\n}\n}\npublic\
    \ void raiseNotification(View view) {\nIntent myIntent = new Intent(this, NotificationFollowon.class);\n\
    PendingIntent myPendingIntent = PendingIntent.getActivity(MainActivity.this, 1,\
    \ myIntent, 0);\nNotificationCompat.Builder myNotifyBuilder = new NotificationCompat.Builder(MainActivity.this,\
    \ MYCHANNEL);\nmyNotifyBuilder.setAutoCancel(false);\nmyNotifyBuilder.setTicker(\"\
    Here is your ticker text\");\nmyNotifyBuilder.setContentTitle(\"An Android Notification\"\
    );\nmyNotifyBuilder.setContentText(\"Notice This!\");\nmyNotifyBuilder.setSmallIcon(R.drawable.wavinghand);\n\
    myNotifyBuilder.setContentIntent(myPendingIntent);\nmyNotifyBuilder.build();\n\
    Notification myNotification = myNotifyBuilder.getNotification();\nmyNotifyMgr.notify(NOTIFICATION_ID,\
    \ myNotification);\n}\npublic void dismissNotification(View view) {\nmyNotifyMgr.cancel(NOTIFICATION_ID);\n\
    }\n}\nListing 15-1\nImplementing the code for NotificationBuilderExample\n```\n\
    \nWhile there is a reasonable amount of code there, and in the\ncompanion `NotificationFollowon`\n\
    class, much of it should already be familiar to you. Setting up the\nactivity\
    \ in `onCreate()` does the\nnormal tasks of restoring or creating state and inflating\
    \ the layout,\nplus the work of creating the `myNotifyMgr` object to\nbind to\
    \ the system notification infrastructure. The `NotificationBuilderExample`\nclass\
    \ itself also sets up a fictitious ID for the notification and a\ncounter to track\
    \ how many pending notifications there are. Note that you\ncould easily decide\
    \ to have multiple different types of notifications\nfrom your application. If\
    \ you decide to do this, be sure to use a\ndifferent ID to distinguish each type.\n\
    The other major piece of logic in `onCreate()` performs\nthe necessary SDK (API)\
    \ level check to see if the use of notification\nchannels is necessary in order\
    \ to show the user the desired\nnotification. If the SDK version is at or above\
    \ the level where channels\nare mandated, we check if `MYCHANNEL` exists (the\n\
    `null`\ncomparison), and if it doesn’t yet exist, we instantiate it ready for\n\
    use. If it does exist, no extra work is required – for example, if we\nhave already\
    \ used the application and left it running after triggering\nnotifications at\
    \ least once.\nThe `onClick()` method  is the familiar\npattern I use for grouping\
    \ button click handling together – though again\nin this example you could just\
    \ as easily have had each button call the\nrelevant `raiseNotification()`\nand\
    \ `dismissNotification()`\nmethods \ndirectly. It is the implementation of those\
    \ methods that houses our\ninteresting notification logic.\nWithin the `raiseNotification()`\n\
    method , we\nperform almost all of the optional configuration and customization\n\
    described at the start of the chapter. First, we create a `PendingIntent`\npointing\
    \ at the `NotificationFollowon`\nactivity. This will be triggered if a user decides\
    \ to click the waving\nhand icon in the notification drawer.\nNext, the `Notification`\
    \ (or in\nthis case `NotificationCompat`)\n`Builder` object\nis created, and we\
    \ allocate any resulting notifications generated from\nthis builder instance to\
    \ the `MYCHANNEL` channel set\nup in the `onCreate()`\nmethod  .\n\nThen we get\
    \ into the meat of using the `myNotifyBuilder`\nobject, adding lots of notification\
    \ bells and whistles for the final\n`Notification`\nobject we will build:\n\n\
    1.  .setTicker( ) is called to provide some ticker text.\n\n2.  .setNumber( )\
    \ is called to increment the number of times the\n    notification has been raised.\n\
    \n3.  .setSound( ) is called and given the pop.mp3 sound as a resource from\n\
    \    the raw folder.\n\n4.  .setVibrate( ) is called with a cadence of 1 second\
    \ on and half a\n    second off of vibration.\n\n5.  .setAutoCancel( ) is called\
    \ to disable the auto-cancel option.\n\nWith all of the options configured, I\
    \ finally pass the current state\nof the build to the `myNotification` object\n\
    and then pass the `Notification` and\n`NOTIFICATION_ID`\nto the `NotificationManager`\n\
    for presentation to the user.\n\nSeeing Notifications from the User’s\nPerspective\n\
    \nRunning the `NotificationBuilderExample`\napplication  on a\nvirtual device\
    \ gives most of the experience of notifications (vibrations\ntend to be the one\
    \ thing AVDs handle poorly). Figure [15-2](#499629_1_En_15_Chapter.xhtml#Fig2)\
    \ shows the\nnotification appearing in the icon bar of the home screen.\n\n![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig2_HTML.jpg](images/499629_1_En_15_Chapter/499629_1_En_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2\nNotification triggered in the top-left corner – the small waving\
    \ hand\nicon"
  trans: '

    虽然代码量不小，且附带的`NotificationFollowon`类也是如此，但其中大部分内容你应该已经熟悉。在`onCreate()`中设置 Activity
    时，执行了恢复或创建状态、填充布局等常规任务，此外还创建了`myNotifyMgr`对象以绑定系统通知基础设施。`NotificationBuilderExample`类本身还为通知设置了一个虚拟
    ID，并用一个计数器来跟踪有多少待处理的通知。请注意，你可以轻松决定从你的应用程序发送多种不同类型的通知。如果你决定这样做，请务必使用不同的 ID 来区分每种类型。


    `onCreate()`中的另一个主要逻辑部分执行了必要的 SDK（API）级别检查，以确定是否需要使用通知通道来向用户显示所需的通知。如果 SDK 版本处于或高于强制使用通知通道的级别，我们会检查`MYCHANNEL`是否存在（`null`比较），如果它尚不存在，则实例化它以供使用。如果它已存在，则无需额外工作——例如，如果我们已经使用过该应用程序，并且在至少触发一次通知后让它保持运行状态。


    `onClick()`方法是我用来将按钮点击处理分组在一起的常见模式——尽管在这个例子中，你也可以让每个按钮直接调用相关的`raiseNotification()`和`dismissNotification()`方法。正是这些方法的实现包含了我们有趣的逻辑。


    在`raiseNotification()`方法中，我们执行了本章开头描述的几乎所有可选配置和自定义。首先，我们创建一个指向`NotificationFollowon`
    Activity 的`PendingIntent`。如果用户决定点击通知抽屉中的挥手图标，此意图将被触发。


    接下来，创建`Notification`（或本例中的`NotificationCompat`）的`Builder`对象，并将由此构建器实例生成的任何结果通知分配到`onCreate()`方法中设置的`MYCHANNEL`通道。


    然后，我们进入使用`myNotifyBuilder`对象的核心部分，为最终要构建的`Notification`对象添加许多通知“附加功能”：


    1.  调用`.setTicker()`来提供一些滚动条文本。

    2.  调用`.setNumber()`来增加通知已被触发的次数。

    3.  调用`.setSound()`并传入`pop.mp3`声音文件作为来自`raw`文件夹的资源。

    4.  调用`.setVibrate()`，设置振动模式为响 1 秒、停半秒。

    5.  调用`.setAutoCancel()`来禁用自动取消选项。


    配置完所有选项后，我最终将构建的当前状态传递给`myNotification`对象，然后将这个`Notification`和`NOTIFICATION_ID`传递给`NotificationManager`，以便呈现给用户。


    **从用户视角看通知**


    在虚拟设备上运行`NotificationBuilderExample`应用程序可以提供大部分的通知体验（振动往往是 AVD 处理得不好的一个方面）。图 15-2
    显示了通知出现在主屏幕的图标栏中。


    ![../images/499629_1_En_15_Chapter/499629_1_En_15_Fig2_HTML.jpg](img/499629_1_En_15_Fig2_HTML.jpg)


    **图 15-2**

    在左上角触发的通知——小小的挥手图标

