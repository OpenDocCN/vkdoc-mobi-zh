    # 拨打电话


    既然你已经掌握了判断设备是否需要或适合支持通话功能的机制，就可以开始在应用中使用它来实现有趣的功能了。值得庆幸的是，Android 让这一切变得非常简单，这得益于其作为智能手机操作系统的根基——核心功能就是电话。


    Android 在拨打电话及其他通信功能方面非常便捷，访问和使用这些功能的核心类是 `TelephonyManager`。顾名思义，`TelephonyManager`
    负责管理通话及相关任务，包括呼叫处理、通话状态、网络详情等。你通常会用到以下方法：


    1.  `getPhoneType()`：返回手机和网络的相关信息，包括对 GSM、LTE 等无线网络的支持情况。

    2.  `getNetworkType()`：提供当前连接的蜂窝网络的数据能力信息，有助于判断网络类型，如 LTE、4G、3G 及其他变体。

    3.  `getCallState()`：一个非常实用的方法，可以帮助你判断手机处于空闲状态（未通话）、通话建立状态还是正在通话中——即通常所说的“摘机”或“offhook”状态。


    要实际拨打电话号码并开始通话，你需要调用 `ACTION_DIAL` 或 `ACTION_CALL` 中的一个 Intent。这些方法的使用及区别将在稍后介绍。两种方法都有一个共同起点，即一个包含
    `Uri` 的 Intent，该 Uri 以 `tel:`*nnnnnnnn* 的字符串格式表示用户想要呼叫的号码。在 Uri 字符串中，*nnnnnnnn*
    代表要拨打的电话号码的数字。通过实际演示，拨打电话的步骤将变得清晰。


    ## 注意事项


    在发起任何新通话之前，最好先检查当前的通话状态。Android 提供了一系列选项来同时处理多个呼入和呼出电话，但这属于高级蜂窝通信管理的范畴，超出了本书的讨论范围。现在，请善用
    `getCallState()` 方法，并根据其返回的结果来决定你的操作。


    ## 设计 CallExample 应用界面


    一个可运行的拨号应用示例可以在 `Ch16/CallExample` 项目中找到。该项目采用非常简洁的布局，让你专注于它所展示的呼叫和拨号功能。首先，你可以看到清单
    16-2 中使用的布局。


    ```

    清单 16-2

    CallExample 应用的布局

    ```


    查看布局中指定的字段，你会看到 `TextView` 和 `EditText` 的组合，`EditText` 作为用户输入目标号码的输入字段。还有两个按钮，分别是
    `"使用 ACTION_DIAL 拨号"` 和 `"使用 ACTION_CALL 拨号"`，顾名思义，它们会触发相应的方法，发起对应类型的 Intent，从而拨打电话。


    图 16-1 显示了最终的渲染效果。


    ![../images/499629_1_En_16_Chapter/499629_1_En_16_Fig1_HTML.jpg](img/499629_1_En_16_Fig1_HTML.jpg)


    *图 16-1 用于拨打用户指定号码的 CallExample 布局*


    除了展示通话功能所需的部分外，我特意在这个布局中加入了一些新特性——我们先来处理这些。为了增加一些变化，我将此布局基于 `LinearLayout`。你会看到
    ID 为 `phonenumber` 的 `EditText` 视图包含一个 `inputType="number"` 属性。这会触发 Android 修改该视图的输入法参数，使其只允许输入数字和有限的标点符号。运行应用时你会看到这一效果，因为用于输入的虚拟键盘（即输入法编辑器
    IME）看起来更像一个电话拨号盘，而不是全尺寸键盘。


    ### Android 输入法框架


    Android 提供了一个非常强大的抽象层来处理用户输入，使其能够灵活地兼容物理键盘、屏幕上的软键盘，甚至手写识别硬件和软件。这就是输入法框架。当你使用任何触发用户输入的视图时，你都会隐式地与框架交互，系统会呈现一个默认的编辑器视图——即
    IME。你可以使用默认配置，并按我们在电话拨号示例中的方式进行配置，也可以针对其他常见情况（如日期输入）进行配置。你还可以自定义任何 IME，以添加或限制编辑器中可供用户“按下”的“按键”或值。你可以在本书网站
    [`www.beginningandroid.org`](http://www.beginningandroid.org) 上阅读更多关于输入法框架和 IME
    的信息。


    `usedialintent` 和 `usecallintent` 按钮的 ID 明确暗示了点击每个按钮后会发生什么。使用第一个按钮 `"使用 ACTION_DIAL
    拨号"` 将执行触发 `ACTION_DIAL` Intent 的代码路径，而 `"使用 ACTION_CALL 拨号"` 则会触发 `ACTION_CALL`
    Intent。我们将在第 17 章更详细地讨论 Intent，但现在，这两者有什么区别呢？


    使用 `ACTION_DIAL` Intent 时，Android 会收到通知，需要向用户显示一个 IME，以便在启动后台的通信魔法之前，让用户确认（或调整）要拨打的号码。你可以在本章后面的图
    16-2 中看到这一点。而在另一种情况下，触发 `ACTION_CALL` Intent 会立即使用 Uri 中提供的号码发起通话，无需任何额外的用户界面或确认。


    ![../images/499629_1_En_16_Chapter/499629_1_En_16_Fig2_HTML.jpg](img/499629_1_En_16_Fig2_HTML.jpg)


    *图 16-2 触发 ACTION_DIAL 的 CallExample 应用*


    这两种不同方法存在的原因有很多，但主要的一点是，通过 `ACTION_DIAL`，确保用户知晓通话即将发起，并让他们对整个过程拥有控制权。考虑到这是 Android
    内置的、可能会让用户花费真金白银的功能之一，这一点非常重要。在某些地方拨打电话很便宜，但在许多国家和地区，这仍然是一笔不小的开销。


    由于 `ACTION_CALL` 会立即发起通话，而没有 `ACTION_DIAL` 提供的确认步骤，Android 为 `ACTION_CALL` 提供了一种保护措施：要求应用在使用
    `ACTION_CALL` Intent 调用 `startActivity()` 之前，在其清单中声明 `CALL_PHONE` 权限。请注意，`CALL_PHONE`
    权限因其被滥用的可能性而被视为最高级别的权限，因此不仅需要在应用清单中包含此权限，而且在运行时，系统还会提示用户允许应用拨打电话。可以说是深度防御。


    ## CallExample 应用的工作逻辑


    了解了拨号选项，并有了一个简洁的布局可供用户使用后，现在来看看实现拨号功能的逻辑。清单 16-3 展示了将逻辑嵌入到 `CallExample` 应用中的
    Java 代码。

    '
- fmt: '```java

    package org.beginningandroid.callexample;

    import androidx.appcompat.app.AppCompatActivity;

    import android.content.Intent;

    import android.net.Uri;

    import android.os.Bundle;

    import android.view.View;

    import android.widget.EditText;

    public class MainActivity extends AppCompatActivity {

    @Override

    protected void onCreate(Bundle savedInstanceState) {

    super.onCreate(savedInstanceState);

    setContentView(R.layout.activity_main);

    }

    public void callWithActionDialIntent(View view) {

    EditText targetNumber=(EditText)findViewById(R.id.phonenumber);

    String dialThisNumber="tel:"+targetNumber.getText().toString();

    startActivity(new Intent(Intent.ACTION_DIAL, Uri.parse(dialThisNumber)));

    }

    public void callWithActionCallIntent(View view) {

    EditText targetNumber=(EditText)findViewById(R.id.phonenumber);

    String callThisNumber="tel:"+targetNumber.getText().toString();

    //the following intent only works with CALL_PHONE permission in place

    startActivity(new Intent(Intent.ACTION_CALL, Uri.parse(callThisNumber)));

    }

    }

    Listing 16-3

    Java logic for the CallExample application

    ```


    In a shift away from my normal approach of using a single `onClick()` method to
    guide subsequent execution with a switch statement on a view passed as a parameter,
    in this example instead, we have the methods `callWithActionDialIntent()` and
    `callWithActionCallIntent()` called directly from the layout configuration for
    each button, respectively. Each method does some similar processing, by first
    determining into which `View` (in our case, the `EditText`) the user has entered
    the desired phone number. Then the `Uri` string is created with the appropriate
    formatting, and then `startActivity()` is called, with the desired intent and
    the `Uri` as parameters.


    ### Making an ACTION_DIAL Call


    In Figure [16-2](#499629_1_En_16_Chapter.xhtml#Fig2), you can see the result of
    the user clicking the `useDialIntent` button. The digits (if any) from the `EditText`
    field have been constructed into a `Uri` behind the scenes in our `callWithActionDialIntent()`,
    and the `ACTION_DIAL` intent has been triggered. The dialer you see in Figure
    [16-2](#499629_1_En_16_Chapter.xhtml#Fig2) looks close to, but not exactly like,
    the IME shown in Figure [16-1](#499629_1_En_16_Chapter.xhtml#Fig1). Key differences
    that you should spot include not just the slightly different styling of the numbers,
    the color scheme, and so on, but also the addition of options such as the ability
    to add this number as a contact. You can probably already guess that this is achieved
    by firing yet another intent. You will also see formatting differences in the
    number and any associated punctuation marks like hyphens and parentheses. These
    will all be styled according to the location and language setting of the device.
    My AVD used for the view shown in Figure [16-2](#499629_1_En_16_Chapter.xhtml#Fig2)
    uses a US locale and English as the language, thus the formatting you see with
    the first three digits treated as an area code and placed in parentheses and the
    hyphenation of the number as is idiomatic to the United States and Canada. The
    final, and most important, addition is the green phone soft key at the bottom
    of the display, which you can guess is used to actually trigger the call.


    ### Making an ACTION_CALL Call


    Triggering a call with the `usecallintent` button shows you – well, it shows you
    – the dialing screen in Android and not much else. The dialer from the previous
    example is not triggered, and therefore there is little else to show or explain.
    Your users will go straight to the “actually making a call” dialing screen, as
    shown in Figure [16-3](#499629_1_En_16_Chapter.xhtml#Fig3).


    ![../images/499629_1_En_16_Chapter/499629_1_En_16_Fig3_HTML.jpg](images/499629_1_En_16_Chapter/499629_1_En_16_Fig3_HTML.jpg)


    Figure 16-3

    Calling in action, with ACTION_CALL


    ### Handling Incoming Calls


    Working with an incoming call is quite a bit more complex than receiving one and
    beyond the scope of this book. But taking full responsibility for an incoming
    call isn’t always needed, and you can have your application do other useful things
    when a call is received, even if your application isn’t the one dealing with the
    main task of managing the conversation.


    The principal method to have a secondary application respond to an incoming call
    is to register a broadcast receiver for the broadcast intent `ACTION_PHONE_STATE_CHANGED`
    in your `AndroidManifest.xml` file. We will explore broadcast receivers in more
    depth in the next chapter. For now, it is enough to know that the `ACTION_PHONE_STATE_CHANGED`
    intent is fired by the `TelephonyManager` framework when a call is received. Listing
    [16-4](#499629_1_En_16_Chapter.xhtml#PC5) illustrates the receiver declaration
    in your manifest file.


    ```

    Listing 16-4

    Setting the receiver for incoming calls in AndroidManifest.xml

    ```


    As a call is made to the device, the `TelephonyManager` fires the intent, and
    any receiver - including yours - is notified through use of a callback to the
    respective method specified. The `ACTION_PHONE_STATE_CHANGED` intent can also
    include two optional pieces of data that you can use to drive your logic. One
    is a state value for the call, such as `CALL_STATE_OFFHOOK` or `CALL_STATE_RINGING`,
    indicating the call has been answered or is still triggering the ringer waiting
    to be answered. If the `CALL_STATE_RINGING` value is used, there is also an optional
    additional value of `EXTRA_INCOMING_NUMBER`, which provides the caller ID, if
    the network has provided it.


    Listing [16-5](#499629_1_En_16_Chapter.xhtml#PC6) is an example Java method for
    the `MyPhoneStateChangedReceiver` class to give you an idea when you can do with
    the callbacks.


    ```java

    public class MyPhoneStateChangedReceiver extends BroadcastReceiver {

    @override

    public void onReceive(Context context, Intent intent) {

    String deviceCallState = intent.getStringExtra(TelephonyManager.EXTRA_STATE);

    if (deviceCallState.equals(TelephonyManager.EXTRA_STATE_RINGING) {

    // The phone is still ringing and might have the caller ID

    String callerID =

    intent.getStringExtra(TelephonyManager.EXTRA_INCOMING_NUMBER);

    // Try to display the number, etc.

    } else {

    // do something else

    }

    }

    }

    Listing 16-5

    A Java method fragment for working with an incoming call

    ```


    As with other hardware features, working with incoming calls is considered a sensitive
    task and requires explicit security permissions. Your application will need the
    `READ_PHONE_STATE` permission in the manifest file in order to receive the `ACTION_PHONE_STATE_CHANGED`
    intent.


