    those facets do not change just because you choose a different IDE to help you
    in the process.


    Second, Eclipse is one of the most popular IDEs over time, and it has strengths
    beyond Android that mean it is very often the IDE of choice in development environments
    that are dealing with building applications beyond a single target platform.


    This isn’t to suggest that choosing Eclipse as your IDE will be as smooth or as
    efficient as Android Studio. Once you move beyond the scope of this book, you’ll
    find many contemporary online sources of information will assume you are using
    Android Studio and not Eclipse. But some of you – particularly the experienced
    developers – will look beyond this to where Eclipse already appeals. If you are
    embarking on your developer journey and have not already a healthy dose of experience
    with Eclipse, then I strongly suggest you go with Android Studio as your IDE.


    ### IntelliJ IDEA


    At the beginning of this chapter, I explained the genesis of Android Studio and
    outlined its foundation being based upon IntelliJ IDEA. So you may be thinking,
    if that is what Android Studio is based upon, why would I choose IntelliJ IDEA
    instead, what is the difference, and why would I care?


    Great questions! In essence, as a new developer, there are no overwhelming reasons
    to think about choosing IntelliJ IDEA as your IDE of choice. However, seasoned
    developers, or those who develop Java-based applications for more platforms than
    just Android, often find standardizing on one IDE to be a significant driver for
    efficiency. There are also features that JetBrains, the company behind IntelliJ,
    only makes available in the full commercial package, such as the ability to work
    seamlessly with the Spring Framework for Java. If you fall into those categories,
    you are more than welcome to adopt IntelliJ IDEA as your preferred IDE.


    To find out more about how to use IntelliJ IDEA specifically for Android development,
    check out the web pages dedicated to this topic from JetBrains, the company that
    owns and builds IntelliJ IDEA, at [`www.jetbrains.com/help/idea/android.html`](http://www.jetbrains.com/help/idea/android.html)
    and [`www.jetbrains.com/help/idea/getting-started-with-android-development.html`](http://www.jetbrains.com/help/idea/getting-started-with-android-development.html)
    .


    ### Tools That Target Multiple Operating Systems and Mobile Platforms


    In Chapter [1](#499629_1_En_1_Chapter.xhtml), you saw the breakdown of smartphone
    market share, where Android held a massive majority. Don’t let that blind you
    to the reality that alternatives exist, such as Apple’s iPhone, and tools exist
    to help developers target both platforms and even a few others you may not have
    heard of. Some of the key multiplatform IDEs and development environments include
    products such as Xamarin, PhoneGap, Flutter, and Apache Cordova.


    Cross-platform tools deserve a book in their own right, and in fact these aforementioned
    tools have more than one book dedicated to them, as well as countless pages of
    content available online. If you are interested in what they have to offer, I
    strongly recommend starting with their respective product home pages on the Internet
    and then expanding your search from there.


    ### Traditional Platform-Agnostic Development Tools


    To wrap up this chapter and the topic of developer tools, I should take you back
    to the very beginning of the chapter. IDEs came into existence to help developers
    wrangle all of the tools that are used to create modern applications. This includes
    code editors, debuggers, compilers, and more. But IDEs are not for everyone.


    Some readers are likely to be seasoned developers, who are quite comfortable assembling
    their own set of tools to aid in creating Android applications. There are plenty
    of developers who prefer to choose their own editor, such as Vim, Emacs, or Sublime
    Text; compilation and build pipeline tools such as Ant, Jenkins, and Hudson; and
    other tools for performance management, debugging, and more.


    If you want to pursue this path, Google makes a set of Android command-line development
    tools available from the Android Studio download page mentioned at the beginning
    of the chapter. These tools include sdkmanager, which takes care of downloading
    and managing multiple Android SDK packages; adb, which is the Android Developer
    Bridge utility for moving your applications from your developer machine to your
    virtual and real devices; and more.


    While this book isn’t targeted at developers who want to take this path, at least
    you know that it is a viable alternative. For now, we’ll assume you are content
    working with Android Studio, and we’ll delve straight into developing your first
    Android application in the very next chapter, starting on the next page!


    # 3. Your First Android Application, Already!


    With Android Studio in place on your computer, you are ready to begin creating
    your very first Android application. Yes, right now! For those readers who are
    not familiar with Java code development, do not panic. We will start our examples
    in this chapter with no assumed Java knowledge or know-how. For those readers
    who do know Java, read on in any case as we will cover the important first step
    of creating an Android Virtual Device, or AVD, on which to run the example in
    this chapter, as well as the examples in future chapters.'
