    ## Android Studio 的历史与渊源


    当 Google 首次为 Android 发布开发者工具时，它瞄准了当时最流行的开源开发环境之一——Eclipse。它发布了一套插入 Eclipse 的工具，称为
    Android 开发者工具（ADT）。这种 Eclipse 与 ADT 的组合满足了许多 Android 开发者多年的需求。时光飞逝，十多年过去了，尽管 Eclipse
    仍然是一个非常流行的 IDE，但许多其他 IDE 已崛起或衰落，而 Google 向来热衷于处于此类变革的前沿。


    2013 年，Google 宣布与 JetBrains 公司合作。JetBrains 开发了一款名为 IntelliJ IDEA 的现代 IDE，主要专注于为构建基于
    Java 的应用程序的开发者提供一流的体验。这款新的合作产品将基于 IntelliJ IDEA，并命名为 Android Studio，作为完全免费的 Android
    开发 IDE 发布。Android Studio 1.0 版本于 2014 年底发布。在随后的几年里，Google 宣布 Android Studio 将是开发
    Android 应用程序的首要 IDE，并且将停止对其他工具的投入。但这并没有阻止 Eclipse 的粉丝们继续使用 Eclipse、ADT 以及其他一系列工具——我们将在本章末尾讨论这类替代方案。

    '
- fmt: '# Downloading the Android Studio Installer for Your Platform


    You now have enough context to understand why Android Studio is important and
    the role it will play for you in your future Android application development.
    It’s time to get Android Studio and get coding!


    The number one location for downloading the installation packages for Android
    Studio is the official Android web page itself. You can start at the home page,
    at [`www.android.com/`](http://www.android.com/), or dive straight into the developer
    download page at [`https://developer.android.com/studio`](https://developer.android.com/studio).


    I should note that the normal caveats apply when calling out website URLs in printed
    (or electronic) books. URLs can and do change over time. If you are reading this
    sometime after publication, the direct link at [`https://developer.android.com/studio`](https://developer.android.com/studio)
    may have changed – but the home page at [`www.android.com/`](http://www.android.com/)
    will always exist and help you navigate to wherever Google may have moved the
    download page in the future.


    For Linux operating system users, there is at least one other option, using the
    Snap packaging approach, which we will discuss in a moment.


    ## Working with Android Studio Versions


    Upon arriving at the download website, you see an immediate “Download Android
    Studio” option, as shown in Figure [2-1](#499629_1_En_2_Chapter.xhtml#Fig1). Look
    carefully at the text under the button. In my example, it reads “4.0 for Linux
    64-bit (865 MB).”


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig1_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    The `developer.android.com/studio` download page, showing Android Studio 4.0


    The “4.0” refers to the version of Android Studio, and this opens up the topic
    of versions, Android, Android Studio, and Android Software Development Kits (SDKs).
    The overarching aspect you as a developer need to know is that versions of Android
    – the software running on people’s devices – are not tied directly to versions
    of Android Studio, meaning that when you use Android Studio to develop applications,
    you are given a variety of means to control what versions of Android (and therefore
    what devices) your application will support.


    ## Understanding How Android Studio and the Android SDK Work Together


    Android operating system releases provide a range of features, and developers
    are given access to these features via incorporating the Android SDK in their
    code. Google releases Android SDK versions regularly, several times a year in
    some cases. Your installation of Android Studio can install and use many different
    releases of the Android SDK – and in fact you almost certainly will. You will
    then be able to specify how to pick an SDK version and the Android versions supporting
    the SDK’s features, as you create your applications. We’ll walk through this process
    in detail in Chapter [3](#499629_1_En_3_Chapter.xhtml), so don’t feel overwhelmed
    by the version “dance” at this point.


    # Preparing for Android Studio


    Android Studio is the leading IDE for Android development, for many of the reasons
    outlined earlier in this chapter. It has almost everything needed for both new
    and experienced Android developers making applications of all sorts. Almost! There
    are a few other considerations that you, as a new Android apps developer, will
    need to take into account to round out your developer working environment.


    Broadly, these considerations are thankfully few in number and easily grasped.
    In essence, they are the following:


    1. What desktop or laptop hardware will I use for my Android development?

    2. What operating system will I run on my desktop/laptop?

    3. What prerequisites will my system need prior to using Android Studio?

    4. What Android handsets, if any, will I make use of during development?


    Let’s look at each of these in turn, from the perspective of the recommended minimums
    to get started, so you can get moving quickly on the installation of Android Studio
    itself later in this chapter.


    ## Choosing Desktop or Laptop Hardware for Android Development


    First, the good news. Almost any existing computer you have will be a great starting
    point for your Android development journey. Pretty much any computer from the
    last decade has the basic computational “grunt” to support Android Studio and
    allow you to learn the core concepts while building your first applications. In
    fact, some developers never bother moving past their “daily driver” machine that
    they’ve used for everything else, because their demands are just not that taxing.


    There might come a time, however, when you want to think about how seriously you
    are pursuing Android apps development and what benefit you could get from better
    equipment. Or you might be in the market for a new computer now and want to plan
    ahead for the computation resources that make apps development faster, more efficient,
    and so on. We will explore all aspects of more powerful development hardware,
    accessories, and the complete developer environment in Chapter [6](#499629_1_En_6_Chapter.xhtml).
    You can feel free to jump ahead and read Chapter [6](#499629_1_En_6_Chapter.xhtml)
    if you are contemplating how to supercharge your computer or purchase new equipment
    for Android development. But for those who would just like to ensure they are
    covered by their existing equipment, here are some key considerations should you
    confirm based on Google’s recommended minimum configuration for Android Studio:


    1. **CPU:** The good news here is that pretty much any CPU from the last few years
    will be more than enough to get started with Android development.

    2. **Memory:** Google recommends a minimum of 4 GB of RAM and suggests 8 GB is
    the preferred base level. Much of this memory will be used for virtual device
    emulation, with the balance for Android Studio itself. You can squeeze by with
    less than the minimum, but performance when it comes to trying out your applications
    will suffer.

    3. **Storage:** While the minimum recommended is 2 GB and the preference Google
    states is for 4 GB, the reality is that more storage is always better. 2 GB will
    get you a base Android Studio installation, one virtual device, and a lot of regular
    housecleaning trying to delete unneeded items to free up space. 4 GB is a little
    better. If you can, clean up to ensure you have 5–10 GB to make life easier for
    yourself.

    4. **Screen:** Google recommends a screen resolution of at least 1280 `×` 800.
    However, what isn’t stated is that this is the recommendation for Android Studio
    itself, where you will be writing code and testing your application. There are
    a rabbit hole of considerations for screen resolution when you consider how your
    development environment is very different from the screens on users’ phones. For
    now, pay attention to Google’s guidelines, but we will revisit the topic of screens
    in Chapter [6](#499629_1_En_6_Chapter.xhtml) and other chapters.


    ## Choosing the Operating System for Your Computer


    Google makes Android Studio available for all popular operating systems, including
    Linux, macOS, Windows, and its very own Chrome OS (which is essentially a reskinned
    version of Linux). Unless you are in the market for a new computer, whatever operating
    system your current computer has is a fine choice. We’ll delve further into the
    details of an ideal developer setup, including operating system choice, in Chapter
    [6](#499629_1_En_6_Chapter.xhtml).'
