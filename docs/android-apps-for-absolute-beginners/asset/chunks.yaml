  trans: '

    # 为你的平台下载 Android Studio 安装程序


    现在你已经掌握了足够的背景信息，能够理解 Android Studio 的重要性以及它在你未来的 Android 应用开发中将扮演的角色。是时候获取 Android
    Studio 并开始编码了！


    下载 Android Studio 安装包的首选位置就是 Android 官方网站本身。你可以从[`www.android.com/`](http://www.android.com/)首页开始，或者直接进入
    [`https://developer.android.com/studio`](https://developer.android.com/studio)
    的开发者下载页面。


    需要指出的是，在印刷版（或电子版）书籍中引用网址时，通常的提醒依然适用。网址随时都可能发生变化。如果你在本书出版后的某个时间阅读这段内容，[`https://developer.android.com/studio`](https://developer.android.com/studio)
    这个直链可能已经改变——但 [`www.android.com/`](http://www.android.com/) 首页将始终存在，并帮助你导航到谷歌未来可能将下载页面移至的任何位置。


    对于 Linux 操作系统用户，至少还有另一种选择，即使用 Snap 打包方式，我们稍后将讨论这一点。


    ## 了解 Android Studio 版本


    进入下载网站后，你会立即看到“Download Android Studio”（下载 Android Studio）选项，如图 2-1 所示。请仔细查看按钮下方的文字。在我的示例中，显示的是“适用于
    Linux 64 位的 4.0 版本（865 MB）”。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig1_HTML.jpg](img/499629_1_En_2_Fig1_HTML.jpg)


    图 2-1


    `developer.android.com/studio` 下载页面，显示 Android Studio 4.0


    这里的“4.0”指的是 Android Studio 的版本，这引出了版本、Android、Android Studio 以及 Android 软件开发工具包（SDK）的话题。作为开发者，你需要了解的总体概念是：Android
    的版本——即运行在用户设备上的软件——与 Android Studio 的版本没有直接关联。这意味着，当你使用 Android Studio 开发应用时，你可以通过各种方式来控制你的应用将支持哪些
    Android 版本（从而支持哪些设备）。


    ## 理解 Android Studio 与 Android SDK 的协同工作原理


    Android 操作系统的各个版本会提供一系列功能，开发者可以通过在代码中集成 Android SDK 来访问这些功能。谷歌会定期发布 Android SDK
    版本，有时甚至在一年内发布多次。你安装的 Android Studio 可以安装和使用许多不同版本的 Android SDK——而且事实上，你几乎肯定会用到多个版本。随后，在创建应用时，你将能够指定如何选择
    SDK 版本以及支持该 SDK 功能的 Android 版本。我们将在第 3 章中详细讲解这一过程，所以现在不必被这种版本“切换”弄得不知所措。


    # 为使用 Android Studio 做准备


    由于本章前面概述的诸多原因，Android Studio 是 Android 开发领域领先的集成开发环境（IDE）。它几乎拥有新老 Android 开发者制作各种应用所需的一切。几乎是！作为新的
    Android 应用开发者，你还需要考虑其他一些方面，以完善你的开发者工作环境。


    总的来说，值得庆幸的是，这些需要考虑的方面数量不多且易于理解。本质上，它们如下所示：


    1.  我将使用什么台式机或笔记本电脑硬件进行 Android 开发？

    2.  我的台式机/笔记本电脑将运行什么操作系统？

    3.  我的系统在使用 Android Studio 之前需要满足哪些前提条件？

    4.  在开发过程中，我将使用哪些 Android 手机（如果有的话）？


    接下来，让我们从入门推荐最低配置的角度，逐一查看这些方面，这样你就能快速行动，在本章稍后部分安装 Android Studio 本身。


    ## 为 Android 开发选择台式机或笔记本电脑硬件


    首先，有个好消息。你现有的几乎任何计算机都能成为你 Android 开发之旅的绝佳起点。过去十年间生产的几乎任何计算机都具备支持 Android Studio
    的基本计算能力，能让你在学习核心概念的同时构建你的第一个应用。事实上，有些开发者从不费心去更换他们的“日常用机”，因为他们的需求并没有那么苛刻。


    然而，可能有一天，你会想要思考自己从事 Android 应用开发的认真程度，以及更好的设备能为你带来哪些好处。或者，你现在正好在考虑购买一台新电脑，并想提前规划好能让应用开发更快、更高效的计算资源。我们将在第
    6 章中探讨更强大的开发硬件、配件以及完整开发者环境的所有方面。如果你正在考虑如何提升现有电脑性能或为 Android 开发购买新设备，可以随时跳到第 6
    章阅读。但对于那些只想确保现有设备能够胜任的读者，以下是你需要根据谷歌推荐的 Android Studio 最低配置来确认的一些关键考量：


    1.  **CPU：** 好消息是，过去几年生产的几乎任何 CPU 都足以胜任 Android 开发的入门需求。

    2.  **内存：** 谷歌建议至少 4 GB 的 RAM，并推荐 8 GB 作为首选基准。这些内存中的大部分将用于虚拟设备模拟，其余部分则供 Android
    Studio 本身使用。低于最低配置也能勉强运行，但在试用你的应用时，性能将会受到影响。

    3.  **存储：** 虽然最低推荐配置是 2 GB，谷歌也倾向于 4 GB，但实际情况是，存储空间越大越好。2 GB 能让你完成基本的 Android Studio
    安装、创建一个虚拟设备，并需要经常进行清理工作，删除不需要的项目以释放空间。4 GB 会好一些。如果可能的话，清理出 5–10 GB 的空间，能让你轻松不少。

    4.  **屏幕：** 谷歌建议屏幕分辨率至少为 1280 `×` 800。然而，没有说明的是，这只是针对 Android Studio 本身的建议，即你编写代码和测试应用的环境。当你考虑到开发环境与用户手机屏幕存在巨大差异时，关于屏幕分辨率还有一整套复杂的考量。目前，先遵循谷歌的指导方针，但我们将在第
    6 章和其他章节中重新讨论屏幕这一话题。


    ## 为你的计算机选择操作系统


    谷歌使 Android Studio 可供所有主流操作系统使用，包括 Linux、macOS、Windows 以及它自己的 Chrome OS（本质上是一个换肤版的
    Linux）。除非你打算购买新电脑，否则你当前电脑运行的操作系统就是不错的选择。我们将在第 6 章中进一步深入探讨理想的开发者环境设置细节，包括操作系统的选择。

    '
- fmt: '#### Continuing with Downloading the Installer


    Now that you have acquainted yourself with the nuances of Android Studio versions
    and your hardware and operating system choices, you can now continue to download
    and install Android Studio. As mentioned earlier in the chapter, from the page
    [`https://developer.android.com/studio`](https://developer.android.com/studio),
    your operating system should be automatically detected, and a download button
    for that platform should be prominent. You saw this in the previous example when
    visiting the site from a Linux machine. From my MacBook, I see an option presented
    front and center to “Download Android Studio” with the text “4.0 for Mac” beneath
    it.


    If you are downloading from a different machine instead of the one you plan to
    use for Android development, ensure you choose the right flavor of Android Studio
    for the machine you intend to use. If that target machine has a different operating
    system, scroll down the page to the heading “Android Studio downloads,” where
    you will see options for each operating system that Android Studio supports.


    **Windows Alternatives**


    The list of installation options on the Android developer website includes two
    flavors for Windows. The first is an executable installer, with a filename of
    the form `android-studio-ide-193.6514223-windows.exe` (the string of digits after
    `android-studio-ide` is the build and release number, which will vary over time).
    The second is a zip file, with a filename of the form `android-studio-ide-193.6514223-windows.zip`.
    I recommend you use the first option of the regular executable installer. This
    will deal with a variety of concerns for you, including directory placement and
    Windows permissions for the account you normally use under Windows, as well as
    any other accounts on a shared machine.


    Click the relevant option to download the appropriate version of Android Studio
    for your operating system, and make a note of where the download is being placed
    by your browser. This is typically the `Downloads` directory for your user on
    macOS, Linux, and Windows, but can differ if you choose to place it elsewhere.


    With the release of Android Studio 4.0, the total download size is nearly 1 GB
    in size, so it may take a few minutes to complete the download.


    #### Installing Android Studio on Windows


    Assuming you are following the recommended path of using the executable installer
    for Windows, you can launch the installer from your download location by double-clicking
    the executable file. As of this writing, that means the file `android-studio-ide-193.6514223-windows.exe`.
    All recent versions of Windows will prompt you to allow the installation to continue
    via the User Access Control (`UAC`) mechanism, to ensure you explicitly consent
    to the elevated privileges required to complete installation.


    Once installation is complete, you should see a new Start menu item for Android
    Studio.


    #### Installing Android Studio on macOS


    As with most application installations on macOS, installing Android Studio is
    very straightforward. Open Finder on your Mac, and browse to the directory into
    which you downloaded the Android Studio installer. You should see a DMG file with
    a name similar to `android-studio-ide-193.6514223-mac.dmg` – this was the DMG
    file for the Android Studio 4.0 installer. Double-click this disk image file,
    and your Mac will first verify the download, which really means it will check
    the code signing certificate and/or notarization used by Google to prepare the
    disk image. Once verification is complete, you should see the typical DMG installation
    window as shown in Figure [2-2](#499629_1_En_2_Chapter.xhtml#Fig2).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig2_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    The Android Studio DMG installation window for macOS


    Drag the Android Studio app icon to the Applications folder, and this will trigger
    your Mac to copy the installation package as normal for any Mac application. Once
    complete, Android Studio will be ready to use from the Applications menu and folder.


    #### Installing Android Studio on Linux


    The Android Studio installer you downloaded for Linux is a gzip compressed tarball,
    with a file name such as `android-studio-ide-193.6514223.tar.gz`. Unpacking this
    file to a directory of your choice is what constitutes installation, as far as
    Android Studio is concerned. Decide where you would like to install Android Studio:
    for instance, you might want this under your user account’s home directory or
    some other directory such as `/opt`. When you do unpack the compressed tarball,
    you see it create a directory called `android-studio` in the location you specify,
    and all the files and subdirectories will live under that. This means it is not
    necessary for you to create a similarly named parent directory. For example, there
    is no need for me to create a `/home/grant/android-studio` directory, as unpacking
    the tarball will also create the leaf level – and I don’t really want a `/home/grant/android-studio/android-studio`
    path, as that is needlessly redundant. The directory you chose for Android Studio
    will be referred to as the “installation home” by much of the internal Android
    Studio documentation.


    Open your favorite shell, such as `bash` or `zsh`, and change the directory into
    the parent directory under which you want Android Studio placed. Make sure you
    have write permissions to your intended location. Note where you downloaded the
    compressed tarball file – in my case, that is the `/home/grant/Downloads` directory,
    which I can also refer to as `~/Downloads`. Run the `tar` command as follows,
    which instructs it to unzip, uncompress, and verify the final expanded set of
    files:


    ```

    tar -xvzf ~/Downloads/android-studio-ide-193.6514223.tar.gz

    ```


    A few screenfuls of status should scroll by, and eventually you should be returned
    to your shell prompt. Run `ls` or open your favorite file manager, and you should
    see the `android-studio` directory now created. In that directory, you’ll find
    a file named `Install-Linux-tar.txt`, which you read for some basic instructions
    on further tweaking the installation and how to actually run the Android Studio
    binary. I’ll ruin the suspense for you! You will see a `bin` directory under the
    `android-studio` directory, and within is a shell script named `studio.sh`. Execute
    this shell script to start Android Studio. We will return to some of the other
    configuration options mentioned in the `Install-Linux-tar.txt` file later in the
    book.


    **Snap To It!**


    There are alternatives to the typical installation option for Linux, and one of
    these follows the trend in recent years for packaged versions of applications
    on Linux that are entirely self-contained, bundling all dependencies and libraries
    into one package. This approach is typified by the Snap bundling promoted by Canonical
    (of Ubuntu fame) and Flatpak, which grew out of the `freedesktop.org` work by
    XDG.


    For Linux distributions that support the Snap package (which in theory is all
    of them), you can instead have your package manager install the Snap for Android
    Studio. For instance, under Ubuntu 20.04, you can simply run


    ```

    sudo snap install android-studio

    ```


    A word of caution over the Snap approach: Where downloading from the official
    site at [`https://developer.android.com`](https://developer.android.com) will
    provide the latest patched version of Android Studio, relying on the Snap approach
    implicitly means relying on the maintainers and packagers of the Snap package
    keeping it up to date. In theory this maintenance is entirely possible, and some
    people claim it as easy, or easier than relying on maintenance and fixes for normally
    installed software. However, the Snap package you retrieve from your online package
    repository may not be up to date.'
  raw: '#### Continuing with Downloading the Installer


    Now that you have acquainted yourself with the nuances of Android Studio versions
    and your hardware and operating system choices, you can now continue to download
    and install Android Studio. As mentioned earlier in the chapter, from the page
    [`https://developer.android.com/studio`](https://developer.android.com/studio),
    your operating system should be automatically detected, and a download button
    for that platform should be prominent. You saw this in the previous example when
    visiting the site from a Linux machine. From my MacBook, I see an option presented
    front and center to “Download Android Studio” with the text “4.0 for Mac” beneath
    it.


    If you are downloading from a different machine instead of the one you plan to
    use for Android development, ensure you choose the right flavor of Android Studio
    for the machine you intend to use. If that target machine has a different operating
    system, scroll down the page to the heading “Android Studio downloads,” where
    you will see options for each operating system that Android Studio supports.


    Windows Alternatives


    The list of installation options on the Android developer website includes two
    flavors for Windows. The first is an executable installer, with a filename of
    the form “android-studio-ide-193.6514223-windows.exe” (the string of digits after
    “android-studio-ide” is the build and release number, which will vary over time).
    The second is a zip file, with a filename of the form “android-studio-ide-193.6514223-windows.zip.”
    I recommend you use the first option of the regular executable installer. This
    will deal with a variety of concerns for you, including directory placement and
    Windows permissions for the account you normally use under Windows, as well as
    any other accounts on a shared machine.


    Click the relevant option to download the appropriate version of Android Studio
    for your operating system, and make a note of where the download is being placed
    by your browser. This is typically the “Downloads” directory for your user on
    macOS, Linux, and Windows, but can differ if you choose to place it elsewhere.


    With the release of Android Studio 4.0, the total download size is nearly 1 GB
    in size, so it may take a few minutes to complete the download.


    #### Installing Android Studio on Windows


    Assuming you are following the recommended path of using the executable installer
    for Windows, you can launch the installer from your download location by double-clicking
    the executable file. As of this writing, that means the file android-studio-ide-193.6514223-windows.exe.
    All recent versions of Windows will prompt you to allow the installation to continue
    via the User Access Control (UAC) mechanism, to ensure you explicitly consent
    to the elevated privileges required to complete installation.


    Once installation is complete, you should see a new Start menu item for Android
    Studio.


    #### Installing Android Studio on macOS


    As with most application installations on macOS, installing Android Studio is
    very straightforward. Open Finder on your Mac, and browse to the directory into
    which you downloaded the Android Studio installer. You should see a DMG file with
    a name similar to “android-studio-ide-193.6514223-mac.dmg” – this was the DMG
    file for the Android Studio 4.0 installer. Double-click this disk image file,
    and your Mac will first verify the download, which really means it will check
    the code signing certificate and/or notarization used by Google to prepare the
    disk image. Once verification is complete, you should see the typical DMG installation
    window as shown in Figure [2-2](#499629_1_En_2_Chapter.xhtml#Fig2).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig2_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    The Android Studio DMG installation window for macOS


    Drag the Android Studio app icon to the Applications folder, and this will trigger
    your Mac to copy the installation package as normal for any Mac application. Once
    complete, Android Studio will be ready to use from the Applications menu and folder.


    #### Installing Android Studio on Linux


    The Android Studio installer you downloaded for Linux is a gzip compressed tarball,
    with a file name such as `android-studio-ide-193.6514223.tar.gz`. Unpacking this
    file to a directory of your choice is what constitutes installation, as far as
    Android Studio is concerned. Decide where you would like to install Android Studio:
    for instance, you might want this under your user account’s home directory or
    some other directory such as `/opt`. When you do unpack the compressed tarball,
    you see it create a directory called “android-studio” in the location you specify,
    and all the files and subdirectories will live under that. This means it is not
    necessary for you to create a similarly named parent directory. For example, there
    is no need for me to create a `/home/grant/android-studio` directory, as unpacking
    the tarball will also create the leaf level – and I don’t really want a `/home/grant/android-studio/android-studio`
    path, as that is needlessly redundant. The directory you chose for Android Studio
    will be referred to as the “installation home” by much of the internal Android
    Studio documentation.


    Open your favorite shell, such as bash or zsh, and change the directory into the
    parent directory under which you want Android Studio placed. Make sure you have
    write permissions to your intended location. Note where you downloaded the compressed
    tarball file – in my case, that is the `/home/grant/Downloads` directory, which
    I can also refer to as `~/Downloads`. Run the tar command as follows, which instructs
    it to unzip, uncompress, and verify the final expanded set of files:


    ```

    tar -xvzf ~/Downloads/android-studio-ide-193.6514223.tar.gz

    ```


    A few screenfuls of status should scroll by, and eventually you should be returned
    to your shell prompt. Run ls or open your favorite file manager, and you should
    see the android-studio directory now created. In that directory, you’ll find a
    file named `Install-Linux-tar.txt`, which you read for some basic instructions
    on further tweaking the installation and how to actually run the Android Studio
    binary. I’ll ruin the suspense for you! You will see a bin directory under the
    android-studio directory, and within is a shell script named `studio.sh`. Execute
    this shell script to start Android Studio. We will return to some of the other
    configuration options mentioned in the `Install-Linux-tar.txt` file later in the
    book.


    Snap To It!


    There are alternatives to the typical installation option for Linux, and one of
    these follows the trend in recent years for packaged versions of applications
    on Linux that are entirely self-contained, bundling all dependencies and libraries
    into one package. This approach is typified by the Snap bundling promoted by Canonical
    (of Ubuntu fame) and Flatpak, which grew out of the freedesktop.org work by XDG.


    For Linux distributions that support the Snap package (which in theory is all
    of them), you can instead have your package manager install the Snap for Android
    Studio. For instance, under Ubuntu 20.04, you can simply run


    ```

    sudo snap install android-studio

    ```


    A word of caution over the Snap approach: Where downloading from the official
    site at [`https://developer.android.com`](https://developer.android.com) will
    provide the latest patched version of Android Studio, relying on the Snap approach
    implicitly means relying on the maintainers and packagers of the Snap package
    keeping it up to date. In theory this maintenance is entirely possible, and some
    people claim it as easy, or easier than relying on maintenance and fixes for normally
    installed software. However, the Snap package you retrieve from your online package
    repository may not be up to date.'
  trans: '

    #### 继续下载安装程序


    现在你已经熟悉了 Android Studio 版本的细微差别以及硬件和操作系统的选择，可以继续下载并安装 Android Studio 了。正如本章前面提到的，在页面
    [`https://developer.android.com/studio`](https://developer.android.com/studio)
    上，你的操作系统应能被自动检测到，并且该平台的下载按钮会十分醒目。你在之前的示例中，从一台 Linux 机器访问该网站时已经看到了这一点。在我的 MacBook
    上，页面正中央醒目地显示着“下载 Android Studio”选项，下方还附有“适用于 Mac 的 4.0 版本”字样。


    如果你是在另一台机器上下载，而非你计划用于 Android 开发的那台，请确保为你打算使用的机器选择合适的 Android Studio 版本。如果目标机器运行的是不同的操作系统，请向下滚动页面至“Android
    Studio 下载”标题处，在那里你会看到 Android Studio 所支持的每个操作系统的选项。


    **Windows 备选方案**


    Android 开发者网站上的安装选项列表包含两个 Windows 版本。第一个是可执行安装程序，文件名格式为 `android-studio-ide-193.6514223-windows.exe`（其中
    `android-studio-ide` 后面的数字是构建版本号，会随时间变化）。第二个是 zip 文件，文件名格式为 `android-studio-ide-193.6514223-windows.zip`。我建议你使用第一个选项，即常规的可执行安装程序。这可以为你处理各种问题，包括目录位置、你在
    Windows 下正常使用的账户权限，以及共享机器上其他账户的权限。


    点击相关选项，为你的操作系统下载合适的 Android Studio 版本，并记下浏览器将下载文件保存的位置。在 macOS、Linux 和 Windows
    上，这通常是你的用户 `Downloads` 目录，但如果你选择将其放在其他位置，则可能有所不同。


    随着 Android Studio 4.0 版本的发布，总下载大小接近 1 GB，因此可能需要几分钟才能完成下载。


    #### 在 Windows 上安装 Android Studio


    假设你遵循推荐路径，使用 Windows 的可执行安装程序，你可以通过双击可执行文件从下载位置启动安装程序。在撰写本文时，该文件名为 `android-studio-ide-193.6514223-windows.exe`。所有最新版本的
    Windows 都会通过用户帐户控制（`UAC`）机制提示你允许继续安装，以确保你明确同意完成安装所需的提升权限。


    安装完成后，你应该会在“开始”菜单中看到 Android Studio 的新菜单项。


    #### 在 macOS 上安装 Android Studio


    与 macOS 上的大多数应用程序安装一样，安装 Android Studio 非常简单。在你的 Mac 上打开 Finder，浏览到你下载 Android
    Studio 安装程序的目录。你应该会看到一个 DMG 文件，其名称类似于 `android-studio-ide-193.6514223-mac.dmg`——这是
    Android Studio 4.0 安装程序的 DMG 文件。双击此磁盘映像文件，你的 Mac 会首先验证下载内容，这实际上意味着它会检查 Google
    用于准备磁盘映像的代码签名证书和/或公证。验证完成后，你应该会看到典型的 DMG 安装窗口，如图 2-2 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig2_HTML.jpg](img/499629_1_En_2_Fig2_HTML.jpg)


    图 2-2


    macOS 上的 Android Studio DMG 安装窗口


    将 Android Studio 应用程序图标拖到“应用程序”文件夹中，这将触发你的 Mac 像正常复制任何 Mac 应用程序一样复制安装包。完成后，即可从“应用程序”菜单和文件夹中使用
    Android Studio。


    #### 在 Linux 上安装 Android Studio


    你在 Linux 上下载的 Android Studio 安装程序是一个 gzip 压缩的 tarball 文件，文件名如 `android-studio-ide-193.6514223.tar.gz`。就
    Android Studio 而言，将此文件解压缩到你选择的目录即为安装。决定你要将 Android Studio 安装在何处：例如，你可能希望将其放在用户帐户的主目录下，或者
    `/opt` 等其他目录中。当你解压这个压缩的 tarball 时，会发现它在你指定的位置创建了一个名为 `android-studio` 的目录，所有文件和子目录都将位于该目录下。这意味着你无需再创建一个名称类似的父目录。例如，我无需创建
    `/home/grant/android-studio` 目录，因为解压 tarball 也会创建这一级目录——而且我也不希望出现 `/home/grant/android-studio/android-studio`
    这样的路径，这完全没有必要。你为 Android Studio 选择的目录将在 Android Studio 内部文档中被称为“安装主目录”。


    打开你喜欢的 shell，例如 `bash` 或 `zsh`，并将目录切换到你希望放置 Android Studio 的父目录下。确保你对该目录拥有写入权限。记下你下载压缩
    tarball 文件的位置——在本例中，是 `/home/grant/Downloads` 目录，我也可以将其称为 `~/Downloads`。运行以下 `tar`
    命令，该命令将指示它解压缩、解压并验证最终展开的文件集：


    ```

    tar -xvzf ~/Downloads/android-studio-ide-193.6514223.tar.gz

    ```


    屏幕上会滚动显示若干屏的状态信息，最终你会返回到 shell 提示符。运行 `ls` 或打开你喜欢的文件管理器，你会看到 `android-studio`
    目录已经创建。在该目录中，你会找到一个名为 `Install-Linux-tar.txt` 的文件，阅读该文件可以了解关于进一步调整安装以及如何实际运行 Android
    Studio 二进制文件的一些基本说明。我先为你揭晓答案！你将在 `android-studio` 目录下看到一个 `bin` 目录，其中包含一个名为 `studio.sh`
    的 shell 脚本。执行此 shell 脚本即可启动 Android Studio。我们将在本书后面再讨论 `Install-Linux-tar.txt`
    文件中提到的其他一些配置选项。


    **立即安装 Snap！**


    除了 Linux 的典型安装选项外，还有其他选择，其中之一遵循了近年来 Linux 上应用程序打包版本的趋势，这些版本完全自包含，将所有依赖项和库捆绑到一个包中。这种方法的典型代表是
    Canonical（以 Ubuntu 闻名）推广的 Snap 打包，以及源自 XDG 的 `freedesktop.org` 工作的 Flatpak。


    对于支持 Snap 包的 Linux 发行版（理论上所有发行版都支持），你可以让包管理器为 Android Studio 安装 Snap。例如，在 Ubuntu
    20.04 下，你可以直接运行


    ```

    sudo snap install android-studio

    ```


    关于 Snap 方法有一点需要注意：从 [`https://developer.android.com`](https://developer.android.com)
    的官方网站下载会提供 Android Studio 最新的修补版本，而依赖 Snap 方法则意味着依赖 Snap 包的维护者和打包者来保持其更新。理论上，这种维护是完全可能的，有些人声称它和依赖正常安装的软件的维护与修复一样简单，甚至更简单。然而，你从在线软件包仓库中获取的
    Snap 包可能不是最新的。

    '
- fmt: '# Continuing with Android Studio Setup After Installation


    With Android Studio installed on your computer, there are a handful of one-time
    setup actions that need to be performed to get you started. Fortunately, Android
    Studio itself will guide you through these setup steps. If you haven’t already
    started Android Studio subsequent to installation, you should do that now. You
    should see the splash screen shown in Figure [2-3](#499629_1_En_2_Chapter.xhtml#Fig3).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig3_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** – The splash screen shown when starting Android Studio


    Once Android Studio loads for the first time, the splash screen will disappear
    and you should see the start of the setup wizard, which might flash by, and then
    you will be prompted to import settings from any prior version of Android Studio
    on your machine, as shown in Figure [2-4](#499629_1_En_2_Chapter.xhtml#Fig4).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig4_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig4_HTML.jpg)


    **Figure 2-4** – Import settings option displayed when you run Android Studio
    for the first time


    For the purposes of this chapter, we will assume there are no older settings to
    import. You can choose the “Do not import settings” option and click the `OK`
    button. The setup process will then prompt you with a question about sharing usage
    data, such as features used and libraries accessed, in a prompt as shown in Figure
    [2-5](#499629_1_En_2_Chapter.xhtml#Fig5).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig5_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig5_HTML.jpg)


    **Figure 2-5** – Data sharing prompt during Android Studio setup


    It is entirely up to you if you want to share your usage statistics with Google
    or not. It will not affect the features or behavior of Android Studio as you are
    using it – though it can help with bug fixes and improvements in future versions.


    After you make your usage statistics choice, you will see the landing page for
    the setup wizard for Android Studio, as shown in Figure [2-6](#499629_1_En_2_Chapter.xhtml#Fig6).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig6_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig6_HTML.jpg)


    **Figure 2-6** – The Android Studio setup wizard home page


    There are not really many options you have at this point. You can either click
    the `Next` button to progress through the setup wizard or click the `Cancel` button
    to return to this at a future time.


    Assuming you are feeling adventurous – and I feel that’s a safe bet as you have
    already bought this book – click `Next` to get started with the final pieces of
    the setup wizard. You will be presented with the choice to select a standard or
    custom Install Type, as shown in Figure [2-7](#499629_1_En_2_Chapter.xhtml#Fig7).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig7_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig7_HTML.jpg)


    **Figure 2-7** – The Install Type selection page in the Android Studio setup wizard


    The `Custom` setup option will allow you to do things like change the installation
    location, choose which versions of the Android SDK to download, and similar selections.
    We will return to these items in more detail in Chapter [5](#499629_1_En_5_Chapter.xhtml).
    For now, you can select the `Standard` Install Type and click the `Next` button.


    You next choice will be largely cosmetic in nature, where you will be offered
    the option to have the user interface use a “light” or “dark” theme, as you can
    see in Figure [2-8](#499629_1_En_2_Chapter.xhtml#Fig8).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig8_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig8_HTML.jpg)


    **Figure 2-8** – The option to Select UI Theme in Android Studio


    For those of you with OLED-based displays, there is a miniscule difference in
    power usage between light and dark themes. For everyone else, this is just a cosmetic
    preference. For the purposes of this book, I will be using the `Light` theme,
    as this will save ink for any printed version of the book. Once you have decided
    on your own preference, click the `Next` button to continue.


    Your penultimate setup wizard screen will appear, which is the `Verify Settings`
    view shown in Figure [2-9](#499629_1_En_2_Chapter.xhtml#Fig9).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig9_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig9_HTML.jpg)


    **Figure 2-9** – The Verify Settings screen in the Android Studio setup wizard


    You might be accustomed to simply skipping past these sorts of confirmation screens,
    but I’d encourage you to scroll through the summary shown. Not because there are
    any hidden “gotchas” in there, but primarily to ensure you realize how much more
    will be downloaded as part of the setup process. If you choose the `Standard`
    Install Type as described earlier, Android Studio will continue to download the
    latest Android SDK version and the latest virtual device emulator for your platform.
    These can easily total another 500 MB–1 GB of downloads, which you should at least
    know about. If you’ve already experimented with the `Custom` Install Type option,
    at this stage you might be downloading quite a few SDK versions and emulator engines,
    which can quickly grow to many gigabytes of additional downloads. Once you are
    happy with the choices you have made, click the `Next` button, and Android Studio
    will commence all the remaining automation and download steps automatically. In
    some circumstances, if your hardware has direct emulation support, you will see
    an additional screen as shown in Figure [2-10](#499629_1_En_2_Chapter.xhtml#Fig10).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig10_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig10_HTML.jpg)


    **Figure 2-10** – Android Studio’s advisory screen informing you of accelerated
    emulation performance


    There is no downside to using your hardware emulation acceleration features, so
    accept this option, and you will eventually be presented with the `Downloading
    Components` progress screen, as shown in Figure [2-11](#499629_1_En_2_Chapter.xhtml#Fig11).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig11_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig11_HTML.jpg)


    **Figure 2-11** – The initial view of the Downloading Components progress screen


    Depending on the speed of your computer and your Internet connection, the component
    download and configuration process will take at least a few minutes. Do not panic
    if you see the details stall at points, as this usually represents where the Android
    Studio setup wizard is downloading large components, such as Android SDK packages.
    Eventually, you should see the details stop scrolling past, with one magic line
    showing at the bottom of the window, as shown in Figure [2-12](#499629_1_En_2_Chapter.xhtml#Fig12).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig12_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig12_HTML.jpg)


    **Figure 2-12** – The completed component download view in the Android Studio
    setup wizard


    The magic line of text you want to see at the end of the process is “Android SDK
    is up to date.” This means that the download and configuration steps are complete
    and Android Studio is ready to roll. You can click the `Finish` button, and you
    will be presented with the startup screen for Android Studio itself, shown in
    Figure [2-13](#499629_1_En_2_Chapter.xhtml#Fig13).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig13_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig13_HTML.jpg)


    **Figure 2-13** – The Welcome to Android Studio screen


    We will return to the options presented here in the coming chapters. For now,
    you can relax in the knowledge that you have successfully installed Android Studio
    and the SDK and emulator components we will be using in the next chapters.'
  raw: '### Continuing with Android Studio Setup After Installation


    With Android Studio installed on your computer, there are a handful of one-time
    setup actions that need to be performed to get you started. Fortunately, Android
    Studio itself will guide you through these setup steps. If you haven’t already
    started Android Studio subsequent to installation, you should do that now. You
    should see the splash screen shown in Figure [2-3](#499629_1_En_2_Chapter.xhtml#Fig3).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig3_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    The splash screen shown when starting Android Studio


    Once Android Studio loads for the first time, the splash screen will disappear
    and you should see the start of the setup wizard, which might flash by, and then
    you will be prompted to import settings from any prior version of Android Studio
    on your machine, as shown in Figure [2-4](#499629_1_En_2_Chapter.xhtml#Fig4).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig4_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Import settings option displayed when you run Android Studio for the first time


    For the purposes of this chapter, we will assume there are no older settings to
    import. You can choose the “Do not import settings” option and click the OK button.
    The setup process will then prompt you with a question about sharing usage data,
    such as features used and libraries accessed, in a prompt as shown in Figure [2-5](#499629_1_En_2_Chapter.xhtml#Fig5).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig5_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Data sharing prompt during Android Studio setup


    It is entirely up to you if you want to share your usage statistics with Google
    or not. It will not affect the features or behavior of Android Studio as you are
    using it – though it can help with bug fixes and improvements in future versions.


    After you make your usage statistics choice, you will see the landing page for
    the setup wizard for Android Studio, as shown in Figure [2-6](#499629_1_En_2_Chapter.xhtml#Fig6).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig6_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    The Android Studio setup wizard home page


    There are not really many options you have at this point. You can either click
    the Next button to progress through the setup wizard or click the Cancel button
    to return to this at a future time.


    Assuming you are feeling adventurous – and I feel that’s a safe bet as you have
    already bought this book – click Next to get started with the final pieces of
    the setup wizard. You will be presented with the choice to select a standard or
    custom Install Type, as shown in Figure [2-7](#499629_1_En_2_Chapter.xhtml#Fig7).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig7_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The Install Type selection page in the Android Studio setup wizard


    The Custom setup option will allow you to do things like change the installation
    location, choose which versions of the Android SDK to download, and similar selections.
    We will return to these items in more detail in Chapter [5](#499629_1_En_5_Chapter.xhtml).
    For now, you can select the Standard Install Type and click the Next button.


    You next choice will be largely cosmetic in nature, where you will be offered
    the option to have the user interface use a “light” or “dark” theme, as you can
    see in Figure [2-8](#499629_1_En_2_Chapter.xhtml#Fig8).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig8_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    The option to Select UI Theme in Android Studio


    For those of you with OLED-based displays, there is a miniscule difference in
    power usage between light and dark themes. For everyone else, this is just a cosmetic
    preference. For the purposes of this book, I will be using the Light theme, as
    this will save ink for any printed version of the book. Once you have decided
    on your own preference, click the Next button to continue.


    Your penultimate setup wizard screen will appear, which is the Verify Settings
    view shown in Figure [2-9](#499629_1_En_2_Chapter.xhtml#Fig9).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig9_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    The Verify Settings screen in the Android Studio setup wizard


    You might be accustomed to simply skipping past these sorts of confirmation screens,
    but I’d encourage you to scroll through the summary shown. Not because there are
    any hidden “gotchas” in there, but primarily to ensure you realize how much more
    will be downloaded as part of the setup process. If you choose the Standard Install
    Type as described earlier, Android Studio will continue to download the latest
    Android SDK version and the latest virtual device emulator for your platform.
    These can easily total another 500 MB–1 GB of downloads, which you should at least
    know about. If you’ve already experimented with the Custom Install Type option,
    at this stage you might be downloading quite a few SDK versions and emulator engines,
    which can quickly grow to many gigabytes of additional downloads. Once you are
    happy with the choices you have made, click the Next button, and Android Studio
    will commence all the remaining automation and download steps automatically. In
    some circumstances, if your hardware has direct emulation support, you will see
    an additional screen as shown in Figure [2-10](#499629_1_En_2_Chapter.xhtml#Fig10).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig10_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Android Studio’s advisory screen informing you of accelerated emulation performance


    There is no downside to using your hardware emulation acceleration features, so
    accept this option, and you will eventually be presented with the Downloading
    Components progress screen, as shown in Figure [2-11](#499629_1_En_2_Chapter.xhtml#Fig11).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig11_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    The initial view of the Downloading Components progress screen


    Depending on the speed of your computer and your Internet connection, the component
    download and configuration process will take at least a few minutes. Do not panic
    if you see the details stall at points, as this usually represents where the Android
    Studio setup wizard is downloading large components, such as Android SDK packages.
    Eventually, you should see the details stop scrolling past, with one magic line
    showing at the bottom of the window, as shown in Figure [2-12](#499629_1_En_2_Chapter.xhtml#Fig12).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig12_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    The completed component download view in the Android Studio setup wizard


    The magic line of text you want to see at the end of the process is “Android SDK
    is up to date.” This means that the download and configuration steps are complete
    and Android Studio is ready to roll. You can click the Finish button, and you
    will be presented with the startup screen for Android Studio itself, shown in
    Figure [2-13](#499629_1_En_2_Chapter.xhtml#Fig13).


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig13_HTML.jpg](images/499629_1_En_2_Chapter/499629_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    The Welcome to Android Studio screen


    We will return to the options presented here in the coming chapters. For now,
    you can relax in the knowledge that you have successfully installed Android Studio
    and the SDK and emulator components we will be using in the next chapters.'
  trans: '

    # 安装后继续配置 Android Studio


    在计算机上安装 Android Studio 后，还需要执行一些一次性的设置步骤才能开始使用。幸运的是，Android Studio 本身会引导你完成这些设置步骤。如果安装后尚未启动
    Android Studio，现在请启动它。你应该会看到如图 2-3 所示的启动画面。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig3_HTML.jpg](img/499629_1_En_2_Fig3_HTML.jpg)


    **图 2-3** – 启动 Android Studio 时显示的启动画面


    首次加载 Android Studio 后，启动画面将消失，你应该会看到设置向导的起始界面（可能一闪而过），然后系统会提示你从计算机上任何先前版本的 Android
    Studio 导入设置，如图 2-4 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig4_HTML.jpg](img/499629_1_En_2_Fig4_HTML.jpg)


    **图 2-4** – 首次运行 Android Studio 时显示的导入设置选项


    就本章而言，我们假设没有旧设置需要导入。你可以选择“不导入设置”选项，然后点击 `OK` 按钮。接下来，设置过程会弹出一个提示，询问你是否要共享使用数据（例如使用的功能和访问的库），如图
    2-5 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig5_HTML.jpg](img/499629_1_En_2_Fig5_HTML.jpg)


    **图 2-5** – Android Studio 设置期间的数据共享提示


    是否要与 Google 共享你的使用统计信息完全取决于你。这不会影响你使用的 Android Studio 的功能或行为——尽管它有助于在未来的版本中进行错误修复和改进。


    做出使用统计信息的选择后，你将看到 Android Studio 设置向导的登录页面，如图 2-6 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig6_HTML.jpg](img/499629_1_En_2_Fig6_HTML.jpg)


    **图 2-6** – Android Studio 设置向导主页


    此时，你实际上并没有太多选项。你可以点击 `Next` 按钮继续执行设置向导，或者点击 `Cancel` 按钮稍后再回来处理。


    假设你感觉大胆进取——我觉得这个猜测很安全，因为你已经买了这本书——请点击 `Next` 开始完成设置向导的最后部分。你将看到选择标准或自定义安装类型的选项，如图
    2-7 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig7_HTML.jpg](img/499629_1_En_2_Fig7_HTML.jpg)


    **图 2-7** – Android Studio 设置向导中的安装类型选择页面


    `Custom` 设置选项允许你执行诸如更改安装位置、选择要下载的 Android SDK 版本等操作。我们将在第 5 章中更详细地讨论这些项目。现在，你可以选择
    `Standard` 安装类型，然后点击 `Next` 按钮。


    接下来你的选择在很大程度上是外观性的，你将可以选择用户界面使用“浅色”或“深色”主题，如图 2-8 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig8_HTML.jpg](img/499629_1_En_2_Fig8_HTML.jpg)


    **图 2-8** – 在 Android Studio 中选择 UI 主题的选项


    对于使用 OLED 显示屏的用户来说，浅色和深色主题之间的功耗差异微乎其微。对于其他人来说，这只是外观偏好。就本书而言，我将使用 `Light` 主题，因为这样可以为本书的任何印刷版本节省墨水。确定自己的偏好后，点击
    `Next` 按钮继续。


    接下来将出现设置向导的倒数第二个屏幕，即图 2-9 所示的 `Verify Settings` 视图。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig9_HTML.jpg](img/499629_1_En_2_Fig9_HTML.jpg)


    **图 2-9** – Android Studio 设置向导中的验证设置屏幕


    你可能习惯直接跳过这类确认屏幕，但我建议你滚动浏览显示的摘要。这并不是因为其中有任何隐藏的“陷阱”，主要是为了确保你意识到设置过程中将下载多少内容。如果你按照前面的描述选择
    `Standard` 安装类型，Android Studio 将继续下载最新的 Android SDK 版本和适用于你平台的最新虚拟设备模拟器。这些很容易总计达到
    500 MB 到 1 GB 的下载量，你至少应该知道这一点。如果你已经尝试过 `Custom` 安装类型选项，那么在此阶段你可能会下载相当多的 SDK 版本和模拟器引擎，这可能会迅速增长到数
    GB 的额外下载量。一旦你对所做的选择感到满意，请点击 `Next` 按钮，Android Studio 将自动开始所有剩余的自动化和下载步骤。在某些情况下，如果你的硬件具有直接仿真支持，你将看到一个额外的屏幕，如图
    2-10 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig10_HTML.jpg](img/499629_1_En_2_Fig10_HTML.jpg)


    **图 2-10** – Android Studio 的通知屏幕，告知你加速仿真性能


    使用硬件仿真加速功能没有任何坏处，因此请接受此选项，你最终将看到 `Downloading Components` 进度屏幕，如图 2-11 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig11_HTML.jpg](img/499629_1_En_2_Fig11_HTML.jpg)


    **图 2-11** – 下载组件进度屏幕的初始视图


    根据你的计算机和互联网连接速度，组件下载和配置过程至少需要几分钟。如果看到详细信息在某处停滞，请不要惊慌，这通常表示 Android Studio 设置向导正在下载大型组件，例如
    Android SDK 包。最终，你应该会看到详细信息停止滚动，窗口底部显示一行神奇的文字，如图 2-12 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig12_HTML.jpg](img/499629_1_En_2_Fig12_HTML.jpg)


    **图 2-12** – Android Studio 设置向导中完成的组件下载视图


    你希望在过程结束时看到的神奇文字行是“Android SDK is up to date.”。这意味着下载和配置步骤已完成，Android Studio 已准备就绪。你可以点击
    `Finish` 按钮，然后你将看到 Android Studio 本身的启动屏幕，如图 2-13 所示。


    ![../images/499629_1_En_2_Chapter/499629_1_En_2_Fig13_HTML.jpg](img/499629_1_En_2_Fig13_HTML.jpg)


    **图 2-13** – “欢迎使用 Android Studio”屏幕


    我们将在接下来的章节中回到这里展示的选项。现在，你可以放心了，因为你已经成功安装了 Android Studio 以及我们将在后续章节中使用的 SDK 和模拟器组件。

    '
- fmt: '# Working with Alternatives to Android Studio


    If there is one thing that the software world – and software development in particular
    – offers, it is choice! Whether it’s web browsers, email packages, or your preference
    in games, choice abounds. Developing applications for Android is no different,
    though there is a strong default in Android Studio. Nevertheless, other options
    are out there, and even if you don’t plan to use any of them, it can be useful
    to be aware alternative IDEs and other tools exist, because you will see them
    mentioned online, at conferences, and in other forums where Android development
    is discussed.


    Here is a short, though not exhaustive, list of alternatives you might encounter
    in your budding Android application development career.


    ## Eclipse


    As mentioned earlier in the chapter, Eclipse was the first IDE Google supported
    for Android development. At the dawn of Android around 2007, Google needed to
    provide a compelling developer offering so that its newly acquired smartphone
    operating system had the appeal to draw developers to it. At the time, it chose
    the open source Eclipse IDE as the officially endorsed development environment.
    That choice was universally accepted and acknowledged as a great multiplier and
    enabler, letting literally millions of Android developers access tools for free
    that enabled them to make wave after wave of Android applications.


    Eclipse had a decade in the limelight, right though until the launch of Android
    Studio 1.0 in 2014. Even after that launch, Eclipse still enjoyed full support
    from Google, until the release of Android Studio 2.2 in 2016. Google announced
    at that point that it would no longer support Eclipse as a first-class development
    environment nor would it certify that the Android Developer Tools would work bug-free
    in the future.


    This might sound like Eclipse is no longer a viable environment in which to build
    Android applications. Nothing could be further from the truth. The reality is
    that Google no longer provides the polish, the convenience, or the direct support
    for developers wanting to use Eclipse. However, two major themes ensure that Eclipse
    remains an option for developers who seek to use it.


    First, Eclipse has over a decade of accumulated fine-tuning, integrations, and
    know-how on the basics of dealing with Android applications. At the end of the
    day, the work of building Android apps boils down to working with textual Java
    code, XML data, and related artifacts. As we will see in Part 2 of this book,
    those facets do not change just because you choose a different IDE to help you
    in the process.


    Second, Eclipse is one of the most popular IDEs over time, and it has strengths
    beyond Android that mean it is very often the IDE of choice in development environments
    that are dealing with building applications beyond a single target platform.


    This isn’t to suggest that choosing Eclipse as your IDE will be as smooth or as
    efficient as Android Studio. Once you move beyond the scope of this book, you’ll
    find many contemporary online sources of information will assume you are using
    Android Studio and not Eclipse. But some of you – particularly the experienced
    developers – will look beyond this to where Eclipse already appeals. If you are
    embarking on your developer journey and have not already a healthy dose of experience
    with Eclipse, then I strongly suggest you go with Android Studio as your IDE.


    ## IntelliJ IDEA


    At the beginning of this chapter, I explained the genesis of Android Studio and
    outlined its foundation being based upon IntelliJ IDEA. So you may be thinking,
    if that is what Android Studio is based upon, why would I choose IntelliJ IDEA
    instead, what is the difference, and why would I care?


    Great questions! In essence, as a new developer, there are no overwhelming reasons
    to think about choosing IntelliJ IDEA as your IDE of choice. However, seasoned
    developers, or those who develop Java-based applications for more platforms than
    just Android, often find standardizing on one IDE to be a significant driver for
    efficiency. There are also features that JetBrains, the company behind IntelliJ,
    only makes available in the full commercial package, such as the ability to work
    seamlessly with the Spring Framework for Java. If you fall into those categories,
    you are more than welcome to adopt IntelliJ IDEA as your preferred IDE.


    To find out more about how to use IntelliJ IDEA specifically for Android development,
    check out the web pages dedicated to this topic from JetBrains, the company that
    owns and builds IntelliJ IDEA, at [`www.jetbrains.com/help/idea/android.html`](http://www.jetbrains.com/help/idea/android.html)
    and [`www.jetbrains.com/help/idea/getting-started-with-android-development.html`](http://www.jetbrains.com/help/idea/getting-started-with-android-development.html).


    ## Tools That Target Multiple Operating Systems and Mobile Platforms


    In Chapter [1](#499629_1_En_1_Chapter.xhtml), you saw the breakdown of smartphone
    market share, where Android held a massive majority. Don’t let that blind you
    to the reality that alternatives exist, such as Apple’s iPhone, and tools exist
    to help developers target both platforms and even a few others you may not have
    heard of. Some of the key multiplatform IDEs and development environments include
    products such as Xamarin, PhoneGap, Flutter, and Apache Cordova.


    Cross-platform tools deserve a book in their own right, and in fact these aforementioned
    tools have more than one book dedicated to them, as well as countless pages of
    content available online. If you are interested in what they have to offer, I
    strongly recommend starting with their respective product home pages on the Internet
    and then expanding your search from there.


    ## Traditional Platform-Agnostic Development Tools


    To wrap up this chapter and the topic of developer tools, I should take you back
    to the very beginning of the chapter. IDEs came into existence to help developers
    wrangle all of the tools that are used to create modern applications. This includes
    code editors, debuggers, compilers, and more. But IDEs are not for everyone.


    Some readers are likely to be seasoned developers, who are quite comfortable assembling
    their own set of tools to aid in creating Android applications. There are plenty
    of developers who prefer to choose their own editor, such as Vim, Emacs, or Sublime
    Text; compilation and build pipeline tools such as Ant, Jenkins, and Hudson; and
    other tools for performance management, debugging, and more.


    If you want to pursue this path, Google makes a set of Android command-line development
    tools available from the Android Studio download page mentioned at the beginning
    of the chapter. These tools include `sdkmanager`, which takes care of downloading
    and managing multiple Android SDK packages; `adb`, which is the Android Developer
    Bridge utility for moving your applications from your developer machine to your
    virtual and real devices; and more.


    While this book isn’t targeted at developers who want to take this path, at least
    you know that it is a viable alternative. For now, we’ll assume you are content
    working with Android Studio, and we’ll delve straight into developing your first
    Android application in the very next chapter, starting on the next page!


    # Your First Android Application, Already!


    With Android Studio in place on your computer, you are ready to begin creating
    your very first Android application. Yes, right now! For those readers who are
    not familiar with Java code development, do not panic. We will start our examples
    in this chapter with no assumed Java knowledge or know-how. For those readers
    who do know Java, read on in any case as we will cover the important first step
    of creating an Android Virtual Device, or AVD, on which to run the example in
    this chapter, as well as the examples in future chapters.'
