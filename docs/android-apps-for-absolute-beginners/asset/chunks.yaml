- fmt: '现在您已经了解了`ExternalFilesExample`示例，是时候看看它如何实际运行了。图[19-3](#499629_1_En_19_Chapter.xhtml#Fig3)展示了用户首次开始在顶部字段中输入文本时应用程序的初始显示效果。


    ![../images/499629_1_En_19_Chapter/499629_1_En_19_Fig3_HTML.jpg](images/499629_1_En_19_Chapter/499629_1_En_19_Fig3_HTML.jpg)


    **图 19-3** 输入要保存到外部文件的文本


    如我所承诺的，输入法编辑器（键盘）出现在屏幕的下半部分，但我们的按钮仍然可以访问。在这个示例中，这更像是一种权宜之计——它并非成熟应用程序应有的精致用户界面，而是展示了我们关心的文件输入/输出操作。用户可以随时点击“保存到文件”按钮，触发`doSaveToFile()`方法。正如本章前面所述，该方法会调用`doHideKeyboard()`方法，此时我们的用户界面将如图[19-4](#499629_1_En_19_Chapter.xhtml#Fig4)所示。


    ![../images/499629_1_En_19_Chapter/499629_1_En_19_Fig4_HTML.jpg](images/499629_1_En_19_Chapter/499629_1_En_19_Fig4_HTML.jpg)


    **图 19-4** 保存文件的同时隐藏输入法编辑器


    输入到`EditText`字段中的文本会保存到名为`ExternalFilesExample.txt`的文件中。随时可以通过点击“从文件读取”按钮调出`ExternalFilesExample.txt`的内容。这会触发读取文件内容，并由`doReadFromFile()`方法显示。图[19-5](#499629_1_En_19_Chapter.xhtml#Fig5)展示了此文件检索的结果。


    ![../images/499629_1_En_19_Chapter/499629_1_En_19_Fig5_HTML.jpg](images/499629_1_En_19_Chapter/499629_1_En_19_Fig5_HTML.jpg)


