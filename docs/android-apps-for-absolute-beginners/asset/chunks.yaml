    ## Getting Descriptive


    The `strings.xml` file is a sleeping giant in the Android world. It is here that
    you can define all manner of constants, which are basically things that rarely
    change or at least start out in your application context as something with a fixed
    initial value. When you think about constants, you can go beyond the humorous
    examples I gave before (why limit yourself to the height of Mount Everest in meters
    – why not feet, rods, furlongs, or chains?!). More seriously, you should keep
    a constant look out (no pun intended) for any time you are entering literal strings
    into your code and ask yourself if it wouldn’t be better to instead place a single
    entry into the `strings.xml` file. There are literally decades of lessons learned
    by programmers the hard way that all boil down to the maxim “abstract literal
    strings out of your code – you will thank me later.”


    Let’s add an entry to the `strings.xml` file, with the intention of replacing
    the on-screen text you see in your `MyFirstApp` application. There is more work
    to do than just defining the new reference value, but we will get to that in the
    next section. For now, open the `strings.xml` file, which should look a lot like
    Listing [8-4](#499629_1_En_8_Chapter.xhtml#PC15).


    ```

    MyFirstApp


    Listing 8-4

    The default strings.xml file for MyFirstApp

    ```


    Add a new line, and create a `<string>` element entry with an attribute of name,
    equal to a text string named `welcome_text`. The value of the `<string>` element
    should be whatever text you actually want your user to see on-screen. Your `strings.xml`
    file should look something like Listing [8-5](#499629_1_En_8_Chapter.xhtml#PC16).


    ```

    MyFirstApp

    Hello Android, from the strings.xml file!


    Listing 8-5

    Adding a new  element to strings.xml

    ```


    Remember, this is XML. The value of the name attribute can be anything you like
    – `"welcome_text"`, `"look_at_my_great_string"`, `"text1"`, and so on. So long
    as you then reference this correctly in the future, you are reaping the “extensible”
    benefits of Extensible Markup Language! Let’s see how we use this new string in
    the next section.


    ## Defining Activity Layouts with XML


    Perhaps the largest and most complex area in which Android relies on XML is in
    the definition and management of View layouts – that is, the definition and control
    of how the on-screen user interface is rendered for a user and how it is controlled
    programmatically by your application.


    ```


    Listing 8-6

    The default activity_main.xml layout file for MyFirstApp

    ```


    Our default `MyFirstApp` application was generated via the new project wizard,
    and by default this chose a default layout of `"ConstraintLayout"` for your `MainActivity`
    activity. This is one of many, many types of layout available for your activities,
    derived from the parent `View` class. We will delve into views, layout, and many
    of their permutations in the next few chapters. Right now, let’s start working
    on your existing layout. A `ConstraintLayout` is designed to give you very flexible
    control over the size and position of the other UI elements – known as widgets
    – that appear within it. From Listing [8-6](#499629_1_En_8_Chapter.xhtml#PC17),
    you can see we have only described one widget, which is a `TextView`. We’ll get
    around to adding more widgets in the next two chapters. For now, let’s make our
    on-screen greeting more flexible by using the power of the `strings.xml` reference
    value for our widget text, instead of a hard-coded value.


    Let’s update the layout XML to replace the hard-coded string `"Hello Android!"`
    with a reference to the `welcome_text` constant we defined in the previous section
    in the `strings.xml` file. Change the `android:text` attribute so that it references
    `"@string/welcome_text"`, which is the name of the string alias created earlier.
    Your layout should now look like Listing [8-7](#499629_1_En_8_Chapter.xhtml#PC18),
    with the change shown in bold.


    ```


    Listing 8-7

    Changing TextView text to reference strings.xml constant

    ```


    **Note**


    Somewhat annoyingly, while the reference value XML files are named in the plural
    – `strings.xml`, `colors.xml`, and `styles.xml` – when we actually reference the
    definitions they contain, we use singular references – `@string`, `@color`, and
    `@style`. Android Studio will help you out here with its prompting as you type.


    With our layout XML changed to reference our `strings.xml` `welcome_text` value,
    it is time to run your application again to see the effect in action, as shown
    in Figure [8-2](#499629_1_En_8_Chapter.xhtml#Fig2).


    ![../images/499629_1_En_8_Chapter/499629_1_En_8_Fig2_HTML.jpg](images/499629_1_En_8_Chapter/499629_1_En_8_Fig2_HTML.jpg)


    Figure 8-2

    New welcome text in MyFirstApp controlled entirely through XML definitions


    Voila! You have changed colors and welcome text in your application with just
    the XML definitions available to you. There’s much more Android applications get
    out of using XML as a definition and control mechanism, and when combined with
    the power of Java to manipulate XML, the results can be astounding. But for now,
    you have the basics of XML you need to proceed with your Android journey.


    ## Summary


    You have had a whirlwind introduction to XML, and how Android leverages XML, in
    this chapter. XML is such a large topic that one chapter cannot do it justice,
    and I would encourage you to seek out more information online and in other books.
    One of the biggest advantages of XML in the Android development space is the ability
    to both use it to control application logic and control it through application
    logic. We will explore this in more depth in the next two chapters, where we get
    deeper into the world of Android layouts and widgets!


    # 9. Exploring Android Concepts: Core UI Widgets'
