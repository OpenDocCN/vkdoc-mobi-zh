    `Ch12/ColorFragmentExample` 中的源代码还展示了显示颜色细节的机制以及辅助类 `ColorContent`，它只是一个用 Java
    封装颜色项目集和一些管理函数的方法（请记住，Android 对 Java 的支持尚未超越 Java 8，因此像数据类这样更现代的方法不可用）。其他可以提供此列表的选项包括
    Content Provider 或其他数据源。


