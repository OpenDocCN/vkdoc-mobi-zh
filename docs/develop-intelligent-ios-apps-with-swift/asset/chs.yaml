  \n\n\n### 在 Xcode 中测试 Core ML 模型\n\n使用 App 模板创建一个新的 SwiftUI 项目。将 Core ML 模型拖放到项目中，如图\
  \ 7-9 所示。通常，这类测试会使用单元测试包进行，但即使 `mlmodel` 的类在 Xcode 11 中可以正常使用，在 Xcode 12 的测试项目中却无法使用。因此，我将在\
