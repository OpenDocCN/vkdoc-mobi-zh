  图像分类\n```\n\n`Vision` 框架的另一个功能是图像相似度检测。这可以通过使用 `VNGenerateImageFeaturePrintRequest`\
  \ 来实现。该请求会创建图像的特征指纹，然后您可以使用 `computeDistance` 方法来比较这些特征指纹。代码清单 2-4 中的代码示例展示了如何使用该方法。同样，我们创建\
