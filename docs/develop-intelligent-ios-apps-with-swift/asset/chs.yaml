  \ Transformer 的细节。如果你只是打算用这个模型开发一个移动应用，那么了解其浅层知识就足够了。\n\n原始的 `GPT-2` 模型是在 40 GB\
  \ 的互联网文本（`GPT-2 WebText`）上训练的。`GPT-2` 是一个基于 Transformer 的大型语言模型，拥有 15 亿个参数，在一个数据集上训练而成。语言模型通过训练来根据前文预测下一个单词。\n\
