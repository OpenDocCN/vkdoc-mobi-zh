  ## 总结


  在本章中，我们介绍了使用自然语言处理进行文本摘要的核心技术。分别讲解了抽象式和抽取式摘要方法。在掌握理论知识后，我们利用 iOS 内置的 NLP 能力和抽取式摘要技术，构建了一个文本摘要应用。在开发过程中，我们学会了如何过滤常见词或停用词，以及如何使用`NSLinguisticTagger`计算词频。


