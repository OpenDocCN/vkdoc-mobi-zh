- "# 2. Apple ML 工具简介\n\n在软件和机器学习领域，学习并尝试最新的工具至关重要。如果你不知道如何使用这些高效工具，可能会浪费大量时间。本章将介绍\
  \ Apple 为 iOS 开发者提供的、用于轻松构建机器学习应用的工具。本章中介绍的框架和工具包括 `Vision`、`VisionKit`、`Natural\
  \ Language`、`Speech`、`Core ML`、`Create ML` 以及 `Turi Create`。我们将学习这些工具具备哪些能力，以及我们可以利用它们构建哪些类型的应用。\n\
  \n## Vision\n\n`Vision` 框架用于处理图像和视频。它提供了多种计算机视觉和机器学习能力，适用于视觉数据。`Vision` 框架的一些功能包括：人脸检测、身体检测、动物检测、文本检测与识别、条形码识别、物体追踪、图像对齐等。我将提及一些主要功能和方法，同时会涉及一些你可能未曾听说的\
  \ iOS 隐藏特性。鉴于本书专注于文本处理，将不涉及图像处理的细节。如果你需要了解更多与计算机视觉算法相关的信息，可以在 Apple 开发者网站上找到详细资料和示例项目。\n\
  \n### 人脸与身体检测\n\nVision 提供了多种用于在图像中检测人脸和人类的请求类型。这里我将提及其中一些请求，以回顾 Apple 通过内置 API\
  \ 提供了哪些功能。`VNDetectFaceRectanglesRequest` 用于人脸检测，它会返回给定图像中检测到的人脸矩形区域以及偏航角。该请求还会提供人脸的偏航角和滚动角。`VNDetectFaceLandmarksRequest`\
  \ 能够提供嘴部、眼睛、面部轮廓、眉毛、鼻子和嘴唇的位置。`VNDetectFaceCaptureQualityRequest` 用于捕获图像中人脸的质量，可用于自拍编辑应用。有一个名为“根据捕获质量选择自拍”的示例项目，演示了如何比较不同图像中的人脸质量。\n\
  \n`VNDetectHumanRectanglesRequest` 用于检测人类，并返回定位图像中人类位置的矩形区域。\n\n要使用这些请求，你需要创建一个\
  \ `ImageRequestHandler` 和一个特定类型的请求。通过 `perform` 方法将该请求传递给处理器，如代码清单 `2-1` 所示。这将在图像缓冲区上执行请求并返回结果。示例展示了在给定图像上进行人脸检测的代码。\n\
  \n```\nlet handler = VNImageRequestHandler(cvPixelBuffer:\npixelBuffer, orientation:\
  \ .leftMirrored, options:\nrequestOptions)\nlet faceDetectionRequest =\nVNDetectFaceCaptureQualityRequest()\n\
  do {\ntry\nhandler.perform([faceDetectionRequest])\nguard let faceObservations =\n\
  faceDetectionRequest.results as? [VNFaceObservation]\nelse {return}\n}\n} catch\
  \ {\nprint(\"Vision error: \\\n(error.localizedDescription)\")\n}\n```\n\n**代码清单\
  \ 2-1** 人脸检测请求\n\n\n\n### 图像分析\n\n借助内置的图像分析功能，您可以创建能够理解图像内容的应用程序。可以使用 `Vision` 框架来检测和定位图像中的矩形、人脸、条形码和文本。如果您想深入了解，Apple\
  \ 还提供了一个示例项目，展示了如何检测图像中的文本和二维码。\n\nApple 还提供了一个内置的机器学习模型，能够对 1303 个类别进行分类，涵盖从车辆到动物和物体的众多类别。例如：杂技演员、飞机、饼干、熊、床、厨房水槽、金枪鱼、火山、斑马等。\n\
