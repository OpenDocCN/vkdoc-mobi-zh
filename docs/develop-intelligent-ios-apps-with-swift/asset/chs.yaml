  \n图 7-10 调试器输出\n\n既然我们已经检查了模型并确认其工作正常，那么就可以在 Xcode 项目中使用我们的模型了。\n\n## 在 Xcode 中使用\
  \ Core ML 模型\n\n我们已经测试了 Core ML 模型，并确认其运行正确。通过在 Xcode 中选择该模型，可以查看其他详细信息。\n\n如图 7-11\
  \ 所示，我们看到 Xcode 自动生成了 `imdbGRU` 类，用于使用该模型。我们将使用这个类对模型进行预测。本章将逐步实现整个项目。我建议跟随示例并编写代码，你也可以在这里找到完成的项目：[`github.com/ozgurshn/Chapter7-TextClassificationWithGRUModel`](https://github.com/ozgurshn/Chapter7-TextClassificationWithGRUModel)。\n\
  \n创建一个名为 `GRUModel.swift` 的新文件。在此文件中，我们将对输入进行预处理，并使用 Core ML 模型进行预测。\n\n我们将从 IMDB\
  \ 数据集中加载单词列表到数组中。你可以从此链接下载 JSON 文件：[`storage.googleapis.com/tensorflow/tf-keras-datasets/imdb_word_index.json`](https://storage.googleapis.com/tensorflow/tf-keras-datasets/imdb_word_index.json)。将该\
  \ JSON 文件拖放到 Xcode 项目中，然后复制粘贴代码清单 7-18 中的代码。\n\n![../images/501003_1_En_7_Chapter/501003_1_En_7_Fig12_HTML.jpg](img/501003_1_En_7_Fig12_HTML.jpg)\n\
  \n图 7-12 在实时预览中运行转换后的 Keras 模型\n\n```\nvar wordDictionary: [String: Int] = {\nreturn\
  \ try!\nJSONDecoder().decode(Dictionary.self,\nfrom: Data(contentsOf:\nBundle.main.url(forResource:\"\
  imdb_word_index\",\nwithExtension: \"json\")!))\n}()\n代码清单 7-18 加载单词列表\n```\n\n\
  我们将创建的第一个函数是 `splitToWords` 函数，它从字符串中生成单词列表，如代码清单 7-19 所示。记得在此类中导入 `NaturalLanguage`。\n\
  \n```\nprivate func splitToWords(text:String) -> [String]\n{\nlet lowerCasedText\
  \ = text.lowercased()\nlet tokenizer = NLTokenizer(unit: .word)\ntokenizer.string\
  \ = lowerCasedText\nvar tokens = [String]()\ntokenizer.enumerateTokens(in:\nlowerCasedText.startIndex..<lowerCasedText.endIndex)\n\
  { range, _ in\ntokens.append(String(lowerCasedText[range]))\nreturn true\n}\nreturn\
  \ tokens\n}\n代码清单 7-19 分词\n```\n\n在上述代码中，我们将文本转换为小写，因为我们的 IMDB 文本表示文件包含小写单词。然后，我们使用\
  \ Natural Language 框架中的 `NLTokenizer` 来枚举给定字符串中的单词。我们将这些单词添加到一个数组中并返回该数组。\n\n下一步是创建预测函数。将代码清单\
  \ 7-20 中的代码复制粘贴到 `GRUModel` 类中。\n\n```\nfunc predict(text:String)->String {\nlet\
  \ words = splitToWords(text: text)\nvar embedding = [Int]()\nfor word in words {\n\
  embedding.append(wordDictionary[word] ?? 0)\n}\nlet model = try? imdbGRU(configuration:\n\
  MLModelConfiguration())\nlet maxLength = 300\nlet maxLengthNumber = NSNumber(value:\n\
  maxLength)\nguard let input_data = try?\nMLMultiArray(shape:[maxLengthNumber,1,1],\n\
  dataType:.double) else {\nfatalError(\"MLMultiArray error:\ninput_data\")\n}\nfor\
  \ (index,element) in embedding.enumerated()\n{\ninput_data[index] = NSNumber(value:\n\
  element)\n}\n//padding rest with 0s\nfor i in embedding.count..<maxLength {\ninput_data[i]\
  \ = NSNumber(value: 0.0)\n}\nlet input = imdbGRUInput(input: input_data,\ngru_2_h_in:\
  \ nil)\nguard let prediction = try?\nmodel?.prediction(input: input) else {\nfatalError(\"\
  Unexpected runtime error:\nprediction\")\n}\n//prediction.output[0] is an array\
  \ of\n//doubles of size 1\n//prediction.output[0][0] is a double\n//value representing\
  \ the probability\nif prediction.output[0][0].doubleValue > 0.5\n{return \"positive\"\
  }\nelse\n{return \"negative\"}\n}\n代码清单 7-20 预测\n```\n\n代码的工作原理如下：\n\n1. 从输入字符串创建单词列表，然后将这些单词转换为\
  \ `wordDictionary` 中的整数表示。\n2. 创建模型实例。\n3. 创建大小为 `[300,1,1]` 的 `MLMultiArray`。我们将其设置为\
  \ 300，是因为模型训练时输入尺寸为 300。\n4. 将输入数据用零填充至 300 个元素，以保证固定大小。\n5. 创建模型输入。当您将模型拖放到 Xcode\
  \ 中时，Xcode 会自动生成这个类。\n6. 使用输入数据进行预测，并返回结果。如果结果高于 0.5，则判定为正面情绪；如果低于 0.5，则判定为负面情绪。\n\
  \n\n\n接下来，我们将设置应用程序的用户界面。打开`ContentView.swift`文件。复制粘贴清单 7-21 中的代码。\n\n```swift\n\
  struct ContentView: View {\n@State var sentiment = \"\"\n@State var text = \"super\
  \ cool\"\nvar body: some View {\nVStack{\nTextField(\"Text\", text: $text)\nButton(action:\
  \ {\nself.sentiment =\nGRUModel().predict(text: self.text)\n}){Text(\"Predict\"\
  )}\nText(sentiment)\n}\n}\n}\n```\n\n在上述代码中，我们创建了两个字符串状态来保存预测结果（`sentiment`）和输入文本。我们使用`@State`，因为我们希望这些变量中的变化能够反映在\
  \ UI 中。\n\n在`ContentView`的`body`中，我们将元素放入`VStack`中以垂直组织它们。我们放置了一个文本字段用于接收用户输入，一个文本视图用于显示结果，以及一个按钮用于执行预测。当按钮被点击时，我们会在机器学习模型上执行预测。\n\
  \n在模拟器或实时预览模式下运行应用程序，如图 7-12 所示。\n\n点击“Predict”按钮并检查结果。恭喜！你已经使用`Keras`训练了一个循环神经网络模型（`GRU`），将其转换为`Core\
  \ ML`格式，并在`Xcode`项目中使用了它。\n\n## 总结\n\n在本章中，你学习了如何在没有本地`Python`环境或良好`GPU`来训练模型的情况下，使用免费的`Google\
  \ Colab`服务在线训练深度学习模型。我们了解了如何使用`Keras`数据集，并利用`Keras`框架训练了一个自定义文本分类模型。通过利用`coremltools`库，我们将训练好的模型从`Keras`转换为`Core\
  \ ML`格式，并将其集成到`Xcode`项目中。你学习了使用`Jupyter Notebook`或`Xcode`测试`Core ML`模型的不同方法。通过使用`SwiftUI`构建示例应用程序，我们能够轻松地向用户展示预测结果。\n\
  \n## 结论\n\n恭喜！你已经完成了使用机器学习构建智能应用的旅程。你已经掌握了相关的技术知识，希望这些知识能帮助你在未来的所有移动端`NLP`项目中取得成功。\n\
