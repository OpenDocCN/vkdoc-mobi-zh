  ## 使用 Turi Create 进行垃圾邮件分类


  在前面的章节中，我们学习了如何通过分别使用`Create ML`框架和`Create ML`应用来创建垃圾邮件分类器。在本节中，我们将使用`Turi Create`来训练垃圾邮件分类器。`Turi
  Create`是一个用于创建 Core ML 模型的开源 Python 库。它支持多种任务，如图像分类、对象检测、风格迁移、推荐、文本分类等。与`Create
  ML`相比，`Turi Create`提供了更多参数来训练 ML 模型。


  由于这是一个 Python 库，我们无法直接开始编码；我们需要先设置好 Python 环境才能开始使用`Turi Create`。


  ### Turi Create 环境设置


  `Turi Create`支持 Python 2.7、3.5、3.6 和 3.7 版本。处理 Python 项目时，建议使用虚拟环境。虚拟环境通过为不同项目创建隔离的
  Python 虚拟环境，来分离它们各自所需的依赖项。代码清单 3-12 中的代码安装了`virtualenv`包并创建了你的虚拟环境。在终端中运行并激活你的环境。


  ```

  pip install virtualenv

  #### 创建一个 Python 虚拟环境

  cd ~

  virtualenv venv

  # 激活你的虚拟环境 source ~/venv/bin/activate

  ```


  **代码清单 3-12** 创建虚拟环境


  激活环境后，使用代码清单 3-13 中的代码安装`Turi Create`。如果你在环境中，应该在终端行首看到`venv`。使用代码清单 3-13 中的代码安装`Turi
  Create`和`iPython`。`iPython`让我们可以使用交互式 Python 笔记本。


  ```

  pip install -U turicreate

  pip install ipython

  ipython notebook

  ```


  **代码清单 3-13** 安装`Turi Create`和`iPython`


