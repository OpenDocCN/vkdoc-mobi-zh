  我们可以通过两种方式使用 `Create ML`：作为一个独立的应用程序（可以在 Xcode 菜单栏中选择“打开开发者工具”打开），或者作为 macOS Playgrounds
  中的一个框架。在 Playgrounds 中，我们可以将 CSV/JSON 文件或文件夹中的数据导入到 `Create ML` 应用中。数据应分类存放于不同的文件夹中。因此在
  Playgrounds 中，我们有更多的选项。


  在本项目中，我们将使用 Kaggle 上的短信垃圾邮件收集数据集。Kaggle 是寻找数据集的一个极好来源。


  从 [`www.kaggle.com/uciml/sms-spam-collection-dataset`](http://www.kaggle.com/uciml/sms-spam-collection-dataset%2520)
  下载短信垃圾邮件收集数据集以开始项目。这是一个简单的 CSV 文件，包含两列，如图 3-2 所示。第一列是短信的标签，第二列是短信内容。我们有两种类别：正常短信和垃圾短信。该数据集包含一组
  5,574 条英文短信，根据其是否为正常短信（合法）或垃圾短信进行了标记。


