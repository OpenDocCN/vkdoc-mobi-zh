  **清单 3-9** 在项目中使用分类器模型


  如上述代码所示，我创建了模型的实例，并对其调用了 `prediction` 方法。预测可能会抛出错误，因此我们需要使用 `try` 来调用它。理想情况下，你可以将其包装在
