  \ Transformer。在本章中，我们将学习如何使用最佳文本生成模型之一（GPT-2），并基于该模型构建一个 iOS 应用。我们的应用将利用内置的 OCR\
  \ 功能从摄像头捕获文本，并根据扫描到的句子生成文本。\n\n\n\n## GPT-2\n\n`GPT-2` 是 `OpenAI`（一家位于旧金山的人工智能研究与部署公司）发布的\
