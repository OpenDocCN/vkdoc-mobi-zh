  我们之前使用`Create ML`框架训练了文本分类模型。现在，我们将使用`Create ML`应用（v1.0）来训练相同的模型。`Create ML`为不同类型的数据（图像、文本、声音）提供了多个项目模板。对于本项目，请选择文本分类器，如图
