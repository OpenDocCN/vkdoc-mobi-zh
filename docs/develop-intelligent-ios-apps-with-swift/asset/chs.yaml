  GRU, TimeDistributed, Activation, Flatten, Embedding\nfrom keras.optimizers import\
  \ Adam\nfrom keras.datasets import imdb\n```\n\n**代码清单 7-2** 导入库\n\n在这里，我们导入了 NumPy\
  \ 以使用其数组功能，同时还导入了文本分词器和 Keras 库中的特定层。最后，我们从 Keras 数据集中导入了 IMDB 数据集。`Keras.datasets`（[`https://keras.io/api/datasets/`](https://keras.io/api/datasets/)）模块提供了一些小型数据集（已向量化，采用\
  \ NumPy 格式），因此你无需自行处理数据下载、解压和预处理。\n\n我们将使用 IMDB 电影评论情感分类数据集来训练一个分类模型。根据 Keras 文档，该数据集包含来自\
  \ IMDB 的 25,000 条电影评论，并标注了情感（正面/负面）。\n\n评论已经过预处理，每条评论被编码为一个词索引（整数）列表，如图 7-2 所示。为方便起见，单词按在数据集中出现的总频率进行索引，例如整数“3”表示数据集中第三高频的词。这使得快速过滤操作成为可能，例如“仅考虑最常见的\
  \ 10,000 个词，但排除最常用的 20 个词”。\n\n我们将从该数据集中选取最常见的 10,000 个词，并基于这些数据训练模型。代码清单 7-3 展示了如何从\
  \ Keras 数据集中加载这些数据。将代码复制到新单元并运行。\n\n![../images/501003_1_En_7_Chapter/501003_1_En_7_Fig4_HTML.jpg](img/501003_1_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4** 模型概要\n\n```\n# 选取 imdb 数据集中最常见的 10000 个词\nmaxNumberOfWords = 10000\n\
  ## 解决 imdb.load_data 在该版本中无法直接加载的问题：https://\nstackoverflow.com/a/56243777/4156490\n\
  ## 错误提示为：'ValueError: Object arrays cannot be\nloaded when allow_pickle=False'\n\
  # 保存 np.load\nnp_load_old = np.load\n# 修改 np.load 的默认参数\nnp.load = lambda *a,**k:\
  \ np_load_old(*a,\nallow_pickle=True)\n# 以隐式设置 allow_pickle=True 的方式调用 load_data\n\
  (x_train, y_train), (x_test, y_test) =\nimdb.load_data(num_words=maxNumberOfWords)\n\
  # 恢复 np.load 以供后续正常使用\nnp.load = np_load_old\n```\n\n**代码清单 7-3** 加载 IMDB 数据集\n\n\
  \n\n#### 基于 RNN 的 IMDB 评论情感分析\n\n##### 加载数据集\n\n通常，`imdb.load_data` 函数足以加载数据集，但对于本版本的\
  \ TensorFlow，我们需要实现一种变通方案。方案实现后，我们加载数据并将其分为训练集和测试集。默认分割比例为 0.5，因此我们将数据集对半分成训练集和测试集。测试集不会用于训练，它将用于测试，以检验我们训练好的模型在未见过的数据上表现如何。以\
  \ `x` 开头的参数表示 IMDB 评论，`y` 表示该评论的情感。\n\n##### 检查单词分布\n\n现在我们已经加载了数据，接下来将检查单词数量的分布。我们将创建一个包含每条评论单词数量的\
  \ Pandas 数据框，并绘制图表。复制粘贴清单 7-4 中的代码并运行，即可创建如图 7-3 所示的图表。\n\n```python\nimport matplotlib.pyplot\
  \ as plt\nimport pandas as pd\ntext_word_count = []\n##### 填充单词计数的列表\nfor i in x_train:\n\
  \    text_word_count.append(len(i))\nlength_df = pd.DataFrame({'text':text_word_count})\n\
  length_df.hist(bins = 30)\nplt.show()\n```\n\n从图表中我们看到，大多数评论的单词数量少于 500 个。我们需要尽可能将单词表示为少量\
  \ token，以缩短训练时间。在本教程中，我选择 300。我们将用 300 个 token 来表示评论，并训练一个以 300 个 token 作为输入的神经网络模型。\n\
  \n##### 序列填充\n\n由于我们的模型接受固定大小的输入，因此需要将序列填充到固定长度。对于少于 300 个单词的电影评论，我们将用零填充其余部分，如清单\
  \ 7-5 所示。\n\n```python\nmaxlen = 300\nx_train = pad_sequences(x_train, maxlen=maxlen,\
  \ padding='post')\nx_test = pad_sequences(x_test, maxlen=maxlen, padding='post')\n\
  ```\n\n在上述代码中，我们指定将序列填充到长度 300，并且在序列之后填充零。该方法的默认行为是在序列之前填充零，因此我们通过 `padding` 参数显式指定。\n\
  \n##### 创建 Keras 模型\n\n我们已经准备好了输入数据。现在可以创建 Keras 模型了。对于模型结构，我参考了 Jacopo Mangiavacchi\
  \ 实现的基础代码。这里，我们将创建一个基于简单循环神经网络（RNN）的文本分类模型。\n\nRNN 模型在反向传播过程中存在梯度消失问题。在每次迭代中，神经网络权重被更新；对于较早的层，梯度更新幅度很小，从而停止学习。长短期记忆网络（LSTM）和门控循环单元（GRU）旨在解决这个问题。\n\
  \n我们将使用门控循环单元（GRU）。这是一种 RNN 架构，它使用门控机制来控制神经网络中细胞之间的信息流。这些门是两个向量，用于决定哪些信息应该传递到输出。\n\
  \n```python\nmodel = Sequential([\n    Embedding(maxNumberOfWords, 128, input_length=maxlen),\n\
  \    GRU(128, batch_size=1, return_sequences=True),\n    TimeDistributed(Dense(64)),\n\
  \    Activation('relu'),\n    TimeDistributed(Dense(32)),\n    Activation('relu'),\n\
  \    Flatten(),\n    Dense(1, activation=\"sigmoid\")\n])\nmodel.summary()\n```\n\
  \n如清单 7-6 所示，我们使用 `Sequential` 类来堆叠模型层。嵌入层接收来自 IMDB 数据集的整数表示的单词，并将它们转换为固定大小的密集向量。我们将嵌入层的输入维度设置为最大单词数（词汇量），密集嵌入维度设置为\
  \ 128。其输入长度设置为 `maxlen`，本次训练中为 300。这意味着输入序列长度将为 300。\n\n在嵌入层之后，我们放置一个具有 128 个单元的\
  \ GRU 层，这将其输出大小设置为 128。`return_sequences` 参数如果设置为 `true`，则返回最后一个输出；如果设置为 `false`，则返回完整序列。\n\
  \n`TimeDistributed` 层允许将某一层应用于输入的每个时间片。我们使用 `relu` 作为激活函数，并在层末尾添加一个具有 `sigmoid`\
  \ 激活函数的单单元密集层。输出将介于 0 和 1 之间。最后，我们打印模型的摘要。在 Jupyter Notebook 中不需要添加 `print` 语句；它会默认打印输出。\n\
  \n打印模型摘要有助于检查模型的输入、输出、参数和数据流。图 7-4 显示了模型的摘要。\n\n##### 编译并训练模型\n\n我们的模型已经准备好了。我们可以编译并训练模型。编译操作用损失函数和评估指标配置模型，使其准备好进行训练。复制粘贴清单\
  \ 7-7 中的代码来编译并训练你的模型。\n\n```python\nmodel.compile(loss='binary_crossentropy', optimizer='adam',\
  \ metrics=['accuracy'])\nmodel.fit(x_train, y_train, epochs=50, validation_split=0.2)\n\
  ```\n\n在 `compile` 方法中，我们将损失函数设置为 `binary_crossentropy`，因为我们只有两个类别（正面/负面）。我们使用 Adam\
  \ 优化器，并将准确率作为评估指标。评估指标是用于评估模型性能的函数。\n\n我们使用 `fit` 方法来训练模型。在这里提供验证数据是可选的，但如果你设置了，就可以跟踪训练过程中的验证指标。\n\
  \n通常，我们会使用 `x_test` 和 `y_test` 进行验证；但为了使训练时间更短，我将 `validation_split` 设置为 `0.2`，从训练数据中分离出\
  \ 20% 用于验证。模型不会用验证数据进行训练；它仅用于在每个 epoch 结束时评估模型。在模型训练过程中，我们可以像图 7-5 所示那样跟踪训练结果。\n\
  \n![../images/501003_1_En_7_Chapter/501003_1_En_7_Fig5_HTML.jpg](img/501003_1_En_7_Fig5_HTML.jpg)\n\
  \n经过 50 个 epoch 的训练后，我们的训练准确率 (acc) 达到了 1.0，验证准确率 (val_acc) 达到了 0.8816。这意味着模型正确预测了\
  \ 88% 的验证数据（它之前未见过的数据）。\n\n##### 导出模型\n\n训练完成后，我们的模型就可以使用了。我们将把它转换为 Core ML 格式，并使用清单\
  \ 7-8 中的代码导出模型。\n\n```python\nimport coremltools\ncoreml_model = coremltools.converters.keras.convert(model,\
  \ input_names=\"input\", output_names=\"output\")\ncoreml_model.save('imdbGRU.mlmodel')\n\
  ```\n\n此代码将 mlmodel 保存到 Colab 环境中。点击左侧的文件夹图标查看并下载该文件。\n\n\n\n### 测试 Core ML 模型\n\
  \n为了确保转换过程顺利，我们需要验证转换后的模型能否预测出与 Keras 模型相同的数值。由于 Core ML 模型仅在 macOS 上运行，我们无法在 Colab\
  \ 环境中对其进行测试。使用 Core ML 模型进行预测有两种方式：通过 Xcode 运行，或者在 macOS 上使用 Python 环境和 `coremltools`\
  \ 来运行。我将向你展示这两种方法。\n\n首先，我们需要一个参考值来测试模型。为此，我将使用 Keras 模型来预测一段任意文本的情感倾向。然后我会将这个值与\
  \ Core ML 的预测结果进行比较，并期望它们保持一致。如果结果不一致，则表明模型没有正确转换。\n\n让我们用一些任意文本数据进行尝试。首先，我们需要获取\
  \ IMDB 数据集中单词的整数表示。清单 7-9 中的代码会以 JSON 格式下载这些数据，并将其加载到一个字典中。\n\n```\nwordDictionary\
  \ = imdb.get_word_index(\npath='imdb_word_index.json'\n)\n清单 7-9\n加载单词的整数表示\n```\n\
  \n包含单词及其整数表示的字典如图 7-6 所示。\n\n![../images/501003_1_En_7_Chapter/501003_1_En_7_Fig6_HTML.jpg](img/501003_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n\n词嵌入\n\n清单 7-10 中的代码用于预测这段任意文本“super cool”的情感倾向。我们从字典中找到其整数表示，然后用零填充至长度\
  \ 300，因为我们的模型就是按照这种方式训练的。\n\n```\npaddedText = pad_sequences(\nnp.array([[wordDictionary[\"\
  super\"],wordDictionary[\"cool\"]]]), maxlen=300,padding='post'\n)\nmodel.predict(paddedText)\n\
  清单 7-10\nKeras 模型预测\n```\n\n运行上述代码会得到结果 `[[0.6204907]]`。接下来，让我们检查转换后的 Core ML 模型对于相同的文本输入是否也会产生相同的输出。\n\
