- '# 3. 文本分类


  文本分类是一种自然语言处理方法，它能让我们将文本归类到预定义的类别中。这是一种非常流行的技术，拥有多种多样的应用场景。一个著名的用途是将文本分类为情感类别（正面、负面等），这被称为情感分析。这种方法可以应用于任何已被分类的文本数据。文本分类让我们能够找出一段文字的作者，对
  GitHub 问题进行分类，发现 App Store 评论中的投诉，或检测文本的语言。在本章中，我们将学习如何使用 `Create ML` 和 `Turi Create`
  来创建文本分类应用程序。我们将通过制作示例应用程序来学习。我们将首先使用 `Create ML`，然后使用 `Turi Create`，开发一个垃圾短信分类器应用。


  ## 使用 Create ML 框架进行垃圾短信分类


  苹果在 iOS 上以多种方式使用了自然语言处理技术。得益于自然语言处理（NLP），iOS 可以自动修正拼写错误，Siri 也能理解我们说的话。在 WWDC 2018
  上，苹果通过一个名为 `Create ML` 的工具将这些能力带给了开发者。这个工具使开发者能够轻松地创建文本分类模型（以及其他多种类型的模型）。`Create
  ML` 从 macOS 10.14 起在 Swift Playgrounds 中可用。


  要使用 `Create ML` 创建分类模型，我们唯一需要的就是带标签的文本数据。这为开发者打开了许多扇门。我们可以检测文章的作者，找出公司评价最好和最差的产品，甚至在给定的文本中检测各种实体（人名、地名、组织名等）。这仅仅受限于你的想象力和数据收集技巧。换句话说，一切皆有可能。


  在本节中，我们将深入研究这些框架，在 `Create ML` 中训练一个机器学习模型，并开发一个垃圾短信分类器应用，如图 3-1 所示。


