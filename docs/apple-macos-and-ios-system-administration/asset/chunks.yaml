- fmt: "### Manual Install or Using an Install Script\n\nThe last option is to manually\
    \ create and download Enrollment Profiles and then interactively install them\
    \ on your devices. For Macs, this can be done with a script using `Apple Remote\
    \ Desktop`, and for iOS devices, you can host them on an internal web site or\
    \ email them to end users. The main drawback to using this method is that it is\
    \ the least automated, and in the case of macOS clients, using a script will result\
    \ in additional interactivity to enable User Approved MDM.\n\n## Adding Devices\
    \ Using Enrollment Profiles\n\n1.  The first thing we need to do is create our\
    \ Enrollment Profile. Open `Profile Manager` and click the `+` button ➤ **New\
    \ Enrollment Profile**. Name the Enrollment Profile, and for now we will **uncheck\
    \ the Placeholder requirement**, as shown in Figure [9-26](#492151_1_En_9_Chapter.xhtml#Fig26),\
    \ so that any device we install this on gets added to our MDM.\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig26_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig26_HTML.jpg)\n\
    \n    Figure 9-26\n    Creating a new Enrollment Profile\n\n2.  Click the `Save`\
    \ button and then click the `Download` button to download the *Enrollment Profile*.\
    \ It will download a new `*.mobileconfig` profile to your Mac. If it attempts\
    \ to install it, cancel and then move it out of the Downloads folder and onto\
    \ the Desktop.\n\n3.  Next, we need to download a copy of the *Trust Profile*.\
    \ Click the `Logged In User` button in the top-right corner of the `Profile Manager`\
    \ window and choose `Download Trust Profile` as shown in Figure [9-27](#492151_1_En_9_Chapter.xhtml#Fig27).\
    \ Again if it attempts to install it, cancel and then drag the Trust Profile out\
    \ of the Downloads folder and into the Desktop.\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig27_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig27_HTML.jpg)\n\
    \n    Figure 9-27\n    Download the Trust Profile. to your Desktop\n\n4.  You\
    \ should now have two `*.mobileconfig` files on your desktop. One is the Trust\
    \ Profile so that devices we are adding will trust our MDM server, and the other\
    \ is the Enrollment Profile that points our devices to our MDM server. This is\
    \ essentially the same two files that get installed during self-service enrollment.\n\
    \n5.  For this next step, you should have a test Mac that has been added to `Apple\
    \ Remote Desktop`. We are going to write a script to install these two Profiles\
    \ on that remote Mac. Go ahead and copy the two `*.mobileconfig` files to `/tmp`\
    \ on the remote computer using the `Copy` command as shown in Figure [9-28](#492151_1_En_9_Chapter.xhtml#Fig28).\n\
    \n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig28_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig28_HTML.jpg)\n\
    \n    Figure 9-28\n    The Copy File dialog box in Apple Remote Desktop\n\n6.\
    \  Next, we can go ahead and choose to send a Unix command to the test Mac to\
    \ install these Profiles. We are going to use the `profiles` command that is found\
    \ in `/usr/bin/`. In the Unix window in ARD, enter the following command, specifying\
    \ the name of the two `*.mobileconfig` files if they are named differently than\
    \ mine:\n\n    ```\n    /usr/bin/profiles -I -F /tmp/Trust_Profile_for_MyCompany.mobileconfig\n\
    \    /usr/bin/profiles -I -F /tmp/New_Enrollment_Profile.mobileconfig\n    ```\n\
    \n    The `-I` stands for install and the `-F` stands for file then followed by\
    \ the path to the file to be installed. Your **ARD Send Unix Command** window\
    \ should look like Figure [9-29](#492151_1_En_9_Chapter.xhtml#Fig29).\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig29_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig29_HTML.jpg)\n\
    \n    Figure 9-29\n    The Send Unix Command window in Apple Remote Desktop\n\n\
    7.  Next, let's log in to the test Mac and see if the Profiles installed. If the\
    \ script ran correctly, you should see a new `Profiles System Preference`. Click\
    \ the `Profiles System Preference,` and you should see two **Device Profiles**\
    \ as shown in Figure [9-30](#492151_1_En_9_Chapter.xhtml#Fig30).\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig30_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig30_HTML.jpg)\n\
    \n    Figure 9-30\n    The newly installed Device Profiles\n\n8.  Send the command\
    \ to the test Mac. We can save this as a template if we want to run it again in\
    \ the future.\n\n9.  Go back to `Profile Manager` and look at the list of devices.\
    \ You should have a new Mac listed in your Devices list like I do in Figure [9-31](#492151_1_En_9_Chapter.xhtml#Fig31).\
    \ This represents the Mac we just added using a script from `Apple Remote Desktop`.\n\
    \n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig31_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig31_HTML.jpg)\n\
    \n    Figure 9-31\n    Our test Mac has been added to Profile Manager\n\n10. Now\
    \ go back to the test Mac and browse back to the `Profiles System Preference`.\
    \ Click the `Remote Management Profile`. Do you see how there is an alert that\
    \ *states \"Functionality may be limited until this profile is approved.\"* This\
    \ is referring to User Approved MDM (UAMDM). We discussed UAMDM briefly in Chapter\
    \ [8](#492151_1_En_8_Chapter.xhtml). So, while this Mac is now listed in `Profile\
    \ Manager`, there are some limitations to the types of payloads we can use until\
    \ we convert this Mac to User Approved status.\n\n11. There is only one way to\
    \ convert this device to User Approved MDM, and that is clicking the `Approve…`\
    \ button interactively directly on the device. There are no scripts that you can\
    \ use to convert; you can try to Screen Share or use ARD’s remote control option\
    \ to click the `Approve…` button, but Apple has it blocked. You will need to sit\
    \ down at that specific machine and click the `Approve…` button. Click the `Approve…`\
    \ button and confirm like I did in Figure [9-32](#492151_1_En_9_Chapter.xhtml#Fig32).\n\
    \n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig32_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig32_HTML.jpg)\n\
    \n    Figure 9-32\n    Click the Approve button to enable User Approved MDM\n\n\
    We have now configured MDM manually using a script on a test macOS client.\n\n\
    ### Pro Tip\n\nThe only way to successfully enroll a `macOS` device into MDM and\
    \ have it automatically configured as User Approved is through the DEP enrollment\
    \ method. If you use DEP to push your Enrollment Profile during the Setup Assistant,\
    \ the device will be User Approved without any additional interaction required.\n\
    \n## iOS Management with Profile Manager\n\nNow that we have had some experience\
    \ with the various ways to enroll and remove enrollment from both `macOS` and\
    \ `iOS` clients, let's explore some of the management capabilities available to\
    \ us in the Profile Manager console. In this section, we will focus on iOS capabilities\
    \ and payloads. If you haven't yet, go ahead and use your favorite method to enroll\
    \ a test iOS device into `Profile Manager` and make sure it is supervised."
