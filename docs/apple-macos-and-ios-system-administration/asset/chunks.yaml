    ### Modifying Unix Octal File Permissions


    We have successfully configured the Apache web server service and started it,
    but we still have some work to do before our server is ready to use with *Munki*.
    The next thing we need to do is create a special folder on the web server that
    Munki clients need to access.


    We need to create this directory via the **Terminal** and set file permissions
    using the *Unix octal notation system* . Let’s go back to the Terminal and use
    `cd /Library/WebServer/Documents/` to change to the root directory of our web
    server. Use the `ls` command but also use the `-l` option to view the directory
    in *long listing* format. Your Terminal window should look like Figure [10-6](#492151_1_En_10_Chapter.xhtml#Fig6).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig6_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    The output from the long listing command


    You should see three lines, one for each file in this directory. The first column
    indicates the octal file permissions for each file, which are called *octets*.
    The second column indicates the number of hard links, while the third column is
    the owner of the file and the fourth column is the group. The fifth column is
    the file size, the sixth is the last modified date/time, and the final column
    is the filename itself.


    As you can see, ***root*** is the owner of these files, and ***wheel*** is the
    group. These will align with the permissions we can view in the *macOS* GUI’s
    **Get Info** dialog box that we used in Chapter [3](#492151_1_En_3_Chapter.xhtml).
    We are going to create a new directory here. *Munki* requires a folder called
    ***munki_repo*** which is the repository of all of the Munki XML files and install
    media that our clients will access during the software installation. Let’s use
    the `mkdir` command to create this directory. Enter `mkdir munki_repo` and press
    **enter**. Now do another `ls -l` command to see that our new folder has been
    created and the permissions that are set by default. Your Terminal window should
    look similar to Figure [10-7](#492151_1_En_10_Chapter.xhtml#Fig7).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig7_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    The long listing output with our new directory included


    Let’s take a look at our new directory’s octets for a moment. By default, we see
    `drwxr-xr-x` , so what does that mean as it relates to permissions? Great question!
    This alphabet soup indicates the *read, write, and execute* privileges for the
    *owner* (in this case root), the *group* (in this case wheel), and the *Everyone*
    group. As we learned in Chapter [3](#492151_1_En_3_Chapter.xhtml), the Everyone
    group really means *everyone else*. Figure [10-8](#492151_1_En_10_Chapter.xhtml#Fig8)
    is a good visual representation of the breakdown between directory, owner, group,
    and everyone permissions.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig8_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Understanding the octets of a directory’s file permissions


    The **d** identifies that this is a directory and not a file. That is why there
    is a leading `d` on our ***munki_repo*** folder but not on the other three files
    in this directory. The next three characters indicate the owner’s permissions.
    It looks like root has read, write, and execute permissions on this folder. The
    next three show that members of the wheel group have read and execute permissions,
    and the Everyone group has execute only. Figure [10-9](#492151_1_En_10_Chapter.xhtml#Fig9)
    provides a chart for the permissions and the directory listing that you can use
    as a reference to determine what each of these character sets represents.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig9_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Octal file permissions quick reference


    We need our ***munki_repo*** directory to be read/write accessible to our Mac
    clients for *Munki* to function properly, so we will need to change the file permissions
    to this folder. To do this, we will be using the `chmod` command. If you spent
    some time reviewing the man pages for `chmod` and `chown` earlier in the book,
    you are probably aware that we can change a file’s owner and permissions with
    these commands. Using the `chmod` command and referencing the table in Figure
    [10-9](#492151_1_En_10_Chapter.xhtml#Fig9), we can assign one of eight possible
    values to owner, group, and everyone that represent their permissions to this
    folder. As you can see, if we use the value of 7, it will grant read, write, and
    execute permissions; and this is what we want for the owner, group, and everyone
    for our ***munki_repo*** folder.


    Go ahead and enter `chmod -R 777 munki_repo/` at the prompt and press **enter**.
    What we are doing with this command is modifying the ***munki_repo*** directory’s
    permissions to allow root, wheel, and everyone read, write, and execute permissions.
    Let’s use `ls -l` again and make sure that the changes we made took effect. Your
    Terminal window should look like Figure [10-10](#492151_1_En_10_Chapter.xhtml#Fig10).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig10_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Modifying the file permissions for the munki_repo folder


    Next, let’s make sure we can get to the ***munki_repo*** folder from our web server.
    Open a browser window and enter `http://localhost/munki_repo`, and you should
    see an index of the empty directory as shown in Figure [10-11](#492151_1_En_10_Chapter.xhtml#Fig11).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig11_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    The listing via http of our munki_repo folder


    Go ahead and close out of the browser and exit from the Terminal app.'
