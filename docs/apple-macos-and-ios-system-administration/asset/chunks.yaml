    ## Summary


    In this chapter, we discussed the need for a dedicated Mac server, the server-class
    solutions built right into the core *macOS* client operating system, and the advanced
    services provided by installing the *macOS Server* application. While every organization
    is going to have different needs, it is clear that Apple has promoted the use
    of existing industry standard directory and file sharing and print sharing technologies
    over proprietary Mac-only solutions whenever possible.


    As you can see, *macOS Server* has primarily become a tool for enabling Mobile
    Device Management through the Profile Manager tool. The case can be made that
    unless you want to use Profile Manager, you may not need a Mac server at all.
    If you do need Profile Manager, it could be the only service you need to run on
    your server, and it is not dependent on Open Directory or any other service.


    In the next chapter, we will explore MDM concepts including *User Approved MDM*,
    *Device Enrollment Program*, and *Volume Purchase Program*. These solutions form
    the foundation for developing a next-generation deployment and support model for
    Apple-branded devices.


    # 8. Mobile Device Management


    The concept of Mobile Device Management (MDM) has been around for nearly two decades,
    but it has become increasingly more popular in recent years due to the “bring
    your own device” model and the capability to now manage traditional desktop computers
    like Macs or Windows PCs. MDM solutions work through the Application Programming
    Interfaces (APIs) that the operating system vendor makes available as a means
    to configure, control, secure, and manage a device *over the air*. In this chapter,
    we are going to explore the various services and APIs that Apple makes available
    to MDM vendors that form the foundation for managing modern *iOS* and *macOS*
    endpoints.


    ## An Apple MDM Primer


    There are typically a handful of things that all Mobile Device Management solutions
    provide. Inventory management and reporting is one; remote (over-the-air) security,
    configuration, and management is another; and remote software deployment is the
    third. There are three main components that provide these capabilities on Apple
    products. Inventory management is handled through the Device Enrollment Program
    (DEP), security and configuration is handled through Configuration Profile payloads,
    and software deployment is enabled through the Volume Purchase Program (VPP).
    We will cover each of these areas throughout this chapter.


    There are many third-party MDM solutions on the market today. All of the big players
    integrate with VPP and DEP and provide remote management using Configuration Profiles.
    You may have heard of *JAMF*, *Cisco Meraki*, or *Addigy*. These are some of the
    most popular MDM solutions, and each of them has unique features that differentiate
    them from the competition. Through *macOS Server*, Apple also offers a first-party
    MDM solution with Profile Manager. Since all of these various management solutions
    use the same APIs, we will use Profile Manager in this book to demonstrate the
    concepts of MDM, DEP, and VPP which will translate to any MDM solution you may
    choose to use in your organization.


    Pro Tip


    Since we will be discussing a number of Apple-hosted services throughout this
    chapter, this is a good time to introduce you to Apple’s **System Status** page.
    You can browse to this page at [`www.apple.com/support/systemstatus`](http://www.apple.com/support/systemstatus).
    Here you will see all of the various Apple-hosted services and if they are available
    or if they are having issues. Sometimes an issue with activation, DEP, VPP, or
    other services can be the result of a service outage on Apple’s side. This is
    a good page to consult when troubleshooting various issues.'
