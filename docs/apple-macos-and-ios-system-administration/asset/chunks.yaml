    with a small number of Macs, it might be the only tool you need. Speaking of Mac
    servers, in the next chapter, we are going to dive into `macOS Server` and why
    you might want one (or might not even need one).


    # 7. macOS Server


    The concept of a Mac server has changed quite extensively since the very first
    version of the software hit the scenes in the late 1990s. In this chapter, we
    are going to explore the server capabilities that Apple has built into the `macOS`
    client operating system, the services that are added when installing the `macOS
    Server` application, how to determine if you need a dedicated Mac server, and
    how to configure and manage the server if you do.


    ## A Brief History of macOS Server


    The original Mac OS Server was code-named “Rhapsody,” and it was initially designed
    to be the first release of the next-generation Mac operating system that began
    development after Apple’s purchase of NeXT in 1996. `Mac OS X` is the client operating
    system that was eventually released in the early 2000s, and along with it, Apple
    began selling an `OS X Server` as an application that ran on top of the client
    OS to provide it with server-class capabilities. Over the years, the features
    of the `Server` application have been scaled back or migrated into the base feature
    set of `macOS`. Today, there only a handful of services that still remain exclusive
    to `macOS Server`.


    ### Services


    When it first debuted, `OS X Server` provided a number of useful features for
    managing your Mac clients. Apple included its own Lightweight Directory Access
    Protocol (LDAP) called `Open Directory (OD)` which was built to manage users and
    groups similar to Microsoft’s (more popular) `Active Directory (AD)`. In addition
    to LDAP, it also included file sharing, printer sharing, and a web server based
    on `Apache`. As a popular solution for Mac system admins, OS X Server also included
    `NetBoot` and `Workgroup Manager` for managing fleets of Macs.


    In addition to various management tools, `OS X Server` also provided `CalDAV`,
    instant messaging, a mail server, and a number of other productivity-related services.
    However, as more of these kinds of solutions began migrating to various cloud-hosted
    models, Apple moved most of them to iCloud or decided to sunset the service altogether.


    As Apple started to move to more of a mobile-first administration principle with
    iOS devices, and then eventually Macs, they began to transform `macOS Server`
    into a tool for Mobile Device Management. Many of the core “server” services were
    moved into the base install of `macOS`. Today, `macOS Server` retains the `Open
    Directory` LDAP service, and `Workgroup Manager` has been dumped in favor of `Profile
    Manager`, which allows you to create and deploy Configuration Profiles to `iOS`
    and `macOS` clients.'
