  trans: '

    ### 网络设置


    我们首先要做的是为服务器配置名称和静态 IP 地址。使用`共享系统偏好设置`来命名您的服务器。我将我的服务器命名为`MacServer`。如果您有多台现有服务器，可能会有标准化的服务器命名规则可以使用。此配置假设您只是在内部局域网中共享一些数据。


    **专业提示**


    请仔细检查本地主机名和 Unix 主机名，确保它们一致。如图 7-2 所示，我已经将我的三个服务器名称配置为相匹配。


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig2_HTML.jpg](img/492151_1_En_7_Fig2_HTML.jpg)


    **图 7-2** 使用终端验证主机名


    接下来，我们需要为服务器分配静态 IP 地址，以便在使用文件共享等服务时保持地址不变。打开`网络系统偏好设置`，点击活动网络连接（`Wi-Fi`或`以太网`），点击`高级`按钮，然后选择`TCP/IP`选项卡。我们需要设置一个不会与网络中其他计算机冲突的静态
    IP 地址。您需要咨询网络管理员，或查看您的 DHCP 或路由器设置，以确定此步骤正确的 IP 地址、子网掩码和网关/路由器。图 7-3 展示了我完整的 IP
    地址设置。


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig3_HTML.jpg](img/492151_1_En_7_Fig3_HTML.jpg)


    **图 7-3** 为我们的服务器设置静态 IP 地址


    **专业提示**


    我已经在我的路由器上保留了`192.168.1.2`到`192.168.1.9`这个范围用于静态 IP 地址。我将使用`192.168.1.9`作为`MacServer`的静态
    IP 地址。


    除了配置静态 IP 地址，我们还需要点击`DNS`选项卡并输入 DNS 服务器信息。在我的网络中，路由器同时也是 DNS 服务器，所以我输入`192.168.1.1`作为
    DNS 服务器。您可能也需要咨询网络管理员以确定 DNS 服务器的 IP 地址。图 7-4 展示了我网络的静态 DNS 服务器条目。


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig4_HTML.jpg](img/492151_1_En_7_Fig4_HTML.jpg)


    **图 7-4** 添加静态 DNS 服务器


    **专业提示**


    如果您不确定 DNS 设置，也可以暂时将 Mac 切换回 DHCP，查看 DNS 选项卡中自动填充的信息，然后在改回手动地址选项后，将这些信息复制到静态 DNS
    条目中。


    设置好 DNS 和静态 IP 地址信息后，打开 Safari 并访问一个网站，如`www.apple.com`，确保能够解析。您应该看到类似图 7-5 的画面，能够成功浏览网页。我建议您使用`网络实用工具`来
    ping 各种内部 IP 地址，并尝试从另一台计算机 ping 您的服务器，以确保局域网上的所有通信都正常。


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig5_HTML.jpg](img/492151_1_En_7_Fig5_HTML.jpg)


    **图 7-5** 浏览网页以确保网络设置正确


    **专业提示**


    如果您的 Mac 将加入一个更大的网络，例如基于`Windows`的网络，请确保您的 Windows 系统管理员或网络管理员为您的`主机名`创建 DNS 条目，并为
    IP 地址创建`反向 DNS`条目。您的客户端应该能够使用`nslookup`或`网络实用工具`中的`Lookup`选项，通过 IP 返回主机名，并通过主机名返回
    IP。


    ### 配置远程访问


    如前所述，我通常运行服务器时不会连接显示器、键盘或鼠标。当需要与服务器交互时，我会使用`屏幕共享`或从我的主工作站进行远程控制。您可以使用 VNC 客户端或另一台
    Mac 通过`访达`远程控制服务器，也可以使用 Apple Remote Desktop (`ARD`)。图 7-6 展示了两种不同的配置选项，取决于您是否计划使用
    ARD。在`共享系统偏好设置`中，启用`屏幕共享`选项或`远程管理`选项。


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig6_HTML.jpg](img/492151_1_En_7_Fig6_HTML.jpg)


    **图 7-6** 在您的 Mac 服务器上启用屏幕共享


    **专业提示**


    另一个对远程管理有用的服务是`Secure Socket Shell (SSH)`。它在`共享系统偏好设置`中的友好名称是`远程登录`。启用 SSH 有助于通过命令行界面与
    Mac 服务器通信。


    我计划使用 Apple Remote Desktop，因此我将配置该服务；然后，使用我主 Mac 上的 ARD 应用程序，按照我们在第 6 章中遵循的相同步骤，将`MacServer`计算机添加到我的`服务器计算机列表`中。如果您使用
    ARD，在将 MacServer 添加到控制台后，会看到类似图 7-7 的画面。


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig7_HTML.jpg](img/492151_1_En_7_Fig7_HTML.jpg)


    **图 7-7** 将我的服务器添加到 Mac 工作站上的 ARD 控制台


    **专业提示**


    根据网络的大小和设计，您的网络管理员可能已将网络划分为多个较小的子网。在某些情况下，出于安全原因，服务器会被放置在与客户端系统分离的子网中。如果您的网络属于这种情况，当您使用
    ARD 扫描程序搜索服务器时，可能无法找到它。您可能需要使用`按地址添加`选项手动添加计算机。

    '
- fmt: '### Server Security Considerations


    When it comes to configuring a server, you really want to try to disable any services
    that are not going to be used. In this way, you are limiting the number of possible
    vulnerabilities that could exist and therefore be exploited. This is not an exhaustive
    list of things you must lock down to secure your server, but it gives you a starting
    point. Nothing is 100% safe from hackers or other security threats.


    Here are some recommended changes to consider when you deploy a Mac server:


    *   **Disable the Guest User:** Open the `Users & Groups System Preference` and
    click the `Guest User` from the list of users in the left-side pane. Make sure
    `Allow guests to log in to this computer` and `Allow guest users to connect to
    shared folders` are both unchecked.

    *   **Disable Power Controls on the Login Screen:** While in the `Users & Groups
    System Preference`, click the `Login Options` button. Uncheck the box next to
    `Show the Sleep, Restart, and Shut Down buttons`.

    *   **Disable Automatic Login:** While in the `Login Options`, make sure that
    `Automatic login` is set to `Off`.

    *   **Disable the List of Users:** While in the `Login Options`, choose to display
    login window as `Name and password`.

    *   **Enable Software Update for Security Patches Only:** Open the `Software Update
    System Preference` and click the `Advanced…` button. It is up to you if you want
    to automatically install all updates or not, but at bare minimum, make sure that
    the `Install system data files and security updates` box is checked. That way
    it will automatically patch your Mac server with important security updates.

    *   **Enable a Screen Saver Password:** Open the `Security & Privacy System Preference`.
    Click the `General` tab and check the box next to `Require password after sleep
    or screen saver begins`. Set the drop-down to `immediately`.

    *   **Enable FileVault:** Click the `FileVault` tab and enable `FileVault` encryption.

    *   **Enable the Firewall:** Click the `Firewall` tab. Turn on the Firewall and
    then use the Firewall options as detailed in Chapter [3](#492151_1_En_3_Chapter.xhtml)
    of this book to configure the level of security you want and any application exceptions.

    *   **Disable Location Services:** Click the `Privacy` tab and then click `Location
    Services` on the left-side pane. Uncheck the box next to `Enable Location Services`.

    *   **Disable Analytics:** While you are still on the `Privacy` tab, click the
    `Analytics` button on the left-side pane. Uncheck `Share Mac Analytics` and uncheck
    `Share with App Developers`.

    *   **Disable Bluetooth:** Open the `Bluetooth System Preference`. Click the `Turn
    Bluetooth Off` button to disable it.

    *   **Turn Off Wi-Fi:** Assuming you are using Ethernet to connect your server
    to the network, we should turn off the Wi-Fi radio. Open the `Network System Preference`
    and click the `Wi-Fi` button on the left-side pane. Click the `Turn Wi-Fi Off`
    button to disable it.

    *   **Log Out of iCloud:** If you signed into iCloud during the Setup Assistant
    process, go to the `iCloud System Preference` and sign out of iCloud.


    ## Configuring Basic Server Services


    Now that we have our Mac server ready to go, we can begin enabling some services.
    In this section, we are going to explore the server-class functions that are bundled
    with the core `macOS` client operating system. These are the most popular services
    found on Mac servers and include content caching, file services, print services,
    and web services.


    ### Content Caching


    One of the most popular features that was previously included in `macOS Server`
    but has been subsequently moved to the core `macOS` installation is `content caching`.
    This service runs on a device on your network and listens for clients that are
    downloading content from Apple or Apple-hosted services like the `iBooks`, `App
    Store`, `Mac App Store`, and so on. Then as that first client downloads the content,
    the computer running the content caching service downloads a copy and retains
    it. When the second, third, or any other device on the same subnet attempts to
    download that content, it gets copied from the cache server instead of being downloaded
    again over the Internet.


    This solution has been extremely popular in businesses and schools that have multiple
    clients that share an Internet connection. I have used this with 1:1 iPad deployments
    and labs of Macs that need to download and install the same security updates or
    `macOS` releases, and it really speeds up the installation and saves on bandwidth
    utilization.


    To enable the content caching service, open the `Sharing System Preference` and
    enable the checkbox next to `Content Caching` as shown in Figure [7-8](#492151_1_En_7_Chapter.xhtml#Fig8).
    You can select which content to cache, and I usually stick to the default `All
    Content` option. If you are just wishing to use content caching with iOS devices
    connected physically via USB to Apple Configurator, click the box next to `Internet
    Connection`.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig8_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig8_HTML.jpg)


    Figure 7-8

    Enabling content caching on our server


    Because this can take a fair amount of space on your server’s hard disk, you can
    click the `Options...` button and choose how much disk space you want to devote
    to caching. Once the cache space is full, the service will make room for new content
    by deleting the oldest data first.


    ### File Sharing


    The next most common service that runs on Mac servers is file sharing. To enable
    local network file sharing, open the `Sharing System Preference` and click the
    checkbox next to `File Sharing`. By default, `macOS` shares files on the network
    using Samba. If for some reason you want to use the legacy AppleTalk protocol,
    you can click the `Options…` button and check the box next to `Share files and
    folders using AFP`. We will leave that unchecked as we do not want to use AppleTalk.


    Adding shared folders is pretty simple and straightforward. Create a folder on
    the Desktop to use as a test. Typically you would want to create your folders
    inside of an attached volume like a Thunderbolt disk drive, but for our purposes
    in this example, we’ll just use the Desktop. Name the folder "Mac Shared File."


    Back in the `Sharing System Preference` under `File Sharing`, click the `+` button
    and select the `Mac Shared File` folder. Set the permissions as shown in Figure
    [7-9](#492151_1_En_7_Chapter.xhtml#Fig9). We are using very simple permissions
    with only one user account that is able to connect to the shared folder. The Administrator
    has `Read & Write`, the group Staff has `Read Only`, and Everyone else will not
    be able to access the file share.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig9_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig9_HTML.jpg)


    Figure 7-9

    Enabling the file sharing service and configuring permissions


    This is the simplest form of file sharing because we are limiting access to the
    share based on the single user account on this particular Mac—Administrator. There
    is only one member of the Staff group, and that is the Administrator account.
    If we were to create additional users on this Mac, and if they were members of
    the Staff group, they would be able to read the contents of the file share but
    not write to it.'
