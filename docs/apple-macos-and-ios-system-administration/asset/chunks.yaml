    # 组织与监督身份


    在开始配置 iOS 设备之前，你需要在应用程序的 `偏好设置` 对话框中定义几个身份选项。要访问这些选项，请点击 `Apple Configurator 2`
    菜单，选择 `偏好设置…`，然后在偏好设置窗口中点击 `组织` 标签页。图 [5-3](https://example.com#492151_1_En_5_Chapter.xhtml#Fig3)
    展示了组织标签页。点击 `+` 按钮可以创建一个新的组织。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig3_HTML.jpg](img/492151_1_En_5_Fig3_HTML.jpg)


    图 5-3

    Apple Configurator 偏好设置窗口中的“组织”标签页


    正如 `新组织` 表单上的信息所解释的，创建一个组织能为受监督的设备提供具体的 *联系信息* 和 *监督身份*。你可能在问自己：“什么是 *受监督* 的设备？”
    正如我们在第 [4](https://example.com#492151_1_En_4_Chapter.xhtml) 章中学到的，`iOS` 并非设计为多用户操作系统，允许多个用户共享同一设备并拥有像
    `macOS` 中那样的多种独特身份和权限。尽管如此，当大型公司和学校购买 iOS 设备并分发给员工、学生或其他终端用户时，IT 部门仍然需要实施基本的信息安全控制。


    `监督设备` 是系统管理员可以锁定 `iOS` 中特定部分的一种方式，类似于拥有一个本地管理员账户并为他人提供受限环境。你将在本章后面看到，许多安全选项仅对受监督的设备可用。不受监督的设备仍然可以管理，但终端用户有能力更改配置设置、恢复或重置设备以及移除限制。


    你可能想知道何时适合 `监督` 设备，何时不适合。这在很大程度上取决于组织和设备的使用场景。我使用的一般经验法则是：如果设备归我的组织所有，我就会监督它。如果设备归终端用户所有，我仍会尝试通过
    `配置描述文件` 或 `ActiveSync` 进行管理，但不会进行监督，因此我的安全策略被认为是 *尽力而为*。你在这一主题上的做法可能因设备在你特定情况下所需的限制程度而异。


    ## 创建组织与监督身份


    请继续创建一个组织和监督身份，如图 [5-4](https://example.com#492151_1_En_5_Chapter.xhtml#Fig4)
    所示。当它提示你登录 `设备注册计划` 时，请 `跳过` 此步骤。我们将在本书后续章节介绍此服务，并且在本练习中不会使用它。输入有关你组织的信息，例如 `名称`、服务台的
    `电话号码` 和 `公共地址`。这些信息 *将会* 透露给终端用户或可能在设备丢失时找到它的人。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig4_HTML.jpg](img/492151_1_En_5_Fig4_HTML.jpg)


    图 5-4

    输入一些联系信息来定义你的组织


    点击 `下一步` 按钮继续。现在我们将创建一个新的监督身份。此身份本质上是一个 *信任证书*，你可以通过点击 `显示监督身份…` 来查看它，如图 [5-5](https://example.com#492151_1_En_5_Chapter.xhtml#Fig5)
    所示。现在我们已经创建了一个组织和监督身份，可以继续进行了。关闭偏好设置窗口，返回 Apple Configurator 主界面。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig5_HTML.jpg](img/492151_1_En_5_Fig5_HTML.jpg)


    图 5-5

    监督身份证书示例


    ### 专业提示


    你可以使用 `偏好设置` 窗口的 `组织` 标签页中 `+/-` 按钮旁边的小 `齿轮` 按钮导出你的监督身份。这将允许你与使用 Apple Configurator
    的其他 Mac 共享相同的监督身份。如果你使用多台机器来配置你的 `iPhone` 和 `iPad`，确保所有用于注册设备的 Mac 对同一组织使用相同的监督身份非常重要。

