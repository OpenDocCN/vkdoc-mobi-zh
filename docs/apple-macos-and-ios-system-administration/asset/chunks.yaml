  trans: '

    # 软件更新


    与其他操作系统类似，保持您的 `macOS` 客户端及时安装最新的安全补丁非常重要。`软件更新系统偏好设置` 让您能够控制 Mac 接收的更新内容以及更新时间。图
    2-26 显示了配置 Mac 以接收重要更新和安全补丁的基本类别和选项。除了控制 `macOS` 的更新，您还可以使用 `软件更新` 来安装任何从 `Mac
    App Store` 安装的应用程序的升级和补丁。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig26_HTML.jpg](img/492151_1_En_2_Fig26_HTML.jpg)


    图 2-26

    通过 `软件更新系统偏好设置` 控制更新下载和安装的选项


    虽然 Apple 通过 `软件更新系统偏好设置` 提供了一些控制 macOS 更新的基本选项，但通过 `终端` 还有更多微调更新的选项。正如您在图 2-27
    中看到的，`softwareupdate` 命令的 `man` 手册页提供了一些非常有趣的脚本选项。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig27_HTML.jpg](img/492151_1_En_2_Fig27_HTML.jpg)


    图 2-27

    通过 `终端` 查看的 `softwareupdate` 命令手册


    ## 通过终端配置软件更新


    让我们尝试一些有趣的事情。打开 `终端` 并运行以下命令：


    ```

    softwareupdate -l

    ```


    请注意您的 Mac 将花几分钟检查最新的更新。如果情况与我类似，它将会返回一个可用更新列表。图 2-28 显示我的系统有两个待处理的可用更新。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig28_HTML.jpg](img/492151_1_En_2_Fig28_HTML.jpg)


    图 2-28

    通过 `终端` 显示的可用更新输出


    在使用 `softwareupdate` 命令编写脚本时，我们可以使用的一个更强大的选项是能够 *排除* 我们不希望用户看到的更新。例如，我最喜欢的一个例子是，当发布新完整版
    `macOS` 时，Apple 会在 `系统偏好设置` 中显示的广告横幅。图 2-29 上方的图片就是一个示例，它提示我的用户在运行 `Mojave` 的
    Mac 上下载并安装 `macOS Catalina`。我不希望我的用户询问我安装新操作系统的事情，也不希望他们自己尝试在电脑上安装新的操作系统。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig29_HTML.jpg](img/492151_1_En_2_Fig29_HTML.jpg)


    图 2-29

    排除更新前后的 `软件更新` 窗口


    使用 `softwareupdate --ignore` 命令，加上它提示我安装的更新名称（本例中为 `macOS Catalina`），我可以隐藏这个横幅。正如您在图
    2-30 中看到的，当您使用 `sudo` 运行此命令时，它会将 `Catalina` 更新设置为 `ignored;`；当我重启 Mac 后，如果我再回到
    `软件更新`，`Catalina` 提示就从我的可用更新列表中消失了，如图 2-29 下方的图片所示。在您的 Mac 上输入以下命令来尝试一下：


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig30_HTML.jpg](img/492151_1_En_2_Fig30_HTML.jpg)


    图 2-30

    `softwareupdate --ignore` 命令的输出


    ```

    sudo softwareupdate --ignore "macOS Catalina"

    ```


    如果我想在以后撤销此更改，允许我的用户安装 `macOS Catalina`，我只需要输入 `softwareupdate --reset-ignored`
    命令。


    如果您想审计哪些更新被设置为忽略，可以浏览到 `/Library/Preferences` 并找到 `com.apple.SoftwareUpdate.plist`
    文件。在 `Xcode` 或另一个可以打开 `.plist` 文件类型（也称为 `属性列表`）的 XML 文件的应用中打开此文件。


    当您打开 `.plist` 文件时，您会看到一个针对 `InactiveUpdates` 的 *数组*，数组内部嵌套的每个被忽略的更新都设置了对应的键。


    关闭 `.plist` 文件。输入以下命令来撤销被忽略的更新：


    ```

    softwareupdate –reset-ignored

    ```


    ### 专业提示


    除非您是开发者，否则 `Xcode` 可能有点大材小用，仅用于打开和编辑 `属性列表`。有许多免费或低成本的 `属性列表` 编辑器可用。`Thomas Tempelmann`
    开发的 `Prefs Editor` 是我发现使用起来快速简便的一个。


    # 管理本地用户和群组


    在退出 `系统偏好设置` 之前，让我们回到 `用户与群组`。在本节中，我们将创建一个新的本地用户帐户并探索一些高级设置。


    ## 创建新用户


    首先，点击 `用户与群组系统偏好设置` 中的 `+` 按钮以添加一个新帐户。您会在 `新建帐户` 旁边的下拉菜单中看到，我们有几种帐户类型可选。我们可以选择
    `管理员`、`仅限共享`、`标准` 用户或一个新的 `群组`。我们将在第 7 章讨论 `仅限共享` 和 `群组` 选项。本例中，我们将选择 `标准` 用户，如图
    2-31 所示。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig31_HTML.jpg](img/492151_1_En_2_Fig31_HTML.jpg)


    图 2-31

    创建新的标准本地用户帐户


    用您想要的任何数据填写必填字段。请注意，`全名` 是 *友好名称*，而 `帐户名称` 是 Unix 中的实际用户帐户，并且*默认情况下*它也将是用户 `个人文件夹`
    的名称。帐户名称中不能包含任何空格或特殊字符。填写完信息后，点击 `创建用户` 按钮继续。参见图 2-32。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig32_HTML.jpg](img/492151_1_En_2_Fig32_HTML.jpg)


    图 2-32

    我们新帐户的用户名和密码信息


    用户帐户创建完成后，您将在 `用户与群组` 窗格的左侧 `其他用户` 列表中看到友好名称和一个随机分配的照片。如果点击它以 `选中`，您可以在右侧修改一些内容。您可以使用
    `重置密码` 按钮来重置密码。最后，您可以通过勾选 `允许用户管理此电脑` 的复选框将其升级为 *本地管理员帐户*。

    '
- fmt: '### Advanced Options


    Next, let’s explore some of the advanced options for this new user account. Right-click
    the user account in the Other Users list and choose **Advanced Options…** from
    the contextual menu that appears as shown in Figure [2-33](#492151_1_En_2_Chapter.xhtml#Fig33).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig33_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig33_HTML.jpg)


    Figure 2-33


    Finding the hidden Advanced Options… menu via right-click


    When the Advanced Options sheet appears, you will be presented with a warning
    about making changes to these settings. I don’t typically interact with many of
    these on a regular basis, but since this is a test, feel free to play around to
    understand the cause-and-effect relationship without fear of damaging a production
    user account.


    There are a few items to point out that are quite useful here as shown in Figure
    [2-34](#492151_1_En_2_Chapter.xhtml#Fig34). You can see the default group is `staff`
    in this case because they are a Standard user. The login shell is defaulted to
    `zsh` because I’m using Catalina. I can modify this and select `bash` if I want
    to instead so that it’s consistent with previous versions of macOS. It shows my
    home directory path here, and I can change it to another location or volume if
    I need to. I can set an Apple ID to tie to this particular user account for iCloud
    or the Mac App Store so they don’t need to do so when they first sign in. This
    could be useful for assigning institutional Apple IDs that we will cover later
    in this book.


    Finally, we can add aliases to this user account. Aliases let us add other usernames
    that can be entered instead of the official account name. For example, if my account
    name is very long or complex, I can add a shorter username as an alias. Some organizations
    may do this to maintain some kind of standardization of network user home directories
    but then give the user a friendly username to sign in with. I personally have
    not used aliases all that often, but your mileage may vary.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig34_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig34_HTML.jpg)


    Figure 2-34


    Advanced user options


    ### Login Items


    Next, we are going to explore the concept of Login Items. Go ahead and cancel
    out of the Advanced Options sheet and click your user account listed under Current
    User. Click the **Login Items** tab as shown in Figure [2-35](#492151_1_En_2_Chapter.xhtml#Fig35).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig35_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig35_HTML.jpg)


    Figure 2-35


    The Login Items tab


    Login Items can be thought of as things that will automatically open or run when
    the user logs in, similar to the Microsoft Windows Startup Items. Login Items
    are not limited just to applications. You can include documents, scripts, or even
    volumes. You can specify a mapped network drive to have it attempt to reconnect
    at login or open an html file in a browser to redirect a user to a web page for
    use with a captive portal.


    Sometimes applications will add things to the Login Items list as part of the
    installation process. If you do not want these helper applications launching automatically,
    this is where you can disable that functionality. You can use the `+/-` buttons
    to add or remove Login Items. You can also use drag and drop to add items from
    the Finder directly to the list.


    ### User Template


    Close out of the System Preferences and go back to the Finder. Using the **Go**
    menu, select **Computer** to get a Finder window up that we can use to browse
    the directory of the Macintosh HD. Browse to the `/Users` directory as shown in
    Figure [2-36](#492151_1_En_2_Chapter.xhtml#Fig36). You should see your home directory
    and a folder for your other user. When you try to drill down into the new user’s
    home folder, while you can see the folders Desktop, Documents, and so on, you
    cannot view their contents.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig36_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig36_HTML.jpg)


    Figure 2-36


    Attempting to browse another local user’s home directory


    While we could change file permissions on these folders and drill down to view
    the contents, we are not going to do so at this time. I wanted you to browse to
    this directory to illustrate that there is a standard folder structure that gets
    built when the new user account is created. To understand how this works, we are
    going to browse to another area of the startup disk, the system’s `Library` directory.
    Go back to the root of Macintosh HD and then drill down to `/Library/User Template/`
    as shown in Figure [2-37](#492151_1_En_2_Chapter.xhtml#Fig37).


    > Pro Tip

    > Please note that I’m using macOS Catalina. Older versions of macOS place the
    User Template folder in the `/System/Library/` directory, while Catalina places
    it in `/Library`. If you did browse to `/System/Library/` in Catalina, Apple has
    been kind enough to place an alias to the new location for the User Template.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig37_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig37_HTML.jpg)


    Figure 2-37


    The User Template directory in macOS Catalina


    The `User Template` folder is basically what it sounds like—a template of default
    user settings and a directory structure that is used to build a new user’s home
    folder. There are also various folders for the language and keyboard settings
    for geographic locations around the globe.


    Prior to macOS Mojave, many Mac system administrators utilized the User Template
    folder for preloading various preferences and settings that modified the default
    look and feel for new users. Most recently, Apple has made changes to the way
    that macOS works with regard to the User Template that break this capability.
    The use of configuration profiles is now the recommended means for customizing
    the look and feel of user accounts. Configuration profiles are covered in later
    chapters of the book involving Profile Manager and MDM solutions.


    ## Advanced Finder Techniques


    ### Option Key Modifier


    One secret that Apple uses across many macOS applications, including the Finder,
    is the `option key` as a modifier for showing advanced menu options. As shown
    in Figure [2-38](#492151_1_En_2_Chapter.xhtml#Fig38), pressing and holding the
    `option key` changes or adds additional functions to the various menus.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig38_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig38_HTML.jpg)


    Figure 2-38


    Using the option key to change or add hidden menu items'
  raw: '### Advanced Options


    Next, let’s explore some of the *advanced options* for this new user account.
    **Right-click** the user account in the *Other Users* list and choose **Advanced
