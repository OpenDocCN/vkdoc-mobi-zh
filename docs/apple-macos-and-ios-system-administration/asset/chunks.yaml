- fmt: "# Active Directory Integration for macOS\n\nIn this first section, we are\
    \ going to focus on Active Directory authentication for macOS clients. Before\
    \ getting started on this exercise, you should have a Mac with a clean OS install\
    \ and a local Administrator account configured. Using the `Sharing System Preference`,\
    \ go ahead and name this new Mac `101-2019MBP`, which identifies it as a *2019\
    \ MacBook Pro* in our main office 101. Open the `Terminal` and set the Local Hostname\
    \ and hostname to match. For Active Directory integration to work properly, we\
    \ need all three of the Mac’s names to be the same.\n\nPro Tip\nYou probably have\
    \ some kind of corporate naming convention at your organization. While Apple devices\
    \ will attempt to name themselves after the first user account that is created\
    \ on the machine, you will want to name your Macs in the same fashion that you\
    \ name your Windows PCs.\n\nOur Mac is now ready to be joined to the MyCompany\
    \ domain. Let’s switch over to our Domain Controller and open `Active Directory\
    \ Users and Computers` to get started.\n\n## Prepare a Domain Controller For Mac\
    \ Clients\n\nAs a best practice, I prefer to create records for my macOS clients\
    \ in Active Directory *prior* to adding them to the domain. This serves a couple\
    \ of purposes in that it guards against the Mac joining into the wrong OU and\
    \ proactively avoids any odd errors where a Mac client is unable to write a new\
    \ computer record in AD when it joins to the domain. In this exercise, we are\
    \ going to prepare a place in Active Directory for our new MacBook Pro.\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig3_HTML.png](images/492151_1_En_11_Chapter/492151_1_En_11_Fig3_HTML.png)\n\
    \nFigure 11-3\n\nAdd a new computer record in Active Directory\n\n1. Open `Active\
    \ Directory Users and Computers`. As shown in Figure [11-2](#492151_1_En_11_Chapter.xhtml#Fig2),\
    \ I have an OU called *Main Office Computers*. Inside that OU, I have a *Windows\
    \ 10 PCs* OU that houses the computer records for all of my Windows PCs in the\
    \ main office. This is also where I apply specific Windows 10 GPOs for the main\
    \ office computers. Create a new OU here for our Macs and name it `macOS PCs`.\n\
    \   ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig2_HTML.png](images/492151_1_En_11_Chapter/492151_1_En_11_Fig2_HTML.png)\n\
    \   Figure 11-2\n   Creating the macOS PCs organizational unit\n\n2. Now that\
    \ we have our OU created, we can populate it with computer records for our Macs.\
    \ With the *macOS PCs* OU selected, **right-click** anywhere in the right-side\
    \ panel and choose **New ➤ Computer** and name it `101-2019MBP` as shown in Figure\
    \ [11-3](#492151_1_En_11_Chapter.xhtml#Fig3). Click **OK** to create the record.\n\
    \nNow that we have created a record for our Mac client, we are ready to add it\
    \ to the domain. Switch back to your MacBook Pro and open the `Users & Groups\
    \ System Preference` to continue.\n\n## Adding a Mac to an Active Directory Domain\n\
    \n1. From the `Users & Groups System Preference`, click the **padlock** to authenticate\
    \ as the local Administrator account and then click the `Login Options` button.\
    \ Your dialog box should look similar to Figure [11-4](#492151_1_En_11_Chapter.xhtml#Fig4).\n\
    \   ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig4_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig4_HTML.jpg)\n\
    \   Figure 11-4\n   The Login Options pane in the Users & Groups System Preference\n\
    \n2. Click the `Join...` button next to the `Network Account Server` prompt.\n\
    \n3. Here we are going to enter the domain name of our AD domain. I will enter\
    \ `MyCompany.local` as shown in Figure [11-5](#492151_1_En_11_Chapter.xhtml#Fig5),\
    \ and it will begin to search for the domain.\n   ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig5_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig5_HTML.jpg)\n\
    \   Figure 11-5\n   Enter the name of the domain in the Server field\n\n4. Once\
    \ it finds the domain, it will prompt you to enter a Computer Name and credentials.\
    \ If we set up our Local Hostname and hostname properly, it will auto-fill the\
    \ Computer Name that we want to use as shown in Figure [11-6](#492151_1_En_11_Chapter.xhtml#Fig6).\
    \ Enter your Domain Admin username and password into the next field and click\
    \ **OK**.\n   ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig6_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig6_HTML.jpg)\n\
    \   Figure 11-6\n   Confirm the Computer Name and authenticate with a Domain Admin\
    \ account\n\n5. Next, it will prompt you to modify the directory configuration\
    \ on your Mac and ask you to enter your local Mac Administrator account username\
    \ and password. Enter that information and click the `Modify Configuration` button\
    \ to continue.\n\n6. Your Mac will now begin configuring Active Directory, and\
    \ after a minute or so, you will see a green dot next to the name of your Windows\
    \ domain as shown in Figure [11-7](#492151_1_En_11_Chapter.xhtml#Fig7). This indicates\
    \ that your Mac is now successfully joined to the MyCompany domain.\n   ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig7_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig7_HTML.jpg)\n\
    \   Figure 11-7\n   The green dot next to the domain name confirms that our Mac\
    \ has successfully joined\n\n**Pro Tip** If you are experiencing an issue finding\
    \ the domain, you should check your `DNS` settings on your Mac to make sure that\
    \ it’s getting `DNS` from your Windows server and make sure you can resolve the\
    \ IP and domain name both backward and forward. If you have multiple `DNS` servers,\
    \ make sure that your Windows server is the primary `DNS` server.\n\n**Pro Tip**\
    \ If you are getting errors when joining to your domain, one thing to check is\
    \ the time zone, date, and time of both your Domain Controller and your Mac. Often\
    \ times your client or server is a few minutes off, and that will cause the domain\
    \ binding to fail with various cryptic error messages.\n\nNow that our Mac is\
    \ on the domain, we should log out of the local Administrator account and log\
    \ in as a Network Account user from our Windows Active Directory domain. *Don\
    \ President* is the name of our lucky user who gets this brand-new *MacBook Pro*.\
    \ Let’s test this login with his account as shown in Figure [11-8](#492151_1_En_11_Chapter.xhtml#Fig8).\n\
    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig8_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig8_HTML.jpg)\n\
    Figure 11-8\nSigning in with a Network user account\n\nAfter stepping through\
    \ the Setup Assistant, we are placed into the default new user’s home directory.\
    \ Browsing with the `Finder` to `Home` reveals that we are in as the *dpresident*\
    \ user. Your screen should look similar to Figure [11-9](#492151_1_En_11_Chapter.xhtml#Fig9).\
    \ Excellent! Go ahead and sign out and sign back in as Administrator.\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig9_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig9_HTML.jpg)\n\
    Figure 11-9\nThe default new user Desktop in macOS Catalina\n\nLet’s try something.\
    \ Go ahead and disable `Wi-Fi` and ensure that your MacBook Pro is no longer connected\
    \ to the network. Log out and then attempt to sign in again with the Network user\
    \ account. You are going to have a little problem. You won’t be able to authenticate\
    \ because the domain is unreachable. There’s a red indicator button on the login\
    \ screen in the top-right corner showing that we are disconnected from the network\
    \ as shown in Figure [11-10](#492151_1_En_11_Chapter.xhtml#Fig10).\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig10_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig10_HTML.jpg)\n\
    Figure 11-10\nThe red dot indicates that the Windows domain is unreachable"
  raw: '## Active Directory Integration for macOS


    In this first section, we are going to focus on Active Directory authentication
    for macOS clients. Before getting started on this exercise, you should have a
    Mac with a clean OS install and a local Administrator account configured. Using
    the *Sharing System Preference* , go ahead and name this new Mac **101-2019MBP**,
    which identifies it as a *2019 MacBook Pro* in our main office 101. Open the **Terminal**
    and set the Local Hostname and hostname to match. For Active Directory integration
    to work properly, we need all three of the Mac’s names to be the same.


    Pro Tip


    You probably have some kind of corporate naming convention at your organization.
    While Apple devices will attempt to name themselves after the first user account
    that is created on the machine, you will want to name your Macs in the same fashion
    that you name your Windows PCs.


    Our Mac is now ready to be joined to the MyCompany domain. Let’s switch over to
    our Domain Controller and open **Active Directory Users and Computers** to get
    started.


    Prepare a Domain Controller For Mac Clients


    As a best practice, I prefer to create records for my macOS clients in Active
    Directory *prior* to adding them to the domain. This serves a couple of purposes
    in that it guards against the Mac joining into the wrong OU and proactively avoids
    any odd errors where a Mac client is unable to write a new computer record in
    AD when it joins to the domain. In this exercise, we are going to prepare a place
    in Active Directory for our new MacBook Pro.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig3_HTML.png](images/492151_1_En_11_Chapter/492151_1_En_11_Fig3_HTML.png)


    Figure 11-3


    Add a new computer record in Active Directory


    1.  Now that we have our OU created, we can populate it with computer records
    for our Macs. With the *macOS PCs* OU selected, **right-click** anywhere in the
    right-side panel and choose **New ➤ Computer** and name it **101-2019MBP** as
    shown in Figure [11-3](#492151_1_En_11_Chapter.xhtml#Fig3). Click **OK** to create
    the record.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig2_HTML.png](images/492151_1_En_11_Chapter/492151_1_En_11_Fig2_HTML.png)


    Figure 11-2


    Creating the macOS PCs organizational unit


    1.  Open **Active Directory Users and Computers**. As shown in Figure [11-2](#492151_1_En_11_Chapter.xhtml#Fig2),
    I have an OU called *Main Office Computers*. Inside that OU, I have a *Windows
    10 PCs* OU that houses the computer records for all of my Windows PCs in the main
    office. This is also where I apply specific Windows 10 GPOs for the main office
    computers. Create a new OU here for our Macs and name it **macOS PCs**.


    Now that we have created a record for our Mac client, we are ready to add it to
    the domain. Switch back to your MacBook Pro and open the *Users & Groups System
    Preference* to continue.


    Adding a Mac to an Active Directory Domain


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig5_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Enter the name of the domain in the Server field


    1.  Click the **Join…** button next to the **Network Account Server** prompt.


    2.  Here we are going to enter the domain name of our AD domain. I will enter
    **MyCompany.local** as shown in Figure [11-5](#492151_1_En_11_Chapter.xhtml#Fig5),
    and it will begin to search for the domain.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig4_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    The Login Options pane in the Users & Groups System Preference


    1.  From the *Users & Groups System Preference*, click the **padlock** to authenticate
    as the local Administrator account and then click the **Login Options** button.
    Your dialog box should look similar to Figure [11-4](#492151_1_En_11_Chapter.xhtml#Fig4).


    **Pro Tip** If you are experiencing an issue finding the domain, you should check
    your DNS settings on your Mac to make sure that it’s getting DNS from your Windows
    server and make sure you can resolve the IP and domain name both backward and
    forward. If you have multiple DNS servers, make sure that your Windows server
    is the primary DNS server.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig7_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    The green dot next to the domain name confirms that our Mac has successfully joined


    1.  Next, it will prompt you to modify the directory configuration on your Mac
    and ask you to enter your local Mac Administrator account username and password.
    Enter that information and click the **Modify Configuration** button to continue.


    2.  Your Mac will now begin configuring Active Directory, and after a minute or
    so, you will see a green dot next to the name of your Windows domain as shown
    in Figure [11-7](#492151_1_En_11_Chapter.xhtml#Fig7). This indicates that your
    Mac is now successfully joined to the MyCompany domain.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig6_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Confirm the Computer Name and authenticate with a Domain Admin account


    1.  Once it finds the domain, it will prompt you to enter a Computer Name and
    credentials. If we set up our Local Hostname and hostname properly, it will auto-fill
    the Computer Name that we want to use as shown in Figure [11-6](#492151_1_En_11_Chapter.xhtml#Fig6).
    Enter your Domain Admin username and password into the next field and click **OK**.


    **Pro Tip** If you are getting errors when joining to your domain, one thing to
    check is the time zone, date, and time of both your Domain Controller and your
    Mac. Often times your client or server is a few minutes off, and that will cause
    the domain binding to fail with various cryptic error messages.


    Now that our Mac is on the domain, we should log out of the local Administrator
    account and log in as a Network Account user from our Windows Active Directory
    domain. *Don President* is the name of our lucky user who gets this brand-new
    *MacBook Pro*. Let’s test this login with his account as shown in Figure [11-8](#492151_1_En_11_Chapter.xhtml#Fig8).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig8_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig8_HTML.jpg)


    Figure 11-8


    Signing in with a Network user account


    After stepping through the Setup Assistant, we are placed into the default new
    user’s home directory. Browsing with the **Finder** to **Home** reveals that we
    are in as the *dpresident* user. Your screen should look similar to Figure [11-9](#492151_1_En_11_Chapter.xhtml#Fig9).
    Excellent! Go ahead and sign out and sign back in as Administrator.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig9_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig9_HTML.jpg)


    Figure 11-9


    The default new user Desktop in macOS Catalina


    Let’s try something. Go ahead and disable Wi-Fi and ensure that your MacBook Pro
    is no longer connected to the network. Log out and then attempt to sign in again
    with the Network user account. You are going to have a little problem. You won’t
    be able to authenticate because the domain is unreachable. There’s a red indicator
    button on the login screen in the top-right corner showing that we are disconnected
    from the network as shown in Figure [11-10](#492151_1_En_11_Chapter.xhtml#Fig10).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig10_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig10_HTML.jpg)


    Figure 11-10


    The red dot indicates that the Windows domain is unreachable'
  trans: "\n# macOS 的 Active Directory 集成\n\n在第一部分，我们将重点介绍针对 macOS 客户端的 Active Directory\
    \ 身份验证。在开始此练习之前，您应该已有一台安装了干净操作系统并配置了本地管理员账户的 Mac。通过 `Sharing System Preference`，将这台新\
    \ Mac 命名为 `101-2019MBP`，这表示它是我们主办公室 101 中的一台 *2019 年款 MacBook Pro*。打开 `Terminal`，将本地主机名和主机名设置为与之匹配。为了使\
    \ Active Directory 集成正常工作，我们需要 Mac 的三个名称都保持一致。\n\n**专业提示**\n您的组织可能使用某种公司命名规范。虽然苹果设备会尝试以机器上创建的第一个用户账户来命名自己，但您应该以命名\
    \ Windows PC 的相同方式来命名您的 Mac。\n\n我们的 Mac 现在已准备好加入到 MyCompany 域。让我们切换到域控制器并打开 `Active\
    \ Directory Users and Computers` 以开始操作。\n\n## 为 Mac 客户端准备域控制器\n\n作为一个最佳实践，我倾向于在将\
    \ macOS 客户端添加到域*之前*，先在 Active Directory 中为其创建记录。这样做有几个目的：它可以防止 Mac 加入错误的组织单位（OU），并且能预先避免\
    \ Mac 客户端在加入域时无法在 AD 中写入新计算机记录的任何奇怪错误。在这个练习中，我们将在 Active Directory 中为我们的新 MacBook\
    \ Pro 准备一个位置。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig3_HTML.png](img/492151_1_En_11_Fig3_HTML.png)\n\
    \n图 11-3\n在 Active Directory 中添加新的计算机记录\n\n1.  打开 `Active Directory Users and\
    \ Computers`。如图 11-2 所示，我有一个名为 *Main Office Computers* 的 OU。在该 OU 内部，我有一个 *Windows\
    \ 10 PCs* OU，用于存放主办公室所有 Windows PC 的计算机记录。这也是我为主办公室计算机应用特定 Windows 10 组策略对象（GPO）的地方。在此处为我们的\
    \ Mac 创建一个新的 OU，并将其命名为 `macOS PCs`。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig2_HTML.png](img/492151_1_En_11_Fig2_HTML.png)\n\
    \    图 11-2\n    创建 macOS PCs 组织单元\n\n2.  现在我们已经创建了 OU，我们可以用 Mac 的计算机记录来填充它。选中\
    \ *macOS PCs* OU，在右侧面板的任何位置**右键单击**并选择 **新建 ➤ 计算机**，将其命名为 `101-2019MBP`，如图 11-3\
    \ 所示。点击 **确定** 创建记录。\n\n现在我们已经为 Mac 客户端创建了记录，可以将其添加到域中了。切换回您的 MacBook Pro 并打开\
    \ `Users & Groups System Preference` 继续。\n\n## 将 Mac 添加到 Active Directory 域\n\n\
    1.  在 `Users & Groups System Preference` 中，点击**锁形图标**，使用本地管理员账户进行身份验证，然后点击 `Login\
    \ Options` 按钮。您的对话框应类似于图 11-4。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig4_HTML.jpg](img/492151_1_En_11_Fig4_HTML.jpg)\n\
    \    图 11-4\n    Users & Groups System Preference 中的登录选项面板\n\n2.  点击 `Network\
    \ Account Server` 提示旁边的 `Join...` 按钮。\n\n3.  在这里，我们将输入 AD 域的域名。我将输入 `MyCompany.local`，如图\
    \ 11-5 所示，系统将开始搜索该域。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig5_HTML.jpg](img/492151_1_En_11_Fig5_HTML.jpg)\n\
    \    图 11-5\n    在服务器字段中输入域名\n\n4.  找到域后，系统会提示您输入计算机名和凭据。如果我们正确设置了本地主机名和主机名，它会自动填充我们想要使用的计算机名，如图\
    \ 11-6 所示。在下个字段中输入您的域管理员用户名和密码，然后点击 **OK**。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig6_HTML.jpg](img/492151_1_En_11_Fig6_HTML.jpg)\n\
    \    图 11-6\n    确认计算机名并使用域管理员账户进行身份验证\n\n5.  接下来，系统会提示您修改 Mac 上的目录配置，并要求您输入本地\
    \ Mac 管理员账户的用户名和密码。输入该信息并点击 `Modify Configuration` 按钮继续。\n\n6.  您的 Mac 现在将开始配置\
    \ Active Directory，大约一分钟后，您会在 Windows 域名称旁边看到一个绿点，如图 11-7 所示。这表示您的 Mac 现已成功加入到\
    \ MyCompany 域。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig7_HTML.jpg](img/492151_1_En_11_Fig7_HTML.jpg)\n\
    \    图 11-7\n    域名旁边的绿点确认我们的 Mac 已成功加入\n\n**专业提示** 如果您在查找域时遇到问题，应检查 Mac 上的 `DNS`\
    \ 设置，确保它从 Windows 服务器获取 `DNS`，并确保您可以正向和反向解析 IP 地址和域名。如果您有多个 `DNS` 服务器，请确保您的 Windows\
    \ 服务器是主 `DNS` 服务器。\n\n**专业提示** 如果在加入域时出现错误，需要检查的一件事是域控制器和 Mac 的时区、日期和时间。通常，您的客户端或服务器时间会偏差几分钟，这将导致域绑定失败并出现各种隐晦的错误消息。\n\
    \n现在我们的 Mac 已在域上，我们应该注销本地管理员账户，并使用来自 Windows Active Directory 域的网络账户用户登录。*Don\
    \ President* 是我们的幸运用户，他将获得这台全新的 *MacBook Pro*。让我们使用他的账户测试此登录，如图 11-8 所示。\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig8_HTML.jpg](img/492151_1_En_11_Fig8_HTML.jpg)\n\
    图 11-8\n使用网络用户账户登录\n\n完成设置助理后，我们会进入默认新用户的主目录。使用 `Finder` 浏览到 `Home`，可以看到我们是以 *dpresident*\
    \ 用户身份登录的。您的屏幕应类似于图 11-9。很好！现在可以注销并以管理员身份重新登录。\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig9_HTML.jpg](img/492151_1_En_11_Fig9_HTML.jpg)\n\
    图 11-9\nmacOS Catalina 中的默认新用户桌面\n\n让我们试一下。请先禁用 `Wi-Fi`，确保您的 MacBook Pro 不再连接到网络。注销，然后尝试再次使用网络用户账户登录。您会遇到一个小问题。因为域不可达，您将无法进行身份验证。登录屏幕的右上角有一个红色指示按钮，显示我们已与网络断开连接，如图\
    \ 11-10 所示。\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig10_HTML.jpg](img/492151_1_En_11_Fig10_HTML.jpg)\n\
    图 11-10\n红点表示 Windows 域不可达\n"
- fmt: "# One of the requirements of setting up this laptop was the ability for Don\
    \ President to sign in while off of the network. To fix this issue, we need to\
    \ convert the `dpresident` account to a Mobile account on this Mac. Log in as\
    \ the local Administrator account and re-enable network access. Sign out and make\
    \ sure you can sign back in as the `dpresident` user. Once you are logged in as\
    \ Don President, go to the `Users & Groups System Preference` as shown in Figure\
    \ 11-11. Notice how the current user listed is a `Network` type? We need to convert\
    \ this to a `Mobile` account type.\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig11_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig11_HTML.jpg)\n\
    \n**Figure 11-11**  \nNotice the user account type designation for Don President\n\
    \nClick the `padlock` and authenticate as the local Administrator. Then click\
    \ the Don President user as shown in Figure 11-12. Click the `Create...` button\
    \ next to the `Mobile account` prompt.\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig12_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig12_HTML.jpg)\n\
    \n**Figure 11-12**  \nConverting the Don President Network account to a Mobile\
    \ account\n\nPlace the home directory in the `Macintosh HD (Startup disk)` option\
    \ when prompted and click the `Create` button to continue. It will warn you that\
    \ it is about to log you off to create a local home folder as shown in Figure\
    \ 11-13. Click the `Create` button to continue.\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig13_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig13_HTML.jpg)\n\
    \n**Figure 11-13**  \nFollow the prompts to log out and create the Mobile account\n\
    \nDepending on the settings you have set for FileVault and others, it may ask\
    \ you for the user’s Active Directory password and the local Administrator’s username\
    \ and password during this process. Once it completes, you will be back to the\
    \ login window.\n\nTest this out by disconnecting from the network and waiting\
    \ until the red indicator appears in the top-right corner of the screen. Now sign\
    \ in as Don President and it will work. Open the `Users & Groups System Preference`,\
    \ and you will see that this user is now a `Mobile` account type instead of a\
    \ `Network` account type as shown in Figure 11-14.\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig14_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig14_HTML.jpg)\n\
    \n**Figure 11-14**  \nThe user account is now listed as Mobile\n\n**Pro Tip**\
    \  \nPlease note that if multiple Network users need to access this Mac while\
    \ it is offline, you would need to convert each user account on this Mac from\
    \ Network to Mobile. Right now, the only Active Directory user who can sign into\
    \ this MacBook Pro when it’s disconnected from the network is Don President.\n\
    \nAs we have demonstrated, adding a Mac to a Windows domain requires almost no\
    \ additional configuration on the Windows server and no extensions to Active Directory\
    \ to simply allow for authentication and support for cached credentials using\
    \ the Mobile user account type in `macOS`. We have added the Mac to the domain\
    \ interactively, but we can also automate this task by using a Configuration Profile\
    \ or via a script.\n\n## Using a Configuration Profile to Add a Mac to Active\
    \ Directory\n\nBefore you begin this exercise, you should start with a clean install\
    \ `macOS` on a test Mac. You should name it and create a computer record in Active\
    \ Directory to match. Then using the method you prefer, you should enroll it in\
    \ MDM and promote it to User Approved so we have full access to all of the Configuration\
    \ Profile options.\n\nI have built a test Mac called `101-2019MPRO` and named\
    \ it accordingly (including the Local Hostname and hostname). I have added it\
    \ to Profile Manager, and I have created a computer record in AD for it, but have\
    \ not yet joined it to the domain.\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig15_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig15_HTML.jpg)\n\
    \n**Figure 11-15**  \nConfigure the Directory payload for binding to our Active\
    \ Directory domain\n\n1.  Open Profile Manager and browse to our `101-2019MPRO`\
    \ Mac in the `Devices` section. Click the `Settings` tab and then click the `Edit`\
    \ button to apply a new Configuration Profile setting.\n2.  Configure the `General`\
    \ payload as we have in the past, ensuring that `Automatic Push` is enabled, and\
    \ enter an optional profile description.\n3.  Scroll down to the `macOS` section\
    \ of the available payloads and choose the `Directory` payload and click the `Configure`\
    \ button.\n4.  Customize the payload as shown in Figure 11-15. Note that we are\
    \ provided with a few new options including one to create Mobile accounts at login\
    \ for all of our domain users the first time they sign into this Mac. Because\
    \ we already have a computer record in AD, we will not specify the path to the\
    \ specific OU.\n\n**Pro Tip**  \nThere are some optional settings under `Mappings`\
    \ and `Administrative` tabs that we will leave at the default for this exercise,\
    \ but I encourage you and your Windows system administrator to look at these and\
    \ determine the best settings for your particular environment. The option for\
    \ how often the domain password changes (the default is every 14 days) on the\
    \ client computer is particularly interesting if your machines will be off of\
    \ the local area network for longer periods of time.\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig16_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig16_HTML.jpg)\n\
    \n**Figure 11-16**  \nApplying our domain payload to our test Mac using MDM\n\n\
    1.  Once you have customized the payload, click the `OK` button to save the configuration\
    \ and close out of the Configuration Profile editor. Click the `Save` button in\
    \ Profile Manager to apply the settings to the `101-2019MPRO` client as shown\
    \ in Figure 11-16.\n\nIt should complete the Push Settings task successfully,\
    \ and your Mac will now be configured to sign into the domain. Note that upon\
    \ signing in for the first time, it is converting Don President to a Mobile account\
    \ type on the machine automatically.\n\n**Pro Tip**  \nYou may also want to configure\
    \ payloads for things like Active Directory certificates or the login window to\
    \ further customize the user experience or apply any required security certificates\
    \ and include those along with your Directory payload.\n\n## Using a Script to\
    \ Bind a Mac to Active Directory\n\nApple also provides a command line tool called\
    \ `dsconfigad` for scripting the Active Directory configuration. Using this command\
    \ within Apple Remote Desktop’s `Send Unix` task can be effective for joining\
    \ multiple Macs to the domain at once and further automates the process. This\
    \ is particularly useful if you are not using an MDM solution at your organization.\n\
    \nBefore you begin this exercise, you should start with a clean install `macOS`\
    \ on a test Mac. You should name it and create a computer record in Active Directory\
    \ to match. I have built a test Mac called `101-2013MPRO` and named it accordingly,\
    \ but this time I have left the hostname as `unset` so I can share a shortcut\
    \ with you during this exercise. I have created a computer record in AD for it,\
    \ but have not yet joined it to the domain.\n\n1.  Now that our Computer Name\
    \ and hostname are consistent, we are ready to join the domain using the `dsconfigad`\
    \ command. You can look at the manual for `dsconfigad` to read more about what\
    \ this command does and additional options, but for this exercise we will stick\
    \ to the basics. We need to define four arguments:\n    1.  The `Client ID` (`-c`)\
    \ represents the name we want to use to join the Mac to the domain.\n    2.  The\
    \ `Administrator account` (`-u`) represents the username of a Domain Admin account."
