    the Home Screen and then tap the **…** button and select **Connect to Server**
    as shown in Figure [11-29](#492151_1_En_11_Chapter.xhtml#Fig29).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig29_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig29_HTML.jpg)


    Figure 11-29


    Accessing the Connect to Server option in the Files App


    When it prompts for a server path, enter **smb://PCSERVER01.mycompany.local**
    (or the server’s IP address) into the **Server** field and tap the **Connect**
    button. It will prompt you to authenticate, so go ahead and enter the username
    and password for someone who has access to the Windows shares. I’m using *sjones*
    in Figure [11-30](#492151_1_En_11_Chapter.xhtml#Fig30), but *dpresident* would
    also work. After entering the user’s credentials, click the **Next** button to
    continue.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig30_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig30_HTML.jpg)


    Figure 11-30


    Enter a username and password to authenticate to the file server


    It will connect you to the server and present all of the shares that your authenticated
    user has permission to access. Your screen should look similar to Figure [11-31](#492151_1_En_11_Chapter.xhtml#Fig31).
    Sally can now browse to the **Exec Shared** folder and then find her sales report
    to open and edit with *Microsoft Excel* on her *iPad*.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig31_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig31_HTML.jpg)


    Figure 11-31


    Browsing our network file share from the iPad


    We have successfully configured local Windows file sharing on both *macOS* and
    *iPadOS* clients. Users of Apple devices can seamlessly share data with users
    on Windows PCs.


    ## Microsoft Exchange Integration


    Apple provides *Microsoft Exchange* integration at the operating system level
    on both *macOS* and *iOS*. You can use a Configuration Profile to configure the
    Exchange account settings for Mail, Contacts, Calendars, and Tasks. For Don’s
    new *iPhone 11*, we will simply configure the Exchange settings for his device
    remotely using Profile Manager. For his Mac, he wants to use Microsoft Outlook,
    so we will need to configure that manually after we download and activate the
    Office 365 applications in the next section.


    Configure the Microsoft Exchange Account Using a Payload Variable


    Before we begin this exercise, be sure to create a new user in Profile Manager
    for Don President, using *dpresident* as the username. Enroll a test iOS device
    and name it **Don’s iPhone** so that you can modify and push new Configuration
    Profiles to the device. Now that we have an account created, we are going to create
    an Exchange payload that will use his username as a *payload variable* to configure
    the account on his device.


    1.  Click the **OK** button to save the configuration payload and then click **Save**
    to apply. It will prompt the user for their password when the Profile applies,
    and then Exchange will be completely configured.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig33_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig33_HTML.jpg)


    Figure 11-33


    Configure which services are enabled


    1.  Scroll down to the **Enabled Services** section of the payload and ensure
    all of these are checked as shown in Figure [11-33](#492151_1_En_11_Chapter.xhtml#Fig33).
    This will enable the entire *iOS* to access data from Microsoft Exchange, including
    the Phone app’s Address Book.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig32_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig32_HTML.jpg)


    Figure 11-32


    Setting the Exchange settings by using a payload variable


    1.  Open **Profile Manager**, browse the **Devices** section, and find **Don’s
    iPhone**. Click it to select it and then click the **Settings** tab and **Edit**
    the Configuration Profile.


    2.  In the Configuration Profile editor, scroll down to the **iOS** section and
    choose the **Exchange** payload. Click the **Configure** button to specify the
    settings.


    3.  Enter the Exchange server information into the various fields as required
    by the Exchange payload as shown in Figure [11-32](#492151_1_En_11_Chapter.xhtml#Fig32).
    For the username, we will use **%short_name%** instead of *dpresident*. What that
    will do is allow us to apply this payload to other users in our organization,
    and at the time that the Configuration Profile is applied, the **%short_name%**
    variable will resolve to the current user’s username, in this case *dpresident*.


    **Pro Tip** Note that if your company is using some of the MDM features included
    in ActiveSync, those will also apply to the device. For example, things like minimum
    passcode requirements will apply to the device, and whichever payload has the
    greater restriction will take precedence over the others. For example, if you
    require a minimum passcode length of four characters in Profile Manager but ActiveSync
    is set to require a minimum of six characters, the device will prompt the user
    to set a new six-digit passcode before Exchange data will begin to sync to the
    device.


    Whether you are using BYOD or you are managing company-owned devices in Profile
    Manager, you can see how using a Configuration Profile to apply specific settings
    like Microsoft Exchange would be preferable to manually configuring every individual
    device.'
