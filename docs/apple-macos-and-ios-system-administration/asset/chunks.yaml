  trans: "\n# 设置此笔记本的要求之一，是让 Don 总统能够在断网状态下登录。要解决此问题，我们需要将此 Mac 上的`dpresident`账户转换为移动账户。使用本地管理员账户登录，并重新启用网络访问。注销后，确保你能以`dpresident`用户身份重新登录。以\
    \ Don 总统身份登录后，转到`用户与群组系统偏好设置`，如图 11-11 所示。注意当前列出的用户类型是`网络`类型？我们需要将其转换为`移动`账户类型。\n\
    \n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig11_HTML.jpg](img/492151_1_En_11_Fig11_HTML.jpg)\n\
    \n**图 11-11**  \n注意 Don 总统的用户账户类型标识\n\n点击`挂锁`图标，以本地管理员身份认证。然后如图 11-12 所示点击 Don\
    \ 总统用户。点击`移动账户`提示旁边的`创建...`按钮。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig12_HTML.jpg](img/492151_1_En_11_Fig12_HTML.jpg)\n\
    \n**图 11-12**  \n将 Don 总统的网络账户转换为移动账户\n\n当提示时，将个人文件夹位置选择为`Macintosh HD（启动磁盘）`选项，然后点击`创建`按钮继续。系统会警告你将注销以创建本地个人文件夹，如图\
    \ 11-13 所示。点击`创建`按钮继续。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig13_HTML.jpg](img/492151_1_En_11_Fig13_HTML.jpg)\n\
    \n**图 11-13**  \n按照提示注销并创建移动账户\n\n根据您为 FileVault 等设置的内容，此过程可能会要求您输入用户的 Active\
    \ Directory 密码以及本地管理员的用户名和密码。完成后，您将返回到登录窗口。\n\n通过断开网络连接来测试此操作，并等待屏幕右上角出现红色指示符。现在以\
    \ Don 总统身份登录，它将正常工作。打开`用户与群组系统偏好设置`，您将看到该用户现在是一个`移动`账户类型，而非`网络`账户类型，如图 11-14 所示。\n\
    \n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig14_HTML.jpg](img/492151_1_En_11_Fig14_HTML.jpg)\n\
    \n**图 11-14**  \n用户账户现在被列为移动类型\n\n**专业提示**  \n请注意，如果多个网络用户需要在此 Mac 离线时访问它，您需要将此\
    \ Mac 上的每个用户账户从网络类型转换为移动类型。目前，当此 MacBook Pro 与网络断开连接时，唯一可以登录的 Active Directory\
    \ 用户是 Don 总统。\n\n如我们所示，将 Mac 添加到 Windows 域几乎不需要在 Windows 服务器上进行额外的配置，也无需扩展 Active\
    \ Directory，只需使用`macOS`中的移动用户账户类型即可支持身份验证和缓存凭据。我们已经以交互方式将 Mac 加入了域，但我们也可以通过使用配置描述文件或脚本来实现此任务的自动化。\n\
    \n## 使用配置描述文件将 Mac 添加到 Active Directory\n\n开始此练习前，您应该在一台测试 Mac 上从全新安装`macOS`开始。您应该为其命名，并在\
    \ Active Directory 中创建一个匹配的计算机记录。然后使用您喜欢的方法，将其注册到 MDM 中并将其提升为“用户批准”，以便我们能完全访问所有配置描述文件选项。\n\
    \n我已经创建了一台名为`101-2019MPRO`的测试 Mac，并相应地为其命名（包括本地主机名和主机名）。我已将其添加到 Profile Manager\
    \ 中，并在 AD 中为其创建了计算机记录，但尚未将其加入域。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig15_HTML.jpg](img/492151_1_En_11_Fig15_HTML.jpg)\n\
    \n**图 11-15**  \n为绑定到我们的 Active Directory 域配置目录负载\n\n1.  打开 Profile Manager，浏览至`设备`部分中的`101-2019MPRO`\
    \ Mac。点击`设置`选项卡，然后点击`编辑`按钮以应用新的配置描述文件设置。\n2.  像以往一样配置`通用`负载，确保`自动推送`已启用，并可选择性地输入描述。\n\
    3.  向下滚动到可用负载的`macOS`部分，选择`目录`负载，然后点击`配置`按钮。\n4.  如图 11-15 所示自定义负载。请注意，我们有几个新选项，包括一个在登录时为首次登录此\
    \ Mac 的所有域用户创建移动账户的选项。因为我们在 AD 中已经有一个计算机记录，所以我们不会指定特定 OU 的路径。\n\n**专业提示**  \n\
    `映射`和`管理`选项卡下有一些可选设置，在本练习中我们将保留其默认值，但我鼓励您和您的 Windows 系统管理员查看这些设置，并确定适合您特定环境的最佳设置。如果您的计算机将长时间离开局域网，那么客户端计算机上域密码更改频率（默认是每\
    \ 14 天）的设置尤其值得注意。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig16_HTML.jpg](img/492151_1_En_11_Fig16_HTML.jpg)\n\
    \n**图 11-16**  \n使用 MDM 将我们的域负载应用到测试 Mac\n\n1.  自定义负载后，点击`好`按钮保存配置并关闭配置描述文件编辑器。在\
    \ Profile Manager 中点击`存储`按钮，将设置应用到`101-2019MPRO`客户端，如图 11-16 所示。\n\n它应成功完成推送设置任务，您的\
    \ Mac 现在将被配置为登录到域。请注意，在首次登录时，它会在计算机上自动将 Don 总统转换为移动账户类型。\n\n**专业提示**  \n您可能还想配置其他负载，例如\
    \ Active Directory 证书或登录窗口，以进一步自定义用户体验，或应用任何所需的安全证书，并将这些与您的目录负载一起包含。\n\n## 使用脚本将\
    \ Mac 绑定到 Active Directory\n\nApple 还提供了一个名为`dsconfigad`的命令行工具，用于编写 Active Directory\
    \ 配置脚本。在 Apple Remote Desktop 的`发送 Unix`任务中使用此命令，可以有效地一次性将多台 Mac 加入域，并进一步自动化该过程。如果您所在的组织没有使用\
    \ MDM 解决方案，这尤其有用。\n\n开始此练习前，您应该在一台测试 Mac 上从全新安装`macOS`开始。您应该为其命名，并在 Active Directory\
    \ 中创建一个匹配的计算机记录。我已经创建了一台名为`101-2013MPRO`的测试 Mac 并相应命名，但这次我将主机名留为`unset`，以便在本练习中与您分享一个快捷方式。我已经在\
    \ AD 中为其创建了计算机记录，但尚未将其加入域。\n\n1.  现在我们的计算机名称和主机名一致了，我们可以准备使用`dsconfigad`命令加入域了。您可以查看`dsconfigad`的手册以了解更多关于此命令功能和额外选项的信息，但在本练习中，我们将只介绍基础知识。我们需要定义四个参数：\n\
    \    1.  `客户端 ID` (`-c`) 代表我们要用来将 Mac 加入域的名称。\n    2.  `管理员账户` (`-u`) 代表域管理员账户的用户名。\n"
- fmt: '### 3. Administrator password


    The `-p` argument represents the password for the Domain Admin account.


    ### 4. Domain


    The `-domain` argument represents the domain we are adding our Mac to.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig17_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig17_HTML.jpg)

    *Figure 11-17: Using the script to copy the Computer Name to the hostname*


    1. We are going to interactively develop this script on our test Mac using the
    `Terminal` app, but once you have perfected it, you can create a template in Apple
    Remote Desktop and apply it to your entire Mac fleet. Open the `Terminal` on your
    `101-2013MPRO` to get started.


    2. We are going to write a quick little script that will capture the Mac’s Computer
    Name and save it as a variable, and then using the `scutil --set` command, it
    will set the hostname accordingly. So at the command prompt in the Terminal, type:


    ```

    HOSTNAME=$(networksetup -getcomputername)

    scutil --set HostName $HOSTNAME

    ```


    Press **Enter** and then press **Enter** again when prompted with the `HostName
    [computer name]` output and then enter the local Administrator password when prompted.
    Once it completes that change and you are at the command prompt again, enter `scutil
    --get HostName`, and it should now match the others as `101-2013MPRO`. If you
    use this script in Apple Remote Desktop, it will always change the hostname on
    the Mac client to match the Computer Name. At this point, your Terminal window
    should look similar to Figure 11-17.


    **Pro Tip:** One additional option that you can also define here is the OU that
    you want to assign the Mac client to. However, since we already created a computer
    record in the location we want, we can skip this argument. If you want to manually
    define the OU to place this Mac, you can use the `-ou` argument followed by a
    path in the `"OU=, DC=, DC="` format, for example, `"OU=macOS PCs, OU=Main Office
    Computers, DC=MyCompany, DC=local"`.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig18_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig18_HTML.jpg)

    *Figure 11-18: The full script that renames the computer and adds it to the domain*


    1. Let’s start entering our `dsconfigad` command with the Client ID argument.
    Because we are going to use this same script on multiple computers, instead of
    specifying the exact name for this computer, we will use a token. We can use the
    `"hostname -s"` token so that it automatically applies the hostname of this Mac
    as the Client ID in the script. This will mimic the behavior of the GUI when we
    join a Mac to the domain using the *Users & Groups System Preference*.


    2. Next, we will specify the username and password for the Domain Admin account
    for our `MyCompany.local` domain. Finally, we will add the argument that specifies
    the domain name. Your finished script with all of the arguments should look something
    like Figure 11-18.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig19_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig19_HTML.jpg)

    *Figure 11-19: After the script runs, we can confirm that our Mac is on the domain
    in the Users & Groups System Preference*


    1. It will prompt you to enter the password of the local Administrator account.
    After a minute or two, it will complete successfully. Open the *Users & Groups
    System Preference* and click the **Login Options** button to confirm that the
    Windows domain is now listed with a green indicator icon next to the **Network
    Account Server** as shown in Figure 11-19.


    ```

    dsconfigad -c "''hostname -s''" -u Administrator -p noAcce$$ -domain MyCompany.local

    ```


    **Pro Tip:** There are additional commands that you can use with `dsconfigad`
    to set additional settings like `-mobile enable` to support the Mobile account
    options and `-passinterval` to adjust the frequency that the domain computer password
    changes so that systems that are off of the network for prolonged periods of time
    do not fall off of the domain. If you have questions about this, consult with
    your Windows system administrator to determine if there is a need for this or
    other options.


    We have successfully configured Active Directory and joined our Mac using three
    different methods. Now that we have our Mac on the domain, we can access other
    resources on our Windows server.'
