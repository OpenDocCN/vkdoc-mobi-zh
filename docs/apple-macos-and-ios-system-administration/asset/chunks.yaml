  trans: '

    # 导入 Munki 软件包


    我已下载 `Adobe Dreamweaver CC` 安装包和一份 `Atom` 副本，后者是一款业内常用的开发者工具。我将沿用第 10 章中的步骤，使用
    `munkiimport` 命令将这两款软件添加到我们的 Munki 环境中。我会将两者都设置为无人值守安装/卸载，并都添加到 `testing` 目录中。


    **专业提示**


    如果你在本次练习中无法使用 `Adobe Dreamweaver`，这没关系。只需替换成任何其他应用程序即可。目的是通过 Munki 安装几个 App Store
    中没有的应用程序。之所以使用 `Dreamweaver`，是因为它符合场景需求。


    完成软件包导入后，打开 `MunkiAdmin` 并查看软件包列表。你的 `MunkiAdmin` 窗口应类似于图 13-15。


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig15_HTML.jpg](img/492151_1_En_13_Fig15_HTML.jpg)


    **图 13-15**

    我们截至目前已导入的完整软件包列表


    现在，你可以在其中一台测试机上测试新应用程序的安装。满意结果后，我们就可以将新软件包移入 `production` 目录，并将其添加到 `site_default`
    清单中。如图 13-16 所示，在 `目录` 视图中，`勾选` `Adobe Dreamweaver CC` 和 `Atom` 旁边的`复选框`。然后`保存`并`重新加载`
    `MunkiAdmin` 控制台。


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig16_HTML.jpg](img/492151_1_En_13_Fig16_HTML.jpg)


    **图 13-16**

    在 production 目录中启用 Dreamweaver 和 Atom


    接下来，点击 `清单` 视图并选择我们的 `site_default` 清单。`双击`打开它。我们将通过添加 `Atom` 来修改 `托管安装`。点击 `+`
    按钮并选择 `Atom`。完成后，你的 `托管安装` 标签页应如图 13-17 所示。


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig17_HTML.jpg](img/492151_1_En_13_Fig17_HTML.jpg)


    **图 13-17**

    托管安装现在包含了 Atom 以及 Chrome 和 Firefox


    点击 `可选安装` 标签页，将 `Adobe Dreamweaver CC` 添加到列表中。完成后，你的 `可选安装` 标签页应如图 13-18 所示。


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig18_HTML.jpg](img/492151_1_En_13_Fig18_HTML.jpg)


    **图 13-18**

    将 Adobe Dreamweaver CC 添加到 Optional Installs 列表


    关闭 `site_default` 清单，点击 `保存` 和 `重新加载`。完成后，你可以关闭 `MunkiAdmin` 应用程序。我们的应用程序和设置现在已准备就绪。接下来，我们需要在一台新
    Mac 上进行测试部署。


    # 部署


    我们的部署过程将包含两个阶段。第一阶段将涉及开箱硬件、在桌面上设置并启动它。当我们逐步完成 `设置助理` 时，我们的 Mac 将连接到 Apple 的 DEP
    服务器，然后被重定向以注册到我们的 Profile Manager MDM。一旦它在 Profile Manager 中激活，我们将使用 MDM 管理命令启用
    `Apple 远程桌面`。第二阶段将包括使用 ARD 安装 `Munki`，然后 `托管软件中心` 将完成安装清单中列出的所需应用程序。


    ## 激活与 MDM 注册


    我将从启动 `101-01-2019MBP` 开始，这是我们的第一台新 Mac。我们将在这台机器上逐步完成部署，以确保所有配置都符合预期。开机后，它会提示我们选择语言、键盘设置以及无线网络设置。


    连接到网络后，Mac 会向 DEP 签到，并提示我将设备注册到 MyCompany 的 MDM。经过大约 3-5 分钟的配置，系统会提示输入时区，然后会跳转到登录窗口，显示我的本地管理员账户和
    `其他…` 按钮，用于登录域账户，如图 13-19 所示。


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig19_HTML.jpg](img/492151_1_En_13_Fig19_HTML.jpg)


    **图 13-19**

    成功应用我们的设置后，登录窗口显示了用于以域用户身份登录的 `其他…` 按钮


    ## 启用 Apple 远程桌面


    我们现在不登录。首先，我们需要完成安装 `MunkiTools` 和其他应用程序。如果我返回 Profile Manager 并查看我的系统，会发现它不再是设备列表中的一个占位符，而是一个实际的计算机记录。现在我们可以使用
    MDM 管理工具与之交互了。在 Profile Manager 中，`点击`设备 `101-01-2019MBP` 以选中它，然后点击 `操作` 按钮显示管理工具弹出菜单。选择
    `启用远程桌面`，如图 13-20 所示。


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig20_HTML.jpg](img/492151_1_En_13_Fig20_HTML.jpg)


    **图 13-20**

    使用 Profile Manager 启用 Apple 远程桌面访问


    `确认`你想要启用远程桌面。几分钟后，打开 `Apple 远程桌面`，使用 `扫描器` 搜索网络。你应该会找到一台名为 `101-01-2019MBP` 的机器，如图
    13-21 所示。`拖放`找到的计算机记录到 `所有计算机` 组中，并使用 Profile Manager 为我们创建的本地管理员账户进行身份验证，以将该机器添加到我们的
    ARD 控制台。


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig21_HTML.jpg](img/492151_1_En_13_Fig21_HTML.jpg)


    **图 13-21**

    将新 Mac 添加到我们的 Apple 远程桌面控制台


    ## 安装 MunkiTools


    接下来，我们将重复第 10 章中使用的相同步骤来安装和配置 `MunkiTools`。如果你保存了 `MunkiTools 设置` Unix 脚本，操作应该非常简单。如图
    13-22 所示，在新计算机上安装 `MunkiTools.pkg` 并运行 Unix 脚本。这将把它配置为指向我们的 `munki_repo`，并将其分配到
    `site_default` 清单。


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig22_HTML.jpg](img/492151_1_En_13_Fig22_HTML.jpg)


    **图 13-22**

    安装 MunkiTools.pkg 软件包，然后运行 Unix 脚本修改 ManagedInstalls.plist 以指向我们的 Munki 环境


    完成后，重新启动计算机，我们就可以以最终用户身份登录，并看到该机器已准备就绪。

    '
- fmt: '### End-User Sign-In


    使用我们为新员工创建的测试用户帐户之一，登录到测试 Mac。如图 [13-23](#492151_1_En_13_Chapter.xhtml#Fig23)
    所示，我们所有的应用程序、设置和网络服务都已准备就绪。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig23_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig23_HTML.jpg)


    **Figure 13-23**

    我们的定制化最终用户体验，已安装所需应用程序并应用了设置。


    *   使用`Windows`域用户帐户登录按预期工作，并在首次登录时提示更改默认密码。

    *   已安装`Atom`，且`Munki Managed Software Center`显示了可用的其他应用程序。

    *   `Microsoft Word`、`Excel`、`PowerPoint`和`Outlook`均可在“应用程序”文件夹中找到。

    *   壁纸已设置为我们的`Color Burst 1.jpg`选择。

    *   系统偏好设置仅限于我们指定的部分。

    *   用户可以浏览可用的 Windows 打印机并添加所需的打印机。

    *   `Main Office Shared`网络驱动器已挂载，并在 Finder 中可用。


    **Pro Tip**

    在`Mojave`和`Catalina`上，您可能需要通过 Finder 中的`Network`图标来浏览`Main Office Shared`驱动器。在
    Finder 中选择时，它不应提示用户输入凭据，而是通过将 Mac 的 AD 凭据传递给 Windows 服务器来直接映射驱动器。


    如果您发现某些功能未按预期工作，请返回`Profile Manager`并调整设置。每次进行更改并点击保存后，新设置会立即应用到测试机器上。一旦确认我们的部署按我们期望的方式工作，您就可以使用相同的两阶段过程来部署其他九台
    Mac。


    ## Where to Go from Here


    在本章中，我们演示了如何使用`Munki`、`Profile Manager`和现有的`Microsoft`企业解决方案，来为添加到办公环境中的新`macOS`客户端进行配置。虽然这只是对一些最重要功能的有效演示，但在您规划
    Macintosh 支持策略时，还有许多其他选项值得探索。我鼓励您进行探索、实验，并参与在线的 Apple 系统管理员社区。


    本书为您在管理 Apple 硬件的现代化部署方面打下了坚实的基础。Apple 的平台随着每个版本的发布而不断变化和发展。我强烈建议您加入 Apple 开发者社区，即使只是为了每年夏天都能获取`macOS`和`iOS`的预览版和测试版。每个新的迭代都会带来新的挑战和机遇，并且通常您将被迫跟上步伐，因为新的硬件将需要新的操作系统。'
  raw: '### End-User Sign-In


    Using one of the test user accounts that we created for our new hires, sign into
    the test Mac. As you can see from Figure [13-23](#492151_1_En_13_Chapter.xhtml#Fig23),
    we have all of our applications, settings, and network services ready to go.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig23_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig23_HTML.jpg)


    Figure 13-23


    Our customized end-user experience with required applications installed and settings
    applied


    *   Logging in as the *Windows* domain user account worked as expected and prompted
    us to change the default password at first login.


    *   *Atom* is installed, and *Munki Managed Software Center* is showing available
    additional applications.


    *   *Microsoft Word, Excel, PowerPoint*, and *Outlook* are all available in the
    Applications folder.


    *   The wallpaper is set to our *Color Burst 1.jpg* selection.


    *   System Preferences are limited to those we specified.


    *   The user may browse available Windows printers and add the one they need.


    *   The *Main Office Shared* network drive is mounted and available in the Finder.


    Pro Tip


    On *Mojave* and *Catalina*, you may need to browse using the **Network** icon
    in the Finder for the *Main Office Shared* drive. When selected in the Finder,
    it should not prompt the user for credentials and instead simply map the drive
    by passing the AD credentials from the Mac to the Windows server.


    If you find something that isn’t working as expected, go back into Profile Manager
    and tweak the settings. Each time you make a change and click Save, it will immediately
    apply the new settings to the test machine. Once you have confirmed that our deployment
    works the way we want it to, you are ready to deploy the other nine Macs using
    the same two-stage process.


    ## Where to Go from Here


    In this chapter, we demonstrated how you can use *Munki*, *Profile Manager*, and
    existing *Microsoft* enterprise solutions to stage new *macOS* clients to be added
    to an office environment. While this is an effective demo of some of the most
    important features, there are many more options to explore as you plan out your
    Macintosh support strategy. I would encourage you to explore, experiment, and
    get involved in the Apple system administrator community online.


    This book has provided you with a solid foundation to build on when it comes to
    managing a modern deployment of Apple hardware. Apple’s platforms continue to
    change and evolve with each release. I would strongly recommend joining Apple’s
    developer community for no other reason than to get access to preview and beta
    releases of *macOS* and *iOS* every summer. Every new iteration will bring new
    challenges and new opportunities, and often you will be forced to keep pace as
    newer hardware will require the new operating systems.'
  trans: '

    ### 最终用户登录


    使用我们为新员工创建的测试用户账户之一，登录到测试 Mac。如图 13-23 所示，我们所有的应用程序、设置和网络服务都已准备就绪。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig23_HTML.jpg](img/492151_1_En_13_Fig23_HTML.jpg)


    **图 13-23**

    我们定制的最终用户体验，已安装所需应用程序并应用了设置。


    *   使用 `Windows` 域用户账户登录按预期工作，并在首次登录时提示更改默认密码。

    *   已安装 `Atom`，且 `Munki Managed Software Center` 显示了可用的其他应用程序。

    *   `Microsoft Word`、`Excel`、`PowerPoint` 和 `Outlook` 均可在“应用程序”文件夹中找到。

    *   壁纸已设置为我们的 `Color Burst 1.jpg` 选择。

    *   系统偏好设置仅限于我们指定的部分。

    *   用户可以浏览可用的 Windows 打印机并添加所需的打印机。

    *   `Main Office Shared` 网络驱动器已挂载，并在 Finder 中可用。


    **专业提示**

    在 `Mojave` 和 `Catalina` 上，您可能需要通过 Finder 中的 `Network` 图标来浏览 `Main Office Shared`
    驱动器。在 Finder 中选择时，它不应提示用户输入凭据，而是通过将 Mac 的 AD 凭据传递给 Windows 服务器来直接映射驱动器。


    如果您发现某些功能未按预期工作，请返回 `Profile Manager` 并调整设置。每次进行更改并点击保存后，新设置会立即应用到测试机器上。一旦确认我们的部署按我们期望的方式工作，您就可以使用相同的两阶段过程来部署其他九台
    Mac。


    ## 后续步骤


    在本章中，我们演示了如何使用 `Munki`、`Profile Manager` 和现有的 `Microsoft` 企业解决方案，来为添加到办公环境中的新
    `macOS` 客户端进行配置。虽然这只是对一些最重要功能的有效演示，但在您规划 Macintosh 支持策略时，还有许多其他选项值得探索。我鼓励您进行探索、实验，并参与在线的
    Apple 系统管理员社区。


    本书为您在管理 Apple 硬件的现代化部署方面打下了坚实的基础。Apple 的平台随着每个版本的发布而不断变化和发展。我强烈建议您加入 Apple 开发者社区，即使只是为了每年夏天都能获取
    `macOS` 和 `iOS` 的预览版和测试版。每个新的迭代都会带来新的挑战和机遇，并且通常您将被迫跟上步伐，因为新的硬件将需要新的操作系统。

    '
