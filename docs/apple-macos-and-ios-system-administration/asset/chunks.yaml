- fmt: '## Configuring Profile Manager for the Sales Team iPad Scenario


    Configuring the sales team iPads is also pretty straightforward as we will create
    a device group and apply the appropriate settings for this scenario as well. The
    main difference here is that because these are company-owned devices, we will
    use supervision and `DEP` to assign the devices to a specific device group and
    force enrollment during the `Setup Assistant` activation step.


    Let’s get started by opening `Profile Manager` and browsing to the `Device Groups`
    section again. Click the `+` button to add a new `Device Group`. This time we
    will call it `Sales Team iPads`. Click the `Sales Team iPads` device group to
    select it and then click the `Settings` tab. Click the `Edit` button under the
    `Settings for Sales Team iPads` section as shown in Figure [12-14](#492151_1_En_12_Chapter.xhtml#Fig14).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig14_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig14_HTML.jpg)


    Figure 12-14

    Assigning configuration settings to our new device group


    The first thing we need to do is configure all of the same `VPN`, `Network`, and
    `Passcode` payloads that we did for the `BYOD` group. You can go ahead and configure
    those payloads to match.


    ### Pro Tip

    If you have a very large organization and every device will share similar wireless
    and passcode requirements, you may want to create a Device Group called “Security
    Standard” or something similar. Next, you can add new Device Groups as members
    of the Security Standard group in a sort of nested group scenario so you don’t
    have to configure the same settings on multiple groups each time.


    Next up, we need to restrict the use of `iMessage`, `FaceTime`, and the `App Store`.
    Configure the `Restrictions` payload as follows:

    *   *Uncheck* `Allow iMessage (supervised only)`.

    *   *Uncheck* `Allow FaceTime (supervised only)`.

    *   *Uncheck* `Allow removing Apps (supervised only)`.

    *   *Uncheck* `Allow removing system Apps (supervised only)`.

    *   *Uncheck* `Allow in-app purchase`.

    *   *Uncheck* `Allow installing Apps using App Store (supervised only)`.


    Your restrictions should look similar to Figure [12-15](#492151_1_En_12_Chapter.xhtml#Fig15).
    Click the `OK` button to save the configuration settings for the `Sales Team iPads`
    group and then click the `Save` button to apply.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig15_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig15_HTML.jpg)


    Figure 12-15

    Configuring the Restrictions payload


    Now that we have configured our restrictions and configuration settings, we need
    to configure the enrollment and `Setup Assistant` options. From the `Settings`
    tab, scroll down to the `Enrollment during Setup Assistant section` and change
    the settings to match those in Figure [12-16](#492151_1_En_12_Chapter.xhtml#Fig16).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig16_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig16_HTML.jpg)


    Figure 12-16

    Settings for enabling enrollment during Setup Assistant


    Scroll down a bit further and change the `Setup Assistant Options` to suppress
    a number of settings. This will make it simpler for the end user to step through
    the device and will hopefully save time and additional calls to your `IT help
    desk`. Change your settings to match those in Figure [12-17](#492151_1_En_12_Chapter.xhtml#Fig17).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig17_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig17_HTML.jpg)


    Figure 12-17

    Uncheck the unwanted Setup Assistant prompts


    Click the `Save` button to apply these settings to the `Sales Team iPads` device
    group.


    ### Pro Tip

    Optionally, you can also configure `Activation Lock` settings and enforce a device
    name standard at this time. I will typically enable `Activation Lock` and set
    a device name.


    For now, our work in `Profile Manager` is done. We need to redeem some Apps and
    assign our new iPads to our `MDM` in Apple School/Business Manager next. Theoretically,
    you should have a way to identify your new iPads using their serial numbers. Check
    the packing slip or invoice and find the serial numbers for the ten new iPads
    that we will assign using `DEP` and then head out to the Apple Management Portal.
    Depending on your circumstances, this would be `http://school.apple.com` or `http://business.apple.com`.


    Sign in there and then go to the `Device Assignments` area. Here we are going
    to enter the serial numbers for each of our ten iPads that will be going to the
    sales team. Once you have entered each device into the `Serial Numbers` field,
    assign it to our `MDM` using the `Perform Action` drop-down and click `Done` to
    apply as shown in Figure [12-18](#492151_1_En_12_Chapter.xhtml#Fig18).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig18_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig18_HTML.jpg)


    Figure 12-18

    Listing serial numbers separated by commas for all ten of our iPads and assigning
    them to our MDM server


    ### Pro Tip

    As you have likely already inferred, you can apply all devices from a single order
    number or upload a `*.csv` file instead of entering each serial number into the
    field individually. Since ten is just about the limit as to the number of devices
    I would like to do manually, I just entered them in by hand.


    Once the devices have been assigned successfully, go ahead and jump over to the
    `Apps and Books` section, and we can redeem the `Zoom` and `Salesforce` Apps.
    Using the same process that we did in previous chapters with the `Microsoft Office`
    suite, look up `Salesforce` and `Zoom` and redeem ten copies of each as shown
    in Figure [12-19](#492151_1_En_12_Chapter.xhtml#Fig19).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig19_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig19_HTML.jpg)


    Figure 12-19

    Ensure you have ten copies of the required Apps available to assign


    Now that we have redeemed our Apps and assigned our iPads to our `MDM` server,
    head back over to `Profile Manager`. You should see the new Apps and the new iPad
    placeholders at this point; but if you do not, click the `refresh` button in the
    `Profile Manager` window to force a synchronization with Apple’s server, and the
    Apps and Placeholders should now populate as shown in Figure [12-20](#492151_1_En_12_Chapter.xhtml#Fig20).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig20_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig20_HTML.jpg)


    Figure 12-20

    New placeholder devices are now available courtesy of DEP


    Now that we have our placeholder devices and our App licenses, let’s go back to
    the `Device Groups` area of `Profile Manager` and click the `Sales Team iPads`
    group to select it. Click the `Apps` tab and then the `+` button to assign some
    licenses to this group. Add `Salesforce` and `Zoom` as shown in Figure [12-21](#492151_1_En_12_Chapter.xhtml#Fig21)
    and leave the default `Installation mode` as `Automatic`. Next, click the `OK`
    button to save these settings and then click `Save` to apply these settings to
    the device group.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig21_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig21_HTML.jpg)


    Figure 12-21

    Assigning Apps to our Device Group


    Finally, the last step we need to take is to assign the ten new iPads to the `Sales
    Team iPads` device group. Click the `Members` tab and click the `+` button in
    the `Members` pane and add all ten of the new iPads to this group as shown in
    Figure [12-22](#492151_1_En_12_Chapter.xhtml#Fig22).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig22_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig22_HTML.jpg)


    Figure 12-22

    Adding each placeholder iPad to the Device Group'
  raw: '## Configuring Profile Manager for the Sales Team iPad Scenario


    Configuring the sales team iPads are also pretty straightforward as we will create
    a device group and apply the appropriate settings for this scenario as well. The
    main difference here is that because these are company-owned devices, we will
    use supervision and DEP to assign the devices to a specific device group and force
    enrollment during the Setup Assistant activation step.


    Let’s get started by opening **Profile Manager** and browsing to the **Device
    Groups** section again. Click the **+** button to add a new Device Group. This
    time we will call it ***Sales Team iPads***. Click the **Sales Team iPads** device
    group to select it and then click the **Settings** tab. Click the **Edit** button
    under the **Settings for Sales Team iPads** section as shown in Figure [12-14](#492151_1_En_12_Chapter.xhtml#Fig14).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig14_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig14_HTML.jpg)


    Figure 12-14


    Assigning configuration settings to our new device group


    The first thing we need to do is configure all of the same VPN, Network, and Passcode
    payloads that we did for the BYOD group. You can go ahead and configure those
    payloads to match.


    Pro Tip


    If you have a very large organization and every device will share similar wireless
    and passcode requirements, you may want to create a Device Group called “Security
    Standard” or something similar. Next, you can add new Device Groups as members
    of the Security Standard group in a sort of nested group scenario so you don’t
    have to configure the same settings on multiple groups each time.


    Next up, we need to restrict the use of iMessage, FaceTime, and the App Store.
    Configure the **Restrictions** payload as follows:


    *   *Uncheck* **Allow iMessage (supervised only)**.


    *   *Uncheck* **Allow FaceTime (supervised only)**.


    *   *Uncheck* **Allow removing Apps (supervised only)**.


    *   *Uncheck* **Allow removing system Apps (supervised only)**.


    *   *Uncheck* **Allow in-app purchase**.


    *   *Uncheck* **Allow installing Apps using App Store (supervised only)**.


    Your restrictions should look similar to Figure [12-15](#492151_1_En_12_Chapter.xhtml#Fig15).
    Click the **OK** button to save the configuration settings for the Sales Team
    iPads group and then click the **Save** button to apply.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig15_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig15_HTML.jpg)


    Figure 12-15


    Configuring the Restrictions payload


    Now that we have configured our restrictions and configuration settings, we need
    to configure the enrollment and Setup Assistant options. From the **Settings**
    tab, scroll down to the ***Enrollment during Setup Assistant section*** and change
    the settings to match those in Figure [12-16](#492151_1_En_12_Chapter.xhtml#Fig16).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig16_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig16_HTML.jpg)


    Figure 12-16


    Settings for enabling enrollment during Setup Assistant


    Scroll down a bit further and change the ***Setup Assistant Options*** to suppress
    a number of settings. This will make it simpler for the end user to step through
    the device and will hopefully save time and additional calls to your IT help desk.
    Change your settings to match those in Figure [12-17](#492151_1_En_12_Chapter.xhtml#Fig17).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig17_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig17_HTML.jpg)


    Figure 12-17


    Uncheck the unwanted Setup Assistant prompts


    Click the **Save** button to apply these settings to the ***Sales Team iPads***
    device group.


    Pro Tip


    Optionally, you can also configure Activation Lock settings and enforce a device
    name standard at this time. I will typically enable Activation Lock and set a
    device name.


    For now, our work in Profile Manager is done. We need to redeem some Apps and
    assign our new iPads to our MDM in Apple School/Business Manager next. Theoretically,
    you should have a way to identify your new iPads using their serial numbers. Check
    the packing slip or invoice and find the serial numbers for the ten new iPads
    that we will assign using DEP and then head out to the Apple Management Portal.
    Depending on your circumstances, this would be [`http://school.apple.com`](http://school.apple.com)
    or [`http://business.apple.com`](http://business.apple.com).


    Sign in there and then go to the ***Device Assignments*** area. Here we are going
    to enter the serial numbers for each of our ten iPads that will be going to the
    sales team. Once you have entered each device into the **Serial Numbers** field,
    assign it to our MDM using the **Perform Action** drop-down and click **Done**
    to apply as shown in Figure [12-18](#492151_1_En_12_Chapter.xhtml#Fig18).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig18_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig18_HTML.jpg)


    Figure 12-18


    Listing serial numbers separated by commas for all ten of our iPads and assigning
    them to our MDM server


    Pro Tip


    As you have likely already inferred, you can apply all devices from a single order
    number or upload a *.csv file instead of entering each serial number into the
    field individually. Since ten is just about the limit as to the number of devices
    I would like to do manually, I just entered them in by hand.


    Once the devices have been assigned successfully, go ahead and jump over to the
    ***Apps and Books*** section, and we can redeem the *Zoom* and *Salesforce* Apps.
    Using the same process that we did in previous chapters with the *Microsoft Office*
    suite, look up *Salesforce* and *Zoom* and redeem ten copies of each as shown
    in Figure [12-19](#492151_1_En_12_Chapter.xhtml#Fig19).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig19_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig19_HTML.jpg)


    Figure 12-19


    Ensure you have ten copies of the required Apps available to assign


    Now that we have redeemed our Apps and assigned our iPads to our MDM server, head
    back over to **Profile Manager**. You should see the new Apps and the new iPad
    placeholders at this point; but if you do not, click the **refresh** button in
    the Profile Manager window to force a synchronization with Apple’s server, and
    the Apps and Placeholders should now populate as shown in Figure [12-20](#492151_1_En_12_Chapter.xhtml#Fig20).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig20_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig20_HTML.jpg)


    Figure 12-20


    New placeholder devices are now available courtesy of DEP


    Now that we have our placeholder devices and our App licenses, let’s go back to
    the **Device Groups** area of Profile Manager and click the ***Sales Team iPads***
    group to select it. Click the **Apps** tab and then the **+** button to assign
    some licenses to this group. Add *Salesforce* and *Zoom* as shown in Figure [12-21](#492151_1_En_12_Chapter.xhtml#Fig21)
    and leave the default **Installation mode** as **Automatic**. Next, click the
    **OK** button to save these settings and then click **Save** to apply these settings
    to the device group.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig21_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig21_HTML.jpg)


    Figure 12-21


    Assigning Apps to our Device Group


    Finally, the last step we need to take is to assign the ten new iPads to the ***Sales
    Team iPads*** device group. Click the **Members** tab and click the **+** button
    in the Members pane and add all ten of the new iPads to this group as shown in
    Figure [12-22](#492151_1_En_12_Chapter.xhtml#Fig22).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig22_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig22_HTML.jpg)


    Figure 12-22


    Adding each placeholder iPad to the Device Group'
