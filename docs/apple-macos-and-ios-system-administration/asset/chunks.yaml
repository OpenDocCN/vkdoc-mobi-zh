    1.  To configure the MDM server info, you need to provide a few items including
    a name and a public key to create a secure connection between DEP and your MDM
    server. Name this MDM server something descriptive. I’m going to call **mine**
    “**My Company’s MDM Server**.” I am going to leave the **Allow this MDM Server
