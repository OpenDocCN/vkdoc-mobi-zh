    此时，服务已启动，您应该能够打开配置文件管理器网站。我们需要通过三种不同方式浏览该网站来测试。首先，在服务器上启动浏览器，并导航到`//localhost/profilemanager`，确保它能将您带到配置文件管理器登录屏幕。接下来，在内部网络上的另一台计算机上打开浏览器，确保您能访问到服务器的内部
    IP`/profilemanager`。在我这里，是[192.168.1.9/​profilemanager](http://192.168.1.9/profilemanager)。最后，通过您在互联网上注册的名称，从外部设备访问服务器——在我这里，是[`http://579testing.com/profilemanager`](http://579testing.com/profilemanager)。如果一切正常，您应该不会收到任何证书错误，并且应该会看到一个登录屏幕，如图
    7-48 所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig48_HTML.jpg](img/492151_1_En_7_Fig48_HTML.jpg)


    图 7-48

    通过 Web 浏览器访问的配置文件管理器登录窗口


    **专业提示**


    如果您通过单击侧边栏中带有服务器名称的按钮返回服务器的主状态屏幕，您应该会在互联网可达性下方看到一个绿点。您也可以单击“可达性详细信息”按钮，并确保配置文件管理器显示为可通过互联网访问，如图
    7-49 所示。如果您没有看到这一点，应联系您的网络管理员，让他们检查路由器或防火墙配置。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig49_HTML.jpg](img/492151_1_En_7_Fig49_HTML.jpg)


    图 7-49

    使用 Apple 的可达性服务确认配置文件管理器可从公共互联网访问


    此时，我们已启用配置文件管理器服务，并确认它在内部和外部都能正常工作。还有一些额外的选项可以配置，以便与`Apple School Manager`、`Device
    Enrollment Program`和`Volume Purchase`集成。我将在下一章讨论 MDM 这个大主题下的这些服务时介绍它们。


    ## 总结


    在本章中，我们讨论了专用 Mac 服务器的必要性、内置在核心`macOS`客户端操作系统中的服务器级解决方案，以及通过安装`macOS Server`应用程序提供的进阶服务。虽然每个组织的需求会有所不同，但很明显，只要可能，Apple
    都提倡使用现有的行业标准目录和文件共享以及打印共享技术，而不是专有的仅限 Mac 的解决方案。


    正如您所看到的，`macOS Server`主要已成为通过配置文件管理器工具启用移动设备管理（MDM）的工具。可以说，除非您想使用配置文件管理器，否则您可能根本不需要
    Mac 服务器。如果您确实需要配置文件管理器，它可能是您需要在服务器上运行的唯一服务，并且它不依赖于 Open Directory 或任何其他服务。


    在下一章中，我们将探讨 MDM 概念，包括`User Approved MDM`、`Device Enrollment Program`和`Volume Purchase
    Program`。这些解决方案构成了为 Apple 品牌设备开发下一代部署和支持模式的基础。


    # 8. 移动设备管理


    移动设备管理（MDM）的概念已经存在了近二十年，但由于“自带设备”模式以及现在能够管理像 Mac 或 Windows PC 这样的传统台式计算机，近年来它变得越来越流行。MDM
    解决方案通过操作系统供应商提供的应用程序编程接口（API）工作，作为一种“无线”配置、控制、保护和管理设备的手段。在本章中，我们将探讨 Apple 为 MDM
    供应商提供的各种服务和 API，这些构成了管理现代`iOS`和`macOS`端点的基础。


    ## Apple MDM 入门


    所有的移动设备管理解决方案通常提供几个核心功能：库存管理和报告是其一；远程（无线）安全、配置和管理是其二；远程软件部署是其三。在 Apple 产品上，有三个主要组件提供这些功能。库存管理通过设备注册计划（DEP）处理；安全和配置通过配置描述文件负载处理；软件部署则通过批量购买计划（VPP）实现。我们将在本章中逐一介绍这些领域。


    当今市场上有许多第三方 MDM 解决方案。所有大型厂商都集成了 VPP 和 DEP，并使用配置描述文件提供远程管理。您可能听说过`JAMF`、`Cisco
    Meraki`或`Addigy`。这些都是最受欢迎的 MDM 解决方案，它们各自都有区别于竞争对手的独特功能。通过`macOS Server`，Apple
    还提供了一个第一方 MDM 解决方案——配置文件管理器。由于所有这些不同的管理解决方案都使用相同的 API，我们将在本书中使用配置文件管理器来演示 MDM、DEP
    和 VPP 的概念，这些概念将适用于您组织中选择使用的任何 MDM 解决方案。


    **专业提示**


    由于我们将在本章中讨论许多 Apple 托管服务，现在是向您介绍 Apple 的**系统状态**页面的好时机。您可以通过访问[`www.apple.com/support/systemstatus`](http://www.apple.com/support/systemstatus)来浏览此页面。在这里，您将看到所有各种
    Apple 托管服务，以及它们是否可用或是否存在问题。有时激活、DEP、VPP 或其他服务的问题可能是由于 Apple 一方的服务中断造成的。在排查各种问题时，这是一个很好的参考页面。

