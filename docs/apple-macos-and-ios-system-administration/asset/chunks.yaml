    现在我们已经创建了一些用户并将它们放入一个组中，我们希望能够使用其中一个账户登录到工作站。为此，我们需要将我们的*macOS*客户端*绑定*到 Open Directory
    域。将客户端绑定到域允许它在搜索本地账户的同时搜索网络账户列表以找到匹配项，并允许网络用户登录到计算机。域中任何已启用的用户都可以登录到绑定到该域的任何计算机。


    ## 绑定 macOS 客户端到 Open Directory


    切换到您的一台测试 Mac 客户端，并以具有管理员权限的本地用户身份登录。打开*用户与群组系统偏好设置*并进行身份验证以解锁偏好设置面板。点击**登录选项**按钮，如图
    [7-36](#492151_1_En_7_Chapter.xhtml#Fig36) 所示。接下来，点击**网络账户服务器**提示旁边的**加入…**按钮。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig36_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig36_HTML.jpg)


    图 7-36


    将 Mac 客户端加入网络账户服务器


    系统会提示您一个对话框来选择或输入服务器。您可以输入 IP 地址或主机名。如果您的网络像我此示例中的一样小而简单，您也可以点击下拉箭头，如图 [7-37](#492151_1_En_7_Chapter.xhtml#Fig37)
    所示，它可能会找到广播的主机并从菜单中选择。输入服务器信息并点击**确定**按钮继续。如果提示您信任服务器提供的安全套接字层（`SSL`）证书，请点击**信任**按钮继续。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig37_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig37_HTML.jpg)


    图 7-37


    在字段中输入主机名或服务器名，然后点击确定


    您可能会收到一条消息，提示服务器不使用安全套接字层（`SSL`）身份验证。您可以暂时点击**继续**按钮跳过此消息，因为我们在此练习中不关心加密。它会提示您输入本地管理员账户凭据，经过片刻配置后，您将看到
    Open Directory 服务器列在"网络账户服务器"旁边，并有一个绿点表示连接正常。您可能还想更改登录窗口的一些设置，如图 [7-38](#492151_1_En_7_Chapter.xhtml#Fig38)
    所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig38_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig38_HTML.jpg)


    图 7-38


    我们的客户端现已绑定到我们的 Open Directory 域，您可能希望更改一些登录窗口选项，如图所示


    现在我们已经将 Mac 绑定到 Open Directory，请继续**注销**，然后使用`User1`账户登录。如果一切顺利，首次登录时您应该会收到几个设置助理问题，然后作为网络用户进入一个干净的`/Users/User1/Desktop`目录，拥有所有默认的新用户设置。您可以通过转到*用户与群组系统偏好设置*或浏览到`/Users`来查看您的主目录，从而确认这一点，如图
    [7-39](#492151_1_En_7_Chapter.xhtml#Fig39) 所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig39_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig39_HTML.jpg)


    图 7-39


    主目录和网络用户账户类型，如用户与群组系统偏好设置中所示'
  raw: 'Our next step is to modify our User1 account. **Right-click User1** in the
    **Local Network Users** screen and choose **Edit Access to Services…. Uncheck
    SSH** and **Screen Sharing** as shown in Figure [7-29](#492151_1_En_7_Chapter.xhtml#Fig29)
    and then click **OK**.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig29_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig29_HTML.jpg)


    Figure 7-29


    Disable this user’s access to SSH and Screen Sharing


    Next, **right-click** again the **User1** account and choose **Edit User**. In
    the **Groups** field, click the **+** button and start typing **“Executive Team”**
    into the field. This will add the user to the Executive Team group we created
    earlier. If the User1 is a member of the **Workgroup** group, click the Workgroup
    group to highlight it and then click the **–** button to remove it. When completed,
    your User1 should look like Figure [7-30](#492151_1_En_7_Chapter.xhtml#Fig30).
    Click the **OK** button.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig30_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig30_HTML.jpg)


    Figure 7-30


    Configure the User1 account as shown


    **Pro Tip** Instead of editing each user account individually, you can also restrict
    access to the server by going to the server’s **Access** tab and changing the
    default User Access to **only some users** and specifying specific users or groups
    as shown in Figure [7-31](#492151_1_En_7_Chapter.xhtml#Fig31).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig31_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig31_HTML.jpg)


    Figure 7-31


    Configuring Default User Access


    Finally, now that we have our User1 configured with the correct group, we are
    going to create a template from this user and create a couple more just like it.
    To create a template, click User1 to highlight it and then choose **Create Template
    from User…** from the **gear** pop-up menu as shown in Figure [7-32](#492151_1_En_7_Chapter.xhtml#Fig32).
    When prompted, change the Template Name to **“Executive User Template”** and then
    leave the other settings as default and click the **Done** button to save the
    template.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig32_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig32_HTML.jpg)


    Figure 7-32


    Creating a template from the User1 account


    Now we are going to create two more users based on the Executive User Template.
    To do this, click the **+** button on the Users window, and this time you will
    see a pop-up menu in the New User window that that will allow you to create a
    user from a template as shown in Figure [7-33](#492151_1_En_7_Chapter.xhtml#Fig33).
    Select **Executive User Template** and create User2 and User3 accounts.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig33_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig33_HTML.jpg)


    Figure 7-33


    Create a new user from the Executive User Template


    Now that we have our three user accounts created, your Users window should look
    like the one in Figure [7-34](#492151_1_En_7_Chapter.xhtml#Fig34). Don’t forget
    to restrict their access to SSH and Screen Sharing too.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig34_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig34_HTML.jpg)


    Figure 7-34


    You should have three user accounts—User1, User2, and User3


    Finally, let’s explore the advanced options for a user. **Right-click User3**
    and choose **Advanced Options…** as shown in Figure [7-35](#492151_1_En_7_Chapter.xhtml#Fig35).
    This will look familiar to you from the *Users & Groups System Preference*. Just
    like the local workstation, we can make adjustments like the home directory, login
    shell, and aliases. The option for configuring a Share Point URL is used for mapping
    a network drive at login, not to be confused with *Microsoft SharePoint*. We are
    not going to make any changes at this time, so click the **Cancel** button to
    continue.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig35_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig35_HTML.jpg)


    Figure 7-35


    Advanced user settings for User3


    Pro Tip


    We can see our three user accounts and a couple of groups, but did you know that
    there are many more users and groups than what we see here that have been placed
    in our directory by the OS? You can show or hide these System users and groups
    by **right-clicking** any user and choosing **Show System Accounts** or **Hide
    System Accounts** to toggle these groups on and off.


    Now that we have created a few users and placed them into a group, we want to
    be able to log into a workstation with one of these accounts. To do this, we need
    to *bind* our *macOS* clients to the Open Directory domain. Binding a client to
    the domain allows it to search the list of Network Accounts in addition to the
    Local Accounts to find a match and allow a Network User to login to the computer.
    Any enabled user in the domain can sign into any computer bound to that domain.


    Binding Macos Clients To Open Directory


    Switch over to one of your test Mac clients and sign in as a local user with administrative
    rights. Open the *Users & Groups System Preference* and authenticate to unlock
    the preference pane. Click the **Login Options** button as shown in Figure [7-36](#492151_1_En_7_Chapter.xhtml#Fig36).
    Next, click the **Join…** button next to the **Network Account Server** prompt.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig36_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig36_HTML.jpg)


    Figure 7-36


    Joining a Mac client to a Network Account Server


    You will be prompted with a dialog box to select or enter a server. You can enter
    an IP address or a hostname. If your network is small and simple like mine is
    for this example, you can also click the drop-down arrow as shown in Figure [7-37](#492151_1_En_7_Chapter.xhtml#Fig37),
    and it may find the broadcasted host to select from the menu. Enter the server
    information and click the **OK** button to continue. If it prompts you to trust
    the Secure Socket Layer (SSL) certificates provided by the server, click the **Trust**
    button to continue.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig37_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig37_HTML.jpg)


    Figure 7-37


    Enter the hostname or the server name in the field and click OK


    You may receive a message that the server does not use Secure Socket Layer (SSL)
    authentication. You can click the **Continue** button past this message for now
    as we are not concerned with encryption for this exercise. It will prompt you
    for your local administrator account credentials, and then after a few moments
    of configuration, you will see your Open Directory server listed next to the Network
    Account Server and a green dot signifying that the connection is working. You
    may also want to make a couple changes to the login window as shown in Figure
    [7-38](#492151_1_En_7_Chapter.xhtml#Fig38).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig38_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig38_HTML.jpg)


    Figure 7-38


    Our client is now bound to our Open Directory domain, and you may want to change
    some login window options as shown


    Now that we have bound our Mac to the Open Directory, go ahead and **log out**
    and then sign in using the User1 account. If all goes well, you should be prompted
    with a couple of Setup Assistant questions on first login and then dropped into
    a clean /***Users/User1/Desktop*** directory with all the default new user settings
    as a Network user. You can confirm this by going to the *Users & Groups System
    Preference* or browsing to ***/Users*** to see your home directory as shown in
    Figure [7-39](#492151_1_En_7_Chapter.xhtml#Fig39).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig39_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig39_HTML.jpg)


    Figure 7-39


    Home directory and Network user account type as shown in the Users & Groups System
    Preference'
