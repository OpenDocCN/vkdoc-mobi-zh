  trans: '

    ## Apple Remote Desktop 简介


    当前版本的 Apple Remote Desktop 可在 `Mac App Store` 获取，版本为 3.9，价格为 79.99 美元，如图 6-1 所示。虽然它比
    `Apple Configurator` 贵得多，但就商业桌面管理套件而言，它的价格相当实惠。如果你的组织还没有针对 `macOS` 客户端的**管理解决方案**，那么使用
    `ARD` 是一个不错的选择。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig1_HTML.jpg](img/492151_1_En_6_Fig1_HTML.jpg)


    **图 6-1**

    Apple Remote Desktop 可在 Mac App Store 中获取


    **专家提示**

    市面上有许多跨平台的桌面管理工具，例如 `Symantec Altiris` 和 `Microsoft System Center Configuration
    Manager (SCCM)`，它们可以支持 `macOS`、`Windows` 或 `Linux` 客户端，许多大型组织已对此类工具进行了大量投资。如果你已有类似的解决方案并且它能满足你的需求，那么
    `ARD` 可能无法提供你尚未拥有的额外功能。


    ### 安装 Apple Remote Desktop


    在规划使用 Apple Remote Desktop 时，你需要确定将其安装在何处。对此有几种不同的看法。如果你是组织中唯一的 Mac 技术员，你可以将其安装在你主要的
    Mac 台式机或笔记本电脑上。就远程控制任务的响应速度而言，这将为你提供最佳体验。你可以将所有脚本和安装文件存储在主机上，并且可以随主机数据一起备份整个 ARD
    系统。


    这种方案的缺点是，当你需要在稍后的时间或日期安排安装时，特别是当你的计算机可能未在线或不可用时。例如，假设你想在今晚凌晨 3 点在公司计算机上安排软件安装，但你需要将笔记本电脑带回家，届时它将不在公司网络上，无法推送安装文件和运行任务。在这种情况下，你可能希望设置一个
    `Remote Task Server` 或将 `ARD` 直接安装在专用的 Mac 服务器上，然后从你的工作站使用 `Screen Sharing` 或
    `ARD` 访问该服务器。


    ### 远程任务服务器


    在第 7 章中，我们将更详细地介绍 `macOS Server`，但目前你需要知道的是，与 `Windows` 有特定的服务器版和客户端版不同，任何 Mac
    都可以作为服务器。`ARD` 的 `Remote Task Server` 指的是一台计算机，它按照指定计划对各类任务（如软件安装）进行排队或执行。默认情况下，Apple
    Remote Desktop 会将安装有 `ARD` 应用程序的本地计算机设置为 `Task Server`。


    如安装部分所述，将 Apple Remote Desktop 安装在你主要的工作站上存在一些明显的缺点。其中之一是，当待处理的任务计划正在进行时，你需要保持
    Mac 在线。你可以使用 `Remote Task Server` 来缓解这个问题。通过指定一个 `Remote Task Server`，你可以在工作站上使用
    `ARD`，但所有待处理计划任务都将在远程服务器上排队。


    要配置远程任务服务器，你需要在一台配备 `静态 IP 地址` 的 Mac 上安装 Apple Remote Desktop。打开 `ARD`，从 `Remote
    Desktop` 菜单中选择 `Preferences…`。图 6-2 显示了 `Task Server` 选项卡和 `Use Task Server on
    this computer` 选项，并且 `Allow remote connections to this server` 的复选框已被勾选。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig2_HTML.jpg](img/492151_1_En_6_Fig2_HTML.jpg)


    **图 6-2**

    ARD 偏好设置中的任务服务器选项


    接下来，在已安装 Apple Remote Desktop 的技术员工作站上，启动 `ARD`，从 `Remote Desktop` 菜单中选择 `Preferences…`。点击
    `Task Server` 选项卡，如图 6-3 所示，选择 `Use remote Task Server`，在字段中输入服务器的 `静态 IP 地址`，然后点击
    `Select`。`ARD` 将验证其是否可与远程任务服务器通信，如果成功，则所有未来任务都将设置为在远程服务器上运行。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig3_HTML.jpg](img/492151_1_En_6_Fig3_HTML.jpg)


    **图 6-3**

    配置你的技术员工作站以使用远程任务服务器


    ### 服务器安装


    我首选的方案是在一台配备 `静态 IP 地址` 的 Mac 服务器上安装 `ARD`。这允许我团队中的任何成员访问 `ARD` 控制台并共享所有安装文件或脚本。安装过程与在单台工作站上安装非常相似，只是需要对
    `ARD Preferences` 进行一项更改。


    默认情况下，Apple 设置了一个安全选项，即无法使用 Apple Remote Desktop 远程控制另一台运行 Apple Remote Desktop
    的 Mac。要禁用此功能，请从 `Remote Desktop` 菜单中选择 `Preferences…`，然后点击 `Security` 选项卡，如图 6-4
    所示。勾选 `Allow control of this computer when this application is running` 选项旁边的复选框。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig4_HTML.jpg](img/492151_1_En_6_Fig4_HTML.jpg)


    **图 6-4**

    当 ARD 也在该远程计算机上运行时，允许使用 Apple Remote Desktop 远程控制该计算机


    **专家提示**

    在选择用作 Apple Remote Desktop 服务器的 Mac 时，我建议选择一台拥有较多板载存储的机器——例如配备额外 SSD 硬盘的 `Mac
    Pro` 或配置了双 SSD 硬盘的 `Mac mini`。这将为你将要推送到 Mac 客户端的各种安装包提供充足的存储空间。

    '
- fmt: '### Interface Overview


    图 [6-5](#492151_1_En_6_Chapter.xhtml#Fig5) 突显了 Apple Remote Desktop 控制台的主界面。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig5_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig5_HTML.jpg)


    图 6-5


    Apple Remote Desktop 主窗口中的界面组件


    *   **所有计算机列表：** 默认分组，显示所有已添加到 ARD 的计算机。

    *   **扫描器：** 扫描本地网络并显示可添加到 ARD 控制台的可用计算机。

    *   **文件夹：** 用于包含计算机、任务、扫描器等列表的组织单元。

    *   **列表：** 用于对计算机进行分组的组织单元。

    *   **任务服务器状态：** 本地或远程任务服务器上排队任务的状态。

    *   **活动任务状态：** 正在运行的任务的状态。

    *   **任务历史：** 已完成任务的状态及其成功与否。

    *   **添加组/列表 + 按钮：** 使用此按钮添加额外的计算机列表、扫描器和分组。

    *   **添加计算机按钮：** 使用此按钮通过 IP 地址手动添加计算机，而不是使用扫描器。

    *   **远程观察：** 启动一个仅具有观察访问权限的远程控制窗口。

    *   **远程控制：** 启动一个具有远程控制功能的远程控制窗口。

    *   **私密远程控制：** 启动一个具有远程控制功能的远程控制窗口，但会屏蔽远程用户的显示器，使其在远程控制会话期间无法看到正在发生的情况。

    *   **复制文件：** 将文件从运行 ARD 的 Mac 复制到一台或多台远程计算机。

    *   **安装包：** 从运行 ARD 的 Mac 上的 `*.pkg` 或 `*.mpkg` 文件安装应用程序到一台或多台远程计算机。

    *   **Unix 命令：** 在远程计算机上运行一个或多个 Unix 命令。

    *   **运行报告：** 打开报告查看器并显示对一台或多台远程计算机请求的信息。

    *   **远程搜索：** 根据指定条件远程搜索远程计算机上的文件。

    *   **计算机列表：** 显示所选列表中列出的所有客户端。

    *   **计算机过滤器：** 在搜索栏中输入信息以筛选选定的计算机列表。


    ### 为 ARD 配置 macOS 客户端


    在我们能够搜索并将 Mac 添加到 Apple Remote Desktop 控制台之前，需要在`共享`系统偏好设置中启用`远程管理`服务。如图 [6-6](#492151_1_En_6_Chapter.xhtml#Fig6)
    所示，单击`远程管理`选项。勾选`远程管理`旁边的复选框以启用该服务。系统将提示您选择要启用的各种选项。请在此对话框页面上**勾选所有选项**，然后单击`确定`按钮关闭选项。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig6_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig6_HTML.jpg)


    图 6-6


    启用远程管理服务并选择所有 ARD 管理选项


    在远程管理服务屏幕上，您应该会看到服务旁边有一个*绿色圆圈*，表示它正在运行。单击`计算机设置…`按钮，您将看到一些额外的选项，如图 [6-7](#492151_1_En_6_Chapter.xhtml#Fig7)
    所示。如果您计划允许用户在被观察时看到提示（我们选择是），并且您希望允许用户通过远程管理菜单栏附加项请求帮助（我们选择是），请勾选`在菜单栏中显示远程管理状态`旁边的复选框。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig7_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig7_HTML.jpg)


    图 6-7


    其他远程管理服务客户端设置


    我们还提供了四个可选字段，用于为我们的报告收集额外的临时信息。有许多内置的设备详细信息可以报告，例如处理器速度、RAM 和网络状态。但是，如果我们有一些对我们组织来说是独特的、需要跟踪的信息该怎么办？


    我公司的所有 MacBook 上都贴有一个带有序列化资产标签编号的特殊属性贴纸。我希望也能报告此信息，因此我可以使用`信息 1`字段手动输入此特定客户端的资产标签信息。通过这样做，当我将来提取报告时，我也可以收集该数据，而无需亲自访问每台机器并检查贴在笔记本电脑底部的贴纸。'
  raw: '### Interface Overview


    Figure [6-5](#492151_1_En_6_Chapter.xhtml#Fig5) highlights the main interface
    of the Apple Remote Desktop console.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig5_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Interface components in the main Apple Remote Desktop window


    *   **All Computers List** **:** The default group showing all computers that
    have been added to ARD.


    *   **Scanner:** The scanner tool scans the local network and displays available
    computers that can be added to the ARD console.


    *   **Folder:** An organizational unit for containing lists of computers, tasks,
    scanners, and so on.


    *   **List:** An organizational unit for grouping computers.


    *   **Task Server Status:** The status of queued tasks on the local or remote
    Task Server.


    *   **Active Task Status:** The status of actively running tasks.


    *   **Task History:** The status of already completed tasks and if they completed
    successfully or not.


    *   **Add Groups/Lists + Button:** Use this button to add additional computer
    lists, scanners, and groups.


    *   **Add Computers Button:** Use this button to manually add a computer by IP
    address instead of using the scanner.


    *   **Remote Observe:** Starts a remote control window with observation-only access.


    *   **Remote Control:** Starts a remote control window with remote control capabilities.


    *   **Private Remote Control:** Starts a remote control window with remote control
    capabilities, but it blanks out the display of the remote user so they cannot
    see what is happening during the remote control session.


    *   **Copy Files:** Copies files from the Mac running ARD to one or more remote
    computers.


    *   **Install Package:** Installs an application from a **∗.pkg** or **∗.mpkg**
    file from the Mac running ARD to one or more remote computers.


    *   **Unix Command:** Runs one or more Unix commands on remote computers.


    *   **Run Report:** Opens the Report Viewer and displays information requested
    of one or more remote computers.


    *   **Remote Search:** Remotely searches remote computers for files based on specified
    criteria.


    *   **Computer List:** Displays all of the clients listed in the selected list.


    *   **Computer Filter:** Enter information into the search bar to filter the selected
    computer list.


    ### Configuring macOS Clients for ARD


    Before we can search and add Macs to our Apple Remote Desktop console, we need
    to enable the *Remote Management* service in the *Sharing System Preference*.
    As shown in Figure [6-6](#492151_1_En_6_Chapter.xhtml#Fig6), click the **Remote
    Management** option. **Check** the box next to Remote Management to enable the
    service. It will prompt you to select the various options you want to enable.
    Go ahead and **check all the boxes** on this dialog sheet and then click the **Ok**
    button to dismiss the options.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig6_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Enable the Remote Management service and select all the ARD management options


    On the Remote Management service screen, you should see a *green circle* next
    to the service indicating that it is now running. Click the **Computer Settings…**
    button, and you will see some additional options as shown in Figure [6-7](#492151_1_En_6_Chapter.xhtml#Fig7).
    If you are planning to allow users to see when they are being observed (we are)
    and you want to allow users to request assistance through the Remote Management
    menu bar extra (we do), check the box next to **Show Remote Management status
    in menu bar**.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig7_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Additional Remote Management service client settings


    We are also provided with four optional fields for collecting additional ad hoc
    information for our reports. There are a number of built-in device details that
    are able to be reported on such as processor speed, RAM, and network status. But
    what if we have something that is unique to our organization that we need to track?


    I have a special property sticker on all of the MacBooks at my company with a
    serialized asset tag number. I would like to report on this information as well,
    so I can use the **Info 1** field to manually enter the asset tag information
    for this particular client. By doing this, when I pull a report in the future,
    I can also gather that data without having to physically visit every machine and
    inspect the sticker affixed to the bottom of the laptop.'
