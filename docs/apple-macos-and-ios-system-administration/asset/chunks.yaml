  trans: '

    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig7_HTML.jpg](img/492151_1_En_12_Fig7_HTML.jpg)


    图 12-7


    配置“限制”负载


    既然我们已通过五个负载完成所有配置，请点击`OK`按钮保存配置，然后如图 12-8 所示点击`Save`按钮，将新设置应用到`MyCompany BYOD`设备组。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig8_HTML.jpg](img/492151_1_En_12_Fig8_HTML.jpg)


    图 12-8


    点击保存以将配置应用到我们的设备组


    非常好！现在我们的 BYOD 组已准备就绪，所有加入此组的设备都将获得这些设置和要求。接下来我们需要做的是在“MyCompany BYOD”设备组中为我们的设备添加一些占位符。幸运的是，这可以通过我们为最终用户定义的流程轻松完成，即他们通过我们的网页表单提交工单来申请此访问权限。


    **专业提示**


    你可以根据公司规模以及津贴、审批等相关流程，以多种方式实现这一点。这真的取决于每个公司的具体情况。我见过 IT 部门直接通过电子邮件向每位用户发送配置描述文件，也见过在
    IT 获准为指定设备启用注册前需要经过包含多个审批步骤的完整流程。


    我们有三项新 BYOD 成员的待处理请求。现在，让我们通过创建匹配的占位符并将它们添加到我们的`MyCompany BYOD`设备组来满足这些请求。操作方式与我们在前几章所做的类似，只是多了一个额外步骤——将占位符分配给设备组，而不是为每个设备单独配置设置。


    点击左侧边栏的`Devices`按钮，然后点击设备窗格右下角的`+`按钮并选择`Add Placeholder`。如图 12-9 所示输入占位符信息。我们将使用`Serial
    Number`作为标识符。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig9_HTML.jpg](img/492151_1_En_12_Fig9_HTML.jpg)


    图 12-9


    为每台 BYOD 设备创建一个占位符


    当`Dan’s iPhone`的占位符出现在设备列表中后，再次点击左侧边栏的`Device Groups`按钮，然后点击`MyCompany BYOD`设备组将其选中。接着，在`Members`选项卡上，如图
    12-10 所示点击`+`按钮并选择`Add Devices`。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig10_HTML.jpg](img/492151_1_En_12_Fig10_HTML.jpg)


    图 12-10


    将设备成员添加到设备组


    点击`Dan’s iPhone`旁边的`Add`按钮，然后如图 12-11 所示点击`Done`按钮关闭对话框。点击`Save`按钮以保存我们对`MyCompany
    BYOD`设备组成员资格所做的更改。再为另外两个占位符设备重复这些步骤，并确保其中一个的序列号与你的物理测试设备匹配，以便我们可以进行测试并查看结果。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig11_HTML.jpg](img/492151_1_En_12_Fig11_HTML.jpg)


    图 12-11


    将占位符添加到组中


    现在我们已经将占位符设备分配到了设备组，接下来是向用户提供注册描述文件，以便他们能够将自己的设备添加到 MDM 并接收我们的配置设置。有几种方法可以做到这一点。如果你的
    Profile Manager 服务器连接到公司 LDAP（如 Active Directory），你可以将`Dan’s iPhone`与其用户账户关联，并允许他使用`My
    Devices Portal`加入设备，同时限制只能注册已分配的设备，如图 12-12 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig12_HTML.jpg](img/492151_1_En_12_Fig12_HTML.jpg)


    图 12-12


    选择一个现有用户账户，将设备分配给该用户，并允许其访问“我的设备”门户


    你也可以简单地创建一个新的注册描述文件，通过电子邮件发送给用户，这样他们就可以在手机上将其作为附件访问，并按照提示安装。或者，你可以将注册描述文件托管在内部
    Web 服务器上，并指引用户到该位置下载和安装。


    最后，你可以引导用户访问`My Devices Portal`并将`Everyone`组配置为允许注册，但要确保如图 12-13 所示启用`Restrict
    enrollment to placeholder devices`。以上任何选项都是可以接受的，你需要根据具体情况决定哪种方式最适合。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig13_HTML.jpg](img/492151_1_En_12_Fig13_HTML.jpg)


    图 12-13


    为设备自助注册配置“所有人”组


    在我们的示例中，我们将为`Everyone`组使用`My Devices Portal`选项。现在，打开你的测试 iPhone 并浏览到 MDM 服务器的`/mydevices`子目录。例如，我的网址是[`https://579testing.com/mydevices`](https://579testing.com/mydevices)。完成身份验证后，页面加载时点击蓝色的`Enroll`按钮，并按照提示下载和安装注册描述文件。此时，系统将找到匹配的占位符并开始应用我们的负载。


    完成后，浏览你的设备以确保 Wi-Fi、VPN 和应用的限制已就位。你可以随意使用 Profile Manager 中的管理选项擦除测试设备，或直接在设备上手动删除描述文件以查看即时效果。这就是你可以从一台非受监管的
    BYOD 设备上预期的行为。


    **专业提示**


    随着业务需求的变化，你可能需要更新、修改或添加新的配置设置和负载。你可以随时修改 MyCompany BYOD 设备组的设置，这些更改将立即应用于属于该组的所有设备。


    现在，你已经启用了一个大规模的 BYOD 解决方案。将来，你只需创建额外的占位符，并让你的最终用户自助注册，MDM 将为你处理其余的工作。

