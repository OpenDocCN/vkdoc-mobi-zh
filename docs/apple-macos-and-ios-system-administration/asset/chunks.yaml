- fmt: '### Managed Software Center


    We have successfully installed the Managed applications, but where are the **Optional
    Installs** that we made available to the end users who can choose if they want
    to install them or not? Your end users can browse these applications and install
    them via the `Managed Software Center` application which is installed as part
    of `MunkiTools` and found in `/Applications`. On your test Mac client, open the
    `Managed Software Center` as shown in Figure [10-43](#492151_1_En_10_Chapter.xhtml#Fig43).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig43_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig43_HTML.jpg)


    Figure 10-43


    The Managed Software Center application for end-user interaction


    `Managed Software Center` looks like the `Mac App Store` application and functions
    very similar. It provides a shopping cart experience for users to select optional
    applications, and they can simply click the **Install** button under any application
    that is assigned to their computer via the Manifest to install it. They do not
    need Administrator access to install, and they can manage their own updates on
    their own timeline. Go ahead and install `Adobe Flash Player`, `Audacity`, and
    `VLC Media Player` on our test Mac so you get a feel for how this works.


    Pro Tip


    Do you see how the various categories we used when importing the software package
    into `Munki` are leveraged in the `Managed Software Center`? If you plan to use
    this tool for a large number of applications, those categories will be very useful
    as you build out your testing and production Catalogs.


    ### Catalogs


    Now that we have been working with Manifests and deploying software to a test
    machine, we should discuss `Catalogs` in a bit more detail. With the goal of keeping
    our `Munki` environment as simple as possible, we should think about how many
    Catalogs we will need. I typically use two Catalogs: one for testing and one for
    production. My testing Catalog is only used on my non-production machines to ensure
    that a package installs and runs as expected before it gets installed on all of
    the machines in my organization.


    In `MunkiAdmin`, click the **Catalog** button in the toolbar to switch to the
    Catalog view. We should see our **testing** Catalog in this list. I always like
    to use the testing catalog as the default place to import our software packages.
    After testing is completed, I add those packages to the production Catalog. Let’s
    create a **production** Catalog so you can see how this will work. Choose **New
    Catalog** from the **File** menu. When prompted, name this catalog **production**
    as shown in Figure [10-44](#492151_1_En_10_Chapter.xhtml#Fig44).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig44_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig44_HTML.jpg)


    Figure 10-44


    Creating a new Catalog named “production”


    By default, no packages are enabled in a new Catalog. Click the new **production**
    Catalog in the left sidebar to select it and then **check the boxes** next to
    the packages we want to put into production. We will check the box next to every
    application except `Adobe Acrobat Reader` and `MunkiTools`. Your `MunkiAdmin`
    window should look similar to Figure [10-45](#492151_1_En_10_Chapter.xhtml#Fig45).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig45_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig45_HTML.jpg)


    Figure 10-45


    Selecting the applications that will be listed in our production Catalog


    **Save** the changes to the Catalogs and **reload** the `MunkiAdmin` console.
    Next, we are going to edit the **site_default** Manifest and remove the **testing**
    Catalog and replace it with the **production** Catalog. This will ensure that
    only approved applications that are included in production are applied to clients
    that are subscribed to our **site_default** Manifest.


    Open the Properties of the **site_default** Manifest and make a small change to
    the **General** tab. **Uncheck** the **testing** Catalog and **check** the **production**
    catalog. Go to the **Managed Installs** tab and remove `Acrobat Reader` from the
    list. **Save** and **reload** the `MunkiAdmin` console. The next time that `Munki`
    runs on a client machine, it will only look for available software in the **production**
    Catalog.


    Pro Tip


    Because we removed the `Adobe Acrobat Reader` from the production Catalog, that
    does not mean it will uninstall it from any clients that already have it installed.
    It will only prevent it from installing on future runs.


    ### Uninstalling Applications


    We installed `Acrobat Reader` on our test system, but now we want to uninstall
    it. We can use `Munki` to do this for us. First, we can **edit** the **site_default**
    Manifest and add the **testing** Catalog back in. Since you can have multiple
    Catalogs in each Manifest, we will enable both production and testing. Next, we
    can go to the **Managed Uninstalls** tab and click the **+** button and select
    `Adobe Acrobat Reader` from the list. **Save** and **reload**. On the test client,
    force `Munki` to run, and it will uninstall `Acrobat Reader` from the system.


    I used the `managedsoftwareupdate --installonly` command via the Terminal, and
    it ran successfully. You can see from Figure [10-46](#492151_1_En_10_Chapter.xhtml#Fig46)
    that as it scanned through the Bill of Materials for the Adobe Acrobat Reader
    uninstaller, it found the files that were no longer needed on my system and removed
    them. Since `Adobe Acrobat Reader` is no longer in the list of Managed Installs,
    it will not attempt to reinstall the software.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig46_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig46_HTML.jpg)


    Figure 10-46


    Uninstalling Adobe Acrobat Reader


    Pro Tip


    Notice that it also removed the Receipt info for `Adobe Acrobat Reader`? If at
    a later date we want to add `Acrobat Reader` back onto this machine, `Munki` will
    see that there is no longer a Receipt for this package and schedule it to install
    again.


    ## Summary


    `Munki` is a very powerful tool, and we have only scratched the surface when it
    comes to using all of the capabilities it provides. If you are planning to use
    `Munki` to manage all of your software deployments in a production environment,
    I would recommend visiting the `Munki` GitHub page to learn more. There is a very
    active community of `Munki` administrators out there that can provide you with
    many ideas as you plan your deployment strategy and build out the `Munki` environment.


    # 11. Microsoft Integration


    Apple has continued to update their operating systems to work better in heterogeneous
    environments over the past decade. In this chapter, we are going to explore the
    various ways that a Mac or iOS device can integrate seamlessly into a corporate
    network that is based primarily on technologies from Microsoft Corp. Apple provides
    a number of built-in solutions that help with this multi-platform integration,
    but there are some third-party solutions available that go even further. In this
    chapter, we will discuss several of the built-in solutions and related strategies
    to support Apple products on a corporate network with minimal reconfiguration
    or cost.'
  raw: '### Managed Software Center


    We have successfully installed the Managed applications, but where are the **Optional
    Installs** that we made available to the end users who can choose if they want
    to install them or not? Your end users can browse these applications and install
    them via the *Managed Software Center* application which is installed as part
    of *MunkiTools* and found in ***/Applications***. On your test Mac client, open
    the *Managed Software Center* as shown in Figure [10-43](#492151_1_En_10_Chapter.xhtml#Fig43).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig43_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig43_HTML.jpg)


    Figure 10-43


    The Managed Software Center application for end-user interaction


    Managed Software Center looks like the *Mac App Store* application and functions
    very similar. It provides a shopping cart experience for users to select optional
    applications, and they can simply click the **Install** button under any application
    that is assigned to their computer via the Manifest to install it. They do not
    need Administrator access to install, and they can manage their own updates on
    their own timeline. Go ahead and install *Adobe Flash Player*, *Audacity*, and
    *VLC Media Player* on our test Mac so you get a feel for how this works.


    Pro Tip


    Do you see how the various categories we used when importing the software package
    into *Munki* are leveraged in the Managed Software Center? If you plan to use
    this tool for a large number of applications, those categories will be very useful
    as you build out your testing and production Catalogs.


    ### Catalogs


    Now that we have been working with Manifests and deploying software to a test
    machine, we should discuss *Catalogs* in a bit more detail. With the goal of keeping
    our *Munki* environment as simple as possible, we should think about how many
    Catalogs we will need. I typically use two Catalogs: one for testing and one for
    production. My testing Catalog is only used on my non-production machines to ensure
    that a package installs and runs as expected before it gets installed on all of
    the machines in my organization.


    In *MunkiAdmin*, click the **Catalog** button in the toolbar to switch to the
    Catalog view. We should see our **testing** Catalog in this list. I always like
    to use the testing catalog as the default place to import our software packages.
    After testing is completed, I add those packages to the production Catalog. Let’s
    create a ***production*** Catalog so you can see how this will work. Choose **New
    Catalog** from the **File** menu. When prompted, name this catalog ***production***
    as shown in Figure [10-44](#492151_1_En_10_Chapter.xhtml#Fig44).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig44_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig44_HTML.jpg)


    Figure 10-44


    Creating a new Catalog named “production”


    By default, no packages are enabled in a new Catalog. Click the new **production**
    Catalog in the left sidebar to select it and then **check the boxes** next to
    the packages we want to put into production. We will check the box next to every
    application except *Adobe Acrobat Reader* and *MunkiTools*. Your *MunkiAdmin*
    window should look similar to Figure [10-45](#492151_1_En_10_Chapter.xhtml#Fig45).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig45_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig45_HTML.jpg)


    Figure 10-45


    Selecting the applications that will be listed in our production Catalog


    **Save** the changes to the Catalogs and **reload** the *MunkiAdmin* console.
    Next, we are going to edit the **site_default** Manifest and remove the **testing**
    Catalog and replace it with the **production** Catalog. This will ensure that
    only approved applications that are included in production are applied to clients
    that are subscribed to our **site_default** Manifest.


    Open the Properties of the **site_default** Manifest and make a small change to
    the **General** tab. **Uncheck** the **testing** Catalog and **check** the **production**
    catalog. Go to the **Managed Installs** tab and remove *Acrobat Reader* from the
    list. **Save** and **reload** the *MunkiAdmin* console. The next time that *Munki*
    runs on a client machine, it will only look for available software in the **production**
    Catalog.


    Pro Tip


    Because we removed the *Adobe Acrobat Reader* from the production Catalog, that
    does not mean it will uninstall it from any clients that already have it installed.
    It will only prevent it from installing on future runs.


    ### Uninstalling Applications


    We installed *Acrobat Reader* on our test system, but now we want to uninstall
    it. We can use *Munki* to do this for us. First, we can **edit** the **site_default**
    Manifest and add the **testing** Catalog back in. Since you can have multiple
    Catalogs in each Manifest, we will enable both production and testing. Next, we
    can go to the **Managed Uninstalls** tab and click the **+** button and select
    *Adobe Acrobat Reader* from the list. **Save** and **reload**. On the test client,
    force *Munki* to run, and it will uninstall *Acrobat Reader* from the system.


    I used the `managedsoftwareupdate --installonly` command via the Terminal, and
    it ran successfully. You can see from Figure [10-46](#492151_1_En_10_Chapter.xhtml#Fig46)
    that as it scanned through the Bill of Materials for the Adobe Acrobat Reader
    uninstaller, it found the files that were no longer needed on my system and removed
    them. Since *Adobe Acrobat Reader* is no longer in the list of Managed Installs,
    it will not attempt to reinstall the software.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig46_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig46_HTML.jpg)


    Figure 10-46


    Uninstalling Adobe Acrobat Reader


    Pro Tip


    Notice that it also removed the Receipt info for *Adobe Acrobat Reader*? If at
    a later date we want to add *Acrobat Reader* back onto this machine, *Munki* will
    see that there is no longer a Receipt for this package and schedule it to install
    again.


    ## Summary


    *Munki* is a very powerful tool, and we have only scratched the surface when it
    comes to using all of the capabilities it provides. If you are planning to use
    *Munki* to manage all of your software deployments in a production environment,
    I would recommend visiting the *Munki* GitHub page to learn more. There is a very
    active community of *Munki* administrators out there that can provide you with
    many ideas as you plan your deployment strategy and build out the *Munki* environment.


    # 11. Microsoft Integration


    Apple has continued to update their operating systems to work better in heterogeneous
    environments over the past decade. In this chapter, we are going to explore the
    various ways that a Mac or iOS device can integrate seamlessly into a corporate
    network that is based primarily on technologies from Microsoft Corp. Apple provides
    a number of built-in solutions that help with this multi-platform integration,
    but there are some third-party solutions available that go even further. In this
    chapter, we will discuss several of the built-in solutions and related strategies
    to support Apple products on a corporate network with minimal reconfiguration
    or cost.'
  trans: '

    ### 管理软件中心


    我们已经成功安装了托管应用程序，但那些提供给最终用户、由他们选择是否安装的**可选安装**在哪里呢？您的最终用户可以通过作为 `MunkiTools` 的一部分安装、位于
    `/Applications` 目录下的 `Managed Software Center` 应用程序来浏览这些应用并进行安装。在您的测试 Mac 客户端上，按照图
    10-43 所示打开 `Managed Software Center`。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig43_HTML.jpg](img/492151_1_En_10_Fig43_HTML.jpg)


    图 10-43

    用于最终用户交互的管理软件中心应用程序


    `Managed Software Center` 的外观类似 `Mac App Store` 应用程序，功能也非常相似。它为用户提供购物车般的体验，以选择可选应用程序；对于通过清单分配给其计算机的任何应用程序，他们只需点击**安装**按钮即可安装。安装时无需管理员权限，并且他们可以按照自己的时间线管理更新。请在我们的测试
    Mac 上继续安装 `Adobe Flash Player`、`Audacity` 和 `VLC Media Player`，以便感受其工作原理。


    专业提示


    您是否注意到，将软件包导入 `Munki` 时所使用的各类别在 `Managed Software Center` 中得到了利用？如果您计划使用此工具管理大量应用程序，在构建测试和生产目录时，这些类别将非常有用。


    ### 目录


    现在我们已经处理了清单并向测试机器部署了软件，应该更详细地讨论一下 `Catalogs`。为了让 `Munki` 环境尽可能简单，我们应该考虑需要多少个目录。我通常使用两个目录：一个用于测试，一个用于生产。我的测试目录仅用于非生产机器，以确保软件包在安装到组织内所有机器之前能按预期安装和运行。


    在 `MunkiAdmin` 中，点击工具栏的**目录**按钮以切换到目录视图。我们应该在这个列表中看到我们的**测试**目录。我总是喜欢将测试目录作为导入软件包的默认位置。测试完成后，我再将这些软件包添加到生产目录中。让我们创建一个**生产**目录，以便您了解其工作方式。从**文件**菜单中选择**新建目录**。在提示时，将此目录命名为
    **production**，如图 10-44 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig44_HTML.jpg](img/492151_1_En_10_Fig44_HTML.jpg)


    图 10-44

    创建一个名为“production”的新目录


    默认情况下，新目录中没有启用任何软件包。在左侧边栏中点击新建的**生产**目录以选中它，然后在我们想要投入生产的软件包旁边**勾选复选框**。我们将勾选除
    `Adobe Acrobat Reader` 和 `MunkiTools` 之外的所有应用程序旁边的复选框。您的 `MunkiAdmin` 窗口应类似于图
    10-45。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig45_HTML.jpg](img/492151_1_En_10_Fig45_HTML.jpg)


    图 10-45

    选择将列在我们生产目录中的应用程序


    **保存**对目录的更改并**重新加载** `MunkiAdmin` 控制台。接下来，我们将编辑 **site_default** 清单，移除**测试**目录，并用**生产**目录替换它。这将确保仅包含在生产目录中且已获批准的应用程序会应用到订阅了我们
    **site_default** 清单的客户端。


    打开 **site_default** 清单的属性，并对**常规**选项卡做一个小修改。**取消勾选** **testing** 目录并**勾选** **production**
    目录。转到**托管安装**选项卡，从列表中移除 `Acrobat Reader`。**保存**并**重新加载** `MunkiAdmin` 控制台。下次 `Munki`
    在客户端机器上运行时，它将只在**生产**目录中查找可用软件。


    专业提示


    因为我们从生产目录中移除了 `Adobe Acrobat Reader`，但这并不意味着它会从任何已安装该软件的客户端上卸载它。这只是防止它在后续运行中被安装。


    ### 卸载应用程序


    我们在测试系统上安装了 `Acrobat Reader`，但现在我们想卸载它。我们可以使用 `Munki` 来为我们完成此操作。首先，我们可以**编辑**
    **site_default** 清单，将**测试**目录添加回来。由于每个清单中可以包含多个目录，我们将同时启用生产和测试目录。接下来，我们可以转到**托管卸载**选项卡，点击
    **+** 按钮，从列表中选择 `Adobe Acrobat Reader`。**保存**并**重新加载**。在测试客户端上，强制运行 `Munki`，它将从系统中卸载
    `Acrobat Reader`。


    我通过终端使用了 `managedsoftwareupdate --installonly` 命令，并且运行成功。从图 10-46 可以看出，在扫描 Adobe
    Acrobat Reader 卸载程序的物料清单时，它发现了我的系统上不再需要的文件并将其移除。由于 `Adobe Acrobat Reader` 已不在托管安装列表中，它将不会尝试重新安装该软件。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig46_HTML.jpg](img/492151_1_En_10_Fig46_HTML.jpg)


    图 10-46

    卸载 Adobe Acrobat Reader


    专业提示


    注意到它也移除了 `Adobe Acrobat Reader` 的收据信息吗？如果日后我们想将 `Acrobat Reader` 重新添加到此机器上，`Munki`
    将看到此软件包不再有收据，并会再次安排其安装。


    ## 总结


    `Munki` 是一个非常强大的工具，而我们目前只触及了其所有功能的表面。如果您计划在生产环境中使用 `Munki` 来管理所有软件部署，我建议访问 `Munki`
    的 GitHub 页面以了解更多信息。那里有一个非常活跃的 `Munki` 管理员社区，可以在您规划部署策略和构建 `Munki` 环境时为您提供许多思路。


    # 11. Microsoft 集成


    在过去十年中，苹果公司持续更新其操作系统，以使其在异构环境中更好地工作。在本章中，我们将探讨 Mac 或 iOS 设备可以无缝集成到主要基于微软公司技术的企业网络中的各种方式。苹果提供了一些内置解决方案来帮助实现这种多平台集成，但也有一些第三方解决方案可以做得更多。在本章中，我们将讨论几种内置解决方案及相关策略，以在对企业网络进行最小化重新配置或成本投入的情况下支持苹果产品。

