    any number of company-owned iOS devices that can scale from ten devices up to
    hundreds if needed. Any IT department can follow these basic steps to develop
    a deployment plan for staging and supporting iOS devices with minimal effort.


    # 13. Deployment of macOS Clients


    ## Introduction


    Throughout this book, we have covered many *macOS* concepts from basic support
    tools, client utilities, *Profile Manager*, integration with technologies from
    *Microsoft Corp*, and open source deployment tools like *Munki* and *Munki-Pkg*.
    In this final chapter, we are going to pull all of these concepts together and
    step through the process of staging a standard Mac-based office environment.


    In this scenario, we are going to deploy ten Macs for a new web design department
    that our company is hiring for. While the entire department will be using *macOS*-based
    computers, they will need to interact and share data using the same solutions
    that the rest of the Windows-based PC users do.


    ### Planning Your Deployment


    As we discussed in Chapter [12](#492151_1_En_12_Chapter.xhtml), it is a good idea
    to logically plan our deployments before the developing the technology solution
    that will be put into production. First, we need to understand the systems, infrastructure,
    and tools available to us. Figure [13-1](#492151_1_En_13_Chapter.xhtml#Fig1) provides
    an updated diagram of our company’s network. We have our standard *Windows server*
    and *Active Directory* structure from Chapter [11](#492151_1_En_11_Chapter.xhtml),
    our *Munki* environment from Chapter [10](#492151_1_En_10_Chapter.xhtml), and
    *Profile Manager* with DEP integration from Chapter [9](#492151_1_En_9_Chapter.xhtml).
    Our Mac administrative desktop is running *Apple Remote Desktop* and *MunkiAdmin*.
    We have all of the required pieces in place to support our department of Mac users.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig1_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig1_HTML.jpg)


    Figure 13-1


    The example company’s current network infrastructure


    Next, we can begin our requirements gathering exercise. In discussion with the
    company leadership, you have heard that while there are ten designers joining
    the company, this new department is expected to grow exponentially over the next
    12–18 months as this new team takes on additional strategic projects for the organization.
    You also hear that while the size of this new department grows, the IT staffing
    expense must remain flat. Fortunately, you have the tools necessary to deploy
    ten or even a hundred new Macs with nearly the same level of effort.


    In addition to keeping this a very efficient deployment and support process, we
    also need to ensure a common user experience with *Windows*. This will minimize
    support headaches, provide a more consistent office environment, and foster collaboration
    between users of the diverse platforms. This also has the added benefit of keeping
    our infrastructure costs in line. Here’s a quick hit list of requirements as we
    build out our Mac deployment project:


    *   As close to “zero touch” as possible for the IT desktop technicians deploying
    these systems


    *   Integration with the company’s *Active Directory* and *Office 365* solutions


    *   Access to Windows-based network shares


    *   Access to Windows-based network printers


    *   Desktop security and UI customizations on par with Windows GPO settings


    *   Suite of required software applications including *Microsoft Office* and *Adobe*
    products and access to several web browsers for testing


    Based on this list, we will need these Macs to be easy for our IT team to set
    up and deploy, and we can use Device Enrollment Program to point these new machines
    to our *Profile Manager* environment. We will use *Active Directory* and *Profile
    Manager* to configure settings and services that closely mirror the company’s
    existing *Windows* PC installation. Finally, we will need to package a couple
    of *Adobe* installers into *Munki* and deploy *Microsoft Office* via VPP so that
    the Macs download and install these required applications automatically. Let’s
    get started!


    ## Configuring Active Directory


    The very first thing we will do is configure *Active Directory* . As is typical
    of any new users in my organization, I will need to create a user account for
    each new hire and add them to the appropriate group. Open **Active Directory Users
    & Computers** and create ten new user accounts. Name them whatever you would like
    and set a default password for each. After you have created these accounts, open
    the **Main Office Group** and add these new hires as members. When completed,
    the Main Office group should look similar to Figure [13-2](#492151_1_En_13_Chapter.xhtml#Fig2).


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig2_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig2_HTML.jpg)


    Figure 13-2


    Create ten new user accounts as members of our Main Office group in Active Directory


    Next, we are going to go to ***Main Office Computers*** ➤ ***macOS PCs OU*** and
    add ten computer records for these new Macs. Go ahead and name these anything
    you like. I’m going to follow my naming scheme that I used in Chapter [11](#492151_1_En_11_Chapter.xhtml)
    for consistency. Once you have created ten new computer records to represent the
    new Macs we are going to assign to this new web developer team, your ***macOS
    PCs OU*** should look like Figure [13-3](#492151_1_En_13_Chapter.xhtml#Fig3).


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig3_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig3_HTML.jpg)


    Figure 13-3


    Create ten new computer records in the macOS PCs OU


    At this point, we are done configuring Active Directory.


    ## Configuring Profile Manager


    Now that we have our user accounts and computer records created in Active Directory,
    we are ready to begin configuring *Profile Manager* to enroll our new devices.
    In this section, we will use DEP to enroll the Macs into our MDM during the *Setup
    Assistant* and configure Profile Manager to enforce security restrictions using
    a *Device Group* . We will also create some Configuration Profile payloads to
    join our Macs to the domain, map network shares, and more.'
  trans: '

    在为每台新设备点击旁边的`添加`按钮后，点击`完成`按钮，然后点击`保存`按钮，将这些更改应用到设备组。至此，您已向`销售团队 iPad`设备组添加了十台占位符
    iPad，配置了设置和限制，并分配了两个必需的应用程序。现在，**描述文件管理器**已配置完毕，随时可以将这些新设备部署给最终用户。


    如果您想向该组添加第十一台 iPad，可以使用一台测试设备进行尝试。在一台全新安装`iPadOS`、属于`销售团队 iPad`组的设备上，逐步完成设置助理，您将跳过设置助理的多个屏幕。现在，到达主屏幕后，信息、FaceTime
    和 App Store 应用程序将会消失；几分钟后，Zoom 和 Salesforce 应用程序将会出现。


    专业提示


    由于我们在设置助理的激活过程中将这些设备注册到 MDM 中，最终用户可以随意擦除和重置设备；一旦设备再次运行设置助理，它将立即以完全相同的方式被管理和重新配置。这有效地允许这些远程用户按需自行重新部署设备，而只需
    IT 部门提供最少的协助。


    ## 总结


    在本章中，我们演练了在许多大中型企业中 iOS 设备日常支持中常见的几种场景。我们建立了一个简单的 BYOD 模式，并制定了一个用于远程配置任意数量公司自有
    iOS 设备的流程，该流程可以根据需要从十台设备扩展到数百台设备。任何 IT 部门都可以遵循这些基本步骤，以最小的努力制定 iOS 设备的部署和支持计划。


    # 第 13 章 macOS 客户端的部署


    ## 引言


    在本书中，我们涵盖了众多`macOS`概念，从基本支持工具、客户端实用程序、`描述文件管理器`，到与`微软公司`技术的集成，以及如`Munki`和`Munki-Pkg`等开源部署工具。在这最后一章中，我们将综合所有这些概念，并逐步演练构建一个标准
    Mac 办公环境的过程。


    在本场景中，我们将为即将招聘的新网页设计部门部署十台 Mac。虽然整个部门都将使用基于`macOS`的计算机，但他们需要与公司其他使用基于 Windows
    PC 的用户使用相同的解决方案进行交互和共享数据。


    ### 规划部署


    正如我们在第 12 章中讨论的，在制定将投入生产的技术解决方案之前，从逻辑上规划我们的部署是一个好主意。首先，我们需要了解可用的系统、基础设施和工具。图 13-1
    提供了我们公司网络的最新示意图。我们拥有第 11 章中的标准`Windows 服务器`和`Active Directory`架构、第 10 章中的`Munki`环境，以及第
    9 章中支持 DEP 集成的`描述文件管理器`。我们的 Mac 管理桌面运行着`Apple Remote Desktop`和`MunkiAdmin`。我们已经具备了支持
    Mac 用户部门所需的所有组件。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig1_HTML.jpg](img/492151_1_En_13_Fig1_HTML.jpg)


    图 13-1

    示例公司当前网络基础设施


    接下来，我们可以开始需求收集工作。在与公司领导层的讨论中，您了解到虽然有十名设计师加入公司，但在未来 12-18 个月内，随着新团队承担更多的组织战略项目，这个新部门预计将呈指数级增长。您还获悉，即使该部门规模扩大，IT
    人员开支也必须保持不变。幸运的是，您拥有的工具可以以几乎相同的投入水平来部署十台甚至一百台新 Mac。


    除了保持这是一个非常高效的部署和支持流程外，我们还需要确保与`Windows`有共同的用户体验。这将最大限度地减少支持难题，提供更一致的办公环境，并促进不同平台用户之间的协作。这也具有保持基础设施成本可控的额外好处。以下是我们构建
    Mac 部署项目时需满足的快速需求清单：


    *   对于部署这些系统的 IT 桌面技术人员，尽可能接近"零接触"

    *   与公司的`Active Directory`和`Office 365`解决方案集成

    *   访问基于 Windows 的网络共享

    *   访问基于 Windows 的网络打印机

    *   桌面安全和 UI 自定义与 Windows GPO 设置相当

    *   必需的软件应用程序套件，包括`Microsoft Office`和`Adobe`产品，以及访问多个用于测试的网页浏览器


    基于此列表，我们需要让 IT 团队能够轻松设置和部署这些 Mac，我们可以使用设备注册计划将这些新设备指向我们的`描述文件管理器`环境。我们将使用`Active
    Directory`和`描述文件管理器`来配置与公司现有`Windows` PC 安装密切相关的设置和服务。最后，我们需要将几个`Adobe`安装程序打包到`Munki`中，并通过
    VPP 部署`Microsoft Office`，以便 Mac 自动下载并安装这些必需的应用程序。让我们开始吧！


    ## 配置 Active Directory


    我们要做的第一件事是配置`Active Directory`。与我组织中任何新用户的典型做法一样，我需要为每位新员工创建用户帐户，并将其添加到适当的组中。打开`Active
    Directory 用户和计算机`，创建十个新的用户帐户。任意命名它们并为每个设置默认密码。创建这些帐户后，打开`主办公室组`并将这些新员工作为成员添加进去。完成后，主办公室组应类似于图
    13-2。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig2_HTML.jpg](img/492151_1_En_13_Fig2_HTML.jpg)


    图 13-2

    在 Active Directory 中创建十个新用户帐户作为我们主办公室组的成员


    接下来，我们将转到`主办公室计算机`➤`macOS 电脑 OU`，并为这些新 Mac 添加十个计算机记录。请随意命名这些记录。我将遵循第 11 章中使用的命名方案以保持一致性。一旦您创建了十个新的计算机记录来代表我们将分配给这个新网页开发团队的新
    Mac，您的`macOS 电脑 OU`应如图 13-3 所示。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig3_HTML.jpg](img/492151_1_En_13_Fig3_HTML.jpg)


    图 13-3

    在 macOS 电脑 OU 中创建十个新的计算机记录


    至此，我们已完成 Active Directory 的配置。


    ## 配置描述文件管理器


    现在我们已经 Active Directory 中创建了用户帐户和计算机记录，可以开始配置`描述文件管理器`以注册我们的新设备了。在本节中，我们将使用 DEP
    在`设置助理`期间将 Mac 注册到我们的 MDM，并配置描述文件管理器使用`设备组`来强制执行安全限制。我们还将创建一些配置文件有效负载，以将 Mac 加入域、映射网络共享等。

