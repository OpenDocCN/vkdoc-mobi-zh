- fmt: '### Moving the Migrated Data into Place


    By default there will be some cleanup to do after the data is migrated if you
    use the Migration Assistant. When it completes, you’ll be able to sign in with
    the new local user account, and all of the data will be available in the new home
    directory. To finish with the migration, we will need to use the `Get Info` settings
    on the migrated user’s `home` directory and then apply `read-only permissions`
    to the entire directory for the `Everyone` group on this computer. You can do
    this using the `Sharing & Permissions` section of the `Get Info` dialog box and
    choosing to `apply to enclosed items` from the `Advanced Settings pop-up menu`
    as shown in Figure [11-41](#492151_1_En_11_Chapter.xhtml#Fig41).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig41_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig41_HTML.jpg)


    Figure 11-41

    Using the Get Info ➤ Sharing & Permissions option to change permissions to the
    migrated folders


    Now we can sign in as Don President and browse the old user folder and collect
    any data we may want including files in the `migrateduser/Library/Safari/` directory
    which includes our old Internet Explorer Favorites shown in Figure [11-42](#492151_1_En_11_Chapter.xhtml#Fig42).
    `Drag and drop` that directory into `dpresident/Library/Safari` folder to restore
    access to them.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig42_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig42_HTML.jpg)


    Figure 11-42

    Moving Safari data from the migrated Library folder


    Once we have copied all the user data, confirm that the migrated data is user
    accessible as shown in Figure [11-43](#492151_1_En_11_Chapter.xhtml#Fig43). Next,
    we can open the `Users & Groups System Preference` and delete the migrated user
    account from the Mac. The migration is now complete.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig43_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig43_HTML.jpg)


    Figure 11-43

    Confirming that the migrated IE Favorites are available in Don’s Safari Bookmarks
    menu


    Pro Tip

    Unless I have a lot of data to migrate, I prefer to use OneDrive to move the user’s
    data off of the old PC and onto the new one. I will export the Internet Explorer
    Favorites using the `File ➤ Export` option in IE and then save them to a single
    directory. I can then import them into Safari on the new Mac. This method backs
    up the user’s data in Microsoft’s cloud and speeds up the restore process because
    I don’t have to copy data between two home directories and delete the user account
    that was created by the Migration Assistant.


    ## Summary


    In this chapter, we learned how to integrate Apple solutions into a corporate
    enterprise network comprised of Microsoft solutions. We migrated an executive
    user from a Windows PC to a `MacBook Pro` while allowing them to continue using
    the printers, file shares, and applications they were accustomed to without any
    loss of productivity. Using the same tools and strategies you learned in this
    chapter, you should be able to easily integrate a Mac, iPhone, or iPad into your
    existing Microsoft environment with minimal effort or extensive IT infrastructure
    changes.


    # 12. Mass Provisioning of iOS Devices


    ## Introduction


    Up to this point, we have been working with one or two test devices, but now we
    are going to configure our Profile Manager MDM to facilitate a mass deployment
    of iOS devices. In this chapter, we are going to put some of our iOS skills to
    use in a couple of real-world scenarios. The first scenario is a standard BYOD
    deployment where we will configure employee-owned devices into our MDM and provide
    basic management. The second scenario is the configuration and deployment of ten
    company-owned devices that will be given to a remote sales team and need to be
    managed from a distance using over-the-air MDM tools.


    ## Planning Your Deployment


    It is always a good idea to sit down and logically plan out your deployments before
    developing the technology solution(s) that will ultimately be put into production.
    Before we begin working in Profile Manager, let’s spend some time reviewing the
    requirements, goals, and support needs for each of our sample scenarios.


    ### The BYOD Scenario


    The first step in any technology deployment is to determine the primary goal(s)
    that the new service will achieve. The primary goal in this scenario is to reduce
    the corporate budget that is currently being spent on acquisition and support
    of company-owned iPhones for employees. The proposed solution is to adopt a bring
    your own device (BYOD) model that will allow employees to do company work on their
    personal iPhones. This will enable the employee to select the iPhone model they
    prefer, they will no longer need to carry two devices, and they will instead get
    a small monthly stipend added to their take-home pay to help defer the cost of
    their personal device.


    The next step is the requirements gathering phase. You have met with various leaders
    in your organization, and everyone agrees that instead of continuing to provide
    company-owned iPhones to each employee, the best strategy going forward is to
    allow employees to use their personal iPhones on the corporate network. You have
    discussed the various security requirements, data loss prevention policies, and
    device recovery scenarios with executive leadership. You have concluded that users
    will need to onboard their personal devices into your MDM solution to ensure that
    devices comply with these requirements.


    To secure these personal devices and ensure compliance with corporate information
    security standards, we have determined that any BYOD device must have the following
    controls in place:


    *   Minimum passcode lock that changes every 90 days

    *   Remote wipe capabilities in case the device is lost

    *   Configuration of corporate office Wi-Fi access

    *   Configuration of VPN services when working remotely

    *   Force encrypted backups to secure company data in the event of a local backup

    *   Disable Notifications on the lock screen to protect potentially sensitive
    data (e.g., email previews)


    We will need to ensure that our BYOD Configuration Profile provides all of these
    features later on in this chapter.'
