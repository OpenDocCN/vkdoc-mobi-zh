    ### 安装软件包


    安装软件包基本上和复制文件一样简单。在 ARD 控制台中选择您要安装软件包的计算机，然后点击工具栏中的 `安装` 按钮。将 `*.pkg` 或 `*.mpkg`
    文件拖放到窗口中，并如图 6-36 所示进行相应设置。准备就绪后，点击 `安装` 按钮，任务即会开始。完成后，请在测试计算机上启动应用程序以验证其是否正常工作。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig36_HTML.jpg](img/492151_1_En_6_Fig36_HTML.jpg)


    图 6-36


    用于安装 Wacom 数位板的"安装软件包"配置窗口


    **专业提示**


    安装软件包可能需要时间，尤其是在网络环境下，可能产生大量流量。注意到安装配置窗口上的 `计划` 按钮了吗？就像报告任务一样，安装任务也可以安排在未来的日期和时间进行。考虑在非工作时间执行大规模安装，以限制大量网络流量可能对最终用户造成的干扰。


    ### 运行 Unix 脚本


    最后一个选项可能是最复杂的，但也相当优雅，那就是使用命令行编写脚本来安装特定应用程序。既然我们在上一节以 `Adobe Flash Player` 为例进行了讨论，我便深入研究了其商业安装包，并发现了一些非常有趣的东西。当您对
    `Install Adobe Flash Player` 应用程序`右键单击`并选择 `显示包内容` 时，可以浏览到 `/Contents/MacOS/`
    目录，那里有一个名为 `Adobe Flash Player Install Manager` 的 Unix 可执行文件，如图 6-37 所示。这很有意思。我想知道这个命令是否有手册。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig37_HTML.jpg](img/492151_1_En_6_Fig37_HTML.jpg)


    图 6-37


    隐藏在 Adobe Flash Player 安装程序应用包中的 Unix 可执行文件


    我将打开一个 `终端` 窗口，然后在提示符下输入 `cd` 命令。接着，我会将包含 `Adobe Flash Player Install Manager`
    Unix 可执行文件的 `MacOS` 文件夹拖放到终端窗口中。这会将我的目录切换到已挂载的磁盘映像卷，特别是 MacOS 文件夹，如图 6-38 所示。


