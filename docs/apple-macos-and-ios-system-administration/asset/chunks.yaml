- fmt: '# Internet Reachability


    Internet reachability is Apple’s term for which services (if any) can be reached
    on this server from the public Internet. This capability relies on your network
    configuration. I have an internal IP address configured on this server, but I
    also have configured my router to allow incoming connections to this server in
    my DMZ. If you plan to use this server as an MDM using `Profile Manager`, you
    will need to work with your Network Administrator to make the necessary changes
    to your network to allow this server to be reachable over the Internet. You can
    use Apple’s Internet reachability test to validate those network settings and
    identify which services are available via the Internet.


    ## Directory Domains in macOS Server


    In terms of `macOS Server`, there can be more than one directory domain. In the
    default installation, you will only have the Local Directory domain. This is where
    the users and groups exist that we create on our Mac using the `Users & Groups
    System Preference`. Members of this domain can log in to the Mac workstation,
    they can access network resources provided that they have the appropriate permissions
    to those resources, and once the Server app is installed, they can be managed
    either in the `Users & Groups System Preference` or in the Server application
    under the `Accounts` section as shown in Figure 7-19.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig19_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig19_HTML.jpg)


    *Figure 7-19: The User Account window in macOS Server*


    As you can see, we only have one user account, the local Administrator account.
    I could add additional users here or click the `Groups` section and add additional
    groups and populate members of those groups. These accounts only govern the resources
    on this specific computer. I cannot use accounts that I create here to access
    shared resources on another computer. This is why they are part of the Local domain.


    If I want to create users and groups that govern access to resources on multiple
    machines, I need to create those accounts in a Network domain. Network accounts
    allow me to create a single user that can sign into other computers, access shared
    resources on this computer or other computers if they have the permission to those
    resources, and generally simplify the administration of user accounts and data
    security across my entire network. To use this Network domain, we must have a
    directory service available to contain these user accounts and groups.


    ## Open Directory


    `Open Directory` is Apple’s Network Directory domain service based on the `LDAPv3`
    specification. Many large organizations will already have some kind of LDAP that
    contains all of their network user accounts and shared resources. One of the most
    common is Microsoft’s `Active Directory`. If you are already running `Active Directory`,
    you should plan to leverage that for your network account directory domain with
    your Mac clients instead of turning on the Open Directory service. We will cover
    Active Directory integration in greater detail in Chapter 11.


    If your organization does not already have a Network Directory, Open Directory
    can be configured using the Server application. If you do not see Open Directory
    listed on the sidebar under the `Advanced` heading as shown in Figure 7-20, click
    the `View` menu and select `Open Directory`. This will add it to the sidebar.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig20_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig20_HTML.jpg)


    *Figure 7-20: Adding Open Directory as an available service if it doesn’t already
    exist in the sidebar*


    ### Create An Open Directory Master


    We are going to enable Open Directory on this server, so click the `Open Directory`
    button on the sidebar and then click the `on/off switch` in the top-right corner
    to enable the service. The `Configure Network Users and Groups Setup Assistant`
    will appear and prompt you to choose to create a new Open Directory domain, restore
    from an archive, or join an existing Open Directory domain as a replica. Select
    the option to `Create a new Open Directory domain` as shown in Figure 7-21 and
    click the `Next` button to continue.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig21_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig21_HTML.jpg)


    *Figure 7-21: Choose to create a new Open Directory domain*


    **Windows Pro Tip** Microsoft system administrators will recognize this idea of
    a master and a replica from `Active Directory`. Earlier implementations of AD
    included a server that functioned as the Primary Domain Controller and additional
    servers that were called Backup Domain Controllers. Open Directory is similar
    as you have an Open Directory Master and then multiple Open Directory Replicas
    that synchronize any directory changes or share the load when responding to requests.


    The next step is to create an Administrator account for the new Open Directory
    domain. You can specify a username and password here or use the default `Directory
    Administrator` (`diradmin`) account. I am going to stick with the default for
    this example. Enter a secure password as shown in Figure 7-22 and click the `Next`
    button to continue. I recommend using a different password than the one you use
    for the local Administrator account to log in to the server as a security best
    practice.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig22_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig22_HTML.jpg)


    *Figure 7-22: Create a username and password for the admin account for Open Directory*


    **Pro Tip** When you create Network Accounts in Open Directory, it is important
    to note that they should be unique to the Local Accounts on the client or server
    system. When the login window attempts to authenticate the user, it first looks
    for a matching account on the Local Directory domain of that Mac; and then if
    it doesn’t find one, it goes up a level to the Network Directory domain and checks
    there. If you have an account in the Local domain that matches the account in
    the Network domain, it will always log in as the local account because it found
    a match in the Local domain and quit looking.'
  raw: 'Internet reachability is Apple’s term for which services (if any) can be reached
    on this server from the public Internet. This capability relies on your network
    configuration. I have an internal IP address configured on this server, but I
    also have configured my router to allow incoming connections to this server in
    my DMZ. If you plan to use this server as an MDM using Profile Manager, you will
    need to work with your Network Administrator to make the necessary changes to
    your network to allow this server to be reachable over the Internet. You can use
    Apple’s Internet reachability test to validate those network settings and identify
    which services are available via the Internet.


    In terms of *macOS Server*, there can be more than one directory domain. In the
    default installation, you will only have the Local Directory domain. This is where
    the users and groups exist that we create on our Mac using the *Users & Groups
    System Preference*. Members of this domain can log in to the Mac workstation,
    they can access network resources provided that they have the appropriate permissions
    to those resources, and once the Server app is installed, they can be managed
    either in the *Users & Groups System Preference* or in the Server application
    under the **Accounts** section as shown in Figure [7-19](#492151_1_En_7_Chapter.xhtml#Fig19).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig19_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig19_HTML.jpg)


    Figure 7-19


    The User Account window in macOS Server


    As you can see, we only have one user account, the local Administrator account.
    I could add additional users here or click the **Groups** section and add additional
    groups and populate members of those groups. These accounts only govern the resources
    on this specific computer. I cannot use accounts that I create here to access
    shared resources on another computer. This is why they are part of the Local domain.


    If I want to create users and groups that govern access to resources on multiple
    machines, I need to create those accounts in a Network domain. Network accounts
    allow me to create a single user that can sign into other computers, access shared
    resources on this computer or other computers if they have the permission to those
    resources, and generally simplify the administration of user accounts and data
    security across my entire network. To use this Network domain, we must have a
    directory service available to contain these user accounts and groups.


    ## Open Directory


    *Open Directory* is Apple’s Network Directory domain service based on the *LDAPv3*
    specification. Many large organizations will already have some kind of LDAP that
    contains all of their network user accounts and shared resources. One of the most
    common is Microsoft’s *Active Directory*. If you are already running *Active Directory*,
    you should plan to leverage that for your network account directory domain with
    your Mac clients instead of turning on the Open Directory service. We will cover
    Active Directory integration in greater detail in Chapter [11](#492151_1_En_11_Chapter.xhtml).


    If your organization does not already have a Network Directory, Open Directory
    can be configured using the Server application. If you do not see Open Directory
    listed on the sidebar under the **Advanced** heading as shown in Figure [7-20](#492151_1_En_7_Chapter.xhtml#Fig20),
    click the **View** menu and select **Open Directory**. This will add it to the
    sidebar.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig20_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig20_HTML.jpg)


    Figure 7-20


    Adding Open Directory as an available service if it doesn’t already exist in the
    sidebar


    Create An Open Directory Master


    We are going to enable Open Directory on this server, so click the **Open Directory**
    button on the sidebar and then click the **on/off switch** in the top-right corner
    to enable the service. The *Configure Network Users and Groups Setup Assistant*
    will appear and prompt you to choose to create a new Open Directory domain, restore
    from an archive, or join an existing Open Directory domain as a replica. Select
    the option to **Create a new Open Directory domain** as shown in Figure [7-21](#492151_1_En_7_Chapter.xhtml#Fig21)
    and click the **Next** button to continue.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig21_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig21_HTML.jpg)


    Figure 7-21


    Choose to create a new Open Directory domain


    **Windows Pro Tip** Microsoft system administrators will recognize this idea of
    a master and a replica from *Active Directory*. Earlier implementations of AD
    included a server that functioned as the Primary Domain Controller and additional
    servers that were called Backup Domain Controllers. Open Directory is similar
    as you have an Open Directory Master and then multiple Open Directory Replicas
    that synchronize any directory changes or share the load when responding to requests.


    The next step is to create an Administrator account for the new Open Directory
    domain. You can specify a username and password here or use the default **Directory
    Administrator** (**diradmin**) account. I am going to stick with the default for
    this example. Enter a secure password as shown in Figure [7-22](#492151_1_En_7_Chapter.xhtml#Fig22)
    and click the **Next** button to continue. I recommend using a different password
    than the one you use for the local Administrator account to log in to the server
    as a security best practice.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig22_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig22_HTML.jpg)


    Figure 7-22


    Create a username and password for the admin account for Open Directory


    **Pro Tip** When you create Network Accounts in Open Directory, it is important
    to note that they should be unique to the Local Accounts on the client or server
    system. When the login window attempts to authenticate the user, it first looks
    for a matching account on the Local Directory domain of that Mac; and then if
    it doesn’t find one, it goes up a level to the Network Directory domain and checks
    there. If you have an account in the Local domain that matches the account in
    the Network domain, it will always log in as the local account because it found
    a match in the Local domain and quit looking.'
  trans: '

    # 互联网可达性


    互联网可达性是苹果公司用来描述从公共互联网能够访问此服务器上哪些服务（如果有的话）的术语。此功能依赖于您的网络配置。我在本服务器上配置了内部 IP 地址，同时也在路由器上配置了允许外部连接通过
    DMZ 访问此服务器。如果您计划将此服务器用作使用 `Profile Manager` 的 MDM（移动设备管理）服务器，您需要与网络管理员合作，对您的网络进行必要的更改，以允许通过互联网访问此服务器。您可以使用苹果的互联网可达性测试来验证这些网络设置，并识别哪些服务可以通过互联网使用。


    ## macOS Server 中的目录域


    就 `macOS Server` 而言，可以存在多个目录域。在默认安装中，您将只有本地目录域。这是我们在 Mac 上使用 `用户与群组系统偏好设置` 创建的用户和组所在的位置。此域的成员可以登录到
    Mac 工作站，只要他们对资源拥有适当的权限就可以访问网络资源；并且在安装 Server 应用后，他们既可以在 `用户与群组系统偏好设置` 中管理，也可以在
    Server 应用的 `帐户` 部分进行管理，如图 7-19 所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig19_HTML.jpg](img/492151_1_En_7_Fig19_HTML.jpg)


    *图 7-19：macOS Server 中的用户帐户窗口*


    如您所见，我们只有一个用户帐户，即本地管理员帐户。我可以在此处添加更多用户，或者点击 `群组` 部分，添加更多群组并填充这些群组的成员。这些帐户仅管理此特定计算机上的资源。我无法使用在此处创建的帐户来访问另一台计算机上的共享资源。这就是为什么它们是本地域的一部分。


    如果我想创建管理多台机器资源访问权限的用户和群组，我需要在网络域中创建这些帐户。网络帐户允许我创建一个单一用户，该用户可以登录到其他计算机，访问此计算机或其他计算机上的共享资源（如果他们拥有对这些资源的权限），并且通常可以简化整个网络中用户帐户和数据安全的管理。要使用此网络域，我们必须有一个可用的目录服务来存放这些用户帐户和群组。


    ## 开放目录


    `Open Directory`（开放目录）是苹果公司基于 `LDAPv3` 规范的网络目录域服务。许多大型组织可能已经拥有某种包含其所有网络用户帐户和共享资源的
    LDAP。其中最常见的是微软的 `Active Directory`。如果您已经在运行 `Active Directory`，您应该计划将其用于 Mac 客户端的网络帐户目录域，而不是开启
    Open Directory 服务。我们将在第 11 章更详细地介绍 Active Directory 集成。


    如果您的组织还没有网络目录，可以使用 Server 应用配置 Open Directory。如果您在侧边栏的 `高级` 标题下没有看到列出的 Open Directory（如图
    7-20 所示），请点击 `显示` 菜单并选择 `Open Directory`。这将把它添加到侧边栏。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig20_HTML.jpg](img/492151_1_En_7_Fig20_HTML.jpg)


    *图 7-20：如果侧边栏中尚未存在，则将 Open Directory 添加为可用服务*


    ### 创建 Open Directory 主服务器


    我们将在此服务器上启用 Open Directory，因此请点击侧边栏上的 `Open Directory` 按钮，然后点击右上角的 `开/关切换按钮` 以启用该服务。`配置网络用户和群组设置助理`
    将出现，并提示您选择创建新的 Open Directory 域、从存档恢复，或作为副本加入现有的 Open Directory 域。选择 `创建新的 Open
    Directory 域` 选项（如图 7-21 所示），然后点击 `下一步` 按钮继续。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig21_HTML.jpg](img/492151_1_En_7_Fig21_HTML.jpg)


    *图 7-21：选择创建新的 Open Directory 域*


    **Windows 专业提示** 微软系统管理员会从 `Active Directory` 中认出主服务器和副本服务器的概念。早期的 AD 实现包括一个充当主域控制器的服务器和称为备份域控制器的额外服务器。Open
    Directory 与此类似，您有一个 Open Directory 主服务器，然后有多个 Open Directory 副本服务器，它们同步任何目录更改或在响应请求时分担负载。


    下一步是为新的 Open Directory 域创建一个管理员帐户。您可以在此处指定用户名和密码，或使用默认的 `目录管理员`（`diradmin`）帐户。在本例中，我将坚持使用默认设置。输入一个安全的密码（如图
    7-22 所示），然后点击 `下一步` 按钮继续。作为安全最佳实践，我建议使用与用于登录服务器的本地管理员帐户不同的密码。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig22_HTML.jpg](img/492151_1_En_7_Fig22_HTML.jpg)


    *图 7-22：为 Open Directory 的管理员帐户创建用户名和密码*


    **专业提示** 当您在 Open Directory 中创建网络帐户时，重要的是要注意它们应该与客户端或服务器系统上的本地帐户不同。当登录窗口尝试对用户进行身份验证时，它首先在该
    Mac 的本地目录域中查找匹配的帐户；如果找不到，它会上升到网络目录域并在那里检查。如果您在本地域中有一个与网络域中帐户匹配的帐户，它将始终以本地帐户登录，因为它在本地域中找到了匹配项并停止了查找。

    '
- fmt: '# 完成Open Directory主服务器的初始配置


    逐步完成剩余的设置助手步骤，点击 **设置** 按钮以完成Open Directory主服务器的初始配置。当助手完成后，您将看到Open Directory服务已开启；如果您点击
    **用户** 或 **组** 按钮，您将看到一个略微修改的界面，其中显示一个用于筛选账户的下拉菜单和一个标识账户所在目录域的列，如图7-23所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig23_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig23_HTML.jpg)


    **图 7-23** 配置Open Directory后，我们现在同时拥有了本地目录和网络目录


    此时，我们已经配置好了我们的Open Directory主服务器。从这里，您可以配置额外的服务器作为副本。如果您有多个位置和多台服务器，您可能需要配置**区域**。这些可以在Open
    Directory服务窗口中进行配置，您可以指定哪些服务器应响应来自特定子网的客户端的请求。这样，客户端就可以根据它们所在的网络查询最近的OD服务器。


    您还可以在**服务器**部分查看所有Open Directory服务器，如图[7-24](#492151_1_En_7_Chapter.xhtml#Fig24)所示。在这里，您可以选择特定的服务器并**创建存档**，以便稍后在发生意外时进行恢复。如果需要，您也可以将其中一个副本提升为新的主服务器。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig24_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig24_HTML.jpg)


    **图 7-24** 副本、区域以及将主目录备份到存档的附加选项


    ## 创建网络用户和组


    接下来，让我们通过填充一些网络用户和组来开始使用这个新目录。点击侧边栏的**组**按钮，然后点击**+**按钮，如图[7-25](#492151_1_En_7_Chapter.xhtml#Fig25)所示。创建一个名为
    **"Executive Team"** 的组。确保目录选项是**本地网络目录**，而不是本地目录。它应该看起来像图[7-26](#492151_1_En_7_Chapter.xhtml#Fig26)。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig26_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig26_HTML.jpg)


    **图 7-26** 创建Executive Team网络组


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig25_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig25_HTML.jpg)


    **图 7-25** 添加新组


    创建好该组后，我们需要将一些用户放入该组。点击侧边栏的**用户**按钮切换到用户选项卡。点击**+**按钮创建一个名为 **"User1"** 的新用户和一个您选择的密码。确保将此账户添加为**本地网络目录**账户。创建账户后，点击**所有用户**弹出菜单，如图[7-27](#492151_1_En_7_Chapter.xhtml#Fig27)所示，并选择**本地网络用户**。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig27_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig27_HTML.jpg)


    **图 7-27** 使用弹出菜单过滤掉您的本地用户


    接下来，点击**齿轮**弹出菜单，如图[7-28](#492151_1_En_7_Chapter.xhtml#Fig28)所示，然后选择**编辑密码策略…**选项。我们可以用它来为最终用户密码设置最低安全策略。请勾选以下框来设置一些基本要求：


    *   与账户名不同

    *   至少包含8个字符

    *   每3个月重置一次


    点击**确定**按钮继续。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig28_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig28_HTML.jpg)


    **图 7-28** 齿轮弹出菜单提供配置网络用户密码策略的访问权限'
  raw: 'Step through the rest of the Setup Assistant and click the **Set Up** button
    to finish the initial configuration of the Open Directory Master. When the Assistant
    completes, you will see the Open Directory service is on; and if you click the
    **Users** or **Groups** button, you’ll have a slightly modified interface that
    shows a drop-down menu for filtering your accounts and a column that designates
    the directory domain the account exists within as shown in Figure [7-23](#492151_1_En_7_Chapter.xhtml#Fig23).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig23_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig23_HTML.jpg)


    Figure 7-23


    After configuring Open Directory, we now have both a Local Directory and Network
    Directory


    At this point, we have configured our Open Directory Master. From here, you could
    configure additional servers to act as Replicas. If you have multiple locations
    and multiple servers, you may want to configure **Locales**. These can be configured
    in the Open Directory service window, and you can specify which servers should
    respond to requests from clients of a particular subnet. That way clients can
    query the nearest OD server depending on which network they reside on.


    You can also view all of your Open Directory servers in the **Servers** section
    as shown in Figure [7-24](#492151_1_En_7_Chapter.xhtml#Fig24). This is where you
    can select a particular server and **create an archive** of the Open Directory
    Master so that you can restore it later if something were to happen to it. You
    can also promote one of your Replicas as a new Master if required.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig24_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig24_HTML.jpg)


    Figure 7-24


    Additional options for Replicas, Locales, and backing up your Master directory
    to an archive


    Create Network Users And Groups


    Next, let’s start using this new directory by populating some Network users and
    groups. Click the **Groups** button in the sidebar and click the **+** button
    as shown in Figure [7-25](#492151_1_En_7_Chapter.xhtml#Fig25). Create a group
    called **“Executive Team.”** Make sure that the Directory option is **Local Network
    Directory** and not Local Directory. It should look something like Figure [7-26](#492151_1_En_7_Chapter.xhtml#Fig26).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig26_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig26_HTML.jpg)


    Figure 7-26


    Create the Executive Team Network Group


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig25_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig25_HTML.jpg)


    Figure 7-25


    Adding a new Group


    Once we have that group created, we need to put some users into the group. Click
    the **Users** button on the sidebar to switch to the Users tab. Click the **+**
    button and create a new user named **“User1”** and a password of your choosing.
    Make sure you add this as a **Local Network Directory** account. Once you have
    created the account, click the **All Users** pop-up menu as shown in Figure [7-27](#492151_1_En_7_Chapter.xhtml#Fig27)
    and choose **Local Network Users**.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig27_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig27_HTML.jpg)


    Figure 7-27


    Use the pop-up menu to filter out your local users


    Next, click the **gear** pop-up menu as shown in Figure [7-28](#492151_1_En_7_Chapter.xhtml#Fig28)
    and choose the **Edit Password Policy…** option. We can use this to set a minimum-security
    policy for our end-user passwords. Go ahead and check the following boxes to set
    some basic requirements:


    *   Differ from account name


    *   Contain at least 8 characters


    *   Be reset every 3 months


    Click the **OK** button to continue.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig28_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig28_HTML.jpg)


    Figure 7-28


    The gear pop-up menu provides access to configure the network users’ password
    policy'
