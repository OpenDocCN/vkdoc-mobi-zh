    Selecting the certificate you want to use for a particular service


    Now you will see that I’m securing my Open Directory service using my MacServer
    certificate. The last step is to open the Keychain Access application and search
    for the **OPENDIRECTORY_SSL_IDENTITY** identity preference. **Double-click** it
    to open it and select a new **Preferred Certificate** as shown in Figure [7-42](#492151_1_En_7_Chapter.xhtml#Fig42).
    Click the **Save Changes** button to close it.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig42_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig42_HTML.jpg)


    Figure 7-42


    Selecting the certificate for the SSL identity for the Open Directory service


    Go back to the Open Directory settings and restart the service by flipping the
    switch back to the **on** position. If you go back to your test Mac and unbind
    it from our domain and then join it again, you will be prompted to trust the new
    certificate.


    Pro Tip


    To unbind a Mac from the domain, log in as a user with local administrative privileges
    and use the *Users & Groups System Preference* ➤ **Login Options** dialog and
    click the **Edit** button, similar to how you joined the domain but in reverse.
    In the sheet that slides out and displays the Open Directory server, highlight
    that server and click the **–** button to remove it.'
  trans: '

    恭喜！您已成功创建了 Open Directory 域，向其中添加了用户，将一台客户端 Mac 绑定到该域，并使用网络用户帐户成功登录。


    专业提示


    关于文件共享和 Open Directory 的一个快速说明：在 `macOS Mojave` 之前，您可以共享文件和文件夹并为 Open Directory
    网络帐户设置权限。如果您在 Open Directory 主服务器或副本上有共享文件夹，即使您使用本地用户帐户，也将无法映射这些共享，因为它将无法进行身份验证。如果您计划在
    Mac 上创建共享并与其他 Mac 共享，主机**不能**运行 Open Directory 服务；即使您将该 Mac 绑定到 Open Directory
    域，也无法使用网络帐户对这些共享进行身份验证。这是因为 ACL 组不再像旧版本 Server 那样在目录中创建用于文件共享访问。对此有一些非官方的修复方法，但这超出了本书的范围。


    ## 证书


    当您完成将 Mac 客户端绑定到 Open Directory 的步骤时，您可能收到过一条消息，提示 `此服务器不提供安全（SSL）连接。是否继续？` 在这种情况下，由于我们是在设置测试服务器，因此选择忽略此消息并继续。但是，在生产环境中，您需要使用
    SSL 来保护客户端与服务器之间的通信，以防止中间人攻击等。即使您不使用 Open Directory，并且仅部署服务器以配合 Profile Manager
    使用，您也需要对证书以及在 macOS Server 中更改它们的方式有基本的了解。


    ### 回退 SSL 证书


    Apple 提供的最基本的证书是 `回退证书`。它在您安装 Server 应用程序时创建，虽然可用但很少使用。您可以在 Mac 服务器上打开 `钥匙串访问`
    实用工具，然后点击 `系统` 钥匙串下的 `证书` 来找到此证书。


    ### 自签名证书


    就 Open Directory 而言，Apple 提供了一个自签名证书，您可以在安装 Open Directory 服务时使用。自签名证书会提示用户信任它们，通常不是生产安装的最佳选择。如果我们希望用受信任的第三方证书替换它，可以调整用于
    Open Directory 的证书。


    ### 管理证书


    我们可以随时更改用于任何服务的证书。在对这些证书执行任何操作之前，我们需要停止使用它们的服务。在本例中，我们需要暂时关闭 Open Directory 服务，方法是点击
    Open Directory 窗口右上角的开/关切换开关，如图 7-40 所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig40_HTML.jpg](img/492151_1_En_7_Fig40_HTML.jpg)


    图 7-40

    在对证书进行任何更改之前，禁用 Open Directory


    现在服务已禁用，点击侧边栏中的 `证书` 按钮。您可能会看到类似图 7-41 的界面，其中包含一些证书组合和 `使用以下方式保护服务` 弹出菜单。使用此菜单，我们可以选择哪些服务使用哪些证书。


    点击 `使用以下方式保护服务` 弹出菜单并选择 `自定`。您将看到一些服务及其匹配的证书。我有两个证书可供选择。这两个都是服务器自动为我生成的，但只有一个是有效的。我将在
    `证书` 列中选择 `MacServer` 证书，然后点击 `好` 继续。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig41_HTML.jpg](img/492151_1_En_7_Fig41_HTML.jpg)


    图 7-41

    选择要用于特定服务的证书


    现在您会看到，我正在使用我的 MacServer 证书来保护我的 Open Directory 服务。最后一步是打开钥匙串访问应用程序，搜索 `OPENDIRECTORY_SSL_IDENTITY`
    身份首选项。`双击`它打开，然后选择一个新的 `首选证书`，如图 7-42 所示。点击 `存储更改` 按钮关闭它。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig42_HTML.jpg](img/492151_1_En_7_Fig42_HTML.jpg)


    图 7-42

    为 Open Directory 服务选择 SSL 身份的证书


    返回 Open Directory 设置，通过将开关切换回 `开` 位置来重启服务。如果您返回测试 Mac，将其从我们的域解除绑定，然后再次加入，系统将提示您信任新证书。


    专业提示


    要将 Mac 从域解除绑定，请以具有本地管理员权限的用户身份登录，使用 `用户与群组系统偏好设置` ➤ `登录选项` 对话框，并点击 `编辑` 按钮，类似于您加入域的过程，但操作相反。在滑出并显示
    Open Directory 服务器的窗口中，高亮该服务器并点击 `-` 按钮将其移除。

    '
- fmt: '### Trusted Certificates


    If you are hosting a web site or deploying a production server and need encryption,
    you will want to install a certificate from a known Certificate Authority. To
    do this, you need to create one and add it to your `macOS Server` Certificate
    list. To create a certificate, you begin by clicking the **+** button on the **Certificates**
    window and choosing **Get a Trusted Certificate…** as shown in Figure [7-43](#492151_1_En_7_Chapter.xhtml#Fig43).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig43_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig43_HTML.jpg)


    Figure 7-43

    Starting the process to get a trusted certificate


    This will open the `Get a Trusted Certificate Assistant`. Step through the prompts
    to provide your personal information and click the **Next** button to continue.
    This will bring you to the `Certificate Signing Request (CSR)` window. The CSR
    includes the information you need to provide to your chosen signing authority
    as shown in Figure [7-44](#492151_1_En_7_Chapter.xhtml#Fig44) so they can generate
    the certificate for your server. You can copy/paste this string, or you can click
    the **Save** button to save the `∗.csr` file. Since this is the end of the first
    step, you can click **Finish to close the dialog box**.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig44_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig44_HTML.jpg)


    Figure 7-44

    The CSR string that you need to provide to your signing authority


    Next, you will notice that it created a placeholder for this certificate while
    you contact the signing authority. Once you have completed the validation process
    and you have received your SSL certificate, **double-click** the placeholder certificate
    and **drag and drop** the **SSL certificate and/or cert bundle** into the placeholder’s
    `Certificate Files` section as shown in Figure [7-45](#492151_1_En_7_Chapter.xhtml#Fig45).
    Click **OK** to save it, and now you can use the third-party certificate with
    your server.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig45_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig45_HTML.jpg)


    Figure 7-45

    Double-click the placeholder certificate once you receive the file(s) from the
    signing authority and drop it into the highlighted field


    #### Pro Tip


    If you are planning to use a trusted certificate in a production environment,
    make sure that your server hostname is unique on your network or, in the case
    of web sites, the public Internet. For SSL to work properly, it is not recommended
    to have a server hostname that ends in `.local`. If you need to change your Host
    Name for any reason, do so within the Server application so that the associated
    services get updated with the new name. You should also restart any services or
    the server itself after changing the Host Name.


    ## Profile Manager


    The final service we will configure in `macOS Server` is really the main reason
    to have a Mac server these days—`Profile Manager`. `Profile Manager` is a Mobile
    Device Management (MDM) solution that integrates with Apple’s cloud services like
    `Device Enrollment Program (DEP)` and `Volume Purchase Program (VPP)` that we’ve
    touched on throughout this book so far. We will be using `Profile Manager` to
    create Configuration Profiles to provision and manage iOS devices and Mac clients
    *over the air* in Chapters [8](#492151_1_En_8_Chapter.xhtml) and [9](#492151_1_En_9_Chapter.xhtml).


    Before we begin, there are a couple of prerequisites that you need to be aware
    of when using `Profile Manager`. First, the server must be accessible over the
    Internet. For my test server, I enabled `Apache` temporarily and made sure I could
    hit the "It works!" page from both inside and outside of my network. I also created
    a domain and made sure that I could get to the server on the public Internet by
    DNS name, not just the IP address. Once you have tested it, you can disable the
    `Apache` service again. Second, once you have a functional web server, it also
    needs to be SSL encrypted. So you’ll need to procure a signed certificate from
    a Certificate Authority of your choice.


    #### Pro Tip


    I have used [namecheap.​com](http://namecheap.com/) or [godaddy.​com](http://godaddy.com/)
    as my SSL certificate vendors for a small fee. There are also alternatives such
    as [letsencrypt.​org](https://letsencrypt.org/) that you can use to get signed
    free SSL certificates.


    We are going to get started with configuring the `Profile Manager` service by
    clicking the `Profile Manager` button in the sidebar and then clicking the `on/off`
    switch to turn it **on** as shown in Figure [7-46](#492151_1_En_7_Chapter.xhtml#Fig46).


    This will begin the `Configure Device Management Assistant`. Step through the
    first dialog box to enter your **Name**, **Email Address**, **Phone Number**,
    and **Physical Address**. This will be disclosed to your end users on their managed
    devices, much like when we created an Organization in `Apple Configurator`.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig46_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig46_HTML.jpg)


    Figure 7-46

    Turn on the Profile Manager service to initiate the Configuration Assistant


    The next step is to **select** the `trusted certificate` from a third-party Certificate
    Authority. If you are planning to use `Profile Manager` as an MDM, which we will
    be doing throughout the rest of this book, you must have a certificate that is
    signed by a Certificate Authority. If you use a self-signed Certificate, it will
    not work.


    Next, you will need an `Apple ID` to use for `Apple Push Notifications`. You should
    not use a personal `Apple ID` here; you should use one that you configured solely
    for business use. Enter that information in the fields and click **Next** as shown
    in Figure [7-47](#492151_1_En_7_Chapter.xhtml#Fig47). Once you have entered your
    `Apple ID`, click the **Finish** button to enable Device Management on this server.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig47_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig47_HTML.jpg)


    Figure 7-47

    Enter your institutional Apple ID for use with Push Notifications'
  raw: '### Trusted Certificates


    If you are hosting a web site or deploying a production server and need encryption,
    you will want to install a certificate from a known Certificate Authority. To
    do this, you need to create one and add it to your *macOS Server* Certificate
    list. To create a certificate, you begin by clicking the **+** button on the **Certificates**
    window and choosing **Get a Trusted Certificate…** as shown in Figure [7-43](#492151_1_En_7_Chapter.xhtml#Fig43).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig43_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig43_HTML.jpg)


    Figure 7-43


    Starting the process to get a trusted certificate


    This will open the *Get a Trusted Certificate Assistant*. Step through the prompts
    to provide your personal information and click the **Next** button to continue.
    This will bring you to the *Certificate Signing Request (CSR)* window. The CSR
    includes the information you need to provide to your chosen signing authority
    as shown in Figure [7-44](#492151_1_En_7_Chapter.xhtml#Fig44) so they can generate
    the certificate for your server. You can copy/paste this string, or you can click
    the **Save** button to save the **∗.csr** file. Since this is the end of the first
    step, you can click **Finish to close the dialog box**.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig44_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig44_HTML.jpg)


    Figure 7-44


    The CSR string that you need to provide to your signing authority


    Next, you will notice that it created a placeholder for this certificate while
    you contact the signing authority. Once you have completed the validation process
    and you have received your SSL certificate, **double-click** the placeholder certificate
    and **drag and drop** the **SSL certificate and/or cert bundle** into the placeholder’s
    **Certificate Files** section as shown in Figure [7-45](#492151_1_En_7_Chapter.xhtml#Fig45).
    Click **OK** to save it, and now you can use the third-party certificate with
    your server.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig45_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig45_HTML.jpg)


    Figure 7-45


    Double-click the placeholder certificate once you receive the file(s) from the
    signing authority and drop it into the highlighted field


    Pro Tip


    If you are planning to use a trusted certificate in a production environment,
    make sure that your server hostname is unique on your network or, in the case
    of web sites, the public Internet. For SSL to work properly, it is not recommended
    to have a server hostname that ends in .local. If you need to change your Host
    Name for any reason, do so within the Server application so that the associated
    services get updated with the new name. You should also restart any services or
    the server itself after changing the Host Name.


    ## Profile Manager


    The final service we will configure in *macOS Server* is really the main reason
    to have a Mac server these days—Profile Manager. Profile Manager is a Mobile Device
    Management (MDM) solution that integrates with Apple’s cloud services like *Device
    Enrollment Program* (DEP) and *Volume Purchase Program* (VPP) that we’ve touched
    on throughout this book so far. We will be using Profile Manager to create Configuration
    Profiles to provision and manage iOS devices and Mac clients *over the air* in
    Chapters [8](#492151_1_En_8_Chapter.xhtml) and [9](#492151_1_En_9_Chapter.xhtml).


    Before we begin, there are a couple of prerequisites that you need to be aware
    of when using Profile Manager. First, the server must be accessible over the Internet.
    For my test server, I enabled *Apache* temporarily and made sure I could hit the
    “It works!” page from both inside and outside of my network. I also created a
    domain and made sure that I could get to the server on the public Internet by
    DNS name, not just the IP address. Once you have tested it, you can disable the
    *Apache* service again. Second, once you have a functional web server, it also
    needs to be SSL encrypted. So you’ll need to procure a signed certificate from
    a Certificate Authority of your choice.


    Pro Tip


    I have used [namecheap.​com](http://namecheap.com/) or [godaddy.​com](http://godaddy.com/)
    as my SSL certificate vendors for a small fee. There are also alternatives such
    as [letsencrypt.​org](https://letsencrypt.org/) that you can use to get signed
    free SSL certificates.


    We are going to get started with configuring the Profile Manager service by clicking
    the **Profile Manager** button in the sidebar and then clicking the **on/off**
    switch to turn it **on** as shown in Figure [7-46](#492151_1_En_7_Chapter.xhtml#Fig46).


    This will begin the *Configure Device Management Assistant*. Step through the
    first dialog box to enter your **Name**, **Email Address**, **Phone Number**,
    and **Physical Address**. This will be disclosed to your end users on their managed
    devices, much like when we created an Organization in Apple Configurator.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig46_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig46_HTML.jpg)


    Figure 7-46


    Turn on the Profile Manager service to initiate the Configuration Assistant


    The next step is to **select** the **trusted certificate** from a third-party
    Certificate Authority. If you are planning to use Profile Manager as an MDM, which
    we will be doing throughout the rest of this book, you must have a certificate
    that is signed by a Certificate Authority. If you use a self-signed Certificate,
    it will not work.


    Next, you will need an *Apple ID* to use for **Apple Push Notifications** . You
    should not use a personal *Apple ID* here; you should use one that you configured
    solely for business use. Enter that information in the fields and click **Next**
    as shown in Figure [7-47](#492151_1_En_7_Chapter.xhtml#Fig47). Once you have entered
    your *Apple ID*, click the **Finish** button to enable Device Management on this
    server.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig47_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig47_HTML.jpg)


    Figure 7-47


    Enter your institutional Apple ID for use with Push Notifications'
  trans: '

    ### 受信任的证书


    如果您正在托管一个网站或部署生产服务器并需要加密，您将需要安装一个来自知名证书颁发机构（CA）的证书。为此，您需要创建一个证书并将其添加到您的 `macOS
    Server` 证书列表中。要创建证书，首先点击 **证书** 窗口中的 **+** 按钮，并选择 **获取受信任的证书…**，如图 7-43 所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig43_HTML.jpg](img/492151_1_En_7_Fig43_HTML.jpg)


    图 7-43

    启动获取受信任证书的流程


    这将打开 `获取受信任证书助手`。按照提示步骤提供您的个人信息，然后点击 **下一步** 按钮继续。这将带您进入 `证书签名请求（CSR）` 窗口。CSR
    包含您需要提供给所选签名机构的信息，如图 7-44 所示，以便他们可以为您的服务器生成证书。您可以复制/粘贴此字符串，也可以点击 **保存** 按钮来保存
    `∗.csr` 文件。由于这是第一步的结束，您可以点击 **完成** 来关闭对话框。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig44_HTML.jpg](img/492151_1_En_7_Fig44_HTML.jpg)


    图 7-44

    您需要提供给签名机构的 CSR 字符串


    接下来，您会注意到它在您联系签名机构的同时为此证书创建了一个占位符。一旦您完成了验证流程并收到了您的 SSL 证书，**双击** 该占位符证书，并将 **SSL
    证书和/或证书包** **拖放** 到占位符的 `证书文件` 区域，如图 7-45 所示。点击 **确定** 保存，现在您就可以在服务器上使用这个第三方证书了。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig45_HTML.jpg](img/492151_1_En_7_Fig45_HTML.jpg)


    图 7-45

    一旦从签名机构收到文件，双击占位符证书并将其放入高亮显示的字段中


    #### 专业提示


    如果您计划在生产环境中使用受信任证书，请确保您的服务器主机名在您的网络内是唯一的，对于网站而言，则是在公共互联网上唯一。为了使 SSL 正常工作，不建议使用以
    `.local` 结尾的服务器主机名。如果出于任何原因需要更改主机名，请在服务器应用程序内进行，以便相关服务能更新为新名称。更改主机名后，您还应重启任何服务或服务器本身。


    ## 描述文件管理器


    我们将在 `macOS Server` 中配置的最后一项服务，实际上也是如今拥有一台 Mac 服务器的主要原因——`描述文件管理器`。`描述文件管理器` 是一个移动设备管理（MDM）解决方案，它与
    Apple 的云服务（如我们在本书中已提及的 `设备注册计划（DEP）` 和 `批量购买计划（VPP）`）集成。我们将在第 8 章和第 9 章中使用 `描述文件管理器`
    来创建配置描述文件，以 *无线* 方式供应和管理 iOS 设备及 Mac 客户端。


    在我们开始之前，使用 `描述文件管理器` 时需要注意几个前提条件。首先，服务器必须能从互联网访问。对于我的测试服务器，我临时启用了 `Apache` 并确保我能从网络内外都访问到
    "It works!" 页面。我还创建了一个域名，并确保我可以通过 DNS 名称（而不仅仅是 IP 地址）在公共互联网上访问到服务器。测试完成后，您可以再次禁用
    `Apache` 服务。其次，一旦您拥有一个可用的 Web 服务器，它还需要启用 SSL 加密。因此，您需要从您选择的证书颁发机构获取一个签名的证书。


    #### 专业提示


    我曾使用 [namecheap.​com](http://namecheap.com/) 或 [godaddy.​com](http://godaddy.com/)
    作为我的 SSL 证书供应商，费用不高。还有一些替代方案，例如 [letsencrypt.​org](https://letsencrypt.org/)，您可以用它来获取免费的签名
    SSL 证书。


    我们将开始配置 `描述文件管理器` 服务，点击侧边栏中的 `描述文件管理器` 按钮，然后点击 `开/关` 开关将其 **开启**，如图 7-46 所示。


    这将启动 `配置设备管理助手`。完成第一个对话框，输入您的 **姓名**、**电子邮件地址**、**电话号码** 和 **物理地址**。这些信息将向最终用户在其受管设备上披露，类似于我们在
    `Apple Configurator` 中创建组织时的情况。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig46_HTML.jpg](img/492151_1_En_7_Fig46_HTML.jpg)


    图 7-46

    开启描述文件管理器服务以启动配置助手


    下一步是从第三方证书颁发机构 **选择** `受信任的证书`。如果您计划将 `描述文件管理器` 用作 MDM（我们将在本书后续部分这样做），您必须拥有一个由证书颁发机构签名的证书。如果您使用自签名证书，它将无法工作。


    接下来，您需要一个 `Apple ID` 用于 `Apple 推送通知`。此处不应使用个人的 `Apple ID`；应使用您专门为业务用途配置的 `Apple
    ID`。在字段中输入该信息，然后点击 **下一步**，如图 7-47 所示。输入您的 `Apple ID` 后，点击 **完成** 按钮以在此服务器上启用设备管理。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig47_HTML.jpg](img/492151_1_En_7_Fig47_HTML.jpg)


    图 7-47

    输入您机构用于推送通知的 Apple ID

