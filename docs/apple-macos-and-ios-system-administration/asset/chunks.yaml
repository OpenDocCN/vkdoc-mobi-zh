    **.mobileconfig** 结尾的附件。如果成功，将出现一个对话框，提示 **Profile Downloaded** 和 **Review the
    profile in Settings if you want to install it**。


    如果我们打开 `Settings` 应用程序，将看到如图5-18所示的 `Profile Downloaded` 提示。点击该按钮，并按照步骤安装描述文件。它会给出一些与VPN使用和我们的代码签名真实性相关的警告消息（在此示例中，我们没有使用已知的签名机构，但在生产环境中使用时，您会需要这样做）。


