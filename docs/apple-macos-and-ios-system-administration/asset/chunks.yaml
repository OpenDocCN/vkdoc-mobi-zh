    如果你的用户仍有个人文件夹（`*.pst`）文件，一旦将这些文件迁移到 Mac，就可以使用 **Outlook** 菜单下的 **导入** 功能将它们导入到
    Outlook for Mac 中。


    ### 配置 OneDrive for Business


    当 Outlook 在后台忙于刷新他的收件箱时，我们可以从 `/Applications` 文件夹中打开 **OneDrive**。当出现提示时，输入 Don
    的电子邮件地址和 Office 365 密码以继续。我们将选择 `/Users/dpresident/` 目录作为我们 OneDrive 文件夹的位置，如图
    11-36 所示。选择 **登录时打开** 以允许 Don 的文件自动同步，并按照提示完成设置向导。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig36_HTML.jpg](img/492151_1_En_11_Fig36_HTML.jpg)

