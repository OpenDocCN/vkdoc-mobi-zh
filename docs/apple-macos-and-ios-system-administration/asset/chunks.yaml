    ### 将迁移后的数据归位


    如果使用迁移助理，默认情况下数据迁移后需要进行一些清理工作。完成后，您将能够使用新的本地用户账户登录，所有数据都将在新的主目录中可用。要完成迁移，我们需要对迁移用户的
    `home` 目录使用 `显示简介` 设置，然后为此计算机上的 `所有人` 组对整个目录应用 `只读权限`。您可以在 `显示简介` 对话框的 `共享与权限`
    部分执行此操作，并从 `高级设置弹出菜单` 中选择 `应用到包含的项目`，如图 11-41 所示。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig41_HTML.jpg](img/492151_1_En_11_Fig41_HTML.jpg)


    图 11-41

    使用显示简介 ➤ 共享与权限选项更改迁移文件夹的权限


    现在，我们可以以 Don President 身份登录，浏览旧用户文件夹并收集我们可能需要的任何数据，包括 `migrateduser/Library/Safari/`
    目录中的文件，该目录包含我们旧的 Internet Explorer 收藏夹，如图 11-42 所示。将该目录 `拖放` 到 `dpresident/Library/Safari`
    文件夹中，以恢复对其的访问。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig42_HTML.jpg](img/492151_1_En_11_Fig42_HTML.jpg)


    图 11-42

    从迁移的库文件夹中移动 Safari 数据


    复制完所有用户数据后，确认迁移的数据可供用户访问，如图 11-43 所示。接下来，我们可以打开 `用户与群组系统偏好设置`，并从 Mac 中删除迁移的用户账户。至此，迁移完成。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig43_HTML.jpg](img/492151_1_En_11_Fig43_HTML.jpg)


    图 11-43

    确认迁移的 IE 收藏夹已在 Don 的 Safari 书签菜单中可用


    **专业提示**

    除非我有大量数据需要迁移，否则我倾向于使用 OneDrive 将用户数据从旧 PC 移动到新 PC 上。我会使用 IE 中的 `文件 ➤ 导出` 选项导出
    Internet Explorer 收藏夹，然后将它们保存到单个目录中。之后，我可以将它们导入到新 Mac 的 Safari 中。此方法将用户数据备份在 Microsoft
