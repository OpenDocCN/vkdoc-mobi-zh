- fmt: '# Software Update


    Similar to other operating systems, it is important to keep your `macOS` clients
    up-to-date with the latest security patches. The `Software Update System Preference`
    gives you the ability to control the updates your Macs receive and when to update
    them. Figure [2-26](#492151_1_En_2_Chapter.xhtml#Fig26) shows the basic categories
    and options for configuring your Mac to receive important updates and security
    patches. In addition to controlling updates for `macOS`, you can also use `Software
    Update` to install upgrades and patches for any applications that were installed
    from the `Mac App Store`.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig26_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig26_HTML.jpg)


    Figure 2-26

    The options for controlling update downloads and installation through the `Software
    Update System Preference`


    While Apple provides some basic options for controlling macOS updates through
    the `Software Update System Preference`, there are even more options for fine-tuning
    updates through the `Terminal`. As you can see in Figure [2-27](#492151_1_En_2_Chapter.xhtml#Fig27),
    the `man` pages for the `softwareupdate` command provide some very interesting
    scripting options.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig27_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig27_HTML.jpg)


    Figure 2-27

    The `softwareupdate` command manual via the `Terminal`


    ## Configure Software Update Via The Terminal


    Let’s try something fun. Open the `Terminal` and run the following command:


    ```

    softwareupdate -l

    ```


    Notice how your Mac will take a few minutes of checking for the latest updates,
    and if it is like mine, it will come back with a list of available updates. Figure
    [2-28](#492151_1_En_2_Chapter.xhtml#Fig28) shows that I have two pending updates
    available for my system.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig28_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig28_HTML.jpg)


    Figure 2-28

    Available update output via the `Terminal`


    One of the more powerful options that we have at our disposal when scripting with
    the `softwareupdate` command is the ability to *exclude* updates we don’t want
    users to see. For example, a favorite one of mine is the advertisement banner
    that Apple displays in `System Preferences` when a new full version of `macOS`
    is released. An example of this is the top image in Figure [2-29](#492151_1_En_2_Chapter.xhtml#Fig29)
    where it is prompting my users to download and install `macOS Catalina` on their
    Macs running `Mojave`. I don’t want my users asking me about installing the new
    OS, and I don’t want them attempting to install a new operating system on their
    computers themselves.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig29_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig29_HTML.jpg)


    Figure 2-29

    `Software Update` window before and after excluding the update


    Using the `softwareupdate --ignore` command along with the name of the update
    that it is prompting me to install, in this case `macOS Catalina`, I can hide
    this banner. As you can see in Figure [2-30](#492151_1_En_2_Chapter.xhtml#Fig30),
    when you run this command with `sudo`, it will set the `Catalina` update to `ignored;`
    and when I restart my Mac, if I go back to `Software Update`, the `Catalina` prompt
    is gone from my available update list as shown in the lower image of Figure [2-29](#492151_1_En_2_Chapter.xhtml#Fig29).
    Enter the following command on your Mac to try this:


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig30_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig30_HTML.jpg)


    Figure 2-30

    The output from the `softwareupdate --ignore` command


    ```

    sudo softwareupdate --ignore "macOS Catalina"

    ```


    If I want to reverse this change at a later date and allow my users to install
    `macOS Catalina`, I just need to enter the `softwareupdate --reset-ignored` command.


    If you want to audit which updates are set as ignored, you can browse to `/Library/Preferences`
    and find the `com.apple.SoftwareUpdate.plist`. Open this file in `Xcode` or another
    application that can open xml files of the `.plist` file type, also known as `Property
    Lists`.


    When you open the `.plist` file, you will see there is an *array* for `InactiveUpdates`
    with keys set for each ignored update nested inside the array.


    Close out of the `.plist` file. Enter this command to reverse the ignored updates:


    ```

    softwareupdate –reset-ignored

    ```


    ### Pro Tip


    Unless you are developer, `Xcode` is probably a bit of an overkill for opening
    and editing `Property Lists`. There are a number of free or low-cost `Property
    List` editors out there. `Prefs Editor` by `Thomas Tempelmann` is one that I find
    quick and easy to use.


    # Managing Local Users & Groups


    Before exiting out of `System Preferences`, let’s go back to `Users & Groups`.
    In this section, we are going to create a new local user account and explore some
    advanced settings.


    ## Create a New User


    To get started, click the `+` button on the `Users & Groups System Preference`
    to add a new account. You will see in the drop-down menu next to `New Account`
    that we have a few options for the account type. We can select `Administrator`,
    `Sharing Only`, `Standard` user, or a new `Group`. We’ll discuss `Sharing Only`
    and `Group` options in Chapter [7](#492151_1_En_7_Chapter.xhtml). For this illustration,
    we will select `Standard` as shown in Figure [2-31](#492151_1_En_2_Chapter.xhtml#Fig31).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig31_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig31_HTML.jpg)


    Figure 2-31

    Creating a new Standard local user account


    Fill in the required fields with whatever data you want. Note that the `Full Name`
    is the *friendly name* and the `Account Name` is the actual user account in Unix
    and it will also be the name of the user’s `home folder by default`. There cannot
    be any spaces or special characters in the account name. When you are finished
    filling out the information, click the `Create User` button to continue. See Figure
    [2-32](#492151_1_En_2_Chapter.xhtml#Fig32).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig32_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig32_HTML.jpg)


    Figure 2-32

    Our new account’s username and password information


    Once it has finished creating the user account, you will see the friendly name
    and a randomly assigned photo in the `Other Users` list on the left side of the
    `Users & Groups` pane. If you click it to `select` it, you can modify a few things
    on the right side. You can reset the password using the `Reset Password` button.
    Finally, you can upgrade it to a *local administrator account* by clicking the
    checkbox for `Allow user to administer this computer`.'
