    \n    Figure 10-19\n\n    Our munki_repo directory after importing our first installation\
    \ package\n\n1.  If your Terminal window looks similar to Figure [10-18](#492151_1_En_10_Chapter.xhtml#Fig18),\
    \ go ahead and answer **y** to the **Import this item?** prompt.\n\n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig18_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig18_HTML.jpg)\n\
    \n    Figure 10-18\n\n    Configuring the installer package using the munkiimport\
    \ command line utility\n\n```\nItem name: munkitools\nDisplay name: MunkiTools\n\
    Description: Client software for the Munki service.\nVersion: 3.6.4.3786\nCategory:\
    \ Utilities\nDeveloper: Open Source\nUnattended install: False\nUnattended Uninstall:\
    \ False\nCatalogs: testing\n```\n\nCongratulations! You have just imported your\
    \ first installation package into *Munki*.\n\n### Introduction to MunkiAdmin\n\
    \nNow that we have a package imported into *Munki* and a few folders have been\
    \ created at the root of our ***munki_repo*** directory, let’s open the *MunkiAdmin*\
    \ application. When you open *MunkiAdmin,* it is going to prompt us to point it\
    \ to our ***munki_repo*** network share. Browse to the share, click it to select\
    \ it, and then click the **Open** button as shown in Figure [10-20](#492151_1_En_10_Chapter.xhtml#Fig20).\n\
    \n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig20_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig20_HTML.jpg)\n\
    \nFigure 10-20\n\nWhen prompted by MunkiAdmin, point it to the SMB share of our\
    \ munki_repo\n\nOnce you have selected the ***munki_repo*** share, you’ll see\
    \ the main *MunkiAdmin* console interface with our *MunkiTools* package already\
    \ in the list.\n\nFigure [10-21](#492151_1_En_10_Chapter.xhtml#Fig21) and the\
    \ following descriptions will give you a quick reference to the MunkiAdmin interface.\n\
    \n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig21_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig21_HTML.jpg)\n\
    \nFigure 10-21\n\nThe MunkiAdmin interface\n\n*   **Package View:** The view that\
    \ lists all of the software packages imported into *Munki*.\n\n*   **Catalog View:**\
    \ The view that shows all of the Catalogs and allows us to manage our Catalogs.\n\
    \n*   **Manifest View:** The view that shows all of the Manifests and allows us\
    \ to manage our Manifests.\n\n*   **Open Repo:** Press this button to connect\
    \ to a specific munki_repo network share.\n\n*   **Save Changes:** Saves the changes\
    \ made to the current package, Catalog, or Manifest to the munki_repo.\n\n*  \
    \ **Reload Repo:** Refreshes the *MunkiAdmin* console after changes are saved\
    \ to the munki_repo.\n\n*   **View Package Properties:** Loads the dialog box\
    \ with all of the package install options.\n\n*   **Software Packages:** The list\
    \ of available software packages imported into *Munki*.\n\n*   **Quick Filters:**\
    \ This sidebar will populate based on the category or developer and will filter\
    \ your list of software packages based on that search criteria. For example, if\
    \ you wanted to isolate just the Adobe packages, you would click the Adobe developer\
    \ filter.\n\n## Packaging Software into Munki\n\nNow that our administrative workstation\
    \ is ready to go, we need to start packaging some software. *Munki* will support\
    \ importing and installing packages in the standard *macOS Installer* **∗.pkg**\
    \ format, **∗.dmg** disk image installation, and *Adobe CC* packages without any\
    \ special repackaging requirements. *Munki* can also create uninstall packages\
    \ as well, so you can use it to remove software when it is time to upgrade from\
    \ an old version to a new one.\n\nPro Tip\n\nIf you are experienced with software\
    \ installation on Microsoft Windows systems, you can think of Apple’s native *.pkg\
    \ installation packages as the *macOS* equivalent of a Microsoft *.msi setup file."
  trans: "\n# Munki 组件\n\n在客户端计算机上，`Munki` 通过多个组件来运作。`Munki` 的全部功能都存在于客户端软件中，该软件作为\
    \ `MunkiTools` 的一部分安装。本章稍后，我们将在测试客户端上安装并配置 `MunkiTools`，以便观察其实际运行。在此之前，理解 `Munki`\
    \ 客户端软件的主要组件至关重要：\n\n*   **受管软件中心：** 这是一个 GUI 实用程序，由 `MunkiTools` 软件包安装到 `/Applications`\
    \ 目录中。它允许最终用户选择授权的软件，并在其 Mac 上安装，而无需本地管理员权限。\n*   **安装项目：** 这些是驻留在您 `Munki` 服务器上的软件包或磁盘映像，用于将通过\
    \ `Munki` 客户端或 `受管软件中心` 安装和管理的应用程序。\n*   **目录：** 这些是管理员导入到 `Munki` 中的软件列表，包含关于应用程序应如何安装、脚本和特定设置的元数据。我们将有一个测试目录，用于存放尚未准备好安装在最终用户系统上的应用程序，以及一个生产目录，用于存放已批准进行大规模安装的应用程序。\n\
    *   **清单：** 这是一个列出应在给定计算机上安装哪些软件的清单。您可以为每台计算机、每个位置或每个工作组创建一个清单。通常，最佳实践是尽可能减少清单数量，以保持简单和一致。\n\
    *   **安装收据：** 虽然这不专属于 `Munki`，但当软件包安装在 Mac 上时，会创建一个收据。`Munki` 利用收据来判断客户端工作站上需要安装什么以及已经安装了什么。如果某个软件包存在收据，`Munki`\
    \ 将不会尝试再次安装它。\n*   **物料清单：** 与收据类似，物料清单并非 `Munki` 特有，它在软件包安装时创建。这是一个特定软件应用程序的组件列表，`Munki`\
    \ 在卸载过程中会参考此列表来移除软件及其相关依赖项。\n\n## 导入 MunkiTools 软件包\n\n我们要做的第一件事是从命令行将第一个软件包导入\
    \ `Munki`，以便了解其工作原理。我们可以直接开始使用 `MunkiTools` 软件包，因为它正方便地放在我们的桌面上，随时可用。\n\n### 导入我们的第一个安装软件包\n\
    \n1.  首先再次打开终端，在命令提示符处输入 `munkiimport`，然后将 `munkitools.pkg` 文件从桌面拖拽并放入命令行中。您的终端窗口应类似于图\
    \ 10-17。\n\n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig17_HTML.jpg](img/492151_1_En_10_Fig17_HTML.jpg)\n\
    \n    图 10-17\n    使用 `munkiimport` 命令及 `*.pkg` 文件路径\n\n2.  接下来，按回车键在我们的软件包文件上执行\
    \ `munkimport` 命令。现在它将开始提示我们通过导入命令行工具编辑或接受默认选项。我们将在本章后面打包其他应用程序时更详细地介绍每一项，但此刻请按如下方式配置：\n\
    \n    如果您的终端窗口看起来类似于图 10-18，请对 **导入此项？** 的提示回答 `y`。\n\n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig18_HTML.jpg](img/492151_1_En_10_Fig18_HTML.jpg)\n\
    \n    图 10-18\n    使用 `munkiimport` 命令行工具配置安装程序软件包\n\n    ```\n    Item name:\
    \ munkitools\n    Display name: MunkiTools\n    Description: Client software for\
    \ the Munki service.\n    Version: 3.6.4.3786\n    Category: Utilities\n    Developer:\
    \ Open Source\n    Unattended install: False\n    Unattended Uninstall: False\n\
    \    Catalogs: testing\n    ```\n\n3.  当提示 `上传项目到子目录路径` 时，按回车接受默认值。\n4.  当提示 `尝试创建产品图标？`\
    \ 时，回答 `y` 并按回车。您将看到一些关于导入和复制软件包到我们服务器的输出文本。\n5.  当它提示您 `重建目录` 时，回答 `y` 并按回车。它会提供一些输出，如果您查看您的\
    \ `munki_repo` 共享，您会看到出现了许多新文件夹，如图 10-19 所示。\n\n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig19_HTML.jpg](img/492151_1_En_10_Fig19_HTML.jpg)\n\
    \n    图 10-19\n    导入第一个安装软件包后我们的 `munki_repo` 目录\n\n恭喜！您刚刚将第一个安装软件包导入了 `Munki`。\n\
    \n## MunkiAdmin 简介\n\n现在我们已经将一个软件包导入 `Munki`，并且在 `munki_repo` 目录的根目录下创建了几个文件夹，让我们打开\
    \ `MunkiAdmin` 应用程序。当您打开 `MunkiAdmin` 时，它会提示我们指向我们的 `munki_repo` 网络共享。浏览到该共享，单击选择它，然后点击\
    \ **打开** 按钮，如图 10-20 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig20_HTML.jpg](img/492151_1_En_10_Fig20_HTML.jpg)\n\
    \n图 10-20\n当 `MunkiAdmin` 提示时，指向我们 `munki_repo` 的 SMB 共享\n\n选择了 `munki_repo` 共享后，您将看到主\
    \ `MunkiAdmin` 控制台界面，我们的 `MunkiTools` 软件包已在列表中。\n\n图 10-21 及以下描述将为您提供 `MunkiAdmin`\
    \ 界面的快速参考。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig21_HTML.jpg](img/492151_1_En_10_Fig21_HTML.jpg)\n\
    \n图 10-21\n`MunkiAdmin` 界面\n\n*   **软件包视图：** 列出所有已导入 `Munki` 的软件包的视图。\n*   **目录视图：**\
    \ 显示所有目录并允许我们管理目录的视图。\n*   **清单视图：** 显示所有清单并允许我们管理清单的视图。\n*   **打开仓库：** 按下此按钮连接到特定的\
    \ `munki_repo` 网络共享。\n*   **保存更改：** 将对当前软件包、目录或清单所做的更改保存到 `munki_repo`。\n*   **重新加载仓库：**\
    \ 将更改保存到 `munki_repo` 后刷新 `MunkiAdmin` 控制台。\n*   **查看软件包属性：** 加载包含所有软件包安装选项的对话框。\n\
    *   **软件包列表：** 已导入 `Munki` 的可用软件包列表。\n*   **快速过滤器：** 此侧边栏将根据类别或开发者填充，并会根据该搜索条件过滤您的软件包列表。例如，如果您想仅筛选出\
    \ Adobe 的软件包，可以点击 Adobe 开发者过滤器。\n\n# 将软件打包进 Munki\n\n现在我们的管理工作站已准备就绪，我们需要开始打包一些软件。`Munki`\
    \ 支持导入和安装标准 *macOS 安装程序* `∗.pkg` 格式、`∗.dmg` 磁盘映像安装以及 *Adobe CC* 软件包，无需任何特殊的重新打包要求。`Munki`\
    \ 还可以创建卸载软件包，因此您可以在需要从旧版本升级到新版本时用它来移除软件。\n\n> 专业提示\n> 如果您有在 Microsoft Windows\
    \ 系统上安装软件的经验，可以将 Apple 原生的 `*.pkg` 安装包看作是 *macOS* 下与 Microsoft `*.msi` 安装文件等效的格式。\n"
- fmt: '# 将软件导入 Munki


    在本节中，我们将建立一个安装程序包的目录。开始之前，您应该从管理工作站访问互联网，并将以下安装程序下载到您的桌面。如果这些应用程序既可以通过 *Mac App
    Store* 获取，也可以直接从开发者的网站获取，请下载开发者版本而非 *App Store* 版本：


    *   **Adobe Reader:** [`https://get.adobe.com/reader/`](https://get.adobe.com/reader/)

    *   **Adobe Flash Player:** [`https://get.adobe.com/flashplayer/`](https://get.adobe.com/flashplayer/)

    *   **VLC:** [`www.videolan.org/vlc/download-macosx.html`](http://www.videolan.org/vlc/download-macosx.html)

    *   **Mozilla Firefox:** [`www.mozilla.org/en-US/firefox/new/`](http://www.mozilla.org/en-US/firefox/new/)

    *   **Google Chrome:** [`www.google.com/chrome/`](http://www.google.com/chrome/)

    *   **Audacity:** [`www.audacityteam.org/download/`](http://www.audacityteam.org/download/)


    ## 导入软件包


    您的计算机应该已映射了 ***munki_repo*** 网络共享，并且桌面应有六个 ***.dmg** 文件，即前面列出的每个应用程序对应一个。在本练习中，我们将把这些软件应用程序导入
    *Munki*。我们将从 *Firefox* 和 *Adobe Flash Player* 开始，因为它们使用不同类型的安装过程。*Firefox* 是简单的将应用程序拖放到
    ***/Applications*** 文件夹中，而 *Adobe Flash* 则使用安装包文件。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig22_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig22_HTML.jpg)

    *图 10-22 对 *.dmg 文件使用 munkiimport 命令*


    1.  我们将从 Firefox 开始。打开一个新的终端窗口，在命令提示符后输入 `munkiimport`，然后将 Firefox 的 *.dmg 文件拖放到窗口中，如图[10-22](#492151_1_En_10_Chapter.xhtml#Fig22)所示。按键盘上的回车键开始命令行
    `munkiimport` 实用程序。


    这将类似于本章前面导入 *MunkiTools* 时使用的过程。请通过命令行逐步完成这些选项。以下是这些选项用途的更多信息：


    *   **Item Name:** *Munki* 中包的名称。

    *   **Display Name:** 在 *Managed Software Center* 中显示的软件标题。

    *   **Description:** 在 *Managed Software Center* 中提供的软件描述。

    *   **Version:** 软件的版本。*Munki* 会尝试从包中确定版本，但如果无法确定，您需要手动提供版本号。版本号很重要，因为 *Munki*
    在未来需要升级软件时会引用它。

    *   **Category:** 这将把软件放在特定类别中，以便在 *MunkiAdmin* 和 *Managed Software Center* 中过滤。

    *   **Developer:** 这将把软件放在特定的开发者组中，以便在 *MunkiAdmin* 中过滤。

    *   **Unattended Install:** 这是一个布尔值（`true` 或 `false`）。如果设置为默认的 `false`，软件不会自动安装，需要最终用户从
    *Managed Software Center* 手动选择并安装。如果设置为 `true`，软件将无需任何交互自动安装。

    *   **Unattended Uninstall:** 类似于无人值守安装，如果此值设为 `true`，当我们从清单中移除软件时，它将自动卸载。否则，如果保持默认值
    `false`，则需要用户或系统管理员手动移除软件。

    *   **Catalogs:** 标识软件应列在哪个（哪些）目录中。我们稍后也可以在 *MunkiAdmin* 中修改此设置。


    请按照图[10-23](#492151_1_En_10_Chapter.xhtml#Fig23)中所示回答问题。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig23_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig23_HTML.jpg)

    *图 10-23 Mozilla Firefox 提示的推荐答案*


    1.  当提示导入项目时，输入 `y` 继续。

    2.  当询问是否要将项目上传到子目录路径时，我们将采用默认值。我们不会将软件包放在各种子目录中，只放在 ***munki_repo*** 共享的 ***pkgs***
    目录下的单个默认目录中。按**回车**键接受默认值并继续。

    3.  接下来，它会提示您尝试创建产品图标。对此回答 `y` 以继续。Munki 会尝试从包中找到图标并创建它，该图标将显示在 *Managed Software
    Center* 中。

    4.  现在它将把包复制到 ***munki_repo*** 共享，并根据安装程序包和我们的命令行输入保存所需的 **pkginfo.plist** 数据。它会询问是否重新构建目录，由于我们刚刚通过添加新应用程序更改了目录，我们将回答
    `y` 并按**回车**继续。


    目录重新构建完成后，我们就成功导入了 *Firefox* 应用程序。如果想检查工作以确保应用程序可用，可以打开 ***munki_repo*** 网络共享并浏览
    ***/pkgs*** 和 ***/pkgsinfo*** 目录，查看 *Firefox* 是否可用。也可以从 Web 浏览器访问您的 ***munki_repo***
    页面，确保包可以通过 Web 访问。最后，可以打开 *MunkiAdmin* 并**重新加载**仓库，查看 *Firefox* 是否可用。如图[10-24](#492151_1_En_10_Chapter.xhtml#Fig24)所示，我工作站上的一切都已同步且可用。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig24_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig24_HTML.jpg)

    *图 10-24 Firefox 包在 MunkiAdmin、munki_repo 共享和 Web 服务器中可用*


    1.  接下来，我们可以导入 *Adobe Flash Player*。**双击** **Install Flash Player *.dmg** 文件以将磁盘映像挂载到桌面。在内部，您需要**右键单击**
    **Install Adobe Flash Player** 应用程序并选择**显示包内容**。然后，浏览 ***/Contents/Resources/***
    目录并找到 **Adobe Flash Player *.pkg** 文件，因为那是我们的安装程序。使用 `munkiimport` 命令，并将 ***.pkg**
    文件**拖放**到终端窗口以指定路径。按**回车**键开始导入过程，就像对 *Firefox* 所做的那样。

    2.  出现提示时，输入如图[10-25](#492151_1_En_10_Chapter.xhtml#Fig25)所示的信息。请注意，我们需要修改其中一些选项。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig25_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig25_HTML.jpg)

    *图 10-25 Adobe Flash Player 安装包的推荐设置*


    1.  出现提示时，接受所有默认设置导入项目。当提示有关图标时回答 `y` 并重新构建目录。

    2.  一旦它完成将软件导入 *Munki*，请继续验证所有内容是否正确复制。

    3.  对其余四个软件标题重复导入过程，在提示时将全部设置为无人值守安装/卸载。完成后，在 *MunkiAdmin* 中**重新加载** ***munki_repo***，您的软件列表应如图[10-26](#492151_1_En_10_Chapter.xhtml#Fig26)所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig26_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig26_HTML.jpg)

    *图 10-26 导入的软件标题完整列表*'
  raw: '### Importing Software into Munki


    In this section, we are going to build out a catalog of installer packages. Before
    we begin, you should hit the Internet from your administrative workstation and
    download the following installers to your Desktop. In the case that these applications
    may be available both via the *Mac App Store* and directly from the developer’s
    web site, download the version from the developer instead of the *App Store* version:


    *   **Adobe Reader:** [`https://get.adobe.com/reader/`](https://get.adobe.com/reader/)


    *   **Adobe Flash Player:** [`https://get.adobe.com/flashplayer/`](https://get.adobe.com/flashplayer/)


    *   **VLC:** [`www.videolan.org/vlc/download-macosx.html`](http://www.videolan.org/vlc/download-macosx.html)


    *   **Mozilla Firefox:** [`www.mozilla.org/en-US/firefox/new/`](http://www.mozilla.org/en-US/firefox/new/)


    *   **Google Chrome:** [`www.google.com/chrome/`](http://www.google.com/chrome/)


    *   **Audacity:** [`www.audacityteam.org/download/`](http://www.audacityteam.org/download/)


    Import Software Packages


    You should have your ***munki_repo*** network share mapped to your computer and
    the six ***.dmg** files on your desktop, one for each of the preceding applications
    listed. In this exercise we are going to import these software applications into
    *Munki*. We will begin with *Firefox* and *Adobe Flash Player* because they both
    use a different kind of installation process. *Firefox* is a simple drag and drop
    of the application into the ***/Applications*** folder, while *Adobe Flash* uses
    an installation package file.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig22_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig22_HTML.jpg)


    Figure 10-22


    Using the munkiimport command with a *.dmg file


    1.  We are going to start with Firefox. Go ahead and open a new Terminal window
    and enter `munkiimport` at the command prompt and then drag and drop the Firefox
    *.dmg file into the window as shown in Figure [10-22](#492151_1_En_10_Chapter.xhtml#Fig22).
    Press enter on the keyboard to begin the command line `munkiimport` utility.


    This will look similar to the process we used to import *MunkiTools* earlier in
    this chapter. Go ahead and step through the options via the command line. Here’s
    a little more information on what each of these options is used for:


    *   **Item Name:** The name of the package in *Munki*.


    *   **Display Name:** The title of the software shown in the *Managed Software
    Center*.


    *   **Description:** The description of the software provided in the *Managed
    Software Center*.


    *   **Version:** The version of the software. *Munki* will attempt to determine
    the version from the package, but if it cannot, you would need to provide a version
    number manually. Version numbers are important as *Munki* will need to reference
    this when we need to upgrade software at a future date.


    *   **Category:** This will place the software in a specific category for filtering
    in *MunkiAdmin* and *Managed Software Center*.


    *   **Developer:** This will place the software in a specific developer group
    for filtering in *MunkiAdmin*.


    *   **Unattended Install:** This is a Boolean value of true or false. If set as
    the default of false, the software will not automatically install and will require
    the end user to manually select it and install it from the *Managed Software Center*.
    If this is set as true, the software will automatically install without any interaction.


    *   **Unattended Uninstall:** Similar to unattended install, this will remove
    the software automatically if we remove it from a manifest if this is set to true.
    Otherwise, if we keep the default of false, then it would require the user or
    system administrator to manually remove the software.


    *   **Catalogs:** Identifies which catalog(s) the software should be listed in.
    We can also modify this later in *MunkiAdmin*.


    Go ahead and answer these questions to match what I have shown in Figure [10-23](#492151_1_En_10_Chapter.xhtml#Fig23).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig23_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig23_HTML.jpg)


    Figure 10-23


    The recommended answers to the prompts for Mozilla Firefox


    1.  When you are prompted to import the item, enter `y` to continue.


    2.  When it asks to upload the item to a subdirectory path, we are going to take
    the default. We will not be placing our software packages in various subdirectories,
    only in the single default directory on our ***munki_repo*** share in the ***pkgs***
    directory. Press **enter** to accept the default and continue.


    3.  Next, it will prompt you to attempt to create a product icon. Answer `y` to
    this one to continue. Munki will attempt to create an icon if it finds one in
    the package and will display that icon in the *Managed Software Center*.


    4.  It will now copy the package to the ***munki_repo*** share and save the required
    **pkginfo.plist** data based on what it found in the installer package and our
    command line input. It will ask you to rebuild the catalogs, and since we just
    made a change to the catalog by adding a new application, we will answer with
    a **y** and press **enter** to continue.


    Once it completes the rebuild of the catalog, we have successfully imported the
    *Firefox* application. If you want to double-check your work to ensure that the
    application is available, you can open the ***munki_repo*** network share and
    browse the ***/pkgs*** and ***/pkgsinfo*** directories to see that *Firefox* is
    available. You can also hit your ***munki_repo*** page from a web browser to ensure
    that the packages are available via the Web. Finally, you can open *MunkiAdmin*
    and **reload** the repo to see that *Firefox* is available. As you can see from
    Figure [10-24](#492151_1_En_10_Chapter.xhtml#Fig24), everything is available and
    synchronized on my workstation.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig24_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig24_HTML.jpg)


    Figure 10-24


    The Firefox package is available in MunkiAdmin and the munki_repo share and via
    the web server


    1.  When prompted, import the item accepting all defaults. Answer **y** when prompted
    about the icon and rebuild the catalogs.


    2.  Once it finishes the import of the software into *Munki*, go ahead and verify
    that everything copied correctly.


    3.  Repeat the import process for the other four software titles, setting them
    all as unattended install/uninstall when prompted. When you are done, reload the
    ***munki_repo*** in *MunkiAdmin,* and your software list should look like Figure
    [10-26](#492151_1_En_10_Chapter.xhtml#Fig26).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig26_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig26_HTML.jpg)


    Figure 10-26


    The complete list of imported software titles


    1.  Next, we can import *Adobe Flash Player*. **Double-click** the **Install Flash
    Player *.dmg** file to mount the disk image to the desktop. Inside you will need
    to **right-click** the **Install Adobe Flash Player** application and choose to
    **Show Package Contents**. Next, browse the ***/Contents/Resources/*** directory
    and find the **Adobe Flash Player *.pkg** file as that is our installer. Use the
    `munkiimport` command and **drag and drop** the ***.pkg** file into the Terminal
    window to specify the path. Press **enter** to begin the import process like we
    did with *Firefox*.


    2.  When prompted, enter the information as shown in Figure [10-25](#492151_1_En_10_Chapter.xhtml#Fig25).
    Please note that we will need to modify a few of these options.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig25_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig25_HTML.jpg)


    Figure 10-25


    Recommended settings for the Adobe Flash Player installation packag'
