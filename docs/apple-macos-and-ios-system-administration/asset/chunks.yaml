    Figure 5-24


    Browsing Apps that have been purchased by my Apple ID


    **Select** the Apps you wish to add to the device from the App browser. You can
    select multiple by holding either the **shift key** or **command key**. Once you
    have selected two or three Apps, click the **Add** button. As you can see in Figure
    [5-25](#492151_1_En_5_Chapter.xhtml#Fig25), the Apps we selected are being downloaded
    and installed on the test device.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig25_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig25_HTML.jpg)


    Figure 5-25


    Downloading and side loading the Apps onto my connected iPad


    Depending on the size of the Apps and the speed of your Internet connection, this
    may take a few minutes or more to complete. Once the progress bar goes away, you
    can double-click the device and view the installed Apps as shown in Figure [5-26](#492151_1_En_5_Chapter.xhtml#Fig26).
    As you can see, I chose to install the *Microsoft Office* Apps.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig26_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig26_HTML.jpg)


    Figure 5-26


    Viewing the installed Apps to confirm they were copied to the iPad


    Pro Tip


    Be careful which Apple ID you use to side load these Apps. While I used my personal
    Apple ID, if I give this device to someone, when they launch *Microsoft Word,*
    they will be prompted for my Apple ID and password before it will launch. They
    will also be prompted for my password when the App updates at some point in the
    future. I probably don’t not want to give everyone in the office my personal Apple
    ID credentials when I hand them their iPad. There are a couple solutions for this
    that we cover in Chapter [8](#492151_1_En_8_Chapter.xhtml).


    ### Documents


    Similar to side loading Apps, we can also do the same with documents. Which documents
    you can load is going to depend on the Apps you have installed on the device.
    Select our test iOS device again and choose **Documents** from the **Add** button
    in the toolbar. I have four Apps listed that I can install documents into—*Books*,
    *Excel*, *PowerPoint*, and *Word* as you can see in Figure [5-27](#492151_1_En_5_Chapter.xhtml#Fig27).
    Let’s load a **PDF** file into the *Books* App.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig27_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig27_HTML.jpg)


    Figure 5-27


    Select an App to install the PDF document into


    Click **Books** to highlight it, and then click the **Choose** button to browse
    your Mac for a PDF document to upload. It doesn’t matter what file you load for
    this exercise. I’m just using a random work file that I had lying around. Depending
    on the size of the PDF file, it should take just a few seconds to transfer the
    file to the *iPad*.


    Pro Tip


    If you recall the structure of App packages from Chapter [4](#492151_1_En_4_Chapter.xhtml),
    because we chose to load the PDF into the Books App, it was copied into ***Books***
    *package* ➤ ***Documents*** directory. If the Books App is deleted, the PDF file
    we pre-loaded will be deleted too.


    ## Modifying iOS Devices in Apple Configurator


    So far, we have configured iOS device settings, preinstalled Apps, and preinstalled
    some important documents. This is pretty cool, but there are a few more things
    we probably want to do to customize the out-of-box experience for our end users.
    For one, I don’t know that I want every *iPad* on my network called “iPad,” for
    example. Let’s modify a few more settings on our test device.


    ### Device Name


    We can name one or many devices via Apple Configurator. If you select more than
    one device, you can add a token that will append a sequential number to the end
    of the name. In this case, let’s just name our test device “Test iPad” (or iPhone,
    depending on your test device model). To do this, **click** the connected device
    to select it and then using the **Actions** menu choose **Modify** ➤ **Device
    Name…** and enter the **name** in the dialog box and click the **Rename** button,
    as shown in Figure [5-28](#492151_1_En_5_Chapter.xhtml#Fig28).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig28_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig28_HTML.jpg)


    Figure 5-28


    Rename the device by entering a new name in the provided field


    ### Home Screen Layout


    Now that we’ve got a few additional Apps installed on my test device, I may want
    to rearrange the Apps so that my users don’t have to go searching for Microsoft
    Office. By default, *Word*, *Excel*, and *PowerPoint* are on the second Home Screen
    page, and I know that I’m going to get at least one help desk call from a user
    who doesn’t think Office is installed on their *iPad*. Let’s anticipate this issue
    and move these Microsoft Apps to the main Home Screen page.


    **Click** the test device to select it and then using the **Actions** menu choose
    **Modify** ➤ **Home Screen Layout** . A window that looks similar to the one in
    Figure [5-29](#492151_1_En_5_Chapter.xhtml#Fig29) should appear and allow you
    to move the icons around. I’m going to move *Excel*, *Word*, and *PowerPoint*
    to the main Home Screen and move *Stocks*, *Voice Memos*, and *Home* to the second
    screen. Simply drag and drop the Apps around the screen with the mouse and then
    click the **Apply** button when finished.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig29_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig29_HTML.jpg)


    Figure 5-29


    Drag and drop icons around the window to rearrange them


    ### Wallpaper


    Finally, the last modification we may want to make before handing the device to
    an end user is to customize the *wallpaper*. A lot of organizations like to identify
    their assets by customized wallpaper that cannot be removed. On a supervised device,
    by combining the wallpaper modification with a payload that restricts users from
    changing it, you can permanently brand your institution’s devices in this way.


    Figure [5-30](#492151_1_En_5_Chapter.xhtml#Fig30) shows you which options are
    available when setting the custom wallpaper. You can also define a custom message
    that will appear on the lock screen. Alternately, you can display the text as
    a QR code or automatically append a number using a token, similar to the device
    name configuration. Some organizations might want to implement this feature for
    asset management using the QR code or serial number.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig30_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig30_HTML.jpg)


    Figure 5-30


    The options for setting wallpaper and custom text'
  trans: '

    ### 应用


    侧载应用相当简单。首先需要通过 USB 连接一台 iOS 设备并打开 `Apple Configurator`。点击设备以选中它，然后点击工具栏中的 `添加`
    按钮，再点击 `应用`，如图 5-23 所示。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig23_HTML.jpg](img/492151_1_En_5_Fig23_HTML.jpg)


    图 5-23

    点击添加 ➤ 应用以选择要加载到所选设备上的应用


    你可以直接从 Mac 加载应用，方法是点击 `从我的 Mac 选择...`；或者，你也可以使用一个有可用应用的 Apple ID 登录。这可以是一个个人 Apple
    ID（就像我在本次练习中使用的），也可以是一个机构 Apple ID。我们将在第 8 章讨论机构 Apple ID 和批量购买计划（`VPP`）。


    一些组织可能拥有仅为内部机构使用而创建的应用，这些应用永远不会在 `App Store` 中列出。如果你有这样的应用，可以直接从 Mac 加载它们。我们选择使用在
    `App Store` 上列出的应用，因此请登录，你应该会看到使用你的 Apple ID 购买的应用列表，如图 5-24 所示。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig24_HTML.jpg](img/492151_1_En_5_Fig24_HTML.jpg)


    图 5-24

    浏览我的 Apple ID 购买的应用


    从应用浏览器中选择你希望添加到设备上的应用。你可以通过按住 `Shift 键` 或 `Command 键` 来选择多个应用。选择两三个应用后，点击 `添加`
    按钮。如图 5-25 所示，我们选择的应用正在测试设备上下载并安装。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig25_HTML.jpg](img/492151_1_En_5_Fig25_HTML.jpg)


    图 5-25

    将应用下载并侧载到我连接的 iPad 上


    根据应用的大小和互联网连接速度，这可能需要几分钟或更长时间才能完成。进度条消失后，你可以双击设备查看已安装的应用，如图 5-26 所示。如图所示，我选择安装了
    `Microsoft Office` 系列应用。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig26_HTML.jpg](img/492151_1_En_5_Fig26_HTML.jpg)


    图 5-26

    查看已安装的应用以确认它们已复制到 iPad


    **专业提示**


    请注意用于侧载这些应用的 Apple ID。虽然我使用的是我的个人 Apple ID，但如果我将此设备交给他人，当他们启动 `Microsoft Word`
    时，系统会在启动前提示他们输入我的 Apple ID 和密码。将来某个时间点应用更新时，他们也会被提示输入我的密码。我可能不想在将 iPad 交给办公室的每个人时，都给他们我的个人
    Apple ID 凭据。我们将在第 8 章介绍几种解决此问题的方法。


    ### 文档


    与侧载应用类似，我们也可以对文档进行同样的操作。你可以加载哪些文档取决于设备上安装的应用。再次选择我们的测试 iOS 设备，并从工具栏的 `添加` 按钮中选择
    `文档`。我有四个应用可以安装文档——`图书`、`Excel`、`PowerPoint` 和 `Word`，如图 5-27 所示。让我们将一个 `PDF`
    文件加载到 `图书` 应用中。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig27_HTML.jpg](img/492151_1_En_5_Fig27_HTML.jpg)


    图 5-27

    选择要安装 PDF 文档的应用


    点击 `图书` 以高亮选中它，然后点击 `选择` 按钮浏览你的 Mac 以选择要上传的 PDF 文档。对于此练习，你加载什么文件并不重要。我只是使用了一个随手找到的随机工作文件。根据
    PDF 文件的大小，将文件传输到 `iPad` 应该只需几秒钟。


    **专业提示**


    如果你还记得第 4 章中关于应用包结构的内容，因为我们选择将 PDF 加载到图书应用，所以它被复制到了 `图书` 包 ➤ `文档` 目录中。如果删除了图书应用，我们预加载的
    PDF 文件也将被删除。


    ## 在 Apple Configurator 中修改 iOS 设备


    到目前为止，我们已经配置了 iOS 设备设置、预装了应用并预装了一些重要文档。这很酷，但为了为最终用户定制开箱即用的体验，我们可能还想做更多事情。例如，我不想让我网络上的每台
    `iPad` 都叫“iPad”。让我们在测试设备上修改更多设置。


    ### 设备名称


    我们可以通过 Apple Configurator 为一台或多台设备命名。如果你选择多台设备，可以添加一个标记，在名称末尾附加一个序列号。在本例中，我们只需将测试设备命名为“测试
    iPad”（或 iPhone，取决于你的测试设备型号）。为此，请点击连接的设备以选中它，然后使用 `操作` 菜单选择 `修改` ➤ `设备名称...`，在对话框中输入名称并点击
    `重命名` 按钮，如图 5-28 所示。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig28_HTML.jpg](img/492151_1_En_5_Fig28_HTML.jpg)


    图 5-28

    通过在提供的字段中输入新名称来重命名设备


    ### 主屏幕布局


    现在我的测试设备上已经安装了更多应用，我可能想重新排列这些应用，这样我的用户就不必费力去寻找 Microsoft Office 了。默认情况下，`Word`、`Excel`
    和 `PowerPoint` 位于第二页主屏幕，我确信至少会接到一个用户的求助电话，说他们认为 `iPad` 上没有安装 Office。让我们预见这个问题，将这些
    Microsoft 应用移到主屏幕第一页。


    点击测试设备以选中它，然后使用 `操作` 菜单选择 `修改` ➤ `主屏幕布局`。会出现一个与图 5-29 类似的窗口，允许你移动图标。我将把 `Excel`、`Word`
    和 `PowerPoint` 移到主屏幕第一页，而将 `股市`、`语音备忘录` 和 `家庭` 移到第二屏。只需用鼠标在屏幕上拖放应用，完成后点击 `应用`
    按钮。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig29_HTML.jpg](img/492151_1_En_5_Fig29_HTML.jpg)


    图 5-29

    在窗口内拖放图标以重新排列


    ### 墙纸


    最后，在将设备交给最终用户之前，我们可能想做的最后一项修改是自定义 `墙纸`。许多组织喜欢通过无法移除的自定义墙纸来标识他们的资产。在受监督的设备上，通过将墙纸修改与限制用户更改它的配置描述文件相结合，你可以通过这种方式永久地为你机构的设备打上品牌标识。


    图 5-30 显示了设置自定义墙纸时可用的选项。你还可以定义一条将显示在锁定屏幕上的自定义消息。或者，你可以将文本显示为 QR 码，或使用标记自动附加一个数字，类似于设备名称配置。一些组织可能希望利用此功能的
    QR 码或序列号来实现资产管理。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig30_HTML.jpg](img/492151_1_En_5_Fig30_HTML.jpg)


    图 5-30

    设置墙纸和自定义文本的选项

