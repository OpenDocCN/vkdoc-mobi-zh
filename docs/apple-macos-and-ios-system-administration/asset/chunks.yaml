    # 完成 Open Directory 主服务器的初始配置


    逐步完成剩余的设置助手步骤，点击 **设置** 按钮以完成 Open Directory 主服务器的初始配置。当助手完成后，您将看到 Open Directory
    服务已开启；如果您点击 **用户** 或 **组** 按钮，您将看到一个略微修改的界面，其中显示一个用于筛选账户的下拉菜单和一个标识账户所在目录域的列，如图
    7-23 所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig23_HTML.jpg](img/492151_1_En_7_Fig23_HTML.jpg)


    **图 7-23** 配置 Open Directory 后，我们现在同时拥有了本地目录和网络目录


    此时，我们已经配置好了我们的 Open Directory 主服务器。从这里，您可以配置额外的服务器作为副本。如果您有多个位置和多台服务器，您可能需要配置**区域**。这些可以在
    Open Directory 服务窗口中进行配置，您可以指定哪些服务器应响应来自特定子网的客户端的请求。这样，客户端就可以根据它们所在的网络查询最近的 OD
    服务器。


    您还可以在**服务器**部分查看所有 Open Directory 服务器，如图 7-24 所示。在这里，您可以选择特定的服务器并**创建存档**，以便稍后在发生意外时进行恢复。如果需要，您也可以将其中一个副本提升为新的主服务器。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig24_HTML.jpg](img/492151_1_En_7_Fig24_HTML.jpg)


    **图 7-24** 副本、区域以及将主目录备份到存档的附加选项


    ## 创建网络用户和组


    接下来，让我们通过填充一些网络用户和组来开始使用这个新目录。点击侧边栏的**组**按钮，然后点击**+**按钮，如图 7-25 所示。创建一个名为 **"Executive
    Team"** 的组。确保目录选项是**本地网络目录**，而不是本地目录。它应该看起来像图 7-26。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig26_HTML.jpg](img/492151_1_En_7_Fig26_HTML.jpg)


    **图 7-26** 创建 Executive Team 网络组


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig25_HTML.jpg](img/492151_1_En_7_Fig25_HTML.jpg)


    **图 7-25** 添加新组


    创建好该组后，我们需要将一些用户放入该组。点击侧边栏的**用户**按钮切换到用户选项卡。点击**+**按钮创建一个名为 **"User1"** 的新用户和一个您选择的密码。确保将此账户添加为**本地网络目录**账户。创建账户后，点击**所有用户**弹出菜单，如图
    7-27 所示，并选择**本地网络用户**。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig27_HTML.jpg](img/492151_1_En_7_Fig27_HTML.jpg)


    **图 7-27** 使用弹出菜单过滤掉您的本地用户


    接下来，点击**齿轮**弹出菜单，如图 7-28 所示，然后选择**编辑密码策略…**选项。我们可以用它来为最终用户密码设置最低安全策略。请勾选以下框来设置一些基本要求：


    *   与账户名不同

    *   至少包含 8 个字符

    *   每 3 个月重置一次


    点击**确定**按钮继续。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig28_HTML.jpg](img/492151_1_En_7_Fig28_HTML.jpg)


    **图 7-28** 齿轮弹出菜单提供配置网络用户密码策略的访问权限

