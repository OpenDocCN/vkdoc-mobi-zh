    ## 总结


    在本章中，我们学习了如何将 Apple 解决方案集成到由 Microsoft 解决方案构成的企业网络中。我们将一位高级用户从 Windows PC 迁移到
    `MacBook Pro`，同时让他们能够继续使用他们习惯的打印机、文件共享和应用程序，而不会损失任何生产力。运用本章中学到的相同工具和策略，您应该能够轻松地将
    Mac、iPhone 或 iPad 集成到您现有的 Microsoft 环境中，只需付出最少的努力或进行广泛的基础设施变更。


    # 12. iOS 设备的大规模部署


    ## 引言


    到目前为止，我们一直在使用一两个测试设备，但现在我们将配置我们的配置文件管理器 MDM 以促进 iOS 设备的大规模部署。在本章中，我们将在几个实际场景中运用一些
    iOS 技能。第一个场景是标准的 BYOD 部署，我们将员工自有的设备配置到 MDM 中并提供基本管理。第二个场景是配置和部署十台公司所有的设备，这些设备将分配给远程销售团队，并需要使用空中
    OTA MDM 工具进行远程管理。


    ## 规划您的部署


    在开发最终将投入生产的技术解决方案之前，花时间进行逻辑上的部署规划总是一个好主意。在我们开始使用配置文件管理器之前，让我们花些时间回顾一下我们每个示例场景的需求、目标和支持需求。


    ### BYOD 场景


    任何技术部署的第一步都是确定新服务要实现的主要目标。在此场景中，主要目标是减少目前公司为员工采购和支持公司自有 iPhone 所花费的预算。提出的解决方案是采用自带设备（BYOD）模式，允许员工在个人
    iPhone 上处理公司工作。这将使员工能够选择他们喜欢的 iPhone 型号，他们不再需要携带两台设备，取而代之的是，他们每月将在实得工资中获得一小笔津贴，以帮助抵消个人设备的成本。


    下一步是需求收集阶段。您已经与组织中的各位领导会面，大家一致认为，与其继续向每位员工提供公司所有的 iPhone，未来的最佳策略是允许员工在公司网络上使用个人
    iPhone。您已经与高层领导讨论了各种安全要求、数据丢失预防策略和设备恢复场景。您得出结论，用户需要将他们的个人设备加入到您的 MDM 解决方案中，以确保设备符合这些要求。


    为了保护这些个人设备并确保符合公司信息安全标准，我们已确定任何 BYOD 设备必须实施以下控制措施：


    *   **最小密码锁**，每 90 天更换一次

    *   设备丢失时的**远程擦除能力**

    *   配置公司办公室 **Wi-Fi 访问**

    *   远程工作时配置 **VPN 服务**

    *   在本地备份时，**强制加密备份**以保护公司数据

    *   **在锁定屏幕上禁用通知**，以保护可能敏感的数据（例如，电子邮件预览）


    我们需要确保本章稍后介绍的 BYOD 配置档案提供所有这些功能。

    '
- fmt: '# iPad Deployment to the Remote Sales Team


    Similar to the BYOD scenario, our first step is to determine the goals of the
    technology project. The goal of this deployment is also fairly simple. The company
    has ten remote sales people, each located in different parts of the country and
    always on the move. The VP of Sales and Marketing has asked IT for an iPad for
    each member of the sales team so they can stay in touch while on the road. This
    has been budgeted, approved, and purchased. The iPads are ready for deployment
    and configuration for each remote user.


    As part of the requirements gathering process, the VP of Sales had a couple of
    requests from IT. First, they wanted the devices to be configured in such a way
    that the sales team had to use approved tools and channels to communicate with
    clients. For example, they want them to use `Salesforce CRM` and `Zoom` so that
    the communications can be tracked and managed.


    The VP of Sales was concerned that having `FaceTime`, `Messages`, and things like
    that available to the sales team may lead to customer contact and communication
    that falls outside of the company standard. Along those same lines, the VP has
    requested that only approved Apps be allowed on the iPads and that the `App Store`
    should be locked down. Finally, it is important that the devices can be remotely
    managed and if necessary wiped and rebuilt over the air if there was any software
    issue with the devices. These sales people travel and cannot be without their
    device for any considerable length of time, and they are not always near an `Apple
    Retail Store`.


    To enable these restrictions and provide over-the-air configuration/reconfiguration,
    we need to ensure that the following options are set in `Profile Manager` for
    these devices:


    *   Minimum passcode lock that changes every 90 days

    *   Remote wipe capabilities in case the device is lost

    *   Configuration of corporate office Wi-Fi access

    *   Configuration of VPN services when working remotely

    *   Enabled MDM enrollment via `DEP` during the `Setup Assistant`

    *   The ability to use `iMessage` and `FaceTime` disabled

    *   The `App Store` disabled

    *   `Zoom` and `Salesforce` pre-installed


    We will need to ensure that our sales team iPad Configuration Profile provides
    all of these features later on in this chapter.


    ## Anticipated Support Needs


    At this point, we have developed our goals and technology strategy for these two
    deployments. While it is difficult to predict every possible support need, we
    can anticipate a few things and have a plan in place to address these. For the
    BYOD scenario, the most common support requirement will be the MDM enrollment
    process. We will be creating and distributing a company-wide email to our end
    users that will walk them through the process of onboarding their device, including
    a web form that allows them to request BYOD services and enrollment step-by-step
    guide.


    For the sales team iPad scenario, we will train our help desk to walk the sales
    team through the `Setup Assistant` and provide some basic software troubleshooting
    including a full reset of the device in the event that it is required. Because
    we are using over-the-air configuration, anytime a full reset is done on the device,
    it will automatically configure the correct settings, install the required Apps,
    and apply any device restrictions. At this point, we are ready to begin the technical
    work inside `Profile Manager`.


    ## Configuring Profile Manager for the BYOD Scenario


    There are a number of things we need to do to prepare `Profile Manager` for a
    BYOD deployment. The first thing we are going to do is to create a device group.
    Open `Profile Manager` and click the `Device Groups` button on the left sidebar
    as shown in Figure [12-1](#492151_1_En_12_Chapter.xhtml#Fig1).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig1_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig1_HTML.jpg)


    Figure 12-1

    Viewing the Device Groups in Profile Manager


    Go ahead and click the `Add Device Group` button or click the `+` button on the
    lower part of the Device Groups pane. `Double-click` the name and rename it `MyCompany
    BYOD` as shown in Figure [12-2](#492151_1_En_12_Chapter.xhtml#Fig2). Click `Save`
    to apply the name change.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig2_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig2_HTML.jpg)


    Figure 12-2

    Create a new Device Group


    Next, we need to define the settings for the devices in the `MyCompany BYOD` group.
    In the past, we modified settings for each individual device. That is going to
    be very time consuming and error prone on a massive scale, so we are going to
    define all of our settings at a group level and then just assign devices to our
    group each time we onboard a new iPhone into the MDM. Click the `Settings` tab
    and then click the `Edit` button under the *Settings for MyCompany BYOD* heading
    as shown in Figure [12-3](#492151_1_En_12_Chapter.xhtml#Fig3).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig3_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig3_HTML.jpg)


    Figure 12-3

    Edit the Configuration Profile for our new Device Group


    Now we are going to configure the Mobile Configuration Profile the same way that
    we have with individual devices, but this time at the group level. The General
    payload is similar to what we have done in the past. Just set it to Automatic
    Push and provide a basic BYOD description. We’ll take the default security options
    because these will not be supervised devices anyway.


    Next, we will need to start configuring our payloads to match our requirements
    from earlier in the chapter. It’s important to note that we won’t need to configure
    anything special to enable remote wipe or remote management capabilities as that
    is automatically set when the device joins our MDM. We do need to configure the
    other security options.


    First up, click the `Passcode` payload, and let’s configure that to our corporate
    standards with the `complex passcode` and the requirement to `change it every
    90 days` as shown in Figure [12-4](#492151_1_En_12_Chapter.xhtml#Fig4).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig4_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig4_HTML.jpg)


    Figure 12-4

    Set the Passcode payload


    Next up is wireless. Click the `Network` payload, and we can configure our corporate
    wireless network as shown in Figure [12-5](#492151_1_En_12_Chapter.xhtml#Fig5).
    Your settings will vary depending on your network, SSID, security configuration,
    and so on.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig5_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig5_HTML.jpg)


    Figure 12-5

    Configure your corporate wireless settings


    Next, we need to configure VPN so click the `VPN` payload and configure it as
    shown in Figure [12-6](#492151_1_En_12_Chapter.xhtml#Fig6).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig6_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig6_HTML.jpg)


    Figure 12-6

    Configure the VPN payload


    Finally, we need to configure a couple of the restrictions. Click the `Restrictions`
    payload and scroll through the options on the `Functionality` tab. We will need
    to *enable* `Force encrypted backups` and *disable* `Show Notification Center
    in Lock screen` as shown in Figure [12-7](#492151_1_En_12_Chapter.xhtml#Fig7).'
