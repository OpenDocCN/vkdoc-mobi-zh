- fmt: '# 兑换应用程序


    在分配应用程序时，首先要做的是兑换一批许可证。为了方便本练习，我们无需购买`App Store credit`，只需选择几个免费应用来操作即可。打开`Profile
    Manager`，点击侧边栏中的`Apps`图标。在屏幕右下角，点击`Get More Apps`链接。这会重定向到 Apple School Manager
    或 Apple Business Manager。请使用您的机构管理员账户登录。


    登录后，点击侧边栏`Content`标题下的`Apps and Books`链接，如图[9-46](#492151_1_En_9_Chapter.xhtml#Fig46)所示。您会看到我这里已有一些免费许可证，我们将再添加几个。使用屏幕顶部的`search
    bar`开始搜索`App Store`。本次练习我们将主要关注`iOS`应用，但这里也能找到`macOS`应用。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig46_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig46_HTML.jpg)


    图 9-46

    Apple School Manager 中的 Apps and Books 部分


    为了乐趣，我们继续以`Angry Birds`为例，在搜索栏中输入“Angry Birds”。在搜索结果列表顶部附近选择`Angry Birds 2`。点击后，会提示为该应用`Buy
    Licenses`。从弹出菜单中选择`Organization`并输入数量。本例中我们选择`three`个。您的屏幕应类似于图[9-47](#492151_1_En_9_Chapter.xhtml#Fig47)。点击`Get`按钮购买许可证并将其添加到我们的托管分发池中。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig47_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig47_HTML.jpg)


    图 9-47

    输入数量并点击 Get 按钮购买许可证


    购买许可证后，兑换过程可能需要五到十分钟才能完成，之后您最终会在 Apps and Books 列表中看到`Angry Birds 2`出现。请继续为`Keynote`、`Pages`、`Numbers`、`iMovie`、`Microsoft
    Word`、`Microsoft Excel`和`Microsoft PowerPoint`完成此过程。完成后，返回`Profile Manager`，您应该会看到一系列与图[9-48](#492151_1_En_9_Chapter.xhtml#Fig48)中类似的应用。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig48_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig48_HTML.jpg)


    图 9-48

    Profile Manager 中可供我们使用的托管分发应用程序池


    专业提示：`Profile Manager`和`VPP`/`DEP`会定期同步，但如果您没有耐心，可以通过点击`Devices`，然后点击添加/删除占位符按钮旁边的刷新按钮来强制同步。


    ## 应用分发


    现在我们已经兑换了应用并在`Profile Manager`中可用，是时候将它们分配给我们的测试设备了。点击侧边栏中的`Devices`图标，然后选择我们的测试
    iOS 设备。本例中是我们本章一直在使用的 iPad。点击`Apps`选项卡，然后点击`+`按钮，如图[9-49](#492151_1_En_9_Chapter.xhtml#Fig49)所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig49_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig49_HTML.jpg)


    图 9-49

    向测试设备分配应用程序


    出现提示时，我们将勾选`Angry Birds 2`、`Keynote`和`Microsoft Excel`旁边的复选框。您会注意到还有安装模式的选项。为了查看差异，请为其中一个选择`Automatic`，另一个选择`Tethered`，第三个选择`Manual`。您的窗口应类似于图[9-50](#492151_1_En_9_Chapter.xhtml#Fig50)。点击`OK`按钮继续，然后点击`Save`按钮应用到设备。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig50_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig50_HTML.jpg)


    图 9-50

    选择不同的安装模式选项以查看它们之间的差异


    如果查看测试设备，您会看到`Angry Birds 2`应该在主屏幕上开始下载和安装。根据您的网速，这可能需要几分钟。您不会看到另外两个应用，因为它们未设置为自动安装。因为`Excel`被设置为`Manual`，所以用户需要去`App
    Store`手动下载，除非设备在某个时间点提示他们安装。而`Keynote`只会在我们使用`Tethered Content Caching`（但我们没有）的情况下才会下载。


    专业提示：对于设备众多但共享带宽有限的学校或企业来说，系留功能非常有用。对于像`iMovie`或`GarageBand`这样的大型应用，可能更倾向于强制应用仅在设备与运行了`content
    caching`服务的 Mac 配置的子网连接时才安装到设备上。


    让我们强制将所有这三个应用都`automatically`安装，因此对`Installation Mode`选项进行必要的更改，并再次点击`Save`进行更新，如图[9-51](#492151_1_En_9_Chapter.xhtml#Fig51)所示。现在所有应用都将安装到
    iPad 上。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig51_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig51_HTML.jpg)


    图 9-51

    将所有分配的应用的安装模式更新为自动


    您可能已经猜到，将图书分配给设备的方式完全相同。另一点需要注意的是，虽然本章中我们一直将应用、图书和配置描述文件应用到设备，但您也可以将这些应用到特定用户或用户组。分配图书时唯一的注意事项是，与应用程序不同，一旦您将图书分发给用户，就无法收回该许可证。如果您的组织使用`iBooks
    Author`应用程序创建自定义的`iBooks Textbooks`，您可以使用`Profile Manager`分发这些书籍，但只能将它们分配给用户，而不是设备。


    除了通过`Apple School Manager`使用托管分发与托管`Apple IDs`外，您还可以将组织购买的应用程序许可证提供给拥有非托管`Apple
    IDs`的用户。要启用此功能，请点击`Profile Manager`侧边栏中的`Groups`按钮，然后选择`Everyone group`。向下滚动并展开`Volume
    Purchasing Managed Distribution`部分，勾选`Enable Volume Purchasing Managed Distribution
    Services`旁边的复选框，如图[9-52](#492151_1_En_9_Chapter.xhtml#Fig52)所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig52_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig52_HTML.jpg)


    图 9-52

    为组织外的 Apple IDs 启用批量购买托管分发


    启用此功能后，为该用户创建一个新的`User account`，并使用图[9-53](#492151_1_En_9_Chapter.xhtml#Fig53)中所示的按钮向他们发送加入贵组织`Volume
    Purchase Managed Distribution`的`email invitation`。当他们收到邮件时，系统会提示他们使用个人`Apple ID`登录`App
    Store`。然后，您可以像处理托管 Apple ID 或设备一样为该用户分配应用程序。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig53_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig53_HTML.jpg)


    图 9-53

    “Send email invitation…” 按钮


    分发应用和图书相对直观，因此也请在`macOS`客户端上花些时间测试一下。该过程基本相同，只是应用来自`Mac App Store`而非`iOS`应用。'
  raw: '### Redeeming Apps


    The first thing we want to do when assigning our Apps is to redeem a pool of licenses.
    For the purposes of this exercise, instead of purchasing *App Store credit*, we
    can just pick a few free Apps to play around with. Open **Profile Manager** and
    click the **Apps** icon in the sidebar. In the lower-right corner of the screen,
    click the **Get More Apps** link. It should redirect you to Apple School Manager
    or Apple Business Manager. Go ahead and sign in with your institutional admin
    account.


    Once you are signed in, click the **Apps and Books** link under the **Content**
    heading in the sidebar as shown in Figure [9-46](#492151_1_En_9_Chapter.xhtml#Fig46).
    You will see that I have a pool of various free licenses already here, and we
    are going to add a few more. Use the **search bar** near the top of the screen
    to begin searching the *App Store*. For this exercise, we will focus on *iOS,*
    but we can also find *macOS* Apps here as well.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig46_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig46_HTML.jpg)


    Figure 9-46


    The Apps and Books section of Apple School Manager


    Let’s stick with our *Angry Birds* example just for fun and enter **“Angry Birds”**
    into the search bar. Select *Angry Birds 2* near the top of the search results
    list. Upon clicking it, you will get a prompt to **Buy Licenses** for the App.
    Select the **Organization** from the pop-up menu and enter a quantity. We’ll pick
    up **three** of them in this case. Your screen should look similar to Figure [9-47](#492151_1_En_9_Chapter.xhtml#Fig47).
    Click the **Get** button to purchase the licenses and add them to our Managed
    Distribution pool.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig47_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig47_HTML.jpg)


    Figure 9-47


    Enter a quantity and click the Get button to purchase the licenses


    Once you purchase the licenses, it may take five or ten minutes for the redemption
    process to complete, and then you will eventually see *Angry Birds 2* appear in
    your list of Apps and Books. Go ahead and complete this process for *Keynote,
    Pages, Numbers, iMovie, Microsoft Word, Microsoft Excel,* and *Microsoft PowerPoint*.
    When this has completed, go back to Profile Manager, and you should see a list
    of Apps that are similar to those found in Figure [9-48](#492151_1_En_9_Chapter.xhtml#Fig48).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig48_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig48_HTML.jpg)


    Figure 9-48


    The Managed Distribution pool of Apps available to us in Profile Manager


    Pro Tip


    Profile Manager and VPP/DEP synchronize pretty regularly, but if you are not the
    patient type, you can force a sync by clicking Devices and then clicking the refresh
    button next to the add/remove Placeholder buttons.


    ### App Distribution


    Now that we have our Apps redeemed and available in Profile Manager, it is time
    to assign them to our test device. Click the **Devices** icon in the sidebar and
    then select our test iOS device. In my case, it’s the iPad we’ve been using throughout
    this chapter. Click the **Apps** tab and then click the **+** button as shown
    in Figure [9-49](#492151_1_En_9_Chapter.xhtml#Fig49).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig49_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig49_HTML.jpg)


    Figure 9-49


    Assigning Apps to our test device


    When prompted, we are going to check the boxes next to **Angry Birds 2**, **Keynote**,
    and **Microsoft Excel**. You will notice there are also options for installation
    mode. To see the differences, choose **Automatic** for one, **Tethered** for another,
    and **Manual** for the third. Your window should look similar to Figure [9-50](#492151_1_En_9_Chapter.xhtml#Fig50).
    Click the **OK** button to continue and then click the **Save** button to apply
    to the device.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig50_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig50_HTML.jpg)


    Figure 9-50


    Select different Installation Mode options to see the differences between them


    If you take a look at the test device, you will see *Angry Birds 2* should be
    downloading and installing on the Home Screen. Depending on your Internet speed,
    this may take a few minutes. You will not see the other two because they are not
    set to Automatic. Because *Excel* was set to Manual, the user has to go to the
    App Store and download it manually unless they are prompted on the device to install
    at some point. *Keynote* will only download if we are using **Tethered Content
    Caching** , which we are not.


    Pro Tip


    Tethering is a great feature for schools or businesses with a lot of devices and
    limited shared bandwidth. For large Apps like *iMovie* or *GarageBand*, it may
    be preferable to force the Apps to only install on the device if the device is
    on a subnet with a Mac configured with the **content caching** service running.


    Let’s force all three of these to install **automatically**, so make the necessary
    changes to the **Installation Mode** options and click **Save** again to update
    as shown in Figure [9-51](#492151_1_En_9_Chapter.xhtml#Fig51). All of the Apps
    will now install onto the iPad.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig51_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig51_HTML.jpg)


    Figure 9-51


    Update the installation mode to Automatic for all of the assigned Apps


    As you might expect, assigning Books to the device is done in the exact same fashion.
    Another item of note is that while we have been applying Apps, Books, and Configuration
    Profiles to devices in this chapter, you can also apply these to specific users
    or groups of users as well. The only caveat with assigning Books is that unlike
    Apps, once you distribute a Book to a user, you cannot reclaim the license. If
    your organization creates custom *iBooks Textbooks* using the *iBooks Author*
    application, you can distribute those books using Profile Manager, but you can
    only assign them to users, not devices.


    In addition to using Managed Distribution with Managed *Apple IDs* through Apple
    School Manager, you can also provide licenses to Apps that were purchased by your
    organization to users with non-Managed *Apple IDs*. To enable this functionality,
    click the **Groups** button in the Profile Manager sidebar and then select the
    **Everyone group**. Scroll down and expand the **Volume Purchasing Managed Distribution**
    section and check the box next to **Enable Volume Purchasing Managed Distribution
    Services** as shown in Figure [9-52](#492151_1_En_9_Chapter.xhtml#Fig52).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig52_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig52_HTML.jpg)


    Figure 9-52


    Enabling Volume Purchased Managed Distribution for Apple IDs outside of your organization


    Once you have enabled this, create a new User account for this user and send them
    an **email invitation** to join *Volume Purchase Managed Distribution* with your
    organization using the button shown in Figure [9-53](#492151_1_En_9_Chapter.xhtml#Fig53).
    When they receive the email, they will be prompted to sign into the *App Store*
    with their personal *Apple ID*. You can then assign Apps to that user the same
    way you do with Managed Apple IDs or devices.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig53_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig53_HTML.jpg)


    Figure 9-53


    The Send email invitation… button


    Distributing Apps and Books is relatively intuitive so spend some time testing
    this on a *macOS* client as well. The process is basically the same, but with
    applications from the *Mac App Store* instead of *iOS* Apps.'
