  trans: '

    # 时光机器备份


    作为系统管理员，您应该部署某种备份机制，以便在发生灾难性系统故障时存储关键数据的副本。时光机器是在安全数据中心备份个人 Mac 或 Mac 服务器的一种简单而有效的方式。在办公室或教室环境中，这可能不是最佳解决方案，因为外置驱动器很容易丢失。虽然时光机器驱动器可以加密，但从成本角度考虑，为每个用户配备外置驱动器可能并不可行。在这些情况下，请考虑使用基于云的文件备份解决方案，例如
    iCloud Drive 或 Microsoft OneDrive for Business。


    > **专业提示**

    > 如果您使用时光机器备份 Mac，并且其格式为 HFS+，请不要让 macOS 将其转换为 APFS，因为在此过程中可能会损坏现有的备份数据。如果您计划更换为
    APFS 格式的磁盘并归档 HFS+ 格式的驱动器，最好从一个新格式化的驱动器开始。


    # 文件系统与 macOS


    每个操作系统都有其偏好的文件系统。如果您有 Microsoft Windows 系统管理背景，您一定听说过 NTFS 或 FAT32，但您可能只知道苹果使用的文件系统称为
    Mac 格式或苹果格式。实际上，Mac 有几种常见的文件系统。分层文件系统（HFS）及其较新的版本 HFS+（对旧 HFS 格式的增强）现在已是苹果的旧文件系统。相对较新的苹果文件系统（APFS）随
    macOS High Sierra 发布，具有一系列现代功能和增强的安全性。除了 macOS，APFS 也是 iPhone 和 iPad 等 iOS 设备的文件系统。


    ## 分层文件系统增强版（HFS+）


    Mac 的传统文件系统源于 Mac OS Classic，在操作系统的较新版本中被称为 Mac OS 扩展。它缺乏许多现代功能，如 ZFS、NTFS 和 APFS
    中存在的校验和、快照以及多进程同时访问。您仍然可以将驱动器格式化为 HFS+，但 APFS 现在被认为是 macOS 的标准，特别是对于配置为启动卷的固态硬盘（SSD）。


    ## 苹果文件系统（APFS）


    APFS 是 macOS 和 iOS 文件系统的现代标准。它提供了许多现代功能，包括空间共享容器、快照、更强的加密以及比 HFS+ 更快的性能。容器概念对
    macOS 来说是新的，在 APFS 中大量使用。容器包含一个或多个单独的卷，这些卷显示为独立的分区，但共享相同的空间，并能根据需求动态增长或缩小。这意味着，当特定卷需要更多空间时，数据可以被分配给该卷，而无需用户交互或知晓。


    这种空间分配方案在新的 macOS Catalina 中特别有用，因为系统文件与用户数据位于不同的只读卷上。如果您通过“磁盘工具”查看安装了 macOS Catalina
    的驱动器，如图 2-3 所示，您会看到两个不同的卷。Macintosh HD 在一个卷上提供基础操作系统和应用程序，而 Macintosh HD – Data
    存储用户目录和用户安装的应用程序。这些都在一个单独的容器中（显示为 Macintosh HD），并且卷会根据需要增长。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig3_HTML.jpg](img/492151_1_En_2_Fig3_HTML.jpg)


    **图 2-3** 由多个卷组成的容器构成了 Catalina 的启动磁盘


    ## 分区方案与驱动器安全选项


    在 macOS 中选择格式化驱动器时，您会注意到有很多选项，包括*区分大小写、加密、日志式*等的各种组合。苹果提供了一篇知识库文章来定义这些选项。


    知识库文章可以在此处找到：

    * [`https://support.apple.com/guide/disk-utility/file-system-formats-available-in-disk-utility-dsku19ed921c/mac`](https://support.apple.com/guide/disk-utility/file-system-formats-available-in-disk-utility-dsku19ed921c/mac)


    除了各种格式化选项外，您可能还会被提示选择驱动器分区方案。有三种选项：

    *   **GUID：** 这是基于 Intel 的 macOS 启动卷的标准分区方案选项。

    *   **Apple 分区方案：** 现在很少使用，它是 Mac OS Classic 和早期在 PowerPC 架构上运行的 Mac OS X 版本的旧分区方案。

    *   **主引导记录：** 这是 Windows 的分区方案，用于 FAT 和 ExFAT 格式。


    最后，当您抹掉卷并选择格式时，可能也注意到了“安全选项...”按钮。这些安全选项让您可以选择磁盘上数据被抹除的彻底程度。一些组织要求对所有要停用的磁盘进行完全安全的清理。默认情况下，macOS
    使用最不安全（但最快）的单次抹除选项。如果您需要更安全的东西，例如符合国防部 5220.22-M 协议的要求，您可以通过将安全抹除滑块一直移动到最右侧来选择该选项。


    ## APFS 快照


    我们将在下一节更详细地讨论 APFS，但值得一提的是，在系统恢复方面，苹果新文件系统的功能之一就是能够对计算机状态进行文件级快照。如果驱动器格式化为 APFS，当要安装主要的
    macOS 更新时，会创建一个 APFS 快照并保存为一个恢复点。通常，操作系统会决定何时适合进行快照，并且这个过程是自动的，因此不需要用户干预。


    有时您可能希望强制创建快照。苹果确实通过终端中的命令行工具提供了这种功能。我们将在本章后面更详细地介绍终端，但在这里，只需通过“访达”浏览到 `/应用程序/实用工具`
    并启动“终端”应用程序。您将看到一个命令提示符。要创建快照，我们将使用 `tmutil` 命令。在终端的命令提示符下输入以下命令并按回车键以创建快照：


    ```

    tmutil snapshot

    ```


    如果一切顺利，终端会显示一条消息，告知您已创建了一个带有今天日期/时间戳的快照。如果您好奇是否存在任何快照，也可以使用 `tmutil` 命令列出所有可用的快照。快照存储在文件系统级别，仅在操作系统需要时（例如，使用时光机器时）才被挂载。输入以下命令并按回车键：


    ```

    tmutil listlocalsnapshots /

    ```


    如果您需要从快照恢复 Mac，只需启动进入 macOS 恢复，然后选择“从时光机器备份恢复”选项。选择存储快照的驱动器（很可能是您的内置启动磁盘）。您将看到一个可用快照列表（如果存在）。只需选择您想要恢复的快照，然后点击“继续”。恢复过程完成后，您的
    Mac 将重新启动，并应恢复到选定快照时的状态。


    > **专业提示**

    > APFS 快照更多是恢复工具，而非备份工具。我建议将快照用作在重大更改前恢复到某个时间点的一种方式，并继续将整个磁盘备份到另一个驱动器或云端。快照在创建
    24 小时后会被删除，因此它们不是可靠的长期备份方法。

    '
- fmt: '## Installing and Upgrading macOS


    The default method for upgrading from one version of macOS to the next is by using
    the Mac App Store or the Software Update System Preference to download and install
    the next major release. This is helpful if you already have a healthy Mac that
    just needs the newest OS, but if you need to do a clean install of macOS on a
    newly formatted drive, we need to do a little more legwork.


    ### Install from Internet Recovery


    A common option, if you have Internet access, is to boot into macOS Recovery via
    the Internet Recovery option. From here, you can erase and format your internal
    hard disk and then install a new copy of macOS from Apple over the Internet. While
    effective, this can take some time and may not be feasible for large numbers of
    Macs that share a single Internet connection in a school or large corporation.


    ### Creating a Bootable USB Install Disk


    In the case where you may not have an active Internet connection or you have many
    Macs that need to have their internal drives erased and a clean copy of macOS
    installed, you will want to create one or more bootable install USB disks. To
    do this, you need a USB flash drive with at least 8 GB of space, a copy of a macOS
    Installer application, and access to the Terminal app.


    The first step is to download the macOS Installer from the Mac App Store or via
    the Software Update System Preference. When it finishes downloading, the installer
    will likely automatically launch and prompt you to begin installation. When it
    does this, cancel the installer and quit the installation application. Use the
    Finder to browse to the `/Applications` folder and verify that the `Install macOS
    Catalina` application is present.


    If you haven’t already done so, now insert the USB flash drive and open Disk Utility.
    Format the drive for APFS and name it. Make note of the name. In the script I’m
    using, the disk is named `Untitled`. Next, browse to `/Applications/Utilities`
    and then open the Terminal app. At the prompt, enter the following command:


    ```

    sudo /Applications/Install\ macOS\ Catalina.app/Contents/Resources/createinstallmedia
    --volume /Volumes/Untitled --nointeraction

    ```


    If you entered the script correctly, it will prompt you for your administrative
    password. This is the same password that you use to log in to the Mac, assuming
    you have local administrative rights. It may also ask you to grant the Terminal
    application permission to access the attached USB disk, and if it does, you can
    allow this. After authenticating, you will see the output of the Terminal as it
    formats and creates the bootable USB disk as shown in Figure [2-4](#492151_1_En_2_Chapter.xhtml#Fig4).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig4_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig4_HTML.jpg)


    **Figure 2-4**


    Using the Terminal to create a bootable USB disk


    **Pro Tip**


    The script in this example assumes you are using macOS Catalina. If you are using
    one of the other versions, simply substitute the name of the installer application.
    For example, use `macOS High Sierra` instead of `macOS Catalina`, and the script
    will still work. The script is simply referencing the installer application we
    specify in the `/Applications` path.


    ### Creating a Bootable Technician Drive


    A bootable USB installer is useful, but it is also still as limited as using macOS
    Recovery in that you are limited to just a few utilities and the Terminal app.
    Wouldn’t it be nice to have a full Mac interface with a Desktop, many applications,
    and Finder access? Yes! Every good Mac tech should have a bootable external hard
    disk that has a full copy of macOS for troubleshooting purposes. I recommend one
    of the new external solid-state drives as they are more portable and less prone
    to wear and tear as they get jostled around in your laptop bag.


    The purpose of one of these drives is to have all of your macOS troubleshooting
    tools in one place. I usually keep copies of various software installers, Disk
    First Aid tools, and things of that nature on mine. It can be really helpful to
    diagnose issues involving the internal startup volume, retrieve user data if a
    recent backup doesn’t exist, or make any other alteration to the startup volume
    without having to resort to doing everything via the command line interface.


    **Pro Tip**


    When booting a Mac from one of these external drives, particularly if you don’t
    have a way to log in due to a technical issue, use the `option` key modifier at
    boot so you can select the drive as the startup disk without having to boot into
    the OS and set it via System Preferences.


    It is very simple and straightforward to create one of these drives. Simply connect
    it to your Mac, format it as an APFS volume using the GUID partition map, and
    then run the macOS Installer from the `/Applications` folder but specify the external
    drive when stepping through the install screen. Note that you may need to click
    the button that says show all disks to see the external drive. Once macOS is installed
    on the drive, you just step through the Setup Assistant and create the local user
    account just as if you were installing it on the internal disk.


    **Pro Tip**


    As part of the installation process, your Mac will likely set the external drive
    as its new preferred startup volume. Be sure to change this back to the internal
    drive by using the Startup Disk System Preference, or else it may create an unnecessary
    pause in the boot time of your Mac as it looks for the external drive before booting
    from the internal startup disk.'
  raw: '## Installing and Upgrading macOS


    The default method for upgrading from one version of *macOS* to the next is by
    using the *Mac App Store* or the *Software Update System Preference* to download
    and install the next major release. This is helpful if you already have a healthy
    Mac that just needs the newest OS, but if you need to do a clean install of *macOS*
    on a newly formatted drive, we need to do a little more legwork.


    ### Install from Internet Recovery


    A common option, if you have Internet access, is to boot into *macOS Recovery*
    via the Internet Recovery option. From here, you can erase and format your internal
    hard disk and then install a new copy of *macOS* from Apple over the Internet.
    While effective, this can take some time and may not be feasible for large numbers
    of Macs that share a single Internet connection in a school or large corporation.


    ### Creating a Bootable USB Install Disk


    In the case where you may not have an active Internet connection or you have many
    Macs that need to have their internal drives erased and a clean copy of *macOS*
    installed, you will want to create one or more bootable install USB disks. To
    do this, you need a **USB flash drive with at least 8 GB of space**, a copy of
    a **macOS Installer** application, and access to the **Terminal** app.


    Create a Bootable USB Install Disk


    The first step is to download the **macOS Installer** from the *Mac App Store*
    or via the *Software Update System Preference*. When it finishes downloading,
    the installer will likely automatically launch and prompt you to begin installation.
    When it does this, **cancel** the installer and **quit** the installation application.
    Use the *Finder* to browse to the ***/Applications*** folder and verify that the
    **Install macOS Catalina** application is present.


    If you haven’t already done so, now insert the **USB flash drive** and open *Disk
    Utility*. Format the drive for **APFS** and name it. Make note of the name. In
    the script I’m using, the disk is named **Untitled**. Next, browse to ***/Applications/Utilities***
    and then open the *Terminal* app. At the prompt, enter the following command:


    ```

    sudo /Applications/Install\ macOS\ Catalina.app/Contents/Resources/createinstallmedia
    --volume /Volumes/Untitled --nointeraction

    ```


    If you entered the script correctly, it will prompt you for your administrative
    password. This is the same password that you use to log in to the Mac, assuming
    you have local administrative rights. It may also ask you to grant the Terminal
    application permission to access the attached USB disk, and if it does, you can
    allow this. After authenticating, you will see the output of the Terminal as it
    formats and creates the bootable USB disk as shown in Figure [2-4](#492151_1_En_2_Chapter.xhtml#Fig4).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig4_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Using the Terminal to create a bootable USB disk


    Pro Tip


    The script in this example assumes you are using *macOS Catalina*. If you are
    using one of the other versions, simply substitute the name of the installer application.
    For example, use *macOS High Sierra* instead of *macOS Catalina,* and the script
    will still work. The script is simply referencing the installer application we
    specify in the ***/Applications*** path.


    ### Creating a Bootable Technician Drive


    A bootable USB installer is useful, but it is also still as limited as using *macOS
    Recovery* in that you are limited to just a few utilities and the Terminal app.
    Wouldn’t it be nice to have a full Mac interface with a Desktop, many applications,
    and *Finder* access? Yes! Every good Mac tech should have a bootable external
    hard disk that has a full copy of *macOS* for troubleshooting purposes. I recommend
    one of the new external solid-state drives as they are more portable and less
    prone to wear and tear as they get jostled around in your laptop bag.


    The purpose of one of these drives is to have all of your *macOS* troubleshooting
    tools in one place. I usually keep copies of various software installers, Disk
    First Aid tools, and things of that nature on mine. It can be really helpful to
    diagnose issues involving the internal startup volume, retrieve user data if a
    recent backup doesn’t exist, or make any other alteration to the startup volume
    without having to resort to doing everything via the command line interface.


    Pro Tip


    When booting a Mac from one of these external drives, particularly if you don’t
    have a way to log in due to a technical issue, use the **option** key modifier
    at boot so you can select the drive as the *startup disk* without having to boot
    into the OS and set it via *System Preferences*.


    It is very simple and straightforward to create one of these drives. Simply connect
    it to your Mac, format it as an **APFS** volume using the **GUID** partition map,
    and then run the **macOS Installer** from the ***/Applications*** folder but specify
    the **external drive** when stepping through the install screen. Note that you
    may need to click the button that says **show all disks** to see the external
    drive. Once *macOS* is installed on the drive, you just step through the *Setup
    Assistant* and create the local user account just as if you were installing it
    on the internal disk.


    Pro Tip


    As part of the installation process, your Mac will likely set the external drive
    as its new preferred startup volume. Be sure to change this back to the internal
    drive by using the *Startup Disk System Preference,* or else it may create an
    unnecessary pause in the boot time of your Mac as it looks for the external drive
    before booting from the internal startup disk.'
  trans: '

    ## 安装与升级 macOS


    从当前 macOS 版本升级至下一个版本，通常的做法是使用 Mac App Store 或“系统偏好设置”中的“软件更新”来下载并安装下一个主要版本。如果你的
    Mac 状态良好，只是需要最新的操作系统，这种方法很方便。但如果需要在新格式化的驱动器上全新安装 macOS，我们就得多做一些准备工作。


    ### 从互联网恢复安装


    如果具备网络连接，一个常见的选择是通过“互联网恢复”选项启动至 macOS 恢复模式。在此模式下，你可以抹掉并格式化内置硬盘，然后通过互联网从 Apple
    安装全新的 macOS。这种方法虽然有效，但可能耗时较长，并且在校园或大型企业中，如果大量 Mac 共享一个网络连接，则可能不可行。


    ### 创建可引导的 USB 安装盘


    如果你没有可用的网络连接，或者需要为大量 Mac 抹掉内置驱动器并全新安装 macOS，你将需要创建一个或多个可引导的 USB 安装盘。为此，你需要一个至少
    8 GB 空间的 USB 闪存盘、一份 macOS 安装器应用程序，并能访问“终端”应用。


    第一步是从 Mac App Store 或通过“软件偏好设置”中的“软件更新”下载 macOS 安装器。下载完成后，安装器通常会自行启动并提示你开始安装。此时，取消安装器并退出安装应用程序。使用“访达”浏览到
    `/应用程序` 文件夹，确认 `安装 macOS Catalina` 应用程序存在。


    如果还未插入 USB 闪存盘，请现在插入并打开“磁盘工具”。将驱动器格式化为 APFS 格式并为其命名。记下这个名称。在我使用的脚本中，磁盘名称为 `Untitled`。接着，浏览到
    `/应用程序/实用工具`，然后打开“终端”应用。在提示符处输入以下命令：


    ```

    sudo /Applications/Install\ macOS\ Catalina.app/Contents/Resources/createinstallmedia
    --volume /Volumes/Untitled --nointeraction

    ```


    如果脚本输入正确，它会提示你输入管理员密码。假设你拥有本地管理员权限，此密码与你登录 Mac 时使用的密码相同。它可能还会要求授予“终端”应用访问已连接的
    USB 磁盘的权限，如果是这样，你可以允许此操作。验证通过后，你将在终端中看到输出信息，显示其正在格式化并创建可引导 USB 磁盘，如图 2-4 所示。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig4_HTML.jpg](img/492151_1_En_2_Fig4_HTML.jpg)


    **图 2-4**


    使用“终端”创建可引导 USB 磁盘


    **专业提示**


    此示例中的脚本假设你使用的是 macOS Catalina。如果你使用的是其他版本，只需替换安装器应用程序的名称即可。例如，将 `macOS Catalina`
    替换为 `macOS High Sierra`，脚本仍然有效。该脚本只是引用我们在 `/应用程序` 路径中指定的安装器应用程序。


    ### 创建可引导的技术员硬盘


    可引导 USB 安装器很有用，但它的局限性同样明显，就像使用 macOS 恢复模式一样，你只能使用有限的实用工具和“终端”应用。如果能拥有一个完整的 Mac
    界面，包括桌面、众多应用程序和访达访问权限，那不是更好吗？是的！每位优秀的 Mac 技术人员都应拥有一个包含完整 macOS 副本的可引导外置硬盘，用于故障排除。我推荐使用新型的外置固态硬盘，因为它们更便于携带，且在放入笔记本电脑包中被晃动时更不易磨损。


    这类硬盘的目的是将你所有的 macOS 故障排除工具集中在一处。我通常会在我的硬盘上保存各种软件安装器的副本、磁盘急救工具以及此类文件。这对于诊断涉及内置启动宗卷的问题、在没有近期备份的情况下恢复用户数据，或者在不依赖命令行界面的情况下对启动宗卷进行任何其他修改，都极其有帮助。


    **专业提示**


    从这类外置驱动器启动 Mac 时，特别是由于技术问题无法登录时，请在启动时使用 `option` 键组合，这样你就可以选择该驱动器作为启动盘，而无需启动到操作系统并通过“系统偏好设置”进行设置。


    创建这类硬盘非常简单明了。只需将其连接到 Mac，使用 GUID 分区图将其格式化为 APFS 宗卷，然后从 `/应用程序` 文件夹运行 macOS 安装器，但在安装界面步骤中指定外置驱动器。请注意，你可能需要点击“显示所有磁盘”按钮才能看到外置驱动器。一旦
    macOS 安装到该驱动器上，你只需按步骤完成“设置助理”并创建本地用户帐户，就像在内部磁盘上安装一样。


    **专业提示**


    作为安装过程的一部分，你的 Mac 很可能会将外置驱动器设置为新的首选启动宗卷。请务必使用“启动磁盘”系统偏好设置将其改回内置驱动器，否则可能导致 Mac
    在启动时寻找外置驱动器，从而在从内部启动磁盘启动前产生不必要的延迟。


    '
- fmt: '# Introduction to the Terminal


    You got a Mac because they were *easy to use* and didn’t require those command
    line interfaces like `Windows` or `Linux`, right? So why are we talking about
    command line interfaces already in the second chapter of this book?! The answer
    is simple—because you will run into situations where powerful utilities are *only*
    available via the Terminal, as evidenced by the command we just had to use to
    create a bootable USB install disk. Beyond that, using scripts can be an effective
    tool for automating various mundane tasks across many Mac clients at once using
    tools like Apple Remote Desktop (ARD). This section introduces many of the common
    commands and concepts that you will use on a regular basis when using the Terminal
    or writing your own scripts.


    ## Navigating With The Command Line Interface


    When you open the Terminal, you will see something like the following:


    ```

    dwsmith@dwsmiths-MBP ~ %

    ```


    This is the command prompt, and it is showing you which user you are signed in
    as and where you currently are on the computer. The `~` (tilde) represents the
    absolute path in relation to my home directory. In my case, it is the home directory
    of my user account on my MacBook Pro. Technically, we are in `/Users/dwsmith`
    if I were to browse to the same location in the `Finder`.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig5_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig5_HTML.jpg)


    **Figure 2-5:** Viewing the same directory via the Terminal and the Finder


    I may want to see what else is in this directory, and if I want to do that, I
    would use the command `ls`. Go ahead and enter the following at the command prompt:


    ```

    ls

    ```


    When I type `ls`, I get the output as shown in Figure [2-6](#492151_1_En_2_Chapter.xhtml#Fig6).
    As you can see, these are the subfolders of my home directory. If you are familiar
    with DOS/Windows, this is similar to the `dir` command.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig6_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig6_HTML.jpg)


    **Figure 2-6:** The output of the `ls` command and the contents of my home directory
    in the Finder


    Now that I know what the other files and folders are in this location, I want
    to change my directory to explore further. Let’s say I want to get to the Desktop,
    which is a folder in my `/Users/dwsmith` directory. I can use the `cd` command
    along with specifying the folder I want to move to as shown in Figure [2-7](#492151_1_En_2_Chapter.xhtml#Fig7).
    Enter the following command at the prompt:


    ```

    cd Desktop

    ```


    You will see that now the command prompt has changed to specify that we are now
    in the `Desktop` folder of the home directory. See how `Desktop` is listed after
    my user account info instead of the tilde?


    ```

    dwsmith@dwsmiths-MBP Desktop %

    ```


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig7_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig7_HTML.jpg)


    **Figure 2-7:** I am at the Desktop folder in my `/Users/dwsmith` directory


    Let’s try something a little more interesting. Let’s create a folder on our Desktop.
    We do this using the `mkdir` command, which is short for *make directory*. We
    use this command by specifying the name of the directory after we enter this command
    as an *argument*. At the command line, enter


    ```

    mkdir MyFolder

    ```


    You should see a new folder appear on the Desktop called `MyFolder` as shown in
    Figure [2-8](#492151_1_En_2_Chapter.xhtml#Fig8).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig8_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig8_HTML.jpg)


    **Figure 2-8:** A folder called `MyFolder` is created on the Desktop


    Notice how there is no space in the folder name? Let’s make a new folder, but
    this time let’s put a space in between. At the command line, we cannot just make
    a space in the filename without being *explicit*. That means we either have to
    write `"My Folder"` using double quotation marks or we have to use a special character
    combination of a `\` (back-slash) and a space after to create a single space.


    Let’s try this by making two more folders.


    To create the first folder, we will use quotations marks. Use the same `mkdir`
    command and name the folder *Important Stuff* like this:


    ```

    mkdir "Important Stuff"

    ```


    Next, use `mkdir` and create a folder using the *back-slash space* method called
    *More Stuff* like this:


    ```

    mkdir More\ Stuff

    ```


    Your screen should look similar to the one in Figure [2-9](#492151_1_En_2_Chapter.xhtml#Fig9).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig9_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig9_HTML.jpg)


    **Figure 2-9:** Terminal commands and the resulting folders


    ## Command Manuals


    Before we continue, let’s clean up our Desktop by removing all of these bogus
    folders we created in the previous exercise. The `rm` command is short for *remove.*
    Let’s use it to specify the folders we want to delete. Go ahead and enter this
    command like so:


    ```

    rm "More Stuff"

    ```


    What happens? You probably thought that this would delete the folder, but instead
    we get a cryptic message that says `rm: More Stuff: is a directory`. Clearly,
    we did something wrong. How do we find out what we did wrong or how to do it correctly?


    ***We read the freaking manual, of course!***


    This is a good opportunity to introduce you to `man` pages. Most commands have
    a *manual*, and you can view it right in the Terminal by typing `man` before the
    command. Let’s open the `man` page for the `rm` command. Enter the following command:


    ```

    man rm

    ```


    You can see in Figure [2-10](#492151_1_En_2_Chapter.xhtml#Fig10) that if we want
    to remove a directory, we must specify an argument of `-d` before the name of
    our directory. We are going to try this again, but first press the `q` key on
    the keyboard to exit the `man` page and go back to the command prompt.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig10_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig10_HTML.jpg)


    **Figure 2-10:** The `man` page shows the command options we need to know


    Now let’s try entering this:


    ```

    rm -d "More Stuff"

    ```


    Success! This will delete the folder as shown in Figure [2-11](#492151_1_En_2_Chapter.xhtml#Fig11).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig11_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig11_HTML.jpg)


    **Figure 2-11:** Removing directories using Terminal commands


    Go ahead and delete the other two folders using the same methodology, and when
    completed, you should have a clean Desktop again.


    Now that you are armed with the power of `man` pages, you will be unstoppable
    with the command line!


    ### Elevated Privileges


    If you have had some previous exposure to the Terminal, you have probably entered
    a command or two that started with `sudo`. This is a special command that invokes
    *elevated privileges*. Even if you are in the `admin` group on your Mac, you are
    still not the most privileged user on the system. That power belongs to the `root`
    user or `super` user.


    Some commands can only be run as the super user; and when that is the case, we
    need to use the `sudo` command, which is short for *super user do*. When you use
    a command that begins with `sudo`, you will be prompted to enter a password before
    the command will run. If you are the local admin on the Mac, the password will
    be the same one you use with your local user account. For example, in my case,
    the password for my `dwsmith` account is the same password for the super user.'
