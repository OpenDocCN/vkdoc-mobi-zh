  trans: '

    ### 服务器安全考量


    在配置服务器时，确实需要尝试禁用所有不会用到的服务。通过这种方式，你可以限制可能存在的、进而可能被利用的漏洞数量。这并不是一份用于确保服务器安全而必须锁定的详尽清单，但它为你提供了一个起点。没有任何东西能
    100% 免受黑客或其他安全威胁。


    以下是部署 Mac 服务器时建议考虑的一些更改：


    *   **禁用访客用户：** 打开`用户与群组系统偏好设置`，在左侧窗格的用户列表中点击`访客用户`。确保`允许访客登录这台电脑`和`允许访客用户连接共享文件夹`均未勾选。

    *   **禁用登录屏幕上的电源控制：** 在`用户与群组系统偏好设置`中，点击`登录选项`按钮。取消勾选`显示睡眠、重新启动和关机按钮`旁边的复选框。

    *   **禁用自动登录：** 在`登录选项`中，确保`自动登录`设置为`关闭`。

    *   **禁用用户列表：** 在`登录选项`中，选择将登录窗口显示为`名称和密码`。

    *   **仅启用软件更新以获取安全补丁：** 打开`软件更新系统偏好设置`并点击`高级…`按钮。是否要自动安装所有更新由您决定，但至少确保勾选`安装系统数据文件和安全更新`框。这样，你的
    Mac 服务器将自动获得重要的安全更新补丁。

    *   **启用屏幕保护程序密码：** 打开`安全性与隐私系统偏好设置`。点击`通用`标签页，并勾选`睡眠或屏幕保护程序开始后立即要求输入密码`旁边的复选框。将下拉菜单设置为`立即`。

    *   **启用 FileVault：** 点击`FileVault`标签页并启用`FileVault`加密。

    *   **启用防火墙：** 点击`防火墙`标签页。打开防火墙，然后按照本书第 3 章详述的防火墙选项来配置所需的安全级别和任何应用程序例外。

    *   **禁用定位服务：** 点击`隐私`标签页，然后点击左侧窗格中的`定位服务`。取消勾选`启用定位服务`旁边的复选框。

    *   **禁用分析：** 当仍处于`隐私`标签页时，点击左侧窗格中的`分析`按钮。取消勾选`共享 Mac 分析`和`与 App 开发者共享`。

    *   **禁用蓝牙：** 打开`蓝牙系统偏好设置`。点击`关闭蓝牙`按钮以禁用它。

    *   **关闭 Wi-Fi：** 假设你使用以太网将服务器连接到网络，我们应该关闭 Wi-Fi 无线网络。打开`网络系统偏好设置`，点击左侧窗格中的`Wi-Fi`按钮。点击`关闭
    Wi-Fi`按钮以禁用它。

    *   **退出 iCloud：** 如果在设置助理过程中登录了 iCloud，请前往`iCloud 系统偏好设置`并退出 iCloud。


    ## 配置基本服务器服务


    现在我们的 Mac 服务器已准备就绪，可以开始启用一些服务了。在本节中，我们将探讨随核心`macOS`客户端操作系统捆绑提供的服务器级功能。这些是 Mac
    服务器上最常见的服务，包括内容缓存、文件服务、打印服务和 Web 服务。


    ### 内容缓存


    `内容缓存`是之前包含在`macOS Server`中，但随后被移到核心`macOS`安装中的最受欢迎的功能之一。此服务在你网络上的设备上运行，监听从 Apple
    或 Apple 托管服务（如`iBooks`、`App Store`、`Mac App Store`等）下载内容的客户端。然后，当第一个客户端下载内容时，运行内容缓存服务的计算机会下载一份副本并保留它。当同一子网上的第二个、第三个或任何其他设备尝试下载该内容时，它会从缓存服务器复制，而不是再次通过互联网下载。


    这种解决方案在拥有多个共享互联网连接的客户端的企业和学校中极为流行。我曾将其用于 1:1 iPad 部署和需要下载并安装相同安全更新或`macOS`版本的
    Mac 实验室，它确实加快了安装速度并节省了带宽使用。


    要启用内容缓存服务，请打开`共享系统偏好设置`，并勾选`内容缓存`旁边的复选框，如图 7-8 所示。你可以选择要缓存哪些内容，我通常坚持使用默认的`所有内容`选项。如果你只希望通过
    USB 线物理连接到 Apple Configurator 的 iOS 设备使用内容缓存，请勾选`互联网连接`旁边的框。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig8_HTML.jpg](img/492151_1_En_7_Fig8_HTML.jpg)


    图 7-8

    在我们的服务器上启用内容缓存


    因为这可能会占用服务器硬盘的相当大空间，你可以点击`选项…`按钮，选择你想分配多少磁盘空间用于缓存。一旦缓存空间满了，该服务将通过先删除最旧的数据来为新内容腾出空间。


    ### 文件共享


    Mac 服务器上运行的另一个最常见的服务是文件共享。要启用本地网络文件共享，请打开`共享系统偏好设置`并勾选`文件共享`旁边的复选框。默认情况下，`macOS`使用
    Samba 在网络共享文件。如果出于某些原因你想使用旧的 AppleTalk 协议，可以点击`选项…`按钮并勾选`使用 AFP 共享文件和文件夹`旁边的框。我们不勾选此项，因为我们不想使用
    AppleTalk。


    添加共享文件夹非常简单直接。在桌面上创建一个文件夹用于测试。通常，你会在连接的卷（如雷电磁盘驱动器）内创建文件夹，但为了本示例的目的，我们只用桌面。将文件夹命名为
    "Mac 共享文件"。


    回到`共享系统偏好设置`的`文件共享`下，点击`+`按钮并选择`Mac 共享文件`文件夹。如图 7-9 所示设置权限。我们使用非常简单的权限，只有一个用户账户能够连接到共享文件夹。管理员拥有`读写`权限，员工组拥有`只读`权限，其他所有人都将无法访问该文件共享。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig9_HTML.jpg](img/492151_1_En_7_Fig9_HTML.jpg)


    图 7-9

    启用文件共享服务并配置权限


    这是最简单的文件共享形式，因为我们基于这台特定 Mac 上的单一用户账户——管理员——来限制对共享的访问。员工组只有一个成员，那就是管理员账户。如果我们在这台
    Mac 上创建额外的用户，并且如果他们是员工组的成员，他们将能够读取文件共享的内容但不能写入。

    '
- fmt: '# Printer Sharing


    Printer sharing is pretty simple and straightforward as well. The first step involves
    connecting a print queue to your Mac using the `Printers & Scanners` System Preference.
    As you can see in Figure [7-10](#492151_1_En_7_Chapter.xhtml#Fig10), I have connected
    to an IP printer on my network, and now I want to share this printer queue with
    other Macs on my network.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig10_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig10_HTML.jpg)


    Figure 7-10

    Add one or more print queues to the `Printers & Scanners` System Preference


    To do this, open the `Sharing` System Preference and click the checkbox next to
