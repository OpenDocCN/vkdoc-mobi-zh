    # 将软件导入 Munki


    在本节中，我们将建立一个安装程序包的目录。开始之前，您应该从管理工作站访问互联网，并将以下安装程序下载到您的桌面。如果这些应用程序既可以通过 *Mac App
    Store* 获取，也可以直接从开发者的网站获取，请下载开发者版本而非 *App Store* 版本：


    *   **Adobe Reader:** [`https://get.adobe.com/reader/`](https://get.adobe.com/reader/)

    *   **Adobe Flash Player:** [`https://get.adobe.com/flashplayer/`](https://get.adobe.com/flashplayer/)

    *   **VLC:** [`www.videolan.org/vlc/download-macosx.html`](http://www.videolan.org/vlc/download-macosx.html)

    *   **Mozilla Firefox:** [`www.mozilla.org/en-US/firefox/new/`](http://www.mozilla.org/en-US/firefox/new/)

    *   **Google Chrome:** [`www.google.com/chrome/`](http://www.google.com/chrome/)

    *   **Audacity:** [`www.audacityteam.org/download/`](http://www.audacityteam.org/download/)


    ## 导入软件包


    您的计算机应该已映射了 ***munki_repo*** 网络共享，并且桌面应有六个 ***.dmg** 文件，即前面列出的每个应用程序对应一个。在本练习中，我们将把这些软件应用程序导入
    *Munki*。我们将从 *Firefox* 和 *Adobe Flash Player* 开始，因为它们使用不同类型的安装过程。*Firefox* 是简单的将应用程序拖放到
    ***/Applications*** 文件夹中，而 *Adobe Flash* 则使用安装包文件。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig22_HTML.jpg](img/492151_1_En_10_Fig22_HTML.jpg)

    *图 10-22 对 *.dmg 文件使用 munkiimport 命令*


    1.  我们将从 Firefox 开始。打开一个新的终端窗口，在命令提示符后输入 `munkiimport`，然后将 Firefox 的 *.dmg 文件拖放到窗口中，如图
    10-22 所示。按键盘上的回车键开始命令行 `munkiimport` 实用程序。


    这将类似于本章前面导入 *MunkiTools* 时使用的过程。请通过命令行逐步完成这些选项。以下是这些选项用途的更多信息：


    *   **Item Name:** *Munki* 中包的名称。

    *   **Display Name:** 在 *Managed Software Center* 中显示的软件标题。

    *   **Description:** 在 *Managed Software Center* 中提供的软件描述。

    *   **Version:** 软件的版本。*Munki* 会尝试从包中确定版本，但如果无法确定，您需要手动提供版本号。版本号很重要，因为 *Munki*
    在未来需要升级软件时会引用它。

    *   **Category:** 这将把软件放在特定类别中，以便在 *MunkiAdmin* 和 *Managed Software Center* 中过滤。

    *   **Developer:** 这将把软件放在特定的开发者组中，以便在 *MunkiAdmin* 中过滤。

    *   **Unattended Install:** 这是一个布尔值（`true` 或 `false`）。如果设置为默认的 `false`，软件不会自动安装，需要最终用户从
    *Managed Software Center* 手动选择并安装。如果设置为 `true`，软件将无需任何交互自动安装。

    *   **Unattended Uninstall:** 类似于无人值守安装，如果此值设为 `true`，当我们从清单中移除软件时，它将自动卸载。否则，如果保持默认值
    `false`，则需要用户或系统管理员手动移除软件。

    *   **Catalogs:** 标识软件应列在哪个（哪些）目录中。我们稍后也可以在 *MunkiAdmin* 中修改此设置。


    请按照图 10-23 中所示回答问题。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig23_HTML.jpg](img/492151_1_En_10_Fig23_HTML.jpg)

    *图 10-23 Mozilla Firefox 提示的推荐答案*


    1.  当提示导入项目时，输入 `y` 继续。

    2.  当询问是否要将项目上传到子目录路径时，我们将采用默认值。我们不会将软件包放在各种子目录中，只放在 ***munki_repo*** 共享的 ***pkgs***
    目录下的单个默认目录中。按**回车**键接受默认值并继续。

    3.  接下来，它会提示您尝试创建产品图标。对此回答 `y` 以继续。Munki 会尝试从包中找到图标并创建它，该图标将显示在 *Managed Software
    Center* 中。

    4.  现在它将把包复制到 ***munki_repo*** 共享，并根据安装程序包和我们的命令行输入保存所需的 **pkginfo.plist** 数据。它会询问是否重新构建目录，由于我们刚刚通过添加新应用程序更改了目录，我们将回答
    `y` 并按**回车**继续。


    目录重新构建完成后，我们就成功导入了 *Firefox* 应用程序。如果想检查工作以确保应用程序可用，可以打开 ***munki_repo*** 网络共享并浏览
    ***/pkgs*** 和 ***/pkgsinfo*** 目录，查看 *Firefox* 是否可用。也可以从 Web 浏览器访问您的 ***munki_repo***
    页面，确保包可以通过 Web 访问。最后，可以打开 *MunkiAdmin* 并**重新加载**仓库，查看 *Firefox* 是否可用。如图 10-24
    所示，我工作站上的一切都已同步且可用。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig24_HTML.jpg](img/492151_1_En_10_Fig24_HTML.jpg)

    *图 10-24 Firefox 包在 MunkiAdmin、munki_repo 共享和 Web 服务器中可用*


    1.  接下来，我们可以导入 *Adobe Flash Player*。**双击** **Install Flash Player *.dmg** 文件以将磁盘映像挂载到桌面。在内部，您需要**右键单击**
    **Install Adobe Flash Player** 应用程序并选择**显示包内容**。然后，浏览 ***/Contents/Resources/***
    目录并找到 **Adobe Flash Player *.pkg** 文件，因为那是我们的安装程序。使用 `munkiimport` 命令，并将 ***.pkg**
    文件**拖放**到终端窗口以指定路径。按**回车**键开始导入过程，就像对 *Firefox* 所做的那样。

    2.  出现提示时，输入如图 10-25 所示的信息。请注意，我们需要修改其中一些选项。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig25_HTML.jpg](img/492151_1_En_10_Fig25_HTML.jpg)

    *图 10-25 Adobe Flash Player 安装包的推荐设置*


    1.  出现提示时，接受所有默认设置导入项目。当提示有关图标时回答 `y` 并重新构建目录。

    2.  一旦它完成将软件导入 *Munki*，请继续验证所有内容是否正确复制。

    3.  对其余四个软件标题重复导入过程，在提示时将全部设置为无人值守安装/卸载。完成后，在 *MunkiAdmin* 中**重新加载** ***munki_repo***，您的软件列表应如图
    10-26 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig26_HTML.jpg](img/492151_1_En_10_Fig26_HTML.jpg)

    *图 10-26 导入的软件标题完整列表*

