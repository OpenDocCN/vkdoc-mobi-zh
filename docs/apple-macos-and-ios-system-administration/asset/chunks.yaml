  trans: '

    # 硬件


    苹果服务器硬件多年来也发生了巨大变化。最初运行`OS X Server`的硬件包括`Power Mac G3`和`Power Mac G4`工作站。苹果曾一度非常重视专用服务器硬件，并发布了`Xserve`和`Xserve
    RAID`产品，但最终还是停产了这些型号，转而支持`Mac Pro`工作站。随着对专用服务器操作系统需求的减弱，苹果继续开发和制造专用服务器硬件已不再具有意义。


    # macOS Server 简介


    在本章中，我们将探讨服务器操作系统最常见的功能，以及如何配置`macOS`或`macOS Server`来实现这些目的。其中一些功能在客户端操作系统的标准安装中即可用，而其他功能则需要您购买并安装`macOS
    Server`应用程序后才能使用。


    ## 我需要一台 Mac 服务器吗？


    在我们开始构建 Mac 服务器之前，首先考虑使用场景以及是否真的需要一台专用的 Mac 服务器。随着苹果移除了 Mac 服务器提供的许多服务，他们也努力在`macOS`中构建了更多跨平台工具，使其能够作为客户端完全融入其他常见网络，特别是基于
    Microsoft 和 Linux 技术构建的网络。很有可能，您的组织已经拥有某种 LDAP、打印机共享和文件共享解决方案，您可以非常轻松地在`macOS`客户端上使用它们。


    如果您是一位经验丰富的 Mac 系统管理员，您可能熟悉`黄金三角`这个术语。这指的是您使用运行`Open Directory`的 Mac 服务器与运行 Microsoft
    `Active Directory`的`Windows`服务器同步，以管理用户账户，然后使用`Workgroup Manager`来设置 Mac 特定的权限或设置。如今，您可以直接将
    Mac 绑定到 Active Directory 域，而无需再专门为您的`macOS`端点运行第二个 LDAP。用于限制设备和锁定特定设置的`配置描述文件`取代了`Workgroup
    Manager`组件。


    文件共享在最近的版本中也发生了变化。苹果过去使用他们的`AppleTalk 文件协议`作为`macOS`客户端的首选文件共享技术。如今，`Samba`是默认的文件共享协议，可以与`Windows`和
    Linux 客户端无缝协作。这里的要点是，如果您已经在运行各种基于`Windows`或 Linux 的服务器，那么在开始构建 Mac 服务器来创建这些现有文件共享的冗余`仅限
    Mac`版本之前，请考虑如何利用这些现有技术与您的`macOS`客户端配合使用。


    除了目录服务或文件/打印共享之外，还有许多基于云的解决方案可能更适合您的组织。网站托管是立刻想到的一个例子。几年前，使用 Mac 服务器托管网站非常普遍，而且在许多方面，它是比使用
    Microsoft 的`IIS`更优的解决方案。虽然`Apache`在`macOS`中仍然可以作为附加服务使用，但您同样可以轻松地使用众多低成本的云托管解决方案来托管您的网站。


    以下是如果您选择部署一台 Mac 服务器，可能希望在上面运行的一些更常见的服务。我们将在本章中详细介绍其中的许多服务：


    *   **文件共享：** 从`macOS High Sierra`开始，苹果已将`文件共享服务器`集成到操作系统的标准安装中。您可以通过`共享系统偏好设置`启用此服务。此服务允许您通过网络共享文件和文件夹。

    *   **打印机共享：** 从`macOS High Sierra`开始，苹果已将`打印机共享服务器`集成到操作系统的标准安装中。您可以通过`共享系统偏好设置`启用此服务。此服务允许您通过网络共享打印机。

    *   **Apple Remote Desktop：** 您可以以完整控制台模式安装 Apple Remote Desktop，或按照本书第 6 章所述将其作为`远程任务服务器`安装。

    *   **内容缓存：** 从`macOS High Sierra`开始，苹果已将`内容缓存服务器`集成到操作系统的标准安装中。您可以通过`共享系统偏好设置`启用此服务。此服务会缓存来自`App
    Store`和其他苹果托管服务（如`软件更新`）的内容副本，以便在多个设备上安装更新或内容时节省带宽。

    *   **Web 服务器：** `Apache`已集成到 Mac 操作系统的标准安装中。您可以通过命令行启用它。

    *   **Open Directory：** 包含在`macOS Server`应用程序的安装中，`Open Directory`是一个 LDAP，允许您配置基于网络的用户和组。

    *   **描述文件管理器：** 一个基本的移动设备管理解决方案，允许为`iOS`和`macOS`客户端创建和分配`配置描述文件`——包含在`macOS Server`应用程序中。

    *   **Xsan：** 包含在`macOS Server`应用程序的安装中，用于创建和管理存储区域网络（SAN）解决方案。

    *   **DNS：** 从`macOS High Sierra`开始，苹果已从`macOS Server`的安装中移除了 DNS。您可以使用其他各种解决方案，包括`BIND`或`Knot
    DNS`。

    *   **DHCP：** 从`macOS High Sierra`开始，苹果已将`DHCP 服务器`集成到操作系统的标准安装中。您可以通过命令行启用和管理此服务。

    *   **NetBoot/NetInstall：** 苹果通过使用 T2 安全芯片以及在`macOS Server`的较新版本中移除这些功能，继续降低了此服务的地位。核心技术在`Mojave`之前的`macOS`版本中仍然可用。如果您计划使用此工作流，我建议您将`DeployStudio`作为一个解决方案来考察（`www.deploystudio.com`）。


    那么，您需要一台 Mac 服务器吗？要回答这个问题，视情况而定，但很可能不需要。如果您是一家小型企业，没有任何现有的目录服务，也不需要本地文件/打印服务器，那么部署一台专用的
    Mac 服务器可能是有意义的。


    如果您是一家拥有大量现有服务器解决方案的大型组织，请尝试将您的 Mac 整合到该生态系统中，而不是构建一个独立的仅限 Mac 的环境。对您来说更容易，对您的最终用户也更好，能够在现有的企业网络中作为一等公民参与。越来越普遍的情况是，想要一台
    Mac 服务器的主要原因是运行`描述文件管理器`，除非您的组织已经拥有来自第三方供应商（如`JAMF`、`Mosyle`或`Addigy`）的有效移动设备管理解决方案。


    # 部署 Mac 服务器


    如果您确定在您的环境中专用 Mac 服务器会很有用，我们就可以开始配置一台 Mac 来充当服务器。

    '
- fmt: '### Hardware Considerations


    Depending on how you plan to use your Mac server, you should select the right
    hardware for the job. Typically this involves deciding between a `Mac Pro` and
    a `Mac mini`. Apple sells a `Mac mini` for as low as $800 as of this writing and
    features enough raw horsepower for most server roles. The onboard storage is relatively
    anemic at 128 GB of SSD space, so if you plan to use it for extensive file sharing,
    you should plan to purchase some kind of external Thunderbolt storage solution.


    For the highest level of performance, the new 2019 `Mac Pro` can be configured
    with an insane amount of RAM, internal disk space, and up to 28 processor cores!
    It can also cost upward of the same price as a new car, so be sure that you are
    matching your needs with the correct specification. Most organizations can get
    by with a `Mac mini` of some variety. Even if you opt for the build-to-order variety
    and boost that internal disk to a 2 TB SSD, it will be a fraction of the cost
    of a Mac Pro.


    One thing that you should also consider, particularly if you are planning to use
    the Mac primarily as a `Profile Manager` server, is the cloud-hosted model. There
    are a couple of vendors out there that provide Mac servers in the cloud. The most
    popular is `MacStadium`, where you can get access to a bare metal Mac server for
    a low monthly fee. You can explore these options at [`www.macstadium.com`](http://www.macstadium.com).


    ## Backup


    As we discussed in Chapters [2](#492151_1_En_2_Chapter.xhtml) and [3](#492151_1_En_3_Chapter.xhtml),
    you can either opt for a cloud-based backup solution or use `Time Machine` to
    back up your Mac server to an attached external disk. The only caveat in choosing
    a backup solution for your server is that it backs up the entire disk and any
    attached storage. You should be backing up all of the user data, the configuration,
    and any applications running on your Mac server. For this reason, stay away from
    solutions like `iCloud`, `OneDrive`, or `Dropbox` as those will only synchronize
    the user’s home directory and not the entire disk.


    **Pro Tip**


    If you are going to use a `Time Machine` drive or some other kind of attached
    storage for backing up your servers, be sure to implement some kind of regimen
    of rotating those drives to a secure off premises storage facility. Many organizations
    have data recovery sites or third-party services that will store backup drives
    off-site in case of a fire or other natural disasters. You should do the same
    with your `Time Machine` drives on a regular basis.


    ## Initial Configuration


    At this point you should have selected a suitable solution for your Mac server,
    storage, and backup. The next thing we need to do is install a fresh copy of `macOS
    Catalina` on the server. So boot into `Internet Recovery` mode or use a bootable
    USB installer to boot your Mac, use `Disk Utility` to partition and/or format
    the drive, and then install a copy of `macOS`.


    Once it has finished installing the OS, step through the `Setup Assistant`. Create
    a `local Administrator` account on the machine and sign into that account. Once
    you have reached the local Administrator user’s Desktop, change the wallpaper
    to something that signifies that this is the server. I like to use some shade
    of gray, although some system administrators like to create a custom server wallpaper.
    Your server should look like mine does in Figure [7-1](#492151_1_En_7_Chapter.xhtml#Fig1).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig1_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig1_HTML.jpg)


    Figure 7-1

    macOS is installed on our server


    **Pro Tip**


    Why do we care what the wallpaper is on our server? I tend to remote control into
    my servers and run them headless (without a monitor) in my data center. When I’m
    using a Screen Sharing window, it is helpful to remind me which system I’m on
    and to remind me to sign out after the session.


    Next, run `Software Update` and install all the available patches and security
    updates available for your Mac. This will ensure we’re running the latest security
    and bug fixes.


    Finally, open the `Energy Saver System Preference` and set the computer to `never
    sleep`, `uncheck` the box to `put the hard disks to sleep whenever possible`,
    and `check` the box to allow it to `restart automatically after a power failure`.
    These settings will ensure that your server performs optimally and can reduce
    the risk of having the server go offline after a power-related event.'
  raw: '### Hardware Considerations


    Depending on how you plan to use your Mac server, you should select the right
    hardware for the job. Typically this involves deciding between a *Mac Pro* and
    a *Mac mini*. Apple sells a *Mac mini* for as low as $800 as of this writing and
    features enough raw horsepower for most server roles. The onboard storage is relatively
    anemic at 128 GB of SSD space, so if you plan to use it for extensive file sharing,
    you should plan to purchase some kind of external Thunderbolt storage solution.


    For the highest level of performance, the new 2019 *Mac Pro* can be configured
    with an insane amount of RAM, internal disk space, and up to 28 processor cores!
    It can also cost upward of the same price as a new car, so be sure that you are
    matching your needs with the correct specification. Most organizations can get
    by with a *Mac mini* of some variety. Even if you opt for the build-to-order variety
    and boost that internal disk to a 2 TB SSD, it will be a fraction of the cost
    of a Mac Pro.


    One thing that you should also consider, particularly if you are planning to use
    the Mac primarily as a *Profile Manager* server, is the cloud-hosted model. There
    are a couple of vendors out there that provide Mac servers in the cloud. The most
    popular is ***MacStadium***, where you can get access to a bare metal Mac server
    for a low monthly fee. You can explore these options at [`www.macstadium.com`](http://www.macstadium.com).


    ### Backup


    As we discussed in Chapters [2](#492151_1_En_2_Chapter.xhtml) and [3](#492151_1_En_3_Chapter.xhtml),
    you can either opt for a cloud-based backup solution or use *Time Machine* to
    back up your Mac server to an attached external disk. The only caveat in choosing
    a backup solution for your server is that it backs up the entire disk and any
    attached storage. You should be backing up all of the user data, the configuration,
    and any applications running on your Mac server. For this reason, stay away from
    solutions like *iCloud*, *OneDrive*, or *Dropbox* as those will only synchronize
    the user’s home directory and not the entire disk.


    Pro Tip


    If you are going to use a *Time Machine* drive or some other kind of attached
    storage for backing up your servers, be sure to implement some kind of regimen
    of rotating those drives to a secure off premises storage facility. Many organizations
    have data recovery sites or third-party services that will store backup drives
    off-site in case of a fire or other natural disasters. You should do the same
    with your *Time Machine* drives on a regular basis.


    ### Initial Configuration


    At this point you should have selected a suitable solution for your Mac server,
    storage, and backup. The next thing we need to do is install a fresh copy of *macOS
    Catalina* on the server. So boot into *Internet Recovery* mode or use a bootable
    USB installer to boot your Mac, use *Disk Utility* to partition and/or format
    the drive, and then install a copy of *macOS*.


    Once it has finished installing the OS, step through the **Setup Assistant.**
    Create a **local Administrator** account on the machine and sign into that account.
    Once you have reached the local Administrator user’s Desktop, change the wallpaper
    to something that signifies that this is the server. I like to use some shade
    of gray, although some system administrators like to create a custom server wallpaper.
    Your server should look like mine does in Figure [7-1](#492151_1_En_7_Chapter.xhtml#Fig1).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig1_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    macOS is installed on our server


    Pro Tip


    Why do we care what the wallpaper is on our server? I tend to remote control into
    my servers and run them headless (without a monitor) in my data center. When I’m
    using a Screen Sharing window, it is helpful to remind me which system I’m on
    and to remind me to sign out after the session.


    Next, run *Software Update* and install all the available patches and security
    updates available for your Mac. This will ensure we’re running the latest security
    and bug fixes.


    Finally, open the *Energy Saver System Preference* and set the computer to **never
    sleep**, **uncheck** the box to **put the hard disks to sleep whenever possible**,
    and **check** the box to allow it to **restart automatically after a power failure**.
    These settings will ensure that your server performs optimally and can reduce
    the risk of having the server go offline after a power-related event.'
  trans: '

    ### 硬件考量


    根据你计划如何使用 Mac 服务器的不同，你需要为这项工作选择合适的硬件。这通常涉及在 `Mac Pro` 和 `Mac mini` 之间做出选择。在撰写本文时，苹果公司售价低至
    800 美元的 `Mac mini` 具备足够的原始性能，能够胜任大多数服务器角色。但其内置存储相对有限，仅为 128 GB SSD 空间。因此，如果你计划用它进行大量的文件共享，则应该考虑购买某种外置雷雳存储解决方案。


    为了获得最高级别的性能，新款 2019 年 `Mac Pro` 可以配置惊人的内存容量、内部磁盘空间以及多达 28 个处理器核心！它的价格也可能高达一辆新车的价格，因此请确保你的需求与正确的规格相匹配。大多数组织可以使用某种型号的
    `Mac mini` 满足需求。即使你选择定制配置，并将内部磁盘升级到 2 TB SSD，其成本也仅仅是 Mac Pro 的一小部分。


    还有一点你需要考虑，特别是如果你计划将 Mac 主要用作 `描述文件管理器` 服务器时，那就是云托管模型。市场上已有几家供应商提供云端 Mac 服务器。最受欢迎的是
    `MacStadium`，你可以按月支付较低的费用来访问一台裸机 Mac 服务器。你可以在 [`www.macstadium.com`](http://www.macstadium.com)
    探索这些选项。


    ## 备份


    正如我们在第 2 章和第 3 章中所讨论的，你可以选择基于云的备份解决方案，也可以使用 `时间机器` 将你的 Mac 服务器备份到连接的外置磁盘。为你的服务器选择备份解决方案时，唯一的注意事项是它需要备份整个磁盘以及所有连接的存储设备。你应该备份所有用户数据、配置以及运行在
    Mac 服务器上的任何应用程序。因此，应避免使用像 `iCloud`、`OneDrive` 或 `Dropbox` 这样的解决方案，因为它们仅同步用户的个人目录，而非整个磁盘。


    **专业提示**


    如果你打算使用 `时间机器` 驱动器或其他类型的连接存储来备份服务器，请务必制定某种规程，将这些驱动器轮换到安全的异地存储设施中。许多组织都设有数据恢复站点或使用第三方服务来异地存储备份驱动器，以防发生火灾或其他自然灾害。你也应该定期对
    `时间机器` 驱动器执行相同的操作。


    ## 初始配置


    至此，你应该已经为你的 Mac 服务器、存储和备份选择了合适的解决方案。接下来我们需要做的是在服务器上安装一个全新的 `macOS Catalina` 副本。因此，请启动进入
    `互联网恢复` 模式或使用可启动的 USB 安装程序来启动你的 Mac，使用 `磁盘工具` 对驱动器进行分区和/或格式化，然后安装 `macOS`。


    操作系统安装完成后，请按步骤完成 `设置助理`。在电脑上创建一个 `本地管理员` 账户并登录该账户。进入本地管理员用户的桌面后，将墙纸更改为能表明这是服务器的样式。我喜欢使用某种灰色调，不过有些系统管理员喜欢创建自定义的服务器墙纸。你的服务器看起来应该类似于图
    7-1 中的样子。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig1_HTML.jpg](img/492151_1_En_7_Fig1_HTML.jpg)


    图 7-1

    macOS 已安装到我们的服务器上


    **专业提示**


    我们为什么要关心服务器上的墙纸？我倾向于通过远程控制来管理我的服务器，并且在我的数据中心中以无头方式（不带显示器）运行它们。当我使用屏幕共享窗口时，有助于提醒我当前正在操作哪台系统，并提醒我在会话结束后注销。


    接下来，运行 `软件更新` 并为你的 Mac 安装所有可用的补丁和安全更新。这将确保我们运行的是最新的安全修复程序和错误修复。


    最后，打开 `节能` 系统偏好设置，将电脑设置为 `永不睡眠`，`取消选中` `尽可能让硬盘进入睡眠` 的复选框，并`选中` `断电后自动重新启动` 的复选框。这些设置将确保你的服务器以最佳性能运行，并可以降低在发生与电源相关的事件后服务器离线的风险。

    '
- fmt: '### Network Settings


    The first thing we need to do is configure a name for our server and a static
    IP address. Using the `Sharing System Preference`, name your server. I’m going
    to call mine `MacServer`. If you have multiple existing servers, you may have
    a standardized server naming convention that you will want to use. This configuration
    assumes that you are simply sharing some data on the internal local area network.


    **Pro Tip**


    Double-check the Local Hostname and the Unix hostname and ensure these are the
    same. As you can see in Figure 7-2, I have configured all three of my server names
    to match.


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig2_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig2_HTML.jpg)


    **Figure 7-2** Use the Terminal to verify the hostnames


    Next, we need to assign the static IP address to our server so that it remains
    consistent when we use services like file sharing. Open the `Network System Preference`,
    click the active network connection (`Wi-Fi` or `Ethernet`), and click the `Advanced`
    button and select the `TCP/IP` tab. We need to set a static IP address that isn’t
    going to conflict with other computers on our network. You will need to consult
    with your Network Administrator or check your DHCP or router settings to determine
    the correct IP address, subnet mask, and gateway/router for this step. Figure
    7-3 shows my complete IP address settings.


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig3_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig3_HTML.jpg)


    **Figure 7-3** Set a static IP address for our server


    **Pro Tip**


    I have reserved the range of `192.168.1.2`–`192.168.1.9` for static IP addresses
    on my router. I’m going to use `192.168.1.9` as my static IP address for the `MacServer`.


    In addition to configuring a static IP address, we also need to click the `DNS`
    tab and enter our DNS server information. In my network, my router is also my
    DNS server, so I’m entering `192.168.1.1` as my DNS server. You may also need
    to consult with your Network Administrator to determine the IP address for your
    DNS server. Figure 7-4 shows the static DNS server entry for my network.


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig4_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig4_HTML.jpg)


    **Figure 7-4** Add a static DNS server


    **Pro Tip**


    If you are unsure of your DNS settings, you can also switch your Mac back to DHCP
    temporarily and see what information is automatically populated in the DNS tab
    and then replicate that into the static DNS entry after changing back to the Manual
    address option.


    Once you have set your DNS and static IP address information, open Safari and
    hit a web site like `www.apple.com` and make sure it resolves. You should see
    something similar to Figure 7-5 where you are able to successfully browse the
    Web. I would encourage you to use the `Network Utility` to ping various internal
    IP addresses and try to ping your server from another computer just to make sure
    everything is communicating properly on the local area network.


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig5_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig5_HTML.jpg)


    **Figure 7-5** Browse the Web to make sure your network settings are correct


    **Pro Tip**


    If your Mac is going to be participating in a larger network, for example, a `Windows`-based
    network, make sure your Windows system administrator or Network Administrator
    creates a DNS entry for your hostname and a reverse DNS entry for the IP address.
    Your clients should be able to use `nslookup` or the `Lookup` option in the `Network
    Utility` and return the hostname by IP and the IP by hostname.


    ### Configuring Remote Access


    As I mentioned earlier, I typically run my servers without an attached monitor,
    keyboard, or mouse. When I need to interact with the server, I will use Screen
    Sharing or remote control from my primary workstation. You can use a VNC client
    or another Mac using the `Finder` to remote control the server, or you can use
    Apple Remote Desktop (`ARD`). Figure 7-6 shows the two different configuration
    options, deepening on whether you plan to use ARD or not. Using the `Sharing System
    Preference`, enable either the `Screen Sharing` option or the `Remote Management`
    option.


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig6_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig6_HTML.jpg)


    **Figure 7-6** Enabling Screen Sharing on your Mac server


    **Pro Tip**


    Another useful service to enable for remote administration is `Secure Socket Shell
    (SSH)`. The friendly name of that service in the `Sharing System Preference` is
    `Remote Login`. Enabling SSH can be useful for communicating with your Mac server
    via the command line interface.


    I am planning to use Apple Remote Desktop, so I will configure that service; and
    then using the ARD application on my primary Mac, I will add the `MacServer` computer
    to my `server''s computer list` using the same steps we followed in Chapter 6.
    If you are using ARD, you’ll see something similar to Figure 7-7 when you have
    finished adding the MacServer to your console.


    ![images/492151_1_En_7_Chapter/492151_1_En_7_Fig7_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig7_HTML.jpg)


    **Figure 7-7** Adding my server to the ARD console on my Mac workstation


    **Pro Tip**


    Depending on the size and design of your network, your Network Administrator may
    have divided your network into various smaller subnets. In some cases, due to
    security reasons, servers are placed in a subnet that is separate from your client
    systems. If this is the case in your network, when you use the ARD scanner to
    search for a server, it may not find it. You may have to add the computer manually
    using the `Add By Address` option.'
