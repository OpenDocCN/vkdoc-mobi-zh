    ### macOS 文件共享


    在登录为 Don 时，我们可以使用 `Go` 菜单 ➤ `Connect to Server`（连接到服务器）选项，手动映射托管在我们 Windows 服务器上的
    `Exec Shared` 驱动器。如图 11-26 所示，输入共享的完整路径。作为最佳实践，在定义服务器名称时，你可能希望使用**完全限定域名**。请注意，在
    Mac 上定义网络路径时，我们需要使用正斜杠（`/`）而不是反斜杠（`\`）。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig26_HTML.jpg](img/492151_1_En_11_Fig26_HTML.jpg)


    图 11-26: "连接到服务器" 对话框


    输入网络共享路径后，你还可以点击 `+` 按钮将其保存为**收藏服务器**，这样 Don 在每次需要连接时就不必记住这个路径。点击 `Connect`（连接）按钮，它应该会在一个新窗口中映射该驱动器。由于我们已经使用
    Don 的域账户登录到这台 MacBook Pro，因此应该不需要任何额外的身份验证。


    **专业提示**：很可能你会希望像在 Windows 上那样，在登录时自动映射 Don 的网络驱动器。为此，你可以进入 `Users & Groups System
    Preference`（用户与群组系统偏好设置）➤ `Login Items`（登录项）标签页；使用 `+` 按钮，你可以将网络卷添加到列表中，如图 11-27
    所示。这样在登录 Mac 后，系统将尝试自动连接到这些驱动器。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig27_HTML.jpg](img/492151_1_En_11_Fig27_HTML.jpg)


    图 11-27: 为 Don President 的登录项添加 Exec Shared 卷


    **专业提示**：你也可以配置一个 MDM 有效载荷，以便在登录时自动映射网络驱动器。如图 11-28 所示，你可以选择添加一个 `Authenticated
    Network Mount`（已验证的网络挂载），然后指定文件共享协议、服务器名称和共享名称。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig28_HTML.jpg](img/492151_1_En_11_Fig28_HTML.jpg)


    图 11-28: 通过描述文件管理器在登录项有效载荷中添加挂载点


    ### iPadOS 文件共享


    现在 Don 的 Mac 已经全部设置好了，让我们切换到 Sally 的新 iPad。由于她运行的是 `iPadOS`，因此在“文件”应用中有一个额外的选项，允许她连接到网络共享。要访问此选项，请从主屏幕打开“文件”应用，然后点击
    `…` 按钮并选择 `Connect to Server`（连接到服务器），如图 11-29 所示。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig29_HTML.jpg](img/492151_1_En_11_Fig29_HTML.jpg)


    图 11-29: 在文件应用中访问“连接到服务器”选项


    当提示输入服务器路径时，在 `Server`（服务器）字段中输入 `smb://PCSERVER01.mycompany.local`（或服务器的 IP 地址），然后点击
    `Connect`（连接）按钮。系统会提示你进行身份验证，因此请输入有权访问 Windows 共享的用户的用户名和密码。我在图 11-30 中使用了 `sjones`，但
    `dpresident` 也可以。输入用户凭据后，点击 `Next`（下一步）按钮继续。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig30_HTML.jpg](img/492151_1_En_11_Fig30_HTML.jpg)


    图 11-30: 输入用户名和密码以验证文件服务器身份


    系统将把你连接到服务器，并显示你已通过身份验证的用户有权访问的所有共享。你的屏幕应该类似于图 11-31。Sally 现在可以浏览到 `Exec Shared`
    文件夹，然后找到她的销售报告，用 `iPad` 上的 `Microsoft Excel` 打开并进行编辑。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig31_HTML.jpg](img/492151_1_En_11_Fig31_HTML.jpg)


    图 11-31: 从 iPad 浏览我们的网络文件共享


    我们已成功在 `macOS` 和 `iPadOS` 客户端上配置了本地的 Windows 文件共享。Apple 设备的用户可以无缝地与 Windows PC
    用户共享数据。


    ## Microsoft Exchange 集成


    Apple 在 `macOS` 和 `iOS` 的操作系统层面都提供了 `Microsoft Exchange` 集成。你可以使用描述文件来为邮件、联系人、日历和任务配置
    Exchange 账户设置。对于 Don 的新款 `iPhone 11`，我们将直接使用描述文件管理器远程为他的设备配置 Exchange 设置。对于他的
    Mac，他想要使用 Microsoft Outlook，因此我们将在下一节下载并激活 Office 365 应用程序后进行手动配置。


    ### 使用有效载荷变量配置 Microsoft Exchange 账户


    在开始此练习之前，请务必在描述文件管理器中为 Don President 创建一个新用户，用户名使用 `dpresident`。注册一台测试用的 iOS 设备并将其命名为
    `Don''s iPhone`，这样你就可以修改并向该设备推送新的描述文件。既然我们已经创建了一个账户，我们将创建一个 Exchange 有效载荷，该有效载荷将使用他的用户名作为
    `payload variable`（有效载荷变量）来配置其设备上的账户。


    1.  打开 `Profile Manager`（描述文件管理器），浏览 `Devices`（设备）部分，找到 `Don''s iPhone`。点击选择它，然后点击
    `Settings`（设置）标签页并 `Edit`（编辑）描述文件。

    2.  在描述文件编辑器中，向下滚动到 `iOS` 部分，选择 `Exchange` 有效载荷。点击 `Configure`（配置）按钮以指定设置。

    3.  如图 11-32 所示，根据 Exchange 有效载荷的要求，在各个字段中输入 Exchange 服务器信息。对于用户名，我们将使用 `%short_name%`
    而不是 `dpresident`。这样做可以让我们将此有效载荷应用于我们组织中的其他用户，并且在应用描述文件时，`%short_name%` 变量将解析为当前用户的用户名，在此例中为
    `dpresident`。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig32_HTML.jpg](img/492151_1_En_11_Fig32_HTML.jpg)


    图 11-32: 使用有效载荷变量设置 Exchange 配置


    4.  向下滚动到有效载荷的 `Enabled Services`（已启用的服务）部分，确保所有这些选项都已勾选，如图 11-33 所示。这将使整个 `iOS`
    系统能够访问来自 Microsoft Exchange 的数据，包括“电话”应用的通讯录。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig33_HTML.jpg](img/492151_1_En_11_Fig33_HTML.jpg)


    图 11-33: 配置启用哪些服务


    5.  点击 `OK`（确定）按钮保存配置有效载荷，然后点击 `Save`（保存）进行应用。在描述文件应用时，系统会提示用户输入密码，之后 Exchange
    配置将完全完成。


    **专业提示**：请注意，如果你的公司使用了 ActiveSync 中包含的一些 MDM 功能，这些功能也将应用于设备。例如，最小密码长度要求等将适用于设备，并且限制性更强的有效载荷将优先于其他。例如，如果你在描述文件管理器中要求最小密码长度为四个字符，但
    ActiveSync 设置为要求至少六个字符，那么在 Exchange 数据开始同步到设备之前，设备将提示用户设置一个新的六位数密码。


    无论你使用的是**自带设备**（BYOD），还是在描述文件管理器中管理公司拥有的设备，你都可以看到使用描述文件来应用特定设置（如 Microsoft Exchange）比手动配置每台单独的设备要好得多。

