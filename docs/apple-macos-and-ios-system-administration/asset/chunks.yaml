    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig20_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig20_HTML.jpg)


    Figure 6-20


    The Report menu shows various common report options


    ### System Overview


    The first report we are going to take a closer look at is the *System Overview
    Report*. This report gathers data from the client Macs selected and provides it
    in a report that can be viewed interactively via ARD, printed, or exported. In
    Chapter [1](#492151_1_En_1_Chapter.xhtml), we learned about how to use the *About
    This Mac* and *System Report* tools to find out just about anything we wanted
    to on a specific Mac. Using this System Overview Report, you can create a customized
    report from all of the Macs on your network by having ARD poll each machine for
    this info. Figure [6-21](#492151_1_En_6_Chapter.xhtml#Fig21) shows the default
    options, but you can drill into each of these areas and add or remove specific
    columns based on need.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig21_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig21_HTML.jpg)


    Figure 6-21


    The System Overview Report customization window


    Figure [6-22](#492151_1_En_6_Chapter.xhtml#Fig22) shows the resulting report when
    run against one test machine on my network. You can scroll through the list horizontally
    or click a specific tab to jump to that information. You can also export this
    data using the button in the report toolbar.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig22_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig22_HTML.jpg)


    Figure 6-22


    The resulting System Overview Report


    You can export that data as a **∗.csv** file as shown in Figure [6-23](#492151_1_En_6_Chapter.xhtml#Fig23)
    and then import it into *Numbers* or *Microsoft Excel* to do further calculations
    on the data. This can be a very useful tool for life-cycle planning or identifying
    machines in your fleet that need RAM, storage, or other upgrades.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig23_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig23_HTML.jpg)


    Figure 6-23


    The export data dialog box with the recommended ∗.csv settings


    Pro Tip


    Earlier in this chapter, we added that asset tag information into the computer’s
    **Info 1** field in Remote Management’s Computer Settings option in the *Sharing
    System Preference*. If you look at the Remote Desktop tab, you will see the fields
    for Infos 1, 2, 3, and 4\. In Info 1’s column is the asset tag information we
    entered.


    ### Software Version


    The *Software Version Report* is particularly helpful if you are working to maintain
    software version parity across all of your various Mac clients. This is a great
    way to baseline your level of standardization and identify systems that are out
    of compliance. I typically install a copy of Apple Remote Desktop on a system
    I consider to be the baseline *reference system* that has all of the standardized
    software installed on it. That way I can compare my reference system against all
    of the other systems on the network. Figure [6-24](#492151_1_En_6_Chapter.xhtml#Fig24)
    shows the configuration options for this report. I can select up to ten applications
    from the list and compare them to other Macs in my organization.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig24_HTML.png](images/492151_1_En_6_Chapter/492151_1_En_6_Fig24_HTML.png)


    Figure 6-24


    The Software Version Report configuration window


    Pro Tip


    Now would be a good time to mention **templates**. In the top-right corner of
    the report window, as shown in Figure [6-25](#492151_1_En_6_Chapter.xhtml#Fig25)
    , there is a *template pop-up menu*. You’ll see this template menu in many task-related
    configuration windows. Let’s say you want to check for the version of *Chrome*
    or *Disk Utility* on a regular basis. Instead of selecting those every time, you
    can **save** a template and choose to run that report again at any time from the
    template pop-up menu.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig25_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig25_HTML.jpg)


    Figure 6-25


    You can save any report or task as a template and modify it later or use it to
    run the same report multiple times in the future


    As you can see, I’m selecting *Disk Utility* and *Google Chrome*. I chose these
    two for this example so that you can see what happens when there’s a difference
    between the reference system and a target system for an application version (Disk
    Utility) vs. the application being missing from a target system (Google Chrome).
    Take a look at Figure [6-26](#492151_1_En_6_Chapter.xhtml#Fig26). It found a newer
    version of Disk Utility on the target machine, which was expected because my target
    is running *Catalina* and my reference machine is still on *Mojave*. It also found
    that Chrome was not installed on the target machine, so if my goal is to have
    Chrome installed on every Mac in my organization, this target system is out of
    compliance and I’ll need to install Chrome to fix that.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig26_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig26_HTML.jpg)


    Figure 6-26


    The results of the Software Version Report and action buttons


    There’s one more thing about this report that makes it kind of unique. Instead
    of simply providing me with data, there are three buttons in the report toolbar
    that I can interact with to act on this data. I can select the new version of
    Disk Utility and click the **Open Selected** button, and it will cause Disk Utility
    to launch on the remote machine.


    I can click the **Copy To This Computer** button, and it will copy that new version
    of Disk Utility to the workstation I am currently running ARD on. Since Disk Utility
    is a self-contained application bundle, if my host OS supports it, I can run it
    on my Mac or install it into my /Applications/Utilities folder. If you are using
    this report to identify applications that you don’t want on your network, like
    peer-to-peer file sharing applications, you can also select the application from
    the list and click the **Delete Selected** button and delete/uninstall it on the
    remote computer.'
  trans: '

    ## 资产管理及报告功能


    Apple Remote Desktop 利用多种报告功能，可帮助 Mac 系统管理员简化库存管理流程。如图 6-20 所示的 `报告` 菜单提供了多种常见报告的访问入口。您可以尝试这些报告，以找出最适合您特定场景的报告，但在本章中我们将重点介绍三个示例报告。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig20_HTML.jpg](img/492151_1_En_6_Fig20_HTML.jpg)

    图 6-20 报告菜单显示各种常见报告选项


    ### 系统概览报告


    我们要详细了解的第一个报告是 `系统概览报告`。此报告从选定的客户端 Mac 收集数据，并以报告形式提供，可通过 ARD 交互式查看、打印或导出。在第 1
    章中，我们学习了如何使用 `关于本机` 和 `系统报告` 工具来查找特定 Mac 上几乎任何我们想要的信息。使用此系统概览报告，您可以通过让 ARD 轮询网络中的每台机器来获取此信息，从而为网络中的所有
    Mac 创建一份自定义报告。图 6-21 显示了默认选项，但您可以根据需要深入每个区域并添加或删除特定的列。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig21_HTML.jpg](img/492151_1_En_6_Fig21_HTML.jpg)

    图 6-21 系统概览报告自定义窗口


    图 6-22 显示了针对我网络中的一台测试机运行此报告后得到的结果。您可以水平滚动列表，或单击特定标签页以跳转到该信息。您还可以使用报告工具栏中的按钮导出此数据。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig22_HTML.jpg](img/492151_1_En_6_Fig22_HTML.jpg)

    图 6-22 生成的系统概览报告


    您可以将该数据导出为 `∗.csv` 文件，如图 6-23 所示，然后将其导入 `Numbers` 或 `Microsoft Excel` 中对数据进行进一步计算。这对于生命周期规划或识别您设备群中需要
    RAM、存储或其他升级的机器来说，是一个非常有用的工具。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig23_HTML.jpg](img/492151_1_En_6_Fig23_HTML.jpg)

    图 6-23 导出数据对话框，包含推荐的 `∗.csv` 设置


    **专业提示**


    在本章前面，我们在 `共享` 系统偏好设置的远程管理计算机设置选项中，将资产标签信息添加到了计算机的 `信息 1` 字段。如果您查看“远程桌面”标签页，就会看到信息
    1、2、3 和 4 的字段。在信息 1 列中是我们输入的资产标签信息。


    ### 软件版本报告


    如果您致力于在所有不同的 Mac 客户端上保持软件版本一致，那么 `软件版本报告` 会特别有帮助。这是标准化基准制定和识别不合规系统的绝佳方式。我通常会在一个我认为是基准
    `参考系统` 的机器上安装一份 Apple Remote Desktop，该系统上已安装了所有标准化软件。这样我就可以将我的参考系统与网络中的所有其他系统进行比较。图
    6-24 显示了此报告的配置选项。我可以从列表中选择最多十个应用程序，并与组织中的其他 Mac 进行比较。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig24_HTML.png](img/492151_1_En_6_Fig24_HTML.png)

    图 6-24 软件版本报告配置窗口


    **专业提示**


    现在是介绍 `模板` 的好时机。在报告窗口的右上角，如图 6-25 所示，有一个 `模板弹出菜单`。您会在许多与任务相关的配置窗口中看到此模板菜单。假设您想定期检查
    `Chrome` 或 `磁盘工具` 的版本。与其每次都去选择这些，您可以 `保存` 一个模板，并可以随时从模板弹出菜单中选择再次运行该报告。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig25_HTML.jpg](img/492151_1_En_6_Fig25_HTML.jpg)

    图 6-25 您可以将任何报告或任务保存为模板，以后可以修改，或用于将来多次运行相同报告


    如您所见，我选择了 `磁盘工具` 和 `Google Chrome`。我在此示例中选择了这两项，以便您可以看到当参考系统和目标系统之间应用程序版本（磁盘工具）存在差异，以及目标系统上缺少应用程序（Google
    Chrome）时会发生什么。请看图 6-26。它在目标机器上找到了更新版本的磁盘工具，这是预料之中的，因为我的目标机器运行的是 `Catalina`，而我的参考机器仍在运行
    `Mojave`。它还发现目标机器上没有安装 Chrome，因此，如果我的目标是在组织内的每台 Mac 上都安装 Chrome，那么这台目标系统就不合规，我需要安装
    Chrome 来解决这个问题。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig26_HTML.jpg](img/492151_1_En_6_Fig26_HTML.jpg)

    图 6-26 软件版本报告的结果和操作按钮


    此报告还有一点使其有些独特。它不仅仅是提供数据给我，在报告工具栏中还有三个我可以交互操作这些数据的按钮。我可以选择新版本的磁盘工具并点击 `打开所选项目`
    按钮，这将导致远程机器上启动磁盘工具。


    我可以点击 `复制到此计算机` 按钮，它会将该新版本的磁盘工具复制到我当前运行 ARD 的工作站上。由于磁盘工具是一个自包含的应用程序包，如果我的主机操作系统支持，我可以在我的
    Mac 上运行它，或将其安装到我的 `/Applications/Utilities` 文件夹中。如果您使用此报告来识别您不希望出现在网络上的应用程序（例如点对点文件共享应用程序），您也可以从列表中选择该应用程序，然后点击
    `删除所选项目` 按钮，在远程计算机上将其删除/卸载。

