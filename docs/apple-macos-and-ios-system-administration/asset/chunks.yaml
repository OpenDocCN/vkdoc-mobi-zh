    ## Configuring Applications


    We are nearly ready to deploy these new Macs. The final step is to assign applications
    that will be installed by Profile Manager and via *Munki*.


    ### Assigning App Store Apps


    While we are in Profile Manager, we might as well assign our *Microsoft Office*
    applications. Like we did in previous chapters, select the **Design Team** device
    group and then click the **Apps** tab. Click the **+** button in the bottom portion
    of the page to bring up our library of available Apps. Click the **All Kinds**
    menu and select **macOS** to filter out the iOS versions as shown in Figure [13-14](#492151_1_En_13_Chapter.xhtml#Fig14).


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig14_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig14_HTML.jpg)


    Figure 13-14


    Select macOS to filter out Apps that are not compatible with macOS


    Assign the *macOS* versions of *Microsoft Word, Excel, PowerPoint,* and *Outlook*
    to our Device Group and leave the default **Installation Mode** as **Automatic**.
    Click **OK** to assign the applications and then click **Save** to apply them.


    Pro Tip


    If you see a message about not having enough licenses for these Apps, you can
    always go back to the Volume Purchase area of the Apple School Manager/Apple Business
    Manager portal and acquire additional seats.'
  trans: '

    ### 配置描述文件设置


    Profile Manager 的最后一步是向我们 `Design Team Device Group` 的成员分配设置。选中“设计团队”分组后，点击 `Settings`
    标签页，然后在 `Settings for Design Team` 标题下点击 `Edit` 按钮。这将打开我们的 `Configuration Profile`
    窗口，用于分配限制和设置。


    我们将在这里配置一些基本项，以符合我们 Windows 环境的观感。首先填写 `General` 有效负载部分，输入配置描述文件的名称和描述，并将 `Security`
    设置为 `With Authorization` 并设置一个密码。


    接下来，我们可以配置 `Passcode` 有效负载。将密码要求设置为最少八位字符的密码长度，并要求使用复杂字符，并设置登录尝试失败后的延迟时间，数值与本书前面多次使用过的类似。


    接着，我们将设置一些仅适用于 `macOS` 的特定设置。第一个是 `Directory` 有效负载。点击 `Configure`，然后从 `Directory
    Type` 弹出菜单中选择 `Active Directory`。我们需要提供域控制器的 `FQDN` 或 `IP 地址`，以及一个域管理员账户的用户名和密码。对于
    `Client ID`，我使用了变量 `%ComputerName%`，这样它就会使用我们分配给机器的名称，以匹配 AD 中现有的计算机记录。我们将把 `Organizational
    Unit` 留空，因为它应该基于现有记录加入到正确的 OU 中。你的 Directory 有效负载应类似于图 13-10。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig10_HTML.jpg](img/492151_1_En_13_Fig10_HTML.jpg)


    图 13-10


    在 Directory 有效负载中定义 Active Directory 设置


    接下来，我们将配置 `Login Items` 有效负载，以自动映射 `Main Office Shared` 网络驱动器。点击 `Configure` 按钮，如图
    13-11 所示，将 SMB 共享添加到“已验证网络挂载”部分。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig11_HTML.jpg](img/492151_1_En_13_Fig11_HTML.jpg)


    图 13-11


    设置我们的主办公室共享驱动器在登录时挂载


    接下来，我们将配置一些特定于 macOS 的 `restrictions`。请注意，此列表中有两组 `Restrictions` 有效负载。我们要选择 `macOS`
    标题下的那一组。点击 `Configure`，首先开始限制对大部分“系统偏好设置”的访问。你的“偏好设置”标签页应与图 13-12 匹配。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig12_HTML.jpg](img/492151_1_En_13_Fig12_HTML.jpg)


    图 13-12


    识别我们希望用户能够交互的系统偏好设置以及我们希望限制的那些


    专业提示


    请记住，这将限制机器所有用户对这些系统偏好设置的访问。如果您希望允许管理员禁用管理功能，请务必同时配置 `Login Window` 有效负载，并在 `Options`
    标签页中启用此功能。


    最后，我们将点击 `Functionality` 标签页。在这里，我们将勾选 `Lock desktop picture` 旁边的复选框，并为 `Desktop
    picture path` 提供指向 `Color Burst 1.jpg` 图像的路径，如图 13-13 所示。这将设置我们的壁纸，以与办公室里的其他人保持一致，并在
    Mac 和 Windows 客户端之间设定一致的用户体验。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig13_HTML.jpg](img/492151_1_En_13_Fig13_HTML.jpg)


    图 13-13


    配置标准桌面壁纸的路径


    专业提示


    在 `macOS Catalina` 中，桌面图片目录的路径与操作系统旧版本不同。在旧版本中，路径是 `/Library/Desktop Pictures/`，而在
    `Catalina` 中是 `/System/Library/Desktop Pictures/`。


    完成所有这些更改后，点击 `OK` 按钮关闭配置描述文件编辑器，然后点击 `Save` 按钮。


    ## 配置应用程序


    我们已基本准备好部署这些新 Mac。最后一步是指定将通过 Profile Manager 和 `Munki` 安装的应用程序。


    ### 分配 App Store 应用


    既然我们在 Profile Manager 中，不妨也分配我们的 `Microsoft Office` 应用程序。像在前几章中一样，选择 `Design Team`
    设备组，然后点击 `Apps` 标签页。点击页面底部的 `+` 按钮，调出可用应用程序库。点击 `All Kinds` 菜单并选择 `macOS`，以过滤掉
    iOS 版本，如图 13-14 所示。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig14_HTML.jpg](img/492151_1_En_13_Fig14_HTML.jpg)


    图 13-14


    选择 macOS 以过滤掉与 macOS 不兼容的应用


    将 `Microsoft Word`、`Excel`、`PowerPoint` 和 `Outlook` 的 `macOS` 版本分配给我们的设备组，并将默认的
    `Installation Mode` 保持为 `Automatic`。点击 `OK` 分配应用程序，然后点击 `Save` 应用它们。


    专业提示


    如果你看到有关这些应用程序许可证不足的消息，随时可以返回 Apple 校园教务管理/Apple 商务管理门户的批量购买区域，获取额外的席位。

    '
- fmt: '# Importing Munki Packages


    I have downloaded the `Adobe Dreamweaver CC` install package and a copy of `Atom`,
    a developer tool that is commonly used in the industry. Following the same steps
    that we used in Chapter 10, I will use the `munkiimport` command to get both of
    these added to our Munki environment. I''m going to set them both to install/uninstall
    unattended, and I''ll add them both to the `testing` Catalog.


    **Pro Tip**


    If you do not have access to `Adobe Dreamweaver` for this exercise, that is okay.
    Simply substitute any other application. The purpose is to install a couple of
    applications that aren''t available in the App Store with Munki. `Dreamweaver`
    was used because it fits in with the scenario.


    Once you finish importing the packages, open `MunkiAdmin` and take a look at the
    list of software packages. Your `MunkiAdmin` window should look similar to Figure
    13-15.


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig15_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig15_HTML.jpg)


    **Figure 13-15**

    The full list of packages that we have imported up to this point


    Go ahead and test the installation of your new applications on one of your test
    machines. Once you are satisfied with the results, we can move the new packages
    into the `production` Catalog and add them to the `site_default` Manifest. Using
    the `Catalog` view as shown in Figure 13-16, `check the boxes` next to `Adobe
    Dreamweaver CC` and `Atom`. `Save` and `reload` the `MunkiAdmin` console.


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig16_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig16_HTML.jpg)


    **Figure 13-16**

    Enable Dreamweaver and Atom in the production Catalog


    Next, click the `Manifest` view and select our `site_default` Manifest. `Double-click`
    to open it. We are going to modify our `Managed Installs` by adding `Atom`. Click
    the `+` button and select `Atom`. When complete, your `Managed Installs` tab should
    look like Figure 13-17.


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig17_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig17_HTML.jpg)


    **Figure 13-17**

    Managed Installs now includes Atom as well as Chrome and Firefox


    Click the `Optional Installs` tab and add `Adobe Dreamweaver CC` to the list.
    When complete, your `Optional Installs` tab should look like Figure 13-18.


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig18_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig18_HTML.jpg)


    **Figure 13-18**

    Add Adobe Dreamweaver CC to the Optional Installs list


    Close the `site_default` Manifest and click `Save` and `Reload`. When complete,
    you can close out of the `MunkiAdmin` application. Our applications and settings
    are now ready to go. Now we need to do a test deployment on one of our new Macs.


    # Deployment


    Our deployment process is going to consist of two stages. The first stage will
    involve unboxing the hardware, setting it up on the desk, and booting it up. As
    we step through the `Setup Assistant`, our Mac will connect to Apple''s DEP server
    and then get redirected to enroll in our Profile Manager MDM. Once it is live
    in Profile Manager, we will use the MDM management commands to enable `Apple Remote
    Desktop`. The second stage will consist of using ARD to install `Munki`, and then
    the `Managed Software Center` will finish installing the required applications
    listed in the Manifest.


    ## Activation and MDM Enrollment


    I''m going to begin by booting up `101-01-2019MBP`, our first new Mac. We will
    step through the deployment on this machine to ensure we have everything configured
    as expected. Upon powering it up, it will prompt us to choose our language and
    keyboard settings along with the wireless network settings.


    Upon connecting it to the network, the Mac checks in with DEP and prompts me to
    enroll my device into MyCompany''s MDM. After about 3–5 minutes of configuration,
    the system prompts for the time zone and then takes me to the login window with
    my local Administrator account and the Other… button available to sign into a
    domain account as shown in Figure 13-19.


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig19_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig19_HTML.jpg)


    **Figure 13-19**

    After successfully applying our settings, our login window features the Other…
    button for signing in as a domain user


    ## Enabling Apple Remote Desktop


    We are not going to sign in yet. First, we need to finish installing `MunkiTools`
    and our other applications. If I go back to Profile Manager and look at my system,
    I will see that it is no longer a Placeholder in my Devices list but an actual
    computer record. Now we can now interact with it using the MDM management tools.
    In Profile Manager, `click` the `101-01-2019MBP` device to select it and then
    click the `Action` button to show the Management Tools pop-up menu. Select `Enable
    Remote Desktop` as shown in Figure 13-20.


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig20_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig20_HTML.jpg)


    **Figure 13-20**

    Using Profile Manager to enable Apple Remote Desktop access


    `Confirm` that you want to enable Remote Desktop. After a few minutes, open `Apple
    Remote Desktop` and use the `scanner` to search the network. You should find a
    machine named `101-01-2019MBP` as shown in Figure 13-21. `Drag and drop` the found
    computer record into the `All Computers` group and authenticate with the local
    Administrator account that Profile Manager created for us to add the machine to
    our ARD console.


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig21_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig21_HTML.jpg)


    **Figure 13-21**

    Adding the new Mac to our Apple Remote Desktop console


    ## Installing MunkiTools


    Next, we will repeat the same steps we used in Chapter 10 to install and configure
    `MunkiTools`. If you saved the `MunkiTools Settings` Unix script, it should be
    very simple. Install the `MunkiTools.pkg` and run the Unix script on our new computer
    as shown in Figure 13-22. This will configure it to point to our `munki_repo`
    and assign it to `the site_default` Manifest.


    ![images/492151_1_En_13_Chapter/492151_1_En_13_Fig22_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig22_HTML.jpg)


    **Figure 13-22**

    Install the MunkiTools.pkg package and then run the Unix script to modify the
    ManagedInstalls.plist to point to our Munki environment


    When complete, restart the computer, and we can sign in as our end user and see
    that the machine is ready for use.'
