- fmt: '### Shells


    There are several different kinds of Unix shells that you can use with the Terminal
    app including `zsh`, `bash`, `tcsh`, and more. Until `macOS Catalina`, the default
    login shell for the Mac was `bash`. However, starting with `Catalina`, Apple has
    promoted `zsh` to the default login shell. You can still change it to bash using
    the **Advanced Options** page in the `Users & Groups System Preference`, which
    we will explore later in this chapter.


    ### Common Commands


    There are many common commands that can be used in various shell scripts. The
    diagram in Figure [2-12](#492151_1_En_2_Chapter.xhtml#Fig12) shows a few more
    that you should familiarize yourself with. Take a look at the description for
    each and use the man page for each command and experiment with some test files
    and folders to master the use of each of them.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig12_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig12_HTML.jpg)


    Figure 2-12

    A few common commands to familiarize yourself with


    ### Startup Disk


    As shown in Figure [2-14](#492151_1_En_2_Chapter.xhtml#Fig14), the `Startup Disk
    System Preference` is relatively straightforward. It will scan all available connected
    media, including network media on systems that support `NetBoot`, and will return
    any volume that has a valid System folder. Simply select the volume you wish to
    boot from and restart.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig14_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig14_HTML.jpg)


    Figure 2-14

    The Startup Disk System Preference pane


    This information will be saved to `NVRAM`, so if the media disconnects at some
    point in the future, you may not have a bootable Mac. It will display either a
    flashing folder with a question mark `[?]` indicating that the system cannot boot
    from the selected volume since it cannot find the System folder, or it will take
    a long time to boot as it scans for any other available volume with a valid System
    folder.


    **Pro Tip**

    If you are trying to set an encrypted volume as the startup disk, you must have
    the disk password to unlock the drive before the `Startup Disk System Preference`
    can identify if there is a valid bootable System on the disk.


    ### Sharing


    The `Sharing System Preference` will be explored in greater detail in Chapter
    [7](#492151_1_En_7_Chapter.xhtml), which covers `macOS Server`. Because `macOS
    Server` is an application that runs on top of `macOS`, many of the services in
    the `Sharing System Preference` apply to Macs being used as a server. There is
    one key item to cover as it relates to `macOS` clients specifically, and that
    is the `Computer Name`. Figure [2-15](#492151_1_En_2_Chapter.xhtml#Fig15) shows
    the area where you can name your Mac and what kind of name it broadcasts to other
    computers on a network, also known as the `hostname`.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig15_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig15_HTML.jpg)


    Figure 2-15

    The location to set the friendly name as the Computer Name


    You can think of the `Computer Name` as a friendlier name, allowing for things
    like spaces and special characters. The `hostname`, because it broadcasts on the
    network, cannot have special characters and spaces. Figure [2-16](#492151_1_En_2_Chapter.xhtml#Fig16)
    shows the hostname, and you can see how it changed the name of my Mac slightly
    by using dashes instead of spaces and eliminating special characters.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig16_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig16_HTML.jpg)


    Figure 2-16

    Comparing the hostnames between the GUI and command line


    We have another potential problem as it relates to the Computer Name. Take a close
    look at the Terminal window in Figure [2-16](#492151_1_En_2_Chapter.xhtml#Fig16).
    Do you see how the Unix hostname at the command prompt is `dwsmith-MBP`? Why do
    I have two different hostnames? Because macOS has *three* different computer names—the
    `Computer Name`, the `Local Hostname`, and the `Unix hostname`. I would recommend
    as a best practice to set the Unix hostname and Local Hostname to match. It may
    not be a big deal in some cases, but it can definitely save you from some potential
    issues later on when running scripts on remote systems. I have seen horror story
    cases where every single Mac on a network is named *differently* with the Computer
    Name and all of them are named with the *same* Unix hostname.


    Fortunately, it is very simple to change the Unix hostname. Using the `scutil`
    command as shown in Figure [2-16](#492151_1_En_2_Chapter.xhtml#Fig16), you can
    change the Computer Name to match the Local Hostname. Enter the following command,
    substituting `dwsmith-MacBook-Pro` with your chosen hostname, and authenticate
    with the `sudo` command :


    ```

    sudo scutil --set HostName dwsmiths-MacBook-Pro

    ```


    Now your Mac’s three names will be similar, and this should simplify the task
    of identifying it on a network.


    ### Users & Groups


    Next, we will take a quick look at the `Users & Groups System Preference`. We
    are going to step through the process of creating a `local user account` in the
    next section, but there are a few other features of this System Preference beyond
    simply managing user accounts. Figure [2-17](#492151_1_En_2_Chapter.xhtml#Fig17)
    is the main panel for Users & Groups. Clicking the `Login Options` button will
    bring up a series of other options as shown in Figure [2-18](#492151_1_En_2_Chapter.xhtml#Fig18).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig17_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig17_HTML.jpg)


    Figure 2-17

    The Login Options button in the Users & Groups pane


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig18_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig18_HTML.jpg)


    Figure 2-18

    The Login Options pane


    The `login window` is actually its *own application* of sorts, and this is where
    you configure it. You can turn `automatic login` on/off and select a user to sign
    in automatically. If you are choosing to use a login window instead of automatic
    login, you can display a `list of all users` or a `name and password field`. You
    can also show or hide the `power control` buttons, which may be important if you
    are administrating a server and you want someone to authenticate before they can
    power down or restart the computer.


    `Fast user switching` can be a useful solution if you want to allow multiple users
    to sign in on the same Mac and then switch between them without one user signing
    out first. This allows administrators to sign in and fix something and then give
    the system back to the user without interrupting their work. It can also be useful
    in service industries like a print shop, where multiple users are sharing the
    same computer and alternating in real time.


    The `Accessibility Options` `...` button contains additional features like `VoiceOver`,
    for screen reading at the login window for vision-impaired users. Obviously, all
    of these customizations are going to be dictated by your organization’s user base,
    security needs, and other considerations. The last option here, `Network Account
    Server`, is how you *bind* your Mac to a domain service. This will be covered
    later in the book, specifically in Chapters [7](#492151_1_En_7_Chapter.xhtml)
    and [11](#492151_1_En_11_Chapter.xhtml).'
