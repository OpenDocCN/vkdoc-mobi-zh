  trans: '

    ## iOS 简介


    与 `macOS` 类似，`iOS` 有许多版本，并且每年都会发布新版本。本书将主要关注 `iOS 13`。苹果公司还为最近的两代操作系统维护着针对 iPhone
    和 iPad 的 `iOS` 兼容性指南。


    这些指南可以在此处找到：


    **iPhone：**

    *   [`https://support.apple.com/guide/iphone/supported-models-iphe3fa5df43/ios`](https://support.apple.com/guide/iphone/supported-models-iphe3fa5df43/ios)


    **iPad：**

    *   [`https://support.apple.com/guide/ipad/supported-models-ipad213a25b2/ipados`](https://support.apple.com/guide/ipad/supported-models-ipad213a25b2/ipados)


    为了延长 `iOS` 设备的使用寿命，苹果公司通常会只将某些功能提供给最新的硬件型号。在计划 `iOS` 升级时，请特别注意审查所支持的功能，而不仅仅是基础操作系统兼容性，以确保您组织拥有的硬件支持所有必需的功能。


    识别 `iOS` 设备型号与识别 Mac 型号信息类似。在主屏幕上，点击 `设置` ➤ `通用` ➤ `关于`，如图 1-9 所示。


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig9_HTML.jpg](img/492151_1_En_1_Fig9_HTML.jpg)

    图 1-9

    iOS 设备上的"关于"屏幕


    ### iOS 用户界面


    如果您是 `iOS` 的完全新手，图 1-10 和 1-11 将帮助您快速浏览操作系统，以执行本书中使用的许多常见任务。


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig11_HTML.jpg](img/492151_1_En_1_Fig11_HTML.jpg)

    图 1-11

    iPadOS 主屏幕


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig10_HTML.jpg](img/492151_1_En_1_Fig10_HTML.jpg)

    图 1-10

    iPhone 主屏幕


    *   **状态栏：** `iOS` 设备顶部的区域，包含时钟和网络指示器。

    *   **通知标记：** 标记是一个带有数字的红色圆圈，表示该应用程序需要关注。

    *   **应用图标：** 点击应用图标将启动该应用程序或将其从后台模式唤醒。

    *   **页面控制指示器：** 当您从一个屏幕滑动到另一个屏幕时，这指示您所在的导航页面。如果您有多个图标页面，滑动屏幕将导航到下一页。

    *   **应用快捷方式：** 您最常用的应用程序可以放在这里以便快速访问。

    *   **小组件：** 无需打开整个应用程序即可提供应用程序信息的小工具，例如，头条新闻。在 `iPadOS` 中，这可以固定到主屏幕上，如图 1-11
    所示。

    *   **主屏幕菜单栏（仅限 iPhone）：** iPhone 上应用快捷方式的位置。

    *   **程序坞（仅限 `iPadOS`）：** 应用快捷方式以及最近使用的应用程序和文件的位置；它在 `iPad` 上提供了更接近 `macOS` 的外观和感觉。

    *   **最近使用的应用程序（仅限 `iPadOS`）：** 与 `macOS` 类似，`iPad` 现在可以在程序坞中显示最近使用的应用程序。


    ## 总结


    在过去的几十年里，苹果公司的平台持续变化和演进。硬件架构、操作系统软件和设备外形规格的重大变化挑战了我们对于计算机应当是什么样子的认知。本书主要关注较新的
    `macOS` 和 `iOS`，包括 `macOS Catalina`、`iOS 13` 和 `iPadOS`。


    对于其他系统的用户来说，浏览这些操作系统可能既熟悉又令人望而生畏。如果您是苹果平台的新手，我建议在进入下一章之前花一些时间探索 `iOS` 和 `macOS`，以便从最终用户的角度获得如何与这些平台交互的工作知识。


    # 2. macOS 客户端管理


    在本章中，我们将探讨单台 Mac 的管理。主题将包括管理本地用户账户、探索 `macOS` 的文件结构、学习命令行界面以及执行一些基本的硬件故障排除。


    ## Mac 硬件故障排除


    与大多数 PC 硬件制造商不同，苹果公司对于允许谁修理其硬件一直相当严格。除了通过自己的 Apple 零售店提供硬件维修服务外，他们还为希望进行维修的第三方公司制定了全面的授权维修中心流程。话虽如此，大多数技术人员在不使保修失效的情况下，自己能安全进行的硬件维修是有限的。作为一名
    Mac 技术员，在预约 `Genius Bar` 并带着 Mac 前往当地 Apple 零售店之前，了解一些基本的硬件故障排除技巧非常重要。


    ### 非易失性随机存取存储器


    `非易失性随机存取存储器`，或有时被长期 Mac 用户称为 `参数 RAM`，基本上是逻辑板上一小部分内存，用于存储计算机关机时不会擦除的信息。它存储音量级别、时区、显示器分辨率和启动磁盘的设置。虽然这种情况不常发生，但有时该内存可能会损坏；通过使用图
    2-1 中找到的键盘组合键*清除它*，可以将这些设置重置为出厂默认值。这通常是故障排除一台行为异常的 Mac 的第一步。它通常可以解决与时区相关的问题、开机后需要很长时间才显示苹果标志的慢启动问题，或与音频或内置扬声器相关的问题。


    专业提示


    如果您正在使用 `可扩展固件接口密码`，如第 3 章所述，需要注意的是，在您移除该密码之前，您将无法清除 `NVRAM`。清除 `NVRAM` 完成后，别忘了重新启用您的密码。

    '
- fmt: '# The System Management Controller (SMC)


    `The System Management Controller` (SMC) is a component of the Macintosh Intel
    hardware architecture. This is unique to Mac hardware, and besides enforcing the
    `macOS` end-user license agreement (one reason that you cannot easily run `macOS`
    on an Intel-based PC from a manufacturer other than Apple), it also works as a
    catchall for managing many of the integrated hardware components. Apple publishes
    an exhaustive list on their support web site, but in general, the SMC has some
    level of involvement in things ranging from turning the fans on/off to the function
    of LED lights on the logic board, sound, Bluetooth, sleep/wake, and more.


    In the course of troubleshooting a Mac hardware problem, you may need to reset
    the SMC. Apple recommends waiting to do so unless you have exhausted all other
    options including a standard restart and zapping the `NVRAM`. Some of the most
    common reasons to reset the SMC include having a Mac where the fans are constantly
    running even when under light processor loads or if your MacBook battery is refusing
    to charge. It won’t solve every problem, but it is definitely worth a try before
    taking your Mac to a repair center for a potentially expensive diagnostic visit.


    In general, the process for resetting the SMC on your Mac is going to be determined
    by which model you have. There is a different procedure for desktop vs. laptop
    Macs and laptops with removable batteries vs. those that do not have a removable
    battery. Most recently with the advent of the `Apple T2 Security chip`, there
    is yet another different method to reset the SMC of Macs that feature that co-processor
    onboard. It is recommended that you refer to Apple’s support page for instructions
    on how to reset the SMC of the particular Mac you are troubleshooting.


    Apple’s KB article about the SMC can be found here:

    *   [`https://support.apple.com/en-us/HT201295`](https://support.apple.com/en-us/HT201295)


    ## Pre-boot Keyboard Combinations


    There are a number of keyboard combinations that you should be familiar with when
    troubleshooting a Mac. Figure 2-1 shows the various pre-boot keyboard shortcuts,
    many of which can be used to select a startup disk other than the internal hard
    drive. You can boot into `safe mode`, turn on verbose logging during bootup, enter
    `recovery mode`, or even turn your Mac into a giant external Thunderbolt hard
    disk using `Target Disk mode`.


    Pro Tip

    `Target Disk mode` can be an effective way to troubleshoot a Mac that refuses
    to boot from the internal hard disk. By using Target Disk mode, you can attempt
    to mount the internal drive to another Mac and make it appear like a Thunderbolt-
    or Firewire-connected external hard drive. If the drive refuses to mount, it may
    be indicative of a hardware malfunction. If the drive does mount, but the Mac
    will still not boot up from it, you may be able to retrieve data or create a backup
    of the drive before erasing it and installing a fresh copy of macOS.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig1_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig1_HTML.jpg)

    *Figure 2-1: Keyboard combinations for pre-boot options*


    ## macOS Recovery


    On standard installations of `macOS`, Apple provides a hidden partition that holds
    a limited copy of the operating system and a few applications like `Disk Utility`,
    `Terminal`, and a `macOS Installer` package. This area is effectively called `macOS
    Recovery`, and just like you guessed, it is used to try to revive your Mac if
    there is an issue with the operating system.


    If for some reason your Mac does not have a local Recovery partition, you can
    also take advantage of the `Internet Recovery` service. Internet Recovery is a
    cloud-based bootable network volume that Apple hosts. Booting from Internet Recovery
    requires an active Internet connection and may take quite a bit longer to boot
    depending on the speed of your connection.


    Once you are booted into recovery mode, there are a handful of things you will
    be able to do including the following:

    *   Restore from a Time Machine Backup.

    *   Reinstall or install a fresh copy of `macOS`.

    *   Browse Apple’s support web site via Safari (if you have an active Internet
    connection).

    *   Use Disk Utility to perform Disk First Aid or other drive-related tasks.

    *   Access the Terminal.

    *   Interact with hardware security settings (covered in detail in Chapter 3).


    ### Disk Utility


    While most of these options are self-explanatory, `Disk Utility` includes a number
    of tools that are particularly useful when in `macOS Recovery` mode. Because we
    are booted from the Recovery partition and not the same partition with the full
    macOS System folder (often referred to as the `startup disk`), we can run utilities
    and commands against the startup volume. While you can access many of these same
    options from the Disk Utility application inside `/Applications/Utilities` when
    you are booted into your Mac’s startup disk, you may run into issues executing
    them on the same volume the system is currently running from. This makes `macOS
    Recovery`, and in particular Internet Recovery, the best option for working directly
    with your Mac’s internal hard disk. Figure 2-2 shows the default view of Disk
    Utility with some important options identified.


    Pro Tip

    Be careful when using Disk Utility in `macOS Recovery` mode. It is very easy to
    accidentally delete your boot partition or even the entire internal hard disk.
    Make sure you have a backup of any important data before experimenting with Disk
    Utility on your Mac.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig2_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig2_HTML.jpg)

    *Figure 2-2: The Disk Utility interface*


    *   **Container Panel:** A list of volumes, drives, partitions, containers, and
    mounted disks.

    *   **New Volume:** Add or remove volumes to or from the selected disk.

    *   **Disk First Aid:** Opens the `Disk First Aid` sub-utility to check and repair
    or optimize the hard drive, similar to disk defragmentation in Windows.

    *   **Modify Partition Map:** Allows you to add or remove partitions to or from
    a specific disk.

    *   **Erase Drive/Volume/Partition:** Erases the selected container, drive, partition,
    or volume.

    *   **Capacity:** Shows the overall capacity of the selected drive and how many
    volumes are contained.

    *   **Disk Utilization:** The composition of the drive including partitions or
    volumes and how much space is used by each.

    *   **Format:** The drive’s file system format such as `Apple File System` (APFS)
    or `Hierarchical File System Plus` (HFS+).

    *   **Unix Volume Descriptor:** The volume description in Unix. Used to reference
    the drive location when running `bash` or `zsh` scripts.


    Pro Tip

    As Apple has continued to abstract away the various removable disks in the `macOS`
    GUI, you may not see mounted volumes appearing on the Desktop or in the Favorites
    pane in the Finder. To find a mounted drive via the GUI, the fastest thing to
    do is to use the `Go` menu and choose `Computer`. That will display all mounted
    volumes including hard disks, mapped network drives, and any other available attached
    storage.'
