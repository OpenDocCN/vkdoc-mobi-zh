    这个过程非常简单直接，因为这与我们在第 9 章中遵循的步骤相同。将 **安装模式** 设置为 **自动**，然后点击 **保存** 按钮以推送配置并开始应用程序安装过程。安装所有这些应用程序需要相当长的时间，你可以使用“活动任务”窗口来监控进度，直到安装完成。


    ### 激活 Office 365 应用程序


    一旦 Office 应用程序在 Don 的 MacBook Pro 上安装完成，我们就可以启动其中一个应用程序，并使用激活向导通过我们的 `O365` 帐户进行身份验证并激活软件许可证，如图
    11-35 所示。


