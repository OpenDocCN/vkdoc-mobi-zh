    # 欢迎使用 Apple Configurator


    关于 `Apple Configurator`，首先你需要知道的是，它**并非**一款移动设备管理（`MDM`）解决方案。它是一个针对 iOS 设备的**配置**工具，其最初开发的目的是让系统管理员能够大批量配置完全相同的
    `iPad` 和 `iPhone`。2012 年，我曾直接参与了一项针对美国大陆多所学院的大规模 1:1 `iPad` 部署项目。在几年的时间里，我们向学生、教职员工部署了超过
    30,000 台 `iPad`，并且每一台设备都必须以完全相同的方式运行。我们使用 `Apple Configurator` 来实现这种级别的标准化，并且效果非常好。


    关于 `Apple Configurator` 需要知道的第二点是，它只能在 `macOS` 上运行。因此，使用本章内容的前提条件是，你有一台可以安装 `Apple
    Configurator` 的 Mac。最新版本支持 iOS 13 及同期发布的设备，即 `iPhone 11` 系列。如果你打算运行最新版本的 `Configurator`，你的
    Mac 至少需要运行 `macOS Mojave` 10.14.6。如图 5-1 所示，你可以从 `Mac App Store` 免费下载 `Apple Configurator
    2`。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig1_HTML.jpg](img/492151_1_En_5_Fig1_HTML.jpg)

    图 5-1

    `Apple Configurator 2` 在 Mac App Store 中


    第三，要在 `Apple Configurator` 中准备设备，你需要使用 USB 数据线将其连接到 Mac。如果你需要配置大量设备，就像我当年部署 30,000
    台设备那样，你可能需要计划购买一些带供电的 USB 2.0 集线器、配备集成 USB 集线器的 iPad 车，或者——如果你使用新的 `Mac Pro`——一些每张卡提供八个或更多
    USB 端口的 PCI 卡。这将大大缩短设备准备所需的时间，因为 `Configurator` 可以同时处理多个连接的设备。


    至此，你应该拥有一台运行 `Mojave` 或更高版本系统的 Mac、至少一根 USB 转 Lightning 数据线、至少一台可供练习的 iOS 设备，以及安装在
    `/Applications` 目录中的 `Apple Configurator 2`。让我们开始吧：连接 iOS 设备并启动 `Apple Configurator`。


    ## Apple Configurator 用户界面


    当你启动 `Apple Configurator` 时，你的屏幕应该看起来类似于图 5-2。如果你只看到一个已连接 iOS 设备的巨大图像，请点击工具栏上的
    `视图` 弹出菜单并选择 `列表`。现在，你的 iOS 设备将以行形式列出，并带有各种列标题，就像我的界面一样。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig2_HTML.jpg](img/492151_1_En_5_Fig2_HTML.jpg)

    图 5-2

    主要的 `Apple Configurator` 窗口和工具栏


    如图 5-2 所示，工具栏有几个关键组成部分。以下是其中几个主要组件的说明：

    * `添加` 按钮：使用此按钮为选中的 iOS 设备安装应用、文档、媒体或配置描述文件。

    * `蓝图` 按钮：使用此按钮创建或编辑称为 `蓝图` 的模板，我们将使用这些模板为不同的用户群构建特定的 iOS 设备。

    * `准备` 按钮：每当我们连接一台新的 iOS 设备时，这是要按的第一个按钮。这会启动 `设备准备助手`，并逐步完成激活和配置过程。

    * `更新` 按钮：此按钮将为指定设备下载并安装最新版本的 iOS。

    * `备份` 按钮：此按钮创建选中设备的备份。这基本上与我们第 4 章中使用 `iTunes` 或 `访达`（`macOS Catalina`）介绍的功能相同。在
    `iTunes` 中创建的备份与 `Configurator` 创建的备份兼容。

    * `标记` 按钮：此按钮允许你标记特定的设备组，通过颜色轻松识别它们以用于特定目的。

    * `设备列表`：这是 `Apple Configurator` 中的设备列表及其状态。你可以按 `所有设备`、`受监督`、`未受监督` 以及当它们处于 `恢复`
    模式时进行排序。你还可以在设备列表中看到一些基本信息。`双击` 设备将提供更多信息，包括 `序列号`、`IMEI` 号、`电池状态`、`已安装应用` 等。


    > 专业提示

    > 你可能会想通过集成的 `备份` 和 `恢复流程` 来以完全相同的方式配置一组设备，方法是先按照你的要求精确配置一台 iOS 设备，然后使用 `备份` 按钮为其准备备份，再恢复到其他设备。这种方法有一些缺点，包括尽管你尽了最大努力，仍可能在用作备份源的设备上留下用户特定的数据。而且随着时间的推移，这种方法也特别不便于扩展，因为如果你需要进行任何更改，都必须创建一个全新的源备份。由于这些及其他原因，在本书中，我们将使用
    `蓝图` 来代替 `备份` 和 `恢复` 工作流。

    '
- fmt: '# Organization and Supervision Identity


    Before you start configuring iOS devices, there are a couple of identity options
    that you will want to define in the application’s `Preferences` dialog box. To
    access these options, click the `Apple Configurator 2` menu and choose `Preferences…`.
    Then click the `Organizations` tab in the Preferences window. Figure [5-3](https://example.com#492151_1_En_5_Chapter.xhtml#Fig3)
    shows the Organizations tab. Click the `+` button to create a new Organization.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig3_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig3_HTML.jpg)


    Figure 5-3

    The Organizations tab inside Apple Configurator’s Preferences window


    As the information on the `New Organization` sheet explains, creating an Organization
    provides specific *contact information* and the *supervision identity* for supervised
    devices. You may be asking yourself, “What is a *supervised* device?” As we learned
    in Chapter [4](https://example.com#492151_1_En_4_Chapter.xhtml), `iOS` is not
    designed as a multi-user operating system where many users can share the same
    device and have various unique identities and permissions like you do in `macOS`.
    Despite this fact, when large companies and schools purchase iOS devices and provide
    them to employees, students, or other end users, the IT Department still needs
    to implement basic information security controls.


    `Supervising a device` is a way that system administrators can lock down specific
    parts of `iOS` from users in a way that is similar to having a local admin account
    and providing a limited environment for others. You will see later in this chapter
    that many security options are only available to devices that are supervised.
    Devices that are not supervised can still be managed, but the end user has the
    ability to change configuration settings, restore or reset the device, and remove
    restrictions.


    You may be wondering when it is acceptable to `supervise` a device and when it
    is not. This is largely up to the organization and the use case for the device.
    The general rule of thumb that I have used is that if the device is owned by my
    organization, then I supervise it. If the device is owned by the end user, I will
    still attempt to manage it through `Configuration Profiles` or `ActiveSync`, but
    it is not going to be supervised so my security is considered *best effort*. Your
    mileage on this topic may vary depending on how restrictive the devices need to
    be in your particular case.


    ## Creating An Organization And Supervision Identity


    Go ahead and create an organization and a supervision identity as shown in Figure
    [5-4](https://example.com#492151_1_En_5_Chapter.xhtml#Fig4). When it prompts you
    to sign in to the `Device Enrollment Program`, `skip` that step. We cover this
    service in a later chapter of this book, and we will not be using that for this
    exercise. Enter the information about your organization such as the `name`, the
    `phone number` for your help desk, and `public address`. This information *will
    be* disclosed to end users or people who may find the device if it gets lost.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig4_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig4_HTML.jpg)


    Figure 5-4

    Enter some contact information to define your organization


    Click the `Next` button to continue. Now we are going to create a new supervision
    identity. This identity is basically a *trust certificate,* and you can view it
    by clicking `Show Supervision Identity…` as shown in Figure [5-5](https://example.com#492151_1_En_5_Chapter.xhtml#Fig5).
    Now that we have created an organization and a supervision identity, we are ready
    to continue. Close out of the Preferences window and return to the main Apple
    Configurator interface.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig5_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig5_HTML.jpg)


    Figure 5-5

    An example supervision identity certificate


    ### Pro Tip


    You can export your supervision identity using the little `gear` button next to
    the `+/-` buttons on the `Organizations` tab of the `Preferences` window. This
    will allow you to share the same supervision identity with other Macs that are
    being used with Apple Configurator. It is very important that all Macs that are
    enrolling devices share the same supervision identity for the same organization
    if you are using more than one machine to configure your `iPhones` and `iPads`.'
