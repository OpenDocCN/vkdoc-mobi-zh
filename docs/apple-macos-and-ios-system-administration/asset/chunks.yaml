    ## Mac Hardware Troubleshooting


    Unlike most PC hardware manufacturers, Apple has always been quite particular
    about who they ***allow*** to repair their hardware. They enforce a comprehensive
    ***Authorized Repair Center*** process for third-party companies wishing to do
    repairs in addition to offering hardware repair services through their own ***Apple
    Retail Stores***. That being said, there are limitations to how many hardware
