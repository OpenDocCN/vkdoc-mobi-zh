- fmt: '### Using Profile Manager to Mimic Microsoft Group Policy


    We are starting to check off these various integration tasks for Don President’s
    MacBook Pro. He can sign in with his Active Directory credentials, and he can
    log in while his machine is offline. However, we still need to configure his Mac
    to conform to our corporate standards. That could include a number of things defined
    in our Windows Group Policy including the default wallpaper, how long it takes
    for a screen saver to begin, if a screen saver requires a password, energy saver
    settings like when to put the computer or display to sleep, and the default home
    page just to name a few.


    Fortunately, most of these options are available to us in `Profile Manager`, and
    we can use a `Configuration Profile` to provide these settings to Don’s Mac and
    mimic the settings we have built into our company’s GPO. For the purposes of this
    demonstration, we will simply set the energy saver and some custom Safari settings.
    To do this, open `Profile Manager` and browse to our `101-2019MBP` computer in
    `Devices`. Click the `Settings` tab and then click `Edit`.


    Let’s configure the `Energy Saver` payload first. Click `Energy Saver` and then
    click the `Configure` button to define the settings for this payload. Your settings
    should look similar to mine in Figure [11-20](#492151_1_En_11_Chapter.xhtml#Fig20).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig20_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig20_HTML.jpg)


    *Figure 11-20*: Configure the Energy Saver payload


    Next, we need to do something a little more customized to configure Safari’s settings.
    We are going to add a new payload called `Custom Settings`, and we will configure
    it as shown in Figure [11-21](#492151_1_En_11_Chapter.xhtml#Fig21). The way that
    this works is that we are going to override the local user’s settings with ours
    for a specific application—in this case, `Safari`. We are going to enter `com.apple.Safari`
    into the `preference domain` field, and then we can add items and define specific
    behaviors on a per-key basis as if we were creating our own custom `*.plist` xml
    file.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig21_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig21_HTML.jpg)


    *Figure 11-21*: Creating custom keys and values for Safari to customize the user
    experience


    You may wonder where I found these options that I am using to override the default
    behavior of `Safari`. This is going to vary by application, but typically I look
    for the corresponding `*.plist` file in the `~/Library/Preferences/` directory.
    The easiest applications to modify are those that save their settings there, and
    then I can simply upload the modified `*.plist` file into the `Custom Settings`
    payload in `Profile Manager` using the `Upload File` button. Unfortunately, some
    applications (like Safari) are a bit trickier.


    `Safari` has a file called `com.apple.Safari.manifest` in `Safari.app` bundle
    ➤ `Contents` ➤ `Resources` ➤ `com.apple.Safari.manifest` ➤ `Contents` ➤ `Resources`.
    I know, it’s buried! If you open this xml file in `TextEdit`, you will see various
    keys and their matching options as shown in Figure [11-22](#492151_1_En_11_Chapter.xhtml#Fig22).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig22_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig22_HTML.jpg)


    *Figure 11-22*: The key and value options for overriding the Safari preferences


    I picked a few of these to add to my `Custom Settings` payload and manually added
    them by clicking the `Add Item` button and entering the values. As for the MyCompany
    home page, I used a `string` type to define the URL to [`www.msn.com`](http://www.msn.com).
    For the purposes of this demonstration, we will call that our company’s “Intranet
    home page.” You could put any URL in here and apply it as the new default home
    page in `Safari`.


    **Pro Tip**


    When you choose to upload a `*.plist` preference file for a specific application,
    it will allow you to adjust the `Property List Values` in a way that is similar
    to using a `Group Policy Administrative Template`. Creating `Custom Settings`
    payloads for applications can take a lot of time, but it is worth the effort if
    you have hundreds or thousands of Macs to manage.


    Click the `OK` button to close the `Configuration Settings` window and then click
    the `Save` button to apply the settings to our Mac. Switch back over to Don’s
    MacBook Pro and launch `Safari`. You will see that our new window and new tab
    behavior is now set to load the home page instead of favorites, and the home page
    that loads is [`www.msn.com`](http://www.msn.com) as we defined in our `Custom
    Settings` payload. Your screen should look similar to Figure [11-23](#492151_1_En_11_Chapter.xhtml#Fig23).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig23_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig23_HTML.jpg)


    *Figure 11-23*: Our customized settings applied to Safari on our test Mac


    ## Windows Printer Sharing Integration


    The next item on our to-do list for Don is to map his network printer to his Mac.
    We have an HP LaserJet 9050 printer in the main office that is shared from our
    Windows server. Don has permission to print to the shared printer, and all we
    need to do is connect to it from his Mac. You can perform this task while signed
    in as Don.


    **Connect to a Windows Shared Printer**


    1.  Open the `Printers & Scanners System Preference` and click the padlock and
    authenticate as the local `Administrator` account.

    2.  Click the `+` button on the left-side pane as shown in Figure [11-24](#492151_1_En_11_Chapter.xhtml#Fig24).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig24_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig24_HTML.jpg)


    *Figure 11-24*: Add a new printer using the Printers & Scanners System Preference


    3.  The Mac will search for available network printers in the directory domain
    and will list them. We will select our printer from the list, and the under the
    Use pop-up menu, we will choose `Select Software` and then browse for the `HP
    LaserJet Series PCL` driver. Once your window looks like Figure [11-25](#492151_1_En_11_Chapter.xhtml#Fig25),
    click the `Add` button to finish the process. Print a test page to make sure it
    worked.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig25_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig25_HTML.jpg)


    *Figure 11-25*: Find our network printer and select the proper driver


    ## Windows File Sharing Integration


    Next up, we have some Windows file sharing to configure. Don will need access
    to the `Executive Shared` drive on his Mac, and the sales manager will need to
    access the same network drive on her `iPad` so she can update the daily sales
    report that Don reviews. We will start with connecting to the network share on
    Don’s Mac.'
  raw: '### Using Profile Manager to Mimic Microsoft Group Policy


    We are starting to check off these various integration tasks for Don President’s
    MacBook Pro. He can sign in with his Active Directory credentials, and he can
    log in while his machine is offline. However, we still need to configure his Mac
    to conform to our corporate standards. That could include a number of things defined
    in our Windows Group Policy including the default wallpaper, how long it takes
    for a screen saver to begin, if a screen saver requires a password, energy saver
    settings like when to put the computer or display to sleep, and the default home
    page just to name a few.


    Fortunately, most of these options are available to us in Profile Manager, and
    we can use a Configuration Profile to provide these settings to Don’s Mac and
    *mimic* the settings we have built into our company’s GPO. For the purposes of
    this demonstration, we will simply set the energy saver and some custom Safari
    settings. To do this, open Profile Manager and browse to our **101-2019MBP** computer
    in **Devices**. Click the **Settings** tab and then click **Edit**.


    Let’s configure the Energy Saver payload first. Click **Energy Saver** and then
    click the **Configure** button to define the settings for this payload. Your settings
    should look similar to mine in Figure [11-20](#492151_1_En_11_Chapter.xhtml#Fig20).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig20_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig20_HTML.jpg)


    Figure 11-20


    Configure the Energy Saver payload


    Next, we need to do something a little more customized to configure Safari’s settings.
    We are going to add a new payload called **Custom Settings** , and we will configure
    it as shown in Figure [11-21](#492151_1_En_11_Chapter.xhtml#Fig21). The way that
    this works is that we are going to override the local user’s settings with ours
    for a specific application—in this case, Safari. We are going to enter **com.apple.Safari**
    into the **preference domain** field, and then we can add items and define specific
    behaviors on a per-key basis as if we were creating our own custom **∗.plist**
    xml file.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig21_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig21_HTML.jpg)


    Figure 11-21


    Creating custom keys and values for Safari to customize the user experience


    You may wonder where I found these options that I am using to override the default
    behavior of Safari. This is going to vary by application, but typically I look
    for the corresponding **∗.plist** file in the ***~/Library/Preferences/*** directory.
    The easiest applications to modify are those that save their settings there, and
    then I can simply upload the modified **∗.plist** file into the **Custom Settings**
    payload in Profile Manager using the **Upload File** button. Unfortunately, some
    applications (like Safari) are a bit trickier.


    Safari has a file called **com.apple.Safari.manifest** in Safari.app bundle ➤
    **Contents** ➤ **Resources** ➤ **com.apple.Safari.manifest** ➤ **Contents** ➤
    **Resources**. I know, it’s buried! If you open this xml file in TextEdit, you
    will see various keys and their matching options as shown in Figure [11-22](#492151_1_En_11_Chapter.xhtml#Fig22).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig22_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig22_HTML.jpg)


    Figure 11-22


    The key and value options for overriding the Safari preferences


    I picked a few of these to add to my **Custom Settings** payload and manually
    added them by clicking the **Add Item** button and entering the values. As for
    the MyCompany home page, I used a **string** type to define the URL to [`www.msn.com`](http://www.msn.com).
    For the purposes of this demonstration, we will call that our company’s “Intranet
    home page.” You could put any URL in here and apply it as the new default home
    page in Safari.


    Pro Tip


    When you choose to upload a ***.plist** preference file for a specific application,
    it will allow you to adjust the Property List Values in a way that is similar
    to using a Group Policy Administrative Template. Creating Custom Settings payloads
    for applications can take a lot of time, but it is worth the effort if you have
    hundreds or thousands of Macs to manage.


    Click the **OK** button to close the Configuration Settings window and then click
    the **Save** button to apply the settings to our Mac. Switch back over to Don’s
    MacBook Pro and launch Safari. You will see that our new window and new tab behavior
    is now set to load the home page instead of favorites, and the home page that
    loads is [`www.msn.com`](http://www.msn.com) as we defined in our Custom Settings
    payload. Your screen should look similar to Figure [11-23](#492151_1_En_11_Chapter.xhtml#Fig23).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig23_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig23_HTML.jpg)


    Figure 11-23


    Our customized settings applied to Safari on our test Mac


    ## Windows Printer Sharing Integration


    The next item on our to-do list for Don is to map his network printer to his Mac.
    We have an HP LaserJet 9050 printer in the main office that is shared from our
    Windows server. Don has permission to print to the shared printer, and all we
    need to do is connect to it from his Mac. You can perform this task while signed
    in as Don.


    Connect to a Windows Shared Printer


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig25_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig25_HTML.jpg)


    Figure 11-25


    Find our network printer and select the proper driver


    1.  The Mac will search for available network printers in the directory domain
    and will list them. We will select our printer from the list, and the under the
    Use pop-up menu, we will choose Select Software and then browse for the HP LaserJet
    Series PCL driver. Once your window looks like Figure [11-25](#492151_1_En_11_Chapter.xhtml#Fig25),
    click the Add button to finish the process. Print a test page to make sure it
    worked.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig24_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig24_HTML.jpg)


    Figure 11-24


    Add a new printer using the Printers & Scanners System Preference


    1.  Open the Printers & Scanners System Preference and click the padlock and authenticate
    as the local Administrator account.


    2.  Click the + button on the left-side pane as shown in Figure [11-24](#492151_1_En_11_Chapter.xhtml#Fig24).


    ## Windows File Sharing Integration


    Next up, we have some Windows file sharing to configure. Don will need access
    to the **Executive Shared** drive on his Mac, and the sales manager will need
    to access the same network drive on her *iPad* so she can update the daily sales
    report that Don reviews. We will start with connecting to the network share on
    Don’s Mac.'
  trans: '

    ### 使用配置文件管理器模拟 Microsoft 组策略


    我们正在逐一完成针对 Don President 的 MacBook Pro 的各项集成任务。他可以使用其 Active Directory 凭据登录，并且可以在机器离线时登录。然而，我们仍需要配置他的
    Mac 以符合我们的企业标准。这可能包括我们 Windows 组策略中定义的许多项目，例如默认壁纸、屏幕保护程序启动所需时间、屏幕保护程序是否需要密码、节能器设置（如计算机或显示器何时进入睡眠状态）以及默认主页等等。


    幸运的是，这些选项大多数在 `Profile Manager` 中可用，我们可以使用 `配置描述文件` 来向 Don 的 Mac 提供这些设置，并模拟我们公司
    GPO 中内置的设置。出于本次演示的目的，我们将简单地设置节能器和一些自定义的 Safari 设置。为此，请打开 `Profile Manager` 并浏览到
    `设备` 下的 `101-2019MBP` 计算机。点击 `设置` 选项卡，然后点击 `编辑`。


    让我们首先配置 `节能器` 负载。点击 `节能器`，然后点击 `配置` 按钮来定义此负载的设置。您的设置应与图 11-20 中我的设置类似。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig20_HTML.jpg](img/492151_1_En_11_Fig20_HTML.jpg)


    *图 11-20*: 配置节能器负载


    接下来，我们需要做一些更定制化的操作来配置 Safari 的设置。我们将添加一个名为 `自定义设置` 的新负载，并按图 11-21 所示进行配置。这种方式的工作机制是，我们将用我们的设置覆盖特定应用程序（本例中是
    `Safari`）的本地用户设置。我们将在 `偏好设置域` 字段中输入 `com.apple.Safari`，然后就可以逐项添加条目并按每个键定义特定的行为，就像在创建我们自己的自定义
    `*.plist` xml 文件一样。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig21_HTML.jpg](img/492151_1_En_11_Fig21_HTML.jpg)


    *图 11-21*: 为 Safari 创建自定义键和值以定制用户体验


    您可能会好奇我从哪里找到这些用来覆盖 `Safari` 默认行为的选项。这因应用程序而异，但通常我会在 `~/Library/Preferences/` 目录中查找对应的
    `*.plist` 文件。最容易修改的应用程序是那些将其设置保存在该目录中的，然后我只需使用 `上传文件` 按钮将修改后的 `*.plist` 文件上传到
    `Profile Manager` 的 `自定义设置` 负载中即可。不幸的是，有些应用程序（如 Safari）稍微棘手一些。


    `Safari` 在 `Safari.app` 应用程序包 ➤ `Contents` ➤ `Resources` ➤ `com.apple.Safari.manifest`
    ➤ `Contents` ➤ `Resources` 中有一个名为 `com.apple.Safari.manifest` 的文件。我知道，它藏得很深！如果您在
    `TextEdit` 中打开这个 xml 文件，您会看到各种键及其匹配的选项，如图 11-22 所示。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig22_HTML.jpg](img/492151_1_En_11_Fig22_HTML.jpg)


    *图 11-22*: 用于覆盖 Safari 偏好设置的键和值选项


    我从中挑选了几个添加到 `自定义设置` 负载中，并通过点击 `添加项目` 按钮并输入值的方式手动添加了它们。至于 MyCompany 主页，我使用了一个 `string`
    类型来定义 URL 为 [`www.msn.com`](http://www.msn.com)。为本次演示的目的，我们将称之为我们公司的"内网主页"。您可以在此处放入任何
    URL 并将其应用为 `Safari` 的新默认主页。


    **专业提示**


    当您选择为特定应用程序上传 `*.plist` 偏好设置文件时，它允许您以类似于使用 `组策略管理模板` 的方式调整 `属性列表值`。为应用程序创建 `自定义设置`
    负载可能需要大量时间，但如果您需要管理数百或数千台 Mac，那么这些努力是值得的。


    点击 `确定` 按钮关闭 `配置设置` 窗口，然后点击 `保存` 按钮将设置应用到我们的 Mac。切换回 Don 的 MacBook Pro 并启动 `Safari`。您将看到，我们的新窗口和新标签页行为现在被设置为加载主页而不是收藏夹，并且加载的主页是我们之前在
    `自定义设置` 负载中定义的 [`www.msn.com`](http://www.msn.com)。您的屏幕应类似于图 11-23。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig23_HTML.jpg](img/492151_1_En_11_Fig23_HTML.jpg)


    *图 11-23*: 我们的自定义设置已应用于测试 Mac 上的 Safari


    ## Windows 打印机共享集成


    我们为 Don 列出的下一项任务是将他的网络打印机映射到他的 Mac。我们在主办公室有一台从 Windows 服务器共享的 HP LaserJet 9050
    打印机。Don 有权使用该共享打印机，我们需要做的就是从他的 Mac 连接到它。您可以在以 Don 身份登录时执行此任务。


    **连接到 Windows 共享打印机**


    1.  打开 `打印机与扫描仪系统偏好设置`，点击挂锁图标并以本地 `管理员` 账户进行身份验证。

    2.  点击左侧窗格中的 `+` 按钮，如图 11-24 所示。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig24_HTML.jpg](img/492151_1_En_11_Fig24_HTML.jpg)


    *图 11-24*: 使用打印机与扫描仪系统偏好设置添加新打印机


    3.  Mac 将在目录域中搜索可用的网络打印机并列出它们。我们将从列表中选择我们的打印机，然后在"使用"弹出菜单下选择 `选择软件`，然后浏览找到 `HP
    LaserJet Series PCL` 驱动程序。一旦您的窗口看起来像图 11-25 那样，点击 `添加` 按钮以完成该过程。打印一张测试页以确保其正常工作。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig25_HTML.jpg](img/492151_1_En_11_Fig25_HTML.jpg)


    *图 11-25*: 查找我们的网络打印机并选择合适的驱动程序


    ## Windows 文件共享集成


    接下来，我们需要配置一些 Windows 文件共享。Don 需要在他的 Mac 上访问 `Executive Shared` 驱动器，销售经理也需要在她的
    `iPad` 上访问同一个网络驱动器，以便她可以更新 Don 审阅的每日销售报告。我们将从在 Don 的 Mac 上连接到网络共享开始。

    '
- fmt: '### macOS File Sharing


    While signed in as Don, we can use the `Go` menu ➤ `Connect to Server` option
    to manually map the `Exec Shared` drive that is hosted on our Windows server.
    As shown in Figure [11-26](#492151_1_En_11_Chapter.xhtml#Fig26), enter the entire
    path to the share. As a best practice, you may want to use the FQDN when defining
    the server name and note that on the Mac, we need to use the forward-slash instead
    of the back-slash when defining the network path.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig26_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig26_HTML.jpg)


    Figure 11-26: The Connect to Server dialog box


    After entering the path to the network share, you can also click the `+` button
    to save it as a favorite server so Don won’t have to remember the path each time
    he needs to connect to it. Click the `Connect` button, and it should map the drive
    in a new window, and it should not require any additional authentication as we
    are already signed into the MacBook Pro with Don’s domain account.


    Pro Tip: Most likely you will want to automatically map Don’s network drives at
    login like we do on Windows. To do this, you can go to the `Users & Groups System
    Preference` ➤ `Login Items` tab; and using the `+` button, you can add the network
    volume to the list as shown in Figure [11-27](#492151_1_En_11_Chapter.xhtml#Fig27).
    That way upon logging into the Mac, it will attempt to connect to these drives
    automatically.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig27_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig27_HTML.jpg)


    Figure 11-27: Adding the Exec Shared volume to the Login Items for Don President


    Pro Tip: You can also configure an MDM payload for mapping network drives automatically
    at login. As you can see in Figure [11-28](#492151_1_En_11_Chapter.xhtml#Fig28),
    you can select to add an `Authenticated Network Mount` and then specify the file
    sharing protocol, the server name, and the name of the share.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig28_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig28_HTML.jpg)


    Figure 11-28: Adding a Mount Point in the Login Items payload via Profile Manager


    ### iPadOS File Sharing


    Now that Don is all set on his Mac, let’s switch over to Sally’s new iPad. Since
    she is running `iPadOS`, she has an additional option in the Files app that allows
    her to connect to a network share. To access this option, open the Files app from
    the Home Screen and then tap the `…` button and select `Connect to Server` as
    shown in Figure [11-29](#492151_1_En_11_Chapter.xhtml#Fig29).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig29_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig29_HTML.jpg)


    Figure 11-29: Accessing the Connect to Server option in the Files App


    When it prompts for a server path, enter `smb://PCSERVER01.mycompany.local` (or
    the server’s IP address) into the `Server` field and tap the `Connect` button.
    It will prompt you to authenticate, so go ahead and enter the username and password
    for someone who has access to the Windows shares. I’m using `sjones` in Figure
    [11-30](#492151_1_En_11_Chapter.xhtml#Fig30), but `dpresident` would also work.
    After entering the user’s credentials, click the `Next` button to continue.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig30_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig30_HTML.jpg)


    Figure 11-30: Enter a username and password to authenticate to the file server


    It will connect you to the server and present all of the shares that your authenticated
    user has permission to access. Your screen should look similar to Figure [11-31](#492151_1_En_11_Chapter.xhtml#Fig31).
    Sally can now browse to the `Exec Shared` folder and then find her sales report
    to open and edit with `Microsoft Excel` on her `iPad`.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig31_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig31_HTML.jpg)


    Figure 11-31: Browsing our network file share from the iPad


    We have successfully configured local Windows file sharing on both `macOS` and
    `iPadOS` clients. Users of Apple devices can seamlessly share data with users
    on Windows PCs.


    ## Microsoft Exchange Integration


    Apple provides `Microsoft Exchange` integration at the operating system level
    on both `macOS` and `iOS`. You can use a Configuration Profile to configure the
    Exchange account settings for Mail, Contacts, Calendars, and Tasks. For Don’s
    new `iPhone 11`, we will simply configure the Exchange settings for his device
    remotely using Profile Manager. For his Mac, he wants to use Microsoft Outlook,
    so we will need to configure that manually after we download and activate the
    Office 365 applications in the next section.


    ### Configure the Microsoft Exchange Account Using a Payload Variable


    Before we begin this exercise, be sure to create a new user in Profile Manager
    for Don President, using `dpresident` as the username. Enroll a test iOS device
    and name it `Don''s iPhone` so that you can modify and push new Configuration
    Profiles to the device. Now that we have an account created, we are going to create
    an Exchange payload that will use his username as a `payload variable` to configure
    the account on his device.


    1.  Open `Profile Manager`, browse the `Devices` section, and find `Don''s iPhone`.
    Click it to select it and then click the `Settings` tab and `Edit` the Configuration
    Profile.


    2.  In the Configuration Profile editor, scroll down to the `iOS` section and
    choose the `Exchange` payload. Click the `Configure` button to specify the settings.


    3.  Enter the Exchange server information into the various fields as required
    by the Exchange payload as shown in Figure [11-32](#492151_1_En_11_Chapter.xhtml#Fig32).
    For the username, we will use `%short_name%` instead of `dpresident`. What that
    will do is allow us to apply this payload to other users in our organization,
    and at the time that the Configuration Profile is applied, the `%short_name%`
    variable will resolve to the current user’s username, in this case `dpresident`.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig32_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig32_HTML.jpg)


    Figure 11-32: Setting the Exchange settings by using a payload variable


    4.  Scroll down to the `Enabled Services` section of the payload and ensure all
    of these are checked as shown in Figure [11-33](#492151_1_En_11_Chapter.xhtml#Fig33).
    This will enable the entire `iOS` to access data from Microsoft Exchange, including
    the Phone app’s Address Book.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig33_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig33_HTML.jpg)


    Figure 11-33: Configure which services are enabled


    5.  Click the `OK` button to save the configuration payload and then click `Save`
    to apply. It will prompt the user for their password when the Profile applies,
    and then Exchange will be completely configured.


    Pro Tip: Note that if your company is using some of the MDM features included
    in ActiveSync, those will also apply to the device. For example, things like minimum
    passcode requirements will apply to the device, and whichever payload has the
    greater restriction will take precedence over the others. For example, if you
    require a minimum passcode length of four characters in Profile Manager but ActiveSync
    is set to require a minimum of six characters, the device will prompt the user
    to set a new six-digit passcode before Exchange data will begin to sync to the
    device.


    Whether you are using BYOD or you are managing company-owned devices in Profile
    Manager, you can see how using a Configuration Profile to apply specific settings
    like Microsoft Exchange would be preferable to manually configuring every individual
    device.'
