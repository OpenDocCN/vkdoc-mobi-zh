    ### 电池健康


    每台 iOS 设备中的锂离子电池并非永久使用。随着反复使用，电池最终将无法保持其最大电量，从而缩短每次充电后设备的续航时间。Apple 在 2017 年遇到了一些麻烦，当时它承认在电池超过其使用寿命后，会限制
    iOS 设备的性能。在随后的用户强烈反对之后，他们新增了一个`Battery`设置，为用户提供关于应用程序如何影响电池、电池健康状况以及电池对设备性能影响（如果有）的信息。图
    4-6 提供了电池设置功能的几张截图。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig6_HTML.jpg](img/492151_1_En_4_Fig6_HTML.jpg)


    图 4-6

    iOS 13 的电池和电池健康设置


    通过进入`Settings`应用 > `Battery`来访问`Battery`设置。你可以通过进入`Settings`应用 > `Battery` > `Battery
    Health`来查看电池健康信息。


    `Low Power Mode`通过禁用某些后台功能来减少电池消耗，从而让你的`iPhone`在一次充电后使用更长时间。建议在需要手机但电池电量非常低的情况下临时启用此设置。请注意，它可能会影响某些应用或服务的性能或功能。


    检查电池健康状况有助于确定是否需要在问题出现之前进行更换。`Maximum Capacity`和`Performance Ratings`将帮助你判断电池是否状态良好。设备也会在需要时提供警告和更换电池的建议。在
    iOS 设备中更换电池的起价为 79 美元，可以在`Apple Authorized Repair`服务点和`Apple Retail Store`零售店进行。


    ## iOS 支持


    与基本的硬件故障排除步骤类似，iOS 设备的软件支持选项也很有限。如果你能访问主屏幕和`Settings`应用，可以使用各种内置的`iOS Reset`功能。如果无法访问这些，那么对软件相关问题进行故障排除或尝试恢复设备的唯一其他方法就是通过`iOS
    Recovery mode`。

    '
- fmt: '### iOS 重置


    如图 [4-7](#492151_1_En_4_Chapter.xhtml#Fig7) 所示，在对 iOS 设备进行软件相关故障排除时，有六种不同的选项。具体原因如下，有特定的理由使用每种重置模式。其中许多模式可能会对用户体验和/或数据产生影响，因此在尝试这些操作时请谨慎，并尽可能做好备份。所有这些选项都可以在**设置**应用中的`通用`
    > `重置`下找到。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig7_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig7_HTML.jpg)


    图 4-7

    iOS 13 重置选项


    *   **重置所有设置**：此选项会将所有操作系统设置（包括网络设置和个人设置）重置为默认值。它不会触及你的应用程序或个人数据。

    *   **抹掉所有内容和设置**：此选项会将整个设备重置为`iOS`的默认安装状态。它会擦除内部闪存并重新安装操作系统，所有用户数据和设置都将被删除。

    *   **重置网络设置**：此选项与`重置所有设置`类似，它会将网络设置重置为默认值，但不会影响其他内容。

    *   **重置键盘词典**：此选项会重置任何已添加到词典的特殊快捷方式或已学习的单词。

    *   **重置主屏幕布局**：此选项不会删除任何数据，但会移除对程序坞的任何自定义设置并删除所有文件夹。

    *   **重置位置与隐私**：当你使用各种应用程序时，它们会提示你允许诸如位置服务或访问相机等项目。选择此选项会移除你为设备上所有应用程序所做的所有隐私允许，强制它们在下一次使用时再次提示。


    ### iOS 恢复模式


    iOS 设备上的**恢复模式**类似于`macOS 恢复模式`（本地恢复），它是一个有限的预引导环境，需要在操作系统开始完全加载之前通过按钮组合来调用。这个有限的环境有时被称为`iBoot`，这是一个引导加载程序，允许设备连接到计算机，以便用户可以擦除和恢复。


    你可能需要使用 iOS 恢复模式有几个原因。一个非常常见的例子是当你需要将操作系统恢复到出厂设置，而设备被密码锁定并且你不知道密码时。另一个非常常见的情况是，如果操作系统在启动过程中遇到问题，卡在白色的
    Apple 标志处。恢复模式对于将新的 iOS 设备升级到最新版本也很有用，而无需在设备上进行交互式升级，从而在部署给最终用户时使其停留在`设置助手`界面。


    当你将 iOS 设备置于恢复模式时，你真正能做的唯一事情就是将其连接到运行`iTunes`的计算机，并按照屏幕提示恢复或升级操作系统软件，如图 [4-8](#492151_1_En_4_Chapter.xhtml#Fig8)
    所示。在此模式下，当你恢复操作系统时，它将完全擦除设备上的数据。请确保手头有一个最近的备份，以便你可以在恢复成功后重新安装所有应用程序和用户数据。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig8_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig8_HTML.jpg)


    图 4-8

    使用 iTunes 或 Finder（macOS Catalina）进行 iOS 恢复


    专业提示

    `Windows 版 iTunes` 和 `Catalina` 之前的 `macOS` 版本的 `iTunes` 可用于下载与给定设备兼容的最新操作系统版本并恢复该版本的
    `iOS`。从 `macOS Catalina` 开始，苹果已经取消了 `iTunes`，现在当你通过 USB 将 iOS 设备连接到 Mac 时，会在 `Finder`
    中看到该设备。所有来自 `iTunes` 的相同设备管理功能现在都可以直接在 `Finder` 中找到。


    与强制重启模式类似，将 iPhone 或 iPad 置于恢复模式所需的按钮组合随时间和型号而变化。以下是按设备系列的说明供参考：


    *   **iPhone 8 系列、iPhone X 系列、iPhone 11 系列**：将 USB Lightning 数据线连接到电脑和 iPhone。按下并松开`音量增大`按钮，然后按下并松开`音量减小`按钮，接着按住`侧边`按钮，直到看到恢复模式屏幕。

    *   **iPhone 7 系列**：关闭设备电源。按住`音量减小`按钮，并用 Lightning 数据线将 iPhone 连接到电脑。继续按住按钮，直到看到恢复模式屏幕。

    *   **iPhone 6 或 iPhone SE**：关闭设备电源。按住`主屏幕`按钮，并用 Lightning 数据线将 iPhone 连接到电脑。继续按住按钮，直到看到恢复模式屏幕。

    *   **没有实体主屏幕按钮的 iPad**：关闭设备电源。按住`睡眠/唤醒`按钮，并使用 USB-C 或 Lightning 数据线将 iPad 连接到电脑，继续按住按钮，直到看到恢复模式屏幕。

    *   **有实体主屏幕按钮的 iPad**：关闭设备电源。按住`主屏幕`按钮，并用 Lightning 数据线将 iPhone 连接到电脑。继续按住按钮，直到看到恢复模式屏幕。'
  raw: '### iOS Reset


    As shown in Figure [4-7](#492151_1_En_4_Chapter.xhtml#Fig7), there are six different
    options when troubleshooting software-related issues with iOS devices. As detailed
    in the following, there are specific reasons to use each of these reset modes.
    Many of them can have some impact on the user’s experience and/or data, so please
    use caution when attempting these and have a backup available if possible. All
    of these options can be found in the **Settings** app under ***General*** ➤ ***Reset**.*


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig7_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    iOS 13 Reset options


    *   **Reset All Settings:** This option resets all of the operating system settings
    including the network settings and personal settings back to default. It does
    not touch your Apps or personal data.


    *   **Erase All Content and Settings:** This option resets the entire device back
    to a default installation of *iOS*. It erases the internal flash memory and reinstalls
    the operating system, and all user data and settings are deleted.


    *   **Reset Network Settings:** This option is similar to *Reset All Settings*
    in that it resets the network settings back to default, but nothing else.


    *   **Reset Keyboard Dictionary:** This option resets any special shortcuts or
    learned words that have been added to the dictionary.


    *   **Reset Home Screen Layout:** This option doesn’t delete any data, but it
    does remove any customizations to the Dock and removes any folders.


    *   **Reset Location & Privacy** **:** As you use various Apps, they will prompt
    you to allow things like Location Services or access to the camera. By choosing
    this option, you remove all of the privacy allowances you have made for all Apps
    on the device, forcing them to prompt again the next time they are used.


    ### iOS Recovery Mode


    **Recovery mode** on an *iOS* device is similar to *macOS Recovery mode* (Local
    Recovery) in that it is a limited pre-boot environment that requires a button
    combination to invoke before the operating system starts to fully load. This limited
    environment is sometimes called **iBoot**, a boot-loader that allows the device
    to connect to a computer so that the user can erase and restore.


    There are a few reasons why you may need to use iOS Recovery mode. A very common
    example is when you need to restore the OS to factory settings and the device
    is passcode locked and you don’t have the passcode. Another very common case is
    if the OS is experiencing an issue booting and it’s stuck at the white Apple logo
    during startup. Recovery mode is also useful to upgrade a new iOS device to the
    latest version without having to do so interactively on the unit, thus leaving
    it at the *Setup Assistant* screen when it is being deployed to an end user.


    When you place an iOS device into recovery mode, the only thing you can really
    do with it is connect it to a computer running *iTunes* and follow the onscreen
    prompts to restore or upgrade the operating system software as seen in Figure
    [4-8](#492151_1_En_4_Chapter.xhtml#Fig8). In this mode, when you restore the OS,
    it will completely erase the data on the device. Be sure to have a recent backup
    handy so you can reinstall all the Apps and user data after the restore completes
    successfully.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig8_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    Using iOS Recovery with iTunes or Finder (macOS Catalina)


    Pro Tip


    *iTunes for Windows* and *iTunes* for *macOS* versions prior to *Catalina* can
    be used for downloading the latest operating system release that is compatible
    with a given device and restoring that version of *iOS*. Starting with *macOS
    Catalina*, Apple has eliminated *iTunes,* and you now see the iOS device appear
    in the *Finder* when connected to the Mac via USB. All of the same device management
    features from *iTunes* are now found directly in the *Finder*.


    Similar to the forced restart mode, the button combinations required to place
    an iPhone or iPad into recovery mode have changed over time and by model. Here
    are the instructions by device family for reference:


    *   **iPhone 8 Series, iPhone X Series, iPhone 11 Series** **:** Plug the USB
    Lightning cable into the computer and iPhone. Press and release the **Volume Up**
    button, then press and release the **Volume Down** button, and then press and
    hold the **Side** button until you see the recovery mode screen.


    *   **iPhone 7 Series** **:** Power off the device. Press and hold the **Volume
    Down** button and plug your iPhone into a computer with your Lightning cable.
    Keep holding the button until you see the recovery mode screen.


    *   **iPhone 6 or iPhone SE** **:** Power off the device. Press and hold the **Home**
    button and plug your iPhone into a computer with your Lightning cable. Keep holding
    the button until you see the recovery mode screen.


    *   **iPad Without a Physical Home Button** **:** Power off the device. Press
    and hold the **Sleep/Wake** button and plug the iPad into a computer with a USB-C
    or Lightning cable and keep holding the button until you see the recovery mode
    screen.


    *   **iPad with a Physical Home Button** **:** Power off the device. Press and
    hold the **Home** button and plug your iPhone into a computer with your Lightning
    cable. Keep holding the button until you see the recovery mode screen.'
