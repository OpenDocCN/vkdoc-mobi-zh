- fmt: '# Network


    `Network System Preference`是您Mac上与网络相关的信息和配置的一站式商店。如[图 2-19](#492151_1_En_2_Chapter.xhtml#Fig19)所示，除了显示您的IP地址和活动连接外，您还可以通过此窗格开启/关闭Wi-Fi，加入无线网络，或按`+`/`-`按钮编辑可用的网络适配器和服务。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig19_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig19_HTML.jpg)


    图 2-19 Network System Preference主窗格


    按下`+`按钮将提示您添加多种新的适配器选项，包括内置VPN。[图 2-20](#492151_1_En_2_Chapter.xhtml#Fig20)显示了您可以添加的各种网络适配器，[图
    2-21](#492151_1_En_2_Chapter.xhtml#Fig21)显示了您可以选择的具体VPN协议，包括`Cisco IPSec`。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig21_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig21_HTML.jpg)


    图 2-21 内置VPN协议


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig20_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig20_HTML.jpg)


    图 2-20 额外的网络接口选项


    点击`Advanced…`按钮将允许您修改特定的网络适配器设置。高级对话框中有多个标签页，第一个是`Wi-Fi`。如[图 2-22](#492151_1_En_2_Chapter.xhtml#Fig22)所示，这里您将看到Mac连接过的所有无线网络，并可以按偏好顺序排列它们。点击`+`/`-`按钮将允许您忘记一个无线网络（`-`）或手动添加（`+`）一个无线网络。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig22_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig22_HTML.jpg)


    图 2-22 Wi-Fi设置标签页


    ### 专业提示


    这是一个用于排查具有嵌入式用户凭证和证书的`WPA2 Enterprise`无线网络问题的绝佳工具。您可以删除现有网络以轻松移除缓存的凭证和证书。您也可以手动添加一个网络并指定所需的无线安全设置。


    下一个标签页是`TCP/IP`，如[图 2-23](#492151_1_En_2_Chapter.xhtml#Fig23)所示，这是您配置IP地址设置的地方。在此窗格中，您可以指定动态或静态寻址，以及查看当前的IP地址、子网掩码和网关（标记为Router）。`Renew
    DHCP Lease`按钮可与动态寻址一起使用，以刷新现有的DHCP提供的IP地址或获取一个新的IP地址。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig23_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig23_HTML.jpg)


    图 2-23 TCP/IP设置标签页


    ### Windows 管理员专业提示


    Windows系统管理员可以把这个标签页看作是一个轻松获取`ipconfig`信息以及图形化地在Mac上执行`ipconfig /release`或`ipconfig
    /renew`任务的地方。它的功能也与Windows上的TCP/IP v4或TCP/IP v6`Properties`对话框相同。


    最后，如[图 2-24](#492151_1_En_2_Chapter.xhtml#Fig24)所示的`DNS`标签页，提供了网络的DNS服务器和搜索域。如果您的DHCP服务器选项设置为向客户端分发DNS信息，这些信息将在此处提供。您也可以点击`+`/`-`按钮，根据需要手动在Mac客户端上添加额外的DNS服务器或搜索域，以便进行网络配置或故障排除。


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig24_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig24_HTML.jpg)


    图 2-24 DNS设置标签页


    ### 专业提示


    `macOS`还通过`Terminal`应用程序提供了一套全面的网络配置和故障排除命令。`ifconfig`命令可用于执行包括刷新DNS解析器缓存、禁用网络接口、添加网络接口和操作TCP/IP设置在内的多种操作。如果您计划对任何网络配置更改进行脚本化，一定要花些时间阅读`ifconfig`的手册页，并尝试如[图
    2-25](#492151_1_En_2_Chapter.xhtml#Fig25)所示的一些命令。


