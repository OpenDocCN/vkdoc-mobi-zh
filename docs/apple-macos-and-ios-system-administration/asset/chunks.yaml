    # 管理 DEP 客户端


    现在我们已经配置好了 MDM 服务器，接下来需要将 DEP 数据库中的一些客户端添加到我们的特定服务器。由于我的组织中可以有多个 MDM 服务器，因此我需要手动将设备移入我想要使用的服务器。如果您只有一个
    MDM 服务器，并且希望用该服务器管理所有设备，您可以将所有设备移入该服务器，并将其设置为`默认设备分配`，这样任何新购买的设备都会自动分配给这个 MDM
    服务器。


    为此，只需在 Apple 校园教务管理/Apple 商务管理中浏览至`设置 ➤ 设备管理设置 ➤ 默认设备分配`，点击`编辑`按钮，为每个设备组选择特定的
    MDM 服务器，然后点击`应用`保存更改，如图 8-13 所示。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig13_HTML.jpg](img/492151_1_En_8_Fig13_HTML.jpg)


    图 8-13

    按产品配置默认设备分配


    接下来，让我们将一台测试 iPad 和一台测试 MacBook Pro 分配给我们新创建的 MDM 服务器。首先，在 Apple 校园教务管理的`设备`标题下点击`设备分配`链接。您应该会看到类似图
    8-14 的内容。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig14_HTML.jpg](img/492151_1_En_8_Fig14_HTML.jpg)


    图 8-14

    Apple 校园教务管理中的“管理设备”页面


    在此屏幕上，您可以通过搜索设备或输入其序列号来逐个选择设备，也可以上传一个 `*.csv` 文件进行批量分配。由于我们只需要分配两台设备，我们将点击屏幕左上角的`搜索设备`链接，然后通过序列号手动搜索我们的设备。我输入了一台拥有的`iPad
    Air`的序列号，它在 DEP 数据库中找到了该设备，如图 8-15 所示。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig15_HTML.jpg](img/492151_1_En_8_Fig15_HTML.jpg)


    图 8-15

    搜索设备页面允许我将设备分配给我的特定 MDM 服务器


    在此屏幕上，我可以查看订单号（作为购买凭证），并将其分配给特定的 MDM 服务器。在我的案例中，我将从弹出菜单中选择`"我公司的 MDM 服务器"`。我也可以点击`释放设备`按钮来释放此设备。我将把它分配给我的
    MDM 服务器，然后点击`完成`按钮。


    Apple 校园教务管理将更新设备分配，我可以再次点击`完成`按钮退出。为了确认我的设备已被分配，我可以浏览至`设置 ➤ 我公司的 MDM 服务器`，并确保在`设备`部分下列出了`1
    台 iPad`，如图 8-16 所示。为其他 iOS 设备和至少一台测试 Mac 重复此过程。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig16_HTML.jpg](img/492151_1_En_8_Fig16_HTML.jpg)


    图 8-16

    确认我们的测试设备已分配到新的 MDM 服务器


    现在，我们至少有一台 Mac 和一台 iOS 设备连接到了我们的 MDM，我们已经准备好在描述文件管理器中开始管理这些设备。我们将在第 9 章详细探讨描述文件管理器。


    # 托管式 Apple ID


    在本书的不同章节中，我已经多次提及`托管式 Apple ID`。`托管式 Apple ID` 是通过 Apple 校园教务管理和 Apple 商务管理创建并绑定到您的组织的
    Apple ID。这允许您的组织为每个学生或员工提供一个非商业用途的`Apple ID`，可用于`iTunes U` 或 `iCloud` 等。它们不能用于在各个
    App Store 购买 App 或图书，但您可以使用 MDM 将 App 和图书分配给`托管式 Apple ID`，并且无需 Apple 介入即可为这些
    ID 执行密码重置。


    托管式 Apple ID 的典型格式是 `username@appleid.company.com` 或 `username@appleid.institution.edu`。您可以在组织中为每个用户手动创建这些
    ID，也可以通过 `Active Directory` 连接器自动配置它们。Apple 支持使用 `Microsoft Azure Active Directory`
    进行联合身份验证。您可以使用安全断言标记语言 (SAML) 将您的 `Azure AD` 连接到 Apple 校园教务管理或 Apple 商务管理，而不是为组织中的每个用户创建`托管式
    Apple ID`。用户首次使用其 AD 凭据登录时，系统会为其创建一个`托管式 Apple ID`。


    您可以在 `Apple 校园教务管理` 或 `Apple 商务管理` 中，通过浏览至`设置 ➤ 帐户`并调整设置来配置这些选项，如图 8-17 所示。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig17_HTML.jpg](img/492151_1_En_8_Fig17_HTML.jpg)


    图 8-17

    托管式 Apple ID 和 Azure AD 的帐户设置


    # 使用 VPP 兑换 App 和图书


    最后，为了配合描述文件管理器使用，我们需要配置的最后一项是批量购买计划 (VPP)，这样我们就可以兑换 App 和图书并将其分配给我们的设备。这个过程类似于我们之前创建
    MDM 连接到描述文件管理器的过程。


    ## 为描述文件管理器配置 VPP


    1.  第一步是登录我们的 Mac 服务器，打开`服务器`应用，点击描述文件管理器服务。在`部署计划`部分，找到`App 和图书批量购买`，点击`配置…`按钮，如图
    8-18 所示。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig18_HTML.jpg](img/492151_1_En_8_Fig18_HTML.jpg)


    图 8-18

    点击 VPP 部分下的配置…按钮


    2.  系统将提示您选择一个 VPP 令牌。打开 `Apple 校园教务管理` 或 `Apple 商务管理`，浏览至`设置 ➤ App 和图书`。向下滚动到`我的服务器令牌`标题下的底部区域，点击您组织位置名称旁边的`下载`按钮，如图
    8-19 所示，将文件保存到您的桌面。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig19_HTML.jpg](img/492151_1_En_8_Fig19_HTML.jpg)


    图 8-19

    点击“App 和图书”窗格上的下载按钮


    3.  一旦它将 `*.vpptoken` 文件下载到您的计算机，点击批量购买配置助手里的`选择…`按钮，然后选择 VPP 令牌文件，如图 8-20 所示，然后点击`继续`。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig20_HTML.jpg](img/492151_1_En_8_Fig20_HTML.jpg)


    图 8-20

    将 VPP 令牌文件上传到描述文件管理器


    4.  完成后，`App 和图书批量购买`将启用，我们可以使用 MDM 通过描述文件管理器向用户和设备部署 App 和图书。点击`完成`退出。


    # 总结


    在本章中，您深入了解了关于移动设备管理 (MDM)、批量购买计划 (VPP) 以及 Apple 校园教务管理/Apple 商务管理的概念基础。现在我们已经配置了与描述文件管理器服务器的连接，并添加了几个测试设备，我们已准备好开始对这些测试端点进行无线管理。


    在第 9 章中，我们将运用所学的概念，使用描述文件管理器作为我们的 MDM，远程配置我们的 `iOS` 和 `macOS` 设备。

