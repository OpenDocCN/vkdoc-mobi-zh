- fmt: '# Welcome to Apple Configurator


    The first thing you need to know about `Apple Configurator` is that it is **not**
    a Mobile Device Management (`MDM`) solution. It is a **configuration** tool for
    iOS devices, and it was originally developed as a way for system administrators
    to configure identical `iPads` and `iPhones` in mass quantities. In 2012, I was
    directly involved in a large 1:1 `iPad` deployment for a chain of colleges across
    the continental United States. Over a few years’ time, we had deployed over 30,000
    `iPads` to students, staff, and faculty, and every single one of the devices had
    to function identically. We used `Apple Configurator` to achieve this level of
    standardization, and it worked very well.


    The second thing to know about `Apple Configurator` is that it only runs on `macOS`.
    Therefore, the prerequisite for this section is that you have a Mac to install
    `Apple Configurator` on. The latest release supports iOS 13 and devices that were
    released alongside it, namely, the `iPhone 11` series. If you are going to run
    the latest version of `Configurator`, your Mac must be running at minimum `macOS
    Mojave` 10.14.6. As shown in Figure [5-1](#492151_1_En_5_Chapter.xhtml#Fig1),
    you can download `Apple Configurator 2` from the `Mac App Store` for free.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig1_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig1_HTML.jpg)

    Figure 5-1

    `Apple Configurator 2` is listed in the Mac App Store


    Third, to prepare a device in `Apple Configurator`, you need to connect it to
    the Mac using a USB cable. If you have a massive number of devices to configure,
    like I did with our 30,000-unit deployment, you should probably plan to buy some
    powered USB 2.0 hubs, iPad Carts that feature integrated USB hubs, or—if you are
    using the new `Mac Pro`—some PCI cards with eight or more USB ports per card.
    This will dramatically reduce the time it will take for the devices to prepare
    as `Configurator` will work on multiple connected devices simultaneously.


    At this point, you should have a Mac running `Mojave` or later, at least one USB
    to Lightning cable, at least one iOS device that you can use to practice on, and
    `Apple Configurator 2` installed in `/Applications`. Let’s get started by plugging
    in that iOS device and launching `Apple Configurator`.


    ## Apple Configurator User Interface


    When you launch `Apple Configurator`, your screen should look similar to Figure
    [5-2](#492151_1_En_5_Chapter.xhtml#Fig2). If you just have a giant image of the
    connected iOS device, click the `View` pop-up menu on the toolbar and select `List`.
    Now you’ll have your iOS devices listed in rows with the various column headers
    like I do.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig2_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig2_HTML.jpg)

    Figure 5-2

    The primary `Apple Configurator` window and toolbar


    There are a few key components of the toolbar as shown in Figure [5-2](#492151_1_En_5_Chapter.xhtml#Fig2).
    Here’s an explanation of a few of the major ones:

    * `Add` Button: Use this button to install Apps, documents, media, or Configuration
    Profiles to the selected iOS device(s).

    * `Blueprints` Button: Use this button to create or edit templates, called `Blueprints`,
    that we will use to build specific iOS devices for various groups of users.

    * `Prepare` Button: This is the first button to press whenever we connect a new
    iOS device. This starts the `Prepare Devices Assistant` and steps through the
    activation and provisioning process.

    * `Update` Button: This button will download and install the latest version of
    iOS for a given device.

    * `Backup` Button: This button creates a backup of the selected device. This is
    essentially the same function that we covered in Chapter [4](#492151_1_En_4_Chapter.xhtml)
    using `iTunes` or `Finder` (`macOS Catalina`). The backups created in `iTunes`
    are compatible with the backups created with `Configurator`.

    * `Tag` Button: This button allows you to tag specific groups of devices to easily
    identify them by color for specific purposes.

    * `Device List`: This is the list of devices in `Apple Configurator` and their
    status. You can sort them in terms of `All Devices`, `Supervised`, `Unsupervised`,
    and when they are in `recovery` mode. You can also see some basic information
    in your list of devices. `Double-clicking` a device will provide more information
    including the `serial number`, `IMEI` number, `battery status`, `installed apps`,
    and more.


    > Pro Tip

    > You may be tempted to configure a set of devices exactly the same way through
    the integrated `Backup` and `Restore process` by configuring an iOS device exactly
    how you want it and then using the `Backup` button to prepare it for restore to
    other devices. There are a number of drawbacks to this method, including the fact
    that despite your best efforts, you can leave user-specific data on the device
    being used as the backup source. This also doesn’t scale particularly well over
    time because if you need to make a single change, you have to create a whole new
    source backup. For these reasons and more, in this book, we are going to use `Blueprints`
    instead of `Backup` and `Restore` workflows.'
