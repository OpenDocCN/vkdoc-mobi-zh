- fmt: '### Hardware Compatibility


    It is very important to understand which of Apple’s hardware can support these
    operating systems. Many system administrators will want to standardize on a common
    OS version across their entire Mac fleet. Please note that while this is a worthy
    goal, depending on the mix of hardware you are supporting, you may need to manage
    across a couple of different versions of `macOS`. To make things a little more
    difficult, as Apple releases new hardware, they do not typically allow older versions
    of `macOS` to run on the newest Macs. For example, a brand-new 2019 `Mac Pro`
    will not run `macOS High Sierra`. In this case, you would need to also support
    `Catalina`, even if every other Mac in your organization is still on `High Sierra`.


    Apple makes available a Knowledge Base (KB) article that you can use to check
    `macOS` compatibility against their various hardware models ([`https://support.apple.com/en-us/HT201686`](https://support.apple.com/en-us/HT201686)).


    Apple will reference the various Macintosh hardware models by their official name,
    year of manufacture, and/or model identifier. Since they routinely name their
    products as simply `Mac Pro` or `iMac`, it can often be difficult to identify
    an exact model based on the name or looks alone. This is where `About This Mac`
    and `System Report` can be helpful, as shown in Figures [1-2](#492151_1_En_1_Chapter.xhtml#Fig2)
    and [1-3](#492151_1_En_1_Chapter.xhtml#Fig3).


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig2_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig2_HTML.jpg)

    *Figure 1-2: Selecting About This Mac from the Apple menu*


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig3_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig3_HTML.jpg)

    *Figure 1-3: The About This Mac dialog box and System Report button*


    You can access `About This Mac` by selecting the option under the `Apple` menu.
    This will display the most basic information about your Mac’s hardware including
    which version of macOS you are running, the official name of the hardware model,
    the amount of RAM, the processor speed, the graphics card, and the serial number.
    If you need more in-depth information, you can click the `System Report` button
    to view more extensive hardware information.


    The `System Report` is featured in Figure [1-4](#492151_1_En_1_Chapter.xhtml#Fig4).
    In older versions of macOS, this is called the `System Profiler`, and it can be
    extremely handy when diagnosing peripheral and connectivity issues. `Model Identifier`
    is the most specific way to identify a Mac as it includes the major version number
    and revision number separated by a comma.


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig4_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig4_HTML.jpg)

    *Figure 1-4: System Report details all of the hardware components*


    #### Windows Administrator Pro Tip


    If you are an experienced `Windows` system administrator, then you are familiar
    with `Device Manager`. `System Report` is very similar in that it shows all of
    the connected peripherals, onboard components, network information, and more.


    In some cases, you may be working with a Mac that cannot boot an operating system
    or whose hardware has failed, and you are trying to determine if it is worth repairing
    or not. In both of these cases, it may be difficult to ascertain what specific
    model you are working with. Apple provides a web site where you can look up the
    specific model information if you know the serial number. This site also provides
    you with the warranty and AppleCare coverage status for a given computer, as shown
    in Figures [1-5](#492151_1_En_1_Chapter.xhtml#Fig5) and [1-6](#492151_1_En_1_Chapter.xhtml#Fig6)
    ([`https://checkcoverage.apple.com/us/en/`](https://checkcoverage.apple.com/us/en/)).


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig5_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig5_HTML.jpg)

    *Figure 1-5: Enter your serial number and CAPTCHA code*


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig6_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig6_HTML.jpg)

    *Figure 1-6: Model and warranty information*


    #### Pro Tip


    This site will also work with other Apple hardware including iPhones, iPads, and
    more.'
  raw: '### Hardware Compatibility


    It is very important to understand which of Apple’s hardware can support these
    operating systems. Many system administrators will want to standardize on a common
    OS version across their entire Mac fleet. Please note that while this is a worthy
    goal, depending on the mix of hardware you are supporting, you may need to manage
    across a couple of different versions of *macOS*. To make things a little more
    difficult, as Apple releases new hardware, they do not typically allow older versions
    of *macOS* to run on the newest Macs. For example, a brand-new 2019 *Mac Pro*
    will **not** run *macOS High Sierra*. In this case, you would need to also support
    *Catalina*, even if every other Mac in your organization is still on *High Sierra*.


    Apple makes available a Knowledge Base (KB) article that you can use to check
    *macOS* compatibility against their various hardware models ([`https://support.apple.com/en-us/HT201686`](https://support.apple.com/en-us/HT201686)).


    Apple will reference the various Macintosh hardware models by their official name,
    year of manufacture, and/or model identifier. Since they routinely name their
    products as simply ***Mac Pro*** or ***iMac***, it can often be difficult to identify
    an exact model based on the name or looks alone. This is where **About This Mac**
    and **System Report** can be helpful, as shown in Figures [1-2](#492151_1_En_1_Chapter.xhtml#Fig2)
    and [1-3](#492151_1_En_1_Chapter.xhtml#Fig3).


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig3_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The About This Mac dialog box and System Report button


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig2_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Selecting About This Mac from the Apple menu


    You can access **About This Mac** by selecting the option under the **Apple**
    menu. This will display the most basic information about your Mac’s hardware including
    which version of macOS you are running, the official name of the hardware model,
    the amount of RAM, the processor speed, the graphics card, and the serial number.
    If you need more in-depth information, you can click the **System Report** button
    to view more extensive hardware information.


    The **System Report** is featured in Figure [1-4](#492151_1_En_1_Chapter.xhtml#Fig4).
    In older versions of macOS, this is called the *System Profiler,* and it can be
    extremely handy when diagnosing peripheral and connectivity issues. **Model Identifier**
    is the most specific way to identify a Mac as it includes the major version number
    and revision number separated by a comma.


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig4_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    System Report details all of the hardware components


    Windows Administrator Pro Tip


    If you are an experienced *Windows* system administrator, then you are familiar
    with **Device Manager**. *System Report* is very similar in that it shows all
    of the connected peripherals, onboard components, network information, and more.


    In some cases, you may be working with a Mac that cannot boot an operating system
    or whose hardware has failed, and you are trying to determine if it is worth repairing
    or not. In both of these cases, it may be difficult to ascertain what specific
    model you are working with. Apple provides a web site where you can look up the
    specific model information if you know the serial number. This site also provides
    you with the warranty and AppleCare coverage status for a given computer, as shown
    in Figures [1-5](#492151_1_En_1_Chapter.xhtml#Fig5) and [1-6](#492151_1_En_1_Chapter.xhtml#Fig6)
    ([`https://checkcoverage.apple.com/us/en/`](https://checkcoverage.apple.com/us/en/)).


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig6_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig6_HTML.jpg)


    Figure 1-6


    Model and warranty information


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig5_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig5_HTML.jpg)


    Figure 1-5


    Enter your serial number and CAPTCHA code


    Pro Tip


    This site will also work with other Apple hardware including iPhones, iPads, and
    more.'
  trans: '

    ### 硬件兼容性


    了解哪些苹果硬件能支持这些操作系统至关重要。许多系统管理员会希望在其整个 Mac 设备群中标准化使用一个通用的操作系统版本。请注意，虽然这是一个值得追求的目标，但根据您所支持的硬件组合情况，您可能需要管理几个不同版本的
    `macOS`。让事情变得更棘手的是，当苹果发布新硬件时，他们通常不允许在新款 Mac 上运行旧版本的 `macOS`。例如，全新的 2019 款 `Mac
    Pro` 将无法运行 `macOS High Sierra`。在这种情况下，即使您组织中的其他所有 Mac 仍在运行 `High Sierra`，您也需要同时支持
    `Catalina`。


    苹果公司提供了一份知识库文章，您可以用它来对照其各种硬件型号检查 `macOS` 的兼容性 ([`https://support.apple.com/en-us/HT201686`](https://support.apple.com/en-us/HT201686))。


    苹果公司会通过官方名称、制造年份和/或型号标识符来引用各种 Macintosh 硬件型号。由于他们通常将产品简单地命名为 `Mac Pro` 或 `iMac`，仅凭名称或外观往往很难识别确切型号。这时
    `关于本机` 和 `系统报告` 就能派上用场，如图 1-2 和图 1-3 所示。


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig2_HTML.jpg](img/492151_1_En_1_Fig2_HTML.jpg)

    *图 1-2: 从苹果菜单中选择“关于本机”*


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig3_HTML.jpg](img/492151_1_En_1_Fig3_HTML.jpg)

    *图 1-3: “关于本机”对话框和“系统报告”按钮*


    您可以通过选择 `Apple` 菜单下的选项来访问 `关于本机`。这将显示有关您的 Mac 硬件的最基本信息，包括您正在运行的 macOS 版本、硬件型号的官方名称、内存大小、处理器速度、显卡和序列号。如果您需要更深入的信息，可以点击
    `系统报告` 按钮查看更广泛的硬件信息。


    `系统报告` 如图 1-4 所示。在旧版本的 macOS 中，这被称为 `系统概述`，它在诊断外设和连接问题时非常方便。`型号标识符` 是识别 Mac 最具体的方式，因为它包含由逗号分隔的主版本号和修订号。


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig4_HTML.jpg](img/492151_1_En_1_Fig4_HTML.jpg)

    *图 1-4: 系统报告详细列出了所有硬件组件*


    #### Windows 管理员专业提示


    如果您是一位经验丰富的 `Windows` 系统管理员，那么您一定熟悉 `设备管理器`。`系统报告` 与此非常相似，它显示了所有连接的外设、板载组件、网络信息等。


    在某些情况下，您可能正在处理一台无法启动操作系统或其硬件已出现故障的 Mac，并且您正在尝试判断是否值得维修。在这两种情况下，可能都很难确定您正在处理的具体型号。苹果公司提供了一个网站，如果您知道序列号，可以在该网站查找具体的型号信息。该网站还会为您提供指定计算机的保修和
    AppleCare 覆盖状态，如图 1-5 和图 1-6 所示 ([`https://checkcoverage.apple.com/us/en/`](https://checkcoverage.apple.com/us/en/))。


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig5_HTML.jpg](img/492151_1_En_1_Fig5_HTML.jpg)

    *图 1-5: 输入您的序列号和验证码*


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig6_HTML.jpg](img/492151_1_En_1_Fig6_HTML.jpg)

    *图 1-6: 型号与保修信息*


    #### 专业提示


    此网站也适用于其他苹果硬件，包括 iPhone、iPad 等。

