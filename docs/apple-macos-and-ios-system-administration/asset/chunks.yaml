- fmt: '# 9. Profile Manager


    While it is not mentioned much in Apple’s marketing materials, they do offer their
    own first-party Mobile Device Management (MDM) solution. `Profile Manager` is
    a service that is included with the `macOS Server` product. For small- to medium-sized
    `macOS` and `iOS` deployments, it does the job well enough that your organization
    may not need to purchase their own third-party MDM. Regardless of the choice of
    MDM, the concepts are universal, and we will be using Profile Manager in this
    chapter to explain the basic functions that are found in all commercial MDM solutions.


    ## Introduction to Profile Manager


    This chapter picks up where we left off in Chapters 7 and 8. At this point, you
    should have your `macOS Server` configured with `Profile Manager`. It should be
    available on the public Internet with DEP and VPP configurations in place. Finally
    (and most importantly), your `Profile Manager` service is using a signed certificate
    from a trusted Certificate Authority.


    You should also have at least two test devices assigned to your MDM server in
    Apple School Manager/Apple Business Manager—one Mac and one iOS device. With all
    of this in place, open the web browser of your choice from any computer and browse
    to `https://yourdomain/profilemanager/`. For example, in my case I’m going to
    `https://579testing.com/profilemanager` like we did at the end of Chapter 7. Sign
    in with your server’s admin account to continue.


    > **Pro Tip**

    > In a production environment, you will want to create a Standard user account
    on your server and sign in with that when using Profile Manager on the Web instead
    of the local Administrator account.


    ### The Profile Manager User Interface


    When you first sign into Profile Manager, it can be somewhat overwhelming with
    checkboxes, tabs, and lists all over the place. Figure 9-1 and the accompanying
    bullet points provide a quick overview of what all of these UI widgets do. We
    will be working with most of these options throughout this chapter with some hands-on
    exercises.


    ![Figure 9-1](../images/492151_1_En_9_Chapter/492151_1_En_9_Fig1_HTML.jpg)

    *Figure 9-1 The Profile Manager UI*


    *   **iOS Device Placeholder:** This is a device that runs `iOS` but has not yet
    connected to your MDM and is not currently managed.

    *   **Mac Device Placeholder:** This is a device that runs `macOS` but has not
    yet connected to your MDM and is not currently managed.

    *   **Placeholder Indicator:** This indicator shows that the device record is
    simply a Placeholder. Once we have installed an `Enrollment Profile` on the device
    and it has checked in with the MDM, this message will disappear.

    *   **Add/Remove Placeholder:** Allows you to manually create a Placeholder for
    any device based on serial number, UDID, IMEI, and MEID.

    *   **Search Devices Field:** Allows you to search all of your devices for a specific
    one.

    *   **Device Information:** A quick summary of the selected device including the
    name and serial number.

    *   **Device Configuration and Assignment Tabs:** This is the section where we
    assign specific `Configuration Profile` payloads, Apps, and Books to the selected
    device.

    *   **Current User:** Indicates the current user signed into the `Profile Manager`
    web site. Clicking this button reveals other account options including logoff.

    *   **Save/Revert Changes Buttons:** Allow you to save and apply configuration
    changes or cancel changes you made.

    *   **Action Button:** This button allows you to send a command to a managed device.
    A few of the more common actions include `Clear Activation Lock`, `Fetch Device
    Location`, `Clear Passcode`, `Wipe`, and `Lock`. The actions available to you
    will depend on the device type (`iOS` vs. `macOS`) and if it is supervised or
    not.

    *   **Device List Refresh Button:** `Profile Manager` is always synchronizing
    in the background with VPP and DEP through Apple School Manager or Apple Business
    Manager. Clicking this button forces an immediate sync of data between services.

    *   **Add/Remove Enrollment Profile:** These buttons allow you to create or remove
    custom `Configuration Profiles` that can be applied to a system manually to enroll
    them into your MDM.

    *   **Task Activity:** Provides status on current tasks and provides a history
    of tasks that have been applied to devices.

    *   **Users or Groups:** Manage device settings, profiles, and Apps on a per-user
    or per-group basis.

    *   **Devices or Device Groups:** Manage device settings, profiles, and Apps on
    a per-device or per-device-group basis.

    *   **Apps and Books:** The interface for adding or viewing VPP entitlements that
    you can apply to users, groups, or devices.


    ### Enrollment Settings


    We are going to explore the Users and Groups areas later in this chapter, but
    we do need to make one quick setting change before we can begin enrolling devices
    into our MDM. Click the `Groups` button in the sidebar on the left side of the
    Profile Manager window. Click the `Everyone` group and expand the `Restrictions`
    option under the `About` tab to reveal the settings shown in Figure 9-2. Make
    sure the boxes that are checked in this example match what you have, specifically
    the `Allow enrollment during Setup Assistant for devices configured using Device
    Enrollment Program` option. We will need this to be in place for the DEP enrollment
    exercises to work. Click the `Save` button to apply the changes if you made any.


    ![Figure 9-2](../images/492151_1_En_9_Chapter/492151_1_En_9_Fig2_HTML.jpg)

    *Figure 9-2 Enrollment settings for the Everyone group*


    > **Pro Tip**

    > I would also recommend checking the box next to `Restrict enrollment to placeholder
    devices` so that only devices that you have created Placeholders for are actually
    able to enroll. This will help with device organization and also keep rogue devices
    from appearing in your `Devices` list. Remember that your `Profile Manager` instance
    is available from the public Internet so random people could enroll themselves
    if this is unchecked.


    ## MDM Enrollment


    There are several ways that you can enroll devices into your MDM solution. The
    enrollment process basically consists of applying a `Configuration Profile` to
    a device that directs it to your specific MDM. There are a number of ways to do
    this, and which method you choose will determine the settings, options, and level
    of security available to you when managing that device. In this section, we will
    explore the four most common ways to do this and review the positives and negatives
    in each.'
