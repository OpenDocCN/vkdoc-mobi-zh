  trans: '

    ### 3. 管理员密码


    `-p` 参数代表域管理员账户的密码。


    ### 4. 域


    `-domain` 参数代表我们要将 Mac 加入的域。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig17_HTML.jpg](img/492151_1_En_11_Fig17_HTML.jpg)

    *图 11-17：使用脚本将计算机名称复制到主机名*


    1.  我们将使用 `Terminal` 应用程序在测试 Mac 上交互式地开发此脚本，但一旦您完善了它，就可以在 Apple Remote Desktop
    中创建一个模板并将其应用于整个 Mac 机群。在 `101-2013MPRO` 上打开 `终端` 以开始操作。


    2.  我们将编写一个简短的小脚本，用于捕获 Mac 的计算机名称并将其保存为变量，然后使用 `scutil --set` 命令相应地设置主机名。因此，在终端命令行提示符处输入：


    ```

    HOSTNAME=$(networksetup -getcomputername)

    scutil --set HostName $HOSTNAME

    ```


    按下 **Enter** 键，然后在提示 `HostName [计算机名称]` 输出时再次按下 **Enter** 键，接着在提示时输入本地管理员密码。一旦完成更改并再次回到命令行提示符，输入
    `scutil --get HostName`，现在它应该与其他设置匹配为 `101-2013MPRO`。如果您在 Apple Remote Desktop
    中使用此脚本，它将始终将 Mac 客户端的主机名更改为与计算机名称匹配。此时，您的终端窗口应类似于图 11-17。


    **专业提示：** 您还可以在此处定义一个额外选项，即您希望将 Mac 客户端分配到的 OU。但是，由于我们已经在我们想要的位置创建了计算机记录，所以可以跳过此参数。如果您想手动定义放置此
    Mac 的 OU，可以使用 `-ou` 参数，后跟 `"OU=, DC=, DC="` 格式的路径，例如 `"OU=macOS PCs, OU=Main Office
    Computers, DC=MyCompany, DC=local"`。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig18_HTML.jpg](img/492151_1_En_11_Fig18_HTML.jpg)

    *图 11-18：重命名计算机并将其加入域的完整脚本*


    1.  让我们开始输入带有客户端 ID 参数的 `dsconfigad` 命令。因为我们将在多台计算机上使用相同的脚本，所以我们将使用一个令牌，而不是为此计算机指定确切的名称。我们可以使用
    `"hostname -s"` 令牌，以便在脚本中自动应用此 Mac 的主机名作为客户端 ID。这将模仿我们通过*用户与群组系统偏好设置*将 Mac 加入域时的
    GUI 行为。


    2.  接下来，我们将为 `MyCompany.local` 域指定域管理员账户的用户名和密码。最后，我们将添加指定域名的参数。包含所有参数的完整脚本应类似于图
    11-18。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig19_HTML.jpg](img/492151_1_En_11_Fig19_HTML.jpg)

    *图 11-19：脚本运行后，我们可以在"用户与群组系统偏好设置"中确认 Mac 已在域中*


    1.  它将提示您输入本地管理员账户的密码。一两分钟后，它将成功完成。打开*用户与群组系统偏好设置*，单击 **登录选项** 按钮，确认现在列出了 Windows
    域，并且**网络账户服务器**旁边有一个绿色指示器图标，如图 11-19 所示。


    ```

    dsconfigad -c "''hostname -s''" -u Administrator -p noAcce$$ -domain MyCompany.local

    ```


    **专业提示：** 您可以将其他命令与 `dsconfigad` 结合使用来设置其他设置，例如 `-mobile enable` 以支持移动账户选项，以及
    `-passinterval` 来调整域计算机密码更改的频率，以便长时间脱网的系统不会脱离域。如果您对此有疑问，请咨询您的 Windows 系统管理员，以确定是否需要此选项或其他选项。


    我们已经成功配置了 Active Directory，并使用三种不同的方法将我们的 Mac 加入了域。现在我们的 Mac 已在域上，我们可以访问 Windows
    服务器上的其他资源。

