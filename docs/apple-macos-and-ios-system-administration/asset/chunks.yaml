    ## 为销售团队 iPad 场景配置 Profile Manager


    配置销售团队的 iPad 也相当简单，我们将创建一个设备组并为这个场景应用适当的设置。这里的主要区别在于，由于这些是公司拥有的设备，我们将使用监管和 `DEP`
    将设备分配到特定的设备组，并在 `设置助理` 激活步骤中强制注册。


    让我们开始操作，打开 `Profile Manager` 并再次浏览到 `设备组` 部分。点击 `+` 按钮添加一个新的 `设备组`。这次我们将其命名为 `销售团队
    iPad`。点击 `销售团队 iPad` 设备组以选中它，然后点击 `设置` 选项卡。在 `销售团队 iPad 的设置` 部分下点击 `编辑` 按钮，如图
    12-14 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig14_HTML.jpg](img/492151_1_En_12_Fig14_HTML.jpg)


    图 12-14

    为我们的新设备组分配配置设置


    我们需要做的第一件事是配置所有与 `BYOD` 组相同的 `VPN`、`网络` 和 `密码` 载荷。你可以继续配置这些载荷以匹配。


    ### 专业提示

    如果你的组织规模非常庞大，且每台设备都有类似的无线网络和密码要求，你可能希望创建一个名为“安全标准”或类似名称的设备组。接着，你可以在一种嵌套组场景中，将新设备组添加为安全标准组的成员，这样就不必每次都重复在多个组上配置相同的设置了。


    接下来，我们需要限制 `信息`、`FaceTime` 和 `App Store` 的使用。按如下方式配置 `限制` 载荷：

    *   *取消选中* `允许信息（仅限受监管设备）`。

    *   *取消选中* `允许 FaceTime（仅限受监管设备）`。

    *   *取消选中* `允许删除 App（仅限受监管设备）`。

    *   *取消选中* `允许删除系统 App（仅限受监管设备）`。

    *   *取消选中* `允许 App 内购买`。

    *   *取消选中* `允许使用 App Store 安装 App（仅限受监管设备）`。


    你的限制设置应类似于图 12-15。点击 `好` 按钮保存 `销售团队 iPad` 组的配置设置，然后点击 `存储` 按钮应用。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig15_HTML.jpg](img/492151_1_En_12_Fig15_HTML.jpg)


    图 12-15

    配置限制载荷


    现在我们已经配置了限制和配置设置，接下来需要配置注册和 `设置助理` 选项。在 `设置` 选项卡中，向下滚动到 `设置助理期间的注册部分`，并更改设置以匹配图
    12-16 中的内容。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig16_HTML.jpg](img/492151_1_En_12_Fig16_HTML.jpg)


    图 12-16

    启用设置助理期间注册的设置


    再向下滚动一点，更改 `设置助理选项` 以隐藏若干设置。这将简化最终用户完成设备设置的步骤，并有望节省时间和减少联系 `IT 服务台` 的次数。更改你的设置以匹配图
    12-17 中的内容。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig17_HTML.jpg](img/492151_1_En_12_Fig17_HTML.jpg)


    图 12-17

    取消选中不需要的设置助理提示


    点击 `存储` 按钮将这些设置应用到 `销售团队 iPad` 设备组。


    ### 专业提示

    可选地，你也可以在此配置 `激活锁` 设置并强制实施设备命名标准。我通常会启用 `激活锁` 并设置设备名称。


    目前，我们在 `Profile Manager` 中的工作已完成。接下来，我们需要兑换一些 App，并在 Apple 教务管理/商务管理中将这些新 iPad
    分配到我们的 `MDM`。理论上，你应该有办法通过序列号来识别你的新 iPad。检查装箱单或发票，找到我们将使用 `DEP` 分配的十台新 iPad 的序列号，然后前往
    Apple 管理门户。根据你的情况，这将是 `http://school.apple.com` 或 `http://business.apple.com`。


    在那里登录，然后进入 `设备分配` 区域。我们将在这里输入要分配给销售团队的十台 iPad 的序列号。将每台设备输入 `序列号` 字段后，使用 `执行操作`
    下拉菜单将其分配到我们的 `MDM`，然后点击 `完成` 以应用，如图 12-18 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig18_HTML.jpg](img/492151_1_En_12_Fig18_HTML.jpg)


    图 12-18

    列出我们全部十台 iPad 的序列号（用逗号分隔）并将它们分配到我们的 MDM 服务器


    ### 专业提示

    正如你可能已经推断出的那样，你可以应用单个订单号下的所有设备，或者上传一个 `*.csv` 文件，而不是逐个输入每个序列号。由于十台设备差不多是我愿意手动操作的数量上限，我就直接手动输入了。


    成功分配设备后，前往 `App 和图书` 部分，我们可以兑换 `Zoom` 和 `Salesforce` App。使用与前面章节中处理 `Microsoft
    Office` 套件相同的流程，查找 `Salesforce` 和 `Zoom` 并各兑换十份，如图 12-19 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig19_HTML.jpg](img/492151_1_En_12_Fig19_HTML.jpg)


    图 12-19

    确保你有十份所需的 App 可用于分配


    现在我们已经兑换了 App 并将 iPad 分配给了 `MDM` 服务器，返回 `Profile Manager`。此时你应该能看到新的 App 和新的 iPad
    占位符；但如果没有看到，请点击 `Profile Manager` 窗口中的 `刷新` 按钮，强制与 Apple 服务器同步，App 和占位符现在应该会显示出来，如图
    12-20 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig20_HTML.jpg](img/492151_1_En_12_Fig20_HTML.jpg)


    图 12-20

    感谢 DEP，新的占位符设备现已可用


    现在我们有了占位符设备和 App 许可证，让我们回到 `Profile Manager` 的 `设备组` 区域，点击选择 `销售团队 iPad` 组。点击
    `App` 选项卡，然后点击 `+` 按钮为此组分配一些许可证。添加 `Salesforce` 和 `Zoom`，如图 12-21 所示，并将默认的 `安装模式`
    保留为 `自动`。接着，点击 `好` 按钮保存这些设置，然后点击 `存储` 将这些设置应用到设备组。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig21_HTML.jpg](img/492151_1_En_12_Fig21_HTML.jpg)


    图 12-21

    为我们的设备组分配 App


    最后，我们需要采取的最后一个步骤是将十台新 iPad 分配到 `销售团队 iPad` 设备组。点击 `成员` 选项卡，在 `成员` 窗格中点击 `+` 按钮，将所有十台新
    iPad 添加到此组，如图 12-22 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig22_HTML.jpg](img/492151_1_En_12_Fig22_HTML.jpg)


    图 12-22

    将每个占位符 iPad 添加到设备组

