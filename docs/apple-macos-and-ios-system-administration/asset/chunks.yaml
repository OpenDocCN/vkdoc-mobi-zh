    where staff or student turnover is high. Apple provides an option through Configurator
    to embed an *unlock token* into an iOS device so that it can be unlocked at a
    future date if the passcode that was set by the user is not known. Please note
    that this functionality is only possible for devices that are *supervised*.


    To add an unlock token to the device, **click** the device to select it and then
    use **Actions** menu ➤ **Advanced** ➤ **Save Unlock Token** to apply it as shown
    in Figure [5-41](#492151_1_En_5_Chapter.xhtml#Fig41). The unlock token can only
    be applied to a device that is currently unlocked, so you need to plan ahead if
    you want to use this functionality.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig41_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig41_HTML.jpg)


    Figure 5-41


    Applying an unlock token to the selected device


    To unlock the supervised device, plug the device into Apple Configurator and **click**
    it to select it. Click **Actions** menu ➤ **Advanced** ➤ **Clear Passcode**.


    In addition to clearing the device passcode, you can also clear the *Screen Time*
    passcode on supervised devices. The Screen Time passcode can be set by the user
    and does *not* have to be the same as the device passcode. If you need to clear
    the Screen Time passcode, plug the device into Apple Configurator, select it from
    the list, and click **Actions** menu ➤ **Advanced** ➤ **Clear Screen Time Passcode**.


    Pro Tip


    If you are provisioning a lot of supervised devices that may need to be unlocked
    at some point in the future, you should edit your Blueprint to add the **Save
    Unlock Token** action so that it gets added automatically in the initial setup
    process every time.


    ### Revive Device


    Apple has provided this function for reviving Macs that use the *T2 Security chip*.
    As discussed in Chapters [2](#492151_1_En_2_Chapter.xhtml) and [3](#492151_1_En_3_Chapter.xhtml),
    the T2 chip integrates a number of different logic board components to provide
    for a level of hardware security that isn’t obtainable with software solutions
    alone. When the T2 chip has a problem, the entire system has a problem. Fortunately,
    if your T2 Mac is unresponsive, you may want to try to **revive** it using Apple
    Configurator. Apple provides instructions for doing so in a Knowledge Base article
    you can find here:


    *   [`https://support.apple.com/guide/apple-configurator-2/revive-firmware-in-mac-computers-apdebea5be51/mac`](https://support.apple.com/guide/apple-configurator-2/revive-firmware-in-mac-computers-apdebea5be51/mac)


    You should follow the specific instructions from Apple if you are going to attempt
    this. Each Mac with a T2 chip may have unique steps to follow depending on the
    model.


    ## Summary


    Apple Configurator is an excellent tool for automating the process of iOS device
    configuration. In this chapter, we learned how to create Blueprints that simplify
    and automate the setup of new devices. We also explored techniques that provide
    system administrators with powerful security controls in the form of supervision
    and Configuration Profiles.


    The primary downside to using Apple Configurator is that it still requires IT
    personnel to touch each device and physically plug them into a Mac at least once.
    Later in this book, we will introduce the concept of over-the-air configuration,
    which requires even *less* direct interaction to stage new devices. In the next
    couple of chapters, we are going ***back to the Mac*** to learn how to remote
    manage *macOS* clients and build a server to use for Mobile Device Management.


    # 6. Managing macOS Clients with Apple Remote Desktop


    Apple Remote Desktop (ARD) is a fundamental client management tool that Mac system
    administrators have been using for over 15 years. In this chapter, we are going
    to review the four main components of ARD—asset management, software distribution,
    client administration, and remote support. If you have more than a couple *macOS*
    clients to manage, ARD is a must-have tool.'
  trans: '

    ## 高级 Apple Configurator 工具


    侧载、蓝图和配置描述文件是使用 Apple Configurator 的主要原因；它们是非常强大的工具。但 Configurator 内部还有一些额外的隐藏功能，可能对设备管理员有用。本节将简要概述这些高级工具及其适用场景。


    ### 单应用模式


    在第 4 章的 `辅助功能` 设置中，我们介绍了 `引导式访问` 功能。Apple Configurator 中的 `单应用模式` 与之非常相似，都是将设备锁定为只能使用一个应用。要将设备置于单应用模式，请确保应用已安装并可在
    iOS 设备上使用，并通过 USB 数据线连接到 Apple Configurator。点击 `操作` 菜单 ➤ `高级` ➤ `启动单应用模式`，然后选择您希望用于激活此功能的应用。


    ### iOS 设备控制台


    有时在排查设备、应用程序甚至第三方在线服务的问题时，查看 `设备日志` 会很有帮助。要查看这些日志，我们需要使用 `控制台`。要访问控制台，请将设备连接到
    Apple Configurator，`双击` 该设备，然后在左侧窗格中选择 `控制台`。您应该会看到如图 5-38 所示的实时日志输出。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig38_HTML.jpg](img/492151_1_En_5_Fig38_HTML.jpg)


    **图 5-38**

    我的测试设备控制台的输出。哇，Gmail 的日志真多！


    ### 自动操作与终端命令


    Apple Configurator 的蓝图工具非常强大，可以通过可视化的宏脚本来自动配置设备，但如果您想更进一步，Apple 还提供了对自动操作和可选的
    `cfgutil` 命令的支持。如果您使用 `自动操作`，会发现 Apple Configurator 安装时会附带许多新的 `操作`。


    要安装命令行工具，请从 `Apple Configurator 2` 菜单中选择 `安装自动化工具`，如图 5-39 所示。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig39_HTML.jpg](img/492151_1_En_5_Fig39_HTML.jpg)


    **图 5-39**

    安装可选命令行工具


    有关 `cfgutil` 的更多信息，您可以使用 `man cfgutil` 命令阅读手册。您可以使用 `cfgutil` 编写脚本，以进一步自动化 iOS
    设备的配置。


    ### 设备信息导出


    Apple 提供了两个便捷功能，用于从 Configurator 导出设备数据。如图 5-40 所示，如果您正在进行某种内部企业应用开发，可以导出设备数据，其格式便于上传到
    Apple 开发者门户，从而将这些设备加入白名单以运行这些内部应用。您还可以将所选设备的每项数据导出为 `∗.csv` 文件，用于库存管理。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig40_HTML.jpg](img/492151_1_En_5_Fig40_HTML.jpg)


    **图 5-40**

    所选 iOS 设备的导出数据选项


    ### 清除密码


    密码可能会带来问题，尤其是在员工或学生流动率高的办公室或学校环境中。Apple 通过 Configurator 提供了一个选项，可以将 `解锁令牌` 嵌入
    iOS 设备，以便在将来不知道用户设置的密码时解锁设备。请注意，此功能仅适用于 `受监督的` 设备。


    要向设备添加解锁令牌，请 `点击` 设备以选中它，然后使用 `操作` 菜单 ➤ `高级` ➤ `保存解锁令牌` 来应用它，如图 5-41 所示。解锁令牌只能应用于当前已解锁的设备，因此如果您想使用此功能，需要提前计划。


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig41_HTML.jpg](img/492151_1_En_5_Fig41_HTML.jpg)


    **图 5-41**

    向所选设备应用解锁令牌


    要解锁受监督的设备，请将设备连接到 Apple Configurator 并 `点击` 它进行选择。点击 `操作` 菜单 ➤ `高级` ➤ `清除密码`。


    除了清除设备密码外，您还可以清除受监督设备上的 `屏幕使用时间` 密码。屏幕使用时间密码可以由用户设置，不必与设备密码相同。如果您需要清除屏幕使用时间密码，请将设备连接到
    Apple Configurator，从列表中选择它，然后点击 `操作` 菜单 ➤ `高级` ➤ `清除屏幕使用时间密码`。


    **专业提示**

    如果您正在部署大量可能在将来某个时刻需要解锁的受监督设备，您应该编辑您的蓝图，添加 `保存解锁令牌` 操作，以便在每次初始设置过程中自动添加该令牌。


    ### 恢复设备


    Apple 提供了此功能，用于恢复使用 `T2 安全芯片` 的 Mac。如第 2 和第 3 章所述，T2 芯片集成了许多不同的逻辑板组件，提供了仅靠软件解决方案无法实现的硬件安全级别。当
    T2 芯片出现问题时，整个系统都会出现问题。幸运的是，如果您的 T2 Mac 无响应，您可以尝试使用 Apple Configurator `恢复` 它。Apple
    在一篇知识库文章中提供了相关说明，您可以在此处找到：


    *   [`https://support.apple.com/guide/apple-configurator-2/revive-firmware-in-mac-computers-apdebea5be51/mac`](https://support.apple.com/guide/apple-configurator-2/revive-firmware-in-mac-computers-apdebea5be51/mac)


    如果您打算尝试此操作，应遵循 Apple 的具体说明。每台配备 T2 芯片的 Mac 根据型号不同，可能有独特的操作步骤。


    ## 总结


    Apple Configurator 是自动化 iOS 设备配置过程的绝佳工具。在本章中，我们学习了如何创建蓝图来简化和自动化新设备的设置。我们还探索了以监督和配置描述文件的形式为系统管理员提供强大安全控制的技术。


    使用 Apple Configurator 的主要缺点是，它仍然要求 IT 人员接触每台设备，并至少一次通过物理方式将它们连接到 Mac。在本书的后面部分，我们将介绍空中配置的概念，它需要更少的直接交互来部署新设备。在接下来的几章中，我们将回到
    Mac，学习如何远程管理 `macOS` 客户端以及构建用于移动设备管理的服务器。


    # 使用 Apple 远程桌面管理 macOS 客户端


    Apple 远程桌面 (ARD) 是一个基本的客户端管理工具，Mac 系统管理员已经使用了超过 15 年。在本章中，我们将回顾 ARD 的四个主要组件——资产管理、软件分发、客户端管理和远程支持。如果您需要管理超过几个
    `macOS` 客户端，ARD 是必备工具。

    '
- fmt: '## Introduction to Apple Remote Desktop


    Available on the `Mac App Store`, the current release of Apple Remote Desktop
    is version 3.9 and costs $79.99 as shown in Figure [6-1](#492151_1_En_6_Chapter.xhtml#Fig1).
    While it is substantially more expensive than `Apple Configurator`, as far as
    commercial desktop management suites go, it is pretty affordable. If your organization
    doesn’t already have a management solution for `macOS` clients, you could do a
    lot worse than `ARD`.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig1_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig1_HTML.jpg)


    **Figure 6-1**

    Apple Remote Desktop is available in the Mac App Store


    **Pro Tip**

    There are a number of cross-platform desktop management tools out there like `Symantec
    Altiris` and `Microsoft System Center Configuration Manager (SCCM)` that can support
    `macOS`, `Windows`, or `Linux` clients that many large organizations have made
    substantial investments in. If you have a solution like that available to you
    and it meets your needs, `ARD` may not provide any additional functionality that
    you don’t already possess.


    ### Installing Apple Remote Desktop


    When planning your use of Apple Remote Desktop, you need to determine where to
    install it. There are a couple of schools of thought about this. If you are the
    only Mac technician in your organization, you could just install it on your primary
    Mac desktop or laptop computer. This is going to give you the best experience
    as far as responsiveness for remote control tasks goes. You can store all of your
    scripts and installation files on your main computer, and you can back up your
    entire ARD system along with your main computer’s data.


    The downside to this solution comes when you need to schedule installations for
    a later time or date, particularly when you may not have your computer online
    or available. For example, let’s say you want to schedule a software installation
    on your company’s computers at 3:00 a.m. tonight, but you need to take your laptop
    home with you and it won’t be on the corporate network at that time to push the
    installation files and run the tasks. In this case, you may want to either set
    up a `Remote Task Server` or install `ARD` directly on a dedicated Mac server
    and then use `Screen Sharing` or `ARD` to access that server from your workstation.


    ### Remote Task Server


    In Chapter [7](#492151_1_En_7_Chapter.xhtml), we will cover `macOS Server` in
    greater detail, but what you need to know right now is that unlike `Windows` where
    there are specific server and client versions that are different, any Mac can
    be a server. An `ARD` `Remote Task Server` refers to a computer that queues up
    or executes various tasks like software installations on a specified schedule.
    By default, Apple Remote Desktop makes the `Task Server` the local computer that
    the `ARD` application is installed on.


    As mentioned in the installation section, there are some significant downsides
    to installing Apple Remote Desktop on your main workstation. One of those downsides
    is the need to keep your Mac online when pending task schedules are in progress.
    You can use a `Remote Task Server` as a way to mitigate this problem. By specifying
    a `Remote Task Server`, you can use `ARD` on your workstation, but all pending
    scheduled tasks get queued on the remote server.


    To configure a Remote Task Server, you need to set up a Mac with a `static IP
    address` and install Apple Remote Desktop. Open `ARD` and choose `Preferences…`
    from the `Remote Desktop` menu. Figure [6-2](#492151_1_En_6_Chapter.xhtml#Fig2)
    shows the `Task Server` tab and the option `Use Task Server on this computer,`
    and the checkbox for `Allow remote connections to this server` is checked.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig2_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig2_HTML.jpg)


    **Figure 6-2**

    The Task Server options in ARD’s Preferences


    Next, on your technician workstation(s) with Apple Remote Desktop installed, launch
    `ARD` and choose `Preferences…` from the `Remote Desktop` menu. Click the `Task
    Server` tab as shown in Figure [6-3](#492151_1_En_6_Chapter.xhtml#Fig3) and select
    `Use remote Task Server` and enter the `static IP address` of the server into
    the field and click `Select`. `ARD` will validate that it can communicate with
    the Remote Task Server and, if successful, will set all future tasks to run off
    the remote server.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig3_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig3_HTML.jpg)


    **Figure 6-3**

    Configuring your technician workstation to use a Remote Task Server


    ### Server Installation


    My preferred solution is to install `ARD` on a Mac server with a `static IP address`.
    This allows anyone on my team to access the `ARD` console and share all of the
    installation files or scripts. The installation process is very much like installing
    it on a single workstation, with the exception of making one change to the `ARD
    Preferences`.


    By default, Apple has a security option set that you cannot use Apple Remote Desktop
    to remote control another Mac running Apple Remote Desktop. To disable this feature,
    choose `Preferences…` from the `Remote Desktop` menu and click the `Security`
    tab as shown in Figure [6-4](#492151_1_En_6_Chapter.xhtml#Fig4). Check the box
    next to the `Allow control of this computer when this application is running`
    option.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig4_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig4_HTML.jpg)


    **Figure 6-4**

    Enable remote control of the computer using Apple Remote Desktop when ARD is also
    running on that remote computer


    **Pro Tip**

    When selecting a Mac to function as an Apple Remote Desktop server, I would recommend
    a machine with a good bit of onboard storage—either a `Mac Pro` with a couple
    extra SSD drives or a `Mac mini` configured with dual SSD drives. This will provide
    a good bit of space for the various installation packages that you’ll be pushing
    to your Mac clients.'
