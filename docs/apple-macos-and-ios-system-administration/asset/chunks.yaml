- fmt: '# Application Usage


    我们要查看的最后一份报告是应用使用报告。该报告允许你选择一台或多台 Mac 并输入一个日期范围，如图 [6-27](#492151_1_En_6_Chapter.xhtml#Fig27)
    所示。之后，它会轮询所选计算机上所有已被使用的应用程序，并返回这些应用程序的使用日期、时间以及使用用户。图 [6-28](#492151_1_En_6_Chapter.xhtml#Fig28)
    展示了该报告的一个示例。


    ![Figure 6-28](images/492151_1_En_6_Chapter/492151_1_En_6_Fig28_HTML.jpg)


    **Figure 6-28** 来自测试系统的应用使用报告数据


    ![Figure 6-27](images/492151_1_En_6_Chapter/492151_1_En_6_Fig27_HTML.jpg)


    **Figure 6-27** 应用使用报告配置窗口


    如果你按席位为应用程序付费，并且不确定是否有人在使用这些应用程序或使用的频率，这份报告将非常有帮助。这类报告可以提供有价值的软件计量信息，用于做出明智的购买和许可证续订决策。


    ## 专业提示


    另一个你会发现很有用的功能是为任务设置未来运行的时间表，甚至设置定期重复。如图 [6-27](#492151_1_En_6_Chapter.xhtml#Fig27)
    所示，类似于每个任务窗口中的模板弹出菜单，也有一个`Schedule…`按钮。点击此按钮，你可以设置任务运行的日期/时间，并可以设置为重复执行。这样，如果你正在进行持续的软件使用或合规性监控，可以让报告在夜间或定期运行。


    # Software Distribution


    Apple Remote Desktop 最后，也可能是最有用的一个功能，是作为软件分发的工具。软件分发的目的是为了简化在整个`macOS`客户端群中安装和升级软件的过程。是的，你可以使用
    USB 驱动器或网络共享，然后逐台 Mac 安装软件，但这确实非常耗时且容易出错。Apple Remote Desktop 提供了几个功能，用于通过网络向所有`Macintosh`端点批量安装应用程序。


    ## Application Installers


    macOS 上有三种不同类型的应用程序安装程序。第一种是从`Mac App Store`下载或从`∗.dmg`（磁盘映像）中直接拖放到`/Applications`目录即可安装的*沙盒化*或*自包含应用程序*（App）。`VLC
    Media Player`就是这样的一个应用程序示例，可在 [`www.videolan.org`](http://www.videolan.org) 获取，如图
    [6-29](#492151_1_En_6_Chapter.xhtml#Fig29) 所示。你可以看到，要安装这类应用程序，只需将`VLC`图标拖到`/Applications`文件夹的别名中即可完成安装。


    ![Figure 6-29](images/492151_1_En_6_Chapter/492151_1_En_6_Fig29_HTML.jpg)


    **Figure 6-29** VLC 是自包含应用程序的一个例子


    第二种安装程序是*应用程序安装包*或`∗.pkg`文件。这些非常常见，并使用苹果的 macOS `Installer`辅助应用程序进行部署。当需要在硬盘的各个区域安装支持文件，并且这些文件并非都包含在单个文件夹或
    App 包中时，就会使用这种方式。我发现它们最常用于支持硬件外设（如 USB 绘图板）的应用程序。


    图 [6-30](#492151_1_En_6_Chapter.xhtml#Fig30) 展示了一个可在 [`www.wacom.com`](http://www.wacom.com)
    找到的`Wacom`数位板驱动程序包安装程序。我不再将`Install Wacom Tablet.pkg`文件拖放到`/Applications`文件夹中，而是需要`double-click`该文件并按照`installer`提示进行操作，将应用程序及其支持文件安装到`Macintosh
    HD`卷上的正确位置。


    ![Figure 6-30](images/492151_1_En_6_Chapter/492151_1_En_6_Fig30_HTML.jpg)


    **Figure 6-30** 安装程序包示例


    最后，第三种安装程序类型与`∗.pkg`文件非常相似，工作方式也类似，但使用的是商业界面或其他类型的前端小程序来安装应用程序，而不是苹果的 macOS `Installer`辅助程序。最明显的例子是`Adobe
    Flash Player`安装程序，可在 [`www.adobe.com/downloads`](http://www.adobe.com/downloads)
    获取。从图 [6-31](#492151_1_En_6_Chapter.xhtml#Fig31) 可以看出，如果我使用`Get Info`查看此安装程序的文件类型，它会告诉我这是一个`Application`。安装过程与`∗.pkg`类似，只是它启动的是
    Adobe 创建的自定义安装程序应用程序，引导我完成安装过程。


    ![Figure 6-31](images/492151_1_En_6_Chapter/492151_1_En_6_Fig31_HTML.jpg)


    **Figure 6-31** Install Adobe Flash Player 是一个应用程序，而不是一个包


    ## 专业提示


    有时这些应用程序包中仍然隐藏着`∗.pkg`文件，例如`Install Adobe Flash Player`。检查一下，`right-click` `Install
    Adobe Flash Player`应用程序，然后选择`Show Package Contents`。浏览到`/Contents/Resources/`看看——`Adobe
    Flash Player.pkg`就在那里。这并不意味着你总是可以运行那个`∗.pkg`文件，应用程序就能正确安装，因为商业安装程序除了这个单独的包之外可能还使用了其他依赖项。


    你可能已经猜到，对于这些不同的安装程序类型，我们需要采取略有不同的软件部署策略。


    ## Copy Items


    最直接的方法是使用`Copy Items`选项，它最适合用于像`VLC Media Player`这样的自包含应用程序包。要在一台或多台 Mac 上安装此应用程序，请打开
    Apple Remote Desktop，并从你的计算机列表中选择目标计算机。点击工具栏中的`Copy`按钮，你将看到如图 [6-32](#492151_1_En_6_Chapter.xhtml#Fig32)
    所示的“复制项目”窗口。


    ![Figure 6-32](images/492151_1_En_6_Chapter/492151_1_En_6_Fig32_HTML.jpg)


    **Figure 6-32** “复制项目”配置窗口


    将`VLC`应用程序从磁盘映像中`Drag`并`drop`到`Items to copy`字段中。从`Place items in:`弹出菜单中选择`Applications
    Folder`。如图 [6-33](#492151_1_En_6_Chapter.xhtml#Fig33) 所示完成文件复制设置后，点击`Copy`按钮开始任务。


    ![Figure 6-33](images/492151_1_En_6_Chapter/492151_1_En_6_Fig33_HTML.jpg)


    **Figure 6-33** 将 VLC 复制到目标计算机应用程序文件夹的“复制项目”配置窗口


    文件复制将开始，你会看到如图 [6-34](#492151_1_En_6_Chapter.xhtml#Fig34) 所示的进度条。


    ![Figure 6-34](images/492151_1_En_6_Chapter/492151_1_En_6_Fig34_HTML.jpg)


    **Figure 6-34** 复制应用程序活动任务的进度


    当文件复制成功完成后，转到你的测试机，浏览到`/Applications`，然后`double-click` `VLC`图标来启动应用程序。如果它能像图 [6-35](#492151_1_En_6_Chapter.xhtml#Fig35)
    中那样成功启动，那么你的应用程序安装就成功了。


    ![Figure 6-35](images/492151_1_En_6_Chapter/492151_1_En_6_Fig35_HTML.jpg)


    **Figure 6-35** VLC 应用程序成功安装到目标计算机上'
  raw: '### Application Usage


    The final report we will examine is the *Application Usage Report*. This report
    allows you to select one or more Macs and input a date range as shown in Figure
    [6-27](#492151_1_En_6_Chapter.xhtml#Fig27). It will then go out and poll all of
    the applications that have been used on the selected computer(s) and report back
    the date and time these were used and by which user. An example of this report
    is shown in Figure [6-28](#492151_1_En_6_Chapter.xhtml#Fig28).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig28_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig28_HTML.jpg)


    Figure 6-28


    The resulting Application Usage Report data from my test system


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig27_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig27_HTML.jpg)


    Figure 6-27


    The Application Usage Report configuration window


    This is an excellent report if you are paying per seat for applications and you
    are not sure if anyone is even using these applications or how often they are
    using them. This kind of report can provide valuable software metering information
    that can be used to make informed purchase and license renewal decisions.


    Pro Tip


    One more feature that you will find useful is setting a schedule for a task to
    run in the future or even repeat on a regular basis. As you can see in Figure
    [6-27](#492151_1_En_6_Chapter.xhtml#Fig27), similar to the template pop-up menu
    found in each task window, there is also a **Schedule…** button. Clicking this
    button allows you to set a date/time for the task to run, and you can set it to
    repeat. In this way you can have reports run overnight or on a regular basis if
    you are doing ongoing software usage or compliance monitoring.


    ## Software Distribution


    The last, and arguably most useful function of Apple Remote Desktop, is as a tool
    for software distribution. The point of software distribution is to streamline
    the process of installing and upgrading software across your entire fleet of *macOS*
    clients. Yes, you could use a USB drive or a network share and go from Mac to
    Mac installing the software as you go, but this is really time consuming and error
    prone. Apple Remote Desktop provides a couple of features for mass installing
    applications across the network to all of your *Macintosh* endpoints.


    ### Application Installers


    There are three different types of application installers on macOS. The first
    is the *sandboxed* or *self-contained application* or App that you can download
    from the *Mac App Store* or you can install by dragging and dropping the application
    directly from a **∗.dmg** (disk image) into the **/Applications** directory. An
    example of an application like this is *VLC Media Player*, available at [`www.videolan.org`](http://www.videolan.org)
    and shown in Figure [6-29](#492151_1_En_6_Chapter.xhtml#Fig29). You can see that
    to install this kind of application, all you need to do is drag the *VLC* icon
    into the alias of the ***/Applications*** folder to install it.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig29_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig29_HTML.jpg)


    Figure 6-29


    VLC is an example of a self-contained application


    The second kind of installer is the *application install package* or **∗.pkg**
    file. These are very common and use Apple’s macOS *Installer* helper application
    to deploy them. These are used when support files need to be installed in various
    areas of the hard disk and are not all contained into a single folder or App bundle.
    I find these are most often used with applications that support hardware peripherals
    like USB drawing tablets.


    Figure [6-30](#492151_1_En_6_Chapter.xhtml#Fig30) features a package installer
    for *Wacom* tablet drivers which can be found at [`www.wacom.com`](http://www.wacom.com).
    Instead of dragging and dropping the **Install Wacom Tablet.pkg** file into the
    ***/Applications*** folder, I need to **double-click** the file and follow the
    *installer* prompts to install the application and its supporting files into the
    correct places on my *Macintosh HD* volume.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig30_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig30_HTML.jpg)


    Figure 6-30


    An example of an installer package


    Finally, the third installer type is very similar to a **∗.pkg** file and works
    in a similar fashion, but a commercial skin or another kind of front-end applet
    is used to install the application instead of Apple’s macOS *Installer* helper.
    The most obvious example of this is the *Adobe Flash Player* installer, available
    at [`www.adobe.com/downloads`](http://www.adobe.com/downloads). As you can see
    from Figure [6-31](#492151_1_En_6_Chapter.xhtml#Fig31), if I use **Get Info**
    to see what kind of file this installer is, it tells me it is an **Application**.
    Installing this is the same process as the **∗.pkg** except it launches a custom
    installer application that Adobe created to step me through the installation process.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig31_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig31_HTML.jpg)


    Figure 6-31


    The Install Adobe Flash Player is an application, not a package


    Pro Tip


    Sometimes there are still ***.pkg** files hidden inside these application bundles
    as in the case of *Install Adobe Flash Player*. Check it out, **right-click**
    the *Install Adobe Flash Player* application, and choose **Show Package Contents**.
    Browse to ***/Contents/Resources/*** and look—**Adobe Flash Player.pkg** is there.
    This doesn’t mean that you can always just run that ***.pkg** file and the application
    will install correctly as there may be other dependencies that the commercial
    installer uses besides this single package.


    As you have probably guessed, we need to approach the software deployment strategy
    a little differently for each of these different installer types.


    ### Copy Items


    The most straightforward method, using the *Copy Items* option, is best used for
    applications that are self-contained bundles like the *VLC Media Player*. To install
    this application on one or more Macs, open Apple Remote Desktop and select the
    target computers from one of your computer lists. Click the **Copy** button in
    the toolbar, and you will see the Copy Items window as shown in Figure [6-32](#492151_1_En_6_Chapter.xhtml#Fig32).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig32_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig32_HTML.jpg)


    Figure 6-32


    The Copy Items configuration window


    **Drag** the *VLC* application from the disk image and **drop** it into the **Items
    to copy** field. Select **Applications Folder** from the **Place items in:** pop-up
    menu. Once you have finished setting up the file copy as shown in Figure [6-33](#492151_1_En_6_Chapter.xhtml#Fig33),
    click the **Copy** button to start the task.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig33_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig33_HTML.jpg)


    Figure 6-33


    The Copy Items configuration window for copying VLC into the target computer’s
    Applications folder


    The file copy will begin, and you will see a progress bar as shown in Figure [6-34](#492151_1_En_6_Chapter.xhtml#Fig34).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig34_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig34_HTML.jpg)


    Figure 6-34


    Progress on the active task of copying the application


    When the file copy completes successfully, go to your test machine and browse
    to ***/Applications*** and **double-click** the *VLC* icon to launch the application.
    If it launched successfully as it did in Figure [6-35](#492151_1_En_6_Chapter.xhtml#Fig35),
    then your application installation was successful.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig35_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig35_HTML.jpg)


    Figure 6-35


    The VLC application installed successfully on the target computer'
  trans: '

    # 应用使用情况


    我们要查看的最后一份报告是应用使用报告。该报告允许你选择一台或多台 Mac 并输入一个日期范围，如图 6-27 所示。之后，它会轮询所选计算机上所有已被使用的应用程序，并返回这些应用程序的使用日期、时间以及使用用户。图
    6-28 展示了该报告的一个示例。


    ![Figure 6-28](img/492151_1_En_6_Fig28_HTML.jpg)


    **Figure 6-28** 来自测试系统的应用使用报告数据


    ![Figure 6-27](img/492151_1_En_6_Fig27_HTML.jpg)


    **Figure 6-27** 应用使用报告配置窗口


    如果你按席位为应用程序付费，并且不确定是否有人在使用这些应用程序或使用的频率，这份报告将非常有帮助。这类报告可以提供有价值的软件计量信息，用于做出明智的购买和许可证续订决策。


    ## 专业提示


    另一个你会发现很有用的功能是为任务设置未来运行的时间表，甚至设置定期重复。如图 6-27 所示，类似于每个任务窗口中的模板弹出菜单，也有一个`Schedule…`按钮。点击此按钮，你可以设置任务运行的日期/时间，并可以设置为重复执行。这样，如果你正在进行持续的软件使用或合规性监控，可以让报告在夜间或定期运行。


    # 软件分发


    Apple Remote Desktop 最后，也可能是最有用的一个功能，是作为软件分发的工具。软件分发的目的是为了简化在整个`macOS`客户端群中安装和升级软件的过程。是的，你可以使用
    USB 驱动器或网络共享，然后逐台 Mac 安装软件，但这确实非常耗时且容易出错。Apple Remote Desktop 提供了几个功能，用于通过网络向所有`Macintosh`端点批量安装应用程序。


    ## 应用程序安装程序


    macOS 上有三种不同类型的应用程序安装程序。第一种是从`Mac App Store`下载或从`∗.dmg`（磁盘映像）中直接拖放到`/Applications`目录即可安装的*沙盒化*或*自包含应用程序*（App）。`VLC
    Media Player`就是这样的一个应用程序示例，可在 [`www.videolan.org`](http://www.videolan.org) 获取，如图
    6-29 所示。你可以看到，要安装这类应用程序，只需将`VLC`图标拖到`/Applications`文件夹的别名中即可完成安装。


    ![Figure 6-29](img/492151_1_En_6_Fig29_HTML.jpg)


    **Figure 6-29** VLC 是自包含应用程序的一个例子


    第二种安装程序是*应用程序安装包*或`∗.pkg`文件。这些非常常见，并使用苹果的 macOS `Installer`辅助应用程序进行部署。当需要在硬盘的各个区域安装支持文件，并且这些文件并非都包含在单个文件夹或
    App 包中时，就会使用这种方式。我发现它们最常用于支持硬件外设（如 USB 绘图板）的应用程序。


    图 6-30 展示了一个可在 [`www.wacom.com`](http://www.wacom.com) 找到的`Wacom`数位板驱动程序包安装程序。我不再将`Install
    Wacom Tablet.pkg`文件拖放到`/Applications`文件夹中，而是需要`double-click`该文件并按照`installer`提示进行操作，将应用程序及其支持文件安装到`Macintosh
    HD`卷上的正确位置。


    ![Figure 6-30](img/492151_1_En_6_Fig30_HTML.jpg)


    **Figure 6-30** 安装程序包示例


    最后，第三种安装程序类型与`∗.pkg`文件非常相似，工作方式也类似，但使用的是商业界面或其他类型的前端小程序来安装应用程序，而不是苹果的 macOS `Installer`辅助程序。最明显的例子是`Adobe
    Flash Player`安装程序，可在 [`www.adobe.com/downloads`](http://www.adobe.com/downloads)
    获取。从图 6-31 可以看出，如果我使用`Get Info`查看此安装程序的文件类型，它会告诉我这是一个`Application`。安装过程与`∗.pkg`类似，只是它启动的是
    Adobe 创建的自定义安装程序应用程序，引导我完成安装过程。


    ![Figure 6-31](img/492151_1_En_6_Fig31_HTML.jpg)


    **Figure 6-31** Install Adobe Flash Player 是一个应用程序，而不是一个包


    ## 专业提示


    有时这些应用程序包中仍然隐藏着`∗.pkg`文件，例如`Install Adobe Flash Player`。检查一下，`right-click` `Install
    Adobe Flash Player`应用程序，然后选择`Show Package Contents`。浏览到`/Contents/Resources/`看看——`Adobe
    Flash Player.pkg`就在那里。这并不意味着你总是可以运行那个`∗.pkg`文件，应用程序就能正确安装，因为商业安装程序除了这个单独的包之外可能还使用了其他依赖项。


    你可能已经猜到，对于这些不同的安装程序类型，我们需要采取略有不同的软件部署策略。


    ## 复制项目


    最直接的方法是使用`Copy Items`选项，它最适合用于像`VLC Media Player`这样的自包含应用程序包。要在一台或多台 Mac 上安装此应用程序，请打开
    Apple Remote Desktop，并从你的计算机列表中选择目标计算机。点击工具栏中的`Copy`按钮，你将看到如图 6-32 所示的“复制项目”窗口。


    ![Figure 6-32](img/492151_1_En_6_Fig32_HTML.jpg)


    **Figure 6-32** “复制项目”配置窗口


    将`VLC`应用程序从磁盘映像中`Drag`并`drop`到`Items to copy`字段中。从`Place items in:`弹出菜单中选择`Applications
    Folder`。如图 6-33 所示完成文件复制设置后，点击`Copy`按钮开始任务。


    ![Figure 6-33](img/492151_1_En_6_Fig33_HTML.jpg)


    **Figure 6-33** 将 VLC 复制到目标计算机应用程序文件夹的“复制项目”配置窗口


    文件复制将开始，你会看到如图 6-34 所示的进度条。


    ![Figure 6-34](img/492151_1_En_6_Fig34_HTML.jpg)


    **Figure 6-34** 复制应用程序活动任务的进度


    当文件复制成功完成后，转到你的测试机，浏览到`/Applications`，然后`double-click` `VLC`图标来启动应用程序。如果它能像图 6-35
    中那样成功启动，那么你的应用程序安装就成功了。


    ![Figure 6-35](img/492151_1_En_6_Fig35_HTML.jpg)


    **Figure 6-35** VLC 应用程序成功安装到目标计算机上

    '
- fmt: '### Installing Packages


    Installing packages is basically as straightforward as copying items. Select the
    computer(s) you want to install the package onto in the ARD console and then click
    the `Install` button in the toolbar. Drag and drop the `*.pkg` or `*.mpkg` file
    into the window and set the appropriate settings as shown in Figure [6-36](#492151_1_En_6_Chapter.xhtml#Fig36).
    When you are ready, click the `Install` button, and the task will begin. Once
    it is complete, check the test computer by launching the application and making
    sure it works.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig36_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig36_HTML.jpg)


    Figure 6-36


    The Install Packages configuration window for installing the Wacom tablet


    **Pro Tip**


    Installing packages can take time, especially over the network where it can cause
    a lot of traffic. Notice the `Schedule` button on the install configuration window?
    Just like report tasks, install tasks can also be scheduled for a future date
    and time. Consider running massive installations during off-hours to limit the
    disruption that heavy network traffic could cause to your end users.


    ### Running Unix Scripts


    The last option that is probably the most complicated, but also quite elegant,
    is using the command line to write a script that installs a particular application.
    Since we were talking about `Adobe Flash Player` in the previous section as an
    example, I went digging into the commercial install package, and I found something
    very interesting. When you `right-click` the `Install Adobe Flash Player` application
    and choose `Show Package Contents`, you can browse to `/Contents/MacOS/`, and
    there is a Unix executable called `Adobe Flash Player Install Manager` as shown
    in Figure [6-37](#492151_1_En_6_Chapter.xhtml#Fig37). That is intriguing. I wonder
    if there is a manual for this command.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig37_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig37_HTML.jpg)


    Figure 6-37


    The Unix executable buried in Adobe Flash Player installer application bundle


    I’m going to open a `Terminal` window, and then at the prompt I will type `cd`.
    Then I will drag and drop that `MacOS` folder that holds the `Adobe Flash Player
    Install Manager` Unix executable into the Terminal window. That will change my
    directory to the mounted disk image volume and the MacOS folder specifically,
    as shown in Figure [6-38](#492151_1_En_6_Chapter.xhtml#Fig38).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig38_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig38_HTML.jpg)


    Figure 6-38


    Using the cd command with a drag and drop of the directory we want to change our
    location to


    Now you will be at the `MacOS` directory in the `Terminal`. Type `ls` and you
    should see only one file in that directory, and it is `Adobe Flash Player Install
    Manager`. Next, let’s see if there is a manual. Type `man "Adobe Flash Player
    Install Manager"` and press enter. Bummer. As seen in Figure [6-39](#492151_1_En_6_Chapter.xhtml#Fig39),
    there is no manual provided for how to use the Adobe Flash Player Install Manager.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig39_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig39_HTML.jpg)


    Figure 6-39


    No man page exists for this Adobe command line utility


    No worries, let’s use our web browser and Google something like “Adobe Flash Player
    silent install for Mac” and see what we can find. The top hit is from Adobe’s
    web site, and it says we can use this command with the `-install` flag to process
    a silent install. Let’s give it a try! We are going to need to take a two-step
    approach to this. Our first step is to copy the installer to the target computer,
    and the second step will be to actually perform the installation by sending this
    Unix command.


    Open Apple Remote Desktop and find our test computer in the `All Computers` group.
    Click it to select it and then click the `Copy` button in the toolbar. Drag the
    `Install Adobe Flash Player` application from the disk image and drop it in the
    `Items to copy` section. This time, when it asks where to place the items, click
    the button and choose `Specify full path;` and in the dialog box that appears,
    enter `/tmp` as shown in Figure [6-40](#492151_1_En_6_Chapter.xhtml#Fig40). If
    your Copy Items window looks like mine, click the `Copy` button to copy this installer
    into the temp directory on the remote Mac.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig40_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig40_HTML.jpg)


    Figure 6-40


    Copy Items configuration window for copying the Flash Player installer to the
    /tmp directory on the remote test Mac


    When the file is done copying, you can verify that it exists by going to the test
    Mac and clicking `Go` menu ➤ `Go To Folder` and typing in `/tmp`. You should see
    the `Install Adobe Flash Player` application in the root of the temp folder as
    shown in Figure [6-41](#492151_1_En_6_Chapter.xhtml#Fig41). The first part of
    the process is now complete. We now have a way of copying the Adobe Flash Player
    installer application to the temp folder on our Macs.'
