- fmt: '# Device Firmware Update Mode


    **Device Firmware Update** (`DFU`) mode is not something many technicians will
    commonly need to use. It actually loads prior to the **iBoot** boot-loader and
    is an even lower-level environment than `iOS Recovery mode`. Please be aware that
    it can be difficult to place a unit into this mode as it requires precise timing
    and there is no feedback from the device when it is done correctly.


    `DFU` mode is typically only used for a couple of reasons. The main one is to
    downgrade the firmware of a newer release of `iOS` to an older release. For example,
    you may need to downgrade from `iOS 13` to `iOS 12` due to a compatibility concern
    or something similar. The other reason to use it is to attempt to repair a corrupted
    firmware or `iOS` install that a restore via recovery mode did not fix. While
    no longer as common as it used to be, if you have users who have jailbroken their
    devices, you would also use `DFU` mode to reverse the jailbreaking procedure.


    To place your device into `DFU` mode, you should follow these instructions for
    your specific device family:


    *   **iPhone 8 Series, iPhone X Series, iPhone 11 Series** **:** Plug the USB
    Lightning cable into the computer and iPhone. Press the **Volume Up** button,
    then press the **Volume Down** button, and then press and hold the **Side** and
    **Volume Down** buttons together for 5 seconds and then let go of the **Side**
    button but continue to hold the **Volume Down** button. You will get a message
    on the computer that the device is in recovery mode, but nothing will be shown
    on the iPhone’s display.


    *   **iPhone 7 Series** **:** Power off the device. Hold down the **Side** button
    and **Volume Down** button together for 8 seconds and then let go of the **Side**
    button but continue to hold the **Volume Down** button as you plug the device
    into the computer via USB cable. You will get a message on the computer that the
    device is in recovery mode, but nothing will be shown on the iPhone’s display.


    *   **iPhone 6 or iPhone SE** **:** Power off the device. Hold down the **Power**
    button and **Home** button together for 10 seconds and then let go of the **Power**
    button but continue to hold the **Home** button as you plug the device into the
    computer via USB cable. You will get a message on the computer that the device
    is in recovery mode, but nothing will be shown on the iPhone’s display.


    *   **Force Restart an iPad Without a Physical Home Button** **:** Plug the USB
    Lightning cable into the computer and iPhone. Press the **Volume Up** button,
    then press the **Volume Down** button, and then press and hold the **Sleep/Wake**
    and **Volume Down** buttons together for 5 seconds and then let go of the **Sleep/Wake**
    button but continue to hold the **Volume Down**. You will get a message on the
    computer that the device is in recovery mode, but nothing will be shown on the
    iPad’s display.


    *   **Force Restart an iPad with a Physical Home Button** **:** Power off the
    device. Hold down the **Sleep/Wake** button and **Home** button together for 10
    seconds and then let go of the **Sleep/Wake** button but continue to hold the
    **Home** button as you plug the device into the computer via USB cable. You will
    get a message on the computer that the device is in recovery mode, but nothing
    will be shown on the iPad’s display.


    # iOS Backup


    While we are on the subject of restoring `iOS`, we should probably review the
    process for creating **backups**. Apple provides two ways to back up your iOS
    device. You can back it up to a computer via `iTunes` (or the `Finder` in `macOS
    Catalina` as mentioned earlier), or you can back it up to `iCloud`. Which method
    you choose depends on your specific needs and the available storage space in your
    iCloud account.


    ## Computer Backup


    Connect your iOS device directly to the computer using a Lightning to USB cable.
    Next, using `iTunes` or `Finder` (in `macOS Catalina`), you can select the device
    and click the **Back Up Now** button in the **General** tab as shown in Figure
    [4-9](#492151_1_En_4_Chapter.xhtml#Fig9). You have the option to encrypt your
    backup, which is recommended especially if you have `Health` or `Activity` data
    on your `iPhone`. If you choose to back up all of your data on your iOS device
    to this computer, make sure that you also have a backup mechanism in place for
    the computer too. The last thing you want is to lose your computer’s data and
    your iOS backups at the same time!


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig9_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig9_HTML.jpg)

    *Figure 4-9 iOS backup options built into the Finder in macOS Catalina*


    ## iCloud Backup


    If you have the available space in your iCloud storage, this is by far the preferable
    method. Not only is your device going to back up more often because it will attempt
    to do incremental backups when on Wi-Fi and connected to a power source, but it
    will be easier to restore on a new device once you sign in with your iCloud credentials
    through the `Setup Assistant`. iCloud backups are always encrypted, and because
    they are stored in the cloud, you don’t have to worry about making a backup of
    your backups like you do when using the computer method.


    To enable iCloud backup, simply browse to your **iCloud** settings through `Settings`
    app ➤ `yourappleid` ➤ `iCloud` ➤ `iCloud Backup` as shown in Figure [4-10](#492151_1_En_4_Chapter.xhtml#Fig10).
    Flip the `iCloud Backup` switch to the **on** position, and the next time you
    are connected to the Internet via Wi-Fi and connected to a power source, it will
    do a backup. If you want to force a manual backup, make sure you are connected
    to a Wi-Fi network and then tap the **Back Up Now** button.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig10_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig10_HTML.jpg)

    *Figure 4-10 The steps to configure iCloud backup in iOS 13*


    **Pro Tip**


    Regardless of which method you choose, Apple will never back up the following
    data: `Apple Pay` data; `Face ID` or `Touch ID` settings*; `iCloud` data like
    `Contacts`, `Calendars`, and so on; or Apps, books, music, movies, and other similar
    content that is already hosted in the App Store or on one of Apple’s various services.


    ## Restoring from Backup


    Restoring your iOS device data is pretty simple. If you used the computer method,
    you just connect your device to the same computer your recent backup is on and
    click the **Restore** button and follow the prompts to choose the backup that
    you wish to restore from. If you are restoring from an iCloud backup, after you
    reset your iOS device and you are stepping through the `Setup Assistant` (welcome
    sequence) when it prompts you to restore from an iCloud backup or set up as a
    new device, choose the `iCloud Backup` option and select the most recent backup
    you want to restore from. Figure [4-11](#492151_1_En_4_Chapter.xhtml#Fig11) shows
    examples of both restore options.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig11_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig11_HTML.jpg)

    *Figure 4-11 Restore options from iCloud and via iTunes or Finder*'
  raw: '### Device Firmware Update Mode


    **Device Firmware Update** (DFU) mode is not something many technicians will commonly
    need to use. It actually loads prior to the **iBoot** boot-loader and is an even
    lower-level environment than *iOS Recovery mode*. Please be aware that it can
    be difficult to place a unit into this mode as it requires precise timing and
    there is no feedback from the device when it is done correctly.


    DFU mode is typically only used for a couple of reasons. The main one is to downgrade
    the firmware of a newer release of *iOS* to an older release. For example, you
    may need to downgrade from iOS 13 to iOS 12 due to a compatibility concern or
    something similar. The other reason to use it is to attempt to repair a corrupted
    firmware or *iOS* install that a restore via recovery mode did not fix. While
    no longer as common as it used to be, if you have users who have jailbroken their
    devices, you would also use DFU mode to reverse the jailbreaking procedure.


    To place your device into DFU mode, you should follow these instructions for your
    specific device family:


    *   **iPhone 8 Series, iPhone X Series, iPhone 11 Series** **:** Plug the USB
    Lightning cable into the computer and iPhone. Press the **Volume Up** button,
    then press the **Volume Down** button, and then press and hold the **Side** and
    **Volume Down** buttons together for 5 seconds and then let go of the **Side**
    button but continue to hold the **Volume Down** button. You will get a message
    on the computer that the device is in recovery mode, but nothing will be shown
    on the iPhone’s display.


    *   **iPhone 7 Series** **:** Power off the device. Hold down the **Side** button
    and **Volume Down** button together for 8 seconds and then let go of the **Side**
    button but continue to hold the **Volume Down** button as you plug the device
    into the computer via USB cable. You will get a message on the computer that the
    device is in recovery mode, but nothing will be shown on the iPhone’s display.


    *   **iPhone 6 or iPhone SE** **:** Power off the device. Hold down the **Power**
    button and **Home** button together for 10 seconds and then let go of the **Power**
    button but continue to hold the **Home** button as you plug the device into the
    computer via USB cable. You will get a message on the computer that the device
    is in recovery mode, but nothing will be shown on the iPhone’s display.


    *   **Force Restart an iPad Without a Physical Home Button** **:** Plug the USB
    Lightning cable into the computer and iPhone. Press the **Volume Up** button,
    then press the **Volume Down** button, and then press and hold the **Sleep/Wake**
    and **Volume Down** buttons together for 5 seconds and then let go of the **Sleep/Wake**
    button but continue to hold the **Volume Down**. You will get a message on the
    computer that the device is in recovery mode, but nothing will be shown on the
    iPad’s display.


    *   **Force Restart an iPad with a Physical Home Button** **:** Power off the
    device. Hold down the **Sleep/Wake** button and **Home** button together for 10
    seconds and then let go of the **Sleep/Wake** button but continue to hold the
    **Home** button as you plug the device into the computer via USB cable. You will
    get a message on the computer that the device is in recovery mode, but nothing
    will be shown on the iPad’s display.


    ## iOS Backup


    While we are on the subject of restoring *iOS*, we should probably review the
    process for creating **backups**. Apple provides two ways to back up your iOS
    device. You can back it up to a computer via *iTunes* (or the *Finder* in *macOS
    Catalina* as mentioned earlier), or you can back it up to *iCloud*. Which method
    you choose depends on your specific needs and the available storage space in your
    iCloud account.


    ### Computer Backup


    Connect your iOS device directly to the computer using a Lightning to USB cable.
    Next, using *iTunes* or *Finder* (in *macOS Catalina*), you can select the device
    and click the **Back Up Now** button in the **General** tab as shown in Figure
    [4-9](#492151_1_En_4_Chapter.xhtml#Fig9). You have the option to encrypt your
    backup, which is recommended especially if you have *Health* or *Activity* data
    on your *iPhone*. If you choose to back up all of your data on your iOS device
    to this computer, make sure that you also have a backup mechanism in place for
    the computer too. The last thing you want is to lose your computer’s data and
    your iOS backups at the same time!


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig9_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig9_HTML.jpg)


    Figure 4-9


    iOS backup options built into the Finder in macOS Catalina


    ### iCloud Backup


    If you have the available space in your iCloud storage, this is by far the preferable
    method. Not only is your device going to back up more often because it will attempt
    to do incremental backups when on Wi-Fi and connected to a power source, but it
    will be easier to restore on a new device once you sign in with your iCloud credentials
    through the Setup Assistant. iCloud backups are always encrypted, and because
    they are stored in the cloud, you don’t have to worry about making a backup of
    your backups like you do when using the computer method.


    To enable iCloud backup, simply browse to your **iCloud** settings through ***Settings***
    *app* ➤ ***yourappleid*** ➤ ***iCloud*** ➤ ***iCloud Backup*** as shown in Figure
    [4-10](#492151_1_En_4_Chapter.xhtml#Fig10). Flip the **iCloud Backup** switch
    to the **on** position, and the next time you are connected to the Internet via
    Wi-Fi and connected to a power source, it will do a backup. If you want to force
    a manual backup, make sure you are connected to a Wi-Fi network and then tap the
    **Back Up Now** button.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig10_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig10_HTML.jpg)


    Figure 4-10


    The steps to configure iCloud backup in iOS 13


    Pro Tip


    Regardless of which method you choose, Apple will never back up the following
    data: *Apple Pay* data; *Face ID* or *Touch ID* settings*; iCloud* data like *Contacts,
    Calendars*, and so on; or Apps, books, music, movies, and other similar content
    that is already hosted in the App Store or on one of Apple’s various services.


    ### Restoring from Backup


    Restoring your iOS device data is pretty simple. If you used the computer method,
    you just connect your device to the same computer your recent backup is on and
    click the **Restore** button and follow the prompts to choose the backup that
    you wish to restore from. If you are restoring from an iCloud backup, after you
    reset your iOS device and you are stepping through the *Setup Assistant* (welcome
    sequence) when it prompts you to restore from an iCloud backup or set up as a
    new device, choose the **iCloud Backup** option and select the most recent backup
    you want to restore from. Figure [4-11](#492151_1_En_4_Chapter.xhtml#Fig11) shows
    examples of both restore options.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig11_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Restore options from iCloud and via iTunes or Finder'
  trans: '

    # 设备固件更新模式


    **设备固件更新**（`DFU`）模式并非许多技术人员经常需要使用到的功能。它实际上在 **iBoot** 引导加载程序之前加载，是一个比 `iOS 恢复模式`
    层级更低的环境。请注意，让设备进入此模式可能比较困难，因为它需要精确的时机把握，并且在操作正确时设备不会提供任何反馈。


    通常仅在少数几种情况下会使用 `DFU` 模式。最主要的一种是将较新版本的 `iOS` 固件降级到较旧的版本。例如，出于兼容性问题或类似原因，您可能需要从
    `iOS 13` 降级到 `iOS 12`。另一个使用它的原因是尝试修复已损坏的固件或 `iOS` 安装，而通过恢复模式进行的恢复未能解决该问题。虽然这种情况已不如过去普遍，但如果您有用户对设备进行了越狱，您也可以使用
    `DFU` 模式来撤销越狱操作。


    要将您的设备置于 `DFU` 模式，请按照针对您特定设备系列的以下说明操作：


    *   **iPhone 8 系列、iPhone X 系列、iPhone 11 系列** **：** 将 USB-Lightning 数据线插入电脑和 iPhone。按下
    **调高音量** 按钮，然后按下 **调低音量** 按钮，接着同时按住 **侧边** 按钮和 **调低音量** 按钮 5 秒钟，之后松开 **侧边** 按钮，但继续按住
    **调低音量** 按钮。您会在电脑上收到设备已进入恢复模式的消息，但 iPhone 屏幕上不会显示任何内容。


    *   **iPhone 7 系列** **：** 关闭设备。同时按住 **侧边** 按钮和 **调低音量** 按钮 8 秒钟，然后松开 **侧边** 按钮，但在通过
    USB 数据线将设备连接到电脑时，继续按住 **调低音量** 按钮。您会在电脑上收到设备已进入恢复模式的消息，但 iPhone 屏幕上不会显示任何内容。


    *   **iPhone 6 或 iPhone SE** **：** 关闭设备。同时按住 **电源** 按钮和 **主屏幕** 按钮 10 秒钟，然后松开
    **电源** 按钮，但在通过 USB 数据线将设备连接到电脑时，继续按住 **主屏幕** 按钮。您会在电脑上收到设备已进入恢复模式的消息，但 iPhone
    屏幕上不会显示任何内容。


    *   **强制重启不带实体主屏幕按钮的 iPad** **：** 将 USB-Lightning 数据线插入电脑和 iPhone。按下 **调高音量**
    按钮，然后按下 **调低音量** 按钮，接着同时按住 **睡眠/唤醒** 按钮和 **调低音量** 按钮 5 秒钟，之后松开 **睡眠/唤醒** 按钮，但继续按住
    **调低音量** 按钮。您会在电脑上收到设备已进入恢复模式的消息，但 iPad 屏幕上不会显示任何内容。


    *   **强制重启带实体主屏幕按钮的 iPad** **：** 关闭设备。同时按住 **睡眠/唤醒** 按钮和 **主屏幕** 按钮 10 秒钟，然后松开
    **睡眠/唤醒** 按钮，但在通过 USB 数据线将设备连接到电脑时，继续按住 **主屏幕** 按钮。您会在电脑上收到设备已进入恢复模式的消息，但 iPad
    屏幕上不会显示任何内容。


    # iOS 备份


    既然我们正在讨论恢复 `iOS` 的话题，或许应该回顾一下创建 **备份** 的过程。Apple 提供了两种备份 iOS 设备的方法。您可以通过 `iTunes`（或如前所述，在
    `macOS Catalina` 中使用 `访达`）将设备备份到电脑，也可以备份到 `iCloud`。选择哪种方法取决于您的具体需求以及您的 iCloud
    账户中的可用存储空间。


    ## 电脑备份


    使用 Lightning 转 USB 数据线直接将您的 iOS 设备连接到电脑。接下来，使用 `iTunes` 或 `访达`（在 `macOS Catalina`
    中），您可以选中该设备，并点击 **通用** 选项卡中的 **立即备份** 按钮，如图 4-9 所示。您可以选择加密备份，如果您在 `iPhone` 上有
    `健康` 或 `健身记录` 数据，这一点尤其推荐。如果您选择将 iOS 设备上的所有数据都备份到这台电脑，请确保您也为电脑建立了备份机制。您最不希望看到的就是同时丢失电脑数据和
    iOS 备份！


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig9_HTML.jpg](img/492151_1_En_4_Fig9_HTML.jpg)

    *图 4-9 macOS Catalina 中访达内置的 iOS 备份选项*


    ## iCloud 备份


    如果您的 iCloud 存储空间充足，这无疑是更优选的方法。您的设备不仅会更频繁地进行备份（因为它会在连接到 Wi-Fi 和电源时尝试进行增量备份），而且一旦您通过
    `设置助理` 使用 iCloud 凭据登录新设备，恢复数据也会更容易。iCloud 备份始终是加密的，并且由于它们存储在云端，您无需像使用电脑备份方法那样担心对备份文件本身进行备份。


    要启用 iCloud 备份，只需通过 `设置` 应用 > `您的 Apple ID` > `iCloud` > `iCloud 云备份` 浏览到您的 **iCloud**
    设置，如图 4-10 所示。将 `iCloud 云备份` 开关拨到 **开** 的位置，下次当您通过 Wi-Fi 连接到互联网并接通电源时，它将执行一次备份。如果您想手动强制备份，请确保已连接到
    Wi-Fi 网络，然后点击 **立即备份** 按钮。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig10_HTML.jpg](img/492151_1_En_4_Fig10_HTML.jpg)

    *图 4-10 在 iOS 13 中配置 iCloud 备份的步骤*


    **专业提示**


    无论您选择哪种方法，Apple 永远不会备份以下数据：`Apple Pay` 数据；`面容 ID` 或 `触控 ID` 设置*；已存储在 `iCloud`
    中的数据，如 `通讯录`、`日历` 等；或者已经托管在 App Store 或 Apple 各类服务中的 App、图书、音乐、电影及其他类似内容。


    ## 从备份恢复


    恢复您的 iOS 设备数据非常简单。如果您使用的是电脑备份方法，只需将设备连接到存储您最近备份的同一台电脑，点击 **恢复** 按钮，然后按照提示选择您希望从中恢复的备份。如果您要从
    iCloud 备份恢复，在您抹掉 iOS 设备内容后，进入 `设置助理`（欢迎流程），当它提示您从 iCloud 备份恢复或设置为新设备时，选择 `iCloud
    云备份` 选项，并选择您想要从中恢复的最新备份。图 4-11 展示了两种恢复选项的示例。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig11_HTML.jpg](img/492151_1_En_4_Fig11_HTML.jpg)

    *图 4-11 从 iCloud 以及通过 iTunes 或访达恢复的选项*

