    ## Microsoft Office 365 应用程序与 OneDrive


    下一步是在 Don 的 MacBook Pro 上安装 Office 365 应用程序。与此同时，我们也可以在他的 iPhone 上安装 Word 和 Excel。使用
    `Profile Manager`，浏览到特定设备，并使用 **应用程序** 选项卡将 `Word`、`Excel`、`PowerPoint`、`Outlook`
    和 `OneDrive` 的副本应用于他的 Mac，如图 11-34 所示。


