    **zsh** because I’m using *Catalina*. I can modify this and select **bash** if
    I want to instead so that it’s consistent with previous versions of *macOS*. It
    shows my **home directory path** here, and I can change it to another location
    or volume if I need to. I can set an **Apple ID** to tie to this particular user
    account for *iCloud* or the *Mac App Store* so they don’t need to do so when they
    first sign in. This could be useful for assigning *institutional Apple IDs* that
    we will cover later in this book.


    Finally, we can add **aliases** to this user account. Aliases let us add other
    usernames that can be entered instead of the official account name. For example,
    if my account name is very long or complex, I can add a shorter username as an
    alias. Some organizations may do this to maintain some kind of standardization
    of network user home directories but then give the user a friendly username to
    sign in with. I personally have not used aliases all that often, but your mileage
    may vary.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig34_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig34_HTML.jpg)


