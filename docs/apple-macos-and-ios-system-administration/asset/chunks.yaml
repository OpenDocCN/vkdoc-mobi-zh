    pay attention to the updates that Apple makes to its terms and conditions for
    your Apple School Manager or Apple Business Manager account. These usually update
    when there are major new features or new operating system releases. You will need
    to periodically go into the management portal and agree to these new terms, or
    the DEP/VPP services may fail to work properly until you do.'
  trans: '

    # MDM 服务器集成


    我们首先要做的是创建一个 MDM 服务器记录，以便将我们的服务器与 Apple 校园教务管理实例进行关联。这将允许我们将特定设备分配给运行`Profile
    Manager`的`macOS Server`并进行管理。


    ## 配置描述文件管理器与 DEP


    1.  第一步是浏览 Apple 校园教务管理/Apple 商务管理门户网站中的**设置**。点击**设备管理设置**，然后点击**添加 MDM 服务器**按钮，如图
    8-5 所示。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig5_HTML.jpg](img/492151_1_En_8_Fig5_HTML.jpg)


    图 8-5

    在设备管理设置中点击添加 MDM 服务器


    **专业提示** 你务必记下令牌的到期时间（每 365 天），以便你能在导致服务中断之前续订。你还应注意 Apple 针对你的 Apple 校园教务管理或
    Apple 商务管理账户所做的条款和条件更新。这些更新通常在发布主要新功能或新操作系统版本时进行。你需要定期进入管理门户并同意这些新条款，否则 DEP/VPP
    服务可能无法正常工作，直到你同意为止。


    2.  要配置 MDM 服务器信息，你需要提供一些项目，包括名称和公钥，以便在 DEP 和你的 MDM 服务器之间建立安全连接。为此 MDM 服务器起一个描述性的名称。我将把我的服务器命名为“我的公司
    MDM 服务器”。我将保持**允许此 MDM 服务器释放设备**复选框为选中状态。你的屏幕应类似于图 8-6。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig6_HTML.jpg](img/492151_1_En_8_Fig6_HTML.jpg)


    图 8-6

    为服务器命名并上传公钥


    **专业提示** 当你的组织购买设备时，它们会被自动放置在 DEP 数据库中。如果你的组织想要出售或处置该设备，根据 Apple 校园教务管理/Apple
    商务管理的服务条款，Apple 要求你将该设备从 DEP 数据库中移除。释放设备是 Apple 用来表示将设备从你组织的 DEP 数据库中移除的术语。


    3.  接下来，我们需要从运行在我们 Mac 服务器上的 Profile Manager 实例中获取公钥。切换到 **Server** 应用，点击描述文件管理器服务。在**部署计划**部分，有几个选项，如图
    8-7 所示。根据你组织所属的计划，你将需要选择 **Apple 校园教务管理** 或 **Apple 商务管理**，并点击相应选项下的 **配置…** 按钮。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig7_HTML.jpg](img/492151_1_En_8_Fig7_HTML.jpg)


    图 8-7

    点击与你组织对应的部署计划下的配置…按钮


    **专业提示** 现在是检查你 Mac 服务器上 `日期与时间系统偏好设置` 的好时机。你需要确保时区、日期和时间在继续之前都是准确的，否则在配置与云托管服务的安全连接时可能会遇到错误。


    4.  我将使用 **Apple 校园教务管理**，因此我点击该标题下的 **配置…** 按钮。配置助理做的第一件事是提醒你，在继续之前需要能够访问在线管理门户
    `business.apple.com` 或 `school.apple.com`。点击 **下一步** 继续。


    5.  在下一个对话框中，你将看到一个可用于 Apple 校园教务管理网站的 **公钥**。这是我们继续配置 MDM 连接所需的密钥。点击 **导出…**
    按钮，如图 8-8 所示。将其保存到桌面。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig8_HTML.jpg](img/492151_1_En_8_Fig8_HTML.jpg)


    图 8-8

    导出你的服务器公钥


    6.  接下来，返回 Apple 校园教务管理，点击 **MDM 服务器设置 ➤ 上传公钥** 选项下的 **选择文件** 按钮，如图 8-9 所示。选择你从描述文件管理器配置助理下载到桌面的
    `*.pem` 文件。添加公钥后，点击 **保存** 按钮。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig9_HTML.jpg](img/492151_1_En_8_Fig9_HTML.jpg)


    图 8-9

    将你服务器上的公钥上传到管理门户的这一部分


    7.  点击 **保存** 按钮后，页面将刷新，你将有一个下载令牌的选项，如图 8-10 所示。点击 **下载令牌** 按钮并将文件保存到桌面。它会警告你下载令牌将重置所有正在使用的现有令牌。由于我们没有任何现有令牌，我们可以忽略此警告并点击
    **下载令牌** 按钮继续。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig10_HTML.jpg](img/492151_1_En_8_Fig10_HTML.jpg)


    图 8-10

    点击下载令牌按钮到桌面


    8.  接下来，我们需要切换回我们的 Mac 服务器，并使用刚刚下载的 `*.p7m` 令牌完成配置助理。点击 **下一步**，进入我们将上传令牌的对话框。点击
    **选择…** 按钮选择 **令牌文件**，如图 8-11 所示。然后点击 **继续** 按钮。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig11_HTML.jpg](img/492151_1_En_8_Fig11_HTML.jpg)


    图 8-11

    选择你从管理门户下载到桌面的令牌文件


    9.  一旦成功完成，点击 **完成** 按钮结束配置。你现在应该像我在图 8-12 中那样，在所选部署计划旁边看到一个绿点。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig12_HTML.jpg](img/492151_1_En_8_Fig12_HTML.jpg)


    图 8-12

    我的服务器上的 Apple 校园教务管理有一个绿点，表明它正在运行

