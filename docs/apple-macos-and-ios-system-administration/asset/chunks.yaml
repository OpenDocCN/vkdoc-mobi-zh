- fmt: "# Device Enrollment Program (DEP) Integration with Setup Assistant\n\nBy far,\
    \ the best option available for enrolling devices in MDM is by using `DEP` when\
    \ devices are running through the `Setup Assistant`. Not only can you force enrollment\
    \ in this manner but it happens each time the device is activated, meaning that\
    \ even if it’s a device that is reset or restored, it is automatically managed\
    \ again before the user can even sign into it. When devices are enrolled in this\
    \ manner, the necessary trust certificates are also installed so the device will\
    \ be configured to trust your `MDM` automatically. When the trust certificates\
    \ are in place, we will not need to sign our `Configuration Profiles` when pushed\
    \ through our `MDM` solution.\n\nThe main downside to this enrollment method is\
    \ that you need to have either `Apple School Manager` or `Apple Business Manager`\
    \ configured with your `MDM` and the devices must be in your `DEP` database. If\
    \ you do have `DEP` integration configured with your `MDM` and you are purchasing\
    \ your devices from Apple directly or through a participating `Apple Authorized\
    \ Reseller`, then this is the option you should go with.\n\n## MDM Enrollment\
    \ Using DEP\n\nFor this example, we are going to enroll a test `iPad` into our\
    \ `Profile Manager MDM` using the `Setup Assistant` integration. Picking up where\
    \ we left off in a previous chapter, we should have a test `iOS` device already\
    \ added to our `MDM` as a placeholder. `Profile Manager`’s `Devices` should look\
    \ similar to Figure [9-3](#492151_1_En_9_Chapter.xhtml#Fig3) with at least one\
    \ `iOS` device listed.\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig3_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig3_HTML.jpg)\n\
    \n**Figure 9-3**\n\n`iPad` placeholder created by `DEP` when we assigned the device\
    \ to our `MDM` server in `Apple School Manager`\n\n1. The first step to enroll\
    \ the device is to click the `iPad` placeholder in the `Devices` list and then\
    \ click the `Settings` tab.\n2. Scroll down to `Enrollment Settings` ➤ `Enrollment\
    \ during Setup Assistant` as shown in Figure [9-4](#492151_1_En_9_Chapter.xhtml#Fig4).\
    \ Check the following boxes:\n    1. `Prompt user to enroll device during Setup\
    \ Assistant`\n    2. `Do not allow user to skip enrollment step`\n    3. `Supervise`\n\
    \    4. `Allow pairing with a Mac (deprecated)`\n    These settings will force\
    \ the device to enroll during the `Setup Assistant`, and it will allow any end\
    \ user to enroll it. Once it is enrolled, it will also be supervised so we can\
    \ use the full suite of configuration tools to manage it.\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig4_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4**\n\n`Enrollment during Setup Assistant` settings\n\n3. Next, scroll\
    \ down a little further to the `Setup Assistant Options` section as shown in Figure\
    \ [9-5](#492151_1_En_9_Chapter.xhtml#Fig5). Uncheck everything except the following:\n\
    \    1. `Passcode Lock`\n    2. `Appearance`\n    3. `New Feature Highlights`\n\
    \    4. `Welcome`\n    We will use this setting to test that enrollment worked\
    \ by skipping all but the passcode lock setup, prompting for dark mode, the `iPadOS`\
    \ feature demo, and the `Welcome` screen. Click the `Save` button in the bottom-right\
    \ corner of the window.\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig5_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig5_HTML.jpg)\n\
    \n**Figure 9-5**\n\nThe `Setup Assistant Options`\n\n4. You can click the `Activity`\
    \ tab and confirm that the `DEP Profile` for the `iPad` was uploaded to `Apple\
    \ School Manager`/`Apple Business Manager` so it is ready for enrollment during\
    \ `Setup Assistant` as shown in Figure [9-6](#492151_1_En_9_Chapter.xhtml#Fig6).\n\
    \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig6_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig6_HTML.jpg)\n\
    \n**Figure 9-6**\n\nConfirmation that our setting changes uploaded to `ASM`\n\n\
    5. Next, grab the test `iPad` and make sure that it is running a fresh install\
    \ of the operating system. If it has been activated already, use the `Reset All\
    \ Content & Settings` option or restore it via `iTunes`/`Finder` before attempting\
    \ to enroll it in `MDM`.\n6. Power up the `iPad` and step through joining it to\
    \ `Wi-Fi` and activating it. Once it gets past the initial activation step, it\
    \ should prompt you to install the `Configuration Profile` as shown in Figure\
    \ [9-7](#492151_1_En_9_Chapter.xhtml#Fig7). If it does not show you this screen,\
    \ please review these steps again, restore/reset the `iOS` device, and try again.\n\
    \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig7_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig7_HTML.jpg)\n\
    \n**Figure 9-7**\n\nThe `Remote Management` prompt on our test `iPad`\n\n7. If\
    \ you go back to `Profile Manager`, you will see that the `Activity` tab will\
    \ state that the device was enrolled and the `Placeholder` label has been removed\
    \ from my device as shown in Figure [9-8](#492151_1_En_9_Chapter.xhtml#Fig8) indicating\
    \ that it is now managed.\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig8_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig8_HTML.jpg)\n\
    \n**Figure 9-8**\n\nThe device enrollment confirmation and time/date stamp\n\n\
    8. You can also browse to `Settings` ➤ `Remote Management` and see that our “MyCompany”\
    \ `MDM Profile` and certificates are installed as shown in Figure [9-9](#492151_1_En_9_Chapter.xhtml#Fig9).\
    \ Your users will also see your supervision identity in the top-left corner of\
    \ the `Settings` window.\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig9_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig9_HTML.jpg)\n\
    \n**Figure 9-9**\n\nOur `Management Profile` is installed, and the device is supervised\n\
    \n9. Click `Next` to step through the configuration process. It will take a few\
    \ minutes to configure and enroll the device in `MDM`. Then it should prompt you\
    \ to set a passcode, select light or dark mode, tell you about `iPadOS` features,\
    \ and then greet you with `Welcome` and the `Get Started` button to bring you\
    \ to your `Home Screen`.\n\n## Pro Tip\n\nOne thing you will want to keep in mind\
    \ if you are mass deploying `iOS` devices on a wireless network that uses `Network\
    \ Address Translation (NAT)` is that Apple can restrict multiple over-the-air\
    \ activations of `iOS` devices from the same public `IP` address if they happen\
    \ in rapid succession. For example, in large organizations like schools where\
    \ you may have tens or hundreds of devices activating at the same time, you may\
    \ run into failed activation issues. I would recommend speaking with your organization’s\
    \ Apple rep about whitelisting your public `IP` addresses to avoid this issue.\n\
    \nThis process is very similar for `macOS` clients with the exception of a few\
    \ unique Mac-only features. Explore the basic enrollment settings and configure\
    \ your `Test Mac` to enroll during `Setup Assistant` and skip all but the `Terms\
    \ and Conditions` prompt. You should be able to easily enroll your test `Mac`\
    \ client into `MDM` using `DEP`. Give it a shot!"
