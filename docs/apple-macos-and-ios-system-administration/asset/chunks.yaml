    图 2-25 `ifconfig`命令示例输出和`ifconfig`手册'
  raw: '### Network


    The *Network System Preference* is the one-stop shop for network-related information
    and configuration for your Mac. As you can see in Figure [2-19](#492151_1_En_2_Chapter.xhtml#Fig19),
    besides displaying your IP address and active connections, from this pane you
    can turn your Wi-Fi on/off, join a wireless network, or edit available network
    adapters and services by pressing the **+/-** buttons.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig19_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig19_HTML.jpg)


    Figure 2-19


    Network System Preference main pane


    Pressing the **+** button will prompt you to add a number of new adapter options
    including a built-in VPN. Figure [2-20](#492151_1_En_2_Chapter.xhtml#Fig20) shows
    the various network adapters you can add, and Figure [2-21](#492151_1_En_2_Chapter.xhtml#Fig21)
    shows the specific VPNs you can choose from including **Cisco IPSec**.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig21_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig21_HTML.jpg)


    Figure 2-21


    Built-in VPN protocols


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig20_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig20_HTML.jpg)


    Figure 2-20


    Additional network interface options


    Clicking the **Advanced…** button will allow you to modify specific network adapter
    settings. There are several tabs in the Advanced dialog box with the first being
    **Wi-Fi**. As shown in Figure [2-22](#492151_1_En_2_Chapter.xhtml#Fig22), this
    is where you will see all of the wireless networks that your Mac has connected
    to and you can arrange them in order of preference. Clicking the **+/-** buttons
    will allow you to forget a wireless network (**-**) or manually add (**+**) a
    wireless network.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig22_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig22_HTML.jpg)


    Figure 2-22


    The Wi-Fi settings tab


    Pro Tip


    This is a great tool for troubleshooting issues with WPA2 Enterprise wireless
    networks that have embedded user credentials and certificates. You can delete
    an existing network to easily remove cached credentials and certificates. You
    can also manually add a network and specify the required wireless security settings.


    The next tab is **TCP/IP,** and this is where you can configure your IP address
    settings as shown in Figure [2-23](#492151_1_En_2_Chapter.xhtml#Fig23). In this
    pane, you can specify dynamic or static addressing as well as see your current
    IP address, subnet mask, and gateway (labeled Router). The **Renew DHCP Lease**
    button can be used with dynamic addressing to either refresh the existing DHCP-provided
    IP address or receive a new one.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig23_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig23_HTML.jpg)


    Figure 2-23


    TCP/IP settings tab


    Windows Administrator Pro Tip


    Windows sysadmins can think of this tab as a place to easily get **the ipconfig**
    information as well as perform the **ipconfig /release** or **ipconfig /renew**
    task graphically on a Mac. It also functions the same as the TCP/IP v4 or TCP/IP
    v6 **Properties** dialog box on Windows.


    Finally, the **DNS** tab as shown in Figure [2-24](#492151_1_En_2_Chapter.xhtml#Fig24)
    provides the DNS servers and search domains for your network. If you have your
    DHCP server options set to hand out DNS information to your clients, that info
    will be provided here. You can also click the **+/-** buttons to manually add
    additional DNS servers or search domains on your Mac clients if required by your
    network configuration or for troubleshooting purposes.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig24_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig24_HTML.jpg)


    Figure 2-24


    DNS settings tab


    Pro Tip


    *macOS* also provides a comprehensive set of network configuration and troubleshooting
    commands through the Terminal app. The `ifconfig` command can be used to do any
    number of things including flushing the DNS resolver cache, disabling network
    interfaces, adding network interfaces, and manipulating TCP/IP settings. If you
    plan to script any network configuration changes, definitely spend some time reading
    through the `ifconfig` man pages and trying out some of the commands as shown
    in Figure [2-25](#492151_1_En_2_Chapter.xhtml#Fig25).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig25_HTML.png](images/492151_1_En_2_Chapter/492151_1_En_2_Fig25_HTML.png)


    Figure 2-25


    Example output of the ifconfig command and the ifconfig manual'
