- fmt: '### Configuration Profile Settings


    The last step in Profile Manager is to assign settings to the members of our `Design
    Team Device Group`. With the Design Team group selected, click the `Settings`
    tab and then click the `Edit` button under the `Settings for Design Team` heading.
    This will open our `Configuration Profile` window for assigning restrictions and
    settings.


    We are going to configure a few basic things here to conform to the look and feel
    of our Windows environment. Start by filling out the `General` payload with the
    name of the Configuration Profile and description, and set `Security` as `With
    Authorization` and set a password.


    Next, we can configure our `Passcode` payload. Set the passcode requirement to
    the eight-character minimum passcode length and require complex characters and
    the delay after login attempts with similar values that we have used several times
    before in this book.


    Next, we are going to set some specific `macOS`-only settings. The first one is
    the `Directory` payload. Click `Configure` and choose `Active Directory` from
    the `Directory Type` pop-up menu. We will need to provide the `FQDN` or `IP address`
    of our Domain Controller as well as username and password for a Domain Admin account.
    For `Client ID`, I’m using a variable of `%ComputerName%` so that it uses the
    name we assigned to the machine to match the existing computer record in AD. We
    will leave the `Organizational Unit` blank because it should join to the correct
    OU based on the existing record. Your Directory payload should look similar to
    Figure 13-10.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig10_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig10_HTML.jpg)


    Figure 13-10


    Defining Active Directory settings in the Directory payload


    Next, we are going to configure the `Login Items` payload to automatically map
    the `Main Office Shared` network drive. Click the `Configure` button and, as shown
    in Figure 13-11, add the SMB share to the Authenticated Network Mounts section.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig11_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig11_HTML.jpg)


    Figure 13-11


    Setting our Main Office Shared drive to mount at login


    Next, we will configure some `restrictions` that are specific to macOS. Please
    note that there are two sets of `Restrictions` payloads in this list. We want
    to choose the one under the `macOS` heading. Click `Configure` and start by restricting
    access to most of the System Preferences. Your Preferences tab should match Figure
    13-12.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig12_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig12_HTML.jpg)


    Figure 13-12


    Identify the System Preferences we want users to be able to interact with and
    those that we want to restrict


    Pro Tip


    Remember that this will restrict access to these System Preferences for all users
    of the machine. If you want to allow administrators to disable management, be
    sure to also configure the `Login Window` payload and enable this ability in the
    `Options` tab.


    Finally, we are going to click the `Functionality` tab. Here we will check the
    box next to `Lock desktop picture` and provide a `Desktop picture path` to the
    `Color Burst 1.jpg` image as shown in Figure 13-13. This will set our wallpaper
    to match everyone else in the office and set a consistent user experience between
    Mac and Windows clients.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig13_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig13_HTML.jpg)


    Figure 13-13


    Configuring the path to a standard Desktop wallpaper


    Pro Tip


    In `macOS Catalina`, the path to the Desktop Pictures directory is different than
    previous versions of the operating system. In older versions it is `/Library/Desktop
    Pictures/`, and in `Catalina` it is `/System/Library/Desktop Pictures/`.


    Once you have made all of these changes, click the `OK` button to close the Configuration
    Profile editor and then click the `Save` button.


    ## Configuring Applications


    We are nearly ready to deploy these new Macs. The final step is to assign applications
    that will be installed by Profile Manager and via `Munki`.


    ### Assigning App Store Apps


    While we are in Profile Manager, we might as well assign our `Microsoft Office`
    applications. Like we did in previous chapters, select the `Design Team` device
    group and then click the `Apps` tab. Click the `+` button in the bottom portion
    of the page to bring up our library of available Apps. Click the `All Kinds` menu
    and select `macOS` to filter out the iOS versions as shown in Figure 13-14.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig14_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig14_HTML.jpg)


    Figure 13-14


    Select macOS to filter out Apps that are not compatible with macOS


    Assign the `macOS` versions of `Microsoft Word`, `Excel`, `PowerPoint`, and `Outlook`
    to our Device Group and leave the default `Installation Mode` as `Automatic`.
    Click `OK` to assign the applications and then click `Save` to apply them.


    Pro Tip


    If you see a message about not having enough licenses for these Apps, you can
    always go back to the Volume Purchase area of the Apple School Manager/Apple Business
    Manager portal and acquire additional seats.'
  raw: '### Configuration Profile Settings


