    # Apple 平台简史


    了解苹果当前硬件和操作系统平台的一些历史背景非常重要，因为你在苹果生态系统中的日常工作中可能会接触到其中一些较旧的产品。


    `Macintosh` 是苹果公司台式机和笔记本电脑的品牌。第一台 Mac 于 1984 年出货，近 40 年来一直是标志性产品。Mac 产品线包括台式机如
    `iMac`、`Mac mini` 和 `Mac Pro`，以及笔记本电脑如 `MacBook Pro` 和 `MacBook Air`。


    多年来，Mac 的内部硬件发生了重大变化。最初在 20 世纪 80 年代基于 `Motorola 68k` 处理器架构，90 年代转向 `IBM PowerPC`
    架构，最终在 21 世纪初转向 `Intel` 架构。如今，所有 Macintosh 系统都采用与基于 Windows 的 PC 相同的英特尔处理器规格。使用
    `Boot Camp` 或虚拟化解决方案，你可以在苹果当前的任何 Mac 硬件上同时运行 `Microsoft Windows 10` 和 `macOS`。


    自 20 世纪 80 年代以来，`Macintosh 操作系统` (`macOS`) 也经历了演变。Mac OS 版本 `1.0`–`9.2` 现在被称为
    Mac OS "Classic"，最初是为 Motorola 和 IBM 架构编写的。苹果在 21 世纪初逐步停止了对该操作系统及相关软件的支持。1996
    年，苹果收购了一家名为 `NeXT` 的小型软件公司，这使商业传奇人物兼苹果联合创始人 `Steve Jobs` 重回公司。NeXT 拥有一个基于 Unix
    的操作系统，名为 `NeXTSTEP`，它成为了苹果所有未来软件平台（从 `macOS` 到 `iOS` 及其他）的基础。


    苹果 Mac 操作系统的下一个阶段被称为 `Mac OS X` (`10`)。从 `10.0` 到 `10.8` 的每个 Mac OS X 版本都以猫科动物命名：`Snow
    Leopard` (`10.6`)、`Lion` (`10.7`)、`Mountain Lion` (`10.8`) 等等。最终，苹果用尽了猫科动物的名字，开始以加州的地标来命名他们的操作系统，包括
    `Mavericks` (`10.9`)、`Yosemite` (`10.10`)、`El Capitan` (`10.11`)、`Sierra` (`10.12`)、`High
    Sierra` (`10.13`)、`Mojave` (`10.14`) 以及最近的 `Catalina` (`10.15`)。


    大约在苹果将代号从猫科动物改为加州地名的时候，他们在 `WWDC 2014` 上宣布，将把更多 iOS 的特性引入 Mac。这演变成了一次更大的范式转变，因为苹果鼓励系统管理员使用
    `移动设备管理` (MDM) 工具来管理基于 macOS 的计算机，其方式类似于他们管理运行 `iOS` 的移动设备。本书大部分内容将聚焦于这些较新的 `macOS`
    版本，以及苹果要求管理员为 Mac 平台接受的现代化管理理念。


    尽管 Macintosh 多年来一直是苹果最具标志性的品牌，但其最受欢迎的产品（基于市场份额）无疑是 `iPhone`。iPhone 于 2007 年发布，它是一款完全重新构想的手机，使用了
    `多点触控` 触摸屏和基于 Mac OS X 相同技术的图形用户界面。2010 年，苹果发布了 `iPad` 平板电脑，它也配备了触摸屏并运行与 `iPhone`
    相同的操作系统。最初在 iPhone 上起步的移动操作系统更名为 `iOS`，成为苹果第二大主要消费级操作系统，也是最受欢迎的。


    随着 2019 年夏季最新 `iPhone` 产品线的发布，苹果的 `iOS` 现已发展到第 `13` 版。苹果还为 iPad 指定了 iOS 13 的一个特殊版本，现在称为
    `iPadOS`。我将在本书中解释 `iPadOS` 相对于标准 `iOS` 的差异和优化。


    ## macOS 简介


    本书重点介绍最新版本 `macOS` 中的技术，特别是 `Sierra` (`10.12`)、`High Sierra` (`10.13`)、`Mojave`
    (`10.14`) 和 `Catalina` (`10.15`) 中的技术。这些是大多数技术人员会遇到的操作系统，因为其中至少有一个版本支持最早可追溯到 2009
    年制造的 Mac 硬件。图 1-1 快速概述了这些操作系统之间的差异。


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig1_HTML.jpg](img/492151_1_En_1_Fig1_HTML.jpg)


    图 1-1


    截至本书出版时，macOS 的四个最新版本

