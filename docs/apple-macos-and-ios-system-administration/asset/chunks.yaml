- fmt: '# Directory Structure


    To best understand how to manage and troubleshoot `macOS`, it is important to
    be familiar with three key areas of the operating system’s directory structure.
    In this section, we are going to explore the `System` folder, the `User` folder,
    and the hidden Unix `private` directory. We are going to use the `Go` menu and
    the `Go to Folder…` option as seen in Figure [2-39](#492151_1_En_2_Chapter.xhtml#Fig39).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig39_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig39_HTML.jpg)


    **Figure 2-39: The Go To Folder… menu item**


    To browse to the `System` folder, we will use the `Go` menu and select `Computer`.
    This will bring us to the root of the Macintosh HD. You are already somewhat familiar
    with the System folder when we were browsing for the User Template directory.
    There are two folders that work together to make up the core of `macOS`—`System`
    and `Library`. These folders include system-wide settings, drivers, system files,
    and any third-party extensions that are installed along with various applications.


    As part of Apple’s *System Integrity Protection* (SIP) initiative, most of these
    directories are read-only. Starting with `macOS Catalina`, Apple also stores the
    base set of applications that are included by default with the operating system
    in a symbolically linked Applications folder in `/System/Applications`. These
    folders are all on a separate read-only volume and included in the overall `Macintosh
    HD` container, which, along with the user-modifiable `Macintosh HD – Data` volume,
    appears like a single drive to the end user as illustrated in Figure [2-40](#492151_1_En_2_Chapter.xhtml#Fig40).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig40_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig40_HTML.jpg)


    **Figure 2-40: The System folder now contains the stock applications that ship
    with the operating system in macOS Catalina**


    Next, we can use the `Go` menu with the `option` key modifier to make the `Library`
    folder appear as an option on the list. Select `Library`, and a new Finder window
    will appear and take you to the `/Users/username/Library` directory as shown in
    Figure [2-41](#492151_1_En_2_Chapter.xhtml#Fig41). Please note that this Library
    folder is different from the system-wide Library folder in that it is unique to
    the *currently signed-in user* and hidden by default.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig41_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig41_HTML.jpg)


    **Figure 2-41: The user’s Library folder and Preferences directory**


    This user Library folder, sometimes referred to as `~/Library` where the tilde
    represents the path to the current user’s home directory, contains the various
    settings and application support data that are unique to that user. One key subfolder
    to be familiar with is the `Preferences` folder, which contains `Property List`
    files that control application-specific settings.


    Typically, when an application launches for the first time, it writes its default
    preferences to this directory. Upon subsequent launches, if the preferences data
    exists, it will be read and loaded at application launch time. If the data does
    not exist, the application will write new default preferences again. Therefore,
    a common first step to troubleshooting an application that is having an issue
    is to try to remove a support folder or Property List file to see if resetting
    the preferences to default results in a fix.


    Next, let’s use the `Go` menu’s `Go to Folder…` option to browse the hidden Unix
    `private` directory at the root of the Macintosh HD as shown in Figure [2-42](#492151_1_En_2_Chapter.xhtml#Fig42).
    This is essentially the Unix core of `macOS` and includes various directories
    like `/etc`, `/var`, and `/tmp`. It is usually for the best to leave these directories
    alone, but if you browse through `/tmp` (temp folder), there are caches here that
    various applications dump data into that get deleted on a regular basis through
    the reboot process. We will use the `/tmp` directory later when scripting mass
    application installations.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig42_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig42_HTML.jpg)


    **Figure 2-42: The hidden Unix private folder and its contents**


    Finally, let’s open the Terminal again and at the command prompt type:


    ```

    cd /

    ```


    to move to the root of our startup disk. Next, use:


    ```

    ls

    ```


    to list the contents of the directory. In addition to the folders we would expect
    to see like `System`, `Library`, and `Applications`, we also see a number of other
    folders like `bin`, `sbin`, `usr`, `dev`, `cores`, and `opt`. These are additional
    hidden folders that are used by the operating system, similar to the `/private`
    folder. You can explore these folders on your own, but be aware that these are
    best left alone for the OS to function as expected.


    ## Application Bundles


    `Application bundles`, or `application packages` as they are sometimes referred
    to, are really a type of folder or container that looks like a single file to
    the end user but is actually a self-contained executable with supporting data
    in one package. We can `right-click` the application icon and choose to `Open
    Package Contents` to drill down into the support files included in this bundle.
    This is rarely used on a day-to-day basis, but it is worth knowing that there
    is more to an application than meets the eye.


    > **Pro Tip**

    >

    > Remember the command we used to create the bootable macOS Install USB drive
    earlier in this chapter? If you look at the script we ran, you will see that there
    is a path to the `createinstallmedia` command that is located in the `Resources`
    folder inside of the `Install macOS Catalina` application bundle. Open the package
    contents of this bundle and see if you can browse to the `createinstallmedia`
    file that we referenced in the script.


    ## Kernel Extensions


    Kernel extensions, or `kexts` for short, are small bits of code that are loaded
    into the operating system kernel and provide support for hardware or other components.
    You will typically see third-party kexts used with external hardware like pro
    audio mixers that connect via Thunderbolt or USB. You can view these kext files
    by browsing to `/System/Library/Extensions` or by running the `kextstat` command
    via the Terminal as shown in Figure [2-43](#492151_1_En_2_Chapter.xhtml#Fig43).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig43_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig43_HTML.jpg)


    **Figure 2-43: Output from the kextstat command showing all running kernel extensions**


    Starting with `macOS High Sierra`, Apple introduced a new security feature that
    requires users to *approve* kexts the first time they need to load. The user is
    prompted to approve them with a dialog box and then redirected to the *Security
    & Privacy System Preference* to click the `Approve` button under the `General`
    tab. Apple has continued to increase the security around kexts in `Mojave` and
    `Catalina`, both of which require kexts to be *code-signed* by developers. It
    is also important to note that if you zap the `NVRAM`, all authorized kexts must
    be reauthorized again.


    > **Pro Tip**

    >

    > If you are using applications or workflows that involve kexts, it is a best
    practice to make sure you are using the latest application releases to avoid issues
    due to security requirements that Apple continues to tweak. You should also consult
    with the developers of applications that use kexts extensively to ensure compatibility
    before approving an OS update on your client systems. Even small updates like
    a move from `10.15.0` to `10.15.1` run the risk of breaking software compatibility.'
  raw: '### Directory Structure


    To best understand how to manage and troubleshoot *macOS*, it is important to
    be familiar with three key areas of the operating system’s directory structure.
    In this section, we are going to explore the **System folder**, the **User folder**,
    and the **hidden Unix private directory**. We are going to use the **Go** menu
    and the **Go to Folder…** option as seen in Figure [2-39](#492151_1_En_2_Chapter.xhtml#Fig39).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig39_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig39_HTML.jpg)


    Figure 2-39


    The Go To Folder… menu item


    To browse to the **System** folder, we will use the **Go** menu and select **Computer**.
    This will bring us to the root of the Macintosh HD. You are already somewhat familiar
    with the System folder when we were browsing for the User Template directory.
    There are two folders that work together to make up the core of macOS—System and
    Library. These folders include system-wide settings, drivers, system files, and
    any third-party extensions that are installed along with various applications.


    As part of Apple’s *System Integrity Protection* (SIP) initiative, most of these
    directories are read-only. Starting with *macOS Catalina*, Apple also stores the
    base set of applications that are included by default with the operating system
    in a symbolically linked Applications folder in ***/System/Applications***. These
    folders are all on a separate read-only volume and included in the overall **Macintosh
    HD** container, which, along with the user-modifiable **Macintosh HD – Data**
    volume, appears like a single drive to the end user as illustrated in Figure [2-40](#492151_1_En_2_Chapter.xhtml#Fig40).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig40_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig40_HTML.jpg)


    Figure 2-40


    The System folder now contains the stock applications that ship with the operating
    system in macOS Catalina


    Next, we can use the **Go** menu with the **option** key modifier to make the
    ***Library*** folder appear as an option on the list. Select **Library,** and
    a new Finder window will appear and take you to the ***/Users/username/Library***
    directory as shown in Figure [2-41](#492151_1_En_2_Chapter.xhtml#Fig41). Please
    note that this Library folder is different from the system-wide Library folder
    in that it is unique to the *currently signed-in user* and hidden by default.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig41_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig41_HTML.jpg)


    Figure 2-41


    The user’s Library folder and Preferences directory


    This user Library folder, sometimes referred to as ***~/Library*** where the tilde
    represents the path to the current user’s home directory, contains the various
    settings and application support data that are unique to that user. One key subfolder
    to be familiar with is the **Preferences** folder, which contains **Property List**
    files that control application-specific settings.


    Typically, when an application launches for the first time, it writes its default
    preferences to this directory. Upon subsequent launches, if the preferences data
    exists, it will be read and loaded at application launch time. If the data does
    not exist, the application will write new default preferences again. Therefore,
    a common first step to troubleshooting an application that is having an issue
    is to try to remove a support folder or Property List file to see if resetting
    the preferences to default results in a fix.


    Next, let’s use the **Go** menu’s **Go to Folder…** option to browse the hidden
    Unix **private** directory at the root of the Macintosh HD as shown in Figure
    [2-42](#492151_1_En_2_Chapter.xhtml#Fig42). This is essentially the Unix core
    of *macOS* and includes various directories like ***/etc***, ***/var***, and ***/tmp***.
    It is usually for the best to leave these directories alone, but if you browse
    through /tmp (temp folder), there are caches here that various applications dump
    data into that get deleted on a regular basis through the reboot process. We will
    use the /tmp directory later when scripting mass application installations.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig42_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig42_HTML.jpg)


    Figure 2-42


    The hidden Unix private folder and its contents


    Finally, let’s open the Terminal again and at the command prompt type `cd /` to
    move to the root of our startup disk. Next, use `ls` to list the contents of the
    directory. In addition to the folders we would expect to see like **System, Library**,
    and **Applications**, we also see a number of other folders like **bin**, **sbin**,
    **usr**, **dev**, **cores**, and **opt**. These are additional hidden folders
    that are used by the operating system, similar to the **/private** folder. You
    can explore these folders on your own, but be aware that these are best left alone
    for the OS to function as expected.


    ### Application Bundles


    *Application bundles*, or *application packages* as they are sometimes referred
    to, are really a type of folder or container that looks like a single file to
    the end user but is actually a self-contained executable with supporting data
    in one package. We can **right-click** the application icon and choose to **Open
    Package Contents** to drill down into the support files included in this bundle.
    This is rarely used on a day-to-day basis, but it is worth knowing that there
    is more to an application than meets the eye .


    Pro Tip


    Remember the command we used to create the bootable macOS Install USB drive earlier
    in this chapter? If you look at the script we ran, you will see that there is
    a path to the `createinstallmedia` command that is located in the **Resources**
    folder inside of the **Install macOS Catalina** application bundle. Open the package
    contents of this bundle and see if you can browse to the **createinstallmedia**
    file that we referenced in the script.


    ### Kernel Extensions


    Kernel extensions, or *kexts* for short , are small bits of code that are loaded
    into the operating system kernel and provide support for hardware or other components.
    You will typically see third-party kexts used with external hardware like pro
    audio mixers that connect via Thunderbolt or USB. You can view these kext files
    by browsing to ***/System/Library/Extensions*** or by running the `kextstat` command
    via the Terminal as shown in Figure [2-43](#492151_1_En_2_Chapter.xhtml#Fig43).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig43_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig43_HTML.jpg)


    Figure 2-43


    Output from the kextstat command showing all running kernel extensions


    Starting with macOS High Sierra, Apple introduced a new security feature that
    requires users to *approve* kexts the first time they need to load. The user is
    prompted to approve them with a dialog box and then redirected to the *Security
    & Privacy System Preference* to click the **Approve** button under the **General**
    tab. Apple has continued to increase the security around kexts in *Mojave* and
    *Catalina*, both of which require kexts to be *code-signed* by developers. It
    is also important to note that if you zap the NVRAM, all authorized kexts must
    be reauthorized again .


    Pro Tip


    If you are using applications or workflows that involve kexts, it is a best practice
    to make sure you are using the latest application releases to avoid issues due
    to security requirements that Apple continues to tweak. You should also consult
    with the developers of applications that use kexts extensively to ensure compatibility
    before approving an OS update on your client systems. Even small updates like
    a move from 10.15.0 to 10.15.1 run the risk of breaking software compatibility.'
