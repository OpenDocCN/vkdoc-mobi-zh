    \ to keep in mind if you are mass deploying iOS devices on a wireless network\
    \ that uses Network Address Translation (NAT) is that Apple can restrict multiple\
    \ over-the-air activations of iOS devices from the same public IP address if they\
    \ happen in rapid succession. For example, in large organizations like schools\
    \ where you may have tens or hundreds of devices activating at the same time,\
    \ you may run into failed activation issues. I would recommend speaking with your\
    \ organization’s Apple rep about whitelisting your public IP addresses to avoid\
    \ this issue.\n\nThis process is very similar for *macOS* clients with the exception\
    \ of a few unique Mac-only features. Explore the basic enrollment settings and\
    \ configure your Test Mac to enroll during Setup Assistant and skip all but the\
    \ Terms and Conditions prompt. You should be able to easily enroll your test Mac\
    \ client into MDM using DEP. Give it a shot!"
  trans: "\n# 设备注册计划（DEP）与设置助手的集成\n\n目前，在 MDM 中注册设备的最佳选项是在设备运行`设置助手`时使用`DEP`。通过这种方式，你不仅可以强制注册，而且每次设备激活时都会进行注册，这意味着即使设备被重置或恢复，它也会在用户登录之前再次自动被管理。当设备以这种方式注册时，必要的信任证书也会被安装，因此设备将自动配置为信任你的`MDM`。当信任证书到位后，通过我们的`MDM`解决方案推送`配置描述文件`时，我们就不需要对其签名了。\n\
    \n这种注册方法的主要缺点是，你需要将`Apple 校园教务管理`或`Apple 商务管理`与你的`MDM`配置好，并且设备必须位于你的`DEP`数据库中。如果你确实已将`DEP`集成与`MDM`配置好，并且你直接从苹果或通过参与的`苹果授权经销商`购买设备，那么这就是你应该选择的方法。\n\
    \n## 使用 DEP 进行 MDM 注册\n\n在这个例子中，我们将使用`设置助手`集成功能将一台测试`iPad`注册到我们的`描述文件管理器 MDM`中。承接前一章的内容，我们应该已经有一台测试`iOS`设备作为占位符添加到了`MDM`中。`描述文件管理器`的`设备`列表应类似于图\
    \ 9-3，其中至少列出了一台`iOS`设备。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig3_HTML.jpg](img/492151_1_En_9_Fig3_HTML.jpg)\n\
    \n**图 9-3**\n\n在`Apple 校园教务管理`中将设备分配给我们的`MDM`服务器时，由`DEP`创建的`iPad`占位符\n\n1.  注册设备的第一步是点击`设备`列表中的`iPad`占位符，然后点击`设置`选项卡。\n\
    2.  向下滚动到`注册设置`➤`设置助手期间注册`，如图 9-4 所示。勾选以下复选框：\n    1.  `在设置助手期间提示用户注册设备`\n   \
    \ 2.  `不允许用户跳过注册步骤`\n    3.  `监督`\n    4.  `允许与 Mac 配对（已弃用）`\n    这些设置将强制设备在`设置助手`期间注册，并且允许任何最终用户注册它。一旦注册完成，它也将被监督，这样我们就可以使用全套配置工具来管理它。\n\
    \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig4_HTML.jpg](img/492151_1_En_9_Fig4_HTML.jpg)\n\
    \n**图 9-4**\n\n`设置助手期间注册`设置\n\n3.  接下来，再向下滚动一点到`设置助手选项`部分，如图 9-5 所示。除以下项外，取消勾选所有选项：\n\
    \    1.  `密码锁`\n    2.  `外观`\n    3.  `新功能亮点`\n    4.  `欢迎`\n    我们将使用此设置来测试注册是否成功，方法是跳过除密码锁设置、暗色模式提示、`iPadOS`功能演示和`欢迎`屏幕之外的所有选项。点击窗口右下角的`保存`按钮。\n\
    \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig5_HTML.jpg](img/492151_1_En_9_Fig5_HTML.jpg)\n\
    \n**图 9-5**\n\n`设置助手选项`\n\n4.  你可以点击`活动`选项卡，确认`iPad`的`DEP 描述文件`已上传到`Apple 校园教务管理`/`Apple\
    \ 商务管理`，从而准备好在`设置助手`期间进行注册，如图 9-6 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig6_HTML.jpg](img/492151_1_En_9_Fig6_HTML.jpg)\n\
    \n**图 9-6**\n\n确认我们的设置更改已上传至`ASM`\n\n5.  接下来，拿起测试`iPad`，确保它运行的是全新安装的操作系统。如果它已经被激活，在尝试将其注册到`MDM`之前，请使用`抹掉所有内容和设置`选项或通过`iTunes`/`访达`进行恢复。\n\
    6.  启动`iPad`，逐步完成加入`Wi-Fi`网络和激活过程。一旦通过初始激活步骤，它应该会提示你安装`配置描述文件`，如图 9-7 所示。如果没有显示此屏幕，请重新检查这些步骤，恢复/重置`iOS`设备，然后重试。\n\
    \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig7_HTML.jpg](img/492151_1_En_9_Fig7_HTML.jpg)\n\
    \n**图 9-7**\n\n我们测试`iPad`上的`远程管理`提示\n\n7.  如果回到`描述文件管理器`，你会看到`活动`选项卡将显示设备已注册，并且我的设备上的`占位符`标签已被移除，如图\
    \ 9-8 所示，表明它现在已被管理。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig8_HTML.jpg](img/492151_1_En_9_Fig8_HTML.jpg)\n\
    \n**图 9-8**\n\n设备注册确认和时间/日期戳\n\n8.  你也可以浏览到`设置`➤`远程管理`，看到我们的“MyCompany”`MDM 描述文件`和证书已安装，如图\
    \ 9-9 所示。你的用户还将在`设置`窗口的左上角看到你的监督标识。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig9_HTML.jpg](img/492151_1_En_9_Fig9_HTML.jpg)\n\
    \n**图 9-9**\n\n我们的`管理描述文件`已安装，设备已受监督\n\n9.  点击`下一步`以逐步完成配置过程。这将需要几分钟时间来配置设备并将其注册到`MDM`中。然后它会提示你设置密码、选择浅色或深色模式、向你介绍`iPadOS`功能，最后用`欢迎`和`开始使用`按钮问候你，带你进入`主屏幕`。\n\
    \n## 专业提示\n\n如果你在使用了`网络地址转换 (NAT)`的无线网络上大规模部署`iOS`设备，需要记住的一件事是：如果`iOS`设备从同一个公网`IP`地址连续快速地进行空中激活，苹果可能会限制多台设备的激活。例如，在学校这样的大型组织中，你可能同时有数十或数百台设备在激活，你可能会遇到激活失败的问题。我建议与你所在机构的苹果代表沟通，将你的公网`IP`地址加入白名单，以避免此问题。\n\
    \n对于`macOS`客户端，此过程非常相似，除了少数仅适用于 Mac 的独特功能。探索基本注册设置，并将你的`测试 Mac`配置为在`设置助手`期间注册，并跳过除`条款与条件`提示之外的所有步骤。你应该能够使用`DEP`轻松地将你的测试`Mac`客户端注册到`MDM`中。试试看！\n"
- fmt: '### My Devices Portal


    The next way to enroll your devices is to use the self-service `My Devices Portal`
    built into `Profile Manager`. There are a couple of caveats with the Device Portal
    Enrollment method. This is really meant to be used in “bring your own device”
    (BYOD) deployments, so your iOS devices will not be able to be supervised. In
    addition to that limitation, the MDM enrollment can be removed at any time by
    the end user without your knowledge. The main benefit of using the `My Devices
    Portal` is so that your organization’s users can enroll in MDM without needing
    to hand their device over to you (the IT department) for configuration.


    To configure self-service enrollment, we need to make a couple of quick adjustments.
    I would recommend that you disable the ability for the Everyone group to access
    the `My Devices Portal` as shown in Figure [9-10](#492151_1_En_9_Chapter.xhtml#Fig10).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig10_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig10_HTML.jpg)


    Figure 9-10


    Uncheck the Allow access to My Devices Portal option


    I would also recommend creating a new User Group called `BYOD` or `Self Service`
    and restricting access to the `My Devices Portal` to users that are members of
    that group. You should implement some kind of access management process like a
    web form or a trouble-ticket to your IT department whereby a user requests BYOD
    access and provides you with their device serial number so you can set up a Placeholder
    for the device and add the user to the `BYOD` group. That way you won’t have any
    rogue devices being added without your knowledge or consent.


    **Pro Tip**


    If you are using `Apple School Manager` or `Apple Business Manager`, you should
    manage your Users and Groups using the management portal or configure `Azure AD`
    integration. Otherwise, you can use `Users and Groups` in the `Server app` to
    create these accounts.


    Once you have the required users and groups in place, ensure that the new `BYOD`
    group that you created has the ability to access the `My Devices Portal` and associated
    settings as shown in Figure [9-11](#492151_1_En_9_Chapter.xhtml#Fig11) for my
    `All ASM Persons` group. Next, we need to configure a Placeholder for the personal
    device and associate it with our end user.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig11_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig11_HTML.jpg)


    Figure 9-11


    Configure the restrictions on your self-service group to allow for My Devices
    Portal access


    ## Create a Placeholder Device For BYOD Enrollment


    For this example, I’m going to set up my personal iPhone as the placeholder and
    assign it to my user in `Apple School Manager`.


    1.  The first thing we need to do is configure a Placeholder for this iPhone.
    Click the `Devices` button in the sidebar and then click the `+` button and choose
    `Add a Placeholder` to create a new Placeholder as shown in Figure [9-12](#492151_1_En_9_Chapter.xhtml#Fig12).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig12_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig12_HTML.jpg)


    Figure 9-12


    Click the + button to define a new Placeholder


    2.  When prompted to create a new Placeholder, I will choose `iOS` as the `Device
    Type`, the `Name of the Device`, and the serial number or other unique identifier
    like `UDID` or `MEID`. Go ahead and enter the information for your device. When
    complete, you should have a placeholder device like the one I do in Figure [9-13](#492151_1_En_9_Chapter.xhtml#Fig13).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig13_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig13_HTML.jpg)


    Figure 9-13


    The placeholder I created for my personal device


    3.  Now that we have a placeholder device, we need to assign that device to our
    user. I have created a test user named `Drew Smith` in `Apple School Manager`.
    In `Profile Manager`, select `Users` in the sidebar, and then select your test
    user and click the `Devices` tab as shown in Figure [9-14](#492151_1_En_9_Chapter.xhtml#Fig14).
    Click the `+` button ➤ `Add Devices` and then in the pop-up dialog box add the
    BYOD placeholder device to the user. Click the `Done` button, and then click the
    `Save` button to continue.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig14_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig14_HTML.jpg)


    Figure 9-14


    Add the placeholder device to the test user


    Now that we have configured everything, let’s test this out as if we were the
    end user. Go to your personal device and open `Safari` or another browser of your
    choice and go to `http://yourdomain/mydevices`—where *yourdomain* is the domain
    you are using for `Profile Manager`. In my case, it’s `http://579testing.com/mydevices`.
    Sign in using the username associated with the placeholder device as shown in
    Figure [9-15](#492151_1_En_9_Chapter.xhtml#Fig15).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig15_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig15_HTML.jpg)


    Figure 9-15


    The My Devices Portal on my iPhone


    Once you have signed in, you will want to do two things. First, you will want
    to enroll the device, so click the big blue `Enroll` button and follow the prompts
    to download the `Enrollment Profile` as shown in Figure [9-16](#492151_1_En_9_Chapter.xhtml#Fig16).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig16_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig16_HTML.jpg)


    Figure 9-16


    Click the Enroll button to download the Enrollment Profile


    Next, click the `Profiles` tab and click the big `Install` button to install a
    `Trust Profile` for your organization as shown in Figure [9-17](#492151_1_En_9_Chapter.xhtml#Fig17).
    This will ensure that all of the Profiles and commands sent from your MDM to the
    device will be trusted by the device.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig17_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig17_HTML.jpg)


    Figure 9-17


    Download the Trust Profile for our MDM to the device


    Finally, close `Safari` and open the `Settings` app and browse to `General` ➤
    `Profiles` and find the `Remote Management Profile` we downloaded. Click the `Install`
    button to enable MDM on the test device as shown in Figure [9-18](#492151_1_En_9_Chapter.xhtml#Fig18).
    You can confirm that it is installed on the device by browsing to `General` ➤
    `Device Management`, and you will see our `Remote Management` server information
    here.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig18_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig18_HTML.jpg)


    Figure 9-18


    Install the Mobile Management Profile


    We can also confirm that the device has been added successfully in `Profile Manager`.
    Open the `Profile Manager` console again and click the `Devices` button in the
    sidebar. You should see our new device is now there and is no longer a placeholder
    as shown in Figure [9-19](#492151_1_En_9_Chapter.xhtml#Fig19).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig19_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig19_HTML.jpg)


    Figure 9-19


    My iPhone is now enrolled in my MDM and can be managed


    At this point, we can manage this device as long as the end user doesn’t remove
    the `Management Profile`. Please note that since this is not a supervised device,
    the ability to apply certain payloads will be restricted.


    Before we move on, this is a good place to demonstrate how to `unenroll` a device
    using the `Profile Manager` console. There are a number of reasons why you may
    want to do this. For example, if this is a BYOD device and the user has left your
    organization, you will probably want to remove the device, especially if the user
    wasn’t savvy enough to remove the `Management Profile` when they left.'
