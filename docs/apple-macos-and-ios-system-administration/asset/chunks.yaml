    # 设备注册计划 (DEP)


    苹果公司的设备注册计划 (`DEP`) 是一项服务，当您直接购买设备或通过参与的苹果授权经销商购买设备时，苹果公司会提供此项服务。其运作方式是：当您的组织购买苹果设备时，苹果托管的数据库中会创建一条记录。每条记录包含设备型号信息、序列号以及（如果适用）其所属的特定移动设备管理（MDM）服务器。客户通过两个客户门户之一——`Apple
    School Manager`（苹果学校管理器）或`Apple Business Manager`（苹果商务管理器）——与`DEP`交互。这些在线门户允许您查找新设备并将其分配给特定的
    MDM 服务器。随着新设备的购买和发货，苹果会在数据库中填充新的设备记录。


    **专业提示**


    如果您有一台现有设备想要添加到您组织的`DEP`数据库中，您可以在`Apple Configurator`（苹果配置器）中手动完成此操作。如果您从一家不参与`DEP`的经销商处购买了设备，这也非常有用。您有
    30 天时间将设备从`DEP`中移除，之后该设备将被锁定为属于您组织的资产。尽管这听起来很诱人，但不建议将任何`BYOD`（自带设备）或最终用户个人拥有的设备添加到您组织的`DEP`数据库中。


    设备注册计划有两个非常具体的功能。首先，它为您所有的苹果设备提供了购买历史的证明。您可以通过序列号查找任何设备，查看它何时被添加到`DEP`（大致购买日期）、设备的型号/规格、以及用于购买的采购订单号和/或账户号。当您需要联系`AppleCare`（苹果客服）并且他们需要验证购买证明时，这些信息尤其有用。第二个功能是能够将设备分配到
    MDM 服务器，以便您可以在"设置助理"流程中应用配置描述文件。


    如图 8-1 所示，这个过程对最终用户是透明的。您可以使用`DEP`将设备分配给 MDM 服务器，并通过该 MDM 配置设备的限制、设置和应用程序。当用户完成欢迎屏幕并通过苹果激活设备时，设备会联系您的
    MDM 服务器，甚至在用户进入主屏幕或桌面之前就应用所需的配置设置——从而有效地管理设备，而无需 IT 人员实际接触设备。


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig1_HTML.jpg](img/492151_1_En_8_Fig1_HTML.jpg)


    **图 8-1**

    展示了`DEP`和`MDM`如何协同工作，以无线方式配置新设备的示意图


    # 批量购买计划 (VPP)


    假设您需要为组织中每台 iPad 和 Mac 安装`Microsoft Office`套件。您希望能够自动完成此操作，无需最终用户干预，分别从`App Store`（应用商店）和`Mac
    App Store`（Mac 应用商店）推送安装。同时，您还希望确保用户在收到提示时可以使用自己的`Apple ID`（苹果账号）更新应用，而不是使用单一共享的机构`Apple
    ID`。苹果为此场景提供了一个解决方案，称为批量购买计划 (`VPP`)。


    苹果的`VPP`允许系统管理员从 App Store 购买任意数量的免费或付费应用，并将该应用的许可证分配给一个特定的`Apple ID`。该应用的许可证随时可以从特定用户处移除，然后分配给另一个用户。这使得组织可以为任何参与计划的应用购买一组许可证池，在用户需要时分配给他们，在不再需要时移除许可证。当许可证被移除时，它会重新放回许可证池，以便可以分配给其他用户。


    **专业提示**


    您可以将`托管式 Apple ID`或个人`Apple ID`与`VPP`结合使用。当您移除某个应用的许可证时，用户将收到应用许可证已被移除的通知，并且他们最多有
    30 天时间从该应用的容器中导出数据，或自行购买许可证以继续使用该应用。30 天的宽限期过后，该应用将从设备上消失。


    开发者必须选择加入，才能让他们的应用通过`VPP`进行购买。批量购买应用有时会有`VPP`折扣，或者如果您是学术机构的一部分，也可能适用教育折扣。这完全取决于应用开发者或出版商（例如`iBooks`）的决定。


    **专业提示**


    对于`iBooks`（现在是 Apple Books）而言，可以批量购买教科书或其他书籍的许可证，但与应用程序不同，它们无法被分配、然后移除并重新分配给另一个`Apple
    ID`。一旦一本书被分配给一个用户，它就归该用户所有，无法退回许可证池。


    # 监管与用户批准的 MDM


    正如我们之前讨论过的，移动设备管理 (MDM) 是一种无线解决方案，用于向最终用户配置、保护、部署设备，以及管理设备，而无需 IT 人员物理接触这些设备。总体而言，这种统一设备管理的理念非常吸引人，因为我可以像管理`iOS`设备一样管理我的`macOS`客户端，但需要注意平台之间的一些重要差异。


    ## 设备监管


    在第 5 章中，我们讨论了与`iOS`设备和`Apple Configurator`相关的监管。由于`iOS`被设计为单用户操作系统，出于安全和支持考虑，它没有独立的"标准用户"和"管理员用户"来锁定操作系统的特定部分。监管是一种管理组织自有设备的方式，就像系统管理员在台式电脑上使用管理员账户一样。就像我们在`Apple
    Configurator`中所做的那样，您可以通过 MDM 解决方案监管`iOS`设备，从而获得完整的负载项目录访问权限，以限制和保护设备。

    '
- fmt: '# User Approved MDM


    在`macOS`中，没有监管模式，因为它被设计为一个多用户操作系统。您可以将配置描述文件负载应用到Mac客户端，只要用户不是本地管理员，就无法删除它。需要注意的是，任何在Mac上拥有本地管理员权限的用户都可以使用`Profiles
    System Preference`删除任何配置描述文件。如果您使用MDM来保护您的Mac，请确保您的用户帐户是`Standard`或`Managed`。


    > Pro Tip

    >

    > `Profiles System Preference`只有在安装了配置描述文件后才会可见。


    您在`macOS`客户端上安装的大多数配置描述文件在分配后会立即生效。有一类特殊的配置描述文件负载子集需要最终用户批准后才能生效。这些负载与Apple的透明度、同意和控制（TCC）计划相关。具体来说，这些是隐私偏好策略控制负载和内核扩展（kext）策略负载。


    有两种方式安装包含这类负载的配置描述文件。一种是在设备上交互式地双击`.mobileconfig`描述文件并逐步完成安装和批准对话框。另一种是通过MDM解决方案推送配置描述文件，前提是该设备是通过DEP注册的。


    > Pro Tip

    >

    > Apple非常坚持与TCC相关的负载需要最终用户在设备上亲自批准。为此，他们甚至禁用了与`Profiles System Preference`交互以通过Apple
    Remote Desktop或Screen Sharing远程批准描述文件的能力。


    以下是一些需要用户批准的MDM来管理的负载示例：


    *   照片

    *   相机

    *   麦克风

    *   提醒事项

    *   通讯录（联系人）

    *   辅助功能


    > Pro Tip

    >

    > 相机和麦克风访问只能通过负载来禁用/拒绝。用户必须在特定应用程序首次使用这些设备时批准其访问权限。


    在第[3]章中，我们介绍了第三方内核扩展（kexts）的主题，以及最终用户需要在首次运行时使用`Security & Privacy System Preference`来批准这些kexts。如果我们的设备是用户批准的MDM设备，我们可以定义并自动将这些kexts列入白名单，使其无需提示最终用户批准即可运行。另一种理解用户批准的MDM的方式是，系统管理员代表最终用户选择批准这类事项。用户批准的MDM是一个我们将在第[9]章中继续演示的主题，届时我们将使用Profile
    Manager注册和管理设备。


    > Pro Tip

    >

    > 监管macOS设备并不会获得特殊的管理能力。截至撰写本文时，管理员帐户在`macOS`上仍然优先于配置描述文件。同样，也没有与用户批准的MDM相当的`iOS`概念，因为这仅适用于Mac。


    # Apple School Manager / Apple Business Manager


    如本章前面提到的，Apple School Manager和Apple Business Manager是Apple为组织提供的非常相似的管理门户，用于管理MDM/DEP和VPP。Apple
    School Manager有一些额外的学术专用功能，例如`Classroom`或`Shared iPad`选项，这些内容本书将不做介绍。我将使用Apple
    School Manager来演示这两个门户的共同功能以及如何与您的MDM解决方案结合使用。


    ## 配置Apple的管理门户


    开始使用Apple School Manager或Apple Business Manager的第一步是创建一个机构`Apple ID`，Apple将用它来创建机构管理员帐户。此`Apple
    ID`必须通过多因素身份验证进行保护，并且不应与单个员工的帐户关联。一旦Apple授予您访问Apple School Manager或Apple Business
    Manager门户的权限，您就可以使用此帐户登录并开始进行设置。根据您所属的组织类型，图[8-2]显示了[`http://school.apple.com`](http://school.apple.com)和[`http://business.apple.com`](http://business.apple.com)的登录窗口。


    ![图8-2](images/492151_1_En_8_Chapter/492151_1_En_8_Fig2_HTML.jpg)


    **图8-2**

    Apple School Manager和Apple Business Manager的登录门户


    登录门户后，您将看到类似于图[8-3]的内容。在这里，您可以管理组织的位置、用户、设备和内容。您可以创建其他用户帐户，并赋予他们各种角色，例如内容管理员或帐户管理员权限，以协助管理您的Apple设备和用户帐户。


    ![图8-3](images/492151_1_En_8_Chapter/492151_1_En_8_Fig3_HTML.jpg)


    **图8-3**

    Apple School Manager主页


    请随意探索并熟悉以下每个标题下的可用选项：


    *   **活动：** 管理门户中近期活动的历史记录。

    *   **位置：** 如果您是拥有多个地点的公司或学校，可以为每个建筑添加位置，并按位置定义唯一的密码策略。例如，在学术环境中，K-6年级与高中的密码限制可能不同。

    *   **帐户：** 在这里管理用户帐户。

    *   **角色：** 在这里管理各种角色（如站点管理员或员工）的权限。

    *   **设备分配：** 这是与设备注册计划数据库交互并将设备分配到特定MDM的区域。

    *   **分配历史：** 这是MDM设备分配的历史记录。

    *   **App 和图书：** 在这里与批量购买计划交互，批量购买内容以通过MDM解决方案分发。


    单击窗口左下角的`Settings`按钮，您将看到如图[8-4]所示的选项。在这里，您可以定义VPP、MDM和客户信息的一些设置。`Device Management
    Settings`按钮将显示您的活动客户编号（用于直接从Apple购买）或经销商ID（如果通过参与的第三方购买）。


    ![图8-4](images/492151_1_En_8_Chapter/492151_1_En_8_Fig4_HTML.jpg)


    **图8-4**

    客户和机构信息'
  raw: '### User Approved MDM


    In *macOS*, there is no Supervision mode because it is built as a multi-user operating
    system. You can apply Configuration Profile payloads to a Mac client, and as long
    as the user is not a local Administrator, they cannot remove it. It is important
    to note that any user with local Administrator privileges on the Mac can remove
    any Configuration Profile using the *Profiles System Preference*. If you are using
    MDM to secure your Macs, be sure that your user accounts are **Standard** or **Managed**.


    Pro Tip


    The *Profiles System Preference* will only be visible once a Configuration Profile
    is installed.


    Most of the Configuration Profiles that you will install on a *macOS* client will
    take effect as soon as they are assigned. There is one subset of Configuration
    Profile payloads that are special and require the end user to approve them before
    they will take effect. These payloads are tied to Apple’s Transparency, Consent,
    and Control (TCC) initiative. Specifically, these are the Privacy Preferences
    Policy Control payload and the Kernel Extension (kext) Policy payload.


    There are two ways to install Configuration Profiles with these kinds of payloads.
    One is interactively on the device by double-clicking the ***.mobileconfig** profile
    and stepping through the installation and approval dialog boxes. The other is
    by pushing the Configuration Profile out via an MDM solution where the device
    was enrolled via DEP.


    Pro Tip


    Apple is very adamant that TCC-related payloads require the end user to approve
    them physically on the device. To this end, they have even disabled the ability
    to interact with the *Profiles System Preference* to approve the Profiles remotely
    using Apple Remote Desktop or Screen Sharing.


    Here are a few payload examples that require User Approved MDM to manage:


    *   Photos


    *   Camera


    *   Microphone


    *   Reminders


    *   Address Book (Contacts)


    *   Accessibility


    Pro Tip


    Both the Camera and Microphone access can only be disabled/denied using the payload.
    The user must approve access to these devices whenever they are used for the first
    time with a specific application.


    In Chapter [3](#492151_1_En_3_Chapter.xhtml) we covered the topic of third-party
    kernel extensions (kexts) and the need for end users to use the *Security & Privacy
    System Preference* to approve these kexts the first time they run. If our devices
    are User Approved, we can define and automatically whitelist these kexts to run
    without prompting the end user to approve them. Another way to think of User Approved
    MDM is that the system administrator is electing to approve these kinds of things
    on behalf of the end user. User Approved MDM is a topic we will continue to demonstrate
    in Chapter [9](#492151_1_En_9_Chapter.xhtml) as we enroll and manage devices with
    Profile Manager.


    Pro Tip


    There are no special management capabilities that you gain by supervising a macOS
    device. The Administrator account still supersedes Configuration Profiles on *macOS*
    as of this writing. Likewise, there is no *iOS* equivalent of User Approved MDM
    as this is a Mac-only concept.


    ## Apple School Manager/Apple Business Manager


    As mentioned earlier in this chapter, Apple School Manager and Apple Business
    Manager are very similar administration portals that Apple provides to organizations
    for the purpose of managing MDM/DEP and VPP. Apple School Manager has a few additional
    academic-only features like *Classroom* or *Shared iPad* options that we will
    not be covering in this book. I will be using Apple School Manager to demonstrate
    the common features of these two portals and how to use them in conjunction with
    your MDM solution.


    ### Configuring Apple’s Management Portal


    The first step in getting started with Apple School Manager or Apple Business
    Manager is creating an institutional *Apple ID* that Apple will use to create
    an institutional Administrator account. This *Apple ID* must be protected via
    multi-factor authentication and should not be tied to a single employee’s account.
    Once Apple grants you access to either the Apple School Manager or Apple Business
    Manager portal, you can use this account to sign in and begin setting things up.
    Figure [8-2](#492151_1_En_8_Chapter.xhtml#Fig2) shows the login windows for [`http://school.apple.com`](http://school.apple.com)
    and [`http://business.apple.com`](http://business.apple.com) depending on the
    type of organization you belong to.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig2_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    The login portals for Apple School Manager and Apple Business Manager


    Once you are signed into the portal, you will see something similar to Figure
    [8-3](#492151_1_En_8_Chapter.xhtml#Fig3). Here you can manage your organization’s
    locations, users, devices, and content. You can create additional user accounts
    and give them various roles such as Content Administrator or Account Administrator
    privileges to assist with managing your Apple devices and user accounts.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig3_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    The main Apple School Manager home page


    Feel free to explore and familiarize yourself with the options available under
    each of these headings:


    *   **Activity:** A history of recent activity in the management portal.


    *   **Locations:** If you are a company or school with multiple locations, you
    can add locations for each of your buildings and define a unique password policy
    by location. In an academic environment, you may want password restrictions that
    are different for K-6 vs. high school, for example.


    *   **Accounts:** This is where you manage user accounts.


    *   **Roles:** This is where you manage the permissions for various roles like
    site manager or staff.


    *   **Device Assignments:** This is the area where you interact with the Device
    Enrollment Program database and assign devices to specific MDMs.


    *   **Assignment History:** This is the history of MDM device assignments.


    *   **Apps and Books:** This is where you interact with Volume Purchase Program
    and make bulk purchases of content to distribute through your MDM solution.


    Click the **Settings** button in the lower-left corner of the window, and you
    will see the options as shown in Figure [8-4](#492151_1_En_8_Chapter.xhtml#Fig4).
    Here you can define some of the settings for VPP, MDM, and Customer Information.
    The **Device Management Settings** button will display your active Customer Number(s)
    for purchases directly from Apple or Reseller IDs if purchasing through a participating
    third-party.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig4_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Customer and institutional information'
