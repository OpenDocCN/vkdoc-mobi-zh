- fmt: '### Apple T2 Security Chip


    Beginning with the release of the `iMac Pro` in late 2017, Apple began shipping
    most new Macs with a next-generation custom chip called `T2`. The T2 integrates
    a number of different hardware controllers into a single chip with an eye toward
    hardware-enabled security. For example, it integrates the `SSD controller` along
    with a new `Secure Enclave` co-processor that manages boot security and storage
    encryption at the hardware level.


    The following models have the T2 chip as of this writing:


    *   2017 iMac Pro (and later)

    *   2018 Mac mini (and later)

    *   2018 MacBook Air (and later)

    *   2018 MacBook Pro (and later)


    To determine if your Mac has the T2 Security chip, you can find this by looking
    at the `System Report` for your Mac through the `About This Mac` dialog box and
    clicking the `System Report` button. In the System Information screen, drill down
    to `Hardware` ➤ `Controller (or iBridge);` and if the `Controller Model Name`
    is `Apple T2 chip,` then your computer has it. The T2 Security chip enables/impacts
    the following features:


    *   Touch ID (stores the Touch ID data in the Secure Enclave)

    *   Signal Image Processing with the front-facing FaceTime HD camera for facial
    recognition

    *   Enables Secure Boot

    *   Enhanced Encrypted Storage

    *   Secure System Management Controller (SMC)

    *   Secure Audio Controller for microphone security


    `Secure Boot` is one of the T2 features that should be of particular interest
    to Mac system administrators. This function is only available on Macs that have
    the T2 chip, and it is found when you boot into `macOS Recovery` mode. To configure
    the Secure Boot feature as shown in Figure [3-2](#492151_1_En_3_Chapter.xhtml#Fig2),
    once you boot into recovery mode, select the `Startup Security Utility` from the
    `Utilities` menu.


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig2_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The configuration options of the Secure Boot feature


    Secure Boot features three options—`Full Security`, `Medium Security`, and `None`.
    `Full Security` is on by default with any T2 machine as it ships from the factory.
    This option requires an Internet connection and checks to see if the OS you are
    attempting to install is currently trusted by Apple. `Medium Security` checks
    to see if the OS you are attempting to install was ever trusted by Apple and does
    not require an Internet connection. `None` does not enforce OS signing or trusting
    at all.


    Please note that on T2-enabled systems, this utility replaces the `Firmware Password
    Utility`. It features the ability to control external booting, and you can either
    disallow or allow booting from external media like USB flash drives, Thunderbolt
    hard drives, and the like. It is also worth mentioning for long-time Mac system
    administrators, network booting or `NetBoot` is not possible with the T2. The
    only supported network-enabled boot option for T2 Macs is by using Apple’s Internet
    Recovery service. If you are using a NetBoot-based imaging workflow to stage your
    hardware, be aware that you will not be able to do so with T2-enabled Macs.


    ## File Permissions


    Like other Unix-based operating systems, `macOS` uses `POSIX` file permissions.
    There are four standard permissions that can be assigned by user or group for
    any file, folder, or volume.


    ### POSIX


    `Read Only`: Users can browse a file directory and open/copy files from the directory,
    but they cannot write to the directory or save changes to the files.


    `Read & Execute`: Users can read files in the directory and execute applications
    in the directory.


    `Write Only`: Users can only write to a folder with these permissions. They cannot
    open the folder or browse the contents. They can only drop a file into a directory
    with write-only permissions.


    `No Access`: The user has no access to the file or folders.


    In addition to the file permissions options, every file or directory in `macOS`
    features an `owner` (a specific user), a (specific) `group`, and an `Everyone`
    group. The Everyone group is a catchall for anyone who may be accessing the file
    or directory that isn’t the specific owner or group. You should think of this
    as *everyone else*. The owner is the specific user who created the file or copied
    it into the current directory. The group is typically inherited from the folder
    that the file or folder exists within.


    The default file permissions groups in `macOS` include


    *   `staff`: This is the group that all of the local user accounts belong to,
    including the Standard user.

    *   `admin`: This is the group that all of the local user accounts with admin
    rights belong to and has some elevated privileges such as the ability to write
    to the `/Applications` folder.

    *   `wheel`: This is reserved for the `super user`, or `root` account. The root
    account is the only member of this group and should remain that way. Many system
    files and directories are protected by this group.


    ### Modifying File Permissions


    Unless you are setting up some specific file sharing over the local area network
    or the Internet with your Macs, leaving the default permissions to files and folders
    is recommended and preferable. If you are sharing files locally between multiple
    users on the same Mac, Apple provides a `Public` folder in each user’s home directory
    for placing files meant to be shared across multiple users on the same machine.


    If you do need to modify file permissions, you can do so by selecting the file
    or folder in the Finder and choosing `Get Info` from the `File` menu or via `right-click`.
    Figure [3-3](#492151_1_En_3_Chapter.xhtml#Fig3) outlines how to make these changes.


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig3_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    The Sharing & Permissions pane of the Get Info dialog box


    *   `Padlock`: If locked, click it to authenticate as a user with permissions
    to unlock it and make changes to the sharing and security settings of the file
    or folder.

    *   `+/- Buttons`: Use these to add or remove users or groups and set additional
    permissions.

    *   `Gear Button`: Use this option to copy permissions on a folder to enclosed
    files and folders. This allows you to change the permissions on a top-level directory
    and copy those permissions down.

    *   `Privileges Drop-Down Menu`: Use this to set permissions for a given user
    or group.'
