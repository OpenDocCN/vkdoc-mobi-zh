- fmt: '## Introduction to Apple-Microsoft Integration


    Over the last several iterations of `macOS` and `macOS Server`, Apple has chosen
    to demote or completely remove first-party services in favor of industry standard
    solutions. For example, for decades `AppleTalk` was the standard networking protocol
    for the Mac. Apple File Protocol (`AFP`) was the file sharing standard in the
    Mac operating system. However, more recently Server Message Block (`SMB`) file
    sharing has taken over as the default file sharing protocol in `macOS`. `AFP`
    still exists, but it has been demoted to a solution that you can use if you need
    it, but the preference is to use the same file sharing solution as Linux and Windows
    clients do.


    **Pro Tip**


    Server Message Block (`SMB`) is a protocol for sharing data over the network.
    Microsoft adopted this protocol in `Windows 95`. Linux and macOS clients use an
    `SMB`-compatible solution called `Samba` to access `SMB`-shared resources.


    Beyond adopting `SMB` file sharing in `macOS` instead of Apple File Protocol,
    we can see the continued demotion of Open Directory in favor of Active Directory
    and the removal of a `DHCP` server, mail, messaging, and `CalDAV` server solutions
    in `macOS Server`. Many of these services have been replaced with cloud-hosted
    versions like `iCloud`, `Office 365 (O365)`, and `Google Docs`. This actually
    works to our favor as Mac system administrators, because we can more easily integrate
    Apple devices into existing systems instead of having to stand up special Apple-only
    technologies or implementing complex and expensive middleware.


    ### My Microsoft Environment


    Before we get too deep into the details of integrating Apple platforms into our
    enterprise Microsoft environment, it would be a good idea to give a quick overview
    as to what my current network looks like. Figure [11-1](#492151_1_En_11_Chapter.xhtml#Fig1)
    provides a visual overview of the corporate network before I begin adding Macs
    and iOS devices to the mix.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig1_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    My Microsoft Network, services, printers, and shares


    *   **Microsoft Active Directory:** On premises Windows domain named `MyCompany.local`.
    I have several organizational units (`OUs`) by location with a minimal `Group
    Policy` applied for the purposes of this demonstration.

    *   **User Accounts and Group Membership:** I have several user accounts and a
    couple of groups to control access to various network file shares and printers.
    Each user authenticates to their PC with their domain account.

    *   **Group Policy:** For the purpose of this demonstration, I have an `OU` with
    a basic `Group Policy (GPO)` applied that controls the default home page in my
    `Internet Explorer (IE)` browser.

    *   **DNS:** I am running `DNS` server on my Windows server providing `DNS` to
    my network of PCs.

    *   **DHCP Server:** I’m running Microsoft’s `DHCP` server and providing `DNS`
    to my network of PCs via this service.

    *   **File Sharing:** I’m running file sharing services on my Windows server to
    share out a couple of network drives where PC users share files with each other.

    *   **Print Sharing:** I’m running printer sharing services on my Windows server
    to share out workgroup printers to various users in the office.

    *   In addition to the on premises solution, we also run `Microsoft Office 365`,
    and users have access to `OneDrive` and `Microsoft Exchange` in the cloud. Our
    email is delivered via `Exchange` on `O365`.


    Now that we have our Microsoft environment defined, we need to plan our Apple
    platform integration and determine which services our Mac and iOS users will require.


    ### Microsoft Services Required for Apple Users


    We are going to add a `MacBook Pro` to our network for the company president.
    He will need access to the following services:


    *   The ability to sign in on his Mac both in the office and remotely

    *   Access to shared files in the main corporate office server

    *   The ability to print to the shared `HP LaserJet` printer in his office

    *   Access to `Exchange` email

    *   Access to `Microsoft OneDrive`

    *   The `Microsoft Office` suite (including `Microsoft Outlook`) natively on his
    Mac

    *   Default access to the company Intranet when he opens `Safari`

    *   Migration of his existing `Internet Explorer` Favorites, `Outlook` Personal
    Folders, and data from his old Windows laptop


    We are going to provide an `iPhone 11` to our company president as well. He will
    need access to these services from his `iPhone`:


    *   Access to `Microsoft OneDrive`

    *   Access to his `Exchange` email

    *   Contacts from his `Exchange` account available in the `Phone` app

    *   Access to open and edit `Word` and `Excel` documents on the `iPhone`


    Finally, we are going to provide an `iPad` to our corporate sales manager, and
    she needs to be able to update a couple of reports every day on the main corporate
    office file server. She will need to be able to map the network drive from her
    `iPad` and update a couple of `Excel` files there:


    *   Access to `Microsoft Excel` on the `iPad`

    *   Access to shared files in the main corporate office server


    Throughout this chapter, we will use these three scenarios to integrate an `iPad`
    running `iPadOS`, an `iPhone`, and a `Mac` into our existing corporate network.'
