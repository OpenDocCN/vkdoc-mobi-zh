- fmt: '### Using DEP to Create Placeholders


    Next on our agenda is to add our ten new Macs to our Profile Manager MDM group
    in Apple School Manager/Apple Business Manager. I have the ten serial numbers
    off of the boxes of each of these new machines, so I’ll sign into the Manager
    portal and use the `Device Assignments` tab to assign these to our MDM. Just like
    we did with the iPads in Chapter [12](#492151_1_En_12_Chapter.xhtml), we will
    enter the serial numbers separated by commas into the `Choose Devices` field;
    and then under the `Choose Action` heading, we will select `Assign to Server`
    and choose `My Company’s MDM Server` as shown in Figure [13-4](#492151_1_En_13_Chapter.xhtml#Fig4).
    When you are ready, click the `Done` button to continue.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig4_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig4_HTML.jpg)


    Figure 13-4

    Assigning the ten new Macs to our MDM


    When it is done processing the assignments, sign out of the Manager portal. Open
    `Profile Manager` and go to the `Devices` view. Click the `refresh button` if
    needed and make sure that all of the new Macs populate into the `Devices` list
    as shown in Figure [13-5](#492151_1_En_13_Chapter.xhtml#Fig5).


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig5_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig5_HTML.jpg)


    Figure 13-5

    After forcing a sync with DEP, the new Macs should appear in our Devices list


    ### Setting the Device Name


    Now that we have all of our `Placeholders` in Profile Manager, we can see they
    have come in with some basic product information as their default name. We are
    going to make some changes to the names of these device Placeholders to make it
    easier to identify them in our list. Using the `Devices` view, click through each
    device to select it and then click the temporary name in the top-right side of
    the view to edit the names. `Assign a name` to each of our ten machines that match
    the names we used when creating new computer records in Active Directory. I have
    named mine `101-01-2019MBP` through `101-10-2019MBP`. Next, click the `Settings`
    tab for each of the devices in this list and check the box next to `Set device
    named (supervised only)`, and it should auto-populate the new name of the Placeholder.


    ### Creating a Device Group


    We are going to add all of these Mac Placeholder devices to a `Device Group`.
    This will allow us to configure the settings at the group level, and each of the
    Macs in that group will inherit those settings. Click the `Device Groups` button
    in the left sidebar in Profile Manager. Click the `+` button in the lower-center
    column of the page as shown in Figure [13-6](#492151_1_En_13_Chapter.xhtml#Fig6),
    and a new Device Group will appear.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig6_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig6_HTML.jpg)


    Figure 13-6

    Adding a new Device Group


    Rename this new group `Design Team` and click the `Save` button to apply the name
    change. The first thing we will do is assign our Placeholder Mac records to this
    Device Group. Click the `Design Team` Device Group to select it and then click
    the `Members` tab. Click the `+` button in the lower-right side of the page and
    choose `Add Devices`. In the dialog box that appears, click the `Add` button to
    the right of each of the Mac placeholders as shown in Figure [13-7](#492151_1_En_13_Chapter.xhtml#Fig7).


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig7_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig7_HTML.jpg)


    Figure 13-7

    Adding the ten Mac Placeholders into the Design Team Device Group


    Click the `Done` button when you are finished adding devices to the group and
    then click the `Save` button. We have now successfully created our Device Group.


    ### Configuring MDM Enrollment


    We are going to begin by configuring the device enrollment and Setup Assistant
    settings. We have a few options here that are unique to macOS. In the Device Groups
    view, click the Design Team group to select it and then click the Settings tab.
    Scroll down to the Enrollment Settings section where Enrollment during Setup Assistant
    is listed. Check the box next to `Prompt user to enroll device during Setup Assistant`.
    Uncheck the option to require credentials for enrollment and make sure that `Do
    not allow user to skip enrollment step` is checked. Your settings should look
    like Figure [13-8](#492151_1_En_13_Chapter.xhtml#Fig8).


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig8_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig8_HTML.jpg)


    Figure 13-8

    Configuring MDM enrollment during Setup Assistant


    Scroll down further to the `Setup Assistant Options` area. We are only interested
    in the first two sections and the last section of checkboxes here because these
    are the only ones that apply to `macOS`. These are the prompts that the computer
    will ask during the Setup Assistant during the first boot and the subsequent first
    login by a new end user. We are going to choose to suppress all of these. `Uncheck`
    every box in this list.


    Scroll down further to the `macOS Primary Account Setup` section. Because we are
    using Active Directory to manage our user accounts, we are not going to create
    a local Standard user on the machine. If we were not using network user accounts,
    we could configure this to prompt the user to create their own username/password.
    For our purposes, we will uncheck the `Prompt user to create an account of type`
    option.


    We do want to create a local `macOS` administrator account automatically on the
    system though. Go ahead and fill out the fields to generate a local admin user
    with the desired password. You can choose whether to list this account in the
    Users & Groups System Preference or not. For this example, I’ll leave the box
    `checked`. When your settings look similar to Figure [13-9](#492151_1_En_13_Chapter.xhtml#Fig9),
    click the `Save` button to apply the settings.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig9_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig9_HTML.jpg)


    Figure 13-9

    Suppress all Setup Assistant prompts and automatically create a local Administrator
    account'
