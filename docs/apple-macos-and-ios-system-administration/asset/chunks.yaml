- fmt: '# 探索 iOS 配置描述文件


    现在，我们将对我们的配置描述文件进行签名。从 **文件** 菜单中选择 **签名描述文件**，然后如图所示选择 **签名标识**。


    ![](images/492151_1_En_5_Chapter/492151_1_En_5_Fig17_HTML.jpg)


    **图 5-17**

    为我们的配置描述文件选择签名标识。


    1.  填写完 **通用**、**密码** 和 **VPN** 有效载荷后，我们可以保存一份副本以供将来编辑。从 **文件** 菜单中选择 **保存...**，将其保存在某个位置以备将来参考。接下来，从
    **文件** 菜单中选择 **复制**，以创建我们将要签名和分发的副本。将我们计划分发的那个保存到 **桌面**。


    **专业提示** 你是否看到了关于需要最终用户添加信息因此无法在受监督设备上安装的提示信息？因为我们正在为 BYOD 设备独家创建此描述文件，所以可以忽略关于受监督设备的警告。如果你正在为受监督的设备创建此描述文件，则需要指定账户信息，因此在你决定要监督哪些设备时请记住这一点。


    2.  接下来，点击 **密码** 有效载荷，并像上一个练习中那样进行配置，以要求一个 **强密码**。


    3.  接下来，点击 **VPN** 有效载荷，并使用类似于图 [5-16](#) 中的信息进行配置。这些对于本例来说都是虚拟账户信息，但在真实公司中，你会输入合法的
    VPN 配置设置。


    ![](images/492151_1_En_5_Chapter/492151_1_En_5_Fig16_HTML.jpg)


    **图 5-16**

    VPN 有效载荷的示例占位符数据


    4.  打开 Apple Configurator，通过从 **文件** 菜单中选择 **新建描述文件** 来创建一个新的配置描述文件。


    5.  在 **通用** 有效载荷部分输入所需信息，如图 [5-15](#) 所示，包括描述和同意信息。这次特别重要，因为最终用户将安装它。


    ![](images/492151_1_En_5_Chapter/492151_1_En_5_Fig15_HTML.jpg)


    **图 5-15**

    通用有效载荷信息示例


    你会注意到我们的密码要求立即生效。要继续，我们必须创建一个新的安全密码。当它完成安装后，我们可以点击 **完成** 按钮。如果我们退回到 **设置** 应用的根目录，你会看到我们新安装的
    **VPN** 选项，带有如图 [5-19](#) 所示的 **开/关** 开关。这证实了我们的配置描述文件生效了！我们现在已经用新密码保护了设备，并启用了对公司
    VPN 的访问。


    ![](images/492151_1_En_5_Chapter/492151_1_En_5_Fig19_HTML.jpg)


    **图 5-19**

    VPN 开关现在可以在“设置”中我的网络配置附近使用


    6.  最后，让我们浏览回 **设置 > 通用 > 描述文件** 并 **移除** 安全 VPN 配置描述文件。再次浏览回 VPN，你会注意到我们的配置消失了。因此，移除我们描述文件的用户也就移除了他们的
    VPN 权限。典型的“第二十二条军规”！


    在进入下一节之前，使用 **重置 > 抹掉所有内容和设置** 将你的测试设备恢复为默认状态。


    ### 探索 iOS 配置描述文件


    在进入下一节之前，花一些时间探索可用于 iOS 设备的各种有效载荷。**创建三个独立的、已签名的配置描述文件。** 按以下所示为它们命名并设置已定义的有效载荷。我们将在后面讨论
    *蓝图* 时用到它们。


    **描述文件 #1 – 安全密码：** 配置此描述文件以使用与图 [5-20](#) 中类似的密码设置。


    ![](images/492151_1_En_5_Chapter/492151_1_En_5_Fig20_HTML.jpg)


    **图 5-20**

    密码有效载荷示例


    **描述文件 #2 – 家庭 Wi-Fi：** 配置此描述文件以使用 *你当前位置* 的 Wi-Fi 设置。这将允许你的 iPad 自动加入此网络，而无需在设备上手动选择。它应该类似于图
    [5-21](#) 中我的设置。


    ![](images/492151_1_En_5_Chapter/492151_1_En_5_Fig21_HTML.jpg)


    **图 5-21**

    在 Wi-Fi 有效载荷中定义的家庭无线设置


    **描述文件 #3 – 学生限制：** 假设我们要将这些设备交给学生，并且他们不允许使用 **相机**、**FaceTime**、**AirDrop**、**iMessage**、**Apple
    Music** 或 **广播**，如图 [5-22](#) 所示。


    ![](images/492151_1_En_5_Chapter/492151_1_En_5_Fig22_HTML.jpg)


    **图 5-22**

    在“限制”有效载荷中禁用前面文本中定义的选项


    你现在应该拥有三个独立的配置描述文件，可以准备部署到任意数量的 iOS 设备上。将它们保存到你的 **桌面**。管理 iOS 设备的选项非常多，而且还在不断增加。Apple
    在其网站上维护着一个有效载荷列表，在你开始探索这些可能性时，它应该是一个很好的参考：


    *   [`https://developer.apple.com/business/documentation/Configuration-Profile-Reference.pdf`](https://developer.apple.com/business/documentation/Configuration-Profile-Reference.pdf)


    **专业提示**


    在创建包含各种有效载荷的配置描述文件时，要记住：如果你在多个描述文件中用不同的设置定义了相同的有效载荷，然后将这些描述文件应用到同一台设备上，可能会产生意想不到的后果。例如，假设你有两个不同的描述文件定义了密码有效载荷。一个有效载荷要求至少
    8 个字符，而另一个要求至少 6 个字符。如果你将这两个描述文件安装在同一台设备上，它将应用 8 个字符的最小要求。最好不要将相互矛盾的有效载荷应用到同一台设备上，但如果这样做，至少对于
    iOS 来说，它将始终应用限制性更强的有效载荷。


    ## 使用 Apple Configurator 侧载应用和内容


    *侧载* 是一个术语，指的是从计算机而不是在设备本身上以交互方式，将应用程序、文档、书籍或其他内容加载到 iOS 设备上。例如，你可以通过 Apple Configurator
    侧载一个 App Store 应用，而不必在设备上手动浏览 App Store 并交互式地下载应用。你也可以在 iOS 设置助理运行之前侧载内容，使其成为在开箱即用体验之外为用户提供预装数据的理想选择。'
  raw: '1.  This time we are going to sign our Configuration Profile. Choose **Sign
    Profile** from the **File** menu and select the **signing identity** as shown
    in Figure [5-17](#492151_1_En_5_Chapter.xhtml#Fig17).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig17_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig17_HTML.jpg)


    Figure 5-17


    Selecting a signing identity for our Configuration Profile


    1.  Once we have populated the *General*, *Passcode*, and *VPN* payloads, we can
    save a copy of this for future editing. Choose **Save…** from the **File** menu
    and save it somewhere for future reference. Next choose **Duplicate** from the
    **File** menu to create the copy we will sign and distribute. Save the one we
    are planning to distribute to the **Desktop**.


    **Pro Tip** Did you see the message about requiring information to be added by
    the end user and therefore being unable to install on supervised devices? Because
    we are creating this Profile for exclusive use on BYOD devices, the warning about
    supervised devices can be ignored. If you were creating this Profile for use on
    supervised devices, you would need to specify the account information, so keep
    that in mind as you determine which devices you want to supervise vs. not supervise.


    1.  Next click the *Passcode* payload and configure it like we did in the last
    exercise to require a **strong passcode**.


    2.  Next click the *VPN* payload and configure it with information similar to
    that in Figure [5-16](#492151_1_En_5_Chapter.xhtml#Fig16). This is all dummy account
    information for this example, but in a real company, you would enter the legitimate
    VPN configuration settings.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig16_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig16_HTML.jpg)


    Figure 5-16


    Sample placeholder data for the VPN payload


    1.  Open Apple Configurator and create a new Configuration Profile by choosing
    **New Profile** from the **File** menu.


    2.  Enter the required information in the *General* payload section as shown in
    Figure [5-15](#492151_1_En_5_Chapter.xhtml#Fig15), including the description and
    consent message. These are particularly important this time around because end
    users will be installing it.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig15_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig15_HTML.jpg)


    Figure 5-15


    Sample General payload information


    You will notice that our passcode requirement goes immediately into effect. To
    continue, we must create a new secure passcode. When it is finished installing,
    we can click the **Done** button. If we back out to the root of the ***Settings***
    app, you will see our newly installed **VPN** option with the **on/off** switch
    as shown in Figure [5-19](#492151_1_En_5_Chapter.xhtml#Fig19). This confirms our
    Configuration Profile worked! We have now secured the device with a new passcode
    and enabled access to the company VPN.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig19_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig19_HTML.jpg)


    Figure 5-19


    The VPN switch is now available near my network configuration in Settings


    1.  Finally, let’s browse back to ***Settings ➤ General ➤ Profile*** and **remove**
    the Secure VPN Configuration Profile. Browse back to VPN, and you will notice
    that our configuration is gone. Thus, the user who removes our Profile also removes
    their VPN privileges. Classic catch-22!


    Use ***Reset ➤ Erase All Content and Settings*** to default your test device before
    moving onto the next section.


    ### Exploring iOS Configuration Profiles


    Before moving onto the next section, spend some time exploring the various payloads
    that are available to iOS devices. **Create three separate, signed Configuration
    Profiles.** Name them and set the defined payloads as shown in the following.
    We will use those in a later section when we discuss *Blueprints*.


    **Profile #1 – Secure Passcode:** Configure this profile to use the passcode settings
    similar to those found in Figure [5-20](#492151_1_En_5_Chapter.xhtml#Fig20).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig20_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig20_HTML.jpg)


    Figure 5-20


    Example Passcode payload


    **Profile #2 – Home Wi-Fi:** Configure this profile to use *your current location’s*
    Wi-Fi settings. This will allow your iPad to auto-join this network rather than
    you having to select it manually on the device. It should be something similar
    to mine in Figure [5-21](#492151_1_En_5_Chapter.xhtml#Fig21).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig21_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig21_HTML.jpg)


    Figure 5-21


    My home wireless settings defined in the Wi-Fi payload


    **Profile #3 – Student Restrictions:** Pretend that we are giving these devices
    to students and they are not allowed to use **Camera**, **FaceTime**, **AirDrop**,
    **iMessage**, **Apple Music**, or **Radio** as shown in Figure [5-22](#492151_1_En_5_Chapter.xhtml#Fig22).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig22_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig22_HTML.jpg)


    Figure 5-22


    Disable the options defined in the preceding text in the Restrictions payload


    You should now have three separate Configuration Profiles that are ready for us
    to deploy to any number of iOS devices. Save these to your **Desktop**. There
    are so many options for managing iOS devices, with new ones being added all the
    time. Apple maintains a list of payloads on their web site that should be a good
    reference as you begin to explore the possibilities:


    *   [`https://developer.apple.com/business/documentation/Configuration-Profile-Reference.pdf`](https://developer.apple.com/business/documentation/Configuration-Profile-Reference.pdf)


    Pro Tip


    Something to remember as you create Configuration Profiles with various payloads:
    if you define the same payload with different settings on multiple Profiles and
    then apply those Profiles to the same device, you may have unintended consequences.
    For example, say you have two different Profiles that define a Passcode payload.
    One payload requires an eight-character minimum, while the other requires a six-character
    minimum. If you install these two Profiles on the same device, it will apply the
    eight-character minimum. It is best not to apply contradicting payloads to the
    same device, but if you do, at least for iOS, it will always apply the more restrictive
    payload.


    ## Side Loading Apps and Content with Apple Configurator


    *Side loading* is a term that refers to loading applications, documents, books,
    or other content onto the iOS device from a computer and not interactively on
    the device itself. For example, you can side load an App Store app via Apple Configurator
    instead of having to manually browse the App Store and download the App on the
    device interactively. You can also side load content before the iOS Setup Assistant
    is run, making it an ideal option for providing your users with preinstalled data
    without compromising the out-of-box experience.'
