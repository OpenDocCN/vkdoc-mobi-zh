    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig18_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig18_HTML.jpg)


    Figure 2-18


    The Login Options pane


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig17_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig17_HTML.jpg)


    Figure 2-17


    The Login Options button in the Users & Groups pane


    The **login window** is actually its *own application* of sorts, and this is where
    you configure it. You can turn **automatic login** on/off and select a user to
    sign in automatically. If you are choosing to use a login window instead of automatic
    login, you can display a **list of all users** or a **name and password field**.
    You can also show or hide the **power control** buttons, which may be important
    if you are administrating a server and you want someone to authenticate before
    they can power down or restart the computer.


    **Fast user switching** can be a useful solution if you want to allow multiple
    users to sign in on the same Mac and then switch between them without one user
    signing out first. This allows administrators to sign in and fix something and
    then give the system back to the user without interrupting their work. It can
    also be useful in service industries like a print shop, where multiple users are
    sharing the same computer and alternating in real time.


    The **Accessibility Options** **…** button contains additional features like *VoiceOver*,
    for screen reading at the login window for vision-impaired users. Obviously, all
    of these customizations are going to be dictated by your organization’s user base,
    security needs, and other considerations. The last option here, **Network Account
    Server**, is how you *bind* your Mac to a domain service. This will be covered
    later in the book, specifically in Chapters [7](#492151_1_En_7_Chapter.xhtml)
    and [11](#492151_1_En_11_Chapter.xhtml) .'
