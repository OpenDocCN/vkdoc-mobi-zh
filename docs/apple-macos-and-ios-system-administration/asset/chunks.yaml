- fmt: '### Creating a Network File Share for Munki


    The last step we need to take to prepare our server for use with `Munki` is sharing
    out the `munki_repo` folder as an SMB share on our local area network. We will
    use the `Sharing System Preference` to enable the `file sharing` service. Add
    a new shared folder by clicking the `+` button and browsing to our `munki_repo`
    directory in `Macintosh HD/Library/WebServer/Documents/` as shown in Figure [10-12](#492151_1_En_10_Chapter.xhtml#Fig12).
    You will see that the file sharing permissions are inherited from the directory
    and should provide everyone with read and write capabilities.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig12_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Sharing the munki_repo folder as a network file share


    Close out of System Preferences. At this point, we should do a quick validation
    from another computer on our network to make sure that everything is working as
    expected. I’m going to use my admin workstation to map the `munki_repo` folder
    as a share as well as click the `munki_repo` directory via a web browser.


    Use the `Connect to Server` option in the Finder as shown in Figure [10-13](#492151_1_En_10_Chapter.xhtml#Fig13)
    and authenticate to mount the SMB share of the `munki_repo` folder.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig13_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig13_HTML.jpg)


    Figure 10-13


    Map the munki_repo share using the SMB protocol


    I’m also going to open my Safari web browser and hit `http://192.168.1.5/munki_repo/`.
    If everything is configured properly, you should be able to browse the directory
    with the network share and via the web browser as shown in Figure [10-14](#492151_1_En_10_Chapter.xhtml#Fig14).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig14_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig14_HTML.jpg)


    Figure 10-14


    Browsing the munki_repo directory on a remote computer via Safari and the Finder


    Congratulations! Your web server is now configured for use with Munki!


    **Pro Tip**


    If you are looking to support multiple sites with Munki, you can repeat these
    same steps for each location’s server and then use a utility to sync the `munki_repo`
    directories between servers. Because there is no centralized database or proprietary
    files to worry about, simply syncing the flat files and folders between servers
    will allow you to scale your Munki environment with ease.


    ## Configuring the Munki Admin Workstation


    Now that we have our server up and running, our next step is to configure the
    workstation that our `Munki` system administrator will use to create packages,
    upload data to the server, and manage the `Munki` environment. I typically use
    the same workstation where I have `Apple Remote Desktop` installed so I have all
    of my Mac management tools in one place.


    ### Installing MunkiTools and MunkiAdmin


    The first thing we need to do is download a couple of installer packages. The
    first one is the official `MunkiTools` release from the `Munki Project’s GitHub`
    page. You can find the client installers at `https://github.com/munki/munki/releases`,
    and I’m going to be downloading the `Munki 3.6.4` release which supports `macOS
    10.10 Yosemite` to `macOS 10.15 Catalina`.


    **Pro Tip**


    Munki recently released version 4.x on their GitHub page, which includes its own
    Python support instead of relying on Apple’s embedded version. You should assess
    the support for legacy versions of macOS with this release and determine if you
    should install Munki 4 or continue to use the 3.x variant based on the age of
    your Mac fleet. We will be using the stable release of 3.6.4 for the exercises
    in this chapter.


    Download `munkitools-3.6.4.3786.pkg` from this page and save it to your Desktop.
    Next, `double-click` the downloaded package and follow the prompts to `install`
    it. If `Gatekeeper` gets in the way, you may need to `right-click` the package
    and choose `Open` from the contextual menu and agree to open a file from an unknown
    developer. It will require a restart when finished. Go ahead and `restart` when
    prompted.


    We are also going to download the `MunkiAdmin` tool and install it on this workstation.
    `MunkiAdmin` is another open source project. It is a GUI tool for managing your
    `Munki` environment. The current release is 1.7.1, and this can be found at `https://github.com/hjuutilainen/munkiadmin/releases/`.
    Download this version and save it to your Desktop. Expand the disk image and `drag
    and drop` the `MunkiAdmin` application to either your `/Applications` or `/Applications/Utilities`
    folder to install it. I am going to install it into the `/Applications` folder
    on my workstation.


    ### Configuring the Munki Client on the Admin Workstation


    Once we have restarted our administrative workstation, go ahead and reconnect
    to the `munki_repo` network share and make sure you can still browse it via the
    Finder. Next, we need to do some post-installation configuration via the Terminal
    to point our administrative workstation to our `Munki` repository. Go ahead and
    open the Terminal again and enter `munkiimport --configure` at the command prompt
    as shown in Figure [10-15](#492151_1_En_10_Chapter.xhtml#Fig15).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig15_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Invoking the configuration command line utility in Terminal


    We will need to answer some questions as we step through the command line configuration
    utility. The first thing it asks is for the `Repo URL`. This can be deceiving
    because what it wants here is the path to our `munki_repo` share, not the URL
    to the web server. Enter the full path in this format `smb://192.168.1.5/munki_repo/`
    where the IP address is the domain name or IP of your `Munki` web server.


    **Pro Tip**


    I’m using an IP address because I did not create a DNS record for this demo server.
    However, in a production environment, you would likely want to enter the FQDN
    as part of the path to your `munki_repo` share.


    Next, it will ask us what file extension we prefer to use for the `pkginfo` files.
    These are the files that Munki reads to determine how we want the various installers
    to run. We will keep the default as `*.plist`, so press `enter` to accept the
    default. Now it will prompt us to choose an editor for the `pkginfo` files. We
    are going to be using the GUI `MunkiAdmin` application so we can accept the default
    here. Press `enter` to continue.


    When it prompts us for a `catalog`, accept `testing` as the default. We will discuss
    Catalogs in the next section of this chapter. Press `enter` to continue. Finally,
    the last prompt will ask about `plug-ins`. Take the default here as well by pressing
    `enter`. At this point, we have finished configuring `MunkiTools` on our admin
    workstation. Your Terminal window should look similar to Figure [10-16](#492151_1_En_10_Chapter.xhtml#Fig16)
    after setting these options.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig16_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig16_HTML.jpg)


    Figure 10-16


    The recommended responses to the configuration prompts'
