  trans: '

    ### 我的设备门户


    接下来一种设备注册方式是使用内置于 `Profile Manager` 的自助服务式 `我的设备门户`。使用设备门户注册方法有一些注意事项。这确实旨在用于“自带设备”部署场景，因此你的
    iOS 设备将无法被监督。除了这一限制之外，最终用户可以随时移除 MDM 注册，而你却毫不知情。使用 `我的设备门户` 的主要好处是，你组织的用户可以在无需将设备交给你（IT
    部门）进行配置的情况下，注册 MDM。


    要配置自助服务注册，我们需要做一些快速调整。我建议你禁用“所有人”组访问 `我的设备门户` 的权限，如图 9-10 所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig10_HTML.jpg](img/492151_1_En_9_Fig10_HTML.jpg)


    图 9-10


    取消勾选“允许访问我的设备门户”选项


    我还建议创建一个名为 `BYOD` 或 `自服务` 的新用户组，并将 `我的设备门户` 的访问权限限制为该组成员。你应该实施某种访问管理流程，例如通过一个
    Web 表单或向 IT 部门提交故障工单，让用户在其中请求 BYOD 访问权限并向你提供其设备序列号，这样你就能为该设备设置一个占位符并将用户添加到 `BYOD`
    组中。这样一来，就不会有任何未经你知情或同意的设备被添加进来。


    **专业提示**


    如果你正在使用 `Apple 校园教务管理` 或 `Apple 商务管理`，你应该通过管理门户管理你的用户和群组，或者配置 `Azure AD` 集成。否则，你可以使用
    `服务器` 应用中的 `用户与群组` 来创建这些账户。


    一旦你按要求设置了必要的用户和群组，请确保你创建的新 `BYOD` 组有能力访问 `我的设备门户` 及相关设置，如图 9-11 中我的 `所有 ASM 人员`
    组所示。接下来，我们需要为个人设备配置一个占位符，并将其与我们的最终用户关联。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig11_HTML.jpg](img/492151_1_En_9_Fig11_HTML.jpg)


    图 9-11


    配置自助服务群组的限制以允许访问我的设备门户


    ## 为 BYOD 注册创建占位符设备


    对于本例，我将设置我的个人 iPhone 作为占位符，并将其分配给我在 `Apple 校园教务管理` 中的用户。


    1.  我们需要做的第一件事是为这部 iPhone 配置一个占位符。点击侧边栏中的 `设备` 按钮，然后点击 `+` 按钮并选择 `添加占位符` 以创建一个新的占位符，如图
    9-12 所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig12_HTML.jpg](img/492151_1_En_9_Fig12_HTML.jpg)


    图 9-12


    点击 + 按钮以定义新占位符


    2.  当提示创建新占位符时，我将选择 `iOS` 作为 `设备类型`，并输入 `设备名称` 以及序列号或其他唯一标识符，如 `UDID` 或 `MEID`。请继续为你自己的设备输入信息。完成后，你应该会得到一个占位符设备，类似于我在图
    9-13 中所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig13_HTML.jpg](img/492151_1_En_9_Fig13_HTML.jpg)


    图 9-13


    我为个人设备创建的占位符


    3.  现在我们有了一个占位符设备，我们需要将该设备分配给我们的用户。我已在 `Apple 校园教务管理` 中创建了一个名为 `Drew Smith` 的测试用户。在
    `描述文件管理器` 中，选择侧边栏中的 `用户`，然后选择你的测试用户并点击 `设备` 选项卡，如图 9-14 所示。点击 `+` 按钮 ➤ `添加设备`，然后在弹出的对话框中将
    BYOD 占位符设备添加到该用户。点击 `完成` 按钮，然后点击 `保存` 按钮以继续。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig14_HTML.jpg](img/492151_1_En_9_Fig14_HTML.jpg)


    图 9-14


    将占位符设备添加到测试用户


    现在我们已经配置好了一切，让我们以最终用户的身份来测试一下。在个人设备上，打开 `Safari` 或你选择的其他浏览器，访问 `http://yourdomain/mydevices`
    —— 其中 *yourdomain* 是你用于 `描述文件管理器` 的域名。在我的例子中，它是 `http://579testing.com/mydevices`。使用与占位符设备关联的用户名登录，如图
    9-15 所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig15_HTML.jpg](img/492151_1_En_9_Fig15_HTML.jpg)


    图 9-15


    我的 iPhone 上的我的设备门户


    登录后，你需要做两件事。首先，你需要注册设备，所以点击那个大的蓝色 `注册` 按钮，并按照提示下载 `注册描述文件`，如图 9-16 所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig16_HTML.jpg](img/492151_1_En_9_Fig16_HTML.jpg)


    图 9-16


    点击注册按钮以下载注册描述文件


    接下来，点击 `描述文件` 选项卡，然后点击大的 `安装` 按钮，为你的组织安装一个 `信任描述文件`，如图 9-17 所示。这将确保设备信任从你的 MDM
    发送到该设备的所有描述文件和命令。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig17_HTML.jpg](img/492151_1_En_9_Fig17_HTML.jpg)


    图 9-17


    将我们 MDM 的信任描述文件下载到设备


    最后，关闭 `Safari`，打开 `设置` 应用，浏览至 `通用` ➤ `描述文件`，找到我们下载的 `远程管理描述文件`。点击 `安装` 按钮以在测试设备上启用
    MDM，如图 9-18 所示。你可以通过浏览至 `通用` ➤ `设备管理` 来确认它已安装在设备上，你将在这里看到我们的 `远程管理` 服务器信息。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig18_HTML.jpg](img/492151_1_En_9_Fig18_HTML.jpg)


    图 9-18


    安装移动管理描述文件


    我们也可以在 `描述文件管理器` 中确认设备已成功添加。再次打开 `描述文件管理器` 控制台，点击侧边栏中的 `设备` 按钮。你应该会看到我们的新设备现在已经在那里，并且不再是一个占位符，如图
    9-19 所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig19_HTML.jpg](img/492151_1_En_9_Fig19_HTML.jpg)


    图 9-19


    我的 iPhone 现已注册到我的 MDM 并可以被管理


    至此，只要最终用户不移除 `管理描述文件`，我们就可以管理此设备。请注意，由于这不是被监督的设备，应用某些有效负载的能力将受到限制。


    在我们继续之前，这是一个很好的时机来演示如何使用 `描述文件管理器` 控制台来 `取消注册` 设备。你可能出于多种原因希望这样做。例如，如果这是一个 BYOD
    设备且用户已离开你的组织，你很可能想要移除该设备，特别是如果用户在离开时不够精通技术，未能自行移除 `管理描述文件`。

    '
- fmt: '# 移除设备


    要移除设备，请打开`Profile Manager`，点击侧边栏中的`Devices`按钮。选择您想要移除的设备以高亮显示它，然后点击`–`按钮，如图[9-20](#492151_1_En_9_Chapter.xhtml#Fig20)所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig20_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig20_HTML.jpg)


    **图 9-20：从 Profile Manager 中注销设备**


    `Profile Manager`会提示您选择`Unenroll`设备或`Revert to Placeholder`，如图[9-21](#492151_1_En_9_Chapter.xhtml#Fig21)所示。如果您知道用户已经自行移除了管理配置文件，可以选择`Revert
    to Placeholder`。如果您不确定配置文件是否已被移除，请选择`Unenroll`，这将把设备恢复为占位符，并远程从设备中移除管理配置文件。我们将点击`Unenroll`按钮。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig21_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig21_HTML.jpg)


    **图 9-21：当被提示时，如果您不知道用户是否已自行移除管理配置文件，请选择注销**


    几分钟后，设备将恢复为“占位符”标签状态，您可以直接通过`Settings`应用 ➤ `General`在设备上确认设备管理配置文件现已消失。由于这是BYOD设备，我们可以点击占位符设备，然后再次点击`–`按钮，确认我们也想移除该占位符。


    ## Apple Configurator


    将设备注册到MDM的第三种方法是通过`Apple Configurator`。在第[5](#492151_1_En_5_Chapter.xhtml)章中，我们跳过了MDM提示，并承诺将在后面的章节中介绍，现在就是时候了。使用`Apple
    Configurator`将设备注册到MDM的主要缺点是**(a)**它仅限于iOS设备，以及**(b)**您仍然需要物理接触每台设备。`Apple Configurator`的好处是，如果您已经在物理接触每台设备、应用蓝图等，那么添加MDM支持以实现未来对配置的无线更新是快速且容易的。


    ### 在 Apple Configurator 中启用 MDM 注册


    我们需要调整一些设置，以便开始将`Apple Configurator`与我们的MDM一起使用。


    1.  当提示时，使用您的Apple School Manager/Apple Business Manager管理员*Apple ID*和密码登录DEP。

    2.  当提示时，选择您希望向用户显示的iOS设置助理屏幕，然后点击`Prepare`按钮。


    **专业提示** 如果您使用的是通过设置助手用于DEP注册的同一台测试设备，在尝试使用`Apple Configurator`激活设备之前，您应该从MDM中移除该设备并删除占位符。否则，当设备到达激活步骤时，它会提示错误，说明您需要使用DEP来激活并将设备注册到MDM。


    3.  点击`Next`按钮以完成配置。

    4.  接下来，让我们用另一台iOS设备测试我们的MDM配置。使用USB电缆将测试设备连接到`Apple Configurator`。设备出现后，选中它并点击工具栏中的`Prepare`按钮。

    5.  在出现的“准备设备助理”对话框中，选中`Supervise devices`旁边的复选框，然后点击`Next`按钮继续。

    6.  在`Enroll in MDM Server`选项中，如图[9-25](#492151_1_En_9_Chapter.xhtml#Fig25)所示，从弹出菜单中选择我们的服务器。点击`Next`继续。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig25_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig25_HTML.jpg)


    **图 9-25：当提示时，选择您的 MDM 服务器**


    7.  点击`+`按钮向`Apple Configurator`添加一个新的MDM服务器。为服务器起一个描述性的名称，然后编辑`Host name or URL`字段，将“myserver.local”替换为您的服务器域名。例如，我的服务器是[`579testing.com`](http://579testing.com)，如图[9-24](#492151_1_En_9_Chapter.xhtml#Fig24)所示。更新域名时，请务必保持URL的其他部分不变。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig24_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig24_HTML.jpg)


    **图 9-24：编辑域名以使 Apple Configurator 指向您的 MDM**


    8.  接下来，在您计划用于配置设备的Mac上，从应用程序文件夹中打开`Apple Configurator`。从`Apple Configurator`菜单中选择`Preferences…`，然后点击`Servers`选项卡，如图[9-23](#492151_1_En_9_Chapter.xhtml#Fig23)所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig23_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig23_HTML.jpg)


    **图 9-23：Apple Configurator 偏好设置面板中的 Servers 选项卡**


    9.  我们需要做的第一个更改是选择用于`Apple Configurator`的监管身份。登录到您的Mac服务器并打开`Server`应用程序。从侧边栏点击`Profile
    Manager`服务，然后根据您的服务，在Apple School Manager或Apple Business Manager下点击`Configure…`按钮。

    10. 点击`Supervision`选项卡，然后选中`Use Apple Configurator to configure enrolled devices`旁边的复选框。接下来，如图[9-22](#492151_1_En_9_Chapter.xhtml#Fig22)所示，从`Supervision
    Identity`下拉菜单中选择您签名的信任证书。点击`Done`按钮继续。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig22_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig22_HTML.jpg)


    **图 9-22：为 Apple Configurator MDM 注册配置监管身份**


    当准备过程完成后，点击设备上的iOS设置助手，它应该会抑制我们为其选择的提示。当您到达主屏幕时，打开`Settings`应用并浏览到`General` ➤
    `Device Management`，我们的`Management Profile`应该已经存在。您可以打开`Profile Manager`并点击`Devices`，以确保我们的设备现在也可用于额外的管理。


    **专业提示**


    您是否在“准备设备助理”中看到了`Add to Device Enrollment Program`复选框？这是一个很好的附加选项，您可以使用它将任何通过非Apple或支持DEP的Apple授权经销商购买的组织设备添加到DEP数据库中。当您选中此框时，它会将设备添加到DEP数据库。'
  raw: 'To remove a device, open Profile Manager and click the **Devices** button
    in the sidebar. Select the device you want to remove to highlight it and then
    click the **–** button as shown in Figure [9-20](#492151_1_En_9_Chapter.xhtml#Fig20).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig20_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig20_HTML.jpg)


    Figure 9-20


    Unenrolling the device from Profile Manager


    Profile Manager will prompt you to choose to **Unenroll** the device or **Revert
    to Placeholder** as shown in Figure [9-21](#492151_1_En_9_Chapter.xhtml#Fig21).
    If you know that the Management Profile was already removed by the user, you can
    choose to **Revert to Placeholder**. If you are not sure if the Profile was already
    removed, select Unenroll, and that will revert the device to a Placeholder and
    remotely remove the Management Profile from the device. We will click the **Unenroll**
    button.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig21_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig21_HTML.jpg)


    Figure 9-21


    When prompted, choose to Unenroll if you don’t know if the user has removed the
    Management Profile themselves


    After a few minutes, the device will return to the Placeholder label status, and
    you can confirm on the device directly via **Settings** app ➤ **General** that
    the Device Management Profile is now gone. Since this is a BYOD device, we can
    click the Placeholder device and then click the **–** button again and confirm
    that we want to remove the Placeholder as well.


    ### Apple Configurator


    The third way to enroll devices into MDM is through Apple Configurator. In Chapter
    [5](#492151_1_En_5_Chapter.xhtml), we skipped the MDM prompts with a promise we
    would cover those in a later chapter, and here we are. The main downsides to using
    Apple Configurator to enroll devices into MDM are that **(a)** it is limited to
    iOS devices and (**b)** you still have to physically touch every device. The nice
    thing about Apple Configurator is that if you are already physically touching
    every device, applying Blueprints, and so on, then adding MDM support to enable
    future over-the-air updates to the configuration is quick and easy.


    Enable MDM Enrollment in Apple Configurator


    We need to make a few setting tweaks so we can begin using Apple Configurator
    with our MDM.


    1.  When prompted, sign into DEP using your Apple School Manager/Apple Business
    Manager Administrator *Apple ID* and password.


    2.  When prompted, select which iOS Setup Assistant screens you want to prompt
    the user with and then click the **Prepare** button.


    **Pro Tip** If you are using the same test device that you used for DEP enrollment
    through Setup Assistant, you should remove that device from your MDM and delete
    the Placeholder before attempting to activate the device using Apple Configurator.
    Otherwise, when the device gets to the activation step, it will give you an error
    stating that you need to use DEP to activate and enroll the device in MDM.


    1.  Click the Next button to complete the configuration.


    2.  Next, let’s test our MDM configuration with another iOS device. Connect the
    test device to Apple Configurator using a USB cable. Once it appears, select it
    and click the **Prepare** button in the toolbar.


    3.  In the Prepare Devices Assistant dialog box that appears, check the box next
    to **Supervise devices** and click the **Next** button to continue.


    4.  In the Enroll in MDM Server option, select our server from the pop-up menu
    as shown in Figure [9-25](#492151_1_En_9_Chapter.xhtml#Fig25). Click **Next**
    to continue.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig25_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig25_HTML.jpg)


    Figure 9-25


    Select your MDM server when prompted


    1.  Click the **+** button to add a new MDM server to Apple Configurator. Name
    the server something descriptive and then edit the Host name or URL field to substitute
    “myserver.local” with the domain of your server. For example, mine is [`579testing.com`](http://579testing.com)
    as shown in Figure [9-24](#492151_1_En_9_Chapter.xhtml#Fig24). Be sure to leave
    the other part of the URL intact when you update the domain.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig24_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig24_HTML.jpg)


    Figure 9-24


    Edit the domain to point Apple Configurator to your MDM


    1.  Next, open Apple Configurator from the Applications folder on your Mac that
    you plan to use to configure devices. Select **Preferences…** from the **Apple
    Configurator** menu and then click the **Servers** tab as shown in Figure [9-23](#492151_1_En_9_Chapter.xhtml#Fig23).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig23_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig23_HTML.jpg)


    Figure 9-23


    The Servers tab in the Apple Configurator preference pane


    1.  The first change we need to make is to select a supervision identity for use
    with Apple Configurator. Log in to your Mac server and open the Server application.
    Click the **Profile Manager** service from the sidebar and then click the **Configure…**
    button under Apple School Manager or Apple Business Manager, depending on your
    service.


    2.  Click the Supervision tab and then check the box next to **Use Apple Configurator
    to configure enrolled devices**. Next, select your signed trust certificate from
    the Supervision Identity drop-down menu as shown in Figure [9-22](#492151_1_En_9_Chapter.xhtml#Fig22).
    Click the **Done** button to continue.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig22_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig22_HTML.jpg)


    Figure 9-22


    Configure the supervision identity for Apple Configurator MDM enrollment


    Once it completes the preparation process, click through the iOS Setup Assistant
    on the device, and it should suppress the prompts that we selected for it. When
    you get to the Home Screen, open the **Settings** app and browse to **General**
    ➤ **Device Management,** and our **Management Profile** should be present. You
    can open Profile Manager and click **Devices** to ensure that our device is now
    available for additional management as well.


    Pro Tip


    Do you see the **Add to Device Enrollment Program** checkbox in the Prepare Devices
    Assistant? This is a nice additional option that you can use to add any device
    that was purchased through an organization other than Apple or an Apple Authorized
    Reseller that supports DEP. When you check this box, it will add the device to
    the DEP database.'
  trans: '

    # 移除设备


    要移除设备，请打开`Profile Manager`，点击侧边栏中的`Devices`按钮。选择您想要移除的设备以高亮显示它，然后点击`–`按钮，如图 9-20
    所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig20_HTML.jpg](img/492151_1_En_9_Fig20_HTML.jpg)


    **图 9-20：从 Profile Manager 中注销设备**


    `Profile Manager`会提示您选择`Unenroll`设备或`Revert to Placeholder`，如图 9-21 所示。如果您知道用户已经自行移除了管理配置文件，可以选择`Revert
    to Placeholder`。如果您不确定配置文件是否已被移除，请选择`Unenroll`，这将把设备恢复为占位符，并远程从设备中移除管理配置文件。我们将点击`Unenroll`按钮。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig21_HTML.jpg](img/492151_1_En_9_Fig21_HTML.jpg)


    **图 9-21：当被提示时，如果您不知道用户是否已自行移除管理配置文件，请选择注销**


    几分钟后，设备将恢复为“占位符”标签状态，您可以直接通过`Settings`应用 ➤ `General`在设备上确认设备管理配置文件现已消失。由于这是 BYOD
    设备，我们可以点击占位符设备，然后再次点击`–`按钮，确认我们也想移除该占位符。


    ## Apple Configurator


    将设备注册到 MDM 的第三种方法是通过`Apple Configurator`。在第 5 章中，我们跳过了 MDM 提示，并承诺将在后面的章节中介绍，现在就是时候了。使用`Apple
    Configurator`将设备注册到 MDM 的主要缺点是**(a)**它仅限于 iOS 设备，以及**(b)**您仍然需要物理接触每台设备。`Apple
    Configurator`的好处是，如果您已经在物理接触每台设备、应用蓝图等，那么添加 MDM 支持以实现未来对配置的无线更新是快速且容易的。


    ### 在 Apple Configurator 中启用 MDM 注册


    我们需要调整一些设置，以便开始将`Apple Configurator`与我们的 MDM 一起使用。


    1.  当提示时，使用您的 Apple School Manager/Apple Business Manager 管理员*Apple ID*和密码登录 DEP。

    2.  当提示时，选择您希望向用户显示的 iOS 设置助理屏幕，然后点击`Prepare`按钮。


    **专业提示** 如果您使用的是通过设置助手用于 DEP 注册的同一台测试设备，在尝试使用`Apple Configurator`激活设备之前，您应该从 MDM
    中移除该设备并删除占位符。否则，当设备到达激活步骤时，它会提示错误，说明您需要使用 DEP 来激活并将设备注册到 MDM。


    3.  点击`Next`按钮以完成配置。

    4.  接下来，让我们用另一台 iOS 设备测试我们的 MDM 配置。使用 USB 电缆将测试设备连接到`Apple Configurator`。设备出现后，选中它并点击工具栏中的`Prepare`按钮。

    5.  在出现的“准备设备助理”对话框中，选中`Supervise devices`旁边的复选框，然后点击`Next`按钮继续。

    6.  在`Enroll in MDM Server`选项中，如图 9-25 所示，从弹出菜单中选择我们的服务器。点击`Next`继续。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig25_HTML.jpg](img/492151_1_En_9_Fig25_HTML.jpg)


    **图 9-25：当提示时，选择您的 MDM 服务器**


    7.  点击`+`按钮向`Apple Configurator`添加一个新的 MDM 服务器。为服务器起一个描述性的名称，然后编辑`Host name or
    URL`字段，将“myserver.local”替换为您的服务器域名。例如，我的服务器是[`579testing.com`](http://579testing.com)，如图
    9-24 所示。更新域名时，请务必保持 URL 的其他部分不变。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig24_HTML.jpg](img/492151_1_En_9_Fig24_HTML.jpg)


    **图 9-24：编辑域名以使 Apple Configurator 指向您的 MDM**


    8.  接下来，在您计划用于配置设备的 Mac 上，从应用程序文件夹中打开`Apple Configurator`。从`Apple Configurator`菜单中选择`Preferences…`，然后点击`Servers`选项卡，如图
    9-23 所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig23_HTML.jpg](img/492151_1_En_9_Fig23_HTML.jpg)


    **图 9-23：Apple Configurator 偏好设置面板中的 Servers 选项卡**


    9.  我们需要做的第一个更改是选择用于`Apple Configurator`的监管身份。登录到您的 Mac 服务器并打开`Server`应用程序。从侧边栏点击`Profile
    Manager`服务，然后根据您的服务，在 Apple School Manager 或 Apple Business Manager 下点击`Configure…`按钮。

    10. 点击`Supervision`选项卡，然后选中`Use Apple Configurator to configure enrolled devices`旁边的复选框。接下来，如图
    9-22 所示，从`Supervision Identity`下拉菜单中选择您签名的信任证书。点击`Done`按钮继续。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig22_HTML.jpg](img/492151_1_En_9_Fig22_HTML.jpg)


    **图 9-22：为 Apple Configurator MDM 注册配置监管身份**


    当准备过程完成后，点击设备上的 iOS 设置助手，它应该会抑制我们为其选择的提示。当您到达主屏幕时，打开`Settings`应用并浏览到`General`
    ➤ `Device Management`，我们的`Management Profile`应该已经存在。您可以打开`Profile Manager`并点击`Devices`，以确保我们的设备现在也可用于额外的管理。


    **专业提示**


    您是否在“准备设备助理”中看到了`Add to Device Enrollment Program`复选框？这是一个很好的附加选项，您可以使用它将任何通过非
    Apple 或支持 DEP 的 Apple 授权经销商购买的组织设备添加到 DEP 数据库中。当您选中此框时，它会将设备添加到 DEP 数据库。

