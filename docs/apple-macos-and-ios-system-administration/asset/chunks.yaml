    # 1. Apple 平台简介


    ## 引言与概述


    回溯到 20 世纪 90 年代中后期，苹果电脑公司的产品，尤其是麦金塔平台，在个人电脑市场的份额仅为个位数的低点。这些系统通常只出现在小型平面设计部门、创意公司或学校里。在互联网热潮的推动下，信息技术部门的职责是构建和维护大型同质化网络计算环境，而这些环境无一例外地采用了微软开发的解决方案。如果你是一名
    Mac 技术员，你的技能在当时并不抢手，我曾开玩笑说，能够修理苹果品牌的个人电脑正在变成一门`神秘技艺`。


    如今，得益于 iPhone 的"光环效应"——它带动更多客户购买 iPad、Apple Watch 并回归 Mac，苹果的各个平台已经实现了一次重大的复兴。由于云计算、网络应用程序、移动设备以及"自带设备"政策的兴起，许多公司允许苹果产品接入企业网络已变得司空见惯。用户期望他们的
    Mac 和 iPad 能与使用微软或谷歌平台的其他设备无缝集成。这给企业的信息技术部门带来了一些独特的挑战，他们必须在支持跨平台计算环境的同时，确保网络安全、控制成本并使其符合预算预期。


    如果您正在阅读本书，那么您很可能与众多技术专业人士一样，被赋予了支持一定数量苹果设备的任务，并需要一门关于 Mac 和/或 iOS 系统管理的速成课程。在本书中，您将找到关于
    `iOS`（包括 `iPadOS`）和 `Macintosh 操作系统` 的全面概述，使用`移动设备管理`管理苹果设备的策略，与主流微软解决方案集成的实用操作指南，以及为苹果硬件和软件的配置、部署或升级中某些更繁琐任务进行自动化的有用技巧。

