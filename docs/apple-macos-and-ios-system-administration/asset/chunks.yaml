- fmt: '# Adding Clients Using the Scanner


    Next, let’s go back to our server machine running the Apple Remote Desktop console.
    Open ARD and click the `Scanner` button on the left side of the screen as shown
    in Figure [6-8](#492151_1_En_6_Chapter.xhtml#Fig8). This starts a scan of the
    local area network, specifically my Wi-Fi network, and produces a list of clients
    on the network. It located my test laptop, `dwsmith’s MacBook Pro`, that I want
    to add to the ARD console. To add this machine to the console, click the computer
    in the Scanner list and `drag and drop` it onto the `All Computers` icon on the
    left.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig8_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    The ARD console scanner tool identifying network devices including Macs with the
    Remote Management service running


    **Pro Tip**


    Did you notice in the Scanner view that we are seeing both the `Name` and the
    `DNS Name` of our clients in ARD? In Chapter [2](#492151_1_En_2_Chapter.xhtml),
    we discussed the various names that your Mac uses including the friendly name
    (Name) and the hostname (DNS name). This is where we can start getting into trouble
    if our hostnames are all the same or are not adequately representative of the
    systems on the network.


    Once you attempt to add one or more systems to the All Computers console list,
    ARD will prompt you to `authenticate` with a local administrator account from
    the client you are attempting to add. Enter the login info and click `Add` to
    continue as shown in Figure [6-9](#492151_1_En_6_Chapter.xhtml#Fig9). Note that
    if you do not know the local password, you can still add the system to the console
    but you cannot run any tasks or remote control the system without authentication.


    **Pro Tip**


    If you have more than one computer to add, you can use the `shift` or `command`
    key modifier to select multiple computers and drag them all to the All Computers
    icon at once to add all of the systems simultaneously.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig9_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Authenticate with the client’s local Administrator account to add it to the ARD
    console


    After authenticating, the computer we added should be listed in the console under
    `All Computers` as shown in Figure [6-10](#492151_1_En_6_Chapter.xhtml#Fig10).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig10_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    The All Computers list with our added test Mac. The Current Status column should
    say Available


    **Pro Tip**


    Apple Remote Desktop uses `Virtual Network Computing` (VNC) to communicate with
    clients. You can install a VNC client on Windows- or Linux-based systems and use
    Remote Desktop to observe and control these operating systems in addition to macOS.


    With the ARD console still open on your server, go back to the test client and
    click the `Remote Management` icon in the `extra menu items` area as shown in
    Figure [6-11](#492151_1_En_6_Chapter.xhtml#Fig11). You should see the ability
    to `Message to Administrator…`. Your users can use this as a sort of `help desk`
    if they need some quick remote assistance with their computer. This will open
    a chat session and send a notification to the computer running Apple Remote Desktop
    to alert an available technician.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig11_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    The Remote Management menu item


    ## Organizing Clients in the ARD Console


    With one Mac in the console, exclusively using the `All Computers` group is probably
    fine. However, you will probably have dozens or maybe even `hundreds` of Macs
    in your ARD console, and you’ll want to have some organization around them so
    you can easily find them and manage them effectively.


    Let’s get organized with a couple of `Groups` and `Lists`. Using the `Add Groups/Lists
    + button`, create two `Groups`, one named `Development` and one called `Production`.
    Then create two `Lists`, one called `Test Macs` and the other named `Servers`.
    Using `drag and drop`, move the `Servers` list into the `Production` folder and
    move the `Test Macs` list into the `Development` folder. Finally, `drag and drop`
    the test Mac into the `Test Macs List` like I have in Figure [6-12](#492151_1_En_6_Chapter.xhtml#Fig12)
    with `dwsmith’s MacBook Pro`. When you are finished, your console should look
    similar to mine with the Computers, Lists, and Groups.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig12_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Your console should look similar to this with nested Lists and Groups


    You can organize your console manually using `Lists` and `Groups` in any configuration
    that makes sense for you. You can also create `Smart Lists` that include dynamically
    assigned computers for various tasks. Computers can belong to more than one list,
    including more than one Smart List. To create a Smart List, click the `Add Groups/Lists
    + button` and choose `New Smart List`. You will be presented with a sheet like
    the one in Figure [6-13](#492151_1_En_6_Chapter.xhtml#Fig13).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig13_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Create a Smart List by entering specific search criteria that will be used to
    populate the list with Macs that meet that criteria


    You can create a custom search using whatever criteria you want to. For example,
    you could have a Smart List set up by `macOS version` so you can target tasks
    to computers running Mojave and exempt computers running Catalina. Click the `Ok`
    button to create the Smart List and then click it to view the contents. Every
    time you use the Smart List, it will run the query that you configured against
    your entire `All Computers` inventory and populate the list with the matching
    systems.


    # Mac Remote Support


    As the name implies, Apple Remote Desktop provides a robust toolset for remote
    controlling Macs. There are three main options when remote controlling a Mac client:
    `observation` mode, `curtain` mode, and `control` mode. You can initiate all three
    of these options from the main ARD console window. Select a computer and then
    click the `Observe`, `Control`, or `Curtain` button on the toolbar to open the
    remote control window as shown in Figure [6-14](#492151_1_En_6_Chapter.xhtml#Fig14).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig14_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    The remote control window when connected to another Mac client


    When you are using the remote control window to remotely manage a system, you
    will notice a few options in the toolbar. You can switch between observation,
    curtain, and control modes. This allows you to start as an observer and then switch
    to curtain mode to do something securely, for example.


    You can take a `screenshot` of the remote screen and save it as a file on your
    computer or `copy and paste` between the remote computer and the workstation that
    the ARD console is running on. Finally, you can adjust the quality of the image
    using the `slider` on the top-right corner of the window to improve performance
    on slower network connections if there is lag with higher-resolution imagery.'
  raw: '### Adding Clients Using the Scanner


    Next, let’s go back to our server machine running the Apple Remote Desktop console.
    Open ARD and click the **Scanner** button on the left side of the screen as shown
    in Figure [6-8](#492151_1_En_6_Chapter.xhtml#Fig8). This starts a scan of the
    local area network, specifically my Wi-Fi network, and produces a list of clients
    on the network. It located my test laptop, *dwsmith’s MacBook Pro*, that I want
    to add to the ARD console. To add this machine to the console, click the computer
    in the Scanner list and **drag and drop** it onto the *All Computers* icon on
    the left.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig8_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    The ARD console scanner tool identifying network devices including Macs with the
    Remote Management service running


    Pro Tip


    Did you notice in the Scanner view that we are seeing both the *Name* and the
    *DNS* *Name* of our clients in ARD? In Chapter [2](#492151_1_En_2_Chapter.xhtml),
    we discussed the various names that your Mac uses including the friendly name
    (Name) and the hostname (DNS name). This is where we can start getting into trouble
    if our hostnames are all the same or are not adequately representative of the
    systems on the network.


    Once you attempt to add one or more systems to the All Computers console list,
    ARD will prompt you to **authenticate** with a local administrator account from
    the client you are attempting to add. Enter the login info and click **Add** to
    continue as shown in Figure [6-9](#492151_1_En_6_Chapter.xhtml#Fig9). Note that
    if you do not know the local password, you can still add the system to the console
    but you cannot run any tasks or remote control the system without authentication.


    Pro Tip


    If you have more than one computer to add, you can use the shift or command key
    modifier to select multiple computers and drag them all to the All Computers icon
    at once to add all of the systems simultaneously.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig9_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Authenticate with the client’s local Administrator account to add it to the ARD
    console


    After authenticating, the computer we added should be listed in the console under
    *All Computers* as shown in Figure [6-10](#492151_1_En_6_Chapter.xhtml#Fig10).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig10_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    The All Computers list with our added test Mac. The Current Status column should
    say Available


    Pro Tip


    Apple Remote Desktop uses *Virtual Network Computing* (VNC) to communicate with
    clients. You can install a VNC client on Windows- or Linux-based systems and use
    Remote Desktop to observe and control these operating systems in addition to macOS.


    With the ARD console still open on your server, go back to the test client and
    click the **Remote Management** icon in the *extra menu items* area as shown in
    Figure [6-11](#492151_1_En_6_Chapter.xhtml#Fig11). You should see the ability
    to **Message to Administrator…**. Your users can use this as a sort of *help desk*
    if they need some quick remote assistance with their computer. This will open
    a chat session and send a notification to the computer running Apple Remote Desktop
    to alert an available technician.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig11_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    The Remote Management menu item


    ### Organizing Clients in the ARD Console


    With one Mac in the console, exclusively using the *All Computers* group is probably
    fine. However, you will probably have dozens or maybe even *hundreds* of Macs
    in your ARD console, and you’ll want to have some organization around them so
    you can easily find them and manage them effectively.


    Let’s get organized with a couple of *Groups* and *Lists*. Using the **Add Groups/Lists
    + button**, create two **Groups**, one named **“Development”** and one called
    **“Production.”** Then create two **Lists**, one called **“Test Macs”** and the
    other named **“Servers.”** Using **drag and drop**, move the *Servers* list into
    the *Production* folder and move the *Test Macs* list into the *Development* folder.
    Finally, **drag and drop** the test Mac into the *Test Macs List* like I have
    in Figure [6-12](#492151_1_En_6_Chapter.xhtml#Fig12) with **dwsmith’s MacBook
    Pro**. When you are finished, your console should look similar to mine with the
    Computers, Lists, and Groups.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig12_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Your console should look similar to this with nested Lists and Groups


    You can organize your console manually using *Lists* and *Groups* in any configuration
    that makes sense for you. You can also create **Smart Lists** that include dynamically
    assigned computers for various tasks. Computers can belong to more than one list,
    including more than one Smart List. To create a Smart List, click the **Add Groups/Lists
    + button** and choose **New Smart List**. You will be presented with a sheet like
    the one in Figure [6-13](#492151_1_En_6_Chapter.xhtml#Fig13).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig13_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Create a Smart List by entering specific search criteria that will be used to
    populate the list with Macs that meet that criteria


    You can create a custom search using whatever criteria you want to. For example,
    you could have a Smart List set up by *macOS version* so you can target tasks
    to computers running Mojave and exempt computers running Catalina. Click the **Ok**
    button to create the Smart List and then click it to view the contents. Every
    time you use the Smart List, it will run the query that you configured against
    your entire *All Computers* inventory and populate the list with the matching
    systems.


    ## Mac Remote Support


    As the name implies, Apple Remote Desktop provides a robust toolset for remote
    controlling Macs. There are three main options when remote controlling a Mac client:
    *observation* mode, *curtain* mode, and *control* mode. You can initiate all three
    of these options from the main ARD console window. Select a computer and then
    click the **Observe**, **Control**, or **Curtain** button on the toolbar to open
    the remote control window as shown in Figure [6-14](#492151_1_En_6_Chapter.xhtml#Fig14).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig14_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    The remote control window when connected to another Mac client


    When you are using the remote control window to remotely manage a system, you
    will notice a few options in the toolbar. You can switch between observation,
    curtain, and control modes. This allows you to start as an observer and then switch
    to curtain mode to do something securely, for example.


    You can take a **screenshot** of the remote screen and save it as a file on your
    computer or **copy and paste** between the remote computer and the workstation
    that the ARD console is running on. Finally, you can adjust the quality of the
    image using the **slider** on the top-right corner of the window to improve performance
    on slower network connections if there is lag with higher-resolution imagery.'
  trans: '

    # 使用扫描器添加客户端


    接下来，让我们回到运行 Apple 远程桌面控制台的服务器设备上。打开 ARD，点击屏幕左侧的 `扫描器` 按钮，如图 6-8 所示。这将启动对本地局域网（具体是我的
    Wi-Fi 网络）的扫描，并生成网络上的客户端列表。它找到了我的测试笔记本电脑 `dwsmith’s MacBook Pro`，这正是我想要添加到 ARD
    控制台的设备。要将此机器添加到控制台，请点击扫描器列表中的计算机，然后将其 `拖放` 到左侧的 `所有计算机` 图标上。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig8_HTML.jpg](img/492151_1_En_6_Fig8_HTML.jpg)


    图 6-8


    ARD 控制台扫描器工具识别网络设备，包括运行了远程管理服务的 Mac 电脑


    **专业提示**


    你是否注意到在扫描器视图中，我们看到了 ARD 中客户端的 `名称` 和 `DNS 名称`？在第 2 章中，我们讨论了 Mac 使用的各种名称，包括友好名称（名称）和主机名（DNS
    名称）。如果我们的主机名全都相同或不能充分代表网络上的系统，这里就可能开始出现问题。


    一旦你尝试将一个或多个系统添加到“所有计算机”控制台列表，ARD 将提示你使用要添加的客户端的本地管理员帐户进行 `身份验证`。输入登录信息，然后点击 `添加`
    继续，如图 6-9 所示。请注意，如果你不知道本地密码，你仍然可以将系统添加到控制台，但未经身份验证，你将无法运行任何任务或远程控制系统。


    **专业提示**


    如果你有多个计算机要添加，可以使用 `shift` 或 `command` 键修饰符选择多台计算机，然后将它们全部一次性拖放到“所有计算机”图标上，以同时添加所有系统。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig9_HTML.jpg](img/492151_1_En_6_Fig9_HTML.jpg)


    图 6-9


    使用客户端的本地管理员帐户进行身份验证，将其添加到 ARD 控制台


    身份验证后，我们添加的计算机应会列在控制台的 `所有计算机` 下，如图 6-10 所示。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig10_HTML.jpg](img/492151_1_En_6_Fig10_HTML.jpg)


    图 6-10


    包含我们添加的测试 Mac 的“所有计算机”列表。“当前状态”列应显示为“可用”


    **专业提示**


    Apple 远程桌面使用 `虚拟网络计算` 与客户端通信。除了 macOS，你还可以在基于 Windows 或 Linux 的系统上安装 VNC 客户端，并使用远程桌面来观察和控制这些操作系统。


    在你的服务器上仍打开 ARD 控制台，回到测试客户端，点击 `额外菜单项` 区域中的 `远程管理` 图标，如图 6-11 所示。你应该能看到 `向管理员发送消息…`
    选项。如果用户需要对其计算机进行一些快速的远程协助，他们可以将其作为一种 `服务台` 来使用。这将打开一个聊天会话，并向运行 Apple 远程桌面的计算机发送通知，以提醒可用的技术人员。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig11_HTML.jpg](img/492151_1_En_6_Fig11_HTML.jpg)


    图 6-11


    远程管理菜单项


    ## 在 ARD 控制台中组织客户端


    控制台中只有一台 Mac 时，仅使用 `所有计算机` 分组可能没问题。但是，你可能在 ARD 控制台中有 `数十台` 甚至 `数百台` Mac，你会希望它们有一定的组织方式，以便轻松找到并有效管理它们。


    让我们用一些 `组` 和 `列表` 来进行组织。使用 `添加组/列表 + 按钮`，创建两个 `组`，一个名为 `开发`，另一个名为 `生产`。然后创建两个
    `列表`，一个叫 `测试 Mac`，另一个叫 `服务器`。使用 `拖放` 操作，将 `服务器` 列表移动到 `生产` 文件夹中，并将 `测试 Mac` 列表移动到
    `开发` 文件夹中。最后，将测试 Mac `拖放` 到 `测试 Mac 列表` 中，如图 6-12 所示，我操作的是 `dwsmith’s MacBook
    Pro`。完成后，你的控制台应该与我的类似，包含计算机、列表和组。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig12_HTML.jpg](img/492151_1_En_6_Fig12_HTML.jpg)


    图 6-12


    你的控制台应与此类似，包含嵌套的列表和组


    你可以使用 `列表` 和 `组` 以任何对你有意义的配置手动组织控制台。你还可以创建 `智能列表`，其中包含为各种任务动态分配的计算机。一台计算机可以属于多个列表，包括多个智能列表。要创建智能列表，请点击
    `添加组/列表 + 按钮` 并选择 `新建智能列表`。你将看到一个类似图 6-13 的工作表。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig13_HTML.jpg](img/492151_1_En_6_Fig13_HTML.jpg)


    图 6-13


    创建智能列表，输入特定搜索条件，该列表将自动填充符合这些条件的 Mac 电脑


    你可以使用任何你想要的搜索条件来创建自定义搜索。例如，你可以按 `macOS 版本` 设置一个智能列表，以便针对运行 Mojave 的计算机执行任务，同时排除运行
    Catalina 的计算机。点击 `确定` 按钮创建智能列表，然后点击它以查看内容。每次使用智能列表时，它都会根据你配置的查询条件对 `所有计算机` 清单进行筛选，并将匹配的系统填充到列表中。


    # Mac 远程支持


    顾名思义，Apple 远程桌面提供了一套强大的工具集来远程控制 Mac。远程控制 Mac 客户端时主要有三种选项：`观察` 模式、`幕帘` 模式和 `控制`
    模式。你可以在主 ARD 控制台窗口中启动这三种选项。选择一台计算机，然后点击工具栏上的 `观察`、`控制` 或 `幕帘` 按钮，即可打开远程控制窗口，如图
    6-14 所示。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig14_HTML.jpg](img/492151_1_En_6_Fig14_HTML.jpg)


    图 6-14


    连接到另一台 Mac 客户端时的远程控制窗口


    当你使用远程控制窗口远程管理系统时，你会注意到工具栏中有几个选项。你可以在观察、幕帘和控制模式之间切换。例如，这允许你先作为观察者，然后切换到幕帘模式以安全地执行某些操作。


    你可以 `截取` 远程屏幕的 `屏幕截图`，并将其作为文件保存到你的计算机上，或者在远程计算机和运行 ARD 控制台的工作站之间 `复制和粘贴`。最后，如果高分辨率图像有延迟，你可以在网络连接较慢时，使用窗口右上角的
    `滑块` 调整图像质量以提高性能。

    '
- fmt: '# 观察模式


    观察模式是最简单的远程模式。你可以在不与被控计算机进行任何交互的情况下查看一个或多个系统。这在您与最终用户交谈并希望观察他们的Mac，让他们展示遇到的问题以便您更好地进行故障排除时非常有用。这个功能也常用于教室或计算机实验室，实验室管理员或讲师希望在作业或测试期间关注课堂上学生使用计算机的情况。


    # 控制模式


    默认情况下，使用ARD控制台选择远程控制另一台Mac时，你将处于*共享*控制模式。在此模式下，你的最终用户可以继续控制他们的系统，而你作为远程管理员与他们共享控制权。这可能会导致鼠标和键盘的“争夺”，因此，如果你需要完全控制系统并锁定用户，使其无法控制自己的系统，可以点击另一个控制按钮切换到*绝对*控制模式，如图[6-15]所示。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig15_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig15_HTML.jpg)


    图 6-15


    绝对控制按钮


    # 幕帘模式


    幕帘模式是第三种远程控制形式，类似于绝对控制和共享控制模式，作为远程管理员，你可以控制用户的桌面。然而，幕帘模式的主要区别在于它会遮蔽远程屏幕，使最终用户看不到你的操作。这在需要使用任何安全程序解决问题，且不想向用户披露具体操作时非常有用。例如，映射一个安全的网络驱动器并浏览你不想让用户看到的敏感数据。


    **专业提示**


    当使用**幕帘**模式时，ARD会提示你在接管用户屏幕时输入一些内容到对话框中，该对话框会显示给最终用户。这有助于告知用户正在他们的系统上进行工作，并显示远程任务何时完成。图[6-16]展示了最终用户在此过程中看到的示例。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig16_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig16_HTML.jpg)


    图 6-16


    幕帘控制过程中最终用户看到的示例消息


    # 聊天


    除了远程控制，你还可以使用ARD内置的即时消息功能远程与用户聊天。你可以选择想要与之交互的用户所在的计算机，然后从**交互**菜单中选择**聊天**来开始聊天会话。这将允许你在帮助用户排查问题时与他们实时来回交谈。


    # 锁定屏幕


    **交互**菜单下的**锁定**和**解锁屏幕**功能在学校和公共实验室环境中非常有用，在这些环境中可能会发现用户违反了学校的可接受使用策略。例如，如果一名学生做了违反政策的事情并且被远程观察到，你可以锁定他们的屏幕，从而在需要向学校管理层或有关部门报告违规行为时，能够“当场抓获”。屏幕被锁定时，看起来与*幕帘*模式非常相似，除了关闭系统电源外，用户无法进行任何操作。


    # 客户端管理


    Apple Remote Desktop还提供了许多远程客户端管理功能，包括电源控制、远程更新特定设置等。大多数远程管理选项可以在**管理**菜单下找到，如图[6-17]所示。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig17_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig17_HTML.jpg)


    图 6-17


    管理菜单提供了大部分远程客户端管理命令


    ## 电源控制


    选择一个或多个远程计算机，然后选择**睡眠...**、**唤醒...**、**重启...**、**关机...**或**注销当前用户...**。这些都是相当直观的。当你选择其中一种电源选项时，会弹出一个任务窗口，你可以选择*立即*执行这些操作之一，或者*在电源任务运行前给最终用户一个警告和保存以及关闭他们当前工作的任何内容的时间*。由于这是一个任务，你可以通过ARD控制台窗口左侧的*活动任务*列表来跟踪状态。


    ## 清倒废纸篓


    另一个简单的选项。选择一个或多个计算机，使用此命令清空远程计算机上的废纸篓。


    ## 设置启动磁盘


    当每台新Mac都可以使用*NetBoot*和*NetRestore*时，这曾是一个非常实用的工具，但随着配备*T2安全芯片*的新款Mac的发布，其重要性有所降低。如果你的Mac仍然支持NetBoot，这可以是一个很好的功能，用于选择网络启动卷并设置你的远程Mac从网络重新启动。


    如图[6-18]所示，从**管理**菜单中选择**设置启动磁盘**。当“设置启动磁盘”窗口出现时，点击**自定义**。在这里，你可以输入服务器的IP地址和NetBoot卷名。这可以强制一台或多台Mac从网络启动磁盘重启，以便你可以对内部硬盘进行擦除和恢复。这是旧的*映像部署*工作流，在许多学校和办公环境中仍然很受欢迎。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig18_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig18_HTML.jpg)


    图 6-18


    用于识别NetBoot服务器和网络卷的设置，以便从局域网启动非T2芯片的Mac


    ## 更改客户端设置


    一旦你的Apple Remote Desktop控制台中有数百台Mac客户端，你可能希望更改一个或多个管理ARD工作方式的设置。即使使用远程控制选项，如果你需要接触组织中的每一台Mac并手动打开*共享系统偏好设置*进行更改，那也将非常耗时。


    幸运的是，Apple提供了一个*更改客户端设置助手*，你可以使用它在所有选定的机器上调整这些设置。只需在ARD控制台中选择你想要更新的Mac，然后从**管理**菜单中选择**更改客户端设置**。按照如图[6-19]所示的助手逐步操作并相应地更新设置。它将生成一个任务来更新选定远程系统上的设置。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig19_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig19_HTML.jpg)


    图 6-19


    更改客户端设置助手


    **专业提示**


    在对多台远程机器更新设置之前，你应该至少在物理距离较近的一台机器上进行测试。如果你犯了错误，可以纠正并重试，而不是推送一个导致你失去对所有远程系统控制的设置。作为一般经验法则，在任何任务或大规模更改设置之前，你确实需要先在几台机器上测试，直到一切完美运行为止。'
  raw: '### Observe


    Observation mode is the simplest remote mode. You can view one or more systems
    without any interaction with the remote computer. This is helpful if you are talking
    with an end user and you want to shadow their Mac and have them demonstrate an
    issue they are having so you can better troubleshoot the problem. This feature
    has also been known to be used in classrooms or computer labs where the lab monitor
    or instructor wants to keep an eye on what the students in the class are doing
    with their computers during an assignment or a testing session.


    ### Control


    By default, when choosing to remote control another Mac using the ARD console,
    you will be in *shared* control mode. In this mode, your end user can continue
    to control their system, and you share control with them as the remote administrator.
    This can result in *fighting* over the mouse and keyboard, so if you need to take
    full control of the system and lock the user out of being able to control their
    system, you can toggle to *absolute* control mode by clicking the other control
    button as shown in Figure [6-15](#492151_1_En_6_Chapter.xhtml#Fig15).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig15_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    The absolute control button


    ### Curtain


    Curtain mode is a third form of remote control, similar to absolute control and
    shared control modes in that as a remote administrator you can control the user’s
    desktop. However, the main difference with curtain mode is that it blanks out
    the remote screen so the end user cannot see what you are doing. This can be useful
    if you need to use any kind of secure procedure to resolve an issue and you don’t
    want to disclose to the user what you are doing. An example might be mapping a
    secure network drive and browsing through sensitive data that you don’t want a
    user to be able to see.


    Pro Tip


    When using **curtain** mode, ARD will prompt you to enter something into a dialog
    box that will be displayed to the end user when you take over their screen. This
    is useful for disclosing to the user that work is being done on their system and
    to show when the remote task is completed. Figure [6-16](#492151_1_En_6_Chapter.xhtml#Fig16)
    provides an example of what the end user sees during this process.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig16_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig16_HTML.jpg)


    Figure 6-16


    An example of the message that end users see during curtain control procedures


    ### Chat


    In addition to remote control, you can also chat with users remotely using the
    built-in instant messaging functionality in ARD. You can select a computer you
    want to interact with the user of and then choose **Chat** from the **Interact**
    menu to start a chat session. This will allow you to talk back and forth with
    the user in real time while you help troubleshoot their issue.


    ### Lock Screen


    The **Lock** and **Unlock Screen** feature found under the **Interact** menu is
    useful in schools and public lab environments where users may be found in violation
    of the school’s acceptable use policy. For example, if a student is doing something
    in violation of the policy and they are remotely observed doing so, you can lock
    their screen and essentially catch them *red-handed* if you need to alert the
    school administration or authorities of the violation. When the screen is locked,
    it looks very similar to *curtain* mode, and the user cannot do anything save
    for powering down the system.


    ## Client Administration


    Apple Remote Desktop also provides a number of remote client administration features
    including power controls, remotely updating particular settings, and more. Most
    of these remote administration options are found under the **Manage** menu as
    shown in Figure [6-17](#492151_1_En_6_Chapter.xhtml#Fig17).


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig17_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig17_HTML.jpg)


    Figure 6-17


    The Manage menu provides most of the remote client administration commands


    ### Power Control


    Select one or more remote computers and choose **Sleep…**, **Wake…**, **Restart…**,
    **Shut Down…,** or **Log Out Current User…**. These are all pretty self-explanatory.
    When you select one of these power options, you are given a task window where
    you can choose *to immediately* require one of these actions to occur or *give
    the end user a warning and time to save and close out of anything they are currently
    working on* before the power task runs. Because this is a task, you can track
    the status through the *Active Tasks* list on the left side of the ARD console
    window.


    ### Empty Trash


    Another simple option. Select one or more computers and use this command to empty
    the trash on the remote machines.


    ### Set Startup Disk


    This used to be a much more useful tool when every new Mac could use *NetBoot*
    and *NetRestore*, but with the release of new Macs that feature the *T2 Security
    chip*, this has become less important. If your Macs still support NetBoot, this
    can be a nice feature for selecting a network startup volume and setting your
    remote Macs to restart from the network.


    As shown in Figure [6-18](#492151_1_En_6_Chapter.xhtml#Fig18), select **Set Startup
    Disk** from the **Manage** menu. When the Set Startup Disk window appears, click
    **Custom**. Here you can enter the server’s IP and NetBoot volume name. This can
    force one or more Macs to reboot off of a network startup disk so you can do an
    erase and restore of the internal hard disk. This is the old *imaging* workflow
    that is still popular in many schools and office environments.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig18_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig18_HTML.jpg)


    Figure 6-18


    Settings for identifying a NetBoot server and network volume for booting non-T2
    Macs from the local area network


    ### Change Client Settings


    Once you have several hundred Mac clients in your Apple Remote Desktop console,
    you may want to make a change to one or more settings that govern how ARD works.
    Even using remote control options, if you had to touch every single Mac in your
    organization and manually open the *Sharing System Preference* to make a change,
    it would be very time consuming.


    Fortunately, Apple makes available a *Change Client Settings Assistant* that you
    can use to adjust these settings on all selected machines. Simply select the Macs
    in the ARD console that you want to update and select **Change Client Settings**
    from the **Manage** menu. Step through the Assistant as shown in Figure [6-19](#492151_1_En_6_Chapter.xhtml#Fig19)
    and update the settings accordingly. It will generate a task to update the settings
    on the selected remote systems.


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig19_HTML.jpg](images/492151_1_En_6_Chapter/492151_1_En_6_Fig19_HTML.jpg)


    Figure 6-19


    The Change Client Settings Assistant


    Pro Tip


    You should test this on at least one machine that is within physical proximity
    before you update the settings on multiple remote machines. If you make a mistake,
    you can correct it and try again, instead of pushing a setting that causes you
    to lose control of all of your remote systems. As a general rule of thumb, you
    really want to test until you have everything working flawlessly on a couple of
    machines before running any task or making a setting change on a massive scale.'
  trans: '

    # 观察模式


    观察模式是最简单的远程模式。你可以在不与被控计算机进行任何交互的情况下查看一个或多个系统。这在您与最终用户交谈并希望观察他们的 Mac，让他们展示遇到的问题以便您更好地进行故障排除时非常有用。这个功能也常用于教室或计算机实验室，实验室管理员或讲师希望在作业或测试期间关注课堂上学生使用计算机的情况。


    # 控制模式


    默认情况下，使用 ARD 控制台选择远程控制另一台 Mac 时，你将处于*共享*控制模式。在此模式下，你的最终用户可以继续控制他们的系统，而你作为远程管理员与他们共享控制权。这可能会导致鼠标和键盘的“争夺”，因此，如果你需要完全控制系统并锁定用户，使其无法控制自己的系统，可以点击另一个控制按钮切换到*绝对*控制模式，如图[6-15]所示。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig15_HTML.jpg](img/492151_1_En_6_Fig15_HTML.jpg)


    图 6-15


    绝对控制按钮


    # 幕帘模式


    幕帘模式是第三种远程控制形式，类似于绝对控制和共享控制模式，作为远程管理员，你可以控制用户的桌面。然而，幕帘模式的主要区别在于它会遮蔽远程屏幕，使最终用户看不到你的操作。这在需要使用任何安全程序解决问题，且不想向用户披露具体操作时非常有用。例如，映射一个安全的网络驱动器并浏览你不想让用户看到的敏感数据。


    **专业提示**


    当使用**幕帘**模式时，ARD 会提示你在接管用户屏幕时输入一些内容到对话框中，该对话框会显示给最终用户。这有助于告知用户正在他们的系统上进行工作，并显示远程任务何时完成。图[6-16]展示了最终用户在此过程中看到的示例。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig16_HTML.jpg](img/492151_1_En_6_Fig16_HTML.jpg)


    图 6-16


    幕帘控制过程中最终用户看到的示例消息


    # 聊天


    除了远程控制，你还可以使用 ARD 内置的即时消息功能远程与用户聊天。你可以选择想要与之交互的用户所在的计算机，然后从**交互**菜单中选择**聊天**来开始聊天会话。这将允许你在帮助用户排查问题时与他们实时来回交谈。


    # 锁定屏幕


    **交互**菜单下的**锁定**和**解锁屏幕**功能在学校和公共实验室环境中非常有用，在这些环境中可能会发现用户违反了学校的可接受使用策略。例如，如果一名学生做了违反政策的事情并且被远程观察到，你可以锁定他们的屏幕，从而在需要向学校管理层或有关部门报告违规行为时，能够“当场抓获”。屏幕被锁定时，看起来与*幕帘*模式非常相似，除了关闭系统电源外，用户无法进行任何操作。


    # 客户端管理


    Apple Remote Desktop 还提供了许多远程客户端管理功能，包括电源控制、远程更新特定设置等。大多数远程管理选项可以在**管理**菜单下找到，如图[6-17]所示。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig17_HTML.jpg](img/492151_1_En_6_Fig17_HTML.jpg)


    图 6-17


    管理菜单提供了大部分远程客户端管理命令


    ## 电源控制


    选择一个或多个远程计算机，然后选择**睡眠...**、**唤醒...**、**重启...**、**关机...**或**注销当前用户...**。这些都是相当直观的。当你选择其中一种电源选项时，会弹出一个任务窗口，你可以选择*立即*执行这些操作之一，或者*在电源任务运行前给最终用户一个警告和保存以及关闭他们当前工作的任何内容的时间*。由于这是一个任务，你可以通过
    ARD 控制台窗口左侧的*活动任务*列表来跟踪状态。


    ## 清倒废纸篓


    另一个简单的选项。选择一个或多个计算机，使用此命令清空远程计算机上的废纸篓。


    ## 设置启动磁盘


    当每台新 Mac 都可以使用*NetBoot*和*NetRestore*时，这曾是一个非常实用的工具，但随着配备*T2 安全芯片*的新款 Mac 的发布，其重要性有所降低。如果你的
    Mac 仍然支持 NetBoot，这可以是一个很好的功能，用于选择网络启动卷并设置你的远程 Mac 从网络重新启动。


    如图[6-18]所示，从**管理**菜单中选择**设置启动磁盘**。当“设置启动磁盘”窗口出现时，点击**自定义**。在这里，你可以输入服务器的 IP 地址和
    NetBoot 卷名。这可以强制一台或多台 Mac 从网络启动磁盘重启，以便你可以对内部硬盘进行擦除和恢复。这是旧的*映像部署*工作流，在许多学校和办公环境中仍然很受欢迎。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig18_HTML.jpg](img/492151_1_En_6_Fig18_HTML.jpg)


    图 6-18


    用于识别 NetBoot 服务器和网络卷的设置，以便从局域网启动非 T2 芯片的 Mac


    ## 更改客户端设置


    一旦你的 Apple Remote Desktop 控制台中有数百台 Mac 客户端，你可能希望更改一个或多个管理 ARD 工作方式的设置。即使使用远程控制选项，如果你需要接触组织中的每一台
    Mac 并手动打开*共享系统偏好设置*进行更改，那也将非常耗时。


    幸运的是，Apple 提供了一个*更改客户端设置助手*，你可以使用它在所有选定的机器上调整这些设置。只需在 ARD 控制台中选择你想要更新的 Mac，然后从**管理**菜单中选择**更改客户端设置**。按照如图[6-19]所示的助手逐步操作并相应地更新设置。它将生成一个任务来更新选定远程系统上的设置。


    ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig19_HTML.jpg](img/492151_1_En_6_Fig19_HTML.jpg)


    图 6-19


    更改客户端设置助手


    **专业提示**


    在对多台远程机器更新设置之前，你应该至少在物理距离较近的一台机器上进行测试。如果你犯了错误，可以纠正并重试，而不是推送一个导致你失去对所有远程系统控制的设置。作为一般经验法则，在任何任务或大规模更改设置之前，你确实需要先在几台机器上测试，直到一切完美运行为止。

