- fmt: "# Preparing Devices in Apple Configurator\n\nNow that we have the supervision\
    \ identity and organization out of the way, let’s start by preparing our first\
    \ device. We are going to create a supervised device in this exercise so that\
    \ we have the ability to use the full extent of security options available to\
    \ us.\n\n## Prepare The Device\n\n1.  To get started, **select** the device in\
    \ your list that you want to configure and click the **Prepare** button in the\
    \ toolbar.\n2.  The Prepare Devices Assistant dialog box like the one shown in\
    \ Figure [5-6](#492151_1_En_5_Chapter.xhtml#Fig6) will prompt you select a method.\
    \ We will use a **Manual Configuration,** and **supervise** the device, but **allow\
    \ it to pair with other computers**. Click the **Next** button to continue.\n\
    3.  We are not going to use an MDM in this chapter, so you can select **Do not\
    \ enroll in MDM** in the next dialog box. Click the **Next** button to continue.\n\
    \n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig6_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig6_HTML.jpg)\n\
    \n    Figure 5-6\n\n    Prepare the device as supervised\n\n4.  Select your **Organization**\
    \ from the pop-up menu. Click the **Next** button to continue.\n5.  When we are\
    \ prompted to select which steps are shown during the *iOS Setup Assistant*, it\
    \ is referring to the steps your end users must view and respond to when they\
    \ boot their device for the first time. Many of these will seem familiar if you\
    \ have recently installed a fresh copy of iOS and had to use the Setup Assistant.\
    \ Please note that not all of these steps apply to every device. Let’s choose\
    \ **Show only some steps** from the drop-down and then **check** a few of them\
    \ as shown in Figure [5-7](#492151_1_En_5_Chapter.xhtml#Fig7).\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig7_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig7_HTML.jpg)\n\
    \n    Figure 5-7\n\n    Select these steps to show to the user and skip the rest\n\
    \n6.  Click the **Prepare** button to set up the device. It will begin applying\
    \ the configuration settings to the iOS device. When it completes, you will see\
    \ that *Is Supervised* is now listed as **Yes** and your *Organization Name* is\
    \ listed as shown in Figure [5-8](#492151_1_En_5_Chapter.xhtml#Fig8).\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig8_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig8_HTML.jpg)\n\
    \n    Figure 5-8\n\n    Our device is now tied to our organization and supervised\n\
    \n7.  Next, let’s check our work on the iOS device. **Disconnect** the device\
    \ and step through the Setup Assistant. If this worked correctly, the only prompts\
    \ you should receive are for **Language**, **Region**, **Wi-Fi**, **Passcode**,\
    \ **Apple ID**, **Location Services**, and **Welcome**. *Success!* Now you can\
    \ use this same methodology to craft the out-of-the box experience for your end\
    \ users and eliminate unnecessary (or confusing) prompts.\n\n    **Pro Tip** Did\
    \ you notice that it prompted us for Wi-Fi even though we didn’t check Wi-Fi/Network\
    \ as an option in the iOS Setup Assistant dialog box? Did you notice that there\
    \ isn’t even a checkbox for Wi-Fi/Network, only **Cellular**, in the Apple Configurator\
    \ Setup Assistant options? Internet access is required for the *activation* of\
    \ iOS devices, and you cannot bypass this option in the Setup Assistant unless\
    \ you are delivering a configuration profile that specifies wireless settings.\n\
    \nOnce you have made it to the Home Screen, reset the test device back to default\
    \ by going to `Settings ➤ General ➤ Reset ➤ Erase All Content and Settings`. Then\
    \ plug the test device back into the computer using the USB cable. Once it has\
    \ finished with the restore process, leave it at the Setup Assistant screen so\
    \ we are ready for our next exercise.\n\n# Configuration Profiles\n\n## Introduction\
    \ to Configuration Profiles\n\n*Configuration Profiles*, often referred to by\
    \ their file extension `*.mobileconfig` profiles, are XML *Property Lists* that\
    \ can be installed on iOS devices to disable and enable certain features or enforce\
    \ various security restrictions. Configuration Profiles are made up of one or\
    \ more payloads. A *payload* is a specific configuration, such as a minimum passcode\
    \ security setting, that defines a requirement or restriction on the device. Some\
    \ payloads are device specific, meaning that they apply at the device level, while\
    \ some payloads are user specific, meaning that they apply only to specific users\
    \ on that device (in the case of `macOS`). Payloads are available for `macOS`,\
    \ `iOS`, `iPadOS`, `tvOS`, or some combination of these. In this chapter, we are\
    \ going to focus specifically on `iOS` and `iPadOS` payloads.\n\n**Pro Tip**\n\
    \nIt is recommended by Apple that you create different Configuration Profiles\
    \ for unique device types. This means that if you are creating a Profile to install\
    \ exclusively on iOS devices, do not try to configure macOS payloads in that Profile.\
    \ Create a unique set of Profiles targeted to each specific OS family instead\
    \ of one monolithic Profile that could be applied to any OS.\n\n## Your First\
    \ Configuration Profile\n\nThe best way to learn about Configuration Profiles\
    \ and their payloads is to create a few, apply them to your device, and see what\
    \ the effect is.\n\n1.  When it has completed the preparation and the Configuration\
    \ Profile we created has been loaded, let’s test our work. **Disconnect** the\
    \ device and start stepping through the iOS Setup Assistant. This time, when you\
    \ get to the passcode option, it should match Figure [5-13](#492151_1_En_5_Chapter.xhtml#Fig13).\
    \ See how it requires a strong passcode as defined in the payload we created?\
    \ That is the power of Configuration Profiles.\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig13_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig13_HTML.jpg)\n\
    \n    Figure 5-13\n\n    Setup Assistant now requires a strong passcode\n\n2.\
    \  When it is finished installing the Configuration Profile, **select** the test\
    \ device to highlight it, and then let’s **prepare** it again like we did in the\
    \ previous section. Same settings as before, including the iOS Setup Assistant\
    \ modifications. These are likely cached from the last time we did this, but if\
    \ not, you can refer to Figure [5-7](#492151_1_En_5_Chapter.xhtml#Fig7) from earlier\
    \ in this chapter.\n3.  Finish the iOS Setup Assistant, and when you get to the\
    \ Home Screen, let’s remove this Configuration Profile. Remember, we didn’t specify\
    \ a removal password, so as an end user, we have the power to remove this restriction.\
    \ Browse to `Settings ➤ General ➤ Profiles` and tap our **Passcode Enforcement\
    \ Configuration Profile**. Tap the **Remove Profile** button and follow the prompts\
    \ to remove it as shown in Figure [5-14](#492151_1_En_5_Chapter.xhtml#Fig14).\n\
    \n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig14_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig14_HTML.jpg)\n\
    \n    Figure 5-14\n\n    My example Configuration Profile—yours may be named slightly\
    \ differently\n\n4.  Finally, let’s browse to `Settings ➤ Touch ID & Passcode`,\
    \ and now you can **Change the Passcode** or **Turn Passcode Off** along with\
    \ modifying other settings that used to be governed by the (now removed) Configuration\
    \ Profile.\n\n**Pro Tip** Notice how our Configuration Profile says “Not Signed”\
    \ in bold red font? Some settings may not apply without a valid code-signed Profile.\
    \ To code-sign your Configuration Profiles, before you save them in the Profile\
    \ editor, choose **Sign Profile** from the **File** menu and select your **signing\
    \ identity**. Please be aware that signed Profiles cannot be edited after the\
    \ fact, so keep a saved copy that isn’t signed for future modification. Going\
    \ forward in this book, we will sign our Configuration Profiles."
  raw: "## Preparing Devices in Apple Configurator\n\nNow that we have the supervision\
    \ identity and organization out of the way, let’s start by preparing our first\
    \ device. We are going to create a supervised device in this exercise so that\
    \ we have the ability to use the full extent of security options available to\
    \ us.\n\nPrepare The Device\n\n1.  Next, let’s check our work on the iOS device.\
    \ **Disconnect** the device and step through the Setup Assistant. If this worked\
    \ correctly, the only prompts you should receive are for **Language**, **Region**,\
    \ **Wi-Fi**, **Passcode**, **Apple ID**, **Location Services**, and **Welcome**.\
    \ *Success!* Now you can use this same methodology to craft the out-of-the box\
    \ experience for your end users and eliminate unnecessary (or confusing) prompts.\n\
    \n    **Pro Tip** Did you notice that it prompted us for Wi-Fi even though we\
    \ didn’t check Wi-Fi/Network as an option in the iOS Setup Assistant dialog box?\
    \ Did you notice that there isn’t even a checkbox for Wi-Fi/Network, only **Cellular**,\
    \ in the Apple Configurator Setup Assistant options? Internet access is required\
    \ for the *activation* of iOS devices, and you cannot bypass this option in the\
    \ Setup Assistant unless you are delivering a configuration profile that specifies\
    \ wireless settings.\n\n1.  Click the **Prepare** button to set up the device.\
    \ It will begin applying the configuration settings to the iOS device. When it\
    \ completes, you will see that *Is Supervised* is now listed as **Yes** and your\
    \ *Organization Name* is listed as shown in Figure [5-8](#492151_1_En_5_Chapter.xhtml#Fig8).\n\
    \n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig8_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig8_HTML.jpg)\n\
    \n    Figure 5-8\n\n    Our device is now tied to our organization and supervised\n\
    \n1.  Select your **Organization** from the pop-up menu. Click the **Next** button\
    \ to continue.\n\n2.  When we are prompted to select which steps are shown during\
    \ the *iOS Setup Assistant*, it is referring to the steps your end users must\
    \ view and respond to when they boot their device for the first time. Many of\
    \ these will seem familiar if you have recently installed a fresh copy of iOS\
    \ and had to use the Setup Assistant. Please note that not all of these steps\
    \ apply to every device. Let’s choose **Show only some steps** from the drop-down\
    \ and then **check** a few of them as shown in Figure [5-7](#492151_1_En_5_Chapter.xhtml#Fig7).\n\
    \n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig7_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig7_HTML.jpg)\n\
    \n    Figure 5-7\n\n    Select these steps to show to the user and skip the rest\n\
    \n1.  To get started, **select** the device in your list that you want to configure\
    \ and click the **Prepare** button in the toolbar.\n\n2.  The Prepare Devices\
    \ Assistant dialog box like the one shown in Figure [5-6](#492151_1_En_5_Chapter.xhtml#Fig6)\
    \ will prompt you select a method. We will use a **Manual Configuration,** and\
    \ **supervise** the device, but **allow it to pair with other computers**. Click\
    \ the **Next** button to continue.\n\n3.  We are not going to use an MDM in this\
    \ chapter, so you can select **Do not enroll in MDM** in the next dialog box.\
    \ Click the **Next** button to continue.\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig6_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig6_HTML.jpg)\n\
    \n    Figure 5-6\n\n    Prepare the device as supervised\n\nOnce you have made\
    \ it to the Home Screen, reset the test device back to default by going to ***Settings\
    \ ➤ General ➤ Reset ➤ Erase All Content and Settings***. Then plug the test device\
    \ back into the computer using the USB cable. Once it has finished with the restore\
    \ process, leave it at the Setup Assistant screen so we are ready for our next\
    \ exercise.\n\n## Configuration Profiles\n\n### Introduction to Configuration\
    \ Profiles\n\n*Configuration Profiles*, often referred to by their file extension\
    \ **∗.mobileconfig** profiles, are XML *Property Lists* that can be installed\
    \ on iOS devices to disable and enable certain features or enforce various security\
    \ restrictions. Configuration Profiles are made up of one or more payloads. A\
    \ *payload* is a specific configuration, such as a minimum passcode security setting,\
    \ that defines a requirement or restriction on the device. Some payloads are device\
    \ specific, meaning that they apply at the device level, while some payloads are\
    \ user specific, meaning that they apply only to specific users on that device\
    \ (in the case of *macOS*). Payloads are available for *macOS*, *iOS*, *iPadOS*,\
    \ *tvOS*, or some combination of these. In this chapter, we are going to focus\
    \ specifically on *iOS* and *iPadOS* payloads.\n\nPro Tip\n\nIt is recommended\
    \ by Apple that you create different Configuration Profiles for unique device\
    \ types. This means that if you are creating a Profile to install exclusively\
    \ on iOS devices, do not try to configure macOS payloads in that Profile. Create\
    \ a unique set of Profiles targeted to each specific OS family instead of one\
    \ monolithic Profile that could be applied to any OS.\n\nYour First Configuration\
    \ Profile\n\nThe best way to learn about Configuration Profiles and their payloads\
    \ is to create a few, apply them to your device, and see what the effect is.\n\
    \n1.  Finally, let’s browse to ***Settings ➤ Touch ID & Passcode,*** and now you\
    \ can **Change the Passcode** or **Turn Passcode Off** along with modifying other\
    \ settings that used to be governed by the (now removed) Configuration Profile.\n\
    \n**Pro Tip** Notice how our Configuration Profile says “Not Signed” in bold red\
    \ font? Some settings may not apply without a valid code-signed Profile. To code-sign\
    \ your Configuration Profiles, before you save them in the Profile editor, choose\
    \ **Sign Profile** from the **File** menu and select your **signing identity**.\
    \ Please be aware that signed Profiles cannot be edited after the fact, so keep\
    \ a saved copy that isn’t signed for future modification. Going forward in this\
    \ book, we will sign our Configuration Profiles.\n\n1.  Finish the iOS Setup Assistant,\
    \ and when you get to the Home Screen, let’s remove this Configuration Profile.\
    \ Remember, we didn’t specify a removal password, so as an end user, we have the\
    \ power to remove this restriction. Browse to ***Settings ➤ General ➤ Profiles***\
    \ and tap our **Passcode Enforcement Configuration Profile**. Tap the **Remove\
    \ Profile** button and follow the prompts to remove it as shown in Figure [5-14](#492151_1_En_5_Chapter.xhtml#Fig14).\n\
    \n![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig14_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig14_HTML.jpg)\n\
    \nFigure 5-14\n\nMy example Configuration Profile—yours may be named slightly\
    \ differently\n\n1.  When it is finished installing the Configuration Profile,\
    \ **select** the test device to highlight it, and then let’s **prepare** it again\
    \ like we did in the previous section. Same settings as before, including the\
    \ iOS Setup Assistant modifications. These are likely cached from the last time\
    \ we did this, but if not, you can refer to Figure [5-7](#492151_1_En_5_Chapter.xhtml#Fig7)\
    \ from earlier in this chapter.\n\n2.  When it has completed the preparation and\
    \ the Configuration Profile we created has been loaded, let’s test our work. **Disconnect**\
    \ the device and start stepping through the iOS Setup Assistant. This time, when\
    \ you get to the passcode option, it should match Figure [5-13](#492151_1_En_5_Chapter.xhtml#Fig13).\
    \ See how it requires a strong passcode as defined in the payload we created?\
    \ That is the power of Configuration Profiles.\n\n![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig13_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13\n\nSetup Assistant now requires a strong passcode"
  trans: "\n# 在 Apple Configurator 中准备设备\n\n现在我们已经处理好了监督身份和组织信息，让我们开始准备第一台设备。在本练习中，我们将创建一台受监督的设备，以便能够使用全部可用的安全选项。\n\
    \n## 准备设备\n\n1.  首先，**选择**列表中要配置的设备，然后点击工具栏中的**准备**按钮。\n2.  将弹出“准备设备助手”对话框，如图\
    \ 5-6 所示，提示您选择一种方法。我们将使用**手动配置**，并**监督**该设备，但**允许其与其他电脑配对**。点击**下一步**按钮继续。\n3.\
    \  本章中我们不打算使用 MDM，因此您可以在下一个对话框中选择**不加入 MDM**。点击**下一步**按钮继续。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig6_HTML.jpg](img/492151_1_En_5_Fig6_HTML.jpg)\n\
    \n    图 5-6\n\n    将设备准备为受监督状态\n\n4.  从弹出菜单中选择您的**组织**。点击**下一步**按钮继续。\n5.  当系统提示我们选择在\
    \ *iOS 设置助理*过程中显示哪些步骤时，指的是您的终端用户在首次启动设备时必须查看和响应的步骤。如果您最近安装了全新的 iOS 并不得不使用设置助理，其中的许多步骤会看起来很熟悉。请注意，并非所有这些步骤都适用于每台设备。让我们从下拉菜单中选择**仅显示部分步骤**，然后按照图\
    \ 5-7 所示**勾选**其中的几个。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig7_HTML.jpg](img/492151_1_En_5_Fig7_HTML.jpg)\n\
    \n    图 5-7\n\n    选择这些步骤向用户显示，跳过其余步骤\n\n6.  点击**准备**按钮以设置设备。它将开始向 iOS 设备应用配置设置。完成后，您会看到\
    \ *受监督* 现在显示为**是**，您的 *组织名称* 也会显示出来，如图 5-8 所示。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig8_HTML.jpg](img/492151_1_En_5_Fig8_HTML.jpg)\n\
    \n    图 5-8\n\n    我们的设备现已关联到组织并受监督\n\n7.  接下来，让我们在 iOS 设备上检查我们的工作。**断开**设备连接，然后逐步完成设置助理。如果一切正确，您应该只会收到**语言**、**地区**、**Wi-Fi**、**密码**、**Apple\
    \ ID**、**定位服务**和**欢迎**的提示。*成功！* 现在，您可以使用相同的方法来为您的终端用户打造开箱即用的体验，并消除不必要（或令人困惑）的提示。\n\
    \n    **专家提示** 您是否注意到，即使在 iOS 设置助理对话框中没有勾选 Wi-Fi/网络选项，它仍然提示我们设置 Wi-Fi？您是否注意到，在\
    \ Apple Configurator 设置助理选项中，甚至没有 Wi-Fi/网络的复选框，只有**蜂窝数据**？iOS 设备的*激活*需要互联网访问，除非您提供的配置描述文件中指定了无线网络设置，否则无法在设置助理中跳过此选项。\n\
    \n到达主屏幕后，通过前往 `设置 ➤ 通用 ➤ 还原 ➤ 抹掉所有内容和设置` 将测试设备重置为默认状态。然后使用 USB 线缆将测试设备重新连接到电脑。恢复过程完成后，请停留在设置助理屏幕，以便我们为下一个练习做好准备。\n\
    \n# 配置描述文件\n\n## 配置描述文件简介\n\n*配置描述文件*，通常以其文件扩展名 `*.mobileconfig` 表示，是一种 XML *属性列表*，可以安装在\
    \ iOS 设备上以禁用和启用某些功能或强制执行各种安全限制。配置描述文件由一个或多个有效负载组成。一个*有效负载*是一个特定的配置，例如最低密码安全设置，它定义了设备上的要求或限制。有些有效负载是设备特定的，意味着它们适用于设备级别；而有些有效负载是用户特定的，意味着它们仅适用于该设备上的特定用户（在\
    \ `macOS` 的情况下）。有效负载适用于 `macOS`、`iOS`、`iPadOS`、`tvOS` 或其某些组合。在本章中，我们将特别关注 `iOS`\
    \ 和 `iPadOS` 的有效负载。\n\n**专家提示**\n\nApple 建议您为不同的设备类型创建不同的配置描述文件。这意味着，如果您要创建一个专门安装在\
    \ iOS 设备上的描述文件，请不要尝试在该描述文件中配置 macOS 有效负载。为每个特定的操作系统系列创建一组唯一的描述文件，而不是使用一个可以应用于任何操作系统的单一庞大描述文件。\n\
    \n## 您的第一个配置描述文件\n\n了解配置描述文件及其有效负载的最佳方法是创建几个描述文件，将它们应用到您的设备上，然后查看效果。\n\n1.  当设备完成准备且我们创建的配置描述文件已加载后，我们来测试一下我们的工作。**断开**设备连接，开始逐步完成\
    \ iOS 设置助理。这次，当您到达密码选项时，它应该与图 5-13 匹配。看到它如何要求我们在有效负载中定义的强密码了吗？这就是配置描述文件的力量。\n\n\
    \    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig13_HTML.jpg](img/492151_1_En_5_Fig13_HTML.jpg)\n\
    \n    图 5-13\n\n    设置助理现在要求强密码\n\n2.  当配置描述文件安装完成后，**选择**测试设备使其高亮显示，然后让我们像上一节那样再次**准备**它。设置与之前相同，包括对\
    \ iOS 设置助理的修改。这些设置很可能从我们上次操作时就已缓存，但如果没有，您可以参考本章前面的图 5-7。\n3.  完成 iOS 设置助理，当您到达主屏幕时，让我们移除这个配置描述文件。请记住，我们没有指定移除密码，因此作为终端用户，我们有能力移除这个限制。浏览到\
    \ `设置 ➤ 通用 ➤ 描述文件`，点击我们的**密码强制配置描述文件**。点击**移除描述文件**按钮，并按照提示进行移除，如图 5-14 所示。\n\n\
    \    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig14_HTML.jpg](img/492151_1_En_5_Fig14_HTML.jpg)\n\
    \n    图 5-14\n\n    我的示例配置描述文件——您的名称可能略有不同\n\n4.  最后，让我们浏览到 `设置 ➤ 触控 ID 与密码`，现在您可以**更改密码**或**关闭密码**，以及修改其他以前由（现已移除的）配置描述文件控制的设置。\n\
    \n**专家提示** 注意到我们的配置描述文件如何用粗体红字显示“未签名”了吗？没有有效的代码签名描述文件，某些设置可能无法生效。要对您的配置描述文件进行代码签名，请在描述文件编辑器中保存它们之前，从**文件**菜单中选择**签署描述文件**，然后选择您的**签名身份**。请注意，签名后的描述文件事后无法编辑，因此请保留一个未签名的副本以备将来修改。在本书后续内容中，我们将对我们的配置描述文件进行签名。\n"
- fmt: '# 创建用户可安装的配置描述文件


    在本练习中，我们将创建一个将密码安全要求与公司VPN配置配对的配置描述文件。在这家公司，所有工作都必须通过VPN完成，因此配对这些设置可以保护任何可能尝试通过VPN登录的端点。


    ## 开始创建


    在 Apple Configurator 的 `File` 菜单中选择 `New Profile`。您将看到一个类似于图5-9所示的窗口。


    ![示例图：Configuration Profile—General payload example](images/492151_1_En_5_Chapter/492151_1_En_5_Fig9_HTML.jpg)


    **图 5-9 配置描述文件 - 通用负载示例**


    ## 配置通用负载


    在配置描述文件编辑器的左侧，您会看到各种*负载类别*。当您`选择`一个类别时，您将能够在屏幕右侧`添加`负载并进行配置。每个配置描述文件都包含强制的 `General`
    负载。让我们为此新描述文件配置通用负载。


    输入以下字段的信息：

    1.  **名称：** 描述文件的名称。如果最终用户在其设备上浏览`Settings ➤ General ➤ Profiles`，将会看到此名称。它应具有描述性，并与要部署的负载相关。

    2.  **标识符：** 这是每个配置描述文件的唯一字符串。只要没有其他描述文件使用相同的标识符，您在此处使用什么内容并不重要。重复的标识符将触发对前一个描述文件的覆盖，从而允许您更新配置描述文件而无需先手动删除旧描述文件。

    3.  **组织：** 输入一个友好的名称，用于标识此配置描述文件的来源以及它关联的组织。

    4.  **描述：** 提供对此描述文件中负载功能的简要描述。

    5.  **同意消息：** 这是用户安装描述文件时显示的消息。例如，您可能在Web服务器上为BYOD用户托管了各种描述文件，并希望在安装前向用户说明此描述文件的作用并征得他们的同意。当用户从网站或电子邮件附件下载描述文件后尝试安装时，他们将在
    `Settings ➤ Profile Download` 下看到此消息。

    6.  **安全性：** 如果您的设备受监管，您可以在此处设置移除描述文件所需的密码。对于这个描述文件，让我们保留默认的 `Always` 选项。

    7.  **自动移除描述文件：** 如果您要应用临时设置并希望这些设置或限制在一段时间后过期，此功能很有用。`Never` 是默认选项。


    ## 添加并配置密码负载


    在通用负载中输入所需信息后，点击 `Passcode` 类别，然后点击 `Configure` 按钮以定义密码负载。


    现在，我们将为设备定义密码安全要求。您可以按喜好调整选项，如图5-10所示。请注意，如果您想取消任何负载，只需点击屏幕右上角的 `[-]` 按钮即可删除它。


    ![示例图：My sample Passcode payload settings](images/492151_1_En_5_Chapter/492151_1_En_5_Fig10_HTML.jpg)


    **图 5-10 我的示例密码负载设置**


    ## 保存描述文件


    现在我们已经定义好负载设置并准备就绪，可以保存配置描述文件以便应用到我们的设备。从 `File` 菜单中选择 `Save …`，使用一个名称并在您稍后能找到的位置保存您的配置描述文件。保存文件后，`关闭`配置描述文件编辑器窗口。


    **专业提示** 请注意，即使我们可以添加更多负载，我们在此配置描述文件中只配置了一个负载？最佳实践是拥有多个特定于负载的描述文件，这样您可以轻松更改一个设置，而不会影响同一描述文件中可能定义的其他设置。例如，您可能希望独立于VPN设置来更新密码设置。为每个设置使用唯一的描述文件允许您更改密码而不会给VPN用户带来潜在问题。此方法还允许您为多个不同的用户组重用相同的描述文件。您可以将密码要求描述文件应用到所有用户，然后仅为使用VPN的特定用户将VPN描述文件添加到设备上。


    ## 应用配置描述文件到设备


    接下来，是时候将此配置描述文件应用到我们的测试设备上了。**点击**列表中的设备以选择它，然后点击 `Add` ➤ `Profiles`，如图5-11所示。浏览到我们刚刚创建并保存的描述文件，点击
    `Add` 按钮将其应用到iOS设备，如图5-12所示。


    ![示例图：Install the Profile from the Add toolbar button](images/492151_1_En_5_Chapter/492151_1_En_5_Fig11_HTML.jpg)


    **图 5-11 从添加工具栏按钮安装描述文件**


    ![示例图：Select the Configuration Profile we created with the Passcode payload](images/492151_1_En_5_Chapter/492151_1_En_5_Fig12_HTML.jpg)


    **图 5-12 选择我们创建的带有密码负载的配置描述文件**


    ## 场景对比：公司设备与BYOD


    在前面的练习中，我们使用 Apple Configurator 将配置描述文件应用到受监管的公司自有iOS设备。这是最简单和最安全的方法，但更常见的情况是用户希望使用自己的个人设备处理业务，而不是携带第二部手机或平板电脑。在这种情况下，我们需要能够为最终用户提供一个配置描述文件，他们可以将其安装在自己的设备上，以使其符合公司信息安全策略。


    BYOD设备的挑战在于它们不容易受到监管，因此最终用户可以随时在我们不知情的情况下移除我们安装的限制。在这种情况下，我们需要提供一个能够吸引用户保持配置描述文件安装的
    ***胡萝卜***，这样如果用户想继续将其用于业务目的，我们的安全措施就能保持有效。这个 ***胡萝卜特性*** 很可能由您的组织决定。我通常将安全负载与VPN、Exchange帐户信息、企业Wi-Fi配置或三者结合使用，以确保如果设备能够访问公司服务，那么它就是安全的。如果用户移除了安全措施，他们也将失去从该设备访问公司服务的权限。


