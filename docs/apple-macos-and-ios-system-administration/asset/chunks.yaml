    现在，我们已经完成了在 Don 的 MacBook Pro 上配置 Office 365 和 Microsoft OneDrive for Business。


    ## 将用户从 Windows 迁移到 macOS


    如果 Don 之前使用 OneDrive 存储所有数据，并且在他的 Windows PC 上没有使用 `*.pst` 文件，那么可能没有太多需要迁移的内容。然而，许多用户可能仍在其旧
    PC 上存有需要转移到 Mac 的数据。为了完成 Don President 从 PC 到 Mac 迁移的最后一个步骤，我们需要将任何剩余的数据迁移到他的
    Mac。


    幸运的是，苹果提供了一个相当有用的迁移工具来协助此过程。首先，确保他的新 Mac 和旧 PC 连接到同一网络，然后在 Don 的 Mac 上浏览到 `/Applications/Utilities/`
    文件夹，并打开 **迁移助手** 实用程序。


    ### 使用迁移助手


    启动迁移助手后，系统会警告你将关闭所有打开的应用程序，点击 **继续** 以开始。系统会提示输入本地管理员凭据以继续。认证成功后，包括 Finder 在内的所有应用程序都将关闭，迁移助手将开始运行。当提示选择要从中迁移的计算机时，应选择
    **从 Windows PC**，如图 11-37 所示。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig37_HTML.jpg](img/492151_1_En_11_Fig37_HTML.jpg)

    图 11-37 迁移助手使用“从 Windows PC”选项


    在 Don 的旧 Windows PC 上，打开浏览器并访问 [`www.apple.com/migrate-to-mac`](http://www.apple.com/migrate-to-mac)，下载
    **Windows 迁移助手**。当出现提示时，继续 **运行** 下载的 `setup.exe` 文件，按照安装向导的步骤完成安装以及所需的任何附加组件。安装完成后，从“开始”菜单或
    Windows 桌面打开 **Windows 迁移助手** 应用程序。按照提示操作，直到你看到 PC 的名称出现在 Mac 上，如图 11-38 所示。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig38_HTML.jpg](img/492151_1_En_11_Fig38_HTML.jpg)

    图 11-38 选择要从中迁移的 PC


    当要从中迁移的计算机出现时，**选择它**，然后点击 **继续**。切换回 Windows PC，确保 Mac 和 Windows PC 上的安全代码匹配。确认匹配后，点击
    Windows PC 上的 **继续** 按钮。它将开始收集数据并与新的 Mac 通信。这可能需要几分钟时间。


    当提示选择各种文件和用户帐户时，**选择相关信息**，如图 11-39 所示。选择要迁移的信息后，点击 **继续** 按钮。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig39_HTML.jpg](img/492151_1_En_11_Fig39_HTML.jpg)

    图 11-39 选择要迁移的文件和设置


    系统将提示你在 Mac 上以管理员身份进行身份验证。出现提示时点击 **授权** 按钮，并输入本地管理员凭据。然后点击 **继续** 按钮继续。现在，它将开始通过网络将数据从旧
    PC 传输到新 Mac，如图 11-40 所示。


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig40_HTML.jpg](img/492151_1_En_11_Fig40_HTML.jpg)

    图 11-40 通过网络传输数据

