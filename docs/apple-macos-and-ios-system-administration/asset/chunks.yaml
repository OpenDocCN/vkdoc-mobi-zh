- fmt: '# A Brief History of Apple Platforms


    It is important to understand some of the history surrounding Apple’s current
    hardware and OS platforms as you may come into contact with some of these older
    products in your day-to-day interactions within the Apple ecosystem.


    The `Macintosh` is Apple’s brand of desktop and laptop personal computers. The
    first Mac was shipped in 1984 and has been an iconic product for nearly 40 years.
    The Mac product line includes desktops like the `iMac`, `Mac mini`, and the `Mac
    Pro` as well as laptops like the `MacBook Pro` and `MacBook Air`.


    The Mac’s internal hardware has changed significantly over the years. Initially
    based on the `Motorola 68k` processor architecture in the 1980s, it moved to the
    `IBM PowerPC` architecture in the 1990s and finally moved to the `Intel` architecture
    in the early 2000s. Today, all Macintosh systems are based on the same Intel processor
    specification as Windows-based PCs. Using `Boot Camp` or virtualization solutions,
    you can run `Microsoft’s Windows 10` alongside `macOS` on any of Apple’s current
    Mac hardware.


    The `Macintosh Operating System` (`macOS`) has also evolved since the 1980s. Mac
    OS versions `1.0`–`9.2` are now called Mac OS “Classic” and were originally written
    for Motorola and IBM architectures. Apple phased out support for this operating
    system and associated software in the early 2000s. In 1996, Apple purchased a
    small software company called `NeXT`, bringing business legend and Apple co-founder
    `Steve Jobs` back to the company. NeXT had an operating system based on Unix,
    called `NeXTSTEP`, that became the foundation for all of Apple’s future software
    platforms from `macOS` to `iOS` and beyond.


    The next phase of Apple’s Mac operating system was called `Mac OS X` (`10`). Each
    version of Mac OS X from `10.0` to `10.8` was named after a species of cats: `Snow
    Leopard` (`10.6`), `Lion` (`10.7`), `Mountain Lion` (`10.8`), and so on. Eventually,
    Apple ran out of cats and began naming their operating systems after parts of
    California including `Mavericks` (`10.9`), `Yosemite` (`10.10`), `El Capitan`
    (`10.11`), `Sierra` (`10.12`), `High Sierra` (`10.13`), `Mojave` (`10.14`), and
    most recently `Catalina` (`10.15`).


    Around the same time that Apple was changing from cats to California code names,
    they announced at `WWDC 2014` that they were going to be bringing more features
    from iOS to the Mac. This became a larger paradigm shift as Apple encouraged system
    administrators to use `Mobile Device Management` (MDM) tools to manage macOS-based
    computers in a similar way that they managed mobile devices running `iOS`. The
    majority of this book will focus on these newer versions of `macOS` and the modern
    management concepts that Apple is asking administrators to embrace for the Mac
    platform.


    While the Macintosh was the most iconic brand from Apple for many years, its most
    popular product (based on market share) is undoubtedly the `iPhone`. Released
    in 2007, the iPhone was a completely reimagined cell phone that used a `multi-touch`
    touchscreen and a graphical user interface that was based on the same technology
    used in Mac OS X. In 2010, Apple released the `iPad` tablet, which also featured
    a touchscreen display and ran the same operating system as the `iPhone`. Renamed
    `iOS`, the mobile operating system that started on the iPhone was now Apple’s
    second major consumer operating system and its most popular.


    With the release of the newest `iPhone` product line in the summer of 2019, Apple
    is now on version `13` of the `iOS`. Apple has also designated a special version
    of iOS 13 for the iPad, now called `iPadOS`. I will explain the differences and
    optimizations found in `iPadOS` over standard `iOS` throughout the book.


    ## Introduction to macOS


    This book focuses on the technologies found in the most recent versions of `macOS`,
    specifically those in `Sierra` (`10.12`), `High Sierra` (`10.13`), `Mojave` (`10.14`),
    and `Catalina` (`10.15`). These are the versions that most technicians will encounter
    because at least one of these will support Mac hardware manufactured as early
    as 2009. Figure [1-1](#492151_1_En_1_Chapter.xhtml#Fig1) provides a quick overview
    of the differences between these operating systems.


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig1_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    The four most recent versions of macOS as of this publication'
