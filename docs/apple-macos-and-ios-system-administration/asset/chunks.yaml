- fmt: '## 家长控制和屏幕使用时间


    `macOS Catalina`之前的版本提供了一个*家长控制*系统偏好设置，允许本地管理员创建一个具有额外可配置限制的标准用户账户。在创建新用户并选择**“通过家长控制管理”**作为用户类型时，您可以创建一个受家长控制的用户。或者，当您打开*家长控制*系统偏好设置时，它会提示您创建一个受管理的用户账户，如图[3-4](#492151_1_En_3_Chapter.xhtml#Fig4)所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig4_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig4_HTML.jpg)


    图 3-4

    `macOS Catalina`之前版本中的家长控制系统偏好设置


    苹果决定在`macOS Catalina`中移除*家长控制*功能，转而将首次出现在`iOS 12`中的一个功能移植到`macOS`，该功能称为*屏幕使用时间*。配置屏幕使用时间是通过新的系统偏好设置完成的，如图[3-5](#492151_1_En_3_Chapter.xhtml#Fig5)所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig5_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig5_HTML.jpg)


    图 3-5

    `macOS Catalina`中新的屏幕使用时间系统偏好设置


    家长控制中的几乎所有功能都已添加到屏幕使用时间中，同时还增加了允许本地管理员权限的用户使用此功能的选项。这样设计的目的是让用户可以监管自己的计算和社交媒体习惯，同时仍能完全管理系统。屏幕使用时间相对而言易于理解，但这里有一些非常酷的新功能需要重点介绍。


    其中一个功能是能够从您自己的 Mac 上管理您孩子的所有设备，而无需在他们的设备上交互式地设置。只要您的 iCloud 账户启用了*家庭共享*，并且您孩子的
    iCloud 账户是家庭共享计划的一部分，您就可以无线管理所有的屏幕使用时间功能。如果您要管理孩子的设备，您需要设置一个屏幕使用时间密码，以防止他们覆盖您的设置。要做到这一点，请点击*屏幕使用时间系统偏好设置*中的**“选项”**按钮，并如图[3-6](#492151_1_En_3_Chapter.xhtml#Fig6)所示设置密码。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig6_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig6_HTML.jpg)


    图 3-6

    屏幕使用时间的选项按钮和密码选项


    Mac 上屏幕使用时间的另一个功能是能够独立控制您的`iOS`和`macOS`设备的**“内容与隐私限制”**。例如，只要您在`iOS`和`macOS`之间共享屏幕使用时间数据，您就可以在
    Mac 上限制不当内容，但在 iOS 设备上则不限制。除了这些功能之外，屏幕使用时间的大部分内容与您在旧版`macOS`的*家长控制*中找到的类似。有**时间限制**用于管控上学时间或就寝时间的设备使用（现在称为*停用时间*，如图[3-7](#492151_1_En_3_Chapter.xhtml#Fig7)所示），以及可以定义的**内容和隐私**设置，如图[3-8](#492151_1_En_3_Chapter.xhtml#Fig8)所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig8_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig8_HTML.jpg)


    图 3-8

    屏幕使用时间中的内容与隐私限制


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig7_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig7_HTML.jpg)


    图 3-7

    停用时间计划设置


    *App 限额*提供了新的精细控制级别，可以控制哪些应用程序能够使用、何时使用以及可以使用多长时间。您可以选择应用程序类别或指定特定的应用程序为*受限*或*允许*。使用**“始终允许”**配置选项来指定要允许的应用程序，即无论一天中的什么时间或使用时长如何，都可以使用的应用程序，如图[3-9](#492151_1_En_3_Chapter.xhtml#Fig9)所示。如果您正在管理孩子的设备，他们在达到应用程序限额后也可以请求更多时间，您可以通过
    Mac 上的*屏幕使用时间系统偏好设置*来批准该请求。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig9_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig9_HTML.jpg)


    图 3-9

    App 限额允许您指定哪些应用程序可用以及每天可以使用多长时间


    **专业提示**


    屏幕使用时间提供了一些基本功能来控制计算机使用和过滤内容，但需要注意的是，这是为消费者使用而开发的，并不是用于大规模 1:1 部署的万无一失的安全解决方案。根据您组织的具体需求，可能还有其他商业安全应用程序更适合。**移动设备管理**
    (`MDM`)——我们将在第[8](#492151_1_En_8_Chapter.xhtml)章讨论——提供了比单独使用屏幕使用时间更精细、更有效的方法来限制大量
    Mac。


    ## Gatekeeper


    苹果限制`macOS`上恶意软件的方法是要求合法的应用程序开发人员对其应用程序进行*签名*，否则未经用户明确同意，这些应用程序将无法运行。*Gatekeeper*是苹果给这个功能起的名字，它通过*安全性与隐私系统偏好设置*进行控制。图[3-10](#492151_1_En_3_Chapter.xhtml#Fig10)显示了配置
    Gatekeeper 的选项。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig10_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig10_HTML.jpg)


    图 3-10

    安全性与隐私系统偏好设置“通用”标签中的 Gatekeeper 选项


    Gatekeeper 为系统管理员提供了两个选项，允许 Mac 运行来自第三方开发者的应用程序。**“App Store 和被认可的开发者”**是默认选项，该选项会阻止未经代码签名或非从*Mac
    App Store*下载的应用程序运行。**“App Store”**是更安全的选项，它限制用户运行任何从互联网下载的应用程序，只允许从*Mac App Store*下载的应用程序。


    作为管理员，您可能仍然需要出于某种原因运行一个未经代码签名或不是从 Mac App Store 下载的应用程序。在早于`Sierra`的`macOS`版本中，有第三个选项**“任何来源”**，允许您运行应用程序而不会受到
    Gatekeeper 的阻拦。尽管此选项在较新的版本中已被移除，但管理员仍然可以通过**右键单击** Gatekeeper 阻止的应用程序，选择**“打开”**，然后在警告对话框中同意，从而覆盖
    Gatekeeper 并允许该应用程序运行，即使这样做可能不安全。'
  raw: '## Parental Controls and Screen Time


    Versions of *macOS* prior to *Catalina* feature a *Parental Controls System Preference*
    that allows a local administrator to create a Standard user account with additional
    configurable limitations. You can create a user governed by Parental Controls
    when you create a new user and choosing **Managed by Parental Controls** as the
    user type. Alternately, when you open the Parental Controls System Preference,
    it will prompt you to create a managed user account as shown in Figure [3-4](#492151_1_En_3_Chapter.xhtml#Fig4).


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig4_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    The Parental Controls System Preference as seen in macOS versions prior to Catalina


    Apple decided to remove *Parental Controls* in *macOS Catalina* and instead port
    a feature that first appeared in iOS 12 over to *macOS* called *Screen Time*.
    Configuring Screen Time is done through the new System Preference shown in Figure
    [3-5](#492151_1_En_3_Chapter.xhtml#Fig5).


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig5_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    The new Screen Time System Preference in macOS Catalina


    Almost all of the functionality in Parental Controls has been added to Screen
    Time along with the added option of using it as a user with local administrative
    rights. The reason for this is to allow people to police their own computing and
    social media habits while still having full administrative control over their
    system. Screen Time is relatively self-explanatory, but there are a few very cool
    new features to highlight here.


    One of those features is the ability to manage all of your child’s devices from
    your own Mac and not having to interactively set it up on their devices. As long
    as you have *Family Sharing* enabled on your iCloud account and your child’s iCloud
    account is part of the Family Sharing plan, you can manage all of the Screen Time
    features over the air. If you are going to manage your child’s devices, you will
    want to set a Screen Time passcode so they are unable to override your settings.
    To do this, click the **Options** button in the *Screen Time System Preference*
    and set the code as shown in Figure [3-6](#492151_1_En_3_Chapter.xhtml#Fig6).


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig6_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig6_HTML.jpg)


    Figure 3-6


    The Screen Time Options button and passcode option


    Another feature of Screen Time on the Mac is the ability to control your *iOS*
    and *macOS* **Content & Privacy Restrictions** independently. For example, as
    long as you are sharing your Screen Time data between *iOS* and *macOS*, you can
    restrict inappropriate content on your Mac but not on your iOS device. Beyond
    these features, much of what makes up Screen Time is similar to what you will
    find on older versions of *macOS* as far as *Parental Controls* go. There are
    **time limits** for policing device use during school hours or at bedtime, now
    called *Down Time* as shown in Figure [3-7](#492151_1_En_3_Chapter.xhtml#Fig7),
    and **content and privacy** settings that can be defined as shown in Figure [3-8](#492151_1_En_3_Chapter.xhtml#Fig8).


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig8_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Content & Privacy Restrictions in Screen Time


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig7_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Down Time schedule settings


    *App Limits* provide a new level of granular control over which applications are
    able to be used, when they can be used, and for how long. You can choose categories
    of applications or specify specific applications as being *restricted* or *whitelisted*.
    Use the **Always Allowed** configuration option to specify applications to be
    whitelisted, that is, to be able to be used regardless of the time of day or duration
    of use as shown in Figure [3-9](#492151_1_En_3_Chapter.xhtml#Fig9). If you are
    managing your child’s devices, they can also request more time after an application
    limit is reached, and you can approve that request through the *Screen Time System
    Preference* on your Mac.


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig9_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig9_HTML.jpg)


    Figure 3-9


    App Limits allow you to specify which applications are available and how long
    they can be used each day


    Pro Tip


    Screen Time offers some basic functions for controlling computer usage and filtering
    content, but it is important to note that this was developed for consumer use
    and is not a bulletproof security solution for large-scale 1:1 deployments. There
    are other commercial security applications that may be a better fit, depending
    on your organization’s specific needs. **Mobile Device Management** (MDM), which
    we will discuss in Chapter [8](#492151_1_En_8_Chapter.xhtml), enables a more granular
    and effective approach to restricting a large number of Macs than Screen Time
    alone.


    ## Gatekeeper


    Apple’s approach for limiting malware on *macOS* is to require legitimate application
    developers to *sign* their applications, or they will not run without the user
    specifically consenting to it. *Gatekeeper* is the name Apple gives to this feature,
    and it is controlled through the *Security & Privacy System Preference*. Figure
    [3-10](#492151_1_En_3_Chapter.xhtml#Fig10) shows the options for configuring Gatekeeper.


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig10_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig10_HTML.jpg)


    Figure 3-10


    Gatekeeper options in the General tab of the Security & Privacy System Preference


    Gatekeeper provides system administrators with two options for allowing Macs to
    run applications from third-party developers. **App Store and identified developers**
    is the default option which prevents applications that are not code-signed or
    downloaded from the *Mac App Store* from running. **App Store** is the more secure
    option, which limits users from running any application downloaded from the Internet
    and only allows applications that are downloaded from the *Mac App Store*.


    As an administrator, you may still need to run an application for some reason
    that isn’t code-signed or downloaded from the Mac App Store. In versions of macOS
    that are older than *Sierra*, there was a third option of **Anywhere** that allowed
    you to run applications without Gatekeeper getting in the way. Despite the fact
    that this option has now been removed in more recent releases, administrators
    can still override Gatekeeper by **right-clicking** an application that Gatekeeper
    blocks, choosing to **Open,** and then consenting to the warning dialog box to
    allow the application to run even though it may not be safe to do so.'
  trans: '

    ## 家长控制和屏幕使用时间


    `macOS Catalina` 之前的版本提供了一个*家长控制*系统偏好设置，允许本地管理员创建一个具有额外可配置限制的标准用户账户。在创建新用户并选择**“通过家长控制管理”**作为用户类型时，您可以创建一个受家长控制的用户。或者，当您打开*家长控制*系统偏好设置时，它会提示您创建一个受管理的用户账户，如图
    3-4 所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig4_HTML.jpg](img/492151_1_En_3_Fig4_HTML.jpg)


    图 3-4

    `macOS Catalina`之前版本中的家长控制系统偏好设置


    苹果决定在 `macOS Catalina` 中移除*家长控制*功能，转而将首次出现在 `iOS 12` 中的一个功能移植到 `macOS`，该功能称为*屏幕使用时间*。配置屏幕使用时间是通过新的系统偏好设置完成的，如图
    3-5 所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig5_HTML.jpg](img/492151_1_En_3_Fig5_HTML.jpg)


    图 3-5

    `macOS Catalina` 中新的屏幕使用时间系统偏好设置


    家长控制中的几乎所有功能都已添加到屏幕使用时间中，同时还增加了允许本地管理员权限的用户使用此功能的选项。这样设计的目的是让用户可以监管自己的计算和社交媒体习惯，同时仍能完全管理系统。屏幕使用时间相对而言易于理解，但这里有一些非常酷的新功能需要重点介绍。


    其中一个功能是能够从您自己的 Mac 上管理您孩子的所有设备，而无需在他们的设备上交互式地设置。只要您的 iCloud 账户启用了*家庭共享*，并且您孩子的
    iCloud 账户是家庭共享计划的一部分，您就可以无线管理所有的屏幕使用时间功能。如果您要管理孩子的设备，您需要设置一个屏幕使用时间密码，以防止他们覆盖您的设置。要做到这一点，请点击*屏幕使用时间系统偏好设置*中的**“选项”**按钮，并如图
    3-6 所示设置密码。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig6_HTML.jpg](img/492151_1_En_3_Fig6_HTML.jpg)


    图 3-6

    屏幕使用时间的选项按钮和密码选项


    Mac 上屏幕使用时间的另一个功能是能够独立控制您的 `iOS` 和 `macOS` 设备的**“内容与隐私限制”**。例如，只要您在 `iOS` 和 `macOS`
    之间共享屏幕使用时间数据，您就可以在 Mac 上限制不当内容，但在 iOS 设备上则不限制。除了这些功能之外，屏幕使用时间的大部分内容与您在旧版 `macOS`
    的*家长控制*中找到的类似。有**时间限制**用于管控上学时间或就寝时间的设备使用（现在称为*停用时间*，如图 3-7 所示），以及可以定义的**内容和隐私**设置，如图
    3-8 所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig8_HTML.jpg](img/492151_1_En_3_Fig8_HTML.jpg)


    图 3-8

    屏幕使用时间中的内容与隐私限制


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig7_HTML.jpg](img/492151_1_En_3_Fig7_HTML.jpg)


    图 3-7

    停用时间计划设置


    *App 限额*提供了新的精细控制级别，可以控制哪些应用程序能够使用、何时使用以及可以使用多长时间。您可以选择应用程序类别或指定特定的应用程序为*受限*或*允许*。使用**“始终允许”**配置选项来指定要允许的应用程序，即无论一天中的什么时间或使用时长如何，都可以使用的应用程序，如图
    3-9 所示。如果您正在管理孩子的设备，他们在达到应用程序限额后也可以请求更多时间，您可以通过 Mac 上的*屏幕使用时间系统偏好设置*来批准该请求。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig9_HTML.jpg](img/492151_1_En_3_Fig9_HTML.jpg)


    图 3-9

    App 限额允许您指定哪些应用程序可用以及每天可以使用多长时间


    **专业提示**


    屏幕使用时间提供了一些基本功能来控制计算机使用和过滤内容，但需要注意的是，这是为消费者使用而开发的，并不是用于大规模 1:1 部署的万无一失的安全解决方案。根据您组织的具体需求，可能还有其他商业安全应用程序更适合。**移动设备管理**
    (`MDM`)——我们将在第 8 章讨论——提供了比单独使用屏幕使用时间更精细、更有效的方法来限制大量 Mac。


    ## Gatekeeper


    苹果限制 `macOS` 上恶意软件的方法是要求合法的应用程序开发人员对其应用程序进行*签名*，否则未经用户明确同意，这些应用程序将无法运行。*Gatekeeper*是苹果给这个功能起的名字，它通过*安全性与隐私系统偏好设置*进行控制。图
    3-10 显示了配置 Gatekeeper 的选项。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig10_HTML.jpg](img/492151_1_En_3_Fig10_HTML.jpg)


    图 3-10

    安全性与隐私系统偏好设置“通用”标签中的 Gatekeeper 选项


    Gatekeeper 为系统管理员提供了两个选项，允许 Mac 运行来自第三方开发者的应用程序。**“App Store 和被认可的开发者”**是默认选项，该选项会阻止未经代码签名或非从*Mac
    App Store*下载的应用程序运行。**“App Store”**是更安全的选项，它限制用户运行任何从互联网下载的应用程序，只允许从*Mac App Store*下载的应用程序。


    作为管理员，您可能仍然需要出于某种原因运行一个未经代码签名或不是从 Mac App Store 下载的应用程序。在早于 `Sierra` 的 `macOS`
    版本中，有第三个选项**“任何来源”**，允许您运行应用程序而不会受到 Gatekeeper 的阻拦。尽管此选项在较新的版本中已被移除，但管理员仍然可以通过**右键单击**
    Gatekeeper 阻止的应用程序，选择**“打开”**，然后在警告对话框中同意，从而覆盖 Gatekeeper 并允许该应用程序运行，即使这样做可能不安全。

