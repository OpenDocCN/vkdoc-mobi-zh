    图 11-35 点击按钮登录现有 O365 帐户以激活


    当我们打开 Microsoft Outlook 时，可以按照提示配置 Exchange 信息并完成与邮件服务器的同步。现在，Don 的电子邮件已完全配置并准备就绪。我们可以在配置他的
    OneDrive 的同时，让它在后台同步收件箱。


