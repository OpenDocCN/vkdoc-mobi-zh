  trans: '

    # iPad 向远程销售团队的部署


    与 BYOD 场景类似，我们的第一步是确定技术项目的目标。此部署的目标也相当简单。公司有十名远程销售人员，每个人位于全国不同地区且经常在外奔波。销售与营销副总裁向
    IT 部门提出要求，为销售团队的每位成员配备一台 iPad，以便他们在旅途中保持联系。此事已获得预算批准并完成采购。iPad 已准备好为每位远程用户进行部署和配置。


    作为需求收集流程的一部分，销售副总裁向 IT 部门提出了几项要求。首先，他们希望设备的配置方式能确保销售团队必须使用经批准的工具和渠道与客户沟通。例如，他们希望团队使用
    `Salesforce CRM` 和 `Zoom`，以便跟踪和管理通信记录。


    销售副总裁担心，如果销售团队可以使用 `FaceTime`、`信息` 等应用，可能会导致客户联系和沟通偏离公司标准。基于同样的考虑，副总裁还要求只允许在 iPad
    上安装经批准的应用程序，并且应锁定 `App Store`。最后，重要的是设备能够被远程管理，并且在必要时，如果设备出现任何软件问题，可以远程擦除和重建。这些销售人员经常出差，设备不能长时间离手，并且他们并不总是在
    `Apple 零售店` 附近。


    为了实现这些限制并提供无线配置/重新配置，我们需要确保在 `描述文件管理器` 中为这些设备设置以下选项：


    *   最短 90 天更改一次的密码锁

    *   设备丢失时的远程擦除功能

    *   配置公司办公室 Wi-Fi 接入

    *   远程工作时配置 VPN 服务

    *   在 `设置助理` 期间启用通过 `DEP` 进行 MDM 注册

    *   禁用使用 `信息` 和 `FaceTime` 的功能

    *   禁用 `App Store`

    *   预安装 `Zoom` 和 `Salesforce`


    我们稍后需要在本章中确保我们的销售团队 iPad 配置描述文件提供所有这些功能。


    ## 预期的支持需求


    至此，我们已为这两项部署制定了目标和技术策略。虽然难以预测所有可能的支持需求，但我们可以预见一些情况并制定相应计划。对于 BYOD 场景，最常见的支持需求将是
    MDM 注册过程。我们将创建并向最终用户分发一封公司范围内的电子邮件，引导他们完成设备注册流程，包括一个允许他们请求 BYOD 服务的网络表单以及分步注册指南。


    对于销售团队 iPad 场景，我们将培训服务台人员，引导销售团队完成 `设置助理` 并提供一些基本的软件故障排除，包括在需要时对设备进行完全重置。因为我们使用的是无线配置，只要对设备执行完全重置，它将自动配置正确的设置、安装所需的应用程序并应用任何设备限制。至此，我们已经准备好开始在
    `描述文件管理器` 内进行技术工作。


    ## 为 BYOD 场景配置描述文件管理器


    我们需要做一系列准备工作来使 `描述文件管理器` 适应 BYOD 部署。我们要做的第一件事是创建一个设备群组。打开 `描述文件管理器`，点击左侧边栏上的 `设备群组`
    按钮，如图 12-1 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig1_HTML.jpg](img/492151_1_En_12_Fig1_HTML.jpg)


    图 12-1

    查看描述文件管理器中的设备群组


    继续点击 `添加设备群组` 按钮，或点击设备群组窗格下方的 `+` 按钮。`双击` 名称并将其重命名为 `MyCompany BYOD`，如图 12-2 所示。点击
    `存储` 以应用名称更改。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig2_HTML.jpg](img/492151_1_En_12_Fig2_HTML.jpg)


    图 12-2

    创建新的设备群组


    接下来，我们需要为 `MyCompany BYOD` 群组中的设备定义设置。过去，我们为每个单独的设备修改设置。在大规模操作中，这将非常耗时且容易出错，因此我们将在群组级别定义所有设置，然后每次将新的
    iPhone 注册到 MDM 时，只需将设备分配到我们的群组。点击 `设置` 选项卡，然后点击 *MyCompany BYOD 的设置* 标题下的 `编辑`
    按钮，如图 12-3 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig3_HTML.jpg](img/492151_1_En_12_Fig3_HTML.jpg)


    图 12-3

    编辑新设备群组的配置描述文件


    现在，我们将以与配置单个设备相同的方式配置移动配置描述文件，但这次是在群组级别。“通用”有效负载与以往类似。只需将其设置为“自动推送”并提供一个基本的 BYOD
    描述。我们将采用默认的安全选项，因为这些设备无论如何都不会是受监管的设备。


    接下来，我们需要开始配置我们的有效负载，以匹配本章前面提到的要求。需要注意的是，我们无需配置任何特殊选项来启用远程擦除或远程管理功能，因为当设备加入我们的
    MDM 时会自动设置。我们确实需要配置其他安全选项。


    首先，点击 `密码` 有效负载，让我们按照公司标准将其配置为 `复杂密码`，并要求 `每 90 天更改一次`，如图 12-4 所示。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig4_HTML.jpg](img/492151_1_En_12_Fig4_HTML.jpg)


    图 12-4

    设置密码有效负载


    接下来是无线网络。点击 `网络` 有效负载，我们可以配置公司无线网络，如图 12-5 所示。您的设置将根据您的网络、SSID、安全配置等而有所不同。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig5_HTML.jpg](img/492151_1_En_12_Fig5_HTML.jpg)


    图 12-5

    配置您的公司无线设置


    接下来，我们需要配置 VPN，所以点击 `VPN` 有效负载并按图 12-6 所示进行配置。


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig6_HTML.jpg](img/492151_1_En_12_Fig6_HTML.jpg)


    图 12-6

    配置 VPN 有效负载


    最后，我们需要配置一些限制。点击 `限制` 有效负载，滚动浏览 `功能` 选项卡上的选项。我们需要 *启用* `强制加密备份` 并 *禁用* `在锁定屏幕显示通知中心`，如图
    12-7 所示。

    '
- fmt: '![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig7_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Configure the Restrictions payload


    Now that we have everything configured with our five payloads, click the `OK`
    button to save the configuration and then click the `Save` button as shown in
    Figure [12-8](#492151_1_En_12_Chapter.xhtml#Fig8) to apply the new settings to
    the `MyCompany BYOD` device group.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig8_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Click Save to apply the configuration to our Device Group


    Excellent! Now we have our BYOD group ready to go, and all devices we add to this
    group will gain these settings and requirements. The next thing we need to do
    is add some placeholders for our devices into our MyCompany BYOD device group.
    Fortunately, this is easily done through the process we defined for our end users
    to submit a ticket via our web form to request this access.


    **Pro Tip**


    You can do this any number of ways depending on the size of your company and the
    process around stipends, approvals, and so on. This is really up to each individual
    company. I have seen it where IT just emails out a configuration profile to each
    user, and I’ve seen it where there is an entire process where several approval
    steps occur before IT is given the go-ahead to enable enrollment for a given device.


    We have three pending requests for new BYOD members. Let’s go ahead and fulfill
    those requests now by creating matching Placeholders and add those to our `MyCompany
    BYOD` device group. You will do this just like we did in previous chapters with
    one additional step—assigning the placeholder to a device group instead of configuring
    the settings individually for each device.


    Click the `Devices` button on the left sidebar and then click the `+` button in
    the lower area of the Devices pane and choose `Add Placeholder`. Enter the placeholder
    information as shown in Figure [12-9](#492151_1_En_12_Chapter.xhtml#Fig9). We’ll
    use `Serial Number` as our identifier.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig9_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    Create a Placeholder for each BYOD device


    Once you have the placeholder for `Dan’s iPhone` listed in your Devices column,
    click the `Device Groups` button on the left sidebar again and click the `MyCompany
    BYOD` device group to select it. Next, on the `Members` tab, click the `+` button
    as shown in Figure [12-10](#492151_1_En_12_Chapter.xhtml#Fig10) and select `Add
    Devices`.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig10_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Adding device members to a Device Group


    Click the `Add` button next to `Dan’s iPhone` and then click the `Done` button
    to dismiss the dialog box as shown in Figure [12-11](#492151_1_En_12_Chapter.xhtml#Fig11).
    Click the `Save` button to save the changes we made to the group membership for
    our `MyCompany BYOD` device group. Repeat these steps for two more placeholder
    devices and make sure one of them has a serial number that matches your physical
    test device so we can try this out and see the results.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig11_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig11_HTML.jpg)


    Figure 12-11


    Add the placeholder to the group


    Now that we have our placeholder devices assigned to the device group, it is time
    to provide an enrollment profile to our users so they can add their device to
    the MDM and receive our configuration settings. There are a couple of ways to
    do this. If your Profile Manager server is connected to a company LDAP such as
    Active Directory, you could associate `Dan’s iPhone` with his user account and
    allow him to onboard the device using the `My Devices Portal` and restrict the
    enrollment to assigned devices as shown in Figure [12-12](#492151_1_En_12_Chapter.xhtml#Fig12).


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig12_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig12_HTML.jpg)


    Figure 12-12


    Select an existing user account and assign the device to the user and allow them
    to access the My Devices Portal


    You could also simply create a new Enrollment Profile and email it to the user
    so they can access it from their phone as an attachment and follow the prompts
    to install it. Alternately, you could house the Enrollment Profile on an internal
    web server and point users to that location to download and install it.


    Finally, you can point users to the `My Devices Portal` and configure the `Everyone`
    group to allow enrollment but ensure that `Restrict enrollment to placeholder
    devices` is enabled as shown in Figure [12-13](#492151_1_En_12_Chapter.xhtml#Fig13).
    Any of these options are acceptable, and you will need to decide what will work
    best for your particular case.


    ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig13_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig13_HTML.jpg)


    Figure 12-13


    Configuring the Everyone group for device self-enrollment


    For our example, we will use the `My Devices Portal` option for the `Everyone`
    group. Go ahead and jump on your test iPhone and browse to your MDM server’s `/mydevices`
    subdirectory. For example, my URL would be [`https://579testing.com/mydevices`](https://579testing.com/mydevices).
    Authenticate, and when the page loads, tap the blue `Enroll` button and follow
    the prompts to download and install the Enrollment Profile. At this point, it
    will find the matching Placeholder and begin applying our payloads.


    When this is completed, browse your device to ensure that the Wi-Fi, VPN, and
    applied restrictions are in place. Feel free to wipe the test device using the
    management options in Profile Manager or remove the profile manually on the device
    to see the immediate effect. This is the kind of behavior you can expect from
    a non-supervised BYOD device.


    **Pro Tip**


    As the needs of your business change, you may need to update, modify, or add new
    configuration settings and payloads. You can always modify the settings for the
    MyCompany BYOD device group and immediately apply those changes to all devices
    that are a member of the group.


    You have now enabled a large-scale BYOD solution. Going forward, all you will
    need to do is create additional placeholders and have your end users self-enroll,
    and the MDM will take care of the rest of the work for you.'
  raw: '![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig7_HTML.jpg](images/492151_1_En_12_Chapter/492151_1_En_12_Fig7_HTML.jpg)


