- fmt: '# Manifests


    As you may recall from earlier in this chapter, a Manifest is a list of software
    that needs to be installed on a given machine. We can create as many Manifests
    as we need to, but the recommendation is to maintain a small number of these to
    keep your Munki environment as lean and simple as possible. In this section, we
    are going to build a Manifest called `site_default` because that is the Manifest
    we pointed our test client to.


    Before we begin, we need to create a `manifests` folder in our `munki_repo` directory.
    Make sure you have mounted the `munki_repo` network share on your Mac administrator
    workstation and then open the Terminal. Use the `cd` command followed by dragging
    the `munki_repo` share to the window to change the directory to the network share.
    Type `ls -l` and you should see the directory shown in Figure 10-35.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig35_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig35_HTML.jpg)


    Figure 10-35

    Using the Terminal to browse the munki_repo share


    Next, enter `mkdir manifests` to create a new folder called `manifests` in the
    `munki_repo` share. Use `ls -l` or view the share via the Finder to confirm the
    folder now exists as shown in Figure 10-36.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig36_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig36_HTML.jpg)


    Figure 10-36

    Confirming that our new directory is now available


    Now, let''s open MunkiAdmin and connect to our `munki_repo`. Click the Manifests
    tab in the toolbar. We are going to create a new Manifest by choosing New Manifest
    from the File menu. When prompted, name it `site_default` and save it to the `manifests`
    folder on our `munki_repo` share as shown in Figure 10-37.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig37_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig37_HTML.jpg)


    Figure 10-37

    Creating a site_default Manifest in MunkiAdmin


    From the MunkiAdmin Manifest view, you should now see a `site_default` Manifest.
    Double-click it to open the Manifest Properties.


    ## Customizing a Manifest


    In this exercise, we are going to customize the `site_default` Manifest.


    1.  Starting in the General tab, we will assign a Catalog to this Manifest. We
    currently have one available Catalog, `testing`. Click the checkbox to the left
    of the testing catalog to point this manifest to the software listed in the testing
    catalog as shown in Figure 10-38.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig38_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig38_HTML.jpg)


    Figure 10-38

    Adding the testing Catalog to the site_default Manifest


    2.  Next, we are going to select the Managed Installs tab. Using the + button
    in the bottom part of this window, we can add specific applications to this list
    that will be available to the client using this Manifest. Since these packages
    are set to install without user interaction, these will be installed automatically
    when Munki runs again. We will add Firefox and Acrobat Reader to this list of
    Managed Installs. Select and add them as shown in Figure 10-39.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig39_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig39_HTML.jpg)


    Figure 10-39

    Select and add Firefox and Acrobat Reader as Managed Installs


    3.  Next, we are going to add a couple of Optional Installs. The Optional Installs
    will not be installed automatically but will be made available to the end user
    to select and install if they want to. Click the Optional Installs tab and then
    use the + button to add Adobe Flash Player, Audacity, and VLC Media Player as
    shown in Figure 10-40.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig40_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig40_HTML.jpg)


    Figure 10-40

    Selecting Flash Player, VLC, and Audacity as Optional Installs


    4.  After making these changes to the `site_default` Manifest, click the Save
    button and then the Reload button in the toolbar to publish our changes and refresh
    the MunkiAdmin console.


    Now that we have configured our Manifest, the Munki client software running on
    our test Mac will be able to look at the `site_default` Manifest and execute the
    items in this list. It will automatically install Firefox and Acrobat Reader the
    next time that Munki runs, which will be sometime in the next hour or so.


    ## Pro Tip


    By default, the Munki agent checks in with the server approximately once per hour.
    At that time, it looks for any changes on the server and then downloads and installs
    any packages or runs any scripts that have been placed into production since the
    last time it checked in.


    If we want to test this right away (we do) instead of waiting around, we can use
    a couple of commands via the Terminal on our client Mac to force Munki to download
    and install the available packages in the Manifest.


    At the command prompt, enter `sudo managedsoftwareupdate` to force Munki to run.
    After entering your local admin password, you will see output from the command
    line that Munki is contacting your server and checking the Manifest for pending
    updates. It will find and list all available software as shown in Figure 10-41.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig41_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig41_HTML.jpg)


    Figure 10-41

    Munki is running and checking the available updates for our test machine


    Next, we can enter `sudo managedsoftwareupdate --installonly`, and it will begin
    installing the software that we listed in the Manifest as Managed Installs. Figure
    10-42 shows the progress that the command line will output as it runs the installer
    in the background and installs Adobe Acrobat Reader and then Firefox.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig42_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig42_HTML.jpg)


    Figure 10-42

    Installing the software packages


    Once complete, browse your `/Applications` directory, and you should see Adobe
    Acrobat Reader and Firefox are now available. Feel free to open them to ensure
    that they installed successfully and work as expected.'
  raw: '### Manifests


    As you may recall from earlier in this chapter, a *Manifest* is a list of software
    that needs to be installed on a given machine. We can create as many Manifests
    as we need to, but the recommendation is to maintain a small number of these to
    keep your *Munki* environment as lean and simple as possible. In this section,
    we are going to build a Manifest called ***site_default*** because that is the
    Manifest we pointed our test client to.


    Before we begin, we need to create a ***manifests*** folder in our ***munki_repo***
    directory. Make sure you have mounted the ***munki_repo*** network share on your
    Mac administrator workstation and then open the Terminal. Use the `cd` command
    followed by dragging the ***munki_repo*** share to the window to change the directory
    to the network share. Type `ls -l` and you should see the directory shown in Figure
