  trans: '

    ### iOS 配置描述文件


    现在来点有趣的。让我们首先在配置文件管理器的`Devices`区域选择我们的测试设备。点击我们之前配置激活和注册选项的`Settings`选项卡。在设置页面的顶部，你应该会看到一个`Settings
    for iPad`部分，如图 9-33 所示。点击`Edit`按钮。


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig33_HTML.jpg](img/492151_1_En_9_Fig33_HTML.jpg)


    **图 9-33**

    点击编辑按钮以访问测试设备的配置描述文件设置


    `Settings for iPad`窗口对你来说会非常熟悉，因为它与 Apple Configurator 中看到的类似。这基本上就是我们前几章用过的、与`iOS`兼容的配置描述文件列表。请按要求配置`General`描述文件，确保选择`Automatic
    Push`作为`Profile Distribution Type`。接下来，我们将配置几个会改变主屏幕可见布局的描述文件，用于演示目的。


    向下滚动到`Home Screen Layout`描述文件。点击`Configure`按钮来自定义描述文件设置。使用`Dock`字段下的`+`按钮，将`App
    Store`、`Mail`和`News`添加到 Dock 中，如图 9-34 所示。


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig34_HTML.jpg](img/492151_1_En_9_Fig34_HTML.jpg)


    **图 9-34**

    配置主屏幕布局描述文件


    接下来，点击`Lock Screen Message`描述文件。点击`Configure`按钮，输入你想在锁屏上显示的`lost message`和`asset
    tag info`。最后，点击`Restrictions`，然后点击`Configure`来自定义这些选项。


    我们将取消勾选以下项目：

    *   允许使用 FaceTime（仅受监管设备）

    *   允许使用 iMessage（仅受监管设备）

    *   允许使用 Apple Music（仅受监管设备）

    *   允许使用收音机（仅受监管设备）

    *   允许移除应用程序（仅受监管设备）

    *   允许移除系统应用（仅受监管设备）

    *   允许应用内购买


    你的屏幕应该类似于图 9-35。点击`OK`按钮继续。


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig35_HTML.jpg](img/492151_1_En_9_Fig35_HTML.jpg)


    **图 9-35**

    配置限制描述文件


    现在你会在`Settings for iPad`部分下看到我们配置的各种描述文件。点击`Save`按钮将这些设置应用到我们的测试 iPad 上。如果你的 iPad
    已开机并停留在主屏幕，几秒钟后你会看到一些变化发生。Dock 会更新为我们指定的三个应用，Messages 和 FaceTime 应用会从设备上完全消失，并且尝试删除任何已安装的应用程序。祝你好运！你的设备应该看起来类似图
    9-36。


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig36_HTML.jpg](img/492151_1_En_9_Fig36_HTML.jpg)


    **图 9-36**

    我们被管理的 iPad，具有指定的限制和设置


    回到锁屏界面，你会看到一条关于联系支持的信息和一个资产标签号。


    接下来，让我们返回配置文件管理器并撤销其中一些设置。点击设备`Settings for iPad`部分下的`Edit`按钮。点击`Restrictions`描述文件下的`-`按钮以移除它，然后点击`OK`继续。点击`Save`按钮，将这些更改无线应用到测试
    iPad 上。几秒钟后，FaceTime 和 Messages 应用将返回主屏幕，现在你几乎可以删除任何你想删除的应用了。删除 Stocks 应用来确认一下。太棒了！


    这非常类似于我们在 Apple Configurator 中配置和部署描述文件的方式，但额外的好处是能够实时更新设备，而无需通过 USB 线缆将其连接到我们的
    Mac。这就是 MDM 的力量。此时，你可以试验所有种类的`iOS`描述文件，将它们应用到你的测试 iOS 设备或从中移除，看看设备如何反应。有很多非常棒的功能可供你使用，所以我鼓励你花时间尝试这些功能，看看它们如何融入你的整体部署和管理策略。


    ### iOS 远程管理


    除了应用配置描述文件之外，`Actions`按钮的子菜单中还提供了一些很好的远程管理功能。为了演示，请在你的测试 iOS 设备上交互式地设置一个密码。密码是什么或有多复杂都没关系。将设备返回锁屏并确认其已锁定。一旦设备被锁定，返回配置文件管理器，从`Devices`列表中选择测试
    iOS 设备。点击`Action`按钮并选择`Clear Passcode`，如图 9-37 所示。


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig37_HTML.jpg](img/492151_1_En_9_Fig37_HTML.jpg)


    **图 9-37**

    从操作子菜单发送清除密码命令


    提示时点击`Confirm`。经过几秒钟的活动后，回到你的测试 iPad，瞧！iPad 被解锁了。这不仅是一个有趣的小把戏，你实际上还可以用它来进入那些用户忘记了密码或已不在组织内的被管理设备。


    你可以试验许多不同的操作：`Restart`、`Shut Down`、`Wipe`等等。只要设备连接到互联网，它就会响应任何远程管理命令。


    ## 使用配置文件管理器进行 macOS 管理


    我们已经探索了 iOS 设备可用的一些描述文件和操作，但`macOS`客户端也有一些独特的选项。在本节中，我们将重点介绍`macOS`的能力和描述文件。如果你还没有这样做，请使用你喜欢的方法将一台测试
    Mac 客户端注册到配置文件管理器中，并确保它是用户批准的。

    '
- fmt: '### macOS Payloads


    与iOS设备类似，我们也可以配置特定的`macOS`负载。在配置文件管理器（Profile Manager）中浏览您所管理的测试Mac，并点击**设置**标签页。就像我们对测试iPad所做的操作一样，点击
    **测试Mac的设置** 部分下方的**编辑**按钮。配置描述文件窗口出现后，您会注意到设置被分成了不同的区块，以标识负载适用于哪个操作系统。您应小心谨慎，仅配置专门针对`macOS`的负载，或那些适用于包括macOS在内的多种操作系统的负载。


    首先配置 **通用** 负载，并确保 **配置文件分发类型** 选择了 **自动推送**。接下来，让我们向下滚动到仅适用于**macOS**的负载部分，并点击
    **登录窗口**。点击**配置**按钮，并按照图 [9-38](#492151_1_En_9_Chapter.xhtml#Fig38) 所示自定义设置。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig38_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig38_HTML.jpg)


    图 9-38 登录窗口负载设置


    接下来，我们可以向下滚动到 **安全性与隐私** 并点击**配置**按钮来编辑该负载。点击 **隐私** 标签页，并自定义设置以匹配图 [9-39](#492151_1_En_9_Chapter.xhtml#Fig39)
    中的设置。我们在这里所做的操作是将`Finder`应用添加到`~/Documents`文件夹，并设置为始终允许`Finder`访问它，而无需在每次被新用户帐户访问时提示用户。这是`Mojave`和`Catalina`中的新“透明度、同意与控制”功能之一，您需要花一些时间进行配置和测试。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig39_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig39_HTML.jpg)


    图 9-39 安全性与隐私负载中的TCC/PPPC设置


    最后，点击 **限制** 并点击**配置**按钮来编辑该负载。在 **偏好设置** 标签页中，选择 **限制系统偏好设置中的项目**，然后取消勾选 **启动磁盘**
    和 **软件更新**，如图 [9-40](#492151_1_En_9_Chapter.xhtml#Fig40) 所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig40_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig40_HTML.jpg)


    图 9-40 禁用对特定系统偏好设置的访问


    点击 **确定** 以保存 **测试Mac的设置**，然后点击**保存**按钮以应用它们。


    几分钟后，让我们来看看我们一直在测试的`macOS`客户端发生了什么变化。如果您**注销**，您会看到登录窗口已更改为简单的用户名和密码字段；点击屏幕右上角的时钟将允许您切换查看计算机名称、IP地址等信息。从登录窗口**关机**的能力也被禁用了，但如果需要，您仍然可以**重启**计算机。


    以本地用户身份登录，并从**Apple**菜单打开**系统偏好设置**。如图 [9-41](#492151_1_En_9_Chapter.xhtml#Fig41)
    所示，*启动磁盘*和*软件更新系统偏好设置*已被禁用并呈灰色显示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig41_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig41_HTML.jpg)


    图 9-41 被禁用的系统偏好设置面板显示为灰色


    #### 专业提示


    如果您打算使用配置文件管理器（Profile Manager）限制系统偏好设置，您需要在**登录窗口**负载中调整一个设置，以允许本地管理员能够访问这些被禁用的系统偏好设置。如图
    [9-42](#492151_1_En_9_Chapter.xhtml#Fig42) 所示，您应在**选项**标签页下启用**计算机管理员可以刷新或禁用管理**设置。应用此设置后，当本地管理员登录时，他们应按住**option键**或**左shift键**，直到Mac提示如图
    [9-43](#492151_1_En_9_Chapter.xhtml#Fig43) 所示的对话框。在此对话框中选择**禁用设置**将重新启用所有被禁用的系统偏好设置。此修饰键仅对具有管理员访问权限的用户帐户有效。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig43_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig43_HTML.jpg)


    图 9-43 选择“禁用设置”以重新启用系统偏好设置


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig42_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig42_HTML.jpg)


    图 9-42 如果您计划使用Profile Manager禁用任何系统偏好设置，请确保选中此设置


    ### macOS 远程管理


    与`iOS`类似，有一些特定功能可以通过**操作**菜单来调用。您可以通过在**设备**中选择您的测试Mac，然后点击配置文件管理器窗口底部的**操作**菜单并选择一个功能来测试这一点。您可以尝试这些功能，您会注意到，与同样具有这些控制的Apple
    Remote Desktop不同，您的Mac无需连接到局域网即可响应这些命令。因为MDM在公共互联网上是活跃的，只要Mac有互联网访问权限，它就会执行命令。


    说到Apple Remote Desktop，配置文件管理器的一个非常酷的功能是能够在单台或多台Mac上激活Apple Remote Desktop。在**设备**列表中选择您的测试Mac，点击**操作**按钮并选择**启用远程桌面**，如图
    [9-44](#492151_1_En_9_Chapter.xhtml#Fig44) 所示。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig44_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig44_HTML.jpg)


    图 9-44 macOS客户端可用的操作列表


    几秒钟后，在您的测试Mac上打开*共享系统偏好设置*，您应该看到**远程管理**选项已被勾选，如图 [9-45](#492151_1_En_9_Chapter.xhtml#Fig45)
    所示。如果您点击**选项...**按钮，您将看到所有选项都已启用。


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig45_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig45_HTML.jpg)


    图 9-45 执行“启用远程桌面”操作后的共享系统偏好设置


    现在您可以进入您的Apple Remote Desktop控制台，将设备添加到您的ARD计算机列表中。如果您在设置助理（Setup Assistant）期间通过DEP注册`macOS`设备，一旦它们在您的MDM中激活，您就可以打开Apple
    Remote Desktop，然后通过ARD推送各种脚本和额外的安装包。这为远程阶段化部署系统（从激活到账户创建和软件包安装）提供了完整的端到端解决方案。


    ## 使用Profile Manager进行软件分发


    除了管理设备，配置文件管理器还与批量购买计划（VPP）结合使用，以实现从App Store和Mac App Store远程安装应用。


    ### 托管式分发


    Apple使用一种称为*托管式分发*的概念，为通过配置文件管理器部署的应用提供设备许可证。其工作方式是，组织购买App Store信用额度（类似于一张非常大的*iTunes礼品卡*），然后使用该信用额度兑换多个应用许可证。例如，您可以购买十份*Angry
    Birds*，然后将它们分配给十台独立的iPad，无论谁在使用它们。然后几个月后，您可以从其中四台iPad上移除*Angry Birds*，并将其安装到另外四台iPad上。这样，组织可以将特定应用分配给特定设备，并在用户需求发生变化时重新分配它们，而无需购买额外的许可证。'
  raw: '### macOS Payloads


    Like iOS devices, we can also configure specific *macOS* payloads as well. Browse
    to your managed test Mac in Profile Manager and click the **Settings** tab. Just
    like we did with the test iPad, click the **Edit** button under the **Settings
    for Test Mac** section. When the Configuration Profile window appears, you will
    notice that the settings are separated into sections that identify which OS the
    payloads apply to. You should be careful to only configure payloads that are specific
    to *macOS* or those that are for multiple OS types including macOS.


    Begin by configuring the **General** payload and ensure that **Automatic Push**
    is selected for the **Profile Distribution Type**. Next, let’s scroll down to
    the **macOS**-only section of possible payloads and click **Login Window**. Click
    the **Configure** button and customize the settings as I have in Figure [9-38](#492151_1_En_9_Chapter.xhtml#Fig38).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig38_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig38_HTML.jpg)


    Figure 9-38


    The Login Window payload settings


    Next, we can scroll down to **Security & Privacy** and click the **Configure**
    button to edit the payload. Click the **Privacy** tab and customize to match my
    settings in Figure [9-39](#492151_1_En_9_Chapter.xhtml#Fig39). What we are doing
    here is adding the Finder application to the ***~/Documents*** folder and setting
    it to always allow the Finder to access it without prompting the user to allow
    it whenever it is accessed by a new user account. This is one of the new Transparency,
    Consent, and Control features in *Mojave* and *Catalina* that you will want to
    spend some time configuring and testing.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig39_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig39_HTML.jpg)


    Figure 9-39


    The TCC/PPPC settings in in the Security & Privacy payload


    Finally, click **Restrictions** and click the **Configure** button to edit the
    payload. In the **Preferences** tab, choose to **Restrict items in System Preferences**
    and then uncheck **Startup Disk** and **Software Update** like I have done in
    Figure [9-40](#492151_1_En_9_Chapter.xhtml#Fig40).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig40_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig40_HTML.jpg)


    Figure 9-40


    Disable access to specific System Preferences


    Click **OK** to save the **Settings for Test Mac** and then click the **Save**
    button to apply them.


    After a few minutes, let’s take a look at the *macOS* client we have been testing
    with and see what has changed. If you **log out**, you will see that the login
    window has changed to simple username and password fields; and clicking the clock
    in the top-right corner of the screen will allow you to toggle through the name
    of the computer, IP address, and so on. The ability to **shut down** the computer
    from the login window is also disabled, but you can still **restart** the computer
    if needed.


    Log in as a local user and open the **System Preferences** from the **Apple**
    menu. As shown in Figure [9-41](#492151_1_En_9_Chapter.xhtml#Fig41), the *Startup
    Disk* and *Software Update System Preferences* are disabled and grayed out.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig41_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig41_HTML.jpg)


    Figure 9-41


    The disabled System Preference panes are grayed out


    Pro Tip


    If you are going to restrict System Preferences using Profile Manager, there is
    one setting you are going to want to adjust in the **Login Window** payload to
    allow local Administrators to be able to access these disabled System Preferences.
    As shown in Figure [9-42](#492151_1_En_9_Chapter.xhtml#Fig42), you should enable
    the **Computer administrators may refresh or disable management** setting under
    the **Options** tab. Once this is applied, when a local Administrator signs in,
    they should hold down the **option key** or the **left shift key** until the Mac
    prompts them with the dialog box shown in Figure [9-43](#492151_1_En_9_Chapter.xhtml#Fig43).
    Choosing **Disable Settings** in this dialog box will re-enable all disabled System
    Preferences. This modifier key only works with user accounts that have Administrator
    access.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig43_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig43_HTML.jpg)


    Figure 9-43


    Select Disable Settings to re-enable the System Preferences


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig42_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig42_HTML.jpg)


    Figure 9-42


    Ensure this setting is checked if you plan to disable any System Preferences with
    Profile Manager


    ### macOS Remote Management


    Just like *iOS*, there are specific functions that you can invoke using the Actions
    menu. You can test this out by selecting your test Mac in **Devices** and then
    clicking the **Action** menu near the bottom of the Profile Manager window and
    selecting one of the functions. You can experiment with these, and you will notice
    that unlike Apple Remote Desktop, which also has these controls, your Mac doesn’t
    need to be connected to the local area network to respond to these commands. Because
    MDM is live on the public Internet, as long as a Mac has Internet access, it will
    execute.


    Speaking of Apple Remote Desktop, one of the very cool features of Profile Manager
    is the ability to activate Apple Remote Desktop on one or many Macs. Select your
    test Mac in the **Devices** list and click the **Action** button and choose **Enable
    Remote Desktop** as shown in Figure [9-44](#492151_1_En_9_Chapter.xhtml#Fig44).


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig44_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig44_HTML.jpg)


    Figure 9-44


    The list of actions available for macOS clients


    After a few seconds, open the *Sharing System Preference* on your test Mac, and
    you should see that the **Remote Management** option is checked as shown in Figure
    [9-45](#492151_1_En_9_Chapter.xhtml#Fig45). If you click **the Options…** button,
    you will see that all of the options are enabled.


    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig45_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig45_HTML.jpg)


    Figure 9-45


    The Sharing System Preference after the Enable Remote Desktop action is executed


    Now you can go into your Apple Remote Desktop console to add the device to your
    ARD computer list. If you are enrolling your *macOS* devices through DEP during
    Setup Assistant, once they are live in your MDM, you can turn on Apple Remote
    Desktop and then push various scripts and additional packages via ARD. This provides
    a complete end-to-end solution for staging systems remotely from activation through
    account creation and package installation.


    ## Software Distribution with Profile Manager


    In addition to managing devices, Profile Manager also works in conjunction with
    Volume Purchase Program (VPP) to enable remote installation of Apps from the App
    Store and Mac App Store.


    ### Managed Distribution


    Apple uses a concept called *Managed Distribution* to provide licenses to devices
    for Apps that are deployed via Profile Manager. The way that this works is that
    an organization purchases App Store credit, which is kind of like a really big
    *iTunes Gift Card*, and then uses that credit to redeem multiple licenses of Apps.
    For example, you can purchase ten copies of *Angry Birds* and then assign them
    to ten separate iPads, regardless of who is using them. Then a few months later,
    you can remove *Angry Birds* from four of the iPads and then install it on four
    other iPads. This way the organization can assign specific Apps to specific devices
    and then reassign them if the needs of their users change without purchasing additional
    licenses.'
