- fmt: '### VPN


    与`macOS`类似，你也可以为`iOS`配置内置`VPN`。要配置可选的`VPN`设置，请浏览至`设置`应用 ➤ `通用` ➤ `VPN`并点击`添加VPN配置…`按钮。您将看到一个类似于图[4-19](#492151_1_En_4_Chapter.xhtml#Fig19)所示的屏幕。与`macOS`一样，你可以配置几种最流行的`VPN`协议，包括`Cisco
    IPSec`。添加`VPN`配置后，您会在主`设置`面板中（`蜂窝网络和个人热点`选项下方）看到一个简单的`VPN`开/关切换开关。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig19_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig19_HTML.jpg)


    图 4-19

    iOS 13中的VPN配置设置和激活开关


    ## iOS 设备安全


    当苹果公司设计`iOS`时，他们从头开始就融入了现代化的安全功能。磁盘加密默认启用，并且在标准的`iOS`安装中不是可选项。作为其`透明度、同意和控制倡议`的一部分，苹果不断加强`iOS`的安全和隐私功能。`Touch
    ID`、`Face ID`和`激活锁`都是有助于保护用户数据和隐私、阻止设备被盗的下一代功能。


    ### 密码锁/Touch ID/Face ID


    每个iOS设备都具备`密码`锁定选项。这使用户可以设置一个解锁设备和访问主屏幕、用户数据及`App`所需的密码。它既可以是一个简单的四位数字，也可以是一个完整的短语或密码。苹果早些时候推出了生物指纹传感器`Touch
    ID`，它是带有物理主屏幕按钮的设备上的标准功能。下一代面部识别系统`Face ID`是iOS设备上（无物理主屏幕按钮）的标准功能。这两项技术都与密码设置协同工作以保护您的设备。这些功能可以在iOS
    13中使用`Face ID`的设备的`设置`➤`面容ID与密码`中，以及使用`Touch ID`的设备的`设置`➤`触控ID与密码`中进行配置。


    > 专业提示

    > 为了增强数据安全性，特别是在政府或企业环境中，您可能希望设置设备在若干次无效密码尝试后重置/恢复到出厂默认设置。这可以防止对丢失或被盗设备进行暴力破解攻击。


    ### 隐私


    类似于`macOS`中`安全性与隐私`系统偏好设置的`隐私`选项卡，`iOS`中的`隐私`设置可以通过浏览至`设置`应用 ➤ `隐私`找到，其中包含一系列请求使用苹果认为涉及用户隐私的众多硬件或软件功能的`App`或服务。如图[4-20](#492151_1_En_4_Chapter.xhtml#Fig20)所示，除了典型的`定位服务`、`麦克风`和`相机`外，还有`iOS`特有的选项，如`健康`、`家庭`和`运动与健身`。您可以浏览这些类别并管理哪些应用程序能够使用这些特定功能。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig20_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig20_HTML.jpg)


    图 4-20

    iOS 13 的隐私设置


    ### 屏幕使用时间限制


    从iOS 12开始，苹果引入了`屏幕使用时间`功能，它允许用户测量他们在设备上花费的时间，并采取行动对游戏或社交媒体等项目进行自我时间限制。与`macOS`的`屏幕使用时间`类似，其中包含针对`停用时间`、`App限额`等功能的特定设置，这些我们已在第[2](#492151_1_En_2_Chapter.xhtml)章中介绍过。要访问`iOS`中的`屏幕使用时间`设置，请浏览至`设置`应用
    ➤ `屏幕使用时间`。


    有一组特定的`隐私与内容`设置对`iOS`来说比较独特。这些`限制`过去位于`设置`应用 ➤ `通用` ➤ `限制`下，但在iOS 12及更高版本中已移至`屏幕使用时间`设置中。这些设置可以包括限制访问特定`App`、禁用`App
    Store`下载、禁用应用内购买或禁用特定硬件（如相机）的使用。图[4-21](#492151_1_En_4_Chapter.xhtml#Fig21)显示了在`设置`➤`屏幕使用时间`➤`内容与隐私限制`下可以找到的更全面的设置列表。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig21_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig21_HTML.jpg)


    图 4-21

    iOS 13中特定的iOS设备限制列表


    ### 激活锁


    `激活锁`是苹果几年前实施的一项防盗功能，旨在为`iOS`用户提供另一层设备安全。`激活锁`与您的`Apple ID`和`iCloud`帐户配合工作，确保在重置或恢复后能够重新激活`iOS`设备的唯一人员，是在该设备上登录的`iCloud`帐户的所有者。如果设备进入iOS恢复模式，被抹掉，然后在没有先注销现有`iCloud`帐户的情况下，使用全新的iOS
    13副本进行恢复，则在尝试使用设置助理激活设备时，您将看到如图[4-22](#492151_1_En_4_Chapter.xhtml#Fig22)所示的信息。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig22_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig22_HTML.jpg)


    图 4-22

    iOS 设置助理过程中出现的激活锁信息


    要继续激活过程，您必须拥有之前在该设备上登录的帐户的`Apple ID`或`iCloud`密码。没有该密码，您将永远无法完成设备设置，因此它不会成为一个可用的系统。为了避免激活锁带来的麻烦，您应始终让最后一位用户在重置或恢复操作系统之前`退出`登录`iCloud`。在由于设备故障需要恢复的情况下，请确保`iCloud`密码可用，以便您可以通过`激活锁`快速完成身份验证，并完成系统的配置以供使用。


    如果您因某些原因必须恢复设备，但没有`iCloud`帐户来绕过`激活锁`，则必须通过`AppleCare`或`Apple零售店`联系苹果支持。通过提供购买证明，一旦证实设备所有权，苹果员工可以重置设备的激活锁状态。


    > 专业提示

    > 使用MDM工具或苹果的设备注册计划（DEP）的学校和企业可以在机构拥有的设备上禁用激活锁。这将在第[8](#492151_1_En_8_Chapter.xhtml)章中介绍。


    ## 用户帐户


    所有iOS设备都设计为个人、单用户体验。每台设备只有一个本地用户帐户；所有其他帐户都用于访问各种服务，如`App Store`或`iCloud`，或第三方电子邮件服务，如`Gmail`或`Microsoft
    Exchange`。虽然建议您为苹果的所有服务使用同一帐户，但也可以分别为`App Store`和`iCloud`使用不同的帐户。'
  raw: '### VPN


    Like *macOS*, you can also configure the built-in *VPN* for *iOS*. To configure
    the optional VPN settings, browse to ***Settings*** *app* ➤ ***General*** ➤ ***VPN***
    and tap the **Add VPN Configuration…** button. You will be presented with a screen
    similar to the one shown in Figure [4-19](#492151_1_En_4_Chapter.xhtml#Fig19).
    Like *macOS*, you have the option of configuring several of the most popular VPN
    protocols including *Cisco IPSec*. Once you have added a VPN configuration, you
    will see a simple **VPN on/off** toggle switch added to the main **Settings**
    pane just below the **Cellular Data and Personal Hotspot** options.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig19_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig19_HTML.jpg)


    Figure 4-19


    VPN configuration settings and resulting activation switch in iOS 13


    ## iOS Device Security


    When Apple designed *iOS*, they developed it from the ground up with modern security
    features. Disk encryption is enabled by default, and it’s not an option in standard
    *iOS* installs. Apple has continued to beef up the security and privacy features
    in *iOS* as part of their *Transparency, Consent, and Control initiative*. *Touch
    ID*, *Face ID*, and *Activation Lock* are all next-generation features that help
    protect user data and privacy and deter device theft.


    ### Passcode Lock/Touch ID/Face ID


    Every iOS device features the *passcode* lock option. This enables a user to set
    a code that is required to unlock the device and access the Home Screen, user
    data, and Apps. This can be as simple as a four-digit number or as complex as
    a full phrase or password. Apple debuted the biometric fingerprint sensor, *Touch
    ID* , some time ago; and it is a standard feature on devices with a physical Home
    button. The next-generation facial recognition system, *Face ID* , is a standard
    feature on iOS devices without a physical Home button. Both of these technologies
    work in conjunction with the passcode settings to secure your devices. These features
    can be configured in **Settings** ➤ **Face ID & Passcode** in iOS 13 on devices
    that use Face ID and in **Settings** ➤ **Touch ID & Passcode** in iOS 13 on devices
    that use Touch ID.


    Pro Tip


    For added data security, particularly in government or corporate environments,
    you may want to set the device to reset/restore to factory default after some
    number of invalid password attempts. This can protect against brute-force attacks
    being used on a lost or stolen device.


    ### Privacy


    Similar to the *Privacy* tab in the *Security & Privacy System Preference* in
    *macOS*, the *Privacy Setting* in *iOS* can be found by browsing to ***Settings***
    *app* ➤ ***Privacy*** and includes a list of the Apps or services that have requested
    to use any number of hardware or software features that Apple deems sensitive
    to a user’s privacy. As you can see in Figure [4-20](#492151_1_En_4_Chapter.xhtml#Fig20),
    the typical **Location Services**, **Microphone**, and **Camera** are joined by
    *iOS*-specific options like **Health**, **HomeKit**, and **Motion & Fitness**.
    You can browse these categories and manage which applications are able to use
    these specific features.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig20_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig20_HTML.jpg)


    Figure 4-20


    Privacy settings for iOS 13


    ### Screen Time Restrictions


    Starting with iOS 12, Apple introduced the *Screen Time* feature, which allowed
    users to measure the time they were spending on their devices and take action
    to self-impose time limits on things like games or social media. Like Screen Time
    for *macOS*, there are specific settings for **Down Time**, **App Limits**, and
    other features that we covered in Chapter [2](#492151_1_En_2_Chapter.xhtml). To
    access the Screen Time settings in *iOS*, browse to ***Settings*** *app* ➤ ***Screen
    Time***.


    There is one specific set of **privacy and content** settings that are somewhat
    unique to *iOS*. These *Restrictions* used to be found under ***Settings*** *app*
    ➤ ***General*** ➤ ***Restrictions*** but have been moved into the Screen Time
    settings in iOS 12 and later. These settings can include restricting access to
    specific Apps, disabling *App Store* downloads, disabling in-app purchases, or
    disabling the use of specific hardware like the camera. Figure [4-21](#492151_1_En_4_Chapter.xhtml#Fig21)
    shows a more comprehensive list of settings found under ***Settings*** ➤ ***Screen
    Time*** ➤ ***Content & Privacy Restrictions***.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig21_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig21_HTML.jpg)


    Figure 4-21


    The list of specific iOS device Restrictions in iOS 13


    ### Activation Lock


    *Activation Lock* is an anti-theft feature that Apple implemented several years
    ago to provide another level of device security to *iOS* users. Activation Lock
    works in conjunction with your *Apple ID* and *iCloud* account to ensure that
    the only person who can reactivate an iOS device after a reset or restore is the
    user that owns the *iCloud* account that was signed in on that unit. If a device
    is placed into iOS Recovery mode, erased, and then restored with a fresh copy
    of iOS 13 without having the existing *iCloud* account signed out first, you will
    be greeted with the message shown in Figure [4-22](#492151_1_En_4_Chapter.xhtml#Fig22)
    when attempting to use the Setup Assistant to activate the device.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig22_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig22_HTML.jpg)


    Figure 4-22


    An Activation Lock message appears during the iOS Setup Assistant


    To continue with the activation process, you must have the *Apple ID* or *iCloud*
    password for the account that was previously signed into the device. Without that
    password, you will never finish setting up the device, so it will not result in
    a usable system. To guard against Activation Lock headaches, you should always
    have the last user **sign out** of *iCloud* before resetting or restoring the
    operating system. In cases where a restore is required due to an inoperable device,
    be sure to have the iCloud password available so you can quickly authenticate
    through Activation Lock and finish configuring the system for use.


    If you have had to restore the device for some reason and do not have the iCloud
    account to bypass Activation Lock, you must contact Apple Support via ***AppleCare***
    or through an ***Apple Retail Store***. By providing proof of purchase, an Apple
    employee can reset the Activation Lock status of a device once ownership has been
    proven.


    Pro Tip


    Schools and businesses that use MDM tools or Apple’s Device Enrollment Program
    (DEP) can disable Activation Lock on institution-owned devices. This is covered
    in Chapter [8](#492151_1_En_8_Chapter.xhtml).


    ## User Accounts


    All iOS devices are designed for a personal, single-user experience. There is
    only one local user account per device; and all of the other accounts are used
    to access various services like the *App Store or iCloud* or third-party email
    services like *Gmail* or *Microsoft Exchange*. While it is recommended that you
    use the same account for all of Apple’s services, it is possible to use separate
    accounts for the *App Store* and *iCloud*, respectively.'
  trans: '

    ### VPN


    与`macOS`类似，你也可以为`iOS`配置内置`VPN`。要配置可选的`VPN`设置，请浏览至`设置`应用 ➤ `通用` ➤ `VPN`并点击`添加 VPN
    配置…`按钮。您将看到一个类似于图 4-19 所示的屏幕。与`macOS`一样，你可以配置几种最流行的`VPN`协议，包括`Cisco IPSec`。添加`VPN`配置后，您会在主`设置`面板中（`蜂窝网络和个人热点`选项下方）看到一个简单的`VPN`开/关切换开关。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig19_HTML.jpg](img/492151_1_En_4_Fig19_HTML.jpg)


    图 4-19

    iOS 13 中的 VPN 配置设置和激活开关


    ## iOS 设备安全


    当苹果公司设计`iOS`时，他们从头开始就融入了现代化的安全功能。磁盘加密默认启用，并且在标准的`iOS`安装中不是可选项。作为其`透明度、同意和控制倡议`的一部分，苹果不断加强`iOS`的安全和隐私功能。`Touch
    ID`、`Face ID`和`激活锁`都是有助于保护用户数据和隐私、阻止设备被盗的下一代功能。


    ### 密码锁/Touch ID/Face ID


    每个 iOS 设备都具备`密码`锁定选项。这使用户可以设置一个解锁设备和访问主屏幕、用户数据及`App`所需的密码。它既可以是一个简单的四位数字，也可以是一个完整的短语或密码。苹果早些时候推出了生物指纹传感器`Touch
    ID`，它是带有物理主屏幕按钮的设备上的标准功能。下一代面部识别系统`Face ID`是 iOS 设备上（无物理主屏幕按钮）的标准功能。这两项技术都与密码设置协同工作以保护您的设备。这些功能可以在
    iOS 13 中使用`Face ID`的设备的`设置`➤`面容 ID 与密码`中，以及使用`Touch ID`的设备的`设置`➤`触控 ID 与密码`中进行配置。


    > 专业提示

    > 为了增强数据安全性，特别是在政府或企业环境中，您可能希望设置设备在若干次无效密码尝试后重置/恢复到出厂默认设置。这可以防止对丢失或被盗设备进行暴力破解攻击。


    ### 隐私


    类似于`macOS`中`安全性与隐私`系统偏好设置的`隐私`选项卡，`iOS`中的`隐私`设置可以通过浏览至`设置`应用 ➤ `隐私`找到，其中包含一系列请求使用苹果认为涉及用户隐私的众多硬件或软件功能的`App`或服务。如图
    4-20 所示，除了典型的`定位服务`、`麦克风`和`相机`外，还有`iOS`特有的选项，如`健康`、`家庭`和`运动与健身`。您可以浏览这些类别并管理哪些应用程序能够使用这些特定功能。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig20_HTML.jpg](img/492151_1_En_4_Fig20_HTML.jpg)


    图 4-20

    iOS 13 的隐私设置


    ### 屏幕使用时间限制


    从 iOS 12 开始，苹果引入了`屏幕使用时间`功能，它允许用户测量他们在设备上花费的时间，并采取行动对游戏或社交媒体等项目进行自我时间限制。与`macOS`的`屏幕使用时间`类似，其中包含针对`停用时间`、`App
    限额`等功能的特定设置，这些我们已在第 2 章中介绍过。要访问`iOS`中的`屏幕使用时间`设置，请浏览至`设置`应用 ➤ `屏幕使用时间`。


    有一组特定的`隐私与内容`设置对`iOS`来说比较独特。这些`限制`过去位于`设置`应用 ➤ `通用` ➤ `限制`下，但在 iOS 12 及更高版本中已移至`屏幕使用时间`设置中。这些设置可以包括限制访问特定`App`、禁用`App
    Store`下载、禁用应用内购买或禁用特定硬件（如相机）的使用。图 4-21 显示了在`设置`➤`屏幕使用时间`➤`内容与隐私限制`下可以找到的更全面的设置列表。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig21_HTML.jpg](img/492151_1_En_4_Fig21_HTML.jpg)


    图 4-21

    iOS 13 中特定的 iOS 设备限制列表


    ### 激活锁


    `激活锁`是苹果几年前实施的一项防盗功能，旨在为`iOS`用户提供另一层设备安全。`激活锁`与您的`Apple ID`和`iCloud`帐户配合工作，确保在重置或恢复后能够重新激活`iOS`设备的唯一人员，是在该设备上登录的`iCloud`帐户的所有者。如果设备进入
    iOS 恢复模式，被抹掉，然后在没有先注销现有`iCloud`帐户的情况下，使用全新的 iOS 13 副本进行恢复，则在尝试使用设置助理激活设备时，您将看到如图
    4-22 所示的信息。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig22_HTML.jpg](img/492151_1_En_4_Fig22_HTML.jpg)


    图 4-22

    iOS 设置助理过程中出现的激活锁信息


    要继续激活过程，您必须拥有之前在该设备上登录的帐户的`Apple ID`或`iCloud`密码。没有该密码，您将永远无法完成设备设置，因此它不会成为一个可用的系统。为了避免激活锁带来的麻烦，您应始终让最后一位用户在重置或恢复操作系统之前`退出`登录`iCloud`。在由于设备故障需要恢复的情况下，请确保`iCloud`密码可用，以便您可以通过`激活锁`快速完成身份验证，并完成系统的配置以供使用。


    如果您因某些原因必须恢复设备，但没有`iCloud`帐户来绕过`激活锁`，则必须通过`AppleCare`或`Apple 零售店`联系苹果支持。通过提供购买证明，一旦证实设备所有权，苹果员工可以重置设备的激活锁状态。


    > 专业提示

    > 使用 MDM 工具或苹果的设备注册计划（DEP）的学校和企业可以在机构拥有的设备上禁用激活锁。这将在第 8 章中介绍。


    ## 用户帐户


    所有 iOS 设备都设计为个人、单用户体验。每台设备只有一个本地用户帐户；所有其他帐户都用于访问各种服务，如`App Store`或`iCloud`，或第三方电子邮件服务，如`Gmail`或`Microsoft
    Exchange`。虽然建议您为苹果的所有服务使用同一帐户，但也可以分别为`App Store`和`iCloud`使用不同的帐户。

    '
- fmt: '## Apple ID


    `Apple ID`是使用iOS设备所需的主要账户。`Apple ID`是免费的，可以使用任何电子邮件地址配置，甚至来自竞争对手如Microsoft或Google的邮箱。要创建`Apple
    ID`，您的用户只需访问[`http://appleid.apple.com`](http://appleid.apple.com)并注册。您也可以在`iOS`中许多需要登录才能启用服务的区域注册`Apple
    ID`，比如`App Store`。教育或商业客户还可以创建`institutional Apple IDs`，我们将在第[8](#492151_1_En_8_Chapter.xhtml)章中详细介绍。`Apple
    ID`用于启用多种Apple服务，包括`iMessage`、`FaceTime`和`App Store`。


    ## iCloud Account


    `iCloud`账户经常与`Apple ID`混淆，因为您可以使用`Apple ID`用户名注册`iCloud`服务，并且通常也会这样做。然而，这实际上是两个独立的账户。`iCloud`服务通常涉及在包括`Documents`、`Messages`、`Contacts`、`Calendar`、`Safari`书签等各种Apple设备之间同步数据。`iCloud`还启用了诸如`Find
    My iPhone`、`Activity Sharing`（与`Apple Watch`配对时）和`iCloud Keychain`等服务。


    ## App Store Account


    第三种账户是`App Store`账户，这是一个已注册**付款方式**的`Apple ID`，可用于从`App Store`购买和安装应用程序。虽然`iCloud`账户是个人账户，但用于`App
    Store`的`Apple ID`可以与您的家庭或组织中的其他人共享。您可以通过`Settings`应用程序 ➤ `iTunes & App Store`手动使用`Apple
    ID`登录`App Store`，然后点击**Sign In**按钮登录，如图[4-23](#492151_1_En_4_Chapter.xhtml#Fig23)所示。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig23_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig23_HTML.jpg)


    Figure 4-23

    Sign-in screen for the iTunes Store & App Store in iOS 13


    请注意，除非您计划与组织中的所有用户共享账户凭据，否则共享的`App Store`账户可能不是一个好主意。当您使用共享的`App Store`账户在iOS设备上购买并安装应用程序时，下次该应用程序需要更新时，它会提示您的用户输入共享账户的密码。如果他们不知道密码，可能会锁定`App
    Store`账户或请求重置密码，这可能会给其他同样配置了共享账户的设备带来问题。如果您将密码透露给最终用户，他们可能会进行未经授权的购买，并记在您的账户上。


    幸运的是，Apple已实施两种解决方案来解决`App Store`的这些问题，同时允许组织集中购买应用程序并在多台设备上进行管理。第一种解决方案针对消费者，称为`Family
    Sharing`。`Family Sharing`允许每个家庭成员拥有自己的`App Store`账户，但可以访问家庭中任何人购买的共享应用程序池。另一种解决方案针对教育和商业客户，是使用Apple的`Volume
    Purchase Program`（`VPP`），其中应用程序被购买并分配给与组织成员相关联的任意数量的唯一`Apple ID`。`VPP`在第[8](#492151_1_En_8_Chapter.xhtml)章中有更详细的介绍。


    ## iPadOS


    当`iPad`首次发布时，该设备受到的一个批评是它本质上是一个大号的`iPhone`，因为它运行的是`iOS`而不是`macOS`（或其他类型的桌面操作系统）。在过去的`iOS`版本中，Apple继续提供特殊的`iPad-only`功能，如**side-by-side
    app multitasking**和对`Apple Pencil`手写笔的支持。从iOS 13开始，Apple决定将所有专属于iPad的功能整合在一个统一的名称下——`iPadOS`。


    虽然底层操作系统仍然是`iOS`，但以下功能是`iPad`独有的，仅在iOS 13的`iPadOS`子集中找到：


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig24_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig24_HTML.jpg)


    Figure 4-24

    Device’s accessibility feature to enable mouse support in iPadOS


    *   **Removable Media Support**: `Files`应用程序不仅允许您在类似macOS的`Column`视图中浏览，还提供创建和组织数据到文件夹的功能；如果您通过Lightning或USB-C适配器插入USB磁盘，您还可以在可移动媒体之间传输数据。

    *   增强的Apple Pencil支持。

    *   桌面级Safari浏览器。

    *   增强的多任务处理，包括`Slide Over`窗口和同一应用程序在屏幕上同时显示多个`Split View`窗口。

    *   更小的App图标，以便在每页放置更多应用程序，并在主屏幕上提供可定制的`Widget`区域。

    *   **Support for a Bluetooth Mouse**: 此功能隐藏在`iPadOS`的`Accessibility` ➤ `Touch`区域中，如图[4-24](#492151_1_En_4_Chapter.xhtml#Fig24)所示。当您听到**鼠标支持**时，您不会得到像传统鼠标那样的指针，因为它启用的是Apple的蓝牙`pointer
    tool`，在屏幕上看起来像一个斑点。移动不够流畅，最好将其用作一种**辅助功能**，而不是让您的iPad像台式电脑一样工作的方式。


    ### Shared iPad


    最后，讨论`iPadOS`不能不提`Shared iPad`功能，它允许多个用户在共享设备上拥有唯一的登录账户。这与在`macOS`上拥有多个用户账户非常相似，但有一个巨大的例外——此功能仅限于Apple的**教育客户**。如果您在学术环境中支持一推车共享的`iPad`，启用`Shared
    iPad`可能会带来巨大的优势。


    要使用`Shared iPad`，学术组织必须能够访问`Apple School Manager`。使用`Apple School Manager`，系统管理员将为每个学生创建特殊的`Managed
    Apple IDs`。使用`Apple School Manager`，您可以将设备准备为`Shared iPad`，从而在设备上启用远程监控和多用户支持。所有学生的数据都存储在机构账户下的`Managed
    Apple ID`内的`iCloud`中。


    Pro Tip

    `Apple Classroom app`的各种功能和`Shared iPad`超出了本书的范围。如果您是教育工作者，对`Apple School Manager`和`Shared
    iPad`感兴趣，请咨询您所在机构的Apple代表以获取更多信息。


    ## Summary


    在本章中，我们通过配置限制、网络服务和Apple账户，为管理iOS设备奠定了基础。正如您所注意到的，逐个设置iOS设备配置可能非常耗时且容易出错。在下一章中，我们将探索`Apple
    Configurator`工具，并学习如何使用`Blueprints`和`Profiles`来配置数百或数千台设备。


    # 5. Managing Devices with Apple Configurator


    在第[4](#492151_1_En_4_Chapter.xhtml)章中，我们探讨了在设备本身上以交互方式限制或配置iOS设备的多种方法。正如您所体验到的，如果您需要配置的设备超过少数几台，这种手动方法可能会出现问题。幸运的是，我们有`Apple
    Configurator`等工具帮助我们自动化大部分流程。


    在本章中，我们将在`Apple Configurator`中使用几个示例设备，并为部署准备iOS设备制定本地工作流。在此过程中，您将接触到我们将在本书其余部分使用的许多概念，包括`Configuration
    Profiles`、`Mobile Device Management`、设备`supervision`等。'
  raw: '### Apple ID


    The *Apple ID* is the main account you will need to use an iOS device. Apple IDs
    are free and can be configured using any email address, even one from competitors
    like Microsoft or Google. To create an *Apple ID*, your users simply need to go
    to [`http://appleid.apple.com`](http://appleid.apple.com) and register for one.
    You can also register for an *Apple ID* in many areas of *iOS* that require a
    sign-in to enable a service, like the *App Store*. Education or business customers
    can also have *institutional Apple IDs* created, and we will cover those in greater
    detail in Chapter [8](#492151_1_En_8_Chapter.xhtml). Apple IDs are used for enabling
    any number of Apple services including *iMessage*, *FaceTime*, and the *App Store*.


    ### iCloud Account


    The *iCloud* account is often confused with the *Apple ID* because you can, and
    typically do, sign up for *iCloud* services using your *Apple ID* username. However,
    these are actually separate accounts. *iCloud* services generally involve synchronizing
    data between various Apple devices including *Documents*, *Messages*, *Contacts*,
    *Calendar*, *Safari* bookmarks, and more. *iCloud* also enables services like
    *Find My iPhone*, *Activity Sharing* (when paired with an *Apple Watch*), and
    *iCloud Keychain*.


    ### App Store Account


    The third account is the *App Store* account, which is an *Apple ID* that has
    been registered with a **payment method** and can be used to purchase and install
    Apps from the *App Store*. While the *iCloud* account is a personal account, the
    *Apple ID* used with the *App Store* could be shared with others in your family
    or organization. You can sign into the *App Store* with an *Apple ID* manually
    through ***Settings*** *app* ➤ ***iTunes & App Store*** and then click the **Sign
    In** button to log in as shown in Figure [4-23](#492151_1_En_4_Chapter.xhtml#Fig23).


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig23_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig23_HTML.jpg)


    Figure 4-23


    Sign-in screen for the iTunes Store & App Store in iOS 13


    Please be aware that unless you plan to share the account credentials with all
    of your organization’s users, a shared *App Store* account may not be a good idea.
    When you purchase and install an App on the iOS device using a shared *App Store*
    account, the next time that the app needs to update, it will prompt your user
    to enter the password for the shared account. If they do not know the password,
    they can lock the App Store account or request a password reset, which may cause
    problems for other devices that are also configured using the shared account.
    If you disclose the password to the end users, then they could potentially make
    unauthorized purchases and bill your account.


    Fortunately, Apple has implemented two solutions to get around these issues with
    the *App Store* while allowing organizations to purchase Apps centrally and manage
    them across many devices. The first solution is for consumers, and that is called
    *Family Sharing*. Family Sharing allows each family member to have their own *App
    Store* account but access a pool of shared Apps purchased by anyone in the family.
    The other solution, for education and business customers, is to use Apple’s *Volume
    Purchase Program* (VPP) where Apps are purchased and then assigned to any number
    of unique Apple IDs that are associated with users who are members of the organization.
    VPP is covered in greater detail in Chapter [8](#492151_1_En_8_Chapter.xhtml).


    ## iPadOS


    When the *iPad* was first released, one of the few criticisms of the device was
    that it was essentially a large *iPhone* due to the fact that it ran *iOS* and
    not *macOS* (or another kind of desktop operating system). Over the past few releases
    of *iOS*, Apple has continued to provide special *iPad-only* capabilities like
    **side-by-side app multitasking** and support for the *Apple Pencil* stylus. Starting
    with iOS 13, Apple has decided to bundle all of the iPad-only features under one
    moniker—*iPadOS*.


    While the underlying operating system is still *iOS*, the following features are
    unique to the *iPad* and are only found in the *iPadOS* subset of iOS 13:


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig24_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig24_HTML.jpg)


    Figure 4-24


    Device’s accessibility feature to enable mouse support in iPadOS


    *   **Removable Media Support**: The **Files** App not only allows you to browse
    in the macOS-like **Column** view, but it provides access to create and organize
    your data into folders; and if you insert a USB disk via a Lightning or USB-C
    adapter, you can also move data to/from removable media.


    *   Enhanced support for Apple Pencil.


    *   Desktop-class Safari browser.


    *   Enhanced multitasking including **Slide Over** windows and multiple **Split
    View** windows from the same App on screen at once.


    *   Smaller App icons to make room for more Apps per page and a customizable **Widget**
    area on the Home Screen.


    *   **Support for a Bluetooth Mouse**: This feature is hidden in the ***Accessibility***
    ➤ ***Touch*** area of *iPadOS* as shown in Figure [4-24](#492151_1_En_4_Chapter.xhtml#Fig24).
    You do not get a pointer as you would expect when you hear *mouse support* because
    what it enables is Apple’s Bluetooth **pointer tool** which looks like a blob
    on the screen. The movement is less than smooth, and it is best used as more of
    an **accessibility** feature than a way to make your iPad work like a desktop
    computer.


    ### Shared iPad


    Finally, no discussion of *iPadOS* would be complete without mentioning the **Shared
    iPad** feature, which allows multiple users to have unique logins on a shared
    device. This is very similar to having multiple user accounts on *macOS*, but
    with one huge exception—this feature is limited to Apple’s *education customers
    only*. If you are supporting carts full of shared *iPads* in an academic environment,
    enabling Shared iPad could be a big win.


    To use Shared iPad, the academic organization must have access to *Apple School
    Manager*. Using Apple School Manager, the system administrator would create special
    *Managed Apple IDs* for each student. Using Apple School Manager, you prepare
    your device as a Shared iPad which enables remote monitoring and multi-user support
    on the device. All of the students’ data is stored in *iCloud* under the Managed
    Apple ID within that institution’s account.


    Pro Tip


    The various features of the *Apple Classroom app* and Shared iPad are outside
    of the scope of this book. If you are an educator who is interested in Apple School
    Manager and Shared iPad, please consult your institution’s Apple representative
    for more information.


    ## Summary


    In this chapter, we laid the groundwork for managing iOS devices by configuring
    restrictions, network services, and Apple accounts. As you have noticed, setting
    up iOS device configurations one at a time can be pretty time consuming and error
    prone. In the next chapter, we will explore the *Apple Configurator* tool and
    how to use it to configure hundreds or thousands of devices using *Blueprints*
    and *Profiles*.


    # 5. Managing Devices with Apple Configurator


    In Chapter [4](#492151_1_En_4_Chapter.xhtml), we explored the various ways to
    restrict or configure iOS devices interactively on the units themselves. As you
    have experienced, this manual approach can be problematic if you have more than
    a handful of devices to configure. Fortunately, we have tools like *Apple Configurator*
    that help us automate much of this process.


    In this chapter, we will work with a couple of sample devices in Apple Configurator
    and develop a local workflow for preparing iOS devices for deployment. Along the
    way, you will be introduced to many concepts that we will use throughout the rest
    of this book including *Configuration Profiles*, *Mobile Device Management*, device
    *supervision*, and more.'
  trans: '

    ## Apple ID


    `Apple ID` 是使用 iOS 设备所需的主要账户。`Apple ID` 是免费的，可以使用任何电子邮件地址进行配置，甚至可以来自微软或谷歌等竞争对手的邮箱。要创建
    `Apple ID`，您的用户只需访问 [`http://appleid.apple.com`](http://appleid.apple.com) 并注册即可。您也可以在
    `iOS` 中许多需要登录才能启用服务的区域注册 `Apple ID`，例如 `App Store`。教育或商业客户还可以创建**机构 Apple ID**，我们将在第
    8 章中详细介绍。`Apple ID` 用于启用多种 Apple 服务，包括 `iMessage`、`FaceTime` 和 `App Store`。


    ## iCloud 账户


    `iCloud` 账户经常与 `Apple ID` 混淆，因为您可以使用 `Apple ID` 的用户名注册 `iCloud` 服务，并且通常也会这样做。然而，这实际上是两个独立的账户。`iCloud`
    服务通常涉及在包括 `文稿`、`信息`、`通讯录`、`日历`、`Safari` 书签等各种 Apple 设备之间同步数据。`iCloud` 还启用了诸如 `查找我的
    iPhone`、`活动共享`（与 `Apple Watch` 配对时）和 `iCloud 钥匙串`等服务。


    ## App Store 账户


    第三种账户是 `App Store` 账户，这是一个已注册**付款方式**的 `Apple ID`，可用于从 `App Store` 购买和安装应用程序。虽然
    `iCloud` 账户是个人账户，但用于 `App Store` 的 `Apple ID` 可以与您的家庭或组织中的其他人共享。您可以通过 `设置` 应用程序
    ➤ `iTunes 与 App Store` 手动使用 `Apple ID` 登录 `App Store`，然后点击**登录**按钮登录，如图 4-23 所示。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig23_HTML.jpg](img/492151_1_En_4_Fig23_HTML.jpg)


    图 4-23

    iOS 13 中的 iTunes Store 和 App Store 登录界面


    请注意，除非您计划与组织中的所有用户共享账户凭据，否则共享的 `App Store` 账户可能不是一个好主意。当您使用共享的 `App Store` 账户在
    iOS 设备上购买并安装应用程序时，下次该应用程序需要更新时，它会提示您的用户输入共享账户的密码。如果他们不知道密码，可能会锁定 `App Store` 账户或请求重置密码，这可能会给其他同样配置了共享账户的设备带来问题。如果您将密码透露给最终用户，他们可能会进行未经授权的购买，并记在您的账户上。


    幸运的是，Apple 已实施两种解决方案来解决 `App Store` 的这些问题，同时允许组织集中购买应用程序并在多台设备上进行管理。第一种解决方案针对消费者，称为**家人共享**。**家人共享**允许每个家庭成员拥有自己的
    `App Store` 账户，但可以访问家庭中任何人购买的共享应用程序库。另一种解决方案针对教育和商业客户，是使用 Apple 的**批量购买计划**（`VPP`），其中应用程序被购买并分配给与组织成员相关联的任意数量的唯一
    `Apple ID`。`VPP` 在第 8 章中有更详细的介绍。


    ## iPadOS


    当 `iPad` 首次发布时，该设备受到的一个批评是它本质上是一个大号的 `iPhone`，因为它运行的是 `iOS` 而不是 `macOS`（或其他类型的桌面操作系统）。在过去的
    `iOS` 版本中，Apple 继续提供特殊的 `iPad 专用` 功能，如**并排应用多任务处理**和对 `Apple Pencil` 手写笔的支持。从
    iOS 13 开始，Apple 决定将所有专属于 iPad 的功能整合在一个统一的名称下——`iPadOS`。


    虽然底层操作系统仍然是 `iOS`，但以下功能是 `iPad` 独有的，仅在 iOS 13 的 `iPadOS` 子集中找到：


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig24_HTML.jpg](img/492151_1_En_4_Fig24_HTML.jpg)


    图 4-24

    iPadOS 中启用鼠标支持的设备辅助功能


    *   **可移动媒体支持**：`文件` 应用程序不仅允许您在类似 macOS 的 `分栏` 视图中浏览，还提供创建文件夹并组织数据的功能；如果您通过 Lightning
    或 USB-C 适配器插入 USB 磁盘，您还可以在可移动媒体之间传输数据。

    *   增强的 Apple Pencil 支持。

    *   桌面级 Safari 浏览器。

    *   增强的多任务处理，包括 `Slide Over` 窗口和同一应用程序在屏幕上同时显示多个 `分屏视图` 窗口。

    *   更小的 App 图标，以便在每页放置更多应用程序，并在主屏幕上提供可定制的 `小组件` 区域。

    *   **支持蓝牙鼠标**：此功能隐藏在 `iPadOS` 的 `辅助功能` ➤ `触控` 区域中，如图 4-24 所示。当您听到**鼠标支持**时，您不会得到像传统鼠标那样的指针，因为它启用的是
    Apple 的蓝牙**指针工具**，在屏幕上看起来像一个圆点。移动不够流畅，最好将其用作一种**辅助功能**，而不是让您的 iPad 像台式电脑一样工作的方式。


    ### 共享 iPad


    最后，讨论 `iPadOS` 不能不提 **共享 iPad** 功能，它允许多个用户在共享设备上拥有唯一的登录账户。这与在 `macOS` 上拥有多个用户账户非常相似，但有一个巨大的例外——此功能仅限于
    Apple 的**教育客户**。如果您在学术环境中支持一推车共享的 `iPad`，启用**共享 iPad** 可能会带来巨大的优势。


    要使用**共享 iPad**，学术组织必须能够访问 `Apple 校园教务管理`。使用 `Apple 校园教务管理`，系统管理员将为每个学生创建特殊的**受管理的
    Apple ID**。使用 `Apple 校园教务管理`，您可以将设备准备为**共享 iPad**，从而在设备上启用远程监控和多用户支持。所有学生的数据都存储在机构账户下的**受管理的
    Apple ID** 内的 `iCloud` 中。


    > 专业提示

    > `Apple Classroom app` 的各种功能和 `Shared iPad` 超出了本书的范围。如果您是教育工作者，对 `Apple School
    Manager` 和 `Shared iPad` 感兴趣，请咨询您所在机构的 Apple 代表以获取更多信息。


    ## 总结


    在本章中，我们通过配置限制、网络服务和 Apple 账户，为管理 iOS 设备奠定了基础。正如您所注意到的，逐个设置 iOS 设备配置可能非常耗时且容易出错。在下一章中，我们将探索
    `Apple Configurator` 工具，并学习如何使用 `蓝图` 和 `描述文件` 来配置数百或数千台设备。


    # 5. 使用 Apple Configurator 管理设备


    在第 4 章中，我们探讨了在设备本身上以交互方式限制或配置 iOS 设备的多种方法。正如您所体验到的，如果您需要配置的设备超过少数几台，这种手动方法可能会出现问题。幸运的是，我们有
    `Apple Configurator` 等工具帮助我们自动化大部分流程。


    在本章中，我们将在 `Apple Configurator` 中使用几个示例设备，并为部署准备 iOS 设备制定本地工作流。在此过程中，您将接触到我们将在本书其余部分使用的许多概念，包括
    `配置描述文件`、`移动设备管理`、设备**监管**等。

