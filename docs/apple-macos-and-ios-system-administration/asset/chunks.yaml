    # 9. 描述文件管理器


    虽然苹果的营销材料中并未过多提及，但苹果确实提供了自家的第一方移动设备管理（MDM）解决方案。`描述文件管理器`是包含在 `macOS 服务器`产品中的一项服务。对于中小规模的
    `macOS` 和 `iOS` 部署，它足以胜任工作，使得您的组织可能无需购买第三方的 MDM 方案。无论选择何种 MDM，其核心概念是相通的。本章我们将使用描述文件管理器来解释所有商业
    MDM 解决方案中都具备的基本功能。


    ## 描述文件管理器简介


    本章将继续第 7 章和第 8 章的内容。至此，您应该已经在 `macOS 服务器`上配置好了 `描述文件管理器`。它应该能够在公共互联网上访问，并且 DEP
    和 VPP 配置也已就绪。最后（也是最重要的），您的 `描述文件管理器`服务应正在使用来自受信任证书颁发机构的已签名证书。


    您还应在 Apple 校园教务管理/Apple 商务管理中，将至少两台测试设备分配至您的 MDM 服务器——一台 Mac 和一台 iOS 设备。完成所有设置后，从任意电脑上打开您选择的网页浏览器，并访问
    `https://yourdomain/profilemanager/`。例如，在我的例子中，我会像第 7 章末尾所做的那样，访问 `https://579testing.com/profilemanager`。使用您的服务器管理员账户登录以继续。


    > **专业提示**

    > 在生产环境中，您应在服务器上创建一个标准用户账户，并在网页上使用描述文件管理器时用该账户登录，而不是使用本地管理员账户。


    ### 描述文件管理器的用户界面


    首次登录描述文件管理器时，满屏的复选框、选项卡和列表可能会让人有些不知所措。图 9-1 和随附的项目列表简要概述了所有这些界面元素的功能。本章我们将通过一些实际操作练习，与其中的大多数选项进行交互。


    ![图 9-1](img/492151_1_En_9_Fig1_HTML.jpg)

    *图 9-1 描述文件管理器用户界面*


    *   **iOS 设备占位符：** 这是运行 `iOS` 但尚未连接到您的 MDM 且当前未被管理的设备。

    *   **Mac 设备占位符：** 这是运行 `macOS` 但尚未连接到您的 MDM 且当前未被管理的设备。

    *   **占位符指示器：** 此指示器表明该设备记录仅仅是一个占位符。一旦我们在设备上安装了 `注册描述文件`并且设备已向 MDM 报到，此消息就会消失。

    *   **添加/移除占位符：** 允许您根据序列号、UDID、IMEI 和 MEID 手动为任何设备创建占位符。

    *   **搜索设备字段：** 允许您在您的所有设备中搜索特定的一台。

    *   **设备信息：** 所选设备的快速摘要，包括名称和序列号。

    *   **设备配置和分配选项卡：** 这是我们将特定 `配置描述文件` 载荷、App 和图书分配给所选设备的区域。

    *   **当前用户：** 指示当前登录 `描述文件管理器` 网站的用户。点击此按钮会显示其他账户选项，包括注销。

    *   **保存/恢复更改按钮：** 允许您保存并应用配置更改，或取消您所做的更改。

    *   **操作按钮：** 此按钮允许您向受管设备发送命令。一些较常见的操作包括 `清除激活锁`、`获取设备位置`、`清除密码`、`抹掉` 和 `锁定`。可供您使用的操作取决于设备类型（`iOS`
    与 `macOS`）以及是否受监督。

    *   **设备列表刷新按钮：** `描述文件管理器` 会始终在后台通过 Apple 校园教务管理或 Apple 商务管理与 VPP 和 DEP 同步。点击此按钮会强制在服务之间立即同步数据。

    *   **添加/移除注册描述文件：** 这些按钮允许您创建或移除自定义的 `配置描述文件`，这些描述文件可以手动应用到系统上，以便将它们注册到您的 MDM
    中。

    *   **任务活动：** 提供当前任务的状态，并提供已应用到设备的任务历史记录。

    *   **用户或群组：** 按用户或群组管理设备设置、描述文件和 App。

    *   **设备或设备群组：** 按设备或设备群组管理设备设置、描述文件和 App。

    *   **App 和图书：** 用于添加或查看 VPP 授权，并可将其应用于用户、群组或设备的界面。


    ### 注册设置


    我们将在本章后面探索用户和群组区域，但在开始将设备注册到 MDM 之前，我们需要快速修改一个设置。点击描述文件管理器窗口左侧边栏中的 `群组` 按钮。点击
    `所有人` 群组，然后展开 `关于` 选项卡下的 `限制` 选项，以显示如图 9-2 所示的设置。请确保此示例中勾选的选项与您的设置匹配，特别是 `允许使用设备注册程序配置的设备在“设置助理”过程中进行注册`
    选项。我们需要此项设置到位，DEP 注册练习才能正常工作。如果您做了任何更改，请点击 `保存` 按钮来应用更改。


    ![图 9-2](img/492151_1_En_9_Fig2_HTML.jpg)

    *图 9-2 “所有人”群组的注册设置*


    > **专业提示**

    > 我还建议勾选 `将注册限制为占位符设备` 旁边的复选框，这样只有您已为其创建占位符的设备才真正能够注册。这将有助于设备管理，并防止不受控的设备出现在您的
    `设备` 列表中。请记住，您的 `描述文件管理器` 实例可从公共互联网访问，因此如果未勾选此项，随机人员可能会自行注册。


    ## MDM 注册


    有几种方法可以将设备注册到您的 MDM 解决方案。注册过程基本上包括将 `配置描述文件` 应用到设备上，该描述文件会引导设备连接到您的特定 MDM。有多种方法可以实现这一点，您选择的方法将决定管理该设备时可用的设置、选项和安全级别。在本节中，我们将探讨四种最常见的方法，并分析每种方法的优缺点。

