- fmt: "# Provisioning iOS Devices Using Blueprints\n\nNow that you have used all\
    \ of the various options available to prepare devices with Apple Configurator,\
    \ it’s time to put it all together into one repeatable, semiautomatic workflow.\
    \ A *Blueprint*, as the name would suggest, is like a template for configuring\
    \ multiple devices from the same basic set of instructions. In this exercise,\
    \ we are going to create a Blueprint that will allow Apple Configurator to build\
    \ us an iOS device to our exact specification.\n\nWe want to start with a completely\
    \ clean test device, so if you haven’t already, go ahead and erase and restore\
    \ your test device. You can use **Settings** ➤ **Reset** ➤ **Erase All Content\
    \ and Settings** directly on the device, or if you still have it attached to Apple\
    \ Configurator, you can choose **Restore** from the **Actions** menu and the Configurator\
    \ will download the latest iOS release and apply it to the selected device.\n\n\
    ## Create a Blueprint\n\n1.  To get started with Blueprints, click the **Blueprints**\
    \ button on the toolbar and choose **Edit Blueprints** as shown in Figure [5-31](#492151_1_En_5_Chapter.xhtml#Fig31).\n\
    \n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig31_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig31_HTML.jpg)\n\
    \n    Figure 5-31\n\n    Enter the Blueprint Editor by choosing Edit Blueprints\
    \ in the toolbar\n\n2.  Once in the Blueprint Editor window, click the **New**\
    \ button in the bottom-left corner of the screen to create a new Blueprint. Name\
    \ the Blueprint “**Test Deployment**.” Your screen should look something like\
    \ Figure [5-32](#492151_1_En_5_Chapter.xhtml#Fig32).\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig32_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig32_HTML.jpg)\n\
    \n    Figure 5-32\n\n    Blueprints browser with the Test Blueprint document\n\
    \n3.  **Double-click** *Test Deployment Blueprint* to edit it. We can leave the\
    \ default Target as “**iPad, iPhone, and iPod touch**.” From this window, we can\
    \ load Apps, Profiles, or script Actions into the Blueprint. Think of this as\
    \ creating a *macro* in an office application like *Microsoft Word*. We are going\
    \ to define the steps that the computer will follow to prepare the device.\n\n\
    4.  Let’s add a couple of Actions first. Click the **Prepare** button in the toolbar\
    \ and step through the options we’ve set in the past. Click the **Prepare** button\
    \ at the end of the Assistant, and you should see a list of settings applied to\
    \ the *Setup* section of the Blueprint as shown in Figure [5-33](#492151_1_En_5_Chapter.xhtml#Fig33).\n\
    \n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig33_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig33_HTML.jpg)\n\
    \n    Figure 5-33\n\n    The list of options we defined in the Prepare action\n\
    \n5.  Next, we need to add some Apps. Click the **Apps** button in the left-side\
    \ pane *or* click the **Add** button in the toolbar and choose **Apps**. Select\
    \ a couple Apps like we did previously. I’m going to add *Word*, *Excel*, and\
    \ *PowerPoint* again, myself. Depending on the Apps you loaded, you will see the\
    \ storage bar fill up with some amount of data in use. In my case, it’s 788 MB\
    \ in use with those three Apps installed.\n\n6.  Up next, let’s add some Configuration\
    \ Profiles. Remember the three we created in a previous section? You should have\
    \ the *Secure Passcode*, *My Home Wi-Fi Settings*, and *Student Restrictions*\
    \ profiles ready to use. Click the **Add** button and choose **Profiles**. Select\
    \ the three Profiles and click the **Add** button. Your screen should look similar\
    \ to Figure [5-35](#492151_1_En_5_Chapter.xhtml#Fig35).\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig35_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig35_HTML.jpg)\n\
    \n    Figure 5-35\n\n    Adding the three Profiles we created previously to the\
    \ Blueprint\n\n7.  Next, let’s add some custom wallpaper. Like we did before with\
    \ a single device, click **Actions** menu ➤ **Modify** ➤ **Wallpapers**. Add some\
    \ custom images from your computer for the wallpaper and click the **Custom Text**\
    \ button and enter **“My Company’s”** + **Type** token. The result will say something\
    \ like **“My Company’s iPad”** or similar as shown in Figure [5-34](#492151_1_En_5_Chapter.xhtml#Fig34).\
    \ Click the **Apply** button, and you will see that the customizations we made\
    \ have been added to the Blueprint under the *Device* heading.\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig34_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig34_HTML.jpg)\n\
    \n    Figure 5-34\n\n    The customized wallpaper and lock screen previews\n\n\
    \    **Pro Tip** I like to use Apple’s built-in macOS wallpapers for stuff like\
    \ this. You can browse to `/Library/Desktop Pictures/`, and there are a number\
    \ of suitable wallpapers that will work for this exercise.\n\n8.  At this point,\
    \ we have created our Blueprint. Click the **Done** button in the bottom-right\
    \ corner of the Blueprint window to exit the Blueprint Editor and return to the\
    \ main Apple Configurator window. We now have a test Blueprint that we can apply\
    \ to our test iOS device.\n\n## Deploy a Blueprint\n\nNext up, it’s time to use\
    \ the Blueprint we created to provision our test iOS device.\n\n1.  If you haven’t\
    \ done so already, connect the test device to your Mac with the USB cable. In\
    \ the main Apple Configurator window, **click** the test device to select it.\n\
    \n2.  As outlined in Figure [5-36](#492151_1_En_5_Chapter.xhtml#Fig36), click\
    \ **Blueprints** and then select *Test Blueprint*. It will ask you to confirm\
    \ that you want to apply the Test Blueprint to the selected device. Click the\
    \ **Apply** button, and now you will see it run through the various steps we outlined.\
    \ This could take several minutes depending on the size of the Apps, if the device\
    \ needs to be updated, and so on.\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig36_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig36_HTML.jpg)\n\
    \n    Figure 5-36\n\n    Click the Blueprint we want to apply to the selected\
    \ device\n\n    **Pro Tip** You were probably prompted with a few consent messages\
    \ when the Mac was applying the Configuration Profiles. If you were going to go\
    \ into production with provisioning thousands of iOS devices, you would probably\
    \ want to remove the optional consent language by deleting the text in the Consent\
    \ Message field of the General payload so that you wouldn’t need to agree to the\
    \ alert every time the Blueprint runs. Ultimately, your goal should be an (mostly)\
    \ unattended provisioning process.\n\n3.  Once the Blueprint completes, **disconnect**\
    \ your test iOS device and step through the Setup Assistant to check your work.\
    \ Did you notice something different this time? If you applied the correct Wi-Fi\
    \ settings in the *Home Wi-Fi Profile* payload, it should have auto-joined your\
    \ wireless network and skipped the prompt about connecting to a wireless network.\
    \ *Cool!*\n\nOnce you have made it to the Home Screen, test a few things. Your\
    \ lock and home screens should look like those in Figure [5-37](#492151_1_En_5_Chapter.xhtml#Fig37).\
    \ Notice how we have the Apps pre-loaded and our security settings have disabled\
    \ the Camera and Messages Apps? Those are examples of the restrictions we enabled\
    \ in the Student Restrictions Configuration Profile. *Pretty neat!*\n\n![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig37_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig37_HTML.jpg)\n\
    \nFigure 5-37\n\nThe completed configuration of my test iPad\n\n## Pro Tip\n\n\
    We would call this testing process *configuration validation*. If you are testing\
    \ this Blueprint for use in a mass deployment scenario, be sure to show this test\
    \ device to all of your stakeholders so they can review and sign off on the end\
    \ result before using the Blueprint to stage hundreds or thousands of devices."
  raw: '## Provisioning iOS Devices Using Blueprints


    Now that you have used all of the various options available to prepare devices
    with Apple Configurator, it’s time to put it all together into one repeatable,
    semiautomatic workflow. A *Blueprint* , as the name would suggest, is like a template
    for configuring multiple devices from the same basic set of instructions. In this
    exercise, we are going to create a Blueprint that will allow Apple Configurator
    to build us an iOS device to our exact specification.


    We want to start with a completely clean test device, so if you haven’t already,
    go ahead and erase and restore your test device. You can use **Settings** ➤ **Reset**
    ➤ **Erase All Content and Settings** directly on the device, or if you still have
    it attached to Apple Configurator, you can choose **Restore** from the **Actions**
    menu and the Configurator will download the latest iOS release and apply it to
    the selected device.


    Create a Blueprint


    1.  At this point, we have created our Blueprint. Click the **Done** button in
    the bottom-right corner of the Blueprint window to exit the Blueprint Editor and
    return to the main Apple Configurator window. We now have a test Blueprint that
    we can apply to our test iOS device.


    1.  Next, we need to add some Apps. Click the **Apps** button in the left-side
    pane *or* click the **Add** button in the toolbar and choose **Apps**. Select
    a couple Apps like we did previously. I’m going to add *Word*, *Excel*, and *PowerPoint*
    again, myself. Depending on the Apps you loaded, you will see the storage bar
    fill up with some amount of data in use. In my case, it’s 788 MB in use with those
    three Apps installed.


    2.  Up next, let’s add some Configuration Profiles. Remember the three we created
    in a previous section? You should have the *Secure Passcode*, *My Home Wi-Fi Settings*,
    and *Student Restrictions* profiles ready to use. Click the **Add** button and
    choose **Profiles**. Select the three Profiles and click the **Add** button. Your
    screen should look similar to Figure [5-35](#492151_1_En_5_Chapter.xhtml#Fig35).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig35_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig35_HTML.jpg)


    Figure 5-35


    Adding the three Profiles we created previously to the Blueprint


    1.  Next, let’s add some custom wallpaper. Like we did before with a single device,
    click **Actions** menu ➤ **Modify** ➤ **Wallpapers**. Add some custom images from
    your computer for the wallpaper and click the **Custom Text** button and enter
    **“My Company’s”** + **Type** token. The result will say something like **“My
    Company’s iPad”** or similar as shown in Figure [5-34](#492151_1_En_5_Chapter.xhtml#Fig34).
    Click the **Apply** button, and you will see that the customizations we made have
    been added to the Blueprint under the *Device* heading.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig34_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig34_HTML.jpg)


    Figure 5-34


    The customized wallpaper and lock screen previews


    **Pro Tip** I like to use Apple’s built-in macOS wallpapers for stuff like this.
    You can browse to **/Library/Desktop Pictures/,** and there are a number of suitable
    wallpapers that will work for this exercise.


    1.  **Double-click** *Test Deployment Blueprint* to edit it. We can leave the
    default Target as “**iPad, iPhone, and iPod touch**.” From this window, we can
    load Apps, Profiles, or script Actions into the Blueprint. Think of this as creating
    a *macro* in an office application like *Microsoft Word*. We are going to define
    the steps that the computer will follow to prepare the device.


    2.  Let’s add a couple of Actions first. Click the **Prepare** button in the toolbar
    and step through the options we’ve set in the past. Click the **Prepare** button
    at the end of the Assistant, and you should see a list of settings applied to
    the *Setup* section of the Blueprint as shown in Figure [5-33](#492151_1_En_5_Chapter.xhtml#Fig33).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig33_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig33_HTML.jpg)


    Figure 5-33


    The list of options we defined in the Prepare action


    1.  Once in the Blueprint Editor window, click the **New** button in the bottom-left
    corner of the screen to create a new Blueprint. Name the Blueprint “**Test Deployment**.”
    Your screen should look something like Figure [5-32](#492151_1_En_5_Chapter.xhtml#Fig32).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig32_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig32_HTML.jpg)


    Figure 5-32


    Blueprints browser with the Test Blueprint document


    1.  To get started with Blueprints, click the **Blueprints** button on the toolbar
    and choose **Edit Blueprints** as shown in Figure [5-31](#492151_1_En_5_Chapter.xhtml#Fig31).


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig31_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig31_HTML.jpg)


    Figure 5-31


    Enter the Blueprint Editor by choosing Edit Blueprints in the toolbar


    Deploy a Blueprint


    Next up, it’s time to use the Blueprint we created to provision our test iOS device.


    1.  Once the Blueprint completes, **disconnect** your test iOS device and step
    through the Setup Assistant to check your work. Did you notice something different
    this time? If you applied the correct Wi-Fi settings in the *Home Wi-Fi Profile*
    payload, it should have auto-joined your wireless network and skipped the prompt
    about connecting to a wireless network. *Cool!*


    1.  If you haven’t done so already, connect the test device to your Mac with the
    USB cable. In the main Apple Configurator window, **click** the test device to
    select it.


    2.  As outlined in Figure [5-36](#492151_1_En_5_Chapter.xhtml#Fig36), click **Blueprints**
    and then select *Test Blueprint*. It will ask you to confirm that you want to
    apply the Test Blueprint to the selected device. Click the **Apply** button, and
    now you will see it run through the various steps we outlined. This could take
    several minutes depending on the size of the Apps, if the device needs to be updated,
    and so on.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig36_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig36_HTML.jpg)


    Figure 5-36


    Click the Blueprint we want to apply to the selected device


    **Pro Tip** You were probably prompted with a few consent messages when the Mac
    was applying the Configuration Profiles. If you were going to go into production
    with provisioning thousands of iOS devices, you would probably want to remove
    the optional consent language by deleting the text in the Consent Message field
    of the General payload so that you wouldn’t need to agree to the alert every time
    the Blueprint runs. Ultimately, your goal should be an (mostly) unattended provisioning
    process.


    Once you have made it to the Home Screen, test a few things. Your lock and home
    screens should look like those in Figure [5-37](#492151_1_En_5_Chapter.xhtml#Fig37).
    Notice how we have the Apps pre-loaded and our security settings have disabled
    the Camera and Messages Apps? Those are examples of the restrictions we enabled
    in the Student Restrictions Configuration Profile. *Pretty neat!*


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig37_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig37_HTML.jpg)


    Figure 5-37


    The completed configuration of my test iPad


    Pro Tip


    We would call this testing process *configuration validation*. If you are testing
    this Blueprint for use in a mass deployment scenario, be sure to show this test
    device to all of your stakeholders so they can review and sign off on the end
    result before using the Blueprint to stage hundreds or thousands of devices.'
  trans: "\n# 使用蓝图配置 iOS 设备\n\n现在，你已经使用了 Apple Configurator 提供的所有选项来准备设备，是时候将它们整合到一个可重复、半自动化的工作流程中了。顾名思义，*蓝图*就像是一个模板，可以根据同一套基本指令配置多台设备。在本练习中，我们将创建一个蓝图，让\
    \ Apple Configurator 能够根据我们的精确规格为我们构建一个 iOS 设备。\n\n我们希望从一个完全干净（全新恢复）的测试设备开始。如果你还没有这样做，请继续并清除并恢复你的测试设备。你可以直接在设备上使用\
    \ **设置** ➤ **通用** ➤ **还原** ➤ **抹掉所有内容和设置**，或者如果你仍然将其连接到 Apple Configurator，可以从\
    \ **操作** 菜单中选择 **恢复**，Configurator 将下载最新的 iOS 版本并应用到所选设备。\n\n## 创建蓝图\n\n1.  要开始使用蓝图，请点击工具栏上的\
    \ **蓝图** 按钮，然后选择 **编辑蓝图**，如图 5-31 所示。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig31_HTML.jpg](img/492151_1_En_5_Fig31_HTML.jpg)\n\
    \n    图 5-31\n    通过在工具栏中选择“编辑蓝图”进入蓝图编辑器\n\n2.  进入蓝图编辑器窗口后，点击屏幕左下角的 **新建** 按钮以创建一个新蓝图。将蓝图命名为\
    \ **“测试部署”**。你的屏幕应该类似于图 5-32。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig32_HTML.jpg](img/492151_1_En_5_Fig32_HTML.jpg)\n\
    \n    图 5-32\n    包含“测试部署”蓝图文档的蓝图浏览器\n\n3.  **双击** *测试部署* 蓝图以进行编辑。我们可以保留默认的目标设备为\
    \ **“iPad、iPhone 和 iPod touch”**。在此窗口中，我们可以将 App、描述文件或脚本操作加载到蓝图中。可以将其想象成在 *Microsoft\
    \ Word* 这类办公应用程序中创建 *宏*。我们将定义计算机用来准备设备的步骤。\n\n4.  我们先添加几个操作。点击工具栏中的 **准备** 按钮，并逐步进行我们过去设置过的选项。在准备助手末尾点击\
    \ **准备** 按钮，你应该会看到一个设置列表，这些设置已应用到蓝图的 *设置* 部分，如图 5-33 所示。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig33_HTML.jpg](img/492151_1_En_5_Fig33_HTML.jpg)\n\
    \n    图 5-33\n    我们在“准备”操作中定义的选项列表\n\n5.  接下来，我们需要添加一些 App。点击左侧窗格中的 **App** 按钮*或*点击工具栏中的\
    \ **添加** 按钮并选择 **App**。像之前一样选择几个 App。我自己将再次添加 *Word*、*Excel* 和 *PowerPoint*。根据你加载的\
    \ App 不同，你将看到存储条被占用了相应大小的数据。在我的例子中，安装了这三个 App 后，已使用 788 MB。\n\n6.  接下来，让我们添加一些配置描述文件。还记得我们在前面章节创建的三个描述文件吗？你应该已准备好可用的\
    \ *安全密码*、*我的家庭 Wi-Fi 设置* 和 *学生限制* 描述文件。点击 **添加** 按钮并选择 **描述文件**。选择这三个描述文件并点击 **添加**\
    \ 按钮。你的屏幕应类似于图 5-35。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig35_HTML.jpg](img/492151_1_En_5_Fig35_HTML.jpg)\n\
    \n    图 5-35\n    将我们之前创建的三个描述文件添加到蓝图\n\n7.  接下来，让我们添加一些自定义壁纸。像之前处理单台设备一样，点击 **操作**\
    \ 菜单 ➤ **修改** ➤ **墙纸**。从你的计算机中添加一些自定义图片作为壁纸，点击 **自定文本** 按钮并输入 **“My Company’s”**\
    \ + **设备类型** 令牌。结果将显示类似 **“My Company’s iPad”** 或类似的内容，如图 5-34 所示。点击 **应用** 按钮，你将看到我们所做的自定义设置已添加到蓝图中的\
    \ *设备* 标题下。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig34_HTML.jpg](img/492151_1_En_5_Fig34_HTML.jpg)\n\
    \n    图 5-34\n    自定义壁纸和锁定屏幕预览\n\n    **专家提示** 我喜欢使用苹果 macOS 内置的墙纸来做这类事情。你可以浏览到\
    \ `/Library/Desktop Pictures/` 目录，那里有许多适合本练习的墙纸。\n\n8.  至此，我们已经创建了蓝图。点击蓝图窗口右下角的\
    \ **完成** 按钮退出蓝图编辑器，返回到 Apple Configurator 主窗口。现在我们有了一个可以应用到测试 iOS 设备的测试蓝图。\n\n\
    ## 部署蓝图\n\n接下来，是时候使用我们创建的蓝图来配置我们的测试 iOS 设备了。\n\n1.  如果尚未连接，请使用 USB 数据线将测试设备连接到你的\
    \ Mac。在 Apple Configurator 主窗口中，**点击** 测试设备以选中它。\n\n2.  如图 5-36 所示，点击 **蓝图**，然后选择\
    \ *测试蓝图*。它将要求你确认是否要将测试蓝图应用到所选设备。点击 **应用** 按钮，现在你将看到它执行我们概述的各个步骤。这可能需要几分钟，具体取决于\
    \ App 的大小、设备是否需要更新等等。\n\n    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig36_HTML.jpg](img/492151_1_En_5_Fig36_HTML.jpg)\n\
    \n    图 5-36\n    点击我们要应用到所选设备的蓝图\n\n    **专家提示** 当 Mac 应用配置描述文件时，你可能被提示了几个同意消息。如果你打算将配置数千台\
    \ iOS 设备的蓝图投入生产使用，你可能需要删除“通用”载荷中“同意消息”字段中的文本，以移除可选的同意语言，这样每次蓝图运行时就不需要同意警报了。最终，你的目标应该是实现一个（基本）无人值守的配置过程。\n\
    \n3.  蓝图完成后，**断开** 测试 iOS 设备的连接，并逐步完成设置助手以检查你的工作。你注意到这次有什么不同吗？如果你在 *家庭 Wi-Fi 配置文件*\
    \ 载荷中应用了正确的 Wi-Fi 设置，它应该会自动加入你的无线网络，并跳过了关于连接无线网络的提示。*很棒！*\n\n一旦进入主屏幕，测试几项内容。你的锁定屏幕和主屏幕应该看起来像图\
    \ 5-37 中的那样。注意到我们如何预装了 App，并且我们的安全设置禁用了相机和信息 App 了吗？这些是我们在“学生限制”配置描述文件中启用的限制的例子。*相当整洁！*\n\
    \n![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig37_HTML.jpg](img/492151_1_En_5_Fig37_HTML.jpg)\n\
    \n图 5-37\n我的测试 iPad 的完成配置\n\n## 专家提示\n\n我们会称这个测试过程为 *配置验证*。如果你正在测试此蓝图以用于大规模部署场景，请务必向所有相关方展示此测试设备，以便他们能够在使用蓝图部署数百或数千台设备之前，审查并确认最终结果。\n"
- fmt: '## Advanced Apple Configurator Tools


    Side loading, Blueprints, and Configuration Profiles are the main reasons for
    using Apple Configurator; and they are pretty powerful tools. But there are a
    few additional hidden features inside Configurator that may be useful to device
    administrators. This section provides a brief overview of these advanced tools
    and when you may want to use them.


    ### Single App Mode


    In the `Accessibility` settings in Chapter 4, we covered the `Guided Access` feature.
    `Single App Mode` in Apple Configurator is very similar in that it locks the device
    into only being able to be used with one App. To place a device into Single App
    Mode, ensure the App is installed and available on the iOS device and connected
    to Apple Configurator via a USB cable. Click `Actions` menu ➤ `Advanced` ➤ `Start
    Single App Mode` and select the App you wish to use to activate the feature.


    ### iOS Device Console


    Sometimes in the course of troubleshooting an issue with a device, application,
    or even third-party online service, it can be helpful to view the `device logs`.
    To view these logs, we need to use the `console`. To access the console, plug
    a device into Apple Configurator, `double-click` it, and then choose `Console`
    on the left-side pane. You should see the live logging output shown in Figure
    5-38.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig38_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig38_HTML.jpg)


    **Figure 5-38**

    Output from my test device’s console. Wow, Gmail is very chatty!


    ### Automator and Terminal Commands


    Apple Configurator’s Blueprints tool is pretty powerful for visually scripting
    macros to automate the configuration of devices, but if you want to step this
    up a notch, Apple also provides support for Automator and the optional `cfgutil`
    command. If you use `Automator`, you’ll find a number of new `Actions` that get
    installed along with Apple Configurator.


    To install the command line tool, choose `Install Automation Tools` from the `Apple
    Configurator 2` menu as shown in Figure 5-39.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig39_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig39_HTML.jpg)


    **Figure 5-39**

    Installing the optional command line tool


    For more information on `cfgutil`, you can use the `man cfgutil` command to read
    the manual. You can use `cfgutil` to write scripts to further automate the configuration
    of iOS devices.


    ### Device Information Export


    Apple provides two nifty features for exporting device data out of Configurator.
    As shown in Figure 5-40, if you are using some kind of internal enterprise App
    development, you can export data about devices in a format that easily can be
    uploaded to Apple’s developer portal to whitelist the devices to run these in-house
    Apps. You can also export the data you select about each device into a `∗.csv`
    that can be used for inventory management purposes.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig40_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig40_HTML.jpg)


    **Figure 5-40**

    Export data options for selected iOS devices


    ### Clearing Passcodes


    Passcodes can be problematic, particularly in an office or school environment
    where staff or student turnover is high. Apple provides an option through Configurator
    to embed an `unlock token` into an iOS device so that it can be unlocked at a
    future date if the passcode that was set by the user is not known. Please note
    that this functionality is only possible for devices that are `supervised`.


    To add an unlock token to the device, `click` the device to select it and then
    use `Actions` menu ➤ `Advanced` ➤ `Save Unlock Token` to apply it as shown in
    Figure 5-41. The unlock token can only be applied to a device that is currently
    unlocked, so you need to plan ahead if you want to use this functionality.


    ![../images/492151_1_En_5_Chapter/492151_1_En_5_Fig41_HTML.jpg](images/492151_1_En_5_Chapter/492151_1_En_5_Fig41_HTML.jpg)


    **Figure 5-41**

    Applying an unlock token to the selected device


    To unlock the supervised device, plug the device into Apple Configurator and `click`
    it to select it. Click `Actions` menu ➤ `Advanced` ➤ `Clear Passcode`.


    In addition to clearing the device passcode, you can also clear the `Screen Time`
    passcode on supervised devices. The Screen Time passcode can be set by the user
    and does not have to be the same as the device passcode. If you need to clear
    the Screen Time passcode, plug the device into Apple Configurator, select it from
    the list, and click `Actions` menu ➤ `Advanced` ➤ `Clear Screen Time Passcode`.


    **Pro Tip**

    If you are provisioning a lot of supervised devices that may need to be unlocked
    at some point in the future, you should edit your Blueprint to add the `Save Unlock
    Token` action so that it gets added automatically in the initial setup process
    every time.


    ### Revive Device


    Apple has provided this function for reviving Macs that use the `T2 Security chip`.
    As discussed in Chapters 2 and 3, the T2 chip integrates a number of different
    logic board components to provide for a level of hardware security that isn’t
    obtainable with software solutions alone. When the T2 chip has a problem, the
    entire system has a problem. Fortunately, if your T2 Mac is unresponsive, you
    may want to try to `revive` it using Apple Configurator. Apple provides instructions
    for doing so in a Knowledge Base article you can find here:


    *   [`https://support.apple.com/guide/apple-configurator-2/revive-firmware-in-mac-computers-apdebea5be51/mac`](https://support.apple.com/guide/apple-configurator-2/revive-firmware-in-mac-computers-apdebea5be51/mac)


    You should follow the specific instructions from Apple if you are going to attempt
    this. Each Mac with a T2 chip may have unique steps to follow depending on the
    model.


    ## Summary


    Apple Configurator is an excellent tool for automating the process of iOS device
    configuration. In this chapter, we learned how to create Blueprints that simplify
    and automate the setup of new devices. We also explored techniques that provide
    system administrators with powerful security controls in the form of supervision
    and Configuration Profiles.


    The primary downside to using Apple Configurator is that it still requires IT
    personnel to touch each device and physically plug them into a Mac at least once.
    Later in this book, we will introduce the concept of over-the-air configuration,
    which requires even less direct interaction to stage new devices. In the next
    couple of chapters, we are going back to the Mac to learn how to remote manage
    `macOS` clients and build a server to use for Mobile Device Management.


    # Managing macOS Clients with Apple Remote Desktop


    Apple Remote Desktop (ARD) is a fundamental client management tool that Mac system
    administrators have been using for over 15 years. In this chapter, we are going
    to review the four main components of ARD—asset management, software distribution,
    client administration, and remote support. If you have more than a couple `macOS`
    clients to manage, ARD is a must-have tool.'
