    Figure 2-8


    A folder called MyFolder is created on the Desktop


    Notice how there is no space in the folder name? Let’s make a new folder, but
    this time let’s put a space in between. At the command line, we cannot just make
    a space in the filename without being *explicit*. That means we either have to
    write `"My Folder"` using double quotation marks or we have to use a special character
    combination of a `\` (back-slash) and a space after to create a single space.


    Let’s try this by making two more folders.


    To create the first folder, we will use quotations marks. Use the same `mkdir`
    command and name the folder *Important Stuff* like this:


    ```

    mkdir "Important Stuff"

    ```


    Next, use `mkdir` and create a folder using the *back-slash space* method called
    *More Stuff* like this:


    ```

    mkdir More\ Stuff

    ```


    Your screen should look similar to the one in Figure [2-9](#492151_1_En_2_Chapter.xhtml#Fig9).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig9_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Terminal commands and the resulting folders


    Command Manuals


    Before we continue, let’s clean up our Desktop by removing all of these bogus
    folders we created in the previous exercise. The `rm` command is short for *remove.*
    Let’s use it to specify the folders we want to delete. Go ahead and enter this
    command like so:


    ```

    rm "More Stuff"

    ```


    What happens? You probably thought that this would delete the folder, but instead
    we get a cryptic message that says `rm: More Stuff: is a directory`. Clearly,
    we did something wrong. How do we find out what we did wrong or how to do it correctly?


    ***We read the freaking manual, of course!***


    This is a good opportunity to introduce you to `man` pages. Most commands have
    a *manual*, and you can view it right in the Terminal by typing `man` before the
    command. Let’s open the `man` page for the `rm` command. Enter the following command:


    ```

    man rm

    ```


    You can see in Figure [2-10](#492151_1_En_2_Chapter.xhtml#Fig10) that if we want
    to remove a directory, we must specify an argument of `-d` before the name of
    our directory. We are going to try this again, but first press the **q** key on
    the keyboard to exit the `man` page and go back to the command prompt.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig10_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    The man page shows the command options we need to know


    Now let’s try entering this:


    ```

    rm -d "More Stuff"

    ```


    Success! This will delete the folder as shown in Figure [2-11](#492151_1_En_2_Chapter.xhtml#Fig11).


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig11_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Removing directories using Terminal commands


    Go ahead and delete the other two folders using the same methodology, and when
    completed, you should have a clean Desktop again.


    Now that you are armed with the power of `man` pages, you will be unstoppable
    with the command line!


    ### Elevated Privileges


    If you have had some previous exposure to the Terminal, you have probably entered
    a command or two that started with `sudo`. This is a special command that invokes
    *elevated privileges*. Even if you are in the **admin** group on your Mac, you
    are still not the most privileged user on the system. That power belongs to the
    ***root*** user or ***super*** user.


    Some commands can only be run as the super user; and when that is the case, we
    need to use the `sudo` command, which is short for *super user do*. When you use
    a command that begins with `sudo`, you will be prompted to enter a password before
    the command will run. If you are the local admin on the Mac, the password will
    be the same one you use with your local user account. For example, in my case,
    the password for my ***dwsmith*** account is the same password for the super user.'
