    Users & Groups System Preference or not. For this example, I’ll leave the box
    **checked**. When your settings look similar to Figure [13-9](#492151_1_En_13_Chapter.xhtml#Fig9),
    click the **Save** button to apply the settings.


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig9_HTML.jpg](images/492151_1_En_13_Chapter/492151_1_En_13_Fig9_HTML.jpg)


    Figure 13-9


    Suppress all Setup Assistant prompts and automatically create a local Administrator
    account'
  trans: '

    ### 使用 DEP 创建占位符


    我们接下来的议程是将十台新的 Mac 添加到 Apple 校园教务管理/Apple 商务管理中的 Profile Manager MDM 群组。我有这些新机器包装盒上的十个序列号，因此我将登录管理器门户，使用
    `Device Assignments` 选项卡将这些设备分配给我的 MDM。正如我们在第 12 章中对 iPad 所做的那样，我们将用逗号分隔的序列号输入到
    `Choose Devices` 字段中；然后在 `Choose Action` 标题下，我们将选择 `Assign to Server` 并选择 `My
    Company''s MDM Server`，如图 13-4 所示。准备就绪后，点击 `Done` 按钮继续。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig4_HTML.jpg](img/492151_1_En_13_Fig4_HTML.jpg)


    图 13-4

    将十台新 Mac 分配给我们的 MDM


    分配处理完成后，退出管理器门户。打开 `Profile Manager` 并进入 `Devices` 视图。如果需要，点击 `refresh button`，确保所有新的
    Mac 都出现在 `Devices` 列表中，如图 13-5 所示。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig5_HTML.jpg](img/492151_1_En_13_Fig5_HTML.jpg)


    图 13-5

    强制与 DEP 同步后，新 Mac 应出现在我们的设备列表中


    ### 设置设备名称


    现在我们在 Profile Manager 中有了所有的 `Placeholders`，可以看到它们已使用一些基本产品信息作为默认名称。我们将对这些设备占位符的名称做一些更改，以便于在列表中识别它们。在
    `Devices` 视图中，逐个点击每个设备以选中它，然后点击视图右上角的临时名称来编辑名称。为我们的十台机器 `Assign a name`，使其与在 Active
    Directory 中创建新计算机记录时使用的名称相匹配。我将我的设备命名为 `101-01-2019MBP` 到 `101-10-2019MBP`。接下来，点击列表中每个设备的
    `Settings` 选项卡，勾选 `Set device named (supervised only)` 旁边的复选框，它应会自动填入占位符的新名称。


    ### 创建设备组


    我们将把所有这些 Mac 占位符设备添加到一个 `Device Group` 中。这将允许我们在群组级别配置设置，该群组中的每台 Mac 都将继承这些设置。点击
    Profile Manager 左侧边栏中的 `Device Groups` 按钮。点击页面中下部的 `+` 按钮，如图 13-6 所示，一个新的设备组将会出现。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig6_HTML.jpg](img/492151_1_En_13_Fig6_HTML.jpg)


    图 13-6

    添加一个新的设备组


    将此新组重命名为 `Design Team`，然后点击 `Save` 按钮应用名称更改。我们要做的第一件事是将占位符 Mac 记录分配给这个设备组。点击 `Design
    Team` 设备组以选中它，然后点击 `Members` 选项卡。点击页面右下角的 `+` 按钮，选择 `Add Devices`。在出现的对话框中，点击每个
    Mac 占位符右侧的 `Add` 按钮，如图 13-7 所示。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig7_HTML.jpg](img/492151_1_En_13_Fig7_HTML.jpg)


    图 13-7

    将十个 Mac 占位符添加到设计团队设备组中


    将设备添加到组中后，点击 `Done` 按钮，然后点击 `Save` 按钮。我们现在已成功创建了设备组。


    ### 配置 MDM 注册


    我们将从配置设备注册和设置助理设置开始。这里我们有一些 macOS 特有的选项。在设备组视图中，点击设计团队群组以选中它，然后点击设置选项卡。向下滚动到 `Enrollment
    Settings` 部分，其中列出了 `Enrollment during Setup Assistant`。勾选 `Prompt user to enroll
    device during Setup Assistant` 旁边的复选框。取消勾选要求注册凭证的选项，并确保 `Do not allow user to
    skip enrollment step` 已勾选。您的设置应如图 13-8 所示。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig8_HTML.jpg](img/492151_1_En_13_Fig8_HTML.jpg)


    图 13-8

    在设置助理期间配置 MDM 注册


    继续向下滚动到 `Setup Assistant Options` 区域。我们只关注此处复选框的前两个部分和最后一个部分，因为这些是唯一适用于 `macOS`
    的部分。这些是计算机在首次启动以及新最终用户的后续首次登录时，在设置助理期间会询问的提示。我们将选择禁止显示所有这些提示。`Uncheck` 此列表中的每个复选框。


    继续向下滚动到 `macOS Primary Account Setup` 部分。因为我们使用 Active Directory 来管理用户账户，所以我们不会在机器上创建本地标准用户。如果我们不使用网络用户账户，我们可以将其配置为提示用户创建自己的用户名/密码。就我们的目的而言，我们将取消勾选
    `Prompt user to create an account of type` 选项。


    不过，我们确实希望在系统上自动创建一个本地 `macOS` 管理员账户。请填写字段，以使用所需密码生成一个本地管理员用户。您可以选择是否在“用户与群组”系统偏好设置中列出此账户。在此示例中，我将保留该框为
    `checked` 状态。当您的设置看起来类似图 13-9 时，点击 `Save` 按钮以应用设置。


    ![../images/492151_1_En_13_Chapter/492151_1_En_13_Fig9_HTML.jpg](img/492151_1_En_13_Fig9_HTML.jpg)


    图 13-9

    禁止所有设置助理提示并自动创建本地管理员账户

