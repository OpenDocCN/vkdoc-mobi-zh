- fmt: '## Extra System Utilities


    As long as we are exploring the various System and Library folders, it makes sense
    to talk about a couple of additional utilities that are hidden inside of macOS
    that can be of great use to network and system administrators. Browse to `/System/Library/CoreServices/Applications/`
    and in this folder you will see a number of applications like `Archive Utility`,
    `DVD Player`, `Network Utility`, and `Wireless Diagnostics`.


    Some of these applications are accessible via other means in macOS, like the `Archive
    Utility`, `Wireless Diagnostics`, and `About This Mac`. Others are utilities from
    hardware that are no longer included as standard, like the `DVD Player` (my `MacBook`
    has no optical media). One utility in particular, `Network Utility`, is very useful
    and probably deserves to be promoted back into the `/Applications/Utilities` directory
    where it used to live in earlier versions.


    As seen in Figure [2-44](#492151_1_En_2_Chapter.xhtml#Fig44), the Network Utility
    features common tools such as `ping`, `nslookup`, `trace route`, and more. You
    may want to save this to your Dock, make an alias to it from the Utilities folder,
    or remember that you can use the `magnifying glass` in the top-right corner of
    the menu bar and search for the Network Utility by name when you need it.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig44_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig44_HTML.jpg)


    Figure 2-44


    Using the Network Utility to ping [www.​apple.​com](http://www.apple.com)


    ### Keychain Access


    No chapter on macOS client management would be complete without a discussion around
    the dreaded `keychain`! If you have done Mac support for any length of time, you
    have likely come across cryptic messages about the `login` keychain or other annoying
    keychain-related errors. What is the keychain, and why is it causing my users
    so much grief?


    The keychain can be managed through the `Keychain Access` utility found in `/Applications/Utilities`
    and it stores all of the various username and password combinations used on your
    Mac to access various web sites, secure applications, services, and wireless networks.
    It can also store certificates and encryption keys. There are several keychains
    on your Mac including `System`, `Local Items`, and `login`, and if you are signed
    in and have it activated, the `iCloud Keychain` can also play a role by synchronizing
    items across multiple Apple devices. Figure [2-45](#492151_1_En_2_Chapter.xhtml#Fig45)
    illustrates the Keychain Access application and the various keychains, passwords,
    certificates, and keys on my Mac.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig45_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig45_HTML.jpg)


    Figure 2-45


    Keychain Access data found in the login keychain


    While this seems pretty straightforward and innocuous, the problem with the keychain
    usually begins when a user has their password reset or changes it. After the password
    change, the next time the user logs in, they may be greeted with a dialog box
    prompting them to update their login keychain with the new password or create
    a new login keychain. Users being users, they will probably select the wrong option,
    skip this step, or won’t know their old password to be able to effectively update
    it, and now we have the notorious login keychain issue.


    If the user knows their old password, this is relatively easy to fix. Simply open
    `Keychain Access`, select the `login` keychain, then choose `Change Password for
    Keychain ‘login’` from the `Edit` menu. It will prompt for the old password and
    the new password, and then it will update the keychain accordingly.


    But what if the user doesn’t know the old password? In that case we must create
    a new login keychain. To do this, open `Keychain Access` and select `Preferences…`
    from the `Keychain Access` menu. In the Preferences dialog box, click the `Reset
    My Default Keychains` button as shown in Figure [2-46](#492151_1_En_2_Chapter.xhtml#Fig46).
    Please note that this will erase the `login` and `Local Items` keychains and replace
    them with new *default* ones. This means any passwords or entries stored in those
    keychains will be erased and the user will need to sign in again on various web
    sites and services to reestablish these keys.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig46_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig46_HTML.jpg)


    Figure 2-46


    Resetting the login and Local Items keychains


    ## Summary


    In this chapter, we covered a lot of ground. You should now be familiar with the
    basic file system and directory structure of macOS. You should be relatively comfortable
    using the Terminal. You have been able to create and manage a new local user account.
    Finally, you learned how to find and use powerful hidden applications and features.


    Apple’s macOS is a very powerful and feature-rich operating system that continues
    to grow and change with each new version. The focus on security and privacy has
    been the driving force behind many of the enhancements found in the latest releases.
    Because this is such an important and ever-changing topic, our next chapter is
    solely devoted to the latest security and privacy features found in macOS.


    # 3. macOS Security


    It is debatable if macOS is really more secure than Windows, but Apple has gained
    a reputation that a Mac is less susceptible to malware and privacy breaches than
    other platforms. Much of Apple’s security and privacy services have continued
    to evolve over the last several iterations of macOS, with Mojave and Catalina
    placing an even greater emphasis on `sandboxing` and `user acknowledgement`. This
    chapter explores both hardware and software security and privacy controls that
    Mac system administrators must be familiar with.


    ## Mac Hardware Security


    ### Basic EFI Boot Security


    Every modern Mac features extensible firmware interface (EFI) boot security through
    the use of a `pre-boot password`. Using the `Firmware Password Utility` or the
    `Startup Security Utility` (depending on the version of macOS being used), system
    administrators can lock down the ability for users to boot their Mac into a pre-boot
    environment without first entering a password. When you set an EFI password, you
    won’t normally see the password prompt through the normal use of the system. When
    a user attempts to boot the Mac into `recovery mode`, `network boot`, or `removable
    media boot`, the EFI will prompt for the password before proceeding. This locks
    the Mac into booting only from the internal hard disk’s operating system.


    To access the Firmware Password Utility or Startup Security Utility, you must
    first boot the Mac into recovery mode as outlined in Chapter [2](#492151_1_En_2_Chapter.xhtml)
    of this book. Once you are booted into the macOS Recovery environment, choose
    `Firmware Password Utility` or `Startup Security Utility` from the `Utilities`
    menu as shown in Figure [3-1](#492151_1_En_3_Chapter.xhtml#Fig1). Follow the prompts
    on screen to set the firmware password and then restart. Make sure that the password
    you set is something you will remember or is documented somewhere within your
    IT organization.


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig1_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Find the Startup Security Utility in macOS Recovery mode


    ```

    Pro Tip


    Be aware that setting the EFI password saves it to a persistent memory space on
    the Mac’s logic board. It is not easily reset, and according to Apple’s official
    documentation, the only authorized way to reset this password is to bring the
    computer to an Apple Retail Store or another Authorized Apple Repair facility
    to have the password reset.

    ```'
