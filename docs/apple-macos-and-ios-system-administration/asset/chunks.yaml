- fmt: "### macOS 用户界面\n\n如果你是 macOS 的完全新手，图 1-7 和图 1-8 及其附带的描述将帮助你快速熟悉操作系统，以执行本书中常见的许多任务。\n\
    \n![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig7_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig7_HTML.jpg)\n\
    \n图 1-7  \nmacOS 用户界面的常见组件\n\n*   **Apple 菜单：** 这是一个综合菜单，用于执行诸如注销、重启、访问`系统偏好设置`和最近使用的项目等操作。\n\
    *   **菜单栏：** macOS 中的菜单栏位于所有应用程序上方，并且会根据前台运行的应用程序动态变化。前台应用程序的名称会以**粗体**显示在`Apple\
    \ 菜单`的右侧。\n*   **Finder：** `macOS`的图形用户界面外壳，提供常见的操作系统功能和文件浏览器。\n*   **前往菜单：**\
    \ `Finder`中较为有用的菜单之一。它包含许多常见本地和网络资源的快捷方式。按住`option`键将可以访问隐藏的用户`Library`目录，该目录在客户端管理和故障排除中经常使用。\n\
    *   **键盘快捷键：** 只要可用，键盘快捷键都会显示在菜单项旁边。\n*   **Finder 工具栏：** 每个`Finder`窗口都包含当前目录的名称、可自定义的快捷按钮以及受交通灯启发的`关闭`、`最小化`和`最大化`按钮。在较新版本的操作系统中，绿色按钮会将前台应用程序切换到全屏模式。\n\
    *   **菜单栏附加项：** 各种应用程序和系统工具会提供这些图标，用于快速访问常用功能，如`VPN`、`Wi-Fi`和`音量控制`。按住`command`键，然后单击并拖动图标可以移动或移除其中一些图标。\n\
    *   **通知中心：** 点击此图标会滑出一个包含各种`小组件`的架子，这些小组件可以固定在此处以便快速访问。常见的小组件包括计算器、天气和`Apple\
    \ Music`。来自其他应用程序（如`Mail`或`Messages`）的通知也会显示在这里。你也可以切换`勿扰模式`的开/关，并且`夜览`控制也可用于帮助减少\
    \ Mac（支持此功能的机型）上蓝光的照射。\n*   **程序坞：** 程序坞包含所有正在运行的应用程序、应用程序快捷方式、最小化的窗口以及`废纸篓`。它提供了一种在多任务处理时快速轻松地在应用程序和文件之间切换的方法。可以使用`程序坞系统偏好设置`来重新定位、自动隐藏或调整程序坞的大小。\n\
    *   **应用程序快捷方式：** 指向实际应用程序（位于`/Applications`文件夹中）的符号链接。这些快捷方式提供了对最常用应用程序的快速访问。将图标拖到程序坞上或从程序坞拖走即可添加或移除它。\n\
    *   **最近使用的应用程序：** 在`macOS Catalina`中默认开启，程序坞有一个专门用于存储最近使用过的应用程序的区域。\n*   **文件夹/文件快捷方式：**\
    \ 与应用程序快捷方式类似，这些是指向存储在你硬盘驱动器其他地方的文件或文件夹的符号链接。当你需要快速访问常用文档时可以使用它。文件夹可以以堆栈、网格或菜单的形式查看。\n\
    *   **废纸篓：** 将文件或文件夹拖入`废纸篓`将准备删除它们。你可以使用 Apple 菜单下的命令或按住`control`键单击（按住`control`键并单击）或右键单击废纸篓并选择`清倒废纸篓`来清空废纸篓。\n\
    *   **文件浏览器：** `Finder`有三种视图：`图标`视图、`列表`视图和`分栏`视图。这些视图可帮助你浏览硬盘或其他连接介质上的文件夹和文件。\n\
    \n**Windows 管理员专业提示**\n\n刚开始熟悉 macOS 的 Windows 系统管理员可能会从以下这些可互换的概念中受益。\n\n*  \
    \ **控制面板：** 在`macOS`中，这被称为`系统偏好设置`，位于`Apple 菜单`下。\n*   **右键单击：** 你可以使用`鼠标`和/或`触控板系统偏好设置`来启用`辅助点按`。如果你使用的是单键鼠标，你也可以按住键盘上的`control`键并单击以模拟右键单击功能。图\
    \ 1-8 提供了有关`Finder`中上下文菜单选项的更多信息。\n*   **Control 键：** 在 macOS 中，常见的`control`键命令（如用于粘贴的`Ctrl+V`和用于复制的`Ctrl+C`）同样有效，但你必须使用`command`键，即键盘上空格键左侧的那个键。`option`和`alt`键在\
    \ Mac 和 Windows 之间也可互换，但使用频率较低。\n*   **任务管理器：** 如果你有一个行为不当的应用程序需要`结束任务`——在`macOS`中这被称为`强制退出`。你可以在`Apple\
    \ 菜单`中找到它，或者按键盘组合键`command+option+escape`。这将显示当前正在运行的应用程序列表，你可以选择一个并强制其退出。\n*\
    \   **Windows 资源管理器：** 在 macOS 中，这将是`Finder`。我个人更喜欢`分栏`视图或`列表`视图，如果你习惯使用`Windows\
    \ 资源管理器`，它们也是深入目录结构的一种分层方式。\n*   **任务栏：** 在`macOS`中，任务栏可能最类似于程序坞。我过去用过的一个技巧是在程序坞中创建一个指向`/Applications`文件夹的快捷方式，并选择将其显示为`列表`。这很好地模仿了`开始菜单`，以便快速浏览所有应用程序。\n\
    *   **属性：** 在`macOS`中，这被称为`显示简介`。当你选择任何文件或文件夹并从`文件`菜单或上下文菜单中选择`显示简介`时，Windows\
    \ 中`属性`对话框中的几乎所有内容都会显示出来。\n*   **回收站：** `macOS`中的`废纸篓`。功能几乎完全相同。\n*   **快捷方式：**\
    \ `macOS`中文件和应用程序的符号链接通常被称为`替身`。\n*   **映射网络驱动器：** 在`前往`菜单下，你可以选择`连接服务器`，这将允许你浏览网络以查找共享资源或输入特定资源的路径。在`macOS`中需要注意的一点是，输入完整路径时，应使用`正斜杠`（/）代替`反斜杠`（\\\
    ）。\n*   **运行：** 使用`macOS`菜单栏`菜单栏附加项`区域中的`聚焦`按钮，开始输入以搜索文件以及根据几个按键启动应用程序。\n*   **命令提示符：**\
    \ 要在`macOS`上打开命令行界面，请单击`Finder`中的`前往`菜单，选择`实用工具`，然后启动`终端`应用程序。\n*   **打印屏幕：**\
    \ 在`macOS`中，可以使用以下键盘组合键快速创建屏幕截图：`command+shift+3`。\n\n![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig8_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig8_HTML.jpg)\n\
    \n图 1-8  \nmacOS 完全支持右键单击功能"
  raw: '### macOS User Interface


    If you are completely new to macOS, Figures [1-7](#492151_1_En_1_Chapter.xhtml#Fig7)
    and [1-8](#492151_1_En_1_Chapter.xhtml#Fig8) and their accompanying descriptions
    will aid you in quickly navigating the operating system to perform many of the
    common tasks used throughout this book.


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig7_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig7_HTML.jpg)


    Figure 1-7


    Common components of the macOS UI


    *   **Apple Menu:** This is the catch-all menu for things like logging out, restarting,
    accessing *System Preferences*, and recent items.


    *   **Menu Bar:** The menu bar in macOS sits above all applications and dynamically
    changes depending on which application is in the foreground. The foreground application
    will have its name displayed in a **bold typeface** to the right of the *Apple
    menu*.


    *   **Finder:** The *macOS* GUI shell enabling common operating system functions
    and the file browser.


    *   **Go Menu:** One of the more useful menus in the *Finder*. It includes shortcuts
    to many common local and network resources. Holding down the **option** key will
    provide access to the hidden user ***Library*** directory which is often used
    in client administration and troubleshooting.


    *   **Keyboard Shortcut:** Whenever available, keyboard shortcuts are displayed
    next to the menu item.


    *   **Finder Toolbar:** Every *Finder* window includes the name of the current
    directory, customizable shortcut buttons, and the traffic light–inspired *close*,
    *minimize*, and *maximize* buttons. The green button puts the foreground application
    into full-screen mode in more recent versions of the OS.


    *   **Menu Extras:** Various applications and system utilities provide these icons
    for quick access to common features such as *VPN*, *Wi-Fi*, and *volume control*.
    Some of these can be rearranged or removed by holding down the ***command*** key
    and clicking and dragging the icon to move it or drag it off the menu.


    *   **Notification Center:** Clicking this icon will slide out a shelf of various
    *widgets* that can be pinned here for quick access. Common widgets include Calculator,
    Weather, and *Apple Music*. Notifications from other applications such as Mail
    or Messages will also appear here. You can also toggle *Do Not Disturb* on/off,
    and *Night Shift* controls are also available to help limit exposure to blue light
    on Macs that support this feature.


    *   **Dock:** The Dock contains all of the running applications, application shortcuts,
    minimized windows, and the *Trash Can*. It provides quick and easy access to switch
    between applications and files when multitasking. The Dock can be relocated, auto-hidden,
    or resized using the *Dock System Preference*.


    *   **Application Shortcut:** A symbolic link to the actual application that resides
    in the **/Applications** folder. These shortcuts provide quick access to applications
    that are used most often. Drag an icon on or off the Dock to add or remove it.


    *   **Recent Applications:** On by default in *macOS Catalina*, the Dock has a
    section devoted to storing the most recently used applications.


    *   **Folder/File Shortcut:** Like application shortcuts, these are symbolic links
    to files or folders that are stored elsewhere on your hard drive. Use this when
    you need quick access to commonly used documents. Folders can be viewed as a stack,
    a grid, or a menu.


    *   **Trash Can:** Dragging files or folders into the *Trash Can* will prepare
    them for deletion. You can empty the trash using the command under the Apple menu
    or ***control-clicking (holding the control key and clicking)*** or ***right-clicking***
    the Trash Can and selecting **Empty Trash**.


    *   **File Browser:** The *Finder* has three views—**Icon**, **List**, and **Column**
    views. These views help you navigate folders and files on your hard disk or other
    connected media.


    Windows Administrator Pro Tip


    Windows system administrators who are just becoming familiar with macOS may benefit
    from some of these interchangeable concepts.


    *   **Control Panel:** In *macOS,* this is called *System Preferences* and is
    found under the *Apple menu*.


    *   **Right-Click:** You can use the *mouse* and/or *Trackpad System Preference*
    to enable *secondary-click*. If you are using a one-button mouse, you can also
    hold the **control** key on the keyboard and click to mimic the right-click functionality.
    Figure [1-8](#492151_1_En_1_Chapter.xhtml#Fig8) provides more information on the
    contextual menu options in the *Finder*.


    *   **Control Key:** In macOS, the common **control** key commands like *Ctrl+V*
    for paste and *Ctrl+C* for copy will work but you must use the ***command*** key,
    which is the one to the left of the spacebar on the keyboard. Less often used
    but also interchangeable between Mac and Windows are the **option** and **alt**
    keys.


    *   **Task Manager:** If you have a misbehaving application and need to *end this
    task—*in *macOS* this is called **Force Quit**. You can find this in the **Apple
    menu** or by pressing the keyboard combination of **command+option+escape**. This
    will bring up a list of currently running applications, and you can select one
    and force it to quit.


    *   **Windows Explorer:** In macOS this would be the *Finder*. I personally prefer
    *Column view* or *List view* if you are used to *Windows Explorer* as those are
    also a hierarchical way to drill down into the directory structure.


    *   **Taskbar:** In *macOS* the Taskbar is probably most similar to the Dock.
    One trick that I have used in the past is to make a folder shortcut to the ***/Applications***
    folder in the Dock and choose to display it as a **List**. That does a nice job
    of mimicking the *Start menu* for quickly browsing all of your applications.


    *   **Properties:** In *macOS*, this is called *Get Info*. Nearly everything that
    you would find in the *Properties* dialog box in Windows is displayed when you
    select any file or folder and choose **Get Info** from the **File** menu or the
    contextual menu.


    *   **Recycle Bin:** The *Trash Can* in *macOS*. It functions nearly identically.


    *   **Shortcut:** Symbolic links to files and applications in *macOS* are typically
    referred to as an *alias*.


    *   **Map Network Drive:** Found under the **Go** menu, you can select ***Connect
    to Server,*** and that will allow you to browse the network for shared resources
    or enter a path to a specific resource. One thing to note in *macOS* is the *back-slash*
    (\) should be substituted with a *forward-slash* (/) when entering a full path.


    *   **Run:** Use the *Spotlight button* in the **Menu Extras** area of the *macOS*
    menu bar and start typing to search files as well as applications to launch based
    on a few keystrokes.


    *   **Command Prompt:** To open the command line interface on *macOS*, click the
    **Go** menu in the *Finder* and choose **Utilities** and then launch the Terminal
    application.


    *   **Print Screen:** Creating a quick screenshot in *macOS* can be done by using
    the following keyboard combination: **command+shift+3**.


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig8_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    The macOS fully supports right-click functionality'
  trans: '

    ### macOS 用户界面


    如果你是 macOS 的完全新手，图 1-7 和图 1-8 及其附带的描述将帮助你快速熟悉操作系统，以执行本书中常见的许多任务。


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig7_HTML.jpg](img/492151_1_En_1_Fig7_HTML.jpg)


    图 1-7

    macOS 用户界面的常见组件


    *   **Apple 菜单：** 这是一个综合菜单，用于执行诸如注销、重启、访问`系统偏好设置`和最近使用的项目等操作。

    *   **菜单栏：** macOS 中的菜单栏位于所有应用程序上方，并且会根据前台运行的应用程序动态变化。前台应用程序的名称会以**粗体**显示在`Apple
    菜单`的右侧。

    *   **Finder：** `macOS`的图形用户界面外壳，提供常见的操作系统功能和文件浏览器。

    *   **前往菜单：** `Finder`中较为有用的菜单之一。它包含许多常见本地和网络资源的快捷方式。按住`option`键将可以访问隐藏的用户`Library`目录，该目录在客户端管理和故障排除中经常使用。

    *   **键盘快捷键：** 只要可用，键盘快捷键都会显示在菜单项旁边。

    *   **Finder 工具栏：** 每个`Finder`窗口都包含当前目录的名称、可自定义的快捷按钮以及受交通灯启发的`关闭`、`最小化`和`最大化`按钮。在较新版本的操作系统中，绿色按钮会将前台应用程序切换到全屏模式。

    *   **菜单栏附加项：** 各种应用程序和系统工具会提供这些图标，用于快速访问常用功能，如`VPN`、`Wi-Fi`和`音量控制`。按住`command`键，然后单击并拖动图标可以移动或移除其中一些图标。

    *   **通知中心：** 点击此图标会滑出一个包含各种`小组件`的架子，这些小组件可以固定在此处以便快速访问。常见的小组件包括计算器、天气和`Apple
    Music`。来自其他应用程序（如`Mail`或`Messages`）的通知也会显示在这里。你也可以切换`勿扰模式`的开/关，并且`夜览`控制也可用于帮助减少
    Mac（支持此功能的机型）上蓝光的照射。

    *   **程序坞：** 程序坞包含所有正在运行的应用程序、应用程序快捷方式、最小化的窗口以及`废纸篓`。它提供了一种在多任务处理时快速轻松地在应用程序和文件之间切换的方法。可以使用`程序坞系统偏好设置`来重新定位、自动隐藏或调整程序坞的大小。

    *   **应用程序快捷方式：** 指向实际应用程序（位于`/Applications`文件夹中）的符号链接。这些快捷方式提供了对最常用应用程序的快速访问。将图标拖到程序坞上或从程序坞拖走即可添加或移除它。

    *   **最近使用的应用程序：** 在`macOS Catalina`中默认开启，程序坞有一个专门用于存储最近使用过的应用程序的区域。

    *   **文件夹/文件快捷方式：** 与应用程序快捷方式类似，这些是指向存储在你硬盘驱动器其他地方的文件或文件夹的符号链接。当你需要快速访问常用文档时可以使用它。文件夹可以以堆栈、网格或菜单的形式查看。

    *   **废纸篓：** 将文件或文件夹拖入`废纸篓`将准备删除它们。你可以使用 Apple 菜单下的命令或按住`control`键单击（按住`control`键并单击）或右键单击废纸篓并选择`清倒废纸篓`来清空废纸篓。

    *   **文件浏览器：** `Finder`有三种视图：`图标`视图、`列表`视图和`分栏`视图。这些视图可帮助你浏览硬盘或其他连接介质上的文件夹和文件。


    **Windows 管理员专业提示**


    刚开始熟悉 macOS 的 Windows 系统管理员可能会从以下这些可互换的概念中受益。


    *   **控制面板：** 在`macOS`中，这被称为`系统偏好设置`，位于`Apple 菜单`下。

    *   **右键单击：** 你可以使用`鼠标`和/或`触控板系统偏好设置`来启用`辅助点按`。如果你使用的是单键鼠标，你也可以按住键盘上的`control`键并单击以模拟右键单击功能。图
    1-8 提供了有关`Finder`中上下文菜单选项的更多信息。

    *   **Control 键：** 在 macOS 中，常见的`control`键命令（如用于粘贴的`Ctrl+V`和用于复制的`Ctrl+C`）同样有效，但你必须使用`command`键，即键盘上空格键左侧的那个键。`option`和`alt`键在
    Mac 和 Windows 之间也可互换，但使用频率较低。

    *   **任务管理器：** 如果你有一个行为不当的应用程序需要`结束任务`——在`macOS`中这被称为`强制退出`。你可以在`Apple 菜单`中找到它，或者按键盘组合键`command+option+escape`。这将显示当前正在运行的应用程序列表，你可以选择一个并强制其退出。

    *   **Windows 资源管理器：** 在 macOS 中，这将是`Finder`。我个人更喜欢`分栏`视图或`列表`视图，如果你习惯使用`Windows
    资源管理器`，它们也是深入目录结构的一种分层方式。

    *   **任务栏：** 在`macOS`中，任务栏可能最类似于程序坞。我过去用过的一个技巧是在程序坞中创建一个指向`/Applications`文件夹的快捷方式，并选择将其显示为`列表`。这很好地模仿了`开始菜单`，以便快速浏览所有应用程序。

    *   **属性：** 在`macOS`中，这被称为`显示简介`。当你选择任何文件或文件夹并从`文件`菜单或上下文菜单中选择`显示简介`时，Windows
    中`属性`对话框中的几乎所有内容都会显示出来。

    *   **回收站：** `macOS`中的`废纸篓`。功能几乎完全相同。

    *   **快捷方式：** `macOS`中文件和应用程序的符号链接通常被称为`替身`。

    *   **映射网络驱动器：** 在`前往`菜单下，你可以选择`连接服务器`，这将允许你浏览网络以查找共享资源或输入特定资源的路径。在`macOS`中需要注意的一点是，输入完整路径时，应使用`正斜杠`（/）代替`反斜杠`（\）。

    *   **运行：** 使用`macOS`菜单栏`菜单栏附加项`区域中的`聚焦`按钮，开始输入以搜索文件以及根据几个按键启动应用程序。

    *   **命令提示符：** 要在`macOS`上打开命令行界面，请单击`Finder`中的`前往`菜单，选择`实用工具`，然后启动`终端`应用程序。

    *   **打印屏幕：** 在`macOS`中，可以使用以下键盘组合键快速创建屏幕截图：`command+shift+3`。


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig8_HTML.jpg](img/492151_1_En_1_Fig8_HTML.jpg)


    图 1-8

    macOS 完全支持右键单击功能

    '
- fmt: '## Introduction to iOS


    Like `macOS`, there are many versions of `iOS`, and a new one is released every
    year. This book is going to focus primarily on `iOS 13`. Apple also maintains
    an `iOS` compatibility guide for iPhone and iPad for the two most recent operating
    systems.


    These can be found here:


    **iPhone:**

    *   [`https://support.apple.com/guide/iphone/supported-models-iphe3fa5df43/ios`](https://support.apple.com/guide/iphone/supported-models-iphe3fa5df43/ios)


    **iPad:**

    *   [`https://support.apple.com/guide/ipad/supported-models-ipad213a25b2/ipados`](https://support.apple.com/guide/ipad/supported-models-ipad213a25b2/ipados)


    To prolong the usable life of an `iOS` device, Apple will often make some features
    available to only the most recent hardware models. Please take special care to
    review the supported features in addition to the base operating system compatibility
    when planning an `iOS` upgrade to ensure that all of the required features are
    supported on the hardware your organization owns.


    Identifying the `iOS` device model is similar to identifying the Mac model information.
    From the Home Screen, tap `Settings` ➤ `General` ➤ `About` as shown in Figure
    [1-9](#492151_1_En_1_Chapter.xhtml#Fig9).


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig9_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig9_HTML.jpg)

    Figure 1-9

    The About screen on an iOS device


    ### iOS User Interface


    If you are completely new to `iOS`, Figures [1-10](#492151_1_En_1_Chapter.xhtml#Fig10)
    and [1-11](#492151_1_En_1_Chapter.xhtml#Fig11) will aid you in quickly navigating
    the operating system to perform many of the common tasks used in this book.


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig11_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig11_HTML.jpg)

    Figure 1-11

    The iPadOS Home Screen


    ![../images/492151_1_En_1_Chapter/492151_1_En_1_Fig10_HTML.jpg](images/492151_1_En_1_Chapter/492151_1_En_1_Fig10_HTML.jpg)

    Figure 1-10

    The iPhone Home Screen


    *   **Status Bar:** The area at the top of the `iOS` device that includes the
    clock and network indicator.

    *   **Notification Badge:** The badge is a red circle with a number indicating
    that the App needs attention.

    *   **App Icon:** Tapping the App icon will launch that application or wake it
    from background mode.

    *   **Page Control Indicator:** This indicates which navigation page you are on
    as you swipe from one screen to another. If you have multiple pages of icons,
    swiping the screen will navigate you to the next page.

    *   **App Shortcut:** Your most commonly used Apps can be placed here for quick
    access.

    *   **Widget:** Small applets that provide information about an App without having
    to open the entire thing, for example, the top news stories. In `iPadOS` this
    can be pinned to the Home Screen as seen in Figure [1-11](#492151_1_En_1_Chapter.xhtml#Fig11).

    *   **Home Screen Menu Bar (iPhone Only):** The location of App Shortcuts on the
    iPhone.

    *   **Dock (`iPadOS` Only):** The location of App Shortcuts as well as recent
    applications and files; it provides more of a `macOS` look and feel on the `iPad`.

    *   **Recent Applications (`iPadOS` Only):** Like in `macOS`, the `iPad` can now
    display the most recently used applications in the Dock.


    ## Summary


    Apple’s platforms have continued to change and evolve over the past several decades.
    Major changes in hardware architecture, operating system software, and device
    form factors have challenged our notion of what a computer should be. This book
    focuses primarily on the more recent `macOS` and `iOS` including `macOS Catalina`,
    `iOS 13`, and `iPadOS`.


    Navigating these operating systems could be familiar but also intimidating to
    users of other systems. If you are new to Apple’s platforms, I recommend spending
    some time exploring both `iOS` and `macOS` before going onto the next chapter
    so that you gain a working knowledge of how to interact with these platforms from
    an end-user perspective.


    # 2. macOS Client Administration


    In this chapter, we will explore the administration of a single Mac. Topics will
    include managing local user accounts, exploring the file structure of `macOS`,
    learning about the command line interface, and performing some basic hardware
    troubleshooting.


    ## Mac Hardware Troubleshooting


    Unlike most PC hardware manufacturers, Apple has always been quite particular
    about who they allow to repair their hardware. They enforce a comprehensive Authorized
    Repair Center process for third-party companies wishing to do repairs in addition
    to offering hardware repair services through their own Apple Retail Stores. That
    being said, there are limitations to how many hardware repairs most technicians
    can safely do themselves without voiding their warranties. As a Mac technician,
    it is important to know a few basic hardware troubleshooting techniques to try
    before setting up a `Genius Bar` appointment and hauling your Mac into the local
    Apple Retail Store.


    ### Nonvolatile Random-Access Memory (NVRAM)


    `Nonvolatile Random-Access Memory` (`NVRAM`), or `Parameter RAM` (`PRAM`) as it
    is sometimes referred to by long-time Mac users, is basically a small amount of
    memory on the logic board that stores information that doesn’t get erased when
    the computer powers down. It stores settings for volume levels, time zone, the
    display resolution, and your startup disk. While it does not happen very often,
    sometimes this memory can become corrupt; and by *zapping it* by using a keyboard
    combination found in Figure [2-1](#492151_1_En_2_Chapter.xhtml#Fig1), it will
    reset these settings to factory default. This is often the first step in troubleshooting
    a misbehaving Mac. It will typically solve issues related to time zones, slow
    boot times where it takes a long time before the Apple logo appears after powering
    on the Mac, or issues related to audio or the internal speakers.


    Pro Tip


    If you are using an `extensible firmware interface (EFI) password`, as detailed
    in Chapter [3](#492151_1_En_3_Chapter.xhtml), it is important to note that you
    will not be able to zap the `NVRAM` until after you remove the password. Once
    you have finished clearing the `NVRAM`, don’t forget to re-enable your password.'
