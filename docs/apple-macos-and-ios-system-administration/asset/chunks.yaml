- fmt: "# Munki Components\n\nThere are a number of components that `Munki` uses to\
    \ function on a client machine. All of the functionality of `Munki` resides on\
    \ the client software installed as part of `MunkiTools`. Later in this chapter,\
    \ we will install and configure `MunkiTools` on a test client so we can see it\
    \ in action. Before we do this, it is important to understand the main components\
    \ of the `Munki` client software:\n\n*   **Managed Software Center:** This is\
    \ a GUI utility that gets installed into the `/Applications` directory by the\
    \ `MunkiTools` package. This allows end users to select authorized software titles\
    \ and install them on their Macs without requiring local Administrative rights.\n\
    *   **Installer Items:** These are packages or disk images that reside on your\
    \ `Munki` server for applications that are to be installed and managed via the\
    \ `Munki` client or `Managed Software Center`.\n*   **Catalogs:** These are lists\
    \ of software that are imported into `Munki` by the administrator and include\
    \ metadata about how the application should be installed, scripts, and specific\
    \ settings. We will have a testing catalog of applications we are not ready to\
    \ install on end user systems and a production catalog for applications that are\
    \ approved for mass installation.\n*   **Manifests:** This is a list of what software\
    \ should be installed on a given machine. You can have a manifest for each machine,\
    \ location, or workgroup. In general, it is a best practice to have as few manifests\
    \ as possible to keep things simple and consistent.\n*   **Receipts:** While not\
    \ specific to `Munki`, when a package is installed on a Mac, a receipt is created.\
    \ `Munki` determines what needs to be installed vs. what is already installed\
    \ on the client workstation using receipts. If one exists for a given package,\
    \ `Munki` will not try to install it again.\n*   **Bill of Materials:** Like receipts,\
    \ the Bill of Materials is not unique to `Munki` and is created when a package\
    \ is installed. This is a list of components for a given software application\
    \ that `Munki` references to remove software and related dependencies during the\
    \ uninstall process.\n\n## Importing the MunkiTools Package\n\nThe first thing\
    \ we are going to do is import our first package into `Munki` from the command\
    \ line so we can see how this works. We can go ahead and start with the `MunkiTools`\
    \ package since it is conveniently sitting on our Desktop and ready to go.\n\n\
    ### Importing Our First Install Package\n\n1.  Start by opening the Terminal again\
    \ and at the command prompt enter `munkiimport` and then drag the `munkitools.pkg`\
    \ file from the Desktop and drop it into our command line. Your Terminal window\
    \ should look similar to Figure [10-17](#492151_1_En_10_Chapter.xhtml#Fig17).\n\
    \n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig17_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig17_HTML.jpg)\n\
    \n    Figure 10-17\n    Using the `munkiimport` command and the path to the `*.pkg`\
    \ file\n\n2.  Next, press enter to execute the `munkimport` command on our package\
    \ file. It will now start prompting us to edit or accept the default options through\
    \ the import command line utility. We will go into more detail on each of these\
    \ items when we package our other applications later in this chapter, but in the\
    \ meantime configure yours as follows:\n\n    If your Terminal window looks similar\
    \ to Figure [10-18](#492151_1_En_10_Chapter.xhtml#Fig18), go ahead and answer\
    \ `y` to the **Import this item?** prompt.\n\n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig18_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig18_HTML.jpg)\n\
    \n    Figure 10-18\n    Configuring the installer package using the `munkiimport`\
    \ command line utility\n\n    ```\n    Item name: munkitools\n    Display name:\
    \ MunkiTools\n    Description: Client software for the Munki service.\n    Version:\
    \ 3.6.4.3786\n    Category: Utilities\n    Developer: Open Source\n    Unattended\
    \ install: False\n    Unattended Uninstall: False\n    Catalogs: testing\n   \
    \ ```\n\n3.  When prompted to `Upload item` `to subdirectory path`, press enter\
    \ to accept the default.\n4.  When prompted to `Attempt to create a product icon?`,\
    \ answer `y` and press enter. You will see it output some text about importing\
    \ and copying the package to our server.\n5.  When it prompts you to `rebuild\
    \ the catalogs`, answer `y` and press enter. It will provide some output, and\
    \ if you take a look at your `munki_repo` share, you will see that a number of\
    \ new folders have now appeared as shown in Figure [10-19](#492151_1_En_10_Chapter.xhtml#Fig19).\n\
    \n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig19_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig19_HTML.jpg)\n\
    \n    Figure 10-19\n    Our `munki_repo` directory after importing our first installation\
    \ package\n\nCongratulations! You have just imported your first installation package\
    \ into `Munki`.\n\n## Introduction to MunkiAdmin\n\nNow that we have a package\
    \ imported into `Munki` and a few folders have been created at the root of our\
    \ `munki_repo` directory, let’s open the `MunkiAdmin` application. When you open\
    \ `MunkiAdmin`, it is going to prompt us to point it to our `munki_repo` network\
    \ share. Browse to the share, click it to select it, and then click the **Open**\
    \ button as shown in Figure [10-20](#492151_1_En_10_Chapter.xhtml#Fig20).\n\n\
    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig20_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig20_HTML.jpg)\n\
    \nFigure 10-20\nWhen prompted by `MunkiAdmin`, point it to the SMB share of our\
    \ `munki_repo`\n\nOnce you have selected the `munki_repo` share, you’ll see the\
    \ main `MunkiAdmin` console interface with our `MunkiTools` package already in\
    \ the list.\n\nFigure [10-21](#492151_1_En_10_Chapter.xhtml#Fig21) and the following\
    \ descriptions will give you a quick reference to the `MunkiAdmin` interface.\n\
    \n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig21_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig21_HTML.jpg)\n\
    \nFigure 10-21\nThe `MunkiAdmin` interface\n\n*   **Package View:** The view that\
    \ lists all of the software packages imported into `Munki`.\n*   **Catalog View:**\
    \ The view that shows all of the Catalogs and allows us to manage our Catalogs.\n\
    *   **Manifest View:** The view that shows all of the Manifests and allows us\
    \ to manage our Manifests.\n*   **Open Repo:** Press this button to connect to\
    \ a specific `munki_repo` network share.\n*   **Save Changes:** Saves the changes\
    \ made to the current package, Catalog, or Manifest to the `munki_repo`.\n*  \
    \ **Reload Repo:** Refreshes the `MunkiAdmin` console after changes are saved\
    \ to the `munki_repo`.\n*   **View Package Properties:** Loads the dialog box\
    \ with all of the package install options.\n*   **Software Packages:** The list\
    \ of available software packages imported into `Munki`.\n*   **Quick Filters:**\
    \ This sidebar will populate based on the category or developer and will filter\
    \ your list of software packages based on that search criteria. For example, if\
    \ you wanted to isolate just the Adobe packages, you would click the Adobe developer\
    \ filter.\n\n# Packaging Software into Munki\n\nNow that our administrative workstation\
    \ is ready to go, we need to start packaging some software. `Munki` will support\
    \ importing and installing packages in the standard *macOS Installer* `∗.pkg`\
    \ format, `∗.dmg` disk image installation, and *Adobe CC* packages without any\
    \ special repackaging requirements. `Munki` can also create uninstall packages\
    \ as well, so you can use it to remove software when it is time to upgrade from\
    \ an old version to a new one.\n\n> Pro Tip\n> If you are experienced with software\
    \ installation on Microsoft Windows systems, you can think of Apple’s native `*.pkg`\
    \ installation packages as the *macOS* equivalent of a Microsoft `*.msi` setup\
    \ file."
