    the screenshot in Figure [4-13](#492151_1_En_4_Chapter.xhtml#Fig13).


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig13_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig13_HTML.jpg)


    Figure 4-13


    iPhone storage information and actionable options to free up space in iOS 13


    Apple provides useful recommendations for short-term and long-term storage savings.
    You can enable the **Offload Unused Apps** option to temporarily delete the Apps
    that you don’t use regularly. Then later on when you need to use them again, it
    will re-download them. Typically, when you delete an App manually on a device,
    it will remove any documents or settings associated with the App as well. When
    using Offload Unused Apps, it will retain that data instead.


    ## iOS Accessibility Features


    Similar to *macOS*, Apple has award-winning accessibility features for iOS devices
    built right into the operating system. If you or users in your organization can
    benefit from these assistive features, I recommend exploring the various vision,
    motor skills, and hearing accommodations to best understand how they work.


    In addition to these features, it is important to understand how to enable and
    disable the features in real time, as they can often change the way the device
    looks or performs. Figure [4-14](#492151_1_En_4_Chapter.xhtml#Fig14) shows the
    configuration settings for enabling the various accessibility features using a
    **triple-click** of the **Side** button (or **Home** button on devices with a
    physical Home button). You can tap on these technologies to enable them with a
    check mark and then tap and drag to adjust the priority in the list if you have
    more than one enabled. You can also access these settings through ***Settings***
    *app* ➤ ***Accessibility*** ➤ ***Accessibility Shortcut*** *in iOS 13.*


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig14_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig14_HTML.jpg)


    Figure 4-14


    Accessibility Shortcut options in iOS 13


    ### Guided Access


    The other feature tucked under the *Accessibility* settings that can be helpful
    in cases where you are using an iOS device as a kiosk or something similar is
    *Guided Access*. The Guided Access feature can be enabled in iOS 13 under ***Settings***
    ➤ ***Accessibility*** ➤ ***Guided Access***. When this is enabled, you can **triple-click**
    the **Home** (or **Side**) button in any App and lock the device into only using
    that App. You can also disable any auto-lock features after the device has been
    idle for some period of time. Figure [4-15](#492151_1_En_4_Chapter.xhtml#Fig15)
    shows an example of the Guided Access configuration settings on an iPad being
    used as a mobile ordering kiosk.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig15_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig15_HTML.jpg)


    Figure 4-15


    Guided Access options in iOS 13


    Pro Tip


    One additional feature of Guided Access is the ability to disable interaction
    with parts of the display when using a single App. For example, let’s say you
    want to use Guided Access with a web page in Safari. You may also want to disable
    the ability for the user to access the address bar or the ability to create new
    tabs, thus locking the user to a single web page. To do this, enable Guided Access
    on the web page you want to lock down, **triple-click** the Home button to access
    Guided Access options, and then **draw a circle** around the areas of the screen
    that you want to disable.


    ## Network Settings


    While there is not a specific network settings pane in *iOS*, the root of the
    ***Settings*** app provides access to Wi-Fi, Bluetooth, and cellular data (if
    the device supports it).


    ### Wi-Fi


    To configure wireless settings, you can tap the **Wi-Fi** button from the list
    near the top of the ***Settings*** app as shown in Figure [4-16](#492151_1_En_4_Chapter.xhtml#Fig16).
    The Wi-Fi settings will poll the network around you and display a list of available
    wireless networks. Tapping the button labeled **Other…** allows you to configure
    a hidden wireless network or preconfigure a wireless network that you want devices
    to automatically join after it’s deployed to an end user.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig16_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig16_HTML.jpg)


    Figure 4-16


    The Wi-Fi settings in iOS 13


    Tapping the little blue **“i”** button to the right of the wireless network allows
    you to configure specific wireless settings as shown in Figure [4-17](#492151_1_En_4_Chapter.xhtml#Fig17).
    You can configure your **TCP/IP** settings, **DNS** settings, and **HTTP Proxy**
    settings here. If you have already connected to a wireless network, you can tap
    the **Renew Lease** button to force a release and renew of the DHCP IP address
    lease or tap **Forget This Network** to disconnect from the network and not attempt
    to auto-join it again in the future.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig17_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig17_HTML.jpg)


    Figure 4-17


    Advanced Wi-Fi network options in iOS 13


    ### Cellular Data


    If your device supports *cellular data* , you can manage your data settings under
    ***Settings*** ➤ ***Cellular Data*** as shown in Figure [4-18](#492151_1_En_4_Chapter.xhtml#Fig18).
    Depending on your carrier and plan, you may have options here to enable a **Personal
    Hotspot**, where your iOS device shares your cellular data connection to other
    devices via Wi-Fi. You can toggle **Cellular Data on/off** to restrict data use
    to Wi-Fi only and conserve your plan’s data allowance when near wireless networks.
    Some carriers have various roaming options, Wi-Fi calling features, or other carrier
    services that can be accessed from this page. You can also scroll through the
    list of installed Apps and toggle their ability to use cellular data. This can
    be especially beneficial for users with limited data plans.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig18_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig18_HTML.jpg)


    Figure 4-18


    Cellular data options for a Verizon wireless device running iOS 13'
  trans: '

    # iOS 设备存储


    与 `macOS` 中的打包应用程序类似，`iOS` 也以单个 `App` 图标的形式包含 `App 包`。这些是沙盒化的应用程序环境，其可执行文件、偏好设置以及一个唯一的
    `文稿` 文件夹都包含在每个 `App` 内部。图 4-12 展示了 iOS 应用程序包的一般布局示意图。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig12_HTML.jpg](img/492151_1_En_4_Fig12_HTML.jpg)

    **图 4-12** 特定应用程序包中包含的各种文件夹和文件


    由于 iOS 设备主要是个人设备，其高像素摄像头会拍摄大量占用存储空间的照片和视频，再加上游戏和其他应用程序，磁盘空间似乎总是很紧张。幸运的是，`iOS`
    有一套非常完善的方法来跟踪设备上的存储空间使用情况，并以一种可操作的方式显示出来。如果你浏览到 `设置` 应用 > `通用` > `iPhone`（或 `iPad`）
    > `存储空间`，你将看到类似于图 4-13 截图所示的内容。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig13_HTML.jpg](img/492151_1_En_4_Fig13_HTML.jpg)

    **图 4-13** iOS 13 中的 iPhone 存储空间信息及可操作的释放空间选项


    苹果为短期和长期的存储空间节省提供了有用的建议。你可以启用 `卸载未使用的 App` 选项，以临时删除那些你不经常使用的应用程序。之后当你需要再次使用时，它会重新下载这些应用。通常，当你在设备上手动删除一个应用程序时，与该应用相关的任何文档或设置也会被移除。而使用
    `卸载未使用的 App` 时，它会保留这些数据。


    # iOS 辅助功能


    与 `macOS` 类似，苹果在 iOS 设备操作系统中内置了屡获殊荣的辅助功能。如果你或你所在组织的用户能从这些辅助功能中受益，我建议你探索各种视觉、运动技能和听觉方面的辅助选项，以最好地了解它们的工作原理。


    除了这些功能外，了解如何实时启用和禁用这些功能也很重要，因为它们常常会改变设备的外观或运行方式。图 4-14 展示了通过 `三击` `侧边` 按钮（或带有实体主屏幕按钮的设备上的
    `主屏幕` 按钮）来启用各种辅助功能的配置设置。你可以点击这些技术选项，用勾选标记来启用它们；如果启用了多个选项，还可以通过点击并拖动来调整它们在列表中的优先级。在
    iOS 13 中，你也可以通过 `设置` 应用 > `辅助功能` > `辅助功能快捷键` 来访问这些设置。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig14_HTML.jpg](img/492151_1_En_4_Fig14_HTML.jpg)

    **图 4-14** iOS 13 中的辅助功能快捷键选项


    ## 引导式访问


    在 `辅助功能` 设置下，还有一个功能在将 iOS 设备用作信息亭或类似用途时会很有帮助，那就是 `引导式访问`。`引导式访问` 功能可以在 iOS 13
    的 `设置` > `辅助功能` > `引导式访问` 下启用。启用后，你可以在任何应用程序中 `三击` `主屏幕`（或 `侧边`）按钮，将设备锁定为仅使用该应用程序。你还可以在设备闲置一段时间后禁用任何自动锁定功能。图
    4-15 展示了一个用作移动点餐台的 iPad 上的引导式访问配置设置示例。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig15_HTML.jpg](img/492151_1_En_4_Fig15_HTML.jpg)

    **图 4-15** iOS 13 中的引导式访问选项


    > 专业提示

    > `引导式访问` 的另一个附加功能是，当使用单个应用程序时，可以禁用与显示屏部分区域的交互。例如，假设你想将 `引导式访问` 用于 `Safari` 浏览器中的一个网页。你可能还希望禁用用户访问地址栏或创建新标签页的能力，从而将用户锁定在单一网页上。要做到这一点，请在你想要锁定的网页上启用
    `引导式访问`，`三击` `主屏幕` 按钮以访问 `引导式访问` 选项，然后在你想要禁用的屏幕区域周围 `画一个圈`。


    # 网络设置


    虽然 `iOS` 中没有特定的网络设置面板，但 `设置` 应用的根目录提供了对 `无线局域网`、`蓝牙` 和 `蜂窝网络`（如果设备支持）的访问。


    ## 无线局域网


    要配置无线设置，你可以点击 `设置` 应用顶部附近的列表中的 `无线局域网` 按钮，如图 4-16 所示。无线局域网设置会扫描周围的网络并显示可用无线网络列表。点击标有
    `其他...` 的按钮可以配置隐藏的无线网络，或者预配置一个无线网络，以便在设备部署给最终用户后自动加入该网络。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig16_HTML.jpg](img/492151_1_En_4_Fig16_HTML.jpg)

    **图 4-16** iOS 13 中的无线局域网设置


    点击无线网络右侧的蓝色小 `"i"` 按钮，可以配置特定的无线设置，如图 4-17 所示。你可以在这里配置 `TCP/IP` 设置、`DNS` 设置和 `HTTP
    代理` 设置。如果你已经连接到一个无线网络，可以点击 `续租` 按钮强制释放并续订 DHCP IP 地址租约，或者点击 `忽略此网络` 以断开与该网络的连接，并且未来不再尝试自动加入。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig17_HTML.jpg](img/492151_1_En_4_Fig17_HTML.jpg)

    **图 4-17** iOS 13 中的高级无线局域网网络选项


    ## 蜂窝网络


    如果你的设备支持 `蜂窝网络`，你可以在 `设置` > `蜂窝网络` 下管理你的数据设置，如图 4-18 所示。根据你的运营商和套餐，你可能在这里有启用 `个人热点`
    的选项，即你的 iOS 设备通过 `无线局域网` 将你的蜂窝网络数据连接共享给其他设备。你可以通过切换 `蜂窝网络 开/关` 来将数据使用限制在仅限无线局域网，从而在靠近无线网络时节省套餐的数据配额。一些运营商有各种漫游选项、无线局域网通话功能或其他运营商服务，可以从此页面访问。你还可以滚动浏览已安装应用程序的列表，并切换它们使用蜂窝网络数据的能力。这对于拥有有限数据套餐的用户尤其有益。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig18_HTML.jpg](img/492151_1_En_4_Fig18_HTML.jpg)

    **图 4-18** 运行 iOS 13 的 Verizon 无线设备的蜂窝网络选项

