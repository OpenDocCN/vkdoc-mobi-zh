  trans: "\n### 手动安装或使用安装脚本\n\n最后一种选择是手动创建并下载注册配置文件，然后在设备上交互式地安装它们。对于 Mac，可以使用 `Apple\
    \ Remote Desktop` 脚本完成；对于 iOS 设备，可以将其托管在内部网站上或通过电子邮件发送给最终用户。使用此方法的主要缺点是自动化程度最低，并且在\
    \ macOS 客户端的情况下，使用脚本会导致额外的交互操作，以启用用户批准的 MDM。\n\n## 使用注册配置文件添加设备\n\n1.  首先，我们需要创建注册配置文件。打开\
    \ `Profile Manager` 并单击 `+` 按钮 ➤ **新建注册配置文件**。命名注册配置文件，现在我们**取消选中占位符要求**，如图 9-26\
    \ 所示，这样任何安装此配置文件的设备都会被添加到我们的 MDM 中。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig26_HTML.jpg](img/492151_1_En_9_Fig26_HTML.jpg)\n\
    \n    图 9-26\n    创建新的注册配置文件\n\n2.  点击 `保存` 按钮，然后点击 `下载` 按钮以下载*注册配置文件*。它会将一个新的\
    \ `*.mobileconfig` 配置文件下载到您的 Mac。如果它尝试安装，请取消，然后将其从“下载”文件夹移出，放到桌面上。\n\n3.  接下来，我们需要下载一份*信任配置文件*的副本。单击\
    \ `Profile Manager` 窗口右上角的 `已登录用户` 按钮，选择 `下载信任配置文件`，如图 9-27 所示。同样，如果它尝试安装，请取消，然后将信任配置文件从“下载”文件夹拖到桌面。\n\
    \n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig27_HTML.jpg](img/492151_1_En_9_Fig27_HTML.jpg)\n\
    \n    图 9-27\n    将信任配置文件下载到桌面\n\n4.  现在您的桌面上应该有两个 `*.mobileconfig` 文件。一个是信任配置文件，以便我们添加的设备信任我们的\
    \ MDM 服务器；另一个是指引我们设备连接到 MDM 服务器的注册配置文件。这本质上与自助注册过程中安装的两个文件相同。\n\n5.  对于下一步，您应该有一台已添加到\
    \ `Apple Remote Desktop` 的测试 Mac。我们将编写一个脚本，在那台远程 Mac 上安装这两个配置文件。继续操作，使用 `复制` 命令将两个\
    \ `*.mobileconfig` 文件复制到远程计算机上的 `/tmp` 目录，如图 9-28 所示。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig28_HTML.jpg](img/492151_1_En_9_Fig28_HTML.jpg)\n\
    \n    图 9-28\n    Apple Remote Desktop 中的复制文件对话框\n\n6.  接下来，我们可以继续选择向测试 Mac 发送\
    \ Unix 命令来安装这些配置文件。我们将使用位于 `/usr/bin/` 中的 `profiles` 命令。在 ARD 的 Unix 窗口中，输入以下命令，如果您的两个\
    \ `*.mobileconfig` 文件名与我的不同，请相应指定：\n\n    ```\n    /usr/bin/profiles -I -F /tmp/Trust_Profile_for_MyCompany.mobileconfig\n\
    \    /usr/bin/profiles -I -F /tmp/New_Enrollment_Profile.mobileconfig\n    ```\n\
    \n    `-I` 代表安装，`-F` 代表文件，后面跟着要安装的文件的路径。您的**ARD 发送 Unix 命令**窗口应如图 9-29 所示。\n\n\
    \    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig29_HTML.jpg](img/492151_1_En_9_Fig29_HTML.jpg)\n\
    \n    图 9-29\n    Apple Remote Desktop 中的发送 Unix 命令窗口\n\n7.  接下来，让我们登录到测试 Mac，查看配置文件是否已安装。如果脚本运行正确，您应该会看到一个新的\
    \ `配置文件系统偏好设置`。点击 `配置文件系统偏好设置`，您应该会看到两个**设备配置文件**，如图 9-30 所示。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig30_HTML.jpg](img/492151_1_En_9_Fig30_HTML.jpg)\n\
    \n    图 9-30\n    新安装的设备配置文件\n\n8.  将命令发送到测试 Mac。如果我们希望将来再次运行，可以将其保存为模板。\n\n9.\
    \  返回 `Profile Manager` 并查看设备列表。您的设备列表中应该会有一个新的 Mac，就像我在图 9-31 中那样。这代表了我们刚刚使用\
    \ `Apple Remote Desktop` 脚本添加的 Mac。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig31_HTML.jpg](img/492151_1_En_9_Fig31_HTML.jpg)\n\
    \n    图 9-31\n    我们的测试 Mac 已添加到 Profile Manager\n\n10. 现在返回测试 Mac，并再次浏览 `配置文件系统偏好设置`。点击\
    \ `远程管理配置文件`。您是否看到一条*提示信息“在批准此配置文件之前，功能可能受限。”*？这是指用户批准的 MDM（UAMDM）。我们在第 8 章简要讨论过\
    \ UAMDM。因此，虽然此 Mac 现在列在 `Profile Manager` 中，但在我们将此 Mac 转换为用户批准状态之前，我们可以使用的负载类型存在一些限制。\n\
    \n11. 将此设备转换为用户批准的 MDM 只有一种方法，那就是直接在设备上交互式地单击 `批准…` 按钮。没有可以用于转换的脚本；您可以尝试屏幕共享或使用\
    \ ARD 的远程控制选项来点击 `批准…` 按钮，但 Apple 已将其阻止。您需要坐在那台特定的机器前并单击 `批准…` 按钮。点击 `批准…` 按钮并进行确认，如图\
    \ 9-32 所示。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig32_HTML.jpg](img/492151_1_En_9_Fig32_HTML.jpg)\n\
    \n    图 9-32\n    点击批准按钮以启用用户批准的 MDM\n\n我们现在已通过在测试 macOS 客户端上使用脚本手动配置了 MDM。\n\n\
    ### 专业提示\n\n将 `macOS` 设备成功注册到 MDM 并自动配置为用户批准状态的唯一方法是使用 DEP 注册方法。如果您在设置助理期间使用 DEP\
    \ 推送注册配置文件，该设备将成为用户批准状态，无需任何额外的交互操作。\n\n## 使用 Profile Manager 管理 iOS\n\n既然我们已经了解了在\
    \ `macOS` 和 `iOS` 客户端上注册和取消注册的各种方式，现在让我们探索一下 Profile Manager 控制台中可用的一些管理功能。在本节中，我们将重点关注\
    \ iOS 功能和负载。如果尚未进行，请继续使用您喜欢的方法将一台测试 iOS 设备注册到 `Profile Manager` 中，并确保它已被监督。\n"
- fmt: '### iOS Payloads


    Time to have some fun. Let’s begin by selecting our test device in the `Devices`
    area of Profile Manager. Click the `Settings` tab where we configured activation
    and enrollment options. At the top of the Settings page, you should see a `Settings
    for iPad` section as shown in Figure 9-33. Click the `Edit` button.


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig33_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig33_HTML.jpg)


    **Figure 9-33**

    Click the Edit button to access the Configuration Profile settings for our test
    device


    The `Settings for iPad` window will look very familiar to you from Apple Configurator.
    This is basically the same list of `iOS`-compatible payloads that we have used
    in previous chapters. Go ahead and configure the `General` payload as is required,
    making sure that `Automatic Push` is selected as the `Profile Distribution Type`.
    Next, we are going to configure a few payloads that change the visible configuration
    of the Home Screen for demonstration purposes.


    Scroll down to the `Home Screen Layout` payload. Click the `Configure` button
    to customize the payload settings. Use the `+` button under the `Dock` field to
    add the `App Store`, `Mail`, and `News` to the Dock as I have done in Figure 9-34.


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig34_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig34_HTML.jpg)


    **Figure 9-34**

    Configuring the Home Screen Layout payload


    Next, click the `Lock Screen Message` payload. Click the `Configure` button and
    enter the `lost message` and `asset tag info` that you want to display on the
    lock screen. Finally, click `Restrictions` and then click `Configure` to customize
    these options.


    We are going to uncheck the following items:

    *   Allow FaceTime (supervised only)

    *   Allow iMessage (supervised only)

    *   Allow Apple Music (supervised only)

    *   Allow Radio (supervised only)

    *   Allow removing Apps (supervised only)

    *   Allow removing system Apps (supervised only)

    *   Allow in-app purchase


    Your screen should look similar to Figure 9-35. Click the `OK` button to continue.


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig35_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig35_HTML.jpg)


    **Figure 9-35**

    Configure the Restrictions payload


    Now you will see the various payloads we configured listed under the `Settings
    for iPad` section. Click the `Save` button to apply these settings to our test
    iPad. If your iPad is powered on and sitting at the Home Screen, after a few seconds
    you will see a few changes take place. The Dock will update with the three Apps
    we identified, Messages and FaceTime Apps will disappear completely from the device,
    and just try to delete any installed app. Good luck! Your device should look similar
    to Figure 9-36.


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig36_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig36_HTML.jpg)


    **Figure 9-36**

    Our managed iPad with specified restrictions and settings


    Exit to the lock screen, and you will see a message about contacting support and
    an asset tag number.


    Next, let’s go back to Profile Manager and reverse some of these settings. Click
    the `Edit` button under the device’s `Settings for iPad` section. Click the `-`
    button under the `Restrictions` payload to remove it and then click `OK` to continue.
    Click the `Save` button to apply these changes over the air to the test iPad.
    After a few seconds, FaceTime and Messages Apps will return to the Home Screen,
    and you can now delete nearly any App that you want to. Delete the Stocks app
    just to be sure. Excellent!


    This is very similar to how we configured and deployed payloads in Apple Configurator,
    but with the added benefit of being able to update the device in real time without
    it being connected to our Mac with a USB cable. This is the power of MDM. At this
    point, you can experiment with all kinds of `iOS` payloads and apply them or remove
    them from your test iOS device just to see how it reacts. There are a lot of really
    great options available to you, so I encourage you to take the time to try these
    out and see how they may fit into your overall deployment and management strategy.


    ### iOS Remote Management


    In addition to applying Configuration Profiles, there are a number of nice remote
    management features available in the `Actions` button’s submenu. To demonstrate,
    interactively on your test iOS device, set a passcode. It doesn’t matter what
    the passcode is or how complex it is. Return the device to the lock screen and
    verify that it is secure. Once it is locked, go back to Profile Manager and select
    the test iOS device from the `Devices` list. Click the `Action` button and select
    `Clear Passcode` as shown in Figure 9-37.


    ![images/492151_1_En_9_Chapter/492151_1_En_9_Fig37_HTML.jpg](images/492151_1_En_9_Chapter/492151_1_En_9_Fig37_HTML.jpg)


    **Figure 9-37**

    Sending the Clear Passcode command from the Actions submenu


    `Confirm` when prompted. After a few seconds of activity, go back to your test
    iPad and presto! The iPad is unlocked. Not only does this make for a fun parlor
    trick, you can actually use this to get into managed devices where users have
    forgotten their passcodes or are no longer with the organization.


    There are a number of different actions that you can experiment with: `Restart`,
    `Shut Down`, `Wipe`, and so on. As long as the device is connected to the Internet,
    it will respond to any remote management command.


    ## macOS Management with Profile Manager


    We’ve explored some payloads and actions that are available to iOS devices, but
    there are some unique options for `macOS` clients too. In this section, we will
    focus on `macOS` capabilities and payloads. If you haven’t done so yet, go ahead
    and use your favorite method to enroll a test Mac client into Profile Manager
    and make sure it is User Approved.'
