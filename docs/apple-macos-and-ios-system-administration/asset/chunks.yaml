    # 1. Introduction to Apple Platforms


    ## Introduction and Overview


    Back in the mid- to late 1990s, Apple Computer’s products and the Macintosh platform
    specifically were in the low single digits of personal computer market share.
    These systems were typically found only in small graphic design departments, creative
    firms, or schools. Driven by the excitement of the Internet, Information Technology
    departments were tasked with building and maintaining large homogeneous network
    computing environments that invariably used solutions developed by Microsoft.
    If you were a Mac technician, your skills were not in high demand, and I used
    to joke that being able to repair an Apple-branded PC was becoming a *dark art*.


    Today, Apple’s platforms have seen a major resurgence, thanks to the iPhone’s
    “halo effect” of driving more customers to iPads and Apple Watches and back to
    the Mac. Due to the rise of cloud computing, web applications, mobile devices,
    and “bring your own device” (BYOD) policies, it is not uncommon to find many companies
    allowing Apple products onto corporate networks. Users expect that their Macs
    and iPads will integrate seamlessly with others that use Microsoft or Google platforms.
    This has presented some unique challenges for corporate Information Technology
    departments that must still keep their networks secure and costs in line with
    budget expectations while also supporting cross-platform computing environments.


    If you are reading this book, then you are likely one of the many technology professionals
    who have been tasked with supporting some number of Apple devices and need a crash
    course in Mac and/or iOS system administration. In this book, you will find a
    comprehensive overview of both *iOS* (including iPadOS) and *Macintosh Operating
    System* (*macOS*) , strategies for managing Apple devices using Mobile Device
    Management (MDM), useful how-to guides for integrating with popular Microsoft
    solutions, and helpful tips for automating some of the more rigorous tasks of
    staging, deploying, or upgrading Apple hardware and software.'
