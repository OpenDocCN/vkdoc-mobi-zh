- fmt: '# MDM Server Integration


    The very first thing we are going to do is to create an MDM server record to link
    our server to our instance of Apple School Manager. This will allow us to assign
    specific devices to our `macOS Server` running `Profile Manager` and manage them.


    ## Configuring Profile Manager and DEP


    1.  The first step is to browse to **Settings** in the Apple School Manager/Apple
    Business Manager management portal. Click **Device Management Settings** and then
    click the **Add MDM Server** button as shown in Figure [8-5](#492151_1_En_8_Chapter.xhtml#Fig5).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig5_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig5_HTML.jpg)


    Figure 8-5

    Click Add MDM Server in Device Management Settings


    **Pro Tip** You should definitely make a note of when your tokens are set to expire
    (every 365 days) so you can renew them without causing a service outage. You should
    also pay attention to the updates that Apple makes to its terms and conditions
    for your Apple School Manager or Apple Business Manager account. These usually
    update when there are major new features or new operating system releases. You
    will need to periodically go into the management portal and agree to these new
    terms, or the DEP/VPP services may fail to work properly until you do.


    2.  To configure the MDM server info, you need to provide a few items including
    a name and a public key to create a secure connection between DEP and your MDM
    server. Name this MDM server something descriptive. I’m going to call mine "My
    Company’s MDM Server." I am going to leave the **Allow this MDM Server to release
    devices** box checked. Your screen should look similar to Figure [8-6](#492151_1_En_8_Chapter.xhtml#Fig6).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig6_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig6_HTML.jpg)


    Figure 8-6

    Name your server and upload a public key


    **Pro Tip** When your organization purchased devices, they were automatically
    placed in the DEP database. If your organization wants to sell or dispose of the
    device, Apple requires you to remove the device from the DEP database as part
    of the Apple School Manager/Apple Business Manager terms of service. Releasing
    the device is the term Apple uses for removing the device from your organization’s
    DEP database.


    3.  Next we need to get that public key from our Profile Manager instance running
    on our Mac server. Switch over to the **Server** application and click the Profile
    Manager service. Under the **Deployment Programs** section, there are a number
    of options as shown in Figure [8-7](#492151_1_En_8_Chapter.xhtml#Fig7). Depending
    on the program your organization belongs to, you will want to choose either **Apple
    School Manager** or **Apple Business Manager** and click the **Configure…** button
    under one of those options.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig7_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig7_HTML.jpg)


    Figure 8-7

    Click the Configure… button under the Deployment Program that aligns to your organization


    **Pro Tip** Now is a good time to check the `Date & Time System Preference` on
    your Mac server. You will need to make sure that the time zone, date, and time
    are all accurate before continuing, or you may run into errors configuring the
    secure connection to the cloud hosted service.


    4.  I will be using **Apple School Manager**, so I’m clicking the **Configure…**
    button under that heading. The very first thing the Configuration Assistant will
    do is remind you that you need to have access to the online management portal
    at `business.apple.com` or `school.apple.com` before you proceed. Click **Next**
    to continue.


    5.  On the next dialog box, you will be presented with a **public key** that can
    be used on the Apple School Manager site. This is the key we need to continue
    configuring our MDM connection. Click the **Export…** button as shown in Figure
    [8-8](#492151_1_En_8_Chapter.xhtml#Fig8). Save it to the Desktop.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig8_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig8_HTML.jpg)


    Figure 8-8

    Export your server’s public key


    6.  Next, go back to Apple School Manager and click the **Choose File** button
    under the **MDM Server Settings ➤ Upload Public Key** option as shown in Figure
    [8-9](#492151_1_En_8_Chapter.xhtml#Fig9). Select the `*.pem` file you downloaded
    to your Desktop from the Profile Manager Configuration Assistant. Click the **Save**
    button after adding the public key.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig9_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig9_HTML.jpg)


    Figure 8-9

    Upload the public key from your server to this section of the management portal


    7.  Once you click the **Save** button, the page will refresh, and you will have
    an option to download a token as shown in Figure [8-10](#492151_1_En_8_Chapter.xhtml#Fig10).
    Click the **Download Token** button and save the file to your Desktop. It will
    warn you that downloading the token will reset any existing ones in use. Since
    we don’t have any existing ones, we can ignore this warning and click the **Download
    Token** button to continue.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig10_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig10_HTML.jpg)


    Figure 8-10

    Click the Download Token button to your Desktop


    8.  Next, we need to switch back to our Mac server and finish the Configuration
    Assistant using this `*.p7m` token we just downloaded. Click **Next** to proceed
    to the dialog box where we will upload the token. Click the **Choose…** button
    to select the **Token File** as shown in Figure [8-11](#492151_1_En_8_Chapter.xhtml#Fig11).
    Then click the **Continue** button.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig11_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig11_HTML.jpg)


    Figure 8-11

    Choose the Token File you downloaded to the Desktop from the management portal


    9.  Once that has completed successfully, click the **Done** button to finish
    the configuration. You should now have a green dot next to the selected Deployment
    Program as I do in Figure [8-12](#492151_1_En_8_Chapter.xhtml#Fig12).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig12_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig12_HTML.jpg)


    Figure 8-12

    Apple School Manager has a green dot on my server indicating that it is running'
  raw: '### MDM Server Integration


    The very first thing we are going to do is to create an MDM server record to link
    our server to our instance of Apple School Manager. This will allow us to assign
    specific devices to our *macOS Server* running Profile Manager and manage them.


    Configuring Profile Manager And DEP


    1.  Once that has completed successfully, click the **Done** button to finish
    the configuration. You should now have a green dot next to the selected Deployment
    Program as I do in Figure [8-12](#492151_1_En_8_Chapter.xhtml#Fig12).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig12_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig12_HTML.jpg)


    Figure 8-12


    Apple School Manager has a green dot on my server indicating that it is running


    1.  Next, we need to switch back to our Mac server and finish the Configuration
    Assistant using this ***.p7m** token we just downloaded. Click **Next** to proceed
    to the dialog box where we will upload the token. Click the **Choose…** button
    to select the **Token File** as shown in Figure [8-11](#492151_1_En_8_Chapter.xhtml#Fig11).
    Then click the **Continue** button.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig11_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig11_HTML.jpg)


    Figure 8-11


    Choose the Token File you downloaded to the Desktop from the management portal


    1.  Once you click the **Save** button, the page will refresh, and you will have
    an option to download a token as shown in Figure [8-10](#492151_1_En_8_Chapter.xhtml#Fig10).
    Click the **Download Token** button and save the file to your Desktop. It will
    warn you that downloading the token will reset any existing ones in use. Since
