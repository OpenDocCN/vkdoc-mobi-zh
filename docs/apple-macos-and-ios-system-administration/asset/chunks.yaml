  trans: '

    # 清单


    你可能还记得本章前面的内容，清单是一份需要在特定计算机上安装的软件列表。我们可以创建任意数量的清单，但建议保持较小的清单数量，以使你的 Munki 环境尽可能精简简单。在本节中，我们将构建一个名为
    `site_default` 的清单，因为我们将测试客户端指向了该清单。


    开始之前，我们需要在 `munki_repo` 目录中创建一个 `manifests` 文件夹。确保你已在 Mac 管理员工作站上挂载了 `munki_repo`
    网络共享，然后打开终端。使用 `cd` 命令，并将 `munki_repo` 共享拖动到终端窗口，以将目录切换到网络共享。输入 `ls -l`，你应该会看到如图
    10-35 所示的目录。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig35_HTML.jpg](img/492151_1_En_10_Fig35_HTML.jpg)


    图 10-35

    使用终端浏览 munki_repo 共享


    接下来，输入 `mkdir manifests`，在 `munki_repo` 共享中创建一个名为 `manifests` 的新文件夹。使用 `ls -l`
    或通过访达查看共享，以确认该文件夹已存在，如图 10-36 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig36_HTML.jpg](img/492151_1_En_10_Fig36_HTML.jpg)


    图 10-36

    确认新目录现已可用


    现在，让我们打开 MunkiAdmin 并连接到我们的 `munki_repo`。点击工具栏中的“清单”选项卡。我们将通过从“文件”菜单中选择“新建清单”来创建一个新清单。出现提示时，将其命名为
    `site_default` 并保存到 `munki_repo` 共享上的 `manifests` 文件夹中，如图 10-37 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig37_HTML.jpg](img/492151_1_En_10_Fig37_HTML.jpg)


    图 10-37

    在 MunkiAdmin 中创建 site_default 清单


    在 MunkiAdmin 的清单视图中，你现在应该能看到一个 `site_default` 清单。双击它以打开“清单属性”。


    ## 自定义清单


    在这个练习中，我们将自定义 `site_default` 清单。


    1.  首先，在“通用”选项卡中，我们将为此清单分配一个软件目录。我们目前有一个可用的目录 `testing`。点击 testing 目录左侧的复选框，将此清单指向测试目录中列出的软件，如图
    10-38 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig38_HTML.jpg](img/492151_1_En_10_Fig38_HTML.jpg)


    图 10-38

    将 testing 目录添加到 site_default 清单


    2.  接下来，我们将选择“托管安装”选项卡。使用此窗口底部的“+”按钮，我们可以将特定的应用程序添加到此列表中，供使用此清单的客户端使用。由于这些软件包设置为无需用户交互即可安装，当
    Munki 再次运行时，它们将自动安装。我们将把 Firefox 和 Acrobat Reader 添加到此托管安装列表中。按照图 10-39 所示进行选择并添加。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig39_HTML.jpg](img/492151_1_En_10_Fig39_HTML.jpg)


    图 10-39

    选择并添加 Firefox 和 Acrobat Reader 作为托管安装项


    3.  接下来，我们将添加几个可选安装项。可选安装项不会自动安装，但会提供给最终用户，如果他们愿意，可以选择并安装。点击“可选安装”选项卡，然后使用“+”按钮添加
    Adobe Flash Player、Audacity 和 VLC Media Player，如图 10-40 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig40_HTML.jpg](img/492151_1_En_10_Fig40_HTML.jpg)


    图 10-40

    选择 Flash Player、VLC 和 Audacity 作为可选安装项


    4.  对 `site_default` 清单进行这些更改后，点击“保存”按钮，然后点击工具栏中的“重新加载”按钮以发布更改并刷新 MunkiAdmin 控制台。


    现在我们已经配置好了清单，在我们测试 Mac 上运行的 Munki 客户端软件将能够查看 `site_default` 清单并执行列表中的项目。下一次 Munki
    运行时（大约在接下来的一小时内），它将自动安装 Firefox 和 Acrobat Reader。


    ## 专业提示


    默认情况下，Munki 代理大约每小时与服务器联系一次。此时，它会查找服务器上的任何更改，然后下载并安装自上次联系后已部署到生产环境的任何软件包或运行任何脚本。


    如果我们想立即测试（我们确实想），而不是等待，我们可以在客户端 Mac 上通过终端使用几个命令来强制 Munki 下载并安装清单中的可用软件包。


    在命令提示符下，输入 `sudo managedsoftwareupdate` 以强制运行 Munki。输入本地管理员密码后，你会看到命令行输出，显示 Munki
    正在联系你的服务器并检查清单中是否有待处理的更新。它将找到并列出所有可用软件，如图 10-41 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig41_HTML.jpg](img/492151_1_En_10_Fig41_HTML.jpg)


    图 10-41

    Munki 正在运行并为我们的测试机检查可用更新


    接下来，我们可以输入 `sudo managedsoftwareupdate --installonly`，它将开始安装我们在清单中列为托管安装项的软件。图
    10-42 显示了命令行的进度输出，因为它会在后台运行安装程序，先安装 Adobe Acrobat Reader，然后是 Firefox。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig42_HTML.jpg](img/492151_1_En_10_Fig42_HTML.jpg)


    图 10-42

    安装软件包


    完成后，浏览你的 `/应用程序` 目录，你应该会看到 Adobe Acrobat Reader 和 Firefox 现在已可用。随意打开它们，以确保它们安装成功并按预期工作。

