    ### iOS 重置


    如 图 4-7 所示，在对 iOS 设备进行软件相关故障排除时，有六种不同的重置选项。每种重置模式都有其特定的适用场景，使用前需谨慎评估，因为许多操作会影响用户体验和/或数据安全。强烈建议在执行任何重置前尽可能做好备份。所有这些选项均可在**设置**应用中的
    `通用` > `重置` 路径下找到。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig7_HTML.jpg](img/492151_1_En_4_Fig7_HTML.jpg)


    图 4-7

    iOS 13 重置选项


    *   **重置所有设置**：此选项将所有操作系统设置（包括网络和个人偏好）恢复为出厂默认值，但不会删除任何应用程序或个人数据。

    *   **抹掉所有内容和设置**：此选项将设备完全恢复至出厂状态，会擦除内部闪存并重新安装操作系统，所有用户数据和设置都将被永久删除。

    *   **重置网络设置**：此选项专门将 Wi-Fi、蜂窝网络和 VPN 等网络设置重置为默认值，不影响其他系统设置或数据。

    *   **重置键盘词典**：此选项将清除所有自定义文本替换、快捷方式以及设备学习过的词汇，恢复键盘词典至初始状态。

    *   **重置主屏幕布局**：此选项将主屏幕恢复为默认布局，移除所有自定义的程序坞设置并删除用户创建的文件夹，但不会删除应用程序本身或其中的数据。

    *   **重置位置与隐私**：此选项会移除所有已授予应用程序的定位服务、相机访问等隐私权限。下次使用相关应用时，系统会重新请求授权。


    ### iOS 恢复模式


    iOS 设备上的**恢复模式**类似于 `macOS 恢复模式`，它是一个有限的预引导环境，需要在操作系统完全加载前通过特定按键组合进入。这个环境有时被称为
    `iBoot`（引导加载程序），它允许设备连接到电脑，以便用户执行擦除和恢复操作。


    需要使用 iOS 恢复模式的场景包括：将密码锁定且遗忘密码的设备恢复到出厂设置；解决系统启动时卡在白色苹果标志的故障；或在无需用户交互的情况下，将新设备升级至最新
    iOS 版本，使其在部署时直接停留在`设置助手`界面。


    当 iOS 设备进入恢复模式后，唯一能进行的操作就是将其连接到运行 `iTunes`（或 macOS Catalina 及更高版本中的 `Finder`）的电脑，并按照屏幕提示恢复或升级操作系统，如图
    4-8 所示。请注意，在此模式下恢复系统会完全擦除设备上的所有数据。务必确保手边有最新备份，以便在恢复成功后重新安装应用程序和用户数据。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig8_HTML.jpg](img/492151_1_En_4_Fig8_HTML.jpg)


    图 4-8

    使用 iTunes 或 Finder (macOS Catalina) 进行 iOS 恢复


    > **专业提示**

    > `Windows 版 iTunes` 以及 `macOS Catalina` 之前版本的 `iTunes` 可用于下载与设备兼容的最新 iOS 系统并进行恢复。从
    `macOS Catalina` 开始，苹果移除了独立的 `iTunes` 应用，现在当您通过 USB 将 iOS 设备连接到 Mac 时，可以在 `Finder`
    中看到和管理该设备。所有原先在 `iTunes` 中的设备管理功能现已整合至 `Finder`。


    与强制重启类似，进入恢复模式所需的按键组合因 iPhone 或 iPad 的型号和发布时间而异。以下为按设备系列划分的操作说明：


    *   **iPhone 8 系列、iPhone X 系列、iPhone 11 系列**：使用 USB-Lightning 数据线将设备连接到电脑。快速按下并松开`音量增大`键，再快速按下并松开`音量减小`键，然后长按`侧边`按钮，直到看到恢复模式屏幕。

    *   **iPhone 7 系列**：关闭设备电源。长按`音量减小`键，同时用 Lightning 数据线将设备连接到电脑。持续按住按钮，直到出现恢复模式屏幕。

    *   **iPhone 6 或 iPhone SE（第一代）**：关闭设备电源。长按`主屏幕`按钮，同时用 Lightning 数据线将设备连接到电脑。持续按住按钮，直到看到恢复模式屏幕。

    *   **没有实体主屏幕按钮的 iPad**：关闭设备电源。长按顶部的`睡眠/唤醒`按钮，同时使用 USB-C 或 Lightning 数据线将 iPad
    连接到电脑。持续按住按钮，直到出现恢复模式屏幕。

    *   **有实体主屏幕按钮的 iPad**：关闭设备电源。长按`主屏幕`按钮，同时用 Lightning 数据线将 iPad 连接到电脑。持续按住按钮，直到看到恢复模式屏幕。

