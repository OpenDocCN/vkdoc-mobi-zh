- fmt: '## Microsoft Office 365 Applications and OneDrive


    The next step is to install the Office 365 applications to Don’s MacBook Pro.
    While we are at it, we can install Word and Excel on his iPhone too. Using `Profile
    Manager`, browse to the specific device and use the **Apps** tab to apply copies
    of `Word`, `Excel`, `PowerPoint`, `Outlook`, and `OneDrive` to his Mac as shown
    in Figure [11-34](#492151_1_En_11_Chapter.xhtml#Fig34).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig34_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig34_HTML.jpg)

    Figure 11-34. Installing the Microsoft Office 365 applications on Don’s MacBook
    Pro


    This is pretty simple and straightforward because it’s the same process we followed
    in Chapter [9](#492151_1_En_9_Chapter.xhtml). Set the **Installation Mode** to
    **Automatic** and click the **Save** button to push the configuration and begin
    the application installation process. It will take a fair amount of time to install
    all of these applications, and you can use the Active Tasks window to monitor
    the progress until they have completed.


    ### Activating the Office 365 Applications


    Once the Office applications have finished installing on Don’s MacBook Pro, we
    can launch one of them and use the activation wizard to authenticate with our
    `O365` account and activate the software license as shown in Figure [11-35](#492151_1_En_11_Chapter.xhtml#Fig35).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig35_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig35_HTML.jpg)

    Figure 11-35 Click the button to sign into an existing O365 account to activate


    While we have Microsoft Outlook open, we can follow the prompts to configure the
    Exchange information and finish syncing with the mail server. We now have Don’s
    email fully configured and ready to go. We can let it sync his inbox in the background
    while we configure his OneDrive.


    Pro Tip

    If your user still has Personal Folders (`*.pst`) files, once you have migrated
    those files to the Mac, you can import them into Outlook for Mac using the **Import**
    function under the **Outlook** menu.


    ### Configuring OneDrive for Business


    While Outlook is busy refreshing his inbox in the background, we can open **OneDrive**
    from the `/Applications` folder. When prompted, enter Don’s email address and
    Office 365 password to continue. We will choose the `/Users/dpresident/` directory
    for the location of our OneDrive folder as shown in Figure [11-36](#492151_1_En_11_Chapter.xhtml#Fig36).
    Choose to **Open at login** to allow Don’s files to sync automatically and follow
    the prompts to complete the setup wizard.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig36_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig36_HTML.jpg)

    Figure 11-36 Select Don’s home directory as the location for his OneDrive folder


    We have now finished configuring Office 365 and Microsoft OneDrive for Business
    on Don’s MacBook Pro.


    ## Migrating Users from Windows to macOS


    If he was using OneDrive to store all of his data and wasn’t using `*.pst` files
    on his Windows PC, there may not be much left to migrate. However, many users
    will still have data on their old PC that needs to be moved to their Mac. To check
    the last box on this PC to Mac migration for Don President, we need to migrate
    any remaining data over to his Mac.


    Fortunately, Apple provides a pretty useful migration tool to assist in this process.
    To get started, make sure both his new Mac and his old PC are connected to the
    same network and then browse to the `/Applications/Utilities/` folder on Don’s
    Mac and open the **Migration Assistant** utility.


    ### Using the Migration Assistant


    Upon launching the Migration Assistant, you will be warned that all open applications
    will be closed and to click **Continue** to begin. You will be prompted for local
    Administrator credentials to continue. After you authenticate, every application
    including the Finder will be closed, and the Migration Assistant will begin. When
    you are prompted to choose a computer to migrate from, you should choose **From
    a Windows PC** as shown in Figure [11-37](#492151_1_En_11_Chapter.xhtml#Fig37).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig37_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig37_HTML.jpg)

    Figure 11-37 The Migration Assistant using the Windows PC option


    On Don’s old Windows PC, open a browser and go to [`www.apple.com/migrate-to-mac`](http://www.apple.com/migrate-to-mac)
    and download the **Windows Migration Assistant**. When prompted, go ahead and
    **run** the `setup.exe` that downloads and step through the setup wizard to complete
    the installation and any additional components that are required. Once it is finished
    with the installation, open the **Windows Migration Assistant** application from
    the Start menu or the Windows Desktop. Follow the prompts to until you see the
    name of the PC appear on your Mac as shown in Figure [11-38](#492151_1_En_11_Chapter.xhtml#Fig38).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig38_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig38_HTML.jpg)

    Figure 11-38 Selecting the PC to migrate from


    When the computer you want to migrate from appears, **select it** and then click
    **Continue**. Switch back to the Windows PC and ensure that the security codes
    match between the Mac and Windows PC. Once you confirm that they do, click the
    **Continue** button on the Windows PC. It will begin gathering data and communicating
    with the new Mac. This may take several minutes.


    When you are prompted to select various files and user accounts, **select the
    relevant information** as shown in Figure [11-39](#492151_1_En_11_Chapter.xhtml#Fig39).
    Once you have selected the information to migrate, click the **Continue** button.


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig39_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig39_HTML.jpg)

    Figure 11-39 Select the files and settings you wish to migrate


    It will prompt you to authenticate as the Administrator on the Mac. Click the
    **Authorize** button when prompted and enter the local Administrator credentials.
    Then click the **Continue** button to proceed. It will now begin transferring
    the data over the network from the old PC to the new Mac as shown in Figure [11-40](#492151_1_En_11_Chapter.xhtml#Fig40).


    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig40_HTML.jpg](images/492151_1_En_11_Chapter/492151_1_En_11_Fig40_HTML.jpg)

    Figure 11-40 Transferring the data over the network'
