- fmt: "## Summary\n\nIn this chapter, we covered a lot of the core functionality\
    \ of Mobile Device Management with `Profile Manager`. There are so many useful\
    \ payloads and features that `macOS` and `iOS` system administrators can use to\
    \ make their life easier, and we barely scratched the surface! Take some time\
    \ to experiment and become more familiar with the effects of the various payloads\
    \ and commands available to you before you move onto the next chapter.\n\n# 10.\
    \ Automated macOS Application Deployment Using Munki\n\nIn this chapter, we are\
    \ going to be working with an open source solution called `Munki` from `Walt Disney\
    \ Animation Studios` (`www.munki.org`). `Munki` is a simple, effective, and freely\
    \ available software deployment solution for managing Macs in medium and large\
    \ organizations.\n\n## Introduction\n\n`Munki` was written in `Python` and runs\
    \ as an application on your Mac clients. At its most basic level, the client software\
    \ checks into a specified web server every hour to see if anything has changed.\
    \ Then it syncs, downloads, and installs software packages. This allows one technician\
    \ at the `Munki Admin` console to package and deploy applications on a set schedule\
    \ to any number of Macs across a nearly unlimited number of locations.\n\nAs we\
    \ work through this chapter, we will be building a web server for use with `Munki`,\
    \ configuring our `Munki Admin` workstation, packaging a few applications for\
    \ deployment, and then deploying those applications to a test Mac running the\
    \ `Munki Managed Software Center` application. I have found that due to the various\
    \ underlying changes that Apple has made to `macOS`, using a tool like this to\
    \ deploy software is the best alternative to the now-obsolete task of monolithic\
    \ imaging.\n\nOne of the best features of `Munki` is that it stores all of the\
    \ data in XML files like `*.plists` which can easily be synced between multiple\
    \ servers. This allows for load balancing and multilocation support without having\
    \ to worry about centralized databases or other complexities found in commercial\
    \ solutions. I have personally used `Munki` to manage software deployments to\
    \ over ten thousand `macOS` clients across 50 locations. I think you will find\
    \ it to be a powerful addition to your arsenal of Mac deployment and support tools.\n\
    \n## Configuring an Apache Web Server for Munki\n\nLet’s get started by building\
    \ our `Munki` web server. Before we begin this exercise, go ahead and stage a\
    \ Mac that will be used as our web server. Your server does not need to be running\
    \ `macOS Server` as the built-in tools in the client version of `macOS` will provide\
    \ all of the necessary features we need. You may be tempted to use your existing\
    \ `Profile Manager` server; however, this is not recommended because both services\
    \ use the Apache web server and could conflict with each other.\n\nThe `Munki`\
    \ server only needs to be available on the internal network and will work best\
    \ without any other services running on it. If you are building out a production\
    \ `Munki` server, you may want to consider a machine with adequate disk space\
    \ as the main requirement because all of your installation packages will reside\
    \ on this box.\n\n**Pro Tip**\n\nIf you are serious about a production `Munki`\
    \ server, you may want to configure a Linux- or Windows-based web server with\
    \ redundancy, RAID storage, and fast I/O. You could also purchase a 2019 `Mac\
    \ Pro` for this, but from a cost perspective, you may be best served with standard\
    \ non-Apple hardware. For the exercises in this book, a small `Mac mini` or a\
    \ Mac virtual machine will work fine.\n\n### Configuring the Web Server\n\nOnce\
    \ you have installed `macOS Catalina`, step through `Setup Assistant` to configure\
    \ the local user accounts and then configure the wallpaper, date and time, and\
    \ a static IP address. Finally, name your server something simple like `MunkiServer01`.\
    \ At this point, you should have a server ready to go with a name, static IP address,\
    \ Internet access, the ability to ping your clients (and your clients should be\
    \ able to ping it), and all the necessary server security hardening completed.\
    \ You can reference Chapter `7` for this step if needed.\n\n**Configuring The\
    \ Apache Server Settings**\n\nThe first thing we need to do is make some changes\
    \ to the Apache configuration file before we turn on our web server service. Open\
    \ the `Terminal` and step through this exercise to configure and start the web\
    \ server:\n\n1.  Our next step is to open and edit this file in the built-in Unix\
    \ text editor, `VI` (vee-eye). To do this, type `vi httpd.conf` and press **enter**\
    \ to open the configuration file in `VI`.\n\n2.  In `VI`, you will see the contents\
    \ of the `httpd.conf` file. You can read through this document if you would like.\
    \ It explains that this file is the main Apache HTTP server configuration file.\
    \ You can use the **arrow keys** on your keyboard to navigate around the document.\n\
    \n3.  As you scroll through, there are two lines we need to pay attention to.\
    \ The first one is `DocumentRoot \"/Library/WebServer/Documents\"`. That is the\
    \ path on our Mac to the root of the web server where we would place our files\
    \ and folders.\n\n4.  The second line is in the `Options` section just below it\
    \ and reads `Options FollowSymLinks Multiviews`. We need to edit this line because\
    \ by default this is configured to parse and display files as web pages, but for\
    \ `Munki` we want our web server to display the contents as *folders and files*.\
    \ So we will use the **arrow keys** to move our cursor between `Options` and `FollowSymLinks`\
    \ and press the **i** key on the keyboard to change to **Insert mode** as shown\
    \ in Figure `10-3`.\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig3_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig3_HTML.jpg)\n\
    \n   Figure 10-3\n\n   Enabling Insert mode in VI to edit the httpd.conf file\n\
    \n5.  Next, enter `Indexes` in this line so it now reads `Options Indexes FollowSymLinks\
    \ Multiviews` which will enable us to see files and folders on our web server\
    \ and not HTML content. Once you have made that change, press the **escape** key\
    \ to exit out of **Insert mode**. Your `Terminal` window should look similar to\
    \ Figure `10-4`.\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig4_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig4_HTML.jpg)\n\
    \n   Figure 10-4\n\n   Your Options line should now look like this\n\n6.  Now\
    \ that we have made the required changes and have taken note of the path to the\
    \ web server’s root directory, we can write our changes and quit the document.\
    \ To do this in `VI`, type `:wq` and press **enter**. The **colon** (`:`) identifies\
    \ that a command is coming, **w** signifies **writing** the changes (saving),\
    \ and the **q** will **quit** the document and drop us out of `VI` and back to\
    \ the command prompt.\n\n7.  Back at the command prompt, we can now enable our\
    \ web server service. Enter `apachectl start` to enable the service. Open a browser\
    \ window and type `http://localhost/`, and you should see a message that says\
    \ **\"It works!\"** as shown in Figure `10-5`. We have now configured the web\
    \ server and started the service.\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig5_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig5_HTML.jpg)\n\
    \n   Figure 10-5\n\n   Confirming that our web server service has started"
  raw: '## Summary


    In this chapter, we covered a lot of the core functionality of Mobile Device Management
    with Profile Manager. There are so many useful payloads and features that *macOS*
    and *iOS* system administrators can use to make their life easier, and we barely
    scratched the surface! Take some time to experiment and become more familiar with
    the effects of the various payloads and commands available to you before you move
    onto the next chapter.


    # 10. Automated macOS Application Deployment Using Munki


    In this chapter, we are going to be working with an open source solution called
    *Munki* from *Walt Disney Animation Studios* ([`www.munki.org`](http://www.munki.org)).
    *Munki* is a simple, effective, and freely available software deployment solution
    for managing Macs in medium and large organizations.


    ## Introduction


    *Munki* was written in *Python* and runs as an application on your Mac clients.
    At its most basic level, the client software checks into a specified web server
    every hour to see if anything has changed. Then it syncs, downloads, and installs
    software packages. This allows one technician at the Munki Admin console to package
    and deploy applications on a set schedule to any number of Macs across a nearly
    unlimited number of locations.


    As we work through this chapter, we will be building a web server for use with
    *Munki*, configuring our Munki Admin workstation, packaging a few applications
    for deployment, and then deploying those applications to a test Mac running the
    *Munki Managed Software Center* application. I have found that due to the various
    underlying changes that Apple has made to *macOS*, using a tool like this to deploy
    software is the best alternative to the now-obsolete task of monolithic imaging.


    One of the best features of Munki is that it stores all of the data in XML files
    like **∗.plists** which can easily be synced between multiple servers. This allows
    for load balancing and multilocation support without having to worry about centralized
    databases or other complexities found in commercial solutions. I have personally
    used Munki to manage software deployments to over ten thousand *macOS* clients
    across 50 locations. I think you will find it to be a powerful addition to your
    arsenal of Mac deployment and support tools.


    ## Configuring an Apache Web Server for Munki


    Let’s get started by building our Munki web server. Before we begin this exercise,
    go ahead and stage a Mac that will be used as our web server. Your server does
    not need to be running *macOS Server* as the built-in tools in the client version
    of *macOS* will provide all of the necessary features we need. You may be tempted
    to use your existing Profile Manager server; however, this is not recommended
    because both services use the Apache web server and could conflict with each other.


    The Munki server only needs to be available on the internal network and will work
    best without any other services running on it. If you are building out a production
    Munki server, you may want to consider a machine with adequate disk space as the
    main requirement because all of your installation packages will reside on this
    box.


    Pro Tip


    If you are serious about a production Munki server, you may want to configure
    a Linux- or Windows-based web server with redundancy, RAID storage, and fast I/O.
    You could also purchase a 2019 Mac Pro for this, but from a cost perspective,
    you may be best served with standard non-Apple hardware. For the exercises in
    this book, a small Mac mini or a Mac virtual machine will work fine.


    ### Configuring the Web Server


    Once you have installed *macOS Catalina*, step through **Setup Assistant** to
    configure the local user accounts and then configure the wallpaper, date and time,
    and a static IP address. Finally, name your server something simple like **MunkiServer01**.
    At this point, you should have a server ready to go with a name, static IP address,
    Internet access, the ability to ping your clients (and your clients should be
    able to ping it), and all the necessary server security hardening completed. You
    can reference Chapter [7](#492151_1_En_7_Chapter.xhtml) for this step if needed.


    Configuring The Apache Server Settings


    The first thing we need to do is make some changes to the Apache configuration
    file before we turn on our web server service. Open the **Terminal** and step
    through this exercise to configure and start the web server:


    1.  Now that we have made the required changes and have taken note of the path
    to the web server’s root directory, we can write our changes and quit the document.
    To do this in ***VI***, type **:wq** and press **enter**. The **colon** (**:**)
    identifies that a command is coming, **w** signifies **writing** the changes (saving),
    and the **q** will **quit** the document and drop us out of ***VI*** and back
    to the command prompt.


    2.  Back at the command prompt, we can now enable our web server service. Enter
    `apachectl start` to enable the service. Open a browser window and type `http://localhost/`,
    and you should see a message that says **“It works!”** as shown in Figure [10-5](#492151_1_En_10_Chapter.xhtml#Fig5).
    We have now configured the web server and started the service.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig5_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Confirming that our web server service has started


    1.  Next, enter `Indexes` in this line so it now reads `Options Indexes FollowSymLinks
    Mulitviews` which will enable us to see files and folders on our web server and
    not HTML content. Once you have made that change, press the **escape** key to
    exit out of **Insert mode**. Your Terminal window should look similar to Figure
    [10-4](#492151_1_En_10_Chapter.xhtml#Fig4).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig4_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Your Options line should now look like this


    1.  Our next step is to open and edit this file in the built-in Unix text editor,
    ***VI*** (*vee-eye*). To do this, type `vi httpd.conf` and press **enter** to
    open the configuration file in ***VI***.


    2.  In ***VI***, you will see the contents of the ***httpd.conf*** file. You can
    read through this document if you would like. It explains that this file is the
    main Apache HTTP server configuration file. You can use the **arrow keys** on
    your keyboard to navigate around the document.


    3.  As you scroll through, there are two lines we need to pay attention to. The
    first one is `DocumentRoot "/Library/WebServer/Documents"`. That is the path on
    our Mac to the root of the web server where we would place our files and folders.


    4.  The second line is in the `Options` section just below it and reads `Options
    FollowSymLinks Multiviews`. We need to edit this line because by default this
    is configured to parse and display files as web pages, but for Munki we want our
    web server to display the contents as *folders and files*. So we will use the
    **arrow keys** to move our cursor between `Options` and `FollowSymLinks` and press
    the **i** key on the keyboard to change to **Insert mode** as shown in Figure
    [10-3](#492151_1_En_10_Chapter.xhtml#Fig3).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig3_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Enabling Insert mode in VI to edit the httpd.conf file'
  trans: "\n## 摘要\n\n在本章中，我们介绍了使用 `配置文件管理器` 进行移动设备管理的许多核心功能。`macOS` 和 `iOS` 系统管理员可以利用众多有用的配置文件和功能来简化工作，而我们所涉及的仅仅是冰山一角！在进入下一章之前，请花些时间进行实验，以便更熟悉各种可用的配置文件和命令的效果。\n\
    \n# 10. 使用 Munki 自动化部署 macOS 应用程序\n\n在本章中，我们将使用来自 **华特迪士尼动画工作室** (`Walt Disney\
    \ Animation Studios`) (`www.munki.org`) 的一款名为 `Munki` 的开源解决方案。`Munki` 是一个简单、有效且免费可用的软件部署解决方案，适用于中型和大型组织中的\
    \ Mac 管理。\n\n## 简介\n\n`Munki` 是用 `Python` 编写的，并在您的 Mac 客户端上作为应用程序运行。在最基本的层面上，客户端软件每小时检查一次指定的\
    \ Web 服务器，查看是否有任何更改。然后它会同步、下载并安装软件包。这使得一名技术人员可以在 `Munki Admin` 控制台上按设定的时间表，将应用程序打包并部署到近乎无限数量的地点的任意多台\
    \ Mac 上。\n\n随着我们学习本章内容，我们将构建一个用于 `Munki` 的 Web 服务器，配置我们的 `Munki Admin` 工作站，为部署打包一些应用程序，然后将这些应用程序部署到一台运行\
    \ `Munki Managed Software Center` 应用程序的测试 Mac 上。我发现，由于苹果对 `macOS` 做出的各种底层更改，使用像这样的工具来部署软件是取代现已过时的单一系统映像任务的最佳替代方案。\n\
    \n`Munki` 的最佳功能之一是它将所有数据存储在 `*.plists` 等 XML 文件中，这些文件可以在多台服务器之间轻松同步。这使得负载均衡和多地点支持成为可能，而无需担心集中式数据库或商业解决方案中常见的其他复杂性。我个人曾使用\
    \ `Munki` 管理跨 50 个地点的超过一万台 `macOS` 客户端的软件部署。我认为您会发现它是 Mac 部署和支持工具库中一个强大的补充。\n\n\
    ## 为 Munki 配置 Apache Web 服务器\n\n让我们开始构建我们的 `Munki` Web 服务器。在开始此练习之前，请先准备好一台将用作我们\
    \ Web 服务器的 Mac。您的服务器不需要运行 `macOS Server`，因为客户端版 `macOS` 中的内置工具将提供我们所需的所有必要功能。您可能想使用现有的\
    \ `配置文件管理器` 服务器；但是，这不推荐，因为这两种服务都使用 Apache Web 服务器，可能会相互冲突。\n\n`Munki` 服务器只需要在内网可用，并且在其上不运行任何其他服务时效果最佳。如果您正在构建一个生产环境的\
    \ `Munki` 服务器，您可能需要考虑一台具有充足磁盘空间的机器作为主要要求，因为您的所有安装包都将存放在这台机器上。\n\n**专业提示**\n\n\
    如果您认真对待生产环境的 `Munki` 服务器，您可能希望配置一个基于 Linux 或 Windows 的 Web 服务器，具备冗余性、RAID 存储和快速\
    \ I/O。您也可以为此购买一台 2019 年的 `Mac Pro`，但从成本角度看，使用标准的非苹果硬件可能是最佳选择。对于本书中的练习，一台小型 `Mac\
    \ mini` 或 Mac 虚拟机就可以很好地工作。\n\n### 配置 Web 服务器\n\n安装好 `macOS Catalina` 后，按照 `设置助理`\
    \ 的步骤配置本地用户账户，然后配置壁纸、日期和时间以及静态 IP 地址。最后，为您的服务器取一个简单的名称，如 `MunkiServer01`。此时，您应该拥有一台准备就绪的服务器，它具有名称、静态\
    \ IP 地址、互联网访问能力、能够 ping 通您的客户端（并且您的客户端也能 ping 通它），并且已完成所有必要的服务器安全加固。如果需要，您可以参考第\
    \ `7` 章来完成此步骤。\n\n**配置 Apache 服务器设置**\n\n我们需要做的第一件事是在开启 Web 服务器服务之前，对 Apache 配置文件进行一些修改。打开\
    \ `终端` 并按此练习逐步配置并启动 Web 服务器：\n\n1.  我们的下一步是在内置的 Unix 文本编辑器 `VI` 中打开并编辑此文件。为此，键入\
    \ `vi httpd.conf` 并按 **回车** 在 `VI` 中打开配置文件。\n\n2.  在 `VI` 中，您将看到 `httpd.conf`\
    \ 文件的内容。如果您愿意，可以通读此文档。它说明此文件是 Apache HTTP 服务器的主要配置文件。您可以使用键盘上的**方向键**在文档中导航。\n\
    \n3.  在滚动浏览时，有两行需要我们注意。第一行是 `DocumentRoot \"/Library/WebServer/Documents\"`。这是我们的\
    \ Mac 上 Web 服务器根目录的路径，我们将在此处放置我们的文件和文件夹。\n\n4.  第二行在其正下方的 `Options` 部分中，内容是 `Options\
    \ FollowSymLinks Multiviews`。我们需要编辑这一行，因为默认情况下它被配置为将文件解析并显示为网页，但对于 `Munki`，我们希望我们的\
    \ Web 服务器将内容显示为 *文件夹和文件*。因此，我们将使用**方向键**将光标移动到 `Options` 和 `FollowSymLinks` 之间，然后按键盘上的\
    \ **i** 键切换到**插入模式**，如图 `10-3` 所示。\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig3_HTML.jpg](img/492151_1_En_10_Fig3_HTML.jpg)\n\
    \n   图 10-3\n\n   在 VI 中启用插入模式以编辑 httpd.conf 文件\n\n5.  接下来，在这一行中输入 `Indexes`，使其现在显示为\
    \ `Options Indexes FollowSymLinks Multiviews`，这将使我们能够在 Web 服务器上看到文件和文件夹，而不是 HTML\
    \ 内容。完成此更改后，按 **esc** 键退出**插入模式**。您的 `终端` 窗口应类似于图 `10-4`。\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig4_HTML.jpg](img/492151_1_En_10_Fig4_HTML.jpg)\n\
    \n   图 10-4\n\n   您的 Options 行现在应如图所示\n\n6.  现在我们已经完成了必要的更改并记下了 Web 服务器根目录的路径，可以保存更改并退出文档了。在\
    \ `VI` 中，键入 `:wq` 并按 **回车**。**冒号** (`:`) 表示接下来是一个命令，**w** 代表**写入**更改（保存），**q**\
    \ 将**退出**文档，使我们退出 `VI` 并返回到命令提示符。\n\n7.  回到命令提示符，我们现在可以启用我们的 Web 服务器服务。输入 `apachectl\
    \ start` 以启用该服务。打开一个浏览器窗口并输入 `http://localhost/`，您应该会看到一条显示 **\"It works!\"**\
    \ 的消息，如图 `10-5` 所示。至此，我们已经配置了 Web 服务器并启动了服务。\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig5_HTML.jpg](img/492151_1_En_10_Fig5_HTML.jpg)\n\
    \n   图 10-5\n\n   确认我们的 Web 服务器服务已启动\n"
- fmt: '# 修改Unix八进制文件权限


    我们已经成功配置并启动了Apache web服务器服务，但在服务器准备就绪以供*Munki*使用之前，我们还有一些工作要做。接下来我们需要在web服务器上创建一个Munki客户端需要访问的特殊文件夹。


    我们需要通过**终端**创建此目录，并使用*Unix八进制表示法系统*设置文件权限。让我们回到终端并使用`cd /Library/WebServer/Documents/`命令切换到web服务器的根目录。使用`ls`命令，但也使用`-l`选项以*长列表*格式查看目录。您的终端窗口应如图10-6所示。


    您应该会看到三行，每行对应此目录中的一个文件。第一列表示每个文件的八进制文件权限，称为*八位字节*。第二列表示硬链接的数量，第三列是文件的所有者，第四列是组。第五列是文件大小，第六列是最后修改日期/时间，最后一列是文件名本身。


    如您所见，***root***是这些文件的所有者，***wheel***是组。这些权限将与我们之前在第三章中使用*macOS*图形用户界面**获取信息**对话框中查看的权限一致。我们将在此处创建一个新目录。*Munki*需要一个名为***munki_repo***的文件夹，它是所有Munki
    XML文件和安装介质的仓库，我们的客户端将在软件安装过程中访问。让我们使用`mkdir`命令创建此目录。输入`mkdir munki_repo`并按**回车**。现在再执行一次`ls
    -l`命令，查看我们的新文件夹是否已创建及其默认设置的权限。您的终端窗口应类似于图10-7。


    让我们花点时间看看新目录的八位字节。默认情况下，我们看到`drwxr-xr-x`，那么这在与权限相关时意味着什么？好问题！这串字母表示*所有者*（本例中为root）、*组*（本例中为wheel）和*所有人*组的*读、写和执行*权限。正如我们在第3章中学到的，所有人组确实意味着*其他所有人*。图10-8很好地展示了目录、所有者、组和所有人权限之间的细分。


