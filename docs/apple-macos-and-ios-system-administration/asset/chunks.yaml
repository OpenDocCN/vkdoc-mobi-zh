- fmt: '# FileVault


    `FileVault`是苹果内置的磁盘加密技术，目前版本为 2.0。要启用`FileVault`，请使用`Security & Privacy System
    Preference`，然后在 FileVault 标签页中点击**Turn on FileVault**…按钮，如图 [3-11](#492151_1_En_3_Chapter.xhtml#Fig11)
    所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig11_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig11_HTML.jpg)


    图 3-11

    在安全性与隐私系统偏好设置中启用 FileVault 加密


    启用`FileVault`时，需要配置一个恢复密钥选项，以防需要解密驱动器或在另一台 Mac 上装载它。对于个人使用，您可能希望配置您的 iCloud 帐户来解密驱动器。对于小型企业或公司，如果只需要在几台
    Mac 上支持`FileVault`加密，建议为每个系统创建一个恢复密钥，并将密钥字符串保存在安全的地方，以便在需要解密驱动器时参考。此选项如图 [3-12](#492151_1_En_3_Chapter.xhtml#Fig12)
    所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig12_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig12_HTML.jpg)


    图 3-12

    选择 FileVault 恢复密钥


    ## FileVault 机构恢复密钥


    如果您有数百或*数千*台需要加密的 Mac，并且您不想为每个用户或每台机器管理单独的恢复密钥字符串，该怎么办？幸运的是，苹果提供了为组织中的每台 Mac 创建和部署**机构恢复密钥**（IRK）的选项。部署
    IRK 涉及三个步骤：在一台 Mac 上创建**主钥匙串**，编辑主钥匙串的副本以**移除私钥**，然后将配置**部署**到所有其他 Mac。


    创建`FileVault`密钥需要使用命令行界面。打开`Terminal`，在提示符处输入以下命令来创建主钥匙串：


    ```

    security create-filevaultmaster-keychain ~/Desktop/FileVaultMaster.keychain

    ```


    系统会提示您创建密码。按照提示创建并验证密码。命令执行完毕后，您的桌面上会出现一个名为`FileVaultMaster.keychain`的文件，如图 [3-13](#492151_1_En_3_Chapter.xhtml#Fig13)
    所示。这是私钥恢复密钥的原始副本，可用于解锁组织中任何配置为使用 IRK 的 Mac。您需要将其复制到安全位置，并限制仅授权人员可以访问。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig13_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig13_HTML.jpg)


    图 3-13

    该命令已在桌面上生成了一个 FileVaultMaster 钥匙串


    接下来，我们需要准备一份用于部署到其他 Mac 的副本：


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig16_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig16_HTML.jpg)


    图 3-16

    FileVault 不会提示输入恢复密钥选项；它会自动使用 IRK


    1.  使用`Keychain Access`应用程序打开`FileVaultMaster.keychain`文件。

    2.  在`Keychain Access`应用程序中，单击左侧的`FileVaultMaster`以选中它。如果需要，单击**padlock**图标并进行身份验证以解锁它。密码与您在`Terminal`中创建`FileVaultMaster`文件时使用的密码相同。

    3.  在右侧找到名为`FileVault Master Password Key`的*私钥*文件，如图 [3-14](#492151_1_En_3_Chapter.xhtml#Fig14)
    所示。单击它以选中，然后从`Edit`菜单中选择`Delete`将其删除。现在您就有了一个缺少私钥的钥匙串文件。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig14_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig14_HTML.jpg)


    图 3-14

    删除 FileVault Master Password Key


    现在我们已经准备好将 IRK 部署到其他 Mac。在每台您想要配置使用 IRK 的 Mac 上，请按照以下步骤操作。


    4.  将我们修改过的`FileVaultMaster.keychain`文件复制到`/Library/Keychains/`文件夹，如图 [3-15](#492151_1_En_3_Chapter.xhtml#Fig15)
    所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig15_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig15_HTML.jpg)


    图 3-15

    将修改后的钥匙串文件复制到要使用 IRK 的每台客户端 Mac 的`/Library/Keychains/`目录


    5.  打开`Terminal`应用程序，输入以下命令来正确设置文件的权限。这些命令将所有者设置为`root`，组设置为`wheel`，然后设置我们想要的正确读/写权限：


    ```

    sudo chown root:wheel /Library/Keychains/FileVaultMaster.keychain

    sudo chmod 644 /Library/Keychains/FileVaultMaster.keychain

    ```


    6.  打开`Security & Privacy System Preference`并浏览到 FileVault 标签页。单击按钮以启用`FileVault`。如果操作正确，您将不会收到创建恢复密钥的提示，而是会看到类似图
    [3-16](#492151_1_En_3_Chapter.xhtml#Fig16) 中的消息。


    专业提示

    您可能会遇到这样一种情况：组织中的一些机器已经启用了`FileVault`，而您希望将其转换为使用 IRK。如果是这种情况，在复制钥匙串文件并设置正确的文件权限后，您可以在`Terminal`中输入一个命令，将现有的`FileVault`恢复密钥转换为您机构的恢复密钥。


    将现有的`FileVault`实例转换为机构恢复密钥的命令：


    ```

    sudo fdesetup changerecovery -institutional -keychain /Library/Keychains/FileVaultMaster.keychain

    ```


    # 防火墙


    苹果为`macOS`提供了一个内置的软件防火墙，默认情况下是禁用的。要配置它，请打开`Security & Privacy System Preference`并选择`Firewall`标签页。在这里，您可以打开或关闭防火墙。启用防火墙后，您可以配置各种选项。图
    [3-18](#492151_1_En_3_Chapter.xhtml#Fig18) 显示了可用的选项以及如何将应用程序添加到例外列表。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig18_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig18_HTML.jpg)


    图 3-18

    防火墙例外和可配置选项


    # 高级安全选项


    您可能已经注意到`Security & Privacy System Preference`上的`Advanced`按钮。单击该按钮时，您将有几个可以配置的附加选项，这两个选项都真正面向共享计算环境，如计算机实验室或公共区域。图
    [3-19](#492151_1_En_3_Chapter.xhtml#Fig19) 显示了这些选项。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig19_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig19_HTML.jpg)


    图 3-19

    高级安全性与隐私选项


    *   **在 x 分钟不活动后注销**：此选项可以配置为在指定时间内无用户交互后，自动将 Mac 返回到登录窗口。如果有人在公共场所离开并让计算机保持使用唯一用户帐户登录的状态，这有助于保护用户数据。

    *   **需要管理员密码才能访问系统范围的偏好设置**：您可能会注意到许多（但并非全部）系统偏好设置都有一个锁定图标，可以锁定非管理员用户所做的更改。选中此选项的复选框会在**所有**系统偏好设置面板上放置一个锁定图标。这允许系统管理员设置通常可由标准用户修改的特定用户设置，并保持这些设置不变。'
  raw: "## FileVault\n\n*FileVault* is Apple’s build-in disk encryption technology,\
    \ and it is currently at version 2.0\\. To enable FileVault, you use the *Security\
    \ & Privacy System Preference* and click the **Turn on FileVault**… button in\
    \ the FileVault tab as shown in Figure [3-11](#492151_1_En_3_Chapter.xhtml#Fig11).\n\
    \n![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig11_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nTurn on FileVault encryption in the Security & Privacy System\
    \ Preference\n\nWhen you are enabling FileVault, you need to configure a recovery\
    \ key option in the event that you want to decrypt the drive or mount it on another\
    \ Mac. For personal use, you may want to configure your iCloud account to decrypt\
    \ the drive. For small businesses or companies that only need to support FileVault\
    \ encryption on a couple of Macs, it is recommended to create a recovery key for\
    \ each system and save the key strings somewhere secure that you can reference\
    \ if you ever need to decrypt the drive. This option is shown in Figure [3-12](#492151_1_En_3_Chapter.xhtml#Fig12).\n\
    \n![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig12_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nSelecting a FileVault recovery key\n\n### FileVault Institutional\
    \ Recovery Key\n\nWhat if you have hundreds or *thousands* of Macs that need to\
    \ be encrypted and you don’t want to manage individual recovery key strings for\
    \ every individual user or machine? Fortunately, Apple provides the option to\
    \ create and deploy an **Institutional Recovery Key** (IRK) for use on every Mac\
    \ in your organization. Deploying an IRK involves three steps: creating the **master\
    \ keychain** on one Mac, editing a copy of the master keychain to **remove the\
    \ private key**, and then **deploying** the configuration to all the other Macs.\n\
    \nCreating the FileVault key involves using the command line interface. Open the\
    \ Terminal and enter the following command at the prompt to create the master\
    \ keychain:\n\n```\nsecurity create-filevaultmaster-keychain ~/Desktop/FileVaultMaster.keychain\n\
    ```\n\nYou will be prompted to create a password. Follow the prompts to create\
    \ and verify the password. When it is finished executing the command, you will\
    \ have a file on your desktop called **FileVaultMaster.keychain** as seen in Figure\
    \ [3-13](#492151_1_En_3_Chapter.xhtml#Fig13). This is an original copy of the\
    \ private recovery key and can be used to unlock any Mac in your organization\
    \ that is configured to use the IRK. You will want to copy this to a secure location\
    \ and limit access to it to only authorized personnel.\n\n![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig13_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13\n\nThe command has generated a FileVaultMaster keychain on the desktop\n\
    \nNext, we need to prepare a copy for deployment to other Macs:\n\n![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig16_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig16_HTML.jpg)\n\
    \nFigure 3-16\n\nFileVault doesn’t prompt for a recovery key option; it uses the\
    \ IRK automatically instead\n\n1.  Open the **FileVaultMaster.keychain** file\
    \ with the *Keychain Access* application.\n\n2.  In the *Keychain Access* application,\
    \ click **FileVaultMaster** on the left side to select it. If required, click\
    \ the **padlock** icon and authenticate to unlock it. The password will be the\
    \ same one you used when you created the **FileVaultMaster** file in the Terminal.\n\
    \n3.  Locate the *private key* file on the right called **FileVault Master Password\
    \ Key** shown in Figure [3-14](#492151_1_En_3_Chapter.xhtml#Fig14). Click it to\
    \ select it and then choose **Delete** from the **Edit** menu to delete it. You\
    \ now have a keychain file that is missing the private key.\n\n![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig14_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14\n\nDelete the FileVault Master Password Key\n\nWe are now ready\
    \ to deploy the IRK to other Macs. Follow these steps on each Mac you want to\
    \ configure to use the IRK.\n\n4.  Copy the FileVaultMaster.keychain file that\
    \ we modified to the ***/Library/Keychains/*** folder as shown in Figure [3-15](#492151_1_En_3_Chapter.xhtml#Fig15).\n\
    \n![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig15_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15\n\nCopy the modified keychain file to the /Library/Keychains/ directory\
    \ on each client Mac you want to use the IRK\n\n5.  Open the Terminal application\
    \ and enter the following commands to set the file’s permissions properly. These\
    \ commands set the owner to **root**, the group to **wheel,** and then set the\
    \ proper read/write permissions we want:\n\n```\n    sudo chown root:wheel /Library/Keychains/FileVaultMaster.keychain\n\
    \    sudo chmod 644 /Library/Keychains/FileVaultMaster.keychain\n    ```\n\n6.\
    \  Open the *Security & Privacy System Preference* and browse to the FileVault\
    \ tab. Click the button to turn FileVault on. If you did this correctly, instead\
    \ of being prompted to create a recovery key, you will get a message like the\
    \ one in Figure [3-16](#492151_1_En_3_Chapter.xhtml#Fig16).\n\nPro Tip\n\nYou\
    \ may have a situation where FileVault is already turned on for some of the machines\
    \ in your organization that you will want to convert to the IRK. If this is the\
    \ case, after copying the keychain file and setting the proper file permissions,\
    \ you can enter a command into the Terminal to convert the existing FileVault\
    \ recovery key to your Institutional Recovery Key.\n\nThe command to convert existing\
    \ FileVault instances to the Institutional Recovery Key:\n\n```\nsudo fdesetup\
    \ changerecovery -institutional -keychain /Library/Keychains/FileVaultMaster.keychain\n\
    ```\n\n## Firewall\n\nApple provides a built-in software Firewall for *macOS*\
    \ that is disabled by default. To configure it, open the *Security & Privacy System\
    \ Preference* and choose the **Firewall** tab. Here you can turn the Firewall\
    \ on/off. Once the Firewall is enabled, you can configure the various options.\
    \ Figure [3-18](#492151_1_En_3_Chapter.xhtml#Fig18) shows the available options\
    \ and how to add applications to the exception list.\n\n![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig18_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig18_HTML.jpg)\n\
    \nFigure 3-18\n\nFirewall exceptions and configurable options\n\n## Advanced Security\
    \ Options\n\nYou may have noticed the **Advanced** button on the *Security & Privacy\
    \ System Preference*. When you click that button, you will have a couple of additional\
    \ options that you can configure, and both are really geared toward shared computing\
    \ environments like computer labs or public areas. Figure [3-19](#492151_1_En_3_Chapter.xhtml#Fig19)\
    \ shows these options.\n\n![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig19_HTML.jpg](images/492151_1_En_3_Chapter/492151_1_En_3_Fig19_HTML.jpg)\n\
    \nFigure 3-19\n\nAdvanced Security & Privacy options\n\n*   **Log out after x\
    \ minutes of inactivity:** This can be configured to automatically return the\
    \ Mac to the login window after a specified amount of time with no user interaction.\
    \ This is helpful for protecting user data if someone walks away and leaves a\
    \ computer signed in with a unique user account in a public place.\n\n*   **Require\
    \ an administrator password to access system-wide preferences:** You may notice\
    \ that many—but not all—System Preferences feature a padlock that can lock down\
    \ changes by non-admin users. Checking the box for this option places a padlock\
    \ on **all** System Preference panes. This allows system administrators to set\
    \ specific user settings that would normally be modifiable by Standard users and\
    \ keep them that way."
  trans: '

    # FileVault


    `FileVault`是苹果内置的磁盘加密技术，目前版本为 2.0。要启用`FileVault`，请使用`Security & Privacy System
    Preference`，然后在 FileVault 标签页中点击**Turn on FileVault**…按钮，如图 3-11 所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig11_HTML.jpg](img/492151_1_En_3_Fig11_HTML.jpg)


    图 3-11

    在安全性与隐私系统偏好设置中启用 FileVault 加密


    启用`FileVault`时，需要配置一个恢复密钥选项，以防需要解密驱动器或在另一台 Mac 上装载它。对于个人使用，您可能希望配置您的 iCloud 帐户来解密驱动器。对于小型企业或公司，如果只需要在几台
    Mac 上支持`FileVault`加密，建议为每个系统创建一个恢复密钥，并将密钥字符串保存在安全的地方，以便在需要解密驱动器时参考。此选项如图 3-12
    所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig12_HTML.jpg](img/492151_1_En_3_Fig12_HTML.jpg)


    图 3-12

    选择 FileVault 恢复密钥


    ## FileVault 机构恢复密钥


    如果您有数百或*数千*台需要加密的 Mac，并且您不想为每个用户或每台机器管理单独的恢复密钥字符串，该怎么办？幸运的是，苹果提供了为组织中的每台 Mac 创建和部署**机构恢复密钥**（IRK）的选项。部署
    IRK 涉及三个步骤：在一台 Mac 上创建**主钥匙串**，编辑主钥匙串的副本以**移除私钥**，然后将配置**部署**到所有其他 Mac。


    创建`FileVault`密钥需要使用命令行界面。打开`Terminal`，在提示符处输入以下命令来创建主钥匙串：


    ```

    security create-filevaultmaster-keychain ~/Desktop/FileVaultMaster.keychain

    ```


    系统会提示您创建密码。按照提示创建并验证密码。命令执行完毕后，您的桌面上会出现一个名为`FileVaultMaster.keychain`的文件，如图 3-13
    所示。这是私钥恢复密钥的原始副本，可用于解锁组织中任何配置为使用 IRK 的 Mac。您需要将其复制到安全位置，并限制仅授权人员可以访问。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig13_HTML.jpg](img/492151_1_En_3_Fig13_HTML.jpg)


    图 3-13

    该命令已在桌面上生成了一个 FileVaultMaster 钥匙串


    接下来，我们需要准备一份用于部署到其他 Mac 的副本：


    1.  使用`Keychain Access`应用程序打开`FileVaultMaster.keychain`文件。

    2.  在`Keychain Access`应用程序中，单击左侧的`FileVaultMaster`以选中它。如果需要，单击**padlock**图标并进行身份验证以解锁它。密码与您在`Terminal`中创建`FileVaultMaster`文件时使用的密码相同。

    3.  在右侧找到名为`FileVault Master Password Key`的*私钥*文件，如图 3-14 所示。单击它以选中，然后从`Edit`菜单中选择`Delete`将其删除。现在您就有了一个缺少私钥的钥匙串文件。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig14_HTML.jpg](img/492151_1_En_3_Fig14_HTML.jpg)


    图 3-14

    删除 FileVault Master Password Key


    现在我们已经准备好将 IRK 部署到其他 Mac。在每台您想要配置使用 IRK 的 Mac 上，请按照以下步骤操作。


    4.  将我们修改过的`FileVaultMaster.keychain`文件复制到`/Library/Keychains/`文件夹，如图 3-15 所示。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig15_HTML.jpg](img/492151_1_En_3_Fig15_HTML.jpg)


    图 3-15

    将修改后的钥匙串文件复制到要使用 IRK 的每台客户端 Mac 的`/Library/Keychains/`目录


    5.  打开`Terminal`应用程序，输入以下命令来正确设置文件的权限。这些命令将所有者设置为`root`，组设置为`wheel`，然后设置我们想要的正确读/写权限：


    ```

    sudo chown root:wheel /Library/Keychains/FileVaultMaster.keychain

    sudo chmod 644 /Library/Keychains/FileVaultMaster.keychain

    ```


    6.  打开`Security & Privacy System Preference`并浏览到 FileVault 标签页。单击按钮以启用`FileVault`。如果操作正确，您将不会收到创建恢复密钥的提示，而是会看到类似图
    3-16 中的消息。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig16_HTML.jpg](img/492151_1_En_3_Fig16_HTML.jpg)


    图 3-16

    FileVault 不会提示输入恢复密钥选项；它会自动使用 IRK


    **专业提示**

    您可能会遇到这样一种情况：组织中的一些机器已经启用了`FileVault`，而您希望将其转换为使用 IRK。如果是这种情况，在复制钥匙串文件并设置正确的文件权限后，您可以在`Terminal`中输入一个命令，将现有的`FileVault`恢复密钥转换为您机构的恢复密钥。


    将现有的`FileVault`实例转换为机构恢复密钥的命令：


    ```

    sudo fdesetup changerecovery -institutional -keychain /Library/Keychains/FileVaultMaster.keychain

    ```


    # 防火墙


    苹果为`macOS`提供了一个内置的软件防火墙，默认情况下是禁用的。要配置它，请打开`Security & Privacy System Preference`并选择`Firewall`标签页。在这里，您可以打开或关闭防火墙。启用防火墙后，您可以配置各种选项。图
    3-18 显示了可用的选项以及如何将应用程序添加到例外列表。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig18_HTML.jpg](img/492151_1_En_3_Fig18_HTML.jpg)


    图 3-18

    防火墙例外和可配置选项


    # 高级安全选项


    您可能已经注意到`Security & Privacy System Preference`上的`Advanced`按钮。单击该按钮时，您将有几个可以配置的附加选项，这两个选项都真正面向共享计算环境，如计算机实验室或公共区域。图
    3-19 显示了这些选项。


    ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig19_HTML.jpg](img/492151_1_En_3_Fig19_HTML.jpg)


    图 3-19

    高级安全性与隐私选项


    *   **在 x 分钟不活动后注销**：此选项可以配置为在指定时间内无用户交互后，自动将 Mac 返回到登录窗口。如果有人在公共场所离开并让计算机保持使用唯一用户帐户登录的状态，这有助于保护用户数据。

    *   **需要管理员密码才能访问系统范围的偏好设置**：您可能会注意到许多（但并非全部）系统偏好设置都有一个锁定图标，可以锁定非管理员用户所做的更改。选中此选项的复选框会在**所有**系统偏好设置面板上放置一个锁定图标。这允许系统管理员设置通常可由标准用户修改的特定用户设置，并保持这些设置不变。

    '
- fmt: '## 总结


    在本章中，我们涵盖了保护Mac安全的几种方法，以及Apple在核心安装的`macOS`中提供的各种内置安全功能，并了解了`Transparency, Consent,
    and Control`等新的、不断发展的安全框架。在深入探讨了Mac的两个章节之后，我们将转换主题，接下来探索`iOS`和`iPadOS`。


    # iOS客户端管理


    与`macOS`相比，`iOS`以及延伸的`iPadOS`是相对年轻的操作系统。它于2007年随第一代`iPhone`推出，至今只有12年多一点的历史，目前已是第十三个版本。与桌面操作系统相比，`iOS`的管理要简单直接得多。它最初被设想为电话听筒的操作系统，不具备传统计算机操作系统的要求，例如从互联网任何地方安装下载的软件或强大的外围设备支持。虽然`iOS`比真正的桌面级系统简单，但在支持大量`iPhone`和`iPad`时，系统管理员应熟悉一些关键功能。本章为理解Apple为运行`iOS`
    13和`iPadOS`（13）的iOS设备提供的配置、安全和故障排除能力奠定了基础。


    ## iOS硬件支持


    `iPhone`和`iPad`的物理按钮或开关非常少。在大多数情况下，iOS设备不被认为是用户可维修的，这意味着只有`Apple Authorized Repair
    Center`或`Apple Retail Store`可以维修它们。除了标准重启，你可以尝试修复`iPad`或`iPhone`常见问题的另一种技术是使用特殊按钮组合进行`forced
    restart`。


    ### 强制重启


    当设备完全冻结或锁死，简单的重启无法选择时，你可能需要强制重启设备。正确执行时，`forced restart`将导致所有应用程序关闭，并完全关闭和重启设备。图[4-1](#492151_1_En_4_Chapter.xhtml#Fig1)至[4-5](#492151_1_En_4_Chapter.xhtml#Fig5)提供了截至本文撰写时各主要iOS设备系列的强制重启说明。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig5_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig5_HTML.jpg)


    图 4-5

    带Home键的iPad强制重启组合键


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig4_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig4_HTML.jpg)


    图 4-4

    不带Home键的iPad强制重启组合键


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig3_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig3_HTML.jpg)


    图 4-3

    iPhone 6和iPhone SE的强制重启组合键


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig2_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig2_HTML.jpg)


    图 4-2

    iPhone 7系列的强制重启组合键


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig1_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig1_HTML.jpg)


    图 4-1

    iPhone 8系列、iPhone X系列和iPhone 11系列设备的强制重启组合键


    专业提示

    在某些情况下，当显示屏休眠时，iOS设备可能会锁死，看起来就像设备完全没电了一样。假设电池电量足以驱动设备，使用`forced restart`方法也可以唤醒看起来已“死机”但只是因为显示屏关闭而锁死的设备。


    ### 电池健康


    每台iOS设备中的锂离子电池都不会永久使用。随着反复使用，电池最终将无法保持其最大电量，从而缩短每次充电后设备的运行时间。Apple在2017年陷入了一些麻烦，当时它确认在电池超过其使用寿命后，会限制iOS设备的性能。在随后的消费者强烈反对之后，他们新增了一个`Battery`设置，为用户提供关于他们的应用程序如何影响电池、电池健康状况以及电池对设备性能影响（如果有）的信息。图[4-6](#492151_1_En_4_Chapter.xhtml#Fig6)提供了电池设置功能的几张截图。


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig6_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig6_HTML.jpg)


    图 4-6

    iOS 13的电池和电池健康设置


    通过进入`Settings`应用 > `Battery`来访问`Battery`设置。你可以通过进入`Settings`应用 > `Battery` > `Battery
    Health`来查看电池健康信息。


    `Low Power Mode`通过禁用某些后台功能来减少电池消耗，从而让你的`iPhone`在一次充电后使用更长时间。建议在需要手机但电池电量非常低的情况下临时启用此设置。请注意，它可能会干扰某些应用或服务的性能或功能。


    检查电池健康状况有助于确定是否需要在它成为问题之前进行更换。`Maximum Capacity`和`Performance Ratings`将帮助你判断电池是否状态良好。设备也会在需要时提供警告和更换电池的建议。在iOS设备中更换电池起价为79美元，可以在`Apple
    Authorized Repair`服务点和`Apple Retail Store`零售店进行。


    ## iOS支持


    与基本的硬件故障排除步骤类似，iOS设备的软件支持选项也很有限。如果你能访问主屏幕和`Settings`应用，你可以使用各种内置的`iOS Reset`功能。如果你无法访问这些，那么对软件相关问题进行故障排除或可能恢复设备的唯一其他方法是通过`iOS
    Recovery mode`。'
  raw: '## Summary


    In this chapter, we covered several ways to secure your Mac and the various built-in
    security features that Apple provides with the core install of *macOS* and learned
    about new and continually developing security frameworks like *Transparency, Consent,
    and Control*. After two very thorough deep-dive chapters on the Mac, we are going
    to shift gears and explore the *iOS* and *iPadOS* next.


    # 4. iOS Client Administration


    *iOS* and *iPadOS,* by extension, are relatively young operating systems when
    compared to *macOS*. Having launched with the first *iPhone* in 2007, it is only
    a little over 12 years old and now on its thirteenth release. *iOS* is much simpler
    and more straightforward to manage than a desktop operating system. Originally
    envisioned as an OS for a telephone handset, it didn’t have the requirements of
    a traditional computer operating system, like the ability to install software
    downloaded from anywhere on the Internet or robust peripheral support. While *iOS*
    is less complicated than a true desktop-class system, there are a number of key
    features that system administrators should be familiar with when supporting fleets
    of *iPhones* and *iPads*. This chapter provides the foundation for understanding
    the capabilities that Apple provides for configuring, securing, and troubleshooting
    iOS devices running *iOS* 13 and *iPadOS* (13).


    ## iOS Hardware Support


    The *iPhone* and *iPad* feature very little in the way of physical buttons or
    switches. For the most part, iOS devices are not considered to be user serviceable,
    meaning that only an ***Apple Authorized Repair Center*** or ***Apple Retail Store***
    can repair them. Beyond a standard restart, one of the techniques that you can
    try in an attempt to fix common issues with *iPad* or the *iPhone* is a **forced
    restart** using special button combinations.


    ### Forced Restart


    When a simple restart is not an option because the device is completely frozen
    or locked up, you may need to force a restart of the device. When executed correctly,
    the **forced restart** will cause all Apps to close and completely shut down and
    restart the device. Figures [4-1](#492151_1_En_4_Chapter.xhtml#Fig1) to [4-5](#492151_1_En_4_Chapter.xhtml#Fig5)
    provide instructions for a forced restart on each of the major iOS device families
    available as of this writing.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig5_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    Forced restart combination for iPads with a Home button


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig4_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Forced restart combination for iPads without a Home button


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig3_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig3_HTML.jpg)


    Figure 4-3


    Forced restart combinations for the iPhone 6 and iPhone SE


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig2_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Forced restart combination for the iPhone 7 series


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig1_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Forced restart combinations for the iPhone 8 series, iPhone X series, and iPhone
    11 series devices


    Pro Tip


    In some cases, an iOS device will lock up when the display is asleep, appearing
    as though the device is completely dead. Assuming that the battery is charged
    enough to power the device, using the **forced restart** method can also work
    in reviving a device that appears dead, but is simply appearing to not power on
    because it is locked up with the display off.


    ### Battery Health


    The lithium-ion battery in every iOS device will not last forever. With repeated
    use, eventually the battery will not be able to hold its maximum charge, thus
    shortening the length of the time the device will run off each subsequent charge.
    Apple got into some hot water in 2017 when it confirmed that it had been throttling
    the performance of iOS devices when the batteries were past the end of their useful
    life. After the subsequent consumer backlash, they added a new *Battery* Setting
    that provided users with information on how their batteries were impacted by the
    Apps they were using, how healthy their battery was, and what kind of performance
    impact (if any) the battery had on their device. Figure [4-6](#492151_1_En_4_Chapter.xhtml#Fig6)
    provides a few screenshots of the Battery Setting in action.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig6_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    The iOS 13 Battery and Battery Health settings


    Access the *Battery* Setting by going to ***Settings*** *app* ➤ ***Battery***.
    You can view battery health information by going to ***Settings*** *app* ➤ ***Battery***
    ➤ ***Battery Health***.


    **Low Power Mode** allows your iPhone to last longer on a single charge by disabling
    some background functions to reduce battery drain. This is recommended as a temporary
    setting in situations where you need to have your phone but your battery is running
    very low. Note that it can interfere with the performance or functionality of
    some Apps or services.


    Checking the status of your battery’s health can help to determine if it’s time
    to get it replaced before it becomes a problem. **Maximum Capacity** and **Performance
    Ratings** will help you determine if your battery is in good condition or not.
    The device will also provide a warning and a recommendation to replace the battery
    when needed. Replacing the battery in an iOS device starts at $79 and can be performed
    at ***Apple Authorized Repair*** locations and the ***Apple Retail Store*** locations.


    ## iOS Support


    Similar to the basic hardware troubleshooting steps, there are just a handful
    of software support options with iOS devices. If you have access to the Home Screen
    and the Settings app, you can use the various built-in **iOS Reset** functions.
    If you do not have that access, the only other way to troubleshoot software-related
    issues or to potentially restore the device is through *iOS Recovery mode*.'
  trans: '

    ## 总结


    在本章中，我们探讨了保护 Mac 安全的多种方法，了解了 Apple 在核心安装的`macOS`中提供的各种内置安全功能，并认识了`Transparency,
    Consent, and Control`等新兴的安全框架。在深入研究了 Mac 相关的两个章节后，我们将转换主题，接下来探索`iOS`和`iPadOS`。


    # iOS 客户端管理


    与`macOS`相比，`iOS`及其衍生的`iPadOS`是相对年轻的操作系统。它于 2007 年随第一代`iPhone`一同发布，至今仅有十多年历史，目前已发展到第十三个主要版本。相较于桌面操作系统，`iOS`的管理要简洁直接得多。其最初被设计为手机的操作系统，并不具备传统计算机操作系统的要求，例如从互联网任意位置安装下载的软件或强大的外围设备支持。虽然`iOS`比真正的桌面级系统简单，但在支持大量`iPhone`和`iPad`时，系统管理员仍需熟悉一些关键功能。本章为理解
    Apple 为运行`iOS` 13 和`iPadOS`（13）的设备提供的配置、安全和故障排除能力奠定了基础。


    ## iOS 硬件支持


