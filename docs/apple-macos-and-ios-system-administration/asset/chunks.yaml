- fmt: '# iOS Device Storage


    Similar to the packaged applications in `macOS`, `iOS` also features `App packages`
    in the form of a single `App` icon. These are sandboxed application environments
    where the executable, preferences, and a unique `Documents` folder are self-contained
    inside each `App`. Figure 4-12 provides a diagram of the general layout of an
    iOS App bundle.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig12_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig12_HTML.jpg)

    **Figure 4-12** The various folders and files included in a given App package


    Since iOS devices are primarily personal devices with high megapixel cameras capturing
    tons of photos and videos that are consuming a lot of storage, along with games
    and other Apps, disk space always seems to be at a premium. Fortunately, `iOS`
    has a pretty robust way of tracking the storage being used on your device and
    displaying it in an actionable way. If you browse to `Settings` app > `General`
    > `iPhone` (or `iPad`) > `Storage`, you will see something similar to the screenshot
    in Figure 4-13.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig13_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig13_HTML.jpg)

    **Figure 4-13** iPhone storage information and actionable options to free up space
    in iOS 13


    Apple provides useful recommendations for short-term and long-term storage savings.
    You can enable the `Offload Unused Apps` option to temporarily delete the Apps
    that you don’t use regularly. Then later on when you need to use them again, it
    will re-download them. Typically, when you delete an App manually on a device,
    it will remove any documents or settings associated with the App as well. When
    using `Offload Unused Apps`, it will retain that data instead.


    # iOS Accessibility Features


    Similar to `macOS`, Apple has award-winning accessibility features for iOS devices
    built right into the operating system. If you or users in your organization can
    benefit from these assistive features, I recommend exploring the various vision,
    motor skills, and hearing accommodations to best understand how they work.


    In addition to these features, it is important to understand how to enable and
    disable the features in real time, as they can often change the way the device
    looks or performs. Figure 4-14 shows the configuration settings for enabling the
    various accessibility features using a `triple-click` of the `Side` button (or
    `Home` button on devices with a physical Home button). You can tap on these technologies
    to enable them with a check mark and then tap and drag to adjust the priority
    in the list if you have more than one enabled. You can also access these settings
    through `Settings` app > `Accessibility` > `Accessibility Shortcut` in iOS 13.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig14_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig14_HTML.jpg)

    **Figure 4-14** Accessibility Shortcut options in iOS 13


    ## Guided Access


    The other feature tucked under the `Accessibility` settings that can be helpful
    in cases where you are using an iOS device as a kiosk or something similar is
    `Guided Access`. The `Guided Access` feature can be enabled in iOS 13 under `Settings`
    > `Accessibility` > `Guided Access`. When this is enabled, you can `triple-click`
    the `Home` (or `Side`) button in any App and lock the device into only using that
    App. You can also disable any auto-lock features after the device has been idle
    for some period of time. Figure 4-15 shows an example of the Guided Access configuration
    settings on an iPad being used as a mobile ordering kiosk.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig15_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig15_HTML.jpg)

    **Figure 4-15** Guided Access options in iOS 13


    > Pro Tip

    > One additional feature of `Guided Access` is the ability to disable interaction
    with parts of the display when using a single App. For example, let’s say you
    want to use `Guided Access` with a web page in `Safari`. You may also want to
    disable the ability for the user to access the address bar or the ability to create
    new tabs, thus locking the user to a single web page. To do this, enable `Guided
    Access` on the web page you want to lock down, `triple-click` the `Home` button
    to access `Guided Access` options, and then `draw a circle` around the areas of
    the screen that you want to disable.


    # Network Settings


    While there is not a specific network settings pane in `iOS`, the root of the
    `Settings` app provides access to `Wi-Fi`, `Bluetooth`, and `cellular data` (if
    the device supports it).


    ## Wi-Fi


    To configure wireless settings, you can tap the `Wi-Fi` button from the list near
    the top of the `Settings` app as shown in Figure 4-16. The Wi-Fi settings will
    poll the network around you and display a list of available wireless networks.
    Tapping the button labeled `Other...` allows you to configure a hidden wireless
    network or preconfigure a wireless network that you want devices to automatically
    join after it’s deployed to an end user.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig16_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig16_HTML.jpg)

    **Figure 4-16** The Wi-Fi settings in iOS 13


    Tapping the little blue `"i"` button to the right of the wireless network allows
    you to configure specific wireless settings as shown in Figure 4-17. You can configure
    your `TCP/IP` settings, `DNS` settings, and `HTTP Proxy` settings here. If you
    have already connected to a wireless network, you can tap the `Renew Lease` button
    to force a release and renew of the DHCP IP address lease or tap `Forget This
    Network` to disconnect from the network and not attempt to auto-join it again
    in the future.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig17_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig17_HTML.jpg)

    **Figure 4-17** Advanced Wi-Fi network options in iOS 13


    ## Cellular Data


    If your device supports `cellular data`, you can manage your data settings under
    `Settings` > `Cellular Data` as shown in Figure 4-18. Depending on your carrier
    and plan, you may have options here to enable a `Personal Hotspot`, where your
    iOS device shares your cellular data connection to other devices via `Wi-Fi`.
    You can toggle `Cellular Data on/off` to restrict data use to Wi-Fi only and conserve
    your plan’s data allowance when near wireless networks. Some carriers have various
    roaming options, Wi-Fi calling features, or other carrier services that can be
    accessed from this page. You can also scroll through the list of installed Apps
    and toggle their ability to use cellular data. This can be especially beneficial
    for users with limited data plans.


    ![../images/492151_1_En_4_Chapter/492151_1_En_4_Fig18_HTML.jpg](images/492151_1_En_4_Chapter/492151_1_En_4_Fig18_HTML.jpg)

    **Figure 4-18** Cellular data options for a Verizon wireless device running iOS
    13'
