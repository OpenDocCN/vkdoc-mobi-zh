- fmt: 'Congratulations! You have successfully created an Open Directory domain, populated
    it with users, bound a client Mac to the domain, and signed in successfully with
    a Network user account.


    Pro Tip


    A quick note about file sharing and Open Directory: Prior to `macOS Mojave`, you
    could share files and folders and set permissions for Open Directory Network accounts.
    If you have shared folders on an Open Directory Master or Replica, you won’t be
    able to map those shares even if you are using the local user account, because
    it will not authenticate. If you plan to create shares on a Mac and share them
    with other Macs, the host cannot be running the Open Directory service; and even
    if you bind that Mac to the Open Directory domain, you cannot authenticate to
    those shares using Network accounts. The reason for this is because the ACL groups
    are no longer created in the directory for file sharing access like they used
    to be in older versions of Server. There are unofficial fixes out there for this,
    but that is outside the scope of this book.


    ## Certificates


    When you completed the steps to bind your Mac client to Open Directory, you may
    have received a message stating `This server does not provide a secure (SSL) connection.
    Do you want to continue?` In that case, because we were setting up a test server,
    we chose to ignore this message and continue. However, in a production environment,
    you will want to use SSL to secure your client’s communication with the server
    to prevent man-in-the-middle attacks, among others. Even if you are not using
    Open Directory and you are only deploying your server for use with Profile Manager,
    you will need some basic understanding of certificates and how to change them
    in macOS Server.


    ### FallBack SSL Certificate


    The most basic certificate that Apple provides is the `Fallback Certificate`.
    It gets created when you install the Server application, and it is available but
    not often used. You can find this certificate by opening the `Keychain Access`
    utility on your Mac server and clicking the `Certificates` for the `System` keychain.


    ### Self-Signed Certificates


    In the case of Open Directory, Apple provides a self-signed certificate that you
    can use that is generated when the Open Directory service is installed. Self-signed
    certificates will prompt users to trust them and are not usually the best choice
    for production installation. We can adjust the certificate that is being used
    for Open Directory if we want to replace this with a trusted third-party certificate.


    ### Managing Certificates


    We can change out the certificates we are using for any service at any time. Before
    we do anything with these certificates, we need to stop the services that are
    using them. In this case, we need to temporarily turn off the Open Directory service
    by clicking the on/off toggle switch in the top-right corner of the Open Directory
    window as shown in Figure [7-40](#492151_1_En_7_Chapter.xhtml#Fig40).


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig40_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig40_HTML.jpg)


    Figure 7-40

    Disable Open Directory before attempting to make any changes to certificates


    Now that the service has been disabled, click the `Certificates` button in the
    sidebar. You will probably have something similar to Figure [7-41](#492151_1_En_7_Chapter.xhtml#Fig41)
    with some kind of mix of certificates and the `Secure services using` pop-up menu.
    Using this menu, we can select which services are using which certificates.


    Click the `Secure services using` pop-up menu and choose `Custom`. You will be
    presented with some services and their matching certificates. I have two certificates
    to choose from. Both of these were generated automatically for me by the server,
    but only one is valid. I’m going to select the `MacServer` certificate in the
    `Certificate` column and click `OK` to continue.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig41_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig41_HTML.jpg)


    Figure 7-41

    Selecting the certificate you want to use for a particular service


    Now you will see that I’m securing my Open Directory service using my MacServer
    certificate. The last step is to open the Keychain Access application and search
    for the `OPENDIRECTORY_SSL_IDENTITY` identity preference. `Double-click` it to
    open it and select a new `Preferred Certificate` as shown in Figure [7-42](#492151_1_En_7_Chapter.xhtml#Fig42).
    Click the `Save Changes` button to close it.


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig42_HTML.jpg](images/492151_1_En_7_Chapter/492151_1_En_7_Fig42_HTML.jpg)


    Figure 7-42

    Selecting the certificate for the SSL identity for the Open Directory service


    Go back to the Open Directory settings and restart the service by flipping the
    switch back to the `on` position. If you go back to your test Mac and unbind it
    from our domain and then join it again, you will be prompted to trust the new
    certificate.


    Pro Tip


    To unbind a Mac from the domain, log in as a user with local administrative privileges
    and use the `Users & Groups System Preference` ➤ `Login Options` dialog and click
    the `Edit` button, similar to how you joined the domain but in reverse. In the
    sheet that slides out and displays the Open Directory server, highlight that server
    and click the `-` button to remove it.'
