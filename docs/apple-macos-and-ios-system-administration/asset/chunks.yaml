- fmt: '# Managing DEP Clients


    Now that we have our MDM server configured, we need to add a couple of clients
    from the DEP database to our specific server. Because I can have multiple MDM
    servers in my organization, I need to manually move devices into the server I
    want to use. If you have one MDM server and you want to manage all of your devices
    with that single server, you can move all of the devices into that single server
    and set it up as the `Default Device Assignment` so any newly purchased devices
    automatically get assigned to this MDM server.


    To do this, simply browse to `Settings ➤ Device Management Settings ➤ Default
    Device Assignment` in the Apple School Manager/Apple Business Manager and click
    the `Edit` button and select the specific MDM server for each device group and
    then click `Apply` to save changes as shown in Figure [8-13](#492151_1_En_8_Chapter.xhtml#Fig13).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig13_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig13_HTML.jpg)


    Figure 8-13

    Configuring the Default Device Assignment by product


    Next let’s assign a test iPad and a test MacBook Pro to our newly created MDM
    server. To get started, click the `Device Assignments` link under the `Devices`
    heading in Apple School Manager. You should see something similar to Figure [8-14](#492151_1_En_8_Chapter.xhtml#Fig14).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig14_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig14_HTML.jpg)


    Figure 8-14

    The Manage Devices page in Apple School Manager


    From this screen, you can either select devices individually by searching for
    them or entering their serial number, or you can upload a `*.csv` file to assign
    them in bulk. Since we only have two devices to assign, we are going to click
    the `Search Devices` link in the top-left corner of the screen and manually search
    for our devices by serial number. I entered my serial number for an `iPad Air`
    that I have, and it found the device in the DEP database as shown in Figure [8-15](#492151_1_En_8_Chapter.xhtml#Fig15).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig15_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig15_HTML.jpg)


    Figure 8-15

    The search device page allows me to assign a device to my specific MDM server


    From this screen, I can view the order number (for proof of purchase) as well
    as assign it to a specific MDM server. In my case I am going to select `"My Company’s
    MDM Server"` from the pop-up menu. I can also release this device by clicking
    the `Release Device` button. I’m going to assign this to my MDM server and then
    click the `Done` button.


    Apple School Manager will update the device assignment, and I can click the `Done`
    button again to exit. To confirm that my device was assigned, I can browse to
    `Settings ➤ My Company’s MDM Server` and ensure that it lists `1 iPad` under the
    `Devices` section as shown in Figure [8-16](#492151_1_En_8_Chapter.xhtml#Fig16).
    Repeat this process for additional iOS devices and at least one test Mac.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig16_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig16_HTML.jpg)


    Figure 8-16

    Confirmation that our test device got assigned to the new MDM server


    Now that we have at least one Mac and one iOS device connected to our MDM, we
    are all set to begin managing these devices in Profile Manager. We will explore
    Profile Manager in detail in Chapter [9](#492151_1_En_9_Chapter.xhtml).


    # Managed Apple IDs


    I have touched on `Managed Apple IDs` a few times throughout the various chapters
    in this book. `Managed Apple IDs` are those that are created by and tied to your
    organization through Apple School Manager and Apple Business Manager. This allows
    your organization to provide each student or employee with a noncommercial `Apple
    ID` that can be used for things like `iTunes U` or `iCloud`. They cannot be used
    to purchase Apps or Books on the various App Stores, but you can assign Apps and
    Books to `Managed Apple IDs` using MDM as well as perform password resets for
    those IDs without Apple’s involvement.


    The typical format of a Managed Apple ID is `username@appleid.company.com` or
    `username@appleid.institution.edu`. You can create these manually for each user
    in your organization, or you can have them automatically provisioned through an
    `Active Directory` connector. Apple provides for federated authentication using
    `Microsoft’s Azure Active Directory`. Instead of creating `Managed Apple IDs`
    for every user in your organization, you can use Security Assertion Markup Language
    (SAML) to connect your `Azure AD` to Apple School Manager or Apple Business Manager.
    The first time a user logs in with their AD credentials, a `Managed Apple ID`
    is created for them.


    You can configure these settings in `Apple School Manager` or `Apple Business
    Manager` by browsing to `Settings ➤ Accounts` and adjust the settings as shown
    in Figure [8-17](#492151_1_En_8_Chapter.xhtml#Fig17).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig17_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig17_HTML.jpg)


    Figure 8-17

    Account settings for Managed Apple IDs and Azure AD


    # Redeeming Apps and Books with VPP


    Finally, the last thing we need to configure for use with Profile Manager is Volume
    Purchase Program (VPP) so we can redeem and assign Apps and Books to our devices.
    This is similar to the process we followed to create our MDM connection to Profile
    Manager.


    ## Configure VPP For Profile Manager


    1. The first step is to sign into our Mac server and open the `Server` application
    and click the Profile Manager service. Under the `Deployment Programs` section,
    find `Volume Purchase for Apps and Books` and click the `Configure…` button as
    shown in Figure [8-18](#492151_1_En_8_Chapter.xhtml#Fig18).


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig18_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig18_HTML.jpg)


    Figure 8-18

    Click the Configure… button under the VPP section


    2. You will be prompted to choose a VPP token. Open `Apple School Manager` or
    `Apple Business Manager` and browse to `Settings ➤ Apps and Books`. Scroll down
    to the bottom section under the `My Server Tokens` heading and click the `Download`
    button next to your organization’s Location name as shown in Figure [8-19](#492151_1_En_8_Chapter.xhtml#Fig19)
    to save the file to your Desktop.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig19_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig19_HTML.jpg)


    Figure 8-19

    Click the Download button on the Apps and Books pane


    3. Once it downloads the `*.vpptoken` file to your computer, click the `Choose…`
    button in the Volume Purchase Configuration Assistant and then select the VPP
    token file, as shown in Figure [8-20](#492151_1_En_8_Chapter.xhtml#Fig20), and
    click `Continue`.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig20_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig20_HTML.jpg)


    Figure 8-20

    Upload the VPP token file into Profile Manager


    4. Once that is completed, the Volume Purchase for Apps and Books will be enabled,
    and we can use our MDM to deploy Apps and Books to users and devices using Profile
    Manager. Click `Done` to exit.


    # Summary


    In this chapter, you gained a solid foundation of the concepts around Mobile Device
    Management, Volume Purchase Program, and Apple School Manager/Apple Business Manager.
    Now that we have configured a connection to our Profile Manager server and added
    a couple of test devices, we are ready to move forward with the over-the-air management
    of these test endpoints.


    In Chapter [9](#492151_1_En_9_Chapter.xhtml), we will use the concepts we have
    learned to remotely configure our `iOS` and `macOS` devices using Profile Manager
    as our MDM.'
