    line and press **enter** as shown in Figure [10-28](#492151_1_En_10_Chapter.xhtml#Fig28).
    This will create a new empty package called ***RestartClientScript***.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig28_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig28_HTML.jpg)


    Figure 10-28


    The full munkipkg create new project command


    1.  Open Terminal and then open the ***munki-pkg-master folder*** on the Desktop
    and then **drag and drop** the ***munkipkg*** Unix executable into the Terminal
    to execute the *Munki-Pkg* utility as shown in Figure [10-27](#492151_1_En_10_Chapter.xhtml#Fig27).
    Do not press enter yet as we have to add some options to make the `munkipkg` command
    work.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig27_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig27_HTML.jpg)


    Figure 10-27


    Drag the Unix exec to the Terminal


    ## Deploying Software with Munki


    We have learned how to package a basic custom installer to run a script and how
    to import commercial software installation packages into Munki. In the next section,
    we will learn how to build Catalogs and Manifests to automate the installation
    process of these applications. The first step in deploying software with *Munki*
    is to get a client pointed to the ***munki_repo*** folder on our web server.'
  trans: '

    ### 应用程序包属性


    将软件导入 `Munki` 后，您可以通过双击列表中的软件包或选中它并点击工具栏中的**属性**按钮来更改其设置。这里我不会详细介绍所有选项，但确实有一些强大的设置可供您用来微调部署过程。以下是一些需要考虑的更重要的设置：


    *   **基本信息选项卡：** 允许您修改我们通过命令行工具导入软件时设置的选项。您可以指定安装后的重启操作，并为强制软件安装（如有必要）设置截止日期。

    *   **要求选项卡：** 允许您根据系统上已安装的现有软件来设置依赖关系，并为每个单独的软件包设置最低操作系统和最高操作系统版本。如果您想为运行较旧操作系统的客户端提供较旧版本的应用程序，并为使用较新操作系统的用户提供新版本的软件，这将特别有用。

    *   **安装脚本选项卡：** 在此处，您可以指定在软件安装运行前后要执行的脚本。这是在软件安装后自定义应用程序的强大方式。

    *   **卸载选项卡：** 在此处，您可以指定卸载过程，包括使用卸载脚本以及在卸载过程运行前后的脚本。


    ### 创建用于执行脚本的 Munki 包


    如果您还记得第 6 章，我们能够使用**发送 Unix 命令**工具将脚本发送到远程计算机。任何可以通过 `Apple Remote Desktop` 发送的单条命令或多个命令的脚本，都可以由
    `Munki` 打包并执行。在本节中，我们将探讨如何创建一个用于交付脚本的自定义包。


    在本节中，我们将使用一个新工具来创建自定义包。市面上有很多实用工具可以创建 `*.pkg` 文件。我们将使用一个名为 `Munki-Pkg` 的工具，它可以在以下地址获取：[`https://github.com/munki/munki-pkg`](https://github.com/munki/munki-pkg)。`Munki-Pkg`
    是一个命令行实用程序，因此没有图形用户界面。我们只需下载它，解压缩，并将解压后的文件夹复制到桌面。我们将通过终端切换到 `~/Desktop/munki-pkg-master/`
    目录来运行它。


    #### 创建用于运行脚本的包


    在本练习中，我们将创建一个用于运行脚本的包，该脚本将强制客户端 Mac 立即重启。


    1.  我们首先要做的是开发我们的脚本。这个脚本非常简单，因为它只有一个命令，但您可以创建一个包含多个命令、变量等的更高级脚本。使用终端或 Apple Remote
    Desktop 测试此命令，确保它能立即重启计算机：


    ```

    shutdown -r now

    ```


    计算机应立即重启。如果运行成功，我们现在就准备好了要在 `Munki` 中打包的脚本。


    **专业提示** 本练习的目的是演示如何创建自定义包来运行脚本。此示例重启脚本不建议在生产环境中与 Munki 一起使用，因为它可能导致您的客户端系统在不通知最终用户的情况下重启。


    2.  我们将继续创建一个新的空包。在 `munkipkg` 可执行文件的路径之后，在命令行中添加 `--create RestartClientScript`，然后按下**回车**键，如图
    10-28 所示。这将创建一个名为 `RestartClientScript` 的新空包。


    3.  如果成功，它会在您的主目录根目录下创建一个名为 `RestartClientScript` 的文件夹，在该文件夹内，您会看到 *build*、*payload*
    和 *scripts* 文件夹。我们将忽略 payload 文件夹，专注于 scripts 文件夹。继续在终端中通过输入 `cd /RestartClientScript/scripts/`
    切换到 scripts 目录。


    4.  进入 scripts 文件夹后，我们将再次使用 `VI` 来创建一个运行我们脚本的文件。输入 `vi postinstall`，在 `VI` 文本编辑器中创建一个名为
    `postinstall` 的新文件。该文件必须命名为 `postinstall`，以便在执行脚本时正确打包和运行。


    **专业提示** 软件打包超出了本书的范围，但网上有很多关于创建自定义安装包及其工作原理的好文章。您会发现，在任何包中都可以运行两个脚本：一个是 preinstall
    脚本，另一个是 postinstall 脚本。`macOS 安装器`会查找这两个文件，并在安装过程的适当时机执行它们。


    5.  使用**方向键**在文件中导航，然后按 **i** 键插入文本，就像本章前面使用 `VI` 时一样。输入我们的脚本，然后按 **Esc** 键退出插入模式。使用
    `:wq` 命令保存文件并退出 `VI`。您的终端窗口应类似于图 10-29。


    6.  您可以在 Finder 中浏览 scripts 文件夹，或在 `/scripts` 目录上执行 `ls` 命令，您会看到该目录下现在有一个 `postinstall`
    文件。最后一步是将此项目打包成一个 `*.pkg` 文件，然后可以上传到 `Munki`。**再次拖放** `munkipkg` 可执行文件到终端窗口，就像我们之前做的那样。**接着，拖放**
    `RestartClientScript` 文件夹到终端窗口，以附加项目路径，或直接输入项目文件的路径。当您的终端窗口看起来如图 10-30 所示时，按**回车**键以创建
    `RestartClientScript.pkg` 文件。


    7.  当命令成功运行时，我们应在终端中看到输出，表明在 `RestartClientScript` 项目文件夹的 `/build` 文件夹中创建了一个 `*.pkg`
    文件。如果您浏览到该目录，将会看到 `RestartClientScript-1.0.pkg` 文件，如图 10-31 所示。


    8.  现在，您可以像处理其他任何软件一样，使用 `munkiimport` 将此包添加到您的 `Munki` 环境中。


    ### 使用 Munki 部署软件


    我们已经学习了如何打包一个基本的自定义安装程序来运行脚本，以及如何将商业软件安装包导入到 Munki 中。在下一节中，我们将学习如何构建目录（Catalogs）和清单（Manifests）来自动化这些应用程序的安装过程。使用
    `Munki` 部署软件的第一步是让客户端指向我们 Web 服务器上的 `munki_repo` 文件夹。

    '
- fmt: '# 在客户端工作站上安装和配置 Munki


    我们将从在测试客户机上安装 `MunkiTools` 应用程序开始。您可以通过运行本章前面下载的 `MunkiTools` 包在客户机系统上交互式完成此操作，也可以使用
    `Apple Remote Desktop` 来完成。很可能，您会在生产环境中的多台 Mac 上安装 `Munki`，因此让我们在此任务中使用 `ARD`。


    ## 使用 ARD 安装 Munkitools


    在开始此练习之前，请准备一台测试用 Mac，如果尚未添加，请将其添加到您的 `ARD` 控制台中。


    1.  第一步是安装 `MunkiTools`。打开 `ARD` 并点击您的测试 Mac 以将其选中。点击工具栏中的 `Install` 按钮，并将 `munkitools.pkg`
    安装程序添加到软件包列表中。点击 `Install` 按钮，如图 [10-32](#492151_1_En_10_Chapter.xhtml#Fig32)
    所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig32_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig32_HTML.jpg)


    图 10-32


    使用 ARD 在您的测试 Mac 上安装 MunkiTools 软件包


    2.  安装完成后，它将强制计算机重启。接下来我们需要做的是运行一个脚本，该脚本将修改客户端上存储在`/Library/Preferences/`中的 `ManagedInstalls.plist`
    文件的几个键。在 `ARD` 中选中客户端，然后单击工具栏中的 `Unix` 按钮。在脚本窗口中输入以下几行，如图 [10-33](#492151_1_En_10_Chapter.xhtml#Fig33)
    所示。别忘了将命令设置为以 `root` 身份运行：


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig33_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig33_HTML.jpg)


    图 10-33


    将脚本输入到“发送 Unix 命令”窗口中


    ```bash

    #!/bin/sh

    defaults write /Library/Preferences/ManagedInstalls SoftwareRepoURL "http://192.168.1.5/munki_repo"

    defaults write /Library/Preferences/ManagedInstalls ClientIdentifier "site_default"

    defaults write /Library/Preferences/ManagedInstalls SuppressUserNotification -bool
    true

    ```


    我们来逐步了解这些行的作用。第一行是所有脚本都必需的，用于标识其为 shell 脚本。第 2–4 行使用 `defaults write` 命令来修改在`/Library/Preferences/`文件夹中找到的
    `ManagedInstalls.plist` 文件中的键。


    `SoftwareURL` 键将客户端指向我的 Web 服务器。您应确保其通过 `http` 指向您的 `Munki` Web 服务器的 `munki_repo`
    文件夹。


    `ClientIdentifier` 指向此客户端将用于确定哪些软件可用的清单。我们将在本章后面更详细地介绍清单。


    `SuppressUserNotification` 键是一个布尔值，我们将把它从默认值 `false` 更改为 `true`。根据您的环境，您可能希望保留默认值。其作用是当
    `Munki` 中有新的应用程序可供最终用户安装/更新时，向他们提供通知（或不提供）。因为我们打算自动化安装和升级过程，所以我们将其设置为 `true`，这将
    *不* 向最终用户提供通知。


    输入脚本后，您可以点击 `Send` 按钮在客户端上执行它。


    **专业提示** 如果这将是您组织中所有（或大多数）客户端的默认设置，请考虑使用此处的 `Save` 按钮保存此脚本，以便在以后安装 `Munki` 时再次运行。


    3.  脚本成功运行后，我们可以通过浏览到`/Library/Preferences/`并使用 Finder 中的 `QuickLook` 选项查看 `ManagedInstalls.plist`
    来在客户端上双重检查我们的设置。您应该会看到 `SoftwareURL` 已更新，指向我们的 `munki_repo`。您的 `ManagedInstalls.plist`
    文件应类似于图 [10-34](#492151_1_En_10_Chapter.xhtml#Fig34)。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig34_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig34_HTML.jpg)


    图 10-34


    包含我们自定义项的 ManagedInstalls.plist 文件


    4.  如果一切看起来正确，请继续重启您的测试计算机，因为在继续之前，它需要使用新的首选项停止并启动 `Munki` 服务。现在，我们已成功在测试 Mac
    客户端上安装并配置了 `Munki`。'
  raw: '### Installing and Configuring Munki on Client Workstations


    We are going to begin by installing the *MunkiTools* application on a test client
    machine. You can do this interactively on your client system by running the *MunkiTools*
    package we downloaded earlier in the chapter, or we can use *Apple Remote Desktop*.
    Most likely, you will be installing *Munki* on multiple Macs in a production environment,
    so let’s use ARD for this task.


    Installing Munkitools With ARD


    Before you begin this exercise, grab a test Mac and add it to your ARD console
    if it’s not already there.


    1.  Once it finishes the installation, it will force the computer to restart.
    The next thing we need to do is run a script that will modify a few keys in Munki’s
    **ManagedInstalls *.plist** file stored on the client in ***/Library/Preferences/***.
    **Select** the client in ARD and click the **Unix** button in the toolbar. Enter
    the following lines into the script window as shown in Figure [10-33](#492151_1_En_10_Chapter.xhtml#Fig33).
    Don’t forget to set the command to run as **root**:


    1.  The first step is to install MunkiTools. Open ARD and **click** your test
    Mac to select it. Click the **Install** button in the toolbar and add the **munkitools.pkg**
    installer to the list of packages. Click the **Install** button as shown in Figure
    [10-32](#492151_1_En_10_Chapter.xhtml#Fig32).s


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig32_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig32_HTML.jpg)


    Figure 10-32


    Use ARD to install the MunkiTools package on your test Mac


    ```

    #!/bin/sh

    defaults write /Library/Preferences/ManagedInstalls SoftwareRepoURL "http://192.168.1.5/munki_repo"

    defaults write /Library/Preferences/ManagedInstalls ClientIdentifier "site_default"

    defaults write /Library/Preferences/ManagedInstalls SuppressUserNotification -bool
    true

    ```


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig33_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig33_HTML.jpg)


    Figure 10-33


    Enter the script into the Send Unix Command window


    Let’s step through what each of these lines does. The first line is required for
    any script, identifying it as a shell script. Lines 2–4 use the `defaults write`
    command to modify keys in the **ManagedInstalls.plist** file found in ***/Library/Preferences/***
    folder.


    The **SoftwareURL** key points the client to my web server. You should make sure
    this points to your *Munki* web server’s ***munki_repo*** folder via http.


    The **ClientIdentifier** points to the Manifest this client will be using to determine
    which software is available to them. We will cover Manifests in more detail later
    in this chapter.


    The **SuppressUserNotification** key is a Boolean value where we are going to
    change it from the default of **false** to **true**. Depending on your environment,
    you may want to keep the default. What this will do is provide a notification
    (or not) to your end users when new applications are available to them to install/update
    in *Munki*. Because we are going to automate the install and upgrade process,
    we are setting this to true which will *not* provide a notification to the end
    user.


    After you have entered the script, you can click the **Send** button to execute
    it on the client.


    **Pro Tip** If this is going to be the default settings for all (or most) of the
    clients in your organization, consider using the **Save** button here to save
    this script to run again on future installs of Munki.


    1.  If everything looks correct, go ahead and restart your test computer as it
    will need to stop and start the Munki service using the new preferences before
    we can continue. We have now successfully installed and configured Munki on our
    test Mac client.


    1.  Once the script has run successfully, we can double-check our settings on
    the client by browsing to ***/Library/Preferences/*** and using the **QuickLook**
    option in the Finder to view **ManagedInstalls.plist**. You should see that the
    `SoftwareURL` has updated to point to our ***munki_repo***. Your **ManagedInstalls.plist**
    file should look similar to Figure [10-34](#492151_1_En_10_Chapter.xhtml#Fig34).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig34_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig34_HTML.jpg)


    Figure 10-34


    The ManagedInstalls.plist file with our customizations'
