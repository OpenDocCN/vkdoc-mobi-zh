    The first thing we need to do is download a couple of installer packages. The
    first one is the official *MunkiTools* release from the *Munki Project’s GitHub*
    page. You can find the client installers at [`https://github.com/munki/munki/releases`](https://github.com/munki/munki/releases),
    and I’m going to be downloading the **Munki 3.6.4** release which supports *macOS
    10.10 Yosemite* to *macOS 10.15 Catalina*.


    Pro Tip


    Munki recently released version 4.x on their GitHub page, which includes its own
    Python support instead of relying on Apple’s embedded version. You should assess
    the support for legacy versions of macOS with this release and determine if you
    should install Munki 4 or continue to use the 3.x variant based on the age of
    your Mac fleet. We will be using the stable release of 3.6.4 for the exercises
    in this chapter.


    Download **munkitools-3.6.4.3786.pkg** from this page and save it to your Desktop.
    Next, **double-click** the downloaded package and follow the prompts to **install**
    it. If *Gatekeeper* gets in the way, you may need to **right-click** the package
    and choose **Open** from the contextual menu and agree to open a file from an
    unknown developer. It will require a restart when finished. Go ahead and **restart**
    when prompted.


    We are also going to download the *MunkiAdmin* tool and install it on this workstation.
    *MunkiAdmin* is another open source project. It is a GUI tool for managing your
    *Munki* environment. The current release is 1.7.1, and this can be found at [`https://github.com/hjuutilainen/munkiadmin/releases/`](https://github.com/hjuutilainen/munkiadmin/releases/).
    Download this version and save it to your Desktop. Expand the disk image and **drag
    and drop** the *MunkiAdmin* application to either your ***/Applications*** or
    ***/Applications/Utilities*** folder to install it. I am going to install it into
    the ***/Applications*** folder on my workstation.


    ### Configuring the Munki Client on the Admin Workstation


    Once we have restarted our administrative workstation, go ahead and reconnect
    to the ***munki_repo*** network share and make sure you can still browse it via
    the Finder. Next, we need to do some post-installation configuration via the Terminal
    to point our administrative workstation to our *Munki* repository. Go ahead and
    open the Terminal again and enter `munkiimport --configure` at the command prompt
    as shown in Figure [10-15](#492151_1_En_10_Chapter.xhtml#Fig15).


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig15_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig15_HTML.jpg)


    Figure 10-15


    Invoking the configuration command line utility in Terminal


    We will need to answer some questions as we step through the command line configuration
    utility. The first thing it asks is for the `Repo URL`. This can be deceiving
    because what it wants here is the path to our ***munki_repo*** share, not the
    URL to the web server. Enter the full path in this format `smb://192.168.1.5/munki_repo/`
    where the IP address is the domain name or IP of your *Munki* web server.


    Pro Tip


    I’m using an IP address because I did not create a DNS record for this demo server.
    However, in a production environment, you would likely want to enter the FQDN
    as part of the path to your munki_repo share.


    Next, it will ask us what file extension we prefer to use for the *pkginfo* files.
    These are the files that Munki reads to determine how we want the various installers
    to run. We will keep the default as **∗.plist**, so press **enter** to accept
    the default. Now it will prompt us to choose an editor for the *pkginfo* files.
    We are going to be using the GUI *MunkiAdmin* application so we can accept the
    default here. Press **enter** to continue.


    When it prompts us for a *catalog*, accept `testing` as the default. We will discuss
    Catalogs in the next section of this chapter. Press **enter** to continue. Finally,
    the last prompt will ask about *plug-ins*. Take the default here as well by pressing
    **enter**. At this point, we have finished configuring *MunkiTools* on our admin
    workstation. Your Terminal window should look similar to Figure [10-16](#492151_1_En_10_Chapter.xhtml#Fig16)
    after setting these options.


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig16_HTML.jpg](images/492151_1_En_10_Chapter/492151_1_En_10_Fig16_HTML.jpg)


    Figure 10-16


    The recommended responses to the configuration prompts'
  trans: '

    ### 为 Munki 创建网络文件共享


    为使我们的服务器准备好与 `Munki` 配合使用，我们需要执行的最后一步是将 `munki_repo` 文件夹作为 SMB 共享分享到我们的局域网上。我们将使用
    `共享系统偏好设置` 来启用 `文件共享` 服务。点击 `+` 按钮并浏览到 `Macintosh HD/Library/WebServer/Documents/`
    中的 `munki_repo` 目录来添加一个新的共享文件夹，如图 10-12 所示。您将看到文件共享权限是从目录继承的，应该为所有人提供读写能力。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig12_HTML.jpg](img/492151_1_En_10_Fig12_HTML.jpg)


    图 10-12


    将 munki_repo 文件夹共享为网络文件共享


    关闭系统偏好设置。此时，我们应该从网络上的另一台计算机进行快速验证，以确保一切按预期工作。我将使用我的管理工作站来将 `munki_repo` 文件夹映射为一个共享，同时通过网页浏览器点击
    `munki_repo` 目录。


    使用 Finder 中的 `连接到服务器` 选项，如图 10-13 所示，并进行身份验证以挂载 `munki_repo` 文件夹的 SMB 共享。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig13_HTML.jpg](img/492151_1_En_10_Fig13_HTML.jpg)


    图 10-13


    使用 SMB 协议映射 munki_repo 共享


    我还将打开我的 Safari 网页浏览器并访问 `http://192.168.1.5/munki_repo/`。如果一切配置正确，您应该能够通过网络共享和网页浏览器浏览该目录，如图
    10-14 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig14_HTML.jpg](img/492151_1_En_10_Fig14_HTML.jpg)


    图 10-14


    通过 Safari 和 Finder 在远程计算机上浏览 munki_repo 目录


    恭喜！您的 Web 服务器现已配置好，可以与 Munki 配合使用了！


    **专业提示**


    如果您希望使用 Munki 支持多个站点，可以为每个地点的服务器重复这些相同的步骤，然后使用实用程序在服务器之间同步 `munki_repo` 目录。由于无需担心集中式数据库或专有文件，只需在服务器之间同步平面文件和文件夹即可轻松扩展您的
    Munki 环境。


    ## 配置 Munki 管理工作站


    现在我们的服务器已经启动并运行，下一步是配置我们的 `Munki` 系统管理员将用来创建软件包、向服务器上传数据和管理 `Munki` 环境的工作站。我通常使用已安装
    `Apple Remote Desktop` 的同一台工作站，以便将我所有的 Mac 管理工具集中在一处。


    ### 安装 MunkiTools 和 MunkiAdmin


    我们需要做的第一件事是下载几个安装包。第一个是来自 `Munki 项目的 GitHub` 页面的官方 `MunkiTools` 版本。您可以在 `https://github.com/munki/munki/releases`
    找到客户端安装程序，我将下载支持 `macOS 10.10 Yosemite` 到 `macOS 10.15 Catalina` 的 `Munki 3.6.4`
    版本。


    **专业提示**


    Munki 最近在其 GitHub 页面上发布了 4.x 版本，该版本包含其自己的 Python 支持，而不是依赖 Apple 的内置版本。您应该评估此版本对旧版
    macOS 的支持情况，并根据您的 Mac 设备群的年限决定是安装 Munki 4 还是继续使用 3.x 变体。在本章的练习中，我们将使用 3.6.4 的稳定版本。


    从该页面下载 `munkitools-3.6.4.3786.pkg` 并保存到您的桌面。接下来，`双击` 下载的安装包，按照提示进行 `安装`。如果 `Gatekeeper`
    阻止安装，您可能需要 `右键点击` 安装包，从上下文菜单中选择 `打开`，并同意打开来自未知开发者的文件。完成后需要重启。请根据提示进行 `重启`。


    我们还将下载 `MunkiAdmin` 工具并将其安装到此工作站上。`MunkiAdmin` 是另一个开源项目。它是一个用于管理 `Munki` 环境的 GUI
    工具。当前版本是 1.7.1，可以在 `https://github.com/hjuutilainen/munkiadmin/releases/` 找到。下载此版本并保存到您的桌面。解压缩磁盘映像，然后将
    `MunkiAdmin` 应用程序 `拖放` 到您的 `/应用程序` 或 `/应用程序/实用工具` 文件夹中以完成安装。我将把它安装到我的工作站的 `/应用程序`
    文件夹中。


    ### 在管理工作站上配置 Munki 客户端


    重启管理工作站后，重新连接到 `munki_repo` 网络共享，并确保仍然可以通过 Finder 浏览它。接下来，我们需要通过终端进行一些安装后配置，将我们的管理工作站指向
    `Munki` 仓库。打开终端，在命令提示符下输入 `munkiimport --configure`，如图 10-15 所示。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig15_HTML.jpg](img/492151_1_En_10_Fig15_HTML.jpg)


    图 10-15


    在终端中调用配置命令行实用程序


    在逐步执行命令行配置实用程序时，我们需要回答一些问题。首先，它询问的是 `Repo URL`。这可能有些迷惑，因为它这里需要的是我们的 `munki_repo`
    共享的路径，而不是 Web 服务器的 URL。请按此格式输入完整路径 `smb://192.168.1.5/munki_repo/`，其中 IP 地址是您的
    `Munki` Web 服务器的域名或 IP。


    **专业提示**


    我使用 IP 地址是因为我没有为此演示服务器创建 DNS 记录。但是，在生产环境中，您可能希望将 FQDN 作为 `munki_repo` 共享路径的一部分输入。


    接下来，它将询问我们喜欢为 `pkginfo` 文件使用什么文件扩展名。这些是 Munki 读取以确定我们希望各种安装程序如何运行的文件。我们将保持默认值
    `*.plist`，因此按 `回车` 键接受默认值。现在它将提示我们为 `pkginfo` 文件选择一个编辑器。我们将使用 GUI `MunkiAdmin`
    应用程序，因此可以在此处接受默认值。按 `回车` 键继续。


    当提示我们输入 `catalog` 时，接受默认值 `testing`。我们将在本章的下一节讨论目录。按 `回车` 键继续。最后，最后一个提示将询问 `plug-ins`。也按
    `回车` 键接受此处的默认值。至此，我们已完成在管理工作站上配置 `MunkiTools`。设置这些选项后，您的终端窗口应类似于图 10-16。


    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig16_HTML.jpg](img/492151_1_En_10_Fig16_HTML.jpg)


    图 10-16


    对配置提示的建议响应

