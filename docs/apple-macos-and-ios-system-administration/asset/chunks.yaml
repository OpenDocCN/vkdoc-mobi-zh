    现在我们将基于"Executive User Template"创建另外两个用户。为此，点击"用户"窗口上的**+**按钮，这次您会在"新建用户"窗口中看到一个弹出菜单，允许您根据模板创建用户，如图
    7-33 所示。选择**Executive User Template**并创建`User2`和`User3`账户。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig33_HTML.jpg](img/492151_1_En_7_Fig33_HTML.jpg)


    图 7-33


    从"Executive User Template"创建新用户


    现在我们已经创建了三个用户账户，您的"用户"窗口应如图 7-34 所示。别忘了也限制他们对`SSH`和`Screen Sharing`的访问。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig34_HTML.jpg](img/492151_1_En_7_Fig34_HTML.jpg)


    图 7-34


    您应该有三个用户账户 — `User1`、`User2` 和 `User3`


    最后，让我们探索用户的高级选项。**右键单击`User3`**并选择**高级选项…**，如图 7-35 所示。这看起来应该很熟悉，因为它类似于*用户与群组系统偏好设置*。就像本地工作站一样，我们可以调整主目录、登录
    shell 和别名等设置。"配置共享点 URL"的选项用于在登录时映射网络驱动器，不要与*Microsoft SharePoint*混淆。我们暂时不做任何更改，所以点击**取消**按钮继续。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig35_HTML.jpg](img/492151_1_En_7_Fig35_HTML.jpg)


    图 7-35


    `User3`的高级用户设置


    **专业提示**


    我们可以看到我们的三个用户账户和一些组，但您知道吗，除了我们在这里看到的之外，操作系统还在我们的目录中放置了更多的用户和组？您可以通过**右键单击**任何用户并选择**显示系统账户**或**隐藏系统账户**来切换这些组的显示。


    现在我们已经创建了一些用户并将它们放入一个组中，我们希望能够使用其中一个账户登录到工作站。为此，我们需要将我们的*macOS*客户端*绑定*到 Open Directory
    域。将客户端绑定到域允许它在搜索本地账户的同时搜索网络账户列表以找到匹配项，并允许网络用户登录到计算机。域中任何已启用的用户都可以登录到绑定到该域的任何计算机。


    ## 绑定 macOS 客户端到 Open Directory


    切换到您的一台测试 Mac 客户端，并以具有管理员权限的本地用户身份登录。打开*用户与群组系统偏好设置*并进行身份验证以解锁偏好设置面板。点击**登录选项**按钮，如图
    7-36 所示。接下来，点击**网络账户服务器**提示旁边的**加入…**按钮。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig36_HTML.jpg](img/492151_1_En_7_Fig36_HTML.jpg)


    图 7-36


    将 Mac 客户端加入网络账户服务器


    系统会提示您一个对话框来选择或输入服务器。您可以输入 IP 地址或主机名。如果您的网络像我此示例中的一样小而简单，您也可以点击下拉箭头，如图 7-37 所示，它可能会找到广播的主机并从菜单中选择。输入服务器信息并点击**确定**按钮继续。如果提示您信任服务器提供的安全套接字层（`SSL`）证书，请点击**信任**按钮继续。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig37_HTML.jpg](img/492151_1_En_7_Fig37_HTML.jpg)


    图 7-37


    在字段中输入主机名或服务器名，然后点击确定


    您可能会收到一条消息，提示服务器不使用安全套接字层（`SSL`）身份验证。您可以暂时点击**继续**按钮跳过此消息，因为我们在此练习中不关心加密。它会提示您输入本地管理员账户凭据，经过片刻配置后，您将看到
    Open Directory 服务器列在"网络账户服务器"旁边，并有一个绿点表示连接正常。您可能还想更改登录窗口的一些设置，如图 7-38 所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig38_HTML.jpg](img/492151_1_En_7_Fig38_HTML.jpg)


    图 7-38


    我们的客户端现已绑定到我们的 Open Directory 域，您可能希望更改一些登录窗口选项，如图所示


    现在我们已经将 Mac 绑定到 Open Directory，请继续**注销**，然后使用`User1`账户登录。如果一切顺利，首次登录时您应该会收到几个设置助理问题，然后作为网络用户进入一个干净的`/Users/User1/Desktop`目录，拥有所有默认的新用户设置。您可以通过转到*用户与群组系统偏好设置*或浏览到`/Users`来查看您的主目录，从而确认这一点，如图
    7-39 所示。


    ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig39_HTML.jpg](img/492151_1_En_7_Fig39_HTML.jpg)


    图 7-39


    主目录和网络用户账户类型，如用户与群组系统偏好设置中所示

