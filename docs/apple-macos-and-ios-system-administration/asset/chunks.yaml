    # 7. macOS Server


    自 1990 年代末该软件的第一个版本问世以来，Mac 服务器的概念已经发生了巨大变化。在本章中，我们将探讨 Apple 在`macOS`客户端操作系统中内置的服务器功能、安装`macOS
    Server`应用程序时添加的服务、如何确定您是否需要一台专用的 Mac 服务器，以及如果需要，如何配置和管理该服务器。


    ## macOS Server 简史


    最初的 Mac OS Server 代号为"Rhapsody"，它最初被设计为苹果公司在 1996 年收购 NeXT 后开始开发的新一代 Mac 操作系统的第一个版本。`Mac
    OS X`是最终在 2000 年代初发布的客户端操作系统，与此同时，苹果开始销售`OS X Server`作为一个在客户端操作系统之上运行的应用程序，为其提供服务器级功能。多年来，`Server`应用程序的功能已被缩减或迁移到`macOS`的基本功能集中。如今，只有少数服务仍然专属于`macOS
    Server`。


    ### 服务


    最初亮相时，`OS X Server`提供了许多用于管理 Mac 客户端的有用功能。苹果包括了其自己的轻量级目录访问协议(LDAP)，称为`Open Directory
    (OD)`，旨在管理用户和组，类似于微软（更流行）的`Active Directory (AD)`。除了 LDAP，它还包括文件共享、打印机共享和基于`Apache`的
    Web 服务器。作为 Mac 系统管理员的热门解决方案，OS X Server 还包括用于管理 Mac 机群的`NetBoot`和`Workgroup Manager`。


    除了各种管理工具外，`OS X Server`还提供`CalDAV`、即时消息、邮件服务器和许多其他与生产力相关的服务。然而，随着更多此类解决方案开始迁移到各种云托管模型，苹果将其中的大多数转移到了
    iCloud，或者决定完全停止这些服务。


    随着苹果开始更多地转向针对 iOS 设备（以及后来的 Mac）采用移动优先的管理原则，他们开始将`macOS Server`转变为移动设备管理工具。许多核心"服务器"服务被移入了`macOS`的基础安装中。如今，`macOS
    Server`保留了`Open Directory` LDAP 服务，并且`Workgroup Manager`已被弃用，取而代之的是`Profile Manager`，它允许您为`iOS`和`macOS`客户端创建和部署配置描述文件。

    '
- fmt: '# Hardware


    Apple server hardware has also changed dramatically over the years. Some of the
    original hardware that ran `OS X Server` included the `Power Mac G3` and `Power
    Mac G4` workstations. Apple briefly became very serious about dedicated server
    hardware and released the `Xserve` and `Xserve RAID` products for a time but eventually
    discontinued these models in favor of the `Mac Pro` workstation. As the need for
    a dedicated server OS was diminished, it no longer made sense for Apple to continue
    to develop and manufacture dedicated server hardware.


    # Introduction to macOS Server


    In this chapter, we are going to explore the most common functions of a server
    operating system and how `macOS` or `macOS Server` can be configured for these
    purposes. Some of these features are going to be available in the standard install
    of the client operating system, and others will only be available after you purchase
    and install the `macOS Server` application.


    ## Do I Need a Mac Server?


    Before we begin building our Mac server, let’s start by considering the use cases
    and if a dedicated Mac server is really necessary. As Apple has removed many of
    the services provided by a Mac server, they have also worked to build more cross-platform
    tools into `macOS` that allow it to fully participate as a client in other common
    networks, namely, those built on Microsoft and Linux technologies. More than likely,
    your organization already has some kind of LDAP, printer sharing, and file sharing
    solution, and you can use those with your `macOS` clients quite easily.


    If you have been a Mac system administrator for a while, you may be familiar with
    the term `golden triangle`. This is where you would use a Mac server running `Open
    Directory` to sync with a `Windows` server running Microsoft''s `Active Directory`
    to manage user accounts and then use `Workgroup Manager` to set Mac-specific permissions
    or settings. Today, you can bind your Macs directly to an Active Directory domain
    instead of even bothering with running a second LDAP specifically for your `macOS`
    endpoints. `Configuration Profiles` replace the `Workgroup Manager` component
    for restricting devices and locking down specific settings.


    File sharing has also changed in recent releases. Apple used to utilize their
    `AppleTalk File Protocol` as the preferred file sharing technology for `macOS`
    clients. Today, `Samba` is the default file sharing protocol and works seamlessly
    with `Windows` and Linux clients. The point here is that if you are already running
    various `Windows`- or Linux-based servers, before you start building a Mac server
    to create redundant `Mac-only` versions of these existing file shares, consider
    how you might leverage these existing technologies with your `macOS` clients.


    Beyond directory services or file/print sharing, there are a number of cloud-based
    solutions that may be a better fit for your organization. Web hosting is one that
    immediately comes to mind. Several years ago, using a Mac server for hosting your
    web site was very common, and in many ways it was a preferable solution over using
    Microsoft''s `IIS`. While `Apache` is still available as an additional service
    in `macOS`, you could just as easily host your web site in the cloud using any
    number of low-cost web hosting solutions out there.


    Here are some of the more common services that you may want to run on a Mac server,
    if you choose to deploy one. We will cover many of these in greater detail throughout
    this chapter:


    *   **File Sharing:** Starting with `macOS High Sierra`, Apple has integrated
    the `File Sharing Server` into the standard install of the operating system. You
    can enable this through the `Sharing System Preference`. This service allows you
    to share files and folders over the network.

    *   **Printer Sharing:** Starting with `macOS High Sierra`, Apple has integrated
    the `Print Sharing Server` into the standard install of the operating system.
    You can enable this through the `Sharing System Preference`. This service allows
    you to share printers over the network.

    *   **Apple Remote Desktop:** You can install Apple Remote Desktop in full console
    mode or as a `Remote Task Server` as described in Chapter 6 of this book.

    *   **Content Caching:** Starting with `macOS High Sierra`, Apple has integrated
    the `Content Caching Server` into the standard install of the operating system.
    You can enable this through the `Sharing System Preference`. This service caches
    copies of content from the `App Store` and other Apple-hosted services like `Software
    Update` to conserve bandwidth when installing updates or content on multiple devices.

    *   **Web Server:** `Apache` is integrated into the standard install of the Mac
    operating system. You can enable this through the command line.

    *   **Open Directory:** Included with the installation of the `macOS Server` application,
    `Open Directory` is an LDAP that allows you to configure network-based users and
    groups.

    *   **Profile Manager:** A basic Mobile Device Management solution that allows
    for the creation and assignment of `Configuration Profiles` to `iOS` and `macOS`
    clients—included with the `macOS Server` application.

    *   **Xsan:** Included with the installation of the `macOS Server` application
    that enables the creation and management of a Storage Area Network (SAN) solution.

    *   **DNS:** Starting with `macOS High Sierra`, Apple has removed DNS from the
    installation of `macOS Server`. You can use various other solutions including
    `BIND` or `Knot DNS`.

    *   **DHCP:** Starting with `macOS High Sierra`, Apple has integrated the `DHCP
    Server` into the standard install of the operating system. You can enable and
    manage this through the command line.

    *   **NetBoot/NetInstall:** Apple has continued to demote this service through
    the use of the T2 Security chip and the removal of these features in the more
    recent releases of `macOS Server`. The core technology is still available in `macOS`
    versions older than `Mojave`. If you are planning to use this workflow, I would
    recommend looking at `DeployStudio` as a solution (`www.deploystudio.com`).


    So do you need a Mac server? To answer this question, it depends, but probably
    not. If you are a small business and you don’t have any existing directory services
    or need a local file/print server, then it might make sense to deploy a dedicated
    Mac server.


    If you are a larger organization with a lot of preexisting server solutions, try
    to integrate your Macs into that ecosystem instead of building a separate Mac-only
    environment. It will be easier for you and better for your end users to be able
    to participate as a first-class citizen on an existing corporate network. Increasingly,
    the main reason you would want a Mac server is to run `Profile Manager` unless
    your organization already has an effective Mobile Device Management solution from
    a third-party vendor like `JAMF`, `Mosyle`, or `Addigy`.


    # Deploying a Mac Server


    If you have determined that a dedicated Mac server would be useful in your environment,
    we can begin configuring a Mac to function as a server.'
