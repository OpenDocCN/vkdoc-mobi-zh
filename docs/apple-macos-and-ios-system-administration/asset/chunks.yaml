- fmt: '# Device Enrollment Program (DEP)


    Apple’s Device Enrollment Program (`DEP`) is a service that they provide when
    you purchase devices directly or through participating Apple Authorized Resellers.
    The way that this works is when your organization purchases an Apple device, a
    record is created in a database that is hosted by Apple. The record includes the
    model information, serial number, and membership (if any) into a specific MDM
    server for each device. Customers interact with `DEP` through one of two customer
    portals—`Apple School Manager` or `Apple Business Manager`. These online portals
    allow you to look up new devices and assign them to specific MDM servers. As new
    devices are purchased and shipped, Apple populates the database with new device
    records.


    Pro Tip


    If you have an existing device that you want to add to your organization’s `DEP`
    database, you can do so manually in `Apple Configurator`. This is also useful
    if you purchased a device from a reseller that does not participate in `DEP`.
    You will have 30 days to remove the device from `DEP` before it is locked in as
    a device owned by your organization. While it may be tempting, it is not recommended
    that you add any `BYOD` or end-user-owned devices into your organization’s `DEP`
    database.


    Device Enrollment Program has two very specific features. First, it provides a
    proof of purchase history for all of your Apple devices. You can look up any device
    by serial number and see when it was added to `DEP` (approximate purchase date),
    the make/model of the device, and the purchase order and/or account number that
    was used to make the purchase. This is particularly useful information for when
    you need to contact `AppleCare` and they are looking for proof of purchase validation.
    The second feature is the ability to assign devices to an MDM server so that you
    can apply Configuration Profiles during the Setup Assistant process.


    As Figure 8-1 illustrates, this process is transparent to the end user. You can
    use `DEP` to assign a device to an MDM server and configure the device’s restrictions,
    configuration settings, and Apps through that MDM, and when the user steps through
    the Welcome screens and does the device activation through Apple, it contacts
    your MDM server and applies the required configuration settings before the user
    even gets to the Home Screen or the Desktop—thereby effectively managing the device
    without the IT staff ever having to touch it.


    ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig1_HTML.jpg](images/492151_1_En_8_Chapter/492151_1_En_8_Fig1_HTML.jpg)


    Figure 8-1

    A diagram of how `DEP` and `MDM` work together to configure new devices over the
    air


    # Volume Purchase Program (VPP)


    Let’s say that you are in a situation where you need to install the `Microsoft
    Office` suite on every iPad and Mac in your organization. You want to be able
    to do this automatically and without end-user interaction by pushing these down
    from the `App Store` and `Mac App Store`, respectively. You also want to make
    sure that users can update the Apps when prompted using their `Apple ID` and not
    a single shared institutional `Apple ID`. Apple provides a solution for this scenario
    called Volume Purchase Program (`VPP`).


    Apple’s `VPP` allows a system administrator to purchase any number of free or
    paid Apps from the App Store and assign a license for that App to a specific `Apple
    ID`. At any time, the license to that App can be removed from a specific user
    and then assigned to another user. This allows an organization to purchase a pool
    of licenses for any participating App and assign them to users when they need
    them and remove the licenses when they no longer do. When a license is removed,
    it is placed back into the pool where it can be assigned to another user.


    Pro Tip


    You can use `Managed Apple IDs` or personal `Apple IDs` with `VPP`. When you remove
    a license to the App, the user will receive a notice that the App license has
    been removed, and they will have up to 30 days to export the data from the App’s
    container or purchase a license on their own to continue using the App. After
    the 30-day grace period, the App will disappear from the device.


    Developers must opt in to have their App available for purchase through `VPP`.
    There are sometimes `VPP` discounts if Apps are purchased in bulk quantities,
    or if you are part of an academic organization, education discounts could also
    apply. This is entirely up to the discretion of the App developer or publisher
    (`iBooks`).


    Pro Tip


    In the case of `iBooks`, licenses to textbooks or other books can be purchased
    in bulk, but unlike Apps, they cannot be assigned and then removed and reassigned
    to another `Apple ID`. Once a book is assigned to a user, it is theirs to keep
    and cannot be returned to the pool.


    # Supervision and User Approved MDM


    As we already discussed, Mobile Device Management is an over-the-air solution
    for configuring, securing, and deploying devices to end users as well as managing
    the devices without IT needing to physically touch those devices. In general,
    this idea of unified device management is very appealing in that I can manage
    my `macOS` clients the same way that I manage my `iOS` devices, but it is important
    to note a few differences between platforms.


    ## Device Supervision


    In Chapter 5 we discussed supervision as it relates to `iOS` devices and `Apple
    Configurator`. Because `iOS` was conceived as a single-user operating system,
    there are not independent Standard users and an Administrator user to lock down
    specific parts of the OS for the sake of security and support considerations.
    Supervision is a way to manage organization-owned devices as a system administrator
    might do with an administrator account on a desktop computer. Just like we did
    in `Apple Configurator`, you can supervise an `iOS` device through an MDM solution
    and gain access to the full catalog of payloads for restricting and securing devices.'
