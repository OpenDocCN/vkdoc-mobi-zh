- fmt: '### Application Package Properties


    Once you have imported your software into `Munki`, you can make changes to it
    by double-clicking the package in the list or selecting it and clicking the **Properties**
    button in the toolbar. I’m not going to go into great detail here on the various
    options, but you do have some powerful settings available that will allow you
    to fine-tune your deployment process. Here are a few of the more important settings
    to consider:


    *   **Basic Info Tab:** Allows you to modify the settings we set when importing
    the software via the command line tool. You can specify restart actions after
    installation and set deadline dates for forcing the software to install if necessary.

    *   **Requirements Tab:** This allows you to set dependencies based on existing
    software installed on the system and minimum OS and maximum OS versions for each
    individual package. This is particularly nice if you want to provide an older
    version of an application to clients running on older OS and a new version of
    the software for users on a more current OS.

    *   **Install Scripts Tab:** Here you can specify scripts to run before and after
    the software installation runs. This is a powerful way to customize applications
    after the software installs.

    *   **Uninstall Tab:** Here you can specify the uninstall process including using
    an uninstall script and scripts both before and after the uninstall process runs.


    ### Creating a Munki Package to Execute a Script


    If you recall from Chapter [6](#492151_1_En_6_Chapter.xhtml), we were able to
    send scripts to remote machines using the **Send Unix Command** tool. Any command
    or a script of multiple commands that we can send via `Apple Remote Desktop` can
    be packaged and executed by `Munki`. In this section, we will explore how to create
    a custom package that delivers a script.


    We will be using a new tool in this section for creating a custom package. There
    are many utilities out there that will create a `*.pkg` file. We will be using
    one called `Munki-Pkg`, which is available here: [`https://github.com/munki/munki-pkg`](https://github.com/munki/munki-pkg).
    `Munki-Pkg` is a command line utility so there is no GUI. We will simply download
    it, extract it, and copy the resulting folder to the Desktop. We will run it from
    the Terminal by changing to the `~/Desktop/munki-pkg-master/` directory.


    #### Creating a Package To Run a Script


    In this exercise we are going to create a package that runs a script that will
    force the client Mac to immediately reboot.


    1.  The first thing we will want to do is develop our script. This one is very
    simple because it is a single command, but you could create a more advanced script
    with multiple commands, variables, and more. Using Terminal or Apple Remote Desktop,
    test this command to ensure it immediately restarts the computer:


    ```

    shutdown -r now

    ```


    The computer should immediately restart. If that works successfully, we now have
    our script ready to package in `Munki`.


    **Pro Tip** The purpose of this exercise is to demonstrate how you can create
    a custom package to run a script. This example restart script is not recommended
    for production use with Munki as it could cause your client systems to restart
    without notice to the end user.


    2.  We are going to go ahead and create a new empty package. After the path to
    the `munkipkg` executable, add `--create RestartClientScript` into the command
    line and press **enter** as shown in Figure [10-28](#492151_1_En_10_Chapter.xhtml#Fig28).
    This will create a new empty package called `RestartClientScript`.


    3.  If successful, it will have created a folder at the root of your home directory
    called `RestartClientScript`, and inside that folder you will see folders for
    *build*, *payload*, and *scripts*. We are going to ignore the payload folder and
    focus on the scripts folder. Go ahead and change directories in the Terminal to
    the scripts folder by entering `cd /RestartClientScript/scripts/`.


    4.  Once you are in the scripts folder, we are going to use `VI` again to create
    a file that will run our script. Enter `vi postinstall` to create a new file in
    the `VI` text editor called `postinstall`. The file must be named `postinstall`
    to package and run properly when we execute the script.


    **Pro Tip** Software packaging is outside of the scope of this book, but there
    are many good articles online about creating custom install packages and how they
    work. You will find that there are two scripts that can run in any package. One
    is the preinstall script and the other is the postinstall script. The `macOS Installer`
    looks for these two files and executes them at the appropriate time during the
    installation process.


    5.  Use the **arrow keys** to navigate the file and then press the **i** key to
    insert text like we did with `VI` earlier in this chapter. Enter our script and
    then press the **escape** key to exit Insert mode. Use the `:wq` command to save
    the file and exit `VI`. Your Terminal window should look similar to Figure [10-29](#492151_1_En_10_Chapter.xhtml#Fig29).


    6.  You can browse the scripts folder in the Finder or an `ls` command on the
    `/scripts` directory, and you will see that we now have a `postinstall` file in
    that directory. The last step is to package this project into a `*.pkg` file that
    can then be uploaded into `Munki`. **Drag and drop** the `munkipkg` executable
    to the Terminal window again like we did earlier. **Next, drag and drop** the
    `RestartClientScript` folder to the Terminal window to append the path to our
    project or enter the path to the project file. When your Terminal window looks
    like Figure [10-30](#492151_1_En_10_Chapter.xhtml#Fig30), press **enter** to create
    the `RestartClientScript.pkg` file.


    7.  When the command runs successfully, we should see the output in the Terminal
    that a `*.pkg` file was created in the `/build` folder of our `RestartClientScript`
    project folder. If you browse to that directory, you will see the `RestartClientScript-1.0.pkg`
    file as shown in Figure [10-31](#492151_1_En_10_Chapter.xhtml#Fig31).


    8.  You can now use `munkiimport` to add the package to your `Munki` environment
    just like any other software.


    ### Deploying Software with Munki


    We have learned how to package a basic custom installer to run a script and how
    to import commercial software installation packages into Munki. In the next section,
    we will learn how to build Catalogs and Manifests to automate the installation
    process of these applications. The first step in deploying software with `Munki`
    is to get a client pointed to the `munki_repo` folder on our web server.'
