- fmt: '# Time Machine Backup


    As a system administrator, you should have some kind of backup mechanism in place
    to store copies of critical data in the case of a catastrophic system failure.
    Time Machine is a simple and effective way to back up a personal Mac or a Mac
    server in a secure data center. In an office or a classroom environment, it may
    not be the best solution as external drives can easily go missing. While Time
    Machine drives can be encrypted, external drives for every user may not be feasible
    from a cost perspective. Consider using some kind of cloud-based file backup solution
    such as iCloud Drive or Microsoft OneDrive for Business in these instances.


    > **Pro Tip**

    > If you are using Time Machine to back up your Mac, if it is formatted for HFS+,
    do not let macOS convert it to APFS as it can destroy the existing backup data
    in the process. It is best to start with a newly formatted drive if you are planning
    to change to an APFS-formatted disk and archive your HFS+-formatted drive.


    # File Systems and macOS


    Every operating system has its own preferred file system(s). If you have a background
    in Microsoft Windows system administration, you have certainly heard of NTFS or
    FAT32, but you may only know of the file system that Apple uses as Mac format
    or Apple format. There are actually a few common file systems for the Mac. Hierarchical
    File System (HFS) and its newer cousin HFS+, an enhancement to the old HFS format,
    are now the legacy Apple file systems. The relatively new Apple File System (APFS)
    was released with macOS High Sierra and sports a modern set of features and enhanced
    security. In addition to macOS, APFS is also the file system for iOS devices like
    the iPhone and iPad.


    ## Hierarchical File System Plus (HFS+)


    The legacy file system for the Mac has its roots in Mac OS Classic and is referred
    to as Mac OS Extended in the more recent versions of the operating system. It
    lacks many of the modern features like checksumming, snapshotting, and simultaneous
    multiprocess access found in ZFS, NTFS, and APFS. You can still format drives
    for HFS+, but APFS is now considered the standard for macOS, particularly in the
    case of solid-state drives (SSDs) configured as the startup volume.


    ## Apple File System (APFS)


    APFS is the modern standard for macOS and iOS file systems. It provides a number
    of modern features including space-sharing containers, snapshotting, stronger
    encryption, and faster performance over HFS+. The concept of containers is new
    to macOS and is used heavily in APFS. Containers hold one or more individual volumes
    that appear like separate partitions but share the same space and can dynamically
    grow or shrink depending on need. That means that as more space is required on
    a particular volume, that data can be allocated to that volume without user interaction
    or knowledge.


    This space allocation scheme is particularly useful with the new macOS Catalina
    where the System files are on a separate read-only volume from the user data.
    If you look at a drive that has macOS Catalina installed on it via Disk Utility,
    as shown in Figure [2-3](#492151_1_En_2_Chapter.xhtml#Fig3), you will see the
    two distinct volumes. Macintosh HD provides the base operating system and applications
    on one volume, while Macintosh HD – Data stores the user directories and user-installed
    applications. These are all in a single container (appearing as Macintosh HD),
    and the volumes will grow as needed.


    ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig3_HTML.jpg](images/492151_1_En_2_Chapter/492151_1_En_2_Fig3_HTML.jpg)


    **Figure 2-3** A container comprised of multiple volumes makes up Catalina’s startup
    disk


    ## Partition Map and Drive Security Options


    One thing you will notice when choosing to format a drive in macOS is there are
    a lot of options including various combinations of *case-sensitive, encrypted,
    journaled,* and so on. Apple makes available a Knowledge Base article to define
    what each of these options is.


    The Knowledge Base article can be found here:

    * [`https://support.apple.com/guide/disk-utility/file-system-formats-available-in-disk-utility-dsku19ed921c/mac`](https://support.apple.com/guide/disk-utility/file-system-formats-available-in-disk-utility-dsku19ed921c/mac)


    In addition to various formatting options, you may also be prompted to select
    a drive partition map scheme. There are three options:

    *   **GUID:** This is the standard partition map option for Intel-based macOS
    startup volumes.

    *   **Apple Partition Map:** This is rarely used any longer, and it is the old
    partition map for Mac OS Classic and very early versions of Mac OS X that ran
    on the PowerPC architecture.

    *   **Master Boot Record:** This is the Windows partition scheme to use with FAT
    and ExFAT formats.


    Finally, you may also have noticed the Security Options … button when you are
    erasing a volume and selecting a format. These security options are there so you
    can choose how thoroughly the data on the disk is erased. Some organizations require
    a completely secure sanitization of any disks that are to be decommissioned. By
    default, macOS uses the least secure (but fastest) single-pass erase option. If
    you need something more secure, for example, something that complies with the
    Department of Defense 5220.22-M protocol, you can select that option by moving
    the secure erase slider all the way to the right.


    ## APFS Snapshots


    We will discuss APFS in more detail in the next section, but it is worth mentioning
    that in terms of system recovery, one of the features of Apple’s new file system
    is the ability to take file-level snapshots of the computer’s state. If a drive
    is formatted for APFS, when a major macOS update is about to be installed, an
    APFS snapshot is taken and saved as a recovery point. In general, the operating
    system determines when it is appropriate for a snapshot be taken and it is automatic,
    so no user interaction is required.


    There may be times when you want to force a snapshot. Apple does provide this
    capability through a command line utility in the Terminal. We will go into greater
    detail with the Terminal later in this chapter, but to follow along here, simply
    browse with the Finder to `/Applications/Utilities` and launch the Terminal application.
    You will be presented with a command prompt. To create a snapshot, we will use
    the `tmutil` command. Enter the following command at the Terminal’s command prompt
    and press enter to create a snapshot:


    ```

    tmutil snapshot

    ```


    If all went well, Terminal will give you a message letting you know that it created
    a snapshot with a date/time stamp of today’s date. You can also use the `tmutil`
    command to list all available snapshots if you are curious if any exist. Snapshots
    are stored at the file system level and are only mounted when needed by the OS
    (e.g., when using Time Machine). Input the following command and press enter on
    your keyboard:


    ```

    tmutil listlocalsnapshots /

    ```


    If you ever need to restore your Mac from a snapshot, simply boot into macOS Recovery,
    and select the Restore from Time Machine Backup option. Select the drive that
    holds your snapshots (most likely this will be your internal startup disk). You
    will be presented with a list of available snapshots (if any exist). Simply select
    the one you want to restore and click Continue. Once the restore process is completed,
    your Mac will restart, and it should be restored to the state it was in at the
    selected snapshot.


    > **Pro Tip**

    > APFS snapshots are more of a recovery tool than a backup. I would recommend
    to use snapshots as a way to recover back to a point in time before a major change
    and instead continue to back up the entire disk to another drive or to the cloud.
    Snapshots are deleted 24 hours after they are created, so they are not a reliable
    long-term backup method.'
