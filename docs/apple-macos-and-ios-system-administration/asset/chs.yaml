  商务管理账户所做的条款和条件更新。这些更新通常在发布主要新功能或新操作系统版本时进行。你需要定期进入管理门户并同意这些新条款，否则 DEP/VPP 服务可能无法正常工作，直到你同意为止。


  2.  要配置 MDM 服务器信息，你需要提供一些项目，包括名称和公钥，以便在 DEP 和你的 MDM 服务器之间建立安全连接。为此 MDM 服务器起一个描述性的名称。我将把我的服务器命名为“我的公司
  MDM 服务器”。我将保持**允许此 MDM 服务器释放设备**复选框为选中状态。你的屏幕应类似于图 8-6。


