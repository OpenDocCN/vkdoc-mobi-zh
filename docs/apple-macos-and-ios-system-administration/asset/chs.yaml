  将设备分配到特定的设备组，并在 `设置助理` 激活步骤中强制注册。


  让我们开始操作，打开 `Profile Manager` 并再次浏览到 `设备组` 部分。点击 `+` 按钮添加一个新的 `设备组`。这次我们将其命名为 `销售团队
  iPad`。点击 `销售团队 iPad` 设备组以选中它，然后点击 `设置` 选项卡。在 `销售团队 iPad 的设置` 部分下点击 `编辑` 按钮，如图 12-14
  所示。


