  ## 互联网可达性


  互联网可达性是苹果公司用来描述从公共互联网能够访问此服务器上哪些服务（如果有的话）的术语。此功能依赖于您的网络配置。我在本服务器上配置了内部 IP 地址，同时也在路由器上配置了允许外部连接通过
  DMZ 访问此服务器。如果您计划将此服务器用作使用 `Profile Manager` 的 MDM（移动设备管理）服务器，您需要与网络管理员合作，对您的网络进行必要的更改，以允许通过互联网访问此服务器。您可以使用苹果的互联网可达性测试来验证这些网络设置，并识别哪些服务可以通过互联网使用。


  ## macOS Server 中的目录域


  就 `macOS Server` 而言，可以存在多个目录域。在默认安装中，您将只有本地目录域。这是我们在 Mac 上使用 `用户与群组系统偏好设置` 创建的用户和组所在的位置。此域的成员可以登录到
  Mac 工作站，只要他们对资源拥有适当的权限就可以访问网络资源；并且在安装 Server 应用后，他们既可以在 `用户与群组系统偏好设置` 中管理，也可以在 Server
  应用的 `帐户` 部分进行管理，如图 7-19 所示。


  ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig19_HTML.jpg](img/492151_1_En_7_Fig19_HTML.jpg)


  *图 7-19：macOS Server 中的用户帐户窗口*


  如您所见，我们只有一个用户帐户，即本地管理员帐户。我可以在此处添加更多用户，或者点击 `群组` 部分，添加更多群组并填充这些群组的成员。这些帐户仅管理此特定计算机上的资源。我无法使用在此处创建的帐户来访问另一台计算机上的共享资源。这就是为什么它们是本地域的一部分。


  如果我想创建管理多台机器资源访问权限的用户和群组，我需要在网络域中创建这些帐户。网络帐户允许我创建一个单一用户，该用户可以登录到其他计算机，访问此计算机或其他计算机上的共享资源（如果他们拥有对这些资源的权限），并且通常可以简化整个网络中用户帐户和数据安全的管理。要使用此网络域，我们必须有一个可用的目录服务来存放这些用户帐户和群组。


  ## 开放目录


  `Open Directory`（开放目录）是苹果公司基于 `LDAPv3` 规范的网络目录域服务。许多大型组织可能已经拥有某种包含其所有网络用户帐户和共享资源的
  LDAP。其中最常见的是微软的 `Active Directory`。如果您已经在运行 `Active Directory`，您应该计划将其用于 Mac 客户端的网络帐户目录域，而不是开启
  Open Directory 服务。我们将在第 11 章更详细地介绍 Active Directory 集成。


  如果您的组织还没有网络目录，可以使用 Server 应用配置 Open Directory。如果您在侧边栏的 `高级` 标题下没有看到列出的 Open Directory（如图
  7-20 所示），请点击 `显示` 菜单并选择 `Open Directory`。这将把它添加到侧边栏。


  ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig20_HTML.jpg](img/492151_1_En_7_Fig20_HTML.jpg)


  *图 7-20：如果侧边栏中尚未存在，则将 Open Directory 添加为可用服务*


  ### 创建 Open Directory 主服务器


  我们将在此服务器上启用 Open Directory，因此请点击侧边栏上的 `Open Directory` 按钮，然后点击右上角的 `开/关切换按钮` 以启用该服务。`配置网络用户和群组设置助理`
  将出现，并提示您选择创建新的 Open Directory 域、从存档恢复，或作为副本加入现有的 Open Directory 域。选择 `创建新的 Open
  Directory 域` 选项（如图 7-21 所示），然后点击 `下一步` 按钮继续。


  ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig21_HTML.jpg](img/492151_1_En_7_Fig21_HTML.jpg)


  *图 7-21：选择创建新的 Open Directory 域*


  **Windows 专业提示** 微软系统管理员会从 `Active Directory` 中认出主服务器和副本服务器的概念。早期的 AD 实现包括一个充当主域控制器的服务器和称为备份域控制器的额外服务器。Open
  Directory 与此类似，您有一个 Open Directory 主服务器，然后有多个 Open Directory 副本服务器，它们同步任何目录更改或在响应请求时分担负载。


  下一步是为新的 Open Directory 域创建一个管理员帐户。您可以在此处指定用户名和密码，或使用默认的 `目录管理员`（`diradmin`）帐户。在本例中，我将坚持使用默认设置。输入一个安全的密码（如图
  7-22 所示），然后点击 `下一步` 按钮继续。作为安全最佳实践，我建议使用与用于登录服务器的本地管理员帐户不同的密码。


  ![../images/492151_1_En_7_Chapter/492151_1_En_7_Fig22_HTML.jpg](img/492151_1_En_7_Fig22_HTML.jpg)


  *图 7-22：为 Open Directory 的管理员帐户创建用户名和密码*


  **专业提示** 当您在 Open Directory 中创建网络帐户时，重要的是要注意它们应该与客户端或服务器系统上的本地帐户不同。当登录窗口尝试对用户进行身份验证时，它首先在该
  Mac 的本地目录域中查找匹配的帐户；如果找不到，它会上升到网络目录域并在那里检查。如果您在本地域中有一个与网络域中帐户匹配的帐户，它将始终以本地帐户登录，因为它在本地域中找到了匹配项并停止了查找。




