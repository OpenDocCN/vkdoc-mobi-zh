  IT 部门提供最少的协助。


  ## 总结


  在本章中，我们演练了在许多大中型企业中 iOS 设备日常支持中常见的几种场景。我们建立了一个简单的 BYOD 模式，并制定了一个用于远程配置任意数量公司自有 iOS
  设备的流程，该流程可以根据需要从十台设备扩展到数百台设备。任何 IT 部门都可以遵循这些基本步骤，以最小的努力制定 iOS 设备的部署和支持计划。


