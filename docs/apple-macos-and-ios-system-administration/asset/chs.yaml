  RAM、存储或其他升级的机器来说，是一个非常有用的工具。


  ![../images/492151_1_En_6_Chapter/492151_1_En_6_Fig23_HTML.jpg](img/492151_1_En_6_Fig23_HTML.jpg)

  图 6-23 导出数据对话框，包含推荐的 `∗.csv` 设置


