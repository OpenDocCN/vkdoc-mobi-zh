  ### 描述文件管理器的用户界面\n\n首次登录描述文件管理器时，满屏的复选框、选项卡和列表可能会让人有些不知所措。图 9-1 和随附的项目列表简要概述了所有这些界面元素的功能。本章我们将通过一些实际操作练习，与其中的大多数选项进行交互。\n\
