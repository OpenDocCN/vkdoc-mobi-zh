  此报告还有一点使其有些独特。它不仅仅是提供数据给我，在报告工具栏中还有三个我可以交互操作这些数据的按钮。我可以选择新版本的磁盘工具并点击 `打开所选项目` 按钮，这将导致远程机器上启动磁盘工具。


  我可以点击 `复制到此计算机` 按钮，它会将该新版本的磁盘工具复制到我当前运行 ARD 的工作站上。由于磁盘工具是一个自包含的应用程序包，如果我的主机操作系统支持，我可以在我的
  Mac 上运行它，或将其安装到我的 `/Applications/Utilities` 文件夹中。如果您使用此报告来识别您不希望出现在网络上的应用程序（例如点对点文件共享应用程序），您也可以从列表中选择该应用程序，然后点击
  `删除所选项目` 按钮，在远程计算机上将其删除/卸载。




  ## 应用使用情况


  我们要查看的最后一份报告是应用使用报告。该报告允许你选择一台或多台 Mac 并输入一个日期范围，如图 6-27 所示。之后，它会轮询所选计算机上所有已被使用的应用程序，并返回这些应用程序的使用日期、时间以及使用用户。图
  6-28 展示了该报告的一个示例。


  ![Figure 6-28](img/492151_1_En_6_Fig28_HTML.jpg)


  **Figure 6-28** 来自测试系统的应用使用报告数据


  ![Figure 6-27](img/492151_1_En_6_Fig27_HTML.jpg)


  **Figure 6-27** 应用使用报告配置窗口


  如果你按席位为应用程序付费，并且不确定是否有人在使用这些应用程序或使用的频率，这份报告将非常有帮助。这类报告可以提供有价值的软件计量信息，用于做出明智的购买和许可证续订决策。


  ### 专业提示


  另一个你会发现很有用的功能是为任务设置未来运行的时间表，甚至设置定期重复。如图 6-27 所示，类似于每个任务窗口中的模板弹出菜单，也有一个`Schedule…`按钮。点击此按钮，你可以设置任务运行的日期/时间，并可以设置为重复执行。这样，如果你正在进行持续的软件使用或合规性监控，可以让报告在夜间或定期运行。


  ### 软件分发


  Apple Remote Desktop 最后，也可能是最有用的一个功能，是作为软件分发的工具。软件分发的目的是为了简化在整个`macOS`客户端群中安装和升级软件的过程。是的，你可以使用
  USB 驱动器或网络共享，然后逐台 Mac 安装软件，但这确实非常耗时且容易出错。Apple Remote Desktop 提供了几个功能，用于通过网络向所有`Macintosh`端点批量安装应用程序。


  ### 应用程序安装程序


  macOS 上有三种不同类型的应用程序安装程序。第一种是从`Mac App Store`下载或从`∗.dmg`（磁盘映像）中直接拖放到`/Applications`目录即可安装的*沙盒化*或*自包含应用程序*（App）。`VLC
  Media Player`就是这样的一个应用程序示例，可在 [`www.videolan.org`](http://www.videolan.org) 获取，如图
  6-29 所示。你可以看到，要安装这类应用程序，只需将`VLC`图标拖到`/Applications`文件夹的别名中即可完成安装。


  ![Figure 6-29](img/492151_1_En_6_Fig29_HTML.jpg)


  **Figure 6-29** VLC 是自包含应用程序的一个例子


  第二种安装程序是*应用程序安装包*或`∗.pkg`文件。这些非常常见，并使用苹果的 macOS `Installer`辅助应用程序进行部署。当需要在硬盘的各个区域安装支持文件，并且这些文件并非都包含在单个文件夹或
