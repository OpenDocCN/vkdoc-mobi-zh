  **图 8-2**

  Apple School Manager 和 Apple Business Manager 的登录门户


  登录门户后，您将看到类似于图 [8-3] 的内容。在这里，您可以管理组织的位置、用户、设备和内容。您可以创建其他用户帐户，并赋予他们各种角色，例如内容管理员或帐户管理员权限，以协助管理您的
  Apple 设备和用户帐户。


  ![图 8-3](img/492151_1_En_8_Fig3_HTML.jpg)


  **图 8-3**

  Apple School Manager 主页


  请随意探索并熟悉以下每个标题下的可用选项：


  *   **活动：** 管理门户中近期活动的历史记录。

  *   **位置：** 如果您是拥有多个地点的公司或学校，可以为每个建筑添加位置，并按位置定义唯一的密码策略。例如，在学术环境中，K-6 年级与高中的密码限制可能不同。

  *   **帐户：** 在这里管理用户帐户。

  *   **角色：** 在这里管理各种角色（如站点管理员或员工）的权限。

