  ## 总结


  在本章中，我们讨论了专用 Mac 服务器的必要性、内置在核心`macOS`客户端操作系统中的服务器级解决方案，以及通过安装`macOS Server`应用程序提供的进阶服务。虽然每个组织的需求会有所不同，但很明显，只要可能，Apple
  都提倡使用现有的行业标准目录和文件共享以及打印共享技术，而不是专有的仅限 Mac 的解决方案。


  正如您所看到的，`macOS Server`主要已成为通过配置文件管理器工具启用移动设备管理（MDM）的工具。可以说，除非您想使用配置文件管理器，否则您可能根本不需要
  Mac 服务器。如果您确实需要配置文件管理器，它可能是您需要在服务器上运行的唯一服务，并且它不依赖于 Open Directory 或任何其他服务。


  在下一章中，我们将探讨 MDM 概念，包括`User Approved MDM`、`Device Enrollment Program`和`Volume Purchase
  Program`。这些解决方案构成了为 Apple 品牌设备开发下一代部署和支持模式的基础。


  '
- '# 8. 移动设备管理


  移动设备管理（MDM）的概念已经存在了近二十年，但由于“自带设备”模式以及现在能够管理像 Mac 或 Windows PC 这样的传统台式计算机，近年来它变得越来越流行。MDM
  解决方案通过操作系统供应商提供的应用程序编程接口（API）工作，作为一种“无线”配置、控制、保护和管理设备的手段。在本章中，我们将探讨 Apple 为 MDM
  供应商提供的各种服务和 API，这些构成了管理现代`iOS`和`macOS`端点的基础。


  ## Apple MDM 入门


  所有的移动设备管理解决方案通常提供几个核心功能：库存管理和报告是其一；远程（无线）安全、配置和管理是其二；远程软件部署是其三。在 Apple 产品上，有三个主要组件提供这些功能。库存管理通过设备注册计划（DEP）处理；安全和配置通过配置描述文件负载处理；软件部署则通过批量购买计划（VPP）实现。我们将在本章中逐一介绍这些领域。


  当今市场上有许多第三方 MDM 解决方案。所有大型厂商都集成了 VPP 和 DEP，并使用配置描述文件提供远程管理。您可能听说过`JAMF`、`Cisco Meraki`或`Addigy`。这些都是最受欢迎的
  MDM 解决方案，它们各自都有区别于竞争对手的独特功能。通过`macOS Server`，Apple 还提供了一个第一方 MDM 解决方案——配置文件管理器。由于所有这些不同的管理解决方案都使用相同的
  API，我们将在本书中使用配置文件管理器来演示 MDM、DEP 和 VPP 的概念，这些概念将适用于您组织中选择使用的任何 MDM 解决方案。


  **专业提示**


  由于我们将在本章中讨论许多 Apple 托管服务，现在是向您介绍 Apple 的**系统状态**页面的好时机。您可以通过访问[`www.apple.com/support/systemstatus`](http://www.apple.com/support/systemstatus)来浏览此页面。在这里，您将看到所有各种
  Apple 托管服务，以及它们是否可用或是否存在问题。有时激活、DEP、VPP 或其他服务的问题可能是由于 Apple 一方的服务中断造成的。在排查各种问题时，这是一个很好的参考页面。




  ## 设备注册计划 (DEP)


  苹果公司的设备注册计划 (`DEP`) 是一项服务，当您直接购买设备或通过参与的苹果授权经销商购买设备时，苹果公司会提供此项服务。其运作方式是：当您的组织购买苹果设备时，苹果托管的数据库中会创建一条记录。每条记录包含设备型号信息、序列号以及（如果适用）其所属的特定移动设备管理（MDM）服务器。客户通过两个客户门户之一——`Apple
  School Manager`（苹果学校管理器）或`Apple Business Manager`（苹果商务管理器）——与`DEP`交互。这些在线门户允许您查找新设备并将其分配给特定的
  MDM 服务器。随着新设备的购买和发货，苹果会在数据库中填充新的设备记录。


  **专业提示**


  如果您有一台现有设备想要添加到您组织的`DEP`数据库中，您可以在`Apple Configurator`（苹果配置器）中手动完成此操作。如果您从一家不参与`DEP`的经销商处购买了设备，这也非常有用。您有
  30 天时间将设备从`DEP`中移除，之后该设备将被锁定为属于您组织的资产。尽管这听起来很诱人，但不建议将任何`BYOD`（自带设备）或最终用户个人拥有的设备添加到您组织的`DEP`数据库中。


  设备注册计划有两个非常具体的功能。首先，它为您所有的苹果设备提供了购买历史的证明。您可以通过序列号查找任何设备，查看它何时被添加到`DEP`（大致购买日期）、设备的型号/规格、以及用于购买的采购订单号和/或账户号。当您需要联系`AppleCare`（苹果客服）并且他们需要验证购买证明时，这些信息尤其有用。第二个功能是能够将设备分配到
  MDM 服务器，以便您可以在"设置助理"流程中应用配置描述文件。


  如图 8-1 所示，这个过程对最终用户是透明的。您可以使用`DEP`将设备分配给 MDM 服务器，并通过该 MDM 配置设备的限制、设置和应用程序。当用户完成欢迎屏幕并通过苹果激活设备时，设备会联系您的
  MDM 服务器，甚至在用户进入主屏幕或桌面之前就应用所需的配置设置——从而有效地管理设备，而无需 IT 人员实际接触设备。


  ![../images/492151_1_En_8_Chapter/492151_1_En_8_Fig1_HTML.jpg](img/492151_1_En_8_Fig1_HTML.jpg)


  **图 8-1**

  展示了`DEP`和`MDM`如何协同工作，以无线方式配置新设备的示意图


  ## 批量购买计划 (VPP)


  假设您需要为组织中每台 iPad 和 Mac 安装`Microsoft Office`套件。您希望能够自动完成此操作，无需最终用户干预，分别从`App Store`（应用商店）和`Mac
  App Store`（Mac 应用商店）推送安装。同时，您还希望确保用户在收到提示时可以使用自己的`Apple ID`（苹果账号）更新应用，而不是使用单一共享的机构`Apple
  ID`。苹果为此场景提供了一个解决方案，称为批量购买计划 (`VPP`)。


  苹果的`VPP`允许系统管理员从 App Store 购买任意数量的免费或付费应用，并将该应用的许可证分配给一个特定的`Apple ID`。该应用的许可证随时可以从特定用户处移除，然后分配给另一个用户。这使得组织可以为任何参与计划的应用购买一组许可证池，在用户需要时分配给他们，在不再需要时移除许可证。当许可证被移除时，它会重新放回许可证池，以便可以分配给其他用户。


  **专业提示**


  您可以将`托管式 Apple ID`或个人`Apple ID`与`VPP`结合使用。当您移除某个应用的许可证时，用户将收到应用许可证已被移除的通知，并且他们最多有
  30 天时间从该应用的容器中导出数据，或自行购买许可证以继续使用该应用。30 天的宽限期过后，该应用将从设备上消失。


  开发者必须选择加入，才能让他们的应用通过`VPP`进行购买。批量购买应用有时会有`VPP`折扣，或者如果您是学术机构的一部分，也可能适用教育折扣。这完全取决于应用开发者或出版商（例如`iBooks`）的决定。


  **专业提示**


  对于`iBooks`（现在是 Apple Books）而言，可以批量购买教科书或其他书籍的许可证，但与应用程序不同，它们无法被分配、然后移除并重新分配给另一个`Apple
  ID`。一旦一本书被分配给一个用户，它就归该用户所有，无法退回许可证池。


  ## 监管与用户批准的 MDM


  正如我们之前讨论过的，移动设备管理 (MDM) 是一种无线解决方案，用于向最终用户配置、保护、部署设备，以及管理设备，而无需 IT 人员物理接触这些设备。总体而言，这种统一设备管理的理念非常吸引人，因为我可以像管理`iOS`设备一样管理我的`macOS`客户端，但需要注意平台之间的一些重要差异。


  ### 设备监管


  在第 5 章中，我们讨论了与`iOS`设备和`Apple Configurator`相关的监管。由于`iOS`被设计为单用户操作系统，出于安全和支持考虑，它没有独立的"标准用户"和"管理员用户"来锁定操作系统的特定部分。监管是一种管理组织自有设备的方式，就像系统管理员在台式电脑上使用管理员账户一样。就像我们在`Apple
  Configurator`中所做的那样，您可以通过 MDM 解决方案监管`iOS`设备，从而获得完整的负载项目录访问权限，以限制和保护设备。




  ### 用户批准的 MDM


  在 `macOS` 中，没有监管模式，因为它被设计为一个多用户操作系统。您可以将配置描述文件负载应用到 Mac 客户端，只要用户不是本地管理员，就无法删除它。需要注意的是，任何在
  Mac 上拥有本地管理员权限的用户都可以使用 `Profiles System Preference` 删除任何配置描述文件。如果您使用 MDM 来保护您的 Mac，请确保您的用户帐户是
  `Standard` 或 `Managed`。


  > 专业提示

  >

  > `Profiles System Preference` 只有在安装了配置描述文件后才会可见。


  您在 `macOS` 客户端上安装的大多数配置描述文件在分配后会立即生效。有一类特殊的配置描述文件负载子集需要最终用户批准后才能生效。这些负载与 Apple 的透明度、同意和控制（TCC）计划相关。具体来说，这些是隐私偏好策略控制负载和内核扩展（kext）策略负载。


  有两种方式安装包含这类负载的配置描述文件。一种是在设备上交互式地双击 `.mobileconfig` 描述文件并逐步完成安装和批准对话框。另一种是通过 MDM
  解决方案推送配置描述文件，前提是该设备是通过 DEP 注册的。


  > 专业提示

  >

  > Apple 非常坚持与 TCC 相关的负载需要最终用户在设备上亲自批准。为此，他们甚至禁用了与 `Profiles System Preference` 交互以通过
  Apple Remote Desktop 或 Screen Sharing 远程批准描述文件的能力。


  以下是一些需要用户批准的 MDM 来管理的负载示例：


  *   照片

  *   相机

  *   麦克风

  *   提醒事项

  *   通讯录（联系人）

  *   辅助功能


  > 专业提示

  >

  > 相机和麦克风访问只能通过负载来禁用/拒绝。用户必须在特定应用程序首次使用这些设备时批准其访问权限。


  在第 [3] 章中，我们介绍了第三方内核扩展（kexts）的主题，以及最终用户需要在首次运行时使用 `Security & Privacy System Preference`
  来批准这些 kexts。如果我们的设备是用户批准的 MDM 设备，我们可以定义并自动将这些 kexts 列入白名单，使其无需提示最终用户批准即可运行。另一种理解用户批准的
  MDM 的方式是，系统管理员代表最终用户选择批准这类事项。用户批准的 MDM 是一个我们将在第 [9] 章中继续演示的主题，届时我们将使用 Profile Manager
  注册和管理设备。


  > 专业提示

  >

  > 监管 macOS 设备并不会获得特殊的管理能力。截至撰写本文时，管理员帐户在 `macOS` 上仍然优先于配置描述文件。同样，也没有与用户批准的 MDM 相当的
  `iOS` 概念，因为这仅适用于 Mac。


  ## Apple School Manager / Apple Business Manager


  如本章前面提到的，Apple School Manager 和 Apple Business Manager 是 Apple 为组织提供的非常相似的管理门户，用于管理
  MDM/DEP 和 VPP。Apple School Manager 有一些额外的学术专用功能，例如 `Classroom` 或 `Shared iPad` 选项，这些内容本书将不做介绍。我将使用
  Apple School Manager 来演示这两个门户的共同功能以及如何与您的 MDM 解决方案结合使用。


  ### 配置 Apple 的管理门户


  开始使用 Apple School Manager 或 Apple Business Manager 的第一步是创建一个机构 `Apple ID`，Apple
  将用它来创建机构管理员帐户。此 `Apple ID` 必须通过多因素身份验证进行保护，并且不应与单个员工的帐户关联。一旦 Apple 授予您访问 Apple School
  Manager 或 Apple Business Manager 门户的权限，您就可以使用此帐户登录并开始进行设置。根据您所属的组织类型，图 [8-2] 显示了
  [`http://school.apple.com`](http://school.apple.com) 和 [`http://business.apple.com`](http://business.apple.com)
  的登录窗口。


