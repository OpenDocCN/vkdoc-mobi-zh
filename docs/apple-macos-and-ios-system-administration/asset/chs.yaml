  ## 描述文件管理器


  我们将在 `macOS Server` 中配置的最后一项服务，实际上也是如今拥有一台 Mac 服务器的主要原因——`描述文件管理器`。`描述文件管理器` 是一个移动设备管理（MDM）解决方案，它与
  Apple 的云服务（如我们在本书中已提及的 `设备注册计划（DEP）` 和 `批量购买计划（VPP）`）集成。我们将在第 8 章和第 9 章中使用 `描述文件管理器`
  来创建配置描述文件，以 *无线* 方式供应和管理 iOS 设备及 Mac 客户端。


  在我们开始之前，使用 `描述文件管理器` 时需要注意几个前提条件。首先，服务器必须能从互联网访问。对于我的测试服务器，我临时启用了 `Apache` 并确保我能从网络内外都访问到
  "It works!" 页面。我还创建了一个域名，并确保我可以通过 DNS 名称（而不仅仅是 IP 地址）在公共互联网上访问到服务器。测试完成后，您可以再次禁用
  `Apache` 服务。其次，一旦您拥有一个可用的 Web 服务器，它还需要启用 SSL 加密。因此，您需要从您选择的证书颁发机构获取一个签名的证书。


