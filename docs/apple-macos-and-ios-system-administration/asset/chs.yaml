  \ 365 和 Microsoft OneDrive for Business。\n\n## 将用户从 Windows 迁移到 macOS\n\n如果 Don\
  \ 之前使用 OneDrive 存储所有数据，并且在他的 Windows PC 上没有使用 `*.pst` 文件，那么可能没有太多需要迁移的内容。然而，许多用户可能仍在其旧\
  \ PC 上存有需要转移到 Mac 的数据。为了完成 Don President 从 PC 到 Mac 迁移的最后一个步骤，我们需要将任何剩余的数据迁移到他的\
  \ Mac。\n\n幸运的是，苹果提供了一个相当有用的迁移工具来协助此过程。首先，确保他的新 Mac 和旧 PC 连接到同一网络，然后在 Don 的 Mac 上浏览到\
  \ `/Applications/Utilities/` 文件夹，并打开 **迁移助手** 实用程序。\n\n### 使用迁移助手\n\n启动迁移助手后，系统会警告你将关闭所有打开的应用程序，点击\
  \ **继续** 以开始。系统会提示输入本地管理员凭据以继续。认证成功后，包括 Finder 在内的所有应用程序都将关闭，迁移助手将开始运行。当提示选择要从中迁移的计算机时，应选择\
  \ **从 Windows PC**，如图 11-37 所示。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig37_HTML.jpg](img/492151_1_En_11_Fig37_HTML.jpg)\n\
