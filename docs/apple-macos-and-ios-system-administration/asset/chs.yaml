  ### 配置描述文件设置


  Profile Manager 的最后一步是向我们 `Design Team Device Group` 的成员分配设置。选中“设计团队”分组后，点击 `Settings`
  标签页，然后在 `Settings for Design Team` 标题下点击 `Edit` 按钮。这将打开我们的 `Configuration Profile`
  窗口，用于分配限制和设置。


  我们将在这里配置一些基本项，以符合我们 Windows 环境的观感。首先填写 `General` 有效负载部分，输入配置描述文件的名称和描述，并将 `Security`
  设置为 `With Authorization` 并设置一个密码。


  接下来，我们可以配置 `Passcode` 有效负载。将密码要求设置为最少八位字符的密码长度，并要求使用复杂字符，并设置登录尝试失败后的延迟时间，数值与本书前面多次使用过的类似。


  接着，我们将设置一些仅适用于 `macOS` 的特定设置。第一个是 `Directory` 有效负载。点击 `Configure`，然后从 `Directory
  Type` 弹出菜单中选择 `Active Directory`。我们需要提供域控制器的 `FQDN` 或 `IP 地址`，以及一个域管理员账户的用户名和密码。对于
  `Client ID`，我使用了变量 `%ComputerName%`，这样它就会使用我们分配给机器的名称，以匹配 AD 中现有的计算机记录。我们将把 `Organizational
  Unit` 留空，因为它应该基于现有记录加入到正确的 OU 中。你的 Directory 有效负载应类似于图 13-10。


