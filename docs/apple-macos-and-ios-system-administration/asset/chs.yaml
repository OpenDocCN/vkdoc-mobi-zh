  ## 证书


  当您完成将 Mac 客户端绑定到 Open Directory 的步骤时，您可能收到过一条消息，提示 `此服务器不提供安全（SSL）连接。是否继续？` 在这种情况下，由于我们是在设置测试服务器，因此选择忽略此消息并继续。但是，在生产环境中，您需要使用
  SSL 来保护客户端与服务器之间的通信，以防止中间人攻击等。即使您不使用 Open Directory，并且仅部署服务器以配合 Profile Manager
  使用，您也需要对证书以及在 macOS Server 中更改它们的方式有基本的了解。


  ### 回退 SSL 证书


  Apple 提供的最基本的证书是 `回退证书`。它在您安装 Server 应用程序时创建，虽然可用但很少使用。您可以在 Mac 服务器上打开 `钥匙串访问` 实用工具，然后点击
  `系统` 钥匙串下的 `证书` 来找到此证书。


  ### 自签名证书


  就 Open Directory 而言，Apple 提供了一个自签名证书，您可以在安装 Open Directory 服务时使用。自签名证书会提示用户信任它们，通常不是生产安装的最佳选择。如果我们希望用受信任的第三方证书替换它，可以调整用于
  Open Directory 的证书。


  ### 管理证书


  我们可以随时更改用于任何服务的证书。在对这些证书执行任何操作之前，我们需要停止使用它们的服务。在本例中，我们需要暂时关闭 Open Directory 服务，方法是点击
