  我们首先要做的是创建一个 MDM 服务器记录，以便将我们的服务器与 Apple 校园教务管理实例进行关联。这将允许我们将特定设备分配给运行`Profile Manager`的`macOS
  Server`并进行管理。


  ### 配置描述文件管理器与 DEP


  1.  第一步是浏览 Apple 校园教务管理/Apple 商务管理门户网站中的**设置**。点击**设备管理设置**，然后点击**添加 MDM 服务器**按钮，如图
