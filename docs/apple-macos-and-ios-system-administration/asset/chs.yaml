  ## 软件更新


  与其他操作系统类似，保持您的 `macOS` 客户端及时安装最新的安全补丁非常重要。`软件更新系统偏好设置` 让您能够控制 Mac 接收的更新内容以及更新时间。图
  2-26 显示了配置 Mac 以接收重要更新和安全补丁的基本类别和选项。除了控制 `macOS` 的更新，您还可以使用 `软件更新` 来安装任何从 `Mac App
  Store` 安装的应用程序的升级和补丁。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig26_HTML.jpg](img/492151_1_En_2_Fig26_HTML.jpg)


  图 2-26

  通过 `软件更新系统偏好设置` 控制更新下载和安装的选项


  虽然 Apple 通过 `软件更新系统偏好设置` 提供了一些控制 macOS 更新的基本选项，但通过 `终端` 还有更多微调更新的选项。正如您在图 2-27 中看到的，`softwareupdate`
  命令的 `man` 手册页提供了一些非常有趣的脚本选项。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig27_HTML.jpg](img/492151_1_En_2_Fig27_HTML.jpg)


  图 2-27

  通过 `终端` 查看的 `softwareupdate` 命令手册


  ### 通过终端配置软件更新


  让我们尝试一些有趣的事情。打开 `终端` 并运行以下命令：


  ```

  softwareupdate -l

  ```


  请注意您的 Mac 将花几分钟检查最新的更新。如果情况与我类似，它将会返回一个可用更新列表。图 2-28 显示我的系统有两个待处理的可用更新。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig28_HTML.jpg](img/492151_1_En_2_Fig28_HTML.jpg)


  图 2-28

  通过 `终端` 显示的可用更新输出


  在使用 `softwareupdate` 命令编写脚本时，我们可以使用的一个更强大的选项是能够 *排除* 我们不希望用户看到的更新。例如，我最喜欢的一个例子是，当发布新完整版
  `macOS` 时，Apple 会在 `系统偏好设置` 中显示的广告横幅。图 2-29 上方的图片就是一个示例，它提示我的用户在运行 `Mojave` 的 Mac
  上下载并安装 `macOS Catalina`。我不希望我的用户询问我安装新操作系统的事情，也不希望他们自己尝试在电脑上安装新的操作系统。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig29_HTML.jpg](img/492151_1_En_2_Fig29_HTML.jpg)


  图 2-29

  排除更新前后的 `软件更新` 窗口


  使用 `softwareupdate --ignore` 命令，加上它提示我安装的更新名称（本例中为 `macOS Catalina`），我可以隐藏这个横幅。正如您在图
  2-30 中看到的，当您使用 `sudo` 运行此命令时，它会将 `Catalina` 更新设置为 `ignored;`；当我重启 Mac 后，如果我再回到 `软件更新`，`Catalina`
  提示就从我的可用更新列表中消失了，如图 2-29 下方的图片所示。在您的 Mac 上输入以下命令来尝试一下：


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig30_HTML.jpg](img/492151_1_En_2_Fig30_HTML.jpg)


  图 2-30

  `softwareupdate --ignore` 命令的输出


  ```

  sudo softwareupdate --ignore "macOS Catalina"

  ```


  如果我想在以后撤销此更改，允许我的用户安装 `macOS Catalina`，我只需要输入 `softwareupdate --reset-ignored` 命令。


  如果您想审计哪些更新被设置为忽略，可以浏览到 `/Library/Preferences` 并找到 `com.apple.SoftwareUpdate.plist`
  文件。在 `Xcode` 或另一个可以打开 `.plist` 文件类型（也称为 `属性列表`）的 XML 文件的应用中打开此文件。


  当您打开 `.plist` 文件时，您会看到一个针对 `InactiveUpdates` 的 *数组*，数组内部嵌套的每个被忽略的更新都设置了对应的键。


  关闭 `.plist` 文件。输入以下命令来撤销被忽略的更新：


  ```

  softwareupdate –reset-ignored

  ```


  ### 专业提示


  除非您是开发者，否则 `Xcode` 可能有点大材小用，仅用于打开和编辑 `属性列表`。有许多免费或低成本的 `属性列表` 编辑器可用。`Thomas Tempelmann`
  开发的 `Prefs Editor` 是我发现使用起来快速简便的一个。


  ## 管理本地用户和群组


  在退出 `系统偏好设置` 之前，让我们回到 `用户与群组`。在本节中，我们将创建一个新的本地用户帐户并探索一些高级设置。


  ### 创建新用户


  首先，点击 `用户与群组系统偏好设置` 中的 `+` 按钮以添加一个新帐户。您会在 `新建帐户` 旁边的下拉菜单中看到，我们有几种帐户类型可选。我们可以选择 `管理员`、`仅限共享`、`标准`
  用户或一个新的 `群组`。我们将在第 7 章讨论 `仅限共享` 和 `群组` 选项。本例中，我们将选择 `标准` 用户，如图 2-31 所示。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig31_HTML.jpg](img/492151_1_En_2_Fig31_HTML.jpg)


  图 2-31

  创建新的标准本地用户帐户


  用您想要的任何数据填写必填字段。请注意，`全名` 是 *友好名称*，而 `帐户名称` 是 Unix 中的实际用户帐户，并且*默认情况下*它也将是用户 `个人文件夹`
  的名称。帐户名称中不能包含任何空格或特殊字符。填写完信息后，点击 `创建用户` 按钮继续。参见图 2-32。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig32_HTML.jpg](img/492151_1_En_2_Fig32_HTML.jpg)


  图 2-32

  我们新帐户的用户名和密码信息


  用户帐户创建完成后，您将在 `用户与群组` 窗格的左侧 `其他用户` 列表中看到友好名称和一个随机分配的照片。如果点击它以 `选中`，您可以在右侧修改一些内容。您可以使用
  `重置密码` 按钮来重置密码。最后，您可以通过勾选 `允许用户管理此电脑` 的复选框将其升级为 *本地管理员帐户*。




  ### 高级选项


  接下来，我们探讨一下这个新用户账户的一些高级选项。在其他用户列表中右键单击该用户账户，然后从出现的上下文菜单中选择**高级选项...**，如图 2-33 所示。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig33_HTML.jpg](img/492151_1_En_2_Fig33_HTML.jpg)


  图 2-33


  通过右键单击找到隐藏的高级选项...菜单


  当高级选项窗口出现时，你会看到一个关于修改这些设置的警告。我通常不会经常调整其中的许多选项，但既然这是一个测试，你可以随意尝试以了解其因果关系，而不用担心损坏生产环境的用户账户。


  这里有一些项目非常有用，如图 2-34 所示。你可以看到默认组是 `staff`，因为这是一个标准用户。登录 shell 默认为 `zsh`，因为我使用的是 Catalina。如果需要，我可以修改此项并选择
  `bash`，以使其与早期版本的 macOS 保持一致。这里显示了用户主目录路径，我可以在需要时将其更改为其他位置或卷。我可以为此特定用户账户设置一个 Apple
  ID，以便用于 iCloud 或 Mac App Store，这样用户首次登录时就无需再设置。这对于分配机构 Apple ID 可能很有用，我们将在本书后续章节中介绍这一点。


  最后，我们可以为此用户账户添加别名。别名允许我们添加其他用户名，这些用户名可以用来替代官方账户名进行登录。例如，如果我的账户名很长或很复杂，我可以添加一个较短的用户名作为别名。一些组织可能会这样做，以保持网络用户主目录的某种标准化，同时为用户提供一个友好的登录用户名。我个人并不经常使用别名，但你的情况可能有所不同。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig34_HTML.jpg](img/492151_1_En_2_Fig34_HTML.jpg)


  图 2-34


  高级用户选项


  ### 登录项


  接下来，我们将探索登录项的概念。请先关闭高级选项窗口，然后单击当前用户下列出的你的用户账户。点击**登录项**选项卡，如图 2-35 所示。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig35_HTML.jpg](img/492151_1_En_2_Fig35_HTML.jpg)


  图 2-35


  登录项选项卡


  登录项可以被认为是用户登录时会自动打开或运行的项目，类似于 Microsoft Windows 的启动项。登录项不仅限于应用程序，你可以包含文档、脚本，甚至卷。你可以指定映射的网络驱动器，使其在登录时尝试重新连接；或者打开浏览器中的
  HTML 文件，将用户重定向到特定网页以用于强制门户。


  有时，应用程序在安装过程中会将一些项目添加到登录项列表中。如果你不希望这些辅助应用程序自动启动，可以在此处禁用该功能。你可以使用 `+/-` 按钮来添加或移除登录项。你也可以通过拖放操作，将项目直接从访达添加到列表中。


  ### 用户模板


  关闭系统偏好设置，返回访达。使用**前往**菜单，选择**电脑**，打开一个访达窗口，以便浏览 Macintosh HD 的目录。浏览到 `/Users` 目录，如图
  2-36 所示。你应该能看到自己的主目录以及其他用户的文件夹。当你尝试深入查看新用户的主文件夹时，虽然可以看到桌面、文稿等文件夹，但无法查看其内容。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig36_HTML.jpg](img/492151_1_En_2_Fig36_HTML.jpg)


  图 2-36


  尝试浏览其他本地用户的主目录


  虽然我们可以更改这些文件夹的文件权限并深入查看其内容，但此刻我们不会这样做。我引导你浏览到此目录，是为了说明在创建新用户账户时，会构建一个标准的文件夹结构。为了解其工作原理，我们将浏览启动磁盘的另一个区域，即系统的
  `Library` 目录。返回到 Macintosh HD 的根目录，然后深入至 `/Library/User Template/`，如图 2-37 所示。


  > 专业提示

  > 请注意，我使用的是 macOS Catalina。较旧版本的 macOS 将用户模板文件夹放置在 `/System/Library/` 目录中，而 Catalina
  则将其放在 `/Library` 目录下。如果你在 Catalina 中确实浏览到了 `/System/Library/`，苹果公司已友好地在那里为用户模板的新位置放置了一个替身（别名）。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig37_HTML.jpg](img/492151_1_En_2_Fig37_HTML.jpg)


  图 2-37


  macOS Catalina 中的用户模板目录


  `User Template` 文件夹基本上如其名所示——它是一个默认用户设置和目录结构的模板，用于构建新用户的主文件夹。其中还有针对全球不同地理区域的语言和键盘设置的各种文件夹。


  在 macOS Mojave 之前，许多 Mac 系统管理员会利用用户模板文件夹来预载各种偏好设置，从而修改新用户的默认界面外观。最近，苹果公司修改了 macOS
  处理用户模板的方式，使得这一功能失效。现在，推荐使用配置描述文件来自定义用户账户的界面外观。本书后续涉及描述文件管理器和 MDM 解决方案的章节将涵盖配置描述文件。


  ## 高级访达技巧


  ### Option 键修饰键


  苹果公司在包括访达在内的许多 macOS 应用程序中使用的一个秘密技巧是，将 `option 键` 作为显示高级菜单选项的修饰键。如图 2-38 所示，按住 `option
  键` 可以更改或为各种菜单添加额外功能。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig38_HTML.jpg](img/492151_1_En_2_Fig38_HTML.jpg)


  图 2-38


  使用 option 键更改或添加隐藏菜单项




  ## 目录结构


  要最好地理解如何管理和排查`macOS`的问题，熟悉操作系统目录结构的三个关键区域非常重要。在本节中，我们将探讨`系统`文件夹、`用户`文件夹以及隐藏的 Unix
  `private`目录。我们将使用如图 2-39 所示的`前往`菜单和`前往文件夹…`选项。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig39_HTML.jpg](img/492151_1_En_2_Fig39_HTML.jpg)


  **图 2-39："前往文件夹…"菜单项**


  要浏览到`系统`文件夹，我们将使用`前往`菜单并选择`电脑`。这将把我们带到 Macintosh HD 的根目录。在之前浏览用户模板目录时，您已经对系统文件夹有了一定的了解。有两个文件夹共同构成了`macOS`的核心——`系统`和`资源库`。这些文件夹包含系统范围的设置、驱动程序、系统文件以及随各种应用程序安装的任何第三方扩展。


  作为苹果**系统完整性保护**计划的一部分，这些目录大多是只读的。从`macOS Catalina`开始，苹果还将操作系统默认包含的基础应用程序集存储在`/System/Applications`中一个符号链接的应用程序文件夹里。这些文件夹全部位于一个单独的只读卷上，并包含在整体的`Macintosh
  HD`容器中，与用户可修改的`Macintosh HD - 数据`卷一起，对最终用户来说如同一个单一驱动器，如图 2-40 所示。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig40_HTML.jpg](img/492151_1_En_2_Fig40_HTML.jpg)


  **图 2-40: 在 macOS Catalina 中，系统文件夹现在包含了操作系统附带的原厂应用程序**


  接下来，我们可以使用`前往`菜单并按住`option`键，使`资源库`文件夹出现在选项列表中。选择`资源库`后，会弹出一个新的访达窗口，并带您进入`/Users/用户名/资源库`目录，如图
  2-41 所示。请注意，此资源库文件夹与系统范围的资源库文件夹不同，它是针对**当前登录用户**的，且默认隐藏。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig41_HTML.jpg](img/492151_1_En_2_Fig41_HTML.jpg)


  **图 2-41: 用户的资源库文件夹和偏好设置目录**


  这个用户资源库文件夹，有时也被称为`~/Library`，其中波浪号`~`代表当前用户主目录的路径，包含了该用户特有的各种设置和应用程序支持数据。需要熟悉的一个关键子文件夹是`偏好设置`文件夹，它包含控制特定应用程序设置的`属性列表`文件。


  通常，当一个应用程序首次启动时，它会将其默认偏好设置写入此目录。在后续启动时，如果偏好设置数据存在，应用程序会在启动时读取并加载它。如果数据不存在，应用程序将再次写入新的默认偏好设置。因此，排查有问题的应用程序时，一个常见的初步步骤是尝试删除一个支持文件夹或属性列表文件，看看将偏好设置重置为默认值是否能解决问题。


  接下来，让我们使用`前往`菜单中的`前往文件夹…`选项，浏览 Macintosh HD 根目录下隐藏的 Unix `private`目录，如图 2-42 所示。这本质上是`macOS`的
  Unix 核心，包含诸如`/etc`、`/var`和`/tmp`等各种目录。通常最好不去动这些目录，但如果您浏览`/tmp`目录，会发现这里有一些缓存，各种应用程序会将数据转储于此，这些数据会在重启过程中定期被删除。我们稍后在编写批量应用程序安装脚本时会用到`/tmp`目录。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig42_HTML.jpg](img/492151_1_En_2_Fig42_HTML.jpg)


  **图 2-42: 隐藏的 Unix private 文件夹及其内容**


  最后，让我们再次打开终端，在命令提示符下输入：


  ```

  cd /

  ```


  以移动到启动磁盘的根目录。接着使用：


  ```

  ls

  ```


  来列出目录的内容。除了我们期望看到的文件夹如`系统`、`资源库`和`应用程序`之外，我们还看到许多其他文件夹，如`bin`、`sbin`、`usr`、`dev`、`cores`和`opt`。这些是操作系统使用的额外隐藏文件夹，类似于`/private`文件夹。您可以自行探索这些文件夹，但请注意，最好让操作系统按预期运行，不要轻易改动它们。


  ### 应用程序捆绑包


  `应用程序捆绑包`，有时也称为`应用程序包`，实际上是一种文件夹或容器，对最终用户来说看起来像一个单一文件，但实际上它是一个包含支持数据的自包含可执行程序包。我们可以`右键单击`应用程序图标，选择`显示包内容`来深入查看此捆绑包中包含的支持文件。这在日常工作中很少使用，但值得了解的是，应用程序不仅仅是表面看起来那么简单。


  > **专业提示**

  >

  > 还记得本章前面我们用来创建可启动 macOS 安装 USB 驱动器的命令吗？如果您查看我们运行的脚本，会看到其中有一个指向`createinstallmedia`命令的路径，该命令位于`安装
  macOS Catalina`应用程序捆绑包内的`资源`文件夹中。打开此捆绑包的包内容，看看您是否能浏览到脚本中引用的`createinstallmedia`文件。


  ### 内核扩展


  内核扩展，简称`kext`，是一小段加载到操作系统内核中并提供对硬件或其他组件支持的代码。您通常会看到第三方 kext 用于外部硬件，例如通过 Thunderbolt
  或 USB 连接的专业音频混音器。您可以通过浏览`/System/Library/Extensions`文件夹或如图 2-43 所示通过终端运行`kextstat`命令来查看这些
  kext 文件。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig43_HTML.jpg](img/492151_1_En_2_Fig43_HTML.jpg)


  **图 2-43: kextstat 命令的输出，显示所有正在运行的内核扩展**


  从`macOS High Sierra`开始，苹果引入了一项新的安全功能，要求用户在内核扩展首次需要加载时*批准*它们。系统会通过对话框提示用户批准，然后将用户重定向到*安全性与隐私系统偏好设置*，在`通用`标签页下点击`批准`按钮。苹果在`Mojave`和`Catalina`中继续加强了
  kext 的安全性，这两者都要求 kext 必须由开发者进行*代码签名*。同样重要的是要注意，如果您清除了`NVRAM`，所有已授权的 kext 都必须重新授权。


  > **专业提示**

  >

  > 如果您使用的应用程序或工作流程涉及 kext，最佳做法是确保您使用的是最新的应用程序版本，以避免由于苹果不断调整的安全要求而导致问题。在批准客户端系统上的操作系统更新之前，您还应咨询那些广泛使用
  kext 的应用程序的开发者，以确保兼容性。即使是像从`10.15.0`升级到`10.15.1`这样的小更新，也存在破坏软件兼容性的风险。




  ### 额外系统实用工具


  在我们探索各种系统和库文件夹的同时，有必要提一下隐藏在 macOS 内部的几个对网络和系统管理员非常有用的附加实用程序。浏览到 `/System/Library/CoreServices/Applications/`，在这个文件夹中，你会看到许多应用程序，如
  `Archive Utility`、`DVD Player`、`Network Utility` 和 `Wireless Diagnostics`。


  其中一些应用程序可以通过 macOS 中的其他方式访问，例如 `Archive Utility`、`Wireless Diagnostics` 和 `关于本机`。其他一些是来自不再作为标准配置的硬件的实用程序，例如
  `DVD Player`（我的 `MacBook` 没有光驱）。其中一个特别有用的实用程序 `Network Utility`，可能值得将其移回其早前版本所在的位置
  `/Applications/Utilities` 目录中。


  如图 2-44 所示，网络实用工具包含诸如 `ping`、`nslookup`、`traceroute` 等常见工具。你可能希望将其保存到 Dock，从“实用工具”文件夹创建其替身，或者记住当你需要时，可以使用菜单栏右上角的
  `放大镜` 并按名称搜索网络实用工具。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig44_HTML.jpg](img/492151_1_En_2_Fig44_HTML.jpg)


  图 2-44


  使用网络实用工具 ping [www.​apple.​com](http://www.apple.com)


  #### 钥匙串访问


  任何关于 macOS 客户端管理的章节，如果不讨论令人头疼的 `钥匙串`，都是不完整的！如果你进行过任何一段时间的 Mac 支持工作，很可能遇到过关于 `登录`
  钥匙串的晦涩信息或其他恼人的与钥匙串相关的错误。钥匙串是什么，为什么它给我的用户带来这么多麻烦？


  钥匙串可以通过位于 `/Applications/Utilities` 的 `钥匙串访问` 实用程序进行管理，它存储了 Mac 上用于访问各种网站、安全应用程序、服务和无线网络的所有不同用户名和密码组合。它还可以存储证书和加密密钥。你的
  Mac 上有多个钥匙串，包括 `系统`、`本地项目` 和 `登录`，如果你已登录并激活了它，`iCloud 钥匙串` 还可以通过在多个 Apple 设备间同步项目来发挥作用。图
  2-45 展示了钥匙串访问应用程序以及我的 Mac 上的各种钥匙串、密码、证书和密钥。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig45_HTML.jpg](img/492151_1_En_2_Fig45_HTML.jpg)


  图 2-45


  在登录钥匙串中找到的钥匙串访问数据


  虽然这看起来相当简单和无害，但钥匙串的问题通常始于用户密码被重置或更改时。密码更改后，用户下次登录时，可能会看到一个对话框，提示他们使用新密码更新登录钥匙串或创建新的登录钥匙串。用户毕竟是用户，他们可能会选择错误的选项、跳过此步骤，或者不知道他们的旧密码而无法有效更新它，现在我们遇到了臭名昭著的登录钥匙串问题。


  如果用户知道旧密码，这个问题相对容易解决。只需打开 `钥匙串访问`，选择 `登录` 钥匙串，然后从 `编辑` 菜单中选择 `更改钥匙串“登录”的密码`。它会提示输入旧密码和新密码，然后相应地更新钥匙串。


  但如果用户不知道旧密码呢？在这种情况下，我们必须创建一个新的登录钥匙串。为此，请打开 `钥匙串访问`，然后从 `钥匙串访问` 菜单中选择 `偏好设置…`。在偏好设置对话框中，点击
  `重置我的默认钥匙串` 按钮，如图 2-46 所示。请注意，这将删除 `登录` 和 `本地项目` 钥匙串，并用新的*默认*钥匙串替换它们。这意味着存储在这些钥匙串中的任何密码或条目都将被删除，用户将需要重新登录各种网站和服务以重新建立这些密钥。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig46_HTML.jpg](img/492151_1_En_2_Fig46_HTML.jpg)


  图 2-46


  重置登录和本地项目钥匙串


  ## 总结


  在本章中，我们涵盖了大量内容。现在你应该熟悉 macOS 的基本文件系统和目录结构了。你应该对使用终端感到相对自如了。你已经能够创建和管理新的本地用户帐户。最后，你学会了如何查找和使用功能强大的隐藏应用程序和功能。


  Apple 的 macOS 是一个非常强大且功能丰富的操作系统，每个新版本都在不断发展和变化。对安全和隐私的关注一直是推动最新版本中许多增强功能的动力。因为这是一个非常重要且不断变化的话题，我们的下一章将专门讨论
  macOS 中的最新安全和隐私功能。


  '
- '# 3. macOS 安全


  macOS 是否真的比 Windows 更安全尚有争议，但 Apple 已经赢得了 Mac 比其他平台更不易受到恶意软件和隐私泄露影响的声誉。在 macOS 过去几个版本的迭代中，Apple
  的许多安全和隐私服务持续演进，Mojave 和 Catalina 更是进一步强调了 `沙盒化` 和 `用户确认`。本章探讨了 Mac 系统管理员必须熟悉的硬件和软件安全与隐私控制。


  ## Mac 硬件安全


  ### 基本 EFI 启动安全


  每台现代 Mac 都通过使用 `固件密码` 提供了可扩展固件接口（EFI）启动安全。使用 `固件密码实用工具` 或 `启动安全性实用工具`（取决于所使用的 macOS
  版本），系统管理员可以锁定用户的能力，使其在未先输入密码的情况下无法将 Mac 启动到预启动环境。当你设置 EFI 密码后，在正常使用系统时通常看不到密码提示。当用户尝试将
  Mac 启动到 `恢复模式`、`网络启动` 或 `可移动介质启动` 时，EFI 将在继续之前提示输入密码。这将 Mac 锁定为仅能从内部硬盘的操作系统启动。


  要访问固件密码实用工具或启动安全性实用工具，你必须首先按照本书第 2 章的概述将 Mac 启动到恢复模式。一旦进入 macOS 恢复环境，请从 `实用工具` 菜单中选择
  `固件密码实用工具` 或 `启动安全性实用工具`，如图 3-1 所示。按照屏幕上的提示设置固件密码，然后重新启动。确保你设置的密码是你会记住的，或者记录在你的
  IT 组织内的某个地方。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig1_HTML.jpg](img/492151_1_En_3_Fig1_HTML.jpg)


  图 3-1


  在 macOS 恢复模式中找到启动安全性实用工具


  ```

  专业提示


  请注意，设置 EFI 密码会将其保存到 Mac 逻辑板的持久性内存空间中。它不容易重置，根据 Apple 的官方文档，重置此密码的唯一授权方法是将计算机带到 Apple
  零售店或其他 Apple 授权维修机构进行密码重置。

  ```




  ### Apple T2 安全芯片


  自 2017 年底 `iMac Pro` 发布起，Apple 开始为大多数新款 Mac 配备一款名为 `T2` 的下一代定制芯片。T2 芯片集成了多种不同的硬件控制器，旨在通过单一芯片实现硬件级安全。例如，它集成了
  `SSD 控制器` 以及一个全新的 `安全隔区` 协处理器，该协处理器负责在硬件层面管理启动安全和存储加密。


  截至本文撰写时，以下机型配备了 T2 芯片：


  *   2017 年款 iMac Pro（及后续机型）

  *   2018 年款 Mac mini（及后续机型）

  *   2018 年款 MacBook Air（及后续机型）

  *   2018 年款 MacBook Pro（及后续机型）


  要确定您的 Mac 是否配备 T2 安全芯片，可以通过 `关于本机` 对话框查看 `系统报告` 并点击 `系统报告` 按钮来查找。在系统信息界面中，依次展开 `硬件`
  > `控制器 (或 iBridge)`；如果 `控制器型号名称` 为 `Apple T2 芯片`，则您的计算机配备了该芯片。T2 安全芯片启用/影响着以下功能：


  *   **触控 ID**（将触控 ID 数据存储在安全隔区中）

  *   前置 **FaceTime 高清摄像头** 的信号图像处理，用于面部识别

  *   启用 **安全启动**

  *   增强的 **加密存储**

  *   安全 **系统管理控制器**

  *   麦克风安全的 **安全音频控制器**


  `安全启动` 是 T2 芯片的一项功能，应特别引起 Mac 系统管理员的关注。此功能仅在配备 T2 芯片的 Mac 上可用，当您启动进入 `macOS 恢复`
  模式时会找到它。要配置安全启动功能（如图 3-2 所示），启动进入恢复模式后，从 `实用工具` 菜单中选择 `启动安全性实用工具`。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig2_HTML.jpg](img/492151_1_En_3_Fig2_HTML.jpg)


  图 3-2

  安全启动功能的配置选项


  安全启动提供三种选项：`完整安全性`、`中等安全性` 和 `无`。任何 T2 机型出厂时默认启用 `完整安全性`。此选项需要互联网连接，并会检查您尝试安装的操作系统当前是否受
  Apple 信任。`中等安全性` 会检查您尝试安装的操作系统是否曾被 Apple 信任，且无需互联网连接。`无` 则完全不强制要求操作系统签名或信任。


  请注意，在启用 T2 的系统上，此实用工具取代了 `固件密码实用工具`。它具备控制外部启动的能力，您可以禁止或允许从 USB 闪存驱动器、Thunderbolt
  硬盘等外部介质启动。对于资深的 Mac 系统管理员而言，还需要一提的是，T2 芯片不支持网络启动或 `NetBoot`。T2 Mac 唯一支持的有网络功能的启动选项是使用
  Apple 的 `互联网恢复` 服务。如果您正在使用基于 NetBoot 的映像部署工作流来预置硬件，请注意您将无法在启用 T2 的 Mac 上这样做。


  ## 文件权限


  与其他基于 Unix 的操作系统一样，`macOS` 使用 `POSIX` 文件权限。对于任何文件、文件夹或宗卷，可以按用户或组分配四种标准权限。


  ### POSIX


  `只读`：用户可以浏览文件目录并从中打开/复制文件，但不能写入该目录或保存对文件的更改。


  `只读与执行`：用户可以读取目录中的文件并执行目录中的应用程序。


  `只写`：用户仅能向具有此权限的文件夹写入内容。他们无法打开该文件夹或浏览其内容，只能将文件放入具有只写权限的目录中。


  `无访问权限`：用户无权访问该文件或文件夹。


  除了文件权限选项外，`macOS` 中的每个文件或目录都具有一个 `所有者`（特定用户）、一个（特定）`群组` 以及一个 `所有人` 群组。"所有人"群组是一个统称，指代任何可能访问该文件或目录但不是特定所有者或群组成员的用户。您可以将此理解为
  *其他所有人*。所有者是创建文件或将其复制到当前目录的特定用户。群组通常继承自文件或文件夹所在的父文件夹。


  `macOS` 中默认的文件权限群组包括：


  *   `staff`：所有本地用户帐户所属的群组，包括标准用户。

  *   `admin`：所有具有管理员权限的本地用户帐户所属的群组，拥有一些提升的权限，例如能够写入 `/应用程序` 文件夹。

  *   `wheel`：此群组保留给 `超级用户` 或 `root` 帐户。root 帐户是该群组的唯一成员，且应保持如此。许多系统文件和目录受此群组保护。


  ### 修改文件权限


  除非您正在 Mac 上设置特定的局域网或互联网文件共享，否则建议并最好保持文件和文件夹的默认权限。如果您在同一台 Mac 上的多个用户之间本地共享文件，Apple
  在每个用户的家目录中都提供了一个 `公共` 文件夹，用于放置旨在同一台机器上跨多个用户共享的文件。


  如果您确实需要修改文件权限，可以在访达中选择文件或文件夹，然后从 `文件` 菜单中选择 `显示简介` 或通过 `右键点击` 来操作。图 3-3 概述了如何进行这些更改。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig3_HTML.jpg](img/492151_1_En_3_Fig3_HTML.jpg)


  图 3-3

  "显示简介"对话框中的"共享与权限"面板


  *   `挂锁`：如果已锁定，点击它以使用具有解锁权限的用户进行认证，以便更改文件或文件夹的共享和安全设置。

  *   `+/- 按钮`：使用这些按钮来添加或删除用户或群组，并设置额外的权限。

  *   `齿轮按钮`：使用此选项可将文件夹的权限复制到其包含的文件和文件夹。这允许您更改顶级目录的权限，并将这些权限向下复制。

  *   `权限下拉菜单`：使用此菜单为给定的用户或群组设置权限。




  ## 家长控制和屏幕使用时间


  `macOS Catalina` 之前的版本提供了一个*家长控制*系统偏好设置，允许本地管理员创建一个具有额外可配置限制的标准用户账户。在创建新用户并选择**“通过家长控制管理”**作为用户类型时，您可以创建一个受家长控制的用户。或者，当您打开*家长控制*系统偏好设置时，它会提示您创建一个受管理的用户账户，如图
  3-4 所示。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig4_HTML.jpg](img/492151_1_En_3_Fig4_HTML.jpg)


  图 3-4

  `macOS Catalina`之前版本中的家长控制系统偏好设置


  苹果决定在 `macOS Catalina` 中移除*家长控制*功能，转而将首次出现在 `iOS 12` 中的一个功能移植到 `macOS`，该功能称为*屏幕使用时间*。配置屏幕使用时间是通过新的系统偏好设置完成的，如图
  3-5 所示。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig5_HTML.jpg](img/492151_1_En_3_Fig5_HTML.jpg)


  图 3-5

  `macOS Catalina` 中新的屏幕使用时间系统偏好设置


  家长控制中的几乎所有功能都已添加到屏幕使用时间中，同时还增加了允许本地管理员权限的用户使用此功能的选项。这样设计的目的是让用户可以监管自己的计算和社交媒体习惯，同时仍能完全管理系统。屏幕使用时间相对而言易于理解，但这里有一些非常酷的新功能需要重点介绍。


  其中一个功能是能够从您自己的 Mac 上管理您孩子的所有设备，而无需在他们的设备上交互式地设置。只要您的 iCloud 账户启用了*家庭共享*，并且您孩子的 iCloud
  账户是家庭共享计划的一部分，您就可以无线管理所有的屏幕使用时间功能。如果您要管理孩子的设备，您需要设置一个屏幕使用时间密码，以防止他们覆盖您的设置。要做到这一点，请点击*屏幕使用时间系统偏好设置*中的**“选项”**按钮，并如图
  3-6 所示设置密码。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig6_HTML.jpg](img/492151_1_En_3_Fig6_HTML.jpg)


  图 3-6

  屏幕使用时间的选项按钮和密码选项


  Mac 上屏幕使用时间的另一个功能是能够独立控制您的 `iOS` 和 `macOS` 设备的**“内容与隐私限制”**。例如，只要您在 `iOS` 和 `macOS`
  之间共享屏幕使用时间数据，您就可以在 Mac 上限制不当内容，但在 iOS 设备上则不限制。除了这些功能之外，屏幕使用时间的大部分内容与您在旧版 `macOS`
  的*家长控制*中找到的类似。有**时间限制**用于管控上学时间或就寝时间的设备使用（现在称为*停用时间*，如图 3-7 所示），以及可以定义的**内容和隐私**设置，如图
  3-8 所示。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig8_HTML.jpg](img/492151_1_En_3_Fig8_HTML.jpg)


  图 3-8

  屏幕使用时间中的内容与隐私限制


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig7_HTML.jpg](img/492151_1_En_3_Fig7_HTML.jpg)


  图 3-7

  停用时间计划设置


  *App 限额*提供了新的精细控制级别，可以控制哪些应用程序能够使用、何时使用以及可以使用多长时间。您可以选择应用程序类别或指定特定的应用程序为*受限*或*允许*。使用**“始终允许”**配置选项来指定要允许的应用程序，即无论一天中的什么时间或使用时长如何，都可以使用的应用程序，如图
  3-9 所示。如果您正在管理孩子的设备，他们在达到应用程序限额后也可以请求更多时间，您可以通过 Mac 上的*屏幕使用时间系统偏好设置*来批准该请求。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig9_HTML.jpg](img/492151_1_En_3_Fig9_HTML.jpg)


  图 3-9

  App 限额允许您指定哪些应用程序可用以及每天可以使用多长时间


  **专业提示**


  屏幕使用时间提供了一些基本功能来控制计算机使用和过滤内容，但需要注意的是，这是为消费者使用而开发的，并不是用于大规模 1:1 部署的万无一失的安全解决方案。根据您组织的具体需求，可能还有其他商业安全应用程序更适合。**移动设备管理**
  (`MDM`)——我们将在第 8 章讨论——提供了比单独使用屏幕使用时间更精细、更有效的方法来限制大量 Mac。


  ## Gatekeeper


  苹果限制 `macOS` 上恶意软件的方法是要求合法的应用程序开发人员对其应用程序进行*签名*，否则未经用户明确同意，这些应用程序将无法运行。*Gatekeeper*是苹果给这个功能起的名字，它通过*安全性与隐私系统偏好设置*进行控制。图
  3-10 显示了配置 Gatekeeper 的选项。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig10_HTML.jpg](img/492151_1_En_3_Fig10_HTML.jpg)


  图 3-10

  安全性与隐私系统偏好设置“通用”标签中的 Gatekeeper 选项


  Gatekeeper 为系统管理员提供了两个选项，允许 Mac 运行来自第三方开发者的应用程序。**“App Store 和被认可的开发者”**是默认选项，该选项会阻止未经代码签名或非从*Mac
  App Store*下载的应用程序运行。**“App Store”**是更安全的选项，它限制用户运行任何从互联网下载的应用程序，只允许从*Mac App Store*下载的应用程序。


  作为管理员，您可能仍然需要出于某种原因运行一个未经代码签名或不是从 Mac App Store 下载的应用程序。在早于 `Sierra` 的 `macOS` 版本中，有第三个选项**“任何来源”**，允许您运行应用程序而不会受到
  Gatekeeper 的阻拦。尽管此选项在较新的版本中已被移除，但管理员仍然可以通过**右键单击** Gatekeeper 阻止的应用程序，选择**“打开”**，然后在警告对话框中同意，从而覆盖
  Gatekeeper 并允许该应用程序运行，即使这样做可能不安全。




  ## FileVault


  `FileVault`是苹果内置的磁盘加密技术，目前版本为 2.0。要启用`FileVault`，请使用`Security & Privacy System Preference`，然后在
  FileVault 标签页中点击**Turn on FileVault**…按钮，如图 3-11 所示。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig11_HTML.jpg](img/492151_1_En_3_Fig11_HTML.jpg)


  图 3-11

  在安全性与隐私系统偏好设置中启用 FileVault 加密


  启用`FileVault`时，需要配置一个恢复密钥选项，以防需要解密驱动器或在另一台 Mac 上装载它。对于个人使用，您可能希望配置您的 iCloud 帐户来解密驱动器。对于小型企业或公司，如果只需要在几台
  Mac 上支持`FileVault`加密，建议为每个系统创建一个恢复密钥，并将密钥字符串保存在安全的地方，以便在需要解密驱动器时参考。此选项如图 3-12 所示。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig12_HTML.jpg](img/492151_1_En_3_Fig12_HTML.jpg)


  图 3-12

  选择 FileVault 恢复密钥


  ### FileVault 机构恢复密钥


  如果您有数百或*数千*台需要加密的 Mac，并且您不想为每个用户或每台机器管理单独的恢复密钥字符串，该怎么办？幸运的是，苹果提供了为组织中的每台 Mac 创建和部署**机构恢复密钥**（IRK）的选项。部署
  IRK 涉及三个步骤：在一台 Mac 上创建**主钥匙串**，编辑主钥匙串的副本以**移除私钥**，然后将配置**部署**到所有其他 Mac。


  创建`FileVault`密钥需要使用命令行界面。打开`Terminal`，在提示符处输入以下命令来创建主钥匙串：


  ```

  security create-filevaultmaster-keychain ~/Desktop/FileVaultMaster.keychain

  ```


  系统会提示您创建密码。按照提示创建并验证密码。命令执行完毕后，您的桌面上会出现一个名为`FileVaultMaster.keychain`的文件，如图 3-13
  所示。这是私钥恢复密钥的原始副本，可用于解锁组织中任何配置为使用 IRK 的 Mac。您需要将其复制到安全位置，并限制仅授权人员可以访问。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig13_HTML.jpg](img/492151_1_En_3_Fig13_HTML.jpg)


  图 3-13

  该命令已在桌面上生成了一个 FileVaultMaster 钥匙串


  接下来，我们需要准备一份用于部署到其他 Mac 的副本：


  1.  使用`Keychain Access`应用程序打开`FileVaultMaster.keychain`文件。

  2.  在`Keychain Access`应用程序中，单击左侧的`FileVaultMaster`以选中它。如果需要，单击**padlock**图标并进行身份验证以解锁它。密码与您在`Terminal`中创建`FileVaultMaster`文件时使用的密码相同。

  3.  在右侧找到名为`FileVault Master Password Key`的*私钥*文件，如图 3-14 所示。单击它以选中，然后从`Edit`菜单中选择`Delete`将其删除。现在您就有了一个缺少私钥的钥匙串文件。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig14_HTML.jpg](img/492151_1_En_3_Fig14_HTML.jpg)


  图 3-14

  删除 FileVault Master Password Key


  现在我们已经准备好将 IRK 部署到其他 Mac。在每台您想要配置使用 IRK 的 Mac 上，请按照以下步骤操作。


  4.  将我们修改过的`FileVaultMaster.keychain`文件复制到`/Library/Keychains/`文件夹，如图 3-15 所示。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig15_HTML.jpg](img/492151_1_En_3_Fig15_HTML.jpg)


  图 3-15

  将修改后的钥匙串文件复制到要使用 IRK 的每台客户端 Mac 的`/Library/Keychains/`目录


  5.  打开`Terminal`应用程序，输入以下命令来正确设置文件的权限。这些命令将所有者设置为`root`，组设置为`wheel`，然后设置我们想要的正确读/写权限：


  ```

  sudo chown root:wheel /Library/Keychains/FileVaultMaster.keychain

  sudo chmod 644 /Library/Keychains/FileVaultMaster.keychain

  ```


  6.  打开`Security & Privacy System Preference`并浏览到 FileVault 标签页。单击按钮以启用`FileVault`。如果操作正确，您将不会收到创建恢复密钥的提示，而是会看到类似图
  3-16 中的消息。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig16_HTML.jpg](img/492151_1_En_3_Fig16_HTML.jpg)


  图 3-16

  FileVault 不会提示输入恢复密钥选项；它会自动使用 IRK


  **专业提示**

  您可能会遇到这样一种情况：组织中的一些机器已经启用了`FileVault`，而您希望将其转换为使用 IRK。如果是这种情况，在复制钥匙串文件并设置正确的文件权限后，您可以在`Terminal`中输入一个命令，将现有的`FileVault`恢复密钥转换为您机构的恢复密钥。


  将现有的`FileVault`实例转换为机构恢复密钥的命令：


  ```

  sudo fdesetup changerecovery -institutional -keychain /Library/Keychains/FileVaultMaster.keychain

  ```


  ## 防火墙


  苹果为`macOS`提供了一个内置的软件防火墙，默认情况下是禁用的。要配置它，请打开`Security & Privacy System Preference`并选择`Firewall`标签页。在这里，您可以打开或关闭防火墙。启用防火墙后，您可以配置各种选项。图
  3-18 显示了可用的选项以及如何将应用程序添加到例外列表。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig18_HTML.jpg](img/492151_1_En_3_Fig18_HTML.jpg)


  图 3-18

  防火墙例外和可配置选项


  ## 高级安全选项


  您可能已经注意到`Security & Privacy System Preference`上的`Advanced`按钮。单击该按钮时，您将有几个可以配置的附加选项，这两个选项都真正面向共享计算环境，如计算机实验室或公共区域。图
  3-19 显示了这些选项。


  ![../images/492151_1_En_3_Chapter/492151_1_En_3_Fig19_HTML.jpg](img/492151_1_En_3_Fig19_HTML.jpg)


  图 3-19

  高级安全性与隐私选项


  *   **在 x 分钟不活动后注销**：此选项可以配置为在指定时间内无用户交互后，自动将 Mac 返回到登录窗口。如果有人在公共场所离开并让计算机保持使用唯一用户帐户登录的状态，这有助于保护用户数据。

  *   **需要管理员密码才能访问系统范围的偏好设置**：您可能会注意到许多（但并非全部）系统偏好设置都有一个锁定图标，可以锁定非管理员用户所做的更改。选中此选项的复选框会在**所有**系统偏好设置面板上放置一个锁定图标。这允许系统管理员设置通常可由标准用户修改的特定用户设置，并保持这些设置不变。




  ## 总结


  在本章中，我们探讨了保护 Mac 安全的多种方法，了解了 Apple 在核心安装的`macOS`中提供的各种内置安全功能，并认识了`Transparency,
  Consent, and Control`等新兴的安全框架。在深入研究了 Mac 相关的两个章节后，我们将转换主题，接下来探索`iOS`和`iPadOS`。


  ### iOS 客户端管理


  与`macOS`相比，`iOS`及其衍生的`iPadOS`是相对年轻的操作系统。它于 2007 年随第一代`iPhone`一同发布，至今仅有十多年历史，目前已发展到第十三个主要版本。相较于桌面操作系统，`iOS`的管理要简洁直接得多。其最初被设计为手机的操作系统，并不具备传统计算机操作系统的要求，例如从互联网任意位置安装下载的软件或强大的外围设备支持。虽然`iOS`比真正的桌面级系统简单，但在支持大量`iPhone`和`iPad`时，系统管理员仍需熟悉一些关键功能。本章为理解
  Apple 为运行`iOS` 13 和`iPadOS`（13）的设备提供的配置、安全和故障排除能力奠定了基础。


  ## iOS 硬件支持


  `iPhone`和`iPad`的物理按钮或开关非常少。在大多数情况下，iOS 设备不被认为是用户可自行维修的，这意味着只有`Apple Authorized Repair
  Center`或`Apple Retail Store`可以进行维修。除了标准重启，你还可以尝试使用特殊的按钮组合进行`forced restart`，以解决`iPad`或`iPhone`的常见问题。


  ### 强制重启


  当设备完全冻结或卡死，无法选择正常重启时，你可能需要强制重启设备。如果操作正确，`forced restart`将关闭所有应用并彻底重启设备。图 4-1 至 4-5
  提供了截至本文撰写时各主流 iOS 设备系列的强制重启操作说明。


