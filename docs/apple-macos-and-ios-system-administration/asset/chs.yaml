  \ 9-9 所示。你的用户还将在`设置`窗口的左上角看到你的监督标识。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig9_HTML.jpg](img/492151_1_En_9_Fig9_HTML.jpg)\n\
  \n**图 9-9**\n\n我们的`管理描述文件`已安装，设备已受监督\n\n9.  点击`下一步`以逐步完成配置过程。这将需要几分钟时间来配置设备并将其注册到`MDM`中。然后它会提示你设置密码、选择浅色或深色模式、向你介绍`iPadOS`功能，最后用`欢迎`和`开始使用`按钮问候你，带你进入`主屏幕`。\n\
  \n### 专业提示\n\n如果你在使用了`网络地址转换 (NAT)`的无线网络上大规模部署`iOS`设备，需要记住的一件事是：如果`iOS`设备从同一个公网`IP`地址连续快速地进行空中激活，苹果可能会限制多台设备的激活。例如，在学校这样的大型组织中，你可能同时有数十或数百台设备在激活，你可能会遇到激活失败的问题。我建议与你所在机构的苹果代表沟通，将你的公网`IP`地址加入白名单，以避免此问题。\n\
  \n对于`macOS`客户端，此过程非常相似，除了少数仅适用于 Mac 的独特功能。探索基本注册设置，并将你的`测试 Mac`配置为在`设置助手`期间注册，并跳过除`条款与条件`提示之外的所有步骤。你应该能够使用`DEP`轻松地将你的测试`Mac`客户端注册到`MDM`中。试试看！\n\
  \n\n\n### 我的设备门户\n\n接下来一种设备注册方式是使用内置于 `Profile Manager` 的自助服务式 `我的设备门户`。使用设备门户注册方法有一些注意事项。这确实旨在用于“自带设备”部署场景，因此你的\
  \ iOS 设备将无法被监督。除了这一限制之外，最终用户可以随时移除 MDM 注册，而你却毫不知情。使用 `我的设备门户` 的主要好处是，你组织的用户可以在无需将设备交给你（IT\
  \ 部门）进行配置的情况下，注册 MDM。\n\n要配置自助服务注册，我们需要做一些快速调整。我建议你禁用“所有人”组访问 `我的设备门户` 的权限，如图 9-10\
  \ 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig10_HTML.jpg](img/492151_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n取消勾选“允许访问我的设备门户”选项\n\n我还建议创建一个名为 `BYOD` 或 `自服务` 的新用户组，并将 `我的设备门户` 的访问权限限制为该组成员。你应该实施某种访问管理流程，例如通过一个\
  \ Web 表单或向 IT 部门提交故障工单，让用户在其中请求 BYOD 访问权限并向你提供其设备序列号，这样你就能为该设备设置一个占位符并将用户添加到 `BYOD`\
  \ 组中。这样一来，就不会有任何未经你知情或同意的设备被添加进来。\n\n**专业提示**\n\n如果你正在使用 `Apple 校园教务管理` 或 `Apple\
  \ 商务管理`，你应该通过管理门户管理你的用户和群组，或者配置 `Azure AD` 集成。否则，你可以使用 `服务器` 应用中的 `用户与群组` 来创建这些账户。\n\
  \n一旦你按要求设置了必要的用户和群组，请确保你创建的新 `BYOD` 组有能力访问 `我的设备门户` 及相关设置，如图 9-11 中我的 `所有 ASM 人员`\
  \ 组所示。接下来，我们需要为个人设备配置一个占位符，并将其与我们的最终用户关联。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig11_HTML.jpg](img/492151_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n配置自助服务群组的限制以允许访问我的设备门户\n\n## 为 BYOD 注册创建占位符设备\n\n对于本例，我将设置我的个人 iPhone\
  \ 作为占位符，并将其分配给我在 `Apple 校园教务管理` 中的用户。\n\n1.  我们需要做的第一件事是为这部 iPhone 配置一个占位符。点击侧边栏中的\
  \ `设备` 按钮，然后点击 `+` 按钮并选择 `添加占位符` 以创建一个新的占位符，如图 9-12 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig12_HTML.jpg](img/492151_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n\n点击 + 按钮以定义新占位符\n\n2.  当提示创建新占位符时，我将选择 `iOS` 作为 `设备类型`，并输入 `设备名称` 以及序列号或其他唯一标识符，如\
  \ `UDID` 或 `MEID`。请继续为你自己的设备输入信息。完成后，你应该会得到一个占位符设备，类似于我在图 9-13 中所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig13_HTML.jpg](img/492151_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\n我为个人设备创建的占位符\n\n3.  现在我们有了一个占位符设备，我们需要将该设备分配给我们的用户。我已在 `Apple 校园教务管理`\
  \ 中创建了一个名为 `Drew Smith` 的测试用户。在 `描述文件管理器` 中，选择侧边栏中的 `用户`，然后选择你的测试用户并点击 `设备` 选项卡，如图\
  \ 9-14 所示。点击 `+` 按钮 ➤ `添加设备`，然后在弹出的对话框中将 BYOD 占位符设备添加到该用户。点击 `完成` 按钮，然后点击 `保存` 按钮以继续。\n\
  \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig14_HTML.jpg](img/492151_1_En_9_Fig14_HTML.jpg)\n\
  \n图 9-14\n\n将占位符设备添加到测试用户\n\n现在我们已经配置好了一切，让我们以最终用户的身份来测试一下。在个人设备上，打开 `Safari` 或你选择的其他浏览器，访问\
  \ `http://yourdomain/mydevices` —— 其中 *yourdomain* 是你用于 `描述文件管理器` 的域名。在我的例子中，它是\
  \ `http://579testing.com/mydevices`。使用与占位符设备关联的用户名登录，如图 9-15 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig15_HTML.jpg](img/492151_1_En_9_Fig15_HTML.jpg)\n\
  \n图 9-15\n\n我的 iPhone 上的我的设备门户\n\n登录后，你需要做两件事。首先，你需要注册设备，所以点击那个大的蓝色 `注册` 按钮，并按照提示下载\
  \ `注册描述文件`，如图 9-16 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig16_HTML.jpg](img/492151_1_En_9_Fig16_HTML.jpg)\n\
  \n图 9-16\n\n点击注册按钮以下载注册描述文件\n\n接下来，点击 `描述文件` 选项卡，然后点击大的 `安装` 按钮，为你的组织安装一个 `信任描述文件`，如图\
  \ 9-17 所示。这将确保设备信任从你的 MDM 发送到该设备的所有描述文件和命令。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig17_HTML.jpg](img/492151_1_En_9_Fig17_HTML.jpg)\n\
  \n图 9-17\n\n将我们 MDM 的信任描述文件下载到设备\n\n最后，关闭 `Safari`，打开 `设置` 应用，浏览至 `通用` ➤ `描述文件`，找到我们下载的\
  \ `远程管理描述文件`。点击 `安装` 按钮以在测试设备上启用 MDM，如图 9-18 所示。你可以通过浏览至 `通用` ➤ `设备管理` 来确认它已安装在设备上，你将在这里看到我们的\
  \ `远程管理` 服务器信息。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig18_HTML.jpg](img/492151_1_En_9_Fig18_HTML.jpg)\n\
  \n图 9-18\n\n安装移动管理描述文件\n\n我们也可以在 `描述文件管理器` 中确认设备已成功添加。再次打开 `描述文件管理器` 控制台，点击侧边栏中的\
  \ `设备` 按钮。你应该会看到我们的新设备现在已经在那里，并且不再是一个占位符，如图 9-19 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig19_HTML.jpg](img/492151_1_En_9_Fig19_HTML.jpg)\n\
  \n图 9-19\n\n我的 iPhone 现已注册到我的 MDM 并可以被管理\n\n至此，只要最终用户不移除 `管理描述文件`，我们就可以管理此设备。请注意，由于这不是被监督的设备，应用某些有效负载的能力将受到限制。\n\
  \n在我们继续之前，这是一个很好的时机来演示如何使用 `描述文件管理器` 控制台来 `取消注册` 设备。你可能出于多种原因希望这样做。例如，如果这是一个 BYOD\
  \ 设备且用户已离开你的组织，你很可能想要移除该设备，特别是如果用户在离开时不够精通技术，未能自行移除 `管理描述文件`。\n\n\n\n## 移除设备\n\n\
  要移除设备，请打开`Profile Manager`，点击侧边栏中的`Devices`按钮。选择您想要移除的设备以高亮显示它，然后点击`–`按钮，如图 9-20\
  \ 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig20_HTML.jpg](img/492151_1_En_9_Fig20_HTML.jpg)\n\
  \n**图 9-20：从 Profile Manager 中注销设备**\n\n`Profile Manager`会提示您选择`Unenroll`设备或`Revert\
  \ to Placeholder`，如图 9-21 所示。如果您知道用户已经自行移除了管理配置文件，可以选择`Revert to Placeholder`。如果您不确定配置文件是否已被移除，请选择`Unenroll`，这将把设备恢复为占位符，并远程从设备中移除管理配置文件。我们将点击`Unenroll`按钮。\n\
  \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig21_HTML.jpg](img/492151_1_En_9_Fig21_HTML.jpg)\n\
  \n**图 9-21：当被提示时，如果您不知道用户是否已自行移除管理配置文件，请选择注销**\n\n几分钟后，设备将恢复为“占位符”标签状态，您可以直接通过`Settings`应用\
  \ ➤ `General`在设备上确认设备管理配置文件现已消失。由于这是 BYOD 设备，我们可以点击占位符设备，然后再次点击`–`按钮，确认我们也想移除该占位符。\n\
  \n## Apple Configurator\n\n将设备注册到 MDM 的第三种方法是通过`Apple Configurator`。在第 5 章中，我们跳过了\
  \ MDM 提示，并承诺将在后面的章节中介绍，现在就是时候了。使用`Apple Configurator`将设备注册到 MDM 的主要缺点是**(a)**它仅限于\
  \ iOS 设备，以及**(b)**您仍然需要物理接触每台设备。`Apple Configurator`的好处是，如果您已经在物理接触每台设备、应用蓝图等，那么添加\
  \ MDM 支持以实现未来对配置的无线更新是快速且容易的。\n\n### 在 Apple Configurator 中启用 MDM 注册\n\n我们需要调整一些设置，以便开始将`Apple\
  \ Configurator`与我们的 MDM 一起使用。\n\n1.  当提示时，使用您的 Apple School Manager/Apple Business\
  \ Manager 管理员*Apple ID*和密码登录 DEP。\n2.  当提示时，选择您希望向用户显示的 iOS 设置助理屏幕，然后点击`Prepare`按钮。\n\
  \n**专业提示** 如果您使用的是通过设置助手用于 DEP 注册的同一台测试设备，在尝试使用`Apple Configurator`激活设备之前，您应该从 MDM\
  \ 中移除该设备并删除占位符。否则，当设备到达激活步骤时，它会提示错误，说明您需要使用 DEP 来激活并将设备注册到 MDM。\n\n3.  点击`Next`按钮以完成配置。\n\
  4.  接下来，让我们用另一台 iOS 设备测试我们的 MDM 配置。使用 USB 电缆将测试设备连接到`Apple Configurator`。设备出现后，选中它并点击工具栏中的`Prepare`按钮。\n\
  5.  在出现的“准备设备助理”对话框中，选中`Supervise devices`旁边的复选框，然后点击`Next`按钮继续。\n6.  在`Enroll in\
  \ MDM Server`选项中，如图 9-25 所示，从弹出菜单中选择我们的服务器。点击`Next`继续。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig25_HTML.jpg](img/492151_1_En_9_Fig25_HTML.jpg)\n\
  \n**图 9-25：当提示时，选择您的 MDM 服务器**\n\n7.  点击`+`按钮向`Apple Configurator`添加一个新的 MDM 服务器。为服务器起一个描述性的名称，然后编辑`Host\
  \ name or URL`字段，将“myserver.local”替换为您的服务器域名。例如，我的服务器是[`579testing.com`](http://579testing.com)，如图\
  \ 9-24 所示。更新域名时，请务必保持 URL 的其他部分不变。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig24_HTML.jpg](img/492151_1_En_9_Fig24_HTML.jpg)\n\
  \n**图 9-24：编辑域名以使 Apple Configurator 指向您的 MDM**\n\n8.  接下来，在您计划用于配置设备的 Mac 上，从应用程序文件夹中打开`Apple\
  \ Configurator`。从`Apple Configurator`菜单中选择`Preferences…`，然后点击`Servers`选项卡，如图 9-23\
  \ 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig23_HTML.jpg](img/492151_1_En_9_Fig23_HTML.jpg)\n\
  \n**图 9-23：Apple Configurator 偏好设置面板中的 Servers 选项卡**\n\n9.  我们需要做的第一个更改是选择用于`Apple\
  \ Configurator`的监管身份。登录到您的 Mac 服务器并打开`Server`应用程序。从侧边栏点击`Profile Manager`服务，然后根据您的服务，在\
  \ Apple School Manager 或 Apple Business Manager 下点击`Configure…`按钮。\n10. 点击`Supervision`选项卡，然后选中`Use\
  \ Apple Configurator to configure enrolled devices`旁边的复选框。接下来，如图 9-22 所示，从`Supervision\
  \ Identity`下拉菜单中选择您签名的信任证书。点击`Done`按钮继续。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig22_HTML.jpg](img/492151_1_En_9_Fig22_HTML.jpg)\n\
  \n**图 9-22：为 Apple Configurator MDM 注册配置监管身份**\n\n当准备过程完成后，点击设备上的 iOS 设置助手，它应该会抑制我们为其选择的提示。当您到达主屏幕时，打开`Settings`应用并浏览到`General`\
  \ ➤ `Device Management`，我们的`Management Profile`应该已经存在。您可以打开`Profile Manager`并点击`Devices`，以确保我们的设备现在也可用于额外的管理。\n\
  \n**专业提示**\n\n您是否在“准备设备助理”中看到了`Add to Device Enrollment Program`复选框？这是一个很好的附加选项，您可以使用它将任何通过非\
  \ Apple 或支持 DEP 的 Apple 授权经销商购买的组织设备添加到 DEP 数据库中。当您选中此框时，它会将设备添加到 DEP 数据库。\n\n\n\
  \n### 手动安装或使用安装脚本\n\n最后一种选择是手动创建并下载注册配置文件，然后在设备上交互式地安装它们。对于 Mac，可以使用 `Apple Remote\
  \ Desktop` 脚本完成；对于 iOS 设备，可以将其托管在内部网站上或通过电子邮件发送给最终用户。使用此方法的主要缺点是自动化程度最低，并且在 macOS\
  \ 客户端的情况下，使用脚本会导致额外的交互操作，以启用用户批准的 MDM。\n\n## 使用注册配置文件添加设备\n\n1.  首先，我们需要创建注册配置文件。打开\
  \ `Profile Manager` 并单击 `+` 按钮 ➤ **新建注册配置文件**。命名注册配置文件，现在我们**取消选中占位符要求**，如图 9-26\
  \ 所示，这样任何安装此配置文件的设备都会被添加到我们的 MDM 中。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig26_HTML.jpg](img/492151_1_En_9_Fig26_HTML.jpg)\n\
  \n    图 9-26\n    创建新的注册配置文件\n\n2.  点击 `保存` 按钮，然后点击 `下载` 按钮以下载*注册配置文件*。它会将一个新的 `*.mobileconfig`\
  \ 配置文件下载到您的 Mac。如果它尝试安装，请取消，然后将其从“下载”文件夹移出，放到桌面上。\n\n3.  接下来，我们需要下载一份*信任配置文件*的副本。单击\
  \ `Profile Manager` 窗口右上角的 `已登录用户` 按钮，选择 `下载信任配置文件`，如图 9-27 所示。同样，如果它尝试安装，请取消，然后将信任配置文件从“下载”文件夹拖到桌面。\n\
  \n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig27_HTML.jpg](img/492151_1_En_9_Fig27_HTML.jpg)\n\
  \n    图 9-27\n    将信任配置文件下载到桌面\n\n4.  现在您的桌面上应该有两个 `*.mobileconfig` 文件。一个是信任配置文件，以便我们添加的设备信任我们的\
  \ MDM 服务器；另一个是指引我们设备连接到 MDM 服务器的注册配置文件。这本质上与自助注册过程中安装的两个文件相同。\n\n5.  对于下一步，您应该有一台已添加到\
  \ `Apple Remote Desktop` 的测试 Mac。我们将编写一个脚本，在那台远程 Mac 上安装这两个配置文件。继续操作，使用 `复制` 命令将两个\
  \ `*.mobileconfig` 文件复制到远程计算机上的 `/tmp` 目录，如图 9-28 所示。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig28_HTML.jpg](img/492151_1_En_9_Fig28_HTML.jpg)\n\
  \n    图 9-28\n    Apple Remote Desktop 中的复制文件对话框\n\n6.  接下来，我们可以继续选择向测试 Mac 发送 Unix\
  \ 命令来安装这些配置文件。我们将使用位于 `/usr/bin/` 中的 `profiles` 命令。在 ARD 的 Unix 窗口中，输入以下命令，如果您的两个\
  \ `*.mobileconfig` 文件名与我的不同，请相应指定：\n\n    ```\n    /usr/bin/profiles -I -F /tmp/Trust_Profile_for_MyCompany.mobileconfig\n\
  \    /usr/bin/profiles -I -F /tmp/New_Enrollment_Profile.mobileconfig\n    ```\n\
  \n    `-I` 代表安装，`-F` 代表文件，后面跟着要安装的文件的路径。您的**ARD 发送 Unix 命令**窗口应如图 9-29 所示。\n\n \
  \   ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig29_HTML.jpg](img/492151_1_En_9_Fig29_HTML.jpg)\n\
  \n    图 9-29\n    Apple Remote Desktop 中的发送 Unix 命令窗口\n\n7.  接下来，让我们登录到测试 Mac，查看配置文件是否已安装。如果脚本运行正确，您应该会看到一个新的\
  \ `配置文件系统偏好设置`。点击 `配置文件系统偏好设置`，您应该会看到两个**设备配置文件**，如图 9-30 所示。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig30_HTML.jpg](img/492151_1_En_9_Fig30_HTML.jpg)\n\
  \n    图 9-30\n    新安装的设备配置文件\n\n8.  将命令发送到测试 Mac。如果我们希望将来再次运行，可以将其保存为模板。\n\n9. \
  \ 返回 `Profile Manager` 并查看设备列表。您的设备列表中应该会有一个新的 Mac，就像我在图 9-31 中那样。这代表了我们刚刚使用 `Apple\
  \ Remote Desktop` 脚本添加的 Mac。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig31_HTML.jpg](img/492151_1_En_9_Fig31_HTML.jpg)\n\
  \n    图 9-31\n    我们的测试 Mac 已添加到 Profile Manager\n\n10. 现在返回测试 Mac，并再次浏览 `配置文件系统偏好设置`。点击\
  \ `远程管理配置文件`。您是否看到一条*提示信息“在批准此配置文件之前，功能可能受限。”*？这是指用户批准的 MDM（UAMDM）。我们在第 8 章简要讨论过\
  \ UAMDM。因此，虽然此 Mac 现在列在 `Profile Manager` 中，但在我们将此 Mac 转换为用户批准状态之前，我们可以使用的负载类型存在一些限制。\n\
  \n11. 将此设备转换为用户批准的 MDM 只有一种方法，那就是直接在设备上交互式地单击 `批准…` 按钮。没有可以用于转换的脚本；您可以尝试屏幕共享或使用\
  \ ARD 的远程控制选项来点击 `批准…` 按钮，但 Apple 已将其阻止。您需要坐在那台特定的机器前并单击 `批准…` 按钮。点击 `批准…` 按钮并进行确认，如图\
  \ 9-32 所示。\n\n    ![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig32_HTML.jpg](img/492151_1_En_9_Fig32_HTML.jpg)\n\
  \n    图 9-32\n    点击批准按钮以启用用户批准的 MDM\n\n我们现在已通过在测试 macOS 客户端上使用脚本手动配置了 MDM。\n\n\
  ### 专业提示\n\n将 `macOS` 设备成功注册到 MDM 并自动配置为用户批准状态的唯一方法是使用 DEP 注册方法。如果您在设置助理期间使用 DEP\
  \ 推送注册配置文件，该设备将成为用户批准状态，无需任何额外的交互操作。\n\n## 使用 Profile Manager 管理 iOS\n\n既然我们已经了解了在\
  \ `macOS` 和 `iOS` 客户端上注册和取消注册的各种方式，现在让我们探索一下 Profile Manager 控制台中可用的一些管理功能。在本节中，我们将重点关注\
  \ iOS 功能和负载。如果尚未进行，请继续使用您喜欢的方法将一台测试 iOS 设备注册到 `Profile Manager` 中，并确保它已被监督。\n\n\n\
  \n### iOS 配置描述文件\n\n现在来点有趣的。让我们首先在配置文件管理器的`Devices`区域选择我们的测试设备。点击我们之前配置激活和注册选项的`Settings`选项卡。在设置页面的顶部，你应该会看到一个`Settings\
  \ for iPad`部分，如图 9-33 所示。点击`Edit`按钮。\n\n![images/492151_1_En_9_Chapter/492151_1_En_9_Fig33_HTML.jpg](img/492151_1_En_9_Fig33_HTML.jpg)\n\
  \n**图 9-33**\n点击编辑按钮以访问测试设备的配置描述文件设置\n\n`Settings for iPad`窗口对你来说会非常熟悉，因为它与 Apple\
  \ Configurator 中看到的类似。这基本上就是我们前几章用过的、与`iOS`兼容的配置描述文件列表。请按要求配置`General`描述文件，确保选择`Automatic\
  \ Push`作为`Profile Distribution Type`。接下来，我们将配置几个会改变主屏幕可见布局的描述文件，用于演示目的。\n\n向下滚动到`Home\
  \ Screen Layout`描述文件。点击`Configure`按钮来自定义描述文件设置。使用`Dock`字段下的`+`按钮，将`App Store`、`Mail`和`News`添加到\
  \ Dock 中，如图 9-34 所示。\n\n![images/492151_1_En_9_Chapter/492151_1_En_9_Fig34_HTML.jpg](img/492151_1_En_9_Fig34_HTML.jpg)\n\
  \n**图 9-34**\n配置主屏幕布局描述文件\n\n接下来，点击`Lock Screen Message`描述文件。点击`Configure`按钮，输入你想在锁屏上显示的`lost\
  \ message`和`asset tag info`。最后，点击`Restrictions`，然后点击`Configure`来自定义这些选项。\n\n我们将取消勾选以下项目：\n\
  *   允许使用 FaceTime（仅受监管设备）\n*   允许使用 iMessage（仅受监管设备）\n*   允许使用 Apple Music（仅受监管设备）\n\
  *   允许使用收音机（仅受监管设备）\n*   允许移除应用程序（仅受监管设备）\n*   允许移除系统应用（仅受监管设备）\n*   允许应用内购买\n\n\
  你的屏幕应该类似于图 9-35。点击`OK`按钮继续。\n\n![images/492151_1_En_9_Chapter/492151_1_En_9_Fig35_HTML.jpg](img/492151_1_En_9_Fig35_HTML.jpg)\n\
  \n**图 9-35**\n配置限制描述文件\n\n现在你会在`Settings for iPad`部分下看到我们配置的各种描述文件。点击`Save`按钮将这些设置应用到我们的测试\
  \ iPad 上。如果你的 iPad 已开机并停留在主屏幕，几秒钟后你会看到一些变化发生。Dock 会更新为我们指定的三个应用，Messages 和 FaceTime\
  \ 应用会从设备上完全消失，并且尝试删除任何已安装的应用程序。祝你好运！你的设备应该看起来类似图 9-36。\n\n![images/492151_1_En_9_Chapter/492151_1_En_9_Fig36_HTML.jpg](img/492151_1_En_9_Fig36_HTML.jpg)\n\
  \n**图 9-36**\n我们被管理的 iPad，具有指定的限制和设置\n\n回到锁屏界面，你会看到一条关于联系支持的信息和一个资产标签号。\n\n接下来，让我们返回配置文件管理器并撤销其中一些设置。点击设备`Settings\
  \ for iPad`部分下的`Edit`按钮。点击`Restrictions`描述文件下的`-`按钮以移除它，然后点击`OK`继续。点击`Save`按钮，将这些更改无线应用到测试\
  \ iPad 上。几秒钟后，FaceTime 和 Messages 应用将返回主屏幕，现在你几乎可以删除任何你想删除的应用了。删除 Stocks 应用来确认一下。太棒了！\n\
  \n这非常类似于我们在 Apple Configurator 中配置和部署描述文件的方式，但额外的好处是能够实时更新设备，而无需通过 USB 线缆将其连接到我们的\
  \ Mac。这就是 MDM 的力量。此时，你可以试验所有种类的`iOS`描述文件，将它们应用到你的测试 iOS 设备或从中移除，看看设备如何反应。有很多非常棒的功能可供你使用，所以我鼓励你花时间尝试这些功能，看看它们如何融入你的整体部署和管理策略。\n\
  \n### iOS 远程管理\n\n除了应用配置描述文件之外，`Actions`按钮的子菜单中还提供了一些很好的远程管理功能。为了演示，请在你的测试 iOS 设备上交互式地设置一个密码。密码是什么或有多复杂都没关系。将设备返回锁屏并确认其已锁定。一旦设备被锁定，返回配置文件管理器，从`Devices`列表中选择测试\
  \ iOS 设备。点击`Action`按钮并选择`Clear Passcode`，如图 9-37 所示。\n\n![images/492151_1_En_9_Chapter/492151_1_En_9_Fig37_HTML.jpg](img/492151_1_En_9_Fig37_HTML.jpg)\n\
  \n**图 9-37**\n从操作子菜单发送清除密码命令\n\n提示时点击`Confirm`。经过几秒钟的活动后，回到你的测试 iPad，瞧！iPad 被解锁了。这不仅是一个有趣的小把戏，你实际上还可以用它来进入那些用户忘记了密码或已不在组织内的被管理设备。\n\
  \n你可以试验许多不同的操作：`Restart`、`Shut Down`、`Wipe`等等。只要设备连接到互联网，它就会响应任何远程管理命令。\n\n## 使用配置文件管理器进行\
  \ macOS 管理\n\n我们已经探索了 iOS 设备可用的一些描述文件和操作，但`macOS`客户端也有一些独特的选项。在本节中，我们将重点介绍`macOS`的能力和描述文件。如果你还没有这样做，请使用你喜欢的方法将一台测试\
  \ Mac 客户端注册到配置文件管理器中，并确保它是用户批准的。\n\n\n\n### macOS 负载\n\n与 iOS 设备类似，我们也可以配置特定的 `macOS`\
  \ 负载。在配置文件管理器（Profile Manager）中浏览您所管理的测试 Mac，并点击**设置**标签页。就像我们对测试 iPad 所做的操作一样，点击\
  \ **测试 Mac 的设置** 部分下方的**编辑**按钮。配置描述文件窗口出现后，您会注意到设置被分成了不同的区块，以标识负载适用于哪个操作系统。您应小心谨慎，仅配置专门针对\
  \ `macOS` 的负载，或那些适用于包括 macOS 在内的多种操作系统的负载。\n\n首先配置 **通用** 负载，并确保 **配置文件分发类型** 选择了\
  \ **自动推送**。接下来，让我们向下滚动到仅适用于**macOS**的负载部分，并点击 **登录窗口**。点击**配置**按钮，并按照图 9-38 所示自定义设置。\n\
  \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig38_HTML.jpg](img/492151_1_En_9_Fig38_HTML.jpg)\n\
  \n图 9-38 登录窗口负载设置\n\n接下来，我们可以向下滚动到 **安全性与隐私** 并点击**配置**按钮来编辑该负载。点击 **隐私** 标签页，并自定义设置以匹配图\
  \ 9-39 中的设置。我们在这里所做的操作是将 `Finder` 应用添加到 `~/Documents` 文件夹，并设置为始终允许 `Finder` 访问它，而无需在每次被新用户帐户访问时提示用户。这是\
  \ `Mojave` 和 `Catalina` 中的新“透明度、同意与控制”功能之一，您需要花一些时间进行配置和测试。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig39_HTML.jpg](img/492151_1_En_9_Fig39_HTML.jpg)\n\
  \n图 9-39 安全性与隐私负载中的 TCC/PPPC 设置\n\n最后，点击 **限制** 并点击**配置**按钮来编辑该负载。在 **偏好设置** 标签页中，选择\
  \ **限制系统偏好设置中的项目**，然后取消勾选 **启动磁盘** 和 **软件更新**，如图 9-40 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig40_HTML.jpg](img/492151_1_En_9_Fig40_HTML.jpg)\n\
  \n图 9-40 禁用对特定系统偏好设置的访问\n\n点击 **确定** 以保存 **测试 Mac 的设置**，然后点击**保存**按钮以应用它们。\n\n几分钟后，让我们来看看我们一直在测试的\
  \ `macOS` 客户端发生了什么变化。如果您**注销**，您会看到登录窗口已更改为简单的用户名和密码字段；点击屏幕右上角的时钟将允许您切换查看计算机名称、IP\
  \ 地址等信息。从登录窗口**关机**的能力也被禁用了，但如果需要，您仍然可以**重启**计算机。\n\n以本地用户身份登录，并从 **Apple** 菜单打开\
  \ **系统偏好设置**。如图 9-41 所示，*启动磁盘*和*软件更新系统偏好设置*已被禁用并呈灰色显示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig41_HTML.jpg](img/492151_1_En_9_Fig41_HTML.jpg)\n\
  \n图 9-41 被禁用的系统偏好设置面板显示为灰色\n\n### 专业提示\n\n如果您打算使用配置文件管理器（Profile Manager）限制系统偏好设置，您需要在\
  \ **登录窗口** 负载中调整一个设置，以允许本地管理员能够访问这些被禁用的系统偏好设置。如图 9-42 所示，您应在**选项**标签页下启用**计算机管理员可以刷新或禁用管理**设置。应用此设置后，当本地管理员登录时，他们应按住\
  \ **option 键** 或 **左 shift 键**，直到 Mac 提示如图 9-43 所示的对话框。在此对话框中选择**禁用设置**将重新启用所有被禁用的系统偏好设置。此修饰键仅对具有管理员访问权限的用户帐户有效。\n\
  \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig43_HTML.jpg](img/492151_1_En_9_Fig43_HTML.jpg)\n\
  \n图 9-43 选择“禁用设置”以重新启用系统偏好设置\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig42_HTML.jpg](img/492151_1_En_9_Fig42_HTML.jpg)\n\
  \n图 9-42 如果您计划使用 Profile Manager 禁用任何系统偏好设置，请确保选中此设置\n\n### macOS 远程管理\n\n与 `iOS`\
  \ 类似，有一些特定功能可以通过 **操作** 菜单来调用。您可以通过在**设备**中选择您的测试 Mac，然后点击配置文件管理器窗口底部的**操作**菜单并选择一个功能来测试这一点。您可以尝试这些功能，您会注意到，与同样具有这些控制的\
  \ Apple Remote Desktop 不同，您的 Mac 无需连接到局域网即可响应这些命令。因为 MDM 在公共互联网上是活跃的，只要 Mac 有互联网访问权限，它就会执行命令。\n\
  \n说到 Apple Remote Desktop，配置文件管理器的一个非常酷的功能是能够在单台或多台 Mac 上激活 Apple Remote Desktop。在\
  \ **设备** 列表中选择您的测试 Mac，点击 **操作** 按钮并选择 **启用远程桌面**，如图 9-44 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig44_HTML.jpg](img/492151_1_En_9_Fig44_HTML.jpg)\n\
  \n图 9-44 macOS 客户端可用的操作列表\n\n几秒钟后，在您的测试 Mac 上打开 *共享系统偏好设置*，您应该看到 **远程管理** 选项已被勾选，如图\
  \ 9-45 所示。如果您点击 **选项...** 按钮，您将看到所有选项都已启用。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig45_HTML.jpg](img/492151_1_En_9_Fig45_HTML.jpg)\n\
  \n图 9-45 执行“启用远程桌面”操作后的共享系统偏好设置\n\n现在您可以进入您的 Apple Remote Desktop 控制台，将设备添加到您的 ARD\
  \ 计算机列表中。如果您在设置助理（Setup Assistant）期间通过 DEP 注册 `macOS` 设备，一旦它们在您的 MDM 中激活，您就可以打开\
  \ Apple Remote Desktop，然后通过 ARD 推送各种脚本和额外的安装包。这为远程阶段化部署系统（从激活到账户创建和软件包安装）提供了完整的端到端解决方案。\n\
  \n## 使用 Profile Manager 进行软件分发\n\n除了管理设备，配置文件管理器还与批量购买计划（VPP）结合使用，以实现从 App Store\
  \ 和 Mac App Store 远程安装应用。\n\n### 托管式分发\n\nApple 使用一种称为 *托管式分发* 的概念，为通过配置文件管理器部署的应用提供设备许可证。其工作方式是，组织购买\
  \ App Store 信用额度（类似于一张非常大的 *iTunes 礼品卡*），然后使用该信用额度兑换多个应用许可证。例如，您可以购买十份 *Angry Birds*，然后将它们分配给十台独立的\
  \ iPad，无论谁在使用它们。然后几个月后，您可以从其中四台 iPad 上移除 *Angry Birds*，并将其安装到另外四台 iPad 上。这样，组织可以将特定应用分配给特定设备，并在用户需求发生变化时重新分配它们，而无需购买额外的许可证。\n\
  \n\n\n## 兑换应用程序\n\n在分配应用程序时，首先要做的是兑换一批许可证。为了方便本练习，我们无需购买`App Store credit`，只需选择几个免费应用来操作即可。打开`Profile\
  \ Manager`，点击侧边栏中的`Apps`图标。在屏幕右下角，点击`Get More Apps`链接。这会重定向到 Apple School Manager\
  \ 或 Apple Business Manager。请使用您的机构管理员账户登录。\n\n登录后，点击侧边栏`Content`标题下的`Apps and Books`链接，如图\
  \ 9-46 所示。您会看到我这里已有一些免费许可证，我们将再添加几个。使用屏幕顶部的`search bar`开始搜索`App Store`。本次练习我们将主要关注`iOS`应用，但这里也能找到`macOS`应用。\n\
  \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig46_HTML.jpg](img/492151_1_En_9_Fig46_HTML.jpg)\n\
  \n图 9-46\nApple School Manager 中的 Apps and Books 部分\n\n为了乐趣，我们继续以`Angry Birds`为例，在搜索栏中输入“Angry\
  \ Birds”。在搜索结果列表顶部附近选择`Angry Birds 2`。点击后，会提示为该应用`Buy Licenses`。从弹出菜单中选择`Organization`并输入数量。本例中我们选择`three`个。您的屏幕应类似于图\
  \ 9-47。点击`Get`按钮购买许可证并将其添加到我们的托管分发池中。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig47_HTML.jpg](img/492151_1_En_9_Fig47_HTML.jpg)\n\
  \n图 9-47\n输入数量并点击 Get 按钮购买许可证\n\n购买许可证后，兑换过程可能需要五到十分钟才能完成，之后您最终会在 Apps and Books\
  \ 列表中看到`Angry Birds 2`出现。请继续为`Keynote`、`Pages`、`Numbers`、`iMovie`、`Microsoft Word`、`Microsoft\
  \ Excel`和`Microsoft PowerPoint`完成此过程。完成后，返回`Profile Manager`，您应该会看到一系列与图 9-48 中类似的应用。\n\
  \n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig48_HTML.jpg](img/492151_1_En_9_Fig48_HTML.jpg)\n\
  \n图 9-48\nProfile Manager 中可供我们使用的托管分发应用程序池\n\n**专业提示：** `Profile Manager`和`VPP`/`DEP`会定期同步，但如果您没有耐心，可以通过点击`Devices`，然后点击添加/删除占位符按钮旁边的刷新按钮来强制同步。\n\
  \n## 应用分发\n\n现在我们已经兑换了应用并在`Profile Manager`中可用，是时候将它们分配给我们的测试设备了。点击侧边栏中的`Devices`图标，然后选择我们的测试\
  \ iOS 设备。本例中是我们本章一直在使用的 iPad。点击`Apps`选项卡，然后点击`+`按钮，如图 9-49 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig49_HTML.jpg](img/492151_1_En_9_Fig49_HTML.jpg)\n\
  \n图 9-49\n向测试设备分配应用程序\n\n出现提示时，我们将勾选`Angry Birds 2`、`Keynote`和`Microsoft Excel`旁边的复选框。您会注意到还有安装模式的选项。为了查看差异，请为其中一个选择`Automatic`，另一个选择`Tethered`，第三个选择`Manual`。您的窗口应类似于图\
  \ 9-50。点击`OK`按钮继续，然后点击`Save`按钮应用到设备。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig50_HTML.jpg](img/492151_1_En_9_Fig50_HTML.jpg)\n\
  \n图 9-50\n选择不同的安装模式选项以查看它们之间的差异\n\n如果查看测试设备，您会看到`Angry Birds 2`应该在主屏幕上开始下载和安装。根据您的网速，这可能需要几分钟。您不会看到另外两个应用，因为它们未设置为自动安装。因为`Excel`被设置为`Manual`，所以用户需要去`App\
  \ Store`手动下载，除非设备在某个时间点提示他们安装。而`Keynote`只会在我们使用`Tethered Content Caching`（但我们没有）的情况下才会下载。\n\
  \n**专业提示：** 对于设备众多但共享带宽有限的学校或企业来说，系留功能非常有用。对于像`iMovie`或`GarageBand`这样的大型应用，可能更倾向于强制应用仅在设备与运行了`content\
  \ caching`服务的 Mac 配置的子网连接时才安装到设备上。\n\n让我们强制将所有这三个应用都`automatically`安装，因此对`Installation\
  \ Mode`选项进行必要的更改，并再次点击`Save`进行更新，如图 9-51 所示。现在所有应用都将安装到 iPad 上。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig51_HTML.jpg](img/492151_1_En_9_Fig51_HTML.jpg)\n\
  \n图 9-51\n将所有分配的应用的安装模式更新为自动\n\n您可能已经猜到，将图书分配给设备的方式完全相同。另一点需要注意的是，虽然本章中我们一直将应用、图书和配置描述文件应用到设备，但您也可以将这些应用到特定用户或用户组。分配图书时唯一的注意事项是，与应用程序不同，一旦您将图书分发给用户，就无法收回该许可证。如果您的组织使用`iBooks\
  \ Author`应用程序创建自定义的`iBooks Textbooks`，您可以使用`Profile Manager`分发这些书籍，但只能将它们分配给用户，而不是设备。\n\
  \n除了通过`Apple School Manager`使用托管分发与托管`Apple IDs`外，您还可以将组织购买的应用程序许可证提供给拥有非托管`Apple\
  \ IDs`的用户。要启用此功能，请点击`Profile Manager`侧边栏中的`Groups`按钮，然后选择`Everyone group`。向下滚动并展开`Volume\
  \ Purchasing Managed Distribution`部分，勾选`Enable Volume Purchasing Managed Distribution\
  \ Services`旁边的复选框，如图 9-52 所示。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig52_HTML.jpg](img/492151_1_En_9_Fig52_HTML.jpg)\n\
  \n图 9-52\n为组织外的 Apple IDs 启用批量购买托管分发\n\n启用此功能后，为该用户创建一个新的`User account`，并使用图 9-53\
  \ 中所示的按钮向他们发送加入贵组织`Volume Purchase Managed Distribution`的`email invitation`。当他们收到邮件时，系统会提示他们使用个人`Apple\
  \ ID`登录`App Store`。然后，您可以像处理托管 Apple ID 或设备一样为该用户分配应用程序。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig53_HTML.jpg](img/492151_1_En_9_Fig53_HTML.jpg)\n\
  \n图 9-53\n“Send email invitation…” 按钮\n\n分发应用和图书相对直观，因此也请在`macOS`客户端上花些时间测试一下。该过程基本相同，只是应用来自`Mac\
  \ App Store`而非`iOS`应用。\n\n\n\n## 摘要\n\n在本章中，我们介绍了使用 `配置文件管理器` 进行移动设备管理的许多核心功能。`macOS`\
  \ 和 `iOS` 系统管理员可以利用众多有用的配置文件和功能来简化工作，而我们所涉及的仅仅是冰山一角！在进入下一章之前，请花些时间进行实验，以便更熟悉各种可用的配置文件和命令的效果。\n\
  \n"
- "# 10. 使用 Munki 自动化部署 macOS 应用程序\n\n在本章中，我们将使用来自 **华特迪士尼动画工作室** (`Walt Disney Animation\
  \ Studios`) (`www.munki.org`) 的一款名为 `Munki` 的开源解决方案。`Munki` 是一个简单、有效且免费可用的软件部署解决方案，适用于中型和大型组织中的\
  \ Mac 管理。\n\n## 简介\n\n`Munki` 是用 `Python` 编写的，并在您的 Mac 客户端上作为应用程序运行。在最基本的层面上，客户端软件每小时检查一次指定的\
  \ Web 服务器，查看是否有任何更改。然后它会同步、下载并安装软件包。这使得一名技术人员可以在 `Munki Admin` 控制台上按设定的时间表，将应用程序打包并部署到近乎无限数量的地点的任意多台\
  \ Mac 上。\n\n随着我们学习本章内容，我们将构建一个用于 `Munki` 的 Web 服务器，配置我们的 `Munki Admin` 工作站，为部署打包一些应用程序，然后将这些应用程序部署到一台运行\
  \ `Munki Managed Software Center` 应用程序的测试 Mac 上。我发现，由于苹果对 `macOS` 做出的各种底层更改，使用像这样的工具来部署软件是取代现已过时的单一系统映像任务的最佳替代方案。\n\
  \n`Munki` 的最佳功能之一是它将所有数据存储在 `*.plists` 等 XML 文件中，这些文件可以在多台服务器之间轻松同步。这使得负载均衡和多地点支持成为可能，而无需担心集中式数据库或商业解决方案中常见的其他复杂性。我个人曾使用\
  \ `Munki` 管理跨 50 个地点的超过一万台 `macOS` 客户端的软件部署。我认为您会发现它是 Mac 部署和支持工具库中一个强大的补充。\n\n\
  ## 为 Munki 配置 Apache Web 服务器\n\n让我们开始构建我们的 `Munki` Web 服务器。在开始此练习之前，请先准备好一台将用作我们\
  \ Web 服务器的 Mac。您的服务器不需要运行 `macOS Server`，因为客户端版 `macOS` 中的内置工具将提供我们所需的所有必要功能。您可能想使用现有的\
  \ `配置文件管理器` 服务器；但是，这不推荐，因为这两种服务都使用 Apache Web 服务器，可能会相互冲突。\n\n`Munki` 服务器只需要在内网可用，并且在其上不运行任何其他服务时效果最佳。如果您正在构建一个生产环境的\
  \ `Munki` 服务器，您可能需要考虑一台具有充足磁盘空间的机器作为主要要求，因为您的所有安装包都将存放在这台机器上。\n\n**专业提示**\n\n如果您认真对待生产环境的\
  \ `Munki` 服务器，您可能希望配置一个基于 Linux 或 Windows 的 Web 服务器，具备冗余性、RAID 存储和快速 I/O。您也可以为此购买一台\
  \ 2019 年的 `Mac Pro`，但从成本角度看，使用标准的非苹果硬件可能是最佳选择。对于本书中的练习，一台小型 `Mac mini` 或 Mac 虚拟机就可以很好地工作。\n\
  \n### 配置 Web 服务器\n\n安装好 `macOS Catalina` 后，按照 `设置助理` 的步骤配置本地用户账户，然后配置壁纸、日期和时间以及静态\
  \ IP 地址。最后，为您的服务器取一个简单的名称，如 `MunkiServer01`。此时，您应该拥有一台准备就绪的服务器，它具有名称、静态 IP 地址、互联网访问能力、能够\
  \ ping 通您的客户端（并且您的客户端也能 ping 通它），并且已完成所有必要的服务器安全加固。如果需要，您可以参考第 `7` 章来完成此步骤。\n\n\
  **配置 Apache 服务器设置**\n\n我们需要做的第一件事是在开启 Web 服务器服务之前，对 Apache 配置文件进行一些修改。打开 `终端` 并按此练习逐步配置并启动\
  \ Web 服务器：\n\n1.  我们的下一步是在内置的 Unix 文本编辑器 `VI` 中打开并编辑此文件。为此，键入 `vi httpd.conf` 并按\
  \ **回车** 在 `VI` 中打开配置文件。\n\n2.  在 `VI` 中，您将看到 `httpd.conf` 文件的内容。如果您愿意，可以通读此文档。它说明此文件是\
  \ Apache HTTP 服务器的主要配置文件。您可以使用键盘上的**方向键**在文档中导航。\n\n3.  在滚动浏览时，有两行需要我们注意。第一行是 `DocumentRoot\
  \ \"/Library/WebServer/Documents\"`。这是我们的 Mac 上 Web 服务器根目录的路径，我们将在此处放置我们的文件和文件夹。\n\
  \n4.  第二行在其正下方的 `Options` 部分中，内容是 `Options FollowSymLinks Multiviews`。我们需要编辑这一行，因为默认情况下它被配置为将文件解析并显示为网页，但对于\
  \ `Munki`，我们希望我们的 Web 服务器将内容显示为 *文件夹和文件*。因此，我们将使用**方向键**将光标移动到 `Options` 和 `FollowSymLinks`\
  \ 之间，然后按键盘上的 **i** 键切换到**插入模式**，如图 `10-3` 所示。\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig3_HTML.jpg](img/492151_1_En_10_Fig3_HTML.jpg)\n\
  \n   图 10-3\n\n   在 VI 中启用插入模式以编辑 httpd.conf 文件\n\n5.  接下来，在这一行中输入 `Indexes`，使其现在显示为\
  \ `Options Indexes FollowSymLinks Multiviews`，这将使我们能够在 Web 服务器上看到文件和文件夹，而不是 HTML\
  \ 内容。完成此更改后，按 **esc** 键退出**插入模式**。您的 `终端` 窗口应类似于图 `10-4`。\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig4_HTML.jpg](img/492151_1_En_10_Fig4_HTML.jpg)\n\
  \n   图 10-4\n\n   您的 Options 行现在应如图所示\n\n6.  现在我们已经完成了必要的更改并记下了 Web 服务器根目录的路径，可以保存更改并退出文档了。在\
  \ `VI` 中，键入 `:wq` 并按 **回车**。**冒号** (`:`) 表示接下来是一个命令，**w** 代表**写入**更改（保存），**q** 将**退出**文档，使我们退出\
  \ `VI` 并返回到命令提示符。\n\n7.  回到命令提示符，我们现在可以启用我们的 Web 服务器服务。输入 `apachectl start` 以启用该服务。打开一个浏览器窗口并输入\
  \ `http://localhost/`，您应该会看到一条显示 **\"It works!\"** 的消息，如图 `10-5` 所示。至此，我们已经配置了 Web\
  \ 服务器并启动了服务。\n\n   ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig5_HTML.jpg](img/492151_1_En_10_Fig5_HTML.jpg)\n\
  \n   图 10-5\n\n   确认我们的 Web 服务器服务已启动\n\n\n\n### 修改 Unix 八进制文件权限\n\n我们已经成功配置并启动了\
  \ Apache Web 服务器服务，但在服务器准备就绪以供 *Munki* 使用之前，我们还有一些工作要做。接下来我们需要在 Web 服务器上创建一个 Munki\
  \ 客户端需要访问的特殊文件夹。\n\n我们需要通过**终端**创建此目录，并使用 *Unix 八进制表示法系统* 设置文件权限。让我们回到终端并使用 `cd\
  \ /Library/WebServer/Documents/` 命令切换到 Web 服务器的根目录。使用 `ls` 命令，但也使用 `-l` 选项以 *长列表*\
  \ 格式查看目录。您的终端窗口应如图 10-6 所示。\n\n您应该会看到三行，每行对应此目录中的一个文件。第一列表示每个文件的八进制文件权限，称为 *八位字节*。第二列表示硬链接的数量，第三列是文件的所有者，第四列是组。第五列是文件大小，第六列是最后修改日期/时间，最后一列是文件名本身。\n\
  \n如您所见，***root*** 是这些文件的所有者，***wheel*** 是组。这些权限将与我们之前在第三章中使用 *macOS* 图形用户界面 **获取信息**\
  \ 对话框中查看的权限一致。我们将在此处创建一个新目录。*Munki* 需要一个名为 ***munki_repo*** 的文件夹，它是所有 Munki XML\
  \ 文件和安装介质的仓库，我们的客户端将在软件安装过程中访问。让我们使用 `mkdir` 命令创建此目录。输入 `mkdir munki_repo` 并按 **回车**。现在再执行一次\
  \ `ls -l` 命令，查看我们的新文件夹是否已创建及其默认设置的权限。您的终端窗口应类似于图 10-7。\n\n让我们花点时间看看新目录的八位字节。默认情况下，我们看到\
  \ `drwxr-xr-x`，那么这在与权限相关时意味着什么？好问题！这串字母表示 *所有者*（本例中为 root）、*组*（本例中为 wheel）和 *所有人*\
  \ 组的 *读、写和执行* 权限。正如我们在第 3 章中学到的，所有人组确实意味着 *其他所有人*。图 10-8 很好地展示了目录、所有者、组和所有人权限之间的细分。\n\
  \n**d** 标识这是一个目录而不是一个文件。这就是为什么我们的 ***munki_repo*** 文件夹前面有一个 `d`，而此目录中的其他三个文件没有。接下来的三个字符表示所有者的权限。看起来\
  \ root 对这个文件夹拥有读、写和执行权限。接下来的三个显示 wheel 组的成员拥有读和执行权限，而所有人组只有执行权限。图 10-9 提供了一个权限和目录列表的图表，您可以用作参考来确定每个字符集代表什么。\n\
  \n我们需要使 ***munki_repo*** 目录对 Mac 客户端可读/写访问，以便 *Munki* 正常运行，因此我们需要更改此文件夹的文件权限。为此，我们将使用\
  \ `chmod` 命令。如果您之前在本书中花时间查看了 `chmod` 和 `chown` 的手册页，您可能已经知道我们可以用这些命令更改文件的所有者和权限。使用\
  \ `chmod` 命令并参考图 10-9 中的表格，我们可以为所有者、组和所有人分配八个可能值之一，代表他们对此文件夹的权限。正如您所看到的，如果我们使用值\
  \ 7，它将授予读、写和执行权限；这正是我们希望为 ***munki_repo*** 文件夹的所有者、组和所有人设置的权限。\n\n请继续在提示符处输入 `chmod\
  \ -R 777 munki_repo/` 并按 **回车**。我们使用此命令修改 ***munki_repo*** 目录的权限，以允许 root、wheel\
  \ 和所有人拥有读、写和执行权限。让我们再次使用 `ls -l` 命令，确保我们做的更改生效。您的终端窗口应如图 10-10 所示。\n\n接下来，让我们确保可以从我们的\
  \ Web 服务器访问 ***munki_repo*** 文件夹。打开浏览器窗口并输入 `http://localhost/munki_repo`，您应该会看到一个空目录的索引列表，如图\
  \ 10-11 所示。\n\n请继续关闭浏览器并退出终端应用程序。\n\n\n\n### 为 Munki 创建网络文件共享\n\n为使我们的服务器准备好与 `Munki`\
  \ 配合使用，我们需要执行的最后一步是将 `munki_repo` 文件夹作为 SMB 共享分享到我们的局域网上。我们将使用 `共享系统偏好设置` 来启用 `文件共享`\
  \ 服务。点击 `+` 按钮并浏览到 `Macintosh HD/Library/WebServer/Documents/` 中的 `munki_repo` 目录来添加一个新的共享文件夹，如图\
  \ 10-12 所示。您将看到文件共享权限是从目录继承的，应该为所有人提供读写能力。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig12_HTML.jpg](img/492151_1_En_10_Fig12_HTML.jpg)\n\
  \n图 10-12\n\n将 munki_repo 文件夹共享为网络文件共享\n\n关闭系统偏好设置。此时，我们应该从网络上的另一台计算机进行快速验证，以确保一切按预期工作。我将使用我的管理工作站来将\
  \ `munki_repo` 文件夹映射为一个共享，同时通过网页浏览器点击 `munki_repo` 目录。\n\n使用 Finder 中的 `连接到服务器`\
  \ 选项，如图 10-13 所示，并进行身份验证以挂载 `munki_repo` 文件夹的 SMB 共享。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig13_HTML.jpg](img/492151_1_En_10_Fig13_HTML.jpg)\n\
  \n图 10-13\n\n使用 SMB 协议映射 munki_repo 共享\n\n我还将打开我的 Safari 网页浏览器并访问 `http://192.168.1.5/munki_repo/`。如果一切配置正确，您应该能够通过网络共享和网页浏览器浏览该目录，如图\
  \ 10-14 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig14_HTML.jpg](img/492151_1_En_10_Fig14_HTML.jpg)\n\
  \n图 10-14\n\n通过 Safari 和 Finder 在远程计算机上浏览 munki_repo 目录\n\n恭喜！您的 Web 服务器现已配置好，可以与\
  \ Munki 配合使用了！\n\n**专业提示**\n\n如果您希望使用 Munki 支持多个站点，可以为每个地点的服务器重复这些相同的步骤，然后使用实用程序在服务器之间同步\
  \ `munki_repo` 目录。由于无需担心集中式数据库或专有文件，只需在服务器之间同步平面文件和文件夹即可轻松扩展您的 Munki 环境。\n\n## 配置\
  \ Munki 管理工作站\n\n现在我们的服务器已经启动并运行，下一步是配置我们的 `Munki` 系统管理员将用来创建软件包、向服务器上传数据和管理 `Munki`\
  \ 环境的工作站。我通常使用已安装 `Apple Remote Desktop` 的同一台工作站，以便将我所有的 Mac 管理工具集中在一处。\n\n### 安装\
  \ MunkiTools 和 MunkiAdmin\n\n我们需要做的第一件事是下载几个安装包。第一个是来自 `Munki 项目的 GitHub` 页面的官方\
  \ `MunkiTools` 版本。您可以在 `https://github.com/munki/munki/releases` 找到客户端安装程序，我将下载支持\
  \ `macOS 10.10 Yosemite` 到 `macOS 10.15 Catalina` 的 `Munki 3.6.4` 版本。\n\n**专业提示**\n\
  \nMunki 最近在其 GitHub 页面上发布了 4.x 版本，该版本包含其自己的 Python 支持，而不是依赖 Apple 的内置版本。您应该评估此版本对旧版\
  \ macOS 的支持情况，并根据您的 Mac 设备群的年限决定是安装 Munki 4 还是继续使用 3.x 变体。在本章的练习中，我们将使用 3.6.4 的稳定版本。\n\
  \n从该页面下载 `munkitools-3.6.4.3786.pkg` 并保存到您的桌面。接下来，`双击` 下载的安装包，按照提示进行 `安装`。如果 `Gatekeeper`\
  \ 阻止安装，您可能需要 `右键点击` 安装包，从上下文菜单中选择 `打开`，并同意打开来自未知开发者的文件。完成后需要重启。请根据提示进行 `重启`。\n\n\
  我们还将下载 `MunkiAdmin` 工具并将其安装到此工作站上。`MunkiAdmin` 是另一个开源项目。它是一个用于管理 `Munki` 环境的 GUI\
  \ 工具。当前版本是 1.7.1，可以在 `https://github.com/hjuutilainen/munkiadmin/releases/` 找到。下载此版本并保存到您的桌面。解压缩磁盘映像，然后将\
  \ `MunkiAdmin` 应用程序 `拖放` 到您的 `/应用程序` 或 `/应用程序/实用工具` 文件夹中以完成安装。我将把它安装到我的工作站的 `/应用程序`\
  \ 文件夹中。\n\n### 在管理工作站上配置 Munki 客户端\n\n重启管理工作站后，重新连接到 `munki_repo` 网络共享，并确保仍然可以通过\
  \ Finder 浏览它。接下来，我们需要通过终端进行一些安装后配置，将我们的管理工作站指向 `Munki` 仓库。打开终端，在命令提示符下输入 `munkiimport\
  \ --configure`，如图 10-15 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig15_HTML.jpg](img/492151_1_En_10_Fig15_HTML.jpg)\n\
  \n图 10-15\n\n在终端中调用配置命令行实用程序\n\n在逐步执行命令行配置实用程序时，我们需要回答一些问题。首先，它询问的是 `Repo URL`。这可能有些迷惑，因为它这里需要的是我们的\
  \ `munki_repo` 共享的路径，而不是 Web 服务器的 URL。请按此格式输入完整路径 `smb://192.168.1.5/munki_repo/`，其中\
  \ IP 地址是您的 `Munki` Web 服务器的域名或 IP。\n\n**专业提示**\n\n我使用 IP 地址是因为我没有为此演示服务器创建 DNS 记录。但是，在生产环境中，您可能希望将\
  \ FQDN 作为 `munki_repo` 共享路径的一部分输入。\n\n接下来，它将询问我们喜欢为 `pkginfo` 文件使用什么文件扩展名。这些是 Munki\
  \ 读取以确定我们希望各种安装程序如何运行的文件。我们将保持默认值 `*.plist`，因此按 `回车` 键接受默认值。现在它将提示我们为 `pkginfo`\
  \ 文件选择一个编辑器。我们将使用 GUI `MunkiAdmin` 应用程序，因此可以在此处接受默认值。按 `回车` 键继续。\n\n当提示我们输入 `catalog`\
  \ 时，接受默认值 `testing`。我们将在本章的下一节讨论目录。按 `回车` 键继续。最后，最后一个提示将询问 `plug-ins`。也按 `回车` 键接受此处的默认值。至此，我们已完成在管理工作站上配置\
  \ `MunkiTools`。设置这些选项后，您的终端窗口应类似于图 10-16。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig16_HTML.jpg](img/492151_1_En_10_Fig16_HTML.jpg)\n\
  \n图 10-16\n\n对配置提示的建议响应\n\n\n\n## Munki 组件\n\n在客户端计算机上，`Munki` 通过多个组件来运作。`Munki`\
  \ 的全部功能都存在于客户端软件中，该软件作为 `MunkiTools` 的一部分安装。本章稍后，我们将在测试客户端上安装并配置 `MunkiTools`，以便观察其实际运行。在此之前，理解\
  \ `Munki` 客户端软件的主要组件至关重要：\n\n*   **受管软件中心：** 这是一个 GUI 实用程序，由 `MunkiTools` 软件包安装到\
  \ `/Applications` 目录中。它允许最终用户选择授权的软件，并在其 Mac 上安装，而无需本地管理员权限。\n*   **安装项目：** 这些是驻留在您\
  \ `Munki` 服务器上的软件包或磁盘映像，用于将通过 `Munki` 客户端或 `受管软件中心` 安装和管理的应用程序。\n*   **目录：** 这些是管理员导入到\
  \ `Munki` 中的软件列表，包含关于应用程序应如何安装、脚本和特定设置的元数据。我们将有一个测试目录，用于存放尚未准备好安装在最终用户系统上的应用程序，以及一个生产目录，用于存放已批准进行大规模安装的应用程序。\n\
  *   **清单：** 这是一个列出应在给定计算机上安装哪些软件的清单。您可以为每台计算机、每个位置或每个工作组创建一个清单。通常，最佳实践是尽可能减少清单数量，以保持简单和一致。\n\
  *   **安装收据：** 虽然这不专属于 `Munki`，但当软件包安装在 Mac 上时，会创建一个收据。`Munki` 利用收据来判断客户端工作站上需要安装什么以及已经安装了什么。如果某个软件包存在收据，`Munki`\
  \ 将不会尝试再次安装它。\n*   **物料清单：** 与收据类似，物料清单并非 `Munki` 特有，它在软件包安装时创建。这是一个特定软件应用程序的组件列表，`Munki`\
  \ 在卸载过程中会参考此列表来移除软件及其相关依赖项。\n\n## 导入 MunkiTools 软件包\n\n我们要做的第一件事是从命令行将第一个软件包导入 `Munki`，以便了解其工作原理。我们可以直接开始使用\
  \ `MunkiTools` 软件包，因为它正方便地放在我们的桌面上，随时可用。\n\n### 导入我们的第一个安装软件包\n\n1.  首先再次打开终端，在命令提示符处输入\
  \ `munkiimport`，然后将 `munkitools.pkg` 文件从桌面拖拽并放入命令行中。您的终端窗口应类似于图 10-17。\n\n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig17_HTML.jpg](img/492151_1_En_10_Fig17_HTML.jpg)\n\
  \n    图 10-17\n    使用 `munkiimport` 命令及 `*.pkg` 文件路径\n\n2.  接下来，按回车键在我们的软件包文件上执行\
  \ `munkimport` 命令。现在它将开始提示我们通过导入命令行工具编辑或接受默认选项。我们将在本章后面打包其他应用程序时更详细地介绍每一项，但此刻请按如下方式配置：\n\
  \n    如果您的终端窗口看起来类似于图 10-18，请对 **导入此项？** 的提示回答 `y`。\n\n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig18_HTML.jpg](img/492151_1_En_10_Fig18_HTML.jpg)\n\
  \n    图 10-18\n    使用 `munkiimport` 命令行工具配置安装程序软件包\n\n    ```\n    Item name: munkitools\n\
  \    Display name: MunkiTools\n    Description: Client software for the Munki service.\n\
  \    Version: 3.6.4.3786\n    Category: Utilities\n    Developer: Open Source\n\
  \    Unattended install: False\n    Unattended Uninstall: False\n    Catalogs: testing\n\
  \    ```\n\n3.  当提示 `上传项目到子目录路径` 时，按回车接受默认值。\n4.  当提示 `尝试创建产品图标？` 时，回答 `y` 并按回车。您将看到一些关于导入和复制软件包到我们服务器的输出文本。\n\
  5.  当它提示您 `重建目录` 时，回答 `y` 并按回车。它会提供一些输出，如果您查看您的 `munki_repo` 共享，您会看到出现了许多新文件夹，如图\
  \ 10-19 所示。\n\n    ![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig19_HTML.jpg](img/492151_1_En_10_Fig19_HTML.jpg)\n\
  \n    图 10-19\n    导入第一个安装软件包后我们的 `munki_repo` 目录\n\n恭喜！您刚刚将第一个安装软件包导入了 `Munki`。\n\
  \n## MunkiAdmin 简介\n\n现在我们已经将一个软件包导入 `Munki`，并且在 `munki_repo` 目录的根目录下创建了几个文件夹，让我们打开\
  \ `MunkiAdmin` 应用程序。当您打开 `MunkiAdmin` 时，它会提示我们指向我们的 `munki_repo` 网络共享。浏览到该共享，单击选择它，然后点击\
  \ **打开** 按钮，如图 10-20 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig20_HTML.jpg](img/492151_1_En_10_Fig20_HTML.jpg)\n\
  \n图 10-20\n当 `MunkiAdmin` 提示时，指向我们 `munki_repo` 的 SMB 共享\n\n选择了 `munki_repo` 共享后，您将看到主\
  \ `MunkiAdmin` 控制台界面，我们的 `MunkiTools` 软件包已在列表中。\n\n图 10-21 及以下描述将为您提供 `MunkiAdmin`\
  \ 界面的快速参考。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig21_HTML.jpg](img/492151_1_En_10_Fig21_HTML.jpg)\n\
  \n图 10-21\n`MunkiAdmin` 界面\n\n*   **软件包视图：** 列出所有已导入 `Munki` 的软件包的视图。\n*   **目录视图：**\
  \ 显示所有目录并允许我们管理目录的视图。\n*   **清单视图：** 显示所有清单并允许我们管理清单的视图。\n*   **打开仓库：** 按下此按钮连接到特定的\
  \ `munki_repo` 网络共享。\n*   **保存更改：** 将对当前软件包、目录或清单所做的更改保存到 `munki_repo`。\n*   **重新加载仓库：**\
  \ 将更改保存到 `munki_repo` 后刷新 `MunkiAdmin` 控制台。\n*   **查看软件包属性：** 加载包含所有软件包安装选项的对话框。\n\
  *   **软件包列表：** 已导入 `Munki` 的可用软件包列表。\n*   **快速过滤器：** 此侧边栏将根据类别或开发者填充，并会根据该搜索条件过滤您的软件包列表。例如，如果您想仅筛选出\
  \ Adobe 的软件包，可以点击 Adobe 开发者过滤器。\n\n## 将软件打包进 Munki\n\n现在我们的管理工作站已准备就绪，我们需要开始打包一些软件。`Munki`\
  \ 支持导入和安装标准 *macOS 安装程序* `∗.pkg` 格式、`∗.dmg` 磁盘映像安装以及 *Adobe CC* 软件包，无需任何特殊的重新打包要求。`Munki`\
  \ 还可以创建卸载软件包，因此您可以在需要从旧版本升级到新版本时用它来移除软件。\n\n> 专业提示\n> 如果您有在 Microsoft Windows 系统上安装软件的经验，可以将\
  \ Apple 原生的 `*.pkg` 安装包看作是 *macOS* 下与 Microsoft `*.msi` 安装文件等效的格式。\n\n\n\n## 将软件导入\
  \ Munki\n\n在本节中，我们将建立一个安装程序包的目录。开始之前，您应该从管理工作站访问互联网，并将以下安装程序下载到您的桌面。如果这些应用程序既可以通过\
  \ *Mac App Store* 获取，也可以直接从开发者的网站获取，请下载开发者版本而非 *App Store* 版本：\n\n*   **Adobe Reader:**\
  \ [`https://get.adobe.com/reader/`](https://get.adobe.com/reader/)\n*   **Adobe\
  \ Flash Player:** [`https://get.adobe.com/flashplayer/`](https://get.adobe.com/flashplayer/)\n\
  *   **VLC:** [`www.videolan.org/vlc/download-macosx.html`](http://www.videolan.org/vlc/download-macosx.html)\n\
  *   **Mozilla Firefox:** [`www.mozilla.org/en-US/firefox/new/`](http://www.mozilla.org/en-US/firefox/new/)\n\
  *   **Google Chrome:** [`www.google.com/chrome/`](http://www.google.com/chrome/)\n\
  *   **Audacity:** [`www.audacityteam.org/download/`](http://www.audacityteam.org/download/)\n\
  \n### 导入软件包\n\n您的计算机应该已映射了 ***munki_repo*** 网络共享，并且桌面应有六个 ***.dmg** 文件，即前面列出的每个应用程序对应一个。在本练习中，我们将把这些软件应用程序导入\
  \ *Munki*。我们将从 *Firefox* 和 *Adobe Flash Player* 开始，因为它们使用不同类型的安装过程。*Firefox* 是简单的将应用程序拖放到\
  \ ***/Applications*** 文件夹中，而 *Adobe Flash* 则使用安装包文件。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig22_HTML.jpg](img/492151_1_En_10_Fig22_HTML.jpg)\n\
  *图 10-22 对 *.dmg 文件使用 munkiimport 命令*\n\n1.  我们将从 Firefox 开始。打开一个新的终端窗口，在命令提示符后输入\
  \ `munkiimport`，然后将 Firefox 的 *.dmg 文件拖放到窗口中，如图 10-22 所示。按键盘上的回车键开始命令行 `munkiimport`\
  \ 实用程序。\n\n这将类似于本章前面导入 *MunkiTools* 时使用的过程。请通过命令行逐步完成这些选项。以下是这些选项用途的更多信息：\n\n* \
  \  **Item Name:** *Munki* 中包的名称。\n*   **Display Name:** 在 *Managed Software Center*\
  \ 中显示的软件标题。\n*   **Description:** 在 *Managed Software Center* 中提供的软件描述。\n*   **Version:**\
  \ 软件的版本。*Munki* 会尝试从包中确定版本，但如果无法确定，您需要手动提供版本号。版本号很重要，因为 *Munki* 在未来需要升级软件时会引用它。\n\
  *   **Category:** 这将把软件放在特定类别中，以便在 *MunkiAdmin* 和 *Managed Software Center* 中过滤。\n\
  *   **Developer:** 这将把软件放在特定的开发者组中，以便在 *MunkiAdmin* 中过滤。\n*   **Unattended Install:**\
  \ 这是一个布尔值（`true` 或 `false`）。如果设置为默认的 `false`，软件不会自动安装，需要最终用户从 *Managed Software\
  \ Center* 手动选择并安装。如果设置为 `true`，软件将无需任何交互自动安装。\n*   **Unattended Uninstall:** 类似于无人值守安装，如果此值设为\
  \ `true`，当我们从清单中移除软件时，它将自动卸载。否则，如果保持默认值 `false`，则需要用户或系统管理员手动移除软件。\n*   **Catalogs:**\
  \ 标识软件应列在哪个（哪些）目录中。我们稍后也可以在 *MunkiAdmin* 中修改此设置。\n\n请按照图 10-23 中所示回答问题。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig23_HTML.jpg](img/492151_1_En_10_Fig23_HTML.jpg)\n\
  *图 10-23 Mozilla Firefox 提示的推荐答案*\n\n1.  当提示导入项目时，输入 `y` 继续。\n2.  当询问是否要将项目上传到子目录路径时，我们将采用默认值。我们不会将软件包放在各种子目录中，只放在\
  \ ***munki_repo*** 共享的 ***pkgs*** 目录下的单个默认目录中。按**回车**键接受默认值并继续。\n3.  接下来，它会提示您尝试创建产品图标。对此回答\
  \ `y` 以继续。Munki 会尝试从包中找到图标并创建它，该图标将显示在 *Managed Software Center* 中。\n4.  现在它将把包复制到\
  \ ***munki_repo*** 共享，并根据安装程序包和我们的命令行输入保存所需的 **pkginfo.plist** 数据。它会询问是否重新构建目录，由于我们刚刚通过添加新应用程序更改了目录，我们将回答\
  \ `y` 并按**回车**继续。\n\n目录重新构建完成后，我们就成功导入了 *Firefox* 应用程序。如果想检查工作以确保应用程序可用，可以打开 ***munki_repo***\
  \ 网络共享并浏览 ***/pkgs*** 和 ***/pkgsinfo*** 目录，查看 *Firefox* 是否可用。也可以从 Web 浏览器访问您的 ***munki_repo***\
  \ 页面，确保包可以通过 Web 访问。最后，可以打开 *MunkiAdmin* 并**重新加载**仓库，查看 *Firefox* 是否可用。如图 10-24\
  \ 所示，我工作站上的一切都已同步且可用。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig24_HTML.jpg](img/492151_1_En_10_Fig24_HTML.jpg)\n\
  *图 10-24 Firefox 包在 MunkiAdmin、munki_repo 共享和 Web 服务器中可用*\n\n1.  接下来，我们可以导入 *Adobe\
  \ Flash Player*。**双击** **Install Flash Player *.dmg** 文件以将磁盘映像挂载到桌面。在内部，您需要**右键单击**\
  \ **Install Adobe Flash Player** 应用程序并选择**显示包内容**。然后，浏览 ***/Contents/Resources/***\
  \ 目录并找到 **Adobe Flash Player *.pkg** 文件，因为那是我们的安装程序。使用 `munkiimport` 命令，并将 ***.pkg**\
  \ 文件**拖放**到终端窗口以指定路径。按**回车**键开始导入过程，就像对 *Firefox* 所做的那样。\n2.  出现提示时，输入如图 10-25 所示的信息。请注意，我们需要修改其中一些选项。\n\
  \n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig25_HTML.jpg](img/492151_1_En_10_Fig25_HTML.jpg)\n\
  *图 10-25 Adobe Flash Player 安装包的推荐设置*\n\n1.  出现提示时，接受所有默认设置导入项目。当提示有关图标时回答 `y` 并重新构建目录。\n\
  2.  一旦它完成将软件导入 *Munki*，请继续验证所有内容是否正确复制。\n3.  对其余四个软件标题重复导入过程，在提示时将全部设置为无人值守安装/卸载。完成后，在\
  \ *MunkiAdmin* 中**重新加载** ***munki_repo***，您的软件列表应如图 10-26 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig26_HTML.jpg](img/492151_1_En_10_Fig26_HTML.jpg)\n\
  *图 10-26 导入的软件标题完整列表*\n\n\n\n### 应用程序包属性\n\n将软件导入 `Munki` 后，您可以通过双击列表中的软件包或选中它并点击工具栏中的**属性**按钮来更改其设置。这里我不会详细介绍所有选项，但确实有一些强大的设置可供您用来微调部署过程。以下是一些需要考虑的更重要的设置：\n\
  \n*   **基本信息选项卡：** 允许您修改我们通过命令行工具导入软件时设置的选项。您可以指定安装后的重启操作，并为强制软件安装（如有必要）设置截止日期。\n\
  *   **要求选项卡：** 允许您根据系统上已安装的现有软件来设置依赖关系，并为每个单独的软件包设置最低操作系统和最高操作系统版本。如果您想为运行较旧操作系统的客户端提供较旧版本的应用程序，并为使用较新操作系统的用户提供新版本的软件，这将特别有用。\n\
  *   **安装脚本选项卡：** 在此处，您可以指定在软件安装运行前后要执行的脚本。这是在软件安装后自定义应用程序的强大方式。\n*   **卸载选项卡：**\
  \ 在此处，您可以指定卸载过程，包括使用卸载脚本以及在卸载过程运行前后的脚本。\n\n### 创建用于执行脚本的 Munki 包\n\n如果您还记得第 6 章，我们能够使用**发送\
  \ Unix 命令**工具将脚本发送到远程计算机。任何可以通过 `Apple Remote Desktop` 发送的单条命令或多个命令的脚本，都可以由 `Munki`\
  \ 打包并执行。在本节中，我们将探讨如何创建一个用于交付脚本的自定义包。\n\n在本节中，我们将使用一个新工具来创建自定义包。市面上有很多实用工具可以创建 `*.pkg`\
  \ 文件。我们将使用一个名为 `Munki-Pkg` 的工具，它可以在以下地址获取：[`https://github.com/munki/munki-pkg`](https://github.com/munki/munki-pkg)。`Munki-Pkg`\
  \ 是一个命令行实用程序，因此没有图形用户界面。我们只需下载它，解压缩，并将解压后的文件夹复制到桌面。我们将通过终端切换到 `~/Desktop/munki-pkg-master/`\
  \ 目录来运行它。\n\n#### 创建用于运行脚本的包\n\n在本练习中，我们将创建一个用于运行脚本的包，该脚本将强制客户端 Mac 立即重启。\n\n1.\
  \  我们首先要做的是开发我们的脚本。这个脚本非常简单，因为它只有一个命令，但您可以创建一个包含多个命令、变量等的更高级脚本。使用终端或 Apple Remote\
  \ Desktop 测试此命令，确保它能立即重启计算机：\n\n```\nshutdown -r now\n```\n\n计算机应立即重启。如果运行成功，我们现在就准备好了要在\
  \ `Munki` 中打包的脚本。\n\n**专业提示** 本练习的目的是演示如何创建自定义包来运行脚本。此示例重启脚本不建议在生产环境中与 Munki 一起使用，因为它可能导致您的客户端系统在不通知最终用户的情况下重启。\n\
  \n2.  我们将继续创建一个新的空包。在 `munkipkg` 可执行文件的路径之后，在命令行中添加 `--create RestartClientScript`，然后按下**回车**键，如图\
  \ 10-28 所示。这将创建一个名为 `RestartClientScript` 的新空包。\n\n3.  如果成功，它会在您的主目录根目录下创建一个名为 `RestartClientScript`\
  \ 的文件夹，在该文件夹内，您会看到 *build*、*payload* 和 *scripts* 文件夹。我们将忽略 payload 文件夹，专注于 scripts\
  \ 文件夹。继续在终端中通过输入 `cd /RestartClientScript/scripts/` 切换到 scripts 目录。\n\n4.  进入 scripts\
  \ 文件夹后，我们将再次使用 `VI` 来创建一个运行我们脚本的文件。输入 `vi postinstall`，在 `VI` 文本编辑器中创建一个名为 `postinstall`\
  \ 的新文件。该文件必须命名为 `postinstall`，以便在执行脚本时正确打包和运行。\n\n**专业提示** 软件打包超出了本书的范围，但网上有很多关于创建自定义安装包及其工作原理的好文章。您会发现，在任何包中都可以运行两个脚本：一个是\
  \ preinstall 脚本，另一个是 postinstall 脚本。`macOS 安装器`会查找这两个文件，并在安装过程的适当时机执行它们。\n\n5. \
  \ 使用**方向键**在文件中导航，然后按 **i** 键插入文本，就像本章前面使用 `VI` 时一样。输入我们的脚本，然后按 **Esc** 键退出插入模式。使用\
  \ `:wq` 命令保存文件并退出 `VI`。您的终端窗口应类似于图 10-29。\n\n6.  您可以在 Finder 中浏览 scripts 文件夹，或在\
  \ `/scripts` 目录上执行 `ls` 命令，您会看到该目录下现在有一个 `postinstall` 文件。最后一步是将此项目打包成一个 `*.pkg`\
  \ 文件，然后可以上传到 `Munki`。**再次拖放** `munkipkg` 可执行文件到终端窗口，就像我们之前做的那样。**接着，拖放** `RestartClientScript`\
  \ 文件夹到终端窗口，以附加项目路径，或直接输入项目文件的路径。当您的终端窗口看起来如图 10-30 所示时，按**回车**键以创建 `RestartClientScript.pkg`\
  \ 文件。\n\n7.  当命令成功运行时，我们应在终端中看到输出，表明在 `RestartClientScript` 项目文件夹的 `/build` 文件夹中创建了一个\
  \ `*.pkg` 文件。如果您浏览到该目录，将会看到 `RestartClientScript-1.0.pkg` 文件，如图 10-31 所示。\n\n8.\
  \  现在，您可以像处理其他任何软件一样，使用 `munkiimport` 将此包添加到您的 `Munki` 环境中。\n\n## 使用 Munki 部署软件\n\
  \n我们已经学习了如何打包一个基本的自定义安装程序来运行脚本，以及如何将商业软件安装包导入到 Munki 中。在下一节中，我们将学习如何构建目录（Catalogs）和清单（Manifests）来自动化这些应用程序的安装过程。使用\
  \ `Munki` 部署软件的第一步是让客户端指向我们 Web 服务器上的 `munki_repo` 文件夹。\n\n\n\n## 在客户端工作站上安装和配置\
  \ Munki\n\n我们将从在测试客户端上安装 `MunkiTools` 应用开始。您可以通过运行本章节前面下载的 `MunkiTools` 安装包在客户端系统上交互式地完成此操作，或者使用\
  \ `Apple Remote Desktop` 来完成。很可能您会在生产环境中的多台 Mac 上部署 `Munki`，因此让我们在此任务中使用 `ARD`。\n\
  \n### 使用 ARD 安装 Munkitools\n\n在开始此练习之前，请准备一台测试用的 Mac，如果尚未添加，请将其添加到您的 `ARD` 控制台中。\n\
  \n1.  第一步是安装 `MunkiTools`。打开 `ARD` 并点击您的测试 Mac 以选中它。点击工具栏中的 `Install` 按钮，将 `munkitools.pkg`\
  \ 安装程序添加到软件包列表中。然后点击 `Install` 按钮，如图 10-32 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig32_HTML.jpg](img/492151_1_En_10_Fig32_HTML.jpg)\n\
  \n图 10-32\n\n使用 ARD 在您的测试 Mac 上安装 MunkiTools 软件包\n\n2.  安装完成后，它将强制计算机重新启动。接下来我们需要运行一个脚本，该脚本将修改客户端上存储在`/Library/Preferences/`目录中的\
  \ `ManagedInstalls.plist` 文件的几个键。在 `ARD` 中选中客户端，然后单击工具栏中的 `Unix` 按钮。在脚本窗口中输入以下几行，如图\
  \ 10-33 所示。别忘了将命令设置为以 `root` 身份运行：\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig33_HTML.jpg](img/492151_1_En_10_Fig33_HTML.jpg)\n\
  \n图 10-33\n\n将脚本输入到“发送 Unix 命令”窗口中\n\n```bash\n#!/bin/sh\ndefaults write /Library/Preferences/ManagedInstalls\
  \ SoftwareRepoURL \"http://192.168.1.5/munki_repo\"\ndefaults write /Library/Preferences/ManagedInstalls\
  \ ClientIdentifier \"site_default\"\ndefaults write /Library/Preferences/ManagedInstalls\
  \ SuppressUserNotification -bool true\n```\n\n我们来逐步了解这些行的作用。第一行是所有脚本都必需的，用于标识其为\
  \ shell 脚本。第 2–4 行使用 `defaults write` 命令来修改在`/Library/Preferences/`文件夹中找到的 `ManagedInstalls.plist`\
  \ 文件中的键。\n\n`SoftwareURL` 键将客户端指向我的 Web 服务器。您应确保其通过 `http` 指向您的 `Munki` Web 服务器的\
  \ `munki_repo` 文件夹。\n\n`ClientIdentifier` 指向此客户端将用于确定哪些软件可用的清单。我们将在本章后面更详细地介绍清单。\n\
  \n`SuppressUserNotification` 键是一个布尔值，我们将把它从默认值 `false` 更改为 `true`。根据您的环境，您可能希望保留默认值。其作用是当\
  \ `Munki` 中有新的应用程序可供最终用户安装/更新时，向他们提供通知（或不提供）。因为我们打算自动化安装和升级过程，所以我们将其设置为 `true`，这将\
  \ *不* 向最终用户提供通知。\n\n输入脚本后，您可以点击 `Send` 按钮在客户端上执行它。\n\n**专业提示** 如果这将是您组织中所有（或大多数）客户端的默认设置，请考虑使用此处的\
  \ `Save` 按钮保存此脚本，以便在以后安装 `Munki` 时再次运行。\n\n3.  脚本成功运行后，我们可以在客户端上通过浏览到`/Library/Preferences/`目录并使用\
  \ Finder 中的 `QuickLook` 选项查看 `ManagedInstalls.plist` 来再次检查我们的设置。您应该会看到 `SoftwareURL`\
  \ 已更新，指向我们的 `munki_repo`。您的 `ManagedInstalls.plist` 文件应类似于图 10-34。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig34_HTML.jpg](img/492151_1_En_10_Fig34_HTML.jpg)\n\
  \n图 10-34\n\n包含我们自定义项的 ManagedInstalls.plist 文件\n\n4.  如果一切看起来正确，请继续重启您的测试计算机，因为在继续之前，它需要使用新的首选项停止并启动\
  \ `Munki` 服务。现在，我们已成功在测试 Mac 客户端上安装并配置了 `Munki`。\n\n\n\n## 清单\n\n你可能还记得本章前面的内容，清单是一份需要在特定计算机上安装的软件列表。我们可以创建任意数量的清单，但建议保持较小的清单数量，以使你的\
  \ Munki 环境尽可能精简简单。在本节中，我们将构建一个名为 `site_default` 的清单，因为我们将测试客户端指向了该清单。\n\n开始之前，我们需要在\
  \ `munki_repo` 目录中创建一个 `manifests` 文件夹。确保你已在 Mac 管理员工作站上挂载了 `munki_repo` 网络共享，然后打开终端。使用\
  \ `cd` 命令，并将 `munki_repo` 共享拖动到终端窗口，以将目录切换到网络共享。输入 `ls -l`，你应该会看到如图 10-35 所示的目录。\n\
  \n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig35_HTML.jpg](img/492151_1_En_10_Fig35_HTML.jpg)\n\
  \n图 10-35\n使用终端浏览 munki_repo 共享\n\n接下来，输入 `mkdir manifests`，在 `munki_repo` 共享中创建一个名为\
  \ `manifests` 的新文件夹。使用 `ls -l` 或通过访达查看共享，以确认该文件夹已存在，如图 10-36 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig36_HTML.jpg](img/492151_1_En_10_Fig36_HTML.jpg)\n\
  \n图 10-36\n确认新目录现已可用\n\n现在，让我们打开 MunkiAdmin 并连接到我们的 `munki_repo`。点击工具栏中的“清单”选项卡。我们将通过从“文件”菜单中选择“新建清单”来创建一个新清单。出现提示时，将其命名为\
  \ `site_default` 并保存到 `munki_repo` 共享上的 `manifests` 文件夹中，如图 10-37 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig37_HTML.jpg](img/492151_1_En_10_Fig37_HTML.jpg)\n\
  \n图 10-37\n在 MunkiAdmin 中创建 site_default 清单\n\n在 MunkiAdmin 的清单视图中，你现在应该能看到一个 `site_default`\
  \ 清单。双击它以打开“清单属性”。\n\n### 自定义清单\n\n在这个练习中，我们将自定义 `site_default` 清单。\n\n1.  首先，在“通用”选项卡中，我们将为此清单分配一个软件目录。我们目前有一个可用的目录\
  \ `testing`。点击 testing 目录左侧的复选框，将此清单指向测试目录中列出的软件，如图 10-38 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig38_HTML.jpg](img/492151_1_En_10_Fig38_HTML.jpg)\n\
  \n图 10-38\n将 testing 目录添加到 site_default 清单\n\n2.  接下来，我们将选择“托管安装”选项卡。使用此窗口底部的“+”按钮，我们可以将特定的应用程序添加到此列表中，供使用此清单的客户端使用。由于这些软件包设置为无需用户交互即可安装，当\
  \ Munki 再次运行时，它们将自动安装。我们将把 Firefox 和 Acrobat Reader 添加到此托管安装列表中。按照图 10-39 所示进行选择并添加。\n\
  \n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig39_HTML.jpg](img/492151_1_En_10_Fig39_HTML.jpg)\n\
  \n图 10-39\n选择并添加 Firefox 和 Acrobat Reader 作为托管安装项\n\n3.  接下来，我们将添加几个可选安装项。可选安装项不会自动安装，但会提供给最终用户，如果他们愿意，可以选择并安装。点击“可选安装”选项卡，然后使用“+”按钮添加\
  \ Adobe Flash Player、Audacity 和 VLC Media Player，如图 10-40 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig40_HTML.jpg](img/492151_1_En_10_Fig40_HTML.jpg)\n\
  \n图 10-40\n选择 Flash Player、VLC 和 Audacity 作为可选安装项\n\n4.  对 `site_default` 清单进行这些更改后，点击“保存”按钮，然后点击工具栏中的“重新加载”按钮以发布更改并刷新\
  \ MunkiAdmin 控制台。\n\n现在我们已经配置好了清单，在我们测试 Mac 上运行的 Munki 客户端软件将能够查看 `site_default`\
  \ 清单并执行列表中的项目。下一次 Munki 运行时（大约在接下来的一小时内），它将自动安装 Firefox 和 Acrobat Reader。\n\n###\
  \ 专业提示\n\n默认情况下，Munki 代理大约每小时与服务器联系一次。此时，它会查找服务器上的任何更改，然后下载并安装自上次联系后已部署到生产环境的任何软件包或运行任何脚本。\n\
  \n如果我们想立即测试（我们确实想），而不是等待，我们可以在客户端 Mac 上通过终端使用几个命令来强制 Munki 下载并安装清单中的可用软件包。\n\n在命令提示符下，输入\
  \ `sudo managedsoftwareupdate` 以强制运行 Munki。输入本地管理员密码后，你会看到命令行输出，显示 Munki 正在联系你的服务器并检查清单中是否有待处理的更新。它将找到并列出所有可用软件，如图\
  \ 10-41 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig41_HTML.jpg](img/492151_1_En_10_Fig41_HTML.jpg)\n\
  \n图 10-41\nMunki 正在运行并为我们的测试机检查可用更新\n\n接下来，我们可以输入 `sudo managedsoftwareupdate --installonly`，它将开始安装我们在清单中列为托管安装项的软件。图\
  \ 10-42 显示了命令行的进度输出，因为它会在后台运行安装程序，先安装 Adobe Acrobat Reader，然后是 Firefox。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig42_HTML.jpg](img/492151_1_En_10_Fig42_HTML.jpg)\n\
  \n图 10-42\n安装软件包\n\n完成后，浏览你的 `/应用程序` 目录，你应该会看到 Adobe Acrobat Reader 和 Firefox 现在已可用。随意打开它们，以确保它们安装成功并按预期工作。\n\
  \n\n\n### 管理软件中心\n\n我们已经成功安装了托管应用程序，但那些提供给最终用户、由他们选择是否安装的**可选安装**在哪里呢？您的最终用户可以通过作为\
  \ `MunkiTools` 的一部分安装、位于 `/Applications` 目录下的 `Managed Software Center` 应用程序来浏览这些应用并进行安装。在您的测试\
  \ Mac 客户端上，按照图 10-43 所示打开 `Managed Software Center`。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig43_HTML.jpg](img/492151_1_En_10_Fig43_HTML.jpg)\n\
  \n图 10-43\n用于最终用户交互的管理软件中心应用程序\n\n`Managed Software Center` 的外观类似 `Mac App Store`\
  \ 应用程序，功能也非常相似。它为用户提供购物车般的体验，以选择可选应用程序；对于通过清单分配给其计算机的任何应用程序，他们只需点击**安装**按钮即可安装。安装时无需管理员权限，并且他们可以按照自己的时间线管理更新。请在我们的测试\
  \ Mac 上继续安装 `Adobe Flash Player`、`Audacity` 和 `VLC Media Player`，以便感受其工作原理。\n\n\
  专业提示\n\n您是否注意到，将软件包导入 `Munki` 时所使用的各类别在 `Managed Software Center` 中得到了利用？如果您计划使用此工具管理大量应用程序，在构建测试和生产目录时，这些类别将非常有用。\n\
  \n### 目录\n\n现在我们已经处理了清单并向测试机器部署了软件，应该更详细地讨论一下 `Catalogs`。为了让 `Munki` 环境尽可能简单，我们应该考虑需要多少个目录。我通常使用两个目录：一个用于测试，一个用于生产。我的测试目录仅用于非生产机器，以确保软件包在安装到组织内所有机器之前能按预期安装和运行。\n\
  \n在 `MunkiAdmin` 中，点击工具栏的**目录**按钮以切换到目录视图。我们应该在这个列表中看到我们的**测试**目录。我总是喜欢将测试目录作为导入软件包的默认位置。测试完成后，我再将这些软件包添加到生产目录中。让我们创建一个**生产**目录，以便您了解其工作方式。从**文件**菜单中选择**新建目录**。在提示时，将此目录命名为\
  \ **production**，如图 10-44 所示。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig44_HTML.jpg](img/492151_1_En_10_Fig44_HTML.jpg)\n\
  \n图 10-44\n创建一个名为“production”的新目录\n\n默认情况下，新目录中没有启用任何软件包。在左侧边栏中点击新建的**生产**目录以选中它，然后在我们想要投入生产的软件包旁边**勾选复选框**。我们将勾选除\
  \ `Adobe Acrobat Reader` 和 `MunkiTools` 之外的所有应用程序旁边的复选框。您的 `MunkiAdmin` 窗口应类似于图\
  \ 10-45。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig45_HTML.jpg](img/492151_1_En_10_Fig45_HTML.jpg)\n\
  \n图 10-45\n选择将列在我们生产目录中的应用程序\n\n**保存**对目录的更改并**重新加载** `MunkiAdmin` 控制台。接下来，我们将编辑\
  \ **site_default** 清单，移除**测试**目录，并用**生产**目录替换它。这将确保仅包含在生产目录中且已获批准的应用程序会应用到订阅了我们\
  \ **site_default** 清单的客户端。\n\n打开 **site_default** 清单的属性，并对**常规**选项卡做一个小修改。**取消勾选**\
  \ **testing** 目录并**勾选** **production** 目录。转到**托管安装**选项卡，从列表中移除 `Acrobat Reader`。**保存**并**重新加载**\
  \ `MunkiAdmin` 控制台。下次 `Munki` 在客户端机器上运行时，它将只在**生产**目录中查找可用软件。\n\n专业提示\n\n因为我们从生产目录中移除了\
  \ `Adobe Acrobat Reader`，但这并不意味着它会从任何已安装该软件的客户端上卸载它。这只是防止它在后续运行中被安装。\n\n### 卸载应用程序\n\
  \n我们在测试系统上安装了 `Acrobat Reader`，但现在我们想卸载它。我们可以使用 `Munki` 来为我们完成此操作。首先，我们可以**编辑**\
  \ **site_default** 清单，将**测试**目录添加回来。由于每个清单中可以包含多个目录，我们将同时启用生产和测试目录。接下来，我们可以转到**托管卸载**选项卡，点击\
  \ **+** 按钮，从列表中选择 `Adobe Acrobat Reader`。**保存**并**重新加载**。在测试客户端上，强制运行 `Munki`，它将从系统中卸载\
  \ `Acrobat Reader`。\n\n我通过终端使用了 `managedsoftwareupdate --installonly` 命令，并且运行成功。从图\
  \ 10-46 可以看出，在扫描 Adobe Acrobat Reader 卸载程序的物料清单时，它发现了我的系统上不再需要的文件并将其移除。由于 `Adobe\
  \ Acrobat Reader` 已不在托管安装列表中，它将不会尝试重新安装该软件。\n\n![../images/492151_1_En_10_Chapter/492151_1_En_10_Fig46_HTML.jpg](img/492151_1_En_10_Fig46_HTML.jpg)\n\
  \n图 10-46\n卸载 Adobe Acrobat Reader\n\n专业提示\n\n注意到它也移除了 `Adobe Acrobat Reader` 的收据信息吗？如果日后我们想将\
  \ `Acrobat Reader` 重新添加到此机器上，`Munki` 将看到此软件包不再有收据，并会再次安排其安装。\n\n## 总结\n\n`Munki`\
  \ 是一个非常强大的工具，而我们目前只触及了其所有功能的表面。如果您计划在生产环境中使用 `Munki` 来管理所有软件部署，我建议访问 `Munki` 的 GitHub\
  \ 页面以了解更多信息。那里有一个非常活跃的 `Munki` 管理员社区，可以在您规划部署策略和构建 `Munki` 环境时为您提供许多思路。\n\n"
- "# 11. Microsoft 集成\n\n在过去十年中，苹果公司持续更新其操作系统，以使其在异构环境中更好地工作。在本章中，我们将探讨 Mac 或 iOS\
  \ 设备可以无缝集成到主要基于微软公司技术的企业网络中的各种方式。苹果提供了一些内置解决方案来帮助实现这种多平台集成，但也有一些第三方解决方案可以做得更多。在本章中，我们将讨论几种内置解决方案及相关策略，以在对企业网络进行最小化重新配置或成本投入的情况下支持苹果产品。\n\
  \n\n\n## Apple 与 Microsoft 集成简介\n\n在过去的几个`macOS`和`macOS Server`版本迭代中，苹果公司选择降级或完全移除其第一方服务，转而支持行业标准解决方案。例如，数十年来，`AppleTalk`一直是\
  \ Mac 的标准网络协议。苹果文件协议（`AFP`）曾是 Mac 操作系统中的文件共享标准。然而，近年来，服务器消息块（`SMB`）文件共享已取代其成为`macOS`中的默认文件共享协议。`AFP`仍然存在，但已被降级为一种在需要时可用的解决方案，而首选方案是使用与\
  \ Linux 和 Windows 客户端相同的文件共享方案。\n\n**专业提示**\n\n服务器消息块（`SMB`）是一种通过网络共享数据的协议。微软在`Windows\
  \ 95`中采用了此协议。Linux 和 macOS 客户端使用一个名为`Samba`的与`SMB`兼容的解决方案来访问`SMB`共享的资源。\n\n除了在`macOS`中采用`SMB`文件共享以取代苹果文件协议外，我们还可以看到\
  \ Open Directory 的持续降级，转而支持 Active Directory，并且`macOS Server`中移除了`DHCP`服务器、邮件、消息和`CalDAV`服务器解决方案。其中许多服务已被云托管版本所取代，例如`iCloud`、`Office\
  \ 365 (O365)`和`Google Docs`。这对于我们 Mac 系统管理员来说实际上是有利的，因为我们可以更轻松地将 Apple 设备集成到现有系统中，而不必建立专用的仅适用于\
  \ Apple 的技术，或实施复杂且昂贵的中间件。\n\n### 我的 Microsoft 环境\n\n在我们深入探讨将 Apple 平台集成到企业 Microsoft\
  \ 环境的细节之前，先快速概述一下我当前的网络状况会很有帮助。图 11-1 直观地展示了在我开始将 Mac 和 iOS 设备加入混合环境之前的企业网络概况。\n\
  \n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig1_HTML.jpg](img/492151_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n\n我的 Microsoft 网络、服务、打印机和共享\n\n*   **Microsoft Active Directory:** 本地\
  \ Windows 域，名为`MyCompany.local`。我按地理位置设置了几个组织单位（`OUs`），并为本次演示应用了最简化的`组策略`。\n*  \
  \ **用户账户和组成员资格:** 我有几个用户账户和几个组，用于控制对各种网络文件共享和打印机的访问。每个用户使用其域账户登录其 PC。\n*   **组策略:**\
  \ 为了本次演示，我有一个应用了基本`组策略（GPO）`的`OU`，它控制着我的`Internet Explorer（IE）`浏览器的默认主页。\n*   **DNS:**\
  \ 我在我的 Windows 服务器上运行`DNS`服务器，为我的 PC 网络提供`DNS`服务。\n*   **DHCP 服务器:** 我运行着微软的`DHCP`服务器，并通过此服务为我的\
  \ PC 网络提供`DNS`。\n*   **文件共享:** 我在 Windows 服务器上运行文件共享服务，共享几个网络驱动器，PC 用户可以在这些驱动器上相互共享文件。\n\
  *   **打印共享:** 我在 Windows 服务器上运行打印机共享服务，将工作组打印机共享给办公室里的各个用户。\n*   除了本地解决方案，我们还运行`Microsoft\
  \ Office 365`，用户可以访问云端的`OneDrive`和`Microsoft Exchange`。我们的电子邮件是通过`O365`上的`Exchange`传递的。\n\
  \n现在我们已经定义了 Microsoft 环境，我们需要规划 Apple 平台的集成，并确定我们的 Mac 和 iOS 用户将需要哪些服务。\n\n### Apple\
  \ 用户所需的 Microsoft 服务\n\n我们将在网络中为公司总裁增加一台`MacBook Pro`。他将需要访问以下服务：\n\n*   能够在办公室内和远程登录到他的\
  \ Mac\n*   访问主公司办公室服务器上的共享文件\n*   能够向他办公室的共享`HP LaserJet`打印机打印\n*   访问`Exchange`电子邮件\n\
  *   访问`Microsoft OneDrive`\n*   在他的 Mac 上原生运行`Microsoft Office`套件（包括`Microsoft Outlook`）\n\
  *   当他打开`Safari`时，默认访问公司内联网\n*   从他旧的 Windows 笔记本电脑迁移现有的`Internet Explorer`收藏夹、`Outlook`个人文件夹和数据\n\
  \n我们还将为公司总裁提供一部`iPhone 11`。他需要从他的`iPhone`上访问这些服务：\n\n*   访问`Microsoft OneDrive`\n\
  *   访问他的`Exchange`电子邮件\n*   在`电话`应用中可用的来自其`Exchange`账户的联系人\n*   能够在`iPhone`上打开和编辑`Word`和`Excel`文档\n\
  \n最后，我们将为公司销售经理提供一部`iPad`，她需要能够每天在主公司办公室文件服务器上更新几个报告。她需要能够从她的`iPad`映射网络驱动器，并在那里更新几个`Excel`文件：\n\
  \n*   在`iPad`上访问`Microsoft Excel`\n*   访问主公司办公室服务器上的共享文件\n\n在本章中，我们将使用这三个场景，将一台运行`iPadOS`的`iPad`、一部`iPhone`和一台`Mac`集成到我们现有的企业网络中。\n\
  \n\n\n## macOS 的 Active Directory 集成\n\n在第一部分，我们将重点介绍针对 macOS 客户端的 Active Directory\
  \ 身份验证。在开始此练习之前，您应该已有一台安装了干净操作系统并配置了本地管理员账户的 Mac。通过 `Sharing System Preference`，将这台新\
  \ Mac 命名为 `101-2019MBP`，这表示它是我们主办公室 101 中的一台 *2019 年款 MacBook Pro*。打开 `Terminal`，将本地主机名和主机名设置为与之匹配。为了使\
  \ Active Directory 集成正常工作，我们需要 Mac 的三个名称都保持一致。\n\n**专业提示**\n您的组织可能使用某种公司命名规范。虽然苹果设备会尝试以机器上创建的第一个用户账户来命名自己，但您应该以命名\
  \ Windows PC 的相同方式来命名您的 Mac。\n\n我们的 Mac 现在已准备好加入到 MyCompany 域。让我们切换到域控制器并打开 `Active\
  \ Directory Users and Computers` 以开始操作。\n\n### 为 Mac 客户端准备域控制器\n\n作为一个最佳实践，我倾向于在将\
  \ macOS 客户端添加到域*之前*，先在 Active Directory 中为其创建记录。这样做有几个目的：它可以防止 Mac 加入错误的组织单位（OU），并且能预先避免\
  \ Mac 客户端在加入域时无法在 AD 中写入新计算机记录的任何奇怪错误。在这个练习中，我们将在 Active Directory 中为我们的新 MacBook\
  \ Pro 准备一个位置。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig3_HTML.png](img/492151_1_En_11_Fig3_HTML.png)\n\
  \n图 11-3\n在 Active Directory 中添加新的计算机记录\n\n1.  打开 `Active Directory Users and Computers`。如图\
  \ 11-2 所示，我有一个名为 *Main Office Computers* 的 OU。在该 OU 内部，我有一个 *Windows 10 PCs* OU，用于存放主办公室所有\
  \ Windows PC 的计算机记录。这也是我为主办公室计算机应用特定 Windows 10 组策略对象（GPO）的地方。在此处为我们的 Mac 创建一个新的\
  \ OU，并将其命名为 `macOS PCs`。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig2_HTML.png](img/492151_1_En_11_Fig2_HTML.png)\n\
  \    图 11-2\n    创建 macOS PCs 组织单元\n\n2.  现在我们已经创建了 OU，我们可以用 Mac 的计算机记录来填充它。选中 *macOS\
  \ PCs* OU，在右侧面板的任何位置**右键单击**并选择 **新建 ➤ 计算机**，将其命名为 `101-2019MBP`，如图 11-3 所示。点击 **确定**\
  \ 创建记录。\n\n现在我们已经为 Mac 客户端创建了记录，可以将其添加到域中了。切换回您的 MacBook Pro 并打开 `Users & Groups\
  \ System Preference` 继续。\n\n### 将 Mac 添加到 Active Directory 域\n\n1.  在 `Users & Groups\
  \ System Preference` 中，点击**锁形图标**，使用本地管理员账户进行身份验证，然后点击 `Login Options` 按钮。您的对话框应类似于图\
  \ 11-4。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig4_HTML.jpg](img/492151_1_En_11_Fig4_HTML.jpg)\n\
  \    图 11-4\n    Users & Groups System Preference 中的登录选项面板\n\n2.  点击 `Network Account\
  \ Server` 提示旁边的 `Join...` 按钮。\n\n3.  在这里，我们将输入 AD 域的域名。我将输入 `MyCompany.local`，如图\
  \ 11-5 所示，系统将开始搜索该域。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig5_HTML.jpg](img/492151_1_En_11_Fig5_HTML.jpg)\n\
  \    图 11-5\n    在服务器字段中输入域名\n\n4.  找到域后，系统会提示您输入计算机名和凭据。如果我们正确设置了本地主机名和主机名，它会自动填充我们想要使用的计算机名，如图\
  \ 11-6 所示。在下个字段中输入您的域管理员用户名和密码，然后点击 **OK**。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig6_HTML.jpg](img/492151_1_En_11_Fig6_HTML.jpg)\n\
  \    图 11-6\n    确认计算机名并使用域管理员账户进行身份验证\n\n5.  接下来，系统会提示您修改 Mac 上的目录配置，并要求您输入本地 Mac\
  \ 管理员账户的用户名和密码。输入该信息并点击 `Modify Configuration` 按钮继续。\n\n6.  您的 Mac 现在将开始配置 Active\
  \ Directory，大约一分钟后，您会在 Windows 域名称旁边看到一个绿点，如图 11-7 所示。这表示您的 Mac 现已成功加入到 MyCompany\
  \ 域。\n    ![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig7_HTML.jpg](img/492151_1_En_11_Fig7_HTML.jpg)\n\
  \    图 11-7\n    域名旁边的绿点确认我们的 Mac 已成功加入\n\n**专业提示** 如果您在查找域时遇到问题，应检查 Mac 上的 `DNS`\
  \ 设置，确保它从 Windows 服务器获取 `DNS`，并确保您可以正向和反向解析 IP 地址和域名。如果您有多个 `DNS` 服务器，请确保您的 Windows\
  \ 服务器是主 `DNS` 服务器。\n\n**专业提示** 如果在加入域时出现错误，需要检查的一件事是域控制器和 Mac 的时区、日期和时间。通常，您的客户端或服务器时间会偏差几分钟，这将导致域绑定失败并出现各种隐晦的错误消息。\n\
  \n现在我们的 Mac 已在域上，我们应该注销本地管理员账户，并使用来自 Windows Active Directory 域的网络账户用户登录。*Don President*\
  \ 是我们的幸运用户，他将获得这台全新的 *MacBook Pro*。让我们使用他的账户测试此登录，如图 11-8 所示。\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig8_HTML.jpg](img/492151_1_En_11_Fig8_HTML.jpg)\n\
  图 11-8\n使用网络用户账户登录\n\n完成设置助理后，我们会进入默认新用户的主目录。使用 `Finder` 浏览到 `Home`，可以看到我们是以 *dpresident*\
  \ 用户身份登录的。您的屏幕应类似于图 11-9。很好！现在可以注销并以管理员身份重新登录。\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig9_HTML.jpg](img/492151_1_En_11_Fig9_HTML.jpg)\n\
  图 11-9\nmacOS Catalina 中的默认新用户桌面\n\n让我们试一下。请先禁用 `Wi-Fi`，确保您的 MacBook Pro 不再连接到网络。注销，然后尝试再次使用网络用户账户登录。您会遇到一个小问题。因为域不可达，您将无法进行身份验证。登录屏幕的右上角有一个红色指示按钮，显示我们已与网络断开连接，如图\
  \ 11-10 所示。\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig10_HTML.jpg](img/492151_1_En_11_Fig10_HTML.jpg)\n\
  图 11-10\n红点表示 Windows 域不可达\n\n\n\n"
- "# 设置此笔记本的要求之一，是让 Don 总统能够在断网状态下登录。要解决此问题，我们需要将此 Mac 上的`dpresident`账户转换为移动账户。使用本地管理员账户登录，并重新启用网络访问。注销后，确保你能以`dpresident`用户身份重新登录。以\
  \ Don 总统身份登录后，转到`用户与群组系统偏好设置`，如图 11-11 所示。注意当前列出的用户类型是`网络`类型？我们需要将其转换为`移动`账户类型。\n\
  \n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig11_HTML.jpg](img/492151_1_En_11_Fig11_HTML.jpg)\n\
  \n**图 11-11**  \n注意 Don 总统的用户账户类型标识\n\n点击`挂锁`图标，以本地管理员身份认证。然后如图 11-12 所示点击 Don 总统用户。点击`移动账户`提示旁边的`创建...`按钮。\n\
  \n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig12_HTML.jpg](img/492151_1_En_11_Fig12_HTML.jpg)\n\
  \n**图 11-12**  \n将 Don 总统的网络账户转换为移动账户\n\n当提示时，将个人文件夹位置选择为`Macintosh HD（启动磁盘）`选项，然后点击`创建`按钮继续。系统会警告你将注销以创建本地个人文件夹，如图\
  \ 11-13 所示。点击`创建`按钮继续。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig13_HTML.jpg](img/492151_1_En_11_Fig13_HTML.jpg)\n\
  \n**图 11-13**  \n按照提示注销并创建移动账户\n\n根据您为 FileVault 等设置的内容，此过程可能会要求您输入用户的 Active Directory\
  \ 密码以及本地管理员的用户名和密码。完成后，您将返回到登录窗口。\n\n通过断开网络连接来测试此操作，并等待屏幕右上角出现红色指示符。现在以 Don 总统身份登录，它将正常工作。打开`用户与群组系统偏好设置`，您将看到该用户现在是一个`移动`账户类型，而非`网络`账户类型，如图\
  \ 11-14 所示。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig14_HTML.jpg](img/492151_1_En_11_Fig14_HTML.jpg)\n\
  \n**图 11-14**  \n用户账户现在被列为移动类型\n\n**专业提示**  \n请注意，如果多个网络用户需要在此 Mac 离线时访问它，您需要将此\
  \ Mac 上的每个用户账户从网络类型转换为移动类型。目前，当此 MacBook Pro 与网络断开连接时，唯一可以登录的 Active Directory 用户是\
  \ Don 总统。\n\n如我们所示，将 Mac 添加到 Windows 域几乎不需要在 Windows 服务器上进行额外的配置，也无需扩展 Active Directory，只需使用`macOS`中的移动用户账户类型即可支持身份验证和缓存凭据。我们已经以交互方式将\
  \ Mac 加入了域，但我们也可以通过使用配置描述文件或脚本来实现此任务的自动化。\n\n### 使用配置描述文件将 Mac 添加到 Active Directory\n\
  \n开始此练习前，您应该在一台测试 Mac 上从全新安装`macOS`开始。您应该为其命名，并在 Active Directory 中创建一个匹配的计算机记录。然后使用您喜欢的方法，将其注册到\
  \ MDM 中并将其提升为“用户批准”，以便我们能完全访问所有配置描述文件选项。\n\n我已经创建了一台名为`101-2019MPRO`的测试 Mac，并相应地为其命名（包括本地主机名和主机名）。我已将其添加到\
  \ Profile Manager 中，并在 AD 中为其创建了计算机记录，但尚未将其加入域。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig15_HTML.jpg](img/492151_1_En_11_Fig15_HTML.jpg)\n\
  \n**图 11-15**  \n为绑定到我们的 Active Directory 域配置目录负载\n\n1.  打开 Profile Manager，浏览至`设备`部分中的`101-2019MPRO`\
  \ Mac。点击`设置`选项卡，然后点击`编辑`按钮以应用新的配置描述文件设置。\n2.  像以往一样配置`通用`负载，确保`自动推送`已启用，并可选择性地输入描述。\n\
  3.  向下滚动到可用负载的`macOS`部分，选择`目录`负载，然后点击`配置`按钮。\n4.  如图 11-15 所示自定义负载。请注意，我们有几个新选项，包括一个在登录时为首次登录此\
  \ Mac 的所有域用户创建移动账户的选项。因为我们在 AD 中已经有一个计算机记录，所以我们不会指定特定 OU 的路径。\n\n**专业提示**  \n`映射`和`管理`选项卡下有一些可选设置，在本练习中我们将保留其默认值，但我鼓励您和您的\
  \ Windows 系统管理员查看这些设置，并确定适合您特定环境的最佳设置。如果您的计算机将长时间离开局域网，那么客户端计算机上域密码更改频率（默认是每 14\
  \ 天）的设置尤其值得注意。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig16_HTML.jpg](img/492151_1_En_11_Fig16_HTML.jpg)\n\
  \n**图 11-16**  \n使用 MDM 将我们的域负载应用到测试 Mac\n\n1.  自定义负载后，点击`好`按钮保存配置并关闭配置描述文件编辑器。在\
  \ Profile Manager 中点击`存储`按钮，将设置应用到`101-2019MPRO`客户端，如图 11-16 所示。\n\n它应成功完成推送设置任务，您的\
  \ Mac 现在将被配置为登录到域。请注意，在首次登录时，它会在计算机上自动将 Don 总统转换为移动账户类型。\n\n**专业提示**  \n您可能还想配置其他负载，例如\
  \ Active Directory 证书或登录窗口，以进一步自定义用户体验，或应用任何所需的安全证书，并将这些与您的目录负载一起包含。\n\n### 使用脚本将\
  \ Mac 绑定到 Active Directory\n\nApple 还提供了一个名为`dsconfigad`的命令行工具，用于编写 Active Directory\
  \ 配置脚本。在 Apple Remote Desktop 的`发送 Unix`任务中使用此命令，可以有效地一次性将多台 Mac 加入域，并进一步自动化该过程。如果您所在的组织没有使用\
  \ MDM 解决方案，这尤其有用。\n\n开始此练习前，您应该在一台测试 Mac 上从全新安装`macOS`开始。您应该为其命名，并在 Active Directory\
  \ 中创建一个匹配的计算机记录。我已经创建了一台名为`101-2013MPRO`的测试 Mac 并相应命名，但这次我将主机名留为`unset`，以便在本练习中与您分享一个快捷方式。我已经在\
  \ AD 中为其创建了计算机记录，但尚未将其加入域。\n\n1.  现在我们的计算机名称和主机名一致了，我们可以准备使用`dsconfigad`命令加入域了。您可以查看`dsconfigad`的手册以了解更多关于此命令功能和额外选项的信息，但在本练习中，我们将只介绍基础知识。我们需要定义四个参数：\n\
  \    1.  `客户端 ID` (`-c`) 代表我们要用来将 Mac 加入域的名称。\n    2.  `管理员账户` (`-u`) 代表域管理员账户的用户名。\n\
  \n\n\n### 3. 管理员密码\n\n`-p` 参数代表域管理员账户的密码。\n\n### 4. 域\n\n`-domain` 参数代表我们要将 Mac\
  \ 加入的域。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig17_HTML.jpg](img/492151_1_En_11_Fig17_HTML.jpg)\n\
  *图 11-17：使用脚本将计算机名称复制到主机名*\n\n1.  我们将使用 `Terminal` 应用程序在测试 Mac 上交互式地开发此脚本，但一旦您完善了它，就可以在\
  \ Apple Remote Desktop 中创建一个模板并将其应用于整个 Mac 机群。在 `101-2013MPRO` 上打开 `终端` 以开始操作。\n\
  \n2.  我们将编写一个简短的小脚本，用于捕获 Mac 的计算机名称并将其保存为变量，然后使用 `scutil --set` 命令相应地设置主机名。因此，在终端命令行提示符处输入：\n\
  \n```\nHOSTNAME=$(networksetup -getcomputername)\nscutil --set HostName $HOSTNAME\n\
  ```\n\n按下 **Enter** 键，然后在提示 `HostName [计算机名称]` 输出时再次按下 **Enter** 键，接着在提示时输入本地管理员密码。一旦完成更改并再次回到命令行提示符，输入\
  \ `scutil --get HostName`，现在它应该与其他设置匹配为 `101-2013MPRO`。如果您在 Apple Remote Desktop\
  \ 中使用此脚本，它将始终将 Mac 客户端的主机名更改为与计算机名称匹配。此时，您的终端窗口应类似于图 11-17。\n\n**专业提示：** 您还可以在此处定义一个额外选项，即您希望将\
  \ Mac 客户端分配到的 OU。但是，由于我们已经在我们想要的位置创建了计算机记录，所以可以跳过此参数。如果您想手动定义放置此 Mac 的 OU，可以使用 `-ou`\
  \ 参数，后跟 `\"OU=, DC=, DC=\"` 格式的路径，例如 `\"OU=macOS PCs, OU=Main Office Computers,\
  \ DC=MyCompany, DC=local\"`。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig18_HTML.jpg](img/492151_1_En_11_Fig18_HTML.jpg)\n\
  *图 11-18：重命名计算机并将其加入域的完整脚本*\n\n1.  让我们开始输入带有客户端 ID 参数的 `dsconfigad` 命令。因为我们将在多台计算机上使用相同的脚本，所以我们将使用一个令牌，而不是为此计算机指定确切的名称。我们可以使用\
  \ `\"hostname -s\"` 令牌，以便在脚本中自动应用此 Mac 的主机名作为客户端 ID。这将模仿我们通过*用户与群组系统偏好设置*将 Mac 加入域时的\
  \ GUI 行为。\n\n2.  接下来，我们将为 `MyCompany.local` 域指定域管理员账户的用户名和密码。最后，我们将添加指定域名的参数。包含所有参数的完整脚本应类似于图\
  \ 11-18。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig19_HTML.jpg](img/492151_1_En_11_Fig19_HTML.jpg)\n\
  *图 11-19：脚本运行后，我们可以在\"用户与群组系统偏好设置\"中确认 Mac 已在域中*\n\n1.  它将提示您输入本地管理员账户的密码。一两分钟后，它将成功完成。打开*用户与群组系统偏好设置*，单击\
  \ **登录选项** 按钮，确认现在列出了 Windows 域，并且**网络账户服务器**旁边有一个绿色指示器图标，如图 11-19 所示。\n\n```\n\
  dsconfigad -c \"'hostname -s'\" -u Administrator -p noAcce$$ -domain MyCompany.local\n\
  ```\n\n**专业提示：** 您可以将其他命令与 `dsconfigad` 结合使用来设置其他设置，例如 `-mobile enable` 以支持移动账户选项，以及\
  \ `-passinterval` 来调整域计算机密码更改的频率，以便长时间脱网的系统不会脱离域。如果您对此有疑问，请咨询您的 Windows 系统管理员，以确定是否需要此选项或其他选项。\n\
  \n我们已经成功配置了 Active Directory，并使用三种不同的方法将我们的 Mac 加入了域。现在我们的 Mac 已在域上，我们可以访问 Windows\
  \ 服务器上的其他资源。\n\n\n\n### 使用配置文件管理器模拟 Microsoft 组策略\n\n我们正在逐一完成针对 Don President 的\
  \ MacBook Pro 的各项集成任务。他可以使用其 Active Directory 凭据登录，并且可以在机器离线时登录。然而，我们仍需要配置他的 Mac\
  \ 以符合我们的企业标准。这可能包括我们 Windows 组策略中定义的许多项目，例如默认壁纸、屏幕保护程序启动所需时间、屏幕保护程序是否需要密码、节能器设置（如计算机或显示器何时进入睡眠状态）以及默认主页等等。\n\
  \n幸运的是，这些选项大多数在 `Profile Manager` 中可用，我们可以使用 `配置描述文件` 来向 Don 的 Mac 提供这些设置，并模拟我们公司\
  \ GPO 中内置的设置。出于本次演示的目的，我们将简单地设置节能器和一些自定义的 Safari 设置。为此，请打开 `Profile Manager` 并浏览到\
  \ `设备` 下的 `101-2019MBP` 计算机。点击 `设置` 选项卡，然后点击 `编辑`。\n\n让我们首先配置 `节能器` 负载。点击 `节能器`，然后点击\
  \ `配置` 按钮来定义此负载的设置。您的设置应与图 11-20 中我的设置类似。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig20_HTML.jpg](img/492151_1_En_11_Fig20_HTML.jpg)\n\
  \n*图 11-20*: 配置节能器负载\n\n接下来，我们需要做一些更定制化的操作来配置 Safari 的设置。我们将添加一个名为 `自定义设置` 的新负载，并按图\
  \ 11-21 所示进行配置。这种方式的工作机制是，我们将用我们的设置覆盖特定应用程序（本例中是 `Safari`）的本地用户设置。我们将在 `偏好设置域` 字段中输入\
  \ `com.apple.Safari`，然后就可以逐项添加条目并按每个键定义特定的行为，就像在创建我们自己的自定义 `*.plist` xml 文件一样。\n\
  \n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig21_HTML.jpg](img/492151_1_En_11_Fig21_HTML.jpg)\n\
  \n*图 11-21*: 为 Safari 创建自定义键和值以定制用户体验\n\n您可能会好奇我从哪里找到这些用来覆盖 `Safari` 默认行为的选项。这因应用程序而异，但通常我会在\
  \ `~/Library/Preferences/` 目录中查找对应的 `*.plist` 文件。最容易修改的应用程序是那些将其设置保存在该目录中的，然后我只需使用\
  \ `上传文件` 按钮将修改后的 `*.plist` 文件上传到 `Profile Manager` 的 `自定义设置` 负载中即可。不幸的是，有些应用程序（如\
  \ Safari）稍微棘手一些。\n\n`Safari` 在 `Safari.app` 应用程序包 ➤ `Contents` ➤ `Resources` ➤ `com.apple.Safari.manifest`\
  \ ➤ `Contents` ➤ `Resources` 中有一个名为 `com.apple.Safari.manifest` 的文件。我知道，它藏得很深！如果您在\
  \ `TextEdit` 中打开这个 xml 文件，您会看到各种键及其匹配的选项，如图 11-22 所示。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig22_HTML.jpg](img/492151_1_En_11_Fig22_HTML.jpg)\n\
  \n*图 11-22*: 用于覆盖 Safari 偏好设置的键和值选项\n\n我从中挑选了几个添加到 `自定义设置` 负载中，并通过点击 `添加项目` 按钮并输入值的方式手动添加了它们。至于\
  \ MyCompany 主页，我使用了一个 `string` 类型来定义 URL 为 [`www.msn.com`](http://www.msn.com)。为本次演示的目的，我们将称之为我们公司的\"\
  内网主页\"。您可以在此处放入任何 URL 并将其应用为 `Safari` 的新默认主页。\n\n**专业提示**\n\n当您选择为特定应用程序上传 `*.plist`\
  \ 偏好设置文件时，它允许您以类似于使用 `组策略管理模板` 的方式调整 `属性列表值`。为应用程序创建 `自定义设置` 负载可能需要大量时间，但如果您需要管理数百或数千台\
  \ Mac，那么这些努力是值得的。\n\n点击 `确定` 按钮关闭 `配置设置` 窗口，然后点击 `保存` 按钮将设置应用到我们的 Mac。切换回 Don 的\
  \ MacBook Pro 并启动 `Safari`。您将看到，我们的新窗口和新标签页行为现在被设置为加载主页而不是收藏夹，并且加载的主页是我们之前在 `自定义设置`\
  \ 负载中定义的 [`www.msn.com`](http://www.msn.com)。您的屏幕应类似于图 11-23。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig23_HTML.jpg](img/492151_1_En_11_Fig23_HTML.jpg)\n\
  \n*图 11-23*: 我们的自定义设置已应用于测试 Mac 上的 Safari\n\n## Windows 打印机共享集成\n\n我们为 Don 列出的下一项任务是将他的网络打印机映射到他的\
  \ Mac。我们在主办公室有一台从 Windows 服务器共享的 HP LaserJet 9050 打印机。Don 有权使用该共享打印机，我们需要做的就是从他的\
  \ Mac 连接到它。您可以在以 Don 身份登录时执行此任务。\n\n**连接到 Windows 共享打印机**\n\n1.  打开 `打印机与扫描仪系统偏好设置`，点击挂锁图标并以本地\
  \ `管理员` 账户进行身份验证。\n2.  点击左侧窗格中的 `+` 按钮，如图 11-24 所示。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig24_HTML.jpg](img/492151_1_En_11_Fig24_HTML.jpg)\n\
  \n*图 11-24*: 使用打印机与扫描仪系统偏好设置添加新打印机\n\n3.  Mac 将在目录域中搜索可用的网络打印机并列出它们。我们将从列表中选择我们的打印机，然后在\"\
  使用\"弹出菜单下选择 `选择软件`，然后浏览找到 `HP LaserJet Series PCL` 驱动程序。一旦您的窗口看起来像图 11-25 那样，点击\
  \ `添加` 按钮以完成该过程。打印一张测试页以确保其正常工作。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig25_HTML.jpg](img/492151_1_En_11_Fig25_HTML.jpg)\n\
  \n*图 11-25*: 查找我们的网络打印机并选择合适的驱动程序\n\n## Windows 文件共享集成\n\n接下来，我们需要配置一些 Windows 文件共享。Don\
  \ 需要在他的 Mac 上访问 `Executive Shared` 驱动器，销售经理也需要在她的 `iPad` 上访问同一个网络驱动器，以便她可以更新 Don\
  \ 审阅的每日销售报告。我们将从在 Don 的 Mac 上连接到网络共享开始。\n\n\n\n### macOS 文件共享\n\n在登录为 Don 时，我们可以使用\
  \ `Go` 菜单 ➤ `Connect to Server`（连接到服务器）选项，手动映射托管在我们 Windows 服务器上的 `Exec Shared`\
  \ 驱动器。如图 11-26 所示，输入共享的完整路径。作为最佳实践，在定义服务器名称时，你可能希望使用**完全限定域名**。请注意，在 Mac 上定义网络路径时，我们需要使用正斜杠（`/`）而不是反斜杠（`\\\
  `）。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig26_HTML.jpg](img/492151_1_En_11_Fig26_HTML.jpg)\n\
  \n图 11-26: \"连接到服务器\" 对话框\n\n输入网络共享路径后，你还可以点击 `+` 按钮将其保存为**收藏服务器**，这样 Don 在每次需要连接时就不必记住这个路径。点击\
  \ `Connect`（连接）按钮，它应该会在一个新窗口中映射该驱动器。由于我们已经使用 Don 的域账户登录到这台 MacBook Pro，因此应该不需要任何额外的身份验证。\n\
  \n**专业提示**：很可能你会希望像在 Windows 上那样，在登录时自动映射 Don 的网络驱动器。为此，你可以进入 `Users & Groups System\
  \ Preference`（用户与群组系统偏好设置）➤ `Login Items`（登录项）标签页；使用 `+` 按钮，你可以将网络卷添加到列表中，如图 11-27\
  \ 所示。这样在登录 Mac 后，系统将尝试自动连接到这些驱动器。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig27_HTML.jpg](img/492151_1_En_11_Fig27_HTML.jpg)\n\
  \n图 11-27: 为 Don President 的登录项添加 Exec Shared 卷\n\n**专业提示**：你也可以配置一个 MDM 有效载荷，以便在登录时自动映射网络驱动器。如图\
  \ 11-28 所示，你可以选择添加一个 `Authenticated Network Mount`（已验证的网络挂载），然后指定文件共享协议、服务器名称和共享名称。\n\
  \n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig28_HTML.jpg](img/492151_1_En_11_Fig28_HTML.jpg)\n\
  \n图 11-28: 通过描述文件管理器在登录项有效载荷中添加挂载点\n\n### iPadOS 文件共享\n\n现在 Don 的 Mac 已经全部设置好了，让我们切换到\
  \ Sally 的新 iPad。由于她运行的是 `iPadOS`，因此在“文件”应用中有一个额外的选项，允许她连接到网络共享。要访问此选项，请从主屏幕打开“文件”应用，然后点击\
  \ `…` 按钮并选择 `Connect to Server`（连接到服务器），如图 11-29 所示。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig29_HTML.jpg](img/492151_1_En_11_Fig29_HTML.jpg)\n\
  \n图 11-29: 在文件应用中访问“连接到服务器”选项\n\n当提示输入服务器路径时，在 `Server`（服务器）字段中输入 `smb://PCSERVER01.mycompany.local`（或服务器的\
  \ IP 地址），然后点击 `Connect`（连接）按钮。系统会提示你进行身份验证，因此请输入有权访问 Windows 共享的用户的用户名和密码。我在图 11-30\
  \ 中使用了 `sjones`，但 `dpresident` 也可以。输入用户凭据后，点击 `Next`（下一步）按钮继续。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig30_HTML.jpg](img/492151_1_En_11_Fig30_HTML.jpg)\n\
  \n图 11-30: 输入用户名和密码以验证文件服务器身份\n\n系统将把你连接到服务器，并显示你已通过身份验证的用户有权访问的所有共享。你的屏幕应该类似于图\
  \ 11-31。Sally 现在可以浏览到 `Exec Shared` 文件夹，然后找到她的销售报告，用 `iPad` 上的 `Microsoft Excel`\
  \ 打开并进行编辑。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig31_HTML.jpg](img/492151_1_En_11_Fig31_HTML.jpg)\n\
  \n图 11-31: 从 iPad 浏览我们的网络文件共享\n\n我们已成功在 `macOS` 和 `iPadOS` 客户端上配置了本地的 Windows 文件共享。Apple\
  \ 设备的用户可以无缝地与 Windows PC 用户共享数据。\n\n## Microsoft Exchange 集成\n\nApple 在 `macOS`\
  \ 和 `iOS` 的操作系统层面都提供了 `Microsoft Exchange` 集成。你可以使用描述文件来为邮件、联系人、日历和任务配置 Exchange\
  \ 账户设置。对于 Don 的新款 `iPhone 11`，我们将直接使用描述文件管理器远程为他的设备配置 Exchange 设置。对于他的 Mac，他想要使用\
  \ Microsoft Outlook，因此我们将在下一节下载并激活 Office 365 应用程序后进行手动配置。\n\n### 使用有效载荷变量配置 Microsoft\
  \ Exchange 账户\n\n在开始此练习之前，请务必在描述文件管理器中为 Don President 创建一个新用户，用户名使用 `dpresident`。注册一台测试用的\
  \ iOS 设备并将其命名为 `Don's iPhone`，这样你就可以修改并向该设备推送新的描述文件。既然我们已经创建了一个账户，我们将创建一个 Exchange\
  \ 有效载荷，该有效载荷将使用他的用户名作为 `payload variable`（有效载荷变量）来配置其设备上的账户。\n\n1.  打开 `Profile\
  \ Manager`（描述文件管理器），浏览 `Devices`（设备）部分，找到 `Don's iPhone`。点击选择它，然后点击 `Settings`（设置）标签页并\
  \ `Edit`（编辑）描述文件。\n2.  在描述文件编辑器中，向下滚动到 `iOS` 部分，选择 `Exchange` 有效载荷。点击 `Configure`（配置）按钮以指定设置。\n\
  3.  如图 11-32 所示，根据 Exchange 有效载荷的要求，在各个字段中输入 Exchange 服务器信息。对于用户名，我们将使用 `%short_name%`\
  \ 而不是 `dpresident`。这样做可以让我们将此有效载荷应用于我们组织中的其他用户，并且在应用描述文件时，`%short_name%` 变量将解析为当前用户的用户名，在此例中为\
  \ `dpresident`。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig32_HTML.jpg](img/492151_1_En_11_Fig32_HTML.jpg)\n\
  \n图 11-32: 使用有效载荷变量设置 Exchange 配置\n\n4.  向下滚动到有效载荷的 `Enabled Services`（已启用的服务）部分，确保所有这些选项都已勾选，如图\
  \ 11-33 所示。这将使整个 `iOS` 系统能够访问来自 Microsoft Exchange 的数据，包括“电话”应用的通讯录。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig33_HTML.jpg](img/492151_1_En_11_Fig33_HTML.jpg)\n\
  \n图 11-33: 配置启用哪些服务\n\n5.  点击 `OK`（确定）按钮保存配置有效载荷，然后点击 `Save`（保存）进行应用。在描述文件应用时，系统会提示用户输入密码，之后\
  \ Exchange 配置将完全完成。\n\n**专业提示**：请注意，如果你的公司使用了 ActiveSync 中包含的一些 MDM 功能，这些功能也将应用于设备。例如，最小密码长度要求等将适用于设备，并且限制性更强的有效载荷将优先于其他。例如，如果你在描述文件管理器中要求最小密码长度为四个字符，但\
  \ ActiveSync 设置为要求至少六个字符，那么在 Exchange 数据开始同步到设备之前，设备将提示用户设置一个新的六位数密码。\n\n无论你使用的是**自带设备**（BYOD），还是在描述文件管理器中管理公司拥有的设备，你都可以看到使用描述文件来应用特定设置（如\
  \ Microsoft Exchange）比手动配置每台单独的设备要好得多。\n\n\n\n## Microsoft Office 365 应用程序与 OneDrive\n\
  \n下一步是在 Don 的 MacBook Pro 上安装 Office 365 应用程序。与此同时，我们也可以在他的 iPhone 上安装 Word 和 Excel。使用\
