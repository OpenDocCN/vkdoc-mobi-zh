  \ **Windows 迁移助手**。当出现提示时，继续 **运行** 下载的 `setup.exe` 文件，按照安装向导的步骤完成安装以及所需的任何附加组件。安装完成后，从“开始”菜单或\
  \ Windows 桌面打开 **Windows 迁移助手** 应用程序。按照提示操作，直到你看到 PC 的名称出现在 Mac 上，如图 11-38 所示。\n\
  \n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig38_HTML.jpg](img/492151_1_En_11_Fig38_HTML.jpg)\n\
  图 11-38 选择要从中迁移的 PC\n\n当要从中迁移的计算机出现时，**选择它**，然后点击 **继续**。切换回 Windows PC，确保 Mac 和\
  \ Windows PC 上的安全代码匹配。确认匹配后，点击 Windows PC 上的 **继续** 按钮。它将开始收集数据并与新的 Mac 通信。这可能需要几分钟时间。\n\
  \n当提示选择各种文件和用户帐户时，**选择相关信息**，如图 11-39 所示。选择要迁移的信息后，点击 **继续** 按钮。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig39_HTML.jpg](img/492151_1_En_11_Fig39_HTML.jpg)\n\
  图 11-39 选择要迁移的文件和设置\n\n系统将提示你在 Mac 上以管理员身份进行身份验证。出现提示时点击 **授权** 按钮，并输入本地管理员凭据。然后点击\
  \ **继续** 按钮继续。现在，它将开始通过网络将数据从旧 PC 传输到新 Mac，如图 11-40 所示。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig40_HTML.jpg](img/492151_1_En_11_Fig40_HTML.jpg)\n\
  图 11-40 通过网络传输数据\n\n\n\n### 将迁移后的数据归位\n\n如果使用迁移助理，默认情况下数据迁移后需要进行一些清理工作。完成后，您将能够使用新的本地用户账户登录，所有数据都将在新的主目录中可用。要完成迁移，我们需要对迁移用户的\
  \ `home` 目录使用 `显示简介` 设置，然后为此计算机上的 `所有人` 组对整个目录应用 `只读权限`。您可以在 `显示简介` 对话框的 `共享与权限`\
  \ 部分执行此操作，并从 `高级设置弹出菜单` 中选择 `应用到包含的项目`，如图 11-41 所示。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig41_HTML.jpg](img/492151_1_En_11_Fig41_HTML.jpg)\n\
  \n图 11-41\n使用显示简介 ➤ 共享与权限选项更改迁移文件夹的权限\n\n现在，我们可以以 Don President 身份登录，浏览旧用户文件夹并收集我们可能需要的任何数据，包括\
  \ `migrateduser/Library/Safari/` 目录中的文件，该目录包含我们旧的 Internet Explorer 收藏夹，如图 11-42\
  \ 所示。将该目录 `拖放` 到 `dpresident/Library/Safari` 文件夹中，以恢复对其的访问。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig42_HTML.jpg](img/492151_1_En_11_Fig42_HTML.jpg)\n\
  \n图 11-42\n从迁移的库文件夹中移动 Safari 数据\n\n复制完所有用户数据后，确认迁移的数据可供用户访问，如图 11-43 所示。接下来，我们可以打开\
  \ `用户与群组系统偏好设置`，并从 Mac 中删除迁移的用户账户。至此，迁移完成。\n\n![../images/492151_1_En_11_Chapter/492151_1_En_11_Fig43_HTML.jpg](img/492151_1_En_11_Fig43_HTML.jpg)\n\
  \n图 11-43\n确认迁移的 IE 收藏夹已在 Don 的 Safari 书签菜单中可用\n\n**专业提示**\n除非我有大量数据需要迁移，否则我倾向于使用\
  \ OneDrive 将用户数据从旧 PC 移动到新 PC 上。我会使用 IE 中的 `文件 ➤ 导出` 选项导出 Internet Explorer 收藏夹，然后将它们保存到单个目录中。之后，我可以将它们导入到新\
  \ Mac 的 Safari 中。此方法将用户数据备份在 Microsoft 云中，并且加快了恢复过程，因为我不必在两个主目录之间复制数据，也无需删除迁移助理创建的用户账户。\n\
  \n## 总结\n\n在本章中，我们学习了如何将 Apple 解决方案集成到由 Microsoft 解决方案构成的企业网络中。我们将一位高级用户从 Windows\
  \ PC 迁移到 `MacBook Pro`，同时让他们能够继续使用他们习惯的打印机、文件共享和应用程序，而不会损失任何生产力。运用本章中学到的相同工具和策略，您应该能够轻松地将\
  \ Mac、iPhone 或 iPad 集成到您现有的 Microsoft 环境中，只需付出最少的努力或进行广泛的基础设施变更。\n\n"
- '# 12. iOS 设备的大规模部署


  ## 引言


  到目前为止，我们一直在使用一两个测试设备，但现在我们将配置我们的配置文件管理器 MDM 以促进 iOS 设备的大规模部署。在本章中，我们将在几个实际场景中运用一些
  iOS 技能。第一个场景是标准的 BYOD 部署，我们将员工自有的设备配置到 MDM 中并提供基本管理。第二个场景是配置和部署十台公司所有的设备，这些设备将分配给远程销售团队，并需要使用空中
  OTA MDM 工具进行远程管理。


  ## 规划您的部署


  在开发最终将投入生产的技术解决方案之前，花时间进行逻辑上的部署规划总是一个好主意。在我们开始使用配置文件管理器之前，让我们花些时间回顾一下我们每个示例场景的需求、目标和支持需求。


  ### BYOD 场景


  任何技术部署的第一步都是确定新服务要实现的主要目标。在此场景中，主要目标是减少目前公司为员工采购和支持公司自有 iPhone 所花费的预算。提出的解决方案是采用自带设备（BYOD）模式，允许员工在个人
  iPhone 上处理公司工作。这将使员工能够选择他们喜欢的 iPhone 型号，他们不再需要携带两台设备，取而代之的是，他们每月将在实得工资中获得一小笔津贴，以帮助抵消个人设备的成本。


  下一步是需求收集阶段。您已经与组织中的各位领导会面，大家一致认为，与其继续向每位员工提供公司所有的 iPhone，未来的最佳策略是允许员工在公司网络上使用个人
  iPhone。您已经与高层领导讨论了各种安全要求、数据丢失预防策略和设备恢复场景。您得出结论，用户需要将他们的个人设备加入到您的 MDM 解决方案中，以确保设备符合这些要求。


  为了保护这些个人设备并确保符合公司信息安全标准，我们已确定任何 BYOD 设备必须实施以下控制措施：


  *   **最小密码锁**，每 90 天更换一次

  *   设备丢失时的**远程擦除能力**

  *   配置公司办公室 **Wi-Fi 访问**

  *   远程工作时配置 **VPN 服务**

  *   在本地备份时，**强制加密备份**以保护公司数据

  *   **在锁定屏幕上禁用通知**，以保护可能敏感的数据（例如，电子邮件预览）


  我们需要确保本章稍后介绍的 BYOD 配置档案提供所有这些功能。




  ## iPad 向远程销售团队的部署


  与 BYOD 场景类似，我们的第一步是确定技术项目的目标。此部署的目标也相当简单。公司有十名远程销售人员，每个人位于全国不同地区且经常在外奔波。销售与营销副总裁向
  IT 部门提出要求，为销售团队的每位成员配备一台 iPad，以便他们在旅途中保持联系。此事已获得预算批准并完成采购。iPad 已准备好为每位远程用户进行部署和配置。


  作为需求收集流程的一部分，销售副总裁向 IT 部门提出了几项要求。首先，他们希望设备的配置方式能确保销售团队必须使用经批准的工具和渠道与客户沟通。例如，他们希望团队使用
  `Salesforce CRM` 和 `Zoom`，以便跟踪和管理通信记录。


  销售副总裁担心，如果销售团队可以使用 `FaceTime`、`信息` 等应用，可能会导致客户联系和沟通偏离公司标准。基于同样的考虑，副总裁还要求只允许在 iPad
  上安装经批准的应用程序，并且应锁定 `App Store`。最后，重要的是设备能够被远程管理，并且在必要时，如果设备出现任何软件问题，可以远程擦除和重建。这些销售人员经常出差，设备不能长时间离手，并且他们并不总是在
  `Apple 零售店` 附近。


  为了实现这些限制并提供无线配置/重新配置，我们需要确保在 `描述文件管理器` 中为这些设备设置以下选项：


  *   最短 90 天更改一次的密码锁

  *   设备丢失时的远程擦除功能

  *   配置公司办公室 Wi-Fi 接入

  *   远程工作时配置 VPN 服务

  *   在 `设置助理` 期间启用通过 `DEP` 进行 MDM 注册

  *   禁用使用 `信息` 和 `FaceTime` 的功能

  *   禁用 `App Store`

  *   预安装 `Zoom` 和 `Salesforce`


  我们稍后需要在本章中确保我们的销售团队 iPad 配置描述文件提供所有这些功能。


  ## 预期的支持需求


  至此，我们已为这两项部署制定了目标和技术策略。虽然难以预测所有可能的支持需求，但我们可以预见一些情况并制定相应计划。对于 BYOD 场景，最常见的支持需求将是
  MDM 注册过程。我们将创建并向最终用户分发一封公司范围内的电子邮件，引导他们完成设备注册流程，包括一个允许他们请求 BYOD 服务的网络表单以及分步注册指南。


  对于销售团队 iPad 场景，我们将培训服务台人员，引导销售团队完成 `设置助理` 并提供一些基本的软件故障排除，包括在需要时对设备进行完全重置。因为我们使用的是无线配置，只要对设备执行完全重置，它将自动配置正确的设置、安装所需的应用程序并应用任何设备限制。至此，我们已经准备好开始在
  `描述文件管理器` 内进行技术工作。


  ## 为 BYOD 场景配置描述文件管理器


  我们需要做一系列准备工作来使 `描述文件管理器` 适应 BYOD 部署。我们要做的第一件事是创建一个设备群组。打开 `描述文件管理器`，点击左侧边栏上的 `设备群组`
  按钮，如图 12-1 所示。


  ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig1_HTML.jpg](img/492151_1_En_12_Fig1_HTML.jpg)


  图 12-1

  查看描述文件管理器中的设备群组


  继续点击 `添加设备群组` 按钮，或点击设备群组窗格下方的 `+` 按钮。`双击` 名称并将其重命名为 `MyCompany BYOD`，如图 12-2 所示。点击
  `存储` 以应用名称更改。


  ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig2_HTML.jpg](img/492151_1_En_12_Fig2_HTML.jpg)


  图 12-2

  创建新的设备群组


  接下来，我们需要为 `MyCompany BYOD` 群组中的设备定义设置。过去，我们为每个单独的设备修改设置。在大规模操作中，这将非常耗时且容易出错，因此我们将在群组级别定义所有设置，然后每次将新的
  iPhone 注册到 MDM 时，只需将设备分配到我们的群组。点击 `设置` 选项卡，然后点击 *MyCompany BYOD 的设置* 标题下的 `编辑` 按钮，如图
  12-3 所示。


  ![../images/492151_1_En_12_Chapter/492151_1_En_12_Fig3_HTML.jpg](img/492151_1_En_12_Fig3_HTML.jpg)


  图 12-3

  编辑新设备群组的配置描述文件


