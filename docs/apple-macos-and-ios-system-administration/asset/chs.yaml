  *   **状态栏：** `iOS` 设备顶部的区域，包含时钟和网络指示器。

  *   **通知标记：** 标记是一个带有数字的红色圆圈，表示该应用程序需要关注。

  *   **应用图标：** 点击应用图标将启动该应用程序或将其从后台模式唤醒。

  *   **页面控制指示器：** 当您从一个屏幕滑动到另一个屏幕时，这指示您所在的导航页面。如果您有多个图标页面，滑动屏幕将导航到下一页。

  *   **应用快捷方式：** 您最常用的应用程序可以放在这里以便快速访问。

  *   **小组件：** 无需打开整个应用程序即可提供应用程序信息的小工具，例如，头条新闻。在 `iPadOS` 中，这可以固定到主屏幕上，如图 1-11 所示。

  *   **主屏幕菜单栏（仅限 iPhone）：** iPhone 上应用快捷方式的位置。

  *   **程序坞（仅限 `iPadOS`）：** 应用快捷方式以及最近使用的应用程序和文件的位置；它在 `iPad` 上提供了更接近 `macOS` 的外观和感觉。

  *   **最近使用的应用程序（仅限 `iPadOS`）：** 与 `macOS` 类似，`iPad` 现在可以在程序坞中显示最近使用的应用程序。


  ## 总结


  在过去的几十年里，苹果公司的平台持续变化和演进。硬件架构、操作系统软件和设备外形规格的重大变化挑战了我们对于计算机应当是什么样子的认知。本书主要关注较新的 `macOS`
  和 `iOS`，包括 `macOS Catalina`、`iOS 13` 和 `iPadOS`。


  对于其他系统的用户来说，浏览这些操作系统可能既熟悉又令人望而生畏。如果您是苹果平台的新手，我建议在进入下一章之前花一些时间探索 `iOS` 和 `macOS`，以便从最终用户的角度获得如何与这些平台交互的工作知识。


  '
- '# 2. macOS 客户端管理


  在本章中，我们将探讨单台 Mac 的管理。主题将包括管理本地用户账户、探索 `macOS` 的文件结构、学习命令行界面以及执行一些基本的硬件故障排除。


  ## Mac 硬件故障排除


  与大多数 PC 硬件制造商不同，苹果公司对于允许谁修理其硬件一直相当严格。除了通过自己的 Apple 零售店提供硬件维修服务外，他们还为希望进行维修的第三方公司制定了全面的授权维修中心流程。话虽如此，大多数技术人员在不使保修失效的情况下，自己能安全进行的硬件维修是有限的。作为一名
  Mac 技术员，在预约 `Genius Bar` 并带着 Mac 前往当地 Apple 零售店之前，了解一些基本的硬件故障排除技巧非常重要。


  ### 非易失性随机存取存储器


  `非易失性随机存取存储器`，或有时被长期 Mac 用户称为 `参数 RAM`，基本上是逻辑板上一小部分内存，用于存储计算机关机时不会擦除的信息。它存储音量级别、时区、显示器分辨率和启动磁盘的设置。虽然这种情况不常发生，但有时该内存可能会损坏；通过使用图
  2-1 中找到的键盘组合键*清除它*，可以将这些设置重置为出厂默认值。这通常是故障排除一台行为异常的 Mac 的第一步。它通常可以解决与时区相关的问题、开机后需要很长时间才显示苹果标志的慢启动问题，或与音频或内置扬声器相关的问题。


  专业提示


  如果您正在使用 `可扩展固件接口密码`，如第 3 章所述，需要注意的是，在您移除该密码之前，您将无法清除 `NVRAM`。清除 `NVRAM` 完成后，别忘了重新启用您的密码。




  ### 系统管理控制器 (SMC)


  `系统管理控制器` (SMC) 是 Macintosh Intel 硬件架构的一个组件。这是 Mac 硬件独有的，除了强制执行 `macOS` 最终用户许可协议（这是您无法轻易在非苹果公司生产的基于
  Intel 的个人电脑上运行 `macOS` 的原因之一），它还是一个管理众多集成硬件组件的“万能”部件。苹果在其支持网站上发布了一份详尽的列表，但总的来说，SMC
  在不同程度上参与了从开启/关闭风扇到逻辑板上 LED 灯的功能、声音、蓝牙、睡眠/唤醒等多种事项。


  在排查 Mac 硬件问题的过程中，您可能需要重置 SMC。苹果建议除非您已用尽所有其他选项（包括标准重启和清除 `NVRAM`），否则请等待后再进行此操作。重置
  SMC 最常见的一些原因包括：即使在处理器负载较轻时 Mac 的风扇也持续运转，或者您的 MacBook 电池无法充电。它并不能解决所有问题，但在将 Mac 送到维修中心进行可能昂贵的诊断之前，这绝对值得一试。


  一般来说，重置 Mac 上 SMC 的过程取决于您拥有的具体型号。台式机与笔记本电脑、以及带可拆卸电池的笔记本电脑与不带可拆卸电池的笔记本电脑，其重置步骤各不相同。最近，随着
  `Apple T2 安全芯片` 的出现，重置配备了该协处理器的 Mac 的 SMC 又有另一种不同的方法。建议您参考苹果的支持页面，获取有关如何重置您正在排查的特定
  Mac 的 SMC 的说明。


  苹果关于 SMC 的知识库文章可以在这里找到：

  *   [`https://support.apple.com/en-us/HT201295`](https://support.apple.com/en-us/HT201295)


  ### 启动前键盘组合键


  在排查 Mac 故障时，您应该熟悉许多键盘组合键。图 2-1 展示了各种启动前键盘快捷键，其中许多可用于选择除内置硬盘之外的其他启动磁盘。您可以启动进入 `安全模式`、在启动时启用详细日志记录、进入
  `恢复模式`，甚至可以使用 `目标磁盘模式` 将您的 Mac 变成一块巨大的外部 Thunderbolt 硬盘。


  专业提示

  `目标磁盘模式` 可以是排查无法从内置硬盘启动的 Mac 问题的有效方法。通过使用目标磁盘模式，您可以尝试将内部驱动器挂载到另一台 Mac 上，使其看起来像通过
  Thunderbolt 或 Firewire 连接的外部硬盘驱动器。如果驱动器拒绝挂载，这可能表明存在硬件故障。如果驱动器确实挂载了，但 Mac 仍无法从其启动，您或许可以在擦除驱动器并安装全新的
  macOS 副本之前，检索数据或创建驱动器的备份。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig1_HTML.jpg](img/492151_1_En_2_Fig1_HTML.jpg)

  *图 2-1：用于启动前选项的键盘组合键*


  ## macOS 恢复


  在 `macOS` 的标准安装中，苹果提供了一个隐藏分区，其中包含操作系统的有限副本和一些应用程序，如 `磁盘工具`、`终端` 和 `macOS 安装器` 包。这个区域实际上被称为
  `macOS 恢复`，正如您所猜测的那样，它在操作系统出现问题时用于尝试恢复您的 Mac。


  如果由于某种原因，您的 Mac 没有本地恢复分区，您也可以利用 `互联网恢复` 服务。互联网恢复是苹果托管的基于云的可启动网络卷。从互联网恢复启动需要有效的互联网连接，并且启动时间可能较长，具体取决于您的连接速度。


  一旦您启动进入恢复模式，可以执行以下几项操作：

  *   从时间机器备份恢复。

  *   重新安装或全新安装 `macOS`。

  *   通过 Safari 浏览苹果支持网站（如果您有活动的互联网连接）。

  *   使用磁盘工具执行磁盘急救或其他与驱动器相关的任务。

  *   访问终端。

  *   管理硬件安全设置（第 3 章将详细介绍）。


  ### 磁盘工具


  虽然其中大多数选项不言自明，但 `磁盘工具` 包含许多在 `macOS 恢复` 模式下特别有用的工具。因为我们是从恢复分区启动，而不是从包含完整 macOS 系统文件夹的分区（通常称为
  `启动磁盘`）启动，所以我们可以对启动卷运行实用程序和命令。虽然当您从 Mac 的启动磁盘启动后，可以在 `/Applications/Utilities` 内的磁盘工具应用程序中访问许多相同的选项，但您可能在系统当前运行的同一卷上执行它们时遇到问题。这使得
  `macOS 恢复`，特别是互联网恢复，成为直接处理 Mac 内置硬盘的最佳选择。图 2-2 显示了磁盘工具的默认视图，并标出了一些重要选项。


  专业提示

  在 `macOS 恢复` 模式下使用磁盘工具时要小心。很容易意外删除您的启动分区甚至整个内置硬盘。在对 Mac 上的磁盘工具进行操作之前，请确保已备份所有重要数据。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig2_HTML.jpg](img/492151_1_En_2_Fig2_HTML.jpg)

  *图 2-2：磁盘工具界面*


  *   **容器面板：** 卷、驱动器、分区、容器和已挂载磁盘的列表。

  *   **新建卷：** 在选定的磁盘上添加或删除卷。

  *   **磁盘急救：** 打开 `磁盘急救` 子实用程序以检查和修复或优化硬盘，类似于 Windows 中的磁盘碎片整理。

  *   **修改分区映射：** 允许您在特定磁盘上添加或删除分区。

  *   **抹掉驱动器/卷/分区：** 擦除选定的容器、驱动器、分区或卷。

  *   **容量：** 显示所选驱动器的总容量以及包含的卷数。

  *   **磁盘使用情况：** 驱动器的构成，包括分区或卷以及每个分区或卷使用的空间量。

  *   **格式：** 驱动器的文件系统格式，例如 `Apple 文件系统` (APFS) 或 `分层文件系统增强版` (HFS+)。

  *   **Unix 卷描述符：** Unix 中的卷描述符。用于在运行 `bash` 或 `zsh` 脚本时引用驱动器位置。


  专业提示

  随着苹果继续在 `macOS` 图形用户界面中抽象化各种可移动磁盘，您可能不会看到已挂载的卷出现在桌面上或访达的收藏夹窗格中。要通过图形用户界面找到已挂载的驱动器，最快的方法是使用
  `前往` 菜单并选择 `电脑`。这将显示所有已挂载的卷，包括硬盘、映射的网络驱动器以及任何其他可用的已连接存储。




  ### 时光机器备份


  作为系统管理员，您应该部署某种备份机制，以便在发生灾难性系统故障时存储关键数据的副本。时光机器是在安全数据中心备份个人 Mac 或 Mac 服务器的一种简单而有效的方式。在办公室或教室环境中，这可能不是最佳解决方案，因为外置驱动器很容易丢失。虽然时光机器驱动器可以加密，但从成本角度考虑，为每个用户配备外置驱动器可能并不可行。在这些情况下，请考虑使用基于云的文件备份解决方案，例如
  iCloud Drive 或 Microsoft OneDrive for Business。


  > **专业提示**

  > 如果您使用时光机器备份 Mac，并且其格式为 HFS+，请不要让 macOS 将其转换为 APFS，因为在此过程中可能会损坏现有的备份数据。如果您计划更换为
  APFS 格式的磁盘并归档 HFS+ 格式的驱动器，最好从一个新格式化的驱动器开始。


  ## 文件系统与 macOS


  每个操作系统都有其偏好的文件系统。如果您有 Microsoft Windows 系统管理背景，您一定听说过 NTFS 或 FAT32，但您可能只知道苹果使用的文件系统称为
  Mac 格式或苹果格式。实际上，Mac 有几种常见的文件系统。分层文件系统（HFS）及其较新的版本 HFS+（对旧 HFS 格式的增强）现在已是苹果的旧文件系统。相对较新的苹果文件系统（APFS）随
  macOS High Sierra 发布，具有一系列现代功能和增强的安全性。除了 macOS，APFS 也是 iPhone 和 iPad 等 iOS 设备的文件系统。


  ### 分层文件系统增强版（HFS+）


  Mac 的传统文件系统源于 Mac OS Classic，在操作系统的较新版本中被称为 Mac OS 扩展。它缺乏许多现代功能，如 ZFS、NTFS 和 APFS
  中存在的校验和、快照以及多进程同时访问。您仍然可以将驱动器格式化为 HFS+，但 APFS 现在被认为是 macOS 的标准，特别是对于配置为启动卷的固态硬盘（SSD）。


  ### 苹果文件系统（APFS）


  APFS 是 macOS 和 iOS 文件系统的现代标准。它提供了许多现代功能，包括空间共享容器、快照、更强的加密以及比 HFS+ 更快的性能。容器概念对 macOS
  来说是新的，在 APFS 中大量使用。容器包含一个或多个单独的卷，这些卷显示为独立的分区，但共享相同的空间，并能根据需求动态增长或缩小。这意味着，当特定卷需要更多空间时，数据可以被分配给该卷，而无需用户交互或知晓。


  这种空间分配方案在新的 macOS Catalina 中特别有用，因为系统文件与用户数据位于不同的只读卷上。如果您通过“磁盘工具”查看安装了 macOS Catalina
  的驱动器，如图 2-3 所示，您会看到两个不同的卷。Macintosh HD 在一个卷上提供基础操作系统和应用程序，而 Macintosh HD – Data
  存储用户目录和用户安装的应用程序。这些都在一个单独的容器中（显示为 Macintosh HD），并且卷会根据需要增长。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig3_HTML.jpg](img/492151_1_En_2_Fig3_HTML.jpg)


  **图 2-3** 由多个卷组成的容器构成了 Catalina 的启动磁盘


  ### 分区方案与驱动器安全选项


  在 macOS 中选择格式化驱动器时，您会注意到有很多选项，包括*区分大小写、加密、日志式*等的各种组合。苹果提供了一篇知识库文章来定义这些选项。


  知识库文章可以在此处找到：

  * [`https://support.apple.com/guide/disk-utility/file-system-formats-available-in-disk-utility-dsku19ed921c/mac`](https://support.apple.com/guide/disk-utility/file-system-formats-available-in-disk-utility-dsku19ed921c/mac)


  除了各种格式化选项外，您可能还会被提示选择驱动器分区方案。有三种选项：

  *   **GUID：** 这是基于 Intel 的 macOS 启动卷的标准分区方案选项。

  *   **Apple 分区方案：** 现在很少使用，它是 Mac OS Classic 和早期在 PowerPC 架构上运行的 Mac OS X 版本的旧分区方案。

  *   **主引导记录：** 这是 Windows 的分区方案，用于 FAT 和 ExFAT 格式。


  最后，当您抹掉卷并选择格式时，可能也注意到了“安全选项...”按钮。这些安全选项让您可以选择磁盘上数据被抹除的彻底程度。一些组织要求对所有要停用的磁盘进行完全安全的清理。默认情况下，macOS
  使用最不安全（但最快）的单次抹除选项。如果您需要更安全的东西，例如符合国防部 5220.22-M 协议的要求，您可以通过将安全抹除滑块一直移动到最右侧来选择该选项。


  ### APFS 快照


  我们将在下一节更详细地讨论 APFS，但值得一提的是，在系统恢复方面，苹果新文件系统的功能之一就是能够对计算机状态进行文件级快照。如果驱动器格式化为 APFS，当要安装主要的
  macOS 更新时，会创建一个 APFS 快照并保存为一个恢复点。通常，操作系统会决定何时适合进行快照，并且这个过程是自动的，因此不需要用户干预。


  有时您可能希望强制创建快照。苹果确实通过终端中的命令行工具提供了这种功能。我们将在本章后面更详细地介绍终端，但在这里，只需通过“访达”浏览到 `/应用程序/实用工具`
  并启动“终端”应用程序。您将看到一个命令提示符。要创建快照，我们将使用 `tmutil` 命令。在终端的命令提示符下输入以下命令并按回车键以创建快照：


  ```

  tmutil snapshot

  ```


  如果一切顺利，终端会显示一条消息，告知您已创建了一个带有今天日期/时间戳的快照。如果您好奇是否存在任何快照，也可以使用 `tmutil` 命令列出所有可用的快照。快照存储在文件系统级别，仅在操作系统需要时（例如，使用时光机器时）才被挂载。输入以下命令并按回车键：


  ```

  tmutil listlocalsnapshots /

  ```


  如果您需要从快照恢复 Mac，只需启动进入 macOS 恢复，然后选择“从时光机器备份恢复”选项。选择存储快照的驱动器（很可能是您的内置启动磁盘）。您将看到一个可用快照列表（如果存在）。只需选择您想要恢复的快照，然后点击“继续”。恢复过程完成后，您的
  Mac 将重新启动，并应恢复到选定快照时的状态。


  > **专业提示**

  > APFS 快照更多是恢复工具，而非备份工具。我建议将快照用作在重大更改前恢复到某个时间点的一种方式，并继续将整个磁盘备份到另一个驱动器或云端。快照在创建 24
  小时后会被删除，因此它们不是可靠的长期备份方法。




  ## 安装与升级 macOS


  从当前 macOS 版本升级至下一个版本，通常的做法是使用 Mac App Store 或“系统偏好设置”中的“软件更新”来下载并安装下一个主要版本。如果你的
  Mac 状态良好，只是需要最新的操作系统，这种方法很方便。但如果需要在新格式化的驱动器上全新安装 macOS，我们就得多做一些准备工作。


  ### 从互联网恢复安装


  如果具备网络连接，一个常见的选择是通过“互联网恢复”选项启动至 macOS 恢复模式。在此模式下，你可以抹掉并格式化内置硬盘，然后通过互联网从 Apple 安装全新的
  macOS。这种方法虽然有效，但可能耗时较长，并且在校园或大型企业中，如果大量 Mac 共享一个网络连接，则可能不可行。


  ### 创建可引导的 USB 安装盘


  如果你没有可用的网络连接，或者需要为大量 Mac 抹掉内置驱动器并全新安装 macOS，你将需要创建一个或多个可引导的 USB 安装盘。为此，你需要一个至少 8
  GB 空间的 USB 闪存盘、一份 macOS 安装器应用程序，并能访问“终端”应用。


  第一步是从 Mac App Store 或通过“软件偏好设置”中的“软件更新”下载 macOS 安装器。下载完成后，安装器通常会自行启动并提示你开始安装。此时，取消安装器并退出安装应用程序。使用“访达”浏览到
  `/应用程序` 文件夹，确认 `安装 macOS Catalina` 应用程序存在。


  如果还未插入 USB 闪存盘，请现在插入并打开“磁盘工具”。将驱动器格式化为 APFS 格式并为其命名。记下这个名称。在我使用的脚本中，磁盘名称为 `Untitled`。接着，浏览到
  `/应用程序/实用工具`，然后打开“终端”应用。在提示符处输入以下命令：


  ```

  sudo /Applications/Install\ macOS\ Catalina.app/Contents/Resources/createinstallmedia
  --volume /Volumes/Untitled --nointeraction

  ```


  如果脚本输入正确，它会提示你输入管理员密码。假设你拥有本地管理员权限，此密码与你登录 Mac 时使用的密码相同。它可能还会要求授予“终端”应用访问已连接的 USB
  磁盘的权限，如果是这样，你可以允许此操作。验证通过后，你将在终端中看到输出信息，显示其正在格式化并创建可引导 USB 磁盘，如图 2-4 所示。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig4_HTML.jpg](img/492151_1_En_2_Fig4_HTML.jpg)


  **图 2-4**


  使用“终端”创建可引导 USB 磁盘


  **专业提示**


  此示例中的脚本假设你使用的是 macOS Catalina。如果你使用的是其他版本，只需替换安装器应用程序的名称即可。例如，将 `macOS Catalina`
  替换为 `macOS High Sierra`，脚本仍然有效。该脚本只是引用我们在 `/应用程序` 路径中指定的安装器应用程序。


  ### 创建可引导的技术员硬盘


  可引导 USB 安装器很有用，但它的局限性同样明显，就像使用 macOS 恢复模式一样，你只能使用有限的实用工具和“终端”应用。如果能拥有一个完整的 Mac 界面，包括桌面、众多应用程序和访达访问权限，那不是更好吗？是的！每位优秀的
  Mac 技术人员都应拥有一个包含完整 macOS 副本的可引导外置硬盘，用于故障排除。我推荐使用新型的外置固态硬盘，因为它们更便于携带，且在放入笔记本电脑包中被晃动时更不易磨损。


  这类硬盘的目的是将你所有的 macOS 故障排除工具集中在一处。我通常会在我的硬盘上保存各种软件安装器的副本、磁盘急救工具以及此类文件。这对于诊断涉及内置启动宗卷的问题、在没有近期备份的情况下恢复用户数据，或者在不依赖命令行界面的情况下对启动宗卷进行任何其他修改，都极其有帮助。


  **专业提示**


  从这类外置驱动器启动 Mac 时，特别是由于技术问题无法登录时，请在启动时使用 `option` 键组合，这样你就可以选择该驱动器作为启动盘，而无需启动到操作系统并通过“系统偏好设置”进行设置。


  创建这类硬盘非常简单明了。只需将其连接到 Mac，使用 GUID 分区图将其格式化为 APFS 宗卷，然后从 `/应用程序` 文件夹运行 macOS 安装器，但在安装界面步骤中指定外置驱动器。请注意，你可能需要点击“显示所有磁盘”按钮才能看到外置驱动器。一旦
  macOS 安装到该驱动器上，你只需按步骤完成“设置助理”并创建本地用户帐户，就像在内部磁盘上安装一样。


  **专业提示**


  作为安装过程的一部分，你的 Mac 很可能会将外置驱动器设置为新的首选启动宗卷。请务必使用“启动磁盘”系统偏好设置将其改回内置驱动器，否则可能导致 Mac 在启动时寻找外置驱动器，从而在从内部启动磁盘启动前产生不必要的延迟。





  ## 终端简介


  您选择 Mac 是因为它*易于使用*，而且不像 `Windows` 或 `Linux` 那样需要那些命令行界面，对吧？那为什么我们在这本书的第二章就开始讨论命令行界面了呢？！答案很简单——因为您会遇到这样的情况：强大的实用程序*只能*通过终端使用，就像我们刚才为了创建可启动的
  USB 安装盘而必须使用的命令所证明的那样。除此之外，使用脚本可以成为一种有效的工具，通过像 Apple Remote Desktop 这样的工具，一次性自动化处理多台
  Mac 客户端的各种日常任务。本节将介绍许多您在使用终端或编写自己的脚本时会经常用到的常用命令和概念。


  ### 使用命令行界面导航


  当您打开终端时，会看到类似以下内容：


  ```

  dwsmith@dwsmiths-MBP ~ %

  ```


  这是命令提示符，它显示您当前以哪个用户身份登录以及您在计算机上的当前位置。`~`符号代表相对于我的主目录的绝对路径。在我的例子中，它是我在 MacBook Pro
  上用户帐户的主目录。从技术上讲，如果我在 `访达` 中浏览到相同位置，我们就在 `/Users/dwsmith` 目录下。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig5_HTML.jpg](img/492151_1_En_2_Fig5_HTML.jpg)


  **图 2-5：** 通过终端和访达查看同一目录


  我可能想看看这个目录下还有什么其他内容，如果想这样做，我会使用 `ls` 命令。继续在命令提示符后输入：


  ```

  ls

  ```


  当我输入 `ls` 时，会得到如图 2-6 所示的输出。如您所见，这些是我的主目录的子文件夹。如果您熟悉 DOS/Windows，这类似于 `dir` 命令。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig6_HTML.jpg](img/492151_1_En_2_Fig6_HTML.jpg)


  **图 2-6：** `ls` 命令的输出以及访达中我的主目录内容


  既然我知道了此位置下的其他文件和文件夹，我想更改目录以便进一步探索。假设我想进入桌面文件夹，它是我 `/Users/dwsmith` 目录下的一个文件夹。我可以使用
  `cd` 命令并指定我想移动到的文件夹，如图 2-7 所示。在提示符后输入以下命令：


  ```

  cd Desktop

  ```


  您会看到命令提示符已经改变，指定我们现在位于主目录的 `Desktop` 文件夹中。看到我的用户账户信息后面列出的是 `Desktop` 而不是波浪号了吗？


  ```

  dwsmith@dwsmiths-MBP Desktop %

  ```


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig7_HTML.jpg](img/492151_1_En_2_Fig7_HTML.jpg)


  **图 2-7：** 我在 `/Users/dwsmith` 目录的 Desktop 文件夹中


  让我们尝试一些更有趣的事情。让我们在桌面上创建一个文件夹。我们使用 `mkdir` 命令来完成这个操作，它是*make directory*的缩写。我们通过在此命令后指定目录名称作为*参数*来使用这个命令。在命令行输入：


  ```

  mkdir MyFolder

  ```


  您应该会在桌面上看到一个名为 `MyFolder` 的新文件夹，如图 2-8 所示。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig8_HTML.jpg](img/492151_1_En_2_Fig8_HTML.jpg)


  **图 2-8：** 桌面上创建了一个名为 `MyFolder` 的文件夹


  注意到文件夹名称中没有空格了吗？让我们创建一个新文件夹，但这次在中间加一个空格。在命令行中，我们不能只是在文件名中直接打一个空格而不*明确*表示。这意味着我们要么使用双引号写成
  `"My Folder"`，要么使用 `\` 和一个空格的组合来创建一个空格。


  让我们通过再创建两个文件夹来试试这个方法。


  要创建第一个文件夹，我们将使用引号。使用相同的 `mkdir` 命令并将文件夹命名为*重要资料*，像这样：


  ```

  mkdir "Important Stuff"

  ```


  接下来，使用 `mkdir` 命令并使用*反斜杠空格*方法创建一个名为*更多资料*的文件夹，像这样：


  ```

  mkdir More\ Stuff

  ```


  您的屏幕应该看起来像图 2-9 中的那样。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig9_HTML.jpg](img/492151_1_En_2_Fig9_HTML.jpg)


  **图 2-9：** 终端命令及其产生的文件夹


  ### 命令手册


  在继续之前，让我们通过删除先前练习中创建的所有这些虚假文件夹来清理桌面。`rm` 命令是*remove*的缩写。让我们用它来指定要删除的文件夹。继续像这样输入这个命令：


  ```

  rm "More Stuff"

  ```


  发生了什么？您可能以为这会删除文件夹，但我们却收到一条神秘信息：`rm: More Stuff: is a directory`。显然，我们做错了什么。我们如何找出错误所在或正确做法呢？


  ***我们当然要阅读那该死的手册！***


  这是一个向您介绍 `man` 页面的好机会。大多数命令都有一个*手册*，您可以在终端中通过输入 `man` 后跟命令名来查看。让我们打开 `rm` 命令的 `man`
  页面。输入以下命令：


  ```

  man rm

  ```


  您可以在图 2-10 中看到，如果我们想删除一个目录，必须在目录名前指定参数 `-d`。我们将再试一次，但首先按键盘上的 `q` 键退出 `man` 页面并返回到命令提示符。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig10_HTML.jpg](img/492151_1_En_2_Fig10_HTML.jpg)


  **图 2-10：** `man` 页面显示了我们需要了解的命令选项


  现在让我们尝试输入：


  ```

  rm -d "More Stuff"

  ```


  成功！这将删除文件夹，如图 2-11 所示。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig11_HTML.jpg](img/492151_1_En_2_Fig11_HTML.jpg)


  **图 2-11：** 使用终端命令移除目录


  继续使用相同的方法删除另外两个文件夹，完成后，您的桌面应该又恢复整洁了。


  既然您已经掌握了 `man` 页面的力量，您将在命令行上势不可挡！


  ### 提升权限


  如果您之前接触过终端，可能已经输入过一两条以 `sudo` 开头的命令。这是一个特殊的命令，用于调用*提升权限*。即使您在 Mac 上属于 `admin` 组，您仍然不是系统上权限最高的用户。那个权力属于
  `root` 用户或 `super` 用户。


  有些命令只能以超级用户身份运行；在这种情况下，我们需要使用 `sudo` 命令，它是*super user do*的缩写。当您使用以 `sudo` 开头的命令时，系统会提示您输入密码，然后命令才会运行。如果您是
  Mac 上的本地管理员，该密码将与您本地用户帐户使用的密码相同。例如，就我而言，我的 `dwsmith` 帐户密码与超级用户的密码相同。




  ### Shells


  您可以在终端应用中使用多种不同类型的 Unix 外壳，包括 `zsh`、`bash`、`tcsh` 等。在 `macOS Catalina` 之前，Mac 的默认登录外壳是
  `bash`。然而，从 `Catalina` 开始，Apple 已将 `zsh` 提升为默认登录外壳。您仍然可以通过 `用户与群组系统偏好设置` 中的 **高级选项**
  页面将其更改为 bash，我们将在本章后面探讨这一点。


  ### 常用命令


  在各种外壳脚本中可以使用许多常用命令。图 2-12 中的图表展示了一些您应该熟悉的命令。查看每个命令的说明，使用每个命令的 man 页面，并尝试使用一些测试文件和文件夹来掌握每个命令的用法。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig12_HTML.jpg](img/492151_1_En_2_Fig12_HTML.jpg)


  图 2-12

  一些需要熟悉的常用命令


  ### 启动磁盘


  如图 2-14 所示，`启动磁盘系统偏好设置` 相对简单明了。它会扫描所有可用的已连接媒体，包括支持 `NetBoot` 的系统上的网络媒体，并返回任何包含有效系统文件夹的卷。只需选择您希望启动的卷并重新启动即可。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig14_HTML.jpg](img/492151_1_En_2_Fig14_HTML.jpg)


  图 2-14

  启动磁盘系统偏好设置面板


  此信息将保存到 `NVRAM` 中，因此如果媒体在未来某个时间断开连接，您的 Mac 可能无法启动。它要么会显示一个带问号的闪烁文件夹 `[?]`，表示系统无法从所选卷启动，因为它找不到系统文件夹；要么启动时间会很长，因为它会扫描寻找其他具有有效系统文件夹的可用卷。


  **专业提示**

  如果您尝试将加密卷设置为启动磁盘，必须在 `启动磁盘系统偏好设置` 能够识别磁盘上是否存在有效的可启动系统之前，使用磁盘密码解锁驱动器。


  ### 共享


  `共享系统偏好设置` 将在介绍 `macOS Server` 的第 7 章中更详细地探讨。因为 `macOS Server` 是在 `macOS` 之上运行的应用程序，所以
  `共享系统偏好设置` 中的许多服务适用于用作服务器的 Mac。有一个关键项目需要介绍，因为它特指与 `macOS` 客户端相关的内容，那就是 `电脑名称`。图
  2-15 显示了您可以命名 Mac 以及它向网络上其他计算机广播何种名称的区域，这个广播的名称也称为 `主机名`。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig15_HTML.jpg](img/492151_1_En_2_Fig15_HTML.jpg)


  图 2-15

  设置友好名称作为电脑名称的位置


  您可以将 `电脑名称` 视为一个更友好的名称，允许使用空格和特殊字符。而 `主机名`，因为它会在网络上广播，不能包含特殊字符和空格。图 2-16 显示了主机名，您可以看到它是如何将我的
  Mac 名称稍微修改了一下，用连字符代替空格并去除了特殊字符。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig16_HTML.jpg](img/492151_1_En_2_Fig16_HTML.jpg)


  图 2-16

  比较 GUI 和命令行中的主机名


  关于电脑名称，我们还有另一个潜在问题。仔细看图 2-16 中的终端窗口。您看到命令提示符处的 Unix 主机名是 `dwsmith-MBP` 了吗？为什么我有两个不同的主机名？因为
  macOS 有 *三种* 不同的计算机名称——`电脑名称`、`本地主机名` 和 `Unix 主机名`。作为一个最佳实践，我建议将 Unix 主机名和本地主机名设置为一致。在某些情况下这可能不是什么大问题，但以后在远程系统上运行脚本时，这绝对可以为您避免一些潜在问题。我见过一些“恐怖故事”案例，网络上的每台
  Mac 的电脑名称都*不同*，而它们的 Unix 主机名却都*相同*。


  幸运的是，更改 Unix 主机名非常简单。使用如图 2-16 所示的 `scutil` 命令，您可以将电脑名称更改为与本地主机名匹配。输入以下命令，用您选择的主机名替换
  `dwsmith-MacBook-Pro`，并使用 `sudo` 命令进行身份验证：


  ```

  sudo scutil --set HostName dwsmiths-MacBook-Pro

  ```


  现在，您的 Mac 的三个名称将趋于一致，这应该能简化在网络中识别它的任务。


  ### 用户与群组


  接下来，我们将快速浏览一下 `用户与群组系统偏好设置`。我们将在下一节逐步介绍创建 `本地用户帐户` 的过程，但这个系统偏好设置除了简单地管理用户帐户外，还有一些其他功能。图
  2-17 是用户与群组的主面板。点击 `登录选项` 按钮将显示一系列其他选项，如图 2-18 所示。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig17_HTML.jpg](img/492151_1_En_2_Fig17_HTML.jpg)


  图 2-17

  用户与群组面板中的登录选项按钮


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig18_HTML.jpg](img/492151_1_En_2_Fig18_HTML.jpg)


  图 2-18

  登录选项面板


  `登录窗口` 实际上是其*自身的一种应用程序*，这里就是配置它的地方。您可以打开/关闭 `自动登录` 并选择自动登录的用户。如果您选择使用登录窗口而不是自动登录，您可以显示
  `所有用户列表` 或 `名称和密码字段`。您还可以显示或隐藏 `电源控制` 按钮，如果您正在管理服务器并希望用户在关机或重启计算机之前进行身份验证，这可能很重要。


  如果您想允许多个用户在同一台 Mac 上登录，然后在他们之间切换而无需先让一个用户退出，`快速用户切换` 可能是一个有用的解决方案。这允许管理员登录修复某些东西，然后将系统交还给用户而不会中断他们的工作。在服务行业，如打印店，多个用户共享同一台计算机并实时交替使用，这也非常有用。


  `辅助功能选项` `...` 按钮包含其他功能，例如 `旁白`，用于在登录窗口为视障用户进行屏幕朗读。显然，所有这些自定义设置都将由您组织的用户群、安全需求和其他考虑因素决定。这里的最后一个选项，`网络账户服务器`，是您如何*将*
  Mac *绑定*到域服务的方法。这将在本书后面，特别是在第 7 章和第 11 章中介绍。




  ## 网络


  `Network System Preference` 是您 Mac 上与网络相关的信息和配置的一站式商店。如图 2-19 所示，除了显示您的 IP 地址和活动连接外，您还可以通过此窗格开启/关闭
  Wi-Fi，加入无线网络，或按 `+`/`-` 按钮编辑可用的网络适配器和服务。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig19_HTML.jpg](img/492151_1_En_2_Fig19_HTML.jpg)


  图 2-19 网络系统偏好设置主窗格


  按下 `+` 按钮将提示您添加多种新的适配器选项，包括内置 VPN。图 2-20 显示了您可以添加的各种网络适配器，图 2-21 显示了您可以选择的具体 VPN
  协议，包括 `Cisco IPSec`。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig21_HTML.jpg](img/492151_1_En_2_Fig21_HTML.jpg)


  图 2-21 内置 VPN 协议


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig20_HTML.jpg](img/492151_1_En_2_Fig20_HTML.jpg)


  图 2-20 额外的网络接口选项


  点击 `Advanced…` 按钮将允许您修改特定的网络适配器设置。高级对话框中有多个标签页，第一个是 `Wi-Fi`。如图 2-22 所示，这里您将看到 Mac
  连接过的所有无线网络，并可以按偏好顺序排列它们。点击 `+`/`-` 按钮将允许您忘记一个无线网络（`-`）或手动添加（`+`）一个无线网络。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig22_HTML.jpg](img/492151_1_En_2_Fig22_HTML.jpg)


  图 2-22 Wi-Fi 设置标签页


  ### 专业提示


  这是一个用于排查具有嵌入式用户凭证和证书的 `WPA2 Enterprise` 无线网络问题的绝佳工具。您可以删除现有网络以轻松移除缓存的凭证和证书。您也可以手动添加一个网络并指定所需的无线安全设置。


  下一个标签页是 `TCP/IP`，如图 2-23 所示，这是您配置 IP 地址设置的地方。在此窗格中，您可以指定动态或静态寻址，以及查看当前的 IP 地址、子网掩码和网关（标记为
  Router）。`Renew DHCP Lease` 按钮可与动态寻址一起使用，以刷新现有的 DHCP 提供的 IP 地址或获取一个新的 IP 地址。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig23_HTML.jpg](img/492151_1_En_2_Fig23_HTML.jpg)


  图 2-23 TCP/IP 设置标签页


  ### Windows 管理员专业提示


  Windows 系统管理员可以把这个标签页看作是一个轻松获取 `ipconfig` 信息以及图形化地在 Mac 上执行 `ipconfig /release`
  或 `ipconfig /renew` 任务的地方。它的功能也与 Windows 上的 TCP/IP v4 或 TCP/IP v6 `Properties` 对话框相同。


  最后，如图 2-24 所示的 `DNS` 标签页，提供了网络的 DNS 服务器和搜索域。如果您的 DHCP 服务器选项设置为向客户端分发 DNS 信息，这些信息将在此处提供。您也可以点击
  `+`/`-` 按钮，根据需要手动在 Mac 客户端上添加额外的 DNS 服务器或搜索域，以便进行网络配置或故障排除。


  ![../images/492151_1_En_2_Chapter/492151_1_En_2_Fig24_HTML.jpg](img/492151_1_En_2_Fig24_HTML.jpg)


  图 2-24 DNS 设置标签页


  ### 专业提示


  `macOS` 还通过 `Terminal` 应用程序提供了一套全面的网络配置和故障排除命令。`ifconfig` 命令可用于执行包括刷新 DNS 解析器缓存、禁用网络接口、添加网络接口和操作
  TCP/IP 设置在内的多种操作。如果您计划对任何网络配置更改进行脚本化，一定要花些时间阅读 `ifconfig` 的手册页，并尝试如图 2-25 所示的一些命令。


