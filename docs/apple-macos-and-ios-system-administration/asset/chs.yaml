  \n### 注册设置\n\n我们将在本章后面探索用户和群组区域，但在开始将设备注册到 MDM 之前，我们需要快速修改一个设置。点击描述文件管理器窗口左侧边栏中的\
  \ `群组` 按钮。点击 `所有人` 群组，然后展开 `关于` 选项卡下的 `限制` 选项，以显示如图 9-2 所示的设置。请确保此示例中勾选的选项与您的设置匹配，特别是\
  \ `允许使用设备注册程序配置的设备在“设置助理”过程中进行注册` 选项。我们需要此项设置到位，DEP 注册练习才能正常工作。如果您做了任何更改，请点击 `保存`\
  \ 按钮来应用更改。\n\n![图 9-2](img/492151_1_En_9_Fig2_HTML.jpg)\n*图 9-2 “所有人”群组的注册设置*\n\n\
  > **专业提示**\n> 我还建议勾选 `将注册限制为占位符设备` 旁边的复选框，这样只有您已为其创建占位符的设备才真正能够注册。这将有助于设备管理，并防止不受控的设备出现在您的\
  \ `设备` 列表中。请记住，您的 `描述文件管理器` 实例可从公共互联网访问，因此如果未勾选此项，随机人员可能会自行注册。\n\n## MDM 注册\n\n\
  有几种方法可以将设备注册到您的 MDM 解决方案。注册过程基本上包括将 `配置描述文件` 应用到设备上，该描述文件会引导设备连接到您的特定 MDM。有多种方法可以实现这一点，您选择的方法将决定管理该设备时可用的设置、选项和安全级别。在本节中，我们将探讨四种最常见的方法，并分析每种方法的优缺点。\n\
  \n\n\n## 设备注册计划（DEP）与设置助手的集成\n\n目前，在 MDM 中注册设备的最佳选项是在设备运行`设置助手`时使用`DEP`。通过这种方式，你不仅可以强制注册，而且每次设备激活时都会进行注册，这意味着即使设备被重置或恢复，它也会在用户登录之前再次自动被管理。当设备以这种方式注册时，必要的信任证书也会被安装，因此设备将自动配置为信任你的`MDM`。当信任证书到位后，通过我们的`MDM`解决方案推送`配置描述文件`时，我们就不需要对其签名了。\n\
  \n这种注册方法的主要缺点是，你需要将`Apple 校园教务管理`或`Apple 商务管理`与你的`MDM`配置好，并且设备必须位于你的`DEP`数据库中。如果你确实已将`DEP`集成与`MDM`配置好，并且你直接从苹果或通过参与的`苹果授权经销商`购买设备，那么这就是你应该选择的方法。\n\
  \n### 使用 DEP 进行 MDM 注册\n\n在这个例子中，我们将使用`设置助手`集成功能将一台测试`iPad`注册到我们的`描述文件管理器 MDM`中。承接前一章的内容，我们应该已经有一台测试`iOS`设备作为占位符添加到了`MDM`中。`描述文件管理器`的`设备`列表应类似于图\
  \ 9-3，其中至少列出了一台`iOS`设备。\n\n![../images/492151_1_En_9_Chapter/492151_1_En_9_Fig3_HTML.jpg](img/492151_1_En_9_Fig3_HTML.jpg)\n\
  \n**图 9-3**\n\n在`Apple 校园教务管理`中将设备分配给我们的`MDM`服务器时，由`DEP`创建的`iPad`占位符\n\n1.  注册设备的第一步是点击`设备`列表中的`iPad`占位符，然后点击`设置`选项卡。\n\
  2.  向下滚动到`注册设置`➤`设置助手期间注册`，如图 9-4 所示。勾选以下复选框：\n    1.  `在设置助手期间提示用户注册设备`\n    2.\
  \  `不允许用户跳过注册步骤`\n    3.  `监督`\n    4.  `允许与 Mac 配对（已弃用）`\n    这些设置将强制设备在`设置助手`期间注册，并且允许任何最终用户注册它。一旦注册完成，它也将被监督，这样我们就可以使用全套配置工具来管理它。\n\
