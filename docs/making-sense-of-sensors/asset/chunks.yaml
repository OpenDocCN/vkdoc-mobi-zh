- fmt: '# Accelerometer


    An accelerometer detects the force in the opposite direction from the actual acceleration
    vector. This force is also described as the fictitious force or inertial force.
    The only place where an accelerometer will not experience any measured force is
    in space or while going through a free fall. Thus, it is important to have a measure
    of “resting force” or the “resting measurement” from the accelerometer. This force
    equals the force of gravity that is being experienced by the device at all times.
    Typically, each measure of the force will need to adjust for gravity in order
    to extract the actual acceleration of the device relative to its position on earth.


    We will demonstrate the working of an accelerometer by concentrating on a single
    axis accelerometer device. Assume that the accelerometer measures force along
    the z-axis. An analog accelerometer measures the inertial force as a shift in
    the voltage output by the device. Typically, to interface the accelerometers with
    the rest of the device system, an Analog-to-Digital Converter (ADC) is used that
    converts the generated voltage to a bit pattern (number). This number gives a
    measure of inertial force in a given direction (along an axis). The following
    definitions come in handy to understand the accelerometer behavior:


    - **Reference Voltage/ADC reading**: This is the measure of resting force as described
    above. The constant gravitational force can result in measurements on a different
    axis based on the IMU and device orientation, as we will find out shortly. Material
    and design defects can also contribute a non-zero value to the resting reading
    of such devices. We need to compensate for this measurement when we use the accelerometer
    for any real world usages.

    - **Sensitivity**: The sensitivity of the accelerometer refers to the change in
    voltage (or ADC output) per unit of acceleration measured. Many systems use the
    acceleration due to gravitational force (g) as the unit of acceleration. Thus,
    the sensitivity can be measured in volts/g.


    ![A978-1-4302-6593-1_2_Fig8_HTML.jpg](A978-1-4302-6593-1_2_Fig8_HTML.jpg)


    Figure 2-8. Accelerometer linear acceleration measurement axis


    Given the definitions above, the Figure [2-9](#A978-1-4302-6593-1_2_Chapter.html#Fig9)
    shows the process of calculating acceleration along a single axis. For simplicity,
    we assume the vertical axis as the axis of measurement so that the gravitational
    force acts on the same axis and can be accounted for by a simple subtraction.
    We shall soon see how to deal with a more general case.


    ![A978-1-4302-6593-1_2_Fig9_HTML.jpg](A978-1-4302-6593-1_2_Fig9_HTML.jpg)


    Figure 2-9. Single axis accelerometer operation


    ## Multi-axis Accelerometers


    In case of accelerometers with multiple axis measurement capability, the device
    can measure acceleration along each of the defined axes. For example, a 3-axis
    accelerometer can measure inertial force/acceleration along the x, y, and z axes.
    It is important to note that any acceleration measured by the device is reported
    in the form of its x, y, and z components as shown in the Figure [2-10](#A978-1-4302-6593-1_2_Chapter.html#Fig10).
    In Figure [2-10](#A978-1-4302-6593-1_2_Chapter.html#Fig10) the direction and magnitude
    of force (acceleration) is denoted by the vector D. Accelerometer outputs will
    report the magnitudes components in x, y, and z direction denoted by the projections
    Dx, Dy, and Dz, respectively. To get an accurate measure of the magnitude and
    direction of the acceleration, one needs to know the orientation of the axis as
    defined by the manufacturer. Fortunately, one other property of multi-axis accelerometers
    comes to our rescue in such situations.


    ![A978-1-4302-6593-1_2_Fig10_HTML.jpg](A978-1-4302-6593-1_2_Fig10_HTML.jpg)


    Figure 2-10. 3-Axis accelerometer operation


    ## Measuring Inclination


    The fact that multi-axis accelerometers measure gravitational force at rest can
    be used to calibrate the accelerometer. At rest, the accelerometer measures the
    inclination of the device with respect to the ground. With an axis perfectly aligned
    in the vertical direction, the other two components of the measured voltage (or
    ADC values) will be zero. Thus, aligning the device in multiple positions and
    taking the ADC readings from these positions can pinpoint the exact orientation
    of the accelerometer axes.


    # Gyroscope


    Accelerometers measure the translational acceleration (up-down, right-left, front-back).
    There are 3 more degrees of freedom a device can have in its movement. These relate
    to angular motion. Specifically, these are termed as *pitch*, *yaw*, and *roll*.
    These are shown in the Figure [2-4](#A978-1-4302-6593-1_2_Chapter.html#Fig4).
    A gyroscope measures the angular motion in terms of degrees-per-second about the
    x, y, and z axes. In gyroscope speak, we refer to the measure of each degree of
    freedom as a *channel*. Thus, a 3-channel gyroscope can measure all of the 3 components
    of angular motion (*pitch*, *roll*, and *yaw*).


    Similar to the accelerometer discussion above, the Gyroscope outputs are analog
    voltages converted to ADC digital outputs. The voltage changes are linearly related
    to the rate of change of angle around a given axis. After processing the ADC output,
    the gyroscope readings are generally reported in degrees/second around specific
    axis. Similar to the accelerometer discussion we define the following:


    - **Reference Voltage**: The gyroscope reference voltage refers to the ADC “step
    size.” In simplest terms, it defines the amount of voltage it takes to increase
    the ADC output by one unit.

    - **Zero Rate Voltage**: In the case of a gyroscope, this voltage is a measure
    of inherent bias in the device. Ideally, a device at rest should report a reading
    of zero on all the gyroscope channels. However, the material and design defects
    lead to a non-zero resting reading on almost all such devices. This reading should
    be subtracted from the measurements to get the right angular motion measurements.

    - **Sensitivity**: The sensitivity of the gyroscope refers to the change in voltage
    (or ADC output) per unit of angle changes measured. The gyroscope sensitivity
    can be measured in millivolts per degree per second.


    In line with the accelerometer processing, the gyroscope sensor-processing pipeline
    is shown in the Figure [2-11](#A978-1-4302-6593-1_2_Chapter.html#Fig11).


    ![A978-1-4302-6593-1_2_Fig11_HTML.jpg](A978-1-4302-6593-1_2_Fig11_HTML.jpg)


    Figure 2-11. Gyroscope processing


    # Combining the Accelerometer and Gyroscope Readings


    To get the accurate measurement of device inclination and motion for all 6 DOF,
    we combine the readings from the accelerometer and the gyroscope. The main complication
    in getting to the motion and inclination estimate from various ADC readings is
    to confirm the orientation of the IMU axis. Usually the manufacturer provides
    this information as part of IMU datasheets. However, the placement of IMUs in
    various devices can differ, and a user needs to calibrate the device before making
    sense of the ADC measurements for accelerometer and gyroscope. Usually the calibration
    step involves moving the device about various orientations (vertical, horizontal)
    and using the resulting readings in linear projection equations to solve for axis
    orientations.


    # Gesture Recognition Using IMU


    Combined accelerometer and gyroscope readings from a device can be used to recognize
    specific device gestures. For example, a phone equipped with an IMU can recognize
    a circular gesture through the IMU. This gesture can then be linked to different
    actions, like making specific sounds, turning the camera ON, etc. Many modern
    smartphones use the IMU to allow a user to flip a phone face down for declining
    a call or stopping music playback. Modern toy manufacturers are building robotic
    toys that use inertial sensors to plan motion and in conjunction with other sensors
    like cameras, to react to human interactions. There will be more on multi-sensor
    integration in the next chapter.'
