  trans: '

    # 微软的 Satori


    微软正在积极构建一个名为 `Microsoft Satori` 的知识表示库。目前，该库包含超过十亿个对象以及多年来收集的关系。知识的主要来源是通过爬虫（例如搜索引擎
    `Bing` 使用的爬虫）获取的网络数据。与 Google 的知识图谱类似，`Satori` 的目标是理解用户需求，并基于对实体关系的理解提供智能辅助。`Satori`
    利用 `Freebase` 和 `Wikipedia` 等来源构建知识库。与 `NEIL` 一样，知识构建的方法是自动的，引擎持续运行在一个拥有超过 5 万台服务器的农场之上，以发现新的关系并分析现有知识以寻找新的连接。


    由于 `Satori` 的主要目标应用载体是 `Bing`，微软最初将应用目标定位为浏览器的推荐功能。例如，浏览器使用 `Satori` 探索不同的关系，从而向用户建议可能的度假行程以及在不同地点可做的事项。目前，浏览器针对搜索结果中的人物、地点和事物提供“一览式”答案和“快照”。此外，当用户输入时，它还会“自动建议”，以帮助消除查询歧义并更快地获得答案。


    该过程涉及理解由常识描述的通用概念，并将其与特定领域的实例化和关系进行整合。


    # Google 的知识图谱


    谷歌已公开表示，其打算提供一种语义搜索能力，以利用网页中不同形式的关系。这些关系的数据可以来自文本、图片和视频。利用其网络数据缓存，谷歌已经从 `Maps`、`Finance`、`Movies`
    和 `Music` 等产品创建了一个庞大的知识图谱。当搜索引擎爬取新数据时，它会返回数据，并对这些数据进行分析，以便纳入不断丰富的知识图谱中。当我们在使用
    Google 搜索某些信息时，可以体验到语义搜索的运作过程：它首先尝试使用机器学习（自动完成、`Google Next`）来理解我们可能要搜索什么，然后返回的结果不只是网页，而是一种人类可读的答案形式（图
    6-7）。


    ![A978-1-4302-6593-1_6_Fig7_HTML.jpg](img/A978-1-4302-6593-1_6_Fig7_HTML.jpg)


    图 6-7.


    Google 理解用户查询，并用答案而非网页链接进行回应 (`www.google.com`)


    # Wolfram Alpha


    `Wolfram Alpha` 是一个知识引擎，其内置的搜索 API 完全旨在通过语义响应来回答查询。与那些开始利用自身数据生成知识的商业搜索引擎不同，`Wolfram
    Alpha` 的设计目标就是从网络资源中生成知识，并向商业和非商业用户提供对其应用程序访问这些数据的权限。其最终成果是一个网络工具，它通过遍历其构建的知识图谱来实际回答用户的问题（图
    6-8）。


    ![A978-1-4302-6593-1_6_Fig8_HTML.jpg](img/A978-1-4302-6593-1_6_Fig8_HTML.jpg)


    图 6-8.


    `Wolfram Alpha` 查询示例 (`https://www.wolframalpha.com/`)


    `Wolfram Alpha` 知识引擎存储的总数据目前超过 10 万亿实体和关系。用于处理这些数据的算法和模型数量超过 5 万个。


    该搜索引擎持续在后台运行，以发现新的数据和关系。它目前可以回答你的问题、教你音乐、比较书籍，并提供语义化的天气信息。`Wolfram Alpha` 引擎已与许多流行的搜索引擎集成。


    # Facebook 的实体图谱


    与 Google 类似，Facebook 拥有大量用户作为其个人资料一部分以及通过社交网络互动所提供的数据。Facebook 的 `Entity Graph`
    正是基于这些信息构建的。在早期，该公司曾将用户信息存储为简单的基于文本的数据存储。近年来，它认识到了数据相互关联的力量，并已从纯文本表示转变为用户社交数据的结构化表示。能够在一个基于知识的图谱（Facebook
    称之为 `Entity Graph`）中表示用户信息和各种社交关系，使得该公司能够基于现有的社交关系和用户偏好建议新的连接，从而为用户提供丰富的服务。`Entity
    Graph` 还用于在社交网站上提供上下文相关的搜索结果。例如，当你在 Facebook 上搜索某个姓名时，该网站会利用 `Entity Graph` 提供的结构化数据，并根据你的社交关系和活动，对返回的结果进行排序，以呈现最符合你需求的内容。


    # Apple 的 Siri


    苹果广受欢迎的个人助理 `Siri` 是建立在像 `Wolfram Alpha` 这样的引擎所提供的语义搜索能力之上的。


    # 语义网


    在本章结束时，我们非常简要地介绍一下语义网的概念。目前，万维网大部分是文档的语法集合，即网页表达的概念和观点与其他网页上的观点是相对独立的。当然，语法允许实体在网页之间进行显式的超链接。


    这种句法结构对人类来说易于理解，但智能机器的发展使得人类需要一个机器也能理解的网络。人类可以有效解析语法化的网络，因为我们对定义和描述的概念有着天生的理解。像“猫跳过了椅子”这样的陈述对人类来说有意义，因为我们知道“猫”、“跳”和“椅子”是什么意思。然而，解析这样一个句子的机器首先需要了解这些概念，然后才能理解句子中实体之间的关系
    `<猫, 跳过了, 椅子>`。当前的语法化网络是一个文档集合，其中计算机负责呈现，而人类则负责在信息之间提供链接。其主要目的是供人类消费信息。网络上唯一的身份标识以
    `URL`（统一资源定位符）的形式为文档保留，这些 URL 也被称为网址，例如 `www.intel.com`。


    当前的语法化网络布局使得处理需要上下文背景知识的查询、定位需要结合多个来源的信息、推理来自不同网页的信息等变得极其困难。语法化网络问题的根源在于，网页中嵌入的所有元数据都只集中在显示属性（字体、位置等）上，而网络上与其他实体相关的任何关系信息都无法用于解释。


    语义网试图通过提供有助于对网络内容进行语义理解的信息访问，使网络变得机器可读。这一努力的起点是向网络上已有的内容添加语义注释。在可以使用任何此类注释来描述概念之前，就必须对所描述的概念和对象的“含义”达成一致。这一点在语义网上是通过使用本体论来实现的。

    '
- fmt: "### 6.9.1 Ontologies\n\nOntologies in their basic form provide meanings for\
    \ the terms. Meanings of the terms in ontologies is formally specified and made\
    \ available to the users. New terms can be formed by combining the information\
    \ on existing terms from the same or multiple ontologies. For the example above,\
    \ an ontology could hold the definition of the “cat” being a four-legged animal\
    \ and the “chair” being a four-legged piece of furniture. Animal and furniture\
    \ could be further defined and described as part of an ontology.\n\nThus, the\
    \ ontology for the semantic web is a vocabulary of terms to describe certain realities\
    \ along with any assumptions regarding the meaning of these descriptions.\n\n\
    #### 6.9.1.1 Components of an Ontology\n\nOntologies are comprised of two components:\n\
    \n*   **Concept Names**: Concept names describe terms. For example:\n    *   `Cat`\
    \ is a concept whose members are a kind of animal.\n    *   `Carnivore` is a concept\
    \ whose members are animals that eat parts of other animals.\n*   **Background\
    \ Knowledge**: Background knowledge imparts meaning to terms. For example:\n \
    \   *   Cats are carnivores.\n    *   No individual can be both a carnivore and\
    \ an herbivore.\n\n#### 6.9.1.2 Ontology Languages\n\nFor the semantic web, various\
    \ attempts have been made to define suitable ontology languages. Prominent among\
    \ them are `RDFS` and `OWL`. Since we focused on `RDF` as the resource description\
    \ format for relationships earlier in this chapter, we will use `RDFS` as the\
    \ means to understand ontologies.\n\n`RDFS` or `RDF Schema` is intended to provide\
    \ a vocabulary for terms used in `RDF` descriptions for the semantic web. `RDFS`\
    \ is object-oriented in the sense that it groups the definitions and descriptions\
    \ into multiple classes and their properties. The classes can have sub- and super-\
    \ classes and the properties can define a range of applicable values.\n\n`RDFS`\
    \ schemas are pointed to by Universal Resource Identifiers or URIs. For the example\
    \ of the relationship in the Figure [6-9](#A978-1-4302-6593-1_6_Chapter.html#Fig9),\
    \ concepts/resources `Author`, `likes`, and `coffee` will be described by the\
    \ `RDFS` at the descriptions stored at accessible web addresses referred to by\
    \ URIs. Resources in general are any objects that can be referred to through URIs.\
    \ Properties are also defined as resources.\n\n![A978-1-4302-6593-1_6_Fig9_HTML.jpg](A978-1-4302-6593-1_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9. Basic relationship triple\n\nFigure [6-10](#A978-1-4302-6593-1_6_Chapter.html#Fig10)\
    \ repeats the document presented in Figure [6-3](#A978-1-4302-6593-1_6_Chapter.html#Fig3)\
    \ for us to observe the syntax for resource description.\n\n![A978-1-4302-6593-1_6_Fig10_HTML.jpg](A978-1-4302-6593-1_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10. RDF with RDFS embedding\n\nIn the figure we see a statement `<rdf:Description\
    \ rdf:about=\"http://www.w3schools.com/\">` pointing the parsing agent to the\
    \ URI at `http://www.w3schools.com/` for a description of resources `title` and\
    \ `author`.\n\nHaving the ability to link the instances and resource descriptions\
    \ back to the common ontologies allows the computer programs to understand the\
    \ knowledge representation and descriptions across different invocations. A cat\
    \ can be interpreted as the same animal when referred to by the animal name “cat”\
    \ or the pet name of an individual cat “Garfield.” Ontological methods lend syntax\
    \ to the web, allowing for expression of ideas vs. semantic document storage.\n\
    \nWhile `RDFS` is one way to implement ontologies, many other methods exist and\
    \ each comes with a package/tool for computers to browse and make connections\
    \ between concepts. First Order Logic (FOL)-based tools allow for combinations\
    \ of concepts and generation of new ones. Ontology based on Ontology Web Language\
    \ `OWL` (`https://www.w3.org/OWL/`) is one of the most popular ontologies accepted\
    \ by the World Wide Web consortium. The `OWL` language comes with tools for people\
    \ to build their own ontologies as well as operate on those already existing.\n\
    \n## 6.10 Summary\n\nThis chapter provided a brief overview of the ultimate step\
    \ in knowledge understanding from sensor information. We introduced the concept\
    \ of knowledge and how it can be viewed as a collection of semantic relationships.\
    \ Many knowledge-based commercial applications were discussed that are heavily\
    \ using the collected data from humans and the web to build knowledge repositories\
    \ with an aim to provide intelligent services. The semantic web is the ultimate\
    \ step in evolution of knowledge from raw data gathered by sensors. It is also\
    \ the last step in our journey of knowledge from sensors. The topic of ontologies\
    \ and the semantic web is large and fit for discussion in a dedicated book of\
    \ its own. We hope to have given you a brief introduction to the topic and the\
    \ resources in the reference section to follow the topic on your own. Interested\
    \ readers can learn a lot more about the technologies discussed with the help\
    \ of references at the end of this chapter. The next chapter will focus on the\
    \ practical system and platform considerations to implement a sensor-understanding\
    \ pipeline in the real world."
  raw: '### 6.9.1 Ontologies


    Ontologies in their basic form provide meanings for the terms. Meanings of the
    terms in ontologies is formally specified and made available to the users. New
    terms can be formed by combining the information on existing terms from the same
    or multiple ontologies. For the example above, an ontology could hold the definition
    of the “cat” being a four-legged animal and the “chair” being a four-legged piece
    of furniture. Animal and furniture could be further defined and described as part
    of an ontology.


    Thus, the ontology for the semantic web is a vocabulary of terms to describe certain
    realities along with any assumptions regarding the meaning of these descriptions
    .


    #### 6.9.1.1 Components of an Ontology


    Ontologies are comprised of two components


    *   Concept Names: Concept names describe terms. For example:

    *   Cat is a concept whose members are a kind of animal.

    *   Carnivore is a concept whose members are animals that eat parts of other animals.

    *   Background Knowledge: Background knowledge imparts meaning to terms. For example:

    *   Cats are carnivores.

    *   No individual can be both a carnivore and an herbivore.


    #### 6.9.1.2 Ontology Languages


    For the semantic web, various attempts have been made to define suitable ontology
    languages. Prominent among them are RDFS and OWL. Since we focused on RDF as the
    resource description format for relationships earlier in this chapter, we will
    use RDFS as the means to understand ontologies.


    RDFS or RDF Schema is intended to provide a vocabulary for terms used in RDF descriptions
    for the semantic web. RDFS is object-oriented in the sense that it groups the
    definitions and descriptions into multiple classes and their properties. The classes
    can have sub- and super- classes and the properties can define a range of applicable
    values.


    RDFS schemas are pointed to by Universal Resource Identifiers or URIs. For the
    example of the relationship in the Figure [6-9](#A978-1-4302-6593-1_6_Chapter.html#Fig9),
    concepts/resources “Author,” “likes,” and “coffee” will be described by the RDFS
    at the descriptions stored at accessible web addresses referred to by URIs. Resources
    in general are any objects that can be referred to through URIs. Properties are
    also defined as resources.


    ![A978-1-4302-6593-1_6_Fig9_HTML.jpg](A978-1-4302-6593-1_6_Fig9_HTML.jpg)


    Figure 6-9.


    Basic relationship triple


    Figure [6-10](#A978-1-4302-6593-1_6_Chapter.html#Fig10) repeats the document presented
    in Figure [6-3](#A978-1-4302-6593-1_6_Chapter.html#Fig3) for us to observe the
    syntax for resource description.


    ![A978-1-4302-6593-1_6_Fig10_HTML.jpg](A978-1-4302-6593-1_6_Fig10_HTML.jpg)


    Figure 6-10.


    RDF with RDFS embedding


    In the figure we see a statement “<rdf:Description rdf:about= [`http://www.w3schools.com`](http://www.w3schools.com/)
    ”>" pointing the parsing agent to the URI at [`http://www.w3schools.com`](http://www.w3schools.com/)
    for a description of resources “title” and “author.”


    Having the ability to link the instances and resource descriptions back to the
    common ontologies allows the computer programs to understand the knowledge representation
    and descriptions across different invocations. A cat can be interpreted as the
    same animal when referred to by the animal name “cat” or the pet name of an individual
    cat “Garfield.” Ontological methods lend syntax to the web, allowing for expression
    of ideas vs. semantic document storage.


    While RDFS is one way to implement ontologies, many other methods exist and each
    comes with a package/tool for computers to browse and make connections between
    concepts. First Order Logic (FOL)-based tools allow for combinations of concepts
    and generation of new ones. Ontology based on Ontology Web Language OWL ( [`https://www.w3.org/OWL/`](https://www.w3.org/OWL/)
    ) is one of the most popular ontologies accepted by the World Wide Web consortium.
    The OWL language comes with tools for people to build their own ontologies as
    well as operate on those already existing.


    ## 6.10 Summary


    This chapter provided a brief overview of the ultimate step in knowledge understanding
    from sensor information. We introduced the concept of knowledge and how it can
    be viewed as a collection of semantic relationships. Many knowledge-based commercial
    applications were discussed that are heavily using the collected data from humans
    and the web to build knowledge repositories with an aim to provide intelligent
    services. The semantic web is the ultimate step in evolution of knowledge from
    raw data gathered by sensors. It is also the last step in our journey of knowledge
    from sensors. The topic of ontologies and the semantic web is large and fit for
    discussion in a dedicated book of its own. We hope to have given you a brief introduction
    to the topic and the resources in the reference section to follow the topic on
    your own. Interested readers can learn a lot more about the technologies discussed
    with the help of references at the end of this chapter. The next chapter will
    focus on the practical system and platform considerations to implement a sensor-understanding
    pipeline in the real world.'
  trans: "\n### 6.9.1 本体论\n\n本体论的基本形式为术语提供了含义。本体论中术语的含义被正式指定并向用户开放。通过组合来自同一本体或多个本体中现有术语的信息，可以形成新的术语。针对上述示例，本体可以定义“猫”为四足动物，“椅子”为四足家具。动物和家具也可以在本体中进一步定义和描述。\n\
    \n因此，语义网的本体论是描述特定现实及这些描述相关含义假设的术语词汇表。\n\n#### 6.9.1.1 本体的组成部分\n\n本体由两个部分组成：\n\n\
    *   **概念名称**：概念名称描述术语。例如：\n    *   `Cat` 是一个概念，其成员属于一种动物。\n    *   `Carnivore`\
    \ 是一个概念，其成员是吃其他动物部分的动物。\n*   **背景知识**：背景知识赋予术语含义。例如：\n    *   猫是食肉动物。\n    * \
    \  没有个体能既是食肉动物又是食草动物。\n\n#### 6.9.1.2 本体语言\n\n为了语义网，人们进行了多种尝试来定义合适的本体语言。其中突出的是\
    \ `RDFS` 和 `OWL`。既然本章前面我们重点介绍了 `RDF` 作为关系的资源描述格式，这里我们将使用 `RDFS` 作为理解本体的途径。\n\n\
    `RDFS` 或 `RDF Schema` 旨在为语义网中 `RDF` 描述使用的术语提供词汇表。`RDFS` 是面向对象的，因为它将定义和描述分组到多个类别及其属性中。类可以有子类和超类，属性可以定义一系列可应用的值。\n\
    \n`RDFS` 模式由通用资源标识符（URI）指向。对于图 6-9 中的关系示例，概念/资源 `Author`、`likes` 和 `coffee` 将由存储在\
    \ URI 所指向的可访问网络地址处的 `RDFS` 描述。通常，资源是任何可以通过 URI 引用的对象。属性也被定义为资源。\n\n![A978-1-4302-6593-1_6_Fig9_HTML.jpg](img/A978-1-4302-6593-1_6_Fig9_HTML.jpg)\n\
    \n图 6-9. 基础关系三元组\n\n图 6-10 重复了图 6-3 中呈现的文档，以便我们观察资源描述的语法。\n\n![A978-1-4302-6593-1_6_Fig10_HTML.jpg](img/A978-1-4302-6593-1_6_Fig10_HTML.jpg)\n\
    \n图 6-10. 嵌入了 RDFS 的 RDF\n\n在图中，我们看到一条语句 `<rdf:Description rdf:about=\"http://www.w3schools.com/\"\
    >`，它将解析代理指向 URI `http://www.w3schools.com/`，以获取资源 `title` 和 `author` 的描述。\n\n\
    能够将实例和资源描述链接回公共本体，使得计算机程序能够理解跨越不同调用的知识表示和描述。当用动物名称“猫”或个体宠物猫的名字“加菲猫”指代时，猫可以被解释为同一种动物。本体论方法为网络提供了语法，允许表达思想，而不仅仅是存储语义文档。\n\
    \n虽然 `RDFS` 是实现本体的一种方式，但还有许多其他方法，每种方法都附带一个供计算机浏览概念并在概念之间建立联系的包/工具。基于一阶逻辑（FOL）的工具允许组合概念并生成新概念。基于本体\
    \ Web 语言 `OWL`（`https://www.w3.org/OWL/`）的本体是世界万维网联盟接受的最流行的本体之一。`OWL` 语言附带了工具，供人们构建自己的本体以及操作已有本体。\n\
    \n## 6.10 总结\n\n本章简要概述了从传感器信息进行知识理解的最终步骤。我们介绍了知识的概念，以及如何将其视为语义关系的集合。讨论了许多基于知识的商业应用，这些应用大量利用从人类和网络收集的数据来构建知识库，旨在提供智能服务。语义网是从传感器收集的原始数据进化到知识的最终步骤，也是我们从传感器获取知识之旅的最后一步。本体论和语义网的主题非常庞大，适合用专门的书籍来讨论。我们希望本节能为您提供一个简短的介绍，并借助参考章节的资源，让您能够自行深入学习该主题。感兴趣的读者可以通过本章末尾的参考资料，了解更多关于所讨论技术的内容。下一章将重点讨论在现实世界中实现传感器理解流水线的实际系统和平台考量。\n"
- fmt: '# 7. End-to-End System Architecture Implications


    In this last chapter of the book, we discuss the system-level implications for
    processing sensor data and analyzing the processed data for insights and knowledge
    management. To get started, let’s start by looking at what a typical end-to-end
    system architecture might look like. Figure [7-1](#A978-1-4302-6593-1_7_Chapter.html#Fig1)
    shows a few typical end-to-end system architectures for different environments
    consisting of three platforms.


    ![A978-1-4302-6593-1_7_Fig1_HTML.gif](A978-1-4302-6593-1_7_Fig1_HTML.gif)


    Figure 7-1. Example end-to-end system architectures


    In Figure [7-1](#A978-1-4302-6593-1_7_Chapter.html#Fig1), the first end-to-end
    system architecture considers the phone as a sensor capture device. Today’s phones
    capture valuable sensor data that includes location data (for navigation as well
    as assistance), audio data (speech Q&A), motion data (for health/fitness and navigation),
    and visual data (pictures and video for personal usage, social media, and other
    purposes). When such data is captured in a home environment, it goes through a
    communications gateway (for Wi-Fi communication) or a personal hub, and then becomes
    available to the cloud. While the gateway/hub is primarily used as a communication
    medium, such platforms have larger compute capabilities and could be used for
    additional local processing in some scenarios. Ultimately, the cloud platform
    is typically in a datacenter and has abundant processing resources available for
    analyzing the data as well as providing valuable services as a result of it.


    Similarly, Figure [7-1](#A978-1-4302-6593-1_7_Chapter.html#Fig1) also shows a
    wearable example. Consider a fitness device on the wrist that measures your motion.
    Such a device typically has low bandwidth connectivity within a short range and
    therefore communicates to an on-body device like a phone for the ability to upload
    the data to the cloud when required. More sophisticated smart watch devices may
    have additional communication capabilities like Wi-Fi and cellular enabling them
    to also connect to a local connectivity hub as well as directly communicate with
    the cloud platform when required. The wearable typically has low compute capabilities
    for low power (mW to 100s mWs), whereas the phone or hub has high compute capabilities
    at medium power (Watts) and the cloud platform has the ability to scale to 10s/100s
    of Watts and beyond.


    Expanding further, instead of a wearable, we could also consider an edge sensor
    device in a smart space that senses motion or captures audio/visual data for interactivity.
    Such devices in a smart space may communicate through a phone or local access
    point to the cloud. In this case, the cloud platform could in fact just be an
    on-premise platform that provides the service within the local vicinity or a public
    cloud in a datacenter depending on the usage of interest. The last end-to-end
    system in Figure [7-1](#A978-1-4302-6593-1_7_Chapter.html#Fig1) is an extension
    to this, since it considers an aggregation platform or gateway in an industrial
    factory-like environment to perform the aggregation of sensing data across multiple
    sensors and provides potential analytics locally as well as transmits this data
    to a private or public cloud platform for further processing.


    ## 7.1 Platform Data Processing Considerations


    In this chapter, we will now consider where such sensor processing could be or
    should be accomplished for some of the usages we discussed earlier in this book
    and talk about the opportunities and challenges going forward in this domain.


    Here are the typical considerations when determining where the processing should
    be done in an end-to-end platform:


    ### 7.1.1 Compute Capability


    Each of the platforms in the end-to-end system architecture has very different
    levels of compute capabilities due to limitations in battery life, form factor,
    or other aspects such as cost and even cooling. For example, a simplistic sensor
    node may have only one microcontroller core and some simple control logic running
    at less than 100 MHz, whereas a gateway platform could have cores running at 100s
    of MHz to 1GHz as well as additional hardware logic for specialized media or communications
    functionality. The cloud platform typically has many cores, each running at multiple
    GHz. Given this wide possible range of compute characteristics, it becomes important
    to determine where to run parts of the overall application or service of interest.
    A sensor node, for example, may only be able to accomplish a little amount of
    processing, while sending the data to the gateway or cloud can enable much richer
    analytics and services.


    ### 7.1.2 Battery Life & Power Constraints


    Typically, the reason behind the limited compute power available at a sensor node
    or a phone is the fact that it is battery-operated and therefore is required to
    run at milliwatts or several 10s of milliwatts on average. Given this characteristic,
    such devices are typically "asleep" for long periods of time and only do processing
    when some interesting sensor data arrives or an event of interest occurs. When
    considering speech processing, for instance, an edge device may only be able to
    determine whether there was a keyword spoken, whereas the actual command is processed
    on the gateway and the full Q&A processing and service is provided from the cloud.
    This is done in order to save the battery life and limit the cost of the sensor
    node.


    ### 7.1.3 Interactivity and Latency


    The example provided above on speech recognition provides an interesting perspective
    in terms of partitioning of the overall workload. If interactivity and latency
    are important, one would like to run as much of the processing closer to the device
    as possible to minimize the latency of sending data to the cloud and getting back
    an answer. However, at the same time, interactivity may require access to data
    in the cloud where the domain expertise for generating the answer is actually
    available. One way of solving this problem is to consider local (user and device-specific)
    commands/questions vs. global commands/questions and enable local commands at
    the edge node (or nearby), while processing global (more generic) commands in
    the cloud.


    #### Bandwidth Availability


    In addition to needing local processing for interactivity, the other key consideration
    for local processing is bandwidth availability. If the bandwidth available on
    the local node is very low, it becomes difficult (higher latency) to send all
    of the data to the cloud for processing. Communications processing also costs
    power and therefore there is typically a tradeoff between local compute vs. communication
    to the cloud. If the edge device is mobile, the availability of bandwidth also
    changes, depending on coverage at the current location as well as indoor vs. outdoor
    scenarios.


    ### 7.1.4 Storage & Memory Constraints


    Due to form factor and power constraints, the amount of storage and memory available
    is also limited on a local edge device and grows as gateways and cloud platforms
    are considered. Therefore, if history is required for answering a question (speech
    example again), then it is almost imperative that the gateway or cloud provide
    the answer by processing the history in the context of the question. However,
    if the answer requires minimal history (only recent few seconds or minutes), then
    perhaps the local device has the ability to store the raw data or the metadata
    needed to answer questions later. In addition to historical data, having access
    to other data can also be equally important as discussed below.'
