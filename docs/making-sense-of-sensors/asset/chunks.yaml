    ### 2.3.3 自动语音识别（ASR）


    自动语音识别（Automatic Speech Recognition）或 `ASR` 是指计算机系统识别人类语音并将其转换为文本的能力。`ASR` 包含的能力范围从关键词识别（`KR`）、命令与控制（`CC`），到大词汇量连续语音识别（`LVCSR`）。`KR`
    通常用作唤醒系统的触发词，而 `CC` 和 `LVCSR` 则作为会话的一部分，用于控制活动或听写用于邮件或其他目的的文本段落。虽然关键词识别可以以更定制化的方式实现，但
    `KR`、`CC` 和 `LVCSR` 的通用技术可能相似，主要区别在于词汇量和语法理解的大小。图 2-15 展示了通用的语音识别处理流程。语音识别可以独立于说话者实现，即任何说话者都能与系统交互；也可以依赖于特定说话者，即系统根据特定用户或用户群进行训练。用于学习和探索的常见语音识别器或工具包包括
    CMU Sphinx（ [`http://cmusphinx.sourceforge.net/`](http://cmusphinx.sourceforge.net/)
    ）和 Kaldi（ [`http://kaldi-asr.org/`](http://kaldi-asr.org/) ）。针对特定目标（如移动设备）的定制版本包括
    PocketSphinx（ [`http://www.speech.cs.cmu.edu/pocketsphinx/`](http://www.speech.cs.cmu.edu/pocketsphinx/)
    ）。


    ![A978-1-4302-6593-1_2_Fig15_HTML.gif](img/A978-1-4302-6593-1_2_Fig15_HTML.gif)


    图 2-15. 自动语音识别


    传统的语音识别方法基于使用 `GMM`（高斯混合模型）和 `HMM`（隐马尔可夫模型）。要解决的核心问题是，根据输入的声学观测序列找出最可能的词序列。例如，语音识别的早期实现采用了以下关键处理阶段：


    *   **特征提取**：输入的语音信号被分割成每段 10 毫秒的帧。每个 10 毫秒样本由一个包含 39 个分量的特征向量表示。

    *   **GMM 评分**：为了确定语音中的 senones 并找到最佳匹配，对提供的特征向量执行 `GMM` 评分。

    *   **HMM 处理**：语音模型需要 `HMM` 处理，以根据提供的词汇（词汇模型和语言模型）确定最可能的音素和词序列。


    直到最近，大多数（`LVCSR`）语音识别器都基于 `GMM` + `HMM` 方法。然而，语音识别器的性能不足以实现高质量的大规模采用。语音识别器的性能指标包括词错误率、速度和整体准确率。为了解决这些问题，最近的语音识别器开始探索使用加权有限状态转换器（`WFST`）和深度学习（神经网络）进行语音识别。


    神经网络在语音和视觉处理中的重要性日益增长。深度神经网络本质上是输入层和输出层之间有许多隐藏层的人工神经网络。`DNN` 取代了语音识别流程中 `GMM`
    的使用（见图 2-16），将其从 `GMM` + `HMM` 解决方案转变为 `DNN` + `HMM` 解决方案。如今，大多数商用语音识别产品都基于深度神经网络，因为它提高了系统的词错误率和整体准确率。


    ![A978-1-4302-6593-1_2_Fig16_HTML.gif](img/A978-1-4302-6593-1_2_Fig16_HTML.gif)


    图 2-16. 在 ASR 中使用深度神经网络


    加权有限状态转换器用于表示 `HMM`，同时提供可以加速处理过程的附加信息，因为有向图中的每条边都标有输入、输出和权重。因此，`WFST` 是一个丰富的数学框架，在自然语言处理中的应用也超出了
    `HMM` 的范畴。


    ### 2.3.4 自然语言处理（NLP）


    `NLP` 涉及获取来自语音转文本解决方案或书面文本，并尝试以自动化方式提取信息或更深入地理解文本。`NLP` 的第一步是通过理解句子结构和识别词边界来对文本进行分词。另一个重要步骤是使用命名实体识别（`NER`），在适当的情况下将特定词语归类到更通用的类别中。图
    2-17 展示了一个 `NLP` 基本流程的示例。在此过程中，单个词语也可以根据所完成的 `NLP` 分析类型被赋予相应的权重。


    ![A978-1-4302-6593-1_2_Fig17_HTML.gif](img/A978-1-4302-6593-1_2_Fig17_HTML.gif)


    图 2-17. 自然语言处理示例


    一旦这些初始处理阶段完成，就会应用机器学习技术来分析文本的关键方面。例如，可以通过分析文本中的词语来确定文本的情感（正面、负面等）。可以通过将文本中的词语与最可能的主题关联起来进行分类，从而识别文本的主题。还可以确定文本中提出问题的性质，用于诸如
    `Siri` 和 `Cortana` 所针对的使用模式。


    在上述章节中，我们介绍了音频/语音识别的关键方面，范围从音频分类、语音活动检测，到自动语音识别，再到自然语言处理。我们希望每个领域的概述能让您理解主要用途、使用的关键组件或算法，以及在开发此类技术时的注意事项。虽然我们没有深入探讨算法本身，但读者应该能够根据感兴趣的使用模式和练习的重点来确定哪些算法需要进一步研究。


    ## 2.4 视觉处理与识别


    视觉识别始于能够捕捉静态图像和视频的基本摄像头传感器。如前所述，视觉识别可以包括物体识别、手势识别、人脸识别、场景识别、异常检测和视频摘要。通常，视觉识别遵循以下基本过程：特征提取、描述符生成和匹配。从图像中提取特征，然后将其总结为一个描述符向量，接着与预先存在的向量数据库进行比较，以进行相关的识别。我们将针对上述每种识别类别，通过一些示例来描述此过程。

    '
- fmt: '# Object Recognition


    Object recognition refers to the ability to detect and recognize objects in an
    image or video. Examples of object recognition range from identifying a cereal
    box or bottle of wine in an image to identifying a historic monument in a tourist
    spot. The overall usage may be counting the number of items on a retail shelf
    (cereal boxes or wine) or providing more information (augmenting the reality)
    to the tourist pointing the phone camera at a monument. While we will describe
    the typical flow of object recognition below from a single object point of view,
    note that the same applies for identifying multiple objects with clustering and
    bounding techniques included for this purpose.


    Figure 2-18 (from S. Lee et al. in references) shows a typical object recognition
    flow for identifying an object in the query image and recognizing it by matching
    against a database image. The basic flow includes (a) feature detection (also
    referred to as interest point detection), (b) descriptor generation and (c) matching.


    ![A978-1-4302-6593-1_2_Fig18_HTML.jpg](A978-1-4302-6593-1_2_Fig18_HTML.jpg)


    Figure 2-18. Object recognition flow example (S. Lee et al.)


    Many algorithms have been developed and optimized over the years for object recognition.
    These include `SURF` (speed up robust features) (reference by H. Bay et al.),
    `SIFT` (scale invariant feature transform, reference by D. G. Lowe et al.), `ORB`
    (reference by E. Rublee et al.), `FAST` (reference by E. Rosten et al.), `BRIEF`
    (reference by M. Calonder et al.), and `BRISK` (reference by S. Leutenegger et
    al.), to name a few. These algorithms provide the ability to identify feature
    points in the image that uniquely describe the object(s) and then descriptor generation
    approaches to describe the region surrounding the feature point as part of a descriptor
    vector. Initially, algorithms were designed for basic functionality and accuracy.
    However, with the ubiquity of mobile devices integrating cameras, these algorithms
    optimized for reduced computation complexity, increased speed, scale invariance,
    rotation invariance and noise resistance. The reader is referred to each of the
    papers for the algorithms to understand the specifics of the algorithms better.
    For illustrative purposes, an example flow is shown in Figure 2-19.


    ![A978-1-4302-6593-1_2_Fig19_HTML.gif](A978-1-4302-6593-1_2_Fig19_HTML.gif)


    Figure 2-19. Object recognition flow (e.g., SURF components [references by S.
    lee et al., H. Bay et al.])


    Once the features/descriptors are determined, the next step is to match it to
    recognize the object. A matching database holds previously captured descriptor
    vectors, and matching the query descriptor vectors to the database provides the
    ability to get the nearest match or set of matches as the output. Typically, this
    match is done by either brute force (`L1`, `L2` distance calculations) as shown
    in Figure 2-20. In addition to brute-force, `ANN` (approximate nearest neighbor)
    approaches are also very common, especially as the size of the database increases
    significantly. There are fast libraries for `ANN` computations, such as `FLANN`
    ( [`http://www.cs.ubc.ca/research/flann/`](http://www.cs.ubc.ca/research/flann/)
    ), that are commonly used for performing these computations at maximum speed and
    efficiency.


    ![A978-1-4302-6593-1_2_Fig20_HTML.jpg](A978-1-4302-6593-1_2_Fig20_HTML.jpg)


    Figure 2-20. Brute-force match using `L1`/`L2` distance calculations (S. Lee et.
    al.)


    ## Gesture Recognition


    Gesture recognition refers to the ability to identify and recognize hand poses,
    dynamic hand gestures or similarly body poses or dynamic body actions. Gestures
    have recently become more popularized by the Kinect ( [`http://www.xbox.com/en-US/xbox-one/accessories/kinect`](http://www.xbox.com/en-US/xbox-one/accessories/kinect)
    ) as it is used commonly in game consoles like the Microsoft® Xbox ( [`http://www.xbox.com/en-US/`](http://www.xbox.com/en-US/)
    ). Figure 2-21 shows the steps in identifying hand pose and facial features using
    skin color-based segmentation. In this section, we will start with the basic hand
    pose recognition for describing the process. The simplest form of hand pose recognition
    is to identify whether there is a hand in the image (detection) and then identify
    the specific hand pose (recognition).


    ![A978-1-4302-6593-1_2_Fig21_HTML.jpg](A978-1-4302-6593-1_2_Fig21_HTML.jpg)


    Figure 2-21. Gesture recognition examples


    Hand detection is typically accomplished using two different types of mechanisms:
    (a) skin color of the hand and (b) model describing the typical hand shape. There
    are many algorithms that look at the different colors in the image and try to
    identify whether there is a hand in the image and thereby segment that part of
    the image to do more processing for recognition. Color spaces that are usually
    employed when doing skin color analysis includes `RGB`, `HSV`, `YUV` and `YCrCv`.
    Sometimes hybrid approaches are also used considering multiple color spaces. The
    key challenge in doing color-based analysis for hand identification is the nature
    of the image background. Sometimes the background color may be similar to skin
    color. Another key challenge when using skin color is that human skin color varies
    from person to person. So making the approach agnostic to the user is also somewhat
    challenging. A possible solution to this problem is to make the solution user-dependent,
    but that imposes the requirement that the user has to train the system through
    an enrollment process. Most solutions prefer the least amount of enrollment/user
    training required.


    Figure 2-22 shows an example of the hand segmentation scheme using skin color
    analysis. As shown in the figure, the final answer is based on both segmentation
    of the skin and then comparison to a known model of hand gestures, also known
    as the vocabulary. The vocabulary in this case is relatively easy to create since
    it only involves 2D static gestures. The complexity of the solution increases
    as dynamic gestures are involved and tracking is required for both detecting movement
    as well as depth. The Kinect, for example, uses two cameras and an IR sensor (in
    its implementation) to identify hand and body poses in 3D environments.


    ![A978-1-4302-6593-1_2_Fig22a_HTML.jpg](A978-1-4302-6593-1_2_Fig22a_HTML.jpg)![A978-1-4302-6593-1_2_Fig22b_HTML.jpg](A978-1-4302-6593-1_2_Fig22b_HTML.jpg)


    Figure 2-22. Hand pose detection and recognition flow'
