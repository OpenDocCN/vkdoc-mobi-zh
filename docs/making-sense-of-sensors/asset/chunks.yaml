    on any processing engine on these platforms (core or accelerator). Such solutions
    are gaining in popularity since heterogeneous architectures are becoming more
    common due to power/performance advantages. Figure [7-11](#A978-1-4302-6593-1_7_Chapter.html#Fig11)
    shows the decomposition of a workload into functional components and illustrates
    the use of a stub to redirect the execution of the function to any platform and
    processing engine within the platform. The policy used for determining where to
    run a function could be based on available bandwidth for data transfer, power/performance
    (affecting battery life of device), and potentially availability of the platform
    and engine (if multiple workloads are running simultaneously or the platform is
    not always available on the network).


    ![A978-1-4302-6593-1_7_Fig11_HTML.jpg](A978-1-4302-6593-1_7_Fig11_HTML.jpg)


    Figure 7-11.


    Workload decomposition and function mapping


    ## 7.5 Summary and Future Opportunities


    This chapter presented the end-to-end architecture for sensor processing pipelines.
    As described in this chapter through various examples, there are multiple challenges
    in developing end-to-end system architectures for speech or vision capabilities
    and usages. This opens up many opportunities for further research and development.
    Here we will list a few of these opportunities:


    *   Developing special purpose engines and accelerators for specific algorithms
    and primitives

    *   Developing end-to-end system architectures that provide the ability for dynamic
    mapping and partitioning flexibility.

    *   Developing tools and models that allow for exploration of suitable partitioning
    policies

    *   Developing common processing pipelines across multiple usages

    *   Developing runtimes/programming models for end-to-end systems


    ## 7.6 Conclusion


    This chapter concludes the overview of different facets of sensor data processing
    to make sense of the environments around us. We hope that the book achieved the
    goal of exposing the readers to a high-level understanding of the concepts and
    operations involved. The discussions in the book detailed the steps in making
    sense of sensors through (a) recognizing data from a single sensor, (b) using
    multiple sensing modes to improve recognition performance and implement new usages,
    (c) deriving usage context and in turn using the context for improving recognition
    operations, (d) deriving semantic relationships from recognized information, (e)
    representing the relationships to build knowledge graphs, (e) operating on the
    knowledge for implementing intelligent usages, and (d) system considerations for
    implementing sensor-driven knowledge pipelines.


    While this book is aimed at providing a high-level bird’s-eye view of the technologies
    involved, the content is aimed at providing a reader with an understanding of
    the generic nature of the knowledge pipeline across various sensing modes and
    usages. The information gained from the book should equip the reader with enough
    background to get to the next step of learning by choosing the domain and technology
    area of interest. The references provided at the end of the book chapters are
    a good start for such a quest.'
