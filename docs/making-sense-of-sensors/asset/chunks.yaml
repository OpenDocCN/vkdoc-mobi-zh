    # 3. 多模态识别


    在上一章中，我们介绍了独立处理每种原始传感器数据以实现不同级别识别能力的方法。我们发现惯性传感器能提供关于不同轴向运动的信息。音频流不仅可以处理声音类型，还能处理词语和自然语言。我们还展示了如何识别不同的物体、人脸、活动等。现在，我们设想一下，如果能够同时关联多种传感器类型的理解结果，将会实现哪些可能性。这被称为“多模态识别”，本章将探讨实现多模态识别的不同方法。


    ## 3.1 为何采用多模态


    图 3-1 以相同的三种传感器类型（惯性、音频和视觉）为例，介绍了多模态识别的好处。


    ![A978-1-4302-6593-1_3_Fig1_HTML.jpg](img/A978-1-4302-6593-1_3_Fig1_HTML.jpg)


    图 3-1. 多模态识别简介


    多模态识别的好处首先体现在能够通过利用其他模态（如视觉）来辅助提升某一种模态（如声音）的识别能力。当识别能力受损、需要澄清或需要提升效率时，这种方法尤为有效。例如，当你听到“把它关掉”时，要理解“它”指代什么，就必须利用视觉识别来确定用户正在指向什么。在这种情况下，视觉识别提供了澄清，将模糊的指代“它”精确到风扇或灯等具体物品。除此之外，还可以利用一种模态来提高另一种模态的处理效率。我们来看一个零售场景的例子：用户需要某种特定产品的帮助。如果他或她已经站在货架前，只需要查询某个商品的价格，那么通过将查询词汇表缩减至仅包含与该场景相关的指令，就能轻松降低语音处理的复杂度。这是通过利用视觉线索判断用户所在位置，并确定他或她正在注视的产品类型来实现的。本章后面将使用这类例子来理解实现这一功能所需的多模态识别类型。


    多模态识别的另一个好处是能够根据哪种模态更有效，动态地使用多种模态。例如，在处理（足球比赛）视频以生成摘要时，有些部分在视觉上很吸引人（某位球星的大力射门），有些部分则声音丰富（如评论员宣布进球及观众掌声）。两种模态都可以用来更好地理解每个感兴趣的视频片段。通过先独立处理音频和视频识别模态，再关联感兴趣的事件，就可以轻松实现这一点。或者，如果愿意关联球员（通过视觉识别）与其姓名（基于评论员音频的语音识别），则可以实现更细粒度的识别。


    需要注意的是，作为人类，我们能够非常自然地处理这些模态，并在它们之间进行交叉关联以确定上下文。根据使用场景和上下文的不同，我们往往能在不同粒度级别上实现这一点。例如，我们可以在公园里骑自行车时处理声音、运动和视觉输入。挑战在于让计算设备也能达到同样的识别水平和效率，即根据需要在不同识别粒度以及不同模态之间的不同耦合级别之间动态切换。这是一个难题，但如下文所述，如果我们能单独分类每种多模态识别类型，并理解其优势和使用场景，就可以解决这个问题。


    ## 3.2 多模态的类型


    在本节中，我们将介绍用于设计传感器融合解决方案的不同方法和框架。我们主要涵盖以下三种广泛使用的方法：基于耦合的分类、达萨拉蒂模型和传感器配置模型。

    '
- fmt: '### 3.2.1 Coupling-based Classification


    Information from multiple sensor sources can be combined at various stages in
    the recognition chain. For the sake of simplicity, let us consider two sensors
    processing pipelines as shown in Figure [3-2](#A978-1-4302-6593-1_3_Chapter.html#Fig2).
    In Figure [3-2](#A978-1-4302-6593-1_3_Chapter.html#Fig2), both the processing
    pipes operate independently of each other. The exact locations on each pipeline
    where the sensor fusion can occur depend on various factors including the implementation
    complexity and the desired accuracy for the recognition task. We define three
    main levels of sensor data fusion.


    - **Uncoupled sensor data fusion / Semantic Fusion**: The definition refers to
    the case where the data fusion occurs at the last possible stage in the respective
    pipelines. This usually means integration after the recognition is done, as shown
    in Figure [3-3](#A978-1-4302-6593-1_3_Chapter.html#Fig3). The advantage of this
    method is that the sensor fusion is simple and can be accomplished using existing
    technology pipelines for recognition. Domain experts like this approach because
    cross-domain technical knowledge requirements are minimal. It is generally very
    hard to find technology experts that can master more than one sensor domain. For
    semantic fusion approaches, the domain experts can work independently and the
    application developers can integrate the modalities at the higher level.


    ![A978-1-4302-6593-1_3_Fig3_HTML.jpg](A978-1-4302-6593-1_3_Fig3_HTML.jpg)


    Figure 3-3. Uncoupled fusion


    - **Loosely coupled sensor data fusion / Restricted recognition**: To get performance
    advantage over uncoupled sensor fusion, experts rely on a mode that restricts
    the recognition search space of one modality based on the results from the other.
    In this approach, one recognition pipe helps to set the context for the other.
    Once that is accomplished, the second recognition pipe need only perform recognition
    within the established context boundaries, leading to potential savings in compute
    and higher performance. Figure [3-4](#A978-1-4302-6593-1_3_Chapter.html#Fig4)
    illustrates this. The inter-domain expertise requirement is minimal, as in the
    case of semantic sensor fusion, but the developer does need to understand the
    semantic dependence of recognition between modes.


    ![A978-1-4302-6593-1_3_Fig4_HTML.jpg](A978-1-4302-6593-1_3_Fig4_HTML.jpg)


    Figure 3-4. Loosely coupled fusion


    - **Tightly coupled sensor data fusion / data-feature level fusion**: This most
    performance-friendly model of sensor fusion allows for virtual combination of
    multiple sensors in such a manner that the combined sensors appear as a single
    complex sensor for most of the application stack. As shown in Figure [3-5](#A978-1-4302-6593-1_3_Chapter.html#Fig5),
    the methods of sensor integration include combining the raw data from sensors
    and using a single data stream for processing. More practical methods combine
    features from the sensors to produce a single feature set for recognition and
    filtering. While the tight integration provides the most performance boost for
    sensor fusion usages, this method is not very popular due to the requirement for
    multi-domain experts to work on data integration. Data representation at the lower
    levels of stack is very sensor-specific, so experts are needed to make sensible
    decisions for merging data from multiple sources. Each sensor model has a different
    data representation format at the lowest level, making it very hard to come up
    with a homogenous representation that preserves the information content.


    ![A978-1-4302-6593-1_3_Fig5_HTML.jpg](A978-1-4302-6593-1_3_Fig5_HTML.jpg)


    Figure 3-5. Tightly coupled fusion


    ![A978-1-4302-6593-1_3_Fig2_HTML.jpg](A978-1-4302-6593-1_3_Fig2_HTML.jpg)


    Figure 3-2. Two sensor processing pipelines


    ### 3.2.2 Dasarathy Model


    An elegant model to represent different levels of data fusion was proposed by
    Dasarathy (see references at the end of the chapter for the original proposal
    information). It represents different approaches to data fusion as a function
    of input and output data types, resulting in the following different types of
    fusion.


    - **Data In-Data Out (DAI-DAO)**: The `DAI-DAO` model represents the low-level
    fusion, where the sensor data from multiple sensors is fused together to produce
    a fused data representation for the rest of the recognition pipeline. The format
    of the resulting data can be the same as the input (in the case of fusing similar
    sensors), or an entirely new format (heterogeneous sensor fusion).


    - **Data In-Feature Out (DAI-FEO)**: In this model, the fusion engine takes as
    input the data from sources to be fused and produces as output a feature set that
    represents the combined information from the sensors. This hybrid approach sits
    between the low- and mid-level fusion approaches.


    - **Feature In-Feature Out (FEI-FEO)**: In the `FEI-FEO` model, the fusion engine
    combines pre-extracted features from different sensors. The output is a feature
    set combining the multiple feature inputs. This method represents mid-level sensor
    fusion.


    - **Feature In-Decision Out (FEI-DEO)**: In this context, “decision” refers to
    recognition of the sensor data. This method is a hybrid between the mid-level
    and high-level data fusion techniques. The fusion engine in this case takes features
    from different sensor pipelines as an input and combines these to provide the
    recognition (decision) output.


    - **Decision In-Decision Out (DEI-DEO)**: This model is the high-level sensor
    fusion model also referred to as semantic fusion by us in the discussion above.
    Typically, this kind of sensor fusion is the easiest type of fusion since we are
    not actually “fusing” anything. The fusion engine in most cases will “combine”
    the recognized information from the pipelines to come to a recognition decision.


    ### 3.2.3 Sensor Configuration Model


    Based on the sensor configuration model, multimodal sensor fusion can improve
    the functional accuracy of recognition through one of the following modes. Figure
    [3-6](#A978-1-4302-6593-1_3_Chapter.html#Fig6) illustrates the interaction between
    different sensor pipes for these modes.


    ![A978-1-4302-6593-1_3_Fig6_HTML.jpg](A978-1-4302-6593-1_3_Fig6_HTML.jpg)


    Figure 3-6. Fusion based on sensor collaboration model


    - **Complimentary Fusion**: In complementary sensor fusion, two or more sensors
    are used to recognize information that is not possible to be extracted from individual
    sensors alone. The sensor fusion has an additive effect in this case.


    - **Redundant Fusion**: In this mode, sensor fusion uses two or more sensors to
    provide information about the same underlying process to introduce redundancy
    in the recognition.


    - **Cooperative Fusion**: In cooperative sensor fusion, different information
    about the same underlying process is gathered using different sensors before being
    combined to get better recognition of the underlying process, as opposed to single
    sensor-based solutions.


    ## 3.3 Example Implementations


    In this section we present examples of the different flavors of multimodal sensor
    integration as described in the section above. We will use the audio and visual
    sensors as examples, but the approaches are extensible to other types of heterogeneous
    sensors as well.'
