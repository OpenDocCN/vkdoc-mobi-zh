  trans: '

    # 2.3 音频处理与识别——从声音到语音


    正如前一节所述，随着越来越多的手机/可穿戴设备/物联网设备开始利用音频传感器（即麦克风）来捕获高质量的音频数据，基于音频传感器的识别技术正变得越来越普及。在本节中，我们将深入探讨音频识别的实现方式，涵盖从音频分类到大词汇量语音识别的各个方面。首先，图
    2-12 展示了一个简单的音频与语音处理流程。


    ![A978-1-4302-6593-1_2_Fig12_HTML.gif](img/A978-1-4302-6593-1_2_Fig12_HTML.gif)


    图 2-12. 音频/语音识别各阶段


    让我们逐一梳理这些阶段，并研究其中使用的音频识别技术。在此之前，需要指出的是，处理音频进行识别的第一步是处理音频信号并提取关键特征。从音频中提取的最常见特征被称为`MFCCs`（梅尔频率倒谱系数）。计算`MFCCs`或其变体的方法有很多种。梅尔频率倒谱（`MFC`）代表了声音的功率谱，而系数（`MFCCs`）的计算过程是：首先对音频样本进行加窗处理，然后进行傅里叶变换，计算功率谱，映射到梅尔滤波器组，计算能量的对数，最后执行离散余弦变换以确定振幅。关于`MFCCs`的更多细节可在相关文献中找到（例如参考文献中由
    K. Prahlad 等人撰写的文章）。


    ## 2.3.1 音频分类


    我们首先介绍音频分类（见图 2-13），它主要关注非人类声音，试图理解并标记捕获到的声音。传统的音频分类方法是识别诸如`MFCCs`之类的关键特征，这些特征有助于将声音划分为不同类别，然后使用机器学习技术进行训练/分类。较新的技术尝试添加针对音频分类的额外特征，以提高准确性。其中一些技术可能特定于具体内容，但也有更通用的方法，例如参考文献中
    Breebart 等人在《音频分类特征》一文中描述的，增加时间波动以及粗糙度/响度/尖锐度等特征。一旦确定了特征集，就可以使用标准的机器学习分类技术。标准分类技术包括最近邻算法、贝叶斯算法、高斯混合模型（`GMM`）等。近年来，神经网络被用于实现音频分类的有监督和无监督方法。


    ![A978-1-4302-6593-1_2_Fig13_HTML.gif](img/A978-1-4302-6593-1_2_Fig13_HTML.gif)


    图 2-13. 音频分类示例


    ## 2.3.2 语音活动检测


    语音活动检测（`VAD`）指的是在音频捕获中检测人类声音。图 2-14 展示了通用的`VAD`处理流程。`VAD`通常用作触发信号，以进入语音识别的下一阶段，例如关键词识别或命令/控制。文献和商业解决方案中存在多种不同类型的`VAD`实现。例如，使用简单滤波器（如基音识别）的方法，以及使用`GMM`（高斯混合模型）、统计模型和基于能量的`VAD`等更复杂的方法。`VAD`面临的主要挑战之一是音频捕获中的噪声水平。因此，降噪和噪声消除技术通常与`VAD`解决方案紧密结合。在参考文献中，Man-Wai
    Mak 等人指出，降噪和消除背景信号是提高`VAD`解决方案准确性的关键。最终，语音活动检测器可以用来减少语音识别所需的处理量，因为它起到过滤器的作用。因此，优化解决方案以减少假阴性（即存在人声时却指示无人声）至关重要，而不是减少假阳性（即无人声时却指示有人声）。


    ![A978-1-4302-6593-1_2_Fig14_HTML.gif](img/A978-1-4302-6593-1_2_Fig14_HTML.gif)


    图 2-14. 语音活动检测示例

    '
- fmt: '### 2.3.3 Automatic Speech Recognition (ASR)


    Automatic speech recognition or `ASR` refers to the ability for a computer system
    to recognize human speech and convert it into text. `ASR` comprises of capabilities
    ranging from keyword recognition (`KR`), command and control (`CC`), and large
    vocabulary continuous speech recognition (`LVCSR`). `KR` is typically used as
    a trigger to wake up a system whereas `CC` as well as `LVCSR` is used as part
    of a session to either control an activity or do dictation of a text passage for
    email or other purposes. While keyword recognition can be implemented in a more
    custom manner, the general techniques for `KR`, `CC`, and `LVCSR` can be similar
    with the differences largely in the size of the vocabulary and grammar comprehension.
    Figure [2-15](#A978-1-4302-6593-1_2_Chapter.html#Fig15) shows the general speech
    recognition processing flow. Speech recognition can be implemented to be speaker-independent,
    where any speaker can interact with the system, or speaker-dependent where the
    system trains based on a specific user or set of users. Common speech recognizers
    or toolkits that are used for learning and exploration include CMU Sphinx ( [`http://cmusphinx.sourceforge.net/`](http://cmusphinx.sourceforge.net/)
    ) and Kaldi ( [`http://kaldi-asr.org/`](http://kaldi-asr.org/) ). Customized versions
    for specific targets such as mobile devices include PocketSphinx ( [`http://www.speech.cs.cmu.edu/pocketsphinx/`](http://www.speech.cs.cmu.edu/pocketsphinx/)
    ).


    ![A978-1-4302-6593-1_2_Fig15_HTML.gif](A978-1-4302-6593-1_2_Fig15_HTML.gif)


    Figure 2-15. Automatic speech recognition


    Traditional approaches to speech recognition are based on the use of `GMMs` (Gaussian
    Mixture Models) and `HMMs` (Hidden Markov Models). The key problem being solved
    is to figure out the most likely sequence of words based on the incoming sequence
    of acoustic observations. For example, the initial implementations of speech recognition
    employed the following key processing phases:


    *   **Feature Extraction**: The incoming speech signal is broken into frames of
    10ms each. Each 10ms sample is represented by a feature vector that comprises
    of 39 components.

    *   **GMM scoring**: To determine the senones in the speech and identify the best
    match, `GMM` scoring is performed on the feature vectors provided.

    *   **HMM processing**: The model of the speech requires `HMM` processing to determine
    the most likely sequence of sounds and words based on the provided vocabulary
    (lexical models and language models).


    Until recently, most (`LVCSR`) speech recognizers were based on the `GMM` + `HMM`
    approach. However, the performance of speech recognizers was not adequate to achieve
    mass adoption at high quality. Performance metrics for speech recognizer include
    word error rate, speed and overall accuracy. In order to address these, recent
    speech recognizers started exploring the use of weighted finite state transducers
    (`WFST`) and deep learning (neural network) for speech recognition.


    Neural networks are growing in importance for both speech and vision processing.
    Deep neural networks are essentially artificial neural networks with many hidden
    layers between the input and the output layer. `DNNs` replace the use of `GMMs`
    in speech recognition flow (see Figure [2-16](#A978-1-4302-6593-1_2_Chapter.html#Fig16)),
    moving it from `GMM` + `HMM` to `DNN` + `HMM` solutions. Most commercial offerings
    in speech recognition these days are based on deep neural networks because it
    improves the word error rate and overall accuracy of the system.


    ![A978-1-4302-6593-1_2_Fig16_HTML.gif](A978-1-4302-6593-1_2_Fig16_HTML.gif)


    Figure 2-16. Using deep neural networks in ASR


    Weighted Finite State Transducers are used to represent `HMMs` but provide additional
    information that could speed up the processing, since each edge in the directed
    graph is labeled with inputs, outputs, and weights. As a result, `WFST` is a rich
    mathematical framework that has uses beyond `HMMs` in natural language processing
    as well.


    ### 2.3.4 Natural Language Processing (NLP)


    `NLP` involves taking text from speech-to-text solutions or written text and trying
    to extract information or gain deeper understanding of the text in an automated
    fashion. The first step in `NLP` is to understand tokenize the text by understanding
    sentence construction and identifying word boundaries. Another important step
    is to use named entity recognition (`NER`) to categorize specific words into more
    general classes where appropriate. Figure [2-17](#A978-1-4302-6593-1_2_Chapter.html#Fig17)
    shows an example basic flow of `NLP`. During this process, individual words can
    also be assigned weights in relation to the type of `NLP` analysis being accomplished.


    ![A978-1-4302-6593-1_2_Fig17_HTML.gif](A978-1-4302-6593-1_2_Fig17_HTML.gif)


    Figure 2-17. Natural Language Processing example


    Once these initial processing phases are completed, machine learning techniques
    are applied to analyze the key aspects of text. For example, the emotion of the
    text (positive, negative, etc.) can be determined by analyzing the words in the
    text. The topic of the text can be identified by classifying the words in the
    text with the most likely topic association. The nature of the question asked
    in the text can also be determined for usage models such as what `Siri` and `Cortana`
    are targeted at.


    In the above section, we introduce the key aspects of audio/speech recognition,
    ranging from audio classification to voice activity detection to automatic speech
    recognition to natural language processing. We hope the overview of each of these
    areas provides an understanding of the key usages, the key components or algorithms
    used, and the considerations when developing such techniques. While we did not
    go into depth into the algorithms themselves, the reader should be able to identify
    which algorithms need further examination depending on the usage model of interest
    and the focus of the exercise.


    ## 2.4 Visual Processing and Recognition


    The visual recognition starts with a basic camera sensor that can capture both
    still images as well as video. Visual recognition, as described earlier, can include
    object recognition, gesture recognition, face recognition, scene recognition,
    anomaly detection and video summarization. In general, visual recognition follows
    the following basic process: feature extraction, descriptor generation and matching.
    Features are extracted from the image, and then they are summarized as a descriptor
    vector, following which they are compared against a pre-existing database of vectors
    for the recognition of interest. We will describe this process with some examples
    for each of the recognition categories stated above.'
