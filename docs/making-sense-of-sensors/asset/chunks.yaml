- fmt: '## 5.2 Relationship Extraction Methods


    The text-based relationship extraction methods can be broken down into different
    categories as shown in Figure [5-4](#A978-1-4302-6593-1_5_Chapter.html#Fig4).


    - knowledge-based relationship extraction

    - supervised relationship extraction

    - semi-supervised relationship extraction

    - distant supervision


    ![A978-1-4302-6593-1_5_Fig4_HTML.jpg](A978-1-4302-6593-1_5_Fig4_HTML.jpg)


    Figure 5-4. Types of relation extraction methods


    ### 5.2.1 Knowledge-based Relationship Extraction


    Knowledge-based relationship extraction methods rely on prior information of either
    the domain or the lexical and syntactic properties of the text.


    #### 5.2.1.1 Domain Dependent Relationship Extraction Methods


    The domain dependent knowledge-based relationship extraction methods are tailored
    to extract relationships for a particular domain of operation. For example, the
    methods are tailored to find relationships in sentences pertaining to cancer diagnosis,
    fruit tree diseases, migration pattern of birds, etc. Having the prior information
    about the domain of operation allows these methods to be highly customized for
    relationship extraction. Using pre-existing information from the sentences for
    the given domain, the methods can achieve high accuracy, since the patterns for
    relationship expression in a given domain are usually quite regular and well known.
    In a specific application domain, usually there is a finite number of ways entities
    and their relationships can be expressed in text. This makes training the methods
    to extract them very accurate.


    #### 5.2.1.2 Domain Independent Relationship Extraction Methods


    Also called lexico-syntactic pattern-based relationship extraction, these methods
    assume a set of patterns in the sentences that describe the relationships present
    in equivalent forms. The models extracting the relationships through this method
    are trained to recognize various sentence structures that represent the same relationship
    between entities in different but equivalent forms. The methods completely rely
    on the natural language and the syntactical structure of the sentences. Based
    on the grammatical sentence structures, the methods identify the entities and
    the relationship connecting them.


    #### 5.2.1.3 Performance of Knowledge-based Relationship methods


    Since the knowledge-based methods rely on prior knowledge of domain and/or the
    language lexicon and syntax, the performance of the methods is highly dependent
    on the size of the training set representing the rules based on the domain knowledge
    and the language structure. The performance of such algorithms as represented
    by precision and recall metrics exhibit the following properties:


    - Precision measures the amount of relations that are correctly identified among
    the given set of sentences. Generally, the knowledge-based relation extraction
    methods exhibit a high degree of precision. This follows from the fact that the
    knowledge-based relation extraction methods are trained with examples that depict
    the relationships through unambiguous sentence structures.

    - Recall measures the amount of relationships that were correctly identified out
    of the total available relationships in a test set. Knowledge-based relation extraction
    methods usually score low on the recall metric. This follows from the fact that
    the training methods cannot cover all possible variations of the sentence structures
    for relationship expression. More often, the rules do not consider a majority
    of the structures expressing a relationship leading to misidentification of many
    relationships as false.


    ### 5.2.2 Supervised Relationship Extraction


    Supervised relationship extraction methods rely on pretrained models to identify
    the named entities in a sentence and the task of relationship extraction is converted
    to one of classification. The supervised methods typically involve a preprocessing
    step that identifies the entities of interest and any connections between them.
    The connections are then processed through the classification methods to confirm
    predefined relationships as shown in Figure [5-5](#A978-1-4302-6593-1_5_Chapter.html#Fig5).


    ![A978-1-4302-6593-1_5_Fig5_HTML.jpg](A978-1-4302-6593-1_5_Fig5_HTML.jpg)


    Figure 5-5. Relationship extraction pipe


    At a high level the pipeline can be divided into the following parts based on
    the functionality.


    - The preprocessing stage is responsible for detecting the entities that may be
    part of a relationship. All such possible entities are identified using the knowledge
    of sentence structures (syntax) and natural language properties (semantics). Using
    this information helps to isolate the entities that may be candidates for relationship
    subject or predicate and also parts of the sentences that may be key to discovering
    the presence of the relationship. For example, given a sentence "John said Andy
    Grove was one of the founders of Intel Corporation," the preprocessing step might
    identify the entities "John, Andy Grove, and Intel" as the entities that may be
    participating in a relationship described by the part or the whole of the subsentence
    "was one of the founders of." Given these identifications, the next block formats
    the entities and the sentence in a format based on the type of classification
    stage used.

    - Classifiers are trained with both a positive and a negative set of training
    examples. The next subsections pages describe some of the popular methods for
    classification to extract relationships.


    #### 5.2.2.1 Feature-based Methods


    Feature-based methods express the entities and the sentences describing relationships
    as set of features. These features are usually a combination of the semantic and
    syntactic features extracted from the text.


    The syntactic features extracted include:


    - entities

    - types of entities

    - subsentences that may describe the relationships between the entities

    - number of entities and the number of words in the sentence

    - number and the sequence of words potentially describing the relationship


    Semantic features usually include the word paths between the entities.


    For the training of the feature-based classifiers, multiple positive and negative
    example feature sets are generated from sentences representing known relationship
    structures. These feature sets are then used to train the classifiers for determining
    the presence or absence of a pretrained relationship. This consideration also
    makes it very hard to choose the right features, since some features may represent
    parts of the sentence that are good indicators of the underlying relationship
    expression while others may be representing bad indicators.


    Feature-based methods completely rely on the human perception and labor at the
    training phase to identify as many positive and negative examples from text as
    possible. It is easy to notice, however, that such cases can lead to missing relationships
    in text that was not available at the training time. Since the language can represent
    a relationship in formats that span a large set, it is virtually impossible for
    feature-based training to cover all the possible cases.'
