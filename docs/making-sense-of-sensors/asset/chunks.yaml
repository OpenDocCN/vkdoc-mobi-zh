    ### 7.1.5 访问其他数据（众包或专家数据）


    在进行问答环节（语音示例）时，访问来自其他设备或先前收集的数据也可能很有用。因此，云平台在执行需要特定领域数据的问答任务时具有优势。如果数据是众包的，方法可以是分层的，其中本地网关可以提供一些上下文，但层次的最终根节点是云平台，所有众包数据都可以在其中聚合、处理和存储。


    ### 7.1.6 吞吐量与批处理


    在某些情况下，分析需要将大量数据一起收集和处理。例如，如果需要对某个事件进行转录，且该转录不需要实时完成，那么在云端处理比在边缘处理更合适。完整数据的可用性有助于更好地分析，包括对事件进行总结，以及为转录的各个部分提供更好的上下文。这类场景往往倾向于在云端执行，而非在边缘设备上本地执行。


    ### 7.1.7 安全性与隐私性


    隐私在决定本地处理还是云端处理方面起着重要作用。如果数据是敏感的，那么由于数据完整性丢失、数据暴露以及对安全漏洞的担忧等因素，倾向于本地处理的权重会很高。除了在边缘设备上进行本地处理之外，选择本地服务器还是公共云基础设施也取决于数据的敏感性以及有无可用的安全能力来对数据进行匿名化处理并防止其被滥用。


    ### 7.1.8 分层处理


    最终，本地边缘设备处理与云端处理之间的利弊权衡会趋于收敛，形成一种分层处理方式：部分处理在边缘完成，而在网关和云端完成的处理量则逐渐增加。分层的使用不仅限于基本的静态分区，也包括利用众多分布式节点的可用性以并行方式执行处理的动态方法。


    ## 7.2 端到端系统划分与架构


    图 7-2 说明了上述在端到端架构中三个平台之间进行工作负载划分的考虑因素。该图展示了上述因素如何影响边缘与云端之间数据处理位置的选择。


    ![A978-1-4302-6593-1_7_Fig2_HTML.gif](img/A978-1-4302-6593-1_7_Fig2_HTML.gif)


    **图 7-2.** 端到端系统架构示例


    随着我们进一步探索划分方法，深入了解端到端系统内的平台架构可能会很有意义。为此，我们将探讨五个不同的平台示例：(a) 简单传感器节点、(b) 可穿戴平台、(c)
    手机平台、(d) 网关平台和 (e) 云服务器平台。


    ### 7.2.1 传感器节点


    一个典型的基于微控制器的传感器节点架构如图 7-3 所示。这种平台通常包含一个微控制器芯片，以及外部传感器、电池，可能还有一个外部通信芯片。当前的增长趋势是将通信功能集成到微控制器
    `SoC`（片上系统）中。


    ![A978-1-4302-6593-1_7_Fig3_HTML.gif](img/A978-1-4302-6593-1_7_Fig3_HTML.gif)


    **图 7-3.** 传感器节点平台架构示例


    在微控制器 `SoC` 内部，有一个用于嵌入式处理的控制器核心，以及内存、嵌入式存储和传感器接口。除了嵌入式核心外，还可能有额外的专用逻辑或引擎，用于在设备本地进行传感器处理。专用逻辑的类型在很大程度上取决于用途，但范围涵盖从数字信号处理到安全（加密）处理、媒体处理、模式匹配等。这些平台通常针对超低功耗（尤其是漏电功耗）进行优化，以便在大部分非活跃使用场景下延长电池寿命。


    ### 7.2.2 可穿戴平台


    另一种新兴且日益复杂的平台类型是可穿戴平台。可穿戴平台架构看起来与传感器节点架构相似，不同之处在于其核心运行频率更高。它可能有两个核心，一个用于提供更高性能，另一个用于低功耗的始终在线处理。这类架构通常还倾向于拥有更多用于
    `DSP`（数字信号处理）、安全和其他功能的专用逻辑。此外，与简单的传感器节点相比，可穿戴平台具有更强的通信和内存/存储能力。


    图 7-4 展示了简单传感器平台与可穿戴平台之间的主要区别。一个简单的传感器节点可能主要运行写入其中的裸机代码，从而使某个功能执行得极为高效。可穿戴平台则变得越来越复杂，可能会运行嵌入式操作系统以提供更丰富的功能。可穿戴设备也可能有显示屏接口，尤其是智能手表等设备。虽然这些显示屏相当小，但它们仍然提供了丰富的用户界面，用于访问不同的微应用和面向消费者用途的服务。


    ![A978-1-4302-6593-1_7_Fig4_HTML.gif](img/A978-1-4302-6593-1_7_Fig4_HTML.gif)


    **图 7-4.** 从传感器节点到可穿戴平台


    可穿戴设备上的关键通信能力包括蓝牙，可能还有 Wi-Fi 能力。蓝牙提供了在短距离内构建个人局域网的能力。最近，低功耗蓝牙（BLE）以超低功耗和能量实现了最小化的蓝牙通信。几乎所有在手机上运行的操作系统都支持蓝牙和
    BLE 能力，以便实现与可穿戴平台的连接。通过这种方式，手机可以在日常生活中作为可穿戴设备更强大的集线器使用。蓝牙提供了从医疗保健、健身、耳机到其他领域的专用
    profile。除了蓝牙之外，更强大的可穿戴平台最近开始实现 Wi-Fi 能力，以在家庭环境中提供更高带宽，但代价是功耗增加。随着可穿戴平台包含更高带宽的传感器（如音频和视频），这类能力变得很有用。

    '
- fmt: '### 7.2.3 Phone Platform


    The next major platform example is the phone platform. Today’s phone platforms
    are very powerful, with multiple (potentially heterogeneous) cores, special purpose
    engines including graphics, connectivity capabilities, and significant memory
    and storage capabilities. Figure [7-5](#A978-1-4302-6593-1_7_Chapter.html#Fig5)
    shows an example of a mobile platform architecture that consists of the above
    key capabilities.


    ![A978-1-4302-6593-1_7_Fig5_HTML.gif](A978-1-4302-6593-1_7_Fig5_HTML.gif)


    Figure 7-5. Heterogeneous mobile platform architecture


    A smart phone platform has multiple usage dimensions, including: (a) rich visual
    experience with social media, video, and other playback capabilities, (b) rich
    communications experience with many cloud applications, (c) rich sensing capabilities
    with both external hard sensors, as well as soft sensing such as access to browsing,
    mail, and other user activities, and (d) rich application experience, with many
    available applications downloaded from a cloud store. In order to support all
    of these experiences, but within a form factor and battery life constraint, the
    architecture supports multiple levels of operation from always-on sensing to power-efficient
    light activity to high performance processing when required.


    In order to support low-power execution, special purpose engines are developed
    and integrated into a phone platform for all of the important subsystems: (i)
    imaging, (ii) graphics and media processing, (iii) crypto processing, (iv) audio
    processing as well as speech recognition, (v) visual processing, and (vi) communications
    capabilities that include Bluetooth, Wi-Fi, and cellular subsystems. In addition,
    the phone platform also typically integrates a sensor hub to process rich sensor
    data from motion, location, audio, and vision at a low power profile. The smart
    phone platform has access to large memory and storage subsystems. In summary,
    a smart phone platform today is equivalent in compute capabilities to a small
    supercomputer from almost 25 years ago. This is especially evident when looking
    at the increasing core count in smart phone platforms and the continuous addition
    of memory and storage within the platform.


    ### 7.2.4 Gateway Platform


    Our next platform description is for a gateway or hub platform. A gateway or hub
    platform has multiple processing cores, communications functionality that includes
    router capabilities along with media processing, and security as a key focus,
    especially if it is a hub platform or a set-top box in a home-like setting. In
    addition, it usually integrates a significant amount of memory and storage to
    handle a large amount of media, multiple simultaneous communication streams, and
    metadata storage. For set-top box-like capability, the ability to interface with
    digital cable as well as large displays becomes crucial and therefore the amount
    of processing, storage, and special purpose functionality increases further.


    ![A978-1-4302-6593-1_7_Fig6_HTML.gif](A978-1-4302-6593-1_7_Fig6_HTML.gif)


    Figure 7-6. Gateway or hub platform architecture


    Such a platform is typically not battery-operated (unlike devices discussed in
    this section previously) and therefore the gateway/hub is typically always wall-powered
    and available for processing at high performance. Employing such platforms as
    part of an end-to-end system architecture provides the opportunity to offload
    processing from the sensor/phone edge device to a central device like the gateway
    for both aggregation as well as high performance processing (saving battery power).
    At the same time, the gateway/hub can provide the benefits of low interactive
    latency since it is within the premise with high bandwidth communications capabilities
    like Wi-Fi.


    ### 7.2.5 Cloud Server Platform


    Last but not least, we should also walk through the capabilities of a commercial
    server residing within a cloud datacenter. Traditionally, server platforms have
    a large number of cores (16-48 for example) and run at high performance, especially
    when it comes to throughput. Since multiple server platforms are in the cloud,
    the ability exists not only to do parallel processing within the server but also
    to accomplish parallel processing amongst multiple server machines within a cluster
    or within the overall datacenter. A simplistic description of a server platform
    architecture is shown in Figure [7-7](#A978-1-4302-6593-1_7_Chapter.html#Fig7)
    (top).


    ![A978-1-4302-6593-1_7_Fig7_HTML.gif](A978-1-4302-6593-1_7_Fig7_HTML.gif)


    Figure 7-7. Cloud server platform architectures


    More recent server architectures are attempting to provide customization for even
    high power-efficient performance. This includes the integration of programmable/reconfigurable
    logic like `FPGAs` (Field Programmable Gate Arrays) as well as other accelerators
    such as `GPUs` (Graphics Processor Units) and domain-specific engines.


    As is probably evident in the picture in Figure [7-7](#A978-1-4302-6593-1_7_Chapter.html#Fig7),
    the abundance of high performance cores illustrates the higher compute capabilities
    of servers as compared to edge devices or gateways. Servers typically run within
    the power constraint of several 100 Watts as compared to phones which run at Watts
    and wearables or sensor nodes which are sub-Watt in battery life/capacity.


    ## 7.3 End-to-End Processing & Mapping Examples


    The above description of each of the platforms hopefully illustrates the reason
    why an end-to-end system architecture is needed to accomplish a rich experience
    like visual recognition and processing. In order to delve into this further, let
    us consider three examples of processing: (a) speech processing, (b) visual processing,
    and (c) machine learning and classification tasks. These will further provide
    a current understanding of where certain tasks can be performed based on the considerations
    described earlier in this chapter. Let’s start with speech processing.'
