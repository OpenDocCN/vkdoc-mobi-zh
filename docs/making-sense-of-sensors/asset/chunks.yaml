- fmt: '# Microsoft’s Satori


    Microsoft is actively building a knowledge representation repository called `Microsoft
    Satori`. Currently the repository contains more than a billion objects and relationships
    collected over multiple years. The main source of the knowledge is web data obtained
    using crawlers like the ones used by the search engine `Bing`. Similar to Google’s
    Knowledge Graph, the aim of `Satori` is to understand the user requirements and
    provide intelligent assistance based on understanding of entity relationships.
    `Satori` utilizes sources like `Freebase` and `Wikipedia` to build the knowledge
    base. Like `NEIL`, the approach to knowledge building is automatic and the engine
    keeps running off a farm of servers (50,000+) to find new relationships and analyze
    the existing knowledge for new connections.


    Since the main target vehicle for `Satori` for usages is `Bing`, Microsoft is
    targeting the initial usages for recommendations by the browser. For example,
    the browser uses `Satori` for exploring different relationships to suggest possible
    vacation itineraries as well as things to do in different places to the users.
    Currently the browser offers “at-a-glance” answers and “snapshots” about the people,
    places, and things in search results. It also “auto-suggests” as users type to
    help disambiguate queries and get to answers more quickly.


    The process involves understanding the general concepts as described by common
    sense and integrating that with domain-specific instantiations and relationships.


    # Google’s Knowledge Graph


    Google has made it public that it intends to provide a semantic search capability
    that exploits the relationships in the different forms from web pages. The data
    for these relationships can come from text, images, and video. Leveraging their
    cache of web data, Google has created a large knowledge graph from products like
    `Maps`, `Finance`, `Movies` and `Music`. As the search engine crawls for new data,
    the search engine returns data that is analyzed for inclusion in the ever-going
    rich knowledge graph. We can experience the semantic search operation at work
    when we are using Google to look for something and it tries to first understand
    what we might be searching for using machine learning (autocomplete, `Google Next`)
    and then returns results that are not just web pages but a human readable form
    of an answer (Figure [6-7](#A978-1-4302-6593-1_6_Chapter.html#Fig7)).


    ![A978-1-4302-6593-1_6_Fig7_HTML.jpg](A978-1-4302-6593-1_6_Fig7_HTML.jpg)


    Figure 6-7.


    Google understands a user query and responds with answers vs. webpage pointer
    (`www.google.com`)


    # Wolfram Alpha


    `Wolfram Alpha` is a knowledge engine with a search API built completely for answering
    queries with semantic responses. Unlike other commercial search engines that have
    started utilizing the data they have for generating knowledge, `Wolfram Alpha`
    was designed with the goal of generating knowledge from web resources and providing
    both commercial and non-commercial users access to this data for their applications.
    The result is a web tool that actually answers user’s questions by traversing
    the knowledge-based graph it has built (Figure [6-8](#A978-1-4302-6593-1_6_Chapter.html#Fig8)).


    ![A978-1-4302-6593-1_6_Fig8_HTML.jpg](A978-1-4302-6593-1_6_Fig8_HTML.jpg)


    Figure 6-8.


    `Wolfram Alpha` query example (`https://www.wolframalpha.com/`)


    Total data stored by `Wolfram Alpha`’s knowledge engine currently exceeds 10 trillion
    entities and relationships. The number of algorithms and models used to work on
    the data exceeds 50,000.


    The search engine works continuously in the background to discover new data and
    relationships. It currently can answer your questions, teach you music, compare
    books, and give you semantic weather information. `Wolfram Alpha`’s engine has
    been integrated with many popular search engines.


    # Facebook’s Entity Graph


    Similar to Google, Facebook has a lot of data provided by the users as part of
    their profile and interactions using the social network. Facebook’s `Entity Graph`
    is based on this information. During its initial days, the company used to keep
    user information as a simple text-based data store. In recent times, it has realized
    the power of relating the data to each other and has switched from plain text
    representation to a structured representation of the user’s social data. Having
    the ability to represent the user information and various social relationships
    in a knowledge-based graph (called `Entity Graph` by Facebook) enables the company
    to provide rich services to the users by suggesting new connections based on existing
    social connections and user preferences. The `Entity Graph` is also used for providing
    contextual search results on the social networking site. For example, when you
    search for a name on Facebook, the site operates on the structured data provided
    by the `Entity Graph` and the results returned are ranked according to the best
    fit for you based on your social connections and activity.


    # Apple’s Siri


    Apple’s widely popular personal assistant `Siri` is built on the semantic search
    abilities provided by engines like `Wolfram Alpha`.


    # Semantic Web


    We end this chapter with a very brief introduction to the concepts of the semantic
    web. Currently, most of the World Wide Web is a syntactical collection of documents,
    i.e., the web pages express concepts and ideas that stand fairly independently
    from other ideas on other web pages. Of course, the syntax allows for explicit
    hyperlinking of entities between the web pages.


    This kind of syntactical structure is easy for humans to understand, but the evolution
    of intelligent machines raises the need for a web that can be understood by the
    machines as well. Humans can parse the syntactical web effectively because the
    concepts of definitions and descriptions are inherently understood by us. A statement
    like “the cat jumped over a chair” makes sense to a human because we know what
    “cat,” “jump,” and “chair” mean. A machine parsing such a sentence, however, needs
    to know these concepts before it can make sense of the relationship between the
    entities in the sentence `<cat, jumped over, chair>`. The current syntactic web
    is a collection of documents where the computers do the presentation and the humans
    provide the links between the information. The primary aim is the consumption
    of information by the humans. Unique identities on the web are reserved for the
    documents in the form of `URLs` (Universal Resource Locators), also called web
    addresses, like `www.intel.com`.


    Current syntactical web layout makes it extremely difficult to process queries
    requiring background knowledge of the context, locate information that needs to
    combine multiple sources, reason about information from different web pages, etc.
    The root of the problem with the syntactical web is that all the embedded metadata
    in the web pages concentrates on the display properties only (font, placement,
    etc.) and none of the relationship information to other entities on the web is
    available for interpretation.


    The semantic web is an attempt to make the web machine readable by providing access
    to information that can aid in making semantic sense of the web content. The start
    of this effort has been made by adding semantic annotations to the already existing
    content on the web. Before any such annotation can be used to describe concepts,
    it is important to agree on the “meanings” of the concepts and objects being described.
    This is done on the semantic web through the use of ontologies.'
