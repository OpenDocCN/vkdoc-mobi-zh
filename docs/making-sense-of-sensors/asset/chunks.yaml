    # 4.6 表示上下文


    至此，我们已经理解了上下文在识别中的必要性和重要性。本节将探讨在实际系统中有效利用上下文进行识别所面临的问题。两个主要问题是：


    1.  上下文的简单表示

    2.  能够提取并利用此类上下文的算法


    虽然方法的详细讨论留待后续章节，但我们在此简要探讨如何进行上下文的表示。简而言之，上下文表示归结为不同对象与场景之间的关系问题。类似于第一章讨论的基于三元组的关系重定向，上下文可以表示为场景中不同实体之间的关系，或者对象与场景描述本身之间的关系。图
    4-4 展示了实体与海滩场景之间，以及场景与对象本身之间的两种不同关系。


    ![A978-1-4302-6593-1_4_Fig4_HTML.jpg](img/A978-1-4302-6593-1_4_Fig4_HTML.jpg)


    **图 4-4.** 表示上下文关系


    这些关系也可以组合起来，呈现场景特定上下文的综合视图，如图 4-5 所示。


    ![A978-1-4302-6593-1_4_Fig5_HTML.jpg](img/A978-1-4302-6593-1_4_Fig5_HTML.jpg)


    **图 4-5.** 推导复杂的上下文关系


    当然，这只是上下文表示的一种形式，研究和实现中还存在着许多其他可能的变体。读者可参考相关文献以获取更多细节。


    不同的上下文关系具有不同的强度。例如，空间关系并不总是严格的（如`键盘`与`显示器`vs.`壁炉`与`地面`）。通常，关系越强，基于上下文的识别就越容易。


    ## 4.7 场景理解的总结性思考


    对于从图像中理解场景而言，底层场景的身份可以通过低层聚合特征统计来估测。场景识别领域最先进的方法包括将场景作为一个整体来表示，而不是将其分割成各个组成部分。这些方法也是许多上下文对象识别系统的基础。全局表示已被证明在场景识别中出奇地有效。


    ### 4.7.1 识别的显著性 vs 上下文


    在对象检测方面，场景上下文的影响大于场景显著性。上下文会将注意力引导至相关区域，而显著性则会将异常点凸显出来。由上下文相关对象组成的场景，其整体意义远大于各个对象的简单相加。


    ## 4.8 总结


    在本章中，我们探讨了上下文在有效识别和理解中的作用。上下文对于有效识别至关重要，因为它能提升应用和平台性能，并且是弥合人类感知与机器理解之间差距的重要一步。使用上下文可以在错误识别（或无法识别）与正确识别之间产生决定性差异。我们讨论了表示上下文的方法，并概述了关系表示如何成为实现高效上下文表示与使用的基石。在下一章中，我们将重点探讨如何从场景中提取上下文关系，以及表示关系的技术。


    # 5. 提取与表示关系


    在不同已识别实体之间提取关系，定义了知识处理流程中继识别之后的第二级操作。识别侧重于从传感器数据中识别并标记单个实体，而关系则明确展示了实体之间的连接方式。


    第 4 章展示了一些关于上下文关系如何在实体中体现的例子。下图 5-1 类似于图 4-4，展示了实体之间的“主语-谓语-宾语”关系。该图表明，作者和咖啡通过一个实体（作者）喜欢另一个实体（咖啡）这一事实相关联。


    ![A978-1-4302-6593-1_5_Fig1_HTML.jpg](img/A978-1-4302-6593-1_5_Fig1_HTML.jpg)


    **图 5-1.** 上下文如何决定关系


    为了从高层次理解关系提取方法，我们将重点放在基于文本的关系提取方法上。理解关系提取的最佳途径是借助文本示例，因为许多其他模态在识别后都会转换为文本。


    此外，许多从视频和语音等模态直接提取关系的方法都源于文本关系提取。我们将展示一个从视频中提取关系的示例。


    ## 5.1 从文本中提取关系的高层视角


    如前所述，在最基本的层面上，关系就是连接两个（已识别的）实体的桥梁。一阶关系通过一个谓词连接两个实体。高阶关系则通过多个谓词连接一个或多个实体。


    图 5-2 展示了一阶关系的示例。至于高阶关系的例子，可以考虑在餐厅点餐和选酒的问题。在这种情况下，理想的关系会连接一个人的食物偏好、可用选项以及最合适的葡萄酒搭配。


    ![A978-1-4302-6593-1_5_Fig2_HTML.jpg](img/A978-1-4302-6593-1_5_Fig2_HTML.jpg)


    **图 5-2.** 关系示例


    在本章中，我们将主要侧重于提取一阶关系。为了理解基于文本的关系提取方法，我们假设关系嵌入在包含实体的句子中，并且关系的描述可以通过句子（隐式或显式地）获得。提取关系的方法要么依赖于使用预训练的关系结构信息，要么动态学习结构以揭示关系。


    文本句子的结构对于关系提取算法的性能至关重要。大多数算法要么依赖于句子的句法意义，要么依赖于句子中单词的结构。这意味着，如果后续阶段将使用基于文本的关系提取器，那么识别方法输出结构良好的文本就显得非常重要。我们将在本章后面讨论一个基于视频的场景理解方法如何输出此类信息的示例。


    更正式地说，给定一个句子，关系被定义为元组 `t = (e_1, e_2, …, e_n)`，其中 `e_i` 是参与预定义关系 `r` 的实体。关系提取器的任务可以分解为以下几个部分：


    -   识别关系中的相关实体。

    -   识别每个参与关系实体的角色。


    如图 5-3 所示，对于文本关系提取任务，这分解为非结构化和结构化文本分析两个阶段。在非结构化文本分析阶段，算法处理句子语义，以识别句子中不同的语法和句法成分。结构化阶段通常从识别关系中的参与实体开始，随后进行关系检测和结果表达。


    ![A978-1-4302-6593-1_5_Fig3_HTML.jpg](img/A978-1-4302-6593-1_5_Fig3_HTML.jpg)


    **图 5-3.** 关系提取中的非结构化与结构化部分

