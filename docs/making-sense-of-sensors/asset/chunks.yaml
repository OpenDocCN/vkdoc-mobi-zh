- fmt: "# Introducing the Pipeline\n\nThe electronic world today is full of (a) sensors\
    \ collecting data from various sources and (b) applications using this data for\
    \ various uses. Our smart phones contain cameras, motion sensors, temperature\
    \ sensors, microphones, GPS sensors, etc. Smart watches contain these sensors\
    \ and more, like heart rate sensors, body temperature monitors, etc. The devices\
    \ that we do not carry with us have sensors that monitor the environment, like\
    \ the smart thermostats that can monitor if people are home for automatic temperature\
    \ control, and cameras, including face detection for intrusion monitoring. While\
    \ the world of sensors and associated sense-making seems to be getting crowded,\
    \ intelligent, and highly complex, to understand the inner structure of this world\
    \ one needs to know a few fundamental principles and flows. This book will use\
    \ a few specific examples to illustrate these concepts in detail. In this chapter\
    \ we present a high-level view and a taste of things to come later in this book.\n\
    \n## Motivation\n\nReaders who are curious about how the sensors collect environmental\
    \ and behavioral information about us and how that information is processed to\
    \ provide services useful for us will find the book helping them with concepts\
    \ as well as pointers to build some of the basic solutions on their own. Understanding\
    \ that all these complex services are built on similar fundamental principles\
    \ is the foundational step toward this process.\n\nAs an example, consider a complex\
    \ Advanced Driver Assistance System (ADAS) for automobiles (Figure [1-1](#A978-1-4302-6593-1_1_Chapter.html#Fig1)).\
    \ It uses a set of sensors like cameras, motion sensors, etc. to provide a driver\
    \ with assistance for safety and comfort. One of the uses is to automatically\
    \ track the position of a car in the traffic lanes and provide audible warnings\
    \ in case the car drifts from its lane (Lane Departure Warning). This highly complex\
    \ system works on the fundamental processing principles of Internet of Things\
    \ (IoT) comprising of sensors collecting data (cameras, motion sensors), algorithms\
    \ recognizing the data (relative position of the car in the lane, car drift),\
    \ and applications acting on the recognized data (audible warning on/off). This\
    \ flow shown in Figure [1-1](#A978-1-4302-6593-1_1_Chapter.html#Fig1) is the basic\
    \ foundation for all the complex processing pipelines of sensor data as will become\
    \ clear through various chapters in the book.\n\n![A978-1-4302-6593-1_1_Fig1_HTML.jpg](A978-1-4302-6593-1_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1. Stages in sensor data processing and applications\n\nAs another\
    \ example consider the automatic voice-based personal assistance provided by the\
    \ smartphones and other devices. In such usages, a user activates the system with\
    \ a voice command and then asks a query like, “What is the weather going to be\
    \ like tomorrow?” The system “magically” understands the question and provides\
    \ a verbal answer to the query. At the heart of this complex system is the now-familiar\
    \ (sense, recognize, act) methodology. The microphone senses our speech, the recognition\
    \ system “understands” our intention and the action is taken to satisfy the request.\n\
    \nThe following chapters in this book aim to provide the readers with a high-level\
    \ view of the steps it takes to process data collected by various sensors for\
    \ it to be useful for various applications. We will understand the logical steps\
    \ needed to convert data to knowledge and deep-dive into some specific implementations\
    \ that will make it easy for the readers to “play” with the code and data to understand\
    \ the details of the implementation.\n\nAt a very high level, the data captured\
    \ from the physical world goes through the three stages shown in Figure [1-2](#A978-1-4302-6593-1_1_Chapter.html#Fig2)\
    \ in order to become actionable knowledge.\n\n![A978-1-4302-6593-1_1_Fig2_HTML.jpg](A978-1-4302-6593-1_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2. Data lifecycle stages\n\nThe first stage shows the data captured\
    \ by various sensing devices (video, audio, pressure, motion, temperature, etc.).\
    \ The data is raw (unprocessed) and combined with noise of various types and needs\
    \ to be cleaned, filtered, and represented in a structured manner in order to\
    \ be useful for analysis and processing. Assume, for the present discussion, that\
    \ all these processing steps are represented by the data block in the Figure [1-2](#A978-1-4302-6593-1_1_Chapter.html#Fig2).\n\
    \nThe data by itself is a series of single measurements at specific periods in\
    \ time. To understand what the data is actually “telling,” an observer needs to\
    \ extract the semantics in the data. For example, while an ambient temperature\
    \ reading of 100° F by itself tells us the absolute temperature sampled by a thermal\
    \ sensor, its semantics are not immediately understood. Coupling this information\
    \ with the fact (assumed) that the measurement was taken near a glacier in Alaska\
    \ in winter with previous measurements gradually increasing in magnitude gives\
    \ us a contextual and semantic understanding that something unusual is happening\
    \ at the location of measurement.\n\nUnderstanding the semantics embedded in the\
    \ data allows us to grasp the significance of data in context. In addition, the\
    \ semantic relationship to other facts understood so far can be understood. These\
    \ relationships form the basis of “knowledge.” As a very simplistic example, in\
    \ the instance of the temperature reading above, a correlation with another event\
    \ like a major forest fire can provide the understanding for the underlying cause\
    \ of the anomalous temperature reading.\n\nOne of the facts embedded in the example\
    \ discussion above is that “knowledge feeds on itself,” i.e., the system can know\
    \ that the high temperatures in Alaska are an anomaly if it already “knows” that\
    \ typically the weather in Alaska is cooler. So we can redraw the Figure [1-2](#A978-1-4302-6593-1_1_Chapter.html#Fig3)\
    \ as shown in Figure [1-3](#A978-1-4302-6593-1_1_Chapter.html#Fig3) with a feedback\
    \ loop in the knowledge builder.\n\n![A978-1-4302-6593-1_1_Fig3_HTML.jpg](A978-1-4302-6593-1_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3. Iterative knowledge model\n\nKnowledge refers to an aggregate of\
    \ the semantic information extracted from the sensor data arranged in a manner\
    \ that the relationships are extended over the entire knowledge base through links\
    \ that build over time as more and more semantic information is available. There\
    \ are two main structural parts to the knowledge management task:\n\n1.  **Knowledge\
    \ representation**: Knowledge needs to be stored and represented in a manner such\
    \ that the semantic information and relationships between various concepts is\
    \ retained and is modifiable. The modifications to the knowledge include addition\
    \ of new information and entities, including changes in the current relationships\
    \ or representations catalyzed by new data.  \n2.  **Knowledge operations**: These\
    \ include tools, APIs, and programming languages to insert and extract data from\
    \ the knowledge database. Knowledge storage needs to provide means to insert a\
    \ new relationship at the correct place in the existing knowledge database. This\
    \ involves understanding the incoming semantic data and providing a mechanism\
    \ to find and manipulate the correct relationships. The extraction process involves\
    \ responding to different queries targeting relationships between different entities\
    \ and concepts. The input to the extractor is an incomplete relationship description\
    \ and the output fills in the gaps in the description. The extractor needs to\
    \ support a logical language that can mathematically represent queries like, “What\
    \ wine should I order with grilled chicken and restaurant X?” and provide a mechanism\
    \ to walk the knowledge database to obtain the answer."
  raw: '# 1. Introducing the Pipeline


    The electronic world today is full of (a) sensors collecting data from various
    sources and (b) applications using this data for various uses. Our smart phones
    contain cameras, motion sensors, temperature sensors, microphones, GPS sensors,
    etc. Smart watches contain these sensors and more, like heart rate sensors, body
    temperature monitors, etc. The devices that we do not carry with us have sensors
    that monitor the environment, like the smart thermostats that can monitor if people
    are home for automatic temperature control, and cameras, including face detection
    for intrusion monitoring. While the world of sensors and associated sense-making
    seems to be getting crowded, intelligent, and highly complex, to understand the
    inner structure of this world one needs to know a few fundamental principles and
    flows. This book will use a few specific examples to illustrate these concepts
    in detail. In this chapter we present a high-level view and a taste of things
    to come later in this book.


    ## 1.1 Motivation


    Readers who are curious about how the sensors collect environmental and behavioral
    information about us and how that information is processed to provide services
    useful for us will find the book helping them with concepts as well as pointers
    to build some of the basic solutions on their own. Understanding that all these
    complex services are built on similar fundamental principles is the foundational
    step toward this process.


    As an example, consider a complex Advanced Driver Assistance System (ADAS) for
    automobiles (Figure [1-1](#A978-1-4302-6593-1_1_Chapter.html#Fig1)). It uses a
    set of sensors like cameras, motion sensors, etc. to provide a driver with assistance
    for safety and comfort. One of the uses is to automatically track the position
    of a car in the traffic lanes and provide audible warnings in case the car drifts
    from its lane (Lane Departure Warning). This highly complex system works on the
    fundamental processing principles of Internet of Things (IoT) comprising of sensors
    collecting data (cameras, motion sensors), algorithms recognizing the data (relative
    position of the car in the lane, car drift), and applications acting on the recognized
    data (audible warning on/off). This flow shown in Figure [1-1](#A978-1-4302-6593-1_1_Chapter.html#Fig1)
    is the basic foundation for all the complex processing pipelines of sensor data
    as will become clear through various chapters in the book.


    ![A978-1-4302-6593-1_1_Fig1_HTML.jpg](A978-1-4302-6593-1_1_Fig1_HTML.jpg)


    Figure 1-1.


    Stages in sensor data processing and applications


    As another example consider the automatic voice-based personal assistance provided
    by the smartphones and other devices. In such usages, a user activates the system
    with a voice command and then asks a query like, “What is the weather going to
    be like tomorrow?” The system “magically” understands the question and provides
    a verbal answer to the query. At the heart of this complex system is the now-familiar
    (sense, recognize, act) methodology. The microphone senses our speech, the recognition
    system “understands” our intention and the action is taken to satisfy the request.


    The following chapters in this book aim to provide the readers with a high-level
    view of the steps it takes to process data collected by various sensors for it
    to be useful for various applications. We will understand the logical steps needed
    to convert data to knowledge and deep-dive into some specific implementations
    that will make it easy for the readers to “play” with the code and data to understand
    the details of the implementation.


    At a very high level, the data captured from the physical world goes through the
    three stages shown in Figure [1-2](#A978-1-4302-6593-1_1_Chapter.html#Fig2) in
    order to become actionable knowledge.


    ![A978-1-4302-6593-1_1_Fig2_HTML.jpg](A978-1-4302-6593-1_1_Fig2_HTML.jpg)


    Figure 1-2.


    Data lifecycle stages


    The first stage shows the data captured by various sensing devices (video, audio,
    pressure, motion, temperature, etc.). The data is raw (unprocessed) and combined
    with noise of various types and needs to be cleaned, filtered, and represented
    in a structured manner in order to be useful for analysis and processing. Assume,
    for the present discussion, that all these processing steps are represented by
    the data block in the Figure [1-2](#A978-1-4302-6593-1_1_Chapter.html#Fig2).


    The data by itself is a series of single measurements at specific periods in time.
    To understand what the data is actually “telling,” an observer needs to extract
    the semantics in the data. For example, while an ambient temperature reading of
    100° F by itself tells us the absolute temperature sampled by a thermal sensor,
    its semantics are not immediately understood. Coupling this information with the
    fact (assumed) that the measurement was taken near a glacier in Alaska in winter
    with previous measurements gradually increasing in magnitude gives us a contextual
    and semantic understanding that something unusual is happening at the location
    of measurement.


    Understanding the semantics embedded in the data allows us to grasp the significance
    of data in context. In addition, the semantic relationship to other facts understood
    so far can be understood. These relationships form the basis of “knowledge.” As
    a very simplistic example, in the instance of the temperature reading above, a
    correlation with another event like a major forest fire can provide the understanding
    for the underlying cause of the anomalous temperature reading.


    One of the facts embedded in the example discussion above is that “knowledge feeds
    on itself,” i.e., the system can know that the high temperatures in Alaska are
    an anomaly if it already “knows” that typically the weather in Alaska is cooler.
    So we can redraw the Figure [1-2](#A978-1-4302-6593-1_1_Chapter.html#Fig3) as
    shown in Figure [1-3](#A978-1-4302-6593-1_1_Chapter.html#Fig3) with a feedback
    loop in the knowledge builder.


    ![A978-1-4302-6593-1_1_Fig3_HTML.jpg](A978-1-4302-6593-1_1_Fig3_HTML.jpg)


    Figure 1-3.


    Iterative knowledge model


    Knowledge refers to an aggregate of the semantic information extracted from the
    sensor data arranged in a manner that the relationships are extended over the
    entire knowledge base through links that build over time as more and more semantic
    information is available. There are two main structural parts to the knowledge
    management task:


    1.  Knowledge representation : Knowledge needs to be stored and represented in
    a manner such that the semantic information and relationships between various
    concepts is retained and is modifiable. The modifications to the knowledge include
    addition of new information and entities, including changes in the current relationships
    or representations catalyzed by new data.  

    2.  Knowledge operations : These include tools, APIs, and programming languages
    to insert and extract data from the knowledge database. Knowledge storage needs
    to provide means to insert a new relationship at the correct place in the existing
    knowledge database. This involves understanding the incoming semantic data and
    providing a mechanism to find and manipulate the correct relationships. The extraction
    process involves responding to different queries targeting relationships between
    different entities and concepts. The input to the extractor is an incomplete relationship
    description and the output fills in the gaps in the description. The extractor
    needs to support a logical language that can mathematically represent queries
    like, “What wine should I order with grilled chicken and restaurant X?” and provide
    a mechanism to walk the knowledge database to obtain the answer.'
  trans: '

    # 管道简介


    当今的电子世界充满了（a）从各种来源收集数据的传感器，以及（b）将这些数据用于各种用途的应用程序。我们的智能手机包含摄像头、运动传感器、温度传感器、麦克风、GPS
    传感器等。智能手表包含这些传感器以及更多，例如心率传感器、体温监测器等。我们不随身携带的设备则配备了监测环境的传感器，例如可以监测家中是否有人以实现自动温控的智能恒温器，以及用于入侵监测的摄像头（包括面部识别）。虽然传感器及其相关的意义构建世界似乎正变得日益拥挤、智能且高度复杂，但要理解这个世界的内部结构，人们需要了解一些基本原理和流程。本书将通过几个具体示例详细说明这些概念。在本章中，我们将呈现一个高层级的概览，并让读者初步领略本书后续内容。


    ## 动机


    对于那些好奇传感器如何收集我们周围环境和行为信息，以及这些信息如何被处理以提供对我们有用的服务的读者来说，本书将帮助他们理解相关概念，并提供指导，以便他们能自行构建一些基础解决方案。理解所有这些复杂服务都建立在相似的基本原理之上，是迈向这一过程的基础步骤。


    例如，考虑一个用于汽车的复杂高级驾驶辅助系统（ADAS）（图 1-1）。它使用一组传感器，如摄像头、运动传感器等，为驾驶员提供安全和舒适方面的辅助。其用途之一是自动追踪汽车在车道中的位置，并在车辆偏离车道时发出声音警告（车道偏离警告）。这个高度复杂的系统，其工作原理基于物联网（IoT）的基本处理流程，包括：收集数据的传感器（摄像头、运动传感器）、识别数据的算法（汽车在车道中的相对位置、车辆偏移），以及根据识别结果采取行动的应用程序（声音警告的开启/关闭）。如图
    1-1 所示，这个流程是所有传感器数据复杂处理管道的基础，这将在本书的各个章节中逐渐明晰。


    ![A978-1-4302-6593-1_1_Fig1_HTML.jpg](img/A978-1-4302-6593-1_1_Fig1_HTML.jpg)


    图 1-1. 传感器数据处理与应用程序的阶段


    另一个例子是智能手机和其他设备提供的基于语音的自动个人助理。在这种应用中，用户通过语音命令激活系统，然后提出诸如“明天天气怎么样？”之类的查询。系统会“神奇地”理解问题，并给出语音回答。这个复杂系统的核心，正是我们熟悉的（感知、识别、行动）方法论。麦克风感知我们的语音，识别系统“理解”我们的意图，然后采取行动来满足请求。


    本书的后续章节旨在为读者提供处理各种传感器所采集数据的步骤的高层级概览，使其能够应用于各种应用程序。我们将理解将数据转化为知识所需的逻辑步骤，并深入探讨一些具体的实现方式，以便读者能够轻松地“摆弄”代码和数据，从而理解实现的细节。


    从高层级来看，从物理世界捕获的数据需要经历如图 1-2 所示的三个阶段，才能转化为可操作的知识。


    ![A978-1-4302-6593-1_1_Fig2_HTML.jpg](img/A978-1-4302-6593-1_1_Fig2_HTML.jpg)


    图 1-2. 数据生命周期阶段


    第一阶段显示的是由各种传感设备（视频、音频、压力、运动、温度等）捕获的数据。这些数据是原始的（未处理的），并夹杂着各种噪声，需要进行清理、过滤，并以结构化方式表示，才能用于分析和处理。在当前的讨论中，我们假设所有这些处理步骤都由图
    1-2 中的数据块来表示。


    数据本身是在特定时间段内的一系列单一测量值。要理解数据实际在“诉说”什么，观察者需要提取数据中的语义。例如，虽然 100°F 的环境温度读数本身告诉了我们热传感器采样的绝对温度，但其语义并不能立即被理解。将这个信息与一个（假设的）事实——该测量是在阿拉斯加冬季的冰川附近进行，且之前的测量值逐渐升高——结合起来，我们就获得了上下文和语义上的理解：测量地点正在发生一些不寻常的事情。


    理解数据中蕴含的语义，使我们能够把握数据在上下文中的意义。此外，还能理解这些语义与迄今已知的其他事实之间的关系。这些关系构成了“知识”的基础。举一个非常简单的例子，在上述温度读数的实例中，与另一个事件（如一场大的森林火灾）的关联，可以为我们理解异常温度读数的根本原因提供依据。


    上述讨论中蕴含的一个事实是“知识会自我滋养”，也就是说，如果系统已经“知道”阿拉斯加的天气通常比较凉爽，那么它就能知道那里出现的高温是一种异常。因此，我们可以重新绘制图
    1-2，如图 1-3 所示，在知识构建器中加入一个反馈回路。


    ![A978-1-4302-6593-1_1_Fig3_HTML.jpg](img/A978-1-4302-6593-1_1_Fig3_HTML.jpg)


    图 1-3. 迭代知识模型


    知识指的是从传感器数据中提取的语义信息的聚合体，其组织方式使得关系通过链接扩展到整个知识库，这些链接会随着越来越多的语义信息可用而随时间建立起来。知识管理任务包含两个主要的结构部分：


    1.  **知识表示**：知识需要以一种能够保留并修改各种概念之间的语义信息和关系的方式进行存储和表示。对知识的修改包括添加新的信息和实体，以及由新数据催化的当前关系或表示的变更。

    2.  **知识操作**：这包括用于向知识数据库中插入和提取数据的工具、API 和编程语言。知识存储需要提供一种方式，以便在现有知识数据库中的正确位置插入新的关系。这涉及理解传入的语义数据，并提供一种机制来查找和操作正确的关系。提取过程涉及响应针对不同实体和概念之间关系的各种查询。提取器的输入是一个不完整的关系描述，输出则是填补描述中的空白。提取器需要支持一种逻辑语言，该语言能够用数学方式表示诸如“在
    X 餐厅，我点烤鸡应该配什么酒？”这样的查询，并提供一种在知识数据库中遍历以获取答案的机制。

    '
- fmt: "# 1.2 Next Level of Data Abstractions\n\nNow that we are familiar with a high-level\
    \ description of the functional blocks, we present a brief overview of the data\
    \ abstractions in an end-to-end pipe. The abstractions show how the data collected\
    \ from the physical world through sensors transitions to ultimately generate usable\
    \ and actionable information.\n\nFor the purposes of this book, we are concerned\
    \ with the following sub-levels of data abstractions.\n\n1.  **Raw Sensor Data**:\
    \ Raw (or unprocessed) sensor data is captured by sensors at the front end of\
    \ the pipeline. The format of the data varies with the type of the sensor. Below\
    \ are a few examples of the sensors and their associated data formats:\n    1.\
    \  **Vision**: Typically, camera sensors take still or video shots of a scene.\
    \ The data format is analog voltage levels representing pixel intensities and\
    \ color at various locations on the image sensor. These levels are frequently\
    \ sampled and quantized to bits, making the signal easier to manipulate digitally.\
    \ This process is called analog-to-digital conversion.\n    2.  **Audio/Speech**:\
    \ The microphone-like sensors typically capture the audio and, if the goal is\
    \ to transmit the information over a network or process them through digital tools,\
    \ a process called analog-to-digital conversion is applied to achieve the conversion,\
    \ and the result is a stream of bits representing audio frequencies over time.\n\
    \    3.  **Motion**: Inertial sensors typically measure the acceleration and motion\
    \ (transitional and angular). The data produced is a stream of numbers representing\
    \ the instantaneous change in the parameters described above.\n    4.  **Temperature\
    \ sensors** generally report the instantaneous temperature at a certain instant\
    \ in time.\n    5.  **BMI sensors**: The Brain Machine Interface sensors, like\
    \ `EEG` and `EKG`, report the brain activity measurements as activity graphs.\
    \ Figure [1-4](#A978-1-4302-6593-1_1_Chapter.html#Fig4) shows a commercial BMI\
    \ sensor that can be worn on the head like headphones.\n\n    ![A978-1-4302-6593-1_1_Fig4_HTML.jpg](A978-1-4302-6593-1_1_Fig4_HTML.jpg)\n\
    \n    Figure 1-4. BMI sensors\n\n2.  **Features**: Generally speaking, we are\
    \ interested in the certain higher-level information in the data that in its aggregate\
    \ can lead to recognition of target entities. As an example, locating edges or\
    \ corners in an image can be a first step toward recognizing discernable objects.\
    \ Similarly, identifying micro-utterances in an audio stream enables stitching\
    \ of them to create words.\n\n3.  **Recognized entities**: Recognition is generally\
    \ a complex task involving spatial and temporal analysis of the extracted features\
    \ to map the aggregate to pre-known entities. Continuing with the examples above,\
    \ in case of vision, the recognition task may involve classifying the extracted\
    \ features to recognize shapes like objects and faces. For audio, statistical\
    \ analysis and classification of features allows for aggregated features to be\
    \ recognized as words. Typically, the tools for recognition are pre-trained with\
    \ examples of entities that they eventually “search” for in the feature pool.\
    \ A face recognition algorithm, for example, will be trained for specific faces\
    \ with multiple images of each face used for training. Once trained, the model\
    \ can identify the trained faces from the test images.\n\n4.  **Semantic relationships**:\
    \ Semantic relationship extraction, along with contextual relationship extraction,\
    \ has become increasingly important, especially as machines become more intelligent\
    \ in understanding the environment around them. Semantic relationships refer to\
    \ the connection between various recognized entities. For example, the semantic\
    \ relationship between a key and a lock refers to the operation of opening or\
    \ closing the lock with the key. Similarly, the sentence “I like coffee” connects\
    \ \"I\" (the subject) with \"coffee\" (object) using the predicate \"like.\" Many\
    \ simpler semantic relationships can be represented by such (subject, predicate,\
    \ object) triplets. Figure [1-5](#A978-1-4302-6593-1_1_Chapter.html#Fig5) graphically\
    \ shows the relationship triplets with an example.\n\n    ![A978-1-4302-6593-1_1_Fig5_HTML.jpg](A978-1-4302-6593-1_1_Fig5_HTML.jpg)\n\
    \n    Figure 1-5. Semantic relationships\n\n5.  **Contextual relationships**:\
    \ Contextual relationships help understand the recognized data in context. The\
    \ context can be obtained in multiple ways. These include using other sensors\
    \ as well as using the history of recognized data for context recognition. A face\
    \ recognition operation that was performed by a surveillance system can identify\
    \ a potential invasion or normal operation depending on when the recognition took\
    \ place (day vs. night) or depending on the person that was recognized.\n\n6.\
    \  **Knowledge**: One way to look at the concept of knowledge is to visualize\
    \ it as a bigger aggregate of relationships connected together through predicates.\
    \ Addition of more and more relationships results in a graphical knowledge structure\
    \ that has a directed relationship between nodes representing the predicates.\
    \ For example, the semantic relationships “I like coffee” and “coffee is grown\
    \ in Brazil” results in a compound knowledge entity as shown in Figure [1-6](#A978-1-4302-6593-1_1_Chapter.html#Fig6).\n\
    \n    ![A978-1-4302-6593-1_1_Fig6_HTML.jpg](A978-1-4302-6593-1_1_Fig6_HTML.jpg)\n\
    \n    Figure 1-6. Basic knowledge building block\n\n    Extending this concept\
    \ leads to a rich knowledge base, examples of which can be found as part of a\
    \ semantic web. One such database is shown in Figure [1-7](#A978-1-4302-6593-1_1_Chapter.html#Fig7),\
    \ representing relationships between food types. The representation could, for\
    \ example, be used to interpret that fruits can be sweet or non-sweet and in either\
    \ type are edible.\n\n    ![A978-1-4302-6593-1_1_Fig7_HTML.jpg](A978-1-4302-6593-1_1_Fig7_HTML.jpg)\n\
    \n    Figure 1-7. Extended relationship graphs\n\n7.  **Query and Response**:\
    \ The knowledge base is ultimately intended for providing information in order\
    \ to implement services for various usages. Various forms for data analysis algorithms\
    \ operate on the knowledge nodes and relationships to extract information useful\
    \ to provide the services desired. The query process focuses on constructing a\
    \ semantic search input to the system that results in the analytical algorithms\
    \ parsing the knowledge base for an appropriate response. For example, using Figure\
    \ [1-8](#A978-1-4302-6593-1_1_Chapter.html#Fig8), the query \"What is the flavor\
    \ of shellfish?\" can be resolved and an answer (moderate or strong) can be provided\
    \ as the response.\n\n    ![A978-1-4302-6593-1_1_Fig8_HTML.jpg](A978-1-4302-6593-1_1_Fig8_HTML.jpg)\n\
    \n    Figure 1-8. Sample knowledge pipeline for semantic knowledge extraction\n\
    \n    Figure [1-8](#A978-1-4302-6593-1_1_Chapter.html#Fig8) summarizes the discussion\
    \ so far in an example knowledge pipeline showing an image recognition pipeline\
    \ in various stages.\n\n## 1.3 Operations\n\nAs we move in the knowledge and analytics\
    \ pipeline from the raw sensor data acquisition to usage implementations, each\
    \ data transformation is brought about by specific operations performed on the\
    \ data generated by the previous stages. While the nature of transformation operations\
    \ varies by the nature of the data, the goal of analysis, and available resources,\
    \ we can broadly categorize the operations under abstractions given below:\n\n\
    1.  Feature Extractors: Raw sensor data to Features\n2.  Recognition Algorithms\n\
    3.  Multimodal context extractors\n4.  Knowledge Extractors\n5.  Knowledge Representation\
    \ Frameworks\n6.  First order logic operations\n7.  Analytics\n\nKeeping these\
    \ operations in mind, Figure [1-8](#A978-1-4302-6593-1_1_Chapter.html#Fig8) can\
    \ now be shown with the transformation operations as shown in Figure [1-9](#A978-1-4302-6593-1_1_Chapter.html#Fig9).\n\
    \n![A978-1-4302-6593-1_1_Fig9_HTML.jpg](A978-1-4302-6593-1_1_Fig9_HTML.jpg)\n\n\
    Figure 1-9. Figure [1-8](#A978-1-4302-6593-1_1_Chapter.html#Fig8) with data transformations\n\
    \nWe now present a brief description of each of these transformation operations."
  raw: "## 1.2 Next Level of Data Abstractions\n\nNow that we are familiar with a\
    \ high-level description of the functional blocks, we present a brief overview\
    \ of the data abstractions in an end-to-end pipe. The abstractions show how the\
    \ data collected from the physical world through sensors transitions to ultimately\
    \ generate usable and actionable information.\n\nFor the purposes of this book,\
    \ we are concerned with the following sub-levels of data abstractions.\n\n1. \
    \ Raw Sensor Data: Raw (or unprocessed) sensor data is captured by sensors at\
    \ the front end of the pipeline. The format of the data varies with the type of\
    \ the sensor . Below are a few examples of the sensors and their associated data\
    \ formats:\n    1.  Vision: Typically, camera sensors take still or video shots\
    \ of a scene. The data format is analog voltage levels representing pixel intensities\
    \ and color at various locations on the image sensor. These levels are frequently\
    \ sampled and quantized to bits, making the signal easier to manipulate digitally.\
    \ This process is called analog-to-digital conversion.  \n    2.  Audio /Speech:\
    \ The microphone-like sensors typically capture the audio and, if the goal is\
    \ to transmit the information over a network or process them through digital tools,\
    \ a process called analog-to-digital conversion is applied to achieve the conversion,\
    \ and the result is a stream of bits representing audio frequencies over time.\
    \  \n    3.  Motion : Inertial sensors typically measure the acceleration and\
    \ motion (transitional and angular). The data produced is a stream of numbers\
    \ representing the instantaneous change in the parameters described above.  \n\
    \    4.  Temperature sensors generally report the instantaneous temperature at\
    \ a certain instant in time.  \n    5.  BMI sensors: The Brain Machine Interface\
    \ sensors , like EEG and EKG, report the brain activity measurements as activity\
    \ graphs. Figure [1-4](#A978-1-4302-6593-1_1_Chapter.html#Fig4) shows a commercial\
    \ BMI sensor that can be worn on the head like headphones.\n\n![A978-1-4302-6593-1_1_Fig4_HTML.jpg](A978-1-4302-6593-1_1_Fig4_HTML.jpg)\n\
    \nFigure 1-4.\n\nBMI sensors   \n2.  Features: Generally speaking, we are interested\
    \ in the certain higher-level information in the data that in its aggregate can\
    \ lead to recognition of target entities. As an example, locating edges or corners\
    \ in an image can be a first step toward recognizing discernable objects. Similarly,\
    \ identifying micro-utterances in an audio stream enables stitching of them to\
    \ create words.  \n3.  Recognized entities: Recognition is generally a complex\
    \ task involving spatial and temporal analysis of the extracted features to map\
    \ the aggregate to pre-known entities. Continuing with the examples above, in\
    \ case of vision, the recognition task may involve classifying the extracted features\
    \ to recognize shapes like objects and faces. For audio, statistical analysis\
    \ and classification of features allows for aggregated features to be recognized\
    \ as words. Typically, the tools for recognition are pre-trained with examples\
    \ of entities that they eventually “search” for in the feature pool. A face recognition\
    \ algorithm, for example, will be trained for specific faces with multiple images\
    \ of each face used for training. Once trained, the model can identify the trained\
    \ faces from the test images.  \n4.  Semantic relationships: Semantic relationship\
    \ extraction, along with contextual relationship extraction, has become increasingly\
    \ important, especially as machines become more intelligent in understanding the\
    \ environment around them. Semantic relationships refer to the connection between\
    \ various recognized entities. For example, the semantic relationship between\
    \ a key and a lock refers to the operation of opening or closing the lock with\
    \ the key. Similarly, the sentence “I like coffee” connects \"I\" (the subject)\
    \ with \"coffee\" (object) using the predicate \"like.\" Many simpler semantic\
    \ relationships can be represented by such (subject, predicate, object) triplets.\
    \ Figure [1-5](#A978-1-4302-6593-1_1_Chapter.html#Fig5) graphically shows the\
    \ relationship triplets with an example.\n\n![A978-1-4302-6593-1_1_Fig5_HTML.jpg](A978-1-4302-6593-1_1_Fig5_HTML.jpg)\n\
    \nFigure 1-5.\n\nSemantic relationships  \n5.  Contextual relationships: Contextual\
    \ relationships help understand the recognized data in context. The context can\
    \ be obtained in multiple ways. These include using other sensors as well as using\
    \ the history of recognized data for context recognition. A face recognition operation\
    \ that was performed by a surveillance system can identify a potential invasion\
    \ or normal operation depending on when the recognition took place (day vs. night)\
    \ or depending on the person that was recognized.  \n6.  Knowledge: One way to\
    \ look at the concept of knowledge is to visualize it as a bigger aggregate of\
    \ relationships connected together through predicates. Addition of more and more\
    \ relationships results in a graphical knowledge structure that has a directed\
    \ relationship between nodes representing the predicates. For example, the semantic\
    \ relationships “I like coffee” and “coffee is grown in Brazil” results in a compound\
    \ knowledge entity as shown in Figure [1-6](#A978-1-4302-6593-1_1_Chapter.html#Fig6).\n\
    \n![A978-1-4302-6593-1_1_Fig6_HTML.jpg](A978-1-4302-6593-1_1_Fig6_HTML.jpg)\n\n\
    Figure 1-6.\n\nBasic knowledge building block Extending this concept leads to\
    \ a rich knowledge base, examples of which can be found as part of a semantic\
    \ web. One such database is shown in Figure [1-7](#A978-1-4302-6593-1_1_Chapter.html#Fig7),\
    \ representing relationships between food types. The representation could, for\
    \ example, be used to interpret that fruits can be sweet or non-sweet and in either\
    \ type are edible.\n\n![A978-1-4302-6593-1_1_Fig7_HTML.jpg](A978-1-4302-6593-1_1_Fig7_HTML.jpg)\n\
    \nFigure 1-7.\n\nExtended relationship graphs  \n7.  Query and Response: The knowledge\
    \ base is ultimately intended for providing information in order to implement\
    \ services for various usages. Various forms for data analysis algorithms operate\
    \ on the knowledge nodes and relationships to extract information useful to provide\
    \ the services desired. The query process focuses on constructing a semantic search\
    \ input to the system that results in the analytical algorithms parsing the knowledge\
    \ base for an appropriate response. For example, using Figure [1-8](#A978-1-4302-6593-1_1_Chapter.html#Fig8),\
    \ the query \"What is the flavor of shellfish?\" can be resolved and an answer\
    \ (moderate or strong) can be provided as the response.\n\n![A978-1-4302-6593-1_1_Fig8_HTML.jpg](A978-1-4302-6593-1_1_Fig8_HTML.jpg)\n\
    \nFigure 1-8.\n\nSample knowledge pipeline for semantic knowledge extraction Figure\
    \ [1-8](#A978-1-4302-6593-1_1_Chapter.html#Fig8) summarizes the discussion so\
    \ far in an example knowledge pipeline showing an image recognition pipeline in\
    \ various stages.\n\n## 1.3 Operations\n\nAs we move in the knowledge and analytics\
    \ pipeline from the raw sensor data acquisition to usage implementations, each\
    \ data transformation is brought about by specific operations performed on the\
    \ data generated by the previous stages. While the nature of transformation operations\
    \ varies by the nature of the data, the goal of analysis, and available resources,\
    \ we can broadly categorize the operations under abstractions given below:\n\n\
    1.  Feature Extractors: Raw sensor data to Features  \n2.  Recognition Algorithms\
    \  \n3.  Multimodal context extractors  \n4.  Knowledge Extractors  \n5.  Knowledge\
    \ Representation Frameworks  \n6.  First order logic operations  \n7.  Analytics\n\
    \nKeeping these operations in mind, Figure [1-8](#A978-1-4302-6593-1_1_Chapter.html#Fig8)\
    \ can now be shown with the transformation operations as shown in Figure [1-9](#A978-1-4302-6593-1_1_Chapter.html#Fig9).\n\
    \n![A978-1-4302-6593-1_1_Fig9_HTML.jpg](A978-1-4302-6593-1_1_Fig9_HTML.jpg)\n\n\
    Figure 1-9.\n\nFigure [1-8](#A978-1-4302-6593-1_1_Chapter.html#Fig8) with data\
    \ transformations\n\nWe now present a brief description of each of these transformation\
    \ operations."
  trans: "\n# 1.2 数据抽象的更高层次\n\n在熟悉了功能模块的高级描述之后，我们现在简要概述端到端流水线中的数据抽象。这些抽象展示了如何将通过传感器从物理世界收集的数据，最终转化为可操作、有价值的信息。\n\
    \n就本书而言，我们关注以下数据抽象的细分层次。\n\n1.  **原始传感器数据**：原始（或未经处理的）传感器数据由流水线前端的传感器捕获。数据的格式随传感器类型而变化。以下是几种传感器及其相关数据格式的示例：\n\
    \    1.  **视觉**：通常，相机传感器拍摄场景的静态图像或视频。数据格式是模拟电压电平，代表图像传感器上不同位置的像素强度和颜色。这些电平被频繁采样并量化为比特，使信号更容易进行数字处理。这个过程称为模数转换。\n\
    \    2.  **音频/语音**：类似麦克风的传感器通常捕获音频。如果目标是通过网络传输信息或通过数字工具处理信息，则会应用称为模数转换的过程来实现转换，结果是一个代表随时间变化的音频频率的比特流。\n\
    \    3.  **运动**：惯性传感器通常测量加速度和运动（平移和旋转）。产生的数据是一串数字，代表上述参数的瞬时变化。\n    4.  **温度传感器**通常报告某一时刻的瞬时温度。\n\
    \    5.  **BMI 传感器**：脑机接口传感器，如 `EEG` 和 `EKG`，以活动图的形式报告脑活动测量值。图 1-4 展示了一种可以像耳机一样戴在头上的商用\
    \ BMI 传感器。\n\n    ![A978-1-4302-6593-1_1_Fig4_HTML.jpg](img/A978-1-4302-6593-1_1_Fig4_HTML.jpg)\n\
    \n    图 1-4. BMI 传感器\n\n2.  **特征**：一般来说，我们对数据中的某些更高级信息感兴趣，这些信息的聚合可以导致目标实体的识别。例如，在图像中定位边缘或角点可能是识别可辨识物体的第一步。类似地，识别音频流中的微话语使得能够将它们拼接成单词。\n\
    \n3.  **已识别实体**：识别通常是一项复杂的任务，涉及对所提取特征进行空间和时间分析，以将聚合特征映射到预先已知的实体。继续上面的例子，对于视觉而言，识别任务可能涉及对提取的特征进行分类，以识别物体和面部等形状。对于音频，对特征进行统计分析和分类使得聚合特征能够被识别为单词。通常，识别工具会使用它们最终要在特征池中“搜索”的实体示例进行预训练。例如，面部识别算法将使用每个面部的多张训练图像针对特定面部进行训练。一旦训练完成，模型便可以从测试图像中识别出训练过的面部。\n\
    \n4.  **语义关系**：语义关系提取，连同上下文关系提取，已变得越来越重要，尤其是随着机器在理解周围环境方面变得更加智能。语义关系指的是各种已识别实体之间的联系。例如，钥匙和锁之间的语义关系指的是用钥匙打开或锁上锁的操作。类似地，句子“我喜欢咖啡”使用谓语“喜欢”将“我”（主语）与“咖啡”（宾语）联系起来。许多更简单的语义关系可以通过这种（主语，谓语，宾语）三元组来表示。图\
    \ 1-5 以图形方式展示了一个关系三元组的示例。\n\n    ![A978-1-4302-6593-1_1_Fig5_HTML.jpg](img/A978-1-4302-6593-1_1_Fig5_HTML.jpg)\n\
    \n    图 1-5. 语义关系\n\n5.  **上下文关系**：上下文关系有助于在语境中理解已识别数据。上下文可以通过多种方式获得。这些方式包括使用其他传感器以及利用已识别数据的历史记录进行上下文识别。由监控系统执行的面部识别操作，可以根据识别发生的时间（白天\
    \ vs. 夜晚）或根据被识别的人员，来确定是潜在的入侵还是正常操作。\n\n6.  **知识**：看待知识这个概念的一种方式是将其可视化为一个更大的关系聚合体，这些关系通过谓语相互连接。添加越来越多的关系会产生一个图形化的知识结构，该结构在代表谓词的节点之间具有有向关系。例如，语义关系“我喜欢咖啡”和“咖啡种植在巴西”结合形成一个复合知识实体，如图\
    \ 1-6 所示。\n\n    ![A978-1-4302-6593-1_1_Fig6_HTML.jpg](img/A978-1-4302-6593-1_1_Fig6_HTML.jpg)\n\
    \n    图 1-6. 基础知识构建块\n\n    扩展这一概念导致了一个丰富的知识库，其示例可以作为语义网的一部分找到。图 1-7 显示了这样一个数据库，它代表了食物类型之间的关系。例如，这种表示可用于解释水果可以是甜的或不甜的，并且这两种类型都可以食用。\n\
    \n    ![A978-1-4302-6593-1_1_Fig7_HTML.jpg](img/A978-1-4302-6593-1_1_Fig7_HTML.jpg)\n\
    \n    图 1-7. 扩展关系图\n\n7.  **查询与响应**：知识库的最终目的是提供信息，以便为各种用途实现服务。各种形式的数据分析算法作用于知识节点和关系，以提取对提供所需服务有用的信息。查询过程侧重于构建系统的语义搜索输入，使得分析算法能够解析知识库以获得适当的响应。例如，使用图\
    \ 1-8，可以解析查询“贝类是什么味道？”并提供答案（中等或强烈）作为响应。\n\n    ![A978-1-4302-6593-1_1_Fig8_HTML.jpg](img/A978-1-4302-6593-1_1_Fig8_HTML.jpg)\n\
    \n    图 1-8. 用于语义知识抽取的示例知识流水线\n\n    图 1-8 在上述讨论的基础上进行了总结，展示了一个包含图像识别流水线各个阶段的示例知识流水线。\n\
    \n## 1.3 操作\n\n当我们在知识和分析流水线中从原始传感器数据采集移动到用途实现时，每一个数据转换都是由对前一个阶段生成的数据执行特定操作所带来的。虽然转换操作的性质因数据的性质、分析的目标和可用资源而异，但我们可以将操作大致归入下面给出的抽象类别中：\n\
    \n1.  特征提取器：原始传感器数据到特征\n2.  识别算法\n3.  多模态上下文提取器\n4.  知识提取器\n5.  知识表示框架\n6.  一阶逻辑运算\n\
    7.  分析\n\n牢记这些操作，现在可以在图 1-8 中显示转换操作，如图 1-9 所示。\n\n![A978-1-4302-6593-1_1_Fig9_HTML.jpg](img/A978-1-4302-6593-1_1_Fig9_HTML.jpg)\n\
    \n图 1-9. 带有数据转换的图 1-8\n\n现在，我们简要描述这些转换操作中的每一个。\n"
- fmt: '### 1. Feature Extractors


    The primary job of feature extractors is to obtain the first level of "interesting"
    information from the raw data collected by the sensors. The goal of the feature
    extraction operation is to reduce the data size to be processed. Sensors produce
    a lot of data, much of which contains redundant and "uninteresting" information
    for an application under consideration. Processing this unneeded data through
    the whole pipe will amount to wasted compute resources, higher processing latencies,
    wastage of power, and bandwidth overload. Extracting features early in the pipeline
    ensures we separate the needed information from the rest of the data and reduce
    waste. Also, having features compatible with the processing goals of the rest
    of the pipe enables the subsequent stages to be designed easily with optimal functionality
    for operating on the data that is known to have relevant information. In the absence
    of feature extractors, the subsequent stages would have to implement complex operations
    to "search" through the entire data for relevant information to use. Depending
    on the type of data and the goal of analysis, the feature extractor implementations
    vary. For example, in a visual understanding system that is trying to recognize
    faces, a feature extractor could implement skin-based segmentation schemes that
    allow it to only send data with skin color information to the other stages. Similarly,
    another vision system implementing object recognition could have a feature extractor
    implementing edge extractors that provide object edge information to the recognition
    module. In audio analysis, instead of sending the raw audio to the analytical
    engines, a feature extractor implementing frequency extraction can be used.


    ### 2. Recognition


    A recognition module implements algorithms to detect and label entities from the
    features provided to it. Typically a recognition algorithm is trained to identify
    certain entities by feeding it examples of true and false results. This phase,
    commonly known as "training the model," leads to parameters of the algorithm being
    configured in such a manner that it acts as a filter to output a certain result
    when one of the trained entities is recognized. A trained model usually needs
    to be retrained for recognizing new entities. Exceptions exist in some limited
    cases where the model can be self-learning or self-training. Examples of recognition
    algorithms include the now immensely popular Convolutional Neural Networks, Bayesian
    and non-Bayesian classifiers, and temporal filters for recognizing events in time.
    Implementations of these algorithms can determine if a visual feature set embeds
    a face or an object, what word was spoken, and what action one is performing based
    on sensors used and the features extracted.


    ### 3. Multimodal Context Extractors


    Recognized information from one or more sensors can be combined to understand
    the operational "context" of the knowledge pipe. The context extraction process
    uses the available recognized outputs to provide an understanding of the environment
    in which the events are occurring. Having access to such information can be crucial
    to the proper usage implementation.


    ## 1.4 Constraints and Parameters


    The discussion so far focused on the logical partitioning of the data types and
    data understanding algorithms through various steps in the knowledge generation
    pipeline. In addition, there is another level of operations partitioning that
    a designer or an architect will need to consider while designing such a pipeline.
    The partitioning is the direct result of mapping the abstract pipeline above to
    the real physical pipe. Depending on the usage, the implementation of the components
    described above will be constrained by the parameters shown in Figure [1-10](#A978-1-4302-6593-1_1_Chapter.html#Fig10).
    These parameters also serve as a design input for the implementation to determine
    how to partition the functional blocks discussed so far between different hardware
    platforms available end-to-end.'
