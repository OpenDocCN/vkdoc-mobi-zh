- fmt: '### 2.1.1 Inertial measurement unit


    The `accelerometer` is the best place to start understanding inertial measurements.
    An accelerometer essentially measures the force (proper acceleration) along each
    axis. Typically, such devices are referred to as 3-axis accelerometer since they
    provide force along `x`, `y` and `z`-axes. A `gyroscope` helps determine orientation
    by measuring rotation across a given axis. Figure [2-4](#A978-1-4302-6593-1_2_Chapter.html#Fig4)
    provides an illustration of the accelerometer and gyroscope data capture. The
    two together can provide acceleration and orientation and may be referred to as
    a 6-axis sensor. Depending on the usage model, data from these sensors are typically
    captured at rates ranging from few `Hz` to `KHz`. Raw data from an accelerometer/gyroscope
    is typically noisy and the use of filters is common to ensure that these are smoothened
    based on multiple data points. Such sensors can be applied for a wide variety
    of use cases, examples below:

    *   Understanding of position/orientation helps mobile phones today re-orient
    the screen in portrait or landscape mode and reverse direction as required.

    *   These sensors also enable simple gestures to be recognized based on buffering
    continuous data and looking at the change in force and orientation. These gestures
    could be as simple as “shake” vs. “roll” vs. a “circle” motion along a certain
    axis.

    *   Sensors are also used for navigation purposes but are relational since they
    provide force in a given direction but do not provide absolute location in any
    field. Typically, this approach is known as dead reckoning and requires other
    sensor information to ensure that there is not a significant drift caused over
    time in the relative positioning due to the noisy sensor data.


    ![A978-1-4302-6593-1_2_Fig4_HTML.gif](A978-1-4302-6593-1_2_Fig4_HTML.gif)

    Figure 2-4. Intro to accelerometer, gyroscope and IMU


    ### 2.1.2 Audio Sensors


    The typical audio sensor used in most devices is a standard microphone. Microphones
    convert sound to electrical signals and are prevalent in many applications ranging
    from the typical public addressing systems to movies to laptops to mobile, wearable,
    and IoT devices. In this section, we primarily focus on the microphones used in
    lower-end devices for IoT and wearable applications. Most of the microphones used
    in these devices are MEMS (microelectromechanical systems) sensors and are likely
    to be analog or digital. The output of the microphone is typically pulse-density
    modulated (PDM) or pulse code modulated (PCM) and data is captured from 4-bit
    to 64-bit and can be tuned for signal-to-noise ratio and quality of the capture.
    The typical frequency response of microphones range from `20Hz` to `20KHz`. To
    improve the quality of the recording and recognition, sometimes two or three microphones
    are used in mobile phones, for example. This allows for processing the data from
    each of these microphones and reducing the noise to deliver higher quality output
    (e.g. voice clarity when making a phone call).


    Audio sensors are used for not only capturing and recording content, but also
    for audio classification and speech recognition (see Figure [2-5](#A978-1-4302-6593-1_2_Chapter.html#Fig5)).
    Here are some of the predominant usage scenarios for single or multiple microphones
    in mobile, wearable, and IoT systems:

    *   Audio classification: A common IoT use case for microphones is to classify
    the environment that the sound was captured in. For example, capturing audio every
    so often from a microphone in a kitchen can provide information on what type of
    activity is currently going on—idle, dishwashing, water running in the sink, cooking,
    etc. Researchers are using machine listening techniques such as this to go as
    far as to disambiguate the different noises in the background. For example, audio
    captured from a phone could provide information about not only the foreground
    human voice but also what is happening in the background.

    *   Voice Activity detection: Another common use case is voice activity detection.
    Here the focus is on attempting to determine whether there is voice in the captured
    audio. This is helpful when a phone or other device is completely off except for
    the microphone that is capturing audio at low rates. Once there is voice activity
    in the audio, then the audio subsystem is powered on and more processing (as described
    below) is done.

    *   Speaker recognition: Speaker recognition, sometimes also referred to as voice
    recognition, attempts to determine who is speaking. This can be useful to identify
    the speaker in an audio transcript or identify the speaker as part of an authentication
    approach. When used as part of an authentication approach, it is important to
    differentiate between speaker identification (identifying one amongst multiple
    speakers) and speaker verification (determining that a specific speaker whose
    signature has been captured before was the one who spoke).

    *   Keyword recognition: Keyword recognition is probably the simplest form of
    speech recognition where the focus is to ensure whether a particular word was
    uttered. Keyword recognition can be speaker-dependent (trained for a particular
    speaker) or speaker-independent (generally applicable for all). Keyword recognition
    can also be generalized to keyphrase recognition and both are typically used as
    triggers for additional activity such as starting a session of commands or bringing
    up an application.

    *   Command and Control: Command and control refers to using a small set of phrases
    in speech recognition. For illustration, this could include a set of commands
    to control a toy car such as “move forward,” “move backward,” “go faster,” “go
    slower,” “turn right/left,” etc.

    *   Large vocabulary continuous speech recognition (LVCSR): LVCSR and CSR in general
    refer to the continuous recognition of speech as it is fed into the speech recognition
    system. This typically involves a moderate to large vocabulary that is recognized.
    Of all of the above, this is the most challenging and computationally complex
    speech recognition problem and there have been a number of advances in this area
    recently enabling reduced error rates and better general usage.


    ![A978-1-4302-6593-1_2_Fig5_HTML.gif](A978-1-4302-6593-1_2_Fig5_HTML.gif)

    Figure 2-5. Audio sensors and recognition capability examples


    Building on the above techniques, applications that are more interesting and capabilities
    that may be of potential interest to the reader are natural language processing
    and language translation capabilities. These capabilities are now emerging in
    different market solutions.


    ### 2.1.3 Visual Sensors


    The most common visual sensor is the camera. Cameras are well understood since
    they have been around for ages for photographic purposes. In this book, we focus
    on their use as a visual sensor to recognize what a device can automatically see,
    understand and act upon.


    Unlike inertial and audio data, visual data introduces a spatial dimension to
    the data, since it can be 2D or 3D in nature. A camera can be used for instantaneous
    2D capture (still image) without any temporal information, or as part of a video
    capture with rich temporal data capturing multiple frames over time. Generally,
    data can be captured at extremely low fidelity (e.g., QVGA that is `320x240` as
    a still image or at few frames per second) to high fidelity (e.g. HD and 4K at
    30 or more frames per second). The capture rate depends on the usage model that
    needs to consider whether human consumption (as in replay) is the key requirement
    or whether only machine recognition of some visual aspect is sufficient.


    Visual recognition can be used for many different purposes ranging from object
    recognition, face recognition and scene recognition to similarity/anomaly detection,
    understanding motion or scale, and video summarization. Some examples of these
    are provided in Figure [2-6](#A978-1-4302-6593-1_2_Chapter.html#Fig6) and are
    listed below for illustration:'
