  trans: '

    ### 7.2.3 手机平台


    下一个主要的平台示例是手机平台。如今的手机平台功能非常强大，拥有多个（可能异构的）核心、包括图形处理在内的专用引擎、连接能力，以及可观的存储容量。图 7-5
    展示了一个包含上述关键能力的移动平台架构示例。


    ![A978-1-4302-6593-1_7_Fig5_HTML.gif](img/A978-1-4302-6593-1_7_Fig5_HTML.gif)


    图 7-5. 异构移动平台架构


    智能手机平台具有多种使用维度，包括：(a) 通过社交媒体、视频和其他播放功能提供丰富的视觉体验；(b) 通过众多云应用提供丰富的通信体验；(c) 通过外部硬传感器以及软感知（如访问浏览、邮件和其他用户活动）提供丰富的感知能力；(d)
    通过从云商店下载的众多可用应用提供丰富的应用体验。为了支持所有这些体验，同时受限于外形尺寸和电池续航，该架构支持从始终开启的感知，到低功耗的轻量活动，再到需要时的高性能处理等多种操作级别。


    为了支持低功耗执行，所有重要的子系统都开发了专用引擎并集成到手机平台中：(i) 成像，(ii) 图形和媒体处理，(iii) 加密处理，(iv) 音频处理以及语音识别，(v)
    视觉处理，以及 (vi) 包括蓝牙、Wi-Fi 和蜂窝子系统在内的通信能力。此外，手机平台通常还集成一个传感器集线器，以低功耗模式处理来自运动、位置、音频和视觉的丰富传感器数据。智能手机平台可以访问大型内存和存储子系统。总而言之，当今的智能手机平台在计算能力上，相当于大约
    25 年前的一台小型超级计算机。这一点在观察智能手机平台核心数量不断增加以及平台内内存和存储持续扩容时尤为明显。


    ### 7.2.4 网关平台


    我们接下来描述的是一个网关或集线器平台。网关或集线器平台拥有多个处理核心、包括路由器功能以及媒体处理在内的通信功能，并且安全性是其关键重点，尤其是在家居环境中作为集线器平台或机顶盒使用时。此外，它通常集成大量的内存和存储，以处理大量媒体、多个同时进行的通信流以及元数据存储。对于类似机顶盒的功能而言，与数字有线电视以及大型显示器交互的能力变得至关重要，因此处理能力、存储和专用功能的需求会进一步增加。


    ![A978-1-4302-6593-1_7_Fig6_HTML.gif](img/A978-1-4302-6593-1_7_Fig6_HTML.gif)


    图 7-6. 网关或集线器平台架构


    这类平台通常不依赖电池供电（不同于本节前面讨论的设备），因此网关/集线器通常始终由墙壁电源供电，并随时可进行高性能处理。将此类平台作为端到端系统架构的一部分，可以有机会将处理任务从传感器/手机边缘设备卸载到像网关这样的中央设备上，以便进行聚合和高性能处理（从而节省电池电量）。同时，由于网关/集线器位于本地场所内，并具备如
    Wi-Fi 等高带宽通信能力，因此还能提供低交互延迟的优势。


    ### 7.2.5 云服务器平台


    最后但同样重要的是，我们还应当了解位于云数据中心内的商业服务器的能力。传统上，服务器平台拥有大量的核心（例如 16-48 个），并以高性能运行，尤其是在处理吞吐量方面。由于云中有多个服务器平台，因此不仅可以在单个服务器内部进行并行处理，还可以在集群内或整个数据中心内的多台服务器之间实现并行处理。图
    7-7（上部）展示了服务器平台架构的一个简化描述。


    ![A978-1-4302-6593-1_7_Fig7_HTML.gif](img/A978-1-4302-6593-1_7_Fig7_HTML.gif)


    图 7-7. 云服务器平台架构


    较新的服务器架构正试图通过定制化来提供更高的能效性能。这包括集成可编程/可重配置逻辑（如 `FPGA`，即现场可编程门阵列）以及其他加速器（如 `GPU`，即图形处理器）和领域专用引擎。


    从图 7-7 的图示中可能可以明显看出，高性能核心的丰富程度表明了服务器相较于边缘设备或网关拥有更高的计算能力。服务器通常在几百瓦的功耗限制下运行，而手机运行在瓦级别，可穿戴设备或传感器节点在电池寿命/容量上则处于亚瓦级别。


    ## 7.3 端到端处理与映射示例


    以上对各平台的描述，希望能阐明为何需要端到端系统架构来实现诸如视觉识别和处理这样丰富的体验。为了进一步探讨这一点，我们考虑三个处理示例：(a) 语音处理，(b)
    视觉处理，以及 (c) 机器学习和分类任务。这些示例将基于本章前面描述的各种考量，进一步提供关于某些任务当前可在何处执行的理解。让我们从语音处理开始。

    '
- fmt: '### 7.3.1 Speech Processing Example


    In order to understand speech processing in detail, let us consider an example
    usage. Consider a wearable device on the person’s body that intends to provide
    the capability of an assistant who has the ability to answer questions. The end-to-end
    architecture for such a usage includes (a) wearable device on the body, (b) smart
    phone in the pocket, and (c) cloud platform in the datacenter. Here we recap the
    speech processing pipeline as well as the end-to-end system architecture in order
    to start considering how the partitioning could be accomplished between the different
    platforms listed above.


    To recap the speech flow, a typical flow for Q&A assistance includes noise reduction
    (to clean the audio sample), voice activity detection (to detect human voice),
    keyword recognition (to identify the trigger word), speaker recognition (to identify
    the correct speaker), command and control (to identify commands), LVCSR (for continuous
    speech recognition), natural language processing (to determine what the words
    imply), and Q&A service (to determine the answer for the question).


    For this example, the key considerations we will use to partition the speech flow
    on to the platforms in the end-to-end architecture are: (a) available compute
    within a constrained power and battery life envelope and (b) available memory
    capability for storing speech models needed for the processing. We will assume
    that other considerations are secondary in order to be able to illustrate implications
    of even just a few priorities.


    Today, most devices only accomplish keyword recognition on an edge device like
    a wearable, smart phone, or even an ambient hub. But advances in low-power hardware
    designs are emerging to push the envelope on what can be processed closer to the
    edge rather than having to send all of the audio data to the cloud. These advances
    typically involve implementing speech algorithms using a hardware-software co-design
    approach. The resulting low power hardware design may not only be able to achieve
    keyword recognition but also some level of command & control (small vocabulary)
    on the local device at low power (milliwatts). As a result, a wearable in the
    near future should be able to provide processing for functionality all the way
    to limited command & control. Figure [7-8](#A978-1-4302-6593-1_7_Chapter.html#Fig8)
    shows an example partitioning of the speech pipeline over an end-to-end platform
    architecture.


    ![A978-1-4302-6593-1_7_Fig8_HTML.jpg](A978-1-4302-6593-1_7_Fig8_HTML.jpg)


    Figure 7-8.


    End-to-end partitioning of speech flow (example)


    For a larger vocabulary in command & control but somewhat lower vocabulary in
    continuous speech recognition and natural language processing, a more powerful
    system in the end-to-end flow is required. With advances in HW/SW co-design, such
    capabilities should be possible on a smart phone or hub-like platform in the near
    future. Ultimately, for large-vocabulary speech recognition and full natural language
    processing, a cloud platform is needed not only to address the compute requirements
    but also to accommodate the memory needs for large and multiple language models.
    Last but not least, a question & answering service that is more generalized requires
    a cloud service since it requires public domain knowledge for determining appropriate
    answers based not only on the question but also on employing the context of the
    usage.


    ### 7.3.2 Visual Processing Example


    Our next example of end-to-end partitioning (visual processing) considers a richer
    sensor (camera) and therefore more significant amounts of compute, bandwidth,
    and analytics. Here we consider the end-to-end architecture which considers a
    phone-like edge device (could also be a visual monitoring device with similar
    capabilities or even a mobile augmented reality device using a phone-like platform),
    a local hub that provides contextual data, and a cloud platform delivering richer
    visual services.


    Figure [7-9](#A978-1-4302-6593-1_7_Chapter.html#Fig9) shows a few of the visual
    processing capabilities that are needed for most usages and a mapping of those
    to the potential platform where this can be achieved with compute, battery life,
    memory/storage capacity, and availability of contextual models and data in mind.
    We start with gesture recognition, which can be achieved locally. Gesture recognition
    can be recognition of hand poses as well as dynamic movements; and as long as
    the number of gestures are limited, the goal of recognition can be achieved on
    the edge device itself within 10s of milliwatts to 100s of milliwatts (based on
    complexity). As we start to consider object recognition, it gets more challenging
    for a local device to accomplish this, especially if the number of objects scale
    from 100s to 1000s to millions. For 100s of objects, a local device can provide
    the object models for object recognition and can achieve the recognition needed.
    However, if the objects are unbounded and require a large object database, the
    processing requires a cloud server that can match it against a large database.
    A hierarchical approach is also possible, where the local hub determines the context
    of the object recognition and caches some of the frequent objects that are expected
    in the usage (within a spatial/temporal distance).


    ![A978-1-4302-6593-1_7_Fig9_HTML.jpg](A978-1-4302-6593-1_7_Fig9_HTML.jpg)


    Figure 7-9.


    Partitioning of visual processing (example)


    Similar to object recognition, processing for face recognition also depends on
    the number of faces involved (whether it is a home with a few faces vs. a corporation
    with 1000s of faces vs. a public query with millions of faces). Depending on this,
    the processing can be accomplished on the local edge device, the hub, or the cloud
    server. Face detection (knowing there is a face in the frame and identifying where
    it is) can certainly be accomplished on the local device, but face recognition
    requires a scalable hierarchical approach as described above.


    Currently, there is a lot of research activity on scene understanding and video
    summarization. Understanding a scene implies knowing not only the individual entities
    in the image but also the activity or context in the scene. This requires each
    of the above capabilities (object, face, gesture) and more. Depending on the level
    of scene recognition required, it can be accomplished on the hub or in the cloud.
    Similarly, video summarization attempts to identify the salient scenes in a video
    and identify what the overall video consists of in terms of activity and storyline.
    Video summarization at a limited scale (identifying representative scenes that
    summarize the video) can be accomplished in the hub, whereas further summarization
    such as determining the activity and storyline may require cloud processing.


    It should be noted that a key trade-off as we consider visual processing is the
    bandwidth needed to transmit the data from the local device to the hub to the
    cloud. Since transmitting visual data is expensive, it is also important to consider
    whether the raw data is transmitted from one node to the other, or if only the
    features extracted from the raw data should be transmitted for the processing
    required. In addition, since the purpose of the visual processing is not to create
    recorded content that is humanly viewable later, it is also not critical to maintain
    the highest resolution and frame rate for the visual stream as it is transmitted
    from one node to another in the end-to-end system architecture. Last but not least,
    it is also important to determine when the raw data can be discarded and only
    the metadata is retained depending on the usage model in question.'
  raw: '### 7.3.1 Speech Processing Example


    In order to understand speech processing in detail, let us consider an example
    usage. Consider a wearable device on the person’s body that intends to provide
    the capability of an assistant who has the ability to answer questions. The end-to-end
    architecture for such a usage includes (a) wearable device on the body, (b) smart
    phone in the pocket, and (c) cloud platform in the datacenter. Here we recap the
    speech processing pipeline as well as the end-to-end system architecture in order
    to start considering how the partitioning could be accomplished between the different
    platforms listed above .


    To recap the speech flow, a typical flow for Q&A assistance includes noise reduction
    (to clean the audio sample), voice activity detection (to detect human voice),
    keyword recognition (to identify the trigger word), speaker recognition (to identify
    the correct speaker), command and control (to identify commands), LVCSR (for continuous
    speech recognition), natural language processing (to determine what the words
    imply), and Q&A service (to determine the answer for the question).


    For this example, the key considerations we will use to partition the speech flow
    on to the platforms in the end-to-end architecture are: (a) available compute
    within a constrained power and battery life envelope and (b) available memory
    capability for storing speech models needed for the processing. We will assume
    that other considerations are secondary in order to be able to illustrate implications
    of even just a few priorities.


    Today, most devices only accomplish keyword recognition on an edge device like
    a wearable, smart phone, or even an ambient hub. But advances in low-power hardware
    designs are emerging to push the envelope on what can be processed closer to the
    edge rather than having to send all of the audio data to the cloud. These advances
    typically involve implementing speech algorithms using a hardware-software co-design
    approach. The resulting low power hardware design may not only be able to achieve
    keyword recognition but also some level of command & control (small vocabulary)
    on the local device at low power (milliwatts). As a result, a wearable in the
    near future should be able to provide processing for functionality all the way
    to limited command & control. Figure [7-8](#A978-1-4302-6593-1_7_Chapter.html#Fig8)
    shows an example partitioning of the speech pipeline over an end-to-end platform
    architecture.


    ![A978-1-4302-6593-1_7_Fig8_HTML.jpg](A978-1-4302-6593-1_7_Fig8_HTML.jpg)


    Figure 7-8.


    End-to-end partitioning of speech flow (example)


    For a larger vocabulary in command & control but somewhat lower vocabulary in
    continuous speech recognition and natural language processing, a more powerful
    system in the end-to-end flow is required. With advances in HW/SW co-design, such
    capabilities should be possible on a smart phone or hub-like platform in the near
    future. Ultimately, for large-vocabulary speech recognition and full natural language
    processing, a cloud platform is needed not only to address the compute requirements
    but also to accommodate the memory needs for large and multiple language models.
    Last but not least, a question & answering service that is more generalized requires
    a cloud service since it requires public domain knowledge for determining appropriate
    answers based not only on the question but also on employing the context of the
    usage.


    ### 7.3.2 Visual Processing Example


    Our next example of end-to-end partitioning (visual processing) considers a richer
    sensor (camera) and therefore more significant amounts of compute, bandwidth,
    and analytics. Here we consider the end-to-end architecture which considers a
    phone-like edge device (could also be a visual monitoring device with similar
    capabilities or even a mobile augmented reality device using a phone-like platform),
    a local hub that provides contextual data, and a cloud platform delivering richer
    visual services.


    Figure [7-9](#A978-1-4302-6593-1_7_Chapter.html#Fig9) shows a few of the visual
    processing capabilities that are needed for most usages and a mapping of those
    to the potential platform where this can be achieved with compute, battery life,
    memory/storage capacity, and availability of contextual models and data in mind.
    We start with gesture recognition, which can be achieved locally. Gesture recognition
    can be recognition of hand poses as well as dynamic movements; and as long as
    the number of gestures are limited, the goal of recognition can be achieved on
    the edge device itself within 10s of milliwatts to 100s of milliwatts (based on
    complexity). As we start to consider object recognition, it gets more challenging
    for a local device to accomplish this, especially if the number of objects scale
    from 100s to 1000s to millions. For 100s of objects, a local device can provide
    the object models for object recognition and can achieve the recognition needed.
    However, if the objects are unbounded and require a large object database, the
    processing requires a cloud server that can match it against a large database.
    A hierarchical approach is also possible, where the local hub determines the context
    of the object recognition and caches some of the frequent objects that are expected
    in the usage (within a spatial/temporal distance).


    ![A978-1-4302-6593-1_7_Fig9_HTML.jpg](A978-1-4302-6593-1_7_Fig9_HTML.jpg)


    Figure 7-9.


    Partitioning of visual processing (example)


    Similar to object recognition, processing for face recognition also depends on
    the number of faces involved (whether it is a home with a few faces vs. a corporation
    with 1000s of faces vs. a public query with millions of faces). Depending on this,
    the processing can be accomplished on the local edge device, the hub, or the cloud
    server. Face detection (knowing there is a face in the frame and identifying where
    it is) can certainly be accomplished on the local device, but face recognition
    requires a scalable hierarchical approach as described above.


    Currently, there is a lot of research activity on scene understanding and video
    summarization. Understanding a scene implies knowing not only the individual entities
    in the image but also the activity or context in the scene. This requires each
    of the above capabilities (object, face, gesture) and more. Depending on the level
    of scene recognition required, it can be accomplished on the hub or in the cloud.
    Similarly, video summarization attempts to identify the salient scenes in a video
    and identify what the overall video consists of in terms of activity and storyline.
    Video summarization at a limited scale (identifying representative scenes that
    summarize the video) can be accomplished in the hub, whereas further summarization
    such as determining the activity and storyline may require cloud processing.


    It should be noted that a key trade-off as we consider visual processing is the
    bandwidth needed to transmit the data from the local device to the hub to the
    cloud. Since transmitting visual data is expensive, it is also important to consider
    whether the raw data is transmitted from one node to the other, or if only the
    features extracted from the raw data should be transmitted for the processing
    required. In addition, since the purpose of the visual processing is not to create
    recorded content that is humanly viewable later, it is also not critical to maintain
    the highest resolution and frame rate for the visual stream as it is transmitted
    from one node to another in the end-to-end system architecture. Last but not least,
    it is also important to determine when the raw data can be discarded and only
    the metadata is retained depending on the usage model in question.'
  trans: '

    ### 7.3.1 语音处理示例


    为了详细理解语音处理，让我们看一个使用示例。设想一个人身上佩戴的可穿戴设备，旨在提供具有问答能力的助手功能。这种使用场景的端到端架构包括：(a) 身上的可穿戴设备，(b)
    口袋里的智能手机，以及 (c) 数据中心里的云平台。在此，我们回顾一下语音处理流程以及端到端系统架构，以便开始考虑如何在上述不同平台之间完成任务划分。


    回顾语音的流程，一个典型的问答辅助流程包括：降噪（以净化音频样本）、语音活动检测（以检测人声）、关键词识别（以识别唤醒词）、说话人识别（以识别正确的说话人）、命令与控制（以识别命令）、LVCSR（用于连续语音识别）、自然语言处理（以确定词语的含义），以及问答服务（以确定问题的答案）。


    对于此示例，我们用于将语音流程划分到端到端架构中各平台的关键考量因素是：(a) 在受限功耗和电池续航范围内可用的算力，以及 (b) 用于存储处理所需语音模型的可用内存容量。为能演示甚至仅需少量优先级排序所带来的影响，我们将假设其他考量因素是次要的。


    如今，大多数设备仅在边缘设备（如可穿戴设备、智能手机，甚至是环境智能中枢）上完成关键词识别。但随着低功耗硬件设计的进步，我们正不断突破极限，能够在更靠近边缘端的位置处理更多任务，而无需将所有音频数据发送到云端。这些进步通常涉及采用软硬件协同设计的方法来实现语音算法。由此产生的低功耗硬件设计，或许不仅能在本地设备上以低功耗（毫瓦级）实现关键词识别，还能完成一定程度的命令与控制（小词汇量）。因此，在不久的将来，可穿戴设备应该能够一路处理到有限命令与控制的功能。图
    7-8 展示了一个在端到端平台架构上划分语音流程的示例。


    ![A978-1-4302-6593-1_7_Fig8_HTML.jpg](img/A978-1-4302-6593-1_7_Fig8_HTML.jpg)


    图 7-8.


    语音流程的端到端划分（示例）


    对于命令与控制中词汇量更大，但连续语音识别和自然语言处理中词汇量相对较小的情况，则需要在端到端流程中有一个更强大的系统。随着软硬件协同设计的进步，在不久的将来，智能手机或类似中枢的平台应能具备此类能力。最终，对于大词汇量语音识别和完整的自然语言处理，云平台是必需的，这不仅是为了满足算力需求，也是为了容纳大型和多种语言模型的内存需求。最后但同样重要的是，更通用的问答服务需要云服务，因为它需要公共领域知识，不仅要根据问题，还要结合使用场景的上下文来确定合适的答案。


    ### 7.3.2 视觉处理示例


    我们的下一个端到端划分示例（视觉处理）考虑了一个更丰富的传感器（摄像头），因此需要更大量的算力、带宽和分析。这里我们考虑一个端到端架构，该架构包括一个类似手机的边缘设备（也可以是具有类似功能的视觉监控设备，甚至是使用类似手机平台的移动增强现实设备）、一个提供上下文数据的本地中枢，以及一个提供更丰富视觉服务的云平台。


    图 7-9 展示了大多数使用场景所需的若干视觉处理能力，以及如何将这些能力映射到潜在的平台，并在这些平台上实现，同时需考虑算力、电池续航、内存/存储容量以及上下文模型和数据的可用性。我们从手势识别开始，这可以在本地实现。手势识别可以是对手部姿态以及动态运动的识别；只要手势数量有限，识别目标就可以在边缘设备上实现，功耗在几十毫瓦到几百毫瓦之间（取决于复杂度）。当我们开始考虑物体识别时，对本地设备来说，完成这项任务的挑战性就大了很多，尤其是当物体数量从几百个增加到几千个，再到数百万个时。对于几百个物体，本地设备可以提供用于物体识别的物体模型，并完成所需的识别。然而，如果物体数量无上限，并且需要一个大型物体数据库，那么处理就需要一个能够与大型数据库进行匹配的云服务器。也可以采用一种分层方法，即由本地中枢确定物体识别的上下文，并缓存使用场景中预期会经常出现的一些物体（在一定的空间/时间距离内）。


    ![A978-1-4302-6593-1_7_Fig9_HTML.jpg](img/A978-1-4302-6593-1_7_Fig9_HTML.jpg)


    图 7-9.


    视觉处理的划分（示例）


    与物体识别类似，人脸识别的处理也取决于涉及的人脸数量（是仅有几张人脸的住宅，还是有上千张人脸的公司，亦或是存在数百万张人脸的公共查询）。根据这一点，处理可以在本地边缘设备、中枢或云服务器上完成。人脸检测（知道画面中有人脸并识别其位置）当然可以在本地设备上完成，但人脸识别则需要如上所述的可扩展分层方法。


    当前，关于场景理解和视频摘要的研究活动非常活跃。理解一个场景意味着不仅要识别图像中的各个实体，还要理解场景中的活动或上下文。这需要上述的每一种能力（物体、人脸、手势）以及更多。根据所需的场景识别级别，可以在中枢或云端完成。同样，视频摘要试图识别视频中的关键场景，并确定整个视频在活动和故事情节方面的内容。小规模（识别能概括视频的代表性场景）的视频摘要可以在中枢完成，而诸如确定活动和情节等进一步的摘要则可能需要云处理。


    需要注意的是，在考虑视觉处理时，一个关键的权衡因素是传输数据所需的带宽（从本地设备到中枢再到云端）。由于传输视觉数据的成本很高，同样重要的是要考虑是从一个节点向另一个节点传输原始数据，还是只应传输从原始数据中提取的特征以用于所需的处理。此外，由于视觉处理的目的并非创建事后可供人类观看的录制内容，因此在端到端系统架构中，当视觉流从一个节点传输到另一个节点时，保持最高的分辨率和帧率也并非至关重要。最后但同样重要的是，还应根据所讨论的使用模式，确定何时可以丢弃原始数据而仅保留元数据。'
- fmt: '### 7.3.3 Learning and Classification


    Another view of capabilities that are partitioned across the end-to-end system
    architecture is that of learning and classification. Machine learning techniques
    are increasingly used for pattern matching, audio, and visual recognition. The
    disruption with machine learning was that instead of writing code-based or rule-based
    approaches to recognizing patterns, actual data is used as training samples for
    developing a model.


    For example, if an IMU gesture needs to be recognized, a gesture model can be
    developed by training a machine learning model (a neural network, for example)
    with gestures captured from a collection of individuals. This training process
    requires the device to capture the data but does not necessarily require the device
    to learn the models directly. A cloud-based solution can be used for training
    and development of the model and then the resulting model can be downloaded to
    the devices that are deployed in order to do the recognition during real-time.


    Such partitioning can be thought of as two distinct steps: (a) offline training
    and (b) online classification. In fact, the base model used in many usages today
    relies on the cloud to do both offline training as well as online classification
    (as shown in Figure [7-10](#A978-1-4302-6593-1_7_Chapter.html#Fig10) top left).
    However, such a model has challenges when the latency to send raw data to the
    cloud for online classification becomes limiting to the usage. Therefore, newer
    models have emerged where the device does the classification by implementing the
    classification locally based on the trained model produced from the offline cloud
    training. Even this model can be restrictive when changes due to personalization
    or anomalies cannot be easily incorporated. As a result, researchers have been
    working on techniques for detecting anomalies and sending them to the cloud for
    updates to the local model. The cloud collects these anomalies and produces an
    updated model routinely and deploys the update to the field. Researchers are also
    trying to accomplish continuous learning by learning local changes on the device
    itself. These changes can not only be transmitted to the cloud for updates but
    also used to update the model locally.


    ![A978-1-4302-6593-1_7_Fig10_HTML.jpg](A978-1-4302-6593-1_7_Fig10_HTML.jpg)


    Figure 7-10.


    Learning and classification (offline vs. online)


    ## 7.4 Programmability Considerations for End-to-End Partitioning


    When implementing a sensing to knowledge management capability, it is also important
    to consider programmability of components of the solution. Since speech and visual
    algorithms are continuously evolving and variants of machine learning algorithms
    or neural networks are being developed every few months, it becomes critical that
    current implementations can be modified with ease. In addition, the previous sections
    in this chapter presented multiple partitioning possibilities and it becomes critical
    that these can also be dynamically changed if hardware or algorithm improvements
    become possible.


    One approach is to develop APIs (application programming interfaces) that allow
    software developers to consistently use common interfaces but allow flexibility
    in modifying the implementation underneath. For example, if a speech pipeline
    employs HMMs (hidden Markov models) in their implementation for language models,
    changing this to WFST (weighted finite state transducers) in the future should
    be possible if the APIs are defined well and the implementation is flexible as
    a result.


    Furthermore, since processing of a component can be mapped to many different platforms
    (local device, gateway, or cloud platform) and within each platform the processing
    engine could be a core, a GPU, an FPGA, or an accelerator (or special purpose
    engine), it becomes important that the implementation abstracts these details
    to provide flexibility of changing the mapping and underlying components. An example
    of such a flexible approach is remote offloading where the authors propose an
    OpenCL-based solution for abstracting the function that needs to be executed such
    that it can be run on a local device or a remote platform and can also be run
    on any processing engine on these platforms (core or accelerator). Such solutions
    are gaining in popularity since heterogeneous architectures are becoming more
    common due to power/performance advantages. Figure [7-11](#A978-1-4302-6593-1_7_Chapter.html#Fig11)
    shows the decomposition of a workload into functional components and illustrates
    the use of a stub to redirect the execution of the function to any platform and
    processing engine within the platform. The policy used for determining where to
    run a function could be based on available bandwidth for data transfer, power/performance
    (affecting battery life of device), and potentially availability of the platform
    and engine (if multiple workloads are running simultaneously or the platform is
    not always available on the network).


    ![A978-1-4302-6593-1_7_Fig11_HTML.jpg](A978-1-4302-6593-1_7_Fig11_HTML.jpg)


    Figure 7-11.


    Workload decomposition and function mapping


    ## 7.5 Summary and Future Opportunities


    This chapter presented the end-to-end architecture for sensor processing pipelines.
    As described in this chapter through various examples, there are multiple challenges
    in developing end-to-end system architectures for speech or vision capabilities
    and usages. This opens up many opportunities for further research and development.
    Here we will list a few of these opportunities:


    - Developing special purpose engines and accelerators for specific algorithms
    and primitives

    - Developing end-to-end system architectures that provide the ability for dynamic
    mapping and partitioning flexibility.

    - Developing tools and models that allow for exploration of suitable partitioning
    policies

    - Developing common processing pipelines across multiple usages

    - Developing runtimes/programming models for end-to-end systems


    ## 7.6 Conclusion


    This chapter concludes the overview of different facets of sensor data processing
    to make sense of the environments around us. We hope that the book achieved the
    goal of exposing the readers to a high-level understanding of the concepts and
    operations involved. The discussions in the book detailed the steps in making
    sense of sensors through (a) recognizing data from a single sensor, (b) using
    multiple sensing modes to improve recognition performance and implement new usages,
    (c) deriving usage context and in turn using the context for improving recognition
    operations, (d) deriving semantic relationships from recognized information, (e)
    representing the relationships to build knowledge graphs, (e) operating on the
    knowledge for implementing intelligent usages, and (d) system considerations for
    implementing sensor-driven knowledge pipelines.


    While this book is aimed at providing a high-level bird’s-eye view of the technologies
    involved, the content is aimed at providing a reader with an understanding of
    the generic nature of the knowledge pipeline across various sensing modes and
    usages. The information gained from the book should equip the reader with enough
    background to get to the next step of learning by choosing the domain and technology
    area of interest. The references provided at the end of the book chapters are
    a good start for such a quest.'
