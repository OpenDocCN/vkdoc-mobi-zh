    # 7. 端到端系统架构的影响


    在本章（全书的最后一章）中，我们将讨论处理传感器数据以及分析处理后的数据以获取洞察和知识管理所带来的系统级影响。首先，让我们看看典型的端到端系统架构可能是什么样的。图
    7-1 展示了针对不同环境的几种典型端到端系统架构，这些架构由三个平台组成。


    ![A978-1-4302-6593-1_7_Fig1_HTML.gif](img/A978-1-4302-6593-1_7_Fig1_HTML.gif)


    图 7-1. 端到端系统架构示例


    在图 7-1 中，第一种端到端系统架构将手机视为传感器捕获设备。如今的手机能够捕获有价值的传感器数据，包括位置数据（用于导航和辅助）、音频数据（语音问答）、运动数据（用于健康/健身和导航）以及视觉数据（用于个人使用、社交媒体和其他目的的图片和视频）。当此类数据在家庭环境中被捕获时，它会通过通信网关（用于
    Wi-Fi 通信）或个人集线器，然后可供云端使用。虽然网关/集线器主要用作通信介质，但这类平台拥有更强的计算能力，在某些场景下可用于额外的本地处理。最终，云端平台通常位于数据中心，拥有丰富的处理资源，可用于分析数据并由此提供有价值的服务。


    类似地，图 7-1 也展示了一个可穿戴设备的示例。考虑一个戴在手腕上测量运动量的健身设备。这类设备通常具有短距离内的低带宽连接能力，因此需要与手机等贴身设备通信，以便在需要时将数据上传到云端。更复杂的智能手表设备可能具备额外的通信能力，如
    Wi-Fi 和蜂窝网络，使其既能连接到本地连接集线器，也能在需要时直接与云端平台通信。可穿戴设备通常计算能力较低，功耗很小（毫瓦到几百毫瓦），而手机或集线器计算能力较高，功耗适中（瓦特级），云端平台则能够扩展到几十/几百瓦甚至更高。


    进一步扩展，除了可穿戴设备，我们还可以考虑智能空间中的边缘传感器设备，用于感测运动或捕获音频/视觉数据以实现交互。此类智能空间中的设备可以通过手机或本地接入点与云端通信。在这种情况下，云端平台实际上可以是本地平台，在附近范围内提供服务，也可以是数据中心中的公有云，具体取决于预期的用途。图
    7-1 中的最后一种端到端系统是前一种的扩展，因为它考虑在工业工厂类环境中使用一个聚合平台或网关，执行来自多个传感器的传感数据聚合，在本地提供潜在的分析功能，并将这些数据传输到私有或公有云平台进行进一步处理。


    ## 7.1 平台数据处理考量


    在本章中，我们将针对本书前面讨论过的一些用途，考虑此类传感器处理可能或应该在哪里完成，并探讨该领域未来的机遇与挑战。


    以下是在确定端到端平台中何处应执行处理时常见的考量因素：


    ### 7.1.1 计算能力


    由于电池续航、外形尺寸、成本甚至散热等方面的限制，端到端系统架构中的每个平台都拥有截然不同的计算能力水平。例如，一个简单的传感器节点可能只有一个微控制器内核和运行频率低于
    100 MHz 的简单控制逻辑，而一个网关平台可能拥有运行在几百 MHz 到 1 GHz 的多个内核，以及用于专门媒体或通信功能的额外硬件逻辑。云端平台通常拥有许多内核，每个内核运行在多个
    GHz 频率。鉴于计算特性存在如此广泛的范围，确定在何处运行整体应用或服务的各个部分变得至关重要。例如，传感器节点可能只能完成少量处理，而将数据发送到网关或云端则可以实现更丰富的分析和更强大的服务。


    ### 7.1.2 电池续航与功耗限制


    通常，传感器节点或手机计算能力有限的原因是它们由电池供电，因此需要以毫瓦或几十毫瓦的平均功率运行。鉴于这一特性，此类设备通常会“休眠”很长时间，只有在收到有趣的传感器数据或发生感兴趣的事件时才会进行处理。例如，在语音处理方面，边缘设备可能只能判断是否有关键词被说出，而实际的命令则在网关上处理，完整的问答处理和服务由云端提供。这样做是为了节省电池续航并限制传感器节点的成本。


    ### 7.1.3 交互性与延迟


    上述关于语音识别的例子提供了一个关于负载划分的有趣视角。如果交互性和延迟很重要，那么人们会希望尽可能多地在靠近设备的地方进行处理，以最大限度地减少将数据发送到云端并获取回复的延迟。然而，与此同时，交互性可能需要访问云端的数据，而生成答案所需的领域专业知识实际上就在那里。解决此问题的一种方法是考虑本地（用户和设备特定的）命令/问题与全局命令/问题，并在边缘节点（或附近）启用本地命令，同时在云端处理全局（更通用的）命令。


    #### 带宽可用性


    除了交互性所需的本地处理之外，本地处理的另一个关键考量是带宽可用性。如果本地节点上的可用带宽非常低，那么将所有数据发送到云端进行处理就会变得困难（延迟更高）。通信处理也会消耗功率，因此本地计算与云端通信之间通常存在权衡。如果边缘设备是移动的，带宽的可用性也会根据当前位置的覆盖范围以及室内与室外场景而变化。


    ### 7.1.4 存储与内存限制


    由于外形尺寸和功耗限制，本地边缘设备上可用的存储和内存量也是有限的，而在考虑网关和云端平台时，这些资源会逐渐增加。因此，如果需要历史数据来回答问题（再次以语音为例），那么网关或云端几乎必须通过在该问题背景下处理历史数据来提供答案。然而，如果答案只需要极少的历史数据（最近几秒或几分钟），那么本地设备或许有能力存储原始数据或日后回答问题所需的元数据。除了历史数据之外，能够访问其他数据也同样重要，如下所述。

    '
- fmt: '### 7.1.5 Access to Other Data (Crowd-Sourced or Expert Data)


    Access to data from other devices or previously collected data may also be useful
    when doing a Q&A session (speech example). Therefore, the cloud platforms have
    an advantage in performing the Q&A that requires data for specific domains. If
    the data is crowdsourced, the approach could be hierarchical where the local gateways
    can provide some context but the ultimate root of the hierarchy is the cloud platform
    where all crowdsourced data can be aggregated, processed, and stored.


    ### 7.1.6 Throughput & Batch Processing


    In some cases, the analytics requires a large amount of data to be collected and
    processed together. For example, if there is a transcription on an event required
    and this transcription is not required to be real-time, then processing at the
    cloud is more suitable than at the edge. The availability of the entire data can
    help better analytics in terms of summarizing the event as well as better context
    for various sections of the transcription. Such scenarios tend to be biased towards
    cloud execution rather than local execution on the edge device.


    ### 7.1.7 Security and Privacy


    Privacy plays an important role in determining local vs. cloud processing. If
    the data is sensitive, then the bias towards local processing is high due to considerations
    such as loss of data integrity and exposure of the data, as well as concern over
    security breaches. In addition to local processing on the edge device, the consideration
    for on-premise servers vs. public cloud infrastructure is also dependent on the
    sensitivity of the data and the availability of security capabilities to anonymize
    the data as well as protect it from being misused.


    ### 7.1.8 Hierarchical Processing


    Ultimately, the benefits and trade-offs between local edge device processing and
    cloud processing end up with a convergence towards hierarchical processing, where
    some processing is done on the edge and the amount of processing accomplished
    at the gateway and the cloud progressively increases. The use of hierarchy is
    not limited only to basic static partitioning but also dynamic approaches that
    exploit the availability of many distributed nodes to perform the processing in
    a parallel manner.


    ## 7.2 End-to-End System Partitioning and Architecture


    Figure [7-2](#A978-1-4302-6593-1_7_Chapter.html#Fig2) illustrates the above considerations
    for partitioning the workload between the three platforms in the end-to-end architecture.
    The figure shows how the considerations above bias the location of data processing
    between edge and the cloud.


    ![A978-1-4302-6593-1_7_Fig2_HTML.gif](A978-1-4302-6593-1_7_Fig2_HTML.gif)


    **Figure 7-2.** Example end-to-end system architectures


    A more detailed understanding of the platform architecture within the end-to-end
    system might be of interest as we explore the partitioning approach further. To
    accomplish this, we will explore five different platform examples: (a) simple
    sensor node, (b) wearable platform, (c) phone platform, (d) gateway platform,
    and (e) cloud server platform.


    ### 7.2.1 Sensor Node


    A typical microcontroller-based sensor node architecture is shown in Figure [7-3](#A978-1-4302-6593-1_7_Chapter.html#Fig3).
    Such a platform typically has a microcontroller chip along with external sensors,
    a battery, and potentially an external communications chip as well. The growing
    trend is to integrate the communications functionality as part of the microcontroller
    `SoC` (system-on-chip).


    ![A978-1-4302-6593-1_7_Fig3_HTML.gif](A978-1-4302-6593-1_7_Fig3_HTML.gif)


    **Figure 7-3.** Example sensor node platform architecture


    Within the microcontroller `SoC`, there is a controller core for embedded processing
    along with memory, embedded storage, and interfaces to sensors. In addition to
    the embedded core, there is potentially additional special purpose logic or engines
    that enable sensor processing locally on the device. The type of special-purpose
    logic depends heavily on the usage but ranges from digital signal processing to
    security (crypto) processing to media processing to pattern matching. These platforms
    typically optimize for ultra-low power, especially leakage power, in order to
    increase battery life for predominantly inactive usages.


    ### 7.2.2 Wearable Platform


    Another type of platform that is emerging and getting increasingly sophisticated
    is a wearable platform. A wearable platform architecture looks similar to the
    sensor node architecture, except that the core runs at higher frequencies. It
    is likely that there are two cores, one for higher performance while and the other
    for low power always-on processing. Such architectures also tend to have more
    special purpose logic for `DSP` (Digital Signal Processing), security, and other
    functionality. In addition, there is more communications and memory/storage capability
    in wearable platforms as compared to simplistic sensor nodes.


    Figure [7-4](#A978-1-4302-6593-1_7_Chapter.html#Fig4) illustrates the key differences
    between a simplistic sensor platform and a wearable platform. A simplistic sensor
    node may primarily run bare-metal code written to it so one function executes
    extremely efficiently. Wearable platforms are getting more sophisticated and may
    run embedded operating systems to provide more rich functionality. Wearables may
    also have interfaces to displays, especially for devices like smart watches. While
    these displays are fairly small, they still provide a rich user interface for
    accessing different micro-applications and services for consumer usages.


    ![A978-1-4302-6593-1_7_Fig4_HTML.gif](A978-1-4302-6593-1_7_Fig4_HTML.gif)


    **Figure 7-4.** From sensor node to wearable platforms


    The key communications capabilities on wearable devices include Bluetooth and
    potentially Wi-Fi capabilities. Bluetooth provides the ability to build personal
    area networks within a short range. More recently, Bluetooth low energy (BLE)
    provides minimized Bluetooth communications but at ultra-low power and energy.
    Almost every operating system running on phone supports Bluetooth and BLE capabilities
    in order to enable connectivity to wearable platforms. By doing so, the phone
    can act as a more powerful hub for wearables as they get used on the go in daily
    life. Bluetooth provides special-purpose profiles ranging from health care to
    fitness to headset and beyond. Beyond Bluetooth, more powerful wearable platforms
    have recently started implementing Wi-Fi capabilities to provide more bandwidth
    in home environments but at the cost of additional power. Such capabilities are
    useful as wearable platforms include higher bandwidth sensors such as audio and
    video.'
