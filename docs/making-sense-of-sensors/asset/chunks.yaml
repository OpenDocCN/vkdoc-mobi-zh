    ### 7.3.3 学习与分类


    另一种跨越端到端系统架构的能力视角是学习与分类。机器学习技术日益广泛地应用于模式匹配、音频和视觉识别。机器学习的颠覆性在于，它不再编写基于代码或基于规则的方法来识别模式，而是使用实际数据作为训练样本来开发模型。


    例如，如果需要识别 IMU 手势，可以通过使用从一组个体采集到的手势数据来训练机器学习模型（例如神经网络）从而开发手势模型。该训练过程要求设备采集数据，但不一定要求设备直接学习模型。可以采用基于云的解决方案来进行模型的训练与开发，然后将生成的模型下载到部署的设备上，以在实时场景中进行识别。


    这种划分可以被视为两个不同的步骤：(a) 离线训练 和 (b) 在线分类。事实上，当今许多应用中使用的基础模型都依赖云端来同时完成离线训练和在线分类（如图
    7-10 左上角所示）。然而，这种模型面临挑战：当将原始数据发送到云端进行在线分类的延迟限制其使用时，问题便会出现。因此，新的模型应运而生，设备通过基于云端离线训练产生的模型在本地实施分类。但这种模型在难以轻松集成个性化或因异常导致的变更时也会受到限制。因此，研究人员一直致力于开发检测异常并将其发送至云端以更新本地模型的技术。云端收集这些异常，定期生成更新的模型，并将更新部署到现场。研究人员还在尝试通过在设备本身学习本地变更来实现持续学习。这些变更不仅可以传输到云端用于更新，还可用于在本地更新模型。


    ![A978-1-4302-6593-1_7_Fig10_HTML.jpg](img/A978-1-4302-6593-1_7_Fig10_HTML.jpg)


    图 7-10.


    学习与分类（离线 vs. 在线）


    ## 7.4 端到端分区的可编程性考量


    在实现从感知到知识管理的能力时，考虑解决方案各组件的可编程性也至关重要。由于语音和视觉算法不断演进，且机器学习算法或神经网络的变体每隔几个月就会出现，因此当前实现能够轻松修改变得至关重要。此外，本章前几节介绍了多种分区可能性，这使得在硬件或算法改进成为可能时，能够动态更改这些分区也至关重要。


    一种方法是开发应用程序编程接口，允许软件开发者一致地使用通用接口，同时为修改底层实现提供灵活性。例如，如果某个语音处理流水线在其语言模型实现中使用了 HMM，而未来希望改为
    WFST，那么只要 API 定义良好且实现因此具备灵活性，这种改变就是可行的。


    此外，由于一个组件的处理可以映射到多种不同的平台（本地设备、网关或云平台），并且在每个平台内部，处理引擎可以是核心、GPU、FPGA 或加速器（或专用引擎），因此实现必须对这些细节进行抽象，以提供更改映射和底层组件的灵活性。此类灵活方法的一个例子是远程卸载，作者提出了一种基于
    OpenCL 的解决方案，用于抽象需要执行的函数，使其可以在本地设备或远程平台上运行，并且还可以在这些平台上的任何处理引擎（核心或加速器）上运行。由于异构架构因其功耗/性能优势而变得越来越普遍，此类解决方案正越来越受欢迎。图
    7-11 展示了一个工作负载被分解为功能组件，并说明了使用存根将函数执行重定向到任何平台及平台内任何处理引擎的方法。用于确定在何处运行函数的策略，可基于数据传输的可用带宽、功耗/性能（影响设备电池续航），以及平台和引擎的可用性（如果多个工作负载同时运行，或者平台并非始终在网络中可用）。


    ![A978-1-4302-6593-1_7_Fig11_HTML.jpg](img/A978-1-4302-6593-1_7_Fig11_HTML.jpg)


    图 7-11.


    工作负载分解与函数映射


    ## 7.5 总结与未来机遇


    本章介绍了传感器处理流水线的端到端架构。正如本章通过各种示例所描述的，为语音或视觉能力及应用开发端到端系统架构面临着多重挑战。这为未来的研究和开发开辟了许多机遇。此处我们列出其中一些机遇：


    -   为特定算法和原语开发专用引擎和加速器。

    -   开发能够提供动态映射和分区灵活性的端到端系统架构。

    -   开发允许探索合适分区策略的工具和模型。

    -   开发跨多种应用的通用处理流水线。

    -   为端到端系统开发运行时/编程模型。


    ## 7.6 结论


    本章总结了对我们周围环境进行传感数据处理以理解其含义的不同方面的概述。我们希望本书达到了让读者对涉及的概念和操作有高层次理解的目标。书中的讨论详细介绍了理解传感器含义的步骤，包括：(a)
    识别来自单个传感器的数据，(b) 使用多种传感模式来提高识别性能并实现新的应用，(c) 推导应用上下文，并利用该上下文改进识别操作，(d) 从识别出的信息中推导语义关系，(e)
    表示这些关系以构建知识图谱，(f) 基于知识进行操作以实现智能应用，以及 (g) 实现传感器驱动知识流水线的系统考量。


    虽然本书旨在提供所涉及技术的高层级概览，但内容旨在让读者理解知识流水线在多种传感模式和应用中的通用性质。从本书中获得的信息应能为读者提供足够的背景知识，使其能够通过选择感兴趣的领域和技术方向进入下一步学习。各章末尾提供的参考文献是进行此类探索的良好起点。

