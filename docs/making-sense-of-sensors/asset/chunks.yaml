    \ a homogenous representation that preserves the information content.\n\n    ![A978-1-4302-6593-1_3_Fig5_HTML.jpg](A978-1-4302-6593-1_3_Fig5_HTML.jpg)\n\
    \n    Figure 3-5.\n\n    Tightly coupled fusion\n\n![A978-1-4302-6593-1_3_Fig2_HTML.jpg](A978-1-4302-6593-1_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2.\n\nTwo sensor processing pipelines\n\n### 3.2.2 Dasarathy Model\n\
    \nAn elegant model to represent different levels of data fusion was proposed by\
    \ Dasarathy (see references at the end of the chapter for the original proposal\
    \ information). It represents different approaches to data fusion as a function\
    \ of input and output data types, resulting in the following different types of\
    \ fusion.\n\n*   Data In-Data Out (DAI-DAO) : The DAI-DAO model represents the\
    \ low-level fusion, where the sensor data from multiple sensors is fused together\
    \ to produce a fused data representation for the rest of the recognition pipeline.\
    \ The format of the resulting data can be the same as the input (in the case of\
    \ fusing similar sensors), or an entirely new format (heterogeneous sensor fusion).\n\
    *   Data In-Feature Out (DAI-FEO) : In this model, the fusion engine takes as\
    \ input the data from sources to be fused and produces as output a feature set\
    \ that represents the combined information from the sensors. This hybrid approach\
    \ sits between the low- and mid-level fusion approaches.\n*   Feature In-Feature\
    \ Out (FEI-FEO) : In the FEI-FEO model, the fusion engine combines pre-extracted\
    \ features from different sensors. The output is a feature set combining the multiple\
    \ feature inputs. This method represents mid-level sensor fusion.\n*   Feature\
    \ In-Decision Out (FEI-DEO) : In this context, “decision” refers to recognition\
    \ of the sensor data. This method is a hybrid between the mid-level and high-level\
    \ data fusion techniques. The fusion engine in this case takes features from different\
    \ sensor pipelines as an input and combines these to provide the recognition (decision)\
    \ output.\n*   Decision In-Decision Out (DEI-DEO) : This model is the high-level\
    \ sensor fusion model also referred to as semantic fusion by us in the discussion\
    \ above. Typically, this kind of sensor fusion is the easiest type of fusion since\
    \ we are not actually “fusing” anything. The fusion engine in most cases will\
    \ “combine” the recognized information from the pipelines to come to a recognition\
    \ decision.\n\n### 3.2.3 Sensor Configuration Model\n\nBased on the sensor configuration\
    \ model, multimodal sensor fusion can improve the functional accuracy of recognition\
    \ through one of the following modes. Figure [3-6](#A978-1-4302-6593-1_3_Chapter.html#Fig6)\
    \ illustrates the interaction between different sensor pipes for these modes.\n\
    \n![A978-1-4302-6593-1_3_Fig6_HTML.jpg](A978-1-4302-6593-1_3_Fig6_HTML.jpg)\n\n\
    Figure 3-6.\n\nFusion based on sensor collaboration model\n\n*   Complimentary\
    \ Fusion: In complementary sensor fusion, two or more sensors are used to recognize\
    \ information that is not possible to be extracted from individual sensors alone.\
    \ The sensor fusion has an additive effect in this case.\n*   Redundant Fusion\
    \ : In this mode, sensor fusion uses two or more sensors to provide information\
    \ about the same underlying process to introduce redundancy in the recognition.\n\
    *   Cooperative Fusion: In cooperative sensor fusion, different information about\
    \ the same underlying process is gathered using different sensors before being\
    \ combined to get better recognition of the underlying process, as opposed to\
    \ single sensor-based solutions.\n\n## 3.3 Example Implementations\n\nIn this\
    \ section we present examples of the different flavors of multimodal sensor integration\
    \ as described in the section above. We will use the audio and visual sensors\
    \ as examples, but the approaches are extensible to other types of heterogeneous\
    \ sensors as well."
  trans: '

    ### 3.2.1 基于耦合程度的分类


    来自多个传感器源的信息可以在识别链的不同阶段进行组合。为简单起见，我们考虑两个传感器处理管道，如图 3-2 所示。在图 3-2 中，两条处理管道相互独立运行。传感器融合可能发生在每条管道上的具体位置取决于多种因素，包括实现复杂度和识别任务所需的精度。我们定义了传感器数据融合的三个主要层次。


    - **非耦合传感器数据融合 / 语义融合**：该定义指数据融合发生在各自管道中尽可能晚的阶段。这通常意味着在识别完成之后进行集成，如图 3-3 所示。这种方法的优点是传感器融合简单，并且可以使用现有的识别技术管道来完成。领域专家喜欢这种方法，因为跨领域技术知识的需求极低。通常很难找到能掌握多个传感器领域的技术专家。对于语义融合方法，领域专家可以独立工作，应用开发者可以在更高层次上集成各种模态。


    ![A978-1-4302-6593-1_3_Fig3_HTML.jpg](img/A978-1-4302-6593-1_3_Fig3_HTML.jpg)


    图 3-3. 非耦合融合


    - **松耦合传感器数据融合 / 受限识别**：为了获得优于非耦合传感器融合的性能，专家采用一种模式，根据一个模态的结果来限制另一个模态的识别搜索空间。在这种方法中，一个识别管道帮助为另一个管道设定上下文。一旦完成，第二个识别管道只需在已建立的上下文边界内进行识别，从而可能节省计算资源并提高性能。图
    3-4 说明了这一点。与语义传感器融合的情况类似，跨领域专业知识的需求极低，但开发者确实需要理解模态之间在识别上的语义依赖关系。


    ![A978-1-4302-6593-1_3_Fig4_HTML.jpg](img/A978-1-4302-6593-1_3_Fig4_HTML.jpg)


    图 3-4. 松耦合融合


    - **紧耦合传感器数据融合 / 数据-特征级融合**：这种对性能最友好的传感器融合模型允许多个传感器进行虚拟组合，使得对于大部分应用堆栈而言，组合后的传感器看起来就像一个单一的复杂传感器。如图
    3-5 所示，传感器集成的方法包括组合来自传感器的原始数据并使用单一数据流进行处理。更实用的方法则是组合来自传感器的特征，以产生用于识别和过滤的单一特征集。虽然紧集成能为传感器融合应用带来最大的性能提升，但由于需要多领域专家共同处理数据集成，这种方法并不十分流行。在堆栈较低层级的数据表示非常依赖于特定传感器，因此需要专家做出明智的决策来合并来自多个数据源的数据。每个传感器模型在最低层都有不同的数据表示格式，这使得很难提出一种既能保留信息内容又能保持同质化的表示方式。


    ![A978-1-4302-6593-1_3_Fig5_HTML.jpg](img/A978-1-4302-6593-1_3_Fig5_HTML.jpg)


    图 3-5. 紧耦合融合


    ![A978-1-4302-6593-1_3_Fig2_HTML.jpg](img/A978-1-4302-6593-1_3_Fig2_HTML.jpg)


    图 3-2. 两条传感器处理管道


    ### 3.2.2 Dasarathy 模型


    Dasarathy 提出了一种优雅的模型来表示不同层次的数据融合（原论文信息请参见本章末尾的参考文献）。该模型将不同的数据融合方法表示为输入和输出数据类型的函数，从而产生了以下不同类型的融合。


    - **数据输入-数据输出 (DAI-DAO)**：`DAI-DAO` 模型代表低级融合，即将来自多个传感器的传感器数据融合在一起，为后续的识别管道生成一个融合后的数据表示。生成的数据格式可以与输入相同（在融合相似传感器的情况下），也可以是全新的格式（异质传感器融合）。


    - **数据输入-特征输出 (DAI-FEO)**：在此模型中，融合引擎将来自待融合数据源的数据作为输入，并将代表传感器组合信息的特征集作为输出。这种混合方法介于低级和中级融合方法之间。


    - **特征输入-特征输出 (FEI-FEO)**：在 `FEI-FEO` 模型中，融合引擎组合来自不同传感器的预提取特征。其输出是组合了多个特征输入的特征集。该方法代表中级传感器融合。


    - **特征输入-决策输出 (FEI-DEO)**：在此上下文中，“决策”指的是对传感器数据的识别。这种方法是中级和高级数据融合技术的混合体。此情形下的融合引擎将来自不同传感器管道的特征作为输入，并将这些特征组合起来以提供识别（决策）输出。


    - **决策输入-决策输出 (DEI-DEO)**：此模型是高级传感器融合模型，即我们在上述讨论中提到的语义融合。通常，这种传感器融合是最简单的类型，因为我们实际上并没有“融合”任何东西。在大多数情况下，融合引擎会“组合”来自各管道的已识别信息，以得出识别决策。


    ### 3.2.3 传感器配置模型


    基于传感器配置模型，多模态传感器融合可以通过以下模式之一提高识别的功能准确性。图 3-6 展示了这些模式下不同传感器管道之间的交互。


    ![A978-1-4302-6593-1_3_Fig6_HTML.jpg](img/A978-1-4302-6593-1_3_Fig6_HTML.jpg)


    图 3-6. 基于传感器协作模型的融合


    - **互补融合**：在互补传感器融合中，使用两个或更多传感器来识别无法从单个传感器中提取的信息。在这种情况下，传感器融合具有叠加效应。


    - **冗余融合**：在此模式下，传感器融合使用两个或更多传感器提供关于同一底层过程的信息，以在识别中引入冗余。


    - **协同融合**：在协同传感器融合中，使用不同传感器收集关于同一底层过程的不同信息，然后组合起来以更好地识别该底层过程，这与基于单个传感器的解决方案形成对比。


    ## 3.3 示例实现


    在本节中，我们将提供前述章节中描述的不同类型多模态传感器集成的示例。我们将以音频和视觉传感器为例，但这些方法也可扩展到其他类型的异质传感器。

    '
- fmt: '### 3.3.1 Semantic Fusion


    Consider a usage involving human-machine interaction with a user trying to employ
    gestures and speech for interacting with a computer or a robot. For example, a
    user might be pointing to an object in the camera field of view and asking about
    the properties of the object using voice.


    This scenario involves merging the recognition results from the visual and audio
    streams to realize the usage. Figure [3-7](#A978-1-4302-6593-1_3_Chapter.html#Fig7)
    shows the data flow.


    ![A978-1-4302-6593-1_3_Fig7_HTML.jpg](A978-1-4302-6593-1_3_Fig7_HTML.jpg)


    Figure 3-7. Semantic fusion for hand gesture-based voice commands


    As shown in Figure [3-7](#A978-1-4302-6593-1_3_Chapter.html#Fig7), two recognition
    pipes are independent and complete, as described separately in [Chapter 2](#A978-1-4302-6593-1_2_Chapter.html).
    The fusion occurs at the semantic level, i.e., at a level after the basic recognition
    is over, and we are dealing with semantics/meaning of the data.


    ### 3.3.2 Restricted Recognition


    Restricted recognition improves recognition performance for multiple modes by
    "restricting" the domain of search for one of the recognition modes. Consider
    a connected audio-visual query system that can provide details in real time about
    the objects that a user points her camera at. The usage involves pointing a smart
    camera at an unknown object and asking a verbal query about the object. Queries
    like "What is that object?", "What is the cheapest price of that book?", "How
    are the reviews of this book?", etc., can be supported. After the query is "understood"
    using the speech recognition technology and the target object of the query is
    identified, the system performs an online search to retrieve the response. Another
    step may be involved to format the result and present it to the user in a predefined
    manner.


    Such a usage can benefit from restricted recognition through performance and response
    time improvements. The high level concept is shown in Figure [3-8](#A978-1-4302-6593-1_3_Chapter.html#Fig8).
    Basically, having the context from one mode can improve the performance of the
    second mode considerably. For example, if the speech recognition engine has difficulty
    in confidently recognizing the uttered speech, using the context from recognized
    visual objects can improve speech recognition. If the speech recognition engine
    returns the query string as "How are the reviews for this hook?" and the recognition
    confidence score is below a predetermined threshold, the fact that a visual recognition
    module reports a "book" in the current recognized objects can be used to correct
    the query to "How are the reviews for this book?"


    ![A978-1-4302-6593-1_3_Fig8_HTML.jpg](A978-1-4302-6593-1_3_Fig8_HTML.jpg)


    Figure 3-8. Restricted recognition for hand gesture-based voice commands


    ### 3.3.3 Tight Fusion


    Multiple sensors use a unified recognition flow in this case. The data from different
    modes is combined very early in the process. Raw data, filtered data, or features
    may be fused. A single recognition classifier acts on the fused data for recognition.
    As an example, let us revisit the audio-visual sensor fusion example from above.
    Instead of improving the speech recognition performance after the visual recognition
    is done, if we modify the pipeline as shown in Figure [3-9](#A978-1-4302-6593-1_3_Chapter.html#Fig9),
    the recognition module will take the combined inputs from the audio and visual
    modes and provide recognition based on the combined data.


    ![A978-1-4302-6593-1_3_Fig9_HTML.jpg](A978-1-4302-6593-1_3_Fig9_HTML.jpg)


    Figure 3-9. Tight coupled fusion for hand gesture-based voice commands


    This form of recognition has the potential to provide the most performance improvement
    by eliminating duplication of recognition between modes. However, this is also
    the hardest to implement method due to multiple reasons, including:


    - **Lack of cross-domain experts**: In the example above we would need experts
    from speech recognition and visual computing technologies to work closely together.
    It is relatively rare to find individual experts having deep technical knowledge
    of both domains.

    - **Different data formats**: Different modes use different types of data and
    feature representations, making it a challenge to effectively combine these without
    loss of relevant information.

    - **Lack of training data**: To effectively train the models for multi-modal recognition,
    we need multi-modal training data. Such data is hard to get from traditional data
    sources and one needs to generate data by artificially constructing scenarios.
    This type of training data generation poses significant scalability challenges.


    ## 3.4 Mathematical Approaches for Sensor Fusion


    Sensor fusion enables better recognition through multiple approaches. The two
    main approaches are through inference and estimation. Inference assumes that the
    nature of the process generating the input signals is known in advance, so the
    obtained data can be used to infer the entity being recognized. Inferencing can
    also be interpreted as a form of decision fusion, since a decision is taken based
    on the knowledge of the perceived situation. Estimation, on the other hand, deals
    with trying to deduce (or recognize) the nature of the process producing the data
    given the observed nature of the data. In the following pages we will present
    a very brief overview of some of the common methods used for inference and estimation.
    The discussion here is neither exhaustive nor descriptive enough, and interested
    readers are encouraged to follow the references for deeper understanding of the
    topics.


    ### 3.4.1 Inferencing Approaches


    - **Bayesian Inference**: Bayesian inference uses the famous Bayes rule to recognize
    the target entity based on observed data. The Bayes rule describes the probability
    of an event based on the prior knowledge of conditions that may be related to
    the event in varying degrees. For multi-modal sensor fusion, this method uses
    the prior knowledge about co-occurrences of input values to determine occurrence
    of the event being recognized. The method is very popular in situations where
    accurate recognition is needed under relatively controlled conditions. The availability
    of controlled conditions makes it possible to obtain a lot of training data, making
    it possible to make accurate decisions.

    - **Dampster-Shaefer Inference**: The Dampseter-Shaefer inference method is based
    on the Theory of Evidence and does away with the need for a priori probabilities
    of unknown propositions. This makes it possible to use the method for inference
    in conditions where all the possible combinations of the input signals along with
    their relationship to the fused output are not known in advance. The Dampseter-Shaefer
    inference method provides flexibility of implementation in various conditions.
    This method, however, sacrifices accuracy for flexibility when compared to the
    Bayesian methods.

    - **Fuzzy Logic-based Inference**: In many instances of sensor fusion one may
    have to deal with data that does not fit well into traditional quantification
    models. For example, given two sensors, `Sensor A` and `Sensor B`, one may want
    to define inference models based on conditions like "`Sensor A` reports a HIGH
    value and `Sensor B` is NOISY." In such cases, Fuzzy Logic-based sensor fusion
    systems try to find the best outcome using the varying or dependent parameters
    as input variables.


    The Fuzzy Logic systems work in three different steps as shown in Figure [3-10](#A978-1-4302-6593-1_3_Chapter.html#Fig10).
    The steps are:'
