  trans: '

    #### 5.2.2.2 基于核的方法


    基于核的方法旨在解决基于特征的方法在训练中遇到的问题，它通过使用核函数来比较测试句子与已知示例之间的相似性。与基于特征的方法通过特征精确匹配词序列不同，基于核的方法试图提取与已知表示形式的相似性，而不是寻找更精确的匹配。


    基于核的关系抽取主要有两种类型：特征包核与树核。


    **特征包核**：基于特征包的内核方法通过创建包含实体的句子中不同部分的表示来工作。


    这类方法基于字符串属性，实际的功能核会计算学习样本与测试样本在子序列上的相似性。子序列根据它们在句子中相对于被研究实体的位置进行划分和比较。如果句子中相似的部分较长且连续，与较短且不连续的相似部分相比，基于核的方法将返回更好的匹配结果。


    例如，如果 `e_1` 和 `e_2` 是两个目标实体，包含它们的句子可以细分为序列 `s_1`、`e_1`、`s_2`、`e_2` 和 `s_3`，其中：

    - `s_1` 是第一个实体 `e_1` 之前的句子部分；

    - `s_2` 是实体 `e_1` 与 `e_2` 之间的句子部分；

    - `s_3` 是第二个实体 `e_2` 之后的句子部分。


    给定句子“The author of this book likes coffee as a breakfast drink”，如果预处理步骤分别将“author”和“coffee”识别为实体`e_1`和`e_2`，则其他参数的值将是：

    - `s_1` 是 “The”；

    - `s_2` 是 “of this book likes”；

    - `s_3` 是 “as a breakfast drink.”


    相似度分数是在词级别计算的，即在应用分类器之前，词本身会被转换成特征表示。


    **树核**：与基于特征包的方法不同，树核利用句子中的结构信息来确定预处理步骤中识别的两个实体之间是否存在关系。该结构包括句子中的词语及其顺序。


    该方法会构建一个浅层句法分析树来表示给定句子中的词序列和实体。句子“John said Andy Grove was one of the founders
    of Intel Corporation”可以用树状形式表示，如图 5-6 所示。


    ![A978-1-4302-6593-1_5_Fig6_HTML.jpg](img/A978-1-4302-6593-1_5_Fig6_HTML.jpg)


    图 5-6. 将句子表示为树


    假设预处理步骤识别了实体“John”、“Andy Grove”和“Intel Corporation”，则识别出以下句法分析树。包含实体的两个句子（子句）`S1`
    和 `S2` 被表示为句法分析树，如图 5-7 所示。当然，在本例中 `S1` 代表完整的输入句子。


    ![A978-1-4302-6593-1_5_Fig7_HTML.jpg](img/A978-1-4302-6593-1_5_Fig7_HTML.jpg)


    图 5-7. 该句子可能的句法分析树


    树 `S1` 不是浅层树，因为它不是包含关系（“founder”）的最小树，而 `S2` 则代表了这样一个浅层树。出于训练目的，句子 `S1` 被用作负例，而
    `S2` 则作为正例。


    虽然结构信息有助于基于核的方法在精确率和召回率指标上实现更好的性能，但该方法确实假设谓词（表达关系的词语）位于句子中的实体之间。尽管这并非普遍成立，但已证明这种结构信息在大多数情况下是正确的。


    #### 5.2.2.3 监督方法的局限性


    虽然基于核的方法比基于特征的方法有所改进，但监督方法仍然存在一些问题，主要是：

    - 它们表现出可扩展性问题；这些方法很难扩展以覆盖新的关系；

    - 很难实现扩展以从句子中识别出多个关系；

    - 这些方法需要预处理来识别实体或创建句法分析树。这些方法在计算和算法上可能难以实现。


    ### 5.2.3 半监督方法


    前面讨论的监督方法依赖已标注的数据来训练关系抽取所需的模型。在许多情况下，获取这些训练数据被证明是最耗时的任务，并且由于训练不足，模型性能通常会受到影响。标注任务不仅是规模问题，还涉及大量的人力投入。


    半监督关系抽取方法倾向于通过自动化分类器训练中的标注部分来克服有效标注的局限性。由于获取标注数据成本高昂，半监督方法通过在数据标注和关系抽取模块之间建立紧密循环来引导训练数据的创建。通常，一个弱学习器会输出关系信息，这些信息可用作下一阶段的训练数据。


    图 5-8 和以下步骤大致概述了一个半监督关系抽取系统。


    - **种子设定**：算法通常从一些表达关系的事例元组开始。这些例子被称为“种子”。

    - **模式归纳**：使用种子示例来学习（归纳）实体之间描述关系的模式。

    - **关系抽取**：使用这些模式来抽取包含给定关系的句子。

    - **新模式添加与种子扩展**：基于抽取出的句子，识别新的模式并将其添加到种子集中。

    - **迭代**：该过程重复进行，并进入一个新的模式归纳步骤。


    ![A978-1-4302-6593-1_5_Fig8_HTML.jpg](img/A978-1-4302-6593-1_5_Fig8_HTML.jpg)


    图 5-8. 半监督关系抽取流程


    我们现在使用流行的半监督关系抽取方法来展示上述过程的一些示例。

    '
- fmt: '### 5.2.3.1 Dual Iterative Pattern Relation Expansion (DIPRE)


    Assume the relationship of interest is “book authors.” In other words, we are
    interested in obtaining the relationship (`author`, `publication`) and extract
    as many such relationships as possible from a given set of documents. For the
    most popular text-based relation extraction tasks, the domain of search is the
    entire web. We will use the same for our example here.


    *   **Seed Phase** : Assuming that we seed the algorithm with a small sample of
    `<author, book>` relationships. The authors of the main paper used 5 relationship
    seeds.

    *   **Entity Search Phase** : The second phase involves searching for the tagged
    entities in the domain of interest. For the chosen seeds above, this would involve
    searching all the sentences that have the authors and the books appearing together.
    For our example, the search may return sentences containing the `<author, book>`
    pair connected through different sentence structures like “Isaac Asimov wrote
    The Robots of Dawn,” “The author of The Robots of Dawn is Isaac Asimov,” etc.
    Typically, large numbers of such sentences will be extracted by the search algorithms.
    In case of the authors of DIPRE the search resulted in close to 200 patterns being
    discovered using the 5 seeds used.

    *   **New Pattern Generation Phase** : Using the search results from the entity
    search phase, this phase examines each sentence to generate patterns that connect
    the entities together. For our example, the sentences returned above can lead
    to patterns of the form: “978-1-4302-6593-1 wrote `<Book>`” and “The author of
    `<Book>` is 978-1-4302-6593-1” respectively.

    *   **New Entity Search Phase** : Based on the patterns extracted in the previous
    phase, this phase searches for new entities that are connected through the same
    patterns as discovered earlier. New entities replace the previous seed and the
    flow is handed back to the entity search phase for next iteration. Using our example,
    the patterns can yield new entities in the following manner. Using the first pattern,
    “978-1-4302-6593-1 wrote `<Book>`” could return sentences like “Stephen Hawking
    wrote A Brief History of Time” and the second pattern “The author of `<Book>`
    is 978-1-4302-6593-1” can return sentences of the type “The author of The World
    as I See It is Albert Einstein.” We observe that this step is able to expand the
    specific entities with the same relationship as the seed entities. One can now
    add `<Stephen Hawking, A Brief History of Time>` and `<Albert Einstein, The World
    as I See It>` to the seed list and repeat the process again to get more formats
    for relationship description and more entities sharing similar relationships.

    *   **Termination Criteria** : A termination criteria based on the number of extracted
    entities and relationship types is generally used to stop the execution. In our
    example, a specific number of `<Author, Book>` pair discoveries could be used
    as termination criteria.


    Figure [5-9] shows the complete flow for the algorithm.


    ![A978-1-4302-6593-1_5_Fig9_HTML.jpg](A978-1-4302-6593-1_5_Fig9_HTML.jpg)


    Figure 5-9.


    DIPRE flow


    ### 5.2.3.2 Snowball


    DIPRE forms the foundation of many popular semi-supervised relationship extraction
    methods. A major drawback of the method employed by DIPRE concerns the use of
    exact phrases and word order in sentences to extract the entities in the New Entity
    Search Phase. Basically, the algorithm searches for exact matches of the word
    and order of these words in a sentence to extract the entities. As an example,
    the pattern “The author of `<Book>` is 978-1-4302-6593-1” will return the sentence
    “The author of The World as I See It is Albert Einstein” but will fail to return
    the sentence “The author of the book The World as I See It is Albert Einstein”
    because the word “book” is not part of the original template.


    To avoid such strict template matching, Snowball uses functionality similar to
    the kernel-based supervised relationship extraction methods. The patterns are
    broken down into multiple parts like the supervised methods. As in the supervised
    method, if `e_1` and `e_2` are the two entities of interest, the sentence (pattern)
    containing them could be subdivided into a sequence `s_1 e_1 s_2 e_2 s_3` where


    *   `s_1` is the part of the pattern before the first entity `e_1`;

    *   `s_2` is the part of the pattern between entities `e_1` and `e_2`;

    *   `s_3` is the part of the pattern after the second entity `e_2`.


    Snowball uses the same procedure flow as DIPRE except for one change. The New
    Entity Search Phase uses kernel-based similarity methods for the `s_1`, `s_2`,
    and `s_3` parts of the pattern instead of an exact match. The similarity metric
    makes it possible to tag the sentences that are lexically and semantically similar
    to the target pattern without requiring an exact match.


    The original Snowball algorithm was used to extract the `<Organization, Location>`
    relationship from the web data but the algorithm is generic enough to be used
    for any single order entity extraction task.


    ### 5.2.3.3 KnowItAll


    Thus far all the methods discussed have used some form of user-provided domain-specific
    patterns as a seed for relationship extraction. KnowItAll systems attempt to relax
    this restriction by providing a method to label the training examples using a
    relatively small set of domain-independent patterns. Since the generic patterns
    are applicable across different domains, the method identifies relation-specific
    rules and then uses specific instantiations for extracting domain-specific extraction
    rules.


    The KnowItAll system consists of multiple stages. The main blocks of operation
    are a bootstrapping unit, search engine, relationship extractor, an assessor,
    and a knowledge base. At the heart of the system is a search engine that uses
    the information from the web to return web pages based on queries from the bootstrapping
    unit and the extractor. In addition, the search engine provides the hit count
    from the search to aid in probability calculation for the importance of the search
    result. In general, a higher number of similar relationship expressions returned
    by the search engine points to a valid relationship extracted. The bootstrapping
    unit uses generic rule templates to form rules and information about the domain
    to focus the search. For example, “X such as Y” is a rule that implies a generic
    similarity between the entities X and Y and can be used to find domain-specific
    entities. Applying the constraint of searching for “cities” can combine with the
    rule above to search for relationships containing cities in statements like “cities
    such as New York.”


    The extractor unit applies the rules from the bootstrapping unit to the search
    results to extract the pages with statements that conform to the search. The extractions
    are then sent to the assessor, which thresholds the results based on the probability
    of occurrence (using hit count) before storing the final relationships results
    in a knowledge base. The assessor uses domain-specific discriminators provided
    by the bootstrapping unit by applying the information focus constraint (domain-specific)
    to the extracted results. Readers are referred to the references at the end of
    the chapter for a more thorough description of the KnowItAll system.'
  raw: '#### 5.2.3.1 Dual Iterative Pattern Relation Expansion (DIPRE)


    Assume the relationship of interest is “book authors.” In other words, we are
    interested in obtaining the relationship (author, publication) and extract as
    many such relationships as possible from a given set of documents. For the most
    popular text-based relation extraction tasks, the domain of search is the entire
    web. We will use the same for our example here.


    *   Seed Phase : Assuming that we seed the algorithm with a small sample of <author,
    book> relationships. The authors of the main paper used 5 relationship seeds.

    *   Entity Search Phase : The second phase involves searching for the tagged entities
    in the domain of interest. For the chosen seeds above, this would involve searching
    all the sentences that have the authors and the books appearing together. For
    our example, the search may return sentences containing the <author, book> pair
    connected through different sentence structures like “Isaac Asimov wrote The Robots
    of Dawn,” “The author of The Robots of Dawn is Isaac Asimov,” etc. Typically,
    large numbers of such sentences will be extracted by the search algorithms. In
    case of the authors of DIPRE the search resulted in close to 200 patterns being
    discovered using the 5 seeds used.

    *   New Pattern Generation Phase : Using the search results from the entity search
    phase, this phase examines each sentence to generate patterns that connect the
    entities together. For our example, the sentences returned above can lead to patterns
    of the form:“978-1-4302-6593-1 wrote <Book>” and “The author of <Book> is 978-1-4302-6593-1”
    respectively.

    *   New Entity Search Phase : Based on the patterns extracted in the previous
    phase, this phase searches for new entities that are connected through the same
    patterns as discovered earlier. New entities replace the previous seed and the
    flow is handed back to the entity search phase for next iteration. Using our example,
    the patterns can yield new entities in the following manner. Using the first pattern,
    “978-1-4302-6593-1 wrote <Book>” could return sentences like “Stephen Hawking
    wrote A Brief History of Time” and the second pattern “The author of <Book> is
    978-1-4302-6593-1” can return sentences of the type “The author of The World as
    I See It is Albert Einstein.” We observe that this step is able to expand the
    specific entities with the same relationship as the seed entities. One can now
    add <Stephen Hawking, A Brief History of Time> and <Albert Einstein, The World
    as I See It> to the seed list and repeat the process again to get more formats
    for relationship description and more entities sharing similar relationships.

    *   Termination Criteria : A termination criteria based on the number of extracted
    entities and relationship types is generally used to stop the execution. In our
    example, a specific number of <Author, Book> pair discoveries could be used as
    termination criteria.


    Figure [5-9](#A978-1-4302-6593-1_5_Chapter.html#Fig9) shows the complete flow
    for the algorithm.


    ![A978-1-4302-6593-1_5_Fig9_HTML.jpg](A978-1-4302-6593-1_5_Fig9_HTML.jpg)


    Figure 5-9.


    DIPRE flow


    #### 5.2.3.2 Snowball


    DIPRE forms the foundation of many popular semi-supervised relationship extraction
    methods. A major drawback of the method employed by DIPRE concerns the use of
    exact phrases and word order in sentences to extract the entities in the New Entity
    Search Phase. Basically, the algorithm searches for exact matches of the word
    and order of these words in a sentence to extract the entities. As an example,
    the pattern “The author of <Book> is 978-1-4302-6593-1” will return the sentence
    “The author of The World as I See It is Albert Einstein” but will fail to return
    the sentence “The author of the book The World as I See It is Albert Einstein”
    because the word “book” is not part of the original template.


    To avoid such strict template matching, Snowball uses functionality similar to
    the kernel-based supervised relationship extraction methods. The patterns are
    broken down into multiple parts like the supervised methods. As in the supervised
    method, if e_1 and e_2 are the two entities of interest, the sentence (pattern)
    containing them could be subdivided into a sequence s_1 e_1 s_2 e_2 s_3 where


    *   s_1 is the part of the pattern before the first entity e_1;

    *   s_2 is the part of the pattern between entities e_1 and e_2;

    *   s_3 is the part of the pattern after the second entity e_2.


    Snowball uses the same procedure flow as DIPRE except for one change. The New
    Entity Search Phase uses kernel-based similarity methods for the s_1, s_2, and
    s_3 parts of the pattern instead of an exact match. The similarity metric makes
    it possible to tag the sentences that are lexically and semantically similar to
    the target pattern without requiring an exact match.


    The original Snowball algorithm was used to extract the <Organization, Location>
    relationship from the web data but the algorithm is generic enough to be used
    for any single order entity extraction task.


    #### 5.2.3.3 KnowItAll


    Thus far all the methods discussed have used some form of user-provided domain-specific
    patterns as a seed for relationship extraction. KnowItAll systems attempt to relax
    this restriction by providing a method to label the training examples using a
    relatively small set of domain-independent patterns. Since the generic patterns
    are applicable across different domains, the method identifies relation-specific
    rules and then uses specific instantiations for extracting domain-specific extraction
    rules.


    The KnowItAll system consists of multiple stages. The main blocks of operation
    are a bootstrapping unit, search engine, relationship extractor, an assessor,
    and a knowledge base. At the heart of the system is a search engine that uses
    the information from the web to return web pages based on queries from the bootstrapping
    unit and the extractor. In addition, the search engine provides the hit count
    from the search to aid in probability calculation for the importance of the search
    result. In general, a higher number of similar relationship expressions returned
    by the search engine points to a valid relationship extracted. The bootstrapping
    unit uses generic rule templates to form rules and information about the domain
    to focus the search. For example, “X such as Y” is a rule that implies a generic
    similarity between the entities X and Y and can be used to find domain-specific
    entities. Applying the constraint of searching for “cities” can combine with the
    rule above to search for relationships containing cities in statements like “cities
    such as New York.”


    The extractor unit applies the rules from the bootstrapping unit to the search
    results to extract the pages with statements that conform to the search. The extractions
    are then sent to the assessor, which thresholds the results based on the probability
    of occurrence (using hit count) before storing the final relationships results
    in a knowledge base. The assessor uses domain-specific discriminators provided
    by the bootstrapping unit by applying the information focus constraint (domain-specific)
    to the extracted results. Readers are referred to the references at the end of
    the chapter for a more thorough description of the KnowItAll system.'
  trans: '

    ### 5.2.3.1 双重迭代模式关系扩展（DIPRE）


    假设我们感兴趣的关系是“图书作者”。换言之，我们希望获取关系（`作者`，`出版物`），并从给定的文档集中尽可能多地提取此类关系。对于最流行的基于文本的关系提取任务，搜索域是整个网络。在此我们以此为例进行说明。


    *   **种子阶段**：假设我们向算法输入一小批`<作者，图书>`关系作为种子。主要论文的作者使用了 5 个关系种子。

    *   **实体搜索阶段**：第二阶段涉及在感兴趣的领域中搜索已标记的实体。对于上述选定的种子，这需要搜索所有同时出现作者和图书的句子。在我们的例子中，搜索可能会返回包含通过不同句子结构连接的`<作者，图书>`对的句子，例如“艾萨克·阿西莫夫撰写了《机器人黎明》”、“《机器人黎明》的作者是艾萨克·阿西莫夫”等。通常，搜索算法会提取大量此类句子。在
    DIPRE 作者的情况下，使用 5 个种子进行搜索，最终发现了近 200 种模式。

    *   **新模式生成阶段**：利用实体搜索阶段的搜索结果，此阶段检查每个句子以生成连接实体的模式。在我们的例子中，上面返回的句子可以分别形成诸如“978-1-4302-6593-1
    撰写了 `<图书>`”和“`<图书>` 的作者是 978-1-4302-6593-1”形式的模式。

    *   **新实体搜索阶段**：基于上一阶段提取的模式，此阶段搜索通过相同模式连接的新实体。新实体替换先前的种子，流程返回实体搜索阶段进行下一次迭代。以我们的例子为例，这些模式可以通过以下方式产生新实体。使用第一个模式，“978-1-4302-6593-1
    撰写了 `<图书>`”可能会返回诸如“斯蒂芬·霍金撰写了《时间简史》”之类的句子；第二个模式“`<图书>` 的作者是 978-1-4302-6593-1”可能会返回诸如“《我所见的世界》的作者是阿尔伯特·爱因斯坦”之类的句子。我们观察到，此步骤能够扩展与种子实体具有相同关系的特定实体。现在可以将`<斯蒂芬·霍金，《时间简史》>`和`<阿尔伯特·爱因斯坦，《我所见的世界》>`添加到种子列表中，并重复该过程以获取更多关系描述的格式以及更多共享相似关系的实体。

    *   **终止标准**：通常根据提取的实体数量和关系类型来设定终止标准，以停止执行。在我们的例子中，可以使用特定数量的`<作者，图书>`对的发现作为终止标准。


    图 [5-9] 显示了该算法的完整流程。


    ![A978-1-4302-6593-1_5_Fig9_HTML.jpg](img/A978-1-4302-6593-1_5_Fig9_HTML.jpg)


    图 5-9. DIPRE 流程


    ### 5.2.3.2 Snowball


    DIPRE 构成了许多流行的半监督关系提取方法的基础。该方法的一个主要缺点在于，在新实体搜索阶段使用了句子中的精确短语和词序来提取实体。基本上，算法会搜索句子中单词及其顺序的精确匹配来提取实体。例如，模式“`<图书>`
    的作者是 978-1-4302-6593-1”会返回句子“《我所见的世界》的作者是阿尔伯特·爱因斯坦”，但无法返回句子“《我所见的世界》一书的作者是阿尔伯特·爱因斯坦”，因为单词“书”不在原始模板中。


    为了避免这种严格的模板匹配，Snowball 使用了类似于基于核的有监督关系提取方法的功能。与有监督方法一样，模式被分解成多个部分。假设 `e_1` 和 `e_2`
    是两个感兴趣的实体，包含它们的句子（模式）可以细分为序列 `s_1 e_1 s_2 e_2 s_3`，其中：


    *   `s_1` 是模式中第一个实体 `e_1` 之前的部分；

    *   `s_2` 是模式中实体 `e_1` 和 `e_2` 之间的部分；

    *   `s_3` 是模式中第二个实体 `e_2` 之后的部分。


    Snowball 使用与 DIPRE 相同的过程流程，但有一处更改。在新实体搜索阶段，对于模式的 `s_1`、`s_2` 和 `s_3` 部分，使用基于核的相似性方法，而非精确匹配。相似性度量使得标记那些在词汇和语义上与目标模式相似但不必完全匹配的句子成为可能。


    最初的 Snowball 算法用于从网络数据中提取`<组织，地点>`关系，但该算法足够通用，可用于任何单一顺序的实体提取任务。


    ### 5.2.3.3 KnowItAll


    目前为止，讨论的所有方法都使用了某种用户提供的特定领域模式作为关系提取的种子。KnowItAll 系统试图通过提供一种使用相对较少的领域无关模式来标记训练示例的方法，来放宽这一限制。由于通用模式可应用于不同领域，该方法先识别出关系特定的规则，然后使用特定的实例化来提取领域特定的提取规则。


    KnowItAll 系统由多个阶段组成。主要的操作模块包括一个引导单元、搜索引擎、关系提取器、评估器和一个知识库。系统的核心是一个搜索引擎，它利用来自网络的信息，根据引导单元和提取器的查询返回网页。此外，搜索引擎提供搜索的命中次数，以辅助计算搜索结果重要性的概率。通常，搜索引擎返回的相似关系表达式数量越多，表明提取出的关系越有效。引导单元使用通用规则模板来形成规则，并利用关于领域的信息来聚焦搜索。例如，“诸如
    Y 之类的 X”是一条规则，暗示实体 X 和 Y 之间的通用相似性，可用于查找特定领域的实体。应用搜索“城市”的约束，可以与该规则结合，在诸如“诸如纽约之类的城市”这样的语句中搜索包含城市的关系。


    提取器单元将引导单元的规则应用于搜索结果，以提取符合搜索的包含相关陈述的页面。提取的结果随后被发送给评估器，评估器根据出现的概率（使用命中次数）对结果进行阈值过滤，然后将最终的关系结果存储到知识库中。评估器通过将（特定领域的）信息聚焦约束应用于提取的结果，来使用引导单元提供的领域特定判别器。有关
    KnowItAll 系统的更详细描述，请读者参考本章末尾的参考文献。

    '
- fmt: "#### 5.2.3.4 `TextRunner`\n\n相比于`DIPRE`、`Snowball`和`KnowItAll`系统，`TextRunner`系统旨在无需任何人工输入的情况下发现关系，并基于自行发现的正负训练样本来训练分类器。`TextRunner`系统的目的是遍历给定的文本库，搜索关系模式，并训练分类器，这些分类器随后可用于从新的文本句子中提取不同的关系。\n\
    \n该方法采用了类似`KnowItAll`的提取器和评估器，但使用一种领域无关的分类器训练方法替代了自举方法。\n\n该学习方法接收一个文档池作为输入。这些文档可以从网络上抓取，或通过其他方法提供给算法。第一步将句子分割成块，并识别实体（名词）和可能的谓词。第二步尝试发现实体之间可能的关系。第三步、第四步和第五步使用不同的解析技术（句法分析、依存分析和预约束解析）将识别出的关系筛选为正关系示例或负关系示例。第六步使用生成的正负示例训练一个分类器。作者使用了多种类型的分类器。读者可参考本章的参考文献部分，以获取对该系统的详细描述。\n\
    \n## 5.3 `NEIL`（永不终结的图像学习）\n\n到目前为止，我们主要关注基于文本输入的关系提取。所讨论的方法构成了从通过各种感知模态生成的数据中进行关系提取的基础。`NEIL`尝试使用上述方法从图像中检测和提取关系。该算法的操作流程如下。\n\
    \n*   **候选实体检测器训练**：该算法使用不同的方法来启动从文本到视觉关系提取的过程。第一步是执行实体检测。此处的实体被定义为对象、对象属性和场景。可以手动提供图像种子及其用于训练的标注。然而，一种更高效的方法是使用基于文本的图像搜索（发明者使用了谷歌图像搜索）来为每个实体搜索检索大量图像。在检索到的图像上，针对每个实体训练多个检测器。例如，我们可以训练数十或数百个分类器来检测一辆自行车。拥有多个检测器可以解决过拟合（模型只能检测一种类型/形状的自行车）问题，并覆盖对象、场景和属性的高维度问题（例如，“汽车”有多种形状、大小和颜色，一个“汽车”检测器必须能够检测到其中的绝大部分）。随后，对多个检测器针对同一个实体达成的共识用于决定最终的检测结果。\n\
    *   **关系发现**：在实体检测器检测到实体（对象、属性和场景）之后，关系发现步骤尝试发现以下类型的关系：\n    *   **对象-对象关系**：对象-对象关系发现包括找出对象之间的部分整体关系、分类关系和相似关系。部分整体关系描述了一个对象是否是另一个对象的一部分（鼻子是脸的一部分），分类关系将实例连接到更广泛的类别（`iPhone`是一款手机），相似关系发现彼此相似的对象（蜜蜂看起来类似于黄蜂）。对象-对象关系的发现通过使用对象边界框进行。检测器识别图像中的对象并围绕它们“绘制”边界框。根据这些边界框的相对位置，关系发现阶段可以识别对象间的关系。例如，一个边界框嵌套在另一个边界框内表示部分整体关系。在不同的边界框中，两个不同的检测器在多个图像中对同一个对象进行边界框处理，则表明存在分类关系和相似关系。彼此靠近且一致出现的对象边界框可以指示空间关系（在图像中，显示器总是靠近键盘出现）。\n\
    \    *   **对象-属性关系**：对象检测器和属性检测器一致地同时触发可以指示一个强烈的对象-属性关系。“太阳是明亮的”和“球是球形的”是对象-属性关系的一些例子。\n\
    \    *   **场景-对象关系**：以类似于对象-属性关系的方式，场景-对象关系试图发现那些在特定场景中一致出现的对象。例如，“船只在海洋中被发现。”\n\
    \    *   **场景-属性关系**：发现的场景-属性关系包括诸如“公园是绿色的”、“夜晚是黑暗的”等类型的关系。\n*   **新实例发现**：利用前一步骤中发现的关系，该算法尝试寻找实体的新实例。例如，有时检测器可能无法检测到某个实体的特定实例（一个未经训练的汽车实例或类型），但利用发现的关系可以更容易地检测到这些新实例（与汽车最常关联的形状、颜色、场景等可以指向一个可能是汽车的对象）。\n\
    *   **检测器重训练**：利用新发现的实例，对检测器进行重训练，然后实体发现过程重新开始。\n\n顾名思义，永不终结的图像学习是一个持续的迭代过程，它通过上述步骤在一个无限循环中工作，以不断增加发现的关系数量。\n\
    \n## 5.4 总结\n\n至此，这一章关于关系发现的内容就结束了。在本章中，我们讨论了主要的关系提取方法如何基于文本关系发现。我们讨论了基于知识的关系提取方法，包括领域相关和领域无关的方法。有监督的文本关系提取方法包括基于特征和基于核的方法。为了减少训练所需的人工标注成本，半监督方法尝试通过从手动或自动生成的种子开始的迭代方法，自动标注种子关系和实体。我们以`NEIL`为例，讨论了基于文本的关系发现概念如何直接扩展到其他感知领域的关系提取。下一章将概述如何使用关系信息构建知识库，并针对不同的用途对发现的关系进行操作。"
  raw: '#### 5.2.3.4 TextRunner


    As compared with DIPRE, Snowball, and KnowItAll systems, the TextRunner system
    is designed to discover the relationships without any human input and train classifiers
    based on self-discovered positive and negative training examples. The purpose
    of the text runner system is to go through a given textual repository, search
    for relationship patterns, and train classifiers that can then be used to extract
    different relationships from new text sentences.


    The method employs extractors and assessors like KnowItAll but replaces the bootstrapping
    methods with a domain-independent classifier training method.


    The learning method takes a pool of documents as an input. The documents could
    be scrapped off the web or provided to the algorithm by other methods. The first
    step divides the sentence into chunks and identifies the entities (nouns) and
    possible predicates. Step 2 attempts to find possible relationships between the
    entities. Steps 3, 4, and 5 use different parsing techniques (syntactic, dependency,
    and pre-constrained) to filter out the identified relationships as positive or
    negative examples of relationships. Step 6 trains a classifier using the positive
    and negative examples generated. Many types of classifiers have been employed
    by the authors. Readers are referred to the reference section of this chapter
    for a detailed description of the system.


    ## 5.3 NEIL (Never Ending Image Learning)


    So far we concentrated on relationship extraction from text-based input. The methods
    discussed form the foundation of relationship extraction from data generated through
    various sensing modalities. NEIL attempts to use the methods outlined above to
    detect and extract relationships from images. The algorithm operates as outlined
    below.


    *   -Candidate entity detector training: The algorithm uses different ways to
    seed the process of visual relationship extraction from text. The first step is
    to perform the entity detection. Entities in this case are defined as objects,
    object attributes, and scenes. The image seeds can be provided manually along
    with the annotations for training. A more efficient way, however, is to use the
    text-based image search (inventors used Google image search) to retrieve large
    amount of images for each entity search. Multiple detectors are trained on each
    entity over the retrieved images. For example, we could train tens or hundreds
    of classifiers to detect a bicycle. Having multiple detectors solves the problems
    of overfitting (having the model detect only one kind/shape of bicycle) and coverage
    for high dimensionality of objects, scenes, and attributes (e.g., “cars” come
    in many shapes, sizes, and colors and a “car” detector must be able to detect
    a majority of these). Consensus on multiple detectors for an entity is then used
    to decide on the detection result.

    *   Relationship Discovery : After the entity detector detects the entities (objects,
    attributes, and scenes), the relationship discovery step attempts to find the
    following type of relationships:

    *   Object-object relationships : The object-object relationship discovery comprises
    of finding out the partonomic, taxonomic, and similarity relationship between
    the objects. Partonomic relationships describe if one object is a part of another
    (nose is a part of the face), taxonomic relationships connect the instances to
    broader classes (iPhone is a mobile phone), and the similarity relationships discover
    objects that are similar to each other (bees look similar to wasps). The object-object
    relationship discovery is performed through the use of object bounding boxes.
    The detectors identify the objects in an image and “draw” bounding boxes around
    them. Depending on the relative position of these bounding boxes, the relationship
    discovery stage can identify the inter-object relationships. For example, one
    bounding box nested in another indicates a partonomic relationship. Two different
    detectors bounding the same object in multiple images indicates taxonomic and
    similarity relationships. Object bounding boxes that occur close to each other
    consistently can indicate a spatial relationship (monitor is consistently close
    to a keyboard in images).

    *   Object-attribute relationships : Object detectors and attribute detectors
    firing consistently together can indicate a strong object-attribute relationship.
    “Sun is bright” and “ball is spherical” are some examples of object-attribute
    relationships.

    *   Scene-object relationship : In a manner similar to object-attribute relationship,
    the scene-object relationship attempts to find the objects that occur consistently
    in certain scenes. For example, “ships are found in the ocean.” Scene-attribute
    relationship : The scene-attribute relationships discovered include relationships
    of the type “park is green,” “night is dark,” etc.

    *   New Instance Discovery : Using the relationships found in the previous step,
    the algorithm tries to find new instances of entities. For example, sometime the
    detectors may fail to detect a certain instance of an entity (a non-trained instance
    or type of a car) but using the discovered relationships can make it easy to detect
    these new instances (shapes, color, scene, etc. that cars are most associated
    with can point to an object likely being a car).

    *   Retraining of detectors: Using the newly discovered instances, the detectors
    are retrained and the process of entity discovery starts afresh.


    As the name suggests, Never Ending Image Learning is a continuous iterative process
    that works to increase the relationships discovered in an infinite loop through
    the steps described above.


    ## 5.4 Summary


    This concludes the chapter on relationship discovery. In this chapter we discussed
    how major relationship extraction methods are based on textual relationship discovery.
    We discussed the knowledge-based relationship extraction methods including domain-dependent
    and domain-independent methods. Supervised textual relationship extraction methods
    include feature- and kernel-based methods. To reduce human labeling costs for
    training, semi-supervised methods attempt to automatically label the seed relationships
    and entities through iterative methods starting with manual or auto-generated
    seeds. With NEIL as an example, we discussed how text-based relationship extraction
    concepts directly extend to relationship extraction in other sensing domains.
    The next chapter outlines the methods to use the relationship information to build
    knowledge bases and operate on discovered relationships for different usages.'
  trans: "\n#### 5.2.3.4 `TextRunner`\n\n相较于`DIPRE`、`Snowball`和`KnowItAll`系统，`TextRunner`系统旨在无需任何人工输入的情况下发现关系，并基于自行发现的正负训练样本来训练分类器。`TextRunner`系统的目的是遍历给定的文本库，搜索关系模式，并训练分类器，这些分类器随后可用于从新的文本句子中提取不同的关系。\n\
    \n该方法采用了类似`KnowItAll`的提取器和评估器，但使用一种领域无关的分类器训练方法替代了自举方法。\n\n该学习方法接收一个文档池作为输入。这些文档可以从网络上抓取，或通过其他方法提供给算法。第一步将句子分割成块，并识别实体（名词）和可能的谓词。第二步尝试发现实体之间可能的关系。第三步、第四步和第五步使用不同的解析技术（句法分析、依存分析和预约束解析）将识别出的关系筛选为正关系示例或负关系示例。第六步使用生成的正负示例训练一个分类器。作者使用了多种类型的分类器。读者可参考本章的参考文献部分，以获取对该系统的详细描述。\n\
    \n## 5.3 `NEIL`（永不终结的图像学习）\n\n到目前为止，我们主要关注基于文本输入的关系提取。所讨论的方法构成了从通过各种感知模态生成的数据中进行关系提取的基础。`NEIL`尝试使用上述方法从图像中检测和提取关系。该算法的操作流程如下。\n\
    \n*   **候选实体检测器训练**：该算法使用不同的方法来启动从文本到视觉关系提取的过程。第一步是执行实体检测。此处的实体被定义为对象、对象属性和场景。可以手动提供图像种子及其用于训练的标注。然而，一种更高效的方法是使用基于文本的图像搜索（发明者使用了谷歌图像搜索）来为每个实体搜索检索大量图像。在检索到的图像上，针对每个实体训练多个检测器。例如，我们可以训练数十或数百个分类器来检测一辆自行车。拥有多个检测器可以解决过拟合（模型只能检测一种类型/形状的自行车）问题，并覆盖对象、场景和属性的高维度问题（例如，“汽车”有多种形状、大小和颜色，一个“汽车”检测器必须能够检测到其中的绝大部分）。随后，对多个检测器针对同一个实体达成的共识用于决定最终的检测结果。\n\
    *   **关系发现**：在实体检测器检测到实体（对象、属性和场景）之后，关系发现步骤尝试发现以下类型的关系：\n    *   **对象-对象关系**：对象-对象关系发现包括找出对象之间的部分整体关系、分类关系和相似关系。部分整体关系描述了一个对象是否是另一个对象的一部分（鼻子是脸的一部分），分类关系将实例连接到更广泛的类别（`iPhone`是一款手机），相似关系发现彼此相似的对象（蜜蜂看起来类似于黄蜂）。对象-对象关系的发现通过使用对象边界框进行。检测器识别图像中的对象并围绕它们“绘制”边界框。根据这些边界框的相对位置，关系发现阶段可以识别对象间的关系。例如，一个边界框嵌套在另一个边界框内表示部分整体关系。在不同的边界框中，两个不同的检测器在多个图像中对同一个对象进行边界框处理，则表明存在分类关系和相似关系。彼此靠近且一致出现的对象边界框可以指示空间关系（在图像中，显示器总是靠近键盘出现）。\n\
    \    *   **对象-属性关系**：对象检测器和属性检测器一致地同时触发可以指示一个强烈的对象-属性关系。“太阳是明亮的”和“球是球形的”是对象-属性关系的一些例子。\n\
    \    *   **场景-对象关系**：以类似于对象-属性关系的方式，场景-对象关系试图发现那些在特定场景中一致出现的对象。例如，“船只在海洋中被发现。”\n\
    \    *   **场景-属性关系**：发现的场景-属性关系包括诸如“公园是绿色的”、“夜晚是黑暗的”等类型的关系。\n*   **新实例发现**：利用前一步骤中发现的关系，该算法尝试寻找实体的新实例。例如，有时检测器可能无法检测到某个实体的特定实例（一个未经训练的汽车实例或类型），但利用发现的关系可以更容易地检测到这些新实例（与汽车最常关联的形状、颜色、场景等可以指向一个可能是汽车的对象）。\n\
    *   **检测器重训练**：利用新发现的实例，对检测器进行重训练，然后实体发现过程重新开始。\n\n顾名思义，永不终结的图像学习是一个持续的迭代过程，它通过上述步骤在一个无限循环中工作，以不断增加发现的关系数量。\n\
    \n## 5.4 总结\n\n至此，这一章关于关系发现的内容就结束了。在本章中，我们讨论了主要的关系提取方法如何基于文本关系发现。我们讨论了基于知识的关系提取方法，包括领域相关和领域无关的方法。有监督的文本关系提取方法包括基于特征和基于核的方法。为了减少训练所需的人工标注成本，半监督方法尝试通过从手动或自动生成的种子开始的迭代方法，自动标注种子关系和实体。我们以`NEIL`为例，讨论了基于文本的关系发现概念如何直接扩展到其他感知领域的关系提取。下一章将概述如何使用关系信息构建知识库，并针对不同的用途对发现的关系进行操作。\n"
- fmt: '# 6. Knowledge and Ontologies


    So far the chapters in the book have focused on the primary task of data acquisition
    and relationship extraction. For the more sophisticated applications, specifically
    the ones that exhibit some form of intelligence, the relationship information
    forms the basis of reasoning and interpretation. The recent surge in Artificial
    Intelligence (AI) applications and other data analytics-based services is in part
    because of technologies taking advantage of the various knowledge representation
    mechanisms. In this chapter we focus on introducing some of the popular methods
    for knowledge representation and their usages.


    As we discussed in the previous chapter, a relationship between entities in its
    simplest forms can be expressed as a triplet with the relationship connecting
    an object with a subject. We reproduce here in Figure [6-1](#A978-1-4302-6593-1_6_Chapter.html#Fig1),
    a figure we used to illustrate this concept earlier in the book.


    ![A978-1-4302-6593-1_6_Fig1_HTML.jpg](A978-1-4302-6593-1_6_Fig1_HTML.jpg)


    Figure 6-1. Relationship triples


    A few methods to extract these types of relationships were discussed in the previous
    chapter. We also briefly discussed how multiple triplets with common elements
    (object or subject) can be combined to form extensions of relationships, commonly
    termed as knowledge as depicted in Figure [6-2](#A978-1-4302-6593-1_6_Chapter.html#Fig2).


    ![A978-1-4302-6593-1_6_Fig2_HTML.jpg](A978-1-4302-6593-1_6_Fig2_HTML.jpg)


    Figure 6-2. First steps from relationship to knowledge


    These methods form the foundation of knowledge building. Repeating this basic
    step results in a graph of knowledge that embeds the relationships already discovered
    through relationship extraction and provides the too to identify the new relationships
    emerging from the graph structure itself.


    This graph is generally supplemented with tools that can perform logical operations
    on the graph to reason and interpret the current relationship structure and infer
    new relationships based on this knowledge from the graph.


    ## 6.1 Relationship Representation using RDF


    Relationship Description Format (`RDF`) is the format for describing semantic
    relationships between entities. The format has been adopted as a recommendation
    by the World Wide Web consortium (`W3C`).


    The technologies discussed in this chapter describe some of the most popular approaches
    to knowledge building. Many of these use `RDF` as the semantic description language.
    `RDF` uses XML-based description formats to describe various entities as resources
    and relationships as resource properties. The following components are defined
    for use with `RDF`:


    - **Resources**: Any entity that is described by `RDF` is called a resource. `RDF`
    is very flexible when it comes to the resource descriptions. The resources are
    generally defined and referred to as part of a “document” using a standard XML-based
    format as shown in Figure [6-2](#A978-1-4302-6593-1_6_Chapter.html#Fig2).

    - **Properties**: Attributes of entities are described as properties in the `RDF`
    document. The relationships of resources with other resources are also embedded
    in the description document as a property.

    - **Statements**: An `RDF` statement is defined as a collection of an `RDF` resource
    along with one or more attributes plus the properties associated with those attributes.
    At its very basic form, the `RDF` statement represents an entity with its relationships
    to other entities. A complete knowledge-based graph is a collection of such statements.


    `RDF` makes it very easy to construct knowledge-based graphs. It adds flexibility
    to the knowledge generation and representation process. New attributes can be
    added to resources by updating the XML statements. Similarly, new relationships
    are added by simple document update.


    Source: [`http://www.w3schools.com/xml/xml:rdf.asp`](http://www.w3schools.com/xml/xml:rdf.asp)


    Figure [6-3](#A978-1-4302-6593-1_6_Chapter.html#Fig3) shows an example `RDF` document.
    The document refers to the resource “[`http://www.w3school.com`](http://www.w3school.com/)”
    and the document contains two attributes (title, author). The attributes point
    to relationships with other resources. Figure [6-4](#A978-1-4302-6593-1_6_Chapter.html#Fig4)
    shows the graphical representation of the relationship described by the document
    in Figure [6-3](#A978-1-4302-6593-1_6_Chapter.html#Fig3).


    ![A978-1-4302-6593-1_6_Fig4_HTML.jpg](A978-1-4302-6593-1_6_Fig4_HTML.jpg)


    Figure 6-4. Relationship described by the `RDF` document for Figure [6-3](#A978-1-4302-6593-1_6_Chapter.html#Fig3)


    ![A978-1-4302-6593-1_6_Fig3_HTML.jpg](A978-1-4302-6593-1_6_Fig3_HTML.jpg)


    Figure 6-3. `RDF` document


    ## 6.2 Freebase: Database of Relationships


    `Freebase` was one of the first relationship-based data stores. It was started
    by a company called `Metaweb` that aimed to provide a relationship-based database
    access to commercial and non-commercial organizations. The database was built
    up on user-submitted triplets as well as the relationships discovered from the
    web. The relationship information contribution to the database was designed to
    be completely collaborative, with anyone having the ability to submit relationship
    triplets for consideration to be included as part of the database. Triplets used
    the `RDF` format for description. At its peak, `Freebase` contained about 1.9
    billion triplets depicting relationships. The company was acquired by Google in
    2010 and the database was used to partly construct Google’s Knowledge Graph. The
    sketch in Figure [6-5](#A978-1-4302-6593-1_6_Chapter.html#Fig5) shows an equivalent
    representation of a knowledge store similar to `FreeBase`-based graphs.


    ![A978-1-4302-6593-1_6_Fig5_HTML.jpg](A978-1-4302-6593-1_6_Fig5_HTML.jpg)


    Figure 6-5. An example rendition similar to a `FreeBase` knowledge store


    ## 6.3 ConceptNet: Common Sense Knowledge


    `ConceptNet` is an initiative from MIT ([`http://alumni.media.mit.edu/~hugo/publications/papers/BTTJ-ConceptNet.pdf`](http://alumni.media.mit.edu/%7Ehugo/publications/papers/BTTJ-ConceptNet.pdf))
    that attempts to represent and provide access to common sense knowledge. Concepts
    like “A lemon is sour,” “Fire is hot,” and “To open a door one must usually turn
    a knob” are common sense concepts that humans understand but computers need to
    be told. Having a knowledge base for such concepts can significantly aid the machine
    understanding of higher-level concepts. For example, asking a robot to “Go outside”
    implicitly assumes opening a door by turning a knob. `ConceptNet` aims to provide
    this common sense in the form of a knowledge base containing a massive amount
    of common sense information. Figure [6-6](#A978-1-4302-6593-1_6_Chapter.html#Fig6)
    shows an example of how `ConceptNet` might represent and store common sense knowledge.


    ![A978-1-4302-6593-1_6_Fig6_HTML.jpg](A978-1-4302-6593-1_6_Fig6_HTML.jpg)


    Figure 6-6. A sketch representing part of `ConceptNet` for common sense knowledge'
