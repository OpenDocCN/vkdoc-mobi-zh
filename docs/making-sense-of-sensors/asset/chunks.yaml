  trans: '

    ### 3.4.1 基于模糊逻辑的推理


    模糊逻辑是一种多值逻辑系统，允许在 0 和 1 之间存在连续的真理值，这与传统的布尔逻辑（真/假）形成对比。这种方法对于传感器融合应用特别有用。模糊逻辑推理过程通常包括三个步骤：


    1. **模糊化**：模糊化过程涉及将输入分配到各种预定义的输入类别中。对于每个输入，该步骤根据定义的边界确定对每个类别的“隶属度”。隶属度是一个介于 0
    和 1 之间的值，用于定义输入在任何时刻的状态。


    2. **推理**：基于规则的推理步骤利用输入状态得出推断结果。例如，应用的推理规则可以表述为“如果`传感器 A`为`高`且`传感器 B`为`嘈杂`，则使用`传感器
    A`的输出更新来自`传感器 B`的结果”。


    3. **去模糊化**：该过程的最后一步，利用推断输出和应用到的推理规则，生成传感器融合系统的可测量输出。对于上述示例，去模糊化步骤可以应用预定义的数学模型，根据`传感器
    A`的输出更新`传感器 B`的数据。


    #### 基于神经网络的推理


    你会在很多地方看到将神经网络描述为“由简单、高度互联的处理元素组成的计算系统，这些处理元素通过对外部输入的动态状态响应来处理信息。” 神经网络（`NNs`）或人工神经网络（`ANNs`），正如它们经常被提及的那样，其模型是模仿人类大脑皮层的神经元结构。然而，`ANNs`的规模与人脑相比要小得多（一个大型`ANN`有数千个神经元，而人脑则有数十亿个神经元）。


    在架构上，`ANNs`由神经元层组成。“输入层”由接收来自各种传感器数据的神经元组成。然后，数据由一个或多个“隐藏层”进行处理，最后通过“输出层”呈现给用户。每一层都由许多具有激活函数的相互连接的节点组成，用于处理数据。节点之间的连接是加权函数（图
    3-11）。


    `ANNs`必须经过一个“训练”或“学习”阶段，才能用于推理（或分类）。学习规则根据呈现的输入模式修改连接的权重。学习是通过预先知道正确期望输出的示例来实现的。向`ANNs`提供来自所有传感器的输入集。`ANN`会尝试“猜测”正确的输出。然后，训练过程计算`ANN`输出与理想期望输出之间的误差，并使用此误差来更新`ANN`的连接权重。接着呈现新的输入，并重复该过程，直到权重收敛到能产生满意结果的值。当然，实际过程要复杂得多，但这个高层级的过程概述对于我们讨论传感器融合方法来说已经足够了。


    基于`ANN`的推理方法具有一个优势：基于示例的学习不依赖于了解输入和输出之间的实际关系。因此，这种方法在以下情况下非常有用：我们寻求在面对噪声时的鲁棒性；发现模式集之间的关系；输入量、数量或多样性很大；或者输入关系模糊且难以用传统方法描述。


    ![A978-1-4302-6593-1_3_Fig11_HTML.gif](img/A978-1-4302-6593-1_3_Fig11_HTML.gif)


    **图 3-11.** 人工神经网络


    ![A978-1-4302-6593-1_3_Fig10_HTML.jpg](img/A978-1-4302-6593-1_3_Fig10_HTML.jpg)


    **图 3-10.** 基于模糊逻辑的推理


    ### 3.4.2 估计方法


    给定一组观测值，估计技术倾向于推导出产生这些观测值的底层过程的参数。在多模态传感器融合应用中，观测值由来自多个传感器过程的组合信息构成。流行的估计方法假设底层过程是一个未知的线性过程。观测值是过程输出随时间变化与白噪声的组合。最小二乘估计是最流行的估计方法，描述如下。


    - **最小二乘法**：给定一定数量的观测值，最小二乘法旨在找到代表这些观测值的“最佳拟合”线。该线被视为底层过程（和加性噪声）的表示。在该类方法中，此方法是最灵活的，因为它假设没有关于噪声过程概率密度的先验信息。这种方法得名于其估计旨在最小化测量值与估计过程之间的最小二乘误差。


    ## 3.5 总结


    在本章中，我们介绍了多模态的概念，以及它如何用于提高相对于单模态识别的识别性能。我们讨论了多模态的不同用途，以及除了改进现有识别用法之外，它如何能激发新的基于识别的应用。我们简要介绍了几种在不同条件和架构目标下实现多模态识别的技术。鼓励读者参考下一节的参考文献，以获取有关这些技术的更深入信息。下一章将重点介绍提高识别性能的另一种方法，即通过利用上下文。


    # 4. 上下文识别


    在本章中，我们将超越识别这一主要主题，开始理解下一层次的理解是什么样子的。具体来说，我们将讨论“上下文”和上下文理解的概念。简单来说，上下文指的是我们试图理解事物所处的环境。正如我们在第
    3 章多模态传感器融合中讨论的那样，拥有上下文信息可以实现更好的识别。反之，识别特定的环境属性可以帮助我们定义上下文，从而有助于理解正在观察的场景。下面概述了一些上下文识别的例子：


    - 对环境有了解，有助于识别那些被遮挡且难以被传统算法识别的物体。例如，识别出一张桌子和一台显示器，就能很容易地识别出桌子上的键盘，即使键盘被遮挡且难以单独识别。

    - 识别系统可以从了解不同物体之间的关系中受益。例如，在许多图片中，办公椅总是面向桌子。椅子与桌子之间的这种语义位置关系，可以使我们在识别出其中一个物体后，能够优化对另一个物体的识别。

    - 上下文识别有助于预测场景中被遮挡的物体。例如，检测到在树后若隐若现的猫科动物尾巴，可以根据基于位置（森林 vs. 公园）的上下文，预测这是一只幼虎或一只大猫。


    ## 4.1 上下文与识别的关系


    在本节中，我们尝试在“正向”方向上弥合识别与上下文之间的鸿沟，即我们将理解如何从识别中推断出上下文。


    处理上下文识别的系统主要有两种类型，即基于规则的系统 and 基于知识的系统。上下文信息构成了基于规则和基于知识系统之间区别的基础。在理解上下文的重要性之前，我们先对这两种系统进行一个非常高层级的概述。实际的深入讨论将推迟到后面的章节。此外，我们将仅专注于从图像中识别物体这一目标，并将更复杂的使用目标留到后面的章节。


    **目标**：给定一张图片，识别图像中的物体。

    '
- fmt: '### 4.1.1 Rule-based Systems


    Rule-based systems work as explained in the previous chapters, where the systems
    works in an “if XX then YY” manner. The image is broken down into features, and
    the features are analyzed by algorithms looking for a pretrained pattern between
    them. If the pattern matches a training example or generally falls “close” to
    some trained rule of representation, the recognition is deemed to be a success,
    otherwise the target object is declared to be not present in the scene.


    ### 4.1.2 Knowledge-based Systems


    In case of knowledge-based systems, the system uses prior information to determine
    the recognition result. The probability of something being recognized increases
    as the system finds more and more related information in a given input. Such systems
    use the prior observed correlations between observations to determine the possibility
    of a recognition match. Many times such knowledge-based systems will use the correlation
    information to determine if and what parts of a given input are worth searching
    for, a recognition match using the rule-based methods. Such hybrid approaches
    have been shown to be highly effective in optimizing the performance of recognition
    systems both in terms of speed of execution as well as accuracy.


    ## 4.2 Understanding Context


    Context is composed of the aggregate of information within which the recognition
    occurs. For example, if an algorithm is looking to identify an instance of a keyboard
    in an image, the context could comprise of the scene in the image (forest, city,
    office, etc.). In case of a picture of the forest, the context gives a clue that
    finding the keyboard is unlikely. Alternately, if the context of the scene in
    the image points to it being a computer desk, the chances are that the keyboard
    can be found with higher probability. Further contextual clues can then be employed
    to localize the region of search (below the monitor, on the table, etc.).


    Context also helps humans to perform recognition or react to different scenarios.
    As an example, observing an animal part (a tail) with the actual animal hiding
    from the view behind a tree can elicit responses from a human observer that vary
    based on the context. A person observing the occluded animal above in a park will
    most likely behave differently than a person observing the same in a forest. The
    scene around the observation in this case provides the context for recognition
    (harmless pet vs. a wild animal).


    ### 4.2.1 Different Roles for Context


    Context as a concept can take multiple roles in recognition. Briefly, any form
    that provides information about the environment of a target entity can contribute
    to context. Some examples are given below:


    * **Semantic Context**: Several entities can be contextually related by virtue
    of them being part of the same environment. Similarly, if the entities are not
    generally part of the same environment, they do not share a semantic context among
    themselves. It is highly likely to find a computer keyboard in an image that contains
    a computer monitor as well vs. an image of a sunny beach. In this example, monitor
    and keyboard are semantically related while the beach and keyboard are semantically
    unrelated.

    * **Spatial Context**: Spatial context refers to the spatial arrangement of objects
    or items of interest to recognition with respect to each other. As an example,
    spatially a tree or a fire hydrant will always be above the ground. A keyboard
    will mostly be placed under the monitor and a sidewalk will be situated on the
    side of a street. Spatial context makes it possible to reduce the search space
    for target object recognition if we happen to identify other spatially related
    objects in a scene.

    * **Pose-based Context**: Many objects are not just related in spatial context
    but also depict pose-based consistency toward each other. A dining chair usually
    faces the table, cars on the same side of the road usually face in the same direction
    as each other, etc. Adding the pose-based context information to spatial context
    can further reduce the recognition system complexity by introducing semantic clues
    for inter-object recognition.


    ## 4.3 Including Context in Recognition


    The benefits of using context for recognition purposes can be explained by the
    following metrics:


    * **Accuracy**: Having contextual information from a scene can assist in more
    accurate recognition. Knowing that the scene depicts a beach can help recognize
    an object as a beach ball vs. some kind of a fruit (melon).


    The three remaining benefits are a direct result of the reduction of search space
    both spatially as well as in the target set of entities considered based on context.


    * **Power**: The amount of power spent by a compute device to recognize an object
    can be reduced drastically by using the scene context to restrict the search space
    for target objects. The objects that do not contextually belong to the scene can
    be eliminated from the target search space.

    * **Speed**: Having a smaller search space also leads to faster recognition times.

    * **Compute**: The compute resources needed to recognize scale down with the search
    space as well.


    A modified form of a recognition pipeline from Chapter 1 with contextual block
    is presented in Figure 4-1 below.


    ![A978-1-4302-6593-1_4_Fig1_HTML.jpg](A978-1-4302-6593-1_4_Fig1_HTML.jpg)


    **Figure 4-1.** Incorporating context in recognition


    The flow shows a few new processing modules between the scene data and the recognition.
    Context block uses predefined and trained methods to determine the context of
    the scene. Based on the scene context, the spatial bounding module restricts the
    search space in the input to the regions that are most probable to contain the
    target entities (using pose, spatial, and semantic contexts as described earlier).
    The target bound processing reduces the sample space to match the image features
    based on the context information. The result of this contextual bound processing
    is a highly optimized and fast recognition block.


    ## 4.4 Motivation from Human Recognition


    The concept of contextual recognition borrows heavily from human recognition.
    Various studies have shown that humans are very fast in recognizing different
    entities and situations because of a very fast and optimized contextual search
    capability. As described for the computer-based recognition above, humans depict
    recognition based on both environmental scene context and spatial context.'
