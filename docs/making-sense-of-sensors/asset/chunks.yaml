  trans: '

    # 1. 应用性能需求


    每个应用程序都在特定的性能需求下运行。有些应用需要实时运行，这意味着应用必须在可接受的时间限制内提供结果，以便用户感觉与应用的交互是自然发生的。这类似于我们与面对面交流的人获得回应的方式。其他应用则需要预定义级别的结果准确性。有些应用可以接受近似结果，而另一些则需要高精度，这反过来可能意味着更高的计算需求。


    ## 准确性


    假设有一个应用（`AppA`）需要确定一天内进入一栋建筑的人数。对比另一个应用（`AppB`），它想知道进入建筑的究竟“是谁”。`AppA` 的实现需要我们在监控建筑入口时，区分人类与非人类（宠物、机器等）。在流水线的识别阶段，一个人类分类器不一定是复杂的算法，可以通过近似许多计算来实现。只要我们能可靠地区分人类和其他物体，就无需实现计算人们精确身高、姿势和性别的算法模块。相比之下，对于`AppB`，我们可以想象相关的识别算法非常复杂，因为它试图分析各种面部特征，然后与已知人脸数据库进行比较，以准确识别进入建筑的人。因此，应用需求会极大地影响解决方案实现的复杂度。


    ## 延迟


    延迟需求因应用而异。例如，一个导航应用预测你在建筑内的当前位置，并利用这些信息帮助你导航到目的地，它需要足够快地分析数据才能发挥作用。如果你已经走过了转弯处，再为你提供下一个转弯信息就毫无意义了。这种实时性约束要求系统设计必须考虑计算、内存和网络资源的分配，以便在严格的延迟约束下生成响应。另一方面，像上面提到的
    `AppA` 和 `AppB` 这类应用，它们在一天结束时提供进入建筑的总人数或实际人脸列表，可能没有严格的延迟约束（尽管如果用于安全目的，它们也可能有严格的延迟约束）。它们可以从相关摄像头收集数据，并在离线状态下处理数据以生成结果。了解所考虑应用的延迟约束，能让系统设计者做出必要的实现权衡。


    # 2. 功耗约束


    端到端流水线上的每个平台都在某种形式的功耗约束下运行。用于收集原始数据的传感器和传感器节点的可用功率通常是有限的，并且它们依靠电池供电。相比之下，流水线末端的节点往往是墙壁供电的服务器，具有较大的功率预算。理想情况下，人们希望将流水线中所有“繁重”的工作部分都在计算资源和功率丰富的平台上执行。这意味着对于大多数实现，需要在服务器（或通常所说的服务器“后端”）上执行。但是，将功耗约束与其他约束（特别是上述的应用约束）结合起来，就凸显了在流水线的前端和其他中间阶段至少运行部分功能的必要性。


    # 3. 网络约束


    通常，网络基础设施会被各种不同的应用共享，并且可用的网络资源会随时间动态变化。网络约束主要包括以下内容：


    ## 带宽


    可用的总带宽直接影响应用的吞吐量。基于可用容量以及其他竞争网络带宽的应用，应用通过网络传输内容所需的时间会有所不同。流水线设计者通常会尝试降低总带宽需求，以保持应用性能最佳且可预测。这可能意味着尝试在靠近数据源的位置运行更多应用部分（这与功耗约束所决定的目标相反），并传输更小尺寸的处理后信息，而不是未处理的数据（例如，传输特征而非原始数据）。


    ## 可靠性


    不同的网络协议为应用提供不同级别的服务。例如，可靠的传输协议将保证所有数据的交付，但如果某些数据在网络中丢失而需要重传，延迟可能会更高。另一方面，不可靠的协议可以在快速传输与偶尔的数据包丢失之间进行权衡。设计者需要根据应用需求仔细选择最佳的网络协议。


    # 4. 内存约束


    流水线上的每个平台的内存都是有限的。要使操作在一个平台上执行，处理器需要其操作的数据驻留在内存中。如果内存大小相对于处理器有效处理应用所需的数据/代码量来说太小，平台运行时基础设施将需要管理资源（代码/数据）进出内存的移动。除了引入额外的功耗开销外，此操作还会引入处理延迟。内存约束通常会将流水线中需要更多内存的部分推向流水线后端，因为在那里可以利用服务器执行。


    # 5. 资源共享约束


    在流水线的每个阶段，像处理、功耗、内存、网络等物理资源通常在不同的应用之间共享。共享资源使得设计者为预定义性能构建架构变得非常复杂。存在一些方案可以保证最低级别的性能和资源份额（服务质量）来帮助应对这些情况，但这些方案通常需要付出成本。我们将在后续章节中对此进行更多讨论。图
    1-11 展示了当我们从前端传感器移动到后端服务器时，资源可用性的变化。图中，`低`和`高`指的是资源可用性（带宽、功耗和内存）或计算特性（预期的准确性）。


    ![A978-1-4302-6593-1_1_Fig11_HTML.jpg](img/A978-1-4302-6593-1_1_Fig11_HTML.jpg)


    图 1-11. 平衡各项约束


    ![A978-1-4302-6593-1_1_Fig10_HTML.jpg](img/A978-1-4302-6593-1_1_Fig10_HTML.jpg)


    图 1-10. 执行流水线约束


    总之，系统设计者必须根据上述性能约束，将端到端的能力模块高效地映射到可用硬件上。图 1-12 中的资源管理器需要基于上述所有约束，找到执行的“最佳平衡点”。


    ![A978-1-4302-6593-1_1_Fig12_HTML.jpg](img/A978-1-4302-6593-1_1_Fig12_HTML.jpg)


    图 1-12. 在约束下设计系统

    '
- fmt: '# 1.5 Physical Platforms


    Our final section in this chapter presents a quick summary of the physical platforms
    used to execute the functions of the pipe.


    **Sensors/ Smart Sensors** : At the front end of the pipe are the sensors that
    collect the data. These include cameras, microphones, gyroscopes, accelerometers,
    thermometers, altimeters, air quality sensors, and many more. Some sensors can
    be smart in the sense that they are able to process some of the data on the node
    itself. The processing could result in smarter transmission policies to save battery
    or some initial processing; or trigger some action on the sensor nodes based on
    the nature of the data captured.


    **Gateway/Router**: The gateways and routers comprise the intermediate platforms
    in the pipeline. They serve two very important roles in the end-to-end pipeline.


    1.  Routers and gateways serve as intermediate platforms with more compute resources
    than the sensor nodes but are much closer in terms of network distances than high-powered
    servers. This property makes it possible for many applications to take advantage
    of the compute proximity of these intermediate platforms for low-latency and low-overhead
    functions executions.

    2.  These intermediate notes act as aggregation points for data being transmitted
    from various sensors. In addition to being the relaying point for the collected
    data to the cloud-based servers, these platforms are the first in the pipeline
    to have the ability to cross-correlate data from multiple sources. If resources
    permit, the intermediate platforms can work with data from multiple sources to
    determine context and reduce data redundancies before transmission to the servers.
    The routers and gateways also keep track of the nodes connected to them and transmit,
    configuration, and node management commands needed.


    **Cloud/Server**: The servers comprise what is known as the back end of the pipe.
    The back end is also referred to as the "cloud." The cloud is generally well-equipped
    with high-capacity wall-powered servers capable of high-compute cycles, as well
    as large memory banks. The cloud is the appropriate place for heavy computation.
    The disadvantage of executing workloads at the cloud have to do with network-introduced
    latency. Real-time applications may not be able to tolerate the delays in getting
    responses over the network from servers. So servers are generally suited for offline
    batch processing like analytics. Knowledge representation and query/response processing
    on knowledge databases are some of the typical functions carried out on the servers.


    ## 1.6 Summary


    In this chapter we introduced a high-level overview of the process to convert
    data collected by the sensors into actionable information through recognition.
    We touched upon how data transforms through the recognition pipeline and different
    operations performed on the data. We also talked about practical considerations
    to implement such processing pipelines on real physical systems. [Chapter 2](#A978-1-4302-6593-1_2_Chapter.html)
    will dig deeper into these operations with specific examples.


    # 2. From Data to Recognition


    The process of recognition in the digital world begins with sensors that capture
    raw data about the physical world. In this section, we will focus on three types
    of sensors (inertial, audio, and visual) to understand how these are used and
    how data from these types of sensors can be recognized for different purposes.
    Let’s start by considering a few different usage scenarios in mobile, wearable,
    and IoT deployments.


    **Mobile Devices**: Today’s mobile devices have many sensors to understand user
    context and behavior, and enable personalized interaction. Figure [2-1](#A978-1-4302-6593-1_2_Chapter.html#Fig1)
    shows a few example sensors in mobile devices and the type of data they provide.
    Inertial sensors enable understanding the movement of the phone along different
    axes including acceleration, rotation, etc. Audio sensors enable the phone to
    hear sounds such as a question from the user. Visual sensors enable the phone
    to capture pictures and videos that may provide a better understand of location
    or objects in the vicinity.


    ![A978-1-4302-6593-1_2_Fig1_HTML.gif](A978-1-4302-6593-1_2_Fig1_HTML.gif)


    *Figure 2-1. Example sensor usage from mobile phones*


    It should also be noted that the combination of these sensors can provide multi-modal
    recognition, providing even richer contextual data. For example, combining audio
    and visual sensors can provide a better understand of the activity in the scene.
    Using a visual sensor, one can see a kid and adult in a scene that may indicate
    an adult teaching a child. Adding audio sensing to the context gives additional
    information that the activity is singing as opposed to talking for example.


    **Wearable Devices**: Much like mobile devices, wearable devices also employ similar
    sensors but now have the ability to determine the user’s movement and audio/visual
    focus and interaction, potentially from a first-person perspective (e.g., head-worn
    devices). Figure [2-2](#A978-1-4302-6593-1_2_Chapter.html#Fig2) shows types of
    usages that such wearable sensors can be used for.


    ![A978-1-4302-6593-1_2_Fig2_HTML.gif](A978-1-4302-6593-1_2_Fig2_HTML.gif)


    *Figure 2-2. Example sensor usage from wearables*


    **IoT devices**: While similar sensors may be used in IoT devices, a key difference
    with IoT devices is that they are typically looking at a scene and a collective
    rather than focused on personalized scenarios from a user point of view. As an
    example, IP cameras are used for monitoring residences (homes) as well as road
    intersections and traffic. Here, the cameras are generally static or move in limited
    range, so the use of audio/visual sensors is the focus instead of the inertial
    sensors. The visual sensors provide the ability to understand scene changes, as
    well as identify the number of cars or people in the vicinity. The audio sensors
    add additional information by providing information such as significant anomalies
    in sound (like an accident on the road or a window break-in in the home). Figure
    [2-3](#A978-1-4302-6593-1_2_Chapter.html#Fig3) illustrates this usage.


    ![A978-1-4302-6593-1_2_Fig3_HTML.gif](A978-1-4302-6593-1_2_Fig3_HTML.gif)


    *Figure 2-3. Example sensor usage for IoT*


    Again, the use of multi-modal (audio + visual) recognition also helps significantly
    in these cases, since we can correlate accidents and home break-ins using both
    sounds and visual clues simultaneously.


    The rest of this chapter is organized as follows. We will start by looking at
    the sensor types in more detail and then go into depth on the recognition techniques
    for each of these sensor modalities and associated usages.


    ## 2.1 Sensor Types and Levels of Recognition


    As mentioned above, there are multiple types of sensors, ranging from inertial
    to proximity/location to audio/visual. In this section, we will introduce three
    such sensors (inertial, audio and visual) and describe how they generally work.'
  raw: '## 1.5 Physical Platforms


    Our final section in this chapter presents a quick summary of the physical platforms
    used to execute the functions of the pipe.


    Sensors/ Smart Sensors : At the front end of the pipe are the sensors that collect
    the data. These include cameras, microphones, gyroscopes, accelerometers, thermometers,
    altimeters, air quality sensors, and many more. Some sensors can be smart in the
    sense that they are able to process some of the data on the node itself. The processing
    could result in smarter transmission policies to save battery or some initial
    processing; or trigger some action on the sensor nodes based on the nature of
    the data captured.


    Gateway/Router: The gateways and routers comprise the intermediate platforms in
    the pipeline. They serve two very important roles in the end-to-end pipeline.


    1.  Routers and gateways serve as intermediate platforms with more compute resources
    than the sensor nodes but are much closer in terms of network distances than high-powered
    servers. This property makes it possible for many applications to take advantage
    of the compute proximity of these intermediate platforms for low-latency and low-overhead
    functions executions.  

    2.  These intermediate notes act as aggregation points for data being transmitted
    from various sensors. In addition to being the relaying point for the collected
    data to the cloud-based servers, these platforms are the first in the pipeline
    to have the ability to cross-correlate data from multiple sources. If resources
    permit, the intermediate platforms can work with data from multiple sources to
    determine context and reduce data redundancies before transmission to the servers.
    The routers and gateways also keep track of the nodes connected to them and transmit,
    configuration, and node management commands needed.  


    Cloud/Server: The servers comprise what is known as the back end of the pipe.
    The back end is also referred to as the “cloud.” The cloud is generally well-equipped
    with high-capacity wall-powered servers capable of high-compute cycles, as well
    as large memory banks. The cloud is the appropriate place for heavy computation.
