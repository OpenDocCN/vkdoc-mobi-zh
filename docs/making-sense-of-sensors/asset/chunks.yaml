  trans: '

    # 加速度计


    加速度计检测的是与实际加速度矢量方向相反的力。这个力也被称为虚拟力或惯性力。加速度计唯一不会感受到任何被测力的地方是在太空中或自由落体过程中。因此，获取加速度计的“静止力”或“静止测量值”非常重要。这个力等于设备始终承受的重力。通常，为了提取设备相对于其在地球上位置的真实加速度，每次测量的力都需要对重力进行修正。


    我们将通过聚焦于单轴加速度计设备来演示加速度计的工作原理。假设加速度计沿 z 轴测量力。模拟加速度计将惯性力测量为设备输出电压的变化。通常，为了将加速度计与设备系统的其余部分连接，会使用模数转换器（ADC）将产生的电压转换为比特模式（数字）。这个数字给出了在给定方向（沿某一轴）上的惯性力测量值。以下定义有助于理解加速度计的行为：


    -   **参考电压/ADC 读数**：这是如上所述的静止力测量值。恒定的重力可能导致测量值出现在不同的轴上，具体取决于 IMU 和设备的朝向，我们稍后会了解到。材料和设计缺陷也可能导致此类设备的静止读数出现非零值。当我们使用加速度计进行任何实际应用时，需要补偿这个测量值。

    -   **灵敏度**：加速度计的灵敏度指的是每单位测量加速度对应的电压（或 ADC 输出）变化。许多系统使用重力加速度（g）作为加速度的单位。因此，灵敏度可以用伏/克（V/g）来衡量。


    ![A978-1-4302-6593-1_2_Fig8_HTML.jpg](img/A978-1-4302-6593-1_2_Fig8_HTML.jpg)


    图 2-8. 加速度计线性加速度测量轴


    基于上述定义，图 2-9 展示了沿单轴计算加速度的过程。为简化起见，我们假设垂直轴为测量轴，这样重力作用在同一轴上，并可以通过简单的减法来处理。我们稍后将看到如何处理更一般的情况。


    ![A978-1-4302-6593-1_2_Fig9_HTML.jpg](img/A978-1-4302-6593-1_2_Fig9_HTML.jpg)


    图 2-9. 单轴加速度计操作


    ## 多轴加速度计


    对于具有多轴测量能力的加速度计，设备可以测量沿每个定义轴的加速度。例如，一个三轴加速度计可以测量沿 x、y 和 z 轴的惯性力/加速度。重要的是要注意，设备测量的任何加速度都以
    x、y 和 z 分量形式报告，如图 2-10 所示。在图 2-10 中，力（加速度）的方向和大小由矢量 D 表示。加速度计输出将报告沿 x、y 和 z 方向的分量大小，分别由投影
    Dx、Dy 和 Dz 表示。要准确测量加速度的大小和方向，需要了解制造商定义的轴朝向。幸运的是，多轴加速度计的另一个特性在这种情况下对我们有所帮助。


    ![A978-1-4302-6593-1_2_Fig10_HTML.jpg](img/A978-1-4302-6593-1_2_Fig10_HTML.jpg)


    图 2-10. 三轴加速度计操作


    ## 测量倾斜角度


    多轴加速度计在静止状态下测量重力这一事实可用于校准加速度计。在静止状态下，加速度计测量设备相对于地面的倾斜角度。当一个轴完美垂直对齐时，测得的电压（或 ADC
    值）的另外两个分量将为零。因此，将设备对齐到多个位置并从这些位置获取 ADC 读数，可以精确定位加速度计轴的确切朝向。


    # 陀螺仪


    加速度计测量平移加速度（上下、左右、前后）。设备在运动中还有另外 3 个自由度。这些与角运动相关。具体来说，它们被称为*俯仰*、*偏航*和*横滚*。这些如图
    2-4 所示。陀螺仪以度/秒为单位测量绕 x、y 和 z 轴的角运动。用陀螺仪的语言来说，我们将每个自由度的测量称为一个*通道*。因此，一个三通道陀螺仪可以测量角运动的所有
    3 个分量（*俯仰*、*横滚*和*偏航*）。


    与上述加速度计的讨论类似，陀螺仪输出是经过 ADC 转换的模拟电压数字输出。电压变化与围绕给定轴的角度变化率呈线性关系。处理 ADC 输出后，陀螺仪读数通常以围绕特定轴的度/秒报告。与加速度计的讨论相似，我们定义以下内容：


    -   **参考电压**：陀螺仪的参考电压指的是 ADC 的“步长”。简单来说，它定义了使 ADC 输出增加一个单位所需的电压量。

    -   **零速率电压**：对于陀螺仪，这个电压是测量设备固有偏移的指标。理想情况下，静止状态的设备应在所有陀螺仪通道上报告为零读数。然而，材料和设计缺陷导致几乎所有这些设备都存在非零的静止读数。应从测量值中减去该读数，以获得正确的角运动测量值。

    -   **灵敏度**：陀螺仪的灵敏度指的是每测量单位角速度变化对应的电压（或 ADC 输出）变化。陀螺仪灵敏度可以用毫伏/度/秒来衡量。


    与加速度计的处理一致，陀螺仪传感器处理流程如图 2-11 所示。


    ![A978-1-4302-6593-1_2_Fig11_HTML.jpg](img/A978-1-4302-6593-1_2_Fig11_HTML.jpg)


    图 2-11. 陀螺仪处理


    # 结合加速度计和陀螺仪读数


    为了在所有 6 个自由度上准确测量设备的倾斜角度和运动，我们结合了加速度计和陀螺仪的读数。从各种 ADC 读数中获取运动和倾斜估计的主要复杂之处在于确认 IMU
    轴的朝向。通常，制造商会在 IMU 数据手册中提供此信息。然而，IMU 在不同设备中的放置位置可能不同，用户在理解加速度计和陀螺仪的 ADC 测量值之前需要校准设备。通常，校准步骤包括将设备移动到各种朝向（垂直、水平），并使用产生的读数在线性投影方程中求解轴的朝向。


    # 使用 IMU 进行手势识别


    来自设备的加速度计和陀螺仪组合读数可用于识别特定的设备手势。例如，配备 IMU 的手机可以通过 IMU 识别圆形手势。然后，此手势可以链接到不同的操作，比如发出特定声音、打开相机等。许多现代智能手机利用
    IMU 允许用户将手机面朝下翻转以拒接电话或停止音乐播放。现代玩具制造商正在制造使用惯性传感器规划运动，并结合摄像头等其他传感器对人与之交互做出反应的机器人玩具。下一章将详细介绍多传感器集成。

    '
- fmt: '# 2.3 Audio Processing and Recognition—From sound to speech


    As described in the previous section, recognition using audio sensors (i.e., microphones)
    is growing in popularity as more phone/wearable/IoT devices start to implement
    these to capture good quality audio data. In this section, we will go into a bit
    of depth in audio recognition is accomplished from audio classification to large
    vocabulary speech recognition. To start with, a simple pipeline of audio and speech
    processing stages is illustrated in Figure [2-12](#A978-1-4302-6593-1_2_Chapter.html#Fig12).


    ![A978-1-4302-6593-1_2_Fig12_HTML.gif](A978-1-4302-6593-1_2_Fig12_HTML.gif)


    Figure 2-12. Stages of audio/speech recognition


    Let’s walk through each of these stages and examine the audio recognition techniques
    used. Before we do that, it should be noted that the first step in processing
    audio for recognition is to process the audio signals and extract key features.
    The most common features extracted from audio are known as `MFCCs` (Mel frequency
    cepstral coefficient). There are many different ways in which `MFCCs` or variants
    thereof can be computed. The Mel frequency cepstrum (`MFC`) represents the power
    spectrum of the sound and the coefficients (`MFCCs`) are calculated by first taking
    windows of the audio sample, taking the Fourier transform, computing the power
    spectrum, mapping on to the mel bin, computing the log of the energy, and performing
    a discrete cosine transform to determine the amplitudes. More details on `MFCCs`
    can be found in the literature (such as one by K. Prahlad et. al. in references).


    ## 2.3.1 Audio Classification


    We start with audio classification (see Figure [2-13](#A978-1-4302-6593-1_2_Chapter.html#Fig13))
    which is typically focused on non-human sound and attempts to understand and label
    the sounds captured. The traditional approach for audio classification is to identify
    key features such as `MFCCs` that may help separate the sounds into different
    classes and then use machine learning techniques to train/classify them. More
    recent techniques have attempted to add additional features specific to audio
    classification that help improve the accuracy. Some of these techniques may be
    content-specific, but there are others that are more generic, such as the addition
    of temporal fluctuations and roughness/loudness/sharpness as described in the
    "Features for audio classification" by Breebart et al. in references. Once the
    feature set is determined, standard machine learning classification techniques
    can be used. Standard classification techniques include nearest neighbor algorithms,
    Bayesian algorithms, Gaussian mixture model (`GMM`) and others. More recently,
    neural networks are used to enable supervised and unsupervised approaches to audio
    classification.


    ![A978-1-4302-6593-1_2_Fig13_HTML.gif](A978-1-4302-6593-1_2_Fig13_HTML.gif)


    Figure 2-13. Audio classification example


    ## 2.3.2 Voice Activity Detection


    Voice activity detection (`VAD`) refers to the detection of human sound in the
    audio capture. Figure [2-14](#A978-1-4302-6593-1_2_Chapter.html#Fig14) illustrates
    the general `VAD` processing flow. `VAD` is typically used as a trigger to move
    into the next phase of speech recognition such as keyword or command/control.
    There are several different types of `VAD` implementations in the literature and
    commercial solutions. Examples include the use of simple filters, such as recognizing
    pitch, to more sophisticated approaches that use `GMM` (Gaussian mixture model),
    statistical models and energy-based `VADs`. One of the key challenges in `VAD`
    is the level of noise in the audio capture. As a result, noise reduction and cancellation
    techniques typically go hand-in-hand with `VAD` solutions. In Man-Wai Mak et al.
    from references, the authors show that noise reduction and elimination of background
    signals are key to improving accuracy of `VAD` solutions. Ultimately, the voice
    activity detector can be used for reducing the amount of processing that needs
    to be done for speech recognition since it acts like a filter. As a result, it
    is important to optimize the solution to reduce false negatives (indication of
    lack of human voice when it is present) as opposed to false positives (indication
    of human voice where is there is none).


    ![A978-1-4302-6593-1_2_Fig14_HTML.gif](A978-1-4302-6593-1_2_Fig14_HTML.gif)


    Figure 2-14. Voice activity detection example'
