- fmt: '# Visual Recognition Techniques


    ## Object Recognition

    Object recognition refers to the basic idea of identifying objects in an image
    and potentially matching them to a pre-existing database of objects that have
    been captured before. For example, an augmented reality application can identify
    a monument or tourist attraction in an image and provide additional information
    about this object to the viewer. Similarly, an object in a retail store can be
    recognized and additional information about health, price, and content can be
    provided to the user.


    ## Face Recognition

    Face recognition includes detection of a face in an image as well as matching
    that face against a database to label the face accordingly. Face detection is
    useful by itself for digital photography to help the user take a better picture.
    Face recognition is useful for many purposes ranging from authentication (logging
    into a platform) to social networking applications (such as Facebook).


    ## Gesture Recognition

    Gesture recognition refers to the recognition of static poses or moving gestures
    either specific to the hand/arm or the human body. Recent game consoles commonly
    use examples of these where a player uses his hands and entire body to interact
    with the game. Static poses are easier than dynamic gestures since it generally
    involves processing a still image and matching it against a pre-existing set of
    captured still gestures. Gesture recognition can also be user-dependent or user-independent,
    where the former requires the system to be trained for a specific user whereas
    the later builds in enough modeling to accommodate for any arbitrary user.


    ## Scene Recognition

    Scene recognition is extremely complex and an ongoing research problem. The simplest
    form of scene recognition is to take an entire scene and match it against known
    ones. A moderate form of scene recognition involves identifying multiple objects,
    faces, and people in an image and using that information to determine the likely
    activity or context. The more complex form of scene recognition requires the system
    to differentiate two scenes accurately despite similar objects being in the same
    two scenes.


    ## Similarity/Anomaly Detection

    Anomaly detection is a common challenge in visual recognition especially in scenarios
    where cameras are used for surveillance, including home monitoring as well as
    traffic monitoring. Here, the key is to identify if any anomaly occurred which
    should trigger additional analysis. Such solutions focus on identifying a set
    of known signatures statically or dynamically and thereby determining if any significant
    changes in the frame have occurred since.


    ## Video Summarization

    Video summarization is a meta application that can use many of the above techniques
    in order to summarize the salient aspects of a long video stream. This includes
    scene changes, key scenarios and objects/characters that are the focus of the
    video. Video summarization enables the user to jump to specific parts of a video
    or quickly identify which video is being looked for amongst a set of existing
    videos.


    ![A978-1-4302-6593-1_2_Fig6_HTML.gif](A978-1-4302-6593-1_2_Fig6_HTML.gif)


    **Figure 2-6.** Visual sensors and usages


    It should also be noted that the inertial, audio, and video sensors and recognition
    techniques can be used in conjunction for multi-modal recognition. In the descriptions
    below, we will start by studying the recognition techniques for each independently
    and then show examples of combining them together.


    # 2.2 Inertial Sensor Processing


    This section presents a brief overview of how sensors are used to measure device
    motion and inclination. As mentioned earlier, the inertial sensors can also be
    used to recognize certain gestures. We focus on inertial sensors. Specifically,
    the goal is to provide a high-level functional overview of MEMS (Micro-Electro-Mechanical
    Systems). We will not be diving into the details of the construction of these
    sensing systems but will focus on the data understanding part.


    Device motion can be measured through two fundamental ways:


    **Measuring motion through external device observation:** Cameras outside a device
    can observe and map the device behavior.


    - **Pros:** Very useful in controlled environments to measure movements of somewhat
    generic objects

    - **Cons:** Can only work in defined areas, dependent on lightening, etc.


    **Measuring motion through internal device instrumentation:** This involves instrumenting
    the device with onboard sensors that measure the motion from the device itself.


    - **Pros:** Can measure fine motion and tilts almost universally

    - **Cons:** Need to instrument every device


    We will use the second case above as an example for this section. This choice
    was made for two main reasons. First, the onboard sensor-based method is prevalent
    in devices ranging from wearables to toys, smartphones, and airplanes. Second,
    we are covering the visual recognition and processing in detail in this chapter
    already. Therefore, we will dedicate this session to introduce a new type of sensor
    and its processing pipeline.


    ## 2.2.1 Defining Motion and Degrees of Freedom


    Before we understand the processing pipe for inertial sensors, we define the Degrees-Of-Freedom
    (DOF) available to a device. We define 6 such degrees as enumerated in following
    two categories:


    - **Translational Degrees of Freedom:** 3 such degrees of freedom exist, namely
    a device can move front-back, left-right or up-down.

    - **Rotational Degrees of Freedom:** 3 such degrees of freedom exist, namely pitch,
    roll, and yaw.


    Figure [2-4](#A978-1-4302-6593-1_2_Chapter.html#Fig4) shows the degrees of freedom
    in a pictorial fashion.


    An Inertial Measurement Unit (IMU) consists of the following two common devices
    to measure the motion:


    **Accelerometer:** An accelerometer is a device that is “supposed” to measure
    acceleration. In practice, the device reacts to inertial force. Main uses for
    the inertial sensor are to measure translational acceleration and inclination
    with respect to the earth “plane.”


    **Gyroscope:** A gyroscope is mainly used to measure the motion along an axis.
    This includes the pitch, roll, and yaw motions in Figure [2-4](#A978-1-4302-6593-1_2_Chapter.html#Fig4).
    The motion is measured as a “rate of change” of the angle along an axis.


    Typically, to interface the IMUs with the rest of the device system, an Analog-to-Digital
    Converter (ADC) is used that converts the generated voltage to a bit pattern (number).
    This number gives a measure of motion or inclination (along one or more axes).
    Figure [2-7](#A978-1-4302-6593-1_2_Chapter.html#Fig7) shows a simplistic view
    of the IMU processing pipe.


    ![A978-1-4302-6593-1_2_Fig7_HTML.jpg](A978-1-4302-6593-1_2_Fig7_HTML.jpg)


    **Figure 2-7.** Recognizing IMU data'
