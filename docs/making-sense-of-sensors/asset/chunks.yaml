    ## 5.2 关系抽取方法


    基于文本的关系抽取方法可按图 5-4 所示分为不同类别。


    - 基于知识的关系抽取

    - 有监督关系抽取

    - 半监督关系抽取

    - 远程监督


    ![A978-1-4302-6593-1_5_Fig4_HTML.jpg](img/A978-1-4302-6593-1_5_Fig4_HTML.jpg)


    图 5-4. 关系抽取方法的类型


    ### 5.2.1 基于知识的关系抽取


    基于知识的关系抽取方法依赖于领域先验信息或文本的词汇与句法特性。


    #### 5.2.1.1 领域相关的关系抽取方法


    领域相关的基于知识的关系抽取方法专为特定操作领域的关系抽取而定制。例如，这些方法专用于在涉及癌症诊断、果树病害、鸟类迁徙模式等句子中寻找关系。拥有操作领域的先验信息使得这些方法能够高度定制化用于关系抽取。利用给定领域句子的已有信息，这些方法可以达到很高的准确率，因为特定领域中关系表达的模式通常非常规律且广为人知。在特定的应用领域，实体及其关系在文本中的表达方式通常数量有限。这使得训练这些方法进行抽取变得非常精准。


    #### 5.2.1.2 领域无关的关系抽取方法


    这些方法也称为基于词汇-句法模式的关系抽取，它们假设句子中存在一组描述关系的模式，这些关系以等价形式呈现。通过此方法抽取关系的模型经过训练，能够识别代表实体间相同关系但形式不同的各种句子结构。这些方法完全依赖于自然语言和句子的句法结构。基于语法句子结构，方法识别实体以及连接它们的关联关系。


    #### 5.2.1.3 基于知识的关系抽取方法的性能


    由于基于知识的方法依赖于领域和/或语言词汇及语法的先验知识，其性能高度依赖于代表领域知识和语言结构规则的训练集大小。此类算法的性能以精确率和召回率指标表示，呈现以下特性：


    - **精确率**衡量在给定句子集中被正确识别的关系数量。通常，基于知识的关系抽取方法表现出高精确率。这是因为基于知识的关系抽取方法使用通过无歧义句子结构描述关系的样本进行训练。

    - **召回率**衡量在测试集所有可用关系中正确识别的关系数量。基于知识的关系抽取方法通常在召回率指标上得分较低。这是因为训练方法无法覆盖关系表达中所有可能的句子结构变体。通常，规则并未考虑表达关系的大多数结构，导致许多关系被误判为假阳性。


    ### 5.2.2 有监督关系抽取


    有监督关系抽取方法依赖预训练模型来识别句子中的命名实体，并将关系抽取任务转化为分类任务。有监督方法通常包含一个预处理步骤，用于识别感兴趣的实体及其之间的任何连接。然后通过分类方法处理这些连接，以确认预定义的关系，如图
    5-5 所示。


    ![A978-1-4302-6593-1_5_Fig5_HTML.jpg](img/A978-1-4302-6593-1_5_Fig5_HTML.jpg)


    图 5-5. 关系抽取管道


    从高层次来看，该管道可根据功能分为以下部分。


    - **预处理阶段**负责检测可能构成关系一部分的实体。所有此类可能的实体均利用句子结构（句法）和自然语言属性（语义）的知识进行识别。利用这些信息有助于隔离可能成为关系主语或谓语的实体，以及句子中可能对发现关系存在至关重要的部分。例如，给定句子"John
    said Andy Grove was one of the founders of Intel Corporation"，预处理步骤可能将实体"John,
    Andy Grove, and Intel"识别为可能参与由子句"was one of the founders of"部分或整体所描述关系的实体。根据这些识别结果，下一个模块根据所使用的分类阶段类型，将实体和句子格式化为特定格式。

    - **分类器**同时使用正例和负例训练样本进行训练。接下来的子节将描述一些用于关系抽取的流行分类方法。


    #### 5.2.2.1 基于特征的方法


    基于特征的方法将描述关系的实体和句子表示为一组特征。这些特征通常是文本中提取的语义和句法特征的组合。


    提取的句法特征包括：


    - 实体

    - 实体类型

    - 可能描述实体间关系的子句

    - 句子中的实体数量和单词数量

    - 可能描述关系的单词数量及其顺序


    语义特征通常包括实体间的词路径。


    对于基于特征的分类器训练，会从代表已知关系结构的句子中生成多个正例和负例特征集。然后使用这些特征集训练分类器，以判断预定义关系是否存在。这种考量也使得选择正确特征变得非常困难，因为某些特征可能代表能很好指示潜在关系表达的句子部分，而另一些则可能是差的指示器。


    基于特征的方法在训练阶段完全依赖人工感知和劳动，以尽可能多地从文本中识别正例和负例。然而，很容易发现，这种情况可能导致遗漏训练时未出现的文本中的关系。由于语言可以将关系表示为范围广泛的多种格式，基于特征的训练几乎不可能覆盖所有可能的情况。

    '
- fmt: '#### 5.2.2.2 Kernel-based Methods


    Kernel-based methods aim to solve the issue of training seen with feature-based
    methods by using kernels that compare the similarity of the test sentences with
    the previously known examples. Instead of exactly matching the word sequences
    through features like the feature-based methods, the kernel-based methods try
    to extract the similarity to known representations instead of looking for more
    exact matches.


    There are two main types of kernel-based relationship extraction methods: bag
    of features kernels and tree kernels.


    **Bag of Features Kernels**: The bag of features-based kernel method works by
    creating the representations of different parts of the sentence containing the
    entities.


    Such methods are based on string properties and the actual functional kernels
    compute the similarity in the subsequences of learned and test images. The subsequences
    are divided and compared based on their position in the sentence relative to the
    entities being investigated. If the similar parts of the sentence are long and
    contiguous, the kernel-based methods will return a better match as compared to
    short, noncontiguous similar parts in sentences.


    As an example, if `e_1` and `e_2` are the two entities of interest, the sentence
    containing them could be subdivided into a sequence `s_1`, `e_1`, `s_2`, `e_2`,
    and `s_3` where:

    - `s_1` is the part of the sentence before the first entity `e_1`;

    - `s_2` is the part of the sentence between entities `e_1` and `e_2`;

    - `s_3` is the part of the sentence after the second entity `e_2`.


    Given the sentence “The author of this book likes coffee as a breakfast drink,”
    if the preprocessing step identifies “author” and “coffee” as the entities `e_1`
    and `e_2` respectively, the values of the other parameters would be:

    - `s_1` is “The”;

    - `s_2` is “of this book likes”;

    - `s_3` is “as a breakfast drink.”


    The similarity score is calculated at the word level, i.e., the words themselves
    are converted into feature representations before applying a classifier.


    **Tree Kernels**: As opposed to the bag of features-based methods, the tree kernels
    use the structure information from the sentence to determine the presence or absence
    of relationship between two entities identified in the preprocessing step. The
    structure includes the words and the order of the words in the sentences.


    The methods construct a shallow parse tree for representing the sequence of words
    as well as the entities in a given sentence. The sentence “John said Andy Grove
    was one of the founders of Intel Corporation” can be represented in the tree form
    as shown in Figure [5-6](#A978-1-4302-6593-1_5_Chapter.html#Fig6).


    ![A978-1-4302-6593-1_5_Fig6_HTML.jpg](A978-1-4302-6593-1_5_Fig6_HTML.jpg)


    Figure 5-6. Representing a sentence as a tree


    Assuming the preprocessing step identified the entities “John,” “Andy Grove,”
    and “Intel Corporation,” the following parse trees are identified. Two sentences
    (subsentences) `S1` and `S2` containing the entities are represented as parse
    trees as shown in Figure [5-7](#A978-1-4302-6593-1_5_Chapter.html#Fig7). Of course,
    for this example `S1` represents the complete input sentence.


    ![A978-1-4302-6593-1_5_Fig7_HTML.jpg](A978-1-4302-6593-1_5_Fig7_HTML.jpg)


    Figure 5-7. Possible parse trees for the sentence


    The tree `S1` is not shallow since it is not the smallest tree containing the
    relationship (“founder”) while `S2` represents such a shallow tree. For the purpose
    of training, the sentence `S1` is used as a negative example while `S2` serves
    as the positive example.


    While the structural information helps kernel-based methods to achieve much better
    performance as measured by the precision and recall metrics, the method does assume
    that the predicate (relationship expressing word) is placed between the entities
    in the sentences. While not universally true, this structural information has
    been shown to be right for the majority of the cases.


    #### 5.2.2.3 Limitations of Supervised Methods


    While the kernel-based methods improve over their feature-based counterparts,
    the supervised methods still suffer from some issues, mainly:

    - they demonstrate scalability problems; the methods are hard to extend to cover
    new relationships;

    - extensions to recognize more than one relationship from a sentence are hard
    to implement;

    - the methods need preprocessing to identify entities or create parse trees. These
    methods can be computationally and algorithmically hard to implement.


    ### 5.2.3 Semi-supervised Methods


    The supervised methods discussed so far rely on the labeled data to train the
    models needed for relationship extraction. In many cases, obtaining this training
    data proves to be the most time-consuming task and usually the models suffer in
    performance because of inadequate training. The labeling task is not just a problem
    of scale, it also involves cumbersome human effort.


    Semi-supervised relationship extraction methods tend to overcome the limitations
    of effective labeling by automating the labeling portion of the classifier training.
    Since obtaining the labeled data is expensive, the semi-supervised methods bootstrap
    the creation of training data by setting up a tight loop between the data labeling
    and relationship extraction modules. Generally, a weak learner outputs relationship
    information that can be used as training data for the next stage.


    Figure [5-8](#A978-1-4302-6593-1_5_Chapter.html#Fig8) and the following steps
    broadly outline a semi-supervised relationship extraction system.


    - **Seeding**: The algorithms generally start with some example tuples expressing
    the relationship. These examples are referred to as “seeds.”

    - **Pattern Induction**: The seed examples are used to learn (induce) patterns
    between the entities that depict the relationship.

    - **Relationship Extraction**: The patterns are used to extract the sentences
    that embed the given relationship.

    - **New Pattern Addition and Seed Extension**: Based on the extracted sentences,
    new patterns are recognized and added to the seed set.

    - **Iteration**: The process repeats with a new pattern induction step.


    ![A978-1-4302-6593-1_5_Fig8_HTML.jpg](A978-1-4302-6593-1_5_Fig8_HTML.jpg)


    Figure 5-8. Semi-supervised relationship extraction flow


    We now show some examples of the process described above using popular semi-supervised
    relationship extraction methods.'
