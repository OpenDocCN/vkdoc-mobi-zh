  trans: '

    ### 2.4.3 视频摘要


    视频摘要指的是分析完整视频并对其进行总结的能力，其方式可以是 (a) 用少量帧或视频片段提取视频的关键片段，或 (b) 通过识别视频中的一系列活动来创建简短的视频文字记录。其应用范围可以涵盖视频监控，其中异常情况是视频中的关键场景，或者事件摘要，例如识别足球比赛中的关键部分（如进球或主要进攻尝试）。在本节中，我们将重点关注前者，并描述用于识别视频关键部分以及对活动进行潜在分类的方法。


    关于如何识别关键帧，文献中有多种方法。一个简单的思路是找出视频中哪些帧最能代表视频中的场景，同时识别出足够数量且彼此独特的帧。许多方法依赖于颜色、运动或其他低级特征检测器。还有一些方法侧重于边界检测，即帧之间的显著变化表明可能的关键事件。利用这些技术，可以识别视频中的关键帧，但根据帧之间的差异或相似程度，这些帧可能太多或太少。


    最近的研究工作集中在结合使用多样性和覆盖度指标，来决定如何在视频中以有限数量的帧结束，这些帧既能保证充分的覆盖度，又能保证彼此间充分的多样性。S. Chakraborty
    等人提出的一种方法，通过自适应地确定摘要长度以及在该摘要中选择哪些帧，试图做得更好。在这篇论文中，作者提出了一种自适应摘要技术，将该问题表述为一个优化问题，即选择一组能代表视频的充分独特的帧。该优化问题将代表性和独特性作为两个关键指标，并试图最大化这两个指标，以自适应方式识别关键帧。图
    2-23 说明了基本思想。他们将其与传统机制（如随机抽样、聚类和曲率点使用）进行了比较，并表明其更有效。


    ![A978-1-4302-6593-1_2_Fig23_HTML.jpg](img/A978-1-4302-6593-1_2_Fig23_HTML.jpg)


    *图 2-23. 视频摘要示例（来自 S. Chakraborty 等人）*


    最近的研究尝试通过采用卷积神经网络（CNN）来识别实体（多个物体、位置、人物和活动），并根据这些实体的共现情况以及与重要性分类场景类型的关系对其进行评分，从而考虑视频的语义上下文。研究表明，这种方法具有巨大潜力，因为它在语义上更有意义且更有效。这种视频摘要技术的一个示例流程如图
    2-24 所示。


    ![A978-1-4302-6593-1_2_Fig24_HTML.jpg](img/A978-1-4302-6593-1_2_Fig24_HTML.jpg)


    *图 2-24. 使用深度网络的视频摘要示例*


    总的来说，基于视觉信息的视频摘要是一个相当具有挑战性的重要问题，而现有文献在提供一套合适的摘要方案方面才刚刚起步。我们建议读者参考本章参考文献部分中的论文，以便更好地理解该领域的技术及其应用场景。


    ## 2.5 其他传感器


    还有大量传感器超出了上述更详细讨论的范畴。以下是这些传感器及其潜在用途的总结。


    ### 2.5.1 接近传感器


    接近传感器无需接触物体即可检测附近物体的存在。通常，接近传感器是基于红外（IR）的，通过感知红外场的变化来工作。接近传感器的一个使用示例是在手机中，用于确定手机在通话时是否贴近耳朵，以避免在此期间的意外触摸。另一个例子是在机器人中使用接近传感器来确定它是否靠近障碍物，因此需要绕过它或调头。除了红外接近传感器，无线解决方案如
    `BLE` 和 Wi-Fi 设备也可用于确定设备是否在信标或接入点的接近范围内。由于这也与位置相关，将在下一节中更详细地讨论。


    ### 2.5.2 位置传感器


    位置传感器有助于确定设备的地理位置。最常见的位置传感器是 GPS（全球定位系统）传感器，它在汽车和手机内的导航系统中非常频繁地使用。`GPS` 系统与绕地球运行的卫星通信，并使用三边测量法来确定包含
    GPS 接收器的设备的位置。这对于室外定位非常有用，但不适用于室内定位。对于室内定位，可以使用类似的基于无线电的方法，但使用 Wi-Fi 接入点作为三角测量点，或者使用越来越流行的
    `BLE` 信标。


    ### 2.5.3 触摸传感器


    如今，触摸传感器在所有可穿戴手表、手机和平板电脑中都很常见，甚至现在也出现在笔记本电脑屏幕上。触摸屏的用途是允许用户用手指而不是鼠标与屏幕进行交互。使用手指使体验更加容易和直观。触摸屏可以是电阻式或电容式的——前者（电阻式）利用多层之间的电阻和手指作为识别触摸的方式，而后者（电容式）利用手指和屏幕之间的电流流动作为确定触摸的方式。最近的研究通过将按压力度（手指按压的力度）作为另一个关键输入融入到体验中，进一步提高了触摸屏的分辨率。


    ### 2.5.4 磁性传感器


    磁场传感器或磁力计根据所使用的传感器类型，以不同的灵敏度水平检测和测量磁场。一种常见的磁力计是霍尔效应传感器，它根据磁场强度改变其输出电压。霍尔传感器可用于工业应用中，以感知磁性物体的存在以及测量它们到达/离开的时间。


    ### 2.5.5 化学和生物传感器


    传感领域一个不断增长的方向是使用化学和生物传感器。化学传感器用于感知气体或液体的成分。这些传感器对于分析工业环境中的空气质量和气体存在非常有用。生物传感针对细胞、蛋白质、核酸等的存在。例如，这可用于分析皮肤状况。化学和生物传感的使用在环境、工业、健康和保健应用方面正变得极具吸引力。


    ## 2.6 总结


    在本章中，我们回顾了三种类型的传感器（`IMU`、音频和视觉），并逐步介绍了处理原始传感器数据并将其转换为可识别信息的处理阶段。在此过程中，我们讨论了处理中涉及的关键组件以及用于权衡精度和计算复杂性的许多算法。例如，我们展示了视觉处理和识别范围从简单
    2D 图像中的物体识别到跨多个帧的视频摘要。在下一章中，我们将讨论如何将这些传感器一起用于多模态处理，以及如何将识别出的信息转化为可操作的知识。

    '
- fmt: '# 3. Multimodal Recognition


    In the last chapter, we introduced processing of each type of raw sensor data
    independently to realize different levels of recognition capabilities. We found
    that inertial sensors provide information about movement across different axes.
    Audio streams can be processed not only for sound types but also words and natural
    language. We also showed how to recognize different objects, faces, activities,
    and more. Now we imagine what is possible if we were able to correlate the understanding
    across multiple sensor types simultaneously. This is referred to as “multi-modal
    recognition” and we will walk through different methods for multi-modal recognition
    in this chapter.


    ## 3.1 Why Multi-modality


    Figure [3-1](#A978-1-4302-6593-1_3_Chapter.html#Fig1) introduces the benefits
    of multi-modal recognition using the same three sensor types (inertial, audio,
    and visual) as an example.


    ![A978-1-4302-6593-1_3_Fig1_HTML.jpg](A978-1-4302-6593-1_3_Fig1_HTML.jpg)


    Figure 3-1. Introduction to multi-modal recognition


    The benefits of multi-modal recognition starts with the ability to improve the
    recognition in one type of modality (e.g., sound) and by using other modalities
    to assist (visual). This is particularly effective when the recognition capability
    is either impaired, needs clarification, or needs efficiency. For example, when
    you hear “turn that off,” in order to understand what “that” implies, it is important
    to use the visual recognition to determine what the user is pointing towards.
    In this case, the visual recognition provided clarification for disambiguating
    the indirection “that” to a particular thing like a fan or a light. In addition
    to this, it is also possible to use one modality to improve the processing efficiency
    of the other. Let’s consider a retail example where the user needs help with a
    particular type of product. If he or she is already in the aisle and just needs
    to check the price of an item, it is easy to reduce the speech processing efficiency
    if we are able to reduce the lookup vocabulary to only commands that pertain to
    that type of usage. This is possible by using visual cues regarding the location
    of the user by determining the type of products he or she is glancing at. This
    type of example will be used later in this chapter to understand the type of multi-modal
    recognition needed to be able to accomplish this.


    Another benefit of multi-modal recognition is to use multiple modalities dynamically
    depending on which one is more effective. For example, when processing a (soccer
    game) video for summarization, there are parts that are visually appealing (a
    powerful kick by a favorite player) and parts that are rich in sound (e.g., commentator
    announcing a goal along with applause from the audience). Both modalities can
    be used to better understand each video segment of interest. By considering the
    audio and video recognition modalities independently first and correlating events
    of interest, this can be achieved quite easily. Alternatively, the recognition
    can be done at a finer granularity if there is interest in correlating the player
    (visually recognized) with their name (speech recognition based on commentator
    audio).


    It should be noted that, as humans, we handle these modalities quite naturally
    and cross-correlate between them to determine context. We tend to achieve this
    at different levels of granularity depending on the usage and context. For example,
    we can handle sounds, movement, and visual input while driving a bike through
    a park, for instance. The challenge is to achieve the same level of recognition
    and efficiency with computing machines by dynamically switching between different
    granularities of recognition and different levels of coupling between the different
    modalities as required. This is a hard problem, but as described below, can be
    solved if we classify each of the types of multi-modal recognition individually
    and understand their benefits and usage contexts.


    ## 3.2 Multimodality Flavors


    In this section we present different approaches and frameworks used to design
    the sensor fusion solutions. We mainly cover the following three widely used approaches:
    coupling-based classification, Dasarathy model, and sensor configuration model.'
