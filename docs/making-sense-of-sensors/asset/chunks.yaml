  trans: '

    ### 4.1.1 基于规则的系统


    基于规则的系统按照前文所述的方式运行，即以“如果 XX 则 YY”的模式工作。图像被分解为多个特征，算法通过分析这些特征来寻找它们之间的预训练模式。如果该模式与某个训练样本匹配，或者大致“接近”某个已训练的表征规则，则识别被视为成功；否则，判定目标对象不存在于场景中。


    ### 4.1.2 基于知识的系统


    在基于知识的系统中，系统利用先验信息来确定识别结果。随着系统在给定输入中发现越来越多相关的信息，某物被识别的概率也随之增加。这类系统利用观测之间先前观察到的相关性来判断识别匹配的可能性。很多时候，此类基于知识的系统会利用相关性信息来决定给定输入的哪些部分值得采用基于规则的方法进行识别匹配搜索。这种混合方法在优化识别系统的执行速度和准确性方面已被证明非常有效。


    ## 4.2 理解上下文


    上下文由识别活动发生时所处的全部信息构成。例如，如果一个算法要在图像中识别一个键盘实例，上下文可能包含图像中的场景（森林、城市、办公室等）。如果是一张森林图片，上下文会提示找到键盘的可能性很小。反之，如果图像中的场景指向电脑桌，那么找到键盘的概率就会更高。接着可以利用更进一步的上下文线索来定位搜索区域（显示器下方、桌面上等）。


    上下文也有助于人类进行识别或对不同场景做出反应。例如，观察到一只动物的部分身体（如尾巴），而该动物实际躲在树后看不见，人类观察者会根据上下文做出不同的反应。一个人在公园里看到上述被遮挡的动物，其行为很可能与在森林里看到同样情景的人不同。在这种情况下，观察周围的场景为识别提供了上下文（是无害的宠物还是野生动物）。


    ### 4.2.1 上下文的不同角色


    上下文作为一个概念，在识别中可以扮演多种角色。简而言之，任何能提供目标实体环境信息的形式都可以构成上下文。以下是一些例子：


    * **语义上下文**：多个实体可能因为同属一个环境而具有上下文关联。同样，如果实体通常不共享同一环境，它们之间就没有语义上下文关联。在一张包含电脑显示器的图像中找到电脑键盘的可能性，远高于在一张阳光海滩的图像中找到键盘。在这个例子中，显示器和键盘在语义上相关，而海滩和键盘在语义上无关。

    * **空间上下文**：空间上下文指的是待识别物体或感兴趣物体之间的空间布局关系。例如，从空间上看，树木或消防栓总是位于地面之上。键盘通常放置在显示器下方，人行道则位于街道一侧。如果我们在场景中识别出其他空间相关的物体，空间上下文就使得缩小目标物体识别的搜索空间成为可能。

    * **姿态上下文**：许多物体不仅在空间上相关，而且在姿态上也表现出相互的一致性。餐椅通常面向餐桌，道路同侧的汽车通常朝向相同方向，等等。将基于姿态的上下文信息添加到空间上下文中，通过引入用于物体间识别的语义线索，可以进一步降低识别系统的复杂度。


    ## 4.3 在识别中引入上下文


    将上下文用于识别目的的好处可以通过以下指标来说明：


    * **准确性**：从场景中获取上下文信息有助于更精确的识别。了解场景描绘的是海滩，有助于将一个物体识别为沙滩球，而不是某种水果（如甜瓜）。


    其余三个好处直接源于在空间上以及基于上下文考虑的目标实体集合中搜索空间的缩减。


    * **功耗**：通过利用场景上下文来限制目标对象的搜索空间，计算设备识别物体的功耗可以大幅降低。那些在上下文中不属于该场景的物体可以从目标搜索空间中被排除。

    * **速度**：更小的搜索空间也意味着更快的识别时间。

    * **计算量**：识别所需计算资源的规模也会随着搜索空间的缩小而降低。


    下图 4-1 展示了第 1 章中识别管线的修改版本，其中加入了上下文模块。


    ![A978-1-4302-6593-1_4_Fig1_HTML.jpg](img/A978-1-4302-6593-1_4_Fig1_HTML.jpg)


    **图 4-1.** 在识别中融入上下文


    该流程展示了场景数据与识别之间的一些新处理模块。上下文模块使用预定义和训练好的方法来确定场景的上下文。基于场景上下文，空间边界模块将输入中的搜索空间限制在最可能包含目标实体的区域（使用前面描述的姿态、空间和语义上下文）。目标边界处理则根据上下文信息缩小样本空间，以匹配图像特征。这种上下文边界处理的结果是一个高度优化且快速的识别模块。


    ## 4.4 来自人类识别的启示


    上下文识别的概念在很大程度上借鉴了人类识别。多项研究表明，人类之所以能够非常快速地识别不同的实体和情境，是因为拥有一种非常快速且优化的上下文搜索能力。正如上文对基于计算机的识别的描述，人类的识别既依赖于环境场景上下文，也依赖于空间上下文。

    '
- fmt: '### 4.4.1 Image-based Contextual Recognition


    In a recent study, the human subjects were asked to describe the scene in a blurred
    street image. A majority of the people responded with observing a street scene
    with a car and a pedestrian <Reference>. In reality, the image was created with
    the same car image in two positions tilted 90 degrees. The common majority response
    of the test observers recognizing the car as a pedestrian is an effect of human
    contextual observation where a person expects a pedestrian in such a scene. The
    above example also shows that in some cases context can be a distraction making
    the problem hard to solve. Thankfully such cases are much smaller in number compared
    to the scenes where context is helpful in recognition. In the example above contextual
    recognition fails in a scene that is synthetic and very improbable at best.


    Similarly, asking a group of observers to perform a people search in a presented
    image and tracking their attention through gaze trackers produced an average heat
    map that can be seen as a modulated saliency map. The saliency map shows that
    the human attention quickly focuses on a few areas in the picture to look for
    objects of interest. Contextually, that is the location in the picture where the
    chances of finding the target objects are the highest, making it the right place
    to focus the search. The search methodology for humans is not uniform across the
    image but, once the parts of the scene are identified coarsely, the search quickly
    focuses on the areas most likely to contain the target entity. Comparing with
    machines, when looking for an object in a scene, studies have shown that the observers
    casually scan the scene and fixate the search on regions that contextually have
    the highest probability of containing the object in question. The majority of
    the objects are recognized in a glance before eye fixation.


    Consistency-inconsistency effect: Accuracy of object detection (as measured by
    speed of detection) is improved if the object is presented after a contextual
    scene, for example, bread followed by kitchen or wild animals in a forest.


    ### 4.4.2 Non-image-based Contextual Recognition


    As an example of a non-visual recognition task, consider the following sentence:


    “Aoccdrnig to a rscheearch at Cmabrigde Uinervtisy, it deosn’t mttaer in waht
    oredr the ltteers in a wrod are, the olny iprmoetnt tihng is taht the frist and
    lsat ltteer be at the rghit pclae. The rset can be a toatl mses and you can sitll
    raed it wouthit porbelm. Tihs is bcuseae the huamn mnid deos not raed ervey lteter
    by istlef, but the wrod as a wlohe.”


    Clearly, the words in the sentence above are misspelled, but the readers do not
    find it difficult to read the intent of the sentence. In many cases the readers
    are able to “read” the later words faster than the earlier ones. This is due to
    the contextual nature of the human understanding, where we expect the words to
    fit the context and the expectation from the next word in the sentence. The noise
    in the input above is effectively countered by the contextual human inference.


    The sentences are understood even if some words are misspelled. In fact, if the
    number of alphabets and the first and last alphabets are preserved, all the words
    can be misspelled.


    ## 4.5 Contextual Recognition: From Humans to Machines


    Extending the analogy to computer systems, a contextual recognition system exploits
    the fact that objects never occur in isolation and are usually part of particular
    environments. It is generally easier do a quick evaluation of input data that
    use different sensors to get an understanding of the operating environment than
    to identify occurrence of some target objects with varying granularities in the
    image. Statistical summary of the scene provides a complimentary and an effective
    source of information for contextual inference. In particular, knowing the context
    helps to improve recognition in presence of the following data imperfections as
    well (Figure [4-2](#A978-1-4302-6593-1_4_Chapter.html#Fig2), [4-3](#A978-1-4302-6593-1_4_Chapter.html#Fig3)):


    ![A978-1-4302-6593-1_4_Fig3_HTML.jpg](A978-1-4302-6593-1_4_Fig3_HTML.jpg)


    Figure 4-3. Context can help reduce effects of bad sensor data


    ![A978-1-4302-6593-1_4_Fig2_HTML.jpg](A978-1-4302-6593-1_4_Fig2_HTML.jpg)


    Figure 4-2. Bad sensor data can cause problems in recognition


    - **Noisy Data**: The input data can be contaminated by noise due to imperfect
    sensor or non-conducive environmental conditions. Noisy data can make the feature
    generation process very difficult. Traditionally, various filtering methods are
    used to smoothen the noisy data before processing. While the filter-based smoothening
    methods usually achieve good results for human observations (e.g., visually pleasing
    images), they usually present significant challenges for automated computer-based
    recognition. Having context information handy makes it easier for the computer
    recognition methods to ignore the noise and look for features that may actually
    depict the real world information.

    - **Occluded Data**: As described earlier, non-contextual recognition methods
    fail to process information that is occluded by other information from the sensors.
    However, having the contextual information makes it possible to make speculative
    recognition work based on incomplete recognition information from occluded data.

    - **Poor Resolution**: Sometimes the sensors are not able to capture a target
    image with enough high fidelity for the recognition algorithms to work properly.
    The reasons for this vary from the object being too far from the sensor range
    to poor sensor parameters. Having the context information helps to compensate
    for the poor data resolution by augmenting incomplete information with the probabilistic
    model of the target object being present.

    - **Cluttered scenes**: In cluttered scenes, the segmentation of objects becomes
    a problem for recognition algorithms. However, having the context for the scene
    can reduce the problem to a smaller target region that can be analyzed more efficiently.

    - **Object pose variability**: The recognition algorithms are only as good as
    the diversity of the data they have been trained with. It is practically impossible
    to train an algorithm will all types of possible poses, angles, and environments
    that the target object might present itself in. Having contextual recognition
    capability helps recognize object configurations that may vary to some degree
    from the trained models.

    - **Illumination changes**: Similar to the pose changes, the training data cannot
    account for different illumination conditions under which an object maybe observed.
    For non-visual tasks, this amounts to observing target phenomenon under varying
    environments. Having context information can help reduce the effects of such environmental
    variations.'
  raw: '### 4.4.1 Image-based Contextual Recognition


    In a recent study, the human subjects were asked to describe the scene in a blurred
    street image. A majority of the people responded with observing a street scene
    with a car and a pedestrian <Reference>. In reality, the image was created with
    the same car image in two positions tilted 90 degrees. The common majority response
    of the test observers recognizing the car as a pedestrian is an effect of human
    contextual observation where a person expects a pedestrian in such a scene. The
    above example also shows that in some cases context can be a distraction making
    the problem hard to solve. Thankfully such cases are much smaller in number compared
    to the scenes where context is helpful in recognition. In the example above contextual
    recognition fails in a scene that is synthetic and very improbable at best.


    Similarly, asking a group of observers to perform a people search in a presented
    image and tracking their attention through gaze trackers produced an average heat
    map that can be seen as a modulated saliency map. The saliency map shows that
    the human attention quickly focuses on a few areas in the picture to look for
    objects of interest. Contextually, that is the location in the picture where the
    chances of finding the target objects are the highest, making it the right place
    to focus the search. The search methodology for humans is not uniform across the
    image but, once the parts of the scene are identified coarsely, the search quickly
    focuses on the areas most likely to contain the target entity. Comparing with
    machines, when looking for an object in a scene, studies have shown that the observers
    casually scan the scene and fixate the search on regions that contextually have
    the highest probability of containing the object in question. The majority of
    the objects are recognized in a glance before eye fixation.


    Consistency-inconsistency effect: Accuracy of object detection (as measured by
    speed of detection) is improved if the object is presented after a contextual
    scene, for example, bread followed by kitchen or wild animals in a forest.


    ### 4.4.2 Non-image-based Contextual Recognition


    As an example of a non-visual recognition task, consider the following sentence:


    “Aoccdrnig to a rscheearch at Cmabrigde Uinervtisy, it deosn’t mttaer in waht
    oredr the ltteers in a wrod are, the olny iprmoetnt tihng is taht the frist and
    lsat ltteer be at the rghit pclae. The rset can be a toatl mses and you can sitll
    raed it wouthit porbelm. Tihs is bcuseae the huamn mnid deos not raed ervey lteter
    by istlef, but the wrod as a wlohe.”


    Clearly, the words in the sentence above are misspelled, but the readers do not
    find it difficult to read the intent of the sentence. In many cases the readers
    are able to “read” the later words faster than the earlier ones. This is due to
    the contextual nature of the human understanding, where we expect the words to
    fit the context and the expectation from the next word in the sentence. The noise
    in the input above is effectively countered by the contextual human inference
    .


    The sentences are understood even if some words are misspelled. In fact, if the
    number of alphabets and the first and last alphabets are preserved, all the words
    can be misspelled.


    ## 4.5 Contextual Recognition: From Humans to Machines


    Extending the analogy to computer systems, a contextual recognition system exploits
    the fact that objects never occur in isolation and are usually part of particular
    environments. It is generally easier do a quick evaluation of input data that
    use different sensors to get an understanding of the operating environment than
    to identify occurrence of some target objects with varying granularities in the
    image. Statistical summary of the scene provides a complimentary and an effective
    source of information for contextual inference. In particular, knowing the context
    helps to improve recognition in presence of the following data imperfections as
    well (Figure [4-2](#A978-1-4302-6593-1_4_Chapter.html#Fig2), [4-3](#A978-1-4302-6593-1_4_Chapter.html#Fig3)):


    ![A978-1-4302-6593-1_4_Fig3_HTML.jpg](A978-1-4302-6593-1_4_Fig3_HTML.jpg)


    Figure 4-3.


    Context can help reduce effects of bad sensor data


    ![A978-1-4302-6593-1_4_Fig2_HTML.jpg](A978-1-4302-6593-1_4_Fig2_HTML.jpg)


    Figure 4-2.


    Bad sensor data can cause problems in recognition


    *   Noisy Data : The input data can be contaminated by noise due to imperfect
    sensor or non-conducive environmental conditions. Noisy data can make the feature
    generation process very difficult. Traditionally, various filtering methods are
    used to smoothen the noisy data before processing. While the filter-based smoothening
    methods usually achieve good results for human observations (e.g., visually pleasing
    images), they usually present significant challenges for automated computer-based
    recognition. Having context information handy makes it easier for the computer
    recognition methods to ignore the noise and look for features that may actually
    depict the real world information.

    *   Occluded Data : As described earlier, non-contextual recognition methods fail
    to process information that is occluded by other information from the sensors.
    However, having the contextual information makes it possible to make speculative
    recognition work based on incomplete recognition information from occluded data.

    *   Poor Resolution : Sometimes the sensors are not able to capture a target image
    with enough high fidelity for the recognition algorithms to work properly. The
    reasons for this vary from the object being too far from the sensor range to poor
    sensor parameters. Having the context information helps to compensate for the
    poor data resolution by augmenting incomplete information with the probabilistic
    model of the target object being present.

    *   Cluttered scenes : In cluttered scenes, the segmentation of objects becomes
    a problem for recognition algorithms. However, having the context for the scene
    can reduce the problem to a smaller target region that can be analyzed more efficiently.

    *   Object pose variability : The recognition algorithms are only as good as the
    diversity of the data they have been trained with. It is practically impossible
    to train an algorithm will all types of possible poses, angles, and environments
    that the target object might present itself in. Having contextual recognition
