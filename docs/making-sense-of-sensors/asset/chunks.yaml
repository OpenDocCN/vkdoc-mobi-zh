    # 物体识别


    物体识别指的是在图像或视频中检测并识别物体的能力。物体识别的实例范围广泛，从识别图像中的一盒麦片或一瓶葡萄酒，到在旅游景点识别一座历史古迹。其整体用途可以是统计零售货架上物品的数量（麦片盒或葡萄酒瓶），或是为正在用手机摄像头指向古迹的游客提供更多信息（增强现实）。虽然下文将从一个物体的角度描述典型的物体识别流程，但请注意，同样的原理也适用于识别多个物体，为此会包含聚类和边界框技术。


    图 2-18（参考 S. Lee 等人的著作）展示了一个典型的物体识别流程，用于在查询图像中识别物体，并通过与数据库图像匹配进行识别。基本流程包括：(a)
    特征检测（也称为兴趣点检测），(b) 描述符生成，以及 (c) 匹配。


    ![A978-1-4302-6593-1_2_Fig18_HTML.jpg](img/A978-1-4302-6593-1_2_Fig18_HTML.jpg)


    图 2-18. 物体识别流程示例（S. Lee 等人）


    多年来，针对物体识别已经开发并优化了许多算法。这些算法包括 `SURF`（加速鲁棒特征，参考 H. Bay 等人）、`SIFT`（尺度不变特征变换，参考 D.
    G. Lowe 等人）、`ORB`（参考 E. Rublee 等人）、`FAST`（参考 E. Rosten 等人）、`BRIEF`（参考 M. Calonder
    等人）以及 `BRISK`（参考 S. Leutenegger 等人），仅举几例。这些算法提供了在图像中识别出能唯一描述物体的特征点的能力，以及生成描述符的方法，用于描述特征点周围的区域作为描述符向量的一部分。最初，算法是为了基本功能和准确性而设计的。然而，随着集成摄像头的移动设备普及，这些算法针对降低计算复杂度、提高速度、尺度不变性、旋转不变性和抗噪性进行了优化。建议读者参阅描述每种算法的论文以更深入地理解其细节。为了便于说明，图
    2-19 展示了一个示例流程。


    ![A978-1-4302-6593-1_2_Fig19_HTML.gif](img/A978-1-4302-6593-1_2_Fig19_HTML.gif)


    图 2-19. 物体识别流程（例如，SURF 组件 [参考 S. Lee 等人、H. Bay 等人的著作]）


    一旦确定了特征/描述符，下一步就是通过匹配来识别物体。一个匹配数据库存储着先前捕获的描述符向量，将查询描述符向量与数据库进行匹配，即可获得最近似的匹配结果或一系列匹配结果作为输出。通常，这种匹配通过暴力匹配（计算
    `L1`、`L2` 距离）来完成，如图 2-20 所示。除了暴力匹配，`ANN`（近似最近邻）方法也极为常见，尤其是在数据库规模显著增大时。有一些用于 `ANN`
    计算的快速库，例如 `FLANN`（ [`http://www.cs.ubc.ca/research/flann/`](http://www.cs.ubc.ca/research/flann/)
    ），它们通常用于以最高速度和效率执行这些计算。


    ![A978-1-4302-6593-1_2_Fig20_HTML.jpg](img/A978-1-4302-6593-1_2_Fig20_HTML.jpg)


    图 2-20. 使用 `L1`/`L2` 距离计算的暴力匹配（S. Lee 等人）


    ## 手势识别


    手势识别指的是识别手部姿态、动态手势或类似的躯体姿态及动态身体动作的能力。最近，由于 Kinect（ [`http://www.xbox.com/en-US/xbox-one/accessories/kinect`](http://www.xbox.com/en-US/xbox-one/accessories/kinect)
    ）在诸如微软® Xbox（ [`http://www.xbox.com/en-US/`](http://www.xbox.com/en-US/) ）等游戏机中的广泛应用，手势变得更为普及。图
    2-21 展示了使用基于肤色的分割方法识别手部姿态和面部特征的步骤。在本节中，我们将从描述基本的手部姿态识别过程开始。手部姿态识别最简单的形式是识别图像中是否存在手（检测），然后识别具体的手部姿态（识别）。


    ![A978-1-4302-6593-1_2_Fig21_HTML.jpg](img/A978-1-4302-6593-1_2_Fig21_HTML.jpg)


    图 2-21. 手势识别示例


    手部检测通常通过两种不同的机制完成：(a) 手部肤色，以及 (b) 描述典型手部形状的模型。有许多算法会分析图像中的不同颜色，试图判断图像中是否有手，从而分割图像的那一部分以进行进一步的识别处理。进行肤色分析时常用的色彩空间包括
    `RGB`、`HSV`、`YUV` 和 `YCrCv`。有时也会采用考虑多种色彩空间的混合方法。基于颜色进行手部识别的关键挑战在于图像背景的性质。有时背景颜色可能与肤色相似。使用肤色的另一个关键挑战是，人类的肤色因人而异。因此，使该方法对用户无关也颇具挑战性。解决此问题的一个可能方案是让解决方案依赖特定用户，但这会带来一个要求，即用户需要通过注册过程来训练系统。大多数解决方案倾向于尽可能减少注册/用户训练的需求。


    图 2-22 显示了一个使用肤色分析进行手部分割的示例。如图所示，最终结果基于两个步骤：肤色分割，以及与已知的手势模型（也称为手势词汇表）进行比较。在这种情况下，手势词汇表相对容易创建，因为它只涉及二维静态手势。随着动态手势的引入，以及需要追踪运动方向和深度信息，解决方案的复杂性也会增加。例如，Kinect
    在其实现中使用了两个摄像头和一个红外传感器，用于在三维环境中识别手部和身体姿态。


    ![A978-1-4302-6593-1_2_Fig22a_HTML.jpg](img/A978-1-4302-6593-1_2_Fig22a_HTML.jpg)![A978-1-4302-6593-1_2_Fig22b_HTML.jpg](img/A978-1-4302-6593-1_2_Fig22b_HTML.jpg)


    图 2-22. 手部姿态检测与识别流程

