- fmt: '### 3.4.1 Fuzzy Logic-Based Inference


    Fuzzy logic is a multi-valued logic system that allows for continuous truth values
    between 0 and 1, in contrast to traditional Boolean logic (true/false). This approach
    is particularly useful for sensor fusion applications. The fuzzy logic inference
    process typically consists of three steps:


    1. **Fuzzification**: The fuzzification process involves assigning the input various
    pre-defined input classes. For each input, the step determines a "degree of membership"
    to each class based on defined boundaries. The degree of membership is a value
    between 0 and 1 and defines the state of input at any time.


    2. **Inference**: The rule-based inference step uses the input state to arrive
    at an inferred result. For example, the applied inference rule could state that
    "if `Sensor A` is `HIGH` and `Sensor B` is `NOISY` then use `Sensor A` output
    to update the results from `Sensor B`."


    3. **Defuzzification**: This last step in the process takes the inferred output
    and applied inference rules to generate a measurable output of the sensor fusion
    system. For the example above, the defuzzification step could apply predefined
    mathematical models to update `Sensor B` data based on `Sensor A` output.


    #### Neural Network-Based Inference


    In various places, you will find neural networks described as "computing systems
    made up of simple, highly connected processing elements which process information
    by their dynamic state response to external inputs." The neural networks (`NNs`)
    or Artificial Neural Networks (`ANNs`), as they are referred to frequently, are
    modeled after the neuronal structure of the human cerebral cortex. However, the
    scale of `ANNs` is much smaller compared to a human brain (thousands of neurons
    for a large `ANN` vs. billions of neurons in a human brain).


    Architecturally, the `ANNs` are composed of layers of neurons. The "input layer"
    consists of neurons that accept the data from various sensors. The data then is
    processed by one or more "hidden layers" before being presented to the user through
    the "output layer." Each layer consists of a number of interconnected nodes with
    activation functions for processing. The connections between the nodes are weighted
    functions (Figure [3-11](#A978-1-4302-6593-1_3_Chapter.html#Fig11)).


    The `ANNs` have to go through a "training" or "learning" phase before they can
    be used for inferencing (or classification). The learning rule modifies the weights
    of the connections according to the input patterns presented. The learning is
    achieved through examples where the correct desired outputs are known in advance.
    The `ANNs` are presented with an input set from all the sensors. `ANN` will try
    to "guess" the correct output. The training procedure then calculates the error
    between the `ANN` output and the ideal desired output and uses this error to update
    the `ANN` connection weights. A new input is then presented and the procedure
    repeated until the weights converge to values for satisfactory results. Of course,
    the actual procedure is far more involved, but this high-level procedural overview
    will suffice for our discussion on sensor fusion methods.


    `ANN`-based inferencing approaches have the advantage that example-based learning
    does not depend on knowing the actual relationships between the inputs and outputs.
    Hence, the approach is very useful in conditions where we seek robustness in the
    face of noise; discover relationships between sets of patterns; input volume,
    number, or diversity is great; or input relationships are vague and poorly described
    with conventional approaches.


    ![A978-1-4302-6593-1_3_Fig11_HTML.gif](A978-1-4302-6593-1_3_Fig11_HTML.gif)


    **Figure 3-11.** Artificial Neural Network


    ![A978-1-4302-6593-1_3_Fig10_HTML.jpg](A978-1-4302-6593-1_3_Fig10_HTML.jpg)


    **Figure 3-10.** Fuzzy Logic-Based Inference


    ### 3.4.2 Estimation Approaches


    Given a set of observations, the estimation techniques tend to derive the parameters
    of the underlying process producing the observations. In the case of multi-modal
    sensor fusion applications, the observations consist of combined information from
    multiple sensor processes. The popular estimation methods assume that the underlying
    process is an unknown linear process. The observations are a combination of the
    process outputs in time along with white noise. Least squares estimation is the
    most popular estimation method and is described below.


    - **Least Squares**: Given a number of observations, least squares method aims
    to find the "best fit" line representing these observations. The line is taken
    to be the representation of the underlying process (and additive noise). This
    method is the most flexible of a family of such methods in that it assumes no
    prior information about the process probability density of the noise. This method
    gets its name from the fact that the estimation aims to minimize the least squares
    error between the measurements and the estimated process.


    ## 3.5 Summary


    In this chapter we introduced the concept of multi-modality and how it can be
    used to improve recognition performance over single mode recognition. We discussed
    different uses of multi-modality and how it can spur new recognition-based usages
    in addition to improving the existing ones. We briefly touched upon a few techniques
    to achieve multi-modal recognition under various conditions and architecture goals.
    The reader is encouraged to follow the references in the next section for more
    in-depth information about these techniques. The next chapter will focus on yet
    another way to improve recognition performance, i.e., through the use of context.


    # 4. Contextual Recognition


    In this chapter we move beyond the primary theme of recognition and begin to understand
    what the next level of understanding looks like. Specifically, we will discuss
    the concept of "context" and contextual understanding. In simple terms, context
    refers to the environment under which we are trying to understand something. Having
    contextual information allows for better recognition, as we discussed in the case
    of multi-modal sensor fusion in [Chapter 3](#A978-1-4302-6593-1_3_Chapter.html).
    Conversely, having a recognition of specific environmental attributes can help
    us define context that can aid in understanding of the scene being observed. Some
    examples of contextual recognition are outlined below:


    - Having an understanding of the environment allows for recognition of objects
    that are occluded and hard for traditional algorithms to recognize. For example,
    recognizing a table and a monitor makes it easy to recognize a keyboard on the
    table even if the keyboard is occluded and not easy to be recognized in isolation.

    - A recognition system can benefit from knowing the relationships between different
    objects. For example, in many pictures an office chair always faces a table. This
    semantic positional relationship between the chair and the table can allow for
    optimized recognition of one object after we have recognized the other.

    - Contextual recognition can help predict occluded objects in a scene. For example,
    detecting a feline tail occluded behind a tree can be predicted as a tiger cub
    or a large cat depending on the context based on location (forest vs. park)


    ## 4.1 Relationship between Context and Recognition


    In this section we try to bridge the gap between recognition and context in the
    "forward" direction, i.e., we will understand how one can deduce context from
    recognition.


    There are two main types of systems that deal with contextual recognition, namely
    rule-based systems and knowledge-based systems. Contextual information forms the
    basis of the difference between rule-based and knowledge-based systems. Before
    we understand the importance of context, we present a very high-level overview
    of these two types of systems. The actual in-depth discussion is deferred to the
    later chapters. Also, we will only concentrate on the object recognition from
    images as the goal and leave the more complicated usage goals for later chapters.


    **Goal**: Given a picture, identify the objects in the image.'
