  trans: '

    ### 4.4.1 基于图像的上下文识别


    在最近的一项研究中，受试者被要求描述一张模糊的街道图像中的场景。大多数人回答说，他们看到的是一个有汽车和行人的街景<参考文献>。而实际上，这张图像是由同一张汽车图像在两个相差
    90 度的位置上合成的。大多数测试观察者将汽车误认为行人，这是人类上下文观察效应的一种体现——人们会预期在这样的场景中出现行人。上述例子也表明，在某些情况下，上下文可能会造成干扰，使问题难以解决。庆幸的是，与那些上下文有助于识别的场景相比，此类情况的数量要少得多。在上述例子中，上下文识别在一个合成且极不可能出现的场景中失效了。


    类似地，让一组观察者在一张呈现的图像中执行“找人”任务，并通过眼动追踪仪记录他们的注意力，生成了一张平均热力图，这张图可被视为一种经过调制的显著性图。该显著性图显示，人类的注意力会迅速集中在图像中的少数几个区域，以寻找感兴趣的目标。从上下文来看，这些区域正是找到目标对象概率最高的位置，因此是集中搜索的合理起点。人类的搜索方法并非在整个图像上均匀分布，而是一旦粗略识别出场景的各个部分，搜索便会迅速聚焦于最可能包含目标实体的区域。与机器相比，研究显示，当观察者在场景中寻找某个物体时，他们会随意扫视场景，并将搜索固定在上下文中最有可能包含该物体的区域。在眼睛固定注视之前，大多数物体实际上已被“一瞥”识别。


    **一致性与不一致性效应**：如果在包含上下文的场景之后呈现目标物体（例如，面包之后出现厨房，或森林中出现野生动物），物体检测的准确率（以检测速度衡量）会得到提升。


    ### 4.4.2 非基于图像的上下文识别


    作为一个非视觉识别任务的例子，请考虑下面这句话：


    “根据剑桥大学的一项研究，单词中字母的顺序并不重要，唯一重要的是首字母和尾字母在正确的位置上。其余的字母可以完全混乱，你仍然可以毫无问题地阅读它。这是因为人类的大脑不会逐个字母地阅读，而是将单词作为一个整体来理解。”


    显然，上面这句话中的单词拼写有误，但读者并不难理解句子的意图。在很多情况下，读者阅读后面单词的速度比阅读前面单词更快。这是人类理解具有上下文特性的体现——我们期望单词符合上下文语境，也符合对句子中下一个词的预期。上述输入中的“噪声”被人类的上下文推理有效地抵消了。


    即使部分单词拼写错误，句子也能被理解。实际上，只要字母数量以及首字母和尾字母保持不变，所有单词都可以拼错。


    ## 4.5 上下文识别：从人类到机器


    将这一类比延伸到计算机系统，上下文识别系统利用了一个事实：物体从不会孤立出现，而通常是特定环境的一部分。通常，对输入数据进行快速评估（利用不同传感器来理解运行环境）比在图像中以不同粒度识别某些目标对象是否出现要更容易。场景的统计摘要为上下文推理提供了一种补充且有效的信息来源。具体而言，了解上下文还有助于在以下数据不完美的情况下提升识别效果（图
    4-2、4-3）：


    ![A978-1-4302-6593-1_4_Fig3_HTML.jpg](img/A978-1-4302-6593-1_4_Fig3_HTML.jpg)


    图 4-3. 上下文有助于减少不良传感器数据的影响


    ![A978-1-4302-6593-1_4_Fig2_HTML.jpg](img/A978-1-4302-6593-1_4_Fig2_HTML.jpg)


    图 4-2. 不良传感器数据会导致识别问题


    - **噪声数据**：由于传感器不完美或环境条件不利，输入数据可能受到噪声污染。噪声数据会使特征生成过程变得非常困难。传统上，在处理前会使用各种滤波方法对噪声数据进行平滑处理。虽然基于滤波的平滑方法对人类观察（例如，视觉上令人愉悦的图像）通常能取得良好效果，但它们通常对基于计算机的自动识别提出了重大挑战。具备上下文信息后，计算机识别方法更容易忽略噪声，转而寻找可能真实反映现实世界信息的特征。

    - **遮挡数据**：如前所述，非上下文识别方法无法处理被传感器其他信息所遮挡的数据。然而，拥有上下文信息使得基于不完整的遮挡数据识别结果进行推测性识别成为可能。

    - **分辨率不足**：有时传感器无法以足够高的保真度捕获目标图像，以满足识别算法的正常运行。原因多种多样，从目标物体超出传感器测距范围到传感器参数不佳。拥有上下文信息有助于通过将目标物体存在的概率模型与不完整信息相结合，来弥补数据分辨率不足的问题。

    - **杂乱场景**：在杂乱场景中，物体分割成为识别算法的一个难题。然而，拥有场景上下文可以将问题简化为一个更小的目标区域，从而进行更高效的分析。

    - **物体姿态可变性**：识别算法的性能取决于其训练数据的多样性。理论上不可能训练出一个算法能涵盖目标物体可能呈现的所有姿态、角度和环境。具备上下文识别能力有助于识别那些与训练模型相比在程度上有所变化的物体配置。

    - **光照变化**：与姿态变化类似，训练数据无法涵盖目标物体可能被观测到的所有光照条件。对于非视觉任务而言，这相当于在不同环境下观测目标现象。拥有上下文信息有助于减少此类环境变化带来的影响。

    '
- fmt: '# 4.6 Representing Context


    By now we understand the need and importance of context in recognition. This section
    addresses the problems in effectively using context for recognition in real and
    practical systems. Two such main issues are:


    1. simple representations for context

    2. algorithms that can extract and use such context


    While the detailed discussion of the methods is left for later chapters, we briefly
    touch upon how the representation for context can be carried out. In short, the
    context representation is distilled down to the problem of relationships between
    different objects and scenes. Analogous to the triplet-based relationship reorientation
    discussed in the first chapter, the context can be represented in the form of
    relationships between different entities in the scene or the relationships between
    objects and scene description itself. Figure [4-4](#A978-1-4302-6593-1_4_Chapter.html#Fig4)
    shows two distinct relationships between entities and a beach scene and the scene
    and the objects themselves.


    ![A978-1-4302-6593-1_4_Fig4_HTML.jpg](A978-1-4302-6593-1_4_Fig4_HTML.jpg)


    **Figure 4-4.** Representing contextual relationships


    These relationships can also be combined to present a combined view of scene-specific
    context as shown in Figure [4-5](#A978-1-4302-6593-1_4_Chapter.html#Fig5).


    ![A978-1-4302-6593-1_4_Fig5_HTML.jpg](A978-1-4302-6593-1_4_Fig5_HTML.jpg)


    **Figure 4-5.** Deducing complex contextual relationship


    Of course, this is just one form of context representation and many other possible
    variations exist in research and implementations. Readers are referred to the
    references for more details on these.


    Different contextual relationships have different strengths. For example, spatial
    relationships are not always strict (`keyboard`, `monitor`) vs. (`firepost`, `ground`).
    Generally, stronger relationship makes contextual recognition easier.


    ## 4.7 Concluding Thoughts on Scene Understanding


    For scene understanding from images, the identity of underlying scenes can be
    gauged from the low-level aggregated feature statistics. State of the art methods
    in scene recognition are comprised of methods that represent the scene as a whole
    rather than splitting it into constituent scenes. These also form the basis for
    many contextual object recognition systems. Global representations have proven
    surprisingly effective for scene recognition.


    ### 4.7.1 Saliency vs Context for Recognition


    When it comes to object detection, scene context has a bigger effect than the
    scene saliency. Context will direct the attention to relevant regions only while
    saliency will bring out the outliers. A scene composed of contextually related
    objects is more than just the sum of objects.


    ## 4.8 Summary


    In this chapter we explored the role of context for effective recognition and
    understanding. Context is vital for effective recognition because it improves
    the application and platform performance and is one big step toward bridging the
    gap between human perception and machine understanding. Using context can make
    a difference between false recognition (or no recognition) and positive recognition.
    We discussed the ways to represent context and outlined how relationship representation
    is a building block toward efficient context representation and usage. In the
    next chapter we will focus on how to extract contextual relationships from scenes
    as well as techniques to represent relationships.


    # 5. Extracting and Representing Relationships


    The relationship extraction between different recognized entities defines the
    second level of operations in a knowledge pipeline after the recognition. While
    the recognition concentrates on identifying and labeling individual entities from
    the sensor data, relationships explicitly demonstrate the connections between
    the entities.


    [Chapter 4](#A978-1-4302-6593-1_4_Chapter.html) showed some examples of how contextual
    relationships manifest themselves in entities. Figure [5-1](#A978-1-4302-6593-1_5_Chapter.html#Fig1)
    below resembles Figure [4-4](#A978-1-4302-6593-1_4_Chapter.html#Fig4) and shows
    the subject-predicate-object relationship between the entities. The figure shows
    that the author and coffee are related by the fact that one entity (author) likes
    the other (coffee).


    ![A978-1-4302-6593-1_5_Fig1_HTML.jpg](A978-1-4302-6593-1_5_Fig1_HTML.jpg)


    **Figure 5-1.** How context determines relationships


    To understand relationship extraction methods at a high level we will focus on
    text-based relationship extraction methods. The best way to understand relationship
    extraction is from text example, since many other modalities convert to text after
    recognition.


    Further, many methods for direct relationship extraction from modes like video
    and speech are derived from text relationship extraction. We will show an example
    of extracting relationships from video.


    ## 5.1 High-level View of Extracting Relationships from Text


    As discussed before, at its very basic level a relationship is what connects two
    (recognized) entities together. A first order relationship connects two entities
    through one predicate. Higher order relationships connect one or more entities
    by multiple predicates.


    Figure [5-2](#A978-1-4302-6593-1_5_Chapter.html#Fig2) shows an example of a first
    order relationship. For an example of a higher order relationship, consider the
    problem of ordering food and wine at a restaurant. The relationship that can be
    used in this scenario would ideally connect a person’s food preferences with the
    available choices along with the most suitable wine pairings.


    ![A978-1-4302-6593-1_5_Fig2_HTML.jpg](A978-1-4302-6593-1_5_Fig2_HTML.jpg)


    **Figure 5-2.** An example of a relationship


    For this chapter, we will mainly concentrate on extracting first order relationships.
    To understand the methods for text-based relationship extraction, we assume that
    the relationship is embedded in a sentence containing the entities and the description
    of the relationship is available (implicitly or explicitly) through the sentence.
    The methods to extract relationship rely on either using pretrained relationship
    structure information or learning the structure on the fly to unearth the relationships.


    The structure of a textual sentence is a very important factor for the performance
    of the relation extraction algorithms. Most of the algorithms either depend on
    the syntactical meaning of the sentences or the structure of the words in the
    sentence. This makes it very important for the recognition methods to output well-structured
    text if the text-based relationship extractors will be used in subsequent stages.
    We will discuss an example of how video-based scene understanding methods can
    output such information later in this chapter.


    More formally, given a sentence a relationship is defined as the tuple `t = (e_1,
    e_2, …, e_n)` where `e_i` is an entity participating in a predefined relationship
    `r`. The task of a relationship extractor can be broken down into the following
    parts:


    - Identify the relevant entities in the relationship.

    - Identify the role of each entity participating in the relationship.


    As shown in Figure [5-3](#A978-1-4302-6593-1_5_Chapter.html#Fig3), for a textual
    relationship extraction task, this breaks down into an unstructured and a structured
    text analysis phase. During the unstructured text analysis phase the algorithm
    works on the sentence semantics to identify different grammatical and syntactical
    parts of the sentence. The structured phase usually starts with the identification
    of the participating entities in a relationship. This is followed by the relationship
    detection and result expression.


    ![A978-1-4302-6593-1_5_Fig3_HTML.jpg](A978-1-4302-6593-1_5_Fig3_HTML.jpg)


    **Figure 5-3.** Unstructured and structured portions of relationship extraction'
