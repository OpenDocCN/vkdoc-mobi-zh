  trans: '

    ### 1. 特征提取器


    特征提取器的主要任务是从传感器收集的原始数据中获取第一层“有意义”的信息。特征提取操作的目的是减小待处理数据的规模。传感器会产生大量数据，其中很多数据对于正在考虑的应用程序而言包含冗余且“无意义”的信息。在整个处理管道中处理这些不需要的数据，将导致计算资源浪费、处理延迟增加、功耗浪费以及带宽过载。在管道早期提取特征，可以确保我们将所需信息与其余数据分离开来，从而减少浪费。此外，特征与管道其余部分的处理目标兼容，使得后续阶段能够轻松设计，并针对已知包含相关信息的数据实现最优功能。如果没有特征提取器，后续阶段将不得不执行复杂的操作来“搜索”整个数据以找到可用的相关信息。根据数据类型和分析目标的不同，特征提取器的实现方式也有所不同。例如，在试图识别人脸的视觉理解系统中，特征提取器可以实现基于肤色的分割方案，从而仅将包含肤色信息的数据发送到其他阶段。类似地，另一个实现物体识别的视觉系统可以配备实现边缘提取器的特征提取器，为识别模块提供物体边缘信息。在音频分析中，无需将原始音频发送给分析引擎，而是可以使用实现频率提取的特征提取器。


    ### 2. 识别


    识别模块实现算法，用于从提供给它的特征中检测和标记实体。通常，识别算法通过向其输入真值与假值示例来训练，从而识别特定实体。这个阶段通常被称为“训练模型”，它会使算法的参数以某种方式配置，使其充当一个过滤器，当识别出某个训练过的实体时输出特定结果。一个训练好的模型通常需要重新训练才能识别新实体。在某些有限的情况下存在例外，例如模型可以自我学习或自我训练。识别算法的示例包括如今极为流行的卷积神经网络、贝叶斯分类器与非贝叶斯分类器，以及用于识别时序事件的时间滤波器。这些算法的实现可以根据所使用的传感器和提取的特征，确定视觉特征集是否包含人脸或物体、说出了哪个单词、以及正在执行何种动作。


    ### 3. 多模态上下文提取器


    来自一个或多个传感器的已识别信息可以组合起来，以理解知识管道的运行“上下文”。上下文提取过程利用已有的识别输出，来提供对事件发生环境的理解。获取此类信息对于正确实现应用至关重要。


    ## 1.4 约束与参数


    截至目前，讨论主要聚焦于知识生成管道中各个步骤对数据类型与数据理解算法的逻辑划分。此外，在设计此类管道时，设计师或架构师还需要考虑另一层操作划分。这种划分是将上述抽象管道映射到实际物理管道的直接结果。根据用途的不同，上述组件的实现将会受到图
    1-10 所示参数的约束。这些参数同时也作为实现的设计输入，用以确定如何在端到端可用的不同硬件平台之间划分目前讨论的功能模块。

    '
- fmt: '# 1. Application Performance Requirements


    Each application operates under certain performance requirements. Some applications
    need to run real-time, which means that the results need to be provided by the
    application with an acceptable time constraint so that a user feels the interaction
    with the application is happening in a natural fashion. This is similar to how
    one would get responses from a human who we are interacting with face-to-face.
    Other applications need a predefined level of results accuracy. Some applications
    can live with approximate results while others need a precision that can, in turn,
    mean higher computation requirements.


    ## Accuracy


    Assume an application (`AppA`) is interested in determining how many people enter
    a building during a given day. Contrast this with another application (`AppB`)
    that wants to know exactly "who" was entering the building. `AppA` implementation
    needs us to distinguish a human from anything that is not human (pets, machines,
    etc.) while monitoring the building entry points. A human classifier at the recognition
    stage in the pipeline does not have to be a very complex algorithm and can be
    implemented by approximating many of the computations. As long as we can reliably
    distinguish humans from others, we need not implement algorithm blocks that calculate
    the exact height, posture, and gender of the people. Contrasting this with `AppB`,
    we can imagine that the relevant recognition algorithm is very complex, since
    it is trying to analyze various facial features and then comparing these to an
    existing database of known faces to accurately determine a person entering the
    building. Thus, application requirements can greatly influence the complexity
    of the solution implementation.


    ## Latency


    The latency requirements vary with the application. For example, a navigation
    application that is predicting your current position in a building and using that
    information to help you navigate to a destination needs to analyze the data fast
    enough so that it is useful. It does not make sense to provide you with the next
    turn information if you have already moved past the turn. Such real-time constraints
    necessitate a system design that considers compute, memory, and network resource
    allocations such that the responses are generated under tight latency constraints.
    On the other hand, applications like `AppA` and `AppB` above provide the total
    number of people or the actual faces that entered a building as a list at the
    end of the day and may not have tight latency constraints (although, if used for
    security purposes, the applications may have tight latency constraints as well).
    They can collect the data from the relevant cameras and work on the data offline
    to generate the results. Knowing the latency constraints of the applications under
    consideration allows the system designer to make necessary implementation trade-offs.


    # 2. Power Constraints


    Each platform on the end-to-end pipe operates under some form of power constraint.
    The available power for the sensors and sensor nodes collecting raw data is usually
    limited and they are battery-operated. In contrast, the nodes in the last stage
    of the pipe tend to be wall-powered servers with large power budgets. Ideally,
    one would like to execute all the "heavy" work portions of the pipeline on the
    platforms that are rich in computation resources and power. This would mean executing
    on servers (or the "cloud," as the server "back end" is commonly called) for most
    implementations. But combining the power constraints with the other constraints,
    especially the application constraints as discussed above, underlines the need
    for running at least some functionality at the front end and other intermediate
    stages of the pipeline.


    # 3. Network Constraints


    Generally, the network infrastructure will be shared among various different applications
    and available network resources change dynamically over time. Network constraints
    mainly consist of the following:


    ## Bandwidth


    The total amount of bandwidth available directly affects the throughput of the
    applications. Based on the available capacity and the other applications competing
    for the network bandwidth, the time it takes to transfer content over the network
    for the application will vary. A pipeline designer typically tries to reduce the
    amount of total bandwidth requirement to keep the application performance optimal
    and predictable. This might entail trying to run more parts of the application
    close to the data source (a goal opposite to that dictated by the power constraints)
    and transmitting smaller size processed information instead of unprocessed data
    (e.g., transmit features instead of raw data).


    ## Reliability


    Different network protocols provide applications with different levels of service.
    A reliable transport, for example, will provide guaranteed delivery of all the
    data but the latency might be higher in case some data is lost over the network
    and retransmissions become necessary. On the other hand, an unreliable protocol
    can trade off fast transmissions with an occasional loss of data packets. The
    designer needs to carefully choose the best possible network protocol based on
    application needs.


    # 4. Memory Constraints


    Each platform on the pipeline has limited memory. For an operation to execute
    on a platform, the processor needs the data it operates on to be resident in the
    memory. In case of the memory size being too small when compared to the amount
    of data/code needed by the processor to effectively process the application, the
    platform runtime infrastructure will need to manage the movement of resources
    (code/data) to and from the memory. This operation introduces latency in processing
    in addition to introducing power overheads. The memory constraints usually tend
    to push the parts of the pipe that need more memory toward the back end of the
    pipe where the execution can take advantage of servers.


    # 5. Resource Sharing Constraints


    At each stage in the pipe, the physical resources like processing, power, memory,
    network, etc. are generally shared between different applications. Having shared
    resources makes it very complicated for the designers to build architectures for
    predefined performance. There exist schemes to guarantee a minimum level of performance
    and share of resources (Quality of Service) to help out in these situations, but
    these schemes generally come with a cost. We will discuss more about these in
    the coming chapters. Figure [1-11](#A978-1-4302-6593-1_1_Chapter.html#Fig11) shows
    the transition of resource availability as we move from front-end sensors to back-end
    servers. In the figure, `LOW` and `HIGH` refer to the resource availability (Bandwidth,
    Power, and Memory) or computation characteristics (Accuracy expected).


    ![A978-1-4302-6593-1_1_Fig11_HTML.jpg](A978-1-4302-6593-1_1_Fig11_HTML.jpg)


    Figure 1-11. Balancing the constraints


    ![A978-1-4302-6593-1_1_Fig10_HTML.jpg](A978-1-4302-6593-1_1_Fig10_HTML.jpg)


    Figure 1-10. Execution Pipeline Constraints


    In summary, a system designer has to efficiently map the end-to-end capability
    blocks to available hardware under the performance constraints as described above.
    The resource manager in Figure [1-12](#A978-1-4302-6593-1_1_Chapter.html#Fig12)
    needs to find the "sweet spot" of execution based on all the constraints mentioned
    above.


    ![A978-1-4302-6593-1_1_Fig12_HTML.jpg](A978-1-4302-6593-1_1_Fig12_HTML.jpg)


    Figure 1-12. Designing the system under constraints'
