- fmt: '### 2.4.3 Video Summarization


    Video summarization refers to the ability to analyze a full video and summarizing
    it by either (a) extracting the salient segments of the video with a small number
    of frames or video snippets or (b) creating a short transcript of the video by
    identifying the series of activities in the video. The usage could range from
    video surveillance, where the anomalies are the salient scenes in the video, OR
    event summaries such as identifying the key parts of soccer game (like the goals
    or the major attempts). In this section, we will focus on the former and describe
    the approaches used to identifying salient portions of a video and to potentially
    classify the activity.


    There are multiple approaches in the literature on how to identify salient frames.
    A simple way to think of it is to figure out which frames in the video best represent
    the scenarios in the video while at the same time identifying just enough number
    of frames unique from each other. Many approaches rely on color, motion, or other
    low-level feature detectors. Some also focus on boundary detection, where a significant
    change between frames indicates a potential salient event. Using these techniques,
    one can identify salient frames in the video, but these may represent too many
    frames or too few frames depending on how different or similar the frames are
    to each other.


    Recent efforts have been focusing on using a combination of diversity and coverage
    metrics to determine how to end with a finite number of frames in the video that
    represents both sufficient coverage as well as sufficient diversity amongst each
    other. One approach by S. Chakraborty et al. tries to do better by adaptively
    determining the summary length as well as the frames to pick within that summary.
    In this paper, the authors propose an adaptive summarization technique that poses
    this problem as an optimization problem for selecting a set of sufficiently unique
    frames representing the video. The optimization problem considers representativeness
    and uniqueness as the two key metrics and tries to maximize both metrics to identify
    keyframes in an adaptive manner. Figure 2-23 illustrates the basic idea. They
    compare it to a traditional mechanisms, such as random sampling, clustering, and
    the use of curvature points, and show that it is more effective.


    ![A978-1-4302-6593-1_2_Fig23_HTML.jpg](A978-1-4302-6593-1_2_Fig23_HTML.jpg)


    *Figure 2-23. Example video summarization (from S. Chakraborty et al.)*


    Recent efforts attempt to consider semantic context of the video by employing
    convolutional neural networks (CNNs) to identify entities (multiple objects, locations,
    people, and activities) and scoring these entities with respect to their co-occurrence
    as well as relation to the type of classification scenario of importance. They
    show that this approach has significant potential since it is semantically more
    meaningful and effective. An example flow of this video summarization technique
    is shown in Figure 2-24.


    ![A978-1-4302-6593-1_2_Fig24_HTML.jpg](A978-1-4302-6593-1_2_Fig24_HTML.jpg)


    *Figure 2-24. Example video summarization using deep networks*


    Overall, video summarization based on visual information is quite a challenging
    and important problem and the existing literature is just getting started in providing
    a suitable set of summarization schemes. We refer the reader to the papers in
    the reference section of this chapter to get a better understanding of techniques
    in this area along with applied usage scenarios.


    ## 2.5 Other Sensors


    There are a large number of sensors beyond the ones covered in more detail above.
    Below is a summary of these sensors and their potential usages.


    ### 2.5.1 Proximity Sensor


    A proximity sensor detects the presence of an object in the vicinity without having
    to touch the object. Typically, a proximity sensor is IR (infrared)-based and
    it works by sensing the change in the IR field. An example of proximity sensor
    usage is in phones to determine whether the phone is up against your ear due to
    a call in order to avoid any accidental touches during that time. Another example
    is the use of a proximity sensor in robots to determine whether it is coming close
    to an obstacle and therefore needs to move around it or turn around. In addition
    to IR proximity sensors, wireless solutions such as `BLE` and Wi-Fi devices may
    also be used to determine whether a device is within the proximity of a beacon
    or an access point. Since this is also location related, it covered in more detail
    in the next section.


    ### 2.5.2 Location Sensor


    A location sensor helps determine the geographical location of a device. The most
    common location sensor is the GPS (global positioning system) sensor that is used
    very frequently in navigation systems within cars as well as phones. The `GPS`
    system communicates with the satellites orbiting around the earth and uses trilateration
    to determine the location of the device that consists of the GPS receiver. This
    is very useful for outdoor location, but does not work well for indoor location.
    For indoor location, similar radio-based approaches can be used but with Wi-Fi
    access points as the triangulation point or `BLE` beacons that are becoming increasingly
    popular.


    ### 2.5.3 Touch sensors


    Touch sensors are common these days in all wearable watches, phones and tablets,
    and are even available on laptop screens these days. Touch screens serve the purpose
    of allowing users to interact with screens with their finger rather than the mouse.
    The use of fingers makes the experience much easier and intuitive. Touch screens
    can be resistive or capacitive—the former (resistive) uses resistance between
    multiple layers and your finger as the way of identifying the touch, whereas the
    latter (capacitive) uses the flow of electricity between your fingers and the
    screen as the way of determining touch. Recent efforts are further improving touch
    screen resolution by incorporating force (how far do you press the finger) as
    another key input into the experience.


    ### 2.5.4 Magnetic Sensors


    Magnetic field sensors or magnetometers detect and measure the magnetic field
    with different levels of sensitivity depending on the type of sensor used. A common
    magnetometer is the Hall Effect sensor that changes its output voltage depending
    on the intensity of the magnetic field. The Hall sensor can be used in industrial
    applications to sense the presence of magnetic objects as well as measure the
    timing of their arrival/departure.


    ### 2.5.5 Chemical and Biosensors


    A growing field of sensing is the use of chemical and biosensors. Chemical sensors
    are used for sensing the composition of gas or liquids. These are immensely useful
    for analyzing air quality and gas presence in industrial environments. Biosensing
    targets the presence of cells, protein, nucleic acid, etc. This can be used to
    analyze skin conditions, for example. Use of both chemical and biosensing is becoming
    extremely attractive for usages in environmental, industrial, health, and wellness
    applications.


    ## 2.6 Summary


    In this chapter, we reviewed three types of sensors (`IMU`, audio and visual)
    and walked through the processing phases to process the raw sensor data and convert
    it into recognized information. Through the process, we discussed the key components
    involved in the processing and the many algorithms used to trade-off accuracy
    and computing complexity. For example, we showed that visual processing and recognition
    ranges from object recognition from a simple 2D image to video summarization across
    many frames. In the coming chapter, we will discuss how these sensors can be used
    together for multi-modal processing as well as how to convert recognized information
    into actionable knowledge.'
