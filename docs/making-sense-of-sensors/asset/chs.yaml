- "# 关于作者与技术审校  \n\n## 关于作者  \n\n## 关于技术审校\n\n\n\n"
- "# 管道简介\n\n当今的电子世界充满了（a）从各种来源收集数据的传感器，以及（b）将这些数据用于各种用途的应用程序。我们的智能手机包含摄像头、运动传感器、温度传感器、麦克风、GPS\
  \ 传感器等。智能手表包含这些传感器以及更多，例如心率传感器、体温监测器等。我们不随身携带的设备则配备了监测环境的传感器，例如可以监测家中是否有人以实现自动温控的智能恒温器，以及用于入侵监测的摄像头（包括面部识别）。虽然传感器及其相关的意义构建世界似乎正变得日益拥挤、智能且高度复杂，但要理解这个世界的内部结构，人们需要了解一些基本原理和流程。本书将通过几个具体示例详细说明这些概念。在本章中，我们将呈现一个高层级的概览，并让读者初步领略本书后续内容。\n\
  \n## 动机\n\n对于那些好奇传感器如何收集我们周围环境和行为信息，以及这些信息如何被处理以提供对我们有用的服务的读者来说，本书将帮助他们理解相关概念，并提供指导，以便他们能自行构建一些基础解决方案。理解所有这些复杂服务都建立在相似的基本原理之上，是迈向这一过程的基础步骤。\n\
  \n例如，考虑一个用于汽车的复杂高级驾驶辅助系统（ADAS）（图 1-1）。它使用一组传感器，如摄像头、运动传感器等，为驾驶员提供安全和舒适方面的辅助。其用途之一是自动追踪汽车在车道中的位置，并在车辆偏离车道时发出声音警告（车道偏离警告）。这个高度复杂的系统，其工作原理基于物联网（IoT）的基本处理流程，包括：收集数据的传感器（摄像头、运动传感器）、识别数据的算法（汽车在车道中的相对位置、车辆偏移），以及根据识别结果采取行动的应用程序（声音警告的开启/关闭）。如图\
  \ 1-1 所示，这个流程是所有传感器数据复杂处理管道的基础，这将在本书的各个章节中逐渐明晰。\n\n![A978-1-4302-6593-1_1_Fig1_HTML.jpg](img/A978-1-4302-6593-1_1_Fig1_HTML.jpg)\n\
  \n图 1-1. 传感器数据处理与应用程序的阶段\n\n另一个例子是智能手机和其他设备提供的基于语音的自动个人助理。在这种应用中，用户通过语音命令激活系统，然后提出诸如“明天天气怎么样？”之类的查询。系统会“神奇地”理解问题，并给出语音回答。这个复杂系统的核心，正是我们熟悉的（感知、识别、行动）方法论。麦克风感知我们的语音，识别系统“理解”我们的意图，然后采取行动来满足请求。\n\
  \n本书的后续章节旨在为读者提供处理各种传感器所采集数据的步骤的高层级概览，使其能够应用于各种应用程序。我们将理解将数据转化为知识所需的逻辑步骤，并深入探讨一些具体的实现方式，以便读者能够轻松地“摆弄”代码和数据，从而理解实现的细节。\n\
  \n从高层级来看，从物理世界捕获的数据需要经历如图 1-2 所示的三个阶段，才能转化为可操作的知识。\n\n![A978-1-4302-6593-1_1_Fig2_HTML.jpg](img/A978-1-4302-6593-1_1_Fig2_HTML.jpg)\n\
  \n图 1-2. 数据生命周期阶段\n\n第一阶段显示的是由各种传感设备（视频、音频、压力、运动、温度等）捕获的数据。这些数据是原始的（未处理的），并夹杂着各种噪声，需要进行清理、过滤，并以结构化方式表示，才能用于分析和处理。在当前的讨论中，我们假设所有这些处理步骤都由图\
  \ 1-2 中的数据块来表示。\n\n数据本身是在特定时间段内的一系列单一测量值。要理解数据实际在“诉说”什么，观察者需要提取数据中的语义。例如，虽然 100°F\
  \ 的环境温度读数本身告诉了我们热传感器采样的绝对温度，但其语义并不能立即被理解。将这个信息与一个（假设的）事实——该测量是在阿拉斯加冬季的冰川附近进行，且之前的测量值逐渐升高——结合起来，我们就获得了上下文和语义上的理解：测量地点正在发生一些不寻常的事情。\n\
  \n理解数据中蕴含的语义，使我们能够把握数据在上下文中的意义。此外，还能理解这些语义与迄今已知的其他事实之间的关系。这些关系构成了“知识”的基础。举一个非常简单的例子，在上述温度读数的实例中，与另一个事件（如一场大的森林火灾）的关联，可以为我们理解异常温度读数的根本原因提供依据。\n\
  \n上述讨论中蕴含的一个事实是“知识会自我滋养”，也就是说，如果系统已经“知道”阿拉斯加的天气通常比较凉爽，那么它就能知道那里出现的高温是一种异常。因此，我们可以重新绘制图\
  \ 1-2，如图 1-3 所示，在知识构建器中加入一个反馈回路。\n\n![A978-1-4302-6593-1_1_Fig3_HTML.jpg](img/A978-1-4302-6593-1_1_Fig3_HTML.jpg)\n\
  \n图 1-3. 迭代知识模型\n\n知识指的是从传感器数据中提取的语义信息的聚合体，其组织方式使得关系通过链接扩展到整个知识库，这些链接会随着越来越多的语义信息可用而随时间建立起来。知识管理任务包含两个主要的结构部分：\n\
  \n1.  **知识表示**：知识需要以一种能够保留并修改各种概念之间的语义信息和关系的方式进行存储和表示。对知识的修改包括添加新的信息和实体，以及由新数据催化的当前关系或表示的变更。\n\
  2.  **知识操作**：这包括用于向知识数据库中插入和提取数据的工具、API 和编程语言。知识存储需要提供一种方式，以便在现有知识数据库中的正确位置插入新的关系。这涉及理解传入的语义数据，并提供一种机制来查找和操作正确的关系。提取过程涉及响应针对不同实体和概念之间关系的各种查询。提取器的输入是一个不完整的关系描述，输出则是填补描述中的空白。提取器需要支持一种逻辑语言，该语言能够用数学方式表示诸如“在\
  \ X 餐厅，我点烤鸡应该配什么酒？”这样的查询，并提供一种在知识数据库中遍历以获取答案的机制。\n\n\n\n## 1.2 数据抽象的更高层次\n\n在熟悉了功能模块的高级描述之后，我们现在简要概述端到端流水线中的数据抽象。这些抽象展示了如何将通过传感器从物理世界收集的数据，最终转化为可操作、有价值的信息。\n\
  \n就本书而言，我们关注以下数据抽象的细分层次。\n\n1.  **原始传感器数据**：原始（或未经处理的）传感器数据由流水线前端的传感器捕获。数据的格式随传感器类型而变化。以下是几种传感器及其相关数据格式的示例：\n\
  \    1.  **视觉**：通常，相机传感器拍摄场景的静态图像或视频。数据格式是模拟电压电平，代表图像传感器上不同位置的像素强度和颜色。这些电平被频繁采样并量化为比特，使信号更容易进行数字处理。这个过程称为模数转换。\n\
  \    2.  **音频/语音**：类似麦克风的传感器通常捕获音频。如果目标是通过网络传输信息或通过数字工具处理信息，则会应用称为模数转换的过程来实现转换，结果是一个代表随时间变化的音频频率的比特流。\n\
  \    3.  **运动**：惯性传感器通常测量加速度和运动（平移和旋转）。产生的数据是一串数字，代表上述参数的瞬时变化。\n    4.  **温度传感器**通常报告某一时刻的瞬时温度。\n\
  \    5.  **BMI 传感器**：脑机接口传感器，如 `EEG` 和 `EKG`，以活动图的形式报告脑活动测量值。图 1-4 展示了一种可以像耳机一样戴在头上的商用\
  \ BMI 传感器。\n\n    ![A978-1-4302-6593-1_1_Fig4_HTML.jpg](img/A978-1-4302-6593-1_1_Fig4_HTML.jpg)\n\
  \n    图 1-4. BMI 传感器\n\n2.  **特征**：一般来说，我们对数据中的某些更高级信息感兴趣，这些信息的聚合可以导致目标实体的识别。例如，在图像中定位边缘或角点可能是识别可辨识物体的第一步。类似地，识别音频流中的微话语使得能够将它们拼接成单词。\n\
  \n3.  **已识别实体**：识别通常是一项复杂的任务，涉及对所提取特征进行空间和时间分析，以将聚合特征映射到预先已知的实体。继续上面的例子，对于视觉而言，识别任务可能涉及对提取的特征进行分类，以识别物体和面部等形状。对于音频，对特征进行统计分析和分类使得聚合特征能够被识别为单词。通常，识别工具会使用它们最终要在特征池中“搜索”的实体示例进行预训练。例如，面部识别算法将使用每个面部的多张训练图像针对特定面部进行训练。一旦训练完成，模型便可以从测试图像中识别出训练过的面部。\n\
  \n4.  **语义关系**：语义关系提取，连同上下文关系提取，已变得越来越重要，尤其是随着机器在理解周围环境方面变得更加智能。语义关系指的是各种已识别实体之间的联系。例如，钥匙和锁之间的语义关系指的是用钥匙打开或锁上锁的操作。类似地，句子“我喜欢咖啡”使用谓语“喜欢”将“我”（主语）与“咖啡”（宾语）联系起来。许多更简单的语义关系可以通过这种（主语，谓语，宾语）三元组来表示。图\
  \ 1-5 以图形方式展示了一个关系三元组的示例。\n\n    ![A978-1-4302-6593-1_1_Fig5_HTML.jpg](img/A978-1-4302-6593-1_1_Fig5_HTML.jpg)\n\
  \n    图 1-5. 语义关系\n\n5.  **上下文关系**：上下文关系有助于在语境中理解已识别数据。上下文可以通过多种方式获得。这些方式包括使用其他传感器以及利用已识别数据的历史记录进行上下文识别。由监控系统执行的面部识别操作，可以根据识别发生的时间（白天\
  \ vs. 夜晚）或根据被识别的人员，来确定是潜在的入侵还是正常操作。\n\n6.  **知识**：看待知识这个概念的一种方式是将其可视化为一个更大的关系聚合体，这些关系通过谓语相互连接。添加越来越多的关系会产生一个图形化的知识结构，该结构在代表谓词的节点之间具有有向关系。例如，语义关系“我喜欢咖啡”和“咖啡种植在巴西”结合形成一个复合知识实体，如图\
  \ 1-6 所示。\n\n    ![A978-1-4302-6593-1_1_Fig6_HTML.jpg](img/A978-1-4302-6593-1_1_Fig6_HTML.jpg)\n\
  \n    图 1-6. 基础知识构建块\n\n    扩展这一概念导致了一个丰富的知识库，其示例可以作为语义网的一部分找到。图 1-7 显示了这样一个数据库，它代表了食物类型之间的关系。例如，这种表示可用于解释水果可以是甜的或不甜的，并且这两种类型都可以食用。\n\
  \n    ![A978-1-4302-6593-1_1_Fig7_HTML.jpg](img/A978-1-4302-6593-1_1_Fig7_HTML.jpg)\n\
  \n    图 1-7. 扩展关系图\n\n7.  **查询与响应**：知识库的最终目的是提供信息，以便为各种用途实现服务。各种形式的数据分析算法作用于知识节点和关系，以提取对提供所需服务有用的信息。查询过程侧重于构建系统的语义搜索输入，使得分析算法能够解析知识库以获得适当的响应。例如，使用图\
  \ 1-8，可以解析查询“贝类是什么味道？”并提供答案（中等或强烈）作为响应。\n\n    ![A978-1-4302-6593-1_1_Fig8_HTML.jpg](img/A978-1-4302-6593-1_1_Fig8_HTML.jpg)\n\
  \n    图 1-8. 用于语义知识抽取的示例知识流水线\n\n    图 1-8 在上述讨论的基础上进行了总结，展示了一个包含图像识别流水线各个阶段的示例知识流水线。\n\
  \n## 1.3 操作\n\n当我们在知识和分析流水线中从原始传感器数据采集移动到用途实现时，每一个数据转换都是由对前一个阶段生成的数据执行特定操作所带来的。虽然转换操作的性质因数据的性质、分析的目标和可用资源而异，但我们可以将操作大致归入下面给出的抽象类别中：\n\
  \n1.  特征提取器：原始传感器数据到特征\n2.  识别算法\n3.  多模态上下文提取器\n4.  知识提取器\n5.  知识表示框架\n6.  一阶逻辑运算\n\
  7.  分析\n\n牢记这些操作，现在可以在图 1-8 中显示转换操作，如图 1-9 所示。\n\n![A978-1-4302-6593-1_1_Fig9_HTML.jpg](img/A978-1-4302-6593-1_1_Fig9_HTML.jpg)\n\
  \n图 1-9. 带有数据转换的图 1-8\n\n现在，我们简要描述这些转换操作中的每一个。\n\n\n\n### 1. 特征提取器\n\n特征提取器的主要任务是从传感器收集的原始数据中获取第一层“有意义”的信息。特征提取操作的目的是减小待处理数据的规模。传感器会产生大量数据，其中很多数据对于正在考虑的应用程序而言包含冗余且“无意义”的信息。在整个处理管道中处理这些不需要的数据，将导致计算资源浪费、处理延迟增加、功耗浪费以及带宽过载。在管道早期提取特征，可以确保我们将所需信息与其余数据分离开来，从而减少浪费。此外，特征与管道其余部分的处理目标兼容，使得后续阶段能够轻松设计，并针对已知包含相关信息的数据实现最优功能。如果没有特征提取器，后续阶段将不得不执行复杂的操作来“搜索”整个数据以找到可用的相关信息。根据数据类型和分析目标的不同，特征提取器的实现方式也有所不同。例如，在试图识别人脸的视觉理解系统中，特征提取器可以实现基于肤色的分割方案，从而仅将包含肤色信息的数据发送到其他阶段。类似地，另一个实现物体识别的视觉系统可以配备实现边缘提取器的特征提取器，为识别模块提供物体边缘信息。在音频分析中，无需将原始音频发送给分析引擎，而是可以使用实现频率提取的特征提取器。\n\
  \n### 2. 识别\n\n识别模块实现算法，用于从提供给它的特征中检测和标记实体。通常，识别算法通过向其输入真值与假值示例来训练，从而识别特定实体。这个阶段通常被称为“训练模型”，它会使算法的参数以某种方式配置，使其充当一个过滤器，当识别出某个训练过的实体时输出特定结果。一个训练好的模型通常需要重新训练才能识别新实体。在某些有限的情况下存在例外，例如模型可以自我学习或自我训练。识别算法的示例包括如今极为流行的卷积神经网络、贝叶斯分类器与非贝叶斯分类器，以及用于识别时序事件的时间滤波器。这些算法的实现可以根据所使用的传感器和提取的特征，确定视觉特征集是否包含人脸或物体、说出了哪个单词、以及正在执行何种动作。\n\
  \n### 3. 多模态上下文提取器\n\n来自一个或多个传感器的已识别信息可以组合起来，以理解知识管道的运行“上下文”。上下文提取过程利用已有的识别输出，来提供对事件发生环境的理解。获取此类信息对于正确实现应用至关重要。\n\
  \n## 1.4 约束与参数\n\n截至目前，讨论主要聚焦于知识生成管道中各个步骤对数据类型与数据理解算法的逻辑划分。此外，在设计此类管道时，设计师或架构师还需要考虑另一层操作划分。这种划分是将上述抽象管道映射到实际物理管道的直接结果。根据用途的不同，上述组件的实现将会受到图\
  \ 1-10 所示参数的约束。这些参数同时也作为实现的设计输入，用以确定如何在端到端可用的不同硬件平台之间划分目前讨论的功能模块。\n\n\n\n"
- '# 1. 应用性能需求


  每个应用程序都在特定的性能需求下运行。有些应用需要实时运行，这意味着应用必须在可接受的时间限制内提供结果，以便用户感觉与应用的交互是自然发生的。这类似于我们与面对面交流的人获得回应的方式。其他应用则需要预定义级别的结果准确性。有些应用可以接受近似结果，而另一些则需要高精度，这反过来可能意味着更高的计算需求。


  ## 准确性


  假设有一个应用（`AppA`）需要确定一天内进入一栋建筑的人数。对比另一个应用（`AppB`），它想知道进入建筑的究竟“是谁”。`AppA` 的实现需要我们在监控建筑入口时，区分人类与非人类（宠物、机器等）。在流水线的识别阶段，一个人类分类器不一定是复杂的算法，可以通过近似许多计算来实现。只要我们能可靠地区分人类和其他物体，就无需实现计算人们精确身高、姿势和性别的算法模块。相比之下，对于`AppB`，我们可以想象相关的识别算法非常复杂，因为它试图分析各种面部特征，然后与已知人脸数据库进行比较，以准确识别进入建筑的人。因此，应用需求会极大地影响解决方案实现的复杂度。


  ## 延迟


  延迟需求因应用而异。例如，一个导航应用预测你在建筑内的当前位置，并利用这些信息帮助你导航到目的地，它需要足够快地分析数据才能发挥作用。如果你已经走过了转弯处，再为你提供下一个转弯信息就毫无意义了。这种实时性约束要求系统设计必须考虑计算、内存和网络资源的分配，以便在严格的延迟约束下生成响应。另一方面，像上面提到的
  `AppA` 和 `AppB` 这类应用，它们在一天结束时提供进入建筑的总人数或实际人脸列表，可能没有严格的延迟约束（尽管如果用于安全目的，它们也可能有严格的延迟约束）。它们可以从相关摄像头收集数据，并在离线状态下处理数据以生成结果。了解所考虑应用的延迟约束，能让系统设计者做出必要的实现权衡。


  '
- '# 2. 功耗约束


  端到端流水线上的每个平台都在某种形式的功耗约束下运行。用于收集原始数据的传感器和传感器节点的可用功率通常是有限的，并且它们依靠电池供电。相比之下，流水线末端的节点往往是墙壁供电的服务器，具有较大的功率预算。理想情况下，人们希望将流水线中所有“繁重”的工作部分都在计算资源和功率丰富的平台上执行。这意味着对于大多数实现，需要在服务器（或通常所说的服务器“后端”）上执行。但是，将功耗约束与其他约束（特别是上述的应用约束）结合起来，就凸显了在流水线的前端和其他中间阶段至少运行部分功能的必要性。


  '
- '# 3. 网络约束


  通常，网络基础设施会被各种不同的应用共享，并且可用的网络资源会随时间动态变化。网络约束主要包括以下内容：


  ## 带宽


  可用的总带宽直接影响应用的吞吐量。基于可用容量以及其他竞争网络带宽的应用，应用通过网络传输内容所需的时间会有所不同。流水线设计者通常会尝试降低总带宽需求，以保持应用性能最佳且可预测。这可能意味着尝试在靠近数据源的位置运行更多应用部分（这与功耗约束所决定的目标相反），并传输更小尺寸的处理后信息，而不是未处理的数据（例如，传输特征而非原始数据）。


  ## 可靠性


  不同的网络协议为应用提供不同级别的服务。例如，可靠的传输协议将保证所有数据的交付，但如果某些数据在网络中丢失而需要重传，延迟可能会更高。另一方面，不可靠的协议可以在快速传输与偶尔的数据包丢失之间进行权衡。设计者需要根据应用需求仔细选择最佳的网络协议。


  '
- '# 4. 内存约束


  流水线上的每个平台的内存都是有限的。要使操作在一个平台上执行，处理器需要其操作的数据驻留在内存中。如果内存大小相对于处理器有效处理应用所需的数据/代码量来说太小，平台运行时基础设施将需要管理资源（代码/数据）进出内存的移动。除了引入额外的功耗开销外，此操作还会引入处理延迟。内存约束通常会将流水线中需要更多内存的部分推向流水线后端，因为在那里可以利用服务器执行。


  '
- '# 5. 资源共享约束


  在流水线的每个阶段，像处理、功耗、内存、网络等物理资源通常在不同的应用之间共享。共享资源使得设计者为预定义性能构建架构变得非常复杂。存在一些方案可以保证最低级别的性能和资源份额（服务质量）来帮助应对这些情况，但这些方案通常需要付出成本。我们将在后续章节中对此进行更多讨论。图
  1-11 展示了当我们从前端传感器移动到后端服务器时，资源可用性的变化。图中，`低`和`高`指的是资源可用性（带宽、功耗和内存）或计算特性（预期的准确性）。


  ![A978-1-4302-6593-1_1_Fig11_HTML.jpg](img/A978-1-4302-6593-1_1_Fig11_HTML.jpg)


  图 1-11. 平衡各项约束


  ![A978-1-4302-6593-1_1_Fig10_HTML.jpg](img/A978-1-4302-6593-1_1_Fig10_HTML.jpg)


  图 1-10. 执行流水线约束


  总之，系统设计者必须根据上述性能约束，将端到端的能力模块高效地映射到可用硬件上。图 1-12 中的资源管理器需要基于上述所有约束，找到执行的“最佳平衡点”。


  ![A978-1-4302-6593-1_1_Fig12_HTML.jpg](img/A978-1-4302-6593-1_1_Fig12_HTML.jpg)


  图 1-12. 在约束下设计系统




  '
- '# 1.5 物理平台


  本章最后一节将简要概述用于执行管道功能的物理平台。


  **传感器/智能传感器**：管道前端是负责收集数据的传感器。这些传感器包括摄像头、麦克风、陀螺仪、加速度计、温度计、高度计、空气质量传感器等。有些传感器可以说是智能的，因为它们能够在节点本身上处理部分数据。这种处理可以实现更智能的传输策略以节省电池或进行初步处理；也可以根据所捕获数据的性质在传感器节点上触发某些操作。


  **网关/路由器**：网关和路由器构成了管道中的中间平台。它们在端到端管道中扮演两个非常重要的角色。


  1.  路由器和网关作为中间平台，拥有比传感器节点更丰富的计算资源，但在网络距离上比高性能服务器近得多。这一特性使得许多应用能够利用这些中间平台的计算就近性，实现低延迟和低开销的功能执行。

  2.  这些中间节点充当来自各种传感器的数据传输的聚合点。除了作为将收集到的数据中继到云端服务器的转发点之外，这些平台是管道中第一个能够对来自多个来源的数据进行互相关处理的平台。如果资源允许，中间平台可以处理来自多个来源的数据，以确定上下文并在传输到服务器之前减少数据冗余。路由器和网关还负责跟踪连接到它们的节点，并传输所需的配置和节点管理命令。


  **云/服务器**：服务器构成了管道的所谓后端。后端也称为“云”。云通常配备有高容量、由市电供电的服务器，能够执行高计算周期，并拥有大容量内存库。云是进行繁重计算工作的合适场所。在云端执行工作负载的缺点在于网络引入的延迟。实时应用可能无法容忍通过网络从服务器获取响应所带来的延迟。因此，服务器通常适用于离线批处理，如分析。知识表示以及对知识数据库的查询/响应处理是在服务器上执行的一些典型功能。


  ## 1.6 本章小结


  在本章中，我们高层次概述了将通过识别将传感器收集的数据转换为可操作信息的过程。我们探讨了数据如何通过识别管道进行转换，以及对数据执行的不同操作。我们还讨论了在真实物理系统上实现此类处理管道时的实际考量。第
  2 章将通过具体示例深入探讨这些操作。


  '
- '# 2. 从数据到识别


  数字世界中的识别过程始于捕获物理世界原始数据的传感器。在本节中，我们将重点介绍三种类型的传感器（惯性、音频和视觉），以了解它们的使用方式，以及如何识别这些类型传感器的数据用于不同目的。让我们从几个在移动、可穿戴和物联网部署中的不同使用场景开始。


  **移动设备**：如今的移动设备拥有许多传感器，用于理解用户情境和行为，并实现个性化交互。图 2-1 展示了移动设备中一些示例传感器及其提供的数据类型。惯性传感器能够理解手机在不同轴上的运动，包括加速度、旋转等。音频传感器使手机能够听到声音，例如用户的提问。视觉传感器使手机能够捕捉图片和视频，这可能有助于更好地理解位置或附近物体。


  ![A978-1-4302-6593-1_2_Fig1_HTML.gif](img/A978-1-4302-6593-1_2_Fig1_HTML.gif)


  *图 2-1. 手机传感器使用示例*


  还应注意，这些传感器的组合可以提供多模态识别，提供更丰富的情境数据。例如，结合音频和视觉传感器可以更好地理解场景中的活动。使用视觉传感器，可以看到场景中有一个孩子和一个大人，这可能表明大人在教孩子。向情境中添加音频感知则提供了额外的信息，例如活动是唱歌而不是说话。


  **可穿戴设备**：与移动设备非常相似，可穿戴设备也使用类似的传感器，但现在能够确定用户的运动以及音频/视觉焦点和交互，可能从第一人称视角（例如头戴式设备）。图
  2-2 展示了此类可穿戴传感器的用途类型。


  ![A978-1-4302-6593-1_2_Fig2_HTML.gif](img/A978-1-4302-6593-1_2_Fig2_HTML.gif)


  *图 2-2. 可穿戴设备传感器使用示例*


  **物联网设备**：虽然物联网设备中可能使用类似的传感器，但物联网设备的一个关键区别在于，它们通常着眼于一个场景和集体，而不是侧重于从用户角度出发的个性化场景。例如，IP
  摄像头用于监控住宅（家庭）以及道路交叉口和交通。在这里，摄像头通常是静态的或仅在有限范围内移动，因此重点在于音频/视觉传感器的使用，而非惯性传感器。视觉传感器提供了理解场景变化以及识别附近车辆或人数量的能力。音频传感器通过提供诸如声音中的重大异常（例如道路上的事故或家中的窗户被闯入）等信息来补充额外信息。图
  2-3 说明了这种用途。


  ![A978-1-4302-6593-1_2_Fig3_HTML.gif](img/A978-1-4302-6593-1_2_Fig3_HTML.gif)


  *图 2-3. 物联网传感器使用示例*


  再次强调，在这些情况下，使用多模态（音频+视觉）识别也大有裨益，因为我们可以通过同时关联声音和视觉线索来推断事故和入室行窃。


  本章其余部分组织如下。我们将首先更详细地研究传感器类型，然后深入探讨每种传感器模态及其相关用途的识别技术。


  ## 2.1 传感器类型与识别层级


  如上所述，传感器有多种类型，从惯性传感器到接近/位置传感器，再到音频/视觉传感器。在本节中，我们将介绍这三种传感器（惯性、音频和视觉），并描述它们的大致工作原理。




  ### 2.1.1 惯性测量单元


  `accelerometer` (加速度计) 是理解惯性测量的最佳起点。加速度计本质上测量的是沿每个轴的作用力（即本征加速度）。通常，这类设备被称为三轴加速度计，因为它们提供沿
  `x`、`y` 和 `z` 轴的作用力。`gyroscope` (陀螺仪) 通过测量绕给定轴的旋转来帮助确定方向。图 2-4 展示了加速度计和陀螺仪数据捕获的示意图。两者结合可以提供加速度和方向信息，因此可能被称为六轴传感器。根据使用模式，这些传感器的数据通常以从几
  `Hz` 到` KHz` 的速率捕获。来自加速度计/陀螺仪的原始数据通常带有噪声，因此通常使用滤波器来确保基于多个数据点对这些数据进行平滑处理。此类传感器可应用于多种用例，示例如下：

  *   对位置/方向的理解帮助当今的手机在竖屏或横屏模式下根据需要重新定向屏幕以及反向旋转。

  *   这些传感器还可以通过缓冲连续数据并观察力和方向的变化来识别简单的手势。这些手势可以像沿特定轴的“摇动”、“翻转”或“画圆”运动一样简单。

  *   传感器也用于导航目的，但它们是相对的，因为它们提供给定方向上的力，但不提供任何场域中的绝对位置。通常，这种方法被称为航位推算，并且需要其他传感器信息来确保不会由于嘈杂的传感器数据而导致相对定位随时间产生显著漂移。


  ![A978-1-4302-6593-1_2_Fig4_HTML.gif](img/A978-1-4302-6593-1_2_Fig4_HTML.gif)

  图 2-4. 加速度计、陀螺仪和 IMU 简介


  ### 2.1.2 音频传感器


  大多数设备中使用的典型音频传感器是标准麦克风。麦克风将声音转换为电信号，广泛应用于从典型的公共广播系统到电影、笔记本电脑、手机、可穿戴设备和物联网设备等众多应用中。在本节中，我们主要关注用于物联网和可穿戴应用的低端设备中的麦克风。这些设备中使用的大多数麦克风都是
  MEMS（微机电系统）传感器，并且可能是模拟或数字的。麦克风的输出通常是脉冲密度调制（PDM）或脉冲编码调制（PCM），数据从 4 位到 64 位捕获，并且可以根据信噪比和捕获质量进行调优。麦克风的典型频率响应范围从
  `20Hz` 到 `20KHz`。为了提高录音和识别的质量，例如，在手机中有时会使用两个或三个麦克风。这允许处理来自每个麦克风的数据并降低噪声，以提供更高质量的输出（例如，通话时的人声清晰度）。


  音频传感器不仅用于捕获和记录内容，还用于音频分类和语音识别（见图 2-5）。以下是手机、可穿戴设备和物联网系统中使用单个或多个麦克风的一些主要应用场景：

  *   **音频分类**：麦克风在物联网中的一个常见用例是对捕获声音的环境进行分类。例如，定期从厨房的麦克风捕获音频可以提供有关当前活动类型的信息——空闲、洗碗、水槽流水、烹饪等。研究人员正在使用诸如此类的机器听觉技术，甚至可以区分背景中的不同噪音。例如，从手机捕获的音频不仅可以提供前景人声的信息，还可以提供背景中正在发生的事情的信息。

  *   **语音活动检测**：另一个常见用例是语音活动检测。这里重点在于尝试确定捕获的音频中是否存在语音。当手机或其他设备完全关机，只有麦克风以低速率捕获音频时，这非常有用。一旦音频中出现语音活动，音频子系统就会启动并执行更多处理（如下所述）。

  *   **说话人识别**：说话人识别，有时也称为声纹识别，试图确定谁在说话。这对于识别音频转录中的说话人或将说话人识别作为身份验证方法的一部分很有用。当用作身份验证方法的一部分时，区分说话人识别（从多个说话人中识别出某一个）和说话人验证（确定之前已捕获其签名的特定说话人是否说话）非常重要。

  *   **关键词识别**：关键词识别可能是最简单的语音识别形式，其重点是确定是否说出了某个特定单词。关键词识别可以是依赖说话人的（为特定说话人训练）或不依赖说话人的（普遍适用于所有人）。关键词识别也可以推广到关键短语识别，这两者通常用作启动额外活动的触发器，例如开始一个命令会话或启动一个应用程序。

  *   **命令与控制**：命令与控制是指在语音识别中使用一小部分短语。举例来说，这可能包括一组控制玩具车的命令，例如“向前移动”、“向后移动”、“加速”、“减速”、“右转/左转”等。

  *   **大词汇量连续语音识别（LVCSR）**：LVCSR 和一般的 CSR 指的是语音在被输入到语音识别系统时进行的连续识别。这通常涉及要识别的中等到大的词汇量。在上述所有问题中，这是最具挑战性和计算最复杂的语音识别问题，而该领域最近取得了许多进展，得以降低错误率并改善通用性。


  ![A978-1-4302-6593-1_2_Fig5_HTML.gif](img/A978-1-4302-6593-1_2_Fig5_HTML.gif)

  图 2-5. 音频传感器和识别能力示例


  在上述技术的基础上，读者可能感兴趣的更有趣的应用和功能是自然语言处理和语言翻译功能。这些功能现在正出现在不同的市场解决方案中。


  ### 2.1.3 视觉传感器


  最常见的视觉传感器是摄像头。摄像头很好理解，因为它们长期以来一直用于摄影目的。在本书中，我们重点关注其作为视觉传感器的作用，用于识别设备可以自动看到、理解并据此采取行动的内容。


  与惯性和音频数据不同，视觉数据为数据引入了空间维度，因为它本质上可以是 2D 或 3D 的。摄像头可用于即时 2D 捕获（静止图像），不包含任何时间信息；或者作为视频捕获的一部分，包含随时间捕获多个帧的丰富时间数据。通常，数据可以从极低保真度（例如，QVGA，即
  `320x240` 的静止图像或每秒几帧）捕获到高保真度（例如，每秒 30 帧或更高的高清和 4K 分辨率）。捕获速率取决于使用模式，需要考虑人类消费（例如回放）是否是关键要求，或者是否仅需机器识别某些视觉方面即可。


  视觉识别可用于许多不同的目的，范围从物体识别、人脸识别和场景识别，到相似性/异常检测、理解运动或尺度，以及视频摘要。图 2-6 提供了其中一些示例，并列举如下以供说明：




  '
- '# 视觉识别技术


  ## 物体识别

  物体识别指的是识别图像中物体的基本概念，并可能将其与先前捕获的预存物体数据库进行匹配。例如，增强现实应用可以识别图像中的纪念碑或旅游景点，并向观看者提供关于该物体的附加信息。同样地，零售商店中的物体可以被识别，并向用户提供关于健康、价格和成分的附加信息。


  ## 人脸识别

  人脸识别包括检测图像中的人脸，以及将该人脸与数据库进行匹配以相应地标记人脸。人脸检测本身对数码摄影很有用，可以帮助用户拍出更好的照片。人脸识别具有诸多用途，从身份验证（登录平台）到社交网络应用（如
  Facebook）等。


  ## 手势识别

  手势识别指的是识别特定的静态姿势或动态手势，这些姿势或手势可以是手部/手臂的，也可以是整个人体的。现代游戏主机通常使用此类示例，玩家用其双手和整个身体与游戏互动。静态姿势比动态手势更容易识别，因为它通常涉及处理静态图像并将其与预先捕获的静态手势集进行匹配。手势识别也可以是用户相关的或用户无关的，前者需要系统针对特定用户进行训练，而后者则构建了足够的模型以适应任意用户。


  ## 场景识别

  场景识别是一个极其复杂的、持续研究中的问题。最简单的场景识别形式是获取整个场景并将其与已知场景进行匹配。中等形式的场景识别涉及识别图像中的多个物体、人脸和人物，并利用这些信息来确定可能的活动或上下文。更复杂的场景识别形式要求系统尽管在两个场景中存在相似的物体，也能准确地区分它们。


  ## 相似性/异常检测

  异常检测是视觉识别中的一个常见挑战，尤其是在使用摄像头进行监控的场景中，包括家庭监控和交通监控。在此，关键是识别是否发生了任何应触发进一步分析的异常。此类解决方案侧重于静态或动态地识别一组已知的特征（签名），从而确定画面中是否发生了任何显著变化。


  ## 视频摘要

  视频摘要是一种元应用，它可以使用上述多种技术来总结长视频流中的显著方面。这包括场景变化、关键场景以及作为视频焦点的物体/角色。视频摘要使用户能够跳转到视频的特定部分，或快速识别在一组现有视频中正在寻找哪个视频。


  ![A978-1-4302-6593-1_2_Fig6_HTML.gif](img/A978-1-4302-6593-1_2_Fig6_HTML.gif)


  **图 2-6.** 视觉传感器及其用途


