  ## 7.4 端到端分区的可编程性考量


  在实现从感知到知识管理的能力时，考虑解决方案各组件的可编程性也至关重要。由于语音和视觉算法不断演进，且机器学习算法或神经网络的变体每隔几个月就会出现，因此当前实现能够轻松修改变得至关重要。此外，本章前几节介绍了多种分区可能性，这使得在硬件或算法改进成为可能时，能够动态更改这些分区也至关重要。


  一种方法是开发应用程序编程接口，允许软件开发者一致地使用通用接口，同时为修改底层实现提供灵活性。例如，如果某个语音处理流水线在其语言模型实现中使用了 HMM，而未来希望改为
  WFST，那么只要 API 定义良好且实现因此具备灵活性，这种改变就是可行的。


  此外，由于一个组件的处理可以映射到多种不同的平台（本地设备、网关或云平台），并且在每个平台内部，处理引擎可以是核心、GPU、FPGA 或加速器（或专用引擎），因此实现必须对这些细节进行抽象，以提供更改映射和底层组件的灵活性。此类灵活方法的一个例子是远程卸载，作者提出了一种基于
  OpenCL 的解决方案，用于抽象需要执行的函数，使其可以在本地设备或远程平台上运行，并且还可以在这些平台上的任何处理引擎（核心或加速器）上运行。由于异构架构因其功耗/性能优势而变得越来越普遍，此类解决方案正越来越受欢迎。图
  7-11 展示了一个工作负载被分解为功能组件，并说明了使用存根将函数执行重定向到任何平台及平台内任何处理引擎的方法。用于确定在何处运行函数的策略，可基于数据传输的可用带宽、功耗/性能（影响设备电池续航），以及平台和引擎的可用性（如果多个工作负载同时运行，或者平台并非始终在网络中可用）。


