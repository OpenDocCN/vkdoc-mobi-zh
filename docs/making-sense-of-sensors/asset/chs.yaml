- '# 陀螺仪


  加速度计测量平移加速度（上下、左右、前后）。设备在运动中还有另外 3 个自由度。这些与角运动相关。具体来说，它们被称为*俯仰*、*偏航*和*横滚*。这些如图 2-4
  所示。陀螺仪以度/秒为单位测量绕 x、y 和 z 轴的角运动。用陀螺仪的语言来说，我们将每个自由度的测量称为一个*通道*。因此，一个三通道陀螺仪可以测量角运动的所有
  3 个分量（*俯仰*、*横滚*和*偏航*）。


  与上述加速度计的讨论类似，陀螺仪输出是经过 ADC 转换的模拟电压数字输出。电压变化与围绕给定轴的角度变化率呈线性关系。处理 ADC 输出后，陀螺仪读数通常以围绕特定轴的度/秒报告。与加速度计的讨论相似，我们定义以下内容：


  -   **参考电压**：陀螺仪的参考电压指的是 ADC 的“步长”。简单来说，它定义了使 ADC 输出增加一个单位所需的电压量。

  -   **零速率电压**：对于陀螺仪，这个电压是测量设备固有偏移的指标。理想情况下，静止状态的设备应在所有陀螺仪通道上报告为零读数。然而，材料和设计缺陷导致几乎所有这些设备都存在非零的静止读数。应从测量值中减去该读数，以获得正确的角运动测量值。

  -   **灵敏度**：陀螺仪的灵敏度指的是每测量单位角速度变化对应的电压（或 ADC 输出）变化。陀螺仪灵敏度可以用毫伏/度/秒来衡量。


  与加速度计的处理一致，陀螺仪传感器处理流程如图 2-11 所示。


  ![A978-1-4302-6593-1_2_Fig11_HTML.jpg](img/A978-1-4302-6593-1_2_Fig11_HTML.jpg)


  图 2-11. 陀螺仪处理


  '
- '# 结合加速度计和陀螺仪读数


  为了在所有 6 个自由度上准确测量设备的倾斜角度和运动，我们结合了加速度计和陀螺仪的读数。从各种 ADC 读数中获取运动和倾斜估计的主要复杂之处在于确认 IMU
  轴的朝向。通常，制造商会在 IMU 数据手册中提供此信息。然而，IMU 在不同设备中的放置位置可能不同，用户在理解加速度计和陀螺仪的 ADC 测量值之前需要校准设备。通常，校准步骤包括将设备移动到各种朝向（垂直、水平），并使用产生的读数在线性投影方程中求解轴的朝向。


  '
- '# 使用 IMU 进行手势识别


  来自设备的加速度计和陀螺仪组合读数可用于识别特定的设备手势。例如，配备 IMU 的手机可以通过 IMU 识别圆形手势。然后，此手势可以链接到不同的操作，比如发出特定声音、打开相机等。许多现代智能手机利用
  IMU 允许用户将手机面朝下翻转以拒接电话或停止音乐播放。现代玩具制造商正在制造使用惯性传感器规划运动，并结合摄像头等其他传感器对人与之交互做出反应的机器人玩具。下一章将详细介绍多传感器集成。




  '
- '# 2.3 音频处理与识别——从声音到语音


  正如前一节所述，随着越来越多的手机/可穿戴设备/物联网设备开始利用音频传感器（即麦克风）来捕获高质量的音频数据，基于音频传感器的识别技术正变得越来越普及。在本节中，我们将深入探讨音频识别的实现方式，涵盖从音频分类到大词汇量语音识别的各个方面。首先，图
  2-12 展示了一个简单的音频与语音处理流程。


  ![A978-1-4302-6593-1_2_Fig12_HTML.gif](img/A978-1-4302-6593-1_2_Fig12_HTML.gif)


  图 2-12. 音频/语音识别各阶段


  让我们逐一梳理这些阶段，并研究其中使用的音频识别技术。在此之前，需要指出的是，处理音频进行识别的第一步是处理音频信号并提取关键特征。从音频中提取的最常见特征被称为`MFCCs`（梅尔频率倒谱系数）。计算`MFCCs`或其变体的方法有很多种。梅尔频率倒谱（`MFC`）代表了声音的功率谱，而系数（`MFCCs`）的计算过程是：首先对音频样本进行加窗处理，然后进行傅里叶变换，计算功率谱，映射到梅尔滤波器组，计算能量的对数，最后执行离散余弦变换以确定振幅。关于`MFCCs`的更多细节可在相关文献中找到（例如参考文献中由
  K. Prahlad 等人撰写的文章）。


  ## 2.3.1 音频分类


  我们首先介绍音频分类（见图 2-13），它主要关注非人类声音，试图理解并标记捕获到的声音。传统的音频分类方法是识别诸如`MFCCs`之类的关键特征，这些特征有助于将声音划分为不同类别，然后使用机器学习技术进行训练/分类。较新的技术尝试添加针对音频分类的额外特征，以提高准确性。其中一些技术可能特定于具体内容，但也有更通用的方法，例如参考文献中
  Breebart 等人在《音频分类特征》一文中描述的，增加时间波动以及粗糙度/响度/尖锐度等特征。一旦确定了特征集，就可以使用标准的机器学习分类技术。标准分类技术包括最近邻算法、贝叶斯算法、高斯混合模型（`GMM`）等。近年来，神经网络被用于实现音频分类的有监督和无监督方法。


  ![A978-1-4302-6593-1_2_Fig13_HTML.gif](img/A978-1-4302-6593-1_2_Fig13_HTML.gif)


  图 2-13. 音频分类示例


  ## 2.3.2 语音活动检测


  语音活动检测（`VAD`）指的是在音频捕获中检测人类声音。图 2-14 展示了通用的`VAD`处理流程。`VAD`通常用作触发信号，以进入语音识别的下一阶段，例如关键词识别或命令/控制。文献和商业解决方案中存在多种不同类型的`VAD`实现。例如，使用简单滤波器（如基音识别）的方法，以及使用`GMM`（高斯混合模型）、统计模型和基于能量的`VAD`等更复杂的方法。`VAD`面临的主要挑战之一是音频捕获中的噪声水平。因此，降噪和噪声消除技术通常与`VAD`解决方案紧密结合。在参考文献中，Man-Wai
  Mak 等人指出，降噪和消除背景信号是提高`VAD`解决方案准确性的关键。最终，语音活动检测器可以用来减少语音识别所需的处理量，因为它起到过滤器的作用。因此，优化解决方案以减少假阴性（即存在人声时却指示无人声）至关重要，而不是减少假阳性（即无人声时却指示有人声）。


  ![A978-1-4302-6593-1_2_Fig14_HTML.gif](img/A978-1-4302-6593-1_2_Fig14_HTML.gif)


  图 2-14. 语音活动检测示例




  ### 2.3.3 自动语音识别（ASR）


  自动语音识别（Automatic Speech Recognition）或 `ASR` 是指计算机系统识别人类语音并将其转换为文本的能力。`ASR` 包含的能力范围从关键词识别（`KR`）、命令与控制（`CC`），到大词汇量连续语音识别（`LVCSR`）。`KR`
  通常用作唤醒系统的触发词，而 `CC` 和 `LVCSR` 则作为会话的一部分，用于控制活动或听写用于邮件或其他目的的文本段落。虽然关键词识别可以以更定制化的方式实现，但
  `KR`、`CC` 和 `LVCSR` 的通用技术可能相似，主要区别在于词汇量和语法理解的大小。图 2-15 展示了通用的语音识别处理流程。语音识别可以独立于说话者实现，即任何说话者都能与系统交互；也可以依赖于特定说话者，即系统根据特定用户或用户群进行训练。用于学习和探索的常见语音识别器或工具包包括
  CMU Sphinx（ [`http://cmusphinx.sourceforge.net/`](http://cmusphinx.sourceforge.net/)
  ）和 Kaldi（ [`http://kaldi-asr.org/`](http://kaldi-asr.org/) ）。针对特定目标（如移动设备）的定制版本包括
  PocketSphinx（ [`http://www.speech.cs.cmu.edu/pocketsphinx/`](http://www.speech.cs.cmu.edu/pocketsphinx/)
  ）。


  ![A978-1-4302-6593-1_2_Fig15_HTML.gif](img/A978-1-4302-6593-1_2_Fig15_HTML.gif)


  图 2-15. 自动语音识别


  传统的语音识别方法基于使用 `GMM`（高斯混合模型）和 `HMM`（隐马尔可夫模型）。要解决的核心问题是，根据输入的声学观测序列找出最可能的词序列。例如，语音识别的早期实现采用了以下关键处理阶段：


  *   **特征提取**：输入的语音信号被分割成每段 10 毫秒的帧。每个 10 毫秒样本由一个包含 39 个分量的特征向量表示。

  *   **GMM 评分**：为了确定语音中的 senones 并找到最佳匹配，对提供的特征向量执行 `GMM` 评分。

  *   **HMM 处理**：语音模型需要 `HMM` 处理，以根据提供的词汇（词汇模型和语言模型）确定最可能的音素和词序列。


  直到最近，大多数（`LVCSR`）语音识别器都基于 `GMM` + `HMM` 方法。然而，语音识别器的性能不足以实现高质量的大规模采用。语音识别器的性能指标包括词错误率、速度和整体准确率。为了解决这些问题，最近的语音识别器开始探索使用加权有限状态转换器（`WFST`）和深度学习（神经网络）进行语音识别。


  神经网络在语音和视觉处理中的重要性日益增长。深度神经网络本质上是输入层和输出层之间有许多隐藏层的人工神经网络。`DNN` 取代了语音识别流程中 `GMM` 的使用（见图
  2-16），将其从 `GMM` + `HMM` 解决方案转变为 `DNN` + `HMM` 解决方案。如今，大多数商用语音识别产品都基于深度神经网络，因为它提高了系统的词错误率和整体准确率。


  ![A978-1-4302-6593-1_2_Fig16_HTML.gif](img/A978-1-4302-6593-1_2_Fig16_HTML.gif)


  图 2-16. 在 ASR 中使用深度神经网络


  加权有限状态转换器用于表示 `HMM`，同时提供可以加速处理过程的附加信息，因为有向图中的每条边都标有输入、输出和权重。因此，`WFST` 是一个丰富的数学框架，在自然语言处理中的应用也超出了
  `HMM` 的范畴。


  ### 2.3.4 自然语言处理（NLP）


  `NLP` 涉及获取来自语音转文本解决方案或书面文本，并尝试以自动化方式提取信息或更深入地理解文本。`NLP` 的第一步是通过理解句子结构和识别词边界来对文本进行分词。另一个重要步骤是使用命名实体识别（`NER`），在适当的情况下将特定词语归类到更通用的类别中。图
  2-17 展示了一个 `NLP` 基本流程的示例。在此过程中，单个词语也可以根据所完成的 `NLP` 分析类型被赋予相应的权重。


  ![A978-1-4302-6593-1_2_Fig17_HTML.gif](img/A978-1-4302-6593-1_2_Fig17_HTML.gif)


  图 2-17. 自然语言处理示例


  一旦这些初始处理阶段完成，就会应用机器学习技术来分析文本的关键方面。例如，可以通过分析文本中的词语来确定文本的情感（正面、负面等）。可以通过将文本中的词语与最可能的主题关联起来进行分类，从而识别文本的主题。还可以确定文本中提出问题的性质，用于诸如
  `Siri` 和 `Cortana` 所针对的使用模式。


  在上述章节中，我们介绍了音频/语音识别的关键方面，范围从音频分类、语音活动检测，到自动语音识别，再到自然语言处理。我们希望每个领域的概述能让您理解主要用途、使用的关键组件或算法，以及在开发此类技术时的注意事项。虽然我们没有深入探讨算法本身，但读者应该能够根据感兴趣的使用模式和练习的重点来确定哪些算法需要进一步研究。


  '
- '# 2.4 视觉处理与识别


  视觉识别始于能够捕捉静态图像和视频的基本摄像头传感器。如前所述，视觉识别可以包括物体识别、手势识别、人脸识别、场景识别、异常检测和视频摘要。通常，视觉识别遵循以下基本过程：特征提取、描述符生成和匹配。从图像中提取特征，然后将其总结为一个描述符向量，接着与预先存在的向量数据库进行比较，以进行相关的识别。我们将针对上述每种识别类别，通过一些示例来描述此过程。




  ## 物体识别


  物体识别指的是在图像或视频中检测并识别物体的能力。物体识别的实例范围广泛，从识别图像中的一盒麦片或一瓶葡萄酒，到在旅游景点识别一座历史古迹。其整体用途可以是统计零售货架上物品的数量（麦片盒或葡萄酒瓶），或是为正在用手机摄像头指向古迹的游客提供更多信息（增强现实）。虽然下文将从一个物体的角度描述典型的物体识别流程，但请注意，同样的原理也适用于识别多个物体，为此会包含聚类和边界框技术。


  图 2-18（参考 S. Lee 等人的著作）展示了一个典型的物体识别流程，用于在查询图像中识别物体，并通过与数据库图像匹配进行识别。基本流程包括：(a) 特征检测（也称为兴趣点检测），(b)
  描述符生成，以及 (c) 匹配。


  ![A978-1-4302-6593-1_2_Fig18_HTML.jpg](img/A978-1-4302-6593-1_2_Fig18_HTML.jpg)


  图 2-18. 物体识别流程示例（S. Lee 等人）


  多年来，针对物体识别已经开发并优化了许多算法。这些算法包括 `SURF`（加速鲁棒特征，参考 H. Bay 等人）、`SIFT`（尺度不变特征变换，参考 D.
  G. Lowe 等人）、`ORB`（参考 E. Rublee 等人）、`FAST`（参考 E. Rosten 等人）、`BRIEF`（参考 M. Calonder
  等人）以及 `BRISK`（参考 S. Leutenegger 等人），仅举几例。这些算法提供了在图像中识别出能唯一描述物体的特征点的能力，以及生成描述符的方法，用于描述特征点周围的区域作为描述符向量的一部分。最初，算法是为了基本功能和准确性而设计的。然而，随着集成摄像头的移动设备普及，这些算法针对降低计算复杂度、提高速度、尺度不变性、旋转不变性和抗噪性进行了优化。建议读者参阅描述每种算法的论文以更深入地理解其细节。为了便于说明，图
  2-19 展示了一个示例流程。


  ![A978-1-4302-6593-1_2_Fig19_HTML.gif](img/A978-1-4302-6593-1_2_Fig19_HTML.gif)


  图 2-19. 物体识别流程（例如，SURF 组件 [参考 S. Lee 等人、H. Bay 等人的著作]）


  一旦确定了特征/描述符，下一步就是通过匹配来识别物体。一个匹配数据库存储着先前捕获的描述符向量，将查询描述符向量与数据库进行匹配，即可获得最近似的匹配结果或一系列匹配结果作为输出。通常，这种匹配通过暴力匹配（计算
  `L1`、`L2` 距离）来完成，如图 2-20 所示。除了暴力匹配，`ANN`（近似最近邻）方法也极为常见，尤其是在数据库规模显著增大时。有一些用于 `ANN`
  计算的快速库，例如 `FLANN`（ [`http://www.cs.ubc.ca/research/flann/`](http://www.cs.ubc.ca/research/flann/)
  ），它们通常用于以最高速度和效率执行这些计算。


  ![A978-1-4302-6593-1_2_Fig20_HTML.jpg](img/A978-1-4302-6593-1_2_Fig20_HTML.jpg)


  图 2-20. 使用 `L1`/`L2` 距离计算的暴力匹配（S. Lee 等人）


  ## 手势识别


  手势识别指的是识别手部姿态、动态手势或类似的躯体姿态及动态身体动作的能力。最近，由于 Kinect（ [`http://www.xbox.com/en-US/xbox-one/accessories/kinect`](http://www.xbox.com/en-US/xbox-one/accessories/kinect)
  ）在诸如微软® Xbox（ [`http://www.xbox.com/en-US/`](http://www.xbox.com/en-US/) ）等游戏机中的广泛应用，手势变得更为普及。图
  2-21 展示了使用基于肤色的分割方法识别手部姿态和面部特征的步骤。在本节中，我们将从描述基本的手部姿态识别过程开始。手部姿态识别最简单的形式是识别图像中是否存在手（检测），然后识别具体的手部姿态（识别）。


  ![A978-1-4302-6593-1_2_Fig21_HTML.jpg](img/A978-1-4302-6593-1_2_Fig21_HTML.jpg)


  图 2-21. 手势识别示例


  手部检测通常通过两种不同的机制完成：(a) 手部肤色，以及 (b) 描述典型手部形状的模型。有许多算法会分析图像中的不同颜色，试图判断图像中是否有手，从而分割图像的那一部分以进行进一步的识别处理。进行肤色分析时常用的色彩空间包括
  `RGB`、`HSV`、`YUV` 和 `YCrCv`。有时也会采用考虑多种色彩空间的混合方法。基于颜色进行手部识别的关键挑战在于图像背景的性质。有时背景颜色可能与肤色相似。使用肤色的另一个关键挑战是，人类的肤色因人而异。因此，使该方法对用户无关也颇具挑战性。解决此问题的一个可能方案是让解决方案依赖特定用户，但这会带来一个要求，即用户需要通过注册过程来训练系统。大多数解决方案倾向于尽可能减少注册/用户训练的需求。


  图 2-22 显示了一个使用肤色分析进行手部分割的示例。如图所示，最终结果基于两个步骤：肤色分割，以及与已知的手势模型（也称为手势词汇表）进行比较。在这种情况下，手势词汇表相对容易创建，因为它只涉及二维静态手势。随着动态手势的引入，以及需要追踪运动方向和深度信息，解决方案的复杂性也会增加。例如，Kinect
  在其实现中使用了两个摄像头和一个红外传感器，用于在三维环境中识别手部和身体姿态。


  ![A978-1-4302-6593-1_2_Fig22a_HTML.jpg](img/A978-1-4302-6593-1_2_Fig22a_HTML.jpg)![A978-1-4302-6593-1_2_Fig22b_HTML.jpg](img/A978-1-4302-6593-1_2_Fig22b_HTML.jpg)


  图 2-22. 手部姿态检测与识别流程




  ### 2.4.3 视频摘要


  视频摘要指的是分析完整视频并对其进行总结的能力，其方式可以是 (a) 用少量帧或视频片段提取视频的关键片段，或 (b) 通过识别视频中的一系列活动来创建简短的视频文字记录。其应用范围可以涵盖视频监控，其中异常情况是视频中的关键场景，或者事件摘要，例如识别足球比赛中的关键部分（如进球或主要进攻尝试）。在本节中，我们将重点关注前者，并描述用于识别视频关键部分以及对活动进行潜在分类的方法。


  关于如何识别关键帧，文献中有多种方法。一个简单的思路是找出视频中哪些帧最能代表视频中的场景，同时识别出足够数量且彼此独特的帧。许多方法依赖于颜色、运动或其他低级特征检测器。还有一些方法侧重于边界检测，即帧之间的显著变化表明可能的关键事件。利用这些技术，可以识别视频中的关键帧，但根据帧之间的差异或相似程度，这些帧可能太多或太少。


  最近的研究工作集中在结合使用多样性和覆盖度指标，来决定如何在视频中以有限数量的帧结束，这些帧既能保证充分的覆盖度，又能保证彼此间充分的多样性。S. Chakraborty
  等人提出的一种方法，通过自适应地确定摘要长度以及在该摘要中选择哪些帧，试图做得更好。在这篇论文中，作者提出了一种自适应摘要技术，将该问题表述为一个优化问题，即选择一组能代表视频的充分独特的帧。该优化问题将代表性和独特性作为两个关键指标，并试图最大化这两个指标，以自适应方式识别关键帧。图
  2-23 说明了基本思想。他们将其与传统机制（如随机抽样、聚类和曲率点使用）进行了比较，并表明其更有效。


  ![A978-1-4302-6593-1_2_Fig23_HTML.jpg](img/A978-1-4302-6593-1_2_Fig23_HTML.jpg)


  *图 2-23. 视频摘要示例（来自 S. Chakraborty 等人）*


  最近的研究尝试通过采用卷积神经网络（CNN）来识别实体（多个物体、位置、人物和活动），并根据这些实体的共现情况以及与重要性分类场景类型的关系对其进行评分，从而考虑视频的语义上下文。研究表明，这种方法具有巨大潜力，因为它在语义上更有意义且更有效。这种视频摘要技术的一个示例流程如图
  2-24 所示。


  ![A978-1-4302-6593-1_2_Fig24_HTML.jpg](img/A978-1-4302-6593-1_2_Fig24_HTML.jpg)


  *图 2-24. 使用深度网络的视频摘要示例*


  总的来说，基于视觉信息的视频摘要是一个相当具有挑战性的重要问题，而现有文献在提供一套合适的摘要方案方面才刚刚起步。我们建议读者参考本章参考文献部分中的论文，以便更好地理解该领域的技术及其应用场景。


  ## 2.5 其他传感器


  还有大量传感器超出了上述更详细讨论的范畴。以下是这些传感器及其潜在用途的总结。


  ### 2.5.1 接近传感器


  接近传感器无需接触物体即可检测附近物体的存在。通常，接近传感器是基于红外（IR）的，通过感知红外场的变化来工作。接近传感器的一个使用示例是在手机中，用于确定手机在通话时是否贴近耳朵，以避免在此期间的意外触摸。另一个例子是在机器人中使用接近传感器来确定它是否靠近障碍物，因此需要绕过它或调头。除了红外接近传感器，无线解决方案如
  `BLE` 和 Wi-Fi 设备也可用于确定设备是否在信标或接入点的接近范围内。由于这也与位置相关，将在下一节中更详细地讨论。


  ### 2.5.2 位置传感器


  位置传感器有助于确定设备的地理位置。最常见的位置传感器是 GPS（全球定位系统）传感器，它在汽车和手机内的导航系统中非常频繁地使用。`GPS` 系统与绕地球运行的卫星通信，并使用三边测量法来确定包含
  GPS 接收器的设备的位置。这对于室外定位非常有用，但不适用于室内定位。对于室内定位，可以使用类似的基于无线电的方法，但使用 Wi-Fi 接入点作为三角测量点，或者使用越来越流行的
  `BLE` 信标。


  ### 2.5.3 触摸传感器


  如今，触摸传感器在所有可穿戴手表、手机和平板电脑中都很常见，甚至现在也出现在笔记本电脑屏幕上。触摸屏的用途是允许用户用手指而不是鼠标与屏幕进行交互。使用手指使体验更加容易和直观。触摸屏可以是电阻式或电容式的——前者（电阻式）利用多层之间的电阻和手指作为识别触摸的方式，而后者（电容式）利用手指和屏幕之间的电流流动作为确定触摸的方式。最近的研究通过将按压力度（手指按压的力度）作为另一个关键输入融入到体验中，进一步提高了触摸屏的分辨率。


  ### 2.5.4 磁性传感器


  磁场传感器或磁力计根据所使用的传感器类型，以不同的灵敏度水平检测和测量磁场。一种常见的磁力计是霍尔效应传感器，它根据磁场强度改变其输出电压。霍尔传感器可用于工业应用中，以感知磁性物体的存在以及测量它们到达/离开的时间。


  ### 2.5.5 化学和生物传感器


  传感领域一个不断增长的方向是使用化学和生物传感器。化学传感器用于感知气体或液体的成分。这些传感器对于分析工业环境中的空气质量和气体存在非常有用。生物传感针对细胞、蛋白质、核酸等的存在。例如，这可用于分析皮肤状况。化学和生物传感的使用在环境、工业、健康和保健应用方面正变得极具吸引力。


  ## 2.6 总结


  在本章中，我们回顾了三种类型的传感器（`IMU`、音频和视觉），并逐步介绍了处理原始传感器数据并将其转换为可识别信息的处理阶段。在此过程中，我们讨论了处理中涉及的关键组件以及用于权衡精度和计算复杂性的许多算法。例如，我们展示了视觉处理和识别范围从简单
  2D 图像中的物体识别到跨多个帧的视频摘要。在下一章中，我们将讨论如何将这些传感器一起用于多模态处理，以及如何将识别出的信息转化为可操作的知识。




  '
- '# 3. 多模态识别


  在上一章中，我们介绍了独立处理每种原始传感器数据以实现不同级别识别能力的方法。我们发现惯性传感器能提供关于不同轴向运动的信息。音频流不仅可以处理声音类型，还能处理词语和自然语言。我们还展示了如何识别不同的物体、人脸、活动等。现在，我们设想一下，如果能够同时关联多种传感器类型的理解结果，将会实现哪些可能性。这被称为“多模态识别”，本章将探讨实现多模态识别的不同方法。


  ## 3.1 为何采用多模态


  图 3-1 以相同的三种传感器类型（惯性、音频和视觉）为例，介绍了多模态识别的好处。


  ![A978-1-4302-6593-1_3_Fig1_HTML.jpg](img/A978-1-4302-6593-1_3_Fig1_HTML.jpg)


  图 3-1. 多模态识别简介


  多模态识别的好处首先体现在能够通过利用其他模态（如视觉）来辅助提升某一种模态（如声音）的识别能力。当识别能力受损、需要澄清或需要提升效率时，这种方法尤为有效。例如，当你听到“把它关掉”时，要理解“它”指代什么，就必须利用视觉识别来确定用户正在指向什么。在这种情况下，视觉识别提供了澄清，将模糊的指代“它”精确到风扇或灯等具体物品。除此之外，还可以利用一种模态来提高另一种模态的处理效率。我们来看一个零售场景的例子：用户需要某种特定产品的帮助。如果他或她已经站在货架前，只需要查询某个商品的价格，那么通过将查询词汇表缩减至仅包含与该场景相关的指令，就能轻松降低语音处理的复杂度。这是通过利用视觉线索判断用户所在位置，并确定他或她正在注视的产品类型来实现的。本章后面将使用这类例子来理解实现这一功能所需的多模态识别类型。


  多模态识别的另一个好处是能够根据哪种模态更有效，动态地使用多种模态。例如，在处理（足球比赛）视频以生成摘要时，有些部分在视觉上很吸引人（某位球星的大力射门），有些部分则声音丰富（如评论员宣布进球及观众掌声）。两种模态都可以用来更好地理解每个感兴趣的视频片段。通过先独立处理音频和视频识别模态，再关联感兴趣的事件，就可以轻松实现这一点。或者，如果愿意关联球员（通过视觉识别）与其姓名（基于评论员音频的语音识别），则可以实现更细粒度的识别。


  需要注意的是，作为人类，我们能够非常自然地处理这些模态，并在它们之间进行交叉关联以确定上下文。根据使用场景和上下文的不同，我们往往能在不同粒度级别上实现这一点。例如，我们可以在公园里骑自行车时处理声音、运动和视觉输入。挑战在于让计算设备也能达到同样的识别水平和效率，即根据需要在不同识别粒度以及不同模态之间的不同耦合级别之间动态切换。这是一个难题，但如下文所述，如果我们能单独分类每种多模态识别类型，并理解其优势和使用场景，就可以解决这个问题。


  ## 3.2 多模态的类型


  在本节中，我们将介绍用于设计传感器融合解决方案的不同方法和框架。我们主要涵盖以下三种广泛使用的方法：基于耦合的分类、达萨拉蒂模型和传感器配置模型。




  ### 3.2.1 基于耦合程度的分类


  来自多个传感器源的信息可以在识别链的不同阶段进行组合。为简单起见，我们考虑两个传感器处理管道，如图 3-2 所示。在图 3-2 中，两条处理管道相互独立运行。传感器融合可能发生在每条管道上的具体位置取决于多种因素，包括实现复杂度和识别任务所需的精度。我们定义了传感器数据融合的三个主要层次。


  - **非耦合传感器数据融合 / 语义融合**：该定义指数据融合发生在各自管道中尽可能晚的阶段。这通常意味着在识别完成之后进行集成，如图 3-3 所示。这种方法的优点是传感器融合简单，并且可以使用现有的识别技术管道来完成。领域专家喜欢这种方法，因为跨领域技术知识的需求极低。通常很难找到能掌握多个传感器领域的技术专家。对于语义融合方法，领域专家可以独立工作，应用开发者可以在更高层次上集成各种模态。


  ![A978-1-4302-6593-1_3_Fig3_HTML.jpg](img/A978-1-4302-6593-1_3_Fig3_HTML.jpg)


  图 3-3. 非耦合融合


  - **松耦合传感器数据融合 / 受限识别**：为了获得优于非耦合传感器融合的性能，专家采用一种模式，根据一个模态的结果来限制另一个模态的识别搜索空间。在这种方法中，一个识别管道帮助为另一个管道设定上下文。一旦完成，第二个识别管道只需在已建立的上下文边界内进行识别，从而可能节省计算资源并提高性能。图
  3-4 说明了这一点。与语义传感器融合的情况类似，跨领域专业知识的需求极低，但开发者确实需要理解模态之间在识别上的语义依赖关系。


  ![A978-1-4302-6593-1_3_Fig4_HTML.jpg](img/A978-1-4302-6593-1_3_Fig4_HTML.jpg)


  图 3-4. 松耦合融合


  - **紧耦合传感器数据融合 / 数据-特征级融合**：这种对性能最友好的传感器融合模型允许多个传感器进行虚拟组合，使得对于大部分应用堆栈而言，组合后的传感器看起来就像一个单一的复杂传感器。如图
  3-5 所示，传感器集成的方法包括组合来自传感器的原始数据并使用单一数据流进行处理。更实用的方法则是组合来自传感器的特征，以产生用于识别和过滤的单一特征集。虽然紧集成能为传感器融合应用带来最大的性能提升，但由于需要多领域专家共同处理数据集成，这种方法并不十分流行。在堆栈较低层级的数据表示非常依赖于特定传感器，因此需要专家做出明智的决策来合并来自多个数据源的数据。每个传感器模型在最低层都有不同的数据表示格式，这使得很难提出一种既能保留信息内容又能保持同质化的表示方式。


  ![A978-1-4302-6593-1_3_Fig5_HTML.jpg](img/A978-1-4302-6593-1_3_Fig5_HTML.jpg)


  图 3-5. 紧耦合融合


  ![A978-1-4302-6593-1_3_Fig2_HTML.jpg](img/A978-1-4302-6593-1_3_Fig2_HTML.jpg)


  图 3-2. 两条传感器处理管道


  ### 3.2.2 Dasarathy 模型


  Dasarathy 提出了一种优雅的模型来表示不同层次的数据融合（原论文信息请参见本章末尾的参考文献）。该模型将不同的数据融合方法表示为输入和输出数据类型的函数，从而产生了以下不同类型的融合。


  - **数据输入-数据输出 (DAI-DAO)**：`DAI-DAO` 模型代表低级融合，即将来自多个传感器的传感器数据融合在一起，为后续的识别管道生成一个融合后的数据表示。生成的数据格式可以与输入相同（在融合相似传感器的情况下），也可以是全新的格式（异质传感器融合）。


  - **数据输入-特征输出 (DAI-FEO)**：在此模型中，融合引擎将来自待融合数据源的数据作为输入，并将代表传感器组合信息的特征集作为输出。这种混合方法介于低级和中级融合方法之间。


  - **特征输入-特征输出 (FEI-FEO)**：在 `FEI-FEO` 模型中，融合引擎组合来自不同传感器的预提取特征。其输出是组合了多个特征输入的特征集。该方法代表中级传感器融合。


  - **特征输入-决策输出 (FEI-DEO)**：在此上下文中，“决策”指的是对传感器数据的识别。这种方法是中级和高级数据融合技术的混合体。此情形下的融合引擎将来自不同传感器管道的特征作为输入，并将这些特征组合起来以提供识别（决策）输出。


  - **决策输入-决策输出 (DEI-DEO)**：此模型是高级传感器融合模型，即我们在上述讨论中提到的语义融合。通常，这种传感器融合是最简单的类型，因为我们实际上并没有“融合”任何东西。在大多数情况下，融合引擎会“组合”来自各管道的已识别信息，以得出识别决策。


  ### 3.2.3 传感器配置模型


  基于传感器配置模型，多模态传感器融合可以通过以下模式之一提高识别的功能准确性。图 3-6 展示了这些模式下不同传感器管道之间的交互。


  ![A978-1-4302-6593-1_3_Fig6_HTML.jpg](img/A978-1-4302-6593-1_3_Fig6_HTML.jpg)


  图 3-6. 基于传感器协作模型的融合


  - **互补融合**：在互补传感器融合中，使用两个或更多传感器来识别无法从单个传感器中提取的信息。在这种情况下，传感器融合具有叠加效应。


  - **冗余融合**：在此模式下，传感器融合使用两个或更多传感器提供关于同一底层过程的信息，以在识别中引入冗余。


  - **协同融合**：在协同传感器融合中，使用不同传感器收集关于同一底层过程的不同信息，然后组合起来以更好地识别该底层过程，这与基于单个传感器的解决方案形成对比。


  ## 3.3 示例实现


  在本节中，我们将提供前述章节中描述的不同类型多模态传感器集成的示例。我们将以音频和视觉传感器为例，但这些方法也可扩展到其他类型的异质传感器。




  ### 3.3.1 语义融合


  设想一个涉及人机交互的场景：用户试图通过手势和语音与计算机或机器人进行交互。例如，用户可能指向摄像头视野中的一个物体，并语音询问该物体的属性。


  这一场景需要融合视觉和音频流的识别结果来实现。图 3-7 展示了其数据流程。


  ![A978-1-4302-6593-1_3_Fig7_HTML.jpg](img/A978-1-4302-6593-1_3_Fig7_HTML.jpg)


  图 3-7. 基于手势的语音命令的语义融合


  如图 3-7 所示，两条识别管道是独立且完备的，正如第 2 章中分别描述的那样。融合发生在语义层面，即在基本识别完成之后的阶段，此时我们处理的是数据的语义/含义。


  ### 3.3.2 受限识别


  受限识别通过“限制”某一种识别模式的搜索范围，来提升多模态的识别性能。假设一个音视频联动查询系统，能够实时提供用户摄像头所指物体的详细信息。该场景涉及用智能相机对准一个未知物体，并对其提出语音查询。系统可以支持诸如“那是什么物体？”、“那本书的最低价是多少？”、“这本书的评论如何？”等查询。当系统通过语音识别技术“理解”了查询内容，并确定了查询的目标物体后，会进行在线搜索来获取答案。可能还需要一步来格式化结果，并以预定义的方式呈现给用户。


  此类场景可以通过受限识别来提升性能和响应时间。其高层概念如图 3-8 所示。基本思路是：利用一个模态的上下文信息，可以显著提升另一个模态的性能。例如，如果语音识别引擎在自信地识别用户语音方面遇到困难，利用已识别的视觉物体作为上下文，可以改善语音识别性能。若语音识别引擎返回的查询字符串是“How
  are the reviews for this hook?”（这本书的评论怎么样？），且识别置信度分数低于预定阈值，那么，由于视觉识别模块报告当前识别到的物体中有“book”（书），就可以将查询纠正为“How
  are the reviews for this book?”


