- fmt: "### Using `Go To` Statements…Or Not\n\nIn many programming languages (particularly\
    \ older ones) it is possible to directly specify the next statement to be executed\
    \ after the current statement. In order to do this, programming languages need\
    \ some way of identifying statements. Originally, this was done by numbering them\
    \ sequentially. Statements in `Swift` may be numbered by `Xcode`, but the numbers\
    \ are not part of the code itself.\n\nIn some languages (notably `PL/1` and `COBOL`),\
    \ statements can be named. This is better than numbering them because the names\
    \ don’t change if you insert or delete statements. Line numbers are fragile. When\
    \ labels are used, they often must be the first characters on a line if they are\
    \ used on that line, and the label is terminated by a period, colon, or other\
    \ distinctive character. They typically cannot contain embedded blanks.\n\nIn\
    \ `Swift` and most modern languages, even if line numbers are shown, they are\
    \ only for your reference: you cannot transfer control to a specific line number.\n\
    \nFigure [8-2](#A441106_1_En_8_Chapter.html#Fig2) shows a `Swift` playground in\
    \ `Xcode` with line numbers shown.\n\n![A441106_1_En_8_Fig2_HTML.jpg](A441106_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2  \n`Swift` playground with lines numbers shown\n\nFigure [8-3](#A441106_1_En_8_Chapter.html#Fig3)\
    \ shows the same code with line numbers hidden.\n\n![A441106_1_En_8_Fig3_HTML.jpg](A441106_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3  \n`Swift` playground with line numbers hidden\n\nYou turn line numbers\
    \ on and off in `Xcode` preferences (`Xcode` ➤ `Preferences`) as shown in Figure\
    \ [8-4](#A441106_1_En_8_Chapter.html#Fig4). Once `Preferences` has opened, select\
    \ `Text Editing` from the top bar and choose the `Editing` option at the top of\
    \ the main window section. You can turn line numbers on and off depending on what\
    \ you’re doing at the time. You might want to turn the line numbers on if you’re\
    \ going to a code review meeting where people will want to talk about the code\
    \ whether it is printed out or shown on an Apple TV or other device using `AirPlay`\
    \ or a directly wired connection.\n\n![A441106_1_En_8_Fig4_HTML.jpg](A441106_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4  \n`Xcode` line number preferences in `Xcode` preferences\n\nLine\
    \ numbers along with `go to` statements have become artifacts of the past in the\
    \ coding world, but, just as in the physical world, the past is always with us\
    \ or, as William Faulkner wrote, “The past is never dead. It’s not even past.”\
    \ [Requiem for a Nun and various misquoted variations on the web] Being able to\
    \ identify line numbers in discussions and documents is very useful. (Line numbers\
    \ are frequently used in the screenshots from `Xcode` in this book, for example.)\n\
    \nBeing able to specify a specific line as the next line to execute has proven\
    \ to be a dangerous programming technique. If you are writing code and thinking\
    \ about finding a way to jump to something other than the next line of code, use\
    \ one of the other techniques that are described in this section.\n\nBeing able\
    \ to transfer control to a specific line of code results in what is referred to\
    \ as spaghetti code. It takes its name from the fact that if you draw arrows indicating\
    \ how a program executes, those arrows (in what is often called a flow chart)\
    \ start to look like a plate of spaghetti.\n\nThe alternative to line numbers\
    \ and spaghetti code is structured programming or structured code. The term was\
    \ devised by Edsger W. Dijkstra in 1968. A leading developer on the Burroughs\
    \ `Corporation` `ALGOL` programming team, his influence on that project and computer\
    \ programming in general in the late 1950s was enormous.\n\n> **Note**  \n> `ALGOL`\
    \ on Burroughs mainframes was my second programming language (my first was `FORTRAN`\
    \ on `CDC 6600` mainframes, which in the 1960s were considered the first successful\
    \ supercomputer). Much of the `ALGOL` syntax is relevant today and some of its\
    \ features are hallmarks of good programming style and efficient coding for the\
    \ largest and smallest devices.\n\nRather than transferring control to a specific\
    \ line identified by label or number, structured programming relies on structuring\
    \ in the code into logical sections (functions, procedures, or methods that you\
    \ will find out more about in Chapter [10](#A441106_1_En_10_Chapter.html), “Building\
    \ Components,”). You can then transfer control to the logical section, which may\
    \ contain multiple lines of code. Because of this structure, you don’t transfer\
    \ control all over your code from one line to another to another and so on (thus,\
    \ the origin of the phrase spaghetti code).\n\n### Using Conditionals\n\nPerhaps\
    \ the simplest way of structuring your code to avoid random jumping around from\
    \ one statement to some other statement and then on to confusion is to set up\
    \ a binary choice. If some condition is true, then execute the following line\
    \ of code. This means that instead of jumping around, you simply do or don’t execute\
    \ the next line of code. The structure and flow of your code remains fairly easy\
    \ to understand.\n\nYou can even begin to expand on this pattern by setting up\
    \ a three-way choice: if a condition is true, execute this line of code, and if\
    \ it is not true, execute that line of code. Note that these are not distant lines\
    \ of code — they are sequential. In this way, the choice is easy to understand\
    \ and the flow of control is simple.\n\nYou can build even more by using compound\
    \ statements so that a group of statements are treated as one. The logic is then\
    \ modified a little so that conceptually it is:\n\nIf this condition is true execute\
    \ these following lines of code; if it is not true execute those lines of code.\n\
    \nThe lines of code remain sequential so that the condition (or `if` statement)\
    \ is evaluated and several lines that follow it are executed or, if the condition\
    \ is not true, several other lines that follow are executed. Although the control\
    \ takes one set of statements rather than another, all of the code is together.\n\
    \nThe initial part of this pattern is the conditional expression itself. In its\
    \ simplest form, it is an `if` statement. The basic style in `Swift` (and many\
    \ other languages) is illustrated in this code snippet:\n\n```\nvar x = 5\nif\
    \ x > 4\n{\nx = x + 1\n}\n```\n\nListing 8-1  \nUsing a `Swift` `if` statement\n\
    \nIn languages in the C family, the syntax is slightly different, as shown in\
    \ Listing [8-2](#A441106_1_En_8_Chapter.html#Par31):\n\n```\nif (x > 4)\n    x\
    \ = x + 1;\n```\n\nListing 8-2  \nUsing a C `if` statement\n\nAs you can see,\
    \ it is necessary to somehow differentiate between the conditional test and the\
    \ code to be executed (or not executed). Parentheses or brackets are used for\
    \ these purposes.\n\nThese are the concepts. Specific `Swift` examples follow."
  raw: '### Using Go To Statements…Or Not


    In many programming languages (particularly older ones) it is possible to directly
    specify the next statement to be executed after the current statement. In order
    to do this, programming languages need some way of identifying statements. Originally,
    this was done by numbering them sequentially. Statements in Swift may be numbered
    by Xcode, but the numbers are not part of the code itself.


    In some languages (notably PL/1 and COBOL), statements can be named. This is better
    than numbering them because the names don’t change if you insert or delete statements.
    Line numbers are fragile. When labels are used, they often must be the first characters
    on a line if they are used on that line, and the label is terminated by a period,
    colon, or other distinctive character. They typically cannot contain embedded
    blanks.


    In Swift and most modern languages, even if line numbers are shown, they are only
    for your reference: you cannot transfer control to a specific line number.


    Figure [8-2](#A441106_1_En_8_Chapter.html#Fig2) shows a Swift playground in Xcode
    with line numbers shown.


    ![A441106_1_En_8_Fig2_HTML.jpg](A441106_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Swift playground with lines numbers shown


    Figure [8-3](#A441106_1_En_8_Chapter.html#Fig3) shows the same code with line
    numbers hidden.


    ![A441106_1_En_8_Fig3_HTML.jpg](A441106_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Swift playground with line numbers hidden


    You turn line numbers on and off in Xcode preferences (Xcode ➤ Preferences) as
    shown in Figure [8-4](#A441106_1_En_8_Chapter.html#Fig4). Once Preferences has
    opened, select Text Editing from the top bar and choose the Editing option at
    the top of the main window section. You can turn line numbers on and off depending
    on what you’re doing at the time. You might want to turn the line numbers on if
    you’re going to a code review meeting where people will want to talk about the
    code whether it is printed out or shown on an Apple TV or other device using AirPlay
    or a directly wired connection.


    ![A441106_1_En_8_Fig4_HTML.jpg](A441106_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Xcode line number preferences in Xcode preferences


    Line numbers along with go to statements have become artifacts of the past in
    the coding world, but, just as in the physical world, the past is always with
    us or, as William Faulkner wrote, “The past is never dead. It’s not even past.”
    [Requiem for a Nun and various misquoted variations on the web] Being able to
    identify line numbers in discussions and documents is very useful. (Line numbers
    are frequently used in the screenshots from Xcode in this book, for example.)


    Being able to specify a specific line as the next line to execute has proven to
    be a dangerous programming technique . If you are writing code and thinking about
    finding a way to jump to something other than the next line of code, use one of
    the other techniques that are described in this section.


    Being able to transfer control to a specific line of code results in what is referred
    to as spaghetti code. It takes its name from the fact that if you draw arrows
    indicating how a program executes, those arrows (in what is often called a flow
    chart) start to look like a plate of spaghetti.


    The alternative to line numbers and spaghetti code is structured programming or
    structured code . The term was devised by Edsger W. Dijkstra in 1968\. A leading
    developer on the Burroughs Corporation ALGOL programming team, his influence on
    that project and computer programming in general in the late 1950s was enormous.


    Note


    ALGOL on Burroughs mainframes was my second programming language (my first was
    FORTRAN on CDC 6600 mainframes, which in the 1960s were considered the first successful
    supercomputer). Much of the ALGOL syntax is relevant today and some of its features
    are hallmarks of good programming style and efficient coding for the largest and
    smallest devices.


    Rather than transferring control to a specific line identified by label or number,
    structured programming relies on structuring in the code into logical sections
    (functions, procedures, or methods that you will find out more about in Chapter
    [10](#A441106_1_En_10_Chapter.html), “Building Components,”). You can then transfer
    control to the logical section, which may contain multiple lines of code. Because
    of this structure, you don’t transfer control all over your code from one line
    to another to another and so on (thus, the origin of the phrase spaghetti code).


    ### Using Conditionals


    Perhaps the simplest way of structuring your code to avoid random jumping around
    from one statement to some other statement and then on to confusion is to set
    up a binary choice. If some condition is true, then execute the following line
    of code. This means that instead of jumping around, you simply do or don’t execute
    the next line of code. The structure and flow of your code remains fairly easy
    to understand.


    You can even begin to expand on this pattern by setting up a three-way choice:
    if a condition is true, execute this line of code, and if it is not true, execute
    that line of code. Note that these are not distant lines of code — they are sequential.
    In this way, the choice is easy to understand and the flow of control is simple.


    You can build even more by using compound statements so that a group of statements
    are treated as one. The logic is then modified a little so that conceptually it
    is


    If this condition is true execute these following lines of code; if it is not
    true execute those lines of code.


    The lines of code remain sequential so that the condition (or `if` statement)
    is evaluated and several lines that follow it are executed or, if the condition
    is not true, several other lines that follow are executed. Although the control
    takes one set of statements rather than another, all of the code is together.


    The initial part of this pattern is the conditional expression itself. In its
    simplest form, it is an `if` statement. The basic style in Swift (and many other
    languages) is illustrated in this code snippet:


    ```

    var x = 5

    if x > 4

    {

    x = x + 1

    }

    Listing 8-1

    Using a Swift if statement

    ```


    In languages in the C family, the syntax is slightly different, as shown in Listing
    [8-2](#A441106_1_En_8_Chapter.html#Par31):


    ```

    if (x > 4)

    x = x + 1;

    Listing 8-2

    Using a C if statement

    ```


    As you can see, it is necessary to somehow differentiate between the conditional
    test and the code to be executed (or not executed). Parentheses or brackets are
    used for these purposes.


    These are the concepts. Specific Swift examples follow.'
  trans: "\n### 使用 `Go To` 语句……或者不使用\n\n在许多编程语言中（尤其是较老的语言），可以直接指定当前语句之后要执行的下一条语句。为此，编程语言需要某种方式来标识语句。最初，这是通过按顺序对语句进行编号来实现的。`Swift`\
    \ 中的语句可以由 `Xcode` 编号，但这些编号并非代码本身的一部分。\n\n在某些语言中（特别是 `PL/1` 和 `COBOL`），语句可以被命名。这比编号更优，因为插入或删除语句后名称不会改变。行号则很脆弱。当使用标签时，如果它们用于某行，通常必须位于该行的首字符位置，并且标签以句点、冒号或其他特殊字符结尾。标签通常不能包含嵌入的空格。\n\
    \n在 `Swift` 及大多数现代语言中，即使显示了行号，它们也仅供你参考：你无法将控制权转移到特定的行号。\n\n图 8-2 展示了 `Xcode` 中显示行号的\
    \ `Swift` playground。\n\n![A441106_1_En_8_Fig2_HTML.jpg](img/A441106_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2  \n显示行号的 `Swift` playground\n\n图 8-3 展示了隐藏行号的同一段代码。\n\n![A441106_1_En_8_Fig3_HTML.jpg](img/A441106_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3  \n隐藏行号的 `Swift` playground\n\n你可以在 `Xcode` 偏好设置（`Xcode` ➤ `Preferences`）中开启或关闭行号，如图\
    \ 8-4 所示。打开 `Preferences` 后，从顶部栏选择 `Text Editing`，然后在主窗口区域顶部选择 `Editing` 选项。你可以根据当时正在进行的操作来开启或关闭行号。如果你要参加代码审查会议，无论代码是打印在纸上，还是通过\
    \ `AirPlay` 或直接连线显示在 Apple TV 或其他设备上，人们都会讨论代码，此时你可能希望开启行号。\n\n![A441106_1_En_8_Fig4_HTML.jpg](img/A441106_1_En_8_Fig4_HTML.jpg)\n\
    \n图 8-4  \n`Xcode` 偏好设置中的 `Xcode` 行号选项\n\n行号以及 `go to` 语句在编程世界中已成为过去的遗迹，但正如在现实世界中一样，过去总是与我们同在，或者如威廉·福克纳所写：“过去从未消亡，它甚至还没有过去。”[《修女安魂曲》及网络上各种误引的变体]\
    \ 能够在讨论和文档中识别行号是非常有用的。（例如，本书中来自 `Xcode` 的截图就经常使用行号。）\n\n能够指定特定行作为要执行的下一条语句已被证明是一种危险的编程技术。如果你正在编写代码，并考虑如何跳转到当前代码行之外的其他位置，请改用本节中描述的其他技术之一。\n\
    \n能够将控制权转移到代码的特定行会导致所谓的“意大利面条式代码”。这个名称来源于这样一个事实：如果绘制箭头来表示程序的执行方式，这些箭头（在通常称为流程图的图中）会开始看起来像一盘意大利面条。\n\
    \n行号和意大利面条式代码的替代方案是结构化编程或结构化代码。该术语由艾兹格·W·迪杰斯特拉在 1968 年提出。作为 Burroughs `Corporation`\
    \ `ALGOL` 编程团队的主要开发人员，他在 20 世纪 50 年代末期对该项目以及整个计算机编程产生了巨大影响。\n\n> **注意**  \n> Burroughs\
    \ 大型机上的 `ALGOL` 是我学习的第二门编程语言（我的第一门语言是 `CDC 6600` 大型机上的 `FORTRAN`，该机型在 20 世纪 60\
    \ 年代被认为是第一台成功的超级计算机）。`ALGOL` 的许多语法至今仍有重要价值，其某些特性是大型和小型设备上良好编程风格与高效编码的标志。\n\n结构化编程不是将控制权转移到由标签或编号标识的特定行，而是依赖于将代码结构化组织成逻辑部分（函数、过程或方法，你将在第\
    \ 10 章“构建组件”中了解更多）。然后，你可以将控制权转移到这个可能包含多行代码的逻辑部分。由于这种结构，你不再需要在代码中从一个行转移到另一个行，再转移到另一个行（因此，也就有了“意大利面条式代码”这个短语的起源）。\n\
    \n### 使用条件语句\n\n也许将代码结构化以避免随机跳转（从一个语句跳转到另一个，然后陷入混乱）的最简单方法是建立一个二项选择。如果某个条件为真，则执行紧随其后的代码行。这意味着，你只需决定是否执行下一行代码，而无需到处跳转。代码的结构和流程仍然相当容易理解。\n\
    \n你甚至可以扩展此模式，建立三项选择：如果条件为真，则执行这行代码；如果条件为假，则执行那行代码。请注意，这些不是相距甚远的代码行——它们是顺序排列的。这样，选择就很容易理解，控制流程也很简单。\n\
    \n你还可以通过使用复合语句来构建更复杂的结构，将一组语句视为一个整体。其逻辑稍作修改，概念上变为：\n\n如果此条件为真，则执行随后这几行代码；如果条件为假，则执行另外那几行代码。\n\
    \n代码行仍然是顺序排列的，因此条件（或 `if` 语句）被求值后，要么执行紧随其后的几行代码，要么（如果条件为假）执行另外的几行代码。尽管控制权会转向一组语句而非另一组，但所有代码都聚集在一起。\n\
    \n此模式的起始部分就是条件表达式本身。其最简单的形式是一个 `if` 语句。在 `Swift`（以及许多其他语言）中的基本风格如下面的代码片段所示：\n\n\
    ```\nvar x = 5\nif x > 4\n{\nx = x + 1\n}\n```\n\n清单 8-1  \n使用 `Swift` 的 `if`\
    \ 语句\n\n在 C 语言家族中，语法略有不同，如清单 8-2 所示：\n\n```\nif (x > 4)\n    x = x + 1;\n```\n\
    \n清单 8-2  \n使用 C 语言的 `if` 语句\n\n如你所见，有必要以某种方式区分条件测试和要执行（或不执行）的代码。括号或花括号用于此目的。\n\
    \n以上就是相关概念。接下来是具体的 `Swift` 示例。\n"
- fmt: "# Using Compound Statements in Swift\n\nIn many languages (including Swift)\
    \ you can group statements together by enclosing them in brackets as in the following:\n\
    \n```\n{\nlet x = 5\nlet y = 6\n}\n```\n\nThis lets you treat the statements as\
    \ a compound statement — that is, one statement. This is particularly useful when\
    \ used in conjunction with a conditional test. This means that the Swift example\
    \ shown previously in Listing [8-1](#A441106_1_En_8_Chapter.html#Par29) can be\
    \ enhanced. The brackets around the conditional code mean that it is already a\
    \ compound statement. To make the `if` statement apply to several statements within\
    \ a compound statement, you just add the second statement to the interior of the\
    \ bracketed compound statement as in Listing [8-3](#A441106_1_En_8_Chapter.html#Par37).\n\
    \n```\nvar x = 5\nif x > 4\n{\nx = x + 1\nprint (\"updated x\")\n}\nListing 8-3\n\
    Using a Swift if statement with a compound statement\n```\n\nYou can use Xcode’s\
    \ preferences to manage indentation. Choose **Xcode** ➤ **Preferences** and select\
    \ **Text Editing** and the **Indentation** segment at the top of the pane as shown\
    \ in Figure [8-5](#A441106_1_En_8_Chapter.html#Fig5).\n\n![A441106_1_En_8_Fig5_HTML.jpg](A441106_1_En_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5  \nSetting indentation options\n\nWith the settings shown in Figure\
    \ [8-5](#A441106_1_En_8_Chapter.html#Fig5), you can see how indentation works\
    \ in Figure [8-6](#A441106_1_En_8_Chapter.html#Fig6). (The error is due to the\
    \ fact that a disembodied compound statement such as this one that is used only\
    \ for a formatting demonstration isn’t valid syntax.)\n\nWhat you don’t see in\
    \ Figure [8-6](#A441106_1_En_8_Chapter.html#Fig6) is that after typing the initial\
    \ opening bracket, the insertion point moves to the indented space on the following\
    \ line so you can keep typing. When you type the closing bracket, the indentation\
    \ is dropped and it moves to the left. Embedded embedded statements of any length\
    \ display properly.\n\n![A441106_1_En_8_Fig6_HTML.jpg](A441106_1_En_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6  \nUsing indentation in Xcode preferences\n\nNote that there are\
    \ different styles and standards for indenting code. One of the most basic is\
    \ where to place the opening bracket. This is particularly important in conditional\
    \ statements where there is code before the opening bracket of a compound statement.\
    \ The two basic styles are shown in Listing [8-4](#A441106_1_En_8_Chapter.html#Par42)\
    \ and Listing [8-5](#A441106_1_En_8_Chapter.html#Par43).\n\n```\nif x > 4\n{\n\
    x = x + 1\nprint (\"updated x\")\n}\nListing 8-4\nDangling bracket\n```\n\n```\n\
    if x > 4 {\nx = x + 1\nprint (\"updated x\")\n}\nListing 8-5\nEmbedded bracket\n\
    ```\n\nThere are arguments to be made for both styles. In the dangling style,\
    \ the opening and closing brackets are aligned so it may be easier to pick out\
    \ the compound statement. In the embedded style (Listing [8-5](#A441106_1_En_8_Chapter.html#Par43)),\
    \ the opening and closing brackets are not aligned, but the entire conditional\
    \ statement appears as one unit (which it is).\n\nThe issue can be a bit more\
    \ complicated when you expand an `if` statement to provide an `else` clause —\
    \ that is, a statement or compound statement to be executed if the condition is\
    \ false. Listing [8-6](#A441106_1_En_8_Chapter.html#Par46) shows one version of\
    \ a dangling `else` bracket. Common variations on this style do not indent the\
    \ `else`.\n\n```\nif x > 4\n{\nx = x + 1\nprint (\"updated x\")\n}\nelse\n{\n\
    print (\"no update\")\n}\nListing 8-6\nDangling else bracket\n```\n\nIn Listing\
    \ [8-7](#A441106_1_En_8_Chapter.html#Par48), you see an embedded `else`. By comparison\
    \ with Listing [8-6](#A441106_1_En_8_Chapter.html#Par46), this emphasizes the\
    \ two components of the `if` statement. Which style you use is a matter of preference\
    \ (your preference and the preferences of your project team).\n\n```\nif x > 4\
    \ {\nx = x + 1\nprint (\"updated x\")\n}  else {\nprint (\"no update\")\n}\nListing\
    \ 8-7\nEmbedded else bracket\n```\n\n## Ternary Operators\n\nSo far in this chapter,\
    \ the discussion has focused on the control of statements within an app. There\
    \ is a related operator that is used in a somewhat similar way. The ternary operator\
    \ does not manage control flow; rather, within a single statement it lets you\
    \ choose between two alternate values as a result. It is discussed here because\
    \ it frequently is used to replace more complex `if` statements.\n\nThe situation\
    \ that ternary operators address is a common `if` pattern:\n\n```\nif x > 10 {\n\
    message = \"greater than 10\"\n} else {\nmessage = \"not greater than 10\"\n}\n\
    ```\n\nWhether the condition is true or false, the `message` will be set to something.\
    \ With a ternary operator, you can make this much simpler. The code using a ternary\
    \ operator is a single line of code:\n\n```\nmessage = x > 10 ? \"greater than\
    \ 10\" : \"not greater than 10\"\n```\n\nThis is a replacement statement that\
    \ incorporates the conditional test and both the true and false results. Figure\
    \ [8-7](#A441106_1_En_8_Chapter.html#Fig7) shows this in a playground.\n\n![A441106_1_En_8_Fig7_HTML.jpg](A441106_1_En_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7  \nExplore a ternary operator\n\nYou can test this code for yourself\
    \ by downloading the `Conditional1` playground as described in the Introduction.\
    \ Try adjusting the value of `x` in the first line of code and the test `for x\
    \ > 10` in the ternary operator; you can also experiment with changing the text\
    \ strings.\n\nRemember that ternary operators are operators within a single statement\
    \ (not even a compound statement although you can get fancy and produce some almost\
    \ undecipherable code if you try to push that limit).\n\n# Switching Control\n\
    \nConditional statements let you branch to one of two true/false conditions; you\
    \ can also place conditional statements within one or more branches so that you\
    \ continue to fork along true/false paths of various conditions. If you want to\
    \ implement more than a simple binary true/false branch, you may find yourself\
    \ deep in confusing branches of branches. You may realize that what you want is\
    \ more than two choices, but the `if` statement limits you to one or two choices\
    \ (two choices require an `else` clause as part of the `if` statement).\n\nThe\
    \ abstract idea of a switch statement is as follows:\n\n* A condition is evaluated.\n\
    * Its result is used to choose a statement or set of statements to be executed.\n\
    \nThe basic idea is shown here in pseudocode in Listing [8-8](#A441106_1_En_8_Chapter.html#Par62):\n\
    \n```\nswitch  {\ncase : \ncase : \n}\nListing 8-8\nPseudocode generic switch\
    \ statement\n```"
