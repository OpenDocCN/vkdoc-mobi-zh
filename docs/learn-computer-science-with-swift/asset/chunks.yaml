    from assembly language to machine code. The code is called assembly language or
    assembler; while the tool that generates it is often called an assembler. The
    context clarifies whether you are talking about the tool or the code.


    Even more human-readable than assembly is a computer programming language. The
    first languages such as COBOL and FORTRAN in the 1950s are referred to as higher-level
    programming languages. They are turned into assembly by programs called compilers
    .


    Tip


    For more information, do research on Grace Hopper and her colleagues.


    The hierarchy of programming languages from simple to more complex is this:


    *   machine code (the most basic);

    *   assembly;

    *   higher-level languages such as FORTRAN and COBOL;

    *   later on languages such as C, Pascal, and now Swift and Python among many
    others make reading and writing code by and for humans much easier.


    Higher-level languages are ideally machine independent so that someone who knows
    how to write COBOL, FORTRAN, or Swift should be able to have that code compiled
    into assembler and then assembled into machine language on any computer. Assemblers
    are usually machine- (or chip-) specific. Thus if you write a program in a higher-level
    language, it can be compiled into assembler and thence to machine code. Two points
    are critically important:


    *   Although higher-level programming languages are portable (the common term
    for running on multiple computer architectures), the compilers that turn them
    into assembler and machine code are specific to a specific architecture of computer
    or chip.

    *   There are often cross-compilers that take a higher-level programming language
    and compile it into assembler for a different computer than the one on which it
    is running.


    Because assembler and machine code are specific to computer and chip architectures
    as well as the even more important point that most programming and coding today
    is done in higher-level languages, this book (like most computer science references
    today) does not go into assembler and machine language except for broad conceptual
    views such as this section.


    In today’s coding environment , compiled code is often combined with graphics
    and many other assets. This process is referred to as building (and the result
    is called a build.) The build process is often machine specific. Thus, the code
    is machine independent if it uses a language such as C, but the build process
    means that it is not portable. To write code that can run on a specific computer,
    you need a compiler or cross-compiler that can turn the code into assembler and
    thence to machine code; you also need a build program to build it for the computer
    you are targeting (the verb “target” is used to identify the ultimate computer
    on which your code will run). A build program can even combine several programs
    in several programming languages if you want.


    ## Compiling and Interpreting Code


    Today’s computers are much more powerful than those from the early days of programming
    languages (the 1940s to 1970s). As a result, the very clear pattern of machine
    code, assembly, and higher-level languages with assemblers and compilers is more
    complex. Instead of compiling programming language code, in some cases it can
    be interpreted: the higher-level language is processed and turned into executable
    code so quickly that it happens as quickly as it is typed.


    Tip


    Executable code is the term for code that can actually run on a computer. Sometimes,
    people refer to executable code as an executable.'
  trans: "\n## 组合行动与数据\n\n你常常希望将多个行动一同执行。在多种编程语言中，你可以将它们组合成一个行动集合，并像执行单个行动一样执行该集合。术语因语言而异，但行动集合通常被称为`方法`、`函数`、`过程`、`子程序`或`块`。（这些术语的具体含义虽有差异，但均指代行动的集合）。\n\
    \n你也可以创建数据集合。如下例所示，`x` 是一个变量。在最基本的层面上，它是一个可以包含数据的具体存储位置。数据集合则包括数组、集合和字典（还有其他术语）。\n\
    \n行动集合可以包含数据，这些数据可以是单个变量，也可以是数据集合。正如你可以将数据值输入到行动中（例如 `printf(\"hello, world\"\
    )`），或像清单 2-2 所示那样使用变量一样，你也可以使用数据集合作为行动的操作对象。\n\n## 代码背后的运行机制\n\n你编写的代码旨在或多或少地便于人类阅读。在后台，还存在另外两种代码。在最基本的层面上，有机器码：这些是由计算机本身（其中央处理单元或\
    \ CPU）执行的指令。每种类型的计算机可能都有自己专用的机器码语言。实际上，如今的机器码是针对计算机核心芯片类型而特定的。可能存在多个芯片，但它们通常使用相同的机器码，以便能在任何可用的芯片上随时执行。（参见第\
    \ 6 章“构建组件”中的“线程”部分）。\n\n通过使用名为`汇编器`的程序，机器语言可以转化为汇编语言。汇编语言（或汇编语言）对人类来说稍微易读一些。这里的关键组件是`汇编器`程序本身，它负责将汇编语言转换为机器码。代码被称为汇编语言或汇编程序（assembler）；而生成它的工具通常被称为`汇编器`。根据上下文，你可以区分出谈论的是工具还是代码。\n\
    \n比汇编语言更易读的是计算机编程语言。20 世纪 50 年代出现的首批语言，如 COBOL 和 FORTRAN，被称为高级编程语言。它们通过名为`编译器`的程序转化为汇编语言。\n\
    \n**提示**  \n如需更多信息，请研究格雷斯·霍珀及其同事的成果。\n\n编程语言从简单到复杂的层次结构如下：\n\n- 机器码（最基础）\n- 汇编语言\n\
    - 高级语言，如 FORTRAN 和 COBOL\n- 后来的语言，如 C、Pascal，以及现在的 Swift 和 Python 等，使人类阅读和编写代码变得容易得多。\n\
    \n高级语言理想情况下是机器无关的，这样懂得编写 COBOL、FORTRAN 或 Swift 的人，就能让这些代码在任何计算机上先被编译成汇编语言，再汇编成机器语言。汇编器通常是机器（或芯片）相关的。因此，如果你用高级语言编写程序，它可以被编译成汇编语言，进而转换为机器码。有两点至关重要：\n\
    \n- 尽管高级编程语言是可移植的（指能在多种计算机架构上运行），但将它们转换为汇编语言和机器码的`编译器`是特定于某种计算机或芯片架构的。\n- 通常存在交叉编译器，它们能将高级编程语言编译成适用于另一台计算机（而非其自身运行的那台）的汇编语言。\n\
    \n由于汇编语言和机器码是特定于计算机和芯片架构的，更重要的是，如今大多数编程和编码工作都是使用高级语言完成的，因此本书（如同当今大多数计算机科学参考资料一样）除本节这样广泛的概念性概述外，不会深入探讨汇编语言和机器语言。\n\
    \n在当今的编码环境中，编译后的代码通常与图形和其他许多资源相结合。这个过程被称为构建（其结果称为构建产物）。构建过程通常是机器相关的。因此，如果使用 C\
    \ 等语言，代码是机器无关的，但构建过程意味着它并非可移植的。要编写能在特定计算机上运行的代码，你需要一个编译器或交叉编译器，将代码转换为汇编语言进而转换为机器码；此外，你还需要一个构建程序，为你的目标计算机（动词“target”用于确定你的代码最终将在哪台计算机上运行）构建代码。如果你愿意，一个构建程序甚至可以组合使用多种编程语言编写的多个程序。\n\
    \n## 编译与解释代码\n\n如今的计算机远比编程语言早期（20 世纪 40 年代至 70 年代）的计算机强大得多。因此，机器码、汇编语言以及带有汇编器和编译器的高级语言这一清晰的模式变得更加复杂。在某些情况下，编程语言代码无需编译，而是可以被解释执行：高级语言被处理并转换为可执行代码，其速度之快，几乎与你输入代码的速度同步。\n\
    \n**提示**  \n可执行代码是指能够在计算机上实际运行的代码。有时，人们也将可执行代码简称为可执行文件。\n"
- fmt: '# Using Swift Playgrounds


    Swift playgrounds let you write code in the Swift language and have it interpreted
    as you type it. Apple’s Xcode development tool, described in Chapter [12](#A441106_1_En_12_Chapter.html),
    “Getting into Xcode,” combines the relevant compilers and build processors to
    let you build apps. Playgrounds let you build and explore interpreted code. You
    can share playgrounds with others, and, as you see when you launch Swift Playgrounds,
    you start from a variety of featured playgrounds as shown in Figure [2-1](#A441106_1_En_2_Chapter.html#Fig1).
    If you don’t see this screen, look for a `+` at the top right to begin browsing
    playgrounds.


    ![A441106_1_En_2_Fig1_HTML.jpg](A441106_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Explore Swift Playgrounds


    Use the tabs at the bottom to explore the built-in Swift playgrounds. Starting
    Points are good places to start building your own playgrounds. Tap Get to download
    any of the playgrounds you see in Figure [2-1](#A441106_1_En_2_Chapter.html#Fig1)
    or to start working with one as you see in Figure [2-2](#A441106_1_En_2_Chapter.html#Fig2)
    by tapping New Playground or `+`.


    ![A441106_1_En_2_Fig2_HTML.jpg](A441106_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    You can create your own playgrounds


    Your playgrounds can be as simple as a line or two of code such as the code shown
    in Chapter [1](#A441106_1_En_1_Chapter.html). Alternatively, you can create more
    complex playgrounds that you use to explore syntax and test your code. You can
    also build playgrounds to share with others. These can be quite sophisticated.
    One way to get started with Swift Playgrounds is to tap one of the featured playgrounds
    to explore it. If you tap one of the featured playgrounds, you’ll see a description
    and more information as well as the all-important Get button that lets you download
    it. Figure [2-3](#A441106_1_En_2_Chapter.html#Fig3) shows the Get page for Learn
    to Code 2 one of the early playgrounds.


    > **Note:** At the moment, many playgrounds are designed for teaching coding to
    kids. If you explore shared code resources like GitHub, you’ll see that professional
    developers are using playgrounds for coding snippets, testing, and training users
    as well as teaching people how to code.


    ![A441106_1_En_2_Fig3_HTML.jpg](A441106_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Explore Learn to Code 2


    If you tap Starting Points, you can view the choices in Swift Playgrounds as you
    see in Figure [2-4](#A441106_1_En_2_Chapter.html#Fig4) (note that the Starting
    Points change as Swift Playgrounds is enhanced).


    ![A441106_1_En_2_Fig4_HTML.jpg](A441106_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Starting points


    Tap Get to download a starting point such as Shapes. It will download to your
    playgrounds as you see in Figure [2-5](#A441106_1_En_2_Chapter.html#Fig5).


    ![A441106_1_En_2_Fig5_HTML.jpg](A441106_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Download the Shapes playground


    Tap the playground to open it as you see in Figure [2-6](#A441106_1_En_2_Chapter.html#Fig6).


    ![A441106_1_En_2_Fig6_HTML.jpg](A441106_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Run the playground as you see in Figure [2-7](#A441106_1_En_2_Chapter.html#Fig7).


    ![A441106_1_En_2_Fig7_HTML.jpg](A441106_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    The playground runs


    The blue circle is movable — tap and drag it around as you wish. You’ve got your
    first playground running. You can return to your playgrounds at any time with
    the four squares at the top left of the window.


    You can add a new playground to My Playgrounds with `+` either from the top of
    the view or the large `+` on a shelf.


    When you have a playground opened, use the three dots (ellipsis) at the top right
    of the playground to explore additional tools as you see in Figure [2-8](#A441106_1_En_2_Chapter.html#Fig8).


    ![A441106_1_En_2_Fig8_HTML.jpg](A441106_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    Use More to see other locations for your playground


    In any of the displays of playgrounds such as you see in Figure [2-5](#A441106_1_En_2_Chapter.html#Fig7),
    you can tap the Share button in the top right to start sharing. You select a playground,
    and then you will be able to use the sharing options you see in Figure [2-9](#A441106_1_En_2_Chapter.html#Fig9).


    ![A441106_1_En_2_Fig9_HTML.jpg](A441106_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Share your playground


    When you no longer need a playground, you can delete it from your iPad. Tap the
    list of playgrounds in the top left as you see in Figure [2-10](#A441106_1_En_2_Chapter.html#Fig10),
    and tap edit. Select any of the listed playgrounds (there may be more than one)
    with the dot to the left of the playground name, and then tap Delete.


    ![A441106_1_En_2_Fig10_HTML.jpg](A441106_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Delete a playground


    # Moving On to Paradigms


    You now have the basic tools to use Swift Playgrounds to experiment. The following
    chapter shows you examples of the two most important programming paradigms today
    with examples of code for each.


    **Footnotes**


    1. Kernighan, Brian W.; Ritchie, Dennis M. (1978). *The C Programming Language*
    (1st ed.). Englewood Cliffs, NJ: Prentice Hall. ISBN 0-13-110163-3.


    # Exploring Programming Paradigms


    The snippets of code that you have seen in this book so far are just that – snippets.
    They show a single line of code that does one thing such as set a variable or
    print out a string. That is the way that programming began: one line of code after
    another.


    Before long, the shortcomings of this line-after-line style of writing code became
    apparent as programming backlogs grew and programmers found themselves lost in
    line after line that they and others had written over years. In various ways and
    various places, developers created standards, styles, and other organizational
    structures so that the line-after-line style of programming was easier to write,
    maintain, and understand.


    This chapter provides a very high-level view of some of the most common programming
    paradigms in use today. The paradigms are divided into two groups here. There
    are paradigms that are implemented in languages (that is, if you use a specific
    language, its rules require you to conform to a paradigm even if you don’t realize
    it). There also are paradigms that are implemented in the structure of a specific
    section of code or even an entire app.


    The reason for introducing the paradigms is to show that some of the specific
    features and idiosyncrasies of different languages are, in fact, common paradigms.
    In other words, understanding the basic paradigms makes it easier to use languages
    and code that use those paradigms because there is less to learn that is new.


    > **Note:** The paradigms listed here are not exhaustive. There are other paradigms
    and patterns of writing code, but these lists are the most commonly used today.
    And all of them apply to Swift.'
