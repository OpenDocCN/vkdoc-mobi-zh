    ### 实现数字表


    算法中经常会出现将一种数据类型转换为另一种类型的步骤。在这种情况下，需要将字母表中的特定字母转换为代表其在字母表中顺序的数字——可能仅使用数字 1-10。


    有两种常见的方法进行此类转换：


    *   在某些情况下，存在一种计算方法可以进行转换。

    *   在其他情况下，你需要从一个存储的表中查找转换后的值。


    这是一个常见的权衡。你是否在需要之前（可能作为应用代码的一部分）就存储转换表，还是即时计算它？权衡在于按需的运行时处理与为数据提供永久性数据存储之间的选择。


    在这个场景中，存储方法是最简单的。首先，没有一个明确的计算方法可以用于按需转换。除此之外，需要存储的数据量非常小，即使在最小的设备上存储也不会有困难。


    在决定存储数据后，实现的问题在于如何存储？Swift 可以与各种数据库交互，但是，像大多数编程语言一样，它拥有多种用于存储和管理数据的语言元素。这些包括集合、数组和字典，在第
    6 章“处理数据：集合”中有更全面的描述。此数字命理数字的实现将作为 Swift 字典（本实现中使用的机制）的入门介绍。


    Swift 字典是一种关联数组。数组本身是有序数据的集合，例如班级中每个学生的姓名。集合中的每个项目（学生）都由一个数字标识。这允许你根据需要访问适当的项目。它还可以让你通过引用它们的数字（称为索引号或索引）来遍历所有项目。如果你从数组中删除一个项目，其他项目会向前移动。换句话说，如果你删除项目
    8，那么项目 9 就变成了项目 8。对于每个特定的项目，索引号会随时间变化。


    关联数组不使用索引号：相反，它使用一个键——通常是字符串——来标识每个项目。因此，如果你使用字符串"eight"来标识关联数组中的一个项目，那么这就是该项目的键，并且将始终是它的键。在数组中，项目可能被编号为
    7、8、9，如果你删除项目 8，你将剩下 7 和 8，因为 8 被删除，9 变成了 8。在关联数组中，如果你的键是"seven"、"eight"和"nine"，并且你删除了"eight"，你将剩下"seven"和"nine"。（在其他语言中，关联数组可能被称为哈希、哈希表或映射。）


    **提示**


    这是一个存储和处理之间的权衡。你会发现一些旧的文档和从业者认为在运行时查找每个键的计算成本会降低应用速度。逻辑上是这样，但以今天的处理器性能来说，这种“延迟”不太可能有影响。为当今的设备编写代码！


    Swift 字典由键值对组成。键可以是任何类型，但通常是字符串。值可以是任何遵守 `Hashable` 协议的类型。（这在第 6 章中有描述。）值可以是您选择的任何类型，但字典中所有条目必须使用相同类型。但是，您可以使用诸如
    `AnyObject` 这样的类型作为值，这为您提供了很大的自由度。


    您可以从为字母表中的每个字母声明一个数字命理数字的变量开始。列表 4-1 展示了可能的样子。在 Swift 中声明字典时，键/值对用冒号分隔显示。整个列表用方括号括起来。（请注意，如您在第
    6 章中所见，您可以添加或删除字典条目。）


    ```

    let numbers = [

    "a" : 1,

    "b" : 2,

    "c" : 3,

    "d" : 4,

    "e" : 5,

    "f" : 6,

