    ## 转向收集到的数据


    将单个数字存储在一个由简单变量（标量）引用的计算机字中，是跟踪你计算或读入数据的好方法。然后，你可以使用本书其他章节描述的基本运算来操作这些数据，并以其他格式和样式创建新数据。


    现代编程语言支持多种数据集合。其中最基础的是数组——一个按编号排列的项目列表（例如，教室里学生的姓名）。另一种常见的集合类型是集合（set）——一种非列表形式的项目集合（“集合”一词采用的是逻辑学和数学中的含义）。Swift
    同时实现了数组和集合。


    还有另一种集合类型，在 Swift 中称为字典，在 PHP 等语言中称为关联数组。数组中的元素构成一个编号列表，而字典中的元素则由字符串或其他类型来标识。


    数组是计算机科学中最古老、最基础的集合。集合次之，而字典（关联数组）则是最新的。本章将按时间顺序逐一探讨这些集合类型。


    它们都是 `Collection` 的子类，并且大多使用相同的基本方法，这些方法将在本节中先以数组为例进行介绍。请注意，这些类位于 `Foundation`
    中，因此你必须在你的 Swift 代码或 Playground 中使用以下导入语句之一：


    ```

    import Foundation

    import UIKit

    ```


    始终建议只导入尽可能少的框架。`UIKit` 会自动导入 `Foundation`，但如果你只需要 `Foundation`，就显式地导入它，而无需担心导入
    `UIKit` 中那些你用不到的代码。Xcode 和构建过程会在不需要时将其剥离，但最好一开始就只导入你需要的部分。


    ## 使用数组


    任何编程语言中的数组本质上都是有序列表。一个班级的学生名单本身是无序的，但按字母顺序排列的名单就是有序的。


    尽管数组是有序列表，但有时顺序并不重要。例如，一个未排序的学生名单仍然包含了班级中的所有学生。你不必在代码中利用这个顺序。


    数组中元素的编号和排序由数组结构本身处理：各个项目的编号并不存在于项目本身中，除非你人为添加。如果你添加了，就可以得到如表 6-1 所示的元素。请注意，在表
    6-1 中，索引是整数，内容可以是任何类型。前两个是字符串，最后一个是整数（注意它周围没有引号）。


    **表 6-1** 示例数组


    | 索引 | 内容 |

    | --- | --- |

    | 0 | "Content 17" |

    | 1 | "Data for item 32" |

    | 2 | 2 |


    各种形式的数组几乎存在于每一种编程语言和操作系统中。它们使你能够以基本的方式存储和检索数据；此外，它们还能让你轻松地对数组元素重复执行某些过程。


    当你深入计算机科学时，你会注意到数组这类概念就是你所使用的基本构建块。与数组一样，你会发现这些构建块的一些基本特性。（就数组而言，其基本特性就是：数组是一个有序的元素列表，索引是数据数组的一部分，而非由数组内的元素提供。）


    超越基础的特性已经被开发者和设计者多次实现，他们使用编程语言来扩展基本结构。随着时间的推移，许多这些增强和附加功能已逐渐融入到编程语言和操作系统中。不幸的是，很多人仍然只关注最初的构建块以及个人对其进行的定制化增强。


    Swift 本身对基础数组及其功能进行了许多增强。本节将讨论你使用数组时可以做的许多事情——其中大部分功能都直接内置于 Swift 中。


    经验丰富的开发者和设计者知道，在 Swift 等语言中使用这些特性是通往成功代码的途径。避免错误的最简单方法就是不自己编写代码，而 Swift 及相关框架中已有的代码已经过编写、测试，并且在某些情况下（包括
    Cocoa 和 Cocoa Touch 框架）已经经过了几十年的实际验证。


    在本章关于数组的各小节中，将涵盖以下主题：


    -   基本术语

    -   数组元素的索引

    -   Swift 数组与类型

    -   声明和创建数组

    -   修改 `var` 数组

    -   多维数组

    -   查找数组元素

    -   添加和删除数组元素

    -   遍历数组


    ### 基本术语


    以下是在讨论数组时常用的术语。


    -   数组的内容称为项（items）或元素（elements）。

    -   数组的排序由一个或多个索引（indexes）控制。

    -   数组中的项通过下标（subscripts）来书写，下标根据元素在数组中的数值位置来标识该元素或项。

    -   在包括 Swift 在内的许多语言中，数组下标写在方括号内，例如 `myArray`[3]，这表示 `myArray` 中的第三项。


    ### 数组元素的索引


    正如你在表 6-1 中看到的，数组负责处理索引，而你可以对数组内容进行任何操作。请注意，默认的索引编号从 0 开始。这是数组最初实现方式的历史遗留问题。在许多情况下，数组的位置就是数组的第一个元素（通常是存储的第一个字），而索引就是距离第一个元素内存位置的偏移量。因此，第一个元素（你可能认为是第
    1 个元素）距离第一个元素的偏移量为 0，因为它本身就是第一个元素。


    有些语言允许你从非零的数字开始索引数组，但实际上，是语言和操作系统自身执行了转换操作，将基于 0 的索引转换为其他基数。


    而且，更有意思的是，如今数组的物理存储可能不是连续的内存位置，但数组仍然从 0 开始，因为历来如此。


    数组中没有空隙。因此，如果你查看表 6-1 并删除了索引为 1 的项，数组将变为表 6-2 所示。旧的索引 1 的项消失了，而之前索引为 2 的项变成了索引
    1。


    > **注意**：请参阅本章后面的“查找数组元素”部分，了解如何按内容而非索引来定位数组元素。


    **表 6-2** 删除一行后的示例数组


    | 索引 | 内容 |

    | --- | --- |

    | 0 | "Content 17" |

    | 1 | 2 |


    ### Swift 数组与类型


    Swift 中的数组是类型化的。这意味着数组中的元素都具有相同的类型。你可以创建整数数组、字符串数组或任何其他类型的数组。


    数组中包含单一类型可以提高代码生成效率，并在运行时带来其他好处。（此外，它还能让你的代码更健壮，因为在数组中不当混合类型会被编译器标记出来，而不是在运行时产生错误。）


    当然，数组中只有单一类型在某些方面也可能不方便。Swift 通过其类型层级结构来管理这个问题。正如你将在第 7 章中看到的，Swift 类型包括整数等基本类型，以及特殊的
    `Any` 和 `AnyObject` 类型。因此，你可以创建一个 `Any` 类型的数组，其中可以包含整数和字符串。


    在 Swift 中，最佳实践是尽可能使用限制性最强的类型。是的，你可以将所有数组都声明为 `Any?`（即任何类型的可选版本），但这会绕过所有内置的类型检查和优化。

