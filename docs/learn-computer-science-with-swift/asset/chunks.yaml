    ### 设置项目


    以下是开始的步骤。


    首先启动 `Xcode`。你可以从 App Store 免费下载。如图 12-3 所示，使用“关于 Xcode”来检查你安装的 Xcode 版本。请注意，Xcode
    的构建标识符往往比大多数开发者使用的简单数字样式（如 1, 2, 3 等）更为复杂。


    ![A441106_1_En_12_Fig3_HTML.jpg](img/A441106_1_En_12_Fig3_HTML.jpg)


    图 12-3


    Xcode 版本 9.0，构建版本 9A235


    从 Xcode 菜单选择“新建 ➤ 项目”来开始你的项目，如图 12-4 所示。


    ![A441106_1_En_12_Fig4_HTML.jpg](img/A441106_1_En_12_Fig4_HTML.jpg)


    图 12-4


    创建一个新项目


    你将能够选择一个模板来开始。在本章中，我们使用“标签页应用”。当你有时间时，可以通过创建项目来探索其他模板。在实验完毕后，你可以随时删除它们。


    系统会提示你为项目选择一个磁盘位置。然后项目将在 Xcode 中打开。你会在一个类似于图 12-1 的窗口中看到它。你可以使用右上角的设置来显示或隐藏窗口的各个部分。（更多关于使用
    Xcode 导航的信息，请参阅 `developer.apple.com` 和应用内帮助。）


    图 12-5 展示了此时的应用程序。请注意，在图 12-1 中，右侧的“工具区”并未显示，但在图 12-5 的右侧显示了。大多数开发者在工作时会显示或隐藏
    Xcode 窗口的各个面板。


    ![A441106_1_En_12_Fig5_HTML.jpg](img/A441106_1_En_12_Fig5_HTML.jpg)


    图 12-5


    查看应用


    只需点击几下，你就能在 Xcode 中创建一个新项目，但请查看图 12-6，了解你所创建的文件和文件夹数量。除非你对 Xcode 非常熟悉，否则不要移动或重命名项目文件：将它们保留在
    Xcode 放置它们的位置。两个最重要的组件是 `xcodeproj` 文件（如图 12-6 列表底部所示）和项目文件夹（本例中为 Tabs）。如果你折叠文件夹，你会看到项目由
    `xcodeproj` 文件和项目文件夹组成。这两个项可以一起移动到其他位置，但它们必须在一个文件夹（或桌面上）彼此相邻。


    ![A441106_1_En_12_Fig6_HTML.jpg](img/A441106_1_En_12_Fig6_HTML.jpg)


    图 12-6


    浏览应用的文件夹


    ### 测试项目（不进行修改）


    如果项目尚未打开，请通过双击 `Tabs.xcodeproj` 在 Xcode 中启动它。这应该会打开你之前见过的窗口。请记住，你可能需要使用右上角的控件来显示或隐藏主窗口的各个部分。图
    12-7 向你展示了可以代替右上角控件使用的“视图”菜单。


    ![A441106_1_En_12_Fig7_HTML.jpg](img/A441106_1_En_12_Fig7_HTML.jpg)


    图 12-7


    探索“视图”菜单


    显示或隐藏主窗口的各个部分。如果你想探索它们，请使用此“视图”菜单来显示或隐藏它们，这样你就能将术语与你正在查看的 Xcode 窗口的各部分对应起来。


    使用主窗口左上角的箭头（如图 12-5 所示）来构建并运行应用。你应该会看到如图 12-8（左侧和右侧）所示的结果。


    ![A441106_1_En_12_Fig8a_HTML.jpg](img/A441106_1_En_12_Fig8a_HTML.jpg)![A441106_1_En_12_Fig8b_HTML.jpg](img/A441106_1_En_12_Fig8b_HTML.jpg)


    图 12-8


    构建并运行应用


    ### 添加代码和界面


    当你确信模板能正常工作后，就可以添加你的修改了。正如你在第 11 章中看到的，你可以将界面元素添加到作为项目一部分创建的文件和文件夹中，而不是添加到名为 `base.lproj`
    的文件夹中。这个文件夹将出现在你的大多数项目中。它包含界面元素。如今，这些元素是使用故事板构建的。（过去是使用 `xib` 和 `nib` 文件构建的。）


    `base.lproj` 文件夹将所有界面元素集中在一个地方，以便你可以轻松地进行本地化。


    故事板为你提供了一个图形化工具来绘制界面并将其连接到你的代码。本节提供了一个非常简要的概述：更多内容请参考 Xcode 文档和 `developer.apple.com`。网上也有大量信息，但请确保这些信息是近期的：网上有很多过时的代码。


    如果你在 Xcode 中点击一个故事板，它就会打开，你就可以编辑你的界面。这里已经有一个现成的界面（这就是你在运行模板时看到的内容，如图 12-8 所示）。在主故事板中，你会看到一个界面的示意图，如图
    12-9 所示。（此视图包含了一些已添加的元素——这些元素是在第 11 章中添加的，你将在本章后面了解更多关于如何添加它们的内容。）


    ![A441106_1_En_12_Fig9_HTML.jpg](img/A441106_1_En_12_Fig9_HTML.jpg)


    图 12-9


    `main.storyboard`


    在窗口右侧工具区的底部，你会看到一个对象列表，你可以将这些对象拖到故事板上。你无需绘制任何东西——只需拖动即可。


    界面中的元素被称为场景，它们通过视图控制器在代码中实现。大多数视图控制器都是可见的，本例也是如此。在 Tabs 模板中，有三个视图控制器：第一个视图、第二个视图，以及一个标签栏控制器，在你点击按钮时，标签栏控制器控制着它们。标签栏控制器出现在两个视图控制器的底部。


    当你使用工具区的对象构建界面时，你可以切换到助理编辑器，如图 12-10 所示。（你使用主窗口右上角的两个相交圆环图标来完成此操作。）助理编辑器将故事板保留在窗口左侧，并在窗口右侧显示相关代码。你从界面元素按住
    Control 键拖向代码。系统会提示你为代码中的元素命名。一个填充的圆圈表示代码已连接到界面。当连接成功后，将鼠标悬停在界面上会显示已连接代码元素的名称，如图
    12-10 所示。


    这是将代码连接到界面的关键部分。


    ![A441106_1_En_12_Fig10_HTML.jpg](img/A441106_1_En_12_Fig10_HTML.jpg)


    图 12-10


    将界面连接到代码


    如果你想排查连接问题，一种简单的方法是按住 Control 键点击故事板中相关的视图控制器，以调出如图 12-11 所示的视图控制器连接。


    ![A441106_1_En_12_Fig11_HTML.jpg](img/A441106_1_En_12_Fig11_HTML.jpg)


    图 12-11


    视图控制器连接


    探索界面及其元素，以熟悉构建 iOS 或 macOS 应用的这个关键部分。


    在第 11 章中介绍的代码是建立在用户界面之上的。此处为方便起见再次列出。清单 12-1 是发布通知的代码。

