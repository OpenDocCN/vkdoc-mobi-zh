- fmt: "### Recursion\n\nRecursion is another aspect of components you should know\
    \ about. If you have components that can be reused, they can reuse themselves.\
    \ This lets you write code that is structured and efficient. Be aware that if\
    \ not used carefully, it can cause problems. When you work with recursive code,\
    \ unless you find a way to stop the recursion, you can generate a form of infinite\
    \ loop that never ends in theory. In practice, it ends when the app runs out of\
    \ memory.\n\n> **Note**  \n> `Infinite Loop` is the name of the street on which\
    \ Apple’s Cupertino headquarters were located for many years. It is not an infinite\
    \ loop (you can see the entire thing if you stand on the street) but it definitely\
    \ is a loop. In 2017, Apple completed construction of its new main headquarters\
    \ near to `Infinite Loop`. The new headquarters is known as Apple Park.\n\n##\
    \ Building a Function in Swift\n\nIn talking about components, the terminology\
    \ in Swift uses `function` rather than `method`. In common usage, many people\
    \ do refer to these items as `methods` when they are part of a class (this is\
    \ a legacy from years of usage where the distinction mattered more than it does\
    \ now). The alternative terms (`subroutine` and `procedure`) are not used in Swift\
    \ today.\n\nA `function` consists of a name, inputs and outputs, and the code\
    \ itself. Here’s how to create a simple function in a Swift playground. This function\
    \ will compute an area based on two parameters (`length` and `width`).\n\nStart\
    \ by creating a new playground on an iPad as you see in Figure [10-1](#A441106_1_En_10_Chapter.html#Fig1).\
    \ (You can do the same steps on a playground in Xcode, but the interface is different\
    \ and less interactive.) The empty playground has suggestions for you in the bar\
    \ at the bottom of the screen. Among the top-level suggestions is `func` to create\
    \ a function.\n\n![A441106_1_En_10_Fig1_HTML.jpg](A441106_1_En_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1** Create a new playground\n\nTap `func`, and the shell of a function\
    \ is created for you by the playground as you see in Figure [10-2](#A441106_1_En_10_Chapter.html#Fig2).\n\
    \n![A441106_1_En_10_Fig2_HTML.jpg](A441106_1_En_10_Fig2_HTML.jpg)\n\n**Figure\
    \ 10-2** Start creating a function\n\n`Name` is highlighted in red suggesting\
    \ you should enter that first. The function body is highlighted in gray suggesting\
    \ that you attend to that next. Type in the name of the function — `area` — as\
    \ you see in Figure [10-3](#A441106_1_En_10_Chapter.html#Fig3). Tap the body of\
    \ the function and it is now highlighted in red for you to attend to.\n\n![A441106_1_En_10_Fig3_HTML.jpg](A441106_1_En_10_Fig3_HTML.jpg)\n\
    \n**Figure 10-3** Enter the function name\n\nThe next step would be to enter the\
    \ function body. There are several ways to do this. Chances are that no matter\
    \ which route you take, you will temporarily generate an error. (This is common\
    \ in development.)\n\nThe single line of code shown in Figure [10-4](#A441106_1_En_10_Chapter.html#Fig4)\
    \ will return the value of `length` multiplied by `width`. Neither variable has\
    \ a value so far, so you’ll generate an error (the red dot at the left).\n\n![A441106_1_En_10_Fig4_HTML.jpg](A441106_1_En_10_Fig4_HTML.jpg)\n\
    \n**Figure 10-4** Start building the body of the function\n\nOne way of setting\
    \ the values of `length` and `width` is to pass them into the function as you\
    \ see in Figure [10-5](#A441106_1_En_10_Chapter.html#Fig5). (Passing data in with\
    \ parameters rather than hard-coding it inside the function body makes your code\
    \ more reusable.)\n\nAs you have seen in several code snippets in the book, the\
    \ way to declare a variable is with a name and a type. Thus, you can declare a\
    \ `length` variable (the name) of type `Double` with:\n\n```\nlength: Double\n\
    ```\n\n`Double` is the preferred floating point type to use in Swift (rather than\
    \ `Float`).\n\n![A441106_1_En_10_Fig5_HTML.jpg](A441106_1_En_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5** Pass the parameters into the function\n\nAlthough the parameters\
    \ solve the problem of where to get the data, the function needs to indicate in\
    \ its declaration that a value will be returned. This is the error you see in\
    \ Figure [10-6](#A441106_1_En_10_Chapter.html#Fig6).\n\n![A441106_1_En_10_Fig6_HTML.jpg](A441106_1_En_10_Fig6_HTML.jpg)\n\
    \n**Figure 10-6** You must declare that a function will return a value\n\nYou\
    \ can complete the function declaration as you see in Figure [10-7](#A441106_1_En_10_Chapter.html#Fig7)\
    \ so that now it intends to return a value.\n\n![A441106_1_En_10_Fig7_HTML.jpg](A441106_1_En_10_Fig7_HTML.jpg)\n\
    \n**Figure 10-7** The complete function\n\nThe return value syntax is:\n\n```\n\
    -> Double\n```\n\nThis indicates that it is a return value of type `Double`.\n\
    \nIf you want, you can run the code. Nothing will happen, but, in fact, that is\
    \ fairly good: no errors appear.\n\nJust to recap the steps to build this small\
    \ function, here they are:\n\n- Tap `func` to create the shell\n- Name the function\n\
    - Name the parameters passed in and set their types\n- Name the return value\n\
    - Provide the body that computes the return value\n\nExcept for the first step\
    \ where you create the function shell, you can do these in any order. You’ll get\
    \ errors along the line either because you haven’t declared a variable before\
    \ using it or because you declare it and don’t use it. After a while, you’ll get\
    \ used to this sequence.\n\nYou can add a line of code to invoke the function.\
    \ You need to declare a variable and set it to the result of the function. Look\
    \ on the Shortcut Bar and you’ll find `let` (it’s just off the screen in Figure\
    \ [10-8](#A441106_1_En_10_Chapter.html#Fig8)). You often have to scroll along\
    \ the Shortcut Bar. Tap `let` and you’ll get the outline of code you need to use\
    \ as you see in Figure [10-8](#A441106_1_En_10_Chapter.html#Fig8).\n\n![A441106_1_En_10_Fig8_HTML.jpg](A441106_1_En_10_Fig8_HTML.jpg)\n\
    \n**Figure 10-8** Create a variable to use the function\n\nName the variable `result`\
    \ (or anything you want), and type in the name of the function as you seen in\
    \ Figure [10-9](#A441106_1_En_10_Chapter.html#Fig9). In the Shortcut Bar, the\
    \ Swift playground shows you the parameters (names and types).\n\n![A441106_1_En_10_Fig9_HTML.jpg](A441106_1_En_10_Fig9_HTML.jpg)\n\
    \n**Figure 10-9** Start to use the function\n\nTap on the parameters in the Shortcut\
    \ Bar, and they are filled in to your code as you see in Figure [10-10](#A441106_1_En_10_Chapter.html#Fig10).\
    \ The first one (`length`) is highlighted in red so that’s where you start. You\
    \ get the number popover because the playground knows you want to enter a number.\n\
    \n![A441106_1_En_10_Fig10_HTML.jpg](A441106_1_En_10_Fig10_HTML.jpg)\n\n**Figure\
    \ 10-10** Start entering the parameters\n\nYou’ll be guided through each of the\
    \ parameters with appropriate data entry tools as you see in Figure [10-11](#A441106_1_En_10_Chapter.html#Fig11).\n\
    \n![A441106_1_En_10_Fig11_HTML.jpg](A441106_1_En_10_Fig11_HTML.jpg)\n\n**Figure\
    \ 10-11** Enter all parameters\n\nYou can now tap Run My Code and see the results\
    \ as you see in Figure [10-12](#A441106_1_En_10_Chapter.html#Fig12).\n\n![A441106_1_En_10_Fig12_HTML.jpg](A441106_1_En_10_Fig12_HTML.jpg)\n\
    \n**Figure 10-12** Run your code and check the result in a viewer\n\n## Summary\n\
    \nThis chapter describes the reasons to use software components and shows you\
    \ how to construct them in Swift. You see how a Swift playground can walk you\
    \ through the process of building a function. You can also just type the code\
    \ into Xcode, but sometimes it’s easier to switch between Swift playgrounds and\
    \ Xcode.\n\nAll components have the same basic parts. Here they are presented\
    \ with the names that you see in a playground.\n\n- `name`\n- `inputs` (parameters)\n\
    - `outputs` (returned value)\n- `body` (code)"
  raw: '### Recursion


    Recursion is another aspect of components you should know about. If you have components
    that can be reused, they can reuse themselves. This lets you write code that is
    structured and efficient. Be aware that if not used carefully, it can cause problems.
    When you work with recursive code, unless you find a way to stop the recursion,
    you can generate a form of infinite loop that never ends in theory. In practice,
    it ends when the app runs out of memory.


    Note


    Infinite Loop is the name of the street on which Apple’s Cupertino headquarters
    were located for many years. It is not an infinite loop (you can see the entire
    thing if you stand on the street) but it definitely is a loop. In 2017, Apple
    completed construction of its new main headquarters near to Infinite Loop. The
    new headquarters is known as Apple Park.


    ## Building a Function in Swift


    In talking about components, the terminology in Swift uses function rather than
    method. In common usage, many people do refer to these items as methods when they
    are part of a class (this is a legacy from years of usage where the distinction
    mattered more than it does now). The alternative terms (subroutine and procedure)
    are not used in Swift today.


    A function consists of a name, inputs and outputs, and the code itself. Here’s
    how to create a simple function in a Swift playground. This function will compute
    an area based on two parameters (length and width).


    Start by creating a new playground on an iPad as you see in Figure [10-1](#A441106_1_En_10_Chapter.html#Fig1).
    (You can do the same steps on a playground in Xcode, but the interface is different
    and less interactive.) The empty playground has suggestions for you in the bar
    at the bottom of the screen. Among the top-level suggestions is `func` to create
    a function.


    ![A441106_1_En_10_Fig1_HTML.jpg](A441106_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    Create a new playground


    Tap `func` , and the shell of a function is created for you by the playground
    as you see in Figure [10-2](#A441106_1_En_10_Chapter.html#Fig2).


    ![A441106_1_En_10_Fig2_HTML.jpg](A441106_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Start creating a function


    `Name` is highlighted in red suggesting you should enter that first. The function
    body is highlighted in gray suggesting that you attend to that next. Type in the
    name of the function — `area` — as you see in Figure [10-3](#A441106_1_En_10_Chapter.html#Fig3).
    Tap the body of the function and it is now highlighted in red for you to attend
    to.


    ![A441106_1_En_10_Fig3_HTML.jpg](A441106_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Enter the function name


    The next step would be to enter the function body . There are several ways to
    do this. Chances are that no matter which route you take, you will temporarily
    generate an error. (This is common in development.)


    The single line of code shown in Figure [10-4](#A441106_1_En_10_Chapter.html#Fig4)
    will return the value of `length` multiplied by `width`. Neither variable has
    a value so far, so you’ll generate an error (the red dot at the left).


    ![A441106_1_En_10_Fig4_HTML.jpg](A441106_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Start building the body of the function


    One way of setting the values of length and width is to pass them into the function
    as you see in Figure [10-5](#A441106_1_En_10_Chapter.html#Fig5). (Passing data
    in with parameters rather than hard-coding it inside the function body makes your
    code more reusable.)


    As you have seen in several code snippets in the book, the way to declare a variable
    is with a name and a type. Thus, you can declare a `length` variable (the name)
    of type `Double` with


    ```

    length: Double

    ```


    Double is the preferred floating point type to use in Swift (rather than Float).


    ![A441106_1_En_10_Fig5_HTML.jpg](A441106_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Pass the parameters into the function


    Although the parameters solve the problem of where to get the data, the function
    needs to indicate in its declaration that a value will be returned. This is the
    error you see in Figure [10-6](#A441106_1_En_10_Chapter.html#Fig6).


    ![A441106_1_En_10_Fig6_HTML.jpg](A441106_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    You must declare that a function will return a value


    You can complete the function declaration as you see in Figure [10-7](#A441106_1_En_10_Chapter.html#Fig7)
    so that now it intends to return a value.


    ![A441106_1_En_10_Fig7_HTML.jpg](A441106_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    The complete function


    The return value syntax is


    ```

    -> Double

    ```


    This indicates that it is a return value of type `Double`.


    If you want, you can run the code. Nothing will happen, but, in fact, that is
    fairly good: no errors appear.


    Just to recap the steps to build this small function, here they are:


    *   Tap `func` to create the shell

    *   Name the function

    *   Name the parameters passed in and set their types

    *   Name the return value

    *   Provide the body that computes the return value


    Except for the first step where you create the function shell, you can do these
    in any order. You’ll get errors along the line either because you haven’t declared
    a variable before using it or because you declare it and don’t use it. After a
    while, you’ll get used to this sequence.


    You can add a line of code to invoke the function. You need to declare a variable
    and set it to the result of the function. Look on the Shortcut Bar and you’ll
    find `let` (it’s just off the screen in Figure [10-8](#A441106_1_En_10_Chapter.html#Fig8)).
    You often have to scroll along the Shortcut Bar. Tap `let` and you’ll get the
    outline of code you need to use as you see in Figure [10-8](#A441106_1_En_10_Chapter.html#Fig8).


    ![A441106_1_En_10_Fig8_HTML.jpg](A441106_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Create a variable to use the function


    Name the variable result (or anything you want), and type in the name of the function
    as you seen in Figure [10-9](#A441106_1_En_10_Chapter.html#Fig9). In the Shortcut
    Bar, the Swift playground shows you the parameters (names and types).


    ![A441106_1_En_10_Fig9_HTML.jpg](A441106_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Start to use the function


    Tap on the parameters in the Shortcut Bar, and they are filled in to your code
    as you see in Figure [10-10](#A441106_1_En_10_Chapter.html#Fig10). The first one
    (`length`) is highlighted in red so that’s where you start. You get the number
    popover because the playground knows you want to enter a number.


    ![A441106_1_En_10_Fig10_HTML.jpg](A441106_1_En_10_Fig10_HTML.jpg)


    Figure 10-10


    Start entering the parameters


    You’ll be guided through each of the parameters with appropriate data entry tools
    as you see in Figure [10-11](#A441106_1_En_10_Chapter.html#Fig11).


    ![A441106_1_En_10_Fig11_HTML.jpg](A441106_1_En_10_Fig11_HTML.jpg)


    Figure 10-11


    Enter all parameters


    You can now tap Run My Code and see the results as you see in Figure [10-12](#A441106_1_En_10_Chapter.html#Fig12).


    ![A441106_1_En_10_Fig12_HTML.jpg](A441106_1_En_10_Fig12_HTML.jpg)


    Figure 10-12


    Run your code and check the result in a viewer


    ## Summary


    This chapter describes the reasons to use software components and shows you how
    to construct them in Swift. You see how a Swift playground can walk you through
    the process of building a function. You can also just type the code into Xcode,
    but sometimes it’s easier to switch between Swift playgrounds and Xcode.


    All components have the same basic parts. Here they are presented with the names
    that you see in a playground.


    *   name

    *   inputs (parameters)

    *   outputs (returned value)

    *   body (code)'
  trans: "\n### 递归\n\n递归是组件中另一个你需要了解的方面。如果你拥有可复用的组件，它们可以调用自身。这让你能够编写结构清晰且高效的代码。请注意，如果使用不当，可能会导致问题。在处理递归代码时，除非你能找到停止递归的方法，否则可能会生成一种理论上永不结束的无限循环。在实践中，当应用耗尽内存时，循环才会结束。\n\
    \n> **注意**  \n> `Infinite Loop` 是苹果公司库比蒂诺总部多年所在地的那条街道的名字。它并非一个无限循环（如果你站在那条街上，可以看到它的全貌），但它确实是一个循环。2017\
    \ 年，苹果公司在靠近 `Infinite Loop` 的地方完成了其新主总部的建设。这个新总部就是众所周知的 Apple Park。\n\n## 在 Swift\
    \ 中构建函数\n\n在讨论组件时，Swift 中的术语使用 `function` 而不是 `method`。在常见的用法中，当这些条目作为类的一部分时，许多人仍会称其为\
    \ `methods`（这是多年使用习惯的遗留问题，过去这种区别比现在更重要）。替代术语（`subroutine` 和 `procedure`）如今在 Swift\
    \ 中已不再使用。\n\n一个 `function` 由名称、输入、输出以及代码本身组成。以下是在 Swift playground 中创建一个简单函数的方法。这个函数将基于两个参数（`length`\
    \ 和 `width`）来计算面积。\n\n首先，在你的 iPad 上创建一个新的 playground，如图 10-1 所示。（你可以在 Xcode 的\
    \ playground 中执行相同步骤，但界面不同且交互性较差。）空白的 playground 在屏幕底部的工具栏中为你提供了一些建议。其中顶层的建议之一是用于创建函数的\
    \ `func`。\n\n![A441106_1_En_10_Fig1_HTML.jpg](img/A441106_1_En_10_Fig1_HTML.jpg)\n\
    \n**图 10-1** 创建一个新的 playground\n\n点击 `func`，playground 会为你创建一个函数框架，如图 10-2 所示。\n\
    \n![A441106_1_En_10_Fig2_HTML.jpg](img/A441106_1_En_10_Fig2_HTML.jpg)\n\n**图 10-2**\
    \ 开始创建一个函数\n\n`Name` 会被红色高亮显示，提示你应首先输入该项。函数体则被灰色高亮显示，提示你接下来处理这个部分。输入函数名称——`area`——如图\
    \ 10-3 所示。点击函数体，它现在会被红色高亮显示，等待你处理。\n\n![A441106_1_En_10_Fig3_HTML.jpg](img/A441106_1_En_10_Fig3_HTML.jpg)\n\
    \n**图 10-3** 输入函数名称\n\n下一步是输入函数体。有几种方法可以做到这一点。无论你选择哪种方式，都有可能暂时产生一个错误。（这在开发中很常见。）\n\
    \n图 10-4 中展示的这单行代码将返回 `length` 乘以 `width` 的值。迄今为止这两个变量都没有值，因此你将产生一个错误（左侧的红点）。\n\
    \n![A441106_1_En_10_Fig4_HTML.jpg](img/A441106_1_En_10_Fig4_HTML.jpg)\n\n**图 10-4**\
    \ 开始构建函数体\n\n设置 `length` 和 `width` 值的一种方法是将它们作为参数传递给函数，如图 10-5 所示。（通过参数传递数据，而不是在函数体内硬编码，能使你的代码更具可复用性。）\n\
    \n正如你在本书的几个代码片段中看到的那样，声明变量的方法是使用名称和类型。因此，你可以声明一个类型为 `Double` 的 `length` 变量（名称），方法如下：\n\
    \n```\nlength: Double\n```\n\n`Double` 是 Swift 中首选的浮点类型（相比 `Float` 而言）。\n\n![A441106_1_En_10_Fig5_HTML.jpg](img/A441106_1_En_10_Fig5_HTML.jpg)\n\
