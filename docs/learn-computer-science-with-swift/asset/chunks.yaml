  trans: '

    ### 项目将在何处运行？


    尽管软件可能是虚拟的，但它需要运行在设备上。关于项目运行位置，你需要做出两个主要决定。如果项目涉及需要集中存储的数据，通常的做法是将其托管在 Web 服务器上；应用程序和网站可以通过通用的
    `REST` 协议访问这些数据。这种存储通常需要付费，但一般价格较为合理。当然，如果你的项目是针对已有网络存储资源的组织（如公司、大学或私营企业），你可能无需为此担忧。


    诸如亚马逊云服务（Amazon Web Services）、Azure 和 IBM 等云平台，让你能够轻松使用和配置云存储。这些平台旨在快速响应客户端存储需求的突发增长（或缩减）。


    如果你在开发一个应用，则需要决定它将在哪个平台上运行。目前，主要有四大移动平台：


    -   iOS

    -   Android

    -   Windows

    -   网页（Web）


    某些应用（如在线银行应用）必须在所有平台上运行，而其他应用可能只需在一个平台上运行。在许多情况下，会先选定一个平台作为起点（这类似于最小可行产品的变体）。应用上线后，就可以收集反馈，并在必要时为项目的后续开发争取更多支持。


    微软的 `Xamarin` 产品吸引了许多人的兴趣。它基于 `.NET` 和 `C#`，目标是实现“一次编写，随处运行”的理想，让你编写的代码能够运行在 iOS、Android、Windows
    或 macOS 上。这类策略面临的挑战是，当目标系统进行修改时，像 `Xamarin` 这样的整合系统往往会更新滞后。对许多应用场景来说，这是一种非常有用的工作方式；而对另一些场景而言，缺乏对最新原生操作系统功能的及时支持则是一个严重问题。


    无论你持何种观点，如果你想在计算机科学领域为同事和客户提供指导，就必须理解跨平台和多平台的相关问题。


    ### 你将如何得知结果？


    如果你已经决定了要做什么、为谁而做、为什么做，以及何时何地使用，那么计算机科学项目的计划就差不多拟定了。剩下的就是确定如何衡量项目的状态和成功与否。


    有趣的是，这个对许多人来说看似显而易见的问题，回答起来却和第一个问题（要做什么？）一样困难。再次说明，在非数字化世界中，因为你可以看到劳动成果，所以这个问题并不那么重要。你可以衡量应用的销量或下载量，但这是你想要的吗？如果你开发的应用程序旨在提高实体店的销售额，那么应用下载量远不如店内销售额重要。如果你正在构建一个假日礼品数据库，最直接的衡量指标就是这些礼品的销售量。网络上充斥着电商网站上被遗弃的购物车（一个常被引用的数据是大约
    67%的购物车被遗弃，但这是 2014 年的数据，在线购物网站正在尝试通过新的界面工具来降低这个数字）。


    像应用商店（App Store）这样的在线应用分发平台，其主要优势在于能产生海量数据（你可以在 App Annie —— [`https://www.appannie.com`](https://www.appannie.com)
    上找到大量数据）。许多人认为这些数据极其有用，但如果你真想好好利用它们，请查看应用商店能提供给你的数据，以及其他像 App Annie 这样的指标，以及网站和数据库的访客数据。了解可用的数据，并提前规划你的结果分析策略。不要等到拿到数据后才决定如何处理：从一开始就建立你的分析体系。


    这样，你就能追踪你的成果。


    ## 本章小结


    本章展示了计算机科学如何融入你在其他学科领域从事的项目。随着应用世界的发展（请记住，应用商店于 2008 年 7 月才开放，距本书写作时不到十年），人们期望掌握计算机科学的人既了解技术，也懂得应用技术的方法。


    # 14. 图形与可视化技术及问题


    你在第 11 章和第 12 章中看到了代码、`Xcode` 和故事板的示例。在这些例子以及本书其他章节的 Swift Playground 中，你可以看到代码、设计原则和实现原理。本章的不同之处在于，它并非专注于如何做某件事，而是逐步讲解一个真实的实施问题与解决方案的序列。你可以看到一个界面的演变过程，以及如何不仅将其视为一幅美观的图片，而是视作一种用于传达信息、帮助人们使用并从中受益的实用工具。


    ## 介绍 Utility Smart


    本章的案例研究是真实的。它追溯了 Utility Smart 界面的演变过程，这是一款旨在帮助人们认识其使用的自然资源并适度使用这些资源的应用程序。


    这个应用源于一个简单的想法：向用户提出关于他们近期资源使用情况的问题，并让他们通过滑块来回答。应用内包含一些可供用户浏览的背景信息以获取更多知识，但应用的核心是那些滑块。


    数据保存在设备上，可以绘制成图表。数据可以通过电子邮件和 `AirDrop` 等多种技术进行共享。该应用由 Jesse Feiler 使用 `Swift`
    和 `Cocoa Touch` 构建。Utility Smart 项目由纽约州立大学普拉茨堡分校地球与环境科学中心的 Curt Gervich 教授领导。（如果你想看到它的实际效果，可以从
    App Store 免费下载，地址为 [`http://bit.ly/UtilitySmart`](http://bit.ly/UtilitySmart)。）

