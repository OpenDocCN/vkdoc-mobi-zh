    of data. Just as you can enter data values into actions (as in `printf ("hello,
    world")` or use a variable as in Listing [2-2](#A441106_1_En_2_Chapter.html#Par16),
    you can use a collection of data for the action to act on.


    ## What Happens Behind the Code


