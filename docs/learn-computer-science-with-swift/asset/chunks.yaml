  trans: '

    ### 对象


    面向对象编程通常可追溯至 1967 年的 `Simula` 编程语言。如今，它在多数（即便不是大多数）开发流程中都有应用。简而言之，面向对象编程使用将数据与功能融为一体的对象，这些对象作为独立且功能完备的构建模块，用于构建应用程序。


    算法可以为对象、其方法及数据的开发提供指导。通常，算法是开发过程的一部分，正如它们在完整的应用程序中那样。对象很少只由算法的实现构成：这一角色更常由函数来承担。


    ### 设计模式


    设计模式有时会与函数和算法一同被考量。通常来说，术语“设计模式”指的是可用于实现某算法的一种结构。


    算法的关键概念之一是其定义的步骤。设计模式是声明式编程的一个特征，在声明式编程中，初始状态和期望的最终状态是声明好的，但具体的步骤并不属于设计模式的一部分。这种与声明式编程相对的编程方式常被称为命令式编程。


    ### 在 Swift 中实现数字命理学算法


    基本的数字命理学算法已在本章前面部分描述过。在本节中，你将看到将其转换为代码的其中一种方法。


    **注意**


    你会在本书中看到其他几种实现数字命理学算法（及其他算法）的方法。


    基本上，该算法有两个步骤：


    - 将姓名（或其他字符串）中的每个字母转换为数字。

    - 将所有数字相加。


    对该算法的讨论已经确定了一些需要在实现中解决的待定问题。这是很常见的：算法指明了要遵循的步骤，但通常不包含代码，并且可能包含对外部问题和事项的引用，这些问题和事项需要在实现该算法时加以解决。


    最需要考虑的一点是，将字母转换为数字是基于其在英文字母表中的位置（1 到 26），还是仅使用 1 到 10 的数字（如果你用手指计数，这或许有用）。在第一种方法中，字母
    K 对应 11，但在第二种方法中，它对应 1。


    为了实现该算法，你需要知道该选择哪一种方法。在实现这个算法以及任何其他算法时，通常的做法是审视这些选择，并尽可能构建一个通用的实现，使其能适用于任何一种选择。算法实现的通用性越强，该实现就越有可能被复用。


    该算法的核心必须是字母到数字的转换机制。为了建立该机制，你需要知道使用哪种编号方案（1-26 或 1-10）。此外，一旦你开始思考，你就需要考虑将要转换的字母。软件中的字符可以是大写字母或小写字母。当我们提到字母
    J 时，通常既指 J（大写）也指 j（小写）。在将字母转换为数字时，我们需要知道处理的是大写字母还是小写字母。


    这些就是你在开始分析算法以便实现它时会遇到的各种问题。请注意，用英语描述的算法并未区分大写和小写字母。这类细节通常在实现阶段才会出现。


    **提示**


    大写和小写字母是不同的。字符的样式（斜体、粗体、下划线等）应用于字符。应用程序中可使用的字母表中的每个字母和符号都有一个数字值（旧术语中常称为 ASCII
    码）。这个数值与数字命理学中的值不同。例如，大写字母 A 通常的数字值是 65，而小写字母 a 是 97。无论字母应用何种样式，这些数字都是相同的。


    这些都是为了实现算法而需要解决的通用且抽象的问题。有时，在开始任何实现工作之前，进行此类澄清是可能甚至必要的。在其他情况下（并且对于像本例这样只有几个步骤的简单算法来说，这种情况经常发生），你可以分别实现每个步骤。你最终可能会稍微修改算法的自然语言描述，以明确一个步骤的输出如何被用于后续步骤，这样你就不必担心单独实现每个步骤了。


    只要有足够的人力和其它资源，你甚至可以按不同顺序或同时实现这些步骤。

    '
- fmt: '### Implementing the Number Table


    Frequently an algorithm has a step in which one type of data is transformed into
    another type. In this case, a specific letter of the alphabet needs to be transformed
    into a number that represents its sequence in the alphabet - possibly using only
    the numbers 1-10.


    There are two common ways of doing such a conversion:


    *   In some cases, there is a computation that will do the transformation.

    *   In other cases, you need to look up the transformed value from a table that
    is stored.


    The trade-off here is a common one. Do you store the conversion table before you
    need it (possibly as part of the app code), or do you calculate it? The trade-off
    is between runtime processing on an as-needed basis and data storage that is dedicated
    to the data on a permanent basis.


    In this case, the storage approach is easiest. First of all, there isn''t a clear
    calculation that can be used for an as-needed conversion. Beyond that, the amount
    of data to be stored is so small that you won''t have difficulty storing it even
    on the smallest device.


    Having decided to store the data, the question for the implementation is How?
    Swift can interact with a variety of databases, but, like most programming languages,
    it has a variety of language elements that are used to store and manage data.
    These include sets, arrays, and dictionaries, which are described more fully in
    Chapter [6](#A441106_1_En_6_Chapter.html), "Working with Data: Collections." This
    implementation of numerology numbers will serve as an introduction to Swift dictionaries,
    the mechanism used in this implementation.


    A Swift dictionary is an associative array. Arrays themselves are collections
    of ordered data such as the name of each student in a class. Each item (student)
    in the collection is identified by a number. This allows you to access the appropriate
    item as you need to. It also lets you loop through all of the items by referring
    to their numbers (they are called index numbers or indexes). If you delete an
    item from an array, the other items are moved up. In other words, if you delete
    item 8, item 9 becomes item 8. The index numbers vary over time for each specific
    item.


    An associative array doesn''t use index numbers: Instead, it uses a key - often
    a string - to identify each item. Thus, if you use the string "eight" to identify
    an item in an associative array, that is and will remain the key for that item.
    In an array the items might be numbered 7, 8, 9, and if you delete item 8 you
    will have 7 and 8 because 8 is deleted and 9 becomes 8. In an associative array,
    if your keys are "seven," "eight," and "nine," and you delete "eight," you will
    have "seven" and "nine." (In other languages, associative arrays may be called
    hashes, hash tables, or maps.)


    **Tip**


    This a trade-off between storage and processing. You will find some old documentation
    and practitioners who argue that the cost of the computation to look up each key
    at runtime slows down the app. Logically it does, but with today''s processors,
    that "delay" is unlikely to be meaningful. Write for today''s devices!


    Swift dictionaries consist of pairs of keys and values. The keys can be any type,
    but often are strings. The values can be any type that conforms to the `Hashable`
    protocol. (This is described in Chapter [6](#A441106_1_En_6_Chapter.html).) The
    value can be any type that you choose, but it must be same for all entries in
    the dictionary. However, you can use types such as `AnyObject` for the values,
    which give you a lot of leeway.


    You can begin by declaring a variable of numerology numbers for each letter of
    the alphabet. Listing [4-1](#A441106_1_En_4_Chapter.html#Par64) shows what that
    might look like. In a declaration of a dictionary in Swift, the key/value pairs
    are shown separated by a colon. The entire list is enclosed in square brackets.
    (Note that, as you see in Chapter [6](#A441106_1_En_6_Chapter.html), you can add
    or delete dictionary entries.)


    ```

    let numbers = [

    "a" : 1,

    "b" : 2,

    "c" : 3,

    "d" : 4,

    "e" : 5,

    "f" : 6,

    "g" : 7,

    "h" : 8,

    "i" : 9,

    "j" : 10,

    "k" : 11,

    "l" : 12,

    "m" : 13,

    "n" : 14,

    "o" : 15,

    "p" : 16,

    "q" : 17,

    "r" : 18,

    "s" : 19,

    "t" : 20,

    "u" : 21,

    "v" : 22,

    "w" : 23,

    "x" : 24,

    "y" : 25,

    "z" : 26

    ]

    Listing 4-1

    Numerology dictionary

    ```


    To access the value for a specific key, you can use code such as this:


    ```

    numbers["y"]

    ```


    In an array, each index has a data element (you cannot access an index beyond
    the bounds of the array, but otherwise you can access any element). In a dictionary,
    the keys do not change as you add or delete data. This means that the key "y"
    might have no value associated with it. Therefore, when you access a key in a
    dictionary, Swift returns an optional value that might be null. You can test to
    see if it is null, or you can unwrap it with `?` or `!`. (Find out more in the
    section, "Handling Data That Isn''t There (Optionals)," in Chapter [7](#A441106_1_En_7_Chapter.html).)


    The dictionary structure can help you answer the question of upper- and lowercase
    letters. Although keys must be unique, values do not need to be. Thus, you can
    create a dictionary with both upper- and lowercase letters for keys as you see
    in Listing [4-2](#A441106_1_En_4_Chapter.html#Par69).


    ```

    let numbers = [

    "a" : 1,

    "A" : 1,

    "b" : 2,

    "B" : 2,

    "c" : 3,

    "C" : 3,

    "d" : 4,

    "D" : 4,

    "e" : 5,

    "E" : 5,

    "f" : 6,

    "F" : 6,

    "g" : 7,

    "G" : 7,

    "h" : 8,

    "H" : 8,

    "i" : 9,

    "I" : 9,

    "j" : 10,

    "J" : 10,

    "k" : 11,

    "K" : 11,

    "l" : 12,

    "L" : 12,

    "m" : 13,

    "M" : 13,

    "n" : 14,

    "N" : 14,

    "o" : 15,

    "O" : 15,

    "p" : 16,

    "P" : 16,

    "q" : 17,

    "Q" : 17,

    "r" : 18,

    "R" : 18,

    "s" : 19,

    "S" : 19,

    "t" : 20,

    "T" : 20,

    "u" : 21,

    "U" : 21,

    "v" : 22,

    "V" : 22,

    "w" : 23,

    "W" : 23,

    "x" : 24,

    "X" : 24,

    "y" : 25,

    "Y" : 25,

    "z" : 26,

    "Z" : 26

    ]

    Listing 4-2

    Add uppercase letters

    ```


    If you want to unwrap the element, you can use code such as this:


    ```

    print ("j force unwrapped: ", numbers["j"]!)

    ```


    If you want to use a better and safer method, use the conditional cast operator
    (`as?`) as you see here:


    ```

    if let myValue = numbers ["r"] as? Int {

    print ("myValue = ", myValue)

    } else {

    print ("no value")

    }

    ```


    The results are shown in Figure [4-1](#A441106_1_En_4_Chapter.html#Fig1).


    ![A441106_1_En_4_Fig1_HTML.jpg](A441106_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Testing the dictionary


    Note in the sidebar that the Swift playground distinguishes between optionals,
    forced unwrapped values, and values themselves.'
