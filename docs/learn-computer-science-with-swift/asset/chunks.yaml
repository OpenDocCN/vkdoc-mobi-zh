    Using an optional


    Even if a variable is declared as optional, you can see set its value. Thereafter,
    if it is tested to see if it is nil, it will not be nil because it has a value
    as you see in Figure [9-7](#A441106_1_En_9_Chapter.html#Fig7). In Figure [9-7](#A441106_1_En_9_Chapter.html#Fig7),
    you can see that the debug pane shows the unwrapped value as an optional.


