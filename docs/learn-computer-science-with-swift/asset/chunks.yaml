  trans: '

    ### 创建弹出框：故事板


    在故事板中，添加一个新的视图控制器，如图 14-8 所示。在图 14-8 中，它包含一个标题（标签）和一个文本视图。选中它，然后选择实用工具区域中的“尺寸检查器”。将其设置为自由形态。对于弹出框来说，300x400
    的尺寸是一个不错的起点。


    从视图控制器按住 Control 拖拽到弹出框，以创建一个转场。


    ![A441106_1_En_14_Fig8_HTML.jpg](img/A441106_1_En_14_Fig8_HTML.jpg)


    图 14-8


    设置弹出框尺寸


    接下来，高亮显示你创建好的转场，如图 14-9 所示。


    ![A441106_1_En_14_Fig9_HTML.jpg](img/A441106_1_En_14_Fig9_HTML.jpg)


    图 14-9


    为转场命名


    高亮选中转场后，点击“属性检查器”并为其命名。该名称必须与 `prepareForSegue` 代码中的名称一致——在此示例中为 `tipPopoverSegue`。


    这样即可为你创建好弹出框。


    ## 总结


    可视化和界面创建的最佳解决方案是通过迭代过程，并尽可能多地收集各方意见。有一点需要注意：不要直接询问界面建议，因为人们会根据他们见过的其他东西来回答你。观察他们的实际操作和尝试，留意他们感到困惑的地方。如果你与他们交流，请围绕操作和意义展开讨论：你的职责是弄清楚界面应该呈现成什么样。

    '
