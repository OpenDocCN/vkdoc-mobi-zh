- fmt: "### Declaring and Creating Arrays\n\nIn languages such as Swift, you must\
    \ declare variables before you use them. (This is different from languages such\
    \ as PHP in which you can create variables as you need them just by using them.)\n\
    \nArrays are no different from any other symbols in Swift: you declare them before\
    \ you use them. Declarations of variables include their name along with a modifier\
    \ that determines if the variables is modifiable (`var`) or not (`let`).\n\nBecause\
    \ an array is typed, you commonly declare it with its type. There are two forms\
    \ of syntax you can use.\n\nThe first method is to simply declare the array type\
    \ as in:\n\n```\nArray\n```\n\nYou can also declare a variable with both a name\
    \ and a type that will be an array using syntax such as this:\n\n```\nvar intArray:[Int]\n\
    ```\n\nThis is a normal declaration; the type following the colon is an array\
    \ of `Int`s.\n\nThis is just the declaration. If you attempt to use it you will\
    \ get an error message that it has not been initialized. Remember that there are\
    \ two steps to creating and using a variable or constant: the declaration must\
    \ be followed by initialization.\n\nYou can initialize an array just as you would\
    \ initialize an instance of a class or other elements in Swift. You add `()` after\
    \ the name. This code initializes the array:\n\n```\nintArray = [Int]()\n```\n\
    \nYou can declare, initialize, and print out the array in a Swift playground as\
    \ you see in Figure [6-1](#A441106_1_En_6_Chapter.html#Fig1).\n\n![A441106_1_En_6_Fig1_HTML.jpg](A441106_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nDeclare and initialize an array\n\nElements of an array are enclosed\
    \ in square brackets. In Figure [6-1](#A441106_1_En_6_Chapter.html#Fig1), you\
    \ can see that the array is empty. It is an opening and closing bracket. With\
    \ additional spacing, here is what the array looks like:\n\n```\n[    ]\n```\n\
    \nYou can combine the declaration and initialization of an array with the following\
    \ syntax:\n\n```\nvar intArray2 = [Int]()\n```\n\nFigure [6-2](#A441106_1_En_6_Chapter.html#Fig2)\
    \ shows this syntax in action. As you can see, once again you have created an\
    \ empty array. (The debug area at the bottom of the window is the best place to\
    \ see that the results are identical.)\n\n![A441106_1_En_6_Fig2_HTML.jpg](A441106_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nDeclare and initialize an array in one line of code\n\nThis style\
    \ is called initializer syntax.\n\nAnother way of declaring and creating an array\
    \ is with an array literal: that is, with the literal elements of the array. In\
    \ this style, you declare the array with its type;\n\n```\nvar intArray3 : [Int]\n\
    ```\n\nThen, to create the array you simply list the elements in square brackets:\n\
    \n```\nvar intArray3 : [Int] = [2, 3, 5, 7, 11]\n```\n\nYou see this in Figure\
    \ [6-3](#A441106_1_En_6_Chapter.html#Fig3).\n\n![A441106_1_En_6_Fig3_HTML.jpg](A441106_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\n\nDeclare and initialize an array with literals\n\nWhen you declare\
    \ an array with literals, Swift can infer the type of the array from the literals\
    \ you provide.\n\n### Modifying a `var` array\n\nThere are three ways you can\
    \ modify a `var` array:\n\n- You can modify the array structure itself. That is,\
    \ you can add or delete elements from the array.\n- You can modify the elements\
    \ themselves so that they contain different data values but the number of elements\
    \ remains the same.\n- You can also do both.\n\nIn some languages the two types\
    \ of modification are treated differently. You can see this in the `UITableViewController`\
    \ class of iOS and in apps that use it.\n\nFigure [6-4](#A441106_1_En_6_Chapter.html#Fig4)\
    \ shows the default behavior of `UITableViewController`. At the left, you see\
    \ a table view with rows grouped into sections; each section has a header with\
    \ a gray background. An Edit button is placed at the right of the navigation bar\
    \ at the top of the view. If you tap the Edit button, the view switches to editing\
    \ mode (specifically, it calls the `setEditing` function in which you actually\
    \ handle the transition to and from edit mode for your app and its data). In editing\
    \ mode (shown on the right), each row has a red button at the left that lets you\
    \ delete it. The developer can add a + button at the top right to add a row. In\
    \ some uses, the rows can be rearranged.\n\n> **Note**  \n> The screenshots in\
    \ this section are from The Nonprofit Risk App on the App Store at [`https://itunes.apple.com/us/app/np-risk/id1262903630?ls=1&mt=8`](https://itunes.apple.com/us/app/np-risk/id1262903630?ls=1&mt=8).\n\
    \nAll of these operations modify the array and its structure: they do not affect\
    \ the array’s data. Although, if a row is deleted, its data is deleted so in that\
    \ case the data is modified. The typical implementation of this type of interface\
    \ provides for the editing of the array itself as shown in Figure [6-4](#A441106_1_En_6_Chapter.html#Fig4),\
    \ which shows the table view on the left and the table view in edit mode on the\
    \ right. If you tap on an item in the list you then move to the detail data for\
    \ that item as you see in Figure [6-5](#A441106_1_En_6_Chapter.html#Fig6). Note\
    \ that there is a new Edit button at the top right of the detail view. This controls\
    \ editing of the detail view - the content of the array elements.\n\n![A441106_1_En_6_Fig5_HTML.jpg](A441106_1_En_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5\n\nEditing the detail data of an array element\n\n![A441106_1_En_6_Fig4_HTML.jpg](A441106_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\n(left) Table view and (right) Table view in edit mode\n\n### Multi-Dimensional\
    \ Arrays\n\nArrays often have more than one dimension. A two-dimensional array\
    \ can handle data from a spreadsheet very easily. Such an array has two indexes\
    \ - one for rows and one for columns. Arrays can have a number of dimensions in\
    \ most languages.\n\nFor example, you could have an array representing customer\
    \ transactions. The first dimension might be customer data (name and address for\
    \ example). The next dimension might be for individual transactions (with a date\
    \ and amount). Then it might follow the dimension of payments. You can’t do this\
    \ in Swift, and, as you start thinking about it, you may find it difficult to\
    \ manage the multiple dimensions.\n\nIn any language, this kind of multi-dimensional\
    \ array quickly becomes unwieldy. We have other data structures that can more\
    \ easily handle this type of data. In Swift, you’ll find other types of collections\
    \ such as sets and dictionaries that can organize data into specific types of\
    \ collections. The single dimension of a Swift array can itself contain other\
    \ arrays, dictionaries, or sets; that dimension could also contain tuples that\
    \ are yet another way of organizing data within a single entity which can be stored\
    \ in an array. (Tuples are discussed in the following chapter.)\n\nSo don’t let\
    \ the one-dimensional aspect of Swift arrays trouble you until you have seen these\
    \ other features of the language."
