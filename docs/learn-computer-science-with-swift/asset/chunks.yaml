- fmt: '# Structured Programming


    Historically, the first major programming paradigm was structured programming
    in the late 1950s with the `ALGOL` language. From the very earliest days of programming,
    it was possible to interrupt the line-after-line flow of control in a program
    by testing some condition with an `if` statement. Depending on the result, the
    program could go to one specific line of code or another one. Lines of code were
    numbered, so the control could pass to line number X or line number Y depending
    on the outcome of the test. Because they were used to control the program’s flow,
    line numbers were important parts of the code itself, and that started to become
    a problem. In the simplest case, if you wanted to insert a new line between lines
    `22` and `23`, you wound up having to renumber everything, and that meant that
    a statement transferring control to line `3825` might have to be renumbered to
    `3826`. Line numbering was one of the first problems that structured programming
    addressed.


    Beyond that, a proliferation of `go to` statements (or `if` statements that functioned
    as `go to` statements) led to a mess of code that quickly became difficult to
    understand and maintain. The problem is suggested in the common name for the problem:
    spaghetti code.


    One way to get rid of spaghetti code and line numbers is to collect one or more
    lines of code into a block that can be identified by name. Thus, instead of writing
    `goto line 43`, a developer could write `goto computeBalance` or, depending on
    the language, `perform computeBalance` or `call computeBalance` and the like.
    This code is much easier to read and maintain.


    By the 1970s, structured programming was generally considered to be the preferred
    way of writing code. However, much old code existed and still exists today, so
    you should not be surprised to encounter `goto` statements in code that you are
    reading.


    Line numbers are still used in some code, but by now, line numbers are generally
    considered formatting rather than part of the code. When you use playgrounds with
    Xcode on macOS, you’ll find a line number option to show or hide line numbers
    in `Xcode ➤ Preferences ➤ Text Editing` as you see in Figure [3-1](#A441106_1_En_3_Chapter.html#Fig1).


    ![A441106_1_En_3_Fig1_HTML.jpg](A441106_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Set line number preferences in Xcode Note


    Line numbers are so frowned upon today that while you can show or hide them in
    Xcode, you cannot show them in Swift Playgrounds on iPad. The same playground
    that can show line numbers on macOS will not show them on your iPad.


    Structured programming is a style of programming: you can write structured code
    in most programming languages.


    # Object-Oriented Programming


    Like structured programming, object-oriented programming arose in the late 1950s.
    The blocks of code that were introduced in languages such as `ALGOL` were refined
    to become, in essence, small programs themselves. A program consists of instructions
    as well as data. Objects in object-oriented programming are basically the same:
    instructions and data. The biggest difference is that these objects can be inside
    an app or program. In OOP (the abbreviation for object-oriented programming),
    instructions in an object are methods and the data consists of fields. Methods
    themselves are structured blocks of code, which, themselves, can contain blocks
    of various sorts.


    Furthermore, objects can inherit. They often represent real-world concepts. For
    example, you can create an object that represents a building. It can contain data
    such as an address and, perhaps, the dimensions of the building. It may also contain
    instructions in the form of methods such as one to calculate the square footage
    of the building.


    Typically, an object is a runtime construct. The code that describes it (that
    is, the descriptions of the methods and fields) is a class. A class is instantiated
    as an actual object at runtime, and that runtime object is referred to as an instance.
    The instance has a memory location. A class can have many instances. For example,
    there may be thousands of building instances in an app that works with a city.


    Classes can inherit from one another. A class with its methods and functions can
    be subclassed. The subclass has all of the data and functionality of the base
    class, but it can add its own data and functionality. Thus a building class might
    have a subclass of a house or a shop. All instances of house or shop would have
    dimensions (each instance has its own values for data), but the subclass house
    might have data indicating the number of bedrooms, and the subclass shop might
    have data about the type of business conducted there. You can write code that
    handles a particular instance of building or one of its subclasses either as the
    base class (building) or as the subclass. For instance, you can ask any instance
    of building or a subclass for its square footage, but you can only ask a shop
    about its type of business.


    Figure [3-2](#A441106_1_En_3_Chapter.html#Fig2) shows the declarations of a `Building`
    class and two subclasses (`House` and `Shop`) in a playground.


    ![A441106_1_En_3_Fig2_HTML.jpg](A441106_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Declaring a class and two subclasses


    You also see the creation of an instance of the `House` class with this line:


    ```

    let myHouse = House()

    ```


    You can use the `squareFootage` function of `myHouse` to set a local variable
    (`area`). However, if you attempt to use the function `businessType` of the `House`
    subclass of `Building`, you’ll get an error as you see in Figure [3-2](#A441106_1_En_3_Chapter.html#Fig2).
    In fact, in a playground, you’ll have trouble typing the bad code. `businessType`
    is an attribute of `Shop` and not of `Building`.


    Remember that as a playground runs, you see the results of individual lines of
    code in the sidebar at the right of the playground. As you see in Figure [3-3](#A441106_1_En_3_Chapter.html#Fig3),
    you can tap any of them to see the value.


    ![A441106_1_En_3_Fig3_HTML.jpg](A441106_1_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Use a playground viewer


    The buttons at the right of the playground indicate the type of result you will
    see. In Figure [3-4](#A441106_1_En_3_Chapter.html#Fig4), the first is a numeric
    value, as is the last one. The opened result is an object.


    ![A441106_1_En_3_Fig4_HTML.jpg](A441106_1_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Observe an object


    If you decide to add a viewer to your playground, you’ll be able to follow the
    results without having to tap each time as you see in Figure [3-5](#A441106_1_En_3_Chapter.html#Fig5).


    ![A441106_1_En_3_Fig5_HTML.jpg](A441106_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Open several viewers to follow the playground’s execution


    This is a high-level overview, but it’s important in modern computer science.
    The most common programming languages in use today are object-oriented. OOP is
    enforced at the language level as opposed to structured programming, which is
    a style of writing (badly) in almost any programming language. It is hard to write
    unstructured code in an OOP program, but it can be done as anyone who has been
    tasked with fixing such a situation can tell you.


    # Imperative Programming (Procedural Programming)


    Imperative programming uses statements to describe what an app or program should
    do (the terms app and program are used interchangeably in this section). Critically
    important is that the statements specify how the program should achieve the desired
    results.


    Imperative programming today often is based on blocks and procedures: the imperative
    statements are grouped together into these entities. The statements then invoke
    the required blocks or procedures as needed to accomplish the program’s objectives.'
