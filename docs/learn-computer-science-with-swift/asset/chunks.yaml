    \n![A441106_1_En_10_Fig6_HTML.jpg](img/A441106_1_En_10_Fig6_HTML.jpg)\n\n**图 10-6**\
    \ 你必须声明函数将返回一个值\n\n你可以像图 10-7 所示那样完成函数声明，使其现在打算返回一个值。\n\n![A441106_1_En_10_Fig7_HTML.jpg](img/A441106_1_En_10_Fig7_HTML.jpg)\n\
    \n**图 10-7** 完整的函数\n\n返回值的语法是：\n\n```\n-> Double\n```\n\n这表明返回值的类型是 `Double`。\n\
    \n如果你愿意，可以运行这段代码。虽然什么也不会发生，但实际上这已经相当不错了：没有出现任何错误。\n\n现在回顾一下构建这个小函数的步骤：\n\n- 点击\
    \ `func` 创建框架\n- 为函数命名\n- 命名传入的参数并设置其类型\n- 指定返回值\n- 提供计算返回值的函数体\n\n除了第一步创建函数框架外，其余步骤都可以按任意顺序进行。在此过程中，你可能会遇到错误，原因可能是你在使用变量之前尚未声明它，或者你声明了变量却没有使用它。过一段时间，你就会习惯这个流程。\n\
    \n你可以添加一行代码来调用这个函数。你需要声明一个变量，并将其设置为函数的结果。查看快捷键栏，你会找到 `let`（在图 10-8 中它正好在屏幕之外）。你通常需要滚动快捷键栏。点击\
    \ `let`，你会得到所需代码的轮廓，如图 10-8 所示。\n\n![A441106_1_En_10_Fig8_HTML.jpg](img/A441106_1_En_10_Fig8_HTML.jpg)\n\
    \n**图 10-8** 创建一个变量来使用该函数\n\n将变量命名为 `result`（或任何你想要的名称），然后输入函数名称，如图 10-9 所示。在快捷键栏中，Swift\
    \ playground 会显示参数（名称和类型）。\n\n![A441106_1_En_10_Fig9_HTML.jpg](img/A441106_1_En_10_Fig9_HTML.jpg)\n\
    \n**图 10-9** 开始使用该函数\n\n点击快捷键栏中的参数，它们会被填充到你的代码中，如图 10-10 所示。第一个参数 (`length`) 被红色高亮显示，所以你需要从这里开始。你会看到一个数字弹出框，因为\
    \ playground 知道你打算输入一个数字。\n\n![A441106_1_En_10_Fig10_HTML.jpg](img/A441106_1_En_10_Fig10_HTML.jpg)\n\
    \n**图 10-10** 开始输入参数\n\n当你输入每个参数时，系统会使用相应的数据输入工具引导你，如图 10-11 所示。\n\n![A441106_1_En_10_Fig11_HTML.jpg](img/A441106_1_En_10_Fig11_HTML.jpg)\n\
    \n**图 10-11** 输入所有参数\n\n现在你可以点击“运行我的代码”，并在查看器中看到结果，如图 10-12 所示。\n\n![A441106_1_En_10_Fig12_HTML.jpg](img/A441106_1_En_10_Fig12_HTML.jpg)\n\
    \n**图 10-12** 运行你的代码并在查看器中检查结果\n\n## 总结\n\n本章描述了使用软件组件的原因，并向你展示了如何在 Swift 中构建它们。你了解了\
    \ Swift playground 如何引导你完成构建函数的过程。你也可以直接将代码键入 Xcode，但有时在 Swift playground 和 Xcode\
    \ 之间切换会更方便。\n\n所有组件都拥有相同的基本部分。以下是你在 playground 中看到的名称。\n\n- `name`\n- `inputs`（参数）\n\
    - `outputs`（返回值）\n- `body`（代码）\n"
- fmt: "# 11. Using Events to Guide Actions\n\nComputers have been getting smaller\
    \ for years. Not only have their components shrunk from vacuum tubes to transistors,\
    \ there are now entire systems on a single computer chip.\n\nUsers control apps.\
    \ We launch them; interact with the interfaces; and, when we’re finished, we shut\
    \ them down. Sometimes as in the case of iOS, when we don’t use them for a while,\
    \ their data is automatically moved to a safe space to be ready for when we want\
    \ to use them again. They may never (or rarely) end. They just wait for the next\
    \ user input.\n\nThat’s not how things work now, and it hasn’t really been true\
    \ for decades, but mental images take a long time to fade away. More and more,\
    \ apps are controlled by other apps and even by other computers. When we set an\
    \ alarm on a computer, another app keeps track of the time and then triggers something\
    \ on the computer.\n\nYou may say that that’s just delayed human interaction,\
    \ but as you start to think of how apps are controlled today, you will find more\
    \ and more controls that are far removed from human intervention. In general,\
    \ when you schedule something (perhaps using Siri) using a phrase such as “remind\
    \ me at…,” you’re describing something that a computer can set in motion. Whether\
    \ your “at” is based on time or location, it’s easy for a computer to figure out\
    \ when “at” is true.\n\nWhen your request to Siri is along the lines of “remind\
    \ me when…” chances are that there’s a more complex process involved in figuring\
    \ out if “when” is true. (Exclude the special case of “when it is 3:15,” which\
    \ is basically an “at” request.)\n\nWhat is important about these “when” events\
    \ is that they come as a surprise to the person who sets them in motion. If you\
    \ asked to be reminded at 3:15, you may expect that reminder (and maybe even a\
    \ pre-reminder at 3:00). But “when” events may come with no expectation on the\
    \ part of the user. You’ll see how that works later in this chapter when looking\
    \ at notifications in Swift and Cocoa.\n\n## Where Blocks Fit In\n\nAs you saw\
    \ in Chapter [10](#A441106_1_En_10_Chapter.html), “Building Components,” you can\
    \ modify the normal sequence of command processing by using blocks. The snippet\
    \ of code here summarizes a common use of blocks. As noted in this chapter, this\
    \ is common code use in `UIDocumentBrowserViewController` and many other places.\
    \ The heart of the code is the `document.open(completionHandler:)` function call.\
    \ It opens the document, and, when the document is opened, the completion handler\
    \ is called and executed so that you can inform the user that the document has\
    \ or hasn’t been successfully opened and take any other necessary actions (such\
    \ as updating the user interface with the contents of the document).\n\n```\n\
    let document = UIDocument (fileURL: documentURL)\n// instantiate UIDocument\n\
    document.open (completionHandler: { (success) in\nif success {\n// show document\n\
    } else {\nprint (\"no success opening document\")\n} // else\n} // end of block\n\
    ) // end of document.open parameters\n```\n\nWhat is important to remember is\
    \ that although there is a pause between the call to `open` and the execution\
    \ of the closure (either the `success` branch or the `else` branch), that sequence\
    \ is set in the initial code that sets up the block. Unless the code in the block\
    \ does something unusual, that block will be the code that `open` calls after\
    \ attempting to open the document.\n\n## Using Actions and Messaging for Managing\
    \ Flow Control Summary\n\nIt is commonly the case that you want to implement a\
    \ different type of managing the control flow rather than just waiting to move\
    \ on to the next step in the predefined sequence. That is where messaging comes\
    \ into play. Messaging lets you dynamically change what is going to be executed\
    \ — not just when it happens as you can do with completion handlers and closures.\n\
    \nMessaging lets you send some kind of message to a receiver that then acts on\
    \ it. Looking at the `open` code that uses a closure, consider the case in which\
    \ you do not want to specify what happens when the document opens or doesn’t.\
    \ A messaging structure lets you send a message to a recipient that will then\
    \ decide what to do about it. Messaging is used extensively in modern apps for\
    \ a variety of reasons, one of which is that it helps in building maintainable\
    \ apps because they don’t have to retain all the logical linkages. In the `open`\
    \ example, if you want to impose a limit of a maximum of three open documents\
    \ at a time, you need to know that every `open` statement must obey that limit\
    \ both in original coding as well as in maintenance. (It will be very easy to\
    \ forget to check on that limit when you implement code to open a new type of\
    \ document.) These issues can be avoided by implementing a generalized opening\
    \ section of code, but often when you are retrofitting or maintaining code, you\
    \ don’t control how every piece of it is already working. Being able to post a\
    \ notification that something has happened and letting another part of the app\
    \ unknown at the time of writing handle it is simpler. And that’s where notifications\
    \ come into play. Here is a concrete example.\n\n> **Note**\n> \n> Messaging is\
    \ widely used today. It is at the heart of microkernel architectures for operating\
