  trans: "\n### 实现加法运算\n\n加法过程需要两个步骤：\n\n- 将姓名拆分为单个字符。\n- 查找每个字符对应的数值。\n\n这两个步骤位于一个循环内——你也可以把循环本身视为一个含有两个子步骤的步骤。\n\
