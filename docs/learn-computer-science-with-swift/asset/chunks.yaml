    main.storyboard


    At the bottom of the utility area at the right of the window, you see a list of
    the objects that you can drag onto the storyboard. You don’t have to draw anything —
    just drag.


    The elements of the interface are scenes, and they are implemented in code by
    view controllers. Most view controllers are visible, and that is the case here.
    In the Tabs template, there are three view controllers: the first and second views,
