- fmt: "# Using JSON with Swift 4\n\nJSON is rapidly becoming one of the most common\
    \ formats for data sharing. There have been several iterations of code in Objective-C\
    \ and Swift that convert to and from JSON (particularly between JSON and the `plist`\
    \ types). With Swift 4, those built-in tools have been rewritten and simplified.\
    \ They are shown in Listing [9-1](#A441106_1_En_9_Chapter.html#Par116).\n\nListing\
    \ [9-1](#A441106_1_En_9_Chapter.html#Par116) shows a Swift playground that takes\
    \ one of the plist types (an array in this case) and converts it to JSON and back\
    \ again. This is a common way of sharing data with spreadsheet, databases, and\
    \ even web browsers (many of them can read and format JSON files).\n\nIn Listing\
    \ [9-1](#A441106_1_En_9_Chapter.html#Par116), you see the setup of the playground.\
    \ Note that `Foundation` must be imported, but the JSON tools don't require `UIKit`.\
    \ They are lower-level tools. A local array is created and then printed out.\n\
    \n```swift\nimport Foundation\nlet myArray = [\"one\", \"two\", \"three\"]\nprint\
    \ (myArray)\n```\n\nThere is a class in Swift 4's standard library that handles\
    \ JSON conversion. You need to create your own instance of that class:\n\n```swift\n\
    let jsonEncoder = JSONEncoder()\n```\n\nThe heart of the playground is two lines\
    \ of code that use the `jsonEncoder` instance. The first line that is optional\
    \ specifies in this case that the format of the JSON text should be easy for people\
    \ to read:\n\n```swift\njsonEncoder.outputFormatting = .prettyPrinted\n```\n\n\
    Next, you use the `jsonEncoder` instance to encode `myArray` (or any other `plist`-compatible\
    \ type). The result of encoding is stored in this example in `encodeToJSON`.\n\
    \n```swift\nlet encodeToJSON = try? jsonEncoder.encode(myArray)\n```\n\nThe option\
    \ spaces the JSON text to make it more readable. In the full listing in Listing\
    \ [9-1](#A441106_1_En_9_Chapter.html#Par116), you'll see the error checking that\
    \ surrounds this line of code.\n\nIn Listing [9-1](#A441106_1_En_9_Chapter.html#Par116),\
    \ `encodeToJSON` is then decoded using the same `jsonEncoder` instance:\n\n```swift\n\
    let decodeFromJSON = String(data: encodeToJSON, encoding: .utf8)\n```\n\nThe `UTF8`\
    \ encoding is a standard text encoding that is commonly used. You can find other\
    \ encoding values in the documentation.\n\nWhen you consider that you can encode\
    \ and decode large arrays and dictionaries into text to read and write, you have\
    \ a very powerful way of managing data that can be stored for other apps on other\
    \ devices to read and write.\n\n```swift\nimport Foundation\nlet myArray = [\"\
    one\", \"two\", \"three\"]\nprint (myArray)\nlet jsonEncoder = JSONEncoder()\n\
    jsonEncoder.outputFormatting = .prettyPrinted\nif let encodeToJSON = try? jsonEncoder.encode(myArray)\
    \ {\n    if let decodeFromJSON = String(data: encodeToJSON, encoding: .utf8) {\n\
