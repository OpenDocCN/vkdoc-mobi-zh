    solution was to take a bit at the high end of the binary number and reserve it
    for a special purpose: a minus sign. Thus both positive and negative numbers could
    be stored.


    Further refinements included storing a single set of bits in a word as if they
    were two separate integers. This allowed the representation of floating-point
    numbers with one integer representing the significand (sometimes called the mantissa)
    and the other representing the exponent for the power of ten that will create
    the appropriate value when it is used to multiply the significand. All of this
    is done with software - the actual words of storage remain just a row of bits.
    Because conversions from one type of number can be done easily, they are done
    all the time in software. Often neither developer nor user is aware of this.


    There are details about using built-in types as well as types that are created
    by Swift in the following chapter. For now, just be aware that types are constructs
    that convert the physical bits in a computer word to something with meaning to
    developers, users, and normal people.


    ## Scalar Data


    The simplest form of data is a scalar or variable - a single data element that
    is basically the same as a simple algebraic term as in


    x = 15


    You will often find descriptions and definitions of scalars as the contents of
    a single memory location. In fact, most of the time data is stored in words that
    are collections of bits. The hardware handles these words very efficiently as
    it stores and retrieves the contents of words.


    When a computer word is 64 bits long, it can theoretically store 64 separate yes/no
    (Boolean) values. Hardware and software let you access the word as a single value
    (usually a number) by the individual bits. You can go further to access the bits
    in a word in groups that often correspond to letters .'
