    ### Testing the Project (with Modifications)


    Start to test the app again, and you will periodically encounter a problem. It
    may be a pesky one for you to solve because it appears to be erratic. The debugging
    tips in the next section show you how to proceed.


    ## Debugging an App with Xcode


    With your buttons and code in place, you’ll see that if you click the navigation
    button in the first view controller, nothing seems to happen. The first step in
    debugging is to use a breakpoint. This causes the app to stop at a designated
    spot. The simplest way to proceed if you are not seeing something happen that
    should happen is to set a breakpoint on the line of code that is causing the problem
    (in this case, by not running). You set a breakpoint by clicking in the gutter
    at the left of a line of code as shown in Figure [12-12](#A441106_1_En_12_Chapter.html#Fig12).


    ![A441106_1_En_12_Fig12_HTML.jpg](A441106_1_En_12_Fig12_HTML.jpg)


    Figure 12-12


    Set a breakpoint


    Run the app again, click the navigation button, and wait for the breakpoint to
    be triggered.


    It won’t happen.


    All of this and you have confirmed what you already saw, but now you have added
    the fact that it’s not just that the notification isn’t acted on, it’s never received.


    In a case like this, a common practice is to back up. What should have called
    the `didReceiveNotificationResultText` function?


    Because this is a small snippet of code, the answer is right in front of you on
    line 24: that’s where the notification observer is set up. Set a breakpoint there
    and see what happens when you run the app again.


    The result is the same: this line of code is not being called so the observer
    is not set up.


    At this point, you have to do a little thinking to figure out how that can have
    happened. If you think or do research or ask colleagues about this, you’ll probably
    get the same answer from everyone: if the code is not called, then the function
    that it is in is not being called (`viewDidLoad`). That may make no sense because
    you can see the second view controller.


    With both breakpoints still set, you can do some more experimenting. What you’ll
    find is that the second view controller’s `viewDidLoad` function is called just
    before it is displayed. If you run the app and click the navigation button in
    the first view controller, the observer is not yet set up. Use the tab at the
    bottom of the view to switch to the second view controller to force the view to
    load, and then go back to the first view controller and try it again. You’ll see
    that now the notification works properly.


    This is a very common problem (and a very common class of problem). It is not
    limited to iOS or Cocoa: this type of problem and debugging technique is common.


    The solution is that the observer needs to be set up before a notification is
    generated. This means that the observer has to be placed in some part of the app
    that is present right at the beginning. You may consider making `AppDelegate`
    the place for the observer (and it is commonly used to receive notifications for
    just this reason).


    ## Summary


    This chapter shows you the basics of Xcode so that you can get started implementing
    the ideas and concepts of computer science in apps. Swift playgrounds are an invaluable
    way of experimenting, but there are some features that require more complex features
    that you need to start building your own apps.


    As noted, the concepts of debugging described in this chapter are not unique to
    iOS or Cocoa. You can use then in most languages and environments.


    # 13. Bringing in People


    The field of computer science is often thought of in purely computer hardware
    and software terms. Somewhere, we as a society need to look at how people are
    involved because they are the users, creators, managers, and funders of computer
    science projects.


    This chapter looks at the people side of computer science with a focus on the
    world of apps. Although the issues and principles described here apply to projects
    that may appear not to involve people (interplanetary space missions, control
    software for electric grids and generators), there are people involved if only
    in the management and funding of those projects.


    However, the focus in this chapter is more on the projects that you are likely
    to work on with your knowledge of computer science. First is a quick overview
    of the formal idea of what is and isn’t computable; then you’ll find a list of
    the questions to ask and answer about a specific project you may be developing.
    These are the questions that have to be resolved


    ## Computability for People


    The core of computer science is the idea of computability. Simply put, computability
    is a problem that can be solved with systematic steps. This is different from
    an algorithm in that algorithms tend to be focused on smaller areas than the computability
    problems. Thus, the solution of a computability problem may include one or more
    algorithms.


    Note


    If you talk to various people, you’ll find out that there are several candidates
    for “core” of computer science, and computability is one of them. It is particularly
    useful now because a lot of the current tools for teaching computer science to
    young people (even preschoolers) focus on computability.


    There are two basic types of computable problems:


    *   Decision problems. Given a collection of items, is an item part of that collection
    or not? Is this invoice part of the set of unpaid bills? Is the user ID authorized
    to log in? These are problems with a yes-or-no answer.

    *   Function or computable problems. These are problems that need to be calculated.
    What is the product of X times Y?


    Other types of computable problems are optimization problems (how best to do something —
    often how best to compute the answer to one of the two basic types given specific
    data) and search problems. Problems are often decomposed into sub-problems so
    that even the most complex problem can be broken into computable pieces.


    The main reason for thinking about computable problems is to be able to say with
    some confidence (and based on some logical analysis) that a particular problem
    is or isn’t computable. That, after all, is the first question people consider
    when they are thinking of putting their knowledge of computer science to work:
    Can computer science help me solve this problem?'
