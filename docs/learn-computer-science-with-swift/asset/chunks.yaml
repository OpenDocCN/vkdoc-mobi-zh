  trans: '

    ### 识别模式


    如果你能识别出模式，就可能通过发现某种模式并意识到可以直接实现该模式本身，而不必从头为每个具体变体分别实现，从而减少工作量。


    模式的一个经典例子如图 1-2 所示，即巴黎圣母院的西立面。你的第一反应可能是个人化的（也许你去过巴黎），也可能是泛泛的感受——比如这座建筑正面有多么美丽。而建筑师、设计师或软件开发者则可能超越个人与泛泛的感受，注意到这个立面由底层三个门廊和顶部两座塔楼构成。


    ![A441106_1_En_1_Fig2_HTML.jpg](img/A441106_1_En_1_Fig2_HTML.jpg)


    **图 1-2** 巴黎圣母院西立面


    巴黎圣母院的西立面呈现出大量略有变化的重复模式。底层三个门廊的整体宽度和高度相似，但仔细观察会发现，它们并非彼此复制。同样，两座塔楼在本质上相同，但也存在差异。建筑正面的几乎每个其他元素都属于某种重复模式的一部分。（最明显的例外是第二层中央巨大的玫瑰花窗：它是独一无二的，而这种独特性正反映了其宗教上的重要性）。


    识别模式的重要性在于，一旦你做到这一点，描述或实现某个概念（无论是应用程序还是大教堂）的工作就会变得更容易。你不再需要逐一描述或构建每个细节或组件：你可以描述被复制的模式。


    ### 使用抽象


    通常，就像巴黎圣母院西立面的情况一样，模式会带有变化地重复出现。（门廊的尺寸相同，但雕像的装饰和含义不同）。模式中重复的部分可以被视为一种抽象——即模式的本质。用计算机术语来说，这个抽象就是你需要实现以支持模式多种用途的东西。


    例如，如果你需要编写代码来向应用程序用户询问地址，这就可以成为某个模式的一部分，该模式还能让你向用户询问姓名。（术语`design pattern`有时用于描述这种可重用的代码）。


    ### 结合模式与抽象进行开发


    在实践中，开发者通常同时处理模式和抽象，因为它们实际上是同一枚硬币的两面。在设计应用程序（或应用程序的一部分）时，开发者会寻找可以用相同基础代码实现的模式。这减少了需要编写的代码量。


    随着设计过程的推进，开发者还会寻找近似模式。如果项目的某些部分可以稍加修改，可能就会形成一种模式。这是一个迭代、富有创造性且需要判断力的过程。通常，过度构建模式可能会让应用程序对用户来说更加复杂。随着项目根据用户和开发者的反馈不断演进，双方（用户和开发者）都可以进行优化，以便在重复模式与为用户定制之间取得良好平衡。


    作为这个过程的一部分，你常常需要审视建议的流程，不仅要看是否有可复用的模式，还要看是否能创建一种抽象，使得用户看到极致的定制化（即易用性），而开发者则专注于一个通用的抽象。


    你在现代软件开发中会发现的许多编码技术，都能帮助你实现模式和抽象。


    ## 开发者的基本任务


    基于模式和抽象的基本原则，你可以真正开始规划你的项目了。开发者有四项基本任务。一旦你熟悉了这些任务，本书的剩余部分将探讨具体的实现细节。


    *   构建计算问题

    *   对问题或过程进行建模

    *   练习分解

    *   验证抽象


    ### 构建计算问题


    第一步是将你的项目构建成一个计算问题。这不仅仅是说“我们来开发一个应用程序”。它意味着不仅要确定你的目标是什么，还要确定为什么该目标适合用计算来解决（即为什么计算机科学能发挥作用）。计算机科学并非万能答案：如果你想粉刷餐厅，它帮不上什么大忙。


    在理论计算机科学中，至少存在五种类型的计算问题。在决定某个特定项目是否适合计算机化时，经典计算机科学建议你判断它是否属于以下类别之一：


    *   **选择或决策。** 针对特定问题寻找是/否答案。通常，问题会用数字和值来表述（`personX`的年龄是否大于 21 岁？，`valueX`是奇数还是偶数？）

    *   **搜索。** 在此类问题中，会对一组数据进行搜索，并返回选择/决策结果为真的值。（在一所学校的所有注册学生中，有多少人有资格在下次选举中投票？）

    *   **计数。** 此变体仅询问搜索会返回多少值。请注意，搜索涉及的操作可能比计数更复杂——在这种情况下，你并不关心学生是谁，因此不需要找出姓名或地址。

    *   **优化。** 在所有搜索结果中，哪一个是最好的？如果搜索是针对某个特定地址附近的所有合格选民，你可以利用结果进行优化，以找到居住在特定地址附近、在上次选举中投过票并且有车（因此可能愿意提供前往投票站的乘车服务）的选民。

    *   **函数。** 实际上，这是一个搜索问题（而搜索问题又建立在选择问题之上）。它进一步通过可优化的结果进行细化，这些结果可以进一步缩小范围。函数问题的一个简化描述是：它返回的答案比“是/否”或一个计数更复杂。（请记住，这是一种简化。）


    如果一个问题不属于这五类之一，那么它就不是计算问题。这听起来可能有点奇怪，因为你很难看出像`Pages`、`Excel`甚至`Swift Playgrounds`这样的东西如何能归入此列表。不必担心：一个项目可以分解成多个计算片段。事实上，如果你真想深入研究一个项目，你会发现每一行代码通常都可以被认为是由多个（通常是许多）计算片段组成的。

    '
- fmt: "#### Recognizing and Describing the Problem\n\nOnce you have formulated the\
    \ problem, your task isn’t over. There are still two very important aspects involved\
    \ in formulating an idea for an app. In fact, these are steps that you take at\
    \ the beginning and, repeatedly, at many stages through the development process.\
    \ You may be chomping at the bit wanting to get into code and technology, but\
    \ you have to start with the idea: what is the purpose of your project? If it’s\
    \ to build an app, what does the app do?\n\nPerhaps the best guidance in formulating\
    \ what your app does can be found on websites like Kickstarter or any other resource\
    \ that helps people describe a not-yet-built project. You can answer any number\
    \ of specific questions, but you must somehow know what your project or app will\
    \ accomplish.\n\nMany developers are happy to leave the marketing to other people,\
    \ but you must be able to describe the project in clear and specific terms for\
    \ many purposes beyond marketing. In the case of an app, one critical step in\
    \ the development process is getting an icon for the app. Icon design is a very\
    \ special area of design and graphic arts. Few developers produce final icons\
    \ (many provide rough sketches for development). You are likely to need to sit\
    \ with a graphic designer to discuss what the icon will look like. That conversation\
    \ starts out with the designer’s question: what does this app do?\n\n**Tip** \
    \ \nThe conversation between app developer and designer can be particularly useful\
    \ in the development process because it can clarify the project. This applies\
    \ to any discussion with a non-developer. Describing the app to a friend or relative\
    \ can be very productive: they tend to ask basic questions that can help you refine\
    \ your design.\n\n#### Defining a Project and Goal\n\nWith a computational problem\
    \ that you want to focus on and a description of the problem in hand, you can\
    \ move to defining a project and your goal. The project in general is to refine\
    \ the computational problem at the core of your project and to make sure you can\
    \ define it in appropriate terms for anyone who needs to know about it (friends,\
    \ relatives, colleagues, investors, potential users, and the like).\n\nSpecifically,\
    \ you need to start thinking about the scope of your project. Part of computer\
    \ science is learning to define projects and split them into component parts if\
    \ necessary. For a specific project, you may want to think about how to break\
    \ it into manageable components even if you intend to do it in one process. Knowing\
    \ how to split it apart if necessary can be a helpful backup plan in case you\
    \ need to do it in the future.\n\n#### What Isn’t a Computational Problem\n\n\
    The most common non-computational problems you run across tend to involve people\
    \ and data. (Note that this is an entirely subjective point of view based on personal\
    \ experiences. But it is shared by many developers).\n\nSometimes an app is envisioned\
    \ as something almost magical – it will provide the answer to a question posed\
    \ by the user. If you cannot break down the problem into computational components,\
    \ you can’t answer the question. In thinking and talking about a problem, you\
    \ may want to pose the question: how will we do this? You don’t need to look for\
    \ an answer in code at this point; rather, you need to know how the problem under\
    \ discussion can be resolved. If it involves a person’s judgment and that judgment\
    \ cannot be quantified, it’s hard to see how it can be computational. If it involves\
    \ referring to data and the data is not available, you also have a non-computational\
    \ problem. You may be able to break a judgment down into computational components,\
    \ but, ultimately, if you are left with judgment that cannot be computed (“gut\
    \ feeling” is a term some people use for this), you need some tool other than\
    \ computer science.\n\n**Tip**  \nAlthough not all problems are computational,\
    \ you can frequently use a computational formulation to crunch numbers and display\
    \ data so that a judgmental kernel is left. Users can use your app to clear away\
    \ every computational issue and then use their own judgment on that non-computational\
    \ kernel.\n\n### Modeling the Problem or Process\n\nAs soon as you can formulate\
    \ the problem and the part(s) of the problem that your project encompasses, you\
    \ can start to model the problem. At this stage you can use any tools that you\
    \ want to - pencil and paper, smart board, iPad, or anything else. You might want\
    \ to draw boxes that perform parts of the task you want to build. Don’t worry\
    \ about code - just think about something (whatever it turns out to be) that,\
    \ for example, computes a person’s telephone number (yes, that is a computational\
    \ problem - a search).\n\nThis model might turn out to be how your app is structured,\
    \ but at this stage, it is just how parts of your app will do things that together\
    \ make up the entire app. What you want to do at this point is to decide if this\
    \ collection of tasks or operations (the terms are interchangeable in this context)\
    \ can produce the results you need. Once you have a rough model, try to break\
    \ it. What happens if the phone number lookup fails or returns the wrong number?\
    \ What other components will be impacted?\n\nDon’t worry about every loose end\
    \ in a high-level model, but many people keep a list of these loose ends and assumptions.\
    \ It’s very easy to start assuming that they are all dealt with later on and,\
    \ without that list of assumptions, you can wind up with an almost-ready app that\
    \ misses a critical component. (Any developer can recount many examples of this).\n\
    \n### Practicing Decomposition\n\nOnce you have a conceptual model, it’s time\
    \ to drill down into it: take each component apart and look at its components.\
    \ (This process is known as decomposition.) As you decompose the entire project\
    \ into smaller and smaller parts, you are often going to be specifying components\
    \ that will be implemented in code.\n\nAs you decompose the model, you may start\
    \ to realize that this or that component is something that you know how to implement\
    \ already or that can be implemented using known resources. If you are very lucky,\
    \ your decomposed project can be implemented with very little additional work.\n\
    \n### Rearranging and Recomposing the Project Pieces\n\nBut “lucky” doesn’t happen\
    \ very often. In the real world, what developers often find is that if they make\
    \ some adjustments to the model, the decomposed pieces may become easier to implement.\
    \ Perhaps the most important point to make about the entire design process is\
    \ that until it is actually being implemented, everything should be considered\
    \ changeable.\n\nTake the project apart and put it back together again as you\
    \ rethink each component. The goal is to make a project that does what you want\
    \ it to do and to gradually refine the components into manageable and implementable\
    \ pieces.\n\nThere’s not a word about code yet. All of the modeling and decomposition\
    \ is theoretical. Many developers (including the author) think that the longer\
    \ you work hypothetically, the more robust your implementation will be. Somehow,\
    \ moving into the code implementation can be a distraction from the design and\
    \ planning process. Not everyone agrees with this, but many developers do agree."
  raw: '#### Recognizing and Describing the Problem


    Once you have formulated the problem, your task isn’t over. There are still two
    very important aspects involved in formulating an idea for an app. In fact, these
    are steps that you take at the beginning and, repeatedly, at many stages through
    the development process. You may be chomping at the bit wanting to get into code
    and technology, but you have to start with the idea: what is the purpose of your
    project? If it’s to build an app, what does the app do?


    Perhaps the best guidance in formulating what your app does can be found on websites
    like Kickstarter or any other resource that helps people describe a not-yet-built
    project. You can answer any number of specific questions, but you must somehow
    know what your project or app will accomplish.


    Many developers are happy to leave the marketing to other people, but you must
    be able to describe the project in clear and specific terms for many purposes
    beyond marketing. In the case of an app, one critical step in the development
    process is getting an icon for the app. Icon design is a very special area of
    design and graphic arts. Few developers produce final icons (many provide rough
    sketches for development). You are likely to need to sit with a graphic designer
    to discuss what the icon will look like. That conversation starts out with the
    designer’s question: what does this app do?


    Tip


    The conversation between app developer and designer can be particularly useful
    in the development process because it can clarify the project. This applies to
    any discussion with a non-developer. Describing the app to a friend or relative
    can be very productive: they tend to ask basic questions that can help you refine
    your design.


    #### Defining a Project and Goal


    With a computational problem that you want to focus on and a description of the
    problem in hand, you can move to defining a project and your goal. The project
    in general is to refine the computational problem at the core of your project
    and to make sure you can define it in appropriate terms for anyone who needs to
    know about it (friends, relatives, colleagues, investors, potential users, and
    the like).


    Specifically, you need to start thinking about the scope of your project. Part
    of computer science is learning to define projects and split them into component
    parts if necessary. For a specific project, you may want to think about how to
    break it into manageable components even if you intend to do it in one process.
    Knowing how to split it apart if necessary can be a helpful backup plan in case
    you need to do it in the future.


    #### What Isn’t a Computational Problem


    The most common non-computational problems you run across tend to involve people
    and data. (Note that this is an entirely subjective point of view based on personal
    experiences. But it is shared by many developers).


    Sometimes an app is envisioned as something almost magical – it will provide the
    answer to a question posed by the user. If you cannot break down the problem into
    computational components, you can’t answer the question. In thinking and talking
    about a problem, you may want to pose the question: how will we do this? You don’t
    need to look for an answer in code at this point; rather, you need to know how
    the problem under discussion can be resolved. If it involves a person’s judgment
    and that judgment cannot be quantified, it’s hard to see how it can be computational.
    If it involves referring to data and the data is not available, you also have
    a non-computational problem. You may be able to break a judgment down into computational
    components, but, ultimately, if you are left with judgment that cannot be computed
    (“gut feeling” is a term some people use for this), you need some tool other than
    computer science.


    Tip


    Although not all problems are computational, you can frequently use a computational
    formulation to crunch numbers and display data so that a judgmental kernel is
    left. Users can use your app to clear away every computational issue and then
    use their own judgment on that non-computational kernel.


    ### Modeling the Problem or Process


    As soon as you can formulate the problem and the part(s) of the problem that your
    project encompasses, you can start to model the problem. At this stage you can
    use any tools that you want to - pencil and paper, smart board, iPad, or anything
    else. You might want to draw boxes that perform parts of the task you want to
    build. Don’t worry about code - just think about something (whatever it turns
    out to be) that, for example, computes a person’s telephone number (yes, that
    is a computational problem - a search).


    This model might turn out to be how your app is structured, but at this stage,
    it is just how parts of your app will do things that together make up the entire
    app. What you want to do at this point is to decide if this collection of tasks
    or operations (the terms are interchangeable in this context) can produce the
    results you need. Once you have a rough model, try to break it. What happens if
    the phone number lookup fails or returns the wrong number? What other components
    will be impacted?


    Don’t worry about every loose end in a high-level model, but many people keep
    a list of these loose ends and assumptions. It’s very easy to start assuming that
    they are all dealt with later on and, without that list of assumptions, you can
    wind up with an almost-ready app that misses a critical component. (Any developer
    can recount many examples of this).


    ### Practicing Decomposition


    Once you have a conceptual model, it’s time to drill down into it: take each component
    apart and look at its components. (This process is known as decomposition.) As
    you decompose the entire project into smaller and smaller parts, you are often
    going to be specifying components that will be implemented in code.


    As you decompose the model, you may start to realize that this or that component
    is something that you know how to implement already or that can be implemented
    using known resources. If you are very lucky, your decomposed project can be implemented
    with very little additional work.


    ### Rearranging and Recomposing the Project Pieces


    But “lucky” doesn’t happen very often. In the real world, what developers often
    find is that if they make some adjustments to the model, the decomposed pieces
    may become easier to implement. Perhaps the most important point to make about
    the entire design process is that until it is actually being implemented, everything
    should be considered changeable.


    Take the project apart and put it back together again as you rethink each component.
    The goal is to make a project that does what you want it to do and to gradually
    refine the components into manageable and implementable pieces.


    There’s not a word about code yet. All of the modeling and decomposition is theoretical.
    Many developers (including the author) think that the longer you work hypothetically,
    the more robust your implementation will be. Somehow, moving into the code implementation
    can be a distraction from the design and planning process. Not everyone agrees
    with this, but many developers do agree.'
  trans: "\n#### 识别并描述问题\n\n一旦你构思好问题，任务并未结束。在为一个应用构思想法的过程中，仍然有两个非常重要的方面需要考虑。事实上，这些步骤是你从一开始，并在整个开发过程的多个阶段反复进行的步骤。你可能迫不及待想要进入代码和技术层面，但你必须从想法开始：你的项目目的是什么？如果是要构建一个应用，这个应用是做什么的？\n\
    \n或许，描述应用功能的最佳指南可以在 Kickstarter 这类网站或其他帮助人们描述尚未建成项目的资源中找到。你可以回答任意数量的具体问题，但你必须以某种方式明确你的项目或应用将实现什么。\n\
    \n许多开发人员乐于将营销工作交给别人，但你必须能够用清晰且具体的术语描述项目，这不仅仅是为了营销，还有很多其他用途。就应用而言，开发过程中的一个关键步骤是为应用设计图标。图标设计是设计和图形艺术中一个非常特殊的领域。很少有开发人员能制作出最终的图标（很多人会为开发提供粗略的草图）。你很可能需要与平面设计师坐下来讨论图标的外观。这场对话通常从设计师的问题开始：这个应用是做什么的？\n\
    \n**提示**  \n应用开发者与设计师之间的对话在开发过程中尤其有用，因为它可以澄清项目。这适用于任何与非开发人员的讨论。向朋友或亲属描述应用会非常有效：他们往往会提出一些基本问题，这有助于你完善设计。\n\
    \n#### 定义项目与目标\n\n有了你想要关注的计算问题以及问题描述，你就可以着手定义项目及目标了。项目的总体目标是精炼作为项目核心的计算问题，并确保你能用合适的术语向任何需要了解它的人（朋友、亲属、同事、投资者、潜在用户等）进行清晰定义。\n\
    \n具体来说，你需要开始思考项目的范围。计算机科学的一部分就是学习如何定义项目，并在必要时将其拆分成组成部分。对于一个具体项目，即便你打算一次性完成，也可能需要考虑如何将其分解成可管理的组件。了解如何在必要时拆分项目，可以作为一个有用的备用方案，以防将来需要如此操作。\n\
    \n#### 什么不是计算问题\n\n你遇到的最常见的非计算性问题往往涉及人和数据。（请注意，这完全是基于个人经验的主观观点，但许多开发人员都认同这一点。）\n\
    \n有时，一个应用被设想得近乎神奇——它能为用户提出的问题提供答案。如果你无法将问题分解成计算组件，你就无法回答这个问题。在思考和讨论问题时，你可能会提出这样一个问题：我们该如何做到这一点？此时你不需要在代码中寻找答案；相反，你需要知道正在讨论的问题该如何解决。如果它涉及一个人的判断，而该判断又无法量化，那么很难看出它如何能被计算处理。如果它涉及引用数据，但数据又不可用，那么你也面临着一个非计算性问题。你或许能将一个判断分解成计算组件，但最终，如果剩下的是无法计算的判断（有些人称之为“直觉”），你就需要计算机科学之外的工具了。\n\
    \n**提示**  \n尽管并非所有问题都是计算性的，但你通常可以利用计算模型来处理数字和显示数据，从而留下一个需要判断的核心。用户可以使用你的应用清除所有计算问题，然后对这个非计算性的核心做出自己的判断。\n\
    \n### 建模问题或流程\n\n一旦你能够清晰地阐述问题以及项目所涵盖的问题部分，你就可以开始对问题进行建模了。在这个阶段，你可以使用任何你喜欢的工具——铅笔和纸、智能白板、iPad\
    \ 或其他任何东西。你可能会画一些框图，这些框图执行你想构建的任务的某些部分。暂时不用担心代码——只考虑某种（无论它最终是什么）东西，例如，计算一个人的电话号码（是的，这是一个计算问题——一个搜索）。\n\
    \n这个模型最终可能成为你应用的结构方式，但在这个阶段，它只是描述你的应用各个部分如何协同工作以构成整个应用。你现在要做的就是确定这组任务或操作（在此上下文中，这两个术语可以互换）是否能产生你需要的结果。一旦你有了一个粗略的模型，试着去打破它。如果电话号码查找失败或返回了错误的号码，会发生什么？其他哪些组件会受到影响？\n\
    \n无需担心高层次模型中的每一个未解决的细节，但许多人会保留一份这些未解决细节和假设的清单。人们很容易开始假设所有问题都会在之后得到处理，而如果没有那份假设清单，你最终可能会得到一个接近完成却缺少关键组件的应用。（任何开发人员都能举出许多这样的例子。）\n\
    \n### 练习分解\n\n一旦你有了概念模型，就该深入剖析它了：将每个组件拆开并检查其组成部分。（这个过程称为分解。）当你将整个项目分解成越来越小的部分时，你通常是在指定那些最终会通过代码实现的组件。\n\
    \n在分解模型的过程中，你可能会开始意识到这个或那个组件是你已经知道如何实现的，或者可以使用已知资源来实现。如果你非常幸运，你这个分解后的项目几乎不需要额外的工作就能实现。\n\
    \n### 重新排列与重组项目模块\n\n但“幸运”并不常发生。在现实世界中，开发人员经常发现，如果他们对模型做一些调整，分解后的模块可能会更容易实现。关于整个设计过程，或许最重要的一点是：在项目真正实现之前，一切都应被视为可更改的。\n\
    \n将项目拆开，然后在重新思考每个组件时再将其重新组合起来。目标是制作一个符合你要求的项目，并逐步将各个组件精炼成可管理且可实现的部分。\n\n到目前为止，还没有谈及任何代码。所有的建模和分解都是理论性的。许多开发者（包括作者）认为，你在假设状态下工作得越久，你的实现就会越健壮。不知为何，转入代码实现有时会干扰设计和规划过程。并非所有人都同意这一点，但许多开发人员确实认同。\n"
- fmt: "# Validating Abstractions\n\nOne of the most important aspects of computer\
    \ science is that it gives us a way to talk about the development process and\
    \ about not-yet-built software. Concepts such as decomposition are formalized\
    \ ways of working in this realm of not-yet-built software. Of course, when a project\
    \ is actually implemented, the proof of the pudding is revealed: either it works\
    \ or it doesn’t.\n\nThere actually is a third possibility: the project description\
    \ is not clear enough to be able to determine whether or not a specific implementation\
    \ works or not. If this happens, you can refine your project definition to include\
    \ the missing information or you can add more components to the project itself.\n\
    \nWhat you are working with are abstractions of the project and its components.\
    \ In addition to decomposing and recomposing them, also validate the abstractions.\
    \ You can do this by stepping through whatever process a component or group of\
    \ components or the entire project model will do.\n\nThe closer you get to a final\
    \ project plan, the more specific and concrete your validations should be. At\
    \ the beginning it’s fine to test your model and its abstractions with made-up\
    \ scenarios and data. As you move on, start seeing if your ideas stand the test\
    \ of reality. Start pushing the model components to the limits. Don’t just use\
    \ common circumstances: see if your model will handle extreme cases.\n\nIf you\
    \ are working with clients or users, don’t rely solely on them. They will be glad\
    \ to detail the data they want you to work with, but try to get actual data into\
    \ your hands. You may need to start doing some number crunching and data analysis\
    \ yourself with a spreadsheet or database tool. As many developers and analysts\
    \ say, “The data doesn’t lie.”\n\n## Here Comes the Code\n\nIf you have followed\
    \ these steps in thinking through the problem you want to address and the project\
    \ with which you will address it, you should start to feel comfortable with what\
    \ lies ahead. Review your problem description to make certain you haven’t veered\
    \ off the track (this happens!). Try to decompose the model you are constructing\
    \ into components that can be implemented. Check this draft model for completeness,\
    \ and try to validate it with real data.\n\nYou now should have the outline of\
    \ a project plan using some of the tools and techniques of computer science including\
    \ modeling, decomposition, abstractions, and validation. Once you have moved into\
    \ implementation, you’ll start to use different tools and techniques:\n\n* Modeling\
    \ that you can do with paper and pencil will be replaced by implementation using\
    \ code.\n* Decomposition will be replaced by composition as you put implemented\
    \ components together.\n* Abstractions become concrete implementations using real\
    \ data.\n* Validation becomes real-world testing.\n\nThis begins with the next\
    \ chapter.\n\n# 2. Writing Code and Using Swift Playgrounds\n\nIn Chapter 1, “Thinking\
    \ Computationally,” you see the basic ideas behind computer science and the fundamental\
    \ tasks involved in creating software - a high-level view. This chapter jumps\
    \ to the other extreme - writing code which is as low-level and detailed as you\
    \ can get. The remaining chapters in this book explore specific computer science\
    \ concepts and techniques - everything between the high- and low-level views.\n\
    \n## The Basics of Writing Code\n\nThe simplest kind of computer code is the type\
    \ of code that was used in the 1950s and 1960s. Computers then were mainframe\
    \ computers and some minicomputers (like the PDP and VAX models). Input was with\
    \ punched cards and magnetic tape. Output consisted of printed reports as well\
    \ as punched cards and magnetic tape. (The cards and tape could become input from\
    \ one program to another).\n\nNote: This is a very high-level view of code: you’ll\
    \ find more details and more specific terminology later on in this book.\n\n###\
    \ Actions and Data\n\nThe essence of a computer program is performing an action\
    \ with some data. For example, you can write a program to print out (the action)\
    \ some data.\n\n#### Creating an Action\n\nMany people wrote a common program,\
    \ Hello World, as their first program. It was published in The C Programming Language\
    \ [¹](#A441106_1_En_2_Chapter.html#Fn1) by Brian Kernighan and Dennis Ritchie;\
    \ earlier versions are in other publications, but this is its first major publication.\
    \ The entire program is shown in Listing 2-1.\n\n```\n#include \nmain( )\n{\n\
    printf(\"hello, world\\n\");\n}\n```\n\nListing 2-1: Hello World\n\nThe text “hello,\
    \ world” is printed out with the `printf` statement. Everything else in this little\
    \ program is code that creates and accesses the environment that makes printing\
    \ possible. The program is a terrific demonstration of the difficulty of teaching\
    \ and learning coding: in order to do one thing (print out a line of text), you\
    \ need one line of code and four lines of overhead. This is the issue that is\
    \ addressed in Swift Playgrounds (described later in this chapter). With a playground,\
    \ that overhead is embodied in Swift Playgrounds itself, so you can just write\
    \ the one line you care about.\n\nBelieve it or not, this is a pretty revolutionary\
    \ feature. (It’s not a revolutionary idea because people have tried to get this\
    \ done for years, but Swift Playgrounds may be the first widespread implementation\
    \ of such a simple coding tool).\n\nIn the single line of important code, you\
    \ see one of the two basic coding ideas: a command that will carry out an action.\
    \ In almost every programming language, there are commands you can use to instruct\
    \ the computer to do something in Hello World.\n\n#### Using Data\n\nThe Hello\
    \ World program prints out the phrase “hello, world” (ignore the extraneous -\
    \ for now - `\\n` characters). Programming languages and systems let you store\
    \ data. If you store data, you can print out whatever the stored data is. You\
    \ typically store data in a variable or in an external medium (external to the\
    \ program, that is) such as a punched card, magnetic tape, disk drive, or other\
    \ storage.\n\nData from external storage can be brought into a program so that\
    \ what exists on disk or a punched card is moved to a variable inside the program.\
    \ You can also set a variable to contain specific data. The code for this varies\
    \ by language, but in general it will look like this:\n\n```\nx = \"hello, world\"\
    \n```\n\n`x` is a variable: a storage location where you can put data and from\
    \ which you can get it back. The data is a quoted string of characters — “hello,\
    \ world” — the characters and the quotation marks are treated as a single piece\
    \ of data.\n\nThis means that you can write code such as this:\n\n```\nprintf\
    \ (x);\n```\n\nYou can combine the two techniques:\n\n```\nx = \"hello, world\"\
    \nprintf (x)\n```\n\nListing 2-2: Building a combination of data and action\n\n\
    While this may seem like a complication when you just want to print out that phrase,\
    \ consider what would happen if you wanted to do something more complex than just\
    \ printing. If there were five separate commands to be carried out, keeping them\
    \ together so that you can send one variable to the collection of commands is\
    \ efficient as long as you can combine the five separate commands somehow. You\
    \ can then send another variable to the same collection of commands."
  raw: "### Validating Abstractions\n\nOne of the most important aspects of computer\
    \ science is that it gives us a way to talk about the development process and\
    \ about not-yet-built software. Concepts such as decomposition are formalized\
    \ ways of working in this realm of not-yet-built software. Of course, when a project\
    \ is actually implemented, the proof of the pudding is revealed: either it works\
    \ or it doesn’t.\n\nThere actually is a third possibility: the project description\
    \ is not clear enough to be able to determine whether or not a specific implementation\
    \ works or not. If this happens, you can refine your project definition to include\
    \ the missing information or you can add more components to the project itself.\n\
    \nWhat you are working with are abstractions of the project and its components.\
    \ In addition to decomposing and recomposing them, also validate the abstractions.\
    \ You can do this by stepping through whatever process a component or group of\
    \ components or the entire project model will do.\n\nThe closer you get to a final\
    \ project plan, the more specific and concrete your validations should be. At\
    \ the beginning it’s fine to test your model and its abstractions with made-up\
    \ scenarios and data. As you move on, start seeing if your ideas stand the test\
    \ of reality. Start pushing the model components to the limits. Don’t just use\
    \ common circumstances: see if your model will handle extreme cases.\n\nIf you\
    \ are working with clients or users , don’t rely solely on them. They will be\
    \ glad to detail the data they want you to work with, but try to get actual data\
    \ into your hands. You may need to start doing some number crunching and data\
    \ analysis yourself with a spreadsheet or database tool. As many developers and\
    \ analysts say, “The data doesn’t lie.”\n\n## Here Comes the Code\n\nIf you have\
    \ followed these steps in thinking through the problem you want to address and\
    \ the project with which you will address it, you should start to feel comfortable\
    \ with what lies ahead. Review your problem description to make certain you haven’t\
    \ veered off the track (this happens!). Try to decompose the model you are constructing\
    \ into components that can be implemented. Check this draft model for completeness,\
    \ and try to validate it with real data.\n\nYou now should have the outline of\
    \ a project plan using some of the tools and techniques of computer science including\
    \ modeling, decomposition, abstractions, and validation. Once you have moved into\
    \ implementation, you’ll start to use different tools and techniques :\n\n*  \
    \ Modeling that you can do with paper and pencil will be replaced by implementation\
    \ using code.\n*   Decomposition will be replaced by composition as you put implemented\
    \ components together.\n*   Abstractions become concrete implementations using\
    \ real data.\n*   Validation becomes real-world testing .\n\nThis begins with\
    \ the next chapter.\n\n# 2. Writing Code and Using Swift Playgrounds\n\nIn Chapter\
    \ [1](#A441106_1_En_1_Chapter.html), “Thinking Computationally,” you see the basic\
    \ ideas behind computer science and the fundamental tasks involved in creating\
    \ software - a high-level view. This chapter jumps to the other extreme - writing\
    \ code which is as low-level and detailed as you can get. The remaining chapters\
    \ in this book explore specific computer science concepts and techniques - everything\
    \ between the high- and low-level views.\n\n## The Basics of Writing Code\n\n\
    The simplest kind of computer code is the type of code that was used in the 1950s\
    \ and 1960s. Computers then were mainframe computers and some minicomputers (like\
    \ the PDP and VAX models). Input was with punched cards and magnetic tape. Output\
    \ consisted of printed reports as well as punched cards and magnetic tape. (The\
    \ cards and tape could become input from one program to another).\n\nNote\n\n\
    This is a very high-level view of code: you’ll find more details and more specific\
    \ terminology later on in this book.\n\n### Actions and Data\n\nThe essence of\
    \ a computer program is performing an action with some data. For example, you\
    \ can write a program to print out (the action) some data.\n\n#### Creating an\
    \ Action\n\nMany people wrote a common program, Hello World, as their first program.\
    \ It was published in The C Programming Language [¹](#A441106_1_En_2_Chapter.html#Fn1)\
    \ by Brian Kernighan and Dennis Ritchie; earlier versions are in other publications,\
    \ but this is its first major publication. The entire program is shown in Listing\
    \ [2-1](#A441106_1_En_2_Chapter.html#Par7).\n\n```\n#include \nmain( )\n{\nprintf(\"\
    hello, world\\n\");\n}\nListing 2-1\nHello World\n```\n\nThe text “hello, world”\
    \ is printed out with the `printf` statement. Everything else in this little program\
    \ is code that creates and accesses the environment that makes printing possible.\
    \ The program is a terrific demonstration of the difficulty of teaching and learning\
    \ coding: in order to do one thing (print out a line of text), you need one line\
    \ of code and four lines of overhead. This is the issue that is addressed in Swift\
    \ Playgrounds (described later in this chapter). With a playground, that overhead\
    \ is embodied in Swift Playgrounds itself, so you can just write the one line\
    \ you care about.\n\nBelieve it or not, this is a pretty revolutionary feature.\
    \ (It’s not a revolutionary idea because people have tried to get this done for\
    \ years, but Swift Playgrounds may be the first widespread implementation of such\
    \ a simple coding tool).\n\nIn the single line of important code, you see one\
    \ of the two basic coding ideas: a command that will carry out an action. In almost\
    \ every programming language, there are commands you can use to instruct the computer\
    \ to do something in Hello World.\n\n#### Using Data\n\nThe Hello World program\
    \ prints out the phrase “hello, world” (ignore the extraneous - for now - `\\\
    n` characters). Programming languages and systems let you store data. If you store\
    \ data, you can print out whatever the stored data is. You typically store data\
    \ in a variable or in an external medium (external to the program, that is) such\
    \ as a punched card, magnetic tape, disk drive, or other storage.\n\nData from\
    \ external storage can be brought into a program so that what exists on disk or\
    \ a punched card is moved to a variable inside the program. You can also set a\
    \ variable to contain specific data. The code for this varies by language, but\
    \ in general it will look like this:\n\n```\nx = \"hello, world\"\n```\n\n`x`\
    \ is a variable: a storage location where you can put data and from which you\
    \ can get it back. The data is a quoted string of characters — “hello, world” —\
    \ the characters and the quotation marks are treated as a single piece of data.\n\
    \nThis means that you can write code such as this:\n\n```\nprintf (x);\n```\n\n\
    You can combine the two techniques:\n\n```\nx = \"hello, world\"\nprintf (x)\n\
    Listing 2-2\nBuilding a combination of data and action\n```\n\nWhile this may\
    \ seem like a complication when you just want to print out that phrase, consider\
    \ what would happen if you wanted to do something more complex than just printing.\
    \ If there were five separate commands to be carried out, keeping them together\
    \ so that you can send one variable to the collection of commands is efficient\
    \ as long as you can combine the five separate commands somehow. You can then\
    \ send another variable to the same collection of commands."
  trans: "\n# 验证抽象概念\n\n计算机科学最重要的方面之一，在于它为我们提供了一种讨论开发过程以及尚未构建的软件的方法。诸如分解（decomposition）之类的概念，就是在处理尚未构建的软件这一领域时形式化的工作方式。当然，当一个项目真正被实现时，\"\
    实践是检验真理的唯一标准\"：要么成功，要么失败。\n\n实际上还有第三种可能性：项目描述不够清晰，以至于无法确定某个具体实现是否有效。如果发生这种情况，你可以完善项目定义以包含缺失的信息，或者向项目本身添加更多组件。\n\
    \n你正在处理的是项目及其组件的抽象概念。除了对它们进行分解和重组之外，还要验证这些抽象概念。你可以通过逐步模拟一个组件、一组组件或整个项目模型将要执行的过程来做到这一点。\n\
    \n越是接近最终的项目计划，你的验证就应该越具体、越实际。在初期阶段，使用虚构的场景和数据来测试你的模型及其抽象概念是可以的。随着进程推进，要开始检验你的想法是否能经受住现实的考验。开始将模型组件推向极限。不要只使用常见情况：看看你的模型能否处理极端情况。\n\
    \n如果你与客户或用户合作，不要完全依赖他们。他们会乐于详细说明希望你处理的数据，但请尽量将实际数据掌握在自己手中。你可能需要开始使用电子表格或数据库工具自己进行一些数字运算和数据分析。正如许多开发者和分析师所说：\"\
    数据不会说谎。\"\n\n## 代码来了\n\n如果你已经按照这些步骤深入思考了想要解决的问题以及用来解决问题的项目，那么你应该对未来的工作感到心中有数。重新审视你的问题描述，确保你没有偏离轨道（这种情况确实会发生！）。尝试将你正在构建的模型分解为可实现的组件。检查这个草稿模型的完整性，并尝试用真实数据对其进行验证。\n\
    \n现在，你应该已经有了一个项目计划大纲，其中运用了计算机科学的一些工具和技术，包括建模、分解、抽象和验证。一旦进入实现阶段，你将开始使用不同的工具和技术：\n\
    \n*   用纸笔进行的建模将被使用代码的实现所取代。\n*   随着你将已实现的组件组合在一起，分解将被组合所取代。\n*   抽象概念会变成使用真实数据的具体实现。\n\
    *   验证变成了现实世界的测试。\n\n这些工作从下一章开始。\n\n# 2. 编写代码和使用 Swift Playgrounds\n\n在第 1 章\"\
    计算思维\"中，你了解了计算机科学背后的基本思想以及创建软件所涉及的基本任务——这是一个高层次的视角。本章将跳到另一个极端——编写代码，这是你能达到的最底层、最细节的层面。本书接下来的章节将探讨具体的计算机科学概念和技术——涵盖介于高层和底层视角之间的所有内容。\n\
    \n## 编写代码的基础知识\n\n最简单的计算机代码是 20 世纪 50 年代和 60 年代使用的那种代码。当时的计算机是大型机和小型机（如 PDP 和\
    \ VAX 型号）。输入是通过穿孔卡片和磁带进行的。输出包括打印报告以及穿孔卡片和磁带。（这些卡片和磁带可以成为一个程序到另一个程序的输入。）\n\n注意：这只是对代码的一个非常粗略的概述：你会在本书后面找到更详细、更具体的术语。\n\
    \n### 操作和数据\n\n计算机程序的本质就是用某些数据执行一个操作。例如，你可以编写一个程序来打印（操作）某些数据。\n\n#### 创建操作\n\n\
    许多人编写的第一个程序是常见的\"Hello World\"程序。它由布莱恩·克尼汉和丹尼斯·里奇在《C 程序设计语言》¹一书中发表；早期的版本出现在其他出版物中，但这是它首次在重要出版物中亮相。完整的程序如代码清单\
    \ 2-1 所示。\n\n```\n#include \nmain( )\n{\nprintf(\"hello, world\\n\");\n}\n```\n\
    \n代码清单 2-1：Hello World\n\n文本\"hello, world\"通过`printf`语句打印出来。这个小程序中的其他所有代码都是用来创建和访问使打印成为可能的环境。这个程序极好地说明了教授和学习编程的困难之处：为了做一件事（打印一行文本），你需要一行代码和四行\"\
    额外开销\"。这正是 Swift Playgrounds（本章后面会介绍）所要解决的问题。使用 playground，这些额外开销被封装在 Swift Playgrounds\
    \ 本身中，因此你只需编写你关心的那一行代码。\n\n信不信由你，这是一个颇具革命性的特性。（这个想法本身并不革命，因为多年来一直有人试图实现这一点，但 Swift\
    \ Playgrounds 可能是第一个如此简单易用的编码工具的广泛实现）。\n\n在这一行重要的代码中，你看到了两个基本编码概念之一：一个执行操作的命令。在几乎所有的编程语言中，都有你可以用来指示计算机在\
    \ Hello World 中做某事的命令。\n\n#### 使用数据\n\nHello World 程序打印出了短语\"hello, world\"（暂时忽略那个多余的`\\\
    n`字符）。编程语言和系统允许你存储数据。如果你存储了数据，就可以打印出所存储数据的任何内容。你通常将数据存储在变量中，或存储在外部媒介（即程序外部）中，例如穿孔卡片、磁带、磁盘驱动器或其他存储设备。\n\
    \n来自外部存储的数据可以被导入程序，这样磁盘或穿孔卡片上的数据就会被移动到程序内部的变量中。你也可以设置一个变量来包含特定的数据。不同语言的代码有所不同，但通常会像这样：\n\
    \n```\nx = \"hello, world\"\n```\n\n`x` 是一个变量：一个存储位置，你可以将数据放入其中，并从中取回数据。数据是一个带引号的字符串——\"\
    hello, world\"——字符和引号被当作一个单独的数据片段处理。\n\n这意味着你可以编写这样的代码：\n\n```\nprintf (x);\n\
    ```\n\n你可以将这两种技术结合起来：\n\n```\nx = \"hello, world\"\nprintf (x)\n```\n\n代码清单 2-2：构建数据和操作的组合\n\
    \n虽然当你只想打印出那个短语时这看起来有点复杂，但想想如果你想做比打印更复杂的事情会怎样。如果有五个独立的命令要执行，只要你能够以某种方式将这五个独立的命令组合起来，将它们整合在一起，以便你可以将一个变量发送给这组命令，这样效率会很高。然后你可以将另一个变量发送给同一组命令。\n"
- fmt: "## Combining Actions and Data\n\nYou often want to carry out several actions\
    \ together. In various coding languages, you can combine them into a collection\
    \ of actions that can be executed as if they were one. The terminology varies\
    \ by language, but a collection of actions is referred to as a `method`, `function`,\
    \ `procedure`, `subroutine`, or `block`. (There are variations in the specific\
    \ meaning of those terms, but they all refer to collections of actions).\n\nYou\
    \ also can create collections of data. In the example shown here, `x` is a variable.\
    \ At its most basic level, it is a specific storage location that can contain\
    \ data. Collections of data are arrays, sets, and dictionaries. (There are other\
    \ terms as well).\n\nCollections of actions can include data either as single\
    \ variables or as collections of data. Just as you can enter data values into\
    \ actions (as in `printf(\"hello, world\")`) or use a variable as in Listing [2-2](#A441106_1_En_2_Chapter.html#Par16),\
    \ you can use a collection of data for the action to act on.\n\n## What Happens\
    \ Behind the Code\n\nThe code that you write is designed to be more or less readable\
    \ by humans. Behind the scenes, there are two other types of code. At the most\
    \ basic level, there is machine code: these are the instructions that are executed\
    \ by the computer itself (its central processing unit or CPU). Each type of computer\
    \ may have its own language for machine code. In practice, today the machine code\
    \ is specific to the type of chip that is at the heart of the computer. There\
    \ may be several chips, but they typically use the same machine code so that it\
    \ can be executed on whatever chip is available at any time. (See “Threads” in\
    \ Chapter [6](#A441106_1_En_6_Chapter.html), “Building Components.”)\n\nMachine\
    \ language can be turned into assembly by the use of a program called an `assembler`.\
    \ Assembly (or assembly language) is a bit easier for humans to read. The key\
    \ component here is the `assembler` program itself that does the conversion from\
    \ assembly language to machine code. The code is called assembly language or assembler;\
    \ while the tool that generates it is often called an `assembler`. The context\
    \ clarifies whether you are talking about the tool or the code.\n\nEven more human-readable\
    \ than assembly is a computer programming language. The first languages such as\
    \ COBOL and FORTRAN in the 1950s are referred to as higher-level programming languages.\
    \ They are turned into assembly by programs called `compilers`.\n\n**Tip**  \n\
    For more information, do research on Grace Hopper and her colleagues.\n\nThe hierarchy\
    \ of programming languages from simple to more complex is this:\n\n- Machine code\
    \ (the most basic);\n- Assembly;\n- Higher-level languages such as FORTRAN and\
    \ COBOL;\n- Later on languages such as C, Pascal, and now Swift and Python among\
    \ many others make reading and writing code by and for humans much easier.\n\n\
    Higher-level languages are ideally machine independent so that someone who knows\
    \ how to write COBOL, FORTRAN, or Swift should be able to have that code compiled\
    \ into assembler and then assembled into machine language on any computer. Assemblers\
    \ are usually machine- (or chip-) specific. Thus if you write a program in a higher-level\
    \ language, it can be compiled into assembler and thence to machine code. Two\
    \ points are critically important:\n\n- Although higher-level programming languages\
    \ are portable (the common term for running on multiple computer architectures),\
    \ the `compilers` that turn them into assembler and machine code are specific\
    \ to a specific architecture of computer or chip.\n- There are often cross-compilers\
    \ that take a higher-level programming language and compile it into assembler\
    \ for a different computer than the one on which it is running.\n\nBecause assembler\
    \ and machine code are specific to computer and chip architectures as well as\
    \ the even more important point that most programming and coding today is done\
    \ in higher-level languages, this book (like most computer science references\
    \ today) does not go into assembler and machine language except for broad conceptual\
    \ views such as this section.\n\nIn today’s coding environment, compiled code\
    \ is often combined with graphics and many other assets. This process is referred\
    \ to as building (and the result is called a build). The build process is often\
    \ machine specific. Thus, the code is machine independent if it uses a language\
    \ such as C, but the build process means that it is not portable. To write code\
    \ that can run on a specific computer, you need a compiler or cross-compiler that\
    \ can turn the code into assembler and thence to machine code; you also need a\
    \ build program to build it for the computer you are targeting (the verb “target”\
    \ is used to identify the ultimate computer on which your code will run). A build\
    \ program can even combine several programs in several programming languages if\
    \ you want.\n\n## Compiling and Interpreting Code\n\nToday’s computers are much\
    \ more powerful than those from the early days of programming languages (the 1940s\
    \ to 1970s). As a result, the very clear pattern of machine code, assembly, and\
    \ higher-level languages with assemblers and compilers is more complex. Instead\
    \ of compiling programming language code, in some cases it can be interpreted:\
    \ the higher-level language is processed and turned into executable code so quickly\
    \ that it happens as quickly as it is typed.\n\n**Tip**  \nExecutable code is\
    \ the term for code that can actually run on a computer. Sometimes, people refer\
    \ to executable code as an executable."
