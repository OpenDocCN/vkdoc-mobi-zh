- fmt: "### Identifying and Finding Set Elements\n\nBehind the scenes, the elements\
    \ of a set are hashed. That is, a formula is applied to the contents in such as\
    \ way as to create an integer that is unique to the data that has been hashed.\
    \ It is this hashed value that is used to identify set elements. There is no need\
    \ for a subscript or other identification. Because the hashed values are stored,\
    \ there are no duplicates (that is, no two set elements can have the same hashed\
    \ value). In order to access a set element, all you need is to know that the element\
    \ is in the set. Once you know it is in the set, you need no further access mechanism.\n\
    \nOf course, you need to find out if it is a member of a set. There is a set function\
    \ for that:\n\n```\ncontains (_:)\n```\n\nIt returns a `Bool`, so you can use\
    \ it as in the following code:\n\n```\nlet myElement = // something\nif mySet.contains\
    \ (myElement) {\n    // go ahead and use it knowing that it’s a member of the\
    \ set\n}\n```\n\n#### Declaring and Creating Swift Sets and Types\n\nA set is\
    \ declared using a type such as this:\n\n```\nSet<String>\nSet<Int>\n```\n\nand\
    \ so forth with the other basic Swift types including `Double` and `Bool`. You\
    \ can create a set using syntax like this:\n\n```\nvar mySet = Set<String>()\n\
    ```\n\nThe set is created and empty.\n\nAs with arrays, you can use an array literal\
    \ to create a set using syntax such as the following:\n\n```\nvar mySet: Set =\
    \ [\"mountain\", \"valley\"]\n```\n\nThis combines the basic type declaration\
    \ with the creation of a variable that contains the set’s initial data. Remember\
    \ that if the set’s type can be inferred from the initial elements, you can skip\
    \ the type in the declaration, but if the initial elements might suggest a less\
    \ inclusive type than you want, use the type declaration.\n\n### Adding and Deleting\
    \ Set Elements\n\nYou can add an element to a set very simply as long as the new\
    \ element adheres to two important rules for sets:\n\n1.  The element cannot already\
    \ be in the set. Remember that set elements are unique.\n2.  The element must\
    \ be of the type in the set declaration. (Remember that you have `Any?` and `AnyObject?`\
    \ types you can use for tremendous flexibility.)\n\nTo add an element to a set\
    \ (as long as it obeys the two rules), the most basic syntax is\n\n`insert(_:)`\n\
    \nas in\n\n```\nmySet.insert(myNewElement)\n```\n\nThe companion removal method\
    \ is\n\n`remove(_:)`\n\nas in\n\n```\nmySet.remove(myNewElement)\n```\n\nBecause\
    \ sets are not ordered, you don’t worry about where to insert the element (first,\
    \ last, or so forth). You insert it into the set wherever it happens to go.\n\n\
    **Tip**\n\nWhen debugging code, remember that sets are unordered, but from time\
    \ to time they may appear ordered because the order in which you have added or\
    \ removed elements may appear to create an order but that is only a transient\
    \ matter. From one execution of your app to another the order may change. Do not\
    \ rely on accidental ordering that you may temporarily create while editing and\
    \ debugging.\n\n### Working with Sets\n\nThe two basic set theory operations are\
    \ supported with set methods in Swift:\n\n```\naSet.union(anotherSet)\naSet.intersection(anotherSet)\n\
    ```\n\nOther methods support more advanced operations, but, as noted previously,\
    \ many sets are created for their ability to be easily written and read. Their\
    \ set theory operations aren’t used in many cases.\n\n**Note**\n\nSee Chapter\
    \ [8](#A441106_1_En_8_Chapter.html), “Managing Control Flow” for iterating through\
    \ sets.\n\n## Using Dictionaries\n\nSets are totally unordered. Arrays are ordered\
    \ by the sequence of items in them. Dictionaries are more sophisticated. One way\
    \ of thinking about them is that they are ordered but not by numbers. With an\
    \ array, you can reference an element that is the fifth element of the array (remember\
    \ the array is zero-based) by using\n\n```\nmyArray[6]\n```\n\nWith a dictionary,\
    \ you might use syntax such as\n\n```\nmyDictionary[\"six\"]\n```\n\nAssociative\
    \ arrays are implemented in many languages such as PHP, JavaScript, Python, Ruby,\
    \ and Perl. In Swift and Objective-C, they are dictionaries.\n\n- Basic Dictionary\
    \ Terminology\n- Declaring and Creating a Dictionary\n- Adding and Deleting Dictionary\
    \ Elements\n\n### Basic Dictionary Terminology\n\nThere is no ordering to set\
    \ elements. Elements in an array are indexed, and the indexes are managed by the\
    \ array itself. What is element number 5 today may be element 25 tomorrow depending\
    \ on additions and deletions.\n\nDictionaries are collections of pairs of data:\
    \ keys and values (key-value pairs). Commonly, keys are strings, but they need\
    \ not be (in some languages dictionary or associative array keys must be strings).\n\
    \n### Declaring and Creating a Dictionary\n\nYou can formally declare a dictionary\
    \ in Swift with\n\n```\nDictionary<Key, Value>\n```\n\n`Key` and `Value` are the\
    \ types of keys and values in the dictionary.\n\nThe shorthand form omits the\
    \ keyword `Dictionary`; you can declare a dictionary with\n\n```\n[Key: Value]\n\
    ```\n\nAgain, `Key` and `Value` are the types of keys and values in the dictionary.\n\
    \nYou can create an empty dictionary using `()` after the declaration as in\n\n\
    ```\nDictionary<Int, String>()\n```\n\nThis declaration deliberately reverses\
    \ a common dictionary structure in which the key is a string. Here, the key is\
    \ an `Int` and the value is a `String`. That shows you the options available to\
    \ you.\n\nIf you forget the `()` when you intend to create a dictionary, Fix-It\
    \ will remind you as you see in Figure [6-12](#A441106_1_En_6_Chapter.html#Fig12).\n\
    \n**Tip**\n\nIf you use dictionaries, you must import `Foundation` in your app\
    \ or playground. If you are importing `UIKit`, you don’t need to import `Foundation`\
    \ as well because it is included in `UIKit`.\n\n![A441106_1_En_6_Fig12_HTML.jpg](A441106_1_En_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12\n\nDeclaring and creating a dictionary\n\nYou can assign a newly\
    \ declared and created dictionary to a variable using code such as\n\n![A441106_1_En_6_Fig13_HTML.jpg](A441106_1_En_6_Fig13_HTML.jpg)\n\
    \nFigure 6-13\n\nAssign a dictionary to a `var`\n\n```\nvar testDictionary = Dictionary<Int,\
    \ String>()\n```\n\nIf you tap the viewer in line 3 of Figure [6-13](#A441106_1_En_6_Chapter.html#Fig13),\
    \ you’ll see how Swift Playgrounds reports it:\n\n```\n[:]\n```\n\nDictionary\
    \ entries are enclosed in square brackets with a colon separating the key and\
    \ value. An empty dictionary has only the square brackets and the colon as you\
    \ see.\n\nYou can also create a dictionary from a dictionary literal that functions\
    \ much as an array literal does. It is enclosed in square brackets and contains\
    \ comma-separated key-value pairs.\n\nAs an example, assume you want to create\
    \ this dictionary:\n\n```\n\"Breakfast\":\"Eggs\"\n\"Lunch\": \"Soup\"\n\"Dinner\"\
    : \"Vegetables and Rice\"\n```\n\nYou can create it with a dictionary literal\
    \ as in:\n\n```\nvar menu = [\"Breakfast\":\"Eggs\", \"Lunch\":\"Soup\", \"Dinner\"\
    :\"Vegetables and Rice\"]\n```\n\n### Adding and Deleting Dictionary Elements\n\
    \nTo add a dictionary element, insert it into the dictionary with its key as:\n\
    \n```\ntestDictionary [5] = \"some text\"\n```\n\nThis is shown on line 4 of Figure\
    \ [6-13](#A441106_1_En_6_Chapter.html#Fig13).\n\nYou remove an element as follows\n\
    \n```\ntestDictionary.removeValue((forKey:Int))\n```\n\nAs shown in Figure [6-14](#A441106_1_En_6_Chapter.html#Fig14),\
    \ code completion inserts the appropriate type for the key depending on how you\
    \ have declared the dictionary.\n\n![A441106_1_En_6_Fig14_HTML.jpg](A441106_1_En_6_Fig14_HTML.jpg)\n\
    \nFigure 6-14\n\nRemove a dictionary element"
  raw: '### Identifying and Finding Set Elements


    Behind the scenes, the elements of a set are hashed. That is, a formula is applied
    to the contents in such as way as to create an integer that is unique to the data
    that has been hashed. It is this hashed value that is used to identify set elements.
    There is no need for a subscript or other identification. Because the hashed values
    are stored, there are no duplicates (that is, no two set elements can have the
    same hashed value). In order to access a set element, all you need is to know
    that the element is in the set. Once you know it is in the set, you need no further
    access mechanism.


    Of course, you need to find out if it is a member of a set. There is a set function
    for that:


    ```

    contains (_:)

    ```


    It returns a `Bool`, so you can use it as in the following code:


    ```

    let myElement = // something

    if mySet.contains (myElement) {

    // go ahead and use it knowing that it’s a member of the set

    }

    ```


    #### Declaring and Creating Swift Sets and Types


    A set is declared using a type such as this:


    ```

    Set

    Set

    ```


    and so forth with the other basic Swift types including `Double` and `Bool`. You
    can create a set using syntax like this:


    ```

    var mySet = Set()

    ```


    The set is created and empty.


    As with arrays, you can use an array literal to create a set using syntax such
    as the following:


    ```

    var mySet: Set = ["mountain", "valley"]

    ```


    This combines the basic type declaration with the creation of a variable that
    contains the set’s initial data. Remember that if the set’s type can be inferred
    from the initial elements, you can skip the type in the declaration, but if the
    initial elements might suggest a less inclusive type than you want, use the type
    declaration .


    ### Adding and Deleting Set Elements


    You can add an element to a set very simply as long as the new element adheres
    to two important rules for sets:


    1.  The element cannot already be in the set. Remember that set elements are unique.
     

    2.  The element must be of the type in the set declaration. (Remember that you
    have `Any?` and `AnyObject?` types you can use for tremendous flexibility.)  


    To add an element to a set (as long as it obeys the two rules), the most basic
    syntax is


    `insert`(_:)


    as in


    ```

    mySet.insert(myNewElement)

    ```


    The companion removal method is


    ```

    remove(_:)

    ```


    as in


    ```

    mySet.remove(myNewElement)

    ```


    Because sets are not ordered, you don’t worry about where to insert the element
    (first, last, or so forth). You insert it into the set wherever it happens to
    go.


    Tip


    When debugging code, remember that sets are unordered, but from time to time they
    may appear ordered because the order in which you have added or removed elements
    may appear to create an order but that is only a transient matter. From one execution
    of your app to another the order may change. Do not rely on accidental ordering
    that you may temporarily create while editing and debugging.


    ### Working with Sets


    The two basic set theory operations are supported with set methods in Swift:


    ```

    aSet.union(anotherSet)

    aSet.intersection(anotherSet)

    ```


    Other methods support more advanced operations, but, as noted previously, many
    sets are created for their ability to be easily written and read. Their set theory
    operations aren’t used in many cases.


    Note


    See Chapter [8](#A441106_1_En_8_Chapter.html), “Managing Control Flow” for iterating
    through sets.


    ## Using Dictionaries


    Sets are totally unordered. Arrays are ordered by the sequence of items in them.
    Dictionaries are more sophisticated. One way of thinking about them is that they
    are ordered but not by numbers. With an array , you can reference an element that
    is the fifth element of the array (remember the array is zero-based) by using


    ```

    myArray[6]

    ```


    With a dictionary, you might use syntax such as


    ```

    myDictionary["six"]

    ```


    Associative arrays are implemented in many languages such as PHP, JavaScript,
    Python, Ruby, and Perl. In Swift and Objective-C, they are dictionaries.


    *   Basic Dictionary Terminology

    *   Declaring and Creating a Dictionary

    *   Adding and Deleting Dictionary Elements


    ### Basic Dictionary Terminology


    There is no ordering to set elements. Elements in an array are indexed, and the
    indexes are managed by the array itself. What is element number 5 today may be
    element 25 tomorrow depending on additions and deletions.


    Dictionaries are collections of pairs of data: keys and values (key-value pairs).
    Commonly, keys are strings, but they need not be (in some languages dictionary
    or associative array keys must be strings).


    ### Declaring and Creating a Dictionary


    You can formally declare a dictionary in Swift with


    ```

    Dictionary

    ```


    `Key` and `Value` are the types of keys and values in the dictionary.


    The shorthand form omits the keyword Dictionary; you can declare a dictionary
    with


    ```

    [Key: Value]

    ```


    Again, `Key` and `Value` are the types of keys and values in the dictionary.


    You can create an empty dictionary using `()` after the declaration as in


    ```

    Dictionary ()

    ```


    This declaration deliberately reverses a common dictionary structure in which
    the key is a string. Here, the key is an `Int` and the value is a `string`. That
    shows you the options available to you.


    If you forget the `()` when you intend to create a dictionary, Fix-It will remind
    you as you see in Figure [6-12](#A441106_1_En_6_Chapter.html#Fig12).


    Tip


    If you use dictionaries, you must import `Foundation` in your app or playground.
    If you are importing UIKit, you don’t need to import Foundation as well because
    it is included in UIKit.


    ![A441106_1_En_6_Fig12_HTML.jpg](A441106_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    Declaring and creating a dictionary


    You can assign a newly declared and created dictionary to a variable using code
    such as


    ![A441106_1_En_6_Fig13_HTML.jpg](A441106_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Assign a dictionary to a `var`


    ```

    var testDictionary = Dictionary ()

    ```


    If you tap the viewer in line 3 of Figure [6-13](#A441106_1_En_6_Chapter.html#Fig13),
    you’ll see how Swift Playgrounds reports it:


    ```

    [:]

    ```


    Dictionary entries are enclosed in square brackets with a colon separating the
    key and value. An empty dictionary has only the square brackets and the colon
    as you see.


    You can also create a dictionary from a dictionary literal that functions much
    as an array literal does. It is enclosed in square brackets and contains comma-separated
    key-value pairs.


    As an example, assume you want to create this dictionary:


    ```

    "Breakfast":"Eggs"

    "Lunch": "Soup"

    "Dinner": "Vegetables and Rice"

    ```


    You can create it with a dictionary literal as in:


    ```

    var menu = ["Breakfast":"Eggs", "Lunch":"Soup", "Dinner":"Vegetables and Rice"]

    ```


    ### Adding and Deleting Dictionary Elements


    To add a dictionary element, insert it into the dictionary with its key as:


    ```

    testDictionary [5] = "some text"

    ```


    This is shown on line 4 of Figure [6-13](#A441106_1_En_6_Chapter.html#Fig13).


    You remove an element as follows


    ```

    testDictionary.removeValue((forKey:Int)

    ```


    As shown in Figure [6-14](#A441106_1_En_6_Chapter.html#Fig14), code completion
    inserts the appropriate type for the key depending on how you have declared the
    dictionary.


    ![A441106_1_En_6_Fig14_HTML.jpg](A441106_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Remove a dictionary element'
  trans: "\n### 识别与查找集合元素\n\n在幕后，集合的元素会经过哈希处理。也就是说，会对元素内容应用一个公式，从而生成一个该数据唯一的哈希整数。正是这个哈希值被用来标识集合元素，因此无需下标或其他标识符。由于哈希值被存储，所以集合中不会出现重复元素（即两个集合元素不可能拥有相同的哈希值）。要访问集合元素，你只需知道该元素在集合中即可。一旦确定它在集合中，就无需进一步的访问机制。\n\
    \n当然，你需要判断某个元素是否属于集合。为此，集合提供了以下函数：\n\n```\ncontains(_:)\n```\n\n该函数返回一个 `Bool`\
    \ 值，因此你可以像下面的代码那样使用它：\n\n```\nlet myElement = // 某个元素\nif mySet.contains(myElement)\
    \ {\n    // 确定该元素属于集合后，即可放心使用\n}\n```\n\n#### 声明与创建 Swift 集合及类型\n\n集合使用如下类型进行声明：\n\
    \n```\nSet<String>\nSet<Int>\n```\n\n以此类推，其他基本 Swift 类型（包括 `Double` 和 `Bool`）也可用于声明。你可以使用以下语法创建集合：\n\
    \n```\nvar mySet = Set<String>()\n```\n\n这样创建一个空集合。\n\n与数组类似，你也可以使用数组字面量来创建集合，语法如下：\n\
    \n```\nvar mySet: Set = [\"mountain\", \"valley\"]\n```\n\n这结合了基本类型声明与包含初始数据的集合变量的创建。记住，如果集合的类型可以从初始元素中推断出来，你可以在声明中省略类型；但如果初始元素可能暗示的类型范围比你想要的更窄，则请使用类型声明。\n\
    \n### 添加与删除集合元素\n\n只要新元素遵守集合的两个重要规则，你就可以非常简单地将其添加到集合中：\n\n1.  该元素不能已经存在于集合中。记住，集合元素是唯一的。\n\
    2.  该元素必须与集合声明中的类型一致。（记住，你可以使用 `Any?` 和 `AnyObject?` 类型以获得极大的灵活性。）\n\n要将元素添加到集合中（只要它遵守上述两条规则），最基本的语法是：\n\
    \n`insert(_:)`\n\n例如：\n\n```\nmySet.insert(myNewElement)\n```\n\n对应的移除方法是：\n\n\
    `remove(_:)`\n\n例如：\n\n```\nmySet.remove(myNewElement)\n```\n\n因为集合是无序的，所以你无需担心将元素插入到何处（开头、末尾等）。你只需将其插入到集合中的任意位置即可。\n\
    \n**提示**\n\n调试代码时，请记住集合是无序的。但有时它们可能会显得有序，因为添加或移除元素的顺序可能会暂时造成一种顺序假象，但这只是暂时的。在应用的不同执行过程中，顺序可能会发生变化。不要依赖你在编辑和调试时可能临时产生的偶然顺序。\n\
    \n### 处理集合\n\nSwift 集合方法支持两种基本的集合论运算：\n\n```\naSet.union(anotherSet)\naSet.intersection(anotherSet)\n\
    ```\n\n其他方法支持更高级的运算，但如前所述，许多集合的创建是为了读写方便。在很多情况下，它们的集合论运算并不常用。\n\n**注意**\n\n关于如何遍历集合，请参阅第\
    \ 8 章《管理控制流》。\n\n## 使用字典\n\n集合是完全无序的。数组按其中项目的顺序排序。字典则更为复杂。一种理解方式是，它们是有序的，但并非按数字排序。对于数组，你可以使用如下方式引用数组中的第五个元素（记住数组从零开始）：\n\
    \n```\nmyArray[6]\n```\n\n而对于字典，你可能使用如下语法：\n\n```\nmyDictionary[\"six\"]\n```\n\
    \n关联数组在许多语言中都有实现，例如 PHP、JavaScript、Python、Ruby 和 Perl。在 Swift 和 Objective-C 中，它们被称为字典。\n\
    \n-   字典基本术语\n-   声明与创建字典\n-   添加与删除字典元素\n\n### 字典基本术语\n\n集合元素没有顺序。数组中的元素有索引，并且索引由数组本身管理。今天是第\
    \ 5 个的元素，明天可能因为添加或删除而变成第 25 个。\n\n字典是数据对的集合：键和值（键值对）。通常，键是字符串，但并非必须如此（在某些语言中，字典或关联数组的键必须是字符串）。\n\
    \n### 声明与创建字典\n\n你可以在 Swift 中正式声明一个字典，使用：\n\n```\nDictionary<Key, Value>\n```\n\
    \n`Key` 和 `Value` 分别是字典中键和值的类型。\n\n简写形式省略了关键字 `Dictionary`；你可以使用以下方式声明字典：\n\n\
    ```\n[Key: Value]\n```\n\n同样，`Key` 和 `Value` 是字典中键和值的类型。\n\n你可以在声明后使用 `()` 创建一个空字典，例如：\n\
    \n```\nDictionary<Int, String>()\n```\n\n这个声明故意颠倒了常见字典结构（键为字符串）。这里，键是 `Int`，值是\
    \ `String`。这向你展示了可用的选项。\n\n如果你在打算创建字典时忘记了写 `()`，Fix-It 会提醒你，如图 6-12 所示。\n\n**提示**\n\
    \n如果你使用字典，必须在应用或 Playground 中导入 `Foundation`。如果你导入了 `UIKit`，则无需再导入 `Foundation`，因为它已包含在\
    \ `UIKit` 中。\n\n![A441106_1_En_6_Fig12_HTML.jpg](img/A441106_1_En_6_Fig12_HTML.jpg)\n\
    \n图 6-12 声明与创建字典\n\n你可以使用如下代码将新声明并创建的字典赋值给一个变量：\n\n![A441106_1_En_6_Fig13_HTML.jpg](img/A441106_1_En_6_Fig13_HTML.jpg)\n\
    \n图 6-13 将字典赋值给一个 `var`\n\n```\nvar testDictionary = Dictionary<Int, String>()\n\
    ```\n\n如果你点击图 6-13 第 3 行的查看器，就会看到 Swift Playgrounds 如何报告它：\n\n```\n[:]\n```\n\n\
    字典条目用方括号括起来，键和值之间用冒号分隔。如你所见，空字典只有方括号和冒号。\n\n你也可以通过字典字面量创建字典，其功能类似于数组字面量。它用方括号括起来，包含逗号分隔的键值对。\n\
    \n例如，假设你想创建如下字典：\n\n```\n\"Breakfast\":\"Eggs\"\n\"Lunch\": \"Soup\"\n\"Dinner\"\
    : \"Vegetables and Rice\"\n```\n\n你可以使用字典字面量创建它，如下所示：\n\n```\nvar menu = [\"Breakfast\"\
    :\"Eggs\", \"Lunch\":\"Soup\", \"Dinner\":\"Vegetables and Rice\"]\n```\n\n###\
    \ 添加与删除字典元素\n\n要添加字典元素，使用其键将其插入字典，如下所示：\n\n```\ntestDictionary [5] = \"some text\"\
    \n```\n\n这显示在图 6-13 的第 4 行。\n\n移除元素的方法如下：\n\n```\ntestDictionary.removeValue((forKey:Int))\n\
    ```\n\n如图 6-14 所示，代码补全会根据你声明字典的方式自动插入适当的键类型。\n\n![A441106_1_En_6_Fig14_HTML.jpg](img/A441106_1_En_6_Fig14_HTML.jpg)\n\
    \n图 6-14 移除字典元素\n"
- fmt: '# Summary


    This chapter shows you the basics collections in Swift and in computer science
    in general. The constructs are basically the same in all languages although some
    (such as associative arrays and dictionaries or sets) may not be implemented in
    some special-purpose languages.


    All collections let you handle collections of data as a single entity. For example,
    a set containing many elements can read or written with a single line of code
    in Swift. Furthermore, you can use collections where single variables are required.
    In a dictionary, for example, there can only be one element for a given key. However,
    if that element is itself a collection (an array, set, or dictionary), that entire
    collection can be part of another collection. You''ll see more on this in the
    following chapters.


    # 7. Working with Data: Types


    One of the basics of computer science is the concept of data types. In the simplest
    case, a type is a way of interpreting the digital bits in a computer''s memory
    or in a data stream for or from a storage device. Bits have one of two values
    (on/off), and they are typically grouped together logically into bytes. Bytes
    began as collections of bits that could represent a single character; the first
    implementations were of six bits, but today bytes are typically either bits so
    that more characters can be represented by a single byte.


    It is important to note that while bits are physical items, bytes are logical
    collections. They are assembled and interpreted by hardware and software based
    on the underlying bits.


    The bits (the hardware) are physically collected into words that typically can
    contain enough bits to form several characters, but, remember, the assembling
    of bits into bytes is logical and not physical while the assembling of bits into
    words is done in hardware.


    Words can be accessed directly in software, which is what programs and operating
    systems do all the time. You can use software to look inside a word to work with
    individual bits and bytes.


    This chapter shows you what happens as words (physical groups of bits) and bytes
    (logical groups of bits) are used by the operating system and, through it, by
    users. One of the basic ways in which words are managed is by grouping then into
    data types. This chapter explores data types and how you can use them. The main
    topics covered in this chapter are the following:


    * Why Types Matter

    * Basic Types

    * Working with Tuples

    * Advanced Swift Types

    * Creating New Types

    * Handling Data That Isn''t There (Optionals)


    ## Why Types Matter


    The basics of types are simple. They are the primary intermediary between the
    on/off bits in storage and data flows and the higher-level constructs such as
    bits and bytes as well as the even-higher constructs that bits and bytes form.


    If that were all that types did, that would be enough (as it was in the very earliest
    computers). It''s a critical link between the hardware and the software. Computer
    science goes beyond the basics of how computers work. It encompasses the concepts
    that let computers and people perform useful work and communicate with one another.
    From that point of view, types have another critical role to play.


    A type provides the rules for assembling bits into words that can be used. Those
    words can have types assigned to them (the usage is that the words are typed).
    Those typed words are then used in code. Remember that types are logical constructs
    — the physical words never change no matter what type they are used as. (The data
    within the words change.) By referring to a word as a specific type, compilers
    can perform one of their most critical roles. Languages and compilers support
    varying amounts of type safety. Type safety is the set of rules that determines
    how a word of a given type can be used in conjunction with other types. If the
    combination of types is logically impossible according to the type safety rules,
    it is caught as an error by the compiler, and the code won''t run. This is an
    important role for the compiler to play, because the alternative is to just go
    ahead and do something that is illogical and watch as the app crashes.


    It is generally considered a good thing for coders to get the errors rather than
    letting users get them.


    Types and type safety make this possible.


    You can mix types in various ways depending on the rules for each type. For example,
    you can divide two integers by one another (5 divided by 2, for example). The
    result that you probably want is a floating point number (2.5).


    Depending on the context, Swift, Xcode, or the runtime environment will either
    refuse to perform an illegal operation (that is, it will get an error), or it
    will warn you about performing a possibly illogical operation (that is usually
    implemented with a warning to you, the coder).


    A key part of implementing type safety is allowing developers to convert one type
    to another (this is called type coercion). Sometimes, the format of a number itself
    can serve as an indicator of its type. For example, 2 is an integer both in common
    usage and in Swift. `2.0` is a floating point number (note the decimal point).
    Its value is the same as `2` (without a decimal point), but it is of a different
    type.


    **Note:** Swift supports two kinds of floating point numbers. `Float` is stored
    in such a way that it may have as few as 6 places to the right of the decimal
    point. `Double` is stored with much greater precision. `Double` is the preferred
    and default type for floating point numbers.


    ## Looking at Stacks and Heaps


    Types describe how the bits in a word should be interpreted — be it as an integer,
    floating point number, one or more characters or bytes, or even the collection
    of individual bits that can be accessed as on/off values on their own.


    However, not everything you deal with in an app consists of words like these.
    As you saw in Chapter 6, "Working with Data: Collections," you also need to deal
    with collections of data. Most of the time, these collections are collections
    of words that are interpreted as certain types. As you will see in Chapter 10,
    "Building Components," sometimes you deal with objects. Collections and objects
    don''t fit inside single words, so another type of storage is needed. For items
    like these, operating systems typically reserve a section of memory in which they
    can place these large and often variably sized items.'
