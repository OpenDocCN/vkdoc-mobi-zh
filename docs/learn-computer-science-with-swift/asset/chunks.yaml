    As a general rule, added complexity is the cost you pay for mixing data and interface
    elements. The solution is to use a notification.


    Notifications consist of two components . The first broadcasts a notification
    that an event has happened. The second component is an observer that waits to
    find out about a notification. What is important is that these do not have to
    know about one another. In the case of the button and label in the first view
    controller, the communication is within that view controller. With a notification,
    it can be generated by the first view controller (where the notification button
    is) and observed by the second view controller (where the label is).


    Notifications are broadcast across an app; an object can request to be notified
    of specific notifications, but there is no direct linkage as there is among objects
    within a single view controller.


    It is this lack of linkage that makes notifications so useful. It also exposes
    an issue that you will see in the code that follows (along with the solution).


    #### Notification Basics


    There are two key points to remember about notifications.


    *   Each notification has a name. This is not a string, but rather a `Notification.Name`
    type. You’ll see how to specify this.

    *   Notifications may not be delivered. Because there is no direct linkage between
    notification and observer, if a notification is not observed, no error is generated.
    The notifier posts a notification, and it may or may not be observed.'
  trans: '

    ### 实现一个已知操作的按钮


    首先，常见的情况是实现一个按钮，该按钮执行你已知并能与其一同实现的操作。这个示例从 Xcode 内置的“标签页应用”启动模板开始。如果你基于该模板创建应用，将会得到一个包含两个视图的应用，如图
    11-1 所示。


    ![A441106_1_En_11_Fig1_HTML.jpg](img/A441106_1_En_11_Fig1_HTML.jpg)


    图 11-1 （左）标签页应用第一个视图，（右）标签页应用第二个视图


    基础模板实现了两个视图控制器以及底部的标签栏控制器，后者允许你在两个视图之间切换。


    你可以像图 11-2 那样，向其中一个视图控制器添加按钮和标签。


    ![A441106_1_En_11_Fig2_HTML.jpg](img/A441106_1_En_11_Fig2_HTML.jpg)


    图 11-2 添加按钮和标签


    接下来你会发现，很容易就能为按钮编写代码，使其改变标签中的文本，如图 11-3 所示，文本已变为“按钮已点击”。


    ![A441106_1_En_11_Fig3_HTML.jpg](img/A441106_1_En_11_Fig3_HTML.jpg)


    图 11-3 实现按钮


    实现按钮的代码并不特别复杂，尤其是在 Xcode 的协助下——你在第 12 章中会看到。按钮和标签的代码如代码清单 11-1 和图 11-4 所示。


    ![A441106_1_En_11_Fig4_HTML.jpg](img/A441106_1_En_11_Fig4_HTML.jpg)


    图 11-4 第一个视图控制器的代码


    ```

    import UIKit

    class FirstViewController: UIViewController {

    @IBOutlet weak var label: UILabel!

    @IBOutlet weak var button: UIButton!

    @IBAction func buttonAction(_ sender: Any) {

    label.text = "Button Tapped"

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    // Dispose of any resources that can be recreated.

    }

    }

    ```


    代码清单 11-1 实现按钮和标签


    代码首先将界面中的对象（使用第 12 章描述的 Storyboard）与代码关联起来。`label` 和 `button` 都是 `@IBOutlet` 项目——这意味着它们位于界面中，但可以从代码中访问。可以看到，一个是
    `label`，另一个是 `button`。


    类似的方式也适用于 `@IBAction`。这是实现按钮操作的代码。你会在实现用户界面的代码中到处看到 `@IBOutlet` 和 `@IBAction`。


    `@IBAction` 代码行可以重新格式化，以便更清晰：


    ```

    @IBAction func buttonAction(_ sender: Any) {

    label.text = "Button Tapped"

    }

    ```


    当按钮被点击时，`buttonAction` 被调用，`label` 的文本变为 `Button Tapped`。


    这就是实现按钮及其操作所需的全部内容。


    ### 实现一个带通知的按钮


    如果要添加一个按钮来更新第二个视图控制器上的标签，事情就会变得稍微复杂一些。向第一个视图控制器添加一个新按钮来启动这个进程并不难。图 11-5 展示了其外观。


    ![A441106_1_En_11_Fig5_HTML.jpg](img/A441106_1_En_11_Fig5_HTML.jpg)


    图 11-5 添加一个使用通知的按钮


    你还可以像图 11-6 那样向第二个视图控制器添加一个标签。这个标签将由第一个视图控制器上的通知按钮更新。


    ![A441106_1_En_11_Fig6_HTML.jpg](img/A441106_1_En_11_Fig6_HTML.jpg)


    图 11-6 向第二个视图控制器添加标签


    你可以开始向按钮添加更新第二个视图控制器中标签的功能，但会立即遇到一个问题，如代码清单 11-2 和图 11-7 所示。


    ![A441106_1_En_11_Fig7_HTML.jpg](img/A441106_1_En_11_Fig7_HTML.jpg)


    图 11-7 第二个视图控制器的代码（Xcode）


    ```

    import UIKit

    class SecondViewController: UIViewController {

    @IBOutlet weak var label: UILabel!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    // Dispose of any resources that can be recreated.

    }

    }

    ```


    代码清单 11-2 通知按钮的代码


    问题在于导航按钮的声明位于第一个视图控制器中，而需要更新的标签的声明位于第二个导航控制器中。如何从第一个视图控制器访问第二个视图控制器？


    在这种情况下，有多种方法可以绕开这个问题。最明显的是将代码放入一个同时连接两个视图控制器的对象中。这意味着管理按钮和标签的工作将转移到应用委托或管理两个可见视图控制器的标签栏控制器中。这些策略都可以奏效，但代价是应用委托或标签栏控制器会变得更加复杂。（对于标签栏控制器而言，区别在于使用模板中的基础
    `UITabBarController` 与实现子类，以便可以从子类修改一个或两个按钮或标签。）


    总的来说，增加的复杂性是为混合数据和界面元素所付出的代价。解决方案是使用通知。


    通知由两个组件组成。第一个组件广播一个事件已发生的通知。第二个组件是一个观察者，等待发现通知。重要的是，它们之间不需要相互了解。在第一个视图控制器的按钮和标签的情况下，通信发生在该视图控制器内部。使用通知时，它可以由第一个视图控制器（通知按钮所在处）生成，并由第二个视图控制器（标签所在处）观察。


    通知在整个应用内广播；一个对象可以请求被通知特定的通知，但不像单个视图控制器内的对象之间存在直接链接。


    正是这种缺乏直接链接的特性使通知如此有用。这也暴露了一个问题，你将在下面的代码（以及解决方案）中看到。


    #### 通知基础


    关于通知，有两个关键点需要记住。


    - 每个通知都有一个名称。这不是一个字符串，而是一个 `Notification.Name` 类型。你将看到如何指定它。

    - 通知可能不会被送达。由于通知和观察者之间没有直接链接，如果通知未被观察，不会产生错误。通知者发布一个通知，它可能会被观察，也可能不会被观察。

