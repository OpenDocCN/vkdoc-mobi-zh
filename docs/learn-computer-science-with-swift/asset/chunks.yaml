  trans: '

    ### 存储字符串与字符


    字符串和字符在应用中用于显示文本……有时确实如此。文本可以显示在应用中的图像里，尽管你可能认为它们就是字符串和字符，但当它们成为图像的一部分时，它们就和云朵的照片一样，本质上就是图像。


    字符由一系列比特位表示。根据所涉及的字符和语言，所需的比特位数会有所不同。最初，字符的长度是六位，后来扩展到了八位。如今，借助 Unicode 字符，大多数字符和世界上大部分语言都能被显示。你最常遇到的编码格式是
    `UTF-8`、`UTF-16` 和 `UTF-32`（其中的数字表示单个字符所使用的比特位数）。


    字符串是字符的序列。从字符可能的长度可以看出，一个字符串很容易超出单个计算机字的范围，因此字符串通常不存储在栈上，而是通过某种形式的引用字来访问。


    ### 创建新类型


    当你声明常量或变量时，需要指定其类型。你可以通过类型注解来实现，或者为常量或变量设置一个值，以便 Swift 能推断其类型，如下例所示。


    ```

    var myVariable:Int // 类型注解

    var myVariable = 20 // 推断类型

    ```


    当推断出的类型可能不是你想要的类型时，类型注解就变得很重要。例如，虽然 `20` 会让 Swift 推断为 `Int` 类型，但以下代码会将变量变为 `Double`
    类型。


    ```

    var myVariable: Double = 20 // 类型注解覆盖了推断出的 Int 类型

    ```


    你还可以在 Swift 中声明新类型。其他现代语言也允许你这样做，但传统语言会将你可使用的类型限制在语言及其编译器内置的范围内。这允许使用本章前面描述的类型检查，在编码/编译过程中捕获错误，而不是在用户尝试使用你的应用时才发现问题。


    你可以在 Swift 中声明新类型。一旦声明，你就可以像使用原始类型一样使用它们来声明变量和常量，并在类型注解中使用你的新类型。你的新类型是基于 Swift
    中已有的类型（以及你自身代码中的类型）构建的。例如，你可以创建一个依赖 `Int` 类型的类型。你的类型可以与 `Int` 类型一起使用。（在下一节“使用元组”中，你将看到这样做的好处。）


    要声明新类型，你需要使用 Swift 的 `typealias` 语法，其中一个类型被别名为另一个类型。这样做的一个原因是为了提高代码的可读性。你可以（并且应该）以清晰表明变量和常量含义的方式为其命名，但有时你希望优化命名以使其更加精确。例如，如果你使用内置的
    `String` 类型来命名应用中处理的条目，那么使用 `String` 类型是没问题的。


    你可能希望使用类型别名向自己和他人明确该字符串具体代表什么。因此，你可以像这样使用 `typealias`：


    ```

    typealias productName = String

    ```


    现在，你可以在声明中使用 `productName`，如下所示：


    ```

    var widget1:productName = "Widget 1"

    var widget2:productName = "Widget 2"

    ```


    你可以超越简单的命名，为集合类型使用 `typealias`。例如，你可以为你的库存创建一个数组：


    ```

    var inventory = Array ()

    inventory = [widget1, widget2]

    ```


    只要尊重类型，你可以向数组中添加其他数组。因为数组可以有重复的元素，你可以用 `widget1` 创建另一个数组，并将该数组添加到 `inventory`
    中。


    ```

    inventory += [widget1]

    print (inventory)

    ```


    你可以在图 7-1 中看到结果。


    ![A441106_1_En_7_Fig1_HTML.jpg](img/A441106_1_En_7_Fig1_HTML.jpg)


    图 7-1 向数组中添加另一个元素


    你可以使用相同的逻辑，将一个字符串（以其自身数组的形式）添加到 `inventory` 数组中。


    ```

    inventory += ["dog"]

    print (inventory)

    ```


    你可以将字符串 “dog” 添加到 `inventory` 中，因为 `inventory` 是类型为 `productName` 的数组，而 `productName`
    是 `String` 的 `typealias`。


    如果对一个新的 `Int` 类型数组（17）应用相同的逻辑，你将会得到一个错误，如图 7-2 所示。该数组是 `typealias productName`（即
    `String`）类型的数组，因此不允许 `Int` 类型。


    ![A441106_1_En_7_Fig2_HTML.jpg](img/A441106_1_En_7_Fig2_HTML.jpg)


    图 7-2 你不能向数组中添加 `Int` 类型


    ```

    inventory += [17]

    print (inventory)

    ```


    如果你将 17 放在引号中，使其成为 `String` 类型，那么一切都会正常，如图 7-3 所示。


    ![A441106_1_En_7_Fig3_HTML.jpg](img/A441106_1_En_7_Fig3_HTML.jpg)


    图 7-3 以 `String` 类型添加 `Int`


    使用 `typealias` 使你的代码更具可读性是一个非常有益的想法，并且它有助于防止以后出现问题，因为类型的具体用途对你和其他维护代码的人而言都变得清晰明了。

