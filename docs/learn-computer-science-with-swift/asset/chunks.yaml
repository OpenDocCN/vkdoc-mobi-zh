  trans: '

    #### 遍历集合


    最简单的版本就是简单地循环遍历集合（这被称为迭代）。代码清单 8-15 展示了三个简单的集合（一个数组、一个字典和一个集合），以及如何使用相同的语法对它们进行循环遍历。


    ```

    let myArray = ["dog", 4.6] as [Any]

    let myDictionary = ["name": "Rover", "weight": 20.5] as [String : Any]

    let mySet = ["name", "weight"]

    for arrayItem in myArray {

    print (arrayItem)

    }

    for dictionaryItem in myDictionary {

    print (dictionaryItem)

    }

    for setElement in mySet {

    print (setElement)

    }

    Listing 8-15

    Using for-in loops for collections

    ```


    你可以在图 8-14 所示的 Playground 中看到这一点。


    ![A441106_1_En_8_Fig14_HTML.jpg](img/A441106_1_En_8_Fig14_HTML.jpg)


    图 8-14


    在 Playground 中探索循环


    这种遍历方式非常常见，当你只想依次处理集合中的每个元素时，它就能派上用场。


    #### 遍历索引（数组）和键（字典）


    对于数组和字典，有时你不仅需要元素的值，还需要它的索引（对于数组而言）或其键（对于字典而言）。


    > **注意：** 由于集合是无序的，没有键或索引可供使用，因此你只能像上一节所述那样遍历集合元素。


    正如上一节所述，遍历集合元素与枚举这些元素之间是有区别的。在本节中，你将看到如何枚举一个数组。这种枚举会提供数组的每个元素及其对应的索引。（请记住，数组索引是数组结构本身的一部分，而非数据的一部分。）


    内置函数 `enumerated` 会为数组的每个元素提供元组。每个元组由数组索引和值组成。如果你对数组调用 `enumerated()`，你将看到如图 8-15
    所示的这些元组。请注意，之前使用的数据已更改，在数组中增加了第三个元素（`cat`）。Playground 中的数据查看器会显示包含这三个元素的数组。如果你点击展开三角形打开它，就会看到三个索引及其关联的值。


    ![A441106_1_En_8_Fig15_HTML.jpg](img/A441106_1_En_8_Fig15_HTML.jpg)


    图 8-15


    在数组上调用 `enumerated()` 的结果


    如果你想使用这些枚举值，可以使用如下代码来显示它们。首先，在数组 `myArray` 上调用 `enumerated` 函数。然后，`for-in` 循环对
    `myArray.enumerated()` 的结果进行操作。每个元组中的两个值都会被打印出来。


    ```

    for (index, item) in myArray.enumerated() {

    print ("index: " + String(index) + " item:" + String(describing: item))

    }

    ```


    你使用的元组名称无关紧要，因为重要的是元组中元素的顺序。如果你想这样修改代码，它仍然可以正常工作（只要你更新 `print` 语句以匹配你为元组值赋予的名称）。


    需要注意的重要一点是，由于你处理的值不全是字符串，你可以接受 Xcode 中提供的 Fix-It 建议，将数字转换为字符串。这些建议依赖于 `String(describing:)`
    函数，正如本节代码中所看到的那样。


    要对字典进行类似的枚举，你不需要调用 `enumerated`，因为字典中的键值对本身既包含键也包含值。因此，你可以像这样直接为元组值命名：


    ```

    for (key, value) in myDictionary {

    print ("key:" + key + " value:" + String(describing: value))

    }

    ```


    本节中的代码显示在代码清单 8-16 中。


    ![A441106_1_En_8_Fig16_HTML.jpg](img/A441106_1_En_8_Fig16_HTML.jpg)


    图 8-16


    展示字典的键和数组的索引


    ```

    let myArray = ["dog", 4.6] as [Any]

    let myDictionary = ["name": "Rover", "weight": 20.5] as [String : Any]

    for (index, item) in myArray.enumerated() {

    print ("index: " + String(index) + " item:" + String(describing: item))

    }

    for (key, value) in myDictionary {

    print ("key:" + key + " value:" + String(describing: value))

    }

    Listing 8-16

    ```


    ### 使用步长（Strides）


    除了内置的重复结构（`for-in` 和 `while`），Swift 标准库还包含一些在这些场景中常用的函数。你已经见过了 `enumerated()`
    函数，其他函数也值得探索。你可能会发现标准库中一个有用的函数是 `stride(from:to:by:)` 函数。这个函数可以被遵循了 `Strideable`
    协议的类型所采用。你不必过于担心这具体意味着什么，只需记住那些遵循 `Strideable` 的类型列表：


    - `CGFloat`

    - `Decimal`

    - `Double`

    - `Float`

    - `Float80`


    在处理这些类型的数组时，你可以应用两个 `stride` 函数：


    ```

    stride (from: to: by:)

    stride (from: through: by:)

    ```


    它们之间的区别在于是否将上限值包含在步长范围内（`through` 包含，`to` 不包含）。使用 `stride`，你可以实现一些你可能习惯的 C 语言风格的循环（具体来说，不仅可以指定从某个值到某个值，还可以使用步长，而不仅仅是递增
    1）。


    ## 总结


    本章深入探讨了一些许多语言通用的基础计算机科学原理。在讨论的两个主题（枚举和 switch 语句）中，你看到了 Swift 如何扩展通用功能，以及如何使通用特性得到更严格定义和使用。


    在了解了数据与类型以及控制流程之后，你已经掌握了计算机科学的许多基础知识。下一步是学习如何存储和检索数据。毕竟，如果没有这些功能，用户每次运行应用时都只能从头开始。'
- fmt: '# 9. Storing Data and Sharing Data


    Computer science focuses on the design and use of computers in one standard phrase.
    Although there are early examples of computer-like devices (notably the Charles
    Babbage Analytical Engine in the 1830s, the Jacquard loom in 1804, and the Enigma
    machines in the 1930s and through the Second World War with Turing’s advances),
    the modern computer age really began in the 1940s. The big steps forward in the
    1940s were significant hardware advances, and, arguably, the most important step
    forward was the development of programming and compilers so that computers could
    generate their own instructions from English-like code written by humans. (Look
    at information about Grace Hopper and her colleagues on the Internet for more
    details of the software side of things.)


    Even with the development of personal computers in the late 1970s and the rise
    of the Internet in the 1990s, not much changed in the basics of computer science
    as new technologies and new capabilities emerged. One thing that has changed —
    quite dramatically — is the storing and sharing of data.


    Whereas the advances in computer hardware have often been dramatically heralded
    in the media, changes related to data seem to be of less interest to many people.
    In fact, many people consider data and data management to be an almost trivial
    part of the computer science world. Oh, yes, there''s data, and it needs to be
    stored somewhere, but let''s look at exciting things like 3D printing, social
    media, and forget about that mundane data storage. (Ask almost any data management
    specialist for an opinion on this topic, and you''re likely to unleash a veritable
    torrent of comments on the matter.)


    The role of data is critical to computer science and its applications, and that
    role has evolved in ways that few people have focused on until very recently.
    This chapter addresses the data issues in computer science. It is divided into
    four sections that address the four primary data concerns:


    - What is the data? All apps generate, consume, and store data. You may think
    your app is the exception, but there are no exceptions if you look at all the
    data that your app generates, consumes, and stores.

    - Where is the data stored? With the exception of data that is generated by hardware
    and software on demand, the data that makes apps possible needs to be stored somewhere.
    Sometimes the app is creating data, and if that is the case, it typically needs
    to be stored somewhere even if that location is temporary and on some scratchpad
    that is built into the system or the app.

    - Who is in charge of the data? Is it static or is it updated periodically (and,
    if it is updated, who does that)? Who owns the data (that''s not an easy question
    to answer in many cases)? What procedures are in place to manage updates and data
    integrity and security?

    - How is the data managed? This question covers everything from the formats of
    data in spreadsheets to database management systems and the issues in the new
    sphere of Big Data.


    > **Note**

    > This chapter is somewhat different from the others in this book in that it doesn''t
    show you the code to write because most of the issues are at a higher level than
    the code. In fact, it can be argued that the issues of data management are at
    least as important as the code that creates, manages, and uses the data. But whatever
    your opinion on the relative importance of code and data, they are both so important
    that both belong in any approach to computer science in the twenty-first century.
    Perhaps fifty years ago when "data" meant carton upon carton of punched cards,
    reel upon reel of magnetic tape, and stacks and stack of paper documents to be
    keypunched, it was possible to look at computer science without bothering about
    all that data. It''s not true anymore. As the pioneers of computer programming
    in the 1940s understood, computers can work with codes that stand for numbers
    just as easily as codes that stand for program logic and commands. Data and code
    are, in many ways, interchangeable. That''s the lesson of Grace Hoppe: it''s what
    makes compilers possible.


    ## What Is the Data?


    If you think the answer to this question is simple, think again. When you read,
    hear, or see a news item about a data breach, hacking, or system failure, you
    often find references to data that you never thought about before. When you first
    start to think about the data that an app uses (creates, generates, or manages),
    you think clearly of various aspects of that data.


    What the news reports often tell us is what many data managers have known for
    quite a while: that application data is just the tip of the iceberg. The time
    and place where someone used the app are important in many cases, and those items
    are part of the app''s data. (If you don''t believe this, follow the news items
    and look for what investigators are searching for when they search for data on
    a suspect''s phone, desktop, or other device.)


    Data sent to or from an app can fall into the "app data" category. Also in the
    category of app data is the app description on an app store along with comments
    on media (including social media) about what the app can be used for, and how
    it is used.


    All of this is "app data," and all of it matters in various ways to various people.
    The data that routine users of an app deal with in their routine uses of the app
    is just part of the app''s data.


    Everyone needs to be aware of this data whether you are a user, developer, or
    manager whose job includes using an app and its data. Each role has to think about
    the app data. Start with the designer or developer. If you start to think about
    this data, you may decide that you cannot control who keeps track of when and
    where people use your app.


    That''s wrong.


    The record of use is, in part, generated by the app itself, and that is your responsibility
    if you are a developer or designer. If your app welcomes returning users with
    a "Welcome Back!" message, that may be a friendly welcome, but in order to generate
    it, you as the developer have to store the information that distinguishes between
    a first-time user and a returning user. Right away, you are storing information
    that may or may not be important to your users (and to others). Every design decision
    of this kind affects the app data.


    In some cases, it clearly doesn''t matter, and in others it does matter and the
    user knows it. If your app charges per use, it''s reasonable that you''re keeping
    track of the uses. In general, many experts in security and data management suggest
    that you store everything you need and nothing you don''t need. "It might come
    in handy some day" is really not a very good rationale for deciding to store data.
    Remember that data that is not stored can''t be stolen, it can''t be garbled or
    corrupted, and — perhaps most important of all — it can''t take up valuable storage
    space on devices and the cloud.


    It is a source of amazement to many developers how clients come in and sit down
    to discuss a new project with a long list of data to be stored in this new project
    or app. If the developer asked the client where the data will be stored, the response
    all too often is "in the app" or, sometimes, "in the cloud." Before you move very
    far into a project, make certain that you understand exactly where the data will
    be stored. As you hone in on the details of storing data, clients often start
    to understand what is entailed. You can give them some estimates for the storage
    and maintenance of their data, and, many times, the need to store lots and lots
    of possibly useful "someday" data is reduced or disappears.


    Remember: store what you need to store and nothing else. Read histories of famous
    computer science projects and follow the adventures of projects that have come
    to grief with overly ambitious data storage schemes. There are many.


    The need to clarify data and its storage doesn''t mean you shouldn''t store data.
    You must store and use it in most cases. Just be careful.'
