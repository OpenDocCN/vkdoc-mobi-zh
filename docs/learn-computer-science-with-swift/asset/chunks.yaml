- fmt: "```markdown\n# How to Write Software\n\nMany people think that writing software\
    \ means sitting down with a blank screen or blank piece of paper and typing away.\
    \ When you’ve typed enough code, you have an app. This may have been true in the\
    \ mainframe era with punched cards, but it’s not true now.\n\nAn app today typically\
    \ consists of code, graphical elements, other forms of media (video, audio, and\
    \ the like), as well as an enormous amount of code in several frameworks that\
    \ become part of the app. The framework code handles routine functionality such\
    \ as reading and writing data, managing screen and mouse or trackpad, and much\
    \ of what makes a modern app a modern app.\n\nThis means that “writing” an app\
    \ now starts to mean putting an app together from a wide variety of components\
    \ and pieces. Although the mechanics of building an app are a separate topic than\
    \ computer science, a brief overview is worth considering so that you understand\
    \ how the pieces fit together.\n\nStart by registering for an Apple developer\
    \ ID at `developer.apple.com`. You will walk through the process of registration.\
    \ Note that if you are below the age of majority (adulthood) in your region, you\
    \ will need an adult to vouch for you. If you are enrolled in a school or work\
    \ for a company, they may have an Apple developer account you can use.\n\nHere\
    \ is a generalized sequence of the steps in app development on `Xcode`. You’ll\
    \ see how to start the process in the following section, “Developing an App with\
    \ `Xcode`.” These are the questions you will have to answer, so start thinking\
    \ about them before you begin.\n\n1. Decide what the app will do. Sitting down\
    \ to “write an app” without knowing what that app will do is futile. Whether you\
    \ are working as an independent developer, part of a corporate team, or in any\
    \ other configuration, having what is known as an elevator speech to sum up your\
    \ project in a few seconds is a good idea (many people would say it’s essential).\
    \ Your purpose or objective may change over time, but that’s normal. Just make\
    \ sure that you know what today’s version is. (Note also that periodically during\
    \ the development process you may want to think about versions.) Modern development\
    \ technologies like Agile suggest that at all times there should be something\
    \ runnable, and that is a good practice to follow. This may mean that periodically\
    \ — maybe even once a week — you have to take stock and either eliminate some\
    \ functionality or postpone it to a future version in order to have next week’s\
    \ version of the app on schedule.\n\n2. Begin the app description. In addition\
    \ to your 10-second version of the app’s purpose, many people (including the author)\
    \ suggest that you start building the app’s App Store presence. That is structured\
    \ text and images that are more extensive than your elevator speech version. If\
    \ you will be marketing your app yourself, you will need this sooner or later.\
    \ If other people do the marketing, you can work out this description with them.\
    \ The main reason to start this description at the beginning is that it provides\
    \ more detail for you as you are building the app. Look on `developer.apple.com`\
    \ for more information on building your app’s online presence.\n\n3. Name the\
    \ app. This can be a code name or a name that you plan on changing later (when\
    \ you think of a better one). It is easy to change the name that will appear in\
    \ marketing materials and the App Store. (This is a change from the beginning\
    \ of the App Store.) Figure 12-1 shows the General tab for the app in `Xcode`\
    \ where you will provide this information.\n\n   ![A441106_1_En_12_Fig1_HTML.jpg](A441106_1_En_12_Fig1_HTML.jpg)\n\
    \n   Figure 12-1\n\n   Set General settings for the app. `Display name` is the\
    \ name people will see for your app. (In this example, it is `Tabs`.) The `bundle\
    \ identifier` is the internal name for the app. It can be different from the `Display\
    \ Name`. The `bundle identifier` must be a unique name. It is normally constructed\
    \ from your developer account name. Each version of the app (a build) will have\
    \ its own version and build identifiers. You usually start with version `1.0`\
    \ (you may prefer something like `0.1`) and build `1`. Each time you submit an\
    \ app build to the App Store, you will increase the build counter so that it is\
    \ always unique and increasing. You can skip build numbers, but you can’t go backward.\
    \ The version numbers will appear to users so it is up to you and your managers\
    \ and marketers when to decide that the next build will be something like `2.0`\
    \ rather than `1.16`. Using default values in `Xcode` are fine until you need\
    \ to work with the App Store.\n\n4. Choose the app environments. Will you run\
    \ the app on iPhone, iPad, Apple Watch, `tvOS` Mac, or other devices? What orientation(s)\
    \ will you support for iPhone and iPad? These are choices you need to make at\
    \ the beginning (and they are required for the app description). The choices are\
    \ modifiable, but you need a starting point. Choose these in `Deployment Info`\
    \ as shown in Figure 12-1.\n\n5. Choose the earliest app environment version you\
    \ support. The default versions in `Xcode` usually adhere to Apple’s policy of\
    \ supporting the current and one prior version. Thus, with the release of iOS\
    \ 11 in 2017, iOS 10 is generally supported. Some apps support earlier versions.\
    \ This is also set in `Deployment Info` using the `Deployment Target` drop-down\
    \ list. You can use the default values for the rest of the settings in Figure\
    \ 12-1.\n\n6. Choose the app development environment. `Xcode` is a given for the\
    \ Apple frameworks, and `Swift` is usually a given these days. If you are incorporating\
    \ third-party frameworks for your development, you may not be able to use `Swift`\
    \ but as this is written, the legacy `Objective-C` frameworks are becoming fewer\
    \ and fewer. You also need to choose the `Xcode` development version you want\
    \ to support. This will be set when you set up your project. It is discussed in\
    \ “Developing an App with `Xcode`” next in this section.\n\n7. Decide on the graphics.\
    \ You may work with a designer to develop what the app should look like. Also\
    \ start considering an app logo.\n\n8. Choose the capabilities you will support\
    \ on the Capabilities tab as shown in Figure 12-2. These can be changed later,\
    \ but this gives you an idea of what you can build in. (Note that it’s easier\
    \ to choose capabilities now and not use them than to retrofit them later in most\
    \ cases.)\n\n   ![A441106_1_En_12_Fig2_HTML.jpg](A441106_1_En_12_Fig2_HTML.jpg)\n\
    \n   Figure 12-2\n\n   Set capabilities.\n\n## Developing an App with Xcode\n\n\
    With your app plans in mind, you can start to actually develop an app with `Xcode`.\n\
    ```"
  raw: "## How to Write Software\n\nMany people think that writing software means\
    \ sitting down with a blank screen or blank piece of paper and typing away. When\
    \ you’ve typed enough code, you have an app. This may have been true in the mainframe\
    \ era with punched cards, but it’s not true now.\n\nAn app today typically consists\
    \ of code, graphical elements, other forms of media (video, audio, and the like),\
    \ as well as an enormous amount of code in several frameworks that become part\
    \ of the app. The framework code handles routine functionality such as reading\
    \ and writing data, managing screen and mouse or trackpad, and much of what makes\
    \ a modern app a modern app.\n\nThis means that “writing ” an app now starts to\
    \ mean putting an app together from a wide variety of components and pieces. Although\
    \ the mechanics of building an app are a separate topic than computer science,\
    \ a brief overview is worth considering so that you understand how the pieces\
    \ fit together.\n\nStart by registering for an Apple developer ID at developer.apple.com.\
    \ You will walk through the process of registration. Note that if you are below\
    \ the age of majority (adulthood) in your region, you will need an adult to vouch\
    \ for you. If you are enrolled in a school or work for a company, they may have\
    \ an Apple developer account you can use.\n\nHere is a generalized sequence of\
    \ the steps in app development on Xcode. You’ll see how to start the process in\
    \ the following section, “Developing an App with Xcode.” These are the questions\
    \ you will have to answer, so start thinking about them before you begin.\n\n\
    1.  Decide what the app will do. Sitting down to “write an app ” without knowing\
    \ what that app will do is futile. Whether you are working as an independent developer,\
    \ part of a corporate team, or in any other configuration, having what is known\
    \ as an elevator speech to sum up your project in a few seconds is a good idea\
    \ (many people would say it’s essential). Your purpose or objective may change\
    \ over time, but that’s normal. Just make sure that you know what today’s version\
    \ is. (Note also that periodically during the development process you may want\
    \ to think about versions.) Modern development technologies like Agile suggest\
    \ that at all times there should be something runnable, and that is a good practice\
    \ to follow. This may mean that periodically — maybe even once a week — you have\
    \ to take stock and either eliminate some functionality or postpone it to a future\
    \ version in order to have next week’s version of the app on schedule.  \n2. \
    \ Begin the app description . In addition to your 10-second version of the app’s\
    \ purpose, many people (including the author) suggest that you start building\
    \ the app’s App Store presence. That is structured text and images that are more\
    \ extensive than your elevator speech version. If you will be marketing your app\
    \ yourself, you will need this sooner or later. If other people do the marketing,\
    \ you can work out this description with them. The main reason to start this description\
    \ at the beginning is that it provides more detail for you as you are building\
    \ the app. Look on developer.apple.com for more information on building your app’s\
    \ online presence.  \n3.  Name the app. This can be a code name or a name that\
    \ you plan on changing later (when you think of a better one). It is easy to change\
    \ the name that will appear in marketing materials and the App Store. (This is\
    \ a change from the beginning of the App Store.) Figure [12-1](#A441106_1_En_12_Chapter.html#Fig1)\
    \ shows the General tab for the app in Xcode where you will provide this information.\n\
    \n    ![A441106_1_En_12_Fig1_HTML.jpg](A441106_1_En_12_Fig1_HTML.jpg)\n\n    Figure\
    \ 12-1\n\n    Set General settings for the app Display name is the name people\
    \ will see for your app. (In this example, it is Tabs.) The bundle identifier\
    \ is the internal name for the app. It can be different from the Display Name.\
    \ The bundle identifier must be a unique name. It is normally constructed from\
    \ your developer account name. Each version of the app (a build) will have its\
    \ own version and build identifiers. You usually start with version 1.0 (you may\
    \ prefer something like 0.1) and build 1\\. Each time you submit an app build\
    \ to the App Store, you will increase the build counter so that it is always unique\
    \ and increasing. You can skip build numbers, but you can’t go backward. The version\
    \ numbers will appear to users so it is up to you and your managers and marketers\
    \ when to decide that the next build will be something like 2.0 rather than 1.16.\
    \ Using default values in Xcode are fine until you need to work with the App Store\
    \ .  \n4.  Choose the app environments . Will you run the app on iPhone, iPad,\
    \ Apple Watch, tvOS Mac, or other devices? What orientation(s) will you support\
    \ for iPhone and iPad? These are choices you need to make at the beginning (and\
    \ they are required for the app description). The choices are modifiable, but\
    \ you need a starting point. Choose these in Deployment Info as shown in Figure\
    \ [12-1](#A441106_1_En_12_Chapter.html#Fig1).  \n5.  Choose the earliest app environment\
    \ version you support. The default versions in Xcode usually adhere to Apple’s\
    \ policy of supporting the current and one prior version. Thus, with the release\
    \ of iOS 11 in 2017, iOS 10 is generally supported. Some apps support earlier\
    \ versions. This is also set in Deployment Info using the Deployment Target drop-down\
    \ list. You can use the default values for the rest of the settings in Figure\
    \ [12-1](#A441106_1_En_12_Chapter.html#Fig1) .  \n6.  Choose the app development\
    \ environment. Xcode is a given for the Apple frameworks, and Swift is usually\
    \ a given these days. If you are incorporating third-party frameworks for your\
    \ development, you may not be able to use Swift but as this is written, the legacy\
    \ Objective-C frameworks are becoming fewer and fewer. You also need to choose\
    \ the Xcode development version you want to support. This will be set when you\
    \ set up your project. It is discussed in “Developing an App with Xcode” next\
    \ in this section.  \n7.  Decide on the graphics . You may work with a designer\
    \ to develop what the app should look like. Also start considering an app logo.\
    \  \n8.  Choose the capabilities you will support on the Capabilities tab as shown\
    \ in Figure [12-2](#A441106_1_En_12_Chapter.html#Fig2) . These can be changed\
    \ later, but this gives you an idea of what you can build in. (Note that it’s\
    \ easier to choose capabilities now and not use them than to retrofit them later\
    \ in most cases.)\n\n    ![A441106_1_En_12_Fig2_HTML.jpg](A441106_1_En_12_Fig2_HTML.jpg)\n\
    \n    Figure 12-2\n\n    Set capabilities\n\n## Developing an App with Xcode\n\
    \nWith your app plans in mind, you can start to actually develop an app with Xcode."
  trans: "\n```markdown\n# 如何编写软件\n\n许多人认为编写软件就是坐在空白屏幕或白纸前，然后开始敲代码。当你敲够代码，就有了一个应用。这在打孔卡片的大型机时代或许如此，但现在已不适用。\n\
    \n如今的一个应用通常包含代码、图形元素、其他形式的媒体（视频、音频等），以及成为应用组成部分的多个框架中的大量代码。框架代码处理常规功能，比如读写数据、管理屏幕和鼠标或触控板，以及许多让现代应用成为现代应用的功能。\n\
    \n这意味着“编写”一个应用现在开始意味着从各种组件和片段中组合出一个应用。虽然构建应用的机制是与计算机科学不同的主题，但简要了解它是值得的，这样你就能理解各个部分如何组合在一起。\n\
    \n首先，在 `developer.apple.com` 注册一个苹果开发者 ID。你将完成注册流程。注意，如果你在你的地区未满法定年龄（成年），你需要一位成年人为你担保。如果你在学校就读或为公司工作，他们可能有一个你可以使用的苹果开发者账户。\n\
    \n以下是在 `Xcode` 上进行应用开发的通用步骤序列。你将在下一节“使用 `Xcode` 开发应用”中看到如何开始这个过程。这些是你必须回答的问题，所以请在开始之前就思考它们。\n\
    \n1. 确定应用的功能。坐下来就“写一个应用”却不知道这个应用要做什么是徒劳的。无论你是作为独立开发者、公司团队的一员，还是处于任何其他配置中，拥有一个所谓的“电梯演讲”来在几秒钟内总结你的项目是一个好主意（许多人会说它至关重要）。你的目的或目标可能会随时间改变，但这很正常。只需确保你清楚当前版本是什么。（另请注意，在开发过程中你可能需要定期考虑版本。）像敏捷开发这样的现代开发技术建议，任何时候都应该有可运行的内容，这是一个值得遵循的良好实践。这可能意味着你需要定期——甚至可能每周一次——进行评估，并要么删除某些功能，要么将其推迟到未来版本，以便让下周的应用版本按时完成。\n\
    \n2. 开始应用描述。除了你的 10 秒版本的应用目的外，许多人（包括作者）建议你开始构建应用在 App Store 中的展示。这包括结构化的文本和图像，比你的电梯演讲版本更详尽。如果你将自行营销你的应用，你迟早需要这些内容。如果由其他人负责营销，你可以与他们一起制定这个描述。在开始时就开始这个描述的主要原因是，它为你在构建应用时提供了更多细节。请访问\
    \ `developer.apple.com` 获取关于构建应用在线展示的更多信息。\n\n3. 命名应用。这可以是一个代号，或者一个你计划以后更改的名字（当你想出一个更好的名字时）。更改将在营销材料和\
    \ App Store 中显示的名称很容易。（这与 App Store 初期不同。）图 12-1 显示了 `Xcode` 中应用的通用（General）标签页，你将在其中提供这些信息。\n\
    \n   ![A441106_1_En_12_Fig1_HTML.jpg](img/A441106_1_En_12_Fig1_HTML.jpg)\n\n \
    \  图 12-1\n\n   设置应用的通用设置。`显示名称（Display name）` 是用户看到的应用名称。（在这个示例中，它是 `Tabs`。）`捆绑包标识符（bundle\
    \ identifier）` 是应用的内部名称。它可以不同于 `显示名称`。`捆绑包标识符` 必须是一个唯一名称。它通常由你的开发者账户名称构成。每个应用版本（一个构建）都有其自己的版本和构建标识符。你通常从版本\
    \ `1.0`（你可能更喜欢 `0.1` 这样的版本号）和构建 `1` 开始。每次你向 App Store 提交一个应用构建时，你都需要增加构建计数器，使其始终保持唯一且递增。你可以跳过构建编号，但不能倒退。版本号将显示给用户，因此由你和你的管理者及营销人员决定何时让下一个构建成为\
    \ `2.0` 而不是 `1.16`。在与 App Store 打交道之前，使用 `Xcode` 中的默认值没有问题。\n\n4. 选择应用环境。你将在 iPhone、iPad、Apple\
    \ Watch、`tvOS` Mac 还是其他设备上运行应用？你将支持 iPhone 和 iPad 的哪些方向？这些是你需要在开始时做出的选择（并且它们是应用描述所必需的）。这些选择是可修改的，但你需要一个起点。在\
    \ `部署信息（Deployment Info）` 中进行这些选择，如图 12-1 所示。\n\n5. 选择你支持的最早应用环境版本。`Xcode` 中的默认版本通常遵循苹果支持当前版本和上一个版本的政策。因此，随着\
    \ 2017 年 iOS 11 的发布，iOS 10 通常得到支持。有些应用支持更早的版本。这也在 `部署信息` 中使用 `部署目标（Deployment\
    \ Target）` 下拉列表进行设置。你可以在图 12-1 的其余设置中使用默认值。\n\n6. 选择应用开发环境。对于苹果框架，`Xcode` 是给定的，而\
    \ `Swift` 如今通常也是给定的。如果你为了开发而集成第三方框架，你可能无法使用 `Swift`，但截至撰写本文时，遗留的 `Objective-C`\
    \ 框架正变得越来越少。你还需要选择要支持的 `Xcode` 开发版本。这将在你设置项目时确定。它将在本节接下来的“使用 `Xcode` 开发应用”中讨论。\n\
    \n7. 决定图形设计。你可能会与设计师合作来开发应用的外观。同时开始考虑应用图标。\n\n8. 在“功能（Capabilities）”标签页中选择你将支持的功能，如图\
    \ 12-2 所示。这些可以在以后更改，但这能让你了解你可以构建哪些功能。（请注意，在大多数情况下，现在选择功能即使不使用，也比以后再进行逆向添加要容易。）\n\
    \n   ![A441106_1_En_12_Fig2_HTML.jpg](img/A441106_1_En_12_Fig2_HTML.jpg)\n\n \
    \  图 12-2\n\n   设置功能。\n\n## 使用 Xcode 开发应用\n\n有了你的应用计划，你就可以开始实际使用 `Xcode` 开发应用了。\n\
    ```\n"
- fmt: '### Setting Up the Project


    Here are the steps to begin with.


    Begin by launching `Xcode`. You can download it for free from the App Store. Use
    About Xcode to check the version of Xcode you have installed as you see in Figure
    [12-3](#A441106_1_En_12_Chapter.html#Fig3). Note that Xcode build identifiers
    that tend to be more complex than the simpler style most developers use for numbers
    like 1, 2, 3, and so forth.


    ![A441106_1_En_12_Fig3_HTML.jpg](A441106_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Version 9.0 build 9A235 of Xcode


    Choose New ➤ Project from the Xcode menu to begin your project as you see in Figure
    [12-4](#A441106_1_En_12_Chapter.html#Fig4).


    ![A441106_1_En_12_Fig4_HTML.jpg](A441106_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Create a new project


    You will be able to choose a template to start with. In this chapter, Tabbed App
    is used. When you have time, explore the other templates by creating projects
    with them. You can always delete them after you have experimented with them.


    You will be prompted to select a location on disk for your project. The project
    will then open in Xcode. You’ll see it in a window like that in Figure [12-1](#A441106_1_En_12_Chapter.html#Fig1).
    You can use the settings in the top right to show and hide the various parts of
    the window. (There’s more on navigating with Xcode on `developer.apple.com` and
    the in-app help.)


    Figure [12-5](#A441106_1_En_12_Chapter.html#Fig5) shows the app at this point.
    Note that in Figure [12-1](#A441106_1_En_12_Chapter.html#Fig1), the Utilities
    at the right are not shown, but they are shown at the right of Figure [12-5](#A441106_1_En_12_Chapter.html#Fig5).
    Most developers show and hide the panes of the Xcode window as they work.


    ![A441106_1_En_12_Fig5_HTML.jpg](A441106_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Review the app


    With just a few clicks or taps, you can create a new project in Xcode, but look
    at Figure [12-6](#A441106_1_En_12_Chapter.html#Fig6) to see the number of files
    and folders that you have created. Unless you are well-experienced with Xcode,
    do not move or rename the project files: leave them where Xcode put them. The
    two most important components are the `xcodeproj` file (shown at the bottom of
    the list in Figure [12-6](#A441106_1_En_12_Chapter.html#Fig6)) and the project
    folder (Tabs in this case). If you collapse the folders, you’ll see that the project
    consists of the `xcodeproj` file and the project folder. Those two items can be
    moved together to another place, but they must be next to one another in a folder
    (or on the desktop).


    ![A441106_1_En_12_Fig6_HTML.jpg](A441106_1_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Browse the app’s files


    ### Testing the Project (without Modifications)


    If it is not already open, launch the project in Xcode by double-clicking `Tabs.xcodeproj`.
    That should open the window you’ve seen before. Remember that you may have to
    use the controls at the top right to show or hide the parts of the main window.
    Figure [12-7](#A441106_1_En_12_Chapter.html#Fig7) shows you the View menu that
    you can use instead of the controls at the top right.


    ![A441106_1_En_12_Fig7_HTML.jpg](A441106_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Explore the View menu


    Show or hide parts of the main window. If you want to explore them, use this View
    menu to show or hide them, and you’ll be able to match the terminology to the
    sections of the Xcode window you’re looking at.


    Use the arrow at the top left of the main window (shown in Figure [12-5](#A441106_1_En_12_Chapter.html#Fig5))
    to build and run the app. You should see the results in Figure [12-8](#A441106_1_En_12_Chapter.html#Fig8)
    (left and right).


    ![A441106_1_En_12_Fig8a_HTML.jpg](A441106_1_En_12_Fig8a_HTML.jpg)![A441106_1_En_12_Fig8b_HTML.jpg](A441106_1_En_12_Fig8b_HTML.jpg)


    Figure 12-8


    Build and run the app


    ### Adding the Code and Interface


    Once you are satisfied that a template works properly, you can add your modifications.
    As you saw in Chapter [11](#A441106_1_En_11_Chapter.html), you can add interface
    elements to your app in the files and folders created as part of your project,
    not the folder called `base.lproj`. This folder will be in most of your projects.
    It contains the interface elements. Today, those are built using storyboards.
    (In the past they were built with `xib` and `nib` files.)


    The `base.lproj` folder consolidates all of your interface elements in one place
    so that you can easily localize them.


    The storyboards give you a graphical tool to draw your interface and connect it
    to your code. This section provides a very brief overview for you: there is more
    in the Xcode documentation and at `developer.apple.com`. There is also a lot of
    information on the Web, but make certain that it is recent: there is a lot of
    old code out there.


    If you click on a storyboard in Xcode, it will open and you will be able to edit
    your interface. There already is an interface (that’s what you see when you run
    the template as shown in Figure [12-8](#A441106_1_En_12_Chapter.html#Fig8)). Inside
    the main storyboard, you’ll see a schematic view of the interface as you see in
    Figure [12-9](#A441106_1_En_12_Chapter.html#Fig9). (This view includes some elements
    that have been added — they were added in Chapter [11](#A441106_1_En_11_Chapter.html)
    and you’ll see more about how to add them later in this chapter.)


    ![A441106_1_En_12_Fig9_HTML.jpg](A441106_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    `main.storyboard`


    At the bottom of the utility area at the right of the window, you see a list of
    the objects that you can drag onto the storyboard. You don’t have to draw anything
    — just drag.


    The elements of the interface are scenes, and they are implemented in code by
    view controllers. Most view controllers are visible, and that is the case here.
    In the Tabs template, there are three view controllers: the first and second views,
    and a tab bar controller that controls them as you tap the buttons. The tab bar
    controller appears at the bottom of both view controllers.


    As you build your interface with objects from the utility area, you can switch
    to the Assistant editor as you see in Figure [12-10](#A441106_1_En_12_Chapter.html#Fig10).
    (You use the two interlocking circles in the top right of the main window to do
