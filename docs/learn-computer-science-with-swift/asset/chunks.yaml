    Introduction


    Computer Science is the study of computers and their operations. It includes concepts
    of computability and how software is designed that are now being taught to students
    as young as six years old. It also includes complex concepts of the largest, latest,
    and most advanced computers and systems. This book provides an introduction to
    people who want to learn the basics for practical reasons: they want to understand
    the principles of computer science that will help them to become developers (or
    better developers). The focus is on practical applications of computer science.
    Along those lines, Swift, the modern language developed originally at Apple, is
    used for many examples that are shown in Swift playgrounds. You will find practical
    discussions of issues as varied as debugging techniques and user-interface design
    that are essential to know in order to build apps today. Note that Swift playgrounds
    are used to demonstrate a number of computer science concepts, but this is not
    a book solely about Swift. Not all of the language constructs are demonstrated
    in the book.


    There is one critical piece of advice I give to people who want to learn how to
    develop apps, and that is to use them. Download and try to use every app that
    you possibly can. Read reviews of apps. Talk to people about their experiences.
    Too often, people jump into trying to write apps without knowing what the state
    of the art (and of the marketplace) is today.


    Many people have helped in the development of this book. Carole Jelen of Waterside
    Productions has once again been instrumental in bringing the book into being.
    At Apress, Jessica Valiki and Aaron Black have been essential guides and partners
    in helping to shape the book and its content.


    In the course of writing this book, I’ve been lucky enough to be involved in several
    app development projects that have provided case studies and examples of the process
    of app development. Thanks are due particularly to Curt Gervich, Maeve Sherry,
    and Michael Otton at Center for Earth and Environmental Science at State University
    of New York College at Plattsburgh as well as Sonal Patel-Dame of Plattsburgh
    High School.


    ## Downloading Playgrounds for the Book


    You can download playgrounds from the book from the author’s website at champlainarts.com.


    ## About the Author


    Jesse Feiler is an author and developer focusing on nonprofits and small businesses
    using innovative tools and technologies. Active in the community, he has served
    on the boards of Mid-Hudson Library System (including three years as president),
    Philmont Main Street Committee, Philmont and Plattsburgh Public Libraries, HB
    Studio and Playwrights Foundation, Plattsburgh Planning Board, Friends of Saranac
    River Trail, Saranac River Trail Greenway, and Spectra Arts.


    His apps include NP Risk — The Nonprofit Risk App (with Gail B. Nayowith), Saranac
    River Trail , Minutes Machine , and Utility Smart . They are available through
    Champlain Arts on the App Store at [`http://bit.ly/ChamplainArts`](http://bit.ly/ChamplainArts)
    .


    His large-scale projects have included contingency planning and support for open
    market monetary policy and bank supervision operations for the Federal Reserve
    Bank of New York’s Systems Development and Data Processing functions as chief
    of the Special Projects Staff and the System Components Division; implementation
    of the Natural Sales Projection Model at Young & Rubicam (the first computer-based
    new product projection model); development of the Mac client for Prodigy to implement
    their first web browser; management information systems and interfaces for legal
    offices, Apple, and The Johnson Company; as well as consulting, writing, and speaking
    about the Year 2000 problem.


    Smaller-scale projects for businesses and nonprofits have included design and
    development of the first digital version of Josef Albers’s Interaction of Color
    (for Josef and Anni Albers Foundation and Yale University Press), database and
    website development for Archipenko Foundation, along with rescue missions for
    individuals and organizations who found out about contingency planning when they
    least expected to learn about it. Together with Curt Gervich, Associate Professor
    at State University of New York College at Plattsburgh, he created Utility Smart,
    an app to help people monitor their use of shared natural resources.


    Jesse is founder of Friends of Saranac River Trail and of Philmont Main Street
    Committee. He is heard regularly on The Roundtable from WAMC Public Radio for
    the Northeast where he discusses the intersection of society and technology. He
    is a speaker and guest lecturer as well as a teacher and trainer specializing
    in the business and technology of iOS app development. He also provides consulting
    services for organizations that need help focusing on their objectives and the
    means to achieve them with modern technology. He is co-author with Gail B. Nayowith
    of The Nonprofit Risk Book as well as The Nonprofit Risk App — NP Risk ).'
