- fmt: '## Moving On to Collected Data


    Storing one number in a single computer word that is referenced by a simple variable
    (a scalar) is a good way of keeping track of data that you calculate or read in.
    You can then use the basic operations described in other chapters of this book
    to manipulate the data and create more data in other formats and styles.


    Modern programming languages support various collections of data. The most basic
    of these is an array – a numbered list of items (perhaps the names of students
    in a classroom). Another common type of collection is a set – a collection of
    items that is not a list (“set” is used in the sense in which it is used in logic
    and mathematics). Swift implements both arrays and sets.


    There is another type of collection called dictionary in Swift and associative
    array in languages such as PHP. Whereas the items in an array make up a numbered
    list, items in a dictionary are identified by strings or other types.


    Arrays are the oldest and most basic collections in computer science. Sets are
    the next oldest, and dictionaries (associative arrays) are the most recent. This
    chapter examines each of these in chronological order.


    All are subclasses of `Collection`, and most use the same basic methods that are
    described first in arrays in this section. Note that these classes are in `Foundation`,
    so you must use either of these import statements in your Swift code of Playground:


    ```

    import Foundation

    import UIKit

    ```


    It is always a good practice to import the smallest number of frameworks possible.
    `UIKit` imports `Foundation` automatically, but if you only need `Foundation`,
    import it explicitly and don’t worry about importing the code you don’t need in
    `UIKit`. Xcode and the build process will strip it out if it’s not needed, but
    it’s better just to import what you need to begin with.


    ## Using Arrays


    Arrays in any computer language are basically ordered lists. A list of students
    in a class is not ordered, but an alphabetized list is ordered.


    Although arrays are ordered lists, sometimes the order is irrelevant. For example,
    a list of students that is not ordered still contains all students in the class.
    You don’t have to use the ordering in your code.


    The numbering and ordering of elements in an array is handled by the array construct
    itself: the numbers of individual items are not in the items themselves unless
    you put them there. If you do, you can have items like the ones shown in Table
    6-1. Note that in Table 6-1 the indexes are integers and the contents can be anything.
    The first two are strings, and the last one is an integer (note the absence of
    quotes around it).


    **Table 6-1** Sample array


    | Index | Contents |

    | --- | --- |

    | 0 | “Content 17” |

    | 1 | “Data for item 32” |

    | 2 | 2 |


    Arrays of one sort or another are available in almost every programming language
    and operating system. They enable you to store and retrieve data in a basic way;
    in addition, they make it easy to repeat processes for the elements of an array.


    As you delve into computer science, you will notice that concepts such as arrays
    are the building blocks that you use. As is the case with arrays, you’ll find
    some basic features of these building blocks. (In the case of arrays, it’s the
    basic principle that an array is an ordered list of elements indexed as part of
    the data array rather than by elements within the array.)


    Features beyond the basics have been implemented many times by developers and
    designers who use programming languages to expand on the basic structure. Over
    time, many of these enhancements and additions have gradually moved into the programming
    languages and operating systems. It is unfortunately true that many people continue
    to focus on the initial building blocks and the individually crafted enhancements
    to it.


    Swift itself incorporates many enhancements to basic arrays and their functionality.
    This section discusses many of the things you can do with arrays – most of which
    are built directly into Swift.


    Experienced developers and designers know that using these features in languages
    such as Swift is the path to successful code. The simplest way to avoid bugs is
    not to write your own code, and the code that’s already written in Swift and related
    frameworks has been written, tested, and proven in use in some cases for decades
    if you include the Cocoa and Cocoa Touch frameworks.


    In the sections of this chapter that relate to arrays, the following topics are
    covered:


    - Basic Terminology

    - Indexing Array Elements

    - Swift Arrays and Types

    - Declaring and Creating Arrays

    - Modifying a `var` Array

    - Multi-Dimensional Arrays

    - Finding Array Elements

    - Adding and Deleting Array Elements

    - Looping Through an Array


    ### Basic Terminology


    These are terms that are commonly used in talking about arrays.


    - The contents of an array are called items or elements.

    - The ordering of an array is governed by one or more indexes.

    - Items in an array are written with subscripts that identify the element or item
    by its numerical position in the array.

    - In many languages including Swift, arrays are written with their subscripts
    in square brackets as in `myArray`[3], which would be item number three in `myArray`.


    ### Indexing Array Elements


    As you see in Table 6-1, the array handles indexes, and you do whatever you want
    with the contents of the array. Notice that the default index numbers start at
    zero. This is a legacy of the original implementation of arrays. In many cases,
    an array location was the first element of the array (often the first word of
    storage), and the index is the distance from the first element’s memory location.
    Thus, the first element (which you might think of element number 1) has no distance
    from the first element because it is the first element.


    Some languages allow you to start indexing your array at a number other than zero
    but, in fact, the language and operating system itself perform the manipulations
    to convert the 0-based index to a different base.


    And, just to make things more interesting, the physical storage of an array may
    not be consecutive memory locations today, but arrays start at zero because they
    always have started at zero.


    There are no gaps in arrays. Thus, if you look at Table 6-1 and were to delete
    the item at index 1, the array would look like Table 6-2. The old index 1 item
    is gone, and the previous index 2 item becomes index 1.


    > **Note**: See “Finding Array Elements” later in this chapter to see how to locate
    array elements by content rather than by index.


    **Table 6-2** Sample array with a row deleted


    | Index | Contents |

    | --- | --- |

    | 0 | “Content 17” |

    | 1 | 2 |


    ### Swift Arrays and Types


    Arrays in Swift are typed. That means that the elements of an array all have a
    common type. You can create an array of integers, an array of strings, or an array
    of any other type.


    Having a single type in an array can make for some efficiencies in code generation
    as well as others at runtime. (Furthermore, it can make your code more robust
    because improperly mixing types within an array can be flagged by the compiler
    rather than generating a runtime error.)


    Of course, having a single type in an array can also be inconvenient in some ways.
    Swift manages this with its hierarchy of types. As you will see in Chapter 7,
    Swift types include basic types such as integers as well as special types `Any`
    and `AnyObject`. Thus, you can create an array of `Any`, which could include integers
    as well as strings.


    It is a best practice in Swift to use the most restrictive types you can use.
    Yes, you could create all of your arrays as `Any?` (that is, optional versions
    of any type at all), but that bypasses all the checking and optimization that
    is built in.'
