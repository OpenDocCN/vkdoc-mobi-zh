    let decodeFromJSON = String(data: encodeToJSON, encoding: .utf8)

    ```


    The `UTF8` encoding is a standard text encoding that is commonly used. You can
    find other encoding values in the documentation.


    When you consider that you can encode and decode large arrays and dictionaries
    into text to read and write, you have a very powerful way of managing data that
    can be stored for other apps on other devices to read and write.


