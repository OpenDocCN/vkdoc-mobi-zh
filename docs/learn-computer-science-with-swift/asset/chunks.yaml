- fmt: "# The Development Questions\n\nYou can find many guides to app development\
    \ on the Web and in various publications. The following six questions are the\
    \ ones that need to be answered at the beginning of any computer science project.\
    \ If you can’t answer these questions, you will sooner or later come to problems\
    \ in your project. Someone who is experienced in the use of computer science is\
    \ expected to be able to help put projects together. That may not be part of a\
    \ formal curriculum, but it is part of the real world. (If you talk to someone\
    \ about a potential job where “computer science” is one of the requirements, a\
    \ familiarity with the development process is usually as important as knowledge\
    \ of the terminology.)\n\nThe six questions may seem too simple to you if you’re\
    \ chomping at the bit and wanting to write code, but they have to be answered\
    \ before you and others invest time, energy, and money in a project that is not\
    \ clearly fleshed out. More details of each question (including how to answer\
    \ it) are found later in this chapter.\n\n> **Tip**  \n> As you start to answer\
    \ these questions, remember that you can always change your mind, and, in fact,\
    \ you should plan to change and evolve your answers as any computer science project\
    \ evolves.\n\nHere are the six questions:\n\n- What are you doing?\n- Who is it\
    \ for? Who will build it, use it, manage it, maintain it, and fund it?\n- Why\
    \ are you building it? Why will people use it?\n- When will the project take place?\
    \ When will it start, and when will it end?\n- Where will the project run? What\
    \ device(s) will it run on; will it require other computer resources such as a\
    \ web server or database?\n- How will you know the results of the project?\n\n\
    ## What Are You Doing?\n\nThe project may be about building an app, but it could\
    \ be about building an open data resource so that other people can build apps\
    \ that run on the public data. Many people suggest that this question should be\
    \ able to be answered in 10 seconds (it’s sometimes called an elevator speech\
    \ suggesting that it’s what you would say if you found yourself in an elevator\
    \ with your boss or someone else important and you have the amount of time it\
    \ takes the elevator to go one floor).\n\nIf a friend says, “What are you working\
    \ on?,” most of the time the answer should be only a few seconds long. It is absolutely\
    \ amazing how hard it is for many people to answer that question. If you can’t\
    \ describe the project simply, chances are you can’t implement it. Even the most\
    \ complicated projects can be summarized: land an unmanned spacecraft on Mars.\
    \ That’s a simple description of a very complicated (and successful) set of missions.\n\
    \n## Who Will Be Involved?\n\nWho will do the work on the project, and who will\
    \ use the end result? Are you building an app for your own benefit so you learn\
    \ how to build an app and build your portfolio of projects? Is it a project for\
    \ a job you have or want to have? Will the users be adept users of mobile devices\
    \ (if that’s what you’re using) or will they be people who have 400 games on their\
    \ mobile device but don’t know how to change Settings? Will they be people who\
    \ are adept at using mobile devices but have never used a desk- or laptop personal\
    \ computer? (Yes, the number of people without experience with personal computers\
    \ is growing.)\n\nWho will manage or lead the project? In many projects, a team\
    \ works together. More and more we are seeing collaborative cross-disciplinary\
    \ projects that benefit from the structured interaction of people from different\
    \ fields. If you’re not familiar with data science and the projects that use it,\
    \ you might look for references to data science on the Web. There are many examples\
    \ of successful projects, most of which involve the development or use of computer\
    \ science technologies.\n\n## Why Will People Be Involved?\n\nThis boils down\
    \ to the benefits that people will derive from the project. Are they working on\
    \ it to get a grade, get a job, make money? The motivations for people who will\
    \ use the project are typically different from the motivations of people who develop\
    \ it.\n\n## When Will It Happen?\n\nThis is actually one of the most difficult\
    \ questions to answer. In the non-digital world, it is pretty easy to determine\
    \ when a project is finished: a dignitary cuts the ribbon, a band plays, and the\
    \ bridge is open. Everyone can see that.\n\nSoftware isn’t visible. In the old\
    \ days of shrink-wrapped software, people could see the packages in a store, and\
    \ that certainly made the project seem complete. Determining when the project\
    \ happens requires you to pull together the answers for What, Who, and Why along\
    \ with any changes you have made.\n\nThere’s a new perspective on What Are You\
    \ Doing? With the additional information you have from the previous questions,\
    \ now that question can be refined: what are you delivering?\n\nIn the world of\
    \ product development (and especially software development), a common phrase is\
    \ minimum viable product or `MVP`. There are various interpretations of this phrase,\
    \ but it generally is taken to mean something that runs and performs the basic\
    \ functions you expect in the final product.\n\nThis may mean that error messages\
    \ are not complete (which may mean that the app may crash if not used carefully).\
    \ It may mean that some options are not yet implemented. But it means that you\
    \ can show someone what “it” is without using a slide presentation: there is something\
    \ that will run.\n\nOne interpretation of minimal viable product is that it can\
    \ be — or is being — sold. Sometimes it’s sold as an introductory or preview version\
    \ (even if the purchase price is free), but there is something there that works.\n\
    \nAs you start to decide when you will have a basic product, there are now a set\
    \ of additional questions to answer. Basically, for most computer science projects,\
    \ you will be looking at a sequence of deliverables. (There may be early-stage\
    \ deliverables on a project such as a project proposal, a slide presentation,\
    \ and the like, but those are not yet something that runs.)\n\nDepending on what\
    \ you are building, you have a variety of options. Here is an overview of the\
    \ options, but you can have many, many others. This just gives you an idea of\
    \ the possibilities for delivering your work.\n\nYou can plan on versions of an\
    \ app or database (or any other computer science project). Typically, these versions\
    \ are numbered 1, 2, 3… Intermediate versions can be numbered. It is not uncommon\
    \ for a first release to be Version 1. It may quickly be followed by Version 1.1,\
    \ which might contain some fixes for typos and other problems. You may continue\
    \ on until Version 1 is stable. At that point, it’s time to start thinking about\
    \ Version 2.\n\nAs you move along, you can start to create a road map so that\
    \ you have a sense of what your versions will be. This road map and schedule will\
    \ turn into your project management tool. Typically the main versions (1, 2, 3)\
    \ and perhaps major subdivisions (1.1, 2.3, etc.) are tied to marketing efforts\
    \ (if they are apply). These milestones may also be tied to an academic calendar,\
    \ milestones for funding (grant or investment), or other dates. Remember that\
    \ once a milestone is attached to a date such as an academic calendar or a payment,\
    \ it is no longer totally under the control of the computer science staff.\n\n\
    There’s another aspect to When for you to consider. Once the project is stable,\
    \ will it be used on a regular basis? If you are building a database to be maintained\
    \ with products that will be popular around the year-end holidays, your critical\
    \ time span for updating the database might be July (a typical lead time for year-end\
    \ holiday data preparation). Plan what will be happening to and with your app,\
    \ database, or other project."
