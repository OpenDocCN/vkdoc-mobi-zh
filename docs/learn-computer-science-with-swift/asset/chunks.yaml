- fmt: '# 1. Thinking Computationally


    Computer science is the term that applies to the basic principles involved in
    developing computer software and systems that incorporate that software. It is
    abstract and theoretical in the sense that it typically is considered outside
    the syntax and structure of specific computer languages and hardware.


    That is the definition that we use in this book. If you explore other books and
    articles on the Web (including descriptions of computer science courses at all
    levels and types of education), you will find a wide array of other definitions.


    This chapter provides an overview of the topic and focuses on key elements of
    computer science. This book provides a practical approach to computer science,
    so you’ll see how the elements can fit into your work rather than looking at a
    theoretical view of computer science. The focus is on how you will use the concepts
    and principles of computer science in building real apps.


    The key elements of computer science are divided into two groups in this book.
    The first is the pair of concepts that developers use as part of their work every
    day:


    *   Recognizing patterns

    *   Using abstractions


    Then you’ll see the four tasks that are used in every aspect of software development
    from the largest system to the smallest component of a tiny system. These tasks
    are the following:


    *   Formulating a computational problem

    *   Modeling the problem or process

    *   Practicing decomposition

    *   Validating abstractions


    In the remaining chapters, you’ll find descriptions of syntax elements and structures,
    but in this chapter, the focus is on the concepts you use to carry out the basic
    software development tasks that are over and above syntax and structure.


    ## Computer Science Today


    Computer science principles and techniques are implemented in computer hardware
    and software using various programming languages and devices. Even users get into
    the picture as they learn to enter data, share it with others, convert data from
    one format to another (think spreadsheet to email) and a host of other tasks that
    demonstrate computer science in action.


    One of the challenges in teaching and learning computer science is that in order
    to learn the principles, you have to have enough knowledge and experience of computer
    hardware and software to understand how they interact with computer science principles.


    This has been a tremendous challenge for decades. If you want to learn how to
    be a builder, you can start by building a doll house or a bird house. Your materials
    might consist of paper and (if you want a permanent structure) some glue or even
    staples. The basic principles of home construction can be simply demonstrated
    and described.


    The challenge with computer science is that to build a small project, you may
    be able to write a single line of code, but, in order for it to run and do something
    – anything – you need a computer, and it needs an operating system. (This was
    true going back to the earliest days of computers.) The computer today will consist
    of electronic components, and the operating system today of even the most minimal
    computer is incredibly complex. The steps you take to get to a “simple” computer
    science app are enormous.


    ## Using Swift Playgrounds


    If you have an iPad or Mac, you have access to Apple’s free `Swift Playgrounds`
    tool . Together with the device itself, you have all of the components you need
    to start to build simple apps with even a single line of code.


    `Swift Playgrounds` provides a massive infrastructure on top of which you can
    write a few lines of code to start to explore computer science as well as specific
    languages and techniques. You can run this code in the playground and watch the
    results. (You can also modify the results and the code as it is running if you
    want to experiment).


    For your own use or for others, you can easily annotate the code. Figure [1-1](#A441106_1_En_1_Chapter.html#Fig1)
    shows a playground with annotations. It is running, and you can see the result
    of the `print` statements at the bottom of the window. At the right, you see a
    sidebar that monitors the code as it runs.


    ![A441106_1_En_1_Fig1_HTML.jpg](A441106_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    Swift Playgrounds in action


    If you see Figure [1-1](#A441106_1_En_1_Chapter.html#Fig1) in color, you can see
    that the elements of code syntax are colored automatically to help you understand
    what is going on in the code. This coloring and indentation happens automatically
    as you type.


    In this book, you will find a number of examples of computer science principles
    that are demonstrated with `Swift Playgrounds`. You can download them as described
    in the Introduction.


    One very important point to know about `Swift Playgrounds` is that the code you
    are writing is real. It is real in the sense that it is actual code written in
    the Swift programming language (the language for most iOS, tvOS, and watchOS apps
    today as well as a number of macOS apps). You can copy some code from an app you’re
    working on and paste it into a playground so you can experiment with it. (There
    are some details on how to do this in Chapter [7](#A441106_1_En_7_Chapter.html)).


    Note


    The playground shown in Figure [1-1](#A441106_1_En_1_Chapter.html#Fig1) is a real-life
    example of using production code in a playground. This code is part of an app
    that was not doing exactly what it should. It was isolated into a playground where
    we could fiddle with the syntax until it worked properly. Once that was done,
    the revised code was pasted back into the app, and it’s now part of Utility Smart
    that you can download for free in the App Store. If some of the code in Figure
    [1-1](#A441106_1_En_1_Chapter.html#Fig1) seems complex, you are right. It was
    line 35 that caused the confusion. You’ll find out about the `map` function in
    Chapter [3](#A441106_1_En_3_Chapter.html).


    ## Basic Concepts and Practices of Computer Science Today


    These are the basic concepts and practices that developers use in their everyday
    work whether it is designing complex systems or writing very simple apps. They
    apply to software that is used for games, for accounting, for managing assets
    (real estate or digital media), or just about anything else people want their
    computers to do. If you want details of the history of computer science and the
    major steps to today’s world, you can find a great deal of information on the
    Web and in your local library. This section is based on actual developers’ work.


    You can learn these over time as you develop apps, and you can find them in many
    books and articles. These concepts and practices are not specific to computer
    science: they are part and parcel of many design and development disciplines.
    (Don’t worry, the following section is devoted specifically to software development).


    Both of these concepts and practices stem from a very basic truth: writing code
    is a complex and expensive process. Not only does the code have to be written,
    but it also needs to be tested and revised over time. Computer code can have a
    very long life. (When the Year 2000 problem was addressed in the late 1990s, code
    from the 1950s and 1960s was found in many production systems. The authors of
    the code in many cases were retired or deceased, and what documentation that might
    have existed was lost. Much of the cost of mitigating the Year 2000 problems derived
    from rewriting existing code).


    Because writing code is expensive, it is wise to minimize the amount of code to
    be written and rewritten and tested. Both of these concepts help to minimize the
    amount of code to be written. The overall theme is that to write the best code
    possible (that is, well-written, well-tested, and well-documented code) as quickly
    as possible, follow one simple rule: Don’t Write Code. Failing that, write as
    little code as possible. And, to put it in a more traditional way, use as much
    existing code as possible.'
