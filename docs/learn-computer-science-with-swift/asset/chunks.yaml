- fmt: '# Working with Tuples


    The numbers, strings, and characters described in the previous section are common
    to most computer languages today. There are variations that have been implemented
    over time in most languages, and Swift has many of them.


    Skipping over the many variations on the basic number, string, and character types,
    we can look at a modern type that is implemented in Swift and other languages
    such as Python and C# in similar ways. A tuple is a sequence of types that together
    make up a single type.


    You can, for instance, declare a tuple, which is a form of type that you create
    from other types. You use `typealias` to provide an alias to an existing type,
    and that existing type can be one that you create with a tuple. In fact, using
    `typealias` to name a tuple may be the most common use of `typealias`.


    A tuple basically is a sequence of types enclosed in parentheses. It is used in
    a type annotation or alias. For example, you can create a tuple of two `Double`
    types to represent the dimensions (length and width) of a rectangle. You can give
    it a `typealias` of dimensions as in the following code:


    ```

    typealias dimensions (Double, Double)

    var myRectangle:dimensions = (2.0, 3.0)

    ```


    You don’t have to use a `typealias`. You can create and use a `tuple` very simply
    as in the following code:


    ```

    var myRectangle = (2.0, 3.0)

    ```


    There is no need to name a `tuple` type with a `typealias` unless you want to
    refer to it elsewhere.


    Tuples can be incredibly useful because they combine several items in one addressable
    symbol (the `typealias` name if there is one). A function in most languages can
    return a result that is normally one item. Many people let a function return a
    collection (array, dictionary, or set), which has the effect of returning multiple
    results. (In fact, dictionaries have commonly been used to return multiple results
    in a single item.)


    The items in a tuple are identified by order: You can’t rearrange them. By default
    they are numbered starting at zero. Figure [7-4](#A441106_1_En_7_Chapter.html#Fig4)
    shows how you can create and use tuples. Notice in the viewer that follows line
    three that the two elements of the tuple are shown preceded by their default names
    — `.0` and `.1`.


    When declaring a tuple, you can provide names for the items. In Figure [7-4](#A441106_1_En_7_Chapter.html#Fig4),
    note that in line 7 the items are named:


    ```

    typealias dimensionsLabeled = (width: Double, height: Double)

    ```


    You can refer to the items in a tuple by using the name of the variable or constant
    followed by dot syntax and the name of each item as in line 9:


    ```

    print (myLabeledRectangle.0, myLabeledRectangle.height)

    ```


    Even if you provide a name for an item in a tuple, you can still refer to it by
    its default number.


    Note: The names of tuple elements are not quoted strings.


    ![A441106_1_En_7_Fig4_HTML.jpg](A441106_1_En_7_Fig4_HTML.jpg)


    **Figure 7-4** Declaring and using tuples


    # Summary


    This chapter provides you with an overview of types as used for data. You see
    the types that are common to all languages and operating systems (numbers, characters,
    and strings) as well as types that you can create such as tuples.


    The use of types — even dynamic types — can make your code safer to develop and
    to maintain.


    With the data side of things under control, it is time to move on to look at how
    operating systems and applications actually work with the data that you declare
    and store. That is the topic of the next chapter.


    # 8. Managing Control Flow: Conditionals, Switches, and Enumerations


    In Chapter [5](#A441106_1_En_5_Chapter.html), you saw the basics of repetitions,
    but there’s a lot more to managing control flow than looping through repetition
    code. This chapter explores the other main control flow aspects of code. These
    are present in most languages and operating systems.


    ## What’s Next?


    The basic flow of control in an app is from one line of code to the next. A single
    line of code is a single statement even though it may involve many steps — perhaps
    this is because the line of code causes a function or method to run. Furthermore,
    several lines of code can be placed on one physical line of code in Swift. As
    in many other languages a semicolon is placed after each line of code when more
    than one is placed on a single line. Furthermore, to improve readability, a single
    line of code can be stretched over several physical lines of code. Nevertheless,
    we refer to a "line of code” as if it were both a physical and logical entity
    even though there is not an exact equivalence.


    No matter how it is formatted, each line of code is executed in an app, and, most
    of the time, after it is completed, the next line of code is executed. If there
    are no more lines of code, the app terminates.


    This is the basic pattern for apps and programs from the dawn of computer time.
    It is important to note that there is a major variation on this pattern that is
    particularly prevalent in apps that rely on user interaction. In these cases,
    the app starts running, and, once it has started running, it waits for an external
    event to be passed to it (that event might be a user action). When the event is
    received, the app processes it and then waits for its next event. A program like
    this may terminate only when the computer is turned off or restarted.


    On iOS devices, you can specifically terminate apps that are waiting for events.
    You can see them in Control Center as you see in Figure [8-1](#A441106_1_En_8_Chapter.html#Fig1).
    Just drag an app up to the top of the window to terminate it.


    ![A441106_1_En_8_Fig1_HTML.jpg](A441106_1_En_8_Fig1_HTML.jpg)


    **Figure 8-1** See running apps in Control Center on iOS 11 and later


    Within an app, the major exceptions to the next-line-of-code sequence are the
    following:


    *   Go to. You can explicitly go to another line of code other than the next line.
    As you will see, this is normally discouraged, but it remains a commonly used
    technique of managing control.

    *   Switch. You can execute one of several lines of code (or sections of code)
    rather than the next line. This is a useful technique to use when you want to
    do one of several operations (show the current temperature, show the calendar
    for next week, log out, or anything else).

    *   Conditionals. You can execute a line of code if some condition is (or isn’t)
    true.

    *   Repetitions. You can repeat one or more lines of code as you saw in Chapter
    [5](#A441106_1_En_5_Chapter.html). There are a number of variations on the repetition
    pattern — you can repeat code until some condition is or isn’t true, for example.'
