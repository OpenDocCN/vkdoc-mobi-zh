    \nFigure 9-3  \nEncoding and Decoding JSON in a playground\n\n```swift\nimport\
    \ Foundation\nlet myArray = [\"one\", \"two\", \"three\"]\nprint (myArray)\nlet\
    \ jsonEncoder = JSONEncoder()\njsonEncoder.outputFormatting = .prettyPrinted\n\
    if let encodeToJSON = try? jsonEncoder.encode(myArray) {\n    if let decodeFromJSON\
    \ = String(data: encodeToJSON, encoding: .utf8) {\n        print (decodeFromJSON)\n\
    \    } else {\n        print (\"failed\")\n    }\n    print (\"did encode\")\n\
    } else {\n    print (\"failed2\")\n}\n```\nListing 9-2  \nEncoding/Decoding JSON\
    \ (Swift 4)\n\n## Handling Data That Is Not There: Swift Optionals\n\nOne of the\
    \ peskiest issues in computer science is the problem of how to handle data that\
    \ is not there. This is the case when there is missing data or data that does\
    \ not exist for any reason. If you leave the data blank, it may be interpreted\
