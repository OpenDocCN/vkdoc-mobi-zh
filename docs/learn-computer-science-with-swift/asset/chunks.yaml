  trans: '

    # 9. 存储数据与共享数据


    计算机科学的核心在于一个标准短语：计算机的设计与应用。尽管早期已有类计算机设备的雏形（例如 19 世纪 30 年代查尔斯·巴贝奇的分析机、1804 年的雅卡尔织布机，以及
    20 世纪 30 年代至二战期间因图灵的突破而发展的恩尼格玛密码机），但现代计算机时代实际上始于 20 世纪 40 年代。这一时期取得的重大飞跃是硬件领域的显著进步，而可以说，最具里程碑意义的突破是编程语言和编译器的开发——这使得计算机能够根据人类编写的类英语代码自动生成指令。（关于软件方面的更多细节，可上网查阅格蕾丝·霍珀及其同事的相关资料。）


    即便在 20 世纪 70 年代末个人计算机问世、20 世纪 90 年代互联网兴起之后，随着新技术和新能力的涌现，计算机科学的基础并未发生根本改变。但有一项变化——相当戏剧性的变化——是数据的存储与共享方式。


    尽管计算机硬件的进步时常在媒体上被大张旗鼓地宣扬，但许多人对数据相关的变革却兴趣寥寥。事实上，很多人将数据及数据管理视为计算机科学领域中近乎琐碎的环节。哦，没错，确实有数据需要存储在某个地方，但让我们先关注
    3D 打印、社交媒体这类激动人心的事物，暂且把那些平凡的数据存储搁置一旁吧。（随便找一位数据管理专家聊聊这个话题，你很可能会引发一场关于此事的滔滔不绝的评论狂潮。）


    数据的作用对计算机科学及其应用至关重要，而这种作用的演变方式直到最近才引起少数人的关注。本章将探讨计算机科学中的数据问题，分为四个部分，分别对应数据的四大核心关注点：


    -   数据是什么？所有应用都会生成、消费和存储数据。你或许认为自己的应用是例外，但若审视其生成、消费和存储的所有数据，便不存在例外。

    -   数据存储在哪里？除了由硬件和软件按需生成的数据外，支撑应用运行的数据需要存储在某个位置。有时应用正在创建数据，此时数据通常也需要存储，即便只是临时存储在系统或应用内置的某个暂存区域。

    -   谁负责管理数据？数据是静态的，还是定期更新（如果是，由谁更新）？数据归谁所有（在很多情况下这并非易事）？有哪些流程确保更新、数据完整性和安全性？

    -   数据如何管理？这个问题涵盖从电子表格数据格式到数据库管理系统，以及大数据新领域中的各项议题。


    > **注意**

    > 本章与本书其他章节略有不同，因为它不会向你展示要编写的代码——因为多数议题的层次高于代码层面。事实上，可以说数据管理的问题至少与创建、管理和使用数据的代码同等重要。但无论你对代码与数据相对重要性持何种观点，二者都至关重要，在
    21 世纪的计算机科学方法中缺一不可。或许五十年前，当“数据”意味着成箱的穿孔卡、成卷的磁带，以及成堆等待键盘穿孔的纸质文件时，人们确实可以无视所有数据来研究计算机科学。但如今已不再可能。正如
    20 世纪 40 年代计算机编程先驱们所理解的，计算机处理代表数字的代码，与处理代表程序逻辑和指令的代码一样轻松。在许多方面，数据与代码是可以互换的。这正是格蕾丝·霍珀的启示：正是这一点使得编译器成为可能。


    ## 数据是什么？


    如果你认为这个问题的答案很简单，请三思。当你阅读、收听或观看关于数据泄露、黑客攻击或系统故障的新闻时，常常会看到一些你从未考虑过的数据被提及。当你开始思考某个应用所使用的（创建、生成或管理的）数据时，你首先会清晰地想到该数据的各个方面。


    新闻报道经常揭示的是许多数据管理者早已熟知的事实：应用数据只是冰山一角。用户使用应用的时间和地点在很多情况下至关重要，这些信息也属于应用数据的一部分。（如果你不信，可以关注新闻，看看调查人员在搜索嫌疑人手机、桌面或其他设备上的数据时，究竟在寻找什么。）


    发送到应用或从应用发出的数据可归入“应用数据”类别。同样属于应用数据类别的，还有应用商店中的应用描述，以及媒体（包括社交媒体）上关于该应用用途和使用方式的评论。


    所有这些都构成了“应用数据”，并以不同方式对各类人群产生影响。普通用户在常规使用中接触的数据，只是应用数据的一部分。


    无论你是用户、开发者，还是需要管理应用及其数据的管理者，每个人都必须意识到这些数据的存在。每个角色都需要思考应用数据。先从设计师或开发者入手。如果你开始思考这些数据，你可能会认定自己无法控制谁在记录用户何时何地使用你的应用。


    这种想法是错误的。


    使用记录部分由应用本身生成，作为开发者或设计师，这是你的责任。如果你的应用以“欢迎回来！”的消息迎接回头客，这或许是个友好的问候，但为了实现这一功能，作为开发者的你必须存储区分首次用户和回头用户的信息。这样一来，你就在存储可能对你的用户（以及其他人）重要或不重要的信息。这类设计决策的每一个都会影响应用数据。


    在某些情况下，这显然无关紧要，而在另一些情况下则至关重要，用户也心知肚明。如果你的应用按次收费，那么记录使用次数是合理的。总的来说，许多安全与数据管理专家建议：只存储你需要的数据，不存储任何多余数据。“说不定将来有用”绝非存储数据的充分理由。记住：未存储的数据不会被盗取，不会产生混乱或被损坏，而且——或许最重要的是——不会占用设备和云端的宝贵存储空间。


    许多开发者都惊讶于客户带着一长串数据清单，坐下来讨论新项目或新应用需要存储哪些数据。当开发者询问客户数据将存储在哪里时，回答往往是“在应用里”，有时是“在云端”。在项目深入之前，务必确保你确切了解数据将存储于何处。当你聚焦于数据存储的细节时，客户往往才开始明白其中涉及的内容。你可以为他们提供数据存储和维护的预估成本，而很多时候，存储大量“或许将来有用”的数据的需求就会减少或消失。


    记住：只存储你需要存储的数据，其他一概不存。翻阅著名计算机科学项目的历史，你会发现不少因数据存储方案过于野心勃勃而遭遇挫折的项目，这样的例子比比皆是。


    厘清数据及其存储的必要性并不意味着你就不该存储数据。在大多数情况下，你必须存储并使用数据，只是要保持谨慎。

    '
- fmt: '## Where Is the Data Stored?


    If you take the broad approach to app data, right away you are considering that
    it is stored in several places because the usage data will wind up being stored
    possibly by an Internet service provider and all of the intermediate participants
    in running the app. Even on a dedicated personal device with no network connection,
    chances are that the usage data in some form or other is stored in the device.
    However, moving beyond those cases, you can look at where the app’s own data is
    stored — that is where the data other than the environmental and usage data is
    stored.


    This data is separate from the data used as the app is running (that is, the stack
    and heap locations that are discussed in Chapter [7](#A441106_1_En_7_Chapter.html)).
    This is the data that an app may store to keep track of game scores or moves,
    to manage data ranging from word processing text or spreadsheet data or even recordings
    that the app makes of music or video). That is the data that needs to be stored
    somewhere so that users can come back to it when they want to continue working
    with it (or even when they want to erase it).


    The term `persistent storage` is often used for such data storage. The term has
    its roots in descriptions of storage devices that retain their data even when
    they are powered off. If you turn off a disk drive, you can turn it on again and
    use the data. That is persistent storage. If you have data stored in the memory
    of a device as in the stack and heap, when the app stops running or you power
    off the device, the data is gone – it’s nonpersistent.


    **Note**


    These are the concepts. Because people so often expect persistence of their data
    even if the actual storage device or medium is not available, there are ways that
    hardware and software developers can keep the data available even when the physical
    storage is not available, so you may observe persistence in what appears to be
    nonpersistent storage.


    There are three main places where this specific app data can be stored (that is,
    where the data that most users and developers think of when they think of app
    data). Those places are:


    *   Storage for the app on the device while it is running.

    *   Storage for the app on the device that is persistent.

    *   Storage on the device that is generalized for all apps on the device.

    *   Storage on storage-focused locations that are designed specifically for storage
    (Google Drive, Apple iCloud, Microsoft OneDrive and Azure, Dropbox, and the like).


    ### Storing Data in Nonpersistent App Storage


    Apps have storage locations that are available to them while they’re running.
    This space is nonpersistent, and the data is not retained after the app stops
    running or the device is powered down. In fact, computer storage is cheaper than
    it was, but it is still an expensive and scarce resource. It is reused where possible
    by the operating systems. In order to reuse data storage when possible, the operating
    system keeps track of data that is no longer needed. When you “delete” data, you
    typically cause the operating system to mark the data as deletable: it typically
    does actually erase the data.


    **Note**


    There are options available to actually delete data rather than just mark it as
    reusable storage space. In fact, secure deletion usually involves writing a random
    or known pattern over the storage locations to be reused – sometimes repeatedly.
    It actually is very hard to get rid of data once it has been written somewhere.


    Although the reality may be different in some cases, developers generally treat
    app storage as nonpersistent. To store data after the app ends or to send it to
    other devices or apps, other techniques need to be taken.


    ### Storing Data in Persistent App Storage


    The model of storage on iOS (which includes Swift) has dedicated persistent app
    storage. This storage is allocated for the app’s use, and the app and its developer
    can do what they want with the storage (although there are size limits to this
    storage). This is the storage that is erased when you delete an app from your
    device as you see in Figure [9-1](#A441106_1_En_9_Chapter.html#Fig1).


    ![A441106_1_En_9_Fig1_HTML.jpg](A441106_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Deleting an app deletes its data on iOS


    ### Storing Persistent Data Outside of App Storage on a Device


    Apps on all computers from mainframe supercomputers to the tiniest smartphones
    have the ability to read and write data to persistent storage. This general ability
    is mitigated by the fact that those features may not be available to every app.
    In general, storing data on a device in this way is the right way to store data
    that is specific to a device, app, and user. For example, you can use available
    storage to store scores in games, data that is entered for analysis, or any other
    purpose.


    These storage locations for apps are often referred to as `sandboxes`. Among the
    mitigations that limit the possibilities for app reading and writing data, the
    most common is restricting reading and writing to an app’s sandbox.


    **Note**


    “`Sandbox`” is used in several senses. It can refer to a testing area for apps
    and projects such as the sandboxes that let you test out integration with eBay,
    Amazon, and the like. In such sandboxes, you can actually test things such as
    purchases that will not actually be charged to an actual credit card. Sandboxes
    often refer to runtime nonpersistent data storage for apps such as heaps and stacks
    as described in the previous section. A sandbox can also be the persistent storage
    available only to a given app on a given device (or on shared devices with a common
    user identifier such as an AppleID).


    ### Storing Data in Shared Storage Locations


    There are many data storage locations for you to choose from once your look beyond
    the device on which your app is running. Dropbox, and other cloud services are
    common resources. Since iOS 11, the Files app on iOS exposes the various locations
    for files to you as you see in Figure [9-2](#A441106_1_En_9_Chapter.html#Fig2).
    If you have Dropbox or other accounts, they show up in Locations. The integrated
    user interface lets users see the files and their locations no matter where they
    are. (Remember, that these are all persistent storage locations.)


    ![A441106_1_En_9_Fig2_HTML.jpg](A441106_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Use Files to manage files and locations on iOS devices


    ## Who Is in Charge of the Data?


    If you have identified your app’s data and where it is to be stored, you still
    have two issues to resolve: who is in charge of it and how is the data managed
    and formatted. The issue of who is in charge (discussed in this section) is remarkably
    untechnical.


    If you write an app that lets people store some of their data — perhaps sightings
    of wildlife along with the date, time, photo, and comments — who is in charge
    of that data? Who owns it? Who can use it? There many questions.


    Although computer science traditionally has focused on design and implementation
    of computers and computer software, increasingly people who work in the computer
    science fields are being asked to handle data questions like these. The answers
    to these questions can be complex (and, in many cases, there isn’t agreement as
    to what the answers may be).


    In day-to-day practice of computer science by developers, designers, users, managers,
    and everyone else who is involved, the issues of data discussed in this chapter
    may be unresolved. Part of the lack of resolution may be an absence of best practices
    and even a lack of people who are aware of the issues.


    Until such time as there are clear guidelines and standards, the approach to data
    issues discussed in this chapter seems to be very much haphazard. Many people
    who work in the field take the position that unless there is some other guidance
    and standards for a specific project, it behooves someone on each project to raise
    the issues discussed here and to try to see that they are addressed in each project.'
