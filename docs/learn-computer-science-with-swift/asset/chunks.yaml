    \n![A441106_1_En_9_Fig6_HTML.jpg](A441106_1_En_9_Fig6_HTML.jpg)\n\nFigure 9-6\
    \  \nUsing an optional\n\nEven if a variable is declared as optional, you can\
    \ set its value. Thereafter, if it is tested to see if it is nil, it will not\
