  trans: '

    ## 数据存储在哪里？


    如果从广义角度看待应用数据，你很快会发现它存储在许多地方，因为使用数据最终可能会被互联网服务提供商以及运行应用过程中的所有中间参与者所存储。即使在没有网络连接的专用个人设备上，使用数据也很有可能以某种形式存储在设备中。不过，除了这些情况，你可以关注应用自身数据的存储位置——即环境数据和使用数据之外的数据。


    这类数据不同于应用运行时使用的数据（即第 7 章讨论的堆栈和堆位置）。这是应用可能存储的数据，用于记录游戏分数或移动步骤，管理从文字处理文本、电子表格数据，甚至应用录制的音乐或视频等各类数据。这些数据需要存储在某个地方，以便用户在需要继续使用时（甚至想要删除时）能够再次访问。


    术语`持久化存储`常被用于描述此类数据存储。该术语源于对存储设备的描述——即使断电也能保留数据。如果关闭磁盘驱动器，再次开启后仍可使用数据，这就是持久化存储。如果数据存储在设备的堆栈和堆内存中，当应用停止运行或设备断电时，数据就会消失——这是非持久化的。


    **注意**


    这些都是概念。由于人们通常期望数据具有持久性——即使实际存储设备或介质不可用，硬件和软件开发人员仍有办法在物理存储不可用时保持数据可用，因此你可能会在看似非持久化的存储中观察到持久化现象。


    应用数据主要可以存储在以下三个位置（即大多数用户和开发者想到应用数据时所指的数据）：


    *   应用运行时在设备上的存储空间。

    *   设备上属于应用的持久化存储空间。

    *   设备上为所有应用提供的通用存储空间。

    *   专为存储而设计的存储中心（Google Drive、Apple iCloud、Microsoft OneDrive 和 Azure、Dropbox
    等）。


    ### 在非持久化应用存储中存储数据


    应用在运行时会获得可供其使用的存储空间。这些空间是非持久化的，应用停止运行或设备关机后数据不会保留。事实上，计算机存储虽然比过去便宜，但仍是昂贵且稀缺的资源。操作系统会尽可能重复利用这些存储空间。为了能够重复利用数据存储，操作系统会跟踪不再需要的数据。当你“删除”数据时，通常会使操作系统将数据标记为可删除状态：操作系统通常不会真正擦除数据。


    **注意**


    有些选项可以真正删除数据，而不仅仅是将其标记为可重复使用的存储空间。实际上，安全删除通常会在待复用的存储位置上写入随机或已知模式的数据——有时会重复多次。数据一旦写入某处，真正清除它其实非常困难。


    尽管某些情况下实际情况可能不同，开发者通常将应用存储视为非持久化的。要在应用结束后存储数据，或将其发送到其他设备或应用，需要采用其他技术。


    ### 在持久化应用存储中存储数据


    iOS（包括 Swift）的存储模型具有专用的持久化应用存储。这部分存储空间分配给应用使用，应用及其开发者可以自主处理该存储空间（尽管存在大小限制）。当你从设备上删除应用时，这些存储空间会被清除，如图
    9-1 所示。


    ![A441106_1_En_9_Fig1_HTML.jpg](img/A441106_1_En_9_Fig1_HTML.jpg)


    图 9-1


    在 iOS 上删除应用会同时删除其数据


    ### 在设备上应用存储之外存储持久化数据


    从大型机超级计算机到最小的智能手机，所有计算机上的应用都能对持久化存储进行读写操作。这种通用能力会受到限制——并非所有应用都能使用这些功能。通常情况下，以这种方式在设备上存储数据是存储特定于设备、应用和用户数据的正确方法。例如，你可以利用可用存储空间来存储游戏分数、用于分析的数据或其他任何用途。


    应用的这些存储位置常被称为`沙盒`。在限制应用读写数据的诸多措施中，最常见的是将读写操作限制在应用的沙盒范围内。


    **注意**


    “`沙盒`”一词有多种含义。它可以指应用和项目的测试区域，例如让你测试与 eBay、Amazon 等集成的沙盒。在这种沙盒中，你可以实际测试购买等操作，而不会真正从信用卡扣费。沙盒也常指应用的运行时非持久化数据存储，如上一节所述的堆和栈。沙盒还可以指仅特定设备上的特定应用（或使用共享用户标识符如
    AppleID 的共享设备）可以访问的持久化存储。


    ### 在共享存储位置存储数据


    一旦将视野扩展到应用运行所在的设备之外，你会有许多数据存储位置可供选择。Dropbox 和其他云服务是常见的资源。自 iOS 11 起，iOS 上的“文件”应用会向你展示各种文件位置，如图
    9-2 所示。如果你有 Dropbox 或其他账户，它们会出现在“位置”中。集成的用户界面让用户无论文件在哪里都能看到文件及其位置。（请记住，这些都是持久化存储位置。）


    ![A441106_1_En_9_Fig2_HTML.jpg](img/A441106_1_En_9_Fig2_HTML.jpg)


    图 9-2


    使用“文件”在 iOS 设备上管理文件和位置


    ## 谁负责管理数据？


    如果你已经确定了应用的数据及其存储位置，仍有两个问题需要解决：谁负责管理数据，以及数据如何管理和格式化。谁负责管理数据（本节讨论的内容）这个问题非常不涉及技术层面。


    如果你编写了一个让用户存储某些数据的应用——例如记录野生动物目击事件及其日期、时间、照片和评论——那么谁负责管理这些数据？谁拥有它？谁可以使用它？这些问题有很多。


    尽管计算机科学传统上聚焦于计算机和计算机软件的设计与实现，但从事计算机科学领域工作的人越来越多地被要求处理此类数据问题。这些问题的答案可能很复杂（在很多情况下，对于答案是什么甚至没有共识）。


    在开发者、设计师、用户、管理者以及所有其他参与者的日常计算机科学实践中，本章讨论的数据问题可能尚未得到解决。部分原因在于缺乏最佳实践，甚至缺乏意识到这些问题存在的人。


    在出现明确的指导方针和标准之前，本章讨论的数据问题的处理方式似乎非常随意。许多业内人士认为，除非特定项目有其他指导和标准，否则每个项目都应有某人提出此处讨论的问题，并努力确保在每个项目中对这些问题加以解决。

    '
- fmt: "### Ownership of Data\n\nThere are several aspects to the ownership of data.\
    \ The most basic is who has ownership in the sense of the legal right to publish\
    \ (or not publish) the data as well as the right to allow (or disallow) access\
    \ in means other than publication.\n\nIn today’s world, there may not be simple\
    \ answers, but increasingly we find that specific aspects of data ownership are\
    \ addressed. In documents and agreements of various legal status, people rely\
    \ on representations about ownership every time they post or view data from a\
    \ social media site.\n\nThe question of ownership often arises when data is put\
    \ to a new use. If you are using an app to track your wildlife sightings, you\
    \ may think that your data is your data and that’s the end of it. However, if\
    \ your data is aggregated along with wildlife sightings from other people — perhaps\
    \ millions of people — that data then may have significant value. That value may\
    \ be of value to scientists as well as to marketers. In its aggregated form, your\
    \ spotting of a black squirrel may be useful and valuable.\n\nIn building and\
    \ managing apps, the awareness of ownership often has to be built into the app.\
    \ The issue of who is the owner of the data may not need to be resolved, but more\
    \ and more apps are being designed so that if the value of the data becomes significant,\
    \ the app can support what is needed to profit from that value.\n\nThe ways of\
    \ achieving these results aren’t particularly complicated. They may be as simple\
    \ as making certain that access to data in an app is protected by some mechanism\
    \ such as passwords or other credentials so that access can be controlled and\
    \ granted (or not) depending on identity, payment, or some other criterion.\n\n\
    All too often, an app’s data design is such that instead of turning on an option\
    \ to manage access control, major architecture changes to data storage and access\
    \ are required to manage access control.\n\n### Data Integrity\n\nRegardless of\
    \ who owns data, there needs to be a mechanism in place to secure the integrity\
    \ of data. Stored data is inherently unstable if only because the movement of\
    \ data from computer to storage device and back again is one of the weak spots\
    \ of system development and integration. In the simplest cases, the connection\
    \ between computer operations and data storage can be disrupted because the connection\
    \ is missing (or unstable). Either device can be missing or powered down.\n\n\
    Furthermore, the process of moving data is often fragile. The data ultimately\
    \ is a sequence of bits, and the integrity depends on each bit’s value being accurately\
    \ preserved during storage and transfer as well as the sequence being similarly\
    \ preserved.\n\nThere are three critical tools for use in managing data integrity:\n\
    \n*   Checksums are used to help preserve the representation of the data.\n* \
    \  Timestamps and other data markers are used to record changes to the data.\n\
    *   Version control is used to help identify different versions of data.\n\n###\
    \ Using Checksums\n\nTo this end, there are many strategies available to developers\
    \ and designers. One of the most common and simplest is to use a mechanism such\
    \ as a checksum. In this approach, the binary digits (or, more commonly, the bytes\
    \ or characters) of data are treated as binary numbers. They are manipulated —\
    \ often by adding them up — and the result is stored. When the data needs to be\
    \ verified, the bytes or characters are re-added and that sum is compared to the\
    \ stored sum (the checksum). This approach, which is often enhanced with further\
    \ manipulations such as division by prime numbers will catch common errors such\
    \ as an incorrect bit in a long string of data. In fact, many communication protocols,\
    \ devices, and standards allow for such checking and automatic retransmission\
    \ of possibly corrupted data.\n\nA basic understanding of checksums (perhaps in\
    \ no more detail than this paragraph) is a part of a computer science practitioner’s\
    \ toolkit.\n\n### Using Timestamps and Other Data Markers\n\nBeyond the physical\
    \ integrity of bits and bytes, there is a need to somehow or other preserve the\
    \ integrity of the data and its changes. Many database designers automatically\
    \ store a timestamp (the date and time) of the storage of data and its updates.\n\
    \nTimestamps are often expressed and stored as a time interval since a known date.\
    \ There are several such reference dates in common use. (`Epoch date` is a similar\
    \ term.)\n\nAmong the common ones are:\n\n*   Midnight on January 1, 1970. This\
    \ is the reference date used in Unix (and related systems such as Linux and macOS/iOS).\n\
    *   Midnight on January 1, 2001. This was chosen to reflect 2001 being the year\
    \ of the first release of Mac OS X (now macOS).\n\nDates before the reference\
    \ date are expressed as negative values of seconds. The times expressed are generally\
    \ in Coordinated Universal Time (UTC), which formerly was known as Greenwich Mean\
    \ Time (GMT). Thus, these times are constant across the globe.\n\nAlong with timestamps,\
    \ there often are other data markers that are used to identify data and its changes.\
    \ In addition to timestamps, there are one or more universally unique identifiers\
    \ (UUIDs). These are often provided by operating systems. They are guaranteed\
    \ to be as unique as possible across the world. They are typically fairly long\
    \ strings that you can create through the operating system; you can also add your\
    \ own identifiers to them so that you have a universally unique identifier of\
    \ a specific data element. These can be helpful in debugging.\n\nYou will find\
    \ comments that these markers take up valuable storage space and that the computations\
    \ involved in creating and decoding them use up valuable computing resources.\n\
    \nThese are absolutely valid concerns, but remember that their significance has\
    \ decreased over time with the advent of much more powerful devices becoming the\
    \ norm.\n\nA common set of data markers is often stored as part of most data items.\
    \ The elements differ from project to project, but the values usually come from\
    \ this list:\n\n*   Timestamp of data creation (first storage)\n*   Timestamp\
    \ of last modification\n*   Identification of data creation\n    1.  User\n  \
    \  2.  Device\n    3.  Location\n*   Identification of data modification\n   \
    \ 1.  User\n    2.  Device\n    3.  Location\n*   Universally Unique Identifier\
    \ of the data element.\n*   Data version.\n\n### Version Control\n\nNo matter\
    \ how skilled you are and how much experience you have, it is unusual for your\
    \ design of data storage to not need modifications over time. There may be errors,\
    \ but even if there aren’t, things change. You may need to store different data,\
    \ and some data that you have stored may be irrelevant.\n\nIn order to handle\
    \ situations like these, it is common to provide an identifier for a data format\
    \ — that means some identifier of what data is being stored and how it is stored.\
    \ A common practice is to store the version identifier in the simplest form possible\
    \ at the beginning of a data record. A simple binary number is sufficient for\
    \ version management.\n\nIf you do this, when your app reads (or writes) data,\
    \ the first thing read or written is this number. As soon as it is read, the app\
    \ can then know what else is stored in that record, and it can be read.\n\nWith\
    \ `Swift`, the way this is often done is to store the version number and follow\
    \ it with a dictionary (see Chapter 6, “Working with Data: Collections.” A dictionary\
    \ is very flexible so that you can determine what the keys are at runtime or even\
    \ use the version number to let you know what they are. If the meaning of keys\
    \ changes with versions (a sometimes unavoidable situation), you have all the\
    \ data you need to decode or encode the data.\n\n## How Is the Data Managed\n\n\
    There are two aspects to data management to consider:\n\n*   For external data,\
    \ where and how it is managed.\n*   Formatting and structure of data."
  raw: "### Ownership of Data\n\nThere are several aspects to the ownership of data.\
    \ The most basic is who has ownership in the sense of the legal right to publish\
    \ (or not publish) the data as well as the right to allow (or disallow) access\
    \ in means other than publication.\n\nIn today’s world, there may not be simple\
    \ answers, but increasingly we find that specific aspects of data ownership are\
    \ addressed. In documents and agreements of various legal status, people rely\
    \ on representations about ownership every time they post or view data from a\
    \ social media site.\n\nThe question of ownership often arises when data is put\
    \ to a new use. If you are using an app to track your wildlife sightings, you\
    \ may think that your data is your data and that’s the end of it. However, if\
    \ your data is aggregated along with wildlife sightings from other people — perhaps\
    \ millions of people — that data then may have significant value. That value may\
    \ be of value to scientists as well as to marketers. In its aggregated form, your\
    \ spotting of a black squirrel may be useful and valuable.\n\nIn building and\
    \ managing apps, the awareness of ownership often has to be built into the app.\
    \ The issue of who is the owner of the data may not need to be resolved, but more\
    \ and more apps are being designed so that if the value of the data becomes significant,\
    \ the app can support what is needed to profit from that value.\n\nThe ways of\
    \ achieving these results aren’t particularly complicated. They may be as simple\
