    \ {\n        print (\"Looked-up key value for \", eachKey, numbers[eachKey]!)\n\
    \        total += numbers[eachKey]!\n    }\n}\nprint (\"Total: \", total)\n```\n\
    清单 4-4 – 累加查找到的数值\n\n图 4-3 展示了 playground 及其输出结果（顶部因重复而省略）。\n\n![A441106_1_En_4_Fig3_HTML.jpg](img/A441106_1_En_4_Fig3_HTML.jpg)\n\
    \n图 4-3 – 在 playground 中运行应用\n\n在继续之前，还有一点需要注意。如果你查看图 4-4 所示的 playground 顶部，会发现字典中的元素是无序的。数组是有序的，但字典不是。\n\
    \n![A441106_1_En_4_Fig4_HTML.jpg](img/A441106_1_En_4_Fig4_HTML.jpg)\n\n图 4-4 –\
    \ 字典中的元素\n\n如果你想复现图 4-4 的效果，请重复执行代码。然后点击第一行代码右侧的 `显示结果` 按钮。这时左侧会打开结果视图。向下拖动框架底部以放大结果，从而显示\
    \ `let` 语句中你想查看的内容。你可以展开或收起展开三角形来查看数据。\n\n## 总结\n\n本章介绍了算法的基本概念——执行操作的有序步骤。它们可以用英语或数学语言描述，但只有在用特定语言实现时才会真正发挥作用。\n\
    \n# 5. 管理控制流：重复\n\n算法由解决问题、计算结果或完成应用（或其部分）工作的步骤构成。通常每个步骤依次执行，过程结束时任务即完成。\n\n这种编程方式有一个名称：它被称为过程式或命令式编程（这两个词使用的是其常规含义）。（这种编程方式的术语称为*范式*，因此在许多地方你会看到命令式范式的提法。）\n\
    \n与之相对的范式是声明式或函数式编程。这两种范式经常共存于同一个应用或程序中。两者都源于计算机和计算机编程的早期时代，但大致来说，声明式/函数式编程植根于数学和逻辑，而过程式/命令式编程则是建造第一台计算机的工程师们偏爱的范式。\n\
    \n两种范式都很有用，正因为如此，加上你可能会在同一个项目中同时遇到两者，我们不会在关于哪种更好的争论中偏袒任何一方。本书的宗旨是：两者都是必要且有用的。\n"
- fmt: "# Getting Ready for a Multi-Step Control Flow Project with Random Numbers\n\
    \nTo explore a multi-step project and its control, you need something to work\
    \ with. One of the most common uses of multi-step projects is in managing collections\
    \ of data such as arrays. (There is more on arrays in Chapter [6](#A441106_1_En_6_Chapter.html),\
    \ Structuring Data - The Swift Issues.)\n\nAn array is like a list — a list of\
    \ students in a classroom, items on a shopping list, stops on an itinerary — any\
    \ list at all. The simplest list to work with is a list of numbers. Numbers carry\
    \ almost no meaning, so you won’t be distracted by a list that might place Paris\
    \ between Melbourne and Auckland.\n\nIn order to have a set of numbers that really\
    \ is meaningless, computer scientists often use random numbers. Random numbers\
    \ are just that — numbers picked at random. Random numbers are used in many practical\
    \ applications. For example, if you have bowl full of raffle tickets, you often\
    \ would pick one at random to choose a winner of the raffle.\n\nRandom numbers\
    \ are used in a variety of computer science processes from automatically choosing\
    \ game pieces and situations in a game to statistical sampling and the conduct\
    \ of randomized testing of drugs and treatments as well as other scientific experiments.\
    \ Because random numbers are used in so many ways (including demonstrating computer\
    \ science control structures as in this chapter), it is useful to look at how\
    \ you create them for any of these purposes.\n\nThe first point to consider is\
    \ that truly random numbers are hard to create. In practice, they are usually\
    \ generated by a series of calculations that are designed to eliminate any patterns\
    \ and therefore can be considered to be random numbers. For this reason, the term\
    \ pseudo-random numbers is often used by people who want to be precise. For the\
    \ purposes of this book (and many other common purposes), the pseudo-random numbers\
    \ are fine for use; in this section, we use random number in its broadest sense.\n\
    \nSwift and playgrounds provide three built-in functions to produce random numbers.\
    \ They produce random numbers that you can then use for your own purposes. You\
    \ do not need to refer to a list of random numbers (such lists do exist). They\
    \ provide you with a random number that is either between 0 and 1 or between 0\
    \ and an upper limit that you provide. These numbers are returned as integers\
    \ (specifically `UInt32`) or a double in the case of `drand48()`.\n\nThe three\
    \ built-in Swift functions that generate random numbers are as follows:\n\n- `arc4random_uniform(_:)`\
    \ takes a single parameter which must be an integer.\n\n  The random number will\
    \ be between 0 and the parameter minus 1. Thus, a call to `arc4random_uniform(10)`\
    \ will return a value between 0 and 9.\n\n- `drand48()` returns a random number\
    \ of double type. You do not specify the range: the number will fall between 0\
    \ and 1.\n\n- `arc4random()` takes no parameters. The resulting number will be\
    \ between 0 and 2 ** 32-1.\n\nIn the case of `drand48()`, you can take the resulting\
    \ number and multiply it by any value you want in order to get a random number\
    \ between 0 and that number. With `arc4random_uniform(_:)` you just provide the\
    \ upper bound so no multiplication is required.\n\nNote that when you convert\
    \ numbers from one type to another (float or double to or from one of the integer\
    \ types), the conversion process may introduce some non-random aspects to the\
    \ resulting number. For almost all common purposes, this doesn’t matter.\n\nIf\
    \ you want to preserve the randomness of the returned number, avoid too much type\
    \ conversion and manipulation. Particularly with floating-point numbers, those\
    \ calculations can introduce some non-random elements into the mix. However, as\
    \ pointed out previously, this is usually not a problem in most applications of\
    \ random numbers.\n\n## Creating a Random Number Playground\n\nYou can build on\
    \ the Answers playground that is distributed with iOS so that you can experiment\
    \ with random numbers. Here is a way to do that. With the shelf showing, tap +\
    \ at the top right, and then tap the New Playground + button as you see in Figure\
    \ [5-1](#A441106_1_En_5_Chapter.html#Fig1).\n\n![A441106_1_En_5_Fig1_HTML.jpg](A441106_1_En_5_Fig1_HTML.jpg)\n\
    \nFigure 5-1\n\nDuplicate the Answers playground\n\nTap the Starting Points tab\
    \ at the bottom as shown in Figure [5-2](#A441106_1_En_5_Chapter.html#Fig2) and\
    \ then get Answers by tapping its Get button.\n\n![A441106_1_En_5_Fig2_HTML.jpg](A441106_1_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\n\nGet Answers\n\nA copy of Answers will be created for you as you\
    \ see in Figure [5-3](#A441106_1_En_5_Chapter.html#Fig3).\n\n![A441106_1_En_5_Fig3_HTML.jpg](A441106_1_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\n\nAnswers is created\n\nTap Answers to open it as you see in Figure\
    \ [5-4](#A441106_1_En_5_Chapter.html#Fig4).\n\n![A441106_1_En_5_Fig4_HTML.jpg](A441106_1_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4\n\nOpen Answers\n\nWhen you download a playground (or a template\
    \ in Xcode), the safest thing to do is to see if it runs as-is. Not all templates\
    \ and playgrounds are configured to run, but it’s a good idea to see if you do\
    \ have a running playground. Tap the playground’s Run My Code button. You’ll see\
    \ the result shown in Figure [5-5](#A441106_1_En_5_Chapter.html#Fig5).\n\n![A441106_1_En_5_Fig5_HTML.jpg](A441106_1_En_5_Fig5_HTML.jpg)\n\
    \nFigure 5-5\n\nRun Answers\n\nAt the top of the playground, you see its result\
    \ — a prompt and a data entry field. Below that is a Stop button. Then you find\
    \ the code itself and the keyboard.\n\nWhat you’ve got now in the Answers playground\
    \ is an interactive playground that displays a prompt and lets people enter a\
    \ response. You’re ready to build on that."
  raw: '## Getting Ready for a Multi-Step Control Flow Project with Random Numbers


    To explore a multi-step project and its control, you need something to work with.
    One of the most common uses of multi-step projects is in managing collections
    of data such as arrays. (There is more on arrays in Chapter [6](#A441106_1_En_6_Chapter.html),
    Structuring Data - The Swift Issues.)


    An array is like a list — a list of students in a classroom, items on a shopping
    list, stops on an itinerary — any list at all. The simplest list to work with
    is a list of numbers. Numbers carry almost no meaning, so you won’t be distracted
    by a list that might place Paris between Melbourne and Auckland.


    In order to have a set of numbers that really is meaningless, computer scientists
    often use random numbers. Random numbers are just that — numbers picked at random.
    Random numbers are used in many practical applications. For example, if you have
    bowl full of raffle tickets, you often would pick one at random to choose a winner
    of the raffle.


    Random numbers are used in a variety of computer science processes from automatically
    choosing game pieces and situations in a game to statistical sampling and the
    conduct of randomized testing of drugs and treatments as well as other scientific
    experiments. Because random numbers are used in so many ways (including demonstrating
    computer science control structures as in this chapter), it is useful to look
    at how you create them for any of these purposes.


    The first point to consider is that truly random numbers are hard to create. In
    practice, they are usually generated by a series of calculations that are designed
    to eliminate any patterns and therefore can be considered to be random numbers.
    For this reason, the term pseudo-random numbers is often used by people who want
    to be precise. For the purposes of this book (and many other common purposes),
    the pseudo-random numbers are fine for use; in this section, we use random number
    in its broadest sense.


    Swift and playgrounds provide three built-in functions to produce random numbers.
    They produce random numbers that you can then use for your own purposes. You do
    not need to refer to a list of random numbers (such lists do exist). They provide
    you with a random number that is either between 0 and 1 or between 0 and an upper
    limit that you provide. These numbers are returned as integers (specifically UInt32)
    or a double in the case of `drand48()`.


    The three built-in Swift functions that generate random numbers are as follows:


    *   `arc4random_uniform(_:)` takes a single parameter which must be an integer.


    The random number will be between 0 and the parameter minus 1\. Thus, a call to
    arc4random_uniform(10) will return a value between 0 and 9.


    `drand48()` returns a random number of double type. You do not specify the range:
    the number will fall between 0 and 1.


    `arc4random()` takes no parameters. The resulting number will be between 0 and
    2 ** 32-1.


    In the case of `drand48`, you can take the resulting number and multiply it by
    any value you want in order to get a random number between 0 and that number.
    With `arc4random_uniform(_:)` you just provide the upper bound so no multiplication
    is required.


    Note that when you convert numbers from one type to another (float or double to
    or from one of the integer types), the conversion process may introduce some non-random
    aspects to the resulting number. For almost all common purposes, this doesn’t
    matter.


    If you want to preserve the randomness of the returned number, avoid too much
    type conversion and manipulation . Particularly with floating-point numbers, those
    calculations can introduce some non-random elements into the mix. However, as
    pointed out previously, this is usually not a problem in most applications of
    random numbers.


    ### Creating a Random Number Playground


    You can build on the Answers playground that is distributed with iOS so that you
    can experiment with random numbers. Here is a way to do that. With the shelf showing,
    tap + at the top right, and then tap the New Playground + button as you see in
    Figure [5-1](#A441106_1_En_5_Chapter.html#Fig1).


    ![A441106_1_En_5_Fig1_HTML.jpg](A441106_1_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Duplicate the Answers playground


    Tap the Starting Points tab at the bottom as shown in Figure [5-2](#A441106_1_En_5_Chapter.html#Fig2)
    and then get Answers by tapping its Get button .


    ![A441106_1_En_5_Fig2_HTML.jpg](A441106_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    Get Answers


    A copy of Answers will be created for you as you see in Figure [5-3](#A441106_1_En_5_Chapter.html#Fig3).


    ![A441106_1_En_5_Fig3_HTML.jpg](A441106_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Answers is created


    Tap Answers to open it as you see in Figure [5-4](#A441106_1_En_5_Chapter.html#Fig4).


    ![A441106_1_En_5_Fig4_HTML.jpg](A441106_1_En_5_Fig4_HTML.jpg)


    Figure 5-4


    Open Answers


    When you download a playground (or a template in Xcode), the safest thing to do
    is to see if it runs as-is. Not all templates and playgrounds are configured to
    run, but it’s a good idea to see if you do have a running playground. Tap the
    playground’s Run My Code button. You’ll see the result shown in Figure [5-5](#A441106_1_En_5_Chapter.html#Fig5).


    ![A441106_1_En_5_Fig5_HTML.jpg](A441106_1_En_5_Fig5_HTML.jpg)


    Figure 5-5


    Run Answers


    At the top of the playground, you see its result — a prompt and a data entry field.
    Below that is a Stop button. Then you find the code itself and the keyboard.


    What you’ve got now in the Answers playground is an interactive playground that
    displays a prompt and lets people enter a response. You’re ready to build on that.'
  trans: "\n# 准备使用随机数进行多步控制流项目\n\n要探索一个多步项目及其控制，你需要有可操作的内容。多步项目最常见的用途之一是管理数据集合，例如数组（关于数组的更多内容请参见第\
    \ 6 章“结构化数据：Swift 问题”）。\n\n数组就像一个列表——教室里的学生名单、购物清单上的物品、行程中的停靠站——任何列表都可以。最简单的列表是数字列表。数字几乎不携带任何含义，因此你不会因为一个把巴黎排在墨尔本和奥克兰之间的列表而分心。\n\
    \n为了获得一组真正无意义的数字，计算机科学家经常使用随机数。随机数正是如此——随机选取的数字。随机数在许多实际应用中被使用。例如，如果你有一个装满抽奖券的碗，你通常会随机抽取一张来确定抽奖的获胜者。\n\
    \n随机数被用于各种计算机科学流程，从自动选择游戏中的棋子与情境，到统计抽样，以及对药物和治疗方法进行随机测试及其他科学实验。由于随机数的用途如此广泛（包括在本章中演示计算机科学的控制结构），因此了解如何为这些目的创建随机数是很有用的。\n\
    \n首先需要明确的是，真正随机的数字很难生成。在实践中，它们通常通过一系列旨在消除任何模式的计算来生成，因此可以被视为随机数。正因如此，追求精确的人常常使用术语“伪随机数”。就本书（以及许多其他常见用途）而言，伪随机数完全可以满足需要；在本节中，我们在最广义上使用“随机数”这一术语。\n\
    \nSwift 和 Playgrounds 提供了三个内置函数来生成随机数。它们生成的随机数可供你按需使用。你无需查阅随机数列表（尽管这种列表确实存在）。它们会提供一个介于\
    \ 0 到 1 之间的随机数，或者一个介于 0 到你指定的上限之间的随机数。这些数字会以整数（具体为 `UInt32`）或双精度浮点数（对于 `drand48()`）的形式返回。\n\
    \n生成随机数的三个内置 Swift 函数如下：\n\n- `arc4random_uniform(_:)` 接受一个参数，该参数必须是一个整数。\n\n\
    \  随机数将介于 0 和参数值减 1 之间。因此，调用 `arc4random_uniform(10)` 将返回一个 0 到 9 之间的值。\n\n- `drand48()`\
    \ 返回一个双精度浮点类型的随机数。你无需指定范围：该数字将介于 0 和 1 之间。\n\n- `arc4random()` 不接受参数。生成的数字将介于\
    \ 0 和 2 的 32 次方减 1 之间。\n\n对于 `drand48()`，你可以将得到的结果乘以任意值，从而获得一个介于 0 和该值之间的随机数。而\
    \ `arc4random_uniform(_:)` 只需提供上限，因此无需进行乘法运算。\n\n请注意，当你将数字从一种类型转换为另一种类型（浮点数或双精度浮点数与整数类型之间的相互转换）时，转换过程可能会给结果数字引入一些非随机因素。对于几乎所有常见用途而言，这并无大碍。\n\
    \n如果你希望保持返回数字的随机性，应避免过多的类型转换和操作。尤其是对于浮点数，这些计算可能会向混合结果中引入一些非随机元素。不过，如前所述，在大多数随机数应用中这通常不成问题。\n\
    \n## 创建一个随机数 playground\n\n你可以基于 iOS 附带的 Answers playground 进行构建，以便尝试使用随机数。以下是操作方法。在显示书架的情况下，点击右上角的\
    \ +，然后点击“新建 Playground +”按钮，如图 5-1 所示。\n\n![A441106_1_En_5_Fig1_HTML.jpg](img/A441106_1_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1\n\n复制 Answers playground\n\n点击底部的“起始点”标签，如图 5-2 所示，然后通过点击其“获取”按钮来获取 Answers。\n\
    \n![A441106_1_En_5_Fig2_HTML.jpg](img/A441106_1_En_5_Fig2_HTML.jpg)\n\n图 5-2\n\
    \n获取 Answers\n\n系统将为你创建一份 Answers 副本，如图 5-3 所示。\n\n![A441106_1_En_5_Fig3_HTML.jpg](img/A441106_1_En_5_Fig3_HTML.jpg)\n\
    \n图 5-3\n\nAnswers 已创建\n\n点击 Answers 将其打开，如图 5-4 所示。\n\n![A441106_1_En_5_Fig4_HTML.jpg](img/A441106_1_En_5_Fig4_HTML.jpg)\n\
    \n图 5-4\n\n打开 Answers\n\n当你下载一个 playground（或 Xcode 中的模板）时，最稳妥的做法是先检查它能否直接运行。并非所有模板和\
    \ playground 都配置为可运行，但确认你有一个可运行的 playground 是个好习惯。点击 playground 的“运行我的代码”按钮。你将看到如图\
    \ 5-5 所示的结果。\n\n![A441106_1_En_5_Fig5_HTML.jpg](img/A441106_1_En_5_Fig5_HTML.jpg)\n\
    \n图 5-5\n\n运行 Answers\n\n在 playground 顶部，你可以看到其运行结果——一个提示和一个数据输入字段。其下方是一个“停止”按钮。再往下则是代码本身和键盘。\n\
    \n你现在拥有的 Answers playground 是一个交互式 playground，它会显示一个提示并允许人们输入回应。你可以在此基础上进行扩展了。\n"
- fmt: "### Writing the Playground Code\n\nYou can build on existing code in Answers\
    \ to ask people to enter an upper limit for a random number to be generated using\
    \ `arc4random_uniform(_:)` — the function that returns a pseudo-random number\
    \ between 0 and the upper limit given (minus 1 so the upper limit is outside the\
    \ range of random numbers). The result is a `UInt32`.\n\nHere is the modified\
    \ code.\n\nFirst, ask the user to enter the upper limit:\n\n```\nshow (\"What\
    \ is your name?\")\nbecomes\nshow (\"Upper limit for random number?\")\nlet name\
    \ = ask (\"Name\")\nbecomes\nlet upperLimit = ask (\"Upper Limit\")\nshow (\"\
    Hi \" + name)\nbecomes\nshow (upperLimit)\n```\n\nYou’ve now got a playground\
    \ that runs and asks for a random number limit and then shows the result. You\
    \ can use the Swift playground to modify the code. As you proceed, the shortcut\
    \ bar and prompts will help you write your code.\n\nThe input data is a string,\
    \ so you’ll need to convert it to an integer with this code:\n\n```\nlet intResponse\
    \ = UInt32(upperLimit)\n```\n\nGenerate the random number:\n\n```\nlet random\
    \ = arc4random_uniform(intResponse!)\n```\n\n`random` will be an integer, so convert\
    \ it to a string for display:\n\n```\nlet randomString = String(random)\n```\n\
    \nFinally show the result:\n\n```\nshow (randomString)\n```\n\nFigure 5-6 shows\
    \ the playground running. The upper limit is entered as 49 and the random number\
    \ generated is 25.\n\n![A441106_1_En_5_Fig6_HTML.jpg](A441106_1_En_5_Fig6_HTML.jpg)\n\
    \n*Figure 5-6 – Start to run the new playground*\n\nAs the playground runs, you\
    \ see that there are displayable results for each line of executed code (as always\
    \ in a playground). You can show viewers for any of these that you want to, as\
    \ shown in Figure 5-7.\n\n![A441106_1_En_5_Fig7_HTML.jpg](A441106_1_En_5_Fig7_HTML.jpg)\n\
    \n*Figure 5-7 – Shows viewers for the playground as it runs*\n\nRemember that\
    \ Swift is strict with types, so you need to convert strings to integers and vice\
    \ versa — it doesn’t happen automatically unless it is unambiguously possible.\
    \ This helps to keep Swift code robust. In addition to the type conversions, note,\
    \ too, that `intResponse` is an optional that needs to be unwrapped with `!`.\
    \ (In production code, you would be safer to unwrap it with `?` so that it will\
    \ fail instead of crash if there is a `nil` there. In Chapter 7, in the section\
    \ “Handling Data That Isn’t There,” you’ll find out more about optionals.)\n\n\
    Go wrap up this section, and you can rename the Answer playground to Random. Display\
    \ the shelf of playgrounds and then press and hold the Answers playground. You’ll\
    \ be able to rename it as you see in Figure 5-8.\n\n![A441106_1_En_5_Fig8_HTML.jpg](A441106_1_En_5_Fig8_HTML.jpg)\n\
    \n*Figure 5-8 – Rename the playground to Random*\n\n## Creating Many Random Numbers\n\
    \nRemember that the purpose of creating random numbers in this chapter is to create\
    \ a collection of meaningless (random) data that you can use to experiment with\
    \ as you explore control management in code. It’s easy to modify the Random playground\
    \ to create several random numbers at a time. Just add the following lines of\
    \ code to create 6 random numbers.\n\nYou already have the code to create and\
    \ show a single random number. (Here it is again in case you need it here.)\n\n\
    ```\nvar random = arc4random_uniform(intResponse!)\nvar randomString = String(random)\n\
    show (randomString)\n```\n\nYou can add to that code to create another random\
    \ number:\n\n```\nrandom = arc4random_uniform(intResponse!)\nrandomString = String(random)\n\
    show (randomString)\n```\n\nThe only change you have to make is to remember that\
    \ the original code declares variables as constants with `let`. Change the declarations\
    \ to `var` so you can change their values, and in the subsequent calls, omit the\
    \ type. Figure 5-9 shows the playground that now creates two random numbers (159\
    \ and 173) from the same `intResponse`.\n\n![A441106_1_En_5_Fig9_HTML.jpg](A441106_1_En_5_Fig9_HTML.jpg)\n\
