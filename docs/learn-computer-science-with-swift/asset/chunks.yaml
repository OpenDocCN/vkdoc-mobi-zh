    \ false. Listing [8-6](#A441106_1_En_8_Chapter.html#Par46) shows one version of\
    \ a dangling `else` bracket . Common variations on this style do not indent the\
    \ `else`.\n\n```\nif x > 4\n{\nx = x + 1\nprint (\"updated x\")\n}\nelse\n{\n\
    print (\"no update\")\n}\nListing 8-6\nDangling else bracket\n```\n\nIn Listing\
    \ [8-7](#A441106_1_En_8_Chapter.html#Par48), you see an embedded `else` . By comparison\
    \ with Listing [8-6](#A441106_1_En_8_Chapter.html#Par46), this emphasizes the\
    \ two components of the `if` statement. Which style you use is a matter of preference\
    \ (your preference and the preferences of your project team).\n\n```\nif x > 4\
    \ {\nx = x + 1\nprint (\"updated x\")\n}  else {\nprint (\"no update\")\n}\nListing\
    \ 8-7\nEmbedded else bracket\n```\n\n#### Ternary Operators\n\nSo far in this\
    \ chapter, the discussion has focused on the control of statements within an app.\
    \ There is a related operator that is used in a somewhat similar way. The ternary\
    \ operator does not manage control flow; rather, within a single statement it\
    \ lets you choose between two alternate values as a result. It is discussed here\
    \ because it frequently is used to replace more complex `if` statements.\n\nThe\
    \ situation that ternary operators address is a common `if` pattern:\n\n```\n\
    if x > 10 {\nmessage = \"greater than 10\"\n} else {\nmessage = \"not greater\
    \ than 10\"\n}\n```\n\nWhether the condition is true or false, the `message` will\
    \ be set to something. With a ternary operator, you can make this much simpler.\
    \ The code using a ternary operator is a single line of code:\n\n```\nmessage\
    \ = x > 10 ? \"greater than 10\" : \"not greater than 10\"\n```\n\nThis is a replacement\
    \ statement that incorporates the conditional test and both the true and false\
    \ results. Figure [8-7](#A441106_1_En_8_Chapter.html#Fig7) shows this in a playground.\n\
    \n![A441106_1_En_8_Fig7_HTML.jpg](A441106_1_En_8_Fig7_HTML.jpg)\n\nFigure 8-7\n\
    \nExplore a ternary operator\n\nYou can test this code for yourself by downloading\
    \ the Conditional1 playground as described in the Introduction. Try adjusting\
    \ the value of `x` in the first line of code and the test `for x > 10` in the\
    \ ternary operator; you can also experiment with changing the text strings.\n\n\
    Remember that ternary operators are operators within a single statement (not even\
    \ a compound statement although you can get fancy and produce some almost undecipherable\
    \ code if you try to push that limit).\n\n## Switching Control\n\nConditional\
    \ statements let you branch to one of two true/false conditions; you can also\
    \ place conditional statements within one or more branches so that you continue\
    \ to fork along true/false paths of various conditions. If you want to implement\
    \ more than a simple binary true/false branch, you may find yourself deep in confusing\
    \ branches of branches. You may realize that what you want is more than two choices,\
    \ but the `if` statement limits you to one or two choices (two choices require\
    \ an `else` clause as part of the `if` statement).\n\nThe abstract idea of a switch\
    \ statement is as follows:\n\n*   A condition is evaluated.\n*   Its result is\
    \ used to choose a statement or set of statements to be executed.\n\nThe basic\
    \ idea is shown here in pseudocode in Listing [8-8](#A441106_1_En_8_Chapter.html#Par62):\n\
    \n```\nswitch  {\ncase : \ncase : \n}\nListing 8-8\nPseudocode generic switch\
    \ statement\n```"
  trans: "\n# 在 Swift 中使用复合语句\n\n在许多编程语言（包括 Swift 中），你可以通过将语句括在花括号中来将它们组合在一起，如下所示：\n\
    \n```\n{\nlet x = 5\nlet y = 6\n}\n```\n\n这使你可以将这些语句视为一条复合语句——也就是说，将其视为一条语句。这在与条件测试结合使用时特别有用。这意味着之前代码清单\
    \ 8-1 中展示的 Swift 示例可以得到增强。条件代码周围的花括号意味着它已经是一条复合语句。要让 `if` 语句应用于复合语句中的多条语句，你只需将第二条语句添加到花括号复合语句的内部，如代码清单\
    \ 8-3 所示。\n\n```\nvar x = 5\nif x > 4\n{\nx = x + 1\nprint (\"updated x\")\n}\n\
    代码清单 8-3\n将 Swift if 语句与复合语句一起使用\n```\n\n你可以使用 Xcode 的偏好设置来管理缩进。选择 **Xcode** ➤\
    \ **偏好设置**，然后选择 **文本编辑** 以及窗格顶部的 **缩进** 部分，如图 8-5 所示。\n\n![A441106_1_En_8_Fig5_HTML.jpg](img/A441106_1_En_8_Fig5_HTML.jpg)\n\
    \n图 8-5  \n设置缩进选项\n\n通过图 8-5 中所示的设置，你可以看到在图 8-6 中缩进是如何工作的。（该报错是因为像这样一个仅用于格式演示的、脱离上下文的复合语句在语法上是无效的。）\n\
    \n在图 8-6 中你看不到的是，在输入起始的左花括号后，插入点会移到下一行的缩进位置，以便你可以继续输入。当你输入右花括号时，缩进会取消，并且光标会移到左侧。任意长度的内嵌语句都能正确显示。\n\
    \n![A441106_1_En_8_Fig6_HTML.jpg](img/A441106_1_En_8_Fig6_HTML.jpg)\n\n图 8-6 \
    \ \n在 Xcode 偏好设置中使用缩进\n\n请注意，对于代码缩进，存在不同的风格和标准。最基本的一点之一是左花括号的放置位置。这在条件语句中尤其重要，因为在复合语句的左花括号之前存在代码。代码清单\
    \ 8-4 和代码清单 8-5 展示了两种基本风格。\n\n```\nif x > 4\n{\nx = x + 1\nprint (\"updated x\"\
    )\n}\n代码清单 8-4\n悬挂括号风格\n```\n\n```\nif x > 4 {\nx = x + 1\nprint (\"updated x\"\
    )\n}\n代码清单 8-5\n内嵌括号风格\n```\n\n这两种风格各有其支持的理由。在悬挂风格中，左花括号和右花括号是对齐的，因此可能更容易识别出复合语句。在内嵌风格中（代码清单\
    \ 8-5），左花括号和右花括号不对齐，但整个条件语句表现为一个整体（它本来就是一个整体）。\n\n当你扩展 `if` 语句以提供 `else` 子句时，问题可能会稍微复杂一些——`else`\
    \ 子句是在条件为假时要执行的一条语句或复合语句。代码清单 8-6 展示了悬挂 `else` 括号的一种版本。这种风格的常见变体不会缩进 `else`。\n\
    \n```\nif x > 4\n{\nx = x + 1\nprint (\"updated x\")\n}\nelse\n{\nprint (\"no\
    \ update\")\n}\n代码清单 8-6\n悬挂 else 括号风格\n```\n\n在代码清单 8-7 中，你看到的是内嵌的 `else`。与代码清单\
    \ 8-6 相比，这种方式强调了 `if` 语句的两个组成部分。你使用哪种风格属于个人偏好问题（取决于你个人以及你项目团队的偏好）。\n\n```\nif\
    \ x > 4 {\nx = x + 1\nprint (\"updated x\")\n}  else {\nprint (\"no update\")\n\
    }\n代码清单 8-7\n内嵌 else 括号风格\n```\n\n## 三元运算符\n\n到目前为止，本章的讨论集中在应用程序内语句的控制上。有一个相关运算符的使用方式与之有些类似。三元运算符不管理控制流；而是在单条语句内让你从两个可选值中选择一个作为结果。此处讨论它，是因为它经常被用来替换更复杂的\
    \ `if` 语句。\n\n三元运算符所处理的是常见的 `if` 模式：\n\n```\nif x > 10 {\nmessage = \"greater\
    \ than 10\"\n} else {\nmessage = \"not greater than 10\"\n}\n```\n\n无论条件为真还是假，`message`\
    \ 都会被设置为某个值。使用三元运算符，你可以让这个过程变得简单得多。使用三元运算符的代码只有一行：\n\n```\nmessage = x > 10 ?\
    \ \"greater than 10\" : \"not greater than 10\"\n```\n\n这是一条替代语句，它包含了条件测试以及结果为真和假两种情况下的值。图\
    \ 8-7 在 playground 中展示了这一点。\n\n![A441106_1_En_8_Fig7_HTML.jpg](img/A441106_1_En_8_Fig7_HTML.jpg)\n\
    \n图 8-7  \n探索三元运算符\n\n你可以通过下载引言中描述的 `Conditional1` playground 来自行测试这段代码。尝试调整第一行代码中\
    \ `x` 的值以及三元运算符中 `x > 10` 的测试条件；你还可以尝试更改文本字符串。\n\n请记住，三元运算符是单条语句内的运算符（甚至不是一条复合语句，尽管如果你试图突破这个限制，可以玩出花样并产生一些几乎无法解读的代码）。\n\
    \n# 切换控制\n\n条件语句允许你分支到两个真/假条件之一；你还可以在一条或多条分支内放置条件语句，以便继续沿着各种条件的真/假路径进行分支。如果你想要实现比简单的二进制真/假分支更复杂的分支，你可能会发现自己深陷于令人困惑的嵌套分支中。你可能会意识到，你需要的不仅仅是两个选择，但\
    \ `if` 语句将你限制在一到两个选择（两个选择需要 `else` 子句作为 `if` 语句的一部分）。\n\nswitch 语句的抽象思想如下：\n\n\
    *   评估一个条件。\n*   使用其结果来选择要执行的一条语句或一组语句。\n\n基本思想在代码清单 8-8 的伪代码中展示如下：\n\n```\nswitch\
    \  {\ncase : \ncase : \n}\n代码清单 8-8\n通用 switch 语句的伪代码\n```\n"
- fmt: "### Comparing Swift Switches to Other Languages\n\nNote that the entire `switch`\
    \ statement is enclosed in delimiters (brackets in this case). `Switch` statements\
    \ are great tools for writing structured code, but there are a number of significant\
    \ variations across languages. Here are some of them:\n\n*   Once an expression\
    \ is evaluated and matched to an expression result, that code is executed, but\
    \ what happens next? In some languages such as C, after `expressionResult1` is\
    \ chosen and executed, control will pass to the following statements. The word\
    \ `break` is used at the end of a `case` element to cause control to simply leave\
    \ the entire `switch` statement.\n*   `break` statements can appear anywhere.\
    \ If you have five `case` elements, you can place a `break` command after any\
    \ of them. You could choose the first `case` element, execute it, drop through\
    \ to execute the second `case` element, and then terminate if a `break` statement\
    \ is at the end of the second `case` element.\n*   In languages in the ALGOL and\
    \ Pascal families (including Swift), the choice is limited to executing the `case`\
    \ element. There may not be a need for a `break` statement. (This is the case\
    \ in Swift.)\n*   The entire statement may be called a `switch`, a `case`, or\
    \ `select`.\n*   The `case` elements are often called cases and are identified\
    \ by the keyword `case`.\n*   Some languages (including Swift) let you modify\
    \ the conditions under which a `case` element is chosen.\n*   Many languages require\
    \ a special case (often called `default`), which is executed if there is no `case`\
    \ element matching the expression result.\n\nMuch of the variations may be due\
    \ to the fact that although the statement is powerful and can help you create\
    \ more structured and readable code, developers added additional features rapidly,\
    \ and they were inconsistent. This may have been related to the period in which\
    \ these statements were developed — it was a time (the 1960s) of a great deal\
    \ of language development and modification.\n\n### Exploring the Swift Switch\
    \ Syntax\n\nThe Swift `switch` statement is highly structured and powerful. If\
    \ you are familiar with other language `switch` statements, it may be new to you,\
    \ so the basic Swift syntax is provided here and will continue in the “Using Enumerations”\
    \ section that follows.\n\nThe basic Swift syntax is shown in Listing [8-9](#A441106_1_En_8_Chapter.html#Par75).\
    \ It is the same as the generic pseudocode in Listing [8-8](#A441106_1_En_8_Chapter.html#Par62)\
    \ but it has a `default` statement. The `default` statement is required in Swift,\
    \ and its interpretation may be different than it is in other languages you are\
    \ used to.\n\nSwift switch statements must be exhaustive. That means that if the\
    \ controlling expression is of a certain type, the `default` statement applies\
    \ to all elements of that type other than those identified in `case` statements.\n\
    \n```\nswitch <#expression#> {\ncase <#value1#>: <#statements#>\ncase <#value2#>:\
    \ <#statements#>\ndefault: <#statements#>\n}\n```\n\nListing 8-9\nBasic Swift\
    \ switch statement\n\nThis means that the controlling expression must have a type\
    \ (and all expressions have a type either implicitly or explicitly). `break` statements\
    \ are not required in Swift: a `case` expression executes and is terminated by\
    \ the next `case` element or by the end of the `switch` statement.\n\nYou can\
    \ have multiple values handled by a single case element in Swift. You simply combine\
    \ the case elements as in:\n\n```\ncase \"result1\", \"result2\":\n```\n\nIn some\
    \ other languages, you might be used to writing it differently; this code won’t\
    \ work in Swift because control doesn’t pass from one case element to the next.\
    \ It is terminated by the next `case` element.\n\n```\ncase \"result1\":\ncase\
    \ \"result2\":\n```\n\nYou can also use a number of other conditions for case\
    \ elements. Two are described in the following sections.\n\n### Using Advanced\
    \ Switch Case Elements: Ranges\n\nListing [8-10](#A441106_1_En_8_Chapter.html#Par86)\
    \ shows the use of a Swift switch using a range. The code begins with the declaration\
    \ of an optional variable (`myUserID`), which is an `Int`.\n\nIt is set to 6 so\
    \ it has a value, but note that if it is not set (that is an unset optional) this\
    \ code will still function properly and not cause an error. It uses optional binding\
    \ to set `userID` (if possible) to the unwrapped value of `myUserID`.\n\nNote:\
    \ There is more on optionals and optional binding in Chapter [9](#A441106_1_En_9_Chapter.html).\n\
    \nThe switch statement now uses `userID` (the unwrapped value of `myUserID`) to\
    \ choose a case statement to execute. In this case, the case is defined using\
    \ a Swift range:\n\n```\n5..<9\n```\n\nThis Swift syntax means the range between\
    \ 5 and 9. Note that there are three characters in the range: 2 periods followed\
    \ by `<`. It is not three characters followed by `<`.\n\n```\nvar myUserID:Int?\n\
    myUserID = 6\nif let userID = myUserID {\n    switch (userID) {\n    case 5..<9:\
    \ print (\"first example:\" + String(userID))\n    default: print (\"not a known\
    \ ID\")\n    }\n}\n```\n\nListing 8-10\nA Swift switch with a range\n\nYou can\
    \ see the code in action in Figure [8-8](#A441106_1_En_8_Chapter.html#Fig8).\n\
    \n![A441106_1_En_8_Fig8_HTML.jpg](A441106_1_En_8_Fig8_HTML.jpg)\n\nFigure 8-8\n\
    Using a range in a Swift switch\n\n### Using Advanced Switch Case Elements: Where\
    \ Clauses\n\nYou can also create compound conditions with `where` in the case\
    \ element, as in the code shown in Listing [8-11](#A441106_1_En_8_Chapter.html#Par91).\n\
    \n```\nvar myUserID:Int?\nmyUserID = 6\nif let userID2 = myUserID {\n    switch\
    \ (userID2) {\n    case 5..<9 where userID2 < 7: print (\"preferred user:\" +\
    \ String(userID2))\n    case 5..<9: print (\"not a preferred user:\" + String(userID2))\n\
    \    default: print (\"not a known ID\")\n    }\n}\n```\n\nListing 8-11\nUsing\
    \ a where clause in a Swift switch\n\nThis code builds on the code shown previously\
    \ in Listing [8-10](#A441106_1_En_8_Chapter.html#Par86). Here, the range condition\
    \ is used twice. The first time, a `where` clause is added to it to refine the\
    \ case condition. The second time there is no `where` clause.\n\nNote that these\
    \ cases are evaluated one at a time in sequence. If you reverse them so that the\
    \ `where` follows the unconditional case as shown in Listing [8-12](#A441106_1_En_8_Chapter.html#Par94),\
    \ the unconditional case will be used and the where clause will never be used.\n\
    \n```\nif let userID2 = myUserID {\n    switch (userID2) {\n    case 5..<9: print\
    \ (\"not a preferred user:\" + String(userID2))\n    case 5..<9 where userID2\
    \ < 7: print (\"preferred user:\" + String(userID2))\n    default: print (\"not\
    \ a known ID\")\n    }\n}\n```\n\nListing 8-12\nReversing where and general cases\
    \ in a switch statement\n\nThis code is shown executing in Figure [8-9](#A441106_1_En_8_Chapter.html#Fig9).\n\
    \n![A441106_1_En_8_Fig9_HTML.jpg](A441106_1_En_8_Fig9_HTML.jpg)\n\nFigure 8-9\n\
    Using a where clause in a Swift switch"
