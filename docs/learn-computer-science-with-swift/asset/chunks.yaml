    ## Handling Data That Is Not There: Swift Optionals


    One of the peskiest issues in computer science is the problem of how to handle
    data that is not there. This is the case when there is missing data or data that
    does not exist for any reason. If you leave the data blank, it may be interpreted
    as a zero if the field is normally numeric. Counting a blank field as zero will
    throw off averages if they are calculated. Of course, you can simply ignore blank
    fields and keep your averages clean, but you then have no way of indicating that
    there is no data for a valid reason. Perhaps the reading on a sensor or gauge
    is missing because the telemetry or power source has failed. If zero is a valid
    reading, then there is no way to distinguish between zero-as-missing and zero-as
    value.


    You can always pick another special number to use to indicate missing data. Whatever
    number you choose can throw off calculations. (Many mainframe computer programs
    used 99 to indicate missing data, including the data for a year.) A year with
    a value 99 was unimagined in the 1960s when such programs were often written.
    In the 1960s when financial institutions were issuing 30-year mortgates and bonds
    that would mature on or after 1999, this problem grew into the Year 2000 problem.


    The only way to indicate missing data is to have some kind of value that indicates
    whether the data is “real” or not. Different languages and systems handle this
    issue in different ways. Swift uses optionals.


    Optionals are written with a question mark; it indicates that the data is of the
    specified type, but it may not exist at all. Thus a declaration for an optional
    `Int` would be written as follows


    ```

    var i: Int?

    ```


    The variable can have any valid integer value; however, it can also have no value.
    That is represented by `nil` as in


    ```

    i = nil

    ```


    You can test to see if a variable is nil or not using code such as this:


    ```

    if i != nil ...

    ```


    In Figure [9-4](#A441106_1_En_9_Chapter.html#Fig4) you see an optional Int variable
    declared. It is not set to anything, so its value is nil (you can see this in
    the sidebar at the right of Figure [9-4](#A441106_1_En_9_Chapter.html#Fig4).


    ![A441106_1_En_9_Fig4_HTML.jpg](A441106_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    Test for an optional value


    You can test to see if it is not nil (line 5) and, if so, print it out. Otherwise,
    you print a message that it is nil.


    If you try to use the optional for any purpose, you will get an error as you see
    in Line 11 of Figure [9-5](#A441106_1_En_9_Chapter.html#Fig5). Most of the time,
    this is generated by the playground or Xcode : it won’t even compile as you see
    in Figure [9-5](#A441106_1_En_9_Chapter.html#Fig5).


    ![A441106_1_En_9_Fig5_HTML.jpg](A441106_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Trying to use a nil


    If you test to see that the value is not nil, then you can go ahead and use it
    as you see in Figure [9-6](#A441106_1_En_9_Chapter.html#Fig6).


    ![A441106_1_En_9_Fig6_HTML.jpg](A441106_1_En_9_Fig6_HTML.jpg)


