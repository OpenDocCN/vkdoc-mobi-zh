- fmt: '# Declarative Programming


    By contrast with imperative programming, declarative programming focuses on the
    results. As a developer, you specify what you want to achieve and it is up to
    the environment (the operating system and other components) to achieve that result.
    Certain constructs such as some advanced functions in Swift are declarative. `SQL`’s
    basic syntax is declarative. (`SQL` is the most common database language in use
    today).


    ## Comparing Imperative And Declarative Programming


    If you want to find all of the buildings on a certain street in a city, you can
    do it either imperatively or declaratively. (The following is an overview. For
    more details, see the descriptions of loops and advanced functions in Chapter
    [4](#A441106_1_En_4_Chapter.html), “Using Algorithms.”)


    For the imperative method, you would loop through every building in the city and
    check to see if it is on the desired street. You would then put these buildings
    aside into a variable or other storage location.


    For the declarative method, you would specify that you want all the buildings
    on a certain street. The operating system and environment would do whatever is
    necessary – probably some kind of loop – but you wouldn’t be involved. You wouldn’t
    have to write that code.


    ## Concurrent Programming


    Concurrent programming and threading allows a program to run on several processors
    or chips at the same time. In order to do this, it is necessary to impose constraints
    on how the code is executed because often the available processors are available
    in different sequences. There is more on concurrency in the section on threads
    in Chapter [10](#A441106_1_En_10_Chapter.html), “Building Components.”


    # 4. Using Algorithms


    Algorithms are one of the key components of computer science, but they go back
    to days long before computers. In “The Miller’s Tale” (1391), Geoffrey Chaucer
    makes reference to “augrim” stones, which would have been stones used in counting
    algorithms, but the term and concept go back several centuries even before Chaucer.
    Simply described, an algorithm is a sequence of actions (usually numeric) that,
    when performed in a certain order, will produce a specific result.


    Such sequences of actions can be written descriptively on paper, but they also
    can be written in code. In either format – on paper or in code – they can be used
    and reused in building apps, programs, modules, and other components of computer
    science.


    They are so ubiquitous in computer science and applications that many people don’t
    even notice them, but it’s important to understand what they are and how they
    can be used. That understanding can help you get the most out of specific algorithms
    and the various techniques for writing and debugging code that are based on algorithms.


    Algorithms can be the building blocks of apps and systems. “Can be” because some
    people would say that data structures are the building blocks, and still others
    would opt for a variety of other building blocks. In reality, a variety of building
    blocks come into play for most apps and systems depending on who the developers
    are and what the system needs to do.


    Algorithms as commonly considered are the sequence of steps referred to at the
    beginning of this chapter. Note that in that broad definition, nowhere does it
    state that a specific language is involved: it’s just a sequence of steps. That
    can be coded in any language in most cases.


    ## Considering the Purpose of Algorithms


    Why do you create an algorithm? Why don’t you just go ahead and write code? The
    core answer is that an algorithm that is clearly described and defined can be
    useful in many contexts. The logic and analysis can be reused.


    It is expensive to write code. Every step of the process from design and analysis
    to coding and testing can be expensive. Often, people focus only on the coding
    part of the task. Experienced developers (and managers!) can attest to the fact
    that written but untested code is not a finished product.


    The first step – design and analysis – is often ignored as people focus on writing
    code and, sometimes (but essentially), testing it. Design and analysis seems not
    to be as real as the code and the testing. However, the key to minimizing the
    costs of coding and testing often lies in the design and analysis. Often a project
    gets well under way without a clear project definition, and, when the lack of
    clarity becomes obvious, the project is in trouble.


    By formalizing the design and analysis, you create a robust project. The cost
    of design and analysis can be spread among many projects (either formally or through
    your own knowledge and experience), but the design and analysis need to be done
    in a rigorous way so that they can be used and reused in the immediate project
    and in others.


    That is where algorithms come into play. They let you formalize your analysis.
    Once that is done, you can reuse the analysis with new or existing code, but you
    don’t have to repeat the analysis. As you gain experience in the world of software
    development, you will come across many algorithms and create many for yourself.
    By having a rigorous definition of an algorithm, its analysis is more easily reusable.


    That is why algorithms are so important in software development: they can help
    you reuse your work (and that of other people) so that you don’t start from scratch
    each time you start a new project.


    ## Creating a Numerology Algorithm


    Bear in mind that algorithms have been around for centuries, and many of them
    predate digital computers. Many well-known algorithms can be used to find prime
    numbers, for example. The example that is presented in this chapter addresses
    a simple issue of numerology. Numerology is a belief in a relationship between
    numbers and events or concepts. Some people think of 7 as a lucky number; others
    think of 13 as unlucky. There are reasons for these connections, but in many cases
    it is unclear if the concept of luck (good or bad) preceded or followed the reasons
    and explanations.


    One particular application of numerology is using letters of the alphabet as numbers
    and adding them up to get a number that represents the name itself. For example,
    if you let the letter A stand for 1, B for 2, and so forth, the name Dan has a
    numeric value of 19 as follows:


    - D = 4

    - A = 1

    - N = 14

    - Total = 19


    The resulting number may itself be lucky or unlucky either on its own or depending
    on the first or last digit (and there are any variations of the interpretation).


    - Converting the letters to numbers also has many variations. One of the most
    common makes the numbers run from 1–10 (perhaps because that makes it easier to
    count on fingers). In the example given here (`Dan`), the result in a 1–10 variation
    would be

    - D = 4

    - A = 1

    - N = 4 (count to 10 and then start over with 1)

    - Total = 9


    What you have here is definitely an algorithm, albeit one with variations. It
    is a sequence of steps:


    - start with converting the letters to numbers one way or another;

    - add the numbers together.


    You can design an app or system based on numerology where one step is “compute
    the numerology number,” and then that step can be done with the algorithm.


    ## Looking Carefully at Algorithms


    With this simple numerology algorithm, you can look at how it can fit into code
    you may write. Three basic concepts in computer science are similar to algorithms
    but with key differences. The algorithm-like concepts are the following:


    - Functions

    - Objects

    - Design patterns


    These often use algorithms in their implementations.


    ### Functions


    Algorithms can be expressed in natural languages like English or in mathematical
    terminology. You can characterize them as abstract or conceptual if you want.
    Comparing them to functions can make both of those concepts clearer.


    Briefly put, a function is an implementation of an algorithm in a specific programming
    language. An algorithm can help you design an app or part of an app, but a function
    can become part of it.'
