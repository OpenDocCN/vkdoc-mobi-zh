    Kernighan, Brian W.; Ritchie, Dennis M. (1978). The C Programming Language (1st
    ed.). Englewood Cliffs, NJ: Prentice Hall. ISBN 0-13-110163-3.


    # 3. Exploring Programming Paradigms


    The snippets of code that you have seen in this book so far are just that - snippets.
    They show a single line of code that does one thing such as set a variable or
    print out a string. That is the way that programming began: one line of code after
    another.


    Before long, the shortcomings of this line-after-line style of writing code became
    apparent as programming backlogs grew and programmers found themselves lost in
    line after line that they and others had written over years. In various ways and
    various places, developers created standards, styles, and other organizational
    structures so that the line-after-line style of programming was easier to write,
    maintain, and understand.


    This chapter provides a very high-level view of some of the most common programming
    paradigms in use today. The paradigms are divided into two groups here. There
    are paradigms that are implemented in languages (that is, if you use a specific
    language, its rules require you to conform to a paradigm even if you don’t realize
    it). There also are paradigms that are implemented in the structure of a specific
    section of code or even an entire app.


