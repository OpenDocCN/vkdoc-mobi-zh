  trans: "\n### 数据所有权\n\n数据所有权涉及多个方面。最基本的是，谁拥有以法律权利发布（或不发布）数据，以及允许（或不允许）通过出版以外的方式访问数据的权利。\n\
    \n在当今世界，这可能没有简单的答案，但我们日益发现数据所有权的具体方面正得到解决。在具有不同法律效力的文档和协议中，人们每次在社交媒体网站上发布或查看数据时，都依赖于关于所有权的陈述。\n\
    \n当数据被用于新的用途时，所有权问题常常会出现。如果你使用一个应用来追踪你的野生动物 sightings，你可能会认为你的数据就是你的数据，仅此而已。然而，如果你的数据与其他人的野生动物\
    \ sightings（也许有数百万人）汇总在一起，那么这些数据就可能具有巨大价值。这种价值对科学家和市场营销人员都可能有用。在其汇总形式下，你发现的一只黑松鼠的数据可能既实用又有价值。\n\
    \n在构建和管理应用时，对数据所有权的意识通常需要被内置到应用中。谁才是数据所有者的问题可能无需解决，但越来越多的应用在设计时就考虑到，一旦数据的价值变得显著，应用能够支持从该价值中获利所需的功能。\n\
    \n实现这些结果的方式并不特别复杂。它们可能简单到确保应用中的数据访问受到某种机制保护，例如密码或其他凭证，以便能够根据身份、付款或其他标准来控制或授予（或拒绝）访问权限。\n\
    \n在很多情况下，应用的数据设计是，不是开启一个管理访问控制的选项，而是需要对数据存储和访问进行重大架构更改才能管理访问控制。\n\n### 数据完整性\n\
    \n无论数据归谁所有，都需要有一个机制来确保数据的完整性。存储的数据本质上是不稳定的，仅仅因为数据从计算机到存储设备再返回的移动过程，是系统开发和集成中的薄弱环节之一。在最简单的情况下，计算机操作与数据存储之间的连接可能会因为连接丢失（或不稳定）而中断。任一设备都可能丢失或断电。\n\
    \n此外，数据移动的过程通常很脆弱。数据最终是一个比特序列，其完整性取决于每个比特的值在存储和传输过程中被准确保存，以及序列同样被保存下来。\n\n在管理数据完整性方面，有三个关键工具：\n\
    \n*   **校验和** 用于帮助维护数据的表示。\n*   **时间戳和其他数据标记** 用于记录对数据的更改。\n*   **版本控制** 用于帮助识别数据的不同版本。\n\
    \n### 使用校验和\n\n为此，开发人员和设计人员有许多可用的策略。最常见和最简单的方法之一是使用校验和这样的机制。在这种方法中，数据的二进制数字（或者更常见的是字节或字符）被视为二进制数字。通过操作（通常是累加）它们，并将结果存储起来。当需要验证数据时，重新累加字节或字符，并将该总和与存储的总和（校验和）进行比较。这种方法——通常通过进一步的运算如除以素数来增强——可以捕捉到常见错误，例如一长串数据中的错误比特。事实上，许多通信协议、设备和标准都允许进行此类检查，并自动重传可能损坏的数据。\n\
    \n对校验和的基本理解（可能只需本段这么详细的了解）是计算机科学从业者工具包的一部分。\n\n### 使用时间戳和其他数据标记\n\n除了比特和字节的物理完整性之外，还需要以某种方式保护数据及其变更的完整性。许多数据库设计者会自动存储数据及其更新的时间戳（日期和时间）。\n\
    \n时间戳通常表示为自某个已知日期以来的时间间隔，并进行存储。有几种常用的参考日期。（`纪元日期` 是一个类似的术语。）\n\n常见的包括：\n\n*  \
    \ **1970 年 1 月 1 日午夜。** 这是 Unix（以及相关系统，如 Linux 和 macOS/iOS）中使用的参考日期。\n*   **2001\
    \ 年 1 月 1 日午夜。** 选择这个日期是为了反映 2001 年是 Mac OS X（现为 macOS）首次发布的年份。\n\n参考日期之前的日期以负值的秒数表示。所表示的时间通常采用协调世界时（UTC），即以前所称的格林威治标准时间（GMT）。因此，这些时间在全球范围内是恒定的。\n\
    \n除了时间戳，通常还有其他数据标记用于标识数据及其变更。除了时间戳，还有一个或多个通用唯一标识符（UUID）。这些通常由操作系统提供。它们被保证在全世界范围内尽可能唯一。它们通常是比较长的字符串，你可以通过操作系统创建；你也可以在它们上面添加你自己的标识符，从而获得特定数据元素的通用唯一标识符。这些在调试时很有帮助。\n\
    \n你会发现有些评论说这些标记占用了宝贵的存储空间，并且创建和解码它们所涉及的计算消耗了宝贵的计算资源。\n\n这些担忧绝对合理，但请记住，随着更强大设备的普及成为常态，它们的意义已经随着时间的推移而降低。\n\
    \n一套常见的数据标记通常作为大多数数据项的一部分进行存储。这些元素因项目而异，但值通常来自以下列表：\n\n*   数据创建的时间戳（首次存储）\n* \
    \  最后修改的时间戳\n*   数据创建的标识\n    1.  用户\n    2.  设备\n    3.  位置\n*   数据修改的标识\n  \
    \  1.  用户\n    2.  设备\n    3.  位置\n*   数据元素的通用唯一标识符。\n*   数据版本。\n\n### 版本控制\n\n\
    无论你多么熟练，经验多么丰富，你的数据存储设计未经修改就能一直用下去的情况是很少见的。可能存在错误，但即使没有，情况也会变化。你可能需要存储不同的数据，而你已经存储的一些数据可能变得无关紧要。\n\
    \n为了处理这类情况，通常为数据格式提供一个标识符——这意味着需要某种标识符来指明正在存储什么数据以及如何存储。一种常见的做法是在数据记录的开头以尽可能简单的形式存储版本标识符。一个简单的二进制数就足以进行版本管理。\n\
    \n如果你这样做，那么当你的应用读取（或写入）数据时，读取或写入的第一件事就是这个数字。一旦它被读取，应用就能知道该记录中还存储了什么，并且可以读取它们。\n\
    \n使用 `Swift` 时，通常的做法是存储版本号，然后跟一个字典（参见第 6 章“处理数据：集合”）。字典非常灵活，因此你可以在运行时确定键是什么，甚至使用版本号来告诉你它们是什么。如果键的含义随版本变化（有时是不可避免的情况），你将拥有解码或编码数据所需的所有数据。\n\
    \n## 数据如何管理\n\n数据管理有两个方面需要考虑：\n\n*   **外部数据**，在何处以及如何管理。\n*   **数据的格式化和结构**。\n"
- fmt: '### Managing External Data


    If data is stored externally, that might be on a connected computer or disk drive
    to which your app has access. More commonly, apps store data in external data
    providers that specialize in providing storage for apps.


    These are special use versions of products such as Dropbox, Google Drive, Box,
    OneDrive, and iCloud. These are geared to users who want basic file-based storage
    for the most part.


    In addition, there are on-demand hosting services such as Amazon Web Services
    (AWS), Microsoft/Azure, Google Cloud Platform, Aliyun, and IBM Bluemix/SoftLayer.
    The difference between these services is that they are geared to use by apps that
    want to directly access data storage rather than working with files. (Note that
    this is a basic overview.)


    Most modern development environments support Internet-centered protocols like
    REST that make it easy to read and write data remotely.


    Even more important, these on-demand hosting services support various types of
    software as a services (SaaS) and storage as a service. If your app suddenly takes
    off and you need to increase your data storage dramatically very quickly, this
    is what they do automatically.


    Their data farms and data centers are located around the world and processing
    can be passed off from one to the other around the globe and around the clock.
    This is the way in which rapidly scalable apps are able to be deployed. From the
    standpoint of the app, the storage is at a single location even though in reality
    it can be widely distributed for redundancy in case of failures and automated
    backups.


    This brings us back to the basic question of where your app data is. In these
    modern architectures, you — and no one — may know where it is.


    ### Formatting and Structuring Data


    Working with on-demand cloud storage means that you can determine the type of
    storage that you use: the service only provides the storage.


    Common storage protocols and formats come in several groups.


    - **Simple and portable.** The most basic formats come originally from spreadsheets.
    They are text-based formats designed for rows and columns of data. The two most
    common are comma-separated values (CSV), text (tab-delimited). The data is character-based.


    - **JSON.** Java Script Object Notation is a character-based format that structures
    data into a hierarchical structure (such as students within a class, which is
    within a school). JSON is a text-based format, so it can be read and written with
    any tools that work with text. See Listing [9-1](#A441106_1_En_9_Chapter.html#Par116)
    and Figure [9-3](#A441106_1_En_9_Chapter.html#Fig3) for examples of using JSON
    with Swift 4.


    - **Property Lists.** Apple has a property list (plist) design pattern that consists
    of items with types of `String`, `Number`, and `Boolean` as well as the collection
    types `Array` and `Dictionary`. These can be combined, so a property list might
    consist of a dictionary that itself contains several arrays and another dictionary.
    As long as all components are compatible plist types (`String`, `Number`, `Boolean`,
    `Array`, and `Dictionary`), all will be well. There are utility functions that
    quickly convert property lists to and from formats that can easily be stored.
    In addition, you can add your own types.


    - **Proprietary formats.** These are the formats that traditionally have been
    used for special purposes in proprietary apps. It is getting to the point where
    people are leery of trapping their data in proprietary formats. More and more,
    wise consumers and managers look for the use of common formats or, if proprietary
    formats are used, the ability to easily import and export data from standard formats.


    - **Dashboards and big data.** Along with concern about trapping data in proprietary
    formats, people are recognizing that they need to combine data that is stored
    in a variety of systems and formats. To that end, dashboards and dashboard tools
    are being developed. They take the data in whatever format it is and visualize
    and synthesize it so that a unified picture can emerge. (Tableau is a popular
    dashboard tool.)


    - **SQL and other databases.** Traditional databases tend to use proprietary formats
    for data storage, but they are unified by their use of SQL as a management and
    query language. The database management system (DBMS) takes the responsibility
    of storing the data, but almost all DBMSs today provide SQL access. In this way,
    Dashboards and SQL serve similar purposes: providing common access to data stored
    in various formats.'
  raw: '### Managing External Data


    If data is stored externally, that might be on a connected computer or disk drive
    to which your app has access. More commonly, apps store data in external data
    providers that specialize in providing storage for apps.


    These are special use versions of products such as Dropbox, Google Drive, Box,
    OneDrive, and iCloud. These are geared to users who want basic file-based storage
    for the most part.


    In addition, there are on-demand hosting services such as Amazon Web Services
    (AWS), Microsoft/Azure, Google Cloud Platform, Aliyun, and IBM Bluemix/SoftLayer.
    The difference between these services is that they are geared to use by apps that
    want to directly access data storage rather than working with files. (Note that
    this is a basic overview.)


    Most modern development environments support Internet-centered protocols like
    REST that make it easy to read and write data remotely.


    Even more important, these on-demand hosting services support various types of
    software as a services (SaaS) and storage as a service. If your app suddenly takes
    off and you need to increase your data storage dramatically very quickly, this
    is what they do automatically.


    Their data farms and data centers are located around the world and processing
    can be passed off from one to the other around the globe and around the clock.
    This is the way in which rapidly scalable apps are able to be deployed. From the
    standpoint of the app, the storage is at a single location even though in reality
    it can be widely distributed for redundancy in case of failures and automated
    backups.


    This bring us back to the basic question of where your app data is. In these modern
    architectures , you — and no one — may know where it is.


    ### Formatting and Structuring Data


    Working with on-demand cloud storage means that you can determine the type of
    storage that you use: the service only provides the storage.


    Common storage protocols and formats come in several groups.


    *   Simple and portable. The most basic formats come originally from spreadsheets.
    They are text-based formats designed for rows and columns of data. The two most
    common are comma-separated values (CSV), text (tab-delimited). The data is character-based.

    *   JSON. Java Script Object Notation is a character-based format that structures
    data into a hierarchical structure (such as students within a class, which is
    within a school). JSON is a text-based format, so it can be read and written with
    any tools that work with text. See Listing [9-1](#A441106_1_En_9_Chapter.html#Par116)
    and Figure [9-3](#A441106_1_En_9_Chapter.html#Fig3) for examples of using JSON
    with Swift 4.

    *   Property Lists. Apple has a property list (plist) design pattern that consists
    of items with types of `String`, `Number`, and `Boolean` as well as the collection
    types `Array` and `Dictionary`. These can be combined, so a property list might
    consist of a dictionary that itself contains several arrays and another dictionary.
    As long as all components are compatible plist types (`String`, `Number`, `Boolean`,
    `Array`, and `Dictionary`), all will be well. There are utility functions that
    quickly convert property lists to and from formats that can easily be stored.
    In addition, you can add your own types.

    *   Proprietary formats. These are the formats that traditionally have been used
    for special purposes in proprietary apps. It is getting to the point where people
    are leery of trapping their data in proprietary formats. More and more, wise consumers
    and managers look for the use of common formats or, if proprietary formats are
    used, the ability to easily import and export data from standard formats.

    *   Dashboards and big data. Along with concern about trapping data in proprietary
    formats, people are recognizing that they need to combine data that is stored
    in a variety of systems and formats. To that end, dashboards and dashboard tools
    are being developed. They take the data in whatever format it is and visualize
    and synthesize it so that a unified picture can emerge. (Tableau is a popular
    dashboard tool.)

    *   SQL and other databases. Traditional databases tend to use proprietary formats
    for data storage, but they are unified by their use of SQL as a management and
    query language. The database management system (DBMS) takes the responsiblity
    of storing the data, but almost all DBMSs today provide SQL access. In this way,
    Dashboards and SQL serve similar purposes: providing common access to data stored
    in various formats .'
  trans: '

    ### 管理外部数据


    如果数据存储在外部，可能位于你的应用有权访问的联网计算机或磁盘驱动器上。更常见的情况是，应用将数据存储在专门为应用提供存储的外部数据提供商处。


    这些是 Dropbox、Google Drive、Box、OneDrive 和 iCloud 等产品的特殊用途版本。它们主要面向需要基本文件存储的用户。


    此外，还有按需托管服务，例如 Amazon Web Services (AWS)、Microsoft/Azure、Google Cloud Platform、阿里云和
    IBM Bluemix/SoftLayer。这些服务之间的区别在于，它们面向的是希望直接访问数据存储而非处理文件的应用。（请注意，这只是基础概述。）


    大多数现代开发环境都支持 REST 等以互联网为中心的协议，这些协议使得远程读写数据变得简单。


    更重要的是，这些按需托管服务支持各种类型的软件即服务（SaaS）和存储即服务。如果你的应用突然流行起来，需要迅速大幅增加数据存储容量，这正是它们能自动处理的情况。


    它们的数据农场和数据中心遍布全球，处理任务可以全天候在不同地点之间转移。这正是可快速扩展应用得以部署的方式。从应用的角度来看，存储位于单一位置，尽管实际上数据可能为了冗余备份和自动容错而广泛分布。


    这让我们回到了应用数据存储位置这个基本问题。在这种现代架构中，包括你在内，可能没有人知道数据具体位于何处。


    ### 格式化与构建数据


    使用按需云存储意味着你可以决定所使用的存储类型：该服务仅提供存储本身。


    常见的存储协议和格式分为几类。


    - **简单且可移植。** 最基本的格式最初来自电子表格。它们是基于文本的格式，专为行列式数据设计。最常见的两种是逗号分隔值（CSV）和制表符分隔文本。数据是基于字符的。


    - **JSON。** JavaScript 对象表示法是一种基于字符的格式，将数据结构化为层级结构（例如学校中的班级，班级中的学生）。JSON 是一种基于文本的格式，因此可以使用任何处理文本的工具进行读写。有关在
    Swift 4 中使用 JSON 的示例，请参阅清单 9-1 和图 9-3。


    - **属性列表。** Apple 有一种属性列表（plist）设计模式，包含 `String`、`Number`、`Boolean` 类型的条目，以及集合类型
    `Array` 和 `Dictionary`。这些类型可以组合，因此属性列表可能由一个字典组成，该字典本身包含多个数组和另一个字典。只要所有组件都是兼容的
    plist 类型（`String`、`Number`、`Boolean`、`Array` 和 `Dictionary`），就没问题。有实用函数可以快速将属性列表与易于存储的格式进行相互转换。此外，你还可以添加自定义类型。


    - **专有格式。** 传统上，这些格式用于专有应用中的特殊目的。如今，人们越来越警惕将其数据困在专有格式中。明智的消费者和管理者越来越多地倾向于使用通用格式，或者如果需要使用专有格式，则希望能够轻松地从标准格式导入和导出数据。


    - **仪表盘与大数据。** 除了担心数据被困在专有格式之外，人们也认识到需要整合存储在不同系统和格式中的数据。为此，仪表盘和仪表盘工具正在被开发出来。它们接收任何格式的数据，并将其可视化和综合，以便形成统一视图。（Tableau
    是一种流行的仪表盘工具。）


    - **SQL 与其他数据库。** 传统数据库通常使用专有格式进行数据存储，但通过使用 SQL 作为管理和查询语言而实现了统一。数据库管理系统（DBMS）负责存储数据，但如今几乎所有的
    DBMS 都提供 SQL 访问接口。通过这种方式，仪表盘和 SQL 发挥着相似的作用：为存储在各种格式中的数据提供通用访问。

