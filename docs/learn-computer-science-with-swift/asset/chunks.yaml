    列表 4-1

    数字命理字典

    ```


    要访问特定键的值，你可以使用如下代码：


    ```

    numbers["y"]

    ```


    在数组中，每个索引都有一个数据元素（你不能访问超出数组边界的索引，但除此之外可以访问任何元素）。在字典中，当你添加或删除数据时，键不会改变。这意味着键"y"可能没有关联的值。因此，当你在字典中访问一个键时，Swift
    会返回一个可能为空的**可选值**。你可以测试它是否为空，或者使用 `?` 或 `!` 对其进行解包。（更多信息请参见第 7 章中的“处理不存在的数据（可选值）”一节。）


    字典结构可以帮助你解答大小写字母的问题。尽管键必须是唯一的，但值不必是唯一的。因此，你可以创建一个字典，其键同时包含大写和小写字母，如列表 4-2 所示。


