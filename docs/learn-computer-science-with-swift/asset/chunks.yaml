    ![A441106_1_En_12_Fig8a_HTML.jpg](A441106_1_En_12_Fig8a_HTML.jpg)![A441106_1_En_12_Fig8b_HTML.jpg](A441106_1_En_12_Fig8b_HTML.jpg)


    Figure 12-8


    Build and run the app


    ### Adding the Code and Interface


    Once you are satisfied that a template works properly, you can add your modifications.
    As you saw in Chapter [11](#A441106_1_En_11_Chapter.html), you can add interface
    elements to your app in the files and folders created as part of your project,
    not the folder called base.lproj. This folder will be in most of your projects.
    It contains the interface elements. Today, those are built using storyboards.
    (In the past they were built with `xib` and `nib` files.)


    The base.lproj folder consolidates all of your interface elements in one place
    so that you can easily localize them.


    The storyboards give you a graphical tool to draw your interface and connect it
    to your code. This section provides a very brief overview for you: there is more
    in the Xcode documentation and at developer.apple.com. There is also a lot of
    information on the Web, but make certain that it is recent: there is a lot of
    old code out there.


    If you click on a storyboard in Xcode, it will open and you will be able to edit
    your interface. There already is an interface (that’s what you see when you run
    the template as shown in Figure [12-8](#A441106_1_En_12_Chapter.html#Fig8)). Inside
    the main storyboard, you’ll see a schematic view of the interface as you see in
    Figure [12-9](#A441106_1_En_12_Chapter.html#Fig9). (This view includes some elements
    that have been added — they were added in Chapter [11](#A441106_1_En_11_Chapter.html)
