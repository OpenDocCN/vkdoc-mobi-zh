    # 元组的使用


    上一节中描述的数字、字符串和字符是当今大多数计算机语言的常见类型。大多数语言在发展中都有了一些变体，Swift 也包含了其中许多变体。


    跳过基本数字、字符串和字符类型的众多变体，我们可以看看一种在现代类型，它在 Swift 以及其他类似 Python 和 C# 的语言中都以相似的方式实现。**元组**
    是一种由多个类型组成的序列，这些类型共同构成一个单一类型。


    例如，你可以声明一个元组，这是一种由其他类型创建的类型形式。你可以使用 `typealias` 为已有类型提供别名，而这个已有类型可以是你用元组创建的类型。实际上，使用
    `typealias` 为元组命名可能是 `typealias` 最常见的用法。


    元组基本上是用括号括起来的一系列类型。它用于类型注解或类型别名中。例如，你可以创建一个包含两个 `Double` 类型的元组来表示矩形的尺寸（长度和宽度）。你可以像下面代码这样给它一个名为
    `dimensions` 的 `typealias`：


    ```

    typealias dimensions (Double, Double)

    var myRectangle:dimensions = (2.0, 3.0)

    ```


    你不必非得使用 `typealias`。你可以像下面代码这样非常简单地创建和使用一个`元组`：


    ```

    var myRectangle = (2.0, 3.0)

    ```


    除非你想在其他地方引用它，否则没有必要用 `typealias` 来命名一个`元组`类型。


    元组非常有用，因为它们将多个项组合到一个可寻址的符号中（如果有的话，就是 `typealias` 的名称）。大多数语言中的函数通常只能返回一个单项结果。许多人会让函数返回一个集合（数组、字典或集合），这实际上达到了返回多个结果的效果。（实际上，字典常被用来在一个单项中返回多个结果。）


    元组中的项**按顺序**标识：你不能重新排列它们。默认情况下，它们从零开始编号。图 7-4 展示了如何创建和使用元组。请注意第三行之后的查看器中，元组的两个元素前面显示了它们的默认名称——`.0`
    和 `.1`。


    声明元组时，你可以为各项提供名称。在图 7-4 中，请注意第 7 行中的项被命名为：


    ```

    typealias dimensionsLabeled = (width: Double, height: Double)

    ```


    你可以通过使用变量或常量的名称，后跟点语法和每个项的名称来引用元组中的项，如第 9 行所示：


    ```

    print (myLabeledRectangle.0, myLabeledRectangle.height)

    ```


    即使你为元组中的项提供了名称，你仍然可以通过其默认编号来引用它。


    注意：元组元素的名称不是带引号的字符串。


    ![A441106_1_En_7_Fig4_HTML.jpg](img/A441106_1_En_7_Fig4_HTML.jpg)


    **图 7-4** 声明和使用元组


    # 总结


    本章为你概述了用于数据的类型。你看到了所有语言和操作系统通用的类型（数字、字符和字符串），以及你可以自行创建的类型，例如元组。


    使用类型——甚至是动态类型——可以使你的代码在开发和维护中更安全。


    在掌握了数据方面之后，是时候继续了解操作系统和应用程序如何实际处理你所声明和存储的数据了。这是下一章的主题。


    # 8. 管理控制流：条件语句、Switch 语句和枚举


    在第五章中，你了解了循环的基础知识，但管理控制流不仅仅是通过循环重复代码。本章将探讨代码中其他主要的控制流方面。这些存在于大多数语言和操作系统中。


    ## 接下来是什么？


    应用中的基本控制流是从一行代码执行到下一行代码。一行代码就是一个单独的语句，尽管它可能包含许多步骤——也许是因为这行代码会导致一个函数或方法运行。此外，在
    Swift 中，多行代码可以放在一行物理代码上。与许多其他语言一样，当一行代码中放置了多条语句时，每条语句后都会加上分号。此外，为了提高可读性，一行逻辑代码可以跨越多行物理代码。尽管如此，我们提到“一行代码”时，会将其视作一个物理和逻辑实体，尽管它们并非完全等同。


    无论格式如何，应用中的每一行代码都会被执行，并且大多数情况下，在它执行完毕后，下一行代码会被执行。如果没有更多代码行，应用就会终止。


    这是自计算机诞生以来应用和程序的基本模式。值得注意的是，这种模式有一个重要的变体，在依赖用户交互的应用中尤其普遍。在这些情况下，应用开始运行，一旦开始运行，它就会等待一个外部事件传递给它（该事件可能是用户操作）。当接收到事件时，应用会处理它，然后等待下一个事件。像这样的程序可能只有在计算机关闭或重启时才会终止。


    在 iOS 设备上，你可以专门终止等待事件的应用。你可以在控制中心看到它们，如图 8-1 所示。只需将应用向上拖到窗口顶部即可将其终止。


    ![A441106_1_En_8_Fig1_HTML.jpg](img/A441106_1_En_8_Fig1_HTML.jpg)


    **图 8-1** 在 iOS 11 及更高版本的控制中心中查看正在运行的应用


    在应用内部，对“执行下一行代码”这一序列的主要例外情况如下：


    *   **跳转 (Go to)**。你可以显式跳转到下一行之外的其他代码行。正如你将看到的，这通常不推荐，但它仍然是一种常用的控制管理技术。

    *   **Switch 语句**。你可以执行多行代码（或代码段）中的其中一段，而不是执行下一行。当你想要执行多个操作之一（例如显示当前温度、显示下周日历、登出或任何其他操作）时，这是一种很有用的技术。

    *   **条件语句**。当某个条件为真（或不为真）时，你可以执行某行代码。

    *   **循环**。你可以重复执行一行或多行代码，如你在第五章中所见。循环模式有多种变体——例如，你可以重复代码直到某个条件为真或不为真。

