    \ { } as was discussed previously in this chapter (“Using Compound Statements”).\n\
    \n### While and Repeat-While Loops\n\nThere are two parts to a `while` loop: the\
    \ condition that is true or false and the statement to be repeated. The while\
    \ loop behaves slightly differently depending on whether the condition or the\
    \ statement appears first.\n\nIf the condition is false when the while statement\
    \ begins execution, the difference becomes clear.\n\nFor a condition that is false\
    \ initially, the following loop will not execute. The code is executed as it would\
    \ be in a natural language. Because the while condition isn’t true, it won’t execute.\
    \ When the condition becomes false, the while loop terminates.\n\nNote\n\nIf the\
    \ condition never becomes false, the loop becomes an infinite loop and will never\
    \ stop. If the logic of your app is such that the condition doesn’t change, you\
    \ don’t want a `while` loop: You want an `if` statement.\n\n```\nwhile  {\n\n\
    }\n```\n\nThe other version of the while statement always executes at least once.\
    \ Here is the basic code:\n\n```\nrepeat {\n\n} while \n```\n\nThis loop will\
    \ always execute at least once.\n\n### For-in Loops\n\nThese repetitions rely\
    \ on collections (arrays, dictionaries, or sets). The main for-in loops rely on\
    \ iterations and enumerations."
  trans: "\n# 使用枚举类型\n\n正如 Swift 的 `switch` 语句建立在许多语言中已有的 `switch` 语句之上，Swift 的枚举（`enums`）同样也建立在其他语言的枚举基础之上。枚举类型（通常简称为\
    \ `enums`）正如其名：一种通过枚举其值来构建的类型。\n\n枚举类型最常见的例子是 `Suit`，它具有 `Clubs`、`Spades`、`Hearts`\
    \ 和 `Diamonds` 这些值。在许多编程语言（特别是 C 语言）中，枚举类型的顺序很重要，因为一个整数值可以被推断出或分配给每个类型值。因此，在 `Clubs`、`Spades`、`Hearts`\
    \ 和 `Diamonds` 这个例子中，其默认值如下：\n\n```\nClubs = 0\nSpades = 1\nHearts = 2\nDiamonds\
    \ = 3\n```\n\n你也可以按任何你想要的顺序显式地赋值。`enum` 的选项（case）不是字符串，因此它们不需要引号。你可以使用 `enum`\
    \ 选项来访问它们的整数值。这意味着你可以在上面的例子中使用 `enum` 选项 `Hearts` 作为 2。\n\n这种方式只在一个方向上有效：你不能使用\
    \ 2 来表示名为 `Suits` 的 `enum` 中的 `Hearts` 选项。不过，你可以编写一个小的函数来将整数转换为 `Suits` 的名称。这种反向转换（从整数到\
    \ `enum` 选项名称）的一个原因是：`enum` 的整数在命名空间中不唯一：`enum` 选项 `Spades` 的值可以是 1，而另一个具有 `Flowers`\
    \ 选项的 `enum`，其 `Geraniums` 选项的值也可以是 1。\n\n因此，许多人主要将 `enums` 视为使用整数来表示文本值（选项名称）的方式，以创建有时被称为自文档化的代码。（另一些人则认为这是个玩笑。这是一个存在争议的领域。）\n\
    \n## Swift 处理枚举类型的方法\n\nSwift 将枚举类型提升为一等类型，而不仅仅是类型或文档的快捷方式。在 Swift 中，选项名称（与其他语言一样）不是带引号的字符串。在某些情况下会使用自动赋值的概念，但你可以为每个选项分配一个`原始值`。该原始值可以是整数（如大多数语言），但也可以是字符串、字符或数字——甚至可以是浮点数。\n\
    \nSwift 的 `enum` 风格是 `enum` 名称首字母大写，选项值使用小写，如下所示。\n\n```\nenum Suit {\n    case\
    \ club\n    case spade\n    case heart\n    case diamond\n}\n```\n\n## 将 Swift\
    \ 枚举与 Switch 语句结合使用\n\n由于 Swift 中的 `enum` 比许多其他语言结构更严谨，因此它们非常适合 Swift 的特性，例如要求\
    \ `switch` 语句的 `case` 分支必须是穷尽的。你可以使用 `enum` 来赋值，如下面的代码行所示，该行将 `Suit` 这个 `enum`\
    \ 的 `club` 选项赋值给一个名为 `cardSuit` 的常量：\n\n```\nlet cardSuit = Suit.club\n```\n\n\
    然后你可以开始创建一个使用 `cardSuit` 的 `switch` 语句。如果你尝试闭合这个 `switch` 语句，将会收到一个错误，如图 8-10\
    \ 所示。\n\n![A441106_1_En_8_Fig10_HTML.jpg](img/A441106_1_En_8_Fig10_HTML.jpg)\n\
    图 8-10 Swift 标记出非穷尽性的 switch 语句\n\n这个错误信息之所以可能，是因为 Swift 会跟踪每个 `enum` 的选项。如果你遵照提示信息并输入其他选项，错误就会消失，如图\
    \ 8-11 所示。\n\n![A441106_1_En_8_Fig11_HTML.jpg](img/A441106_1_En_8_Fig11_HTML.jpg)\n\
    图 8-11 使用枚举创建穷尽性的 switch 语句\n\n除了为 `switch` 语句的每个选项打印一条消息外，你可以利用 `enum` 是成熟类型这一事实，更普遍地引用它们，而不是像图\
    \ 8-11 或代码清单 8-13 中那样打印出选项元素的名称。\n\n```\nswitch cardSuit {\ndefault: print(cardSuit)\n\
    }\n```\n代码清单 8-13 简化 switch 语句\n\n在代码清单 8-13 中，所有控制流都经过 default 分支，你甚至根本不需要这个\
    \ `switch`。你可以用一行代码实现相同的结果：\n\n![A441106_1_En_8_Fig12_HTML.jpg](img/A441106_1_En_8_Fig12_HTML.jpg)\n\
    图 8-12.\n\n```\nprint(cardSuit)\n```\n\n你可以设置一个 `enum` 的原始值。如前所述，原始值可以是数字（整数或浮点数）、字符、字符串或其他值。你只需在\
    \ `enum` 声明中添加它，如代码清单 8-14 所示。\n\n如果你这样做了，那么你可以通过访问 `enum` 的 `rawValue` 属性来检索它，例如：\n\
    \n```\ncardSuit.rawValue\n```\n\n本章前面给出的例子在图 8-13 中进行了更新，以展示如何打印原始值。你可以出于任何目的访问原始值——不一定是为了打印。你可以使用数值进行计算，也可以为选项名称添加有意义的字符串。\n\
    \n![A441106_1_En_8_Fig13_HTML.jpg](img/A441106_1_En_8_Fig13_HTML.jpg)\n图 8-13\
    \ 显示枚举的原始值\n\n```\nenum Suit: Double {\n    case club = 15.3\n    case spade =\
    \ 32.6\n    case heart = 0.0\n    case diamond = -42.3\n}\nlet cardSuit = Suit.spade\n\
    print(cardSuit)\nprint(cardSuit.rawValue)\n```\n代码清单 8-14 在枚举中使用原始值\n\n# 探索重复和步进\n\
    \n大多数编程语言支持多种重复运算符。你在第 5 章“管理控制流：重复”中看到了基础知识，但这里是对常见重复变体的概述。（所有这些在 Swift 中都是可用的，并且，在偶尔修改后，在你可能使用的大多数其他语言中也是如此。）\n\
    \n有两种基本类型的重复循环：`while` 循环和 `for` 循环。所有这些循环都会重复执行一条语句或复合语句。`while` 循环依赖条件语句进行控制，而\
    \ `for` 循环则依赖数据结构进行控制。\n\n> **注意：** 重复是对一条语句或复合语句的重复执行。为简化文本，本节提及语句，但请放心，你可以将单个语句替换为用花括号\
    \ `{ }` 括起来的复合语句，正如本章前面（“使用复合语句”）所讨论的那样。\n\n## While 和 Repeat-While 循环\n\n`while`\
    \ 循环有两个部分：一个为真或假的条件，以及要重复执行的语句。`while` 循环的行为略有不同，具体取决于条件是出现在语句之前还是之后。\n\n如果 `while`\
    \ 语句开始执行时条件为假，那么差异就变得明显了。对于一个初始为假的条件，以下循环不会执行。代码的执行方式与自然语言中的方式相同。因为 `while` 的条件不为真，所以它不会执行。当条件变为假时，`while`\
    \ 循环终止。\n\n> **注意：** 如果条件永远不会变为假，循环就会变成无限循环，永不停止。如果你的应用程序逻辑使得条件不会改变，那么你需要的不是 `while`\
    \ 循环，而是 `if` 语句。\n\n```\nwhile <condition> {\n    <statements>\n}\n```\n\n`while`\
    \ 语句的另一个版本至少会执行一次。以下是基本代码：\n\n```\nrepeat {\n    <statements>\n} while <condition>\n\
    ```\n\n这个循环总是至少执行一次。\n\n## For-In 循环\n\n这些重复依赖集合（数组、字典或集合）。主要的 `for-in` 循环依赖迭代和枚举。\n"
- fmt: '#### Iterating Over a Collection


    The simplest version simply loops through the collection (this is called iteration).
    Listing [8-15](#A441106_1_En_8_Chapter.html#Par131) shows three simple collections
    (an array, a dictionary, and a set) and how you can loop through each one with
    the same syntax.


    ```

    let myArray = ["dog", 4.6] as [Any]

    let myDictionary = ["name": "Rover", "weight": 20.5] as [String : Any]

    let mySet = ["name", "weight"]

    for arrayItem in myArray {

    print (arrayItem)

    }

    for dictionaryItem in myDictionary {

    print (dictionaryItem)

    }

    for setElement in mySet {

    print (setElement)

    }

    Listing 8-15

    Using for-in loops for collections

    ```


    You can see this in the playground shown in Figure [8-14](#A441106_1_En_8_Chapter.html#Fig14).


    ![A441106_1_En_8_Fig14_HTML.jpg](A441106_1_En_8_Fig14_HTML.jpg)


    Figure 8-14


    Explore loops in a playground


    It is very common that you just want to deal with each item in a collection in
    turn, and this does that job.


    #### Looping Through Indexes (Arrays) and Keys (Dictionaries)


    In the case of arrays and dictionaries, sometimes you need not only the value
    of the item but its index (in an array) and its key (in a dictionary).


    > **Note:** Because sets are unordered, there are no keys or indexes to use, so
    all you can do is iterate through the set elements as described in the previous
    section.


    There is a difference between iterating over elements of a collection as described
    in the previous section and enumerating those elements. You will see that in this
    section where an array is enumerated. That enumeration provides each element of
    the array along with its index. (Remember that array indexes are part of the array
    structure itself and not part of the data.)


    The built-in `enumerated` function provides tuples for each element of the array.
    Each tuple consists of the array index and the value. If you call `enumerated()`
    on an array, you will see those tuples as shown in Figure [8-15](#A441106_1_En_8_Chapter.html#Fig15).
    Note that the data used previously has been changed to include a third item (`cat`)
    in the array. The data viewer in the playground shows the array with its three
    elements. If you open it with the disclosure triangle, you’ll see the three indexes
    and their associated values.


    ![A441106_1_En_8_Fig15_HTML.jpg](A441106_1_En_8_Fig15_HTML.jpg)


    Figure 8-15


    Results of `enumerated()` on an array


    If you want to use the enumerated values, you can display them with code such
    as the following. First, the `enumerated` function is called on the `myArray`
    array. Then, a `for-in` loop operates on the `myArray.enumerated()` result. The
    two values in each tuple are printed out.


    ```

    for (index, item) in myArray.enumerated() {

    print ("index: " + String(index) + " item:" + String(describing: item))

    }

    ```


    The tuple names that you use don’t matter because it’s the order of the items
    in the tuple that matter. If you want to change the code like this, it will still
    work as well (as long as you update the `print` statement to match the names you’re
    giving to the tuple values).


    It is important to note that because you are dealing with values that are not
    all strings, you can take the Fix-It suggestions you’ll get in Xcode to convert
    the numbers to strings. They rely on the `String(describing:)` function as you
    see in the code in this section.


    To do a comparable enumeration with a dictionary, you don’t need to call `enumerated`
    because the dictionary with its key-value pairs contains the keys as well as the
    values with its data. Thus, you can just name the tuple values as in:


    ```

    for (key, value) in myDictionary {

    print ("key:" + key + " value:" + String(describing: value))

    }

    ```


    The code in this section is shown in Listing [8-16](#A441106_1_En_8_Chapter.html#Par145).


    ![A441106_1_En_8_Fig16_HTML.jpg](A441106_1_En_8_Fig16_HTML.jpg)


    Figure 8-16


    Showing keys and indexes for dictionaries and arrays


    ```

    let myArray = ["dog", 4.6] as [Any]

    let myDictionary = ["name": "Rover", "weight": 20.5] as [String : Any]

    for (index, item) in myArray.enumerated() {

    print ("index: " + String(index) + " item:" + String(describing: item))

    }

    for (key, value) in myDictionary {

    print ("key:" + key + " value:" + String(describing: value))

    }

    Listing 8-16

    ```


    ### Using Strides


    In addition to the built-in repetitions (`for-in` and `while`), the Swift Standard
    Library includes several that are frequently used in these situations. You have
    already seen the `enumerated()` function, and it is worth exploring others. One
    Standard Library function you may find useful is the `stride(from:to:by:)` function.
    This function can be adopted by types that adopt the `Strideable` protocol. You
    don’t have to worry much about what that entails: just remember the list of types
    that are `Strideable`:


    - `CGFloat`

    - `Decimal`

    - `Double`

    - `Float`

    - `Float80`


    When dealing with arrays of those types, you can apply the two `stride` functions:


    ```

    stride (from: to: by:)

    stride (from: through: by:)

    ```


    The difference between them is whether the limit is included in the stride (`through`)
    or not (`to`). With `stride`, you can do some of the C-style looping that you
    may be used to (specifically, you can look not just from and to a value but using
    steps rather than increments of one).


    ## Summary


    This chapter goes into some basic computer science principles that are common
    to many languages. In two of the topics discussed (enumerations and switch statements),
    you see how Swift extends common functionality and also makes common features
    more rigorously defined and used.


    Having looked at data and types as well as control flow, you have many of the
    basics of computer science at hand. The next step is to move on to storing and
    retrieving data. After all, without those features, users have to start from scratch
    each time they run an app.'
