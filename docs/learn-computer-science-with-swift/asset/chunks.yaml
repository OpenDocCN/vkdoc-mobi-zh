- fmt: "### Storing Data at Runtime\n\nWhere data is stored at runtime becomes a critical\
    \ issue in designing operating systems and compilers. It is largely — but not\
    \ totally — handled for you behind the scenes. Because it is not totally handled\
    \ for you, you need to know the basic concepts of runtime storage, and that is\
    \ described in this section. You'll also see how it all fits together so that\
    \ you as a developer can provide the functionality and responsiveness that users\
    \ expect from modern software and development techniques.\n\nIn the first days\
    \ of computers (mainframe computers in the 1940s), one program ran at a time.\
    \ The entire computer was dedicated to running that program. All of its resources\
    \ (storage, communication channels, and printers) were devoted to the program\
    \ that was running. Among the resources devoted to that single program were the\
    \ computer itself and its operators. If you wanted to run a program in most environments,\
    \ you made an appointment. It was a far cry from picking up an iPhone and tapping\
    \ an app; these appointments were often scheduled for a time slot sometime in\
    \ the future. If your project was not a high priority, your time slot might be\
    \ 2:30 a.m. next Thursday.\n\nThis type of operation made a number of things much\
    \ easier than they are in today's world. For one thing, with the entire computer\
    \ available to a single program, that meant all of its memory was dedicated to\
    \ that program with only a fairly small piece of that memory devoted to overhead\
    \ and maintenance of the computer (although the billing could be done manually\
    \ on cards or pages in a loose-leaf binder).\n\nNow that people expect to run\
    \ multiple apps at the same time on a mobile device, it's impossible to dedicate\
    \ all of the device's memory to a single app. People wouldn't stand for that.\
    \ \"What do you mean I can't watch a movie while I make a phone call and design\
    \ a poster! I paid extra for 256 gigs of storage! Where did it go? I'm going to\
    \ take my iPhone to an Apple Genius Bar and have them open it up to verify that\
    \ someone didn't cheat me on my gigs.\"\n\nIn order to make the most of the memory\
    \ available in any device (this goes back decades to the beginnings of time sharing\
    \ in the 1960s), multiple programs could run at the same time so that as resources\
    \ like printers or data storage devices were needed the program could be set aside\
    \ with all its data until the device was ready. Throughput was faster even though\
    \ there was time required to swap programs and data in and out. This is the same\
    \ basic model that we use today (this is a very basic overview).\n\nPrograms began\
    \ to be structured in such a way that a discrete set of code could execute from\
    \ start to finish with the data that it needed. When that set of code was completed,\
    \ it and its data were simply discarded — this is not the swapping in and out\
    \ of programs and data to maximize the use of resources. Rather, it is a separate\
    \ type of requesting, using, and then discarding memory. Both of these processes\
    \ are necessary to make the most of computers and their resources.\n\n### Stacks\
    \ and Queues\n\nThe word `stack` is used frequently in computer science. It is\
    \ used in its simple everyday sense of a pile of things (often a stack of paper,\
    \ but sometimes a stack of bricks or other objects). As is the case with everyday\
    \ stacks, you add items to the stack by placing them on top. The easiest way of\
    \ taking items off a stack is to take the topmost item. In computer science, this\
    \ is referred to as a last in-first out stack (sometimes referred to as `LIFO`).\n\
    \nWith a stack, no matter how many items are in the stack, it's really only the\
    \ top one (the last in/first out item) that needs to be accessed. The action of\
    \ adding items to the top of a stack and removing them from the top of a stack\
    \ is called `pushing` (pushing a new item onto the top of a stack) and `popping`\
    \ (removing the top item from the top of a stack).\n\nThe order of items in a\
    \ stack is important.\n\nA related concept to stacks is the concepts of queues.\
    \ That, too, is an ordered list of items, and you can also add items to the top\
    \ of a queue. However, with a queue, it is not the top item (the last added) that\
    \ is the first to be removed. Instead, with a queue you add items to the top (as\
    \ in a stack), but you remove items from the bottom. This is a last in-last out\
    \ (`LILO`) structure. You see this type of queue in action in many cases every\
    \ day. In a supply cabinet, you may store items in such a way that you use the\
    \ oldest items first.\n\nThe order of items in a queue is just as important as\
    \ in a stack.\n\n> **Note**  \n> The following is a simplified overview of memory\
    \ management designed to help you understand the basic principles. Modern computers\
    \ have significant enhancements and optimizations beyond these basics.\n\nInside\
    \ the computer as an app runs, the data that is required for a section of code\
    \ (a function or procedure in many cases, but this applies to any section of code),\
    \ is pushed onto a stack. This means that as the function or procedure starts\
    \ to run, memory storage for each of the variables needed by the code is set aside\
    \ for the lifetime of the code. All of the data is located together. When the\
    \ section of code is finished, all of the data set aside for the variables can\
    \ be released to the system. This is called cutting back the stack, and it is\
    \ a critical way of reusing the memory of a computer.\n\nThis way of optimizing\
    \ memory use relies on being able to identify the memory locations needed for\
    \ the operation of a section of code. When that code starts to run, whatever memory\
    \ will be needed for its variables is set aside (allocated) even if the variables\
    \ are not yet in use. This assures that the code can run to completion without\
    \ running out of memory."
  raw: '### Storing Data at Runtime


    Where data is stored at runtime becomes a critical issue in designing operating
    systems and compilers. It is largely — but not totally — handled for you behind
    the scenes. Because it is not totally handled for you, you need to know the basic
    concepts of runtime storage, and that is described in this section. You’ll also
    see how it all fits together so that you as a developer can provide the functionality
    and responsiveness that users expect from modern software and development techniques.


    In the first days of computers (mainframe computers in the 1940s), one program
    ran at a time. The entire computer was dedicated to running that program. All
    of its resources (storage, communication channels, and printers) were devoted
    to the program that was running. Among the resources devoted to that single program
    were the computer itself and its operators. If you wanted to run a program in
    most environments, you made an appointment. It was a far cry from picking up an
    iPhone and tapping an app; these appointments were often scheduled for a time
    slot sometime in the future. If your project was not a high priority, your time
    slot might be 2:30 a.m. next Thursday.


    This type of operation made a number of things much easier than they are in today’s
    world. For one thing, with the entire computer available to a single program,
    that meant all of its memory was dedicated to that program with only a fairly
    small piece of that memory devoted to overhead and maintenance of the computer
    (although the billing could be done manually on cards or pages in a loose-leaf
    binder).


    Now that people expect to run multiple apps at the same time on a mobile device,
    it’s impossible to dedicate all of the device’s memory to a single app. People
    wouldn’t stand for that. “What do you mean I can’t watch a movie while I make
    a phone call and design a poster! I paid extra for 256 gigs of storage! Where
    did it go? I’m going to take my iPhone to an Apple Genius Bar and have them open
    it up to verify that someone didn’t cheat me on my gigs.”


    In order to make the most of the memory available in any device (this goes back
    decades to the beginnings of time sharing in the 1960s), multiple programs could
    run at the same time so that as resources like printers or data storage devices
    were needed the program could be set aside with all its data until the device
    was ready. Throughput was faster even though there was time required to swap programs
    and data in and out. This is the same basic model that we use today (this is a
    very basic overview).


    Programs began to be structured in such a way that a discrete set of code could
    execute from start to finish with the data that it needed. When that set of code
    was completed, it and its data were simply discarded — this is not the swapping
    in and out of programs and data to maximize the use of resources. Rather, it is
    a separate type of requesting, using, and then discarding memory. Both of these
    processes are necessary to make the most of computers and their resources .


    ### Stacks and Queues


    The word stack is used frequently in computer science. It is used in its simple
    everyday sense of a pile of things (often a stack of paper, but sometimes a stack
    of bricks or other objects). As is the case with everyday stacks, you add items
    to the stack by placing them on top. The easiest way of taking items off a stack
    is to take the topmost item. In computer science, this is referred to as a last
    in-first out stack (sometimes referred to as LIFO).


    With a stack, no matter how many items are in the stack, it’s really only the
    top one (the last in/first out item) that needs to be accessed. The action of
    adding items to the top of a stack and removing them from the top of a stack is
    called pushing (pushing a new item onto the top of a stack) and popping (removing
    the top item from the top of a stack).


    The order of items in a stack is important.


    A related concept to stacks is the concepts of queues. That, too, is an ordered
    list of items, and you can also add items to the top of a queue. However, with
    a queue, it is not the top item (the last added) that is the first to be removed.
    Instead, with a queue you add items to the top (as in a stack), but you remove
    items from the bottom. This is a last in-last out (LILO) structure. You see this
    type of queue in action in many cases every day. In a supply cabinet, you may
    store items in such a way that you use the oldest items first.


    The order of items in a queue is just as important as in a stack.


    Note


    The following is a simplified overview of memory management designed to help you
    understand the basic principles. Modern computers have significant enhancements
    and optimizations beyond these basics.


    Inside the computer as an app runs, the data that is required for a section of
    code (a function or procedure in many cases, but this applies to any section of
    code), is pushed onto a stack. This means that as the function or procedure starts
    to run, memory storage for each of the variables needed by the code is set aside
    for the lifetime of the code. All of the data is located together. When the section
    of code is finished, all of the data set aside for the variables can be released
    to the system. This is called cutting back the stack, and it is a critical way
    of reusing the memory of a computer.


    This way of optimizing memory use relies on being able to identify the memory
    locations needed for the operation of a section of code. When that code starts
    to run, whatever memory will be needed for its variables is set aside (allocated)
    even if the variables are not yet in use. This assures that the code can run to
    completion without running out of memory .'
  trans: "\n### 运行时数据存储\n\n数据在运行时存储的位置，成为了设计操作系统和编译器时的关键问题。在很大程度上——但并非完全——这会在幕后为你处理。由于并非完全自动处理，你需要了解运行时存储的基本概念，本节将对此进行描述。你还会看到这些概念如何整合在一起，从而让你作为开发者能够提供用户从现代软件和开发技术中所期望的功能和响应速度。\n\
    \n在计算机的早期时代（20 世纪 40 年代的大型机），一次只运行一个程序。整个计算机都专用于运行该程序。其所有资源（存储、通信通道和打印机）都服务于正在运行的程序。在这些专用于单个程序的资源中，还包括计算机本身及其操作员。在大多数环境下，如果你想运行一个程序，需要预约。这与拿起\
    \ iPhone 点开一个应用相去甚远；这些预约通常安排在未来某个时间段。如果你的项目优先级不高，你的时间段可能定在下周四凌晨 2:30。\n\n这种操作模式使得许多事情比当今世界要简单得多。首先，由于整台计算机都可供单个程序使用，这意味着其所有内存都专用于该程序，只有相当小的一部分内存用于计算机的开销和维护（尽管计费可以手动记录在卡片或活页夹的页面上）。\n\
    \n如今，人们期望在移动设备上同时运行多个应用，因此不可能将设备的所有内存都专用于单个应用。用户不会容忍这种情况。“你说我打电话和设计海报的时候不能看电影？我可是为\
    \ 256G 存储多付了钱的！内存都去哪儿了？我得把 iPhone 拿到苹果天才吧去，让他们打开看看，是不是有人在内存上骗了我。”\n\n为了充分利用任何设备中的可用内存（这可以追溯到几十年前，即\
    \ 20 世纪 60 年代分时技术的开端），可以同时运行多个程序，这样当需要打印机或数据存储设备等资源时，该程序及其所有数据可以被搁置一旁，直到设备就绪。尽管将程序和数据换入换出需要一些时间，但整体吞吐量却更快了。这就是我们今天仍然使用的基本模型（这是一个非常基础的概述）。\n\
    \n程序开始被构建成这样一种方式：一组离散的代码可以从头到尾地使用其所需的数据执行。当这组代码执行完毕后，它及其数据就会被直接丢弃——这与为了最大化资源利用率而进行的程序和数据的换入换出不同。相反，这是一种独立的请求、使用然后丢弃内存的方式。这两种过程对于充分利用计算机及其资源都是必要的。\n\
    \n### 栈与队列\n\n`stack`（栈）这个词在计算机科学中经常被使用。它用的是其日常简单的含义，即一堆东西（通常是一叠纸，但有时是一堆砖块或其他物体）。就像日常生活中的堆叠一样，你通过将物品放在顶部来添加到栈中。从栈中取出物品最简单的方法是取走最顶部的那个。在计算机科学中，这被称为后进先出栈（有时称为`LIFO`）。\n\
    \n对于栈来说，无论栈中有多少个元素，实际上只需要访问最顶部的元素（即后进先出的那个）。将元素添加到栈顶和从栈顶移除元素的操作分别称为`压栈`（将一个元素压入栈顶）和`弹栈`（从栈顶移除最顶部的元素）。\n\
    \n栈中元素的顺序很重要。\n\n与栈相关的一个概念是队列。队列也是一个有序的元素列表，你也可以将元素添加到队列的顶部。然而，在队列中，最先被移除的并不是顶部元素（即最后添加的那个）。相反，在队列中，你像在栈中一样将元素添加到顶部，但从底部移除元素。这是一种后进后出（`LILO`）结构。你每天在很多场景中都能看到这种队列的实际应用。例如，在物料柜中，你可能以先使用旧物品的方式来存放物品。\n\
    \n队列中元素的顺序与栈中的一样重要。\n\n> **注意**  \n> 以下是对内存管理的简化概述，旨在帮助你理解基本原理。现代计算机在这些基础之上有显著的增强和优化。\n\
    \n在应用程序运行时，计算机内部会将一段代码（通常是函数或过程，但这适用于任何代码段）所需的数据压入栈中。这意味着当函数或过程开始运行时，代码所需的每个变量的内存存储会在该代码的生命周期内被预留出来。所有这些数据都存放在一起。当这段代码执行完毕后，为变量预留的所有数据都可以释放回系统。这被称为回缩栈，它是重用计算机内存的关键方式。\n\
    \n这种优化内存使用的方式依赖于能够识别执行某段代码所需的内存位置。当该代码开始运行时，其变量所需的任何内存都会被预留（分配），即使这些变量尚未被使用。这确保了代码能够运行完成而不会耗尽内存。\n"
