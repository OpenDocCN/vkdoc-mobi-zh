  trans: "\n### 声明与创建数组\n\n在 Swift 这类语言中，变量在使用前必须先声明。（这与 PHP 等语言不同，在 PHP 中你可以随用随建变量。）\n\
    \n数组与 Swift 中的其他符号并无区别：使用前必须先声明。变量声明包括其名称以及一个修饰符，该修饰符决定变量是可修改的（`var`）还是不可修改的（`let`）。\n\
    \n由于数组是类型化的，通常你会连同其类型一起声明。有两种语法形式可供使用。\n\n第一种方法是直接声明数组类型，如下所示：\n\n```\nArray\n\
    ```\n\n你也可以使用如下语法来声明一个包含名称和类型的数组变量：\n\n```\nvar intArray:[Int]\n```\n\n这是一个普通的声明；冒号后的类型是一个\
    \ `Int` 类型的数组。\n\n这仅仅是声明。如果你尝试使用它，将会收到一条错误信息，提示它尚未初始化。请记住，创建和使用变量或常量有两个步骤：声明之后必须进行初始化。\n\
    \n你可以像在 Swift 中初始化类实例或其他元素那样初始化数组。只需在名称后添加 `()` 即可。以下代码将初始化数组：\n\n```\nintArray\
    \ = [Int]()\n```\n\n你可以在 Swift Playground 中声明、初始化并打印数组，如图 6-1 所示。\n\n![A441106_1_En_6_Fig1_HTML.jpg](img/A441106_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1\n\n声明并初始化一个数组\n\n数组的元素用方括号括起来。在图 6-1 中，你可以看到该数组为空。它是一对空方括号。加上额外空格后，数组看起来是这样的：\n\
    \n```\n[    ]\n```\n\n你可以使用以下语法将数组的声明和初始化合并：\n\n```\nvar intArray2 = [Int]()\n\
    ```\n\n图 6-2 展示了这一语法在实践中的应用。如你所见，你又创建了一个空数组。（窗口底部的调试区域是查看结果是否相同的最佳位置。）\n\n![A441106_1_En_6_Fig2_HTML.jpg](img/A441106_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2\n\n在一行代码中声明并初始化一个数组\n\n这种风格称为初始化器语法。\n\n另一种声明和创建数组的方式是使用数组字面量：即直接使用数组中的字面量元素。在这种风格中，你需要声明数组及其类型：\n\
    \n```\nvar intArray3 : [Int]\n```\n\n然后，要创建数组，只需将元素列在方括号内：\n\n```\nvar intArray3\
    \ : [Int] = [2, 3, 5, 7, 11]\n```\n\n你可以在图 6-3 中看到这一点。\n\n![A441106_1_En_6_Fig3_HTML.jpg](img/A441106_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3\n\n使用字面量声明并初始化一个数组\n\n当你使用字面量声明数组时，Swift 可以根据你提供的字面量推断数组的类型。\n\n### 修改\
    \ `var` 数组\n\n有三种方式可以修改 `var` 数组：\n\n-   你可以修改数组结构本身。也就是说，可以添加或删除数组中的元素。\n-  \
    \ 你可以修改元素本身，使其包含不同的数据值，但元素数量保持不变。\n-   你也可以同时进行这两种操作。\n\n在某些语言中，这两种修改方式被视为不同的操作。在\
    \ iOS 的 `UITableViewController` 类以及使用它的应用中可以看到这一点。\n\n图 6-4 展示了 `UITableViewController`\
    \ 的默认行为。左侧是一个表格视图，行按分区分组；每个分区都有一个灰色背景的标题。视图顶部导航栏的右侧有一个“编辑”按钮。如果点击“编辑”按钮，视图将切换到编辑模式（具体来说，它会调用\
    \ `setEditing` 函数，你在该函数中实际处理应用及其数据进出编辑模式的转换）。在编辑模式下（如右侧所示），每行左侧都有一个红色按钮，允许你删除该行。开发者可以在右上角添加一个“+”按钮来添加行。在某些使用场景中，行可以重新排列。\n\
    \n> **注意**  \n> 本节中的截图来自 App Store 上的 Nonprofit Risk App，网址为 [`https://itunes.apple.com/us/app/np-risk/id1262903630?ls=1&mt=8`](https://itunes.apple.com/us/app/np-risk/id1262903630?ls=1&mt=8)。\n\
    \n所有这些操作都会修改数组及其结构：它们不会影响数组的数据。不过，如果某一行被删除，其数据也会被删除，因此在那种情况下数据会被修改。这种界面的典型实现提供了对数组本身的编辑功能，如图\
    \ 6-4 所示，左侧为表格视图，右侧为编辑模式下的表格视图。如果你点击列表中的某个项目，则会跳转到该项目的数据详情视图，如图 6-5 所示。请注意，详情视图的右上角有一个新的“编辑”按钮。这控制着详情视图的编辑——即数组元素的内容。\n\
    \n![A441106_1_En_6_Fig5_HTML.jpg](img/A441106_1_En_6_Fig5_HTML.jpg)\n\n图 6-5\n\
    \n编辑数组元素的详细数据\n\n![A441106_1_En_6_Fig4_HTML.jpg](img/A441106_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4\n\n（左）表格视图和（右）编辑模式下的表格视图\n\n### 多维数组\n\n数组通常具有多个维度。二维数组可以非常轻松地处理电子表格中的数据。这样的数组有两个索引——一个用于行，一个用于列。在大多数语言中，数组可以拥有多个维度。\n\
    \n例如，你可以有一个表示客户交易的数组。第一个维度可能是客户数据（例如姓名和地址）。下一个维度可能是个别交易（包含日期和金额）。然后可能还有付款的维度。在\
    \ Swift 中你无法做到这一点，而且当你开始思考这个问题时，可能会发现管理多个维度很困难。\n\n在任何语言中，这种多维数组很快就会变得笨拙不堪。我们有其他数据结构可以更轻松地处理这类数据。在\
    \ Swift 中，你会找到其他类型的集合，例如集合和字典，它们可以将数据组织成特定的集合类型。Swift 数组的一维特性允许它本身包含其他数组、字典或集合；该维度也可以包含元组，元组是在单个实体中组织数据的另一种方式，并且可以存储在数组中。（元组将在下一章中讨论。）\n\
    \n因此，在了解 Swift 语言的其他特性之前，不要因为 Swift 数组的一维特性而感到困扰。\n"
- fmt: '### Finding Array Elements


    Each element in an array can be accessed using its index. The first item in an
    array is `array[0]` — remember arrays start at zero. However, as you insert and
    delete elements, the indexes change so that the array has no gaps. This means
    that what is index number 52 today may be index 35 tomorrow (and may not even
    be there the next day).


    Swift (like a number of other languages) solves this issue for you by letting
    you locate an array element by its content rather than by its index. The code
    is shown in Figure [6-6](#A441106_1_En_6_Chapter.html#Fig6).


    ![A441106_1_En_6_Fig6_HTML.jpg](A441106_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    Finding an array element by value


    You create an array with its values using


    ```

    let demoArray = [13, 29, 11, -9]

    ```


    In Figure [6-6](#A441106_1_En_6_Chapter.html#Fig6), you can see that you can print
    the entire array with


    ```

    print (demoArray)

    ```


    You can get the third element (index 2) with


    ```

    print (demoArray[2])

    ```


    You can use the method `index(of:)` to find an element. Notice in the code completion
    of Figure [6-6](#A441106_1_En_6_Chapter.html#Fig6) that code completion expects
    an `Int` as the argument. Nowhere did you declare the array as an array of `Int`s;
    the parser has inferred that from the values you entered.


    If you enter the values shown in Figure [6-7](#A441106_1_En_6_Chapter.html#Fig7),
    a `Double` is inferred.


    ![A441106_1_En_6_Fig7_HTML.jpg](A441106_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    Swift infers an array of Doubles when appropriate


    When you complete the code, the playground runs as you see in Figure [6-8](#A441106_1_En_6_Chapter.html#Fig8).


    ![A441106_1_En_6_Fig8_HTML.jpg](A441106_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Create and print arrays in a Swift playground Tip


    `index(of:)` and the code completion can be very useful. Just start typing as
    shown in Figures [6-6](#A441106_1_En_6_Chapter.html#Fig6) and [6-7](#A441106_1_En_6_Chapter.html#Fig7)
    to see how Swift has handled type inference. If you happened to create an array
    of `Int` based on your initial data and you want to eventually add a float or
    `Double`, declare it with the type as in `let demoArray:Double = [3, 29, 1, -9]`.
    This will create an array of `Double`s even though the initial values are `Int`s.


    ### Adding and Deleting Array Elements


    Adding and deleting array elements after you have first created it is not complicated.
    The easiest way to get started is with code completion. Begin by checking that
    your array’s declaration is `var` so that you can modify it. (It might be `let`
    if you declared it with constants.)


    If you think that the method you need is `add`, code completion will balk. It’s
    `append`, and if you try that, you’ll see that it works, and, as you see in Figure
    [6-9](#A441106_1_En_6_Chapter.html#Fig9), an `Int` is expected.


    ![A441106_1_En_6_Fig9_HTML.jpg](A441106_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    Start to append a new array element


    After you append the new array element, the playground runs as you see in Figure
    [6-10](#A441106_1_En_6_Chapter.html#Fig10).


    ![A441106_1_En_6_Fig10_HTML.jpg](A441106_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    Append elements to a `var` array


    You’ll notice that appending adds elements at the end of the array. There are
    a variety of additional methods in Swift that you can use. It’s easy to use code
    completion and just scroll down to find relevant methods as you see in Figure
    [6-11](#A441106_1_En_6_Chapter.html#Fig11).


    ![A441106_1_En_6_Fig11_HTML.jpg](A441106_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    Use code completion to see other array methods


    Of course, you can also use Help ➤ API reference in Xcode or developer.apple.com.
    Note that you can see methods to insert new elements at various places in the
    array or to remove elements. These are details of Swift and other languages, so
    you can explore the documentation. The array principles are the same across languages
    and operating systems. The only major difference is that some languages do not
    provide as many built-in methods and functions to manipulate arrays. (Furthermore,
    some people prefer to write the array manipulation code themselves although that
    means more errors may be introduced into the code.)


    Deleting an array element is simpler than adding one because you don’t have to
    worry about keeping track of the new element and where it belongs in the array.
    To delete an array element, just locate it either by index or with one of the
    functions discussed in the previous section. To remove an element, use one of
    the following methods of an array:


    ```

    arrayName.remove(at: Int)

    arrayName.removeFirst()

    arrayName.removeLast()

    arrayName.removeFirst(n: Int) // to remove several first elements

    arrayName.removeLast(n:Int) // to remove several last elements

    ```


    You can use `index(of:Int)` to find the index and then use `remove(at: Int)`.


    ### Looping Through an Array


    Often you want to access each of the elements of an array in turn. You may want
    to display the names of each student in a class, you may want to find the highest
    and lowest temperatures in a 24-hour period, you may want to do anything else
    that involves looping through each element of an array.


    Note


    Given an array of 10,000 random numbers (which you may have already created),
    you might want to calculate the average of the first 5,000 numbers and another
    average for the last 5,000 numbers. The closer those averages are, the more random
    the numbers are if they are all created as being between the same upper and lower
    bounds (such as 0 and 1.0). This is discussed in Chapter [8](#A441106_1_En_8_Chapter.html),
    “Managing Control Flow.”


    ## Using Sets


    Sets are collections — subclasses of `Collection` just like arrays. They are the
    same sets that you encounter in set theory (a branch of mathematical logic). If
    you haven’t read the previous section on arrays, you might want to at least skim
    it because many of the set concepts are the same as for arrays. (In fact, if you
    look at the documentation, you will find that many set and array methods (like
    dictionary methods you will see later in this chapter) are actually methods of
    `Collection`.


    Sets have one critical feature that is the reason they are used in so many places
    in Swift apps. Yes, you can do various set theory operations on sets (unions,
    intersections, joins, and so forth — see “Working with Sets” later in this section.)
    What matters to many developers is that sets can be used in property lists (see
    Chapter [9](#A441106_1_En_9_Chapter.html), “Storing Data and Sharing Data”). You
    can place a collection of various elements, most commonly instances of classes
    or structures, into a set. At that point, the set can be used in a property list
    and it will be written to and read from a property list or other Cocoa/Cocoa Touch
    structures without any further coding on your part. So if you want to forget about
    set theory and manipulating sets but use them simply as a fast way to structure
    data to be stored and retrieved, you will not be alone. This is one of the most-used
    aspects of sets.


    Other features of sets discussed in this section are the following:


    *   Basic Set Terminology

    *   Identifying and Finding Set Elements

    *   Declaring and Creating Swift Sets and Types

    *   Adding and Deleting Set Elements

    *   Working with Sets


    ### Basic Set Terminology


    Sets are collections of elements that have no order to them. They are unique.
    You cannot have two elements of a set that have the same value. In an array, you
    can have multiple elements with the same value because they also have unique indexes
    at any given moment (remember that those indexes can change as elements are added
    to or removed from the array, but at any given moment, the index is the way to
    access an array element regardless of its value).'
