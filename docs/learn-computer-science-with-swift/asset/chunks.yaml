  trans: '

    ### 查找数组元素


    数组中的每个元素都可以通过其索引来访问。数组中的第一项是 `array[0]`——请记住数组索引从零开始。然而，当你插入和删除元素时，索引会随之变化，以确保数组中没有间隙。这意味着今天索引为
    52 的元素，明天可能变成索引为 35（甚至后天可能就不存在了）。


    Swift（与许多其他语言一样）通过让你根据元素的内容而不是索引来定位数组元素，从而为你解决了这个问题。代码如图 6-6 所示。


    ![A441106_1_En_6_Fig6_HTML.jpg](img/A441106_1_En_6_Fig6_HTML.jpg)


    图 6-6


    根据值查找数组元素


    你可以使用以下代码创建一个包含值的数组：


    ```

    let demoArray = [13, 29, 11, -9]

    ```


    在图 6-6 中，你可以看到如何打印整个数组：


    ```

    print (demoArray)

    ```


    你可以通过以下方式获取第三个元素（索引为 2）：


    ```

    print (demoArray[2])

    ```


    你可以使用 `index(of:)` 方法来查找元素。请注意图 6-6 中的代码补全提示，它期望一个 `Int` 作为参数。你从未声明过该数组为 `Int`
    类型数组；解析器是根据你输入的值推断出来的。


    如果你输入图 6-7 所示的值，则会推断出 `Double` 类型。


    ![A441106_1_En_6_Fig7_HTML.jpg](img/A441106_1_En_6_Fig7_HTML.jpg)


    图 6-7


    Swift 在适当情况下会推断出 Double 数组


    当你完成代码后，Playground 的运行结果如图 6-8 所示。


    ![A441106_1_En_6_Fig8_HTML.jpg](img/A441106_1_En_6_Fig8_HTML.jpg)


    图 6-8


    在 Swift Playground 中创建并打印数组 提示


    `index(of:)` 方法和代码补全功能非常有用。只需像图 6-6 和 6-7 所示那样开始输入，就能看到 Swift 是如何处理类型推断的。如果你碰巧基于初始数据创建了一个
    `Int` 数组，并且最终想要添加一个浮点数或 `Double` 值，可以用类型声明，例如 `let demoArray:Double = [3, 29,
    1, -9]`。即使初始值是 `Int` 类型，这也会创建一个 `Double` 类型的数组。


    ### 添加和删除数组元素


    在创建数组后添加和删除元素并不复杂。最简单的方法是使用代码补全功能。首先，请确保数组声明为 `var`，以便你可以修改它（如果你用常量声明，它可能是 `let`）。


    如果你认为需要的方法是 `add`，代码补全会拒绝。正确的方法是 `append`，如果你尝试这个方法，你会发现它有效，并且，如图 6-9 所示，预期会传入一个
    `Int`。


    ![A441106_1_En_6_Fig9_HTML.jpg](img/A441106_1_En_6_Fig9_HTML.jpg)


    图 6-9


    开始追加新的数组元素


    追加新数组元素后，Playground 的运行结果如图 6-10 所示。


    ![A441106_1_En_6_Fig10_HTML.jpg](img/A441106_1_En_6_Fig10_HTML.jpg)


    图 6-10


    向 `var` 数组追加元素


    你可能会注意到，追加操作是在数组的末尾添加元素。Swift 中还有多种其他方法可供使用。使用代码补全功能并向下滚动查找相关方法非常方便，如图 6-11 所示。


    ![A441106_1_En_6_Fig11_HTML.jpg](img/A441106_1_En_6_Fig11_HTML.jpg)


    图 6-11


    使用代码补全功能查看其他数组方法


    当然，你也可以在 Xcode 中使用“帮助 ➤ API 参考”或访问 `developer.apple.com`。请注意，你可以看到在数组的不同位置插入新元素或删除元素的方法。这些是
    Swift 和其他语言的细节，因此你可以自行查阅文档。数组的原则在各种语言和操作系统中都是相同的。唯一的主要区别在于，有些语言没有提供那么多内置的方法和函数来操作数组。（此外，有些人更喜欢自己编写数组操作代码，尽管这可能会在代码中引入更多错误。）


    删除数组元素比添加更简单，因为你无需担心跟踪新元素及其在数组中的位置。要删除一个数组元素，只需通过索引或使用上一节讨论的函数之一来定位它。要移除元素，可以使用数组的以下方法之一：


    ```

    arrayName.remove(at: Int)

    arrayName.removeFirst()

    arrayName.removeLast()

    arrayName.removeFirst(n: Int) // 移除前几个元素

    arrayName.removeLast(n:Int) // 移除后几个元素

    ```


    你可以使用 `index(of:Int)` 来查找索引，然后使用 `remove(at: Int)`。


    ### 遍历数组


    通常你需要依次访问数组中的每个元素。你可能想要显示班级中每个学生的姓名，想要找出 24 小时内最高和最低的温度，或者想要执行任何涉及遍历数组中每个元素的操作。


    注意


    对于一个包含 10,000 个随机数的数组（你可能已经创建好了），你可能想要计算前 5,000 个数的平均值，以及后 5,000 个数的另一个平均值。如果这些数是在相同的上下限（例如
    0 和 1.0）之间生成的，那么这两个平均值越接近，这些数就越随机。这一点将在第 8 章“管理控制流”中讨论。


    ## 使用集合


    集合是集合类型——就像数组一样，是 `Collection` 的子类。它们与你在线代逻辑学分支——集合论中遇到的集合是同一个概念。如果你还没有阅读上一节关于数组的内容，你可能至少需要浏览一下，因为集合的许多概念与数组相同。（实际上，如果你查看文档，你会发现许多集合和数组的方法（比如你将在本章后面看到的字典方法）实际上是
    `Collection` 的方法。）


    集合有一个关键特性，这也是它们在 Swift 应用程序中被广泛使用的原因。是的，你可以对集合执行各种集合论运算（如并集、交集、连接等——请参阅本节后面的“使用集合”）。但对许多开发者来说，更重要的是，集合可以在属性列表中使用（参见第
    9 章“存储数据与共享数据”）。你可以将各种元素的集合（最常见的是类或结构体的实例）放入一个集合中。此时，该集合可以在属性列表中使用，并且无需你进行任何额外的编码，它就会被写入属性列表或其他
    Cocoa/Cocoa Touch 结构中，或从中读取。因此，如果你想抛开集合论和集合操作，仅仅将它们用作一种快速构建数据结构以便存储和检索的方式，你并不孤单。这是集合最常用的方面之一。


    本节讨论的集合其他特性包括：


    *   集合基本术语

    *   识别和查找集合元素

    *   声明和创建 Swift 集合与类型

    *   添加和删除集合元素

    *   使用集合


    ### 集合基本术语


    集合是无序的元素的集合。它们是唯一的。你不能在一个集合中拥有两个值相同的元素。在数组中，你可以拥有多个值相同的元素，因为在任何给定时刻它们都有唯一的索引（请记住，随着元素的添加或删除，这些索引可能会发生变化，但在任何给定时刻，无论值是什么，索引都是访问数组元素的方式）。

