  raw: '# 11. Using Events to Guide Actions


    Computers have been getting smaller for years. Not only have their components
    shrunk from vacuum tubes to transistors, there are now entire systems on a single
    computer chip.


    Users control apps. We launch them; interact with the interfaces; and, when we’re
    finished, we shut them down. Sometimes as in the case of iOS, when we don’t use
    them for a while, their data is automatically moved to a safe space to be ready
    for when we want to use them again. They may never (or rarely) end. They just
    wait for the next user input.


    That’s not how things work now, and it hasn’t really been true for decades, but
    mental images take a long time to fade away. More and more, apps are controlled
    by other apps and even by other computers. When we set an alarm on a computer,
    another app keeps track of the time and then triggers something on the computer.


    You may say that that’s just delayed human interaction, but as you start to think
    of how apps are controlled today, you will find more and more controls that are
    far removed from human intervention. In general, when you schedule something (perhaps
    using Siri) using a phrase such as “remind me at…,” you’re describing something
    that a computer can set in motion. Whether your “at” is based on time or location,
    it’s easy for a computer to figure out when “at” is true.


    When your request to Siri is along the lines of “remind me when…” chances are
    that there’s a more complex process involved in figuring out if “when” is true.
    (Exclude the special case of “when it is 3:15,” which is basically an “at” request.)


    What is important about these “when” events is that they come as a surprise to
    the person who sets them in motion. If you asked to be reminded at 3:15, you may
    expect that reminder (and maybe even a pre-reminder at 3:00). But “when” events
    may come with no expectation on the part of the user. You’ll see how that works
    later in this chapter when looking at notifications in Swift and Cocoa.


    ## Where Blocks Fit In


    As you saw in Chapter [10](#A441106_1_En_10_Chapter.html), “Building Components,”
    you can modify the normal sequence of command processing by using blocks. The
    snippet of code here summarizes a common use of blocks. As noted in this chapter,
    this is common code use in `UIDocumentBrowserViewController` and many other places.
    The heart of the code is the `document.open(completionHandler:)` function call.
    It opens the document, and, when the document is opened, the completion handler
    is called and executed so that you can inform the user that the document has or
    hasn’t been successfully opened and take any other necessary actions (such as
    updating the user interface with the contents of the document).


    ```

    let document = UIDocument (fileURL: documentURL)

    // instantiate UIDocument

    document.open (completionHandler: { (success) in

    if success {

    // show document

    } else {

    print ("no success opening document")

    } // else

    } // end of block

    ) // end of document.open parameters

    ```


    What is important to remember is that although there is a pause between the call
    to `open` and the execution of the closure (either the `success` branch or the
    `else` branch), that sequence is set in the initial code that sets up the block.
    Unless the code in the block does something unusual, that block will be the code
    that `opens` calls after attempting to open the document.


    ## Using Actions and Messaging for Managing Flow Control Summary


    It is commonly the case that you want to implement a different type of managing
    the control flow rather than just waiting to move on to the next step in the predefined
    sequence. That is where messaging comes into play. Messaging lets you dynamically
    change what is going to be executed — not just when it happens as you can do with
    completion handlers and closures.


    Messaging lets you send some kind of message to a receiver that then acts on it.
    Looking at the `open` code that uses a closure, consider the case in which you
    do not want to specify what happens when the document opens or doesn’t. A messaging
    structure lets you send a message to a recipient that will then decide what to
    do about it. Messaging is used extensively in modern apps for a variety of reasons,
    one of which is that it helps in building maintainable apps because they don’t
    have to retain all the logical linkages. In the `open` example, if you want to
    impost a limit of a maximum of three open documents at a time, you need to know
    that every `open` statement must obey that limit both in original coding as well
    as in maintenance. (It will be very easy to forget to check on that limit when
    you implement code to open a new type of document.) These issues can be avoided
    by implementing a generalized opening section of code, but often when you are
    retrofitting or maintaining code, you don’t control how every piece of it is already
    working. Being able to post a notification that something has happened and letting
    another part of the app unknown at the time of writing handle it is simpler. And
    that’s where notifications come into play. Here is a concrete example.


    Note


    Messaging is widely used today. It is at the heart of microkernel architectures
    for operating systems, and it is key to Cocoa and Cocoa Touch frameworks. Some
    other frameworks and development tools use different approaches and terminology,
    but this is what you will find in Cocoa and Swift.


    ## Passing a Button Press/Tap/Click On to… Somewhere


    In this example, you’ll see how to implement a button that does something that
    is not known when you write the button management code. This is an overview of
    the notification architecture. It introduces you to some of the tools in Xcode,
    the integrated development environment (IDE) used for all Apple tools, but the
    details of using Xcode are described in the following chapter so treat this section
    as a preview that focuses on notifications.'
  trans: "\n# 11. 使用事件引导操作\n\n计算机的尺寸多年来一直在缩小。其组件不仅从真空管缩小到晶体管，如今单个计算机芯片上甚至可以集成整个系统。\n\
    \n用户控制着应用程序。我们启动它们，与界面交互，用完后再关闭它们。有时，就像在 iOS 中一样，当我们一段时间不使用它们时，它们的数据会自动移到一个安全的空间，准备在我们再次需要时使用。它们可能永远（或极少）终止，只是等待下一次用户输入。\n\
    \n现实并非如此，几十年来也并非完全如此，但思维定势需要很长时间才能消退。应用程序越来越多地受到其他应用程序甚至其他计算机的控制。当我们在计算机上设置闹钟时，另一个应用程序会跟踪时间，然后在计算机上触发某些操作。\n\
    \n你可能会说这仅仅是延迟了人的交互，但当你开始思考当今应用程序是如何被控制时，你会发现越来越多的控制已经远离了人的干预。一般来说，当你使用“在……时提醒我”这样的短语（也许是通过\
    \ Siri）来安排某件事时，你描述的是一个计算机可以启动的动作。无论你的“在……”是基于时间还是位置，计算机很容易判断“在……”的条件是否为真。\n\n\
    当你对 Siri 的请求是“当……时提醒我”时，判断“当……”的条件是否为真可能涉及一个更复杂的过程。（排除像“当时间是 3:15 时”这种特殊情况，这基本上是一个“在……”的请求。）\n\
    \n这些“当……”事件的重要之处在于，它们对发起该事件的人来说是出乎意料的。如果你请求在 3:15 被提醒，你可能会预料到那个提醒（甚至可能是在 3:00\
    \ 的预提醒）。但“当……”事件可能完全出乎用户的预料。你将在本章后面研究 Swift 和 Cocoa 中的通知时看到其工作原理。\n\n## 代码块的作用\n\
    \n如第 10 章“构建组件”所示，你可以通过使用代码块来修改正常的命令处理顺序。这里的代码片段总结了代码块的一种常见用法。如本章所述，这是 `UIDocumentBrowserViewController`\
    \ 和许多其他地方常见的代码用法。代码的核心是 `document.open(completionHandler:)` 函数调用。它打开文档，当文档打开后，完成处理程序会被调用并执行，这样你就可以通知用户文档是否成功打开，并执行任何其他必要的操作（例如，用文档内容更新用户界面）。\n\
    \n```\nlet document = UIDocument (fileURL: documentURL)\n// 实例化 UIDocument\ndocument.open\
    \ (completionHandler: { (success) in\nif success {\n// 显示文档\n} else {\nprint (\"\
    打开文档失败\")\n} // else\n} // 代码块结束\n) // document.open 参数结束\n```\n\n重要的是要记住，尽管在调用\
    \ `open` 和执行闭包（无论是 `success` 分支还是 `else` 分支）之间存在暂停，但该序列是在初始代码中设置代码块时就已确定的。除非代码块中的代码执行了一些异常操作，否则该代码块就是\
    \ `open` 在尝试打开文档后要调用的代码。\n\n## 使用操作和消息传递管理流程控制：总结\n\n通常情况下，你希望实现一种不同类型的管理控制流的方式，而不仅仅是等待然后执行预定义序列中的下一步。这就是消息传递发挥作用的地方。消息传递允许你动态地改变将要执行的内容——而不仅仅是像使用完成处理程序和闭包那样改变其执行时机。\n\
    \n消息传递允许你向接收者发送某种消息，然后接收者根据该消息采取行动。回顾一下使用闭包的 `open` 代码，考虑一种情况，即你不想指定文档打开或未打开时会发生什么。消息传递结构允许你向接收者发送一条消息，由接收者决定如何处理它。现代应用程序中广泛使用消息传递，原因有多种，其中之一是它有助于构建可维护的应用程序，因为应用程序无需保留所有的逻辑联系。在\
    \ `open` 示例中，如果你想强制限制一次最多只能打开三个文档，你需要确保每个 `open` 语句在原始编码和维护过程中都遵守该限制。（当你实现打开一种新类型文档的代码时，很容易忘记检查这个限制。）这些问题可以通过实现一个通用的打开代码部分来避免，但通常在改造或维护代码时，你无法控制每个部分已经如何工作。能够发布一个通知，告知某事已发生，并让编写时未知的应用程序的另一部分来处理它，会更简单。这就是通知发挥作用的地方。这里有一个具体的例子。\n\
    \n> **注意**\n> \n> 消息传递如今被广泛使用。它是操作系统微内核架构的核心，也是 Cocoa 和 Cocoa Touch 框架的关键。其他一些框架和开发工具使用了不同的方法和术语，但你在\
    \ Cocoa 和 Swift 中会遇到的就是这种方式。\n\n## 将按钮按下/轻触/点击传递给……某个地方\n\n在这个例子中，你将看到如何实现一个按钮，该按钮执行的操作在你编写按钮管理代码时是未知的。这是通知架构的概述。它向你介绍了\
    \ Xcode 中的一些工具，Xcode 是用于所有 Apple 工具的集成开发环境（IDE），但使用 Xcode 的细节将在下一章中描述，因此请将本节视为一个侧重于通知的预览。\n"
- fmt: '### Implement a Button with Known Action


    To start with, here is the common case of implementing a button that does something
    that you know about and implement together with the button. This example starts
    from the Tabbed App starter template build into Xcode. If you create an app based
    on it, you will have an app with two views as shown in Figure [11-1](#A441106_1_En_11_Chapter.html#Fig1).


    ![A441106_1_En_11_Fig1_HTML.jpg](A441106_1_En_11_Fig1_HTML.jpg)


    Figure 11-1 (left) Tabbed App First View and (right) Tabbed App Second View


    The basic template implements two view controllers and the tab bar controller
    at the bottom that lets you switch between them.


    You can add buttons to one of the view controllers along with a label as you see
    in Figure [11-2](#A441106_1_En_11_Chapter.html#Fig3).


    ![A441106_1_En_11_Fig2_HTML.jpg](A441106_1_En_11_Fig2_HTML.jpg)


    Figure 11-2 Add a button and label


    You will see that you can easily write code for the button so that it changes
    the text in the label as you see in Figure [11-3](#A441106_1_En_11_Chapter.html#Fig4)
    where the text has changed to Button Tapped.


    ![A441106_1_En_11_Fig3_HTML.jpg](A441106_1_En_11_Fig3_HTML.jpg)


    Figure 11-3 Implement the button


    The code to implement the button is not particularly complex particularly with
    Xcode helping you along the way as you will see in Chapter [12](#A441106_1_En_12_Chapter.html).
    The code for the button and label is shown in Listing [11-1](#A441106_1_En_11_Chapter.html#Par19)
    and in Figure [11-4](#A441106_1_En_11_Chapter.html#Fig5).


    ![A441106_1_En_11_Fig4_HTML.jpg](A441106_1_En_11_Fig4_HTML.jpg)


    Figure 11-4 Code for First View Controller


    ```

    import UIKit

    class FirstViewController: UIViewController {

    @IBOutlet weak var label: UILabel!

    @IBOutlet weak var button: UIButton!

    @IBAction func buttonAction(_ sender: Any) {

    label.text = "Button Tapped"

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    // Dispose of any resources that can be recreated.

    }

    }

    ```


    Listing 11-1 Implementing the button and label


    The code begins by linking the objects in the interface (using a storyboard as
    described in Chapter [12](#A441106_1_En_12_Chapter.html)) to the code. The `label`
    and `button` are both `@IBOutlet` items — that means that they are in the interface
    but can be addressed from code. You will see that one is the `label` and the other
    is the `button`.


    A similar style applies to `@IBAction`. That is the code that implements the action
    for the button. You will see `@IBOutlet` and `@IBAction` throughout code that
    implements the user interface.


    The `@IBAction` line of code can be reformatted so that it is clearer:


    ```

    @IBAction func buttonAction(_ sender: Any) {

    label.text = "Button Tapped"

    }

    ```


    When the button is tapped, `buttonAction` is called and the text of the `label`
    changes to `Button Tapped`.


    That is all that it takes to implement a button and its action.


    ### Implement a Button with a Notification


    If you want to add a button that will update a label on the second view controller,
    things get a little more difficult. It’s not hard to add a new button to the first
    view controller that will start the process in motion. Figure [11-5](#A441106_1_En_11_Chapter.html#Fig6)
    shows what that will look like.


    ![A441106_1_En_11_Fig5_HTML.jpg](A441106_1_En_11_Fig5_HTML.jpg)


    Figure 11-5 Add a button to use a notification


    You can also add a label to the second view controller as you see in Figure [11-6](#A441106_1_En_11_Chapter.html#Fig7).
    This will be the label that is updated by the notification button on the first
    view controller.


    ![A441106_1_En_11_Fig6_HTML.jpg](A441106_1_En_11_Fig6_HTML.jpg)


    Figure 11-6 Add a label to the second view controller


    You can start to add the functionality to the button that will update the label
    in the second view controller, but you immediately run into a problem as shown
    in Listing [11-2](#A441106_1_En_11_Chapter.html#Par29) and Figure [11-7](#A441106_1_En_11_Chapter.html#Fig8).


    ![A441106_1_En_11_Fig7_HTML.jpg](A441106_1_En_11_Fig7_HTML.jpg)


    Figure 11-7 Code for second view controller (Xcode)


    ```

    import UIKit

    class SecondViewController: UIViewController {

    @IBOutlet weak var label: UILabel!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view, typically from a nib.

    }

    override func didReceiveMemoryWarning() {

    super.didReceiveMemoryWarning()

    // Dispose of any resources that can be recreated.

    }

    }

    ```


    Listing 11-2 Code for notification button


    The problem is that the declaration of the navigation button is in the first view
    controller, but the declaration of the label that needs to be updated is in the
    second navigation controller. How do you get from the first view controller to
    the second view controller?


    In this case, there are a number of ways to work around the problem. The most
    obvious is to put the code into an object that connects to both view controllers.
    That would mean that managing the buttons and labels would move either into the
    app delegate or into the tab bar controller that manages the two visible view
    controllers. Either of those strategies will work, but the cost is that the app
    delegate or the tab bar controller will become more complex. (In the case of the
    tab bar controller, it is the difference between using a basic `UITabBarController`
    as in the template and implementing a subclass so that you can modify one or both
    buttons or labels from the subclass.)


    As a general rule, added complexity is the cost you pay for mixing data and interface
    elements. The solution is to use a notification.


    Notifications consist of two components. The first broadcasts a notification that
    an event has happened. The second component is an observer that waits to find
    out about a notification. What is important is that these do not have to know
    about one another. In the case of the button and label in the first view controller,
    the communication is within that view controller. With a notification, it can
    be generated by the first view controller (where the notification button is) and
    observed by the second view controller (where the label is).


    Notifications are broadcast across an app; an object can request to be notified
    of specific notifications, but there is no direct linkage as there is among objects
    within a single view controller.


    It is this lack of linkage that makes notifications so useful. It also exposes
    an issue that you will see in the code that follows (along with the solution).


    #### Notification Basics


    There are two key points to remember about notifications.


    - Each notification has a name. This is not a string, but rather a `Notification.Name`
    type. You’ll see how to specify this.

    - Notifications may not be delivered. Because there is no direct linkage between
    notification and observer, if a notification is not observed, no error is generated.
    The notifier posts a notification, and it may or may not be observed.'
