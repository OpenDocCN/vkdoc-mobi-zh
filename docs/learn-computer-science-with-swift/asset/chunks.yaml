    ## Summary


    Managing app data is a critical part of computer science projects even though
    it is sometimes taken for granted. In this chapter, you see the basic issues you
    must be aware of and plan for in your computer science projects. Most of the issues
    in this chapter aren’t code based: they are the basic issues of data management
    and ownership.


    If you want to get back to the nuts and bolts of coding, have no fear. The next
    chapter, (Chapter [10](#A441106_1_En_10_Chapter.html), “Building Components”)
    has plenty of code to help you understand and build usable projects and components.


    # 10. Building Components


    The basics of working with data and the flow of control can help you write code,
    but how do you get from there to building something useful? (In fact, this is
    one of the challenges of traditional programming instruction: people learn on
    the first day how to write a program that prints out “Hello There,” and there’s
    not a clear path from “Hello There” to building Facebook.)


    This chapter provides you with a few of the stepping stones from a single line
    of code to — if not Facebook, at least the tools you’ll need to start working
    in a software environment like that. (Mind you, there are many stepping stones
    on that journey, and this chapter just provides you with an overview.)


    ## Why Build Components


    There’s one phrase that sums up a major reason for building components: “divide
    and conquer .” In fact, if you look on the Internet for references to “divide
    and conquer,” you will find that it is the common name for a specific architecture
    and development process in computer science. The principle is analogous to the
    divide and conquer (or divide and rule) phrase that dates back several millennia.
    If you take a large problem (or a large group of people) you can often solve a
    problem or encourage people to act in certain ways if you break the problem or
    the group down into small groups or even individuals.


    When it comes to app development , if your goal is to write the next social media
    app (there’s a long line of people waiting to do that, in case you’re planning
    to do that), starting with a blank piece of paper or empty screen isn’t going
    to get you very far. You could break down the app’s design into large components —
    perhaps a handful of less than a dozen. From there, you might subdivide each component;
    more likely, you would get individuals or groups to work on specific components.
    Before you know it, you’ll have at last the broad outline of how to build a large
    and complex app.


    There are theories and rules aplenty in the world of app design, implementation,
    and management. A popular methodology (Agile) encourages the development of working
    software as early as possible in the process as possible. It won’t be complete,
    but it will run. This eliminates the need for multiple documents and meetings
    to describe the possible development path from the very beginning – something
    will be running in some way.


    The process continues with many iterations but at all times something will be
    runnable. (In some environments, iterations are limited to a week in length, which
    means that the steps along the road may be many and small, but if there’s a need
    for backtracking it may not be terribly disruptive.) And if there is a problem
    along the way, the next runnable version — even if it’s a backtracking version —
    will only be a week away.


    The idea of components as a divide-and-conquer strategy and methodologies such
    as Agile in which small pieces are built and put together reflects the need to
    get software developed as quickly and efficiently as possible. In both of these
    methodologies as well as many others, the process of building a large system involves
    building small components. The components are either decomposed from the whole
    concept (divide and conquer) or they are small components that become building
    blocks of the system.


    Components have other advantages over building large-scale systems in a single
    structure. Chief among these advantages are reusability and manageability. Those
    features are major features of good computer science design.


    ### Advantages of Components: Reusability


    When designers break a large system down into components that can be developed
    separately, not only does it make the overall project simpler in many cases, but
    it also can mean that some of the components will be reusable. In providing the
    architecture for an overall system, designers and developers look for components
    that can serve the dual purpose of advancing the primary project along with a
    secondary purpose of being able to stand on their own.


    Now that we are well into a world in which people are used to using computers,
    certain operations are becoming common. These range from interface elements to
    specific types of operations such as login security, saving documents, and the
    like.


    The actual process of developing the overall structure involves looking for places
    in the design where reusable components can be developed or employed (after all,
    if they are reusable, they should be reused).


    Making components reusable means that they need to be structured for reuse. At
    the simplest level, that may mean nothing more than greater attention to documentation
    than for a one-off code component. The value of reusable components is directly
    related to how reusable they are so documentation and overall structure are keys.


    ### Advantages of Components: Manageability


    When a large system is broken down into components that may be implemented by
    different development teams, it is critical that their behavior is clear. It’s
    not just a matter of documenting what a component does but also a matter of thinking
    about what side effects it may have on other parts of the larger system.


    By being able to identify the functionality of a component, it is easy to move
    it around on various system diagrams so that you can experiment with its reuse.


    Both reusability and manageability are enhanced by structuring components with
    clear documentation and with a focus on specific actions that they perform. Minimizing
    assumptions also plays into the picture: ideally, a component should be able to
    be picked up and used without much if any reprogramming.


    ## The Basic Components of Development Projects


    Bear in mind the previous points as you explore the rest of this chapter. It is
    devoted to explaining the major types of components that you encounter in computer
    science projects. It also shows you how you can use them for reusability and manageability
    of systems — including systems that you decompose from a large group of code modules
    into a structured collection of components.'
