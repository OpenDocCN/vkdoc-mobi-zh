  trans: '

    # 使用 Swift Playgrounds


    Swift playgrounds 让你能以 Swift 语言编写代码，并在输入时立即解释执行。苹果的 Xcode 开发工具（详见第 12 章“初识 Xcode”）整合了相关编译器和构建处理器，让你能够构建应用程序。Playgrounds
    则让你能够构建和探索解释型代码。你可以与他人共享 playgrounds，而且当你启动 Swift Playgrounds 时，会看到如图 2-1 所示的多个精选
    Playground 作为起点。如果你没有看到这个界面，请寻找右上角的 `+` 来开始浏览 Playground。


    ![A441106_1_En_2_Fig1_HTML.jpg](img/A441106_1_En_2_Fig1_HTML.jpg)


    图 2-1


    探索 Swift Playgrounds


    使用底部的标签页来探索内置的 Swift Playgrounds。**起点**是构建你自己 Playground 的良好开端。点击“获取”即可下载图 2-1
    中看到的任何 Playground，或者点击“新建 Playground”或 `+` 来开始使用其中一个，如图 2-2 所示。


    ![A441106_1_En_2_Fig2_HTML.jpg](img/A441106_1_En_2_Fig2_HTML.jpg)


    图 2-2


    你可以创建自己的 Playground


    你的 Playground 可以简单到只有一两行代码，例如第 1 章中展示的代码。或者，你也可以创建更复杂的 Playground，用于探索语法和测试代码。你还可以构建
    Playground 与他人共享，这些 Playground 甚至可以相当复杂。开始使用 Swift Playgrounds 的一种方法是点击某个精选 Playground
    进行探索。如果点击某个精选 Playground，你会看到其描述、更多信息以及至关重要的“获取”按钮，供你下载它。图 2-3 显示了“Learn to Code
    2”（一个早期 Playground）的获取页面。


