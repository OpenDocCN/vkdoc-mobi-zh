  raw: '### Writing the Playground Code


    You can build on existing code in Answers to ask people to enter an upper limit
    for a random number to be generated using `arc4random_uniiform(_:)` - the function
    that returns a pseudo-random number between 0 and the upper limit given (minus
    1 so the upper limit is outside the range of random numbers). The result is a
    `UInt32`.


    Here is the modified code.


    First, ask the user to enter the upper limit:


    ```

    show ("What is your name?")

    becomes

    show ("Upper limit for random number?")

    let name = ask ("Name")

    becomes

    let upperLimit = ask ("Upper Limit")

    show ("Hi " + name)

    becomes

    show (upperLimit)

    ```


    You’ve now got a playground that runs and asks for a random number limit and then
    shows the result. You can use the Swift playground to modify the code. As you
    proceed, the shortcut bar and prompts will help you write your code.


    The input data is a string, so you’ll need to convert it to an integer with this
    code:


    ```

    let intResponse = UInt32(upperLimit)

    ```


    Generate the random number:


    ```

    let random = arc4random_uniform(intResponse!)

    ```


    `random` will be an integer, so convert it to a string for display


    ```

    let randomString = String(random)

    ```


    Finally show the result.


    ```

    show (randomString)

    ```


    Figure [5-6](#A441106_1_En_5_Chapter.html#Fig6) shows the playground running.
    The upper limit is entered as 49 and the random number generated is 25.


    ![A441106_1_En_5_Fig6_HTML.jpg](A441106_1_En_5_Fig6_HTML.jpg)


    Figure 5-6


    Start to run the new playground


    As the playground runs, you see that there are displayable results for each line
    of executed code (as always in a playground). You can show viewers for any of
    these that you want to as shown in Figure [5-7](#A441106_1_En_5_Chapter.html#Fig7).


    ![A441106_1_En_5_Fig7_HTML.jpg](A441106_1_En_5_Fig7_HTML.jpg)


    Figure 5-7


    Shows viewers for the playground as it runs


    Remember that Swift is strict with types so you need to convert strings to integers
    and vice versa - it doesn’t happen automatically unless it is unambiguously possible.
    This helps to keep Swift code robust. In addition to the type conversions, note,
    too, that `intResponse` is an optional that needs to be unwrapped with !. (In
    production code, you would be safer to unwrap it with ? so that it will fail instead
    of crash if there is a `nil` there. In Chapter [7](#A441106_1_En_7_Chapter.html),
    in the section “Handling Data That Isn’t There,” you’ll find out more about optionals.)


    Go wrap up this section, and you can rename the Answer playground Random. Display
    the shelf of playgrounds and then press and hold the Answers playground. You’ll
    be able to rename it as you see in Figure [5-8](#A441106_1_En_5_Chapter.html#Fig8).


    ![A441106_1_En_5_Fig8_HTML.jpg](A441106_1_En_5_Fig8_HTML.jpg)


    Figure 5-8


    Rename the playground to Random


    ## Creating Many Random Numbers


    Remember that the purpose of creating random numbers in this chapter is to create
    a collection of meaningless (random) data that you can use to experiment with
    as you explore control management in code. It’s easy to modify the Random playground
    to create several random numbers at a time. Just add the following lines of code
    to create 6 random numbers.


    You already have the code to create and show a single random number. (Here is
    is again in case you need it here.)


    ```

    var random = arc4random_uniform(intResponse!)

    var randomString = String(random)

    show (randomString)

    ```


    You can add to that code to create another random number:


    ```

    random = arc4random_uniform(intResponse!)

    randomString = String(random)

    show (randomString)

    ```


    The only change you have to make is to remember that the original code declares
    variables as constants with `let`. Change the declarations to `var` so you can
    change their values, and in the subsequent calls, omit the type. Figure [5-9](#A441106_1_En_5_Chapter.html#Fig9)
    shows the playground that now creates two random numbers (159 and 173) from the
    same `intResponse`.


    ![A441106_1_En_5_Fig9_HTML.jpg](A441106_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Create multiple random numbers


    ## Create a Repetition Loop


    This cut-and-paste method obviously doesn’t scale well. Programming languages
    typically implement a variety of loops to do repetitive tasks. Repetition is a
    core principle of Computer Science. There are a number of types of repetition
    that you can choose from with most programming languages (including Swift).


    All of the repetition structures have two primary components:


    *   There is a section of code that is subject to repetition. It can be a single
    line of code, several lines, or calls to one or more functions.

    *   There are controls for the repetition; basically, this determines how many
    times the process is repeated. Rather than a specific number of times, it can
    be conditional so that the repetition continues until that condition changes.


    Note


    This chapter shows you how to produce multiple random numbers: that is a basic
    use of repetition. Note that functional programming (described in Chapter [10](#A441106_1_En_10_Chapter.html)
    shows another way of handling repetition.)


    ### Creating the Code to Repeat


    Using the common repetition structure described here, you can set up the loop
    to create multiple random numbers. The code to start is shown in Listing [5-1](#A441106_1_En_5_Chapter.html#Par64).
    It asks for the upper limit of random numbers, converts the input (a string) into
    an integer (`UInt32`), and then calls the random number generator (`arc4random_uniform(intResponse!)`)


    After the code executes the first time, it needs to create the second random number
    as in the previous listing. To repeat multiple times, you can cut and paste that
    code. (Remember that the first time through you set the variables, so it’s the
    second time code that you repeat as shown in Figure [5-9](#A441106_1_En_5_Chapter.html#Fig9).'
