    \ optional binding:\n\n```swift\nif let unwrappedI = i {\n```"
  raw: '#### Using JSON with Swift 4


    JSON is rapidly becoming one of the most common formats for data sharing. There
    have been several iterations of code in Objective-C and Swift that convert to
    and from JSON (particularly between JSON and the `plist` types). With Swift 4,
    those built-in tools have been rewritten and simplified. They are shown in Listing
    [9-1](#A441106_1_En_9_Chapter.html#Par116).


    Listing [9-1](#A441106_1_En_9_Chapter.html#Par116) shows a Swift playground that
    takes one of the plist types (an array in this case) and converts it to JSON and
    back again. This is a common way of sharing data with spreadsheet, databases,
    and even web browsers (many of them can read and format JSON files).


    In Listing [9-1](#A441106_1_En_9_Chapter.html#Par116), you see the setup of the
    playground. Note that Foundation must be imported, but the JSON tools don’t require
    UIKit. They are lower-level tools. A local array is created and then printed out.


    ```

    import Foundation

    let myArray = ["one", "two", "three"]

    print (myArray)

    ```


    There is a class in Swift 4’s standard library that handles JSON conversion. You
    need to create your own instance of that class:


    ```

    let jsonEncoder = JSONEncoder()

    ```


    The heart of the playground is two lines of code that use the `jsonEncoder` instance.
    The first line that is optional specifies in this case that the format of the
    JSON text should be easy for people to read:


    ```

    jsonEncoder.outputFormatting = .prettyPrinted

    ```


    Next, you use the `encodeToJSON` instance to encode `myArray` (or any other `plist`-compatible
    type). The result of encoding is stored in this example in `encodeToJSON`.


    ```

    let encodeToJSON = try? jsonEncoder.encode(myArray)

    ```


    The option spaces the JSON text to make it more readable. In the full listing
    in Listing [9-1](#A441106_1_En_9_Chapter.html#Par116), you’ll see the error checking
    that surrounds this line of code.


    In Listing [9-1](#A441106_1_En_9_Chapter.html#Par116), `encodeToJSON` is then
    decoded using the same `jsonEncoder` instance:


