    \  }\n    print (\"did encode\")\n} else {\n    print (\"failed2\")\n}\n```\n\
    Listing 9-1  \nConverting to and from JSON\n\nFigure [9-3](#A441106_1_En_9_Chapter.html#Fig3)\
