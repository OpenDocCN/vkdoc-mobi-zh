    \ Here, the range condition is used twice. The first time, a `where` clause is\
    \ added to it to refine the case condition. The second time there is no `where`\
    \ clause .\n\nNote that these cases are evaluated one at a time in sequence. If\
    \ you reverse them so that the where follows the unconditional case as shown in\
    \ Listing [8-12](#A441106_1_En_8_Chapter.html#Par94), the unconditional case will\
    \ be used and the where clause will never be used.\n\n```\nif let userID2 = myUserID\
    \ {\nswitch (userID2) {\ncase 5..<9: print (\"not a preferred user:\" + String(userID2))\n\
    case 5..<9 where userID2 < 7: print (\"preferred user:\" + String(userID2))\n\
    default: print (\"not a known ID\")\n}\n}\nListing 8-12\nReversing where and general\
    \ cases in a switch statement\n```\n\nThis code is shown executing in Figure [8-9](#A441106_1_En_8_Chapter.html#Fig9).\n\
    \n![A441106_1_En_8_Fig9_HTML.jpg](A441106_1_En_8_Fig9_HTML.jpg)\n\nFigure 8-9\n\
    \nUsing a where clause in a Swift switch"
  trans: "\n### Swift 的 Switch 语句与其他语言的对比\n\n请注意，整个 `switch` 语句都被包裹在定界符（在此例中为大括号）内。`switch`\
    \ 语句是编写结构化代码的优秀工具，但在不同语言之间存在一些显著差异。以下列举其中几点：\n\n*   一旦表达式被求值并与某个表达式结果匹配，该段代码就会被执行，但接下来会发生什么？在\
    \ C 语言等语言中，当 `expressionResult1` 被选中并执行后，控制权将传递给后续语句。`break` 关键字被用在 `case` 元素的末尾，使得控制权直接跳出整个\
    \ `switch` 语句。\n*   `break` 语句可以出现在任何位置。如果你有五个 `case` 元素，你可以将 `break` 命令放在其中任何一个之后。你可以选择第一个\
    \ `case` 元素，执行它，然后继续执行第二个 `case` 元素，如果第二个 `case` 元素的末尾有一个 `break` 语句，则在此处终止。\n\
    *   在 ALGOL 和 Pascal 语言家族（包括 Swift）中，选择仅限于执行单个 `case` 元素。可能不需要 `break` 语句。（Swift\
    \ 就是这种情况。）\n*   整个语句可能被称为 `switch`、`case` 或 `select`。\n*   `case` 元素通常被称为分支，并由关键字\
    \ `case` 标识。\n*   某些语言（包括 Swift）允许你修改选择某个 `case` 元素的条件。\n*   许多语言需要一个特殊分支（通常称为\
    \ `default`），当没有 `case` 元素匹配表达式结果时执行该分支。\n\n这些差异很大程度上可能源于以下事实：尽管该语句功能强大，可以帮助你创建更具结构性和可读性的代码，但开发人员迅速添加了额外功能，并且这些功能并不一致。这可能与这些语句开发的时期有关——那是一个（20\
    \ 世纪 60 年代）语言开发和修改频繁的时代。\n\n### 探索 Swift Switch 语法\n\nSwift 的 `switch` 语句具有高度结构化和强大的功能。如果你熟悉其他语言的\
    \ `switch` 语句，它对你来说可能是新颖的，因此这里提供了基本的 Swift 语法，并将在接下来的\"使用枚举\"部分继续介绍。\n\n基本的 Swift\
    \ 语法如代码清单 8-9 所示。它与代码清单 8-8 中的通用伪代码相同，但包含一个 `default` 语句。在 Swift 中，`default` 语句是必需的，其解释可能与你习惯的其他语言不同。\n\
    \nSwift 的 switch 语句必须是穷尽的。这意味着如果控制表达式是某种类型，那么 `default` 语句适用于该类型中除 `case` 语句中标识的之外的所有元素。\n\
    \n```\nswitch <#表达式#> {\ncase <#值 1#>: <#语句#>\ncase <#值 2#>: <#语句#>\ndefault:\
    \ <#语句#>\n}\n```\n\n代码清单 8-9\n基本的 Swift switch 语句\n\n这意味着控制表达式必须有一个类型（所有表达式都有隐式或显式的类型）。在\
    \ Swift 中，`break` 语句不是必需的：一个 `case` 表达式执行后，会被下一个 `case` 元素或 `switch` 语句的结束终止。\n\
    \n在 Swift 中，你可以让单个 case 元素处理多个值。只需像这样组合 case 元素：\n\n```\ncase \"result1\", \"\
    result2\":\n```\n\n在某些其他语言中，你可能习惯于不同的写法；以下代码在 Swift 中无法工作，因为控制权不会从一个 case 元素传递到下一个。它会被下一个\
    \ `case` 元素终止。\n\n```\ncase \"result1\":\ncase \"result2\":\n```\n\n你还可以对 case\
    \ 元素使用许多其他条件。以下两节将介绍其中两种。\n\n### 使用高级 Switch Case 元素：范围\n\n代码清单 8-10 展示了在 Swift\
    \ switch 中使用范围的示例。代码首先声明了一个可选的变量（`myUserID`），它是一个 `Int` 类型。\n\n它被设置为 6，因此它有一个值，但请注意，如果它没有被设置（即未设置的可选值），这段代码仍然会正常运行，不会导致错误。它使用可选绑定来（如果可能）将\
    \ `userID` 设置为 `myUserID` 的解包值。\n\n注意：关于可选值和可选绑定的更多内容，请参见第 9 章。\n\n现在，switch 语句使用\
    \ `userID`（`myUserID` 的解包值）来选择要执行的 case 语句。在本例中，case 是使用 Swift 范围定义的：\n\n```\n\
    5..<9\n```\n\n这个 Swift 语法表示范围介于 5 和 9 之间。请注意，该范围由三个字符组成：两个句点后跟一个 `<`。它并不是由三个字符后跟一个\
    \ `<` 组成。\n\n```\nvar myUserID:Int?\nmyUserID = 6\nif let userID = myUserID {\n\
    \    switch (userID) {\n    case 5..<9: print (\"第一个示例:\" + String(userID))\n\
    \    default: print (\"未知 ID\")\n    }\n}\n```\n\n代码清单 8-10\n在 Swift switch 中使用范围\n\
    \n你可以从图 8-8 中看到代码的实际运行效果。\n\n![A441106_1_En_8_Fig8_HTML.jpg](img/A441106_1_En_8_Fig8_HTML.jpg)\n\
    \n图 8-8\n在 Swift switch 中使用范围\n\n### 使用高级 Switch Case 元素：Where 子句\n\n你还可以在 case\
    \ 元素中使用 `where` 来创建复合条件，如代码清单 8-11 中的代码所示。\n\n```\nvar myUserID:Int?\nmyUserID\
    \ = 6\nif let userID2 = myUserID {\n    switch (userID2) {\n    case 5..<9 where\
    \ userID2 < 7: print (\"优选用户:\" + String(userID2))\n    case 5..<9: print (\"\
    非优选用户:\" + String(userID2))\n    default: print (\"未知 ID\")\n    }\n}\n```\n\n\
    代码清单 8-11\n在 Swift switch 中使用 where 子句\n\n此代码建立在前面代码清单 8-10 所示的代码基础上。这里，范围条件被使用了两次。第一次，添加了一个\
    \ `where` 子句来细化 case 条件。第二次则没有 `where` 子句。\n\n请注意，这些 case 是按顺序逐一评估的。如果你颠倒它们的顺序，使得\
    \ `where` 跟在无条件 case 之后，如代码清单 8-12 所示，那么无条件 case 将被使用，而 where 子句将永远不会被用到。\n\n\
    ```\nif let userID2 = myUserID {\n    switch (userID2) {\n    case 5..<9: print\
    \ (\"非优选用户:\" + String(userID2))\n    case 5..<9 where userID2 < 7: print (\"\
    优选用户:\" + String(userID2))\n    default: print (\"未知 ID\")\n    }\n}\n```\n\n\
    代码清单 8-12\n在 switch 语句中颠倒 where 和通用 case 的顺序\n\n此代码的执行情况如图 8-9 所示。\n\n![A441106_1_En_8_Fig9_HTML.jpg](img/A441106_1_En_8_Fig9_HTML.jpg)\n\
    \n图 8-9\n在 Swift switch 中使用 where 子句\n"
- fmt: "# Using Enumerated Types\n\nJust as Swift switch statements build on existing\
    \ switch statements in many languages, so, too, Swift enumerations (`enums`) build\
    \ on enumerations in other languages. Enumerated types (shortened to `enums` in\
    \ common usage) are just that: a type that is constructed by enumerating its values.\n\
    \nThe most common example of an enumerated type is `Suit`, which has the values\
    \ `Clubs`, `Spades`, `Hearts`, and `Diamonds`. In many program languages (particularly\
    \ the C languages), the order of enumerated types matters because an integer number\
    \ can be inferred or assigned to each type value. Thus, in the example of `Clubs`,\
    \ `Spades`, `Hearts`, and `Diamonds`, the values by default would be as follows:\n\
    \n```\nClubs = 0\nSpades = 1\nHearts = 2\nDiamonds = 3\n```\n\nYou can also assign\
    \ values explicitly in any order you want. The cases of `enums` are not strings\
    \ so they are not quoted. You can use `enum` cases to access their integer values.\
    \ This means that you can use the `enum` case `Hearts` in the example above as\
    \ 2.\n\nThis works only in one direction: you can’t use 2 to indicate the `Hearts`\
    \ case of an `enum` called `Suits`. You can, however, write a small function that\
    \ converts an integer to a `Suits` name. One of the reasons for this reverse conversion\
    \ (from integer to `enum` case name) is that `enum` integers are not unique in\
    \ the namespace: the `enum` case `Spades` can have a value of 1 and another `enum`\
    \ with case `Flowers` can use the value of 1 for `Geraniums`.\n\nAs a result,\
    \ many people think of `enums` primarily as ways to use integers to represent\
    \ text values (the case names) to create what is sometimes referred to as self-documenting\
    \ code. (Some other people refer to this as a joke. It’s an area of contention.)\n\
    \n## Swift’s Approach to Enumerated Types\n\nSwift has turned enumerated types\
    \ into first-class types rather than just a typing or documentation shortcut.\
    \ In Swift the case names are (as in other languages) not quoted strings. The\
    \ notion of automatically assigning values is used in some cases, but you can\
    \ assign a `raw value` to each case. That raw value can be an integer (as in most\
    \ languages), but it can also be a string, character, or number — even a floating\
    \ point number.\n\nSwift `enums` style capitalizes the `enum` name and uses lowercase\
    \ for the case values as in the following declarations.\n\n```\nenum Suit {\n\
    \    case club\n    case spade\n    case heart\n    case diamond\n}\n```\n\n##\
    \ Using Swift Enums with Switch Statements\n\nBecause `enums` in Swift are more\
    \ tightly structured than in many other languages, they fit well into Swift features\
    \ such as the requirement that `switch` statement `case` elements be exhaustive.\
    \ You can use an `enum` to assign a value as in the following line of code that\
    \ assigns the `enum` case `club` of the `Suit` `enum` to a constant called `cardSuit`:\n\
    \n```\nlet cardSuit = Suit.club\n```\n\nYou can then start to create a `switch`\
    \ statement that uses `cardSuit`. If you attempt to close the `switch` statement,\
    \ you will get an error as shown in Figure [8-10](A441106_1_En_8_Chapter.html#Fig10).\n\
    \n![A441106_1_En_8_Fig10_HTML.jpg](A441106_1_En_8_Fig10_HTML.jpg)\nFigure 8-10\
    \ Swift flags non-exhaustive switch statements\n\nThis error message is made possible\
    \ because Swift keeps track of the cases for each `enum`. If you heed the message\
    \ and type in the other cases, you will no longer have an error as you see in\
    \ Figure [8-11](A441106_1_En_8_Chapter.html#Fig11).\n\n![A441106_1_En_8_Fig11_HTML.jpg](A441106_1_En_8_Fig11_HTML.jpg)\n\
    Figure 8-11 Creating an exhaustive switch statement with an enum\n\nInstead of\
    \ printing out a message for each case of a `switch` statement, you can use the\
    \ fact that `enums` are full-fledged types to refer to them more generally, instead\
    \ of printing out what the name of the case element is as you see in Figure [8-11](A441106_1_En_8_Chapter.html#Fig11)\
    \ or in Listing [8-13](A441106_1_En_8_Chapter.html#Par110).\n\n```\nswitch cardSuit\
    \ {\ndefault: print(cardSuit)\n}\n```\nListing 8-13 Simplifying the switch statement.\n\
    \nIn Listing [8-13](A441106_1_En_8_Chapter.html#Par110) all of the control flows\
    \ through the default case, and you don’t even need the switch at all. You can\
    \ achieve the same result with one line of code:\n\n![A441106_1_En_8_Fig12_HTML.jpg](A441106_1_En_8_Fig12_HTML.jpg)\n\
    Figure 8-12.\n\n```\nprint(cardSuit)\n```\n\nYou can set the raw value of an `enum`.\
    \ As noted previously, the raw value can be a number (integer or floating point),\
    \ character, string, or other value. You simply add it in the `enum` declaration\
    \ as shown in Listing [8-14](A441106_1_En_8_Chapter.html#Par115).\n\nIf you do\
    \ that, you can then retrieve it by accessing the `rawValue` property of an `enum`\
    \ as in:\n\n```\ncardSuit.rawValue\n```\n\nThe example shown previously in this\
    \ chapter is updated in Figure [8-13](A441106_1_En_8_Chapter.html#Fig13) to show\
    \ how you can print the raw value. You can access the raw value for any purpose\
    \ — it doesn’t have to be for printing. You can use a numeric value to perform\
    \ calculations, and you can also add a meaningful string to the case name.\n\n\
    ![A441106_1_En_8_Fig13_HTML.jpg](A441106_1_En_8_Fig13_HTML.jpg)\nFigure 8-13 Displaying\
    \ enum raw values\n\n```\nenum Suit: Double {\n    case club = 15.3\n    case\
    \ spade = 32.6\n    case heart = 0.0\n    case diamond = -42.3\n}\nlet cardSuit\
    \ = Suit.spade\nprint(cardSuit)\nprint(cardSuit.rawValue)\n```\nListing 8-14 Using\
    \ raw values in an enum\n\n# Exploring Repetitions and Strides\n\nMost programming\
    \ languages support a variety of repetition operators. You see the basics in Chapter\
    \ [5](A441106_1_En_5_Chapter.html), “Managing Control Flow: Repetition” but here\
    \ is an overview of the common repetition variations. (All are available in Swift,\
    \ and, with occasional modifications, in most other languages you may use.)\n\n\
    There are two basic types of repetition loops: `while` loops and `for` loops.\
    \ All repeat a statement or compound statement. `while` loops rely on conditional\
    \ statements for their control but `for` loops rely on data structures for their\
    \ control.\n\n> **Note:** Repetitions repeat a statement or compound statement.\
    \ To simplify the text, this section refers to statements, but rest assured that\
    \ you can replace a single statement with a compound statement enclosed in brackets\
    \ `{ }` as was discussed previously in this chapter (“Using Compound Statements”).\n\
    \n## While and Repeat-While Loops\n\nThere are two parts to a `while` loop: the\
    \ condition that is true or false and the statement to be repeated. The `while`\
    \ loop behaves slightly differently depending on whether the condition or the\
    \ statement appears first.\n\nIf the condition is false when the `while` statement\
    \ begins execution, the difference becomes clear. For a condition that is false\
    \ initially, the following loop will not execute. The code is executed as it would\
    \ be in a natural language. Because the `while` condition isn’t true, it won’t\
    \ execute. When the condition becomes false, the `while` loop terminates.\n\n\
    > **Note:** If the condition never becomes false, the loop becomes an infinite\
    \ loop and will never stop. If the logic of your app is such that the condition\
    \ doesn’t change, you don’t want a `while` loop: You want an `if` statement.\n\
    \n```\nwhile <condition> {\n    <statements>\n}\n```\n\nThe other version of the\
    \ `while` statement always executes at least once. Here is the basic code:\n\n\
    ```\nrepeat {\n    <statements>\n} while <condition>\n```\n\nThis loop will always\
    \ execute at least once.\n\n## For-in Loops\n\nThese repetitions rely on collections\
    \ (arrays, dictionaries, or sets). The main `for-in` loops rely on iterations\
    \ and enumerations."
