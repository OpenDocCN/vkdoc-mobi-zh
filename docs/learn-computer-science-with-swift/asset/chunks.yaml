- fmt: '###  Recognizing Patterns


    If you recognize patterns, you may be able to reduce the amount of work you have
    to do by seeing a pattern and realizing that you can implement the pattern itself
    rather than each particular variation of it from scratch.


    A classic example of patterns is shown in Figure [1-2](#A441106_1_En_1_Chapter.html#Fig2),
    the west front of Notre Dame in Paris. Your first reaction may be personal (perhaps
    you have been to Paris) or it may be general – along the lines of how beautiful
    the facade is. An architect, designer, or software developer might go beyond the
    personal and the general to notice that this facade consists of three doorways
    at the street level and two towers at the top level.


    ![A441106_1_En_1_Fig2_HTML.jpg](A441106_1_En_1_Fig2_HTML.jpg)


    **Figure 1-2** West front of Notre Dame, Paris


    The west front of Notre Dame presents a multitude of patterns that repeat with
    slight variations. The three doorways at the first level are similar in overall
    width and height, but if you look closely, they are not copies of one another.
    Likewise, the two towers are fundamentally the same, but they, too, have variations.
    Almost every other element of the facade is part of a repeating pattern of one
    sort or another. (The most obvious exception to this is the large rose window
    in the center of the second level: it is unique, and its uniqueness reflects its
    religious importance).


    The importance of recognizing patterns is that once you do so, your job in describing
    or implementing a concept (be it an app or a cathedral) may be made easier. You
    no longer have to describe or build each detail or component: you can describe
    the pattern that is replicated.


    ###  Using Abstractions


    Often, as is the case on the west front of Notre Dame, patterns are repeated with
    variations. (The dimensions of the doorways are the same but the decoration and
    meaning of the statues differ.) The part of the pattern that repeats can be considered
    an abstraction – the essence of the pattern. In computer terms, the abstraction
    can be what you need to implement to support multiple uses of the pattern.


    For example, if you need code to ask the user of an app for an address, that can
    become part of a pattern that also allows you to ask the user for a name. (The
    term `design pattern` is sometimes used to describe the reusable code).


    ###  Combining Patterns and Abstractions for Development


    In practice, developers often work with patterns and abstractions at the same
    time because they are really two sides of the same coin. In designing an app (or
    a part of an app), developers look to patterns that they can implement with the
    same basic code. This reduces the amount of code that needs to be written.


    As the design process continues, developers also look for near-patterns. If parts
    of the project can be modified slightly, a pattern may emerge. This is an iterative,
    creative, and judgmental process. Frequently, the extreme of pattern-building
    may make the app more complex for people to use. As a project evolves with input
    from users and developers, refinements can be made on both sides (user and developer)
    so that a good balance is made between repetitive patterns and customization for
    the user.


    As part of this process, you frequently find yourself looking at the suggested
    process to see not only if there is some pattern to reuse but also if there is
    an abstraction that can be created so that the user sees extreme customization
    (that is, ease of use) and the developer works on a generic abstraction.


    A lot of the coding techniques you’ll find in modern software development help
    you to implement patterns and abstractions.


    ##  Fundamental Tasks for Developers


    Building on the basic principles of patterns and abstractions, you can actually
    start to plan your project. There are four basic tasks for developers. Once you’re
    familiar with them, the rest of the book explores specifics of implementation.


    *   Formulating a computational problem

    *   Modeling the problem or process

    *   Practicing decomposition

    *   Validating abstractions


    ###  Formulating a Computational Problem


    The first step is formulating your project as a computational problem. This is
    more than just saying, “Let’s build an app.” It means deciding not only what your
    goal is but also why it is amenable to computation (that is, why computer science
    comes into play). Computer science isn’t the answer to everything: if you want
    to paint the dining room, it’s not going to be of much help.


    In theoretical computer science, there are at least five types of computational
    problems. In deciding whether or not a specific project is amenable to computerization,
    classic computer science suggests that you find if it falls into one of these
    categories:


    *   **Choice or decision.** Find a yes/no answer to a specific question. Typically,
    the question is phrased in terms of numbers and values (is `personX` greater than
    21 years of age?, is `valueX` odd or even?)

    *   **Search.** In this problem, a body of data is searched and the choice/decision
    true values are returned. (Of all students enrolled in a school, how many will
    be eligible to vote in the next election?)

    *   **Count.** This variation asks merely how many values would be returned from
    a search. Note that the operations involved in a search can be more complex than
    in a count – you don’t care who the students are in this case so you don’t need
    to find out names or addresses.

    *   **Optimization.** Of all results of a search, which is the best? If the search
    is for all eligible voters near a specific address, you can use the results to
    optimize the result to find the voters near a specific address who voted in the
    last election and have a car (so might be willing to provide a ride to the polling
    place).

    *   **Function.** In effect, this is a search problem (which in turn is built
    on a choice problem). It is further refined with the optimizable results that
    can be further narrowed down. A simplified description of a function problem is
    one that returns a more complicated answer than yes/no or a count. (Remember,
    this is a simplification.)


    If a problem is not one of these five, it is not computational. This may sound
    bizarre because it’s hard to see where something like `Pages` or `Excel` or even
    `Swift Playgrounds` fits into this list. Never fear: a project can be broken down
    into computational pieces. In fact, if you really want to delve deeply into the
    project, you’ll find that each line of code can often be considered to consist
    of a number (often many) of computational pieces.'
