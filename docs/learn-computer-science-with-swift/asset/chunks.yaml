    from the structured interaction of people from different fields. If you’re not
    familiar with data science and the projects that use it, you might look for references
    to data science on the Web. There are many examples of successful projects, most
    of which involve the development or use of computer science technologies.


    ### Why Will People Be Involved?


    This boils down to the benefits that people will derive from the project. Are
    they working on it to get a grade, get a job, make money? The motivations for
    people who will use the project are typically different from the motivations of
    people who develop it.


    ### When Will It Happen?


    This is actually one of the most difficult questions to answer. In the non-digital
    world, it is pretty easy to determine when a project is finished: a dignitary
    cuts the ribbon, a band plays, and the bridge is open. Everyone can see that.


    Software isn’t visible. In the old days of shrink-wrapped software, people could
    see the packages in a store, and that certainly made the project seem complete.
    Determining when the project happens requires you to pull together the answers
    for What, Who, and Why along with any changes you have made.


    There’s a new perspective on What Are You Doing? With the additional information
    you have from the previous questions, now that question can be refined: what are
    you delivering?


    In the world of product development (and especially software development), a common
    phrase is minimum viable product or MVP. There are various interpretations of
    this phrase, but it generally is taken to mean something that runs and performs
    the basic functions you expect in the final product.


    This may mean that error messages are not complete (which may mean that the app
    may crash if not used carefully). It may mean that some options are not yet implemented.
    But it means that you can show someone what “it” is without using a slide presentation:
    there is something that will run.


    One interpretation of minimal viable product is that it can be — or is being —
    sold. Sometimes it’s sold as an introductory or preview version (even if the purchase
    price is free), but there is something there that works.


    As you start to decide when you will have a basic product, there are now a set
    of additional questions to answer. Basically, for most computer science projects,
    you will be looking at a sequence of deliverables. (There may be early-stage deliverables
    on a project such as a project proposal, a slide presentation, and the like, but
    those are not yet something that runs.)


    Depending on what you are building, you have a variety of options. Here is an
    overview of the options, but you can have many, many others. This just gives you
    an idea of the possibilities for delivering your work.


    You can plan on versions of an app or database (or any other computer science
    project). Typically, these versions are numbered 1, 2, 3… Intermediate versions
    can be numbered. It is not uncommon for a first release to be Version 1. It may
    quickly be followed by Version 1.1, which might contain some fixes for typos and
    other problems. You may continue on until Version 1 is stable. At that point,
    it’s time to start thinking about Version 2.


    As you move along, you can start to create a road map so that you have a sense
    of what your versions will be. This road map and schedule will turn into your
    project management tool. Typically the main versions (1, 2, 3) and perhaps major
    subdivisions (1.1, 2.3, etc.) are tied to marketing efforts (if they are apply).
    These milestones may also be tied to an academic calendar, milestones for funding
    (grant or investment), or other dates. Remember that once a milestone is attached
    to a date such as an academic calendar or a payment, it is no longer totally under
    the control of the computer science staff.


    There’s another aspect to When for you to consider. Once the project is stable,
    will it be used on a regular basis? If you are building a database to be maintained
    with products that will be popular around the year-end holidays, your critical
    time span for updating the database might be July (a typical lead time for year-end
    holiday data preparation). Plan what will be happening to and with your app, database,
    or other project.'
  trans: "\n# 开发问题\n\n你在网络和各种出版物中可以找到许多关于应用开发的指南。以下六个问题是在任何计算机科学项目启动之初都需要回答的。如果你无法回答这些问题，你的项目迟早会遇到麻烦。期望那些有计算机科学使用经验的人能够帮助整合项目。这或许不是正式课程的一部分，但这确实是现实世界的一部分。（如果你与某人谈论一份将\"\
    计算机科学\"列为必要条件的工作机会，那么熟悉开发流程通常与掌握专业术语同样重要。）\n\n如果你是那种迫不及待想要编写代码的人，这六个问题可能看似过于简单，但在你和其他人投入时间、精力和金钱于一个尚未清晰成型的项目之前，必须先回答它们。每个问题的更多细节（包括如何回答）将在本章后面部分说明。\n\
    \n> **提示**  \n> 当你开始回答这些问题时，请记住你随时可以改变想法，事实上，随着任何计算机科学项目的发展，你应该计划调整和演进你的答案。\n\n\
    以下是这六个问题：\n\n-   你在做什么？\n-   对象是谁？谁将构建、使用、管理、维护并资助它？\n-   你为什么要构建它？人们为什么会使用它？\n\
    -   项目将在何时进行？何时开始，何时结束？\n-   项目将在哪里运行？它将运行在什么设备上；是否需要其他计算机资源，如网络服务器或数据库？\n-  \
    \ 你如何获知项目的结果？\n\n## 你在做什么？\n\n这个项目可能是关于构建一个应用，但也可能是构建一个开放数据资源，以便其他人可以构建运行在公共数据上的应用。许多人建议这个问题应该在\
    \ 10 秒内回答出来（这有时被称为电梯演讲，意思是如果你和你的老板或其他重要人物一起在电梯里，你只有电梯运行一层楼的时间来说出你的答案）。\n\n如果一个朋友问：\"\
    你在做什么工作？\"，大多数时候答案应该只需几秒钟。令人惊讶的是，许多人都觉得回答这个问题极其困难。如果你无法简单地描述项目，那么你很可能也无法实现它。即使是最复杂的项目也可以被概括：让无人驾驶航天器登陆火星。这就是对一个非常复杂（且成功）的一系列任务集合的简单描述。\n\
    \n## 谁将参与其中？\n\n谁将负责项目的工作，谁将使用最终成果？你构建这个应用是为了自身利益，以便学习如何构建应用并丰富你的项目作品集吗？这是为你目前或想要从事的工作而做的项目吗？用户会是熟练使用移动设备的人（如果你的应用运行在移动设备上），还是那些在设备上安装了\
    \ 400 个游戏却不知道如何更改设置的人？他们会是熟练使用移动设备但从未使用过台式机或笔记本电脑的人吗？（是的，没有个人电脑使用经验的人数正在增长。）\n\
    \n谁将管理或领导这个项目？在许多项目中，团队会协同工作。我们越来越多地看到跨学科协作项目受益于不同领域人员的有序互动。如果你不熟悉数据科学及其相关项目，你可以在网上查找数据科学的相关资料。有许多成功案例，其中大部分都涉及计算机科学技术的开发或应用。\n\
    \n## 人们为什么会参与进来？\n\n这归结于人们将从项目中获得的益处。他们参与项目是为了获得学分、找到工作还是赚钱？项目使用者的动机通常与开发者的动机不同。\n\
    \n## 项目将在何时进行？\n\n这实际上是最难回答的问题之一。在非数字世界中，判断项目何时完成相当容易：一位要人剪彩，乐队演奏，大桥通车。所有人都能看到这一时刻。\n\
    \n软件则不可见。在旧日的软件零售时代，人们可以看到商店里的软件包装盒，这无疑让项目看起来是完整的。确定项目何时完成，需要你结合\"做什么\"、\"谁参与\"\
    和\"为什么\"的答案，以及你所做的任何变更。\n\n现在，对于\"你在做什么？\"有了一个新的视角。结合之前问题获得的信息，现在这个问题可以更精确地表述为：你交付什么？\n\
    \n在产品开发（尤其是软件开发）领域，一个常见的短语是最小可行产品或`MVP`。这个短语有各种解释，但通常指的是一个能运行并执行你对最终产品所期望的基本功能的东西。\n\
    \n这可能意味着错误信息不完整（这可能导致如果不小心使用，应用会崩溃）。也可能意味着某些功能尚未实现。但这意味着你可以不借助幻灯片演示向别人展示\"这个\"\
    东西：有一个可以运行的东西在。\n\n最小可行产品的一种解释是，它可以被——或者正在被——销售。有时它会以入门版或预览版的形式销售（即使售价为零），但总归是有一个可工作的东西存在。\n\
    \n当你开始决定何时拥有一个基础产品时，现在又有一系列额外的问题需要回答。基本上，对于大多数计算机科学项目，你将要面对一系列的交付物。（项目早期可能有项目提案、幻灯片演示之类的交付物，但这些还不是可以运行的东西。）\n\
    \n根据你构建的内容，你有多种选择。以下是这些选择的一个概述，但实际上你还可以有数不清的其他选择。这里只是让你了解交付工作的可能性。\n\n你可以规划应用或数据库（或任何其他计算机科学项目）的版本。通常，这些版本会编号为\
    \ 1、2、3……中间版本也可以编号。第一个版本就命名为 1.0 版本并不罕见。它可能很快就会有 1.1 版本，其中包含一些对拼写错误等问题的修复。你可能会继续迭代，直到\
    \ 1.0 版本稳定。此时，就该开始考虑 2.0 版本了。\n\n随着项目推进，你可以开始制定路线图，以便对你的版本规划有个概念。这个路线图和日程表将成为你的项目管理工具。通常，主版本（1、2、3）以及可能是重要的子版本（1.1、2.3\
    \ 等）会与市场推广活动相关联（如果适用的话）。这些里程碑也可能与学术日历、资助（拨款或投资）的里程碑或其他日期相关联。请记住，一旦里程碑与某个日期（如学术日历或付款日）挂钩，它就不再完全受计算机科学团队的控制了。\n\
    \n关于\"何时\"的考量还有另一个方面。一旦项目稳定下来，它会被定期使用吗？如果你正在构建一个需要为年底假期期间流行的产品进行维护的数据库，那么你更新数据库的关键时间窗口可能是\
    \ 7 月（这是年终假期数据准备的典型前置时间）。请规划好你的应用、数据库或其他项目的时间安排，以及它们的后续发展。\n"
- fmt: '### Where Will the Project Run?


    Although software may be imaginary, it needs devices on which to run. You have
    two major decisions about where you work will run. If it involves data that must
    be stored in a centralized location, the common practice is to host it on a web
    server; apps and websites can access it using the common `REST` protocol. There
    is typically a cost for that storage, but it can usually be managed fairly reasonable.
    Of course, if your project is for an organization that already has web storage
    available (a corporation, university, or private business), you may not have to
    worry.


    Cloud platforms such as Amazon Web Services, Azure, and IBM let you use and easily
    configure cloud storage. These platforms are designed to react quickly to increased
    usage as a client suddenly needs more (or less) storage.


    If you are building an app, you need to decide which platform it will run on.
    At the moment, there are four major mobile platforms:


    - iOS

    - Android

    - Windows

    - Web


    Some apps must run on all of those platforms (think of an online banking app).
    Others can run on just one of them. In many cases, one platform is picked to start
    with. (Sort of a variation on minimal viable product.) Once it is running, it
    is possible to get feedback and, if necessary, additional support for further
    work on the project.


    Microsoft has a `Xamarin` product that interests many people. It is based on `.NET`
    and `C#`. The goal is the elusive write once/run anywhere dream so that you can
    write code for iOS, Android, Windows, or macOS and have it run anywhere. The challenge
    with these strategies is that as modifications are made to the target systems,
    the combined system (like `Xamarin`) tends to lag behind. For many, many purposes,
    this is a very useful way of working. For others, the lack of contemporaneous
    support for the latest native OS features is a serious problem.


    Regardless of your opinion, if you want to be a guide through the world of computer
    science to colleagues and clients, you need to understand the cross-platform and
    multi-platform issues.


    ### How Will You Know the Results ?


    If you’ve decided what you’re doing, who you’re doing it for, why you’re doing
    it, as well as when and where it will be used, you almost have the project plan
    for a computer science project mapped out. All that remains is to determine how
    to measure the status and success of the project.


    Interestingly enough, this question that seems so obvious to many people is just
    as difficult for people to answer as the first one (what are you doing?). Once
    again, this is a question that didn’t really matter too much in the non-digital
    world where you could see the results of your labors. You can measure sales or
    downloads of apps, but is that what you want? If you’re working on an app that
    is designed to increase sales at a brick-and-mortar store, the downloads of the
    app don’t matter nearly as much as the sales in the stores. If you are building
    a database of holiday gifts, the most obvious metric is the sales of those gifts.
    The web is littered with abandoned shopping carts on e-commerce sites (an oft-cited
    statistic is around 67% of shopping carts are abandoned, but that is from 2014
    and online shopping sites are trying to bring that number down with new interface
    tools).


    A major benefit of online app distribution such as the App Store is the wealth
    of data that is generated. (You can find a great deal of it on App Annie — [`https://www.appannie.com`](https://www.appannie.com)
    .) Many people find all those data incredibly useful, but if you really want to
    use it well, look at the data that will be available to you in the App Store and
    other metrics like App Annie and visitors to websites and databases. Look at what
    will be available and plan your results strategy. Don’t wait until you have the
    data to decide what to do with it: set up your analysis right from the start.


    That way, you can track your results.


    ## Summary


    This chapter shows you how computer science can fit into projects that you work
    on in other disciplines. As the world of apps takes shape (remember the App Store
    opened only in July 2008, less than 10 years before this book is being written),
    it is expected that people who know computer science know both the technology
    and the ways in which it can be used.


    # 14. Graphics and Visualization Techniques and Problems


    You have seen examples of code, `Xcode`, and a storyboard in Chapters [11](#A441106_1_En_11_Chapter.html)
    and [12](#A441106_1_En_12_Chapter.html). In those cases as well as in the Swift
    playgrounds in other chapters, you can see code and principles of design and implementation.
    This chapter is different in that it does not focus on how to do one thing. Rather,
    this chapter walks through a real-life sequence of implementation questions and
    solutions. You can see how an interface evolves and how to look at it not as just
    a pretty picture but as something that is useful in conveying information and
    helping people work with an app that becomes useful to them.


    ## Introducing Utility Smart


    The case study in this chapter is real. It traces the evolution of the interface
    of Utility Smart, an app designed to help people develop awareness of the natural
    resources that they use and to moderate their use of those resources.


    The app starts from a simple idea: pose questions about recent use of resources
    to people and let them answer using sliders. There is background information that
    people can browse for more information, but the heart of the app is the sliders.


    The data is saved on the device, and it can be plotted on a graph. The data is
    sharable using various technologies such as email and `AirDrop`. It was built
    for `Swift` and `Cocoa Touch` by Jesse Feiler. The Utility Smart project is led
    by Professor Curt Gervich of the Center for Earth and Environmental Science at
    State University of New York College at Plattsburgh. (If you want to see it in
    action, it is a free download from the App Store at [`http://bit.ly/UtilitySmart`](http://bit.ly/UtilitySmart)
    .)'
