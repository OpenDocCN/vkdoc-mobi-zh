- fmt: '### Creating the Repetition Control (Limit)


    The other part of repetition is the mechanism for controlling it. The logic of
    a loop like this in Swift is to use a variable to count the number of times you’ve
    been through the loop.


    You can name the counter something imaginative and creative like `i`. Make certain
    that it is a `var`, because you will need to update it each time you go through
    the loop. Set it initially to `0`.


    ```

    var i = 0

    ```


    Each time you go through the repetition loop, you will create a new random number
    and increment `counter`. The easiest way to do this in Swift is with the `+=`
    counter, which is a compound assignment operator. It adds a value to a variable
    and assigns the added value to the variable. If you have a variable `x` that is
    set to `4`, this code will set it to `5`.


    ```

    x += 1

    ```


    That is the most common use, but you can also use `x += 4.2` if your variable
    is a `Double`.


    You do this in a `while` loop, which continues processing while its value is `true`.
    Thus, to execute the loop three times, set `x` to `0`, add one to it each time
    you go through the `while` loop, and continue until the value of `x` is no longer
    less than `3`.


    Put all of this together, and you have a loop that can run 3 times as shown in
    Listing [5-1](#A441106_1_En_5_Chapter.html#Par64).


    ```

    let prompt = ask("Upper limit for random number")

    let intResponse = UInt32(prompt)

    var random = arc4random_uniform(intResponse!)

    var randomString = String(random)

    show (randomString)

    var i = 0

    while i < 3 {

    i += 1

    random = arc4random_uniform(intResponse!)

    randomString = String(random)

    show (randomString)

    }

    Listing 5-1

    Create 3 Random Numbers

    ```


    The results are shown in Figure [5-10](#A441106_1_En_5_Chapter.html#Fig10).


    ![A441106_1_En_5_Fig10_HTML.jpg](A441106_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    Generating random numbers in a loop


    Because you are not generating printed output, you don’t waste resources by printing
    output on paper. Try changing 3 to 10000 to produce 10,000 random numbers. (Remember
    not to use the comma when entering 10000 as code). You’ll see the results go by
    very quickly.


    To speed things up, don’t show the result each time. Comment out the `show` statement
    as follows:


    ```

    //show (randomString)

    ```


    In order to see when your 10,000 iteration loop finishes, add a final statement
    outside the brackets of the loop so that the last three lines look like this:


    ```

    show (randomString) }

    show ("Done")

    ```


    Things will go even faster!


    There’s an important lesson to be learned here about just how fast and powerful
    the processors on mobile devices are today. A lot of the tips and “best practices”
    that you may find in older computer science books and texts, you’ll find many
    ways to economize on the use of processors and storage. Those tips are still relevant,
    but the scales have changed and you need to apply them in more extreme cases.


    ## Summary


    This chapter shows you the basics of repetition control flow. You see how to set
    up a basic repetition in a Swift playground to generate 10,000 random numbers
    quickly. The basics of repetition control flow apply to many other types of processes;
    you’ll see them throughout this book.


    # 6. Working with Data: Collections


    In Chapter [5](#A441106_1_En_5_Chapter.html), you saw how to use repetition to
    create data - lots of it if you followed the example to create 10,000 random numbers.
    The question may have occurred to you: Why? What will you do with all that data
    that you created with the repetition code?


    Computers and computer science frequently join together to do useful things. Neither
    data on its own without computation nor computation without data is generally
    very useful. In this chapter you see how to put the data you created in Chapter
    [5](#A441106_1_En_5_Chapter.html) into a usable collection. Later on in Chapter
    [9](#A441106_1_En_9_Chapter.html) (“Storing Data and Sharing Data”), you’ll see
    how to make your data even more useful than it will be in this chapter.


    Remember that the constructs and principles that are the backbone of computer
    science are there to make it easier to develop and maintain software. Successful
    developers look for ways to incorporate existing concepts and implementations
    into their product. That means less code to write, debug, and maintain. So don’t
    just look at collections as tools to use to implement your ideas. Rather, look
    at ways in which to mold your ideas to take advantage of collections and other
    concepts so that there’s less work for you to do.


    ## Using Types


    Whether taken as single items or as collections, computer data is typed. Each
    data element that an app uses has a type that is assigned by the developer. Programming
    languages from almost the beginning have used types to convert the bits of digital
    storage into numbers of various sorts. The simplest conversion takes all of the
    bits in a computer word and uses their on/off status to create a binary number.
    Depending on the number of bits in a computer word, the binary number can range
    from 0 to a very large number.


    Very early in the development of computers and computer science, it became obvious
    that this conversion of bits to a binary number wasn’t nearly enough. A common
    solution was to take a bit at the high end of the binary number and reserve it
    for a special purpose: a minus sign. Thus both positive and negative numbers could
    be stored.


    Further refinements included storing a single set of bits in a word as if they
    were two separate integers. This allowed the representation of floating-point
    numbers with one integer representing the significand (sometimes called the mantissa)
    and the other representing the exponent for the power of ten that will create
    the appropriate value when it is used to multiply the significand. All of this
    is done with software - the actual words of storage remain just a row of bits.
    Because conversions from one type of number can be done easily, they are done
    all the time in software. Often neither developer nor user is aware of this.


    There are details about using built-in types as well as types that are created
    by Swift in the following chapter. For now, just be aware that types are constructs
    that convert the physical bits in a computer word to something with meaning to
    developers, users, and normal people.


    ## Scalar Data


    The simplest form of data is a scalar or variable - a single data element that
    is basically the same as a simple algebraic term as in:


    `x = 15`


    You will often find descriptions and definitions of scalars as the contents of
    a single memory location. In fact, most of the time data is stored in words that
    are collections of bits. The hardware handles these words very efficiently as
    it stores and retrieves the contents of words.


    When a computer word is 64 bits long, it can theoretically store 64 separate yes/no
    (Boolean) values. Hardware and software let you access the word as a single value
    (usually a number) by the individual bits. You can go further to access the bits
    in a word in groups that often correspond to letters.'
