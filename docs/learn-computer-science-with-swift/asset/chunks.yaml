    ### 创建重复控制（限制）


    重复机制的另一部分是控制重复的执行逻辑。在 Swift 中，这类循环的逻辑通常使用变量来记录循环执行的次数。


    你可以将计数器命名为富有想象力且创意十足的名称，比如 `i`。请务必将其声明为 `var`（变量），因为每次循环时都需要更新它的值。初始值设为 `0`。


    ```

    var i = 0

    ```


    每次执行重复循环时，你都会生成一个新的随机数，并对 `counter` 进行递增。在 Swift 中，最简单的方法是使用复合赋值运算符 `+=`。它会将一个值加到变量上，并将结果重新赋值给该变量。若变量
    `x` 的值为 `4`，以下代码会将其更新为 `5`。


    ```

    x += 1

    ```


    这是最常见的用法，但如果变量是 `Double`（双精度浮点数）类型，你也可以使用 `x += 4.2`。


    你可以在 `while` 循环中执行此操作，该循环会在条件为 `true` 时持续运行。因此，若要循环执行三次，请将 `x` 设为 `0`，每次进入 `while`
    循环时将其加 `1`，并持续直到 `x` 的值不再小于 `3`。


    综合以上所有内容，你将得到一个可以运行 3 次的循环，如代码清单 5-1 所示。


    ```

    let prompt = ask("随机数上限")

    let intResponse = UInt32(prompt)

    var random = arc4random_uniform(intResponse!)

    var randomString = String(random)

    show (randomString)

    var i = 0

    while i < 3 {

    i += 1

    random = arc4random_uniform(intResponse!)

    randomString = String(random)

    show (randomString)

    }

    代码清单 5-1

    生成 3 个随机数

    ```


    结果如图 5-10 所示。


    ![A441106_1_En_5_Fig10_HTML.jpg](img/A441106_1_En_5_Fig10_HTML.jpg)


    图 5-10


    在循环中生成随机数


    由于无需生成打印输出，因此不会浪费纸张资源打印结果。尝试将 `3` 改为 `10000`，以生成 10,000 个随机数字。（注意：将 10000 作为代码输入时请勿使用逗号）。你会看到结果飞速闪过。


    为了加快速度，可以不必每次都显示结果。将 `show` 语句注释掉，如下所示：


    ```

    //show (randomString)

    ```


    为了观察 10,000 次迭代循环何时结束，请在循环的花括号外添加一条最终语句，使最后三行代码如下所示：


    ```

    show (randomString) }

    show ("完成")

    ```


    运行速度会更快！


    这里有一个重要的知识点：当今移动设备处理器的速度和性能远超想象。你可能会在早期计算机科学书籍和文献中找到许多关于“最佳实践”的技巧，其中大量内容旨在节约处理器和存储资源。这些技巧虽然仍有参考价值，但硬件规模已今非昔比，你需要将它们应用于更极端的场景。


    ## 本章小结


    本章向你介绍了重复控制流程的基础知识。你学会了如何在 Swift playground 中设置基本的重复操作，以快速生成 10,000 个随机数。重复控制流程的基本原理同样适用于许多其他类型的处理过程；你将在本书后续章节中反复见到它们。


    # 6. 数据处理：集合


    在第 5 章中，你看到了如何使用重复操作来生成数据——如果跟随示例生成 10,000 个随机数，那便是海量数据。你可能会产生疑问：为什么这么做？用重复代码生成的所有数据，又该如何处理？


    计算机与计算机科学常常相结合以完成实用功能。仅有数据而无计算，或仅有计算而无数据，通常都难以发挥价值。在本章中，你将学习如何将第 5 章中生成的数据放入可用的集合中。稍后在第
    9 章（“数据存储与共享”）中，你还将了解如何让数据比在本章中变得更加实用。


    请记住，构成计算机科学支柱的那些结构和原则，旨在让软件的开发与维护变得更加容易。成功的开发者会想方设法将现有的概念和实现融入自己的产品中。这意味着需要编写、调试和维护的代码会更少。因此，不要仅仅将集合视为实现创意的工具。相反，要思考如何调整你的创意，使其充分利用集合及其他概念，从而减少你的工作量。


    ## 使用数据类型


    无论是作为单个元素还是集合，计算机数据都是有类型的。应用使用的每个数据元素都有一个由开发者指定的类型。从编程语言诞生之初，类型便被用来将数字存储的比特位转换为各种数字形式。最简单的转换是将计算机字中的所有比特位，利用其开/关状态生成一个二进制数。根据计算机字中比特位的数量，二进制数的范围可以从
    0 到非常大的数值。


    在计算机和计算机科学发展的早期，人们很快意识到仅将比特位转换为二进制数远远不够。一种常见的解决方案是，取二进制数高位的一个比特位，并将其保留用于特殊用途：表示负号。这样一来，正数和负数都可以被存储了。


    进一步的优化包括，将字中的一组比特位视为两个独立的整数进行存储。这使得浮点数的表示成为可能：其中一个整数表示有效数字（有时称为尾数），另一个整数表示以 10
    为底的指数——当指数与有效数相乘时，会产生合适的值。所有这些都通过软件完成——实际的存储单元仍然只是一行比特位。由于一种数字类型到另一种数字类型的转换很容易实现，因此在软件中经常进行此类转换。开发者和用户往往都对此毫无察觉。


    关于使用内建类型以及 Swift 创建的类型的具体细节，将在下一章介绍。目前，你只需了解类型是一种构造，它将计算机字中的物理比特位转换为对开发者、用户及普通人具有意义的内容。


    ## 标量数据


    最简单的数据形式是标量或变量——一个单一的数据元素，本质上与简单的代数项类似，如：


    `x = 15`


    你经常会看到对标量的描述和定义，将其视为单个内存地址中的内容。实际上，大多数情况下数据存储在由比特位组成的字中。硬件在存储和检索这些字的内容时，效率非常高。


    当一个计算机字长度为 64 比特时，理论上它可以存储 64 个独立的是/否（布尔）值。硬件和软件允许你将字作为一个单一值（通常是数字）来访问，也可以通过单个比特位来访问。你甚至可以进一步将字中的比特位分组访问，这些分组通常对应着字母。

