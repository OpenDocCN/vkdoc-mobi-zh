- fmt: "### 发布通知\n\n实现通知按钮的第一步是发布通知。以下是发布通知的标准代码。它将作为第一个视图控制器中通知按钮的操作。\n\n```\n@IBAction\
    \ func notificationButtonAction(_ sender: Any) {\n    NotificationCenter.default.post(\n\
    \        name: Notification.Name(rawValue:notificationKey),\n        object: nil,\n\
    \        userInfo: nil)\n}\n```\n\n在这个简单案例中，你只需要为通知设定一个名称。这在以下代码行中完成：\n\n```\n\
    name: Notification.Name(rawValue:notificationKey),\n```\n\n该行代码引用了在你应用的任何区域（可能在一个`globals.swift`文件中）声明的一个变量，其代码如下：\n\
    \n```\nlet notificationKey = \"com.champlainarts.notificationKey\"\n```\n\n这两行代码共同将一个字符串转换为`Notification.Name`类型。\n\
    \n以上就是从按钮操作（或任何其他事件）发布通知所需的所有步骤。\n\n### 监听通知\n\n要监听通知，想要监听的对象需要注册，然后执行某些操作。以下是监听通知的代码行（位于第二个视图控制器中）。\n\
    \n```\nNotificationCenter.default.addObserver(\n    self,\n    selector: #selector(SecondViewController.didReceiveNotificationResultText),\n\
    \    name: NSNotification.Name(rawValue: notificationKey),\n    object: nil)\n\
    }\n```\n\n这行代码指定，如果接收到具有给定名称的通知，则应调用一个特定的函数（该函数定义为`#selector`）。\n\n```\n@objc\
    \ func didReceiveNotificationResultText () {\n    label.text = \"Received Notification\"\
    \n}\n```\n\n完成此设置后，第一个视图控制器中的导航按钮可以改变第二个视图控制器中标签的文本。两个控制器互不知晓，按钮也不知道标签的存在。这意味着，如果观察者响应按钮点击的操作是完全不同的内容（即，不设置标签文本），那么一切仍应正常工作。\n\
    \n添加观察者应由能够针对通知采取行动的对象来完成，因此该代码应放在该对象所在的位置。你可能会首先想到将其放入第二个视图控制器的`viewDidLoad`方法中。\n\
    \n如果你这样做并运行应用，会发现一个问题。第二个视图控制器中的`viewDidLoad`只有在第二个视图控制器显示时才会被调用。因此，如果你运行应用，看到（默认的）第一个视图控制器及其导航按钮，点击该按钮会发送通知，但由于第二个视图控制器尚未显示，`viewDidLoad`未被调用，观察者尚未准备好。\n\
    \n你可以通过点击第二个视图控制器的标签来验证这一点，这将强制调用`viewDidLoad`并设置观察者。之后，导航按钮将按预期工作。\n\n## 总结\n\
    \n这是一个常见问题，将在第[12](#A441106_1_En_12_Chapter.html)章中，在探索Xcode时进一步探讨。\n\n# 12. 进入\
    \ Xcode\n\n前面的章节涵盖了计算机科学的许多基础知识。你已经找到了一些Swift游乐场和代码片段，它们说明了许多概念和问题。本书的重点是Swift以及iOS和macOS的基本框架——Cocoa和Cocoa\
    \ Touch。\n\n要实际在这些环境中进行开发，你需要使用Xcode，即苹果的集成开发环境（IDE）。本章将概述应用和其他软件通常是如何构建的（即，不仅限于这些平台和Xcode）。然后，你会重点关注如何使用Xcode开始应用开发——这将提供第[11](#A441106_1_En_11_Chapter.html)章中讨论的概述的更多细节。\n\
    \n关于Xcode和各种苹果框架有很多内容要说，但本章后续部分的重点将是一个真实的案例研究：分析第[11](#A441106_1_En_11_Chapter.html)章代码中的一个问题。你已经占得先机，因为该问题在第[11](#A441106_1_En_11_Chapter.html)章中已描述过，但本章将带你逐步了解如何发现并识别问题以及如何修复它。许多开发者认为，与你在实际诊断和修复错误时所学习到的东西相比，任何书本或课堂学习都无法比拟。"
  raw: '#### Posting a Notification


    The first step in the process of implementing the notification button is to post
    it. Here is the standard code for posting a notification. It will be the action
    for the notification button in the first view controller.


    ```

    @IBAction func notificationButtonAction(_ sender: Any) {

    NotificationCenter.default.post(

    name: Notification.Name(rawValue:notificationKey),

    object: nil,

    userInfo: nil)

    }

    ```


    In this simple case, you need only have a name for the notification. That is done
    in this line of code:


    ```

    name: Notification.Name(rawValue:notificationKey),

    ```


    That line refers to a variable declared in any area of your app (perhaps in a
    globals.swift file) with the following code:


    ```

    let notificationKey = "com.champlainarts.notificationKey"

    ```


    Together, those two lines convert a string into a `Notification.Name` type.


    That’s all you have to do to post a notification from a button action (or any
    either event).


    #### Observing a Notification


    To observe a notification, the object that wants to observe it needs to register
    and then take some action. To observe a notification, here is the line of code
    (it’s in the second view controller).


    ```

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(SecondViewController.didReceiveNotificationResultText),

    name: NSNotification.Name(rawValue: notificationKey),

    object: nil)

    }

    ```


    That line of code specifies that if a notification with the given name arrives,
    a specific function should be called (it is defined as a `#selector`).


    ```

    @objc func didReceiveNotificationResultText () {

    label.text = "Received Notification"

    }

    ```


    Once this setup is completed, the navigation button in the first view controller
    can cause the label in the second view controller to be renamed. Neither controller
    knows about the other, and the button doesn’t know about the label. This means
    that if the observer’s action in response to the button being clicked is something
    entirely different (that is, not setting a label’s text), it should all still
    work.


    Adding the observer should be done by an object that will be able to act on the
    notification, so that code will go in that place. Your first guess might be to
    put it into the `viewDidLoad` method of the second view controller.


    If you do that and run the app, you’ll see a problem. `viewDidLoad` in the second
    view controller isn’t called until the second view controller is displayed. Thus,
    if you run the app and see the (default) first view controller with its navigation
    button, tapping that button will send the notification, but since the second view
    controller hasn’t been displayed yet, `viewDidLoad` has not been called and the
    observer isn’t ready.


    You can verify that this is the case by tapping the second view controller tab,
    which will force `viewDidLoad` to be called and the observer will be set up. Thereafter,
    the navigation button will work as you expect.


    ## Summary


    This is a common problem, and it will be explored in Chapter [12](#A441106_1_En_12_Chapter.html)
    as Xcode is explored.


    # 12. Getting into Xcode


    Previous chapters have covered many of the basics of computer science. You’ve
    found some Swift playgrounds and snippets of code that illustrate many of the
    concepts and issues. The focus of this book is on Swift and the basic frameworks
    of iOS and macOS — Cocoa and Cocoa Touch.


    To actually develop in these environments, you will need to use Xcode, Apple’s
    integrated development environment (IDE). This chapter will give you a general
    overview of how apps and other pieces of software are built in general (that is,
    not just on these platforms and with Xcode). Then you’ll find a focus on how to
    begin development of an app with Xcode — this will provide more detail of the
    overview discussed in Chapter [11](#A441106_1_En_11_Chapter.html).


    There is a lot to Xcode and the various Apple frameworks , but the focus of the
    following part of the chapter will be a real-life case study of analyzing a problem
    in the code for Chapter [11](#A441106_1_En_11_Chapter.html). You have a leg up,
    because that problem was described in Chapter [11](#A441106_1_En_11_Chapter.html),
    but in this chapter you’ll find a walkthrough of how to find and identify what
    the problem is and how to fix it. Many developers believe that no amount of book-
    or class-learning can compare to what you learn when you actually have to diagnose
    and fix a bug.'
