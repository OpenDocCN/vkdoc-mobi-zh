  raw: '### Setting Up the Project


    Here are the steps to begin with.


    Begin by launching Xcode. You can download it for free from the App Store . Use
    About Xcode to check the version of Xcode you have installed as you see in Figure
    [12-3](#A441106_1_En_12_Chapter.html#Fig3). Note that Xcode build identifiers
    that tend to be more complex than the simpler style most developers use for numbers
    like 1, 2, 3, and so forth.


    ![A441106_1_En_12_Fig3_HTML.jpg](A441106_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    Version 9.0 build 9A235 of Xcode


    Choose New ➤ Project from the Xcode menu to begin your project as you see in Figure
    [12-4](#A441106_1_En_12_Chapter.html#Fig4).


    ![A441106_1_En_12_Fig4_HTML.jpg](A441106_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Create a new project


    You will be able to choose a template to start with. In this chapter, Tabbed App
    is used. When you have time, explore the other templates by creating projects
    with them. You can always delete them after you have experimented with them.


    You will be prompted to select a location on disk for your project. The project
    will then open in Xcode. You’ll see it in a window like that in Figure [12-1](#A441106_1_En_12_Chapter.html#Fig1).
    You can use the settings in the top right to show and hide the various parts of
    the window. (There’s more on navigating with Xcode on developer.apple.com and
    the in-app help.)


    Figure [12-5](#A441106_1_En_12_Chapter.html#Fig5) shows the app at this point.
    Note that in Figure [12-1](#A441106_1_En_12_Chapter.html#Fig1), the Utilities
    at the right are not shown, but they are shown at the right of Figure [12-5](#A441106_1_En_12_Chapter.html#Fig5).
    Most developers show and hide the panes of the Xcode window as they work.


    ![A441106_1_En_12_Fig5_HTML.jpg](A441106_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Review the app


    With just a few clicks or taps, you can create a new project in Xcode, but look
    at Figure [12-6](#A441106_1_En_12_Chapter.html#Fig6) to see the number of files
    and folders that you have created. Unless you are well-experienced with Xcode,
    do not move or rename the project files: leave them where Xcode put them. The
    two most important components are the xcodeproj file (shown at the bottom of the
    list in Figure [12-6](#A441106_1_En_12_Chapter.html#Fig6)) and the project folder
    (Tabs in this case). If you collapse the folders, you’ll see that the project
    consists of the xcodeproj file and the project folder. Those two items can be
    moved together to another place, but they must be next to one another in a folder
    (or on the desktop).


    ![A441106_1_En_12_Fig6_HTML.jpg](A441106_1_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Browse the app’s files


    ### Testing the Project (without Modifications)


    If it is not already open, launch the project in Xcode by double-clicking Tabs.xcodeproj
    . That should open the window you’ve seen before. Remember that you may have to
    use the controls at the top right to show or hide the parts of the main window.
    Figure [12-7](#A441106_1_En_12_Chapter.html#Fig7) shows you the View menu that
    you can use instead of the controls at the top right.


    ![A441106_1_En_12_Fig7_HTML.jpg](A441106_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Explore the View menu


    Show or hide parts of the main window. If you want to explore them, use this View
    menu to show or hide them, and you’ll be able to match the terminology to the
    sections of the Xcode window you’re looking at.


    Use the arrow at the top left of the main window (shown in Figure [12-5](#A441106_1_En_12_Chapter.html#Fig5))
    to build and run the app. You should see the results in Figure [12-8](#A441106_1_En_12_Chapter.html#Fig8)
