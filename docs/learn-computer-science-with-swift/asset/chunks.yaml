- fmt: "### Subroutines, Functions, Procedures, and Methods\n\nThe most common components\
    \ you find in projects are subroutines, functions, procedures, and methods. Their\
    \ names differ from one programming language to another, and there are some differences\
    \ in their structures, but all of them basically are variations on the same theme.\
    \ They are miniature programs or apps. They receive input, do some manipulations\
    \ and calculations on the input, and then they generate output.\n\nThe general\
    \ structure is described in this section, with a focus on Swift. This is the overall\
    \ view, but it does apply to most components. The main parts of a component are\
    \ the following:\n\n*   Name\n*   Data inputs\n*   Data outputs\n*   Implementation\
    \ — code\n*   Implementation — documentation\n*   Side effects and requirements\n\
    \n#### Naming Components\n\nEach component you create has a name. The names in\
    \ most languages cannot contain spaces or special characters except for underscore\
    \ characters. Other rules apply to languages or to usage in a given environment\
    \ (such as a specific company). Names are chosen for readability and reuse. They\
    \ often consist of several words that describe what the component will do. When\
    \ several words are used, they are typically connected with underscore characters\
    \ or camelcase capitalization (each word is capitalized except the first — `camelCaseFormatting`,\
    \ for example). If you are using underscores, such a name might be `camel_case_formatting`.\
    \ You can combine the styles into something such as `camelCase_formatting`. It\
    \ is always a good idea to adopt a standard for naming items as well as for using\
    \ capitalization and underscores (as well as other styles). It’s important for\
    \ people to be able to know what these items are. Remember that in some listing\
    \ and cross-references, the names may appear in alphabetical order, so you may\
    \ want to bear that in mind in your naming conventions.\n\nAlso, bear in mind\
    \ that if you are writing code for reuse and are reusing code that others have\
    \ written, chances are very great that you will be working with code that adheres\
    \ to various naming conventions. Try for consistency within individual components\
    \ and, if possible, within related components written in the same organization\
    \ or group. Don’t spend too much time on this: you can’t enforce standards on\
    \ every developer in the world.\n\n#### Data Inputs\n\nData for a component can\
    \ be provided when the component runs. For example, a component that calculates\
    \ the area of an object might receive two values: length and width. Other components\
    \ receive streams of data from devices such as real-time sensors like thermometers\
    \ or from streams of data (such as social media messages like Tweets).\n\nIt makes\
    \ for good programming style and easier maintenance if the inputs to a component\
    \ can be clearly defined. Length and width are such easy concepts. Sometimes,\
    \ the amount of data to be provided to a component is large and varied. One way\
    \ of managing such input data is to format it into a collection like an array,\
    \ set, or dictionary. Thus, instead of many data observations from a weather station,\
    \ you might have an array of such observations — that turns the many into one\
    \ input item. You can also use a more structured collection such as a dictionary\
    \ where each element consists of a key (the date/time of the observation) and\
    \ a value (the observation itself).\n\nThe clearer the inputs are, the more easily\
    \ the code can be reused.\n\n#### Data Outputs\n\nData outputs are subject to\
    \ the same concerns as data inputs specifically making the outputs clear in their\
    \ meaning and in their structure. One specific type of output is worth highlighting.\
    \ Some outputs are designed specifically to be used as inputs to other components.\
    \ In such cases, any changes to outputs need to be synchronized with changes to\
    \ the related inputs.\n\nThis is not a trivial matter, because having such a dependency\
    \ can limit or even preclude the reusability of code on either side (input or\
    \ output). One common way of avoiding such problems is by assuming that all outputs\
    \ are going to be used in one way or another as inputs. Thus, the formats and\
    \ layouts of the outputs may well be designed using known methodologies so that\
    \ if necessary, outputs from one component can go to a translating component and\
    \ thence to the desired recipient. The intermediate component then is responsible\
    \ for the synchronization of input and output data.\n\n> **Note**  \n> This design\
    \ pattern is shown in the common model-view-controller design pattern used extensively\
    \ in Swift and Cocoa. The model is basically the data, and the view is the user\
    \ interface to that data. An intermediate component – the controller – mediates\
    \ between the model and the view. That structure allows both models and views\
    \ to be changed as needed: only the controllers need to be modified as a result\
    \ of changes to model or view.\n\n#### Implementation — Code\n\nThe heart of a\
    \ component is the code itself. That is what does the work.\n\n#### Implementation\
    \ — Documentation\n\nThe code itself is not sufficient implementation. The code\
    \ needs to be documented. Reuse is dependent on good documentation.\n\n#### Side\
    \ Effects and Requirements\n\nIn building successful components, most developers\
    \ strive to minimize or even eliminate any dependencies from outside the component.\
    \ If data is needed, it is good to provide it as input. Relying on the existence\
    \ of some data or other that is necessary for the component means once again that\
    \ the component’s reuse is limited to situations where that data is available.\
    \ On the other hand, if necessary data is provided with inputs, it is part and\
    \ parcel of the component."
  raw: '### Subroutines, Functions, Procedures, and Methods


    The most common components you find in projects are subroutines, functions, procedures,
    and methods. Their names differ from one programming language to another, and
    there are some differences in their structures, but all of them basically are
    variations on the same theme. They are miniature programs or apps. They receive
    input, do some manipulations and calculations on the input, and then they generate
    output.


    The general structure is described in this section, with a focus on Swift. This
    is the overall view, but it does apply to most components. The main parts of a
    component are the following:


    *   Name

    *   Data inputs

    *   Data outputs

    *   Implementation — code

    *   Implementation — documentation

    *   Side effects and requirements


    #### Naming Components


    Each component you create has a name. The names in most languages cannot contain
    spaces or special characters except for underscore characters. Other rules apply
    to languages or to usage in a given environment (such as a specific company).
    Names are chosen for readability and reuse. They often consist of several words
    that describe what the component will do. When several words are used, they are
    typically connected with underscore characters or camelcase capitalization (each
    word is capitalized except the first — `camelCaseFormatting`, for example). If
    you are using underscores, such a name might be `camel_case_formatting`. You can
    combine the styles into something such as camelCase_formatting. It is always a
    good idea to adopt a standard for naming items as well as for using capitalization
    and underscores (as well as other styles). It’s important for people to be able
    to know what these items are. Remember that in some listing and cross-references,
    the names may appear in alphabetical order, so you may want to bear that in mind
    in your naming conventions.


    Also, bear in mind that if you are writing code for reuse and are reusing code
    that others have written, chances are very great that you will be working with
    code that adheres to various naming conventions. Try for consistency within individual
    components and, if possible, within related components written in the same organization
    or group. Don’t spend too much time on this: you can’t enforce standards on every
    developer in the world.


    #### Data Inputs


    Data for a component can be provided when the component runs. For example, a component
    that calculates the area of an object might receive two values: length and width.
    Other components receive streams of data from devices such as real-time sensors
    like thermometers or from streams of data (such as social media messages like
    Tweets).


    It makes for good programming style and easier maintenance if the inputs to a
    component can be clearly defined. Length and width are such easy concepts. Sometimes,
    the amount of data to be provided to a component is large and varied. One way
    of managing such input data is to format it into a collection like an array, set,
    or dictionary. Thus, instead of many data observations from a weather station,
    you might have an array of such observations — that turns the many into one input
    item. You can also use a more structured collection such as a dictionary where
    each element consists of a key (the date/time of the observation) and a value
    (the observation itself).


    The clearer the inputs are, the more easily the code can be reused.


    #### Data Outputs


    Data outputs are subject to the same concerns as data inputs specifically making
    the outputs clear in their meaning and in their structure. One specific type of
    output is worth highlighting. Some outputs are designed specifically to be used
    as inputs to other components. In such cases, any changes to outputs need to be
    synchronized with changes to the related inputs.


    This is not a trivial matter, because having such a dependency can limit or even
    preclude the reusability of code on either side (input or output). One common
    way of avoiding such problems is by assuming that all outputs are going to be
    used in one way or another as inputs. Thus, the formats and layouts of the outputs
    may well be designed using known methodologies so that if necessary, outputs from
    one component can go to a translating component and thence to the desired recipient.
    The intermediate component then is responsible for the synchronization of input
    and output data.


    Note


    This design pattern is shown in the common model-view-controller design pattern
    used extensively in Swift and Cocoa. The model is basically the data, and the
    view is the user interface to that data. An intermediate component – the controller –
    mediates between the model and the view. That structure allows both models and
    views to be changed as needed: only the controllers need to be modified as a result
    of changes to model or view.


    #### Implementation – Code


    The heart of a component is the code itself. That is what does the work.


    #### Implementation – Documentation


    The code itself is not sufficient implementation. The code needs to be documented.
    Reuse is dependent on good documentation .


    #### Side Effects and Requirements


    In building successful components, most developers strive to minimize or even
    eliminate any dependencies from outside the component. If data is needed, it is
    good to provide it as input. Relying on the existence of some data or other that
    is necessary for the component means once again that the component’s reuse is
    limited to situations where that data is available. On the other hand, if necessary
    data is provided with inputs, it is part and parcel of the component.'
  trans: "\n### 子程序、函数、过程和方法\n\n在项目中，最常见的组件是子程序、函数、过程和方法。它们的名称在不同编程语言中有所差异，结构也存在一些不同，但本质上都是同一主题的变体。它们就像微型程序或应用，接收输入，对输入进行一些操作和计算，然后生成输出。\n\
    \n本节将描述其通用结构，并以 Swift 为重点。这是总体视角，但也适用于大多数组件。组件的主要部分如下：\n\n*   名称\n*   数据输入\n*\
    \   数据输出\n*   实现 —— 代码\n*   实现 —— 文档\n*   副作用和依赖\n\n#### 命名组件\n\n您创建的每个组件都有一个名称。在大多数语言中，名称不能包含空格或特殊字符（下划线字符除外）。其他规则则适用于特定语言或特定环境（例如特定公司）中的用法。名称的选择要便于阅读和复用。它们通常由几个单词组成，描述组件将执行的操作。当使用多个单词时，通常用下划线字符连接或使用驼峰式大小写（例如，`camelCaseFormatting`，除了第一个单词外，每个单词首字母大写）。如果您使用下划线，这样的名称可能是\
    \ `camel_case_formatting`。您也可以将风格组合成类似 `camelCase_formatting` 的形式。始终建议采用一套标准来命名项目，并规范使用大小写和下划线（以及其他风格）。让人们能够理解这些项目是什么非常重要。请记住，在某些列表和交叉引用中，名称可能会按字母顺序出现，因此在制定命名约定时，您可能希望将此牢记在心。\n\
    \n另外，请注意，如果您正在编写用于复用的代码，并复用了他人编写的代码，那么您极有可能需要处理遵循各种命名约定的代码。尽量在单个组件内保持一致性，如果可能，在同一个组织或团队编写的相关组件中也保持一致性。但不要在这方面花费太多时间：您无法强制世界上每个开发者都遵守标准。\n\
    \n#### 数据输入\n\n组件的数据可以在其运行时提供。例如，一个计算物体面积的组件可能会接收两个值：长度和宽度。其他组件则从设备（如温度计等实时传感器）或数据流（如社交媒体消息，如推文）接收数据流。\n\
    \n如果组件的输入能够被清晰定义，则有助于形成良好的编程风格并简化维护。长度和宽度就是非常清晰的概念。有时，需要提供给组件的数据量很大且种类繁多。管理此类输入数据的一种方法是将其格式化为集合，例如数组、集合或字典。因此，来自气象站的多个数据观测值，可以转换为一个包含这些观测值的数组\
    \ —— 这样就将多个输入项变成了一个输入项。您也可以使用更结构化的集合，例如字典，其中每个元素由一个键（观测的日期/时间）和一个值（观测值本身）组成。\n\
    \n输入越清晰，代码就越容易被复用。\n\n#### 数据输出\n\n数据输出与数据输入面临相同的问题，特别是要使输出的含义和结构清晰。有一种特殊类型的输出值得强调。有些输出专门设计用作其他组件的输入。在这种情况下，对输出的任何更改都需要与相关输入的更改同步。\n\
    \n这不是一个小问题，因为存在这种依赖关系可能会限制甚至阻碍输入或输出两侧代码的复用性。避免此类问题的一种常见方法是假设所有输出都将以某种方式用作输入。因此，输出的格式和布局可能最好使用已知的方法进行设计，这样在必要时，来自一个组件的输出可以发送到翻译组件，然后再发送到目标接收方。中间的组件则负责同步输入和输出数据。\n\
    \n> **注意**  \n> 这种设计模式体现在模型-视图-控制器（MVC）设计模式中，该模式在 Swift 和 Cocoa 中被广泛使用。模型基本上是数据，视图是数据的用户界面。中间组件——控制器——在模型和视图之间进行协调。这种结构允许模型和视图根据需要进行更改：只有控制器需要因模型或视图的更改而修改。\n\
    \n#### 实现 —— 代码\n\n组件的核心是代码本身。代码负责执行实际工作。\n\n#### 实现 —— 文档\n\n仅有代码本身不足以构成完整的实现。代码需要文档化。复用依赖于良好的文档。\n\
    \n#### 副作用和依赖\n\n在构建成功的组件时，大多数开发者都力求最小化甚至消除组件外部的任何依赖。如果需要数据，最好将其作为输入提供。依赖组件所需的其他数据或资源的存在，意味着组件的复用性将仅限于该数据可用的场景。另一方面，如果必需的数据是通过输入提供的，那么它就是组件不可分割的一部分。\n"
- fmt: '# Classes


    Components like subroutines, functions, procedures, and methods let you write
    what are in effect small programs with inputs, outputs, and computations and calculations
    in the middle. Classes are a different type of component. Using the object-oriented
    technologies developed in the 1960s and later, classes provide a different type
    of structure for reusable components.


    The object-oriented programming paradigm lets you build objects that contain data
    and functionality in the form of code. The difference is that the paradigm of
    components harkens back to the earliest days of computers and computer programming
    where a program would run by reading in its inputs, calculating something, and
    exporting its outputs. (This is often called batch processing.) At the end of
    the process, the program would terminate. Sometimes, a containing program would
    be created so that at the end of the process, the next set of inputs would be
    read and the next set of outputs would be generated (think of a billing system).


    Classes and object-oriented programming fit well into a world that is no longer
    batch oriented. In many cases today, a class contains data or the ability to receive
    data, it performs calculations, and then exports data. So far that is the same
    as batch processing, but, in many object-oriented systems the objects stay around.
    Some data is received, calculations are done, some more data of a different is
    received, calculations are done, and other operations may ensue. It’s not a matter
    or read/calculate/write in many cases. Rather, an object may be capable of reading,
    writing, and calculating at various times. Note that this is an observation of
    a common difference between many batch-oriented components and many classes: it
    is not a necessary distinction.


    Classes are the descriptions of objects; as they are created (instantiated) into
    instances, these objects may stay around for a while. The clear distinction between
    inputs, computations, and outputs in basic components isn’t relevant to many objects.


    From the perspective of reusability, classes are just as reusable as other components.
    Classes often contain components themselves. Typically, those components are functions;
    they may also be methods. There is a technical distinction between the two, but
    in practice, the terms are often used interchangeably. (See the sample object-building
    example later in this chapter.)


    With Swift, structs and enumerations are treated much like classes in many ways.
    There is more on structs and enums in Chapter [8](#A441106_1_En_8_Chapter.html).


    ## Larger Building Blocks


    In looking at reusable components including functions, methods, procedures, and
    classes, modern languages like Swift let you create larger building blocks. Just
    as classes can contain data and functionality, frameworks can contain classes
    (and their components). The term framework is used in several ways in computer
    science. The most basic way is the same way it is used in English. There is also
    a specific use in Swift and Xcode that lets you create reusable frameworks that
    you or others can use in various projects. Cocoa and Cocoa Touch themselves are
    frameworks. There are frameworks for user interface, audio, document management,
    and many other commonly used parts of apps. Within the frameworks, you’ll find
    classes, and within the classes, you’ll find more classes and functions, and so
    on.


    ## Looking at Blocks and Recursion


    Components of code need to be packaged in one way or another to be used and reused.
    There are two special cases of code reuse to examine: blocks and recursion.


    ### Terminology: Blocks and Closures


    In the Swift documentation, you’ll find this definition of a closure:


    - “Closures are self-contained blocks of functionality that can be passed around
    and used in your code.”


    Subroutines, functions, procedures, and methods are all blocks. Compound statements
    (as described in Chapter [9](#A441106_1_En_9_Chapter.html)) also are often blocks.
    A block is a section of code that can be packaged with or without the formal structure
    of a procedure, function, method, or class. If it is not part of a formal structure,
    it may be packaged with brackets (or, in some languages, parentheses).


    What is critically important in the Swift definition is that it is “self-contained.”
    When a block of code is used as a closure, if the code in the block refers to
    variables outside of the block itself, those variables are made available to the
    block that is now called a closure (because it has closed around the variables
    that are needed for the block to execute.


    In Swift, all closures are blocks and many blocks are also closures. In practice,
    many people use the terms interchangeably.


    The most common use of blocks is in cases where you want to perform a block of
    code and you don’t know when you want to perform it. Commonly, it is code that
    you want to perform after some event or another has happened. If that event is
    out of your control, you don’t know when you’ll need to execute the block of code.


    ### Using a Closure


    Here is a common example of using a closure. It is code that is typically used
    in `UIDocumentBrowserViewController` to open documents in the Files app in iOS
    11 and later.


    ```

    let document = UIDocument (fileURL: documentURL) // instantiate a subclass of
    UIDocument

    document.open (completionHandler: { (success) in

    if success {

    // show document

    } else {

    print ("no success opening document")

    } // else

    } // end of block

    ) // end of document.open parameters

    ```


    Here is what the code does.


    - Normally, you create an instance of `UIDocument` as the comment indicates. A
    local variable called `document` (or whatever you want) is typically used in this
    code.

    - You then open the document using the `UIDocument open (completionhandler:)`
    method.

    - The argument of the method called `completionHandler` is a block of code that
    will be called when `open` completes. (This is a common naming convention.)

    - The block of code that is the completion handler is enclosed in brackets. The
    call to open with the completion handler code removed makes this structure clearer:


    ```

    document.open (completionHandler: {...})

    ```


    - The content of the block is shown here. When the block is called, a single parameter
    will be passed in. For convenience, it is named `success` here; as all parameters,
    it is enclosed in parentheses. Once `success` is passed in, it can be tested in
    an if condition that indicates if opening was successful or not. Thus, in this
    structure, the block is written out and passed into open as the `completionHandler`
    parameter. When the `open` function completes, it has the code available to run
    in the `completionHandler` parameter. How long it takes for that code to run depends
    on the system workload.


    ```

    {

    (success) in

    if success {

    // show document

    } else {

    print ("no success opening document")

    } // else

    } // end of block

    ```


    This type of structure makes multi-threading possible. That is, the processing
    continues in one or more of the chips in the processor until the completion handler
    comes into play.


    In older software, you will often find this type of code implemented using semaphores.
    Instead of waiting for `open` to finish, the code in older apps might have a small
    loop that checks periodically to see if `open` has run.


    In the architecture of Cocoa and Cocoa Touch, this structure that relies on messaging
    and notifications makes for much simpler code to write in apps and it makes for
    much simpler and faster code in the operating system itself.


    You will find blocks used in many places.'
