    ## 测试项目（进行修改后）


    再次开始测试应用，你会时不时遇到一个问题。这个问题可能很棘手，因为它看起来毫无规律。下一节中的调试技巧将告诉你如何继续。


    ## 使用 Xcode 调试应用


    当按钮和代码就位后，你会发现如果点击第一个视图控制器中的导航按钮，似乎什么都不会发生。调试的第一步是使用断点。这会使应用在指定位置停止。如果你发现本应发生的情况没有发生，最简单的处理方式就是在导致问题的代码行上设置断点（本例中，是因为代码没有运行）。设置断点的方法是点击代码行左侧的装订线区域，如图
    12-12 所示。


    ![A441106_1_En_12_Fig12_HTML.jpg](img/A441106_1_En_12_Fig12_HTML.jpg)


    图 12-12 设置断点


    再次运行应用，点击导航按钮，等待断点被触发。


    但断点不会被触发。


    这一切让你确认了之前看到的状况，但现在你发现了一个事实：不仅是通知没有被处理，它甚至从未被接收过。


    在这种情况下，常见的做法是回溯。`didReceiveNotificationResultText` 函数本应由谁来调用？


    由于这是一小段代码，答案就在你眼前的第 24 行：那里设置了通知观察者。在该行设置断点，再次运行应用，看看会发生什么。


    结果是一样的：这行代码没有被调用，因此观察者没有被设置。


    此时，你需要动点脑筋来弄清楚为什么会发生这种情况。如果你思考、研究或向同事请教这个问题，很可能会得到相同的答案：如果代码没有被调用，那么它所在的函数（`viewDidLoad`）也就没有被调用。这可能让你觉得不合理，因为你可以看到第二个视图控制器。


    两个断点仍处于设置状态，你可以进一步实验。你会发现第二个视图控制器的 `viewDidLoad` 函数是在它即将显示之前被调用的。如果你运行应用并点击第一个视图控制器中的导航按钮，观察者此时尚未设置。使用视图底部的选项卡切换到第二个视图控制器以强制加载视图，然后返回到第一个视图控制器并再次尝试。你会看到现在通知正常工作。


    这是一个非常常见的问题（也是一类非常常见的问题）。它不仅仅局限于 iOS 或 Cocoa：这类问题和调试技术是普遍存在的。


    解决方案是需要在生成通知之前就设置好观察者。这意味着观察者必须放置在应用一开始就存在的部分中。你可以考虑将 `AppDelegate` 作为放置观察者的位置（正是因为这个原因，它常用于接收通知）。


    ## 总结


    本章向你展示了 Xcode 的基础知识，以便你能够开始将计算机科学的思想和概念应用到应用中。Swift playground 是一种宝贵的实验方式，但某些功能需要更复杂的特性，你需要开始构建自己的应用。


    如前所述，本章描述的调试概念并非 iOS 或 Cocoa 所独有。你可以在大多数语言和环境中使用它们。


    # 13. 纳入人的因素


    计算机科学领域通常被纯粹视为计算机硬件和软件的问题。在某种程度上，我们作为社会的一份子，需要审视人的参与方式，因为人是计算机科学项目的使用者、创造者、管理者和资助者。


    本章从应用世界的角度探讨计算机科学中“人”的一面。尽管这里描述的问题和原则也适用于看似不涉及人的项目（例如星际空间任务、电网和发电机的控制软件），但这些项目仍然涉及人，至少体现在项目的管理和资助方面。


    然而，本章的重点更多地放在你凭借计算机科学知识可能参与的项目上。首先快速概述一下“可计算”与“不可计算”的形式化概念；然后你会看到一份问题清单，用于询问和回答你可能正在开发的特定项目。这些问题都是必须解决的。


    ## 面向人的可计算性


    计算机科学的核心是可计算性概念。简单来说，可计算性是指可以通过系统性步骤解决的问题。这与算法不同，因为算法往往关注比可计算性问题更小的领域。因此，一个可计算性问题的解决方案可能包含一个或多个算法。


    > **注**

    > 如果你与不同的人交谈，会发现计算机科学的“核心”有多个候选，可计算性只是其中之一。它目前特别有用，因为许多当前用于向年轻人（甚至学龄前儿童）教授计算机科学的工具都聚焦于可计算性。


    可计算问题有两种基本类型：


    - **判定问题。** 给定一组项目，某个项目是否属于该组？这张发票是否属于未付账单的一部分？用户 ID 是否有权登录？这些都是答案为“是”或“否”的问题。

    - **函数或可计算问题。** 这些是需要计算的问题。X 乘以 Y 的乘积是多少？


    其他类型的可计算问题包括优化问题（如何最好地做某事——通常是在给定特定数据的情况下，如何最好地计算出这两种基本类型之一的答案）和搜索问题。问题通常被分解为子问题，这样即使是最复杂的问题也可以拆解成可计算的片段。


    思考可计算性问题的主要原因是能够（基于一些逻辑分析）有把握地说某个特定问题是可计算的还是不可计算的。毕竟，当人们考虑将自己的计算机科学知识付诸实践时，第一个问题就是：计算机科学能帮我解决这个问题吗？

