    # 声明式编程


    与命令式编程相反，声明式编程关注的是结果。作为开发者，你只需指定想要达成的目标，由运行环境（操作系统及其他组件）去实现该结果。某些结构（例如 Swift 中的一些高级函数）就是声明式的。`SQL`
    的基本语法也是声明式的。（`SQL` 是目前最常用的数据库语言。）


    ## 比较命令式编程与声明式编程


    如果想找出某城市特定街道上的所有建筑物，你可以采用命令式或声明式两种方式完成。（以下为概述。更多详情请见第 4 章“使用算法”中关于循环和高级函数的描述。）


    对于命令式方法，你需要遍历城市中的每栋建筑，检查它是否位于目标街道上，然后将这些建筑存入某个变量或其他存储位置。


    对于声明式方法，你只需指定想要某条街道上的所有建筑。操作系统和运行环境会自行完成必要操作——可能涉及某种循环——但你无需参与。你不需要编写那段代码。


    ## 并发编程


    并发编程和线程允许程序同时在多个处理器或芯片上运行。为此，必须对代码的执行方式施加约束，因为可用处理器通常以不同顺序运行。关于并发的更多内容，请参见第 10
    章“构建组件”中关于线程的章节。


    # 4. 使用算法


    算法是计算机科学的关键组成部分之一，但其历史可追溯到计算机诞生前很久的时期。在《磨坊主的故事》（1391 年）中，杰弗里·乔叟提到了“算数”石子，这些石子用于计数算法，但该术语和概念甚至比乔叟的时代还要早几个世纪。简单来说，算法就是一系列（通常为数值的）操作，按照特定顺序执行时会产生特定结果。


    这些操作序列可以用描述性语言写在纸上，也可以用代码编写。无论采用哪种形式——纸上还是代码中——它们都可以在构建应用程序、程序、模块和其他计算机科学组件时被反复使用。


    算法在计算机科学和应用程序中如此普遍，以至于许多人甚至没有注意到它们的存在，但理解它们是什么以及如何使用它们非常重要。这种理解可以帮助你充分发挥特定算法以及基于算法的各种编写和调试代码技术的效用。


    算法可以成为应用程序和系统的构建模块。“可以”是因为有些人认为数据结构才是构建模块，而另一些人则会选择其他各种构建模块。实际上，对于大多数应用程序和系统而言，取决于开发者的身份和系统的需求，多种构建模块都会发挥作用。


    通常所说的算法，就是本章开头提到的一系列步骤。请注意，在这个宽泛的定义中，并没有规定必须使用特定语言：它只是一系列步骤。在大多数情况下，这些步骤可以用任何语言编码。


    ## 思考算法的目的


    为什么要创建算法？为什么不直接编写代码？核心答案是，一个被清晰描述和定义的算法可以在许多场景中发挥作用。其逻辑和分析可以被重用。


    编写代码的成本很高。从设计和分析到编码和测试，过程中的每一步都可能代价昂贵。通常，人们只关注任务中的编码部分。经验丰富的开发者（以及管理者！）可以证明，已经编写但尚未测试的代码并非成品。


    第一步——设计和分析——常常被忽视，因为人们专注于编写代码，有时（但基本上）也会进行测试。设计和分析似乎不如代码和测试那样“真实”。然而，最小化编码和测试成本的关键往往就在于设计和分析。许多项目在缺乏清晰定义的情况下就匆忙推进，当缺乏清晰度的问题凸显出来时，项目就陷入了困境。


    通过规范化和系统化设计与分析，你可以构建一个稳健的项目。设计和分析的成本可以分摊到多个项目中（无论是通过正式方式还是凭借你自身的知识与经验），但设计和分析必须以严谨的方式进行，以便在当前项目及其他项目中能够被使用和重用。


    这就是算法发挥作用的地方。它们让你能够将分析规范化。一旦完成，你就可以将分析结果用于新的或现有的代码，而无需重复进行分析。随着你在软件开发领域积累经验，你会接触到许多算法，并为自己创建许多算法。通过对算法进行严谨的定义，其分析结果更容易被重用。


    这就是算法在软件开发中如此重要的原因：它们可以帮助你重用自己（以及他人）的工作成果，这样你就不必每次开始新项目时都从头开始。


    ## 创建一个数字命理学算法


    请记住，算法已经存在了几个世纪，其中许多算法在数字计算机出现之前就已存在。例如，许多著名的算法可以用来寻找素数。本章介绍的示例涉及一个简单的数字命理学问题。数字命理学是一种相信数字与事件或概念之间存在关联的信仰。有些人认为
    7 是幸运数字；另一些人则认为 13 不吉利。这些关联背后有原因，但在许多情况下，幸运（好或坏）的概念是在这些原因和解释之前还是之后出现，并不明确。


    数字命理学的一个特定应用是将字母表中的字母当作数字，并将它们相加得到一个代表该名字本身的数字。例如，如果你让字母 A 代表 1，B 代表 2，以此类推，那么名字"Dan"的数值如下为
    19：


    -   D = 4

    -   A = 1

    -   N = 14

    -   总和 = 19


    得到的数字本身可能被认为是幸运或不幸的，无论是单独来看，还是取决于其首位或末位数字（且存在多种解释方式）。


    -   将字母转换为数字也有多种变体。最常见的一种是让数字从 1 到 10 循环（可能因为这样更便于用手指计算）。在上面给出的例子（`Dan`）中，采用 1
    到 10 循环的变体结果如下：

    -   D = 4

    -   A = 1

    -   N = 4（数到 10 后重新从 1 开始）

    -   总和 = 9


    这里处理的东西绝对是一个算法，尽管有变体。它是一系列步骤：


    -   首先以某种方式将字母转换为数字；

    -   然后将这些数字相加。


    你可以基于数字命理学设计一个应用程序或系统，其中一步是“计算数字命理学数字”，然后该步骤可以通过算法来完成。


    ## 仔细审视算法


    通过这个简单的数字命理学算法，你可以看看它如何融入你可能编写的代码中。计算机科学中有三个基本概念与算法相似，但存在关键差异。这些类算法概念如下：


    -   函数

    -   对象

    -   设计模式


    这些概念在实现中常常会用到算法。


    ### 函数


    算法可以用英语等自然语言或数学术语来表达。如果你愿意，可以将其描述为抽象的或概念性的。将它们与函数进行比较，可以让这两个概念都变得更加清晰。


    简而言之，函数是算法在特定编程语言中的实现。算法可以帮助你设计一个应用程序或应用程序的一部分，而函数则可以成为其组成部分。

    '
- fmt: '### Objects


    Object-oriented programming is generally traced back to the `Simula` programming
    language in 1967\. Today, it is used in many, if not most, development processes.
    Briefly described, object-oriented programming uses objects that incorporate data
    and functionality to be self-contained and functional building blocks for apps.


    Algorithms can inform the development of objects, their methods, and data. Usually,
    they are part of the development process as they are in a full-fledged app. Objects
    rarely consist only of an algorithm’s implementation: that is more often the role
    of a function.


    ### Design Patterns


    Design patterns are sometimes considered alongside functions and algorithms. As
    commonly used, the term design pattern refers to a structure that can be used
    to implement an algorithm.


    One of the key concepts of an algorithm is the steps it defines. Design patterns
    are a feature of declarative programming in which the initial state and desired
    final state are declared, but the specific steps are not part of the design pattern.
    This alternative to declarative programming is often called imperative programming.


    ### Implementing the Numerology Algorithm in Swift


    The basic numerology algorithm is described previously in this chapter. In this
    section, you see one of the ways to convert it into code.


    **Note**


    You will see several other approaches to implementing the numerology algorithm
    (and others) throughout this book.


    Basically, the algorithm has two steps:


    - Convert each letter of a name (or other string) to a number.

    - Add all of the numbers.


    The discussion of the algorithm has identified a few open questions that need
    to be resolved in the implementation. This is common: the algorithm specifies
    the steps to follow, but it doesn’t normally contain code, and it may contain
    references to external questions and issues that need resolution in order to implement
    the algorithm.


    The most obvious point to consider is whether the conversion to a number is based
    on the letter’s position in the alphabet (1 to 26) in English or if the number
    uses only the numbers to 10 (perhaps useful if you’re counting on your fingers).
    In the first approach, the letter K would be 11, but in the second, it would be
    1.


    In order to implement the algorithm, you need to know which choice to make. In
    implementing this and any other algorithm, it is often a common practice to look
    at these choices and, to the extent possible, build an implementation that is
    general so that it can work with any of the choices. The more general an algorithm
    implementation is, the more likely it is that the implementation can be reused.


    The heart of the algorithm has to be the mechanism for converting a letter to
    a number. In order to set that up, you need to know which numbering scheme to
    use (1-26 or 1-10). In addition, as soon as you start to think about it, you’ll
    need to consider the letters you will be converting. Characters in software are
    can be either capital letters or lowercase. When we talk of the letter J, we normally
    mean J (uppercase) as well as j (lowercase). In converting a letter to a number,
    we need to know if we will be working with uppercase or lowercase letters.


    These are the types of questions that you encounter as you start analyzing an
    algorithm for the purpose of implementing it. Note that the algorithm, as described
    in English, doesn’t distinguish between upper- and lowercase letters. This type
    of detail often comes up in the implementation phase.


    **Tip**


    Upper- and lowercase letters are distinct. The styles of characters (italic, bold,
    underlined, and so forth) are applied to characters. Each letter and symbol in
    an alphabet that can be used in an app has a digital value (often called an ASCII
    code in old terminology). This numeric value is different from the numerology
    value. For example, uppercase A generally has a digital value of 65, while lowercase
    A is 97\. Those numbers are the same no matter what style is applied to the letter.


    These questions are general and abstract issues that need to be resolved in order
    to implement the algorithm. Sometimes, it is possible or even necessary to do
    such clarifications before any work on implementation is done. In other cases
    (and frequently with simple algorithms with only a few steps such as this one),
    you can implement each step separately. You may wind up slightly modifying the
    natural language description of the algorithm to specify how the output from one
    step is used in a subsequent step so that you don’t have to worry about implementing
    each step on its own.


    With enough people and other resources, you can even implement the steps out of
    sequence and simultaneously.'
