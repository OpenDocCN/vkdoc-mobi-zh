- fmt: "# Beginning the App (Utility Smart 1)\n\nUsing the basic questions from Chapter\
    \ [13](#A441106_1_En_13_Chapter.html), we began by thinking about what we wanted\
    \ to do. The point of the sliders was to provide a simple interface to let people\
    \ enter their observed and behavioral data in less than a minute. Figure [14-1](#A441106_1_En_14_Chapter.html#Fig1)\
    \ shows the first iteration of the app. (Note that this is Version 1.0 of Utility\
    \ Smart; it is no longer available in the App Store because it has been replaced\
    \ with the later versions shown in this chapter.)\n\n![A441106_1_En_14_Fig1_HTML.jpg](A441106_1_En_14_Fig1_HTML.jpg)\n\
    \n*Figure 14-1 Sliders, version 1*\n\nTo provide for flexibility, note that the\
    \ interface uses a navigation controller and navigation item that provides the\
    \ bar at the top of the window with Share button (left), and Save button (right).\
    \ It is embedded in a tab bar controller (note the tabs at the bottom).\n\n> **Note:**\
    \ The navigation controller provides the bar at the top of the window; the navigation\
    \ item, which is the lower part of the navigation controller, is where the buttons\
    \ and title are located.\n\nThis type of user interface is flexible because it’s\
    \ easy to add up to five tabs at the bottom, and, with the addition of more buttons\
    \ in the navigation controller at the top, you easily have a variety of destinations\
    \ from any view in the app.\n\n`Utility Smart` has run on all iOS devices including\
    \ iPad from the beginning, but many developers find it easier to work from the\
    \ small devices and scale up than the reverse. That is the case here: the basic\
    \ development is done on iPhone; Auto Layout is used for refinements.\n\nThe sliders\
    \ are a useful part of the Cocoa Touch framework, and it’s not difficult to reinforce\
    \ the meaning of the settings by adjusting the background color to reflect the\
    \ value of the slider. The code is shown later in this chapter, and the result\
    \ is shown in Figure [14-2](#A441106_1_En_14_Chapter.html#Fig2).\n\n![A441106_1_En_14_Fig2_HTML.jpg](A441106_1_En_14_Fig2_HTML.jpg)\n\
    \n*Figure 14-2 Set background color based on slider value*\n\nThe interface you\
    \ see in Figure [14-2](#A441106_1_En_14_Chapter.html#Fig2) is quite impressive\
    \ to demonstrate: you slide the slider back and forth and the background color\
    \ changes (from red to green to red) to reflect the environmental impact. It’s\
    \ very impressive.\n\nAnd not very subtle. Although we are working with small\
    \ devices, their screens are powerful and, with today’s resolutions, you don’t\
    \ need such blunt tools to get peoples’ attention. Figure [14-3](#A441106_1_En_14_Chapter.html#Fig3)\
    \ shows the next iteration. It actually uses the same code based on the slider\
    \ values; this time, instead of changing the background color of the slider view,\
    \ the background color of the text is changed. In addition, the navigation bar’s\
    \ color is changed to a standard color for all of the app screens.\n\n![A441106_1_En_14_Fig3_HTML.jpg](A441106_1_En_14_Fig3_HTML.jpg)\n\
    \n*Figure 14-3 Text backgrounds change*\n\nThere is space on the view for comments\
    \ to be shown to encourage positive behaviors. (This is in addition to the colors\
    \ of the text background.)\n\nAs you work with interfaces, you’ll soon learn the\
    \ cardinal rule: there is never enough space. (If you are designing a sign for\
    \ the Goodyear blimp, there’s not enough space.)\n\nFigure [14-4](#A441106_1_En_14_Chapter.html#Fig4)\
    \ shows the introductory screen of `Utility Smart 1.0` with scrolling text that\
    \ extends beyond the window. In addition to not having enough room for all the\
    \ text, project team discussions brought up the fact that there really should\
    \ be two types of information:\n\n- Information about the resource as shown in\
    \ Figure [14-4](#A441106_1_En_14_Chapter.html#Fig4) is one type of information.\n\
    - A second type of information — tips or advice — can help people learn what they\
    \ can do to help use resources wisely.\n\nIt would be nice to have more space\
    \ and to be able to differentiate between the two types of information. By emphasizing\
    \ the different types of information in this and other cases, you can make it\
    \ more usable for the user.\n\n![A441106_1_En_14_Fig4_HTML.jpg](A441106_1_En_14_Fig4_HTML.jpg)\n\
    \n*Figure 14-4 Not enough space …*\n\n## Refining the App (Utility Smart 2)\n\n\
    It’s very common that as an app like this evolves, you have to stop complaining\
    \ about not having enough space and do something about it. The solution for `Utility\
    \ Smart 2` is to break one aspect of the interface. Instead of putting all the\
    \ sliders on one screen, if you split them apart with one slider per screen, you\
    \ have much more space to work with. You lose the ability to see everything all\
    \ at once, but you can have more space for information.\n\nThat is the approach\
    \ taken in `Utility Smart 2`. Figure [14-5](#A441106_1_En_14_Chapter.html#Fig5)\
    \ shows a single slider.\n\n![A441106_1_En_14_Fig5_HTML.jpg](A441106_1_En_14_Fig5_HTML.jpg)\n\
    \n*Figure 14-5 One slider per page*\n\nThere’s much more space now for background\
    \ information. Because the sliders are no longer on one screen, it doesn’t make\
    \ too much sense to share one slider’s data, so that frees up the space at the\
    \ left of the navigation item. It can be replaced with an Info button as you see\
    \ in Figure [14-5](#A441106_1_En_14_Chapter.html#Fig5). That button can be connected\
    \ in the storyboard to a popover for a tip as you see in Figure [14-6](#A441106_1_En_14_Chapter.html#Fig6).\n\
    \n![A441106_1_En_14_Fig6_HTML.jpg](A441106_1_En_14_Fig6_HTML.jpg)\n\n*Figure 14-6\
    \ Tip popover*\n\nThis is a much more efficient use of space. It’s more elegant\
    \ and it is much more extensible for more information. Because popover views are\
    \ full-fledged views, if you wanted to come back and put a video into a tip popover,\
    \ that’s easy to do.\n\nOne of the important lessons to learn in computer science\
    \ is to constantly remember how you can implement features that have room for\
    \ extension and expansion.\n\nAnother vital lesson to learn is that you can’t\
    \ design a good interface sitting at your desk. In fact, as a developer, you probably\
    \ know too much about what the app can do to be able to build a useful interface\
    \ for people who have never seen it before (or for people who have seen it before\
    \ but approach it from a different perspective).\n\nFigure [14-7](#A441106_1_En_14_Chapter.html#Fig7)\
    \ shows `Utility Smart` team members Curt Gervich, Maeve Sherry, and Michael Otton\
    \ sharing interface ideas and reactions with a science class at Plattsburgh High\
    \ School taught by Sonal Patel-Dame. Trying out ideas and suggestions with a broad\
    \ range of users and potential users can help you refine your interface.\n\n![A441106_1_En_14_Fig7_HTML.jpg](A441106_1_En_14_Fig7_HTML.jpg)\n\
    \n*Figure 14-7 Utility Smart 2 interface brainstorming session*\n\n## Code Snippets\n\
    \nThe code to implement parts of this interface is simple because it uses some\
    \ very basic Cocoa Touch tools.\n\n### Creating a Popover: Code\n\nThe popover\
    \ will be presented from a view controller. As is usually the case, you create\
    \ a subclass of `UIViewController`. The important code is shown in Listing [14-1](#A441106_1_En_14_Chapter.html#Par33).\n\
    \nHere are the steps to implement the popover in the view controller:\n\n- Make\
    \ the view controller a `UIPopoverPresentationControllerDelegate` in the class\
    \ declaration.\n- Create the popover in the storyboard (shown in the following\
    \ section).\n- Implement `prepare(for segue:)` for the popover.\n- Add `adaptivePresentationStyle(for\
    \ controller:)` to manage popover size.\n\n```swift\nimport UIKit\nclass NowPageViewController:\
    \ UIViewController, UIPopoverPresentationControllerDelegate {\n    ... code omitted\n\
    \    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {\n   \
    \     switch segue.identifier! {\n        case \"tipPopoverSegue\":\n        \
    \    segue.destination.popoverPresentationController!.delegate = self\n      \
    \  default: break\n        }\n    }\n    func adaptivePresentationStyle(for controller:\
    \ UIPresentationController, traitCollection: UITraitCollection) -> UIModalPresentationStyle\n\
    \    {\n        return .none\n    }\n    ... code omitted\n}\n```\n\n*Listing\
    \ 14-1 Creating a popover*"
  raw: '## Beginning the App (Utility Smart 1)


    Using the basic questions from Chapter [13](#A441106_1_En_13_Chapter.html), we
    began by thinking about what we wanted to do. The point of the sliders was to
    provide a simple interface to let people enter their observed and behavioral data
    in less than a minute. Figure [14-1](#A441106_1_En_14_Chapter.html#Fig1) shows
    the first iteration of the app. (Note that this is Version 1.0 of Utility Smart;
    it is no longer available in the App Store because it has been replaced with the
    later versions shown in this chapter.)


    ![A441106_1_En_14_Fig1_HTML.jpg](A441106_1_En_14_Fig1_HTML.jpg)


    Figure 14-1


    Sliders, version 1


    To provide for flexibility, note that the interface uses a navigation controller
    and navigation item that provides the bar at the top of the window with Share
    button (left), and Save button (right). It is embedded in a tab bar controller
    (note the tabs at the bottom).


    Note


    The navigation controller provides the bar at the top of the window; the navigation
    item, which is the lower part of the navigation controller, is where the buttons
    and title are located.


    This type of user interface is flexible because it’s easy to add up to five tabs
    at the bottom, and, with the addition of more buttons in the navigation controller
    at the top, you easily have a variety of destinations from any view in the app.


    Utility Smart has run on all iOS devices including iPad from the beginning, but
    many developers find it easier to work from the small devices and scale up than
    the reverse. That is the case here: the basic development is done on iPhone; Auto
    Layout is used for refinements.


    The sliders are a useful part of the Cocoa Touch framework, and it’s not difficult
    to reinforce the meaning of the settings by adjusting the background color to
    reflect the value of the slider. The code is shown later in this chapter, and
    the result is shown in Figure [14-2](#A441106_1_En_14_Chapter.html#Fig2) .


    ![A441106_1_En_14_Fig2_HTML.jpg](A441106_1_En_14_Fig2_HTML.jpg)


    Figure 14-2


    Set background color based on slider value


    The interface you see in Figure [14-2](#A441106_1_En_14_Chapter.html#Fig2) is
    quite impressive to demonstrate: you slide the slider back and forth and the background
    color changes (from red to green to red) to reflect the environmental impact.
    It’s very impressive.


    And not very subtle. Although we are working with small devices, their screens
    are powerful and, with today’s resolutions, you don’t need such blunt tools to
    get peoples’ attention. Figure [14-3](#A441106_1_En_14_Chapter.html#Fig3) shows
    the next iteration. It actually uses the same code based on the slider values;
    this time, instead of changing the background color of the slider view, the background
    color of the text is changed. In addition, the navigation bar’s color is changed
    to a standard color for all of the app screens.


    ![A441106_1_En_14_Fig3_HTML.jpg](A441106_1_En_14_Fig3_HTML.jpg)


    Figure 14-3


    Text backgrounds change


    There is space on the view for comments to be shown to encourage positive behaviors
    . (This is in addition to the colors of the text background.)


    As you work with interfaces, you’ll soon learn the cardinal rule: there is never
    enough space. (If you are designing a sign for the Goodyear blimp, there’s not
    enough space.)


    Figure [14-4](#A441106_1_En_14_Chapter.html#Fig4) shows the introductory screen
    of Utility Smart 1.0 with scrolling text that extends beyond the window. In addition
    to not having enough room for all the text, project team discussions brought up
    the fact that there really should be two types of information :


    *   Information about the resource as shown in Figure [14-4](#A441106_1_En_14_Chapter.html#Fig4)
    is one type of information.

    *   A second type of information — tips or advice — can help people learn what
    they can do to help use resources wisely.


    It would be nice to have more space and to be able to differentiate between the
    two types of information. By emphasizing the different types of information in
    this and other cases, you can make it more usable for the user.


    ![A441106_1_En_14_Fig4_HTML.jpg](A441106_1_En_14_Fig4_HTML.jpg)


    Figure 14-4


    Not enough space …


    ## Refining the App (Utility Smart 2)


    It’s very common that as an app like this evolves, you have to stop complaining
    about not having enough space and do something about it. The solution for Utility
    Smart 2 is to break one aspect of the interface. Instead of putting all the sliders
    on one screen, if you split them apart with one slider per screen, you have much
    more space to work with. You lose the ability to see everything all at once, but
    you can have more space for information.


    That is the approach taken in Utility Smart 2\. Figure [14-5](#A441106_1_En_14_Chapter.html#Fig5)
    shows a single slider .


    ![A441106_1_En_14_Fig5_HTML.jpg](A441106_1_En_14_Fig5_HTML.jpg)


    Figure 14-5


    One slider per page


    There’s much more space now for background information . Because the sliders are
    no longer on one screen, it doesn’t make too much sense to share one slider’s
    data, so that frees up the space at the left of the navigation item. It can be
    replaced with an Info button as you see in Figure [14-5](#A441106_1_En_14_Chapter.html#Fig5).
    That button can be connected in the storyboard to a popover for a tip as you see
    in Figure [14-6](#A441106_1_En_14_Chapter.html#Fig6).


    ![A441106_1_En_14_Fig6_HTML.jpg](A441106_1_En_14_Fig6_HTML.jpg)


    Figure 14-6


    Tip popover


    This is a much more efficient use of space. It’s more elegant and it is much more
    extensible for more information. Because popover views are full-fledged views
    , if you wanted to come back and put a video into a tip popover, that’s easy to
    do.


    One of the important lessons to learn in computer science is to constantly remember
    how you can implement features that have room for extension and expansion.


    Another vital lesson to learn is that you can’t design a good interface sitting
    at your desk. In fact, as a developer, you probably know too much about what the
    app can do to be able to build a useful interface for people who have never seen
    it before (or for people who have seen it before but approach it from a different
    perspective).


    Figure [14-7](#A441106_1_En_14_Chapter.html#Fig7) shows Utility Smart team members
    Curt Gervich, Maeve Sherry, and Michael Otton sharing interface ideas and reactions
    with a science class at Plattsburgh High School taught by Sonal Patel-Dame. Trying
    out ideas and suggestions with a broad range of users and potential users can
    help you refine your interface.


    ![A441106_1_En_14_Fig7_HTML.jpg](A441106_1_En_14_Fig7_HTML.jpg)


    Figure 14-7


    Utility Smart 2 interface brainstorming session


    ## Code Snippets


    The code to implement parts of this interface is simple because it uses some very
    basic Cocoa Touch tools.


    ### Creating a Popover: Code


    The popover will be presented from a view controller. As is usually the case,
    you create a subclass of UIViewController. The important code is shown in Listing
    [14-1](#A441106_1_En_14_Chapter.html#Par33).


    Here are the steps to implement the popover in the view controller:


    *   Make the view controller a `UIPopoverPresentationControllerDelegate in the
    class declaration.`

    *   `Create the popover in the storyboard (shown in the following section).`

    *   `Implement prepare(for segue:) for the popover.`

    *   `Add adaptivePresentationStyle (for controller:) to manage popover size.`


    ```

    import UIKit

    class NowPageViewController: UIViewController, UIPopoverPresentationControllerDelegate
    {

    ... code omitted

    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {

    switch segue.identifier! {

    case "tipPopoverSegue":

    segue.destination.popoverPresentationController!.delegate = self

    default: break

    }

    }

    func adaptivePresentationStyle(for controller: UIPresentationController, traitCollection:
    UITraitCollection) -> UIModalPresentationStyle

    {

    return .none

    }

    ... code omitted

    Listing 14-1

    Creating a popover

