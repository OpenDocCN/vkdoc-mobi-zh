    \ arrays goes back to the 1950s.) By using such references, you can continue the\
    \ basic idea of cutting back a stack. It is just a little bit more complicated\
    \ because the operating system has to recognize that when it cuts back an array\
    \ reference word from the stack, it must release the associated memory for the\
    \ array in question.\n\nAll of this can work well even though it takes some time\
    \ and processing power to handle the references. An array is declared in a procedure,\
    \ method, or function and its elements are referenced somewhere else in memory.\
    \ The “somewhere” else is referred to commonly as the heap. That’s just what it\
    \ is — an unstructured heap of data. When the data for an array or other structured\
    \ item is stored in the heap via a reference from the stack, things are relatively\
    \ easy to manage.\n\nThe big problem arises when there is data in the heap that\
    \ is not associated with a stack reference word. This situation is handled with\
    \ yet another strategy. The operating system still uses reference words on the\
    \ stack to refer to unstructured data in the heap, but there’s a new element added\
    \ to the process. The operating system keeps track of the number of reference\
    \ words pointing to some data in the heap. In the case of a reference word on\
    \ the stack, there’s only one reference: the one from the stack. However, when\
    \ there is shared data, this unstructured data on the heap may be referred to\
    \ by many references throughout your app. When the operating system notices that\
    \ the number of references to the data decreases to zero, it can reuse that memory\
    \ space.\n\nAll of this requires the operating system to keep track of the stacks\
    \ (for each app that’s running); storage in the heap; and, in the case of mobile\
    \ devices, constant changes in location as well as phone calls; messages; tweets;\
    \ and everything else that’s going on in those devices. The amount of storage\
    \ and processing power that are used for these operations are significant in any\
    \ computer.\n\n> **Tip**  \n> All of this work that is done behind the scenes\
    \ on any computer is most successful when users don’t know that it’s even happening.\
    \ However, when you are considering configuring a computer (or buying a new one),\
    \ these resources have to be factored into your requirements. Having enough storage\
    \ space for your library of a thousand songs and nothing more is not going to\
    \ leave you with a functioning computer.\n\n## Basic Types\n\nThe basic types\
    \ for most computer languages represent numbers, characters, and strings in various\
    \ ways. Although the storage is ultimately one or more computer words, the distinctions\
    \ among these types are implemented in software — the operating system and the\
    \ apps that run on computers. Computer words are basically interchangeable. In\
    \ fact, one of the great breakthroughs in the development of compilers and computer\
    \ languages was the realization that the data stored in and manipulated by a computer\
    \ could be what we normally would consider data (numbers, for example) and it\
    \ could also be computer instructions (add two numbers perhaps).\n\nThere is another\
    \ type of storage that is used behind the scenes in computer systems. Words can\
    \ contain internal operational data and instructions that are required for the\
    \ operation of the computer itself. For example, reference words (described in\
    \ the previous section) are stored in the same physical words that could otherwise\
    \ be used for traditional data, but the operating system makes certain that such\
    \ data is protected from unauthorized manipulation by apps and users.\n\n### Numeric\
    \ Storage\n\nThere are two ways to store numbers: they can be stored as integers\
    \ (whole numbers) or numbers with a fractional component (commonly referred to\
    \ by various names such as decimal numbers, which is actually a misleading term\
    \ in some cases).\n\n#### Using Integers\n\nInteger numbers are simple numbers.\
    \ You can convert the bits in a computer word into a base-2 number and there you\
    \ have a number that can be converted into any other base, but the most common\
    \ conversion is from base 2 to base 10.\n\nComputers typically use almost an entire\
    \ word to store integers. “Almost” the entire word because one bit is often reserved\
    \ as a sign bit: it indicates whether the number is positive or negative. In old\
    \ computers, storage space was so scarce that “wasting” it in a sign seemed to\
    \ be a shame in many cases where the number could never be negative. Thus, you\
    \ will find old documentation and descriptions are integers and unsigned integers\
    \ as separate types. Today, most integers on most operating systems do have a\
    \ sign bit.\n\nIn describing the conversion of bits in a word to a binary number,\
    \ there are two methods you can use. They are referred to as big-endian and little-endian\
    \ depending on whether the sequence of bits should be interpreted from the most\
    \ significant to least significant digit or vice versa.\n\nThis matters when you\
    \ get down to the extreme details of architectures, but today this is generally\
    \ hidden from view so that by the time you receive a stream of bits over a communications\
    \ channel, the software at both ends has converted it to formats that don’t rely\
    \ on endianness.\n\n#### Using Floating Point Numbers\n\nThere are a number of\
    \ common ways of using floating point numbers. Typically, the implementation of\
    \ floating point numbers is left to a special processor — a floating point unit\
    \ (`FPU`). The basics of storing floating points numbers generally consist of\
    \ the following logic:\n\n*   The number is basically stored as an integer that\
    \ may be signed. This may be called a significand.\n*   Separately, an exponent\
    \ is stored as another integer that also may be signed.\n\nTogether, most numbers\
    \ can be represented. For example, the number 12 can be stored with a significand\
    \ of 12 (base 10), which may be stored in binary as `1100`.\n\n> **Binary Number\
    \ Notation**  \n> In common usage, we talk about the places of a number starting\
    \ from the decimal point (see note later in this sidebar about decimal points)\
    \ and moving to the left or the right. The first place to the left of the point\
    \ is for values of 0 to the base - 1. In base-10, that means that place (or any\
    \ other) can have the digits 0-9, but in base-2 any place can have digits 0-1.\
    \  \n>  \n> The next place to the left is the base itself. Thus, in base-10, 12\
    \ is interpreted as 2x1 plus 1x10.  \n>  \n> In binary, the number is 12. Start\
    \ from the right-hand side, which is where the point would be and calculate: \
    \ \n>  \n> *   0x1\n> *   0x2\n> *   1x4\n> *   1x8\n>  \n> The sum is 12.  \n\
    >  \n> The second place to the left is for the number of items in the base to\
    \ the second power. Thus, in base-10, the number 213 is 3x1 plus 1x10, plus 2x100.\
    \  \n>  \n> There is disagreement over what to call the decimal point in non-base-10\
    \ systems. Some people make the argument that a decimal point is unique to base-10\
    \ (decimal) systems. Others argue that it is not unique to base-10 just as digit\
    \ can be used to refer to a character in any base as long as it is valid.  \n\
    >  \n> If you want an unambiguous generic term for the decimal point, you can\
    \ call it a radix point. Mathematicians (and perhaps no one else) will understand\
    \ you. In this chapter, we hedge a bit and refer to it as a point, which is a\
    \ commonly used way of avoiding unnecessary arguments."
  raw: '### Heaps


    Stacks are a simple way of organizing and reusing memory, but there’s one big
    problem: not all data fits nicely onto a stack of computer words. Many data structures
    are much bigger than a single word. The simplest example of these are the collections
    discussed in Chapter [6](#A441106_1_En_6_Chapter.html). Almost every computer
    language has its collection types, and storing them has always been a challenge.
    One way it is addressed has been to place a computer word on the stack that has
    a special meaning — it is a reference to the actual data that is placed elsewhere
    in the computer’s memory. (This method of handling arrays goes back to the 1950s.)
    By using such references, you can continue the basic idea of cutting back a stack.
    It is just a little bit more complicated because the operating system has to recognize
    that when it cuts back an array reference word from the stack, it must release
    the associated memory for the array in question.


    All of this can work well even though it takes some time and processing power
    to handle the references. An array is declared in a procedure, method, or function
    and its elements are referenced somewhere else in memory. The “somewhere” else
    is referred to commonly as the heap. That’s just what it is — an unstructured
    heap of data. When the data for an array or other structured item is stored in
    the heap via a reference from the stack, things are relatively easy to manage.


    The big problem arises when there is data in the heap that is not associated with
    a stack reference word. This situation is handled with yet another strategy. The
    operating system still uses reference words on the stack to refer to unstructured
    data in the heap, but there’s a new element added to the process. The operating
    system keeps track of the number of reference words pointing to some data in the
    heap. In the case of a reference word on the stack, there’s only one reference:
    the one from the stack. However, when there is shared data, this unstructured
    data on the heap may be referred to by many references throughout your app. When
    the operating system notices that the number of references to the data decreases
    to zero, it can reuse that memory space.


    All of this requires the operating system to keep track of the stacks (for each
    app that’s running); storage in the heap; and, in the case of mobile devices,
    constant changes in location as well as phone calls; messages; tweets; and everything
    else that’s going on in those devices. The amount of storage and processing power
    that are used for these operations are significant in any computer.


    Tip


    All of this work that is done behind the scenes on any computer is most successful
    when users don’t know that it’s even happening. However, when you are considering
    configuring a computer (or buying a new one), these resources have to be factored
    into your requirements. Having enough storage space for your library of a thousand
    songs and nothing more is not going to leave you with a functioning computer.


    ## Basic Types


    The basic types for most computer languages represent numbers, characters, and
    strings in various ways. Although the storage is ultimately one or more computer
    words, the distinctions among these types are implemented in software — the operating
    system and the apps that run on computers. Computer words are basically interchangeable.
    In fact, one of the great breakthroughs in the development of compilers and computer
    languages was the realization that the data stored in and manipulated by a computer
    could be what we normally would consider data (numbers, for example) andit could
    also be computer instructions (add two numbers perhaps).


    There is another type of storage that is used behind the scenes in computer systems.
    Words can contain internal operational data and instructions that are required
    for the operation of the computer itself. For example, reference words (described
    in the previous section) are stored in the same physical words that could otherwise
    be used for traditional data, but the operating system makes certain that such
    data is protected from unauthorized manipulation by apps and users.


    ### Numeric Storage


    There are two was to store numbers: they can be stored as integers (whole numbers)
    or numbers with a fractional component (commonly referred to by various names
    such as decimal numbers, which is actually a misleading term in some cases).


    ### Using Integers


    Integer numbers are simple numbers. You can convert the bits in a computer word
    into a base-2 number and there you have a number that can be converted into any
    other base, but the most common conversion is from base 2 to base 10.


    Computers typically use almost an entire word to store integers. “Almost” the
    entire word because one bit is often reserved as a sign bit: it indicates whether
    the number is positive or negative. In old computers, storage space was so scarce
    that “wasting” it in a sign seemed to be a shame in many cases where the number
    could never be negative. Thus, you will find old documentation and descriptions
    are integers and unsigned integers as separate types. Today, most integers on
    most operating systems do have a sign bit.


    In describing the conversion of bits in a word to a binary number, there are two
    methods you can use. They are referred to as big-endian and low-endian depending
    on whether the sequence of bits should be interpreted from the most significant
    to least significant digit or vice versa.


    This matters when you get down to the extreme details of architectures, but today
    this is generally hidden from view so that by the time you receive a stream of
    bits over a communications channel, the software at both ends has converted it
    to formats that don’t rely on ended-ness.


    ### Using Floating Point Numbers


    There are a number of common ways of using floating point numbers. Typically,
    the implementation of floating point numbers is left to a special processor —
    a floating point unit (FPU). The basics of storing floating points numbers generally
    consist of the following logic:


    *   The number is basically stored as an integer that may be signed. This may
    be called a significand.

    *   Separately, an exponent is stored as another integer that also may be signed.


    Together, most numbers can be represented. For example, the number 12 can be stored
    with a significand of 12 (base 10), which may be stored in binary as 1100.


    BINARY NUMBER NOTATION


    In common usage, we talk about the places of a number starting from the decimal
    point (see note later in this sidebar about decimal points) and moving to the
    left or the right. The first place to the left of the point is for values of 0
    to the base - 1\. In base-10, that means that place (or any other) can have the
    digits 0-9, but in base-2 any place can have digits 0-1.


    The next place to the left is the base itself. Thus, in base-10, 12 is interpreted
    as 2x1 plus 1x10.


    In binary, the number is 12\. Start from the right-hand side, which is where the
    point would be and calculate:


    *   0x1

    *   0x2

    *   1x4

    *   1x8


    The sum is 12.


    The second place to the left is for the number of items in the base to the second
    power. Thus, in base-10, the number 213 is 3x1 plus 1x10, plus 2x100.


    There is disagreement over what to call the decimal point in non-base-10 systems.
    Some people make the argument that a decimal point is unique to base-10 (decimal)
    systems. Others argue that it is not unique to base-10 just as digit can be used
    to refer to a character in any base as long as it is valid.


    If you want an unambiguous generic term for the decimal point, you can call it
    a radix point. Mathematicians (and perhaps no one else) will understand you. In
    this chapter, we hedge a bit and refer to it as a point, which is a commonly used
    way of avoiding unnecessary arguments .'
  trans: "\n### 堆\n\n栈是一种组织与重用内存的简单方式，但存在一个重大问题：并非所有数据都能恰好放置在计算机字的栈中。许多数据结构远大于单个字。最简单的例子是第\
    \ 6 章讨论的集合。几乎每种计算机语言都有其集合类型，而如何存储它们始终是一项挑战。一种解决方式是在栈上放置一个具有特殊含义的计算机字——它是对实际数据的引用，这些数据位于计算机内存的其他位置。（这种处理数组的方法可追溯到\
    \ 20 世纪 50 年代。）通过使用此类引用，你可以继续沿用缩减栈的基本思路。只是过程稍显复杂，因为操作系统须识别到：当它从栈中移除一个数组引用字时，必须释放该数组关联的内存。\n\
    \n尽管处理引用需要耗费一些时间和处理能力，这一切仍能良好运行。数组在过程、方法或函数中被声明，而其元素在内存的其他位置被引用。这个“其他位置”通常被称为堆。它本质上就是一堆非结构化的数据。当数组或其他结构化条目的数据通过栈的引用存储在堆中时，管理起来相对容易。\n\
    \n当堆中存在与栈引用字不关联的数据时，重大问题便会出现。这种情况需采用另一种策略处理。操作系统仍使用栈上的引用字来引用堆中的非结构化数据，但在此过程中加入了一个新要素。操作系统会记录指向堆中某数据的引用字数量。对于栈上的引用字，只存在一个引用：即来自栈的引用。然而，当数据被共享时，堆上的这个非结构化数据可能被应用中多个引用所指向。当操作系统注意到指向该数据的引用数量降至零时，它便可以重用那块内存空间。\n\
    \n这一切要求操作系统追踪（每个正在运行应用的）栈、堆中的存储，以及（在移动设备上）位置的持续变化，还有电话、短信、推文以及设备中所有其他活动。这些操作所消耗的存储和处理能力在任何计算机上都相当可观。\n\
    \n> **提示**  \n> 对于任何计算机，所有这些在后台进行的工作，最理想的状况是用户甚至不知道它的发生。然而，当你考虑配置一台计算机（或购买新机）时，必须将这些资源纳入你的需求考量。若只为存储一千首歌曲的库而配置足够空间，却别无冗余，你的计算机将无法正常运行。\n\
    \n## 基本类型\n\n大多数计算机语言的基本类型以不同方式表示数字、字符和字符串。尽管存储形式最终是一个或多个计算机字，但这些类型之间的区别是通过软件——即操作系统和运行在计算机上的应用——来实现的。计算机字在本质上是可互换的。事实上，编译器与计算机语言发展史上的重大突破之一，便是认识到计算机中存储和处理的数据，既可以是我们通常认为的数据（例如数字），也可以是计算机指令（例如将两个数相加）。\n\
    \n计算机系统中还有一种用于后台的存储类型。计算机字可以包含操作系统自身运行所需的内部操作数据和指令。例如，引用字（如前所述）存储在原本可用于传统数据的相同物理字中，但操作系统会确保此类数据免受应用和用户的未授权操作。\n\
    \n### 数值存储\n\n数字的存储有两种方式：可以存储为整数（整型数），或带有小数部分的数字（通常有多种称呼，例如十进制数，但此术语在某些情况下实则具有误导性）。\n\
    \n#### 使用整数\n\n整数是简单的数字。你可以将计算机字中的位转换为二进制数，进而得到一个可转换为任意其他进制的数，但最常见的转换是从二进制转换为十进制。\n\
    \n计算机通常使用几乎整个字来存储整数。“几乎”整个字是因为其中一位常被保留作为符号位：用于指示数字是正数还是负数。在旧式计算机中，存储空间极其稀缺，在许多数字永远不可能为负数的情况下，将一位“浪费”在符号位上似乎令人惋惜。因此，你会在旧的文档和描述中看到整数和无符号整数被列为不同的类型。如今，大多数操作系统上的整数大多包含符号位。\n\
    \n在描述将字中的位转换为二进制数时，有两种方法可供使用。它们分别被称为大端序和小端序，这取决于位的序列应按从最高有效位到最低有效位解读，还是相反。\n\n\
    当你深入到体系结构的极端细节时，这很重要；但如今，这一点通常被隐藏起来，因此当通过通信信道接收位流时，两端的软件已将其转换为不依赖于端序的格式。\n\n####\
    \ 使用浮点数\n\n使用浮点数有多种常见方式。通常，浮点数的实现交由一个专门的处理器——**浮点运算单元**（`FPU`）来处理。存储浮点数的基本原理通常包含以下逻辑：\n\
    \n*   数字基本上存储为一个可能带符号的整数。这被称为尾数。\n*   另外，指数作为另一个可能带符号的整数存储。\n\n两者结合，可以表示大多数数字。例如，数字\
    \ 12 可以用尾数 12（十进制）来存储，在二进制中可能表示为`1100`。\n\n> **二进制数表示法**  \n> 通常用法中，我们从小数点的位置（参见本边栏中关于小数点的后续说明）开始向左或向右讨论数字的位数。小数点左边第一位表示\
    \ 0 到基数减一的值。在十进制中，这意味着该位（或任何其他位）可以取数字 0-9，但在二进制中，任何位可以取数字 0-1。  \n>  \n> 再向左一位表示基数本身。因此，在十进制中，12\
    \ 被解读为 2x1 加上 1x10。  \n>  \n> 二进制中，数字 12 的表示法是：从右侧（即小数点所在位置）开始计算：  \n>  \n> *\
    \   0x1\n> *   0x2\n> *   1x4\n> *   1x8\n>  \n> 总和为 12。  \n>  \n> 左边第二位表示基数的二次方。因此，在十进制中，数字\
    \ 213 是 3x1 加上 1x10，再加上 2x100。  \n>  \n> 对于非十进制系统中的小数点如何称呼存在争议。有些人认为小数点（decimal\
    \ point）是十进制系统独有的。另一些人则认为它并非十进制独有，正如“数字”（digit）一词可用于指代任何基数中有效的字符。  \n>  \n> 如果你想要一个无歧义的通用术语来指代小数点，可以称之为基数点。数学家（或许只有他们）会理解你。本章中，我们稍作折中，将其称为点（point），这是一种避免不必要争论的常用方式。\n"
- fmt: '### Storing Strings and Characters


    Strings and characters are used to display text in apps… sometimes. Text can appear
    in images that are displayed in apps, and although you may think that they are
    strings and characters, when they are part of an image, they are as much an image
    as a photo of a cloud is.


    Characters are represented by a sequence of bits. Depending on the characters
    and language involved, a different number of bits can be involved. Initially,
    characters in were six bits long, and then it stretched to eight. Today, with
    Unicode characters, most of the characters and most of the world’s languages can
    be displayed. The most commonly used encodings you will encounter are `UTF-8`,
    `UTF-16`, and `UTF-32` (the number represents the number of bits used in a single
    character).


    Strings are sequences of characters. As you can see from the possible lengths
    of the characters, a string can easily extend far beyond a single computer word
    so strings are normally not stored on the stack but are accessed with some form
    of a reference word.


    ### Creating New Types


    When you declare a constant or variable, you specify its type. You can do that
    with a type annotation or by setting a value for the constant or variable so that
    Swift can infer the type as you see in the following examples.


    ```

    var myVariable:Int // type annotation

    var myVariable = 20 // inferred type

    ```


    The type annotation becomes important when the inferred type might be not what
    you want. For example, although `20` would let Swift infer an `Int` type, the
    following code will make the variable into a `Double`.


    ```

    var myVariable: Double = 20 // type annotation overrides inferred Int type

    ```


    You can also declare new types in Swift. Other modern languages allow you to do
    this as well, but traditional languages limit the types you can use to what is
    built into the language and its compilers. This allows for the type checking described
    previously in this chapter to be used to catch errors at the coding/compiling
    process rather than when the user is trying to use your app.


    You can declare new types in Swift. Once declared, you can use them just as the
    original types declaring variables and constants using them and using your new
    types in type annotations. Your new types are built on the existing types already
    in Swift (and in your own code). You can, for example, create a type that relies
    on `Int` types. Your type can be used alongside `Int` types. (You will see how
    this is useful in the following section, “Working with Tuples.”)


    To declare a new type, you use the Swift `typealias` syntax in which one type
    is aliased to another. One reason to do this is to improve the readability of
    your code. You can (and should) name your constants and variables in a way that
    makes it clear what they are, but sometimes you want to refine your nomenclature
    so that it is more precise. For example, if you use the built-in `String` type
    to name items that you deal with in your app, using the `String` type is fine.


    You may want to use a type alias to specify to yourself and others what exactly
    that string represents. So you could use a `typealias` like this:


    ```

    typealias productName = String

    ```


    You can now use `productName` in declarations such as the following:


    ```

    var widget1:productName = "Widget 1"

    var widget2:productName = "Widget 2"

    ```


    You can move beyond simple names to use a `typealias` for a collection type. For
    example, you could create an array of your inventory:


    ```

    var inventory = Array ()

    inventory = [widget1, widget2]

    ```


    You can add other arrays to an array as long as you respect the type. Because
    arrays can have duplicate elements, you can make another array out of `widget1`
    and add that array to `inventory`.


    ```

    inventory += [widget1]

    print (inventory)

    ```


    You can see the results in Figure [7-1](#A441106_1_En_7_Chapter.html#Fig1).


    ![A441106_1_En_7_Fig1_HTML.jpg](A441106_1_En_7_Fig1_HTML.jpg)


    Figure 7-1 Add another element to the array


    You can use the same logic to add a string in its own array to the `inventory`
    array.


    ```

    inventory += ["dog"]

    print (inventory)

    ```


    You can add the string “dog” to `inventory` because `inventory` is an array of
    type `productName` that is a `typealias` for `String`.


    If you apply the same logic to a new array of an `Int` (17), you’ll get an error
    as you see in Figure [7-2](#A441106_1_En_7_Chapter.html#Fig2). The array is an
    array of `typealias productName` (`String`) and so `Int` types are not allowed.


    ![A441106_1_En_7_Fig2_HTML.jpg](A441106_1_En_7_Fig2_HTML.jpg)


    Figure 7-2 You cannot add an `Int` to the array


    ```

    inventory += [17]

    print (inventory)

    ```


    If you put the 17 in quotes so that it is a `String`, all will be well as you
    see in Figure [7-3](#A441106_1_En_7_Chapter.html#Fig3).


    ![A441106_1_En_7_Fig3_HTML.jpg](A441106_1_En_7_Fig3_HTML.jpg)


    Figure 7-3 Add an `Int` as a `String`


    Using `typealias` to make your code more readable is a very useful idea, and it
    can help to prevent problems later on because the use of the type can be made
    clear to you and other people who maintain the code.'
