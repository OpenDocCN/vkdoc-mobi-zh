  \n-   函数\n-   对象\n-   设计模式\n\n这些概念在实现中常常会用到算法。\n\n### 函数\n\n算法可以用英语等自然语言或数学术语来表达。如果你愿意，可以将其描述为抽象的或概念性的。将它们与函数进行比较，可以让这两个概念都变得更加清晰。\n\
