  \n图 2-10\n\n删除 Playground\n\n## 转向编程范式\n\n现在你已经掌握了使用 Swift Playgrounds 进行实验的基本工具。下一章将介绍当今两种最重要的编程范式，并给出每种范式的代码示例。\n\
