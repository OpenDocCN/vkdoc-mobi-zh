  import UIKit\nlet notificationKey = \"com.champlainarts.notificationKey\"\nclass\
  \ SecondViewController: UIViewController {\n@IBOutlet weak var label: UILabel!\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\n// 加载视图后的其他设置，通常来自 nib 文件\n\
  // 观察通知\nNotificationCenter.default.addObserver(\nself,\nselector: #selector(SecondViewController.didReceiveNotificationResultText),\n\
  name: NSNotification.Name(rawValue: notificationKey),\nobject: nil)\n}\noverride\
  \ func didReceiveMemoryWarning() {\nsuper.didReceiveMemoryWarning()\n// 处理可重新创建的资源\n\
  }\n@objc func didReceiveNotificationResultText () {\nlabel.text = \"Received Notification\"\
  \n}\n}\n```\n\n代码清单 12-2 观察通知\n\n### 测试项目（进行修改后）\n\n再次开始测试应用，你会时不时遇到一个问题。这个问题可能很棘手，因为它看起来毫无规律。下一节中的调试技巧将告诉你如何继续。\n\
  \n### 使用 Xcode 调试应用\n\n当按钮和代码就位后，你会发现如果点击第一个视图控制器中的导航按钮，似乎什么都不会发生。调试的第一步是使用断点。这会使应用在指定位置停止。如果你发现本应发生的情况没有发生，最简单的处理方式就是在导致问题的代码行上设置断点（本例中，是因为代码没有运行）。设置断点的方法是点击代码行左侧的装订线区域，如图\
  \ 12-12 所示。\n\n![A441106_1_En_12_Fig12_HTML.jpg](img/A441106_1_En_12_Fig12_HTML.jpg)\n\
  \n图 12-12 设置断点\n\n再次运行应用，点击导航按钮，等待断点被触发。\n\n但断点不会被触发。\n\n这一切让你确认了之前看到的状况，但现在你发现了一个事实：不仅是通知没有被处理，它甚至从未被接收过。\n\
  \n在这种情况下，常见的做法是回溯。`didReceiveNotificationResultText` 函数本应由谁来调用？\n\n由于这是一小段代码，答案就在你眼前的第\
  \ 24 行：那里设置了通知观察者。在该行设置断点，再次运行应用，看看会发生什么。\n\n结果是一样的：这行代码没有被调用，因此观察者没有被设置。\n\n此时，你需要动点脑筋来弄清楚为什么会发生这种情况。如果你思考、研究或向同事请教这个问题，很可能会得到相同的答案：如果代码没有被调用，那么它所在的函数（`viewDidLoad`）也就没有被调用。这可能让你觉得不合理，因为你可以看到第二个视图控制器。\n\
  \n两个断点仍处于设置状态，你可以进一步实验。你会发现第二个视图控制器的 `viewDidLoad` 函数是在它即将显示之前被调用的。如果你运行应用并点击第一个视图控制器中的导航按钮，观察者此时尚未设置。使用视图底部的选项卡切换到第二个视图控制器以强制加载视图，然后返回到第一个视图控制器并再次尝试。你会看到现在通知正常工作。\n\
  \n这是一个非常常见的问题（也是一类非常常见的问题）。它不仅仅局限于 iOS 或 Cocoa：这类问题和调试技术是普遍存在的。\n\n解决方案是需要在生成通知之前就设置好观察者。这意味着观察者必须放置在应用一开始就存在的部分中。你可以考虑将\
  \ `AppDelegate` 作为放置观察者的位置（正是因为这个原因，它常用于接收通知）。\n\n## 总结\n\n本章向你展示了 Xcode 的基础知识，以便你能够开始将计算机科学的思想和概念应用到应用中。Swift\
  \ playground 是一种宝贵的实验方式，但某些功能需要更复杂的特性，你需要开始构建自己的应用。\n\n如前所述，本章描述的调试概念并非 iOS 或 Cocoa\
  \ 所独有。你可以在大多数语言和环境中使用它们。\n\n"
- "# 13. 纳入人的因素\n\n计算机科学领域通常被纯粹视为计算机硬件和软件的问题。在某种程度上，我们作为社会的一份子，需要审视人的参与方式，因为人是计算机科学项目的使用者、创造者、管理者和资助者。\n\
  \n本章从应用世界的角度探讨计算机科学中“人”的一面。尽管这里描述的问题和原则也适用于看似不涉及人的项目（例如星际空间任务、电网和发电机的控制软件），但这些项目仍然涉及人，至少体现在项目的管理和资助方面。\n\
  \n然而，本章的重点更多地放在你凭借计算机科学知识可能参与的项目上。首先快速概述一下“可计算”与“不可计算”的形式化概念；然后你会看到一份问题清单，用于询问和回答你可能正在开发的特定项目。这些问题都是必须解决的。\n\
  \n## 面向人的可计算性\n\n计算机科学的核心是可计算性概念。简单来说，可计算性是指可以通过系统性步骤解决的问题。这与算法不同，因为算法往往关注比可计算性问题更小的领域。因此，一个可计算性问题的解决方案可能包含一个或多个算法。\n\
  \n> **注**\n> 如果你与不同的人交谈，会发现计算机科学的“核心”有多个候选，可计算性只是其中之一。它目前特别有用，因为许多当前用于向年轻人（甚至学龄前儿童）教授计算机科学的工具都聚焦于可计算性。\n\
  \n可计算问题有两种基本类型：\n\n- **判定问题。** 给定一组项目，某个项目是否属于该组？这张发票是否属于未付账单的一部分？用户 ID 是否有权登录？这些都是答案为“是”或“否”的问题。\n\
  - **函数或可计算问题。** 这些是需要计算的问题。X 乘以 Y 的乘积是多少？\n\n其他类型的可计算问题包括优化问题（如何最好地做某事——通常是在给定特定数据的情况下，如何最好地计算出这两种基本类型之一的答案）和搜索问题。问题通常被分解为子问题，这样即使是最复杂的问题也可以拆解成可计算的片段。\n\
  \n思考可计算性问题的主要原因是能够（基于一些逻辑分析）有把握地说某个特定问题是可计算的还是不可计算的。毕竟，当人们考虑将自己的计算机科学知识付诸实践时，第一个问题就是：计算机科学能帮我解决这个问题吗？\n\
  \n\n\n## 开发问题\n\n你在网络和各种出版物中可以找到许多关于应用开发的指南。以下六个问题是在任何计算机科学项目启动之初都需要回答的。如果你无法回答这些问题，你的项目迟早会遇到麻烦。期望那些有计算机科学使用经验的人能够帮助整合项目。这或许不是正式课程的一部分，但这确实是现实世界的一部分。（如果你与某人谈论一份将\"\
  计算机科学\"列为必要条件的工作机会，那么熟悉开发流程通常与掌握专业术语同样重要。）\n\n如果你是那种迫不及待想要编写代码的人，这六个问题可能看似过于简单，但在你和其他人投入时间、精力和金钱于一个尚未清晰成型的项目之前，必须先回答它们。每个问题的更多细节（包括如何回答）将在本章后面部分说明。\n\
  \n> **提示**  \n> 当你开始回答这些问题时，请记住你随时可以改变想法，事实上，随着任何计算机科学项目的发展，你应该计划调整和演进你的答案。\n\n\
  以下是这六个问题：\n\n-   你在做什么？\n-   对象是谁？谁将构建、使用、管理、维护并资助它？\n-   你为什么要构建它？人们为什么会使用它？\n\
  -   项目将在何时进行？何时开始，何时结束？\n-   项目将在哪里运行？它将运行在什么设备上；是否需要其他计算机资源，如网络服务器或数据库？\n-   你如何获知项目的结果？\n\
  \n### 你在做什么？\n\n这个项目可能是关于构建一个应用，但也可能是构建一个开放数据资源，以便其他人可以构建运行在公共数据上的应用。许多人建议这个问题应该在\
  \ 10 秒内回答出来（这有时被称为电梯演讲，意思是如果你和你的老板或其他重要人物一起在电梯里，你只有电梯运行一层楼的时间来说出你的答案）。\n\n如果一个朋友问：\"\
  你在做什么工作？\"，大多数时候答案应该只需几秒钟。令人惊讶的是，许多人都觉得回答这个问题极其困难。如果你无法简单地描述项目，那么你很可能也无法实现它。即使是最复杂的项目也可以被概括：让无人驾驶航天器登陆火星。这就是对一个非常复杂（且成功）的一系列任务集合的简单描述。\n\
  \n### 谁将参与其中？\n\n谁将负责项目的工作，谁将使用最终成果？你构建这个应用是为了自身利益，以便学习如何构建应用并丰富你的项目作品集吗？这是为你目前或想要从事的工作而做的项目吗？用户会是熟练使用移动设备的人（如果你的应用运行在移动设备上），还是那些在设备上安装了\
  \ 400 个游戏却不知道如何更改设置的人？他们会是熟练使用移动设备但从未使用过台式机或笔记本电脑的人吗？（是的，没有个人电脑使用经验的人数正在增长。）\n\n\
  谁将管理或领导这个项目？在许多项目中，团队会协同工作。我们越来越多地看到跨学科协作项目受益于不同领域人员的有序互动。如果你不熟悉数据科学及其相关项目，你可以在网上查找数据科学的相关资料。有许多成功案例，其中大部分都涉及计算机科学技术的开发或应用。\n\
  \n### 人们为什么会参与进来？\n\n这归结于人们将从项目中获得的益处。他们参与项目是为了获得学分、找到工作还是赚钱？项目使用者的动机通常与开发者的动机不同。\n\
  \n### 项目将在何时进行？\n\n这实际上是最难回答的问题之一。在非数字世界中，判断项目何时完成相当容易：一位要人剪彩，乐队演奏，大桥通车。所有人都能看到这一时刻。\n\
  \n软件则不可见。在旧日的软件零售时代，人们可以看到商店里的软件包装盒，这无疑让项目看起来是完整的。确定项目何时完成，需要你结合\"做什么\"、\"谁参与\"\
  和\"为什么\"的答案，以及你所做的任何变更。\n\n现在，对于\"你在做什么？\"有了一个新的视角。结合之前问题获得的信息，现在这个问题可以更精确地表述为：你交付什么？\n\
  \n在产品开发（尤其是软件开发）领域，一个常见的短语是最小可行产品或`MVP`。这个短语有各种解释，但通常指的是一个能运行并执行你对最终产品所期望的基本功能的东西。\n\
  \n这可能意味着错误信息不完整（这可能导致如果不小心使用，应用会崩溃）。也可能意味着某些功能尚未实现。但这意味着你可以不借助幻灯片演示向别人展示\"这个\"东西：有一个可以运行的东西在。\n\
  \n最小可行产品的一种解释是，它可以被——或者正在被——销售。有时它会以入门版或预览版的形式销售（即使售价为零），但总归是有一个可工作的东西存在。\n\n当你开始决定何时拥有一个基础产品时，现在又有一系列额外的问题需要回答。基本上，对于大多数计算机科学项目，你将要面对一系列的交付物。（项目早期可能有项目提案、幻灯片演示之类的交付物，但这些还不是可以运行的东西。）\n\
  \n根据你构建的内容，你有多种选择。以下是这些选择的一个概述，但实际上你还可以有数不清的其他选择。这里只是让你了解交付工作的可能性。\n\n你可以规划应用或数据库（或任何其他计算机科学项目）的版本。通常，这些版本会编号为\
  \ 1、2、3……中间版本也可以编号。第一个版本就命名为 1.0 版本并不罕见。它可能很快就会有 1.1 版本，其中包含一些对拼写错误等问题的修复。你可能会继续迭代，直到\
  \ 1.0 版本稳定。此时，就该开始考虑 2.0 版本了。\n\n随着项目推进，你可以开始制定路线图，以便对你的版本规划有个概念。这个路线图和日程表将成为你的项目管理工具。通常，主版本（1、2、3）以及可能是重要的子版本（1.1、2.3\
  \ 等）会与市场推广活动相关联（如果适用的话）。这些里程碑也可能与学术日历、资助（拨款或投资）的里程碑或其他日期相关联。请记住，一旦里程碑与某个日期（如学术日历或付款日）挂钩，它就不再完全受计算机科学团队的控制了。\n\
  \n关于\"何时\"的考量还有另一个方面。一旦项目稳定下来，它会被定期使用吗？如果你正在构建一个需要为年底假期期间流行的产品进行维护的数据库，那么你更新数据库的关键时间窗口可能是\
  \ 7 月（这是年终假期数据准备的典型前置时间）。请规划好你的应用、数据库或其他项目的时间安排，以及它们的后续发展。\n\n\n\n### 项目将在何处运行？\n\
  \n尽管软件可能是虚拟的，但它需要运行在设备上。关于项目运行位置，你需要做出两个主要决定。如果项目涉及需要集中存储的数据，通常的做法是将其托管在 Web 服务器上；应用程序和网站可以通过通用的\
  \ `REST` 协议访问这些数据。这种存储通常需要付费，但一般价格较为合理。当然，如果你的项目是针对已有网络存储资源的组织（如公司、大学或私营企业），你可能无需为此担忧。\n\
  \n诸如亚马逊云服务（Amazon Web Services）、Azure 和 IBM 等云平台，让你能够轻松使用和配置云存储。这些平台旨在快速响应客户端存储需求的突发增长（或缩减）。\n\
  \n如果你在开发一个应用，则需要决定它将在哪个平台上运行。目前，主要有四大移动平台：\n\n-   iOS\n-   Android\n-   Windows\n\
  -   网页（Web）\n\n某些应用（如在线银行应用）必须在所有平台上运行，而其他应用可能只需在一个平台上运行。在许多情况下，会先选定一个平台作为起点（这类似于最小可行产品的变体）。应用上线后，就可以收集反馈，并在必要时为项目的后续开发争取更多支持。\n\
  \n微软的 `Xamarin` 产品吸引了许多人的兴趣。它基于 `.NET` 和 `C#`，目标是实现“一次编写，随处运行”的理想，让你编写的代码能够运行在 iOS、Android、Windows\
  \ 或 macOS 上。这类策略面临的挑战是，当目标系统进行修改时，像 `Xamarin` 这样的整合系统往往会更新滞后。对许多应用场景来说，这是一种非常有用的工作方式；而对另一些场景而言，缺乏对最新原生操作系统功能的及时支持则是一个严重问题。\n\
  \n无论你持何种观点，如果你想在计算机科学领域为同事和客户提供指导，就必须理解跨平台和多平台的相关问题。\n\n### 你将如何得知结果？\n\n如果你已经决定了要做什么、为谁而做、为什么做，以及何时何地使用，那么计算机科学项目的计划就差不多拟定了。剩下的就是确定如何衡量项目的状态和成功与否。\n\
  \n有趣的是，这个对许多人来说看似显而易见的问题，回答起来却和第一个问题（要做什么？）一样困难。再次说明，在非数字化世界中，因为你可以看到劳动成果，所以这个问题并不那么重要。你可以衡量应用的销量或下载量，但这是你想要的吗？如果你开发的应用程序旨在提高实体店的销售额，那么应用下载量远不如店内销售额重要。如果你正在构建一个假日礼品数据库，最直接的衡量指标就是这些礼品的销售量。网络上充斥着电商网站上被遗弃的购物车（一个常被引用的数据是大约\
  \ 67%的购物车被遗弃，但这是 2014 年的数据，在线购物网站正在尝试通过新的界面工具来降低这个数字）。\n\n像应用商店（App Store）这样的在线应用分发平台，其主要优势在于能产生海量数据（你可以在\
  \ App Annie —— [`https://www.appannie.com`](https://www.appannie.com) 上找到大量数据）。许多人认为这些数据极其有用，但如果你真想好好利用它们，请查看应用商店能提供给你的数据，以及其他像\
  \ App Annie 这样的指标，以及网站和数据库的访客数据。了解可用的数据，并提前规划你的结果分析策略。不要等到拿到数据后才决定如何处理：从一开始就建立你的分析体系。\n\
  \n这样，你就能追踪你的成果。\n\n## 本章小结\n\n本章展示了计算机科学如何融入你在其他学科领域从事的项目。随着应用世界的发展（请记住，应用商店于 2008\
  \ 年 7 月才开放，距本书写作时不到十年），人们期望掌握计算机科学的人既了解技术，也懂得应用技术的方法。\n\n"
- "# 14. 图形与可视化技术及问题\n\n你在第 11 章和第 12 章中看到了代码、`Xcode` 和故事板的示例。在这些例子以及本书其他章节的 Swift\
  \ Playground 中，你可以看到代码、设计原则和实现原理。本章的不同之处在于，它并非专注于如何做某件事，而是逐步讲解一个真实的实施问题与解决方案的序列。你可以看到一个界面的演变过程，以及如何不仅将其视为一幅美观的图片，而是视作一种用于传达信息、帮助人们使用并从中受益的实用工具。\n\
  \n## 介绍 Utility Smart\n\n本章的案例研究是真实的。它追溯了 Utility Smart 界面的演变过程，这是一款旨在帮助人们认识其使用的自然资源并适度使用这些资源的应用程序。\n\
  \n这个应用源于一个简单的想法：向用户提出关于他们近期资源使用情况的问题，并让他们通过滑块来回答。应用内包含一些可供用户浏览的背景信息以获取更多知识，但应用的核心是那些滑块。\n\
  \n数据保存在设备上，可以绘制成图表。数据可以通过电子邮件和 `AirDrop` 等多种技术进行共享。该应用由 Jesse Feiler 使用 `Swift`\
  \ 和 `Cocoa Touch` 构建。Utility Smart 项目由纽约州立大学普拉茨堡分校地球与环境科学中心的 Curt Gervich 教授领导。（如果你想看到它的实际效果，可以从\
  \ App Store 免费下载，地址为 [`http://bit.ly/UtilitySmart`](http://bit.ly/UtilitySmart)。）\n\
  \n\n\n## 开始开发应用（Utility Smart 1）\n\n利用第 13 章中的基础问题，我们首先思考了想要实现的功能。滑块的作用是提供一个简洁的界面，让用户在一分钟内输入他们的观察数据和行为数据。图\
  \ 14-1 展示了应用的第一个版本。（请注意，这是 Utility Smart 的 1.0 版本；该版本已不再在 App Store 中提供，已被本章后面展示的更新版本取代。）\n\
  \n![A441106_1_En_14_Fig1_HTML.jpg](img/A441106_1_En_14_Fig1_HTML.jpg)\n\n*图 14-1\
  \ 滑块，版本 1*\n\n为了提供灵活性，请注意界面使用了导航控制器和导航项，在窗口顶部提供了带有“分享”按钮（左侧）和“保存”按钮（右侧）的工具栏。该界面嵌入在一个标签栏控制器中（请注意底部的标签页）。\n\
  \n> **注意：** 导航控制器提供了窗口顶部的工具栏；导航项作为导航控制器的下层部分，是按钮和标题所在的位置。\n\n这种类型的用户界面非常灵活，因为很容易在底部添加最多五个标签页，并且通过在顶部导航控制器中添加更多按钮，你可以在应用的任何视图中轻松访问各种目的地。\n\
  \n`Utility Smart` 从一开始就支持所有 iOS 设备（包括 iPad）运行，但许多开发者发现从小屏幕设备入手再向上适配，比反向操作更容易。这里的情况也是如此：基本开发工作是在\
  \ iPhone 上完成的；细节优化则使用了 Auto Layout。\n\n滑块是 Cocoa Touch 框架中一个非常实用的组件，通过调整背景颜色来反映滑块的值，可以强化设置的含义，这并不困难。相关代码将在本章后面展示，结果如图\
  \ 14-2 所示。\n\n![A441106_1_En_14_Fig2_HTML.jpg](img/A441106_1_En_14_Fig2_HTML.jpg)\n\
  \n*图 14-2 基于滑块值设置背景颜色*\n\n你在图 14-2 中看到的界面效果非常引人注目：来回滑动滑块时，背景颜色会随之变化（从红色到绿色再到红色），从而反映环境影响。这非常令人印象深刻。\n\
  \n但这种效果略显粗糙。尽管我们使用的是小型设备，但其屏幕性能强大，且以当今的分辨率而言，你并不需要如此直白的工具来吸引人们的注意。图 14-3 展示了下一个迭代版本。它实际上使用了基于滑块值的相同代码；但这一次，不再更改滑块视图的背景颜色，而是改变了文本的背景颜色。此外，导航栏的颜色也被修改为应用所有屏幕统一的颜色。\n\
  \n![A441106_1_En_14_Fig3_HTML.jpg](img/A441106_1_En_14_Fig3_HTML.jpg)\n\n*图 14-3\
  \ 文本背景变化*\n\n视图中留有空间来显示评论，以鼓励积极的行为。（这是对文本背景颜色的补充。）\n\n在处理界面时，你很快会学到一条基本原则：空间永远不够用。（哪怕你是在为固特异飞艇设计标志，空间也总是不够用。）\n\
  \n图 14-4 展示了 `Utility Smart 1.0` 的引导屏幕，其中包含超出窗口范围的滚动文本。除了没有足够的空间容纳所有文本之外，项目团队的讨论还指出，实际上应该包含两种类型的信息：\n\
  \n-   如图 14-4 所示的有关资源的信息是第一种信息。\n-   第二种信息——提示或建议——可以帮助人们了解如何在利用资源方面做出更明智的选择。\n\n\
  如果能拥有更多空间，并且能够区分这两种类型的信息，那就太好了。通过在此例和其他情况下强调不同类型的信息，你可以让界面更易于用户使用。\n\n![A441106_1_En_14_Fig4_HTML.jpg](img/A441106_1_En_14_Fig4_HTML.jpg)\n\
  \n*图 14-4 空间不足……*\n\n## 完善应用（Utility Smart 2）\n\n在像这样的应用演进过程中，通常你必须停止抱怨空间不足，并采取实际行动解决问题。`Utility\
  \ Smart 2` 的解决方案是打破界面原有的一种布局。与其将所有滑块放在一个屏幕上，不如将它们分开，每个屏幕放置一个滑块，这样你就有了更多可用的空间。你无法再同时看到所有内容，但可以为信息提供更多空间。\n\
  \n这正是 `Utility Smart 2` 所采用的方法。图 14-5 展示了一个单独的滑块。\n\n![A441106_1_En_14_Fig5_HTML.jpg](img/A441106_1_En_14_Fig5_HTML.jpg)\n\
  \n*图 14-5 每页一个滑块*\n\n现在有更多空间用于显示背景信息。由于滑块不再位于同一个屏幕上，共享单个滑块的数据意义不大，因此导航项左侧的空间可以释放出来。它可以替换为一个“信息”按钮，如图\
  \ 14-5 所示。该按钮可以在故事板中连接到提示的弹出视图，如图 14-6 所示。\n\n![A441106_1_En_14_Fig6_HTML.jpg](img/A441106_1_En_14_Fig6_HTML.jpg)\n\
  \n*图 14-6 提示弹出框*\n\n这是对空间更高效的利用。它更加优雅，并且对于容纳更多信息来说扩展性更强。因为弹出视图是功能完整的视图，如果你想返回并在提示弹出框中嵌入视频，操作起来也很简单。\n\
  \n在计算机科学中需要学习的重要一课是，要时刻牢记如何实现那些具备扩展和拓展空间的功能。\n\n另一个重要的教训是，你无法坐在办公桌前就能设计出优秀的界面。事实上，作为开发者，你可能对应用的功能了解得太多，以至于无法为从未见过该应用的人（或者见过但以不同视角使用它的人）构建一个有用的界面。\n\
  \n图 14-7 展示了 `Utility Smart` 团队成员 Curt Gervich、Maeve Sherry 和 Michael Otton，在由 Sonal\
  \ Patel-Dame 教授执教的普拉茨堡高中一个科学课堂上，分享界面想法和反馈的场景。与广泛的用户和潜在用户一起尝试想法和建议，可以帮助你完善界面。\n\n\
  ![A441106_1_En_14_Fig7_HTML.jpg](img/A441106_1_En_14_Fig7_HTML.jpg)\n\n*图 14-7 Utility\
  \ Smart 2 界面头脑风暴会议*\n\n### 代码片段\n\n实现此界面部分功能的代码很简单，因为它使用了一些非常基础的 Cocoa Touch 工具。\n\
  \n### 创建弹出视图：代码\n\n弹出视图将由一个视图控制器呈现。通常的做法是创建一个 `UIViewController` 的子类。重要的代码如代码清单\
  \ 14-1 所示。\n\n以下是在视图控制器中实现弹出视图的步骤：\n\n-   在类声明中，使视图控制器遵循 `UIPopoverPresentationControllerDelegate`\
  \ 协议。\n-   在故事板中创建弹出视图（在下一节中展示）。\n-   为弹出视图实现 `prepare(for segue:)` 方法。\n-   添加\
  \ `adaptivePresentationStyle(for controller:)` 方法来管理弹出视图的大小。\n\n```swift\nimport\
  \ UIKit\nclass NowPageViewController: UIViewController, UIPopoverPresentationControllerDelegate\
  \ {\n    ... 代码省略\n    override func prepare(for segue: UIStoryboardSegue, sender:\
  \ Any?) {\n        switch segue.identifier! {\n        case \"tipPopoverSegue\"\
  :\n            segue.destination.popoverPresentationController!.delegate = self\n\
  \        default: break\n        }\n    }\n    func adaptivePresentationStyle(for\
  \ controller: UIPresentationController, traitCollection: UITraitCollection) -> UIModalPresentationStyle\n\
  \    {\n        return .none\n    }\n    ... 代码省略\n}\n```\n\n*代码清单 14-1 创建弹出视图*\n\
  \n\n\n### 创建弹出框：故事板\n\n在故事板中，添加一个新的视图控制器，如图 14-8 所示。在图 14-8 中，它包含一个标题（标签）和一个文本视图。选中它，然后选择实用工具区域中的“尺寸检查器”。将其设置为自由形态。对于弹出框来说，300x400\
  \ 的尺寸是一个不错的起点。\n\n从视图控制器按住 Control 拖拽到弹出框，以创建一个转场。\n\n![A441106_1_En_14_Fig8_HTML.jpg](img/A441106_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8\n\n设置弹出框尺寸\n\n接下来，高亮显示你创建好的转场，如图 14-9 所示。\n\n![A441106_1_En_14_Fig9_HTML.jpg](img/A441106_1_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9\n\n为转场命名\n\n高亮选中转场后，点击“属性检查器”并为其命名。该名称必须与 `prepareForSegue` 代码中的名称一致——在此示例中为\
  \ `tipPopoverSegue`。\n\n这样即可为你创建好弹出框。\n\n## 总结\n\n可视化和界面创建的最佳解决方案是通过迭代过程，并尽可能多地收集各方意见。有一点需要注意：不要直接询问界面建议，因为人们会根据他们见过的其他东西来回答你。观察他们的实际操作和尝试，留意他们感到困惑的地方。如果你与他们交流，请围绕操作和意义展开讨论：你的职责是弄清楚界面应该呈现成什么样。\n\
  \n\n\n"
