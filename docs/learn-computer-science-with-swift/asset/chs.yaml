  \ = \"Jesse\"\nfor character in \"name\" {\n    print character\n}\n```\n\n你需要将字符转换为对应的数值。虽然字典中的键是唯一的，但值却可以重复。因此，用于将值转换为键的代码是一个可选值（如果键没有对应值，则可能为\
