  \ playground 都配置为可运行，但确认你有一个可运行的 playground 是个好习惯。点击 playground 的“运行我的代码”按钮。你将看到如图\
  \ 5-5 所示的结果。\n\n![A441106_1_En_5_Fig5_HTML.jpg](img/A441106_1_En_5_Fig5_HTML.jpg)\n\
  \n图 5-5\n\n运行 Answers\n\n在 playground 顶部，你可以看到其运行结果——一个提示和一个数据输入字段。其下方是一个“停止”按钮。再往下则是代码本身和键盘。\n\
  \n你现在拥有的 Answers playground 是一个交互式 playground，它会显示一个提示并允许人们输入回应。你可以在此基础上进行扩展了。\n\
  \n\n\n#### 编写游乐场代码\n\n你可以在“答案”的现有代码基础上进行构建，要求用户输入一个上限，用于 `arc4random_uniform(_:)`\
  \ 生成随机数——该函数会返回一个介于 0 与给定上限之间的伪随机数（上限减 1，因此上限不在随机数范围内）。其结果为 `UInt32` 类型。\n\n以下是修改后的代码。\n\
  \n首先，要求用户输入上限：\n\n```\nshow (\"What is your name?\")\n改为\nshow (\"Upper limit for\
  \ random number?\")\nlet name = ask (\"Name\")\n改为\nlet upperLimit = ask (\"Upper\
  \ Limit\")\nshow (\"Hi \" + name)\n改为\nshow (upperLimit)\n```\n\n现在，你拥有一个可运行的游乐场，它会请求随机数上限，然后显示结果。你可以使用\
  \ Swift 游乐场来修改代码。随着操作进行，快捷栏和提示会帮助你编写代码。\n\n输入数据是字符串，因此你需要使用以下代码将其转换为整数：\n\n```\n\
  let intResponse = UInt32(upperLimit)\n```\n\n生成随机数：\n\n```\nlet random = arc4random_uniform(intResponse!)\n\
  ```\n\n`random` 是一个整数，因此需要将其转换为字符串以便显示：\n\n```\nlet randomString = String(random)\n\
  ```\n\n最后显示结果：\n\n```\nshow (randomString)\n```\n\n图 5-6 展示了正在运行的游乐场。输入的上限为 49，生成的随机数为\
  \ 25。\n\n![A441106_1_En_5_Fig6_HTML.jpg](img/A441106_1_En_5_Fig6_HTML.jpg)\n\n*图\
  \ 5-6 – 开始运行新的游乐场*\n\n在游乐场运行时，你会看到每行执行的代码都有可显示的结果（在游乐场中始终如此）。你可以为其中任意一个显示结果添加查看器，如图\
  \ 5-7 所示。\n\n![A441106_1_En_5_Fig7_HTML.jpg](img/A441106_1_En_5_Fig7_HTML.jpg)\n\
  \n*图 5-7 – 显示游乐场运行时的查看器*\n\n请记住，Swift 对类型要求严格，因此你需要将字符串转换为整数，反之亦然——除非明确可行，否则不会自动转换。这有助于保持\
  \ Swift 代码的健壮性。除了类型转换，还要注意 `intResponse` 是一个可选类型，需要使用 `!` 进行解包。（在生产代码中，使用 `?` 进行解包会更安全，这样如果出现\
  \ `nil` 则会失败，而不是崩溃。在第 7 章的“处理缺失数据”部分，你将了解更多关于可选类型的内容。）\n\n结束本节后，你可以将“答案”游乐场重命名为“Random”。显示游乐场列表，然后长按“Answers”游乐场。你将能够重命名它，如图\
  \ 5-8 所示。\n\n![A441106_1_En_5_Fig8_HTML.jpg](img/A441106_1_En_5_Fig8_HTML.jpg)\n\
  \n*图 5-8 – 将游乐场重命名为“Random”*\n\n### 生成多个随机数\n\n请记住，本章中生成随机数的目的是创建一个无意义（随机）的数据集合，以便在探索代码控制管理时进行实验。很容易将“Random”游乐场修改为一次生成多个随机数。只需添加以下几行代码来生成\
  \ 6 个随机数。\n\n你已经有了生成并显示单个随机数的代码。（如果你需要，这里再次提供。）\n\n```\nvar random = arc4random_uniform(intResponse!)\n\
  var randomString = String(random)\nshow (randomString)\n```\n\n你可以在此代码基础上添加代码来生成另一个随机数：\n\
  \n```\nrandom = arc4random_uniform(intResponse!)\nrandomString = String(random)\n\
  show (randomString)\n```\n\n你唯一需要做的修改是，记住原始代码使用 `let` 将变量声明为常量。将声明改为 `var`，以便可以更改它们的值，并在后续调用中省略类型。图\
  \ 5-9 显示了游乐场现在可以从同一个 `intResponse` 生成两个随机数（159 和 173）。\n\n![A441106_1_En_5_Fig9_HTML.jpg](img/A441106_1_En_5_Fig9_HTML.jpg)\n\
  \n*图 5-9 – 生成多个随机数*\n\n### 创建重复循环\n\n这种复制粘贴的方法显然不具备良好的可扩展性。编程语言通常实现各种循环来执行重复任务。重复是计算机科学的核心原则。在大多数编程语言（包括\
  \ Swift）中，你可以选择多种重复类型。\n\n所有重复结构都有两个主要组成部分：\n\n- 有一段代码需要重复执行。它可以是一行代码、几行代码，或者调用一个或多个函数。\n\
  - 有重复的控制机制；基本上，这决定了过程重复的次数。它可以是特定次数，也可以是条件性的，即重复进行直到条件改变。\n\n> **注：**  \n> 本章向你展示如何生成多个随机数：这是重复的基本用法。请注意，函数式编程（在第\
  \ 10 章中介绍）展示了处理重复的另一种方式。\n\n#### 编写要重复的代码\n\n使用这里描述的常见重复结构，你可以设置循环来生成多个随机数。起始代码如列表\
  \ 5-1 所示。它会请求随机数的上限，将输入（一个字符串）转换为整数（`UInt32`），然后调用随机数生成器（`arc4random_uniform(intResponse!)`）。\n\
  \n代码首次执行后，需要像上一个列表那样生成第二个随机数。要重复多次，你可以复制粘贴那段代码。（请记住，第一次运行时设置了变量，因此你重复的是第二次运行的代码，如图\
  \ 5-9 所示。）\n\n\n\n#### 创建重复控制（限制）\n\n重复机制的另一部分是控制重复的执行逻辑。在 Swift 中，这类循环的逻辑通常使用变量来记录循环执行的次数。\n\
  \n你可以将计数器命名为富有想象力且创意十足的名称，比如 `i`。请务必将其声明为 `var`（变量），因为每次循环时都需要更新它的值。初始值设为 `0`。\n\
  \n```\nvar i = 0\n```\n\n每次执行重复循环时，你都会生成一个新的随机数，并对 `counter` 进行递增。在 Swift 中，最简单的方法是使用复合赋值运算符\
  \ `+=`。它会将一个值加到变量上，并将结果重新赋值给该变量。若变量 `x` 的值为 `4`，以下代码会将其更新为 `5`。\n\n```\nx += 1\n\
  ```\n\n这是最常见的用法，但如果变量是 `Double`（双精度浮点数）类型，你也可以使用 `x += 4.2`。\n\n你可以在 `while` 循环中执行此操作，该循环会在条件为\
  \ `true` 时持续运行。因此，若要循环执行三次，请将 `x` 设为 `0`，每次进入 `while` 循环时将其加 `1`，并持续直到 `x` 的值不再小于\
  \ `3`。\n\n综合以上所有内容，你将得到一个可以运行 3 次的循环，如代码清单 5-1 所示。\n\n```\nlet prompt = ask(\"随机数上限\"\
  )\nlet intResponse = UInt32(prompt)\nvar random = arc4random_uniform(intResponse!)\n\
  var randomString = String(random)\nshow (randomString)\nvar i = 0\nwhile i < 3 {\n\
  i += 1\nrandom = arc4random_uniform(intResponse!)\nrandomString = String(random)\n\
  show (randomString)\n}\n代码清单 5-1\n生成 3 个随机数\n```\n\n结果如图 5-10 所示。\n\n![A441106_1_En_5_Fig10_HTML.jpg](img/A441106_1_En_5_Fig10_HTML.jpg)\n\
  \n图 5-10\n\n在循环中生成随机数\n\n由于无需生成打印输出，因此不会浪费纸张资源打印结果。尝试将 `3` 改为 `10000`，以生成 10,000\
  \ 个随机数字。（注意：将 10000 作为代码输入时请勿使用逗号）。你会看到结果飞速闪过。\n\n为了加快速度，可以不必每次都显示结果。将 `show` 语句注释掉，如下所示：\n\
  \n```\n//show (randomString)\n```\n\n为了观察 10,000 次迭代循环何时结束，请在循环的花括号外添加一条最终语句，使最后三行代码如下所示：\n\
  \n```\nshow (randomString) }\nshow (\"完成\")\n```\n\n运行速度会更快！\n\n这里有一个重要的知识点：当今移动设备处理器的速度和性能远超想象。你可能会在早期计算机科学书籍和文献中找到许多关于“最佳实践”的技巧，其中大量内容旨在节约处理器和存储资源。这些技巧虽然仍有参考价值，但硬件规模已今非昔比，你需要将它们应用于更极端的场景。\n\
  \n## 本章小结\n\n本章向你介绍了重复控制流程的基础知识。你学会了如何在 Swift playground 中设置基本的重复操作，以快速生成 10,000\
  \ 个随机数。重复控制流程的基本原理同样适用于许多其他类型的处理过程；你将在本书后续章节中反复见到它们。\n\n"
- "# 6. 数据处理：集合\n\n在第 5 章中，你看到了如何使用重复操作来生成数据——如果跟随示例生成 10,000 个随机数，那便是海量数据。你可能会产生疑问：为什么这么做？用重复代码生成的所有数据，又该如何处理？\n\
  \n计算机与计算机科学常常相结合以完成实用功能。仅有数据而无计算，或仅有计算而无数据，通常都难以发挥价值。在本章中，你将学习如何将第 5 章中生成的数据放入可用的集合中。稍后在第\
  \ 9 章（“数据存储与共享”）中，你还将了解如何让数据比在本章中变得更加实用。\n\n请记住，构成计算机科学支柱的那些结构和原则，旨在让软件的开发与维护变得更加容易。成功的开发者会想方设法将现有的概念和实现融入自己的产品中。这意味着需要编写、调试和维护的代码会更少。因此，不要仅仅将集合视为实现创意的工具。相反，要思考如何调整你的创意，使其充分利用集合及其他概念，从而减少你的工作量。\n\
  \n## 使用数据类型\n\n无论是作为单个元素还是集合，计算机数据都是有类型的。应用使用的每个数据元素都有一个由开发者指定的类型。从编程语言诞生之初，类型便被用来将数字存储的比特位转换为各种数字形式。最简单的转换是将计算机字中的所有比特位，利用其开/关状态生成一个二进制数。根据计算机字中比特位的数量，二进制数的范围可以从\
  \ 0 到非常大的数值。\n\n在计算机和计算机科学发展的早期，人们很快意识到仅将比特位转换为二进制数远远不够。一种常见的解决方案是，取二进制数高位的一个比特位，并将其保留用于特殊用途：表示负号。这样一来，正数和负数都可以被存储了。\n\
  \n进一步的优化包括，将字中的一组比特位视为两个独立的整数进行存储。这使得浮点数的表示成为可能：其中一个整数表示有效数字（有时称为尾数），另一个整数表示以 10\
  \ 为底的指数——当指数与有效数相乘时，会产生合适的值。所有这些都通过软件完成——实际的存储单元仍然只是一行比特位。由于一种数字类型到另一种数字类型的转换很容易实现，因此在软件中经常进行此类转换。开发者和用户往往都对此毫无察觉。\n\
  \n关于使用内建类型以及 Swift 创建的类型的具体细节，将在下一章介绍。目前，你只需了解类型是一种构造，它将计算机字中的物理比特位转换为对开发者、用户及普通人具有意义的内容。\n\
  \n### 标量数据\n\n最简单的数据形式是标量或变量——一个单一的数据元素，本质上与简单的代数项类似，如：\n\n`x = 15`\n\n你经常会看到对标量的描述和定义，将其视为单个内存地址中的内容。实际上，大多数情况下数据存储在由比特位组成的字中。硬件在存储和检索这些字的内容时，效率非常高。\n\
  \n当一个计算机字长度为 64 比特时，理论上它可以存储 64 个独立的是/否（布尔）值。硬件和软件允许你将字作为一个单一值（通常是数字）来访问，也可以通过单个比特位来访问。你甚至可以进一步将字中的比特位分组访问，这些分组通常对应着字母。\n\
  \n\n\n## 转向收集到的数据\n\n将单个数字存储在一个由简单变量（标量）引用的计算机字中，是跟踪你计算或读入数据的好方法。然后，你可以使用本书其他章节描述的基本运算来操作这些数据，并以其他格式和样式创建新数据。\n\
  \n现代编程语言支持多种数据集合。其中最基础的是数组——一个按编号排列的项目列表（例如，教室里学生的姓名）。另一种常见的集合类型是集合（set）——一种非列表形式的项目集合（“集合”一词采用的是逻辑学和数学中的含义）。Swift\
  \ 同时实现了数组和集合。\n\n还有另一种集合类型，在 Swift 中称为字典，在 PHP 等语言中称为关联数组。数组中的元素构成一个编号列表，而字典中的元素则由字符串或其他类型来标识。\n\
  \n数组是计算机科学中最古老、最基础的集合。集合次之，而字典（关联数组）则是最新的。本章将按时间顺序逐一探讨这些集合类型。\n\n它们都是 `Collection`\
  \ 的子类，并且大多使用相同的基本方法，这些方法将在本节中先以数组为例进行介绍。请注意，这些类位于 `Foundation` 中，因此你必须在你的 Swift\
  \ 代码或 Playground 中使用以下导入语句之一：\n\n```\nimport Foundation\nimport UIKit\n```\n\n始终建议只导入尽可能少的框架。`UIKit`\
  \ 会自动导入 `Foundation`，但如果你只需要 `Foundation`，就显式地导入它，而无需担心导入 `UIKit` 中那些你用不到的代码。Xcode\
  \ 和构建过程会在不需要时将其剥离，但最好一开始就只导入你需要的部分。\n\n## 使用数组\n\n任何编程语言中的数组本质上都是有序列表。一个班级的学生名单本身是无序的，但按字母顺序排列的名单就是有序的。\n\
  \n尽管数组是有序列表，但有时顺序并不重要。例如，一个未排序的学生名单仍然包含了班级中的所有学生。你不必在代码中利用这个顺序。\n\n数组中元素的编号和排序由数组结构本身处理：各个项目的编号并不存在于项目本身中，除非你人为添加。如果你添加了，就可以得到如表\
  \ 6-1 所示的元素。请注意，在表 6-1 中，索引是整数，内容可以是任何类型。前两个是字符串，最后一个是整数（注意它周围没有引号）。\n\n**表 6-1**\
  \ 示例数组\n\n| 索引 | 内容 |\n| --- | --- |\n| 0 | \"Content 17\" |\n| 1 | \"Data for item\
  \ 32\" |\n| 2 | 2 |\n\n各种形式的数组几乎存在于每一种编程语言和操作系统中。它们使你能够以基本的方式存储和检索数据；此外，它们还能让你轻松地对数组元素重复执行某些过程。\n\
  \n当你深入计算机科学时，你会注意到数组这类概念就是你所使用的基本构建块。与数组一样，你会发现这些构建块的一些基本特性。（就数组而言，其基本特性就是：数组是一个有序的元素列表，索引是数据数组的一部分，而非由数组内的元素提供。）\n\
  \n超越基础的特性已经被开发者和设计者多次实现，他们使用编程语言来扩展基本结构。随着时间的推移，许多这些增强和附加功能已逐渐融入到编程语言和操作系统中。不幸的是，很多人仍然只关注最初的构建块以及个人对其进行的定制化增强。\n\
  \nSwift 本身对基础数组及其功能进行了许多增强。本节将讨论你使用数组时可以做的许多事情——其中大部分功能都直接内置于 Swift 中。\n\n经验丰富的开发者和设计者知道，在\
  \ Swift 等语言中使用这些特性是通往成功代码的途径。避免错误的最简单方法就是不自己编写代码，而 Swift 及相关框架中已有的代码已经过编写、测试，并且在某些情况下（包括\
  \ Cocoa 和 Cocoa Touch 框架）已经经过了几十年的实际验证。\n\n在本章关于数组的各小节中，将涵盖以下主题：\n\n-   基本术语\n-\
  \   数组元素的索引\n-   Swift 数组与类型\n-   声明和创建数组\n-   修改 `var` 数组\n-   多维数组\n-   查找数组元素\n\
  -   添加和删除数组元素\n-   遍历数组\n\n### 基本术语\n\n以下是在讨论数组时常用的术语。\n\n-   数组的内容称为项（items）或元素（elements）。\n\
  -   数组的排序由一个或多个索引（indexes）控制。\n-   数组中的项通过下标（subscripts）来书写，下标根据元素在数组中的数值位置来标识该元素或项。\n\
  -   在包括 Swift 在内的许多语言中，数组下标写在方括号内，例如 `myArray`[3]，这表示 `myArray` 中的第三项。\n\n### 数组元素的索引\n\
  \n正如你在表 6-1 中看到的，数组负责处理索引，而你可以对数组内容进行任何操作。请注意，默认的索引编号从 0 开始。这是数组最初实现方式的历史遗留问题。在许多情况下，数组的位置就是数组的第一个元素（通常是存储的第一个字），而索引就是距离第一个元素内存位置的偏移量。因此，第一个元素（你可能认为是第\
  \ 1 个元素）距离第一个元素的偏移量为 0，因为它本身就是第一个元素。\n\n有些语言允许你从非零的数字开始索引数组，但实际上，是语言和操作系统自身执行了转换操作，将基于\
  \ 0 的索引转换为其他基数。\n\n而且，更有意思的是，如今数组的物理存储可能不是连续的内存位置，但数组仍然从 0 开始，因为历来如此。\n\n数组中没有空隙。因此，如果你查看表\
  \ 6-1 并删除了索引为 1 的项，数组将变为表 6-2 所示。旧的索引 1 的项消失了，而之前索引为 2 的项变成了索引 1。\n\n> **注意**：请参阅本章后面的“查找数组元素”部分，了解如何按内容而非索引来定位数组元素。\n\
  \n**表 6-2** 删除一行后的示例数组\n\n| 索引 | 内容 |\n| --- | --- |\n| 0 | \"Content 17\" |\n|\
  \ 1 | 2 |\n\n### Swift 数组与类型\n\nSwift 中的数组是类型化的。这意味着数组中的元素都具有相同的类型。你可以创建整数数组、字符串数组或任何其他类型的数组。\n\
  \n数组中包含单一类型可以提高代码生成效率，并在运行时带来其他好处。（此外，它还能让你的代码更健壮，因为在数组中不当混合类型会被编译器标记出来，而不是在运行时产生错误。）\n\
  \n当然，数组中只有单一类型在某些方面也可能不方便。Swift 通过其类型层级结构来管理这个问题。正如你将在第 7 章中看到的，Swift 类型包括整数等基本类型，以及特殊的\
  \ `Any` 和 `AnyObject` 类型。因此，你可以创建一个 `Any` 类型的数组，其中可以包含整数和字符串。\n\n在 Swift 中，最佳实践是尽可能使用限制性最强的类型。是的，你可以将所有数组都声明为\
  \ `Any?`（即任何类型的可选版本），但这会绕过所有内置的类型检查和优化。\n\n\n\n### 声明与创建数组\n\n在 Swift 这类语言中，变量在使用前必须先声明。（这与\
  \ PHP 等语言不同，在 PHP 中你可以随用随建变量。）\n\n数组与 Swift 中的其他符号并无区别：使用前必须先声明。变量声明包括其名称以及一个修饰符，该修饰符决定变量是可修改的（`var`）还是不可修改的（`let`）。\n\
  \n由于数组是类型化的，通常你会连同其类型一起声明。有两种语法形式可供使用。\n\n第一种方法是直接声明数组类型，如下所示：\n\n```\nArray\n```\n\
  \n你也可以使用如下语法来声明一个包含名称和类型的数组变量：\n\n```\nvar intArray:[Int]\n```\n\n这是一个普通的声明；冒号后的类型是一个\
  \ `Int` 类型的数组。\n\n这仅仅是声明。如果你尝试使用它，将会收到一条错误信息，提示它尚未初始化。请记住，创建和使用变量或常量有两个步骤：声明之后必须进行初始化。\n\
  \n你可以像在 Swift 中初始化类实例或其他元素那样初始化数组。只需在名称后添加 `()` 即可。以下代码将初始化数组：\n\n```\nintArray\
  \ = [Int]()\n```\n\n你可以在 Swift Playground 中声明、初始化并打印数组，如图 6-1 所示。\n\n![A441106_1_En_6_Fig1_HTML.jpg](img/A441106_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\n声明并初始化一个数组\n\n数组的元素用方括号括起来。在图 6-1 中，你可以看到该数组为空。它是一对空方括号。加上额外空格后，数组看起来是这样的：\n\
  \n```\n[    ]\n```\n\n你可以使用以下语法将数组的声明和初始化合并：\n\n```\nvar intArray2 = [Int]()\n```\n\
  \n图 6-2 展示了这一语法在实践中的应用。如你所见，你又创建了一个空数组。（窗口底部的调试区域是查看结果是否相同的最佳位置。）\n\n![A441106_1_En_6_Fig2_HTML.jpg](img/A441106_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\n在一行代码中声明并初始化一个数组\n\n这种风格称为初始化器语法。\n\n另一种声明和创建数组的方式是使用数组字面量：即直接使用数组中的字面量元素。在这种风格中，你需要声明数组及其类型：\n\
  \n```\nvar intArray3 : [Int]\n```\n\n然后，要创建数组，只需将元素列在方括号内：\n\n```\nvar intArray3\
  \ : [Int] = [2, 3, 5, 7, 11]\n```\n\n你可以在图 6-3 中看到这一点。\n\n![A441106_1_En_6_Fig3_HTML.jpg](img/A441106_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n使用字面量声明并初始化一个数组\n\n当你使用字面量声明数组时，Swift 可以根据你提供的字面量推断数组的类型。\n\n### 修改 `var`\
  \ 数组\n\n有三种方式可以修改 `var` 数组：\n\n-   你可以修改数组结构本身。也就是说，可以添加或删除数组中的元素。\n-   你可以修改元素本身，使其包含不同的数据值，但元素数量保持不变。\n\
  -   你也可以同时进行这两种操作。\n\n在某些语言中，这两种修改方式被视为不同的操作。在 iOS 的 `UITableViewController` 类以及使用它的应用中可以看到这一点。\n\
  \n图 6-4 展示了 `UITableViewController` 的默认行为。左侧是一个表格视图，行按分区分组；每个分区都有一个灰色背景的标题。视图顶部导航栏的右侧有一个“编辑”按钮。如果点击“编辑”按钮，视图将切换到编辑模式（具体来说，它会调用\
  \ `setEditing` 函数，你在该函数中实际处理应用及其数据进出编辑模式的转换）。在编辑模式下（如右侧所示），每行左侧都有一个红色按钮，允许你删除该行。开发者可以在右上角添加一个“+”按钮来添加行。在某些使用场景中，行可以重新排列。\n\
  \n> **注意**  \n> 本节中的截图来自 App Store 上的 Nonprofit Risk App，网址为 [`https://itunes.apple.com/us/app/np-risk/id1262903630?ls=1&mt=8`](https://itunes.apple.com/us/app/np-risk/id1262903630?ls=1&mt=8)。\n\
  \n所有这些操作都会修改数组及其结构：它们不会影响数组的数据。不过，如果某一行被删除，其数据也会被删除，因此在那种情况下数据会被修改。这种界面的典型实现提供了对数组本身的编辑功能，如图\
  \ 6-4 所示，左侧为表格视图，右侧为编辑模式下的表格视图。如果你点击列表中的某个项目，则会跳转到该项目的数据详情视图，如图 6-5 所示。请注意，详情视图的右上角有一个新的“编辑”按钮。这控制着详情视图的编辑——即数组元素的内容。\n\
  \n![A441106_1_En_6_Fig5_HTML.jpg](img/A441106_1_En_6_Fig5_HTML.jpg)\n\n图 6-5\n\n\
  编辑数组元素的详细数据\n\n![A441106_1_En_6_Fig4_HTML.jpg](img/A441106_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n\n（左）表格视图和（右）编辑模式下的表格视图\n\n### 多维数组\n\n数组通常具有多个维度。二维数组可以非常轻松地处理电子表格中的数据。这样的数组有两个索引——一个用于行，一个用于列。在大多数语言中，数组可以拥有多个维度。\n\
  \n例如，你可以有一个表示客户交易的数组。第一个维度可能是客户数据（例如姓名和地址）。下一个维度可能是个别交易（包含日期和金额）。然后可能还有付款的维度。在 Swift\
  \ 中你无法做到这一点，而且当你开始思考这个问题时，可能会发现管理多个维度很困难。\n\n在任何语言中，这种多维数组很快就会变得笨拙不堪。我们有其他数据结构可以更轻松地处理这类数据。在\
  \ Swift 中，你会找到其他类型的集合，例如集合和字典，它们可以将数据组织成特定的集合类型。Swift 数组的一维特性允许它本身包含其他数组、字典或集合；该维度也可以包含元组，元组是在单个实体中组织数据的另一种方式，并且可以存储在数组中。（元组将在下一章中讨论。）\n\
  \n因此，在了解 Swift 语言的其他特性之前，不要因为 Swift 数组的一维特性而感到困扰。\n\n\n\n### 查找数组元素\n\n数组中的每个元素都可以通过其索引来访问。数组中的第一项是\
  \ `array[0]`——请记住数组索引从零开始。然而，当你插入和删除元素时，索引会随之变化，以确保数组中没有间隙。这意味着今天索引为 52 的元素，明天可能变成索引为\
  \ 35（甚至后天可能就不存在了）。\n\nSwift（与许多其他语言一样）通过让你根据元素的内容而不是索引来定位数组元素，从而为你解决了这个问题。代码如图 6-6\
  \ 所示。\n\n![A441106_1_En_6_Fig6_HTML.jpg](img/A441106_1_En_6_Fig6_HTML.jpg)\n\n图\
  \ 6-6\n\n根据值查找数组元素\n\n你可以使用以下代码创建一个包含值的数组：\n\n```\nlet demoArray = [13, 29, 11,\
  \ -9]\n```\n\n在图 6-6 中，你可以看到如何打印整个数组：\n\n```\nprint (demoArray)\n```\n\n你可以通过以下方式获取第三个元素（索引为\
  \ 2）：\n\n```\nprint (demoArray[2])\n```\n\n你可以使用 `index(of:)` 方法来查找元素。请注意图 6-6 中的代码补全提示，它期望一个\
  \ `Int` 作为参数。你从未声明过该数组为 `Int` 类型数组；解析器是根据你输入的值推断出来的。\n\n如果你输入图 6-7 所示的值，则会推断出 `Double`\
  \ 类型。\n\n![A441106_1_En_6_Fig7_HTML.jpg](img/A441106_1_En_6_Fig7_HTML.jpg)\n\n图\
  \ 6-7\n\nSwift 在适当情况下会推断出 Double 数组\n\n当你完成代码后，Playground 的运行结果如图 6-8 所示。\n\n![A441106_1_En_6_Fig8_HTML.jpg](img/A441106_1_En_6_Fig8_HTML.jpg)\n\
  \n图 6-8\n\n在 Swift Playground 中创建并打印数组 提示\n\n`index(of:)` 方法和代码补全功能非常有用。只需像图 6-6\
  \ 和 6-7 所示那样开始输入，就能看到 Swift 是如何处理类型推断的。如果你碰巧基于初始数据创建了一个 `Int` 数组，并且最终想要添加一个浮点数或\
  \ `Double` 值，可以用类型声明，例如 `let demoArray:Double = [3, 29, 1, -9]`。即使初始值是 `Int` 类型，这也会创建一个\
  \ `Double` 类型的数组。\n\n### 添加和删除数组元素\n\n在创建数组后添加和删除元素并不复杂。最简单的方法是使用代码补全功能。首先，请确保数组声明为\
  \ `var`，以便你可以修改它（如果你用常量声明，它可能是 `let`）。\n\n如果你认为需要的方法是 `add`，代码补全会拒绝。正确的方法是 `append`，如果你尝试这个方法，你会发现它有效，并且，如图\
  \ 6-9 所示，预期会传入一个 `Int`。\n\n![A441106_1_En_6_Fig9_HTML.jpg](img/A441106_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9\n\n开始追加新的数组元素\n\n追加新数组元素后，Playground 的运行结果如图 6-10 所示。\n\n![A441106_1_En_6_Fig10_HTML.jpg](img/A441106_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10\n\n向 `var` 数组追加元素\n\n你可能会注意到，追加操作是在数组的末尾添加元素。Swift 中还有多种其他方法可供使用。使用代码补全功能并向下滚动查找相关方法非常方便，如图\
  \ 6-11 所示。\n\n![A441106_1_En_6_Fig11_HTML.jpg](img/A441106_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11\n\n使用代码补全功能查看其他数组方法\n\n当然，你也可以在 Xcode 中使用“帮助 ➤ API 参考”或访问 `developer.apple.com`。请注意，你可以看到在数组的不同位置插入新元素或删除元素的方法。这些是\
  \ Swift 和其他语言的细节，因此你可以自行查阅文档。数组的原则在各种语言和操作系统中都是相同的。唯一的主要区别在于，有些语言没有提供那么多内置的方法和函数来操作数组。（此外，有些人更喜欢自己编写数组操作代码，尽管这可能会在代码中引入更多错误。）\n\
  \n删除数组元素比添加更简单，因为你无需担心跟踪新元素及其在数组中的位置。要删除一个数组元素，只需通过索引或使用上一节讨论的函数之一来定位它。要移除元素，可以使用数组的以下方法之一：\n\
  \n```\narrayName.remove(at: Int)\narrayName.removeFirst()\narrayName.removeLast()\n\
  arrayName.removeFirst(n: Int) // 移除前几个元素\narrayName.removeLast(n:Int) // 移除后几个元素\n\
  ```\n\n你可以使用 `index(of:Int)` 来查找索引，然后使用 `remove(at: Int)`。\n\n### 遍历数组\n\n通常你需要依次访问数组中的每个元素。你可能想要显示班级中每个学生的姓名，想要找出\
  \ 24 小时内最高和最低的温度，或者想要执行任何涉及遍历数组中每个元素的操作。\n\n注意\n\n对于一个包含 10,000 个随机数的数组（你可能已经创建好了），你可能想要计算前\
  \ 5,000 个数的平均值，以及后 5,000 个数的另一个平均值。如果这些数是在相同的上下限（例如 0 和 1.0）之间生成的，那么这两个平均值越接近，这些数就越随机。这一点将在第\
  \ 8 章“管理控制流”中讨论。\n\n## 使用集合\n\n集合是集合类型——就像数组一样，是 `Collection` 的子类。它们与你在线代逻辑学分支——集合论中遇到的集合是同一个概念。如果你还没有阅读上一节关于数组的内容，你可能至少需要浏览一下，因为集合的许多概念与数组相同。（实际上，如果你查看文档，你会发现许多集合和数组的方法（比如你将在本章后面看到的字典方法）实际上是\
  \ `Collection` 的方法。）\n\n集合有一个关键特性，这也是它们在 Swift 应用程序中被广泛使用的原因。是的，你可以对集合执行各种集合论运算（如并集、交集、连接等——请参阅本节后面的“使用集合”）。但对许多开发者来说，更重要的是，集合可以在属性列表中使用（参见第\
  \ 9 章“存储数据与共享数据”）。你可以将各种元素的集合（最常见的是类或结构体的实例）放入一个集合中。此时，该集合可以在属性列表中使用，并且无需你进行任何额外的编码，它就会被写入属性列表或其他\
  \ Cocoa/Cocoa Touch 结构中，或从中读取。因此，如果你想抛开集合论和集合操作，仅仅将它们用作一种快速构建数据结构以便存储和检索的方式，你并不孤单。这是集合最常用的方面之一。\n\
  \n本节讨论的集合其他特性包括：\n\n*   集合基本术语\n*   识别和查找集合元素\n*   声明和创建 Swift 集合与类型\n*   添加和删除集合元素\n\
  *   使用集合\n\n### 集合基本术语\n\n集合是无序的元素的集合。它们是唯一的。你不能在一个集合中拥有两个值相同的元素。在数组中，你可以拥有多个值相同的元素，因为在任何给定时刻它们都有唯一的索引（请记住，随着元素的添加或删除，这些索引可能会发生变化，但在任何给定时刻，无论值是什么，索引都是访问数组元素的方式）。\n\
  \n\n\n### 识别与查找集合元素\n\n在幕后，集合的元素会经过哈希处理。也就是说，会对元素内容应用一个公式，从而生成一个该数据唯一的哈希整数。正是这个哈希值被用来标识集合元素，因此无需下标或其他标识符。由于哈希值被存储，所以集合中不会出现重复元素（即两个集合元素不可能拥有相同的哈希值）。要访问集合元素，你只需知道该元素在集合中即可。一旦确定它在集合中，就无需进一步的访问机制。\n\
  \n当然，你需要判断某个元素是否属于集合。为此，集合提供了以下函数：\n\n```\ncontains(_:)\n```\n\n该函数返回一个 `Bool` 值，因此你可以像下面的代码那样使用它：\n\
  \n```\nlet myElement = // 某个元素\nif mySet.contains(myElement) {\n    // 确定该元素属于集合后，即可放心使用\n\
  }\n```\n\n#### 声明与创建 Swift 集合及类型\n\n集合使用如下类型进行声明：\n\n```\nSet<String>\nSet<Int>\n\
  ```\n\n以此类推，其他基本 Swift 类型（包括 `Double` 和 `Bool`）也可用于声明。你可以使用以下语法创建集合：\n\n```\nvar\
  \ mySet = Set<String>()\n```\n\n这样创建一个空集合。\n\n与数组类似，你也可以使用数组字面量来创建集合，语法如下：\n\n```\n\
  var mySet: Set = [\"mountain\", \"valley\"]\n```\n\n这结合了基本类型声明与包含初始数据的集合变量的创建。记住，如果集合的类型可以从初始元素中推断出来，你可以在声明中省略类型；但如果初始元素可能暗示的类型范围比你想要的更窄，则请使用类型声明。\n\
  \n### 添加与删除集合元素\n\n只要新元素遵守集合的两个重要规则，你就可以非常简单地将其添加到集合中：\n\n1.  该元素不能已经存在于集合中。记住，集合元素是唯一的。\n\
  2.  该元素必须与集合声明中的类型一致。（记住，你可以使用 `Any?` 和 `AnyObject?` 类型以获得极大的灵活性。）\n\n要将元素添加到集合中（只要它遵守上述两条规则），最基本的语法是：\n\
  \n`insert(_:)`\n\n例如：\n\n```\nmySet.insert(myNewElement)\n```\n\n对应的移除方法是：\n\n`remove(_:)`\n\
  \n例如：\n\n```\nmySet.remove(myNewElement)\n```\n\n因为集合是无序的，所以你无需担心将元素插入到何处（开头、末尾等）。你只需将其插入到集合中的任意位置即可。\n\
  \n**提示**\n\n调试代码时，请记住集合是无序的。但有时它们可能会显得有序，因为添加或移除元素的顺序可能会暂时造成一种顺序假象，但这只是暂时的。在应用的不同执行过程中，顺序可能会发生变化。不要依赖你在编辑和调试时可能临时产生的偶然顺序。\n\
  \n### 处理集合\n\nSwift 集合方法支持两种基本的集合论运算：\n\n```\naSet.union(anotherSet)\naSet.intersection(anotherSet)\n\
  ```\n\n其他方法支持更高级的运算，但如前所述，许多集合的创建是为了读写方便。在很多情况下，它们的集合论运算并不常用。\n\n**注意**\n\n关于如何遍历集合，请参阅第\
  \ 8 章《管理控制流》。\n\n## 使用字典\n\n集合是完全无序的。数组按其中项目的顺序排序。字典则更为复杂。一种理解方式是，它们是有序的，但并非按数字排序。对于数组，你可以使用如下方式引用数组中的第五个元素（记住数组从零开始）：\n\
  \n```\nmyArray[6]\n```\n\n而对于字典，你可能使用如下语法：\n\n```\nmyDictionary[\"six\"]\n```\n\n\
  关联数组在许多语言中都有实现，例如 PHP、JavaScript、Python、Ruby 和 Perl。在 Swift 和 Objective-C 中，它们被称为字典。\n\
  \n-   字典基本术语\n-   声明与创建字典\n-   添加与删除字典元素\n\n### 字典基本术语\n\n集合元素没有顺序。数组中的元素有索引，并且索引由数组本身管理。今天是第\
  \ 5 个的元素，明天可能因为添加或删除而变成第 25 个。\n\n字典是数据对的集合：键和值（键值对）。通常，键是字符串，但并非必须如此（在某些语言中，字典或关联数组的键必须是字符串）。\n\
  \n### 声明与创建字典\n\n你可以在 Swift 中正式声明一个字典，使用：\n\n```\nDictionary<Key, Value>\n```\n\n\
  `Key` 和 `Value` 分别是字典中键和值的类型。\n\n简写形式省略了关键字 `Dictionary`；你可以使用以下方式声明字典：\n\n```\n\
  [Key: Value]\n```\n\n同样，`Key` 和 `Value` 是字典中键和值的类型。\n\n你可以在声明后使用 `()` 创建一个空字典，例如：\n\
  \n```\nDictionary<Int, String>()\n```\n\n这个声明故意颠倒了常见字典结构（键为字符串）。这里，键是 `Int`，值是 `String`。这向你展示了可用的选项。\n\
  \n如果你在打算创建字典时忘记了写 `()`，Fix-It 会提醒你，如图 6-12 所示。\n\n**提示**\n\n如果你使用字典，必须在应用或 Playground\
  \ 中导入 `Foundation`。如果你导入了 `UIKit`，则无需再导入 `Foundation`，因为它已包含在 `UIKit` 中。\n\n![A441106_1_En_6_Fig12_HTML.jpg](img/A441106_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12 声明与创建字典\n\n你可以使用如下代码将新声明并创建的字典赋值给一个变量：\n\n![A441106_1_En_6_Fig13_HTML.jpg](img/A441106_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13 将字典赋值给一个 `var`\n\n```\nvar testDictionary = Dictionary<Int, String>()\n\
  ```\n\n如果你点击图 6-13 第 3 行的查看器，就会看到 Swift Playgrounds 如何报告它：\n\n```\n[:]\n```\n\n\
  字典条目用方括号括起来，键和值之间用冒号分隔。如你所见，空字典只有方括号和冒号。\n\n你也可以通过字典字面量创建字典，其功能类似于数组字面量。它用方括号括起来，包含逗号分隔的键值对。\n\
  \n例如，假设你想创建如下字典：\n\n```\n\"Breakfast\":\"Eggs\"\n\"Lunch\": \"Soup\"\n\"Dinner\"\
  : \"Vegetables and Rice\"\n```\n\n你可以使用字典字面量创建它，如下所示：\n\n```\nvar menu = [\"Breakfast\"\
  :\"Eggs\", \"Lunch\":\"Soup\", \"Dinner\":\"Vegetables and Rice\"]\n```\n\n### 添加与删除字典元素\n\
  \n要添加字典元素，使用其键将其插入字典，如下所示：\n\n```\ntestDictionary [5] = \"some text\"\n```\n\n这显示在图\
  \ 6-13 的第 4 行。\n\n移除元素的方法如下：\n\n```\ntestDictionary.removeValue((forKey:Int))\n\
  ```\n\n如图 6-14 所示，代码补全会根据你声明字典的方式自动插入适当的键类型。\n\n![A441106_1_En_6_Fig14_HTML.jpg](img/A441106_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14 移除字典元素\n\n\n\n## 总结\n\n本章向你介绍了 Swift 乃至整个计算机科学中的基础集合。这些结构在几乎所有语言中都是基本相同的，尽管某些结构（例如关联数组、字典或集合）可能未在某些专用语言中实现。\n\
  \n所有集合都让你能够将数据集合作为一个单一实体来处理。例如，在 Swift 中，一行代码即可读取或写入包含多个元素的集合。此外，你还可以在需要单个变量的地方使用集合。例如，在字典中，一个给定的键只能对应一个元素。然而，如果该元素本身是一个集合（数组、集合或字典），那么整个集合就可以成为另一个集合的一部分。你将在后续章节中看到更多相关内容。\n\
  \n"
- "# 7. 处理数据：类型\n\n计算机科学的基础之一就是数据类型的概念。在最简单的情况下，类型是一种解释计算机内存中或来自存储设备的数据流中的数字位（bit）的方式。位具有两种值之一（开/关），并且它们通常在逻辑上被分组为字节（byte）。字节最初是指能够表示单个字符的位的集合；最初的实现是六位，但如今字节通常为八位，以便单个字节能表示更多字符。\n\
  \n需要注意的是，位是物理实体，而字节是逻辑集合。它们是由硬件和软件基于底层的位来组装和解释的。\n\n位（硬件）在物理上被集合成字（word），字通常能容纳足够多的位来构成多个字符，但请记住，将位组装成字节是逻辑上的，而非物理上的；而将位组装成字是在硬件中完成的。\n\
  \n字可以通过软件直接访问，程序和操作系统一直在这样做。你可以使用软件来查看字内部，以处理单独的位和字节。\n\n本章展示了操作系统，并通过操作系统向用户展示，字（位的物理分组）和字节（位的逻辑分组）是如何被使用的。管理字的基本方法之一就是将其分组为数据类型。本章将探讨数据类型以及如何使用它们。本章涵盖的主要主题如下：\n\
  \n*   类型为何重要\n*   基本类型\n*   使用元组\n*   高级 Swift 类型\n*   创建新类型\n*   处理不存在的数据（可选型）\n\
  \n## 类型为何重要\n\n类型的基础很简单。它们是存储和数据流中的开/关位与诸如位和字节这类较高层级结构，乃至位和字节所构成的更高层级结构之间的主要中介。\n\
  \n如果类型的作用仅限于此，那也足够了（在最早的计算机中确实如此）。它是硬件与软件之间的关键连接。计算机科学超越了计算机如何工作的基础，它包含了让计算机和人能够执行有用的工作、相互交流的概念。从这个角度来看，类型还扮演着另一个关键角色。\n\
  \n类型提供了将位组装成可用字的规则。这些字可以被分配类型（即这些字被“赋予了类型”）。然后，这些有类型的字在代码中被使用。记住，类型是逻辑结构——无论它们被用作什么类型，物理字本身永远不会改变（改变的是字内的数据）。通过将字视为特定类型，编译器能够执行其最关键的角色之一。语言和编译器支持不同程度的类型安全。类型安全是一组规则，它决定了给定类型的字可以如何与其他类型结合使用。如果根据类型安全规则，类型的组合在逻辑上是不可能的，编译器会将其捕获为错误，并且代码将无法运行。这对于编译器来说是一个重要的角色，因为另一种选择是直接执行不合逻辑的操作，然后眼睁睁看着应用崩溃。\n\
  \n通常认为，让编码者得到错误，总好过让用户遭遇这些错误。\n\n类型和类型安全使这成为可能。\n\n你可以根据每种类型的规则，以多种方式混合使用类型。例如，你可以将两个整数相除（例如\
  \ `5` 除以 `2`）。你可能想要的结果是一个浮点数（`2.5`）。\n\n根据上下文，Swift、Xcode 或运行时环境要么会拒绝执行非法操作（即产生一个错误），要么会警告你可能在执行一个不合逻辑的操作（这通常以向你（编码者）发出警告的方式实现）。\n\
  \n实现类型安全的一个关键部分是允许开发者将一种类型转换为另一种类型（这被称为类型强制转换）。有时，数字本身的格式就可以作为其类型的指示。例如，`2` 在日常用法和\
  \ Swift 中都是整数。`2.0` 是一个浮点数（注意小数点）。它的值与 `2`（不带小数点）相同，但属于不同的类型。\n\n**注意：** Swift 支持两种浮点数。`Float`\
  \ 的存储方式使其小数点后可能只有 6 位。`Double` 的存储精度更高。`Double` 是浮点数的首选和默认类型。\n\n## 查看栈和堆\n\n类型描述了字中的位应该如何被解释——无论是作为整数、浮点数、一个或多个字符或字节，甚至是作为可以单独按其开/关值访问的单个位的集合。\n\
  \n然而，你在应用中处理的所有东西并不都由这样的字构成。正如你在第 6 章“处理数据：集合”中所见，你还需要处理数据集合。大多数情况下，这些集合是被解释为特定类型的字的集合。正如你将在第\
  \ 10 章“构建组件”中看到的，有时你还需要处理对象。集合和对象无法容纳在单个字内，因此需要另一种存储方式。对于此类项目，操作系统通常会在内存中预留一个区域，以便放置这些通常体积较大且大小可变的项。\n\
  \n\n\n### 运行时数据存储\n\n数据在运行时存储的位置，成为了设计操作系统和编译器时的关键问题。在很大程度上——但并非完全——这会在幕后为你处理。由于并非完全自动处理，你需要了解运行时存储的基本概念，本节将对此进行描述。你还会看到这些概念如何整合在一起，从而让你作为开发者能够提供用户从现代软件和开发技术中所期望的功能和响应速度。\n\
  \n在计算机的早期时代（20 世纪 40 年代的大型机），一次只运行一个程序。整个计算机都专用于运行该程序。其所有资源（存储、通信通道和打印机）都服务于正在运行的程序。在这些专用于单个程序的资源中，还包括计算机本身及其操作员。在大多数环境下，如果你想运行一个程序，需要预约。这与拿起\
  \ iPhone 点开一个应用相去甚远；这些预约通常安排在未来某个时间段。如果你的项目优先级不高，你的时间段可能定在下周四凌晨 2:30。\n\n这种操作模式使得许多事情比当今世界要简单得多。首先，由于整台计算机都可供单个程序使用，这意味着其所有内存都专用于该程序，只有相当小的一部分内存用于计算机的开销和维护（尽管计费可以手动记录在卡片或活页夹的页面上）。\n\
  \n如今，人们期望在移动设备上同时运行多个应用，因此不可能将设备的所有内存都专用于单个应用。用户不会容忍这种情况。“你说我打电话和设计海报的时候不能看电影？我可是为\
  \ 256G 存储多付了钱的！内存都去哪儿了？我得把 iPhone 拿到苹果天才吧去，让他们打开看看，是不是有人在内存上骗了我。”\n\n为了充分利用任何设备中的可用内存（这可以追溯到几十年前，即\
  \ 20 世纪 60 年代分时技术的开端），可以同时运行多个程序，这样当需要打印机或数据存储设备等资源时，该程序及其所有数据可以被搁置一旁，直到设备就绪。尽管将程序和数据换入换出需要一些时间，但整体吞吐量却更快了。这就是我们今天仍然使用的基本模型（这是一个非常基础的概述）。\n\
  \n程序开始被构建成这样一种方式：一组离散的代码可以从头到尾地使用其所需的数据执行。当这组代码执行完毕后，它及其数据就会被直接丢弃——这与为了最大化资源利用率而进行的程序和数据的换入换出不同。相反，这是一种独立的请求、使用然后丢弃内存的方式。这两种过程对于充分利用计算机及其资源都是必要的。\n\
  \n### 栈与队列\n\n`stack`（栈）这个词在计算机科学中经常被使用。它用的是其日常简单的含义，即一堆东西（通常是一叠纸，但有时是一堆砖块或其他物体）。就像日常生活中的堆叠一样，你通过将物品放在顶部来添加到栈中。从栈中取出物品最简单的方法是取走最顶部的那个。在计算机科学中，这被称为后进先出栈（有时称为`LIFO`）。\n\
  \n对于栈来说，无论栈中有多少个元素，实际上只需要访问最顶部的元素（即后进先出的那个）。将元素添加到栈顶和从栈顶移除元素的操作分别称为`压栈`（将一个元素压入栈顶）和`弹栈`（从栈顶移除最顶部的元素）。\n\
  \n栈中元素的顺序很重要。\n\n与栈相关的一个概念是队列。队列也是一个有序的元素列表，你也可以将元素添加到队列的顶部。然而，在队列中，最先被移除的并不是顶部元素（即最后添加的那个）。相反，在队列中，你像在栈中一样将元素添加到顶部，但从底部移除元素。这是一种后进后出（`LILO`）结构。你每天在很多场景中都能看到这种队列的实际应用。例如，在物料柜中，你可能以先使用旧物品的方式来存放物品。\n\
  \n队列中元素的顺序与栈中的一样重要。\n\n> **注意**  \n> 以下是对内存管理的简化概述，旨在帮助你理解基本原理。现代计算机在这些基础之上有显著的增强和优化。\n\
  \n在应用程序运行时，计算机内部会将一段代码（通常是函数或过程，但这适用于任何代码段）所需的数据压入栈中。这意味着当函数或过程开始运行时，代码所需的每个变量的内存存储会在该代码的生命周期内被预留出来。所有这些数据都存放在一起。当这段代码执行完毕后，为变量预留的所有数据都可以释放回系统。这被称为回缩栈，它是重用计算机内存的关键方式。\n\
  \n这种优化内存使用的方式依赖于能够识别执行某段代码所需的内存位置。当该代码开始运行时，其变量所需的任何内存都会被预留（分配），即使这些变量尚未被使用。这确保了代码能够运行完成而不会耗尽内存。\n\
  \n\n\n### 堆\n\n栈是一种组织与重用内存的简单方式，但存在一个重大问题：并非所有数据都能恰好放置在计算机字的栈中。许多数据结构远大于单个字。最简单的例子是第\
  \ 6 章讨论的集合。几乎每种计算机语言都有其集合类型，而如何存储它们始终是一项挑战。一种解决方式是在栈上放置一个具有特殊含义的计算机字——它是对实际数据的引用，这些数据位于计算机内存的其他位置。（这种处理数组的方法可追溯到\
  \ 20 世纪 50 年代。）通过使用此类引用，你可以继续沿用缩减栈的基本思路。只是过程稍显复杂，因为操作系统须识别到：当它从栈中移除一个数组引用字时，必须释放该数组关联的内存。\n\
  \n尽管处理引用需要耗费一些时间和处理能力，这一切仍能良好运行。数组在过程、方法或函数中被声明，而其元素在内存的其他位置被引用。这个“其他位置”通常被称为堆。它本质上就是一堆非结构化的数据。当数组或其他结构化条目的数据通过栈的引用存储在堆中时，管理起来相对容易。\n\
  \n当堆中存在与栈引用字不关联的数据时，重大问题便会出现。这种情况需采用另一种策略处理。操作系统仍使用栈上的引用字来引用堆中的非结构化数据，但在此过程中加入了一个新要素。操作系统会记录指向堆中某数据的引用字数量。对于栈上的引用字，只存在一个引用：即来自栈的引用。然而，当数据被共享时，堆上的这个非结构化数据可能被应用中多个引用所指向。当操作系统注意到指向该数据的引用数量降至零时，它便可以重用那块内存空间。\n\
  \n这一切要求操作系统追踪（每个正在运行应用的）栈、堆中的存储，以及（在移动设备上）位置的持续变化，还有电话、短信、推文以及设备中所有其他活动。这些操作所消耗的存储和处理能力在任何计算机上都相当可观。\n\
  \n> **提示**  \n> 对于任何计算机，所有这些在后台进行的工作，最理想的状况是用户甚至不知道它的发生。然而，当你考虑配置一台计算机（或购买新机）时，必须将这些资源纳入你的需求考量。若只为存储一千首歌曲的库而配置足够空间，却别无冗余，你的计算机将无法正常运行。\n\
  \n## 基本类型\n\n大多数计算机语言的基本类型以不同方式表示数字、字符和字符串。尽管存储形式最终是一个或多个计算机字，但这些类型之间的区别是通过软件——即操作系统和运行在计算机上的应用——来实现的。计算机字在本质上是可互换的。事实上，编译器与计算机语言发展史上的重大突破之一，便是认识到计算机中存储和处理的数据，既可以是我们通常认为的数据（例如数字），也可以是计算机指令（例如将两个数相加）。\n\
  \n计算机系统中还有一种用于后台的存储类型。计算机字可以包含操作系统自身运行所需的内部操作数据和指令。例如，引用字（如前所述）存储在原本可用于传统数据的相同物理字中，但操作系统会确保此类数据免受应用和用户的未授权操作。\n\
  \n### 数值存储\n\n数字的存储有两种方式：可以存储为整数（整型数），或带有小数部分的数字（通常有多种称呼，例如十进制数，但此术语在某些情况下实则具有误导性）。\n\
  \n#### 使用整数\n\n整数是简单的数字。你可以将计算机字中的位转换为二进制数，进而得到一个可转换为任意其他进制的数，但最常见的转换是从二进制转换为十进制。\n\
  \n计算机通常使用几乎整个字来存储整数。“几乎”整个字是因为其中一位常被保留作为符号位：用于指示数字是正数还是负数。在旧式计算机中，存储空间极其稀缺，在许多数字永远不可能为负数的情况下，将一位“浪费”在符号位上似乎令人惋惜。因此，你会在旧的文档和描述中看到整数和无符号整数被列为不同的类型。如今，大多数操作系统上的整数大多包含符号位。\n\
  \n在描述将字中的位转换为二进制数时，有两种方法可供使用。它们分别被称为大端序和小端序，这取决于位的序列应按从最高有效位到最低有效位解读，还是相反。\n\n当你深入到体系结构的极端细节时，这很重要；但如今，这一点通常被隐藏起来，因此当通过通信信道接收位流时，两端的软件已将其转换为不依赖于端序的格式。\n\
  \n#### 使用浮点数\n\n使用浮点数有多种常见方式。通常，浮点数的实现交由一个专门的处理器——**浮点运算单元**（`FPU`）来处理。存储浮点数的基本原理通常包含以下逻辑：\n\
  \n*   数字基本上存储为一个可能带符号的整数。这被称为尾数。\n*   另外，指数作为另一个可能带符号的整数存储。\n\n两者结合，可以表示大多数数字。例如，数字\
  \ 12 可以用尾数 12（十进制）来存储，在二进制中可能表示为`1100`。\n\n> **二进制数表示法**  \n> 通常用法中，我们从小数点的位置（参见本边栏中关于小数点的后续说明）开始向左或向右讨论数字的位数。小数点左边第一位表示\
  \ 0 到基数减一的值。在十进制中，这意味着该位（或任何其他位）可以取数字 0-9，但在二进制中，任何位可以取数字 0-1。  \n>  \n> 再向左一位表示基数本身。因此，在十进制中，12\
  \ 被解读为 2x1 加上 1x10。  \n>  \n> 二进制中，数字 12 的表示法是：从右侧（即小数点所在位置）开始计算：  \n>  \n> *  \
  \ 0x1\n> *   0x2\n> *   1x4\n> *   1x8\n>  \n> 总和为 12。  \n>  \n> 左边第二位表示基数的二次方。因此，在十进制中，数字\
  \ 213 是 3x1 加上 1x10，再加上 2x100。  \n>  \n> 对于非十进制系统中的小数点如何称呼存在争议。有些人认为小数点（decimal\
  \ point）是十进制系统独有的。另一些人则认为它并非十进制独有，正如“数字”（digit）一词可用于指代任何基数中有效的字符。  \n>  \n> 如果你想要一个无歧义的通用术语来指代小数点，可以称之为基数点。数学家（或许只有他们）会理解你。本章中，我们稍作折中，将其称为点（point），这是一种避免不必要争论的常用方式。\n\
  \n\n\n### 存储字符串与字符\n\n字符串和字符在应用中用于显示文本……有时确实如此。文本可以显示在应用中的图像里，尽管你可能认为它们就是字符串和字符，但当它们成为图像的一部分时，它们就和云朵的照片一样，本质上就是图像。\n\
  \n字符由一系列比特位表示。根据所涉及的字符和语言，所需的比特位数会有所不同。最初，字符的长度是六位，后来扩展到了八位。如今，借助 Unicode 字符，大多数字符和世界上大部分语言都能被显示。你最常遇到的编码格式是\
  \ `UTF-8`、`UTF-16` 和 `UTF-32`（其中的数字表示单个字符所使用的比特位数）。\n\n字符串是字符的序列。从字符可能的长度可以看出，一个字符串很容易超出单个计算机字的范围，因此字符串通常不存储在栈上，而是通过某种形式的引用字来访问。\n\
  \n### 创建新类型\n\n当你声明常量或变量时，需要指定其类型。你可以通过类型注解来实现，或者为常量或变量设置一个值，以便 Swift 能推断其类型，如下例所示。\n\
  \n```\nvar myVariable:Int // 类型注解\nvar myVariable = 20 // 推断类型\n```\n\n当推断出的类型可能不是你想要的类型时，类型注解就变得很重要。例如，虽然\
  \ `20` 会让 Swift 推断为 `Int` 类型，但以下代码会将变量变为 `Double` 类型。\n\n```\nvar myVariable: Double\
  \ = 20 // 类型注解覆盖了推断出的 Int 类型\n```\n\n你还可以在 Swift 中声明新类型。其他现代语言也允许你这样做，但传统语言会将你可使用的类型限制在语言及其编译器内置的范围内。这允许使用本章前面描述的类型检查，在编码/编译过程中捕获错误，而不是在用户尝试使用你的应用时才发现问题。\n\
  \n你可以在 Swift 中声明新类型。一旦声明，你就可以像使用原始类型一样使用它们来声明变量和常量，并在类型注解中使用你的新类型。你的新类型是基于 Swift\
  \ 中已有的类型（以及你自身代码中的类型）构建的。例如，你可以创建一个依赖 `Int` 类型的类型。你的类型可以与 `Int` 类型一起使用。（在下一节“使用元组”中，你将看到这样做的好处。）\n\
  \n要声明新类型，你需要使用 Swift 的 `typealias` 语法，其中一个类型被别名为另一个类型。这样做的一个原因是为了提高代码的可读性。你可以（并且应该）以清晰表明变量和常量含义的方式为其命名，但有时你希望优化命名以使其更加精确。例如，如果你使用内置的\
  \ `String` 类型来命名应用中处理的条目，那么使用 `String` 类型是没问题的。\n\n你可能希望使用类型别名向自己和他人明确该字符串具体代表什么。因此，你可以像这样使用\
  \ `typealias`：\n\n```\ntypealias productName = String\n```\n\n现在，你可以在声明中使用 `productName`，如下所示：\n\
  \n```\nvar widget1:productName = \"Widget 1\"\nvar widget2:productName = \"Widget\
  \ 2\"\n```\n\n你可以超越简单的命名，为集合类型使用 `typealias`。例如，你可以为你的库存创建一个数组：\n\n```\nvar inventory\
  \ = Array ()\ninventory = [widget1, widget2]\n```\n\n只要尊重类型，你可以向数组中添加其他数组。因为数组可以有重复的元素，你可以用\
  \ `widget1` 创建另一个数组，并将该数组添加到 `inventory` 中。\n\n```\ninventory += [widget1]\nprint\
  \ (inventory)\n```\n\n你可以在图 7-1 中看到结果。\n\n![A441106_1_En_7_Fig1_HTML.jpg](img/A441106_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1 向数组中添加另一个元素\n\n你可以使用相同的逻辑，将一个字符串（以其自身数组的形式）添加到 `inventory` 数组中。\n\n```\n\
  inventory += [\"dog\"]\nprint (inventory)\n```\n\n你可以将字符串 “dog” 添加到 `inventory`\
  \ 中，因为 `inventory` 是类型为 `productName` 的数组，而 `productName` 是 `String` 的 `typealias`。\n\
  \n如果对一个新的 `Int` 类型数组（17）应用相同的逻辑，你将会得到一个错误，如图 7-2 所示。该数组是 `typealias productName`（即\
  \ `String`）类型的数组，因此不允许 `Int` 类型。\n\n![A441106_1_En_7_Fig2_HTML.jpg](img/A441106_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2 你不能向数组中添加 `Int` 类型\n\n```\ninventory += [17]\nprint (inventory)\n```\n\n\
  如果你将 17 放在引号中，使其成为 `String` 类型，那么一切都会正常，如图 7-3 所示。\n\n![A441106_1_En_7_Fig3_HTML.jpg](img/A441106_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3 以 `String` 类型添加 `Int`\n\n使用 `typealias` 使你的代码更具可读性是一个非常有益的想法，并且它有助于防止以后出现问题，因为类型的具体用途对你和其他维护代码的人而言都变得清晰明了。\n\
  \n\n\n## 元组的使用\n\n上一节中描述的数字、字符串和字符是当今大多数计算机语言的常见类型。大多数语言在发展中都有了一些变体，Swift 也包含了其中许多变体。\n\
  \n跳过基本数字、字符串和字符类型的众多变体，我们可以看看一种在现代类型，它在 Swift 以及其他类似 Python 和 C# 的语言中都以相似的方式实现。**元组**\
  \ 是一种由多个类型组成的序列，这些类型共同构成一个单一类型。\n\n例如，你可以声明一个元组，这是一种由其他类型创建的类型形式。你可以使用 `typealias`\
  \ 为已有类型提供别名，而这个已有类型可以是你用元组创建的类型。实际上，使用 `typealias` 为元组命名可能是 `typealias` 最常见的用法。\n\
  \n元组基本上是用括号括起来的一系列类型。它用于类型注解或类型别名中。例如，你可以创建一个包含两个 `Double` 类型的元组来表示矩形的尺寸（长度和宽度）。你可以像下面代码这样给它一个名为\
  \ `dimensions` 的 `typealias`：\n\n```\ntypealias dimensions (Double, Double)\nvar\
  \ myRectangle:dimensions = (2.0, 3.0)\n```\n\n你不必非得使用 `typealias`。你可以像下面代码这样非常简单地创建和使用一个`元组`：\n\
  \n```\nvar myRectangle = (2.0, 3.0)\n```\n\n除非你想在其他地方引用它，否则没有必要用 `typealias` 来命名一个`元组`类型。\n\
  \n元组非常有用，因为它们将多个项组合到一个可寻址的符号中（如果有的话，就是 `typealias` 的名称）。大多数语言中的函数通常只能返回一个单项结果。许多人会让函数返回一个集合（数组、字典或集合），这实际上达到了返回多个结果的效果。（实际上，字典常被用来在一个单项中返回多个结果。）\n\
  \n元组中的项**按顺序**标识：你不能重新排列它们。默认情况下，它们从零开始编号。图 7-4 展示了如何创建和使用元组。请注意第三行之后的查看器中，元组的两个元素前面显示了它们的默认名称——`.0`\
  \ 和 `.1`。\n\n声明元组时，你可以为各项提供名称。在图 7-4 中，请注意第 7 行中的项被命名为：\n\n```\ntypealias dimensionsLabeled\
  \ = (width: Double, height: Double)\n```\n\n你可以通过使用变量或常量的名称，后跟点语法和每个项的名称来引用元组中的项，如第\
  \ 9 行所示：\n\n```\nprint (myLabeledRectangle.0, myLabeledRectangle.height)\n```\n\n\
  即使你为元组中的项提供了名称，你仍然可以通过其默认编号来引用它。\n\n注意：元组元素的名称不是带引号的字符串。\n\n![A441106_1_En_7_Fig4_HTML.jpg](img/A441106_1_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4** 声明和使用元组\n\n## 总结\n\n本章为你概述了用于数据的类型。你看到了所有语言和操作系统通用的类型（数字、字符和字符串），以及你可以自行创建的类型，例如元组。\n\
  \n使用类型——甚至是动态类型——可以使你的代码在开发和维护中更安全。\n\n在掌握了数据方面之后，是时候继续了解操作系统和应用程序如何实际处理你所声明和存储的数据了。这是下一章的主题。\n\
  \n"
- "# 8. 管理控制流：条件语句、Switch 语句和枚举\n\n在第五章中，你了解了循环的基础知识，但管理控制流不仅仅是通过循环重复代码。本章将探讨代码中其他主要的控制流方面。这些存在于大多数语言和操作系统中。\n\
  \n## 接下来是什么？\n\n应用中的基本控制流是从一行代码执行到下一行代码。一行代码就是一个单独的语句，尽管它可能包含许多步骤——也许是因为这行代码会导致一个函数或方法运行。此外，在\
  \ Swift 中，多行代码可以放在一行物理代码上。与许多其他语言一样，当一行代码中放置了多条语句时，每条语句后都会加上分号。此外，为了提高可读性，一行逻辑代码可以跨越多行物理代码。尽管如此，我们提到“一行代码”时，会将其视作一个物理和逻辑实体，尽管它们并非完全等同。\n\
  \n无论格式如何，应用中的每一行代码都会被执行，并且大多数情况下，在它执行完毕后，下一行代码会被执行。如果没有更多代码行，应用就会终止。\n\n这是自计算机诞生以来应用和程序的基本模式。值得注意的是，这种模式有一个重要的变体，在依赖用户交互的应用中尤其普遍。在这些情况下，应用开始运行，一旦开始运行，它就会等待一个外部事件传递给它（该事件可能是用户操作）。当接收到事件时，应用会处理它，然后等待下一个事件。像这样的程序可能只有在计算机关闭或重启时才会终止。\n\
  \n在 iOS 设备上，你可以专门终止等待事件的应用。你可以在控制中心看到它们，如图 8-1 所示。只需将应用向上拖到窗口顶部即可将其终止。\n\n![A441106_1_En_8_Fig1_HTML.jpg](img/A441106_1_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1** 在 iOS 11 及更高版本的控制中心中查看正在运行的应用\n\n在应用内部，对“执行下一行代码”这一序列的主要例外情况如下：\n\n\
  *   **跳转 (Go to)**。你可以显式跳转到下一行之外的其他代码行。正如你将看到的，这通常不推荐，但它仍然是一种常用的控制管理技术。\n*   **Switch\
  \ 语句**。你可以执行多行代码（或代码段）中的其中一段，而不是执行下一行。当你想要执行多个操作之一（例如显示当前温度、显示下周日历、登出或任何其他操作）时，这是一种很有用的技术。\n\
  *   **条件语句**。当某个条件为真（或不为真）时，你可以执行某行代码。\n*   **循环**。你可以重复执行一行或多行代码，如你在第五章中所见。循环模式有多种变体——例如，你可以重复代码直到某个条件为真或不为真。\n\
  \n\n\n### 使用 `Go To` 语句……或者不使用\n\n在许多编程语言中（尤其是较老的语言），可以直接指定当前语句之后要执行的下一条语句。为此，编程语言需要某种方式来标识语句。最初，这是通过按顺序对语句进行编号来实现的。`Swift`\
  \ 中的语句可以由 `Xcode` 编号，但这些编号并非代码本身的一部分。\n\n在某些语言中（特别是 `PL/1` 和 `COBOL`），语句可以被命名。这比编号更优，因为插入或删除语句后名称不会改变。行号则很脆弱。当使用标签时，如果它们用于某行，通常必须位于该行的首字符位置，并且标签以句点、冒号或其他特殊字符结尾。标签通常不能包含嵌入的空格。\n\
  \n在 `Swift` 及大多数现代语言中，即使显示了行号，它们也仅供你参考：你无法将控制权转移到特定的行号。\n\n图 8-2 展示了 `Xcode` 中显示行号的\
  \ `Swift` playground。\n\n![A441106_1_En_8_Fig2_HTML.jpg](img/A441106_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2  \n显示行号的 `Swift` playground\n\n图 8-3 展示了隐藏行号的同一段代码。\n\n![A441106_1_En_8_Fig3_HTML.jpg](img/A441106_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3  \n隐藏行号的 `Swift` playground\n\n你可以在 `Xcode` 偏好设置（`Xcode` ➤ `Preferences`）中开启或关闭行号，如图\
  \ 8-4 所示。打开 `Preferences` 后，从顶部栏选择 `Text Editing`，然后在主窗口区域顶部选择 `Editing` 选项。你可以根据当时正在进行的操作来开启或关闭行号。如果你要参加代码审查会议，无论代码是打印在纸上，还是通过\
  \ `AirPlay` 或直接连线显示在 Apple TV 或其他设备上，人们都会讨论代码，此时你可能希望开启行号。\n\n![A441106_1_En_8_Fig4_HTML.jpg](img/A441106_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4  \n`Xcode` 偏好设置中的 `Xcode` 行号选项\n\n行号以及 `go to` 语句在编程世界中已成为过去的遗迹，但正如在现实世界中一样，过去总是与我们同在，或者如威廉·福克纳所写：“过去从未消亡，它甚至还没有过去。”[《修女安魂曲》及网络上各种误引的变体]\
  \ 能够在讨论和文档中识别行号是非常有用的。（例如，本书中来自 `Xcode` 的截图就经常使用行号。）\n\n能够指定特定行作为要执行的下一条语句已被证明是一种危险的编程技术。如果你正在编写代码，并考虑如何跳转到当前代码行之外的其他位置，请改用本节中描述的其他技术之一。\n\
  \n能够将控制权转移到代码的特定行会导致所谓的“意大利面条式代码”。这个名称来源于这样一个事实：如果绘制箭头来表示程序的执行方式，这些箭头（在通常称为流程图的图中）会开始看起来像一盘意大利面条。\n\
  \n行号和意大利面条式代码的替代方案是结构化编程或结构化代码。该术语由艾兹格·W·迪杰斯特拉在 1968 年提出。作为 Burroughs `Corporation`\
  \ `ALGOL` 编程团队的主要开发人员，他在 20 世纪 50 年代末期对该项目以及整个计算机编程产生了巨大影响。\n\n> **注意**  \n> Burroughs\
  \ 大型机上的 `ALGOL` 是我学习的第二门编程语言（我的第一门语言是 `CDC 6600` 大型机上的 `FORTRAN`，该机型在 20 世纪 60 年代被认为是第一台成功的超级计算机）。`ALGOL`\
  \ 的许多语法至今仍有重要价值，其某些特性是大型和小型设备上良好编程风格与高效编码的标志。\n\n结构化编程不是将控制权转移到由标签或编号标识的特定行，而是依赖于将代码结构化组织成逻辑部分（函数、过程或方法，你将在第\
  \ 10 章“构建组件”中了解更多）。然后，你可以将控制权转移到这个可能包含多行代码的逻辑部分。由于这种结构，你不再需要在代码中从一个行转移到另一个行，再转移到另一个行（因此，也就有了“意大利面条式代码”这个短语的起源）。\n\
  \n### 使用条件语句\n\n也许将代码结构化以避免随机跳转（从一个语句跳转到另一个，然后陷入混乱）的最简单方法是建立一个二项选择。如果某个条件为真，则执行紧随其后的代码行。这意味着，你只需决定是否执行下一行代码，而无需到处跳转。代码的结构和流程仍然相当容易理解。\n\
  \n你甚至可以扩展此模式，建立三项选择：如果条件为真，则执行这行代码；如果条件为假，则执行那行代码。请注意，这些不是相距甚远的代码行——它们是顺序排列的。这样，选择就很容易理解，控制流程也很简单。\n\
  \n你还可以通过使用复合语句来构建更复杂的结构，将一组语句视为一个整体。其逻辑稍作修改，概念上变为：\n\n如果此条件为真，则执行随后这几行代码；如果条件为假，则执行另外那几行代码。\n\
  \n代码行仍然是顺序排列的，因此条件（或 `if` 语句）被求值后，要么执行紧随其后的几行代码，要么（如果条件为假）执行另外的几行代码。尽管控制权会转向一组语句而非另一组，但所有代码都聚集在一起。\n\
  \n此模式的起始部分就是条件表达式本身。其最简单的形式是一个 `if` 语句。在 `Swift`（以及许多其他语言）中的基本风格如下面的代码片段所示：\n\n\
  ```\nvar x = 5\nif x > 4\n{\nx = x + 1\n}\n```\n\n清单 8-1  \n使用 `Swift` 的 `if` 语句\n\
  \n在 C 语言家族中，语法略有不同，如清单 8-2 所示：\n\n```\nif (x > 4)\n    x = x + 1;\n```\n\n清单 8-2\
  \  \n使用 C 语言的 `if` 语句\n\n如你所见，有必要以某种方式区分条件测试和要执行（或不执行）的代码。括号或花括号用于此目的。\n\n以上就是相关概念。接下来是具体的\
  \ `Swift` 示例。\n\n\n\n### 在 Swift 中使用复合语句\n\n在许多编程语言（包括 Swift 中），你可以通过将语句括在花括号中来将它们组合在一起，如下所示：\n\
  \n```\n{\nlet x = 5\nlet y = 6\n}\n```\n\n这使你可以将这些语句视为一条复合语句——也就是说，将其视为一条语句。这在与条件测试结合使用时特别有用。这意味着之前代码清单\
  \ 8-1 中展示的 Swift 示例可以得到增强。条件代码周围的花括号意味着它已经是一条复合语句。要让 `if` 语句应用于复合语句中的多条语句，你只需将第二条语句添加到花括号复合语句的内部，如代码清单\
  \ 8-3 所示。\n\n```\nvar x = 5\nif x > 4\n{\nx = x + 1\nprint (\"updated x\")\n}\n\
  代码清单 8-3\n将 Swift if 语句与复合语句一起使用\n```\n\n你可以使用 Xcode 的偏好设置来管理缩进。选择 **Xcode** ➤ **偏好设置**，然后选择\
  \ **文本编辑** 以及窗格顶部的 **缩进** 部分，如图 8-5 所示。\n\n![A441106_1_En_8_Fig5_HTML.jpg](img/A441106_1_En_8_Fig5_HTML.jpg)\n\
  \n图 8-5  \n设置缩进选项\n\n通过图 8-5 中所示的设置，你可以看到在图 8-6 中缩进是如何工作的。（该报错是因为像这样一个仅用于格式演示的、脱离上下文的复合语句在语法上是无效的。）\n\
  \n在图 8-6 中你看不到的是，在输入起始的左花括号后，插入点会移到下一行的缩进位置，以便你可以继续输入。当你输入右花括号时，缩进会取消，并且光标会移到左侧。任意长度的内嵌语句都能正确显示。\n\
  \n![A441106_1_En_8_Fig6_HTML.jpg](img/A441106_1_En_8_Fig6_HTML.jpg)\n\n图 8-6  \n\
  在 Xcode 偏好设置中使用缩进\n\n请注意，对于代码缩进，存在不同的风格和标准。最基本的一点之一是左花括号的放置位置。这在条件语句中尤其重要，因为在复合语句的左花括号之前存在代码。代码清单\
  \ 8-4 和代码清单 8-5 展示了两种基本风格。\n\n```\nif x > 4\n{\nx = x + 1\nprint (\"updated x\"\
  )\n}\n代码清单 8-4\n悬挂括号风格\n```\n\n```\nif x > 4 {\nx = x + 1\nprint (\"updated x\"\
  )\n}\n代码清单 8-5\n内嵌括号风格\n```\n\n这两种风格各有其支持的理由。在悬挂风格中，左花括号和右花括号是对齐的，因此可能更容易识别出复合语句。在内嵌风格中（代码清单\
  \ 8-5），左花括号和右花括号不对齐，但整个条件语句表现为一个整体（它本来就是一个整体）。\n\n当你扩展 `if` 语句以提供 `else` 子句时，问题可能会稍微复杂一些——`else`\
  \ 子句是在条件为假时要执行的一条语句或复合语句。代码清单 8-6 展示了悬挂 `else` 括号的一种版本。这种风格的常见变体不会缩进 `else`。\n\n\
  ```\nif x > 4\n{\nx = x + 1\nprint (\"updated x\")\n}\nelse\n{\nprint (\"no update\"\
  )\n}\n代码清单 8-6\n悬挂 else 括号风格\n```\n\n在代码清单 8-7 中，你看到的是内嵌的 `else`。与代码清单 8-6 相比，这种方式强调了\
  \ `if` 语句的两个组成部分。你使用哪种风格属于个人偏好问题（取决于你个人以及你项目团队的偏好）。\n\n```\nif x > 4 {\nx = x +\
  \ 1\nprint (\"updated x\")\n}  else {\nprint (\"no update\")\n}\n代码清单 8-7\n内嵌 else\
  \ 括号风格\n```\n\n### 三元运算符\n\n到目前为止，本章的讨论集中在应用程序内语句的控制上。有一个相关运算符的使用方式与之有些类似。三元运算符不管理控制流；而是在单条语句内让你从两个可选值中选择一个作为结果。此处讨论它，是因为它经常被用来替换更复杂的\
  \ `if` 语句。\n\n三元运算符所处理的是常见的 `if` 模式：\n\n```\nif x > 10 {\nmessage = \"greater than\
  \ 10\"\n} else {\nmessage = \"not greater than 10\"\n}\n```\n\n无论条件为真还是假，`message`\
  \ 都会被设置为某个值。使用三元运算符，你可以让这个过程变得简单得多。使用三元运算符的代码只有一行：\n\n```\nmessage = x > 10 ? \"\
  greater than 10\" : \"not greater than 10\"\n```\n\n这是一条替代语句，它包含了条件测试以及结果为真和假两种情况下的值。图\
  \ 8-7 在 playground 中展示了这一点。\n\n![A441106_1_En_8_Fig7_HTML.jpg](img/A441106_1_En_8_Fig7_HTML.jpg)\n\
  \n图 8-7  \n探索三元运算符\n\n你可以通过下载引言中描述的 `Conditional1` playground 来自行测试这段代码。尝试调整第一行代码中\
  \ `x` 的值以及三元运算符中 `x > 10` 的测试条件；你还可以尝试更改文本字符串。\n\n请记住，三元运算符是单条语句内的运算符（甚至不是一条复合语句，尽管如果你试图突破这个限制，可以玩出花样并产生一些几乎无法解读的代码）。\n\
  \n### 切换控制\n\n条件语句允许你分支到两个真/假条件之一；你还可以在一条或多条分支内放置条件语句，以便继续沿着各种条件的真/假路径进行分支。如果你想要实现比简单的二进制真/假分支更复杂的分支，你可能会发现自己深陷于令人困惑的嵌套分支中。你可能会意识到，你需要的不仅仅是两个选择，但\
  \ `if` 语句将你限制在一到两个选择（两个选择需要 `else` 子句作为 `if` 语句的一部分）。\n\nswitch 语句的抽象思想如下：\n\n*\
  \   评估一个条件。\n*   使用其结果来选择要执行的一条语句或一组语句。\n\n基本思想在代码清单 8-8 的伪代码中展示如下：\n\n```\nswitch\
  \  {\ncase : \ncase : \n}\n代码清单 8-8\n通用 switch 语句的伪代码\n```\n\n\n\n### Swift 的 Switch\
  \ 语句与其他语言的对比\n\n请注意，整个 `switch` 语句都被包裹在定界符（在此例中为大括号）内。`switch` 语句是编写结构化代码的优秀工具，但在不同语言之间存在一些显著差异。以下列举其中几点：\n\
  \n*   一旦表达式被求值并与某个表达式结果匹配，该段代码就会被执行，但接下来会发生什么？在 C 语言等语言中，当 `expressionResult1` 被选中并执行后，控制权将传递给后续语句。`break`\
  \ 关键字被用在 `case` 元素的末尾，使得控制权直接跳出整个 `switch` 语句。\n*   `break` 语句可以出现在任何位置。如果你有五个 `case`\
  \ 元素，你可以将 `break` 命令放在其中任何一个之后。你可以选择第一个 `case` 元素，执行它，然后继续执行第二个 `case` 元素，如果第二个\
  \ `case` 元素的末尾有一个 `break` 语句，则在此处终止。\n*   在 ALGOL 和 Pascal 语言家族（包括 Swift）中，选择仅限于执行单个\
  \ `case` 元素。可能不需要 `break` 语句。（Swift 就是这种情况。）\n*   整个语句可能被称为 `switch`、`case` 或 `select`。\n\
  *   `case` 元素通常被称为分支，并由关键字 `case` 标识。\n*   某些语言（包括 Swift）允许你修改选择某个 `case` 元素的条件。\n\
  *   许多语言需要一个特殊分支（通常称为 `default`），当没有 `case` 元素匹配表达式结果时执行该分支。\n\n这些差异很大程度上可能源于以下事实：尽管该语句功能强大，可以帮助你创建更具结构性和可读性的代码，但开发人员迅速添加了额外功能，并且这些功能并不一致。这可能与这些语句开发的时期有关——那是一个（20\
  \ 世纪 60 年代）语言开发和修改频繁的时代。\n\n### 探索 Swift Switch 语法\n\nSwift 的 `switch` 语句具有高度结构化和强大的功能。如果你熟悉其他语言的\
  \ `switch` 语句，它对你来说可能是新颖的，因此这里提供了基本的 Swift 语法，并将在接下来的\"使用枚举\"部分继续介绍。\n\n基本的 Swift\
  \ 语法如代码清单 8-9 所示。它与代码清单 8-8 中的通用伪代码相同，但包含一个 `default` 语句。在 Swift 中，`default` 语句是必需的，其解释可能与你习惯的其他语言不同。\n\
  \nSwift 的 switch 语句必须是穷尽的。这意味着如果控制表达式是某种类型，那么 `default` 语句适用于该类型中除 `case` 语句中标识的之外的所有元素。\n\
  \n```\nswitch <#表达式#> {\ncase <#值 1#>: <#语句#>\ncase <#值 2#>: <#语句#>\ndefault: <#语句#>\n\
  }\n```\n\n代码清单 8-9\n基本的 Swift switch 语句\n\n这意味着控制表达式必须有一个类型（所有表达式都有隐式或显式的类型）。在 Swift\
  \ 中，`break` 语句不是必需的：一个 `case` 表达式执行后，会被下一个 `case` 元素或 `switch` 语句的结束终止。\n\n在 Swift\
  \ 中，你可以让单个 case 元素处理多个值。只需像这样组合 case 元素：\n\n```\ncase \"result1\", \"result2\":\n\
  ```\n\n在某些其他语言中，你可能习惯于不同的写法；以下代码在 Swift 中无法工作，因为控制权不会从一个 case 元素传递到下一个。它会被下一个 `case`\
  \ 元素终止。\n\n```\ncase \"result1\":\ncase \"result2\":\n```\n\n你还可以对 case 元素使用许多其他条件。以下两节将介绍其中两种。\n\
  \n### 使用高级 Switch Case 元素：范围\n\n代码清单 8-10 展示了在 Swift switch 中使用范围的示例。代码首先声明了一个可选的变量（`myUserID`），它是一个\
  \ `Int` 类型。\n\n它被设置为 6，因此它有一个值，但请注意，如果它没有被设置（即未设置的可选值），这段代码仍然会正常运行，不会导致错误。它使用可选绑定来（如果可能）将\
  \ `userID` 设置为 `myUserID` 的解包值。\n\n注意：关于可选值和可选绑定的更多内容，请参见第 9 章。\n\n现在，switch 语句使用\
  \ `userID`（`myUserID` 的解包值）来选择要执行的 case 语句。在本例中，case 是使用 Swift 范围定义的：\n\n```\n5..<9\n\
  ```\n\n这个 Swift 语法表示范围介于 5 和 9 之间。请注意，该范围由三个字符组成：两个句点后跟一个 `<`。它并不是由三个字符后跟一个 `<`\
  \ 组成。\n\n```\nvar myUserID:Int?\nmyUserID = 6\nif let userID = myUserID {\n    switch\
  \ (userID) {\n    case 5..<9: print (\"第一个示例:\" + String(userID))\n    default:\
  \ print (\"未知 ID\")\n    }\n}\n```\n\n代码清单 8-10\n在 Swift switch 中使用范围\n\n你可以从图 8-8\
  \ 中看到代码的实际运行效果。\n\n![A441106_1_En_8_Fig8_HTML.jpg](img/A441106_1_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8\n在 Swift switch 中使用范围\n\n### 使用高级 Switch Case 元素：Where 子句\n\n你还可以在 case\
  \ 元素中使用 `where` 来创建复合条件，如代码清单 8-11 中的代码所示。\n\n```\nvar myUserID:Int?\nmyUserID =\
  \ 6\nif let userID2 = myUserID {\n    switch (userID2) {\n    case 5..<9 where userID2\
  \ < 7: print (\"优选用户:\" + String(userID2))\n    case 5..<9: print (\"非优选用户:\" +\
  \ String(userID2))\n    default: print (\"未知 ID\")\n    }\n}\n```\n\n代码清单 8-11\n\
  在 Swift switch 中使用 where 子句\n\n此代码建立在前面代码清单 8-10 所示的代码基础上。这里，范围条件被使用了两次。第一次，添加了一个\
  \ `where` 子句来细化 case 条件。第二次则没有 `where` 子句。\n\n请注意，这些 case 是按顺序逐一评估的。如果你颠倒它们的顺序，使得\
  \ `where` 跟在无条件 case 之后，如代码清单 8-12 所示，那么无条件 case 将被使用，而 where 子句将永远不会被用到。\n\n```\n\
  if let userID2 = myUserID {\n    switch (userID2) {\n    case 5..<9: print (\"非优选用户:\"\
  \ + String(userID2))\n    case 5..<9 where userID2 < 7: print (\"优选用户:\" + String(userID2))\n\
  \    default: print (\"未知 ID\")\n    }\n}\n```\n\n代码清单 8-12\n在 switch 语句中颠倒 where\
  \ 和通用 case 的顺序\n\n此代码的执行情况如图 8-9 所示。\n\n![A441106_1_En_8_Fig9_HTML.jpg](img/A441106_1_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9\n在 Swift switch 中使用 where 子句\n\n\n\n## 使用枚举类型\n\n正如 Swift 的 `switch` 语句建立在许多语言中已有的\
  \ `switch` 语句之上，Swift 的枚举（`enums`）同样也建立在其他语言的枚举基础之上。枚举类型（通常简称为 `enums`）正如其名：一种通过枚举其值来构建的类型。\n\
  \n枚举类型最常见的例子是 `Suit`，它具有 `Clubs`、`Spades`、`Hearts` 和 `Diamonds` 这些值。在许多编程语言（特别是\
  \ C 语言）中，枚举类型的顺序很重要，因为一个整数值可以被推断出或分配给每个类型值。因此，在 `Clubs`、`Spades`、`Hearts` 和 `Diamonds`\
  \ 这个例子中，其默认值如下：\n\n```\nClubs = 0\nSpades = 1\nHearts = 2\nDiamonds = 3\n```\n\n\
  你也可以按任何你想要的顺序显式地赋值。`enum` 的选项（case）不是字符串，因此它们不需要引号。你可以使用 `enum` 选项来访问它们的整数值。这意味着你可以在上面的例子中使用\
  \ `enum` 选项 `Hearts` 作为 2。\n\n这种方式只在一个方向上有效：你不能使用 2 来表示名为 `Suits` 的 `enum` 中的 `Hearts`\
  \ 选项。不过，你可以编写一个小的函数来将整数转换为 `Suits` 的名称。这种反向转换（从整数到 `enum` 选项名称）的一个原因是：`enum` 的整数在命名空间中不唯一：`enum`\
  \ 选项 `Spades` 的值可以是 1，而另一个具有 `Flowers` 选项的 `enum`，其 `Geraniums` 选项的值也可以是 1。\n\n\
  因此，许多人主要将 `enums` 视为使用整数来表示文本值（选项名称）的方式，以创建有时被称为自文档化的代码。（另一些人则认为这是个玩笑。这是一个存在争议的领域。）\n\
  \n### Swift 处理枚举类型的方法\n\nSwift 将枚举类型提升为一等类型，而不仅仅是类型或文档的快捷方式。在 Swift 中，选项名称（与其他语言一样）不是带引号的字符串。在某些情况下会使用自动赋值的概念，但你可以为每个选项分配一个`原始值`。该原始值可以是整数（如大多数语言），但也可以是字符串、字符或数字——甚至可以是浮点数。\n\
  \nSwift 的 `enum` 风格是 `enum` 名称首字母大写，选项值使用小写，如下所示。\n\n```\nenum Suit {\n    case\
  \ club\n    case spade\n    case heart\n    case diamond\n}\n```\n\n### 将 Swift\
  \ 枚举与 Switch 语句结合使用\n\n由于 Swift 中的 `enum` 比许多其他语言结构更严谨，因此它们非常适合 Swift 的特性，例如要求 `switch`\
  \ 语句的 `case` 分支必须是穷尽的。你可以使用 `enum` 来赋值，如下面的代码行所示，该行将 `Suit` 这个 `enum` 的 `club` 选项赋值给一个名为\
  \ `cardSuit` 的常量：\n\n```\nlet cardSuit = Suit.club\n```\n\n然后你可以开始创建一个使用 `cardSuit`\
  \ 的 `switch` 语句。如果你尝试闭合这个 `switch` 语句，将会收到一个错误，如图 8-10 所示。\n\n![A441106_1_En_8_Fig10_HTML.jpg](img/A441106_1_En_8_Fig10_HTML.jpg)\n\
  图 8-10 Swift 标记出非穷尽性的 switch 语句\n\n这个错误信息之所以可能，是因为 Swift 会跟踪每个 `enum` 的选项。如果你遵照提示信息并输入其他选项，错误就会消失，如图\
  \ 8-11 所示。\n\n![A441106_1_En_8_Fig11_HTML.jpg](img/A441106_1_En_8_Fig11_HTML.jpg)\n\
  图 8-11 使用枚举创建穷尽性的 switch 语句\n\n除了为 `switch` 语句的每个选项打印一条消息外，你可以利用 `enum` 是成熟类型这一事实，更普遍地引用它们，而不是像图\
  \ 8-11 或代码清单 8-13 中那样打印出选项元素的名称。\n\n```\nswitch cardSuit {\ndefault: print(cardSuit)\n\
  }\n```\n代码清单 8-13 简化 switch 语句\n\n在代码清单 8-13 中，所有控制流都经过 default 分支，你甚至根本不需要这个 `switch`。你可以用一行代码实现相同的结果：\n\
  \n![A441106_1_En_8_Fig12_HTML.jpg](img/A441106_1_En_8_Fig12_HTML.jpg)\n图 8-12.\n\
  \n```\nprint(cardSuit)\n```\n\n你可以设置一个 `enum` 的原始值。如前所述，原始值可以是数字（整数或浮点数）、字符、字符串或其他值。你只需在\
  \ `enum` 声明中添加它，如代码清单 8-14 所示。\n\n如果你这样做了，那么你可以通过访问 `enum` 的 `rawValue` 属性来检索它，例如：\n\
  \n```\ncardSuit.rawValue\n```\n\n本章前面给出的例子在图 8-13 中进行了更新，以展示如何打印原始值。你可以出于任何目的访问原始值——不一定是为了打印。你可以使用数值进行计算，也可以为选项名称添加有意义的字符串。\n\
  \n![A441106_1_En_8_Fig13_HTML.jpg](img/A441106_1_En_8_Fig13_HTML.jpg)\n图 8-13 显示枚举的原始值\n\
  \n```\nenum Suit: Double {\n    case club = 15.3\n    case spade = 32.6\n    case\
  \ heart = 0.0\n    case diamond = -42.3\n}\nlet cardSuit = Suit.spade\nprint(cardSuit)\n\
  print(cardSuit.rawValue)\n```\n代码清单 8-14 在枚举中使用原始值\n\n## 探索重复和步进\n\n大多数编程语言支持多种重复运算符。你在第\
  \ 5 章“管理控制流：重复”中看到了基础知识，但这里是对常见重复变体的概述。（所有这些在 Swift 中都是可用的，并且，在偶尔修改后，在你可能使用的大多数其他语言中也是如此。）\n\
  \n有两种基本类型的重复循环：`while` 循环和 `for` 循环。所有这些循环都会重复执行一条语句或复合语句。`while` 循环依赖条件语句进行控制，而\
  \ `for` 循环则依赖数据结构进行控制。\n\n> **注意：** 重复是对一条语句或复合语句的重复执行。为简化文本，本节提及语句，但请放心，你可以将单个语句替换为用花括号\
  \ `{ }` 括起来的复合语句，正如本章前面（“使用复合语句”）所讨论的那样。\n\n### While 和 Repeat-While 循环\n\n`while`\
  \ 循环有两个部分：一个为真或假的条件，以及要重复执行的语句。`while` 循环的行为略有不同，具体取决于条件是出现在语句之前还是之后。\n\n如果 `while`\
  \ 语句开始执行时条件为假，那么差异就变得明显了。对于一个初始为假的条件，以下循环不会执行。代码的执行方式与自然语言中的方式相同。因为 `while` 的条件不为真，所以它不会执行。当条件变为假时，`while`\
  \ 循环终止。\n\n> **注意：** 如果条件永远不会变为假，循环就会变成无限循环，永不停止。如果你的应用程序逻辑使得条件不会改变，那么你需要的不是 `while`\
  \ 循环，而是 `if` 语句。\n\n```\nwhile <condition> {\n    <statements>\n}\n```\n\n`while`\
  \ 语句的另一个版本至少会执行一次。以下是基本代码：\n\n```\nrepeat {\n    <statements>\n} while <condition>\n\
  ```\n\n这个循环总是至少执行一次。\n\n### For-In 循环\n\n这些重复依赖集合（数组、字典或集合）。主要的 `for-in` 循环依赖迭代和枚举。\n\
  \n\n\n#### 遍历集合\n\n最简单的版本就是简单地循环遍历集合（这被称为迭代）。代码清单 8-15 展示了三个简单的集合（一个数组、一个字典和一个集合），以及如何使用相同的语法对它们进行循环遍历。\n\
  \n```\nlet myArray = [\"dog\", 4.6] as [Any]\nlet myDictionary = [\"name\": \"Rover\"\
  , \"weight\": 20.5] as [String : Any]\nlet mySet = [\"name\", \"weight\"]\nfor arrayItem\
  \ in myArray {\nprint (arrayItem)\n}\nfor dictionaryItem in myDictionary {\nprint\
  \ (dictionaryItem)\n}\nfor setElement in mySet {\nprint (setElement)\n}\nListing\
  \ 8-15\nUsing for-in loops for collections\n```\n\n你可以在图 8-14 所示的 Playground 中看到这一点。\n\
  \n![A441106_1_En_8_Fig14_HTML.jpg](img/A441106_1_En_8_Fig14_HTML.jpg)\n\n图 8-14\n\
  \n在 Playground 中探索循环\n\n这种遍历方式非常常见，当你只想依次处理集合中的每个元素时，它就能派上用场。\n\n#### 遍历索引（数组）和键（字典）\n\
  \n对于数组和字典，有时你不仅需要元素的值，还需要它的索引（对于数组而言）或其键（对于字典而言）。\n\n> **注意：** 由于集合是无序的，没有键或索引可供使用，因此你只能像上一节所述那样遍历集合元素。\n\
  \n正如上一节所述，遍历集合元素与枚举这些元素之间是有区别的。在本节中，你将看到如何枚举一个数组。这种枚举会提供数组的每个元素及其对应的索引。（请记住，数组索引是数组结构本身的一部分，而非数据的一部分。）\n\
  \n内置函数 `enumerated` 会为数组的每个元素提供元组。每个元组由数组索引和值组成。如果你对数组调用 `enumerated()`，你将看到如图 8-15\
  \ 所示的这些元组。请注意，之前使用的数据已更改，在数组中增加了第三个元素（`cat`）。Playground 中的数据查看器会显示包含这三个元素的数组。如果你点击展开三角形打开它，就会看到三个索引及其关联的值。\n\
  \n![A441106_1_En_8_Fig15_HTML.jpg](img/A441106_1_En_8_Fig15_HTML.jpg)\n\n图 8-15\n\
  \n在数组上调用 `enumerated()` 的结果\n\n如果你想使用这些枚举值，可以使用如下代码来显示它们。首先，在数组 `myArray` 上调用 `enumerated`\
  \ 函数。然后，`for-in` 循环对 `myArray.enumerated()` 的结果进行操作。每个元组中的两个值都会被打印出来。\n\n```\nfor\
  \ (index, item) in myArray.enumerated() {\nprint (\"index: \" + String(index) +\
  \ \" item:\" + String(describing: item))\n}\n```\n\n你使用的元组名称无关紧要，因为重要的是元组中元素的顺序。如果你想这样修改代码，它仍然可以正常工作（只要你更新\
  \ `print` 语句以匹配你为元组值赋予的名称）。\n\n需要注意的重要一点是，由于你处理的值不全是字符串，你可以接受 Xcode 中提供的 Fix-It\
  \ 建议，将数字转换为字符串。这些建议依赖于 `String(describing:)` 函数，正如本节代码中所看到的那样。\n\n要对字典进行类似的枚举，你不需要调用\
  \ `enumerated`，因为字典中的键值对本身既包含键也包含值。因此，你可以像这样直接为元组值命名：\n\n```\nfor (key, value) in\
  \ myDictionary {\nprint (\"key:\" + key + \" value:\" + String(describing: value))\n\
  }\n```\n\n本节中的代码显示在代码清单 8-16 中。\n\n![A441106_1_En_8_Fig16_HTML.jpg](img/A441106_1_En_8_Fig16_HTML.jpg)\n\
  \n图 8-16\n\n展示字典的键和数组的索引\n\n```\nlet myArray = [\"dog\", 4.6] as [Any]\nlet myDictionary\
  \ = [\"name\": \"Rover\", \"weight\": 20.5] as [String : Any]\nfor (index, item)\
  \ in myArray.enumerated() {\nprint (\"index: \" + String(index) + \" item:\" + String(describing:\
  \ item))\n}\nfor (key, value) in myDictionary {\nprint (\"key:\" + key + \" value:\"\
  \ + String(describing: value))\n}\nListing 8-16\n```\n\n### 使用步长（Strides）\n\n除了内置的重复结构（`for-in`\
  \ 和 `while`），Swift 标准库还包含一些在这些场景中常用的函数。你已经见过了 `enumerated()` 函数，其他函数也值得探索。你可能会发现标准库中一个有用的函数是\
  \ `stride(from:to:by:)` 函数。这个函数可以被遵循了 `Strideable` 协议的类型所采用。你不必过于担心这具体意味着什么，只需记住那些遵循\
  \ `Strideable` 的类型列表：\n\n- `CGFloat`\n- `Decimal`\n- `Double`\n- `Float`\n- `Float80`\n\
  \n在处理这些类型的数组时，你可以应用两个 `stride` 函数：\n\n```\nstride (from: to: by:)\nstride (from:\
  \ through: by:)\n```\n\n它们之间的区别在于是否将上限值包含在步长范围内（`through` 包含，`to` 不包含）。使用 `stride`，你可以实现一些你可能习惯的\
  \ C 语言风格的循环（具体来说，不仅可以指定从某个值到某个值，还可以使用步长，而不仅仅是递增 1）。\n\n## 总结\n\n本章深入探讨了一些许多语言通用的基础计算机科学原理。在讨论的两个主题（枚举和\
  \ switch 语句）中，你看到了 Swift 如何扩展通用功能，以及如何使通用特性得到更严格定义和使用。\n\n在了解了数据与类型以及控制流程之后，你已经掌握了计算机科学的许多基础知识。下一步是学习如何存储和检索数据。毕竟，如果没有这些功能，用户每次运行应用时都只能从头开始。\n\
  \n\n"
- "# 9. 存储数据与共享数据\n\n计算机科学的核心在于一个标准短语：计算机的设计与应用。尽管早期已有类计算机设备的雏形（例如 19 世纪 30 年代查尔斯·巴贝奇的分析机、1804\
  \ 年的雅卡尔织布机，以及 20 世纪 30 年代至二战期间因图灵的突破而发展的恩尼格玛密码机），但现代计算机时代实际上始于 20 世纪 40 年代。这一时期取得的重大飞跃是硬件领域的显著进步，而可以说，最具里程碑意义的突破是编程语言和编译器的开发——这使得计算机能够根据人类编写的类英语代码自动生成指令。（关于软件方面的更多细节，可上网查阅格蕾丝·霍珀及其同事的相关资料。）\n\
  \n即便在 20 世纪 70 年代末个人计算机问世、20 世纪 90 年代互联网兴起之后，随着新技术和新能力的涌现，计算机科学的基础并未发生根本改变。但有一项变化——相当戏剧性的变化——是数据的存储与共享方式。\n\
  \n尽管计算机硬件的进步时常在媒体上被大张旗鼓地宣扬，但许多人对数据相关的变革却兴趣寥寥。事实上，很多人将数据及数据管理视为计算机科学领域中近乎琐碎的环节。哦，没错，确实有数据需要存储在某个地方，但让我们先关注\
  \ 3D 打印、社交媒体这类激动人心的事物，暂且把那些平凡的数据存储搁置一旁吧。（随便找一位数据管理专家聊聊这个话题，你很可能会引发一场关于此事的滔滔不绝的评论狂潮。）\n\
  \n数据的作用对计算机科学及其应用至关重要，而这种作用的演变方式直到最近才引起少数人的关注。本章将探讨计算机科学中的数据问题，分为四个部分，分别对应数据的四大核心关注点：\n\
  \n-   数据是什么？所有应用都会生成、消费和存储数据。你或许认为自己的应用是例外，但若审视其生成、消费和存储的所有数据，便不存在例外。\n-   数据存储在哪里？除了由硬件和软件按需生成的数据外，支撑应用运行的数据需要存储在某个位置。有时应用正在创建数据，此时数据通常也需要存储，即便只是临时存储在系统或应用内置的某个暂存区域。\n\
  -   谁负责管理数据？数据是静态的，还是定期更新（如果是，由谁更新）？数据归谁所有（在很多情况下这并非易事）？有哪些流程确保更新、数据完整性和安全性？\n-\
  \   数据如何管理？这个问题涵盖从电子表格数据格式到数据库管理系统，以及大数据新领域中的各项议题。\n\n> **注意**\n> 本章与本书其他章节略有不同，因为它不会向你展示要编写的代码——因为多数议题的层次高于代码层面。事实上，可以说数据管理的问题至少与创建、管理和使用数据的代码同等重要。但无论你对代码与数据相对重要性持何种观点，二者都至关重要，在\
  \ 21 世纪的计算机科学方法中缺一不可。或许五十年前，当“数据”意味着成箱的穿孔卡、成卷的磁带，以及成堆等待键盘穿孔的纸质文件时，人们确实可以无视所有数据来研究计算机科学。但如今已不再可能。正如\
  \ 20 世纪 40 年代计算机编程先驱们所理解的，计算机处理代表数字的代码，与处理代表程序逻辑和指令的代码一样轻松。在许多方面，数据与代码是可以互换的。这正是格蕾丝·霍珀的启示：正是这一点使得编译器成为可能。\n\
  \n## 数据是什么？\n\n如果你认为这个问题的答案很简单，请三思。当你阅读、收听或观看关于数据泄露、黑客攻击或系统故障的新闻时，常常会看到一些你从未考虑过的数据被提及。当你开始思考某个应用所使用的（创建、生成或管理的）数据时，你首先会清晰地想到该数据的各个方面。\n\
  \n新闻报道经常揭示的是许多数据管理者早已熟知的事实：应用数据只是冰山一角。用户使用应用的时间和地点在很多情况下至关重要，这些信息也属于应用数据的一部分。（如果你不信，可以关注新闻，看看调查人员在搜索嫌疑人手机、桌面或其他设备上的数据时，究竟在寻找什么。）\n\
  \n发送到应用或从应用发出的数据可归入“应用数据”类别。同样属于应用数据类别的，还有应用商店中的应用描述，以及媒体（包括社交媒体）上关于该应用用途和使用方式的评论。\n\
  \n所有这些都构成了“应用数据”，并以不同方式对各类人群产生影响。普通用户在常规使用中接触的数据，只是应用数据的一部分。\n\n无论你是用户、开发者，还是需要管理应用及其数据的管理者，每个人都必须意识到这些数据的存在。每个角色都需要思考应用数据。先从设计师或开发者入手。如果你开始思考这些数据，你可能会认定自己无法控制谁在记录用户何时何地使用你的应用。\n\
  \n这种想法是错误的。\n\n使用记录部分由应用本身生成，作为开发者或设计师，这是你的责任。如果你的应用以“欢迎回来！”的消息迎接回头客，这或许是个友好的问候，但为了实现这一功能，作为开发者的你必须存储区分首次用户和回头用户的信息。这样一来，你就在存储可能对你的用户（以及其他人）重要或不重要的信息。这类设计决策的每一个都会影响应用数据。\n\
  \n在某些情况下，这显然无关紧要，而在另一些情况下则至关重要，用户也心知肚明。如果你的应用按次收费，那么记录使用次数是合理的。总的来说，许多安全与数据管理专家建议：只存储你需要的数据，不存储任何多余数据。“说不定将来有用”绝非存储数据的充分理由。记住：未存储的数据不会被盗取，不会产生混乱或被损坏，而且——或许最重要的是——不会占用设备和云端的宝贵存储空间。\n\
  \n许多开发者都惊讶于客户带着一长串数据清单，坐下来讨论新项目或新应用需要存储哪些数据。当开发者询问客户数据将存储在哪里时，回答往往是“在应用里”，有时是“在云端”。在项目深入之前，务必确保你确切了解数据将存储于何处。当你聚焦于数据存储的细节时，客户往往才开始明白其中涉及的内容。你可以为他们提供数据存储和维护的预估成本，而很多时候，存储大量“或许将来有用”的数据的需求就会减少或消失。\n\
  \n记住：只存储你需要存储的数据，其他一概不存。翻阅著名计算机科学项目的历史，你会发现不少因数据存储方案过于野心勃勃而遭遇挫折的项目，这样的例子比比皆是。\n\n\
  厘清数据及其存储的必要性并不意味着你就不该存储数据。在大多数情况下，你必须存储并使用数据，只是要保持谨慎。\n\n\n\n## 数据存储在哪里？\n\n如果从广义角度看待应用数据，你很快会发现它存储在许多地方，因为使用数据最终可能会被互联网服务提供商以及运行应用过程中的所有中间参与者所存储。即使在没有网络连接的专用个人设备上，使用数据也很有可能以某种形式存储在设备中。不过，除了这些情况，你可以关注应用自身数据的存储位置——即环境数据和使用数据之外的数据。\n\
  \n这类数据不同于应用运行时使用的数据（即第 7 章讨论的堆栈和堆位置）。这是应用可能存储的数据，用于记录游戏分数或移动步骤，管理从文字处理文本、电子表格数据，甚至应用录制的音乐或视频等各类数据。这些数据需要存储在某个地方，以便用户在需要继续使用时（甚至想要删除时）能够再次访问。\n\
  \n术语`持久化存储`常被用于描述此类数据存储。该术语源于对存储设备的描述——即使断电也能保留数据。如果关闭磁盘驱动器，再次开启后仍可使用数据，这就是持久化存储。如果数据存储在设备的堆栈和堆内存中，当应用停止运行或设备断电时，数据就会消失——这是非持久化的。\n\
  \n**注意**\n\n这些都是概念。由于人们通常期望数据具有持久性——即使实际存储设备或介质不可用，硬件和软件开发人员仍有办法在物理存储不可用时保持数据可用，因此你可能会在看似非持久化的存储中观察到持久化现象。\n\
  \n应用数据主要可以存储在以下三个位置（即大多数用户和开发者想到应用数据时所指的数据）：\n\n*   应用运行时在设备上的存储空间。\n*   设备上属于应用的持久化存储空间。\n\
  *   设备上为所有应用提供的通用存储空间。\n*   专为存储而设计的存储中心（Google Drive、Apple iCloud、Microsoft OneDrive\
  \ 和 Azure、Dropbox 等）。\n\n### 在非持久化应用存储中存储数据\n\n应用在运行时会获得可供其使用的存储空间。这些空间是非持久化的，应用停止运行或设备关机后数据不会保留。事实上，计算机存储虽然比过去便宜，但仍是昂贵且稀缺的资源。操作系统会尽可能重复利用这些存储空间。为了能够重复利用数据存储，操作系统会跟踪不再需要的数据。当你“删除”数据时，通常会使操作系统将数据标记为可删除状态：操作系统通常不会真正擦除数据。\n\
  \n**注意**\n\n有些选项可以真正删除数据，而不仅仅是将其标记为可重复使用的存储空间。实际上，安全删除通常会在待复用的存储位置上写入随机或已知模式的数据——有时会重复多次。数据一旦写入某处，真正清除它其实非常困难。\n\
  \n尽管某些情况下实际情况可能不同，开发者通常将应用存储视为非持久化的。要在应用结束后存储数据，或将其发送到其他设备或应用，需要采用其他技术。\n\n### 在持久化应用存储中存储数据\n\
  \niOS（包括 Swift）的存储模型具有专用的持久化应用存储。这部分存储空间分配给应用使用，应用及其开发者可以自主处理该存储空间（尽管存在大小限制）。当你从设备上删除应用时，这些存储空间会被清除，如图\
  \ 9-1 所示。\n\n![A441106_1_En_9_Fig1_HTML.jpg](img/A441106_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n在 iOS 上删除应用会同时删除其数据\n\n### 在设备上应用存储之外存储持久化数据\n\n从大型机超级计算机到最小的智能手机，所有计算机上的应用都能对持久化存储进行读写操作。这种通用能力会受到限制——并非所有应用都能使用这些功能。通常情况下，以这种方式在设备上存储数据是存储特定于设备、应用和用户数据的正确方法。例如，你可以利用可用存储空间来存储游戏分数、用于分析的数据或其他任何用途。\n\
  \n应用的这些存储位置常被称为`沙盒`。在限制应用读写数据的诸多措施中，最常见的是将读写操作限制在应用的沙盒范围内。\n\n**注意**\n\n“`沙盒`”一词有多种含义。它可以指应用和项目的测试区域，例如让你测试与\
  \ eBay、Amazon 等集成的沙盒。在这种沙盒中，你可以实际测试购买等操作，而不会真正从信用卡扣费。沙盒也常指应用的运行时非持久化数据存储，如上一节所述的堆和栈。沙盒还可以指仅特定设备上的特定应用（或使用共享用户标识符如\
  \ AppleID 的共享设备）可以访问的持久化存储。\n\n### 在共享存储位置存储数据\n\n一旦将视野扩展到应用运行所在的设备之外，你会有许多数据存储位置可供选择。Dropbox\
  \ 和其他云服务是常见的资源。自 iOS 11 起，iOS 上的“文件”应用会向你展示各种文件位置，如图 9-2 所示。如果你有 Dropbox 或其他账户，它们会出现在“位置”中。集成的用户界面让用户无论文件在哪里都能看到文件及其位置。（请记住，这些都是持久化存储位置。）\n\
  \n![A441106_1_En_9_Fig2_HTML.jpg](img/A441106_1_En_9_Fig2_HTML.jpg)\n\n图 9-2\n\n\
  使用“文件”在 iOS 设备上管理文件和位置\n\n## 谁负责管理数据？\n\n如果你已经确定了应用的数据及其存储位置，仍有两个问题需要解决：谁负责管理数据，以及数据如何管理和格式化。谁负责管理数据（本节讨论的内容）这个问题非常不涉及技术层面。\n\
  \n如果你编写了一个让用户存储某些数据的应用——例如记录野生动物目击事件及其日期、时间、照片和评论——那么谁负责管理这些数据？谁拥有它？谁可以使用它？这些问题有很多。\n\
  \n尽管计算机科学传统上聚焦于计算机和计算机软件的设计与实现，但从事计算机科学领域工作的人越来越多地被要求处理此类数据问题。这些问题的答案可能很复杂（在很多情况下，对于答案是什么甚至没有共识）。\n\
  \n在开发者、设计师、用户、管理者以及所有其他参与者的日常计算机科学实践中，本章讨论的数据问题可能尚未得到解决。部分原因在于缺乏最佳实践，甚至缺乏意识到这些问题存在的人。\n\
  \n在出现明确的指导方针和标准之前，本章讨论的数据问题的处理方式似乎非常随意。许多业内人士认为，除非特定项目有其他指导和标准，否则每个项目都应有某人提出此处讨论的问题，并努力确保在每个项目中对这些问题加以解决。\n\
  \n\n\n### 数据所有权\n\n数据所有权涉及多个方面。最基本的是，谁拥有以法律权利发布（或不发布）数据，以及允许（或不允许）通过出版以外的方式访问数据的权利。\n\
  \n在当今世界，这可能没有简单的答案，但我们日益发现数据所有权的具体方面正得到解决。在具有不同法律效力的文档和协议中，人们每次在社交媒体网站上发布或查看数据时，都依赖于关于所有权的陈述。\n\
  \n当数据被用于新的用途时，所有权问题常常会出现。如果你使用一个应用来追踪你的野生动物 sightings，你可能会认为你的数据就是你的数据，仅此而已。然而，如果你的数据与其他人的野生动物\
  \ sightings（也许有数百万人）汇总在一起，那么这些数据就可能具有巨大价值。这种价值对科学家和市场营销人员都可能有用。在其汇总形式下，你发现的一只黑松鼠的数据可能既实用又有价值。\n\
  \n在构建和管理应用时，对数据所有权的意识通常需要被内置到应用中。谁才是数据所有者的问题可能无需解决，但越来越多的应用在设计时就考虑到，一旦数据的价值变得显著，应用能够支持从该价值中获利所需的功能。\n\
  \n实现这些结果的方式并不特别复杂。它们可能简单到确保应用中的数据访问受到某种机制保护，例如密码或其他凭证，以便能够根据身份、付款或其他标准来控制或授予（或拒绝）访问权限。\n\
  \n在很多情况下，应用的数据设计是，不是开启一个管理访问控制的选项，而是需要对数据存储和访问进行重大架构更改才能管理访问控制。\n\n### 数据完整性\n\n\
  无论数据归谁所有，都需要有一个机制来确保数据的完整性。存储的数据本质上是不稳定的，仅仅因为数据从计算机到存储设备再返回的移动过程，是系统开发和集成中的薄弱环节之一。在最简单的情况下，计算机操作与数据存储之间的连接可能会因为连接丢失（或不稳定）而中断。任一设备都可能丢失或断电。\n\
  \n此外，数据移动的过程通常很脆弱。数据最终是一个比特序列，其完整性取决于每个比特的值在存储和传输过程中被准确保存，以及序列同样被保存下来。\n\n在管理数据完整性方面，有三个关键工具：\n\
  \n*   **校验和** 用于帮助维护数据的表示。\n*   **时间戳和其他数据标记** 用于记录对数据的更改。\n*   **版本控制** 用于帮助识别数据的不同版本。\n\
  \n### 使用校验和\n\n为此，开发人员和设计人员有许多可用的策略。最常见和最简单的方法之一是使用校验和这样的机制。在这种方法中，数据的二进制数字（或者更常见的是字节或字符）被视为二进制数字。通过操作（通常是累加）它们，并将结果存储起来。当需要验证数据时，重新累加字节或字符，并将该总和与存储的总和（校验和）进行比较。这种方法——通常通过进一步的运算如除以素数来增强——可以捕捉到常见错误，例如一长串数据中的错误比特。事实上，许多通信协议、设备和标准都允许进行此类检查，并自动重传可能损坏的数据。\n\
  \n对校验和的基本理解（可能只需本段这么详细的了解）是计算机科学从业者工具包的一部分。\n\n### 使用时间戳和其他数据标记\n\n除了比特和字节的物理完整性之外，还需要以某种方式保护数据及其变更的完整性。许多数据库设计者会自动存储数据及其更新的时间戳（日期和时间）。\n\
  \n时间戳通常表示为自某个已知日期以来的时间间隔，并进行存储。有几种常用的参考日期。（`纪元日期` 是一个类似的术语。）\n\n常见的包括：\n\n*   **1970\
  \ 年 1 月 1 日午夜。** 这是 Unix（以及相关系统，如 Linux 和 macOS/iOS）中使用的参考日期。\n*   **2001 年 1 月\
  \ 1 日午夜。** 选择这个日期是为了反映 2001 年是 Mac OS X（现为 macOS）首次发布的年份。\n\n参考日期之前的日期以负值的秒数表示。所表示的时间通常采用协调世界时（UTC），即以前所称的格林威治标准时间（GMT）。因此，这些时间在全球范围内是恒定的。\n\
  \n除了时间戳，通常还有其他数据标记用于标识数据及其变更。除了时间戳，还有一个或多个通用唯一标识符（UUID）。这些通常由操作系统提供。它们被保证在全世界范围内尽可能唯一。它们通常是比较长的字符串，你可以通过操作系统创建；你也可以在它们上面添加你自己的标识符，从而获得特定数据元素的通用唯一标识符。这些在调试时很有帮助。\n\
  \n你会发现有些评论说这些标记占用了宝贵的存储空间，并且创建和解码它们所涉及的计算消耗了宝贵的计算资源。\n\n这些担忧绝对合理，但请记住，随着更强大设备的普及成为常态，它们的意义已经随着时间的推移而降低。\n\
  \n一套常见的数据标记通常作为大多数数据项的一部分进行存储。这些元素因项目而异，但值通常来自以下列表：\n\n*   数据创建的时间戳（首次存储）\n*   最后修改的时间戳\n\
  *   数据创建的标识\n    1.  用户\n    2.  设备\n    3.  位置\n*   数据修改的标识\n    1.  用户\n    2.\
  \  设备\n    3.  位置\n*   数据元素的通用唯一标识符。\n*   数据版本。\n\n### 版本控制\n\n无论你多么熟练，经验多么丰富，你的数据存储设计未经修改就能一直用下去的情况是很少见的。可能存在错误，但即使没有，情况也会变化。你可能需要存储不同的数据，而你已经存储的一些数据可能变得无关紧要。\n\
  \n为了处理这类情况，通常为数据格式提供一个标识符——这意味着需要某种标识符来指明正在存储什么数据以及如何存储。一种常见的做法是在数据记录的开头以尽可能简单的形式存储版本标识符。一个简单的二进制数就足以进行版本管理。\n\
  \n如果你这样做，那么当你的应用读取（或写入）数据时，读取或写入的第一件事就是这个数字。一旦它被读取，应用就能知道该记录中还存储了什么，并且可以读取它们。\n\n\
  使用 `Swift` 时，通常的做法是存储版本号，然后跟一个字典（参见第 6 章“处理数据：集合”）。字典非常灵活，因此你可以在运行时确定键是什么，甚至使用版本号来告诉你它们是什么。如果键的含义随版本变化（有时是不可避免的情况），你将拥有解码或编码数据所需的所有数据。\n\
  \n## 数据如何管理\n\n数据管理有两个方面需要考虑：\n\n*   **外部数据**，在何处以及如何管理。\n*   **数据的格式化和结构**。\n\n\
  \n\n### 管理外部数据\n\n如果数据存储在外部，可能位于你的应用有权访问的联网计算机或磁盘驱动器上。更常见的情况是，应用将数据存储在专门为应用提供存储的外部数据提供商处。\n\
  \n这些是 Dropbox、Google Drive、Box、OneDrive 和 iCloud 等产品的特殊用途版本。它们主要面向需要基本文件存储的用户。\n\
  \n此外，还有按需托管服务，例如 Amazon Web Services (AWS)、Microsoft/Azure、Google Cloud Platform、阿里云和\
  \ IBM Bluemix/SoftLayer。这些服务之间的区别在于，它们面向的是希望直接访问数据存储而非处理文件的应用。（请注意，这只是基础概述。）\n\n\
  大多数现代开发环境都支持 REST 等以互联网为中心的协议，这些协议使得远程读写数据变得简单。\n\n更重要的是，这些按需托管服务支持各种类型的软件即服务（SaaS）和存储即服务。如果你的应用突然流行起来，需要迅速大幅增加数据存储容量，这正是它们能自动处理的情况。\n\
  \n它们的数据农场和数据中心遍布全球，处理任务可以全天候在不同地点之间转移。这正是可快速扩展应用得以部署的方式。从应用的角度来看，存储位于单一位置，尽管实际上数据可能为了冗余备份和自动容错而广泛分布。\n\
  \n这让我们回到了应用数据存储位置这个基本问题。在这种现代架构中，包括你在内，可能没有人知道数据具体位于何处。\n\n### 格式化与构建数据\n\n使用按需云存储意味着你可以决定所使用的存储类型：该服务仅提供存储本身。\n\
  \n常见的存储协议和格式分为几类。\n\n- **简单且可移植。** 最基本的格式最初来自电子表格。它们是基于文本的格式，专为行列式数据设计。最常见的两种是逗号分隔值（CSV）和制表符分隔文本。数据是基于字符的。\n\
  \n- **JSON。** JavaScript 对象表示法是一种基于字符的格式，将数据结构化为层级结构（例如学校中的班级，班级中的学生）。JSON 是一种基于文本的格式，因此可以使用任何处理文本的工具进行读写。有关在\
  \ Swift 4 中使用 JSON 的示例，请参阅清单 9-1 和图 9-3。\n\n- **属性列表。** Apple 有一种属性列表（plist）设计模式，包含\
  \ `String`、`Number`、`Boolean` 类型的条目，以及集合类型 `Array` 和 `Dictionary`。这些类型可以组合，因此属性列表可能由一个字典组成，该字典本身包含多个数组和另一个字典。只要所有组件都是兼容的\
  \ plist 类型（`String`、`Number`、`Boolean`、`Array` 和 `Dictionary`），就没问题。有实用函数可以快速将属性列表与易于存储的格式进行相互转换。此外，你还可以添加自定义类型。\n\
  \n- **专有格式。** 传统上，这些格式用于专有应用中的特殊目的。如今，人们越来越警惕将其数据困在专有格式中。明智的消费者和管理者越来越多地倾向于使用通用格式，或者如果需要使用专有格式，则希望能够轻松地从标准格式导入和导出数据。\n\
  \n- **仪表盘与大数据。** 除了担心数据被困在专有格式之外，人们也认识到需要整合存储在不同系统和格式中的数据。为此，仪表盘和仪表盘工具正在被开发出来。它们接收任何格式的数据，并将其可视化和综合，以便形成统一视图。（Tableau\
  \ 是一种流行的仪表盘工具。）\n\n- **SQL 与其他数据库。** 传统数据库通常使用专有格式进行数据存储，但通过使用 SQL 作为管理和查询语言而实现了统一。数据库管理系统（DBMS）负责存储数据，但如今几乎所有的\
  \ DBMS 都提供 SQL 访问接口。通过这种方式，仪表盘和 SQL 发挥着相似的作用：为存储在各种格式中的数据提供通用访问。\n\n\n\n### 在 Swift\
  \ 4 中使用 JSON\n\nJSON 正迅速成为数据共享最常用的格式之一。在 Objective-C 和 Swift 中，已有多个版本的代码用于 JSON\
  \ 的相互转换（特别是 JSON 与 `plist` 类型之间的转换）。在 Swift 4 中，这些内置工具已被重写并简化。如代码清单 9-1 所示。\n\n\
  代码清单 9-1 展示了一个 Swift playground，它使用一种 plist 类型（本例中为一个数组）将其转换为 JSON，然后再转换回来。这是与电子表格、数据库甚至网页浏览器共享数据的常用方式（许多浏览器都能读取和格式化\
  \ JSON 文件）。\n\n在代码清单 9-1 中，你可以看到 playground 的设置。请注意，必须导入 `Foundation`，但 JSON 工具不需要\
  \ `UIKit`。它们是更底层的工具。这里创建了一个本地数组，然后将其打印出来。\n\n```swift\nimport Foundation\nlet myArray\
  \ = [\"one\", \"two\", \"three\"]\nprint (myArray)\n```\n\nSwift 4 的标准库中有一个用于处理\
  \ JSON 转换的类。你需要创建该类的实例：\n\n```swift\nlet jsonEncoder = JSONEncoder()\n```\n\n该 playground\
  \ 的核心是两行使用 `jsonEncoder` 实例的代码。第一行是可选代码，在此例中指定 JSON 文本的格式应易于人类阅读：\n\n```swift\n\
  jsonEncoder.outputFormatting = .prettyPrinted\n```\n\n接下来，使用 `jsonEncoder` 实例对 `myArray`（或任何其他与\
  \ `plist` 兼容的类型）进行编码。在此示例中，编码结果存储在 `encodeToJSON` 中。\n\n```swift\nlet encodeToJSON\
  \ = try? jsonEncoder.encode(myArray)\n```\n\n该选项会对 JSON 文本进行排版，使其更易读。在代码清单 9-1 的完整列表中，你会看到围绕这行代码的错误检查。\n\
  \n在代码清单 9-1 中，随后使用同一个 `jsonEncoder` 实例对 `encodeToJSON` 进行解码：\n\n```swift\nlet decodeFromJSON\
  \ = String(data: encodeToJSON, encoding: .utf8)\n```\n\n`UTF8` 编码是一种常用的标准文本编码。你可以在文档中找到其他编码值。\n\
  \n考虑到你可以将大型数组和字典编码和解码为文本进行读写，这为你提供了一种非常强大的数据管理方式，可以将数据存储起来，供其他设备上的其他应用读写。\n\n```swift\n\
  import Foundation\nlet myArray = [\"one\", \"two\", \"three\"]\nprint (myArray)\n\
  let jsonEncoder = JSONEncoder()\njsonEncoder.outputFormatting = .prettyPrinted\n\
  if let encodeToJSON = try? jsonEncoder.encode(myArray) {\n    if let decodeFromJSON\
  \ = String(data: encodeToJSON, encoding: .utf8) {\n        print (decodeFromJSON)\n\
  \    } else {\n        print (\"failed\")\n    }\n    print (\"did encode\")\n}\
  \ else {\n    print (\"failed2\")\n}\n```\n代码清单 9-1  \nJSON 的相互转换\n\n图 9-3 展示了添加了错误检查代码后的\
  \ playground 代码。\n\n![A441106_1_En_9_Fig3_HTML.jpg](img/A441106_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3  \n在 Playground 中编码和解码 JSON\n\n```swift\nimport Foundation\nlet myArray\
  \ = [\"one\", \"two\", \"three\"]\nprint (myArray)\nlet jsonEncoder = JSONEncoder()\n\
  jsonEncoder.outputFormatting = .prettyPrinted\nif let encodeToJSON = try? jsonEncoder.encode(myArray)\
  \ {\n    if let decodeFromJSON = String(data: encodeToJSON, encoding: .utf8) {\n\
  \        print (decodeFromJSON)\n    } else {\n        print (\"failed\")\n    }\n\
  \    print (\"did encode\")\n} else {\n    print (\"failed2\")\n}\n```\n代码清单 9-2\
  \  \n编码/解码 JSON（Swift 4）\n\n## 处理不存在的数据：Swift 可选值\n\n计算机科学中最棘手的问题之一是如何处理不存在的数据。这指的是数据缺失或因任何原因不存在的情况。如果保留数据为空白，当字段通常是数值型时，它可能会被解释为零。将空白字段计为零会在计算平均值时产生偏差。当然，你可以直接忽略空白字段以保持平均值准确，但这样你就无法指示数据因合理原因而缺失。例如，传感器或仪表的读数缺失，可能是因为遥测或电源故障。如果零是有效读数，那么就无法区分“零表示缺失”和“零就是数值本身”。\n\
  \n你总是可以选择另一个特殊数字来表示缺失数据。但无论你选择哪个数字，都可能影响计算结果。（许多大型机程序使用 99 表示缺失数据，包括年份数据。）值为 99\
  \ 的年份在 20 世纪 60 年代编写这些程序时是难以想象的。到了 20 世纪 60 年代，金融机构发行了 30 年期的抵押贷款和债券，这些债券将在 1999\
  \ 年或之后到期，这个问题逐渐演变成了“千年虫”问题。\n\n表示缺失数据的唯一方法是具有某种指示数据是否“真实”的值。不同的语言和系统以不同的方式处理这个问题。Swift\
  \ 使用可选值。\n\n可选值用问号表示；它表示数据属于指定的类型，但可能根本不存在。因此，声明一个可选的 `Int` 类型可以写为：\n\n```swift\n\
  var i: Int?\n```\n\n该变量可以有任何有效的整数值；也可以没有值。这由 `nil` 表示，例如：\n\n```swift\ni = nil\n\
  ```\n\n你可以使用如下代码来测试变量是否为 `nil`：\n\n```swift\nif i != nil ...\n```\n\n在图 9-4 中，你可以看到一个声明的可选\
  \ `Int` 变量。它没有被设置为任何值，因此其值为 `nil`（你可以在图 9-4 右侧的侧边栏中看到）。\n\n![A441106_1_En_9_Fig4_HTML.jpg](img/A441106_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4  \n测试可选值\n\n你可以测试它是否不为 nil（第 5 行），如果是，则将其打印出来。否则，打印一条消息表明它是 nil。\n\n如果你试图将可选值用于任何目的，将会遇到错误，如图\
  \ 9-5 的第 11 行所示。大多数情况下，这是由 playground 或 Xcode 生成的：它甚至无法编译，如图 9-5 所示。\n\n![A441106_1_En_9_Fig5_HTML.jpg](img/A441106_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5  \n尝试使用 nil 值\n\n如果你测试后确认该值不为 nil，那么你就可以像图 9-6 中那样继续使用它。\n\n![A441106_1_En_9_Fig6_HTML.jpg](img/A441106_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6  \n使用可选值\n\n即使一个变量被声明为可选，你也可以设置其值。之后，如果测试它是否为 nil，它将不会是 nil，因为它已经有了一个值，如图\
  \ 9-7 所示。在图 9-7 中，你可以看到调试窗格将解包的值显示为可选值。\n\n![A441106_1_En_9_Fig7_HTML.jpg](img/A441106_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7  \n使用可选绑定\n\n除了测试可选值是否为 `nil`，你还可以使用 Swift 的可选绑定。这允许你编写可能因部分内容为可选而失败的代码。如果因某个值为\
  \ `nil` 而失败，则失败是优雅的。如果非 nil，则代码继续执行。例如，在图 9-8 中，第 3 行的代码开始进行可选绑定：\n\n```swift\n\
  if let unwrappedI = i {\n```\n\n\n\n这段代码将声明为整数的值`i`取出，并尝试将该值赋值给新变量`unwrappedI`。如果`i`为`nil`，则将`unwrappedI`设置为`nil`的值会失败，整个子句将为`false`。因此，如果此代码片段中的`i`为`nil`，则计算结果为`false`：\n\
  \n```\nif let unwrappedI = i\n```\n\n执行将继续到打印“i is nil”的`else`子句。\n\n检查可选类型内部是否有值的过程称为**解包**。解包有两种方式：\n\
  \n- `!` 是强制解包。可选类型被视作其底层值。如果它恰好是`nil`，你很可能会遇到错误。\n- `?` 是条件解包，用于可选绑定。\n\n图 9-8 展示了当可选类型`i`在第\
  \ 1 行被设置为一个值时，这段代码的行为。\n\n![A441106_1_En_9_Fig8_HTML.jpg](img/A441106_1_En_9_Fig8_HTML.jpg)\n\
  \n**图 9-8** 解包一个值\n\n在图 9-9 中，你可以看到当可选类型没有值时代码是如何运行的。\n\n![A441106_1_En_9_Fig9_HTML.jpg](img/A441106_1_En_9_Fig9_HTML.jpg)\n\
  \n**图 9-9** 保持可选类型包装状态\n\n## 总结\n\n管理应用程序数据是计算机科学项目中至关重要的一部分，尽管有时它被认为是理所当然的。在本章中，你了解了在计算机科学项目中必须注意和规划的基本问题。本章中的大多数问题并非基于代码：它们是数据管理和所有权的基本问题。\n\
  \n如果你想回到编码的具体细节，不必担心。下一章（第 10 章“构建组件”）包含了大量代码，可以帮助你理解和构建可用的项目和组件。\n\n"
- "# 10. 构建组件\n\n处理数据和流程控制的基础知识可以帮助你编写代码，但如何从那里过渡到构建有用的东西呢？（事实上，这是传统编程教学面临的挑战之一：人们在第一天就学会了如何编写一个打印出“Hello\
  \ There”的程序，但从“Hello There”到构建 Facebook 之间并没有一条清晰的路径。）\n\n本章为你提供了一些垫脚石，帮助你从单行代码走向——如果不是\
  \ Facebook，至少是在类似软件环境中开始工作所需的工具。（提醒一下，这段旅程中有很多垫脚石，本章只是为你提供一个概述。）\n\n## 为什么要构建组件\n\
  \n有一个短语概括了构建组件的主要原因：“分而治之”。事实上，如果你在网上搜索“分而治之”，你会发现它是计算机科学中一种特定架构和开发过程的通用名称。该原理类似于几千年前就存在的“分而治之”（或“分而治之”）这个短语。如果你面对一个大问题（或一大群人），通常可以通过将问题或群体分解为小群体甚至个人来解决问题或鼓励人们以特定方式行动。\n\
  \n在应用程序开发方面，如果你的目标是编写下一个社交媒体应用（如果你正计划这样做，有一长串人在等着做这件事），那么从一张白纸或空白屏幕开始不会让你走得多远。你可以将应用的设计分解为大型组件——可能少于十几个。从那里，你可以进一步细分每个组件；更可能的是，你会让个人或团队处理特定的组件。不知不觉中，你至少会拥有如何构建一个大型复杂应用的总体框架。\n\
  \n在应用程序设计、实现和管理领域，有大量的理论和规则。一种流行的开发方法论（敏捷开发）鼓励尽可能早地在过程中开发出可工作的软件。它不会是完全版本，但会是可以运行的。这消除了从一开始就用大量文档和会议来描述可能开发路径的需要——某些东西会以某种方式运行起来。\n\
  \n这个过程会通过多次迭代持续进行，但在任何时候，某些东西都将是可运行的。（在某些环境中，迭代周期被限制为一周，这意味着前进的步骤可能很多且很小，但如果需要回退，也不会造成太大的混乱。）如果在过程中出现问题，下一个可运行的版本——即使是回退版本——也只需等待一周时间。\n\
  \n将组件作为分而治之的策略，以及像敏捷开发这样构建和组合小块的方法论，反映了尽可能快速高效地开发软件的需求。在这两种以及许多其他方法论中，构建大型系统的过程都涉及构建小组件。这些组件要么从整体概念中分解出来（分而治之），要么是构成系统构建块的小组件。\n\
  \n相比于构建单一结构的大型系统，组件还有其他优势。其中最主要的优势是**可重用性**和**可管理性**。这些特性是优秀计算机科学设计的主要特征。\n\n###\
  \ 组件的优势：可重用性\n\n当设计者将一个大型系统分解为可以独立开发的组件时，这不仅在许多情况下简化了整体项目，而且还可能意味着某些组件将是可重用的。在为整个系统提供架构时，设计者和开发者会寻找那些既能服务于主要项目，又能独立作为次要用途的组件。\n\
  \n如今，我们已经进入一个人们习惯于使用计算机的世界，某些操作变得很常见。这些操作范围从界面元素到特定类型的操作，如登录安全、保存文档等等。\n\n开发整体结构的实际过程包括在设计中寻找可以开发或使用可重用组件的地方（毕竟，如果它们是可重用的，就应该被重用）。\n\
  \n要使组件可重用，意味着它们需要为重用而设计。在最简单的层面上，这可能意味着在文档上要比一次性代码组件投入更多关注。可重用组件的价值与其可重用程度直接相关，因此文档和整体结构是关键。\n\
  \n### 组件的优势：可管理性\n\n当一个大型系统被分解为由不同开发团队实现的组件时，明确它们的行为至关重要。这不仅仅是记录组件功能的问题，更是考虑它可能对更大系统其他部分产生什么副作用的问题。\n\
  \n通过能够识别组件的功能，可以轻松地在各种系统图上移动它，以便你可以尝试其重用。\n\n通过以清晰的文档和专注于执行特定动作的方式来构建组件，可重用性和可管理性都得到了增强。最小化假设也很重要：理想情况下，一个组件应该能够被拿起并使用，而无需或只需很少的重新编程。\n\
  \n## 开发项目的基本组件\n\n在阅读本章其余部分时，请牢记前面的要点。本章致力于解释你在计算机科学项目中遇到的主要组件类型。它还向你展示如何利用它们来实现系统的可重用性和可管理性——包括你将系统从一大组代码模块分解为结构化组件集合的过程。\n\
  \n\n\n### 子程序、函数、过程和方法\n\n在项目中，最常见的组件是子程序、函数、过程和方法。它们的名称在不同编程语言中有所差异，结构也存在一些不同，但本质上都是同一主题的变体。它们就像微型程序或应用，接收输入，对输入进行一些操作和计算，然后生成输出。\n\
  \n本节将描述其通用结构，并以 Swift 为重点。这是总体视角，但也适用于大多数组件。组件的主要部分如下：\n\n*   名称\n*   数据输入\n*  \
  \ 数据输出\n*   实现 —— 代码\n*   实现 —— 文档\n*   副作用和依赖\n\n#### 命名组件\n\n您创建的每个组件都有一个名称。在大多数语言中，名称不能包含空格或特殊字符（下划线字符除外）。其他规则则适用于特定语言或特定环境（例如特定公司）中的用法。名称的选择要便于阅读和复用。它们通常由几个单词组成，描述组件将执行的操作。当使用多个单词时，通常用下划线字符连接或使用驼峰式大小写（例如，`camelCaseFormatting`，除了第一个单词外，每个单词首字母大写）。如果您使用下划线，这样的名称可能是\
  \ `camel_case_formatting`。您也可以将风格组合成类似 `camelCase_formatting` 的形式。始终建议采用一套标准来命名项目，并规范使用大小写和下划线（以及其他风格）。让人们能够理解这些项目是什么非常重要。请记住，在某些列表和交叉引用中，名称可能会按字母顺序出现，因此在制定命名约定时，您可能希望将此牢记在心。\n\
  \n另外，请注意，如果您正在编写用于复用的代码，并复用了他人编写的代码，那么您极有可能需要处理遵循各种命名约定的代码。尽量在单个组件内保持一致性，如果可能，在同一个组织或团队编写的相关组件中也保持一致性。但不要在这方面花费太多时间：您无法强制世界上每个开发者都遵守标准。\n\
  \n#### 数据输入\n\n组件的数据可以在其运行时提供。例如，一个计算物体面积的组件可能会接收两个值：长度和宽度。其他组件则从设备（如温度计等实时传感器）或数据流（如社交媒体消息，如推文）接收数据流。\n\
  \n如果组件的输入能够被清晰定义，则有助于形成良好的编程风格并简化维护。长度和宽度就是非常清晰的概念。有时，需要提供给组件的数据量很大且种类繁多。管理此类输入数据的一种方法是将其格式化为集合，例如数组、集合或字典。因此，来自气象站的多个数据观测值，可以转换为一个包含这些观测值的数组\
  \ —— 这样就将多个输入项变成了一个输入项。您也可以使用更结构化的集合，例如字典，其中每个元素由一个键（观测的日期/时间）和一个值（观测值本身）组成。\n\n\
  输入越清晰，代码就越容易被复用。\n\n#### 数据输出\n\n数据输出与数据输入面临相同的问题，特别是要使输出的含义和结构清晰。有一种特殊类型的输出值得强调。有些输出专门设计用作其他组件的输入。在这种情况下，对输出的任何更改都需要与相关输入的更改同步。\n\
  \n这不是一个小问题，因为存在这种依赖关系可能会限制甚至阻碍输入或输出两侧代码的复用性。避免此类问题的一种常见方法是假设所有输出都将以某种方式用作输入。因此，输出的格式和布局可能最好使用已知的方法进行设计，这样在必要时，来自一个组件的输出可以发送到翻译组件，然后再发送到目标接收方。中间的组件则负责同步输入和输出数据。\n\
  \n> **注意**  \n> 这种设计模式体现在模型-视图-控制器（MVC）设计模式中，该模式在 Swift 和 Cocoa 中被广泛使用。模型基本上是数据，视图是数据的用户界面。中间组件——控制器——在模型和视图之间进行协调。这种结构允许模型和视图根据需要进行更改：只有控制器需要因模型或视图的更改而修改。\n\
  \n#### 实现 —— 代码\n\n组件的核心是代码本身。代码负责执行实际工作。\n\n#### 实现 —— 文档\n\n仅有代码本身不足以构成完整的实现。代码需要文档化。复用依赖于良好的文档。\n\
  \n#### 副作用和依赖\n\n在构建成功的组件时，大多数开发者都力求最小化甚至消除组件外部的任何依赖。如果需要数据，最好将其作为输入提供。依赖组件所需的其他数据或资源的存在，意味着组件的复用性将仅限于该数据可用的场景。另一方面，如果必需的数据是通过输入提供的，那么它就是组件不可分割的一部分。\n\
  \n\n\n## 类\n\n像子例程、函数、过程和方法这类组件，让你可以编写出实质上是带有输入、输出以及中间计算和运算的小程序。而类则是一种不同类型的组件。通过使用\
  \ 20 世纪 60 年代及之后开发的面向对象技术，类为可复用组件提供了一种不同类型的结构。\n\n面向对象编程范式允许你构建包含数据以及以代码形式存在的功能的对象。其区别在于，组件的范式可以追溯到计算机和计算机编程的早期，当时程序的运行方式是读入输入、进行计算、然后输出结果。（这通常被称为批处理。）在过程结束时，程序会终止。有时，会创建一个包含程序，以便在一个过程结束时读取下一组输入并生成下一组输出（可以想象一下账单系统）。\n\
  \n类和面向对象编程非常适合这个不再以批处理为中心的世界。在当今的许多情况下，一个类包含数据或接收数据的能力，它执行计算，然后导出数据。到目前为止，这与批处理是相同的，但在许多面向对象系统中，这些对象会持续存在。接收一些数据，进行计算，再接收一些不同类型的数据，进行计算，然后可能还会进行其他操作。在很多情况下，这并非简单的读取/计算/写入模式。相反，一个对象可能能够在不同时间进行读取、写入和计算。请注意，这只是对批处理式组件和许多类之间常见差异的一种观察结果：并非必要的区分。\n\
  \n类是对象的描述；当它们被创建（实例化）成为实例时，这些对象可能会持续存在一段时间。基本组件中输入、计算和输出之间的明确区分对于许多对象来说并不相关。\n\n\
  从可复用性的角度来看，类与其他组件一样具有可复用性。类本身通常包含组件。通常，这些组件是函数；它们也可能是方法。两者在技术上有所区别，但在实践中，这两个术语经常互换使用。（请参阅本章后面的对象构建示例。）\n\
  \n在 Swift 中，结构体和枚举在许多方面都被视为类似于类。关于结构体和枚举的更多内容，请参见第[8]章(#A441106_1_En_8_Chapter.html)。\n\
  \n## 更大的构建块\n\n在审视包括函数、方法、过程和类在内的可复用组件时，像 Swift 这样的现代语言允许你创建更大的构建块。就像类可以包含数据和功能一样，框架可以包含类（及其组件）。在计算机科学中，“框架”一词有多种用法。最基本的用法与其在英语中的用法相同。在\
  \ Swift 和 Xcode 中，它还有一种特定用法，即允许你创建可复用的框架，供你或他人用于各种项目。Cocoa 和 Cocoa Touch 本身就是框架。还有用于用户界面、音频、文档管理以及许多其他常用应用程序部分的框架。在框架内部，你会找到类；而在类内部，你会发现更多的类和函数，以此类推。\n\
  \n## 关于代码块和递归\n\n代码组件需要以某种方式进行封装才能被使用和复用。有两种特殊的代码复用情况值得审视：代码块和递归。\n\n### 术语：代码块和闭包\n\
  \n在 Swift 文档中，你会找到关于闭包的定义：\n\n- “闭包是自包含的功能代码块，可以在代码中被传递和使用。”\n\n子例程、函数、过程和*方法*都是代码块。复合语句（如第[9]章(#A441106_1_En_9_Chapter.html)所述）也通常是代码块。代码块是一段代码，它可以带有或不带有过程、函数、方法或类的正式结构。如果它不是正式结构的一部分，它可能会用括号（或者在有些语言中，用圆括号）封装起来。\n\
  \nSwift 定义中至关重要的是“自包含”这一点。当一个代码块被用作闭包时，如果该代码块中的代码引用了代码块外部的变量，那么这些变量对现在被称为闭包的这个代码块是可用的（因为它已经*封闭*了执行该代码块所需的变量）。\n\
  \n在 Swift 中，所有闭包都是代码块，许多代码块也是闭包。在实践中，许多人会互换使用这两个术语。\n\n代码块最常见的用途是在你想要执行一段代码，但又不知道何时执行它的时候。通常，这指的是你想要在某个事件或另一个事件发生之后执行的代码。如果那个事件不在你的控制之内，你就不知道何时需要执行这段代码块。\n\
  \n### 使用闭包\n\n以下是使用闭包的一个常见示例。这是一段常用于`UIDocumentBrowserViewController`的代码，用于在 iOS\
  \ 11 及更高版本的“文件”应用中打开文档。\n\n```\nlet document = UIDocument (fileURL: documentURL)\
  \ // 实例化 UIDocument 的子类\ndocument.open (completionHandler: { (success) in\nif success\
  \ {\n// 显示文档\n} else {\nprint (\"打开文档失败\")\n} // else\n} // 代码块结束\n) // document.open\
  \ 参数结束\n```\n\n以下是这段代码的作用：\n\n-   通常情况下，如注释所示，你创建一个`UIDocument`的实例。在此代码中通常会使用一个名为`document`（或你想要的任何名称）的局部变量。\n\
  -   然后，你使用`UIDocument open (completionhandler:)`方法打开文档。\n-   名为`completionHandler`的方法参数是一段代码块，当`open`方法完成时，这段代码块会被调用。（这是一种常见的命名约定。）\n\
  -   充当完成处理器的代码块被括在花括号中。去掉完成处理代码块后，对`open`的调用结构会更加清晰：\n\n```\ndocument.open (completionHandler:\
  \ {...})\n```\n\n-   代码块的内容如下所示。当代码块被调用时，会传入一个参数。为了方便，这里将其命名为`success`；与所有参数一样，它被括在圆括号中。一旦传入`success`，就可以在\
  \ if 条件中测试它，以判断打开是否成功。因此，在这种结构中，代码块被编写出来，并作为`completionHandler`参数传递给`open`。当`open`函数完成时，它手头就有了可以在`completionHandler`参数中运行的代码。这段代码需要多长时间运行取决于系统的工作负载。\n\
  \n```\n{\n(success) in\nif success {\n// 显示文档\n} else {\nprint (\"打开文档失败\")\n} //\
  \ else\n} // 代码块结束\n```\n\n这种类型的结构使得多线程成为可能。也就是说，处理过程会在处理器的一个或多个内核中继续进行，直到完成处理器开始发挥作用。\n\
  \n在较旧的软件中，你经常会发现这种类型的代码是通过信号量实现的。不是等待`open`完成，较旧应用中的代码可能会有一个小循环，定期检查`open`是否已经运行。\n\
  \n在 Cocoa 和 Cocoa Touch 的架构中，这种依赖消息传递和通知的结构使得编写应用代码要简单得多，并且使得操作系统本身的代码也更简单、更快。\n\
  \n你会在许多地方发现代码块的使用。\n\n\n\n### 递归\n\n递归是组件中另一个你需要了解的方面。如果你拥有可复用的组件，它们可以调用自身。这让你能够编写结构清晰且高效的代码。请注意，如果使用不当，可能会导致问题。在处理递归代码时，除非你能找到停止递归的方法，否则可能会生成一种理论上永不结束的无限循环。在实践中，当应用耗尽内存时，循环才会结束。\n\
  \n> **注意**  \n> `Infinite Loop` 是苹果公司库比蒂诺总部多年所在地的那条街道的名字。它并非一个无限循环（如果你站在那条街上，可以看到它的全貌），但它确实是一个循环。2017\
  \ 年，苹果公司在靠近 `Infinite Loop` 的地方完成了其新主总部的建设。这个新总部就是众所周知的 Apple Park。\n\n## 在 Swift\
  \ 中构建函数\n\n在讨论组件时，Swift 中的术语使用 `function` 而不是 `method`。在常见的用法中，当这些条目作为类的一部分时，许多人仍会称其为\
  \ `methods`（这是多年使用习惯的遗留问题，过去这种区别比现在更重要）。替代术语（`subroutine` 和 `procedure`）如今在 Swift\
  \ 中已不再使用。\n\n一个 `function` 由名称、输入、输出以及代码本身组成。以下是在 Swift playground 中创建一个简单函数的方法。这个函数将基于两个参数（`length`\
  \ 和 `width`）来计算面积。\n\n首先，在你的 iPad 上创建一个新的 playground，如图 10-1 所示。（你可以在 Xcode 的 playground\
  \ 中执行相同步骤，但界面不同且交互性较差。）空白的 playground 在屏幕底部的工具栏中为你提供了一些建议。其中顶层的建议之一是用于创建函数的 `func`。\n\
  \n![A441106_1_En_10_Fig1_HTML.jpg](img/A441106_1_En_10_Fig1_HTML.jpg)\n\n**图 10-1**\
  \ 创建一个新的 playground\n\n点击 `func`，playground 会为你创建一个函数框架，如图 10-2 所示。\n\n![A441106_1_En_10_Fig2_HTML.jpg](img/A441106_1_En_10_Fig2_HTML.jpg)\n\
  \n**图 10-2** 开始创建一个函数\n\n`Name` 会被红色高亮显示，提示你应首先输入该项。函数体则被灰色高亮显示，提示你接下来处理这个部分。输入函数名称——`area`——如图\
  \ 10-3 所示。点击函数体，它现在会被红色高亮显示，等待你处理。\n\n![A441106_1_En_10_Fig3_HTML.jpg](img/A441106_1_En_10_Fig3_HTML.jpg)\n\
  \n**图 10-3** 输入函数名称\n\n下一步是输入函数体。有几种方法可以做到这一点。无论你选择哪种方式，都有可能暂时产生一个错误。（这在开发中很常见。）\n\
  \n图 10-4 中展示的这单行代码将返回 `length` 乘以 `width` 的值。迄今为止这两个变量都没有值，因此你将产生一个错误（左侧的红点）。\n\n\
  ![A441106_1_En_10_Fig4_HTML.jpg](img/A441106_1_En_10_Fig4_HTML.jpg)\n\n**图 10-4**\
  \ 开始构建函数体\n\n设置 `length` 和 `width` 值的一种方法是将它们作为参数传递给函数，如图 10-5 所示。（通过参数传递数据，而不是在函数体内硬编码，能使你的代码更具可复用性。）\n\
  \n正如你在本书的几个代码片段中看到的那样，声明变量的方法是使用名称和类型。因此，你可以声明一个类型为 `Double` 的 `length` 变量（名称），方法如下：\n\
  \n```\nlength: Double\n```\n\n`Double` 是 Swift 中首选的浮点类型（相比 `Float` 而言）。\n\n![A441106_1_En_10_Fig5_HTML.jpg](img/A441106_1_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5** 将参数传入函数\n\n尽管参数解决了数据来源的问题，但函数需要在其声明中表明将返回一个值。这就是你在图 10-6 中看到的错误。\n\n\
  ![A441106_1_En_10_Fig6_HTML.jpg](img/A441106_1_En_10_Fig6_HTML.jpg)\n\n**图 10-6**\
  \ 你必须声明函数将返回一个值\n\n你可以像图 10-7 所示那样完成函数声明，使其现在打算返回一个值。\n\n![A441106_1_En_10_Fig7_HTML.jpg](img/A441106_1_En_10_Fig7_HTML.jpg)\n\
  \n**图 10-7** 完整的函数\n\n返回值的语法是：\n\n```\n-> Double\n```\n\n这表明返回值的类型是 `Double`。\n\n\
  如果你愿意，可以运行这段代码。虽然什么也不会发生，但实际上这已经相当不错了：没有出现任何错误。\n\n现在回顾一下构建这个小函数的步骤：\n\n- 点击 `func`\
  \ 创建框架\n- 为函数命名\n- 命名传入的参数并设置其类型\n- 指定返回值\n- 提供计算返回值的函数体\n\n除了第一步创建函数框架外，其余步骤都可以按任意顺序进行。在此过程中，你可能会遇到错误，原因可能是你在使用变量之前尚未声明它，或者你声明了变量却没有使用它。过一段时间，你就会习惯这个流程。\n\
  \n你可以添加一行代码来调用这个函数。你需要声明一个变量，并将其设置为函数的结果。查看快捷键栏，你会找到 `let`（在图 10-8 中它正好在屏幕之外）。你通常需要滚动快捷键栏。点击\
  \ `let`，你会得到所需代码的轮廓，如图 10-8 所示。\n\n![A441106_1_En_10_Fig8_HTML.jpg](img/A441106_1_En_10_Fig8_HTML.jpg)\n\
  \n**图 10-8** 创建一个变量来使用该函数\n\n将变量命名为 `result`（或任何你想要的名称），然后输入函数名称，如图 10-9 所示。在快捷键栏中，Swift\
  \ playground 会显示参数（名称和类型）。\n\n![A441106_1_En_10_Fig9_HTML.jpg](img/A441106_1_En_10_Fig9_HTML.jpg)\n\
  \n**图 10-9** 开始使用该函数\n\n点击快捷键栏中的参数，它们会被填充到你的代码中，如图 10-10 所示。第一个参数 (`length`) 被红色高亮显示，所以你需要从这里开始。你会看到一个数字弹出框，因为\
  \ playground 知道你打算输入一个数字。\n\n![A441106_1_En_10_Fig10_HTML.jpg](img/A441106_1_En_10_Fig10_HTML.jpg)\n\
  \n**图 10-10** 开始输入参数\n\n当你输入每个参数时，系统会使用相应的数据输入工具引导你，如图 10-11 所示。\n\n![A441106_1_En_10_Fig11_HTML.jpg](img/A441106_1_En_10_Fig11_HTML.jpg)\n\
  \n**图 10-11** 输入所有参数\n\n现在你可以点击“运行我的代码”，并在查看器中看到结果，如图 10-12 所示。\n\n![A441106_1_En_10_Fig12_HTML.jpg](img/A441106_1_En_10_Fig12_HTML.jpg)\n\
  \n**图 10-12** 运行你的代码并在查看器中检查结果\n\n## 总结\n\n本章描述了使用软件组件的原因，并向你展示了如何在 Swift 中构建它们。你了解了\
  \ Swift playground 如何引导你完成构建函数的过程。你也可以直接将代码键入 Xcode，但有时在 Swift playground 和 Xcode\
  \ 之间切换会更方便。\n\n所有组件都拥有相同的基本部分。以下是你在 playground 中看到的名称。\n\n- `name`\n- `inputs`（参数）\n\
  - `outputs`（返回值）\n- `body`（代码）\n\n\n\n"
- "# 11. 使用事件引导操作\n\n计算机的尺寸多年来一直在缩小。其组件不仅从真空管缩小到晶体管，如今单个计算机芯片上甚至可以集成整个系统。\n\n用户控制着应用程序。我们启动它们，与界面交互，用完后再关闭它们。有时，就像在\
  \ iOS 中一样，当我们一段时间不使用它们时，它们的数据会自动移到一个安全的空间，准备在我们再次需要时使用。它们可能永远（或极少）终止，只是等待下一次用户输入。\n\
  \n现实并非如此，几十年来也并非完全如此，但思维定势需要很长时间才能消退。应用程序越来越多地受到其他应用程序甚至其他计算机的控制。当我们在计算机上设置闹钟时，另一个应用程序会跟踪时间，然后在计算机上触发某些操作。\n\
  \n你可能会说这仅仅是延迟了人的交互，但当你开始思考当今应用程序是如何被控制时，你会发现越来越多的控制已经远离了人的干预。一般来说，当你使用“在……时提醒我”这样的短语（也许是通过\
  \ Siri）来安排某件事时，你描述的是一个计算机可以启动的动作。无论你的“在……”是基于时间还是位置，计算机很容易判断“在……”的条件是否为真。\n\n当你对\
  \ Siri 的请求是“当……时提醒我”时，判断“当……”的条件是否为真可能涉及一个更复杂的过程。（排除像“当时间是 3:15 时”这种特殊情况，这基本上是一个“在……”的请求。）\n\
  \n这些“当……”事件的重要之处在于，它们对发起该事件的人来说是出乎意料的。如果你请求在 3:15 被提醒，你可能会预料到那个提醒（甚至可能是在 3:00 的预提醒）。但“当……”事件可能完全出乎用户的预料。你将在本章后面研究\
  \ Swift 和 Cocoa 中的通知时看到其工作原理。\n\n## 代码块的作用\n\n如第 10 章“构建组件”所示，你可以通过使用代码块来修改正常的命令处理顺序。这里的代码片段总结了代码块的一种常见用法。如本章所述，这是\
  \ `UIDocumentBrowserViewController` 和许多其他地方常见的代码用法。代码的核心是 `document.open(completionHandler:)`\
  \ 函数调用。它打开文档，当文档打开后，完成处理程序会被调用并执行，这样你就可以通知用户文档是否成功打开，并执行任何其他必要的操作（例如，用文档内容更新用户界面）。\n\
  \n```\nlet document = UIDocument (fileURL: documentURL)\n// 实例化 UIDocument\ndocument.open\
  \ (completionHandler: { (success) in\nif success {\n// 显示文档\n} else {\nprint (\"\
  打开文档失败\")\n} // else\n} // 代码块结束\n) // document.open 参数结束\n```\n\n重要的是要记住，尽管在调用\
  \ `open` 和执行闭包（无论是 `success` 分支还是 `else` 分支）之间存在暂停，但该序列是在初始代码中设置代码块时就已确定的。除非代码块中的代码执行了一些异常操作，否则该代码块就是\
  \ `open` 在尝试打开文档后要调用的代码。\n\n## 使用操作和消息传递管理流程控制：总结\n\n通常情况下，你希望实现一种不同类型的管理控制流的方式，而不仅仅是等待然后执行预定义序列中的下一步。这就是消息传递发挥作用的地方。消息传递允许你动态地改变将要执行的内容——而不仅仅是像使用完成处理程序和闭包那样改变其执行时机。\n\
  \n消息传递允许你向接收者发送某种消息，然后接收者根据该消息采取行动。回顾一下使用闭包的 `open` 代码，考虑一种情况，即你不想指定文档打开或未打开时会发生什么。消息传递结构允许你向接收者发送一条消息，由接收者决定如何处理它。现代应用程序中广泛使用消息传递，原因有多种，其中之一是它有助于构建可维护的应用程序，因为应用程序无需保留所有的逻辑联系。在\
  \ `open` 示例中，如果你想强制限制一次最多只能打开三个文档，你需要确保每个 `open` 语句在原始编码和维护过程中都遵守该限制。（当你实现打开一种新类型文档的代码时，很容易忘记检查这个限制。）这些问题可以通过实现一个通用的打开代码部分来避免，但通常在改造或维护代码时，你无法控制每个部分已经如何工作。能够发布一个通知，告知某事已发生，并让编写时未知的应用程序的另一部分来处理它，会更简单。这就是通知发挥作用的地方。这里有一个具体的例子。\n\
  \n> **注意**\n> \n> 消息传递如今被广泛使用。它是操作系统微内核架构的核心，也是 Cocoa 和 Cocoa Touch 框架的关键。其他一些框架和开发工具使用了不同的方法和术语，但你在\
  \ Cocoa 和 Swift 中会遇到的就是这种方式。\n\n## 将按钮按下/轻触/点击传递给……某个地方\n\n在这个例子中，你将看到如何实现一个按钮，该按钮执行的操作在你编写按钮管理代码时是未知的。这是通知架构的概述。它向你介绍了\
  \ Xcode 中的一些工具，Xcode 是用于所有 Apple 工具的集成开发环境（IDE），但使用 Xcode 的细节将在下一章中描述，因此请将本节视为一个侧重于通知的预览。\n\
  \n\n\n### 实现一个已知操作的按钮\n\n首先，常见的情况是实现一个按钮，该按钮执行你已知并能与其一同实现的操作。这个示例从 Xcode 内置的“标签页应用”启动模板开始。如果你基于该模板创建应用，将会得到一个包含两个视图的应用，如图\
  \ 11-1 所示。\n\n![A441106_1_En_11_Fig1_HTML.jpg](img/A441106_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1 （左）标签页应用第一个视图，（右）标签页应用第二个视图\n\n基础模板实现了两个视图控制器以及底部的标签栏控制器，后者允许你在两个视图之间切换。\n\
  \n你可以像图 11-2 那样，向其中一个视图控制器添加按钮和标签。\n\n![A441106_1_En_11_Fig2_HTML.jpg](img/A441106_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2 添加按钮和标签\n\n接下来你会发现，很容易就能为按钮编写代码，使其改变标签中的文本，如图 11-3 所示，文本已变为“按钮已点击”。\n\n\
  ![A441106_1_En_11_Fig3_HTML.jpg](img/A441106_1_En_11_Fig3_HTML.jpg)\n\n图 11-3 实现按钮\n\
  \n实现按钮的代码并不特别复杂，尤其是在 Xcode 的协助下——你在第 12 章中会看到。按钮和标签的代码如代码清单 11-1 和图 11-4 所示。\n\n\
  ![A441106_1_En_11_Fig4_HTML.jpg](img/A441106_1_En_11_Fig4_HTML.jpg)\n\n图 11-4 第一个视图控制器的代码\n\
  \n```\nimport UIKit\nclass FirstViewController: UIViewController {\n@IBOutlet weak\
  \ var label: UILabel!\n@IBOutlet weak var button: UIButton!\n@IBAction func buttonAction(_\
  \ sender: Any) {\nlabel.text = \"Button Tapped\"\n}\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// Do any additional setup after loading the view, typically\
  \ from a nib.\n}\noverride func didReceiveMemoryWarning() {\nsuper.didReceiveMemoryWarning()\n\
  // Dispose of any resources that can be recreated.\n}\n}\n```\n\n代码清单 11-1 实现按钮和标签\n\
  \n代码首先将界面中的对象（使用第 12 章描述的 Storyboard）与代码关联起来。`label` 和 `button` 都是 `@IBOutlet` 项目——这意味着它们位于界面中，但可以从代码中访问。可以看到，一个是\
  \ `label`，另一个是 `button`。\n\n类似的方式也适用于 `@IBAction`。这是实现按钮操作的代码。你会在实现用户界面的代码中到处看到\
  \ `@IBOutlet` 和 `@IBAction`。\n\n`@IBAction` 代码行可以重新格式化，以便更清晰：\n\n```\n@IBAction\
  \ func buttonAction(_ sender: Any) {\nlabel.text = \"Button Tapped\"\n}\n```\n\n\
  当按钮被点击时，`buttonAction` 被调用，`label` 的文本变为 `Button Tapped`。\n\n这就是实现按钮及其操作所需的全部内容。\n\
  \n### 实现一个带通知的按钮\n\n如果要添加一个按钮来更新第二个视图控制器上的标签，事情就会变得稍微复杂一些。向第一个视图控制器添加一个新按钮来启动这个进程并不难。图\
  \ 11-5 展示了其外观。\n\n![A441106_1_En_11_Fig5_HTML.jpg](img/A441106_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5 添加一个使用通知的按钮\n\n你还可以像图 11-6 那样向第二个视图控制器添加一个标签。这个标签将由第一个视图控制器上的通知按钮更新。\n\n\
  ![A441106_1_En_11_Fig6_HTML.jpg](img/A441106_1_En_11_Fig6_HTML.jpg)\n\n图 11-6 向第二个视图控制器添加标签\n\
  \n你可以开始向按钮添加更新第二个视图控制器中标签的功能，但会立即遇到一个问题，如代码清单 11-2 和图 11-7 所示。\n\n![A441106_1_En_11_Fig7_HTML.jpg](img/A441106_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7 第二个视图控制器的代码（Xcode）\n\n```\nimport UIKit\nclass SecondViewController: UIViewController\
  \ {\n@IBOutlet weak var label: UILabel!\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  // Do any additional setup after loading the view, typically from a nib.\n}\noverride\
  \ func didReceiveMemoryWarning() {\nsuper.didReceiveMemoryWarning()\n// Dispose\
  \ of any resources that can be recreated.\n}\n}\n```\n\n代码清单 11-2 通知按钮的代码\n\n问题在于导航按钮的声明位于第一个视图控制器中，而需要更新的标签的声明位于第二个导航控制器中。如何从第一个视图控制器访问第二个视图控制器？\n\
  \n在这种情况下，有多种方法可以绕开这个问题。最明显的是将代码放入一个同时连接两个视图控制器的对象中。这意味着管理按钮和标签的工作将转移到应用委托或管理两个可见视图控制器的标签栏控制器中。这些策略都可以奏效，但代价是应用委托或标签栏控制器会变得更加复杂。（对于标签栏控制器而言，区别在于使用模板中的基础\
  \ `UITabBarController` 与实现子类，以便可以从子类修改一个或两个按钮或标签。）\n\n总的来说，增加的复杂性是为混合数据和界面元素所付出的代价。解决方案是使用通知。\n\
  \n通知由两个组件组成。第一个组件广播一个事件已发生的通知。第二个组件是一个观察者，等待发现通知。重要的是，它们之间不需要相互了解。在第一个视图控制器的按钮和标签的情况下，通信发生在该视图控制器内部。使用通知时，它可以由第一个视图控制器（通知按钮所在处）生成，并由第二个视图控制器（标签所在处）观察。\n\
  \n通知在整个应用内广播；一个对象可以请求被通知特定的通知，但不像单个视图控制器内的对象之间存在直接链接。\n\n正是这种缺乏直接链接的特性使通知如此有用。这也暴露了一个问题，你将在下面的代码（以及解决方案）中看到。\n\
  \n#### 通知基础\n\n关于通知，有两个关键点需要记住。\n\n- 每个通知都有一个名称。这不是一个字符串，而是一个 `Notification.Name`\
  \ 类型。你将看到如何指定它。\n- 通知可能不会被送达。由于通知和观察者之间没有直接链接，如果通知未被观察，不会产生错误。通知者发布一个通知，它可能会被观察，也可能不会被观察。\n\
  \n\n\n### 发布通知\n\n实现通知按钮的第一步是发布通知。以下是发布通知的标准代码。它将作为第一个视图控制器中通知按钮的操作。\n\n```\n@IBAction\
  \ func notificationButtonAction(_ sender: Any) {\n    NotificationCenter.default.post(\n\
  \        name: Notification.Name(rawValue:notificationKey),\n        object: nil,\n\
  \        userInfo: nil)\n}\n```\n\n在这个简单案例中，你只需要为通知设定一个名称。这在以下代码行中完成：\n\n```\nname:\
  \ Notification.Name(rawValue:notificationKey),\n```\n\n该行代码引用了在你应用的任何区域（可能在一个`globals.swift`文件中）声明的一个变量，其代码如下：\n\
  \n```\nlet notificationKey = \"com.champlainarts.notificationKey\"\n```\n\n这两行代码共同将一个字符串转换为`Notification.Name`类型。\n\
  \n以上就是从按钮操作（或任何其他事件）发布通知所需的所有步骤。\n\n### 监听通知\n\n要监听通知，想要监听的对象需要注册，然后执行某些操作。以下是监听通知的代码行（位于第二个视图控制器中）。\n\
  \n```\nNotificationCenter.default.addObserver(\n    self,\n    selector: #selector(SecondViewController.didReceiveNotificationResultText),\n\
  \    name: NSNotification.Name(rawValue: notificationKey),\n    object: nil)\n}\n\
  ```\n\n这行代码指定，如果接收到具有给定名称的通知，则应调用一个特定的函数（该函数定义为`#selector`）。\n\n```\n@objc func\
  \ didReceiveNotificationResultText () {\n    label.text = \"Received Notification\"\
  \n}\n```\n\n完成此设置后，第一个视图控制器中的导航按钮可以改变第二个视图控制器中标签的文本。两个控制器互不知晓，按钮也不知道标签的存在。这意味着，如果观察者响应按钮点击的操作是完全不同的内容（即，不设置标签文本），那么一切仍应正常工作。\n\
  \n添加观察者应由能够针对通知采取行动的对象来完成，因此该代码应放在该对象所在的位置。你可能会首先想到将其放入第二个视图控制器的`viewDidLoad`方法中。\n\
  \n如果你这样做并运行应用，会发现一个问题。第二个视图控制器中的`viewDidLoad`只有在第二个视图控制器显示时才会被调用。因此，如果你运行应用，看到（默认的）第一个视图控制器及其导航按钮，点击该按钮会发送通知，但由于第二个视图控制器尚未显示，`viewDidLoad`未被调用，观察者尚未准备好。\n\
  \n你可以通过点击第二个视图控制器的标签来验证这一点，这将强制调用`viewDidLoad`并设置观察者。之后，导航按钮将按预期工作。\n\n## 总结\n\n\
  这是一个常见问题，将在第 12 章中，在探索 Xcode 时进一步探讨。\n\n"
- "# 12. 进入 Xcode\n\n前面的章节涵盖了计算机科学的许多基础知识。你已经找到了一些 Swift 游乐场和代码片段，它们说明了许多概念和问题。本书的重点是\
  \ Swift 以及 iOS 和 macOS 的基本框架——Cocoa 和 Cocoa Touch。\n\n要实际在这些环境中进行开发，你需要使用 Xcode，即苹果的集成开发环境（IDE）。本章将概述应用和其他软件通常是如何构建的（即，不仅限于这些平台和\
  \ Xcode）。然后，你会重点关注如何使用 Xcode 开始应用开发——这将提供第 11 章中讨论的概述的更多细节。\n\n关于 Xcode 和各种苹果框架有很多内容要说，但本章后续部分的重点将是一个真实的案例研究：分析第\
  \ 11 章代码中的一个问题。你已经占得先机，因为该问题在第 11 章中已描述过，但本章将带你逐步了解如何发现并识别问题以及如何修复它。许多开发者认为，与你在实际诊断和修复错误时所学习到的东西相比，任何书本或课堂学习都无法比拟。\n\
  \n\n\n```markdown\n## 如何编写软件\n\n许多人认为编写软件就是坐在空白屏幕或白纸前，然后开始敲代码。当你敲够代码，就有了一个应用。这在打孔卡片的大型机时代或许如此，但现在已不适用。\n\
  \n如今的一个应用通常包含代码、图形元素、其他形式的媒体（视频、音频等），以及成为应用组成部分的多个框架中的大量代码。框架代码处理常规功能，比如读写数据、管理屏幕和鼠标或触控板，以及许多让现代应用成为现代应用的功能。\n\
  \n这意味着“编写”一个应用现在开始意味着从各种组件和片段中组合出一个应用。虽然构建应用的机制是与计算机科学不同的主题，但简要了解它是值得的，这样你就能理解各个部分如何组合在一起。\n\
  \n首先，在 `developer.apple.com` 注册一个苹果开发者 ID。你将完成注册流程。注意，如果你在你的地区未满法定年龄（成年），你需要一位成年人为你担保。如果你在学校就读或为公司工作，他们可能有一个你可以使用的苹果开发者账户。\n\
  \n以下是在 `Xcode` 上进行应用开发的通用步骤序列。你将在下一节“使用 `Xcode` 开发应用”中看到如何开始这个过程。这些是你必须回答的问题，所以请在开始之前就思考它们。\n\
  \n1. 确定应用的功能。坐下来就“写一个应用”却不知道这个应用要做什么是徒劳的。无论你是作为独立开发者、公司团队的一员，还是处于任何其他配置中，拥有一个所谓的“电梯演讲”来在几秒钟内总结你的项目是一个好主意（许多人会说它至关重要）。你的目的或目标可能会随时间改变，但这很正常。只需确保你清楚当前版本是什么。（另请注意，在开发过程中你可能需要定期考虑版本。）像敏捷开发这样的现代开发技术建议，任何时候都应该有可运行的内容，这是一个值得遵循的良好实践。这可能意味着你需要定期——甚至可能每周一次——进行评估，并要么删除某些功能，要么将其推迟到未来版本，以便让下周的应用版本按时完成。\n\
