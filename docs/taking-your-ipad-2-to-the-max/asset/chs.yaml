  ## 关于作者


  ![image](img/steve_sande.jpg) **史蒂夫·桑德**自 1984 年购买第一台 Mac 以来，一直是苹果技术的忠实粉丝。史蒂夫最初接受的是土木工程师培训，其
  IT 专业人士的职业生涯在 20 世纪 90 年代蓬勃发展。作为一名长期博主，史蒂夫是 AOL 旗下《非官方苹果博客》（`TUAW.com`）的特写编辑，著有关于苹果
  iWeb 应用程序的三本书，是《充分发挥你的 iPad》和《充分发挥你的 iPhone 4》的合作者，并正在参与撰写即将出版的《充分发挥 Mac OS X 10.7
  Lion》。你可以每周三加入史蒂夫观看广受欢迎的 TUAW TV Live 节目，并在 `www.twitter.com/stevensande` 关注他的动态。他与结婚
  32 年的妻子居住在科罗拉多州的高地牧场。


  ![image](img/michael_grothaus.jpg) **迈克尔·格罗瑟斯**是一位居住在伦敦的美国小说家和记者。他在电影学院首次接触苹果电脑，并在此后多年使用它们创作屡获殊荣的电影。然而，在为
  20 世纪福克斯工作期间，他发现了好莱坞许多见不得人的小秘密，随后离开并作为顾问为苹果公司工作了五年。之后，他移居伦敦，并获得了创意写作硕士学位。他的第一部小说《*Epiphany
  Jones*》讲述了一个关于人口贩卖和美国对名人沉迷的故事。目前，迈克尔是 AOL 旗下热门科技新闻网站《非官方苹果博客》（TUAW.com）的专职撰稿人，撰写所有与
  Mac 相关的文章。此外，迈克尔还为 Apress 撰写了其他几本书，包括《充分发挥你的 iPad》、《充分发挥你的 iPod touch（第二版）》和《充分发挥你的
  iPhoto ''11》。不写作时，迈克尔会游历欧洲、北非和亚洲。你可以通过 `www.michaelgrothaus.com` 和 `www.twitter.com/michaelgrothaus`
  联系他。


  **埃里卡·萨顿**在佐治亚理工学院获得计算机科学博士学位。她撰写、合著并为大约三十多本技术书籍做出了贡献，特别是在编程、数字视频和数字摄影领域。作为一名无可救药的技术极客，萨顿从没遇到过她不需要的小玩意。她复杂的过去曾涉及
  iOS、Mac OS X、NeXT、Newton 以及大量成功和失败的技术。不写作时，她和她的技术极客丈夫养育着三个可爱的极客幼苗，他们带着克制的困惑看待自己的父母。


  ## 关于技术审校


  ![image](img/dave_caolo.jpg) **戴夫·卡奥洛**是《非官方苹果博客》`TUAW.com` 的总编辑。他此前在一所对 Mac 友好的寄宿学校担任了
  8 年的 IT 总监。不沉迷于他的 Mac 时，戴夫喜欢与他的孩子、妻子和波士顿梗犬 Batgirl 共度时光。




