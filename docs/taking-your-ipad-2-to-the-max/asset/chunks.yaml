- fmt: '# Changing the Exposure


    As with still images, you can set the exposure of recorded video. You’ll see a
    white box with crosshairs quickly appear. The iPad’s camera reads the exposure
    setting of the part of the image inside the box and adjusts the video’s exposure
    settings accordingly. This optimizes the recording for the quality of the scene
    at the point you touch.


    ## Viewing Your Camera Roll


    To view all the photos you have taken and the videos you have recorded, tap the
    `Camera Roll` icon at the left of the bottom control bar. The last image or video
    you recorded is integrated into the look of the button as a little reminder. You
    can just barely see this in [Figure 15–4](#Chapter15.html#fig_15_4), where the
    last image of a cloudy day was rather similar to the view being shown in the viewfinder.


    Tap the `Camera Roll` arrow to be taken to the Camera Roll ([Figure 15–5](#Chapter15.html#fig_15_5)).
    You can instantly detect which items are videos and which are still images. Videos
    appear with a small “video camera” icon (a rectangle with a triangle lens image
    to its right) and a time indicating the duration of the video that has been shot.
    The fifth item (second to last) in [Figure 15–5](#Chapter15.html#fig_15_5) is
    a five-second video segment.


    ![images](images/1505.jpg)


    **Figure 15–5.** *The Camera Roll contains all the photos and videos you have
    taken with the iPad’s camera.*


    As [Figure 15–5](#Chapter15.html#fig_15_5) shows, the tabs located at the top
    of the Camera Roll interface allow you to sort through your recordings in the
    following three ways:


    * *All*: Shows you all your photographs taken and videos recorded.

    * *Photos*: Shows you just the photos you have taken.

    * *Videos*: Shows you just the videos you have recorded.


    To view any individual photo or video, simply tap its thumbnail. The item you
    select will zoom out and you will be able to view or play it back.


    ### Viewing Individual Photos


    When in your Camera Roll, you will see thumbnails of the photos it contains (see
    [Figure 15–5](#Chapter15.html#fig_15_5)). To view a photo full-screen, tap the
    photo once. As you can see from [Figure 15–6](#Chapter15.html#fig_15_6), you can
    view the photo in portrait or landscape mode, depending on how you hold your iPad.


    If the image was shot in the opposite mode to the current iPad orientation, as
    demonstrated in the right-hand screen shot, the `Photos` application will use
    letterboxing or pillarboxing to pad the image as it presents it. In [Figure 15–5](#Chapter15.html#fig_15_5),
    pillarboxing adds black columns to each side of the portrait photo, allowing you
    to view the entire image in its original aspect. Letterboxing, which is used for
    landscape photos presented in portrait orientation, adds black rectangles above
    and below the image.


    ![images](images/1506.jpg)


    **Figure 15–6.** *Viewing a photo in portrait and landscape modes*


    Once you display a photo full-screen, you have several ways to interact with it,
    as discussed in more detail in [Chapter 13](#Chapter13.html#ch13). These include
    the following:


    * Pinch to zoom into and out of the photo.

    * Double-tap to zoom into the photo. Double-tap again to zoom out.

    * When your image is displayed at the normal zoomed-out size, drag to the left
    or right to move to the previous or next image in the album. When zoomed into
    an image, dragging the photo pans across it.


    While viewing individual photos, you may flip your iPad onto its side at any time.
    The photo will automatically reorient itself. If the photo was shot using landscape
    orientation, it will size itself to a wider view; if portrait, to a longer one.


    Tap any image once to bring up the image overlay, as shown in [Figure 15–6](#Chapter15.html#fig_15_6).
    The image overlay features a menu bar at the top and a photo-selection slider
    at the bottom of the screen.


    The image overlay menu bar at the top of the screen shows you the number of the
    selected image out of the total number of items in the Camera Roll, and shows
    you the back button, here labeled Camera Roll, to return to the album of items
    shot on this device. You can tap the `Done` button to exit the Camera Roll and
    return to the Camera app.


    You’ll also see the `Share` button (it looks like an arrow breaking free from
    a small box), the `Airplay` button (it’s a rectangle with a triangle inside it),
    and the trash can button. Tapping the trash can button will bring up a deletion
    confirmation menu. Tap the red `Delete Photo` button to delete the selected photo.


    The `Slideshow` button presents options for showing your images as a local slideshow
    or remotely using `AirPlay` wireless connections. If you have connected your iPad
    to a TV using any of the many Dock connector adapters (these include HDMI, VGA,
    Composite, and Component video adapters), you can play your slideshow back on
    that bigger screen.


    `AirPlay` not only offers a wireless solution, assuming you either have an Apple
    TV on-hand or have purchased a third party solution like Banana TV for the Mac
    (`bananatv.net`), but also (in the case of Apple TV) provides a wider range of
    slideshow presentations for more eyecatching displays.


    See [Chapter 13](#Chapter13.html#ch13) for more details about slideshow presentations
    with your iPad and for sharing your photos and videos with others.'
