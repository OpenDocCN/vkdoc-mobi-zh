  trans: '

    # 操控主屏幕


    您可以通过多种方式与 iPad 主屏幕进行交互。


    **导航应用程序页面：** 如果您位于第一个应用程序页面，请用手指向左轻扫即可显示下一个应用程序页面。持续向左轻扫，即可浏览所有应用程序页面。要返回上一个应用程序页面，只需用手指向右轻扫即可。或者，您也可以将手指向左或向右拖动，以缓慢显示下一个应用程序页面。


    **注意：** 主屏幕的页面仅能向左或向右移动。与许多应用程序不同，它们不能向上或向下移动。


    **启动应用程序：** 要启动应用程序，只需轻点其图标。要返回主屏幕，请按下 iPad 边框上的圆形物理主屏幕按钮。


    **操控应用程序图标：** 这一步很有趣。假设您想要重新排列主屏幕上的图标，但手边没有电脑，无法通过我们之前在第 2 章中讨论过的 iPad 的 iTunes
    偏好设置页面进行操作。只需触摸并按住主屏幕上的任意图标。几秒钟后，您会看到页面上所有图标开始像一小块果冻一样晃动（请参见图 4–11）。此时您可以松开手指。图标会继续晃动。在晃动状态下，您可以触摸并按住任意应用程序图标，然后将其拖动到页面上的新位置。您还可以将图标拖入或拖出程序坞。


    ![images](img/0411.jpg)


    **图 4–11.** *晃动的图标。在此示例中，正在移动的是 TV Guide 应用程序。*


    在图标都在晃动时，您可以继续轻扫到新的应用程序页面并重新排列该页面上的应用程序。您还可以在页面之间转移应用程序。只需触摸并按住您想要移动到其他页面的应用程序，并将其拖向该页面所在屏幕的边缘。稍作停顿后，下一个页面将自动滑入，您就可以将应用程序放置到任何想要的位置。如果该页面已满（20
    个应用程序），右下角的应用程序将自动被推到下一个页面。


    **注意：** 如果您的程序坞中已有六个应用程序，则必须先移走一个，然后才能向程序坞添加新应用程序。与主屏幕页面不同，如果您尝试向已满的程序坞添加新应用程序，程序坞中的应用程序不会自动被推到新页面。


    **创建应用程序文件夹：** 在第 2 章中，我们讨论了如何使用 iTunes 在 iPad 上创建装满应用程序的文件夹，但您也可以直接在 iPad 上创建应用程序文件夹。只需触摸并按住一个应用程序图标，直到所有应用程序开始晃动（请参见图
    4–11）。它们晃动后，将一个应用程序拖到另一个应用程序图标上并保持不动。一两秒钟后，一个应用程序文件夹就会出现。将应用程序放入文件夹中，使其出现在您按住的那个应用程序图标旁边（请参见图
    4–12）。


    ![images](img/0412.jpg)


    **图 4–12.** *创建一个装满应用程序的文件夹*


    您可以按照自己的意愿在这个新文件夹中排列应用程序。您也可以随意命名该文件夹。苹果公司做的一个很酷的事情是让文件夹能够猜测您想要的名称。在图 4–12 的示例中，我们创建了一个包含两个电影应用程序的文件夹。iPad
    知道这两个应用程序都与娱乐相关，因此恰当地将其命名为“娱乐”。当然，您随时可以更改文件夹的名称。轻点文件夹外部的任意位置即可返回正常的应用程序屏幕。将任意应用程序拖到现有文件夹中即可将其添加到该文件夹。


    文件夹显示为包含多个应用程序图标的灰色方框（请参见图 4–13）。每个文件夹最多可包含 20 个应用程序，并且每个页面上最多可以有 26 个文件夹（页面上
    20 个，程序坞中可存放 6 个）。要打开文件夹，只需轻点它，其内容就会展开，同时外部的其他应用程序图标会变暗（请参见图 4–13）。要退出文件夹，请轻点其外部的任意位置。


    ![images](img/0413.jpg)


    **图 4–13.** *左图：一个包含“娱乐”和“医疗”两个文件夹的应用程序页面。右图：同一个应用程序页面，“娱乐”文件夹已打开。*


    **删除应用程序：** 在第 2 章中，我们告诉您如何使用 iTunes 从 iPad 删除应用程序。您也可以直接在 iPad 上删除应用程序。要执行此操作，只需触摸并按住主屏幕上的任意图标，等待它们全部像重新排列应用程序时那样开始晃动（请参见图
    4–14）。


    ![images](img/0414.jpg)


    **图 4–14.** *应用程序晃动时，轻点 X 即可将其删除。*


    注意到有些应用程序的左上角有一个小小的黑白`X`吗？轻点那个`X`将会删除该应用程序。如果您意外从 iPad 删除了一个应用程序，请不要担心。这些应用程序始终存储在您的
    iTunes 资料库中，您可以随时重新安装它们。


    **注意：** 您无法删除任何 iPad 出厂时安装的 Apple 应用程序。但是，您可以删除自己安装的 Apple 应用程序，例如 Pages、iBooks、Numbers
    和 Keynote。


    要删除应用程序，只需轻点`X`。屏幕上会出现一个弹出窗口，询问您是否要删除选定的应用程序。您还会看到一条提示，说明删除该应用程序“也将删除其所有数据”，如图
    4–15 所示。*这一点很重要！* 如果您在应用程序内创建了新文档或在游戏中获得了新的最高分，但在同步到 iTunes 之前删除了该应用程序，那么与该应用程序关联的任何新数据都将被删除。因此，如果您在
    Pages 中创建了新文档，并决定删除 Pages 应用程序，那么如果您在删除 Pages 之前没有同步 iPad，您的新文档将永久丢失。如果您从 iTunes
    重新同步 Pages 应用程序，则可以再次获得上次同步之前 Pages 应用程序包含的任何文档。


    ![images](img/0415.jpg)


    **图 4–15.** *删除警告弹出窗口*


    **注意：** 如果您意外删除了一个应用程序并需要立即恢复，但手边没有电脑，您只需使用 iPad 内置的 App Store 应用重新下载该应用程序即可。如果它是付费应用程序，请不要担心；您不会被二次收费。您的
    iTunes 帐户知道您已经为它付过费了。


    如果您确定要删除应用程序，请继续轻点`Delete`按钮。如果您改变了主意，请轻点`Cancel`。删除应用程序后，页面上所有其他应用程序将移动一个位置以填补被删除应用程序留下的空白。

