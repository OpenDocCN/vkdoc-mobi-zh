- fmt: '##### Managing Photos


    While displaying any image, you can tap the `Manage` button at the bottom right
    of [Figure 15–12](#Chapter15.html#fig_15_12) to select photos. The `Manage` button
    looks like a rectangle with an arrow coming out from it. When in library management
    mode, you can tap any photo select it. A check mark appears to indicate your selection,
    and the display changes (as shown in [Figure 15–13](#Chapter15.html#fig_15_13))
    to a pile of photos. Tap a photo again to remove it from your selection. It check
    mark will disappear.


    Once you''ve assembled your selection—the number of items you have chosen is listed
    at the bottom of the screen—choose to E-mail, Copy, or Delete that collection.
    By choosing E-mail, the iPad composes a new message and adds your images. Remember
    that you can attach up to five photos to any e-mail. Copy will, as the name suggests,
    copy the images to your iPad''s system pasteboard, ready to be pasted into other
    applications. Delete, once confirmed, removes all selected images from your library.


    Be aware that Photo Booth coordinates with your main Photo application library.
    When you snap a picture in Photo Booth, it''s automatically added to your main
    library. When you delete a Photo Booth image, it''s also deleted from the main
    library as well. At this time, Photo Booth images are not collected into a separate
    album in Photos, although Apple may move that way in the future.


    ##### Uploading Photo Booth Pictures to Your Computer


    Although you can e-mail photos to yourself, it''s generally easier to upload photos
    directly when connected to your computer. On the Mac, you can use iPhoto''s Import
    and Download buttons. Under Windows, you need to follow the instructions that
    shipped with the photo application you''re using.


    ![images](images/1513.jpg)


    **Figure 15–13.** *Create a collection of images by tapping the Share button and
    adding images from the scrolling library at the bottom of your screen. Checks
    indicate that images have been selected for the collection.*


    ### Using FaceTime to Chat


    This chapter has already introduced the iPad''s front and rear cameras. These
    cameras signify a major hardware upgrade for the iPad. They aren''t just for taking
    pictures and recording video: you can also use them for FaceTime, a technology
    that brings easy and intuitive video calling to the masses.


    With the FaceTime app on the iPad, you can video call anyone whose computer or
    device also runs FaceTime. This includes second-generation or later iPads, fourth-generation
    or later iPod touches, iPhone 4 or later, and Mac computers that are running FaceTime
    software. Hopefully, FaceTime will soon arrive on Windows as well.


    Apple wants to make FaceTime the de-facto standard for video calling, and in order
    to do so, Apple has made the FaceTime technology an open standard. That means
    other phone manufacturers can build the technology in their phones so one day,
    ideally, you''ll be able to FaceTime video call on your iPad to someone on an
    Android phone.


    To use FaceTime, besides your iPad, you''ll need to have a Wi-Fi Internet connection
    and an Apple ID. The person who you are calling must also have a Wi-Fi connection,
    even if you are calling them on an iPhone 4. At the time this book was being written,
    iPhone 4 owners could only use FaceTime over Wi-Fi, not over their service provider''s
    data network. The service providers and not Apple most likely put this limitation
    in place. Streaming live video over a cellular network takes a lot of bandwidth—something
    that is very costly for a service provider. It''s also very taxing on the network
    itself.


    #### Opening Facetime


    To begin using FaceTime, tap the FaceTime icon on your home screen. The icon looks
    like a white video camera with a blue lens on a metallic background ([Figure 15–14](#Chapter15.html#fig_15_14)).
    If this is the first time you''ve launched the app, you''ll be presented with
    the FaceTime Get Started screen ([Figure 15–15](#Chapter15.html#fig_15_15)). Enter
    your Apple ID and password and then tap `Sign In` to get started. If you do not
    have an Apple ID, you will need to tap `Create New Account` instead.


    If you click the “Learn more about FaceTime” link, Safari will open, and you''ll
    be taken to Apple''s iPad FaceTime page on Apple''s web site.


    #### Signing In


    To sign in with your existing Apple ID, fill in the e-mail and password fields,
    and tap `Sign In`. You already have an Apple ID if you use the iTunes Store, the
    App Store, or the iBookstore. You also have an Apple ID if you have a MobileMe
    account.


    If you do not already have an Apple ID, you can set up a new account from FaceTime.
    Tap `Create New Account`. The creation screen (see [Figure 15–16](#Chapter15.html#fig_15_16))
    appears. You will be prompted to enter your name, a valid e-mail (which will act
    as your new Apple ID), a password, and other security information.


    When you sign in for the first time, whether creating a new account or using an
    existing ID, Apple notifies you that people will call you using your e-mail address.
    You are asked which e-mail address you would like to use. You can keep the same
    e-mail address that is your Apple ID, or you can enter another e-mail address.


    Once you have entered the e-mail address you want associated with FaceTime calls,
    tap the `Next` button. A short verification screen appears as Apple verifies that
    your e-mail address is authentic. Then a `Check Mail` button will appear; tapping
    it will navigate you to your selected e-mail account in the iPad''s mail app.


    Look for an e-mail with the subject “Please verify the contact e-mail address
    for your Apple ID.” Tap the `Verify Now` link in this e-mail. A Safari window
    opens, taking you to the My Apple ID page. There you''ll need to enter your Apple
    ID and password to verify your FaceTime e-mail address.


    Once you are presented with the “E-mail address verified” web page, return to
    the FaceTime app. You''ll be presented with a list of contacts, similar to the
    Contacts application on your iPad''s home screen.


    **NOTE:** *Apple now requires e-mail style Apple IDs. If you are used to using
    an older account name style (such as firstname_lastname), you will be prompted
    to associate an e-mail address with your existing account. After doing so, you
    will need to log in using the e-mail in future, not your original account name.*


    ![images](images/1514.jpg)


    **Figure 15–14.** *The FaceTime icon*


    ![images](images/1515.jpg)


    **Figure 15–15.** *The FaceTime Get Started screen. You will generally see a live
    front-facing camera preview in the area to the left.*


    ![images](images/1516.jpg)


    **Figure 15–16.** *Use this screen to create a new Apple ID to use with FaceTime.
    The account creation and authorization procedure for FaceTime is subject to change
    as Apple evolves its software.*'
