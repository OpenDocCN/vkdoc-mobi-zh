- fmt: '### Summary


    This chapter introduced you to the user-controllable hardware of your iPad by
    taking you on a tour of the various switches, buttons and ports you’ll use on
    a daily basis. You also became familiar with the care and maintenance of your
    iPad and found out more about the iPad accessories that you can purchase from
    Apple.


    Here are some key points from this chapter:


    - For ease of use, the iPad has very few physical switches and toggles. Most interaction
    with an iPad is done through the touch screen. The true buttons and switches consist
    of the On/Off Sleep/Wake button, the Home button, the volume toggle, and the mute/screen
    rotation switch.

    - There are many ways to extend the battery life of your iPad for those rare occasions
    where you’ll be away from a power outlet for a long time. On those long international
    flights, consider dimming the screen, lowering the volume, and turning off all
    wireless services (`Wi-Fi`, `3G`, and `Bluetooth`).

    - Extreme temperatures are the enemy of your iPad. Chances are, if you’re feeling
    uncomfortable, your iPad is too! Keep it at a temperature you’d feel comfortable
    at, and you shouldn’t run into any problems.

    - Never get liquids into any of the ports on your iPad, especially the headphone
    jack. Exposure to liquids can void the iPad warranty.

    - If you plan on using any of the Apple cables or adapters to connect your iPad
    to a projector, TV, or home theater system, understand that not all apps may support
    those cables.


    ## Chapter 4: Interacting with Your iPad


    For those of you who have used an iPhone or iPod touch, you’ll already have some
    idea of how to interact with your iPad. However, because of the iPad’s large screen,
    you’ll find some subtle differences between the iPhone and your iPad. Never used
    an iPod touch or iPhone before? That’s okay too, because you are absolutely going
    to be blown away by the iPad’s Multi-Touch screen. The iPad responds to the language
    of your touch. Its vocabulary includes *taps*, *drags*, *pinches*, and *flicks*.
    With these actions, you control your iPad as easily as using a mouse to control
    your personal computer. And there’s a lot more to interaction than just drags
    and taps. Your iPad offers Multi-Touch technology. That means it can recognize
    and respond to more than one touch at a time.


    In this chapter, you’ll discover all the different ways you can interact with
    your iPad—from zooming into and out of pictures to using the iPad’s large built-in
    keyboard to setting Accessibility options. Let’s get started.


    ### Interaction Basics


    Personal computers have mice. Personal digital assistants (PDAs) have styluses.
    The iPad has your fingers. It does not work with mice or styluses. It requires
    real finger contact. Your iPad does not just sense pressure points. It detects
    the small electrical charge transferred from your fingers. That means you can
    use your iPad with your fingers, your knuckles, or even—if you’re feeling up to
    it—your nose, but you cannot use it with pencil erasers, Q-Tips, or those PDA
    styluses. The electrical charges in your touch make it possible for the iPad to
    detect and respond to one or more contacts at a time, that is, to use Multi-Touch
    technology.


    **TIP:** If you’re feeling really adventurous, you can use a frozen hotdog in
    place of your finger. Korean winters are very cold, and people were getting frostbite
    on their fingers from removing their gloves to use their iPhones outside. Some
    enterprising people in Korea discovered that you could use a frozen hotdog in
    lieu of your finger and still be able to interact with the iPhone’s touch screen,
    all while keeping their gloves on. Theoretically, a frozen hotdog should work
    with the iPad’s screen as well.


    #### The iPad Language


    How you touch your iPad’s screen provides your communication vocabulary. Here’s
    a quick rundown of the basic ways you can speak to your iPad:


    - *Pressing the Home button*: The Home button lives below the touch screen and
    is marked with a white square. Press this button at any time while in an app to
    return to your Home screen with its list of applications. Double-pressing the
    Home button while on a home screen or while inside an app will bring up the multitasking
    bar. We’ll talk more about multitasking later in this chapter.

    - *Tapping*: Tap your iPad by touching your finger to the screen and removing
    it quickly. Tapping allows you to select web links, activate buttons, and launch
    applications. When typing text, you may want to tap with your forefinger or, if
    it’s more comfortable, your thumb.

    - *Double-tapping*: Double-tapping means tapping your screen twice in quick succession.
    Double-clicking may be important on your personal computer, but double-tapping
    is not actually used all that much on your iPad. You can double-tap in Safari
    (the web browser that ships on your iPad) to zoom into columns and double-tap
    again to zoom back out. In Photos (the iPad’s built-in photo viewer), use double-tapping
    to zoom into and out from pictures.

    - *Two-fingered tapping and dragging*: The iPad’s Multi-Touch technology means
    you can tap the screen with more than one finger at a time. A few applications
    respond to two-fingered gestures. To do this, separate your forefinger and middle
    finger and tap or drag the screen with both fingers at once. For example, in Safari,
    a double-fingered drag allows you to scroll within a web frame without affecting
    the page as a whole.

    - *Holding*: At times, you’ll want to put your finger on the screen and leave
    it there until something happens. For example, holding brings up the spyglass
    while you’re typing, and in Safari, it brings up URL previews.

    - *Dragging*: Drag your finger by pressing it to the screen and moving it in any
    direction before lifting it. Use dragging to scroll up and down in Safari and
    iPod (the application that plays your iTunes songs). Some applications offer an
    index on the right side, like the one shown for the iPod app in [Figure 4–1](#Chapter04.html#fig_4_1).
    To use this index, drag along it until the item you want comes into view.

    - *Flicking*: When you’re dealing with long lists, you can give the list a quick
    flick. Place your finger onto the screen, and move it rapidly in one direction—up,
    down, left, or right. The display responds by scrolling quickly in the direction
    you’ve indicated. Use flicking to move quickly through your e-mail contacts list,
    for example.


    **TIP:** Flicking and dragging will not choose or activate items on the iPad’s
    display. Try this yourself by dragging and flicking on the Home screen.


    - *Stopping*: During a scroll, press and hold your finger to the screen to stop
    scrolling. Apple’s legal text provides a great place to practice flicking, dragging,
    and stopping. To get there, select `Settings` `General` `About` `Legal`. Have
    fun with its endless content of legalese that you can flick, drag, and stop to
    your heart’s content. If you don’t want to stop a scroll, just wait. The scroll
    will slow and stop by itself.

    - *Swiping*: To swipe your iPad, drag a finger from the left side of the screen
    toward the right. Swiping is used to unlock your iPad and to indicate you want
    to delete list items.

    - *Pinching*: On the iPad, you pinch by placing your thumb and forefinger on the
    screen with a space between them. Then, with your fingers touching the screen,
    move them together, as if you were pinching the screen. Pinching allows you to
    zoom out in many iPad programs, including Photos and Safari.

    - *Unpinching*: To unpinch, perform the pinch in reverse. Start with your thumb
    and forefinger placed together on your screen and, with the fingers touching the
    screen, spread them apart. Unpinching allows you to zoom into those same iPad
    applications where pinching zooms out.'
