  trans: "\n### 搜索\n\n你主要可以通过屏幕右上角工具栏中的 `搜索` 功能找到大部分地点（见图 12-2 和图 12-3）。轻点搜索栏，会弹出“最近搜索”窗口和键盘（见图\
    \ 12-6）。请记住，如果你已将硬件键盘同步到 iPad，软件键盘将不会出现在屏幕上。\n\n![images](img/1206.jpg)\n\n**图\
    \ 12-6.** *搜索地图*\n\n在 iPad 上搜索地点有多种方式。你可以输入完整地址（`1600 Pennsylvania Avenue, Washington,\
    \ DC`）；可以通过输入联系人姓名查找其地址（`Bill Smith`）；也可以通过输入地标名称查找其地址（`Eiffel Tower`）。你甚至可以通过输入本地邮政编码和关键词\
    \ `pizza` 来查找披萨店（`Pizza 60605`）。\n\n“最近搜索”弹出窗口会显示你所有的近期搜索记录，包括最近的路线（见图 12-7）。轻点“最近搜索”列表中的任一结果，即可跳转到该地点。轻点“最近搜索”弹出窗口中的“清除”按钮，可清空最近搜索结果列表。清空“最近搜索”列表可确保其他使用你\
    \ iPad 的人无法看到你搜索过的地点。例如，如果你查找了前往某家特色餐厅的路线，准备带妻子去那里庆祝生日，你自然不希望她看到这个行程。清空“最近搜索”列表就能确保她不会发现。不过，如果你经常需要查找同一条路线，请小心不要误清该列表。“地图”应用可保存任何类型的地点，无论其是否有地址；但它无法永久保存路线。尽管如此，这些路线会保留在“最近搜索”列表中——以便快速访问——直到你将其清除。\n\
    \n![images](img/1207.jpg)\n\n**图 12-7.** *显示“最近搜索”列表的搜索栏*\n\n输入你的搜索查询内容，地图上会落下单个或多个红色图钉。假设你下周要去芝加哥旅行，想尝尝芝加哥风格的披萨。输入搜索条件\
    \ `Pizza Chicago`，地图上便会显示多个红色图钉，它们都代表该城市的披萨店（见图 12-8）。\n\n![images](img/1208.jpg)\n\
    \n**图 12-8.** *地图上的搜索结果图钉*\n\n当你触摸其中一个红色图钉时，会显示该图钉的信息栏（见图 12-9）。信息栏会显示该场所的名称（本例中为一家披萨店），并在两侧各显示一个图标。这些图标分别代表信息窗口和街景。\n\
    \n![images](img/1209.jpg)\n\n**图 12-9.** *搜索结果图钉的信息栏显示了场所名称，左侧为街景图标，右侧为信息图标*\n\
    \n你还可以将搜索结果以列表形式查看。图钉落到地图上后，搜索栏中查询词旁边会出现一个带三条横线的灰色圆形图标。轻点该圆形图标，你的搜索结果将以下拉列表的形式呈现（见图\
    \ 12-10）。随后，你可以持续轻点列表中的名称，在地图上查看它们对应的位置动态显示。\n\n![images](img/1210.jpg)\n\n**图\
    \ 12-10.** *搜索结果列表*\n\n### 信息窗口\n\n轻点图钉信息栏上白色带蓝色的 `i` 图标，即可滑出信息窗口。信息窗口（见图 12-11）会显示该场所的详细信息，例如电话号码、网页和物理地址。\n\
    \n![images](img/1211.jpg)\n\n**图 12-11.** *信息窗口*\n\n信息窗口为 iPad 上指定的地点提供以下选项：\n\
    \n- **图片**：根据场所不同，信息窗口中可能会显示该场所街景的缩略图图标。你可以轻点此缩略图进入街景模式。稍后会详细介绍。\n- **路线到这里**：轻点此处可跳转到“路线”工具栏。该场所的地址会自动填入第二个（终点）路线输入框。我们将在本章后面部分详细讨论路线。\n\
    - **路线从这里出发**：轻点此处可跳转到“路线”工具栏。该场所的地址会自动填入第一个（起点）路线输入框。\n- **电话**：显示该场所的电话号码。长按可复制号码到剪贴板。轻点电话号码可发起\
    \ FaceTime 通话。仅当该号码是有效的 FaceTime 号码时，FaceTime 通话才能正常工作。\n- **主页**：显示该场所的网址。轻点可关闭“地图”应用，并在\
    \ Safari 浏览器中打开该网址。\n- **地址**：显示该场所的地址。长按可复制地址到剪贴板。\n- **添加到通讯录**：轻点此按钮可将该场所的名称、电话号码、网址和物理地址添加到某个联系人中。此操作会为你提供两个选项：`创建新联系人`\
    \ 和 `添加到现有联系人`。\n\n  如果你选择 `创建新联系人`，信息窗口中会滑出一个“新建联系人”窗口（见图 12-12），自动填入联系人字段的信息，并允许你向该联系人添加更多信息。轻点\
    \ `完成` 即可保存新联系人。\n\n  ![images](img/1212.jpg)\n\n  **图 12-12.** *“新建联系人”窗口让你可以在“地图”应用内将搜索结果信息添加到你的通讯录中。*\n\
    \n  如果你选择 `添加到现有联系人`，信息窗口中会滑出你通讯录中所有联系人的列表。轻点你想要添加信息的联系人。信息会被添加，联系人列表随即消失。\n\n\
    - **FaceTime**：如果你选择查找通讯录中已有朋友的地址，你将看到 `FaceTime` 按钮，而不是 `添加到通讯录` 按钮。轻点 `FaceTime`\
    \ 按钮会弹出一个对话框，询问你想通过哪个号码或电子邮件地址与该联系人进行 FaceTime 通话。选择你想要的方式，FaceTime 将打开并开始呼叫你的联系人。有关\
    \ FaceTime 的更多信息，请参阅第 15 章。\n- **共享位置**：轻点此按钮，你可以通过电子邮件发送该场所名称的链接、添加谷歌地图链接，并附加一张\
    \ vCard（接收方可选择将其添加到通讯录的虚拟电子名片）。\n- **添加到书签**：轻点此按钮，你可以将该地点保存到“地图”的书签中。你可以为书签命名，因此可以将\
    \ `Edwardo's Natural Pizza Restaurant` 更改为 `我最爱的披萨店`。我们稍后会详细讨论书签。\n\n轻点地图上的任意位置即可关闭信息窗口。\n"
