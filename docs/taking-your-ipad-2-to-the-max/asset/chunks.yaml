- fmt: '### Video Playback


    The iPad is an orientation-agnostic device: you can interact with it in portrait
    or landscape mode. That''s no different for playing video. When you watch a video
    on the iPad, you can watch it holding the iPad in portrait mode or in landscape
    mode. Depending on the app you are watching it in, you may see more options for
    the video being played or indeed for the app itself.


    However, most apps display the video interface with all the same elements, meaning
    once you know how to control video playback in one app, you know how to do it
    in the rest of them. Here is a quick overview of those controls, which are shown
    in [Figure 7–2](#Chapter07.html#fig_7_2).


    ![images](images/0702.jpg)


    **Figure 7–2.** *The iPad''s video playback controls allow you to control playback
    as you watch.*


    - **Play/Pause**: Play/Pause appears as either a right-pointing triangle (Play)
    or a pair of vertical lines (Pause). Tap this button to pause or resume video
    playback.

    - **Rewind**: The Rewind button appears as two triangles pointing left to a line.
    Tap it to return to the start of the video, or press and hold the button to scan
    backward.

    - **Fast-Forward**: The reverse of Rewind, the Fast-Forward button''s triangles
    point to the right instead of the left. Press and hold this button to scan forward.
    Tap it to skip to the next video track.

    - **AirPlay**: A rectangle with an embedded upward-pointing triangle, AirPlay
    allows you to redirect over-the-air playback to other devices. At the time this
    book was being written, AirPlay receivers were limited to second-generation or
    later Apple TV units and third-party applications like Banana TV (`http://bananatv.net`).

    - **Volume**: The volume control is the large line below the Play/Pause button.
    Drag the volume control knob to adjust playback volume. Of course, you can always
    use the dedicated physical volume button on the side of the iPad as well.

    - **Scrubber bar**: The scrubber bar appears at the top of your screen. It is
    a long line with a small knob that you can drag. (The volume control is the thicker
    bar at the bottom.) Drag the playhead along the scrubber bar to set the current
    playback time.

    - **Zoom**: The Zoom button looks like two arrows in a white box pointing away
    from each other, at the top right of your screen. Either double-tap the screen
    or tap the Zoom button to switch between full-screen mode and the original aspect
    ratio. To get back into the original aspect ratio''s view, double-tap the screen
    again, or tap the Zoom button again. You''ll note that the Zoom button changes
    slightly when viewing a video full-screen: the arrows turn into a letterbox icon.
    When viewing in full-screen mode, you use the entire iPad screen, but some video
    may be clipped from the top or sides of the video. In the original aspect ratio,
    you may see either letterboxing (black bars above and below) or pillarboxing (black
    bars to either side), which results from preserving the video''s original aspect
    ratio.

    - **Audio tracks and Subtitles**: If alternate audio tracks or subtitles are available
    in the video you are watching, you''ll see an icon that looks like a speech bubble
    appear in the controls. Tap this icon to select from a pop-up list of audio tracks
    and subtitles.

    - **Done**: The Done button appears on all video application screens. Tap Done
    to exit video playback. Press the physical Home button on the iPad''s bezel to
    quit the app and return to your Home screen.


    While you''re playing a video, the iPad automatically hides your video controls
    after a second or two. This allows you to watch your video without the distraction
    of onscreen buttons. Tap the screen to bring back the controls. Tap the screen
    again to hide them; or leave them untouched for a few seconds, and they once again
    fade away.


    ### Videos App


    To launch the Videos app, tap its blue clapperboard icon. When the app opens,
    you''ll be presented with a list of media items synchronized to your iPad. These
    items are organized into categories by tabs, including items such as movies, TV
    shows, podcasts, and so forth (see [Figure 7–3](#Chapter07.html#fig_7_3)). As
    long as you''ve already synced videos from your iTunes library (see [Chapter 2](#Chapter02.html#ch2)),
    you''ll see them appear here. Tap through each tab to find a complete selection
    of synchronized media.


    ![images](images/0703.jpg)


    **Figure 7–3.** *The Videos app offers separate tabs of movies, TV shows, podcasts,
    music videos, and iTunes U lessons you''ve synchronized to your iPad.*


    #### Playing a Video


    As you can see, the Videos interface shown in [Figure 7–3](#Chapter07.html#fig_7_3)
    couldn''t be simpler. Its thumbnail images represent the items you''ve copied
    to your iPad. (Synchronizing these items is discussed in [Chapter 2](#Chapter02.html#ch2).)
    Navigate between your various video media categories by tapping the category tabs
    that run along the top of the screen (see [Figure 7–4](#Chapter07.html#fig_7_4)).
    If you have a lot of videos in a specific category, you can flick your finger
    to quickly scroll through the list.


    ![images](images/0704.jpg)


    **Figure 7–4.** *Navigate your video categories by tapping the appropriate category
    tab at the top of the screen.*


    Tap any video thumbnail to open it. The item''s icon flies forward as gray panels
    unfold from behind it like origami. You''ll be presented with the information
    page that displays the name of the video and the year it was made, along with
    other information that could include the length, dimensions, file size, codecs,
    and copyright notice, but generally simply includes an extended episode or movie
    description (see [Figure 7–5](#Chapter07.html#fig_7_5)). Tap "more" to see the
    entire write-up.


    If you are viewing a video with chapters, such as a TV show (each episode in a
    season is considered a chapter), podcast, or movie, you''ll see a list of chapters.
    If it''s a podcast or TV show, you''ll be presented with the episodes you have
    on your iPad, including the name, a summary, ratings, and the length of each episode.


    ![images](images/0705.jpg)


    **Figure 7–5.** *Information screens for movies and TV shows*


    To begin video playback, tap the circular Play button in the top right of the
    screen, or if your video has a list of chapters, tap a chapter from the list.
    Your screen clears, and the video loads and automatically begins playing. Tap
    Done to return to the information page.


    #### Deleting Videos


    If you want to delete a video from your iPad, touch and hold the video thumbnail
    until a circle with a white × appears in the corner of the video''s icon (see
    [Figure 7–6](#Chapter07.html#fig_7_6)). Tap the × to delete the video. With the
    exception of videos rented from the iTunes Store, deleting a video from the iPad
    will not delete it from your computer. You''ll be able to sync it again from your
    iTunes library should you choose to do so.


    ![images](images/0706.jpg)


    **Figure 7–6.** *Tap and hold a video''s thumbnail icon, and wait for the × in
    a circle to appear. Tap the × to delete the video.*'
