- fmt: '### The iPad as a Travel Computer


    Whether you travel for business or pleasure, your `iPad` is a lightweight and
    unobtrusive traveling companion. If you’re used to lugging a laptop and all of
    the sundry accessories (power supply, extra battery pack or two, Ethernet cable,
    and the laptop case) on your trips, you’ll be surprised at how useful and powerful
    the `iPad` is as a fully functional travel computer.


    Business travelers are usually interested in being able to track and book travel,
    communicate with people at home or back at the office, and determine whether weather
    is going to affect their travel plans. For leisure travelers, those requirements
    are usually the same, with the addition of being able to edit or retouch photos
    and video. Let’s take a look at a handful of `iPad` apps that are perfect for
    travelers.


    #### FlightTrack


    `FlightTrack` (see [Figure 16–22](#Chapter16.html#fig_16_22)) is a handy app for
    determining the status of most flights, domestic or international, and in its
    free version displays beautiful maps showing the location of a flight in progress,
    departure and arrival times, and other important information.


    ![images](images/1622.jpg)


    **Figure 16–22.** *The free `FlightTrack` app for `iPad` is a fascinating tool
    for tracking the status of your flight. The `$9.99 FlightTrack Pro` app adds a
    significant amount of functionality, including synchronization with `TripIt.com`
    itineraries.*


    Upgrade to the `$9.99 Pro` version, and you add a whole new level of functionality.
    `FlightTrack Pro` synchronizes itineraries with the `TripIt.com` travel planning
    service, so your flight information is automatically entered into the app. If
    you have multiple flight segments planned for a trip, `FlightTrack Pro` tracks
    all your flights on one screen for easy updates on flight status.


    If a flight is delayed or canceled, a notification is pushed to your `iPad` even
    when the app isn’t open. For those canceled flights, `FlightTrack Pro` finds alternate
    flights with a tap. Even when you’re on a plane and have your device in airplane
    mode, `FlightTrack Pro`’s maps will still work, showing your location on a detailed
    map. Weather information is available at a glance, with live radar maps showing
    any storms along your flight path.


    #### Kayak HD for iPad


    `Kayak.com`’s motto is “Search one and done,” meaning that one search finds the
    best possible airfare between two airports. Although you can’t actually book the
    flights that are found in an exhaustive yet fast search, the free `Kayak HD` app
    (see [Figure 16–23](#Chapter16.html#fig_16_23)) provides a link so you *can* book
    the flights on `Orbitz`, `CheapTickets`, and airline websites. In many cases,
    you’re even provided with the number of seats left at a certain price on a particular
    flight.


    ![images](images/1623.jpg)


    **Figure 16–23.** *Rather than making you search a lot of airline websites for
    the best air fare deals, the `Kayak HD` app does it all for you. Enter the departure
    and arrival airports, add a few details, and within seconds you have the lowest
    possible fares.*


    If you need a hotel or rental car, `Kayak HD` links you to the appropriate websites.


    #### Urbanspoon HD for iPad


    Man does not live on airline food alone, so the traveler needs restaurants to
    survive on the road. `Urbanspoon HD` (see [Figure 16–24](#Chapter16.html#fig_16_24))
    is a popular free app for finding popular and good restaurants in almost every
    cuisine.


    ![images](images/1624.jpg)


    **Figure 16–24.** *The `Urbanspoon HD` app is a fun way of exploring restaurants
    in your local area or in any major city, all from the screen of your `iPad`.*


    The app lists every restaurant in an urban area; in locations such as `New York
    City`, it’s not uncommon to see `25,000` restaurants highlighted. To help you
    make a decision, there’s a `Popular` button to narrow down the list to only those
    restaurants that have gained success through positive reviews and diner feedback.
    `Urbanspoon` also provides a way to narrow your search to individual neighborhoods,
    cuisines, and cost.


    A fun thing to do is to use the `Spin` button to have `Urbanspoon` randomly pick
    out a restaurant for you. Once you’ve decided whether the restaurant is actually
    a place you really want to try, tap the map for an address and phone number, the
    menu of the restaurant, and more reviews and information.


    Don’t be stuck with room service food when you’re traveling; find out where the
    locals eat with `Urbanspoon`, and go enjoy yourself.


    #### Built-in iPad VPN Support


    Business travelers who need a secure Internet connection back to the services
    available in their offices often rely on virtual private networks (VPNs). A way
    to describe `VPNs` is that they create a secure, encrypted tunnel between your
    `iPad` (possibly sitting in a hotel room on an open Wi-Fi network) and your office.


    Your network or IT support group has probably created a VPN portal for your company.
    You’ll need to know the following information in order to configure your `iPad`:


    *   Type of VPN: `L2TP`, `PPTP`, `IPsec`

    *   Server address

    *   Account name

    *   Whether or not you’re using an `RSA SecurID` fob

    *   Password (if not using `RSA SecurID`)

    *   Secret

    *   Proxy server information (if required)

    *   For `PPTP`: encryption level

    *   For `IPsec`: group name, and whether a certificate is being used


    Once you have this information in hand, go to `Settings` ![images](images/U001.jpg)
    `General` ![images](images/U001.jpg) `Network` ![images](images/U001.jpg) `VPN`.
    Add a VPN configuration, and enter the information in the appropriate places before
    saving the VPN configuration.


    To connect to the VPN, make sure that you have a working Internet connection,
    and then turn on VPN and select your configured network. The `iPad` negotiates
    a secure connection, and you’re free to work on your office network as if you
    were actually sitting there instead of next to the pool.


    Getting the VPN configuration set up properly can be difficult, so ask your IT
    department for assistance if you run into any problems.


    #### Photography/Videography Apps


    It’s common to see travelers using small digital cameras or iPhones to take pictures
    and video while they’re visiting faraway places.


    Your `iPad` can serve as a portable digital backup tool and editing suite. Use
    the `iPad Camera Connection Kit` to transfer your digital photos or video to the
    `Photos` app, and your digital imagery is backed up to another device. Next, you
    can use one of these apps to retouch or edit your work before sharing it with
    friends back home.


    ##### Photogene


    `Photogene` (see [Figure 16–25](#Chapter16.html#fig_16_25); `$1.99`) is a powerful
    `iPad` tool for making your good photos even better. Pull an image from your photo
    library, and `Photogene`’s tools let you crop or rotate it, adjust the resolution
    of the photo, add preset filters, adjust colors, remove red-eye from pictures
    of people, and even add frames and annotations.


    ![images](images/1625.jpg)


    **Figure 16–25.** *`Photogene`’s palette of preset effects and filters is useful
    in making good photos shine.*


    Once you’re done creating your photographic masterpiece, `Photogene` makes it
    easy to share the photo through `Twitter`, `Facebook`, `Flickr`, `Dropbox`, and
    e-mail. Your retouched photos can be saved to your photo library for posterity
    and eventual syncing to your Windows or Mac computer.


    ##### Masque


    Another photo-editing and enhancement app is `Masque` (see [Figure 16–26](#Chapter16.html#fig_16_26),
    `$5.99`). It also takes your work from the photo library, but it performs some
    different functions. For example, you can apply gradient effects to your photos
    and stack filters to create completely unique images.


    ![images](images/1626.jpg)


    **Figure 16–26.** *The `Masque` toolset is different from `Photogene`’s, and the
    two apps complement each other.*'
