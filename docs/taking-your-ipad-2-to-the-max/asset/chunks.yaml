  trans: '

    ### 排行榜


    每当我们想在 iPad 上查看什么应用热门时，就会打开 App Store，然后轻点屏幕底部的`排行榜`按钮。屏幕上会显示付费 iPad 应用排行榜和免费
    iPad 应用排行榜（参见图 8-7）。继续向下滚动屏幕，还会看到收入最高的 iPad 应用列表。


    ![images](img/0807.jpg)


    **图 8-7.** *App Store 中的“排行榜”屏幕显示了付费和免费 iPad 应用排行。*


    苹果根据每个应用的下载量来定义付费和免费 iPad 应用排行榜，而下面的列表则根据应用产生的总收入计算得出。这意味着，如果某个高定价应用在 App Store
    中销售良好，它就会登顶“收入最高 iPad 应用”榜单。


    ### 类别


    有时你不想在成百上千个 iPad 应用中逐一浏览，而更希望只查看与特定类别相关的所有应用。App Store 底部的`类别`按钮会显示一组按钮，引导你按类别浏览应用列表（参见图
    8-8）。


    这是查找特定类别中热门应用的绝佳方式。例如，假设你正在寻找一个能帮你平衡支票簿和家庭预算的 iPad 应用。这类应用最可能的类别是“财务”。


    轻点`财务`按钮，屏幕上就会显示一个熟悉的界面（参见图 8-9），其中列出了财务类别中新增或近期更新的 iPad 应用。这些应用可以通过三个标准进行排序——名称、最受欢迎和发布日期——只需轻点`排序方式`按钮并选择相应的排序类型即可。


    ![images](img/0808.jpg)


    **图 8-8.** *在寻找特定类型的应用吗？类别列表将功能相似的应用归类在一起。*


    ![images](img/0809.jpg)


    **图 8-9.** *查看 App Store“财务”类别中最热门的应用*


    通过使用类别，你可以将浏览的应用数量缩减到可管理的范围。这是充分利用 App Store 购物时间的好方法。


    ### 搜索


    如果在 App Store 中浏览仍然找不到你想要的那款产品怎么办？如果遇到这种情况，就该进行搜索了。


    搜索框位于 App Store 屏幕的右上角。要搜索关键词，请在搜索框中输入关键词，然后按下 iPad 虚拟键盘上的`搜索`按钮。你会注意到，在输入关键词时，App
    Store 应用会提供一系列建议（参见图 8-10）。


    当你记得应用的部分名称却记不清确切拼写时，搜索功能非常有用。例如，我们中的一位最近想找一个 iPad 笔记应用。他知道这个应用要么叫`DeskPaper`，要么叫`PaperDesk`，但拿不准。在搜索框中输入`paper`后，出现了许多建议，果然，`PaperDesk
    for iPad`赫然在列。他点了一下这个建议，就直接跳转到了该应用的描述页面。


    ![images](img/0810.jpg)


    **图 8-10.** *当你在 App Store 搜索框中输入单词时，系统会列出建议的应用。*


    #### 更新


    通过电子方式购买所有 iPad 应用的一大好处是，每当有新版本软件发布时，App Store 会自动通知你。`更新`按钮位于 App Store 屏幕底部最右侧，它很可能是让你的应用保持最新状态的最重要按钮之一。


    如果你的 iPad 上有某些应用有更新，你会通过 App Store 图标收到通知。一个红色的通知小圆圈会出现在图标上，显示有待安装更新的应用数量（参见图
    8-11）。


    ![images](img/0811.jpg)


    **图 8-11.** *当有应用更新可供下载并安装时，iPad 上的 App Store 图标上会出现一个红色的通知圆圈。*


    App Store 中的`更新`按钮上也会显示相同的数字。要安装更新，请打开 App Store，然后轻点`更新`。屏幕上会列出所有可用的更新，并且屏幕右上角有一个`全部更新`按钮（参见图
    8-12）。轻点该按钮即可开始下载并安装应用更新。


    ![images](img/0812.jpg)


    **图 8-12.** *当有应用更新可用时，轻点`全部更新`按钮可下载并安装所有更新。*


    系统会提示你输入 iTunes 密码以验证请求。验证完成后，应用更新就会开始下载并安装。如果应用更新大小超过 20MB，而你使用的是带有 Wi-Fi + 3G
    功能的 iPad，则会弹出警告，提示你必须在连接速度更快的 Wi-Fi 网络后才能下载更新。任何较小的更新都会立即下载并安装，甚至通过 3G 网络也能完成。


    在本书出版时，应用更新是免费的。不过，也有过一些讨论，允许开发者对应用的主要版本更新收费，以便为持续开发提供资金支持。


    ### iTunes Store


    如果你在寻找游戏或其他软件，App Store 是你的购物场所；但如果你想购买音乐、电影或电视节目呢？那就要用到 iPad 上的 iTunes 应用了（参见图
    8-13）。


    ![images](img/0813.jpg)


    **图 8-13.** *iTunes Store。只需轻点 iPad 上的 iTunes 应用图标即可进入。*


    你首先可能会注意到 iTunes Store 和 App Store 在设计上的相似之处。iTunes Store 诞生更早，并且经过多年完善，因此苹果将其相同的概念应用到了
    App Store 和新的 iBookstore 中。iTunes Store 有一个 App Store 所没有的实用功能：预览。要预览商店中的任何歌曲、视频或电影，只需轻点它即可。歌曲预览时长为
    90 秒，而视频、电影和电视节目的预览时长则各不相同。


    两个商店的屏幕顶部和底部都有一排按钮。对于 App Store，这些按钮是`新品推荐`、`热门项目`和`发布日期`。在 iTunes Store 中，这些按钮则替换为`精选`、`排行榜`和`天才`。


    屏幕底部是用于所有可通过 iTunes 下载的不同媒体类型的按钮。媒体类型包括：音乐（音乐人的单曲或专辑）、影片、电视节目（单集或整季）、播客、有声读物和
    iTunes U。此外，还有一个进入 Ping（苹果的媒体社交网络）的按钮。


    顶部和底部的按钮协同工作，向你展示所有不同媒体类型中的热门内容。我将解释它们如何以类似的方式适用于音乐、影片和电视节目。

    '
- fmt: '# Featured


    Tapping the `Featured` button at the top of the `iTunes Store` when `Music` is
    selected at the bottom of the screen displays the now-familiar `New and Noteworthy`
    list. This time, of course, we''re not talking about apps; instead, we''re talking
    about music. Both singles and full albums can be found in `New and Noteworthy`.


    Further down the screen will be buttons linking to special singles and albums,
    music videos, and items available for pre-order, followed by a section containing
    content that varies. For example, this section featured “Metal Albums for $7.99”
    when we were writing this paragraph. The section changes depending on what the
    `iTunes Store` staff decides to sell at any point in time, so expect this section
    title to change often.


    At the bottom of the `Featured` screen is the familiar `Quick Links` section described
    in the `App Store` part of this chapter. The links are different and change frequently.
    Here''s where Apple puts in links for items that are free on `iTunes` and gives
    you the ability to complete an album or buy specially priced albums and songs.
    Finally, the `Account`, `Redeem`, and `Support` buttons once again reside at the
    bottom of the page, providing much the same functionality that they do in the
    `App Store`.


    Now, when you tap the `Movies` button, things change a bit. For example, `New
    and Noteworthy` changes to `New to Rent or Own`. We''ll elaborate on movie rentals
    shortly, but for the time being, it''s sufficient to understand that you can either
    buy or rent movies from the `iTunes Store`.


    Below that is a changing section, similar to that found in the `Music` section
    of the store. It''s often topical; this chapter was written about the time actress
    Elizabeth Taylor died, so there was a button leading to 20 of her movies in the
    `iTunes Store`. The `Quick Links` and various buttons take their usual place at
    the bottom of the page, although once again they are different from what you see
    in other parts of the store and change frequently.


    By now, you''d expect the `TV Shows` button to display something similar to what
    you saw for `Music` and `Movies`, and you''d be correct. `New and Noteworthy`
    listings appear near the top of the pages, along with the traditional `Quick Links`
    and buttons near the bottom of the page. The same is also true for `Podcasts`,
    `Audiobooks`, and `iTunes U`.


    If you''re not familiar with `iTunes U`, it''s an innovative section of the `iTunes
    Store` that provides educational podcasts and videos from universities around
    the globe. Yes, you can learn linear algebra, explore concepts in sedimentology
    and stratigraphy, or follow the history of Rome from Augustus to Constantine,
    and you can do it all from the comfort of your own home and your iPad.


    The `Ping` button is a gateway to Apple''s social network for music. `Ping` lets
    you follow artists and friends and displays real-time updates from those people.
    Through `Ping`, inform your followers about music you like or reviewed, and comment
    on their updates. To use `Ping`, create a free profile with your Apple ID in the
    Mac or Windows `iTunes` application by clicking the `Learn More` button that is
    visible in the upper right corner. Once `Ping` is activated for your iTunes account,
    your friend and artist feeds are visible by tapping the `Ping` button in the `iTunes`
    app on your iPad.


    ## Genres and Categories


    At the top of the `iTunes` screen on the left side, you''ll see a button that
    changes from `Genres` to `Categories`, depending on whether you''re viewing music,
    TV shows, movies (`Genres`), or podcasts or audiobooks (`Categories`).


    In either case, tapping this button displays a list of types of media. For example,
    podcast categories include arts, business, comedy, and education, to name a few.
    Music genres include alternative, blues, children''s music, and more. Like categories
    in the `App Store`, genres and categories in the `iTunes` store make it much easier
    to find what you''re looking for.


    ## Movie Rentals


    At any time, you can choose to rent a movie from the `iTunes Store` and view it
    on your iPad. Rentals differ from purchases in that they have a limited lifetime
    on your device. When you tap the `Rent` button, the clock starts. You have 30
    days to start watching the movie, so you can preload your iPad with movies before
    going on a trip. Once you have started watching the movie, you have 24 hours in
    which to complete your viewing. Want to watch the `Star Trek` movie ten times
    during that 24-hour period? No problem.


    Once that 24-hour period of obsessive rewatching of the rental is complete or
    you''ve reached the end of 30 days without watching the movie, the movie disappears
    from your library. You can watch the movies you''ve rented from your iPad only
    on your iPad, so they can''t be transferred to another computer or iPhone. Movies
    that are purchased on your computer can be transferred to your iPad or iPhone.


    If you have one of the optional video-out cables that I discussed in [Chapter
    1](#Chapter01.html#ch1), you can pipe the video that''s playing on your iPad into
    a TV with an HDMI, component, or composite video input. The `Apple Digital AV
    Adapter`, `Apple Component AV Cable`, and `Apple Composite AV Cable` ($39 each)
    are perfect for watching video from the little screen (iPad) on the big screen.


    When you rent a movie directly from your iPad, consider your network speed. Wi-Fi
    connections are generally much faster than 3G, so you''ll be able to start watching
    the film sooner when it''s downloaded over Wi-Fi.


    ## Season Passes


    For ongoing TV series, Apple has created the concept of `Season Passes`. These
    allow you to download every episode of a TV season. Current episodes that have
    previously aired are downloaded to your iPad immediately, while future episodes
    download after their initial TV airdate the next time you sign into `iTunes`.


    `Season Passes` are a boon to series fans who don''t want to miss an episode of
    their favorite show, and they make it easy to keep a copy of the show for posterity.
    As with movies, TV series can be purchased in either high or standard definition.'
