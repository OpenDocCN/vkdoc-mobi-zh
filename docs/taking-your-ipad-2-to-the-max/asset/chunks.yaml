- fmt: '### Viewing Your Photos as a Slideshow


    When viewing the contents of any album or a single image in any album, you''ll
    see the `Slideshow` and `Share` buttons in the upper-right corner of the screen
    (see [Figure 13–22](#Chapter13.html#fig_13_22)). As the name suggests, the `Slideshow`
    button displays the contents of a photo album, one image after another. We''ll
    discuss the `Share` button after the `Slideshow` button.


    ![images](images/1322.jpg)


    **Figure 13–22.** The `Slideshow` and `Share` buttons display in the right of
    the menu bar when viewing a single photo or the contents of any album.


    Slideshows are an awesome way to share your photos with your friends and family.
    Remember, however, that our images are associated with our personal memories,
    so they are always going to be more pleasant for us to watch than for others.
    All you have to do is remember a time you were stuck looking at someone else''s
    photos and the seconds ticked by as if they were hours. To keep slideshows exciting
    for your viewers, keep a few things in mind:


    - *Shorter is better*: The average shot (a clip of video displayed between cutting
    away to another shot) in a movie or TV show is less than two seconds nowadays.
    Back in the 1950s, the average shot was 30 seconds long. Watch an episode of *Friends*
    and then an episode of *I Love Lucy*, and you''ll see exactly what we mean. *Lucy*
    seems to trudge along so slowly by today''s standards. As the world—and media—got
    faster, our attention spans shrunk. This applies to viewing still images too.
    People can take in a lot from an image in just two or three seconds. If they are
    forced to look at an image any longer, they start to get bored. Keep the time
    a single image is displayed short. Also, keep the entire length of the slideshow
    short. When you watch a movie trailer in the cinema, its time is exactly 2 minutes
    and 20 seconds, which is considered a perfect length to whet the appetite, show
    people the best shots, and leave them feeling fulfilled but not exhausted.

    - *Music always helps*: Playing the appropriate kind of song in the background
    of a slideshow really adds a lot of ambience and power to a slideshow. Music is
    a powerful tool for conveying the emotion and sense of place and situation. In
    film school, one of the authors had an editing class where we watched clips from
    the now classic horror film *Halloween*. We watched a clip, as it was shown in
    theaters—with the soundtrack score, dialogue, and sound effects—that showed Michael
    Myers chasing his victim with a big butcher''s knife. Pretty scary stuff. Then
    we watched the same clip with the dialogue and sound effects only—the soundtrack''s
    score was removed. The clip went from being scary to being almost comical. Music
    adds more to your images than you realize.

    - *Transitions help too*: A transition is the effect that occurs when moving from
    one image to the next. It adds some visual flair to the change of images. Photos''
    slideshows allow you to choose between five transitions. Use them as eye candy
    to keep your audience entertained.

    - *Use your TV*: If you are having a party, a great way to show off your photos
    without wrangling up all your guests and forcing them to sit and watch is to project
    your slideshow on a TV and set it to repeat. That way, your slideshow is constantly
    playing in the background, and your guests can continue to catch glimpses of it
    as they mingle. Images on slideshows playing in the background are great conversation
    starters and allow you to play much longer slideshows and display individual images
    for longer, since you don''t have to worry about a captive audience. If you are
    going to play your slideshows in the background, you can choose to show several
    thousand images for as long as five or ten seconds each; that way, the entire
    show could run for hours, and it won''t get boring or tedious.


    To begin a slideshow, tap the `Slideshow` button. A drop-down menu appears that
    presents several slideshow options (see [Figure 13–23](#Chapter13.html#fig_13_23)).
    At the top, you''ll find the same `AirPlay` receiver list you saw in [Figure 13–21](#Chapter13.html#fig_13_21).
    Starting with iOS 4.3, the iPad allows you to play slideshows wirelessly to Apple
    TV and other AirPlay receivers. This AirPlay option is in addition to your ability
    display slideshows onscreen, or to use a connected cable via the HDMI, VGA, or
    other video adapters to mirror the iPad to a TV screen. These branded adapters
    are available from the Apple store, starting at $29.


    ![images](images/1323.jpg)


    **Figure 13–23.** The Slideshow Options drop-down menu


    Below the `AirPlay` receiver list are the following options:


    - *Transitions*: Transitions provide a visual effect when moving between images.
    Available transitions depend on the capabilities of the selected output device.
    The onboard transitions include wipes, ripples, and dissolve among other options.
    Apple TV adds a number of slick extras including Ken Burns, Sliding Panels, Origami,
    Reflections, and more.

    - *Play Music*: When switched to `ON`, this option will play music in the background
    while the slideshow runs.

    - *Music*: Tap this button to navigate through all the songs in your iPad''s music
    library. Once you find the song you want, tap it to select it.

    - *Start Slideshow*: Tap this button to start the slideshow. The image overlays
    disappear, and the slideshow plays, whether directly onscreen for local slideshows
    or on a remote device with `AirPlay`. With `AirPlay`, your screen turns black,
    and a message appears telling you that "This slideshow is now playing" via `AirPlay`.
    To stop the slideshow at any time, touch the screen. This stops the slideshow
    and places you in the full-screen photo display. To start the slideshow again,
    tap the `Slideshow` button and tap `Start Slideshow`.


    Slideshows display each slide for a set period of time, which you can set. As
    mentioned, you can export your slideshow to a TV screen by purchasing a special
    cable from Apple that connects your iPad to your TV. Apple offers a number of
    different cables, which are discussed in [Chapter 7](#Chapter07.html#ch7).


    To customize how your iPad displays its slideshows, go to your Home screen, and
    navigate to `Settings` ![images](images/U001.jpg) `Photos`. As shown in [Figure
    13–24](#Chapter13.html#fig_13_24), this settings screen allows you to specify
    exactly how you want your slideshows to display:


    ![images](images/1324.jpg)


    **Figure 13–24.** The Slideshow settings


    - *Play Each Slide For*: Here, you can set the slide duration. Your choices are
    2 seconds, 3 seconds (the default, which works really well for most people), 5
    seconds, 10 seconds (which starts to get boring fast), and 20 seconds (which is
    probably recognized officially by Amnesty International as torture for most humans;
    seriously, don''t do this to your friends and family).

    - *Repeat*: Set this to `ON` to make your slideshow loop.

    - *Shuffle*: Show your pictures in a random order by switching `Shuffle` from
    `OFF` to `ON`. When `Shuffle` is disabled, your pictures display in album order.'
