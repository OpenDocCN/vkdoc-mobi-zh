- fmt: '### Navigating the Camera App


    To launch the Camera application, tap the `Camera` icon. It''s a gray button with
    a camera lens on it (see [Figure 15–1](#Chapter15.html#fig_15_1)). The camera
    can be used in either portrait or landscape mode. Simply rotate your iPad to switch
    between the two orientations.


    ![images](images/1501.jpg)


    **Figure 15–1.** *The Camera app*


    [Figure 15–2](#Chapter15.html#fig_15_2) shows the standard layout of the Camera
    app. With the exception of the `Switch Camera` button in the top‑right corner,
    all the camera controls reside in the gray bar at the bottom of the screen in
    portrait orientation. When you rotate into landscape orientation, the `Switch
    Camera` button remains in the top‑right corner, but the camera control bar shifts
    to the left (or right) of the screen. The icons on the control bar rotate to match
    your iPad''s orientation.


    ![images](images/1502.jpg)


    **Figure 15–2.** *The camera controls*


    The camera controls are as follows:


    - **Switch between still and video camera mode**: A tiny slider appears at the
    bottom right of the screen. The slider has two icons, a still camera and a video
    camera. To toggle between recording modes, tap this slider. The slider''s button
    rests below the icon whose mode is selected. When it is to the left, your iPad
    is in single‑shot mode. On the right, you are ready to record video. In [Figure
    15–2](#Chapter15.html#fig_15_2), the slider is below the still camera, so you
    know that you are in still‑camera mode.

    - **Switch between cameras**: Tap the `Switch Camera` icon in the top right of
    the screen to switch between the front and rear cameras. The icon looks like a
    traditional still camera with swirling arrows on either side. You''ll see a 2D
    animation of the screen flipping between cameras.

    - **Shutter button**: Tap the oval button with the icon of a traditional still
    camera in the center of the control bar to snap a still photograph. This button
    changes to an oval button with a pulsing red dot in the center when you are in
    video camera mode. Tap the button to record video. Tap again to stop recording.
    If you have your finger on the `Shutter/Record` button but then change your mind
    about photographing or recording your subject, you can slide your finger off the
    button and no image will be taken, nor will video begin being recorded.

    - **Access the Camera Roll**: Tap the square button on the left of the control
    bar. The square will be filled with an icon of the last image or video recorded.
    Once tapped, your `Camera Roll` will slide up on screen. This is a great feature
    for reviewing your last photo or video. It saves you a lot of time, because you
    don''t have to leave the `Camera` app to check out your `Camera Roll` in the `Photos`
    app. Tap `Done` to return to the camera from the `Photos` app camera roll.


    ### Taking Still Pictures


    Taking a still photograph couldn''t be easier. Point your camera at what you want
    to photograph and tap the shutter button. You''ll hear a shutter click sound effect
    and see a cool animation of a lens''s iris quickly closing and then opening. After
    that, the still image you just took will jump down into the `Camera Roll` icon.


    **NOTE:** Some people find that tapping the onscreen shutter button to take a
    still photo causes their composition to get messed up. A neat trick Apple included
    to counteract any accidental nudging when you tap the shutter button is this:
    tap and hold the shutter button and *then* compose your shot. When you are ready
    to take the photo, simply remove your finger from the shutter button, and the
    shot will be recorded.


    #### Changing the Exposure


    You can set the exposure of the camera by tapping anywhere on the screen. You''ll
    see a white box with crosshairs quickly appear. The iPad''s camera reads the exposure
    setting of the part of the image inside the box and adjusts the camera sensors
    accordingly.


    Setting the exposure helps when you are shooting an image of a cloudy sky, for
    example. If you want the sky to appear other than blinding white, tap the area
    of the image on your iPad''s screen, and the exposure adjusts to better emphasize
    the lighting conditions at that point.


    #### Zooming In and Out


    When you tap the screen to set the exposure, you''ll also see a zoom bar appear
    along the bottom ([Figure 15–3](#Chapter15.html#fig_15_3)). This zoom bar allows
    you to adjust the digital zoom settings of the photograph; it lets you zoom in
    and out on your subject. Digital zoom, unlike optical zoom, does not actually
    increase the fidelity of your image. Instead, it blows up a smaller section of
    your image using whatever data is already there. Because of that, the more you
    zoom, the lower quality your image will be. Slide your finger along the bar to
    zoom in or out. You can also tap the `+` or `–` button to zoom in increments.


    ![images](images/1503.jpg)


    **Figure 15–3.** *The zoom controls appear above the control bar when you tap
    the screen in still‑camera mode.*


    **NOTE:** You can only zoom while in still camera mode using the rear camera.
    You cannot zoom using the front‑facing camera. There is also no zoom while in
    video camera mode.


    ### Recording Video


    To record video, set the slider in the control bar to video camera mode. The camera''s
    shutter button will be replaced with a recording button (see [Figure 15–4](#Chapter15.html#fig_15_4)).
    Tap the record button to begin recording your video. The red dot on the record
    button will begin to glow, and a time code stamp will appear in the upper right
    of the screen showing the hours, minutes, and seconds that have elapsed since
    recording began. To stop recording, tap the record button again.


    Just how much video can you record on your iPad? That depends on the size of your
    iPad and how much space you have available. If you have a 32GB iPad but only have
    10GB of free space on it, you''ll be able to record only 10GB of video.


    Here''s a simple rule of thumb: 720p/30fps video works out to about 120MB per
    minute. If you think in terms of gigabytes, one hour of 720p/30fps video will
    occupy about 7GBs of space on your iPad. One hour of video is a lot, but so is
    7GB of storage space, especially if you own one of the lower‑end iPad models with
    less onboard space. If you are going to be recording a lot of video, it''s helpful
    to be close to your computer or have your laptop with you so you can easily dump
    your video onto your computer''s hard drive and then wipe it from your iPad, freeing
    up space for more video.


    Do you travel without a laptop? At this time you cannot use the iPad''s camera
    connection kit to offload video to an SD card while on the go, although it''s
    a feature that Apple might add in future iOS updates. You can, however, use the
    kit to move data between one iOS device to another. If you have extra room on
    a non‑camera unit, you can transfer media between devices.


    Whether you want to do this at all is another matter. Transferring data using
    the camera connection kit to clear up space on your iPad is probably all a little
    more work than it''s actually worth, but if you''re quickly running out of space
    and you want to keep taking pictures and videos, it''s a workaround that could
    help you out when space gets tight.


    ![images](images/1504.jpg)


    **Figure 15–4.** *The video‑recording screen shows the time elapsed while recording
    at the top left corner. The red record button at the bottom center will pulse
    during video capture.*


    **TIP:** If you are going to be using the recorded video in a movie or be viewing
    it on your TV, you probably want to make sure you record in landscape mode. Although
    you can also record in portrait mode, portrait mode provides a weird aspect ratio
    to view videos in and, if you use `iMovie` on your iPad, to edit videos in. What''s
    more, the iPad is a bit big and cumbersome to hold up in portrait mode, especially
    if you want to have a finger free to be able to tap the stop/start recording button.'
