- fmt: '##### HD vs. Standard Definition


    Many movie titles offer the choice of high definition (HD; see [Figure 8–14](#Chapter08.html#fig_8_14))
    or standard-definition downloads. If you''re an HDTV fan, you might be disappointed
    to find that you can''t watch your videos in true HD on your iPad. What do we
    mean by that? The `1024×768–pixel` iPad display doesn''t match the aspect ratio—the
    ratio of width to height of a display—of either the common `1080i` (`1920` pixels
    wide by `1080` pixels high) or `720p` (`1280` pixels wide by `720` high) HDTV
    formats. The iPad display also lacks the exact aspect ratios found in many movies,
    commonly `16:9` or `2.35:1`.


    ![images](images/0814.jpg)


    **Figure 8–14.** *High-definition video on the iPad lets you see incredible detail
    even in action scenes. This image shows letterboxing (the black stripes at the
    top and bottom of the screen).*


    That''s not to say that you can''t display these high-definition video or movies
    on the iPad—you can, but they''ll be letterboxed. That means black bars surround
    the top and bottom of the video screen, as shown in [Figure 8–14](#Chapter08.html#fig_8_14).
    The `720p` HD–formatted movies are also downscaled to the width of the iPad screen.
    On the plus side, video and movies look wonderful on the iPad''s display regardless
    of letterboxing. Part of this is because of Apple''s adherence to the `H.264`
    compression scheme, which is able to compress digital video to relatively small
    sizes without compromising quality.


    Standard-definition movies from iTunes are in a format called `720xN Anamorphic`.
    Files are upscaled to fit the width of the iPad screen, resulting in movies that
    aren''t as sharp as those that are HD formatted.


    Another major difference between HD and standard-definition iPad movies is the
    size of the movie file. As an example, *The Tourist* is `1.37GB` in size in standard
    definition and `3.25GB` in HD (see [Figure 8–15](#Chapter08.html#fig_8_15)). Owners
    of `16GB` iPads might want to stick to standard-definition movies or download
    only a few movies at a time.


    ![images](images/0815.jpg)


    **Figure 8–15.** *This detailed description of The Tourist displays the Buy and
    Rent buttons, as well as the buttons for selecting HD or standard definition.
    The description displays the size of the file as well, which is important if your
    iPad is low on storage.*


    The rental and purchase prices for movies increase as you go from standard to
    high definition. An HD movie purchase often costs about `$5` more than its SD
    counterpart, while rentals are usually about `$1` more for HD.


    ## Top Charts


    Looking at Top Charts while browsing music in iTunes displays two lists: Top Songs
    and Top Albums. Moving downward on the Top Charts page displays Top Music Videos
    for your purchasing pleasure.


    For movies, Top Charts displays two columns: Top Movie Rentals and Top Movie Sales.
    In the TV Shows category, Top Charts shows a list of Top TV Episodes and Top TV
    Seasons. For podcasts, the iTunes Store splits Top Charts into Top Audio Podcasts
    and Top Video Podcasts.


    In the audiobooks category, there''s simply a listing of the top 12 audiobooks,
    and in iTunes U, the Top iTunes U Collections shows you what is popular in the
    academic world.


    ## Genius


    When you''re looking at music, movies, or TV shows, there''s another button at
    the top of the page: Genius (see [Figure 8–16](#Chapter08.html#fig_8_16)).


    ![images](images/0816.jpg)


    **Figure 8–16.** *The iTunes Genius is like having your own personal shopper to
    recommend music or movies. Of course, you''ll have to start by telling your personal
    shopper what you like.*


    Have you ever wanted to have your own consultant who could check out what music
    you like or the movies and TV shows you watch and then suggest new albums to listen
    to or videos to watch? That''s exactly what the iTunes Genius function does for
    you.


    Based on media that you have purchased through iTunes or have moved from your
    computer to your iPad, the Genius recommends different albums, TV shows, or movies
    that you may like. You can improve the accuracy of Genius recommendations by occasionally
    looking at them and voting with a “thumbs up” or “thumbs down.”


    Accuracy of Genius picks improves with frequency of purchases and rentals. Based
    on one movie purchase and one rental, the movie Genius did a remarkable job of
    picking out comedies that we might be interested in, but it also threw in some
    movies we''d never watch. In the TV area, we had purchased the entire first season
    of *Star Trek: The Original Series*. The Genius then thought that we would like
    *Star Trek: Deep Space Nine*, which we loathed. Once again, voting for or against
    recommended movies is a great idea for improving how well your Genius picks match
    your true preferences.'
