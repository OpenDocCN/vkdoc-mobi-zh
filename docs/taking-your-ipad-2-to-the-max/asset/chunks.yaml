- fmt: '# Creating an Account


    When you have not previously established an Apple ID, you can create one by tapping
    the `Create New Account` button. The `New Account` screen ([Figure 15–16](#Chapter15.html#fig_15_16))
    appears. On this screen, you will enter your first and last name, your e-mail
    address (which will become your new Apple ID), and a password of at least eight
    characters.


    This password does not have to be the same as the password for your e-mail account.
    Apple requests that you include a number, an uppercase letter, and a lowercase
    letter as part of your ID to increase the security of your password.


    You''ll also need to choose a security question and enter the answer. This question
    and answer is used in case you forget your Apple ID password. Finally, enter your
    month and date of birth, choose which country you reside in, and select whether
    you want to subscribe to the Apple e-mail list.


    Once you have entered this information, tap the `Next` button. You''ll be returned
    to the `Sign In` screen with your Apple ID and password already entered, and signing
    in will commence.


    You''ll need to go through the same e-mail verification process described in the
    previous section. A short verification screen will appear as Apple verifies that
    your e-mail address is authentic. Once verified, you can return to FaceTime and
    sign in.


    # Navigating Your FaceTime Contacts


    Each time you launch the FaceTime app, once you''ve established your identity
    and signed into your account, you are presented with a list of contacts. The contacts
    screen is divided into three sections, accessible by tapping the buttons in the
    contact bar at the bottom of the screen.


    - **Favorites**: This screen allows you to add your favorite contacts to it. It''s
    handy as a shortcut to the people you call the most.

    - **Recents**: This screen lists the recent FaceTime calls you''ve made or received.

    - **Contacts**: This screen lists all the contacts in your address book.


    Here''s a closer look at each of these contact sections.


    ## Favorites


    The Favorites screen ([Figure 15–17](#Chapter15.html#fig_15_17)) allows you to
    create and maintain a list of your favorite contacts. Favorite contacts generally
    are the people you call the most, such as family and friends and important work
    contacts. This screen acts as a shortcut to their FaceTime e-mail addresses or
    phone numbers.


    ![images](images/1517.jpg)


    **Figure 15–17.** *The Favorites screen (left). Selecting the e-mail or phone
    number of a Favorites contact (right).*


    - **Adding a contact to Favorites**: Tap the `+` button in the upper right corner,
    and then select your contact from the address book list that slides up on the
    screen.

    - **Choosing the contact''s FaceTime info**: From your selected contact''s information
    screen, tap the FaceTime e-mail address or phone number for the contact. If your
    contact is using an iPad, you must choose their associated FaceTime e-mail. If
    your contact is using an iPhone 4, you can choose their iPhone 4 phone number.
    Once you have chosen your contact''s FaceTime info, a blue star appears by their
    FaceTime e-mail or number.

    - **Calling a Favorite**: Once you have set up your favorites, simply tap their
    name in the Favorites list, and a FaceTime call will be initiated.


    You can tap the chevron next to a favorite''s name to view or edit their contact
    information.


    ## Recents


    The Recents screen (see [Figure 15–18](#Chapter15.html#fig_15_18)) gives you a
    list of recently made or received FaceTime calls. This list can be sorted into
    the following two categories via the tabs at the top of the screen:


    - **All**: Shows you all the FaceTime calls you have made, received, or missed.
    Missed calls show up in red. The time of the call is shown to the right of the
    name of the person called. You can tap the chevron next to a favorite''s name
    to view or edit their contact information.

    - **Missed**: Shows only the FaceTime calls you have missed.


    To clear your Recents list, tap the `Clear` button in the upper right corner of
    the screen.


    ![images](images/1518.jpg)


    **Figure 15–18.** *The Recents list*


    ## Contacts


    The Contacts screen features your entire address book. It works just like your
    standalone Contacts application. When you find the contact you want to call, tap
    their name, and their contact information card will be displayed. Tap their FaceTime
    e-mail or FaceTime phone number and your call will begin (see [Figure 15–19](#Chapter15.html#fig_15_19)).


    ![images](images/1519.jpg)


    **Figure 15–19.** *Placing a FaceTime call from your iPad. A front-facing camera
    preview appears onscreen as the call is being placed. Tap `End` to terminate the
    call without connecting.*


    # Placing and Receiving a FaceTime Call


    To make a FaceTime call, select a contact from your Favorites, Recents, or Contacts
    list. Tapping a name in the Favorites or Recents list will initiate the FaceTime
    call ([Figure 15–11](#Chapter15.html#fig_15_11)). To start a call using your Contacts
    list, you''ll need to tap the contact''s name, and then tap either a FaceTime
    phone number or e-mail. To cancel a call before the person has picked up, tap
    the `End` button shown in [Figure 15–19](#Chapter15.html#fig_15_19).


    **NOTE:** You can change your incoming FaceTime ringtone by navigating to the
    Settings app and then choosing `Sounds` ![image](images/U001.jpg) `Ringtone`.


    ![images](images/1520.jpg)


    **Figure 15–20.** *Receiving a FaceTime call*


    When you receive a FaceTime call, a message will appear onscreen telling you that
    a friend would like to FaceTime with you ([Figure 15–20](#Chapter15.html#fig_15_20)).
    The front camera automatically activates so you can see what you look like. To
    accept, slide your finger along the "slide to answer" area.


    Figure 15–21 shows you what it looks like when you are in a FaceTime call. The
    speaker''s image takes up a majority of the screen, while your image appears in
    a rectangle at the corner of the screen. Below your image is the FaceTime control
    bar. This gives you several options.


    ![images](images/1521.jpg)


    **Figure 15–21.** *A FaceTime video call*


    - **Mute**: Tap the microphone icon to switch between muting and unmuting a call.
    While your call is muted, you can still hear the person you are calling, but they
    cannot hear you. While a call is muted, the other person can still see you, so
    be careful what you do!

    - **Switching cameras**: Tap the `Switch Camera` icon in the bottom right of the
    screen to switch between the front and rear cameras. The icon looks like a traditional
    still camera with swirling arrows on either side. Switching cameras changes what
    the person you are talking to sees. When the camera is switched, your friend will
    see what the rear camera on the iPad is pointed at.

    - Switching cameras during a call is a handy feature. It allows your friend to
    see what you are looking at, like your newborn crawling on all fours, for example.

    - **Ending the call**: To end a FaceTime call, tap the `End` button.


    **NOTE:** You know that the iPad has two cameras, but did you know the front one
    has been specifically designed for FaceTime? Apple made sure it has just the right
    focal length and field of view to focus on your face at arm''s length.'
