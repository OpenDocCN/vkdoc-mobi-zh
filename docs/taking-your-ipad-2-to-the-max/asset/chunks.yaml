- fmt: '# Maps Screen


    Tap the icon to launch the `Maps` app. When you do, you’ll be presented with your
    Maps screen (see [Figure 12-2](#Chapter12.html#fig_12_2)).


    ![images](images/1202.jpg)


    **Figure 12-2.** *The Maps screen. Note the page curl at the bottom right of the
    screen.*


    At the top of the Maps screen, you’ll see the Maps toolbar (see [Figure 12-3](#Chapter12.html#fig_12_3)).


    ![images](images/1203.jpg)


    **Figure 12-3.** *The Maps toolbar*


    The Maps screen, including the toolbar, shows the basic Maps interface, which
    consists of the following:


    *   *Search/Directionstab*: This tab allows you to switch between the search and
    direction functions of the `Maps` app. You can search for local business, attractions,
    and specific addresses. You can also easily get directions to and from those locations.

    *   *Current Location*: This button, which looks like an arrowhead, finds your
    current location on the map by using the iPad’s built-in positioning tools. These
    built-in tools vary, depending on which iPad you have. The iPad Wi-Fi + 3G uses
    both the Global Positioning System (GPS) and Skyhook Wi-Fi positioning to locate
    you. Skyhook Wi-Fi positioning uses known wireless hotspot locations to triangulate
    your current position. The iPad Wi-Fi only uses Skyhook Wi-Fi positioning because
    there is no GPS chip inside the iPad Wi-Fi.

    *   *Bookmarks*: The Bookmarks icon at the left side of the search field links
    to your saved locations. From the Bookmarks pop-up that appears when you tap the
    Bookmarks icon, you can edit your bookmarks, see recently viewed locations, or
    choose a location from your contacts list.

    *   *Search field*: Marked with a spyglass, the search field allows you to enter
    addresses and other queries. You can type an entire address (`1600 Pennsylvania
    Avenue, Washington, DC`); you can find addresses for contacts (`Bill Smith`) or
    landmarks (`Golden Gate Bridge`); and you can even find pizza places in any ZIP
    code across the country (`Pizza 11746`). When in Directions mode, the search field
    will turn into two search fields, so you can enter beginning and end points.

    *   *Map*: The map itself takes up the rest of the screen. It’s fully interactive.
    You can scroll by dragging your finger along the map, or you can zoom in and out
    using pinches and double-taps.

    *   *Page curl:* In the lower-right corner of the map (see [Figure 12-2](#Chapter12.html#fig_12_2)),
    you’ll see the corner is curled up a bit. Tap the curl, or tap and hold and then
    drag the curl with your finger to reveal map settings. This allows you to change
    map views, get traffic conditions, and drop pins.


    ## Navigating Maps


    The iPad `Maps` app makes it so you can explore the world from the comfort of
    your couch. As with any other app, you navigate the map using gestures. You can
    also view the map in different modes.


    ### Gestures


    On maps you use gestures to zoom in, zoom out, pan, and scroll:


    *   *Zoom in*: You have two ways of zooming in. Either pinch the map with two
    fingers; or, using one finger, double-tap the location on the map that you want
    to zoom in on. Double-tap again to zoom in even closer.

    *   *Zoom out*: You can zoom out in two ways. Either reverse-pinch the map with
    two fingers; or, using two fingers, double-tap the map. Double-tap with two fingers
    again to zoom even further out.

    *   *Panning and scrolling*: Touch and drag the map up, down, left, or right to
    move the map around and view another location.


    ### Changing Map Views


    The default map view is Google’s classic road map with orange, yellow, and white
    streets. But the `Maps` application also allows you to look at the map in four
    additional views, as well as with a traffic overlay (see [Figure 12-4](#Chapter12.html#fig_12_4)).


    ![images](images/1204.jpg)


    **Figure 12-4.** *Four map views, from left to right: Classic, Satellite, Hybrid,
    and Terrain.*


    To access these features, tap or tap and drag the page curl at the bottom of the
    Maps screen. The map will curl up, and you’ll be presented with the settings page
    (see [Figure 12-5](#Chapter12.html#fig_12_5)). Your settings include map views,
    overlays, and a special Drop Pin feature, which places, or *drops*, a pin anywhere
    on the map. These dropped pins let you easily mark a business, street corner,
    beach, or any other kind of location on a map.


    ![images](images/1205.jpg)


    **Figure 12-5.** *The Maps setting page lies behind the page curl in the map.*


    Here are the basic map views and what they do:


    *   *Classic*: This is the default map view. It uses Google’s standard road map.

    *   *Satellite*: This view shows you the world using satellite imagery. It’s perhaps
    the coolest map view because you can zoom in on streets and see little blips of
    people walking about on the day that the satellite imagery was taken. No labels
    appear in Satellite view.

    *   *Hybrid*: This view combines the Classic and Satellite views. You see the
    map in satellite imagery, but it has labels, roads, and borders overlaid on it.

    *   *Terrain*: This view shows you the terrain of a given map, including relief
    maps of the terrain. The Terrain view also overlays roads, borders, and labels.
    This view is great if you’re thinking of doing a cross-country cycle—you’ll be
    able to see how hilly areas of your route are.


    **TIP:** The Classic view uses orange, yellow, and white to color streets. Orange
    indicates interstate highways, yellow indicates state highways and county parkways,
    and white indicates local and private streets.


    *   *Traffic*: Tap to turn Traffic ON. While on, the current traffic conditions
    will be overlaid on the map. To see current traffic conditions, you will need
    to be connected to a Wi-Fi or 3G network. We’ll talk more about the Traffic feature
    later in this chapter.

    *   *Drop Pin*: Tapping this button causes the page to uncurl and drops a location
    pin in the center of the map. Use a dropped pin to easily mark a business, street
    corner, beach, or any other kind of location on a map. You can also drop a pin
    by touching and holding anywhere on the map. We’ll talk more about dropping pins
    later in this chapter.


    You’ll notice we said that the `Maps` app allows you to view the map in Classic
    view, as well as four additional views; thus, it gives you five views in all.
    The fifth view is called Street view, and you access it from search results or
    a dropped pin. We’ll talk more about Street view later in this chapter.


    ### Finding Locations


    The `Maps` app gives you multiple ways to find locations. You can search for locations
    using the search field, automatically find your current location using the iPad’s
    built-in GPS or Skyhook location services, or even just zoom in and browse the
    map like a bird flying overhead.


    Depending what you are looking for, some types of search are better than others.
    For example, if you are looking for your favorite spot on a beach, chances are
    it doesn’t have an address or name, so your best bet is to navigate to the beach
    and then zoom in and scroll around in Satellite view until you find that favorite
    spot.'
