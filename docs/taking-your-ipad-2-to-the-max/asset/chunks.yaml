  trans: '

    ### 视频播放


    iPad 是一款不限定方向的设备：你可以竖屏或横屏使用它。播放视频时也是如此。在 iPad 上观看视频时，你可以竖着握持，也可以横着握持。根据你使用的 App，你可能会看到针对正在播放的视频或
    App 本身的更多选项。


    不过，大多数 App 的视频界面元素都大同小异，这意味着一旦你掌握了在一个 App 中控制视频播放的方法，也就知道如何在其他 App 中操作了。以下是这些控制项的快速概览，如图
    7–2 所示。


    ![images](img/0702.jpg)


    **图 7–2.** *iPad 的视频播放控制功能让您在观看时能够控制播放。*


    - **播放/暂停**：播放/暂停按钮显示为指向右方的三角形（播放）或两条竖线（暂停）。轻点此按钮可暂停或继续视频播放。

    - **快退**：快退按钮显示为两个指向左侧竖线的三角形。轻点可返回视频开头，按住按钮可向后快退。

    - **快进**：与快退相反，快进按钮的三角形指向右侧而不是左侧。按住此按钮可向前快进。轻点则可跳至下一个视频轨道。

    - **AirPlay**：一个内含向上三角形箭头的矩形，AirPlay 允许你将无线播放内容重定向到其他设备。在本书撰写时，AirPlay 接收端仅限于第二代或更新版本的
    Apple TV，以及 Banana TV（`http://bananatv.net`）等第三方应用。

    - **音量**：音量控制是播放/暂停按钮下方那条粗大的横条。拖动音量控制旋钮可调节播放音量。当然，你也可以随时使用 iPad 侧边的专用物理音量按钮。

    - **进度条**：进度条位于屏幕顶部。它是一条带有可拖动小圆点的长条（音量控制是底部较粗的横条）。沿着进度条拖动播放头可设置当前播放时间。

    - **缩放**：缩放按钮看起来像一个白色方框内有两个彼此背离的箭头，位于屏幕右上角。双击屏幕或轻点缩放按钮，可在全屏模式和原始宽高比之间切换。要回到原始宽高比视图，请再次双击屏幕，或再次轻点缩放按钮。你会注意到，在全屏观看视频时，缩放按钮会略微变化：箭头变为信箱模式图标。在全屏模式下，你会使用整个
    iPad 屏幕，但视频的顶部或两侧可能会被裁剪一部分。在原始宽高比下，你可能会看到信箱模式（上下黑边）或竖屏信箱模式（左右黑边），这是由于保留了视频的原始宽高比。

    - **音轨和字幕**：如果你正在观看的视频提供了其他音轨或字幕，你会在控制项中看到一个对话气泡图标。轻点此图标可从弹出的列表中选取音轨和字幕。

    - **完成**：完成按钮出现在所有视频应用界面上。轻点“完成”可退出视频播放。按下 iPad 边框上的实体主屏幕按钮可退出应用并返回主屏幕。


    在播放视频时，iPad 会在一两秒后自动隐藏视频控制项。这样你就可以不受屏幕按钮干扰地观看视频。轻点屏幕可重新调出控制项。再次轻点屏幕可将其隐藏；或者让它们保持不动几秒钟，它们会再次淡出。


    ### 视频 App


    要启动“视频”App，请轻点其蓝色场记板图标。App 打开后，你会看到一个已同步到 iPad 的媒体项目列表。这些项目按标签分类归档，包括影片、电视节目、播客等项目（参见图
    7–3）。只要你已从 iTunes 资料库同步了视频（参见第 2 章），它们就会出现在这里。轻点每个标签以找到完整的已同步媒体选择。


    ![images](img/0703.jpg)


    **图 7–3.** *“视频”App 提供单独的标签页，用于显示已同步到 iPad 的影片、电视节目、播客、音乐视频和 iTunes U 课程。*


    #### 播放视频


    如你所见，图 7–3 中显示的“视频”界面再简单不过了。其缩略图代表了你已拷贝到 iPad 的项目（同步这些项目在第 2 章中讨论）。通过轻点屏幕顶部的分类标签（参见图
    7–4），可以在各种视频媒体类别间浏览切换。如果某个类别中有大量视频，你可以滑动手指快速滚动列表。


    ![images](img/0704.jpg)


    **图 7–4.** *轻点屏幕顶部的相应分类标签，可在视频类别间导航。*


    轻点任意视频缩略图即可打开它。项目的图标会向前飞出，其后灰色的面板像折纸一样展开。你将看到信息页面，其中显示视频名称和制作年份，以及其他信息，可能包括时长、尺寸、文件大小、编解码器和版权声明，但通常只包含剧集或影片的详细描述（参见图
    7–5）。轻点“更多”可查看完整描述。


    如果你正在观看带有章节的视频，例如一部电视剧（一季中的每一集被视为一个章节）、播客或影片，你会看到一个章节列表。如果是播客或电视剧，你会看到 iPad 上的各集，包括名称、摘要、评分以及每集的时长。


    ![images](img/0705.jpg)


    **图 7–5.** *影片和电视节目的信息屏幕*


    要开始视频播放，请轻点屏幕右上角的圆形播放按钮，或者如果你的视频有章节列表，则从列表中轻点一个章节。屏幕会变黑，视频加载并自动开始播放。轻点“完成”可返回信息页面。


    #### 删除视频


    如果你想从 iPad 上删除一个视频，请按住视频缩略图，直到视频图标角落出现一个带有白色×的圆圈（参见图 7–6）。轻点×即可删除该视频。除了从 iTunes
    Store 租借的视频外，从 iPad 上删除视频不会将其从电脑中删除。如果你愿意，可以随时从 iTunes 资料库再次将其同步到 iPad。


    ![images](img/0706.jpg)


    **图 7–6.** *按住视频的缩略图图标，等待圆圈中的×出现。轻点×即可删除该视频。*

