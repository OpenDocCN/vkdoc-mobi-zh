    ### 在 Safari 浏览器中观看网页视频


    iPad 上的视频功能并不仅限于专用应用程序。你也可以通过 iPad 的 Safari 浏览器观看 MPEG-4 格式的电影文件。第 6 章 介绍了`Safari`。在这里，你将了解如何连接到万维网上的视频并在你的`Safari`浏览器中观看。


    除了 YouTube 之外，许多网站都内嵌了视频。例如，几乎任何新闻网站都能找到内嵌视频。正如我们在第 6 章及本章前面提到的，iPad（因此也包括`Safari`）通常不支持
    Flash 播放，这限制了 iPad 显示所有网页视频的能力（参见图 6-20，了解当 Flash 视频在 iPad 的`Safari`浏览器中显示时会发生什么情况）。然而，许多网站提供
    HTML-5 和 MPEG-4 格式的视频，这些格式与 iPad 完全兼容。你也可以使用第三方应用程序，如`Skyfire Mobile Browser`，来观看网页上的
    Flash 视频。


    例如，网站 TED（`www.ted.com`）就完全兼容 iPad，你可以在该网站上观看当今一些最伟大的人物谈论科学、教育、技术和艺术的视频。图 7–13
    展示了在 iPad 的`Safari`网页浏览器中播放该网站作者伊丽莎白·吉尔伯特谈论创造力的视频。


    你只需点击内嵌视频即可开始播放。根据你的网速，视频可能需要几秒钟才能开始播放。你可以选择在页面内或全屏模式下观看。要在两种视图之间切换，请点击视频，其底部会出现一个导航栏。导航栏上显示播放/暂停按钮、导航滑块以及最右侧熟悉的全屏双箭头按钮。点击双箭头按钮进入全屏视图。要退出全屏视图并返回网页，请点击视频播放屏幕上的“完成”按钮。


    ![images](img/0713.jpg)


    **图 7–13.** *网页上的许多视频都可以在 Safari 网页浏览器中直接播放。*


    ### 视频配件


    如果你打算观看大量视频，应考虑购买以下几种 iPad 配件：


    *   ***支架***：多家公司生产此类产品，价格从 5 美元到 100 美元不等。无论你选择哪种支架，请确保它能将 iPad 横向固定，因为这样能为你提供最大的屏幕空间来观看视频。有些保护套也可兼作
    iPad 支架。苹果的 iPad 2 Smart Cover（39 美元）可以折叠成一个支架。

    *   ***Apple Digital AV Adapter***（39 美元）：使用此适配器（参见图 7–14）通过 HDMI 连接将你的 iPad 连接到任何电视机。双端口设计让你在显示视频的同时，还能通过第二个端口为
    iPad 充电。iPad 2 支持屏幕镜像，但该适配器也可用于较旧型号的 iPad，适用于支持视频输出的应用程序，包括视频、照片和 YouTube。

    *   ***iPad Dock Connector to VGA Adapter***（29 美元）：适配器的 VGA 端可以连接到外部显示器、某些电视和
    PC 投影仪。你需要此适配器或下面列出的线缆，将 iPad 连接到家用电视。与 Digital AV Adapter 一样，此连接器兼容新旧款 iPad。但是，只有
    iPad 2 及更新机型才支持屏幕镜像。

    *   ***Apple Component AV Cable***（49 美元）和***Composite AV Cable***（49 美元）：这些线缆同样适用于
    iPad，提供了另外两种将外部显示器和投影仪连接到设备的方法。使用这些线缆无法在任何 iPad 上实现屏幕镜像。


    ![images](img/0714.jpg)


    **图 7–14.** *苹果新款 Digital AV Adapter 可为你的 iPad 提供 HDMI 连接。第二个连接器接口让你可以在显示视频的同时为
    iPad 充电。*


    如果你不清楚 VGA、HDMI、Composite 和 Component 之间的区别，不必担心。这些都是将设备连接到电视的物理视频连接器类型。


    *   ***VGA*** 是一种 15 针连接器，在许多 PC 的背面仍能找到。它支持最高 2048×1536 的分辨率。

    *   ***HDMI***，即高清晰度多媒体接口，是一种数字音频/视频连接器（可同时传输两种信号），通过单一数字链路提供高达 2560×1600 的高清信号支持。

    *   ***Composite*** 是一种视频连接器，通过单个连接传输三种视频源信号。它是这四种技术中最古老的，但仍支持最高 720×576i 的分辨率。

    *   ***Component*** 是一种视频连接器，接收三种视频源信号（红、绿、蓝）并通过三个不同的连接输出。它基本上是一条与复合线缆类似的带有三个头的
    RCA 线缆，但 Component 提供了更好的分辨率，最高可达 1920×1080p（也称为***全高清***）。


    许多现代电视都支持所有这些连接方式。请查看你的电视手册，了解其支持哪些连接方式。


    #### 投影视频


    虽然苹果的连接线缆能让你将 iPad 视频输出到电视上，但许多创新的第三方厂商也提供了视频解决方案。例如，WowWee 公司售价 430 美元的 Cinemin
    Slice（`www.wowwee.com`）。它是一个视频系统，允许你连接 iPad（参见图 7–15）并将视频投影到任何屏幕或墙壁上。有了它，你在移动演示时可以避免许多尴尬的线缆布置，而且无需提前准备高清电视。相反，你可以随身携带这个相对较小的设备，并将其显示在任何大的平坦表面上，如果需要，甚至包括天花板——投影头安装在一个铰链上，可以向前和向上旋转。


    Slice 可与 iPad 2 的屏幕镜像功能配合使用。如果你需要以横向而非纵向模式进行投影（这可能是大多数商务人士更偏好的），你可以购买一个 40 美元连接包，配合你的苹果品牌
    VGA 视频线缆使用。


    ![images](img/0715.jpg)


    **图 7–15.** *售价 430 美元的 Cinemin Slice 产品提供了一种高便携性的方式，用于在移动演示中投影 iPad 2 屏幕。*


    ### 在 iPad 上听音乐


    当苹果推出 iPad 时，许多人开始在互联网上抱怨它只不过是一个大号的 iPod touch，尽管他们中的大多数人都还没试用过 iPad。甚至有一个流行的恶搞视频，展示慢跑者在晨跑时带着
    iPad 而不是 iPod。到现在你已经发现，iPad 远不止是一个大号的 iPod touch，但它*确实*也能像 iPod 一样播放音乐（只是别带着它慢跑；或者，如果你真要这么做，就戴上蓝牙耳机并把
    iPad 扔进背包里，这样就不会因为手里拿着一个笔记本电脑屏幕大小的东西跑步而显得很傻，更糟糕的是把它绑在胳膊上）。


    对于 iPad 来说，*iPod* 不是一个设备——它是一个应用程序，允许你浏览音频库并选择要播放的项目。一旦你理解了这有点令人困惑的名称转换，你就会发现
    iPad 的`iPod`应用带来了你所期望的 iPod 的所有功能和易用性，只是这些功能以一种独特的 iPad 方式呈现。


    如果你习惯在 iPod、iPod touch 或 iPhone 上听音乐，你可能会期望 iPad 的音乐播放器有类似的界面。实际上，iPad 的音乐播放器界面与电脑上的
    iTunes 更为相似，而不是之前的任何 iPod 界面。这是个好消息，因为如果你习惯在 Mac 或 Windows 电脑上使用 iTunes，你会立刻对
    iPad 音乐播放器应用的基本布局感到熟悉。


    **注意：** 不要混淆 iPad 上的`iPod`和`iTunes`应用程序。`iPod`用于播放你的音乐曲目。`iTunes`则让你连接移动版`iTunes
    Wi-Fi Music Store`，它不是通用的音乐播放器。

