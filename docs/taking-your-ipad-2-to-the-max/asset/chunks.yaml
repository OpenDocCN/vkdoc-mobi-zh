  trans: '

    ### 新品


    页面顶部是不断更新的新品应用示例展示。这些应用被`App Store`团队标记为独特或畅销之作。当你看到感兴趣的某个应用时，只需轻点一下，就会出现详细的应用描述（见图
    8–2）。


    ![images](img/0802.jpg)


    **图 8–2.** *App Store 中某款应用的详细描述*


    应用描述界面会显示 iPad 屏幕上该应用图标的大图，同时包含价格、应用所属分类、最新版本信息、兼容性说明、用户星级评分以及评论。想把这个发现的应用推荐给朋友？轻点`告诉朋友`链接，`App
    Store`会自动生成一封邮件，方便你发送给好友。


    **注意：** 如果你购买的应用出现问题，请轻点`精选`和`排行榜`页面底部的`支持`按钮，即可向`Apple`和开发者反馈问题。该按钮提供了指向`Apple`关于`iTunes`的支持网页链接，在`App
    Store`和`iBooks`标题下，有显示常见故障排查技巧的链接以及`给我们发邮件`按钮。`Apple`通常在 24 小时内回复大多数查询，这是获取答案最直接的途径。你也可以轻点应用描述页面左侧的`应用支持`按钮（见图
    8–2）直接联系开发者。


    iPad 屏幕上的应用描述最多显示约五行信息。若需查看更多内容，请轻点`更多`链接以展开描述（见图 8–3）。


    ![images](img/0803.jpg)


    **图 8–3.** *轻点`更多`链接可展开应用描述。请将此描述与图 8–2 中仅显示五行的描述进行对比。*


    屏幕左侧的按钮提供了指向开发者网站和支持页面的直接链接。界面中的图片可以滚动，若要查看所有图片，只需将可见图片向左拖动即可。


    我们建议阅读应用描述页面底部的用户评分和评论，尽管它们有时可能具有误导性。我们发现评论通常能指出其他用户可能遇到的共性问题，这样你就可以决定是立即购买该应用，还是等待更新版本。购买应用后，你也可以为其评分并撰写评论供他人参考。评分时只需点击一星（差）到五星（好）的任意星级。如果你选择撰写评论，请注意需要再次登录你的`iTunes`账户，并且评论在发布前会经过`Apple`审核。


    当你决定购买某款应用时，只需轻点价格。价格会变为绿色的`安装应用`按钮，随后你再轻点该按钮。iPad 屏幕上会出现一个对话框，要求你输入`iTunes`密码，然后轻点`好`。完成操作后，应用便会下载并安装到你的
    iPad 上。几天内你会收到`Apple`发送的购后收据邮件。


    **注意：** 当你轻点`好`开始下载时，`App Store`会关闭，iPad 的主屏幕会显示出来。不必担心，这是正常现象。更新应用时也会出现同样情况。


    让我们再回到`App Store`，了解一下`新品`屏幕上的其他区域。在重点推荐区域下方，是`新内容与值得关注`应用板块（见图 8–4）。`Apple`团队从`App
    Store`的新上架应用中挑选出这些应用，它们通常独特且有趣。要浏览`新内容与值得关注`的应用，请轻点左右两侧的白色箭头。


    ![images](img/0804.jpg)


    **图 8–4.** *`新内容与值得关注`的应用因功能有趣、玩法好玩或价值巨大而在`App Store`中获得特别关注。*


    屏幕上的下一个区域通常是一小组图标，指向`本周应用`、同类应用合集（例如儿童应用或音乐创作应用）或值得特别关注的应用。


    继续向下滚动`App Store`界面，你会看到`编辑推荐`精选（见图 8–5）。这些应用不一定是最新的，但它们深受`App Store`团队喜爱，团队希望你也了解它们。与`新内容与值得关注`板块一样，你可以通过轻点左右两侧的白色箭头来浏览这些精选应用。


    在`App Store`底部是`快速链接`区域。如果你的账户目前有未使用的余额，该余额会显示出来。轻点该余额，你可以查看或更改任何`iTunes`账户信息。如果没有余额，则可以通过轻点`App
    Store`界面最底部的`账户`按钮来获取相关信息。


    看到图 8–6 中的`兑换`按钮了吗？这是用别人的钱购买应用的一种有趣方式。你也许有幸从开发者那里获得一个“促销码”。这个代码可以兑换某款应用的免费副本。轻点`兑换`后，会出现一个对话框，你可以在其中输入该代码、`iTunes
    充值卡`代码或礼品证书代码。输入代码并轻点`兑换`，然后输入你的`iTunes`密码。如果你输入的是特定应用的促销码，该应用便会下载并安装。如果你输入的是充值卡或礼品证书代码，你的`iTunes`账户会获得相应价值的额度。


    ![images](img/0805.jpg)


    **图 8–5.** *`编辑推荐`、`快速链接`和常见的`App Store`按钮均位于`App Store`屏幕底部。*


    ![images](img/0806.jpg)


    **图 8–6.** *兑换促销码、充值卡和礼品证书是购买众多应用的绝佳方式。*


    `App Store`屏幕底部的最后一个按钮是`支持`。轻点此按钮会跳转到`Safari`浏览器中打开的`iTunes`支持网页（[`www.apple.com/support/itunes`](http://www.apple.com/support/itunes)）。


    许多常见问题的答案都可在`iTunes`支持页面找到，因此在寻求进一步帮助前，请务必先浏览这些信息。如果你未找到关于`iTunes`、`App Store`、`iBookstore`或音乐/视频购买问题的答案，页面中还有一个按钮可用于向`iTunes
    Store`支持团队发送邮件。多数情况下，你会在 24 小时内收到回复。


    ### 热门推荐


    `热门推荐`界面布局与`新品`类似，只是将`新内容与值得关注`替换为`热门推荐`应用列表。该界面还会展示一份频繁更新的应用合集，这些应用对 iPad 用户具有特殊吸引力。例如，在
    iPad 2 发布后不久，该板块就重点展示了针对新设备进行了特别增强的应用。


    ### 按发布日期


    最后，`精选`页面上的`按发布日期`按钮可以滚动查看所有已发布的应用，按时间倒序排列。每天的应用按字母顺序列出。你首先会看到今天发布的应用（按字母顺序），然后是昨天发布的（同样按字母顺序），以此类推。


    **注意：** 对 iPad 上虚拟商店的描述基于本书撰写时的状态。`Apple`经常更改商店的设计，因此本章所述的具体细节在你阅读时可能已有所不同。

    '
- fmt: '### Top Charts


    Whenever we want to see what''s popular on the iPad, we start up the App Store
    and immediately tap the `Top Charts` button at the bottom of the screen. A list
    of the Top Paid iPad Apps and a list of the Top Free iPad Apps are displayed (see
    [Figure 8–7](#Chapter08.html#fig_8_7)). Scrolling further down the screen, there''s
    a list of top-grossing iPad apps.


    ![images](images/0807.jpg)


    **Figure 8–7.** *The Top Charts screen in the App Store displays the top paid
    and free iPad apps.*


    Apple defines Top Paid and Top Free iPad Apps by the number of downloads of each
    app, while the lower list is calculated on the total revenue generated by apps.
    That means that if a high-priced app sells well in the App Store, it''s going
    to top the Top Grossing iPad Apps list.


    ### Categories


    Sometimes you don''t want to browse through hundreds or thousands of iPad apps,
    and you''d much rather just see all apps that pertain to a specific category.
    The `Categories` button at the bottom of the App Store displays a set of buttons
    that lead to app listings by category (see [Figure 8–8](#Chapter08.html#fig_8_8)).


    This is a great way to find the top entries in a particular category of app. For
    example, let''s assume that you''re looking for an iPad app to help you balance
    your checkbook and home budget. The most likely category for an app of this type
    would be Finance.


    A quick tap on the `Finance` button displays a familiar-looking screen (see [Figure
    8–9](#Chapter08.html#fig_8_9)) with a list of new or recently updated iPad apps
    in the Finance category. These apps are sortable by three criteria—Name, Most
    Popular, and Release Date—by tapping on the `Sort by` button and selecting the
    appropriate sort type.


    ![images](images/0808.jpg)


    **Figure 8–8.** *Looking for a specific type of app? The category listing groups
    apps with similar functionality.*


    ![images](images/0809.jpg)


    **Figure 8–9.** *Viewing the most popular apps in the Finance category of the
    App Store*


    By using categories, you''ve reduced the number of apps to look through to a manageable
    number. It''s a great way to make the best use of your App Store shopping time.


    ### Searching


    What if browsing through the App Store just isn''t leading you to the one product
    you''re looking for? If that''s the case, then it''s time to do a search.


    The search box is in the upper-right corner of the App Store screen. To search
    for a keyword, type it into the search box, and then press the `Search` button
    on the iPad''s virtual keyboard. You''ll notice that as you''re typing your keyword,
    the App Store app provides a list of suggestions (see [Figure 8–10](#Chapter08.html#fig_8_10)).


    Searching can be very useful when you know part of the name of an app but can''t
    remember the exact spelling. For instance, one of us was trying to find a note-taking
    app for the iPad recently. He knew that it was called either `DeskPaper` or `PaperDesk`
    but couldn''t remember for sure. Typing `paper` into the search box brought up
    a number of suggestions, and sure enough, `PaperDesk for iPad` was listed. He
    tapped the suggestion, which took him right to the description of the app.


    ![images](images/0810.jpg)


    **Figure 8–10.** *As you type a word into the App Store search box, suggested
    apps are listed.*


    #### Updates


    One great thing about buying all your iPad apps electronically is that whenever
    a new version of the software is published, the App Store automatically notifies
    you. The `Updates` button is the rightmost button at the bottom of the App Store
    screen and is probably one of the most important for keeping your apps up-to-date.


    If some of the apps on your iPad have been updated, you''ll be notified through
    the App Store icon. A small red notification circle appears on the icon displaying
    the number of apps that have updates waiting to be installed (see [Figure 8–11](#Chapter08.html#fig_8_11)).


    ![images](images/0811.jpg)


    **Figure 8–11.** *When you have an app update available for download and installation,
    a red notification circle will appear on the App Store icon on your iPad.*


    That same number appears on the `Updates` button in the App Store. To install
    the updates, open the App Store, and tap `Updates`. A listing of all the available
    updates occupies the screen, and there''s an `Update All` button in the upper-right
    corner of the screen (see [Figure 8–12](#Chapter08.html#fig_8_12)). Tap that button
    to begin the download and installation of the app updates.


    ![images](images/0812.jpg)


    **Figure 8–12.** *When there are app updates available, tapping the `Update All`
    button downloads and installs all of them.*


    You''ll be prompted to enter your iTunes password in order to validate your request.
    Once that''s been done, the application updates download and install. If the application
    update is more than 20MB in size and you''re using an iPad with Wi-Fi + 3G, then
    a warning appears noting that you must be connected to the much faster Wi-Fi network
    before downloading the update. Any smaller updates are downloaded and installed
    immediately, even over the 3G network.


    At the time of publication, app updates are free. However, there has been some
    discussion of allowing developers to charge for major version updates of their
    apps to provide for funding of continued development.


    ### The iTunes Store


    The App Store is the place to shop if you''re looking for games or other software,
    but what if you want to buy music, movies, or TV shows? That''s the purpose of
    the iTunes app on your iPad (see [Figure 8–13](#Chapter08.html#fig_8_13)).


    ![images](images/0813.jpg)


    **Figure 8–13.** *The iTunes Store. Just tap the iTunes app icon on your iPad
    to enter it.*


    The first thing you may notice is the similarity in the design of the iTunes Store
    and that of the App Store. The iTunes Store came first and was refined over many
    years, so Apple took the same concept and applied it to the App Store and the
    new iBookstore. The iTunes store has one nice feature the App Store doesn''t:
    previews. To preview any song, video, or movie in the store, tap it. Song previews
    run for 90 seconds, while video, movie, and TV show previews vary in length.


    Both stores have a set of buttons across the top and bottom of the screen. For
    the App Store, those buttons are `New`, `What''s Hot`, and `Release Date`. In
    the iTunes Store, the buttons are replaced with `Featured`, `Top Charts`, and
    `Genius`.


    Along the bottom of the screen are buttons for all the different types of media
    that you can download from iTunes. The media types consist of Music (single tracks
    or albums by musical artists), Movies, TV Shows (single episodes or full seasons),
    Podcasts, Audiobooks, and iTunes U. There''s also a button for entering Ping,
    Apple''s media-oriented social network.


    The top and bottom buttons work in tandem to show you what''s hot in all the different
    media. I''ll explain how they work similarly for music, movies, and TV shows.'
  raw: '##### Top Charts


    Whenever we want to see what''s popular on the iPad, we start up the App Store
    and immediately tap the Top Charts button at the bottom of the screen. A list
    of the Top Paid iPad Apps and a list of the Top Free iPad Apps are displayed (see
    [Figure 8–7](#Chapter08.html#fig_8_7)). Scrolling further down the screen, there''s
    a list of top-grossing iPad apps.


    ![images](images/0807.jpg)


    **Figure 8–7.** *The Top Charts screen in the App Store displays the top paid
    and free iPad apps.*


    Apple defines Top Paid and Top Free iPad Apps by the number of downloads of each
    app, while the lower list is calculated on the total revenue generated by apps.
    That means that if a high-priced app sells well in the App Store, it''s going
    to top the Top Grossing iPad Apps list.


    ##### Categories


    Sometimes you don''t want to browse through hundreds or thousands of iPad apps,
    and you''d much rather just see all apps that pertain to a specific category.
    The Categories button at the bottom of the App Store displays a set of buttons
    that lead to app listings by category (see [Figure 8–8](#Chapter08.html#fig_8_8)).


    This is a great way to find the top entries in a particular category of app. For
    example, let''s assume that you''re looking for an iPad app to help you balance
    your checkbook and home budget. The most likely category for an app of this type
    would be Finance.


    A quick tap on the Finance button displays a familiar-looking screen (see [Figure
    8–9](#Chapter08.html#fig_8_9)) with a list of new or recently updated iPad apps
    in the Finance category. These apps are sortable by three criteria—Name, Most
    Popular, and Release Date—by tapping on the Sort by button and selecting the appropriate
    sort type.


    ![images](images/0808.jpg)


    **Figure 8–8.** *Looking for a specific type of app? The category listing groups
    apps with similar functionality.*


    ![images](images/0809.jpg)


    **Figure 8–9.** *Viewing the most popular apps in the Finance category of the
    App Store*


    By using categories, you''ve reduced the number of apps to look through to a manageable
    number. It''s a great way to make the best use of your App Store shopping time.


    ##### Searching


    What if browsing through the App Store just isn''t leading you to the one product
    you''re looking for? If that''s the case, then it''s time to do a search.


    The search box is in the upper-right corner of the App Store screen. To search
    for a keyword, type it into the search box, and then press the Search button on
    the iPad''s virtual keyboard. You''ll notice that as you''re typing your keyword,
    the App Store app provides a list of suggestions (see [Figure 8–10](#Chapter08.html#fig_8_10)).


    Searching can be very useful when you know part of the name of an app but can''t
    remember the exact spelling. For instance, one of us was trying to find a note-taking
    app for the iPad recently. He knew that it was called either DeskPaper or PaperDesk
    but couldn''t remember for sure. Typing **paper** into the search box brought
    up a number of suggestions, and sure enough, PaperDesk for iPad was listed. He
    tapped the suggestion, which took him right to the description of the app.


    ![images](images/0810.jpg)


    **Figure 8–10.** *As you type a word into the App Store search box, suggested
    apps are listed.*


    #### Updates


    One great thing about buying all your iPad apps electronically is that whenever
    a new version of the software is published, the App Store automatically notifies
    you. The Updates button is the rightmost button at the bottom of the App Store
    screen and is probably one of the most important for keeping your apps up-to-date.


    If some of the apps on your iPad have been updated, you''ll be notified through
    the App Store icon. A small red notification circle appears on the icon displaying
    the number of apps that have updates waiting to be installed (see [Figure 8–11](#Chapter08.html#fig_8_11)).


    ![images](images/0811.jpg)


    **Figure 8–11.** *When you have an app update available for download and installation,
    a red notification circle will appear on the App Store icon on your iPad.*


    That same number appears on the Updates button in the App Store. To install the
    updates, open the App Store, and tap Updates. A listing of all the available updates
    occupies the screen, and there''s an Update All button in the upper-right corner
    of the screen (see [Figure 8–12](#Chapter08.html#fig_8_12)). Tap that button to
    begin the download and installation of the app updates.


    ![images](images/0812.jpg)


