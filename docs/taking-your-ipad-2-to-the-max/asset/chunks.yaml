- fmt: "# Navigating the Music Library and Playlists\n\nTap the `iPod` icon (see [Figure\
    \ 7–16](#Chapter07.html#fig_7_16)) on your iPad's Home screen to launch the app.\
    \ The `iPod` icon is bright orange and has a picture of a classic-looking iPod,\
    \ complete with outdated click wheel. It's a homage to the past, and should be\
    \ instantly recognizable to anyone who enjoyed music on an iPod in the early 2000s,\
    \ even if my younger children have never used, understood, or will likely encounter\
    \ a click wheel.\n\n![images](images/0716.jpg)\n\n**Figure 7–16.** The iPod icon.\n\
    \nThe first thing that you'll notice about the `iPod` app (see [Figure 7–17](#Chapter07.html#fig_7_17))\
    \ is that its layout, as mentioned earlier, is similar to that of `iTunes`. Not\
    \ only can you listen to music in the app, you can also easily create and edit\
    \ playlists like you would on your desktop. If you've played music on an iPhone\
    \ or iPod touch, you'll be struck by how much more open the layout of the iPad's\
    \ iPod app feels. There's so much more space on the iPad that you can see more\
    \ music at once. Instead of popping up and down long sequences of menu screens,\
    \ the iPad presents more options and more music in one place, making it much easier\
    \ to find and enjoy your tunes.\n\n![images](images/0717.jpg)\n\n**Figure 7–17.**\
    \ The iPod app on the iPad closely resembles iTunes on your computer.\n\nThe `iPod`\
    \ window is composed of five key elements:\n\n- **The play bar**: This runs along\
    \ the top of the app and contains the volume slider; the Play/Pause, Forward,\
    \ and Rewind buttons; and the search field.\n- **The Library source list**: In\
    \ the left column you'll see your music separated into different categories, depending\
    \ on the items you have synced to your iPad (see [Figure 7–17](#Chapter07.html#fig_7_17)).\
    \ Tap any category to see its contents.\n    - **Music**: Contains all the music\
    \ on your iPad\n    - **Podcasts**: Contains your audio and video podcasts\n \
    \   - **Audiobooks**: Contains your audiobooks\n    - **iTunes U**: Contains your\
    \ iTunes U lectures and classes\n    - **Genius Mixes**: Contains any genius mixes\
    \ you've chosen to sync from iTunes\n    - **Purchased**: Contains all the music\
    \ and music videos you've bought through the iTunes Store\n\nBelow these five\
    \ categories you may see a number of different playlists. Playlists come in three\
    \ types (see [Figure 7–18](#Chapter07.html#fig_7_18)):\n\n- **Regular playlist**:\
    \ An icon with four lines and a music note symbolizes this kind of playlist. A\
    \ regular playlist contains any music you've manually added to the list. It does\
    \ not update itself, and changes only when you add or remove a song.\n    - **Smart\
    \ playlist**: A cogwheel preceding the name symbolizes this kind of playlist.\
    \ A smart playlist is one in which you set a specific set of rules that songs\
    \ must match. Any songs that match the rules will show in the playlist.\n    -\
    \ **Genius playlist**: An icon that looks like an atom surrounded by electrons\
    \ symbolizes this kind of playlist. A Genius playlist is a playlist that `iTunes`\
    \ or the `iPod` app automatically generates based on a single song in your library.\
    \ The playlist will be populated with songs that go great with the song you've\
    \ selected to originate the playlist from.\n\n**NOTE:** See the “Creating Playlists”\
    \ section later in this chapter to find out how to create playlists on the iPad.\n\
    \n![images](images/0718.jpg)\n\n**Figure 7–18.** Types of playlists include (from\
    \ top to bottom) Genius, smart, and regular.\n\n- **The songs list**: This is\
    \ the main body of the `iPod` app. It shows all the songs in any selected category\
    \ or playlist. Navigate the list by scrolling up or down with your finger. If\
    \ your list is long, you'll see an alphabet control on the right side of the screen,\
    \ as shown in [Figure 7–17](#Chapter07.html#fig_7_17). Tap a letter, or slide\
    \ your finger down the alphabet to move to the section you want to view.\n- **The\
    \ create and sort bar**: This is the bar that runs along the bottom of the app\
    \ (see [Figure 7–19](#Chapter07.html#fig_7_19)). From this bar you'll be able\
    \ to create new playlists and Genius playlists, as well as sort music from the\
    \ songs list by song, artist, album, genre, or composer.\n\n![images](images/0719.jpg)\n\
    \n**Figure 7–19.** The create and sort bar\n\n- **Cover art**: A song's cover\
    \ art (the cover of the album the song is from) is displayed in the lower-left\
    \ corner of the `iPod` app's screen, right below the Library source list. Tap\
    \ the cover to enter the Now Playing window (shown in [Figure 7–20](#Chapter07.html#fig_7_20)\
    \ a bit later in the chapter).\n\n**NOTE:** Only playlists and the Music and Purchased\
    \ categories in the Library source list can be sorted by song, artist, album,\
    \ genre, or composer. Podcasts, audiobooks, iTunes U, and Genius mixes do not\
    \ feature sorting options.\n\n## Additional Song Controls\n\nWhen viewing music\
    \ in your library, you can take advantage of several buttons that allow you to\
    \ choose how to view your tracks. Use these buttons to help locate items you're\
    \ looking for. Located at the bottom center of [Figure 7–17](#Chapter07.html#fig_7_17),\
    \ your choices include:\n\n- **Songs**: Displays all the songs in your iPad music\
    \ library in an alphabetical list.\n- **Artists**: Displays an alphabetical listing\
    \ of all the artists in your library. Tap an artist to see all their albums and\
    \ the songs under each album. Tap any song to play it.\n- **Albums**: Displays\
    \ an alphabetical thumbnail list of all the albums in your library. Tap an album\
    \ cover, and it springs forward and flips around to reveal a miniaturized Album\
    \ view. Tap a song to begin playing it.\n- **Genres**: Displays an alphabetical\
    \ thumbnail list of all the genres of songs in your library. Tap a genre cover,\
    \ and it springs forward and flips around to reveal a miniaturized Album view.\
    \ The songs displayed can be from many different artists. Tap a song to begin\
    \ playing.\n- **Composer**: Displays an alphabetical listing of all the composers\
    \ in your library. Tap a composer's name to see all their albums and the songs\
    \ under each album. Tap any song to play it.\n\n## Playing Audio from the Music\
    \ Library and Playlists\n\nWhether you are in your main music library or a standard,\
    \ smart, or Genius playlist, to start playing a song, simply tap it. [Figure 7–20](#Chapter07.html#fig_7_20)\
    \ shows the `iPod` app's Now Playing screen. You arrive at this screen whenever\
    \ you start playing a song.\n\n![images](images/0720.jpg)\n\n**Figure 7–20.**\
    \ The iPod app's Now Playing screen provides an interactive screen that controls\
    \ playback for the currently playing item. From this screen, you can adjust the\
    \ volume, pause and resume playback, and loop the current track. If you have added\
    \ lyrics in iTunes, you'll find them displayed here as well.\n\nYou'll also notice\
    \ that a Play indicator has appeared in the iPad's status bar (see [Figure 7–21](#Chapter07.html#fig_7_21)).\
    \ The right-pointing Play indicator at the top-right of the screen (just left\
    \ of the battery status) appears universally when you're playing back music. This\
    \ tells you at a glance that music is playing. You'll find this especially helpful\
    \ when you've removed your earbuds and placed the iPad on a table. It alerts you\
    \ that your battery is gleefully emptying itself as your iPad plays music that\
    \ no one is hearing.\n\n![images](images/0721.jpg)\n\n**Figure 7–21.** The Play\
    \ indicator is next to the battery status in the iPad's status bar.\n\n### Now\
    \ Playing Screen\n\nThe Now Playing screen (see [Figure 7–20](#Chapter07.html#fig_7_20))\
    \ is divided into three sections. Here's a run-down of each of those sections\
    \ and what kinds of information and controls you'll find there."
