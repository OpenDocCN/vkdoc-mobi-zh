- fmt: '# Food Network In the Kitchen


    If you''re not sure about using your iPad in the kitchen, then Food Network In
    the Kitchen (see [Figure 16–15](#Chapter16.html#fig_16_15)) is the perfect app
    to install to try your device as a kitchen helper. The `$1.99` app calls upon
    recipes from various Food Network stars to provide thousands of recipes, all of
    which are rated by users. The list of featured recipes changes by season, and
    holiday specials are always useful for family get-togethers.


    ![images](images/1615.jpg)


    **Figure 16–15.** *The `$1.99` Food Network In the Kitchen app turns your iPad
    into an intelligent cookbook with recipes for every occasion.*


    The In the Kitchen app provides a way to change the font size, so if you want
    to set your iPad a bit farther away from your stove, you should still be able
    to read the screen from across the kitchen. There''s a built-in kitchen timer,
    a unit converter, and each recipe has a shopping list icon; tapping that icon
    pushes the ingredients to a shopping list. Once you''re ready to go to the store,
    it creates a combined shopping list that can be e-mailed to your iPhone, since
    you probably won''t want to carry your iPad around the grocery store. When you
    want to share recipes with friends, you can e-mail them or send links to Facebook
    or Twitter.


    # BigOven


    Another electronic cookbook to spice up your iPad is BigOven (see [Figure 16–16](#Chapter16.html#fig_16_16)).
    The app searches more than 170,000 recipes in the BigOven.com database by name,
    by keyword (such as `rutabaga`), and even by what leftovers you have around the
    house.


    ![images](images/1616.jpg)


    **Figure 16–16.** *BigOven is another wonderful resource for the iPad-toting chef.
    The ability to search for recipes that use up your leftovers is priceless.*


    The recipes display in both an overview format and a prepare format. The latter
    lists ingredients in one column and preparation instructions in the other.


    A BigOven Pro membership (`$15.99` per year) includes powerful syncing functions
    to make your grocery list and other information available on your iPad, on your
    iPhone, and on the Web.


    # My Recipe Book


    Sometimes recipes don''t come from an electronic source but are provided to you
    in the normal manner, such as scrawled on a note card by your Aunt Minnie in her
    indecipherable handwriting. Once you get a chance to sit down with her to translate
    the recipe, consider entering it into My Recipe Book (see [Figure 16–17](#Chapter16.html#fig_16_17)).


    ![images](images/1617.jpg)


    **Figure 16–17.** *Finally, My Recipe Book provides a place to organize all of
    those handwritten recipe cards you''ve been collecting over the years.*


    This `$2.99` app is just the thing for organizing recipes that would otherwise
    clutter up a recipe box or get stuffed into a kitchen drawer. My Recipe Book includes
    a way to search by preparation time and even includes a kitchen timer.


    # Serving Sizer Pro for iPad


    Have you ever become so good at making a particular recipe that you''re “volunteered”
    to cook it for thirty people instead of four? Serving Sizer Pro for iPad (see
    [Figure 16–18](#Chapter16.html#fig_16_18)) can help.


    ![images](images/1618.jpg)


    **Figure 16–18.** *Serving Sizer Pro for iPad is a great tool for upsizing or
    downscaling recipes for various size groups.*


    After entering a recipe into Serving Sizer Pro for iPad for a set number of servings,
    the `$4.99` app not only keeps your recipe but can scale it to any number of portions.


    # Wine.com for iPad


    There is an old French proverb that says “Un jour sans vin est comme un jour sans
    soleil,” which means a day without wine is like a day without sunshine. For people
    of many countries, wine is a welcome accompaniment to meals, and there''s nothing
    better than a really good bottle of wine with a special meal.


    The free Wine.com for iPad app provides names of good wines, ratings, a photo
    of the label on the bottle, recommendations on food pairing, a flavor profile,
    and the price. If you live in a state that allows delivery of wine by mail, there''s
    even a way to purchase your favorite vintages.


    # The iPad as a Presentation Tool


    Teachers, presenters, and people who need to get a point across to an audience
    have a compact and low-cost tool available in the iPad. Rather than needing a
    dedicated Windows computer or Mac to drive a projector, presenters can use an
    iPad with inexpensive software to produce professional, good-looking presentations
    or course materials.


    ## Keynote


    We talked about Keynote in [Chapter 14](#Chapter14.html#ch14), so we won''t belabor
    the point in this section. It''s just important to understand that Keynote for
    iPad can display both Keynote for Mac and PowerPoint presentations on a computer
    projector.


    Many presentations created on Macs or Windows computers work perfectly when transferred
    to the iPad. Be sure to test those presentations and any video-out savvy apps
    in advance before you have a live audience, and make sure that all transitions,
    builds, and fonts transfer to the iPad properly.


    ## Sadun''s Whiteboard


    There''s only one flaw with using an iPad as a teaching tool, or should we say
    there *was* one flaw? There was no way to just write on a slide and have it displayed
    through the video output cables.


    One of the authors of this book, Erica Sadun, wrote the aptly named Sadun''s Whiteboard
    (see [Figure 16–19](#Chapter16.html#fig_16_19)) app to resolve this issue. The
    `$2.99` app starts off displaying a plain white background on which you can use
    black, red, blue, and green markers to draw or write on a virtual whiteboard.
    Sadun''s Whiteboard supports video-out, so everything you put on the whiteboard
    is displayed on an attached computer projector.


    If that''s not enough functionality for you, Sadun''s Whiteboard also displays
    your Keynote slides, and you can “write” on them. It also has a built-in web browser,
    perfect for demonstrating sites or web apps, and once again, you can mark up the
    sites with your virtual markers.


    ![images](images/1619.jpg)


    **Figure 16–19.** *Sadun''s Whiteboard is an inexpensive electronic whiteboard
    that is perfect for teachers or presenters who need to display handwritten notes
    or marks on a virtual whiteboard, on a web page, or on a Keynote presentation.*


    ## The Education Category in the App Store


    If you''re a teacher or a parent who wants to give your child an advantage in
    school, take some time to search the large and growing list of education apps
    for iPad. Launch the App Store on your iPad, tap the Categories button at the
    bottom of the page, and then tap the Education button.


    What is displayed (see [Figure 16–20](#Chapter16.html#fig_16_20)) is every educational
    iPad app written for iPad. When we were writing this book, there were over 8500
    apps in the Education category in the App Store.


    ![images](images/1620.jpg)


    **Figure 16–20.** *The Education category in the App Store has something for everyone,
    from preschoolers to graduate students. Many apps are available for free.*


    Depending on the topic and type of app, you may be able to download many education
    apps for free.


    ## iTunes University


    Although it''s not iPad-specific, we would be remiss in discussing educational
    content for the iPad without discussing iTunes University (see [Figure 16–21](#Chapter16.html#fig_16_21)).
    Accessible from the iTunes U button at the bottom of the iTunes app (not the App
    Store) is a vast collection of free video courseware made available by prestigious
    organizations throughout the world.


    ![images](images/1621.jpg)


    **Figure 16–21.** *iTunes University provides a wealth of free courseware about
    almost any topic.*


    The videos range in topics from farming to astrodynamics and range from content
    for kindergartners to content for graduate students. iTunes University is the
    perfect destination for anyone who desires to further their knowledge.'
