  trans: '

    # 连接互联网


    尽管从理论上讲，你的 iPad 可以在不与外界建立真实连接的情况下离线使用，但它本质上就是为接入互联网而设计的工具。它内置了 Wi-Fi 或 Wi-Fi +
    3G 连接功能，并且大多数默认应用如果没有某种互联网连接都将毫无用处。


    没有互联网，你就不需要用`邮件`来收发信息，`Safari`网页浏览器也就没有了用武之地。你将无法查看地图，YouTube 只会变成一个在主屏幕上占用空间的平淡图标，你也不能从`App
    Store`购买应用、从`iBookstore`购买图书、或者从`iTunes`购买音乐、电影和视频。Facebook 和 Twitter？没有网络连接就别想了。


    幸运的是，苹果公司让你连接互联网变得很简单。在本章中，我们将告诉你如何通过 Wi-Fi 和 3G 建立互联网连接并解决相关问题，还会讨论一种替代内置 3G
    的方案。


    ## 连接 Wi-Fi


    Wi-Fi 是基于 IEEE 802.11 标准的无线网络的通用名称。尽管 Wi-Fi 起源于 20 世纪 90 年代初，但它真正腾飞是在过去的十年里，如今在酒店、图书馆、餐厅，甚至公交车和飞机等许多公共场所都能找到
    Wi-Fi 接入点。


    对许多人来说，Wi-Fi 接入点是家庭网络的福音，因为它意味着计算机和打印机无需安装电缆（既昂贵又不便）就能相互连接。在大多数情况下，Wi-Fi 路由器直接连接到家庭有线或
    DSL 互联网调制解调器，为范围内的任何计算机提供无线网络。


    你的 iPad 支持 802.11b/g/n 标准下的 Wi-Fi 连接。你无需了解这些标准各自的具体含义，只需知道最大原始数据速率（数据传输到 iPad
    的速度）会随着标准的演进而提高。iPad 和 Wi-Fi 路由器将基于双方共同支持的最高标准进行通信，因此，如果你的 Wi-Fi 路由器只支持 802.11b，那么两个设备之间的通信速率将限制在
    802.11b 的速度。同样，如果你拥有最新的 Apple AirPort Extreme Wi-Fi 路由器之一，你的 iPad 将使用快速的 802.11n
    标准实现与其通信。


    ### 认证与加密


    所有 Wi-Fi 网络的一个重要因素是使用加密。加密网络要求在首次加入网络时输入密码或口令。密码不仅用于验证你的 iPad 对网络的访问权限——本质上确保你被允许使用该网络——还用作加密
    iPad 与路由器之间传输的任何数据的密钥。


    认证和加密对于任何无线网络都至关重要。在你的家庭或办公网络上设置认证，可以确保未经授权的人无法在你允许的情况下使用你的无线网络。这一点很重要，因为向任何恰好处于该区域的人提供你的互联网连接访问权限，可能被视为违反许多互联网服务提供商的**服务条款**。此外，如果有人在你知情或不知情的情况下，通过连接到你的无线网络的计算机实施了犯罪，你可能需要承担责任。


    同样，加密使得黑客难以拦截和解码你的 iPad 与其他任何计算机之间的交易。当你进行货币交易时，这一点极为重要。目前，大多数家庭、办公和公共 Wi-Fi 网络上存在三种主要的加密类型：`WEP`、`WPA`
    和 `WPA2`。`WPA2` 是 `WPA` 加密标准的后续版本，被认为（与强口令一起使用时）极其安全。


    为什么我们在一本关于 iPad 的书中讨论认证和加密呢？嗯，如果你不熟悉 Wi-Fi 网络，当你尝试将 iPad 连接到网络时，这个话题肯定会碰到。


    ### 设置 Wi-Fi


    你的 iPad 不会在打开电源后自动连接到互联网。为什么？苹果公司希望你先设置与 `iTunes` 的同步，而这总是通过 USB 连接到另一台计算机来完成的。完成设置后，你就可以自由地连接互联网了，对大多数人来说，初次连接是通过
    Wi-Fi 完成的。


    你需要知道你的网络密码或口令，以及你想连接的网络的名称。如果你住在一栋有许多无线网络覆盖的公寓楼里，知道网络名称可能非常重要。屏幕上会弹出一个窗口，要求你输入网络密码，一旦你正确输入，你就连接到了该网络。


    在图 5-1 中， iPad 范围内有两个网络。锁形图标表示你需要输入密码或口令才能连接到该网络，而 AirPort 图标（锁形图标右侧的扇形图标）表示该网络的相对信号强度。


    ![images](img/0501.jpg)


    **图 5-1.** *在仅有 Wi-Fi 功能的 iPad 上的“设置”应用中，顶部的开关允许你打开或关闭 Wi-Fi 设置。*


    要输入密码并加入网络，请点击网络名称，随后会出现一个密码屏幕。输入你的密码或口令，然后点击 iPad 虚拟键盘上的`加入`按钮。如果你输入的密码正确，网络名称会变为蓝色并出现一个对勾标记，表示它是选中的网络。如果你没有输入正确的密码，你将看到类似于图
    5-2 中的错误信息。点击`忽略`按钮，然后重试。


    ![images](img/0502.jpg)


    **图 5-2.** *看起来有人在这里输错了密码。点击“忽略”重试。*


    如果你的 iPad Wi-Fi 未启用，你可以通过进入`设置` ![images](img/U001.jpg) `Wi-Fi`，并将标记为`关闭`的按钮滑动到显示为`打开`的位置来开启它。


    你的 iPad 会记住你加入过的网络，这样你每次移动到新的无线网络时就不必重新输入网络信息。如果附近没有已知的网络，你要么需要手动选择新网络，要么会被询问是否要加入一个新网络。有什么区别？这完全取决于`询问是否加入网络`按钮（见图
    5-1）是否设置为`打开`。如果未设置，你必须手动选择网络；如果设置了，你的 iPad 会询问你是否要加入新网络。


    当你连接到 Wi-Fi 网络时，状态栏中的 Wi-Fi 图标会显示你的连接强度。条数越多（最多五条）表示连接越强。


    ### 解决 Wi-Fi 连接问题


    新 iPad 用户可能会遇到一些常见问题。以下简要讨论一些你可能遇到的典型问题。

    '
- fmt: '### 没有显示网络名称


    在这种情况下，网络可能是封闭或私有的，这意味着服务集标识符（SSID），即通常在“选择网络”列表中看到的网络名称，已被设置为隐藏。要连接到该网络，你需要点击“其他”按钮（如前文[图5-1](#Chapter05.html#fig_5_1)所示），这会显示[图5-3](#Chapter05.html#fig_5_3)中的屏幕。


    ![images](images/0503.jpg)


    **图5-3.** *在企业环境中使用 iPad 时，输入关于隐藏网络的信息非常有用。*


    请向你的网络管理员询问网络名称，并将其输入到“名称”字段中。同时，建议向他们询问网络设置了哪种安全类型，因为你需要通过点击“安全”按钮，然后在“安全”屏幕（如[图5-4](#Chapter05.html#fig_5_4)所示）上点击对应的按钮来进行选择。


    ![images](images/0504.jpg)


    **图5-4.** *iPad 使用设置来定义加密的类型和级别，以防止你的数据被窥探。*


    这些缩写词代表什么？有线等效保密（`WEP`）是一种老旧的无线网络安全方法。那么，为什么崭新的 iPad 上还提供 `WEP`？它主要是为了那些尚未将 Wi-Fi
    接入点升级到更新、更安全技术的用户而存在的。


    `WPA` 代表 Wi-Fi 保护接入，这是另一种老旧的安防技术。`WPA Enterprise` 是一种标准加密算法，并增加了使其在企业使用中更“防弹”的特性。


    如果可能，你应该使用 `WPA2` 或 `WPA2 Enterprise` 安全协议，以确保你的数据在传输过程中得到保护。`WPA2` 是目前最安全的现有
    Wi-Fi 安全方法。建议使用真正随机的 13 个或更多字符的密码短语以获得更好的安全性，尽管使用更长但更容易记住的密码短语可能更实用。


    “容易记住”是什么意思？指的是你*自己*能轻松记住，但别人却很难猜到的内容。例如，密码短语“`ilovemydogfredandhesmyfavoritepet`”或者甚至“`ilmdfahmfp`”（即同一短语中每个单词的首字母）比“`X1F39%@233.abc$@#@`”要容易记住得多。


    一旦你输入了网络名称和安全类型，系统会要求你输入密码或密码短语，然后你就可以继续连接到网络了。


    ### “输入密码”屏幕中的“加入”按钮呈灰色


    这意味着你输入的密码对于该网络启用的安全类型来说太短了。请确保你拥有正确的密码，然后重试。


    ### 你刚刚设置了 Wi-Fi 路由器，但不知道密码


    某些 Wi-Fi 路由器有默认密码。你可以联系制造商网站查找默认密码，或者将密码更改为你能记住的内容。为了维护网络安全，建议采用后一种解决方案。


    ### 信号强度只有一格，或者看不到你的 Wi-Fi 网络


    Wi-Fi 接入点和路由器的覆盖范围有限，尤其是当附近有混凝土墙、布有大量电线或管道的墙壁，或者在使用微波炉时。要么靠近 Wi-Fi 接入点，要么尽量避免干扰源。


    ### 你在公共场所，一个网页要求你登录网络


    这在公共 Wi-Fi 网络中很常见，包括美国星巴克门店的 AT&T 无线热点。如果你所在的位置需要付费使用 Wi-Fi，可能会出现一个登录屏幕，你需要在其中输入订阅信息或购买访问时长。如果该屏幕没有出现，请打开
    iPad 上的 Safari 浏览器，该屏幕应该会显示。


    ### 你的 Wi-Fi 连接显示满格信号，但无法连接到互联网


    请确保你连接的是正确的 Wi-Fi 网络，而不是附近的其他网络。如果你正尝试连接到正确的 Wi-Fi 网络，那么从你的 Wi-Fi 接入点或路由器到电缆或
    DSL 调制解调器的连接可能已中断。如果该连接看起来正常，那么问题可能出在你的互联网服务提供商身上。你可以通过检查你所在位置的其他电脑是否能成功上网来测试这一点。


    ### 所有 Wi-Fi 网络都具有相同的名称


    这比你想象的要更常见。许多人购买了 Wi-Fi 接入点或路由器后，从未更改过出厂设置中的名称。在人口密集区域，看到许多名为“Linksys”的网络并不罕见。如果你遇到这种情况，请联系路由器制造商，获取有关如何为你的
    Wi-Fi 网络设置唯一名称的信息。


    ### 以上解决方案均无效


    也许是时候重置 iPad 上的网络设置了。要重置网络设置，请依次轻点“设置”![images](images/U001.jpg)“通用”![images](images/U001.jpg)“还原”![images](images/U001.jpg)“还原网络设置”。此时会弹出一个对话框，警告你将删除所有网络设置，并将其恢复为出厂设置。轻点“还原”。这将重启你的
    iPad，当它重新启动后，所有已保存的网络、Wi-Fi 密码以及其他设置都将消失。请尝试再次查找并加入网络。


    如果你仍然无法连接到你的网络，请尝试查看你的 iPad 是否能连接到公共可用网络。例如，如果你附近有 Apple Store 零售店，可以尝试连接到他们的网络。如果这样也不行，你至少可以去
    Apple 天才吧咨询一下。'
  raw: '##### No Network Name Displayed


    In this case, the network may be closed or private, meaning that the service set
    identifier (SSID), which is the network name you normally see listed in the Choose
    a Network list, has been set as hidden. To connect to the network, you''ll need
    to tap the Other button, shown earlier in [Figure 5–1](#Chapter05.html#fig_5_1),
    which displays the screen in [Figure 5–3](#Chapter05.html#fig_5_3).


    ![images](images/0503.jpg)


    **Figure 5–3.** *Entering information about hidden networks is useful when using
    iPads in corporate environments.*


    Ask your network administrator the name of the network, and enter that in the
    Name field. It''s also a good idea to ask them what type of security has been
    set up on the network, since you''ll need to choose that by tapping the Security
    button and then tapping the corresponding button on the Security screen, shown
    in [Figure 5–4](#Chapter05.html#fig_5_4).


    ![images](images/0504.jpg)


    **Figure 5–4.** *The iPad uses settings to define the type and level of encryption
    used to keep your data from prying eyes.*


    What do these acronyms stand for? Wired Equivalent Privacy (WEP) is an aging method
    of securing wireless networks. Then why is WEP available on the nice, new iPad?
    It exists primarily for the benefit of people who haven''t upgraded their Wi-Fi
    access points to newer, more secure technology.


    WPA stands for Wi-Fi Protected Access, another aging security technology. WPA
    Enterprise was a standard encryption algorithm with additions that made it more
    “bulletproof” for corporate use.


    If at all possible, you should use WPA2 or WPA2 Enterprise security to ensure
    that your data is protected in transit. WPA2 is the most secure existing Wi-Fi
    security method at this time. It''s recommended that you use a truly random passphrase
    of 13 or more characters for even better security, although it may be more useful
    to just use a longer—but more memorable—passphrase.


    What does memorable mean? Something that *you* can easily remember but would be
    very difficult for someone else to guess. For example, a passphrase of “ilovemydogfredandhesmyfavoritepet”
    or even "ilmdfahmfp" (i.e., the first letters of the words of that same phrase)
    is much easier to remember than “X1F39%@233.abc$@#@.”


    Once you''ve entered the network name and security type, you''ll be asked for
    the password or passphrase and can continue to connect to the network.


    ##### The Join Button in the Enter Password Screen Is Grayed Out


    This means that the password you''re entering is too short for the type of security
    enabled on the network. Make sure you have the right password, and then try again.


    ##### You''ve Just Set Up the Wi-Fi Router and Don''t Know the Password


    Some Wi-Fi routers have default passwords. Either contact the manufacturer''s
    website to find out what the default password is or change the password to something
    you can remember. The latter solution is recommended in order to maintain security
    on your network.


    ##### There''s Only a Single Bar of Signal Strength, or You Can''t See Your Wi-Fi
    Network


    Wi-Fi access points and routers have a limited range, particularly when there
    are concrete walls, walls with a lot of wiring or piping in them, or microwave
    ovens in use nearby. Either move closer to the Wi-Fi access point or try to avoid
    the sources of interference.


    ##### You''re at a Public Spot and a Web Page Is Asking You to Sign On to the
    Network


    This is quite normal with public Wi-Fi networks, including the AT&T wireless hotspots
    in U.S. Starbucks locations. If you''re in a location that requires you to pay
    for Wi-Fi, a login screen may appear into which you''ll have to enter subscription
    information or purchase access time. If it does not appear, open the Safari web
    browser on your iPad, and the screen should appear.


    ##### Your Wi-Fi Connection Is Showing Five Bars, but You''re Not Connecting to
    the Internet


    Make sure that you are connecting to the correct Wi-Fi network and not another
    one nearby. If you are trying to connect to the proper Wi-Fi network, then the
    connection from your Wi-Fi access point or router to your cable or DSL modem may
    be down. If that connection looks fine, then your Internet service provider may
    be having issues. You can test this by checking other computers at your location
    to see whether they''re able to use the Internet.


    ##### All the Wi-Fi Networks Have the Same Name


    This is more common than you''d imagine. Many people purchase Wi-Fi access points
    or routers and never change the name from the factory-set one. In heavily populated
    areas, it''s not uncommon to see a number of networks named “Linksys.” If you''re
    in this situation, contact the router manufacturer for information on uniquely
    naming your Wi-Fi network.


    ##### None of These Solutions Have Worked


    It may be time to reset the network settings on your iPad. To reset network settings,
    tap Settings ![images](images/U001.jpg) General ![images](images/U001.jpg) Reset
    ![images](images/U001.jpg) Reset Network Settings. A dialog box appears, warning
    you that you''re about to delete all network settings, returning them to factory
    settings. Tap Reset. This will restart your iPad, and when it comes back up, all
    saved networks, Wi-Fi passwords, and other settings will be gone. Try to locate
    and join the network again.


    If you can''t connect to your network, then try to see whether your iPad can connect
    to a publicly available network. For instance, if you have an Apple Store close
    by, try connecting to their network. At least if that doesn''t work, you can always
    confer with the Apple Genius Bar at the store.'
