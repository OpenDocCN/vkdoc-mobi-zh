- fmt: '# Signature


    Have you gotten e-mail from someone with an iPad, iPhone, or other iOS device?
    You’ll usually know it right away due to the “Sent from my iPad” signature that
    appears at the end of each message. On your iPad, you can easily tailor that default
    message for your outgoing mail, changing it to whatever text you like.


    Many people like to add a quick note to their signature that explains the brevity
    of their messages (“so please excuse the terseness of my reply”), and possibly
    excuse any typographic mistakes (our technical editor Dave Caolo signs his messages,
    “Please excuse typos. I have big fingers. Not comically large, mind you, just
    average for a 6'' guy”).


    Some iPad users who use POP e-mail and forwarding accounts have their signature
    reflect that situation as well (“Sent from my iPad’s e-mail forwarding account.
    Please do not respond to this address. Use my normal work e-mail instead, thanks!”).
    Still others use their signature for general contact information, to allow lawyers
    to earn their pay (“This e-mail, including attachments, is intended for the person(s)
    or company named and may contain confidential and/or legally privileged information”),
    or to simply gloat about their iPad (“Sent from my iPad. I have the best toys.
    I win!”).


    To customize your e-mail signature, tap the `Signature` button. Unlike most Mac
    or Windows e-mail programs, `Mail` on iPad doesn’t offer a separate signature
    for each mail account. Instead, you create a generic signature that is used by
    every account. Edit the default “Sent from my iPad” text as desired. You can change
    it to add your name, website address, or anything else you want. Keep in mind
    that if you include a name in your signature, it appears across all accounts.
    That’s not a problem when all accounts belong to the same user. When both Jon
    and Suzie share the same iPad, a signature saying “Best, Jonny” will appear at
    the bottom of Suzie’s e-mails as well. For that reason, you may want to avoid
    names in shared signatures.


    # Default Account


    The `Default Account` setting allows you to pick the account you want to send
    outgoing messages from. When you compose messages using other applications on
    your iPad, they’ll always be sent from the default account. Tap the `Default Account`
    button to view a list of the accounts on your iPad, and then select the account
    you wish to use.


    # Viewing and Managing Your Incoming Mail


    After you set up `Mail` on your iPad, you’ll start to receive e-mail messages
    automatically, assuming you haven’t set everything to “manual.” Your first indicator
    of a new e-mail message is the New Mail sound. Although it’s nice to have an audible
    indication that you’re getting mail, it can get a little obnoxious if you receive
    a lot of mail every day or if you’re in a meeting and receive a message. To switch
    off the New Mail sound, visit `Settings` ![images](images/U001.jpg) `General`
    ![images](images/U001.jpg) `Sounds`; then slide the switch to `OFF`.


    Your iPad also provides a slick little indicator to notify you that you have unread
    e-mail messages in your inbox or inboxes. The `Mail` app icon displays a small
    red oval containing the number of unread items in your inboxes (see [Figure 11-8](#Chapter11.html#fig_11_8)).
    This number encompasses all inboxes, so if you have 10 messages waiting in one
    account and 5 in another, the red oval shows that you have 15 unread messages.


    ![images](images/1108.jpg)


    **Figure 11-8.** *You’ve got mail! It looks like it is time to tap that Mail icon
    and take a look at those 57 unread messages in your various mailboxes.*


    ## Launching and Viewing the Mail App


    You launch the `Mail` application by tapping its icon. Once launched, what you
    see depends on whether you’ve launched the device in portrait orientation or landscape
    orientation. That’s because `Mail` uses an iPad feature called *split views*.
    If you hold your iPad with the wider dimension from side to side (landscape mode),
    there’s enough room onscreen to see both a list of mailboxes and accounts on the
    left and messages on the right.


    Flip the iPad to its side, with the long side going up and down (portrait mode),
    and that list of mailboxes and accounts pops into an `Inbox` button. You can only
    view that list by tapping the `Inbox` button at the top left of your screen. The
    small window that opens is called a “pop-over” screen element, in that it pops
    over the window from the button that you tap.


    [Figure 11-9](#Chapter11.html#fig_11_9) shows the iPad screen in both orientations.
    As a rule, `Mail` is *much* easier to use when you hold the iPad in landscape
    mode. You don’t have to keep opening the pop-over list from the top-left button.
    Instead, you see everything onscreen at once.


    ![images](images/1109.jpg)


    **Figure 11-9.** *The Mailboxes list contains all the e-mail inboxes and accounts
    currently set up on your iPad, as well as the number of unread e-mails for each.
    When you hold your iPad in portrait orientation (left), you can only view that
    list by tapping the Inbox button at the top left of the screen. In landscape mode
    (right), that list is integrated into the screen, displayed to the left of any
    selected content.*


    To view the messages in any one of the inboxes or accounts, tap the item in the
    `Mailboxes` list. If you have set that particular e-mail account for manual fetching
    of messages, the iPad will check the server for new messages at this point. There’s
    also a small refresh icon in the bottom-left corner of the list of mailboxes and
    accounts. Tapping this icon forces `Mail` to check the server immediately and
    retrieve any new messages that have arrived. This allows you to bypass any normal
    fetch intervals and check for mail whenever you desire.


    **WARNING:** With IMAP accounts, sent mail can be saved on the server. With POP3
    accounts, however, this may not be the case. If you find that sent messages are
    not being saved and you want to keep an archive of outgoing mail, use the blind
    carbon copy feature to send yourself a copy.


    Notice the `All Inboxes` item that appears at the top of your `Inboxes` list.
    `All Inboxes` joins together all items from all accounts, allowing you to read
    new messages in a single location. It’s new to iOS and is one of the many great
    improvements recently added to `Mail`.


    The `Inboxes` list is different from the `Accounts` list in that the former contains
    *only* the inbox for each account—that is, the folder of messages that your account
    has received. Most mail accounts allow you to create other folders, for filing
    and organizing your messages, allowing you to declutter your inbox without deleting
    archival mail. Each entry in the `Accounts` list takes you not just to the account’s
    inbox, but to a complete set of folders for that account, which usually consists
    of other items, as shown in [Figure 11-10](#Chapter11.html#fig_11_10). These might
    include a `Trash` folder for deleted items, a `Sent Mail` folder for outgoing
    mail, a `To-do` folder for action items, and so forth. Default folders for a Gmail
    account include `Personal`, `Receipts`, `Travel`, and `Work`.


    ![images](images/1110.jpg)


    **Figure 11-10.** *The inbox for this example Gmail account contains an unread
    message, with the remaining e-mail being selected and viewed.*


    Although the `Inboxes` screen provides quick and ready access to all new messages,
    using the `Account` presentation is particularly handy when you need to organize
    your mail by moving messages to other folders. It allows you to view all your
    folders in one place, which simplifies the selection of a destination folder for
    a message. You’ll read more about editing mailboxes later in this chapter.'
