    \ playback time. The number at the right shows the remaining playback time.\n\
    \    *   Drag the playhead to set the point at which your song plays back. You\
    \ can do so while the song is playing, so you can hear which point you've reached.\n\
    *   *Shuffle*: The shuffle control looks like two arrows making a wavy *X*. It\
    \ appears to the right of the scrubber bar and, like the loop and scrubber controls,\
    \ appears only after you tap the album cover.\n    *   When the shuffle control\
    \ is off (white), album and playlist songs play back in order.\n    *   When the\
    \ shuffle control is selected (blue), the iPod app randomly orders songs for shuffled\
    \ playback.\n\n**NOTE:** If you are using Apple's iPhone earphones with a remote\
    \ and mic to listen to music on your iPad, all the buttons and click features\
    \ of the iPhone's earbuds work just fine (despite Apple not listing the earbuds\
    \ as an official iPad accessory). Click to play/pause a song. Double-click to\
    \ skip to the next song. Triple-click to return to the previous song. Tap the\
    \ + or – button on the earphone control to increase or decrease the volume. The\
    \ microphone on the iPhone earbuds also works fine with the iPad. The Apple Earphones\
    \ with Remote and Mic cost $29 at the Apple Store.\n\n###### Album Cover\n\nBelow\
    \ the scrubber bar, you'll notice the song's album art taking up a majority of\
    \ the display (see [Figure 7–20](#Chapter07.html#fig_7_20)).\n\n*   *Album art*:\
    \ When you've downloaded album art, the cover image appears just below the top\
    \ bar and occupies most of your screen. (When the iPad cannot find album art,\
    \ it instead displays the same light gray music note on a white background).\n\
    *   *Song count*: This is a little pill-shaped button that shows you the number\
    \ of the song in the playlist and how many songs are in it in total.\n*   *Lyrics*:\
    \ If the song has lyrics embedded in the music file, the lyrics will be displayed\
    \ over the album art. You can make the lyrics and the rest of the control interface\
    \ go away by tapping them once. Tap the album art again to bring them back.\n\n\
    ###### Bottom Bar\n\nAt the bottom of the Now Playing screen you'll see a thick\
    \ black bar (see [Figure 7–23](#Chapter07.html#fig_7_23)) containing the following:\n\
    \n*   *Back button*: Tap the Back button (the arrow pointing left) at the left\
    \ end of the bar to return to the most recent album or playlist screen. Tapping\
    \ the Back button does not stop playback. Your song continues to play as you browse\
    \ through your categories or tap the Home button to do other things on your iPad.\n\
    *   *Genius button*: This center button looks like an atom with electrons swirling\
    \ around it. Tapping this will create a Genius playlist based on the song that\
    \ is currently playing. When you navigate back to the music library, you'll see\
    \ a playlist labeled “Genius” along with several other options. We'll discuss\
    \ those options in just a bit.\n*   *Album View button*: This button looks like\
    \ a three-item bulleted list and appears at the right of the bar. Tap this to\
    \ switch between your Now Playing screen and its Album view.\n\n![images](images/0723.jpg)\n\
    \n**Figure 7–23.** *The bar at the bottom of the Now Playing screen allows you\
    \ to create a Genius playlist and enter Album view.*"
  trans: "\n# 标题栏\n\n标题栏（见图 7–22）是“播放中”屏幕顶部的黑色横条，包含以下项目：\n\n![images](img/0722.jpg)\n\
    \n**图 7–22.** *“播放中”屏幕上的标题栏*\n\n-   *音量滑块*：沿滑块拖拽以调节音量。你也可以使用 iPad 的物理音量按钮调节音量。如果已连接外部扬声器或遥控器，亦可使用其开关来控制播放音量。\n\
    -   *AirPlay 按钮*：当家庭网络中有支持音乐的 AirPlay 接收器可用时，音量滑块右侧会出现一个 AirPlay 按钮。轻点该按钮并选择一个接收器，即可将音乐重定向到该设备。由于苹果高度加密的\
    \ AirTunes 协议，音乐和音频的 AirPlay 功能在 2011 年春季之前仅限于苹果品牌的接收设备，之后该协议才最终被逆向工程，从而允许第三方应用程序访问。\n\
    -   *艺人、歌曲和专辑*：这些项目显示在屏幕顶部中央，仅供信息参考。轻点它们不会有任何操作。\n-   *快退*：快退按钮看起来像一条竖线后面跟着两个指向左侧的三角形。\n\
    \    -   轻点一次可跳回当前播放歌曲的开头。\n    -   轻点两次可跳转到专辑或播放列表中的上一首歌曲。如果当前已在歌曲开头，轻点一次则回到上一首；若已在第一首，该操作效果如同按下“返回”按钮——你会回到最近的专辑或播放列表屏幕。\n\
    \    -   长按可快退当前歌曲。向后快退时，你会听到极短的片段。此功能在收听有声读物时尤其方便。\n-   *播放/暂停*：“播放”图标看起来像一个指向右侧的三角形。“暂停”图标看起来像两条竖线。轻点此按钮可在播放和暂停模式之间切换。\n\
    -   *快进*：快进按钮看起来像是快退按钮的镜像。竖线在右侧，两个三角形都指向右侧而非左侧。\n    -   轻点一次可跳转到专辑或播放列表中的下一首歌曲。如果当前已是最后一首，轻点快进会回到专辑或播放列表开头。\n\
    \    -   长按可快进当前歌曲。\n\n在标题栏下方，您会看到一个细条，其中包含循环按钮、进度条和随机播放按钮（见图 7–22）。\n\n-   *循环控制*：此控件看起来像是一对箭头在圆环中彼此指向，轻点专辑封面时会出现。\n\
    \    -   *轻点一次可循环播放当前专辑或播放列表。最后一首歌曲播放完毕后，第一首歌曲会重新开始播放。*\n    -   *轻点第二次可仅循环当前歌曲。循环图标上会出现数字\
    \ 1，表示循环仅适用于此歌曲。*\n    -   *再轻点一次可禁用循环。*\n    -   *蓝色循环图标（无论是普通循环还是带数字 1 的循环）表示循环功能已启用。白色循环图标表示循环已关闭。*\n\
    -   *进度条*：进度条位于循环控制右侧。轻点专辑封面可使此控件显示；再次轻点则可隐藏。\n    -   进度条左侧的数字显示已播放时间。右侧的数字显示剩余播放时间。\n\
    \    -   拖拽播放头可设置歌曲的播放起点。你可以在歌曲播放时进行此操作，以便听到你已到达哪个位置。\n-   *随机播放*：随机播放控件看起来像两条箭头形成一个波浪形的\
    \ *X*。它位于进度条的右侧，与循环和进度条控件一样，只有在轻点专辑封面后才会出现。\n    -   当随机播放控件关闭（白色）时，专辑和播放列表中的歌曲按顺序播放。\n\
    \    -   当随机播放控件被选中（蓝色）时，iPod 应用会随机排列歌曲顺序进行乱序播放。\n\n**注意：** 如果你在 iPad 上使用带有线控和麦克风的苹果\
    \ iPhone 耳机听音乐，iPhone 耳塞的所有按钮和点击功能均能正常使用（尽管苹果未将耳塞列为 iPad 官方配件）。单击可播放/暂停歌曲。双击可跳到下一首歌曲。三击可返回上一首歌曲。轻点耳塞上的\
    \ `+` 或 `–` 按钮可增大或减小音量。iPhone 耳塞上的麦克风与 iPad 配合使用也毫无问题。带有线控和麦克风的苹果耳塞在苹果官网的售价为 `$29`。\n\
    \n# 专辑封面\n\n在进度条下方，你会注意到歌曲的专辑封面占据了显示屏幕的大部分区域（见图 7–20）。\n\n-   *专辑封面*：当你下载了专辑封面后，封面图像会显示在顶部横条下方，并占据大部分屏幕。（当\
    \ iPad 找不到专辑封面时，它会在白色背景上显示一个浅灰色的音符图标）。\n-   *歌曲计数*：这是一个药丸形状的小按钮，显示当前歌曲在播放列表中的序号以及列表中的歌曲总数。\n\
    -   *歌词*：如果歌曲文件中嵌入了歌词，歌词将显示在专辑封面上。轻点一次可使歌词和其余控制界面消失。再次轻点专辑封面可将其重新显示。\n\n# 底部横条\n\
    \n在“播放中”屏幕的底部，你会看到一个黑色粗横条（见图 7–23），其中包含以下内容：\n\n-   *返回按钮*：轻点横条左端的返回按钮（指向左侧的箭头）可返回到最近的专辑或播放列表屏幕。轻点返回按钮不会停止播放。当你浏览各类别或轻点主屏幕按钮在\
    \ iPad 上进行其他操作时，歌曲会继续播放。\n-   *Genius 按钮*：这个居中的按钮看起来像一个带有环绕电子的原子。轻点它，会基于当前正在播放的歌曲创建一个\
    \ Genius 播放列表。当你导航回音乐资料库时，你会看到一个标记为“Genius”的播放列表以及其他几个选项。稍后我们会讨论这些选项。\n-   *专辑视图按钮*：此按钮看起来像一个带有三个项目的列表符号列表，位于横条的右端。轻点此按钮可在“播放中”屏幕与其专辑视图之间切换。\n\
    \n![images](img/0723.jpg)\n\n**图 7–23.** *“播放中”屏幕底部的横条允许你创建 Genius 播放列表并进入专辑视图。*\n"
- fmt: '### Album View


    `Album View` is a powerful and fun way to navigate your music. You can access
    `Album View` in two ways, both from the `Now Playing` window. As a matter of fact,
    `Album View` is part of the `Now Playing` window. When you access it, you''ll
    see that the bars at the top and bottom of the `Now Playing` window stay the same
    (see [Figure 7–24](#Chapter07.html#fig_7_24)).


    - Double-tap the album art area to reveal `Album View`. The cover art will flip
    around, and you''ll be presented with the full list of songs from that album.

    - Tap the `Album View` button in the thick bottom bar of the `Now Playing` window.
    The cover art of the current song will flip around, and you''ll be presented with
    the full list of songs from that album.


    To leave `Album View`, tap the small thumbnail of the album art in the bottom-right
    corner of the screen (where the `Album View` button used to be). The list of the
    albums songs will flip back around and display the cover art again. Alternatively,
    tap the `Back` button at the bottom left of the screen, and you''ll be taken back
    to the main iPod app screen. Your music will keep playing.


    Why use `Album View`? Pretend you are listening to a playlist and a song comes
    on you haven''t heard in a while. It''s a great song, and you want to check out
    what other songs are on the album. `Album View` lets you do this without leaving
    the playlist. Simply access it by using either of the methods mentioned earlier,
    and you''ll be presented with a screen that shows a track list of all the songs
    from that album along with their names and durations. Scroll up and down the track
    list to see all the items on the current playlist or album. Tap any item to start
    playback.


    ![images](images/0724.jpg)


    **Figure 7–24.** *`Album View` shows a list of tracks and durations for the current
    album or playlist.*


    `Album View` also allows you to rate your songs. Use the star control that appears
    below the scrubber bar to rate the current song, from zero to five stars. Drag
    your finger along the stars to set your rating. These ratings sync back to your
    computer. Rating your music is a good thing to do because it lets you keep track
    of songs you really like. You can create smart playlists to contain all of your
    five-star songs, enabling you to access them all in one place instantly.


    Also, if you use the `iTunes DJ` feature in the desktop version of `iTunes`, higher-rated
    songs will be played more often. `iTunes DJ` is an `iTunes` feature that picks
    songs from your library and creates an endless playback of music. It''s great
    when you are having a party. `iTunes DJ` is not a feature of the iPod app on the
    iPad.


    **TIP:** When there''s empty space on the track list in `Album View`—for example,
    when you have only one or two tracks—double-tap the empty areas to return to the
    `Now Playing` screen. Alternatively, double-tap either side of the rating stars
    display.


    ### Creating Playlists


    The different kinds of playlists were introduced earlier in this chapter. Playlists
    you''ve chosen to sync from `iTunes` will automatically appear in your iPod app.
    But you aren''t limited to creating playlists on your computer. You can create
    playlists and `Genius` playlists right from your iPad, allowing you to build audio-listening
    experiences on-the-go.


    #### Creating a Playlist


    To create a standard playlist, tap the `+` button at the lower-left of the iPod
    app screen (see [Figure 7–17](#Chapter07.html#fig_7_17)). A pop-up appears, asking
    you to name the playlist. Enter a name, and tap `Save`. Immediately after, a list
    of all the songs on your iPad slides up the screen. Select the songs you want
    to include in your playlist by tapping the blue `+` button next to each track.
    When you select a song, it will appear grayed out. You''ll also find an `Add All
    Songs` option at the top of your list of songs. Adding all the songs in your library
    defeats the purpose of a playlist, however.


    If you select a song by accident, you cannot unselect it at this point, but you
    can easily remove it later. You may add a song more than once to your playlist.
    You can delete those copies after you''re done by editing the playlist (as discussed
    in the next section).


    While adding songs to a playlist, you have several options to navigate your library
    to find the songs you want. At the bottom of the `Add to Playlist` screen, you''ll
    see the five category views of the iPod app: `Songs`, `Artists`, `Albums`, `Genres`,
    and `Composers`. Select any of these to sort through your song library, and then
    click the appropriate song to add it to the playlist.


    You also can navigate through your iPod app''s `Library` source list to find items
    to add to your playlist. To do this, tap the `Sources` button in the upper-left
    corner of the screen, and you''ll be presented with a drop-down list of the sources
    and existing playlists in your library (see [Figure 7–25](#Chapter07.html#fig_7_25)).
    You can combine audiobooks, songs, and podcasts in the same playlist. Tap the
    blue `Done` button when you are finished adding songs.


    ![images](images/0725.jpg)


    **Figure 7–25.** *Adding songs to a playlist. You can search through your entire
    library for songs or choose a source or playlist from your library.*


    #### Editing a Playlist


    When you are finished adding songs to your new playlist and tap the blue `Done`
    button in the upper-right corner, you are taken to the playlist edit screen (see
    [Figure 7–26](#Chapter07.html#fig_7_26)). This screen allows you to add, delete,
    rearrange, and shuffle songs as well as to delete the playlist entirely.


    ![images](images/0726.jpg)


    **Figure 7–26.** *The playlist edit screen allows you to further customize your
    playlists after their creation.*


    You can access the playlist edit screen from any existing playlist by tapping
    the gray `Edit` button at its top-right corner. This playlist edit screen allows
    you to do the following:


    - *Add songs*: Tap the `Add Songs` button to be presented with the `Add to Playlist`
    screen again, and follow the previous steps until you''ve added the items you
    want; then tap the blue `Done` button again.

    - *Delete songs*: Tap the white and red minus (`−`) button to remove a selected
    song. Tap the red `Delete` button that appears to the right of the song to confirm
    deletion. Removing a song from a playlist will not delete it from your music library
    on your iPad or on your computer.

    - *Rearrange songs*: Tap and hold the grip bars to the right of a song, and drag
    to rearrange it in the playlist.

    - *Delete playlist*: If you decide you no longer want the playlist, tap the white
    and red minus (`−`) button next to the name of the playlist in the source list
    to delete the playlist. Tap the red `Delete` button that appears to the right
    of the playlist''s name to confirm deletion. Deleting a playlist will not delete
    the songs it contains from your music library on your iPad or on your computer.
    The iPod app will prompt you to confirm your deletion.


    **NOTE:** You can edit only standard playlists. If you have synced a smart playlist
    (the kind with the icon of a machine''s cogwheel next to it) from `iTunes` on
    your computer, you won''t be able to edit it.'
