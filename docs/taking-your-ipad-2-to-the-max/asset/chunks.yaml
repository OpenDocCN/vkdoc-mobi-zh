    # 飞行模式


    当你带着一台 Wi-Fi + 3G 版 iPad 乘坐飞机时，实际上等于随身携带了一部大型手机。虽然如今航空公司对 Wi-Fi 友好得多，许多航班甚至提供机上
    Wi-Fi 服务，但飞行途中使用 3G 和其他移动网络连接仍然不被允许。


    与 iPhone 类似，Wi-Fi + 3G 版 iPad 具备切换至飞行模式的控制功能。当空乘人员宣布"请关闭所有手机"时，若要开启飞行模式，请启动`设置`应用。页面顶部的第一个控制选项（图
    5–10）便是飞行模式开关。


    ![图片](img/0510.jpg)


    **图 5–10.** *苹果深知飞行途中关闭 iPad 的 3G 模块至关重要，因此将飞行模式设为设置应用中的首要选项。*


    将飞行模式开关向右滑动，开关将变为开启状态，并禁用 Wi-Fi、3G 和蓝牙功能。若想在飞行中使用 Wi-Fi，可点击飞行模式开关下方的`Wi-Fi 设置`按钮，独立于任何
    3G 服务单独启用 Wi-Fi。


    # 内置 3G 的替代方案


    若想在不具备内置 3G 功能的 iPad 上获得移动网络连接，一种方式是使用移动宽带路由器。这类设备由多家移动运营商提供，外形小巧，可连接至 3G 网络，并允许附近最多五台设备共享该
    3G 连接。


    在美国和加拿大，Novatel Wireless（品牌名`MiFi`）和 Sierra Wireless（品牌名`Overdrive`）均提供移动宽带路由器。这些小巧设备可通过
    Sprint 和 Verizon 购买——有趣的是，这两家运营商并非 iPad 所采用的 GSM 标准的服务商。


    Sprint 的`Overdrive` 3G/4G 移动热点（图 5–11）就是可与 iPad 配合使用的移动宽带路由器之一。`Overdrive`的特别之处在于它兼容
    Sprint 正在美国主要城市部署的 4G 网络。4G 网络速度比 3G 服务快十倍，这意味着你可以用 iPad 体验到接近 Wi-Fi 网络的速度。


    部分手机（例如 Palm Pre Plus）也可用作移动热点，详情请咨询你的移动运营商。在美国等许多国家，运营商允许将 iPhone 作为*网络共享*设备——即把
    3G 版 iPhone 当作移动宽带路由器使用。不过，旅行中若需共享 iPhone 网络，你仍需像在 iPad 上一样办理数据漫游服务。


    ![图片](img/0511.jpg)


    **图 5–11.** *想以比 3G 更快的速度联网，并和朋友共享无线宽带连接？Sprint Overdrive 3G/4G 移动热点这类无线宽带路由器就能实现。图片由
    Sprint 提供。*


    ## 本章小结


    本章我们讲解了通过 Wi-Fi 和 3G 数据连接接入互联网的流程。你学到了在无法连接 Wi-Fi 网络时的一些实用故障排除技巧。以下是本章要点的总结：


    * 你的 iPad 通过 Wi-Fi 和（若为 Wi-Fi + 3G 版）3G 蜂窝网络与世界通信。没有 Wi-Fi 或 3G，就无法连接互联网。

    * 使用 Wi-Fi 时安全至关重要。要实现最高级别的无线安全，请使用 WPA2 级别加密。

    * 由于费用高昂，国际旅行时应关闭数据漫游。可改用 GSM 漫游合作伙伴并开通国际数据套餐，*或*租用能为 iPad 和其他移动设备提供 Wi-Fi 接入的移动热点。

    * 在飞机上使用 3G 版 iPad 时，务必开启飞行模式以遵守国际及各国法规。


    # 第 6 章


    # 使用 Safari 浏览互联网


    2007 年苹果推出 iPhone 时，史蒂夫·乔布斯称其将互联网装进了口袋。iPhone 上的`Safari`浏览器堪称革命性设计，让你以前所未有的方式触摸网络。如果要将
    iPhone 上的 Safari 体验放大十倍，你就能大致想象在 iPad 上浏览网页的感受。iPad 屏幕上的网页画面宏大，以超乎想象的清晰度呈现前所未有的丰富内容。这感觉就像让
    iPad 将互联网变成你掌中的互动杂志。


    在本章中，你将学会如何充分利用`Safari`及其所有强大功能。你将掌握网页导航、管理书签、以及使用竖屏和横屏模式的方法。你还将发现一些绝佳的触控快捷操作、书签技巧，以及便捷的网络剪辑功能。继续阅读，了解更多精彩内容。


    ## Safari 入门指南


    轻点`Safari`应用图标即可启动程序。默认情况下，苹果将其置于程序坞的左下角。图标以蓝色背景上的白色指南针标识（见图 6–1）。轻点后，`Safari`应用将打开新窗口。


    ![图片](img/0601.jpg)


    **图 6–1.** *Safari 图标*

