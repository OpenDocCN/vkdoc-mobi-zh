- fmt: '### Touching and Viewing Albums


    For this section, an *album* will refer to a regular album, an event, or a faces
    album, since interacting with these are all the same. As you can see in [Figure
    13–11](#Chapter13.html#fig_13_11), there are a series of event albums. An album
    appears as a pile of some of the photos that are contained in the album. To open
    the album, you have two options to expand, or open, the photo album:


    - Tap the album once to cause the photos in it to spread out and expand.

    - Starting with two fingers together on an album, slowly spread them apart in
    a reverse-pinch motion, and you''ll see the album''s photos start to spread out
    (see [Figure 13–16](#Chapter13.html#fig_13_16)). Remove your fingers to expand
    the album fully.


    ![images](images/1316.jpg)

    **Figure 13–16.** *An album being expanded by a reverse pinch*


    You''ll notice the menu bar at the top of the screen has changed once you are
    in an album (see [Figure 13–17](#Chapter13.html#fig_13_17)). It now displays the
    name of the album, a back button on the left that takes you to the category view
    you were previously in, a `Slideshow` button, and a `Share` button, which allows
    you to present your photos and share them with others (we''ll talk about the `Slideshow`
    and `Share` buttons a little later).


    ![images](images/1317.jpg)

    **Figure 13–17.** *Photos inside an album*


    To exit the album, tap the back button (which will be named after the category
    the album is in; in [Figure 13–17](#Chapter13.html#fig_13_17), the album *Copenhagen,
    Denmark* is contained in the `Events` category, so *Events* is the name of the
    back button in this example) or pinch the photos of the album together. They will
    collapse on each other, and you''ll find yourself back on the album screen.


    While on the `Places` tab, the red pins on the map act as albums containing all
    the photos taken there. Tap the pin to be presented with an album thumbnail (see
    [Figure 13–15](#Chapter13.html#fig_13_15)); then tap the thumbnail, or reverse-pinch
    it, to expand the photos of that location onto the screen (see [Figure 13–18](#Chapter13.html#fig_13_18)).


    ![images](images/1318.jpg)

    **Figure 13–18.** *Expanding a series of photos taken in the same location in
    `Places` view*


    ### Touching and Viewing Photos


    When in an album, you will see thumbnails of the photos it contains (see [Figure
    13–17](#Chapter13.html#fig_13_17)). To view a photo full-screen, you have two
    options to expand, or open, the photo:


    - Tap the photo once to cause the photo to fill the screen.

    - Starting with two fingers together on a photo, slowly spread them apart in a
    reverse-pinch motion, and you''ll see the photo start to grow. Remove your fingers
    to expand the photo fully to fill the screen.


    Once you display a photo full-screen, you have several ways to interact with it:


    - Pinch to zoom into and out of the photo.

    - Double-tap to zoom into the photo. Double-tap again to zoom out.

    - When your image is displayed at the normal zoomed-out size, swipe to the left
    or right to move to the previous or next image in the album. When zoomed into
    an image, dragging the photo pans across it.


    Tap any image once to open the image overlay, as shown in [Figure 13–19](#Chapter13.html#fig_13_19).
    The image overlay features a menu bar at the top of the screen and a scrubber
    bar at the bottom.


    ![images](images/1319.jpg)

    **Figure 13–19.** *Viewing a photo. Note the image overlay bars.*


    The image overlay menu bar at the top of the screen shows you the number of the
    selected image out of the total number of images in the album, the back button
    to return to the album, a `Slideshow` button, and a `Share` button. If you''re
    in range of a Wi-Fi network that also has an `Apple TV`, and you''re running iOS
    4.3 or later on your iPad, you''ll see the `AirPlay` button here as well (discussed
    in the next section). Slide your finger across the photo thumbnails in the scrubber
    bar at the bottom of the screen to quickly scan through your images (see [Figure
    13–20](#Chapter13.html#fig_13_20)).


    While viewing a photo in the `Saved Photos` album, you''ll notice a garbage pail
    icon next to the `Share` button. This garbage pail icon shows up only in the menu
    bar of images in the `Saved Photos` album. Tapping this button will delete the
    selected photo. We talk more about deleting photos later in this chapter.


    ![images](images/1320.jpg)

    **Figure 13–20.** *The scrubber bar*


    While viewing individual photos, flip your `iPad` onto its side to have your photo
    reorient itself. If the photo was shot using landscape orientation, it fits itself
    to the wider view.


    You can tap a full-screen image once with two fingers to return to album view.


    ### Viewing Your Photos over AirPlay


    New to iOS 4.3 and later, `AirPlay` support allows you to send music, photos,
    and videos wirelessly to Apple-supported devices. In the case of images, that
    is limited to Apple''s newly updated `Apple TV` media presentation device and
    to some custom third-party applications like Erica Sadun''s `Banana TV` for Mac
    OS X.


    The `AirPlay` icon, which you can see toward the right in [Figure 13–21](#Chapter13.html#fig_13_21),
    looks like an outline of a rectangle with an upward-pointing triangle within it.
    When tapped, it presents a list of available receivers. The TV icon to the left
    of each name indicates that the receiver can receive photos and videos. When you
    tap any item other than the first, which corresponds to your `iPad`, the photo
    will wirelessly echo out to the selected device and display there, as will any
    photos that you slide to as you navigate through your album.


    To disable `AirPlay` echoing, select the first `iPad` option. Once checked, `AirPlay`
    transmission ceases.


    ![images](images/1321.jpg)

    **Figure 13–21.** *The AirPlay selection menu lets you redirect photos **from**
    your iPad to an Apple TV or third-party application running on a computer.*'
