- fmt: '### The iPad and Flash Videos


    If you''ve ever watched a video on the Web, chances are the video was encoded
    using Flash. Ever since Apple unveiled the iPhone to the world, there has been
    growing tension between Apple and Adobe. The reason for this: Apple does not allow
    Adobe''s proprietary Flash plug-in to run on the iPhone—or the more recent iPad.


    Flash, in Apple''s estimation, is a slow, buggy, and archaic technology. Steve
    Jobs himself even posted a letter on Apple''s web site effectively telling the
    world the same thing ([`www.apple.com/hotnews/thoughts-on-flash/`](http://www.apple.com/hotnews/thoughts-on-flash/)).
    His letter was the last nail in the coffin for anyone hoping to see Flash on the
    iPad or iPhone.


    What many people misunderstand when they hear “no Flash on the iPad” is that they
    think the iPad can''t play web videos. Nothing could be further from the truth.
    Sure, if a video is encoded in Flash, you can''t view it on the iPad. And while
    most videos on the Web (about 75 percent of them, Steve Jobs says) are encoded
    in Flash, most are also available in a new, universal web standard called `HTML5`.
    `HTML5` videos don''t require a plug-in to play. `HTML5` is also much less power
    hungry than Flash—an important feature when dealing with mobile devices that consume
    battery power.


    The world is moving to `HTML5`, and Apple chose to support it—and open standards—instead
    of Adobe''s aging and proprietary Flash. Most of YouTube''s videos have already
    been reencoded to support `HTML5`, and many other major web sites have chosen
    to drop Flash in favor of the new `HTML5` web standard.


    ### Summary


    The iPad turns browsing the Internet from something you did at your desk to something
    you can do in the comfort of your lap in your living room. In a way, browsing
    the Internet on the iPad gives web pages a tangibility they''ve never been capable
    of before—you can just reach out and touch them. It''s very likely that, after
    using `Safari` on iPad to surf, you''ll never want to explore the Web any other
    way.


    Here are a few tips to keep in mind as you move on from this chapter:


    - iPads work in more ways than the traditional vertical, or Portrait, orientation.
    Go ahead and flip your iPad on its side to view web pages in Landscape mode. Your
    `Safari` pages will adjust.

    - Nope, there''s no Flash support. There never will be. And you don''t need it.

    - Web Clips are a great way to access your favorite web sites right from your
    iPad''s Home screen.

    - Tap the top of any `Safari` page (right below the clock in the Status bar) to
    quickly return to the top of the web page.

    - `Safari`''s page-management tool lets you navigate back and forth between several
    `Safari` windows at once. This functions similar to the way tabs function on desktop
    browsers.


    ## Chapter 7


    ## Touching Your Music and Video


    The iPad offers new ways to interact with your media. The iPad provides a magnificent
    dedicated music player, and with just a few touches, you can access that same
    audio from a wide variety of other applications, allowing you to enjoy your tunes
    as you play and work. When you watch a TV show, a movie, or a quick video on your
    iPad, its widescreen video playback capabilities and superb television integration
    provide beautiful, clear images, larger than ever before. What''s more, the iPad''s
    wireless Internet capabilities allow you to access a huge range of content—from
    YouTube to embedded video on the Internet to your own personal computer—and to
    share the content already on your device out to external players. This chapter
    introduces the primary applications that let you enjoy music and video on your
    iPad: `Videos`, `YouTube`, `Safari`, and `iPod`.


    ### Watching Video on the iPad


    Video forms such a basic component of your iPad that you shouldn''t think about
    it as just a single application. Apple provides the base technology used by several
    built-in apps that support video playback of third-party media. The following
    list provides a quick overview of those Apple-supplied apps (see [Figure 7–1](#Chapter07.html#fig_7_1)).


    **NOTE:** [Chapter 15](#Chapter15.html#ch15) discusses how you can record and
    play your own homebrew video using the iPad''s new built-in camera system.


    ![images](images/0701.jpg)


    **Figure 7–1.** *Videos, YouTube, and Safari all feature video playback capabilities
    on the iPad.*


    - *`Videos`*: The `Videos` application appears on the Home screen of your iPad.
    The icon looks like a traditional clapperboard, with a black-and-white striped
    top over a blue base. This application plays back the TV shows, movies, podcasts,
    iTunes U lessons, and music videos you''ve synchronized from your home iTunes
    library.

    - *`YouTube`*: You''ll find the `YouTube` app icon next to the `Videos` app icon
    in [Figure 7–1](#Chapter07.html#fig_7_1). The icon looks like an old-fashioned
    TV, complete with a greenish screen and brown dials. `YouTube` connects to the
    Internet and allows you to view videos from `YouTube.com`. You can navigate to
    [`www.youtube.com`](http://www.youtube.com) in `Safari` on the iPad and browse
    YouTube videos that way, but the iPad''s `YouTube` app wraps [`www.youtube.com`](http://www.youtube.com)
    in such a nice and easy-to-navigate package that you''ll find it''s leaps and
    bounds better than using YouTube in a web browser.

    - *`Safari`*: `Safari`, which you read about in depth in [Chapter 6](#Chapter06.html#ch6),
    offers a third way to view videos. Like its computer-based equivalents, the `Safari`
    app allows you to watch embedded movie files. `Safari`''s icon looks like a light
    blue compass with a needle pointing to the northeast.


    In addition to the three apps that play video that ship with the iPad, there are
    thousands of other apps that play video. You can discover all these apps in the
    iTunes Store. Some of our favorites are the BBC News app to view news footage
    and The Weather Channel app to view weather-related news stories and Doppler video.


    For all that the iPad brings to video, it has limits. Your iPad''s built-in applications
    play `H.264 MPEG-4` video, and that''s pretty much it. As the previous chapter
    mentions, you cannot use your iPad''s standard apps to view Flash/Shockwave videos
    or animation. You cannot play `AVI` videos. You cannot play `DivX`, `Xvid`, or
    any of the other dozens of popular formats. If your video isn''t in `H.264 MPEG-4`
    format, your iPad won''t understand it without help.


    Fortunately, the App Store helps you to work around this limitation. Some third-party
    apps enable you to watch videos using formats that the iPad does not officially
    support. Video-playing applications include such titles as `CineXPlayer`, `yxplayer`,
    and `Azul Media Player`. These viewers work with a wide variety of content including
    `WMV`, `AVI`, `DivX`, and `Flash FLV` formats, among others. Because these applications
    work outside of Apple''s built-in media support, you will generally have to preload
    your content to each app. Use iTunes'' Apps tab, in the File Sharing section,
    to add and remove video files.


    Some applications also let you access media directly from web URLs, even allowing
    you to play Flash video (`FLV`) embedded in web pages (rather than URLs that link
    directly to `FLV` assets). Custom web browser `Skyfire` offers Flash video playback
    support by using edge cases. It isn''t always successful, because some monetized
    sites like Hulu currently disable iPad video access through any solution outside
    their own custom player (the Hulu Plus player in Hulu''s case). Even if Flash-on-iPad
    limitations were removed, Hulu''s own restrictions mean that it will not freely
    distribute video to mobile browsers.


    The general consensus on the matter is that although Adobe has had Flash technology
    ready to roll out for iPad and iOS in general for some time, relations between
    Adobe and Apple, not to mention outspoken opinions by Apple''s Steve Jobs, have
    kept that technology off the platform.


    **NOTE:** Apple''s iPad officially supports `H.264` video, up to `1.5Mbps`, `1024`
    by `768` pixels, `30` frames per second, and `720p` in `M4V`, `MP4`, and `MOV`
    file formats.'
