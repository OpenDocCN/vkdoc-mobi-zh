  trans: '

    #### iPad 2 底座


    苹果 iPad 2 底座（`$29.00`）提供了一个用于为 iPad 2 充电和同步的基座（参见图 3–15）。


    ![images](img/0315.jpg)


    **图 3–15.** *苹果 iPad 2 底座外观简约且功能实用。*


    初代 iPad 也有类似的底座，许多其他厂商也推出了功能相同且价格更低的底座。iPad 2 底座提供了一个`Dock Connector`端口和一个音频线路输出端口。它以一个固定角度支撑你的
    iPad，且无法调整角度。对于希望将蓝牙键盘与 iPad 配合使用的人来说，iPad 2 底座是将 iPad 保持在适合打字的实用姿势的理想选择。


    #### iPad 相机连接套件


    对于摄影师来说，苹果的一款非常实用的配件是 iPad 相机连接套件（参见图 3–16）。该套件包含两个独立的连接器，可插入 iPad 的`Dock Connector`端口。第一个连接器设有一个安全数字（SD）存储卡插槽，适用于许多数码相机和摄像机使用的此类存储卡。当你想将照片或视频从相机传输到
    iPad 以进行分享或修图时，只需插入相机连接套件的`SD`适配器，从相机中取出 SD 卡，然后将其插入相机连接套件上的 SD 插槽即可。


    ![images](img/0316.jpg)


    **图 3–16.** *iPad 相机连接套件包含一个 USB 适配器（左）和一个 SD 存储卡读卡器（右）。*


    第二个连接器甚至更有用，它为 iPad 提供了一个 USB 端口。可以连接什么到 USB 端口呢？当然可以是数码相机或摄像机，但你也可以连接大多数 USB
    键盘、USB 耳机，甚至 iPhone 或 iPod touch。如果你正在将 iPhone 或 iPod touch 用作相机，并希望将照片或视频传输到
    iPad 进行编辑，相机连接套件的 USB 适配器与常规的 iPhone 同步线缆配合使用将非常完美。


    为 iPad 添加 USB 耳机的功能使其成为 Skype 语音聊天的绝佳便携工作站，而且如果你有一款心爱的 USB 键盘难以割舍，现在也可以在 iPad
    上使用了。


    #### iPad 10W USB 电源适配器


    iPad 附带一个 10W USB 电源适配器用于充电，但你可能需要第二个适配器以便在旅途中使用，或者在家和办公室都能充电。iPad 10W USB 电源适配器附带了一个你购买
    iPad 时标配适配器中没有的额外部件——一根 6 英尺长的电源线，这样你就不必紧挨着电源插座才能充电了。


    #### Apple VGA 适配器


    当史蒂夫·乔布斯于 2010 年 1 月 27 日发布 iPad 时，他还同时宣布了适用于 iPad 的`iWork`的可用性。`iWork`包含三个强大的应用程序：`Pages`、`Keynote`和`Numbers`。


    苹果的`Keynote`是一款演示软件，所以对于我们这些工作中需要进行演示的人来说，这是个激动人心的消息。然而，我们需要一种能将 iPad 上的图像传输到标准
    PC 投影仪或大尺寸显示器上的方法。


    几分钟后，乔布斯发布了 Apple VGA 适配器（参见图 3–17），它正好提供了这种功能。对于初代 iPad，VGA 适配器仅适用于某些已编写了特定驱动程序的应用程序。而在
    iPad 2 上，VGA 适配器可以将屏幕上的所有内容真实地镜像到外接显示器或投影仪上。


    ![images](img/0317.jpg)


    **图 3–17.** *iPad Dock Connector 转 VGA 适配器对于在外接显示器或 PC 投影仪上展示 Keynote 演示文稿非常有用。*


    对于不想随身携带笔记本电脑的演示者来说，这款适配器简直是天赐之物。搭配适用于 iPad 的`Keynote`、适配器、你的 iPad 和一台 PC 投影仪，你就可以用你的演示惊艳全场了。


    #### Apple 数字影音适配器


    随着第二代 iPad 的推出，苹果引入了一款新的线缆：数字影音适配器。这款线缆的目的是让你的 iPad 能够连接到许多使用`HDMI`连接器标准的高清显示器和电视。


    这款适配器的一端有一个底座连接器，用于插入 iPad，另一端则是一个`HDMI`线缆端口。`HDMI`端还提供了另一个底座连接器，以便你在使用 iPad 向高清电视输出视频时为其供电。数字影音适配器会将
    iPad 2 屏幕上的内容镜像到高清显示器，但在初代 iPad 上，它仅适用于明确支持视频输出功能的应用程序。


    #### Apple 复合及色差影音线缆


    并非所有的 PC 投影仪或电视都使用`VGA`标准来输入视频信号，因此苹果确保其复合影音线缆和色差影音线缆能与 iPad 兼容。与可在 iPad 2 上以视频镜像模式工作的`VGA`适配器不同，这些线缆仅适用于那些已针对
    iPad 视频输出功能进行编写的应用程序。我们希望未来能有更多 iPad 程序员在其应用程序中支持视频输出功能。


    #### Apple 无线键盘


    Apple 无线键盘是另一款可与 iPad 配合使用的苹果产品。这款小巧的键盘手感舒适，盲打时触感反馈良好。


    该键盘通过蓝牙无线连接与 iPad 通信，并由两节 AA 电池供电。如果你已有 Apple 无线键盘并希望与 iPad 配合使用，只需将键盘与 iPad 配对即可——除非你每次使用都重新配对，否则无法同时在
    Mac 和 iPad 上使用它。


    这款键盘最大的优点在于它不受任何线缆束缚，因此你可以在 iPad 前方、膝盖上，甚至距离 iPad 最远 30 英尺的地方使用它。


    正如我们之前提到的，几乎任何第三方蓝牙键盘都能与 iPad 配合使用。许多厂商正在生产集成了蓝牙键盘的 iPad 保护套，例如`ZaggMate`（`zagg.com/accessories/zaggmate-ipad-case`）和`Kensington
    KeyFolio`保护套（`kensington.com`）。


    #### Apple 带遥控和麦克风的耳机


    尽管 iPad 本质上使用的操作系统软件与 iPhone 相同，但它并非设计用于拨打或接听电话。即使是 iPad Wi-Fi + 3G 也无法进行语音通话，除非使用
    FaceTime 或 Skype（[`http://skype.com`](http://skype.com)）、Line2（[`www.line2.com`](http://www.line2.com)）等网络电话软件。


    虽然你不能像在 iPhone 上那样用 iPad 打电话，但你仍然会想用它听音乐、看电影，或者偶尔参与 FaceTime 聊天。因此，你可能需要一副好耳机。Apple
    带遥控和麦克风的耳机在其中一根耳机线上有一个小型开关，可作为 iTunes 的遥控器。如果你需要快进到下一首歌、暂停、调高或调低音量，或者倒回，都可以通过这个遥控器完成。


    这个遥控开关还包含一个重要部件——一个小型指向性麦克风，用于拾取你的声音。由于这些耳机与每部 iPhone 附带的耳机相同，你只需将其插入 iPad 的耳机插孔即可使用。


    #### Apple 带遥控和麦克风的入耳式耳机


    我们要讨论的最后一款苹果 iPad 配件是另一款耳机。Apple 带遥控和麦克风的入耳式耳机与前一款产品几乎完全相同，但有一个重要区别。这款耳机实际上会贴合在你的耳道内，从而提供更好的音质和外界噪音隔离效果。

