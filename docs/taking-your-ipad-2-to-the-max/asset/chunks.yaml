    ### Video Settings


    You can adjust several settings that affect your video playback. These settings
    are accessed through the iPad’s `Settings` application (see [Figure 7–7](#Chapter07.html#fig_7_7)).


    ![images](images/0707.jpg)


    **Figure 7–7.** *The Videos’ settings preferences*


    - **Start Playing**: This setting allows you to choose whether to start playing
    videos from the beginning or from where you left off. Being able to start from
    where you left off is terrific when you’re trying to work through a movie or TV
    episode in short snippets. You might prefer to always start product demonstration
    videos at the beginning, however.

    - **Closed Captioning**: If your video contains embedded closed captions, you
    can view them by switching this option from `OFF` to `ON`. Closed captions are
    not just helpful for the hard-of-hearing. They provide an excellent way to augment
    your video-watching experience in noisy conditions when on the subway or at a
    busy cafeteria.


    The iPad’s Video app also lets you play content from it through your home television.
    You’ll need to buy some extra cables for this, which you can read about later
    in the “Video Accessories” section of this chapter, but the Video settings is
    where you can choose the following options:


    - **Widescreen**: Turn this on to force widescreen videos to be played in widescreen
    on your TV. This preserves their original aspect ratio.

    - **TV Signal**: Choose either `NTSC` or `PAL`. If you are in North America or
    Japan, you’ll most likely have an `NTSC` TV. In Europe, Australia, and New Zealand,
    it’s `PAL`.


    ### YouTube


    Discovering, navigating, and watching YouTube videos on the iPad is an experience
    that’s light years beyond watching them on your computer while sitting at your
    desk. The iPad turns watching YouTube videos into a fantastic leisure experience
    that you can enjoy from the comfort of your couch.


    Unlike the Videos app, the YouTube app requires an Internet connection. As long
    as you have at least a Wi-Fi connection, you’re all set. At the time this book
    was being written, YouTube allows you to watch videos using 3G connections as
    well; the application automatically downgrades video quality to put less strain
    on your bandwidth allocation. The lower-quality videos won’t look quite as good
    as they will over a Wi-Fi connection, but they won’t deplete your account quite
    as fast.


    To take full advantage of the YouTube app, you’ll want to have a YouTube account.
    You don’t *need* one to use the app, but having one makes the app that much more
    powerful. With a YouTube account, you can view and bookmark your favorite videos;
    subscribe to YouTube users’ videos; see with a tap of a button all the videos
    you’ve uploaded to YouTube; and share, rate, and flag videos—all from within the
    YouTube app. Creating a YouTube account takes only a few minutes and can be done
    at [`www.youtube.com/create_account`](http://www.youtube.com/create_account).


    To launch the YouTube app, tap the YouTube icon; it looks like a retro-styled
    TV set (shown earlier in [Figure 7–1](#Chapter07.html#fig_7_1)). When launched
    for the first time, the application displays the Featured screen, as shown in
    [Figure 7–8](#Chapter07.html#fig_7_8). This screen showcases videos chosen by
    YouTube’s staff.


    ![images](images/0708.jpg)


    **Figure 7–8.** *YouTube’s Featured screen provides a video showcase.*


    #### Navigating and Finding YouTube Videos


    Key elements of the YouTube app include a search field in the upper-right corner
    of the app and a row of seven buttons at the bottom of the screen. Each button
    (see [Figure 7–9](#Chapter07.html#fig_7_9)) offers a different way to discover
    and enjoy YouTube videos.


    ![images](images/0709.jpg)


    **Figure 7–9.** *The YouTube navigation bar*


    - **Featured**: This screen displays videos reviewed and recommended by YouTube
    staff. You’ll often find some worthwhile viewing here that you might otherwise
    miss.

    - **Top Rated**: This screen displays videos that have the highest ratings on
    YouTube. You can choose to show the highest-rated videos for the day, the week,
    or all-time. Viewers assign ratings, and the videos with the highest votes are
    collected here.

    - **Most Viewed**: This screen displays videos that have the most views on YouTube.
    You can choose to show the most-viewed videos for the day, the week, or all-time.
    Here’s where you’ll discover videos that have gone viral, passed from viewer to
    viewer by e-mail, Twitter, and Facebook recommendations.

    - **Favorites**: This screen displays all the videos you’ve added to your Favorites
    list on YouTube. This screen will also show you a list of any playlists and their
    videos when you tap the `Playlists` tab at the top of the screen. This is one
    of the features of the YouTube app that requires you to have a YouTube account.
    To sign into your account, tap the `Sign In` button in the top-left corner (see
    [Figure 7–10](#Chapter07.html#fig_7_10)). You’ll be prompted to enter your username
    and password. Once you do this, any videos you’ve favorited will be displayed.


    ![images](images/0710.jpg)


    **Figure 7–10.** *The `Sign In` / `Sign Out` button is located in the top-left
    corner of the Favorites, Subscriptions, and My Videos pages. Tap it to log into
    your YouTube account.*


    To remove a bookmarked video, tap the `Edit` button in the top gray bar. All your
    bookmarked videos will display a circled × in their top-left corner. Tap the ×
    to remove the video from your favorites. When you are finished deleting favorites,
    tap the blue `Done` button. (When you delete your last favorite, and there are
    no favorites left, the iPad automatically returns you to the Favorites screen
    without having to tap `Done`.)


    **NOTE:** Removing a video from your YouTube favorites on the iPad also removes
    it from your YouTube account, meaning it will no longer be displayed in your favorites,
    no matter what device you log into YouTube from. You cannot undo removing favorites.


    - **Subscriptions**: YouTube allows you to subscribe to another YouTube user’s
    videos so you can keep up-to-date with the latest videos they’ve posted. Any subscriptions
    you have will show up on this screen. Tap the name of the user to see all their
    videos displayed to the left of the list. This feature requires you to be logged
    into your YouTube account.

    - **My Videos**: This screen displays all the videos you’ve uploaded to YouTube.
    This feature requires you to be logged into your YouTube account.

    - **History**: This screen displays the videos you have viewed on your iPad. The
    history does not reflect the videos you’ve viewed on your computer while logged
    into your YouTube account. To clear your history, tap the `Clear` button in the
    top-left corner.


    You can also use the search field, found in the upper-right corner of any of these
    screens, to search YouTube’s library of videos.

    '
