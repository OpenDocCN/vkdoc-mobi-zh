  trans: '

    ## Wi-Fi 还是 Wi-Fi + 3G？


    iPad 是一款联网设备。当然，它也能在没有网络连接的情况下用作电子书阅读器或游戏设备，但没有网络的 iPad 就像轮胎瘪了的保时捷。苹果为你提供了两种选择：Wi-Fi（无线网络连接）型号和
    Wi-Fi + 3G（无线网络加 3G 移动数据连接）型号。如果你想要在 Wi-Fi 热点之外的地方联网，就需要购买 iPad 的 Wi-Fi + 3G 版本，因为你无法在后期为
    iPad 增加这一功能。


    Wi-Fi + 3G 型号比仅支持 Wi-Fi 的型号稍贵，价格高出约 130 美元。你支付的部分对应的是内置的 3G 电路、全球定位系统（GPS）接收器以及一根天线，通俗点说，就是你的
    iPad（加上向本地无线运营商订阅的可选数据套餐）可以在任何有 3G 无线服务的地方上网、收发电子邮件以及连接至 iBookstore。你需要 3G 功能吗？这里有几个需要你自问的问题：


    -   **你是否会在没有 Wi-Fi 热点的地方使用 iPad？** 如果你打算在配备 Wi-Fi 的家庭和办公室周围使用 iPad，并且你常去的大多数场所（商店、图书馆、咖啡馆、机场和酒店）都提供免费
    Wi-Fi，那么你可能不需要 Wi-Fi + 3G 型号。然而，如果你经常在车内、足球场或其他没有 Wi-Fi 的地方需要联网，那么 Wi-Fi + 3G
    的 iPad 可能才是你的正确选择。

    -   **你是否有其他方式连接 3G 网络？** 你可能已经有另一种接入广域无线网络的方法。如果你有一个 3G 路由器，例如 Sierra Wireless
    Overdrive 3G/4G 或用于笔记本电脑的 Novatel MiFi，那么你可以使用它和你现有的无线数据套餐来连接互联网。如果你有运行 iOS 4.3
    或更高版本的 iPhone 4，可以考虑使用手机上的“个人热点”功能作为你的互联网网关（需要单独的数据套餐）。

    -   **你是否愿意为你的 iPad 和 3G 数据套餐支付额外费用？** 首先，Wi-Fi + 3G 的 iPad 比对应的不含 3G 的型号贵 130
    美元。这还不是你将要承担的唯一额外费用，因为你的无线运营商会向你收取数据套餐费用。在美国，AT&T 提供无需合约的 3G 数据服务，每月 250MB 数据需
    14.99 美元，或每月 2GB 数据需 25 美元。另一家美国运营商 Verizon Wireless 的资费从每月 20 美元 1GB 数据起步，最高可达每月
    80 美元 10GB 数据。国际运营商提供类似的套餐，请向你所在国的运营商咨询数据套餐的费用和容量的详细信息。

    -   **你是否需要使用能够感知 iPad 位置的应用？** Wi-Fi 版 iPad 能够通过一种称为 Wi-Fi 定位系统的技术来确定其位置。这项由北美
    Skyhook Wireless 提供的服务，利用已知 Wi-Fi 接入点的位置来近似定位 iPad 的位置。虽然在美国和加拿大的人口密集中心区域，这可以将位置数据精确到
    20 到 30 米范围内，但当 iPad 远离 Wi-Fi 时，它完全无法工作。Wi-Fi + 3G 的 iPad 包含一个完整的辅助全球定位系统（A-GPS）接收器，能够利用
    GPS 精确定位设备的位置。因此，只要 Wi-Fi + 3G 的 iPad 能够“看到”天空，几乎在地球上的任何地方都能确定精确的位置。


    ## GSM vs. CDMA


    如果你决定购买 Wi-Fi + 3G 的 iPad，你还需要决定使用哪种移动无线网络。在美国有两个选择：GSM，即 AT&T Wireless 使用的标准；以及
    CDMA，即 Verizon 移动网络背后的技术。全球绝大多数的无线网络都使用 GSM，因此，经常进行国际旅行的用户在做出购买决定时可能会考虑这一因素。


    实际上，这两种 3G 网络的速度和性能是相似的。对于大多数美国 iPad 买家来说，主要的区别在于两家运营商在你生活和工作区域所提供的覆盖范围。对目前手机语音信号质量感到满意的
    Verizon Wireless 用户，可以继续使用他们现有的运营商来获得 iPad 数据服务。同样，信号强度满格且服务质量良好的 AT&T Wireless
    用户，可能也愿意继续使用他们当前的运营商。

    '
- fmt: '### How Much Storage?


    Once you’ve decided whether to purchase the Wi-Fi or Wi-Fi + 3G iPad, your next
    thought should be about the quantity of built-in storage you want in your iPad.
    Although the amount of working memory, or RAM, in the iPad is identical across
    the different models (`256MB` for the original iPad, `512MB` for the iPad 2),
    the flash drives used for storing applications and data come in three different
    sizes: `16GB`, `32GB`, and `64GB`. You cannot upgrade the flash drive in the iPad,
    so you’re stuck with whatever you buy. Like any electronic device, the iPad will
    evolve over time, so larger storage capacities are likely in the future.


    At the launch of the iPad, the difference between the `16GB` and `32GB` models
    was only `$100`, while maxing out the iPad’s storage at `64GB` was only `$200`
    more than buying the base model. Before deciding how much storage you want to
    buy, consider these questions:


    - *How big is your music library?* If your library is small and you want to listen
    to music on your iPad, no problem. If it’s large, the extra space on the larger
    iPad models helps you store additional music and podcasts. Of course, if you already
    own a music device such as an iPod, you may want to continue using it for listening.
    iPods come in a variety of capacities and are much more portable than your iPad.

    - *How many videos do you want to carry around?* A single two-hour movie may occupy
    more than a gigabyte of storage. If you travel a lot, especially on airplanes,
    you may want to pay more to store additional movies and TV shows with those extra
    gigabytes. In [Chapter 7](#Chapter07.html#ch7) of this book, we’ll talk about
    using Handbrake to transfer video from DVDs to a format that your iPad can use.
    Although Handbrake does a great job of compressing video, movies can still be
    as large as `500MB` to `1GB` in size. If you also own a second-generation Apple
    TV, you might consider using Apple’s AirPlay and Home Sharing to stream video
    to your iPad, reducing the need for more storage.

    - *Do you plan to carry lots of pictures?* Although many digital pictures are
    pretty small (a typical photo is `300KB` to `1.2MB` in size), if you carry a few
    thousand of them around, they do add up to some serious storage. Do you laugh
    at the idea of carrying that many pictures around on your iPad? Apple’s built-in
    support for the Mac iPhoto application makes it simple to put years of photo archives
    onto your iPad with a single synchronization option. Moving photos directly from
    a digital camera to your iPad is easy using the iPad Camera Connection Kit, so
    the idea of backing up a trip’s worth of memories on your iPad while on vacation
    isn’t entirely out of the question.

    - *Do you need to carry lots of data?* You might not think of your iPad as a data
    storage device, but there are ways to use it (mostly involving e-mailing documents
    to yourself or using a third-party application) to bring data along with you on
    the road. If you think you might need to do this, maybe those extra gigabytes
    could be put to good use.

    - *How long do you plan to use this iPad?* If you’re an early adopter who plans
    to trade up at the earliest possible opportunity whenever Apple offers a new unit,
    you may want to save your pennies now in the hope that a better unit with more
    memory quickly debuts. If, instead, you want to get the most use out of the iPad
    for the longest period of time, paying more up front means you won’t outgrow the
    memory quite as fast.


    ### Should You Buy a Used iPad?


    Now that the iPad has been on the market for a while, some owners are moving up
    to newer or more capable iPads, and used devices are often available for less
    money than new ones. If you don’t need the latest and greatest iPad, a used one
    can be your gateway into the iPad world without impacting your wallet as much.


    Believe it or not, Apple is the best vendor for used iPads. The company often
    makes refurbished iPads available for sale at less than the suggested retail price
    of new equipment, and the iPad will come with the original factory warranty. You
    can find the refurbished equipment in the Apple Online Store at [`http://store.apple.com`](http://store.apple.com)
    or on Amazon.com.


    eBay is often a good place to purchase used computer equipment, as sellers are
    given ratings by buyers so that it’s possible to see at a glance how others have
    fared in their transactions with a particular seller. As with any online auction,
    however, the buyer should beware. Make sure that the seller has pictures of the
    exact unit you are bidding on, has a return policy, and has a flawless approval
    rating.


    If you’re buying an iPad from someone locally, you might want to consider having
    an Apple Authorized Service Provider ([`www.apple.com/buy/locator/service/`](http://www.apple.com/buy/locator/service/))
    check the unit over before you make a commitment. While it’s easy for you to make
    a visual inspection of the screen and case for scratches or dents, it’s not so
    easy to see if there is hidden damage caused by water, or connectors that have
    been broken.


    Finally, you might be able to afford a new iPad when the next generation is announced
    (usually in March or April). Retailers need to make room for the incoming iPads
    and discount their existing stock. Your patience can be rewarded!


    ### Considering System Requirements


    iPads aren’t like most other computers. At heart, they’re similar to a large iPod
    touch. And, like an iPod touch, in order to effectively use one, you will need
    a computer with a USB 2.0 port and an Internet connection running the most recent
    version of iTunes. Although your iPad can receive app updates and synchronize
    data through a Wi-Fi or 3G connection, it still needs to be directly connected
    to your computer in order to receive system software updates. It’s also much faster
    to transfer large amounts of music, movies, or photos through a direct USB 2.0
    cable connection.


    You won’t be able to purchase apps, books, or music from your iPad until you successfully
    connect it to iTunes. That means you need either a Mac running OS X 10.5.8 or
    newer or a Windows computer running Windows XP (Home or Professional with Service
    Pack 3 or newer), Windows Vista, or Windows 7\. This also means you need an iTunes
    Store account.


    Before you decide to purchase an iPad, ask yourself whether you have a computer
    available that has all these features. If not, you might not be able to set up
    and use your iPad.


    **NOTE:** If you haven’t yet put iTunes on your computer, you can get a free copy
    from [`www.apple.com/itunes`](http://www.apple.com/itunes). It’s available for
    both Mac OS X and Windows systems and is quick and easy to install.'
