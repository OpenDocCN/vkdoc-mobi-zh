- fmt: '### Navigating Your Photos


    This is where the fun begins. When you touch your digital photos for the first
    time, you feel like you''ve finally stepped into the 21st century—that promised
    utopian future where technology merges with our fondest memories and we can go
    back and relive and explore them like never before. When you start pinching, dragging,
    and expanding your photos and albums, you''ll feel like a child who has just spread
    his first bag of marbles on the ground and now is staring wide-eyed at the array
    of colors, shapes and sizes that he can control before him.


    To launch the `Photos` app, tap its icon on the Home screen. Once launched, the
    `Photos` app displays thumbnails of the beginning of your photos in your Photos
    library, as shown in [Figure 13–8](#Chapter13.html#fig_13_8).


    ![images](images/1308.jpg)


    **Figure 13–8.** *The Photos app*


    Running along the top of the app, right above the thumbnail photos, you''ll see
    the menu bar (see [Figure 13–9](#Chapter13.html#fig_13_9)). This bar displays
    tabs that allow you to switch between the different ways your photos are organized.
    To select a view, tap its tab in the menu bar. Note that you may not see all the
    tabs, depending on how you''ve synced your photos. For instance, those who sync
    only a single album won''t see `Events`. Similarly, those whose photos lack geotag
    data won''t see `Places`.


    ![images](images/1309.jpg)


    **Figure 13–9.** *There are different ways your photos are organized on the iPad.*


    - **Photos**: This is the first view you see when you launch the `Photos` app
    for the first time. Subsequent launches will display what was active the last
    time the app was run (the `Places` tab, for example). On the `Photos` tab (see
    [Figure 13–8](#Chapter13.html#fig_13_8)), your pictures aren''t grouped into any
    kind of albums at all. They are displayed in a sequential order by date taken.
    If you have lots of photos synced on your iPad, scrolling through this list can
    take quite a while.

    - **Albums**: This view displays your photos in their albums as you''ve arranged
    them on your computer (see [Figure 13–10](#Chapter13.html#fig_13_10)). You will
    also see a `Saved Photos` album if you''ve saved images from the Web or that you''ve
    received in an e-mail on your iPad. Also, as mentioned earlier, if you''ve imported
    photos directly to the iPad from a digital camera, you will see them in a `Last
    Import` album.


    ![images](images/1310.jpg)


    **Figure 13–10.** *Albums view*


    **NOTE:** Did you know you can take screen shots of your iPad? A *screen shot*,
    or a *screen capture*, is an image taken of whatever appears on the iPad''s screen
    at the moment you are taking it. To take a screen shot, press and hold the power
    button on the iPad, and then press and release the Home button while still holding
    the power button. The iPad''s screen will flash white, and you''ll hear a shutter-click
    sound effect. Once you hear the sound, you can let go of the power button. The
    captured screen shot will appear in the `Saved Photos` album. You can use screen
    shots to save images of entire web pages or show off that high score in a video
    game. Most of the images in this book were taken using the iPad''s screen capture
    function.


    - **Events**: This view displays your photos in events (see [Figure 13–11](#Chapter13.html#fig_13_11)).
    Events are used in Aperture 2 and iPhoto ''08 and newer as a way to automatically
    arrange your photos according to the date they were taken. This helps people automatically
    keep large photo libraries in easy-to-navigate shape. The `Events` tab is a Mac-only
    feature. You will not see this tab if you are using a Windows computer to sync
    your iPad.


    ![images](images/1311.jpg)


    **Figure 13–11.** *Events view*


    - **Faces**: This view displays your photos grouped into an individual''s "face"
    album (see [Figure 13–12](#Chapter13.html#fig_13_12)). If you are using iPhoto
    ''09 or Aperture 3 on a Mac, the programs have facial recognition software built
    in. The Mac software automatically creates albums of individuals and groups all
    the photos they appear in. It''s an amazingly fun way to see all the photos a
    certain friend or family member is in. `Faces` also works to some extent on cats
    and dogs. You will not see this tab if you are using a Windows computer to sync
    your iPad with; `Faces` is a Mac-only feature.


    ![images](images/1312.jpg)


    **Figure 13–12.** *Faces view*


    - **Places**: Many cameras today feature *geotagging*, which codes the photo with
    the location coordinates where it was taken. What the `Places` tab does is take
    your photo''s coordinates and display them on a Google map (see [Figure 13–13](#Chapter13.html#fig_13_13)).
    This is arguably the coolest feature of Photos on iPad because it lets you navigate
    your photos on a map that you can view from a global level to a street level.
    It''s an especially cool feature for travelers: you can see at a glance where
    you have been and just how much of the world is left to explore.


    ![images](images/1313.jpg)


    **Figure 13–13.** *Places view*


    Red pins appear on the map that signify the geographic location of your photos.
    You can pinch and zoom on the map to get closer. As you do, you may see more pins
    appear on the map (see [Figure 13–14](#Chapter13.html#fig_13_14)).


    ![images](images/1314.jpg)


    **Figure 13–14.** *Note that more pins appear as you zoom in to an area of the
    map signifying greater accuracy of the photo''s coordinates.*


    Tap a pin to see an album pop-up appear (see [Figure 13–15](#Chapter13.html#fig_13_15)).
    You can then explore all the photos that were taken in that location. `Places`
    requires an Internet connection to display the Google map.


    ![images](images/1315.jpg)


    **Figure 13–15.** *Tap a pin to see an album thumbnail of every photo that was
    taken at that location.*


    As you can now see, the iPad''s `Photos` app organizes your photos into five views
    for easy navigation. It is important to note that you may not see all the views
    on your iPad. The view categories you see depend on whether you are using a Mac
    or Windows computer, whether you have chosen to sync albums from each category
    view, and whether your photos are tagged with geocoordinates.


    As long as you have one photo on your iPad, you''ll always see the `Photos` tab.
    Most likely you will see the `Albums` tab too, especially if you''ve imported
    photos from a digital camera onto the iPad (a `Last Import` album is automatically
    created) or if you''ve saved an image you received in an e-mail or saw on the
    Web (a `Saved Photos` album is automatically created). To see other albums, events,
    or faces, you''ll need to sync them from your computer. You don''t need to do
    anything to sync `Places`; its tab will appear automatically if you have any photos
    tagged with geocoordinates.


    ### Touching and Viewing Your Albums and Photos


    Now that you know how to navigate your photo collections, you''ll learn how to
    touch and view them. Remember all the gestures covered in [Chapter 4](#Chapter04.html#ch4)?
    When viewing a collection of albums or a single image full-screen, the iPad allows
    you to interact with that album or photo using a number of these gestures.'
