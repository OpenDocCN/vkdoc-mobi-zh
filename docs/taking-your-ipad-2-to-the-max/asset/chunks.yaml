  trans: '

    ### 拆箱你的 iPad


    当你带着 iPad 回家，或是它被送到你家门口时，就该拆箱并进行设置了。iPad 的包装（见图 1–2）本身就是一件小巧的艺术品。iPad 的包装盒内包含设备本身、一根
    `Dock Connector` 转 `USB` 连接线、一个 10 瓦 `USB 电源适配器`以及一包文档。这些物品每一样都很重要，能帮助你进行日常使用。


    -   **连接线**：`USB 连接线`可将 iPad 连接到电脑或 `交流电源适配器`。无论你是要给 iPad 充电以备次日使用，还是要与电脑同步以获取最新软件更新，`Dock
    Connector` 转 `USB` 连接线都是 iPad 套件中的关键部件。

    -   **USB 电源适配器**：iPad 附带的 `交流电源适配器`可直接插入墙壁插座，让你能为 iPad（或任何其他 USB 设备）充电。它提供一个
    USB 端口。使用时，只需用 `USB 连接线`将 iPad 连接到适配器即可。它能提供为 USB 设备供电所需的 5 伏电压。


    ![images](img/0102.jpg)


    **图 1–2.** *iPad 包装盒内的物品不多：iPad、一根 Dock Connector 转 USB 连接线、一个 10 瓦交流电源适配器以及一些简单的文档。*


    ### iPad 功能概览


    拆箱 iPad 后，花几分钟时间了解一下你的新设备吧。图 1–3 介绍了 iPad 的基本功能。


    iPad 顶部设有一个可插入耳机的插孔、一个内置麦克风（位于 iPad 2 的顶部正面）以及一个用于开启或关闭特定功能的 `睡眠/唤醒` 按钮。如果你购买的是
    Wi-Fi + 3G 型号，顶部（或在 iPad 2 上是左侧）还会有一个微型用户身份模块（micro-SIM）卡托，用于存放手机的 micro-SIM 卡。iPad
    底部内置扬声器和一个用于连接 `Dock Connector` 转 `USB` 连接线或基座的凹槽。iPad 正面是一块巨大的触摸屏和一个单独的 `主屏幕`
    按钮。在通过 `iTunes` 完成 iPad 设置之前，你的 iPad 屏幕将处于未激活状态。


    较新款的 iPad 还配备了两个摄像头：一个位于正面，用于使用 `Photo Booth` 或进行 `FaceTime` 视频通话（见第 15 章）；另一个位于背面，可用于录制高清视频和拍摄静态照片。


    在 iPad 的右侧（正面观看时），你会找到音量键和侧边开关（用于锁定屏幕方向）。


    ![images](img/0103.jpg)


    **图 1–3.** *功能分解图，展示了 iPad 2 上的按钮和接口。基座接口位于 iPad 底部靠近主屏幕按钮的位置。*


    ### 准备设置


    你已经拆箱了 iPad，但尚未将其连接到 `iTunes`。现在是检查电脑上的数据的好时机。当你的 iPad 首次设置时，它会与 `iTunes` 同步，同时根据你的电脑设置，同步你的电子邮件账户、日历等。在继续之前，你可能需要检查和清理以下项目，以便你的
    iPad 能以最新的数据开始运行：


    -   **联系人**：iPad 可与 Windows 上的 `Outlook` 2003 或 2007 以及 `Windows 通讯簿`、Mac 上的 `通讯录`、`Outlook`
    或 `Entourage`，以及互联网上的 `Yahoo! 通讯录` 或 `Google 联系人` 同步。为了准备首次同步，请检查你现有的联系人，并确保他们的电话号码和电子邮件地址是最新的。如果你使用其他程序管理联系人，请考虑将联系人迁移到上述解决方案之一。如果你不想这么做，也没问题。你可以直接在
    iPad 上添加联系人信息，尽管这不如自动加载信息那么方便。

    -   **日历**：你可以将 iPad 与电脑上的日历同步，就像同步联系人一样。iPad 支持 Mac 上的 `iCal`、`Outlook` 和 `Entourage`
    日历，以及 Windows 上的 `Outlook` 日历。在首次同步前整理好你的日历，这样你就可以立即在电脑和 iPad 上管理日程了。

    -   **电子邮件**：iPad 可与大多数电子邮件提供商配合使用，包括 `Yahoo! Mail`、`Google Gmail` 和 `AOL`。如果你的电子邮件提供商使用行业标准的
    `POP3`、`IMAP` 或 `Exchange` 服务，那么你的服务也能与 iPad 配合使用。你可能希望在设置 iPad 之前先在这些提供商处建立新账户。这样，在首次同步时，这些账户信息就会加载到你的设备上。你总归可以稍后添加新的电子邮件账户，但能一次性设置好并立即投入使用会更方便。

    -   **媒体**：与例如拥有慷慨的 160GB 硬盘容量的 `iPod Classic` 相比，某些 iPad 型号的存储空间相对较小。为了充分利用这有限的空间，请为你最喜爱的歌曲、电视节目、电影和播客创建播放列表。因为很可能你无法将整个媒体库同步到新的
    iPad 上，所以现在花点时间筛选你的媒体文件，找出你最想随身携带的内容。

    -   **软件与操作系统**：在尝试设置 iPad 之前，请将 `iTunes` 更新到 10.2 或更高版本。如果你使用的是 Mac，请确保已将操作系统更新到至少
    `OS X` 10.5.8。Windows 电脑必须运行 `Windows 7`、`Windows Vista` 或安装了 `Service Pack 3`
    或更高版本的 `Windows XP Home` 或 `Professional`。你可以从 Apple 官网 [`www.itunes.com/download`](http://www.itunes.com/download)
    下载最新版本的 `iTunes`。

    -   **iTunes 账户**：Apple 要求使用一个有效的 `iTunes` 账户才能设置你的 iPad。如果你还没有账户，你必须在 `iTunes
    Store` 注册一个账户。如果你想通过 `iTunes Store`、`App Store` 或 `iBookstore` 进行购买，你需要提供有效的地址和信用卡。以下是创建新
    `iTunes` 账户需要遵循的步骤：


    1.  在电脑上启动 `iTunes` 应用程序，并等待其加载完成。

    2.  在窗口左侧的栏目中找到 `iTunes Store`。点击 `iTunes Store`，然后等待商店窗口加载。你必须连接到互联网才能执行此操作，因为所有商店信息都存储在
    Apple 的服务器上。

    3.  点击屏幕右上角的 `登录` 链接。`iTunes` 会打开如图 1–4 所示的登录界面，你可以使用现有账户登录，也可以开始创建新账户。


    ![images](img/0104.jpg)


    **图 1–4.** *iTunes 登录界面让你能够使用现有账户登录 iTunes，或开始创建新账户的流程。*

    '
- fmt: '4.  Click `Create New Account`. The screen clears, and a message welcoming
    you to the iTunes Store displays. Click the `Continue` button.

    5.  Review the terms of service, check the box marked “I have read and agree to
    these terms and conditions,” and click `Continue`. A new window appears prompting
    you to create your account.

    6.  Enter your e-mail address and a password (you must enter the password twice
    for verification). Also enter a question and answer that will help verify your
    identity, as well as the month and day of your birth. Review the other options
    on the page, and adjust them as desired before clicking `Continue`. Again, the
    screen will clear, and you’ll move on to the final account creation step.

    7.  Enter a valid credit card and the billing information for that credit card.
    These must match to finish creating your account. When you have entered the information,
    click `Continue`.


    After following these steps, you will receive a confirmation e-mail at the address
    you specified while signing up. The e-mail welcomes you to the iTunes Store and
    provides you with the customer service web address ([`www.apple.com/support/itunes/store`](http://www.apple.com/support/itunes/store)).


    You don’t need a credit card to get an iTunes App Store account. If you’re planning
    on only downloading free apps and don’t have a credit card, there’s a way to create
    an iTunes App Store account from your iPad. The following instructions assume
    that you don’t already have an account and that you’ve already unwrapped your
    iPad. Don’t worry; you can always come back to these instructions later if you’d
    like to wait.


    1.  Launch the App Store app on your iPad by tapping its icon.

    2.  Look for a free app. It can be anything, but just make sure that the price
    is listed as `Free`. Tap the `Free` button to start the “purchase” process; then
    tap `Install App`.

    3.  A dialog appears asking you to sign into the iTunes App Store by using an
    existing Apple ID or by creating a new Apple ID. Tap the `Create New Apple ID`
    button.

    4.  You’ll be asked to choose a country or region for the store that matches the
    billing address for your payment method. Select one from the list that appears
    when you tap the country name next to the word `Store`; then tap the `Next` button.

    5.  Agree to the iTunes Store Terms & Conditions.

    6.  Now you’re asked to enter new account information, including your e-mail address,
    a password, a secret question and answer, and your date of birth. When you’ve
    entered that info, tap `Next`.

    7.  On the Billing Information screen, tap the name next to the word `Credit Card`,
    and select `None` as your billing method. Enter a valid name and billing address,
    and then tap `Next`.

    8.  At this point, an Email Verification screen should appear. Tap `Finish`, and
    then open Mail on your iPad (that’s assuming it’s already set up; if not, you
    can do this part on another computer).

    9.  Open the e-mail from Apple, and tap the `Verify Now` link. You’re asked to
    sign in to complete the account creation.

    10.  Tap the `Use Existing Account` button, enter the username (e-mail address)
    and password that you just created, and then tap `OK`.

    11.  You’ll see a message telling you that your iTunes Store account has been
    successfully created. Tap the `Done` button, and then you can start downloading
    any free apps, books, music, or videos from iTunes, the App Store, or the iBookstore.
    Read more about these stores in [Chapter 8](#Chapter08.html#ch8).


    ## Connecting Your iPad to the Computer


    Once you’ve created an iTunes account on either your computer or your iPad, you
    should connect your iPad to your computer to back it up, check for software updates,
    and do an initial synchronization of data. If you haven’t yet released your iPad
    from its box, here are the steps you need to take:


    1.  Remove the iPad from the box, and extract it from its factory wrapping. Also
    unwrap the included Dock Connector to USB Cable.

    2.  Locate the two ends of the USB cable. One is thin and marked with a standard
    three-pronged USB symbol. The other is wide and marked with a rectangle with a
    line in it.

    3.  Connect the wide end of the cable to the dock connector port on the bottom
    of the iPad. Connect the thin end to a spare USB 2.0 port on your computer. iTunes
    will launch, and your iPad will chime softly.


    If your iPad does not automatically power on and display either the white Apple
    or the Connect to iTunes message, press and hold the `Sleep/Wake` button. With
    the main screen facing toward you, you’ll find it at the top right of the iPad.
    After a few seconds, the iPad should wake up and display the white Apple as it
    powers on. If the iPad does not respond and display either the white Apple or
    the Connect to iTunes message, contact the store where you purchased the device
    or call Apple Support.'
