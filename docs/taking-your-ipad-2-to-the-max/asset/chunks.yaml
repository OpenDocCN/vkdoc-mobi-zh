- fmt: '### Accessing the Table of Contents, Bookmarks, and Notes


    Tap the `Table of Contents/Bookmarks` button (the button that has three dots followed
    by three lines, as shown in [Figure 9–12](#Chapter09.html#fig_9_12)) at the top
    of your page to be instantly taken to the Table of Contents and Bookmarks page
    (see [Figure 9–25](#Chapter09.html#fig_9_25)).


    The Table of Contents and Bookmarks page is, unsurprisingly, divided into Table
    of Contents and Bookmarks sections; each section has its own tab.


    ![images](images/0925.jpg)


    **Figure 9–25.** *The Table of Contents and Bookmarks page. Switch between the
    two by tapping the appropriate tab. Return to your last position in the book by
    tapping the Resume button.*


    The Table of Contents tab displays the book''s table of contents as a scrollable
    list. Tap any item in the Table of Contents to be instantly taken to it.


    The Bookmarks tab displays all your bookmarks, highlights, and notes. They are
    divided into two sections: *Bookmarks* and *Highlights & Notes*. Under the *Bookmarks*
    heading, you''ll see a list of chapter names or numbers that hold the bookmark,
    as well as the page number of the bookmark and the date you bookmarked the page.
    A red ribbon representing the bookmark lies next to the bookmark''s page number.
    Tap any Bookmark icon to jump to the bookmarked page.


    Under the *Highlights & Notes* heading, you''ll see a list of all the highlights
    and notes you''ve created. For each highlight and note, you''ll see the beginning
    of the first sentence that the highlight or note appears in, as well as the chapter
    name or number. You will also see the page number and the date you marked the
    page. The date is highlighted in the color that you choose to highlight the text
    in. This is a nice feature if you use different colors for different bookmark
    classifications, such as quotes from the antagonist in blue and quotes from the
    protagonist in pink.


    Remember than whenever you create a note, a highlight is automatically created.
    You can distinguish between a highlight and a note easily. Any note has a tiny
    Post-It style Note icon in the right-hand margin. To be instantly taken to any
    highlight or note, tap it in the list. To read a note you''ve created without
    leaving the Table of Contents page, tap the Note icon in the margin. The note
    will spring forward on the screen (see [Figure 9–26](#Chapter09.html#fig_9_26)).
    You can then tap the note to bring up the onscreen keyboard to edit it. Tap the
    area outside of the note to close it.


    ![images](images/0926.jpg)


    **Figure 9–26.** *Reading a note on the Bookmarks page.*


    To exit the Table of Contents/Bookmarks page, tap the Library button to return
    to your bookshelf or the Resume button to return to your last position in the
    book.


    #### Sharing Notes


    The iBooks app allows you to share the notes you have written in two ways: by
    e-mailing them or by printing them. To share your notes, tap the Share button
    at the top of the Table of Contents page. The Share button looks like an arrow
    breaking out of a box. From the Share menu that appears, tap the Email button
    to create a new e-mail with all the notes in the body of the e-mail or tap the
    Print button to print your notes to a wireless AirPrint printer.


    ![images](images/0927.jpg)


    **Figure 9–27.** *Share notes by e-mailing or printing them.*


    ### Having a Book Read to You


    Not only can you read books on the iPad, but you can have the iPad read books
    to you. Using iPad''sVoiceOver screen reader technology, you can make the iPad
    read any text to you, including the text of an entire novel. We talked about VoiceOver
    in [Chapter 2](#Chapter02.html#ch2), but we''ll touch on how to activate it for
    iBook reading. Follow these steps to do so:


    1. Turn VoiceOver on. Go your iPad''s Home screen and tap Settings, and then choose
    General ![images](images/U001.jpg) Accessibility ![images](images/U001.jpg) VoiceOver.
    Triple-click the Home button, then selectToggle VoiceOver.

    2. Return to your book in iBooks. Triple-click the Home button and a pop-up will
    appear. Tap Turn VoiceOver On.

    3. Now you have two options. To have everything read to you from the top of the
    page, use two-fingers held together and flick up. Everything from the top of the
    screen down will be read. To have everything read to you from your current position
    in the text, use two fingers held together and flick down. Everything from the
    position where you flicked will be read. When VoiceOver reaches the bottom of
    the page, it will automatically turn it for you and continue reading.

    4. To stop VoiceOver reading, tap anywhere on the screen with one finger. It would
    also be a good idea to triple-click the Home button and select Turn VoiceOver
    Off now, unless you want to continue using VoiceOver gestures.


    Now, you might be wondering why you would have VoiceOver''s mechanical voice read
    you a book when you can just buy an audiobook and sync it to the iPad. The simple
    answer is because not all books are in audiobook format. It should also be noted
    that the iBooksVoiceOver ability isn''t a feature intended to appeal to a large
    number of readers; rather, it is an accessibility option to help those who are
    hard of sight read their favorite books.


    **NOTE:** Some books may not be compatible with VoiceOver.


    ### Syncing PDFs


    PDF support was a big feature request when people started playing around with
    iBooks. Apple listened to them and added it with the introduction of iBooks 1.1.
    Don''t worry about whether you have the latest iBooks app. If you''ve updated
    or downloaded the app recently, you''ve got the latest version, which supports
    PDF viewing. If you aren''t sure, open the App Store application on the iPad to
    check if any updates are available for your apps.


    You have two ways of syncing PDFs to iBooks on your iPad: using iTunes or using
    the iPad''s Mail app. To sync PDFs via iTunes, simply drag any PDFs you want to
    sync into your iTunes library. They will automatically be added to the Books section
    of your iTune library. The next time you sync your iPad to iTunes, your PDFs will
    sync as well.


    You can also add PDFs to iBooks through the iPad''s Mail app. To do this, open
    Mail and select an e-mail that has a PDF attachment. Tap the attachment in the
    body of the e-mail to see it previewed full screen. While previewing it full screen,
    you''ll see an Open In… button in the upper-right corner. Tap this button and
    select iBooks from the drop-down list (see [Figure 9–28](#Chapter09.html#fig_9_28)).
    The Mail app will close, and the PDF will automatically open in iBooks and be
    added to your PDF bookshelf. When you sync your iPad with iTunes, any PDFs you
    have added to iBooks in this manner will be added to your iTunes books library.


    ![images](images/0928.jpg)


    **Figure 9–28.** *Opening a PDF in iBooks using Mail*


    ### Navigating the PDF Bookshelf


    To see all your PDFs contained by iBooks, open iBooks, tap the Collections button
    in the iBooks Menu bar, and then tap the PDFs button (see [Figure 9–7](#Chapter09.html#fig_9_7)).
    Doing so will take you to your PDF bookshelf. As you can see in [Figure 9–29](#Chapter09.html#fig_9_29),
    the PDF bookshelf is similar to the regular bookshelf. The PDF bookshelf will
    be populated with any PDFs you have added to iBooks.


    ![images](images/0929.jpg)


    **Figure 9–29.** *The PDF bookshelf is identical to the regular bookshelf. If
    you know how to navigate one, you know how to navigate the other.*


    Just as with the regular bookshelf, you can choose to view your PDFs as icons
    or in a list. In List view, you will find you can sort your PDFs by titles, authors,
    categories, or bookshelf (the way they are arranged in Icon view). List and Icon
    views also present you with a search field, so you can search your PDFs by name
    or author. The PDF bookshelf works just like the regular bookshelf when editing
    and deleting items. Simply tap the Edit button to rearrange or delete PDFs.'
