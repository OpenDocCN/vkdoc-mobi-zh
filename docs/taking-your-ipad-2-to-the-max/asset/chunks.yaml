- fmt: '### Dropping a Pin


    Navigate to a point of interest on the map without doing a search for something.
    In the example in [Figure 12-19](#Chapter12.html#fig_12_19), we found a location
    by Chicago’s Shedd Aquarium that has beautiful views of the sunrise over Lake
    Michigan. To drop a pin, all you have to do is press and hold your finger on the
    map where you want to drop it. After a second or two, a purple pin will fall and
    stick in the map.


    ![images](images/1219.jpg)


    **Figure 12-19.** *A dropped pin and its Information bar with the approximate
    address*


    The pin’s Information bar will appear with the approximate address of the pin,
    as well as the usual icons for Street view and the Information window. If the
    pin’s location isn’t exactly where you want it, you can tap and hold the purple
    pin’s head and drag it to the location you want. Remove your finger to sink the
    pin into the map.


    Tap the `i` button to bring up the Information window for the pin’s location (see
    [Figure 12-20](#Chapter12.html#fig_12_20)). This window’s options include the
    ability to get directions to/from the location, bookmark it, add it to contacts,
    or e-mail the location. You can also tap the Street View button to enter Street
    view (if it’s available in the area).


    ![images](images/1220.jpg)


    **Figure 12-20.** *A dropped pin’s Information window lets you find directions,
    add the location to contacts and bookmarks, or share the location.*


    You can also drop a pin in the center of the map by accessing the Maps settings
    page behind the page curl in the lower-right corner (see [Figure 12-6](#Chapter12.html#fig_12_6)).
    Tap or tap and drag the page curl at the bottom of the Maps screen, and then tap
    the `Drop Pin` button. The settings page will uncurl, and a pin will drop in the
    center of the map. You can then tap and drag the pin to move it to anywhere you
    want on the map.


    Dropping pins might seem like a nice but unnecessary feature at first. If you
    can search maps with the app’s powerful search features, you might wonder why
    you would want to manually add locations. Again, dropped pins are great because
    they allow you to mark locations that do not have a fixed address, like a good
    trail in the mountains, the site of your first kiss (for the romantic among you),
    or even the location of your favorite bench in Central Park.


    ### Bookmarking


    So far in this chapter, we’ve shown you several ways to bookmark locations, whether
    it be by a dropped pin or the Information windows of a business, friend, or address
    you looked up. But where are all those bookmarks you’ve saved? In the Bookmarks
    window, of course!


    Tap the Bookmarks icon in the Maps title bar; the icon looks like a book folded
    open (see [Figure 12-3](#Chapter12.html#fig_12_3)). The Bookmarks window will
    appear, presenting three views: `Bookmarks`, `Recents`, and `Contacts` (see [Figure
    12-21](#Chapter12.html#fig_12_21)).


    ![images](images/1221.jpg)


    **Figure 12-21.** *The Bookmarks window displays your bookmarked locations, recent
    locations, and contact locations.*


    The different views of the Bookmarks window behave like this:


    *   **Bookmarks**: This view lists all the bookmarks you’ve saved in the Maps
    app. Tap any bookmark to jump to it on the map. Tap the Edit button to delete
    a bookmark, move it up or down the Bookmarks list, or change the name of the bookmark.

    *   **Recents**: This view lists all the recent search queries, driving directions,
    and dropped pins you’ve made (see [Figure 12-22](#Chapter12.html#fig_12_22)).
    Tap any item on the list to jump to it on the map. Tap the Clear button to remove
    all items from the list. Remember: Clearing your Recents list will ensure that
    people who use your iPad can’t spy on locations you’ve searched for. Be aware,
    however, that it will also clear your direction routes. Routes can’t be bookmarked,
    so the only way to quickly access them is through the Recents window. If you clear
    the window, you’ll need to perform your route searches from scratch.

    *   **Contacts**: This list shows you all your contacts (see [Figure 12-22](#Chapter12.html#fig_12_22)).
    Tap any contact on the list to jump to its address on the map (provided you have
    the contact’s address in your contacts book). If a contact has more than one address,
    you’ll be asked to choose which address to navigate to. Tap the Groups button
    to navigate through your contact groups.


    ![images](images/1222.jpg)


    **Figure 12-22.** *The Bookmarks windows for Recents and Contacts*


    **TIP:** To close any pop-up window, such as the Bookmarks window or a search
    results list, tap anywhere on the map. The pop-up window will fade away.


    ### Directions and Traffic


    The iPad Maps app lets you search for directions and view current traffic conditions.
    Like the Maps app itself, directions and traffic require an Internet connection.
    If you have an iPad Wi-Fi + 3G, this won’t be an issue if you’re using it to find
    directions while on the road. If you have an iPad Wi-Fi only, you’ll need to look
    up the directions before you leave home.


    #### Directions


    To get directions, tap the `Directions` tab in the Maps toolbar (see [Figure 12-3](#Chapter12.html#fig_12_3)).
    You’ll notice that the search field becomes a double field to enter your start
    and end locations (see [Figure 12-23](#Chapter12.html#fig_12_23)). The Maps app
    will make your current location, if available, the starting location. If you don’t
    want to use your current location as the starting address, tap it into the first
    search field anyway. From there, you can tap the `X` to remove it or choose another
    location from the `Recents` pop-up list that appears.


    ![images](images/1223.jpg)


    **Figure 12-23.** *The Maps toolbar changes to accept directions input when you
    tap the Directions button.*


    **NOTE:** You can also begin a directions search from any pin’s Information window.


    To enter an address from one of your contacts, tap the Bookmarks icon, and then
    choose a contact. You’ll be asked to choose Directions to Here or Directions From
    Here. Choose the one you want, and the contact’s address will be populated in
    the appropriate directions field. To reverse the start and end points, tap the
    curvy `S` arrow to switch the points (and get reverse directions). The reverse
    directions feature is nice because sometimes the route you used to get somewhere
    isn’t the quickest route back. Reverse directions will show you whether another
    route home is quicker.


    When you have selected both a start point and an end point, a blue line will appear
    on the map. This line shows you the route you are to take (see [Figure 12-24](#Chapter12.html#fig_12_24)).
    A green pin represents your starting location on the map, and a red pin indicates
    your end location. You’ll also notice that a blue Directions bar has appeared
    at the bottom of the screen (see [Figure 12-25](#Chapter12.html#fig_12_25)). The
    Directions bar lets you choose between driving (a Car icon), public transit (a
    Bus icon), or walking (a Person icon) directions. These different modes of transportation
    may give you different direction routes on the map between the same two locations.
    This is because people aren’t allowed to walk on highways, and cars aren’t allowed
    to drive on pedestrian streets or on certain bus routes, depending on the city
    you live in.


    ![images](images/1224.jpg)


    **Figure 12-24.** *The map with the directions route*


    ![images](images/1225.jpg)


    **Figure 12-25.** *The Directions bar allows you to switch between driving, public
    transit, and walking directions.*'
