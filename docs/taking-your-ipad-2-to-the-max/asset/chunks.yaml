- fmt: '# iBooks


    If the other two stores on the iPad—iTunes and the App Store—include Tell a Friend
    links, then you might imagine that the iBookstore also provides a similar link.
    You’re correct—for every book listing in the iBookstore, the Tell a Friend link
    appears in the same location (upper-right corner of the listing) that it occupies
    in iTunes and the App Store.


    # iWork for iPad


    All three of the iWork for iPad apps—Keynote, Pages, and Numbers—include a Share
    button on the main page. The main page displays all the presentations, documents,
    or worksheets that you’ve created in one of the apps.


    To share a file with a friend or co-worker, drag it to the center of the page,
    and then tap the Share button below the image of the document. A pop-up appears,
    with Send via Mail as the first of three actions you can choose.


    Tap the Send via Mail button, and a dialog box appears asking which file format
    you want to convert the file to before sending. For Keynote, the choices are Keynote
    or PDF. For Numbers, you can select either Numbers or PDF. There are three file
    format choices for Pages—Pages, PDF, or Microsoft Word `.doc` format.


    Once you’ve selected the file type, the document is formatted and then attached
    to a new e-mail message with the document name as the Subject line. Enter an address
    or two in the To line, tap the Send button, and your work moves on to another
    person.


    # Photos


    There’s nothing more fun than sharing photos with friends and family, and the
    Photos app on your iPad makes it simple to send one or more pictures to anyone
    with an e-mail address.


    When viewing photos in any photo collection, album, or event, our familiar friend
    the Share button lurks in the upper-right corner of the window. Tapping the button
    adds Email, Copy, and Delete buttons to the upper-left corner of the window. To
    add up to five photos as attachments to an e-mail message, tap the photos you
    want to send, and a check mark appears on them. When you’ve selected the photos,
    tap the Send button to embed them in an e-mail.


    Like many actions you can perform on an iPad, there’s more than one way to send
    a photo in Mail. While you’re browsing your photos, you may see an image that
    you want to share. Tap and hold the image until a Copy pop-up appears. When it
    does, tap the pop-up to copy the image. Paste that image into a Mail message,
    address it, and mail it to share the picture.


    Why can you send only five photos? It’s all about the size of the images. Depending
    on the image resolution of the camera that takes the photos, it’s not uncommon
    for photos to be many megabytes (MB) in size. Photos transferred to your iPad
    are downsampled to the maximum resolution of your iPad’s display, which is 1024×768
    pixels. That creates a file size of about 900KB. It doesn’t sound like much, but
    five photos embedded in an e-mail message increases the file size to approximately
    5MB.


    To facilitate the sending of pictures from the iPad, Apple set a limit on the
    number of pictures. Just about any e-mail system will accept an incoming message
    with a 5MB file; double or triple that size, and many e-mail servers reject the
    message as being too large.


    What if you have a lot of smaller images to mail to someone? Use the copy and
    paste method we described earlier to add as many photos as you want, but be cognizant
    of the fact that the recipient’s mail system may reject your message if it is
    too large.


    What happens to photos sent to your iPad in e-mail messages? When the messages
    appear in your inbox, you may see the photo or an icon that designates that the
    photo still needs to be downloaded to your iPad from the e-mail server.


    Any photo sent to you can be either saved to Photos or copied for pasting into
    another app. To save or copy the photo, tap and hold it, and a pop-up appears
    with two buttons—Save Image and Copy. To save the image to Photos, tap Save Image.
    The iPad copies the image to your Camera Roll in the Photos application. If you’re
    going to paste the image directly into another document, tap Copy, which moves
    the image to the clipboard for pasting.


    **Tip:** Have you ever wondered how we got the wonderful screen shots for this
    book? To take a screen shot of whatever is on your iPad display, just press and
    hold the Home button and then push the On/Off Sleep/Wake button. Your screen “flashes,”
    and a shutter sound tells you that the screen shot has been captured to your photo
    library.


    ## Summary


    As the primary conduit for electronic mail on your iPad, the Mail app is arguably
    one of the most important pieces of software on the device. Setting up Mail is
    easy, with the app handling much of the configuration work behind the scenes with
    a minimum of assistance required from the iPad owner.


    This chapter showed you how to set up the app and then use it to send or receive
    e-mail. We discussed how Mail works with many other applications on the iPad to
    provide a way to share information with others. These are important points to
    take away from this chapter:


    - To use Mail, accounts must first be configured in the app. An easy way to move
    account information to the iPad from another computer is to sync Mail settings
    from iTunes on the computer.

    - When you’re setting up Mail accounts on the iPad, it’s helpful to use Apple’s
    Mail “cheat sheet” to capture all the settings necessary to successfully configure
    the accounts.

    - Upon receiving an e-mail with attachments, tap and hold the attachment icon
    in the message to view or open the file on the iPad.

    - Send vCard files from the Contacts app to quickly share contact information
    with others. vCard is a nearly universal file format that works well for Windows,
    Mac, and Linux users.

    - All of the electronic storefronts on your iPad—the iTunes Store, iBookstore,
    and the App Store—include Tell a Friend links for sending friends detailed information
    about items in the store that you think deserve their attention.

    - Only five photos at a time can be sent from the Photos application to avoid
    conflicts with message size limits on mail servers, but it’s possible to work
    around this limit by copying and pasting photos into Mail.


    # Chapter 12


    # Working with Maps


    The iPad has a powerful mapping application called Maps. It uses Google Maps to
    interactively find and display locations using map and satellite imagery. With
    Maps, you can get directions, view traffic, and more.


    In this chapter, you’ll discover how to navigate maps, bookmark locations, “walk
    down” a street in Street view, and even use your iPad as a compass. Maps isn’t
    just a powerful app; it’s a fun one, as well. Let’s get started.


    Launch the app by tapping the Maps icon (see [Figure 12-1](#Chapter12.html#fig_12_1)).
    It looks like a small map that shows a section of Interstate 280. The pin on the
    icon just happens to be where Apple’s headquarters is located in Cupertino, California.
    This takes you into the Maps application, where you can view and explore geography
    from around the world.


    ![images](images/1201.jpg)


    **Figure 12-1.** *The Maps icon*'
