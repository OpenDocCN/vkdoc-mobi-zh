- fmt: '# Fetch New Data


    The `Fetch New Data` button appears just below the last e-mail account listed
    ([Figure 11-7](#Chapter11.html#fig_11_7) shows the right pane scrolled down past
    the Accounts list). Some e-mail accounts, like MobileMe’s IMAP service, allow
    you to set up what is called *push* service. When push is enabled, new e-mails
    immediately transfer to your device when the e-mail server receives them. Although
    this is a great way to get mail as quickly as possible, it also requires more
    communications between the iPad and the e-mail server. That can reduce battery
    life, but even more importantly, it increases the amount of bandwidth used by
    your device.


    Although this isn’t an issue if you’re on a Wi-Fi network, 3G network data plans
    are costly, particularly if you are using a metered account, which is the standard
    offered by most iPad carriers. With a metered account, you are granted a certain
    bandwidth allotment, such as 250MB per month. Exceed that bandwidth and you may
    be cut off, charged again for another allotment, or possibly charged at an exorbitant
    out-of-plan rate; details vary by the plan you have selected and the carrier you
    have signed up with.


    The alternative to push, and the method that is used most often for e-mail accounts,
    is *fetch*, otherwise known as *pull*. With this method, your iPad checks for
    new mail on the server only when you tell it to or at preset intervals. You can
    set the schedule to have e-mail accounts check for mail every 15 minutes, 30 minutes,
    60 minutes, or manually. Manually means that the account doesn’t check for mail
    until you open the inbox in the Mail app or tap the `Refresh` button that is found
    at the bottom of most mailboxes. This is a great way to save bandwidth (especially
    when traveling out of country), but you may miss important messages that arrive
    between checks.


    For most purposes, we recommend leaving push notification turned on for MobileMe
    accounts and any other e-mail accounts, such as Exchange, that can provide push
    notification. For other accounts, it’s your choice depending on whether you want
    to have new mail waiting for you when you open your inbox or want the iPad to
    fetch it at the time you actually open the inbox.


    The Settings `![images](images/U001.jpg) Mail, Contacts, Calendar ![images](images/U001.jpg)
    Fetch New Data ![images](images/U001.jpg) Advanced` button provides configuration
    for each individual e-mail account on your iPad. Each account’s separate button
    leads to an option to choose between `Fetch` and `Manual`. Pick `Fetch` to add
    the account to the iPad’s automatic routines, or pick `Manual` to keep your account
    offline until you decide to retrieve mail.


    Be aware that you cannot individualize polling times; the polling time you select
    in the `Fetch New Data` screen applies to all fetched accounts. For example, if
    you select 15 minutes, all polled accounts will be checked four times an hour.


    # Show


    The next section of the settings page is more about the look and feel of the Mail
    application. The first button, `Show`, provides a choice of how many recent messages
    you’ll see in your inbox at any time. The default value is 50 messages, but you
    can also select 25, 75, 100, or 200 messages.


    If you don’t receive a lot of e-mail, setting the value to 25 messages is fine.
    When you receive a ton of e-mail or don’t check your inbox for a while, you can
    always pull more messages down from the server by tapping the `Load More Messages`
    link at the bottom of your inbox. Some people prefer a cleaner look and are willing
    to load more messages when needed. Selecting a bigger number of messages means
    your mailbox will always be more cluttered but avoids the wait involved when fetching
    additional mail batches.


    # Preview


    Each message in a Mail inbox can include a short preview of the contents so that
    you can see not only the sender and subject, but also a small preview of the content.
    The `Preview` button allows you to set the length of the preview from none (no
    preview) to five lines.


    Mail’s message display updates to reflect the preview size you set here. As the
    preview gets larger, you can see fewer items onscreen at once. As it gets smaller,
    you see more. With the iPad’s generous screen size, this choice affects you less
    than it would if you were managing mail on a smaller device like the iPhone or
    iPod touch, where this setting becomes more critical in use. The iPad’s default
    setting includes two lines of the message, which is usually sufficient to see
    whether the message is important.


    # Minimum Font Size


    If you wear bifocals or otherwise have issues with reading small text, you’re
    going to love the next setting. `Minimum Font Size` lets you change the size of
    text in Mail from `Small` to `Giant`, with three other sizes in between. Unlike
    the iPhone or iPod touch, increasing the font size on the iPad, with its large
    screen, doesn''t affect usability, so don’t be afraid. Being able to put your
    iPad down on a table and refer to it while standing is a wonderful thing, even
    if your eyes are otherwise quite strong.


    # Show To/Cc Label


    When the `Show To/Cc Label` button is enabled (set to `ON`), a small label appears
    next to every message in an inbox indicating whether the message was sent directly
    to you or you were cc’d (carbon copied) on an e-mail sent to another person. If
    you leave this option disabled, you can still access the feature while composing
    your mail—it just takes an extra tap or two. This option simply sets the default,
    how your mail will start out when you’re starting to compose it.


    # Ask Before Deleting


    On occasion, you may accidentally delete an e-mail. Enabling `Ask Before Deleting`
    forces you to validate that you do indeed want a mail message to be deleted. iPad
    owners who frequently have to perform mass deletions of e-mails should probably
    disable this setting to avoid getting bogged down in validations. If the consequences
    of losing an e-mail may be more serious for you, then enable this option.


    # Load Remote Images


    When you’re on a slow Internet connection, receiving e-mails with lots of images
    can be a recipe for frustration because it takes a while for those images to load.
    When you’re in a location with a weak 3G signal, the radio in the Wi-Fi + 3G iPad
    reverts to much slower cellular networks like EDGE or GPRS. Even a Wi-Fi network
    can be connected to a slow Internet connection. As an example, many cruise ships
    provide Wi-Fi networks onboard yet are reliant on one very slow satellite connection
    over which all shipboard Internet traffic must pass.


    Images also eat up bandwidth, which is an issue if you’re trying to manage your
    cellular data usage. Because of this, you may want to skip image loading while
    on-the-go and only view those items when you’re back at your desk, away from the
    metered Internet.


    `Load Remote Images` enables and disables the capability of Mail to autoload images.
    Instead of loading them right away, they are replaced with an image stand-in.
    You can still view each image by manually downloading it with a tap. That way
    you can skip all the snapshots from your company picnic while still enjoying the
    pictures of your sister’s baby.


    # Always Bcc Myself


    Do you want a copy of every e-mail you send to be sent to yourself as well? Setting
    `Always Bcc Myself` to `ON` automatically sends a blind carbon copy (bcc) to your
    inbox. This setting is particularly handy for anyone who wants to keep a record
    of outgoing e-mail and whose account does not automatically do that for them.
    Although many modern e-mail services offer a “sent mail” archive, there are still
    providers who do not offer this option.


    What does *blind carbon copy* mean? It just means that the recipients of the e-mail
    don’t know that you’re also getting a copy of it. When you want to send copies
    of e-mails to co-workers but don’t want the original recipient to know that you’re
    sending those copies, bcc is very useful.'
