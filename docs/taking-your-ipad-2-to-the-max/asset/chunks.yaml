  trans: '

    #### 更多键盘


    以为 iPad 只有一个键盘？再想想。它有十几款键盘（不同语言）。还有两个你会经常从屏幕主键盘上访问的键盘。


    在主键盘上（如之前图 4–23 所示），你会注意到 Shift 键旁边的逗号、感叹号、问号和句号。下方是 `.?123` 键（在某些应用中它是 `@123`
    键）。轻点 `.?123` 键会自动将你的 QWERTY 键盘切换为带有更多标点符号的数字键盘，其中包含“撤销”选项和另一个标有 `#+=` 的键盘修饰键（见图
    4–28）。


    **提示：** 你不需要用“撤销”按钮来撤销操作。只需摇晃你的 iPad 即可。（别太用力！你不想显得像丢了魂似的！）屏幕上会出现一个撤销弹出窗口，让你选择撤销上一步操作或取消撤销。


    ![images](img/0428.jpg)


    **图 4–28.** *`.?123` 键盘*


    轻点 `#+=` 键会进入第三个键盘，其中包含更多标点符号和一个“重做”按钮（见图 4–29）。重做功能（如果应用支持）会重复上一步操作。所以，如果你复制并粘贴了文本，轻点重做按钮会再次粘贴文本。


    ![images](img/0429.jpg)


    **图 4–29.** *`#+=` 键盘*


    #### 入门指南


    当你刚开始使用 iPad 时，请先慢慢打字。由于设备尺寸，手持 iPad 打字可能会有些困难。为了获得最佳打字体验，请将 iPad 放在桌子上或搁在腿上。起初，你可能需要用双手的食指来打字，但用得越多，你就会越像在实体键盘上打字。无论使用哪种方法，务必保持适当的速度，以便能跟踪自己输入的内容并随时更正。以下是一些打字技巧：


    *调出键盘*：要打开键盘，请轻点任意可编辑文本区域。


    *关闭键盘*：要关闭 iPad 的键盘，请轻点右下角的按键（你可以在图 4–23、4–28 和 4–29 中看到这个键）。它是一个带有键盘图标和向下箭头的按钮。要重新调出键盘，只需再次轻点任意可编辑文本区域。


    *接受或拒绝自动更正*：iPad 会在你正在输入的单词下方显示建议的更正，如前文图 4–25 所示。要接受建议，请轻点空格键。（你无需打完整个单词；iPad
    会为你自动填入。）要拒绝更正，请轻点该单词本身。即使你按下空格键，iPad 也不会进行替换。


    *使用放大镜*：打字时，你可以使用 iPad 内置的放大镜功能来调整光标位置，如图 4–30 所示。将手指按住文本区域的某处，直到放大镜出现。然后，利用放大视图将光标拖拽到所需的确切位置。


    ![images](img/0430.jpg)


    **图 4–30.** *放大镜让你能精准定位光标位置。*


    **注意：** 如果你打算在 iPad 上进行大量打字（例如写一本书），你可能需要考虑购买 iPad 键盘底座或我们在第 3 章中提到的 Apple 蓝牙键盘。实体键盘能将
    iPad 变成更接近传统电脑的形态。此外，如果你是盲打用户，在实体键盘上打字可能会快得多，因为你能感受到按压感和听到敲击声。你也不限于使用 Apple 蓝牙键盘。多款第三方键盘也与
    iPad 兼容。请联系制造商了解其蓝牙键盘的功能。


    #### iPad 打字技巧


    一旦你掌握了键盘的使用，iPad 还提供了其他几种让打字更轻松的方法。本节介绍了一些便捷的 iPad 打字技巧。


    ##### 缩略形式


    当你想输入像 *can’t* 或 *shouldn’t* 这样的缩略形式时，不必费心输入撇号。iPad 足够智能，能猜到 *cant* 就是 *can’t*（图
    4–31）。当然，如果你是在谈论英国盗贼的隐语，请务必轻点该单词拒绝将名词改为缩略形式。


    当你输入像 *we’ll* 这样的词时，其非缩略形式 *well* 是一个常见词，请多加一个字母 *l*。iPad 会将 *welll* 更正为 *we’ll*，将
    *shelll* 更正为 *she’ll*。


    ![images](img/0431.jpg)


    **图 4–31.** *“Cant” 变为 “Can’t”。*


    **提示：** 其他缩略形式技巧包括 *itsa*，它会被更正为 *it’s*，以及 *weree*，它会被更正为 *we’re*。


    ##### 标点符号


    在句子末尾时，轻点标点符号键，然后轻点你想使用的项目（例如问号或句号），最后轻点空格键。iPad 足够智能，能识别出句子末尾并将你带回字母模式。在常规打字过程中，你也可以双击空格键来添加句点后跟空格。这个双击技巧可以通过
    `设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg) `键盘` ![images](img/U001.jpg)
    `“.” 快捷方式` 来控制。


    ##### 重音符号


    长按任意键盘字母键，可查看该字母的变体形式。例如，长按 *e* 会显示添加 e、é 或 ê 的选项（以及其他重音符号），如图 4–32 所示。这个快捷方式让输入外来词变得容易得多。要选择非英语键盘，请前往
    `设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg) `国际` ![images](img/U001.jpg)
    `键盘`，然后从 iPad 长长的外语变体列表中进行选择。


    ![images](img/0432.jpg)


    **图 4–32.** *iPad 处理重音符号非常专业。*


    ##### 大写锁定


    要启用大写锁定功能，请前往 `设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg) `键盘偏好设置`。当此功能启用时，你可以双击
    Shift 键来切换锁定开关。


    ##### 单词删除


    当你按住 Delete 键时，iPad 开始时逐个删除字母，然后继续。但如果你按住的时间超过大约一行文本的长度，它会切换到单词删除模式，并开始一次删除整个单词。


    ##### 自动大写


    自动大写功能意味着 iPad 会自动将句子开头的单词大写。因此，你可以输入 *the day has begun*，iPad 足够智能，会将 *the* 大写，变成
    *The day has begun*。这意味着你无需担心在每句开头按 Shift 键，甚至输入 *i* 时也不用，因为 *i went to the park*
    会变成 *I went to the park*。在 `设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg)
    `键盘偏好设置` 中启用或禁用自动大写。

