  trans: '

    #### 关于同步数据的一点说明


    iPad 的存储容量起步仅为 16GB。我们中许多人的音乐或电影库甚至比 iPad 最大存储选项还要大得多。如果你有一台 16GB 的 iPad 和一个 20GB
    的音乐库，你不仅无法装下所有音乐，而且，即使你只选择 16GB 的音乐库，也没有空间存放照片、电影、书籍或应用程序。认识到这一现实后，苹果公司设计了这些设置偏好，以帮助你整理和选择最重要的数据并将其传输到
    iPad。我们接下来讨论的选项卡将帮助你选择要同步到 iPad 的内容。


    **注意：** 像 `Air Video`、`Dropbox`、`LogMeIn` 和 `Air Sharing Pro` 这样的应用程序提供了将本地存储卸载到远程服务器的方法，让你可以释放
    iPad 上的空间。`Air Video` 无需同步整部电影，只要你有可用的网络连接，它就能将媒体从你的家庭电脑流式传输到 iPad。`Dropbox`、`LogMeIn`
    和 `Air Sharing Pro` 都允许你将数据传输到远程服务器（`Dropbox` 和 `Air Sharing Pro`）或你家中或办公室的台式电脑（`LogMeIn`
    和 `Air Sharing Pro`）。


    请注意，虽然你可能无法将所有的音乐、照片和电影都放进 iPad，但你可以轻松地更改 iPad 上的内容。例如，在 iPad 上看完一部电影后，你可以删除它并用另一部替换。此外，有些文件比其他文件更大。电影通常是最大的，因此如果你想腾出空间，它们是删除的首选。联系人、日历和图书集都是基于文本的文件，而文本占用的空间非常小，所以不必担心将所有这些东西同步到
    iPad 上。


    #### 从哪里获取媒体内容？


    iPad 是一个很棒的休闲设备，用于消费媒体内容。但你从哪里获取这些媒体呢？将电影、音乐、电视节目和书籍放到 iPad 上最简单直接的方式是通过电脑上的 iTunes
    Store（参见图 2–5）。在 iTunes Store 中，你可以按歌曲或专辑购买音乐，租借或购买电影，按集下载你喜欢的电视节目，或订阅季票，还可以下载免费的播客和
    iTunes U 内容。


    ![images](img/0205.jpg)


    **图 2–5.** *iTunes Store 是全球最大的音乐商店。你还可以从中下载电影、电视节目、应用程序、播客和书籍。*


    你也可以从自己的收藏中导入音乐和电影。使用 iTunes 从 CD 导入音乐很简单，导入视频也不难。将电影放到 iPad 上的一种方法是从你的 DVD 收藏中抓取。


    **注意：** 抓取 DVD 意味着将光盘中的内容复制为可在其他设备（包括 iPad）上播放的格式。要将 DVD 中的视频加载到 iPad 上，请从 [`http://handbrake.fr`](http://handbrake.fr)
    下载一份 HandBrake（适用于 Windows 和 Mac），然后将你的 DVD 内容转换为 iPad 兼容的格式。HandBrake 是免费的，而且易于使用。将
    DVD 插入电脑，运行该应用程序，然后按照程序中的指示操作。电影抓取完成后，您可以自动将其添加到 iTunes（检查您的设置）或手动将其拖放到 iTunes
    中。


    要获取应用程序，你必须使用 iTunes App Store。没有其他方法可以为你的 iPad 添加新的软件项目。你可以从桌面版的 iTunes 或 iPad
    上专用的 App Store 应用中轻松浏览应用程序，这将在第 8 章进一步介绍。


    你可以通过多种方式建立你的 iPad 电子书库。也许最简单的方式是通过苹果的 iBookstore 购买书籍（详情见第 8 章），它是苹果免费下载的 iBooks
    应用的一部分。你也可以利用古登堡计划（[`www.gutenberg.org`](http://www.gutenberg.org)）中超过 33,000
    本免费电子书，将书籍下载到你的下载文件夹，然后拖入 iTunes。还有许多电子书店和出版商直接在线销售电子书。要获取一个销售电子书的好网站列表，请访问 [`www.epubbooks.com/buy-epub-books`](http://www.epubbooks.com/buy-epub-books)。


    **注意：** 电子书有多种格式。与 iPad 的 iBooks 应用兼容的格式是 ePub（提供完全交互式的书籍功能，包括调整字体大小和页面重新布局）和
    PDF（简单的文档显示；所见即所得）。在 iBookstore 之外购买电子书时，请确保其格式为 ePub 或 PDF，否则你需要寻找另一个能够读取你电子书格式的应用，或者使用像
    Calibre（[`http://calibre-ebook.com`](http://calibre-ebook.com)）这样的转换器。例如，从亚马逊
    Kindle 商店购买的书籍可以在 iPad 上阅读，但不能在 iBooks 应用中阅读。你需要下载亚马逊免费的 Kindle for iPad 应用（从
    iTunes App Store）来阅读从亚马逊购买的 Kindle 格式电子书。


    #### 记得应用你的更改


    在你通过设置面板（如下节所述）在 iTunes 中更改 iPad 设置后，这些更改直到你点击容量条右侧的灰色“应用”按钮（参见图 2–6）才会最终生效。如果你忘记点击它，iTunes
    会在你离开 iPad 设置面板之前自动提醒你。如果你误改了设置面板中的内容，只需单击“应用”按钮上方的“还原”按钮即可。请注意，当你选择添加或删除媒体时，容量条会增长或缩小；这发生在你同步之前，让你能够监控一旦提交同步，你将使用
    iPad 的多少存储空间。


    ![images](img/0206.jpg)


    **图 2–6.** *“还原”和“应用”按钮允许你接受或否定你在 iTunes 的 iPad 设置面板中所做的任何更改。*


    ### 选项卡


    沿着 iPad 设置面板顶部排列的选项卡（参见图 2–7）是你浏览所有 iPad 设置的方式。总共有十个选项卡：摘要、信息、应用、音乐、电影、电视节目、播客、iTunes
    U、图书和照片。要开始配置任何选项卡上的设置，只需单击该选项卡即可选择它。


    ![images](img/0207.jpg)


    **图 2–7.** *每个设置选项卡都提供了不同的方式来控制 iTunes 将你的 iPad 与家庭媒体库同步的方式。*


    #### 摘要选项卡


    摘要选项卡（参见图 2–3）是你在 iPad 设置面板中看到的第一个选项卡。它显示了你 iPad 的概览，包括 iPad 的名称、容量、当前安装的固件版本和序列号。在此页面，你可以检查固件更新，将
    iPad 恢复到全新的出厂状态，并设置选项来帮助你管理数据同步的方式。该页面分为三个部分：iPad、版本和选项。

    '
- fmt: '### iPadBox


    In this box an image of your iPad is displayed along with its name, capacity,
    software version, and serial number, which are described in the following list.
    The iPad image should match the model and color of your device.


    - **Name**: This is whatever name you have given your iPad. To rename it, click
    the iPad in the source list. This opens a text edit field around the name. Edit
    the name as desired (see [Figure 2–8](#Chapter02.html#fig_2_8)), and then press
    Return or Enter to confirm your change.

    - **Capacity**: This number indicates the actual data capacity of your iPad. As
    with all data storage, the advertised capacity (16GB, for example) never quite
    matches the actual capacity (14.03GB).


    > **NOTE:** The difference between the actual data capacity and the advertised
    capacity is due to the fact that the advertised capacity uses base 10; Apple and
    other manufacturers talk about a gigabyte as 1,000,000,000 bytes. In computer
    terms, this decimal number is worthless. Computers use base 2. To a computer,
    a gigabyte is 1,073,741,824 bytes, so the advertised 64,000,000,000 bytes for
    a 64GB iPad get cut down to about 59.6 computer-sized gigabytes. Add in some overhead
    for the operating system''s file structure, and boom, you’re down to those 59.42GB
    that your iTunes screen mentions for your 64GB iPad. All sorts of useless lawsuits
    have been filed over this issue throughout the years, and this is still the way
    things are done in the mass-storage industry.


    - **Software Version**: The iPad regularly updates its software with bug fixes
    and improvements. iTunes indicates which firmware release is currently installed
    on your iPad. Click the phrase Software Version to switch to the Build Version
    display, showing which firmware build you are using. As this book is being written,
    the latest iPad software is release 4.3.1, with build 8G4.

    - **Serial Number**: This unique serial number identifies your iPad to Apple.
    Click the phrase Serial Number to reveal your unit’s UDID, or unique device identifier.


    > **TIP:** Use the serial number to check your current warranty status at the
    Apple Self Solve website ([https://selfsolve.apple.com/GetWarranty.do](https://selfsolve.apple.com/GetWarranty.do)).
    There, you can see whether you have properly registered your device, whether you
    have active telephone technical support service, whether you are covered for repairs
    and service, and the details about your AppleCare protection plan. If you have
    not yet signed up for AppleCare service for your new iPad, you can do so directly
    at the Self Solve site. It prompts you for billing information and processes your
    credit card payment. AppleCare extends your iPad coverage to 2 years from the
    purchase date of your hardware.


    > **NOTE:** You can use the UDID to register your iPad for certain developer beta
    tests (called ad hoc builds). Copy this value to memory via Edit ![images](images/U001.jpg)
    Copy and then paste it into an e-mail to send your UDID to a developer. Although
    your UDID is not a particularly sensitive piece of information, you probably should
    not share it freely with others, just in case some as-yet-unknown exploit finds
    a use for UDIDs. Send it only to trusted developers, who will register it at Apple
    to enroll you in their ad hoc distribution program. Another, simpler, way to share
    your UDID with others is to download the free Ad Hoc Helper application from the
    App Store. You can get to the proper iTunes page by loading this URL into your
    web browser: [http://itunes.apple.com/app/ad-hoc-helper/id285691333?mt=8](http://itunes.apple.com/app/ad-hoc-helper/id285691333?mt=8).


    In general, the only things that could change in the iPad box are your iPad’s
    software version number and your iPad’s name. When you perform a software update
    to the iPad, this field matches its new version number. This provides an easy
    way to determine what version of the iPad OS you are using. If you change the
    name of your iPad by clicking its name in the iTunes source list and then editing
    the text (see [Figure 2–8](#Chapter02.html#fig_2_8)), the Summary tab reflects
    that change. Your iPad’s capacity and serial number will never change.


    ![images](images/0208.jpg)


    **Figure 2–8.** *Click your iPad’s name in the iTunes source list to rename it
    to anything you want. The name change will be reflected on the Summary tab.*


    ### Version Box


    The Version box allows you to manually check for iPad OS software updates by clicking
    the Check for Update button. Next to the button you will see text notifying you
    whether your iPad software is up-to-date or an update is available. Sometimes
    iTunes will notify you that there is a software update available before you’ve
    even clicked the Check for Update button. It knows this because iTunes automatically
    checks for iPad OS updates once a week. The text next to the button also tells
    you when iTunes will next automatically check for an update.


    > **NOTE:** If there is an iPad software update available, you should install
    it. Sometimes updates provide new features; other times they provide simple bug
    fixes. Apple rigorously tests these updates before releasing them to the public,
    so it’s safe to assume the updates will make your device better (whether you notice
    it or not). Confused between the Restore and Update options? Updates offer newly
    released firmware from Apple. Installing an update leaves your data and applications
    unchanged. Restoring your iPad returns it to a factory-fresh state, removing all
    apps and data.


    Below the Check for Update button is the Restore button. You may experience problems
    with your iPad at some point and need to restore your unit to its factory-fresh
    settings. To do this, click the Restore button and follow the prompts (see [Figure
    2–9](#Chapter02.html#fig_2_9)). Backing up your unit saves both your settings
    and your data to your computer. The restore process wipes all information from
    your iPad and reloads the most recent firmware. After restoring, use your backup
    data to reload your personal settings, contacts, bookmarks, and photos to your
    iPad.


    You can, if needed, restore your iPad to a firmware version other than the current
    one. Select which iPad firmware to restore to by pressing the Shift key (on Windows)
    or Option key (on a Mac) while clicking the Check for Update button or the Restore
    button. iTunes opens a file dialog box in which you can navigate to the `.ipsw`
    file (which stands for iPad software; these files are actually renamed ZIP archives,
    which you can unzip and explore if you’re so inclined) you want to use, select
    it, and perform your update or restoration.


    ![images](images/0209.jpg)


    **Figure 2–9.** *After a restore, you’ll have the option of putting back all your
    data on the iPad as it was before.*'
