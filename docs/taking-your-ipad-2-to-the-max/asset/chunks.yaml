  trans: "\n# 搜索\n\niPod 应用提供了一个易于使用的搜索功能，让您能快速找到歌曲。当您拥有庞大的媒体库，不想花时间翻阅冗长的歌曲列表时，这功能就超级实用。轻点\
    \ iPod 应用屏幕右上角的搜索栏，键盘就会弹出。输入搜索关键词时，搜索结果列表会自动开始填充您屏幕的主要部分（参见图 7-29）。\n\n![images](img/0729.jpg)\n\
    \n**图 7-29.** *iPod 应用的搜索功能*\n\n您可以通过轻点键盘上方的相应按钮，按歌曲、艺人、专辑、作曲家、播客或有声书来浏览搜索结果。如图\
    \ 7-29 所示，哪些按钮处于激活状态取决于您已载入 iPad 媒体库中的媒体类型。\n\n您也可以用手指滚动查看结果。这样做会隐藏键盘，以便您看到更长的结果列表。要重新调出键盘，只需再次轻点搜索栏即可。轻点任意歌曲即可播放。您的搜索结果列表会一直保留，直到您导航到源列表中的某个类别或播放列表，或轻点搜索栏中的\
    \ `×` 按钮。\n\n**提示：** 您也可以在不打开 iPod 应用的情况下搜索歌曲。使用主屏幕左侧的 iPad 聚焦功能来搜索歌曲；然后轻点它即可开始播放。\n\
    \n# 在其他应用中显示音乐播放控制\n\n我们已经提到过，即使您离开 iPod 应用，您的音乐、播客和有声书仍会继续播放。好消息是，您无需返回 iPod\
    \ 应用就能切换曲目。只需快速连续双击 iPad 的实体主屏幕按钮，调出最近使用的应用列表，然后向右滑动即可找到您的 iPad 播放控制（参见图 7-30）。在这个小的弹出窗口中，您可以浏览歌曲、调节音量或选择\
    \ AirPlay 目标。要关闭此面板，请轻点主屏幕上的任意位置。轻点右侧的 iPod 图标可直接跳转至 iPod 应用。\n\n![images](img/0730.jpg)\n\
    \n**图 7-30.** *这些 iPad 控制项会出现在您最近使用的应用左侧。向右滑动即可发现这个小宝藏。*\n\n您也可以在 iPad 锁定时访问这些控制项。只需双击\
    \ iPad 的主屏幕按钮，iPod 导航栏就会出现在屏幕顶部（参见图 7-31）。\n\n![images](img/0731.jpg)\n\n**图 7-31.**\
    \ *只需轻按两下 iPad 的主屏幕按钮，iPod 选项便会出现在 iPad 的锁定屏幕上。即使 iPad 已锁定，您也可以使用这些按钮和滑块来控制音乐播放。*\n\
    \n# iPod 应用设置\n\n令人惊讶的是，对于像 iPod 这样功能丰富的应用，iPad 为其音乐播放器只提供了少量设置。您可以在“设置” ![image](img/U001.jpg)\
    \ iPod 中找到这些设置（参见图 7-32），它们的作用如下：\n\n*   *音量检查*：假设您正在听一首录制音量过低的歌曲。于是，您在播放时调高了音量。然后当下一个歌曲开始播放时，*轰！*——您的耳膜就遭殃了。音量检查可以防止这个问题。当您启用音量检查后，所有歌曲都会以大致相同的音量水平播放。\n\
    \n    **提示：** 您也可以在 iTunes 中使用音量检查。在 Windows 上选择“编辑”![image](img/U001.jpg)“偏好设置”![image](img/U001.jpg)“播放”![image](img/U001.jpg)“音量检查”，或在\
    \ Mac 上选择“iTunes”![image](img/U001.jpg)“偏好设置”![image](img/U001.jpg)“播放音量检查”。\n\
    \n*   *均衡器*：iPad 提供了多种均衡器设置，有助于强调不同类型音乐的回放效果。您可以从“原声”、“舞曲”、“有声读物”以及许多其他预设中进行选择。要禁用均衡器，请选择“关闭”。\n\
    *   *音量限制*：面对现实吧，个人音乐播放器让您的音频变得非常贴近个人——实际上如此贴近，以至于您的听力可能面临风险。虽然不是专门的音乐播放器，但 iPad\
    \ 也不例外。我们强烈建议您利用 iPad 内置的音量限制功能来保护您的耳朵。轻点“音量限制”，然后使用滑块调节最大音量。滑动到最左边是静音——当然，这样可以保护您的耳朵，但您也什么都听不到了。滑动到最右边是正常的、无限制的最大音量。如果您极度担心，或者更常见的情况是，如果儿童可以使用您的\
    \ iPad，请轻点“锁定音量限制”以打开一个屏幕，允许您设置音量限制的密码。没有正确的密码，任何人都无法覆盖您的音量设置。\n*   *歌词与播客信息*：此设置允许您在播放音频时显示或隐藏歌词和播客信息。您在“正在播放”窗口中查看歌曲或播客时，将看到此信息。\n\
    \n**提示：** 如果您的歌曲没有嵌入歌词，您可以自己添加。在 iTunes 中，选择一首歌曲，然后按下 `Cmd+I`（Mac）或 `Ctrl+I`（Windows）。在歌曲的“简介”屏幕上，导航到“歌词”标签页。您可以将您拥有的歌曲歌词粘贴到歌词字段中。还有一些应用可以搜索您的\
    \ iTunes 歌曲并自动添加歌词信息。在 Mac 上尝试 Get Lyrical ([`www.shullian.com`](http://www.shullian.com))，在\
    \ Windows 电脑上尝试 SoundCrank ([`www.soundcrank.com`](http://www.soundcrank.com))。\n\
    \n![images](img/0732.jpg)\n\n**图 7-32.** *iPod 应用的“设置”屏幕允许您设置均衡器、调整音量限制，以及为 iTunes\
    \ 新的“家庭共享”功能添加凭据。*\n\n# 设置家庭共享\n\n“家庭共享”允许您在 iPad 上播放家庭电脑中存储的音乐。这基本上与 AirPlay\
    \ 的功能相反，AirPlay 是将音乐和视频从 iPad 发送到其他设备进行播放。要使“家庭共享”正常工作，您的电脑和 iPad 必须连接同一个 Wi-Fi\
    \ 网络，并且 iTunes 必须在您的电脑上运行。“家庭共享”是 iTunes 应用本身的一项功能，它必须能够将数据提供给网络，并从网络传送到您的 iPad。\n\
    \n通过在“设置”中输入您的 Apple ID 和密码来启用“家庭共享”（参见图 7-32）。您必须使用与家庭电脑登录时相同的 Apple ID 和密码。如果未能做到这一点，您将无法访问您的音乐。\n\
    \n在您的家庭电脑上，启动 iTunes，然后选择“高级”![image](img/U001.jpg)“打开家庭共享”。输入您的 Apple ID 和密码，然后点击“创建家庭共享”。\n\
    \n从 iPad 这边，您可以通过轻点 iPod 应用源列表顶部的“资料库”项来访问家庭共享媒体（参见图 7-33）。从弹出菜单中选择您想要浏览的共享资料库。选择后，资料库内容可能需要一两分钟来加载（最终会出现一个进度环，让您知道需要多长时间）。加载完成后，家庭共享的资料库会替换当前的资料库，并且“家庭共享”弹出菜单中的勾选标记会切换到正在使用的资料库。您可以通过从“家庭共享”弹出菜单中选择您的\
    \ iPad，随时返回到您的本机资料库。\n\n![images](img/0733.jpg)\n\n**图 7-33.** *从 iPod 应用源列表顶部的“资料库”项访问共享资料库。*\n"
- fmt: '# Summary


    In this chapter, you learned how to watch videos through the `YouTube` and `Videos`
    apps, as well as in the `Safari` web browser. You also learned how to browse and
    play back your music and podcasts using the `iPod` application and `Home Sharing`.


    Here are a few points you should take away and consider:


    - Video playback is consistent across applications. If you can handle video in
    `YouTube`, you''ll know how to use it in `Safari`. The changes between the screens
    are minor and easy to follow.

    - Set up a free `YouTube` account to enjoy the `YouTube` app even more. You''ll
    be able to bookmark your favorite videos, subscribe to video feeds, and rate and
    share your favorite clips.

    - The `iPod` app has three types of playlists: standard, smart, and `Genius`.
    The `iPod` app lets you create and edit two of those kinds: standard, which lets
    you manually add songs to it, and `Genius`, which automatically generates a list
    of songs based on a single song you choose in your music library.

    - Save your ears. Adjust your playback volume using the built-in volume controls
    and limiters. You can find out more about the increasing occurrence of noise-induced
    hearing loss at [www.cdhh.org/resources.php](http://www.cdhh.org/resources.php).

    - Don''t forget about double-tapping the `Home` button to pull up music controls,
    regardless of your current application.

    - `Home Sharing` currently can be used only when your `iPad` and computer share
    the same `Wi-Fi` network. Hopefully, Apple will extend this to remote access in
    future updates. Forcing you to authenticate with your Apple credentials suggests
    that that feature remains just around the corner.


    # Chapter 8


    # Shopping for Apps, Books, Music, and More


    You might think of your `iPad` as an Internet-connected computer, but it''s much
    more than that. It''s also a software store, a bookstore, a music store, and a
    place to buy videos and movies. Why drive to that `Redbox` kiosk to rent a movie
    or wait for a `Netflix` `DVD` to show up in the mail when you can rent a movie
    on your `iPad` and watch it immediately?


    The `iPad` builds upon Apple''s history of building electronic storefronts that
    make it easy to purchase digital content. This started with the `iTunes Music
    Store` on April 28, 2003, resulting in Apple becoming the number-one seller of
    music in the United States just five years later. Now known as the `iTunes Store`,
    Apple''s digital store accounts for 70 percent of all worldwide digital music
    sales.


    Through the `iTunes Store`, you have access to more than 11 million songs available
    worldwide. Your `iPad`, if it is using the U.S. `iTunes Store`, provides access
    to more than 1 million podcasts; 40,000 music videos; 3,000 TV shows; 20,000 audiobooks;
    2,500 movies; and close to 300,000 iPhone and `iPad` apps.


    You don''t need to visit a physical store to buy those apps – they''re all available
    from an application included with every `iPad` called the `App Store`. The `App
    Store` is analogous to a software-specific department in the overall `iTunes Store`,
    and the `App Store` app provides a quick way to search for, learn about, and purchase
    apps from your `iPad`.


    Starting with the launch of the `iPad` on April 3, 2010, Apple opened the virtual
    doors of a new store, the `iBookstore`. Although it doesn''t yet have the selection
    of Amazon''s `Kindle Bookstore`, a large number of classic and new titles are
    available.


    In this chapter, we''ll take you on a virtual shopping spree buying apps, music,
    movies, videos and TV shows, and books, all while sitting with your `iPad` in
    front of you.


    ## The App Store


    The `App Store` opened its virtual doors on July 11, 2008, and as of the printing
    of this book, more than 10 billion apps have been sold. Most of those apps were
    written for the `iPhone` and `iPod touch` but can run on an `iPad` unchanged.
    Many apps have been written especially to take advantage of the larger screen
    and faster processor of the `iPad`, and some apps run on both platforms but have
    improved capabilities that appear only when viewed on the `iPad`.


    When you activated your `iPad` in `Chapter 1`, you were asked either to enter
    an existing `Apple ID` or to sign up for one. By doing this, Apple set up both
    the payment and authorization mechanism that is used by all of the on-device stores.
    That means you''re ready to make purchases in any of the Apple stores directly
    from your `iPad`.


    When you launch the `App Store` on your `iPad`, you''re greeted with a screen
    that looks like `Figure 8–1`.


    ![images](images/0801.jpg)


    **Figure 8–1.** *The iPad App Store*


    By default, the `App Store` initially shows you featured apps. How can you tell?
    There are five icons at the bottom of the `App Store` page: `Featured`, `Genius`,
    `Top Charts`, `Categories`, and `Updates`.


    ### Featured Apps


    At the top of the store you''ll see three buttons: `New`, `What''s Hot`, and `Release
    Date`. Each one of these buttons displays a slightly different view of the inventory
    of the `App Store`. Start by looking at the `New` view.'
