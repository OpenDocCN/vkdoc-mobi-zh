  trans: "\n### 其他 FaceTime 通话选项\n\nFaceTime 在通话过程中为您提供了多项高级选项，有助于提升其易用性：\n\n- **切换方向**：您可以将\
    \ iPad 旋转至横屏模式，对方看到的图像也会随之改变。如果您想使用后置摄像头向对方展示某个场景的广角画面，比如后院美丽的日落，那么在 FaceTime\
    \ 通话时使用横屏模式会非常方便。\n\n  **提示：** 为了避免移动摄像头时发生不必要的方向变化，请连按两次主屏幕按钮并向左滑动，直到看到方向锁定按钮，将\
    \ iPad 锁定在竖屏模式。\n\n- **移动画中画**：角落里那个显示对方所见画面的小方块是可以移动的。按住该方块并拖拽至屏幕的任意四个角落。如果这个方块遮挡了屏幕上您想查看的内容，这个功能就会很有用。\n\
    - **在 FaceTime 通话期间进行多任务处理**：您可以在 FaceTime 通话时使用 iPad 上的任何应用。在 FaceTime 通话过程中，按一次\
    \ iPad 的主屏幕按钮即可返回主屏幕。然后您就可以启动想要的任何应用。要返回 FaceTime 通话，请点击屏幕顶部发光的绿色“轻点以继续 FaceTime”栏（图\
    \ 15–22）。\n\n![images](img/1522.jpg)\n\n**图 15–22。** *您可以在 FaceTime 通话时使用其他应用。完成后，点击屏幕顶部的绿色栏返回\
    \ FaceTime 通话。*\n\n当您进行 FaceTime 通话时，多任务功能尤其好用。例如，与通话对象制定晚餐计划时，您可以同时查看 Yelp 应用来寻找餐厅。\n\
    \n在进行多任务处理时，您仍然可以与对方通话，但双方都无法看到彼此。\n\n### FaceTime 设置\n\nFaceTime 有几项设置。您可以在“设置”应用的\
    \ FaceTime 选项中找到它们（图 15–23）。\n\n![images](img/1523.jpg)\n\n**图 15–23。** *FaceTime\
    \ 设置*\n\n- **开启或关闭 FaceTime**：将 FaceTime 开关点击至“开”或“关”。关闭时，您无法拨打或接听 FaceTime 通话，这意味着在您忙于完成工作时，可能会错过一些特别的乐趣。但启用时，其他人可以随时呼叫您，打断您正在做的事情。\n\
    - **更改您的 FaceTime 地理位置**：点击您蓝色的账户电子邮件。在弹出的菜单中，点击“更改位置”。从地区列表中选择您所在地的新区域。\n- **查看您的\
    \ FaceTime 账户设置**：点击您蓝色的账户电子邮件。在弹出的菜单中，点击“查看账户”。使用您的 Apple ID 和密码登录。图 15–6 中的账户设置屏幕将会显示出来。点击任意字段以更改您的账户设置，例如您的姓名或安全问题。\n\
    - **退出 FaceTime**：点击您蓝色的账户电子邮件。在弹出的菜单中，点击“退出登录”。这将立即将您退出 FaceTime，且不会再有更多警告。要重新登录，请在登录屏幕重新输入您的\
    \ Apple ID 密码。\n- **移除 FaceTime 电子邮件地址**：您可以通过点击该地址，然后点击“移除此电子邮件”按钮来解除与 FaceTime\
    \ 电子邮件地址的关联。\n- **添加更多电子邮件地址**：FaceTime 允许您将多个电子邮件地址与您的 FaceTime 账户关联。如果您在生活中为不同目的使用多个邮箱，这会很方便。例如，您可能有一个朋友邮箱和一个工作邮箱，等等。当多个电子邮件与您的\
    \ FaceTime 账户关联后，他人可以使用其中任何一个向您发起 FaceTime 视频通话。\n\n要添加更多电子邮件，请点击“添加另一个电子邮件”按钮，然后输入您的其他电子邮件地址。为您拥有的每个电子邮件地址重复此步骤。每添加一个电子邮件，您都需要检查该邮件账户中来自苹果的\
    \ FaceTime 验证邮件，并点击邮件中的链接，然后该电子邮件地址才能被添加到您的 FaceTime 账户中。\n\n### 总结\n\n前置和后置摄像头为\
    \ iPad 增添了一些出色的功能。高清视频录制能力令人惊叹，但静态摄影方面，即使考虑到 PhotoBooth，也仍有改进空间。此外，FaceTime 是一项极好的功能，随着更多设备兼容\
    \ FaceTime，其受欢迎程度必将增长。以下是使用摄像头和 FaceTime 的更多提示：\n\n- 度假时，*不要*将您的普通数码相机留在家中。是的，您可以用\
    \ iPad 拍摄静态照片，但这更多是用于社交场合，例如快速抓拍朋友或自拍。如果您想捕捉海面上美丽的日落，请使用傻瓜相机。想扭曲自己的脸部并发送给朋友？iPad\
    \ 加上 PhotoBooth 就能实现。\n- 在静态相机模式下，您可以使用数码变焦进行放大，但不能使用光学变焦，但在录制视频时没有变焦选项。\n- 一分钟\
    \ 720p 视频大约占用 120MB 空间。如果您要录制大量视频，请记住这一点，因为您的 iPad 上需要大量可用空间。\n- 苹果对通过电子邮件发送视频的大小有限制。在我们的测试中，视频片段必须为\
    \ 54 秒或更短才能通过邮件发送。如果为 55 秒或更长，系统会要求您在发送前修剪该片段。\n- 在 Wi-Fi 网络覆盖范围内拍照或录制视频时，或者如果您拥有支持\
    \ GPS 的 3G iPad，iPad 的“相机”应用可以为您的照片和视频添加地理数据标签。然后，诸如苹果 iPhoto 之类的应用可以将您的照片显示在地图上。如果您计划在家中或办公室进行大量的\
    \ FaceTime 通话，您可能需要投资购买一个 iPad 底座或一个简单的相框支架，这样就不必一直举着 iPad 了。底座有助于避免我们手持 iPad\
    \ 时出现的鼻孔朝上或双下巴等糟糕视角。\n- 在空中使用 FaceTime！如果您乘坐的飞机提供 Wi-Fi 服务，您可以使用 FaceTime 与地面上的朋友和家人通话。\n\
    - 别忘了使用后置摄像头向对方展示您正在看的内容。您不必把 iPad 转过去给他们看！\n- 对于无法说话的人来说，FaceTime 是一项出色的功能。其屏幕分辨率足够大、足够清晰，手语可以轻松被识别。\n\
    - 当心明亮的背景。如果光线从您身后的窗户直射进来，可能导致对方看到您的剪影。要解决此问题，只需将 iPad 的摄像头稍微远离光源，您的脸就会清晰可见。\n\
    \n## 第 16 章：使用 iPad 的其他绝佳方式\n\n在本书中，我们向您展示了如何使用 iPad 收听音乐、观看电影、撰写电子邮件和文档、使用地图导航以及展示照片，但所有这些（而且内容丰富！）仅仅是个开始。\n\
    \n在本章中，我们将向您展示在日常生活中使用 iPad 的许多其他方式，包括作为厨房帮手、教学工具、游戏设备、艺术家的画布等等！\n\n### 将 iPad\
    \ 用作游戏机\n\n当您只想放松身心时，iPad 是一个很棒的设备。您可以轻松地听音乐、观看喜爱的电视节目以及浏览上次度假的照片。另一种在 iPad 上放松的方式是玩游戏。\n\
    \n无论您是喜欢纸牌游戏、史诗冒险还是体育游戏，总有一款适合您。事实上，在撰写本书时，App Store 中已有超过 4000 款专用的 iPad 游戏，这还不包括可以在\
    \ iPad 上运行的 90000 多款 iPhone 游戏。\n\n这里我们重点介绍一些您可以在 iPad 上玩的游戏类型。\n"
- fmt: '### Pinball HD


    `Pinball HD` (see [Figure 16–1](#Chapter16.html#fig_16_1)) harkens back to the
    times when games existed in three dimensions in the physical world and not on
    a computer screen. You''ll quickly forget that you aren''t playing on an actual
    pinball machine, however, because the level of realism in `Pinball HD` is amazing.
    You can choose from three pinball tables, including the Wild West, a jungle, and
    the deep ocean. The app is a steal at $2.99.


    ![images](images/1601.jpg)


    **Figure 16–1.** *`Pinball HD`*


    ### Air Hockey


    `Air Hockey` (see [Figure 16–2](#Chapter16.html#fig_16_2)) is another iPad game
    that harkens back to the day of nondigital games. What''s so cool about this game
    is that you can play your friend on the same iPad. Because the iPad is a Multi-Touch
    device, it recognizes multiple inputs, and not just from your finger. Launch the
    app, choose a side, and show your friend who rules with the air puck. Best of
    all, it''s only $0.99.


    ![images](images/1602.jpg)


    **Figure 16–2.** *`Air Hockey`*


    ### iFish Pond HD


    This isn''t a game in the traditional sense. Oh, you interact with it as much
    as you would any game, but `iFish Pond HD` (see [Figure 16–3](#Chapter16.html#fig_16_3))
    can be fun even if you don''t touch it. The game gives you a virtual fishpond
    on your iPad screen. Tap the water, and watch it ripple. See the colorful fish
    scurry away from your fingers, only to slowly come back to the calm of the pond.
    Add dragonflies, frogs, and pond lilies as you like; then sit back and enjoy the
    tranquility of nature on your iPad. It''s $2.99.


    ![images](images/1603.jpg)


    **Figure 16–3.** *`iFish Pond HD`*


    ### Hungry Shark Trilogy


    Maybe it''s because we have an unreasonable fear of sharks that we love `Hungry
    Shark Trilogy` so much. It allows us to control the very thing we fear. In `Hungry
    Shark Trilogy` (see [Figure 16–4](#Chapter16.html#fig_16_4)) you play as the shark,
    and your mission pretty much mimics a shark''s real life: your only goal is to
    eat and keep eating. While a singular goal might seem rather monotonous, it''s
    anything but. The `Hungry Shark` world is full of things to explore. As you chomp
    and bite your way though dozens of kinds of fish, penguins, scuba divers, and
    seagulls, you''ll discover just how rich the undersea environment is. There are
    hidden caves, sea mines, and secret objects galore. As the shark, the more you
    eat, the more you grow and the stronger you become, which comes in handy when
    you come across the best boss of any iPad game—the giant crab. Eating also allows
    you to earn points, which unlocks other `Hungry Shark` episodes, or levels, in
    the game. It''s $4.99.


    ![images](images/1604.jpg)


    **Figure 16–4.** *`Hungry Shark Trilogy`*


    ### Mirror''s Edge


    Major game developers are releasing games for the iPad in droves. One of the biggest
    game developers in the world, Electronic Arts, has a host of games out already.
    `Mirror''s Edge` (see [Figure 16–5](#Chapter16.html#fig_16_5)) was originally
    released for the Xbox 360 and PlayStation 3, and Electronic Arts has successfully
    ported it to the iPad, which goes to show just how powerful of a gaming device
    it can be. You play Faith, a “runner” who must get secret information past totalitarian
    police. Using nothing but your fingers and the iPad''s built-in tilt sensors,
    you pilot Faith through her world by making her flip, slide, jump, and run. It''s
    one fun game and is just a hint of the kind of action games you can expect to
    see coming to the iPad in the future. It costs $9.99.


    ![images](images/1605.jpg)


    **Figure 16–5.** *EA''s `Mirror''s Edge`*


    ## The iPad as a News and Weather Center


    The iPad is an awesome device that puts the Internet in your hands. You''ll always
    be able to open the Safari web browser and check out any news site in the world.
    However, websites are different from physical newspapers. They have a different
    layout, and you interact with them differently. Many major newspapers make apps
    for the iPad that enable to you to navigate the newspapers in the format you are
    used to in their physical counterparts. In addition, there are weather apps designed
    specifically for the iPad that show you the weather forecast in a nicer and faster
    way than if you looked it up on the Web. Here we''ll touch on just some of the
    news and weather apps available for the iPad.


    ### News Apps


    It seems that there''s a new news app added to the App Store every day. We''ve
    sorted through the clutter and present to you here four of our favorites. There
    are many more out there—some very good—so browse through the App Store to find
    others that deliver the latest headlines to your iPad as well.


    #### MarketDash by Yahoo! Finance


    Yahoo! Finance is one of the most popular finance sites on the Web. It took a
    while, but Yahoo! Finance has finally released an iPad app in the form of `MarketDash`
    (see [Figure 16–6](#Chapter16.html#fig_16_6)). `MarketDash` presents to you all
    the information that you find on Yahoo! Finance in an elegant and interactive
    package so you can keep up with up-to-the-minute news on financial markets around
    the world. It offers news, stock quotes, price charts, and more. You can create
    a list portfolio of stocks to track, monitor market currencies, and even sign
    in with your Yahoo! ID to automatically track all the portfolios you track online.
    `MarketDash` by Yahoo! Finance is free in the App Store.


    ![images](images/1606.jpg)


    **Figure 16–6.** *`MarketDash` by Yahoo! Finance*


    #### NYTimes for iPad


    The *New York Times* is often referred to as the “newspaper of record” because
    of its long history of reporting on “all the news that''s fit to print” (its slogan
    since 1897). When you browse the `NYTimes for iPad` app (see [Figure 16–7](#Chapter16.html#fig_16_7)),
    you feel as if you''re holding the actual paper in your hand. Tap an article to
    see it displayed in typical newspaper-column view. Even the “paper” the articles
    are on look as if it''s the real paper of the *New York Times*.


    `NYTimes for iPad` offers a selection of the latest news, opinion, and features
    from every section of the paper. You can scroll through an article''s photos and
    even view in-article videos. Best of all, the app stores articles locally on your
    iPad, so you don''t need to be connected to the Internet to read them once you''ve
    downloaded the content. The app is free in the App Store, and while some of its
    content is free, The New York Times does charge subscription fees if you want
    access to all sections of the paper.


    ![images](images/1607.jpg)


    **Figure 16–7.** *`NYTimes for iPad`*


    #### BBC News


    The `BBC News` app (see [Figure 16–8](#Chapter16.html#fig_16_8)) takes the best
    of the BBC''s website and news channels and rolls it into one beautifully designed
    iPad app. Scroll through the latest news in Top Stories, Technology, Business,
    Science & Environment, Regional, and more than a dozen other categories. Listen
    to live BBC Radio from within the app with the tap of a button; watch short video
    news clips; share articles easily via e-mail, Facebook, and Twitter; and even
    read news articles in other languages including Russian, Chinese, Arabic, and
    Portuguese. It''s free in the App Store.


    ![images](images/1608.jpg)


    **Figure 16–8.** *`BBC News`*'
