    You can also add PDFs to iBooks through the iPad''s Mail app. To do this, open
    Mail and select an e-mail that has a PDF attachment. Tap the attachment in the
    body of the e-mail to see it previewed full screen. While previewing it full screen,
    you''ll see an Open In… button in the upper-right corner. Tap this button and
    select iBooks from the drop-down list (see [Figure 9–28](#Chapter09.html#fig_9_28)).
    The Mail app will close, and the PDF will automatically open in iBooks and be
    added to your PDF bookshelf. When you sync your iPad with iTunes, any PDFs you
    have added to iBooks in this manner will be added to your iTunes books library.


    ![images](images/0928.jpg)


    **Figure 9–28.** *Opening a PDF in iBooks using Mail*


    ### Navigating the PDF Bookshelf


    To see all your PDFs contained by iBooks, open iBooks, tap the Collections button
    in the iBooks Menu bar, and then tap the PDFs button (see [Figure 9–7](#Chapter09.html#fig_9_7)).
    Doing so will take you to your PDF bookshelf. As you can see in [Figure 9–29](#Chapter09.html#fig_9_29),
    the PDF bookshelf is similar to the regular bookshelf. The PDF bookshelf will
    be populated with any PDFs you have added to iBooks.


    ![images](images/0929.jpg)


    **Figure 9–29.** *The PDF bookshelf is identical to the regular bookshelf. If
    you know how to navigate one, you know how to navigate the other.*


    Just as with the regular bookshelf, you can choose to view your PDFs as icons
    or in a list. In List view, you will find you can sort your PDFs by titles, authors,
    categories, or bookshelf (the way they are arranged in Icon view). List and Icon
    views also present you with a search field, so you can search your PDFs by name
    or author. The PDF bookshelf works just like the regular bookshelf when editing
    and deleting items. Simply tap the Edit button to rearrange or delete PDFs.'
  trans: '

    ### 访问目录、书签与笔记


    点击页面顶部的`目录/书签`按钮（该图标为三个点后接三条横线，如图 9–12 所示），即可直接跳转到目录与书签页面（见图 9–25）。


    目录与书签页面，顾名思义，分为目录和书签两个部分；每个部分都有对应的选项卡。


    ![images](img/0925.jpg)


    **图 9–25.** *目录与书签页面。通过点击相应选项卡可在两者之间切换。点击“继续阅读”按钮可返回书中上次阅读位置。*


    目录选项卡以可滚动列表的形式显示本书的目录。点击目录中的任意条目，即可直接跳转到该位置。


    书签选项卡显示您所有的书签、高亮和笔记。它们分为两个部分：*书签*与*高亮和笔记*。在“书签”标题下，您会看到包含书签的章节名称或编号列表，以及书签所在的页码和添加书签的日期。书签页码旁有一个代表书签的红色丝带图标。点击任意书签图标即可跳转到该书签所在页面。


    在“高亮和笔记”标题下，您会看到您创建的所有高亮和笔记列表。对于每一条高亮和笔记，您会看到其所在第一个句子的开头部分，以及章节名称或编号。同时还会显示页码和标记日期。日期会以您选择的高亮文本颜色显示。如果您根据不同的书签分类使用不同的颜色，例如用蓝色标记反派的引文，用粉色标记主角的引文，那么这个功能会非常实用。


    请记住，每当您创建一条笔记时，都会自动创建一个高亮。您可以轻松区分高亮和笔记。任何笔记的右侧页边距都有一个便签样式的笔记图标。要直接跳转到某个高亮或笔记，只需在列表中点击它。要阅读已创建的笔记而不离开目录页面，请点击页边距中的笔记图标。笔记会从屏幕中弹出（见图
    9–26）。然后您可以点击该笔记调出屏幕键盘进行编辑。点击笔记外部区域即可关闭它。


    ![images](img/0926.jpg)


    **图 9–26.** *在书签页面上阅读笔记。*


    要退出目录/书签页面，点击“书库”按钮返回您的书架，或点击“继续阅读”按钮返回书中上次阅读位置。


    #### 分享笔记


    iBooks 应用允许您以两种方式分享您写的笔记：通过电子邮件发送或打印。要分享笔记，请点击目录页面顶部的“分享”按钮。“分享”按钮看起来像一个从盒子中射出的箭头。在出现的分享菜单中，点击“邮件”按钮创建一封包含所有笔记内容的新邮件，或点击“打印”按钮将笔记发送到支持
    AirPrint 的无线打印机进行打印。


    ![images](img/0927.jpg)


    **图 9–27.** *通过电子邮件发送或打印来分享笔记。*


    ### 让书读给您听


    您不仅可以在 iPad 上阅读书籍，还可以让 iPad 为您朗读书籍。使用 iPad 的 VoiceOver 屏幕阅读技术，您可以让 iPad 为您朗读任何文本，包括整本小说的内容。我们在第
    2 章中讨论过 VoiceOver，但这里我们将介绍如何在 iBooks 阅读中激活它。请按照以下步骤操作：


    1. 开启 VoiceOver。前往 iPad 的主屏幕，点击“设置”，然后依次选择“通用” ![images](img/U001.jpg) “辅助功能”
    ![images](img/U001.jpg) “VoiceOver”。连按三次主屏幕按钮，然后选择“切换 VoiceOver”。

    2. 返回 iBooks 中的书籍。连按三次主屏幕按钮，会弹出一个窗口。点击“开启 VoiceOver”。

    3. 现在您有两个选择。要让设备从页面顶部开始朗读所有内容，请用两根手指并拢向上滑动。屏幕顶部向下所有内容将被朗读。要让设备从您当前阅读位置开始朗读所有内容，请用两根手指并拢向下滑动。从您滑动位置开始的所有内容将被朗读。当
    VoiceOver 到达页面底部时，它会自动为您翻页并继续朗读。

    4. 要停止 VoiceOver 朗读，请用一根手指点击屏幕任意位置。除非您想继续使用 VoiceOver 手势，否则连按三次主屏幕按钮并选择“关闭 VoiceOver”也是一个好主意。


    现在，您可能会想，既然可以直接购买有声读物并同步到 iPad，为什么还要让 VoiceOver 机械的声音为您读书呢？简单的答案是，并非所有书籍都有有声读物格式。还应注意的是，iBooks
    的 VoiceOver 功能并非旨在吸引大量读者；相反，它是一项辅助功能选项，旨在帮助视力不佳的人阅读他们喜爱的书籍。


    **注意：** 部分书籍可能与 VoiceOver 不兼容。


    ### 同步 PDF


    当人们开始尝试使用 iBooks 时，对 PDF 支持的需求非常强烈。苹果倾听了用户的声音，并在 iBooks 1.1 版本中增加了这一功能。无需担心您的
    iBooks 应用是否是最新版本。如果您最近更新或下载了该应用，您拥有的就是支持 PDF 阅读的最新版本。如果您不确定，请打开 iPad 上的 App Store
    应用，检查您的应用是否有可用更新。


    您有两种方式可以将 PDF 同步到 iPad 上的 iBooks：使用 iTunes 或使用 iPad 的“邮件”应用。要通过 iTunes 同步 PDF，只需将您想要同步的任何
    PDF 文件拖入 iTunes 资料库。它们会自动添加到 iTunes 资料库的“图书”部分。下次将 iPad 与 iTunes 同步时，您的 PDF 也会随之同步。


    您也可以通过 iPad 的“邮件”应用将 PDF 添加到 iBooks。为此，请打开“邮件”并选择一封带有 PDF 附件的电子邮件。点击邮件正文中的附件即可全屏预览。在全屏预览时，您会看到右上角有一个“打开方式…”按钮。点击此按钮，然后从下拉列表中选择
    iBooks（见图 9–28）。“邮件”应用将关闭，PDF 会自动在 iBooks 中打开并添加到您的 PDF 书架。当您将 iPad 与 iTunes 同步时，任何以这种方式添加到
    iBooks 的 PDF 都会被添加到您的 iTunes 图书资料库中。


    ![images](img/0928.jpg)


    **图 9–28.** *通过邮件在 iBooks 中打开 PDF*


    ### 浏览 PDF 书架


    要查看 iBooks 中包含的所有 PDF，请打开 iBooks，点击 iBooks 菜单栏中的“选集”按钮，然后点击“PDF”按钮（见图 9–7）。这将带您进入
    PDF 书架。如图 9–29 所示，PDF 书架与普通书架类似。PDF 书架将填充您已添加到 iBooks 的所有 PDF。


    ![images](img/0929.jpg)


    **图 9–29.** *PDF 书架与普通书架完全相同。如果您知道如何浏览一个，自然也就知道如何浏览另一个。*


    与普通书架一样，您可以选择以图标或列表方式查看 PDF。在列表视图中，您可以按标题、作者、类别或书架（图标视图中的排列方式）对 PDF 进行排序。列表视图和图标视图都提供了一个搜索栏，因此您可以按名称或作者搜索
    PDF。在编辑和删除项目时，PDF 书架的工作方式也与普通书架相同。只需点击“编辑”按钮即可重新排列或删除 PDF。

