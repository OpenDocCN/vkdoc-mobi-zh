- fmt: "### Navigating Your Bookshelf\n\nOK, you have a bunch of books downloaded\
    \ and synced. Before you start reading them, let's get a little better acquainted\
    \ with how to navigate all the books on your bookshelf.\n\n![images](images/0903.jpg)\n\
    \n**Figure 9–3.** *From the Title bar of the iBooks bookshelf, you can access\
    \ the iBookstore, navigate between your collections, and access the View and Edit\
    \ modes.*\n\nThe Title bar in the iBooks bookshelf features five buttons:\n\n\
    - `Store`: As mentioned previously, tapping this will take you to the iBookstore.\n\
    - `Collections`: The `Collections` button displays a list of all your book collections\
    \ in iBooks. By default, you'll see two collections:\n    - `Books`: When you\
    \ tap `Books`, you'll be presented with your bookshelf. This contains all the\
    \ e-books you have in the iBooks app.\n    - `PDFs`: Tapping `PDFs` will take\
    \ you to your PDF bookshelf. We'll talk more about the PDF features of iBooks\
    \ in the second half of this chapter.\n\nWe'll also talk about collections in\
    \ detail later on in this chapter.\n\n- `Icon View`: This is the default view\
    \ of your bookshelf. The button with four white squares shows you all your books'\
    \ covers in large, easy-to-see thumbnails.\n- `List View`: This is the button\
    \ next to the `Icon View` button. It has three white lines in it. Tap it to see\
    \ a List view of your iBooks bookshelf (see [Figure 9–4](#Chapter09.html#fig_9_4)).\n\
    \n![images](images/0904.jpg)\n\n**Figure 9–4.** *The List view with sorting options\
    \ by bookshelf, title, author, and category*\n\nWhen you tap the `List View` button,\
    \ you'll notice the genre of the book is displayed next to the book's name. You'll\
    \ also notice that, at the bottom of the screen, you have four ways to sort your\
    \ lists:\n\n- `Bookshelf`: Displays your books in the order that they appear in\
    \ Icon view.\n- `Titles`: Displays your books in alphabetical order by title.\n\
    - `Authors`: Displays your books in alphabetical order by author name.\n- `Categories`:\
    \ Displays your books in genre groups. Books are arranged alphabetically in each\
    \ grouping.\n\nList view also displays a search field in the Title bar. Tap the\
    \ search field to open the keyboard and type in your search keywords. You can\
    \ search through your books library by words in a title or the author's name.\
    \ Tap a book in the search results to open it. Note that you can search for books\
    \ in Icon view, too. All you need to do is pull down on the bookshelf, and a search\
    \ field will be revealed (see [Figure 9–5](#Chapter09.html#fig_9_5)).\n\n![images](images/0905.jpg)\n\
    \n**Figure 9–5.** *The search field in Icon view*\n\n- `Edit`: The `Edit` button\
    \ is in the top-right corner of the bookshelf. Tapping this button will cause\
    \ you to enter Edit mode. Edit mode allows you to rearrange the order of books\
    \ or delete books from your library completely.\n    - **Rearranging books**:\
    \ In Icon view in Edit mode, simply tap and hold a book's cover and drag it to\
    \ a new position on your bookshelf. This is no different from the way you arrange\
    \ apps on your iPad's Home screen. In List view in Edit mode, you can only rearrange\
    \ books in the Bookshelf sorting category. Tap and hold the grip bars on the right\
    \ of the book's genre and drag the book to your preferred position.\n    - **Deleting\
    \ books**: When you tap the `Edit` button in Icon view, you'll see black and white\
    \ *X*s appear on the left corner of a book's cover. Tap the *X* to open a deletion\
    \ confirmation window. Tap `Delete` to remove the book from your iPad. In List\
    \ view in Edit mode, you can delete books from any of the four sort views. Simply\
    \ tap the white Minus Sign (–) button in the red circle, and then tap the `Delete`\
    \ button that appears at the opposite end of the screen to confirm the deletion.\n\
    \n**NOTE:** Deleting a book from the iPad will not delete it from your `iTunes`\
    \ library on your computer. You will be able to resync the book any time you want.\n\
    \nYou may notice that some of your books have a blue or red ribbon in the upper-right\
    \ corner of the cover. The red ribbons say `Sample`, and they signify the book\
    \ on your bookshelf is a sample you've downloaded from the iBookstore. Samples\
    \ will stay on your iPad until you delete them or buy the full book, but they\
    \ will not sync back to your iTunes books library.\n\nBlue ribbons say `New`,\
    \ and they signify that you have not begun reading the book yet. The `New` ribbon\
    \ will appear until you've turned at least one page inside the book (see [Figure\
    \ 9–6](#Chapter09.html#fig_9_6)).\n\n![images](images/0906.jpg)\n\n**Figure 9–6.**\
    \ *Books with the New and Sample ribbons next to a previously read book*\n\n###\
    \ Organizing Your Books into Collections\n\niBooks does a wonderful job of displaying\
    \ your books and PDFs on a digital bookshelf; however there may come a time when\
    \ your book collection grows so large that seeing them all displayed on a single\
    \ iBooks bookshelf might not make for the easiest browsing experience.\n\nLuckily,\
    \ Apple has a built-in feature called `Collections` that allows you to sort your\
    \ books onto different bookshelves for easier organization. In the upper-left\
    \ corner of the iBook screen, you'll see the `Collections` button. Tap it to reveal\
    \ a list of book collections in iBooks (see [Figure 9–7](#Chapter09.html#fig_9_7)).\n\
    \n![images](images/0907.jpg)\n\n**Figure 9–7.** *The Collections menu*\n\nBe default\
    \ you'll see two collections: `Books` and `PDFs`. Any e-books you have will appear\
    \ on their own bookshelf under the `Books` collection, and any PDFs you have will\
    \ appear on their own bookshelf under the `PDFs` collection.\n\n#### Creating\
    \ New Collections\n\nIf you'd like to create new collections to better manage\
    \ your library, you can do so easily:\n\n1.  Tap the `Collections` button so the\
    \ Collections menu appears.\n2.  Tap the `New` button.\n3.  A new collections\
    \ field will appear (see [Figure 9–8](#Chapter09.html#fig_9_8)); enter the name\
    \ of your new collection.\n\n    ![images](images/0908.jpg)\n\n    **Figure 9–8.**\
    \ *Creating a new collection*\n\n4.  When you have entered your collection's name,\
    \ click `Done` and your new collection will be created.\n\n##### Adding Books\
    \ and PDFs to Your Collections\n\nOnce you've created a new collection, you need\
    \ to add some books or PDFs to it. Follow these steps to add books or PDFs to\
    \ a collection:\n\n1.  Tap the `Edit` button in the upper-right corner of an iBooks\
    \ bookshelf.\n2.  Tap the book(s) or PDF(s) you want to add to a collection. The\
    \ selected book or PDF cover will fade, and a blue Checkmark icon will appear\
    \ in its lower-right corner (see [Figure 9–9](#Chapter09.html#fig_9_9)).\n3. \
    \ Tap the `Move` button in the top-left corner of the iBooks bookshelf. The collections\
    \ list will be displayed (see [Figure 9–9](#Chapter09.html#fig_9_9)).\n4.  Choose\
    \ the collection you want to add the selected books or PDFs to by tapping its\
    \ name. An animation will show the selected books flying into the selected collection,\
    \ and you'll be taken to that collection's bookshelf, where you'll now find your\
    \ selected books or PDFs.\n\n![images](images/0909.jpg)\n\n**Figure 9–9.** *Separating\
    \ books into collections*\n\n**Note:** You can only place a specific book or PDF\
    \ in one collection at a time. When you add a PDF or book to a collection, it\
    \ is removed from its previous collection.\n\n#### Navigating Between Your Collections\n\
    \niBooks makes it easy to navigate between your collections. In fact, it gives\
    \ you two ways to do this:\n\n- Tap the `Collections` menu and then tap the collection\
    \ you want to view.\n- Or, from any collections bookshelf, drag your finger left\
    \ or right to swipe to the previous or next collection."
