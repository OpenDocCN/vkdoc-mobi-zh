- fmt: '### Insert


    The `Insert` button looks like a little drawing of a landscape. It inserts media
    from your Photos library, tables, charts, or shapes into your document (see [Figure
    14–10](#Chapter14.html#fig_14_10)).


    The `Media` tab adds pictures in the `Photos` app to your document. `Tables` provides
    a number of attractive and colorfully shaded preformatted tables for displaying
    tabular information in your document. With `Charts`, there''s a choice of bar,
    column, area, line, scatter, and pie charts in six bright colors to add to your
    document. Double-tapping a chart you''ve inserted displays a simple spreadsheet
    for editing the charted information. Finally, if you need to add a box, a cartoon
    balloon, a line, or geometric shapes to your `Pages` document, just tap `Shapes`.


    ![images](images/1410.jpg)


    **Figure 14–10.** *Use the `Insert` button to add images, tables, charts, or shapes
    to your `Pages` document.*


    Once you''ve added a table, a chart, or a shape to a document, tapping that element
    and then tapping the `Info` button displays a pop-up that makes changing options
    for that element a snap. We''ll describe the table and chart options in more detail
    when we talk about `Numbers`.


    ### Tools


    The little wrench-like icon that''s next on the toolbar is the `Tools` button
    (see [Figure 14–11](#Chapter14.html#fig_14_11)). It''s used to change settings
    that apply to the document as a whole, and is also where to go if you want to
    print a `Pages` document.


    ![images](images/1411.jpg)


    **Figure 14–11.** *The `Tools` button in `Pages` provides features that apply
    to a complete document, not just a word or paragraph.*


    Do you need to find and replace a word or phrase in a document? `Find` searches
    your entire document for a set of characters, replaces them (if you''ve chosen
    the `Find and Replace` option), and can even match case or complete words if you
    need a more finely tuned search (see [Figure 14–12](#Chapter14.html#fig_14_12)).


    ![images](images/1412.jpg)


    **Figure 14–12.** *The `Find` function under the `Tools` button in `Pages` is
    a powerful tool for making global replacements throughout a document.*


    Printing was added to the iPad with the release of the iOS 4.2 operating system
    in late 2010. An Apple feature called `AirPrint` browses for compatible printers
    on your Wi-Fi network, and then displays those printers when you tap on the `Print`
    item under `Tools`. Selecting the number of copies for printing and tapping the
    `Print` button sends the current `iWork` document to the chosen printer.


    Unfortunately, at the time of publication there were very few printers that were
    compatible with `AirPrint` right out of the box. However, several software vendors
    have developed applications for Mac and Windows that make any shared printer compatible
    with `AirPrint`.


    `Ecamm Network` developed `Printopia` ($9.95, [`www.ecamm.com/mac/printopia/`](http://www.ecamm.com/mac/printopia/))
    for Mac, which gives Mac owners an opportunity to select the printers they wish
    to share with iPads on their networks (see [Figure 14–13](#Chapter14.html#fig_14_13)).
    For those who own Windows computers or Mac owners who want the ability to send
    photos directly to iPhoto can try `Collobos FingerPrint` ($7.99 for Mac, $9.99
    for Windows, [`www.collobos.com/`](http://www.collobos.com/)). Both applications
    also have added features, such as the ability to send documents to your PC or
    Mac, or save them to the popular `Dropbox` cloud storage service.


    ![images](images/1413.jpg)


    **Figure 14–13.** *`Print`, found under the `Tools` button on the `Pages` toolbar,
    displays printers or print-to-file services hosted by applications such as `Printopia`
    or `FingerPrint`.*


    Tapping the `Document Setup` button on the `Tools` menu displays a blueprint-like
    layout of the document on which you can tap and edit headers and footers or move
    the document margins.


    The `Settings` button under `Tools` provides access to settings such as turning
    center and edge guides on or off. What are center and edge guides? If you have
    more than one object on a page, dragging one of them will display alignment guides
    so you can see when the center or edges of the objects line up. Turning edge guides
    off means that only the center guides appear when moving objects, while disabling
    center guides makes only the edge guides visible. If you don''t need alignment
    guides, you can disable them. There''s also a word count feature that, when enabled,
    displays a running total of words in a document.


    The last tool under `Settings` enables or disables the real-time spelling checker.
    As you type in a `Pages` document, words that might be misspelled appear with
    a red dotted underline. Tapping the word displays any possible replacements, and
    tapping one of those inserts the replacement word. If you find the constant reminders
    to be annoying, disable the spelling check.


    Tapping the final button under `Tools`, `Go to Help`, starts up Safari and points
    you to Apple''s online help for the `iWork for iPad` suite. There''s a surprising
    amount of information contained in the online help, so if you get stuck using
    a certain feature in `Pages`, `Keynote`, or `Numbers`, be sure to check it out.


    ### Full-Page Display


    Coming to the final icon on the toolbar, one that looks like a pair of arrows
    pointing diagonally, you find the control that can display a full page without
    the toolbar, Style ruler, or anything else. This is most useful when you''re reading
    a document and want to see as much of it as possible.


    ## Numbers


    Once you''re familiar with `Pages` on the iPad, it''s easy to understand how to
    use `Numbers`. For people who need to organize data and numbers, the `Numbers`
    app creates, opens, and saves spreadsheets compatible with Microsoft Excel or
    the Mac version of `Numbers`.


    Not only does `Numbers for iPad` contain a lot of the same spreadsheet features
    of its big brothers on Windows computers and Macs, but it contains charting tools
    for graphically representing information and even form tools for capturing data
    in a spreadsheet.


    Follow along as we introduce you to `Numbers`.'
