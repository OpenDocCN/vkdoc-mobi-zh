    # 总结


    在本章中，你学习了如何通过`YouTube`和`Videos`应用程序以及在`Safari`网页浏览器中观看视频。你还学习了如何使用`iPod`应用程序和`家庭共享`浏览和播放你的音乐与播客。


    以下是几个你应该牢记并思考的要点：


    -   视频播放功能在各应用程序间保持一致。如果你能在`YouTube`中操作视频，那么你也会知道如何在`Safari`中使用它。各屏幕界面之间的差异很小，易于掌握。

    -   设置一个免费的`YouTube`账户，能让你更充分地使用`YouTube`应用。你将能够收藏你喜欢的视频、订阅视频推送，并对你喜爱的片段进行评分和分享。

    -   `iPod`应用有三种类型的播放列表：标准、智能和`Genius`。`iPod`应用允许你创建并编辑其中两种：标准播放列表，你可以手动添加歌曲；以及`Genius`播放列表，它会根据你在音乐库中选择的某一首歌曲自动生成一个歌曲列表。

    -   保护你的耳朵。使用内置的音量控制和限制器来调整播放音量。你可以在[www.cdhh.org/resources.php](http://www.cdhh.org/resources.php)了解更多关于噪声性听力损失日益频发的信息。

    -   不要忘记，无论你当前在使用哪个应用程序，双击`Home`按钮都可以调出音乐控制功能。

    -   `家庭共享`目前仅能在你的`iPad`和电脑处于同一`Wi-Fi`网络下时使用。希望苹果公司在未来的更新中能将其扩展到远程访问。要求你使用苹果账户进行身份验证，暗示着这一功能即将推出。


    # 第 8 章


    # 购买应用、书籍、音乐等更多内容


    你可能认为你的`iPad`是一台连接互联网的电脑，但它远不止于此。它还是一个软件商店、书店、音乐商店，以及购买视频和电影的地方。当你可以直接在`iPad`上租赁并立即观看电影时，又何必要开车去`Redbox`自助租赁机或者等待`Netflix`的`DVD`寄到邮箱呢？


    `iPad`建立在苹果构建电子店面以方便购买数字内容的历史之上。这一切始于 2003 年 4 月 28 日的`iTunes Music Store`，仅仅五年后，苹果便成为了美国第一大音乐销售商。现在被称为`iTunes
    Store`，苹果的数字商店占据了全球数字音乐销量的 70%。


    通过`iTunes Store`，你可以访问全球超过 1100 万首歌曲。如果你的`iPad`使用的是美国`iTunes Store`，你还可以访问超过 100
    万个播客、4 万个音乐视频、3000 个电视节目、2 万本有声书、2500 部电影以及近 30 万个 iPhone 和`iPad`应用程序。


    你无需前往实体店购买这些应用——它们都可以通过每台`iPad`都内置的名为`App Store`的应用程序获取。`App Store`类似于整个`iTunes
    Store`中专门针对软件的区域，而`App Store`应用为你提供了一种快捷方式，可以直接在你的`iPad`上搜索、了解并购买应用。


    自 2010 年 4 月 3 日`iPad`发布以来，苹果打开了一家新商店的大门——`iBookstore`。虽然它的选择尚不及亚马逊的`Kindle Bookstore`，但已有大量经典和新版书籍可供选择。


    在本章中，我们将带你进行一场虚拟购物之旅，购买应用、音乐、电影、视频和电视节目以及书籍，而所有这一切都只需你坐在`iPad`前即可完成。


    ## App Store


    `App Store`于 2008 年 7 月 11 日开设了其虚拟大门，截至本书印刷时，已售出超过 100 亿个应用。这些应用中的大多数是为`iPhone`和`iPod
    touch`编写的，但可以在`iPad`上不经修改地运行。许多应用是专门为利用`iPad`更大的屏幕和更快的处理器而编写的，有些应用在两个平台上都能运行，但只有在`iPad`上查看时才会显示出更强大的功能。


    当你在`第 1 章`中激活你的`iPad`时，系统会要求你输入现有的`Apple ID`或注册一个新的。通过这样做，苹果建立了所有设备内商店共用的支付和授权机制。这意味着你已经准备好直接在你的`iPad`上从任何苹果商店进行购买了。


    当你`iPad`上启动`App Store`时，映入眼帘的界面看起来像`图 8-1`。


    ![images](img/0801.jpg)


    **图 8-1.** *iPad App Store*


    默认情况下，`App Store`最初会向你展示精选应用。你如何辨别？在`App Store`页面底部有五个图标：`精选`、`Genius`、`排行榜`、`类别`和`更新`。


    ### 精选应用


    在商店的顶部，你会看到三个按钮：`新内容`、`热门内容`和`发布日期`。这些按钮中的每一个都会以略微不同的视图展示`App Store`的库存内容。我们先从查看`新内容`视图开始。

    '
- fmt: '### New


    At the top of the page is an ever-changing sample display of new apps. These apps
    have been highlighted by the `App Store` staff as being either unique or best-selling.
    When you see an app that you''d like more details about, just tap it, and a detailed
    app description appears (see [Figure 8–2](#Chapter08.html#fig_8_2)).


    ![images](images/0802.jpg)


    **Figure 8–2.** *Detailed description of an app in the App Store*


    The app description screen displays a large version of the icon that appears on
    your iPad screen, as well as the price, the category that the app is in, information
    about the latest release, compatibility, and customer star ratings and reviews.
    Want to tell a friend about the app that you found? Tap the `Tell a Friend` link,
    and the `App Store` creates an e-mail that you can send to your buddy.


    **NOTE:** If you have purchased an app and have problems with it, tap the `Support`
    button at the bottom of the `Featured` and `Top Charts` pages and you can let
    both `Apple` and the developer know about the issue. This button provides a link
    to `Apple`''s support web pages concerning `iTunes`, and under the heading `App
    Store` and `iBooks` are links that display common troubleshooting tips and an
    `Email Us` button. `Apple` responds to most queries with 24 hours, which makes
    this the most direct way to get an answer. You can also tap the `App Support`
    button on the left side of an app description page (see [Figure 8–2](#Chapter08.html#fig_8_2))
    to contact the developer directly.


    The description of an app shows a maximum of about five lines of information on
    the iPad screen. To read more, tap the `More` link to expand the description (see
    [Figure 8–3](#Chapter08.html#fig_8_3)).


    ![images](images/0803.jpg)


    **Figure 8–3.** *Tapping the `More` link expands the description of an app. Compare
    this description with the five-line description shown in [Figure 8–2](#Chapter08.html#fig_8_2)*.


    Buttons on the left side of the screen provide direct links to the developer''s
    website and support page. The images displayed on the screen scroll, so to see
    all of them, just drag the visible picture to the left.


    We recommend reading the customer ratings and reviews at the bottom of the app
    description page, although they can sometimes be misleading. We find that the
    reviews often point out common issues that other users may be having with the
    app, so you can decide whether to purchase the app now or wait for a revision.
    When you buy an app, you can also rate it and write a review for others to read.
    Ratings are applied by clicking anywhere from one (bad) to five (good) stars.
    If you choose to write a review instead, note that you''ll be asked to sign into
    your `iTunes` account once more and that your review will be screened by `Apple`
    prior to publishing.


    When you''ve decided to purchase an app, all you need to do is tap the price.
    The price turns to a green `Install App` button, which you then tap. A dialog
    box appears on your iPad screen asking you to enter your `iTunes` password and
    then tap `OK`. Once you''ve done that, the app is downloaded and installed onto
    your iPad. You''ll receive an e-mail receipt from `Apple` outlining your purchase
    within a few days.


    **NOTE:** When you tap `OK` and the download begins, the `App Store` closes, and
    the home screen of your iPad appears. Don''t be alarmed; this is normal. This
    also happens when you''re updating apps.


    Let''s go back to the `App Store` for a few minutes and talk about the other areas
    on the `New` screen. Below the spotlighted section is a `New and Noteworthy` section
    of apps (see [Figure 8–4](#Chapter08.html#fig_8_4)). `Apple`''s staff chooses
    this crop of apps from new entries to the `App Store`, and the apps are often
    unique and fun. To scroll through the `New and Noteworthy` apps, tap the white
    arrows on the left and right sides.


    ![images](images/0804.jpg)


    **Figure 8–4.** *`New and Noteworthy` apps are singled out for extra attention
    in the `App Store` for interesting functionality, fun game play, or tremendous
    value.*


    Next on the screen is usually a small group of icons, pointing to an `App of the
    Week`, groups of similar apps (apps for kids or music creation apps, for example),
    or apps that deserve special attention.


    Continuing down the `App Store` screen, there''s a selection of `Staff Favorites`
    (see [Figure 8–5](#Chapter08.html#fig_8_5)). These may not necessarily be new
    apps, but they''ve captured the hearts of the `App Store` staff, and they''d like
    for you to know about them. As with the `New and Noteworthy` apps, you can browse
    through the selection by tapping the white left and right arrows.


    At the bottom of the `App Store` is a set of `Quick Links`. If your account currently
    has an unspent balance, that amount is listed. By tapping that balance, you can
    view or change any of your `iTunes` account information. If you don''t have a
    balance, that information is available by tapping the `Account` button at the
    very bottom of the `App Store` screen.


    See that `Redeem` button in [Figure 8–6](#Chapter08.html#fig_8_6)? That''s a fun
    way to buy apps on someone else''s dime. You may be lucky enough to get a "promo
    code" from a developer. That''s a code that can be redeemed for a free copy of
    an app. When you tap `Redeem`, a dialog box appears into which you can enter that
    code, an `iTunes Gift Card` code, or a gift certificate code number. Enter the
    code and tap `Redeem`, and then enter your `iTunes` password. If you''ve entered
    a promo code for a specific app, that app is downloaded and installed. If you''ve
    entered a gift card or certificate code, then your `iTunes` account is credited
    for the value of the card or certificate.


    ![images](images/0805.jpg)


    **Figure 8–5.** *`Staff Favorites`, `Quick Links`, and the common `App Store`
    buttons are found at the bottom of the `App Store` screen.*


    ![images](images/0806.jpg)


    **Figure 8–6.** *Redeeming promo codes, gift cards, and gift certificates is a
    nice way to buy many apps.*


    The last button on the bottom of the `App Store` screen is for `Support`. Tapping
    this button directs you to the `iTunes` support web page ([`www.apple.com/support/itunes`](http://www.apple.com/support/itunes))
    in the `Safari` web browser.


    The answers to many common questions are found on the `iTunes` support page, so
    be sure to browse through the information before requesting further help. If you
    don''t see an answer for your questions about `iTunes`, the `App Store`, the `iBookstore`,
    or purchases of music or videos, there''s a button for sending an e-mail to the
    `iTunes Store` support team. In most cases, you''ll receive a response within
    24 hours.


    ### What''s Hot


    The `What''s Hot` screen displays a similar layout to `New`, except with a listing
    of `What''s Hot` apps in place of `New and Noteworthy`. This screen also displays
    a frequently updated compendium of apps that are of particular interest to iPad
    users. Shortly after the release of the iPad 2, for example, this section highlighted
    apps that had been specially enhanced for the new device.


    ### Release Date


    Finally, the `Release Date` button on `Featured` provides a scrolling look at
    all apps that have been released, in reverse chronological order. For each day,
    the apps are listed alphabetically. First you''ll see apps released today listed
    in alphabetic order, then apps for yesterday also listed in alpha order, and so
    on.


    **NOTE:** The descriptions of the virtual stores on the iPad are based on how
    they appeared during the writing of this book. `Apple` frequently changes the
    design of the stores, so specific details described in this chapter may be different
    by the time you read this.'
