  trans: '


    ### 视频设置


    你可以调整多项影响视频播放的设置。这些设置需要通过 iPad 的`设置`应用进行访问（参见图 7–7）。


    ![images](img/0707.jpg)


    **图 7–7.** *视频设置偏好*


    - **开始播放**：此设置允许你选择视频是从开头开始播放，还是从上次停止处继续播放。当你想利用零碎时间追一部电影或电视剧时，“从上次停止处继续播放”的功能非常棒。不过，你可能更希望产品演示视频始终从开头播放。

    - **隐藏式字幕**：如果你的视频包含嵌入的隐藏式字幕，你可以将此选项从`关闭`切换为`开启`来查看它们。隐藏式字幕不仅对听力障碍者有帮助。当你在嘈杂的环境（如地铁或拥挤的自助餐厅）中观看视频时，它们也是提升观看体验的绝佳方式。


    iPad 的视频应用还允许你通过家中的电视机播放其中的内容。你需要为此购买额外的线缆，你可以在本章稍后的“视频配件”部分了解相关信息，但视频设置中你可以选择以下选项：


    - **宽屏**：开启此选项可强制宽屏视频在电视上以宽屏模式播放。这能保持其原始宽高比。

    - **电视制式**：选择`NTSC`或`PAL`。如果你在北美或日本，电视很可能是`NTSC`制式。在欧洲、澳大利亚和新西兰，则是`PAL`制式。


    ### YouTube


    在 iPad 上发现、浏览和观看 YouTube 视频的体验，远胜于坐在桌前用电脑观看。iPad 将观看 YouTube 视频变成了一种绝佳的休闲体验，你可以舒适地坐在沙发上尽情享受。


    与视频应用不同，YouTube 应用需要网络连接。只要你至少有 Wi-Fi 连接，就可以正常使用。在本书撰写时，YouTube 也允许你通过 3G 连接观看视频；应用会自动降低视频质量，以减少对你带宽的占用。低质量视频的显示效果虽然不如
    Wi-Fi 连接下的好，但不会很快耗尽你的流量套餐。


    要充分利用 YouTube 应用，你需要拥有一个 YouTube 账户。虽然你*并不一定*需要一个账户才能使用该应用，但拥有一个账户会让应用的功能更强大。有了
    YouTube 账户，你可以查看和收藏你最喜欢的视频；订阅 YouTube 用户的视频；轻点一个按钮即可查看你所有上传到 YouTube 的视频；以及分享、评分和标记视频——所有这些操作都可以在
    YouTube 应用内完成。创建一个 YouTube 账户只需几分钟，可以在[`www.youtube.com/create_account`](http://www.youtube.com/create_account)
    上完成。


    要启动 YouTube 应用，请轻点 YouTube 图标；它看起来像一台复古风格的电视机（如前文图 7–1 所示）。首次启动时，应用会显示“精选”屏幕，如图
    7–8 所示。此屏幕展示由 YouTube 工作人员挑选的视频。


    ![images](img/0708.jpg)


    **图 7–8.** *YouTube 的“精选”屏幕提供了一个视频展台。*


    #### 浏览和查找 YouTube 视频


    YouTube 应用的关键元素包括应用右上角的搜索栏和屏幕底部的七个按钮行。每个按钮（见图 7–9）都提供了不同的方式去发现和欣赏 YouTube 视频。


    ![images](img/0709.jpg)


    **图 7–9.** *YouTube 导航栏*


    - **精选**：此屏幕显示由 YouTube 工作人员审核并推荐的视频。你常能在这里发现一些值得一看、但可能错过的内容。

    - **评分最高**：此屏幕显示 YouTube 上评分最高的视频。你可以选择显示当天、当周或历史所有时间评分最高的视频。观众进行评分后，票数最高的视频会被收录在此。

    - **最多观看**：此屏幕显示 YouTube 上观看次数最多的视频。你可以选择显示当天、当周或历史所有时间观看次数最多的视频。在这里，你会发现通过各种方式（如电子邮件、Twitter
    和 Facebook 推荐）在观众间迅速传播的热门视频。

    - **收藏**：此屏幕显示你已添加到 YouTube 收藏列表中的所有视频。当你轻点屏幕顶部的`播放列表`标签时，此屏幕还会显示你所有的播放列表及其视频列表。这是
    YouTube 应用中需要你拥有 YouTube 账户才能使用的功能之一。要登录你的账户，请轻点左上角的`登录`按钮（见图 7–10）。系统会提示你输入用户名和密码。完成操作后，你收藏过的所有视频都会显示出来。


    ![images](img/0710.jpg)


    **图 7–10.** *`登录`/`退出`按钮位于收藏、订阅和我的视频页面的左上角。轻点它以登录你的 YouTube 账户。*


    要移除一个已收藏的视频，请轻点顶部灰色栏中的`编辑`按钮。你所有已收藏的视频左上角会显示一个带圆圈的 ×。轻点该 × 将该视频从收藏中移除。完成删除收藏后，轻点蓝色的`完成`按钮。（当你删除最后一个收藏且没有剩余收藏时，iPad
    会自动返回收藏屏幕，无需轻点`完成`。）


    **注意：** 在 iPad 上从 YouTube 收藏中移除一个视频，也会将其从你的 YouTube 账户中移除，这意味着无论你从哪个设备登录 YouTube，它都不会再显示在你的收藏中。移除收藏的操作无法撤销。


    - **订阅**：YouTube 允许你订阅其他 YouTube 用户的视频，以便随时了解他们发布的最新视频。你所有的订阅内容都会显示在此屏幕上。轻点用户名即可查看他们显示在列表左侧的所有视频。此功能要求你登录
    YouTube 账户。

    - **我的视频**：此屏幕显示你已上传到 YouTube 的所有视频。此功能要求你登录 YouTube 账户。

    - **历史记录**：此屏幕显示你在 iPad 上观看过的视频。此历史记录不反映你在登录 YouTube 账户后于电脑上观看过的视频。要清除历史记录，请轻点左上角的`清除`按钮。


    你还可以使用位于上述任何一个屏幕右上角的搜索栏来搜索 YouTube 的视频库。


    '
- fmt: '#### Viewing YouTube Videos


    After finding a video you want to watch, what do you do next? This is one of the
    situations where the next step depends on whether you''re holding the iPad in
    landscape or portrait mode. If you tap the video thumbnail in portrait mode, the
    video''s information screen will appear, and the video will automatically begin
    playing in the information screen. If you tap the video thumbnail in landscape
    mode, the video will begin playing full-screen, and you''ll need to tap the `Done`
    button to view the video''s information screen.


    Video information screens provide detailed information for each video. Depending
    on which orientation you are holding your iPad in—landscape or portrait—you''ll
    see that information laid out slightly differently, but either orientation gives
    you the same information. [Figure 7–11](#Chapter07.html#fig_7_11) shows the same
    info screen in both landscape and portrait modes.


    ![images](images/0711.jpg)


    **Figure 7–11.** *A YouTube video''s information screen offers information about
    the video in both landscape and portrait modes. The landscape layout offers a
    list of related videos, the portrait layout shows you a fuller video write-up.*


    On the video information screen you''ll find the name of the video, its rating
    (in stars, from zero to five, when applicable), the number of times the video
    has been viewed, its run time, and more. You''ll also see tabs labeled Related,
    More From, and Comments.


    - **Related**: Shown by default, this tab lists videos related to the one you''re
    watching. YouTube uses some clever tricks to match names, themes, and uploaders,
    among other aspects, to provide a list of videos that are most related to the
    one that you''re currently watching.

    - **More From**: Tap this tab to see more videos from the YouTube user who uploaded
    the video you are currently watching. From this tab you can also tap a `Subscribe`
    button to subscribe to the user''s video feed. The user''s YouTube name and videos
    will show up on the Subscriptions page.

    - **Comments**: Tap this tab to read comments left by other YouTube users about
    the video you are watching. You can also tap the “Add a comment” field to write
    your own comment. You must be logged into your YouTube account to write a comment.


    ##### Managing Videos: Rating, Sharing, and So On


    You can do more with videos in the YouTube app than just sort and view them. While
    in a video''s information screen, you can bookmark, share, rate, and flag the
    video, as well as move from embedded to full-screen playback. Simply tap the video
    to bring up its YouTube control overlay, shown in [Figure 7–12](#Chapter07.html#fig_7_12).


    As you see in [Figure 7–12](#Chapter07.html#fig_7_12), the overlay consists of
    opaque bars at the top and bottom of the video. The bar at the bottom allows you
    to play/pause the video, scrub backward or forward with the slider, and switch
    to full-screen mode by tapping the double-arrow expand button. These are all standard
    controls and operate exactly as you''d expect them to, matching the video interface
    used in other applications. The double-arrow also appears in full-screen mode,
    allowing you to return from full-screen to embedded playback.


    The bar at the top allows you to select several options for managing the video.
    From here, you can add the video to your favorites, share it with others, vote
    on the video (like or dislike), or flag the video as inappropriate. All the top-bar
    options require a YouTube account to apply them. Here''s a quick overview of what
    the options are and how they work.


    ![images](images/0712.jpg)


    **Figure 7–12.** *Tap a video in the video information screen to overlay it with
    a number of management options.*


    **NOTE:** You must be viewing the video in its information screen (i.e., embedded
    mode) to rate the video, share it with others, and so forth. The managing video
    toolbar does not show up when you are playing a video in full-screen mode. The
    only exception is bookmarking. In full-screen mode, a bookmark icon appears next
    to the volume slider at the bottom of the screen. Tap it to add the video to your
    favorites.


    - **Add**: Tap this to bookmark the video to your favorites. If you have more
    than one Favorites list, you''ll be able to select the list you''d like to add
    the video to. The video will immediately appear under the Favorites button in
    the YouTube app.

    - **Share**: Tap this to send a link to the video in an e-mail message. Without
    taking you out of the YouTube app, an e-mail compose window will pop up with the
    name of the video in the Subject field and a link to it in the body of the message.
    Just enter the e-mail address of the person you want to send it to, and you''re
    done! You can also add your own text to the body of the e-mail like any other
    e-mail.

    - **Like/Dislike**: Tapping either button flags the video as one you like (thumbs
    up) or dislike (thumbs down).

    - **Flag**: Tapping this button will display a red Flag as Inappropriate button.
    Tap that to send a notification to YouTube. They will review the video and pull
    it from the site, if they deem it necessary. Be warned: don''t flag videos just
    because you don''t like the content. Flagging is meant only for objectionable
    content. If you falsely flag too many videos, you could have your YouTube account
    suspended.


    **NOTE:** The Rate and Flag buttons will be grayed out when you''ve already rated
    or flagged the video.


    #### YouTube Tips


    Here are some tips for using the YouTube application:


    - Use the `Clear` button at the top-right corner of the History screen to erase
    your YouTube viewing history. People don''t have to know you''ve been watching
    that skateboarding dog.

    - Don''t overlook the Related Videos list. Scroll down on the video information
    screen to find related videos that you may want to view. YouTube is pretty clever
    about adding listings that you may actually want to see.

    - While navigating videos on the Featured, Top Rated, and Most Viewed pages, scroll
    all the way down, and you''ll see a gray video icon with the words “Load More…”
    on it. Tap this to load more videos on the selected page.

    - You can play your YouTube videos out to TV either by connecting your iPad through
    a supported video cable (composite, component, VGA, and HDMI cables are all available
    through the Apple Store) or by selecting an AirPlay destination such as an Apple
    TV or a third-party player like Banana TV.'
