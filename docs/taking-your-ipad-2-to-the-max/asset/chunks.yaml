- fmt: '### Creating a Genius Playlist


    `Genius` is a feature in iTunes that finds songs in your music library that go
    together. It does this by matching rhythm, beat, artists, genres, and Internet
    data. A `Genius` playlist is a list of songs that results when you choose to run
    the `Genius` feature on a song you are listening to.


    You can create `Genius` playlists in iTunes on your computer or on the iPad. However,
    to enable the `Genius` feature, you need to turn it on through iTunes on your
    computer first. To do this, launch iTunes on your computer, go to the `Store`
    menu, and select `Turn on Genius`. You''ll need to log in with an iTunes Store
    account (see [Chapter 8](#Chapter08.html#ch8) for creating an iTunes account)
    to access the `Genius` features. Enter your username and password, agree to the
    terms and conditions, and sit back as Apple analyzes your music library.


    You can create `Genius` playlists in two ways:


    - Tap the `Genius` icon at the bottom of the main iPod app screen (see [Figure
    7–17](#Chapter07.html#fig_7_17)). The icon looks like an atom surrounded by electrons.
    If no song is playing, you''ll be presented with a list of songs like you were
    when you created a playlist. Tap a song to base the `Genius` playlist on.

    - From the `Now Playing` window, tap the `Genius` icon in the center of the bottom
    bar (see [Figure 7–20](#Chapter07.html#fig_7_20)).


    A new playlist named `Genius` appears in your music library''s source list. In
    its list of songs, you can scroll through to see what `Genius` has picked out.
    The playlist offers three options via three buttons at the top of the song list:


    - **New**: Tap `New` to start a new, fresh `Genius` list. The iPod app presents
    you with a list of your songs to choose a new song from. Select the song you want
    to base your playlist around, and let the built-in `Genius` feature do its work.

    - **Refresh**: Tap `Refresh` to rebuild the `Genius` playlist around your original
    song. This allows you to retain the same playlist styling with an updated selection
    of tracks matching that theme. This is a great feature if you''re exercising and
    finish the playlist but want to keep going with the same kind of songs you just
    listened to.

    - **Save**: Did `Genius` generate an absolutely awesome collection of songs that
    you want to keep around to play over and over again? Tap `Save` to keep your `Genius`
    playlist for later. After tapping `Save`, the name of the playlist changes from
    `Genius` to the name of the song you chose to create the playlist.


    ### Editing a `Genius` Playlist


    `Genius` playlists offer the following two management options. Both appear as
    buttons above the song list when the `Genius` playlist is selected.


    - **Refresh**: Tapping `Refresh` populates the `Genius` playlist with all new
    songs seeded by your original selection. Keep your theme while switching up the
    music with this option. All songs previously on the playlist are removed but remain
    in your music library.

    - **Delete**: Tapping `Delete` prompts the white and red minus (−) button to appear
    next to the name of the `Genius` playlist in the source list. Tap the minus button
    to remove the playlist from your iPad, and then tap the red `Delete` button that
    appears to the right of the `Genius` playlist''s name to confirm deletion. A pop-up
    will appear warning you that deleting the `Genius` playlist will delete it from
    your computer''s iTunes library the next time you sync. Tap `Delete` to delete.


    **NOTE:** Once a `Genius` playlist is synced back to iTunes on your computer,
    you will not be able to delete it on your iPad. Your only option will be `Refresh`.
    If you want to delete the `Genius` playlist, you must do so through iTunes on
    your computer.


    ## Playing `Genius` Mixes


    Another way to explore the music on your iPad is by playing a `Genius` mix. A
    `Genius` mix is similar to a `Genius` playlist, but you have no control over what
    songs appear on it, and the songs change each time you play it.


    On your computer, iTunes automatically creates `Genius` mixes when you enable
    the `Genius` feature. A `Genius` mix is based on genre and format, not on an individual
    song like a `Genius` playlist is. You can have any number of different mixes—it
    all depends on the types of songs you have in your iTunes library. Examples of
    `Genius Mixes` are Punk Mix, Pop Mix, Classical Crossover Mix, Folk Mix…the list
    goes on and on.


    To play a `Genius` mix, tap `Genius Mix` in the source list. The iPad presents
    a series of `Genius` mixes represented by squares formed of four album covers
    (see [Figure 7–27](#Chapter07.html#fig_7_27)). These represent a sample of songs
    contained in the mix. To begin playing a mix, tap it. The mix''s four-covers icon
    will transform into the album cover of the currently playing song in the mix.


    ![images](images/0727.jpg)


    **Figure 7–27.** *`Genius` mixes on the iPad allow you to listen to automatically
    generated collections of genre-based music.*


    Your navigation options are limited while in a mix. You won''t see a list of the
    songs in the mix and can only move through the songs by using the `Forward` and
    `Back` buttons. The currently playing album still appears in the now-playing screen.


    ## Playing Podcasts, Audiobooks, and iTunes U Lessons


    If you''ve synced podcasts, audiobooks, and iTunes U lessons to your iPad, their
    categories will show up in the iPod app Library source list, along with other
    playlists. To view the items available in each category, simply tap the category
    name. Unlike with music, there is no way to sort podcasts, audiobooks, and iTunes
    U lessons in the items list.


    For podcasts and iTunes U lessons, tap the series or class, and then select the
    episode or lesson to begin playing back that item. To play an audiobook, tap your
    chosen audiobook in the list.


    When you select a podcast, audiobook, or iTunes U lesson, the `Now Playing` screen
    appears. While this screen is similar to the `Now Playing` screen for music, it
    has some subtle differences (see [Figure 7–28](#Chapter07.html#fig_7_28)).


    ![images](images/0728.jpg)


    **Figure 7–28.** *The `Now Playing` screens for podcasts, audiobooks, and iTunes
    U lessons offer several extra features that do not appear on the `Now Playing`
    screen for music.*


    ### `Now Playing` Screen


    As you can see, the `Now Playing` screen is laid out in the same way that it is
    for music playback (see [Figure 7–28](#Chapter07.html#fig_7_28)). There are some
    new features, however:


    - **E-mail**: Tap the envelope icon to the left of the scrubber bar to share via
    e-mail a link to the currently playing podcast.

    - **Audio speed button**: Tap the `1X` icon once, and it becomes a `2X` icon.
    This doubles the speed of the audio playback. Tap the `2X` icon, and it becomes
    a `1/2X` icon. This plays the audio back at half the normal speed, which is helpful
    if the dialogue is being spoken too fast for you to follow. Tap the `1/2X` icon,
    and it turns into a `1X` icon, returning the rate of audio playback to normal
    speed.

    - **30 seconds button**: This button appears in the bottom center of the screen.
    The number `30` with a double-headed arrow wrapped around it counterclockwise
    denotes it. Tap this button to jump back 30 seconds in the podcast or audiobook.
    This feature enables you to avoid rewinding with the scrubber bar, which can quickly
    take you back much farther than you intended to go. If you got distracted and
    missed what was just said, a quick tap of the 30-second rewind button will quickly
    get you caught up.

    - **Album View button**: This button, which looks like a three-item bulleted list,
    also appears in the `Now Playing` screen for music, but the view itself differs.
    Album view in a podcast, audiobook, or iTunes U class shows you a list of all
    the episodes, chapters, or lessons in each one, respectively.'
