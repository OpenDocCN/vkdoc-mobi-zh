  trans: '

    ### 恢复已删除的邮件


    您是否不小心删除了消息？能否恢复已删除的邮件取决于您的邮件提供商。在某些情况下，您不必担心，因为您可以从其他邮箱（例如许多 IMAP 邮件账户使用的`废纸篓`邮箱）中找回它们。在其他情况下，您可能需要仔细查看邮箱，以查明已删除邮件的去向，例如归档文件夹。还有一些情况，您的邮件实际上会被永久删除。因此，请务必向您的账户提供商咨询，了解您电子邮件账户中已删除邮件的处理方式。


    如果您的账户使用`废纸篓`邮箱，您可以从账户的邮箱列表中打开该邮箱（如之前的图 11-10 所示），并使用上一节中介绍的相同管理工具。点击`编辑`按钮，然后点击要恢复的邮件旁边的空白圆圈来标记它们，再点击窗口底部的`移动`按钮。这会显示邮箱列表，您可以将选中的邮件项移动回您选择的目标邮箱，例如该账户的收件箱。或者，点击`取消`（而不是点击某个邮箱），将邮件保留在`废纸篓`邮箱中。


    ### 导航邮件


    在每个邮件窗口的顶部，您会发现几个需要了解的按钮。在竖屏模式下，窗口左上角的上下箭头让您可以导航到上一封或下一封邮件。窗口右上角有用于将邮件移动到其他邮箱、删除邮件、回复或转发邮件，以及创建新邮件的按钮。


    #### 移动和删除按钮


    `移动`按钮看起来像一个带有向下箭头的文件夹。在其右侧，您会发现一个标准的`删除`按钮（垃圾桶图标），或者，在 Gmail 中，是一个`归档`按钮（指向箱子的箭头）。


    点击`移动`按钮会显示邮箱列表；导航到一个邮箱，然后点击它，即可将邮件从其原始位置移动到选定的邮箱。点击`删除/归档`按钮提供了一种删除当前邮件的简单方法。如果支持，邮件将被移动到该账户的`废纸篓`/`归档`邮箱，在那里它要么最终被删除，要么（如果您误删了它）您可以将其找回。对于某些
    POP 账户，邮件将被立即删除。


    #### 回复/全部回复/转发/打印


    `回复/转发`按钮看起来像一个弯曲的左箭头，位于`移动`和`删除/归档`按钮的右侧。当您点击此箭头时，会出现一个包含`回复`、`转发`和`打印`选项的小弹出菜单（参见图
    11-15）。每个选项都允许您选择与当前显示的电子邮件相关的操作。


    点击`回复`会打开一封新邮件，收件人为原始发件人，内容包含原始邮件，并允许您在原始邮件顶部撰写回复。邮件主题也会重复，并在开头添加`Re：`字样，以便让原始发件人知道您正在回复。


    如果一封邮件同时发送给了您和其他几个人，还会出现另一个按钮——`全部回复`。点击此按钮会将回复发送给原始发件人以及邮件的所有其他收件人。


    `转发`按钮将邮件转发给第三方，不限于原始邮件中包含的收件人。转发允许您将邮件传递给任何可能对其内容感兴趣的人。例如，您可以将一些家庭照片转发给朋友，或者向同事发送一个有趣的玩笑。当您点击`转发`时，邮件会出现在一个新窗口中，地址列表为空。主题会重复出现，前面加上`Fwd：`字样，以向收件人表明您正在转发他人的电子邮件给他们，然后还有一个位置供您向邮件的新收件人撰写简短说明。


    `打印`选项允许您从 iPad 无线打印到支持的 AirPrint 打印机。此外，许多第三方解决方案（如针对 OS X 的 Printopia 和针对 Windows
    的 AirPrint Activator）让您可以打印到大多数网络连接的打印机，即使它们不是官方支持的 AirPrint 打印机。


    ![images](img/1115.jpg)


    **图 11-15.** *您可以通过点击邮件窗口顶部的`回复/转发`按钮来回复或转发任何电子邮件。*

    '
- fmt: '### Composing a New E-mail


    The rightmost button at the top of the mail window looks like a pencil poised
    over a piece of paper. This `Compose Message` button allows you to compose new
    e-mail messages. Tapping the button opens a blank message with an empty address
    list in the `To` line, an empty `Subject` line, and a content area showing only
    your signature (see [Figure 11-16](#Chapter11.html#fig_11_16)).


    To address an e-mail to someone, simply start typing the name in the `To` field.
    As you type, a pop-up appears with a list of all names from your contacts list
    or received e-mails that contain the letters you’ve typed. The letters may match
    the real-world name *or* the e-mail address. In the example in [Figure 11-17](#Chapter11.html#fig_11_17),
    note that a list of people appears after typing in only the letters *jo*.


    ![images](images/1116.jpg)


    **Figure 11-16.** *Composing a new message in Mail. Your default signature and
    e-mail address are entered by Mail.*


    ![images](images/1117.jpg)


    **Figure 11-17.** *As you type a name for the recipient of a mail message, a list
    of possible names and associated e-mail addresses appears.*


    If you’re addressing the e-mail to one person and they appear on the pop-up list,
    tap their name to add it to the `To` line of the e-mail. What if you want to send
    the e-mail to more than one person or to a group? Tap the circle containing a
    plus sign (`+`) at the right end of the `To` line. That displays your contacts
    (see [Figure 11-18](#Chapter11.html#fig_11_18)), and you can search for individuals
    by typing their names in the search box or by scrolling the list with a flick
    of your finger. To jump to a certain letter in the alphabet (for example, all
    people with last names beginning with *S*), tap the letter from the list on the
    right side of the pop-up.


    ![images](images/1118.jpg)


    **Figure 11-18.** *You can add as many contacts to your To list as you want by
    tapping the plus sign and then adding one name at a time. If you have a group
    you want to send an e-mail to, tap Groups and select the group name.*


    As with the names that appeared in the search list, just tap a name to add it
    to the `To` list. To add a carbon copy or blind carbon copy recipient to your
    message, tap the `Cc/Bcc, From` line, and the line expands into three lines—`Cc`,
    `Bcc`, and `From`. Why does Apple hide these items? Because most e-mails are sent
    from one person to another, with no need for carbon copy or blind carbon copy.
    If you need to send a cc or bcc, the recipient lines are easily accessible.


    Your default e-mail address is listed in the `From` line, but if you want to have
    the e-mail sent from another e-mail account, just tap the `From` line, and a list
    of all of your e-mail accounts appears. Tap one of the accounts to select it for
    this e-mail message.


    Next, you need to enter something into the `Subject` line. This is usually what
    your recipient sees first, so make it descriptive of the content of your e-mail.
    “Here’s that article for you” or “Friday Lunch” is a little more helpful than
    “Hi” or “From me.”


    Finally, type your message into the body of the message. When you’re ready to
    send the message, tap the `Send` button in the upper-right corner of the message.
    If you’re currently connected to the Internet over a Wi-Fi or 3G connection, the
    message immediately attempts to move to the server. If you do not have an Internet
    connection, have quit Mail, or have shut off your iPad, the message is placed
    in an `Outbox` mailbox. The next time the iPad connects to the Internet, Mail
    will attempt to send any messages waiting in `Outbox` mailboxes.


    ### Using Mail in Other Apps


    You can send e-mail from many of the other apps, both Apple apps and third-party
    apps, on your iPad. Generally, the app displays either an envelope icon or a Share
    icon, the latter appearing like a piece of paper with an arrow coming out of it.
    This section discusses some of the common Apple apps and how they integrate with
    Mail to let you share information with others.


    #### Contacts


    You can share address cards in Contacts through Mail. A `Share Contact` button
    appears at the bottom of each address card. Instead of sending someone a laboriously
    typed list or copy/pasted version of a person’s contact information, it’s much
    easier to tap the `Share Contact` button and send them a vCard. Each vCard contains
    every bit of contact information that you’ve captured for that person, including
    telephone numbers, addresses, e-mail addresses, URLs, and even a photo if one
    has been added to the contact.


    Tapping `Share` opens a new, unaddressed message that contains the `.vcf` file
    for the person whose information is being shared. Address the message to someone,
    type in a subject line (“Steve’s address information,” for instance), and then
    send the message.


    Anyone receiving this e-mail on an iPad can tap the `.vcf` icon that signifies
    the file is attached to the message, and a small pop-up appears (see [Figure 11-19](#Chapter11.html#fig_11_19))
    showing the information contained in the file as well as an option to either create
    a new contact or to add that information to an existing contact (handy for when
    people get new cell phone numbers or e-mail addresses).


    ![images](images/1119.jpg)


    **Figure 11-19.** *If you receive a vCard from someone, tap and hold the icon
    to view the information it contains. You also have a choice of creating a new
    contact or adding this information to an existing contact.*


    Likewise, the `.vcf` file, when clicked in an e-mail message on a Mac or Windows
    computer, will launch the appropriate application on the computer and ask the
    recipient whether they want to add the card to their address book.


    To share contact information with others quickly and easily, send vCards through
    Mail.


    #### Notes


    As mentioned in the “Notes” section of [Chapter 10](#Chapter10.html#ch10), it’s
    easy to send a copy of one of your iPad notes to yourself or others from this
    app.


    Tap the envelope icon at the bottom of a page, and a new Mail message appears.
    The `Subject` line is filled in with the name of the note, the note is copied
    as text into the body of the message, and all you need to do is address the message
    and send it.


    #### YouTube


    There’s nothing like finding a funny or thought-provoking video on YouTube and
    then sharing that clip with friends.


    When you find a video in the iPad’s YouTube app using the search function, a `Share`
    button appears just above the video sample on the page. Tap the `Share` button,
    and a new message appears with the name of the video as the subject and a link
    to the video in the body of the message. Type in an address, and tap `Send` to
    let your friends share in the fun.


    #### iTunes


    iTunes includes a quick link for telling friends about movies, music, TV shows,
    podcasts, or other items that you’ve found in the store. Tap the `Tell a Friend`
    link found in the upper-right corner of each listing in the iTunes Store to create
    a nicely formatted e-mail complete with any images that accompany the store item,
    a button that links the recipient to the item in the store, ratings, and more.


    If the recipient doesn’t have iTunes, they can use the automatically included
    link to download and install the program on their computer.


    #### App Store


    Once you own an iPad, it’s tempting to let the world know about all the wonderful
    apps available for the device. Apple makes it easy to spread the word about fun
    or useful apps by including the same `Tell a Friend` link on every app description
    in the App Store. Like iTunes, the e-mail generated by the `Tell a Friend` link
    includes a picture of the app icon, the app rating, a button that links the recipient
    to the app in the App Store, and a link for downloading iTunes.'
