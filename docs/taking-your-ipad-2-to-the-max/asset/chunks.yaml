- fmt: '#### The Play Button and Presenter Display


    At the far right end of the toolbar is the `Play` button. When it is tapped, the
    toolbar and sidebar disappear, and your presentation is displayed in full-screen.
    To advance slides or build bullet points in the presentation, tap the screen or
    swipe your finger to the left. Returning to a previous slide or bullet is accomplished
    by swiping your finger to the right. When using a video-out cable to project your
    presentation, the iPad display can provide a lot of useful information (see [Figure
    14–34](#Chapter14.html#fig_14_34)).


    ![images](images/1434.jpg)


    **Figure 14–34.** *The Keynote Presenter Display. When you''re giving a presentation
    from the iPad, this screen is a great assistant. The Presenter Display provides
    a view of upcoming and previous slides, what is currently on the projection screen,
    how long you''ve been talking, and even notes you''ve written.*


    At top left is a green light indicating that your presentation is being sent to
    the projector, along with a slide counter. In the figure, we''re on the last of
    20 slides, and a vertical strip showing your slides appears on the left side of
    the screen. You can see the current time at the top of the presenter display;
    tapping on it displays a timer showing how long you''ve been talking.


    There''s a small `Layouts` button at the top right, which displays four different
    presenter layouts when tapped. `Current` shows just the current slide, `Next`
    displays just the next slide in your presentation, `Current and Next` displays
    both the slide that is being projected and the next slide in your deck, and `Current
    and Notes` shows the current slide and any notes you may have written using the
    `Presenter Notes` tool. By the way, if you forgot your laser pointer back in the
    office, Keynote will save the day. Holding down your finger on the iPad screen
    creates a red virtual "laser pointer" that is useful in highlighting items on
    slides.


    When your presentation is finished, tap the `X` button to return to the Keynote
    slide editor.


    ### Importing Documents from a Computer


    Many times, you may want to work on documents that you already created on your
    computer or that someone else sent to you through e-mail. In [Chapter 11](#Chapter11.html#ch11),
    we showed you how to open attachments that have been sent to you in Mail, so e-mailing
    documents to your iPad is one way to work on them while mobile.


    Another method is to transfer the documents to your iPad by using iTunes on your
    computer. With your computer and iPad connected by the Dock Connector to USB Cable,
    launch iTunes on the computer. When the iPad appears in the Devices list in the
    left sidebar in the iTunes window, click it, and then click the `Apps` tab.


    Scrolling past the list of apps on your iPad toward the bottom of the `Apps` tab,
    you''ll find an area with the title `File Sharing`. There''s a list of apps that
    can transfer documents between the iPad and computer, and the iWork apps that
    you''ve installed on your iPad will be in that list (see [Figure 14–35](#Chapter14.html#fig_14_35)).


    ![images](images/1435.jpg)


    **Figure 14–35.** *You can transfer files to the iWorks applications from iTunes
    from your computer.*


    To transfer documents from your computer, click the appropriate app name on the
    left, and then click the `Add` button on the right side. A standard file `Open`
    dialog box for your computer appears, and then you can select one or more documents
    to transfer. Once the document files have been added to the list on the right
    side, clicking the `Sync` button in iTunes transfers the documents to your iPad.


    Within any of the iWork apps, tapping the folder icon in the top-right corner
    of the `My Documents`, `My Spreadsheets`, or `My Presentations` window displays
    the documents stored on your iPad, and tapping the filename opens the file in
    the app.


    A number of iPad file manager apps, like `Air Sharing Pro` and `GoodReader`, provide
    another way to move files to your iPad. These apps connect to `MobileMe`''s `iDisk`,
    `Dropbox`, and other servers; allow you to view the files on the server; and then
    download and open them in iWork for iPad. With iPad printing support built into
    `Air Sharing Pro`, it makes a wonderful companion to iWork.


    Moving documents out of iWorks is not as simple, because there is no common file
    store for these file managers to retrieve files from. In many cases, the only
    choices you may have for exporting documents are through e-mail (see [Chapter
    11](#Chapter11.html#ch11)), saving the documents to `iWork.com` (Apple''s online
    repository for sharing iWork documents), or using iTunes as described earlier.


    ### Summary


    The iWork for iPad trio of Pages, Numbers, and Keynote is a powerful set of apps
    for creating documents for work or pleasure while you''re on the go. These optional
    Apple apps work well with their Mac counterparts and, to a more limited degree,
    Microsoft Office.


    In this chapter, we''ve provided a look at the user interface and major capabilities
    of Pages, Numbers, and Keynote. Although a more detailed discussion of each app
    could easily fill another book, we''ve given you the information you''ll need
    to get started using iWork for iPad. Some important points to remember from this
    chapter include the following:


    *   Pages, Numbers, and Keynote do not come with your iPad. To purchase the apps
    for $9.99 each and then install them, use the `App Store` app on your iPad while
    you''re connected to a Wi-Fi network or purchase the apps in iTunes and then sync
    the iPad to your computer.

    *   All three of the iWork for iPad apps include a page (`My Documents`/`My Spreadsheets`/`My
    Presentations`) displaying your existing documents, and you can choose to create
    a new document on a blank page or with a professionally designed theme or template.

    *   The user interface is consistent between all three of the apps. If you become
    familiar with one of the iWork apps, you''ll understand how to use the other two
    in no time at all.

    *   Pages can be used both as a traditional word processor and as a page layout
    application, depending on your needs.

    *   Numbers tabs are similar to sheets in an Excel workbook. Each tab can have
    one or more tables (spreadsheet) on it, as well as media (images), charts, and
    shapes.

    *   Add transitions and builds to your Keynote presentations to make them more
    interesting and vibrant to your audience.

    *   Transferring documents from your computer to your iPad is a great way to work
    on the go. You can transfer them by e-mail, through iTunes, or through a growing
    number of file management utilities.


    ## Chapter 15


    ## Using the iPad Cameras with Camera, Photobooth, and FaceTime


    Perhaps the most significant upgrade to the second-generation iPad is represented
    in its two cameras. These cameras introduce new and compelling features to the
    formerly cameraless iPad: the ability to take photos and record high-definition
    video, the ability to play with those videos using Photobooth, and the ability
    to place and receive FaceTime video calls.


    Are you lucky enough to own one of the latest iPads? If not, this chapter is really
    not for you, at least until you''re ready to upgrade. But if you''ve been able
    to purchase a newer-generation iPad, then this chapter will teach you great ways
    to take photos and record video.


    ### The Camera Hardware


    The iPad 2 features two cameras—one in the front and one in the rear. These cameras
    allow you to snap photos and record video. The cameras aren''t created equal,
    however. As you''ll see, each one has been designed for different uses.'
