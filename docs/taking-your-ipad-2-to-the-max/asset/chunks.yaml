    **Figure 3–13.** *If you see either of these symbols on your iPad screen, stop
    using it, and plug it into a power source as soon as possible.*


    With constant usage, your iPad battery may eventually get to the point where its
    capacity to hold a charge has depleted 50 percent or more from the original specification.
    You’ll be able to tell this is the case if your iPad is constantly running out
    of power or if it never shows that it is completely recharged after being plugged
    in for a long time. In this case, you may need to have your battery replaced by
    an Apple-authorized service provider. If you purchased an AppleCare Protection
    Plan for your iPad and you’ve owned it for less than two years, you may be able
    to have Apple replace the battery at no cost.


    There are some simple steps you can take to stretch your battery life that can
    be useful in situations (international flights, for example) where you cannot
    readily recharge your battery:'
  trans: '

    ### 保护套


    iPad 保护套（见图 3–10）通常由柔软的材质制成，内衬为防刮面料。将 iPad 放入保护套后，再将其放入另一个携带包——例如背包、手提包、公文包或笔记本电脑包中。


    ![images](img/0310.jpg)


    **图 3–10.** *Targus 推出的 Hughes Leather Portfolio Slipcase 款 iPad 保护套。图片由 Targus
    提供。*


    保护套主要的作用是保护 iPad 在放入其他包袋时免受刮擦。它们可由多种材料制成（例如皮革、摇粒绒、软木、氯丁橡胶、尼龙和大麻纤维等），价格也千差万别。


    保护套的示例产品包括 Targus（[`www.targus.com`](http://www.targus.com)）和 Booq（`booqbags.com`）推出的型号。


    ### 包袋


    iPad 包袋（见图 3–11）不仅用于保护 iPad，还作为它的主要携带工具。因此，它们通常配有手柄或某种肩带以便于携带。从价格上看，包袋通常比保护套更贵，但提供的保护也更多。通常内部会有某种衬垫，以及一个硬质插片来保护屏幕。


    ![images](img/0311.jpg)


    **图 3–11.** *WaterField Designs 推出的时尚且实用的 iPad Travel Express 包袋。图片由 WaterField
    Designs 提供。*


    几款时尚的包袋由 WaterField Designs（`sfbags.com`）和 Tom Bihn（[`www.tombihn.com`](http://www.tombihn.com)）生产。


    ### 机身贴膜


    如果您想在不增加太多重量的情况下保护 iPad 的表面，可以考虑使用机身贴膜。它们通常由薄材料制成，可能无法保护您的 iPad 免受跌落损伤，但能防止刮擦。Zagg
    的 Invisible Shield for iPad（[`www.zagg.com`](http://www.zagg.com)）和 Fusion of
    Ideas 的 Stealth Armor（[`www.fusionofideas.com/sa-ipad/index.html`](http://www.fusionofideas.com/sa-ipad/index.html)）就是两个完美的机身贴膜示例，它们能在几乎不增加体积的情况下提供防刮保护。


    ### 书本式保护壳


    iPad 是一款出色的电子书阅读器，那么何不让它看起来像一本书呢？这类保护壳的首款产品由旧金山的 DODOcase（`dodocase.com`）公司开发，这家公司将高科技与古老的装订工艺融合，打造出既美观又具保护性的
    iPad 保护壳。其他公司也纷纷效仿，其中 Twelve South 的 BookBook for iPad（`twelvesouth.com/products/bookbook_ipad/`）就是此类
    iPad 保护壳中一个巧妙而漂亮的典范（见图 3–12）。


    ![images](img/0312.jpg)


    **图 3–12.** *使用一款巧夺天工、美观大方的书本式保护壳（如 Twelve South 的 BookBook for iPad），让您的电子书阅读器看起来像一本书。照片由
    Twelve South 提供。*


    ### 电池保养


    iPad 的一大优点是其电池续航能力。连续数天不充电是常事，远离电源插座的想法也不再会让你惊慌。一个实用的经验法则是：正常使用时，电池电量大约每小时下降 10%。如果您在玩对图形和音效要求较高的游戏，电池续航时间可能不会那么长。另一方面，如果您在阅读电子书，iPad
    的电池续航时间可能会更长。


    然而，不充电的话，您的 iPad 电池也不会永远持续下去，因此您需要定期为其充电。通过使用基座接口转 USB 连接线和 10W USB 电源适配器，将 iPad
    连接到电源插座，或者将连接线连接到高功率 USB 2.0 端口即可充电。


    我们所说的高功率 USB 是什么意思？通常，这意味着直接插入计算机上的端口或插入有源 USB 集线器。将 iPad 插入 USB 键盘的端口或无源 USB
    集线器将无法为其充电。相反，您会在状态栏中电池图标旁边看到“`未在充电`”的提示信息。我们建议每晚将 iPad 连接到电源适配器，使其充满电。


    如果您的 iPad 电量*非常*低，您可能会在屏幕上看到图 3–13 中的某个图像。这些图标表示设备需要充电至少十分钟后才能使用。如果电池电量极低或完全耗尽，在将
    iPad 连接到电源后，可能需要长达两分钟的时间才会显示这些图像。


    ![images](img/0313.jpg)


    **图 3–13.** *如果在 iPad 屏幕上看到这两个符号中的任何一个，请停止使用，并尽快将其连接到电源。*


    随着持续使用，您的 iPad 电池最终可能会达到这样一个状态：其存储电量的能力相比原始规格下降了 50% 或更多。如果是这种情况，您的 iPad 会不断电量耗尽，或者长时间插电后也从未显示完全充电。在这种情况下，您可能需要由
    Apple 授权的服务提供商更换电池。如果您为 iPad 购买了 AppleCare 保护计划并且拥有时间不足两年，Apple 可能会免费为您更换电池。


    您可以采取一些简单的步骤来延长电池续航时间，这在某些情况下（例如国际航班）您无法方便地为电池充电时非常有用：'
- fmt: '# iPad 电池保养技巧


    - **关闭推送通知**：某些应用使用 Apple 推送通知来提供提醒。频繁使用时，这些通知往往会导致电池续航下降，因此你可以通过进入`设置`→`通知`并将通知设为“关闭”来禁用推送通知。

    - **关闭 Wi-Fi**：在不使用 Wi-Fi 时，将其关闭以节省电量。进入`设置`→`Wi-Fi`并将 Wi-Fi 设为“关闭”。

    - **使用 Wi-Fi + 3G 的 iPad？** 使用 3G 网络往往会比通过 Wi-Fi 连接更快地消耗电池电量。如果你处于 3G 信号弱或无信号的区域，请关闭
    3G 以延长电池续航。有两种方法可以实现：第一种，选择`设置`→`蜂窝数据`并将蜂窝数据设为“关闭”；第二种方法是直接开启飞行模式，进入`设置`并将飞行模式设为“开启”。

    - **尽量减少定位服务的使用**：iPad 可通过两种方式确定其位置：通过 Skyhook Wireless 的 Wi-Fi 热点位置数据库进行 Wi-Fi
    定位，或在 Wi-Fi + 3G iPad 上通过辅助 GPS 进行定位。这两种方式都会降低电池续航。如果你不需要知道自己的位置或去向，请禁用定位服务。进入`设置`→`定位服务`并将定位服务开关滑动至“关闭”。

    - **调整屏幕亮度**：iPad 默认开启自动亮度调节，这意味着它会在环境光较亮时提高屏幕亮度，在较暗的房间中降低亮度。你可以自行调整亮度：进入`设置`→`亮度与墙纸`，将滑块向左拖动以降低默认屏幕亮度。亮度越低，电池续航越好。

    - **了解你下载的应用**：你在 iPad 上运行的某些应用可能会消耗电池电量。那些阻止屏幕自动变暗的游戏是常见元凶，需要持续运行以进行位置更新的应用也是如此。已知会频繁轮询
    Wi-Fi + 3G iPad GPS 位置的地理追踪应用会迅速拉低电池续航。

    - **让 iPad 远离极端温度**：Apple 建议让 iPad 远离阳光直射和高温车辆。极端高温会导致电池续航下降，还可能引发其他问题（我们稍后将讨论）。Apple
    推荐的 iPad 工作温度范围为 32° 至 95°F（0° 至 35°C），关机状态下的存放温度范围为 -4° 至 113°F（-20° 至 45°C）。

    - **将 iPad 设置为短时间无操作后自动关闭**。自动锁定功能（可通过进入`设置`→`通用`→`自动锁定`进行设置）会在预设时间后自动关闭屏幕。为获得最佳电池续航，请将时间间隔设置为较短的时间，例如一两分钟。


    ## 屏幕保养


    与早期移动设备（如 Apple Newton MessagePad 或 Palm Pilot）上容易刮擦的显示屏不同，iPad 的屏幕由非常耐用且极其坚硬的玻璃制成。尽管它能抵抗大多数刮擦，但最终仍可能被某些物体划伤。除非在极端情况下，这通常不会损坏屏幕，你仍然可以正常使用
    iPad。


    使用 iPad 显示屏时可能遇到的最大问题是它容易沾染指纹。iPad 屏幕带有疏油涂层，但仍然很容易沾染污迹和指纹。


    清理 iPad 屏幕上的指纹和污迹可能会成为一种小小的执念。幸运的是，它们通常只在 iPad 关闭时才清晰可见，因此你无需过度纠结于指纹。当污迹确实干扰 iPad
    使用时，Apple 建议完全关闭 iPad，拔掉所有线缆，然后使用柔软、微湿、不起毛的布进行清洁。我们推荐使用 RadTech ScreenSavrz 清洁布，将其用水略微沾湿，然后拧干，直到几乎不再滴水。


    有些 iPad 用户声称婴儿湿巾也能很好地清洁 iPad 屏幕。它们价格低廉、方便且易于使用。清洁屏幕后，只需用软布擦去任何残留的灰尘或液体残留物即可。


    接下来，用布擦拭屏幕。务必避开 iPad 上的任何开口，例如耳机插孔、基座接口和扬声器。


    **切勿**使用玻璃清洁剂、液体眼镜清洁剂、家用清洁喷雾、酒精、氨水或任何研磨剂来清洁 iPad，因为它们可能会损坏屏幕。


    ### 热量：iPad 的头号敌人


    在之前关于电池续航的部分中，我们提到 Apple 建议让 iPad 远离高温环境以优化电池续航。确保 iPad 保持凉爽还有另一个充分理由：它可能会在过热时关机。


    Apple 在设计 iPad 时没有内置冷却风扇，这样你就不会被风扇的噪音和功耗所困扰。不幸的是，这意味着 iPad 保持冷却的唯一方式是通过热传导将热量散发到周围环境中。


    一些 iPad 用户报告称，当他们的设备处于高环境温度条件下时，屏幕上会显示警告信息，然后 iPad 会关机。要让你的 iPad“重获新生”，你需要将其带到远离阳光直射的阴凉处，直到它冷却下来。这种情况在夏季以及
    iPad 在阳光直射下使用时似乎更为常见。


    ## Apple iPad 配件


    在本书编写时（iPad 发布后不久），已经有数千种第三方配件可供选择。对于许多将在附近 Apple Store 零售店或通过 Apple 在线商店购买的 iPad
    买家来说，Apple 原装配件可能是他们的首选。


    在本节中，我们将介绍 Apple 制造的 iPad 配件，以及如何使用它们来增强你的用户体验。你已经在第 1 章中了解过这些配件；在此，我们将提供关于每种配件如何与你的
    iPad 配合使用的更多细节。


    ### Smart Cover


    我们在本章前面提到过适用于 iPad 2 的 Apple Smart Cover，它可以保护设备屏幕免受刮擦。Smart Cover 在许多其他方面也很有用。


    Smart Cover 由皮革（$69.00）或聚氨酯（$39.00）制成，这意味着当你的 iPad 戴上 Smart Cover 时，更容易握持。我们发现“裸机”iPad
    有些滑，因此使用 Smart Cover 可能至少让我们避免了 iPad 掉落一次。


    Smart Cover 通过非常坚固且位置巧妙的磁铁吸附在 iPad 2 上。只有一种正确的方式可以安装它，当你将保护盖调整到正确的方向时，它实际上会自动吸附到位。


    Smart Cover 上的一块磁铁与 iPad 2 内部的一个小型微动开关协同工作：当保护盖被掀开时唤醒设备，合上时则使其进入休眠状态。这一功能使得无需按下“开/关-睡眠/唤醒”按钮即可唤醒
    iPad。


    我们最喜欢 iPad Smart Cover 的一个特点是，它可以像折纸一样折叠成一个方便的支架，如图 3-14 所示。Smart Cover 其中一个折叠层内部有一块钢板，会被一组磁铁吸附。当折叠成三角形管状时，Smart
    Cover 可以充当支架，在 iPad 上更方便地打字，或者将其支撑成垂直位置以便于观看电影。


    ![images](images/0314.jpg)


    **图 3-14.** *iPad 2 Smart Cover 兼具屏幕保护壳、便捷支架和睡眠/唤醒功能。*'
  raw: '*   *Turn off push notifications*: Some apps use Apple Push Notifications
    to provide alerts. These tend to decrease battery life when frequently used, so
    you can disable push notifications by going to Settings ![images](images/U001.jpg)
    Notifications and turning Notifications to Off.

    *   *Turn off Wi-Fi*: When you’re not using Wi-Fi, turn it off to save power.
    Go to Settings ![images](images/U001.jpg) Wi-Fi and set Wi-Fi to Off.

    *   *Have a Wi-Fi + 3G iPad*? Using 3G networks tends to drain battery power faster
    than connecting via Wi-Fi. If you’re in a zone with low or no 3G coverage, turn
    off 3G to improve your battery life. There are two ways to do this. First, choose
    Settings ![images](images/U001.jpg) Cellular Data, and set Cellular Data to Off.
    The second method is to simply turn on Airplane Mode, which is accomplished by
    going into Settings and setting Airplane Mode to On.

    *   *Minimize use of location services*: iPads can determine where they are by
    two methods: by Wi-Fi location through Skyhook Wireless’s database of Wi-Fi hotspot
    locations or by Assisted GPS (A-GPS) on Wi-Fi + 3G iPads. Both of these methods
    can reduce battery life. If you don’t need to know where you are or where you’re
    going, disable location services. Go to Settings ![images](images/U001.jpg) Location
    Services and slide the Location Services switch to Off.

    *   *Adjust the brightness of your screen*: The iPad normally has Auto-Brightness
    turned on, which means that it will brighten the screen in bright ambient light
    conditions and darken it in darker rooms. You may want to adjust brightness yourself
    by going to Settings ![images](images/U001.jpg) Brightness & Wallpaper and dragging
    the slider to the left to lower the default screen brightness. Less brightness
    results in better battery life.

    *   *Know your downloaded applications*: Some apps that you run on your iPad may
    be eating your battery life. Games that prevent the screen from dimming automatically
    are a common culprit, as are apps that need to run continuously for location updates.
    Geotracking apps that poll the GPS position of a Wi-Fi + 3G iPad are known to
    pull the battery life down quickly.

    *   *Keep your iPad out of temperature extremes*: Apple recommends keeping your
    iPad out of direct sun and hot cars. Extreme heat can cause decreased battery
    life and may also result in other issues we’ll discuss shortly. Apple’s recommended
    temperature ranges for the iPad are 32° to 95° F (0° to 35° C) in operation and
    -4° to 113° F (-20° to 45° C) when it is turned off.

    *   Set your iPad to turn off after a short amount of inactivity. The Auto-Lock
    feature, which can be set by going to Settings ![images](images/U001.jpg) General
    ![images](images/U001.jpg) Auto-Lock, will automatically turn off your screen
    after a preset amount of time. For best battery life, set the interval to a short
    time like one or two minutes.


    #### Caring for the Screen


    Unlike the easily scratched displays on early mobile devices like the Apple Newton
    MessagePad or Palm Pilot, the iPad’s screen is made of a very durable and extremely
    hard glass. Although it will resist most scratches, eventually something may scratch
    the screen. Except in extreme situations, this should not harm the screen, and
    you should still be able to use your iPad with no difficulties.


    Probably the biggest issue you’ll have with an iPad display is that it tends to
    pick up fingerprints. The iPad screen has an oleophobic (oil-repelling) coating
    on it, but it still picks up smears and fingerprints quite easily.


    Cleaning fingerprints and smears off of your iPad screen can get to be a bit of
    an obsession. Fortunately, about the only time that they’re readily visible is
    when the iPad is turned off, so you shouldn’t need to get obsessive about fingerprints.
    On those occasions where the smearing is really interfering with your iPad use,
    Apple recommends turning off the iPad completely, unplugging all cables, and then
    using a soft, slightly damp, lint-free cloth. We recommend using a RadTech ScreenSavrz
    cleaning cloth ([`www.radtech.us`](http://www.radtech.us)), dampening the cloth
    slightly with water, and then squeezing it until almost all the water is gone.


    Some iPad users claim that baby wipes work well to clean the iPad screen. They’re
    inexpensive, convenient, and easy to use. After cleaning the screen, just wipe
    any remaining dust or liquid residue with a soft cloth.


    Next, use the cloth to wipe the screen. Make sure that you avoid any openings
    on the iPad, such as the headphone jack, Dock Connector port, and speaker.


    Never use window cleaners, liquid eyeglass cleaners, household cleaning sprays,
    alcohol, ammonia, or any abrasives to clean the iPad, because they may damage
    the screen.


    ##### Heat: The iPad’s Worst Enemy


    In the previous section about battery life, we mentioned Apple’s recommendation
    that you keep the iPad out of hot conditions in order to optimize battery life.
    There’s another good reason to make sure that you keep your iPad cool—it may shut
    off if it gets too hot.


    Apple designed the iPad without a built-in cooling fan, so that you wouldn’t be
    bothered by the noise and power consumption of a fan. Unfortunately, that means
    that the only way your iPad can keep itself cool is by transferring heat to the
    surroundings through conduction.


    Some iPad users reported that when their device experienced conditions with a
    high ambient temperature, a warning appeared on the screen and the iPad shut down.
    To bring your iPad “back to life,” it’s necessary to bring it into a cool place
    out of direct sun until it can cool down. This seems to be a more common occurrence
    during summer and when the iPad is being used in direct sunlight.


    ### Apple Accessories for iPad


    When this book was being written shortly after the release of the iPad, there
    were already thousands of third-party accessories available. For many iPad buyers
    who will be making their purchase from a nearby Apple Store or through the Apple
    Online Store, Apple accessories may be their first choice.


    In this section, we’ll describe the iPad accessories made by Apple and how they
    can be used to enhance your user experience. You’ve already been introduced to
    these accessories in [Chapter 1](#Chapter01.html#ch1); here, we provide more details
    about how each of these items can be used with your iPad.


    #### Smart Cover


    We mentioned the Apple Smart Cover for iPad 2 earlier in this chapter as a way
    to protect the screen of your device from scratches. The Smart Cover is useful
    in many other ways as well.


    The Smart Cover is made of either leather ($69.00) or polyurethane ($39.00), which
    means that when your iPad is wearing the Smart Cover it is easier to grip. We
    find the “naked” iPad to be somewhat slippery, so having the Smart Cover has probably
    kept us from dropping the iPad at least once.


    The Smart Cover is attached to the iPad 2 with very strong and strategically placed
    magnets. There’s only one right way to attach the cover, and when you get the
    cover into the proper orientation, it actually installs itself.


    The Smart Cover has one magnet that works with a small microswitch inside the
    iPad 2 to wake the device when the cover is lifted or put it to sleep when the
    cover is closed. That feature makes it unnecessary to press the On/Off Sleep/Wake
    button to bring the iPad to life.


    Our favorite feature of the iPad Smart Cover is that it folds origami-like into
    a handy stand, as shown in [Figure 3–14](#Chapter03.html#fig_3_14). There’s a
    steel plate inside one of the folds in the Smart Cover that is attracted to an
    array of magnets. When folded into a triangular tube shape, the Smart Cover acts
    either as a prop for easier typing on the iPad, or to hold it into a vertical
    position for convenient viewing of movies.


    ![images](images/0314.jpg)


    **Figure 3–14.** *The iPad 2 Smart Cover acts as a screen protector, a handy stand,
    and a sleep/wake button.*'
