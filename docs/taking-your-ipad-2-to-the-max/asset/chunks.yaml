    ### 撰写新邮件


    邮件窗口顶部最右侧的按钮看起来像一支搁在纸上的铅笔。这个`撰写邮件`按钮用于撰写新的电子邮件。点击该按钮会打开一封空白邮件，其中`收件人`行显示空白的地址列表，`主题`行为空，内容区域仅显示您的签名（参见图
    11-16）。


    要给某人发送邮件，只需在`收件人`字段中开始输入姓名。输入时，会弹出一个列表，其中包含来自通讯录或已收邮件中所有包含您所输入字母的联系人姓名。这些字母可能匹配真实姓名*或*电子邮件地址。在图
    11-17 的示例中，请注意，仅输入字母 *jo* 后便出现了一个人员列表。


    ![images](img/1116.jpg)


    **图 11-16.** *在“邮件”中撰写新邮件。您的默认签名和电子邮件地址由“邮件”自动填入。*


    ![images](img/1117.jpg)


    **图 11-17.** *当您输入邮件收件人的姓名时，会显示一个可能姓名及相关电子邮件地址的列表。*


    如果您只将邮件发送给一个人，并且该联系人出现在弹出列表中，轻点其姓名即可将其添加到邮件的`收件人`行。如果您想将邮件发送给多人或一个群组怎么办？轻点`收件人`行右端包含加号（`+`）的圆圈。这将显示您的通讯录（参见图
    11-18），您可以通过在搜索框中输入姓名进行搜索，或通过手指轻扫滚动列表来查找个人。要跳转到字母表中的某个特定字母（例如，所有姓氏以 *S* 开头的人），请从弹出窗口右侧的列表中轻点相应字母。


    ![images](img/1118.jpg)


    **图 11-18.** *您可以通过轻点加号，然后一次添加一个姓名，将任意数量的联系人添加到您的收件人列表中。如果您想向某个群组发送邮件，请轻点“群组”并选择群组名称。*


    与搜索列表中出现的姓名一样，只需轻点一个姓名即可将其添加到`收件人`列表。要为邮件添加抄送或密件抄送收件人，请轻点`抄送/密送，发件人`行，该行会展开为三行——`抄送`、`密送`和`发件人`。为什么
    Apple 要隐藏这些项目？因为大多数邮件都是个人对个人发送，不需要抄送或密件抄送。如果您需要发送抄送或密送，这些收件人行很容易访问。


    您的默认电子邮件地址会显示在`发件人`行，但如果您希望从另一个邮件帐户发送该邮件，只需轻点`发件人`行，便会显示您所有邮件帐户的列表。轻点其中一个帐户即可将其选为这封邮件的发送帐户。


    接下来，您需要在`主题`行中输入内容。这通常是收件人首先看到的内容，因此请使其能够描述您邮件的内容。“这是给你的那篇文章”或“周五午餐”比“嗨”或“来自我”更有帮助一些。


    最后，在邮件正文中输入您的消息。当您准备发送邮件时，轻点邮件右上角的`发送`按钮。如果您当前通过 Wi-Fi 或 3G 连接在互联网上，邮件会立即尝试发送到服务器。如果您没有互联网连接、退出了“邮件”应用或关闭了
    iPad，邮件将被放入`发件箱`邮箱。下次 iPad 连接到互联网时，“邮件”将尝试发送所有在`发件箱`邮箱中等待的邮件。


    ### 在其他应用中使用“邮件”


    您可以从 iPad 上的许多其他应用（包括 Apple 应用和第三方应用）发送电子邮件。通常，这些应用会显示一个信封图标或一个共享图标，后者看起来像一张带箭头的纸。本节讨论一些常见的
    Apple 应用以及它们如何与“邮件”集成，让您与他人共享信息。


    #### 通讯录


    您可以通过“邮件”共享“通讯录”中的名片。每张名片的底部都有一个`共享联系人`按钮。与其费力地输入或复制粘贴某个人的联系信息列表发送给别人，不如轻点`共享联系人`按钮并发送一张
    vCard 给他们，这要容易得多。每张 vCard 都包含您为该联系人记录的所有联系信息，包括电话号码、地址、电子邮件地址、网址，甚至还有照片（如果已添加到该联系人）。


    轻点`共享`会打开一封新邮件，其中包含被共享联系人的 `.vcf` 文件。将邮件发送给某人，输入主题行（例如“史蒂夫的联系地址信息”），然后发送邮件。


    任何在 iPad 上收到这封邮件的人都可以轻点表示附件文件的 `.vcf` 图标，会弹出一个小的弹出窗口（参见图 11-19），显示文件中包含的信息，以及创建新联系人或将该信息添加到现有联系人的选项（当人们更换手机号码或电子邮件地址时非常方便）。


    ![images](img/1119.jpg)


    **图 11-19.** *如果您收到某人的 vCard，请按住该图标以查看其包含的信息。您还可以选择创建新联系人或将此信息添加到现有联系人。*


    同样，在 Mac 或 Windows 电脑上点击邮件中的 `.vcf` 文件，会启动电脑上相应的应用程序，并询问收件人是否要将该名片添加到他们的地址簿。


    要快速轻松地与他人分享联系信息，请通过“邮件”发送 vCard。


    #### 备忘录


    正如第 10 章的“备忘录”部分所述，您可以轻松地将 iPad 备忘录的副本从此应用发送给自己或他人。


    轻点页面底部的信封图标，一封新的邮件便会打开。`主题`行会自动填入备忘录的标题，备忘录会以文本形式复制到邮件正文中，您只需填写收件人地址并发送即可。


    #### YouTube


    没有什么比在 YouTube 上找到一个有趣或发人深省的视频，然后与朋友分享这个片段更棒的了。


    当您在 iPad 的 YouTube 应用中使用搜索功能找到一个视频时，视频样本上方会出现一个`共享`按钮。轻点`共享`按钮，一封新邮件便会打开，主题为视频名称，正文中包含指向该视频的链接。输入收件人地址，轻点`发送`，让您的朋友一起分享这份乐趣。


    #### iTunes


    iTunes 包含一个快速链接，用于告诉朋友您在商店中找到的电影、音乐、电视节目、播客或其他内容。轻点 iTunes Store 中每条内容的右上角的`告诉朋友`链接，即可创建一封格式精美的邮件，其中包含商店内容附带的任何图片、一个将收件人链接到商店中该内容的按钮、评分等信息。


    如果收件人没有 iTunes，他们可以使用自动包含的链接在他们的电脑上下载并安装该程序。


    #### App Store


    一旦您拥有 iPad，就很容易想让全世界知道这款设备上所有精彩的应用程序。Apple 通过在 App Store 的每个应用描述中包含同样的`告诉朋友`链接，使得宣传有趣或实用的应用程序变得轻而易举。与
    iTunes 类似，通过`告诉朋友`链接生成的邮件会包含应用图标图片、应用评分、一个将收件人链接到 App Store 中该应用的按钮，以及一个用于下载 iTunes
    的链接。

