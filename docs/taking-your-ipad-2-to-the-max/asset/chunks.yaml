    take away from this chapter:


    *   To use Mail, accounts must first be configured in the app. An easy way to
    move account information to the iPad from another computer is to sync Mail settings
    from iTunes on the computer.

    *   When you’re setting up Mail accounts on the iPad, it’s helpful to use Apple’s
    Mail “cheat sheet” to capture all the settings necessary to successfully configure
    the accounts.

    *   Upon receiving an e-mail with attachments, tap and hold the attachment icon
    in the message to view or open the file on the iPad.

    *   Send vCard files from the Contacts app to quickly share contact information
    with others. vCard is a nearly universal file format that works well for Windows,
    Mac, and Linux users.

    *   All of the electronic storefronts on your iPad—the iTunes Store, iBookstore,
    and the App Store—include Tell a Friend links for sending friends detailed information
    about items in the store that you think deserve their attention.

    *   Only five photos at a time can be sent from the Photos application to avoid
    conflicts with message size limits on mail servers, but it’s possible to work
    around this limit by copying and pasting photos into Mail.


    ## Chapter 12


    ## Working with Maps


    The iPad has a powerful mapping application called Maps. It uses Google Maps to
    interactively find and display locations using map and satellite imagery. With
    Maps, you can get directions, view traffic, and more.


    In this chapter, you’ll discover how to navigate maps, bookmark locations, “walk
    down” a street in Street view, and even use your iPad as a compass. Maps isn’t
    just a powerful app; it’s a fun one, as well. Let’s get started.


    Launch the app by tapping the Maps icon (see [Figure 12-1](#Chapter12.html#fig_12_1)).
    It looks like a small map that shows a section of Interstate 280\. The pin on
    the icon just happens to be where Apple’s headquarters is located in Cupertino,
    California. This takes you into the Maps application, where you can view and explore
    geography from around the world.


    ![images](images/1201.jpg)


    **Figure 12-1.** *The Maps icon*'
  trans: '

    # iBooks


    如果 iPad 上的另外两家商店——iTunes 和 App Store——都包含“告诉朋友”链接，那么你可能会认为 iBookstore 也提供类似的链接。你猜对了——在
    iBookstore 中，每本书的列表页面里，“告诉朋友”链接都出现在与 iTunes 和 App Store 相同的位置（列表右上角）。


    # iWork for iPad


    iWork for iPad 的三个应用——Keynote、Pages 和 Numbers——都在主页上包含一个“分享”按钮。主页显示你在某个应用中创建的所有演示文稿、文档或电子表格。


    要与朋友或同事共享文件，请将其拖到页面中央，然后点击文档图片下方的“分享”按钮。此时会弹出一个窗口，其中“通过邮件发送”是你可选的三个操作中的第一个。


    点击“通过邮件发送”按钮，会弹出一个对话框，询问在发送前要将文件转换为哪种格式。对于 Keynote，可选格式为 Keynote 或 PDF。对于 Numbers，你可以选择
    Numbers 或 PDF。而对于 Pages，则有三种格式可选——Pages、PDF 或 Microsoft Word 的 `.doc` 格式。


    一旦选好文件类型，文档就会被格式化，然后作为附件添加到一封新邮件中，并将文档名称作为主题行。在收件人栏中输入一个或两个地址，点击“发送”按钮，你的文稿就会传递到另一个人手中。


    # 照片


    没有什么比与朋友和家人分享照片更有趣的了，而 iPad 上的“照片”应用让你可以轻松地将一张或多张照片发送给任何拥有电子邮件地址的人。


    在查看任何照片集、相簿或事件中的照片时，我们熟悉的“分享”按钮就藏在窗口的右上角。点击该按钮，窗口左上角会添加“电子邮件”、“拷贝”和“删除”按钮。要将最多五张照片作为附件添加到电子邮件中，请点击你想要发送的照片，它们上面会出现一个对勾。选择好照片后，点击“发送”按钮，即可将它们嵌入到邮件中。


    与在 iPad 上执行的许多操作一样，在“邮件”中发送照片也有多种方法。浏览照片时，你可能会看到一张想要分享的图片。长按该图片，直到出现“拷贝”弹出窗口。出现后，点击该弹出窗口即可拷贝图片。然后将该图片粘贴到邮件中，填写收件人地址，最后发送邮件即可分享照片。


    为什么一次只能发送五张照片？这完全是出于图片大小的考虑。根据拍摄照片的相机分辨率，照片的大小通常可达数兆字节（MB）。传输到 iPad 上的照片会被降采样到
    iPad 显示屏的最大分辨率，即 1024×768 像素。这将产生大约 900KB 的文件大小。听起来不大，但五张照片嵌入到一封邮件中，就会将文件大小增加到大约
    5MB。


    为了方便从 iPad 发送图片，苹果设置了图片数量的限制。几乎所有电子邮件系统都接受大小在 5MB 以内的来信；而如果大小达到 10MB 或 15MB，许多邮件服务器会因邮件过大而拒绝接收。


    如果你有很多较小的图片要发给某人，该怎么办？使用我们之前介绍的拷贝和粘贴方法，可以添加任意数量的照片，但要注意，如果邮件过大，收件人的邮件系统可能会拒绝接收。


    通过电子邮件发送到 iPad 上的照片会怎样？当邮件出现在收件箱中时，你可能会看到照片本身，或者一个表示该照片仍需从邮件服务器下载到 iPad 的图标。


    任何发送给你的照片都可以保存到“照片”中，或者拷贝后粘贴到其他应用中。要保存或拷贝照片，请长按它，此时会弹出一个带有两个按钮的窗口——“存储图像”和“拷贝”。要将图像保存到“照片”，请点击“存储图像”。iPad
    会将该图像复制到“照片”应用中的“相机胶卷”里。如果你打算将图像直接粘贴到另一个文档中，请点击“拷贝”，这样图像就会被移动到剪贴板以供粘贴。


    **提示：** 你有没有想过本书中那些精彩的屏幕截图是怎么来的？要截取 iPad 显示屏上的任何内容，只需按住主屏幕按钮，然后按下开/关/睡眠/唤醒按钮。你的屏幕会“闪一下”，并伴有一声快门音，告诉你屏幕截图已保存到你的照片库中。


    ## 总结


    作为 iPad 上电子邮件的首要通道，“邮件”应用可以说是该设备上最重要的软件之一。设置邮件很简单，该应用在幕后处理了大部分配置工作，只需 iPad 用户提供最低限度的协助即可。


    本章向你展示了如何设置该应用，然后如何使用它发送或接收电子邮件。我们讨论了邮件如何与 iPad 上的许多其他应用协同工作，以提供与他人共享信息的方式。以下是本章中需要掌握的重点：


    -   要使用邮件，必须先在应用中配置账户。将账户信息从其他电脑转移到 iPad 的一个简单方法是，从电脑上的 iTunes 同步邮件设置。

    -   在 iPad 上设置邮件账户时，使用苹果的邮件“速查表”有助于获取成功配置账户所需的所有设置。

    -   收到带有附件的电子邮件后，长按邮件中的附件图标，即可在 iPad 上查看或打开该文件。

    -   从“通讯录”应用发送 vCard 文件，可以快速与他人共享联系人信息。vCard 是一种近乎通用的文件格式，适用于 Windows、Mac 和 Linux
    用户。

    -   iPad 上的所有电子商店——iTunes Store、iBookstore 和 App Store——都包含“告诉朋友”链接，用于向朋友发送商店中你认为值得关注的商品的详细信息。

    -   一次只能从“照片”应用发送五张照片，以避免与邮件服务器的邮件大小限制冲突，但可以通过将照片拷贝并粘贴到邮件中来解决这个限制。


    # 第 12 章


    # 使用地图


    iPad 上有一款功能强大的地图应用，叫做“地图”。它使用谷歌地图，通过地图和卫星图像来交互式地查找和显示位置。使用地图，你可以获取路线、查看交通状况等等。


    在本章中，你将学习如何浏览地图、将位置添加书签、在街景中“漫步”街道，甚至将 iPad 用作指南针。地图不仅仅是一个强大的应用，它也是一个有趣的应用。让我们开始吧。


    点击地图图标启动该应用（见图 12-1）。它看起来像一张显示 280 号州际公路某段的小地图。图标上的图钉恰好位于苹果公司总部所在地——加利福尼亚州库比蒂诺。这将带你进入地图应用，在这里你可以查看和探索世界各地的地理信息。


    ![images](img/1201.jpg)


    **图 12-1.** *地图图标*

