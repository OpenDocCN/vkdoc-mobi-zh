- fmt: '### Sync Apps


    Under the Sync Apps heading, shown in [Figure 2–15](#Chapter02.html#fig_2_15),
    you’ll see a scrollable list of all the applications you have in your apps library
    in iTunes. You can sort the list by name, by kind, by size, by category, or by
    date downloaded.


    In the apps list, you’ll see a check box on the left of each app’s icon. To the
    right of each icon is the app’s name, and below that are the app’s category listing
    and the file size of the individual application. Any app that has a selected check
    box means the app is set to sync with the iPad.


    ![images](images/0215.jpg)


    **Figure 2–15.** *The Apps tab is where you choose what apps to put on your iPad
    and in what order to arrange them in.*


    **NOTE:** Whenever you download a new app in iTunes, it will automatically sync
    with your iPad on the next sync. You can, of course, simply remove the app after
    the sync or deselect the `Automatically sync new apps` option shown in [Figure
    2–15](#Chapter02.html#fig_2_15).


    Next to the apps list you’ll see a visual representation of your iPad desktop,
    and next to that you’ll see one or more black screens with icons that are already
    on, or set to be synced with, your iPad. You’ll also see a completely gray screen
    below the last black one.


    The easiest way to get apps on your iPad is to find them in the apps list and
    simply drag them onto the virtual iPad screen. As soon as you do, the app’s check
    box is automatically selected in the apps list.


    You can drag around the apps on your virtual iPad screen until you’ve arranged
    them in the order you like. You can also grab the smaller black screens and move
    them up or down in the list, rearranging entire pages of apps on your iPad. The
    black screen at the top of the list will be the home page on your iPad, and each
    one below that will be a subsequent swipe away. The gray screen at the bottom
    is an extra screen that you can use to create a new screen with apps.


    To remove an app, simply hover the mouse over the app, and you’ll see a little
    `X` appear in the upper-left corner. Click the `X`, and the app disappears from
    the screen. On the next sync, the app will be removed from your iPad (don’t worry,
    you can always get it back by dragging it again from the apps list to the virtual
    iPad screen).


    **NOTE:** Apps shipped with the iPad cannot be removed from the device—they can
    only be repositioned.


    Each screen can hold 20 apps in addition to the ones docked at the bottom of the
    screen. The Dock can hold up to six apps. Any apps you put in the Dock will appear
    at the bottom of the iPad no matter what app screen you’ve swiped to. Since the
    docked apps always appear at the bottom of any app page, it’s best to put the
    ones you use most frequently down there for quick access.


    ### File Sharing


    The iPad introduced an easy way to share files between your computer and iPad.
    Beneath the File Sharing heading you’ll see an Apps box and a Documents box (see
    [Figure 2–16](#Chapter02.html#fig_2_16)). Any apps currently on your iPad that
    support drag-and-drop file sharing appear in the Apps list here. To get a file
    into the application, simply select the application in the Apps list, find on
    your computer the file you want to add, and drag it into the Documents list. You
    can also click the `Add` button at the bottom of the Documents list to browse
    for the file on your computer.


    ![images](images/0216.jpg)


    **Figure 2–16.** *Apps that support drag-and-drop file sharing and their enclosed
    documents*


    If you’ve created a completely new file on your iPad, say in Apple’s text editor
    Pages, and want to transfer that file to your computer, select the file in the
    Documents list, click the `“Save to…”` button below the list, and choose where
    on your computer you want to save the file. Alternately, you can simply drag the
    file from the Documents list to your desktop.


    To delete a file from the app that contains it, select the file in the Documents
    list and press the `Delete` key on your keyboard. A pop-up window appears asking
    if you really want to delete the file. Click `Delete` to complete the deletion.


    As long as a file is shared inside an app, that file is always backed up as part
    of app backups when you sync your iPad to your computer.


    **NOTE:** Just because you can drag a file to an app’s document box doesn’t mean
    the app can open it. Apps are limited to working with files that the iPad supports.
    For example, the iPad does not natively support Microsoft’s WMV video files. If
    you drag a WMV movie to an app, the app will contain it but will still not be
    able to play it unless support is built into that application itself. Pages wouldn’t
    be able to open a movie document, for instance.


    ### The Music Tab


    The Music tab is essentially self-explanatory (see [Figure 2–17](#Chapter02.html#fig_2_17)).
    Ensure the `Sync Music` check box is selected at the top. In the box below it,
    you will see two radio buttons and several check boxes.


    ![images](images/0217.jpg)


    **Figure 2–17.** *The Music tab allows you to select which playlists, artists,
    albums, and genres you want to sync to your iPad.*


    - *Entire music library*: When this option is selected, your entire music library
    will be synced to your iPad, but only if you have the storage space available
    on your iPad. If you have more music than iPad storage capacity, the remainder
    of the music will stop syncing once the iPad is full.

    - *Selected playlists, artists, albums, and genres*: If you select this option,
    you will see four boxes appear listing all the playlists, artists, albums, and
    genres you have in your iTunes library (see [Figure 2–18](#Chapter02.html#fig_2_18)).
    Go through and select the check boxes of the playlists, artists, albums, and genres
    you want on your iPad.

    - *Include music videos*: If you select this check box, any music videos associated
    with playlists, artists, albums, or genres will be transferred to the iPad.

    - *Include voice memos*: If you select this check box, any voice memos you have
    stored in your iTunes library will sync with your iPad.

    - *Automatically fill free space with songs*: This check box appears only if you’ve
    selected the “Selected playlists, artists, albums, and genres” radio button. If
    selected, once all your other files (movies, books, photos, and so on) have been
    synced to your iPad, any leftover free space will be filled with music until your
    iPad can’t fit anything else on it. We don’t recommend selecting this option.
    It severely limits your ability to create any new documents on your iPad since
    it won’t have any space left to store them. This is a feature better suited to
    the music-based iPod touch than the application-centric iPad.


    ![images](images/0218.jpg)


    **Figure 2–18.** *Select the playlists, artists, albums, and genres you want to
    sync with your iPad.*'
