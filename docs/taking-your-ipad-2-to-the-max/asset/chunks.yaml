  trans: '

    # 签名


    你是否曾收到过从 iPad、iPhone 或其他 iOS 设备发送的电子邮件？通常，你一眼就能认出它们，因为每封邮件的末尾都附有“从我的 iPad 发送”的签名。在你的
    iPad 上，你可以轻松地自定义外发邮件的默认签名，将其修改为你喜欢的任何文字。


    许多人喜欢在签名中添加一句简短说明，解释他们邮件内容为什么很简短（例如“请原谅我回复的简洁”），有时还会为可能的拼写错误致歉（我们的技术编辑戴夫·卡洛的签名是：“请原谅拼写错误。我的手指有点大。别误会，不是特别大，只是对于一个身高
    6 英尺的人来说是平均水平。”）。


    一些使用 POP 电子邮件和转发账户的 iPad 用户也会在签名中反映这种情况（例如：“从我的 iPad 的电子邮件转发账户发送。请勿回复此地址。请改用我的日常办公邮箱，谢谢！”）。还有一些人则利用签名提供常规联系方式，让律师们履行职责（例如：“本电子邮件，包括附件，仅供指定的个人或公司查收，可能包含保密和/或法律特权信息。”），或者仅仅是为了炫耀他们的
    iPad（例如：“从我的 iPad 发送。我有最好的玩具。我赢了！”）。


    要自定义你的电子邮件签名，请点击 `Signature` 按钮。与大多数 Mac 或 Windows 电子邮件程序不同，iPad 上的 `Mail` 并不为每个邮件账户提供单独的签名。相反，你创建一个通用签名，该签名将被所有账户使用。根据需要编辑默认的“从我的
    iPad 发送”文本。你可以将其更改为添加你的姓名、网址或任何其他你希望包含的内容。请记住，如果在签名中包含姓名，它将出现在所有账户中。当所有账户都属于同一用户时，这没有问题。但当乔恩和苏西共用同一台
    iPad 时，写着“此致，强尼”的签名也会出现在苏西的电子邮件底部。因此，你可能需要避免在共享签名中使用姓名。


    # 默认账户


    `Default Account` 设置允许你选择要用于发送外发邮件的账户。当你使用 iPad 上的其他应用编写邮件时，这些邮件将始终从默认账户发送。点击
    `Default Account` 按钮查看 iPad 上的账户列表，然后选择你想要使用的账户。


    # 查看和管理你的收件箱


    在 iPad 上设置好 `Mail` 后，只要没有将所有设置都设为“手动”，你就会开始自动接收电子邮件。新邮件的第一指示标志是“新邮件音”。虽然有声音提示收到邮件是件好事，但如果你每天收到大量邮件，或者正在开会时收到消息，它可能会变得有点烦人。要关闭“新邮件音”，请前往
    `设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg) `声音`；然后将开关滑动到 `关闭` 位置。


    你的 iPad 还会提供一个精巧的小指示器，通知你收件箱中有未读邮件。`邮件`应用图标会显示一个红色小椭圆形，其中包含你所有收件箱中的未读邮件数量（参见 图
    11-8）。此数量涵盖所有收件箱，因此，如果一个账户中有 10 封邮件等待，另一个账户中有 5 封，红色椭圆形将显示你有 15 封未读邮件。


    ![images](img/1108.jpg)


    **图 11-8.** *有新邮件！看来是时候点击那个邮件图标，看看你各个邮箱中的那 57 封未读邮件了。*


    ## 启动和查看邮件应用


    要启动 `Mail` 应用，请点击其图标。启动后，你所看到的界面取决于你是在竖屏还是横屏模式下启动设备。这是因为 `Mail` 使用了一项 iPad 功能，称为*拆分视图*。如果你横向（横屏模式）手持
    iPad，屏幕上有足够的空间同时在左侧显示邮箱和账户列表，在右侧显示邮件。


    将 iPad 翻转过来，长边变为上下方向（竖屏模式），邮箱和账户列表会弹入一个 `收件箱` 按钮。你只能通过点击屏幕左上角的 `收件箱` 按钮来查看该列表。打开的小窗口被称为“弹出式”屏幕元素，因为它会从你点击的按钮上方弹出窗口。


    图 11-9 显示了两种方向下的 iPad 屏幕。通常，在横屏模式下手持 iPad 使用 `Mail` 会*容易得多*。你不必一直从左上角的按钮打开弹出式列表。相反，你可以同时看到屏幕上的所有内容。


    ![images](img/1109.jpg)


    **图 11-9.** *邮箱列表包含了当前在 iPad 上设置的所有电子邮件收件箱和账户，以及每个账户的未读邮件数量。当你在竖屏模式下手持 iPad 时（左图），只能通过点击屏幕左上角的收件箱按钮来查看该列表。在横屏模式下（右图），该列表会整合到屏幕中，显示在任何选定内容的左侧。*


    要查看任何一个收件箱或账户中的邮件，请在 `邮箱` 列表中点击该项。如果你已将特定电子邮件账户设置为手动获取邮件，此时 iPad 将检查服务器以获取新消息。邮箱和账户列表的左下角还有一个小的刷新图标。点击此图标将强制
    `Mail` 立即检查服务器并检索任何已到达的新消息。这允许你绕过任何正常的获取间隔，随时检查邮件。


    **警告：** 对于 IMAP 账户，已发送的邮件可以保存在服务器上。然而，对于 POP3 账户，情况可能并非如此。如果你发现已发送的邮件未被保存，并且希望保留已发邮件的存档，请使用密送功能给自己发送一份副本。


    请注意 `收件箱` 列表顶部出现的 `所有收件箱` 项。`所有收件箱` 将所有账户中的所有项目合并在一起，让你可以在一个位置阅读新消息。这是 iOS 的新功能，也是近期为
    `Mail` 添加的众多重大改进之一。


    `收件箱` 列表与 `账户` 列表的不同之处在于，前者*仅*包含每个账户的收件箱——即你的账户已收到的邮件文件夹。大多数邮件账户允许你创建其他文件夹，用于存档和组织邮件，从而让你无需删除存档邮件即可整理收件箱。`账户`
    列表中的每个条目不仅会引导你进入该账户的收件箱，还会进入该账户的完整文件夹集合，这些文件夹通常包含其他项目，如 图 11-10 所示。这些文件夹可能包括用于已删除邮件的
    `废纸篓` 文件夹、用于外发邮件的 `已发送邮件` 文件夹、用于待办事项的 `待办事项` 文件夹等。Gmail 账户的默认文件夹包括 `个人`、`收据`、`旅行`
    和 `工作`。


    ![images](img/1110.jpg)


    **图 11-10.** *此示例 Gmail 账户的收件箱包含一封未读邮件，其余邮件已被选中并查看。*


    尽管 `收件箱` 屏幕可以快速方便地访问所有新邮件，但当你需要通过将邮件移动到其他文件夹来整理邮件时，使用 `账户` 呈现方式特别方便。它允许你在一个位置查看所有文件夹，从而简化了为邮件选择目标文件夹的过程。你将在本章后面阅读到更多关于编辑邮箱的内容。

