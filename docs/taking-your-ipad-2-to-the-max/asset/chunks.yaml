- fmt: '# Navigating and Reading PDFs


    To read a PDF, tap its cover. The PDF will fly forward and open. If it''s the
    first time you''ve opened the PDF, you''ll be on the first page. If you have opened
    the PDF before, it will open to the page you left off on.


    You can view PDFs in Portrait or Landscape mode (see [Figure 9–30](#Chapter09.html#fig_9_30));
    however, unlike with books, viewing a PDF in Landscape mode does not show you
    two side-by-side pages. It''s baffling why Apple didn''t add this feature (at
    the time of writing), but most likely it will be added sometime in the future.


    ![images](images/0930.jpg)


    **Figure 9–30.** *Viewing PDFs in Landscape and Portrait modes*


    At the top of any PDF''s page, no matter what orientation you are in, you''ll
    notice a menu that contains a series of buttons with the name of the PDF document
    in the center (see [Figure 9–31](#Chapter09.html#fig_9_31)). These buttons will
    already be familiar to you because they are similar to the ones you see while
    reading an e-book:


    ![images](images/0931.jpg)


    **Figure 9–31.** *A PDF''s menu buttons*


    * *Library*: Tapping this closes the PDF and takes you back to your PDF bookshelf.
    The next time you open the PDF, you''ll be taken to the page you were on when
    you left it.

    * *Contact Sheet*: This button is signified by three dots, each with a line after
    it. Tap this button to be presented with a contact sheet—a series of thumbnails
    of all the pages in a PDF.

    * *Share*: Tapping this button allows you to e-mail the currently selected PDF
    or print it to a wireless AirPrint printer.

    * *Brightness*: This is the button that looks like the sun and changes the screen
    brightness while inside the iBooks app only.

    * *Search*: The Search button looks like a magnifying glass and allows you to
    search through a PDF''s text. It also has *quicklinks* to search Google and Wikipedia
    for your selected search term.

    * *Bookmark*: Tap the Bookmark ribbon to bookmark the current page you are on.
    Remember that bookmarks in iBooks behave differently than traditional bookmarks
    for a paper book. To bookmark a page in iBooks means you have effectively “dog-eared”
    the page. You can have multiple bookmarks in the same document. To remove a bookmark,
    tap the Bookmark icon again.

    * *Page Scrubber*: This is the series of page icons that run along the bottom
    of a PDF''s page (see [Figure 9–32](#Chapter09.html#fig_9_32)). Drag your finger
    across the thumbnails to quickly navigate through the PDF''s pages. You''ll see
    the page number of the page currently selected float overhead. You can also just
    tap any thumbnail to jump right to that page.


    ![images](images/0932.jpg)


    **Figure 9–32.** *The Page Scrubber bar at the bottom of a PDF*


    While reading, you can tap the center of a book''s page to show/hide the Menu
    and Page Scrubber bars. While on a page, you can double tap it to zoom in; or,
    for more control, you can use a pinch gesture to zoom in or out. To navigate the
    pages of a PDF, simply swipe your finger to the left or right to move forward
    or backwards one page. You can also tap the margins of a page to move forwards
    or backwards, or you can use the Page Scrubber bar at the bottom of the page.
    Alternatively, you can scroll through the large thumbnails that represent all
    the pages in the PDF document by using the contact sheet.


    ## Using the Contact Sheet


    As you can now see, you already know how to use the PDF Menu bar because it is
    so similar to an e-book''s Menu bar. The only feature that is slightly different
    is the Table of Contents button, which has been replaced with a Contact Sheet
    button (note that both icons are identical—three dots, each followed by a line).


    ![images](images/0933.jpg)


    **Figure 9–33.** *The contact sheet lets you see all the PDF''s pages as large
    thumbnails.*


    Tap the Contact Sheet button and you''ll see all the pages in the PDF document
    presented to you in large thumbnails that you can then scroll through with the
    swipe of you finger (see [Figure 9–33](#Chapter09.html#fig_9_33)). This is useful
    when you are dealing with a very large document with lots of diagrams or images.
    It allows you to quickly search the PDF by eye. When you find the desired page,
    tap it and you''ll be instantly taken to that page in the document.


    You''ll also notice that some contact sheets might have a little red Bookmark
    icon in their upper-right corner. This means you''ve bookmarked that page by tapping
    the Bookmark button in the PDF Menu bar (see [Figure 9–31](#Chapter09.html#fig_9_31)).
    To see only your bookmarked pages, tap the Bookmark button in the upper-right
    corner of the Contact Sheet menu (see [Figure 9–34](#Chapter09.html#fig_9_34)).
    Any page without a bookmark will be hidden from view.


    ![images](images/0934.jpg)


    **Figure 9–34.** *The contact sheet''s Bookmarked Pages view*


    To leave the contact sheet, you can tap the Library button to return to your PDF
    bookshelf or the Resume button to return to the page you were on when you navigated
    to the contact sheet. You can also tap any page to be taken to that page.


    **TIP:** On a Mac, if you can print it, you can turn it into a PDF. Simply choose
    what you want to turn into a PDF, then choose Print from the File menu of the
    application you are in (e.g., Word or Firefox). You''ll see a PDF button in the
    lower-left corner of the Print dialog box. Click it and select `Save as PDF...`
    from the drop-down menu. Name the PDF, click Save, and then drag it to your iTunes
    library. On your next sync, your new PDF will appear in iBooks. If you own a PC,
    there are several options to turning documents into PDFs. Google “print to PDF”
    to find the right solution for you.


    # Settings


    There are a few external settings for the iBooks app. Navigate to Settings from
    the iPad''s Home screen and select iBooks from the Apps header on the left side.
    You''ll see five settings (see [Figure 9–35](#Chapter09.html#fig_9_35)):


    ![images](images/0935.jpg)


    **Figure 9–35.** *The iBooks app settings*


    * *Full Justification*: When this set to ON, the text on a book''s page will fill
    the width of the page evenly. When full justification is set to OFF, the text
    on the right side of the page will be ragged (see [Figure 9–36](#Chapter09.html#fig_9_36)).

    * *Auto-hyphenation*: When this is set to ON, iBooks will automatically hyphenate
    words, allowing more words to be displayed on a single page.

    * *Tap Left Margin*: You can set this to Previous Page or Next Page. If you set
    it to *Next Page*, tapping the left margin of a book will advance you to the next
    page in a book instead of taking you back one page. This setting might be nice
    while reading a book on the iPad at odd angles, such as in bed. With Next Page
    selected, the only way to go back one page in your book is by using the Page Scrubber
    bar at the bottom of the page.

    * *Sync Bookmarks*: When set to ON, this will sync a book''s bookmarks, highlights,
    and notes between devices. This is nice if you are using iBooks on an iPad and
    iPhone. When you create a note or bookmark in the book on one device, it will
    appear on the other.

    * *Sync Collections*: When set to ON, this will sync your iBooks collections.
    This is nice if you are using iBooks on an iPad and iPhone. When you create or
    modify a collection on one device, it will appear exactly the same on the other.


    ![images](images/0936.jpg)


    **Figure 9–36.** *The same page with full justification on (left) and full justification
    off (right)*'
