- fmt: '#### Scrolling, Zooming, and Other Viewing Skills


    `Safari` responds to the complete vocabulary of taps, flicks, and drags discussed
    in [Chapter 2](#Chapter02.html#ch2). You can zoom in on pictures, squeeze on columns,
    and more. Here''s a quick review of the essential ways to interact with your screen:


    - `*Drag*`: Touch the screen and drag your finger to reposition web pages. If
    you think of your iPad as a window onto a web page, dragging allows you to move
    the window around the web page.

    - `*Flick*`: When dealing with long pages, you can flick the display up and down
    to scroll rapidly. This is especially helpful when navigating through search engine
    results and news sites.

    - `*Double-tap*`: Double-tap any column or image to zoom in, auto-sizing it to
    the width of your display. Double-tap again to zoom back out. Use this option
    to instantly zoom into a web page''s text. The iPad recognizes how wide the text
    is and perfectly matches that width.

    - `*Pinch*`: Use pinching to manually zoom in or out. This allows you to make
    fine zoom adjustments as needed.

    - `*Tap*`: Tap buttons and links to select them. Tapping allows you to move from
    site to site and to submit forms.

    - `*Page down*`: When zoomed in onto a column, double-tap toward the bottom of
    the screen while staying within the column. The page re-centers around your tap.
    Make sure not to tap a link!

    - `*Jump to the top*`: Double-tap the very top of the screen (just below the time
    display) to pop instantly back to the top of the page.

    - `*Stop a scroll*`: After flicking a page to get it to scroll, you can tap the
    page at any time to stop that movement. Don''t forget that you can also manually
    drag the screen display to reset the part you''re viewing.


    **TIP:** Some web pages have text boxes in them, which have their own scrollbars,
    separate from the scrollbars of the web page. If you come across a web page with
    a text box while using `Safari` on the iPad, you can scroll through the text box
    on the page without scrolling through the entire page. To do this, swipe up or
    down with two fingers inside the text box. Only the contents of the text box will
    scroll, and the main page will stay in place.


    #### Page Management


    `Safari` allows you to open up to nine concurrent browser windows at once. To
    review your open windows, tap the Pages button (it''s the one that looks like
    two boxes stacked on top of each other) in the Navigation bar. `Safari`''s Page
    viewer opens, as shown in [Figure 6–14](#Chapter06.html#fig_6_14). You may see
    a number inside the boxes. This number signifies the number of open pages you
    have in `Safari` at the moment.


    ![images](images/0614.jpg)


    **Figure 6–14.** *The Page viewer allows you to select which browser window to
    display.*


    This viewer allows you to interactively select a browser window. From there, you
    can do the following:


    - To select a window, simply tap it. The `Safari` window springs forward and automatically
    reloads so it has the most current content on the page.

    - To close a window, tap the Close button—the black circle with an `*X*` in it
    at the top left of each page. The Page viewer slides the remaining pages into
    the gap left by the closed window.

    - To add a new page, tap the dotted, blank New Page button; `Safari` will create
    a new window and open the new, blank page for you to work with. You will not see
    a New Page window if you have nine currently opened pages.

    - The page-management tool lets you quickly navigate back and forth between several
    open `Safari` windows. If you want, think of this tool as a replacement for tabs
    that your desktop browser offers.


    #### Working with Bookmarks


    One of the great features of the iPad is that it lets you take your world with
    you: contacts, calendars, e-mail accounts, and bookmarks. You don''t have to reenter
    URLs for all your favorite pages on the iPad. It loads these bookmarks whenever
    it syncs, provided you have enabled this feature in the iTunes iPad Preferences
    window (see [Chapter 2](#Chapter02.html#ch2)).


    #### Selecting Bookmarks


    A bookmarks collection can contain hundreds of individual URLs, which is why people
    really appreciate the iPad''s simple bookmarks browser (see [Figure 6–15](#Chapter06.html#fig_6_15)).
    When you tap the Bookmarks button in the Navigation bar, a simple Bookmarks pop-up
    window appears. It uses the same folder structure that you''ve set up on your
    personal computer. You can tap folders to open them and tap the Back button (top-left
    corner) to return to the parent folder.


    ![images](images/0615.jpg)


    **Figure 6–15.** *Use iPhone Safari''s interactive Bookmarks navigation menu to
    locate and open your favorite bookmarks.*


    Identifying bookmarks is easy. Folders look like folders, and each bookmark is
    marked with a small open book symbol. Tap one of these, and `Safari` will take
    you directly to the page in question. If your list of bookmarks is long, simply
    flick or scroll through the list.


    When you are on the first level of your bookmarks, you''ll notice a History folder
    at the top. Tap it and you''ll be taken to all the pages you''ve visited in `Safari`
    since you last cleared the history. To clear the history, tap the Clear History
    button, and you''ll be asked to confirm. Tap the red Clear History button to confirm
    ([Figure 6–16](#Chapter06.html#fig_6_16)).


    You''ll also see a folder labeled Bookmarks Bar. Any bookmarks placed in this
    folder will appear in the Bookmarks bar that shows below the bottom of `Safari`''s
    Navigation bar when you are entering a URL (shown earlier in [Figure 6–5](#Chapter06.html#fig_6_5)).


    ![images](images/0616.jpg)


    **Figure 6–16.** *Safari''s History folders and the Clear History deletion confirmation*


    **NOTE:** The history of your desktop browser and iPad''s `Safari` browsers do
    not sync. Any pages you navigate to on your iPad will not show up on your desktop''s
    browsing history, and vice versa.


    #### Editing Bookmarks


    As [Figure 6–15](#Chapter06.html#fig_6_15) shows, an Edit button appears at the
    top-right of the bookmark''s pop-up field. Tap this to enter Edit mode (see [Figure
    6–17](#Chapter06.html#fig_6_17)).


    ![images](images/0617.jpg)


    **Figure 6–17.** *Safari contains a built-in bookmark-management system that allows
    you to edit and reorder your bookmarks.*


    Edit mode allows you to manage your bookmarks on your iPad just as you would on
    your personal computer:


    - `*Delete bookmarks*`: Tap the red Delete circle icon to the left of a bookmark
    to delete it. Tap Delete to confirm or tap elsewhere on the screen to cancel.

    - `*Reorder bookmarks*`: Use the gray grab handles (the three lines on the far
    right) to move folders and bookmarks into new positions. Grab, drag, and then
    release.

    - `*Edit names*`: Tap the gray Reveal arrow (the sideways V symbol to the right
    of each name) to open the Edit Bookmark or Edit Folder screen. Use the keyboard
    to make your changes and tap the Back button to return to the Bookmarks editor.

    - `*Re-parent items*`: You can move items from one folder to another by tapping
    the parent folder field below the Name edit field. Select a folder, and then tap
    the Back button to return to the Bookmarks editor. Unfortunately, you don''t get
    the same wild animation that you do in Mail when you send an item to a new folder,
    but at least it works reliably.

    - `*Add folders*`: Tap New Folder to create a folder in the currently displayed
    bookmarks. The iPad automatically opens the Edit Folder screen. Here, you can
    edit the name and, if needed, re-parent your new folder. Tap Back to return to
    the editor.

    - `*Finish*`: Return to the top-level Bookmarks list (tap the Back button until
    you reach it), and then tap Done. This closes the editor and returns to your bookmarks
    list.'
