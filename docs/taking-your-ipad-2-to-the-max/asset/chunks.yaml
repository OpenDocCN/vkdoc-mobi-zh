- fmt: '### Buying Your iPad


    After deciding among the available iPad models, you’re probably ready to pull
    out your credit card and go buy that iPad (see [Figure 1–1](#Chapter01.html#fig_1_1)).
    Where should you go? To an Apple Store? To an authorized Apple retailer or Best
    Buy store? Or should you buy online? You might be surprised to learn that there
    are better and worse choices.


    We recommend buying your iPad in person at a store. You can ask questions. You
    can make human connections. If something goes wrong with your purchase, you have
    a person who’s there to help you work through it. This is not to say that calling
    Apple’s support line is insufficient; it’s just that being face to face with a
    real person makes solutions happen more readily.


    The sad fact of the matter is that, on occasion, iPad purchases do not go smoothly.
    Some people end up with a screen flaw, such as dead screen pixels. It’s not an
    uncommon problem, and if found soon after purchase, it may involve a trade-in
    for a new unit. Others may have problems connecting to Wi-Fi or 3G networks. The
    chances of resolving these issues increase significantly when you have a real
    person to talk to.


    As for the question of Apple or other retailers, we lean slightly toward buying
    at an Apple Store. It’s an Apple product you’re buying, and the Apple staff members
    are simply more knowledgeable about that product.


    ![images](images/0101.jpg)


    **Figure 1–1.** *That nice shiny box contains the Apple of your eye, your iPad.
    Remember to keep all your packaging, receipts, and other purchase information
    just in case you need to return it to the store.*


    ### Purchasing Your iPad Online


    For a surprising number of people, there is no physical store nearby for picking
    up an iPad. In that case, the Apple Online Store is your best bet for getting
    your hands on an iPad as soon as possible.


    **NOTE:** There are two quick ways to buy your iPad online. First click the iPad
    tab at the top of the Apple website ([`www.apple.com`](http://www.apple.com)),
    and then click the blue Buy Now button. The second way? Point your browser to
    the iPad page ([`http://store.apple.com/us/browse/home/shop_ipad/family/ipad`](http://store.apple.com/us/browse/home/shop_ipad/family/ipad))
    in the Apple Online Store. Be sure to have your credit card ready.


    Apple makes it easy for you to purchase your iPad online. The individual models
    all have their own Select button, and a click brings you to a page that lets you
    choose which Apple accessories you want to add to your purchase. Adding those
    accessories to your purchase just requires a click of the radio button near each
    item, and when you are finally ready to check out, clicking the Add to Cart button
    displays the contents of your virtual shopping cart as well as a Check Out Now
    button. An estimate of the shipping date is displayed in your shopping cart next
    to each item so you know when to start waiting for the delivery truck driver to
    ring your doorbell.


    ### Repairs, Returns, Warranties, AppleCare, and Insurance


    In most situations, the iPad you buy will be in perfect working order, and you
    should never need to return it to Apple. However, if you do get an iPad that just
    isn’t working properly or that fails during the first year of ownership, there
    is a tried-and-true process to follow.


    First, visit the iPad Support web page ([`www.apple.com/support/ipad/`](http://www.apple.com/support/ipad/))
    to see whether you have set up something improperly or whether there is a known
    issue and solution. If the online support does not resolve the problem, then it
    is time to either take the iPad to your Apple retailer or send the iPad to Apple.


    For iPads that have been purchased at an Apple Store, the easiest thing to do
    is to grab your receipt, the iPad, the original box, and all the contents of that
    box, and then head to the store. The Apple Store staff may ask you to work with
    a person at the Genius Bar in an attempt to resolve the problem, in which case
    there may be a delay until they can fit you into their busy schedule.


    At other Apple authorized retailers, the return policy may be different, so be
    sure to check that policy when you purchase your iPad.


    iPads purchased online from Apple require a Return Material Authorization (RMA).
    To initiate the return process, call Apple’s support phone number at 1–800-275-2273
    and speak to an iPad support specialist. If that person determines that the iPad
    is faulty and is eligible for repair or replacement, they will issue an RMA to
    you.


    **NOTE:** Outside of the United States, you can refer to [`www.apple.com/support/contact/phone_contacts.html`](http://www.apple.com/support/contact/phone_contacts.html)
    for a list of international phone numbers for Apple Support.


    In the first paragraph of this section, we called attention to “the first year
    of ownership.” That’s the complimentary warranty period for any iPad. If you want
    to extend that warranty for another year, you can purchase an AppleCare Protection
    Plan for iPad for $99. This extends your hardware repair coverage to two years.
    If interested, you can purchase this option at the online Apple Store. Once the
    warranty expires, you’ll have to pay the going rate for repairs or battery replacements.


    American Express cardholders can double their iPad warranty simply by purchasing
    the device with their Amex card. This Extended Warranty program may be provided
    by other credit card companies, so be sure to check your card terms and conditions
    for details.


    If you can, make sure to back up your iPad by syncing it to iTunes before bringing
    it in for service. Apple will usually restore your iPad to factory condition,
    which means you’ll lose any data stored on the iPad during the repair and service
    process.


    Is AppleCare worth buying? In our opinion, it is. In one case, AppleCare more
    than paid for the replacement of a logic board with a faulty FireWire port on
    an Apple PowerBook G4 almost three years into the plan.


    You’re entitled to complimentary phone support for 90 days after the purchase
    of your iPad. AppleCare extends that period to a full two years, and you can call
    Apple’s experts as many times as you want to get your questions answered.


    What about a situation where you find that an iPad isn’t what you really needed,
    or what if you decide that you want the 64GB model instead of the 32GB iPad that
    you bought? Apple realizes that people change their minds or may be dissatisfied
    for one reason or another, so you have 14 calendar days to return your purchase.
    You must return the iPad in the original, unmarked packaging including any accessories
    (such as the power adapter), manuals, documentation, and registration that shipped
    with the product. There is a cost for this flexibility, because Apple assesses
    a 10 percent restocking fee on the return.


    Apple does not offer an insurance plan for the iPad, and it’s unlikely that the
    company will do so in the future. Instead, you’ll need to call your renter’s or
    home insurance carrier to see how much you’ll have to pay for an iPad rider (a
    rider is placed on top of an existing policy, adding coverage for a specific item
    not covered under the standard plan).'
