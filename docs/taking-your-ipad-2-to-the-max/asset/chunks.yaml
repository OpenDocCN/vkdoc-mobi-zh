    left, and then click the Add button on the right side. A standard file Open dialog
    box for your computer appears, and then you can select one or more documents to
    transfer. Once the document files have been added to the list on the right side,
    clicking the Sync button in iTunes transfers the documents to your iPad.


    Within any of the iWork apps, tapping the folder icon in the top-right corner
    of the My Documents, My Spreadsheets, or My Presentations window displays the
    documents stored on your iPad, and tapping the filename opens the file in the
    app.


    A number of iPad file manager apps, like Air Sharing Pro and GoodReader, provide
    another way to move files to your iPad. These apps connect to MobileMe''s iDisk,
    Dropbox, and other servers; allow you to view the files on the server; and then
    download and open them in iWork for iPad. With iPad printing support built into
    Air Sharing Pro, it makes a wonderful companion to iWork.


    Moving documents out of iWorks is not as simple, because there is no common file
    store for these file managers to retrieve files from. In many cases, the only
    choices you may have for exporting documents are through e-mail (see [Chapter
    11](#Chapter11.html#ch11)), saving the documents to iWork.com (Apple''s online
    repository for sharing iWork documents), or using iTunes as described earlier.


    ### Summary


    The iWork for iPad trio of Pages, Numbers, and Keynote is a powerful set of apps
    for creating documents for work or pleasure while you''re on the go. These optional
    Apple apps work well with their Mac counterparts and, to a more limited degree,
    Microsoft Office.


    In this chapter, we''ve provided a look at the user interface and major capabilities
    of Pages, Numbers, and Keynote. Although a more detailed discussion of each app
    could easily fill another book, we''ve given you the information you''ll need
    to get started using iWork for iPad. Some important points to remember from this
    chapter include the following:


    *   Pages, Numbers, and Keynote do not come with your iPad. To purchase the apps
    for $9.99 each and then install them, use the App Store app on your iPad while
    you''re connected to a Wi-Fi network or purchase the apps in iTunes and then sync
    the iPad to your computer.

    *   All three of the iWork for iPad apps include a page (My Documents/My Spreadsheets/My
    Presentations) displaying your existing documents, and you can choose to create
    a new document on a blank page or with a professionally designed theme or template.

    *   The user interface is consistent between all three of the apps. If you become
    familiar with one of the iWork apps, you''ll understand how to use the other two
    in no time at all.

    *   Pages can be used both as a traditional word processor and as a page layout
    application, depending on your needs.

    *   Numbers tabs are similar to sheets in an Excel workbook. Each tab can have
    one or more tables (spreadsheet) on it, as well as media (images), charts, and
    shapes.

    *   Add transitions and builds to your Keynote presentations to make them more
    interesting and vibrant to your audience.

    *   Transferring documents from your computer to your iPad is a great way to work
    on the go. You can transfer them by e-mail, through iTunes, or through a growing
    number of file management utilities.


    ## Chapter 15


    ## Using the iPad Cameras with Camera, Photobooth, and FaceTime


    Perhaps the most significant upgrade to the second-generationiPad is represented
    in its two cameras. These cameras introduce new and compelling features to the
    formerly cameralessiPad: the ability to take photos and record high-definition
    video, the ability to play with those videos using Photobooth, and the ability
    to place and receiveFaceTime video calls.


    Are you lucky enough to own one of the latest iPads? If not, this chapter is really
    not for you, at least until you''re ready to upgrade. But if you''ve been able
    to purchase a newer-generation iPad, then this chapter will teach you great ways
    to take photos and record video.


    ### The Camera Hardware


    The iPad 2 features two cameras—one in the front and one in the rear. These cameras
    allow you to snap photos and record video. The cameras aren''t created equal,
    however. As you''ll see, each one has been designed for different uses.'
  trans: '

    #### 播放按钮与演示者显示模式


    工具栏最右端是`Play`按钮。点击该按钮后，工具栏和侧边栏会消失，演示文稿将以全屏模式显示。在演示过程中，点击屏幕或向左滑动手指可切换幻灯片或逐条显示项目符号。向右滑动手指则可返回上一张幻灯片或上一个项目符号。当使用视频输出线投射演示文稿时，iPad
    显示屏能够提供大量实用信息（参见图 14–34）。


    ![images](img/1434.jpg)


    **图 14–34.** *Keynote 演示者显示模式。当你使用 iPad 进行演示时，此屏幕是一位出色的助手。演示者显示模式可预览上一张和下一张幻灯片、当前投影屏幕上的内容、你的演讲时长，甚至还能显示你撰写的备注。*


    左上角的绿色指示灯表示演示内容正在发送至投影仪，旁边还显示幻灯片计数器。图中显示我们位于 20 张幻灯片的最后一张，屏幕左侧出现一条纵向幻灯片缩略图条。你可以在演示者显示模式顶部看到当前时间；点击该时间即可显示计时器，记录你的演讲时长。


    右上角有一个小巧的`Layouts`按钮，点击后会出现四种不同的演示者布局选项。`Current`仅显示当前幻灯片，`Next`仅显示下一张幻灯片，`Current
    and Next`同时显示正在投射的幻灯片和下一张幻灯片，`Current and Notes`则显示当前幻灯片以及你使用`Presenter Notes`工具撰写的任何备注。顺便提一句，如果你把激光笔忘在了办公室，Keynote
    能帮你解围。长按 iPad 屏幕会生成一个红色的虚拟"激光笔"，在突出显示幻灯片上的内容时十分实用。


    演示结束后，点击`X`按钮即可返回 Keynote 幻灯片编辑器。


    ### 从电脑导入文档


    很多时候，你可能需要处理已在电脑上创建或他人通过电子邮件发来的文档。在第 11 章中，我们展示了如何打开 Mail 中的附件，因此将文档通过电子邮件发送至
    iPad 是移动办公的一种方式。


    另一种方法是通过电脑上的 iTunes 将文档传输到 iPad。将电脑和 iPad 通过 Dock 接口转 USB 线连接后，在电脑上启动 iTunes。当
    iPad 出现在 iTunes 窗口左侧边栏的设备列表中时，点击它，然后点击`Apps`标签页。


    在`Apps`标签页中向下滚动过 iPad 上的应用列表，你会找到一个名为`File Sharing`的区域。这里列出了支持在 iPad 和电脑之间传输文档的应用，你已在
    iPad 上安装的 iWork 应用也会出现在该列表中（参见图 14–35）。


    ![images](img/1435.jpg)


    **图 14–35.** *你可以通过电脑上的 iTunes 将文件传输到 iWorks 应用。*


    要从电脑传输文档，请点击左侧相应的应用名称，然后点击右侧的`Add`按钮。此时会弹出电脑标准的文件`Open`对话框，你可以选择一个或多个文档进行传输。文档文件被添加到右侧列表后，点击
    iTunes 中的`Sync`按钮即可将文档传输到 iPad。


    在任何 iWork 应用中，点击`My Documents`、`My Spreadsheets`或`My Presentations`窗口右上角的文件夹图标，即可显示存储在
    iPad 上的文档；点击文件名即可在应用中打开该文件。


    许多 iPad 文件管理应用，例如`Air Sharing Pro`和`GoodReader`，提供了将文件移至 iPad 的另一种方式。这些应用可连接至`MobileMe`的`iDisk`、`Dropbox`及其他服务器；允许你查看服务器上的文件，然后下载并在
    iWork for iPad 中打开。由于`Air Sharing Pro`内置了 iPad 打印支持，它成为 iWork 的绝佳搭档。


    将文档移出 iWorks 则不那么简单，因为没有供这些文件管理器检索文件的公共文件存储区。在许多情况下，导出文档的唯一选择是通过电子邮件（参见第 11 章）、将文档保存至`iWork.com`（苹果用于共享
    iWork 文档的在线存储库），或者使用之前介绍的 iTunes。


    ### 本章小结


    适用于 iPad 的 iWork 三件套——Pages、Numbers 和 Keynote——是一组强大的应用，让你在旅途中也能创建用于工作或娱乐的文档。这些可选用的苹果应用与其
    Mac 版本配合良好，并与 Microsoft Office 具有有限度的兼容性。


    在本章中，我们介绍了 Pages、Numbers 和 Keynote 的用户界面及主要功能。虽然对每个应用进行更详细的讨论足以另成一本专著，但我们已为你提供了开始使用
    iWork for iPad 所需的信息。本章需记住的一些要点包括：


    *   Pages、Numbers 和 Keynote 不随 iPad 附带。要购买（每个应用售价$9.99）并安装它们，请在连接 Wi-Fi 网络时使用
    iPad 上的`App Store`应用，或通过 iTunes 购买后再将 iPad 与电脑同步。

    *   所有三个 iWork for iPad 应用都包含一个页面（`My Documents`/`My Spreadsheets`/`My Presentations`），显示你已有的文档，你可以选择在空白页上创建新文档，或使用专业设计的主题或模板。

    *   三个应用的用户界面保持一致。一旦熟悉了其中一个 iWork 应用，你便能很快理解如何使用另外两个。

    *   Pages 既可用作传统文字处理器，也可用作页面布局应用，具体取决于你的需求。

    *   Numbers 标签页类似于 Excel 工作簿中的工作表。每个标签页上可以包含一个或多个表格（电子表格），以及媒体（图片）、图表和形状。

    *   为你的 Keynote 演示文稿添加过渡和构建效果，能让其对观众更具吸引力和活力。

    *   将文档从电脑传输到 iPad 是移动办公的好方法。你可以通过电子邮件、iTunes 或越来越多的文件管理工具进行传输。


    ## 第 15 章


    ## 使用 iPad 摄像头：Camera、Photobooth 与 FaceTime


    第二代 iPad 最显著的升级或许体现在其两个摄像头上。这些摄像头为曾经没有摄像头的 iPad 引入了全新且引人注目的功能：拍摄照片和录制高清视频、使用 Photobooth
    处理这些视频，以及发起和接收 FaceTime 视频通话的能力。


    你是否足够幸运拥有最新的 iPad 之一？如果没有，本章其实并不适合你，至少在你准备好升级之前是这样。但如果你已购买了较新代的 iPad，那么本章将教你拍摄照片和录制视频的绝佳方法。


    ### 摄像头硬件


    iPad 2 配备了两个摄像头——一个前置，一个后置。这些摄像头允许你拍摄照片和录制视频。然而，这两个摄像头并不相同。正如你将看到的，每个摄像头都为不同的用途而设计。

    '
- fmt: '#### Front Camera


    The front iPad camera is located at the top of the device, directly in the center
    of the iPad''s upper bezel, across from the unit''s `Home` button. If you own
    a white iPad, the tiny dot is quite obvious to see; it''s less conspicuous on
    black models. Behind this dot lies the front-facing camera.


    This front camera is meant primarily for FaceTime video calls, but you can also
    take photos and record video with it. For example, you might use the front-facing
    camera to snap a profile picture for your Facebook account, or to record yourself
    and a friend singing Happy Birthday to a special someone. With the front camera,
    there''s no shooting pictures in a bathroom mirror or turning a camera around
    and hoping you frame yourself into the shot. The front camera allows you to see
    and compose the shot as you take it.


    The front-facing camera isn''t as powerful as the rear camera; it cannot record
    high-definition (HD) video. HD video is video that has at least 720 lines of resolution.
    With video, the more lines of resolution you have, the sharper the picture will
    be. Although the front camera can record video, its resolution is limited to standard-definition
    (SD). SD video, also called video graphics array (VGA), uses a resolution of `640×480`.
    `VGA` refers to an old computer monitor standard, and is actually a higher resolution
    than the 525 lines that was originally broadcast over commercial television stations
    in the original NTSC standard.


    Why didn''t Apple use an HD camera in the front? Well, it would be unnecessary.
    The front camera was designed for FaceTime video calling, not recording video.
    The image quality while video calling on a portable device like the iPad is more
    than good enough using an SD camera.


    #### Rear Camera


    The iPad''s powerful rear camera allows you to take photos, record video, and
    work with third-party augmented reality applications. When you flip your iPad
    over, you can easily spot the rear camera in the top-left corner of the device.


    The rear camera records videos in 720p HD resolution at 30 frames a second; that''s
    `1280×720` pixels wide. Although its still-camera capabilities are better than
    the front-facing camera, the rear-facing camera is still limited to taking still
    pictures at `960×720` resolution. If that doesn''t sound like a lot, it''s because
    it isn''t. `960×720` resolution isn''t even equivalent to a 1-megapixel camera;
    or, if you want to get specific, the iPad''s still capabilities record photos
    in 0.69 megapixels. That''s far less than you expect with most point-and-click
    digital cameras you buy on the market today.


    The iPad''s sub-megapixel resolution is fine for simple snapshots for e-mailing
    or posting to Facebook, but when you are at an important event like a wedding
    or a child''s birthday party and want to take some good quality pictures suitable
    for framing, leave the iPad at home and bring your point-and-shoot digital camera.


    **NOTE:** What''s the stand for i *p* n 720p, you ask? It means progressive. When
    HD video is displayed on a screen, it shows either all 720 lines of resolution
    at a time or just half of them. If it only shows half of them, this is known as
    *interlace video* and is denoted with an *i*. Simply put, progressive video generally
    looks sharper, because it shows you all the data (or lines of resolution) in a
    single frame at a time, and interlace shows you only half the data at a time (followed
    quickly by the other half). Interlace video used to be the norm when bandwidth
    issues were more of a factor for television reception, but as bandwidth increased,
    progressive video slowly took over.


    #### Real-World Use


    In real-world use, the iPad does an acceptable job at recording HD video in good
    lighting conditions. While developing this chapter for the book, the video shot
    outdoors in the daytime or inside with good lighting showed up watchable when
    played it back on our HDTVs. Like the newer generation iPod touch, whose camera
    system the iPad basically shares, the iPad uses a light-sensitive sensor, which
    can be used in a wide range of lighting situations. This sensor allows for the
    best video quality the hardware can record. Because of this sensor, even in low-light
    conditions, the video quality was usable, even if can appear somewhat grainy as
    illumination decreases.


    As for taking still images, the iPad is convenient to have around when you''re
    out and about and might not necessarily have your digital camera on you. Due to
    its 0.69-megapixel images and lack of a camera flash, the iPad is in no way a
    replacement for your standard digital point-and-shoot camera or even the quality
    camera shipping on the iPhone 4 and later. That being said, Apple didn''t set
    out to design the best camera possible; Apple set out to design the best iPad
    possible at the best possible price—and at that, Apple excelled. The iPad isn''t
    about capturing great art; it''s about social use, especially in situations where
    you normally bring your iPad along with you. So, it''s a trade-off. If you want
    a really good camera, then buy a camera or a newer model iPhone. Because with
    its large form factor and awkward handling, the iPad isn''t all about photos.
    It''s about integrating cameras and photography into the iPad user experience.'
