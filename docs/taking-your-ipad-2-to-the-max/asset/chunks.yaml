- fmt: '# Syncing Notes


    If you''re writing notes on your iPad, you may want to use them on your Mac or
    Windows computer. There are a couple of ways to go about moving them to a personal
    computer—either e-mail them to yourself using the e-mail button we described earlier
    or use Notes syncing.


    To set up Notes syncing, launch `iTunes` on your computer, and then connect your
    iPad to the computer using the USB cable, as described in [Chapter 2](#Chapter02.html#ch2).
    When the name of your iPad appears in the `Devices` list on the left side of the
    `iTunes` window on your computer, click it, and then click the `Info` tab. Scroll
    down the window a bit, and you''ll see the cryptic `Other` heading (see [Figures
    10–5](#Chapter10.html#fig_10_5) and [10–6](#Chapter10.html#fig_10_6)). Under that
    heading is the check box you''re looking for.


    Be sure to take note of the warning displayed in [Figure 10–5](#Chapter10.html#fig_10_5).
    If your iPad is being synced to your computer over the air using `MobileMe` and
    you also decide to perform local syncing using the USB cable, you may get duplicate
    notes appearing on your computer.


    ![images](images/1005.jpg)


    **Figure 10–5.** *The Other section under Info in iTunes contains a check box
    for syncing notes from the iPad to your Mac.*


    ![images](images/1006.jpg)


    **Figure 10–6.** *You can find the check box for syncing notes with Outlook under
    Other in iTunes for Windows.*


    To sync notes to your computer from your iPad, select that box, and then click
    the `Sync` button on the bottom-right side of the `iTunes` window.


    So, now you''ve synced all of those notes to your computer—where are they? Oddly
    enough, there is no similar app on the Mac, so notes end up in `Mail`. Launch
    `Mail` on your Mac, and then take a look at the sidebar on the left side of the
    `Mail` window (see [Figure 10–7](#Chapter10.html#fig_10_7)).


    See the `Reminders` heading? There is a small replica of the `Notes` icon from
    the iPad below that. Click that icon, and you''ll see two more notepads—one that
    says “On My Mac” and another that says “MobileMe.” Click the `On My Mac` icon,
    and the notes you''ve created are there.


    On Windows computers, Notes are synced to Microsoft Outlook 2003, 2007, or 2010
    (see [Figure 10–8](#Chapter10.html#fig_10_8)). To view your synced notes in Outlook,
    click the `Notes` button.


    ![images](images/1007.jpg)


    **Figure 10–7.** *The text created in Notes on your iPad syncs to Mail on your
    Mac.*


    ![images](images/1008.jpg)


    **Figure 10–8.** *The text created in Notes on your iPad syncs to Microsoft Outlook
    2003, 2007, or 2010 on your Windows computer.*


    These notes are fully synced, so if you choose to make a change to one of them
    or create a new one on your Mac or Windows computer, the changes or new file is
    moved to the iPad the next time you sync. Likewise, any changes, additions, or
    deletions you make on the iPad are reflected on your computer.


    So, what''s that `MobileMe` icon all about? If you have an Apple `MobileMe` account,
    then you can synchronize your notes on all sorts of devices and in various places.
    Initially, the only way to sync your notes between your computer and iPad was
    through that hardwired USB connection. Now notes are another type of content that
    can be synchronized over the air.


    ## Calendar


    Like many people who enjoy the layout of the Day-Timer planner, we were thrilled
    to see how Apple changed the plain-Jane iPhone Calendar app to a thing of beauty
    on the iPad. In landscape orientation (see [Figure 10–9](#Chapter10.html#fig_10_9)),
    Calendar looks remarkably like that old Day-Timer.


    ![images](images/1009.jpg)


    **Figure 10–9.** *The iPad Calendar app in Day view looks like a traditional paper
    appointment book.*


    There are four Calendar views, each of which provides a slightly different view
    of your calendar information. To switch between them, tap `Day`, `Week`, `Month`,
    or `List` at the top of the calendar.


    The view shown in [Figure 10–9](#Chapter10.html#fig_10_9) is the Day view, which
    displays an hour-by-hour listing of what''s going to happen during the current
    day.


    On the left side of the Calendar app in Day view, there''s a handy month calendar
    and a list of all the appointments scheduled that day. To turn to the next page
    in this virtual appointment book, tap the right arrow at the bottom of the page.
    Moving to the previous page just requires tapping the left arrow. You can also
    drag a finger back and forth on the days of the current month, which are listed
    between those two arrows, to navigate to a particular date.


    If all of this moving around in Calendar causes you to get lost, there''s a `Today`
    button in the lower-left corner of the app to quickly jump to the current day.
    Before we talk about adding or searching for Calendar events, let''s take a look
    at the rest of the available Calendar views.


    The Week view (see [Figure 10–10](#Chapter10.html#fig_10_10)) is helpful in mapping
    out what tasks need to be accomplished during a specific week. Any items listed
    at the top of the calendar are all-day events, while colored boxes denote the
    time and duration of your meetings. The days of the week are listed across the
    top, with the hours of the day on the left side. To scroll earlier or later in
    the day (the calendar shows only 12 hours of each day at a time), use your finger
    to scroll up or down.


    See that pinhead with the line across from it at about 4 p.m.? That indicates
    the current time so you can see at a glance how much time you have until your
    next appointment. Another feature of the Calendar is the Invitations inbox, in
    the upper left. If someone has used `iCal` or another calendar application to
    send you an invitation to an event, it is listed when you tap the `Invitations
    inbox` button. It''s possible to view the details of the invitation, accept it,
    or decline it, all from this one place on your iPad.


    ![images](images/1010.jpg)


    **Figure 10–10.** *Using the Calendar app''s Week view to capture a week at a
    glance*


    The Week view lists ten one-week periods at the bottom of the page, and you can
    tap any one of those weeks or slide a finger left or right to look at previous
    or future weeks.


    The Month view (see [Figure 10–11](#Chapter10.html#fig_10_11)) provides the look
    of those “Month at a Glance”–style calendars that have been sold for years as
    desk pads. Here, every appointment during the month is designated by a small dot
    on a particular day. To get details about an appointment, just tap the dot, and
    a pop-up arrow appears with the time of the appointment and an edit button.


    ![images](images/1011.jpg)


    **Figure 10–11.** *You can look at an entire month''s worth of appointments in
    the Calendar app''s Month view. Tap an appointment to open a pop-up arrow for
    details or to edit the event.*


    The area at the bottom of the page changes to a list of the months of a year for
    jumping to a specific month with the tap of a finger. There are also buttons to
    navigate to the previous and next months with a tap, as well as links to previous
    and future years.


    The last view is the List view (see [Figure 10–12](#Chapter10.html#fig_10_12)),
    which lists upcoming appointments on a scrollable list on the left side of the
    page, along with a close-up view of a current event on the right side.


    ![images](images/1012.jpg)


    **Figure 10–12.** *The List view in the iPad Calendar app displays a list of upcoming
    appointments (left) and details of any appointment you tap (right).*


    Tapping any of the appointments in the list on the left displays the details of
    that event on the right side. Any alerts that were set are listed, as well as
    notes that are associated with the event. If someone else sent the appointment
    to you and you accepted it, the detailed view will also show who sent the original
    appointment and list anyone else who has accepted the event invitation, as well
    as those who have been invited but have not yet offered a reply.'
