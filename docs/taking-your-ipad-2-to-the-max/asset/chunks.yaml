- fmt: '### Special Wi-Fi Settings


    For most people, the default Wi-Fi settings work perfectly. However, there may
    be situations where you are connecting to a network that requires special settings.
    In this case, you may be asked to change those settings on your iPad.


    You can access special Wi-Fi settings by going to `Settings` → `Wi-Fi` and then
    tapping the blue arrow icon to the right of the network name. A much more detailed
    listing of network settings appears ([Figure 5–5](#Chapter05.html#fig_5_5)).


    The first thing you may be asked to change is the way in which your iPad receives
    an Internet Protocol (IP) address. Most of the time, that''s done through something
    called Dynamic Host Configuration Protocol (`DHCP`). When your iPad is set up
    to get a network address using `DHCP`, it asks for an address when it joins a
    network and is then given a “lease” that lasts a certain amount of time. That
    lease usually renews automatically. If you ever need to renew the `DHCP` lease
    manually, there''s a `Renew Lease` button on the `DHCP` tab of the `Settings`
    screen you can tap to do that.


    Another way to get an IP address is through Bootstrap Protocol, or `BootP` ([Figure
    5–6](#Chapter05.html#fig_5_6)). The `BootP` tab shows information that may need
    to be changed for your iPad to receive an address from a pool of addresses registered
    on a configuration server.


    ![images](images/0505.jpg)


    **Figure 5–5.** *You may never need to change or view your network settings. This
    is where you can control those settings in those cases where it''s necessary.*


    ![images](images/0506.jpg)


    **Figure 5–6.** *The BootP configuration display*


    Finally, some networks require a fixed, or *static*, IP address ([Figure 5–7](#Chapter05.html#fig_5_7)).
    In this case, you''re usually given a static IP address, a subnet mask, and router
    and DNS server addresses to enter into the appropriate fields in order to connect
    to the network. Check with your system administrator to find out these values
    in advance.


    ![images](images/0507.jpg)


    **Figure 5–7.** *Static IP settings on the iPad*


    On each of the three tabs of the `Settings` screen (`DHCP`, `BootP`, and `Static`),
    you will find three buttons for `HTTP Proxy`. These are visible in [Figures 5–5](#Chapter05.html#fig_5_5)
    and [5–6](#Chapter05.html#fig_5_6). In [Figure 5–7](#Chapter05.html#fig_5_7),
    the `HTTP Proxy` section is hidden by the keyboard. A *proxy server* is a computer
    system that acts as an intermediary between your computer and some other server.
    Many companies, for instance, require all web traffic from computers to pass through
    a proxy server to log or audit usage. If you need to enter proxy information,
    your system administrator will give you instructions on the settings needed.


    ### Connecting with 3G


    The iPad ships in both Wi-Fi only and Wi-Fi + 3G models. 3G models are now available
    in the United States from both AT&T and Verizon. Outside the United States, other
    carriers provide 3G cellular data service on a country-by-country deployment.


    3G is a family of mobile telecommunications standards allowing simultaneous voice
    and data services. Apple has chosen to follow the Global System for Mobile Communications
    (GSM) standard in its telephony products, the iPhone family, and the iPad Wi-Fi
    + 3G. This standard predominates world mobile telephone systems, which means that
    iPhones and iPads with 3G capabilities can be used worldwide, although international
    data roaming is usually quite expensive.


    3G bandwidth is generally more limited than that of Wi-Fi, but 3G is valuable
    because the data service is available almost anywhere there is a 3G system in
    place. That means you can generally use your 3G service while traveling, not just
    when you''re at a local Wi-Fi hotspot like your home, office, or an Internet-ready
    coffee shop. Wi-Fi is limited to short-range, high-bandwidth connections; 3G is
    wide-range but lower-bandwidth connections.


    What can you do with a 3G connection? A lot. On a 3G-equipped iPad, you''re able
    to browse the Internet with fairly fast response, send photos and even small movies
    to friends via e-mail, watch YouTube videos, and (as you''ll find in [Chapter
    8](#Chapter08.html#ch8)) purchase and download apps, music, and books.


    The mobility you gain with 3G service comes at a price. You need to sign up for
    a cellular data plan, which is generally offered on a prepaid month-by-month basis.
    Prepaid service means you are charged for the service at the start of the month,
    rather than at the end, which is the more common way of offering service on the
    iPhone. It also means that you can cancel at any time because your month of use
    has already been charged to your credit card.


    If the majority of your iPad use is going to be in an office or home with Wi-Fi
    service and you intend to use your 3G service only for occasional e-mails on the
    road, then you''ll probably be good with a more-rationed, lower-bandwidth plan.
    If you find that the lower-tiered data plans are too limiting, most countries
    and carriers offer a higher-tier plan with more available bandwidth. Plans and
    bandwidth vary by carrier, so you will need to do a little research based on your
    home country and the model of iPad you have purchased. For example, in the United
    States, you cannot switch service for a Verizon-ready iPad to AT&T service. The
    hardware limits you to a carrier due to the way the unit connects to the cellular
    data network.


    To determine what your 3G usage is at any time after you''ve signed up for a monthly
    plan, go to `Settings` → `Cellular Data` → `View Account`. This information, as
    well as the reminders that are sent out by carriers when you''re nearing a data
    usage limit, can be very helpful in keeping an eye on how many megabytes you''re
    actually consuming.'
