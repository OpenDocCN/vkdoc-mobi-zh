  trans: '

    # 设置 3G


    有一种非常简单的方法，无需查看包装盒就能知道你手上的是 Wi-Fi + 3G 版 iPad：当你打开它时，状态栏的左侧会显示 3G 运营商的名称以及你所在位置的信号强度（图
    5–8）。


    ![images](img/0508.jpg)


    **图 5–8.** *支持 Wi-Fi + 3G 的 iPad 会在状态栏左侧显示运营商名称和信号强度，以及网络类型（3G、EDGE）。*


    设置你的 3G 数据套餐非常快捷，并且只需要一张信用卡。在 iPad 开机状态下，轻点 `设置` ![images](img/U001.jpg) `蜂窝数据`。如果
    3G 尚未开启，将 `蜂窝数据` 按钮滑动到 `开` 即可激活内置的无线电模块。如果尚未设置蜂窝数据账户，系统会要求你在 iPad 上直接选择套餐并注册服务。注册的详细信息因运营商而异，但通常你需要输入名字和姓氏、联系电话号码、有效的电子邮件账户以及信用卡信息。


    继续填写表单，你将看到服务条款。如果需要，请仔细阅读，然后轻点 `同意` 按钮以继续流程。服务条款同样因运营商而异。


    部分运营商还允许你添加一次性的国际套餐。这些套餐费用非常昂贵。请确保你计划前往的国家/地区受该国际套餐支持。选择你希望开始使用国际套餐的日期，然后轻点 `完成`
    按钮。如果你近期没有出国旅行的计划，请不要选择任何套餐，直接轻点 `完成` 以继续。


    通常，在注册数据套餐几分钟后，iPad 显示屏上会出现一条通知（图 5–9），告知你数据套餐已激活。这表示你已经可以带着 iPad 在城里自由活动，不再受限于需要靠近
    Wi-Fi 热点。在美国，如果你现在成为了 iPad 数据客户，根据你所订阅的服务，你将可以在任意 AT&T 或任意 Verizon 热点免费使用 Wi-Fi。


    ![images](img/0509.jpg)


    **图 5–9.** *恭喜！你的 iPad 现已准备好通过 3G 与世界连接。*


    # 数据漫游


    当你国际漫游使用 iPad 时，了解你的国际套餐使用的是哪家或哪些蜂窝网络公司，以及如何关闭数据漫游，这是非常明智的做法。如果开启了数据漫游，你的设备可能会连接到与你的国内运营商没有合作协议的蜂窝网络运营商，这种情况下你将面临更高的收费。要禁用数据漫游，请选择
    `设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg) `网络`，并将数据漫游选项切换到 `关`。


    对于像 AT&T iPad 2 这样的 GSM iPad，请查询你所在运营商的国际漫游合作伙伴。访问运营商的网站，查找其合作伙伴运营商、所使用的技术以及频率。


    如果你携带的是 Verizon iPad 旅行，其 CDMA 服务使得连接本地数据变得更加困难。因此，你可能会考虑租用一个小型的移动 Wi-Fi 设备，例如
    Novatel Wireless MiFi 热点。MiFi 热点能提供便携式网络，你可以通过 GSM 或 CDMA 的 iPad 或笔记本电脑连接到该网络，而不需要使用
    iPad 内置的数据服务。你无需在 iPad 上开启数据漫游，即可通过 MiFi 的蜂窝数据访问互联网。


    XCom Global 是一家提供 MiFi 设备国际租赁的供应商。每天大约花费 18 美元，你就可以获得本地数据访问权限，这些数据可以通过 Wi-Fi 轻松提供给你的
    iPad 或笔记本电脑。当然，你也可以直接购买自己的设备，然后在旅途中寻找 SIM 卡；但对于许多旅行者来说，使用一个开箱即用、预先配置好的设备是一个很大的优势。


    覆盖区域和预期带宽各不相同。例如，在阿联酋，你可以期望获得 7.2Mbps 的速度，但在关岛可能只有 1Mbps。请查看 XCom 网站的覆盖地图，以确保你访问的区域能够提供服务。


    如果你在多个国家之间旅行，你可以通过 XCom Global 设置多个设备租赁。从你开始旅行之日起，到返回美国之日止，每天都会按日费率计费。该公司的常见问题解答页面解答了许多关于其服务的常见问题。


    旅行期间，你的数据用量是无限的。那么，“无限”数据意味着什么？请查看 XCom 的“公平使用”条款。不同国家的供应商可能会对数据用量大的用户设置使用上限或限制带宽，但对于正常的计算需求（假设你不是每天下载几个千兆字节大小的电影），通常都在保障范围内。


    如果租用 7 天，XCom 会提供免费送货（通常 FedEx 2Day 服务需要 29.90 美元；如需隔日送达，需额外付费）。如果租用时间超过 14 天，日费率将降至每天
    16.15 美元。你还需要考虑的一件事是，是否增加每天 2.50 美元的电池续航包选项。MiFi 在始终保持开启状态时效果最佳——电池续航包提供了一种避免频繁开关机的方法（尽管它会变得相当热，所以务必将其放在通风的包或口袋中）。或者，你也可以自带电池组。


    我们推荐 ZAGGsparq 电池组。这款售价 100 美元的设备具有国际适配能力，支持使用 220V 电源充电；你无需电压转换器，简单的插座适配器即可。这将为你节省租赁费用，并且即使在家时也能提供方便的移动电源（据称可为
    iPad 充电四次）。


    此外，你也可以考虑购买保险。每天大约 4 美元，它最多可覆盖三台设备，让你不必过于担心扒手和设备丢失问题。有了保险，每台设备你只需支付 160 美元的免赔额，而不是
    XCom 通常收取的 800 美元。三台设备总计 480 美元，这比你需支付的 2400 美元要少得多。


    所有这些费用加起来确实不菲，每天大约 25 美元，还不算可能的运费，但作为商务支出，与你将在机票、酒店、餐饮和杂项上的花费相比，这相对较少。毫无疑问，这比支付漫游数据费用要划算得多。


    总结本节内容，当您携带 iPad Wi-Fi + 3G 出国时，需要了解的关键事项是：关闭数据漫游，并做到“出发前先了解”。


    # 更改账户信息或增加数据流量


    你的 iPad 会在你即将接近数据套餐的带宽限制时非常贴心地提醒你。它会分别在你剩余 20%、剩余 10% 以及套餐流量用尽时通知你。你可以选择在此之后停止使用数据、购买另一个数据套餐，或者（如果运营商提供此选项，则视具体运营商而定）升级你的套餐以获得更高的带宽配额。


    要升级你的数据套餐、更改信用卡、编辑地址信息或购买国际数据套餐，请选择 `设置` ![images](img/U001.jpg) `蜂窝数据`。轻点 `查看账户`
    按钮，即可在 iPad 上立即进行任何更改。

