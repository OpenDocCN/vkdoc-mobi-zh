  trans: '

    # 将数据和媒体放入 iPad


    现在，你已经拆开 iPad 的包装并将其连接到了 `iTunes`。接下来该做什么？第 1 章简要介绍了通过 `iTunes` 将音乐、电影、照片和其他数据与
    iPad 同步的基础知识。本章将深入探讨可用于将数据与 iPad 同步的各种选项。无论你是从 `iTunes Store` 购买了歌曲和视频，还是从 CD
    和 DVD 将其导入到程序中，`iTunes` 都能将你的 iPad 与其资料库中的几乎任何内容进行同步。若想在 iPad 上拥有丰富的媒体和应用程序库，你需要从电脑上的资料库同步这些内容。


    `iTunes` 会决定哪些应用、音乐和视频文件可以传输并加载到你的 iPad 上。接下来，你将了解如何将所有内容整合到 `iTunes` 中，并通过 `USB
    Dock Connector` 数据线将其发送到你的 iPad。你将看到如何选择想要同步的项目，以及如何让 iPad 上的内容保持新鲜和最新。


    ## 使用 iTunes


    在开始选择要同步哪些歌曲、视频、播客和有声读物之前，你首先需要将 iPad 物理连接到电脑并启动 `iTunes` 应用程序。使用 iPad 附带的 USB
    数据线（或等效的底座），将 iPad 连接到系统上一个空闲的 USB 端口。点击电脑上的 `iTunes` 应用程序图标来启动它。如果你的 iPad 设置了锁屏密码，你必须在
    `iTunes` 连接前解锁设备（参见图 2-1）。


    **注意：** 最好使用 USB 2.0 进行连接。USB 2.0 提供了更优越的带宽和更好的连接性。虽然支持 USB 1.1，但如果你尝试使用 USB 1.1
    同步，`iTunes` 会发出警告，并建议你切换到 USB 2.0 端口。通常情况下，你的 iPad 在同步时无法充电。当 iPad 顶部状态栏右侧出现 `Not
    Charging` 消息时，不必惊慌。相反，请使用 iPad 包装盒内附带的 10 瓦墙插式电源适配器，为 iPad 提供所需的电量进行充电。你的 iPad
    拥有出色的内置电池。你会发现，与其他移动设备不同，你只需要每隔一两天充一次电。是的，你可以更频繁地同步，但如果你唯一担心的是让电量保持充足，那其实不必每次都同步。


    ![images](img/0201.jpg)


    **图 2-1.** *`iTunes` 会提示你在连接设备前解锁 iPad。*


    连接成功后，你的 iPad 会出现在 `iTunes` 窗口左侧的列表中。这个浅蓝色的列被称为源列表，它被分为几个部分，分别对应你的媒体资料库、`iTunes
    Store`、设备和播放列表。iPad 以及连接到电脑的任何其他设备，都列在 `Devices` 标题下方，如图 2-2 所示。


    如果你没有在这个列表中看到你的 iPad，请确保已通过 USB 数据线物理连接了 iPad，并且数据线牢固地插入电脑和 iPad。接下来，确保你的 iPad
    已开机。当你的 iPad 处于激活或休眠状态时，它会显示在列表中，但关机时不会显示。如果你的 iPad 已正确连接并开机，但仍然未出现，请在 Google
    中搜索“disappearing iPads” 或 “disappearing iPhones”。iOS 设备在 `iTunes` 中不显示是一个已知的（尽管是偶发的）支持问题。你会发现其他用户也遇到过同样的问题，并且你可能能够找到解决方案。


    ![images](img/0202.jpg)


    **图 2-2.** *你的 iPad 出现在 `iTunes` 源列表的 `Devices` 部分。设备下列出的项目（你可以通过切换设备名称左侧的隐藏/显示三角形来查看）会根据你选择同步到设备的项目而变化。请注意，你
    iPad 名称左侧的图像看起来像一个小型 iPad。在 `iTunes` 中，设备图片看起来就像实际使用的设备。*


    ## iPad 的 iTunes 设置面板


    当你在 `iTunes` 源列表中选择你的 iPad 时，会看到一个包含一系列标签页的设置面板。这些标签页允许你自定义设备连接和同步 `iTunes` 媒体内容的方式。每个标签页都提供了不同的方式来定制
    iPad 的内容，让你可以设置与 iPad 相关的选项。


    你会看到的标签页（从左到右）包括 `Summary`、`Info`、`Apps`、`Music`、`Movies`、`TV Shows`、`Podcasts`、`iTunes
    U`、`Books` 和 `Photos`（参见图 2-3）。如果你已经是 iPhone 或 iPod touch 用户，那么 iPad 的设置面板会看起来非常熟悉，尽管它确实有一些
    iPhone 或 iPod touch 上没有的选项。如果 iPad 是你的第一款苹果触屏设备，别担心——浏览这些标签页不需要你具备任何 iPhone 或
    iPod touch 的知识。阅读完本章后，你就会迅速上手。


    ![images](img/0203.jpg)


    **图 2-3.** *`iTunes` 允许你管理加载到 iPad 上并与之同步的内容。沿着设置面板顶部排列的每个标签页都提供了各种控制选项，让你能够选择每次同步时将哪些信息加载到
    iPad 上。`Summary` 面板顶部的 iPad 图形应与你的设备型号和颜色相匹配。*


    在 iPad 设置面板的底部，你会发现一条长长的彩色 `Capacity` 容量条（参见图 2-4）。无论你选择哪个标签页，这个容量条都会显示。左侧显示的是你
    iPad 的总存储容量，而 iPad 上不同类型文件所占用的数据量则被分解为彩色编码的片段。蓝色代表音频，紫色代表视频，橙色代表照片，绿色代表应用，浅紫粉色代表书籍，黄色代表其他内容（主要是数据和操作系统），灰色代表你
    iPad 上剩余的可用空间。容量条下方的图例显示了每种颜色代表的含义以及每个类别占用的空间大小。


    ![images](img/0204.jpg)


    **图 2-4.** *`Capacity` 容量条是占据你 iPad 空间的各类文件的直观表示。*


    **注意：** `Capacity` 容量条的划分不言自明。不过，有些人可能会对代表 `Other` 的黄色感到困惑。`Other` 到底是什么？它包括数据库文件（用于跟踪你的音乐、视频和播客资料库），其大小可能在
    100MB 到 200MB 之间；专辑封面（每首曲目大约 500KB）；以及你 iPad 上应用程序的偏好设置文件。偏好设置文件让应用能够记住你每次启动它们时配置的应用内设置。如果你在应用程序中存储了大量数据，绿色的
    `Apps` 片段会相应增加。

