  trans: '

    # 我的电子表格


    图 14–14 看起来眼熟吗？应该眼熟。`我的电子表格` 是 Numbers 中与 Pages 的 `我的文稿` 相对应的功能。事实上，`我的电子表格` 中用户界面的所有元素都与
    `我的文稿` 完全相同。电子表格缩略图下方的 `共享`、`新建或复制电子表格` 和 `删除` 图标执行的功能与 Pages 中的对应功能相同，你可以轻点电子表格的名称来重命名它。


    ![images](img/1414.jpg)


    **图 14–14.** *`我的电子表格` 相当于 Pages 中的 `我的文稿`。它用于创建新的电子表格、重命名、删除以及与其他人共享。*


    `新建电子表格` 按钮会打开一个窗口，这是 Numbers 版本的 `新建文稿` 窗口。与 Pages 一样，你可以选择空白电子表格，也可以从 Apple
    精心提供的多个模板中进行选择。


    Numbers 模板（见图 14–15）范围广泛，从简单的清单到抵押贷款计算器，从减肥与跑步日志到课堂考勤表。虽然并非每个人都需要 GPA 计算器，但它确实存在。许多模板旨在让你初步了解可以使用
    Numbers 完成的各种任务。


    ![images](img/1415.jpg)


    **图 14–15.** *Apple 在 Numbers 中包含了 16 个模板，其中许多可用于执行有用的计算。*


    Numbers 用户界面一个独特的功能是标签页的概念。如图 14–16 所示，标签页定义了电子表格的不同工作表或表单。例如，一个 Numbers 电子表格可以包含一个用于描述如何使用该电子表格的工作表、一个用于捕获数据的表单，以及另一个用于对捕获的数据执行计算的工作表。每个页面都在电子表格顶部显示自己的标签页，使得在页面之间导航就像轻点一个标签页一样简单。


    ![images](img/1416.jpg)


    **图 14–16.** *使用标签页在 Numbers 电子表格文件中命名各个工作表或表单。*


    如果你熟悉 Microsoft Excel，只需将标签页视为工作表，并将这组工作表视为一个 Excel 工作簿。要添加新标签页，请轻点最右侧的标签页。它标有加号，轻点它会弹出一个带有两个按钮的弹出窗口——`新建工作表`
    和 `新建表单`。双击现有名称然后输入新名称，即可重命名任何标签页。


    与 Pages 一样，有一个非常有帮助的 `开始使用` 文档，它实际上是一个伪装起来的交互式 Numbers 教程。对于刚开始使用 Numbers 的 iPad
    用户来说，花时间和精力通读 `开始使用` 页面是非常值得的。


    # 向电子表格添加元素


    空白电子表格用处不大。尽管即使是“空白”模板也包含一个通用表格，你可以开始在其中输入数字或文本，但轻点标签页会创建一个完全空白的表格。你习惯的行和列在哪里？在
    Numbers 中，你需要向表格中添加一个表格才能开始使用它。你会记得，Pages 中的 `插入` 按钮允许你向空白页面添加媒体、表格、图表和形状。这正是
    `插入` 按钮在 Numbers 中的功能。`表格` 标签页略有不同，但 `媒体`、`图表` 和 `形状` 标签页与 Pages 中的对应标签页完全相同，因为它们都提供了在页面上添加图片、创建图表或绘制形状的方法。


    在图 14–17 中，我们向一个空白表格添加了一个简单的五列表格。如你所见，第一列为每一行包含一个复选框，其余列则为空白。该表格有一个名称——`表格 2`——以及一些看起来像滚动条的东西，位于表格的顶部和左侧。


    ![images](img/1417.jpg)


    **图 14–17.** *在 Numbers 中向空白工作表添加的空白表格*


    看到滚动条末端那些看起来像衬衫纽扣的小东西了吗？向右或向下拖动其中一个，将为表格添加一列或一行。向上或向左拖动一个按钮，则从表格中删除一行或一列。要移动整体表格在工作表上的位置，请拖动表格左上角的按钮。


    表格右侧和底边的暗色圆点在被拖动时会拉伸表格，增加所有列和行的宽度，而不会添加任何新列或行。同样，通过将这些“手柄”向上或向左拖动，可以使表格变小。


    虽然我们不会详细介绍 Numbers 中可供选择的众多电子表格函数，但让我们谈谈如何向电子表格单元格中输入信息。双击电子表格上的一个单元格会使其高亮显示，并带有深蓝色边框，同时屏幕上会出现一个浅绿色的数据录入字段以及一个合适的键盘（见图
    14–18）和工具栏中的四个按钮。最左边你会看到一个标有“42”的按钮，这表明你使用此按钮向单元格中输入数字。数字可以格式化为纯数字、货币（使用下方数据录入键盘上的美元符号按钮）、百分比（使用百分号按钮）、1
    到 5 星的评级（使用星形按钮）或复选框（0 或 1，使用复选框按钮）。键盘右侧的按钮可让你跳转到右侧的下一个单元格或下方的下一个单元格，以便在电子表格中快速导航。


    ![images](img/1418.jpg)


    **图 14–18.** *数字数据录入键盘*


    **微妙笑话提醒！** 你是否好奇为什么数字录入按钮上标有“42”？在经典科幻系列《银河系漫游指南》中，42 是生命、宇宙以及一切终极问题的答案。我们猜测
    Numbers 开发团队中的某个人是科幻迷。


    使用 `下一个` 按钮（位于 `42` 右侧），该按钮看起来像一个时钟，用于向电子表格单元格输入日期、时间或持续时间。轻点此按钮会使键盘外观发生变化（见图
    14–19），键盘上显示月份，并且有按钮用于表示你输入的是日期和/或时间，还是持续时间。日期或时间与持续时间有什么区别？日期是一个具体的日期，例如 2010
    年 6 月 10 日；时间是一个具体的时间点，例如下午 4:32:06。持续时间是可以在两个时间点之间测量的时间长度。我们的一位作者在撰写此句时，其生命以持续时间衡量为
    53 年 7 个月 29 天 1 小时 22 分钟。


    ![images](img/1419.jpg)


    **图 14–19.** *日期、时间和持续时间录入键盘*


    沿着数据录入工具栏继续往下，有一个标有字母 `T` 的按钮。使用此按钮向单元格中输入文本。轻点该按钮后，会出现一个标准的文本录入键盘（见图 14–20）。


    ![images](img/1420.jpg)


    **图 14–20.** *文本录入键盘*


    最后一个按钮上有一个等号（`=`）。轻点此按钮会显示公式录入键盘（见图 14–21）。一个对单元格中包含的数据进行运算的公式，通过函数键输入函数，被键入数据录入字段，并通过轻点字段末尾的复选标记按钮应用于该单元格。该键盘还包含一组数学运算符（括号、加、减、乘、除、指数和逻辑运算符），用于电子表格公式。


    ![images](img/1421.jpg)


    **图 14–21.** *公式录入键盘用于向电子表格单元格中输入简单和复杂的公式。*

    '
- fmt: '# The Info Button


    Remember the Info button in Pages? Numbers has one, too. Tapping the Info button
    when selecting a table displays a pop-up for changing table settings (see [Figure
    14–22](#Chapter14.html#fig_14_22)).


    The first tab, Table, applies a choice of different shading colors and types to
    a table from a palette of six prepackaged types. The Table Options button on this
    tab provides options for disabling the table name, deleting the border of the
    table, shading alternating rows in the table, turning off lines in the table grid,
    and changing the font and text size for any text or numbers in the table.


    The Headers tab adds header rows, header columns, and footers to a table. You
    can choose to freeze header rows and columns so that they''re always visible,
    even when you have scrolled the table down or to the right.


    ![images](images/1422.jpg)


    **Figure 14–22.** *The various tabs displayed by the Info button when a table
    is selected*


    The Cells tab applies formatting to text cells on the table and is very useful
    for configuring header rows. The last tab, Format, applies special formats to
    cells or ranges of cells in the table. A cell can be formatted as a number, currency,
    a percentage, a date and/or time, a duration, a check box, a star rating (1 to
    5 stars), or text.


    Tapping the Info button while an image is selected causes the same three tabs
    (Style, Text, and Arrange) to appear that we described in the earlier section
    about Pages. When a chart is selected, tapping the Info button displays an entirely
    different pop-up (see [Figure 14–23](#Chapter14.html#fig_14_23)).


    ![images](images/1423.jpg)


    **Figure 14–23.** *Access chart options by tapping a chart first and then the
    Info button.*


    The Chart tab provides some preset options for the color of your chart. Tapping
    the Chart Options button at the bottom of this tab displays controls for enabling
    or disabling the chart tile, legend, and border; changing the text size and font;
    turning value labels on and off; or changing the type of chart.


    The X Axis tab is available only when your chart displays both x and y axes—it
    wouldn''t make sense on a pie chart. It controls the visibility of category labels
    and series names; allows you to orient the labels along the x axis of your chart
    horizontally, diagonally, or vertically; allows you to add gridlines or tick marks
    for the axis; and lets you enable or disable an axis title.


    The Y Axis tab is similar to the X Axis tab but controls the options for the vertical
    axis of your chart. The Arrange tab moves your chart forward or backward in relation
    to other objects on the same page.


    When you tap shapes that have been added to your sheets, the Info button displays
    the familiar Style, Text, and Arrange tabs (see [Figure 14–24](#Chapter14.html#fig_14_24)).


    ![images](images/1424.jpg)


    **Figure 14–24.** *There is more to the Style tab than meets the eye. The Style
    Options button provides a set of fills, borders, and effects to modify shapes.*


    When the Style Options button is tapped, another set of tabs appears (see [Figure
    14–25](#Chapter14.html#fig_14_25)). Fill provides a number of color and grayscale
    fills, Border enables or disables a border around the shape and changes the border''s
    style, and Effects creates a shadow and determines the opacity of the shape. Believe
    it or not, you can actually use a transparent color shape as a “filter” for exciting
    image effects.


    ![images](images/1425.jpg)


    **Figure 14–25.** *Tapping Style Options displays the Fill, Border, and Effects
    tabs displayed here. Note that these same tabs appear in Pages and Keynote when
    a shape is selected and the Info button is tapped.*


    For example, suppose you''d like to add a colored highlight to a photo to call
    out a certain object in the picture. Creating a red oval shape, setting it to
    be transparent, and then dragging it over the object in the photo makes a functional
    and professional-looking highlight.


    The two other tabs that accompany Style in [Figure 14–24](#Chapter14.html#fig_14_24)
    are Text and Arrange. The Text tab adds text styles to text typed into the shape,
    while Arrange once again places the shape in front of or behind other objects
    on the page.


    # The Tools Button


    The familiar wrench icon, otherwise known as the Tools button, resides in the
    toolbar of Numbers and acts as your gateway to Tools. Choices for Tools are fewer
    than in Pages, with only Find, Go to Help, Edge Guides, and Check Spelling showing
    up. As with Pages, there''s a full-page mode in Numbers enabled by tapping the
    arrows icon on the far right end of the Numbers toolbar.


    Remember, you can''t really hurt anything by creating a new spreadsheet and playing
    with Numbers. It''s a great way to become familiar with the app, and you''d be
    surprised what you can learn just by creating fun or useful spreadsheets.


    # Keynote


    If you have read the chapter up to this point, you are familiar with Pages, Numbers,
    and all of the many common features available in those two apps. Now you''ll learn
    about Keynote, which is the presentation app of the iWork for iPad suite. Keynote
    is the only iWork app that can be used with the various video-out cables for the
    iPad for the purpose of projecting your presentation, so it is a powerful tool
    for teachers, businesspeople, and anyone else who needs to get their message across
    to groups of people.


    This part of the chapter is shorter than the sections for Pages and Numbers, because
    we are assuming that you have read the sections describing those two apps. If
    you have not, you may want to review the information for Pages and Numbers because
    much of it is relevant to using Keynote.


    Before we get too far into the topic of Keynote, it should be mentioned that not
    all imported PowerPoint or Keynote presentations will transfer to Keynote for
    iPad cleanly. Images may scale improperly, text sizes might be too large or small
    on your imported document, and transitions and builds are often lost. Do not assume
    that a presentation that has been moved to your iPad will be perfect—be sure to
    check the converted presentation on the iPad before “going public.” Finally, the
    importation and conversion of large presentations is very time-consuming.


    ## My Presentations


    Launching Keynote by tapping it, the first thing you see is My Presentations (see
    [Figure 14–26](#Chapter14.html#fig_14_26)). This is analogous to My Documents
    in Pages and My Spreadsheets in Numbers. Also like its siblings in iWork for iPad,
    Keynote comes with a Getting Started presentation document that is useful in learning
    how the app works. It''s interactive, teaching you how to work with Keynote as
    you follow the instructions provided in the presentation.


    ![images](images/1426.jpg)


    **Figure 14–26.** *The My Presentations window is very much like the My Documents
    window in Pages and My Spreadsheets window in Numbers.*


    When you tap the New Presentation button in the upper-left corner of the My Presentations
    window, you''re asked to choose a theme (see [Figure 14–27](#Chapter14.html#fig_14_27)).
    Apple provides a dozen themes that range from plain white to fancy.


    ![images](images/1427.jpg)


    **Figure 14–27.** *Pick a theme from one of the dozen professionally designed
    themes built into Keynote for iPad.*


    Tapping any one of the themes displays the first slide in your presentation deck,
    which by default is a title slide. [Figure 14–28](#Chapter14.html#fig_14_28) shows
    the title slide and toolbar for the Renaissance theme.


    ![images](images/1428.jpg)


    **Figure 14–28.** *The default title slide for the Renaissance theme. Both the
    text and the image are placeholders that you replace with your title, subtitle,
    and image.*'
