  trans: '

    ### 以幻灯片形式查看照片


    当查看任意相册的内容或相册中的单张照片时，您会在屏幕右上角看到`Slideshow`（幻灯片）和`Share`（共享）按钮（参见图 13-22）。顾名思义，`Slideshow`按钮会按顺序逐一显示相册中的照片。我们将在介绍完`Slideshow`按钮后，再讨论`Share`按钮。


    ![images](img/1322.jpg)


    **图 13-22.** 查看单张照片或任意相册内容时，菜单栏右侧会显示`Slideshow`和`Share`按钮。


    幻灯片是与朋友和家人分享照片的绝佳方式。但请记住，我们的照片往往与个人回忆相关，因此我们自己观看时总会比他人觉得更有趣。您只需回想一下曾被迫观看他人照片时，度秒如年的感觉就明白了。为了让您的观众对幻灯片保持兴趣，请记住以下几点：


    - *精简为佳*：如今电影或电视剧中，单个镜头的平均时长已不到两秒。回到 20 世纪 50 年代，平均镜头时长是 30 秒。看一集《老友记》，再看一集《我爱露西》，您就会明白我们的意思。按今天的标准，《露西》的节奏显得拖沓缓慢。随着世界和媒体的节奏加快，我们的注意力持续时间也缩短了。这同样适用于静态图像的观看。人们在两三秒内就能从一张照片中获取大量信息。如果他们被迫观看更长时间，就会开始感到无聊。因此，每张照片的显示时间要短，整个幻灯片的时长也要短。就像您在电影院观看电影预告片一样，其时长恰好是
    2 分 20 秒，这被认为是激发兴趣、展示精彩片段、让观众感到满足但不疲惫的理想时长。

    - *音乐总能加分*：在幻灯片的背景中播放合适的歌曲，能极大地增强氛围和感染力。音乐是传达情感、地点和情境的强大工具。在电影学院里，本书的一位作者曾上过一门剪辑课，课上我们观看了经典恐怖片《万圣节》的片段。我们观看了院线版——包含配乐、对白和音效——展示了迈克尔·迈尔斯手持大屠刀追杀受害者的场景，相当吓人。接着，我们观看了只有对白和音效的同一片段（去掉了配乐），结果从恐怖变成了近乎滑稽。音乐为画面增添的效果远超您的想象。

    - *转场也有帮助*：转场是指在从一张照片切换到下一张时产生的视觉效果。它为画面切换增添了一些视觉趣味。照片幻灯片允许您在五种转场效果之间进行选择。把它们当作视觉甜点，让观众保持愉悦。

    - *善用电视*：如果您要举办聚会，无需把所有客人聚拢并强迫他们坐下来观看，一个绝佳的方式是将幻灯片投射到电视上并设置为循环播放。这样，您的幻灯片会在背景中持续播放，客人们在社交时可以不时瞥见。背景中播放的幻灯片是绝佳的话题引子，并且您可以播放更长、每张照片显示更久的幻灯片，因为无需担心客人会感到厌烦。如果您打算在背景中播放幻灯片，可以选择几千张照片，每张显示
    5 到 10 秒；这样一来，整个播放可以持续数小时，也不会显得无聊或乏味。


    若要开始播放幻灯片，请轻点`Slideshow`按钮。此时会出现一个下拉菜单，提供若干幻灯片选项（参见图 13-23）。在顶部，您会看到与图 13-21 中相同的`AirPlay`接收器列表。从
    iOS 4.3 开始，iPad 允许您通过无线方式将幻灯片播放到 Apple TV 和其他 AirPlay 接收器上。除了此 AirPlay 选项，您还可以在屏幕上直接显示幻灯片，或通过
    HDMI、VGA 及其他视频适配器使用连接线将 iPad 镜像到电视屏幕。这些品牌适配器可从 Apple Store 购买，起售价为 29 美元。


    ![images](img/1323.jpg)


    **图 13-23.** 幻灯片选项下拉菜单


    在`AirPlay`接收器列表下方，是以下选项：


    - *转场*：转场效果可在切换照片时提供视觉特效。可用的转场取决于所选输出设备的能力。内置的转场效果包括擦拭、波纹、溶解等选项。Apple TV 则增加了许多炫酷的额外效果，如
    Ken Burns 效果、滑动面板、折纸、反射等。

    - *播放音乐*：当切换至`ON`时，此选项会在幻灯片播放时播放背景音乐。

    - *音乐*：轻点此按钮可浏览 iPad 音乐库中的所有歌曲。找到您想要的歌曲后，轻点它即可选中。

    - *开始幻灯片播放*：轻点此按钮开始播放幻灯片。图像覆盖层消失，幻灯片开始播放，无论是在本地屏幕直接播放，还是通过`AirPlay`在远程设备上播放。使用`AirPlay`时，您的屏幕会变黑，并出现一条信息，提示“此幻灯片正在通过`AirPlay`播放”。要随时停止幻灯片，请触摸屏幕。这会停止播放并将您置于全屏照片显示模式。要重新开始播放，请再次轻点`Slideshow`按钮，然后轻点`Start
    Slideshow`。


    幻灯片会按设定的时长显示每一张照片，您可以自行调整。如前所述，您可以通过从 Apple 购买一根特殊连接线将 iPad 连接到电视，从而将幻灯片输出到电视屏幕。Apple
    提供了多种不同的连接线，这些将在第 7 章中讨论。


    要自定义 iPad 显示幻灯片的方式，请前往主屏幕，依次进入`设置` ![images](img/U001.jpg) `照片`。如图 13-24 所示，此设置界面允许您精确指定幻灯片的显示方式：


    ![images](img/1324.jpg)


    **图 13-24.** 幻灯片设置


    - *每张幻灯片播放时长*：在此处，您可以设置每张照片的停留时间。可选参数有：2 秒、3 秒（默认值，对大多数人来说效果很好）、5 秒、10 秒（很快就会变得无聊）和
    20 秒（国际特赦组织可能官方认定这对大多数人来说是一种折磨；说真的，别对您的朋友和家人这样做）。

    - *重复*：将此选项设为`ON`可使幻灯片循环播放。

    - *随机播放*：将`随机播放`从`OFF`切换为`ON`，可以随机顺序显示照片。当`随机播放`关闭时，照片将按照相册中的顺序显示。

    '
- fmt: '### Sharing Your Photos


    You have a number of ways to share photos you have on your iPad. To access all
    the ways you can share your photos, bring up a photo full-screen and tap the `Share`
    button, which looks like an arrow breaking free from a small box. You''ll be presented
    with a drop-down menu of sharing options (see [Figure 13–25](#Chapter13.html#fig_13_25)):


    ![images](images/1325.jpg)


    **Figure 13–25.** *The Sharing drop-down menu*


    - **Email Photo**: Tap this to see an e-mail compose window appear on the screen.
    You''ll notice the photo has been copied into the body of the e-mail already (see
    [Figure 13–26](#Chapter13.html#fig_13_26)). Enter the recipient''s e-mail address,
    a subject, and body text; then tap `Send`, and your photo is on its way!


    ![images](images/1326.jpg)


    **Figure 13–26.** *The new message compose screen appears with the photo in the
    body of the e-mail.*


    Alternatively, you can e-mail up to five photos at a time from within the `Photos`
    app. While in an album, tap the `Share` button, and you''ll see the album menu
    renamed to `Select Photos`. Tap up to five photos that you want to send, and then
    tap the `Email` button in the upper-left corner (see [Figure 13–27](#Chapter13.html#fig_13_27)).
    An e-mail compose window will appear on the screen with the photos in the body
    of the message. Note that although you are limited to e-mailing five photos at
    a time from the `Photos` app, you can actually copy as many as you want and then
    open the `Mail` app, compose a new message, and paste them all in the body of
    the e-mail.


    ![images](images/1327.jpg)


    **Figure 13–27.** *You can e-mail up to five photos at a time from within the
    Photos app.*


    - **Send to MobileMe**: `MobileMe` is Apple''s e-mail service that also allows
    you to publish and share your photos online. The `Send to MobileMe` option lets
    you upload your photos to your `MobileMe` gallery online right from your iPad.
    Tap `Send to MobileMe`. A window will appear asking you to name the photo and
    write a description if you want (see [Figure 13–28](#Chapter13.html#fig_13_28)).
    Select the `MobileMe Gallery` album you want to publish the photo to; then tap
    `Publish`.


    ![images](images/1328.jpg)


    **Figure 13–28.** *Uploading a photo to a MobileMe gallery*


    A pop-up will appear when the photo has finished uploading, and you''ll be able
    to tap `View on MobileMe`, which takes you to your `MobileMe` web gallery in `Safari`,
    or `Tell a Friend`, which opens the `Mail` app and composes an e-mail with the
    link to the photo in the body of the message.


    To use these `MobileMe` features, you must have a `MobileMe` account. See [`www.me.com`](http://www.me.com)
    for details.


    - **Assign to Contact**: This option allows you to assign a photo to an address
    book contact. Tap `Assign to Contact`, and then select the contact''s address
    book entry from the drop-down menu (see [Figure 13–29](#Chapter13.html#fig_13_29)).


    ![images](images/1329.jpg)


    **Figure 13–29.** *Select the contact to add the photo to.*


    Move and scale the thumbnail of the photo that appears between the opaque bars
    on top and bottom to zoom in onto the contact''s face; then tap the `Use` button
    (see [Figure 13–30](#Chapter13.html#fig_13_30)).


    ![images](images/1330.jpg)


    **Figure 13–30.** *Move and scale the contact''s photo.*


    The next time you view the contact in the iPad''s `Contacts` app, the image you
    selected for them will appear next to their name. This image will sync with their
    contact information in `Address Book` and `Entourage` on a Mac and `Outlook` on
    a Windows computer.


    - **Use as Wallpaper**: Tap this button to use the selected image as wallpaper
    on your iPad. From the menu bar (see [Figure 13–31](#Chapter13.html#fig_13_31)),
    you''ll be able to select whether you want to use the image for the iPad''s lock
    screen, the Home screen, or both. This isn''t the only way to set your iPad''s
    wallpaper options. We''ll talk about the other way in a bit.


    ![images](images/1331.jpg)


    **Figure 13–31.** *The wallpaper menu bar options let you select which screen
    you want to use the photo as wallpaper for.*


    - **Print**: This allows you to print your photo to an `AirPrint`-compatible printer.
    Tap `Print` and then select the printer you want to print to and the number of
    copies you want to print. We talk about `AirPrint` and printing from your iPad
    in [Chapter 3](#Chapter03.html#ch3).


    You can also print multiple photos at a time. When viewing an album, tap the `Share`
    button. You''ll see the album menu renamed as `Select Photos`. Tap as many photos
    as you want to print. A check mark will appear on each selected photo (see [Figure
    13–27](#Chapter13.html#fig_13_27)). After you have selected all your photos, tap
    the `Print` button in the upper-left corner and then select the printer you want
    to print to and the number of copies of each photo you want to print.


    - **Copy Photo**: Tap `Copy Photo` to copy the image. This saves the image to
    your clipboard for use in pasting into other things (such as an e-mail or document)
    later.


    You can also copy multiple photos at a time. When viewing an album, tap the `Share`
    button. You''ll see the album menu renamed as `Select Photos`. Tap as many photos
    as you want to copy. A check mark will appear on each selected photo (see [Figure
    13–27](#Chapter13.html#fig_13_27)). After you have selected all your photos, tap
    the `Copy` button in the upper-left corner. These photos can then be batch copied
    into an e-mail or other applications.


    ### Deleting Your Photos


    Apple made it so you can only delete photos on your iPad that are part of the
    `Camera Roll` album. This album contains any photos you have saved from the Web
    or an e-mail on the iPad plus photos and videos taken with the iPad 2''s camera.
    Apple disabled deletion of photos from your other albums synced to your iPad because
    it didn''t want users accidentally deleting photos they had stored on their computer.


    To delete the photos, navigate to your `Camera Roll` album and tap the `Share`
    button. Tap the photos you want to delete, and a check mark will appear on them;
    then tap the red `Delete` button (see [Figure 13–32](#Chapter13.html#fig_13_32)).
    Alternatively, while displaying a photo full-screen in your `Saved Photos` album,
    you''ll notice a trash can icon next to the `Share` button (see [Figure 13–33](#Chapter13.html#fig_13_33)).
    Tapping this button will cause a `Delete Photo` confirmation pop-up to appear.
    Tap `Delete Photo` to delete the selected photo from your iPad.


    ![images](images/1332.jpg)


    **Figure 13–32.** *You can only delete photos on the iPad from the Saved Photos
    album.*


    ![images](images/1333.jpg)


    **Figure 13–33.** *The trash can icon in the upper-right corner of a photo in
    the Saved Photos album*


    To delete other photos on your iPad, you must delete them on your computer first
    and then resync the iPad.'
