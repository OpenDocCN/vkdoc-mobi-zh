  raw: '#### Dock Connector Port


    The Dock Connector port is the iPad’s high-speed connection to the world. Through
    the port, your iPad can connect to your Mac or Windows machine for syncing, can
    capture photos through the Camera Connection Kit, and can use a variety of docks
    or cables for charging the battery.


    We’ll be talking about many of those accessories later in this chapter, but for
    now, we’re going to just talk about using the Dock Connector port with the included
    Dock Connector to USB cable.


    You can find instructions on how to plug the cable into the Dock Connector port
    in [Chapter 1](#Chapter01.html#ch1). When plugging the cable into your iPad, be
    sure to have the side with the small gray icon (it’s a rectangle with a line in
    it) facing up, and also make sure that you push the cable in squarely. In other
    words, don’t have the cable connector angled up, down, or sideways, because that
    can cause undue wear on the Dock Connector port.


    #### Home Button


    To quote Dorothy from *The Wizard of Oz*, “There’s no place like home.” The Home
    button (see [Figure 3–7](#Chapter03.html#fig_3_7)) is undoubtedly the most heavily
    used physical button on the iPad.


    ![images](images/0307.jpg)


    **Figure 3–7.** *The Home button, centered here on the bottom of the iPad 2, has
    many uses.*


    It is used for a number of actions, including the following:


    *   Quitting an application that is in use and returning to the Home screen.

    *   Waking a sleeping iPad.

    *   Displaying all of the apps that are currently running on your iPad. This feature,
    which was added with iOS 4 (the fourth iteration of Apple’s mobile device operating
    system), is enabled by double-clicking the Home button. The iPad’s display becomes
    transparent, and the active apps are displayed in the row of icons at the bottom
    of the screen.


    One fascinating thing about the iPad is that, depending on how you’re holding
    it, the Home button can be on the top, bottom, left, or right side of the display.
    In most situations, however, it is in the standard bottom side of the screen.


    #### Headphone Jack


    On top of the iPad on the left side is the headphone jack (see [Figure 3–8](#Chapter03.html#fig_3_8)).


    ![images](images/0308.jpg)


    **Figure 3–8.** *The headphone jack on an iPad 2 Wi-Fi + 3G*


    The headphone jack accommodates any standard 3.5mm stereo headphone connector,
    so you have thousands of choices for headphones to enhance your listening pleasure.
    Apple sells two headphones: the Apple Earphones with Remote and Mic and the Apple
    In-Ear Headphones with Remote and Mic. Both of these headphones provide a way
    for you to control music volume as well as play, pause, rewind, advance, or skip
    through music or video.


    Remember earlier in this chapter, when you were warned about getting water into
    the speaker or Dock Connector? That warning goes for the headphone jack as well.
    In that jack is a small liquid sensor. If you ever get your iPad wet, the liquid
    sensor changes color. This indicates to any Apple technician who is disassembling
    your iPad that the iPad was wet at one point or another, and it voids your warranty.
    Unfortunately, some people have found that the liquid sensor may show “water damage”
    even if the iPad has just been exposed to extremely humid conditions.


    If this happens to you, it’s within your rights as a consumer to insist on having
    the technician open the iPad, because there is a second internal sensor that is
    less susceptible to humidity.


    #### Microphone


    The iPad’s microphone is probably the most invisible piece of equipment on the
    device. On the first-generation iPad, it’s a tiny hole located right next to the
    headphone jack. The second-generation iPad moved the microphone to the front of
    the iPad, where it is a miniscule circular array of microscopic dots arranged
    above the front-facing camera.


    If you’re using an iPad application to record a lecture or conversation, you can
    enhance the sound recording slightly by orienting the mic directly toward the
    person(s) speaking. When you’re recording your own voice, either of the Apple
    headphones with microphones discussed in the previous section provides clear reproduction
    of your speech without picking up a lot of background noise. Also available from
    many sources professional-quality mics such as the $60 iRig Mic from IK Multimedia
    (`ikmultimedia.com/irigmic/`) that plug into the headphone jack.


    USB headsets also work well for listening to and recording on the iPad when connected
    through the USB adapter that is part of the iPad Camera Connection Kit. We’ll
    discuss the Camera Connection Kit later in this chapter.


    #### Micro-SIM Port (Wi-Fi + 3G iPad Only)


    There’s one more port on the Wi-Fi + 3G iPad that doesn’t exist on the Wi-Fi model:
    the micro-SIM port (see [Figure 3–9](#Chapter03.html#fig_3_9)).


    Every device that is connected to a GSM-based mobile phone system anywhere in
    the world uses a small card called a *subscriber identity module* (SIM) card.
    Your 3G iPad cannot access the Internet through a 3G network without an SIM card,
    so each 3G iPad comes with one pre-installed. Apple uses a smaller SIM card form
    factor in the iPad called *micro-SIM*.


    On occasion, SIM cards may be defective and require replacement. For that purpose,
    there is a tiny door on the left side of the 3G iPad. On the original iPad, it’s
    located on the lower part of the left side, while it’s near the top of the second-generation
    iPad. That door has a miniscule hole in it, which you can think of as the lock
    for the door (see [Figure 3–9](#Chapter03.html#fig_3_9)).


    ![images](images/0309.jpg)


    **Figure 3–9.** *The micro-SIM card, the SIM tray, and the SIM eject tool are
    found only on the Wi-Fi + 3G iPad. On the second-generation iPad, the port is
    located near the top of the left side of the device.*


    The 3G-enabled iPad also comes with a SIM eject tool, which is a small oblong
    aluminum piece with a small protrusion on one end. To open the SIM door, take
    the SIM eject tool and put the protruding piece into the hole in the door. Apply
    pressure to the tool, and the door will pop up from the surface. It is quite easy
    to lose the SIM eject tool, so in a pinch you can use a small paper clip bent
    to resemble the tool.


    Grasping the top of the door with your fingers, pull the micro-SIM out of the
    iPad. It rests in a small tray, and it can be popped out and replaced with a new
    micro-SIM. To put the new SIM into the iPad, simply push the tray back into the
    iPad until the door is flush with the side of your device.


    ### Care and Maintenance of Your iPad


    Although an iPad isn’t as expensive as MacBook Pro, you’ll still want to keep
    it around as long as possible. With a little loving care, your iPad can serve
    you for many years to come. In this section of [Chapter 3](#Chapter03.html#ch3),
    we’ll tell you how to maintain your iPad for long life and years of loyal service.


    #### Cases


    As with the iPhone before it, the iPad is creating its own economy with a plethora
    of accessories being produced for it. Some of the hottest products for iPad are
    cases that protect the device from scratches, water, dirt, and accidental drops.
    Although we’re not going to list every possible case in this section, we’ll talk
    about the different types of cases and who they’re for.'
  trans: '

    ### 基座接口端口


    `Dock Connector` 端口是 iPad 连接外部世界的高速通道。通过该端口，您的 iPad 可以连接 Mac 或 Windows 电脑进行同步，可以通过
    `Camera Connection Kit` 导入照片，还可以使用各种底座或数据线为电池充电。


    我们将在本章后面讨论许多此类配件，但现在，我们先来了解如何使用随附的 `Dock Connector to USB` 数据线与 `Dock Connector`
    端口配合使用。


    您可以在第 1 章 中找到如何将数据线插入 `Dock Connector` 端口的说明。将数据线插入 iPad 时，请务必让带有小灰色图标（一个带线的矩形）的一面朝上，并确保将数据线笔直推入。换句话说，不要让数据线接口向上、向下或向侧边倾斜，因为这可能会对
    `Dock Connector` 端口造成不必要的磨损。


    ### 主屏幕按钮


    引用《绿野仙踪》中桃乐丝的话：“世上只有家最好。” `Home` 按钮（参见图 3–7）无疑是 iPad 上使用最频繁的物理按钮。


    ![images](img/0307.jpg)


    **图 3–7.** *主屏幕按钮，位于 iPad 2 底部中央，功能多样。*


    它用于多种操作，包括：


    - 退出正在使用的应用程序并返回主屏幕。

    - 唤醒处于睡眠状态的 iPad。

    - 显示 iPad 上当前正在运行的所有应用。此功能是 `iOS 4`（苹果移动设备操作系统的第四代）新增的，通过双击 `Home` 按钮启用。此时 iPad
    屏幕会变透明，活跃的应用程序会显示在屏幕底部的一行图标中。


    关于 iPad 的一个迷人之处在于，根据您握住它的方式，`Home` 按钮可能位于屏幕的顶部、底部、左侧或右侧。但在大多数情况下，它位于标准的屏幕底部。


    ### 耳机插孔


    iPad 顶部的左侧是耳机插孔（参见图 3–8）。


    ![images](img/0308.jpg)


    **图 3–8.** *iPad 2 Wi-Fi + 3G 上的耳机插孔*


    耳机插孔兼容任何标准的 `3.5mm` 立体声耳机接口，因此您有成千上万种耳机可供选择，以提升您的聆听体验。苹果销售两款耳机：`Apple Earphones
    with Remote and Mic` 和 `Apple In-Ear Headphones with Remote and Mic`。这两款耳机都能让您控制音乐音量，以及播放、暂停、快退、快进或跳过音乐或视频。


    还记得本章前面警告过您不要让扬声器或 `Dock Connector` 进水吗？这个警告同样适用于耳机插孔。耳机插孔内有一个小型液体感应器。如果您的 iPad
    曾受潮，这个液体感应器就会变色。这向任何拆卸您 iPad 的苹果技术人员表明，该 iPad 曾接触过液体，并且这将使您的保修失效。不幸的是，有些人发现，即使
    iPad 只是暴露在极度潮湿的环境中，这个液体感应器也可能显示“进水损坏”。


    如果您遇到这种情况，作为消费者，您有权要求技术人员打开 iPad，因为其内部还有另一个对湿度不那么敏感的感应器。


    ### 麦克风


    iPad 的麦克风可能是设备上最不显眼的部件。在第一代 iPad 上，它是一个位于耳机插孔旁边的小孔。第二代 iPad 则将麦克风移到了 iPad 正面，位于前置摄像头上方，是一排极小的微型圆点阵列。


    如果您使用 iPad 应用程序录制讲座或对话，可以通过让麦克风正对说话者来稍微提升录音效果。当您录制自己的声音时，上一节讨论过的两款带有麦克风的苹果耳机都能清晰地再现您的语音，而不会收录太多背景噪音。此外，还有许多渠道可以买到专业级麦克风，例如售价
    60 美元的 `IK Multimedia` 出品的 `iRig Mic` (`ikmultimedia.com/irigmic/`)，它可以直接插入耳机插孔。


    当通过 `iPad Camera Connection Kit` 附带的 `USB` 适配器连接时，`USB` 耳机在 iPad 上用于收听和录音效果也很好。我们将在本章后面讨论
    `Camera Connection Kit`。


    ### Micro-SIM 卡槽（仅限 Wi-Fi + 3G iPad）


    `Wi-Fi + 3G` 版 iPad 上还有一个 `Wi-Fi` 版没有的端口：`micro-SIM` 卡槽（参见图 3–9）。


    世界上任何连接到基于 GSM 的移动电话系统的设备都会使用一张称为*用户身份模块*（SIM）的小卡片。您的 3G iPad 如果没有 SIM 卡就无法通过
    3G 网络访问互联网，因此每台 3G iPad 出厂时都预装了一张。苹果在 iPad 中使用了一种更小尺寸的 SIM 卡，称为 *micro-SIM*。


    偶尔，SIM 卡可能会损坏需要更换。为此，3G iPad 的左侧有一个小门。在第一代 iPad 上，它位于左侧下部，而在第二代 iPad 上则靠近顶部。这个门上有一个微小的孔，您可以将其视为门的锁孔（参见图
    3–9）。


    ![images](img/0309.jpg)


    **图 3–9.** *micro-SIM 卡、SIM 卡托架和 SIM 卡弹出工具仅存在于 Wi-Fi + 3G 版 iPad 上。在第二代 iPad 上，该卡槽位于设备左侧靠近顶部的位置。*


    支持 3G 的 iPad 还附带一个 `SIM eject tool`，它是一个椭圆形的小铝片，一端有一个小突起。要打开 SIM 卡门，请拿起 `SIM eject
    tool`，将突起部分插入门上的小孔。向工具施加压力，门就会从表面弹起。`SIM eject tool` 很容易丢失，因此在紧急情况下，您可以使用弯曲成类似形状的小回形针代替。


    用手指捏住门的顶部，将 `micro-SIM` 卡从 iPad 中拉出。它放置在一个小托盘中，可以弹出并更换一张新的 `micro-SIM` 卡。要将新 SIM
    卡放入 iPad，只需将托盘推回 iPad，直到门与设备侧面齐平。


    ## iPad 的保养与维护


    虽然 iPad 不像 `MacBook Pro` 那么昂贵，但您仍然希望它能尽可能长久地使用。只要稍加爱护，您的 iPad 就能在未来多年为您服务。在本第
    3 章的这一节中，我们将告诉您如何维护您的 iPad，使其拥有长久的使用寿命和多年的忠诚服务。


    ### 保护壳


    与其前辈 iPhone 一样，iPad 也正在催生自己的周边经济，大量为其生产的配件应运而生。一些最热门的 iPad 产品是用于保护设备免受划伤、水、灰尘和意外跌落损坏的保护壳。虽然我们不会在本节中列出所有可能的外壳，但我们将讨论不同类型的保护壳及其适用人群。

    '
- fmt: '### Sleeves


    An iPad sleeve (see [Figure 3–10](#Chapter03.html#fig_3_10)) is usually made of
    a soft material with a nonscratch lining. The iPad is placed into the sleeve,
    and then it’s commonly put into another carrying case—a backpack, a purse, a briefcase,
    or a laptop bag.


    ![images](images/0310.jpg)


    **Figure 3–10.** *The Targus Hughes Leather Portfolio Slipcase iPad sleeve by
    Targus. Image courtesy of Targus.*


    More than anything, sleeves are designed to protect the iPad from scratches when
    it is placed into another bag. They can be made of a variety of materials (there
    are sleeves made of leather, fleece, cork, neoprene, nylon, and hemp, for example),
    and prices are also all over the map.


    Examples of sleeves are products from Targus ([`www.targus.com`](http://www.targus.com))
    and Booq (`booqbags.com`).


    ### Bags


    Bags for the iPad (see [Figure 3–11](#Chapter03.html#fig_3_11)) are meant not
    only to protect the iPad, but to be the primary form of transportation for it
    as well. As such, they’re usually equipped with a handle or strap of some sort
    for easy carrying. Price-wise, bags are usually more expensive than sleeves, but
    they also provide more protection. Often there’s some sort of padding provided,
    as well as a stiff insert to protect the screen.


    ![images](images/0311.jpg)


    **Figure 3–11.** *The attractive and functional iPad Travel Express bag from WaterField
    Designs. Image courtesy of WaterField Designs.*


    Several stylish bags are made by WaterField Designs (`sfbags.com`) and Tom Bihn
    ([`www.tombihn.com`](http://www.tombihn.com)).


    ### Skins


    If you want to protect the surfaces of your iPad without a lot of extra weight,
    consider a skin. These are usually made of a thin material that might not protect
    your iPad against a drop but will keep scratches away. Zagg’s Invisible Shield
    for iPad ([`www.zagg.com`](http://www.zagg.com)) and Fusion of Ideas’ Stealth
    Armor ([`www.fusionofideas.com/sa-ipad/index.html`](http://www.fusionofideas.com/sa-ipad/index.html))
    are two perfect examples of skins that provide scratch protection with little
    or no bulk.


    ### Book-Style Cases


    The iPad is an excellent electronic book reader, so why not make it look like
    a book? The first case of this type was developed by San Francisco-based DODOcase
    (`dodocase.com`), a company that fused high-tech and old bookbinding skills and
    came up with a good-looking and protective iPad case. Other companies have followed
    suit, with the Twelve South BookBook for iPad (`twelvesouth.com/products/bookbook_ipad/`)
    being a clever and beautiful example of this genre of iPad case (see [Figure 3–12](#Chapter03.html#fig_3_12)).


    ![images](images/0312.jpg)


    **Figure 3–12.** *Make your e-book reader look like a book with a clever and beautiful
    book-style case like the Twelve South BookBook for iPad. Photo courtesy of Twelve
    South.*


    ### Caring for the Battery


    One great thing about the iPad is the battery life. It’s not uncommon to go for
    days without charging the battery, and the thought of being far from a power outlet
    will no longer cause you to panic. A good rule of thumb is that, for normal usage,
    the battery level drops about 10 percent for each hour of use. If you’re playing
    games with some heavy graphic and sound demands, your battery may not last as
    long on a charge. On the other hand, if you’re reading an e-book, the iPad battery
    may last longer.


    However, your iPad battery won’t last forever without a charge, so you’ll want
    to charge it on a regular basis. You do this by connecting the iPad to a power
    outlet using the Dock Connector to USB cable and the 10W USB power adapter or
    by connecting the cable to a high-power USB 2.0 port.


    What do we mean by high-power USB? Generally, that means plugging either directly
    into a port on your computer or into a powered USB hub. Plugging your iPad into
    a port on a USB keyboard or into an unpowered USB hub won’t charge it. Instead,
    you’ll see the message `“Not Charging”` in the status bar next to the battery
    icon. We recommend plugging the iPad into the power adapter every night to receive
    a full charge.


    If your iPad is *very* low on power, you may see one of the images in [Figure
    3–13](#Chapter03.html#fig_3_13) on the screen. These mean that the device needs
    to be charged for at least ten minutes before you can use it. If the battery is
    extremely low or completely drained, you may not see these images for up to two
    minutes after plugging the iPad into a power source.


    ![images](images/0313.jpg)


    **Figure 3–13.** *If you see either of these symbols on your iPad screen, stop
    using it, and plug it into a power source as soon as possible.*


    With constant usage, your iPad battery may eventually get to the point where its
    capacity to hold a charge has depleted 50 percent or more from the original specification.
    You’ll be able to tell this is the case if your iPad is constantly running out
    of power or if it never shows that it is completely recharged after being plugged
    in for a long time. In this case, you may need to have your battery replaced by
    an Apple-authorized service provider. If you purchased an AppleCare Protection
    Plan for your iPad and you’ve owned it for less than two years, you may be able
    to have Apple replace the battery at no cost.


    There are some simple steps you can take to stretch your battery life that can
    be useful in situations (international flights, for example) where you cannot
    readily recharge your battery:'
