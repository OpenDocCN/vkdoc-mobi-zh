  trans: '

    # 获取新数据


    “获取新数据”按钮出现在列出的最后一个电子邮件账户正下方（图 11-7 显示了右侧面板向下滚动至账户列表之外的情况）。某些电子邮件账户（如 MobileMe
    的 IMAP 服务）允许你设置所谓的*推送*服务。当推送功能启用时，新邮件在电子邮件服务器接收后，会立即传输到你的设备上。虽然这是尽快获取邮件的好方法，但它也需要
    iPad 与电子邮件服务器之间进行更多通信。这可能会缩短电池续航时间，但更重要的是，它会增加设备使用的带宽。


    尽管如果你使用的是 Wi-Fi 网络，这并非问题，但 3G 网络的数据套餐费用高昂，特别是当你使用的是计量账户时——这是大多数 iPad 运营商提供的标准服务。使用计量账户时，你会获得一定的带宽配额，例如每月
    250MB。超出该带宽，你可能会被断网，被再次收取另一个配额的费用，或者可能按高昂的套餐外费率收费；具体细节因你所选的套餐和签约的运营商而异。


    推送的替代方案，也是电子邮件账户最常用的一种方法，就是*获取*，也称为*拉取*。使用这种方法，你的 iPad 仅在你指示它或按预设时间间隔时，才会检查服务器上的新邮件。你可以设置电子邮件账户检查邮件的计划：每
    15 分钟、30 分钟、60 分钟，或手动。手动模式意味着直到你在“邮件”应用中打开收件箱，或点击大多数邮箱底部的`刷新`按钮时，该账户才会检查邮件。这是节省带宽（尤其是在出国旅行时）的好方法，但你可能会错过在检查间隔期间到达的重要消息。


    在大多数情况下，我们建议为 MobileMe 账户以及任何其他能够提供推送通知的电子邮件账户（如 Exchange）保持推送通知开启。对于其他账户，这取决于你希望打开收件箱时新邮件已在那里等待，还是希望
    iPad 在你实际打开收件箱时才去获取。


    “设置”中的 `![images](img/U001.jpg) 邮件、通讯录、日历 ![images](img/U001.jpg) 获取新数据 ![images](img/U001.jpg)
    高级` 按钮可用于配置 iPad 上的每个单独电子邮件账户。每个账户的单独按钮会引导至一个选项，用于在`获取`和`手动`之间进行选择。选择`获取`可将该账户添加到
    iPad 的自动例行程序中，或选择`手动`以使你的账户保持离线状态，直到你决定检索邮件。


    请注意，你无法单独设置轮询时间；你在“获取新数据”屏幕中选择的轮询时间将应用于所有被获取的账户。例如，如果你选择 15 分钟，则所有被轮询的账户每小时将被检查四次。


    # 显示


    设置页面的下一部分更多是关于“邮件”应用程序的外观和感觉。第一个按钮`显示`提供了选项，让你可以随时在收件箱中看到多少封最近的消息。默认值是 50 封，但你也可以选择
    25、75、100 或 200 封。


    如果你收到的电子邮件不多，将值设置为 25 封就很好。当你收到大量电子邮件或一段时间未检查收件箱时，你随时可以通过点击收件箱底部的`加载更多消息`链接，从服务器拉取更多消息。有些人更喜欢简洁的外观，并愿意在需要时加载更多消息。选择更多的消息数量意味着你的邮箱将始终更加杂乱，但可以避免在获取额外邮件批次时的等待。


    # 预览


    邮件收件箱中的每条消息都可以包含内容的简短预览，这样你不仅能看到发件人和主题，还能看到内容的简短片段。`预览`按钮允许你将预览长度设置为从无（无预览）到五行。


    邮件的消息显示会更新以反映你在此处设置的预览大小。随着预览变大，你在屏幕上一次可以看到的条目会减少。随着预览变小，你会看到更多。凭借 iPad 慷慨的屏幕尺寸，这个选择对你的影响要小于在更小设备（如
    iPhone 或 iPod touch）上管理邮件时的情形——在这些小设备上，该设置在使用中变得更加关键。iPad 的默认设置包含两行消息预览，这通常足以判断消息是否重要。


    # 最小字体大小


    如果你戴双光眼镜或阅读小文本有问题，你会喜欢下一个设置。`最小字体大小`允许你将“邮件”中的文本大小从`小`更改为`巨大`，中间还有另外三种大小。与 iPhone
    或 iPod touch 不同，在屏幕较大的 iPad 上增加字体大小不会影响可用性，所以不用担心。能够将 iPad 放在桌子上并站着查看，这是一件很棒的事情，即使你的视力在其他方面非常好。


    # 显示收件人/抄送标签


    当`显示收件人/抄送标签`按钮启用（设置为`开`）时，收件箱中的每条消息旁边会出现一个小标签，指示该消息是直接发送给你的，还是你在发送给其他人的电子邮件中被抄送了（carbon
    copied）。如果你将此选项保持禁用状态，你仍然可以在撰写邮件时使用该功能——只是需要额外点击一两下。此选项仅用于设置默认值，即你开始撰写邮件时的起始状态。


    # 删除前询问


    有时，你可能会意外删除一封电子邮件。启用`删除前询问`会强制你确认是否确实想要删除一封邮件。经常需要批量删除电子邮件的 iPad 用户可能应该禁用此设置，以避免在处理确认信息时陷入困境。如果丢失一封邮件的后果对你来说可能更严重，那么请启用此选项。


    # 载入远程图像


    当你使用慢速互联网连接时，接收包含大量图像的电子邮件可能会令人沮丧，因为加载这些图像需要一段时间。当你处于 3G 信号较弱的区域时，Wi-Fi + 3G iPad
    中的无线电会回退到速度慢得多的蜂窝网络，例如 EDGE 或 GPRS。即使是 Wi-Fi 网络也可能连接到一个慢速的互联网连接。例如，许多游轮上提供 Wi-Fi
    网络，但却依赖于一条非常慢的卫星连接，船上的所有互联网流量都必须通过该连接。


    图像也会消耗带宽，如果你正试图管理蜂窝数据使用量，这是一个问题。因此，你可能希望在移动中跳过图像加载，只在回到办公桌、离开计量互联网时再查看这些内容。


    `载入远程图像`用于启用或禁用“邮件”自动加载图像的功能。图像不会立即加载，而是被一个占位图像替换。你仍然可以通过点击手动下载每个图像来查看它。这样，你可以跳过公司野餐的所有快照，同时仍然欣赏你姐姐宝宝的照片。


    # 始终密送给自己


    你是否希望将自己发送的每封电子邮件都抄送给自己一份？将`始终密送给自己`设置为`开`，会自动将一封密送副本发送到你的收件箱。对于任何希望保留已发送邮件记录，而其账户并未自动提供此功能的人来说，此设置特别方便。尽管许多现代电子邮件服务提供“已发送邮件”存档，但仍有提供商不提供此选项。


    *密送*是什么意思？它仅仅意味着电子邮件的收件人不知道你也同时收到了这封邮件的副本。当你希望将电子邮件副本发送给同事，但又不想让原始收件人知道你在发送这些副本时，密送非常有用。

