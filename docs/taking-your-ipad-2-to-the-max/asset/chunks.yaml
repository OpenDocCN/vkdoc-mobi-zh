    in the upper left of the Choose a Template window, and you''re ready to start
    writing. Before you begin, we''ll explain a bit about what''s on the top of the
    Pages window, as shown in [Figure 14–2](#Chapter14.html#fig_14_2).


    ![images](images/1402.jpg)


    **Figure 14–2.** *The Pages Style ruler*


    #### The Pages Style Ruler


    Apple named the ruler-like user interface element shown in [Figure 14–2](#Chapter14.html#fig_14_2)
    the *Style ruler*, because it provides both a way to style your text and a ruler
    for aligning page elements. You can make the Style ruler disappear from your page
    by tapping the circled × in the upper-right corner, and you can make it reappear
    by double-tapping the barely visible edge of the ruler at the top of the screen.


    The Style ruler is different from the toolbar just above it. The toolbar includes
    a button for returning to My Documents, an Undo button (for reverting to previous
    versions of a document), and a set of buttons on the right side that we''ll describe
    in a moment. Unlike the Style ruler, the toolbar is always visible unless you
    switch into full-screen mode, as described later in this chapter. Full-screen
    mode hides all elements except the document.


    The ruler features a number of buttons. The leftmost button (the one marked Body)
    applies styles to any currently selected paragraph. To apply a style, double-tap
    any text in a paragraph, and then tap the Paragraph Styles button. A scrolling
    pop-up appears with a list of common paragraph styles—title, subtitle, headings
    of various sizes, subheadings, body text, bulleted text, captions, headers and
    footers, and more. Selecting one of those styles applies it to the entire paragraph
    of text.


    ##### Undo/Redo


    Did you just accidentally apply the incorrect style to a paragraph of text? No
    problem. Tap the Undo button on the toolbar at the top of the window, and the
    text reverts to the original style. If you later decide that you really meant
    to make a specific change, tap the Undo button again. A pop-up may appear allowing
    you to choose to redo an action. Unlike many other iPad apps, Pages does not support
    shaking the iPad from side to side to undo/redo.


    ##### Common Styles


    The next set of buttons—B, I, and U—apply common styles to characters. B stands
    for bold, I for italic, and U for underlines. To select a word, double-tap it.
    When you select a word, it''s highlighted with a light blue background and gains
    a pair of selection handles, one at each end (see [Figure 14–3](#Chapter14.html#fig_14_3)).


    ![images](images/1403.jpg)


    **Figure 14–3.** *Double-tapping any word in a Pages document selects it, adds
    selection handles to either side to expand the selection, and displays a pop-up
    menu of actions.*


    Expand your selection by dragging the handles left or right, or select an entire
    paragraph by triple-tapping it. A pop-up also appears, showing actions that can
    be applied to the text. The most widely used actions—Cut, Copy, and Paste—appear
    in the pop-up. Tapping the More button provides several more actions—Copy Style,
    Replace, and Definition.'
