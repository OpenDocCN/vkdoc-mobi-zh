    ### MobileMe 同步


    你刚刚完成的所有同步设置都基于一个前提——你没有订阅 Apple 的 MobileMe 服务。MobileMe 不仅能实现 Mac、Windows 电脑、iPhone、iPad
    和网页之间的数据同步，还为你提供`me.com`邮箱地址、通过 iDisk 进行数据在线存储、在线相册，以及在丢失 iPad 时找回它的功能。真正神奇之处在于，这一切都通过
    iPad 的 Wi-Fi 或 3G 连接完成，因此无需通过基座接口和 USB 线将设备持续连接到 Mac 或 Windows 电脑。


    MobileMe 由 Apple 提供，年度订阅费用为 99 美元（[`www.apple.com/mobileme`](http://www.apple.com/mobileme)），不过
    Amazon.com 上常有折扣订阅。如果你已从这些渠道购买了订阅，可以通过选择“系统偏好设置”`![images](img/U001.jpg)`“MobileMe”并输入会员名和密码在
    Mac 上启用该服务（参见图 10–23）。非会员则可通过同一“系统偏好设置”面板注册 60 天免费试用。Windows 电脑用户只需在浏览器中访问[`www.apple.com/mobileme`](http://www.apple.com/mobileme)即可注册
    MobileMe 或申请相同的免费试用。


    ![images](img/1023.jpg)


    **图 10–23.** *MobileMe 不仅能出色地实现 iPad、iPhone 和 Mac 的无线同步，还具备在丢失 iPad 时进行定位和远程擦除数据的功能。*


    从“MobileMe 系统偏好设置”面板登录 MobileMe 账户后，你可以点击“同步”按钮并确保勾选“与 MobileMe 同步”复选框，从 Mac 端设置同步（图
    10–24）。


    ![images](img/1024.jpg)


    **图 10–24.** *与 MobileMe 同步可对日历和通讯录进行无线双向更新。*


    复选框下方列出了 MobileMe 能在登录同一账户的不同设备之间同步的项目。其中最主要的是三个桌面应用——日历、备忘录和通讯录——但邮件账户和 Safari
    浏览器书签也可以在 Mac、iPad、iPhone 或 iPod touch 之间同步。


    我们建议设置自动同步，这样一旦 Mac 上的 iCal 或通讯录发生更改，或在邮件中添加了备忘录，这些更改会立即同步到 iPad。请记住，同步是双向的，因此在
    iPad 上所做的更改也会同步到其他设备。


    你会注意到，如果设置了日历、通讯录和备忘录信息的 MobileMe 同步，iTunes 中“信息”标签页上的这些项目会被取消勾选。iTunes“信息”标签页的“同步通讯录联系人”、“同步
    iCal 日历”及其他区域底部会显示提示信息，表明这些数据正通过 MobileMe 进行无线同步。你可以选择同时使用直接同步和 MobileMe 同步，但如果你已使用
    MobileMe，我们建议将其作为同步数据的唯一方式。


    对于 Windows 用户而言，在 iPad 上设置 MobileMe 同步是最简单便捷的方法。在 iPad 上依次选择“设置”`![images](img/U001.jpg)`“邮件、通讯录、日历”，然后点击标示你的
    MobileMe 账户的按钮（该按钮以你的 MobileMe 邮箱账户名标注）。在出现的对话框中（参见图 10–25），你会看到用于开启通讯录和日历同步的开关。将这些开关滑动至“开”即可在
    iPad 和 MobileMe 之间同步日历和通讯录。将 MobileMe 与 Windows 电脑同步超出了本书的范围，但你可以通过[`www.apple.com/mobileme/setup/pc.html`](http://www.apple.com/mobileme/setup/pc.html)了解更多信息。


    我们将在下一章介绍如何在 iPad 上设置 MobileMe。


    ![images](img/1025.jpg)


    **图 10–25.** *将相关开关滑动至“开”即可在 iPad 和 MobileMe 之间同步日历和通讯录。*


    ### 本章小结


    iPad 上最实用的应用程序包括日历、备忘录和通讯录——这是设备的桌面办公套件。在本章中，你学习了如何将 iPad 用作数字记事本、日程本和通讯录，以及如何将这些信息同步到
    Mac 或 Windows 电脑。以下是本章需要记住的几个要点：


    - 电脑上的桌面办公应用（Mac 上的 iCal 和通讯录，Windows 电脑上的 Outlook）可以与 iPad 上的同类应用同步。日历是 iPad
    上强大的桌面日历，而通讯录可让你访问所有通讯录信息。备忘录应用则是快速记录文本并将其传输到电脑的便捷方式。

    - 备忘录会同步到 Mac 上的邮件和 Windows 电脑上的 Outlook。目前，备忘录数据无法通过 MobileMe 进行无线同步。

    - 查看日历信息有四种视图——日视图、周视图、月视图和列表视图。

    - Apple 的 MobileMe 服务不仅是与其他电脑和设备同步日历和通讯录信息的绝佳方式，还能提供找回丢失 iPad 的功能。

    - 虽然你无法在 iPad 上创建联系人分组，但通讯录支持显示在通讯录或 Outlook 中创建的分组。分组是组织大量联系人的强大工具。


    ## 第 11 章


    ## 设置和使用邮件


    电子邮件，是我们与世界的连接，是我们融入更大社会的方式。它占据了我们一天中的大量时间，甚至比电话更能成为人们相互联系和更新的主要方式。如果问大多数人他们会用新
    iPad 做什么，很多人会立刻回答“收发邮件”。能够离开办公桌，在移动中依然保持联系，是 iPad 使用中极具价值的部分。


    iPad 使用“邮件”应用来撰写、发送和接收电子通信。它提供了一种便捷的方式，用于发送便签、共享文件以及查看他人与你分享的内容。许多 iPad 应用也将“邮件”作为与他人共享文档或文件的渠道，因此“邮件”是一个值得了解的好应用。


    在本章中，你将学习如何在 iPad 上设置电子邮件账户，了解撰写和管理邮件的要点，并了解“邮件”如何与其他 iPad 应用配合，帮助你与他人分享信息。


    ### 设置邮件账户


    iPad 的“邮件”应用图标非常容易识别：一个白色纸信封漂浮在蓝天背景上。默认情况下，“邮件”图标位于 iPad 屏幕底部的程序坞中。程序坞确保可以从主屏幕的任何一个页面轻松访问“邮件”。有时你会看到这个信封/天空图标上出现一个带有数字的红色气泡。这个气泡表示有多少新消息已到达，正等待你阅读。


    第 10 章讨论了如何在 iPad 和电脑之间同步日历、通讯录和备忘录。iPad 和 iTunes 也让账户传输到电脑变得同样简单。如果你已经在 Mac 或
    Windows 电脑上设置了多个电子邮件账户，则无需重新输入所有信息在 iPad 上进行设置。你可以使用第 10 章中相同的流程将邮件账户同步到 iPad，以快速设置邮件，也可以直接在
    iPad 上设置账户——由你选择。接下来的两节将介绍这两种方法。

