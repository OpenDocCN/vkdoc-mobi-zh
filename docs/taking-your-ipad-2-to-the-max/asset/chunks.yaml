  trans: '4.  点击`Create New Account`。屏幕会清空，并显示一条欢迎您使用 iTunes Store 的消息。点击`Continue`按钮。

    5.  查看服务条款，勾选标有“I have read and agree to these terms and conditions”的复选框，然后点击`Continue`。一个新窗口会出现，提示您创建账户。

    6.  输入您的电子邮件地址和密码（必须输入两次密码以进行验证）。同时输入一个有助于验证您身份的问题和答案，以及您的出生月份和日期。查看页面上的其他选项，并根据需要调整，然后点击`Continue`。屏幕将再次清空，您将进入账户创建的最后一个步骤。

    7.  输入有效的信用卡及该信用卡的账单信息。这些信息必须匹配才能完成账户创建。输入信息后，点击`Continue`。


    完成这些步骤后，您将会在注册时指定的地址收到一封确认邮件。邮件会欢迎您加入 iTunes Store，并提供客户服务网址（[`www.apple.com/support/itunes/store`](http://www.apple.com/support/itunes/store)）。


    创建 iTunes App Store 账户并不需要信用卡。如果您只打算下载免费应用，并且没有信用卡，有一种方法可以直接从您的 iPad 上创建 iTunes
    App Store 账户。以下说明假定您尚未拥有账户，并且已经拆开 iPad 的包装。别担心；如果您想稍后再操作，随时可以回来参考这些说明。


    1.  在您的 iPad 上，点击 App Store 应用图标以启动它。

    2.  寻找一款免费应用。可以是任何应用，但请确保其价格显示为`Free`。点击`Free`按钮开始“购买”流程；然后点击`Install App`。

    3.  会弹出一个对话框，要求您使用现有 Apple ID 或创建新的 Apple ID 登录 iTunes App Store。点击`Create New
    Apple ID`按钮。

    4.  系统会要求您选择一个与您付款方式账单地址相匹配的国家或地区。点击`Store`字样旁边的国家名称，从出现的列表中选择一个；然后点击`Next`按钮。

    5.  同意 iTunes Store 条款与条件。

    6.  现在系统会要求您输入新的账户信息，包括您的电子邮件地址、密码、密保问题与答案以及您的出生日期。输入这些信息后，点击`Next`。

    7.  在账单信息屏幕上，点击`Credit Card`字样旁边的名称，然后选择`None`作为您的付款方式。输入有效的姓名和账单地址，然后点击`Next`。

    8.  此时，应会出现一个电子邮件验证屏幕。点击`Finish`，然后在您的 iPad 上打开“邮件”应用（前提是邮件已设置好；如果尚未设置，您可以在另一台电脑上完成此部分操作）。

    9.  打开来自 Apple 的邮件，点击`Verify Now`链接。系统会要求您登录以完成账户创建。

    10. 点击`Use Existing Account`按钮，输入您刚刚创建的用户名（电子邮件地址）和密码，然后点击`OK`。

    11. 您将看到一条消息，告知您 iTunes Store 账户已成功创建。点击`Done`按钮，然后您就可以开始从 iTunes、App Store 或
    iBookstore 下载任何免费应用、图书、音乐或视频了。在第 8 章中了解更多关于这些商店的信息。


    ## 将 iPad 连接到电脑


    当您在电脑或 iPad 上创建了 iTunes 账户后，您应该将 iPad 连接到电脑进行备份、检查软件更新以及执行初始数据同步。如果您尚未从包装盒中取出
    iPad，请遵循以下步骤：


    1.  从包装盒中取出 iPad，并撕掉出厂包装膜。同时拆开附带的基座接口转 USB 连接线。

    2.  找到 USB 连接线的两端。一端较薄，并标有标准的三叉 USB 符号。另一端较宽，并标有一个内含一条直线的矩形。

    3.  将连接线的宽头连接到 iPad 底部的基座接口端口。将薄头连接到电脑上空闲的 USB 2.0 端口。iTunes 将启动，您的 iPad 会发出轻柔的提示音。


    如果您的 iPad 没有自动开机并显示白色 Apple 标志或“连接到 iTunes”消息，请按住`Sleep/Wake`按钮。让主屏幕朝向您，该按钮位于
    iPad 的右上角。几秒钟后，iPad 应会唤醒并在开机时显示白色 Apple 标志。如果 iPad 没有响应，也未显示白色 Apple 标志或“连接到 iTunes”消息，请联系您购买设备的商店或致电
    Apple 支持。'
- fmt: '### Syncing Your New iPad


    Now you’re ready to synchronize your iPad with your computer. This allows you
    to initialize your iPad’s music, movies, podcasts, e-mail accounts, calendar,
    bookmarks, and so forth.


    After connecting to your computer, iPad appears in the iTunes source list (the
    left column on the iTunes screen on your computer). If you own and use an iPhone,
    you’re already familiar with iPad syncing. If not, here’s a quick overview.


    On your computer, click your iPad’s name in the source list to open its preferences
    in the main iTunes window. The tabs along the top of the window allow you to set
    each of the options associated with your iPad.


    **TIP:** In iTunes on your Mac or PC, click your iPad’s name a second time to
    open a text edit field that allows you to edit the name. You can name your iPad
    more creatively than "John Appleseed’s iPad." Perhaps you could name your iPad
    "Bill Gates" for the laughs.


    The Summary tab (see [Figure 1–5](#Chapter01.html#fig_1_5)) displays your iPad
    overview, including the iPad’s name, capacity, currently installed firmware version,
    serial number, and phone number. From this page, you can check for firmware updates
    and restore your iPad to a pristine factory-installed condition.


    ![images](images/0105.jpg)


    **Figure 1–5.** *iTunes allows you to manage the content loaded onto and synchronized
    with your iPad. Each tab offers a variety of controls, allowing you to choose
    what information gets loaded onto your iPad at each sync.*


    The Info tab allows you to select which contacts, calendars, mail accounts, bookmarks,
    and notes are synced to your iPad. Select those items you want to sync by clicking
    their check boxes, and click `Apply`. You can sync any POP3, Exchange, or IMAP
    e-mail account.


    The Apps tab shows you the applications that have been installed on your iPad
    and enables you to organize what apps are on specific home screens. This tab is
    also used to share files between iPad apps and your computer.


    The Music tab specifies which songs, playlists, and music videos you want to store
    on your iPad. If you own a large music library, you’ll want to select just your
    favorite playlists or create smart playlists (covered later in this book) to establish
    an ever-changing collection. The Movies tab is similar to the Music tab but allows
    you to determine what movies you want to store on your iPad. Since movie files
    can be extremely large, you may want to move only a few at a time to your iPad
    for viewing.


    TV fans who want to watch their favorite shows on iPad use the TV Shows tab to
    synchronize shows that were purchased in the iTunes Store. If your tastes lean
    more toward audio content, the Podcasts tab specifies what episodes of your podcast
    subscriptions are synced to your iPad. Students of all ages who use iTunes U courseware
    to further their knowledge can use the iTunes U tab to synchronize lectures and
    educational movies to iPads.


    The iPad is the ultimate electronic book reader, and the Books tab is helpful
    when you want to sync e-books or audiobooks between your computer and iPad.


    The Photos tab lets you synchronize your iPad photo collection with iPhoto. Since
    you can import photos directly from a digital camera to your iPad with the Camera
    Connection Kit, the Photos tab is an important tool for moving photos to your
    computer for backup purposes.


    For any of the tabs, make your selections, and click `Apply`. The Capacity bar
    at the bottom of the screen monitors how much space remains on your device.


    ### Accessorizing Your iPad


    If you purchase your iPad in an Apple Store, your Apple sales associate will show
    you many accessories that are available for it. These accessories are from Apple
    and third-party sources, and they provide your iPad with protection and added
    functionality.


    Apple sells iPad docks to make charging and syncing your iPad a snap. The $29
    iPad Dock and iPad 2 Dock support your iPad in an upright position and work with
    other accessories and optional audio cables. For the original iPad, text entry
    into iPad apps is enhanced with the iPad Keyboard Dock ($69), which charges the
    iPad as you type.


    For protection of the iPad 2, Apple provides the iPad Smart Cover ($29; [Figure
    1–6](#Chapter01.html#fig_1_6)), which can also be folded into a variety of positions
    for supporting the iPad 2 on flat surfaces. The colorful Smart Cover attaches
    to the iPad 2 magnetically, and automatically turns the iPad’s display on when
    opened or off when closed.


    ![images](images/0106.jpg)


    **Figure 1–6.** *Available in a rainbow of colors, the iPad 2 Smart Cover protects
    the iPad’s display while adding very little weight or thickness.*


    Photographers will want to buy the iPad Camera Connection Kit ($29; [Figure 1–7](#Chapter01.html#fig_1_7)),
    which includes two adapters—one for connecting a camera through a USB 2.0 cable,
    the other for reading SD memory cards. The USB adapter can also be used to connect
    USB headsets and keyboards to the iPad.


    ![images](images/0107.jpg)


    **Figure 1–7.** *The iPad Camera Connection Kit includes two adapters. The one
    on the left connects to a standard USB cable for direct connection to a digital
    camera, while the adapter on the right can be used to read or write SD memory
    cards.*


    Since you might want to show slide shows or Keynote presentations from an iPad,
    Apple sells the iPad Dock Connector to VGA Adapter ($29). The VGA end of the adapter
    can be connected to external monitors, some TVs, and PC projectors. On the iPad
    2, whatever is on the screen can be mirrored to an external display, while the
    original iPad is limited to displaying only apps that have been specifically written
    to provide video out capabilities.


    The Apple Digital AV Adapter ($39) is perfect for putting slides, movies, photos,
    and anything else visible on your iPad onto your HDTV. This adapter provides a
    standard HDMI connector as well as a dock connector port for charging your iPad
    while it is connected to your display.


    The Apple Component AV Cable ($39) and Composite AV Cable ($39) also work with
    the iPad, providing two more methods of linking external monitors and projectors
    to the device. The same application limitations apply with these cables as well.


    Finally, the Apple Wireless Keyboard ($69) and most other Bluetooth keyboards
    are iPad-compatible, providing an alternative way of entering text into iPad applications.


    ### Summary


    In this chapter, you learned how to select and purchase your iPad. You discovered
    what’s involved in setting up your iPad before using it. To wind things up, here
    is a quick overview of some key points from this chapter:


    - Your iPad choices come down to whether you want 3G connectivity, how much storage
    space you want, and (in the United States) which mobile carrier network you wish
    to use. You can also decide whether you need a new iPad, or can get by with a
    used device to better fit your budget.

    - There are several venues for purchasing your iPad, but Apple Stores are our
    recommendation.

    - Make sure your computer is compatible with iPad before you buy.

    - Consider adding AppleCare to your iPad purchase for an additional year’s coverage
    against hardware repairs.

    - iPad technical support is free for 90 days, but you can call Apple’s experts
    for up to two years with the purchase of AppleCare.

    - Consider insuring your iPad against loss and damage by purchasing a policy rider
    from your insurance company.


    ## Chapter 2'
