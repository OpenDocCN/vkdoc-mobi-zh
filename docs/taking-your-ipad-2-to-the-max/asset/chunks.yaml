    ### 购买并安装适用于 iPad 的 `iWork`


    与 iPad 内置的许多应用不同，适用于 iPad 的 `iWork` 应用需要购买并在你的 iPad 上自行安装。在第 8 章中，我们向你介绍了`App
    Store`应用以及它如何协助你在 iPad 上浏览、购买和安装 iPad 软件。


    如果你不需要某些功能，就无需购买全部三个应用。例如，如果你只需要一个优秀的文字处理应用，并且不需要处理电子表格或演示文稿的工作，那么你只需购买`Pages`。演示者可能只想购买`Keynote`，而预算管理者则可以只入手`Numbers`。


    以下是你可以选择为每个应用做的几件事。


    `Pages`：


    *   书写信件

    *   创建或更新简历

    *   撰写项目提案

    *   写学期论文

    *   制作创意海报、贺卡、邀请函或传单


    `Numbers`：


    *   创建清单

    *   比较抵押贷款或其他贷款方案

    *   制定预算

    *   创建费用报告和发票

    *   记录商务及个人汽车里程

    *   根据数据绘制图表


    `Keynote`：


    *   制作商务演示文稿

    *   学生和教师创建课堂演示文稿

    *   制作极具吸引力的个人幻灯片

    *   将 iPad 用作演讲提词器


    启动`App Store`应用，然后在`App Store`右上角的搜索框中输入`pages`一词。轻点键盘上的`Search`按钮，列表中将显示名称中包含`pages`的应用。在
    iPad 应用下，找到`Pages`（归类在“生产力”类别中），然后轻点价格按钮。该按钮会变成绿色的`Install App`按钮。轻点它，系统会要求你输入`Apple
    ID`。`Pages`会下载到你的 iPad 并自动完成安装。`Numbers`和`Keynote`的安装流程与此相同。


    这些应用体积较大——每个都超过 20 MB——因此请确保在安装前将 iPad 连接到 Wi-Fi 网络。如果在连接到 3G 网络时尝试安装任何`iWork`应用，系统会提示你连接到
    Wi-Fi 网络后再安装，或者通过电脑上的`iTunes`安装。我们的建议是通过电脑上的`iTunes`购买并安装适用于 iPad 的`iWork`应用。


    ### `Pages`


    `Pages`不仅仅是一个 iPad 文字处理应用——它还能用于创建包含图形、表格、图表和多种文本样式的复杂页面布局。Mac 版`Pages`在其发展过程中逐渐演变为强大的写作和桌面出版工具，而
    iPad 版则天生具备了许多相同的功能。该应用针对 iPad 的触摸界面进行了优化，使用起来令人愉悦。


    在本节中，我们将带你熟悉`Pages`的用户界面及其部分功能。


    #### 创建新文稿


    首次启动`Pages`时，你会看到一个标题为`轻点开始使用 Pages`的文稿。它不仅仅是一组漂亮的页面，更是一个交互式教程，涵盖了许多应用功能。它会引导你使用常见的
    iPad 界面手势来移动、旋转、缩放和删除图像，重新设置文本样式，以及向文稿中添加对象。


    `我的文稿`页面是你进入`Pages`后首先看到的内容，它看起来像一块灰色布料，上面整齐排列着你的所有文稿。要打开之前创建的文稿，只需轻点它一次。


    如果你想从一张白纸或某个模板开始，可以轻点`Pages`窗口左上角的`新建文稿`按钮，或者轻点窗口底部中间的加号（`+`）图标。在`我的文稿`窗口中，如果轻点某个现有文稿下方的加号，你可以选择从头创建新文稿，或者复制现有文稿。


    如果你轻点任一`新建文稿`按钮，首先会看到一个`选择模板`屏幕，上面列出了许多有用的文稿类型（见图 14–1）。你可以选择从一张完全空白的页面开始，也可以使用设计精美的文稿模板。模板在你希望快速创建一份专业外观的文稿，或者遇到写作瓶颈需要一些点子来激发想象力时非常有用。


    ![images](img/1401.jpg)


    **图 14–1.** *在 iPad 版`Pages`中创建新文稿时，可以选择从空白页开始，也可以使用专业设计的模板。*


    为了本书的讲解目的，我们将从空白页开始。轻点`选择模板`窗口左上角的空白页，就可以开始写作了。在开始之前，我们会先解释一下`Pages`窗口顶部的内容，如图
    14–2 所示。


    ![images](img/1402.jpg)


    **图 14–2.** *`Pages`样式标尺*


    #### `Pages`样式标尺


    苹果将图 14–2 中所示的类似标尺的用户界面元素命名为`样式标尺`，因为它既提供了为文本设置样式的方法，又提供了用于对齐页面元素的标尺。你可以通过轻点右上角带圆圈的×来让`样式标尺`从页面上消失，也可以通过双击屏幕顶部几乎看不见的标尺边缘来让它重新出现。


    `样式标尺`与其正上方的工具栏不同。工具栏包含一个返回`我的文稿`的按钮、一个`撤销`按钮（用于恢复文稿的先前版本），以及右侧一组按钮（稍后我们会介绍）。与`样式标尺`不同，工具栏始终可见，除非你切换到全屏模式（本章后续会描述）。全屏模式下，除文稿本身外，所有元素都会被隐藏。


    标尺上有许多按钮。最左边的按钮（标有`正文`）用于将样式应用到当前选中的段落。要应用样式，请双击段落中的任意文本，然后轻点`段落样式`按钮。会出现一个滚动的弹出式菜单，其中列出了常见的段落样式——标题、副标题、不同大小的标题、小标题、正文、项目符号文本、说明文字、页眉和页脚等。选择其中一种样式会将其应用到整个文本段落。


    ##### 撤销/重做


    你刚刚不小心对一段文字应用了错误的样式？没问题。轻点窗口顶部工具栏中的`撤销`按钮，文本就会恢复为原来的样式。如果后来你确定确实想进行某项更改，请再次轻点`撤销`按钮。可能会出现一个弹出菜单，允许你选择重做一个操作。与许多其他
    iPad 应用不同，`Pages`不支持通过左右摇晃 iPad 来撤销或重做。


    ##### 常用样式


    接下来的一组按钮——`B`、`I`和`U`——用于将常用样式应用到字符。`B`代表粗体，`I`代表斜体，`U`代表下划线。要选择一个词，请双击它。当你选中一个词时，它会以浅蓝色背景高亮显示，并出现一对选择手柄，分别位于两端（见图
    14–3）。


    ![images](img/1403.jpg)


    **图 14–3.** *在`Pages`文稿中双击任意单词会将其选中，并在两侧添加选择手柄以扩展选择范围，同时显示一个操作弹出菜单。*


    通过向左或向右拖动手柄来扩展你的选择范围，或者通过三次轻点来选中整个段落。同时会弹出一个菜单，显示可应用于文本的操作。最常用的操作——`剪切`、`复制`和`粘贴`——会出现在弹出菜单中。轻点`更多`按钮会提供更多操作选项——`拷贝样式`、`替换`和`定义`。

