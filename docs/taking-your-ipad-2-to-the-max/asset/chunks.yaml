    at the top. Tap it and you''ll be taken to all the pages you''ve visited in Safari
    since you last cleared the history. To clear the history, tap the Clear History
    button, and you''ll be asked to confirm. Tap the red Clear History button to confirm
    ([Figure 6–16](#Chapter06.html#fig_6_16)).


    You''ll also see a folder labeled Bookmarks Bar. Any bookmarks placed in this
    folder will appear in the Bookmarks bar that shows below the bottom of Safari''s
    Navigation bar when you are entering a URL (shown earlier in [Figure 6–5](#Chapter06.html#fig_6_5)).


    ![images](images/0616.jpg)


    **Figure 6–16.** *Safari''s History folders and the Clear History deletion confirmation*


    **NOTE:** The history of your desktop browser and iPad''s Safari browsers do not
    sync. Any pages you navigate to on your iPad will not show up on your desktop''s
    browsing history, and vice versa.


    #### Editing Bookmarks


    As [Figure 6–15](#Chapter06.html#fig_6_15) shows, an Edit button appears at the
    top-right of the bookmark''s pop-up field. Tap this to enter Edit mode (see [Figure
    6–17](#Chapter06.html#fig_6_17)).


    ![images](images/0617.jpg)


    **Figure 6–17.** *Safari contains a built-in bookmark-management system that allows
    you to edit and reorder your bookmarks.*


    Edit mode allows you to manage your bookmarks on your iPad just as you would on
    your personal computer:


    *   *Delete bookmarks*: Tap the red Delete circle icon to the left of a bookmark
    to delete it. Tap Delete to confirm or tap elsewhere on the screen to cancel.

    *   *Reorder bookmarks*: Use the gray grab handles (the three lines on the far
    right) to move folders and bookmarks into new positions. Grab, drag, and then
    release.

    *   *Edit names*: Tap the gray Reveal arrow (the sideways V symbol to the right
    of each name) to open the Edit Bookmark or Edit Folder screen. Use the keyboard
    to make your changes and tap the Back button to return to the Bookmarks editor.

    *   *Re-parent items*: You can move items from one folder to another by tapping
    the parent folder field below the Name edit field. Select a folder, and then tap
    the Back button to return to the Bookmarks editor. Unfortunately, you don''t get
    the same wild animation that you do in Mail when you send an item to a new folder,
    but at least it works reliably.

    *   *Add folders*: Tap New Folder to create a folder in the currently displayed
    bookmarks. The iPad automatically opens the Edit Folder screen. Here, you can
    edit the name and, if needed, re-parent your new folder. Tap Back to return to
    the editor.

    *   *Finish*: Return to the top-level Bookmarks list (tap the Back button until
    you reach it), and then tap Done. This closes the editor and returns to your bookmarks
    list.'
