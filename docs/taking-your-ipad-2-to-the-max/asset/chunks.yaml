  trans: '

    ### 弹球 HD


    `弹球 HD`（参见图 16-1）让人回想起游戏存在于物理世界三维空间、而非电脑屏幕上的时代。不过，你会很快忘记自己并非在真实的弹球机上游戏，因为`弹球 HD`的真实感令人惊叹。你可以从三张弹球台中选择，包括狂野西部、丛林和深海。这款应用仅售
    2.99 美元，物超所值。


    ![images](img/1601.jpg)


    **图 16-1.** *`弹球 HD`*


    ### 空气曲棍球


    `空气曲棍球`（参见图 16-2）是另一款让人回想起非数字游戏时代的 iPad 游戏。这款游戏酷炫之处在于，你可以和好友在同一台 iPad 上对战。由于 iPad
    是一款多点触控设备，它能够识别多种输入，而且不仅仅识别你的手指。启动应用，选择一方，然后向你的朋友展示谁才是空气冰球台上的主宰。最棒的是，它仅售 0.99
    美元。


    ![images](img/1602.jpg)


    **图 16-2.** *`空气曲棍球`*


    ### i 鱼塘 HD


    这并非传统意义上的游戏。哦，你与它的互动方式与任何游戏无异，但即使你不去触碰它，`i 鱼塘 HD`（参见图 16-3）也能带来乐趣。这款游戏在你的 iPad
    屏幕上呈现一个虚拟鱼塘。轻点水面，看水波荡漾。看着五彩斑斓的鱼儿从你手指间匆忙游开，又慢慢回到平静的池塘中。你可以随心所欲地添加蜻蜓、青蛙和睡莲；然后坐下来，在
    iPad 上享受大自然的宁静。售价 2.99 美元。


    ![images](img/1603.jpg)


    **图 16-3.** *`i 鱼塘 HD`*


    ### 饥饿鲨鱼三部曲


    也许是因为我们对鲨鱼怀有莫名的恐惧，才如此喜爱《饥饿鲨鱼三部曲》。它让我们能够控制我们恐惧的事物。在《饥饿鲨鱼三部曲》（参见图 16-4）中，你扮演鲨鱼，你的任务几乎模拟了鲨鱼的真实生活：唯一的目标就是吃，不停地吃。虽然单一目标看似单调，但事实绝非如此。`饥饿鲨鱼`的世界充满了可供探索的事物。当你一路吞食数十种鱼类、企鹅、潜水员和海鸥时，你会发现海底环境是如此丰富多彩。这里有隐秘的洞穴、水雷和大量秘密物品。作为鲨鱼，你吃得越多，长得越大，也变得越强壮，当你遇到任何
    iPad 游戏中最棒的 BOSS——巨型螃蟹时，这就会派上用场。进食还能让你获得积分，用于解锁游戏中的其他`饥饿鲨鱼`章节或关卡。售价 4.99 美元。


    ![images](img/1604.jpg)


    **图 16-4.** *`饥饿鲨鱼三部曲`*


    ### 镜之边缘


    大型游戏开发商正纷纷为 iPad 推出游戏。全球最大的游戏开发商之一，美国艺电公司，已经推出了一系列游戏。《镜之边缘》（参见图 16-5）最初在 Xbox
    360 和 PlayStation 3 上发行，而美国艺电公司已成功将其移植到 iPad 上，这充分展示了 iPad 作为游戏设备的强大性能。你扮演“信使”菲丝，她必须将秘密情报送达，避开极权警察的追踪。只需使用你的手指和
    iPad 内置的倾斜传感器，你就能操控菲丝在她的世界中翻转、滑行、跳跃和奔跑。这是一款有趣的游戏，它只是未来你可以在 iPad 上看到的动作游戏类型的一个预览。售价
    9.99 美元。


    ![images](img/1605.jpg)


    **图 16-5.** *美国艺电公司的`镜之边缘`*


    ## iPad 作为新闻和天气中心


    iPad 是一款了不起的设备，它将互联网置于你的掌心。你随时可以打开 Safari 浏览器，查看世界上任何新闻网站。然而，网站不同于实体报纸。它们有不同的版式，你与它们的互动方式也不同。许多主流报纸都为
    iPad 制作了应用，使你能够以更接近实体报纸的熟悉格式浏览新闻。此外，还有专门为 iPad 设计的天气应用，它们比你在网上查询天气预报更美观、更快捷。这里我们将介绍一些适用于
    iPad 的新闻和天气应用。


    ### 新闻应用


    似乎每天都有新的新闻应用加入 App Store。我们从众多的应用中筛选出以下四款我们最喜爱的推荐给你。当然，还有很多其他应用——一些也非常不错——所以你也可以浏览
    App Store，寻找其他能将最新头条新闻发送到你 iPad 上的应用。


    #### 雅虎财经的 MarketDash


    雅虎财经是网络上最受欢迎的财经网站之一。虽然花了一些时间，但雅虎财经最终以`MarketDash`（参见图 16-6）的形式发布了 iPad 应用。`MarketDash`以优雅且交互的方式为你呈现雅虎财经上的所有信息，让你能够及时了解全球金融市场的最新动态。它提供新闻、股票报价、价格图表等内容。你可以创建股票投资组合列表进行跟踪，监控市场货币，甚至可以用你的雅虎
    ID 登录，自动同步你在网上跟踪的所有投资组合。雅虎财经的`MarketDash`在 App Store 中免费提供。


    ![images](img/1606.jpg)


    **图 16-6.** *雅虎财经的`MarketDash`*


    #### iPad 版纽约时报


    《纽约时报》常被称为“记录性报纸”，因为它拥有悠久的历史，报道“所有适合印制的新闻”（自 1897 年以来的口号）。当你浏览`iPad 版纽约时报`应用（参见图
    16-7）时，你会感觉仿佛手里拿着实体报纸。点击一篇文章，它将以典型的报纸专栏视图显示。甚至连文章所在的“纸张”看起来都像是真正的《纽约时报》用纸。


    `iPad 版纽约时报`提供来自报纸每个版块的最新新闻、观点和专题。你可以浏览文章的图片，甚至观看文章内嵌的视频。最棒的是，该应用会将文章本地存储在 iPad
    上，因此一旦你下载了内容，无需连接网络即可阅读。这款应用在 App Store 中是免费的，虽然部分内容是免费的，但如果你想访问报纸的所有版块，纽约时报确实会收取订阅费。


    ![images](img/1607.jpg)


    **图 16-7.** *`iPad 版纽约时报`*


    #### BBC 新闻


    `BBC 新闻`应用（参见图 16-8）将 BBC 网站和新闻频道中的精华整合到一款设计精美的 iPad 应用中。你可以浏览头条新闻、科技、商业、科学与环境、地区等超过十几个类别的最新消息。只需轻点按钮，即可在应用内收听
    BBC 广播直播；观看简短的新闻视频片段；通过电子邮件、Facebook 和 Twitter 轻松分享文章；甚至还可以阅读包括俄语、中文、阿拉伯语和葡萄牙语在内的其他语言版本的新闻文章。该应用在
    App Store 中免费提供。


    ![images](img/1608.jpg)


    **图 16-8.** *`BBC 新闻`*

