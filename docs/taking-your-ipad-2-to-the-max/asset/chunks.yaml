    ```markdown

    #### 调整字体、字号与页面颜色


    根据您的视力情况，您可能希望调整文本的字号。点击`字体`按钮（显示为一大一小并排的 *A*），即可调出字体菜单（见图 9–16）。点击小写 *A* 可减小字号，点击大写
    *A* 可增大字号。增大或减小字号将分别导致每页显示的字数变少或变多。


    ![images](img/0916.jpg)


    **图 9–16.** *字体面板*


    在字号控制按钮下方，您会看到一个标有`字体`的按钮。点击此按钮可从六种字体中选择（见图 9–17）。不同的字体会略微影响屏幕上显示的字数。为什么要更换字体？有些人阅读不同字体时会更轻松，尤其是衬线字体或无衬线字体。无衬线字体类似于本书正文的字体：字母上没有多余的短横线。衬线字体则像
    Times New Roman 那样。


    在`字体`下方，您会看到`棕褐色`按钮。点击可开启或关闭此功能。开启时，整本书会呈现黄褐色调，类似于旧纸质书页随时间推移而泛黄的颜色。有些人认为在棕褐色屏幕下阅读对眼睛更友好，因为您不用盯着刺眼的亮白色背景。


    ![images](img/0917.jpg)


    **图 9–17.** *可供选择的字体*


    #### 搜索文本


    您只需点击看起来像放大镜的`搜索`图标，即可在正在阅读的书籍中搜索任何单词或文本片段。此时会弹出一个搜索框和键盘。输入任意搜索词，您将看到按页码顺序排列的结果列表（见图
    9–18）。点击任意结果即可直接跳转到该页面。在该页面上，您的搜索词会以棕黄色气泡高亮显示。


    ![images](img/0918.jpg)


    **图 9–18.** *搜索面板允许您进行文本内搜索，并可快速链接到 Google 和维基百科的网络搜索。*


    您还可以对单词或短语执行 Google 或维基百科搜索。在搜索结果下方，您会看到`搜索 Google`按钮和`搜索 Wikipedia`按钮。点击任一按钮将离开
    iBooks 应用，跳转至 Safari 浏览器，并显示相应的 Google 搜索结果或维基百科条目页面。


    #### 添加书签


    点击`书签`图标会在页面顶部放置一个红色书签（见图 9–19）。添加书签相当于为该页面创建了一个快捷方式，并存储在目录/书签页面中，方便您日后快速访问。在
    iBooks 中，书签功能与实体书中的书签有所不同。在 iBooks 应用中，书签功能更类似于在实体书上折角，因为您不限于只使用一个书签。您可以为任意多个页面添加书签。要取消书签，请点击红色的书签丝带。


    ![images](img/0919.jpg)


    **图 9–19.** *点击书签按钮（左）可放置书签（右）。*


    #### 与文本互动


    您与书籍文本的交互不仅限于搜索。接下来我们将展示电子书优于传统纸质书的原因之一。不过，纸质书在许多方面仍胜过电子书。关于这两种格式的文章请参见：[`www.tuaw.com/2010/05/08/a-tale-of-two-mediums-despite-the-ipad-traditional-books-aren/`](http://www.tuaw.com/2010/05/08/a-tale-of-two-mediums-despite-the-ipad-traditional-books-aren/)。纸质书相对于电子书的一个优势是价格相对便宜（尤其是购买二手书时）。此外，您不必担心带它们去公园或海滩。沙子和泥土不会像影响
    iPad 这类电子设备一样影响平装书的可用性。此外，在公共场合阅读时，纸质书作为盗窃目标的风险远低于苹果的最新科技产品。


    在任何页面中，用手指长按屏幕，页面上会弹出一个放大镜图标。要移动它，只需拖动手指即可。放大镜图标下方，一个单词会以蓝色高亮显示。找到您想要的单词后，将手指从屏幕上移开。放大镜图标消失，该单词两侧会出现抓取条。拖动抓取条可选择多个单词，例如一个句子或整个段落。


    确认选择后，您会看到黑色弹出菜单中提供了五个文本选择工具（见图 9–20）：


    ![images](img/0920.jpg)


    **图 9–20.** *文本选择工具*


    *   *拷贝*：选中后可复制文本，以便粘贴到其他应用或搜索框中。注意，拷贝功能仅适用于 PDF 和无 DRM（数字版权管理）的电子书。由于 iBookstore
    购买的书有复制保护软件，因此无法从中拷贝文本。

    *   *词典*：这是我们在 iBooks 应用中最喜欢的功能，因为它展示了电子书相对于传统纸质书的一项重要优势——易用性。阅读平装书时，如果不认识某个单词，需要放下书本去查词典。在
    iPad 上，如果不认识书中的某个单词，只需选中它并点击`词典`按钮。页面上会弹出一个窗口，显示该单词的定义（见图 9–21）。然后点击页面其他区域即可关闭词典窗口，继续阅读书籍。简单又方便。


    ![images](img/0921.jpg)


    **图 9–21.** *词典面板*


    *   *高亮*：点击高亮会如同用荧光笔标记一样为文本做标记（见图 9–22）。苹果在这方面做得非常出色，因为高亮效果看起来与纸质书上的完全一致。


    ![images](img/0922.jpg)


    **图 9–22.** *高亮文本。高亮文本后，它会自动添加到书签页面。*


    如果您点击彩色高亮，会弹出另一个菜单，允许您更改高亮颜色、为高亮文本添加笔记，或移除高亮（见图 9–23）。可选颜色包括黄色、绿色、蓝色、粉色和紫色。您选择高亮的任何新文本都将使用上次选择的颜色。您高亮的任何文本都会显示在书签页面的列表中（我们稍后会讲到）。


    ![images](img/0923.jpg)


    **图 9–23.** *高亮文本的选项*


    *   *笔记*：点击笔记将自动高亮所选文本，然后一个便签样式的笔记会飞入屏幕，同时屏幕键盘会弹出（见图 9–24）。您可以在笔记中输入任意长度的文本，并用手指上下滚动。笔记的颜色取决于您为高亮选择的颜色。点击屏幕任意位置可关闭笔记。您会在页面边缘看到一个小笔记图标，上面显示笔记的创建日期（见图
    9–24）。点击笔记图标可编辑笔记。点击文本的高亮部分并选择`移除笔记`即可删除笔记。


    ![images](img/0924.jpg)


    **图 9–24.** *创建笔记以及创建后页面边缘的笔记图标*


    *   *搜索*：点击搜索将在页面右上角打开搜索窗口（看起来像放大镜）。您选中的文本会自动填入搜索框作为搜索查询。

