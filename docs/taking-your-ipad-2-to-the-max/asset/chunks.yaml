    text, tap inside the Google search field and enter the word or words on the web
    page that you are looking for. Tap where it says “Find”; next, tap the text you
    entered in the bottom of the search suggestion pop-up field (see [Figure 6–10](#Chapter06.html#fig_6_10)).


    ![images](images/0610.jpg)


    **Figure 6–10.** *Searching for text on a web page*


    After you tap the Find command, Safari will zoom into the section of the web page
    with the first occurrence of the text you are looking for and highlight it in
    yellow (see [Figure 6–11](#Chapter06.html#fig_6_11)). Then, using the Search text
    bar at the bottom of the page, you can tap the Next button to find the next instance
    of the text on the web page. You can also refine your keyword search using the
    search field in the Search text bar at the bottom of the page.


    ![images](images/0611.jpg)


    **Figure 6–11.** *Text search results displayed in Safari*


    #### Following Links


    Hypertext links are used throughout the World Wide Web. Text links are marked
    with underlines and usually involve a color change from the main text. Image links
    are subtler, but they can also move you to a new location.


    Tap these links to navigate to new web pages or, for certain special links, to
    open a new e-mail or view a map. When a link leads to an audio or video file that
    the iPad understands, it will play back that file. Special links include `mailto:`(to
    create Mail messages), `tel:`(for phone calls, if you have Skype installed on
    your iPad), and automatic recognition of Google Maps URLs (which will take you
    to the iPad''s Maps app).


    **NOTE:** Supported audio formats include `AAC`, `M4A`, `M4B`, `M4P`, `MP3`, `WAV`,
    and `AIFF`. Video formats include `h.264` and `MPEG-4`.


    You have other options than simply tapping a link to get to a new page. To preview
    a link''s address, touch and hold the link for a second or two. An address pop-up
    field will appear next to the link (see [Figure 6–12](#Chapter06.html#fig_6_12)).
    Below the link''s full address, you''ll see three buttons, which behave as follows:


    *   *The Open button*: Takes you to the link as if you simply tapped it instead
    of touching and holding it.

    *   *The Open inNew Page button*: Takes you to the link in a new Safari page.

    *   *The Copy button*: Copies the link so you can paste it later into an e-mail
    message or URL field.


    To cancel any of these options and stay on your current page, simply tap your
    finger anywhere on the screen.


    ![images](images/0612.jpg)


    **Figure 6–12.** *Options when touching and holding a link: Open, Open in New
    Page, and Copy*


    **TIP:** To detect image links on the screen, tap and hold an image. If it turns
    gray, it''s a link. If it remains at the same brightness, it''s just a plain image.
    When you tap and hold a linked picture, you''ll have the same options as you do
    with a text link. You''ll also have one additional option: Save Image. This will
    save the image to your Photos app on the iPad.


    #### Changing Orientation


    One of the iPad''s standout features is its flexible orientation support. When
    you turn your unit on its side, the iPad flips its display to match, as you can
    see in [Figure 6–11](#Chapter06.html#fig_6_11). A built-in sensor detects the
    iPad''s tilt and adjusts the display to Landscape orientation. Tilt back to vertical,
    and the iPad returns to Portrait orientation. It takes just a second for the iPad
    to detect the orientation change and to update the display. Don''t forget you
    can always lock your screen''s orientation by sliding the screen Orientation Lock
    button on the side of the iPad; however, you should sure you''ve got the button
    set to lock the orientation and not to mute the iPad. To do this, go to Settings
    ![images](images/U001.jpg) General and then set the Use Side Switch to: option
    to Lock Rotation.


    ![images](images/0613.jpg)


    **Figure 6–13.** *Safari can display web pages using both Portrait and Landscape
    orientation.*


    The iPad''s Landscape view offers a significantly wider display. This is particularly
    good for side-to-side tasks such as reading book-width text. The wider screen
    allows you to use bigger fonts and view wider columns without scrolling sideways.
    The Portrait view provides a longer presentation. This is great for reading web
    content with more narrow columns, like news feeds. You don''t have to scroll quite
    as much in Portrait view as you do in Landscape view.


    Whether in Landscape or Portrait view, Safari features work the same, including
    the same buttons in the same positions. In Landscape view, you enter text using
    a wider, sideways keyboard.'
  trans: '

    ### 输入文本


    很多时候，您需要在网页上填写用户名或密码才能登录，或者可能遇到一个要求填写其他表单的页面。要编辑任何文本输入框的内容，只需轻点它，Safari 便会打开一个新的文本输入键盘。


    虽然这个键盘表面上与图 6-5 中显示的键盘相似，但它也存在一些差异。这些差异包括键盘顶部的`上一个`和`下一个`按钮，它们用于搜索网页上的其他文本字段（参见图
    6-8）。这些按钮让您无需经历繁琐的“轻点/编辑/完成”循环即可填写表单。只需输入文本，轻点`下一个`，再输入更多文本，依此类推。


    ![images](img/0608.jpg)


    **图 6-8.** *网页表单的文本输入键盘。请注意顶部的`上一个`、`下一个`和`自动填充`按钮。*


    与 Safari 文本输入功能的另一个区别是`自动填充`按钮。轻点`自动填充`按钮，将自动使用您通讯录中个人联系卡片的信息填充文本字段。它还会输入已存储的用户名和密码。我们将在本章后面讨论如何设置`自动填充`功能。


    输入完所有文本后，要提交表单，请轻点`前往`或`搜索`。这类似于在常规电脑上按下`回车`键。


    ### 搜索网页


    在任何 Safari 窗口中，您只需轻点一下即可进行网络搜索。如图 6-5 所示，一个谷歌搜索字段位于 URL 字段的右侧。它最初显示为浅灰色，带有一个放大镜图标。轻点此搜索字段调出键盘，输入您想要在谷歌中搜索的词语。


    搜索字段会变长，而 URL 字段会缩短，键盘上的`前往`按钮会切换为`搜索`按钮。输入一两个词，您会看到一个弹出框，其中显示谷歌根据您输入的内容建议的搜索词（参见图
    6-9）。要选择其中一个谷歌建议的词，您只需在列表中轻点它，或者直接输入完您要查找的内容并轻点键盘上的`搜索`即可。Safari 将会导航至[`www.google.com`](http://www.google.com)（无论当前显示的是哪个页面）并搜索您的查询词。


    ![images](img/0609.jpg)


    **图 6-9.** *带有建议关键词的搜索字段*


    如果您更愿意使用必应或雅虎搜索而不是谷歌搜索，您可以导航至“设置” ![images](img/U001.jpg) “Safari”来更改您的默认搜索引擎（我们将在本章后面详细介绍
    Safari 的所有设置）。


    ### 在网页中搜索文本


    Safari 还允许您在网页上搜索特定文本。要搜索文本，请轻点谷歌搜索字段内部，并输入您正在网页上查找的一个或多个词语。轻点显示为“查找”的位置；然后，轻点您在搜索建议弹出字段底部输入的文本（参见图
    6-10）。


    ![images](img/0610.jpg)


    **图 6-10.** *在网页中搜索文本*


    在您轻点`查找`命令后，Safari 会放大到网页上首次出现您所查找文本的区域，并将其以黄色高亮显示（参见图 6-11）。然后，使用页面底部的“搜索文本”栏，您可以轻点`下一个`按钮来查找网页上文本的下一个实例。您也可以使用页面底部“搜索文本”栏中的搜索字段来优化您的关键词搜索。


    ![images](img/0611.jpg)


    **图 6-11.** *Safari 中显示的文本搜索结果*


    ### 跟随链接


    超文本链接在全球广域网中无处不在。文本链接带有下划线，并且通常与正文颜色不同。图片链接则更为隐蔽，但它们同样能将您带到新位置。


    轻点这些链接可导航到新网页，或者对于某些特殊链接，可打开新邮件或查看地图。当链接指向 iPad 能够识别的音频或视频文件时，它将播放该文件。特殊链接包括`mailto:`（用于创建邮件信息）、`tel:`（用于拨打电话，前提是您在
    iPad 上安装了 Skype），以及自动识别谷歌地图 URL（这将带您进入 iPad 的“地图”应用）。


    **注意：** 支持的音频格式包括`AAC`、`M4A`、`M4B`、`M4P`、`MP3`、`WAV`和`AIFF`。视频格式包括`h.264`和`MPEG-4`。


    除了简单地轻点链接以打开新页面之外，您还有其他选择。要预览链接的地址，请触摸并按住链接一两秒钟。一个地址弹出字段将出现在链接旁边（参见图 6-12）。在链接的完整地址下方，您会看到三个按钮，其作用如下：


    *   *“打开”按钮*：其效果等同于您直接轻点该链接，而非触摸并按住。

    *   *“在新页面中打开”按钮*：在一个新的 Safari 页面中打开链接。

    *   *“拷贝”按钮*：拷贝链接，以便您稍后能将其粘贴到电子邮件或 URL 字段中。


    要取消上述任一选项并停留在当前页面，只需在屏幕任意位置轻点一下手指即可。


    ![images](img/0612.jpg)


    **图 6-12.** *触摸并按住链接时的选项：打开、在新页面中打开和拷贝*


    **提示：** 要检测屏幕上的图片链接，请轻点并按住一张图片。如果它变成灰色，则是一个链接。如果它保持原有亮度，则只是一张普通图片。当您轻点并按住一个带链接的图片时，您将获得与文本链接相同的选项。您还会多一个额外选项：`存储图像`。这会将图像保存到您
    iPad 上的“照片”应用中。


    ### 改变方向


    iPad 的突出特性之一是其灵活的方向支持。当您将设备侧放时，iPad 会随之翻转其显示内容，如图 6-11 所示。内置传感器检测 iPad 的倾斜角度，并将显示调整为横向模式。当倾斜回垂直方向时，iPad
    将恢复为纵向模式。iPad 只需一秒钟即可检测到方向变化并更新显示。别忘了，您始终可以通过滑动 iPad 侧面的屏幕方向锁定按钮来锁定屏幕方向；但是，您应确保已将该按钮设置为锁定方向，而非静音
    iPad。为此，请前往“设置” ![images](img/U001.jpg) “通用”，然后将`用侧边开关：`选项设置为`锁定旋转`。


    ![images](img/0613.jpg)


    **图 6-13.** *Safari 可以使用纵向和横向两种模式显示网页。*


    iPad 的横向视图提供明显更宽的显示区域。这对于需要横向操作的任务尤其有利，例如阅读书籍宽度的文本。更宽的屏幕允许您使用更大的字体并查看更宽的列，而无需水平滚动。纵向视图则提供更长的呈现效果，非常适合阅读内容较窄的网页，例如新闻源。在纵向视图中，您不需要像横向视图那样频繁地向上滚动。


    无论是在横向模式还是纵向模式下，Safari 的功能都相同，包括位于相同位置的相同按钮。在横向模式下，您可以使用更宽的横向键盘输入文本。

