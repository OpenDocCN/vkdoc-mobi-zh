  trans: '

    ##### 管理照片


    在显示任何图像时，你可以点击图 15-12 右下角的`管理`按钮来选择照片。`管理`按钮看起来像一个带有箭头的矩形。进入图库管理模式后，你可以点击任何照片进行选择。会出现一个勾选标记表示选择，并且显示会变成一堆照片（如图
    15-13 所示）。再次点击照片可将其从选择中移除，勾选标记也会消失。


    选择完成后（屏幕底部会列出已选项目数量），可以选择**电子邮件发送**、**复制**或**删除**该选集。选择电子邮件发送后，iPad 会撰写一封新邮件并添加你的图像。请注意，每封电子邮件最多可附加五张照片。顾名思义，复制会将图像复制到
    iPad 的系统剪贴板，以便粘贴到其他应用中。删除操作在确认后，会从图库中移除所有选定的图像。


    请注意，Photo Booth 会与你的主照片应用图库同步。当你在 Photo Booth 中拍照时，它会自动添加到主图库中。当你删除 Photo Booth
    中的图像时，它也会从主图库中删除。目前，Photo Booth 的图像不会在照片应用中收集到单独的相册中，不过苹果未来可能会朝这个方向发展。


    ##### 将 Photo Booth 照片上传到电脑


    虽然你可以通过电子邮件将照片发送给自己，但在连接电脑时直接上传照片通常更简单。在 Mac 上，你可以使用 iPhoto 的“导入”和“下载”按钮。在 Windows
    上，你需要按照所用照片应用程序附带的说明进行操作。


    ![images](img/1513.jpg)


    **图 15-13.** *点击“共享”按钮，并从屏幕底部滚动的图库中添加图像，来创建图像选集。勾选标记表示图像已被选中用于选集。*


    ### 使用 FaceTime 聊天


    本章已经介绍了 iPad 的前置和后置摄像头。这些摄像头标志着 iPad 的一次重大硬件升级。它们不仅用于拍照和录制视频：你还可以将它们用于 FaceTime，这项技术为大众带来了简单直观的视频通话功能。


    借助 iPad 上的 FaceTime 应用，你可以与任何运行 FaceTime 的电脑或设备进行视频通话。这包括第二代及更新版本的 iPad、第四代及更新版本的
    iPod touch、iPhone 4 及更新版本，以及运行 FaceTime 软件的 Mac 电脑。希望 FaceTime 很快也能登陆 Windows
    平台。


    苹果希望让 FaceTime 成为视频通话的事实标准，为此，苹果已将 FaceTime 技术制定为开放标准。这意味着其他手机制造商可以在其手机中集成该技术，这样，理想情况下，有一天你将能够通过
    iPad 与使用 Android 手机的人进行 FaceTime 视频通话。


    要使用 FaceTime，除了 iPad 之外，你还需要 Wi-Fi 互联网连接和一个 Apple ID。与你通话的人也必须拥有 Wi-Fi 连接，即使你是通过
    iPhone 4 与他们通话也是如此。在本书编写时，iPhone 4 用户只能通过 Wi-Fi 使用 FaceTime，而不能通过其服务提供商的数据网络。这很可能是服务提供商而非苹果公司施加的限制。通过蜂窝网络传输实时视频需要大量带宽——这对服务提供商来说成本高昂，同时对网络本身的负担也很大。


    #### 打开 FaceTime


    要开始使用 FaceTime，请点击主屏幕上的 FaceTime 图标。该图标看起来像一个带有蓝色镜头的白色摄像机，背景为金属质感（图 15-14）。如果这是你首次启动该应用，将会显示“FaceTime
    入门”屏幕（图 15-15）。输入你的 Apple ID 和密码，然后点击`登录`以开始使用。如果你没有 Apple ID，则需要点击`创建新帐户`。


    如果点击“了解有关 FaceTime 的更多信息”链接，Safari 浏览器将会打开，并导航至苹果网站上的 iPad FaceTime 页面。


    #### 登录


    要使用你现有的 Apple ID 登录，请填写电子邮件和密码字段，然后点击`登录`。如果你使用 iTunes Store、App Store 或 iBookstore，则你已经拥有
    Apple ID。如果你有 MobileMe 帐户，你也会有一个 Apple ID。


    如果你还没有 Apple ID，可以从 FaceTime 中设置新帐户。点击`创建新帐户`。创建屏幕（参见图 15-16）将会出现。系统会提示你输入姓名、有效的电子邮件地址（将作为你的新
    Apple ID）、密码以及其他安全信息。


    首次登录时，无论你是创建新帐户还是使用现有 ID，苹果都会通知你，其他人将使用你的电子邮件地址与你通话。系统会询问你想使用哪个电子邮件地址。你可以保留与你的
    Apple ID 相同的电子邮件地址，也可以输入另一个电子邮件地址。


    输入你想要与 FaceTime 通话关联的电子邮件地址后，点击`下一步`按钮。当苹果验证你的电子邮件地址真实性时，会短暂显示一个验证屏幕。然后会出现一个`检查邮件`按钮；点击后，系统会导航至
    iPad 邮件应用中的选定电子邮件帐户。


    查找一封主题为“请验证您 Apple ID 的联系电子邮件地址”的电子邮件。点击此邮件中的`立即验证`链接。Safari 浏览器窗口会打开，带你进入“我的
    Apple ID”页面。在那里，你需要输入你的 Apple ID 和密码来验证你的 FaceTime 电子邮件地址。


    当看到“电子邮件地址已验证”网页后，返回 FaceTime 应用。你会看到一个联系人列表，类似于 iPad 主屏幕上的“通讯录”应用。


    **注：** *苹果现在要求使用电子邮件格式的 Apple ID。如果你习惯使用较旧的帐户名格式（例如 firstname_lastname），系统会提示你为现有帐户关联一个电子邮件地址。完成后，将来你需要使用该电子邮件登录，而不是你原来的帐户名。*


    ![images](img/1514.jpg)


    **图 15-14.** *FaceTime 图标*


    ![images](img/1515.jpg)


    **图 15-15.** *“FaceTime 入门”屏幕。你通常会在左侧区域看到前置摄像头的实时预览。*


    ![images](img/1516.jpg)


    **图 15-16.** *使用此屏幕为 FaceTime 创建新的 Apple ID。随着苹果软件的发展，FaceTime 的帐户创建和授权流程可能会发生变化。*

