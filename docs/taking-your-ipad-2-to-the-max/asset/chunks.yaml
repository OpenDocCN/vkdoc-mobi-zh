    a paperback the same way it will affect an electronic device like the iPad. Also,
    while reading in public, paper books are a much lower theft target than Apple''s
    latest gadget wonder.


    While on any page, press and hold your finger to the screen, and a Spyglass icon
    will pop up on the page. To move it around, simply drag your finger. Below the
    Spyglass icon, a single word will be highlighted in blue. When you''ve found the
    word you want, remove your finger from the screen. The Spyglass icon will disappear,
    and the word will be highlighted with grab bars on either side. Drag the grab
    bars to select more than one word, such as a sentence or entire paragraph.


    With your selection confirmed, you''ll be presented with five text-selection tools
    from the black pop-up menu that appears (see [Figure 9–20](#Chapter09.html#fig_9_20)):


    ![images](images/0920.jpg)


    **Figure 9–20.** *The text-selection tools*


    *   *Copy*: Select to copy the text so you can paste it into another application
    or the search field. Note that the copy function only works with PDFs and non-DRM
    (digital management rights) e-books. You will not be able to copy text from any
    books purchased from the iBookstore due to its copy-protection software.

    *   *Dictionary*: This is our favorite feature of the iBooks app because it shows
    you one of the primary advantages—and ease-of-use features—that e-books have over
    traditional paper books. When reading a paperback book, if you don''t know a word,
    you need to put the book down and grab a dictionary. On the iPad, if you don''t
    know a word in a book, you can simply select it and tap the Dictionary button.
    A window will pop up on page with the definition of the word (see [Figure 9–21](#Chapter09.html#fig_9_21)).
    You can then tap elsewhere on the page to close the Dictionary window and get
    back to reading the book. Simple.


    ![images](images/0921.jpg)


    **Figure 9–21.** *The dictionary panel*


    *   *Highlight*: Tapping highlight will mark the text as if it''s been highlighted
    by a highlighter (see [Figure 9–22](#Chapter09.html#fig_9_22)). Apple has outdone
    itself here because the highlighting actually looks the same as it does on physical
    paper.


    ![images](images/0922.jpg)


    **Figure 9–22.** *Highlighted text. When you highlight text, it automatically
    gets added to the Bookmarks page.*


    If you tap the colored highlight, another pop-up menu appears that allows you
    to change the color of the highlight, create a note to go along with the highlighted
    text, or remove the highlight (see [Figure 9–23](#Chapter09.html#fig_9_23)). Color
    selections are yellow, green, blue, pink, and purple. Any newly selected text
    you choose to highlight will be highlighted the color of your last choosing. Any
    text you highlight will show up in a list on the Bookmarks page (which we''ll
    get to in a moment).


    ![images](images/0923.jpg)


    **Figure 9–23.** *Options for highlighted text*


    *   *Note*: Tapping Note will automatically highlight the selected text, then
    cause a Post-It style note to fly forward on the screen and the on-screen keyboard
    to appear (see [Figure 9–24](#Chapter09.html#fig_9_24)). You can type as much
    text as you want in the note and scroll up and down using your finger. The color
    of the note will be based on the color you chose for your highlight. Tap anywhere
    on the screen to close the note. You''ll see a small Note icon appear on the side
    of the page with the date you wrote the note on (see [Figure 9–24](#Chapter09.html#fig_9_24)).
    Tap the note''s icon to edit the note. Tap the text''s highlight and select Remove
    Note to delete the note.


    ![images](images/0924.jpg)


    **Figure 9–24.** *Creating a note and the Note icon in the margin of the page
    after creation*


    *   *Search*: Tapping Search will open the Search window (which looks like a magnifying
    glass) in the upper-right corner of the page. The text you selected will be automatically
    filled in as the search query.'
