- fmt: '#### More Keyboards


    Thought the iPad had only one keyboard? Think again. It has more than a dozen
    (in different languages). It also has two other keyboards you’ll frequently access
    from the primary keyboard on your screen.


    On the primary keyboard (shown earlier in [Figure 4–23](#Chapter04.html#fig_4_23)),
    you’ll notice the comma, exclamation point, question mark, and period next to
    the Shift key. Below that is the `.?123` key (in some applications it’s the `@123`
    key). Tapping the `.?123` key automatically switches your QWERTY keyboard into
    a numeric keyboard with further punctuation symbols, an “undo” option, and another
    keyboard modifier key labeled `#+=` (see [Figure 4–28](#Chapter04.html#fig_4_28)).


    **TIP:** You don’t need to use the “undo” button to undo something. You can simply
    shake your iPad. (Not too hard! You don’t want to look like you’ve lost your marbles!)
    An undo pop-up will appear on the screen giving you the option of undoing your
    last action or canceling the undo.


    ![images](images/0428.jpg)


    **Figure 4–28.** *The `.?123` keyboard*


    Tapping the `#+=` key takes you to a third keyboard with more punctuation and
    a “redo” button (see [Figure 4–29](#Chapter04.html#fig_4_29)). Redo, if the app
    supports it, will repeat the last action performed. So if you’ve copied and pasted
    text, tapping the redo button will paste the text again.


    ![images](images/0429.jpg)


    **Figure 4–29.** *The `#+=` keyboard*


    #### Getting Started


    When you’re new to the iPad, start by typing slowly. Typing with the iPad in your
    hands can be difficult because of the device’s size. For optimal typing experience,
    place the iPad on a table or prop it in your lap. At first, you may be typing
    by using your index fingers on each hand, but the more you use it, the more you’ll
    typing as you do on a physical keyboard. Whatever method you use, make sure to
    go at a pace that allows you to keep track of what you’re typing and make corrections
    as you go. Here are a few typing how-to’s:


    *Summoning the keyboard*: To open the keyboard, tap in any editable text area.


    *Dismissing the keyboard*: To make the iPad’s keyboard go away, tap the bottom-right
    key (you can see the key in Figures 4–23, 4–28, and 4–29). It’s the button with
    the picture of a keyboard and a down arrow on it. To get the keyboard back, simply
    tap in any editable text area again.


    *Accepting or rejecting automatic corrections*: The iPad displays suggested corrections
    just below the word you’re typing, as shown earlier in [Figure 4–25](#Chapter04.html#fig_4_25).
    To accept the suggestion, tap the spacebar. (You don’t need to finish typing the
    word; the iPad puts it in there for you.) To decline the correction, tap the word
    itself. The iPad will not make a substitution, even when you press the spacebar.


    *Using the spyglass*: While you’re typing, you can adjust the cursor by using
    the iPad’s built-in spyglass feature, as shown in [Figure 4–30](#Chapter04.html#fig_4_30).
    Hold your finger somewhere in the text area until the spyglass appears. Then use
    the magnified view to drag the cursor exactly where you need it.


    ![images](images/0430.jpg)


    **Figure 4–30.** *The spyglass gives you pinpoint precision for cursor placement.*


    **NOTE:** If you are going to be doing a lot of typing on your iPad (like writing
    a book, for instance), you may want to look into getting the iPad Keyboard Dock
    or the Apple Bluetooth keyboard we told you about in [Chapter 3](#Chapter03.html#ch3).
    A physical keyboard turns the iPad into more of a traditional computer. Plus,
    if you are a touch-typist, you’ll probably type much faster on a physical keyboard
    because you can feel its presses and hear its clicks. You aren’t limited to an
    Apple Bluetooth keyboard either. Several third-party keyboards work with the iPad.
    Contact the manufacturer to find out what their Bluetooth keyboards do.


    #### iPad Typing Tricks


    Once you get the hang of the keyboard, the iPad offers several other ways to make
    typing easier. This section describes a few of these handy iPad typing tricks.


    ##### Contractions


    When you want to type a contraction like *can’t* or *shouldn’t*, don’t bother
    putting in the apostrophe. The iPad is smart enough to guess that *cant* is *can’t*
    ([Figure 4–31](#Chapter04.html#fig_4_31)). Of course, if you’re typing about the
    British Thieves’ language, make sure to tap the word to decline the change from
    the noun to the contraction.


    When you’re typing in a word like *we’ll*, where the uncontracted *well* is a
    common word, add an extra *l*. The iPad corrects *welll* to *we’ll* and *shelll*
    to *she’ll*.


    ![images](images/0431.jpg)


    **Figure 4–31.** *“Cant” becomes “Can’t.”*


    **TIP:** Other contraction tricks include *itsa*, which gets corrected to *it’s*,
    and *weree*, which gets corrected to *we’re*.


    ##### Punctuation


    When at the end of a sentence, tap the punctuation key, then tap the item you
    want to use (such as a question mark or period), and finally tap the spacebar.
    The iPad is smart enough to recognize the end of a sentence and put you back in
    alphabet mode. During normal typing, you can also double-tap the spacebar to add
    a period followed by a space. This double-tap trick is controlled in your settings
    via `Settings` ![images](images/U001.jpg) `General` ![images](images/U001.jpg)
    `Keyboard` ![images](images/U001.jpg) `“.” Shortcut.`


    ##### Accents


    Tap and hold any keyboard letter to view inflected versions of that letter. For
    example, tapping and holding *e* presents the options of adding e, é, or ê (among
    other accents), as shown in [Figure 4–32](#Chapter04.html#fig_4_32). This shortcut
    makes it much easier to type foreign words. To select a non-English keyboard,
    go to `Settings` ![images](images/U001.jpg) `General` ![images](images/U001.jpg)
    `International` ![images](images/U001.jpg) `Keyboards` and choose from your iPad’s
    long list of foreign-language variations.


    ![images](images/0432.jpg)


    **Figure 4–32.** *iPad handles accents like a pro.*


    ##### Caps Lock


    To enable the Caps Lock function, go to `Settings` ![images](images/U001.jpg)
    `General` ![images](images/U001.jpg) `Keyboard Preferences`. When this function
    is enabled, you can double-tap the Shift key to toggle the lock on and off.


    ##### Word Deletion


    When you press and hold the Delete key, the iPad starts off by deleting one letter
    and then the next. But if you hold it for longer than about a line of text, it
    switches to word deletion and starts removing entire words at a time.


    ##### Autocapitalization


    Autocapitalization means the iPad automatically capitalizes the word at the beginning
    of a sentence. So, you can type *the day has begun*, and the iPad is smart enough
    to capitalize *the*, as in, *The day has begun*. This means you don’t need to
    worry about pressing the Shift key at the beginning of every sentence or even
    when you type *i*, because *i went to the park* becomes *I went to the park*.
    Enable or disable autocapitalization in `Settings` ![images](images/U001.jpg)
    `General` ![images](images/U001.jpg) `Keyboard Preferences`.'
