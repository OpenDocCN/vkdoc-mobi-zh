  trans: '

    ### 摘要


    本章通过带你了解日常会用到的各种开关、按钮和接口，向你介绍了 iPad 上可由用户操控的硬件。你还熟悉了 iPad 的保养与维护，并深入了解了可以从 Apple
    购买的 iPad 配件。


    以下是本章的一些要点：


    - 为了便于使用，iPad 的物理开关和切换键非常少。与 iPad 的大多数交互都是通过触摸屏完成的。真正的按钮和开关包括开/关/睡眠/唤醒按钮、主屏幕按钮、音量切换键以及静音/屏幕旋转开关。

    - 有许多方法可以延长 iPad 的电池续航时间，以备你长时间远离电源插座之需。在那些漫长的国际航班上，可以考虑调暗屏幕、降低音量，并关闭所有无线服务（`Wi-Fi`、`3G`
    和 `Bluetooth`）。

    - 极端温度是 iPad 的大敌。很可能，当你感到不舒服时，你的 iPad 也是如此！将其保持在你感觉舒适的温度下，就不会遇到任何问题。

    - 切勿让液体进入 iPad 的任何接口，尤其是耳机插孔。接触液体可能会导致 iPad 保修失效。

    - 如果你打算使用任何 Apple 线缆或适配器将 iPad 连接到投影仪、电视或家庭影院系统，请了解并非所有应用都支持这些线缆。


    ## 第 4 章：与 iPad 交互


    对于使用过 iPhone 或 iPod touch 的人来说，你已经对如何与 iPad 交互有了一些概念。然而，由于 iPad 的大屏幕，你会发现 iPhone
    和 iPad 之间存在一些细微差别。从未使用过 iPod touch 或 iPhone？那也没关系，因为你绝对会被 iPad 的 Multi-Touch（多点触控）屏幕所震撼。iPad
    能够响应你的触摸语言。它的“词汇表”包括*轻点*、*拖移*、*捏合*和*轻拂*。通过这些操作，你可以像使用鼠标控制个人电脑一样轻松地控制你的 iPad。而且，交互远不止拖移和轻点。你的
    iPad 提供了 Multi-Touch 技术，这意味着它可以同时识别和响应多次触摸。


    在本章中，你将发现与 iPad 交互的所有不同方式——从放大和缩小图片，到使用 iPad 内置的大键盘，再到设置辅助功能选项。让我们开始吧。


    ### 交互基础


    个人电脑有鼠标。个人数字助理（PDA）有触控笔。iPad 有你的手指。它无法与鼠标或触控笔配合使用，它需要真实的手指接触。你的 iPad 不仅能感应压力点，它还能检测从你手指传递过来的微小电荷。这意味着你可以用手指、指关节，甚至——如果你愿意的话——用鼻子来使用
    iPad，但你不能使用铅笔擦、棉签或那些 PDA 触控笔来操作。你触摸时产生的电荷使 iPad 能够同时检测并响应一个或多个接触点，也就是运用 Multi-Touch
    技术。


    **提示：** 如果你真的想尝试点新奇的，你可以用一根冷冻的热狗来代替你的手指。韩国冬天非常寒冷，人们因为要在户外使用 iPhone 而摘掉手套，导致手指冻伤。一些有进取心的韩国人发现，你可以用一根冷冻的热狗来代替手指，依然能够与
    iPhone 的触摸屏进行交互，同时还能戴着手套。理论上，冷冻的热狗在 iPad 的屏幕上应该也能用。


    #### iPad 语言


    你触摸 iPad 屏幕的方式提供了你的交流“词汇”。以下是你可以与 iPad “对话”的基本方式速览：


    - *按下主屏幕按钮*：主屏幕按钮位于触摸屏下方，带有一个白色方块标记。在任何应用中随时按下此按钮，即可返回显示应用列表的主屏幕。在主屏幕或应用内双击主屏幕按钮会调出多任务栏。我们将在本章后面部分详细讨论多任务处理。

    - *轻点*：用手指触摸屏幕并快速移开，即为轻点。轻点可以选择网页链接、激活按钮和启动应用。输入文本时，你可能想用食指轻点，或者如果更舒服的话，用拇指。

    - *双指轻点*：双指轻点意指快速连续地轻点屏幕两次。在个人电脑上双击可能很重要，但在 iPad 上双指轻点实际上用得并不多。你可以在 Safari（iPad
    自带的网页浏览器）中双指轻点来放大列，再次双指轻点缩小。在“照片”（iPad 内置的照片查看器）中，可以使用双指轻点来放大和缩小图片。

    - *双指轻点和拖移*：iPad 的 Multi-Touch 技术意味着你可以同时使用多个手指轻点屏幕。少数应用会响应双指手势。要进行此操作，分开食指和中指，同时用两根手指轻点或拖移屏幕。例如，在
    Safari 中，双指拖移可以在网页框架内滚动而不影响整个页面。

    - *长按*：有时，你需要将手指放在屏幕上并保持不动，直到有事情发生。例如，在输入文本时长按会调出放大镜，在 Safari 中则会显示 URL 预览。

    - *拖移*：将手指按在屏幕上，向任意方向移动后再抬起，即为拖移。使用拖移可以在 Safari 和 iPod（播放 iTunes 歌曲的应用）中上下滚动。有些应用在右侧提供一个索引，例如
    图 4–1 中为 iPod 应用显示的索引。要使用此索引，请沿着它拖移，直到所需项目出现。

    - *轻拂*：当处理长列表时，你可以快速轻拂列表。将手指放在屏幕上，向一个方向（上、下、左或右）快速移动。显示屏会响应并沿你指示的方向快速滚动。例如，使用轻拂可以快速浏览电子邮件联系人列表。


    **提示：** 轻拂和拖移不会选择或激活 iPad 显示屏上的项目。你可以通过在主屏幕上拖移和轻拂来亲自尝试。


    - *停止*：在滚动过程中，按住手指不放即可停止滚动。Apple 的法律文本是练习轻拂、拖移和停止的好地方。要找到它，请依次选择 `设置` `通用` `关于本机`
    `法律信息`。尽情享受其中无穷无尽的法律术语吧，你可以随心所欲地轻拂、拖移和停止。如果你不想手动停止滚动，只需等待，滚动会自行减速并停止。

    - *清扫*：要清扫 iPad，请将手指从屏幕左侧向右侧拖移。清扫用于解锁 iPad 以及表示你想要删除列表项。

    - *捏合*：在 iPad 上，将拇指和食指放在屏幕上，两者之间留有空隙，然后手指保持接触屏幕并向内移动，就像在捏屏幕一样，这就是捏合操作。捏合允许你在许多
    iPad 程序中（包括“照片”和 Safari）缩小视图。

    - *反向捏合*：反向捏合就是执行捏合的逆操作。开始时将拇指和食指并拢放在屏幕上，然后手指保持接触屏幕并向两边分开。反向捏合允许你在那些支持捏合缩小的 iPad
    应用中进行放大操作。

    '
- fmt: '#### Orientation


    In most images of the iPad, you’ll notice it’s in portrait orientation with the
    physical Home button on the bottom bezel. However, there’s actually no “right”
    way to hold the iPad. Apple designed the iPad as an orientation-agnostic device.
    What this means is you can hold the iPad in portrait or landscape mode and still
    interact with the device ([Figure 4–2](#Chapter04.html#fig_4_2)). As a matter
    of fact, you could completely flip the iPad upside down and still see what’s on
    your screen as right side up.


    ![images](images/0402.jpg)


    **Figure 4–2.** *The iPad in portrait and landscape modes*


    Although there’s no right way to hold your iPad, some apps do offer additional
    features when you flip the iPad into landscape or portrait mode. For instance,
    if you are in Mail in portrait mode, you will see only the currently selected
    e-mail on your screen. To see a list of other e-mails, you need to select the
    inbox in a drop-down menu in the header bar. If, however, you rotate your iPad
    to landscape orientation, you’ll be presented with a list of all your e-mails
    alongside the currently selected e-mail. We’ll discuss orientation-specific features
    of various apps later in this book.


    **NOTE:** Although most apps will display in either orientation, some will not.
    Many games force you to use the iPad in landscape mode.


    ### The Lock Screen


    If you’ve just turned on your iPad or when your iPad has been idle for a while,
    it automatically locks, and the screen goes dark. When this happens, press the
    Home button. The locked iPad screen appears, as shown in [Figure 4–3](#Chapter04.html#fig_4_3).
    To unlock your iPad, swipe the slider from the left to the right. The locked screen
    clears, and the Home screen springs into place.


    ![images](images/0403.jpg)


    **Figure 4–3.** *The iPad lock screen*


    You can set how long the iPad should wait before locking itself. Go to `Settings`
    ![images](images/U001.jpg) `General` ![images](images/U001.jpg) `Auto-Lock`, and
    choose the number of minutes you want your iPad to wait before locking. To disable
    autolocking, choose Never—and make sure you have a good power source available
    nearby. Autolocking is a power-saving feature. Disabling it means your iPad runs
    through its battery more rapidly.


    For security, you can assign a passcode for your iPod touch. You can choose between
    a regular passcode and a simple passcode. A *simplepasscode* is just like a four-digit
    PIN you have for your debit cards. Go to `Settings` ![images](images/U001.jpg)
    `General`, tap Passcode Lock, and then tap Turn Passcode On at the top of the
    screen. Next, tap Simple Passcode so it’s switched to “On” to establish a new
    simple passcode. Your iPad prompts you to enter a four-number code, as shown in
    [Figure 4–4](#Chapter04.html#fig_4_4).


    ![images](images/0404.jpg)


    **Figure 4–4.** *Setting your simple passcode*


    Enter a code, or tap Cancel to quit without entering a code. After you enter the
    code, the iPad prompts you to reenter it and then enables further Passcode Lock
    settings. Those settings include setting how long the iPad needs to be idle before
    it’s locked down, setting whether the picture frame will be displayed while the
    iPad is locked (more on the picture frame in [Chapter 13](#Chapter13.html#ch13)),
    and setting whether all the data on the iPad should be erased after ten failed
    passcode attempts.


    To enter a regular passcode, which is effectively a password using any combination
    of letters, numbers, and symbols, go to `Settings` ![images](images/U001.jpg)
    `General`, tap Passcode Lock, and then tap Turn Passcode On at the top of the
    screen. Next, tap Simple Passcode so it’s switched to “Off” to establish a new
    complex passcode. Your iPad will display a keyboard for you to type your complex
    passcode in on.


    To test your passcode (either simple or complex), click the Sleep/Wake button
    once (to put your iPad to sleep) and again (to wake it up). The passcode challenge
    screen greets you, as shown in [Figure 4–5](#Chapter04.html#fig_4_5). Enter your
    passcode, and your iPad unlocks.


    ![images](images/0405.jpg)


    **Figure 4–5.** *The passcode lock screen displaying the keyboard for you to enter
    a complex passcode on. A simple passcode will show a number pad.*


    To remove the passcode from your iPad, go back to the Passcode Lock settings screen
    ([Figure 4–4](#Chapter04.html#fig_4_4)). Choose Turn Passcode Off, and reenter
    the passcode one more time to confirm that it’s really you making this request.


    So, what happens if you lose your passcode or a mean-spirited colleague adds one
    to your iPad without telling you? You’ll need to connect the iPad to your home
    computer and use iTunes to restore the iPad software. You can restore your iPad
    by selecting the Summary tab in iTunes and clicking Restore. For more information
    about restoring your iPad, see [Chapter 2](#Chapter02.html#ch2).


    On the lock screen, to the right of the Slide to Unlock bar, you’ll notice there
    is a small icon of a flower inside a box (see [Figure 4–3](#Chapter04.html#fig_4_3)).
    This is the Picture Frame button. Tap this to turn your iPad into a digital picture
    frame. The iPad will display your photographs one after the other on the screen
    until you choose to stop it by tapping the screen and tapping the Picture Frame
    button again or sliding the Slide to Unlock bar. You’ll learn more about the picture
    frame function of the iPad and its settings in [Chapter 13](#Chapter13.html#ch13).


    The lock screen can also perform one last function: controls for the iPad’s music
    player. If music is playing on the iPad when the screen is locked, you can double-press
    the Home button to display music controls at the top of the screen. You’ll learn
    more about these controls in [Chapter 7](#Chapter07.html#ch7).'
