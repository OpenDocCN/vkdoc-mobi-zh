- fmt: '### Watching Videos on the Web with Safari


    Video on the iPad isn''t limited to special-purpose applications. You can also
    watch MPEG-4 movie files with the iPad''s Safari application. [Chapter 6](#Chapter06.html#ch6)
    introduced `Safari`. Here you''ll see how you can connect to video on the World
    Wide Web and watch it in your `Safari` browser.


    Many websites besides YouTube feature embedded video. For example, go to virtually
    any news site, and you''re sure to find embedded video. As we mentioned in [Chapter
    6](#Chapter06.html#ch6) and earlier in this chapter, the iPad, and thus `Safari`,
    does not normally support Flash playback, which limits the iPad''s ability to
    display every single web video (see [Figure 6-20](#Chapter06.html#fig_6_20) to
    see what happens when a Flash video is displayed on a website in iPad''s `Safari`).
    However, many websites serve HTML-5 and MPEG-4 videos, and these are fully iPad-compliant.
    You can also use a third party application like the `Skyfire Mobile Browser` to
    view Flash video on the web.


    For example, the website TED (`www.ted.com`), where you can watch videos of some
    of today''s greatest minds talk about science, education, technology, and art,
    is fully iPad-compatible. [Figure 7–13](#Chapter07.html#fig_7_13) shows playing
    back in the iPad''s `Safari` web browser this site''s video of author Elizabeth
    Gilbert talking about creativity.


    You simply tap an embedded video to begin playback. Depending on the speed of
    your Internet connection, it may take a few seconds before the video begins playing.
    You can watch the video in-page or full-screen. To navigate between the two views,
    tap the video, and a navigation bar appears along the bottom of it. It displays
    the Play/Pause button, the navigation scrubber, and the familiar full-screen double-arrow
    button at the very right. Tap the double arrows to enter full-screen view. To
    exit full-screen view and return to the web page, tap the Done button on the video
    playback screen.


    ![images](images/0713.jpg)


    **Figure 7–13.** *Many videos on the Web can be played natively in the Safari
    web browser.*


    ### Video Accessories


    If you are going to be watching a lot of videos, there are several iPad accessories
    you should consider purchasing:


    *   *Stands*: Several companies make them, and they range in price from $5 to
    $100. Whatever stand you choose, make sure it holds the iPad in landscape mode,
    because that gives you maximum screen real estate to watch your videos. Some cases
    also double as an iPad stand. Apple''s iPad 2 Smart Cover ($39) folds into a stand.

    *   *Apple Digital AV Adapter* ($39): Use this adapter (see [Figure 7–14](#Chapter07.html#fig_7_14))
    to connect your iPad to any television using an HDMI connection. The dual-port
    design allows you to charge your iPad through the second port at the same time
    as you display video. The iPad 2 offers screen mirroring, but the adapter can
    be used with older iPads for applications that support video-out, including Videos,
    Photos, and YouTube.

    *   *iPad Dock Connector to VGA Adapter* ($29): The VGA end of the adapter can
    be connected to external monitors, some TVs, and PC projectors. You''ll need this,
    or the cables listed next, to connect your iPad to your home television. Like
    the Digital AV Adapter, this connector works with older iPads as well as newer
    ones. Screen mirroring is only available, however, on the iPad 2 and later.

    *   *Apple Component AV Cable* ($49) and *Composite AV Cable* ($49): These also
    work with the iPad, providing two more methods of linking external monitors and
    projectors to the device. You cannot perform screen mirroring on any iPad with
    these cables.


    ![images](images/0714.jpg)


    **Figure 7–14.** *Apple''s new Digital AV Adapter provides HDMI connectivity from
    your iPad. The second connector outlet allows you to charge your iPad at the same
    time as you display video.*


    Don''t worry if you don''t know the difference between VGA, HDMI, Composite, and
    Component. All three are types of physical video connectors that link devices
    to TVs.


    *   *VGA* is a 15-pin connector that you can still find on the back of many PCs.
    It supports resolutions up to 2048×1536.

    *   *HDMI*, also known as the High Definition Multimedia Interface, is a digital
    audio/video connector (it carries both signals at once) that provides high-definition
    signal support up to 2560×1600 across a single digital link.

    *   *Composite* is a video connector that channels three video source signals
    through a single connection. It''s the oldest of the four technologies, but it
    still supports a resolution of up to 720×576i.

    *   *Component* is a video connector that takes three video source signals (red,
    green, and blue) and outputs them through three different connections. It''s basically
    an RCA cable with three heads like the composite cable, but Component offers a
    much better resolution, up to 1920×1080p (otherwise known as *full HD*).


    Many modern TVs support all these connections. Check your TV''s manual to see
    which yours supports.


    #### Projecting Video


    Although Apple''s connector cables allow you to direct your iPad video to televisions,
    a number of innovative third parties provide video solutions as well. Take the
    $430 Cinemin Slice (`www.wowwee.com`) from WowWee for example. It''s a video system
    that allows you to dock your iPad (see [Figure 7–15](#Chapter07.html#fig_7_15))
    and project video to any screen or wall. With it, you can avoid a lot of awkward
    cabling when making presentations on-the-go, plus you don''t have to arrange in
    advance for an HDTV. Instead, you can carry this relatively small unit along with
    you and display to any large flat surface, including the ceiling, if needed—the
    projector head is on a hinge that can rotate forward and upward.


    The Slice works with iPad 2''s screen mirroring. If you need to project in landscape
    mode rather than portrait, which most business folk probably prefer, you can purchase
    a $40 connectivity pack to use with your Apple-branded VGA video cable.


    ![images](images/0715.jpg)


    **Figure 7–15.** *The $430 Cinemin Slice product offers a highly portable way
    to project iPad 2 screens for on-the-go presentations.*


    ### Listening to Music on the iPad


    When Apple introduced the iPad, many people started complaining on the Internet
    that it was nothing more than a big iPod touch, even though most of them hadn''t
    yet tried the iPad. There''s even a popular parody video that shows joggers carrying
    an iPad instead of an iPod on their morning run. By now you''ve discovered that
    the iPad is much more than just a big iPod touch, but it also *does* play music
    like an iPod (just don''t go jogging with it; or, if you do, get a Bluetooth headset
    and throw the iPad in a backpack, so you don''t look silly running with something
    the size of a laptop screen in your hands, or worse yet, attached to your arm).


    When it comes to the iPad, *iPod* is not a device—it''s an application, the one
    that allows you to browse your audio libraries and select items to play. Once
    you get past the slightly confusing name switch, you''ll discover that the iPad''s
    `iPod` app brings all the functionality and ease of use you expect from an iPod,
    but it delivers that functionality in a distinctive iPad package.


    If you are used to listening to music on an iPod, iPod touch, or iPhone, you may
    expect the iPad to have the same kind of interface for its music player. In actuality,
    the iPad''s music player interface shares a closer resemblance to iTunes on your
    computer than to any previous iPod interface. This is great news, because if you
    are used to using iTunes on a Mac or a Windows computer, you''ll be instantly
    familiar with the basic layout of the iPad''s music player app.


    **NOTE:** Do not confuse the `iPod` and `iTunes` applications on your iPad. `iPod`
    is used to play back your music tracks. `iTunes` connects you to the mobile `iTunes
    Wi-Fi Music Store` and is not a general music player.'
