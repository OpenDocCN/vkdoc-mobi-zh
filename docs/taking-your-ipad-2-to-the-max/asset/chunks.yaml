    # 创建账户


    如果你尚未创建过 Apple ID，可以轻点 `创建新账户` 按钮来创建一个。此时会显示 `新账户` 屏幕（图 15–16）。在此屏幕上，你需要输入姓氏和名字、电子邮件地址（该地址将成为你的新
    Apple ID）以及至少八位字符的密码。


    此密码不必与你的电子邮件账户密码相同。Apple 要求你在密码中包含一个数字、一个大写字母和一个小写字母，以增强密码的安全性。


    你还需要选择一个安全提示问题并输入答案。如果你忘记了 Apple ID 密码，可通过此问题和答案来重置。最后，输入你的出生月份和日期，选择你居住的国家/地区，并决定是否要订阅
    Apple 电子邮件列表。


    输入完这些信息后，轻点 `下一步` 按钮。你将返回到 `登录` 屏幕，此时系统已自动填入你的 Apple ID 和密码，随后将开始登录。


    你需要完成上一节所述的相同电子邮件验证流程。在 Apple 验证你的电子邮件地址真实性时，会显示一个简短的验证屏幕。验证完成后，你就可以返回 FaceTime
    并登录了。


    # 浏览 FaceTime 联系人


    每次启动 FaceTime 应用时，一旦你确认身份并登录账户，系统便会显示一个联系人列表。联系人屏幕分为三个部分，可通过轻点屏幕底部联系人栏中的按钮来访问。


    - **个人收藏**：此屏幕允许你添加最喜爱的联系人。作为常用联系人的快捷方式，十分便捷。

    - **最近通话**：此屏幕列出了你最近拨打或接听的 FaceTime 通话。

    - **通讯录**：此屏幕列出了你通讯录中的所有联系人。


    下面来详细了解一下每个联系人部分。


    ## 个人收藏


    个人收藏屏幕（图 15–17）允许你创建和维护一个最喜爱联系人列表。收藏的联系人通常是你最常呼叫的人，比如家人、朋友以及重要的工作联系人。此屏幕充当了他们
    FaceTime 电子邮件地址或电话号码的快捷方式。


    ![images](img/1517.jpg)


    **图 15–17.** *个人收藏屏幕（左）。选择收藏联系人的电子邮件或电话号码（右）。*


    - **将联系人添加到个人收藏**：轻点右上角的 `+` 按钮，然后从屏幕上滑出的通讯录列表中选择你的联系人。

    - **选择联系人的 FaceTime 信息**：从所选联系人的信息屏幕中，轻点该联系人的 FaceTime 电子邮件地址或电话号码。如果你的联系人使用的是
    iPad，则必须选择其关联的 FaceTime 电子邮件。如果你的联系人使用的是 iPhone 4，则可以选择其 iPhone 4 电话号码。选择好联系人的
    FaceTime 信息后，其 FaceTime 电子邮件或号码旁会显示一个蓝色星号。

    - **呼叫收藏联系人**：设置好个人收藏后，只需轻点收藏列表中的联系人姓名，便会发起 FaceTime 通话。


    你可以轻点收藏联系人姓名旁的箭头，查看或编辑其联系信息。


    ## 最近通话


    最近通话屏幕（参见图 15–18）列出了最近拨打或接听的 FaceTime 通话。此列表可通过屏幕顶部的标签页分为以下两类：


    - **全部**：显示你所有已拨打、已接听或未接的 FaceTime 通话。未接来电以红色显示。通话时间显示在被呼叫者姓名的右侧。你可以轻点联系人姓名旁的箭头，查看或编辑其联系信息。

    - **未接来电**：仅显示你未接的 FaceTime 通话。


    要清除最近通话列表，请轻点屏幕右上角的 `清除` 按钮。


    ![images](img/1518.jpg)


    **图 15–18.** *最近通话列表*


    ## 通讯录


    通讯录屏幕展示了你的完整通讯录。其功能与独立的通讯录应用完全相同。找到要呼叫的联系人后，轻点其姓名，便会显示其联系人信息卡片。轻点其 FaceTime 电子邮件或
    FaceTime 电话号码，即可开始通话（参见图 15–19）。


    ![images](img/1519.jpg)


    **图 15–19.** *从 iPad 发起 FaceTime 通话。发起通话时，屏幕上会显示前置摄像头的预览画面。轻点 `结束` 可在未接通的情况下终止通话。*


    # 拨打和接听 FaceTime 通话


    要拨打 FaceTime 通话，请从个人收藏、最近通话或通讯录列表中选择一个联系人。轻点个人收藏或最近通话列表中的姓名将直接发起 FaceTime 通话（图
    15–11）。要使用通讯录列表发起通话，你需要轻点联系人姓名，然后轻点其 FaceTime 电话号码或电子邮件。若要在对方接听前取消通话，请轻点图 15–19
    中所示的 `结束` 按钮。


    **注：** 你可以通过进入“设置”应用，然后依次选择 `声音` ![image](img/U001.jpg) `铃声` 来更改 FaceTime 来电铃声。


    ![images](img/1520.jpg)


    **图 15–20.** *接听 FaceTime 通话*


    当你收到 FaceTime 通话时，屏幕上会显示一条信息，告知你有朋友想与你进行 FaceTime 通话（图 15–20）。前置摄像头会自动激活，让你看到自己的样子。要接听，请用手指在“滑动来回答”区域上滑动。


    图 15–21 展示了你在 FaceTime 通话中的画面。对方的图像占据屏幕大部分区域，而你的图像则显示在屏幕角落的一个矩形框中。你的图像下方是 FaceTime
    控制栏，为你提供以下几个选项。


    ![images](img/1521.jpg)


    **图 15–21.** *FaceTime 视频通话*


    - **静音**：轻点麦克风图标可在静音和取消静音之间切换。通话静音时，你仍能听到对方的声音，但对方听不到你的声音。通话静音时，对方仍然能看到你，所以请注意你的行为！

    - **切换摄像头**：轻点屏幕右下角的 `切换摄像头` 图标，可在前置和后置摄像头之间切换。该图标看起来像一个传统的静态相机，两侧有旋转的箭头。切换摄像头会改变通话对方所看到的画面。切换摄像头后，你的朋友将看到
    iPad 后置摄像头所对准的画面。

    - 通话期间切换摄像头是一项方便的功能。例如，它可以让你的朋友看到你正在看的东西，比如你刚会爬的宝宝。

    - **结束通话**：要结束 FaceTime 通话，请轻点 `结束` 按钮。


    **注：** 你知道 iPad 有两个摄像头，但你知道前置摄像头是专门为 FaceTime 设计的吗？Apple 确保其焦距和视野恰到好处，能够在手臂长度距离内聚焦于你的面部。

