  trans: '

    # iPad 的各个部件


    在第 1 章中，你已经简要了解了 iPad 机身外部的一些开关和接口的名称及位置。在本章中，我们将解释这些开关和接口*如何*使用。


    ## 开/关 睡眠/唤醒 按钮


    位于 iPad 右上角的是这块玻璃与铝合金小平板上最重要的按钮之一：开/关 睡眠/唤醒 按钮（见图 3-1）。这个按钮的名称有点奇怪，但它非常清晰地描述了其功能。


    当 iPad 完全关机后，你需要按住该按钮两到三秒才能重新开机。屏幕上会出现白色的苹果标志，随后很快会显示 iPad 的主屏幕或密码锁定屏幕。


    ![images](img/0301.jpg)


    **图 3-1.** *睡眠/唤醒 按钮用于开启或关闭 iPad，以及在闲置时使其进入睡眠状态。*


    如果你打算几小时内不使用 iPad，可以选择等待它自动锁定并进入睡眠（前提是在“设置”中开启了该选项），也可以手动使其进入睡眠。要手动操作，只需快速用力按下此按钮，屏幕便会变暗。当
    iPad 声音开启时，你甚至能听到“咔哒”一声，作为设备已进入睡眠状态的声音确认。


    你可以通过再次快速按下“开/关 睡眠/唤醒”按钮，或按下主屏幕按钮来唤醒 iPad。同样，如果你启用了密码锁定，则必须先正确输入密码才能使用 iPad。


    偶尔，你可能需要完全关闭 iPad。这意味着它当然不会自动接收邮件、响闹钟或执行任何其他操作。它将完全关机。当你长时间不使用 iPad（例如，外出旅行时将
    iPad 留在家中）且不希望电池耗电时，这非常方便。


    要关闭 iPad，只需按住“开/关 睡眠/唤醒”按钮约五秒钟。iPad 会显示一个黑屏，底部有一个“取消”按钮，以防你真的不想关机，靠近顶部还有一个标有“滑动来关机”的红色按钮。用手指向右滑动该按钮即可关闭设备电源。


    在极少数情况下，当 iPad 应用完全无响应且整个设备死机时，此技巧可能很有用。要重新开机，只需再次按下“开/关 睡眠/唤醒”按钮。


    对于配有智能保护盖的 iPad 2，还有另一种让 iPad 睡眠和唤醒的方法：只需打开智能保护盖即可唤醒 iPad，合上则使其进入睡眠。


    ## 静音/屏幕旋转锁定


    移动到 iPad 的右侧（以主屏幕按钮和基座接口朝下、屏幕面向自己为方向），下一个开关是静音/屏幕旋转锁定（见图 3-2）。这个开关的名称描述了它的两个功能；默认情况下，它用于将
    iPad 静音，完全关闭设备的声音。但静音/屏幕旋转锁定开关也可用于防止 iPad 屏幕改变方向。


    ![images](img/0302.jpg)


    **图 3-2.** *静音/屏幕旋转锁定（小开关）和音量开关（较大的按钮）*


    当此按钮用于将 iPad 静音时，将开关从上位置拨动到下位置会关闭设备的声音，并会在 iPad 屏幕上短暂显示一个静音图标（见图 3-3），以表示声音已关闭。如果你试图在参加重要会议时玩《愤怒的小鸟》，将
    iPad 静音会非常有用。


    ![images](img/0303.jpg)


    **图 3-3.** *当你将静音/屏幕方向开关向下拨动时，会显示此静音图标。*


    新的 iPad 用户在阅读或玩游戏时，有时会因将 iPad 向某个方向倾斜过多而导致屏幕在纵向和横向之间切换方向，这可能会让他们感到困扰。


    这正是屏幕旋转锁定派上用场的时候。这是 iPad 侧面开关的第二个用途。要使该开关能够锁定 iPad 屏幕的旋转，请前往“设置” `U001` “通用”，并将“侧边开关用于：”设置为“锁定屏幕旋转”。当你将开关向下拨动时，屏幕上会短暂出现一个中间带锁的环形箭头图标（见图
    3-4）。同一个图标的缩小版会出现在屏幕顶部状态栏的右侧。现在，你可以随意旋转 iPad，屏幕将始终保持相同的方向。


    ![images](img/0304.jpg)


    **图 3-4.** *无论 iPad 方向如何，只要启用了屏幕旋转锁定，显示器将保持同一方向。*


    例如，如果你在 iBooks 中阅读一本书，并且发现更喜欢在纵向模式下阅读，感觉更像读书，那么你可能想将屏幕方向锁定为纵向模式。要将屏幕锁定在纵向模式，请倾斜
    iPad，使底部朝下，使显示器处于正确方向，然后向下滑动屏幕旋转锁定按钮。


    要关闭屏幕旋转锁定，只需将静音/屏幕方向开关向屏幕顶部方向向上滑动即可。图标中央的锁消失，表示屏幕旋转现已解锁。


    ## 音量开关


    继续我们的 iPad 周边之旅，下一个遇到的按钮是音量开关。顾名思义，它用于调高或调低音量，或完全关闭声音。你可以在图 3-2 中看到音量开关的位置。


    要提高 iPad 扬声器（或通过耳机插孔连接的任何耳机）的音量，只需按一下开关的上半部分。按一下可将音量提高一档；长按开关可快速将 iPad 音量调至最大。


    降低音量则需要按音量开关的另一端。如果你按住音量开关的下端，iPad 的声音会关闭。这在电话铃声响起时需要快速关闭 Pandora 音乐应用的音量时非常方便。


    每当你触摸音量开关时，iPad 显示屏中央会出现音量大小的视觉指示（见图 3-5）。如果你有一套 Apple 耳机，且其线缆上带有音量开关并已插入 iPad，你可以用类似的方式使用该开关调节音量，而无需触摸
    iPad。


    ![images](img/0305.jpg)


    **图 3-5.** *当你使用音量开关或带音量开关的耳机调节 iPad 音量时，会出现这个透明的图标。*


    ## 扬声器


    说到音量，iPad 之旅的下一个部件是扬声器。它隐藏在 iPad 的底部（见图 3-6），通过 iPad 2 弧形铝制底部的一排微小孔洞发出各种系统提示音、音乐和电影配乐。在初代
    iPad 上，它是隐藏在网格罩后面的三个微小的椭圆形开口。


    ![images](img/0306.jpg)


    **图 3-6.** *iPad 扬声器开口（右）和基座接口（左）*


    关于扬声器没什么太多可说的，除了如果你要为 iPad 购买或制作保护套，请确保其在正确位置有开口，以免声音被闷住。另外一个小提示：务必让液体远离扬声器和基座接口（见下一节），因为即使轻微的泼溅也可能导致
    iPad 保修失效。

