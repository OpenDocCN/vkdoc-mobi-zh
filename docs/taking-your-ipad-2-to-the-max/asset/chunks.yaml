- fmt: '#### A Word on Syncing Your Data


    iPad storage starts at just 16GB of data. Many of us have music or movie libraries
    that are far larger than even the greatest of the iPad’s storage options. If you
    have a 16GB iPad and a 20GB music library, not only will you not be able to fit
    all your music, but, even if you settle for 16GB of your music library, you won’t
    have room for photos, movies, books, or apps. Recognizing this reality, Apple
    devised the settings preferences to help you organize and select your most important
    data and bring it to the iPad. The following tabs that we discuss will help you
    select what to sync to your iPad.


    **NOTE:** Applications like `Air Video`, `Dropbox`, `LogMeIn`, and `Air Sharing
    Pro` provide ways to offload local storage to remote servers, letting you free
    up space on your iPad. Instead of synchronizing entire movies, `Air Video` streams
    media from your home computer to your iPad wherever you have an available Internet
    connection. `Dropbox`, `LogMeIn`, and `Air Sharing Pro` each let you transfer
    data to and from remote servers (`Dropbox` and `Air Sharing Pro`) or your home-
    or office-based desktop (`LogMeIn` and `Air Sharing Pro`).


    Do note that although you most likely will not be able to fit all of your music,
    photos, and movies onto the iPad, you can easily change what you have on the iPad.
    For example, once you’ve watched a movie on your iPad, you can remove it and replace
    it with another one. Also, some files are larger than others. Movies are typically
    the largest and thus are good candidates for removal if you need space. Contacts,
    calendars, and book collections are all text-based files, and text takes up very
    little space, so don’t worry about syncing all of these onto your iPad.


    #### Where Do You Get Media From?


    The iPad is a great leisure device for consuming media. But where do you get that
    media? The easiest and most direct way to get movies, music, TV shows, and books
    onto your iPad is through the iTunes Store on your computer (see [Figure 2–5](#Chapter02.html#fig_2_5)).
    In the iTunes Store you can buy music by the song or album, rent or purchase movies,
    download your favorite TV shows by the episode, or subscribe to a Season Pass
    and download free podcasts and iTunes U content.


    ![images](images/0205.jpg)


    **Figure 2–5.** *The iTunes Store is the world’s largest music store. You can
    also download movies, TV shows, apps, podcasts, and books from it.*


    You can also import music and movies from your own collections. Importing music
    from CDs is straightforward using iTunes, and importing video isn’t hard either.
    One way to get movies onto your iPad is to rip them from your DVD collection.


    **NOTE:** Ripping a DVD means copying content from the disc into a format that’s
    playable on other devices, including iPads. To load video from your DVDs onto
    your iPad, download a copy of HandBrake from [`http://handbrake.fr`](http://handbrake.fr)
    (for both Windows and Mac) and convert your DVD content to an iPad-friendly format.
    HandBrake is free and easy to use. Insert your DVD into your computer, run the
    application, and follow the directions in the program. After your movie has finished
    ripping, you can either add it to iTunes automatically (check your settings) or
    manually drag and drop it into iTunes.


    To get applications, you must use the iTunes App Store. There’s no other way to
    add new software items to your iPad. You can easily browse for apps from the desktop
    version of iTunes or in the dedicated App Store app on the iPad, which is covered
    further in [Chapter 8](#Chapter08.html#ch8).


    You can build your iPad e-book library in a variety of ways. Perhaps the easiest
    is to buy titles through Apple’s iBookstore (see [Chapter 8](#Chapter08.html#ch8)
    for details), which is part of Apple’s free-to-download iBooks app. You can also
    take advantage of the more than 33,000 free e-books at Project Gutenberg ([`www.gutenberg.org`](http://www.gutenberg.org))
    by downloading books to your downloads folder and then dragging them into iTunes.
    There are also many e-book stores and publishers that sell e-books directly online.
    For a good list of websites that sell e-books, go to [`www.epubbooks.com/buy-epub-books`](http://www.epubbooks.com/buy-epub-books).


    **NOTE:** E-books come in many formats. The formats that are compatible with the
    iPad’s iBooks app are ePub (offering fully interactive book features, including
    font resizing and page re-layouts) and PDF (with simple document display; what
    you get is what you see). Make sure when buying an e-book outside the iBookstore
    that it is in ePub or PDF format, or else you’ll need to find another app that
    reads the format your e-book is in or use a converter such as Calibre ([`http://calibre-ebook.com`](http://calibre-ebook.com)).
    For example, books from Amazon’s Kindle Store can be read on the iPad but not
    in the iBooks app. You need to download Amazon’s free Kindle for iPad app (from
    the iTunes App Store) to read Kindle-formatted e-books purchased from Amazon.


    #### Remember to Apply Your Changes


    After you change iPad settings in iTunes via the settings pane (as described in
    the following sections), they do not become finalized until you click the gray
    Apply button to the right of the Capacity bar (see [Figure 2–6](#Chapter02.html#fig_2_6)).
    If you forget to click it, iTunes will automatically remind you before you navigate
    away from the iPad settings pane. If you make a change in the settings pane by
    mistake, simply click the Revert button that sits above the Apply button. Note
    that the Capacity bar will grow and shrink as you opt to add and subtract media;
    this happens before you sync, allowing you to monitor how much of your iPad’s
    storage you’ll be using once you commit the sync.


    ![images](images/0206.jpg)


    **Figure 2–6.** *The Revert and Apply buttons allow you to accept or negate any
    of the changes you have made in iTunes’ iPad settings pane.*


    ### The Tabs


    The tabs (see [Figure 2–7](#Chapter02.html#fig_2_7)) running along the top of
    the iPad settings pane are how you navigate all your iPad settings. There are
    ten tabs in total: Summary, Info, Apps, Music, Movies, TV Shows, Podcasts, iTunes
    U, Books, and Photos. To begin configuring the settings on any tab, just click
    the tab to select it.


    ![images](images/0207.jpg)


    **Figure 2–7.** *Each setting tab offers a different way to control the way that
    iTunes synchronizes your iPad to your home media library.*


    #### The Summary Tab


    The Summary tab (see [Figure 2–3](#Chapter02.html#fig_2_3)) is the first tab you
    see in the iPad settings pane. It displays your iPad’s overview, including the
    iPad’s name, capacity, currently installed firmware version, and serial number.
    From this page, you can check for firmware updates, restore your iPad to a pristine,
    factory-installed condition, and set options to help you manage the way your data
    is synced. The page is broken up into three boxes: iPad, Version, and Options.'
