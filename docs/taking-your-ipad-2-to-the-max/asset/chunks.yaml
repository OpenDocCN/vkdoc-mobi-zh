- fmt: "#### Sharing Your Video\n\nWhile viewing any single video clip, you have several\
    \ sharing options. To bring up the sharing menu, tap the `Share` button, which\
    \ looks like an arrow breaking free from a small box. You'll be presented with\
    \ a pop-up of sharing options (see [Figure 13–41](#Chapter13.html#fig_13_41)):\n\
    \n![images](images/1341.jpg)\n\n**Figure 13–41.** *The video sharing options*\n\
    \n- **Email Video**: Selecting this option will compress the video clip as a QuickTime\
    \ movie file. A new message window will appear with the movie clip attached to\
    \ the body of the message.\n\n  Depending on the length of your video clip, you\
    \ may get an error message that says \"Video is Too Long.\" If you see this, your\
    \ iPad will ask you whether you want to select a smaller clip from the video to\
    \ e-mail. Tap `OK`, and you'll enter trim mode, which will allow you to cut down\
    \ the length of the clip.\n\n  What's interesting about trim mode is that the\
    \ yellow trim selection bar is fixed to 54 seconds. You can shorten it or drag\
    \ the 54-second trim selection bar around, but you can't increase the trim to\
    \ longer than 54 seconds. So, as of now, 54 seconds seems to be the longest a\
    \ clip can be that you can e-mail. Apple can always change this with a software\
    \ update in the future, however.\n\n  Once you have trimmed your video, tap the\
    \ yellow `Email` button above the scrubber bar. A blank e-mail with the video\
    \ in the body of the message should appear.\n\n- **Send to MobileMe**: `MobileMe`\
    \ is Apple's e-mail service that also allows you to publish and share your photos\
    \ and videos online. The `Send to MobileMe` option lets you upload your videos\
    \ to your `MobileMe` gallery online right from your iPad. Tap `Send to MobileMe`.\
    \ A window will appear asking you to name the video and write a description if\
    \ you want (see [Figure 13–42](#Chapter13.html#fig_13_42)). You can also choose\
    \ whether to upload a standard-definition video or the original high-definition\
    \ version of it. Finally, select the `MobileMe Gallery` album you want to publish\
    \ the video to, and then tap `Publish`. Note that you can't create a new gallery\
    \ this way. You must add your video to an existing gallery.\n\n  A progress bar\
    \ signifying the upload will appear over the video. When the video has finished\
    \ uploading, you'll be able to tap `View on MobileMe`, which takes you to your\
    \ `MobileMe` web gallery in `Safari`, or `Tell a Friend`, which opens the `Mail`\
    \ app and composes an e-mail with the link to the video in the body of the message.\n\
    \n  ![images](images/1342.jpg)\n\n  **Figure 13–42.** *The MobileMe sharing and\
    \ uploading screens*\n\n  To use these `MobileMe` features, you must have a `MobileMe`\
    \ account. See [`www.me.com`](http://www.me.com) for details.\n\n- **Send to YouTube**:\
    \ Selecting this option will allow you to upload your video to `YouTube` right\
    \ from your iPad. On the screen that appears (see [Figure 13–43](#Chapter13.html#fig_13_43)),\
    \ enter a name and description for your video, select to upload it in standard\
    \ or high definition, add tags, select a `YouTube` category, and then tap `Publish`.\
    \ You must have a `YouTube` account to upload videos to `YouTube`.\n\n  ![images](images/1343.jpg)\n\
    \n  **Figure 13–43.** *Publishing a video to YouTube*\n\n- **Copy Video**: Tap\
    \ `Copy Video` to copy the video. This saves the video to your clipboard for use\
    \ in pasting into other things (such as an e-mail or document) later.\n\n  You\
    \ can also copy multiple videos at one time. When viewing an album, tap the `Share`\
    \ button. You'll see the album menu renamed as `Select Photos`. Tap as many video\
    \ (and/or photos) as you want to copy. A check mark will appear on each selected\
    \ item. After you have selected all your videos and/or photos, tap the `Copy`\
    \ button in the upper-left corner. These videos and photos can then be batch copied\
    \ into an e-mail or other applications.\n\n### Summary\n\nThis chapter introduced\
    \ you to the iPad's `Photos` app and showed you how to navigate your photo collections,\
    \ share them with friends and family, change the iPad's wallpaper, and even use\
    \ your iPad as a digital picture frame. Once you view your digital photos on the\
    \ iPad, you might find that you'll never want to navigate and view them on a computer\
    \ monitor or laptop screen again.\n\nHere are some final thoughts for this chapter:\n\
    \n- The iPad's `Photos` application offers some of the most instantly appealing\
    \ ways to show off the power of your iPad. You can scroll through your albums,\
    \ zoom in and out with a pinch or double-tap, and flip the unit on its side. These\
    \ features all deliver the iPad \"wow\" factor.\n- You can import photos directly\
    \ from a camera onto the iPad. This is a huge help for professional photographers\
    \ who might be out in the field shooting. They can load their images on the iPad\
    \ and instantly see what they look like on a bigger screen. They can even zoom\
    \ in to see more detail.\n- Consider investing in an inexpensive business card\
    \ holder and a cheap speaker. They make watching slideshows on your iPad a lot\
    \ easier, especially for more than one person at a time. A video-out cable from\
    \ Apple increases the fun by sending the slideshows to a TV screen.\n- The `Photos`\
    \ app also allows you to view recorded or imported video. You can even trim your\
    \ video clips and easily send those clips to `YouTube` or e-mail them to your\
    \ friends.\n\n## Chapter 14\n\n## On the Go with iWork\n\nIn this book, we've\
    \ discussed apps that can help you get organized, let you communicate with others,\
    \ or enjoy media in the form of music, books, videos, and photos. Now we're going\
    \ to talk about three apps that turn your iPad into a powerful work platform.\n\
    \nThe three apps are `Pages`, `Numbers`, and `Keynote`, together known as `iWork`\
    \ for iPad. These Apple-produced apps can be purchased in the App Store for $9.99\
    \ each, and they provide much of the functionality that productive workers need\
    \ while they're on the go. With that, we'll add a caveat: for serious work, you\
    \ should consider using your iPad to remotely control your \"real\" work computer.\
    \ Apps such as `LogMeIn Ignition` and `iTeleport` make this possible, although\
    \ a detailed explanation of their configuration and use is not included in this\
    \ book. In this chapter, we'll cover the basics of each app only, because a detailed\
    \ dig into `iWork` could easily be the subject of another book."
  raw: "#### Sharing Your Video\n\nWhile viewing any single video clip, you have several\
    \ sharing options. To bring up the sharing menu, tap the Share button, which looks\
    \ like an arrow breaking free from a small box. You'll be presented with a pop-up\
    \ of sharing options (see [Figure 13–41](#Chapter13.html#fig_13_41)):\n\n![images](images/1341.jpg)\n\
    \n**Figure 13–41.** *The video sharing options*\n\n*   *Email Video*: Selecting\
    \ this option will compress the video clip as a QuickTime movie file. A new message\
    \ window will appear with the movie clip attached to the body of the message.\n\
    \n    Depending on the length of your video clip, you may get an error message\
    \ that says “Video is Too Long.” If you see this, your iPad will ask you whether\
    \ you want to select a smaller clip from the video to e-mail. Tap OK, and you'll\
    \ enter trim mode, which will allow you to cut down the length of the clip.\n\n\
    \    What's interesting about trim mode is that the yellow trim selection bar\
    \ is fixed to 54 seconds. You can shorten it or drag the 54-second trim selection\
    \ bar around, but you can't increase the trim to longer than 54 seconds. So, as\
    \ of now, 54 seconds seems to be the longest a clip can be that you can e-mail.\
    \ Apple can always change this with a software update in the future, however.\n\
    \n    Once you have trimmed your video, tap the yellow Email button above the\
    \ scrubber bar. A blank e-mail with the video in the body of the message should\
    \ appear.\n\n*   *Send to MobileMe*: MobileMe is Apple's e-mail service that also\
    \ allows you to publish and share your photos and videos online. The Send to MobileMe\
    \ option lets you upload your videos to your MobileMe gallery online right from\
    \ your iPad. Tap Send to MobileMe. A window will appear asking you to name the\
    \ video and write a description if you want (see [Figure 13–42](#Chapter13.html#fig_13_42)).\
    \ You can also choose whether to upload a standard-definition video or the original\
    \ high-definition version of it. Finally, select the MobileMe Gallery album you\
    \ want to publish the video to, and then tap Publish. Note that you can't create\
    \ a new gallery this way. You must add your video to an existing gallery.\n\n\
    \    A progress bar signifying the upload will appear over the video. When the\
    \ video has finished uploading, you'll be able to tap View on MobileMe, which\
    \ takes you to your MobileMe web gallery in Safari, or Tell a Friend, which opens\
    \ the Mail app and composes an e-mail with the link to the video in the body of\
    \ the message.\n\n    ![images](images/1342.jpg)\n\n    **Figure 13–42.** *The\
    \ MobileMe sharing and uploading screens*\n\n    To use these MobileMe features,\
    \ you must have a MobileMe account. See [`www.me.com`](http://www.me.com) for\
    \ details.\n\n*   *Send to YouTube*: Selecting this option will allow you to upload\
    \ your video to YouTube right from your iPad. On the screen that appears (see\
    \ [Figure 13–43](#Chapter13.html#fig_13_43)), enter a name and description for\
    \ your video, select to upload it in standard or high definition, add tags, select\
    \ a YouTube category, and then tap Publish. You must have a YouTube account to\
    \ upload videos to YouTube.\n\n    ![images](images/1343.jpg)\n\n    **Figure\
    \ 13–43.** *Publishing a video to YouTube*\n\n*   *Copy Video*: Tap Copy Video\
    \ to copy the video. This saves the video to your clipboard for use in pasting\
    \ into other things (such as an e-mail or document) later.\n\n    You can also\
    \ copy multiple videos at one time. When viewing an album, tap the Share button.\
    \ You'll see the album menu renamed as Select Photos. Tap as many video (and/or\
    \ photos) as you want to copy. A check mark will appear on each selected item.\
    \ After you have selected all your videos and/or photos, tap the Copy button in\
    \ the upper-left corner. These videos and photos can then be batch copied into\
    \ an e-mail or other applications.\n\n### Summary\n\nThis chapter introduced you\
    \ to the iPad's Photos app and showed you how to navigate your photo collections,\
    \ share them with friends and family, change the iPad's wallpaper, and even use\
    \ your iPad as a digital picture frame. Once you view your digital photos on the\
    \ iPad, you might find that you'll never want to navigate and view them on a computer\
    \ monitor or laptop screen again.\n\nHere are some final thoughts for this chapter:\n\
    \n*   The iPad's Photos application offers some of the most instantly appealing\
    \ ways to show off the power of your iPad. You can scroll through your albums,\
    \ zoom in and out with a pinch or double-tap, and flip the unit on its side. These\
    \ features all deliver the iPad “wow” factor.\n*   You can import photos directly\
    \ from a camera onto the iPad. This is a huge help for professional photographers\
    \ who might be out in the field shooting. They can load their images on the iPad\
    \ and instantly see what they look like on a bigger screen. They can even zoom\
    \ in to see more detail.\n*   Consider investing in an inexpensive business card\
    \ holder and a cheap speaker. They make watching slideshows on your iPad a lot\
    \ easier, especially for more than one person at a time. A video-out cable from\
    \ Apple increases the fun by sending the slideshows to a TV screen.\n*   The Photos\
    \ app also allows you to view recorded or imported video. You can even trim your\
    \ video clips and easily send those clips to YouTube or e-mail them to your friends.\n\
    \n## Chapter 14\n\n## On the Go with iWork\n\nIn this book, we've discussed apps\
    \ that can help you get organized, let you communicate with others, or enjoy media\
    \ in the form of music, books, videos, and photos. Now we're going to talk about\
    \ three apps that turn your iPad into a powerful work platform.\n\nThe three apps\
    \ are Pages, Numbers, and Keynote, together known as iWork for iPad. These Apple-produced\
    \ apps can be purchased in the App Store for $9.99 each, and they provide much\
    \ of the functionality that productive workers need while they're on the go. With\
    \ that, we'll add a caveat: for serious work, you should consider using your iPad\
    \ to remotely control your “real” work computer. Apps such as LogMeIn Ignition\
    \ and iTeleport make this possible, although a detailed explanation of their configuration\
    \ and use is not included in this book. In this chapter, we'll cover the basics\
    \ of each app only, because a detailed dig into iWork could easily be the subject\
    \ of another book."
