- fmt: '### Adding Calendar Events


    From any of the views listed earlier, tapping the plus sign (`+`) icon in the
    lower-right corner of the calendar reveals an Add Event dialog box and the standard
    iPad virtual keyboard. To enter event information, tap any one of the fields and
    begin typing on the keyboard. Tapping `Start & End`, which is used to enter the
    beginning and ending of an event, displays a date and time picker (see [Figure
    10–13](#Chapter10.html#fig_10_13)). Use your finger to roll the start date and
    time up or down, and then do the same with the ending time of the event. If an
    event is going to last all day (for example, an all-day meeting or a birthday),
    then slide the `All-day` button to `ON`.


    ![images](images/1013.jpg)


    **Figure 10–13.** *Whenever you''re adding events to a calendar, you use the date
    and time picker to select the starting and ending dates and times.*


    If you want to make the event repeat at regular intervals, just tap the `Repeat`
    field. You''ll be given the choice (see [Figure 10–14](#Chapter10.html#fig_10_14))
    of repeating the event every day, week, two weeks, month, or year. A daily repeating
    event would be useful in reminding yourself to take important medication, while
    an annual repeating event could save your marriage by reminding you of an impending
    anniversary.


    ![images](images/1014.jpg)


    **Figure 10–14.** *Any event can be set up to repeat at distinct time intervals
    that you set.*


    Any event can have up to two alerts. Alerts on the iPad are both audible and visual;
    there is no choice between the two types of alerts as there is on the Mac. Tapping
    the `Alert` or `Second Alert` field displays a list of times before an event at
    which an alert can go off. Those times vary from five minutes to two days before,
    or you can have your iPad alert you on the date of the event.


    What happens when the alert goes off? A small visual alert appears on the screen
    (see [Figure 10–15](#Chapter10.html#fig_10_15)), with a `Close` button that dismisses
    the alert with a tap and a `View Event` button that takes you to the calendar
    to see the details. If you have the sound turned up on your iPad, you''ll also
    hear an alert tone ring.


    ![images](images/1015.jpg)


    **Figure 10–15.** *Your iPad alerts you of impending appointments with an alert
    tone and a visual reminder.*


    There are also fields for entering the location of an event or notes about it.
    When you''re done entering the event information, tap the `Done` button, and the
    event appears on the calendar.


    ### Syncing Calendar


    As with the `Notes` app, much of the power of `Calendar` on the iPad becomes apparent
    when you synchronize to Microsoft Outlook 2003, 2007, or 2010 on your Windows
    computer, or to `iCal` or `Outlook` on your Mac. The method of setting up synchronization
    is similar to how you set up `Notes`.


    Connect your iPad to your Windows computer or Mac using the Dock Connector to
    USB Cable, and then launch `iTunes` if it doesn''t start by itself. In `iTunes`
    on your computer, click the icon designating your iPad under `Devices` in the
    sidebar on the left side of the window. Next, click the `Info` tab, and scroll
    down until you see the words *Sync iCal Calendars* (Mac; [Figure 10–16](#Chapter10.html#fig_10_16))
    or *Sync Calendars* (Windows; [Figure 10–17](#Chapter10.html#fig_10_17)).


    ![images](images/1016.jpg)


    **Figure 10–16.** *Setting up Calendar syncing in iTunes. Note that this iPad
    is already syncing through Apple''s MobileMe service.*


    ![images](images/1017.jpg)


    **Figure 10–17.** *Setting up Calendar syncing in iTunes on Windows*


    To set up synchronization of `iCal` and the `Calendar` app on your iPad, select
    the `Sync Calendars` (Windows) or `Sync iCal Calendars` (Mac) check box. Below
    the check box are radio buttons for syncing all calendars on your Mac or Windows
    computer to the iPad or just selected calendars. You might want to select certain
    calendars for syncing if you have many calendars on your computer and really don''t
    need to view or edit all of those on your iPad.


    In [Figure 10–16](#Chapter10.html#fig_10_16), you can see four calendars on a
    Mac—one for Home, one for Work, one called Highlands Ranch (it is created by a
    Mac application called `WeatherCal` from Bare Bones Software and displays weather
    forecasts on a calendar), and a fourth called `Toodledo iCal` (from the online
    to-do service Toodledo). To sync only the Home calendar to the iPad, select the
    `Selected calendars` radio button, and then select only the Home calendar box.


    You can choose to sync only future and recent events by selecting the "Do not
    sync events older than 30 days" box. That''s very useful if you have many events
    on your calendar and don''t want to waste space on your iPad filling it with calendar
    debris. The number of days is editable, so if you''d like to only sync events
    back two weeks and into the future, you can change the number 30 to 14.


    To apply the changes and sync your calendar to your iPad, click the `Apply` button
    in the lower-right corner of the `iTunes` window. After the sync is done, launch
    `Calendar` on your iPad; then applaud your work! Remember, it''s a two-way sync,
    so any changes or additions you make on your iPad are synced to your computer,
    and vice versa.


    ### Contacts


    The third component of the iPad desk set is `Contacts`, your electronic address
    book. On the left side of the address book is a scrolling list of names, while
    the details of a specific person or company appear on the right side (see [Figure
    10–18](#Chapter10.html#fig_10_18)).


    ![images](images/1018.jpg)


    **Figure 10–18.** *Contacts is your personal address book, synchronized to your
    Mac or Windows computer and to other devices if you want.*


    Compared with `Calendar`, the `Contacts` app is very simple. Instead of multiple
    ways to display the information, there''s only one view, which is similar in both
    landscape and portrait orientation. That''s not to say that `Contacts` isn''t
    useful; in fact, the address list is used by `Mail` and many other iPad apps to
    enable sharing of information with other people.'
