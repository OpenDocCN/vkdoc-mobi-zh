  trans: '

    ### 专辑视图


    `Album View`（专辑视图）是一种强大且有趣的音乐浏览方式。您可以通过两种方式访问`专辑视图`，这两种方式都位于`Now Playing`（正在播放）窗口中。事实上，`专辑视图`是`正在播放`窗口的一部分。当您访问它时，您会看到`正在播放`窗口顶部和底部的栏保持不变（参见图
    7–24）。


    -   双击专辑封面区域以显示`专辑视图`。封面会翻转过来，然后您将看到该专辑的完整歌曲列表。

    -   点击`正在播放`窗口底部粗栏中的`专辑视图`按钮。当前歌曲的封面会翻转过来，然后您将看到该专辑的完整歌曲列表。


    要退出`专辑视图`，请点击屏幕右下角的小型专辑封面缩略图（即`专辑视图`按钮之前所在的位置）。专辑的歌曲列表将翻转回来，并再次显示封面。或者，点击屏幕左下角的`返回`按钮，您将返回主
    iPod 应用屏幕。您的音乐将继续播放。


    为什么要使用`专辑视图`？假设您正在听一个播放列表，突然播放了一首您很久没听的歌曲。这是一首很棒的歌，您想看看这张专辑里还有哪些其他歌曲。`专辑视图`让您无需离开播放列表就能做到这一点。只需使用前面提到的任一方法访问它，您就会看到一个屏幕，其中显示了该专辑所有歌曲的曲目列表，以及它们的名称和时长。上下滚动曲目列表，以查看当前播放列表或专辑中的所有项目。点击任意项目即可开始播放。


    ![images](img/0724.jpg)


    **图 7–24.** *`专辑视图`显示当前专辑或播放列表的曲目及其时长列表。*


    `专辑视图`还允许您为歌曲评分。使用出现在进度条下方的星级控件为当前歌曲评分，从零星到五星。在星级上拖动手指以设定您的评分。这些评分会同步回您的电脑。为音乐评分是个好习惯，因为这能帮您记录下真正喜欢的歌曲。您可以创建智能播放列表来包含所有五星歌曲，从而在一个地方即时访问它们。


    此外，如果您在桌面版`iTunes`中使用了`iTunes DJ`功能，评分较高的歌曲播放频率会更高。`iTunes DJ`是`iTunes`的一项功能，它会从您的音乐库中挑选歌曲并创建不间断的音乐播放。当您举办派对时，这个功能非常棒。`iTunes
    DJ`并非 iPad 上 iPod 应用的功能。


    **提示：** 当`专辑视图`中的曲目列表有空余空间时——例如，当您只有一两首曲目时——双击空白区域即可返回`正在播放`屏幕。或者，双击评分星级显示的任意一侧。


    ### 创建播放列表


    本章前面介绍了不同类型的播放列表。您选择从`iTunes`同步的播放列表将自动出现在您的 iPod 应用中。但您不限于在电脑上创建播放列表。您可以直接在 iPad
    上创建播放列表和`Genius`（天才）播放列表，从而在移动中构建音频收听体验。


    #### 创建播放列表


    要创建一个标准播放列表，请点击 iPod 应用屏幕左下角的`+`按钮（参见图 7–17）。会弹出一个窗口，要求您为播放列表命名。输入一个名称，然后点击`保存`。紧接着，iPad
    上所有歌曲的列表会滑入屏幕。通过点击每首曲目旁边的蓝色`+`按钮，选择您要包含在播放列表中的歌曲。当您选择一首歌曲时，它会显示为灰色。您还会在歌曲列表的顶部找到一个`添加所有歌曲`选项。不过，添加库中所有歌曲会违背创建播放列表的初衷。


    如果您误选了一首歌曲，此时无法取消选择，但您可以稍后轻松将其移除。您可以将同一首歌曲多次添加到播放列表中。之后，您可以通过编辑播放列表来删除这些副本（下一节将讨论）。


    在向播放列表添加歌曲时，您有几种选项来浏览您的音乐库以找到想要的歌曲。在`添加到播放列表`屏幕的底部，您会看到 iPod 应用的五个分类视图：`歌曲`、`艺术家`、`专辑`、`流派`和`作曲家`。选择其中任意一个，对您的歌曲库进行分类，然后点击相应的歌曲将其添加到播放列表。


    您还可以通过 iPod 应用的`资料库`源列表进行导航，以找到要添加到播放列表的项目。为此，请点击屏幕左上角的`来源`按钮，将出现一个下拉列表，显示您资料库中的来源和现有播放列表（参见图
    7–25）。您可以将有声读物、歌曲和播客组合到同一个播放列表中。添加完歌曲后，点击蓝色的`完成`按钮。


    ![images](img/0725.jpg)


    **图 7–25.** *向播放列表添加歌曲。您可以搜索整个资料库来查找歌曲，或从资料库中选择一个来源或播放列表。*


    #### 编辑播放列表


    当您向新播放列表添加完歌曲并点击右上角的蓝色`完成`按钮后，您将进入播放列表编辑屏幕（参见图 7–26）。此屏幕允许您添加、删除、重新排列和随机播放歌曲，以及完全删除播放列表。


    ![images](img/0726.jpg)


    **图 7–26.** *播放列表编辑屏幕允许您在创建播放列表后进一步自定义它们。*


    您可以从任何现有播放列表中，通过点击其右上角的灰色`编辑`按钮来访问播放列表编辑屏幕。该播放列表编辑屏幕允许您执行以下操作：


    -   *添加歌曲*：点击`添加歌曲`按钮，再次进入`添加到播放列表`屏幕，并按照之前的步骤操作，直到添加完您想要的项目；然后再次点击蓝色的`完成`按钮。

    -   *删除歌曲*：点击白色和红色的减号（`−`）按钮以移除选定的歌曲。点击歌曲右侧出现的红色`删除`按钮以确认删除。从播放列表中移除歌曲不会将其从您的
    iPad 或电脑上的音乐资料库中删除。

    -   *重新排列歌曲*：长按歌曲右侧的拖动条，并进行拖动以在播放列表中重新排列。

    -   *删除播放列表*：如果您决定不再需要该播放列表，请点击源列表中播放列表名称旁边的白色和红色减号（`−`）按钮以删除该播放列表。点击播放列表名称右侧出现的红色`删除`按钮以确认删除。删除播放列表不会将其包含的歌曲从您的
    iPad 或电脑上的音乐资料库中删除。iPod 应用会提示您确认删除。


    **注意：** 您只能编辑标准播放列表。如果您从电脑上的`iTunes`同步了一个智能播放列表（图标旁边带有机器齿轮的那种），您将无法对其进行编辑。

