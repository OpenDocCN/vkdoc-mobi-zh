- fmt: "#### The Books Tab\n\nOne of the big features of the iPad is the ability to\
    \ buy and read e-books in the new iBooks app. You’ll delve into the iBookstore\
    \ and the iBooks app in Chapters 8 and 9, respectively; for now all you need to\
    \ know is that the Books tab in the iPad settings pane is where you control what\
    \ books get synced to your iPad (see [Figure 2–24](#Chapter02.html#fig_2_24)).\n\
    \nMake sure the `Sync Books` check box is selected at the top. In the box below\
    \ it, you will see two radio buttons. `All books` syncs every book in your iTunes\
    \ library. `Selected books` allows you to sync only the books you choose in the\
    \ Books box further down the page.\n\n![images](images/0224.jpg)\n\n**Figure 2–24.**\
    \ *The Books tab allows you to select which books you want to sync to your iPad.*\n\
    \n**NOTE:** Even if you have 300 books in your iTunes library, you might as well\
    \ sync them all. An e-book takes up hardly any space. As a matter of fact, *War\
    \ and Peace*, one of the largest books out there (and also one of the greatest),\
    \ takes up only 1.2MB of disk space. That’s more than 50 percent less than a single\
    \ 128KBps AAC music file. Of course, illustrated books will take up more space,\
    \ but even then they still shouldn’t take any more room than a few MP3s would.\
    \ Don’t worry about a cluttered library, either. You’ll learn how to organize\
    \ your books in [Chapter 9](#Chapter09.html#ch9).\n\nBelow the Books box you will\
    \ see a `Sync Audiobooks` check box (see [Figure 2–24](#Chapter02.html#fig_2_24)).\
    \ Again, there are two options: `All audiobooks` or `Selected audiobooks`.\n\n\
    With `All audiobooks` selected, any audiobooks you have in your iTunes library\
    \ will be synced with your iPad. If you choose `Selected audiobooks`, you’ll be\
    \ presented with the familiar layout you’ve seen on the other media tabs, this\
    \ time with Audiobooks and Parts boxes. In the Audiobooks box, you’ll be able\
    \ to manually select which audiobooks you want to sync. Some audiobooks have separate\
    \ files, or *parts*, that designate chapters. You can select only the parts you\
    \ want to sync for any audiobook in the Parts box.\n\n**NOTE:** Unlike with e-books,\
    \ audiobooks can be quite large since they are basically very long audio files.\
    \ If you have dozens of audiobooks, you may want to transfer only a select few\
    \ to save space.\n\n#### The Photos Tab\n\nViewing photos on the iPad may be pretty\
    \ low on your list of reasons to buy one, but it shouldn’t be. The experience\
    \ is so much better than viewing your photos on your desktop. There’s nothing\
    \ like physically holding your digital photos in your hand and swiping through\
    \ them on the iPad’s gorgeous display. ([Chapter 13](#Chapter13.html#ch13) covers\
    \ working with photos in depth.)\n\nUse the Photos tab to transfer photos onto\
    \ your iPad. Make sure the `Sync Photos from` check box is selected at the top\
    \ (see [Figure 2–25](#Chapter02.html#fig_2_25)); then use the drop-down list to\
    \ the right to select where you want to sync your photos from. On the Mac, your\
    \ options will be iPhoto 4.0.3 or newer, Aperture 3.0.2 or newer, or any folder\
    \ on your computer. On a Windows machine, your options will include Adobe Photoshop\
    \ Elements 3.0 or newer or any folder on your computer.\n\n![images](images/0225.jpg)\n\
    \n**Figure 2–25.** *The Photos tab allows you to select which photos you want\
    \ to sync to your iPad.*\n\nIn the box below the check box, you have three options:\n\
    \n*   *All photos, albums, events, and faces*: Select this option to sync every\
    \ photo from your selected photo application or folder onto your iPad. Again,\
    \ we recommend against this if your photo collections are as large as ours (one\
    \ of us has somewhere around 80GB of travel photos on a Mac). If you have only\
    \ a few thousand photos, load ’em up!\n\n**NOTE:** Unlike newer iPads, the first-generation\
    \ iPads do not have a built-in camera, but you can still add photos to your older\
    \ (or newer!) iPad via the Camera Connection Kit. The $29 kit (available at [`www.store.apple.com`](http://www.store.apple.com))\
    \ includes two adapters—one for connecting a camera through a USB 2.0 cable, the\
    \ other for reading SD memory cards.\n\n*   *Selected albums, events, and faces,\
    \ and automatically include …*: Selecting this option displays Albums, Events,\
    \ and Faces boxes further down the page. From these boxes you can choose which\
    \ iPhoto photo albums and events to sync. You can also choose if you want to sync\
    \ your friends’ faces. *Faces* is a feature in iPhoto that uses facial recognition\
    \ software to create collections of photos in which a certain person appears.\n\
    \n    When you select the check box next to a certain album, event, or face, you’ll\
    \ see the photo count of that selection displayed to the right. With the `Selected\
    \ albums, events, and faces, and automatically include` option selected, you’ll\
    \ be presented with a drop-down list of options allowing you to select all, none,\
    \ or a preset date-specific range of iPhoto photos, even collections.\n\n*   *Include\
    \ video*: When this check box is selected, any video files that you took with\
    \ your digital camera that appear in any of your selected albums will also transfer\
    \ to the iPad. Keep in mind that video can quickly use up storage space."
