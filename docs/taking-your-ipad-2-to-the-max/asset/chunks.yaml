    # iPad 电池保养技巧


    - **关闭推送通知**：某些应用使用 Apple 推送通知来提供提醒。频繁使用时，这些通知往往会导致电池续航下降，因此你可以通过进入`设置`→`通知`并将通知设为“关闭”来禁用推送通知。

    - **关闭 Wi-Fi**：在不使用 Wi-Fi 时，将其关闭以节省电量。进入`设置`→`Wi-Fi`并将 Wi-Fi 设为“关闭”。

    - **使用 Wi-Fi + 3G 的 iPad？** 使用 3G 网络往往会比通过 Wi-Fi 连接更快地消耗电池电量。如果你处于 3G 信号弱或无信号的区域，请关闭
    3G 以延长电池续航。有两种方法可以实现：第一种，选择`设置`→`蜂窝数据`并将蜂窝数据设为“关闭”；第二种方法是直接开启飞行模式，进入`设置`并将飞行模式设为“开启”。

    - **尽量减少定位服务的使用**：iPad 可通过两种方式确定其位置：通过 Skyhook Wireless 的 Wi-Fi 热点位置数据库进行 Wi-Fi
    定位，或在 Wi-Fi + 3G iPad 上通过辅助 GPS 进行定位。这两种方式都会降低电池续航。如果你不需要知道自己的位置或去向，请禁用定位服务。进入`设置`→`定位服务`并将定位服务开关滑动至“关闭”。

    - **调整屏幕亮度**：iPad 默认开启自动亮度调节，这意味着它会在环境光较亮时提高屏幕亮度，在较暗的房间中降低亮度。你可以自行调整亮度：进入`设置`→`亮度与墙纸`，将滑块向左拖动以降低默认屏幕亮度。亮度越低，电池续航越好。

    - **了解你下载的应用**：你在 iPad 上运行的某些应用可能会消耗电池电量。那些阻止屏幕自动变暗的游戏是常见元凶，需要持续运行以进行位置更新的应用也是如此。已知会频繁轮询
    Wi-Fi + 3G iPad GPS 位置的地理追踪应用会迅速拉低电池续航。

    - **让 iPad 远离极端温度**：Apple 建议让 iPad 远离阳光直射和高温车辆。极端高温会导致电池续航下降，还可能引发其他问题（我们稍后将讨论）。Apple
    推荐的 iPad 工作温度范围为 32° 至 95°F（0° 至 35°C），关机状态下的存放温度范围为 -4° 至 113°F（-20° 至 45°C）。

    - **将 iPad 设置为短时间无操作后自动关闭**。自动锁定功能（可通过进入`设置`→`通用`→`自动锁定`进行设置）会在预设时间后自动关闭屏幕。为获得最佳电池续航，请将时间间隔设置为较短的时间，例如一两分钟。


    ## 屏幕保养


    与早期移动设备（如 Apple Newton MessagePad 或 Palm Pilot）上容易刮擦的显示屏不同，iPad 的屏幕由非常耐用且极其坚硬的玻璃制成。尽管它能抵抗大多数刮擦，但最终仍可能被某些物体划伤。除非在极端情况下，这通常不会损坏屏幕，你仍然可以正常使用
    iPad。


    使用 iPad 显示屏时可能遇到的最大问题是它容易沾染指纹。iPad 屏幕带有疏油涂层，但仍然很容易沾染污迹和指纹。


    清理 iPad 屏幕上的指纹和污迹可能会成为一种小小的执念。幸运的是，它们通常只在 iPad 关闭时才清晰可见，因此你无需过度纠结于指纹。当污迹确实干扰 iPad
    使用时，Apple 建议完全关闭 iPad，拔掉所有线缆，然后使用柔软、微湿、不起毛的布进行清洁。我们推荐使用 RadTech ScreenSavrz 清洁布，将其用水略微沾湿，然后拧干，直到几乎不再滴水。


    有些 iPad 用户声称婴儿湿巾也能很好地清洁 iPad 屏幕。它们价格低廉、方便且易于使用。清洁屏幕后，只需用软布擦去任何残留的灰尘或液体残留物即可。


    接下来，用布擦拭屏幕。务必避开 iPad 上的任何开口，例如耳机插孔、基座接口和扬声器。


    **切勿**使用玻璃清洁剂、液体眼镜清洁剂、家用清洁喷雾、酒精、氨水或任何研磨剂来清洁 iPad，因为它们可能会损坏屏幕。


    ### 热量：iPad 的头号敌人


    在之前关于电池续航的部分中，我们提到 Apple 建议让 iPad 远离高温环境以优化电池续航。确保 iPad 保持凉爽还有另一个充分理由：它可能会在过热时关机。


    Apple 在设计 iPad 时没有内置冷却风扇，这样你就不会被风扇的噪音和功耗所困扰。不幸的是，这意味着 iPad 保持冷却的唯一方式是通过热传导将热量散发到周围环境中。


    一些 iPad 用户报告称，当他们的设备处于高环境温度条件下时，屏幕上会显示警告信息，然后 iPad 会关机。要让你的 iPad“重获新生”，你需要将其带到远离阳光直射的阴凉处，直到它冷却下来。这种情况在夏季以及
    iPad 在阳光直射下使用时似乎更为常见。


    ## Apple iPad 配件


    在本书编写时（iPad 发布后不久），已经有数千种第三方配件可供选择。对于许多将在附近 Apple Store 零售店或通过 Apple 在线商店购买的 iPad
    买家来说，Apple 原装配件可能是他们的首选。


    在本节中，我们将介绍 Apple 制造的 iPad 配件，以及如何使用它们来增强你的用户体验。你已经在第 1 章中了解过这些配件；在此，我们将提供关于每种配件如何与你的
    iPad 配合使用的更多细节。


    ### Smart Cover


    我们在本章前面提到过适用于 iPad 2 的 Apple Smart Cover，它可以保护设备屏幕免受刮擦。Smart Cover 在许多其他方面也很有用。


    Smart Cover 由皮革（$69.00）或聚氨酯（$39.00）制成，这意味着当你的 iPad 戴上 Smart Cover 时，更容易握持。我们发现“裸机”iPad
    有些滑，因此使用 Smart Cover 可能至少让我们避免了 iPad 掉落一次。


    Smart Cover 通过非常坚固且位置巧妙的磁铁吸附在 iPad 2 上。只有一种正确的方式可以安装它，当你将保护盖调整到正确的方向时，它实际上会自动吸附到位。


    Smart Cover 上的一块磁铁与 iPad 2 内部的一个小型微动开关协同工作：当保护盖被掀开时唤醒设备，合上时则使其进入休眠状态。这一功能使得无需按下“开/关-睡眠/唤醒”按钮即可唤醒
    iPad。


    我们最喜欢 iPad Smart Cover 的一个特点是，它可以像折纸一样折叠成一个方便的支架，如图 3-14 所示。Smart Cover 其中一个折叠层内部有一块钢板，会被一组磁铁吸附。当折叠成三角形管状时，Smart
    Cover 可以充当支架，在 iPad 上更方便地打字，或者将其支撑成垂直位置以便于观看电影。


    ![images](img/0314.jpg)


    **图 3-14.** *iPad 2 Smart Cover 兼具屏幕保护壳、便捷支架和睡眠/唤醒功能。*

    '
- fmt: '#### iPad 2 Dock


    The Apple iPad 2 Dock (`$29.00`) provides a docking base for charging and syncing
    your iPad 2 (see [Figure 3–15](#Chapter03.html#fig_3_15)).


    ![images](images/0315.jpg)


    **Figure 3–15.** *The Apple iPad 2 Dock is plain and functional.*


    There’s a similar dock available for the original iPad, and many other vendors
    have created docks that are equally functional and less expensive. The iPad 2
    Dock provides access to a `Dock Connector` port and an audio line-out port. It
    holds your iPad at one fixed angle, and there’s no way to adjust the angle. For
    those who wish to use a Bluetooth keyboard with the iPad, the iPad 2 Dock is a
    perfect way to hold the iPad in a useful configuration for typing.


    #### iPad Camera Connection Kit


    For photographers, a very useful accessory from Apple is the iPad Camera Connection
    Kit (see [Figure 3–16](#Chapter03.html#fig_3_16)). The kit consists of two separate
    connectors that plug into the iPad’s `Dock Connector` port. The first has a slot
    for a Secure Digital (SD) memory card like those used in many digital cameras
    and camcorders. When you want to move photos or movies from your camera to your
    iPad for sharing or touch-up, you simply plug in the Camera Connection Kit’s `SD`
    adapter, remove the SD card from your camera, and insert it into the SD slot on
    the Camera Connection Kit.


    ![images](images/0316.jpg)


    **Figure 3–16.** *The iPad Camera Connection Kit consists of a USB adapter (left)
    and an SD memory card reader (right).*


    Even more useful is the second connector, which provides the iPad with a USB port.
    What can you connect to the USB port? A digital camera or camcorder, of course,
    but you can also attach most USB keyboards, USB headsets, and even an iPhone or
    iPod touch. If you’re using your iPhone or iPod touch as a camera and wish to
    move your photos or video to the iPad for editing, the Camera Connection Kit USB
    adapter and the regular iPhone sync cable make beautiful music together.


    The ability to add a USB headset to an iPad makes it a great portable workstation
    for Skype voice chats, and if you have a favorite USB keyboard that you just can’t
    part with, you’ll now be able to use it with your iPad.


    #### iPad 10W USB Power Adapter


    The iPad comes with a 10W USB power adapter for charging, but you may want a second
    adapter for travel or so you can charge up both at home and at work. The iPad
    10W USB Power Adapter has one additional piece that’s not included with the standard
    adapter that you get with your iPad—it’s a 6-foot-long power cord, so you don’t
    need to be right next to the power outlet to get a charge.


    #### Apple VGA Adapter


    When Steve Jobs announced on the iPad on January 27, 2010, he also announced the
    availability of `iWork` for iPad. `iWork` consists of three powerful apps: `Pages`,
    `Keynote`, and `Numbers`.


    Apple’s `Keynote` is presentation software, so for those of us who give presentations
    as part of our work life, this was exciting news. What we needed, however, was
    some way to get the image from the iPad to a standard PC projector or large monitor.


    Minutes later, Jobs announced the Apple VGA Adapter (see [Figure 3–17](#Chapter03.html#fig_3_17)),
    which provides exactly that capability. For the original iPad, the VGA Adapter
    only works with certain apps that have been written to include a set of special
    drivers. On the iPad 2, the VGA Adapter provides true mirroring of everything
    on the screen to an attached display or projector.


    ![images](images/0317.jpg)


    **Figure 3–17.** *The iPad Dock Connector to VGA Adapter is useful for displaying
    Keynote presentations on an external monitor or PC projector.*


    This adapter is a godsend for presenters who don’t want to lug a laptop around.
    With `Keynote` for iPad, the adapter, your iPad, and a PC projector, you’re ready
    to wow the crowd with your presentation.


    #### Apple Digital AV Adapter


    With the introduction of the second-generation iPad, Apple introduced a new cable:
    the Digital AV Adapter. The purpose of this cable is to let your iPad connect
    to the many high-definition displays and TVs that use the `HDMI` connector standard.


    This adapter features a dock connector on one end to plug into the iPad, and an
    `HDMI` cable port on the other end. The `HDMI` side also has another dock connector
    in case you wish to power your iPad while using it to pump video to your HDTV.
    The Digital AV Adapter mirrors content on your iPad 2 screen to an HD display,
    but only works with apps that specifically support video out on the original iPad.


    #### Apple Composite and Component AV Cables


    Not every PC projector or TV uses the `VGA` standard for input of video signals,
    so Apple made sure that the Apple Component and Composite AV cables worked with
    the iPad. Unlike the `VGA` and adapter, which will work in video mirroring mode
    on an iPad 2, these cable works only with applications that have been written
    to take advantage of the video-out capabilities of the iPad. We hope more iPad
    programmers will support video-out in their applications in the future.


    #### Apple Wireless Keyboard


    The Apple Wireless Keyboard is another Apple product that can be used with the
    iPad. This diminutive keyboard is comfortable and has good tactile feedback for
    touch-typing.


    The keyboard uses Bluetooth wireless connectivity to converse with the iPad and
    has two AA batteries that provide power to it. If you have an existing Apple Wireless
    Keyboard and want to use it with your iPad, you will need to pair the keyboard
    with the iPad only—you cannot use it for both your Mac and your iPad unless you
    go through the pairing process each time you want to use it.


    The best thing about the keyboard is that it is not attached to anything, so you
    can use it in front of your iPad, in your lap, or up to 30 feet away from the
    iPad.


    As we mentioned earlier, just about any third-party Bluetooth keyboard will work
    with the iPad. There are a number of vendors who are producing iPad cases that
    incorporate a Bluetooth keyboard, such as the `ZaggMate` (`zagg.com/accessories/zaggmate-ipad-case`)
    and the `Kensington KeyFolio` case (`kensington.com`).


    #### Apple Earphones with Remote and Mic


    Although the iPad essentially uses the same operating system software as an iPhone,
    it’s not designed to make or receive phone calls. Even the iPad Wi-Fi + 3G can’t
    make voice calls except by using FaceTime or Voice over IP (VoIP) software like
    Skype ([`http://skype.com`](http://skype.com)) or Line2 ([`www.line2.com`](http://www.line2.com)).


    Even though you can’t make phone calls with your iPad like you can on any iPhone,
    you’ll still want to listen to music, watch movies, or even take part in the occasional
    FaceTime chat. For that reason, you may want a good set of headphones. The Apple
    Earphones with Remote and Mic have a small switch on one of the earphone cables
    that acts as a remote control for iTunes. If you need to fast-forward to the next
    song, pause, turn the volume up or down, or rewind, you can do it with the remote.


    The remote switch also includes one important component—a small directional microphone
    for picking up your voice. Since these are the same headphones that are included
    with each iPhone, you can use them with your iPad by simply plugging them into
    the headphone jack.


    #### Apple In-Ear Headphones with Remote and Mic


    The last Apple accessory for the iPad that we’ll discuss is another headphone.
    The Apple In-Ear Headphones with Remote and Mic are virtually identical to the
    previous entry, but with one important difference. These headphones actually fit
    inside your ear canal so that you get better sound quality and isolation from
    outside noises.'
