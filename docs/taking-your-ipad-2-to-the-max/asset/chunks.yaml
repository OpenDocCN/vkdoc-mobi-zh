  trans: '

    ### 分享你的照片


    你可以通过多种方式分享 iPad 上的照片。要查看所有分享方式，请将照片全屏显示，然后轻点`共享`按钮，该图标看起来像一个从方框中挣脱出来的箭头。随后将出现一个分享选项的下拉菜单（请参见图
    13–25）：


    ![images](img/1325.jpg)


    **图 13–25.** *共享下拉菜单*


    - **电子邮件照片**：轻点此选项，屏幕上会出现邮件撰写窗口。你会注意到照片已被复制到邮件正文中（请参见图 13–26）。输入收件人邮箱地址、主题和正文，然后轻点`发送`，你的照片就寄出去了！


    ![images](img/1326.jpg)


    **图 13–26.** *新邮件撰写屏幕出现，邮件正文中已包含照片。*


    此外，你也可以在`照片`应用内一次最多通过电子邮件发送五张照片。在相簿中时，轻点`共享`按钮，你会看到相簿菜单更名为`选择照片`。轻点你要发送的最多五张照片，然后轻点左上角的`电子邮件`按钮（请参见图
    13–27）。屏幕上会出现一个邮件撰写窗口，邮件正文中已包含这些照片。请注意，尽管在`照片`应用中一次最多只能通过电子邮件发送五张照片，但你实际上可以复制任意数量的照片，然后打开`邮件`应用，撰写新邮件，并将它们全部粘贴到邮件正文中。


    ![images](img/1327.jpg)


    **图 13–27.** *你可以在照片应用中一次最多通过电子邮件发送五张照片。*


    - **发送至 MobileMe**：`MobileMe` 是 Apple 的电子邮件服务，它还允许你在线发布和分享照片。`发送至 MobileMe` 选项让你可以直接从
    iPad 将照片上传到你的在线 `MobileMe` 图库。轻点`发送至 MobileMe`。将出现一个窗口，要求你为照片命名，并根据需要编写描述（请参见图
    13–28）。选择要发布照片的`MobileMe 图库`相簿，然后轻点`发布`。


    ![images](img/1328.jpg)


    **图 13–28.** *将照片上传到 MobileMe 图库*


    照片上传完成后会弹出一个提示，你可以轻点`在 MobileMe 上查看`，这将带你进入`Safari`浏览器中的 `MobileMe` 网络图库；或者轻点`告诉朋友`，这将打开`邮件`应用，并撰写一封包含照片链接的邮件。


    要使用这些 `MobileMe` 功能，你必须拥有一个 `MobileMe` 帐户。详情请参见 [`www.me.com`](http://www.me.com)。


    - **指定给联系人**：此选项允许你将照片指定给通讯录中的某个联系人。轻点`指定给联系人`，然后从下拉菜单中选择该联系人的通讯录条目（请参见图 13–29）。


    ![images](img/1329.jpg)


    **图 13–29.** *选择要添加照片的联系人。*


    移动和缩放出现在上下不透明条之间的照片缩略图，以便将联系人的脸部放大；然后轻点`使用`按钮（请参见图 13–30）。


    ![images](img/1330.jpg)


    **图 13–30.** *移动和缩放联系人的照片。*


    下次你在 iPad 的`通讯录`应用中查看该联系人时，你为他们选择的图像将出现在其姓名旁边。此图像会与 Mac 上`地址簿`和`Entourage`以及 Windows
    电脑上`Outlook`中的联系人信息同步。


    - **用作墙纸**：轻点此按钮可将选定的图像用作 iPad 上的墙纸。在菜单栏中（请参见图 13–31），你可以选择将此图像用于 iPad 的锁定屏幕、主屏幕，或两者兼用。这不是设置
    iPad 墙纸选项的唯一方法。我们稍后会介绍另一种方法。


    ![images](img/1331.jpg)


    **图 13–31.** *墙纸菜单栏选项让你选择将照片用作哪个屏幕的墙纸。*


    - **打印**：这允许你将照片打印到兼容 `AirPrint` 的打印机。轻点`打印`，然后选择要打印到的打印机以及要打印的份数。我们在第 3 章中介绍了
    `AirPrint` 以及如何从 iPad 进行打印。


    你还可以一次打印多张照片。浏览相簿时，轻点`共享`按钮。你会看到相簿菜单更名为`选择照片`。轻点你想要打印的任意多张照片。每张选中的照片上会出现一个勾选标记（请参见图
    13–27）。选择完所有照片后，轻点左上角的`打印`按钮，然后选择要打印到的打印机以及每张照片的打印份数。


    - **拷贝照片**：轻点`拷贝照片`来复制图像。这会将图像保存到剪贴板，以便稍后粘贴到其他应用（例如邮件或文档）中使用。


    你还可以一次拷贝多张照片。浏览相簿时，轻点`共享`按钮。你会看到相簿菜单更名为`选择照片`。轻点你想要拷贝的任意多张照片。每张选中的照片上会出现一个勾选标记（请参见图
    13–27）。选择完所有照片后，轻点左上角的`拷贝`按钮。这些照片随后可以被批量复制到电子邮件或其他应用中。


    ### 删除你的照片


    Apple 设计为你只能删除 iPad 上属于`相机胶卷`相簿中的照片。此相簿包含你从网页或电子邮件保存到 iPad 的任何照片，以及使用 iPad 2 相机拍摄的照片和视频。Apple
    禁用了从其他同步到 iPad 的相簿中删除照片的功能，因为它不希望用户意外删除存储在电脑上的照片。


    要删除照片，请导航到你的`相机胶卷`相簿，轻点`共享`按钮。轻点你想要删除的照片，它们上面会出现一个勾选标记；然后轻点红色的`删除`按钮（请参见图 13–32）。或者，在`存储的照片`相簿中以全屏显示照片时，你会注意到`共享`按钮旁边有一个垃圾桶图标（请参见图
    13–33）。轻点此按钮会弹出一个`删除照片`确认窗口。轻点`删除照片`即可从 iPad 上删除选定的照片。


    ![images](img/1332.jpg)


    **图 13–32.** *你只能从 iPad 的“存储的照片”相簿中删除照片。*


    ![images](img/1333.jpg)


    **图 13–33.** *“存储的照片”相簿中照片右上角的垃圾桶图标*


    要删除 iPad 上的其他照片，你必须先在电脑上删除它们，然后重新同步 iPad。

    '
- fmt: '### Picture Framing


    On the iPad''s lock screen (the screen that appears when you turn on your iPad
    or wake it from sleep), to the right of the `Slide to Unlock` bar, you''ll notice
    there is a small icon of a flower inside a box (see [Figure 13–34](#Chapter13.html#fig_13_34)).
    This is the `Picture Frame` button. Tap this to turn your iPad into an awesome
    digital picture frame. The picture frame turns your iPad into an interactive piece
    of furniture in your office or living room and is a great way to still "use" the
    iPad while you''re doing other things. You can buy one of the many stands that
    supports the iPad to make best use of the `Picture Frame` feature.


    ![images](images/1334.jpg)


    **Figure 13–34.** *The iPad''s lock screen with `Picture Frame` button in the
    lower right*


    To start the picture frame, lock the iPad by briefly pressing the power button.
    Press the power button or Home button on the iPad again to be taken to the lock
    screen. Tap the `Picture Frame` button to enter picture frame mode. The icon will
    change to a blue color, and the screen will fill with a photo, displaying one
    after the next. To pause the slideshow, tap the screen. The current image will
    pause in the background as the lock screen fades into view. To disable the picture
    frame, tap the blue picture frame icon, and you will return to the lock screen
    with its selected wallpaper displayed.


    You have several options for the `Picture Frame` feature, described next, which
    can be configured from within the iPad''s `Settings` app. Navigate to your iPad
    Home screen, and tap the `Settings` icon. Select `Picture Frame` (see [Figure
    13–35](#Chapter13.html#fig_13_35)).


    ![images](images/1335.jpg)


    **Figure 13–35.** *`Picture Frame` settings*


    - **`Transition`**: Choose between `Dissolve` and `Origami` to flow from one photo
    to the next.

    - **`Show Each Slide For`**: Choose from 2, 3, 5, 10, or 20 seconds.

    - **`Zoom in on Faces`**: When this is set to `ON`, photos that display in the
    picture frame will focus on faces in the picture. It knows which faces you like
    because of the `Faces` feature built into the `Photos` app. If more than one face
    is in a picture, it will choose one at random to focus on. Face zooming is only
    an option when transitions are set to `dissolve`.

    - **`Shuffle`**: When set to `ON`, your photos will show in a random order.


    The `Picture Frame` feature will display all the photos from your `Photos` app
    by default. You can select to show only photos from certain albums, faces, or
    events by selecting their category and then selecting the one you want to show.


    ### Changing the Wallpaper Without Using the Photos App


    We showed you how to set your wallpaper from a photo in the `Photos` app, but
    you can also set it from within the iPad''s `Settings` app. To do this, navigate
    to your iPad Home screen, and tap the `Settings` icon. Select `Brightness & Wallpaper`.
    You''ll see two images, one representing your iPad''s lock screen and the other
    its Home screen (see [Figure 13–36](#Chapter13.html#fig_13_36)). The pictures
    you see on each image show you the wallpaper you have selected for each one currently.


    ![images](images/1336.jpg)


    **Figure 13–36.** *The `Brightness & Wallpaper` settings*


    Tap the images to be taken to the wallpaper selection screen (see [Figure 13–37](#Chapter13.html#fig_13_37)).
    Here you''ll see a list of every album in your `Photos` app and also a new album
    labeled `Wallpaper`.


    ![images](images/1337.jpg)


    **Figure 13–37.** *You can select from Apple''s included wallpapers or use any
    photo you have on your iPad as wallpaper.*


    `Wallpaper` includes images Apple included on the iPad to be used as wallpaper.
    Select an image from any album, and you''ll get a full-screen preview of it. Then
    tap `Set Lock Screen`, `Set Home Screen`, or `Set Both` to use the image for the
    background of the lock screen, Home screen, or both the lock screen and Home screen
    (see [Figure 13–31](#Chapter13.html#fig_13_31)). If you choose to use the image
    just for, say, the lock screen, you can go back and select another image for the
    Home screen.


    ### Viewing Videos


    With the iPad 2, Apple added front and rear cameras that, among other things,
    allow you to record video (see [Chapter 15](#Chapter15.html#ch15) for all the
    things you can do with the iPad 2''s cameras). You can also import recorded video
    from a digital still camera using the `iPad Camera Connection Kit` (see earlier
    in the chapter). All recorded or imported video is stored in the `Camera Roll`
    album. To view any video you have recorded or imported onto the iPad, simply tap
    its thumbnail in the `Camera Roll`. The video will appear with a big play button
    in the center. Tap any area of the screen once to bring up the onscreen video
    controls (see [Figure 13–38](#Chapter13.html#fig_13_38)).


    ![images](images/1338.jpg)


    **Figure 13–38.** *Displaying video from the `Camera Roll`. Tap once to bring
    up the onscreen menus.*


    Once you display a video full-screen, you have several ways to interact with it:


    - Tap the video once to play it. Tap the play/pause button in the upper-left corner
    to pause it.

    - Scrub through the video by tapping and holding the silver drag bar in the scrubber
    bar. The scrubber bar shows you segments of the video represented by thumbnails
    for those segments.

    - Hold your finger on the scrubber bar for a few seconds, and you''ll see the
    scrubber bar stretch out. This gives you finer control over finding a specific
    spot in the video.


    The video overlay menu bar at the top of the screen shows you the back button,
    labeled `Camera Roll`, to return to the main `Camera Roll`. You can tap the `Done`
    button to exit the `Camera Roll` and return to the `Camera` app. You''ll also
    see the `Share` button and the trash can icon, which will bring up a deletion
    confirmation menu. Tap the red `Delete Video` button to delete the selected video.


    #### Editing Your Video


    Apple has included limited video-editing functionality in the `Camera` app. Video
    editing isn''t exactly the right word, though. *Trimming* is more accurate because
    you can shorten, or *trim*, the video at the front and end of the clip.


    To trim a video, bring up the video menu overlays (see [Figure 13–38](#Chapter13.html#fig_13_38)).
    Next, grab the beginning of the scrubber bar, and pull it to the right. This activates
    trim mode (see [Figure 13–39](#Chapter13.html#fig_13_39)).


    ![images](images/1339.jpg)


    **Figure 13–39.** *Video trim mode*


    In trim mode, you can drag the ends of the scrubber bar, now outlined in yellow,
    toward the center. Dragging the ends shortens the clip at the beginning and the
    end.


    Trimming is a great feature that allows you to highlight just the really good
    portions of your video clips. When you''ve adjusted your trim commands, tap the
    yellow `Trim` button to bring up a `Trim` pop-up (see [Figure 13–40](#Chapter13.html#fig_13_40)).


    ![images](images/1340.jpg)


    **Figure 13–40.** *The `Trim` pop-up lets you trim the original or save the trim
    as a new clip.*


    The `Trim` pop-up gives you two options:


    - **`Trim Original`**: This actually changes the original video recording. It
    will permanently delete the sections of video you have trimmed out.

    - **`Save as New Clip`**: This leaves your original video intact and creates a
    completely new video file of just the trim you specified.


    To cancel a trim, simply tap anywhere outside of the `Trim` pop-up. Remember that
    if you choose to keep the original clip, storage space on your iPod can quickly
    fill up. A one-minute clip took up a whopping 120MB of space on our iPad.'
  raw: '### Picture Framing


    On the iPad''s lock screen (the screen that appears when you turn on your iPad
    or wake it from sleep), to the right of the Slide to Unlock bar, you''ll notice
    there is a small icon of a flower inside a box (see [Figure 13–34](#Chapter13.html#fig_13_34)).
    This is the Picture Frame button. Tap this to turn your iPad into an awesome digital
    picture frame. The picture frame turns your iPad into an interactive piece of
    furniture in your office or living room and is a great way to still “use” the
    iPad while you''re doing other things. You can buy one of the many stands that
    supports the iPad to make best use of the Picture Frame feature.


    ![images](images/1334.jpg)


    **Figure 13–34.** *The iPad''s lock screen with Picture Frame button in the lower
    right*


    To start the picture frame, lock the iPad by briefly pressing the power button.
    Press the power button or Home button on the iPad again to be taken to the lock
    screen. Tap the Picture Frame button to enter picture frame mode. The icon will
    change to a blue color, and the screen will fill with a photo, displaying one
    after the next. To pause the slideshow, tap the screen. The current image will
    pause in the background as the lock screen fades into view. To disable the picture
    frame, tap the blue picture frame icon, and you will return to the lock screen
    with its selected wallpaper displayed.


    You have several options for the Picture Frame feature, described next, which
    can be configured from within the iPad''s Settings app. Navigate to your iPad
    Home screen, and tap the Settings icon. Select Picture Frame (see [Figure 13–35](#Chapter13.html#fig_13_35)).


    ![images](images/1335.jpg)


    **Figure 13–35.** *Picture Frame settings*


    *   *Transition*: Choose between Dissolve and Origami to flow from one photo to
    the next.

    *   *Show Each Slide For*: Choose from 2, 3, 5, 10, or 20 seconds.

    *   *Zoom in on Faces*: When this is set to ON, photos that display in the picture
    frame will focus on faces in the picture. It knows which faces you like because
    of the Faces feature built into the Photos app. If more than one face is in a
    picture, it will choose one at random to focus on. Face zooming is only an option
    when transitions are set to dissolve.

    *   *Shuffle*: When set to ON, your photos will show in a random order.


    The Picture Frame feature will display all the photos from your Photos app by
    default. You can select to show only photos from certain albums, faces, or events
    by selecting their category and then selecting the one you want to show.


    ### Changing the Wallpaper Without Using the Photos App


    We showed you how to set your wallpaper from a photo in the Photos app, but you
    can also set it from within the iPad''s Settings app. To do this, navigate to
    your iPad Home screen, and tap the Settings icon. Select Brightness & Wallpaper.
    You''ll see two images, one representing your iPad''s lock screen and the other
    its Home screen (see [Figure 13–36](#Chapter13.html#fig_13_36)). The pictures
    you see on each image show you the wallpaper you have selected for each one currently.


    ![images](images/1336.jpg)


    **Figure 13–36.** *The Brightness & Wallpaper settings*


    Tap the images to be taken to the wallpaper selection screen (see [Figure 13–37](#Chapter13.html#fig_13_37)).
    Here you''ll see a list of every album in your Photos app and also a new album
    labeled Wallpaper.


    ![images](images/1337.jpg)


    **Figure 13–37.** *You can select from Apple''s included wallpapers or use any
    photo you have on your iPad as wallpaper.*


    Wallpaper includes images Apple included on the iPad to be used as wallpaper.
    Select an image from any album, and you''ll get a full-screen preview of it. Then
    tap Set Lock Screen, Set Home Screen, or Set Both to use the image for the background
    of the lock screen, Home screen, or both the lock screen and Home screen (see
    [Figure 13–31](#Chapter13.html#fig_13_31)). If you choose to use the image just
    for, say, the lock screen, you can go back and select another image for the Home
    screen.


    ### Viewing Videos


    With the iPad 2, Apple added front and rear cameras that, among other things,
    allow you to record video (see [Chapter 15](#Chapter15.html#ch15) for all the
    things you can do with the iPad 2''s cameras). You can also import recorded video
    from a digital still camera using the iPad Camera Connection Kit (see earlier
    in the chapter). All recorded or imported video is stored in the Camera Roll album.
    To view any video you have recorded or imported onto the iPad, simply tap its
    thumbnail in the Camera Roll. The video will appear with a big play button in
    the center. Tap any area of the screen once to bring up the onscreen video controls
    (see [Figure 13–38](#Chapter13.html#fig_13_38)).


    ![images](images/1338.jpg)


    **Figure 13–38.** *Displaying video from the Camera Roll. Tap once to bring up
    the onscreen menus.*


    Once you display a video full-screen, you have several ways to interact with it:


    *   Tap the video once to play it. Tap the play/pause button in the upper-left
    corner to pause it.

    *   Scrub through the video by tapping and holding the silver drag bar in the
    scrubber bar. The scrubber bar shows you segments of the video represented by
    thumbnails for those segments.

    *   Hold your finger on the scrubber bar for a few seconds, and you''ll see the
    scrubber bar stretch out. This gives you finer control over finding a specific
    spot in the video.


    The video overlay menu bar at the top of the screen shows you the back button,
    labeled Camera Roll, to return to the main Camera Roll. You can tap the Done button
    to exit the Camera Roll and return to the Camera app. You''ll also see the Share
    button and the trash can icon, which will bring up a deletion confirmation menu.
    Tap the red Delete Video button to delete the selected video.


    #### Editing Your Video


    Apple has included limited video-editing functionality in the Camera app. Video
    editing isn''t exactly the right word, though. *Trimming* is more accurate because
    you can shorten, or *trim*, the video at the front and end of the clip.


    To trim a video, bring up the video menu overlays (see [Figure 13–38](#Chapter13.html#fig_13_38)).
    Next, grab the beginning of the scrubber bar, and pull it to the right. This activates
    trim mode (see [Figure 13–39](#Chapter13.html#fig_13_39)).


    ![images](images/1339.jpg)


    **Figure 13–39.** *Video trim mode*


    In trim mode, you can drag the ends of the scrubber bar, now outlined in yellow,
    toward the center. Dragging the ends shortens the clip at the beginning and the
    end.


    Trimming is a great feature that allows you to highlight just the really good
    portions of your video clips. When you''ve adjusted your trim commands, tap the
    yellow Trim button to bring up a Trim pop-up (see [Figure 13–40](#Chapter13.html#fig_13_40)).


    ![images](images/1340.jpg)


    **Figure 13–40.** *The Trim pop-up lets you trim the original or save the trim
    as a new clip.*


    The Trim pop-up gives you two options:


    *   *Trim Original*: This actually changes the original video recording. It will
    permanently delete the sections of video you have trimmed out.

    *   *Save as New Clip*: This leaves your original video intact and creates a completely
    new video file of just the trim you specified.


    To cancel a trim, simply tap anywhere outside of the Trim pop-up. Remember that
    if you choose to keep the original clip, storage space on your iPod can quickly
    fill up. A one-minute clip took up a whopping 120MB of space on our iPad.'
  trans: '

    ### 相框功能


    在 iPad 的锁定屏幕（即开启 iPad 或将其从睡眠状态唤醒时出现的屏幕）上，`滑动来解锁` 条的右侧，你会注意到一个盒子形状内含花朵的小图标（参见 图
    13-34）。这就是 `相框` 按钮。轻点此按钮，即可将你的 iPad 变成一个惊艳的电子相框。电子相框功能能将你的 iPad 变成你办公室或客厅里的一件互动家具，也是一种在你忙碌其他事务时仍能“使用”iPad
    的好方法。你可以购买众多支持 iPad 的支架之一来更好地利用 `相框` 功能。


    ![images](img/1334.jpg)


    **图 13-34.** *右下角带有 `相框` 按钮的 iPad 锁定屏幕*


    要启动相框，请短按电源键锁定 iPad。再次按下 iPad 的电源键或主屏幕按钮，即可进入锁定屏幕。轻点 `相框` 按钮进入相框模式。图标将变为蓝色，屏幕将填满照片，并一张接一张地显示。要暂停幻灯片放映，请轻点屏幕。当前图像会在背景中暂停，同时锁定屏幕逐渐显现。要关闭相框，请轻点蓝色的相框图标，你将返回到显示所选壁纸的锁定屏幕。


    `相框` 功能有多个选项，如下所述，这些选项可以在 iPad 的 `设置` 应用中进行配置。导航至 iPad 主屏幕，轻点 `设置` 图标。选择 `相框`（参见
    图 13-35）。


    ![images](img/1335.jpg)


    **图 13-35.** *`相框` 设置*


    - **`过渡效果`**：选择 `溶解` 或 `折纸` 效果，让照片之间流畅切换。

    - **`每张幻灯片显示时长`**：选择 2、3、5、10 或 20 秒。

    - **`面部特写`**：将此选项设为 `打开` 后，相框中显示的照片将聚焦于画面中的人物面部。由于 `照片` 应用内置了 `面孔` 功能，它知道你喜爱哪些面孔。如果一张照片中有多张面孔，它会随机选择一张进行聚焦。面部放大功能仅在过渡效果设置为
    `溶解` 时可用。

    - **`随机播放`**：设为 `打开` 后，你的照片将按随机顺序显示。


    默认情况下，`相框` 功能会显示 `照片` 应用中的所有照片。你可以通过选择特定类别，然后选择你想要显示的特定相簿、面孔或事件，来仅显示其中的部分照片。


    ### 在不使用照片应用的情况下更改壁纸


    我们之前展示了如何通过 `照片` 应用中的照片来设置壁纸，但你也可以在 iPad 的 `设置` 应用中直接设置。为此，请导航至 iPad 主屏幕，轻点 `设置`
    图标。选择 `亮度与墙纸`。你会看到两张图片，一张代表 iPad 的锁定屏幕，另一张代表主屏幕（参见 图 13-36）。每张图片上显示的画面就是你当前为各自屏幕选定的壁纸。


    ![images](img/1336.jpg)


    **图 13-36.** *`亮度与墙纸` 设置*


    轻点这些图片，即可进入壁纸选择屏幕（参见 图 13-37）。在这里，你将看到 `照片` 应用中所有相簿的列表，以及一个标为 `墙纸` 的新相簿。


    ![images](img/1337.jpg)


    **图 13-37.** *你可以从苹果自带的壁纸中进行选择，或使用 iPad 上的任意照片作为壁纸。*


    `墙纸` 包含了苹果预装在 iPad 上用作壁纸的图像。从任意相簿中选择一张图片，你将获得全屏预览。然后轻点 `设定锁定屏幕`、`设定主屏幕` 或 `同时设定`，即可将该图片用作锁定屏幕、主屏幕的背景，或者同时用作两者的背景（参见
    图 13-31）。如果你选择仅将图片用于锁定屏幕，可以稍后返回选择另一张图片用于主屏幕。


    ### 观看视频


    在 iPad 2 上，苹果增加了前后摄像头，除其他功能外，还允许你录制视频（有关 iPad 2 摄像头的所有功能，请参见第 15 章）。你也可以使用 `iPad
    相机连接套件` 从数码相机导入录制的视频（参见本章前文）。所有录制或导入的视频都存储在 `相机胶卷` 相簿中。要观看你在 iPad 上录制或导入的任何视频，只需轻点
    `相机胶卷` 中的缩略图。视频将显示出来，中间有一个大的播放按钮。轻点屏幕任意区域一次，即可调出屏幕视频控制项（参见 图 13-38）。


    ![images](img/1338.jpg)


    **图 13-38.** *从 `相机胶卷` 播放视频。轻点一次可调出屏幕菜单。*


    一旦你全屏显示视频，有以下几种交互方式：


    - 轻点视频一次即可播放。轻点左上角的播放/暂停按钮可暂停播放。

    - 通过按住并拖动进度条中的银色拖动条来快速浏览视频。进度条会显示由缩略图表示的视频片段区域。

    - 将手指在进度条上按住几秒钟，你会看到进度条展开。这让你能够更精细地控制定位视频中的特定位置。


    屏幕顶部的视频叠加菜单栏显示了一个返回按钮，标为 `相机胶卷`，用于返回主 `相机胶卷`。你可以轻点 `完成` 按钮退出 `相机胶卷` 并返回 `相机` 应用。你还会看到
    `共享` 按钮和垃圾桶图标，点击后会弹出删除确认菜单。轻点红色的 `删除视频` 按钮即可删除选定的视频。


    #### 编辑你的视频


    苹果在 `相机` 应用中包含了有限的视频编辑功能。不过，视频编辑这个词并不准确。*修剪* 更贴切，因为你可以缩短（或 *修剪*）视频片段的开头和结尾。


    要修剪视频，请调出视频菜单覆盖层（参见 图 13-38）。接下来，抓住进度条的开头，将其向右拖动。这将激活修剪模式（参见 图 13-39）。


    ![images](img/1339.jpg)


    **图 13-39.** *视频修剪模式*


    在修剪模式下，你可以将当前以黄色轮廓标示的进度条两端向中心拖动。拖动两端会缩短片段的开头和结尾。


    修剪是一项很棒的功能，它可以让你只突出显示视频片段中真正精彩的部分。调整好修剪指令后，轻点黄色的 `修剪` 按钮，会弹出一个 `修剪` 弹出窗口（参见 图
    13-40）。


    ![images](img/1340.jpg)


    **图 13-40.** *`修剪` 弹出窗口让你可以修剪原始视频或将修剪部分保存为新片段。*


    `修剪` 弹出窗口提供两个选项：


    - **`修剪原片`**：这实际上会更改原始视频录制文件。它将永久删除你修剪掉的视频片段。

    - **`存储为新剪辑`**：这会保留你的原始视频不变，并为你指定的修剪部分创建一个全新的视频文件。


    要取消修剪，只需轻点 `修剪` 弹出窗口之外的任意区域。请记住，如果你选择保留原始片段，iPod 上的存储空间会很快填满。在我们的 iPad 上，一分钟的片段就占用了高达
    120MB 的空间。

