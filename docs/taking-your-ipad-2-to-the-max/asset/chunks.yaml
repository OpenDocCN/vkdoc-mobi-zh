    ### Street View


    Street view is the fifth way to view maps that we mentioned earlier. Street view
    uses Google technology to display 360-degree panoramic views of a given location.
    To enter Street view, tap the white and orange `Street View` icon in the pin’s
    Information bar (see [Figure 12-9](#Chapter12.html#fig_12_9)) or tap the picture
    thumbnail in the Information window (see [Figure 12-11](#Chapter12.html#fig_12_11)).
    Your map will begin to zoom in on the pin; it will then tilt up and present you
    with a street-level panoramic view (see [Figure 12-13](#Chapter12.html#fig_12_13)).


    ![images](images/1213.jpg)


    **Figure 12-13.** *Street view fills the entire screen. Tap the white `Arrow`
    icon on the road to move forward down the street. Tap the map’s `Navigation` icon
    to return to Map view.*


    Google has had Street view available on the Web for some time, but using it on
    the iPad brings it to a whole different level. The fact that you can touch and
    drag and pinch and zoom around the street gives Street view an immediacy it’s
    never had previously.


    While in Street view, drag your finger around to experience the 360-degree panoramic
    views. Pinch or double-tap the screen to zoom in. Reverse-pinch to zoom back out.
    To “walk” down the street, find the big white `Arrow` icons at the end of a street
    label and tap them. You’ll then move in that direction.


    The small circular `Navigation` icon sits at the bottom right of a Street view
    map. It shows you the direction you are looking in. Tap the icon to return to
    your last Map view location.


    Street view isn’t available in all cities yet, but it is in most major North American
    and European ones. Street view is a wonderful tool because it lets you check out
    what a place or area looks like in advance. Thinking of moving to a new area of
    town? You can virtually scroll down the street in Street view to see whether you
    like the looks of it before you take the time and trouble to start searching for
    houses in the neighborhood.


    ### Current Location


    Curious about where you are in the world? The Maps app allows you to find your
    current location with a tap of a button. The `Current Location` button is in the
    toolbar at the top of the screen (see [Figure 12-3](#Chapter12.html#fig_12_3)).
    It looks like an arrowhead. Tap it to jump to your current location on the map.


    The `Current Location` feature works by using the iPad’s built-in positioning
    tools. These built-in tools vary depending on which iPad you have. The iPad Wi-Fi
    + 3G uses both GPS and Skyhook Wi-Fi positioning to locate you. The iPad Wi-Fi
    only uses Skyhook Wi-Fi positioning, because there is no GPS chip inside the iPad
    Wi-Fi.


    GPS uses satellite-location technology to pinpoint your location with an accuracy
    of up to 16 feet (five meters). Skyhook Wi-Fi positioning uses known wireless
    hotspot locations to triangulate your current position with an accuracy of 60
    to 100 feet (20 to 30 meters).


    As mentioned earlier, if you have an iPad Wi-Fi + 3G, it will use both technologies
    to pinpoint your location. Even though GPS has a much more accurate range, there
    are some areas where Skyhook has an advantage over GPS, namely in urban locations.
    Tall buildings can obscure GPS satellite signals, so Skyhook’s wireless network
    triangulation has an advantage there.


    Your current location is signified by a blue dot, as shown in [Figure 12-14](#Chapter12.html#fig_12_14).
    If the `Maps` app can’t determine your exact location, a blue circle appears around
    the dot. The circle can range in size—its size depends on how precisely your location
    can be determined. The circle means that you are somewhere in the vicinity of
    that circle on the map. The smaller the circle, the more precise the current location
    marker.


    ![images](images/1214.jpg)


    **Figure 12-14.** *The blue dot surrounded by the circle represents your approximate
    location.*


    **NOTE:** Location Services must be turned on for your iPad to find your current
    location. To turn on Location Services, go to Settings `![images](images/U001.jpg)
    Location Services` and make sure the switch is set to `ON`.


    When you are in `Current Location` mode, the `Current Location` icon in the toolbar
    turns blue. After you’ve found your current location, if you drag the map around,
    you can simply tap the `Current Location` button again to have the map center
    back on it.


    You can tap the blue current location dot on the map to open the current location’s
    Information bar (see [Figure 12-15](#Chapter12.html#fig_12_15)). The address of
    the current location will be displayed. Tap the `i` button to get the Information
    window for the location, including the ability to get directions to/from the location,
    bookmark it, add it to contacts, or e-mail the location. Tap the `Street View`
    button to enter Street view (if available in the area).


    ![images](images/1215.jpg)


    **Figure 12-15.** *The current location’s Information bar displays the address
    of your current location.*


    ### Digital Compass


    Not only can your iPad find your current location, but when it does, you can use
    it as a compass. With your current location found, tap the blue `Current Location`
    button in the toolbar to activate the `Digital Compass` mode.


    The `Current Location` icon changes to a `Compass` icon in the toolbar (see [Figure
    12-16](#Chapter12.html#fig_12_16)), and a headlight emanates from the blue dot
    on the map to show you the location you are facing (see [Figure 12-17](#Chapter12.html#fig_12_17)).
    The map will rotate as you do, so the top of the map will always show what’s ahead
    of you, and the bottom will show what’s behind you. A compass will appear in the
    top right of the screen to show you which way north is.


    ![images](images/1216.jpg)


    **Figure 12-16.** *The `Current Location` button (left) turns into the `Digital
    Compass` button (right) when you tap it twice.*


    ![images](images/1217.jpg)


    **Figure 12-17.** *Digital Compass mode. This is the same image as in [Figure
    12-14](#Chapter12.html#fig_12_14), but with the `Digital Compass` turned on. Notice
    how the map is pointing the other direction; that’s because the iPad is facing
    that direction, which in this case is south. Note the compass pointing north in
    the upper-right corner and the “headlight” emanating from the blue current location
    dot.*


    The first time you use `Digital Compass` mode, you’ll need to calibrate the compass.
    A gray icon will appear on the screen telling you to move your iPad in a figure
    eight (see [Figure 12-18](#Chapter12.html#fig_12_18)). Doing so will complete
    the calibration. Lots of metal and magnets (like those found in a car’s speaker
    system) affect compasses. You may need to calibrate the compass from time to time,
    but the iPad will tell you when calibration is needed.


    ![images](images/1218.jpg)


    **Figure 12-18.** *The Digital Compass calibration notice*


    **TIP:** The `Current Location` and `Digital Compass` features are cool, but both
    require `Location Services` to be on, which requires extra battery power. If you
    aren’t using either, turn `Location Services` off to conserve battery power. To
    turn off `Location Services`, select Settings `![images](images/U001.jpg) Location
    Services` and make sure the switch is set to `OFF`.


    ### Bookmarking and Viewing Saved Locations


    There are two ways you can bookmark locations you’ve navigated to in Maps: by
    dropping a pin or by tapping the `Add to Bookmarks` button in the location’s Information
    window. Dropping a pin allows you to mark any location on a map, regardless of
    whether it has a physical address; you can then add the pin’s location to your
    saved bookmarks. Once you’ve saved locations, you can view them all in the handy
    `Bookmarks` menu.

