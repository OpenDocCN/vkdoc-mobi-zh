  trans: '

    ### iPad 与 Flash 视频


    若你曾在网上观看过视频，那么该视频很可能使用了 Flash 编码。自苹果公司向世界推出 iPhone 以来，苹果与 Adobe 之间的关系便日益紧张。原因在于：苹果不允许
    Adobe 专有的 Flash 插件在 iPhone 或后来的 iPad 上运行。


    在苹果看来，Flash 是一项速度慢、漏洞多且过时的技术。史蒂夫·乔布斯本人甚至曾在苹果官网上发布公开信，向全世界阐明这一观点（[`www.apple.com/hotnews/thoughts-on-flash/`](http://www.apple.com/hotnews/thoughts-on-flash/)）。这封信也为那些希望在
    iPad 或 iPhone 上看到 Flash 的人彻底关上了大门。


    许多人听到“iPad 不支持 Flash”时，误以为 iPad 无法播放网络视频。事实远非如此。当然，如果某个视频是用 Flash 编码的，你确实无法在 iPad
    上观看。虽然网络上约 75% 的视频（据乔布斯称）使用 Flash 编码，但其中大多数也支持一种名为 `HTML5` 的新通用网络标准。`HTML5` 视频无需插件即可播放。同时，`HTML5`
    的功耗远低于 Flash——对于依赖电池供电的移动设备而言，这无疑是一项重要特性。


    世界正转向 `HTML5`，苹果选择支持它以及开放标准，而非 Adobe 陈旧且专有的 Flash。YouTube 的大部分视频已重新编码以支持 `HTML5`，许多其他主流网站也已弃用
    Flash，转而采用新的 `HTML5` 网络标准。


    ### 总结


    iPad 将上网浏览从一件只能在书桌前完成的事情，变成了一件可以在客厅里舒适地放在腿上完成的活动。从某种意义上说，在 iPad 上浏览网页赋予了网页前所未有的“触感”——你只需伸出手指即可触摸它们。很可能，在
    iPad 上使用 `Safari` 浏览网页后，你将再也不想用其他方式探索网络了。


    以下是一些你在继续阅读本章后需要牢记的技巧：


    - iPad 不仅支持传统的纵向（竖屏）模式。你可以将 iPad 横向翻转，以横向模式查看网页。你的 `Safari` 页面会自动调整。

    - 没错，它不支持 Flash。永远也不会支持。而且你并不需要它。

    - 网络剪辑是直接从 iPad 主屏幕访问你喜爱网站的好方法。

    - 轻点任意 `Safari` 页面的顶部（状态栏中时钟的正下方），即可快速返回网页顶部。

    - `Safari` 的页面管理工具可让你在多个 `Safari` 窗口之间来回切换。其功能类似于桌面浏览器中标签页的工作方式。


    ## 第 7 章


    ## 掌控你的音乐与视频


    iPad 为你与媒体互动提供了全新的方式。iPad 配备了一款出色的专用音乐播放器，只需轻点几下，你就可以从众多其他应用中访问相同的音频，在游戏和工作中尽情享受音乐。当你在
    iPad 上观看电视节目、电影或短视频时，其宽屏视频播放能力和出色的电视集成功能，能为你呈现比以往任何时候都更大、更清晰美丽的图像。此外，iPad 的无线网络功能让你能够访问海量内容——从
    YouTube 到网络上的嵌入式视频，再到你自己的个人电脑——并且可以将设备上已有的内容共享到外部播放器。本章将介绍让你在 iPad 上享受音乐和视频的主要应用：`Videos`、`YouTube`、`Safari`
    和 `iPod`。


    ### 在 iPad 上观看视频


    视频是 iPad 的基本组成部分，你不应将其仅仅视为一个单独的应用。苹果提供了多项内置应用所使用的基础技术，这些应用支持第三方媒体的视频播放。以下列表简要概述了这些苹果提供的应用（参见图
    7–1）。


    **注：** 第 15 章将讨论如何使用 iPad 新增的内置摄像头系统录制和播放自己制作的视频。


    ![images](img/0701.jpg)


    **图 7–1.** *Videos、YouTube 和 Safari 在 iPad 上都具备视频播放功能。*


    - *`Videos`*：`Videos` 应用位于 iPad 的主屏幕上。其图标看起来像一块传统的拍板，顶部为黑白条纹，底部为蓝色。该应用用于播放你从家庭
    iTunes 资料库同步过来的电视节目、电影、播客、iTunes U 课程和音乐视频。

    - *`YouTube`*：在图 7–1 中，你会发现 `YouTube` 应用图标就在 `Videos` 应用图标旁边。该图标看起来像一台老式电视，带有绿色屏幕和棕色旋钮。`YouTube`
    连接互联网，允许你观看来自 `YouTube.com` 的视频。你可以在 iPad 的 `Safari` 中导航至 [`www.youtube.com`](http://www.youtube.com)
    并通过这种方式浏览 YouTube 视频，但 iPad 的 `YouTube` 应用将 [`www.youtube.com`](http://www.youtube.com)
    包装得如此精美且易于导航，你会发现它远比在网页浏览器中使用 YouTube 要好得多。

    - *`Safari`*：你在第 6 章中已深入了解了 `Safari`，它提供了第三种观看视频的方式。与其桌面版类似，`Safari` 应用允许你观看嵌入的影片文件。`Safari`
    的图标看起来像一个浅蓝色的指南针，指针指向东北方向。


    除了 iPad 自带的这三款播放视频的应用外，还有成千上万的其他应用也能播放视频。你可以在 iTunes Store 中发现所有这些应用。我们最喜欢的一些应用包括用于观看新闻视频的
    BBC News 应用，以及用于观看天气相关新闻报道和多普勒视频的 The Weather Channel 应用。


    尽管 iPad 在视频方面功能强大，但它也有局限性。你的 iPad 内置应用只能播放 `H.264 MPEG-4` 视频，仅此而已。正如前一章所述，你无法使用
    iPad 的标准应用来观看 Flash/Shockwave 视频或动画。你无法播放 `AVI` 视频。你无法播放 `DivX`、`Xvid` 或其他几十种流行格式。如果你的视频不是
    `H.264 MPEG-4` 格式，你的 iPad 在没有辅助的情况下将无法识别它。


    幸运的是，App Store 可以帮助你解决这一限制。一些第三方应用让你能够以 iPad 官方不支持的格式观看视频。这些视频播放应用包括 `CineXPlayer`、`yxplayer`
    和 `Azul Media Player`。这些播放器支持多种内容格式，包括 `WMV`、`AVI`、`DivX` 和 `Flash FLV` 等。由于这些应用运行在苹果内置媒体支持之外，你通常需要将内容预先加载到每个应用中。使用
    iTunes 的“应用”标签页中的“文件共享”部分来添加和删除视频文件。


    某些应用还允许你直接通过网络 URL 访问媒体，甚至能播放嵌入在网页中的 Flash 视频（`FLV`）（而非直接链接到 `FLV` 资源的 URL）。自定义网页浏览器
    `Skyfire` 通过边缘案例提供了 Flash 视频播放支持。但并非总能成功，因为像 Hulu 这样的收费网站目前会禁用任何通过其自定义播放器之外解决方案访问
    iPad 视频的途径（例如 Hulu 的 Hulu Plus 播放器）。即使 iPad 上的 Flash 限制被解除，Hulu 自身的限制也意味着它不会向移动浏览器自由分发视频。


    对此问题的普遍共识是，尽管 Adobe 的 Flash 技术已准备好用于 iPad 和 iOS 平台一段时间，但 Adobe 与苹果之间的关系，更不用说苹果公司史蒂夫·乔布斯的直言不讳，使得该技术一直未能登上这一平台。


    **注：** 苹果 iPad 官方支持 `H.264` 视频，最高可达 `1.5Mbps`、`1024` x `768` 像素、`30` 帧每秒，以及 `M4V`、`MP4`
    和 `MOV` 文件格式下的 `720p` 分辨率。

