- fmt: '# Safari''s Browser Window


    Many elements on the Safari window may look familiar, especially to anyone experienced
    in using web browsers or Safari on the iPhone or iPod touch. Familiar elements
    include the Address bar, the Reload button, and the History navigation arrows.
    [Figure 6–2](#Chapter06.html#fig_6_2) shows a typical Safari browser window.


    ![images](images/0602.jpg)


    **Figure 6–2.** *The Safari window displays many familiar features, including
    the Address bar and the Back, Forward, and Bookmarks buttons.*


    Let''s look more closely at the top of a Safari page. Atop every Safari window,
    you''ll see the Navigation bar (see [Figure 6–3](#Chapter06.html#fig_6_3)). The
    Navigation bar contains common buttons and tools found on any modern web browser.
    From left to right, they are as follows:


    ![images](images/0603.jpg)


    **Figure 6–3.** *The Safari Navigation bar*


    - **The Back button**: This takes you back one page in your browsing history.

    - **The Forward button**: If you''ve gone back one page, the Forward button will
    move you one page forward in your history.


    **NOTE:** When the back and forward buttons are grayed out, you haven''t yet created
    a history. The arrows turn from light gray to dark gray once you start browsing,
    and you can move back and forth through your history to the previous and next
    pages. Each page maintains its own history. You can''t use these buttons to go
    back to a page you were viewing in another window (see the Pages button discussion
    next).


    - **The Pages button**: This button looks like two squares superimposed on one
    another. It allows you to open the page selection browser and select one of your
    currently open Safari windows. You can open up to nine browser windows at a time.
    We''ll talk more about this button later in the chapter.

    - **The Bookmarks button**: Tap the book-shaped icon to open your Bookmarks screen.
    The Bookmarks screen also contains your complete browsing history for Safari.

    - **The Share button**: This button looks like an arrow breaking out of a box.
    Tapping it displays a menu that allows you to add a bookmark of the current page,
    add a shortcut to the page on your Home screen, mail a link to the page, and print
    the web page displayed. We''ll talk more about this button later in this chapter.

    - **The Address bar**: Use the Address bar at the top center of the Safari window
    to enter a new web address (web addresses are uniform resource locators, also
    known as URLs).

    - **The Reload button**: The arrow bent in a semicircle in the Address bar is
    the Reload button. Tap it to refresh the current screen.

    - **The Stop button**: As a page loads, Safari replaces the Reload button with
    a small *X*. If you change your mind after navigating to a page, tap this. It
    stops the current page from loading any further.

    - **The Search bar**: Tapping this gives you quick access to Google search.


    ## Navigation Basics


    iPad''s Safari lets you do all the normal things you expect to do in a browser.
    You can tap links and buttons. You can enter text into forms and so forth. In
    addition, Safari offers iPad-specific features you won''t find on your home computer:
    tilting the iPad on its side moves it from Landscape to Portrait view and back.
    The following sections guide you through Safari''s basic features.


    ### Entering URLs


    Tap the Address bar to open the URL-entry window (see [Figure 6–3](#Chapter06.html#fig_6_3)).
    The Navigation section appears at the top of your screen, and a keyboard opens
    from below. Between these, the screen dims, and you can still see part of the
    page you were on (see [Figure 6–4](#Chapter06.html#fig_6_4)).


    ![images](images/0604.jpg)


    **Figure 6–4.** *The Safari window you see when operating in the URL or search
    fields*


    **NOTE:** If you decide you want to remain on the page you are on, simply tap
    the dimmed area between the Navigation bar and keyboard, and you''ll be taken
    back to the page. Alternatively, you can tap the Hide Keyboard button in the lower-right
    corner of the keyboard.


    You''ll also see a Bookmarks bar appear below the URL field (see [Figure 6–5](#Chapter06.html#fig_6_5)).
    These aren''t all of your bookmarks, but a select few you''ve decided to add to
    the Bookmarks Bar folder that''s located in your collection of bookmarks. Bookmarks
    are generally used for quick access to your most frequently visited web sites.
    To activate a bookmark in the Bookmarks bar, simply tap it and you''ll be taken
    to its web page.


    ![images](images/0605.jpg)


    **Figure 6–5.** *The Bookmarks bar gives you quick access to some of your bookmarks.*


    If the current URL field is empty, simply tap it and begin typing. You''ll briefly
    see a contextual menu saying Paste, but don''t worry about that. Just start typing
    and the contextual menu will disappear (or hit the Paste button if you want to
    paste a URL that you''ve copied previously).


    If the current URL field is populated (e.g., if you are already on a site and
    not a blank page), simply tap it. You''ll see a small gray *X* appear where the
    Refresh button normally appears (see [Figure 6–5](#Chapter06.html#fig_6_5)). Tapping
    this *X* will clear the contents of the URL field. Additionally, if you''d like
    to copy the current URL, tap anywhere in the URL field, and you''ll get a pop-up
    menu that says Select, Select All, and Paste. Tap Select All, and then tap Copy
    in the pop-up field that appears.


    Don''t worry about typing `http://` or even `www`; Safari is smart enough to know
    that those are required and will add them automatically. A handy feature on the
    iPad''s keyboard in Safari is the dedicated `.com` button (see [Figure 6–6](#Chapter06.html#fig_6_6)).
    This single button makes your fingers perform four keystrokes less work. What''s
    even cooler is that, when you press and hold the `.com` button, you''ll be presented
    with a pop-up field allowing you to select `.edu`, `.org`, `.us`, and `.net`.


    ![images](images/0606.jpg)


    **Figure 6–6.** *Safari''s keyboard, complete with `.com`, `.edu`, `.org`, `.us`,
    and `.net` buttons*


    As you type, Safari matches your keystrokes to its existing collection of bookmarks.
    A pop-up field will appear and display a list of possible matches from both your
    bookmarks and your history (see [Figure 6–7](#Chapter06.html#fig_6_7)). To select
    one, just tap it. Safari automatically navigates to the selected URL.


    When you are done typing in a URL, tap Go and Safari will navigate to the address
    you''ve entered. To return to the browser screen without entering a new URL, tap
    anywhere between the keyboard and the Navigation bar.


    **TIP:** When you see a white *X* in a gray circle in a text-entry field, you
    can tap it to clear the field.


    ![images](images/0607.jpg)


    **Figure 6–7.** *The URL entry window allows you to enter the address that you
    want Safari to visit.*'
  raw: '### Safari''s Browser Window


    Many elements on the Safari window may look familiar, especially to anyone experienced
    in using web browsers or Safari on the iPhone or iPod touch. Familiar elements
    include the Address bar, the Reload button, and the History navigation arrows.
    [Figure 6–2](#Chapter06.html#fig_6_2) shows a typical Safari browser window.


    ![images](images/0602.jpg)


    **Figure 6–2.** *The Safari window displays many familiar features, including
    the Address bar and the Back, Forward, and Bookmarks buttons.*


    Let''s look more closely at the top of a Safari page. Atop every Safari window,
    you''ll see the Navigation bar (see [Figure 6–3](#Chapter06.html#fig_6_3)). The
    Navigation bar contains common buttons and tools found on any modern web browser.
    From left to right, they are as follows:


    ![images](images/0603.jpg)


    **Figure 6–3.** *The Safari Navigation bar*


    *   *The Back button*: This takes you back one page in your browsing history.

    *   *The Forward button*: If you''ve gone back one page, the Forward button will
    move you one page forward in your history.


    **NOTE:** When the back and forward buttons are grayed out, you haven''t yet created
    a history. The arrows turn from light gray to dark gray once you start browsing,
    and you can move back and forth through your history to the previous and next
    pages. Each page maintains its own history. You can''t use these buttons to go
    back to a page you were viewing in another window (see the Pages button discussion
    next).


    *   *The Pages button*: This button looks like two squares superimposed on one
    another. It allows you to open the page selection browser and select one of your
    currently open Safari windows. You can open up to nine browser windows at a time.
    We''ll talk more about this button later in the chapter.

    *   *The Bookmarks button*: Tap the book-shaped icon to open your Bookmarks screen.
    The Bookmarks screen also contains your complete browsing history for Safari.

    *   *The Share button*: This button looks like an arrow breaking out of a box.
    Tapping it displays a menu that allows you to add a bookmark of the current page,
    add a shortcut to the page on your Home screen, mail a link to the page, and print
    the web page displayed. We''ll talk more about this button later in this chapter.

    *   *The Address bar*: Use the Address bar at the top center of the Safari window
    to enter a new web address (web addresses are uniform resource locators, also
    known as a URLs).

    *   *The Reload button*: The arrow bent in a semicircle in the Address bar is
    the Reload button. Tap it to refresh the current screen.

    *   *The Stop button*: As a page loads, Safari replaces the Reload button with
    a small *X*. If you change your mind after navigating to a page, tap this. It
    stops the current page from loading any further.

    *   *The Search bar*: Tapping this gives you quick access to Google search.


    ### Navigation Basics


    iPad''s Safari lets you do all the normal things you expect to do in a browser.
    You can tap links and buttons. You can enter text into forms and so forth. In
    addition, Safari offers iPad-specific features you won''t find on your home computer:
    tilting the iPad on its side moves it from Landscape to Portrait view and back.
    The following sections guide you through Safari''s basic features.


    #### Entering URLs


    Tap the Address bar to open the URL-entry window (see [Figure 6–3](#Chapter06.html#fig_6_3)).
    The Navigation section appears at the top of your screen, and a keyboard opens
    from below. Between these, the screen dims, and you can still see part of the
    page you were on (see [Figure 6–4](#Chapter06.html#fig_6_4)).


    ![images](images/0604.jpg)


    **Figure 6–4.** *The Safari window you see when operating in the URL or search
    fields*


    **NOTE:** If you decide you want to remain on the page you are on, simply tap
    the dimmed area between the Navigation bar and keyboard, and you''ll be taken
    back to the page. Alternatively, you can tap the Hide Keyboard button in the lower-right
    corner of the keyboard.


    You''ll also see a Bookmarks bar appear below the URL field (see [Figure 6–5](#Chapter06.html#fig_6_5)).
    These aren''t all of your bookmarks, but a select few you''ve decided to add to
    the Bookmarks Bar folder that''s located in your collection of bookmarks. Bookmarks
    are generally used for quick access to your most frequently visited web sites.
    To activate a bookmark in the Bookmarks bar, simply tap it and you''ll be taken
    to its web page.


    ![images](images/0605.jpg)


    **Figure 6–5.** *The Bookmarks bar gives you quick access to some of your bookmarks.*


    If the current URL field is empty, simply tap it and begin typing. You''ll briefly
    see a contextual menu saying Paste, but don''t worry about that. Just start typing
    and the contextual menu will disappear (or hit the Paste button if you want to
    paste a URL that you''ve copied previously).


    If the current URL field is populated (e.g., if you are already on a site and
    not a blank page), simply tap it. You''ll see a small gray *X* appear where the
    Refresh button normally appears (see [Figure 6–5](#Chapter06.html#fig_6_5)). Tapping
    this *X* will clear the contents of the URL field. Additionally, if you''d like
    to copy the current URL, tap anywhere in the URL field, and you''ll get a pop-up
    menu that says Select, Select All, and Paste. Tap Select All, and then tap Copy
    in the pop-up field that appears.


    Don''t worry about typing `http://` or even `www`; Safari is smart enough to know
    that those are required and will add them automatically. A handy feature on the
    iPad''s keyboard in Safari is the dedicated `.com` button (see [Figure 6–6](#Chapter06.html#fig_6_6)).
    This single button makes your fingers perform four keystrokes less work. What''s
    even cooler is that, when you press and hold the `.com` button, you''ll be presented
    with a pop-up field allowing you to select `.edu`, `.org`, `.us`, and `.net`.


    ![images](images/0606.jpg)


    **Figure 6–6.** *Safari''s keyboard, complete with .com, .edu, .org, .us, and
    .net buttons*


    As you type, Safari matches your keystrokes to its existing collection of bookmarks.
    A pop-up field will appear and display a list of possible matches from both your
    bookmarks and your history (see [Figure 6–7](#Chapter06.html#fig_6_7)). To select
    one, just tap it. Safari automatically navigates to the selected URL.


    When you are done typing in a URL, tap Go and Safari will navigate to the address
    you''ve entered. To return to the browser screen without entering a new URL, tap
    anywhere between the keyboard and the Navigation bar.


    **TIP:** When you see a white *X* in a gray circle in a text-entry field, you
    can tap it to clear the field.


    ![images](images/0607.jpg)


    **Figure 6–7.** *The URL entry window allows you to enter the address that you
    want Safari to visit.*'
  trans: '

    # Safari 浏览器窗口


    Safari 窗口中的许多元素可能看起来很熟悉，尤其是对于有使用网页浏览器或在 iPhone 或 iPod touch 上使用 Safari 经验的人来说。熟悉的元素包括地址栏、重新加载按钮和历史导航箭头。图
    6–2 展示了一个典型的 Safari 浏览器窗口。


    ![images](img/0602.jpg)


    **图 6–2.** *Safari 窗口显示了许多熟悉的功能，包括地址栏、返回、前进和书签按钮。*


    让我们更仔细地看看 Safari 页面的顶部。在每个 Safari 窗口的顶部，你会看到导航栏（参见图 6–3）。导航栏包含任何现代网页浏览器上常见的按钮和工具。从左到右，它们依次是：


    ![images](img/0603.jpg)


    **图 6–3.** *Safari 导航栏*


    - **返回按钮**：点击此按钮可在浏览历史记录中后退一页。

    - **前进按钮**：如果你已经后退了一页，前进按钮将在历史记录中前进一步。


    **注意：** 当返回和前进按钮变灰时，说明你尚未建立浏览历史。一旦你开始浏览，这些箭头会从浅灰色变成深灰色，你就可以在历史记录中向前和向后移动到上一页和下一页。每个页面都维护自己的历史记录。你不能使用这些按钮返回到你在另一个窗口中查看的页面（请参见下文的页面按钮讨论）。


    - **页面按钮**：此按钮看起来像两个重叠的方块。它允许你打开页面选择浏览器，并选择你当前打开的其中一个 Safari 窗口。你最多可以同时打开九个浏览器窗口。我们将在本章后面进一步讨论此按钮。

    - **书签按钮**：点击书本形状的图标可打开你的书签屏幕。书签屏幕还包含你的完整 Safari 浏览历史。

    - **共享按钮**：此按钮看起来像一个从方框中突破出来的箭头。点击它会显示一个菜单，允许你添加当前页面的书签、将页面快捷方式添加到主屏幕、通过邮件发送页面链接以及打印所显示的网页。我们将在本章后面进一步讨论此按钮。

    - **地址栏**：使用 Safari 窗口顶部中央的地址栏输入新的网址（网址即统一资源定位符，也称为 URL）。

    - **重新加载按钮**：地址栏中弯曲成半圆形的箭头就是重新加载按钮。点击它可刷新当前屏幕。

    - **停止按钮**：当页面加载时，Safari 会将重新加载按钮替换为一个小写的 *X*。如果你在导航到某个页面后改变了主意，点击此处可停止当前页面继续加载。

    - **搜索栏**：点击此栏可快速访问 Google 搜索。


    ## 导航基础


    iPad 上的 Safari 让你能够完成在浏览器中所期望的所有常规操作。你可以点击链接和按钮，可以在表单中输入文本等等。此外，Safari 还提供了一些你在家用电脑上找不到的
    iPad 特有功能：将 iPad 侧向倾斜，它会从横屏视图切换到竖屏视图，反之亦然。以下部分将引导你了解 Safari 的基本功能。


    ### 输入 URL


    点击地址栏可打开 URL 输入窗口（参见图 6–3）。导航部分出现在屏幕顶部，同时键盘从下方弹出。在这两者之间，屏幕会变暗，你仍然可以看到你所在页面的部分内容（参见图
    6–4）。


    ![images](img/0604.jpg)


    **图 6–4.** *在 URL 或搜索字段中操作时看到的 Safari 窗口*


    **注意：** 如果你决定停留在当前页面，只需点击导航栏和键盘之间的变暗区域，你就会被带回到该页面。或者，你也可以点击键盘右下角的隐藏键盘按钮。


    你还会看到一个书签栏出现在 URL 字段下方（参见图 6–5）。这些并非你所有的书签，而是你决定添加到书签集合中“书签栏”文件夹里的少数精选书签。书签通常用于快速访问你最常访问的网站。要激活书签栏中的书签，只需点击它，你就会被带到其对应的网页。


    ![images](img/0605.jpg)


    **图 6–5.** *书签栏让你能够快速访问部分书签。*


    如果当前 URL 字段为空，只需点击它并开始输入。你会短暂看到一个显示“粘贴”的上下文菜单，但不必担心。只需开始输入，上下文菜单就会消失（或者如果你想粘贴之前复制的
    URL，可以点击“粘贴”按钮）。


    如果当前 URL 字段中已有内容（例如，你已经在一个网站上，而不是空白页面），只需点击它。你会看到在通常显示刷新按钮的位置出现了一个小的灰色 *X*（参见图
    6–5）。点击此 *X* 将清除 URL 字段的内容。此外，如果你想复制当前 URL，请点击 URL 字段中的任意位置，你会看到一个弹出菜单，显示“选择”、“全选”和“粘贴”。点击“全选”，然后点击出现的弹出字段中的“复制”。


    不必担心输入 `http://` 甚至 `www`；Safari 足够智能，知道这些是必需的，并会自动添加它们。iPad 上 Safari 键盘的一个便捷功能是专用的
    `.com` 按钮（参见图 6–6）。这一个按钮让你的手指少敲四下键盘。更酷的是，当你长按 `.com` 按钮时，会出现一个弹出字段，允许你选择 `.edu`、`.org`、`.us`
    和 `.net`。


    ![images](img/0606.jpg)


    **图 6–6.** *Safari 的键盘，带有 `.com`、`.edu`、`.org`、`.us` 和 `.net` 按钮*


    在你输入时，Safari 会将你的按键与现有的书签集合进行匹配。会弹出一个字段，显示来自你的书签和历史记录的可能的匹配项列表（参见图 6–7）。要选择其中一个，只需点击它。Safari
    会自动导航到选定的 URL。


    当你输入完一个 URL 后，点击“前往”按钮，Safari 就会导航到你输入的地址。要返回浏览器屏幕而不输入新的 URL，请点击键盘和导航栏之间的任意位置。


    **提示：** 当你在文本输入字段中看到一个灰色圆圈内的白色 *X* 时，你可以点击它来清除该字段。


    ![images](img/0607.jpg)


    **图 6–7.** *URL 输入窗口允许你输入希望 Safari 访问的地址。*

    '
- fmt: '### Entering Text


    Many times you’ll have to fill in user names or passwords on a web page to log
    in, or you may be on a page that asks you to fill in other forms. To edit the
    contents of any text-entry field, simply tap it and Safari will open a new text-entry
    keyboard.


    Although this keyboard is superficially similar to the one shown in [Figure 6–5](#Chapter06.html#fig_6_5),
    it presents a few differences. These differences include the `Previous` and `Next`
    buttons atop the keyboard that search for other text fields on your web page (see
    [Figure 6–8](#Chapter06.html#fig_6_8)). These buttons let you fill out forms without
    having to go through tedious tap/edit/done cycles. Simply enter text, tap `Next`,
    enter more text, and so forth.


    ![images](images/0608.jpg)


    **Figure 6–8.** *The text-entry keyboard for web page forms. Notice the `Previous`,
    `Next`, and `AutoFill` buttons at the top.*


    Another difference from the text-entry features in Safari is the `AutoFill` button.
    Tapping the `AutoFill` button will automatically populate the text fields with
    information from your personal contact card in your address book. It will also
    enter stored user names and passwords. We’ll talk about setting up `AutoFill`
    features later in this chapter.


    To submit a form after you’ve entered all the text, tap `Go` or `Search`. This
    is like pressing the `Enter` or `Return` key on a regular computer.


    ### Searching the Web


    From any Safari window, you’ll just be a tap away from a web search. As shown
    in [Figure 6–5](#Chapter06.html#fig_6_5), a Google search field lies just to the
    right of the URL field. It initially appears light gray, marked with a Spyglass
    icon. Tap this search field to bring up the keyboard and enter a term you want
    to search for in Google.


    The search field elongates while the URL field shortens, and the `Go` button on
    the keyboard switches to a `Search` button. Type a word or two, and you’ll see
    a pop-up box appear with Google-suggested search terms based on what you’ve typed
    (see [Figure 6–9](#Chapter06.html#fig_6_9)). To select one of the Google-suggested
    terms, you can simply tap it in the list or just finish typing what you are looking
    for and tap `Search` on the keyboard. Safari will navigate to [`www.google.com`](http://www.google.com)
    (no matter what page is currently displayed) and search for your queried term.


    ![images](images/0609.jpg)


    **Figure 6–9.** *The search field, complete with suggested keywords*


    If you’d rather use Bing or Yahoo! search than Google search, you can navigate
    to Settings ![images](images/U001.jpg) Safari to change your default search engine
    (we’ll go through all of Safari’s settings later in this chapter).


    ### Searching for Text on a Web Page


    Safari also allows you to search for specific text on a web page. To search for
    text, tap inside the Google search field and enter the word or words on the web
    page that you are looking for. Tap where it says “Find”; next, tap the text you
    entered in the bottom of the search suggestion pop-up field (see [Figure 6–10](#Chapter06.html#fig_6_10)).


    ![images](images/0610.jpg)


    **Figure 6–10.** *Searching for text on a web page*


    After you tap the `Find` command, Safari will zoom into the section of the web
    page with the first occurrence of the text you are looking for and highlight it
    in yellow (see [Figure 6–11](#Chapter06.html#fig_6_11)). Then, using the Search
    text bar at the bottom of the page, you can tap the `Next` button to find the
    next instance of the text on the web page. You can also refine your keyword search
    using the search field in the Search text bar at the bottom of the page.


    ![images](images/0611.jpg)


    **Figure 6–11.** *Text search results displayed in Safari*


    ### Following Links


    Hypertext links are used throughout the World Wide Web. Text links are marked
    with underlines and usually involve a color change from the main text. Image links
    are subtler, but they can also move you to a new location.


    Tap these links to navigate to new web pages or, for certain special links, to
    open a new e-mail or view a map. When a link leads to an audio or video file that
    the iPad understands, it will play back that file. Special links include `mailto:`
    (to create Mail messages), `tel:` (for phone calls, if you have Skype installed
    on your iPad), and automatic recognition of Google Maps URLs (which will take
    you to the iPad’s Maps app).


    **NOTE:** Supported audio formats include `AAC`, `M4A`, `M4B`, `M4P`, `MP3`, `WAV`,
    and `AIFF`. Video formats include `h.264` and `MPEG-4`.


    You have other options than simply tapping a link to get to a new page. To preview
    a link’s address, touch and hold the link for a second or two. An address pop-up
    field will appear next to the link (see [Figure 6–12](#Chapter06.html#fig_6_12)).
    Below the link’s full address, you’ll see three buttons, which behave as follows:


    *   *The Open button*: Takes you to the link as if you simply tapped it instead
    of touching and holding it.

    *   *The Open in New Page button*: Takes you to the link in a new Safari page.

    *   *The Copy button*: Copies the link so you can paste it later into an e-mail
    message or URL field.


    To cancel any of these options and stay on your current page, simply tap your
    finger anywhere on the screen.


    ![images](images/0612.jpg)


    **Figure 6–12.** *Options when touching and holding a link: Open, Open in New
    Page, and Copy*


    **TIP:** To detect image links on the screen, tap and hold an image. If it turns
    gray, it’s a link. If it remains at the same brightness, it’s just a plain image.
    When you tap and hold a linked picture, you’ll have the same options as you do
    with a text link. You’ll also have one additional option: `Save Image`. This will
    save the image to your Photos app on the iPad.


    ### Changing Orientation


    One of the iPad’s standout features is its flexible orientation support. When
    you turn your unit on its side, the iPad flips its display to match, as you can
    see in [Figure 6–11](#Chapter06.html#fig_6_11). A built-in sensor detects the
    iPad’s tilt and adjusts the display to Landscape orientation. Tilt back to vertical,
    and the iPad returns to Portrait orientation. It takes just a second for the iPad
    to detect the orientation change and to update the display. Don’t forget you can
    always lock your screen’s orientation by sliding the screen Orientation Lock button
    on the side of the iPad; however, you should sure you’ve got the button set to
    lock the orientation and not to mute the iPad. To do this, go to Settings ![images](images/U001.jpg)
    General and then set the `Use Side Switch to:` option to `Lock Rotation`.


    ![images](images/0613.jpg)


    **Figure 6–13.** *Safari can display web pages using both Portrait and Landscape
    orientation.*


    The iPad’s Landscape view offers a significantly wider display. This is particularly
    good for side-to-side tasks such as reading book-width text. The wider screen
    allows you to use bigger fonts and view wider columns without scrolling sideways.
    The Portrait view provides a longer presentation. This is great for reading web
    content with more narrow columns, like news feeds. You don’t have to scroll quite
    as much in Portrait view as you do in Landscape view.


    Whether in Landscape or Portrait view, Safari features work the same, including
    the same buttons in the same positions. In Landscape view, you enter text using
    a wider, sideways keyboard.'
