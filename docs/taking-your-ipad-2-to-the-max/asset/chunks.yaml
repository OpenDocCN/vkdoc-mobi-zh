- fmt: '# Editing and Adding Slides


    Although the risotto on the slide looks appetizing, that''s probably not what
    you have in mind for your presentation. That''s OK, since that image is just a
    placeholder, just like the “Double-tap to edit” text is waiting for you to edit
    it. To change the title slide image, tap the small circular image icon that is
    in the corner, and the familiar Photo Albums list is displayed. Select an image
    from your photos, and it takes the place of the placeholder.


    The image placeholder may be smaller than your image, so your image is masked—part
    of it is made transparent so that it appears that the image is cropped. If you
    want to change the way the photo is masked, double-tap it, and the entire image
    appears (see [Figure 14–29](#Chapter14.html#fig_14_29)). Use your finger to slide
    the image up or down, or scale the image using the slider control. When things
    look the way you want them, tap the Done button.


    Editing the text placeholders is done the same way. Double-tap them; the placeholder
    text disappears, and a standard iPad keyboard appears. Type in your new title
    and subtitle to make your title slide shine.


    Unless you plan on giving a very short presentation, you''re going to want to
    add more slides. That''s what the plus sign at the bottom of the left sidebar
    is for. Tap the button, and a pop-up palette of slides appears (see [Figure 14–30](#Chapter14.html#fig_14_30)).
    All of them have been designed to match the colors, fonts, and general look and
    feel of your title slide.


    ![images](images/1429.jpg)


    **Figure 14–29.** *Masking an image is useful in making sure that your audience
    is focused on the most important details of your image.*


    ![images](images/1430.jpg)


    **Figure 14–30.** *The Add a Slide pop-up presents a graphical representation
    of eight different slide types. Tap any one of the slide images to add a new slide
    to your presentation, and then edit the slide to your requirements.*


    Some of the slides show bulleted text, some are blank or nearly so, others are
    designed to display images, and several slides show text and images side by side.
    Tap the appropriate slide type for your next slide, and it is added to the slideshow
    under the title slide.


    Like your title slide, the other slide types all contain placeholders. Double-tap
    text to edit it, and tap the image icon on an image to replace the placeholder
    image with your own picture. You don''t have to add an image; since the tools
    in Keynote are similar to those in Pages and Numbers, the Insert button can provide
    you with a way to add tables, charts, and shapes as well. You edit and configure
    all of these objects using the same tools discussed earlier in the chapter.


    Not only does the Insert button appear in the Keynote toolbar, but the Info button
    is there as well, and it works the same way that it does in the other two iWork
    apps. Our familiar friend the Tools button is also represented by the wrench icon,
    and it provides access to Find, Print, Presenter Notes, Settings, and Go to Help.
    When tapped, Presenter Notes displays a yellow lined notepad upon which you can
    write notes to jog your memory while delivering a presentation.


    Settings provides a number of controls. Check Spelling turns spell checking on
    and off, and Slide Numbers enables the placement of small numbers on the bottom
    of each slide in a presentation deck. Edge and Center Guides, described earlier
    in the Pages section of this chapter are present in the Settings as well, along
    with another guide labeled Guides at 10%. When enabled, this places snap-to guides
    at horizontal and vertical locations every 10% of the slide width and height.


    # The Animation Button


    The other button that is unique to Keynote is the Animation button, which looks
    like a diamond and is found in the middle of the pack of buttons at the right
    end of the Keynote toolbar. The Animation button is used to add animated slide
    transitions to your slideshow, something that can really increase the impact of
    your presentation. The type of transitions available to you as a Keynote user
    vary by theme.


    To add a transition to a slide, tap the slide in the sidebar to select it, and
    then tap the Animation button. A black arrow, initially marked with the word `None`,
    appears and is pointing at the slide you''re adding the transition to. Tap the
    blue circle on the arrow, and a Transitions pop-up appears (see [Figure 14–31](#Chapter14.html#fig_14_31)).
    This scrolling list contains a number of different animated transition effects,
    all of which add life to otherwise dull presentations. To see how a specific transition
    works with your slide, tap the name of the transition, and it is demonstrated
    for you.


    The Options button (see [Figure 14–32](#Chapter14.html#fig_14_32)) on the Transitions
    pop-up sets options such as direction, speed, delay, and when to start the transition.
    Each transition effect is a bit different, so each has its own options to set.
    Once you''ve changed option settings, you can see how the changes affect your
    transition by tapping the small Play button in the upper right of the Transitions
    pop-up.


    ![images](images/1431.jpg)


    **Figure 14–31.** *The Transitions pop-up contains a comprehensive list of eye-catching
    animations to use in transitioning between slides.*


    ![images](images/1432.jpg)


    **Figure 14–32.** *Each effect has a separate set of option controls to customize
    the speed, delay, direction, and other factors.*


    If you''re familiar with setting up presentations in either Microsoft PowerPoint
    or the Mac version of Keynote, then you know that slide transitions aren''t the
    only animations available to spice up your presentations. Animated builds, which
    add movement to slides by moving or spinning graphics or adding text bullets one
    at a time, can also rivet the attention of your audience.


    To add a build effect to an object (graphic or text) on a slide, tap the Animation
    button, and then tap the object or text. A double-sided pop-up appears (see [Figure
    14–33](#Chapter14.html#fig_14_33)) for adding a build-in (a transition where text
    or a graphic is being added to the slide) or build-out (a transition to remove
    text or a graphic from the slide).


    ![images](images/1433.jpg)


    **Figure 14–33.** *The Build pop-up. Tap the plus button on the left to create
    a text build to add one bullet at a time, and tap the button on the right side
    to create a build that removes the build when moving to a new slide or object.*


    Tapping the plus sign on the pop-up allows you to select the effect and change
    options. Two other buttons on the Build pop-up weren''t on the Transitions pop-up—Delivery
    and Order. Delivery is usually available only for bulleted text, and it determines
    whether the text appears all at once or one bullet at a time. If you''re using
    multiple builds on your slide, Order allows you to set the order in which the
    builds appear.


    Although slide transitions and builds can be useful in creating an attractive
    presentation, be sure not to overuse them to the point of distracting from the
    goal of your slides—providing information to an audience.'
  raw: '#### Editing and Adding Slides


    Although the risotto on the slide looks appetizing, that''s probably not what
    you have in mind for your presentation. That''s OK, since that image is just a
    placeholder, just like the “Double-tap to edit” text is waiting for you to edit
    it. To change the title slide image, tap the small circular image icon that is
    in the corner, and the familiar Photo Albums list is displayed. Select an image
    from your photos, and it takes the place of the placeholder.


    The image placeholder may be smaller than your image, so your image is masked—part
    of it is made transparent so that it appears that the image is cropped. If you
    want to change the way the photo is masked, double-tap it, and the entire image
    appears (see [Figure 14–29](#Chapter14.html#fig_14_29)). Use your finger to slide
    the image up or down, or scale the image using the slider control. When things
    look the way you want them, tap the Done button.


    Editing the text placeholders is done the same way. Double-tap them; the placeholder
    text disappears, and a standard iPad keyboard appears. Type in your new title
    and subtitle to make your title slide shine.


    Unless you plan on giving a very short presentation, you''re going to want to
    add more slides. That''s what the plus sign at the bottom of the left sidebar
    is for. Tap the button, and a pop-up palette of slides appears (see [Figure 14–30](#Chapter14.html#fig_14_30)).
    All of them have been designed to match the colors, fonts, and general look and
    feel of your title slide.


    ![images](images/1429.jpg)


    **Figure 14–29.** *Masking an image is useful in making sure that your audience
    is focused on the most important details of your image.*


    ![images](images/1430.jpg)


    **Figure 14–30.** *The Add a Slide pop-up presents a graphical representation
    of eight different slide types. Tap any one of the slide images to add a new slide
    to your presentation, and then edit the slide to your requirements.*


    Some of the slides show bulleted text, some are blank or nearly so, others are
    designed to display images, and several slides show text and images side by side.
    Tap the appropriate slide type for your next slide, and it is added to the slideshow
    under the title slide.


    Like your title slide, the other slide types all contain placeholders. Double-tap
    text to edit it, and tap the image icon on an image to replace the placeholder
    image with your own picture. You don''t have to add an image; since the tools
    in Keynote are similar to those in Pages and Numbers, the Insert button can provide
    you with a way to add tables, charts, and shapes as well. You edit and configure
    all of these objects using the same tools discussed earlier in the chapter.


    Not only does the Insert button appear in the Keynote toolbar, but the Info button
    is there as well, and it works the same way that it does in the other two iWork
    apps. Our familiar friend the Tools button is also represented by the wrench icon,
    and it provides access to Find, Print, Presenter Notes, Settings, and Go to Help.
    When tapped, Presenter Notes displays a yellow lined notepad upon which you can
    write notes to jog your memory while delivering a presentation.


    Settings provides a number of controls. Check Spelling turns spell checking on
    and off, and Slide Numbers enables the placement of small numbers on the bottom
    of each slide in a presentation deck. Edge and Center Guides, described earlier
    in the Pages section of this chapter are present in the Settings as well, along
    with another guide labeled Guides at 10%. When enabled, this places snap-to guides
    at horizontal and vertical locations every 10% of the slide width and height.


    #### The Animation Button


    The other button that is unique to Keynote is the Animation button, which looks
    like a diamond and is found in the middle of the pack of buttons at the right
    end of the Keynote toolbar. The Animation button is used to add animated slide
    transitions to your slideshow, something that can really increase the impact of
    your presentation. The type of transitions available to you as a Keynote user
    vary by theme.


    To add a transition to a slide, tap the slide in the sidebar to select it, and
    then tap the Animation button. A black arrow, initially marked with the word *None*,
    appears and is pointing at the slide you''re adding the transition to. Tap the
    blue circle on the arrow, and a Transitions pop-up appears (see [Figure 14–31](#Chapter14.html#fig_14_31)).
    This scrolling list contains a number of different animated transition effects,
    all of which add life to otherwise dull presentations. To see how a specific transition
    works with your slide, tap the name of the transition, and it is demonstrated
    for you.


    The Options button (see [Figure 14–32](#Chapter14.html#fig_14_32)) on the Transitions
    pop-up sets options such as direction, speed, delay, and when to start the transition.
    Each transition effect is a bit different, so each has its own options to set.
    Once you''ve changed option settings, you can see how the changes affect your
    transition by tapping the small Play button in the upper right of the Transitions
    pop-up.


    ![images](images/1431.jpg)


    **Figure 14–31.** *The Transitions pop-up contains a comprehensive list of eye-catching
    animations to use in transitioning between slides.*


    ![images](images/1432.jpg)


    **Figure 14–32.** *Each effect has a separate set of option controls to customize
    the speed, delay, direction, and other factors.*


    If you''re familiar with setting up presentations in either Microsoft PowerPoint
    or the Mac version of Keynote, then you know that slide transitions aren''t the
    only animations available to spice up your presentations. Animated builds, which
    add movement to slides by moving or spinning graphics or adding text bullets one
    at a time, can also rivet the attention of your audience.


    To add a build effect to an object (graphic or text) on a slide, tap the Animation
    button, and then tap the object or text. A double-sided pop-up appears (see [Figure
    14–33](#Chapter14.html#fig_14_33)) for adding a build-in (a transition where text
    or a graphic is being added to the slide) or build-out (a transition to remove
    text or a graphic from the slide).


    ![images](images/1433.jpg)


    **Figure 14–33.** *The Build pop-up. Tap the plus button on the left to create
    a text build to add one bullet at a time, and tap the button on the right side
    to create a build that removes the build when moving to a new slide or object.*


    Tapping the plus sign on the pop-up allows you to select the effect and change
    options. Two other buttons on the Build pop-up weren''t on the Transitions pop-up—Delivery
    and Order. Delivery is usually available only for bulleted text, and it determines
    whether the text appears all at once or one bullet at a time. If you''re using
    multiple builds on your slide, Order allows you to set the order in which the
    builds appear.


    Although slide transitions and builds can be useful in creating an attractive
    presentation, be sure not to overuse them to the point of distracting from the
    goal of your slides—providing information to an audience.'
  trans: '

    # 编辑与添加幻灯片


    尽管幻灯片上的意大利烩饭看起来很诱人，但这可能不是你演示时想要的内容。没关系，因为那张图片只是一个占位符，就像“双击编辑”文字正等待你修改一样。要更改标题幻灯片图片，请轻点角落里的圆形小图片图标，熟悉的“照片图库”列表就会显示出来。从你的照片中选择一张图片，它就会替换掉占位符。


    图片占位符可能比你的图片小，因此你的图片会被遮罩——部分区域会被处理成透明，看起来像是图片被裁剪了。如果你想更改图片的遮罩方式，请双击它，整张图片就会显示出来（参见图
    14-29）。用手指上下滑动图片，或者使用滑块控件缩放图片。当效果达到你的要求后，轻点“完成”按钮。


    文本占位符的编辑方式与此相同。双击它们，占位符文字会消失，同时会出现标准的 iPad 键盘。输入你的新标题和副标题，让你的标题幻灯片脱颖而出。


    除非你准备进行一场非常简短的演示，否则你需要添加更多幻灯片。这就是左侧边栏底部加号图标的作用。轻点该按钮，会弹出一个幻灯片调色板（参见图 14-30）。所有这些幻灯片的设计都与你的标题幻灯片的颜色、字体以及整体外观和风格相匹配。


    ![images](img/1429.jpg)


    **图 14–29.** *遮罩图片有助于确保观众的注意力集中在图片最重要的细节上。*


    ![images](img/1430.jpg)


    **图 14–30.** *“添加幻灯片”弹出窗口以图形方式展示了八种不同的幻灯片类型。轻点任意一种幻灯片图片，即可将新幻灯片添加到你的演示文稿中，然后根据你的需求编辑该幻灯片。*


    有些幻灯片显示项目符号文本，有些是空白或近乎空白的，有些则用于展示图片，还有一些幻灯片将文本和图片并排显示。为你的下一张幻灯片轻点合适的幻灯片类型，它就会被添加到标题幻灯片下方的幻灯片演示中。


    和你的标题幻灯片一样，其他幻灯片类型也都包含占位符。双击文本进行编辑，轻点图片上的图片图标，用你自己的图片替换占位符图片。你不必非得添加图片；由于 Keynote
    中的工具与 Pages 和 Numbers 中的类似，“插入”按钮也能让你添加表格、图表和形状。你可以使用本章前面讨论过的相同工具来编辑和配置所有这些对象。


    在 Keynote 工具栏中不仅有“插入”按钮，还有“信息”按钮，其工作方式与在另外两个 iWork 应用中相同。我们熟悉的“工具”按钮也由扳手图标表示，它提供了访问查找、打印、演讲者注释、设置和“前往帮助”的途径。轻点“演讲者注释”会显示一张黄色横线记事本，你可以在上面写下注释，以便在演示时提示记忆。


    “设置”提供了许多控制选项。“拼写检查”用于开关拼写检查功能，“幻灯片编号”则能够在演示文稿中每张幻灯片底部添加小数字。本章前面在 Pages 部分描述过的边缘和居中参考线也出现在“设置”中，此外还有一个名为“10%
    参考线”的参考线。启用后，它会在幻灯片宽度和高度的每 10% 位置处水平或垂直放置对齐参考线。


    # 动画按钮


    另一个 Keynote 特有的按钮是“动画”按钮，它看起来像一个菱形，位于 Keynote 工具栏右端的一组按钮中间。“动画”按钮用于为你的幻灯片演示添加动画切换效果，这确实可以增强演示的效果。作为
    Keynote 用户，你可以使用的过渡类型因主题而异。


    要为幻灯片添加过渡效果，请在侧边栏中轻点该幻灯片以将其选中，然后轻点“动画”按钮。一个黑色箭头会出现，初始状态标有 `None` 字样，并指向你正在添加过渡效果的幻灯片。轻点箭头上的蓝色圆圈，会弹出“过渡效果”弹出窗口（参见图
    14-31）。这个可滚动的列表包含许多不同的动画过渡效果，它们都能为原本乏味的演示增添活力。要查看特定过渡效果在幻灯片上的效果，请轻点该过渡效果的名称，它会为你演示出来。


    “过渡效果”弹出窗口上的“选项”按钮（参见图 14-32）可以设置方向、速度、延迟以及何时开始过渡等选项。每种过渡效果都略有不同，因此每种效果都有自己的选项可供设置。更改选项设置后，你可以轻点“过渡效果”弹出窗口右上角的小“播放”按钮，查看更改对过渡效果的影响。


    ![images](img/1431.jpg)


    **图 14–31.** *“过渡效果”弹出窗口包含了全面的、引人注目的动画列表，用于幻灯片之间的过渡。*


    ![images](img/1432.jpg)


    **图 14–32.** *每种效果都有一组独立的选项控件，用于自定义速度、延迟、方向和其他因素。*


    如果你熟悉在 Microsoft PowerPoint 或 Mac 版 Keynote 中设置演示文稿，就会知道幻灯片过渡并非唯一可用来为演示增色的动画。动画构建效果也能吸引观众的注意力，它可以通过移动或旋转图形，或逐个添加文本项目符号来为幻灯片增添动感。


    要为幻灯片上的对象（图形或文本）添加构建效果，请轻点“动画”按钮，然后轻点该对象或文本。会弹出一个双面弹出窗口（参见图 14-33），用于添加入场构建（文本或图形被添加到幻灯片的过渡）或出场构建（从幻灯片中移除文本或图形的过渡）。


    ![images](img/1433.jpg)


    **图 14–33.** *“构建”弹出窗口。轻点左侧的加号按钮创建一个文本构建，用于一次添加一个项目符号；轻点右侧的按钮创建一个构建，用于在移动到新幻灯片或对象时移除构建。*


    轻点弹出窗口上的加号，你可以选择效果并更改选项。“构建”弹出窗口上还有两个“过渡效果”弹出窗口中没有的按钮——“发送”和“顺序”。“发送”通常仅适用于项目符号文本，它决定文本是全部同时出现还是一个项目符号接一个项目符号地出现。如果你在幻灯片上使用了多个构建效果，“顺序”允许你设置这些构建出现的顺序。


    尽管幻灯片过渡和构建效果有助于打造吸引人的演示文稿，但请务必不要过度使用，以免分散观众对幻灯片核心目标的关注——向观众传递信息。

