- fmt: '# Find a Lost iPad


    Have you lost your iPad? Don’t worry! Apple has created a free app called `Find
    My iPhone`. Yes, it says “iPhone” but it works for iPads and iPod touches, as
    well. Using this app, you can locate all your iDevices from any iPhone, iPad,
    or iPod touch, or by logging into your MobileMe account at [`www.me.com`](http://www.me.com).


    Before you can find a lost iPad, you need to make sure you’ve installed and set
    up the `Find My iPhone` app on the device. Therefore, it’s best to do that as
    soon as you get your iPad. Once you’ve set up `Find My iPhone` to work with your
    iPad and other iOS devices, launch the app and sign in. You’ll then be presented
    with the screen shown in [Figure 12-33](#Chapter12.html#fig_12_33).


    ![images](images/1233.jpg)


    **Figure 12-33.** *The `Find My iPhone` app shows you where your iPad and other
    iOS devices are at any given time.*


    From the `Devices` button in the top-left corner, you can choose what iOS device
    you want to see the location of. Select a device and it will be located on the
    map. An iPad will be represented by a tiny iPad icon. Tap the icon to see the
    name of the device, then tap the blue `Info` button to display a pop-up window
    that shows you the various actions you can perform with the device ([Figure 12-33](#Chapter12.html#fig_12_33)):


    - **Display Message or Play Sound**: This lets you display a text message on your
    iPad or play a sound at full volume for two minutes (even if the iPad is muted).
    The sound feature is great if you don’t know where in the house you have left
    your iPad or iPhone.

    - **Remote Lock**: Use this to set up a remote passcode lock on your device or
    initiate your current passcode lock. This will keep anyone out of the device who
    doesn’t know the passcode.

    - **Remote Wipe**: This is a worst-case scenario feature. If your iPad has been
    stolen and you don’t want to play detective and track it to the perpetrator’s
    house, you can remote wipe your iPad. Remote wiping your iPad will permanently
    erase all your personal data on it, ensuring that whoever has or finds your iPad
    can’t commit identity theft against you.


    ## Summary


    The Maps app puts the world in your hands. With it, you can find directions to
    your favorite pizza joint, get an instant fix on your current location, or check
    out what the tops of the Pyramids of Giza look like without leaving your living
    room. You’ve learned how to use maps to find public transport times and routes,
    to get current traffic conditions, or just to virtually stroll down the street
    of a neighborhood you are thinking of moving to. Here are some tips to take away
    with you:


    - When a person or business is in your contacts list, save yourself some time.
    Don’t type in the entire address, but instead enter a few letters of the name
    and select the contact.

    - Tap individual items on the directions list to jump to that part of your route.

    - The `Recents` list (in `Bookmarks`) shows both recent locations *and* recent
    directions.

    - URLs that link to Google Maps automatically open in the Maps application, whether
    they are tapped in Safari or in Mail.

    - Street view is fun, and it’s useful if you want to explore an area of your city—or
    almost any major city in the world—you’ve never visited.

    - Plenty of other apps support map usage on the iPad. Some use Google Maps, and
    some use their own mapping software. Check out the recommendations in this chapter,
    or search “maps” or “navigation” in the App Store to find a plethora of apps that
    take advantage of interactive maps.

    - Don’t forget to download and install the free `Find My iPhone` app. Use it to
    track lost or stolen iOS devices.


    # Chapter 13


    # Touching Your Digital Photos


    With the iPad''s Photos application (launched from its icon, shown in [Figure
    13–1](#Chapter13.html#fig_13_1)), you can free your photos from your home computer
    and pass them around the room like you used to do with photos of old. Hand your
    iPad to your friends, and they can swipe through your photos in their hands without
    the need to huddle around a desktop computer. In this chapter, you''ll discover
    how to navigate your photo collections, share them with friends and family, and
    use the iPad as a digital picture frame.


    ![images](images/1301.jpg)


    **Figure 13–1.** *The Photos app icon*


    ## Getting Photos onto Your iPad


    Before you can view your photos on the iPad, you first need to put them on it.
    There are five ways you can do this: syncing photos from your computer, importing
    photos from a digital camera directly into the iPad, saving photos from e-mailed
    messages, saving images found on web pages, and taking photos with the iPad''s
    built-in camera. We talk about the various ways you can capture photo''s with
    the iPad''s camera in [Chapter 15](#Chapter15.html#ch15).


    ### Syncing Photos from Your Computer


    We discussed syncing photos to your iPad in [Chapter 2](#Chapter02.html#ch2),
    but let''s touch upon it briefly again. iTunes can synchronize your iPad with
    pictures stored on your computer. This allows you to bring your photo collection
    with you and share it using the iPad''s unique touch-based interface. Who needs
    to carry around thick and heavy physical photo albums when you have an iPad with
    its thin body and vibrant display?


    To get started, connect your iPad to your computer, and launch iTunes. Select
    your iPad from the source list (the blue column on the left side of the iTunes
    window), and open the `Photos` tab. Select the “Sync photos” box, and then choose
    the location of the photos you want to sync. Your choices depend on your operating
    system.


    On the computer, your options will be Adobe Photoshop Elements 3.0 or newer or
    any folder on your computer, such as `My Pictures`. On the Mac, your options will
    be iPhoto 4.0.3 or newer, Aperture 3.0.2 or newer, or any folder on your computer.


    After you choose where to sync your photos from, select whether to sync your entire
    photo collection (a good choice for relatively small libraries) or individual
    albums (better for large libraries that might not fit on the iPad''s limited storage
    space). In the latter case, pick only those albums you want to copy to your iPad.


    If you are using a Mac and iPhoto or Aperture, you''ll have the option to sync
    faces (iPhoto ''09 or newer), events (iPhoto ''08 or newer), and albums (see Figure
    2-38). Faces are smart photo albums that contain all the photos that have a selected
    individual''s face in them. It does this by using iPhoto''s built-in facial recognition
    software. Events are another type of smart album that group photos together that
    were taken on the same day. This helps eliminate clutter and keeps your photo
    library organized.


    To finish, click `Apply` to save your changes, and then sync.'
  raw: '### Find a Lost iPad


    Have you lost your iPad? Don’t worry! Apple has created a free app called Find
    My iPhone. Yes, it says “iPhone” but it works for iPads and iPod touches, as well.
    Using this app, you can locate all your iDevices from any iPhone, iPad, or iPod
    touch, or by logging into your MobileMe account at [`www.me.com`](http://www.me.com).


    Before you can find a lost iPad, you need to make sure you’ve installed and set
    up the Find My iPhone app on the device. Therefore, it’s best to do that as soon
    as you get your iPad. Once you’ve set up Find My iPhone to work with your iPad
    and other iOS devices, launch the app and sign in. You’ll then be presented with
    the screen shown in [Figure 12-33](#Chapter12.html#fig_12_33).


    ![images](images/1233.jpg)


    **Figure 12-33.** *The Find My iPhone app shows you where your iPad and other
    iOS devices are at any given time.*


    From the Devices button in the top-left corner, you can choose what iOS device
    you want to see the location of. Select a device and it will be located on the
    map. An iPad will be represented by a tiny iPad icon. Tap the icon to see the
    name of the device, then tap the blue Info button to display a pop-up window that
    shows you the various actions you can perform with the device ([Figure 12-33](#Chapter12.html#fig_12_33)):


    *   *Display Message or Play Sound*: This lets you display a text message on your
    iPad or play a sound at full volume for two minutes (even if the iPad is muted).
    The sound feature is great if you don’t know where in the house you have left
    your iPad or iPhone.

    *   *Remote Lock*: Use this to set up a remote passcode lock on your device or
    initiate your current passcode lock. This will keep anyone out of the device who
    doesn’t know the passcode.

    *   *Remote Wipe*: This is a worst-case scenario feature. If your iPad has been
    stolen and you don’t want to play detective and track it to the perpetrator’s
    house, you can remote wipe your iPad. Remote wiping your iPad will permanently
    erase all your personal data on it, ensuring that whoever has or finds your iPad
    can’t commit identity theft against you.


    ### Summary


    The Maps app puts the world in your hands. With it, you can find directions to
    your favorite pizza joint, get an instant fix on your current location, or check
    out what the tops of the Pyramids of Giza look like without leaving your living
    room. You’ve learned how to use maps to find public transport times and routes,
    to get current traffic conditions, or just to virtually stroll down the street
    of a neighborhood you are thinking of moving to. Here are some tips to take away
    with you:


    *   When a person or business is in your contacts list, save yourself some time.
    Don’t type in the entire address, but instead enter a few letters of the name
    and select the contact.

    *   Tap individual items on the directions list to jump to that part of your route.

    *   The Recents list (in Bookmarks) shows both recent locations *and* recent directions.

    *   URLs that link to Google Maps automatically open in the Maps application,
    whether they are tapped in Safari or in Mail.

    *   Street view is fun, and it’s useful if you want to explore an area of your
    city—or almost any major city in the world—you’ve never visited.

    *   Plenty of other apps support map usage on the iPad. Some use Google Maps,
    and some use their own mapping software. Check out the recommendations in this
    chapter, or search “maps” or “navigation” in the App Store to find a plethora
    of apps that take advantage of interactive maps.

    *   Don’t forget to download and install the free Find My iPhone app. Use it to
    track lost or stolen iOS devices.


