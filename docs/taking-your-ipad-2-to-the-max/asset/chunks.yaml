  trans: '

    #### 方向


    在大多数 iPad 图片中，你可能会注意到设备处于竖屏方向，物理主屏幕按钮位于底部边框。然而，实际上并没有所谓的“正确”方式去持握 iPad。苹果将 iPad
    设计为一种**方向无关**的设备。这意味着你可以在竖屏或横屏模式下持握 iPad，并正常与设备交互（图 4-2）。事实上，你甚至可以完全上下颠倒地持握 iPad，而屏幕显示内容依然保持正立。


    ![images](img/0402.jpg)


    **图 4-2.** *iPad 的竖屏与横屏模式*


    虽然没有所谓的正确持握方式，但某些应用在你将 iPad 翻转至横屏或竖屏模式时，会提供额外功能。例如，在竖屏模式下使用邮件应用时，屏幕上只会显示当前选中的邮件。要查看其他邮件列表，你需要点击顶栏下拉菜单中的收件箱。但是，如果将
    iPad 旋转至横屏方向，你就能在当前所选邮件旁边看到所有邮件的列表。我们将在本书后续章节讨论不同应用针对特定方向的功能。


    **注意：** 尽管大多数应用在两种方向下都能显示，但部分应用不支持。许多游戏会强制要求你在横屏模式下使用 iPad。


    ### 锁定屏幕


    如果你刚打开 iPad，或者 iPad 已闲置一段时间，它会自动锁定，屏幕变暗。此时，请按下主屏幕按钮。锁定屏幕便会呈现，如图 4-3 所示。要解锁 iPad，请从左向右滑动滑块。锁定屏幕消失，主屏幕便随之呈现。


    ![images](img/0403.jpg)


    **图 4-3.** *iPad 锁定屏幕*


    你可以设置 iPad 在锁定前等待的时间。前往`设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg)
    `自动锁定`，然后选择你希望 iPad 在锁定前等待的分钟数。若要停用自动锁定，请选择“永不”——但请确保附近有可靠的电源。自动锁定是一项省电功能。停用它意味着
    iPad 的电池消耗会更快。


    出于安全考虑，你可以为 iPad 设置密码。你可以在常规密码和简单密码之间进行选择。*简单密码*就像你的借记卡四位数字 PIN 码。前往`设置` ![images](img/U001.jpg)
    `通用`，轻点“密码锁定”，然后轻点屏幕顶部的“开启密码”。接着，轻点“简单密码”将其切换至“开”，以建立一个新的简单密码。iPad 会提示你输入一个四位数字的代码，如图
    4-4 所示。


    ![images](img/0404.jpg)


    **图 4-4.** *设置你的简单密码*


    输入代码，或轻点“取消”退出而不输入代码。输入代码后，iPad 会提示你再次输入，然后启用更多密码锁定设置。这些设置包括：设置 iPad 闲置多久后自动锁定；设置
    iPad 锁定期间是否显示相框（更多关于相框的内容请见第 13 章）；以及设置在连续十次输错密码后是否抹掉 iPad 上的所有数据。


    若要输入常规密码（实际上是可以使用字母、数字和符号任意组合的密码），请前往`设置` ![images](img/U001.jpg) `通用`，轻点“密码锁定”，然后轻点屏幕顶部的“开启密码”。接着，轻点“简单密码”将其切换至“关”，以建立一个新的复杂密码。iPad
    会显示一个键盘，供你输入复杂密码。


    要测试你的密码（无论是简单密码还是复杂密码），请按一下“睡眠/唤醒”按钮（使 iPad 进入睡眠状态），再按一次（唤醒它）。密码验证屏幕会显示出来，如图 4-5
    所示。输入你的密码，iPad 便会解锁。


    ![images](img/0405.jpg)


    **图 4-5.** *密码锁定屏幕显示键盘，供您输入复杂密码。若为简单密码，则会显示数字键盘。*


    若要移除 iPad 上的密码，请返回“密码锁定”设置界面（图 4-4）。选择“关闭密码”，并再次输入密码以确认是您本人在操作。


    那么，如果您忘记了密码，或者一位不怀好意的同事在您不知情的情况下给 iPad 设置了密码，该怎么办？您需要将 iPad 连接到家用电脑，并使用 iTunes
    来恢复 iPad 软件。您可以通过在 iTunes 中选择“摘要”标签页并点击“恢复”来恢复 iPad。有关恢复 iPad 的更多信息，请参见第 2 章。


    在锁定屏幕上，“滑动来解锁”栏的右侧，您会注意到有一个盒子里面包含花朵的小图标（见图 4-3）。这就是“相框”按钮。轻点此按钮可将 iPad 变成数码相框。iPad
    会在屏幕上接连不断地显示您的照片，直到您轻点屏幕并再次轻点相框按钮，或者滑动“滑动来解锁”栏来停止它。您将在第 13 章中了解更多关于 iPad 相框功能及其设置的信息。


    锁定屏幕还可以执行最后一项功能：控制 iPad 的音乐播放器。如果在屏幕锁定时 iPad 正在播放音乐，您可以双击主屏幕按钮，在屏幕顶部显示音乐控制。您将在第
    7 章中了解有关这些控件的更多信息。

    '
- fmt: '### The Home Screen


    As discussed, when you turn on your iPad, you’ll be presented with a lock screen.
    Depending on whether you have a passcode set on your iPad, either you’ll swipe
    the “Slide to Unlock” bar and be presented with a numeric or QWERTY keypad, or
    you’ll be immediately taken to your iPad Home screen.


    The iPad Home screen (see [Figure 4–6](#Chapter04.html#fig_4_6)) is the first
    page of apps you have on your iPad. Depending on how many apps you have, you may
    have several pages that will show in subsequent order when you swipe to the left.


    ![images](images/0406.jpg)


    **Figure 4–6.** The iPad Home screen


    **TIP:** Since the Home screen will be the first page you’re taken to when you
    unlock your iPad, it makes sense to keep your most frequently used apps on the
    Home screen for easy access.


    From the top of the screen down, you’ll see the following elements:


    **Status bar**: A thin, black bar runs along the top of your iPad Home screen.
    This status bar, shown in [Figure 4–7](#Chapter04.html#fig_4_7), will display
    on every page of your iPad Home screen.


    ![images](images/0407.jpg)


    **Figure 4–7.** The status bar


    The status bar can show many icons, but the standard layout you’ll most likely
    see is the following: in the upper-left corner, you’ll see the word *iPad* or
    *iPad 3G* (depending on which model you have), next to a Wi-Fi icon. The Wi-Fi
    icon shows you that you are connected to a wireless hotspot and also tells you
    the strength of your wireless signal. If you have an iPad 3G, you’ll also be presented
    with the name of your 3G service carrier. In the middle of the status bar, you’ll
    be presented with the current time. On the right corner of the status bar, you’ll
    see a battery meter icon, next to the percentage of the battery remaining.


    The status bar can also show other status icons. These include the following:


    *   **Airplane mode**: With airplane mode, you can’t access the Internet or use
    Bluetooth. Other functions of your iPad are available.

    *   **E**: This stands for EDGE, a cellular data network that’s slower than 3G.
    Many times *E* will appear when you are outside your 3G network. You can connect
    to the Internet using EDGE; just keep in mind it’s slower than 3G (available on
    iPad Wi-Fi + 3G only).

    *   **o**: This little symbol stands for GPRS. If 3G is a race car and EDGE is
    a bicycle, GPRS is a turtle. Think 1994 dial-up slow (available on iPad Wi-Fi
    + 3G only).

    *   **Activity**: The activity icon looks like a sun. You’ll see the activity
    icon whenever network activity (such as downloading data) is occurring on your
    iPad.

    *   **VPN**: This shows you are connected to a virtual private network (VPN).
    Many companies use VPNs so you can log in securely to their e-mail systems or
    private networks from your home.

    *   **Lock**: This padlock tells you your iPad is locked. You’ll only ever see
    this icon on the lock screen.

    *   **Screen Rotation Lock**: This signifies that the screen rotation is locked.
    See [Chapter 3](#Chapter03.html#ch3) for more details.

    *   **Play**: This icon tells you a song, podcast, or audiobook is playing.


    **Apps page**: Below the black status bar you’ll see a series of app icons (see
    [Figure 4–8](#Chapter04.html#fig_4_8)). Each page can hold up to 20 apps in addition
    to the ones found in the Dock. As we’ll discuss shortly, apps can be deleted and
    rearranged without the need to plug your iPad into iTunes.


    ![images](images/0408.jpg)


    **Figure 4–8.** A page full of apps


    **Page dots**: Just above the app icons in the Dock, you’ll see a series of small,
    white dots (see [Figure 4–9](#Chapter04.html#fig_4_9)). This series of dots begins
    with a tiny magnifying glass. We’ll get to the magnifying glass shortly. The dots
    next to the magnifying glass signify the number of pages of apps you have on your
    Home screen. If you see five dots, it means you have five pages of apps. The dot
    that is the brightest signifies the location of the page you are currently on
    among all your pages of apps.


    ![images](images/0409.jpg)


    **Figure 4–9.** The dots signify how many pages of apps you have.


    **The dock**: At the bottom of every page of the Home screen is a long, gray slate
    known as the *Dock* (see [Figure 4–10](#Chapter04.html#fig_4_10)). The Dock can
    contain up to six apps. No matter what page of apps you swipe to, the Dock will
    always show the same apps. The advantage of this is that if you have ten pages
    of apps but frequently check your e-mail, no matter what page of apps you’re on,
    you’ll always have quick access to your Mail app if you’ve placed it in the Dock.


    ![images](images/0410.jpg)


    **Figure 4–10.** The Dock can hold between zero and six apps.


    **NOTE:** Unlike with some apps, no matter if you are holding your iPad vertically
    or horizontally, all the elements of the Home screen, including how you interact
    with it, always remain the same.'
  raw: '### The Home Screen


    As discussed, when you turn on your iPad, you’ll be presented with a lock screen.
    Depending on whether you have a passcode set on your iPad, either you’ll swipe
    the Slide to Unlock bar and be presented with a numeric or qwerty keypad or you’ll
    be immediately taken to your iPad Home screen.


    The iPad Home screen (see [Figure 4–6](#Chapter04.html#fig_4_6)) is the first
    page of apps you have on your iPad. Depending on how many apps you have, you may
    have several pages that will show in subsequent order when you swipe to the left.


    ![images](images/0406.jpg)


    **Figure 4–6.** *The iPad Home screen*


    **TIP:** Since the Home screen will be the first page you’re taken to when you
    unlock your iPad, it makes sense to keep your most frequently used apps on the
    Home screen for easy access.


    From the top of the screen down, you’ll see the following elements:


    *Status bar*: A thin, black bar runs along the top of your iPad Home screen. This
    status bar, shown in [Figure 4–7](#Chapter04.html#fig_4_7), will display on every
    page of your iPad Home screen.


    ![images](images/0407.jpg)


    **Figure 4–7.** *The status bar*


    The status bar can show many icons, but the standard layout you’ll most likely
    see is the following: in the upper-left corner, you’ll see the word *iPad* or
    *iPad 3G* (depending on which model you have), next to a Wi-Fi icon. The Wi-Fi
    icon shows you that you are connected to a wireless hotspot and also tells you
    the strength of your wireless signal. If you have an iPad 3G, you’ll also be presented
    with the name of your 3G service carrier. In the middle of the status bar, you’ll
    be presented with the current time. On the right corner of the status bar, you’ll
    see a battery meter icon, next to the percentage of the battery remaining.


    The status bar can also show other status icons. These include the following:


    *   *Airplane mode*: With airplane mode, you can’t access the Internet or use
    Bluetooth. Other functions of your iPad are available.

    *   *E*: This stands for EDGE, a cellular data network that’s slower than 3G.
    Many times E will appear when you are outside your 3G network. You can connect
    to the Internet using EDGE; just keep in mind it’s slower than 3G (available on
    iPad Wi-Fi + 3G only).

    *   *o*: This little symbol stands for GPRS. If 3G is a race car and EDGE is a
    bicycle, GPRS is a turtle. Think 1994 dial-up slow (available on iPad Wi-Fi +
    3G only).

    *   *Activity*: The activity icon looks like a sun. You’ll see the activity icon
    whenever network activity (such as downloading data) is occurring on your iPad.

    *   *VPN*: This shows you are connected to a virtual private network (VPN). Many
    companies use VPNs so you can log in securely to their e-mail systems or private
    networks from your home.

    *   *Lock*: This padlock tells you your iPad is locked. You’ll only ever see this
    icon on the lock screen.

    *   *Screen Rotation Lock*: This signifies that the screen rotation is locked.
    See [Chapter 3](#Chapter03.html#ch3) for more details.

    *   *Play*: This icon tells you a song, podcast, or audiobook is playing.


    *Apps page:* Below the black status bar you’ll see a series of app icons (see
    [Figure 4–8](#Chapter04.html#fig_4_8)). Each page can hold up to 20 apps in addition
    to the ones found in the Dock. As we’ll discuss shortly, apps can be deleted and
    rearranged without the need to plug your iPad into iTunes.


    ![images](images/0408.jpg)


    **Figure 4–8.** *A page full of apps*


    *Page dots:* Just above the app icons in the Dock, you’ll see a series of small,
    white dots (see [Figure 4–9](#Chapter04.html#fig_4_9)). This series of dots begins
    with a tiny magnifying glass. We’ll get to the magnifying glass shortly. The dots
    next to the magnifying glass signify the number of pages of apps you have on your
    Home screen. If you see five dots, it means you have five pages of apps. The dot
    that is the brightest signifies the location of the page you are currently on
    among all your pages of apps.


    ![images](images/0409.jpg)


    **Figure 4–9.** *The dots signify how many pages of apps you have.*


    *The dock:* At the bottom of every page of the Home screen is a long, gray slate
    known as the *Dock* (see [Figure 4–10](#Chapter04.html#fig_4_10)). The Dock can
    contain up to six apps. No matter what page of apps you swipe to, the Dock will
    always show the same apps. The advantage of this is that if you have ten pages
    of apps but frequently check your e-mail, no matter what page of apps you’re on,
    you’ll always have quick access to your Mail app if you’ve placed it in the Dock.


    ![images](images/0410.jpg)


    **Figure 4–10.** *The Dock can hold between zero and six apps.*


    **NOTE:** Unlike with some apps, no matter if you are holding your iPad vertically
    or horizontally, all the elements of the Home screen, including how you interact
    with it, always remain the same.'
  trans: '

    ### 主屏幕


    如前所述，当你打开 iPad 时，首先会看到锁定屏幕。根据你是否在 iPad 上设置了密码，要么你滑动“滑动来解锁”栏，然后看到数字或 QWERTY 键盘，要么你会直接进入
    iPad 主屏幕。


    iPad 主屏幕（参见图 4–6）是你 iPad 上应用的第一页。根据你拥有的应用数量，当你向左滑动时，可能会依次显示多个页面。


    ![images](img/0406.jpg)


    **图 4–6.** iPad 主屏幕


    **提示：** 由于解锁 iPad 后首先进入的是主屏幕，因此将最常用的应用放在主屏幕上以便快速访问是合理的。


    从屏幕顶部向下，你会看到以下元素：


    **状态栏**：一条细细的黑色横条贯穿 iPad 主屏幕顶部。这个状态栏，如图 4–7 所示，会显示在 iPad 主屏幕的每一页上。


    ![images](img/0407.jpg)


    **图 4–7.** 状态栏


    状态栏可以显示很多图标，但你最有可能看到的标准布局如下：在左上角，你会看到 *iPad* 或 *iPad 3G*（取决于你的型号），旁边是一个 Wi-Fi
    图标。Wi-Fi 图标显示你已连接到无线热点，并告知你无线信号的强度。如果你有 iPad 3G，你还会看到你的 3G 服务运营商的名称。在状态栏中间，你会看到当前时间。在状态栏的右侧，你会看到一个电池电量图标，旁边是剩余电量的百分比。


    状态栏还可以显示其他状态图标。包括以下内容：


    *   **飞行模式**：开启飞行模式后，你将无法访问互联网或使用蓝牙。iPad 的其他功能仍可使用。

    *   **E**：代表 EDGE，一种比 3G 慢的蜂窝数据网络。当你离开 3G 网络覆盖范围时，通常会显示 *E*。你可以使用 EDGE 连接到互联网；请记住它比
    3G 慢（仅适用于 iPad Wi-Fi + 3G 型号）。

    *   **o**：这个小符号代表 GPRS。如果把 3G 比作赛车，EDGE 比作自行车，那么 GPRS 就是乌龟。可以想象 1994 年拨号上网的速度（仅适用于
    iPad Wi-Fi + 3G 型号）。

    *   **活动**：活动图标看起来像一个太阳。当你的 iPad 上发生网络活动（如下载数据）时，你会看到这个活动图标。

    *   **VPN**：表示你已连接到虚拟专用网络（VPN）。许多公司使用 VPN，以便你可以从家中安全地登录他们的电子邮件系统或私有网络。

    *   **锁定**：这个挂锁图标告诉你 iPad 已锁定。你只会在锁定屏幕上看到这个图标。

    *   **屏幕旋转锁定**：表示屏幕旋转已被锁定。详情请参见第 3 章。

    *   **播放**：这个图标表示正在播放歌曲、播客或有声读物。


    **应用页面**：在黑色状态栏下方，你会看到一系列应用图标（参见图 4–8）。除了程序坞中的应用外，每页最多可容纳 20 个应用。正如我们稍后将讨论的，无需将
    iPad 连接到 iTunes，即可删除和重新排列应用。


    ![images](img/0408.jpg)


    **图 4–8.** 一个装满应用的页面


    **页面圆点**：就在程序坞中的应用图标上方，你会看到一系列白色小圆点（参见图 4–9）。这一系列圆点以一个小放大镜图标开始。我们稍后会介绍放大镜。放大镜旁边的圆点表示主屏幕上应用页面的数量。如果你看到五个圆点，意味着你有五页应用。最亮的圆点表示你当前所在页面在所有应用页面中的位置。


    ![images](img/0409.jpg)


    **图 4–9.** 圆点表示你有多少页应用。


    **程序坞**：主屏幕每一页的底部都有一条长长的灰色面板，称为*程序坞*（参见图 4–10）。程序坞最多可以容纳六个应用。无论你滑动到哪一页应用，程序坞始终显示相同的应用。这样做的好处是，如果你有十页应用但经常查看电子邮件，无论你当前在哪一页应用上，只要将邮件应用放在了程序坞中，你总能快速访问它。


    ![images](img/0410.jpg)


    **图 4–10.** 程序坞可以容纳零到六个应用。


    **注意：** 与某些应用不同，无论你是垂直还是水平握持 iPad，主屏幕的所有元素，包括你与它的交互方式，始终保持不变。

