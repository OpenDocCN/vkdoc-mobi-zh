  trans: '

    # 导航与阅读 PDF 文件


    要阅读 PDF，请轻点其封面。PDF 会向前飞出并打开。如果是首次打开该 PDF，您将位于第一页。如果之前打开过，则会跳转到上次阅读的页码。


    您可以在竖屏或横屏模式下查看 PDF（见图 9–30）；但请注意，与图书不同，在横屏模式下查看 PDF 并不会并排显示两页。令人费解的是，苹果公司（在撰写本文时）并未添加此功能，但很可能在未来某个时候会加入。


    ![图片](img/0930.jpg)


    **图 9–30.** *在横屏和竖屏模式下查看 PDF*


    无论处于何种方向，在任何 PDF 页面的顶部，您都会看到一个菜单，其中包含一系列按钮，中央显示 PDF 文档名称（见图 9–31）。这些按钮您应该已经熟悉，因为它们与阅读电子书时看到的按钮类似：


    ![图片](img/0931.jpg)


    **图 9–31.** *PDF 的菜单按钮*


    * **资料库**：轻点此按钮会关闭 PDF 并返回您的 PDF 书架。下次打开 PDF 时，将跳转到您离开时的页面。

    * **缩略图**：此按钮由三个点表示，每个点后面有一条线。轻点此按钮可查看缩略图——即 PDF 中所有页面的缩略图系列。

    * **共享**：轻点此按钮可将当前选定的 PDF 通过电子邮件发送，或通过无线 AirPrint 打印机打印。

    * **亮度**：此按钮看起来像太阳，仅在 iBooks 应用内调整屏幕亮度。

    * **搜索**：搜索按钮形似放大镜，允许您搜索 PDF 文本。它还提供*快速链接*，可针对所选搜索词搜索 Google 和维基百科。

    * **书签**：轻点书签丝带可为当前页面添加书签。请注意，iBooks 中的书签与传统纸质书签功能不同。在 iBooks 中为页面添加书签，实际上相当于给页面“折角”。您可以在同一文档中添加多个书签。要删除书签，请再次轻点书签图标。

    * **页面滑动器**：这是一系列沿 PDF 页面底部排列的页面图标（见图 9–32）。在缩略图上拖动手指可快速浏览 PDF 页面。您会看到当前选定页面编号浮在空中。您也可以直接轻点任意缩略图跳转到该页面。


    ![图片](img/0932.jpg)


    **图 9–32.** *PDF 底部的页面滑动器栏*


    阅读时，轻点图书页面的中央可显示/隐藏菜单和页面滑动器栏。在某一页面上，双指轻点可放大；如需更精准的控制，可使用捏合手势放大或缩小。要翻页，只需向左或向右滑动手指，即可向前或向后翻一页。您也可以轻点页面边缘来前进或后退，或使用页面底部的页面滑动器栏。此外，还可以通过缩略图浏览
    PDF 文档中所有页面的大缩略图。


    ## 使用缩略图


    现在您已经了解，由于 PDF 菜单栏与电子书菜单栏非常相似，您已经知道如何使用它。唯一略有不同的功能是目录按钮，它已被替换为缩略图按钮（注意，两个图标完全相同——三个点，每个点后面跟着一条线）。


    ![图片](img/0933.jpg)


    **图 9–33.** *缩略图让您以大型缩略图形式查看 PDF 的所有页面。*


    轻点缩略图按钮，您会看到 PDF 文档中的所有页面以大型缩略图形式呈现，您可以通过滑动手指滚动浏览（见图 9–33）。当处理包含大量图表或图像的大型文档时，这非常有用。它允许您通过视觉快速搜索
    PDF。找到所需页面后，轻点它即可立即跳转到文档中的该页面。


    您还会注意到，某些缩略图右上角可能有一个红色小书签图标。这意味着您已通过轻点 PDF 菜单栏中的书签按钮为该页面添加了书签（见图 9–31）。要仅查看已添加书签的页面，请轻点缩略图菜单右上角的书签按钮（见图
    9–34）。任何没有书签的页面将被隐藏。


    ![图片](img/0934.jpg)


    **图 9–34.** *缩略图的书签页面视图*


    要离开缩略图，您可以轻点“资料库”按钮返回 PDF 书架，或轻点“继续”按钮返回到您导航至缩略图之前所在的页面。您也可以轻点任意页面直接跳转到该页。


    **提示：** 在 Mac 上，只要您能打印的内容，都可以转换为 PDF。只需选择要转换为 PDF 的内容，然后从当前应用程序（如 Word 或 Firefox）的“文件”菜单中选择“打印”。在打印对话框的左下角会看到一个
    PDF 按钮。单击它并从下拉菜单中选择`存储为 PDF...`。命名 PDF，单击“存储”，然后将其拖入 iTunes 资料库。在下次同步时，新 PDF 将出现在
    iBooks 中。如果您使用 PC，有多种将文档转换为 PDF 的选项。用 Google 搜索“print to PDF”即可找到适合您的解决方案。


    # 设置


    iBooks 应用有少量外部设置。从 iPad 主屏幕导航至“设置”，然后在左侧的应用列表中选择 iBooks。您会看到五个设置选项（见图 9–35）：


    ![图片](img/0935.jpg)


    **图 9–35.** *iBooks 应用设置*


    * **两端对齐**：当此选项开启时，图书页面上的文本将均匀填满页面宽度。当两端对齐关闭时，页面右侧的文本将呈参差不齐状（见图 9–36）。

    * **自动断字**：当此选项开启时，iBooks 会自动对单词进行断字处理，从而允许在单页上显示更多单词。

    * **轻点左边缘**：您可以将其设置为“上一页”或“下一页”。如果设置为*下一页*，轻点图书左边缘将使您前进到下一页，而非后退一页。此设置在 iPad 上以非常规角度（如躺在床上）阅读时可能很实用。选中“下一页”后，返回上一页的唯一方法是使用页面底部的页面滑动器栏。

    * **同步书签**：当此选项开启时，会在设备之间同步图书的书签、高亮和笔记。如果您在 iPad 和 iPhone 上同时使用 iBooks，这项功能非常方便。当您在一个设备上为图书创建笔记或书签时，它会出现在另一个设备上。

    * **同步合集**：当此选项开启时，会同步您的 iBooks 合集。如果您在 iPad 和 iPhone 上同时使用 iBooks，这项功能非常方便。当您在一个设备上创建或修改合集时，另一个设备上会完全相同地显示。


    ![图片](img/0936.jpg)


    **图 9–36.** *同一页面：两端对齐开启（左）与两端对齐关闭（右）*

    '
- fmt: '### Summary


    In addition to doing so many other things, the iPad is also a breakthrough e-book
    and PDF reader. `iBooks`, the all-in-one application that lets you buy books and
    read, search, and mark them up, is an elegant yet powerful tool for discovering
    new titles and taking your entire book library with you. Here are a few key tips
    for you to carry away with you:


    - You aren''t limited to buying books from the `iBookstore`. Many web sites sell
    books in the `ePub` format that you can download and sync to the iPad. A great
    place to start is [`www.gutenberg.org`](http://www.gutenberg.org). Also, Googling
    "free e-books" will return a host of results for sites that let you download e-books
    for free.

    - `iBooks` has a powerful dictionary-lookup feature that gives you the definition
    of a word on the book''s page.

    - The `iBooks` bookshelf has many views and a search function to help you navigate
    your books library. These can also help you organize your books and PDFs into
    collections.

    - Use the iPad''s physical Orientation Lock button to freeze your `iBooks` screen
    in place, avoiding any unwanted screen rotation while reclining on a couch or
    reading in bed.

    - No audiobook? No problem. You can use the iPad''s built-in `VoiceOver` technology
    to read any book out loud to you.

    - Choose different colors for your notes and highlighting. For example, you might
    use blue for passages you like and green for something you want to reference later.
    You can see all your bookmarks, notes, and highlights in one easy place (the Bookmarks
    page, of course!). You can also tap any one of these to instantly jump to it in
    the book.

    - `iBooks` isn''t limited to reading e-books. It''s also a PDF reader. Now you
    can organize, view, and easily navigate all your PDFs—even while on the go!


    ## Chapter 10


    ## Leveraging Your Desk Set


    Back in the days before iPads and iPhones, we used what was commonly referred
    to as a *desk set*. That set varied from year to year but usually consisted of
    a notebook in which we''d keep meeting notes and reminders, a `Day-Timer` planner
    where we''d write our appointments, and an address book into which we laboriously
    wrote all of our contact names, addresses, and phone numbers.


    In the 1990s, many Mac owners were proud owners of a series of `Apple Newton MessagePads`.
    These were referred to as *personal digital assistants* (PDAs), and they were
    the first electronic organizers to synchronize notes, calendars, to-do lists,
    and contacts to equivalent applications on a desktop computer. Alas, the `Newton
    MessagePad` was quite a bit ahead of its time and rather expensive, and Apple
    dropped the device in 1998.


    The `PalmPilot` took the place of the `Newton`, followed by several handheld devices
    running Microsoft operating systems, which were followed by the first series of
    smartphones. All of these devices had their special capabilities and quirks, and
    they all had some sort of note-taking facility, a calendar, and an address book.


    In 2007, the first iPhones appeared on the market, making life good again for
    Apple fans and introducing the world to a new form of handheld computing. The
    iPhone has always had three apps—`Notes`, `Calendar`, and `Contacts`—to perform
    common desk-set tasks. Now with the introduction of the iPad, the three apps have
    made the move to another platform.


    `Notes`, `Calendar`, and `Contacts` really shine on the iPad thanks to the larger-than-iPhone
    screen. In this chapter, we''ll show you how to make the most of these built-in
    apps and how they synchronize to other devices. Since Apple''s `MobileMe` service
    can synchronize your desk-set apps to their counterparts on other computers and
    devices, we''ll also describe how to sign up for and enable the service.


    ### Notes


    On the iPhone, `Notes` is roughly the equivalent of a small pocket notepad. You
    probably wouldn''t want to attempt to take a long set of notes with the app. Even
    though the note can be scrolled, there isn''t a lot of available room. Typing
    would most likely be done with one finger, slowing down your text entry and making
    errors more likely.


    The `Notes` app on the iPad is a totally different animal. It''s more like a legal
    pad (see [Figure 10–1](#Chapter10.html#fig_10_1)), both in looks and in how it
    can be used. In landscape orientation, `Notes` looks like a leather-bound portfolio,
    with a small, white, paperlike index list on the left side and a legal pad at
    the right (complete with margin lines as well as the remnants of torn-off pages
    at the top).


    ![images](images/1001.jpg)


    **Figure 10–1.** *Your iPad''s legal pad, the Notes app. The list on the left
    side displays all the notes you''ve written.*


    When you flip the iPad into portrait orientation, `Notes` appears to be just a
    normal legal pad. We personally find the landscape orientation easier to use for
    data entry in `Notes`, since we get an almost full-sized keyboard to touch-type
    on.


    When you''re using `Notes` in portrait mode, the index list disappears from the
    left side of the portfolio, and a `Notes` button appears at the top of the notepad.
    To display the index list, just tap the `Notes` button (see [Figure 10–2](#Chapter10.html#fig_10_2)).


    ![images](images/1002.jpg)


    **Figure 10–2.** *The Notes app in portrait orientation really looks like a legal
    pad, complete with yellow paper.*


    When `Notes` is being used in landscape mode, touching a note on the white index
    list highlights it with a red-penciled oval and displays the full note on the
    legal pad. At the top of each page, whether you''re using `Notes` in landscape
    or portrait orientation, is the date and time when the note was created, as well
    as how many days ago it was written. If it was just written, the notebook will
    display "Today" at the top; if it was written yesterday, it will display "Yesterday."
    After that, the number changes to the number of days ago that the note was written.


    On the bottom of each page are four icons (see [Figure 10–3](#Chapter10.html#fig_10_3)).
    Tapping the left and right arrow icons flips between pages in the notebook. Tapping
    the envelope icon creates a new e-mail containing the text of the note page, while
    tapping the trash can icon displays the `Delete Note` button you see in [Figure
    10–3](#Chapter10.html#fig_10_3). The first line of the note is used as the subject
    line when sending a note as an e-mail, speeding the process of mailing notes to
    others.


    ![images](images/1003.jpg)


    **Figure 10–3.** *The Notes app icons at the bottom of each page are (from left
    to right) used to go to the previous note, send the text contained in the note
    in an e-mail, delete the note, or move to the next note.*


    #### Adding and Deleting Notes


    To create a new notebook page, tap the plus sign (`+`) in the upper-right corner
    of the notebook. The first line of text typed on the note page is the title of
    your note and is repeated both on the index list and at the top of the notepad.
    To search for a word or phrase in any of the notes, type it into the `Search`
    box at the top of the index list. The list magically shrinks to show only those
    notes containing the search word or phrase (see [Figure 10–4](#Chapter10.html#fig_10_4)).


    ![images](images/1004.jpg)


    **Figure 10–4.** *Typing letters or words into the search field narrows the index
    list to only the notes containing the search criterion.*


    You can delete notes in two ways. First, as described earlier, tapping the trash
    can icon at the bottom of each note displays a `Delete Note` button. Tap that
    button to complete the deletion.


    The second way to delete a note is to swipe your finger either left or right over
    the title of the note in the index list. This is easier to do in landscape mode,
    since the index list is always in view on the left side of the `Notes` window.
    In portrait orientation, tapping the `Notes` button at the top of the notebook
    displays the index list; then you can swipe to delete a note.'
