- fmt: '### Copy and Paste


    Apple has created an easy and intuitive way to select a word or block of words,
    copy them, and then paste them into another location.


    Let’s copy some text from a web page in iPad’s Safari web browser. Before you
    can copy a word, you’ll need to select it. To do that, press and hold your finger
    over a word. A black contextual menu will pop up that gives you the `Select` and
    `Select All` options. `Select` will highlight just the single word. `Select All`
    will highlight all the words on the page. No matter which you choose, you’ll be
    presented with a grab point at the beginning and end of the selected text (see
    [Figure 4–33](#Chapter04.html#fig_4_33)). These grab points allow you to adjust
    which text is selected.


    ![images](images/0433.jpg)


    **Figure 4–33.** *Grab points allow you to select a single word, a sentence, or
    a whole paragraph to be copied.*


    **NOTE:** If you’ve selected text to copy in an editable document, you’ll see
    a contextual menu that says `Cut`, `Copy`, or `Paste`. Selecting `Cut` will remove
    the text. Selecting `Copy` will copy it, and if you already have text copied,
    you’ll be able to paste it over your current selection.


    Once you have selected your text, you’ll see another contextual menu that says
    `Copy`. Tapping `Copy` will copy the text and make it available in any app that
    support text input.


    Now let’s go back to the note in the Notes app. To paste the text you copied from
    Safari into your note, simply press and hold your finger on the screen until the
    spyglass pops up. Use the spyglass to adjust the cursor to the location where
    you want to insert the copied text and let go. You’ll see another contextual menu
    pop up that gives you three options: `Select`, `Select All`, and `Paste`. Tap
    `Paste`, and your copied text will be instantly inserted ([Figure 4–34](#Chapter04.html#fig_4_34)).


    ![images](images/0434.jpg)


    **Figure 4–34.** *Simply tap Paste, and your text is inserted automatically.*


    ### Undo and Redo


    As mentioned earlier, the iPad’s keyboard sports undo and redo buttons. Tapping
    the undo button undoes the last action you performed. So if you’ve copied and
    pasted text, tapping the undo button will unpaste the text but leave it copied
    on your clipboard. Remember that you can also shake your iPad to display an undo
    pop-up that will ask you whether you want to undo the last action you performed.


    `Redo`, if the app supports it, will repeat the last action performed. So if you’ve
    copied and pasted text, tapping the redo button will paste the text again.


    ### Accessibility


    Apple wanted to make sure everyone could use the iPad as easily as possible. To
    that end, Apple offers accessibility features to help people with disabilities
    use the iPad. We briefly touched on the iPad’s accessibility options in the iPad
    iTunes settings pane in [Chapter 2](#Chapter02.html#ch2). The iPad features more
    accessibility options than the ones you see in the settings pane, however. To
    see all the accessibility options, tap the `Settings` icon on the iPad’s Home
    screen. Under `General` settings, tap `Accessibility`. You’ll see the `Accessibility`
    settings slide onto the screen (see [Figure 4–35](#Chapter04.html#fig_4_35)).
    Let’s go through these settings one by one.


    ![images](images/0435.jpg)


    **Figure 4–35.** *The Accessibility settings*


    #### VoiceOver


    With `VoiceOver` turned on, the user can simply touch the screen to hear a description
    of what is beneath his finger. They can then double-tap to select the item. With
    `VoiceOver` enabled, the iPad will speak when the user has a new e-mail message
    and can even read the e-mail to the user.


    #### Zoom


    `Zoom` allows those hard of seeing to magnify their entire screen. This is different
    from the standard pinch and zoom features of the iPad’s regular software. Accessibility
    `Zoom` will magnify everything on the screen, allowing the user to zoom into even
    the smallest of buttons. When this option is selected, the user can double-tap
    any part of the iPad’s screen with three fingers to automatically zoom in 200
    percent. When the screen is zoomed in, you must drag or flick it with three fingers.
    Also, when you go to a new screen, zoom will always return to the top middle of
    the screen.


    #### Large Text


    This lets you increase the size of text in `Contacts`, `Mail`, and `Notes`. You
    can choose from 20-point text, 32-point, 40-point, 48-point, and 56-point.


    #### White on Black


    For some people with seeing difficulties, inverting the color of a computer screen
    so it resembles a photographic negative allows them to read text better. Turning
    `White on Black` does this.


    #### Mono Audio


    With `Mono Audio` selected, the stereo sounds of the left and right speakers will
    be combined into a mono (single) signal. This option lets users who have a hearing
    impairment in one ear hear the entire sound signal with the other ear.


    #### Speak Auto-Text


    With this option selected, any autocorrection text (like the spell-check pop-ups
    that appear when you are typing) will be spoken aloud.


    #### Triple-Click Home


    If you are sharing an iPad in a house with someone with disabilities, selecting
    this option will allow users, by triple-clicking the iPad’s physical `Home` button,
    to quickly toggle `VoiceOver`, `Zoom`, or `White on Black` on or off ([Figure
    4–36](#Chapter04.html#fig_4_36)). You can also set it so triple-clicking the `Home`
    button causes a pop-up to appear onscreen asking what accessibility feature to
    turn on.


    ![images](images/0436.jpg)


    **Figure 4–36.** *The Accessibility Options pop-up window*


    **NOTE:** With the exception of the triple-click `Home` feature, all of these
    accessibility settings can also be configured from within the iPad iTunes settings
    pane on the `Summary` tab (see [Chapter 2](#Chapter02.html#ch2)).


    ### Summary


    This chapter explored all the ways you can interact with your iPad, from taps
    to buttons to pinches. You read about the touch screen and how you can communicate
    with it. You discovered how to access your Home screen, how to lock it, and how
    to rearrange its icons. You explored your iPad’s General settings, and you learned
    tips and tricks to using the iPad’s virtual keyboard and setting accessibility
    options. In short, you were introduced to all the basic ways you and your iPad
    can communicate with each other. Here are a few key lessons for you to carry away
    with you:


    *   Build up your working iPad interaction vocabulary. You will be surprised how
    often one of the rarer gestures, like the two-fingered tap, can prove useful.

    *   If you are using your iPad in an area where your data’s security is an issue,
    be sure to set a passcode lock.

    *   `Spotlight` is a powerful search tool on the iPad and offers you another way
    to quickly launch your apps.

    *   The iPad supports more than a dozen keyboard languages as well as physical
    hardware keyboards.

    *   Don’t worry about typing perfectly on the iPad. Its smart keyboard will correct
    most of your mistakes automatically.

    *   Just because you have a disability doesn’t mean you can’t use the iPad. The
    iPad has many accessibility features to help the those with sight or hearing issues.


