- fmt: '#### Saving Bookmarks and Sharing web pages


    To save a new bookmark, tap the Share button in the Navigation bar of any Safari
    web page. It''s just to the left of the Address field. A sharing pop-up menu appears,
    giving you four choices (see [Figure 6–18](#Chapter06.html#fig_6_18)):


    ![images](images/0618.jpg)


    **Figure 6–18.** *Tap the Share button to see all the ways you can share a web
    page.*


    - **Add Bookmark**: Tapping this lets you enter a title for the bookmark and then
    optionally select a folder to save it to (see [Figure 6–19](#Chapter06.html#fig_6_19)).
    Tap the currently displayed folder to view a list of all available folders. The
    root of the bookmark tree is called `Bookmarks`. After making your selection,
    tap `Save`. Safari adds the new bookmark to your collection. If you want to return
    to Safari without saving, tap `Cancel`.


    ![images](images/0619.jpg)


    **Figure 6–19.** *Add Bookmark allows you to rename the bookmark before you save
    it.*


    - **Add to Home Screen**: This is a cool feature. Tapping this adds an icon of
    the web page to your iPad Home screen. Apple calls these web page icons *Web Clips*.
    Before you save a Web Clip, you have the option of renaming it. Keep the names
    short, so you can see the entire name under the Web Clip icon on the Home screen.


    **NOTE:** Some web sites will have an iPad-optimized site icon when you add a
    Web Clip to your Home screen. Others will just show you a thumbnail of the page
    in the shape of an iPad icon.


    Web Clips look just like app icons and allow you to simply tap to open Safari
    and automatically be taken to the web page. We keep a Home screen on the iPad
    full of our favorite Web Clips, so we can quickly navigate to our most frequently
    visited sites (see [Figure 6–20](#Chapter06.html#fig_6_20)). We find this much
    quicker than using the Bookmarks feature in Safari.


    ![images](images/0620.jpg)


    **Figure 6–20.** *A series of Web Clips on the iPad Home screen. You can see which
    sites have dedicated Web Clip icons and which ones make iPad use a thumbnail of
    the web page.*


    In iTunes the Web Clips will appear in the virtual iPad screen on the Apps tab
    (see [Chapter 2](#Chapter02.html#ch2)). Note that you can only rearrange Web Clips
    within iTunes, not delete them. To delete a Web Clip icon on the iPad, press and
    hold it until it jiggles, and then tap the `X` in the upper-left corner.


    - **Mail Link to this Page**: Tapping this button opens a new Mail message window
    in Safari and automatically inserts the link into the body of the message.

    - **Print**: Tap this button to bring up the Print menu ([Figure 6–21](#Chapter06.html#fig_6_21)).
    The Print menu allows you to select which wireless AirPrint printer you want to
    print to, as well as the number of copies you want to print. After you have made
    your choices, click the `Print` button.


    ![images](images/0621.jpg)


    **Figure 6–21.** *Printing a web page from Safari*


    ### Safari Settings


    Like many apps on the iPad, Safari can be customized to a degree. Customize your
    Safari settings by navigating to the Settings app on your iPad Home screen and
    tapping `Safari`. This screen, shown in [Figure 6–22](#Chapter06.html#fig_6_22),
    allows you to control a number of features, mostly security related. Here''s a
    quick rundown of those features and what they mean:


    ![images](images/0622.jpg)


    **Figure 6–22.** *The Safari Settings window is primarily concerned with security
    features.*


    - **Search Engine**: This setting determines which search engine is used for the
    search field you saw in [Figure 6–3](#Chapter06.html#fig_6_3). Choose from Google,
    Bing, or Yahoo!

    - **AutoFill**: This allows you to turn on AutoFill for use in filling out forms
    on web pages. In the `My Info` box, select your address book card to take the
    AutoFill information from. Here you can also choose to turn on `Names & Passwords`.
    With this feature on, Safari will remember login names and passwords to web sites
    you visit. Tap `Clear All` to wipe all saved names and passwords from your iPad.

    - **Always Show Bookmarks Bar**: Turn this on, and you''ll always see the Bookmarks
    bar below Safari''s Navigation bar; otherwise, this bar appears only when you
    select the URL field (see [Figure 6–5](#Chapter06.html#fig_6_5)).

    - **Fraud Warning**: Turn this preference on, and you''ll be presented with a
    warning before navigating to a potentially fraudulent web sites. Unfortunately,
    fraudulent sites are rampant on the Internet (like bogus PayPal sites). This feature
    helps you recognize and avoid those sites.

    - **JavaScript**: JavaScript allows web pages to run programs when you visit them.
    Disabling JavaScript means you increase overall surfing safety, but you also lose
    many cool and worthy web features. Most pages are safe to visit, but some, sadly,
    are not. To disable JavaScript, switch this from ON to OFF.

    - **Block Pop-ups**: Many web sites use pop-up windows for advertising. It''s
    an annoying reality of surfing the Web. By default, Safari pop-up blocking is
    ON. Switch this setting to OFF to allow pop-up window creation.

    - **Accept Cookies**: Cookies refer to data stored on your iPad by the web sites
    you visit. Cookies allow web sites to remember you and to store information about
    your visit. You can choose to always accept cookies, never accept cookies, or
    accept cookies only "From visited" web sites.

    - **Databases**: You''ll see this option only if you''ve visited a web site that
    uses database features such as those found in some Google sites, like Gmail. These
    databases store local information on your iPad for offline browsing.

    - **Clear History**: Tap and confirm to empty your page Navigation history from
    your iPad. This keeps your personal browsing habits private to some extent, although
    other people can still scan though your bookmarks.


    **CAUTION:** Clearing your Navigation history does not affect Safari''s Page history.
    You can still tap its Back button and see the sites you''ve visited.


    - **Clear Cookies**: Tap and confirm to clear all existing cookies from your iPad.

    - **Clear Cache**: Your iPad''s browser cache stores data from many of the web
    sites you visit. It uses this data to speed up page loading the next time you
    visit. As with your cookies and history, your cache may reveal personal information
    that you''d rather not share. Tap `Clear Cache` and `Confirm` to clear your cache.


    **TIP:** Clearing your cache may also help correct problem pages that are having
    trouble loading. By clearing the cache, you remove page items that may be corrupt
    or only partially downloaded.


    - **Developer**: Most people will never have to fuss with this setting. As its
    title suggests, it''s for developers and allows them to turn on a debug console
    that helps them when optimizing their web sites for the iPad.'
