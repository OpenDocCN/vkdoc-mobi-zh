    To determine what your 3G usage is at any time after you''ve signed up for a monthly
    plan, go to Settings ![images](images/U001.jpg) Cellular Data ![images](images/U001.jpg)
    View Account. This information, as well as the reminders that are sent out by
    carriers when you''re nearing a data usage limit, can be very helpful in keeping
    an eye on how many megabytes you''re actually consuming.'
  trans: '

    ### 特殊 Wi-Fi 设置


    对大多数人而言，默认的 Wi-Fi 设置已经足够完美。然而，在某些情况下，你可能需要连接一个要求特殊设置的网络。这时，系统可能会提示你更改 iPad 上的这些设置。


    你可以通过进入`设置` → `无线局域网`，然后点击网络名称右侧的蓝色箭头图标，来访问特殊的 Wi-Fi 设置。此时会显示一个更加详细的网络设置列表（图 5–5）。


    你可能需要更改的第一项内容是 iPad 获取互联网协议（IP）地址的方式。大多数情况下，这是通过一种名为动态主机配置协议（`DHCP`）的方式完成的。当你的
    iPad 设置为使用 `DHCP` 获取网络地址时，它会在加入网络时请求一个地址，然后获得一个持续一定时间的“租约”。该租约通常会自动续订。如果你需要手动续订
    `DHCP` 租约，可以在`设置`屏幕的 `DHCP` 选项卡上找到一个`续租`按钮，点击即可执行。


    另一种获取 IP 地址的方式是通过引导协议，即 `BootP`（图 5–6）。`BootP` 选项卡显示的信息可能需要更改，以便你的 iPad 从配置服务器上注册的地址池中获取一个地址。


    ![images](img/0505.jpg)


    **图 5–5.** *你可能永远不需要更改或查看你的网络设置。但在必要时，你可以在此处控制这些设置。*


    ![images](img/0506.jpg)


    **图 5–6.** *BootP 配置显示界面*


    最后，一些网络需要固定（即*静态*）IP 地址（图 5–7）。在这种情况下，你通常会得到一个静态 IP 地址、一个子网掩码以及路由器和 DNS 服务器的地址，你需要将这些信息输入到相应的字段中以连接网络。请提前与你的系统管理员核实以获取这些值。


    ![images](img/0507.jpg)


    **图 5–7.** *iPad 上的静态 IP 设置*


    在`设置`屏幕的每个选项卡（`DHCP`、`BootP` 和 `静态`）上，你都会找到三个用于 `HTTP 代理`的按钮。这些按钮在图 5–5 和 5–6
    中可见。在图 5–7 中，`HTTP 代理`部分被键盘遮挡住了。*代理服务器*是一种计算机系统，充当你的计算机与其他服务器之间的中介。例如，许多公司要求所有来自计算机的网络流量必须通过代理服务器，以便进行日志记录或使用审核。如果你需要输入代理信息，你的系统管理员会就所需的设置给出说明。


    ### 通过 3G 连接


    iPad 分为仅 Wi-Fi 型号和 Wi-Fi + 3G 型号。目前在美国，AT&T 和 Verizon 都提供 3G 型号。在美国以外，其他运营商根据不同国家/地区部署提供
    3G 蜂窝数据服务。


    3G 是一个移动电信标准系列，可同时支持语音和数据服务。苹果在其电话产品（iPhone 系列）和 iPad Wi-Fi + 3G 中选择了遵循全球移动通信系统（GSM）标准。该标准在全球移动电话系统中占主导地位，这意味着具备
    3G 功能的 iPhone 和 iPad 可以在全球范围内使用，尽管国际数据漫游通常非常昂贵。


    3G 的带宽通常比 Wi-Fi 更有限，但 3G 的价值在于，只要有 3G 系统覆盖的地方，几乎都可以使用数据服务。这意味着你通常可以在旅途中使用 3G 服务，而不仅仅是在本地
    Wi-Fi 热点（例如你的家、办公室或提供互联网连接的咖啡馆）使用时。Wi-Fi 仅限于短距离、高带宽的连接；而 3G 则是广覆盖但较低带宽的连接。


    你能用 3G 连接做什么呢？很多。在配备 3G 的 iPad 上，你可以相当快速地浏览互联网、通过电子邮件向朋友发送照片甚至小视频、观看 YouTube 视频，以及（正如你将在第
    8 章中发现的）购买和下载应用、音乐和书籍。


    你通过 3G 服务获得的移动性是有代价的。你需要注册一个蜂窝数据套餐，通常以按月预付的方式提供。预付费服务意味着你需要在月初为服务付费，而不是在月末，后者是
    iPhone 上更常见的服务提供方式。这也意味着你可以随时取消，因为你已使用的月份已经通过信用卡扣费。


    如果你使用 iPad 的大部分时间是在有 Wi-Fi 服务的办公室或家中，并且你只打算在旅途中偶尔使用 3G 服务收发邮件，那么一个配额更少、带宽更低的套餐可能就适合你。如果你发现低级别的数据套餐限制太多，大多数国家和运营商都提供带宽更高的高级别套餐。套餐和带宽因运营商而异，因此你需要根据自己的所在国家和所购
    iPad 型号做一些研究。例如，在美国，你不能将为 Verizon 准备的 iPad 服务切换到 AT&T 服务。由于 iPad 连接蜂窝数据网络的方式，硬件会将你限制在某个运营商。


    在注册月度套餐后的任何时间，若要查看你的 3G 使用情况，请进入`设置` → `蜂窝数据` → `查看账户`。这些信息，以及运营商在你接近数据使用量上限时发送的提醒，对于密切关注你实际消耗了多少兆字节非常有帮助。'
- fmt: '# Setting Up 3G


    There’s a very easy way to tell you have a Wi-Fi + 3G iPad in your hands without
    looking at the box; when you turn it on, the left side of the status bar shows
    the name of the 3G carrier and the signal strength at your location ([Figure 5–8](#Chapter05.html#fig_5_8)).


    ![images](images/0508.jpg)


    **Figure 5–8.** *The iPad with Wi-Fi + 3G shows the carrier name and signal strength,
    as well as the network type (3G, EDGE) on the left side of the status bar.*


    Setting up your 3G data plan is fast and only requires a credit card. With your
    iPad turned on, tap `Settings` ![images](images/U001.jpg) `Cellular Data`. If
    3G isn’t turned on, sliding the `Cellular Data` button to `On` activates the built-in
    radio. If no Cellular Data Account has been set up, you’re asked to choose a plan
    and sign up for the service right on your iPad. The details for signing up will
    vary by carrier, but as a rule, you will have to enter your first and last name,
    a contact telephone number, an active e-mail account, and credit card information.


    Moving along through the form, you’ll come to the terms of service. Read through
    them if you desire, and then tap the `Agree` button to move through the process.
    The terms of service will vary by carrier as well.


    Some carriers allow you to add a one-time international plan as well. These plans
    are very expensive. Make sure that the countries you plan to travel to are supported
    by the international plan. Select the date that you want to start your international
    plan, and then tap the `Done` button. If you’re not going to be traveling abroad
    soon, don’t tap any of the plans, and just tap `Done` to continue.


    Generally, a few minutes after signing up for a data plan, a notification ([Figure
    5–9](#Chapter05.html#fig_5_9)) appears on the iPad display telling you the data
    plan has been activated. That means that you’re all set for wandering around town
    with your iPad, free from the restrictions of needing to be near a Wi-Fi access
    point. In the United States, if you’re now an iPad data customer, you will receive
    free Wi-Fi at either any AT&T or any Verizon hotspot, depending on your subscribed
    service.


    ![images](images/0509.jpg)


    **Figure 5–9.** *Congratulations! Your iPad is now ready to connect to the world
    through 3G.*


    # Data Roaming


    When you’re using your iPad internationally, it’s a very smart idea to know what
    cellular company or companies your international plan uses and how to turn off
    data roaming. If data roaming is turned on, your device may connect to a cellular
    carrier that does not have an agreement with your home carrier, in which case
    you’ll be charged an even higher rate. To disable data roaming, select `Settings`
    ![images](images/U001.jpg) `General` ![images](images/U001.jpg) `Network` and
    switch your data roaming option to `Off`.


    For GSM iPads such as the AT&T iPad 2, research your carrier’s international roaming
    partners. Go to the carrier’s website and look up the partner carriers, the technologies
    used, and the frequencies.


    When traveling with a Verizon iPad, its CDMA service makes connecting to local
    data more difficult. Because of this, you may want to consider renting a small
    mobile Wi-Fi unit like the Novatel Wireless MiFi hotspot. MiFi hotspots provide
    portable networks that you can connect to from your GSM or CMDA iPad or laptop
    without using your iPad’s built-in data service. You need not enable data roaming
    on your iPad to access the Internet through a MiFi’s cellular data.


    XCom Global is one vendor that rents MiFi units for international use. For about
    $18 a day, you gain access to local data, which is easily served over Wi-Fi to
    your iPad or laptop. You can, of course, purchase your own unit directly and then
    shop for SIMs while on-the-go, but having a preprovisioned device that works directly
    out of the box is a big win for many travelers.


    The coverage areas and expected bandwidth vary. For example, you can expect 7.2Mbps
    in the United Arab Emirates but only 1Mbps in Guam. Check the coverage maps at
    the XCom site to make sure the areas you are visiting will allow service.


    If you are traveling between countries, you can set up multiple unit rentals through
    XCom Global. You are still charged a daily rate beginning when your travel commences
    and ending when you return to the United States. The company’s FAQ page answers
    many common questions about their service.


    While traveling, your data usage is unlimited. So what does “unlimited” data mean?
    Check out XCom’s “fair use” terms. Providers in various countries may cap usage
    or throttle bandwidth for users who draw heavily on data, but for normal computing
    needs (assuming you’re not downloading several multigigabyte movies per day),
    you should be covered.


    Rent for 7 days, and XCom throws in free shipping (normally $29.90 for FedEx 2Day;
    you will pay extra for overnight regardless). If you are renting for over 14 days,
    the daily rate goes down to $16.15/day. One thing you’ll want to consider is adding
    the option for the $2.50/day battery booster pack. MiFi works best when it’s always
    on—a battery pack offers a way to avoid switching it on and off (although it will
    get quite warm, so be sure to keep it in a ventilated bag or pocket). Alternatively,
    you can supply your own battery pack.


    We recommend the ZAGGsparq battery pack. This $100 device is international-aware,
    allowing you to charge from 220V sources; you don’t need a voltage converter,
    as a simple outlet adapter is fine. This will save you the rental fees and provide
    handy power on the go even when you’re back at home (it’s rated to recharge an
    iPad four times over).


    Also, you may consider opting for the insurance. At about $4/day, it covers up
    to three devices, allowing you to worry less about pickpockets and lost equipment.
    With insurance, you will pay a $160 deductible per unit rather than the $800 XCom
    normally charges. Three devices, $480, which is quite a bit less than the $2400
    you’re on board for.


    Together all these charges do add up to a hefty $25/day or so, not counting possible
    shipping costs, but as a business expense, that’s relatively little compared to
    what you’ll be spending on flights, hotels, food, and incidentals. It’s unquestionably
    a much better deal than paying roaming data charges.


    Summarizing this section, the key things to know when you’re taking your iPad
    Wi-Fi + 3G overseas are to turn off data roaming and to “know before you go.”


    # Changing Account Information or Adding Data


    Your iPad is very helpful in letting you know when you’re getting close to the
    bandwidth limit on your data plan. It notifies you when you have 20 percent left,
    when you have 10 percent remaining, and when your plan has run out of data. You
    can decide to either stop using data at this point, purchase another data plan,
    or (when available, as carrier offers do vary) upgrade your plan for a higher
    bandwidth allotment.


    To upgrade your data plan, change a credit card, edit your address information,
    or buy an international data plan, select `Settings` ![images](images/U001.jpg)
    `Cellular Data`. Tap the `View Account` button, and you’ll be able to make any
    changes instantly on your iPad.'
