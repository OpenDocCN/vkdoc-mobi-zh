    ### 浏览你的照片


    乐趣从这里开始。当你第一次触碰自己的数码照片时，会感觉终于迈入了 21 世纪——那个科技与珍贵记忆融合，让我们能以前所未有的方式回溯、重温并探索它们的乌托邦未来。当你开始对照片和相册进行捏合、拖拽和展开操作时，你会感觉自己像个刚把第一袋弹珠撒在地上，正睁大眼睛盯着眼前五颜六色、形状各异、大小不一且尽在掌控的孩童。


    要启动`照片`应用，请点击主屏幕上的图标。启动后，`照片`应用会显示你照片图库中照片的缩略图，如图 13–8 所示。


    ![images](img/1308.jpg)


    **图 13–8.** *照片应用*


    在应用顶部、缩略图照片的正上方，你会看到菜单栏（见图 13–9）。此栏显示多个标签页，用于在不同照片整理方式之间切换。要选择视图，请点击菜单栏中相应的标签页。请注意，根据你同步照片的方式不同，你可能不会看到所有标签页。例如，仅同步单个相册的用户将看不到`事件`。同样，照片缺少地理标签数据的用户将看不到`地点`。


    ![images](img/1309.jpg)


    **图 13–9.** *iPad 上照片的多种整理方式。*


    -   **照片**：这是你首次启动`照片`应用时看到的第一个视图。后续启动时，将显示上次关闭应用时处于活跃状态的视图（例如`地点`标签页）。在`照片`标签页（见图
    13–8）中，你的照片完全不按相册分组，而是按拍摄日期顺序显示。如果你的 iPad 上同步了大量照片，滚动浏览列表可能需要相当长的时间。

    -   **相册**：此视图按你在电脑上整理的方式，在相册中显示你的照片（见图 13–10）。如果你从网页保存过图片，或在 iPad 上接收过电子邮件中的图片，你还会看到一个`已存储的照片`相册。此外，如前所述，如果你直接从数码相机将照片导入
    iPad，你将在`上次导入`相册中看到它们。


    ![images](img/1310.jpg)


    **图 13–10.** *相册视图*


    **注意：** 你知道可以为 iPad 截屏吗？*屏幕截图*，或称*屏幕捕捉*，是指在你按下截屏键时，捕捉 iPad 屏幕上显示内容所生成的图像。要进行截屏，请按住
    iPad 上的电源按钮，然后在按住电源按钮的同时按下并松开主屏幕按钮。iPad 屏幕会闪过一道白光，你会听到快门声。听到声音后，即可松开电源按钮。捕捉到的屏幕截图将出现在`已存储的照片`相册中。你可以使用屏幕截图保存整个网页的图像，或炫耀游戏中的高分。本书中的大部分图像都是使用
    iPad 的屏幕捕捉功能拍摄的。


    -   **事件**：此视图按事件显示你的照片（见图 13–11）。事件功能用于 Aperture 2 和 iPhoto ''08 及更新版本，是一种根据照片拍摄日期自动整理照片的方式。这有助于用户轻松地将庞大的照片图库整理得易于浏览。`事件`标签页是
    Mac 独有的功能。如果你使用 Windows 电脑同步 iPad，则不会看到此标签页。


    ![images](img/1311.jpg)


    **图 13–11.** *事件视图*


    -   **面孔**：此视图将你的照片分组到个人“面孔”相册中显示（见图 13–12）。如果你在 Mac 上使用 iPhoto ''09 或 Aperture
    3，这些程序内置了面部识别软件。Mac 软件会自动为每个人创建相册，并汇总所有包含该人的照片。这是一种查看某位朋友或家人所有照片的绝妙有趣方式。`面孔`功能在一定程度上也适用于猫和狗。如果你使用
    Windows 电脑同步 iPad，则不会看到此标签页；`面孔`是 Mac 独有的功能。


    ![images](img/1312.jpg)


    **图 13–12.** *面孔视图*


    -   **地点**：如今许多相机都具备*地理标记*功能，能将照片拍摄地点的坐标编码到照片中。`地点`标签页的作用是提取照片的坐标，并将其显示在谷歌地图上（见图
    13–13）。这可以说是 iPad 上“照片”应用最酷的功能，因为它允许你在地图上浏览照片，并且你可以从全球视图一直缩放到街道级别。这对旅行者来说尤其酷：你可以一眼看到自己去过哪里，以及世界上还有多少地方等待探索。


    ![images](img/1313.jpg)


    **图 13–13.** *地点视图*


    地图上会出现红色大头针，代表照片的地理位置。你可以捏合和缩放地图以拉近距离。随着缩放，你可能会看到更多大头针出现在地图上（见图 13–14）。


    ![images](img/1314.jpg)


    **图 13–14.** *请注意，当你放大地图的某个区域时，会出现更多大头针，表示照片坐标的精度更高。*


    点击一个大头针，会弹出一个相册（见图 13–15）。然后你可以浏览在该位置拍摄的所有照片。`地点`功能需要互联网连接才能显示谷歌地图。


    ![images](img/1315.jpg)


    **图 13–15.** *点击大头针即可看到在该位置拍摄的每张照片的相册缩略图。*


    正如你现在所见，iPad 的`照片`应用将你的照片整理成五种视图，便于浏览。需要注意的是，你的 iPad 上可能不会显示所有视图。你能看到的视图类别取决于：你使用的是
    Mac 还是 Windows 电脑；你是否已选择同步每个类别视图中的相册；以及你的照片是否带有地理坐标标签。


    只要你的 iPad 上有一张照片，你就能始终看到`照片`标签页。很可能你也会看到`相册`标签页，特别是当你从数码相机将照片导入 iPad 时（会自动创建`上次导入`相册），或者当你保存了电子邮件中收到的或网上看到的图像时（会自动创建`已存储的照片`相册）。要查看其他相册、事件或面孔，你需要从电脑同步它们。你无需执行任何操作来同步`地点`；如果你有任何带有地理坐标标签的照片，其标签页会自动出现。


    ### 触摸与查看相册和照片


    现在你知道了如何浏览你的照片集，接下来你将学习如何触摸和查看它们。还记得第 4 章中介绍的所有手势吗？在查看相册集合或全屏查看单张图像时，iPad 允许你使用其中多种手势与相册或照片进行交互。

