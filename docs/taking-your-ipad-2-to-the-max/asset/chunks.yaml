  trans: '

    ### 添加日历事件


    在上述任一视图中，点击日历右下角的加号（`+`）图标，即可弹出“添加事件”对话框和标准的 iPad 虚拟键盘。若要输入事件信息，请轻点任意一个字段，然后在键盘上开始输入。轻点用于输入事件开始和结束时间的“开始与结束”字段，会显示一个日期和时间选择器（见图
    10–13）。用手指上下滚动选择开始日期和时间，然后以同样方式选择事件的结束时间。如果事件将持续一整天（例如，全天会议或生日），则将“全天”按钮滑动至“开”。


    ![images](img/1013.jpg)


    **图 10–13.** *在向日历添加事件时，你可以使用日期和时间选择器来选取开始与结束的日期和时间。*


    如果你希望事件按固定间隔重复，只需轻点“重复”字段。你将看到选项（见图 10–14），可选择按每天、每周、每两周、每月或每年重复事件。每日重复的事件可用于提醒自己服用重要药物，而每年重复的事件则能通过提醒即将到来的纪念日来挽救你的婚姻。


    ![images](img/1014.jpg)


    **图 10–14.** *任何事件都可以设置为你设定的不同时间间隔重复。*


    每个事件最多可以设置两个提醒。iPad 上的提醒同时包含声音和视觉提示；与 Mac 不同，这里无法在两种提醒类型之间选择。轻点“提醒”或“第二个提醒”字段，会显示事件前可触发提醒的时间列表。这些时间从事件前五分钟到两天不等，你也可以让
    iPad 在事件当天提醒你。


    当提醒触发时会发生什么？屏幕上会出现一个小的视觉提醒（见图 10–15），带有一个“关闭”按钮（轻点即可关闭提醒）和一个“查看事件”按钮（带你进入日历查看详情）。如果
    iPad 的音量已开启，你还会听到提醒铃声。


    ![images](img/1015.jpg)


    **图 10–15.** *你的 iPad 会通过提醒铃声和视觉提示来提醒你即将到来的约会。*


    此外还有用于输入事件地点或备注的字段。完成事件信息输入后，轻点“完成”按钮，该事件便会显示在日历上。


    ### 同步日历


    与“备忘录”应用类似，当你将 iPad 与 Windows 电脑上的 Microsoft Outlook 2003、2007 或 2010 同步，或与 Mac
    上的`iCal`或`Outlook`同步时，iPad 上“日历”应用的强大功能便会显现。设置同步的方法与设置“备忘录”类似。


    使用基座接口转 USB 连接线将 iPad 连接到 Windows 电脑或 Mac，如果`iTunes`没有自动启动，请手动启动它。在电脑上的`iTunes`中，点击窗口左侧边栏“设备”下代表你
    iPad 的图标。接着，点击“信息”标签页，向下滚动直到看到“同步 iCal 日历”（Mac；图 10–16）或“同步日历”（Windows；图 10–17）的字样。


    ![images](img/1016.jpg)


    **图 10–16.** *在 iTunes 中设置日历同步。请注意，此 iPad 已通过 Apple 的 MobileMe 服务进行同步。*


    ![images](img/1017.jpg)


    **图 10–17.** *在 Windows 版的 iTunes 中设置日历同步*


    要设置 iPad 上`iCal`与“日历”应用的同步，请选中“同步日历”（Windows）或“同步 iCal 日历”（Mac）复选框。复选框下方是单选按钮，用于将
    Mac 或 Windows 电脑上的所有日历同步到 iPad，或仅同步选定的日历。如果你的电脑上有多个日历，并且确实不需要在 iPad 上查看或编辑所有这些日历，那么你可能希望选择特定的日历进行同步。


    在图 10–16 中，你可以看到 Mac 上的四个日历——一个用于“家庭”，一个用于“工作”，一个名为“Highlands Ranch”（由 Bare Bones
    Software 的 Mac 应用程序`WeatherCal`创建，用于在日历上显示天气预报），第四个名为`Toodledo iCal`（来自在线待办事项服务
    Toodledo）。若仅将“家庭”日历同步到 iPad，请选中“所选日历”单选按钮，然后仅勾选“家庭”日历框。


    你可以通过选中“不要同步早于 30 天的事件”框，选择仅同步未来和近期的事件。如果你的日历上有许多事件，并且不想让日历数据占用 iPad 空间，这一功能非常有用。天数是可以编辑的，因此如果你只想同步过去两周及未来的事件，可以将数字
    30 改为 14。


    要应用更改并将日历同步到 iPad，请点击`iTunes`窗口右下角的“应用”按钮。同步完成后，在 iPad 上启动“日历”应用，然后为自己的成果鼓掌吧！请记住，这是双向同步，因此你在
    iPad 上所做的任何更改或添加都会同步到电脑，反之亦然。


    ### 通讯录


    iPad 桌面工具的第三个组件是`通讯录`，即你的电子地址簿。地址簿左侧是联系人姓名的滚动列表，而右侧则显示特定个人或公司的详细信息（见图 10–18）。


    ![images](img/1018.jpg)


    **图 10–18.** *通讯录是你的个人地址簿，可根据需要同步到 Mac 或 Windows 电脑以及其他设备。*


    与`日历`相比，`通讯录`应用非常简单。它没有多种信息显示方式，只有一种视图，且横屏和竖屏模式下的显示相似。这并不是说`通讯录`没有用处；事实上，`邮件`和许多其他
    iPad 应用都会使用联系人列表来实现与他人的信息共享。

    '
- fmt: '#### Adding a Contact


    To add a contact, tap the plus sign (`+`) icon on the bottom of the left page.
    A blank page in the Contacts book appears (see [Figure 10–19](#Chapter10.html#fig_10_19))
    with helpful labels to tell you what information needs to be entered into each
    field. To start entering information into any field, tap it, and the iPad''s virtual
    keyboard appears.


    ![images](images/1019.jpg)


    **Figure 10–19.** *Starting with this blank page, your contact information can
    be simple or complex.*


    Apple did a great job with the Contacts edit fields. Entering a phone number as
    a string of numbers produces a nicely formatted number with dashes and parentheses
    in all the proper places for your country. Adding a state or province code in
    the address area locks the caps key so that all the letters in the code are capitalized.
    It''s little details like this that make the iPad such a joy to use.


    You can even add a photo to each Contacts entry by tapping the `add photo` box.
    This displays a list of photo albums stored on your iPad, which you can browse
    until you find a photo of the person you''re entering information about. Tap their
    photo, and you can move and scale the image with the common iPad gestures until
    the photo looks just right. Finally, tap the `Use` button, and their photo is
    inserted into the page.


    Once you''re done entering information about a person or company, tap the `Done`
    button in the upper-right corner of the Contacts app to see the finished page
    in your virtual address book.


    Should you need to add or change information at any time, tap the `Edit` button
    to reveal the edit fields for Contacts. There''s also a `Share` button at the
    bottom of each Contacts entry that creates an e-mail containing a `.vcf` (vCard
    file format) file that can be opened by most address book applications. For those
    people who have a second- or later-generation iPad, a `FaceTime` button appears
    at the bottom of each Contacts entry. With a tap or two, you can video chat with
    your friends or family.


    To delete a contact, tap the `Edit` button, and then scroll to the bottom of the
    contact information. There''s a large red `Delete Contact` button there. Tap it,
    and a small dialog box appears asking whether you want to delete the contact or
    cancel the deletion. When you tap `Delete`, the contact is removed from your iPad
    contacts list.


    #### Groups and Searching


    At the top of the left page in Contacts is a small red ribbon bookmark with the
    word *Groups* on it. Tapping that red ribbon lists all the groups that you have
    created…but not on your iPad. You cannot create groups of contacts on your iPad.
    That task has to be done on your Mac or Windows computer.


    Why use groups? It''s a great way to make it easier to find certain people who
    you know are in a specific group or to list everyone in a certain group. In other
    words, instead of searching 2,000 contacts for a person you know is a member of
    a particular group, you can narrow it down to the people in that group.


    Speaking of searching, you can use the `Search` field at the top of the Contacts
    left page to look for specific people or companies. Tap in the `Search` field,
    start typing, and Contacts provides a list of people or companies that fit the
    search criteria. As an example, searching for *Steve* produces a list of people
    with that first name who are included in the contacts list (see [Figure 10–20](#Chapter10.html#fig_10_20)).


    ![images](images/1020.jpg)


    **Figure 10–20.** *The Search field is helpful when you need to find someone quickly
    in a large number of contacts.*


    #### Syncing Contacts


    Remember how you set up syncing of Calendar and Notes earlier in this chapter?
    That''s how you''re going to set up syncing of Contacts as well. The companion
    applications on a Windows computer can be Microsoft Outlook 2003, 2007, or 2010;
    Windows Address Book (Windows XP), or Windows Contacts (Windows Vista and Windows
    7). On the Mac, contact synchronization can be set up with Address Book and Microsoft
    Entourage 2004 or 2008. Which application should you use? If you use Outlook on
    your Windows computer, then sync with the Outlook contacts list. If you use web
    mail or an application other than Outlook for mail, contacts, and calendar, then
    use either Windows Address Book or Windows Contact depending on which is available
    in the version of the Windows operating system you''re using.


    Connect your iPad to your Mac using the Dock Connector to USB Cable, and then
    launch iTunes if it doesn''t start by itself. In iTunes on your computer, click
    the icon designating your iPad under Devices in the sidebar on the left side of
    the window. Next, click the Info tab and scroll down until you see the words *Sync
    Address Book Contacts* (Mac; [Figure 10–21](#Chapter10.html#fig_10_21)) or *Sync
    Contacts* (Windows; [Figure 10–22](#Chapter10.html#fig_10_22)).


    ![images](images/1021.jpg)


    **Figure 10–21.** *To sync Contacts with your Mac, select the Sync Address Book
    Contacts box. Note that this iPad is already syncing through MobileMe.*


    ![images](images/1022.jpg)


    **Figure 10–22.** *To sync Contacts with your Windows computer, select the Sync
    Contacts in iTunes box.*


    As with syncing calendars, you have the choice of either syncing all your contacts
    to the iPad or just selected groups. There are several other check boxes to consider
    when setting up address book syncing.


    First, you may want to add contacts that you create on your iPad to a specific
    group. That''s what the `Add contacts created outside of groups on this iPad to`
    check box is for. Select the box, and then select a group. Any new contacts created
    on the iPad are automatically added to that group.


    Apple also built in synchronization with other address books. The next two check
    boxes are used to set up synchronization with Yahoo! Address Book or Google Contacts.
    Checking either of the boxes displays a legal agreement allowing iTunes to synchronize
    with Yahoo! or Google. You can either agree or disagree with the statement, but
    realize that you won''t be able to sync with these services without clicking the
    `Agree` button.


    Once you''ve agreed to allow the sharing of information with Google or Yahoo!,
    a configuration screen appears requesting your user ID and password for that service.
    Entering that information and then clicking `Apply` in the lower-right corner
    of iTunes ensures that your Contacts information is synced between your iPad,
    your computer''s address book or Contacts application, and either Yahoo! Address
    Book or Google Contacts.'
