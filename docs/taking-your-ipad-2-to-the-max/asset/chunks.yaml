    \ You can search through your books library by words in a title or the author's\
    \ name. Tap a book in the search results to open it. Note that you can search\
    \ for books in Icon view, too. All you need to do is pull down on the bookshelf,\
    \ and a search field will be revealed (see [Figure 9–5](#Chapter09.html#fig_9_5)).\n\
    \n![images](images/0905.jpg)\n\n**Figure 9–5.** *The search field in Icon view*\n\
    \n*   *Edit*: The Edit button is in the top-right corner of the bookshelf. Tapping\
    \ this button will cause you to enter Edit mode. Edit mode allows you to rearrange\
    \ the order of books or delete books from your library completely.\n    *   *Rearranging\
    \ books*: In Icon view in Edit mode, simply tap and hold a book's cover and drag\
    \ it to a new position on your bookshelf. This is no different from the way you\
    \ arrange apps on your iPad's Home screen. In List view in Edit mode, you can\
    \ only rearrange books in the Bookshelf sorting category. Tap and hold the grip\
    \ bars on the right of the book's genre and drag the book to your preferred position.\n\
    \    *   *Deleting books*: When you tap the Edit button in Icon view, you'll see\
    \ black and white *X*s appear on the left corner of a book's cover. Tap the *X*\
    \ to open adeletion confirmation window. Tap Delete to remove the book from your\
    \ iPad. In List view in Edit mode, you can delete books from any ofthe four sort*v*iews.\
    \ Simply tap the white Minus Sign (–) button in the red circle, and then tap the\
    \ Delete button that appears at the opposite end of the screen to confirm the\
    \ deletion.\n\n**NOTE:** Deleting a book from the iPad will not delete it from\
    \ your iTune*s* library on your computer. You will be able to resync the book\
    \ any time you want.\n\nYou may notice that some of your books have a blue or\
    \ red ribbon in the upper-right corner of the cover. The red ribbons say Sample,\
    \ and they signify the book on your bookshelf is a sample you've downloaded from\
    \ the iBookstore. Samples will stay on your iPad until you delete them or buy\
    \ the full book, but they will not sync back to your iTunes books library.\n\n\
    Blue ribbons say New, and they signify that you have not begun reading the book\
    \ yet. The New ribbon will appear until you've turned at least one page inside\
    \ the book (see [Figure 9–6](#Chapter09.html#fig_9_6)).\n\n![images](images/0906.jpg)\n\
    \n**Figure 9–6.** *Books with the New and Sample ribbons next to a previously\
    \ read book*\n\n### Organizing Your Books into Collections\n\niBooks does a wonderful\
    \ job of displaying your books and PDFs on a digital bookshelf; however there\
    \ may come a time when your book collection grows so large that seeing them all\
    \ displayed on a single iBooks bookshelf might not make for the easiest browsing\
    \ experience.\n\nLuckily, Apple has a built-in feature called *Collections* that\
    \ allows you to sort your books onto different bookshelves for easier organization.\
    \ In the upper-left corner of the iBook screen, you'll see the Collections button.\
    \ Tap it to reveal a list of book collections in iBooks (see [Figure 9–7](#Chapter09.html#fig_9_7)).\n\
    \n![images](images/0907.jpg)\n\n**Figure 9–7.** *The Collections menu*\n\nBe default\
    \ you'll see two collections: Books and PDFs. Any e-books you have will appear\
    \ on their own bookshelf under the Books collection, and any PDFs you have will\
    \ appear on their own bookshelf under the PDFs collection.\n\n#### Creating New\
    \ Collections\n\nIf you'd like to create new collections to better manage your\
    \ library, you can do so easily:\n\n1.  Tap the Collections button so the Collections\
    \ menu appears.\n2.  Tap the New button.\n3.  A new collections field will appear\
    \ (see [Figure 9–8](#Chapter09.html#fig_9_8)); enter the name of your new collection.\n\
    \n    ![images](images/0908.jpg)\n\n    **Figure 9–8.** *Creating a new collection*\n\
    \n4.  When you have entered your collection's name, click Done and your new collection\
    \ will be created.\n\n##### Adding Books and PDFs to Your Collections\n\nOnce\
    \ you've created a new collection, you need to add some books or PDFs to it. Follow\
    \ these steps to add books or PDFs to a collection:\n\n1.  Tap the Edit button\
    \ in the upper-right corner of an iBooks bookshelf.\n2.  Tap the book(s) or PDF(s)\
    \ you want to add to a collection. The selected book or PDF cover will fade, and\
    \ a blue Checkmark icon will appear in its lower-right corner (see [Figure 9–9](#Chapter09.html#fig_9_9)).\n\
    3.  Tap the Move button in the top-left corner of the iBooks bookshelf. The collections\
    \ list will be displayed (see [Figure 9–9](#Chapter09.html#fig_9_9)).\n4.  Choose\
    \ the collection you want to add the selected books or PDFs to by tapping its\
    \ name. An animation will show the selected books flying into the selected collection,\
    \ and you'll be taken to that collection's bookshelf, where you'll now find your\
    \ selected books or PDFs.\n\n![images](images/0909.jpg)\n\n**Figure 9–9.** *Separating\
    \ books into collections*\n\n**Note:** You can only place a specific book or PDF\
    \ in one collection at a time. When you add a PDF or book to a collection, it\
    \ is removed from its previous collection.\n\n#### Navigating Between Your Collections\n\
    \niBooks makes it easy to navigate between your collections. In fact, it gives\
    \ you two ways to do this:\n\n*   Tap the Collections menu and then tap the collection\
    \ you want to view.\n*   Or, from any collections bookshelf, drag your finger\
    \ left or right to swipe to the previous or next collection."
  trans: "\n### 浏览你的书库\n\n好，你已经下载并同步了一堆书籍。在开始阅读之前，我们先来熟悉一下如何在书库中浏览所有书籍。\n\n![images](img/0903.jpg)\n\
    \n**图 9–3.** *从 iBooks 书库的标题栏，你可以访问 iBookstore、在各个藏书分类间切换，以及访问视图和编辑模式。*\n\niBooks\
    \ 书库的标题栏上有五个按钮：\n\n- `Store`：如前所述，点击此按钮将进入 iBookstore。\n- `Collections`：`收藏`按钮会显示\
    \ iBooks 中所有藏书分类的列表。默认情况下，你会看到两个分类：\n    - `Books`：点击`图书`，你会看到自己的书架。这里包含你在 iBooks\
    \ 应用中拥有的所有电子书。\n    - `PDFs`：点击`PDF`会进入你的 PDF 书架。我们将在本章后半部分详细讨论 iBooks 的 PDF 功能。\n\
    \n我们稍后在本章中还会详细讨论收藏分类。\n\n- `Icon View`：这是书库的默认视图。这个带有四个白色方块的按钮会以较大的、易于辨识的缩略图形式显示所有书籍的封面。\n\
    - `List View`：这是`图标视图`按钮旁边的按钮，上面有三条白色横线。点击它可查看 iBooks 书库的列表视图（参见图 9–4）。\n\n![images](img/0904.jpg)\n\
    \n**图 9–4.** *带有按书架、标题、作者和类别排序选项的列表视图*\n\n当你点击`列表视图`按钮时，你会注意到书籍的名称旁边会显示其体裁。你还会注意到，在屏幕底部有四种排序方式：\n\
    \n- `Bookshelf`：按书籍在图标视图中的显示顺序排列。\n- `Titles`：按书名首字母顺序排列。\n- `Authors`：按作者姓名的字母顺序排列。\n\
    - `Categories`：按体裁分组显示。书籍在每个分组内按字母顺序排列。\n\n列表视图的标题栏中还有一个搜索框。点击搜索框可调出键盘并输入搜索关键词。你可以通过书名或作者名中的词语来搜索整个书库。点击搜索结果中的书籍即可打开。请注意，在图标视图中也可以搜索书籍。你只需向下拉书架，搜索框就会显示出来（参见图\
    \ 9–5）。\n\n![images](img/0905.jpg)\n\n**图 9–5.** *图标视图中的搜索框*\n\n- `Edit`：`编辑`按钮位于书库的右上角。点击此按钮将进入编辑模式。编辑模式允许你重新排列书籍顺序，或彻底删除书库中的书籍。\n\
    \    - **重新排列书籍**：在图标视图的编辑模式下，只需长按书籍封面，然后将其拖到书库中的新位置。这与你在 iPad 主屏幕上排列应用的方式无异。在列表视图的编辑模式下，你只能在“书架”排序类别中重新排列书籍。长按书籍体裁右侧的拖动手柄，然后将书籍拖到你想要的位置。\n\
    \    - **删除书籍**：当你在图标视图中点击`编辑`按钮时，你会看到书籍封面的左上角出现黑白相间的 *X*。点击 *X* 可打开删除确认窗口。点击`删除`即可从\
    \ iPad 中移除该书。在列表视图的编辑模式下，你可以在四种排序视图中的任意一种下删除书籍。只需点击红色圆圈中的白色减号 (–) 按钮，然后点击屏幕另一端出现的`删除`按钮确认删除即可。\n\
    \n**注意：** 从 iPad 上删除书籍并不会将其从电脑上的`iTunes`资料库中删除。你随时可以重新同步该书。\n\n你可能会注意到，有些书籍封面右上角带有蓝色或红色的书签。红色书签显示为`Sample`，表示书架上的这本书是你从\
    \ iBookstore 下载的样章。样章会保留在你的 iPad 上，直到你删除它或购买完整书籍，但它们不会同步回你的 iTunes 图书资料库。\n\n\
    蓝色书签显示为`New`，表示你尚未开始阅读该书。`New`书签会一直显示，直到你在书中翻过至少一页（参见图 9–6）。\n\n![images](img/0906.jpg)\n\
    \n**图 9–6.** *带有“新书”和“样章”书签的书籍，旁边是一本已读过的书*\n\n### 将书籍整理到收藏中\n\niBooks 在电子书架上展示你的书籍和\
    \ PDF 方面做得非常出色；然而，当你的藏书量变得非常庞大时，把它们全部显示在一个 iBooks 书库里可能就不会带来最轻松的浏览体验了。\n\n幸运的是，苹果有一个内置功能叫`收藏`，它允许你将书籍分类到不同的书架上，以便更好地整理。在\
    \ iBooks 屏幕的左上角，你会看到`收藏`按钮。点击它可调出 iBooks 中的藏书分类列表（参见图 9–7）。\n\n![images](img/0907.jpg)\n\
    \n**图 9–7.** *收藏菜单*\n\n默认情况下，你会看到两个分类：`Books`（图书）和`PDFs`（PDF）。你拥有的所有电子书都会出现在`图书`分类下的专属书架上，而所有\
    \ PDF 文件则会出现在`PDF`分类下的专属书架上。\n\n#### 创建新收藏\n\n如果你想创建新的收藏来更好地管理你的资料库，可以轻松做到：\n\n\
    1.  点击`收藏`按钮，调出收藏菜单。\n2.  点击`新建`按钮。\n3.  将会出现一个新的收藏字段（参见图 9–8）；输入新收藏的名称。\n\n \
    \   ![images](img/0908.jpg)\n\n    **图 9–8.** *创建一个新收藏*\n\n4.  输入收藏名称后，点击`完成`，你的新收藏就创建好了。\n\
    \n##### 向收藏中添加书籍和 PDF\n\n创建好新收藏后，你需要向其中添加一些书籍或 PDF。按照以下步骤将书籍或 PDF 添加到收藏中：\n\n\
    1.  点击 iBooks 书库右上角的`编辑`按钮。\n2.  点击你想要添加到收藏中的一本书或 PDF。被选中的书籍或 PDF 封面会变淡，并在其右下角出现一个蓝色的勾选图标（参见图\
    \ 9–9）。\n3.  点击 iBooks 书库左上角的`移动`按钮。收藏列表将会显示出来（参见图 9–9）。\n4.  通过点击收藏的名称，选择你想将选中的书籍或\
    \ PDF 添加到的目标收藏。这时会有一个动画显示选中的书籍飞入所选收藏中，然后你会进入该收藏的书架，在那里就能找到你选中的书籍或 PDF。\n\n![images](img/0909.jpg)\n\
    \n**图 9–9.** *将书籍分入不同的收藏*\n\n**注意：** 同一本书或 PDF 一次只能放置在一个收藏中。当你将 PDF 或书籍添加到一个收藏时，它会从其先前的收藏中移除。\n\
    \n#### 在收藏间切换\n\niBooks 让你可以轻松地在不同收藏间切换。事实上，它提供了两种方式：\n\n- 点击`收藏`菜单，然后点击你想要查看的收藏。\n\
    - 或者，在任何收藏的书架上，向左或向右滑动手指，即可切换到上一个或下一个收藏。\n"
- fmt: "### Editing Collections\n\niBooks lets you edit the names of existing collections,\
    \ arrange the collections in a specific order, and delete collections.\n\nFollow\
    \ these steps to edit the name of a collection:\n\n1.  Tap the `Collections` button\
    \ so the `Collections` menu appears.\n2.  Tap the `Edit` button.\n3.  Tap the\
    \ collection that you want to edit the name of.\n4.  Enter the new name of the\
    \ collection.\n5.  Tap the `Done` button when finished.\n\nFollow these steps\
    \ to arrange the order of a collection:\n\n1.  Tap the `Collections` button so\
    \ the `Collections` menu appears.\n2.  Tap the `Edit` button.\n3.  Use the grip\
    \ bars to drag your collections up or down in the collections list (see [Figure\
    \ 9–10](#Chapter09.html#fig_9_10)). You can't move the `Books` or `PDFs` collections.\n\
    4.  Tap the `Done` button when finished.\n\n![images](images/0910.jpg)\n\n**Figure\
    \ 9–10.** *Editing collections*\n\nFollow these steps to delete a collection:\n\
    \n1.  Tap the `Collections` button so the `Collections` menu appears.\n2.  Tap\
    \ the `Edit` button.\n3.  Tap the red `Minus Sign` button (see [Figure 9–10](#Chapter09.html#fig_9_10)).\n\
    4.  A red `Delete` button will appear. Tap it to delete the collection. A warning\
    \ dialog will appear, asking you if you want to remove the collection's items\
    \ from the device or move the items the back to their default collections. Tap\
    \ `Remove` to remove the items from your iPad or tap `Don't Remove` to keep them\
    \ on the iPad and move them back to their default (`Books` or `PDFs`) collections.\n\
    \n### Reading Books\n\nThe bookshelf displays your books in a gorgeous and easy-to-find\
    \ layout, but books are meant to be read, not looked at. Let's get started!\n\n\
    To read a book, simply tap its cover. The book will fly forward and open. If it's\
    \ the first time you've opened the book, you'll be on the first page. If you have\
    \ opened the book before, it will open on the page you left off on.\n\nWhile reading\
    \ a book, you can choose between Landscape or Portrait orientation. Landscape\
    \ mode shows you two pages side by side, while Portrait mode shows you a single\
    \ page (see [Figure 9–11](#Chapter09.html#fig_9_11)). You can navigate between\
    \ the two modes simply by rotating your iPad.\n\n![images](images/0911.jpg)\n\n\
    **Figure 9–11.** *Reading a book in Landscape and Portrait modes*\n\nAt the top\
    \ of any book's page, no matter what orientation you are in, you'll notice a menu\
    \ that contains a series of buttons (see [Figure 9–12](#Chapter09.html#fig_9_12)).\
    \ We will get to using all these features momentarily, but let's look at the various\
    \ menu options first:\n\n![images](images/0912.jpg)\n\n**Figure 9–12.** *A book's\
    \ menu buttons*\n\n*   *Library*: Tapping this effectively closes the book and\
    \ takes you back to your bookshelf. The next time you open this book, you'll be\
    \ taken to the page you were on when you left it.\n*   *Table of Contents/Bookmarks*:\
    \ This button is signified by three dots, each with a line after it. Tap this\
    \ button to be taken to the book's `Table of Contents` and `Bookmarks` page.\n\
    *   *Buy*: This button (not shown) appears next to the `Table of Contents` button\
    \ when you are reading a sample book downloaded from the iBookstore. Tapping it\
    \ allows you to buy the full book.\n*   *Brightness*: This is the button that\
    \ looks like the sun and changes the screen brightness while inside the iBooks\
    \ app only.\n*   *Font*: This button, symbolized by a small and big *A*, allows\
    \ you to change the font of the book's text, as well as the font size. This is\
    \ helpful for those people who need larger text while reading, such as older people\
    \ or anyone with sight difficulties. It also lets you change the background of\
    \ the book's page to a sepia tone.\n*   *Search*: The `Search` button looks like\
    \ a magnifying glass and allows you to search through a book's text.\n*   *Bookmark*:\
    \ Tap the `Bookmark` ribbon button to lay down a red bookmark in the upper-right\
    \ corner.\n*   *Page Scrubber*: This is the series of dots that run along the\
    \ bottom of a book's page (see [Figure 9–14](#Chapter09.html#fig_9_14)). Tap and\
    \ hold the square button that sits on the dots; next, drag it left or right to\
    \ quickly navigate through the book's pages.\n\nWhile reading, you can tap the\
    \ center of a book's page to show/hide the Menu and Page Scrubber bars. You'll\
    \ be left with only the title of the book and the name of the author (in Landscape\
    \ view) at the top of the page—and the page number at the bottom.\n\n#### Turning\
    \ Pages\n\nYou have three ways to move through a book's pages:\n\n*   Tap and\
    \ hold the side of a page, and then drag your finger across; the page will curl\
    \ on the screen (see [Figure 9–13](#Chapter09.html#fig_9_13)). When you lift your\
    \ finger, the page turn will be complete.\n\n    ![images](images/0913.jpg)\n\n\
    \    **Figure 9–13.** *You get cool eye candy when turning a page.*\n\n*   Tap\
    \ the right or left side of the screen to move forward or backward. This accomplishes\
    \ the same function as the previous one, but with less interactive eye candy.\n\
    *   Tap and hold the `Page Scrubber` bar at the bottom of a page (see [Figure\
    \ 9–14](#Chapter09.html#fig_9_14)), then slide your finger in either direction.\
    \ The name of the chapter and the page number will appear above the `Page Scrubber`\
    \ bar as you slide. When you've found the right page, remove your finger from\
    \ the scrubber, and the page will flip, taking you to the page you've selected.\
    \ The `Page Scrubber` bar lets you go to a specific page number quickly, without\
    \ having to flip through all the pages of the book.\n\n![images](images/0914.jpg)\n\
    \n**Figure 9–14.** *The Page Scrubber bar shows the page number and chapter title.*\n\
    \n**NOTE:** Many people read in bed. Reading an iPad in bed is fine, but because\
    \ of its built-in accelerometer that detects orientation, you may find the screen\
    \ rotating back and forth, depending on the angle you are holding it at. To lock\
    \ the iBooks app into a particular page view while reading in bed, switch the\
    \ orientation lock on by flipping the side switch on the side of the iPad. Note\
    \ that you'll want to make sure you've enabled the side switch as an `Orientation\
    \ Lock` button and not the `Mute Switch`. Go to `Settings` ![images](images/U001.jpg)\
    \ `General` and select `Lock Rotation` under the `Use Side Switch to` option.\n\
    \n#### Adjusting Brightness\n\nDepending on your eyes, you may find it easier\
    \ to read text with a brighter or darker screen. To adjust the iPad's screen brightness\
    \ while reading a book, tap the `Brightness` button (the one that looks like a\
    \ sun) in the Menu bar. A drop-down menu will appear with a slider in it (see\
    \ [Figure 9–15](#Chapter09.html#fig_9_15)).\n\n![images](images/0915.jpg)\n\n\
    **Figure 9–15.** *The Brightness slider*\n\nSlide to the left to reduce brightness\
    \ and to the right to increase it. When adjusting the brightness in the iBooks\
    \ app, the entire screen will brighten or dim according to your slider settings;\
    \ however, once you leave the iBooks app, the screen brightness will return to\
    \ the settings you have specified in the iPad's `Settings` application. This is\
    \ a great feature because you can instantly switch between brightness levels when\
    \ you enter or exit the iBooks app without having to reconfigure them each time.\n\
    \nTo change your iPad's overall brightness levels, go into `Settings` on the iPad's\
    \ Home screen and choose `Brightness & Wallpaper`. Adjust the slider there to\
    \ set your preferred brightness."
