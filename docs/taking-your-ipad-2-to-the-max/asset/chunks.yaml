  trans: '

    # 寻找遗失的 iPad


    你的 iPad 丢了吗？别担心！Apple 开发了一款免费应用，名为`查找我的 iPhone`。没错，它的名字里写着“iPhone”，但同样适用于 iPad
    和 iPod touch。通过这款应用，你可以从任何 iPhone、iPad 或 iPod touch 上定位你所有的 iDevice 设备，也可以通过登录
    [`www.me.com`](http://www.me.com) 上的 MobileMe 账户来实现。


    在你能找到遗失的 iPad 之前，需要先确保你已经在设备上安装并设置好了`查找我的 iPhone` 应用。因此，最好在拿到 iPad 后就立即完成设置。一旦你在
    iPad 和其他 iOS 设备上设置好`查找我的 iPhone`，启动应用并登录。之后你会看到如图 12-33 所示的界面。


    ![images](img/1233.jpg)


    **图 12-33.** *`查找我的 iPhone` 应用会显示你的 iPad 和其他 iOS 设备在任何时刻的位置。*


    通过左上角的`设备`按钮，你可以选择想要查看位置的 iOS 设备。选中一个设备后，它会显示在地图上。iPad 会由一个微小的 iPad 图标表示。点按该图标可查看设备名称，然后点按蓝色的`信息`按钮，会弹出一个窗口，显示你可以对该设备执行的各种操作（图
    12-33）：


    - **显示信息或播放声音**：这让你可以在 iPad 上显示一条文本信息，或者以最大音量播放声音两分钟（即使 iPad 处于静音状态）。如果你不知道 iPad
    或 iPhone 落在家里哪个角落，声音功能会非常实用。

    - **远程锁定**：用于在设备上设置远程密码锁定，或启用你当前的密码锁定。这可以确保任何不知道密码的人都无法使用该设备。

    - **远程抹掉**：这是最坏情况下的功能。如果你的 iPad 被盗，且你不想扮演侦探追踪到窃贼家中，你可以远程抹掉 iPad。远程抹掉 iPad 会永久清除你设备上的所有个人数据，确保无论谁拿到或找到你的
    iPad，都无法利用你的身份信息进行欺诈。


    ## 总结


    地图应用将世界掌握在你手中。通过它，你可以找到前往最爱的披萨店的路线，即时获取你的当前位置，或者足不出户就能查看吉萨金字塔顶端的模样。你已经学会了如何使用地图查找公共交通时间和路线、获取实时交通状况，或者只是虚拟漫步在你正在考虑搬去的街区街道上。以下是一些可供参考的小贴士：


    - 当一个人或商家在你的通讯录中时，可以节省时间。无需输入完整地址，只需输入名字的几个字母并选择该联系人即可。

    - 点按路线列表上的各个项目，可以跳转到路线中的相应部分。

    - `最近项目`列表（在`书签`中）会同时显示最近的地点 *和* 最近的路线。

    - 链接到 Google 地图的 URL 会自动在地图应用中打开，无论是在 Safari 还是邮件中点按它们。

    - 街景视图很有趣，而且如果你想探索城市中——或世界上几乎任何大城市中——你从未到访过的区域，它也非常有用。

    - 大量其他应用都支持在 iPad 上使用地图功能。有些使用 Google 地图，有些则使用自己的地图软件。查看本章中的推荐，或在 App Store 中搜索“地图”或“导航”，可以找到大量利用交互式地图的应用。

    - 别忘了下载并安装免费的`查找我的 iPhone` 应用。用它来追踪丢失或被盗的 iOS 设备。


    # 第 13 章


    # 触摸你的数码照片


    借助 iPad 的“照片”应用（从其图标启动，如图 13–1 所示），你可以将照片从家用电脑中解放出来，像昔日传递纸质照片一样在房间里传阅。把你的 iPad
    递给朋友，他们就可以在手中滑动浏览你的照片，而无需围在一台台式电脑前。在本章中，你将了解如何浏览你的照片集、与朋友和家人分享照片，以及将 iPad 用作数码相框。


    ![images](img/1301.jpg)


    **图 13–1.** *“照片”应用图标*


    ## 将照片导入 iPad


    在 iPad 上查看照片之前，首先需要将照片存入设备。有五种方法可以实现：从电脑同步照片、从数码相机直接导入照片到 iPad、从电子邮件中保存照片、保存网页上的图片，以及使用
    iPad 内置摄像头拍照。我们在 第 15 章 中讨论了使用 iPad 摄像头拍摄照片的各种方式。


    ### 从电脑同步照片


    我们在 第 2 章 中讨论过如何将照片同步到 iPad，但现在让我们再简要回顾一下。iTunes 可以将你的 iPad 与存储在电脑上的图片进行同步。这让你可以随身携带你的照片集，并利用
    iPad 独特的触控界面进行分享。当你拥有机身纤薄、显示屏鲜艳的 iPad 时，谁还需要随身携带厚重实体相册呢？


    首先，将 iPad 连接到电脑，然后启动 iTunes。从来源列表（iTunes 窗口左侧的蓝色列）中选择你的 iPad，然后打开`照片`标签页。勾选“同步照片”复选框，接着选择你想要同步的照片的位置。你的选项取决于操作系统。


    在电脑上，你的选项包括 Adobe Photoshop Elements 3.0 或更新版本，或者电脑上的任意文件夹（例如`我的图片`）。在 Mac 上，你的选项包括
    iPhoto 4.0.3 或更新版本、Aperture 3.0.2 或更新版本，或者电脑上的任意文件夹。


    选择好照片来源后，需要决定是同步整个照片集（对于相对较小的图库来说是很好的选择），还是同步单个相册（更适合于可能无法完全存入 iPad 有限存储空间的大型图库）。如果选择后者，则只挑选那些你想要复制到
    iPad 上的相册。


    如果你使用的是 Mac 以及 iPhoto 或 Aperture，你还可以选择同步面孔（iPhoto ''09 或更新版本）、事件（iPhoto ''08
    或更新版本）和相册（参见图 2-38）。面孔是智能相册，其中包含所有含有特定人物面部的照片。这是通过 iPhoto 内置的面部识别软件实现的。事件是另一种智能相册，它将同一天拍摄的照片分组在一起。这有助于减少杂乱，保持照片库的有序。


    最后，点击`应用`保存更改，然后进行同步。

    '
- fmt: '# Importing Photos from a Digital Camera or iPhone


    You can also import photos to your iPad directly from any camera that can connect
    via USB or that uses a SD card. To do this, you will need to purchase the iPad
    Camera Connection Kit ($29 at the Apple Store). The kit includes two adapters—one
    for connecting a camera through a USB 2.0 cable, the other for reading SD memory
    cards (see [Figure 13–2](#Chapter13.html#fig_13_2)).


    The iPad supports standard photo formats, including `JPEG`, `GIF`, `TIFF`, `PNG`,
    and `RAW`. You can connect most cameras to your iPad through the USB adapter in
    the iPad Camera Connection Kit, including an iPhone so that you can do direct
    iPhone to iPad photo transfers. You can even connect the popular line of Flip
    cameras to the iPad, but because of USB power issues, you will need to connect
    the Flip camera to an external power source before you connect it via USB to your
    iPad.


    You can also import video clips taken by your camera through the iPad Camera Connection
    Kit if those video clips are in one of the video formats the iPad supports. Supported
    iPad video formats are `M4V`, `MP4`, `MOV`, `MPEG-4`, and `H.264`. The iPad does
    not support many popular video formats such as `AVI` and `WMV`, but there are
    countless applications that let you convert `AVI` and `WMV` files to iPad-compatible
    formats. Google *WMV to iPad* or *AVI to iPad* to see all the software that offers
    conversion capabilities.


    ![images](images/1302.jpg)


    **Figure 13–2.** *The iPad Camera Connection Kit features a USB adapter and an
    SD card reader.*


    To import photos, plug either the USB adapter or the SD card adapter into the
    iPad. When using the USB adapter, connect your digital camera to it using the
    USB cable the camera came with, and switch the camera into transfer mode (see
    your camera''s manual for details). To import photos from your iPhone''s camera,
    plug the iPhone into the USB adapter using the iPhone''s Dock Connector to USB
    Cable. Make sure the iPhone is turned on. When importing using the SD card adapter,
    plug the adapter into the iPad, and insert the SD card into it.


    Once your camera or SD card is attached, unlock your iPad by sliding the unlock
    bar on the bottom of the lock screen. The Photos application automatically appears,
    displaying the photos available for importing. You now have two options: import
    all the photos by tapping the `Import All` button (see [Figure 13–3](#Chapter13.html#fig_13_3))
    or import only a selection of photos.


    ![images](images/1303.jpg)


    **Figure 13–3.** *Import all your photographs by tapping the `Import All` button
    at the bottom of the screen.*


    To import selected photos, tap each photo you wish to include. A check mark appears
    on it (see [Figure 13–4](#Chapter13.html#fig_13_4)). When you are done selecting
    photos, tap `Import` and select `Import Selected`.


    ![images](images/1304.jpg)


    **Figure 13–4.** *Importing some of your photographs*


    After a successful import, the iPad prompts you to decide whether to keep or delete
    the photos you imported from the device you imported them from (see [Figure 13–5](#Chapter13.html#fig_13_5)).


    ![images](images/1305.jpg)


    **Figure 13–5.** *Choose to save or delete the imported photos on the external
    device.*


    Newly imported photos appear in an album called `Last Import` (see [Figure 13–6](#Chapter13.html#fig_13_6))
    and in a new event, which contains the last imported photos. After you have imported
    photos more than one time, you''ll also see an album called `All Imported`.


    ![images](images/1306.jpg)


    **Figure 13–6.** *Photos imported directly to the iPad from a digital camera or
    SD card will show up in the `Last Import` album.*


    Once you have transferred your photos, you can disconnect the camera connection
    adapter from the iPad.


    To export transferred photos from the iPad back to your computer, connect your
    iPad and open a photo application such as iPhoto or Image Capture on a Mac or
    Adobe Elements on a Windows computer.


    # Using a USB Thumb Drive to Transfer Photos to the iPad


    You may find yourself in a situation where you quickly want to add some photos
    from your computer to the iPad. You want to avoid an entire synchronization procedure.
    Wouldn''t it be great if you could quickly import images to the iPad using a USB
    thumb drive?


    Good news! You can *unofficially* use the iPad Camera Connection Kit to attach
    some types of USB thumb drives for quick and easy transfer of photos from your
    computer to the iPad. To do this, you have to trick your iPad into thinking your
    thumb drive is a camera.


    `DCIM` (Digital Camera Images) is a universal standard used by camera manufacturers
    to organize photos on your camera by a defined file system and structure including
    the file naming specification, file formats, and metadata information. Before
    the iPad connects to your camera or SD card, it looks for a `DCIM` folder on the
    device. The presence of this folder from the folder.


    A camera''s SD card automatically creates a folder labeled `DCIM` when you take
    the first picture. Since there''s not much difference between an SD card and a
    USB thumb drive (both are just forms of solid-state storage), you can simply create
    a `DCIM` folder on the thumb drive to trick your iPad into thinking it''s a camera.


    The easiest way to do this is to create a new folder on your desktop and name
    it "`DCIM`". Drag that folder to the USB thumb drive. Once the folder is on the
    thumb drive, find and drag whatever photos you want from your computer into the
    `DCIM` folder on your thumb drive. After the photos are copied, plug the thumb
    drive into the USB adapter in the iPad Camera Connection Kit, and the iPad will
    see the photos in the `DCIM` folder and think it''s talking to a camera, thus
    allowing you to import those pictures from the thumb drive into the iPad Photos
    app.


    # Saving Photos from Mail and Safari


    You can also store photos on your iPad without importing them from your computer
    or camera. If someone e-mails a photo to you, in the iPad''s Mail app you''ll
    see the photos appear in the body of the e-mail message. Tap and hold your finger
    on any photo, and you''ll see a pop-up appear that allows you to save that one
    photo or all the photos contained in the e-mail (see [Figure 13–7](#Chapter13.html#fig_13_7)).
    The photo or photos you''ve selected to save will appear in an album labeled `Saved
    Photos` in the iPad''s Photos app.


    Similarly, in the iPad''s Safari web browser, you can tap and hold your finger
    on any photo in a web page and select the `Save Image` button from the pop-up
    that appears (see [Figure 13–7](#Chapter13.html#fig_13_7)). That photo will be
    saved to a `Saved Photos` album in the iPad''s Photos app.


    ![images](images/1307.jpg)


    **Figure 13–7.** *Saving photos from an e-mail (left) or a web page (right)*


    **NOTE:** Many third-party apps (such as web browsers and magazines) also allow
    you to save images to your iPad. Some apps may have their own, unique way of saving
    images, but most should be fairly similar to the way you save images in Mail or
    Safari.'
