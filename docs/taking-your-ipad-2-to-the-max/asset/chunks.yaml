    at the bottom of the screen.*


    To import selected photos, tap each photo you wish to include. A check mark appears
    on it (see [Figure 13–4](#Chapter13.html#fig_13_4)). When you are done selecting
    photos, tap Import and select Import Selected.


    ![images](images/1304.jpg)


    **Figure 13–4.** *Importing some of your photographs*


    After a successful import, the iPad prompts you to decide whether to keep or delete
    the photos you imported from the device you imported them from (see [Figure 13–5](#Chapter13.html#fig_13_5)).


    ![images](images/1305.jpg)


    **Figure 13–5.** *Choose to save or delete the imported photos on the external
    device.*


    Newly imported photos appear in an album called Last Import (see [Figure 13–6](#Chapter13.html#fig_13_6))
    and in a new event, which contains the last imported photos. After you have imported
    photos more than one time, you''ll also see an album called All Imported.


    ![images](images/1306.jpg)


    **Figure 13–6.** *Photos imported directly to the iPad from a digital camera or
    SD card will show up in the Last Import album.*


    Once you have transferred your photos, you can disconnect the camera connection
    adapter from the iPad.


    To export transferred photos from the iPad back to your computer, connect your
    iPad and open a photo application such as iPhoto or Image Capture on a Mac or
    Adobe Elements on a Windows computer.


    #### Using a USB Thumb Drive to Transfer Photos to the iPad


    You may find yourself in a situation where you quickly want to add some photos
    from your computer to the iPad. You want to avoid an entire synchronization procedure.
    Wouldn''t it be great if you could quickly import images to the iPad using a USB
    thumb drive?


    Good news! You can *unofficially* use the iPad Camera Connection Kit to attach
    some types of USB thumb drives for quick and easy transfer of photos from your
    computer to the iPad. To do this, you have to trick your iPad into thinking your
    thumb drive is a camera.


    DCIM (Digital Camera Images) is a universal standard used by camera manufacturers
    to organize photos on your camera by a defined file system and structure including
    the file naming specification, file formats, and metadata information. Before
    the iPad connects to your camera or SD card, it looks for a DCIM folder on the
    device. The presence of this folder from the folder.


    A camera''s SD card automatically creates a folder labeled DCIM when you take
    the first picture. Since there''s not much difference between an SD card and a
    USB thumb drive (both are just forms of solid-state storage), you can simply create
    a DCIM folder on the thumb drive to trick your iPad into thinking it''s a camera.


    The easiest way to do this is to create a new folder on your desktop and name
    it “DCIM.” Drag that folder to the USB thumb drive. Once the folder is on the
    thumb drive, find and drag whatever photos you want from your computer into the
    DCIM folder on your thumb drive. After the photos are copied, plug the thumb drive
    into the USB adapter in the iPad Camera Connection Kit, and the iPad will see
    the photos in the DCIM folder and think it''s talking to a camera, thus allowing
    you to import those pictures from the thumb drive into the iPad Photos app.


    #### Saving Photos from Mail and Safari


    You can also store photos on your iPad without importing them from your computer
    or camera. If someone e-mails a photo to you, in the iPad''s Mail app you''ll
    see the photos appear in the body of the e-mail message. Tap and hold your finger
    on any photo, and you''ll see a pop-up appear that allows you to save that one
    photo or all the photos contained in the e-mail (see [Figure 13–7](#Chapter13.html#fig_13_7)).
    The photo or photos you''ve selected to save will appear in an album labeled Saved
    Photos in the iPad''s Photos app.


    Similarly, in the iPad''s Safari web browser, you can tap and hold your finger
    on any photo in a web page and select the Save Image button from the pop-up that
    appears (see [Figure 13–7](#Chapter13.html#fig_13_7)). That photo will be saved
    to a Saved Photos album in the iPad''s Photos app.


    ![images](images/1307.jpg)


    **Figure 13–7.** *Saving photos from an e-mail (left) or a web page (right)*


    **NOTE:** Many third-party apps (such as web browsers and magazines) also allow
    you to save images to your iPad. Some apps may have their own, unique way of saving
    images, but most should be fairly similar to the way you save images in Mail or
    Safari.'
