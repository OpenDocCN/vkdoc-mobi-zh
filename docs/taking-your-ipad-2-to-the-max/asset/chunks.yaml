- fmt: '# Putting Your Data and Media on Your iPad


    So, you’ve unboxed your iPad and connected it to `iTunes`. Now what? [Chapter
    1](#Chapter01.html#ch1) briefly introduced the basics of syncing your iPad with
    your music, movies, photos, and other data via `iTunes`. Now this chapter explores
    the options you have for syncing your data with your iPad. Whether you’ve bought
    your songs and videos from the `iTunes Store` or have imported them into the program
    from CDs and DVDs, `iTunes` can synchronize your iPad to nearly any content in
    its library. If you want a rich media and applications library on your iPad, you
    need to sync those contents from the library on your computer.


    `iTunes` determines which app, music, and video files transfer to and load onto
    your iPad. You''re about to discover how to bring all this content together in
    `iTunes` and send it to your iPad via the `USB Dock Connector` data cable. You’ll
    see how to choose which items you want to synchronize and how to keep your iPad
    content fresh and up-to-date.


    ## Working with iTunes


    Before you begin to choose which songs, videos, podcasts, and audiobooks will
    be synchronized, you must first physically connect your iPad to your computer
    and launch the `iTunes` application. Use the USB cable that shipped with your
    iPad (or an equivalent dock) to connect your iPad to a spare USB port on your
    system. Launch `iTunes` by clicking the `iTunes` application icon on your computer.
    If your iPad uses a lock code, you must unlock your device before `iTunes` can
    connect to it (see [Figure 2–1](#Chapter02.html#fig_2_1)).


    **NOTE:** It’s best to connect using USB 2.0. USB 2.0 provides superior bandwidth
    and better connectivity. Although USB 1.1 is supported, `iTunes` will complain
    if you attempt to sync using USB 1.1 and will recommend that you switch to a USB
    2.0 port. Your iPad generally will not be able to recharge while synching. Do
    not be alarmed by the `Not Charging` message that appears at the right of your
    iPad’s topmost status bar. Instead, use the 10-watt wall plug connector included
    in the iPad package to provide the power level your iPad needs to charge. Your
    iPad has a phenomenal onboard battery. You will find that, unlike other mobile
    devices, you need to recharge it only every day or two. Yes, you can sync more
    often but you don''t really have to if your only concern is to keep the charge
    ready for use.


    ![images](images/0201.jpg)


    **Figure 2–1.** *`iTunes` prompts you to unlock your iPad before it will connect
    to the device.*


    Once connected, your iPad appears in the list on the left side of the `iTunes`
    window. This light blue column, called the source list, is divided into several
    sections for your media library, the `iTunes Store`, devices, and playlists. The
    iPad, along with any other devices connected to your computer, is listed under
    the `Devices` header, as shown in [Figure 2–2](#Chapter02.html#fig_2_2).


    If you do not see your iPad in this list, make sure you’ve physically connected
    your iPad through the USB cable and that the cable is firmly inserted into both
    the computer and the iPad. Next, make sure your iPad is powered on. Your iPad
    is listed when it’s active or asleep, but it won’t show up when it’s powered down.
    If your iPad is correctly connected and powered on but still does not appear,
    do a Google search for “disappearing iPads” or “disappearing iPhones.” There are
    known (however occasional) support issues with iOS devices not appearing in `iTunes`.
    You will find that others have experienced the same problem and you might be able
    to find a solution.


    ![images](images/0202.jpg)


    **Figure 2–2.** *Your iPad appears in the `Devices` section of the `iTunes` source
    list. The items listed under the device (which you can view by toggling the hide/reveal
    triangle to the left of the device name) will vary based on the items you have
    chosen to synchronize to your device. Notice how the image to the left of your
    iPad’s name looks like a tiny iPad. In `iTunes`, device pictures look like the
    actual device in use.*


    ## The iPad iTunes Settings Pane


    When you select your iPad in the `iTunes` source list, you are presented with
    a settings pane that contains a series of tabs. These tabs allow you to customize
    the way your device connects to and synchronizes with your `iTunes` media. Each
    tab provides a different way to customize your iPad’s contents, allowing you to
    set options associated with your iPad.


    The tabs you’ll see (from left to right) include `Summary`, `Info`, `Apps`, `Music`,
    `Movies`, `TV Shows`, `Podcasts`, `iTunes U`, `Books`, and `Photos` (see [Figure
    2–3](#Chapter02.html#fig_2_3)). If you’re already an iPhone or iPod touch user,
    the iPad settings pane will look very familiar, though it does have some options
    that are not available with the iPhone or iPod touch. If your iPad is your first
    Apple touch device, don’t worry—you don’t need any knowledge of the iPhone or
    iPod touch to navigate the tabs. You’ll be up to speed after you read this chapter.


    ![images](images/0203.jpg)


    **Figure 2–3.** *`iTunes` allows you to manage the content loaded onto and synchronized
    with your iPad. Each tab running along the top of the settings pane offers a variety
    of controls, allowing you to choose what information gets loaded onto your iPad
    at each sync. The iPad figure in the top section of the `Summary` pane should
    match the model and color of your device.*


    Running along the bottom of the iPad settings pane, you’ll find a long, colorful
    `Capacity` bar (see [Figure 2–4](#Chapter02.html#fig_2_4)). This bar appears regardless
    of which tab you have selected. Your iPad’s total storage capacity is shown on
    the left, and the amount of data you have on the iPad for different types of files
    is broken down into color-coded segments. Blue is for audio, purple is for video,
    orange is for photos, green is for apps, lighter purple-pink is for books, yellow
    is for other stuff (mostly data and the operating system), and gray is for the
    remaining free space you have on your iPad. The key just below the `Capacity`
    bar shows what each color segment represents and the amount of space occupied
    per category.


    ![images](images/0204.jpg)


    **Figure 2–4.** *The `Capacity` bar is a visual representation of the different
    types of files occupying space on your iPad.*


    **NOTE:** The `Capacity` bar breakdown is pretty self-explanatory. Still, some
    people are thrown by yellow—the color that represents `Other`. What is `Other`,
    exactly? This includes database files (which keep track of your music, video,
    and podcast libraries), which can be 100MB to 200MB in size; album artwork (which
    can be 500KB per track); and preference files for the applications you have on
    your iPad. Preference files let the apps remember in-app settings you’ve configured
    every time you launch them. If you store a lot of data inside your applications,
    the green `Apps` segment increases accordingly.'
