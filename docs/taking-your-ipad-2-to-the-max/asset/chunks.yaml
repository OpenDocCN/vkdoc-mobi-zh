- fmt: '#### Syncing Mail Accounts


    Synchronizing mail accounts using the `Info` tab in iTunes provides the fastest
    way to set up all of your e-mail accounts on your iPad with your Mac or Windows
    computer. Connect your iPad to your Windows computer or Mac using the `Dock Connector
    to USB Cable`, and then, if it’s not already open, launch `iTunes` on your computer.
    In `iTunes`, locate your device in the source list, the blue column at the left
    side of the screen. Click the icon designating your iPad and then open the `Info`
    tab at the top of the screen. The `Info` tab provides a simple way to synchronize
    information from your computer to your device, including mail accounts, address
    book contacts, and calendars. Scroll down until you see the words `Sync Mail Accounts`
    (see [Figure 11-1](#Chapter11.html#fig_11_1)).


    ![images](images/1101.jpg)


    **Figure 11-1.** *Already have multiple e-mail accounts set up on your Mac or
    Windows computer? `iTunes` offers a simple-to-use interface for synchronizing
    those mail accounts to your iPad for fast and reliable setup.*


    A check box appears to the left of each account name. To enable mail account syncing
    between your computer and iPad, select the `Sync Mail Accounts` check box (see
    [Figure 11-1](#Chapter11.html#fig_11_1), at the top left of the screen capture),
    check the box for each mail account that you want to set up on your iPad, and
    then click the `Sync` or `Apply` button at the bottom-right corner of the `iTunes`
    window.


    One important thing to remember about syncing Mail accounts is that this process
    synchronizes only your account *settings*, not the *messages* that may be stored
    on the mail server for your account. This is important because the way your iPad
    retrieves mail varies by the protocol it is set up to use.


    `Post Office Protocol 3` (`POP3`, often just called `POP`) mail accounts are typically
    configured to download e-mail to your computer or device and remove it from the
    mail server. This download-then-delete process means that when you receive POP-based
    e-mail on your iPad, you’ll never see it on your computer.


    In contrast, when your mail account isn’t set up to remove the message from your
    mail server (as with most default `IMAP` or `Exchange` account setups), you’ll
    retain a copy on both the iPad and the computer, and removing it from one machine
    won’t remove it from the other. You can read the message on one device or on the
    other, and the only thing that changes is the message status, from unread to read.


    Apple’s `MobileMe` mail, like other `Internet Message Access Protocol` (`IMAP`)
    mail systems, retains messages until you delete them. That means, with `MobileMe`,
    you will see the message on multiple devices, and they’ll all have the same status.
    Unopened messages will be that way on all devices, and read messages show up as
    read on all devices.


    Microsoft’s `Exchange Server` is widely used in business, so it’s important to
    know that Mail provides excellent support for this e-mail standard. `Exchange`
    provides push mail capabilities (discussed later in this chapter) for almost instantaneous
    receipt of incoming mail. iPad fully supports both `Exchange Server 2003` and
    `Exchange 2007` synchronization and will support `Exchange 2010` as well.


    Although setting up `Exchange` accounts on the iPad is no more difficult than
    configuring other types of e-mail, it’s comforting to know that most organizations
    that use `Exchange` can also provide technical support to iPad-toting clients
    if you run into problems.


    If you’re interested in using `Exchange` for your iPad e-mail hosting but don’t
    have the technical expertise available to configure and maintain `Exchange Server`,
    there are many `Exchange` hosting services available worldwide. An Internet search
    of `Exchange Server` displays many companies that host `Exchange` for you.


    #### Setting Up Mail Accounts Directly on the iPad


    When you have only one or two e-mail accounts to establish and you either cannot
    (for example, when you’re away from your office) or don’t want to synchronize
    account information between your iPad and your computer, you *can* set up mail
    accounts directly on the iPad. This isn’t as easily accomplished as simply synchronizing
    accounts over from your computer, but it’s not so hard that you cannot set up
    an account on the go when you need to.


    Before you begin setting up your accounts, make sure that you have the following
    information on hand. This information is often found on your Internet service
    provider’s support pages under a section about configuring your e-mail.


    *   *Name of your e-mail service provider*: Common providers include Apple’s own
    `MobileMe` service, Google’s `Gmail`, Yahoo! `Mail`, `AOL`, or Internet service
    providers such as `Comcast` and `Time Warner`.

    *   *Your e-mail address*: All e-mail addresses are set up in the common `myname@domain.tld`
    format, where `myname` is a name or pseudonym for an individual or company, `domain`
    is the domain name being used by an organization, and `tld` is the “top-level
    domain” for the domain (`.com`, `.gov`, `.edu`, and so on).

    *   *Your e-mail password*: This is the most critical piece of information for
    setting up an e-mail account, but surprisingly few people remember what their
    password is! That’s because many IT departments create particularly difficult
    passwords that include numbers and symbols, in order to increase overall security.
    The end result is, of course, that many people write down that difficult password
    on a sticky note and attach it to their monitor, defeating the entire purpose
    of the “difficult password” exercise.


    You may want to either contact your Internet service provider or IT department
    to retrieve your password if you don’t remember it or have the password reset
    to something more memorable. Once set on your iPad, you will not need to reenter
    it. It is stored securely in your system’s “key chain,” a private way that your
    iPad remembers important information.


    *   *Server information*: Some accounts will be set up automatically by Mail.
    In other words, it will know whether your server is an `Exchange` server, `POP`
    server, or `IMAP` server, and it will adjust settings accordingly. However, it’s
    a very good idea to get this information before you start and keep it for your
    records.


    The information to gather includes server addresses (your e-mail provider may
    refer to this as a server `URL`) for both your incoming e-mail server (usually
    prefaced with `POP` or `IMAP`) and your outgoing (usually `SMTP`) server. The
    e-mail provider may also require that your mail be channeled through specific
    Internet Protocol ports for security reasons, so requesting port information prior
    to setup can save headaches later.


    Although port `587` is a standard for secure `SMTP` connections, some connections
    use ports `25` (`SMTP`), `110` (`POP3`), `143` (`IMAP`), `993` (SSL-encrypted
    `IMAP`), `995` (SSL-encrypted `POP`), and `465` (SSL-encrypted `SMTP`), among
    others. `Exchange` setup also requires a domain name, which can be as simple as
    a word—`HOST`—or as complicated as `host.admin.mycompany.com`.


    The following steps demonstrate how to set up a `Gmail` account, one of the most
    common types of e-mail accounts available. Although each brand of e-mail account
    may vary in the amount of information required for setup, the setup procedure
    for all brands is basically the same on the iPad, so you should be able to follow
    these steps to set up an account other than `Gmail`:'
