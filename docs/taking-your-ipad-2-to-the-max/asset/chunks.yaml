- fmt: '##### iMovie for iOS


    Apple''s `iMovie` for iOS (see [Figure 16–27](#Chapter16.html#fig_16_27), $4.99)
    is an incredibly easy-to-use video-editing app for iPad. You won''t want to edit
    your next feature-length documentary on the iPad, but `iMovie` is perfectly suited
    for making short movies to share with family and friends.


    ![images](images/1627.jpg)


    **Figure 16–27.** *Whether you''re editing a video presentation for a business
    meeting or just compiling clips for a family video, `iMovie` for iOS is an iPad-based
    film studio in an app.*


    We could easily write a short book on how to use `iMovie` on your iPad, so we''ll
    just describe the major features instead. To use `iMovie` for iOS, load video
    from a camera or iPhone into the photo library using the `Camera Connection Kit`,
    or shoot video with the cameras on newer iPad models. In `iMovie`, create a new
    project, and begin adding film clips to it. Move the clips around on the timeline,
    trim or split them, and then add transitions, a soundtrack, and titles.


    When the edited product is done, `iMovie` renders the video into a playable movie
    incorporating all the elements you added. The finished product is sharable through
    e-mail, although the relatively large size of most movies means that you''ll probably
    want to sync them to your Windows computer or Mac instead. Sharing videos through
    YouTube, Vimeo, Facebook, and CNN iReport is a button tap away, and projects can
    be sent to iTunes to be imported into the Mac version of `iMovie` for additional
    editing.


    ### Remote Desktop Computing


    An iPad is a tech support guru''s or road warrior''s dream. Being lightweight
    and unobtrusive, it''s easy to carry around while fixing technical issues or trying
    to work on another computer a few offices—or continents—away. Several apps can
    help you do work back in the office or support local or remote users without needing
    to be tied to a desktop or laptop computer.


    The first two tools discussed in this section are used for remote control of Mac
    or Windows computers. In both cases, the app has a counterpart that must be running
    on the target machine that you want to control.


    #### Splashtop Remote


    `Splashtop Remote` (see [Figure 16–28](#Chapter16.html#fig_16_28); $4.99) is an
    excellent example of what is known as a *virtual node controller* (`VNC`) client.
    With a free piece of software (`Splashtop Streamer`) running on a Mac or Windows
    computer, an iPad can take over control of a remote machine.


    ![images](images/1628.jpg)


    **Figure 16–28.** *`Splashtop Remote`''s features are fast and easy to set up
    to provide remote control or support of Mac or Windows computers.*


    An onscreen button displays the iPad''s virtual keyboard for text entry, and your
    finger on the iPad screen acts as a "mouse" on the remote PC.


    #### LogMeIn Ignition


    `LogMeIn Ignition` (see [Figure 16–29](#Chapter16.html#fig_16_29); $29.99) is
    another remote-control app. It''s a product of `LogMeIn`, a company specializing
    in secure control of computers of any type. For large IT shops using `LogMeIn`,
    `LogMeIn Ignition` provides a way for support personnel to take over control of
    remote machines for troubleshooting purposes. The app also has a feature not found
    in `Splashtop Remote`—the ability to transfer files between the iPad and the desktop
    computer.


    ![images](images/1629.jpg)


    **Figure 16–29.** *`LogMeIn Ignition` is better suited for larger organizations
    with more computers to control.*


    Between `Splashtop Remote` and `LogMeIn Ignition`, the former is best used in
    situations where there are few computers to control, while `LogMeIn Ignition`
    is better suited for individuals who must have access to a large number of computers
    or need to transfer files between their iPad and desktop computers.


    As with `SplashtopRemote`, your finger acts as a mouse on the remote machine,
    and you can use the familiar two-finger zoom gesture to look at details on the
    screen.


    #### NetTools


    Many times computer problems are not the fault of the computer. Instead, the network
    is causing issues. For that reason, most tech support personnel become very familiar
    with tools that allow them to troubleshoot network problems.


    `NetTools` (see [Figure 16–30](#Chapter16.html#fig_16_30); $3.99) places three
    of the most popular network tools—`Ping`, `Traceroute`, and `DNS`—on your iPad.
    `Ping` is used to determine whether another device is actually visible on a network,
    `Traceroute` looks at the various network hops between your iPad and another machine,
    and `DNS` provides information about the Domain Name Service (`DNS`) server corresponding
    to an Internet address.


    ![images](images/1630.jpg)


    **Figure 16–30.** *Pinging networked devices, running a `Traceroute`, or looking
    up `DNS` entries is simple with `NetTools`. Any of the test results can be e-mailed
    or printed.*


    Although it''s not the most powerful network toolkit on the market, `NetTools`
    has just enough functionality to make it useful for IT support people who are
    using an iPad.


    ### Summary


    In this chapter, we discussed a variety of use cases for iPad owners. Whether
    you''re a gamer, a traveler, an artist, a foodie, or an IT geek, or you just like
    to see what''s going on in your world, there''s probably an app for you.


    Don''t just stop here—your iPad is an incredible tool and toy that changes with
    every app. Make a quick look at the App Store part of your everyday routine, and
    you''ll find more delightful and useful apps to enjoy. These are some of the key
    points to remember from this chapter:


    *   There are more than 4000 iPad-specific games, and your iPad can also run more
    than 90,000 iPhone games.

    *   Free or inexpensive news and weather apps are easily available for your iPad,
    and they often rival or surpass their web-based counterparts in capability and
    speed.

    *   Your iPad isn''t a phone, but it can make VoIP calls using the free `Skype`
    iPhone app that also works on iPad.

    *   iPads are the perfect kitchen helper. Just be sure to protect your iPad from
    heat and liquids.

    *   The `Dock Connector to VGA Cable` is a useful accessory for iPad-toting educators.

    *   Travelers no longer need to worry about carrying the bulk and weight of a
    laptop computer and its accessories with them. iPad apps provide laptop-type functionality
    in a smaller form factor.


