  trans: '

    ### 拷贝与粘贴


    苹果设计了一种简单直观的方式，用于选中单词或文本块、拷贝它们，然后粘贴到其他位置。


    让我们从 iPad 的 Safari 浏览器中拷贝一些网页文本。在拷贝一个单词前，需要先选中它。方法是：手指长按一个单词，将会弹出一个黑色上下文菜单，提供`Select`（选择）和`Select
    All`（全选）选项。`Select`会仅高亮这个单词，`Select All`则会高亮页面上所有文字。无论选择哪个，被选文本的首尾都会出现调整手柄（见图
    4-33）。利用这些手柄，你可以调整选中的文本范围。


    ![images](img/0433.jpg)


    **图 4-33.** *利用调整手柄，您可以选中单个单词、一句话或整个段落进行拷贝。*


    **注意：** 如果你是在可编辑文档中选中了文本进行拷贝，会看到一个包含`Cut`（剪切）、`Copy`（拷贝）或`Paste`（粘贴）的上下文菜单。选择`Cut`会移除文本，选择`Copy`会拷贝文本，如果已有拷贝的文本，则可粘贴覆盖当前选中内容。


    选中文本后，会看到另一个包含`Copy`的上下文菜单。点击`Copy`即可拷贝文本，此后在任何支持文本输入的 App 中都可以使用这段拷贝的内容。


    现在回到“备忘录”App 中的笔记。要粘贴从 Safari 拷贝到笔记中的文本，只需手指长按屏幕直至出现放大镜图标。使用放大镜将光标调整到要插入拷贝文本的位置，然后松开手指。此时会弹出一个包含三个选项的上下文菜单：`Select`、`Select
    All`和`Paste`。点击`Paste`，拷贝的文本便会立即插入（见图 4-34）。


    ![images](img/0434.jpg)


    **图 4-34.** *只需点击“粘贴”，文本即可自动插入。*


    ### 撤销与重做


    如前所述，iPad 键盘配备了撤销和重做按钮。点击撤销按钮可撤销上一步操作。因此，如果你拷贝并粘贴了文本，点击撤销按钮会撤销粘贴操作，但文本仍保留在剪贴板中。请记住，你也可以摇晃
    iPad 来显示一个撤销弹出窗口，询问你是否要撤销上一步操作。


    如果应用支持，`Redo`（重做）会重复上一步操作。因此，如果你拷贝并粘贴了文本，点击重做按钮会再次粘贴文本。


    ### 辅助功能


    苹果希望确保每个人都能尽可能轻松地使用 iPad。为此，苹果提供了辅助功能来帮助残障人士使用 iPad。我们在第 2 章的 iPad iTunes 设置面板中简要提及了
    iPad 的辅助功能选项。然而，iPad 的辅助功能远不止设置面板中显示的那些。要查看所有辅助功能选项，请点击 iPad 主屏幕上的`Settings`（设置）图标。在`General`（通用）设置下，点击`Accessibility`（辅助功能）。`Accessibility`设置便会滑入屏幕（见图
    4-35）。下面我们逐一介绍这些设置。


    ![images](img/0435.jpg)


    **图 4-35.** *“辅助功能”设置*


    #### 旁白


    开启`VoiceOver`（旁白）后，用户只需触摸屏幕，就能听到手指下方内容的语音描述。然后双击即可选中该项目。启用`VoiceOver`后，当用户收到新电子邮件时，iPad
    会语音提示，甚至可以朗读邮件内容给用户听。


    #### 缩放


    `Zoom`（缩放）功能帮助视力不佳的用户放大整个屏幕。这与 iPad 常规软件中的捏合缩放功能不同。辅助功能中的`Zoom`会放大屏幕上的所有内容，使用户甚至能放大最小的按钮。选择此选项后，用户可以用三根手指双击
    iPad 屏幕的任何位置，屏幕会自动放大至 200%。屏幕放大时，必须用三根手指拖动或轻扫。此外，当切换到新屏幕时，缩放位置总会回到屏幕顶部中央。


    #### 大文本


    此功能可让你增大`Contacts`（通讯录）、`Mail`（邮件）和`Notes`（备忘录）中的文本字号。你可以选择 20 磅、32 磅、40 磅、48
    磅和 56 磅等字号。


    #### 白底黑字


    对于某些有阅读障碍的人来说，反转电脑屏幕的颜色使其看起来像照片底片，有助于他们更好地阅读文本。开启`White on Black`（白底黑字）即可实现此效果。


    #### 单声道音频


    选择`Mono Audio`（单声道音频）后，左右扬声器的立体声将合并为单声道（单一）信号。此选项让一只耳朵有听力障碍的用户能用另一只耳朵听到完整的音频信号。


    #### 自动朗读文本


    开启此选项后，任何自动纠正的文本（例如键入时出现的拼写检查弹出窗口）都会被朗读出来。


    #### 连按三次主屏幕按钮


    如果你与残障家人共享一台 iPad，选择此选项后，用户可以通过连按三次 iPad 实体`Home`按钮，快速开启或关闭`VoiceOver`、`Zoom`或`White
    on Black`（图 4-36）。你也可以将其设置为：连按三次`Home`按钮时，屏幕上会弹出一个窗口，询问要开启哪项辅助功能。


    ![images](img/0436.jpg)


    **图 4-36.** *“辅助功能选项”弹出窗口*


    **注意：** 除了连按三次`Home`按钮功能外，所有这些辅助功能设置也可以在 iPad iTunes 设置面板的`Summary`（摘要）标签页中进行配置（参见第
    2 章）。


    ### 本章小结


    本章探讨了你与 iPad 交互的所有方式，从点按、按钮到捏合。你了解了触摸屏以及如何与之交互。你学会了如何进入主屏幕、如何锁定屏幕以及如何重新排列图标。你探索了
    iPad 的“通用”设置，并学习了使用 iPad 虚拟键盘和设置辅助功能的技巧。简而言之，本章向你介绍了你和 iPad 相互沟通的所有基本方式。以下是一些关键要点供你铭记：


    *   积累你的 iPad 交互操作词汇表。你会惊讶地发现，像双指点按这样较少使用的手势，常常能证明其有用性。

    *   如果在数据安全至关重要的区域使用 iPad，请务必设置密码锁。

    *   `Spotlight`是 iPad 上强大的搜索工具，为你提供了快速启动应用的另一种方式。

    *   iPad 支持十多种键盘语言以及实体硬件键盘。

    *   不必担心在 iPad 上打字不完美。它的智能键盘会自动纠正你大部分的错误。

    *   有残障并不意味着你不能使用 iPad。iPad 提供了许多辅助功能来帮助有视力或听力问题的人。


    ## 第 5 章

    '
- fmt: '# Connecting to the Internet


    Although your iPad can theoretically be used unconnected with no real links to
    the outside world, it''s designed to be an Internet-ready tool. It offers built-in
    Wi-Fi or Wi-Fi + 3G connectivity, and most of the default apps are useless without
    having an Internet connection of some sort.


    Without the Internet, you''d have no need for `Mail` to send and receive messages,
    and there would be no reason for the `Safari` web browser. You wouldn''t be able
    to pull up maps, YouTube would just be a bland icon taking up space on your Home
    screen, and you couldn''t buy apps from the `App Store`, books from the `iBookstore`,
    or music, movies, and videos from `iTunes`. Facebook and Twitter? Forget about
    them without that Internet connection.


    Fortunately, Apple makes it simple for you to connect to the Internet. In this
    chapter, we''ll tell you how to make and troubleshoot Internet connections through
    Wi-Fi and 3G and discuss an alternative to the built-in 3G.


    ## Connecting with Wi-Fi


    Wi-Fi is the common name for wireless networking based on the IEEE 802.11 standard.
    Although Wi-Fi has its roots in the early 1990s, it has really taken off in the
    past ten years, with Wi-Fi access points now available in many public places such
    as hotels, libraries, restaurants, and even buses and airplanes.


    For many people, Wi-Fi access points were a godsend for home networking because
    it meant that computers and printers could be connected to each other without
    the expense and inconvenience of installing cabling. In most cases, a Wi-Fi router
    is attached directly to a home cable or DSL Internet modem to provide wireless
    Internet to any computer within range.


    Your iPad supports Wi-Fi connections under the 802.11b/g/n standards. It''s not
    necessary to know what each of these standards means, other than that the maximum
    raw data rate (the speed at which data is pumped to your iPad) increases with
    each successive standard. The iPad and Wi-Fi router will communicate with each
    other based on the highest common standard, so if your Wi-Fi router supports only
    802.11b, the rate at which the two devices will talk will be limited to 802.11b
    speeds. Likewise, if you have one of the newest Apple AirPort Extreme Wi-Fi routers,
    your iPad communicates with it using an implementation of the fast 802.11n standard.


    ### Authentication and Encryption


    One important factor for all Wi-Fi networks is the use of encryption. Encrypted
    networks require that a password or passphrase be entered when joining the network
    for the first time. The password not only authenticates your iPad to the network,
    essentially making sure that you are allowed to use that network, but is used
    as a key to encrypt any data that is transferred between your iPad and the router.


    Both authentication and encryption are important for any wireless network. Setting
    up authentication on your home or office network ensures that no unauthorized
    person can use your wireless network without your permission. This is important,
    since providing access to your Internet connection to anyone who happens to be
    in the area can be considered a breach of the terms of service with many Internet
    service providers. In addition, if anyone commits a crime from a computer connected
    to your wireless network with or without your knowledge, you can be held accountable.


    Likewise, encryption makes it difficult for hackers to intercept and decode transactions
    between your iPad and any other computer. This is extremely important when you''re
    performing monetary transactions. There are three major types of encryption that
    are in place on most home, office, and public Wi-Fi networks at this time: `WEP`,
    `WPA`, and `WPA2`. `WPA2` is the successor to the `WPA` encryption standard and
    is considered (when used with a strong passphrase) to be extremely secure.


    Why are we discussing authentication and encryption in a book about iPads? Well,
    if you''re unfamiliar with Wi-Fi networks, the topic will definitely come up when
    you try to connect your iPad to the networks.


    ### Setting Up Wi-Fi


    Your iPad isn''t going to automatically connect to the Internet the moment you
    turn it on. Why? Apple wants you to set up syncing with `iTunes` first, and that''s
    always done through a USB connection to another computer. Once you''ve completed
    the setup, you''re free to get connected to the Internet, and for most people,
    that initial connection is done with Wi-Fi.


    You''ll need to know your network password or passphrase, as well as the name
    of the network to which you want to connect. Knowing the name can be very important
    if you live in an apartment building where there are many wireless networks within
    range. A pop-up appears on the screen asking you to enter the network password,
    and once you''ve entered it correctly, you are connected to the network.


    In [Figure 5–1](#Chapter05.html#fig_5_1), there are two networks within range
    of the iPad. The lock icon signifies that you need to enter a password or passphrase
    before you can connect to the network, while the AirPort icon (the fan-shaped
    icon to the right of the lock) indicates the relative signal strength of the network.


    ![images](images/0501.jpg)


    **Figure 5–1.** *In the Settings app on an iPad with Wi-Fi only, the top switch
    allows you to toggle Wi-Fi settings on and off.*


    To enter the password and join the network, tap the network name, and a password
    screen appears. Type in your password or passphrase, and then tap the `Join` button
    on the iPad''s virtual keyboard. If you''ve entered the password correctly, the
    network name turns blue and a check mark appears next to it, indicating that it
    is the selected network. If you didn''t enter the correct password, you''ll see
    an error message similar to the one in [Figure 5–2](#Chapter05.html#fig_5_2).
    Tap the `Dismiss` button, and try again.


    ![images](images/0502.jpg)


    **Figure 5–2.** *It looks like somebody mistyped the password here. Tap Dismiss
    to try it again.*


    If your iPad Wi-Fi is not enabled, you can turn it on by going to `Settings` ![images](images/U001.jpg)
    `Wi-Fi` and sliding the button marked `Off` so that it displays `On`.


    Your iPad remembers networks that you''ve joined so that you don''t have to reenter
    network information every time you move to a new wireless network. If there is
    no known network nearby, either you have to manually select the new network or
    you''ll be asked if you want to join a new network. What''s the difference? It
    all depends on whether the `Ask to Join Networks` button (see [Figure 5–1](#Chapter05.html#fig_5_1))
    is set to `On`. If it isn''t, you have to manually select the network, and if
    it is, your iPad will ask you whether you want to join the new network.


    When you are connected to a Wi-Fi network, the Wi-Fi icon in the status bar displays
    your connection strength. More full bars (up to five) indicate a stronger connection.


    ### Troubleshooting Wi-Fi Connection Issues


    There are some common issues that new iPad owners may run into. Here''s a brief
    discussion of some of them that you may encounter.'
