    \ the two modes simply by rotating your iPad.\n\n![images](images/0911.jpg)\n\n\
    **Figure 9–11.** *Reading a book in Landscape and Portrait modes*\n\nAt the top\
    \ of any book's page, no matter what orientation you are in, you'll notice a menu\
    \ that contains a series of buttons (see [Figure 9–12](#Chapter09.html#fig_9_12)).We\
    \ will get to using all these features momentarily, but let's look at the various\
    \ menu options first:\n\n![images](images/0912.jpg)\n\n**Figure 9–12.** *A book's\
    \ menu buttons*\n\n*   *Library*: Tapping this effectively closes the book and\
    \ takes you back to your bookshelf. The next time you open this book, you'll be\
    \ taken to the page you were on when you left it.\n*   *Table of Contents/Bookmarks*:\
    \ This button is signified by three dots, each with a line after it. Tap this\
    \ button to be taken to the book's Table of Contents and Bookmarks page.\n*  \
    \ *Buy*: This button (not shown) appears next to the Table of Contents button\
    \ when you are reading a sample book downloaded from the iBookstore. Tapping it\
    \ allows you to buy the full book.\n*   *Brightness*: This is the button that\
    \ looks like the sun and changes the screen brightness while inside the iBooks\
    \ app only.\n*   *Font*: This button, symbolized by a small and big *A*, allows\
    \ you to change the font of the book's text, as well as the font size. This is\
    \ helpful for those people who need larger text while reading, such as older people\
    \ or anyone with sight difficulties. It also lets you change the background of\
    \ the book's page to a sepia tone.\n*   *Search*: The Search button looks like\
    \ a magnifying glass and allows you to search through a book's text.\n*   *Bookmark*:\
    \ Tap the Bookmark ribbon button to lay down a red bookmark in the upper-right\
    \ corner.\n*   *Page Scrubber*: This is the series of dots that run along the\
    \ bottom of a book's page (see [Figure 9–14](#Chapter09.html#fig_9_14)). Tap and\
    \ hold the square button that sits on the dots; next, drag it left or right to\
    \ quickly navigate through the book's pages.\n\nWhile reading, you can tap the\
    \ center of a book's page to show/hide the Menu and Page Scrubber bars. You'll\
    \ be left with only the title of the book and the name of the author (in Landscape\
    \ view) at the top of the page—and the page number at the bottom.\n\n#### Turning\
    \ Pages\n\nYou have three ways to move through a book's pages:\n\n*   Tap and\
    \ hold the side of a page, and then drag your finger across; the page will curl\
    \ on the screen (see [Figure 9–13](#Chapter09.html#fig_9_13)). When you lift your\
    \ finger, the page turn will be complete.\n\n    ![images](images/0913.jpg)\n\n\
    \    **Figure 9–13.** *You get cool eye candy when turning a page.*\n\n*   Tap\
    \ the right or left side of the screen to move forward or backward. This accomplishes\
    \ the same function as the previous one, but with less interactive eye candy.\n\
    *   Tap and hold the Page Scrubber bar at the bottom of a page (see [Figure 9–14](#Chapter09.html#fig_9_14)),\
    \ then slide your finger in either direction. The name of the chapter and the\
    \ page number will appear above the Page Scrubber bar as you slide. When you've\
    \ found the right page, remove your finger from the scrubber, and the page will\
    \ flip, taking you to the page you've selected. The Page scrubber bar lets you\
    \ go to a specific page number quickly, without having to flip through all the\
    \ pages of the book.\n\n![images](images/0914.jpg)\n\n**Figure 9–14.** *The Page\
    \ Scrubber bar shows the page number and chapter title.*\n\n**NOTE:** Many people\
    \ read in bed. Reading an iPad in bed is fine, but because of its built-in accelerometer\
    \ that detects orientation, you may find the screen rotating back and forth, depending\
    \ on the angle you are holding it at. To lock the iBooks app into a particular\
    \ page view while reading in bed, switch the orientation lock on by flipping the\
    \ side switch on the side of the iPad. Note that you'll want to make sure you've\
    \ enabled the side switch as an Orientation Lock button and not the Mute Switch.\
    \ Go to Settings ![images](images/U001.jpg) General and select Lock Rotation under\
    \ the Use Side Switch to option.\n\n#### Adjusting Brightness\n\nDepending on\
    \ your eyes, you may find it easier to read text with a brighter or darker screen.\
    \ To adjust the iPad's screen brightness while reading a book, tap the Brightness\
    \ button (the one that looks like a sun) in the Menu bar. A drop-down menu will\
    \ appear with a slider in it (see [Figure 9–15](#Chapter09.html#fig_9_15)).\n\n\
    ![images](images/0915.jpg)\n\n**Figure 9–15.** *The Brightness slider*\n\nSlide\
    \ to the left to reduce brightness and to the right to increase it. When adjusting\
    \ the brightness in the iBooks app, the entire screen will brighten or dim according\
    \ to your slider settings; however, once you leave the iBooks app, the screen\
    \ brightness will return to the settings you have specified in the iPad's Settings\
    \ application. This is a great feature because you can instantly switch between\
    \ brightness levels when you enter or exit the iBooks app without having to reconfigure\
    \ them each time.\n\nTo change your iPad's overall brightness levels, go into\
    \ Settings on the iPad's Home screen and choose Brightness & Wallpaper. Adjust\
    \ the slider there to set your preferred brightness."
  trans: "\n### 编辑精选集\n\niBooks 允许您编辑现有精选集的名称、按特定顺序排列精选集以及删除精选集。\n\n请按照以下步骤编辑精选集名称：\n\
    \n1.  点按 `Collections` 按钮，调出 `Collections` 菜单。\n2.  点按 `Edit` 按钮。\n3.  点按您想要编辑名称的精选集。\n\
    4.  输入该精选集的新名称。\n5.  完成后点按 `Done` 按钮。\n\n请按照以下步骤排列精选集顺序：\n\n1.  点按 `Collections`\
    \ 按钮，调出 `Collections` 菜单。\n2.  点按 `Edit` 按钮。\n3.  使用拖拽控制柄在精选集列表中向上或向下拖动您的精选集（请参见图\
    \ 9–10）。您无法移动 `Books` 或 `PDFs` 精选集。\n4.  完成后点按 `Done` 按钮。\n\n![images](img/0910.jpg)\n\
    \n**图 9–10.** *编辑精选集*\n\n请按照以下步骤删除精选集：\n\n1.  点按 `Collections` 按钮，调出 `Collections`\
    \ 菜单。\n2.  点按 `Edit` 按钮。\n3.  点按红色的 `减号` 按钮（请参见图 9–10）。\n4.  会出现一个红色的 `Delete`\
    \ 按钮。点按该按钮可删除精选集。将出现一个警告对话框，询问您是要从设备中移除该精选集中的项目，还是将这些项目移回其默认精选集。点按 `Remove` 可从\
    \ iPad 中移除这些项目，或点按 `Don't Remove` 以将它们保留在 iPad 上并移回其默认（`Books` 或 `PDFs`）精选集。\n\
    \n### 阅读图书\n\n书架以精美且易于查找的布局展示您的图书，但图书是用来阅读的，而非观赏。让我们开始吧！\n\n要阅读一本书，只需点按其封面。书会向前飞出并打开。如果您是首次打开这本书，您会看到第一页。如果您之前打开过这本书，它将打开到您上次阅读到的那一页。\n\
    \n阅读时，您可以选择横向或纵向模式。横向模式会并排显示两页，而纵向模式则显示单页（请参见图 9–11）。您只需旋转 iPad 即可在这两种模式间切换。\n\
    \n![images](img/0911.jpg)\n\n**图 9–11.** *在横向和纵向模式下阅读图书*\n\n在任何图书页面的顶部，无论您处于哪种方向，都会看到一个包含一系列按钮的菜单（请参见图\
    \ 9–12）。我们稍后会介绍所有这些功能的使用，但首先让我们看看各种菜单选项：\n\n![images](img/0912.jpg)\n\n**图 9–12.**\
    \ *图书的菜单按钮*\n\n*   *Library*：点按此按钮会关闭图书并带您返回书架。下次打开这本书时，您会回到上次离开时的页面。\n*   *Table\
    \ of Contents/Bookmarks*：此按钮由三个点表示，每个点后面都有一条线。点按此按钮可进入书的`目录`和`书签`页面。\n*   *Buy*：当您阅读从\
    \ iBookstore 下载的示例图书时，此按钮（未显示）会出现在`目录`按钮旁边。点按它可购买完整图书。\n*   *Brightness*：此按钮看起来像太阳，仅可在\
    \ iBooks 应用内更改屏幕亮度。\n*   *Font*：此按钮由一个大写和小写的 *A* 表示，允许您更改图书文本的字体以及字号。这对于阅读时需要更大字体的人（例如老年人或视力不佳者）非常有用。它还允许您将图书页面背景更改为深褐色调。\n\
    *   *Search*：`Search` 按钮看起来像一个放大镜，允许您在图书文本中搜索。\n*   *Bookmark*：点按`书签`丝带按钮可在右上角放置一个红色书签。\n\
    *   *Page Scrubber*：这是沿着图书页面底部排列的一系列点（请参见图 9–14）。按住位于这些点上的方形按钮；然后向左或向右拖动，以快速浏览图书的页面。\n\
    \n阅读时，您可以点按图书页面的中央来显示/隐藏菜单和 Page Scrubber 栏。页面上方将仅保留书名和作者姓名（在横向视图中），底部则保留页码。\n\
    \n#### 翻页\n\n您可以通过三种方式翻阅图书页面：\n\n*   按住页面的一侧，然后拖动手指滑过；页面将在屏幕上卷曲（请参见图 9–13）。松开手指时，翻页即完成。\n\
    \n    ![images](img/0913.jpg)\n\n    **图 9–13.** *翻页时会有酷炫的视觉效果。*\n\n*   点按屏幕的右侧或左侧可向前或向后翻页。其功能与前一种相同，但交互式视觉效果较少。\n\
    *   按住页面底部的 `Page Scrubber` 栏（请参见图 9–14），然后向任一方向滑动手指。滑动时，章节名称和页码会显示在 `Page Scrubber`\
    \ 栏上方。找到正确的页面后，将手指从 scrubber 上移开，页面就会翻到您选择的页面。`Page Scrubber` 栏让您无需翻阅整本书即可快速跳转到特定页码。\n\
    \n![images](img/0914.jpg)\n\n**图 9–14.** *Page Scrubber 栏显示页码和章节标题。*\n\n**注意：**\
    \ 许多人会在床上阅读。在床上使用 iPad 阅读没问题，但由于其内置的加速度计可以检测方向，您可能会发现屏幕根据您手持的角度来回旋转。为了在卧床阅读时将\
    \ iBooks 应用锁定在特定的页面视图，请拨动 iPad 侧边的开关以启用方向锁定。请注意，您需要确保已将侧边开关设置为`方向锁定`按钮，而非`静音开关`。请前往\
    \ `Settings` ![images](img/U001.jpg) `General`，然后在 `Use Side Switch to` 选项下选择\
    \ `Lock Rotation`。\n\n#### 调整亮度\n\n根据您的视力情况，您可能会发现在较亮或较暗的屏幕上阅读文本更轻松。要在阅读图书时调整\
    \ iPad 屏幕亮度，请点按菜单栏中的 `Brightness` 按钮（看起来像太阳的那个）。将出现一个包含滑块的下拉菜单（请参见图 9–15）。\n\n\
    ![images](img/0915.jpg)\n\n**图 9–15.** *亮度滑块*\n\n向左滑动可降低亮度，向右滑动则增加亮度。在 iBooks\
    \ 应用中调整亮度时，整个屏幕会随您的滑块设置而变亮或变暗；然而，一旦您离开 iBooks 应用，屏幕亮度将恢复为您在 iPad 的 `Settings`\
    \ 应用中指定的设置。这是一个很棒的功能，因为您在进入或退出 iBooks 应用时可以即时切换亮度级别，而无需每次都重新配置。\n\n要更改 iPad 的整体亮度级别，请前往\
    \ iPad 主屏幕上的 `Settings`，选择 `Brightness & Wallpaper`，然后调整滑块以设置您偏好的亮度。\n"
- fmt: '```markdown

    #### Adjusting Font, Font Size, and Page Color


    Depending on your eyesight, you may want to adjust the font size of the text.
    Tap the `Font` button (side-by-side large and small *A*s) to be presented with
    the Font menu (see [Figure 9–16](#Chapter09.html#fig_9_16)). Tap the small *A*
    to decrease the font size and the large *A* to increase it. Increasing or decreasing
    the font size will result in fewer or more words on a page, respectively.


    ![images](images/0916.jpg)


    **Figure 9–16.** *The Font panel*


    Below the font size controls, you''ll see a button that says `Fonts`. Tap this
    to select from six font types (see [Figure 9–17](#Chapter09.html#fig_9_17)). Different
    font types can affect the number of words you see on the screen slightly. Why
    change the font? Some people have an easier time reading different fonts, especially
    serif or sans serif fonts. A sans-serif font is like the font of the text of this
    book; there are no little lines hanging off the letters. A serif font is one like
    Times New Roman.


    Below `Fonts`, you''ll see the `Sepia` button. Tap to toggle this feature on or
    off. When ON, the entire book will take on a yellow-brown tone, similar to the
    color pages in an old paper book start to turn after a while. Some people find
    reading from a sepia screen easier on the eyes because you aren''t staring at
    a bright white background.


    ![images](images/0917.jpg)


    **Figure 9–17.** *The fonts you can choose from*


    #### Searching Text


    You can search for any word or bit of text in the book you are reading by simply
    tapping the `Search` icon, which looks like a magnifying glass. A search field
    will pop up, along with a keyboard. Type any search term you want, and you''ll
    be presented with a list of results, displayed by order of page number (see [Figure
    9–18](#Chapter09.html#fig_9_18)). Tap any result to be taken instantly to that
    page. On the page, your search term will have a brownish yellow bubble over it.


    ![images](images/0918.jpg)


    **Figure 9–18.** *The Search panel lets you perform in-text searches, as well
    as quickly link to Google and Wikipedia searches on the Web.*


    You can also perform a Google or Wikipedia search for your word or phrase. Below
    the search results, you''ll see a `Search Google` button and a `Search Wikipedia`
    button. Tap either to leave the iBooks app. You''ll be taken to Safari, where
    the Google search results or Wikipedia entry page will be presented.


    #### Bookmarking a Page


    Tapping the `Bookmark` icon will cause a red bookmark to be laid down at the top
    of the page (see [Figure 9–19](#Chapter09.html#fig_9_19)). Laying down a bookmark
    adds a shortcut of the page to the Table of Contents/Bookmarks page, so you can
    quickly access the bookmarked page later. Bookmarking in iBooks isn''t really
    like using a bookmark in a physical book. In the iBooks app, the bookmarking feature
    is more akin to dog-earing a page on a real book, since you aren''t limited to
    one bookmark. You can bookmark as many pages as you want. To unbookmark a page,
    tap the red Bookmark ribbon.


    ![images](images/0919.jpg)


    **Figure 9–19.** *Tap the Bookmark button (left) to lay down a bookmark (right).*


    #### Interacting with Text


    Your interaction with the book''s text isn''t limited to search. What we''ll show
    you next is one of the reasons why e-books are superior to traditional paper books.
    However, paper books still have a leg up on e-books in many ways. See an article
    about the two formats here: [`www.tuaw.com/2010/05/08/a-tale-of-two-mediums-despite-the-ipad-traditional-books-aren/`](http://www.tuaw.com/2010/05/08/a-tale-of-two-mediums-despite-the-ipad-traditional-books-aren/).
    One advantage paper books have over e-books is that they are relatively cheap
    (especially if you buy them used). Also, you don''t need to be afraid to take
    them to a park or a beach. Sand or dirt isn''t going to affect the usability of
    a paperback the same way it will affect an electronic device like the iPad. Also,
    while reading in public, paper books are a much lower theft target than Apple''s
    latest gadget wonder.


    While on any page, press and hold your finger to the screen, and a Spyglass icon
    will pop up on the page. To move it around, simply drag your finger. Below the
    Spyglass icon, a single word will be highlighted in blue. When you''ve found the
    word you want, remove your finger from the screen. The Spyglass icon will disappear,
    and the word will be highlighted with grab bars on either side. Drag the grab
    bars to select more than one word, such as a sentence or entire paragraph.


    With your selection confirmed, you''ll be presented with five text-selection tools
    from the black pop-up menu that appears (see [Figure 9–20](#Chapter09.html#fig_9_20)):


    ![images](images/0920.jpg)


    **Figure 9–20.** *The text-selection tools*


    *   *Copy*: Select to copy the text so you can paste it into another application
    or the search field. Note that the copy function only works with PDFs and non-DRM
    (digital management rights) e-books. You will not be able to copy text from any
    books purchased from the iBookstore due to its copy-protection software.

    *   *Dictionary*: This is our favorite feature of the iBooks app because it shows
    you one of the primary advantages—and ease-of-use features—that e-books have over
    traditional paper books. When reading a paperback book, if you don''t know a word,
    you need to put the book down and grab a dictionary. On the iPad, if you don''t
    know a word in a book, you can simply select it and tap the `Dictionary` button.
    A window will pop up on page with the definition of the word (see [Figure 9–21](#Chapter09.html#fig_9_21)).
    You can then tap elsewhere on the page to close the Dictionary window and get
    back to reading the book. Simple.


    ![images](images/0921.jpg)


    **Figure 9–21.** *The dictionary panel*


    *   *Highlight*: Tapping highlight will mark the text as if it''s been highlighted
    by a highlighter (see [Figure 9–22](#Chapter09.html#fig_9_22)). Apple has outdone
    itself here because the highlighting actually looks the same as it does on physical
    paper.


    ![images](images/0922.jpg)


    **Figure 9–22.** *Highlighted text. When you highlight text, it automatically
    gets added to the Bookmarks page.*


    If you tap the colored highlight, another pop-up menu appears that allows you
    to change the color of the highlight, create a note to go along with the highlighted
    text, or remove the highlight (see [Figure 9–23](#Chapter09.html#fig_9_23)). Color
    selections are yellow, green, blue, pink, and purple. Any newly selected text
    you choose to highlight will be highlighted the color of your last choosing. Any
    text you highlight will show up in a list on the Bookmarks page (which we''ll
    get to in a moment).


    ![images](images/0923.jpg)


    **Figure 9–23.** *Options for highlighted text*


    *   *Note*: Tapping Note will automatically highlight the selected text, then
    cause a Post-It style note to fly forward on the screen and the on-screen keyboard
    to appear (see [Figure 9–24](#Chapter09.html#fig_9_24)). You can type as much
    text as you want in the note and scroll up and down using your finger. The color
    of the note will be based on the color you chose for your highlight. Tap anywhere
    on the screen to close the note. You''ll see a small Note icon appear on the side
    of the page with the date you wrote the note on (see [Figure 9–24](#Chapter09.html#fig_9_24)).
    Tap the note''s icon to edit the note. Tap the text''s highlight and select `Remove
    Note` to delete the note.


    ![images](images/0924.jpg)


    **Figure 9–24.** *Creating a note and the Note icon in the margin of the page
    after creation*


    *   *Search*: Tapping Search will open the Search window (which looks like a magnifying
    glass) in the upper-right corner of the page. The text you selected will be automatically
    filled in as the search query.

    ```'
