    # 多任务与后台应用管理


    随着 iOS 4 的发布，苹果为 iPod touch 引入了多任务功能。多任务意味着您可以同时运行多个应用。换句话说，您可以在 Safari 中浏览网页，同时在后台运行一个即时通讯应用。即使整个
    iPad 屏幕都用于显示 Safari 应用，您仍能保持在线状态，并收到来自 IM 应用的新消息通知。


    如前所述，要离开某个应用，您需要按下 `Home` 键返回主屏幕，然后找到并点击下一个想要启动的应用图标。借助 iOS 4 内置的多任务功能，您无需每次启动不同应用时都返回主屏幕。现在，无论您处于哪个应用中，双击
    `Home` 键都会调出一行当前在后台运行的所有应用（参见图 4–16）。这些应用被称为 *后台* 应用。自开机以来您在 iPad 上启动的任何应用都会作为后台应用运行，直到您彻底关闭它（稍后讨论）。这个后台应用栏是一个非常便捷的功能，但有一个小注意事项：您在那里看到的所有应用可能并非实际在后台运行。苹果还使用这个栏来显示最近使用的应用，因此即使在重启之后，您也可能在栏中看到几个应用，尽管自重启后您并未启动过它们。


    ![images](img/0416.jpg)


    **图 4–16.** *当前我们在玩 Cut the Rope 游戏时，一些正在后台运行的应用。*


    在图 4–16 中，您可以看到我们正在玩一个名为 Cut the Rope 的有趣游戏。通过双击 `Home` 键，多任务栏会向上滑动屏幕，您可以在其中滚动查看所有其他打开的后台应用。要查看更多当前运行的后台应用，请在应用行上滑动手指。要快速切换到另一个后台应用，请点击其图标，它将与您当前所在的应用交换位置（参见图
    4–17）。


    ![images](img/0417.jpg)


    **图 4–17.** *Cut the Rope 应用通过 iPad 的多任务功能与 iPod 应用交换位置*


    ## 彻底关闭应用


    iPad 的主屏幕允许您通过一次点击启动任何应用。一旦您启动了某个应用，即使您返回主屏幕，它也会在后台保持打开状态。要彻底关闭应用，请双击 `Home` 键打开后台应用栏。在应用行中滑动手指，直到找到您想要关闭的应用。现在长按该应用的图标，直到它和栏中的其他应用开始抖动。您会注意到栏中所有应用的角落出现了带有白色减号的红色圆圈（参见图
    4–18）。点击红色圆圈即可关闭该应用。要重新打开应用，您需要再次从主屏幕启动它。


    退出应用而不是让它们在后台保持打开状态，可以降低 CPU 使用率，让您的 iPod 温度稍低一些，并减少对电池的压力。


    还记得我们提到过苹果也使用这个后台多任务栏来显示最近使用的应用吗？好吧，如果应用没有在运行，点击减号会从栏中移除该最近使用的应用。按照苹果的实现方式，仅通过查看栏，您无法真正分辨哪些应用正在运行，哪些只是最近使用的应用。


    ![images](img/0418.jpg)


    **图 4–18.** *点击红色圆圈以彻底关闭应用。*


    ## 强制退出应用


    iPad 的主屏幕允许您通过一次点击启动任何应用。在应用中时，按下 iPad 的 `Home` 键可以随时返回主屏幕。如果由于某种原因程序挂起且您的 iPad
    变得无响应，您可以按住 `Home` 键 6 到 10 秒来退出该程序并返回主屏幕。


    **提示：** 在应用内部，许多 iPad 屏幕的左上角会出现一个 `Back` 按钮。点击此按钮可返回应用中的上一个屏幕。这与按下 `Home` 键不同。`Back`
    按钮让您在应用内的屏幕之间移动。`Home` 键则离开应用并返回主屏幕。


    ## 聚焦搜索


    至此，您已经探索了 iPad 主屏幕提供的所有功能，除了一个重要的功能。前面我们提到过，代表应用页面数量的圆点行旁边有一个小的灰色放大镜图标（参见图 4–19）。这个放大镜图标代表了
    iPad 强大的搜索功能，名为 `Spotlight`。


    ![images](img/0419.jpg)


    **图 4–19.** *每个主页底部都有 Spotlight 放大镜图标（已圈出）*


    要访问 `Spotlight`，只需在主屏幕的第一页向右滑动。您会进入一个页面，顶部显示一个小的白色搜索字段，其中包含文字 *Search iPad*。页面底部会显示内置键盘。


    只需在搜索字段中输入任何搜索查询，搜索字段与键盘之间的区域就会开始填充结果（参见图 4–20）。


    ![images](img/0420.jpg)


    **图 4–20.** *Spotlight 搜索结果页面*


    目前，`Spotlight` 还没有达到其应有的强大程度。如果您拥有一台 Mac，您会知道 `Spotlight` 能够搜索文档内容，而不仅仅是文档的文件名。目前，`Spotlight`
    只能搜索以下内容：


    *   *通讯录*：名字、姓氏和公司名称。

    *   *邮件*：收件人、发件人和主题字段。

    *   *日历*：事件标题、邀请和地点。

    *   *iPod*：歌曲名称、艺术家和专辑。播客和有声读物的标题和名称。

    *   *备忘录*：有趣的是，尽管 `Spotlight` 无法搜索电子邮件正文中的文本，但它可以搜索 `Notes` 应用中备忘录的文本。


    要选择某个结果，只需点击它，您将自动转到该文档或文件所在的应用程序。在 `Spotlight` 结果的底部，您可以选择在网络上搜索您的查询，也可以搜索维基百科。点击这两个选项中的任何一个都会打开
    `Safari` 网页浏览器，并将您带到默认搜索引擎页面或维基百科搜索结果页面。


    尽管 `Spotlight` 是一个不错的功能，但它确实有一些局限性。也许最大的限制是您无法搜索电子邮件正文中的文本。此外，`Spotlight` 不够智能，无法识别拼写错误，因此备忘录或电子邮件主题中任何拼写错误的内容都无法被找到。


    **注意：** 如果您有几十个应用，无需在所有主屏幕页面中滑动，只需前往 `Spotlight` 搜索应用的名称。当它的图标出现时，点击即可启动它。


    ## 聚焦搜索设置


    前往 `Settings`![images](img/U001.jpg)`General`![images](img/U001.jpg)`Home`![images](img/U001.jpg)`Spotlight
    Search`，您会看到一个列表，列出了 iPad 上 `Spotlight` 会搜索的项目。您可以取消选中某些应用，将它们从 `Spotlight` 搜索中排除（例如，点击
    `Music` 取消选中，歌曲名称就不会在搜索时出现）。您还可以使用屏幕右侧的抓取图标来重新排列搜索分组出现的顺序。

