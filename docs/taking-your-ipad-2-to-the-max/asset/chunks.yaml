- fmt: '# USA Today for iPad


    *USA Today* has done an excellent job at making its iPad app (see [Figure 16–9](#Chapter16.html#fig_16_9))
    look like the real paper—right down to the serrated newspaper edges that border
    the top of the screen. Browse and read stories from the News, Money, Sports, Life,
    Tech, and Travel sections; see local and national weather forecasts; and keep
    up-to-date on all the latest sports scores. The Day in Pictures section of the
    app is particularly interesting. It lets you swipe through the day''s best photos
    in news, sports, and entertainment. You can also play the images as a slideshow.
    It''s free in the App Store.


    ![images](images/1609.jpg)


    **Figure 16–9.** *USA Today*


    ## Weather Apps


    Just like with news apps, there are myriad weather apps for the iPad, but these
    are two of our favorites.


    ### Weather HD


    Weather HD (see [Figure 16–10](#Chapter16.html#fig_16_10)) isn''t the most full-fledged
    weather app, but it is the most beautiful. Browse through your selected city''s
    three-hour and seven-day forecasts while being captivated by some of the most
    beautiful 3D animated landscapes representing the current weather outside. The
    Weather HD app shows you just how beautiful your iPad screen can be. Watch as
    you move through a field of lush green grass and tall wind turbines or fly through
    the clouds with a glorious moon rising in the distance. Raining outside? You''ll
    swear you can almost feel the drops mist your face as Weather HD glides you through
    a green countryside as dots of rain float in the air. It''s a steal at $0.99 in
    the App Store.


    ![images](images/1610.jpg)


    **Figure 16–10.** *Weather HD*


    ### The Weather Channel Max


    Although it lacks the beauty of Weather HD, the Weather Channel''s official iPad
    app more than makes up for it in features. The Weather Channel Max for iPad (see
    [Figure 16–11](#Chapter16.html#fig_16_11)) delivers in-depth weather reports for
    current, 36-hour, and 10-day forecasts. Watch the latest weather-related news
    stories and a selection of Weather Channel original programming right in the app.
    You can even navigate weather maps by pinching and zooming. See Doppler radar,
    cloud coverage, Feels Like, and even UV Index maps. It''s the weather of the world
    in your lap. Best of all, it''s free in the App Store.


    ![images](images/1611.jpg)


    **Figure 16–11.** *The Weather Channel Max*


    ## The iPad as an Artist''s Canvas


    As you''ve seen, the iPad isn''t just a tool to consume data; you can also use
    it to create things such as documents, spreadsheets, and presentations. But the
    ability to create content on the iPad isn''t limited to those who work in the
    business world. The iPad is a wonderful artist''s tool. It''s quite literally
    a blank canvas that you can use to create masterpieces Picasso would be envious
    of. Although there are several iPad artist apps, here are two that are our favorites.


    ### Brushes


    Brushes got its start on the iPhone and has since moved to the next level on the
    iPad (see [Figure 16–12](#Chapter16.html#fig_16_12)). Brushes is a powerful tool
    for creating original works of art using your iPad''s Multi-Touch display. Drag
    and swipe your fingers to create brush strokes on a blank canvas. Use the advanced
    color picker, myriad brushes, layers, the eyedropper tool, undo and redo controls,
    and more to create whatever your mind can conceive. Do you think creating artworks
    on the iPad isn''t for “serious” artists? Artist Jorge Colombo famously created
    the June 1, 2009, cover of *The New Yorker* entirely using Brushes…for the iPhone.
    Now imagine what he—and you—could do with a digital canvas the size of the iPad''s
    screen. The app costs $7.99, but think of how much money you''re going to save
    by not having to buy replacement canvases and paints.


    ![images](images/1612.jpg)


    **Figure 16–12.** *It looks like it was drawn by a 2 year old, but it was actually
    created by one of the authors in about 30 seconds. Try your own hand at creating
    art on the iPad with Brushes.*


    ### Adobe Ideas


    If Brushes is a canvas, Adobe Ideas is a sketchpad (see [Figure 16–13](#Chapter16.html#fig_16_13)).
    Using the tips of your fingers, sketch that latest idea you have for the dress
    that is going to take New York and Milan by storm, test designs for next year''s
    most popular new superhero, or even use it as a whiteboard for coffee-table meetings
    in Starbucks. A nice feature of this app is that you can export any image you
    create as a PDF and e-mail it to yourself or others for editing in Adobe''s professional
    apps like Illustrator and Photoshop or for viewing with any PDF viewer. Adobe
    Ideas is free in the App Store.


    ![images](images/1613.jpg)


    **Figure 16–13.** *Adobe Ideas lets you get your ideas down on paper…er, Multi-Touch
    screen.*


    ## The iPad as a Phone


    When the iPad was first unveiled, some people joked that it was nothing more than
    a big iPhone. As you can now tell, they couldn''t have been more wrong. However,
    you can actually use your iPad as a phone. All you need to do is download the
    free Skype app (see [Figure 16–14](#Chapter16.html#fig_16_14)) from the App Store,
    and you can make calls from your iPad to any phone in the world.


    We want to note that, at the time of this writing, Skype has not released an iPad
    app. However, because most iPhone apps run on the iPad, you can download and use
    Skype for iPhone on the iPad without any problems. To use the app, you''ll need
    a free Skype account, which you can set up at [`www.skype.com`](http://www.skype.com).
    You''ll also need to be connected to a Wi-Fi network since Skype uses VoIP (calls
    made over Internet lines) to make phone calls.


    Once you log in to the Skype app on your iPad, you can make free iPad-to-computer
    calls with other Skype users. If you buy Skype credit, you can make iPad-to-landline
    or cell phone calls. One of the writers uses Skype on his iPad in London to call
    his mother on her house phone in the United States because it is much cheaper
    than regular international rates or even buying a calling card. So, the iPad is
    not just an oversized iPhone, but it can make calls like the iPhone can.


    ![images](images/1614.jpg)


    **Figure 16–14.** *Skype''s iPhone app running on the iPad*


    ## The iPad as a Kitchen Helper


    It may sound strange, but the iPad is very much at home in the kitchen. Whether
    you''re using it as an electronic cookbook, surfing the Web while waiting for
    water to boil, or listening to music while you cook, the iPad is the perfect kitchen
    computer. You''ll want to make sure that your iPad isn''t near liquids or heat,
    but if you treat it with the respect of a beloved cookbook, you''re probably fine.


    A good way to keep your iPad safe from splashes or smears when it is on the kitchen
    counter is to put it into a resealable zipper-type freezer bag. Chef Sleeve ([`www.chefsleeve.com`](http://www.chefsleeve.com))
    also makes reusable bags that are the perfect size for an iPad, made of a much
    more transparent plastic, and come in a box that doubles as an iPad stand.


    Since you''ll be chopping veggies and slicing meat, using a case with a built-in
    stand to keep the iPad in an upright position is a good idea. It takes up less
    counter space that way, and with a quick glance at the screen, you can find out
    what ingredient you need to add next to your recipe. Apple''s iPad Case works
    very well to place your iPad in the proper position. We also suggest setting `Auto-Lock`
    (`Settings` ![images](images/U001.jpg) `General` ![images](images/U001.jpg) `Auto-Lock`)
    to `Never` so that you''re not constantly having to turn the iPad back on. With
    those hints in mind, let''s explore some kitchen-friendly apps.'
