  trans: '

    #### 影片标签页


    iTunes Store 提供了大量可供租借或购买的电影，你可以下载并同步到 iPad 上。如下图所示，**图 2–19** 所示的“影片”标签页提供了多种将电影导入
    iPad 的方法。


    ![images](img/0219.jpg)


    **图 2–19.** *“影片”标签页允许你选择要同步到 iPad 的电影。*


    要同步电影，请首先确保选中了`同步电影`复选框。你会在“影片”标签页上看到这个复选框。如果将此复选框留空，iTunes 将不会将电影内容同步到你的 iPad：


    *   **自动包含……影片**：如果选中此复选框，你将可以访问一个预设选项的下拉列表，让电影同步体验更轻松。从下拉列表中，你可以选择同步所有电影（这不是个好主意，因为一小时的视频可能占用高达半
    GB 的空间），或者，如果你想节省空间，可以选择 1、3、5 或 10 部“最近的影片”预设。你还可以选择“所有未观看”影片预设，这将添加你资料库中所有尚未观看的电影。其他预设选项包括同步
    1、3、5 或 10 部“最近未观看的影片”，或 1、3、5 或 10 部“最早未观看的影片”。


    #### 电视节目标签页


    与电影类似，iTunes Store 也提供了大量可供购买和下载的电视节目。所有这些节目都可以同步到你的 iPad 上播放。你可以按集购买，或者购买季度通行证。使用季度通行证，你可以一次性支付整季的费用，通常会有小幅折扣，并且新剧集在可用时会自动下载。


    要同步电视节目，请首先确保选中了`同步电视节目`复选框（见 图 2–20）。


    ![images](img/0220.jpg)


    **图 2–20.** *“电视节目”标签页允许你选择要同步到 iPad 的节目。*


    “电视节目”标签页上会出现以下选项：


    *   **自动包含……集……**：如果选中此复选框，你将可以访问一系列预设选项的下拉列表，让电视节目同步体验更轻松。从下拉列表中，你可以选择同步所有电视节目（同样，如果你有很多节目，这不是个好主意，因为一小时的视频可能占用高达半
    GB 的空间）。你还可以选择“所有未观看”选项以及多种预设，包括仅同步最新节目、最新未观看节目或最早未观看节目。使用所有这些选项，你可以将预设应用于所有节目或仅选定的电视节目。

    *   **节目和剧集框**：如果“自动包含”复选框已选中且设置不是“全部”，你还可以在这些框中从你的 iTunes 资料库中选择额外的电视节目（见 图 2–21）。如果取消选中“自动包含”复选框，你可以在这些框中手动选择任意数量的电视节目。


    ![images](img/0221.jpg)


    **图 2–21.** *“节目”框允许你选择要同步到 iPad 的电视系列。在右侧的“剧集”框中，你可以选择要同步该系列的哪些剧集。*


    #### 播客标签页


    许多人使用 iTunes 订阅他们喜爱的播客。*播客*是通过互联网传送的音频节目，就像电视节目通过电波传送一样。如今，有大量播客可用，包括娱乐、建议、教学节目等等。iTunes
    会监控你的播客订阅，并在新节目可用时自动下载。“播客”标签页让你可以控制哪些节目同步到你的 iPad。


    如 图 2–22 所示，“播客”标签页的外观和操作方式与“影片”和“电视节目”标签页类似。


    ![images](img/0222.jpg)


    **图 2–22.** *“播客”标签页允许你选择要同步到 iPad 的播客。*


    要同步播客，请首先确保选中了`同步播客`复选框。你会看到“播客”标签页上有以下项目：


    *   **自动包含……集……**：如果选中此复选框，你将可以访问预设选项的下拉列表，让播客同步体验更轻松。从右侧下拉列表中，你可以选择同步所有播客或选定项目。如果相关播客仅为音频，同步所有播客占用的空间不会像同步所有电影或电视节目那样多。但是，如果你正在下载视频播客，则空间要求与电影相同。除了“全部”/“选定”选项外，左侧下拉菜单提供“所有未播放”和“所有新节目”选项，以及多种预设，包括仅同步最新播客、仅同步最近/最早未播放的播客，或仅同步最近/最早的新播客。使用所有这些选项，你可以将预设应用于所有播客或仅选定的播客。

    *   **播客和剧集框**：如果“自动包含”复选框已选中且设置不是“全部”，你还可以在这些框中从你的 iTunes 资料库中选择额外的播客。如果取消选中“自动包含”复选框，你可以在这些框中手动选择任意数量的播客。你可以将相同的“最近五个”及类似选项应用于这些项目，就像其他媒体设置一样。由于许多播客每天或每周都会更新新剧集，它们可能会很快占用存储空间。而且，何必保留已经听过的剧集呢？


    #### iTunes U 标签页


    iTunes U 是苹果公司与众多教育机构提供的免费服务，用于传播课堂讲座和语言课程等教育工具。iTunes U 的操作方式与播客非常相似，将其导入 iPad
    的方法也类似。


    要同步你的 iTunes U 项目，请首先确保选中了`同步 iTunes U` 复选框（见 图 2–23）。


    ![images](img/0223.jpg)


    **图 2–23.** *iTunes U 标签页允许你选择要同步到 iPad 的 iTunes U 合集。*


    你会在 iTunes U 标签页上看到以下项目：


    *   **自动包含……项目……**：当此复选框选中时，你将可以访问预设选项的下拉列表，让 iTunes U 同步体验更轻松。从右侧下拉列表中，你可以选择同步所有
    iTunes U 项目或选定项目。除了“全部”选项外，左侧下拉菜单提供“所有未播放”和“所有新项目”选项，以及多种预设，包括仅同步最新的 iTunes U
    项目、最近/最早未播放的项目，或最近/最早的新项目。使用所有这些选项，你可以将预设应用于所有项目或仅选定的项目。

    *   **合集和项目框**：如果“自动包含”复选框已选中且设置不是“全部”，你还可以在这些框中从你的 iTunes 资料库中选择额外的项目。如果取消选中“自动包含”复选框，你可以在这些框中手动选择任意数量的
    iTunes U 课程。

