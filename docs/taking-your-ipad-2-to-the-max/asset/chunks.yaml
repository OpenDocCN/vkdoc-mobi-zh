  trans: '

    ##### 适用于 iOS 的 iMovie


    苹果的 iOS 版 `iMovie`（见图 16–27，售价 4.99 美元）是一款专为 iPad 设计的、极其易于使用的视频编辑应用。你不会想在 iPad
    上编辑下一部长篇纪录片，但 `iMovie` 非常适合制作短片与家人朋友分享。


    ![images](img/1627.jpg)


    **图 16–27.** *无论您是在编辑商务会议的演示视频，还是仅仅在整理家庭视频的片段，iOS 版 `iMovie` 都是一个基于 iPad 的电影工作室应用。*


    我们可以轻松写一本关于如何在 iPad 上使用 `iMovie` 的小书，所以这里我们只介绍其主要功能。要使用 iOS 版 `iMovie`，先用 `相机连接套件`
    将相机或 iPhone 中的视频加载到照片库，或者直接用新款 iPad 的摄像头拍摄视频。在 `iMovie` 中，创建一个新项目，然后开始添加影片剪辑。在时间线上移动剪辑、修剪或分割它们，然后添加转场效果、配乐和标题。


    当编辑完成时，`iMovie` 会将视频渲染成一个可播放的电影，其中包含您添加的所有元素。最终产品可以通过电子邮件分享，但由于大多数视频文件相对较大，您可能更愿意将它们同步到
    Windows 电脑或 Mac 上。通过 YouTube、Vimeo、Facebook 和 CNN iReport 分享视频只需轻点一个按钮，项目也可以发送到
    iTunes，导入到 Mac 版的 `iMovie` 中进行进一步编辑。


    ### 远程桌面计算


    iPad 是技术支持专家或移动办公者的梦想之选。它轻薄且不引人注目，在解决技术问题或试图操作几个办公室之隔——甚至几个大洲之隔——的另一台电脑时，携带非常方便。有几款应用可以帮助您无需绑定在台式机或笔记本电脑上，就能处理办公室的工作或支持本地或远程用户。


    本节首先讨论的两个工具用于远程控制 Mac 或 Windows 电脑。在这两种情况下，应用都需要一个对应程序在您想要控制的目标机器上运行。


    #### Splashtop Remote


    `Splashtop Remote`（见图 16–28；售价 4.99 美元）是所谓的*虚拟节点控制器*（`VNC`）客户端的绝佳范例。通过在 Mac 或
    Windows 电脑上运行一个免费软件（`Splashtop Streamer`），iPad 就可以接管远程电脑的控制权。


    ![images](img/1628.jpg)


    **图 16–28.** *`Splashtop Remote` 的功能设置快速便捷，可提供对 Mac 或 Windows 电脑的远程控制或支持。*


    一个屏幕按钮可以调出 iPad 的虚拟键盘用于文字输入，而您的手指在 iPad 屏幕上则充当远程电脑的“鼠标”。


    #### LogMeIn Ignition


    `LogMeIn Ignition`（见图 16–29；售价 29.99 美元）是另一款远程控制应用。它是 `LogMeIn` 的产品，这家公司专注于对各种类型的电脑进行安全控制。对于大型
    IT 部门来说，使用 `LogMeIn`，`LogMeIn Ignition` 为支持人员提供了一种接管远程电脑进行故障排除的方法。该应用还具有一个 `Splashtop
    Remote` 所没有的功能——在 iPad 和台式电脑之间传输文件的能力。


    ![images](img/1629.jpg)


    **图 16–29.** *`LogMeIn Ignition` 更适合需要控制更多电脑的大型组织。*


    在 `Splashtop Remote` 和 `LogMeIn Ignition` 之间，前者最适合用于需要控制的电脑数量很少的情况，而 `LogMeIn
    Ignition` 则更适合需要访问大量电脑，或者需要在 iPad 和台式电脑之间传输文件的用户。


    与 `SplashtopRemote` 一样，您的手指在远程电脑上充当鼠标，并且可以使用熟悉的双指缩放手势来查看屏幕上的细节。


    #### NetTools


    很多时候，电脑问题并非电脑本身的故障，而是网络引起的。正因如此，大多数技术支持人员都熟知那些能帮助他们排查网络问题的工具。


    `NetTools`（见图 16–30；售价 3.99 美元）将三种最流行的网络工具——`Ping`、`Traceroute` 和 `DNS`——集于 iPad
    一身。`Ping` 用于确定网络上的另一台设备是否可见，`Traceroute` 查看您的 iPad 与另一台机器之间的各个网络跳点，而 `DNS` 则提供与互联网地址相对应的域名服务（`DNS`）服务器的信息。


    ![images](img/1630.jpg)


    **图 16–30.** *使用 `NetTools`，ping 网络设备、运行 `Traceroute` 或查询 `DNS` 条目都非常简单。任何测试结果都可以通过电子邮件发送或打印。*


    虽然它并非市场上功能最强大的网络工具包，但 `NetTools` 的功能对于使用 iPad 的 IT 支持人员来说已经足够实用了。


    ### 本章小结


    在本章中，我们讨论了 iPad 用户的多种使用场景。无论您是游戏玩家、旅行者、艺术家、美食家还是 IT 极客，或者只是喜欢了解身边发生的事，总有一款应用适合您。


    不要止步于此——您的 iPad 是一款不可思议的工具和玩具，它会随着每一款应用而变化。将快速浏览 App Store 作为您日常习惯的一部分，您会发现更多令人愉悦且有用的应用可供享受。以下是本章需要记住的一些要点：


    *   有超过 4000 款 iPad 专用游戏，您的 iPad 还可以运行超过 90,000 款 iPhone 游戏。

    *   免费或便宜的新闻和天气应用在您的 iPad 上很容易获得，其功能和速度往往能与基于网页的同类应用相媲美甚至超越它们。

    *   您的 iPad 不是电话，但它可以使用也适用于 iPad 的免费 `Skype` iPhone 应用进行 VoIP 通话。

    *   iPad 是完美的厨房帮手。只是要确保保护您的 iPad 远离热源和液体。

    *   对于使用 iPad 的教育工作者来说，`基座连接器转 VGA 线缆` 是一个有用的配件。

    *   旅行者不再需要担心携带笔记本电脑及其配件的体积和重量。iPad 应用以更小的外形提供了笔记本电脑式的功能。


