- fmt: '### iPad Settings


    iPad 提供了多种设置，允许您自定义 iPad 的工作方式和外观。您可以在 iPad 主屏幕上的“设置”应用中找到所有设置（如图 4–21 所示）。


    ![images](images/0421.jpg)


    **Figure 4–21.** *The Settings app icon*


    轻点“设置”应用，在屏幕左侧会看到 iPad 以及随 iPad 自带的所有苹果 iPad 应用的设置列表（参见图 4–22）。在这些设置下方，您会看到一个“应用”标题。您从
    iTunes Store 下载的任何应用，如果具有可自定义的设置，都会出现在此处。若要选择某个应用的设置，请轻点该应用的名称。


    ![images](images/0422.jpg)


    **Figure 4–22.** *The general settings selections*


    虽然我们会在本书中更深入地介绍苹果内置应用的各项设置，但首先让我们来熟悉一下 iPad 的“通用”设置。


    *   **About**：此处显示您的 iPad 上有多少歌曲、视频、照片和应用程序。它还会显示您的 iPad 总存储容量以及剩余容量。您可以在此找到 iPad
    的 OS 版本号、型号和序列号，以及您的 Wi-Fi 和蓝牙 ID。在最底部，您会看到指向苹果法律和监管文档的链接。

    *   **Sounds**：此区域提供一个滑块用于调整 iPad 的音量和设置铃声。它还允许您打开或关闭电子邮件、日历提醒、锁定声和键盘点击音。

    *   **Network**：此选项显示您的网络设置。详情请参见第 3 章。

    *   **Bluetooth**：此选项允许您打开或关闭 iPad 的蓝牙信号。如果您没有在 iPad 上使用任何蓝牙设备，请保持蓝牙关闭。这样可以节省电池电量。

    *   **Spotlight Search**：iPad 的 Spotlight 搜索功能的设置。

    *   **Auto-Lock and Passcode Lock**：正如我们之前所讨论的，您可以在此处配置锁定设置。

    *   **Restrictions**：如果您与家人共用一台 iPad，或为孩子购买了一台，您可能希望限制他们在 iPad 上的操作。限制设置允许您限制对
    Safari、YouTube 和 iTunes Store 应用的访问。此外，您可以限制用户安装新应用和使用定位服务。您还可以选择允许在 iPad 上显示的内容。设置包括限制应用内购买，以及限制访问超过您所选评级的电影、音乐、电视节目和应用。

    *   **Use Side Switch To**：设置 iPad 物理侧边开关的功能。可以选择将其设为旋转锁定开关或静音开关。

    *   **Date & Time**：此选项允许您选择 24 小时制时钟，以及设置时区和手动设置日期与时间。

    *   **Keyboard**：您可以在此处控制所有键盘设置。我们将在下一节中逐一介绍。

    *   **International**：使用此设置面板选择您偏好的语言以及地址和电话号码的区域格式。

    *   **Accessibility**：此处包含针对视障和听障人士的设置。我们将在本章后面详细讨论。

    *   **Battery Percentage**：选择是否在状态栏的电池图标旁显示剩余电池电量的百分比。

    *   **Reset**：“还原所有设置”可将您的 iPad 设置恢复为出厂默认值。“抹掉所有内容和设置”的作用与“还原所有设置”类似，但还会抹掉您的所有个人数据。此部分还允许您将网络、键盘、主屏幕布局和定位设置重置为
    iPad 的出厂默认值。


    ### The Keyboard


    喜欢您 iPhone 上的触摸键盘吗？但您还没见过真正的厉害之处。当您意识到大屏幕多点触控设备的潜力时，首次使用 iPad 键盘简直是一种顿悟。


    如图 4–23 所示的键盘，当您处于任何需要文本输入的应用中时会自动显示。需要注意的是，如果 iPad 已与外部蓝牙键盘配对，则软件键盘不会显示。（请参阅第
    3 章了解蓝牙配对详情。）


    ![images](images/0423.jpg)


    **Figure 4–23.** *The iPad’s Multi-Touch keyboard*


    在本节中，我们将介绍如何在每台 iPad 都自带的苹果“备忘录”应用中使用屏幕键盘。


    打开“备忘录”，点击右上角的`+`按钮以创建新笔记。在 iPad 屏幕底部，您会看到键盘自动出现（参见图 4–24）。


    ![images](images/0424.jpg)


    **Figure 4–24.** *The keyboard appears at the bottom of the iPad’s screen.*


    **NOTE：** 在竖屏方向使用键盘时，键盘会较小，但屏幕上能看到更多输入内容。如果切换到横屏方向，键盘会更大，但能看到已输入内容的屏幕空间会减少。您可以试一下，看看哪种方式最适合您。


    尽管苹果在设计 iPad 键盘方面已竭尽全力，但许多人仍然认为这是他们新 iPad 上最难适应的地方。转向触摸屏键盘可能很困难，但在相对较短的时间内，情况会大为改观。键盘使用得越多，就越容易使用，这不仅是因为您习惯了，更因为它有一个秘密。


    这个秘密就是，如图 4–23 所示的键盘非常智能——智能到可以纠正许多打字错误和手指错位。它会自动将句首字母大写。它会为拼写错误的单词建议更正。它利用预测技术让您更容易按对键。因此，几周之内，您就能掌握键盘的窍门。您还可以使用苹果的
    iPad Smart Cover（在第 1 章中提到过）为 iPad 打字提供更好的角度。保护套折叠成一个三角形，形成一个楔形，将 iPad 倾斜到一个舒适的角度，这样您就可以边打字边看着键盘上方的屏幕。保护套的角度有助于避免触摸打字员在
    iPad 屏幕键盘上常犯的错误，即将手掌和手指放在屏幕上。


    以下是使 iPad 键盘工作的一些关键技术：


    **Dictionary**：iPad 内置了一个字典，会在您打字时学习常用词汇（参见图 4–25）。它还会从您的通讯录中获取姓名和拼写。这意味着随着数据的积累，它猜中您意图的能力会越来越强。


    ![images](images/0425.jpg)


    **Figure 4–25.** *An example of the iPad learning words and names from your contacts*


    **Automatic correction**：当您打字时，iPad 会查找与您正在输入的内容相似的单词并进行猜测，并将猜测结果显示在您正输入的单词下方（参见图
    4–26）。要接受建议，只需轻点空格键，完整的单词就会被插入。


    ![images](images/0426.jpg)


    **Figure 4–26.** *An example of the iPad’s autocorrection features*


    **Spell check**：如果您确实拼错了一个单词，或者 iPad 无法识别它，您会看到该单词下方出现一条红线。当您轻点该单词时，其上方会显示一个或多个替代拼写（参见图
    4–27）。只需轻点正确的单词，它就会自动插入到文本中。


    ![images](images/0427.jpg)


    **Figure 4–27.** *An example of the iPad’s spell-check feature*


    **Predictive mapping**：iPad 利用其字典来预测您即将输入哪个单词。然后，它会重新调整键盘的响应区域，使您更容易按对字母。可能性高的字母会获得更大的点击区域；可能性低的字母则会获得较小的点击区域。'
  raw: '### iPad Settings


    The iPad has myriad settings allowing you to customize how your iPad works and
    looks. You can find all of these settings in the Settings app on your iPad Home
    screen ([Figure 4–21](#Chapter04.html#fig_4_21)).


    ![images](images/0421.jpg)


    **Figure 4–21.** *The Settings app icon*


    Tap the Settings app, and on the left side of the screen, you’ll see a list of
    settings for the iPad and any Apple iPad apps that shipped with the iPad (see
    [Figure 4–22](#Chapter04.html#fig_4_22)). Below those, you’ll see an Apps heading.
    Any apps you’ve downloaded from the iTunes Store will appear here if they have
    customizable settings. To select an app’s setting, tap the name of the app.


    ![images](images/0422.jpg)


    **Figure 4–22.** *The general settings selections*


    Although we’ll go into greater depth about Apple’s built-in app’s individual settings
    throughout the book, for now let’s get acquainted with the iPad’s General settings.


    *   *About*: This shows you how many songs, videos, photos, and applications you
    have on your iPad. It also shows you your iPad’s total storage capacity and how
    much you have left. Your iPad’s OS version number, model, and serial numbers can
    be found here, along with your Wi-Fi and Bluetooth IDs. At the very bottom, you’ll
    see links to Apple’s legal and regulatory documentation.

    *   *Sounds*: This area gives you a slider to adjust the volume on your iPad and
    set your ringtone. It also enables you to turn on or off sounds for e-mail, calendar
    alerts, lock sounds, and keyboard clicks.

    *   *Network*: This displays your network settings. See [Chapter 3](#Chapter03.html#ch3)
    for details.

    *   *Bluetooth*: This allows you to turn the iPad’s Bluetooth signal on or off.
    If you aren’t using any Bluetooth devices with your iPad, keep Bluetooth turned
    off. It’ll save you battery life.

    *   *Spotlight Search*: The settings for iPad’s Spotlight search features.

    *   *Auto-Lock and Passcode Lock*: As we talked about earlier, this is where you
    configure your lock settings.

    *   *Restrictions*: If you share your iPad among your family or buy one for your
    children, you may want to limit what they can do on it. The Restrictions settings
    will let you limit access to Safari, YouTube, and the iTunes Store app. In addition,
    you can restrict users from installing new apps and using location services. You
    can also choose what content you want allowed on the iPad. Settings include restricting
    In-App purchases and limiting access to movies, music, TV shows, and apps that
    surpass your chosen ratings.

    *   *Use Side Switch To*: Set the function of the iPad’s physical side switch.
    Choose from between making it a rotation lock witch or a mute switch.

    *   *Date & Time*: This allows you to select a 24–hour clock as well as set your
    time zone and set the date and time manually.

    *   *Keyboard*: This is where you control all your keyboard settings. We’ll go
    through them in the next section.

    *   *International*: Use this settings pane to select your preferred language
    and region formatting for addresses and phone numbers.

    *   *Accessibility*: This is where the settings for the sight and hearing impaired
    are. We’ll go into these in detail later in the chapter.

    *   *Battery Percentage*: Choose whether to display the percentage of battery
    power you have left next to the icon of the battery in the status bar.

    *   *Reset*: Reset All Settings lets you set your iPad’s settings to factory default.
    Erase All Content and Settings works like Reset All Settings but also erases all
    your personal data. This section also allows you to reset your network, keyboard,
    Home screen layout, and location settings to the iPad’s factory defaults.


    ### The Keyboard


    Like the touch keyboard on your iPhone? You haven’t seen anything yet. Using the
    iPad’s keyboard for the first time is nothing short of an epiphany when you realize
    what a large-screen, Multi-Touch device is capable of.


    The keyboard, shown in [Figure 4–23](#Chapter04.html#fig_4_23), will display automatically
    when you are in any app that needs to have text input. It is important to note
    that the software keyboard will not display if the iPad is paired to an external
    Bluetooth keyboard. (Refer to [Chapter 3](#Chapter03.html#ch3) for Bluetooth pairing.)


    ![images](images/0423.jpg)


    **Figure 4–23.** *The iPad’s Multi-Touch keyboard*


    For this section, we’ll look at using the onscreen keyboard in Apple’s Notes app
    that comes on every iPad.


    Open Notes, and click the + button in the upper-right corner to create a new note.
    At the bottom of your iPad’s screen, you’ll see the keyboard automatically appear
    (see [Figure 4–24](#Chapter04.html#fig_4_24)).


    ![images](images/0424.jpg)


    **Figure 4–24.** *The keyboard appears at the bottom of the iPad’s screen.*


    **NOTE:** Using the keyboard in portrait orientation gives you a smaller keyboard,
    but more space to see what you’re typing onscreen. If you switch to landscape
    orientation, you’ll have a larger keyboard but less space to see what you’ve typed.
    Play around to see what works best for you.


    Though Apple has outdone itself in designing the iPad’s keyboard, many people
    still think it’s the hardest thing to get used to on their new iPad. Making the
    switch to a touch screen keyboard can be difficult, but it does get much better
    over a relatively short amount of time. The keyboard gets easier to use the more
    you use it, not just because you get used to it, but because it has a secret.


    The secret is that the keyboard, shown in [Figure 4–23](#Chapter04.html#fig_4_23),
    is smart—so smart that it corrects for a lot of typos and misaligned fingers.
    It automatically capitalizes the start of sentences. It suggests corrections for
    misspelled words. It uses predictive technology to make it easier to hit the right
    keys. So, within a few weeks, you’ll master the keyboard’s quirks. You can also
    use Apple’s iPad Smart Cover (mentioned in [Chapter 1](#Chapter01.html#ch1)) to
    give the iPad a better angle for typing. A cover folds back into a triangle and
    forms a wedge that tilts the iPad at a comfortable angle so you can type and look
    at the screen above the keyboard at the same time. The angle of the case makes
    it easier to avoid mistakes touch-typists make on the iPad’s onscreen keyboard,
    namely, resting palms and fingers on the screen.


    Here are some of the key technologies that make the iPad keyboard work:


    *Dictionary*: The iPad has a built-in dictionary that learns frequently used words
    as you type (see [Figure 4–25](#Chapter04.html#fig_4_25)). It also picks up names
    and spellings from your address book. This means it gets better at guessing your
    intentions as it builds its data.


    ![images](images/0425.jpg)


    **Figure 4–25.** *An example of the iPad learning words and names from your contacts*


    *Automatic correction*: As you type, the iPad looks for words similar to what
    you’re typing and guesses them, placing the guess just below the word you’re typing
    (see [Figure 4–26](#Chapter04.html#fig_4_26)). To accept the suggestion, just
    tap the spacebar, and the full word is inserted.


    ![images](images/0426.jpg)


    **Figure 4–26.** *An example of the iPad’s autocorrection features*


    *Spell check*: If you do spell a word wrong or the iPad doesn’t recognize it,
    you’ll see a red line appear below the word. When you tap the word, one or more
    alternate spellings will appear above it (see [Figure 4–27](#Chapter04.html#fig_4_27)).
    Simply tap the right word, and it inserts itself into the text.


    ![images](images/0427.jpg)


    **Figure 4–27.** *An example of the iPad’s spell-check feature*


    *Predictive mapping*: The iPad uses its dictionary to predict which word you’re
    about to type. It then readjusts the keyboard response zones to make it easier
    for you to hit the right letters. Likely letters get bigger tap zones; unlikely
    letters get smaller ones.'
  trans: '

    ### iPad 设置


    iPad 提供了多种设置，允许您自定义 iPad 的工作方式和外观。您可以在 iPad 主屏幕上的“设置”应用中找到所有设置（如图 4–21 所示）。


    ![images](img/0421.jpg)


    **图 4–21.** *“设置”应用图标*


    轻点“设置”应用，在屏幕左侧会看到 iPad 以及随 iPad 自带的所有苹果 iPad 应用的设置列表（参见图 4–22）。在这些设置下方，您会看到一个“应用”标题。您从
    iTunes Store 下载的任何应用，如果具有可自定义的设置，都会出现在此处。若要选择某个应用的设置，请轻点该应用的名称。


    ![images](img/0422.jpg)


    **图 4–22.** *通用设置选项*


    虽然我们会在本书中更深入地介绍苹果内置应用的各项设置，但首先让我们来熟悉一下 iPad 的“通用”设置。


    *   **关于本机**：此处显示您的 iPad 上有多少歌曲、视频、照片和应用程序。它还会显示您的 iPad 总存储容量以及剩余容量。您可以在此找到 iPad
    的 OS 版本号、型号和序列号，以及您的 Wi-Fi 和蓝牙 ID。在最底部，您会看到指向苹果法律和监管文档的链接。

    *   **声音**：此区域提供一个滑块用于调整 iPad 的音量和设置铃声。它还允许您打开或关闭电子邮件、日历提醒、锁定声和键盘点击音。

    *   **网络**：此选项显示您的网络设置。详情请参见第 3 章。

    *   **蓝牙**：此选项允许您打开或关闭 iPad 的蓝牙信号。如果您没有在 iPad 上使用任何蓝牙设备，请保持蓝牙关闭。这样可以节省电池电量。

    *   **聚焦搜索**：iPad 的聚焦搜索功能的设置。

    *   **自动锁定与密码锁定**：正如我们之前所讨论的，您可以在此处配置锁定设置。

    *   **访问限制**：如果您与家人共用一台 iPad，或为孩子购买了一台，您可能希望限制他们在 iPad 上的操作。限制设置允许您限制对 Safari、YouTube
    和 iTunes Store 应用的访问。此外，您可以限制用户安装新应用和使用定位服务。您还可以选择允许在 iPad 上显示的内容。设置包括限制应用内购买，以及限制访问超过您所选评级的电影、音乐、电视节目和应用。

    *   **将侧边开关用于**：设置 iPad 物理侧边开关的功能。可以选择将其设为旋转锁定开关或静音开关。

    *   **日期与时间**：此选项允许您选择 24 小时制时钟，以及设置时区和手动设置日期与时间。

    *   **键盘**：您可以在此处控制所有键盘设置。我们将在下一节中逐一介绍。

    *   **国际**：使用此设置面板选择您偏好的语言以及地址和电话号码的区域格式。

    *   **辅助功能**：此处包含针对视障和听障人士的设置。我们将在本章后面详细讨论。

    *   **电池百分比**：选择是否在状态栏的电池图标旁显示剩余电池电量的百分比。

    *   **还原**：“还原所有设置”可将您的 iPad 设置恢复为出厂默认值。“抹掉所有内容和设置”的作用与“还原所有设置”类似，但还会抹掉您的所有个人数据。此部分还允许您将网络、键盘、主屏幕布局和定位设置重置为
    iPad 的出厂默认值。


    ### 键盘


    喜欢您 iPhone 上的触摸键盘吗？但您还没见过真正的厉害之处。当您意识到大屏幕多点触控设备的潜力时，首次使用 iPad 键盘简直是一种顿悟。


    如图 4–23 所示的键盘，当您处于任何需要文本输入的应用中时会自动显示。需要注意的是，如果 iPad 已与外部蓝牙键盘配对，则软件键盘不会显示。（请参阅第
    3 章了解蓝牙配对详情。）


    ![images](img/0423.jpg)


    **图 4–23.** *iPad 的多点触控键盘*


    在本节中，我们将介绍如何在每台 iPad 都自带的苹果“备忘录”应用中使用屏幕键盘。


    打开“备忘录”，点击右上角的`+`按钮以创建新笔记。在 iPad 屏幕底部，您会看到键盘自动出现（参见图 4–24）。


    ![images](img/0424.jpg)


    **图 4–24.** *键盘出现在 iPad 屏幕底部。*


    **注：** 在竖屏方向使用键盘时，键盘会较小，但屏幕上能看到更多输入内容。如果切换到横屏方向，键盘会更大，但能看到已输入内容的屏幕空间会减少。您可以试一下，看看哪种方式最适合您。


    尽管苹果在设计 iPad 键盘方面已竭尽全力，但许多人仍然认为这是他们新 iPad 上最难适应的地方。转向触摸屏键盘可能很困难，但在相对较短的时间内，情况会大为改观。键盘使用得越多，就越容易使用，这不仅是因为您习惯了，更因为它有一个秘密。


    这个秘密就是，如图 4–23 所示的键盘非常智能——智能到可以纠正许多打字错误和手指错位。它会自动将句首字母大写。它会为拼写错误的单词建议更正。它利用预测技术让您更容易按对键。因此，几周之内，您就能掌握键盘的窍门。您还可以使用苹果的
    iPad Smart Cover（在第 1 章中提到过）为 iPad 打字提供更好的角度。保护套折叠成一个三角形，形成一个楔形，将 iPad 倾斜到一个舒适的角度，这样您就可以边打字边看着键盘上方的屏幕。保护套的角度有助于避免触摸打字员在
    iPad 屏幕键盘上常犯的错误，即将手掌和手指放在屏幕上。


    以下是使 iPad 键盘工作的一些关键技术：


    **词典**：iPad 内置了一个词典，会在您打字时学习常用词汇（参见图 4–25）。它还会从您的通讯录中获取姓名和拼写。这意味着随着数据的积累，它猜中您意图的能力会越来越强。


    ![images](img/0425.jpg)


    **图 4–25.** *iPad 从您的通讯录中学习单词和姓名的示例*


    **自动纠正**：当您打字时，iPad 会查找与您正在输入的内容相似的单词并进行猜测，并将猜测结果显示在您正输入的单词下方（参见图 4–26）。要接受建议，只需轻点空格键，完整的单词就会被插入。


    ![images](img/0426.jpg)


    **图 4–26.** *iPad 自动纠正功能的示例*


    **拼写检查**：如果您确实拼错了一个单词，或者 iPad 无法识别它，您会看到该单词下方出现一条红线。当您轻点该单词时，其上方会显示一个或多个替代拼写（参见图
    4–27）。只需轻点正确的单词，它就会自动插入到文本中。


    ![images](img/0427.jpg)


    **图 4–27.** *iPad 拼写检查功能的示例*


    **预测映射**：iPad 利用其词典来预测您即将输入哪个单词。然后，它会重新调整键盘的响应区域，使您更容易按对字母。可能性高的字母会获得更大的点击区域；可能性低的字母则会获得较小的点击区域。

