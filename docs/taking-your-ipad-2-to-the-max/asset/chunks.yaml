    # 引言


    哦，我们已经走了这么远。


    随着我们步入 21 世纪的第二个十年，过去 30 年的计算机正日益显露出不仅仅是陈旧，甚至堪称古老的痕迹。20 世纪 80 和 90 年代笨重的 CRT 显示器已被
    21 世纪薄如铅笔的显示屏所取代。PC 那笨重厚实的米色机箱已缩小到一本厚平装书的大小，例如苹果的`Mac Mini`，或者甚至被整合到显示器本身之中，就像苹果的`iMac`一样。PC
    的缩小化同时也伴随着计算机性能数千倍的提升——这种进步丝毫没有减弱的迹象。但是，尽管微型化和处理能力的爆炸式增长是令人赞叹的技术成就，iPad 却标志着一个全新时代的开始——触控计算机的时代。


    当你手持 iPad 2 时，你便掌握了未来。它的手势控制打破了计算机的数字/物理屏障。借助 iPad 2，你可以触摸你的电影、电子邮件和数码照片；你可以在不增加包重的情况下携带一万本书；你只需手指轻轻一扫，就能翻阅书页。就连长期被局限于僵化桌面环境的网络，也变成了你茶几上的杂志，只不过拥有无限的页面。


    当第一代 iPad 最初问世时，有人说它不过是一个大号的 iPhone。的确，iPhone 向世界介绍了多点触控界面，而且两款设备都使用了名为`iOS`的相同操作系统。然而，正如你即将看到的，它们之间有许多细微和相当多的重大差异。使用
    iPad 时，你的视线会立刻被它的大屏幕所包围；无论是在腿上玩游戏、浏览地图还是观看视频，都无需眯着眼睛。它的全尺寸键盘让你能够使用不逊于传统旧式计算机上的应用程序，舒心地创建文档、电子表格和演示文稿。不，iPad
    并非放大了的 iPhone；它是个人电脑的进化。iPad 2 进一步定义了计算机的未来，使该设备不仅用于媒体消费，更用于媒体创作。苹果增加了前置和后置摄像头，用于
    FaceTime 视频聊天和高清视频录制。现在，你不仅可以听音乐，还可以使用可选的`GarageBand`软件创作自己的音乐。甚至直接在触摸屏上进行视频编辑，现在也因苹果的`iMovie
    for iPad`而成为现实。


    《充分发挥你的 iPad 2》将向你介绍 iPad 2。从帮助你选择最适合你的 iPad 开始，我们引导你完成购买决策和首次设置。你将学会基于手势的多点触控词汇，这些词汇使你能够操控
    iPad 及其数以万计的应用程序。我们将向你展示如何连接互联网、浏览网页、触摸你的音乐和视频，以及从 App Store 查找和下载应用。你将发现如何使用苹果革命性的`iBooks`应用购买和浏览书籍，观看幻灯片和照片，发送电子邮件，创建笔记和日历，甚至将你的
    iPad 变成指南针。你还将发现，iPad 不仅仅是一种新的休闲设备；它是一个强大的办公工具，而且对许多人来说，确实可以成为传统计算机的可行替代品。我们引导你创建丰富的文档、电子表格和演示文稿。我们还向你展示如何使用前置和后置摄像头与朋友和家人进行视频会议，甚至录制你自己的电影。最后，我们向你展示一些我们最喜欢的第三方应用，以及我们将
    iPad 用作艺术家画布、教学工具甚至厨房帮手的方法。


    本书是为任何拥有 iPad 2 或正考虑购买一台（你不会后悔的！）的人而写。无论你是 Mac 还是 Windows 用户，或者实际上从未使用过电脑，这都不重要。本书的全面覆盖和逐步讨论使所有
    iPad 2 用户都能了解他们的设备，并掌握充分发挥其性能所需的技能和知识。如果你拥有原始 iPad 并刚刚升级到 iPad 2，这本书对你仍然大有裨益。iPad
    2 引入了许多我们将在本书中详尽介绍的新硬件和软件功能。


    如何阅读本书由你自己决定。如果你对 iPad（或一般电脑）完全陌生，我们建议你从头到尾通读本书，但如果对你来说跳着章节读效果更好，也完全可以。最重要的是，在学习
    iPad 所能做的一切时，要享受其中的乐趣。这是计算的未来，非常带劲。感谢你让我们为你展示这一切。


    ## 第 1 章


    ### 将你的 iPad 带回家


    购买你的第一台 iPad 应该是一次有趣且令人兴奋的经历。与购买一台功能齐全的台式机或笔记本电脑相比，需要你抉择的选项并不多，不会让事情变得复杂。iPad
    的价格标签并不像苹果的`MacBook Pro`那样令人望而却步，所以即使你没有做出完美的选择，对你的钱包也不会造成太大冲击。在本章中，你将了解在前往当地苹果零售店或在线订购
    iPad 之前，应做出哪些决定。你将了解除了 iPad 之外还需要什么，如果你对购买不满意或拿到有问题的设备该怎么做，以及如何让你的 iPad 准备好日常使用。以下是选择、购买和设置
    iPad 所需的所有基本知识。


    #### 挑选你的 iPad


    尤其是在 iPad 生命周期的这个早期阶段，关于购买哪种型号的设备，你有一个相对容易的决定。在任何特定时间，可用的 iPad 型号从来不会太多，因为苹果在保持其产品线精简且与时俱进方面做得很好。你需要问自己的主要问题是：你是否需要
    3G 无线功能，你的 3G iPad 应该运行在 GSM 还是 CDMA 网络上，你想要多大的存储空间，以及是否要购买二手 iPad。让我们更详细地探讨这四个问题。

    '
- fmt: '## Wi-Fi or Wi-Fi + 3G?


    The iPad is an Internet-connected device. Sure, it can work as an electronic book
    reader or a gaming device without an Internet connection, but an iPad without
    Internet is like a Porsche with a flat tire. Apple gives you two choices: Wi-Fi
    (wireless network connectivity) models and Wi-Fi + 3G (wireless network plus 3G
    mobile data connectivity) models. If you ever want an Internet connection away
    from a Wi-Fi hotspot, you’ll need to buy the Wi-Fi + 3G version of the iPad, because
    you cannot add the functionality to an iPad later.


    The Wi-Fi + 3G models are slightly more expensive than the models with Wi-Fi only,
    to the tune of US$130 more than their Wi-Fi counterparts. What you’re paying for
    is built-in 3G circuitry, a Global Positioning System (GPS) receiver, and an antenna,
    which is a fancy way of saying that your iPad (with an optional subscription to
    a data plan with your local wireless carrier) can surf the Web, send and receive
    e-mail, and connect to the iBookstore from any location with 3G wireless service.
    Do you need 3G capabilities? Here are some questions you need to ask yourself:


    - **Will you be using your iPad in places where there are no Wi-Fi hotspots?**
    If you plan on using your iPad around your Wi-Fi equipped home and office and
    if most of the locations that you visit (stores, libraries, coffee shops, airports,
    and hotels) provide free Wi-Fi, then you might not need the Wi-Fi + 3G model.
    However, if you often find yourself in need of an Internet connection when you’re
    in your car, on a soccer field, or at some other location without Wi-Fi, then
    the Wi-Fi + 3G iPad may be the correct choice for you.

    - **Do you have another way to connect to a 3G network?** You may already have
    a different method of accessing a wide-area wireless network. If you have a 3G
    router such as the Sierra Wireless Overdrive 3G/4G or Novatel MiFi for use with
    a laptop, then you can use it and your existing wireless data plan to connect
    to the Internet. If you have an iPhone 4 running iOS 4.3 or later, you might wish
    to consider using the Personal Hotspot feature on the phone as your gateway to
    the Internet (a separate data plan is required).

    - **Are you willing to pay extra for both your iPad and the 3G data plan?** To
    begin with, a Wi-Fi + 3G iPad costs $130 more than the corresponding model without
    3G. That’s not the only additional cost you’ll incur, since your wireless carrier
    is going to charge you for a data plan. In the United States, AT&T provides 3G
    data service without a contract for $14.99 per month for 250MB of data, or $25
    monthly for 2GB of data. The other U.S. carrier, Verizon Wireless, has rates beginning
    at 1GB of data for $20 per month and up to 10GB for $80 per month. International
    carriers offer similar plans, so check with your carrier for details about the
    cost and capacity of data plans in your country.

    - **Do you need to use apps that are aware of the location of the iPad?** The
    Wi-Fi iPad has the ability to determine its location through something called
    the Wi-Fi Positioning System. This service, provided in North America by Skyhook
    Wireless, uses the known location of Wi-Fi access points to approximate the location
    of an iPad. Although this can provide location data to within 20 to 30 meters
    in crowded population centers in the United States and Canada, it doesn’t work
    at all when the iPad is away from Wi-Fi. The Wi-Fi + 3G iPad contains a full Assisted
    GPS (A-GPS) receiver for pinpointing the location of the device using GPS. As
    a result, accurate location can be determined almost anywhere on the planet provided
    that the Wi-Fi + 3G iPad can “see” the sky.


    ## GSM vs. CDMA


    If you decide to purchase the Wi-Fi + 3G iPad, you’ll also have to make a decision
    about what mobile wireless network to run on. In the United States, there are
    two choices: GSM, the standard used by AT&T Wireless, and CDMA, which is the technology
    behind Verizon’s mobile network. The majority of wireless networks throughout
    the world use GSM, so frequent international travelers may wish to consider that
    fact when making a purchase decision.


    For all practical purposes, the speeds and capabilities of the two 3G networks
    are similar. The main differentiator for most U.S. iPad buyers is the coverage
    provided by the two carriers in the area where you live and work. Verizon Wireless
    customers who are happy with the voice signal quality that they currently get
    with their mobile phones can stay with their existing carrier for iPad data. Likewise,
    AT&T Wireless customers with five bars of signal strength and good service may
    wish to stay with their current carrier.'
