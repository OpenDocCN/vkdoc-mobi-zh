- fmt: '### Unboxing Your iPad


    Once you arrive home with your iPad or it is delivered to your door, it’s time
    to unpack it and set it up. iPad packaging (see [Figure 1–2](#Chapter01.html#fig_1_2))
    is a small work of art. The iPad ships in a box that contains the device, a `Dock
    Connector` to `USB Cable`, a 10-watt `USB power adapter`, and a packet of documentation.
    Each of these items is important and will help you in your day-to-day use.


    - **Cable**: The `USB cable` attaches your iPad to either your computer or the
    `AC adapter`. Whether you’re charging your iPad for another day of use or you
    are syncing with your computer to get the latest software update, the `Dock Connector`
    to `USB Cable` is a crucial part of your iPad kit.

    - **USB power adapter**: The `AC power adapter` included with your iPad plugs
    directly into the wall and allows you to charge your iPad (or any USB device,
    for that matter). It offers a single USB port. To use it, just connect your iPad
    to the adapter using the `USB cable`. It supplies the 5 volts required for powering
    USB devices.


    ![images](images/0102.jpg)


    **Figure 1–2.** *There’s not much inside the iPad box: the iPad, a Dock Connector
    to USB Cable, a 10-watt AC adapter, and some simple documentation.*


    ### iPad Feature Overview


    Once you’ve unpacked your iPad, take a few minutes to discover more about your
    new purchase. [Figure 1–3](#Chapter01.html#fig_1_3) introduces the basic features
    on your iPad.


    The top of the iPad houses a jack into which you can plug your earbuds, a built-in
    microphone (on the top front of the iPad 2), and a `Sleep/Wake` button that is
    used to power on and off certain features. If you purchased a Wi-Fi + 3G model,
    the top (or left side on the iPad 2) will also house a micro–Subscriber Identity
    Module (SIM) tray where your phone’s micro-SIM card is stored. The bottom of your
    iPad has a built-in speaker and an indented slot for connecting to the `Dock Connector`
    to `USB Cable` or a dock. The iPad’s front has a large touch screen and a single
    `Home` button. You will not see this interactive screen until you have set up
    your iPad through `iTunes`.


    Newer iPads also feature two cameras, one in the front for playing with `Photo
    Booth` or making `FaceTime` video calls (see [Chapter 15](#Chapter15.html#ch15)),
    and one in the back that can record high-definition video and take still photos.


    On the right side of the iPad (as you look at it from the front), you’ll find
    a volume rocker and an orientation lock slider.


    ![images](images/0103.jpg)


    **Figure 1–3.** *Feature breakdown displaying the buttons and ports on the iPad
    2. The dock connector port is on the bottom of the iPad near the Home button.*


    ### Preparing for Setup


    You have unpacked your iPad but haven’t yet connected it to `iTunes`. Now is a
    good time to review the data on your computer. When your iPad is first set up,
    it will synchronize itself to `iTunes` and, depending on your computer, to your
    e-mail accounts, your calendars, and so forth. Before you go forward, here are
    some items you may want to review and clean up so your iPad starts out its life
    with the freshest possible data:


    - **Contacts**: The iPad can sync with `Outlook` 2003 or 2007 and `Windows Address
    Book` on Windows, `Address Book`, `Outlook`, or `Entourage` on a Mac, and `Yahoo!
    Address Book` or `Google Contacts` on the Internet. To prepare for your first
    sync, review your existing contacts, and make sure they’re up-to-date with current
    phone numbers and e-mail addresses. If you use another program to manage contacts,
    consider migrating your contacts to one of these solutions. If you’d rather not,
    that’s OK too. You can add contact information directly to your iPad, although
    it’s not as convenient as having the information automatically loaded for you.

    - **Calendar**: Your iPad can synchronize with computer-based calendars just like
    it does with contacts. The iPad supports `iCal`, `Outlook`, and `Entourage` calendars
    on the Mac and `Outlook` calendars on Windows. Get your calendars into shape before
    your first synchronization, and you’ll be ready to immediately manage your schedule
    both from your computer and from your iPad.

    - **E-mail**: Your iPad works with most e-mail providers, including `Yahoo! Mail`,
    `Google Gmail`, and `AOL`. If your e-mail provider uses the industry-standard
    `POP3`, `IMAP`, or `Exchange` services, your service will work with iPad. You
    may want to establish new accounts with these providers before you set up your
    iPad. That way, they’ll load onto your unit the first time you synchronize. You
    can always add new e-mail accounts later, but it’s nice to have them all set up
    and available for use right away.

    - **Media**: Some iPad models offer relatively small storage space when compared
    to, for example, `iPod Classic`’s generous 160GB hard drive. To make the most
    of this limited space, set up playlists for your favorite songs, TV shows, movies,
    and podcasts. Since, in all likelihood, you won’t be able to synchronize your
    entire library to your new iPad, invest time now in weeding through your media
    to find those items you most want to have on hand.

    - **Software and OS**: Update to `iTunes` 10.2 or newer before you attempt to
    set up your iPad. If you’re using a Mac, make sure you’ve updated your OS to at
    least `OS X` 10.5.8. Windows computers must be running `Windows 7`, `Windows Vista`,
    or `Windows XP Home` or `Professional` with `Service Pack 3` or newer. You can
    download the latest version of `iTunes` from Apple at [`www.itunes.com/download`](http://www.itunes.com/download).

    - **iTunes account**: Apple requires a current `iTunes` account in order to set
    up your iPad. If you do not already have one, you must sign up for an account
    with the `iTunes Store`. If you want to make purchases through the `iTunes Store`,
    `App Store`, or `iBookstore`, you’ll need to have a valid address and credit card.
    Here are the steps you’ll need to follow in order to create that new `iTunes`
    account:


    1. Launch the `iTunes` application on your computer, and wait for it to load.

    2. Locate `iTunes Store` in the column on the left side of the window. Click `iTunes
    Store`, and wait for the store window to load. You must be connected to the Internet
    for this to happen, because all the storefront information is stored at Apple.

    3. Click the `Sign In` link at the top-right corner of the screen. `iTunes` opens
    the sign-in screen shown in [Figure 1–4](#Chapter01.html#fig_1_4), which will
    allow you either to sign in with an existing account or to create a new one.


    ![images](images/0104.jpg)


    **Figure 1–4.** *The iTunes sign-in screen allows you to sign in to iTunes with
    your existing account or begin the process of creating a new account.*'
