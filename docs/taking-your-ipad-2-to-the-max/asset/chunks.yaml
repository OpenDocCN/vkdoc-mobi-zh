  trans: "\n#### “图书”标签页\n\niPad 的一大特色是能够通过新的 iBooks 应用购买和阅读电子书。你将在第 8 章和第 9 章中分别深入了解\
    \ iBookstore 和 iBooks 应用；目前你只需知道，iPad“设置”面板中的“图书”标签页是控制哪些图书同步到 iPad 的地方（参见图 2–24）。\n\
    \n请确保顶部的 `Sync Books`（同步图书）复选框已选中。在其下方的框中，你会看到两个单选按钮。`All books`（所有图书）会同步你 iTunes\
    \ 资料库中的每一本书。`Selected books`（所选图书）则允许你只同步在页面下方“图书”框中选择的图书。\n\n![images](img/0224.jpg)\n\
    \n**图 2–24.** *“图书”标签页允许你选择要同步到 iPad 的图书。*\n\n**注：** 即使你的 iTunes 资料库中有 300 本书，你也可以全部同步。电子书几乎不占用任何空间。事实上，*《战争与和平》*——现存最大的书籍之一（也是最伟大的书籍之一），仅占用\
    \ 1.2MB 的磁盘空间。这比一个 128Kbps 的 AAC 音频文件还要少 50%以上。当然，插图版书籍会占用更多空间，但即便如此，它们占用的空间也不应超过几首\
    \ MP3 音乐。另外，也无需担心资料库混乱。你将在第 9 章中学习如何整理图书。\n\n在“图书”框下方，你会看到一个 `Sync Audiobooks`（同步有声书）复选框（参见图\
    \ 2–24）。同样，这里有两个选项：`All audiobooks`（所有有声书）或 `Selected audiobooks`（所选有声书）。\n\n\
    选择 `All audiobooks`（所有有声书）后，iTunes 资料库中的所有有声书都会同步到你的 iPad。如果选择 `Selected audiobooks`（所选有声书），则会显示与其他媒体标签页相似的熟悉布局，这次是“有声书”和“章节”框。在“有声书”框中，你可以手动选择要同步的有声书。部分有声书包含独立的文件，即标定章节的*片段*。在“章节”框中，你可以针对任何有声书只选择要同步的片段。\n\
    \n**注：** 与电子书不同，有声书可能相当大，因为它们本质上是很长的音频文件。如果你有数十本有声书，可能只需要传输其中少数几本以节省空间。\n\n####\
    \ “照片”标签页\n\n在 iPad 上查看照片可能是你购买它的原因中排名较低的一项，但你不应低估它。这种体验比在桌面上看照片要好得多。没有什么能比得上亲手拿着你的数码照片，在\
    \ iPad 华丽的显示屏上滑动浏览的体验。（第 13 章将深入介绍照片处理。）\n\n使用“照片”标签页将照片传输到 iPad。确保顶部的 `Sync Photos\
    \ from`（从以下位置同步照片）复选框已选中（参见图 2–25）；然后使用右侧的下拉列表选择要同步照片的来源。在 Mac 上，你的选项包括 iPhoto\
    \ 4.0.3 或更新版本、Aperture 3.0.2 或更新版本，或者电脑上的任意文件夹。在 Windows 机器上，你的选项包括 Adobe Photoshop\
    \ Elements 3.0 或更新版本，或者电脑上的任意文件夹。\n\n![images](img/0225.jpg)\n\n**图 2–25.** *“照片”标签页允许你选择要同步到\
    \ iPad 的照片。*\n\n在复选框下方的框中，你有三个选项：\n\n*   *所有照片、相簿、事件和面孔*：选择此选项可将所选照片应用或文件夹中的所有照片同步到\
    \ iPad。再次提醒，如果你的照片集和我们的一样庞大（我们其中一人的 Mac 上约有 80GB 的旅行照片），我们建议不要这样做。如果你只有几千张照片，那就全部加载吧！\n\
    \n**注：** 与新款 iPad 不同，第一代 iPad 没有内置摄像头，但你仍然可以通过相机连接套件将照片添加到你的旧款（或新款！）iPad 上。售价\
    \ 29 美元的套件（可在[`www.store.apple.com`](http://www.store.apple.com)购买）包含两个适配器——一个用于通过\
    \ USB 2.0 数据线连接相机，另一个用于读取 SD 记忆卡。\n\n*   *所选相簿、事件和面孔，并自动包含……*：选择此选项后，页面下方会显示“相簿”、“事件”和“面孔”框。你可以从这些框中选择要同步的\
    \ iPhoto 相簿和事件。你还可以选择是否同步你朋友的面孔。*面孔*是 iPhoto 中的一项功能，它使用面部识别软件来创建包含特定人物的照片集。\n\n\
    \    当你选中某个相簿、事件或面孔旁的复选框时，右侧会显示该选项的照片数量。选择 `Selected albums, events, and faces,\
    \ and automatically include`（所选相簿、事件和面孔，并自动包含）选项后，你会看到一个下拉选项列表，允许你选择全部、不选或预设的特定日期范围的\
    \ iPhoto 照片，甚至智能相簿。\n\n*   *包括视频*：选中此复选框后，你用数码相机拍摄并出现在任何已选相簿中的视频文件也会传输到 iPad。请记住，视频会很快占用存储空间。\n"
- fmt: '### iTunes Device Settings


    iTunes has several preferences for the iPad. To access these, open iTunes and
    choose iTunes ![images](images/U001.jpg) Preferences from the menu bar on a Mac,
    or choose Edit ![images](images/U001.jpg) Preferences from the menu bar on a Windows
    machine. The iTunes preferences window will pop up with a series of icons running
    along the top. The only one you are interested in for the iPad is the Devices
    icon. Click the Devices icon (it looks like an iPhone), and you’ll be presented
    with the Devices settings pane, as shown in [Figure 2–26](#Chapter02.html#fig_2_26).


    ![images](images/0226.jpg)


    **Figure 2–26.** *The iTunes Devices settings pane*


    Here you’ll find settings for devices that interact with iTunes. These devices
    can include iPads, iPods, iPhones, and AirPort Express devices.


    - **Device backups**: Any time you sync your iPad, iTunes creates a backup of
    its contents. Any backup of iPods, iPhones, or iPads can be seen here. You’ll
    see the name of the device along with the date it was last backed up. Hover your
    mouse over the name of the iPad to be presented with its serial number.


    iTunes keeps multiple device backups at a time, but you can choose a backup to
    restore from by selecting a device in the source list and right-clicking (Ctrl-clicking)
    it. Choose Restore from Backup and select the backup you wish to restore from.
    iTunes places backup files in the following locations:


    - **Mac**: `~/Library/Application Support/MobileSync/Backup/`

    - **Windows XP**: `\Documents and Settings\(username)\Application Data\Apple Computer\MobileSync\Backup\`

    - **Windows Vista and Windows 7**: `\Users\(username)\AppData\Roaming\Apple Computer\MobileSync\Backup\`


    The list of information iTunes backs up is a long one:


    - Safari bookmarks, cookies, history, and currently open pages

    - Map bookmarks, recent searches, and the current location displayed in Maps

    - Application settings, preferences, and data

    - Contacts

    - Calendars

    - CalDAV and subscribed calendar accounts

    - YouTube favorites

    - Wallpapers

    - Notes

    - Mail accounts

    - Autocorrect dictionaries

    - Camera roll

    - Home screen layout and web clips

    - Network settings (saved Wi-Fi hotspots, VPN settings, network preferences)

    - Paired Bluetooth devices (which can be used only if restored to the same iPad
    that did the backup)

    - Keychain (This includes e-mail account passwords, Wi-Fi passwords, and passwords
    you enter into websites and some other applications. The keychain can be restored
    only from backup to the same iPad. If you are restoring to a new device, you will
    need to fill in these passwords again.)

    - Managed configurations/profiles

    - MobileMe and Microsoft Exchange account configurations

    - App Store application data (except the application itself, its `tmp` and `Caches`
    folders)

    - Per-app preferences allowing use of location services

    - Offline web application cache/database

    - Autofill for web pages

    - Trusted hosts that have certificates that cannot be verified

    - Websites approved to get the location of the device

    - Most (although not all) in-app purchases


    To delete an iPad backup, select the backup from the Device backups list and click
    the Delete Backup button. Confirm the deletion by clicking the Delete Backup button
    in the window that pops up.


    - **Prevent iPods, iPhones, and iPads from syncing automatically**: Select this
    box if you want to disable automatic syncing when you plug your iPad into your
    computer. To sync, you’ll need to manually click the Sync button at the bottom
    of the iPad’s iTunes settings pane.


    The only other option relevant to the iPad in the Devices settings pane is the
    “Look for iPod touch, iPhone, and iPad Remotes” check box, which is not shown
    in [Figure 2–26](#Chapter02.html#fig_2_26). Apple makes an iPhone app called `Remote`.
    This app allows you to use your iPod touch, iPhone, or iPad as a remote control
    for your home computer’s music library. In other words, you can be sitting on
    your couch and navigating your entire iTunes library on your Mac or Windows computer
    (or Apple TV) right from your iPad. All you need is the free `Remote` app, the
    iPad, and your computer to be on the same Wi-Fi network. If this box is deselected,
    your iPad will not be able to pair with your iTunes library. Clicking the `Forget
    All Remotes` button will make iTunes unpair with every iPod touch, iPhone, or
    iPad that it allowed to be used as a remote.


    #### Restoring


    If you are ever experiencing problems with your iPad, you can choose to restore
    it. iTunes offers two options of restoring your unit: restore to the factory defaults,
    or restore from a backup. The factory default method will restore your iPad to
    its original factory settings—as if you’ve just turned it on for the first time.
    Restoring from backup will restore the iPad from its last saved backup file.


    To restore to factory settings, in iTunes on your computer select the iPad from
    the Devices list, select the Summary tab, and click `Restore` (this deletes all
    the data on the iPad and restores it to the factory settings). When prompted by
    iTunes, select the option to restore your settings.


    To restore from backup, in iTunes on your computer right-click (or Ctrl-click)
    on the iPad in the Devices list, choose `Restore from Backup`, and select a backup
    to restore from. The iPad will then be restored from the backup listed in the
    Device backups list.


    **NOTE:** If you’ve set up password encryption on your iPad backups (discussed
    earlier in this chapter), you will not be able to restore from the encrypted backup
    if you forget the password. Be sure to write it down!


    ### Summary


    In this chapter, you’ve explored the options you have for syncing your media and
    data with your iPad. You’ve discovered where to get your media and how to make
    sure your iPad/iTunes sync preferences stick. To wind things up, here is a quick
    overview of some key points from this chapter:


    - The way your iPad connects with iTunes and the settings pane you are presented
    with will be familiar to you if you’ve used an iPhone or iPod touch; however,
    there are some important differences with the iPad.

    - The Capacity bar will always be visible in the iPad settings pane and is an
    easy indicator to see how much space you have left on your iPad.

    - No change you make to your iPad setting pane is complete until you click the
    Apply button. Likewise, if you accidentally make a change you don’t want, you
    can always click the Revert button.

    - It is important to manage what data you sync with your iPad. If you sync all
    your music, you might not have room left over for syncing your photos and videos.

    - Syncing apps can be fun and easy using the visual representation of your iPad
    on the Apps tab. However, sometimes app syncing can be a slow process if you have
    a lot of apps. Waiting can be a pain, but it’s best never to interrupt a sync.

    - Syncing your movies, music, TV shows, podcasts, iTunes U items, books, and photos
    is pretty straightforward, and once you’ve mastered how to sync one form of media,
    syncing the rest of the forms is easy.


    ## Chapter 3


    ## Exploring the iPad Hardware


    Now that you’ve purchased your iPad and have had a chance to sync it with iTunes,
    it’s time to get a bit more familiar with the actual hardware. In this chapter,
    we’ll talk about the various hardware controls on your iPad and how to use them.
    We’ll discuss the care and maintenance requirements of your new device, and we’ll
    explore the details of some of the more widely used Apple accessories for iPad.
    Grab that iPad, any Apple accessories you may have purchased, and perhaps a refreshing
    beverage, and let’s take a quick tour of the hardware.'
