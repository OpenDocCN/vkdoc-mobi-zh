  trans: '

    ##### 高清 vs. 标清


    许多电影都提供高清（HD；参见图 8–14）或标清下载选项。如果你是高清电视爱好者，你可能会失望地发现，你无法在 iPad 上以真正的高清画质观看视频。这到底是什么意思呢？iPad
    的`1024×768`像素显示屏并不符合常见`1080i`（宽`1920`像素，高`1080`像素）或`720p`（宽`1280`像素，高`720`像素）高清电视格式的宽高比（即屏幕宽度与高度的比值）。iPad
    显示屏也不符合许多电影所采用的精确宽高比，通常是`16:9`或`2.35:1`。


    ![images](img/0814.jpg)


    **图 8–14.** *即便在动作场景中，iPad 上的高清视频也能让你看到令人惊叹的细节。此图像显示了信箱模式（屏幕顶部和底部的黑色条纹）。*


    这并不是说你就不能在 iPad 上播放这些高清视频或电影——你可以播放，但会以信箱模式显示。这意味着视频屏幕的顶部和底部会有黑边，如图 8–14 所示。`720p`高清格式的电影也会被缩小到
    iPad 屏幕的宽度。好处是，无论是否存在信箱模式，视频和电影在 iPad 的显示屏上看起来都很棒。部分原因在于苹果采用了`H.264`压缩方案，该方案能够在不牺牲画质的情况下，将数字视频压缩到相对较小的尺寸。


    来自 iTunes 的标清电影采用的是名为`720xN 变形`的格式。文件会按比例放大以适配 iPad 屏幕的宽度，导致电影清晰度不如高清格式的电影。


    高清 iPad 电影与标清 iPad 电影的另一个主要区别在于电影文件的大小。例如，标清格式的《游客》大小为`1.37GB`，而高清格式则为`3.25GB`（参见图
    8–15）。`16GB`容量的 iPad 用户可能需要坚持选择标清电影，或每次只下载少量电影。


    ![images](img/0815.jpg)


    **图 8–15.** *《游客》的详细描述显示了购买和租赁按钮，以及选择高清或标清的按钮。描述中还显示了文件大小，如果你的 iPad 存储空间不足，这一点非常重要。*


    电影的租赁和购买价格随着清晰度从标清升级到高清而增加。购买一部高清电影通常比其标清版本贵约`5 美元`，而租赁高清电影的租金通常比标清贵约`1 美元`。


    ## 排行榜


    在 iTunes 中浏览音乐时查看排行榜会显示两个列表：热门歌曲和热门专辑。在排行榜页面向下滚动会显示热门音乐视频，供你购买欣赏。


    对于电影，排行榜会显示两列：热门电影租赁和热门电影销售。在电视节目类别中，排行榜会显示热门电视单集和热门电视季的列表。对于播客，iTunes Store 将排行榜分为热门音频播客和热门视频播客。


    在有声读物类别中，仅列出排名前 12 的有声读物；而在 iTunes U 中，“热门 iTunes U 课程集”则会显示学术领域的热门内容。


    ## Genius 功能


    当你在浏览音乐、电影或电视节目时，页面顶部还有一个按钮：Genius（参见图 8–16）。


    ![images](img/0816.jpg)


    **图 8–16.** *iTunes Genius 就像拥有一个私人导购，为你推荐音乐或电影。当然，你首先得告诉你的私人导购你喜欢什么。*


    你是否曾想过拥有一个私人顾问，它可以查看你喜欢什么音乐、看的电影或电视节目，然后建议你听听新专辑或看看新视频？这正是 iTunes 的 Genius 功能为你所做的。


    Genius 会根据你通过 iTunes 购买或从电脑传输到 iPad 的媒体，推荐你可能喜欢的其他专辑、电视节目或电影。你可以偶尔查看这些推荐并用“赞”或“踩”来表达你的看法，从而提高
    Genius 推荐的准确性。


    Genius 推荐的准确性会随着购买和租赁次数的增加而提高。基于一次电影购买和一次租赁，电影 Genius 在挑选我们可能感兴趣的喜剧片方面表现出色，但它也掺杂了一些我们永远不会看的电影。在电视方面，我们购买了《星际迷航：原初系列》的整个第一季。于是
    Genius 认为我们会喜欢《星际迷航：深空九号》，而我们实际上对此深恶痛绝。再说一次，对推荐电影投赞成或反对票是提高 Genius 推荐与你真实喜好匹配度的好方法。

    '
- fmt: '# The iBookstore


    What? You haven''t spent enough money yet? You can take care of that quickly with
    the new addition to Apple''s digital stores, the iBookstore. The iBookstore was
    available on the iPad first, and now is available on the iPhone and iPod touch
    as well.


    There''s a reason why Apple chose to debut the iBookstore on the iPad. The iPad''s
    book-sized backlit LED screen makes it perfect for reading books in just about
    any lighting condition. The battery life on the iPad is wonderful, so unless you''re
    planning on doing a marathon reading of *War and Peace*, there should be no need
    to plug in your device while you''re reading.


    To take advantage of the iBookstore, you''ll need to install the free Apple iBooks
    app onto your iPad. Probably the easiest way to do that is to tap the App Store
    icon and then type `iBooks` into the search box. The app should appear at the
    top of the list of suggestions, and tapping iBooks will display a handful of apps.
    Look for the free iBooks app, install it by tapping the Free button, and then
    tap the Install App button. Your iPad downloads the application and installs it.


    **NOTE:** Case doesn''t matter when searching in the stores. You can type a search
    word or phrase in lowercase, uppercase, or mixed-case letters, and you''ll get
    the same results.


    Once you''ve installed the iBooks app on your iPad, launch it. Unlike the App
    Store and the iTunes Store, iBooks doesn''t start in the iBookstore. Instead,
    you''ll see your book library, a beautiful wooden bookshelf with book covers artfully
    displayed (see [Figure 8–17](#Chapter08.html#fig_8_17)). At one point, Apple included
    a copy of the illustrated *Winnie-the-Pooh* by A. A. Milne with the iBooks app,
    so there may be one book on your bookshelf when you start up the app. We''ll talk
    more about iBooks in the next chapter; here we''re just concerned with the iBookstore
    and how to buy books.


    **EASTER EGG ALERT!** An Easter egg is a little treasure hidden in a computer
    program. To see an example of an Easter egg in iBooks, use your finger to drag
    down the bookshelves. You should find something very familiar hidden above the
    top row of books.


    In the upper-left corner of the bookshelf is a Store button. That button is your
    gateway to the iBookstore. Tapping it loads the iBookstore (see [Figure 8–18](#Chapter08.html#fig_8_18)),
    which looks surprisingly similar to the App and iTunes Stores. It works the same,
    too; tap the price to see a Buy Book button, and then tap that button to sign
    into iTunes, pay for the book, and download it.


    ![images](images/0817.jpg)


    **Figure 8–17.** *Your iBooks library displays your books in a familiar place—on
    a bookshelf.*


    ![images](images/0818.jpg)


    **Figure 8–18.** *Inside the iBookstore. It''s very similar to the App and iTunes
    Stores in both looks and operation.*


    Apple made the iBookstore similar to a bricks-and-mortar bookstore in that you
    can browse books. If you''re not sure about a book, check for the Get Sample button
    that downloads a sizable chunk of the text for you to read. It''s like leafing
    through a book at the bookstore.


    To return to your bookshelf, tap the Library button. The Categories button provides
    a way to narrow down your search to a certain type of book. You know how real
    bookstores have signs pointing out Mysteries and Thrillers in one area and Cookbooks
    in another? The iBookstore categories provide the same function as those signs
    (see [Figure 8–19](#Chapter08.html#fig_8_19)).


    ![images](images/0819.jpg)


    **Figure 8–19.** *Categories are like the departments found in real bookstores.
    They contain books that are similar by type of content.*


    In keeping with the general layout of the iTunes and App Stores, buttons across
    the bottom of the iBookstore include Featured, NYTimes, Top Charts, and Purchases.
    The top of the iBookstore has buttons to provide instant listings of only featured
    books or all books listed by release date. When we were writing this book, the
    iBookstore contained over 200,000 books.


    ## Featured


    As you''d expect, the Featured button displays lists of New & Noteworthy titles
    and icons that lead to collections of books about a specific topic or books that
    the iBookstore team deems must-reads, and then another list of books that changes
    regularly. As we were writing this, for instance, the list was "Bestselling Bios
    Under $10," and it featured two books that we ended up buying.


    Near the bottom of the iBookstore Featured page, you''ll find the familiar Quick
    Links box, which in this case features not only a link to your account information
    but also links to book specials (see [Figure 8–20](#Chapter08.html#fig_8_20)).
    If you''re a fan of Oprah''s Book Club, one tap of the special link in the Quick
    Links box displays a list of most of the books that have been recommended by Oprah
    Winfrey. Build Your Library displays a collection of new best-sellers and classics
    that make a good addition to any library, while Free Books generates a list of
    classic public-domain titles from authors such as Jane Austen, Henry James, Oscar
    Wilde, Charles Dickens, and William Shakespeare. They''re free downloads and make
    wonderful additions to any library. There''s frequently a link for preordering
    books that are about to be published and have already received praise, and also
    a way to be alerted when your favorite author is about to publish a new book.


    ![images](images/0820.jpg)


    **Figure 8–20.** *Fans of Oprah''s Book Club will be happy to know that there''s
    a Quick Link available to view all the books that have been chosen for the club
    over the years.*


    At the very bottom of the page you''ll find the familiar Account, Redeem, and
    Support buttons, which perform the same functions that they do in the App and
    iTunes Stores.


    ## NYTimes


    The *New York Times* Best Sellers list is considered to be *the* list of best-selling
    books in the United States. Published weekly in the *New York Times Book Review*
    magazine, the best-seller list has been published continuously since 1942.


    It''s fitting that Apple chose to pick the authority on published books to provide
    an automatically updated list of fiction and nonfiction best-sellers for the iBookstore.
    Tapping the NYTimes button at the bottom of the iBookstore brings up the lists,
    which show the top ten books in each category (see [Figure 8–21](#Chapter08.html#fig_8_21)).
    To see more of the Fiction and Nonfiction Best Seller lists, there''s a Show More
    button at the bottom of the page that will add another ten books to the list each
    time it is tapped.


    ![images](images/0821.jpg)


    **Figure 8–21.** *The New York Times Best Sellers list*


    ## Top Charts


    The Top Charts button provides a function that is very similar to the same button
    in the App Store. In other words, it displays lists of the top paid and free books.
    The Top Paid Books list is often different from the *New York Times* Best Sellers
    list, because it is compiled from the sales of books available in the iBookstore.


    The Top Free Books aren''t likely to change very often, although renewed interest
    in a classic book may move a certain title up or down the list.'
