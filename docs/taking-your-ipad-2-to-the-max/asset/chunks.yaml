- fmt: "### Other FaceTime Calling Options\n\nFaceTime gives you several advanced\
    \ options while on a call that help with its usability features:\n\n- **Change\
    \ orientation**: You can rotate your iPad into landscape mode, and the image your\
    \ caller sees will change to match. Landscape mode while FaceTime calling is useful\
    \ if you want to show your caller a wide shot of something using the rear camera,\
    \ like a beautiful sunset from your backyard.\n\n  **TIP:** To avoid unwanted\
    \ orientation changes as you move the camera around, lock your iPad in portrait\
    \ orientation by pressing the Home button twice and flicking right until you see\
    \ the portrait lock button.\n\n- **Moving picture-in-picture**: That little square\
    \ in the corner that shows you what your caller is seeing can be moved around.\
    \ Tap and hold the square and drag it to any of the four corners of the screen.\
    \ This is useful if the square is blocking something on the screen that you want\
    \ to see.\n- **Multitasking during a FaceTime call**: You can use any app on your\
    \ iPad while on a FaceTime call. To do so, while in a FaceTime call, press your\
    \ iPad's Home button once to be taken to the home screen. You can then launch\
    \ any app you want. To return to your FaceTime call, tap the glowing green \"\
    Touch to resume FaceTime\" bar at the top of the screen ([Figure 15–22](#Chapter15.html#fig_15_22)).\n\
    \n![images](images/1522.jpg)\n\n**Figure 15–22.** *You can use other apps while\
    \ on a FaceTime call. Touch the green bar at the top of the screen to return to\
    \ the FaceTime call when you're done.*\n\nThe multitasking feature is particularly\
    \ nice when you are on a FaceTime call. It allows you to check the Yelp app for\
    \ restaurants while you're making dinner plans with your FaceTime caller, for\
    \ example.\n\nWhile you are multitasking, you can still talk to your FaceTime\
    \ caller, but neither of you can see the other.\n\n### FaceTime Settings\n\nFaceTime\
    \ has several settings. You can find them in the Settings app under FaceTime ([Figure\
    \ 15–23](#Chapter15.html#fig_15_23)).\n\n![images](images/1523.jpg)\n\n**Figure\
    \ 15–23.** *FaceTime settings*\n\n- **Switch FaceTime on or off**: Tap the FaceTime\
    \ switch to ON or OFF. While off, you cannot make or receive FaceTime calls, which\
    \ means you may miss a special treat while you are busy getting work done. When\
    \ enabled, however, other people can call you, interrupting whatever you are doing.\n\
    - **Change your FaceTime geographic location**: Tap your blue Account e-mail.\
    \ From the pop-up menu, tap Change Location. Choose your location's new region\
    \ from the list of regions.\n- **View your FaceTime account settings**: Tap your\
    \ blue Account e-mail. From the pop-up menu, tap View Account. Sign in with your\
    \ Apple ID and password. The account settings screen from [Figure 15–6](#Chapter15.html#fig_15_6)\
    \ will show up onscreen. Tap any field to change your account settings, such as\
    \ your name or security question.\n- **Sign out of FaceTime**: Tap your blue Account\
    \ e-mail. From the pop-up menu, tap Sign Out. This will immediately sign you out\
    \ of FaceTime without any more warnings. To sign back in, reenter your Apple ID\
    \ password on the Sign In screen.\n- **Remove a FaceTime e-mail address**: You\
    \ can dissociate your FaceTime e-mail address by tapping it and then tapping the\
    \ Remove This E-mail button.\n- **Adding more e-mail addresses**: FaceTime allows\
    \ you to associate more than one e-mail address with your FaceTime account. This\
    \ is handy if you use several e-mails for different purposes in your life. For\
    \ example, you might have one for friends and one for work colleagues, and so\
    \ forth. When multiple e-mails are associated with your FaceTime account, people\
    \ can initiate a FaceTime video call with you using any one of them.\n\nTo add\
    \ additional e-mails, tap the Add Another Email button, and then enter your other\
    \ e-mail address. Repeat this step for each e-mail address you have. With each\
    \ e-mail added, you'll need to check that e-mail account for the FaceTime verification\
    \ e-mail from Apple and click the link in that e-mail before the e-mail address\
    \ can be added to your FaceTime account.\n\n### Summary\n\nThe front and rear\
    \ cameras add some nice features to the iPad. The HD video-recording capabilities\
    \ are amazing, but the still photography leaves something to be desired, even\
    \ if you take PhotoBooth into consideration. In addition, FaceTime is an awesome\
    \ feature, and its popularity is sure to grow as more devices become FaceTime-compatible.\
    \ Here are a few more tips for using your camera and FaceTime:\n\n- Do *not* leave\
    \ your regular digital still camera at home when going on vacation. Yes, you can\
    \ take still photos with the iPad, but it's more for social use, such as taking\
    \ quick snaps of friends or self-portraits. If you want to catch that beautiful\
    \ sunset over the ocean, do it on a point-and-shoot camera. Want to distort your\
    \ face and send it on to your pals? The iPad plus PhotoBooth is the answer.\n\
    - You can zoom in while in still camera mode using digital, but not optical, zoom\
    \ but there is no zoom option while recording video.\n- One minute of 720p video\
    \ takes up about 120MBs. Keep this in mind if you are going to be recording a\
    \ lot of video because you'll need a lot of free space on your iPad.\n- Apple\
    \ has limits size when e-mailing videos. In our tests, a video clip must be 54\
    \ seconds long or shorter in order for you to e-mail it. If it's 55 seconds or\
    \ longer, you'll be asked to trim the clip before you e-mail it.\n- When you are\
    \ taking pictures or recording video within range of a Wi-Fi network or if you\
    \ own a GPS-enabled 3G iPad, the iPad's Camera app can tag your photos and videos\
    \ with geodata. Applications such as Apple's iPhoto can then display your photos\
    \ on a map. If you are planning to make a lot of FaceTime calls at home or in\
    \ the office, you may want to invest in an iPad dock or a simple picture stand\
    \ so you don't have to keep holding your iPad at arm's length. A dock helps you\
    \ eliminate those horrible up-the-nose and double-chin points of view that happen\
    \ when we hold the iPad out.\n- Use FaceTime from the sky! If you're on a plane\
    \ that offers Wi-Fi service, you can use FaceTime to talk to your friends and\
    \ family back on the ground.\n- Don't forget to use the rear camera to show your\
    \ caller what you are looking at. You don't have to turn your iPad around to show\
    \ them!\n- FaceTime is an amazing feature for those who can't speak. The screen\
    \ resolution is big enough and crisp enough where sign language can easily be\
    \ read.\n- Watch out for bright backgrounds. If light is glaring in through the\
    \ window behind you, it's likely to cause your viewer to see you in silhouette.\
    \ To fix this, move your iPad's camera just a tiny way away from the light source,\
    \ and your face should show up just fine.\n\n## Chapter 16: Other Great Ways to\
    \ Use Your iPad\n\nThroughout this book, we've shown you how to use your iPad\
    \ to listen to your music and watch movies, write e-mails and documents, navigate\
    \ with maps, and show off your photos, but all of that (and it's a lot!) is just\
    \ the start.\n\nIn this chapter, we show you just some of the many other ways\
    \ you can use your iPad in everyday life, including as a helper in the kitchen,\
    \ as a teaching tool, as a gaming device, as an artist's canvas, and more!\n\n\
    ### The iPad as a Game Machine\n\nThe iPad is a great device when you just want\
    \ to kick back and unwind. You can listen to music, watch your favorite TV shows,\
    \ and flick through photos of your last vacation with ease. Another way to unwind\
    \ on the iPad is by playing games.\n\nWhether you're into card games, adventure\
    \ epics, or sports, there's a game for you. As a matter of fact, as of the time\
    \ of this writing, there are more than 4000 dedicated iPad games available in\
    \ the App Store, and that's not including the 90,000+ iPhone games that play on\
    \ the iPad as well.\n\nHere we spotlight just some of the types of games you can\
    \ play on the iPad."
