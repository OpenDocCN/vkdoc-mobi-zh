- fmt: "# Searching\n\nThe iPod app offers an easy-to-use search feature that lets\
    \ you find a song quickly. That's super-helpful when you have a large media library\
    \ and don't want to spend the time flicking through long lists of titles. Tap\
    \ the search field in the top-right corner of the iPod app screen. A keyboard\
    \ appears. As you type in your search keyword, a list of results automatically\
    \ begins to populate the main portion of your screen (see [Figure 7–29](#Chapter07.html#fig_7_29)).\n\
    \n![images](images/0729.jpg)\n\n**Figure 7–29.** *The iPod app's search function*\n\
    \nYou can navigate through the search results by song, artist, album, composer,\
    \ podcast, or audiobook by tapping the respective buttons above the keyboard.\
    \ As you can see in [Figure 7–29](#Chapter07.html#fig_7_29), which buttons are\
    \ active depends on which media you've loaded into your iPad's library.\n\nYou\
    \ can also scroll through the results with your finger. Doing so hides the keyboard\
    \ so you can see a longer list of results. To get the keyboard back, tap the search\
    \ field again. Tap any song to play it. Your search results list remains until\
    \ you navigate to a category or playlist in the source list or tap the `×` button\
    \ in the search field.\n\n**TIP:** You can also search for songs without opening\
    \ the iPod app. Use the iPad's Spotlight feature to the left of the Home screen\
    \ to search for a song; then tap it to begin playing.\n\n# Displaying Music Playback\
    \ Controls When in Another App\n\nWe've already mentioned how your music, podcasts,\
    \ and audiobooks will keep playing even when you leave the iPod app. The good\
    \ news is that you don't need to go back into the iPod app to change tracks. Simply\
    \ double-tap the iPad's physical Home button in quick succession to reveal the\
    \ recent apps list, and then swipe to the right to find your iPad playback controls\
    \ (see [Figure 7–30](#Chapter07.html#fig_7_30)). From this small pop-up, you'll\
    \ be able to navigate through songs, adjust the volume, or select an AirPlay destination.\
    \ To close this panel, tap anywhere on the main screen. Tap the iPod icon at the\
    \ right to move immediately into the iPod application.\n\n![images](images/0730.jpg)\n\
    \n**Figure 7–30.** *These iPad controls appear to the left of your recently used\
    \ applications. Swipe to the right to uncover this little gem.*\n\nYou can also\
    \ access these controls when your iPad is locked. Simply double-tap the iPad's\
    \ Home button, and the iPod navigation bar appears at the top of the display (see\
    \ [Figure 7–31](#Chapter07.html#fig_7_31)).\n\n![images](images/0731.jpg)\n\n\
    **Figure 7–31.** *With a simple double-tap of the iPad's home button, iPod options\
    \ appear on the iPad's lock screen. Use these buttons and sliders to control music\
    \ playback even when your iPad is locked.*\n\n# iPod App Settings\n\nSurprisingly,\
    \ for a feature-rich application like iPod, the iPad provides just a few settings\
    \ for its music player. You'll find these in Settings ![image](images/U001.jpg)\
    \ iPod (see [Figure 7–32](#Chapter07.html#fig_7_32)), and they work as follows:\n\
    \n*   *Sound Check*: Say you're listening to a song that was recorded way too\
    \ low. So, you crank up the volume during playback. Then when the next song starts\
    \ playing back, *boom!*—there go your eardrums. Sound Check prevents this problem.\
    \ When you enable Sound Check, all your songs play back at approximately the same\
    \ sound level.\n\n    **TIP:** You can also use Sound Check in iTunes. Choose\
    \ Edit ![image](images/U001.jpg) Preferences ![image](images/U001.jpg) Playback\
    \ ![image](images/U001.jpg) Sound Check (Windows) or iTunes ![image](images/U001.jpg)\
    \ Preferences ![image](images/U001.jpg) Playback Sound Check (Mac).\n\n*   *EQ*:\
    \ The iPad offers a number of equalizer settings that help emphasize the way different\
    \ kinds of music play back. Choose from Acoustic, Dance, Spoken Word, and many\
    \ other presets. To disable the equalizer, choose Off.\n*   *Volume Limit*: Face\
    \ it, personal music players bring your audio up close and very personal—so up\
    \ close, in fact, that your hearing may be in peril. Though not a dedicated music\
    \ player, the iPad is no different. We strongly recommend you take advantage of\
    \ the iPad's built-in volume limit to protect your ears. Tap Volume Limit, and\
    \ adjust the maximum volume using the slider. All the way to the left is mute—sure,\
    \ you'll protect your ears, but you won't be able to hear anything. All the way\
    \ to the right is the normal, unlimited maximum volume. If you're super paranoid\
    \ or, more usually, if children have access to your iPad, tap Lock Volume Limit\
    \ to open a screen that allows you to set a volume limit passcode. No one may\
    \ override your volume settings without the correct passcode.\n*   *Lyrics & Podcast\
    \ Info*: This setting allows you to display or hide lyrics and podcast information\
    \ on currently playing audio. You will see this information when viewing a song\
    \ or podcast in the Now Playing window.\n\n**TIP:** If your songs don't have lyrics\
    \ embedded in them, you can add them yourself. In iTunes, select a song, and then\
    \ press `Cmd+I` (Mac) or `Ctrl+I` (Windows). On the song's Get Info screen, navigate\
    \ to the Lyrics tab. You can paste in the lyrics field any lyrics you have for\
    \ the song. There are also a number of apps that search your iTunes songs and\
    \ automatically add lyric information. Try Get Lyrical ([`www.shullian.com`](http://www.shullian.com))\
    \ on the Mac and SoundCrank ([`www.soundcrank.com`](http://www.soundcrank.com))\
    \ on the Windows computer.\n\n![images](images/0732.jpg)\n\n**Figure 7–32.** *The\
    \ iPod app's Settings screen allow you to set EQ and adjust volume limits, as\
    \ well as add credentials for iTunes' new Home Sharing feature.*\n\n# Setting\
    \ Up Home Sharing\n\nHome Sharing allows you to play music on your iPad that is\
    \ stored on your home computer. It's pretty much the opposite of AirPlay, where\
    \ you send music and videos from your iPad out to other devices for playback.\
    \ For Home Sharing to work, your computer and your iPad must be sharing the same\
    \ Wi-Fi network, and iTunes has to be running on your computer. Home Sharing is\
    \ a feature of the iTunes application itself, and it has to be able to serve that\
    \ data out to the network and from there to your iPad.\n\nEnable Home Sharing\
    \ by entering your Apple ID and password in settings (see [Figure 7–32](#Chapter07.html#fig_7_32)).\
    \ You must use the same Apple ID and password that your home computer is signed\
    \ into. If you fail to do so, you won't be able to access your music.\n\nOn your\
    \ home computer, launch iTunes, and select Advanced ![image](images/U001.jpg)\
    \ Turn On Home Sharing. Enter your Apple ID and password, then click Create Home\
    \ Share.\n\nFrom the iPad side of things, you can access Home Sharing media by\
    \ tapping the Library item at the top of the iPod app's sources list (see [Figure\
    \ 7–33](#Chapter07.html#fig_7_33)). Select the shared library you wish to browse\
    \ from the pop-up. Once selected, it may take a minute or two for the library\
    \ contents to load (there is eventually a progress wheel that fills to let you\
    \ know how long it will take). Once loaded, the Home Shared library replaces the\
    \ current library and the check mark in the Home Sharing pop-up switches to the\
    \ library in use. You can return to your onboard library at any time by selecting\
    \ your iPad from the Home Sharing pop-up.\n\n![images](images/0733.jpg)\n\n**Figure\
    \ 7–33.** *Access shared libraries from the iPod app's Library item at the top\
    \ of the sources list.*"
