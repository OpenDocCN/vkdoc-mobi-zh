- fmt: '#### Browsing Your Mail


    You can quickly determine which mail you have already viewed and which items remain
    unread by looking to the left of each listing in any mailbox. A blue dot appears
    next to each message that you haven’t viewed, as shown in [Figure 11-11](#Chapter11.html#fig_11_11),
    in which two of the three messages have not been read. The top of the inbox shows
    the number of unread messages in parentheses.


    ![images](images/1111.jpg)


    **Figure 11-11.** *The inbox for this example Gmail account contains two unread
    messages, with the remaining e-mail being selected and viewed.*


    To read a message, you tap the message item in the mailbox and then view it either
    on the right side of the screen (in landscape mode) or full screen (in portrait
    mode). You can navigate through the message by scrolling up and down.


    The `Details` option at the top right of your message allows you to expand the
    header to see more information about whom the mail was sent to. When expanded,
    you can then tap `Hide` to return to the original presentation.


    #### Viewing and Opening Attachments


    Most people use e-mail to send documents or other files between computers. Let’s
    say that somebody wants to send you a PDF file for you to view, or a Microsoft
    Word `.doc` file so that you can make changes to it on your iPad. You’ll need
    to know how to receive that attachment, view that attachment, and possibly then
    open it in the appropriate app to make your changes.


    When the e-mail arrives with the attachment, it appears in the inbox with a tiny
    paper clip icon denoting an attached file. In the e-mail itself, attachments are
    represented as small icons and are not downloaded to your iPad until you tap them.
    This reduces the amount of data automatically transferred to your iPad. You will
    see the name of the file, its size, and an icon, as shown in [Figure 11-12](#Chapter11.html#fig_11_12).


    ![images](images/1112.jpg)


    **Figure 11-12.** *A small paper clip icon indicates the message has an associated
    attachment, a file that has been sent in addition to the core e-mail. Attachments
    appear in your message with their name, size, and icon. Tap the icon to try to
    download and view the attached file, or tap and hold the icon for a pop-up menu
    of other options.*


    Depending on file type (not all attachments can be viewed), tapping the icon typically
    allows you to open the file in an in-Mail viewer (called the `Quick Look` viewer),
    as shown in [Figure 11-13](#Chapter11.html#fig_11_13). The viewer allows you to
    scroll through documents, play back media, and otherwise get a quick overview
    of the material that has been sent to you, but the viewer does not allow you to
    make changes to a file. For many attachments, you won''t need to do anything further
    with the file, in which case you can tap the `Done` button to return to your inbox.
    Otherwise, you can open the file in another application (to edit a Word document,
    for example), which you can do from the `Open In` menu. You can access this menu
    in either of two ways.


    ![images](images/1113.jpg)


    **Figure 11-13.** *Mail’s `Quick Look` attachment viewer allows you to view many
    types of files sent as mail attachments. When you are done viewing, you can tap
    `Done` to leave the viewer or use the action menu at the top right to open the
    item in another application or perform other system functions. Here, Mail will
    allow you to print the PDF form to any supported AirPrint printer.*


    iPad Mail offers two ways to redirect an e-mailed item to another application.
    As [Figure 11-13](#Chapter11.html#fig_11_13) shows, you can tap the `Action` menu
    button at the top right of the `Quick Look` viewer screen. This presents a pop-over
    menu that includes one or more options (such as `Form Tools` in [Figure 11-13](#Chapter11.html#fig_11_13))
    for opening the attachment in a specific application, an `Open In` option, which
    you can tap to see a list of possible applications to open it with, and a `Print`
    option.


    Alternatively, you can just tap and hold the file attachment icon in the e-mail
    itself. A similar `Open In` pop-up appears over the attachment, offering the same
    choices (plus a possible `Quick Look` option, if the file is viewable). The names
    on the buttons vary depending on the file type of the attachment and by the applications
    you have installed on your iPad. Tapping `Quick Look`, if available, gives you
    the same quick look at the document in a viewer that you can get if you tap the
    icon directly (see [Figure 11-13](#Chapter11.html#fig_11_13)). You can’t make
    changes to the document or do anything else; you can just view it.


    If you ever have problems getting Mail to open the attachment in the correct app,
    try opening the document in `Quick Look` and then tapping the `Open In` button
    in the upper-right corner of the `Quick Look` window. It lists all apps currently
    installed on your iPad that are capable of opening and editing files of that particular
    type.


    ##### Editing Your Mail


    The `Edit` button at the top right of the mailbox listing provides a way for you
    to apply batch deletions or moves of the e-mail that populates your mailbox. Consider
    [Figure 11-14](#Chapter11.html#fig_11_14), which shows the mailbox after tapping
    `Edit`. Next to each message, you’ll find either an empty circle or a red-filled,
    checked circle. Initially, these circles are empty. Tapping a message either adds
    that item to the collection (filling the circle with a white check mark over a
    red background) or removes it from the collection (returning the circle to empty).


    In batch mode, you always start by choosing which items you want to work with.
    As you do so, a “stack” of messages appears to the right, as shown in [Figure
    11-14](#Chapter11.html#fig_11_14), giving you a simple visual overview of the
    most recently selected item and a rough indication of how many items you’ve chosen.


    To delete all of the selected messages, tap the red `Delete` button at the bottom
    of the window. If you are using Gmail, the `Delete` button is replaced by the
    `Archive` button (as shown in [Figure 11-14](#Chapter11.html#fig_11_14)), because
    Gmail has its own “never delete data” policy that the iPad supports. Regardless
    of whether you are using a Gmail account or not, deleted items are removed from
    your mailbox. They are automatically moved to the account trash can, moved to
    an archival folder (as with Gmail), or possibly removed and disposed of completely.
    It all depends on how your mail account is set up and how your mail provider handles
    deletion.


    To remove individual messages in any mailbox outside of edit mode, swipe your
    finger left or right over the message. A red `Delete` button appears, which you
    tap to send the message to the trash. You will not receive a delete confirmation
    alert unless you choose that option in `Settings`, as discussed earlier in this
    chapter.


    ![images](images/1114.jpg)


    **Figure 11-14.** *To bulk-delete messages, tap the `Edit` button at the top of
    the message list; then tap the circles on the left side of the message list to
    mark the e-mails for deletion. Finally, tap the `Delete` button (or `Archive`
    in Gmail, which stores all your mail).*'
