- fmt: '# Introduction


    Oh, how far we’ve come.


    As we progress into the second decade of the 21st century, it’s becoming increasingly
    obvious how the computers of the previous 30 years have begun to look not just
    old but archaic. The massive CRT monitors of the 1980s and 1990s have given way
    to pencil-thin displays of the 2000s. The PC’s bulky and heavy beige box has been
    reduced to the size of a thick paperback, as with Apple’s `Mac Mini`, or has even
    been assimilated into the display itself, as with Apple’s `iMac`. This shrinking
    of the PC has also coincided with the computer becoming thousands of times more
    powerful—progress that shows no sign of abating. But although the miniaturizing
    and the explosive growth in processing power are technological accomplishments
    that are nothing to scoff at, the iPad signals the beginning of a new era in technology—the
    era of the touch-based computer.


    When you hold the iPad 2, you hold the future in your hands. Its gesture-based
    controls have broken open the computer’s digital/physical barrier. With the iPad
    2, you can touch your movies, e-mail, and digital pictures; you can carry 10,000
    books without increasing the weight in your bag; and you can flip through their
    pages with the swipe of your finger. Even the Web, something that has long been
    confined to a rigid desktop venue, becomes something akin to the magazine on your
    coffee table, yet with an infinite number of pages.


    When the first iPad was originally introduced, some said it was nothing more than
    a big iPhone. Indeed, the iPhone introduced the world to the Multi-Touch interface,
    and both devices do use the same operating system called `iOS`. However, as you’ll
    see, there are many minor and quite a few major differences. Using the iPad, your
    eyes are immediately enveloped by its large display; there’s no squinting when
    you play games, navigate maps, and watch videos—all from your lap. Its full-size
    keyboard allows you to comfortably create documents, spreadsheets, and presentations
    with applications that rival those you find on older, traditional computers. No,
    the iPad isn’t an over-grown iPhone; it’s an evolution of the personal computer.
    The iPad 2 further defines the future of computers, making the device not just
    for consumption of media, but for its creation. Apple has added front- and rear-facing
    cameras for FaceTime video chatting and high-definition video recording. It’s
    now possible to not only listen to music, but create your own using the optional
    `GarageBand` software. Even video editing right on your touch screen is now a
    reality with Apple’s `iMovie` for iPad.


    *Taking your iPad 2 to the Max* introduces you to the iPad 2. Starting with helping
    you choose the iPad that’s right for you, we walk you through purchase decisions
    and setting it up for the first time. You’ll learn the gesture-based, Multi-Touch
    vocabulary that allows you to manipulate the iPad and its tens of thousands of
    apps. We’ll show you how to connect to the Internet, browse the Web, touch your
    music and videos, and find and download apps from the App Store. You’ll discover
    how to buy and navigate books using Apple’s revolutionary `iBooks` app, view slideshows
    and photos, send e-mail, create notes and calendars, and even turn your iPad into
    a compass. You’ll also discover that the iPad is not simply a new leisure device;
    it’s a powerful office tool, and indeed can be a viable alternative to a traditional
    computer for many people. We walk you through creating rich documents, spreadsheets,
    and presentations. We also show you how to use the front- and rear-facing cameras
    to videoconference with friends and family and to even record your own movies.
    Finally, we show you some of our favorite third-party apps and ways we use the
    iPad as an artist’s canvas, a teaching tool, and even a helper in the kitchen.


    This book is written for anyone with an iPad 2 or anyone who is thinking of getting
    one (you won’t be sorry!). It doesn’t matter whether you’re a Mac or Windows user
    or, in fact, if you’ve never used a computer before. This book’s thorough coverage
    and step-by-step discussions allow all iPad 2 owners to learn about their device
    and come away with both the skills and the knowledge they need to use it to its
    fullest. If you owned an original iPad and just upgraded to an iPad 2, this book
    will still be of great benefit to you. The iPad 2 introduced many new hardware
    and software features that we cover thoroughly in this book.


    How you read the book is up to you. If you are totally new to the iPad (or computers
    in general), we suggest you read the book cover to cover, but you can also feel
    free to jump around from chapter to chapter if that works better for you. Above
    all, have fun while you’re learning everything that the iPad can do. It’s the
    future of computing, and it’s a blast. Thanks for letting us show it to you.


    ## Chapter 1


    ### Bringing Your iPad Home


    Purchasing your first iPad should be a fun and exciting experience for you. Compared
    to buying a full-fledged desktop or laptop computer, there aren’t as many options
    to complicate matters. The price tag on an iPad isn’t as daunting as that for
    an Apple `MacBook Pro`, so the impact to your wallet won’t be outrageous even
    if you don’t happen to make the perfect choice. In this chapter, you’ll discover
    what decisions you should make before either heading to your local Apple retailer
    or ordering an iPad online. You’ll learn what you need in addition to an iPad,
    what you can do if you’re not pleased with your purchase or get a faulty unit,
    and how to get your iPad ready for everyday use. Here are all the basic facts
    you need to select, buy, and set up your iPad.


    #### Picking Your iPad


    Especially at this early stage of the life cycle of the iPad, you have a relatively
    easy decision to make regarding which model of the device to purchase. There are
    never that many iPad models available at any particular time, since Apple does
    a good job of keeping its product lines small and up-to-date. The big questions
    you’ll have to ask yourself are whether you need 3G wireless capabilities, whether
    your 3G iPad should run on a GSM or CDMA network, how much storage you want in
    your iPad, and whether or not to purchase a used iPad. Let’s look into these four
    questions in more detail.'
