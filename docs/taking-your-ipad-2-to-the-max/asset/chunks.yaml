    \ 图 13–41）：\n\n![images](img/1341.jpg)\n\n**图 13–41.** *视频分享选项*\n\n- **Email Video（电子邮件视频）**：选择此选项会将视频片段压缩为\
    \ QuickTime 电影文件。随后会打开一个新邮件窗口，邮件正文中已附带该视频片段。\n\n  根据视频片段的长度，你可能会看到一条错误信息，提示“Video\
    \ is Too Long（视频太长）”。如果出现此提示，你的 iPad 会询问你是否想从视频中选择一个更短的片段来发送电子邮件。轻点 `OK`，你将进入修剪模式，该模式允许你缩短片段的长度。\n\
    \n  修剪模式的一个有趣之处在于：黄色的修剪选择条固定在 54 秒。你可以缩短它或拖动这个 54 秒的修剪选择条，但无法将修剪时长增加到超过 54 秒。因此，就目前而言，54\
    \ 秒似乎是可通过电子邮件发送的最长片段长度。不过，苹果公司将来随时可以通过软件更新改变这一限制。\n\n  修剪完视频后，轻点进度条上方黄色的 `Email`\
    \ 按钮。随后应会出现一封空白电子邮件，邮件正文中已包含该视频。\n\n- **Send to MobileMe（发送到 MobileMe）**：`MobileMe`\
    \ 是苹果公司的电子邮件服务，同时也允许你在线发布和分享照片及视频。`Send to MobileMe` 选项让你可以直接从 iPad 将视频上传到你的 `MobileMe`\
    \ 在线图库。轻点 `Send to MobileMe`。系统会弹出窗口，要求你为视频命名，并可根据需要撰写描述（请参见 图 13–42）。你还可以选择上传标清视频或原始高清版本。最后，选择你想要发布视频的\
    \ `MobileMe Gallery` 相册，然后轻点 `Publish`。请注意，你无法通过这种方式创建新相册，必须将视频添加到现有相册中。\n\n \
    \ 视频上方会出现一个表示上传进度的进度条。上传完成后，你将能轻点 `View on MobileMe`，它会带你进入 `Safari` 浏览器中的 `MobileMe`\
    \ 网络图库；或者轻点 `Tell a Friend`，它会打开 `Mail` 应用，并撰写一封邮件，正文中包含该视频的链接。\n\n  ![images](img/1342.jpg)\n\
    \n  **图 13–42.** *MobileMe 分享和上传界面*\n\n  要使用这些 `MobileMe` 功能，你必须拥有一个 `MobileMe`\
    \ 账户。详情请参见 [`www.me.com`](http://www.me.com)。\n\n- **Send to YouTube（发送到 YouTube）**：选择此选项将允许你直接从\
    \ iPad 将视频上传到 `YouTube`。在出现的屏幕中（请参见 图 13–43），为视频输入名称和描述，选择上传标清或高清版本，添加标签，选择一个\
    \ `YouTube` 类别，然后轻点 `Publish`。你需要拥有一个 `YouTube` 账户才能将视频上传到 `YouTube`。\n\n  ![images](img/1343.jpg)\n\
    \n  **图 13–43.** *将视频发布到 YouTube*\n\n- **Copy Video（复制视频）**：轻点 `Copy Video` 以复制视频。这会将视频保存到剪贴板，以便稍后粘贴到其他地方（例如电子邮件或文档中）。\n\
    \n  你也可以同时复制多个视频。在查看相册时，轻点 `Share` 按钮。你会看到相册菜单更名为 `Select Photos`。轻点你想要复制的多个视频（和/或照片）。每个选中的项目上会显示一个勾选标记。选择完所有视频和/或照片后，轻点左上角的\
    \ `Copy` 按钮。这些视频和照片即可被批量复制到电子邮件或其他应用中。\n\n### 本章小结\n\n本章向你介绍了 iPad 的 `Photos`\
    \ 应用，并展示了如何浏览你的照片集、与亲友分享、更改 iPad 壁纸，甚至将你的 iPad 用作数码相框。一旦你在 iPad 上查看过数码照片，你可能会发现，你再也不想在电脑显示器或笔记本电脑屏幕上浏览和查看它们了。\n\
    \n以下是本章的一些总结性思考：\n\n- iPad 的 `Photos` 应用提供了最能够即刻展示 iPad 强大功能的方式之一。你可以滚动浏览相册，通过捏合或双击来放大缩小，以及将设备侧向翻转。这些功能都带来了\
    \ iPad 令人惊叹的体验。\n- 你可以直接从相机将照片导入 iPad。这对于可能在外拍摄的专业摄影师来说是一个巨大的帮助。他们可以将图像加载到 iPad\
    \ 上，并立即在更大的屏幕上查看效果。甚至还可以放大以查看更多细节。\n- 考虑投资购买一个廉价的名片盒和一个便宜的扬声器。它们能让在 iPad 上观看幻灯片变得更加轻松，尤其是当有多人同时观看时。苹果的视频输出线缆能将幻灯片发送到电视屏幕上，从而增添更多乐趣。\n\
    - `Photos` 应用还允许你观看录制或导入的视频。你甚至可以修剪视频片段，并轻松地将这些片段发送到 `YouTube` 或通过电子邮件发送给朋友。\n\
    \n## 第 14 章\n\n## 使用 iWork 移动办公\n\n在本书中，我们已经讨论过一些应用，它们能帮助你整理事务、与他人沟通，或以音乐、书籍、视频和照片的形式享受媒体内容。现在我们将来讨论三款能将你的\
    \ iPad 变成一个强大工作平台的应用。\n\n这三款应用分别是 `Pages`、`Numbers` 和 `Keynote`，它们在 iPad 上统称为\
    \ `iWork`。这些由苹果公司开发的应用可以在 App Store 以每个 9.99 美元的价格购买，它们提供了高效工作者在移动办公时所需的大部分功能。话虽如此，我们也需要补充一点：对于严肃的工作任务，你应该考虑使用你的\
    \ iPad 来远程控制你的“真正”工作电脑。像 `LogMeIn Ignition` 和 `iTeleport` 这样的应用使这成为可能，尽管本书不包含对其配置和使用的详细说明。在本章中，我们仅介绍每个应用的基础知识，因为对\
    \ `iWork` 的深入探讨本身就可以轻松成为另一本书的主题。\n"
- fmt: '### Buy and Install `iWork` for iPad


    Unlike many of the apps built into your iPad, `iWork` for iPad apps must be purchased
    and installed on your iPad. In [Chapter 8](#Chapter08.html#ch8), we told you about
    the `App Store` app and how it works on your iPad to assist you in browsing, purchasing,
    and installing iPad software.


    You don''t need to purchase all three of the apps if you don''t need some of the
    functionality. For instance, if you just need a good word processing app and don''t
    do any work that requires spreadsheets or presentations, you can just buy `Pages`.
    Presenters might just want to purchase `Keynote`, and budget managers could just
    pick up `Numbers`.


    Here are some things you may choose to use each app for.


    `Pages`:


    *   Writing letters

    *   Creating or updating a résumé

    *   Developing a project proposal

    *   Writing a term paper

    *   Making creative posters, greeting cards, invitations, or flyers


    `Numbers`:


    *   Creating checklists

    *   Making comparisons of mortgages or other loans

    *   Developing a budget

    *   Creating expense reports and invoices

    *   Logging business and personal auto mileage

    *   Drawing charts and graphs from data


    `Keynote`:


    *   Developing business presentations

    *   Creating class presentations by both students and instructors

    *   Making strikingly attractive personal slideshows

    *   Using your iPad as a teleprompter for giving speeches


    Launch the `App Store` app, and then type the word `pages` into the search box
    in the upper-right corner of the `App Store`. Tap the `Search` button on your
    keyboard, and a list of apps with `pages` in their names appear. Under iPad Apps,
    look for `Pages` (listed in the Productivity category), and then tap the price
    button. That button turns into a green `Install App` button. Tap it, and you''ll
    be asked to enter your `Apple ID`. `Pages` downloads to your iPad and then automatically
    installs itself. The same process works with both `Numbers` and `Keynote`.


    These apps are big—more than 20MB each—so be sure to have your iPad connected
    to a Wi-Fi network prior to installation. If you try to install any of the `iWork`
    apps while connected to a 3G network, a message will ask you to either install
    while you''re on a Wi-Fi network or install the app through `iTunes` on your computer.
    Our recommendation is to purchase and install the `iWork` for iPad apps through
    `iTunes` on your computer.


    ### `Pages`


    `Pages` is more than a word processing app for iPad—it can be used to create sophisticated
    page layouts with graphics, tables, charts, and numerous text styles. The Mac
    version of `Pages` evolved over its lifetime to become a powerful writing and
    desktop publishing tool, but the iPad version was born with many of the same capabilities.
    The app is optimized for use with the touch interface of the iPad, making it a
    joy to use.


    In this section, we''ll familiarize you with the user interface and some of the
    functionality of `Pages`.


    #### Creating a New Document


    Launching `Pages` for the first time, you''re greeted with a document with the
    title `Tap to Get Started with Pages`. It''s more than just a pretty set of pages;
    it''s an interactive tutorial into many of the features of the app. It coaxes
    you to use common iPad interface gestures to move, rotate, scale, and delete images,
    restyle text, and add objects to your documents.


    The `My Documents` page, the first thing you see in `Pages`, looks like a piece
    of gray cloth on which all of your documents are nicely laid out side by side.
    To open a previously created document, tap it once.


    To start with a blank piece of paper or perhaps a template, you can either tap
    the `New Document` button in the upper-left corner of the `Pages` window or tap
    the plus sign (`+`) icon in the middle of the bottom of the window. Tapping the
    plus sign below an existing document in the `My Documents` window gives you a
    choice of creating a new document from scratch or duplicating the existing document.


    If you tap either of the `New Document` buttons, the first thing you see is a
    `Choose a Template` screen with a number of useful document types (see [Figure
    14–1](#Chapter14.html#fig_14_1)). You can choose to start with a wide-open piece
    of paper or a well-designed document template. Templates help when you want to
    create a professional-looking document quickly or when you''re faced with writer''s
    block and need some ideas to launch your imagination.


    ![images](images/1401.jpg)


    **Figure 14–1.** *Creating a new document in `Pages` for iPad provides the option
    of starting with a blank page or using a professionally designed template.*


    For the purposes of this book, we''ll start with a blank page. Tap the blank page
    in the upper left of the `Choose a Template` window, and you''re ready to start
    writing. Before you begin, we''ll explain a bit about what''s on the top of the
    `Pages` window, as shown in [Figure 14–2](#Chapter14.html#fig_14_2).


    ![images](images/1402.jpg)


    **Figure 14–2.** *The `Pages` Style ruler*


    #### The `Pages` Style Ruler


    Apple named the ruler-like user interface element shown in [Figure 14–2](#Chapter14.html#fig_14_2)
    the `Style ruler`, because it provides both a way to style your text and a ruler
    for aligning page elements. You can make the `Style ruler` disappear from your
    page by tapping the circled × in the upper-right corner, and you can make it reappear
    by double-tapping the barely visible edge of the ruler at the top of the screen.


    The `Style ruler` is different from the toolbar just above it. The toolbar includes
    a button for returning to `My Documents`, an `Undo` button (for reverting to previous
    versions of a document), and a set of buttons on the right side that we''ll describe
    in a moment. Unlike the `Style ruler`, the toolbar is always visible unless you
    switch into full-screen mode, as described later in this chapter. Full-screen
    mode hides all elements except the document.


    The ruler features a number of buttons. The leftmost button (the one marked `Body`)
    applies styles to any currently selected paragraph. To apply a style, double-tap
    any text in a paragraph, and then tap the `Paragraph Styles` button. A scrolling
    pop-up appears with a list of common paragraph styles—title, subtitle, headings
    of various sizes, subheadings, body text, bulleted text, captions, headers and
    footers, and more. Selecting one of those styles applies it to the entire paragraph
    of text.


    ##### Undo/Redo


    Did you just accidentally apply the incorrect style to a paragraph of text? No
    problem. Tap the `Undo` button on the toolbar at the top of the window, and the
    text reverts to the original style. If you later decide that you really meant
    to make a specific change, tap the `Undo` button again. A pop-up may appear allowing
    you to choose to redo an action. Unlike many other iPad apps, `Pages` does not
    support shaking the iPad from side to side to undo/redo.


    ##### Common Styles


    The next set of buttons—`B`, `I`, and `U`—apply common styles to characters. `B`
    stands for bold, `I` for italic, and `U` for underlines. To select a word, double-tap
    it. When you select a word, it''s highlighted with a light blue background and
    gains a pair of selection handles, one at each end (see [Figure 14–3](#Chapter14.html#fig_14_3)).


    ![images](images/1403.jpg)


    **Figure 14–3.** *Double-tapping any word in a `Pages` document selects it, adds
    selection handles to either side to expand the selection, and displays a pop-up
    menu of actions.*


    Expand your selection by dragging the handles left or right, or select an entire
    paragraph by triple-tapping it. A pop-up also appears, showing actions that can
    be applied to the text. The most widely used actions—`Cut`, `Copy`, and `Paste`—appear
    in the pop-up. Tapping the `More` button provides several more actions—`Copy Style`,
    `Replace`, and `Definition`.'
