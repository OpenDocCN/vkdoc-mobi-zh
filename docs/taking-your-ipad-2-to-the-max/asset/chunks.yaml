  trans: '

    #### 添加联系人


    若要添加联系人，请点击左页底部的加号 (`+`) 图标。通讯录应用中会显示一个空白页面（参见图 10–19），上面附有说明标签，指示每个字段需要输入哪些信息。若要开始向任意字段输入信息，点击该字段，iPad
    的虚拟键盘就会出现。


    ![图片](img/1019.jpg)


    **图 10–19** *从这张空白页开始，你的联系人信息可以简单，也可以复杂。*


    苹果在通讯录编辑字段方面做得非常出色。输入一串数字作为电话号码，系统会自动生成格式美观的号码，并根据你所在的国家/地区在适当位置添加破折号和括号。在地址区域添加州或省代码时，大写锁定键会被锁定，以确保代码中的所有字母均为大写。正是这样的细节设计让
    iPad 的使用体验如此愉悦。


    你甚至可以通过点击`添加照片`框为每个通讯录条目添加照片。这会显示 iPad 上存储的照片专辑列表，你可以浏览直至找到正在录入信息的人的照片。点击该照片，你便可以使用常见的
    iPad 手势来移动和缩放图像，直到照片看起来合适为止。最后，点击`使用`按钮，照片就被插入到页面中了。


    完成人员或公司信息的录入后，点击通讯录应用右上角的`完成`按钮，即可在虚拟地址簿中看到完成的页面。


    如果你需要随时添加或更改信息，点击`编辑`按钮即可显示通讯录的编辑字段。每个通讯录条目的底部还有一个`共享`按钮，它会生成一封包含 `.vcf`（vCard
    文件格式）文件的电子邮件，该文件能被大多数地址簿应用程序打开。对于拥有第二代或更新版本 iPad 的用户，每个通讯录条目的底部会出现一个`FaceTime`按钮。只需轻点一两下，你就可以与朋友或家人进行视频通话。


    要删除联系人，请点击`编辑`按钮，然后滚动到联系人信息的底部。那里有一个红色的大号`删除联系人`按钮。点击它，会出现一个小对话框，询问你是要删除该联系人还是取消删除。当你点击`删除`时，该联系人将从你的
    iPad 通讯录列表中移除。


    #### 群组与搜索


    在通讯录左页的顶部有一个红色的小书签，上面写着*群组*字样。点击那个红色书签会列出你创建的所有群组……但不是在 iPad 上。你无法在 iPad 上创建联系人群组。该任务必须在你的
    Mac 或 Windows 电脑上完成。


    为什么要使用群组？这是一种很好的方式，可以让你更容易地找到某个特定群组中认识的人，或列出某个群组中的所有成员。换句话说，与其从 2000 个联系人中搜索一个你明知是某个特定群组成员的人，不如将范围缩小到该群组中的人。


    说到搜索，你可以使用通讯录左页顶部的`搜索`字段来查找特定的人或公司。点击`搜索`字段，开始输入，通讯录就会提供符合搜索条件的人员或公司列表。例如，搜索 *Steve*
    会列出通讯录中包含该名字的所有联系人（参见图 10–20）。


    ![图片](img/1020.jpg)


    **图 10–20** *当你需要在大量联系人中快速找到某人时，搜索字段非常有用。*


    #### 同步通讯录


    还记得在本章前面部分你是如何设置日历和备忘录的同步的吗？你将用同样的方式来设置通讯录的同步。在 Windows 电脑上，配套应用程序可以是 Microsoft
    Outlook 2003、2007 或 2010；Windows 通讯簿（Windows XP），或 Windows 联系人（Windows Vista 和
    Windows 7）。在 Mac 上，联系人同步可以通过通讯录程序和 Microsoft Entourage 2004 或 2008 来设置。你应该使用哪个应用程序？如果你在
    Windows 电脑上使用 Outlook，则与 Outlook 通讯录列表同步。如果你使用网页邮件或除 Outlook 之外的应用程序管理邮件、联系人和日历，则根据你使用的
    Windows 操作系统版本，选择使用 Windows 通讯簿或 Windows 联系人。


    使用基座连接器转 USB 线缆将 iPad 连接到 Mac，如果 iTunes 没有自动启动，请手动启动它。在电脑上的 iTunes 中，点击窗口左侧边栏中“设备”下方代表你
    iPad 的图标。接下来，点击“信息”选项卡并向下滚动，直到看到*同步通讯录中的联系人*（Mac；图 10–21）或 *Sync Contacts（同步联系人）*（Windows；图
    10–22）字样。


    ![图片](img/1021.jpg)


    **图 10–21** *若要同步 Mac 上的通讯录，请选中“同步通讯录中的联系人”复选框。请注意，此 iPad 已通过 MobileMe 进行同步。*


    ![图片](img/1022.jpg)


    **图 10–22** *若要在 iTunes 中将通讯录与 Windows 电脑同步，请选中“同步联系人”复选框。*


    与同步日历一样，你可以选择将所有联系人同步到 iPad，或者只同步选定的群组。在设置通讯簿同步时，还有其他几个复选框需要考虑。


    首先，你可能希望将在 iPad 上创建的联系人添加到特定群组。这就是`将本 iPad 上群组之外创建的联系人添加到`复选框的作用。选中该框，然后选择一个群组。在
    iPad 上创建的任何新联系人都将自动添加到该群组。


    苹果还内置了与其他通讯簿的同步功能。接下来的两个复选框用于设置与 Yahoo! 通讯簿或 Google 联系人的同步。选中其中任何一个复选框，都会显示一份法律协议，允许
    iTunes 与 Yahoo! 或 Google 同步。你可以同意或不同意该声明，但请注意，如果不点击`同意`按钮，你将无法与这些服务同步。


    一旦你同意允许与 Google 或 Yahoo! 共享信息，就会出现一个配置屏幕，要求输入该服务的用户 ID 和密码。输入该信息，然后点击 iTunes 右下角的`应用`按钮，即可确保你的通讯录信息在
    iPad、电脑的通讯簿或联系人应用程序以及 Yahoo! 通讯簿或 Google 联系人之间同步。

    '
- fmt: '### MobileMe Synchronization


    All the sync setup you''ve just done assumes one thing—that you don''t have a
    subscription to Apple''s MobileMe service. MobileMe provides more than just synchronization
    of data between Macs, Windows computers, iPhones, iPads, and the Web. It also
    provides you with a `me.com` e-mail address, online storage of data through iDisk,
    online photo galleries, and a way to find your iPad if you lose it. What''s truly
    magical is that all of this happens over your iPad''s Wi-Fi or 3G connection,
    so there''s no need to constantly connect your device to your Mac or Windows computer
    through the Dock Connector to USB Cable.


    MobileMe is available from Apple for an annual subscription fee of $99 ([`www.apple.com/mobileme`](http://www.apple.com/mobileme)),
    although subscriptions are often available at a discount from Amazon.com. If you''ve
    purchased a subscription from one of these sources, you can enable the services
    on your Mac by selecting System Preferences `![images](images/U001.jpg)` MobileMe
    and signing in with your member name and password (see [Figure 10–23](#Chapter10.html#fig_10_23)).
    Those who aren''t members can sign up for a 60-day free trial of MobileMe through
    the same System Preferences pane. Windows computer owners can sign up for MobileMe
    or the same free trial by pointing their web browser to [`www.apple.com/mobileme`](http://www.apple.com/mobileme).


    ![images](images/1023.jpg)


    **Figure 10–23.** *Not only is MobileMe a great way to do over-the-air synchronization
    of your iPad, iPhone, and Mac, but it also provides features to let you find your
    iPad if you lose it and do a remote wipe of your data.*


    Once you''ve logged into your MobileMe account from the MobileMe System Preferences
    panel, you can set up synchronization from your Mac by clicking the Sync button
    and ensuring that the Synchronize with MobileMe box is selected ([Figure 10–24](#Chapter10.html#fig_10_24)).


    ![images](images/1024.jpg)


    **Figure 10–24.** *Syncing with MobileMe provides two-way updates to Calendar
    and Contacts wirelessly.*


    Below the check box is a list of things that MobileMe can synchronize between
    different devices signed into the same MobileMe account. Primary to those items
    are your three desk-set apps—Calendars, Notes, and Contacts—but Mail accounts
    and Safari web browser bookmarks can also be synced between your Mac, iPad, and
    iPhone or iPod touch.


    We recommend setting up automatic synchronization so that any time a change is
    made to iCal or Address Book or a note is added to Mail on your Mac, those changes
    are immediately synchronized to your iPad. Remember that the synchronization is
    two-way, so making changes on your iPad results in those changes being made on
    your other devices as well.


    You''ll notice that if you set up MobileMe sync of your Calendar, Contacts, and
    Notes information, those items are deselected on the Info tab in iTunes. A message
    at the bottom of the Sync Address Book Contacts, Sync iCal Calendars, and Other
    areas of the iTunes Info tab notes that your data is being synced with MobileMe
    over the air. You can choose to sync directly and with MobileMe, but if you''re
    using MobileMe, we recommend using that as your sole method of syncing data.


    For Windows users, the best and easiest way to set up MobileMe syncing is on the
    iPad. On your iPad, select Settings `![images](images/U001.jpg)` Mail, Contacts,
    Calendars, and then tap the button designating your MobileMe account. It is marked
    with your MobileMe e-mail account name. In the dialog box that appears (see [Figure
    10–25](#Chapter10.html#fig_10_25)), you''ll see buttons to turn on syncing of
    Contacts and Calendar. Sliding those buttons to ON enables the synchronization
    of Calendar and Contacts between the iPad and MobileMe. Synchronizing MobileMe
    with your Windows computer is beyond the scope of this book, but you can find
    out more at [`www.apple.com/mobileme/setup/pc.html`](http://www.apple.com/mobileme/setup/pc.html).


    We''ll tell you how to set up MobileMe on your iPad in the next chapter.


    ![images](images/1025.jpg)


    **Figure 10–25.** *Sliding the relevant buttons to ON enables the synchronization
    of Calendar and Contacts between the iPad and MobileMe.*


    ### Summary


    Some of the most useful apps on your iPad consist of Calendar, Notes, and Contacts—the
    desk set of your device. In this chapter, you learned how to use your iPad as
    a digital notepad, Day-Timer, and address book, as well as how to sync that information
    to your Mac or Windows computer. These are several important topics to remember
    from this chapter:


    - The desk-set application(s) on your computer (iCal and Address Book on your
    Mac, Outlook on your Windows computer) can sync with similar apps on your iPad.
    Calendar is a powerful desk calendar on the iPad, while Contacts gives you access
    to all your address book information. The Notes app is a quick way to capture
    text and move it to your computer.

    - Notes sync to Mail on the Mac and Outlook on Windows computers. At this time,
    Notes data can''t be synchronized over the air using MobileMe.

    - There are four ways to view your calendar information—Day, Week, Month, and
    List views.

    - Apple''s MobileMe service not only is a great way to sync Calendar and Contacts
    info with other computers and devices, but can also provide a way to find a lost
    iPad.

    - Although you can''t create groups of contacts on your iPad, Contacts does support
    groups that have been created in Address Book or Outlook. Groups are a powerful
    tool for organizing large numbers of contacts.


    ## Chapter 11


    ## Setting Up and Using Mail


    E-mail. It’s our connection to the world, our way of being part of a larger society.
    It occupies huge chunks of our days and, even more than phone calls, may be the
    primary way people touch base with and update each other. Ask most people what
    they’ll be using their new iPad for, and a good number of them will instantly
    reply “e-mail.” Being able to step away from your desk and still be able to keep
    in touch while on the go is a hugely valuable component of iPad use.


    The iPad uses the Mail app to compose, send, and receive electronic communications.
    It provides a handy way to drop a note, share a file, and view material that others
    have shared with you. Many iPad apps also use Mail as a conduit for sharing documents
    or files with others, so Mail is a good app to know.


    In this chapter, you’ll learn how to set up e-mail accounts on your iPad, discover
    what’s involved in composing and organizing mail, and see how Mail works with
    other iPad apps to help you share information with others.


    ### Setting Up Mail Accounts


    The iPad Mail app is instantly recognizable with its white paper envelope floating
    upon a blue-sky background. By default, Mail’s icon is placed in the Dock at the
    bottom of the iPad screen. The Dock ensures that Mail is easily accessible from
    any one of the panes of the Home screen. At times you’ll see a red bubble with
    a number appear on top of this envelope/sky icon. That bubble lets you know how
    many new messages have arrived, and are waiting for you to read them.


    [Chapter 10](#Chapter10.html#ch10) discussed how you could synchronize your calendar,
    contacts, and notes between your iPad and computer. The iPad and iTunes make it
    just as easy to transfer accounts to your computer. If you already have multiple
    e-mail accounts set up on your Mac or Windows computer, there’s no reason to reenter
    all of the information to set them up on your iPad. You can use the same process
    used in [Chapter 10](#Chapter10.html#ch10) to sync Mail accounts to your iPad
    for a quick method of setting up Mail, or you can set up the accounts on the iPad—it’s
    your choice. The next two sections show you how to do both.'
