    If selected, once all your other files (movies, books, photos, and so on) have
    been synced to your iPad, any leftover free space will be filled with music until
    your iPad can’t fit anything else on it. We don’t recommend selecting this option.
    It severely limits your ability to create any new documents on your iPad since
    it won’t have any space left to store them. This is a feature better suited to
    the music-based iPod touch than the application-centric iPad.


    ![images](images/0218.jpg)


    **Figure 2–18.** *Select the playlists, artists, albums, and genres you want to
    sync with your iPad.*'
  trans: '

    ### 同步应用


    在“同步应用”标题下（如图 2–15 所示），您会看到一个可滚动的列表，其中包含 iTunes 应用库中的所有应用。您可以按名称、种类、大小、类别或下载日期对列表进行排序。


    在应用列表中，每个应用图标的左侧都有一个复选框。每个图标的右侧是应用名称，下方是该应用的类别列表和单个应用的文件大小。任何选中了复选框的应用都表示已设置为与
    iPad 同步。


    ![images](img/0215.jpg)


    **图 2–15.** *“应用”选项卡用于选择将哪些应用放入 iPad，以及按何种顺序排列它们。*


    **注意：** 每当您在 iTunes 中下载一个新应用时，它都会在下一次同步时自动与您的 iPad 同步。当然，您也可以在同步后直接移除该应用，或者取消选中图
    2–15 中所示的 `Automatically sync new apps` 选项。


    在应用列表旁边，您会看到 iPad 桌面的可视化表示。在其旁边，您会看到一个或多个黑色屏幕，上面显示着已经存在于 iPad 上或已设置为与 iPad 同步的应用图标。在最后一个黑色屏幕下方，您还会看到一个完全灰色的屏幕。


    将应用安装到 iPad 上最简单的方法是：在应用列表中找到它们，然后直接将其拖拽到虚拟的 iPad 屏幕上。一旦您这样操作，该应用的复选框就会被自动选中。


    您可以在虚拟 iPad 屏幕上拖拽应用，直到将它们按您喜欢的顺序排列好。您还可以抓取较小的黑色屏幕，并在列表中上下移动它们，从而在 iPad 上重新排列整个应用页面。列表顶部的黑色屏幕将是
    iPad 的主页，其下方的每个屏幕则对应向右滑动一次即可访问的后续页面。底部的灰色屏幕是一个额外的屏幕，您可以用它来创建一个包含应用的新屏幕。


    要移除一个应用，只需将鼠标悬停在该应用上，其左上角就会出现一个小 `X`。点击这个 `X`，该应用就会从屏幕上消失。在下一次同步时，该应用将从您的 iPad
    上移除（不用担心，您随时可以通过再次将其从应用列表拖拽到虚拟 iPad 屏幕上来恢复它）。


    **注意：** iPad 预装的应用无法从设备中移除——它们只能被重新定位。


    每个屏幕除了底部固定的应用外，最多可以容纳 20 个应用。程序坞最多可以容纳六个应用。无论您滑动到哪个应用屏幕，您放置在程序坞中的任何应用都会出现在 iPad
    的底部。由于程序坞中的应用始终出现在任何应用页面的底部，因此最好将您最常用的应用放在那里以便快速访问。


    ### 文件共享


    iPad 引入了一种在电脑和 iPad 之间轻松共享文件的方式。在“文件共享”标题下方，您会看到一个“应用”框和一个“文稿”框（见图 2–16）。当前 iPad
    上所有支持拖放式文件共享的应用都会出现在这里的“应用”列表中。要将文件放入某个应用，只需在“应用”列表中选择该应用，然后在电脑上找到您要添加的文件，并将其拖拽到“文稿”列表中。您也可以点击“文稿”列表底部的
    `添加` 按钮来浏览电脑上的文件。


    ![images](img/0216.jpg)


    **图 2–16.** *支持拖放式文件共享的应用及其包含的文稿*


    如果您在 iPad 上创建了一个全新的文件（例如在 Apple 的文字处理软件 Pages 中创建），并且想要将该文件传输到电脑上，请在“文稿”列表中选择该文件，点击列表下方的
    `“保存到…”` 按钮，然后选择电脑上您想要保存文件的位置。或者，您也可以简单地将该文件从“文稿”列表拖拽到您的桌面上。


    要从包含该文件的应用中删除它，请在“文稿”列表中选择该文件，然后按下键盘上的 `Delete` 键。此时会弹出一个窗口，询问您是否确实要删除该文件。点击 `删除`
    即可完成删除。


    只要文件在某个应用内被共享，当您将 iPad 与电脑同步时，该文件就会作为应用备份的一部分始终被备份。


    **注意：** 您可以将文件拖拽到应用的文稿框中，但这并不意味着该应用能够打开它。应用仅限于处理 iPad 支持的文件类型。例如，iPad 本身不支持 Microsoft
    的 WMV 视频文件。如果您将一个 WMV 电影拖拽到一个应用中，该应用会包含它，但仍然无法播放它，除非该应用本身内置了对此格式的支持。例如，Pages 无法打开一个电影文档。


    ### 音乐选项卡


    音乐选项卡基本上不言自明（见图 2–17）。请确保顶部的 `Sync Music` 复选框已被选中。在其下方的方框中，您会看到两个单选按钮和几个复选框。


    ![images](img/0217.jpg)


    **图 2–17.** *“音乐”选项卡允许您选择要同步到 iPad 的播放列表、表演者、专辑和音乐类型。*


    - *完整音乐资料库*：选中此选项后，您的整个音乐资料库将同步到 iPad，但这仅当您的 iPad 有足够的可用存储空间时才会发生。如果您的音乐容量超过了
    iPad 的存储容量，一旦 iPad 存满，剩余的音乐将停止同步。

    - *选定的播放列表、表演者、专辑和音乐类型*：如果您选择此选项，将会出现四个方框，列出您 iTunes 资料库中的所有播放列表、表演者、专辑和音乐类型（见图
    2–18）。请逐一选择您希望在 iPad 上拥有的播放列表、表演者、专辑和音乐类型对应的复选框。

    - *包括音乐视频*：如果选中此复选框，与所选播放列表、表演者、专辑或音乐类型相关的任何音乐视频都将传输到 iPad。

    - *包括语音备忘录*：如果选中此复选框，您存储在 iTunes 资料库中的任何语音备忘录都将与 iPad 同步。

    - *自动用歌曲填充空闲空间*：此复选框仅在您选择了“选定的播放列表、表演者、专辑和音乐类型”单选按钮时才会出现。如果选中，一旦所有其他文件（电影、图书、照片等）都已同步到
    iPad，任何剩余的空闲空间都将被音乐填满，直到 iPad 无法再容纳任何内容为止。我们不建议选择此选项。这会严重限制您在 iPad 上创建新文档的能力，因为设备将没有剩余空间来存储它们。此功能更适合以音乐为主的
    iPod touch，而非以应用为中心的 iPad。


    ![images](img/0218.jpg)


    **图 2–18.** *选择您希望与 iPad 同步的播放列表、表演者、专辑和音乐类型。*

