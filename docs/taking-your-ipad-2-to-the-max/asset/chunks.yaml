    ## About the Authors


    ![image](images/steve_sande.jpg) **Steve Sande** has been a loyal fan of Apple
    technology since buying his first Mac in 1984. Originally trained as a civil engineer,
    Steve''s career as an IT professional blossomed in the 1990s. A longtime blogger,
    Steve is the features editor at AOL''s The Unofficial Apple Weblog (`TUAW.com`),
    the author of three books about Apple''s iWeb application, a collaborator on *Taking
    Your iPad to the Max* and *Taking Your iPhone 4 to the Max*, and working on the
    upcoming *Taking Mac OS X 10.7 Lion to the Max*. You can join Steve every Wednesday
    for the popular TUAW TV Live show, and follow his exploits at `www.twitter.com/stevensande`.
    He lives with his wife of 32 years in Highlands Ranch, Colorado.


    ![image](images/michael_grothaus.jpg) **Michael Grothaus** is an American novelist
    and journalist living in London. He was first introduced to Apple computers in
    film school and went on to use them for years to create award-winning films. However,
    after discovering many of Hollywood''s dirty little secrets while working for
    20th Century Fox, he left and spent five years with Apple as a consultant. He''s
    since moved to London and earned his MA in Creative Writing. His first novel,
    *Epiphany Jones*, is a story about trafficking and America''s addiction to celebrity.
    Currently, Michael is a staff writer at AOL''s popular tech news site The Unofficial
    Apple Weblog (TUAW.com), where he writes about all things Mac. Additionally, Michael
    has written several other books for Apress, including *Taking Your iPad to the
    Max*, *Taking Your iPod touch to the Max, 2nd edition*, and *Taking Your iPhoto
    ''11 to the Max*. When not writing, Michael spends his time traveling Europe,
    Northern Africa, and Asia. You can reach him at `www.michaelgrothaus.com` and
    `www.twitter.com/michaelgrothaus`.


    **Erica Sadun** holds a PhD in computer science from the Georgia Institute of
    Technology. She has written, cowritten, and contributed to about three dozen books
    about technology, particularly in the areas of programming, digital video, and
    digital photography. An unrepentant geek, Sadun has never met a gadget she didn''t
    need. Her checkered past includes run-ins with iOS, Mac OS X, NeXT, Newton, and
    a vast myriad of both successful and unsuccessful technologies. When not writing,
    she and her geek husband parent three adorable geeks-in-training, who regard their
    parents with restrained bemusement.


    ## About the Technical Reviewer


    ![image](images/dave_caolo.jpg) **Dave Caolo** is the Managing Editor at The Unofficial
    Apple Weblog, `TUAW.com`. He previously spent 8 years as the IT Director at a
    Mac-friendly residential school. When not geeking out with his Macs, Dave enjoys
    spending time with his kids, wife, and Boston Terrier, Batgirl.'
