- fmt: '### 行车或步行路线


    轻点行车或步行图标，即可看到路线长度以及预计抵达时间。如果交通数据可用，预计行程时间将相应调整。


    要逐步浏览路线导航，请轻点蓝色的“开始”按钮。方向栏将变为[图12-26](#Chapter12.html#fig_12_26)所示的样子。轻点带有拖尾线条的三点图标，可以列表格式查看路线（参见[图12-27](#Chapter12.html#fig_12_27)）。轻点列表中的任何步骤，即可在地图上跳转到该路线部分。要返回方向栏，请轻点方向列表窗口左上角的蓝色图标。


    ![images](images/1226.jpg)


    **图12-26.** *轻点左箭头或右箭头图标，逐步浏览路线。*


    如果希望在地图上逐步查看路线，请轻点方向栏上的右箭头图标。每次轻点都会将您向前移动一个步骤。要后退一步，请轻点左箭头图标。


    ![images](images/1227.jpg)


    **图12-27.** *以列表格式显示的路线。请注意，地图上会显示一个圆形，指示您当前处于路线的哪个步骤。*


    ### 公共交通路线


    轻点公交图标选择公共交通选项。在蓝色的方向栏中，您会看到预计抵达时间。如果交通数据可用，预计行程时间将相应调整。


    轻点时钟图标，会弹出一个出发时间和时刻表列表（参见[图12-28](#Chapter12.html#fig_12_28)）。轻点“出发”选择日期和时间。除非您更改，`Depart`字段默认为当前日期和时间。在出发时间下方，您会看到备选时刻表列表。选择一个，然后轻点“完成”按钮。


    ![images](images/1228.jpg)


    **图12-28.** *方向栏显示公共交通路线。时钟图标允许您选择不同的公共交通时刻表。*


    要逐步浏览路线导航，请轻点蓝色的“开始”按钮。方向栏将变为[图12-29](#Chapter12.html#fig_12_29)所示的样子。轻点带有拖尾线条的三点图标，可以列表格式查看路线。轻点列表中的任何步骤，即可在地图上跳转到该路线部分。要返回方向栏，请轻点方向列表窗口左上角的蓝色图标。


    ![images](images/1229.jpg)


    **图12-29.** *轻点左箭头或右箭头图标，逐步浏览公共交通路线。*


    如果希望在地图上逐步查看路线，请轻点方向栏上的右箭头图标。每次轻点都会将您向前移动一个步骤。要后退一步，请轻点左箭头图标。


    **注意：** 我们之前已经提过，但遗憾的是您无法为路线添加书签。这很可惜，因为能够快速调出您最常走路线上的交通状况会非常方便。理想情况下，苹果公司会在未来添加此功能。


    ### 交通


    地图应用可以显示交通状况，帮助您规划即时行程。要打开交通状况，请轻点或轻点并拖动地图屏幕底部的翻页角，然后将“交通”开关切换为“开”（参见[图12-6](#Chapter12.html#fig_12_6)）。返回地图后，您会注意到一些道路上出现了绿色、黄色和红色的线条（参见[图12-30](#Chapter12.html#fig_12_30)）。


    地图应用究竟是如何知道当前交通状况的？美国大多数主要城市的高速公路和主干道都嵌入了传感器。这些传感器将数据实时反馈给交通部 (DOT)。交通部利用这些信息更新数字交通标志，报告当地的交通状况（例如那些悬挂在大都市区高速公路立交桥上、类似百老汇风格的明亮标志牌，告知您到达某个出口需要多长时间）。交通部也与谷歌共享这些数据，谷歌收集并用于显示近乎实时的交通地图。


    ![images](images/1230.jpg)


    **图12-30.** *地图上的交通覆盖层*


    绿色线条表示交通流速至少为每小时50英里。黄色线条表示交通流速在每小时25至50英里之间。红色高速公路表示交通流速低于每小时25英里。灰色路线表示该街道或高速公路的交通数据不可用。


    交通功能仅限于某些地区，主要是美国、法国、英国、澳大利亚和加拿大的主要大都市区；不过，会定期添加新的城市和国家。如果您看不到交通状况，请尝试放大地图。如果仍然看不到，则说明您所在的地区尚不支持此功能。


    ## 其他应用中的地图


    如果您希望在iPad上查看或使用地图，并不局限于仅使用地图应用。其他几款iPad应用也允许您导航和搜索自有地图，并可出于其他目的使用地图。以下列举几个。


    ### Flixster


    Flixster 是一款流行的 iPad 应用，允许您查找您所在地区的电影。在其众多功能中，该应用会根据您的当前位置显示附近的影院列表，并在应用内置的谷歌地图上显示影院的位置。它可在
    App Store 免费获取。


    ### The Weather Channel


    The Weather Channel 应用是一款多功能应用，向您展示您能想到的所有天气信息。它还使用内置的谷歌地图，显示包括多普勒雷达、云层覆盖、温度、降雨和紫外线指数在内的覆盖层地图（参见[图12-31](#Chapter12.html#fig_12_31)）。它可在
    App Store 免费获取。


    ![images](images/1231.jpg)


    **图12-31.** *Weather Channel应用的地图覆盖层*


    ### Ndrive US HD


    Ndrive 是一款功能强大的 iPad 导航应用。它使用自有的内置地图软件，并将地图数据存储在您的 iPad 上，因此即使没有网络连接也可以使用。您可以使用该应用规划路线、获取逐步导航以及定位超过150万个兴趣点。它在
    App Store 的售价为 $4.99。


    ### UpNext 3D Cities


    UpNext 提供纽约市、华盛顿特区和旧金山等城市的3D地图。在3D地图上滑动和缩放，并触摸建筑物以查找其内部的企业（参见[图12-32](#Chapter12.html#fig_12_32)）。这是一款令人惊叹的应用，向您展示了个人地图应用的未来发展方向。它可在
    App Store 免费获取。


    ![images](images/1232.jpg)


    **图12-32.** *UpNext 3D Cities中可触摸的3D建筑*'
  raw: '##### Driving or Walking Directions


    Tap the icon for either driving or walking. You’ll see the length of the route
    and the estimated time it will take to get there. If traffic data is available,
    the estimated journey time will adjust accordingly.


    To navigate through the directions step-by-step, tap the blue Start button. The
    Directions bar will change to the one shown in [Figure 12-26](#Chapter12.html#fig_12_26).
    Tap the icon of the three dots with lines trailing after them to see the directions
    displayed in a list format (see [Figure 12-27](#Chapter12.html#fig_12_27)). Tap
    any step in the list to be taken to that part of the route on the map. To return
    to the Directions bar, tap the blue icon in the top-left corner of the Directions
    List window.


    ![images](images/1226.jpg)


    **Figure 12-26.** *Tap the Left Arrow or Right Arrow icon to move through the
    directions step-by-step.*


    If you’d like to navigate through the directions step-by-step in the map, tap
    the Right Arrow icon on the bar. Each subsequent tap will bring you forward one
    step in the route. To move back a step, tap the Left Arrow icon.


    ![images](images/1227.jpg)


    **Figure 12-27.** *Directions presented in a list format. Note the map displays
    a circle to show you what step of the route you are on.*


    ##### Public Transit Directions


    Tap the Bus icon to select the public transit option. In the blue Directions bar,
    you’ll see the estimated time it will take to get there. If traffic data is available,
    the estimated journey time will adjust accordingly.


    Tap the Clock icon to display a pop-up list of departure times and schedules (see
    [Figure 12-28](#Chapter12.html#fig_12_28)). Tap Depart to choose a date and time.
    The depart field defaults to the current date and time unless you change it. Below
    the depart time, you’ll see a list of alternate schedules. Select one, and then
    tap the Done button.


    ![images](images/1228.jpg)


    **Figure 12-28.** *The Directions bar shows public transit routes. The Clock icon
    allows you to select between different transit schedules.*


    To navigate through the directions step-by-step, tap the blue Start button. The
    Directions bar will change to the one shown in [Figure 12-29](#Chapter12.html#fig_12_29).
    Tap the icon of the three dots with lines trailing after them to see the directions
    displayed in a list format. Tap any step in the list to be taken to that part
    of the route on the map. To return to the Directions bar, tap the blue icon in
    the top-left corner of the Directions List window.


    ![images](images/1229.jpg)


    **Figure 12-29.** *Tap the Left Arrow or Right Arrow icon to move through the
    public transit route step-by-step.*


    If you’d like to navigate through the directions step-by-step in the map, tap
    the Right Arrow icon on the bar. Each subsequent tap will bring you forward one
    step in the route. To move back a step, tap the Left Arrow icon.


    **NOTE:** We’ve mentioned it before, but unfortunately you can’t bookmark routes.
    That’s a pity because it would be nice to be able to quickly pull up traffic conditions
    on your favorite routes. Ideally Apple will add this feature in the future.


    #### Traffic


    The Maps app can display traffic conditions that help you when planning an immediate
    journey. To turn on traffic conditions, tap or tap and drag the page curl at the
    bottom of the Maps screen and switch Traffic to ON (see [Figure 12-6](#Chapter12.html#fig_12_6)).
    Back on the map, you’ll notice that green, yellow, and red lines have appeared
    over some of the roads (see [Figure 12-30](#Chapter12.html#fig_12_30)).


    Just how on Earth does the Maps app know what the current traffic conditions are?
    Most major U.S. cities have sensors embedded in the highways and major roads.
    These sensors feed data back, in real time, to the Department of Transportation
    (DOT). The DOT uses this information to update digital traffic signs that report
    local traffic conditions (such as those bright Broadway-like signs that hang from
    overpasses on major metro highways that tell you how long it will take to get
    to a certain exit). The DOT also shares this data, which Google collects and uses
    to display near real-time traffic maps.


    ![images](images/1230.jpg)


    **Figure 12-30.** *Traffic overlays on the map*


    Green lines indicate traffic is flowing at least 50 mph. Yellow lines mean that
    traffic is flowing between 25 and 50 mph. Red highways mean that traffic is moving
    below 25 mph. A gray route indicates that traffic data is not available for that
    street or highway.


    The traffic feature is limited to certain regions, mostly major metropolitan areas
    in the United States, France, Britain, Australia, and Canada; however, new cities
    and countries are frequently added. If you don’t see traffic conditions, try zooming
    out on the map. If you still don’t see any, they aren’t available in your area
    yet.


    ### Maps in Other Apps


    You aren’t limited to using only the Maps app if you want to see or use maps on
    the iPad. Several other iPad apps allow you to navigate and search their own maps,
    as well as use maps for other things. Here are just a few.


    #### Flixster


    Flixster is a popular iPad app that allows you to look up movies in your area.
    Among its many features, the app shows you a list of theaters near you—based on
    your current location—and shows you the location of the theater on the app’s built-in
    Google map. It’s free in the App Store.


    #### The Weather Channel


    The Weather Channel app is a versatile app that shows you all the weather information
    you could dream of. It also uses a built-in Google map that displays overlays,
    including Doppler Radar, cloud coverage, temperatures, rain, and UV index maps
    (see [Figure 12-31](#Chapter12.html#fig_12_31)). It’s free in the App Store.


    ![images](images/1231.jpg)


    **Figure 12-31.** *The Weather Channel app’s map overlays*


    #### Ndrive US HD


    Ndrive is a powerful navigation app for the iPad. It uses its own built-in mapping
    software and stores map data on your iPad, so you can use it without an Internet
    connection. You can use the app to plan routes, get step-by-step directions, and
    locate more than 1.5 million points of interest. It’s $4.99 in the App Store.


    #### UpNext 3D Cities


    UpNext gives you maps of New York City, Washington D.C., and San Francisco, among
    others, in 3D. Swipe and zoom on the 3D maps, and touch a building to find out
    what businesses are inside (see [Figure 12-32](#Chapter12.html#fig_12_32)). It’s
    an amazing app and shows you where the future of personal mapping apps is going.
    It’s free in the App Store.


    ![images](images/1232.jpg)


    **Figure 12-32.** *Touchable 3D buildings in UpNext 3D Cities*'
