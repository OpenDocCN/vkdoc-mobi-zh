  trans: '

    ### 创建 Genius 播放列表


    `Genius` 是 iTunes 中的一项功能，能自动找到你音乐资料库中风格相近的歌曲。它通过匹配节奏、节拍、歌手、音乐类型以及网络数据来实现这一点。`Genius`
    播放列表是指当你对正在收听的歌曲运行`Genius`功能后生成的歌曲列表。


    你可以在电脑上或 iPad 上的 iTunes 中创建 `Genius` 播放列表。不过，要启用`Genius`功能，你首先需要在电脑上通过 iTunes
    打开它。具体操作是：在电脑上启动 iTunes，进入 `Store` 菜单，然后选择 `Turn on Genius`。你需要使用 iTunes Store
    账户登录（关于创建 iTunes 账户，请参见第 8 章），才能访问`Genius`功能。输入你的用户名和密码，同意条款与条件，然后静待 Apple 分析你的音乐资料库。


    你可以通过两种方式创建 `Genius` 播放列表：


    - 点击 iPod 应用主屏幕底部的 `Genius` 图标（参见图 7–17）。该图标看起来像一个被电子环绕的原子。如果没有歌曲正在播放，系统会像创建播放列表时一样，显示一个歌曲列表。点击一首歌曲，将其作为创建`Genius`播放列表的基础。

    - 在“正在播放”窗口中，点击底部栏中央的 `Genius` 图标（参见图 7–20）。


    一个名为 `Genius` 的新播放列表会出现在你的音乐资料库源列表中。在其歌曲列表中，你可以滚动浏览，查看`Genius`挑选出了哪些歌曲。该播放列表通过歌曲列表顶部的三个按钮提供三个选项：


    - **新建**：点击 `New` 开始创建一个全新的 `Genius` 列表。iPod 应用会显示一个歌曲列表供你选择新歌曲。选择你想要作为播放列表基础的歌曲，然后让内置的`Genius`功能开始工作。

    - **刷新**：点击 `Refresh` 可以围绕你最初选择的歌曲重建 `Genius` 播放列表。这允许你保留相同的播放列表风格，但会更新一批与该主题匹配的曲目选项。如果你正在锻炼并播放完了列表，但想继续听与刚才相同类型的歌曲，这个功能非常棒。

    - **保存**：`Genius` 是否生成了一组你绝对喜欢、想保留下来反复播放的精彩歌曲集？点击 `Save` 可将你的 `Genius` 播放列表保存下来以供日后使用。点击
    `Save` 后，播放列表的名称会从 `Genius` 变为你当初选择用来创建该列表的那首歌的名称。


    ### 编辑 `Genius` 播放列表


    `Genius` 播放列表提供以下两个管理选项。当选中 `Genius` 播放列表时，这两个选项会以按钮形式出现在歌曲列表上方。


    - **刷新**：点击 `Refresh` 会用基于你最初选择的全新歌曲填充 `Genius` 播放列表。使用此选项，你可以在切换音乐的同时保持主题不变。列表中之前的所有歌曲都会被移除，但仍保留在你的音乐资料库中。

    - **删除**：点击 `Delete` 后，源列表中 `Genius` 播放列表名称旁会出现一个白底红字的减号 (−) 按钮。点击减号按钮可从 iPad
    上移除该播放列表，然后点击 `Genius` 播放列表名称右侧出现的红色 `Delete` 按钮以确认删除。系统会弹出一个窗口，警告你删除 `Genius`
    播放列表将会在下次同步时将其从电脑的 iTunes 资料库中删除。点击 `Delete` 确认删除。


    **注意：** 一旦 `Genius` 播放列表同步回电脑上的 iTunes，你将无法在 iPad 上删除它。你唯一的选择是 `Refresh`。如果你想删除该
    `Genius` 播放列表，必须通过电脑上的 iTunes 进行操作。


    ## 播放 Genius 混合曲


    在 iPad 上探索音乐的另一种方式是播放 `Genius` 混合曲。`Genius` 混合曲与 `Genius` 播放列表类似，但你无法控制其中出现哪些歌曲，而且每次播放时歌曲都会变化。


    在电脑上，当你启用 `Genius` 功能时，iTunes 会自动创建 `Genius` 混合曲。`Genius` 混合曲基于音乐类型和格式，而不是像 `Genius`
    播放列表那样基于单首歌曲。你可以拥有任意数量的不同混合曲——这完全取决于你的 iTunes 资料库中拥有的歌曲类型。`Genius Mixed` 的例子包括朋克混合曲、流行混合曲、古典跨界混合曲、民谣混合曲……名单可以一直列下去。


    要播放 `Genius` 混合曲，请点击源列表中的 `Genius Mix`。iPad 会显示一系列 `Genius` 混合曲，每个混合曲由四个专辑封面组成一个方块来表示（参见图
    7–27）。这些封面代表了该混合曲中包含的歌曲样本。要开始播放一个混合曲，点击它即可。该混合曲的四封面图标会变成混合曲中当前正在播放歌曲的专辑封面。


    ![images](img/0727.jpg)


    **图 7–27.** *iPad 上的 `Genius` 混合曲让您能够收听按音乐类型自动生成的合集音乐。*


    在混合曲播放时，你的导航选项有限。你不会看到混合曲中的歌曲列表，只能通过“前进”和“后退”按钮在歌曲之间切换。当前正在播放的专辑仍会显示在“正在播放”屏幕上。


    ## 播放播客、有声读物和 iTunes U 课程


    如果你已将播客、有声读物和 iTunes U 课程同步到 iPad，这些类别会连同其他播放列表一起显示在 iPod 应用资料库的源列表中。要查看每个类别中可用的项目，只需点击该类别名称即可。与音乐不同的是，在项目列表中无法对播客、有声读物和
    iTunes U 课程进行排序。


    对于播客和 iTunes U 课程，点击该系列或课程，然后选择剧集或课程开始播放该内容。要播放有声读物，请在列表中点击你选择的有声读物。


    当你选择一个播客、有声读物或 iTunes U 课程时，“正在播放”屏幕会出现。虽然这个屏幕与音乐的“正在播放”屏幕相似，但有一些细微的差别（参见图 7–28）。


    ![images](img/0728.jpg)


    **图 7–28.** *播客、有声读物和 iTunes U 课程的“正在播放”屏幕提供了几个音乐的“正在播放”屏幕所没有的额外功能。*


    ### “正在播放”屏幕


    如你所见，“正在播放”屏幕的布局与音乐播放时的布局相同（参见图 7–28）。然而，它提供了一些新功能：


    - **电子邮件**：点击进度条左侧的信封图标，可通过电子邮件分享当前播放播客的链接。

    - **音频速度按钮**：点击 `1X` 图标一次，它会变成 `2X` 图标。这会使音频播放速度加倍。点击 `2X` 图标，它会变成 `1/2X` 图标。这将以正常速度的一半播放音频，如果你觉得对话语速太快难以跟上，这会很有帮助。点击
    `1/2X` 图标，它会变回 `1X` 图标，使音频播放速率恢复正常。

    - **30 秒按钮**：此按钮出现在屏幕底部中央。其标识是数字 `30` 和环绕它的逆时针双箭头。点击此按钮可在播客或有声读物中回跳 30 秒。此功能让你无需使用进度条进行倒带，因为进度条倒带可能会让你跳回比预期远得多的位置。如果你走神了，错过了刚才说的内容，快速点击
    30 秒倒带按钮就能让你迅速跟上。

    - **专辑视图按钮**：该按钮看起来像一个三项项目符号列表，也出现在音乐的“正在播放”屏幕中，但视图本身不同。在播客、有声读物或 iTunes U 课程中，专辑视图会分别显示所有剧集、章节或课程的列表。

