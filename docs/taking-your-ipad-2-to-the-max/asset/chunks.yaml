    You may want to either contact your Internet service provider or IT department
    to retrieve your password if you don’t remember it or have the password reset
    to something more memorable. Once set on your iPad, you will not need to reenter
    it. It is stored securely in your system’s “key chain,” a private way that your
    iPad remembers important information.

    *   *Server information*: Some accounts will be set up automatically by Mail.
    In other words, it will know whether your server is an Exchange server, POP server,
    or IMAP server, and it will adjust settings accordingly. However, it’s a very
    good idea to get this information before you start and keep it for your records.


    The information to gather includes server addresses (your e-mail provider may
    refer to this as a server URL) for both your incoming e-mail server (usually prefaced
    with POP or IMAP) and your outgoing (usually SMTP) server. The e-mail provider
    may also require that your mail be channeled through specific Internet Protocol
    ports for security reasons, so requesting port information prior to setup can
    save headaches later.


    Although port 587 is a standard for secure SMTP connections, some connections
    use ports 25 (SMTP), 110 (POP3), 143 (IMAP), 993 (SSL-encrypted IMAP), 995 (SSL-encrypted
    POP), and 465 (SSL-encrypted SMTP), among others. Exchange setup also requires
    a domain name, which can be as simple as a word—`HOST`—or as complicated as `host.admin.mycompany.com`.


    The following steps demonstrate how to set up a Gmail account, one of the most
    common types of e-mail accounts available. Although each brand of e-mail account
    may vary in the amount of information required for setup, the setup procedure
    for all brands is basically the same on the iPad, so you should be able to follow
    these steps to set up an account other than Gmail:'
  trans: '

    #### 同步邮件账户


    使用 iTunes 中的“信息”选项卡同步邮件账户，是在 iPad 与 Mac 或 Windows 电脑上设置所有电子邮件账户的最快捷方式。使用`基座接口转
    USB 连接线`将 iPad 连接到 Windows 电脑或 Mac 电脑，然后在电脑上启动`iTunes`（如果尚未打开）。在`iTunes`中，于源列表（屏幕左侧的蓝色列）中找到您的设备。点击代表您
    iPad 的图标，然后打开屏幕顶部的`信息`选项卡。`信息`选项卡提供了一种将信息（包括邮件账户、通讯录联系人和日历）从电脑同步到设备的简便方法。向下滚动，直到看到`同步邮件账户`字样（请参见图
    11-1）。


    ![images](img/1101.jpg)


    **图 11-1.** *您的 Mac 或 Windows 电脑上是否已经设置了多个电子邮件账户？`iTunes` 提供了一个易于使用的界面，用于将这些邮件账户同步到您的
    iPad，从而实现快速可靠的设置。*


    每个账户名称的左侧都有一个复选框。要启用电脑与 iPad 之间的邮件账户同步，请选中`同步邮件账户`复选框（参见图 11-1 屏幕截图的左上角），勾选您想要在
    iPad 上设置的每个邮件账户的复选框，然后点击`iTunes`窗口右下角的`同步`或`应用`按钮。


    关于同步邮件账户，需要记住重要的一点：此过程仅同步您的账户*设置*，而不是可能存储在邮件服务器上的账户*邮件*。这一点很重要，因为您的 iPad 检索邮件的方式取决于其设置所使用的协议。


    `邮局协议版本 3`（`POP3`，通常简称为`POP`）邮件账户通常配置为将电子邮件下载到您的电脑或设备，并从邮件服务器上删除。这种“下载即删除”的过程意味着，当您在
    iPad 上接收基于 POP 协议的电子邮件时，您将永远不会在电脑上看到它。


    相比之下，当您的邮件账户未设置为从邮件服务器删除邮件时（如大多数默认的`IMAP`或`Exchange`账户设置），您将在 iPad 和电脑上都保留一份副本，并且从一台设备上删除邮件不会从另一台设备上删除。您可以在任一设备上阅读邮件，唯一改变的是邮件状态，从未读变为已读。


    Apple 的`MobileMe`邮件，如同其他`互联网消息访问协议`（`IMAP`）邮件系统一样，会保留邮件，直到您手动删除它们。这意味着，使用`MobileMe`时，您将在多台设备上看到该邮件，且它们的状态都相同。未打开的邮件在所有设备上都将显示为未打开状态，已读邮件则在所有设备上都显示为已读。


    微软的`Exchange Server`在企业中被广泛使用，因此了解 Mail 对此电子邮件标准提供了出色的支持非常重要。`Exchange`提供推送邮件功能（本章稍后讨论），可实现近乎即时地接收传入邮件。iPad
    完全支持`Exchange Server 2003`和`Exchange 2007`的同步，并且也将支持`Exchange 2010`。


    虽然在 iPad 上设置`Exchange`账户并不比其他类型的电子邮件配置更困难，但令人欣慰的是，大多数使用`Exchange`的组织也可以在您遇到问题时为使用
    iPad 的客户提供技术支持。


    如果您有兴趣使用`Exchange`来托管您的 iPad 电子邮件，但没有相应的技术专长来配置和维护`Exchange Server`，全球有许多可用的`Exchange`托管服务。在互联网上搜索`Exchange
    Server`会显示许多为您托管`Exchange`的公司。


    #### 直接在 iPad 上设置邮件账户


    当您只需要设置一两个电子邮件账户，并且您无法（例如，当您不在办公室时）或不想在 iPad 和电脑之间同步账户信息时，您*可以*直接在 iPad 上设置邮件账户。这虽然不如从电脑同步账户那样简单易行，但也不算太难，以至于您无法在需要时随时随地进行设置。


    在开始设置账户之前，请确保手头有以下信息。这些信息通常可以在您的互联网服务提供商的支持页面上找到，位于有关配置电子邮件的部分下。


    *   *您的电子邮件服务提供商名称*：常见的提供商包括 Apple 自家的`MobileMe`服务、Google 的`Gmail`、雅虎`Mail`、`AOL`，或`Comcast`和`Time
    Warner`等互联网服务提供商。

    *   *您的电子邮件地址*：所有电子邮件地址都采用常见的`myname@domain.tld`格式，其中`myname`是个人或公司的名称或化名，`domain`是组织使用的域名，`tld`是该域名的“顶级域”（例如`.com`、`.gov`、`.edu`等）。

    *   *您的电子邮件密码*：这是设置电子邮件账户最关键的信息，但令人惊讶的是，很少有人记得自己的密码！这是因为许多 IT 部门为了增强整体安全性，会创建包含数字和符号的特别复杂的密码。当然，最终结果是许多人将那个复杂的密码写在便利贴上，并贴在显示器上，从而完全违背了设置“复杂密码”的初衷。


    如果您不记得密码，可能需要联系您的互联网服务提供商或 IT 部门来获取密码，或者将密码重置为更容易记住的内容。一旦在 iPad 上设置好，您就无需重新输入。密码会安全地存储在您系统的“钥匙串”中，这是
    iPad 记住重要信息的一种私密方式。


    *   *服务器信息*：某些账户将由 Mail 自动设置。换句话说，它会自动识别您的服务器是`Exchange`服务器、`POP`服务器还是`IMAP`服务器，并相应地调整设置。但是，在开始之前获取此信息并将其保留以备记录是一个非常明智的做法。


    需要收集的信息包括您的接收邮件服务器（通常以`POP`或`IMAP`开头）和发送邮件（通常是`SMTP`）服务器的服务器地址（您的电子邮件提供商可能将其称为服务器`URL`）。出于安全原因，电子邮件提供商可能还会要求您的邮件通过特定的互联网协议端口进行传输，因此在设置前请求端口信息可以避免日后的麻烦。


    虽然端口`587`是安全`SMTP`连接的标准端口，但某些连接使用端口`25`（`SMTP`）、`110`（`POP3`）、`143`（`IMAP`）、`993`（SSL
    加密的`IMAP`）、`995`（SSL 加密的`POP`）和`465`（SSL 加密的`SMTP`）等。`Exchange`设置还需要一个域名，该域名可以简单如一个单词——`HOST`——也可以复杂如`host.admin.mycompany.com`。


    以下步骤演示了如何设置一个`Gmail`账户，这是最常见的电子邮件账户类型之一。虽然每种电子邮件账户在设置时所需的信息量可能不同，但所有类型在 iPad 上的设置过程基本相同，因此您应该能够按照以下步骤设置除`Gmail`之外的账户：

    '
- fmt: '1.  在尝试设置或以其他方式与邮件交互之前，请务必确保您的 iPad 已通过 Wi-Fi 或 3G 连接至互联网。

    2.  在“设置”![images](images/U001.jpg)“邮件、通讯录、日历”中，找到“账户”；然后轻点“添加账户”。或者，如果您尚未设置任何其他账户，可以打开“邮件”应用，它将自动显示相同的设置界面。

    3.  从出现的列表中选择正确的账户类型（请参见[图11-2](#Chapter11.html#fig_11_2)）。本示例使用 Gmail。如果您在此处未看到您的电子邮件服务提供商，请轻点“其他”。使用预定义的账户类型可以简化设置过程，因为您通常无需添加服务器地址等额外信息。系统会自动为您提供
    Yahoo、Gmail、MobileMe 和 AOL 的服务器信息。


    ![images](images/1102.jpg)


    **图 11-2.** *当您使用列出的任一主流电子邮件服务提供商时，“邮件”会为您完成大部分设置工作。*


    4.  选择预设服务后，在设置窗口中输入您的信息（请参见[图11-3](#Chapter11.html#fig_11_3)）。指定您希望收件人看到的名称。例如，如果您的姓名是
    John Appleseed，您可以输入 John、Mr. Appleseed 或 “苹果树小哥”，收件人将通过此名称识别发件人的“真实姓名”。


    ![images](images/1103.jpg)


    **图 11-3.** *在“邮件”中设置新电子邮件账户非常容易，尤其是使用 MobileMe、Gmail 或之前列出的其他电子邮件服务提供商时。*


    5.  输入电子邮件地址。对于此电子邮件账户，地址是 `ipadmaxbook@gmail.com`。

    6.  现在输入电子邮件账户密码。与 iPad 上的所有密码字段一样，输入的密码几乎会立即被一系列圆点隐藏。

    7.  输入此账户的描述。本示例使用“Gmail for Book”来描述该电子邮件地址的用途。始终为每个电子邮件账户添加有意义的描述，尤其是在同一设备上使用多个账户时。这些简短、具描述性的名称会显示在
    iPad 上“邮件”的账户列表中，让您能够区分哪封邮件归属于哪个账户。当您使用五六个不同的 Gmail 账户时，仅靠“Gmail”这样的描述是没用的。

    8.  轻点“存储”按钮。此时，您的 iPad 会进入一个验证过程，以确保存在与电子邮件地址对应的账户、密码正确且该账户的设置正确。进度轮会告知您该过程正在进行中。如果您的
    iPad 无法建立该账户，您将在几分钟内得知，但在此步骤中您需要耐心等待。

    9.  如果一切验证无误，您将看到一个账户服务列表（请参见[图11-4](#Chapter11.html#fig_11_4)）。这些服务因提供商而异，您可以选择需要通过无线网络同步的服务。选择您的服务，然后轻点服务弹出窗口右上角的“存储”。选择服务并返回到“设置”中的电子邮件账户列表后，新账户将出现并添加到列表底部。


    ![images](images/1104.jpg)


    **图 11-4.** *账户服务因提供商而异。Gmail 允许您为账户激活邮件、日历和备忘录服务。*


    如果设置过程中出现错误，您的 iPad 会通知您。在大多数情况下，是由于电子邮件地址或密码输入错误；或者，如果使用“其他”选项手动设置账户，可能是服务器地址输入有误。“邮件”在使
    iPad 上的电子邮件设置变得简单方面做得非常出色，因此大多数情况下，您只需几分钟即可完成设置。设置完成后，大多数人无需再更新其账户。但是，如果您以后需要更改设置该怎么办？


    在 iPad 的“设置”![images](images/U001.jpg)“邮件、通讯录、日历”下，您会找到每个电子邮件账户对应的按钮。轻点该按钮可打开详细显示视图，查看已启用服务的概况。轻点“账户”行可查看账户信息设置，以及“高级”选项的进一步链接（请参见[图11-5](#Chapter11.html#fig_11_5)）。


    ![images](images/1105.jpg)


    **图 11-5.** *账户信息屏幕中列出了每个账户的信息，包括显示给收件人的名称、“邮件”中的账户名称以及完整的电子邮件地址。轻点“SMTP”或“高级”以调整您的账户设置详情。*


    当您处于低带宽状态并希望关闭服务（无论是电子邮件账户、日历、备忘录还是其他无线服务）时，请轻点“邮件、通讯录、日历”屏幕中的账户名称以打开每个账户的设置。账户详情屏幕随即出现。将服务按钮（例如“邮件”）从“开”滑动到“关”。完成此操作后，“邮件”将不再检查该账户的电子邮件服务器，并且该账户会显示为“未激活”状态（该状态会显示在“账户”列表中每个账户名称下方）。要恢复该过程，只需将“邮件”按钮滑动到“开”即可。


    有时，您的互联网服务提供商或 IT 部门可能会要求您更改电子邮件服务器的一些设置，或者您可能在发送、接收或配置邮件时遇到问题。我们建议您使用 Apple 的便捷速查表，可从[`http://support.apple.com/kb/HT1277`](http://support.apple.com/kb/HT1277)获取，它可以帮助您从电子邮件提供商处获取正确的电子邮件账户设置，并以一种便于使用、组织良好的方式进行记录。


    对于特定电子邮件账户下的“外发邮件服务器”，可以编辑其设置。`SMTP`选项表示用作外发邮件主服务器的简单邮件传输协议服务器。轻点该选项，然后轻点主服务器名称，即可显示该服务器的设置（请参见[图11-6](#Chapter11.html#fig_11_6)）。当设置像[图11-6](#Chapter11.html#fig_11_6)中那样呈灰色时，说明它们是预设的、正确的，并且无法编辑。当可以编辑时，您可以使用速查表将设置更改为正确的值。


    ![images](images/1106.jpg)


    **图 11-6.** *当“外发邮件服务器”设置像本图中那样呈灰色时，说明您的设置与服务器预设一致且正确，不应更改。*


    出于安全原因，大多数邮件服务器现在都使用身份验证和特定的服务器端口。标准端口包括：POP3 服务器使用 110，POP3 over TLS/SSL 使用 995；IMAP
    使用 143，POP3 over TLS/SSL 使用 993；密码信息提交使用 587；SMTP（外发）邮件使用 25。


    身份验证意味着“邮件”必须向邮件服务器提交用户名（通常是您的电子邮件地址）和密码，然后才能将邮件下载到您的 iPad。有四种常见的身份验证类型：`MD5 Challenge
    Response`、`NTLM`、`HTTP MD5 Digest`和`Password`。如果您的密码未被正确接受，请务必向您的邮件提供商咨询此信息。


    #### 其他邮件设置


    您会在“设置”![images](images/U002.jpg)“邮件、通讯录、日历”中找到更多设置（请参见[图11-7](#Chapter11.html#fig_11_7)），您可以根据个人偏好对其进行编辑。大多数设置无需修改，但了解您可以在必要时更改它们也是令人安心的。以下部分介绍其中一些设置，并讨论它们如何影响您在
    iPad 上使用电子邮件的方式。


    ![images](images/1107.jpg)


    **图 11-7.** *更改邮件设置可以使阅读和发送电子邮件更加愉快和高效。*'
  raw: '1.  Always make sure that your iPad is connected to the Internet through a
    Wi-Fi or 3G connection before attempting to set up or otherwise interact with
    mail.

    2.  In Settings ![images](images/U001.jpg) Mail, Contacts, Calendars, look for
    Accounts; then tap Add Account. Alternatively, if you have no other accounts set
    up, you can open the Mail application and be greeted by the same setup.

    3.  Choose the proper account type from the list that appears (see [Figure 11-2](#Chapter11.html#fig_11_2)).
    This example uses Gmail. If you don’t see your e-mail service provider listed
    here, tap Other. Using a predefined account style simplifies setup, because you
    generally do not need to add extra information like server addresses. Yahoo, Gmail,
    MobileMe, and AOL server information is provided automatically for you.


    ![images](images/1102.jpg)


    **Figure 11-2.** *When you’re using any of these major e-mail service providers,
    Mail does most of the setup work for you.*


    4.  After selecting a preset service, enter your information into the setup window
    (see [Figure 11-3](#Chapter11.html#fig_11_3)). Specify the name that you would
    like recipients to see. For example, if your name is John Appleseed, you can enter
    that, John, Mr. Appleseed, or the Apple Tree Guy, and recipients will see your
    choice as the “real name” of the person who sent them e-mail.


    ![images](images/1103.jpg)


    **Figure 11-3.** *Setting up a new e-mail account is easy in Mail, especially
    using an e-mail service provider like MobileMe, Gmail, or any of the others listed
    earlier.*


    5.  Enter the e-mail address. For this e-mail account, the address is `ipadmaxbook@gmail.com`.

    6.  Now type in the e-mail account password. As with all password fields on the
    iPad, the password is hidden by a series of dots almost as quickly as you type
    it in.

    7.  Enter a description of the account. This example uses “Gmail for Book” to
    describe the purpose and use of that e-mail address. Always add a meaningful description
    for each e-mail account, especially when you use many accounts on the same device.
    These short, descriptive names show up in the list of accounts in Mail on your
    iPad and allow you to distinguish which mail corresponds to which account. A description
    like “Gmail” alone is not useful when you use five or six separate Gmail accounts.

    8.  Tap the Save button. At this point, your iPad enters a validation process
    to make sure that there is an account with that e-mail address, that the password
    is correct, and that the settings have been properly made for that account. A
    progress wheel will let you know that the process is ongoing. If your iPad cannot
    establish the account, you’ll know within a few minutes, but you do need to be
    patient during this step.

    9.  If everything checks out properly, you’ll be presented with a list of account
    services (see [Figure 11-4](#Chapter11.html#fig_11_4)). These services vary by
    provider, and allow you to choose which services you wish to be able to sync over
    the air. Select your services and click Save at the top right of the services
    pop-up. Once you have selected your services and returned to the list of e-mail
    accounts in Settings, the new account appears, added at the bottom of the list.


    ![images](images/1104.jpg)


    **Figure 11-4.** *Account services vary by provider. Gmail allows you to activate
    Mail, Calendar, and Note services with your account.*


    In case of a setup discrepancy, your iPad notifies you of the error. In most cases,
    the e-mail address or the password was mistyped or, if setting up an account manually
    using the Other option, a server address was incorrectly entered. Mail does an
    excellent job of making e-mail setup easy to do on the iPad, so in most situations
    you’ll be done with setup in a few minutes. After setup is complete, most people
    never need to update their account any further. But what if you need to change
    settings at a later date?


    You’ll find a button for each e-mail account listed under Settings ![images](images/U001.jpg)
    Mail, Contacts, Calendars on the iPad. Tapping that button opens a detail display
    view, offering a review of enabled services. Tap the Account line for account
    information settings, as well as a further link to Advanced options (see [Figure
    11-5](#Chapter11.html#fig_11_5)).


    ![images](images/1105.jpg)


    **Figure 11-5.** *Account information, including the name that is displayed to
    recipients, the name of the account in Mail, and the full e-mail address, is listed
    for each account in the account information screen. Tap SMTP or Advanced to adjust
    your account setting details.*


    When you’re in a low-bandwidth situation and wish to turn off services, whether
    e-mail accounts, calendar, notes, or other over-the-air services, open the settings
    for each account by tapping the account name in the Mail, Contacts, Calendar screen.
    An account detail screen appears. Slide the service button, Mail for example,
    from ON to OFF. After doing so, Mail no longer checks the e-mail server for that
    account, and the account shows up as Inactive. (The status appears under the name
    of each account in the Accounts list.) To reverse the process, just slide the
    Mail button to ON.


    Occasionally you may be asked by your Internet service provider or IT department
    to change some settings for the e-mail servers, or you may run into issues sending,
    receiving, or configuring Mail. We recommend using Apple’s handy cheat sheet,
    available from [`http://support.apple.com/kb/HT1277`](http://support.apple.com/kb/HT1277),
    to help you solicit the proper e-mail account settings from your e-mail providers
    and to document them in a way that offers an easy-to-use, well-organized reference.


    Under Outgoing Mail Server for a specific e-mail account, it’s possible to edit
    the settings. The SMTP option indicates the Simple Mail Transport Protocol server
    used as the primary server for outgoing e-mail. Tapping that option and then tapping
    the primary server name displays the settings for the server (see [Figure 11-6](#Chapter11.html#fig_11_6)).
    When the settings are grayed out like in [Figure 11-6](#Chapter11.html#fig_11_6),
    then they are preset, correct, and cannot be edited. When editable, you can use
    your cheat sheet to change the settings to their proper values.


    ![images](images/1106.jpg)


    **Figure 11-6.** *When the Outgoing Mail Server settings are grayed out as they
    are in this figure, then your settings are correct for the server presets and
    should not be changed.*


    For security reasons, most mail servers now use authentication and specific server
    ports. Standard ports include 110 for POP3 servers and 995 for POP3 over TLS/SSL,
    143 for IMAP and 993 for POP3 over TLS/SSL, 587 for submission of password information,
    and 25 for SMTP (outgoing) mail.


    Authentication means that Mail must submit a username (usually your e-mail address)
    and a password to the mail server before being allowed to download mail to your
    iPad. There are four common types of authentication: MD5 Challenge Response, NTLM,
    HTTP MD5 Digest, and Password. As always, check with your mail provider for this
    information if your password is not accepted properly.


    #### Other Mail Settings


    You will find many more settings (see [Figure 11-7](#Chapter11.html#fig_11_7))
    in Settings ![images](images/U002.jpg) Mail, Contacts, Calendars that you can
    edit to suit your personal preferences. Most of these settings never need to be
    touched, but it’s comforting to know that you can change them if necessary. The
    following sections introduce some of these settings and discuss how they affect
    the way you use e-mail on your iPad.


    ![images](images/1107.jpg)


    **Figure 11-7.** *Mail settings can be changed to make reading and sending e-mail
    more enjoyable and productive.*'
  trans: '

    1.  在尝试设置或以其他方式与邮件交互之前，请务必确保您的 iPad 已通过 Wi-Fi 或 3G 连接至互联网。

    2.  在“设置”![images](img/U001.jpg)“邮件、通讯录、日历”中，找到“账户”；然后轻点“添加账户”。或者，如果您尚未设置任何其他账户，可以打开“邮件”应用，它将自动显示相同的设置界面。

    3.  从出现的列表中选择正确的账户类型（请参见图 11-2）。本示例使用 Gmail。如果您在此处未看到您的电子邮件服务提供商，请轻点“其他”。使用预定义的账户类型可以简化设置过程，因为您通常无需添加服务器地址等额外信息。系统会自动为您提供
    Yahoo、Gmail、MobileMe 和 AOL 的服务器信息。


    ![images](img/1102.jpg)


    **图 11-2.** *当您使用列出的任一主流电子邮件服务提供商时，“邮件”会为您完成大部分设置工作。*


    4.  选择预设服务后，在设置窗口中输入您的信息（请参见图 11-3）。指定您希望收件人看到的名称。例如，如果您的姓名是 John Appleseed，您可以输入
    John、Mr. Appleseed 或 “苹果树小哥”，收件人将通过此名称识别发件人的“真实姓名”。


    ![images](img/1103.jpg)


    **图 11-3.** *在“邮件”中设置新电子邮件账户非常容易，尤其是使用 MobileMe、Gmail 或之前列出的其他电子邮件服务提供商时。*


    5.  输入电子邮件地址。对于此电子邮件账户，地址是 `ipadmaxbook@gmail.com`。

    6.  现在输入电子邮件账户密码。与 iPad 上的所有密码字段一样，输入的密码几乎会立即被一系列圆点隐藏。

    7.  输入此账户的描述。本示例使用“Gmail for Book”来描述该电子邮件地址的用途。始终为每个电子邮件账户添加有意义的描述，尤其是在同一设备上使用多个账户时。这些简短、具描述性的名称会显示在
    iPad 上“邮件”的账户列表中，让您能够区分哪封邮件归属于哪个账户。当您使用五六个不同的 Gmail 账户时，仅靠“Gmail”这样的描述是没用的。

    8.  轻点“存储”按钮。此时，您的 iPad 会进入一个验证过程，以确保存在与电子邮件地址对应的账户、密码正确且该账户的设置正确。进度轮会告知您该过程正在进行中。如果您的
    iPad 无法建立该账户，您将在几分钟内得知，但在此步骤中您需要耐心等待。

    9.  如果一切验证无误，您将看到一个账户服务列表（请参见图 11-4）。这些服务因提供商而异，您可以选择需要通过无线网络同步的服务。选择您的服务，然后轻点服务弹出窗口右上角的“存储”。选择服务并返回到“设置”中的电子邮件账户列表后，新账户将出现并添加到列表底部。


    ![images](img/1104.jpg)


    **图 11-4.** *账户服务因提供商而异。Gmail 允许您为账户激活邮件、日历和备忘录服务。*


    如果设置过程中出现错误，您的 iPad 会通知您。在大多数情况下，是由于电子邮件地址或密码输入错误；或者，如果使用“其他”选项手动设置账户，可能是服务器地址输入有误。“邮件”在使
    iPad 上的电子邮件设置变得简单方面做得非常出色，因此大多数情况下，您只需几分钟即可完成设置。设置完成后，大多数人无需再更新其账户。但是，如果您以后需要更改设置该怎么办？


    在 iPad 的“设置”![images](img/U001.jpg)“邮件、通讯录、日历”下，您会找到每个电子邮件账户对应的按钮。轻点该按钮可打开详细显示视图，查看已启用服务的概况。轻点“账户”行可查看账户信息设置，以及“高级”选项的进一步链接（请参见图
    11-5）。


    ![images](img/1105.jpg)


    **图 11-5.** *账户信息屏幕中列出了每个账户的信息，包括显示给收件人的名称、“邮件”中的账户名称以及完整的电子邮件地址。轻点“SMTP”或“高级”以调整您的账户设置详情。*


    当您处于低带宽状态并希望关闭服务（无论是电子邮件账户、日历、备忘录还是其他无线服务）时，请轻点“邮件、通讯录、日历”屏幕中的账户名称以打开每个账户的设置。账户详情屏幕随即出现。将服务按钮（例如“邮件”）从“开”滑动到“关”。完成此操作后，“邮件”将不再检查该账户的电子邮件服务器，并且该账户会显示为“未激活”状态（该状态会显示在“账户”列表中每个账户名称下方）。要恢复该过程，只需将“邮件”按钮滑动到“开”即可。


    有时，您的互联网服务提供商或 IT 部门可能会要求您更改电子邮件服务器的一些设置，或者您可能在发送、接收或配置邮件时遇到问题。我们建议您使用 Apple 的便捷速查表，可从[`http://support.apple.com/kb/HT1277`](http://support.apple.com/kb/HT1277)获取，它可以帮助您从电子邮件提供商处获取正确的电子邮件账户设置，并以一种便于使用、组织良好的方式进行记录。


    对于特定电子邮件账户下的“外发邮件服务器”，可以编辑其设置。`SMTP`选项表示用作外发邮件主服务器的简单邮件传输协议服务器。轻点该选项，然后轻点主服务器名称，即可显示该服务器的设置（请参见图
    11-6）。当设置像图 11-6 中那样呈灰色时，说明它们是预设的、正确的，并且无法编辑。当可以编辑时，您可以使用速查表将设置更改为正确的值。


    ![images](img/1106.jpg)


    **图 11-6.** *当“外发邮件服务器”设置像本图中那样呈灰色时，说明您的设置与服务器预设一致且正确，不应更改。*


    出于安全原因，大多数邮件服务器现在都使用身份验证和特定的服务器端口。标准端口包括：POP3 服务器使用 110，POP3 over TLS/SSL 使用 995；IMAP
    使用 143，POP3 over TLS/SSL 使用 993；密码信息提交使用 587；SMTP（外发）邮件使用 25。


    身份验证意味着“邮件”必须向邮件服务器提交用户名（通常是您的电子邮件地址）和密码，然后才能将邮件下载到您的 iPad。有四种常见的身份验证类型：`MD5 Challenge
    Response`、`NTLM`、`HTTP MD5 Digest`和`Password`。如果您的密码未被正确接受，请务必向您的邮件提供商咨询此信息。


    #### 其他邮件设置


    您会在“设置”![images](img/U002.jpg)“邮件、通讯录、日历”中找到更多设置（请参见图 11-7），您可以根据个人偏好对其进行编辑。大多数设置无需修改，但了解您可以在必要时更改它们也是令人安心的。以下部分介绍其中一些设置，并讨论它们如何影响您在
    iPad 上使用电子邮件的方式。


    ![images](img/1107.jpg)


    **图 11-7.** *更改邮件设置可以使阅读和发送电子邮件更加愉快和高效。*

