- fmt: '# Cut, Copy, Paste, and Copy Style


    `Cut`, `Copy`, and `Paste` work just like they do in any word processing program
    on a Mac or Windows computer. It''s possible to cut a word or phrase out and paste
    it somewhere else or to copy text to paste in another location. `Copy Style` copies
    the existing style of the text. For example, if you create your own style for
    a word by using bold and underlining it, you can apply bold and underlining to
    any other text by copying the style of the word and then pasting the style (which
    appears when you''ve copied a style) to another selected word or phrase.


    # Replace and Definition


    `Replace` assumes that you''ve misspelled a word and displays possible replacements
    to apply. Tapping one of the replacement words inserts it in place of the existing
    word. `Definition` provides a one-tap dictionary lookup. When you select `Definition`,
    a pop-up appears with the dictionary definition of the word (see [Figure 14–4](#Chapter14.html#fig_14_4)).


    ![images](images/1404.jpg)


    **Figure 14–4.** *Definition provides a way to determine the meaning of any word
    without needing to quit Pages and move to another app.*


    # Justifying Text


    Moving down the Style ruler, you come upon a set of icons covered with lines.
    From left to right, these are left-justify, center, right-justify, and fully justify
    text. The final button, the one that looks like an arrow pointing at a wall, pops
    up a menu from which you can apply tabs or breaks (see [Figure 14–5](#Chapter14.html#fig_14_5)).


    ![images](images/1405.jpg)


    **Figure 14–5.** *The final button on the Style ruler is used to apply tabs, line
    breaks, column breaks, and page breaks.*


    Applying a tab to the beginning of a line of text can be used to indent the text
    by half-inch increments. A line break ends the existing line of text and moves
    the insertion point (where new text appears) down a line. Column breaks work only
    when you have set up the document with more than one column, in which case applying
    a column break moves text located after the insertion point to the next column.
    Finally, a page break starts writing text on a new page.


    **NOTE:** If you''re using an external Bluetooth or USB keyboard or the Apple
    Keyboard Dock, you can use the Tab key in place of the Tab button. Other buttons
    on the top of the keyboard provide varying functions, including setting sound
    volume and increasing or decreasing the brightness of the iPad display.


    If you''d like to set tabs at various points on the ruler, just tap the ruler
    and then drag the tab to the appropriate point. Now when you tap the Tab button
    several times in succession, it will jump between the tab points that you have
    set. A right tab, meaning that text is moved to the right of the tab point, is
    set by default. Double-tapping a tab once turns it into a center tab (text centered
    around the tab point), and double-tapping a tab twice converts a tab into a left
    tab (text aligned to the left of the tab).


    The Style ruler also displays adjustable margins and a first-line indent tool.
    The small upward-pointing arrows (see [Figure 14–6](#Chapter14.html#fig_14_6))
    indicate the margins, which default to 1 inch from each side of a traditional
    8.5×11-inch sheet of paper. Those margins can be moved left or right depending
    on your needs. The first line of a paragraph can be indented by dragging the indent
    tool (the small rectangular block above the left margin indicator on a new page)
    to the right.


    ![images](images/1406.jpg)


    **Figure 14–6.** *Indent the first line of a paragraph by dragging the indent
    tool (the rectangular tool at 1.5 inch) to the right. Several right tabs are visible
    in this image as well.*


    ## Renaming a Pages Document


    Moving back to My Documents by tapping the `My Documents` button, you can rename
    the "Blank" document by tapping the name that shows up beneath the image of the
    document. Type a new name, and then tap `Done` to save the name ([Figure 14–7](#Chapter14.html#fig_14_7)).


    ![images](images/1407.jpg)


    **Figure 14–7.** *Renaming your document helps identify it uniquely in the My
    Documents view in Pages.*


    ## The Pages Toolbar


    Now let''s look at some of the other tools on the toolbar above the Style ruler.
    As we mentioned earlier, the `Undo` button lets you correct mistakes. In fact,
    it can correct a lot of mistakes—each time you tap `Undo`, another earlier action
    you took in Pages is undone.


    After you read the following descriptions of the many other tools available to
    you in Pages and begin working with the app, you''ll discover how powerful this
    iPad word processor and page layout tool can really be.


    ### Info


    Migrating across the toolbar past the document name, you come to a small round
    icon that looks a lot like the international sign for information—a lowercase
    `i`. Apple calls this the `Info` button, and depending on what is currently selected
    on your iPad, text or an object, it provides different capabilities.


    For text, the `Info` button gives you the tab choices of `Style`, `List`, and
    `Layout`, as shown from left to right in [Figure 14–8](#Chapter14.html#fig_14_8).


    ![images](images/1408.jpg)


    **Figure 14–8.** *The Info button is your portal for changing style, list, and
    layout settings.*


    The `Style` tab reiterates the text styles you saw earlier; it allows bolding,
    italicizing, underlining, or striking through text and also (at the very bottom;
    they''re not visible in [Figure 14–8](#Chapter14.html#fig_14_8)) text options
    such as size, color, and font. The `List` tab sets lists as bulleted, lettered,
    numbered, or bulleted with an image. Use the large arrows to increase or decrease
    the indentation of list items in formatted outlines. The `Layout` tab is another
    way to apply alignment to a document, set it up with up to four columns, or adjust
    the line spacing.


    For objects (images, charts, tables, or shapes), the `Info` button changes to
    show the `Style`, `Text`, and `Arrange` tabs (see [Figure 14–9](#Chapter14.html#fig_14_9)).


    ![images](images/1409.jpg)


    **Figure 14–9.** *Objects and text can be styled or arranged using the Info button.*


    When applied to an object, the `Style` tab adds a variety of frames, shadows,
    and reflections to provide a sense of depth to the object. The `Style` tab provides
    a number of options, including turning an image border on or off, scaling the
    border, changing the line type from whole to dashed, and choosing from a dozen
    different frames. The `Text` tab applies styles to text that is entered into an
    object. The `Arrange` tab moves an object backward or forward compared to other
    objects, allows you to flip an object vertically and horizontally, allows you
    to do some in-document cropping of images with masks, and allows you to set how
    text wraps around the object.


    When we discuss Numbers, you''ll learn about some other uses of the `Info` button,
    such as for setting options for charts and shapes.'
