    # 同步备忘录


    如果你在 iPad 上记笔记，可能希望能在 Mac 或 Windows 电脑上使用这些笔记。有几种方法可以将它们转移到个人电脑上——要么使用我们之前提到的邮件按钮将它们发送给自己，要么使用备忘录同步功能。


    要设置备忘录同步，请在你的电脑上启动`iTunes`，然后使用 USB 数据线将 iPad 连接到电脑，如第 2 章所述。当你的 iPad 名称出现在电脑`iTunes`窗口左侧的`设备`列表中时，点击它，然后点击`信息`标签。向下滚动窗口少许，你会看到一个含义不明的`其他`标题（参见图
    10-5 和 10-6）。在该标题下方，就是你要找的复选框。


    请务必注意图 10-5 中显示的警告。如果你的 iPad 正在通过`MobileMe`与电脑进行无线同步，并且你同时决定使用 USB 数据线进行本地同步，你的电脑上可能会出现重复的备忘录。


    ![images](img/1005.jpg)


    **图 10-5.** *iTunes 中“信息”下的“其他”部分包含一个用于将备忘录从 iPad 同步到 Mac 的复选框。*


    ![images](img/1006.jpg)


    **图 10-6.** *在 Windows 版 iTunes 的“其他”部分下，你可以找到用于与 Outlook 同步备忘录的复选框。*


    要将备忘录从 iPad 同步到电脑，选中该复选框，然后点击`iTunes`窗口右下角的`同步`按钮。


    那么，现在你已经将所有备忘录同步到电脑上了——它们在哪里呢？奇怪的是，Mac 上并没有类似的应用程序，因此备忘录最终会出现在`邮件`中。在你的 Mac 上启动`邮件`，然后查看`邮件`窗口左侧的边栏（参见图
    10-7）。


    看到`提醒事项`标题了吗？它下面有一个来自 iPad 的`备忘录`图标的小型复制品。点击该图标，你会看到两个更多记事本——一个写着“在我的 Mac 上”，另一个写着“MobileMe”。点击`在我的
    Mac 上`图标，你创建的备忘录就在那里。


    在 Windows 电脑上，备忘录会同步到 Microsoft Outlook 2003、2007 或 2010（参见图 10-8）。要在 Outlook
    中查看同步的备忘录，请点击`备忘录`按钮。


    ![images](img/1007.jpg)


    **图 10-7.** *在 iPad“备忘录”中创建的文本会同步到 Mac 的“邮件”。*


    ![images](img/1008.jpg)


    **图 10-8.** *在 iPad“备忘录”中创建的文本会同步到 Windows 电脑上的 Microsoft Outlook 2003、2007 或
    2010。*


    这些备忘录是完全同步的，因此如果你选择在 Mac 或 Windows 电脑上修改其中一个或创建一个新的，更改或新文件会在下次同步时转移到 iPad 上。同样，你在
    iPad 上所做的任何更改、添加或删除，都会反映在你的电脑上。


    那么，那个`MobileMe`图标是怎么回事？如果你拥有 Apple 的`MobileMe`账户，你可以在各种设备和不同位置同步你的备忘录。最初，在电脑和
    iPad 之间同步备忘录的唯一方式是通过那种硬连线的 USB 连接。现在，备忘录是可以无线同步的另一种内容类型。


    ## 日历


    像许多喜欢 Day-Timer 规划簿布局的人一样，我们很高兴看到 Apple 如何将单调的 iPhone 日历应用改造为 iPad 上的一款精美应用。在横屏模式下（参见图
    10-9），日历看起来非常像那个老式的 Day-Timer。


    ![images](img/1009.jpg)


    **图 10-9.** *处于“日”视图的 iPad 日历应用看起来像一本传统的纸质预约簿。*


    日历有四种视图，每种视图提供略有不同的日历信息显示方式。要在它们之间切换，请轻点日历顶部的`日`、`周`、`月`或`列表`。


    图 10-9 中显示的是“日”视图，它按小时列出当天将要发生的事件。


    在“日”视图的日历应用左侧，有一个方便的月份日历和当天所有预定约会的列表。要翻到这本虚拟预约簿的下一页，请轻点页面底部的右箭头。转到上一页只需轻点左箭头。你也可以在两个箭头之间显示的当前月日期上，用手指来回拖动，以导航到特定日期。


    如果在日历中这样来回切换让你感到迷失，应用左下角有一个“今天”按钮，可以快速跳转到当天。在我们讨论添加或搜索日历事件之前，先来看看其他可用的日历视图。


    “周”视图（参见图 10-10）有助于规划特定一周内需要完成的任务。日历顶部列出的任何项目都是全天事件，而彩色方框则表示会议的起止时间和持续时间。一周中的各天横列在顶部，一天中的小时数则列在左侧。要滚动查看一天中更早或更晚的时间（日历一次只显示每天的
    12 小时），请用手指向上或向下滚动。


    看到大约下午 4 点处带有横线的小图钉了吗？那表示当前时间，这样你就能一眼看出距离下一次约会还有多少时间。日历的另一个功能是左上角的“邀请收件箱”。如果有人使用`iCal`或其他日历应用向你发送了活动邀请，当你轻点`邀请收件箱`按钮时，它就会被列出。你可以查看邀请详情、接受或拒绝邀请，所有这些操作都可以在
    iPad 上的这一个地方完成。


    ![images](img/1010.jpg)


    **图 10-10.** *使用日历应用的“周”视图，一览一周的安排*


    “周”视图在页面底部列出了十个一周时间段，你可以轻点其中任何一周，或向左/右滑动手指来查看前几周或后几周。


    “月”视图（参见图 10-11）提供了那种已作为桌面台历销售多年的“概览月历”风格。在这里，一个月中的每次约会都由特定日期上的一个小圆点表示。要获取约会的详细信息，只需轻点该圆点，就会出现一个弹出箭头，其中包含约会时间和一个编辑按钮。


    ![images](img/1011.jpg)


    **图 10-11.** *你可以在日历应用的“月”视图中查看整个月的约会。轻点一个约会打开箭头弹出框，以查看详情或编辑该事件。*


    页面底部的区域会变为一年中各月的列表，只需轻点一下手指即可跳转到特定月份。还有按钮可以轻点导航到上一个月和下一个月，以及指向之前和之后年份的链接。


    最后一个视图是“列表”视图（参见图 10-12），它在页面左侧以可滚动列表的形式显示即将到来的约会，同时在右侧显示当前事件的详细视图。


    ![images](img/1012.jpg)


    **图 10-12.** *iPad 日历应用中的“列表”视图显示即将到来的约会列表（左）以及你轻点任何约会的详细信息（右）。*


    轻点左侧列表中的任何约会，将在右侧显示该事件的详细信息。设置的任何提醒都会被列出，以及与事件相关的备注。如果其他人向你发送了约会并且你已接受，详细视图还会显示最初是谁发送了该约会，并列出其他已接受活动邀请的人，以及已受邀但尚未回复的人。

