- fmt: '#### The Movies Tab


    The iTunes Store offers a large collection of movies available for rent or purchase
    that you can download and sync to your iPad. The Movies tab, shown in [Figure
    2–19](#Chapter02.html#fig_2_19), gives you several ways of getting your movies
    onto the iPad.


    ![images](images/0219.jpg)


    **Figure 2–19.** *The Movies tab allows you to select which movies you want to
    sync to your iPad.*


    To sync your movies, first make sure the `Sync Movies` check box is selected.
    You’ll see a check box on the Movies tab. If you leave this checkbox empty, iTunes
    will not synchronize movie content to your iPad.:


    *   **Automatically include … movies**: If this check box is selected, you’ll
    be able to access a drop-down list of preset options to make your movie syncing
    experience easier. From the drop-down list, you can select to sync all your movies
    (not a good idea, because one hour of video can take up to half a gigabyte of
    space) or, if you’d like to go the space-saving route, select the 1, 3, 5, or
    10 “most recent movies” preset. You also have the option of selecting the “all
    unwatched” movies preset, which will add all the movies in your library that you
    have not watched yet. Other preset options include syncing 1, 3, 5, or 10 of your
    “most recent unwatched movies” or 1, 3, 5, or 10 of your “least recent unwatched
    movies.”


    #### The TV Shows Tab


    As it does with movies, the iTunes Store offers large collections of TV shows
    available for purchase and download. All of these shows can be synchronized to
    and played back on your iPad. You can purchase episodes *à la carte*or buy a Season
    Pass. With this pass, you pay for the entire season at once, often at a slight
    discount, and the new shows automatically download as they become available.


    To sync your TV shows, first make sure the `Sync TV Shows` check box is selected
    (see [Figure 2–20](#Chapter02.html#fig_2_20)).


    ![images](images/0220.jpg)


    **Figure 2–20.** *The TV Shows tab allows you to select which shows you want to
    sync to your iPad.*


    The following options appear on the TV Shows tab:


    *   **Automatically include … episodes of …**: If this check box is selected,
    you’ll be able to access a drop-down list of preset options to make your TV show
    syncing experience easier. From the drop-down lists you can select to sync all
    your TV shows (again, not a good idea if you have a lot, because one hour of video
    can take up to half a gigabyte of space). You also have an “all unwatched” option
    as well as several presets, including syncing only the newest shows, the newest
    unwatched shows, or the oldest unwatched shows. With all these options, you can
    apply the preset to all shows or just selected TV shows.

    *   **The Shows and Episodes boxes**: If the “Automatically include” check box
    is selected and set to anything but “all,” you also have the option of selecting
    additional TV shows from your iTunes library in these boxes (see [Figure 2–21](#Chapter02.html#fig_2_21)).
    With the “Automatically include” check box deselected, you’ll be able to manually
    select as many or as few of your TV shows as you want in these boxes.


    ![images](images/0221.jpg)


    **Figure 2–21.** *The Shows box allows you to select TV series to sync to your
    iPad. In the Episodes box to the right, you can select which episodes of the series
    to sync.*


    #### The Podcasts Tab


    Many people use iTunes to subscribe to their favorite podcasts. *Podcasts* are
    audio programs delivered over the Internet, much as TV shows are delivered over
    the airways. Numerous podcasts are available these days, including entertainment,
    advice, how-to shows, and much more. iTunes monitors your podcast subscriptions
    and can automatically download new shows when they become available. The Podcasts
    tab lets you control which shows are synchronized to your iPad.


    The Podcasts tab, as shown in [Figure 2–22](#Chapter02.html#fig_2_22), has a similar
    look and feel as the Movies and TV Shows tabs.


    ![images](images/0222.jpg)


    **Figure 2–22.** *The Podcasts tab allows you to select which podcasts you want
    to sync to your iPad.*


    To sync your podcasts, first make sure the `Sync Podcasts` check box is selected.
    You’ll find these items on the Podcasts tab:


    *   **Automatically include … episodes of …**: If this check box is selected,
    you’ll be able to access drop-down lists of preset options to make your podcasts
    syncing experience easier. From the right drop-down list, you can select to sync
    all your podcasts or selected items. Syncing all your podcasts won’t take up as
    much room as syncing all your movies or all your TV shows will if the podcasts
    in question are audio-only. However, if you are downloading video podcasts, the
    same space requirements apply as with movies. In addition to the “all”/"selected"
    option, the leftdrop-down offers “all unplayed” and “all new” options as well
    as several presets, including syncing only the newest podcasts, only the most
    recent/least recent unplayed podcasts, or only the most recent/least recent new
    podcasts. With all these options, you can apply the preset to all podcasts or
    just selected podcasts.

    *   **The Podcasts and Episodes boxes**: If the “Automatically include” check
    box is selected and set to anything but “all,” you also have the option of selecting
    additional podcasts from your iTunes library in these boxes. With the “Automatically
    include” check box unselected, you’ll be able to manually select as many or as
    few of your podcasts as you want in these boxes. You can apply the same “five
    most recent” and similar options to these items as you can with other media settings.
    Since many podcasts update daily or weekly with new episodes, they can quickly
    eat up storage space. Plus, why keep around episodes that you’ve already listened
    to?


    #### The iTunes U Tab


    iTunes U is a free service offered by Apple and a wide range of educational institutions
    to disseminate educational tools such as class lectures and language courses.
    iTunes U operates much like podcasts, and getting them onto your iPad works in
    a similar way.


    To sync your iTunes U items, first make sure the `Sync iTunes U` check box is
    selected (see [Figure 2–23](#Chapter02.html#fig_2_23)).


    ![images](images/0223.jpg)


    **Figure 2–23.** *The iTunes U tab allows you to select which iTunes U collections
    you want to sync to your iPad.*


    You’ll find these items on the iTunes U tab:


    *   **Automatically include… items of …**: When this check box is selected, you’ll
    be able to access drop-down lists of preset options to make your iTunes U syncing
    experience easier. From the right drop-down list you can choose to sync all your
    iTunes U items or selected items. In addition to the “all” option, the left drop-down
    offers “all unplayed” and “all new” options as well as several presets, including
    syncing only the newest iTunes U items, the most recent/least recent unplayed
    items, or the most recent/least recent new items. With all these options you can
    apply the preset to all items or just selected items.

    *   **The Collections and Items boxes**: If the “Automatically include” check
    box is selected and set to anything but “all,” you also have the option of selecting
    additional items from your iTunes library in these boxes. With the “Automatically
    include” check box deselected, you’ll be able to manually select as many or as
    few of your iTunes U lessons as you want in these boxes.'
