- fmt: "### Search\n\nYou’ll find most of your locations through the `search` function\
    \ in the toolbar at the upper right of your screen (see Figures 12-2 and 12-3).\
    \ Tap the search field, and a Recents pop-up window and keyboard appears (see\
    \ [Figure 12-6](#Chapter12.html#fig_12_6)). Remember that if you have a hardware\
    \ keyboard synced to your iPad, the software keyboard will not appear on the screen.\n\
    \n![images](images/1206.jpg)\n\n**Figure 12-6.** *Searching maps*\n\nThere are\
    \ many ways to search for a location on your iPad. You can enter an entire address\
    \ (`1600 Pennsylvania Avenue, Washington, DC`); you can find a contact’s address\
    \ by typing in the contact’s name (`Bill Smith`); or you can find the address\
    \ for a landmark by entering its name (`Eiffel Tower`). You can even find pizza\
    \ places by entering your local ZIP code and the keyword `pizza` (`Pizza 60605`).\n\
    \nThe Recents pop-up window shows you all your recent searches, including recent\
    \ directions (see [Figure 12-7](#Chapter12.html#fig_12_7)). Tap any of the results\
    \ in the Recents list to be taken to its location. Tap the Clear button in the\
    \ Recents pop-up window to clear the Recents results list. Clearing the Recents\
    \ list ensures that no one else who uses your iPad will be able to see the locations\
    \ you have searched for. For example, if you looked up directions to a special\
    \ restaurant that you are taking your wife to for her birthday, you don’t want\
    \ her seeing it. Clearing the Recents list ensures she won’t. Be careful not to\
    \ clear the list if you are going to be frequently pulling up the same directions,\
    \ however. The Maps app can save any kind of location, whether or not it has an\
    \ address; however, it does not have the ability to permanently save direction\
    \ routes. Regardless, those routes will remain in the Recents list—for quick access—until\
    \ you clear it.\n\n![images](images/1207.jpg)\n\n**Figure 12-7.** *The search\
    \ field with the Recents list*\n\nEnter your search query, and one or more red\
    \ pins will fall onto the map. Imagine you’re taking a trip next week to Chicago\
    \ and you want get some Chicago-style pizza. Search on the criteria, `Pizza Chicago`,\
    \ and the map will show several red pins, all of them representing pizza places\
    \ in the city (see [Figure 12-8](#Chapter12.html#fig_12_8)).\n\n![images](images/1208.jpg)\n\
    \n**Figure 12-8.** *Search result pins on the map*\n\nWhen you touch one of the\
    \ red pins, you get the pin’s Information bar (see [Figure 12-9](#Chapter12.html#fig_12_9)).\
    \ The Information bar tells you the name of the establishment (a pizzeria, in\
    \ this case) and displays an icon on either side. Those icons represent the Information\
    \ window and Street view.\n\n![images](images/1209.jpg)\n\n**Figure 12-9.** *A\
    \ search result pin’s Information bar shows the name of the establishment with\
    \ a Street View icon on the left and an Information icon on the right.*\n\nYou\
    \ can also view your search results as a list. After the pins fall onto the map,\
    \ a gray circle with three lines appears in the search field next to your queried\
    \ search term. Tap the circle, and your results will be presented in a drop-down\
    \ list (see [Figure 12-10](#Chapter12.html#fig_12_10)). You can then keep tapping\
    \ names in the list and see their locations bounce to life on the map.\n\n![images](images/1210.jpg)\n\
    \n**Figure 12-10.** *The search results list*\n\n### The Information Window\n\n\
    Tap the white and blue `i` on the pin’s Information bar to make the Information\
    \ window slide open. The Information window (see [Figure 12-11](#Chapter12.html#fig_12_11))\
    \ displays information for the establishment, such as its phone number, web page,\
    \ and physical address.\n\n![images](images/1211.jpg)\n\n**Figure 12-11.** *The\
    \ Information window*\n\nThe Information window provides the following options\
    \ for a given location on your iPad:\n\n- **Image**: Depending on the establishment,\
    \ you may see a thumbnail icon of the establishment’s Street view in the Information\
    \ window. You can tap this thumbnail to be taken to Street view. You’ll see more\
    \ on that in a bit.\n- **Directions To Here**: Tap here to be taken to the Directions\
    \ toolbar. The address of the establishment will be populated in the second (end\
    \ destination) directions field. We’ll talk more about directions later in this\
    \ chapter.\n- **Directions From Here**: Tap here to be taken to the Directions\
    \ toolbar. The address of the establishment will be populated in the first (origin\
    \ destination) directions field.\n- **Phone**: This displays the establishment’s\
    \ phone number. Touch and hold to copy the number to the clipboard. Tap the phone\
    \ number to initiate a FaceTime call. FaceTime calls only work if the number is\
    \ a valid FaceTime number.\n- **Homepage**: This displays the establishment’s\
    \ web address. Tap it to close Maps and be taken to the web address in Safari.\n\
    - **Address**: This displays the establishment’s address. Touch and hold to copy\
    \ the address to the clipboard.\n- **Add to Contacts**: Tapping this button will\
    \ add the name of the establishment and its phone number, web address, and physical\
    \ address to a contact. This contact presents you with two options: `Create New\
    \ Contact` and `Add to Existing Contact`.\n\n  If you choose `Create New Contact`,\
    \ a New Contact window will slide up (see [Figure 12-12](#Chapter12.html#fig_12_12))\
    \ in the Information window, populating contact fields with information and also\
    \ allowing you to add more information to the contact. Tap `Done` to save the\
    \ new contact.\n\n  ![images](images/1212.jpg)\n\n  **Figure 12-12.** *The New\
    \ Contact window lets you add a search result’s information to your address book\
    \ from within the Maps app.*\n\n  If you choose `Add to Existing Contact`, a list\
    \ of all your contacts from your address book will slide up in the Information\
    \ window. Tap the contact you want to add the information to. The information\
    \ will be added, and the contacts list will slide away.\n\n- **FaceTime**: If\
    \ you have chosen to look up the address for a friend you already have in your\
    \ address book, you’ll see a `FaceTime` button instead of an `Add to Contacts`\
    \ button. Tapping the `FaceTime` button will bring up a dialog box that asks at\
    \ which number or e-mail address you want to FaceTime the person at. Tap which\
    \ one you want, and FaceTime will open and proceed to call your contact. Check\
    \ out [Chapter 15](#Chapter15.html#ch15) for more on FaceTime.\n- **ShareLocation**:\
    \ Tapping this button will allow you to e-mail a link of the establishment’s name,\
    \ add a Google Maps link, and attach a vCard (a virtual business card the receiver\
    \ can choose to add to an address book).\n- **Add to Bookmarks**: Tapping this\
    \ button will allow you to save the location to your Maps bookmarks. You’ll be\
    \ able to name the bookmark, so you can change `Edwardo’s Natural Pizza Restaurant`\
    \ to `My favorite pizza joint`. We’ll talk more about bookmarks in a moment.\n\
    \nTap anywhere on the map to close the Information window."
