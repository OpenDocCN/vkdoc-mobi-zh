    # 从数码相机或 iPhone 导入照片


    你也可以通过任何支持 USB 连接或使用 SD 卡的相机，将照片直接导入到 iPad。为此，你需要购买 iPad 相机连接套件（Apple Store 售价
    29 美元）。该套件包含两个适配器——一个用于通过 USB 2.0 线缆连接相机，另一个用于读取 SD 存储卡（参见图 13-2）。


    iPad 支持标准照片格式，包括 `JPEG`、`GIF`、`TIFF`、`PNG` 和 `RAW`。你可以通过 iPad 相机连接套件中的 USB 适配器将大多数相机连接到
    iPad，包括 iPhone，这样你就可以直接将 iPhone 上的照片传输到 iPad。你甚至可以连接广受欢迎的 Flip 相机系列到 iPad，但由于
    USB 供电问题，你需要先为 Flip 相机连接外部电源，再通过 USB 将其连接到 iPad。


    如果相机拍摄的视频片段是 iPad 支持的视频格式之一，你也可以通过 iPad 相机连接套件导入这些视频。iPad 支持的视频格式包括 `M4V`、`MP4`、`MOV`、`MPEG-4`
    和 `H.264`。iPad 不支持许多流行视频格式，如 `AVI` 和 `WMV`，但有无数应用程序可以让你将 `AVI` 和 `WMV` 文件转换为 iPad
    兼容格式。搜索“*WMV to iPad*”或“*AVI to iPad*”即可找到所有提供转换功能的软件。


    ![images](img/1302.jpg)


    **图 13-2.** *iPad 相机连接套件配备了一个 USB 适配器和一个 SD 卡读卡器。*


    要导入照片，请将 USB 适配器或 SD 卡适配器插入 iPad。使用 USB 适配器时，使用相机自带的 USB 线缆将数码相机连接到适配器，并将相机切换到传输模式（详情请参阅相机说明书）。要从
    iPhone 的相机导入照片，请使用 iPhone 的基座接口转 USB 线缆将 iPhone 插入 USB 适配器。确保 iPhone 已开机。使用 SD
    卡适配器导入时，将适配器插入 iPad，然后将 SD 卡插入其中。


    连接好相机或 SD 卡后，滑动锁定屏幕底部的解锁滑块来解锁 iPad。照片应用会自动打开，显示可供导入的照片。你现在有两个选择：点击 `Import All`（全部导入）按钮导入所有照片（参见图
    13-3），或者只导入选定的照片。


    ![images](img/1303.jpg)


    **图 13-3.** *点击屏幕底部的 `Import All` 按钮即可导入所有照片。*


    若要导入选定的照片，请点按你想要包含的每张照片。照片上会出现一个勾选标记（参见图 13-4）。选定照片后，点按 `Import`（导入），然后选择 `Import
    Selected`（导入所选）。


    ![images](img/1304.jpg)


    **图 13-4.** *导入部分照片*


    成功导入后，iPad 会提示你决定是保留还是删除从源设备导入的照片（参见图 13-5）。


    ![images](img/1305.jpg)


    **图 13-5.** *选择保存或删除外部设备上的已导入照片。*


    新导入的照片会出现在一个名为 `Last Import`（上次导入）的相册中（参见图 13-6），并作为一个新事件，其中包含上次导入的照片。在你多次导入照片后，你还会看到一个名为
    `All Imported`（所有已导入）的相册。


    ![images](img/1306.jpg)


    **图 13-6.** *从数码相机或 SD 卡直接导入 iPad 的照片将显示在 `Last Import` 相册中。*


    照片传输完成后，你可以从 iPad 上断开相机连接适配器。


    若要将已传输的照片从 iPad 导出到电脑，请连接 iPad 并打开照片应用程序，例如 Mac 上的 iPhoto 或 Image Capture，或 Windows
    电脑上的 Adobe Elements。


    # 使用 U 盘将照片传输到 iPad


    有时你可能需要快速将电脑中的一些照片添加到 iPad，而想避免整个同步过程。如果能使用 U 盘快速将图像导入 iPad，那岂不是很好？


    好消息！你可以*非官方地*使用 iPad 相机连接套件连接某些类型的 U 盘，以便快速便捷地将照片从电脑传输到 iPad。为此，你需要欺骗你的 iPad，让它以为你的
    U 盘是一台相机。


    `DCIM`（数码相机图像）是相机厂商使用的一种通用标准，通过定义的文件系统和结构（包括文件命名规范、文件格式和元数据信息）来整理相机中的照片。在 iPad
    连接到你的相机或 SD 卡之前，它会查找设备上的 `DCIM` 文件夹。该文件夹的存在使得 iPad 能够识别照片。


    当你拍摄第一张照片时，相机的 SD 卡会自动创建一个名为 `DCIM` 的文件夹。由于 SD 卡和 U 盘之间并没有太大区别（两者都只是固态存储的一种形式），你只需在
    U 盘上创建一个 `DCIM` 文件夹，即可欺骗 iPad，让它以为这是一个相机。


    最简单的方法是在你的桌面上创建一个新文件夹，并将其命名为“`DCIM`”。将该文件夹拖到 U 盘上。文件夹放入 U 盘后，找到你想从电脑传输的照片，并将它们拖入
    U 盘上的 `DCIM` 文件夹中。照片复制完毕后，将 U 盘插入 iPad 相机连接套件的 USB 适配器，iPad 会看到 `DCIM` 文件夹中的照片，并认为它正在与相机通信，从而允许你将这些图片从
    U 盘导入到 iPad 的照片应用中。


    # 从邮件和 Safari 浏览器保存照片


    你也可以不通过电脑或相机导入，直接在 iPad 上存储照片。如果有人通过电子邮件向你发送了照片，在 iPad 的邮件应用中，你会看到这些照片出现在邮件正文中。长按任意照片，你会看到一个弹出菜单，允许你保存该张照片或邮件中包含的所有照片（参见图
    13-7）。你选择保存的照片将出现在 iPad 照片应用中一个名为 `Saved Photos`（已保存的照片）的相册中。


    类似地，在 iPad 的 Safari 网络浏览器中，你可以长按网页上的任意照片，然后从出现的弹出菜单中选择 `Save Image`（保存图像）按钮（参见图
    13-7）。该照片将被保存到 iPad 照片应用中的 `Saved Photos` 相册。


    ![images](img/1307.jpg)


    **图 13-7.** *从电子邮件（左）或网页（右）保存照片*


    **注意：** 许多第三方应用（例如网络浏览器和杂志应用）也允许你将图像保存到 iPad。某些应用可能有其独特的保存图像方式，但大多数应该与你在邮件或 Safari
    浏览器中保存图像的方式非常相似。

