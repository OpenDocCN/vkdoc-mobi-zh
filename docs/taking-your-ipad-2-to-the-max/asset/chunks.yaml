    know that the video is being sent to that AirPlay destination.

    *   Use the Sharing menu to e-mail your video (if it is short enough), to send
    it to You Tube, or to copy your video to the system pasteboard for use in other
    applications. If you are a Mobile Me customer, you''ll find an option to post
    your video to a Mobile Me gallery from this menu. See [Chapter 13](#Chapter13.html#ch13)
    for more details about sharing your videos and images with others.


    The video overlay menu bar at the top of the screen shows you the back button,
    labeled Camera Roll. Tapping this returns you to the main Camera Roll on your
    iPad. From there, you can tap the Done button to exit the Camera Roll and return
    to the Camera app.


    Other items you may see onscreen include the trash can button, which brings up
    a deletion confirmation menu and an asset slider, which appears at the bottom
    of the screen. Dragging along the slider lets you select what image or video you
    want to view, for easy navigation through your Camera Roll library.


    ![images](images/1508.jpg)


    **Figure 15–8.** *Video-trim mode. Yes, that is a video of the writing of this
    book. See if you can spot where in the chapter it was recorded.*


    ### Having Fun with Photo Booth


    With its bright red curtain, it''s hard to miss the cheerful icon that represents
    the Photo Booth application (see [Figure 15–9](#Chapter15.html#fig_15_9)). Photo
    Booth lets you apply special effects to pictures *as you are taking them*. Working
    with both the front- and back-cameras, Photo Booth isn''t about to cure cancer
    or create world peace, but it will offer a lot of fun for playing with your cameras
    and the pictures you take.


    ![images](images/1509.jpg)


    **Figure 15–9.** *The iPad''s Photo Booth icon leads to a fun application for
    playing with your pictures.*


    Photo Booth lets you select an effect that distorts or otherwise changes images
    in real time. At first launch, you''re presented with a selection of those special
    effects, as shown in [Figure 15–10](#Chapter15.html#fig_15_10). Choose the effect
    you wish to work with (undistorted/normal is right in the center, if you want
    to play things safe) and tap it. You then move to the photo-taking portion of
    the application (see [Figure 15–11](#Chapter15.html#fig_15_11)).


    ![images](images/1510.jpg)


    **Figure 15–10.** *Select one of eight image effects (or the center for Normal
    undistorted imagery) from Photo Booth''s effects screen. Effects include X-Ray,
    Light Tunnel, Stretch, Mirror (not reverse, the center mirrors out to either side),
    Twirl, Thermal Camera, Kaleidoscope, and Squeeze.*


    Here, as shown in [Figure 15–11](#Chapter15.html#fig_15_11), is where you can
    manipulate, select, and share your photos. You can return to effect selection
    at any time by tapping the kaleidoscope-looking button at the bottom-left of the
    Photos/Camera screen.


    ![images](images/1511.jpg)


    **Figure 15–11.** *The Photos/Camera screen of Photo Booth allows you to snap
    new photos (tap the gray camera button at the bottom middle), to control the camera
    you''re using (tap the camera selection button at the bottom right), and to select,
    view and share your photos.*


    ##### Snapping Photos


    Initially, you''re presented with a live camera preview. When working with live
    effects, you can sometimes stroke your finger across the screen—up and down, or
    side-to-side—to affect the way the special effect is applied to the image.


    Adjustments are not available for every effect; for example, they do not work
    with the “thermal” images, but they do set the center of the light tunnel and
    the position of the mirror effect. It''s best to explore by touching to see how
    you can affect your results during the live preview.


    To snap a photo with Photo Booth, just aim the camera you want to use at your
    subject and tap the camera button. You''ll hear a shutter sound, indicating the
    picture has been captured. Switch between the front and back cameras by tapping
    on the camera flip button at the bottom-right of the screen.


    Each time you take a picture, the Photo Booth library adds a new image to the
    row just above the buttons at the bottom of the screen. You can view each image
    by tapping on it. When selected, the live camera preview stops and the selected
    image appears onscreen. [Figure 15–12](#Chapter15.html#fig_15_12) shows what Photo
    Booth looks like during image viewing.


    To delete an image, tap the circled X that appears to the top left on selection
    (see [Figure 15–12](#Chapter15.html#fig_15_12)). A red Delete Photo confirmation
    menu will appear. Tap Delete Photo to remove the photo from the library or anywhere
    else on the screen to cancel and dismiss the menu.


    Tap the black Photo button at the bottom center to return from the static display
    of library images back to the live camera preview.


    ![images](images/1512.jpg)


    **Figure 15–12.** *Tapping on any item in the library list displays that photo
    onscreen in image-viewing mode. Tap the blackened camera icon at the bottom center
    to return to the live preview mode or tap the manage button (bottom right) to
    manage your entire Photo Booth library at once.*'
