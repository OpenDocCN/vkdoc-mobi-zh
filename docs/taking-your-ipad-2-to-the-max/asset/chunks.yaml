  trans: '

    ### iPad 作为旅行电脑


    无论您是因公出差还是休闲旅游，您的 `iPad` 都是一款轻巧且不引人注目的旅行伴侣。如果您习惯了在旅途中携带沉重的笔记本电脑和各种零碎配件（电源适配器、一两个备用电池组、以太网线以及笔记本电脑包），您将会惊讶于
    `iPad` 作为一款功能齐全的旅行电脑是多么有用和强大。


    商务旅行者通常希望能够追踪并预订行程、与家中或办公室的人联系，并判断天气是否会影响到他们的出行计划。对于休闲旅行者来说，这些需求通常相同，此外还增加了编辑或修饰照片和视频的功能。让我们来看看一些非常适合旅行者的
    `iPad` 应用。


    #### FlightTrack


    `FlightTrack`（参见图 16–22）是一款方便的应用，可用于查询大多数国内或国际航班的状态。其免费版本会显示精美的地图，展示正在飞行中的航班位置、出发和到达时间以及其他重要信息。


    ![images](img/1622.jpg)


    **图 16–22.** *免费的 `iPad` 版 `FlightTrack` 应用是追踪航班状态的神奇工具。升级到 `9.99 美元的 FlightTrack
    Pro` 应用后，会增加大量功能，包括与 `TripIt.com` 行程同步。*


    升级到 `9.99 美元的 Pro` 版本，您将获得一个全新层次的功能。`FlightTrack Pro` 可与 `TripIt.com` 旅行计划服务同步行程，因此您的航班信息会自动录入应用。如果您计划了一次包含多个航段的旅行，`FlightTrack
    Pro` 可在同一屏幕上追踪所有航班，方便您随时了解航班动态。


    如果航班延误或取消，即使应用未打开，`iPad` 上也会推送通知。对于已取消的航班，`FlightTrack Pro` 只需轻点一下就能找到替代航班。即使您身在飞机上并将设备切换至飞行模式，`FlightTrack
    Pro` 的地图仍能工作，在详细地图上显示您的位置。天气信息一目了然，实时雷达地图会显示您飞行路线上的任何风暴。


    #### iPad 版 Kayak HD


    `Kayak.com` 的座右铭是“一次搜索，搞定一切”，意思是只需一次搜索就能找到两个机场之间最优惠的机票价格。尽管您无法实际预订通过详尽且快速搜索找到的航班，但免费的
    `Kayak HD` 应用（参见图 16–23）会提供一个链接，以便您*能够*在 `Orbitz`、`CheapTickets` 以及各航空公司的网站上预订航班。在很多情况下，它甚至会显示特定航班上某个价格的剩余座位数。


    ![images](img/1623.jpg)


    **图 16–23.** *`Kayak HD` 应用无需您在海量航空公司网站上搜索最优惠的机票，它会为您完成这一切。输入出发和到达机场，添加一些细节信息，几秒钟内您就能获得最低票价。*


    如果您需要预订酒店或租车，`Kayak HD` 会为您链接到相应的网站。


    #### iPad 版 Urbanspoon HD


    人不能只靠飞机餐生存，因此旅行者在路上需要餐厅来维持生计。`Urbanspoon HD`（参见图 16–24）是一款受欢迎的免费应用，用于寻找几乎各种美食中受欢迎且品质好的餐厅。


    ![images](img/1624.jpg)


    **图 16–24.** *`Urbanspoon HD` 应用是一种有趣的方式，让您在 `iPad` 屏幕上探索所在地区或任何主要城市的餐厅。*


    该应用会列出城市区域内的所有餐厅；在像`纽约市`这样的地方，经常会看到 `25,000` 家餐厅被突出显示。为了帮助您做出决定，有一个`热门`按钮可以将列表缩小到仅显示那些通过好评和食客反馈而获得成功的餐厅。`Urbanspoon`
    还提供了一种方法，可以按特定街区、美食种类和价格来缩小搜索范围。


    一件有趣的事情是使用`随机`按钮让 `Urbanspoon` 为您随机挑选一家餐厅。一旦您决定了这家餐厅是否真的是您想尝试的地方，轻点地图即可获取地址和电话号码、餐厅菜单以及更多评论和信息。


    旅行时别再局限于客房送餐服务了；使用 `Urbanspoon` 找到当地人吃饭的地方，去享受一番吧。


    #### iPad 内置 VPN 支持


    需要安全互联网连接以访问办公室服务的商务旅行者，通常依赖虚拟专用网络 (VPN)。`VPN` 的工作原理可以描述为：它们在您的 `iPad`（可能放在酒店房间里，使用的是开放的
    Wi-Fi 网络）和您的办公室之间创建一个安全、加密的隧道。


    您的网络或 IT 支持团队可能已经为您的公司创建了一个 VPN 入口。您需要了解以下信息才能配置您的 `iPad`：


    *   VPN 类型：`L2TP`、`PPTP`、`IPsec`

    *   服务器地址

    *   账户名称

    *   是否使用 `RSA SecurID` 令牌

    *   密码（如果不使用 `RSA SecurID`）

    *   密钥

    *   代理服务器信息（如果需要）

    *   对于 `PPTP`：加密级别

    *   对于 `IPsec`：组名称，以及是否使用证书


    获取这些信息后，前往`设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg) `网络` ![images](img/U001.jpg)
    `VPN`。添加一个 VPN 配置，并在相应位置输入信息，然后保存该 VPN 配置。


    要连接到 VPN，请确保您有可用的互联网连接，然后打开 VPN 并选择您配置好的网络。`iPad` 会协商建立一个安全连接，之后您就可以自由地在办公室网络上工作了，就像您真的坐在办公室里而不是在泳池边一样。


    正确设置 VPN 配置可能有些困难，如果您遇到问题，请向您的 IT 部门寻求帮助。


    #### 摄影/摄像应用


    经常可以看到旅行者在游览远方时使用小型数码相机或 iPhone 拍照和录像。


    您的 `iPad` 可以充当便携式数字备份工具和编辑套件。使用 `iPad Camera Connection Kit` 将您的数码照片或视频传输到`照片`应用中，您的数字影像就备份到了另一台设备上。接下来，您可以使用以下其中一款应用来修饰或编辑您的作品，然后与远在家乡的朋友分享。


    ##### Photogene


    `Photogene`（参见图 16–25；`$1.99`）是一款强大的 `iPad` 工具，能让您的好照片变得更好。从您的照片库中提取一张图片，`Photogene`
    的工具让您可以裁剪或旋转它，调整照片分辨率，添加预设滤镜，调整颜色，去除人物照片中的红眼，甚至添加相框和注释。


    ![images](img/1625.jpg)


    **图 16–25.** *`Photogene` 的预设效果和滤镜调色板有助于让好照片大放异彩。*


    完成摄影杰作的创作后，`Photogene` 可以轻松地通过 `Twitter`、`Facebook`、`Flickr`、`Dropbox` 和电子邮件分享照片。您修饰过的照片可以保存到您的照片库中，以供留存并最终同步到您的
    Windows 或 Mac 电脑。


    ##### Masque


    另一款照片编辑和增强应用是 `Masque`（参见图 16–26，`$5.99`）。它同样从照片库中获取您的作品，但执行一些不同的功能。例如，您可以对照片应用渐变效果并叠加滤镜，以创造出完全独一无二的图像。


    ![images](img/1626.jpg)


    **图 16–26.** *`Masque` 的工具集与 `Photogene` 的不同，这两款应用相辅相成。*

