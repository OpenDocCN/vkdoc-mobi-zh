    \ Library source list*: In the left column you'll see your music separated into\
    \ different categories, depending on the items you have synced to your iPad (see\
    \ [Figure 7–17](#Chapter07.html#fig_7_17)). Tap any category to see its contents.\n\
    \    *   *Music*: Contains all the music on your iPad\n    *   *Podcasts*: Contains\
    \ your audio and video podcasts\n    *   *Audiobooks*: Contains your audiobooks\n\
    \    *   *iTunes U*: Contains your iTunes U lectures and classes\n    *   *GeniusMixes*:\
    \ Contains any genius mixes you've chosen to sync from iTunes\n    *   *Purchased*:\
    \ Contains all the music and music videos you've bought through the iTunes Store\n\
    \nBelow these five categories you may see a number of different playlists. Playlists\
    \ come in three types (see [Figure 7–18](#Chapter07.html#fig_7_18)):\n\n*   *Regular\
    \ playlist*: An icon with four lines and a music note symbolizes this kind of\
    \ playlist. A regular playlist contains any music you've manually added to the\
    \ list. It does not update itself, and changes only when you add or remove a song.\n\
    \    *   *Smart playlist*: A cogwheel preceding the name symbolizes this kind\
    \ of playlist. A smart playlist is one in which you set a specific set of rules\
    \ that songs must match. Any songs that match the rules will show in the playlist.\n\
    \    *   *Genius playlist*: An icon that looks like an atom surrounded by electrons\
    \ symbolizes this kind of playlist. A Genius playlist is a playlist that iTunes\
    \ or the iPod app automatically generates based on a single song in your library.\
    \ The playlist will be populated with songs that go great with the song you've\
    \ selected to originate the playlist from.\n\n**NOTE:** See the “Creating Playlists”\
    \ section later in this chapter to find out how to create playlists on the iPad.\n\
    \n![images](images/0718.jpg)\n\n**Figure 7–18.** *Types of playlists include (from\
    \ top to bottom) Genius, smart, and regular.*\n\n*   *The songs list*: This is\
    \ the main body of the iPod app. It shows all the songs in any selected category\
    \ or playlist. Navigate the list by scrolling up or down with your finger. If\
    \ your list is long, you'll see an alphabet control on the right side of the screen,\
    \ as shown in [Figure 7–17](#Chapter07.html#fig_7_17). Tap a letter, or slide\
    \ your finger down the alphabet to move to the section you want to view.\n*  \
    \ *The create and sort bar*: This is the bar that runs along the bottom of the\
    \ app (see [Figure 7–19](#Chapter07.html#fig_7_19)). From this bar you'll be able\
    \ to create new playlists and Genius playlists, as well as sort music from the\
    \ songs list by song, artist, album, genre, or composer.\n\n![images](images/0719.jpg)\n\
    \n**Figure 7–19.** *The create and sort bar*\n\n*   *Cover art*: A song's cover\
    \ art (the cover of the album the song is from) is displayed in the lower-left\
    \ corner of the iPod app's screen, right below the Library source list. Tap the\
    \ cover to enter the Now Playing window (shown in [Figure 7–20](#Chapter07.html#fig_7_20)\
    \ a bit later in the chapter).\n\n**NOTE:**Only playlists and the Music and Purchased\
    \ categories in the Library source list can be sorted by song, artist, album,\
    \ genre, or composer. Podcasts, audiobooks, iTunes U, and Genius mixes do not\
    \ feature sorting options.\n\n#### Additional Song Controls\n\nWhen viewing music\
    \ in your library, you can take advantage of several buttons that allow you to\
    \ choose how to view your tracks. Use these buttons to help locate items you're\
    \ looking for. Located at the bottom center of [Figure 7–17](#Chapter07.html#fig_7_17),\
    \ your choices include:\n\n*   *Songs*: Displays all the songs in your iPad music\
    \ library in an alphabetical list.\n*   *Artists*: Displays an alphabetical listing\
    \ of all the artists in your library. Tap an artist to see all their albums and\
    \ the songs under each album. Tap any song to play it.\n*   *Albums*: Displays\
    \ an alphabetical thumbnail list of all the albums in your library. Tap an album\
    \ cover, and it springs forward and flips around to reveal a miniaturized Album\
    \ view. Tap a song to begin playing it.\n*   *Genres*: Displays an alphabetical\
    \ thumbnail list of all the genres of songs in your library. Tap a genre cover,\
    \ and it springs forward and flips around to reveal a miniaturized Album view.\
    \ The songs displayed can be from many different artists. Tap a song to begin\
    \ playing.\n*   *Composer*: Displays an alphabetical listing of all the composers\
    \ in your library. Tap a composer's name to see all their albums and the songs\
    \ under each album. Tap any song to play it.\n\n#### Playing Audio from the Music\
    \ Library and Playlists\n\nWhether you are in your main music library or a standard,\
    \ smart, or Genius playlist, to start playing a song, simply tap it. [Figure 7–20](#Chapter07.html#fig_7_20)\
    \ shows the iPod app's Now Playing screen. You arrive at this screen whenever\
    \ you start playing a song.\n\n![images](images/0720.jpg)\n\n**Figure 7–20.**\
    \ *The iPod app's Now Playing screen provides an interactive screen that controls\
    \ playback for the currently playing item. From this screen, you can adjust the\
    \ volume, pause and resume playback, and loop the current track. If you have added\
    \ lyrics in iTunes, you'll find them displayed here as well.*\n\nYou'll also notice\
    \ that a Play indicator has appeared in the iPad's status bar (see [Figure 7–21](#Chapter07.html#fig_7_21)).\
    \ The right-pointing Play indicator at the top-right of the screen (just left\
    \ of the battery status) appears universally when you're playing back music. This\
    \ tells you at a glance that music is playing. You'll find this especially helpful\
    \ when you've removed your earbuds and placed the iPad on a table. It alerts you\
    \ that your battery is gleefully emptying itself as your iPad plays music that\
    \ no one is hearing.\n\n![images](images/0721.jpg)\n\n**Figure 7–21.** *The Play\
    \ indicator is next to the battery status in the iPad's status bar.*\n\n#####\
    \ Now Playing Screen\n\nThe Now Playing screen (see [Figure 7–20](#Chapter07.html#fig_7_20))\
    \ is divided into three sections. Here's a run-down of each of those sections\
    \ and what kinds of information and controls you'll find there."
  trans: "\n# 浏览音乐资料库和播放列表\n\n轻触 iPad 主屏幕上的 `iPod` 图标（参见图 7–16）即可启动该应用。`iPod` 图标呈亮橙色，上面绘有一台经典的\
    \ iPod 形象，配有已过时的点按式转盘。这是对过去的致敬，任何在 21 世纪初用 iPod 欣赏过音乐的人都能一眼认出，尽管我的孩子们从未使用过、不理解、也不太可能接触到这种点按式转盘。\n\
    \n![images](img/0716.jpg)\n\n**图 7–16.** iPod 图标。\n\n你首先会注意到 `iPod` 应用（参见图 7–17）的布局，如前所述，与\
    \ `iTunes` 类似。在该应用中，你不仅能听音乐，还能像在电脑上一样轻松创建和编辑播放列表。如果你曾在 iPhone 或 iPod touch 上播放过音乐，你会惊讶地发现\
    \ iPad 上 iPod 应用的布局更加开阔。iPad 的空间更大，因此你能同时看到更多音乐。无需在冗长的菜单屏幕间上下翻动，iPad 就能在一个界面中呈现更多选项和更多音乐，让查找和欣赏歌曲变得更加轻松。\n\
    \n![images](img/0717.jpg)\n\n**图 7–17.** iPad 上的 iPod 应用与电脑上的 iTunes 极为相似。\n\n\
    `iPod` 窗口由五个关键元素组成：\n\n- **播放栏**：位于应用顶部，包含音量滑块；播放/暂停、前进和后退按钮；以及搜索栏。\n- **资料库来源列表**：在左栏中，你可以看到音乐按照不同类别分类，具体取决于你同步到\
    \ iPad 的内容（参见图 7–17）。轻触任一类别即可查看其内容。\n    - **音乐**：包含 iPad 上的所有音乐\n    - **播客**：包含你的音频和视频播客\n\
    \    - **有声读物**：包含你的有声读物\n    - **iTunes U**：包含你的 iTunes U 讲座和课程\n    - **Genius\
    \ 混曲**：包含你选择从 iTunes 同步的任何 Genius 混曲\n    - **已购买**：包含你通过 iTunes Store 购买的所有音乐和音乐视频\n\
    \n在这五个类别下方，你可能会看到许多不同的播放列表。播放列表分为三种类型（参见图 7–18）：\n\n- **常规播放列表**：由四条横线和一个音符图标表示。常规播放列表包含你手动添加到列表中的任何音乐。它不会自动更新，只有当你添加或移除歌曲时才会变化。\n\
    \    - **智能播放列表**：由名称前的齿轮图标表示。智能播放列表是指你设置了一组歌曲必须符合的特定规则。任何匹配规则的歌曲都会显示在播放列表中。\n\
    \    - **Genius 播放列表**：由看起来像被电子包围的原子图标表示。Genius 播放列表是 `iTunes` 或 `iPod` 应用根据你资料库中的一首歌曲自动生成的播放列表。该播放列表将填充与你选择作为播放列表源歌曲搭配起来效果极佳的歌曲。\n\
    \n**注意：** 请参阅本章后面的“创建播放列表”部分，了解如何在 iPad 上创建播放列表。\n\n![images](img/0718.jpg)\n\n\
    **图 7–18.** 播放列表类型包括（从上到下）Genius 播放列表、智能播放列表和常规播放列表。\n\n- **歌曲列表**：这是 `iPod` 应用的主体部分。它显示所选类别或播放列表中的所有歌曲。用手指上下滑动即可浏览列表。如果列表很长，屏幕右侧会出现一个字母索引控件，如图\
    \ 7–17 所示。轻触一个字母，或沿着字母索引向下滑动手指，即可跳转到你想查看的部分。\n- **创建与排序栏**：这是位于应用底部的栏（参见图 7–19）。通过此栏，你可以创建新的播放列表和\
    \ Genius 播放列表，还可以按歌曲、艺人、专辑、风格或作曲家对歌曲列表中的音乐进行排序。\n\n![images](img/0719.jpg)\n\n\
    **图 7–19.** 创建与排序栏\n\n- **封面图**：歌曲的封面图（歌曲所属专辑的封面）显示在 `iPod` 应用屏幕的左下角，位于资料库来源列表的正下方。轻触封面即可进入“正在播放”窗口（本章稍后的图\
    \ 7–20 中会显示）。\n\n**注意：** 资料库来源列表中，只有“音乐”、“已购买”以及播放列表可以按歌曲、艺人、专辑、风格或作曲家进行排序。播客、有声读物、iTunes\
    \ U 和 Genius 混曲不具备排序选项。\n\n## 其他歌曲控制选项\n\n浏览资料库中的音乐时，你可以利用几个按钮来选择如何查看曲目。使用这些按钮有助于找到你正在寻找的项目。位于图\
    \ 7–17 底部中央的选项包括：\n\n- **歌曲**：以字母顺序列表显示 iPad 音乐资料库中的所有歌曲。\n- **艺人**：以字母顺序列表显示资料库中的所有艺人。轻触一位艺人可查看其所有专辑以及每张专辑下的歌曲。轻触任意歌曲即可播放。\n\
    - **专辑**：以字母顺序缩略图列表显示资料库中的所有专辑。轻触一张专辑封面，它会向前弹出并翻转，显示一个缩小的专辑视图。轻触一首歌曲即可开始播放。\n\
    - **风格**：以字母顺序缩略图列表显示资料库中所有歌曲的风格。轻触一个风格封面，它会向前弹出并翻转，显示一个缩小的专辑视图。显示的歌曲可能来自许多不同的艺人。轻触一首歌曲即可开始播放。\n\
    - **作曲家**：以字母顺序列表显示资料库中的所有作曲家。轻触一位作曲家的名字可查看其所有专辑以及每张专辑下的歌曲。轻触任意歌曲即可播放。\n\n## 从音乐资料库和播放列表播放音频\n\
    \n无论你是在主音乐资料库中，还是在标准、智能或 Genius 播放列表中，要开始播放一首歌曲，只需轻触它。图 7–20 显示了 `iPod` 应用的“正在播放”屏幕。每当你开始播放歌曲时，就会进入此屏幕。\n\
    \n![images](img/0720.jpg)\n\n**图 7–20.** iPod 应用的“正在播放”屏幕提供了一个交互式画面，可控制当前播放项目的播放。在此屏幕中，你可以调节音量、暂停和恢复播放，以及循环当前曲目。如果你在\
    \ iTunes 中添加了歌词，歌词也会显示在此处。\n\n你还会注意到，iPad 状态栏中出现了一个“播放”指示器（参见图 7–21）。屏幕右上角（电池状态左侧）向右指的“播放”指示器，在播放音乐时会普遍出现。这让你一眼就能知道音乐正在播放。当你取下耳塞并将\
    \ iPad 放在桌子上时，这一点尤其有用。它会提醒你，你的电池正在开心地消耗电量，因为你的 iPad 正在播放无人聆听的音乐。\n\n![images](img/0721.jpg)\n\
    \n**图 7–21.** 播放指示器位于 iPad 状态栏中电池状态的旁边。\n\n### “正在播放”屏幕\n\n“正在播放”屏幕（参见图 7–20）分为三个部分。以下是对每个部分及其包含的信息和控件的详细介绍。\n"
- fmt: "# Title Bar\n\nThe title bar (see [Figure 7–22](#Chapter07.html#fig_7_22))\
    \ is the black bar at the top of the Now Playing screen and contains the following\
    \ items:\n\n![images](images/0722.jpg)\n\n**Figure 7–22.** *The title bar on the\
    \ Now Playing screen*\n\n- *Volume slider*: Drag along the slider to adjust the\
    \ volume. You can also use the iPad's physical volume button to adjust the volume.\
    \ If you've attached an external speaker or remote control, you can use its switches\
    \ to control the playback volume as well.\n- *AirPlay button*: When music-capable\
    \ AirPlay receivers are available on your home network, an AirPlay button appears\
    \ just to the right of the volume slider. Tap on the button and select a receiver\
    \ to redirect your music to. Because of Apple's highly encrypted AirTunes protocol,\
    \ AirPlay for music and audio was limited to Apple-branded receiver equipment\
    \ until Spring 2011, when it was finally reverse engineered to allow access by\
    \ third-party applications.\n- *Artist, song, and album*: These items appear at\
    \ the top middle of the screen and are for information only. Tapping them does\
    \ nothing.\n- *Rewind*: The Rewind button looks like a line followed by two left-pointing\
    \ triangles.\n  - Tap to move back to the beginning of the currently playing song.\n\
    \  - Double-tap to move to the previous song in the album or playlist. If you\
    \ are already at the start of the song, a single tap moves you back; if you're\
    \ already at the first song, this works as if you had pressed the Back button—you\
    \ return to the most recent album or playlist screen.\n  - Touch and hold to rewind\
    \ through the current song. You'll hear very short snippets as you move backward\
    \ through the song. This feature proves especially handy while listening to audiobooks.\n\
    - *Play/Pause*: Play looks like a right-pointing triangle. Pause looks like a\
    \ pair of upright lines. Tap this button to toggle between playback and pause\
    \ modes.\n- *Forward*: The Forward button looks like the Rewind button in a mirror.\
    \ The line is to the right, and both triangles point right instead of left.\n\
    \  - Tap once to move to the next song in the album or playlist. If you're at\
    \ the last song, tapping Forward moves you back to the album or playlist.\n  -\
    \ Touch and hold to fast-forward through your song.\n\nBelow the title bar, you'll\
    \ find a thin bar that contains the loop button, the scrubber bar, and the shuffle\
    \ button (see [Figure 7–22](#Chapter07.html#fig_7_22)).\n\n- *Loop control*: This\
    \ control, which looks like a pair of arrows pointing to each other in a circle,\
    \ appears when you tap album art.\n  - *Tap once to loop the currently playing\
    \ album or playlist. After the last song plays, the first song starts again.*\n\
    \  - *Tap a second time to loop just the current song. The number 1 appears on\
    \ the loop, telling you that the loop applies to just this song.*\n  - *Tap once\
    \ more to disable looping.*\n  - *A blue loop (both the regular loop and the loop\
    \ with the number 1) indicates that looping is enabled. A white loop means looping\
    \ is switched off.*\n- *Scrubber bar*: The scrubber bar appears to the right of\
    \ the loop control. Tap the album cover to make this control appear; tap again\
    \ to hide it.\n  - The number at the left of the bar shows the elapsed playback\
    \ time. The number at the right shows the remaining playback time.\n  - Drag the\
    \ playhead to set the point at which your song plays back. You can do so while\
    \ the song is playing, so you can hear which point you've reached.\n- *Shuffle*:\
    \ The shuffle control looks like two arrows making a wavy *X*. It appears to the\
    \ right of the scrubber bar and, like the loop and scrubber controls, appears\
    \ only after you tap the album cover.\n  - When the shuffle control is off (white),\
    \ album and playlist songs play back in order.\n  - When the shuffle control is\
    \ selected (blue), the iPod app randomly orders songs for shuffled playback.\n\
    \n**NOTE:** If you are using Apple's iPhone earphones with a remote and mic to\
    \ listen to music on your iPad, all the buttons and click features of the iPhone's\
    \ earbuds work just fine (despite Apple not listing the earbuds as an official\
    \ iPad accessory). Click to play/pause a song. Double-click to skip to the next\
    \ song. Triple-click to return to the previous song. Tap the `+` or `–` button\
    \ on the earphone control to increase or decrease the volume. The microphone on\
    \ the iPhone earbuds also works fine with the iPad. The Apple Earphones with Remote\
    \ and Mic cost `$29` at the Apple Store.\n\n# Album Cover\n\nBelow the scrubber\
    \ bar, you'll notice the song's album art taking up a majority of the display\
    \ (see [Figure 7–20](#Chapter07.html#fig_7_20)).\n\n- *Album art*: When you've\
    \ downloaded album art, the cover image appears just below the top bar and occupies\
    \ most of your screen. (When the iPad cannot find album art, it instead displays\
    \ the same light gray music note on a white background).\n- *Song count*: This\
    \ is a little pill-shaped button that shows you the number of the song in the\
    \ playlist and how many songs are in it in total.\n- *Lyrics*: If the song has\
    \ lyrics embedded in the music file, the lyrics will be displayed over the album\
    \ art. You can make the lyrics and the rest of the control interface go away by\
    \ tapping them once. Tap the album art again to bring them back.\n\n# Bottom Bar\n\
    \nAt the bottom of the Now Playing screen you'll see a thick black bar (see [Figure\
    \ 7–23](#Chapter07.html#fig_7_23)) containing the following:\n\n- *Back button*:\
    \ Tap the Back button (the arrow pointing left) at the left end of the bar to\
    \ return to the most recent album or playlist screen. Tapping the Back button\
    \ does not stop playback. Your song continues to play as you browse through your\
    \ categories or tap the Home button to do other things on your iPad.\n- *Genius\
    \ button*: This center button looks like an atom with electrons swirling around\
    \ it. Tapping this will create a Genius playlist based on the song that is currently\
    \ playing. When you navigate back to the music library, you'll see a playlist\
    \ labeled “Genius” along with several other options. We'll discuss those options\
    \ in just a bit.\n- *Album View button*: This button looks like a three-item bulleted\
    \ list and appears at the right of the bar. Tap this to switch between your Now\
    \ Playing screen and its Album view.\n\n![images](images/0723.jpg)\n\n**Figure\
    \ 7–23.** *The bar at the bottom of the Now Playing screen allows you to create\
    \ a Genius playlist and enter Album view.*"
