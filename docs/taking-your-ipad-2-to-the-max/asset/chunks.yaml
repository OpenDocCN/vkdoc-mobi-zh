    ### 插入


    `Insert`按钮看起来像是一幅小型的风景画。你可以通过它在文档中插入来自**照片**图库的媒体、表格、图表或形状（参见图 14–10）。


    `Media`选项卡可将`Photos`应用中的图片添加到文档。`Tables`提供了一系列精美且带有彩色阴影的预格式化表格，用于在文档中展示表格信息。使用`Charts`，你可以选择条形图、柱状图、面积图、折线图、散点图和饼图，共有六种鲜艳颜色可供添加到文档中。双击已插入的图表会显示一个简单的电子表格，用于编辑图表所反映的信息。最后，如果你需要在`Pages`文档中添加方框、卡通气泡、线条或几何形状，只需轻点`Shapes`。


    ![images](img/1410.jpg)


    **图 14–10.** *使用`Insert`按钮将图片、表格、图表或形状添加到你的`Pages`文档中。*


    一旦你向文档中添加了表格、图表或形状，轻点该元素，再轻点`Info`按钮，便会弹出一个窗口，让你可以轻松修改该元素的选项。我们将在介绍`Numbers`时更详细地描述表格和图表的选项。


    ### 工具


    工具栏上紧挨着的那个类似小扳手的图标就是`Tools`按钮（参见图 14–11）。它用于更改适用于整个文档的设置，如果你想打印`Pages`文档，也需要通过这里进行设置。


    ![images](img/1411.jpg)


    **图 14–11.** *`Pages`中的`Tools`按钮提供的功能适用于整个文档，而不仅仅是单个词语或段落。*


    需要在文档中查找并替换某个词或短语吗？`Find`功能可搜索整个文档中的特定字符集，进行替换（如果你选择了`Find and Replace`选项），并且如果你需要更精细的搜索，它甚至可以区分大小写或仅匹配完整单词（参见图
    14–12）。


    ![images](img/1412.jpg)


    **图 14–12.** *`Pages`中`Tools`按钮下的`Find`功能是一个强大的工具，可用于在整个文档中进行全局替换。*


    随着 2010 年底 iOS 4.2 操作系统的发布，iPad 增加了打印功能。苹果的一项名为`AirPrint`的功能会在你的 Wi-Fi 网络上搜索兼容的打印机，并在你轻点`Tools`下的`Print`选项时显示这些打印机。选择要打印的份数并轻点`Print`按钮，即可将当前的`iWork`文档发送到所选打印机。


    遗憾的是，在本文撰写时，开箱即能兼容`AirPrint`的打印机还很少。不过，已有几家软件厂商为 Mac 和 Windows 开发了应用程序，使任何共享打印机都能兼容`AirPrint`。


    `Ecamm Network`为 Mac 开发了`Printopia`（售价 9.95 美元，[`www.ecamm.com/mac/printopia/`](http://www.ecamm.com/mac/printopia/)），它让
    Mac 用户能够选择想要与网络中的 iPad 共享的打印机（参见图 14–13）。对于使用 Windows 电脑的用户，或者希望能够将照片直接发送到 iPhoto
    的 Mac 用户，可以尝试`Collobos FingerPrint`（Mac 版 7.99 美元，Windows 版 9.99 美元，[`www.collobos.com/`](http://www.collobos.com/)）。这两款应用还具备其他功能，例如能够将文档发送到你的
    PC 或 Mac，或将其保存到流行的`Dropbox`云存储服务中。


    ![images](img/1413.jpg)


    **图 14–13.** *`Pages`工具栏上`Tools`按钮下的`Print`功能，会显示由`Printopia`或`FingerPrint`等应用托管的打印机或打印到文件的服务。*


    轻点`Tools`菜单上的`Document Setup`按钮，会显示一个类似蓝图的文档布局，你可以在上面轻点并编辑页眉和页脚，或调整文档页边距。


    `Tools`下的`Settings`按钮可访问各项设置，例如打开或关闭中心参考线和边缘参考线。什么是中心参考线和边缘参考线？如果页面上有多个对象，拖动其中一个时，会显示对齐参考线，这样你就能看到对象的中心或边缘是否对齐。关闭边缘参考线意味着移动对象时只显示中心参考线，而禁用中心参考线则只显示边缘参考线。如果你不需要对齐参考线，也可以将其完全禁用。此外还有一个字数统计功能，启用后会在文档中显示实时更新的总字数。


    `Settings`中的最后一项工具用于启用或禁用实时拼写检查。当你在`Pages`文档中键入文字时，可能拼写错误的单词会以红色虚线下划线显示。轻点该单词会显示可能的替换词，轻点其中某个词即可插入替换词。如果你觉得持续的提醒很烦人，可以禁用拼写检查。


    轻点`Tools`下的最后一个按钮`Go to Help`，会启动 Safari 浏览器并跳转到苹果关于`iWork for iPad`套件的在线帮助。在线帮助中包含的信息量惊人，因此如果你在使用`Pages`、`Keynote`或`Numbers`的某个功能时遇到困难，一定要去查阅一下。


    ### 全页显示


    最后，工具栏上最后一个图标看起来像是一对指向对角线的箭头，点击它即可全页显示文档，隐藏工具栏、样式标尺等所有元素。这在阅读文档并希望尽可能多地查看内容时最为有用。


    ## Numbers


    一旦你熟悉了 iPad 上的`Pages`，就很容易理解如何使用`Numbers`。对于需要整理数据和数字的人来说，`Numbers`应用可以创建、打开和保存与
    Microsoft Excel 或 Mac 版`Numbers`兼容的电子表格。


    `Numbers for iPad`不仅包含了其 Windows 电脑和 Mac 上同类软件的大量电子表格功能，还提供了用于以图形方式呈现信息的图表工具，甚至还有用于在电子表格中捕获数据的表单工具。


    接下来，请跟随我们一起了解`Numbers`。

    '
- fmt: '# My Spreadsheets


    Does [Figure 14–14](#Chapter14.html#fig_14_14) look familiar? It should. `My Spreadsheets`
    is the Numbers equivalent of `My Documents` in Pages. In fact, everything about
    the user interface in `My Spreadsheets` is identical to `My Documents`. The `Sharing`,
    `New or Duplicate Spreadsheet`, and `Delete` icons below the image of a spreadsheet
    perform the same tasks as their Pages counterparts and you can tap the name of
    a spreadsheet to rename it.


    ![images](images/1414.jpg)


    **Figure 14–14.** *`My Spreadsheets` is analogous to `My Documents` in Pages.
    It''s used to create new spreadsheets, rename them, delete them, and share them
    with others.*


    The `New Spreadsheet` button opens to a window that''s the Numbers version of
    the `New Document` window. As with Pages, you can either select a blank spreadsheet
    or choose from a number of templates thoughtfully provided by Apple.


    The Numbers templates (see [Figure 14–15](#Chapter14.html#fig_14_15)) range from
    simple checklists to mortgage calculators and from weight loss and running logs
    to class attendance sheets. Although not everyone may need a GPA calculator, it''s
    available. Many of the templates exist to give you a taste of the range of tasks
    you can perform with Numbers.


    ![images](images/1415.jpg)


    **Figure 14–15.** *Apple includes 16 templates with Numbers, many of which can
    be used to perform useful calculations.*


    One unique Numbers user interface feature is the concept of tabs. As shown in
    [Figure 14–16](#Chapter14.html#fig_14_16), tabs define different sheets or forms
    for a spreadsheet. As an example, a Numbers spreadsheet could consist of one sheet
    to describe how to use the spreadsheet, a form to capture data, and another sheet
    to perform calculations on the data you captured. Each of those pages displays
    its own tab at the top of the spreadsheet, making navigation between the pages
    as simple as tapping a tab.


    ![images](images/1416.jpg)


    **Figure 14–16.** *Use tabs to name individual sheets or forms in a Numbers spreadsheet
    file.*


    If you''re familiar with Microsoft Excel, just think of tabs as sheets and the
    group of sheets as an Excel workbook. To add a new tab, just tap the rightmost
    tab. It''s marked with a plus sign, and tapping it displays a pop-up with two
    buttons—`New Sheet` and `New Form`. Any tab can be renamed by double-tapping the
    existing name and then typing a new name.


    As in Pages, there''s a very helpful `Getting Started` document that is a thinly
    disguised interactive Numbers tutorial. For iPad owners just getting started with
    Numbers, it is well worth the time and effort to go through the `Getting Started`
    pages.


    # Adding Elements to a Spreadsheet


    A blank spreadsheet isn''t very useful. Although even the “Blank” template contains
    a generic table that you can begin to type numbers or text into, tapping a tab
    creates a totally blank sheet. Where are the rows and columns you''re used to?
    In Numbers, you need to add a table to the sheet to begin using it. As you''ll
    recall, the `Insert` button in Pages let you add media, tables, charts, and shapes
    to a blank page. That''s exactly what the `Insert` button does in Numbers as well.
    The `Tables` tab is slightly different, but `Media`, `Charts`, and `Shapes` tabs
    are identical to their siblings in Pages in that they provide a way to add pictures,
    create charts, or draw shapes on a page.


    In [Figure 14–17](#Chapter14.html#fig_14_17), we''ve added a simple five-column
    table to a blank sheet. As you can see, the first column contains a check box
    for each row, while the rest of the columns are blank. The table has a name—`Table
    2`—and some things that look like scrollbars to the top and left of the table.


    ![images](images/1417.jpg)


    **Figure 14–17.** *A blank table added to a blank sheet in Numbers*


    See those little things at the end of the scrollbars that look like buttons on
    a shirt? Dragging one of those to the right or down adds another column or row
    to the table. Dragging a button up or to the left removes a row or column from
    the table. To move the entire table around on the sheet, drag the button in the
    upper-left corner of the table.


    The dark dots on the right and bottom edges of the table stretch the table when
    dragged, increasing the width of all the columns and rows without adding any new
    columns or rows. Likewise, you can make the table smaller by dragging those “handles”
    up or to the left.


    Although we won''t go through the details of the many spreadsheet functions that
    you can choose from in Numbers, let''s talk about how you enter information into
    spreadsheet cells. Double-tapping a cell on the spreadsheet highlights it with
    a dark blue border, and a light green data entry field appears on the screen along
    with an appropriate keyboard (see [Figure 14–18](#Chapter14.html#fig_14_18)) and
    four buttons in a toolbar. On the far left you''ll see a button with “42” on it,
    which indicates that you use this button to enter numbers into the cell. The numbers
    can be formatted as plain numbers, as currency (using the dollar sign button on
    the data entry keyboard below), as a percentage (using the percent sign button),
    as a star ranking from 1 to 5 (using the star button), or as a check box (0 or
    1, using the check box button). Buttons on the right side of the keyboard take
    you to the next cell to the right or to the next cell down for quick navigation
    around the spreadsheet.


    ![images](images/1418.jpg)


    **Figure 14–18.** *The numeric data entry keyboard*


    **SUBTLE JOKE ALERT!** Are you wondering why the numeric entry button has “42”
    on it? In the classic science fiction series *The Hitchhiker''s Guide to the Galaxy*,
    42 is the answer to the ultimate question of life, the universe, and everything.
    We''re speculating that someone on the Numbers development team is a sci-fi fan.


    Use the `next` button (to the right of `42`), which looks like a clock, to enter
    dates, times, or durations into spreadsheet cells. The keyboard looks different
    as a result of tapping this button (see [Figure 14–19](#Chapter14.html#fig_14_19)),
    featuring the months of the year on the keypad and buttons for denoting whether
    you''re entering a date and/or time or a duration. What''s the difference between
    a date or time and a duration? A date is a specific date, for example June 10,
    2010, and a time is a specific time, like 4:32:06 p.m. A duration is a length
    of time that can be measured between two time points. One of our writers has a
    lifetime measured with a duration of 53 years, 7 months, 29 days, 1 hour, and
    22 minutes at the time of writing this sentence.


    ![images](images/1419.jpg)


    **Figure 14–19.** *The date, time, and duration entry keyboard*


    Moving further down the data entry toolbar there is a button with the letter `T`
    on it. Use this button to enter text into a cell. A standard text entry keyboard
    appears (see [Figure 14–20](#Chapter14.html#fig_14_20)) after tapping the button.


    ![images](images/1420.jpg)


    **Figure 14–20.** *The text entry keyboard*


    The last button has an equal sign (`=`) on it. Tapping this button displays the
    formula entry keyboard (see [Figure 14–21](#Chapter14.html#fig_14_21)). A formula
    operating on data contained in cells, using functions entered through the functions
    key, is typed into the data entry field and applied to the cell by tapping the
    check mark button at the end of the field. The keyboard also contains a set of
    mathematical operators (parentheses, plus, minus, multiply, divide, exponents,
    and logical operators) for use in spreadsheet formulas.


    ![images](images/1421.jpg)


    **Figure 14–21.** *The formula entry keyboard is used to enter both simple and
    complex formulas into spreadsheet cells.*'
