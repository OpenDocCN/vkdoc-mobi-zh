- fmt: '# Manipulating the Home Screen


    There are several ways you can interact with your iPad Home screen.


    **Navigating the apps pages:** If you are on your first page of apps, swipe your
    finger to the left to reveal the next page of apps. Keep swiping your finger to
    the left to proceed navigating through all your app pages. To go back to the previous
    page of apps, simply swipe your finger to the right. Alternately, you can drag
    your finger to the left or right to go for the slow reveal of the next page of
    apps.


    **NOTE:** The pages of the Home screen move only left or right. Unlike in many
    apps, they do not move up or down.


    **Launching apps:** To launch an app, simply tap its icon. To return to the Home
    screen, press the round, physical Home button on the iPad’s bezel.


    **Manipulating app icons:** This is fun. Let’s say you want to rearrange the icons
    on your Home screen, but aren’t near your computer to do it through the iPad’s
    iTunes preferences page that we discussed in [Chapter 2](#Chapter02.html#ch2).
    Simply touch and hold any icon on the Home screen. After a few seconds, you see
    all the icons on the page start to jiggle like they’re little mounds of gelatin
    (see [Figure 4–11](#Chapter04.html#fig_4_11)). You can now remove your finger
    from the app. The icons will continue to jiggle. While jiggling, you can touch
    and hold any app icon and then simply drag it to a new position on the page. You
    can also drag icons to and from the Dock.


    ![images](images/0411.jpg)


    **Figure 4–11.** *Jiggling icons. In this example, the TV Guide app is being moved.*


    You can go ahead and swipe to a new page of apps while they are all jiggling and
    rearrange the apps on that page. You can also transfer apps between pages. Simply
    touch and hold the app you’d like to move to a different page and drag it toward
    the side of the screen where the page is located. After a brief pause, the next
    page will automatically swipe over, and you can drop the app anywhere you want
    it. If that page is already full of 20 apps, the app in the lower-right corner
    will be pushed to the next page automatically.


    **NOTE:** If your Dock already has six apps on it, you must remove an app first
    before adding a new one to the Dock. Unlike with home pages, apps in the Dock
    will not automatically be pushed to a new page if you try to add a new app to
    a full Dock.


    **Creating folders of apps:** In [Chapter 2](#Chapter02.html#ch2) we talked about
    how to create folders full of apps on your iPad using iTunes, but you can also
    create folders of apps right on your iPad. Simply touch and hold an app icon until
    all the apps are jiggling (see [Figure 4–11](#Chapter04.html#fig_4_11)). Once
    they are, drag an app onto another app icon and hold it there. After a second
    or two, an app folder will appear. Drop the app inside the folder so it appears
    next to the app icon you held it over (see [Figure 4–12](#Chapter04.html#fig_4_12)).


    ![images](images/0412.jpg)


    **Figure 4–12.** *Creating a folder full of apps*


    You can arrange the apps in this new folder any way you want. You can also name
    the folder whatever you want. A cool thing Apple did was give the folder the ability
    to guess the name you want it to be. In the example in [Figure 4–12](#Chapter04.html#fig_4_12),
    we created a folder with two movie apps inside. The iPad knew both apps were entertainment-related
    and named the folder Entertainment, appropriately. You can always change the name
    of the folder, however. Tap anywhere outside the folder to return to the normal
    apps screen. Drag any app to an existing folder to add it to that folder.


    Folders appear as gray boxes with multiple app icons inside (see [Figure 4–13](#Chapter04.html#fig_4_13)).
    Folders can contain up to 20 apps and you can have up to 26 folders on a page
    (20 on a page plus 6 folders can be stored in the dock). To open a folder, simply
    tap it, and its contents will expand while the rest of the outside app icons are
    grayed out (see [Figure 4–13](#Chapter04.html#fig_4_13)). To exit a folder, tap
    anywhere outside of it.


    ![images](images/0413.jpg)


    **Figure 4–13.** *Left, an apps page with two folders, Entertainment and Medical.
    Right, the same apps page with the Entertainment folder open.*


    **Removing apps:** In [Chapter 2](#Chapter02.html#ch2) we told you how to remove
    apps from your iPad using iTunes. You can also remove an app from the iPad right
    on the iPad. To do this, simply touch and hold any icon on the Home screen and
    wait for them all to begin jiggling like they did when you were rearranging apps
    (see [Figure 4–14](#Chapter04.html#fig_4_14)).


    ![images](images/0414.jpg)


    **Figure 4–14.** *While an app is jiggling, tap the X to remove it.*


    Notice how some of the apps have a little black and white `X` in their upper-left
    corner? Tapping that `X` will delete the app. Don’t worry if you accidentally
    delete an app from your iPad. The apps are always store in your iTunes library,
    and you can reinstall them at any time.


    **NOTE:** You cannot delete any Apple apps that were factory installed on your
    iPad. You can, however, delete Apple apps that you installed yourself, such as
    Pages, iBooks, Numbers, and Keynote.


    To delete an app, simply touch the `X`. A pop-up will appear on the screen asking
    if you want to delete the selected application. You’ll also see a note saying
    deleting the app “will also delete all of its data,” as shown in [Figure 4–15](#Chapter04.html#fig_4_15).
    *This is important!* If you’ve created a new document inside the app or achieved
    a new high score on a game and delete the app before syncing it to iTunes, any
    new data associated with that app will be deleted. So, if you’ve created a new
    documents in Pages and decide to delete the Pages app, your new document will
    be forever lost if you don’t sync your iPad before deleting Pages. Any documents
    the Pages app contained before the last sync will be available to you again if
    you resync the Pages app from iTunes.


    ![images](images/0415.jpg)


    **Figure 4–15.** *The deletion warning pop-up*


    **NOTE:** If you delete an app accidentally and need it back right away but are
    not near your computer, you can simply use the iPad’s built-in App Store app to
    download the app again. If it was a paid application, don’t worry; you won’t be
    charged a second time. Your iTunes account will know you’ve already paid for it.


    If you are sure you want to delete an app, go ahead and tap the `Delete` button.
    If you’ve changed your mind, tap `Cancel`. When an app is deleted, all the other
    apps on the page will shift one position to fill the space of the deleted app.'
