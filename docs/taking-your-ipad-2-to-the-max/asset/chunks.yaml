- fmt: '# Purchases


    The `Purchases` screen displays any book that you have bought in the iBookstore.
    As you''ll find out in [Chapter 9](#Chapter09.html#ch9), you may eventually want
    to delete some of the books in your personal iBooks library. If you ever want
    to read those books again, or at least add them back to the library for future
    reference, `Purchases` shows a `Download` button next to the title (see [Figure
    8–22](#Chapter08.html#fig_8_22)) that you can use to reload a previously purchased
    book.


    ![images](images/0822.jpg)


    **Figure 8–22.** *If you''ve deleted a book from your library and want to add
    it back, you can do that from the `Purchases` screen in the iBookstore. Tapping
    `Download` reinstalls the book to its rightful place on your bookshelf.*


    When you tap the `Download` button, the iBookstore prompts you for your iTunes
    password in order to validate your request. Upon entering the password and tapping
    `OK`, the book downloads and appears in your iBooks library with a "New" banner
    on it.


    ## Summary


    The iPad makes keeping up with your favorite TV shows, finding new music and applications,
    and watching your favorite movies as easy as tapping a button. Through the `App
    Store`, you have access to a large and expanding selection of software written
    to take advantage of the features of the iPad. The `iTunes Store` brings a wide
    variety of audio and visual entertainment to your iPad, while the `iBookstore`
    is sure to give traditional paper books a run for their money.


    The following are the key points of this chapter:


    - The `App Store`, `iTunes Store`, and `iBookstore` all require an iTunes account
    for billing and validation purposes. Although you can set up the account on your
    iPad, it''s usually much easier to accomplish this feat on your home computer.

    - All the stores require an Internet connection over Wi-Fi or 3G.

    - The free apps that are portals to the digital App and iTunes Stores come preloaded
    on every iPad. The `iBookstore` is accessible through `iBooks`, which is a free
    download from the `App Store`.

    - Do you need a hand in picking out movies to watch, music to listen to, or TV
    shows to follow? The `iTunes Genius` provides recommendations that get better
    the more you use iTunes to buy or rent media.

    - Be sure to consider the amount of storage in your iPad when purchasing or renting
    videos and movies from iTunes, because HD content consumes much more space than
    standard definition.

    - Take advantage of the free previews of music and books in the iTunes Store and
    iBookstore as a way to "try before you buy."


    # Chapter 9


    # Using iBooks


    Your iPad is more than a wonderful device for playing games, surfing the Web,
    and watching videos. It''s also a powerful e-book reader with a library of more
    than 30,000 free books at your fingertips, as well as thousands more paid books,
    including many *New York Times* best-sellers. But the iPad''s `iBooks` app doesn''t
    stop there! You can also add your PDFs to iBooks, so you can carry them with you
    on the iPad. This allows you to access all your PDFs from the same library as
    your books—a great feature for people who regularly work with or receive PDF files.


    In this chapter, you''ll discover how to navigate your iBooks bookshelf and the
    books themselves. You''ll also learn about bookmarking favorite passages from
    books, creating notes, organizing your books into collections, and even having
    a book read to you. Finally, we''ll take you through all the PDF features of iBooks.
    Let''s get started!


    ## The iBooks App


    As you discovered in [Chapter 8](#Chapter08.html#ch8), the iBooks application
    does not ship on the iPad. To use it, you must first download it for free from
    the iTunes Store. Once you have done this, the iBooks icon will appear on your
    iPad''s Home screen (see [Figure 9–1](#Chapter09.html#fig_9_1)).


    ![images](images/0901.jpg)


    **Figure 9–1**. *The iBooks icon*


    Tap the icon to launch the iBooks app. When you do, you''ll be presented with
    your iBooks bookshelf (see [Figure 9–2](#Chapter09.html#fig_9_2)). The bookshelf
    will be populated with any e-books you have added to your books library in iTunes
    (more on that in a moment).


    ![images](images/0902.jpg)


    **Figure 9–2.** *The iBooks bookshelf in Landscape and Portrait views*


    ## Syncing Books


    Before you can sync books, you need to first acquire some books to sync. We talked
    about syncing books to your iTunes library in [Chapter 2](#Chapter02.html#ch2),
    but we''ll touch on it again here. There are a few ways for you to obtain books
    to sync to your iPad.


    ### The iBookstore


    In the upper-left corner of your bookshelf, you''ll see a `Store` button (see
    [Figure 9–3](#Chapter09.html#fig_9_3)). Tap this button, and your bookshelf will
    flip around like a secret passageway. On the backside of the bookshelf, you''ll
    be presented with the iBookstore. In the previous chapter, you learned how to
    buy books and download free Project Gutenberg books from the iBookstore. Any book
    you download from the store will appear on your bookshelf and automatically sync
    with your computer when you connect to it with your iPad. For a complete walk-through
    of buying books in the iBookstore, see the previous chapter.


    ### ePub Books


    A second way to get books on your bookshelf is to download ePub-formatted books
    from other web sites and then drag them into your books library in your iTunes
    source list on your computer. Any ePub books you''ve added to your iTunes library
    will be automatically synced the next time you connect your iPad to your computer.


    #### What Is ePub?


    ePub is a universal e-book file format. Any device capable of opening and displaying
    ePub files can display the book, no matter where you bought it. In other words,
    you don''t need to buy your books from the iBookstore only. Several sites sell
    e-books in the ePub format that are compatible with the iPad. ePubbooks ([`www.epubbooks.com/buy-epub-books`](http://www.epubbooks.com/buy-epub-books))
    has an excellent list of sites that offer ePub books for sale and for free download.
    Once you''ve downloaded an ePub book, simply drag it to your iTunes library, and
    the book will sync to your iPad on the next connection.


    **NOTE:** Amazon''s Kindle bookstore is another popular place to buy e-books.
    However, Kindle books don''t use the ePub format. If you buy an e-book from the
    Kindle store, you''ll need to download Amazon''s free Kindle book reader app for
    the iPad to read those books. You will not be able to read a Kindle book in the
    iBooks app. Barnes & Noble''s Nook for iPad is another way to buy e-books for
    the iPad, and the BN eReader app supports the standard ePub format. This means
    you can move books back and forth between various ePub readers.'
  raw: '#### Purchases


    The Purchases screen displays any book that you have bought in the iBookstore.
    As you''ll find out in [Chapter 9](#Chapter09.html#ch9), you may eventually want
    to delete some of the books in your personal iBooks library. If you ever want
    to read those books again, or at least add them back to the library for future
    reference, Purchases shows a Download button next to the title (see [Figure 8–22](#Chapter08.html#fig_8_22))
    that you can use to reload a previously purchased book.


    ![images](images/0822.jpg)


    **Figure 8–22.** *If you''ve deleted a book from your library and want to add
    it back, you can do that from the Purchases screen in the iBookstore. Tapping
    Download reinstalls the book to its rightful place on your bookshelf.*


    When you tap the Download button, the iBookstore prompts you for your iTunes password
    in order to validate your request. Upon entering the password and tapping OK,
    the book downloads and appears in your iBooks library with a “New” banner on it.


    ### Summary


    The iPad makes keeping up with your favorite TV shows, finding new music and applications,
    and watching your favorite movies as easy as tapping a button. Through the App
    Store, you have access to a large and expanding selection of software written
    to take advantage of the features of the iPad. The iTunes Store brings a wide
    variety of audio and visual entertainment to your iPad, while the iBookstore is
    sure to give traditional paper books a run for their money.


    The following are the key points of this chapter:


    *   The App Store, iTunes Store, and iBookstore all require an iTunes account
    for billing and validation purposes. Although you can set up the account on your
    iPad, it''s usually much easier to accomplish this feat on your home computer.

    *   All the stores require an Internet connection over Wi-Fi or 3G.

    *   The free apps that are portals to the digital App and iTunes Stores come preloaded
    on every iPad. The iBookstore is accessible through iBooks, which is a free download
    from the App Store.

    *   Do you need a hand in picking out movies to watch, music to listen to, or
    TV shows to follow? The iTunes Genius provides recommendations that get better
    the more you use iTunes to buy or rent media.

    *   Be sure to consider the amount of storage in your iPad when purchasing or
    renting videos and movies from iTunes, because HD content consumes much more space
    than standard definition.

    *   Take advantage of the free previews of music and books in the iTunes Store
    and iBookstore as a way to “try before you buy.”


    ## Chapter 9


    ## Using iBooks


    Your iPad is more than a wonderful device for playing games, surfing the Web,
    and watching videos. It''s also a powerful e-book reader with a library of more
    than 30,000 free books at your fingertips, as well as thousands more paid books,
    including many *New York Times* best-sellers. But the iPad''siBooks app doesn''t
    stop there! You can also add your PDFs to iBooks, so you can carry them with you
    on the iPad. This allows you to access all your PDFs from the same library as
    your books—a great feature for people who regularly work with or receive PDF files.


    In this chapter, you''ll discover how to navigate your iBooks bookshelf and the
    books themselves. You''ll also learn about bookmarking favorite passages from
    books, creating notes, organizing your books into collections, and even having
    a book read to you. Finally, we''ll take you through all the PDF features of iBooks.
    Let''s get started!


    ### The iBooksApp


    As you discovered in [Chapter 8](#Chapter08.html#ch8), the iBooks application
    does not ship on the iPad. To use it, you must first download it for free from
    the iTunes Store. Once you have done this, the iBooks icon will appear on your
    iPad''s Home screen (see [Figure 9–1](#Chapter09.html#fig_9_1)).


    ![images](images/0901.jpg)


    **Figure 9–1**. *The iBooks icon*


    Tap the icon to launch the iBooks app. When you do, you''ll be presented with
    your iBooks bookshelf (see [Figure 9–2](#Chapter09.html#fig_9_2)). The bookshelf
    will be populated with any e-books you have added to your books library in iTunes
    (more on that in a moment).


    ![images](images/0902.jpg)


    **Figure 9–2.** *The iBooks bookshelf in Landscape and Portrait views*


    ### SyncingBooks


    Before you can sync books, you need to first acquire some books to sync. We talked
    about syncing books to your iTunes library in [Chapter 2](#Chapter02.html#ch2),
    but we''ll touch on it again here. There are a few ways for you to obtain books
    to sync to your iPad.


    #### TheiBookstore


    In the upper-left corner of your bookshelf, you''ll see a Store button (see [Figure
    9–3](#Chapter09.html#fig_9_3)). Tap this button, and your bookshelf will flip
    around like a secret passageway. On the backside of the bookshelf, you''ll be
    presented with the iBookstore. In the previous chapter, you learned how to buy
    books and download free Project Gutenberg books from the iBookstore. Any book
    you download from the store will appear on your bookshelf and automatically sync
    with your computer when you connect to it with your iPad. For a complete walk-through
    of buying books in the iBookstore, see the previous chapter.


    #### ePubBooks


    A second way to get books on your bookshelf is to download ePub-formatted books
    from other web sites and then drag them into your books library in your iTunes
    source list on your computer. Any ePub books you''ve added to your iTunes library
    will be automatically synced the next time you connect your iPad to your computer.


    ##### What IsePub?


    ePub is a universal e-book file format. Any device capable of opening and displaying
    ePub files can display the book, no matter where you bought it. In other words,
    you don''t need to buy your books from the iBookstore only. Several sites sell
    e-books in the ePub format that are compatible with the iPad. ePubbooks ([`www.epubbooks.com/buy-epub-books`](http://www.epubbooks.com/buy-epub-books))
    has an excellent list of sites that offer ePub books for sale and for free download.
    Once you''ve downloaded an ePub book, simply drag it to your iTunes library, and
    the book will sync to your iPad on the next connection.


    **NOTE:** Amazon''s Kindle bookstore is another popular place to buy e-books.
    However, Kindle books don''t use the ePub format. If you buy an e-book from the
    Kindle store, you''ll need to download Amazon''s free Kindle book reader app for
    the iPad to read those books. You will not be able to read a Kindle book in the
    iBooks app. Barnes & Noble''s Nook for iPad is another way to buy e-books for
    the iPad, and the BN eReader app supports the standard ePub format. This means
    you can move books back and forth between various ePub readers.'
  trans: '

    # 购买记录


    `购买记录`屏幕会显示您在 iBookstore 中购买的所有书籍。正如您将在第 9 章中了解到的，您可能最终需要删除个人 iBooks 书库中的部分书籍。如果您想重新阅读这些书籍，或至少将其添加回书库以备将来参考，`购买记录`会在书名旁显示一个`下载`按钮（见图
    8-22），点击即可重新下载之前购买过的书籍。


    ![images](img/0822.jpg)


    **图 8–22.** *如果您已从书库中删除某本书并希望重新添加，可以通过 iBookstore 中的`购买记录`屏幕实现。点击`下载`即可将书籍重新安装到书架上原本的位置。*


    点击`下载`按钮后，iBookstore 会要求您输入 iTunes 密码以验证请求。输入密码并点击`确定`后，书籍便会下载并出现在 iBooks 书库中，并带有"新书"标记。


    ## 本章小结


    iPad 让追看热门电视剧、发现新音乐和应用程序、欣赏喜爱的电影变得像点击按钮一样简单。通过`App Store`，您可以访问海量且不断扩充的、专为 iPad
    功能优化的应用程序。`iTunes Store`为您带来了丰富多彩的视听娱乐内容，而`iBookstore`则足以让传统纸质书籍面临强劲挑战。


    以下是本章要点：


    -   `App Store`、`iTunes Store`和`iBookstore`都需要 iTunes 账户用于结算和验证。虽然您可以在 iPad 上直接创建账户，但在家用电脑上操作通常要简便得多。

    -   所有商店都需要通过 Wi-Fi 或 3G 网络连接。

    -   作为数字应用商店和 iTunes 商店入口的免费应用已预装在每台 iPad 上。`iBookstore`可通过`iBooks`访问，而`iBooks`是从`App
    Store`免费下载的。

    -   在选择要看哪部电影、听什么音乐或追哪部剧集时需要帮助吗？`iTunes Genius`能提供推荐，并且您使用 iTunes 购买或租赁媒体的次数越多，推荐就越精准。

    -   从 iTunes 购买或租赁视频和电影时，请务必考虑 iPad 的存储空间，因为高清内容比标清内容占用更多空间。

    -   善用 iTunes Store 和 iBookstore 中音乐和书籍的免费预览功能，这相当于"购买前先试听/试读"。


    # 第 9 章


    # 使用 iBooks


    您的 iPad 不仅是玩游戏、上网和观看视频的绝佳设备，它还是一个强大的电子书阅读器。指尖之下，即可畅享超过 30,000 册免费书籍，以及数千册付费图书，其中包含众多《纽约时报》畅销书。但
    iPad 的`iBooks`应用的功能远不止于此！您还可以将 PDF 文件添加到 iBooks 中，随身携带。这意味着您可以在与书籍相同的书库中访问所有 PDF
    文件——对于经常处理或接收 PDF 文件的用户来说，这无疑是一项强大的功能。


    在本章中，您将学习如何浏览 iBooks 书架和书籍本身。您还将了解如何为书中的精彩段落添加书签、创建笔记、将书籍整理到不同的收藏中，甚至可以让 iPad
    为您朗读书籍。最后，我们将带您了解 iBooks 所有的 PDF 功能。让我们开始吧！


    ## iBooks 应用


    正如您在第 8 章中了解到的，iBooks 应用并未预装在 iPad 上。要使用它，您需要先从 iTunes Store 免费下载。下载完成后，iBooks
    图标就会出现在 iPad 的主屏幕上（见图 9–1）。


    ![images](img/0901.jpg)


    **图 9–1**. *iBooks 图标*


    点击图标即可启动 iBooks 应用。启动后，您将看到 iBooks 书架（见图 9–2）。书架上将显示您已添加到 iTunes 书籍库中的所有电子书（稍后将详细介绍）。


    ![images](img/0902.jpg)


    **图 9–2.** *横屏和竖屏视图下的 iBooks 书架*


    ## 同步书籍


    在同步书籍之前，您需要先获取一些书籍。我们在第 2 章中讨论过如何将书籍同步到 iTunes 资料库，但这里我们再次提及。有几种方法可以为您的 iPad 获取书籍进行同步。


    ### iBookstore


    在书架的左上角，您会看到一个`书店`按钮（见图 9–3）。点击此按钮，您的书架会像秘密通道一样翻转过来。在书架的背面，您会看到 iBookstore。在上一章中，您学习了如何从
    iBookstore 购买书籍和免费下载 Project Gutenberg 的书籍。您从商店下载的任何书籍都会出现在书架上，并在您用 iPad 连接到电脑时自动与电脑同步。关于在
    iBookstore 中购买书籍的完整指南，请参阅上一章。


    ### ePub 电子书


    将书籍添加到书架的第二种方法是从其他网站下载 ePub 格式的电子书，然后将其拖放到电脑上 iTunes 源列表中的书籍资料库中。您添加到 iTunes 资料库中的任何
    ePub 电子书，下次将 iPad 连接到电脑时都会自动同步。


    #### 什么是 ePub？


    ePub 是一种通用的电子书文件格式。任何能够打开和显示 ePub 文件的设备都能显示该书籍，无论您从何处购买。换句话说，您不必只能在 iBookstore
    购买书籍。有几个网站销售与 iPad 兼容的 ePub 格式电子书。ePubbooks ([`www.epubbooks.com/buy-epub-books`](http://www.epubbooks.com/buy-epub-books))
    提供了一个出色的网站列表，其中提供 ePub 书籍的购买和免费下载。下载了 ePub 书籍后，只需将其拖入 iTunes 资料库，下次连接时，该书就会同步到您的
    iPad 上。


    **注：** 亚马逊的 Kindle 书店是另一个购买电子书的热门去处。然而，Kindle 书籍不使用 ePub 格式。如果您从 Kindle 书店购买了电子书，则需要下载亚马逊免费的
    iPad 版 Kindle 阅读器应用来阅读这些书籍。您将无法在 iBooks 应用中阅读 Kindle 书籍。Barnes & Noble 的 iPad
    版 Nook 是在 iPad 上购买电子书的另一种方式，其 BN eReader 应用支持标准的 ePub 格式。这意味着您可以在各种 ePub 阅读器之间来回移动书籍。

