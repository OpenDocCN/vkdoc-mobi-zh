  trans: '

    # 《今日美国》iPad 版


    《今日美国》在打造其 iPad 应用（见图 16–9）方面做得非常出色，使其看起来就像真正的报纸——从屏幕顶部锯齿状的报纸边缘就可见一斑。你可以浏览和阅读来自新闻、财经、体育、生活、科技和旅游板块的故事；查看本地和全国的天气预报；并随时了解所有最新比分。“今日图片”板块尤其有趣，让你可以滑动浏览当天新闻、体育和娱乐领域的最佳照片。你还可以将它们以幻灯片形式播放。该应用在
    App Store 中是免费的。


    ![images](img/1609.jpg)


    **图 16–9.** 《今日美国》


    ## 天气应用


    正如新闻应用一样，iPad 上有数不清的天气应用，但以下两款是我们的最爱。


    ### Weather HD


    Weather HD（见图 16–10）并非功能最全面的天气应用，但它是最美观的。浏览你选定城市的 3 小时和 7 天预报，同时被一些代表当前室外天气、最精美的
    3D 动画景观所吸引。Weather HD 应用向你展示了你的 iPad 屏幕可以有多么绚丽。当你穿梭在一片郁郁葱葱的草地和高耸的风力涡轮机之间，或是在远方升起一轮壮丽明月的云层中翱翔时，请尽情观赏。外面下雨了？你会发誓几乎能感觉到雨滴轻拂你的脸庞，因为
    Weather HD 带你滑过一片绿色乡野，空气中悬浮着点点雨珠。它在 App Store 中仅售 0.99 美元，物超所值。


    ![images](img/1610.jpg)


    **图 16–10.** *Weather HD*


    ### The Weather Channel Max


    虽然它缺少 Weather HD 的美感，但天气频道的官方 iPad 应用在功能上足以弥补这一点。适用于 iPad 的 The Weather Channel
    Max（见图 16–11）提供详细的天气报告，包括当前、36 小时和 10 天预报。你可以在应用内观看最新的天气相关新闻故事和精选的天气频道原创节目。你甚至可以通过捏合和缩放来浏览天气地图。查看多普勒雷达、云层覆盖、体感温度，甚至紫外线指数地图。全世界的天气尽在你掌握。最棒的是，它在
    App Store 中是免费的。


    ![images](img/1611.jpg)


    **图 16–11.** *The Weather Channel Max*


    ## 作为艺术家画板的 iPad


    如你所见，iPad 不仅仅是消费数据的工具；你还可以用它来创作文档、电子表格和演示文稿等内容。但 iPad 上的内容创作能力并不仅限于商业领域的人士。iPad
    是一个绝佳的艺术工具。它简直就是一个空白的画布，你可以用它创造出连毕加索都会羡慕的杰作。虽然有多款 iPad 绘画应用，以下是我们的两款最爱。


    ### Brushes


    Brushes 最初在 iPhone 上起步，后来在 iPad 上提升到了新的高度（见图 16–12）。Brushes 是一个使用 iPad 多点触控显示屏创作原创艺术品的强大工具。用手指拖拽和滑动，在空白画布上画出笔触。使用高级颜色选择器、无数种画笔、图层、吸管工具、撤销和重做控制等功能，创造出你所能想象的一切。你认为在
    iPad 上创作艺术品不适合“严肃”艺术家吗？艺术家乔治·科伦坡曾著名地完全使用 Brushes（iPhone 版）创作了 2009 年 6 月 1 日的《纽约客》封面。现在想象一下，他——以及你——在一个
    iPad 屏幕大小的数字画布上能做出什么。该应用售价 7.99 美元，但想想你省下了多少购买替换画布和颜料的钱吧。


    ![images](img/1612.jpg)


    **图 16–12.** *这看起来像是一个两岁小孩画的，但实际上是由其中一位作者在大约 30 秒内创作的。亲自尝试用 Brushes 在 iPad 上创作艺术吧。*


    ### Adobe Ideas


    如果说 Brushes 是画布，那么 Adobe Ideas 就是速写本（见图 16–13）。用你的指尖，草拟出你对那件即将风靡纽约和米兰的连衣裙的最新想法，测试明年最受欢迎的新超级英雄的设计，甚至可以在星巴克的咖啡桌会议上把它当作白板使用。该应用的一个好功能是，你可以将你创建的任何图像导出为
    PDF，并通过电子邮件发送给自己或他人，以便在 Adobe 的专业应用（如 Illustrator 和 Photoshop）中编辑，或使用任何 PDF 查看器查看。Adobe
    Ideas 在 App Store 中是免费的。


    ![images](img/1613.jpg)


    **图 16–13.** *Adobe Ideas 让你能把想法落到纸上……呃，是落到多点触控屏幕上。*


    ## 作为电话的 iPad


    iPad 刚推出时，有些人开玩笑说它不过是一个大号的 iPhone。现在你知道了，他们大错特错。然而，你实际上可以把 iPad 当作电话使用。你只需从 App
    Store 下载免费的 Skype 应用（见图 16–14），就可以从你的 iPad 向世界上任何一部电话拨打电话。


    我们想指出的是，在撰写本文时，Skype 尚未发布 iPad 版应用。不过，由于大多数 iPhone 应用都能在 iPad 上运行，你可以毫无问题地下载并在
    iPad 上使用 Skype for iPhone。要使用该应用，你需要一个免费的 Skype 帐户，你可以在[`www.skype.com`](http://www.skype.com)上进行设置。你还需要连接到
    Wi-Fi 网络，因为 Skype 使用 VoIP（通过互联网线路拨打的电话）进行通话。


    一旦你登录 iPad 上的 Skype 应用，就可以免费与其他 Skype 用户进行 iPad 对电脑的通话。如果你购买了 Skype 点数，就可以进行 iPad
    对固定电话或手机的通话。其中一位作者在伦敦用他的 iPad 上的 Skype 给他在美国的母亲打家里的座机，因为这比常规的国际长途费用甚至购买电话卡都要便宜得多。所以，iPad
    不仅仅是一个放大版的 iPhone，它还能像 iPhone 一样拨打电话。


    ![images](img/1614.jpg)


    **图 16–14.** *在 iPad 上运行的 Skype iPhone 应用*


    ## 作为厨房帮手的 iPad


    这听起来可能有点奇怪，但 iPad 在厨房里非常实用。无论你是把它当作电子烹饪书，在等水烧开时上网冲浪，还是在做饭时听音乐，iPad 都是完美的厨房电脑。你需要确保你的
    iPad 远离液体或热源，但如果你像对待心爱的烹饪书一样爱护它，那很可能就没事。


    在厨房台面上保护 iPad 免受液体飞溅或污渍沾染的一个好方法是把它放进一个可重新密封的拉链式冷冻袋中。Chef Sleeve（[`www.chefsleeve.com`](http://www.chefsleeve.com)）也生产可重复使用的袋子，尺寸非常适合
    iPad，由更透明的塑料制成，并且配有可兼作 iPad 支架的盒子。


    由于你要切蔬菜和切肉，使用一个带有内置支架的保护套让 iPad 保持直立是个好主意。这样占用台面空间更小，只需快速瞥一眼屏幕，就能知道下一步需要在食谱里添加什么配料。Apple
    的 iPad 保护套非常适合将 iPad 放置在合适的位置。我们还建议将`自动锁定`（`设置` ![images](img/U001.jpg) `通用` ![images](img/U001.jpg)
    `自动锁定`）设置为`永不`，这样你就不必频繁地重新打开 iPad。牢记这些提示，让我们探索一些适合厨房的应用吧。

