  trans: '

    #### 浏览您的邮件


    您可以通过查看任意邮箱中每个列表项左侧的标记，快速判断哪些邮件已浏览、哪些尚未阅读。每个未读消息旁会显示一个蓝色圆点，如图 11-11 所示，其中三封邮件中有两封尚未阅读。收件箱顶部会以括号形式显示未读邮件数量。


    ![images](img/1111.jpg)


    **图 11-11.** *此示例 Gmail 账户的收件箱包含两封未读邮件，其余邮件已被选中并查看。*


    要阅读邮件，请轻点邮箱中的邮件条目，然后在屏幕右侧（横屏模式）或全屏（竖屏模式）查看。您可以通过上下滚动来浏览邮件内容。


    邮件右上角的`详情`选项可让您展开邮件头部，查看更多关于邮件发送对象的信息。展开后，您可以轻点`隐藏`返回原始显示界面。


    #### 查看和打开附件


    大多数人使用电子邮件在电脑之间发送文档或其他文件。假设有人想发送一个 PDF 文件供您查看，或者一个 Microsoft Word `.doc` 文件让您在
    iPad 上进行修改。您需要知道如何接收该附件、查看附件，并可能在相应应用中打开它进行修改。


    当带有附件的邮件到达时，收件箱中会显示一个微小的回形针图标，表示该邮件包含附件。在邮件正文中，附件以小图标形式呈现，并且在您轻点它们之前不会下载到 iPad。这减少了自动传输到您
    iPad 的数据量。您将看到文件名、文件大小以及一个图标，如图 11-12 所示。


    ![images](img/1112.jpg)


    **图 11-12.** *一个微小的回形针图标表示该邮件带有附件，即随核心邮件一起发送的文件。附件会在邮件中显示其名称、大小和图标。轻点图标可尝试下载并查看附件文件，或长按图标以弹出包含其他选项的菜单。*


    根据文件类型（并非所有附件都可查看），轻点图标通常允许您在邮件内置查看器（称为`快速查看`查看器）中打开文件，如图 11-13 所示。该查看器允许您浏览文档、播放媒体，并快速概览发送给您的材料，但查看器不允许您对文件进行修改。对于许多附件，您无需对文件进行任何进一步操作，此时您可以轻点`完成`按钮返回收件箱。否则，您可以在其他应用中打开该文件（例如，编辑
    Word 文档），这可以通过`打开方式`菜单完成。您可以通过两种方式访问此菜单。


    ![images](img/1113.jpg)


    **图 11-13.** *邮件的`快速查看`附件查看器允许您查看作为邮件附件发送的多种文件类型。查看完毕后，您可以轻点`完成`退出查看器，或使用右上角的操作菜单在其他应用中打开该文件或执行其他系统功能。此处，邮件允许您将
    PDF 表单打印到任何支持的 AirPrint 打印机上。*


    iPad 邮件应用提供了两种将邮件项目重定向到其他应用的方法。如图 11-13 所示，您可以轻点`快速查看`查看器屏幕右上角的`操作`菜单按钮。这将弹出一个弹出式菜单，其中包含一个或多个选项（例如图
    11-13 中的`表单工具`）用于在特定应用中打开附件，一个`打开方式`选项（轻点后可查看可打开该附件的应用列表），以及一个`打印`选项。


    或者，您也可以直接长按邮件本身中的文件附件图标。附件上方会弹出一个类似的`打开方式`弹出窗口，提供相同的选项（如果文件可查看，还可能包含一个`快速查看`选项）。按钮上的名称会根据附件的文件类型以及您
    iPad 上安装的应用而有所不同。如果`快速查看`选项可用，轻点它即可在与直接轻点图标相同的查看器中快速查看文档（参见图 11-13）。您无法对文档进行修改或执行其他操作；只能查看。


    如果您在让邮件应用在正确应用中打开附件时遇到问题，请尝试先在`快速查看`中打开文档，然后轻点`快速查看`窗口右上角的`打开方式`按钮。它会列出您 iPad
    上当前安装的所有能够打开和编辑该特定文件类型的应用。


    ##### 编辑您的邮件


    邮箱列表右上角的`编辑`按钮提供了一种方法，可以对邮箱中的邮件进行批量删除或移动。请参考图 11-14，该图显示了轻点`编辑`后的邮箱状态。在每个消息旁边，您会看到一个空心圆圈或一个红色填充并带勾选的圆圈。初始状态下，这些圆圈是空心的。轻点一条消息会将该条目添加到选中集合（圆圈变为红色背景上带有白色勾选标记）或从集合中移除（圆圈恢复为空心）。


    在批量模式下，您总是从选择要操作的项目开始。在选择时，右侧会出现一个消息“堆叠”，如图 11-14 所示，为您提供最近选中项目的简单视觉概览以及已选项目数量的大致指示。


    要删除所有选中的消息，请轻点窗口底部的红色`删除`按钮。如果您使用的是 Gmail，`删除`按钮会替换为`归档`按钮（如图 11-14 所示），因为 Gmail
    有 iPad 支持的“永不删除数据”策略。无论您是否使用 Gmail 账户，已删除的项目都会从您的邮箱中移除。它们会自动移至账户的垃圾桶、移至归档文件夹（如
    Gmail），或者可能被彻底移除并处置。这完全取决于您的邮件账户设置方式以及您的邮件提供商如何处理删除操作。


    要在非编辑模式下从任何邮箱中移除单条消息，请用手指在消息上向左或向右滑动。会出现一个红色的`删除`按钮，轻点它可将该消息发送至垃圾桶。除非您在`设置`中选择了该选项（如本章前面所述），否则您不会收到删除确认提示。


    ![images](img/1114.jpg)


    **图 11-14.** *要批量删除消息，请轻点消息列表顶部的`编辑`按钮；然后轻点消息列表左侧的圆圈以标记要删除的邮件。最后，轻点`删除`按钮（Gmail
    中为`归档`按钮，该操作会存储您的所有邮件）。*

    '
- fmt: '### Recovering Deleted Items


    Did you accidentally delete messages? Your ability to retrieve those deleted items
    depends on your mail provider. In some situations, you don’t need to worry, since
    you may be able to retrieve them from another mailbox such as the `Trash` mailbox,
    which is used by many IMAP mail accounts. In other cases, you may need to hunt
    around the mailbox a bit to find out where deleted items went, such as into an
    archival folder. In still others, your mail will actually be gone permanently.
    So, always check with your account provider to see how deleted messages are handled
    for your e-mail account.


    If your account uses the `Trash` mailbox, you can open the mailbox from the list
    of mailboxes for the account (as shown earlier in [Figure 11-10](#Chapter11.html#fig_11_10))
    and use the same management tools described in the last section. Tap the `Edit`
    button, mark the messages that you want to recover by tapping the empty circles
    next to them, and then tap the `Move` button at the bottom of the window. That
    displays the list of mailboxes so you can move the selected mail items back to
    a destination mailbox that you select, such as the account’s inbox. Alternatively,
    tap `Cancel` instead of tapping a mailbox to leave the messages in the `Trash`
    mailbox.


    ### Navigating Mail


    You’ll find several buttons at the top of every Mail window that are important
    to know about. In portrait orientation, up and down arrows on the top left side
    of the window let you navigate to the previous or next message. On the top right
    side of the window are buttons for moving the message to another mailbox, deleting
    the message, replying or forwarding the message, or creating a new message.


    #### The Move and Delete Buttons


    The `Move` button looks like a folder with a downward-pointing arrow. To its right
    you’ll find either a standard `Delete` button (trash can icon) or, in Gmail, an
    `Archive` button (an arrow pointing into a box).


    Tapping the `Move` button displays the list of mailboxes; navigate to a mailbox
    and then tap it to move the message from its original location into the selected
    mailbox. Tapping the `Delete/Archive` button provides a simple way to remove the
    current message. If supported, the message will move to the account’s `Trash`/`Archive`
    mailbox, where either it will be deleted eventually or you will retrieve it if
    you’ve deleted it in error. With certain POP accounts, the message will be deleted
    immediately.


    #### Reply/Reply All/Forward/Print


    The `Reply/Forward` button looks like a curved, left-pointing arrow and appears
    to the right of the `Move` and `Delete/Archive` buttons. When you tap the arrow,
    a small pop-up menu appears with `Reply`, `Forward`, and `Print` options (see
    [Figure 11-15](#Chapter11.html#fig_11_15)). Each option allows you to choose an
    action associated with the currently displayed e-mail.


    Tapping `Reply` opens a new message addressed to the original sender, containing
    the content of the original message, and allowing you to write your reply at the
    top of the original message. The message subject is also repeated, with the word
    `Re:` listed at the beginning to let the original sender know you’re sending a
    reply.


    If a message was addressed to you and several other people, another button appears—`Reply
    All`. Tapping this button sends the reply to the original sender and all of the
    other recipients of the e-mail as well.


    The `Forward` button forwards the message to third parties, not limited to the
    parties included in the original message. Forwarding allows you to pass messages
    along to anyone who might be interested in their contents. For example, you might
    forward some family pictures to friends, or send along an amusing joke to your
    colleagues. When you tap `Forward`, the message appears in a new window with an
    empty address list. The subject is repeated with the word `Fwd:` to indicate to
    the recipient that you’re forwarding someone else’s e-mail to them, and then there’s
    a place for you to write a short note to the new recipient of the message.


    The `Print` option allows you to wirelessly print from your iPad to a supported
    AirPrint printer. In addition, a number of third-party solutions like Printopia
    for OS X and AirPrint Activator for Windows let you print to most network-connected
    printers, even if they’re not officially AirPrint capable.


    ![images](images/1115.jpg)


    **Figure 11-15.** *You can reply to or forward any e-mail by tapping the `Reply/Forward`
    button at the top of the Mail message window.*'
