- fmt: '# Airplane Mode


    When you''re flying with an iPad with Wi-Fi + 3G, it''s just as if you have a
    large mobile phone in your possession. Although airlines are much happier with
    Wi-Fi these days, with many actually providing in-flight Wi-Fi service, you''ll
    still find that 3G and other mobile connections are frowned upon while you''re
    in the air.


    Like an iPhone, the iPad with Wi-Fi + 3G has controls for being switched into
    Airplane Mode. To turn on Airplane Mode when the flight attendant makes the announcement
    that "all cellular phones must be turned off," launch `Settings`. The first control
    available at the top of the page (Figure 5–10) is the Airplane Mode switch.


    ![images](images/0510.jpg)


    **Figure 5–10.** *Apple knows how important it is to turn off that 3G radio in
    your iPad during a flight. That''s why Airplane Mode is the first setting available
    in the Settings app.*


    Slide the Airplane Mode switch to the right so that the switch turns to On and
    disables Wi-Fi, 3G, and Bluetooth. When you want to use Wi-Fi during a flight,
    you can do that by tapping the `Wi-Fi Settings` button located just below Airplane
    Mode and then enabling Wi-Fi, separate from any 3G service.


    # The Alternative to Built-in 3G


    One way of getting mobile connectivity without built-in 3G in your iPad is to
    use a mobile broadband router. These devices are available from a number of cellular
    carriers and are small boxes that attach to a 3G network and then allow up to
    five devices near the box to share the 3G connection.


    In the United States and Canada, mobile broadband routers are available from Novatel
    Wireless (brand name `MiFi`) and Sierra Wireless (brand name `Overdrive`). These
    petite boxes are available from Sprint and Verizon, which are oddly enough not
    carriers associated with the GSM standard used by the iPad.


    Sprint''s `Overdrive` 3G/4G Mobile Hotspot (Figure 5–11) is an example of the
    mobile broadband routers that can be used with your iPad. The interesting thing
    about the `Overdrive` is that it works with the Sprint 4G network that is beginning
    to be rolled out to major cities in the United States. The 4G network is up to
    ten times faster than 3G service, meaning that you could conceivably use your
    iPad at speeds that would be similar to those achieved by a Wi-Fi network.


    Several mobile phones (the Palm Pre Plus, for example) can be used as mobile hotspots,
    so check with your cellular carrier for information about this possibility. In
    many countries, including the United States, carriers allow *tethering* to an
    iPhone—that is, using a 3G iPhone as a mobile broadband router. However, if tethering
    your iPhone while traveling, you will need to arrange for data roaming just as
    you would on the iPad.


    ![images](images/0511.jpg)


    **Figure 5–11.** *Want to connect at speeds faster than 3G and share your wireless
    broadband connection with friends? A wireless broadband router such as the Sprint
    Overdrive 3G/4G Mobile Hotspot can do that for you. Image courtesy of Sprint.*


    ## Summary


    In this chapter, we explained the process of connecting to the Internet both through
    Wi-Fi and through 3G data connections. You learned some valuable troubleshooting
    tips for those times that you can''t connect to Wi-Fi networks. Here we summarize
    some of the most important ideas in this chapter:


    * Your iPad communicates with the world through Wi-Fi and (if you have an iPad
    with Wi-Fi + 3G) 3G cellular connections. Without Wi-Fi or 3G, you have no connection
    to the Internet.

    * Security is very important when using Wi-Fi. To achieve the highest levels of
    wireless security, use WPA2-level encryption.

    * Because of the expense, data roaming should be turned off when you''re traveling
    internationally. Instead, either use GSM roaming partners and sign up for an international
    data plan, *or* rent a mobile hotspot that offers Wi-Fi access for your iPad and
    other mobile devices.

    * Be sure to put your 3G iPad into Airplane Mode when you''re using it on an airplane
    to comply with federal and international regulations.


    # Chapter 6


    # Browsing the Internet with Safari


    When Apple introduced the iPhone in 2007, Steve Jobs said it was like having the
    Web in your pocket. The `Safari` web browser on the iPhone was revolutionary.
    It allowed you to literally touch the Web like never before. Take the iPhone Safari
    experience, magnify it by ten, and you''ll have some idea of what browsing the
    Web is like on the iPad. Web pages on the iPad''s screen are large and show you
    more than ever before with a clarity you''ve never imagined. It''s like the iPad
    turns the Web into an interactive magazine in the palm of your hands.


    In this chapter, you''ll discover how to get the most from `Safari` and all its
    awesome powers. You''ll learn how to navigate web pages, manage bookmarks, and
    use both Portrait and Landscape orientations. You''ll also discover some great
    finger-tap shortcuts, bookmarking skills, and the handy Web Clip feature. Read
    on to learn about all this and more.


    ## Getting Started with Safari


    Tap the `Safari` application icon to launch the program. By default, Apple places
    it in the bottom left of the Dock. It''s marked with a white compass on a blue
    background (see Figure 6–1). Once tapped, the `Safari` application opens a new
    window.


    ![images](images/0601.jpg)


    **Figure 6–1.** *The Safari icon*'
