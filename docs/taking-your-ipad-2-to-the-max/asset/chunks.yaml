    In [Chapter 1](#Chapter01.html#ch1), you were briefly introduced to the names
    and locations of some of the switches and ports that decorate the outside of your
    iPad. In this chapter, we explain *how* those switches and ports are used.


    #### On/Off Sleep/Wake Button


    On the top-right corner of the iPad is one of the more important buttons on this
    little slab of glass and aluminum: the On/Off Sleep/Wake button (see [Figure 3–1](#Chapter03.html#fig_3_1)).
    That’s kind of an odd name for a button, but it describes the function quite clearly.


    When your iPad has been totally powered down, you’ll need to press and hold this
    button for two or three seconds to turn it back on. A white Apple logo will appear,
    followed shortly by either the Home screen of your iPad or the Passcode Lock screen.


    ![images](images/0301.jpg)


    **Figure 3–1.** *The Sleep/Wake button is used for powering the iPad on or off
    and for putting it to sleep when it’s not being used.*


    If you don’t plan on using your iPad for a few hours, you have your choice of
    either waiting for it to automatically lock and go to sleep (if that option has
    been turned on in Settings) or manually putting it to sleep. To do the latter,
    give the button a quick, firm press, and the screen goes dark. When the sound
    on your iPad is turned up, you’ll even hear a click as an audible verification
    that the device has been put to sleep.


    You can wake up the iPad either by giving the On/Off Sleep/Wake button another
    quick press or by pressing the Home button. Once again, if you have enabled a
    passcode lock, you need to enter that passcode correctly before you can use the
    iPad.


    Occasionally, you may want to shut off your iPad completely. This means, of course,
    that it won’t be magically picking up e-mail, waking to display alarms, or doing
    anything else. It will be totally shut down. This is handy when you’re not going
    to be using the iPad for a long time (for example, you leave it home while on
    a trip) and don’t want the battery to drain.


    To shut off the iPad, simply hold down the On/Off Sleep/Wake button for about
    five seconds. The iPad will display a black screen with a Cancel button at the
    bottom in case you really don’t want to shut it off and a red button near the
    top labeled “Slide to power off.” Sliding your button to the right with your finger
    shuts off power to the device.


    This trick can be useful on those rare occasions where an iPad app simply won’t
    respond to your touch and the entire device is locked up. To turn it back on,
    press the On/Off Sleep/Wake button one more time.


    With an iPad 2 adorned with a Smart Cover, there’s another way to sleep and wake
    the iPad: just open the Smart Cover to wake the iPad, or close it to put it back
    to sleep.


    #### Mute/Screen Rotation Lock


    Moving to the right side of the iPad (as oriented with the Home button and Dock
    Connector port at the bottom and the screen facing you), the next switch is the
    mute/screen rotation lock (see [Figure 3–2](#Chapter03.html#fig_3_2)). The name
    of this switch describes the two functions it performs; by default, it is used
    to mute the iPad, turning the sound on the device completely off. But the mute/screen
    rotation lock switch can also be used to keep your iPad’s screen from changing
    orientation.


    ![images](images/0302.jpg)


    **Figure 3–2.** *The mute/screen rotation lock (the small switch) and the volume
    toggle (the larger button)*


    When the button is used to mute your iPad, moving the switch from the top position
    to the bottom turns off the sound on the device and briefly displays a mute icon
    (see [Figure 3–3](#Chapter03.html#fig_3_3)) on the iPad screen to signify that
    the sound has been turned off. Muting your iPad can be very useful if you’re trying
    to play Angry Birds while attending an important meeting.


    ![images](images/0303.jpg)


    **Figure 3–3.** *When you flip the mute/screen orientation switch to the down
    position, this mute icon displays.*


    New iPad users can sometimes get frustrated when they’re reading or playing a
    game, tilt the iPad a little too far in one direction or another, and have the
    screen change its orientation from portrait to landscape, or vice versa.


    That’s where the screen rotation lock comes in handy. It’s the second use of the
    switch on the side of your iPad. To allow the switch to lock the rotation of your
    iPad screen, go to Settings ![images](images/U001.jpg) General, and set “Use Side
    Switch to:” Lock Rotation. When you move the switch to the down position, an icon
    showing a circular arrow with a lock in the middle of it (see [Figure 3–4](#Chapter03.html#fig_3_4))
    appears on the screen momentarily. The same icon in miniature form appears in
    the right corner of the status bar at the top of the screen. Now you can turn
    the iPad any way you want, and the screen always stays in the same orientation.


    ![images](images/0304.jpg)


    **Figure 3–4.** *No matter how your iPad is oriented, the display will remain
    in the same orientation if the screen rotation lock is enabled.*


    For example, if you''re reading a book in iBooks and find that you prefer the
    book-like feel of reading in portrait mode, you might want to lock the screen
    orientation in portrait mode. To lock the screen in portrait mode, orient the
    display by tilting the bottom of the iPad down. When the display is in the proper
    orientation, slide the screen rotation lock button down.


    To turn the screen rotation lock off, just slide the mute/screen orientation switch
    upward toward the top of the screen. The lock in the center of the icon disappears,
    showing that the screen rotation is now unlocked.


    #### VolumeToggle


    Continuing our tour around the perimeter of the iPad, the next button encountered
    is the volume toggle. As the name implies, it is used to turn the volume up or
    down or to shut off sound completely. You can see where the volume toggle is located
    in [Figure 3–2](#Chapter03.html#fig_3_2).


    Increasing the volume of the speaker in the iPad (or any headphones attached through
    the headphone jack) just requires a push on the top part of the toggle. One push
    brings the volume up a notch; holding down on the toggle quickly takes the iPad
    to top volume.


    Bringing the volume down requires pushing on the other end of the volume toggle.
    If you push and hold the volume toggle on its lower end, your iPad’s sound is
    shut off. That’s handy for those situations where you need to quickly turn off
    the volume on Pandora when the phone rings.


    Whenever you touch the volume toggle, a visual indication of volume appears in
    the center of the iPad display (see [Figure 3–5](#Chapter03.html#fig_3_5)). If
    you have a set of Apple headphones with a volume switch on the cord plugged into
    your iPad, you can use that switch in a similar manner to adjust volume without
    touching the iPad.


    ![images](images/0305.jpg)


    **Figure 3–5.** *This transparent icon appears when you adjust the volume on your
    iPad with either the volume toggle or headphones with a volume switch.*


    #### Speaker


    Speaking of sound volume, the next item on the iPad tour is the speaker. It’s
    hidden on the bottom of the iPad (see [Figure 3–6](#Chapter03.html#fig_3_6)) and
    blasts out various system beeps, music, and movie soundtracks through a grid of
    tiny holes in the curved aluminum bottom of the iPad 2\. On the original iPad,
    it’s a set of three tiny oblong openings behind mesh grills.


    ![images](images/0306.jpg)


    **Figure 3–6.** *The iPad speaker openings (right) and Dock Connector port (left)*


    There’s not much to say about the speaker, other than if you’re purchasing or
