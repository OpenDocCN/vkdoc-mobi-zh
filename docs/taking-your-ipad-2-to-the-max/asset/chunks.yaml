  trans: '

    ### iPad 信息框


    此信息框中将显示您的 iPad 图像及其名称、容量、软件版本和序列号，具体说明如下列所示。iPad 图像应与您设备的型号和颜色相匹配。


    -   **名称**：这是您为 iPad 起的任何名称。要重命名，请在来源列表中点击该 iPad。这会在名称周围打开一个文本编辑字段。根据需要编辑名称（参见图
    2–8），然后按 Return 或 Enter 键确认更改。

    -   **容量**：此数字表示 iPad 的实际数据容量。与所有数据存储设备一样，标称容量（例如 16GB）与实际容量（14.03GB）并不完全一致。


    > **注：** 实际数据容量与标称容量之间的差异是因为标称容量采用十进制；Apple 和其他制造商将 1 GB 定义为 1,000,000,000 字节。在计算机术语中，这个十进制数没有意义。计算机使用二进制。对于计算机而言，1
    GB 等于 1,073,741,824 字节，因此一台 64GB iPad 标称的 64,000,000,000 字节会被缩减为大约 59.6 个计算机意义上的
    GB。再加上操作系统文件结构的一些开销，就变成了您 iTunes 屏幕上为 64GB iPad 显示的 59.42GB。多年来，关于这个问题已经提起了各种无用的诉讼，但这仍然是海量存储行业的通行做法。


    -   **软件版本**：iPad 会定期通过错误修复和功能改进来更新其软件。iTunes 会指示当前安装在您 iPad 上的固件版本。点击“软件版本”字样可切换至“编译版本”显示，查看您正在使用的固件编译版本。在编写本书时，最新的
    iPad 软件是 4.3.1 版本，编译版本为 8G4。

    -   **序列号**：此唯一序列号用于向 Apple 标识您的 iPad。点击“序列号”字样可显示您设备的 UDID（唯一设备标识符）。


    > **提示：** 使用序列号在 Apple 自助维修网站（[`selfsolve.apple.com/GetWarranty.do`](https://selfsolve.apple.com/GetWarranty.do)）上检查您当前的保修状态。在那里，您可以查看设备是否已正确注册、是否拥有有效的电话技术支持服务、是否享有维修和服务保障，以及您的
    AppleCare 保护计划的详细信息。如果您尚未为新 iPad 注册 AppleCare 服务，可以直接在自助维修网站上进行。它会提示您输入账单信息并处理您的信用卡付款。AppleCare
    可将您 iPad 的保修期延长至硬件购买之日起两年。


    > **注：** 您可以使用 UDID 为您的 iPad 注册某些开发者 Beta 测试（称为临时构建）。通过“编辑”![images](img/U001.jpg)“拷贝”将此值复制到内存，然后粘贴到电子邮件中，将您的
    UDID 发送给开发者。虽然 UDID 并非特别敏感的信息，但为了防范某些未知的攻击可能利用 UDID，您可能不应随意与他人共享。仅将其发送给受信任的开发者，他们会向
    Apple 注册以将您纳入其临时分发计划。另一种与其他人共享 UDID 的更简单方法是从 App Store 下载免费的 Ad Hoc Helper 应用程序。您可以将以下
    URL 加载到网络浏览器中，以打开相应的 iTunes 页面：[`itunes.apple.com/app/ad-hoc-helper/id285691333?mt=8`](http://itunes.apple.com/app/ad-hoc-helper/id285691333?mt=8)。


    通常，iPad 信息框中唯一可能更改的是 iPad 的软件版本号和 iPad 的名称。当您对 iPad 执行软件更新时，此字段会匹配新的版本号。这提供了一种简便的方法来确定您正在使用的
    iPad OS 版本。如果您通过在 iTunes 来源列表中点击其名称然后编辑文本来更改 iPad 的名称（参见图 2–8），“摘要”选项卡将反映此更改。您的
    iPad 容量和序列号永远不会改变。


    ![images](img/0208.jpg)


    **图 2–8.** *在 iTunes 来源列表中点击您的 iPad 名称，可将其重命名为您想要的任何名称。名称更改将反映在“摘要”选项卡上。*


    ### 版本框


    “版本”框允许您通过点击“检查更新”按钮手动检查 iPad OS 软件更新。在该按钮旁边，您会看到通知您 iPad 软件是否为最新或是否有可用更新的文本。有时，甚至在您点击“检查更新”按钮之前，iTunes
    就会通知您有可用的软件更新。它之所以知道，是因为 iTunes 每周会自动检查一次 iPad OS 更新。按钮旁边的文本还会告诉您 iTunes 下次自动检查更新的时间。


    > **注：** 如果有可用的 iPad 软件更新，您应该安装它。有时更新会提供新功能；其他时候则只是简单的错误修复。Apple 在向公众发布这些更新之前会对其进行严格测试，因此可以放心地认为这些更新将使您的设备变得更好（无论您是否注意到）。在“恢复”和“更新”选项之间感到困惑？更新提供
    Apple 新发布的固件。安装更新不会更改您的数据和应用程序。恢复 iPad 会将其恢复至出厂状态，并删除所有应用和数据。


    在“检查更新”按钮下方是“恢复”按钮。您可能在某个时候会遇到 iPad 问题，需要将设备恢复至出厂设置。为此，请点击“恢复”按钮并按照提示操作（参见图 2–9）。备份设备会将您的设置和数据保存到电脑中。恢复过程会清除
    iPad 上的所有信息，并重新加载最新的固件。恢复后，使用您的备份数据将您的个人设置、通讯录、书签和照片重新加载到 iPad 上。


    如有必要，您可以将 iPad 恢复到当前版本以外的固件版本。在点击“检查更新”按钮或“恢复”按钮时，按住 Shift 键（在 Windows 上）或 Option
    键（在 Mac 上），以选择要恢复到的 iPad 固件。iTunes 将打开一个文件对话框，您可以在其中导航到要使用的 `.ipsw` 文件（代表 iPad
    软件；这些文件实际上是重命名的 ZIP 存档，如果您愿意，可以解压并探索），选择它，然后执行更新或恢复。


    ![images](img/0209.jpg)


    **图 2–9.** *恢复后，您将可以选择将 iPad 上的所有数据恢复到之前的状态。*'
- fmt: "# Options Box\n\nYou have several preferences in the Options box. To enable\
    \ or disable any of the features, simply select or deselect the check box next\
    \ to it.\n\n- *Open iTunes when this iPad is connected*: This option is selected\
    \ by default. It tells your computer to open iTunes when it detects your iPad\
    \ is connected via USB. If this option is deselected, iTunes will not open when\
    \ you connect your iPad, and no data will be synced to your device until you manually\
    \ open iTunes and click the `Sync` button next to the Capacity bar.\n\n**NOTE:**\
    \ Even though iTunes will not open or sync your data when this box is not selected,\
    \ the iPad will still charge when it is connected to a compatible port.\n\n- *Sync\
    \ only selected songs and videos*: When this option is selected, iTunes syncs\
    \ only those songs in your library and playlists that have a check mark next to\
    \ them in the iTunes library (see [Figure 2–9](#Chapter02.html#fig_2_9)).\n\n\
    For example, suppose you have a Greatest Hits playlist set to sync with the iPad.\
    \ The playlist includes two copies of Michael Jackson’s *Thriller* from two separate\
    \ albums. You want to have only one copy of the song on the iPad, but you don’t\
    \ want to remove the extra copy from the playlist. To achieve this, you can deselect\
    \ one version of *Thriller* in the playlist and enable “Sync only selected songs\
    \ and videos.” The playlist will sync to your iPad minus the extra *Thriller*,\
    \ but the alternative track will remain in your playlist and in your iTunes library.\n\
    \n- *Prefer standard definition videos*: With this selected, iTunes will sync\
    \ only the standard-definition version of a video to your iPad if you have both\
    \ the high-definition and standard-definition versions. You sometimes get both\
    \ versions when you buy a movie or TV show from the iTunes Store. Choosing to\
    \ sync only the standard-definition version saves storage space on the iPad. HD\
    \ is all the rage at the moment, and although the quality of HD video *is* superior\
    \ to SD, if you use your iPad to watch videos only occasionally and not as your\
    \ main video consumption device, you’ll probably want to opt for the SD version.\
    \ The quality is fine, and you’ll be able to fit more video on your iPad for those\
    \ long road trips.\n\n- *Convert higher bit rate songs to 128 kbps AAC*: Digital\
    \ music comes in many formats and sizes, with the most popular being MP3 and AAC.\
    \ Depending on how you obtained your music, whether by buying it from the iTunes\
    \ Store or ripping it from old CDs, your songs will likely have different encoding\
    \ settings. A song encoded at 256KBps takes up twice the space as a song encoded\
    \ at 128KBps. With the “Convert higher bit rate songs to 128 kbps AAC” option\
    \ selected, any music synced to your iPad will be converted on the fly to 128KBps\
    \ AAC files. This saves a lot of space on your iPad by reducing higher bit rate\
    \ songs to a perfectly acceptable 128KBps.\n\n**NOTE:** Unless you are an extreme\
    \ audiophile with a gifted ear, you likely will not notice a difference between\
    \ a 128KBps AAC file and a 256KBps version of that file.\n\n**TIP:** If you have\
    \ an iPhone or iPod touch that you frequently carry around with you, you may want\
    \ to opt to not put any music on your iPad at all. You’ll save a lot of space,\
    \ and you’ll always have your music with you on your other device. Use that extra\
    \ space on your iPad to fill it with video and books, taking advantage of the\
    \ iPad’s relatively large screen.\n\n- *Manually manage music and videos*: With\
    \ this option selected, music and videos aren’t automatically synced with your\
    \ iPad. You choose exactly which items you want on your iPad by dragging the songs\
    \ or videos from the iTunes library onto the iPad in the iTunes source list. You\
    \ manage those songs and videos by clicking the drop-down triangle next to the\
    \ iPad in the iTunes source list. To remove a song or video file, you navigate\
    \ to your music, movies, or TV shows playlist, select the song or video file,\
    \ and press the `Delete` key on your computer’s keyboard.\n\n**NOTE:** Manually\
    \ adding music or video to or removing it from your iPad does not affect the files\
    \ on your computer. Whenever a file is added to or deleted from the iPad, it is\
    \ just a copy of the file in your iTunes library. The original file will always\
    \ reside in your iTunes library until you delete it from there.\n\n- *Encrypt\
    \ iPad backup*: Each time your iPad syncs with iTunes, a backup of all the files\
    \ and settings on your iPad is created. This backup is handy if you ever need\
    \ to restore your iPad. Once the restore is complete and you’ve synced your iPad\
    \ to iTunes again, you have the option of restoring the iPad from this backup,\
    \ which, once completed, will enable you to retain all your old settings and files\
    \ on your newly restored iPad.\n\nWith the “Encrypt iPad backup” option selected,\
    \ your backups, and thus all your data, are encrypted and protected by a password.\
    \ To back up from an encrypted data file, the user must know the password to the\
    \ file. Next to this selection is a `Change Password` button. This allows you\
    \ to change the password to your encrypted data at any time.\n\n**NOTE:** Do not\
    \ forget your password! If you encrypt your backups and forget your password,\
    \ you will not be able to restore your backup data. You will have to resync all\
    \ your data from scratch. You’ll also have to reconfigure all the settings on\
    \ your iPad to the way you had them, including rearranging the iPad’s app icons.\
    \ If you have lots of custom settings on your iPad, this can take a long time.\
    \ Remember your passwords!\n\n- *Configure Universal Access*: The last thing you\
    \ will see on the Summary page is a `Configure Universal Access` button. Clicking\
    \ this button opens a Universal Access box (see [Figure 2–10](#Chapter02.html#fig_2_10))\
    \ that allows you to set seeing and hearing device assistance options for people\
    \ who are hard of sight or hearing. The options are as follows (only one of the\
    \ three Seeing radio buttons can be selected):\n\n![images](images/0210.jpg)\n\
    \n**Figure 2–10.** *The Universal Access settings*\n\n- *Voice Over*: Makes your\
    \ iPad speak its interface, saying the names of buttons, reading the contents\
    \ of text fields, and otherwise describing onscreen elements in a way that transforms\
    \ a visual presentation into a spoken description.\n  - *Zoom*: Allows the user\
    \ to magnify portions of the screen that normally don’t support a built-in zoom\
    \ function. When this option is selected, the user can double tap any part of\
    \ the iPad’s screen with three fingers to automatically zoom in 200 percent. When\
    \ zoomed in, the user must drag or flick the screen with three fingers. When the\
    \ user navigates to a new screen, zoom always returns to the top middle of the\
    \ screen.\n  - *Use white-on-black display*: Selecting this option will invert\
    \ the colors of the iPad’s screen so text appears white on a black background.\
    \ The iPad’s entire screen will look like a photograph negative, providing greater\
    \ contrast for visually challenged users.\n- *Speak Auto-text*: With this option\
    \ selected, any autocorrection text (such as the spell-check pop-ups that appear\
    \ when you are typing) is spoken aloud to the user.\n- *Use mono audio*: When\
    \ this option is selected, the stereo sounds of the left and right speakers are\
    \ combined into a mono (single) signal. This option lets users who have a hearing\
    \ impairment in one ear hear the entire sound signal with the other ear.\n- *Show\
    \ closed captions when available*:"
  raw: "##### Options Box\n\nYou have several preferences in the Options box. To enable\
    \ or disable any of the features, simply select or deselect the check box next\
    \ to it.\n\n*   *Open iTunes when this iPad is connected*: This option is selected\
    \ by default. It tells your computer to open iTunes when it detects your iPad\
    \ is connected via USB. If this option is deselected, iTunes will not open when\
    \ you connect your iPad, and no data will be synced to your device until you manually\
    \ open iTunes and click the Sync button next to the Capacity bar.\n\n**NOTE:**\
    \ Even though iTunes will not open or sync your data when this box is not selected,\
    \ the iPad will still charge when it is connected to a compatible port.\n\n* \
    \  *Sync only selected songs and videos*: When this option is selected, iTunes\
    \ syncs only those songs in your library and playlists that have a check mark\
    \ next to them in the iTunes library (see [Figure 2–9](#Chapter02.html#fig_2_9)).\n\
    \nFor example, suppose you have a Greatest Hits playlist set to sync with the\
    \ iPad. The playlist includes two copies of Michael Jackson’s *Thriller* from\
    \ two separate albums. You want to have only one copy of the song on the iPad,\
    \ but you don’t want to remove the extra copy from the playlist. To achieve this,\
    \ you can deselect one version of *Thriller* in the playlist and enable “Sync\
    \ only selected songs and videos.” The playlist will sync to your iPad minus the\
    \ extra *Thriller*, but the alternative track will remain in your playlist and\
    \ in your iTunes library.\n\n*   *Prefer standard definition videos*: With this\
    \ selected, iTunes will sync only the standard-definition version of a video to\
    \ your iPad if you have both the high-definition and standard-definition versions.\
    \ You sometimes get both versions when you buy a movie or TV show from the iTunes\
    \ Store. Choosing to sync only the standard-definition version saves storage space\
    \ on the iPad. HD is all the rage at the moment, and although the quality of HD\
    \ video *is* superior to SD, if you use your iPad to watch videos only occasionally\
    \ and not as your main video consumption device, you’ll probably want to opt for\
    \ the SD version. The quality is fine, and you’ll be able to fit more video on\
    \ your iPad for those long road trips.\n*   *Convert higher bit rate songs to\
    \ 128 kbps AAC*: Digital music comes in many formats and sizes, with the most\
    \ popular being MP3 and AAC. Depending on how you obtained your music, whether\
    \ by buying it from the iTunes Store or ripping it from old CDs, your songs will\
    \ likely have different encoding settings. A song encoded at 256KBps takes up\
    \ twice the space as a song encoded at 128KBps. With the “Convert higher bit rate\
    \ songs to 128 kbps AAC” option selected, any music synced to your iPad will be\
    \ converted on the fly to 128KBps AAC files. This saves a lot of space on your\
    \ iPad by reducing higher bit rate songs to a perfectly acceptable 128KBps.\n\n\
    **NOTE:** Unless you are an extreme audiophile with a gifted ear, you likely will\
    \ not notice a difference between a 128KBps AAC file and a 256KBps version of\
    \ that file.\n\n**TIP:** If you have an iPhone or iPod touch that you frequently\
    \ carry around with you, you may want to opt to not put any music on your iPad\
    \ at all. You’ll save a lot of space, and you’ll always have your music with you\
    \ on your other device. Use that extra space on your iPad to fill it with video\
    \ and books, taking advantage of the iPad’s relatively large screen.\n\n*   *Manually\
    \ manage music and videos*: With this option selected, music and videos aren’t\
    \ automatically synced with your iPad. You choose exactly which items you want\
    \ on your iPad by dragging the songs or videos from the iTunes library onto the\
    \ iPad in the iTunes source list. You manage those songs and videos by clicking\
    \ the drop-down triangle next to the iPad in the iTunes source list. To remove\
    \ a song or video file, you navigate to your music, movies, or TV shows playlist,\
    \ select the song or video file, and press the Delete key on your computer’s keyboard.\n\
    \n**NOTE:** Manually adding music or video to or removing it from your iPad does\
    \ not affect the files on your computer. Whenever a file is added to or deleted\
    \ from the iPad, it is just a copy of the file in your iTunes library. The original\
    \ file will always reside in your iTunes library until you delete it from there.\n\
    \n*   *Encrypt iPad backup*: Each time your iPad syncs with iTunes, a backup of\
    \ all the files and settings on your iPad is created. This backup is handy if\
    \ you ever need to restore your iPad. Once the restore is complete and you’ve\
    \ synced your iPad to iTunes again, you have the option of restoring the iPad\
    \ from this backup, which, once completed, will enable you to retain all your\
    \ old settings and files on your newly restored iPad.\n\nWith the “Encrypt iPad\
    \ backup” option selected, your backups, and thus all your data, are encrypted\
    \ and protected by a password. To back up from an encrypted data file, the user\
    \ must know the password to the file. Next to this selection is a Change Password\
    \ button. This allows you to change the password to your encrypted data at any\
    \ time.\n\n**NOTE:** Do not forget your password! If you encrypt your backups\
    \ and forget your password, you will not be able to restore your backup data.\
    \ You will have to resync all your data from scratch. You’ll also have to reconfigure\
    \ all the settings on your iPad to the way you had them, including rearranging\
    \ the iPad’s app icons. If you have lots of custom settings on your iPad, this\
    \ can take a long time. Remember your passwords!\n\n*   *Configure Universal Access*:\
    \ The last thing you will see on the Summary page is a Configure Universal Access\
    \ button. Clicking this button opens a Universal Access box (see [Figure 2–10](#Chapter02.html#fig_2_10))\
    \ that allows you to set seeing and hearing device assistance options for people\
    \ who are hard of sight or hearing. The options are as follows (only one of the\
    \ three Seeing radio buttons can be selected):\n\n![images](images/0210.jpg)\n\
    \n**Figure 2–10.** *The Universal Access settings*\n\n*   *Voice Over*: Makes\
    \ your iPad speak its interface, saying the names of buttons, reading the contents\
    \ of text fields, and otherwise describing onscreen elements in a way that transforms\
    \ a visual presentation into a spoken description.\n    *   *Zoom*: Allows the\
    \ user to magnify portions of the screen that normally don’t support a built-in\
    \ zoom function. When this option is selected, the user can double tap any part\
    \ of the iPad’s screen with three fingers to automatically zoom in 200 percent.\
    \ When zoomed in, the user must drag or flick the screen with three fingers. When\
    \ the user navigates to a new screen, zoom always returns to the top middle of\
    \ the screen.\n    *   *Use white-on-black display*: Selecting this option will\
    \ invert the colors of the iPad’s screen so text appears white on a black background.\
    \ The iPad’s entire screen will look like a photograph negative, providing greater\
    \ contrast for visually challenged users.\n*   *Speak Auto-text*: With this option\
    \ selected, any autocorrection text (such as the spell-check pop-ups that appear\
    \ when you are typing) is spoken aloud to the user.\n*   *Use mono audio*: When\
    \ this option is selected, the stereo sounds of the left andright speakers are\
    \ combined into a mono (single) signal. This option lets users who have a hearing\
    \ impairment in one ear hear the entire sound signal with the other ear.\n*  \
    \ *Show closed captions when available*:"
  trans: "\n# 选项面板\n\n选项面板中有若干偏好设置。要启用或禁用任何功能，只需勾选或取消勾选其旁边的复选框。\n\n- *当此 iPad 连接时打开\
    \ iTunes*：此选项默认已勾选。它指示电脑在检测到 iPad 通过 USB 连接时打开 iTunes。若取消勾选此选项，连接 iPad 时 iTunes\
    \ 将不会打开，并且在您手动打开 iTunes 并点击容量条旁的`同步`按钮之前，不会有数据同步到您的设备。\n\n**注意：** 即使此框未勾选时 iTunes\
    \ 不会打开或同步数据，iPad 连接到兼容端口后仍会充电。\n\n- *仅同步选中的歌曲和视频*：当此选项勾选时，iTunes 仅同步资料库和播放列表中在\
    \ iTunes 资料库内带有勾选标记的歌曲（请参阅图 2–9）。\n\n例如，假设您有一个设置为与 iPad 同步的“精选金曲”播放列表。该播放列表包含来自两张不同专辑的迈克尔·杰克逊的\
    \ *Thriller* 的两份副本。您希望 iPad 上只保留这首歌的一个副本，但又不想从播放列表中移除多余的副本。为此，您可以取消勾选播放列表中的其中一个\
    \ *Thriller* 版本，并启用“仅同步选中的歌曲和视频”。该播放列表将同步到您的 iPad，但会去掉多余的 *Thriller*，而另一个音轨仍会保留在您的播放列表和\
    \ iTunes 资料库中。\n\n- *优先使用标清视频*：勾选此选项后，如果您同时拥有高清和标清两个版本的视频，iTunes 将仅同步标清版本到您的 iPad。有时您从\
    \ iTunes Store 购买电影或电视节目时会同时获得两个版本。选择仅同步标清版本可以节省 iPad 上的存储空间。高清视频目前风靡一时，尽管高清视频的画质*确实*优于标清，但如果您只是偶尔用\
    \ iPad 观看视频，并未将其作为主要视频消费设备，您可能会倾向于选择标清版本。其画质不错，并且您可以在 iPad 上存储更多视频以供长途旅行时观看。\n\
    \n- *将更高比特率的歌曲转换为 128 kbps AAC*：数字音乐有多种格式和大小，其中最流行的是 MP3 和 AAC。根据您获取音乐的方式——无论是从\
    \ iTunes Store 购买还是从旧 CD 中抓取——您的歌曲可能具有不同的编码设置。一首以 256KBps 编码的歌曲所占空间是 128KBps 编码歌曲的两倍。勾选“将更高比特率的歌曲转换为\
    \ 128 kbps AAC”选项后，任何同步到 iPad 的音乐都将被即时转换为 128KBps 的 AAC 文件。这通过将更高比特率的歌曲降低为完全可以接受的\
    \ 128KBps，从而在 iPad 上节省了大量空间。\n\n**注意：** 除非您是拥有敏锐听觉的极致发烧友，否则您很可能不会注意到 128KBps AAC\
    \ 文件与 256KBps 版本之间的区别。\n\n**提示：** 如果您拥有经常随身携带的 iPhone 或 iPod touch，您可能希望完全不在 iPad\
    \ 上存放任何音乐。这样将节省大量空间，而您始终可以在另一台设备上欣赏音乐。利用 iPad 相对较大的屏幕优势，将 iPad 上节省出的空间用于存放视频和书籍。\n\
    \n- *手动管理音乐和视频*：勾选此选项后，音乐和视频不会自动与 iPad 同步。您可以通过将歌曲或视频从 iTunes 资料库拖放到 iTunes 来源列表中的\
    \ iPad 上，来精确选择您想要放在 iPad 上的项目。您可以通过点击 iTunes 来源列表中 iPad 旁边的下拉三角形来管理这些歌曲和视频。要移除某个歌曲或视频文件，请导航至您的音乐、电影或电视节目播放列表，选择该歌曲或视频文件，然后按下电脑键盘上的`Delete`键。\n\
    \n**注意：** 手动向 iPad 添加或从 iPad 移除音乐或视频不会影响电脑上的文件。每当文件被添加到 iPad 或从 iPad 删除时，操作的只是\
    \ iTunes 资料库中该文件的副本。原始文件将始终保留在您的 iTunes 资料库中，直到您从那里将其删除。\n\n- *加密 iPad 备份*：每次\
    \ iPad 与 iTunes 同步时，都会创建 iPad 上所有文件和设置的备份。如果您需要恢复 iPad，此备份会非常方便。一旦恢复完成且您再次将 iPad\
    \ 与 iTunes 同步，您就可以选择从此备份恢复 iPad。完成后，您将能够在刚刚恢复的 iPad 上保留所有旧的设置和文件。\n\n勾选“加密 iPad\
    \ 备份”选项后，您的备份以及您所有的数据都将被加密并受密码保护。要从加密数据文件恢复备份，用户必须知道该文件的密码。此选项旁边有一个`更改密码`按钮。这允许您随时更改加密数据的密码。\n\
    \n**注意：** 请勿忘记您的密码！如果加密了备份却忘记了密码，您将无法恢复备份数据。您将不得不从头开始重新同步所有数据。您还必须重新配置 iPad 上的所有设置以恢复到之前的状态，包括重新排列\
    \ iPad 的应用程序图标。如果 iPad 上有大量自定义设置，这会花费很长时间。请记住您的密码！\n\n- *配置万能辅助*：您在“摘要”页面上看到的最后一项是一个`配置万能辅助`按钮。点击此按钮会打开一个“万能辅助”面板（请参阅图\
    \ 2–10），该面板允许您为视障或听障人士设置视觉和听觉辅助功能选项。选项如下（三个“Seeing”单选按钮中只能选中一个）：\n\n![images](img/0210.jpg)\n\
    \n**图 2–10.** *万能辅助设置*\n\n- *语音旁白*：让您的 iPad 朗读其界面，说出按钮名称、阅读文本字段内容，并以将视觉呈现转化为语音描述的方式描述屏幕上的元素。\n\
    \  - *缩放*：允许用户放大通常不支持内置缩放功能的屏幕部分。当此选项选中时，用户可以用三根手指双击 iPad 屏幕的任何部分，即可自动放大 200%。放大后，用户必须用三根手指拖动或轻拂屏幕。当用户导航到新屏幕时，缩放总是会回到屏幕顶部中央位置。\n\
    \  - *使用白底黑字*：选择此选项将反转 iPad 屏幕的颜色，使文本在黑色背景上显示为白色。iPad 的整个屏幕看起来像照片底片，为视障用户提供更高的对比度。\n\
    - *朗读自动文本*：勾选此选项后，任何自动纠正文本（例如您打字时出现的拼写检查弹出窗口）都会朗读给用户听。\n- *使用单声道音频*：当此选项选中时，左右声道的立体声将合并为单声道信号。此选项允许单耳有听力障碍的用户用另一只耳朵听到完整的音频信号。\n\
    - *显示隐藏式字幕（如果可用）*：\n"
- fmt: '#### The Info Tab


    The Info tab lets you choose whether to synchronize certain basic desktop features
    to your iPad: your contacts, calendars, mail accounts, notes, and bookmarks. These
    items might contain personal or confidential information about you or others.
    You have to determine whether the convenience of having them with you at all times
    outweighs the security concerns of this information falling into the wrong hands
    if your iPad is stolen. Use the sections in the Info tab to select which items
    you want to synchronize and specify how you want them to be selected. For example,
    you can synchronize all your calendars or just your work calendar, or you can
    synchronize all your contacts or just those from selected groups. The choice is
    up to you.


    As long as you have been using Mail, iCal, and Address Book on a Mac or using
    Outlook on a Windows machine, you’ll already have everything you need to sync
    your information to your iPad. All you’ll have to do is tell your iPad how you
    want to sync that information.


    **NOTE:** If you are using Apple’s MobileMe service (`www.me.com`), after your
    first iPad sync, the `Sync Address Book Contacts` and `Sync iCal Calendars` options
    will always be deselected, and you’ll see the explanation that your contacts and
    calendars are being synced over the air via MobileMe. *Over the air* syncing means
    you don’t need to connect your iPad to your computer to update any changes you
    have made to contacts or calendars; the syncing is performed wirelessly.


    ##### Sync Address Book Contacts


    To sync your address book contacts, you need to be using one of the following:
    Address Book or Microsoft Entourage on a Mac, or Windows Address Book or Microsoft
    Outlook on a Windows computer.


    Select the `Sync Address Book Contacts` check box. You then have the option of
    syncing all the contacts in your address book or just those from selected groups.
    If your address book is subdivided into groups, such as work contacts, friends,
    and family, you can choose which ones you wish to include by selecting or clearing
    the check boxes next to their names. In addition, you can further control how
    your address book synchronizes with the following options:


    - *Add contacts created outside of groups on this iPad to*: When this check box
    is selected, you’ll have access to a drop-down list of all your address book groups.
    If you create a new contact on your iPad and don’t assign the contact to a group,
    that contact will be automatically put in the group you select here.

    - *Sync Yahoo! Address Book contacts*: When this check box is selected, you can
    automatically sync your Yahoo! Address Book contacts with your iPad address book.
    You first have to agree to the pop-up box that asks you to acknowledge you are
    allowing your iPad to sync to your Yahoo! account. Next, you are prompted to enter
    your Yahoo! ID and password. Once you’ve done this, your contacts are set to sync.
    Clicking the `Configure` button will allow you to enter a different Yahoo! ID.

    - *Sync Google Contacts*: When this check box is selected, you can automatically
    sync your Google contacts with your iPad address book. You first have to agree
    to the pop-up box that asks you to acknowledge you are allowing your iPad to sync
    to your Google account. Next, you are prompted to enter your Google ID and password.
    Once you’ve done this, your contacts are set to sync. Clicking the `Configure`
    button will allow you to enter a different Google ID.


    ##### Sync iCal Calendars


    To sync your calendars, you need to be using one of the following: iCal or Microsoft
    Entourage on a Mac, or Microsoft Outlook on a Windows computer.


    To sync your calendars, select the `Sync iCal Calendars` check box (see [Figure
    2–11](#Chapter02.html#fig_2_11)). Just like with contacts, you then have the option
    of syncing all your calendars or just selected ones.


    ![images](images/0211.jpg)


    **Figure 2–11.** *Your calendar syncing options*


    If you check the “Do not sync events older than” check box, iTunes does not synchronize
    events that are more than a certain number of days old. The default number of
    days is 30, but you can enter anything up to 99,999 days.


    **NOTE:** A great place to find premade calendars for holidays, school events,
    or your favorite sporting teams is at `www.icalshare.com`.


    ##### Sync Mail Accounts


    Each mail account you have set up in Mac OS X’s Mail or Microsoft’s Outlook appears
    here (see [Figure 2–12](#Chapter02.html#fig_2_12)). After you select the `Sync
    Mail Accounts` check box, you have the option of selecting or deselecting any
    account. Accounts not selected will not appear in the iPad’s Mail app. This option
    does not sync your mail messages, just the account settings.


    ![images](images/0212.jpg)


    **Figure 2–12.** *Your e-mail account syncing options*


    ##### Other


    Apple should really have named this section “Bookmark and Notes Syncing,” but
    it opted for “Other.” Here you can sync your web bookmarks from your browser on
    your computer to the Safari web browser on your iPad (see [Figure 2–13](#Chapter02.html#fig_2_13)).
    Again, if you have a MobileMe account, your bookmarks will be synced over the
    air. If not, select the `Sync Bookmarks` check box, and if applicable choose your
    browser from the drop-down menu. On the Mac, bookmark syncing supports Safari.
    On a Windows computer, bookmark syncing supports Safari and Microsoft Internet
    Explorer.


    ![images](images/0213.jpg)


    **Figure 2–13.** *Your bookmarks and notes syncing options*


    This section also allows you to sync your notes to your iPad. Note syncing works
    only with the Mac OS X Mail application or, on a Windows machine, Microsoft Outlook.
    To enable note syncing, select the check box.


    ##### Advanced


    This section allows you to replace your contacts, calendars, mail accounts, bookmarks,
    and notes on the iPad with information from your computer (see [Figure 2–14](#Chapter02.html#fig_2_14)).
    This is a handy feature if your information gets out of sync and you want to make
    sure that everything you see on your computer matches with what’s on the iPad.


    ![images](images/0214.jpg)


    **Figure 2–14.** *Your advanced syncing options*


    When you select the respective check boxes, iTunes will replace the information
    on your iPad during the next sync only. After that sync, normal syncing will resume
    between your iPad and computer.


    **NOTE:** If your calendars and contacts are being synced via MobileMe, you will
    not be able to select their check boxes in the `Advanced` section.


    #### The Apps Tab


    This tab is the place where you get to decide which apps you want to put on your
    iPad and allows you to arrange them with drag-and-drop simplicity. This tab is
    composed of two main sections: `Sync Apps` and `File Sharing`.'
  raw: '#### The Info Tab


    The Info tab lets you choose whether to synchronize certain basic desktop features
    to your iPad: your contacts, calendars, mail accounts, notes, and bookmarks. These
    items might contain personal or confidential information about you or others.
    You have to determine whether the convenience of having them with you at all times
    outweighs the security concerns of this information falling into the wrong hands
    if your iPad is stolen.. Use the sections in the Info tab to select which items
    you want to synchronize and specify how you want them to be selected. For example,
    you can synchronize all your calendars or just your work calendar, or you can
    synchronize all your contacts or just those from selected groups. The choice is
    up to you.


    As long as you have been using Mail, iCal, and Address Book on a Mac or using
    Outlook on a Windows machine, you’ll already have everything you need to sync
    your information to your iPad. All you’ll have to do is tell your iPad how you
    want to sync that information.


    **NOTE:** If you are using Apple’s MobileMe service ([`www.me.com`](http://www.me.com)),
    after your first iPad sync, the Sync Address Book Contacts and Sync iCal Calendars
    options will always be deselected, and you’ll see the explanation that your contacts
    and calendars are being synced over the air via MobileMe. *Over the air* syncing
    means you don’t need to connect your iPad to your computer to update any changes
    you have made to contacts or calendars; the syncing is performed wirelessly.


    ##### Sync Address Book Contacts


    To sync your address book contacts, you need to be using one of the following:
    Address Book or Microsoft Entourage on a Mac, or Windows Address Book or Microsoft
    Outlook on a Windows computer.


    Select the Sync Address Book Contacts check box. You then have the option of syncing
    all the contacts in your address book or just those from selected groups. If your
    address book is subdivided into groups, such as work contacts, friends, and family,
    you can choose which ones you wish to include by selecting or clearing the check
    boxes next to their names. In addition, you can further control how your address
    book synchronizes with the following options:


    *   *Add contacts created outside of groups on this iPad to*: When this check
    box is selected, you’ll have access to a drop-down list of all your address book
    groups. If you create a new contact on your iPad and don’t assign the contact
    to a group, that contact will be automatically put in the group you select here.

    *   *Sync Yahoo! Address Book contacts*: When this check box is selected, you
    can automatically sync your Yahoo! Address Book contacts with your iPad address
    book. You first have to agree to the pop-up box that asks you to acknowledge you
    are allowing your iPad to sync to your Yahoo! account. Next, you are prompted
    to enter your Yahoo! ID and password. Once you’ve done this, your contacts are
    set to sync. Clicking the Configure button will allow you to enter a different
    Yahoo! ID.

    *   *Sync Google Contacts*: When this check box is selected, you can automatically
    sync your Google contacts with your iPad address book. You first have to agree
    to the pop-up box that asks you to acknowledge you are allowing your iPad to sync
    to your Google account. Next, you are prompted to enter your Google ID and password.
    Once you’ve done this, your contacts are set to sync. Clicking the Configure button
    will allow you to enter a different Google ID.


    ##### Sync iCal Calendars


    To sync your calendars, you need to be using one of the following: iCal or Microsoft
    Entourage on a Mac, or Microsoft Outlook on a Windows computer.


    To sync your calendars, select the Sync iCal Calendars check box (see [Figure
    2–11](#Chapter02.html#fig_2_11)). Just like with contacts, you then have the option
    of syncing all your calendars or just selected ones.


    ![images](images/0211.jpg)


    **Figure 2–11.** *Your calendar syncing options*


    If you check the “Do not sync events older than” check box, iTunes does not synchronize
    events that are more than a certain number of days old. The default number of
    days is 30, but you can enter anything up to 99,999 days.


    **NOTE:** A great place to find premade calendars for holidays, school events,
    or your favorite sporting teams is at [`www.icalshare.com`](http://www.icalshare.com).


    ##### Sync Mail Accounts


    Each mail account you have set up in Mac OS X’s Mail or Microsoft’s Outlook appears
    here (see [Figure 2–12](#Chapter02.html#fig_2_12)). After you select the Sync
    Mail Accounts check box, you have the option of selecting or deselecting any account.
    Accounts not selected will not appear in the iPad’s Mail app. This option does
    not sync your mail messages, just the account settings.


    ![images](images/0212.jpg)


    **Figure 2–12.** *Your e-mail account syncing options*


    ##### Other


    Apple should really have named this section “Bookmark and Notes Syncing,” but
    it opted for “Other.” Here you can sync your web bookmarks from your browser on
    your computer to the Safari web browser on your iPad (see [Figure 2–13](#Chapter02.html#fig_2_13)).
    Again, if you have a MobileMe account, your bookmarks will be synced over the
    air. If not, select the Sync Bookmarks check box, and if applicable choose your
    browser from the drop-down menu. On the Mac, bookmark syncing supports Safari.
    On a Windows computer, bookmark syncing supports Safari and Microsoft Internet
    Explorer.


    ![images](images/0213.jpg)


    **Figure 2–13.** *Your bookmarks and notes syncing options*


    This section also allows you to sync your notes to your iPad. Note syncing works
    only with the Mac OS X Mail application or, on a Windows machine, Microsoft Outlook.
    To enable note syncing, select the check box.


    ##### Advanced


    This section allows you to replace your contacts, calendars, mail accounts, bookmarks,
    and notes on the iPad with information from your computer (see [Figure 2–14](#Chapter02.html#fig_2_14)).
    This is a handy feature if your information gets out of sync and you want to make
    sure that everything you see on your computer matches with what’s on the iPad.


    ![images](images/0214.jpg)


    **Figure 2–14.** *Your advanced syncing options*


    When you select the respective check boxes, iTunes will replace the information
    on your iPad during the next sync only. After that sync, normal syncing will resume
    between your iPad and computer.


    **NOTE:** If your calendars and contacts are being synced via MobileMe, you will
    not be able to select their check boxes in the Advanced section.


    #### The Apps Tab


    This tab is the place where you get to decide which apps you want to put on your
    iPad and allows you to arrange them with drag-and-drop simplicity. This tab is
    composed of two main sections: Sync Apps and File Sharing.'
  trans: '

    #### 信息标签


    “信息”标签可让您选择是否将某些基本桌面功能同步到 iPad：通讯录、日历、邮件账户、备忘录和书签。这些项目可能包含关于您或他人的个人或机密信息。您必须权衡随时随地使用这些信息的便利性与
    iPad 被盗后信息落入不法之徒手中的安全隐患。请使用“信息”标签中的各分区选择要同步的项目，并指定同步方式。例如，您可以同步所有日历或仅同步工作日历；也可以同步所有通讯录或仅同步所选群组的通讯录。选择权在您手中。


    只要您已在 Mac 上使用“邮件”、iCal 和“通讯录”，或在 Windows 电脑上使用 Outlook，就已具备将信息同步到 iPad 所需的一切条件。您只需告知
    iPad 您希望如何同步这些信息。


    **注意：** 如果您使用 Apple 的 MobileMe 服务（`www.me.com`），在首次同步 iPad 后，“同步通讯录”和“同步 iCal
    日历”选项将始终处于取消勾选状态，并会看到解释说明：您的通讯录和日历正在通过 MobileMe 进行*无线*同步。*无线*同步意味着您无需将 iPad 连接到电脑即可更新对通讯录或日历所做的任何更改；同步将通过无线方式执行。


    ##### 同步通讯录


    若要同步通讯录，您需要使用以下应用之一：Mac 上的“通讯录”或 Microsoft Entourage；Windows 电脑上的“Windows 通讯簿”或
    Microsoft Outlook。


    勾选`同步通讯录`复选框。然后您可以选择同步通讯录中的所有联系人，或仅同步所选群组中的联系人。如果您的通讯录分为多个群组，例如工作联系人、朋友和家人，您可以通过选中或取消选中群组名称旁边的复选框来选择要包含的联系人。此外，您还可以通过以下选项进一步控制通讯录的同步方式：


    - *将 iPad 上群组外创建的联系人添加至*：选中此复选框后，您将可以访问一个下拉列表，其中包含您通讯录中的所有群组。如果您在 iPad 上创建了新联系人且未将其分配到任何群组，该联系人将自动放入您在此处选择的群组中。

    - *同步 Yahoo!通讯录联系人*：选中此复选框后，您可以自动将 Yahoo!通讯录中的联系人同步到 iPad 通讯录。首先，您需要同意弹出窗口中的提示，确认允许
    iPad 同步到您的 Yahoo!账户。随后，系统会提示您输入 Yahoo! ID 和密码。完成此操作后，您的联系人便设置为同步。点击`配置`按钮可让您输入其他
    Yahoo! ID。

    - *同步 Google 通讯录*：选中此复选框后，您可以自动将 Google 通讯录同步到 iPad 通讯录。首先，您需要同意弹出窗口中的提示，确认允许
    iPad 同步到您的 Google 账户。随后，系统会提示您输入 Google ID 和密码。完成此操作后，您的联系人便设置为同步。点击`配置`按钮可让您输入其他
    Google ID。


    ##### 同步 iCal 日历


    若要同步日历，您需要使用以下应用之一：Mac 上的 iCal 或 Microsoft Entourage；Windows 电脑上的 Microsoft Outlook。


    若要同步日历，请勾选`同步 iCal 日历`复选框（参见图 2-11）。与通讯录类似，您可以选择同步所有日历或仅同步所选日历。


    ![images](img/0211.jpg)


    **图 2-11.** *您的日历同步选项*


    如果您勾选了“不同步早于以下天数的日历事件”复选框，iTunes 将不会同步超过指定天数的旧事件。默认天数为 30 天，但您可以输入最多 99999 天。


    **注意：** 一个寻找节日、学校活动或您喜爱运动队预制日历的好去处是`www.icalshare.com`。


    ##### 同步邮件账户


    您在 Mac OS X 的“邮件”或 Microsoft Outlook 中设置的每个邮件账户都会显示在此处（参见图 2-12）。勾选`同步邮件账户`复选框后，您可以选择或取消选择任意账户。未被选中的账户将不会出现在
    iPad 的“邮件”应用中。此选项不会同步您的邮件正文，仅同步账户设置。


    ![images](img/0212.jpg)


    **图 2-12.** *您的电子邮件账户同步选项*


    ##### 其他


    Apple 本来应该将此部分命名为“书签和备忘录同步”，但它选择了“其他”。在此处，您可以将电脑浏览器中的网页书签同步到 iPad 上的 Safari 网页浏览器（参见图
    2-13）。同样，如果您有 MobileMe 账户，您的书签将通过无线方式同步。如果没有，请勾选`同步书签`复选框，并在适用情况下从下拉菜单中选择您的浏览器。在
    Mac 上，书签同步支持 Safari。在 Windows 电脑上，书签同步支持 Safari 和 Microsoft Internet Explorer。


    ![images](img/0213.jpg)


    **图 2-13.** *您的书签和备忘录同步选项*


    此部分还允许您将备忘录同步到 iPad。备忘录同步仅适用于 Mac OS X 的“邮件”应用，或者在 Windows 电脑上，适用于 Microsoft Outlook。要启用备忘录同步，请选中该复选框。


    ##### 高级


    此部分允许您用电脑上的信息替换 iPad 上的通讯录、日历、邮件账户、书签和备忘录（参见图 2-14）。当您的信息出现同步错误，并且您想确保电脑与 iPad
    上显示的内容完全一致时，此功能非常方便。


    ![images](img/0214.jpg)


    **图 2-14.** *您的高级同步选项*


    当您选中相应的复选框后，iTunes 将仅在下次同步时替换 iPad 上的信息。此次同步后，iPad 与电脑之间的常规同步将恢复正常。


    **注意：** 如果您的日历和通讯录正在通过 MobileMe 同步，您将无法在`高级`部分选中它们对应的复选框。


    #### 应用标签


    此标签用于决定要在 iPad 上安装哪些应用，并允许您通过简单的拖放操作来排列它们。此标签包含两个主要部分：`同步应用`和`文件共享`。

