- "# 1. 引言\n\n程序员习惯于编写线性执行的程序。在编写、测试和执行程序时，您期望指令按照编写顺序运行。在代码清单 1-1 中，程序会先将变量 `a` 赋值为数字\
  \ `2`，再将变量 `b` 赋值为数字 `3`，接着将 `a + b` 的和赋值给变量 `sum`，最后在控制台打印结果。如果您在计算出 `sum` 的值之前就尝试执行\
  \ `print(sum)`，这个程序是绝对无法正常运行的。\n\n```\nlet a = 2\nlet b = 3\nlet sum = a + b //\
  \ 该变量依赖 a 和 b 的值，但变量本身的赋值顺序可以任意。\nprint(sum) // 只有获取到变量的值后才能将其打印出来。\n代码清单 1-1\n\
  一个自上而下执行的简单程序\n```\n\n这被称为*过程式编程*，因为您编写简单的语句，它们会自上而下地执行。即使添加了可以改变执行流程的语句，代码依然易于理解。在过程式编程中调用函数时，程序会“跳转”到内存中的另一个位置执行其内容，但这些行的执行也会以过程式的方式按照编写顺序进行，直到控制权返回给调用者。\n\
  \n即使是非程序员，只要指令按照特定顺序编写，并且*一次只做一件事*，他们也能遵循任何指令集。无论是按照菜谱烹饪，还是根据在线教程搭建狗屋的人，可能都不是程序员，但只要步骤清晰明确，人们天生就善于完成任务。\n\
  \n但计算机程序会成长并变得愈发复杂。虽然很多复杂软件确实可以遵循这种线性执行流程来编写，但程序往往需要同时执行多项任务。您的程序可能需要以这样一种方式执行，以至于仅凭肉眼扫视源码很难判断发生了什么——而不是拥有一个清晰的、可以用肉眼追踪的代码执行路径。这类程序是多线程的，它们可以同时运行多个（通常——但并非总是——互不相关的）代码路径。\n\
  \n在本书中，我们将学习如何使用苹果的 `async/await` 实现进行异步和多线程编程。在本章中，我们还将讨论苹果为此提供的旧技术，以及新的 `async/await`\
  \ 系统如何更优秀，并帮助您避免传统的并发陷阱。\n\n## 需要了解的重要概念\n\n并发和异步编程是非常宽泛的主题。虽然我很想涵盖所有内容，但这会超出本书的范围。相反，我们将定义四个重要概念，这些概念在我们探索苹果于\
  \ 2021 年推出的 `async/await` 系统时将非常相关。我们将尽可能用最简洁的语言来定义它们，因为在阅读本书各章节的过程中，牢记这些概念非常重要。新系统本身的概念将在后续章节中介绍。\n\
  \n> **注意**\n>\n> 苹果并非 `async/await` 系统的原创者。该技术此前已在其他平台上使用。微软于 2011 年宣布 C# 将获得 `async/await`\
  \ 支持，包含这些特性的 C# 于 2012 年正式向公众发布。\n\n### 线程\n\n*线程*的概念即使在相同语境下（此处指并发和异步编程）也可能有所不同。在本书中，我们将*线程*视为一个可以独立运行的工作单元。在\
  \ iOS 中，*主线程*负责运行应用的 UI，因此所有与 UI 相关的任务（更新视图层级、移除和添加视图）都必须发生在主线程中。尝试在主线程之外更新 UI 可能会导致意外行为，甚至更糟——崩溃。\n\
  \n在底层多线程框架中，开发者会手动创建线程，并且需要自己手动同步、停止线程以及进行其他线程管理操作。手动处理线程是软件多线程编程中最困难的部分之一。\n\n\n\
  好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n### 并发与异步编程\n\n并发是指一个线程（或你的程序）同时处理多件事情的能力。它可能是在响应不同的事件，例如网络处理程序、UI\
  \ 事件处理程序、操作系统中断等。可能存在多个线程，并且所有这些线程都可以是并发的。\n\nApple 的 SDK 中提供了多种不同的利用并发的 API。代码清单\
  \ 1-2 展示了如何根据设备请求使用 Touch ID 或 Face ID 的权限。\n\n```\nfunc requestBiometricUnlock()\
  \ {\nlet context = LAContext()\nvar error: NSError? = nil\nlet canEvaluate = context.canEvaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,\
  \ error: &error)\nif canEvaluate {\nif context.biometryType != .none {\n// (1)\n\
  context.evaluatePolicy(\n.deviceOwnerAuthenticationWithBiometrics,\nlocalizedReason:\
  \ \"To access your data\") { (success, error) in\n// (2)\nif success {\n// ...\n\
  }\n}\n}\n}\n}\n代码清单 1-2\n生物识别解锁是一个异步任务\n```\n\n`(1)` 调用了 `context.evaluatePolicy`，这是一个*并发调用*。这将要求系统挂起你的应用，以便其接管控制权。在你的应用被挂起时，系统会请求使用生物识别的权限。当系统运行\
  \ `context.evaluatePolicy` 时，你的应用所运行的线程可能正在做完全不同的事情，甚至与你的应用无关。当用户响应提示，接受或拒绝生物识别请求时，结果会被传递给你的应用。系统会等待一个合适的时机，将用户的选择通知给你的应用。该选择将通过完成处理器（也称为*回调*）在\
  \ `(2)` 处交付给你的应用，此时你的应用将重新控制该线程。该选择的交付线程可能与发起 `context.evaluatePolicy` 调用的线程不同——这一点很重要，因为如果响应需要更新\
  \ UI，你需要在主线程上执行该工作。这也被称为*阻塞机制*或*中断*，因为 `evaluatePolicy` 对于该线程来说是一个*阻塞*调用。如果你已经从事\
  \ iOS 开发至少几个月，你应该对这种处理各种事件的方式很熟悉。`URLSession`、图片选择器等许多 API 都使用了这种机制。\n\n人们常常认为异步编程就是同时运行多个任务。这是一个不同的概念，称为*多线程*，我们将在下一点中讨论。\n\
  \n**注意：** 如果你正在考虑在你的应用中实现生物识别解锁来保护资源，请不要使用上述代码。它已被简化用于解释并发的工作原理，并且没有采取正确的安全措施来保护你的用户数据。\n\
  \n多线程是指同时运行多个任务的行为。通常涉及多个线程（因此得名多线程）。在你的应用的上下文中，许多任务可以同时运行。同时从互联网下载多张图片，或者在你的网页浏览器中打开一些标签页的同时下载一个文件，这些都是多线程的例子。这允许我们*并行*运行任务，有时也被称为*并行性*。\n\
  \n### 多线程陷阱\n\n并发和多线程传统上都是难以解决的问题。自从它们被引入计算机世界以来，开发者们不得不开发各种范例和工具来使处理并发变得更容易。因为程序员习惯于过程式思维，编写在不可预知的时间执行的代码很难做到正确无误。\n\
  \n在本节中，我们将讨论编写底层多线程代码的开发者经常遇到的一些问题，以及他们为应对这些问题而创建的模型。理解本节很重要，因为这些传统问题是真实存在的，但它们的解决方案已经在\
  \ `async/await` 系统中实现了。它也将帮助你决定下次在程序中需要实现并发或多线程时，应该使用哪种技术。\n\n#### 死锁\n\n在多线程的上下文中，当两个不同的进程互相等待对方完成时，就会发生*死锁*，这有效地使得它们任何一方都无法首先完成。\n\
  \n当两个进程共享一个资源时，可能会发生这种情况。如果*线程 B* 想要*线程 A* 持有的一个资源，而*线程 A* 想要*线程 B* 持有的一个资源，那么两个进程都会互相等待对方完成，陷入永久的死锁状态。图\
  \ 1-1 展示了这种情况可能如何发生。\n\n![](img/532302_1_En_1_Fig1_HTML.jpg)\n\n*示意图描绘了线程 A 和 B\
  \ 的执行流程，其中线程 A 持有资源 C 并带有正确符号，持有资源 D 并带有错误符号；而线程 B 则相反。*\n\n**图 1-1** – 死锁发生过程\n\
  \n图 1-1 展示了线程 A 可能尝试依次访问资源 C 和资源 D，而线程 B 可能尝试做同样的事情但顺序不同。在这个例子中，死锁会很快发生，因为线程 A 会占据资源\
  \ C，而线程 B 会占据资源 D。任何一个线程只要先需要对方手里的资源，就会导致死锁。\n\n尽管这个问题看起来简单，但它是许多多线程软件中大量错误的罪魁祸首。简单的解决方案是防止每个进程尝试访问一个正被占用的资源。但这如何实现呢？\n\
  \n##### 解决死锁问题\n\n死锁问题有很多成熟的解决方案。*互斥锁*和*信号量*是最常用的。还有*通过管道进行进程间通信*，但我们不讨论这个，因为它超出了单个程序的范畴。\n\
  \n###### 互斥锁\n\n*互斥锁*是*互斥锁（或标志）*的简称。互斥锁通过向资源添加一个*锁*来向其他进程发出信号，表明某个进程正在使用该资源，并阻止其他进程获取该资源，直到该锁被释放。理想情况下，一个进程会一次性获取它所需的所有资源的锁，甚至在使用它们之前就获取。这样，如果*线程\
  \ A* 需要*资源 C* 和*资源 D*，它可以在*线程 B* 尝试访问它们之前将它们锁定。*线程 B* 将等待所有锁被释放后，再尝试访问这些资源本身。图 1-2\
  \ 展示了这是如何实现的。\n\n![](img/532302_1_En_1_Fig2_HTML.png)\n\n*示意图描绘了线程 A 和 B 的执行流程，其中包括带有锁符号的资源\
  \ C 和 D，使用锁定资源继续执行，以及等待资源解锁并带有刷新符号。*\n\n**图 1-2** – 使用互斥锁\n\n请记住，在这种特定情况下，这意味着*线程\
  \ A* 和*线程 B*，虽然是多线程，但并不会严格地同时运行，因为*线程 B* 需要*线程 A* 正在使用的相同资源，并且它会等待这些资源被释放。因此，在设计多线程系统之前，识别可以并行运行的任务非常重要。\n\
  \n\n\n###### 信号量\n\n`Semaphore`（信号量）是一种锁，与互斥锁非常相似。使用这种解决方案，任务会获取对资源的锁。任何其他到达并需要该资源的任务都会发现该资源正忙。当原始线程释放资源时，它会*通知*感兴趣的相关方资源已空闲，然后它们在与资源交互时会遵循相同的加锁和通知流程。\n\
  \n互斥锁和信号量听起来很相似，但关键区别在于它们锁定的资源类型。如果你发现自己需要决定保护什么（在使用 `async/await` 时不会遇到这种情况），那么思考哪种方式在你的用例中更有意义就很重要了。通常，互斥锁可用于保护任何本身不涉及任何执行逻辑的资源，例如文件、套接字和其他文件系统元素。信号量可用于保护程序本身的执行，例如共享的代码执行路径。这些可能是具有共享状态的可变函数或类。在某些情况下，多个线程执行一个函数可能会产生意想不到的后果，而信号量正是一个很好的工具。例如，一个将日志写入磁盘的函数可以用信号量保护，因为如果多个进程同时写入日志，日志最终会被损坏。谁拥有日志函数的信号量，谁就需要通知其他感兴趣的相关方该资源已空闲，以便它们可以继续执行。\n\
  \n一个经验法则是，在获取信号量时始终添加超时机制，如果进程耗时过长，则让其超时。如果在你的程序上下文中这是可以接受的（不会发生数据损坏，或者取消任务不会产生其他意外后果），请考虑添加超时，以便信号量在一段时间后再次变为空闲。\n\
  \n使用信号量将允许线程进行*同步*，因为它们能够相互协调资源，从而公平地使用这些资源。\n\n#### 饥饿\n\n*饥饿*问题发生在程序陷入永久等待资源以执行某些工作但永远无法获得资源的状态时。图\
  \ 1-3 说明了这个问题。\n\n![](img/532302_1_En_1_Fig3_HTML.png)\n\n图 1-3：哲学家就餐问题\n\n图 1-3\
  \ 描述了所谓的*哲学家就餐问题*，这是饥饿问题的一个经典例子。该问题描述了五位想要在一张共用餐桌上就餐的哲学家。他们都有自己的盘子，并且有五把叉子。然而，每位哲学家需要两把叉子才能吃饭。这意味着只有两位哲学家可以吃饭，而且只能是那些不直接相邻的哲学家。当一位哲学家不吃饭时，他会放下两把叉子。但可能出现这样的情况：一位哲学家决定吃个不停，导致另一位哲学家挨饿。\n\
  \n对于低层多线程开发人员来说幸运的是，可以使用我们上面讨论过的*信号量*来解决这个问题。思路是使用一个信号量来跟踪使用中的叉子，这样当有叉子可用时，它就可以通知另一位哲学家。\n\
  \n#### 竞态条件\n\n这可能是大多数开发人员最熟悉的多线程问题，*竞态条件*与死锁非常相似，不同之处在于它们可能导致数据或内存损坏，从而引发其他不良后果。当处理多线程时，两个进程同时读取数据本身并非坏事。如果资源是只读的，则没有坏处。但是，如果进程可以以任何方式修改或更新资源，那么这些进程将不断地覆盖另一个进程刚刚写入的数据，这最终会导致读取和写入损坏的数据。如果涉及的资源是用户数据，用户将会不满。如果资源由操作系统提供，则可能导致其他意外后果，并最终引发死锁等多线程问题。图\
  \ 1-4 说明了这个陷阱。\n\n![](img/532302_1_En_1_Fig4_HTML.jpg)\n\n图 1-4：多个线程同时写入同一个文件\n\n\
  如果历史日志被多个没有任何控制的线程写入，事件可能会以随机顺序记录，一个线程可能会覆盖另一个线程刚刚写入的行。因此，历史日志的写入操作应该被锁定。一个线程在写入日志时会获得一个*互斥锁*，并在使用完成后释放它。任何其他需要写入日志的线程都将等待，直到锁被释放。\n\
  \n死锁和竞态条件非常相似。主要区别在于，在死锁中，我们有多个进程在等待彼此完成；而在竞态条件中，两个进程都在写入数据并损坏数据，因为没有进程知道涉及的资源正被其他人使用。这意味着死锁的解决方案也适用于竞态条件，因此只需使用互斥锁或信号量来锁定你的资源，以确保仅由一个进程对资源进行独占访问。这称为*原子操作*。\n\
  \n#### 活锁\n\n生活中有一句谚语：“*过犹不及*。”理解随意地使用锁并不能解决所有多线程问题是很重要的。识别出一个多线程问题，然后扔一个互斥锁上去就了事，这听起来很诱人。不幸的是，事情并非如此简单。你需要理解你的问题，并确定锁应该放在哪里。\n\
  \n同样，当进程在释放和获取资源的条件上过于宽松时，也可能出现这个问题。如果 `线程 A` 可以请求 `线程 B` 的一个资源，并且 `线程 B` 不加思考地顺从，而\
  \ `线程 B` 也可以对 `线程 A` 做同样的事，那么最终可能发生的情况是，它们将无法再向对方请求资源，因为它们甚至无法执行到执行流程中的那个点。\n\n\
  这是一个现实生活中的经典例子。假设你正走向一扇关闭的门，而另一个人几乎同时到达。你可能想让对方先进，但对方可能告诉你应该你先走。如果你熟悉这种尴尬的感觉，那么你就知道我们多线程程序中的活锁是什么感觉了。\n\
  \n### 现有的多线程与并发工具\n\n苹果公司提供了一些较低级别的工具来编写多线程和并发代码。我们将展示其中一些工具的示例。它们按从低级到高级的顺序列出。级别越低，越难正确使用该系统，并且在现实世界中遇到它的可能性也越小。你应该了解这些工具，以便在需要时能够使用它们。\n\
  \n\n\n#### pthreads\n\n`pthreads`（POSIX 线程）是 IEEE 定义的标准实现。^(¹) 其名称中的`POSIX`（可移植操作系统接口）表明它们不仅可在\
  \ Apple 操作系统上使用，也可在许多平台上运行。传统上，硬件供应商会提供各自专有的多线程 API。得益于这一标准，你可以在多个 POSIX 系统中使用相似的接口。`pthreads`\
  \ 的一大优势是，只要系统兼容 POSIX（包括某些 Linux 发行版），它们便广泛可用。\n\n`pthreads` 的缺点是它们完全用 C 语言编写。C\
  \ 是一种非常底层的编程语言，并且正逐渐淡出许多开发者的知识体系。开发者越年轻，掌握 C 语言的可能性就越小。虽然我不认为 C 语言会很快消失，但事实上很难找到熟悉\
  \ C 语言（更不用说正确使用它）的 iOS 开发者。`pthreads` 是我们可用的最底层的多线程 API，因此学习曲线非常陡峭。如果你选择使用 `pthreads`，那是因为你需要高度精确地控制整个多线程和并发流程，不过大多数开发者很少（甚至从未）需要下降到这一层级。你将需要手动启动线程并管理诸如互斥锁（`mutex`）等资源。如果你因在其他平台使用过\
  \ `pthreads` 而熟悉它，可以在这里沿用这些知识，但要注意未来的维护者可能既不熟悉 `pthreads` 也不熟悉 C 语言本身。\n\n#### NSThreads\n\
  \n`NSThread` 是 Apple 提供的一个 Foundation 对象。它属于底层工具，但不如 `pthreads` 那样底层。由于它是 Foundation\
  \ 对象，因此提供了 Objective-C 接口。这一接口让更多开发者能接触该工具，但随着时间推移，了解 Objective-C 的 iOS 开发者可能会越来越少。事实上，完全有可能找到拥有数年经验却从未使用过该语言的\
  \ iOS 开发者，尽管 `NSThread` 也可以在 Swift 中使用。\n\n如果你想进行多线程编程，最终需要创建多个 `NSThread` 对象，并负责管理它们。每个\
  \ `NSThread` 对象都含有可用于检查线程状态的属性，例如 `executing`、`cancelled` 和 `finished`。你可以设置每个线程的优先级，这在多线程中是非常真实的需求。你甚至可以获取主线程，并判断当前线程是否为主线程，从而避免在主线程上执行耗时任务。\n\
  \n与 `pthreads` 类似，大多数开发者很少（甚至从未）需要下降到这一层级。\n\n#### Grand Central Dispatch (GCD)\n\
  \n接下来我们将讨论 Apple 平台上第一个用于高级并发和多线程的高层工具。Grand Central Dispatch（以下简称 GCD）在 Apple 的\
  \ SDK 中无处不在，以至于你很可能在不知不觉中使用过它。如果我遇到一个从未写过类似代码清单 1-3 中代码的开发者，我会感到惊讶。\n\n```\nDispatchQueue.main.async\
  \ {\n    nameLabel.text = userResponse.username\n}\nListing 1-3\n在主线程上调用代码\n```\n\
  \n看起来很熟悉？这是 GCD 中最著名的调用之一，因为它能让你快速无痛地将某些工作推迟到主线程执行。例如，在 `URLSessionTask` 的某个子类完成某些工作后，你希望更新\
  \ UI 时，很可能会看到这个调用。\n\n作为高层框架，GCD 让你免除了比 `pthreads` 和 `NSThreads` 更多的繁琐工作。使用 GCD，你永远无需手动管理线程。从这个意义上说，它确实是一个高层框架，但它也带来了一些自身的负担。代码清单\
  \ 1-4 展示了一些开发者在使用 GCD 时遇到的经典问题。\n\n```\nfunc fetchUser() {\n    userApi.fetchUserData\
  \ { userData in\n        DispatchQueue.main.async {\n            self.usernameLabel.text\
  \ = userData.username\n            self.userApi.fetchFavoriteMovies(for: userData.id)\
  \ { movies in\n                DispatchQueue.main.async {\n                    self.userMovies\
  \ = movies\n                }\n            }\n        }\n    }\n}\nListing 1-4\n\
  厄运金字塔（pyramid of doom）\n```\n\n代码清单 1-4 展示了一段假设的代码，它从某个地方获取用户数据及其最喜欢的电影。这种用法在 GCD\
  \ 中非常典型。当你的工作需要多次依赖于其他任务的调用时，你的代码就会开始呈现“厄运金字塔”的形状。虽然有办法解决这个问题（例如创建不同的函数来分别获取用户数据和电影），但这并不完全优雅。\n\
  \n尽管有这些缺点，GCD 仍然是创建并发和多线程代码的一种非常流行的方法。它为你内置了许多保护机制，因此你无需成为多线程理论专家也能避免犯错。我们这里看到的示例仅展示了它提供的极少一部分功能。虽然这个工具足够高层，能让你免去许多麻烦，但它也暴露了大量底层功能，并让你能够直接操作某些原语，例如信号量（`semaphores`）。\n\
  \n最后，这项技术是开源的，因此可以在 Apple 产品之外的平台上找到。GCD 体量庞大，详细讨论其特性已超出本书范围，但请注意，它已被广泛使用很长时间，你在职业生涯中很可能会见识到一些使用它的高级技巧。\n\
  \n\n\n### `NSOperation` APIs\n\n作为比 GCD 层级更高的工具，`NSOperation` API 是一套用于多线程编程的高级工具。尽管没有\
  \ GCD 那样广为人知，它在 SDK 的某些部分中仍占有一席之地。例如，CloudKit API 就采用了这项技术。\n\n这套工具确实为你省去了多线程编程中的大量痛点，但同时也丧失了不少灵活性。你无需手动管理锁或信号量，相应的\
  \ API 也更为简单。它抽象了如此多的细节，以至于你甚至无法察觉用它运行的任务是否位于不同线程。如果系统认为在同一个线程中运行你的任务更为合理，它就会这么做；否则，它会尊重你运行多线程的意图。甚至，如果系统判断不值得为某个任务另开一个线程，它可能会选择将该任务在主线程中执行。代码清单\
  \ 1-5 创建了两个不同的任务，分别在不同队列中从 1 数到 10 和从 10 数到 20。\n\n```\nfunc startCounting() {\n\
  /// 为此我们需要一个队列。\nlet operationQueue = OperationQueue()\n/// 如果你稍后需要识别队列，可以为其设置一个可选名称。\n\
  operationQueue.name = \"Counting queue\"\n/// 这个任务将从 1 数到 10...\nlet from1To10 =\
  \ BlockOperation {\nfor i in (1 ... 10) {\nprint(i)\n}\n}\n/// ...而这个任务将从 11 数到\
  \ 20\nlet from11To20 = BlockOperation {\nfor i in (11 ... 20) {\nprint(i)\n}\n}\n\
  /// 将操作添加到队列中\noperationQueue.addOperation(from1To10)\noperationQueue.addOperation(from11To20)\n\
  /// 确保程序在操作运行期间不会提前退出。\noperationQueue.waitUntilAllOperationsAreFinished()\n}\n\
  Listing 1-5\nNSOperation API 的多线程使用\n```\n\n使用这些 API 非常简单。你首先创建一个 `OperationQueue`。这个队列的职责是执行你添加到其中的任何任务。你也可以为它命名，以便稍后引用或搜索时使用。\n\
  \n在*代码清单* *1-5* 中，我们创建了两个任务（本例中是 `BlockOperation` 的实例——原始 API 基于 Objective-C，因此在\
  \ Swift 中表现为闭包），即 `from1To10` 和 `from11To20`。一旦通过 `OperationQueue.addOperation`\
  \ 调用将它们提交到队列，它们就会立即开始执行。在这个例子中，你会看到数字几乎是交错打印的。每次运行程序时，得到的结果都会不同。\n\n同时运行多个任务很容易，但如果你希望一个任务在另一个任务之后执行，因为前者依赖于后者的数据，或者仅仅因为这样更合理，又该如何做呢？\n\
  \n在这种情况下，`BlockOperation` 提供了一种方法，允许你将一个操作定义为另一个操作的依赖。如果你将 `from1to10` 设为 `from11to20`\
  \ 的依赖，那么数字序列就会按你期望的顺序打印。代码清单 1-6 修改了代码清单 1-5 的一部分，通过创建依赖关系来按顺序打印数字。\n\n```\n// 确保数字按顺序打印。我们在将操作添加到队列之前执行此操作。\n\
  from11To20.addDependency(from1To10)\n/// 将操作添加到队列中\noperationQueue.addOperation(from1To10)\n\
  operationQueue.addOperation(from11To20)\nListing 1-6\n将操作添加为其他操作的依赖\n```\n\n值得注意的是，虽然使用此框架你无法管理线程，但你可以检查每个*操作*的状态（`isCancelled`、`isFinished`\
  \ 等），并且可以随时取消你的操作（通过调用 `cancel`）。如果一个操作被取消，依赖于它的其他操作也会被取消。\n\n如你所见，使用 `NSOperation`\
  \ API 很简单。当你有多线程编程的简单需求时，它仍然是一个很不错的工具。\n\n### 介绍 `async/await`\n\n`async/await`\
  \ 是一套用于编写并发和多线程代码的高级系统。使用它，你无需考虑手动管理线程或死锁问题。系统会在底层为你处理所有这些细节以及更多工作。通过使用非常简单的结构，你将能够编写出安全且强大的并发和多线程代码。值得注意的是，这个系统层级非常高，很难被错误使用。虽然系统不会让你对并发和多线程原语进行精细控制，但它会提供一整套抽象，让你以一种截然不同的方式思考多线程代码。从语义上讲，很难将\
  \ `async/await` 与我们之前探讨过的任何其他系统进行比较，因为 `async/await` 深度集成在 Swift 语言本身之中，而不是以框架或库的形式附加的。得益于\
  \ Swift 对可读性的重视，该系统暴露的原语更容易理解。\n\n为了让你快速了解本书其余部分将要学习的内容，我们将在代码清单 1-7 中使用 `async/await`\
  \ 重写代码清单 1-4。\n\n```\n@MainActor\nfunc fetchUser() async {\nlet userData = await\
  \ userApi.fetchUserData()\nusernameLabel.text = userData.username\nlet movies =\
  \ userApi.fetchMovies(for: userData.id)\nuserMovies = movies\n}\nListing 1-7\nasync/await\
  \ 的实际应用\n```\n\n代码清单 1-7 去掉了代码清单 1-4 中的大量代码。你可以看到，那些将结果推迟到主线程执行的代码不见了。你还可以看到，代码可以从上到下阅读——就像普通的程序性编程风格一样！这个版本的获取用户数据\
  \ API 读起来更简单，写起来也更简单。`@MainActor` 就是所谓的*全局执行体*。我们将在本书后面探讨执行体和全局执行体。现在，你只需知道 `@MainActor`\
  \ 会确保带有此标记的函数或类中的成员更新在主线程中运行。\n\n通过理解何时直接使用系统的关键字（代码清单 1-7 展示了 `async` 和 `await`\
  \ 本身就是关键字）以及系统的其他原语，你将能够编写任何程序员都能理解的并发和多线程代码。更棒的是，如果一位开发者刚接触 Apple 平台开发，但拥有使用其他采用\
  \ `async/await` 技术的经验，他们将能快速熟悉这套系统。你的代码库将更加整洁，并欢迎团队中的新开发者加入。\n\n使用 `async/await`\
  \ 将避免你编写底层并发代码。你永远不需要直接管理线程。锁也完全不是你的责任。如你所见，这个新系统允许我们编写富有表达力的代码，而回调地狱已成为过去。\n\n\
  重要的是要记住，尽管这是一个高级系统，你仍可能会遇到极少数需要底层工具的特殊情况。话虽如此，大多数开发者在整个职业生涯中可能都找不到一个需要将 `async/await`\
  \ 搁置一旁的实际用例。\n\n## 环境要求\n\n要跟学本书，你至少需要从 App Store 下载 Xcode 13。如果你想在 iOS 14 和 iOS\
  \ 13 上使用 `async/await`，则需要 Xcode 13.3。你应该能够熟练阅读和编写 Swift 代码。部分示例将使用 SwiftUI 编写，以避免\
  \ UI 代码干扰你对各章节实际内容的关注。\n\n\n\n## 摘要\n\n并发与多线程是传统的计算问题。在底层进行并发管理并自行管理资源极具挑战性，因为这类操作极易被误用。若未能正确使用这些资源或编写正确的多线程代码，轻则引发程序缺陷（bug），重则导致用户数据损坏。正因如此，包括苹果在内的众多开发者设计了多种工具来封装底层细节，提供更简便的接口。以苹果平台为例，他们为开发者提供了以下工具（按抽象层级从低到高排列）：\n\
  \n* `pthread` 线程\n* `NSThread` 线程\n* 大中央调度（GCD）\n* `NSOperation` 及相关 API\n* `async/await`\n\
  \n大多数开发者无需深入到 `pthread` 或 `NSThread` 层级。GCD 与 `NSOperation` API 提供了更高层级的抽象，而 `async/await`\
  \ 不仅为多线程原语提供了抽象，还构建了一整套体系——大多数开发者甚至无需了解底层组件便可直接使用。这套新系统能让我们编写更简洁、易读且易写的代码。深入研习这套新系统非常值得，而本书正是为此而作。\n\
  \n## 练习题\n\n回答以下问题：\n\n1.  使用传统并发工具时，若未正确使用，可能陷入哪些陷阱？\n2.  在 `async/await` 出现之前，苹果平台上有哪些可用的并发工具？\n\
  3.  `async/await` 相较于其他底层并发工具有哪些优势？\n\n"
- "# 2. 初识 async/await\n\n上一章我们探讨了编写并发与多线程代码时常遇到的问题，也了解了苹果为开发者提供的多种方案——从难以正确使用的底层替代方案，到更易用但灵活性稍低的高层替代方案。\n\
  \n本书剩余部分将聚焦于新的并发体系，我们将其简称为 `async/await`。本章将探索这套新体系的基础构建块——`async` 和 `await` 关键字。目前我们暂不深入多线程细节。当理解如何运用这些关键字，以及它们与你已熟悉的\
  \ SDK 中 API 的交互方式后，你便掌握了学习这套新体系所有功能的正确工具。但在继续之前，让我们先多聊聊闭包与回调（在 Objective-C 中称为 blocks）。\n\
  \n## 闭包在并发与多线程中的定位\n\n在学习本章时，我建议你获取示例项目“第 2 章 - 社交媒体应用”。首先，我们将讨论应用中那些基于闭包并发的现有代码，后续再将其改造为使用\
  \ `async/await`。\n\n示例应用包含两个不同的视图。\n\n第一个视图显示一个简单的按钮，点击后可通过生物识别进行身份验证，如图 2-1 所示。\n\
  \n![](img/532302_1_En_2_Fig1_HTML.jpg)\n\n手机截图中显示时间、WiFi 信号、满电电池以及“Authenticate”（验证）字样。\n\
  \n**图 2-1** 社交媒体应用的入口点\n\n第二个界面（图 2-2）在成功验证后显示个人资料视图：\n\n![](img/532302_1_En_2_Fig2_HTML.jpg)\n\
  \n手机截图中显示时间、WiFi 信号、满电电池，以及一位名为 Andybanez 的男士头像，其关注者与被关注数均为零。\n\n**图 2-2** 社交媒体应用的主个人资料视图\n\
  \n验证成功后，应用将调用两个不同的网络服务：一个用于获取用户资料，另一个用于获取其关注者与被关注者数量。\n\n> **注意**：若在模拟器中运行此应用，需先注册\
  \ Face ID。操作方式：打开模拟器，进入“功能”菜单 ➤ FaceID，确保已勾选“已注册”选项，然后重新运行应用。\n\n在撰写本文时，大多数涉及并发的应用都采用基于闭包的并发方式。打开\
  \ `UserAPI.swift` 文件，你将看到清单 2-1 中这再熟悉不过的代码。\n\n```\nclass UserAPI {\n    func fetchUserInfo(\n\
  \        completionHandler: @escaping (_ userInfo: UserInfo?, _ error: Error?) ->\
  \ Void\n    ) {\n        let url = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json\"\
  )!\n        let session = URLSession.shared\n        let dataTask = session.dataTask(with:\
  \ url) { data, response, error in\n            if let error = error {\n        \
  \        completionHandler(nil, error)\n            } else if let data = data {\n\
  \                do {\n                    let userInfo = try JSONDecoder().decode(UserInfo.self,\
  \ from: data)\n                    completionHandler(userInfo, nil)\n          \
  \      } catch {\n                    completionHandler(nil, error)\n          \
  \      }\n            }\n        }\n        dataTask.resume()\n    }\n    //...\n\
  }\n```\n\n**清单 2-1** 从服务器下载数据并解析以展示给用户\n\n这段代码对新手来说可能令人望而生畏，但有经验的开发者能一眼看穿其逻辑。上述代码创建了一个\
  \ `URLSessionDataTask`，这是 Foundation 框架中用于通过 HTTP 从网络下载数据的对象。我们需要在新建的 `dataTask`\
  \ 上调用 `resume()` 才能真正执行下载。任务完成后，我们检查是否有错误：若有，则调用函数的 `completionHandler`，不传递 `userInfo`\
  \ 而仅传递一个 `Error`；若有数据，则尝试将其解析为 `UserInfo` 对象。若解析出错，同样向处理器传递错误；若成功，则获得所需结果，并用新下载的对象调用处理器。\n\
  \n你可能见过该函数的变体。例如，有些开发者会选择将此函数定义为接收两个闭包：一个仅接收 `userInfo` 对象，另一个仅接收错误，这样不同情况调用不同的闭包。这能消除可选类型，但如果存在无论成功失败都需要执行的公共代码，代码会变得更长。清单\
  \ 2-2 展示了这种实现方式。\n\n```\nfunc fetchUserInfo(\n    success: @escaping (_ userInfo:\
  \ UserInfo) -> Void,\n    failure: @escaping (_ error: Error) -> Void\n) {\n   \
  \ //...\n}\n```\n\n**清单 2-2** 处理完成处理器的另一种方式\n\n\n\n"
- "# 排版后的文本\n\n为了保持本书篇幅简短，我们会采取一些捷径，例如强制解包可选值。请记住，始终要安全且负责任地处理可选值。\n\n现在，我们想要下载这个用户信息并用它来更新一个变量。打开`UserProfileViewModel.swift`文件并找到`fetchUserInfo()`函数。列表\
  \ 2-3 展示了调用点的样子。\n\n```swift\nprivate func fetchUserInfo() {\n  let userApi = UserAPI()\n\
  \  print(\"Beginning data download\")\n  print(\"Downloading User info\")\n  self.loadingStatus\
  \ = .loading\n  userApi.fetchUserInfo { userInfo, error in\n    DispatchQueue.main.async\
  \ {\n      print(\"User info downloaded\")\n      if let error = error {\n     \
  \   self.loadingStatus = .error(error)\n      } else if let userInfo = userInfo\
  \ {\n        self.loadingStatus = .idle\n        self.userInfo = userInfo\n    \
  \  }\n    }\n  }\n  print(\"Ending function\")\n}\n```\n*列表 2-3 调用 fetchUserInfo\
  \ 方法*\n\n上述代码将调用我们`API`对象中的`fetchUserInfo(_)`函数。如果成功，它会从视图模型中设置一个`userInfo`变量，否则设置一个错误。\n\
  \n运行应用并检查打印语句。\n\n新开发者可能期望控制台打印如下内容：\n\n```\nBeginning data download\nDownloading\
  \ User info\nUser info downloaded\nEnding function\n```\n\n但实际情况并非如此，你会看到如下输出：\n\
  \n```\nBeginning data download\nDownloading User info\nEnding function\nUser info\
  \ downloaded\n```\n\n这是因为当并发任务启动时，线程仍在执行你的代码。它会在`fetchUserInfo`调用之前开始打印语句，并且由于数据下载是一个*并发*调用，`dataTask.resume`的执行被挂起，因此线程会在下载本身完成之前执行函数调用*之后*的内容。当下载完成时，`dataTask`中的内容会继续执行，在所有其他内容之后打印`User\
  \ info downloaded`。假设你的数据下载速度快于线程其余部分的执行时间——这是不可能的，因为你期望网络调用比本地 CPU 调用更快——那么它有可能按预期顺序打印语句，但即便如此，也不能保证一定会这样。\n\
  \n现在，假设你想只在用户通过生物识别认证后才下载用户信息。你的函数将类似于列表 2-4。\n\n```swift\nfunc authenticateAndFetchProfile()\
  \ {\n  authenticateWithBiometrics { success in\n    if success {\n      self.isAuthenticated\
  \ = true\n      let userApi = UserAPI()\n      userApi.fetchUserInfo { userInfo,\
  \ error in\n        DispatchQueue.main.async {\n          if let error = error {\n\
  \            self.loadingStatus = .error(error)\n          } else if let userInfo\
  \ = userInfo {\n            self.loadingStatus = .idle\n            self.userInfo\
  \ = userInfo\n          }\n        }\n      }\n    }\n  }\n}\n```\n*列表 2-4 回调地狱*\n\
  \n由于我们依赖生物识别读取状态来决定是否下载个人资料，我们需要等待它响应，然后才能进行用户个人资料调用。一旦我们收到响应，我们的闭包就会执行，用户调用就会生效。\n\
  \n更糟糕的是，我们甚至还没有完成端点的消费。我们还需要消费下载关注者和粉丝数据的方法。`UserAPI.swift`文件中有一个方法`fetchFollowingAndFollowers(_)`，我们可以用它来实现这一点。列表\
  \ 2-5 修改了`authenticateAndFetchProfile()`方法，以便在获取主个人资料后下载粉丝和关注用户。\n\n```swift\nfunc\
  \ authenticateAndFetchProfile() {\n  authenticateWithBiometrics { success in\n \
  \   if success {\n      self.isAuthenticated = true\n      let userApi = UserAPI()\n\
  \      userApi.fetchUserInfo { userInfo, error in\n        DispatchQueue.main.async\
  \ {\n          if let error = error {\n            self.loadingStatus = .error(error)\n\
  \          } else if let userInfo = userInfo {\n            self.userInfo = userInfo\n\
  \            userApi.fetchFollowingAndFollowers { followingFollowers, error in\n\
  \              if let error = error {\n                self.loadingStatus = .error(error)\n\
  \              } else {\n                self.followersFollowing = followingFollowers\n\
  \              }\n            }\n          }\n        }\n      }\n    }\n  }\n}\n\
  ```\n*列表 2-5 更大的回调地狱*\n\n你可能认为列表 2-5 中的代码是夸张的，但确实存在这样的代码库。有些开发者通过使用信号量的技巧来强制 API\
  \ 调用一个接一个地被调用。其他开发者可能会选择使用`NSOperationQueue`来实现。有些人会使用 GCD。还有的人可能会觉得将其拆分为多个函数调用更实用，但如果某些操作依赖于其他操作，拆分为不同的函数调用会使代码难以追踪。\n\
  \n有了新的`async/await`系统，你将能够完全摒弃闭包来实现这个特定目的，并且能够编写更接近过程式编程的代码。它还将帮助你和你团队的其他成员为函数签名定义指导方针，从而避免像列表\
  \ 2-1 和列表 2-2 的函数签名之间出现的不匹配问题。\n\n## 开始使用 async/await\n\n回想一下，在过程式编程中，代码是按从上到下的逻辑顺序执行的。如果你回到列表\
  \ 2-3，你会意识到由于`print`语句被调用的顺序，这里的情况并非如此。\n\n如果我们不是通过闭包传递数据，而是通过函数的标准`return`语句来传递数据，那岂不是很好？这正是新系统允许我们做的。通过摒弃闭包，你可以编写自然的代码，从而更容易地表达你的意图，使未来的开发者（包括未来的你自己）能够更清晰地理解代码库的功能。\n\
  \n以过程式思维来考虑，我们可以将社交媒体应用的任务总结为一个三步程序：\n\n1.  `首先使用生物识别认证用户。`\n2.  `然后获取他们的用户个人资料。`\n\
  3.  `最后，获取用户的粉丝和关注用户。`\n\n使用闭包，这是意大利面条式代码。使用`async/await`，我们可以几乎原样地编写这三个语句。我们将把基于闭包的代码转换为`async/await`，但在开始之前，让我们先学习一些理论知识。\n\
  \n\n\n### `async` 关键字\n\n该系统的核心是 `async` 和 `await` 关键字。理解如何使用它们对于使用系统的其余部分至关重要。\n\
  \n可以异步运行，或者可以与其他函数同时运行的函数，在其返回类型前有 `async` 关键字。这将告诉编译器和其他程序员你的函数是异步的。代码清单 2-6 展示了\
  \ `async` 声明的样子。\n\n```\nfunc fetchUserInfo() async throws -> UserInfo { /*...*/\
  \ }\n代码清单 2-6\n一个异步函数声明\n```\n\n代码清单 2-6 中的声明将是我们将基于闭包的代码迁移到 `async/await` 的基础。我们甚至还没写多少代码，就已经能看到一些好处了。完成处理程序完全消失了。如果你的函数可能抛出错误，就像我们最初的\
  \ `fetchUserInfo` 方法那样，你可以将 `async` 函数标记为 `throws`，这将使错误处理更加自然。最后，这个函数将返回一个 `UserInfo`，它不是可选项，这样你就不必解包该对象以及进行其他可能的检查。\n\
  \n要调用 `async` 函数，你需要位于并发上下文中。有几种创建此类上下文的方法：\n\n-   `async` 函数的函数体本身就是一个并发上下文。如果一个函数没有被标记为\
  \ `async`，它就不能直接调用 `async` 函数。代码清单 2-7 将无法编译。\n\n```\nfunc authenticateAndFetchProfile()\
  \ {\n//...\nlet userProfile = try await fetchUserInfo()\n//...\n}\n代码清单 2-7\n尝试在异步上下文之外调用异步函数\n\
  ```\n\n将该函数标记为 `async` 将使其能够编译。代码清单 2-8 通过修复代码使其能够编译。\n\n```\nfunc authenticateAndFetchProfile()\
  \ async {\n//...\nlet userProfile = try await fetchUserInfo()\n//...\n}\n代码清单 2-8\n\
  使用 async 关键字创建异步上下文\n```\n\n但如果我们没有并发上下文会怎样？在你的调用层级中的某个位置，你可能会发现自己处于完全没有并发上下文来运行代码的情况。幸运的是，另一种创建异步上下文的方法将帮助我们处理这个问题。\n\
  \n-   通过创建一个 `Task` 对象。`Task` 是一个非常强大的对象，它允许我们在后面进行多线程操作。我们还能对它们进行一些控制，例如取消它们。我们将在后面的章节中探讨这些特性。现在，我们只需使用\
  \ `Task` 来创建一个并发上下文。`Task` 有一个带有闭包的初始化器，而该闭包本身就是一个并发上下文。代码清单 2-9 展示了如何使用 `Task`。\n\
  \n```\nfunc authenticateAndFetchProfile() {\nTask {\n//...\nlet userProfile = try\
  \ await fetchUserInfo()\n//...\n}\n}\n代码清单 2-9\n使用 Task 创建异步上下文\n```\n\n即使 `authenticateAndFetchProfile()`\
  \ 没有被标记为 `async`，在其中创建一个 `Task` 也能允许我们运行异步函数。\n\n### `await` 关键字\n\n每次调用异步函数时，都必须在某个点上配对一个\
  \ `await` 关键字。`await` 本身具有特殊的语义，它不仅仅是调用 `async` 函数的语法。\n\n如果在代码执行过程中遇到 `await` 关键字，你的程序可以选择挂起当前正在执行的函数。因此，`await`\
  \ 关键字通常也被称为**挂起点**。这是系统会做出的决定，你无法控制。当我们说它可能会挂起时，意味着当前执行将会暂停，而该 `async` 函数将在其他地方继续执行。如果你的当前函数被挂起，其中的代码将不会被执行。\n\
  \n为了更好地理解挂起，代码清单 2-10 将修改代码清单 2-8，在被等待的调用前后添加一些 `print` 语句。\n\n```\nfunc authenticateAndFetchProfile()\
  \ async {\n//...\nprint(\"正在获取用户信息\")\nlet userProfile = try await fetchUserInfo()\n\
  print(\"用户信息已获取\")\n//...\n}\n代码清单 2-10\n添加 print 语句将使其按顺序打印内容\n```\n\n代码清单 2-10\
  \ 将打印 `正在获取用户信息`，过一会儿后，它将打印 `用户信息已获取`。这实际上就是这些语句编写的顺序，并且你无需涉足任何闭包或其他东西就能得到该输出。太好了！\n\
  \n在发生挂起的 `await` 调用期间发生的情况是，你将控制权交还给系统，因此你无法控制何时能收回控制权。调用 `fetchUserInfo()` 的同一个线程将可以自由地去做其他工作，并且这些其他工作与你无关，因为它们由系统处理。它可能是你应用中的另一个任务，也可能超出你的领域。在控制权返回给你之前，你无法继续执行语句。因此，代码清单\
  \ 2-10 中的代码将按照编写的顺序打印这些语句，但是打印 `用户信息已获取` 可能需要一点时间，因为你已将线程交由系统处理，而下载用户信息是一项耗时的任务。当用户信息下载完成后，`fetchUserInfo`\
  \ 调用中会执行一个 `return` 语句，正是这个语句会将控制权返回给你。请注意，由系统决定何时将控制权交还给你，并且这不会在遇到 `return` 语句后立即发生。系统可能正在执行其他并发任务，在回到你的任务之前，它需要先处理好优先级。\n\
  \n总之，在遇到挂起点（`await` 关键字）后，如果系统选择挂起，那么在控制权交还给你之前，其后的任何代码都不会被执行。在挂起发生期间，系统会利用该线程去做其他工作。\n\
  \n在 `await` 调用之后发生的任何事情都是**延续**。我们需要继续执行在被挂起之前正在做的工作。这很重要，因为当我们收回控制权时，`await` 之后的代码中的语句可能会在不同的线程上运行。在代码清单\
  \ 2-10 中，这意味着第一个 `print` 语句可能在一个线程上运行，而第二个 `print` 语句可能在一个完全不同的线程上运行。使用 `async/await`\
  \ 并不能免除你在主线程上执行 UI 工作的责任，因此如果你需要更新 UI，你需要将该工作延期到主线程。在实践中，这是通过一个名为 `@MainActor` 的全局参与者来完成的。我们将在后面的章节中详细讨论全局参与者。\n\
  \n有了所有这些理论基础，我们现在可以动手实践了。我们将重写基于闭包的代码，改用 `async/await`。\n\n\n\n### 使用 `async/await`\n\
  \n苹果所有基于闭包的并发 API 都提供了 `async/await` 版本，可在 iOS 15 及更高版本中使用。虽然使用 Xcode 13.3 可以在低至\
  \ iOS 13 的系统上使用 `async/await`，但苹果原生支持 `async/await` 的 API 仅适用于 iOS 15 及以上版本。\n\n\
  现在我们将开始把所有基于闭包的代码迁移到 `async/await`。你可以从“第 2 章 - 社交媒体应用 (Async-Await)”下载已完成的项目。\n\
  \n让我们从 `Shared ➤ API ➤ UserAPI.swift` 文件开始。\n\n首先迁移 `fetchUserInfo(completionHandler:)`。因此，使用代码清单\
  \ 2-11 中的签名创建新函数。\n\n```\nfunc fetchUserInfo() async throws -> UserInfo {\n}\n代码清单\
  \ 2-11\nfetchUserInfo 的 async/await 版本的基本签名\n```\n\n代码清单 2-11 中的函数可以标记为 `throws`。通常，如果你要建模可以抛出错误或返回有效值的代码，只需将方法标记为\
  \ `throws`，然后将结果类型分配为调用成功时返回的对象。本质上，原完成处理程序闭包的内容已被重新组织到函数签名中。\n\n你可以立即看出 `async/await`\
  \ 帮助我们编写更具语义性的代码。在 Swift 中，我们可以从函数中抛出错误，但令人惊讶的是，许多开发者并不这样编写代码。这是因为大多数非琐碎的应用程序本质上是并发的（例如，使用网络调用），而且由于我们无法以惯用方式处理闭包中的错误，唯一的解决方案是将错误作为闭包的一部分返回。有了\
  \ `async/await`，我们的函数签名更具可读性，因此也更具自文档性。\n\n现在，我们将使用苹果在 iOS 15 中提供的第一个 `async/await`\
  \ API。\n\n所有返回数据的 `URLSession` 方法都有 `async/await` 变体。在代码清单 2-12 中，我们将实现返回用户信息 JSON\
  \ 为 `Data` 的逻辑。\n\n```\nfunc fetchUserInfo() async throws -> UserInfo {\nlet url\
  \ = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json\"\
  )!\nlet session = URLSession.shared\nlet (userInfoData, response) = try await session.data(from:\
  \ url)\n}\n代码清单 2-12\n使用 async/await 进行网络调用\n```\n\n目前一切顺利，但这段代码还不能编译，因为我们没有返回任何内容。我希望你注意到，调用\
  \ `session.data(from:)` 根本不需要闭包。你也不再需要调用 `resume()`——一旦你调用 `data(from:)` 的异步版本，任务就会开始。\n\
  \n现在我们需要将 JSON 解析为 API 消费者可以使用的对象。代码清单 2-13 将完成该方法，包括 JSON 解析并返回值。\n\n```\nfunc\
  \ fetchUserInfo() async throws -> UserInfo {\nlet url = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json\"\
  )!\nlet session = URLSession.shared\nlet (userInfoData, response) = try await session.data(from:\
  \ url)\nlet userInfo = try JSONDecoder().decode(UserInfo.self, from: userInfoData)\n\
  return userInfo\n}\n代码清单 2-13\n发起网络请求、解析结果 JSON 并通过 async/await 代码按顺序返回对象\n```\n\
  \n就是这样。这就是 `fetchUserInfo` 完整的 `async` 版本。我们将一个 15 行的代码块缩减为仅 5 行（尽管在书中很难体会到！）。感谢代码清单\
  \ 2-13，我们才能真正体会到 `async/await` 的优雅。\n\n让我们借此机会，通过这个示例来总结一下目前所学的关于 `async/await`\
  \ 的所有内容。\n\n首先，我们将 `fetchUserInfo` 方法声明为 `async`。请注意，由于 Swift 支持方法重载，`fetchUserInfo()`\
  \ 和 `fetchUserInfo(completionHandler:)` 可以共存。通过将函数标记为 `async`，我们创建了一个并发上下文，在此上下文中我们可以调用其他\
  \ `async` 函数，而调用我们函数的调用者本身也需要处于并发上下文中（要么他们自己也标记为 `async`，要么在 `Task {}` 调用中）。\n\n\
  当执行到达 `let (userInfoData, response) = try await session.data(from: url)` 这一行时，我们的代码被挂起，它正在执行的线程可以自由地去做其他工作——可能与我们的应用程序无关。得益于这种挂起，后续将数据转换为对象的行将不会执行，因为我们依赖于上一行的数据。当\
  \ `session.data(from:)` 完成下载内容后，它会通知系统准备好返回给调用者。系统最终会通过返回并赋值 `(userInfoData, response)`\
  \ 变量来通知你的应用程序。系统返回并且这些变量有了值之后，代码将按照编写的顺序继续执行：解析 JSON，然后将该对象返回给调用者。这是最纯粹的过程式编程。\n\
  \n当然，代码也可能抛出错误。设备可能没有网络连接，或者服务器可能宕机。如果发生错误，你可以直观地预见到会发生什么，因为这与代码不是异步的情况完全相同：`session.data(from:)`\
  \ 会抛出一个错误（符合 `Error` 的对象，因此我们将函数标记为 `throws`），并且所有后续行都不会执行。因此，在此示例中，调用者必须使用 `try`、`try?`\
  \ 或 `try!` 调用 `fetchUserInfo()`（在此情况下，强烈不推荐使用 `try!`）。\n\n如果你理解了以上所有内容，请继续阅读。理解\
  \ `async/await` 在最基本层面上的工作原理对于充分利用其所有特性至关重要，因此如果需要，请随意休息一下。\n\n你可能注意到代码此时在以下行有一个警告：\n\
  \n```\nlet (userInfoData, response) = try await session.data(from: url)\n```\n\n\
  `session.data(from:)` 返回一个元组，因此我们可以将其解构为两个不同的变量。由于你没有使用 `response` 变量，你可以将其替换为下划线（`_`），但我将其放在这里是为了展示，如果\
  \ API 有其他要求（例如需要检查标头，或以不同方式处理 HTTP 状态码），你可以使用这个类型为 `URLResponse` 的变量。你需要将其转换为 `HTTPURLResponse`\
  \ 才能获得任何有意义的信息。\n\n接下来，代码清单 2-14 是获取关注者/关注信息的方法的 `async/await` 版本。\n\n```\nfunc\
  \ fetchFollowingAndFollowers() async throws -> FollowerFollowingInfo {\nlet url\
  \ = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_followers.json\"\
  )!\nlet session = URLSession.shared\nlet (data, _) = try await session.data(from:\
  \ url)\nlet followingFollowers = try JSONDecoder().decode(FollowerFollowingInfo.self,\
  \ from: data)\nreturn followingFollowers\n}\n代码清单 2-14\n获取关注者和正在关注用户的 async/await\
  \ 版本方法\n```\n\n**注意**\n\n有很好的方法可以抽象这些调用并避免代码复用，但这超出了本书的范围。\n\n现在，让我们转到 `Shared ➤\
  \ Views ➤ UserProfileView ➤ UserProfileViewModel.swift`。\n\n代码清单 2-15 首先将 `@MainActor`\
  \ 属性添加到类中。\n\n```\n@MainActor\nclass UserProfileViewModel: ObservableObject {/*..*/}\n\
  代码清单 2-15\n将 @MainActor 全局 Actor 添加到类声明中\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n我们之前简要讨论过全局 Actor，清单 2-15 首次在实际场景中使用了`@MainActor`全局 Actor。这将确保每当属性更新时，都会在主线程上执行。这一点很重要，因为\
  \ SwiftUI 使用 Observable 对象来更新 UI，因此更新它们需要在主线程上完成。\n\n最简单的迁移方法是`authenticateWithBiometrics(completionHandler:)`，因此我们从这个方法开始。Apple\
  \ 也提供了这些 API 的`async`版本。清单 2-16 展示了如何使用`authenticateWithBiometrics`的`async`版本。\n\
  \n```swift\nprivate func authenticateWithBiometrics() async -> Bool {\n    let context\
  \ = LAContext()\n    do {\n        let success = try await context.evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,\
  \ localizedReason: \"To fetch your profile\")\n        return success\n    } catch\
  \ {\n        return false\n    }\n}\n```\n\n这个调用可能会抛出错误，但对于我们 API 的使用者来说，可能没有必要关心这些细节。在这种情况下，如果发生任何错误，将在内部处理，并向调用者返回`false`。因此，我们不会将该方法标记为`throws`。\n\
  \n清单 2-17 将创建`fetchUserInfo`的`async`版本。\n\n```swift\nprivate func fetchUserInfo()\
  \ async {\n    do {\n        let userApi = UserAPI()\n        self.loadingStatus\
  \ = .loading\n        print(\"Beginning data download\")\n        print(\"Downloading\
  \ User info\")\n        self.userInfo = try await userApi.fetchUserInfo()\n    \
  \    print(\"User info downloaded\")\n        self.loadingStatus = .idle\n    }\
  \ catch {\n        self.loadingStatus = .error(error)\n    }\n    print(\"Ending\
  \ function\")\n}\n```\n\n清单 2-17 是一个非常有趣的代码片段。我在这里保留 print 语句只是为了表明它们会按照你编写的顺序打印出来。再次向过程式编程致以微小的敬意。\n\
  \n同样值得注意的是，我们不需要做任何特殊操作就能回到主线程。`self.userInfo`和`self.loadingStatus`的赋值在主线程上运行非常重要，因为它们直接与\
  \ UI 相关联。因为我们将类标记为`@MainActor`，所以所有对属性的更新都将在主线程上运行。如果你没有将整个类标记为`@MainActor`，也可以仅将此方法标记为`@MainActor`。\n\
  \n让我们继续往下进行。我们现在将编写`fetchFollowingFollowers()`的`async`版本。清单 2-18 提供了这样的实现。\n\n```swift\n\
  private func fetchFollowingFollowers() async {\n    do {\n        let userApi =\
  \ UserAPI()\n        self.loadingStatus = .loading\n        self.followingFollowersInfo\
  \ = try await userApi.fetchFollowingAndFollowers()\n        self.loadingStatus =\
  \ .idle\n    } catch {\n        self.loadingStatus = .error(error)\n    }\n}\n```\n\
  \n这段代码与`fetchUserInfo`非常相似，因此这里不应该有什么新内容。\n\n最后，我们将创建`authenticateAndFetchProfile()`的`async`版本，它为我们一步步完成所有操作：进行身份验证，如果成功，则获取用户配置文件，然后获取关注者和正在关注的信息。清单\
  \ 2-19 提供了其初始实现。\n\n```swift\nfunc authenticateAndFetchProfile() async {\n    isAuthenticated\
  \ = await authenticateWithBiometrics()\n    if isAuthenticated {\n        await\
  \ fetchUserInfo()\n        await fetchFollowingFollowers()\n    }\n}\n```\n\n这个新方法比原始的`authenticateAndFetchProfile(completionHandler:)`方法短得多。你不仅能欣赏到它的简洁，而且缺少\
  \ completion handler 再次使我们的代码非常易于阅读。我们也不再需要那些烦人的`DispatchQueue.main.async`调用了，这些调用曾使我们的代码嵌套更深，因为`@MainActor`将确保触发\
  \ UI 更新的属性更改在主线程上运行。\n\n我们的方法现在是`async`的，但这意味着在 SwiftUI 中，当按下“Authenticate”按钮时，我们将需要使用`Task`。打开`Shared\
  \ ➤ Views ➤ UserProfileView ➤ UserProfileView.swift`，找到“Authenticate”按钮（第 52 行），并将对`viewModel.authenticateAndFetchProfile()`的调用包装在一个`Task`中。清单\
  \ 2-20 展示了如何实现。\n\n```swift\nButton {\n    Task {\n        await viewModel.authenticateAndFetchProfile()\n\
  \    }\n} label: {\n    if viewModel.availableBiometricType == .none {\n       \
  \ Text(\"Authenticate\")\n    } else {\n        Label {\n            Text(\"Authenticate\"\
  )\n        } icon: {\n            Image(systemName: imageNameForBiometricType(viewModel.availableBiometricType))\n\
  \        }\n    }\n}\n.buttonStyle(.borderedProminent)\n```\n\n由于 SwiftUI 本身不在异步上下文中运行，因此为每个需要异步功能的地方创建一个异步上下文非常重要。在这种情况下，`authenticateAndFetchProfile()`是一个异步任务。\n\
  \n我们快完成了，但在结束之前，你可能已经注意到我们的`fetchUserProfile()`和`fetchFollowingFollowers()`的`async`版本非常相似。在这种特定情况下，我们可以通过完全删除这两个函数并将其内容移动到`authenticateAndFetchProfile()`中来进一步减少代码。清单\
  \ 2-21 为`authenticateAndFetchProfile()`提供了一个新版本，该版本会比原始版本稍长，但对我们来说更有意义，因为它消除了两个多余的方法。\n\
  \n```swift\nfunc authenticateAndFetchProfile() async {\n    isAuthenticated = await\
  \ authenticateWithBiometrics()\n    if isAuthenticated {\n        do {\n       \
  \     let userApi = UserAPI()\n            loadingStatus = .loading\n          \
  \  userInfo = try await userApi.fetchUserInfo()\n            followingFollowersInfo\
  \ = try await userApi.fetchFollowingAndFollowers()\n            self.loadingStatus\
  \ = .idle\n        } catch {\n            loadingStatus = .error(error)\n      \
  \  }\n    }\n}\n```\n\n缺少 completion handler 使我们能够用一行代码获取用户配置文件以及关注者和正在关注的数据。正因为如此，我们可以删除为此目的而创建的函数。\n\
  \n我们完成了！我们已经将所有基于 completion handler 的代码转换为`async/await`。请记住，在本例中，这样做非常容易，因为我们的应用很小。有一些技术可以用于加速更大项目中的迁移，我们将在下一章讨论*Continuations*时探讨这些技术。\n\
  \n### async get 属性\n\n`async/await`不仅限于函数调用。你还可以在只读计算属性中使用它。清单 2-22 展示了如何实现，但我们不会在我们的社交媒体应用中使用它。\n\
  \n```swift\nvar userInfo: UserInfo {\n    get async throws {\n        let url =\
  \ URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json\"\
  )!\n        let session = URLSession.shared\n        let (userInfoData, _) = try\
  \ await session.data(from: url)\n        let userInfo = try JSONDecoder().decode(UserInfo.self,\
  \ from: userInfoData)\n        return userInfo\n    }\n}\n```\n\n在清单 2-22 中，我们声明了一个既可以是`async`又可以是`throws`的属性。通常，我不建议你使用这个特性，除非你实现某种缓存机制。否则，你\
  \ API 的使用者访问该属性的频率可能会远高于预期，这将导致他们的应用出现显著的延迟。在某些情况下，避免使用缓存机制可能是合理的，但你需要在具体情况下进行分析。\n\
  \n\n\n### iOS 13 和 iOS 14 中的 async/await\n\n此前，我们提到虽然 `async/await` 机制在 iOS 13 和\
  \ iOS 14 上能够运行，但苹果并没有提供任何以此标识的 API。这意味着，仔细想想，在这些版本中你其实无法对任何东西使用 `async/await`。你可能会疑惑，既然苹果在这些版本中根本没有提供任何\
  \ `async/await` 的 API，那么支持这个功能又有什么意义呢？如果你需要支持这些版本，我将在下一章讨论*续体*时，教你一个小技巧，让你能够获得那些方法的\
  \ `async/await` 版本。\n\n### 本章小结\n\n在本章中，你学习了如何使用 `async/await` 机制的基本构建块，也就是该机制名称所源自的那些关键字。为了充分运用这个新系统的所有特性，理解\
  \ `async` 和 `await` 如何协同工作至关重要。\n\n我们还解释了基于闭包的并发与 `async/await` 之间的主要区别。我们展示了这个机制如何与挂起操作配合，以及这些挂起操作的行为与我们通常在完成处理器或闭包中看到的有何不同。\n\
  \n## 练习\n\n**编程练习**\n\n下载“Chapter 2 Exercise”项目。这是一个 HealthKit 项目，它从“健康”App 读取数据并显示在应用中。该应用目前使用的是基于闭包的调用。完成此练习无需深入了解\
  \ HealthKit。\n\n1.  重构 `HealthManager` 类（位于 `HealthManager.swift` 文件中），使其使用 `async/await`\
