- '# 开始之前


  尽管苹果成功将新的并发系统向后兼容至 iOS 13 和 iOS 14，但仍建议您在 iOS 15 环境下学习该系统。在较低版本的 iOS 中，没有原生 API
  支持 `async/await`，每当您想使用这些功能时，都需要提供替代方案。


  建议您至少使用 Xcode 13，但如果可能，请尽量使用最新版本。撰写本文时，最新 Xcode 版本为 13.4.1。所有练习和示例代码均在该 Xcode 版本上测试通过。这意味着您的
  Mac 需要运行 macOS Monterey，因为 Xcode 13 无法在低于 Monterey 的系统上运行。


