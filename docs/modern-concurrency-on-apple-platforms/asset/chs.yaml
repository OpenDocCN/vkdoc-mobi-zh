  \ 中手动添加数据。而你的 iPhone 很可能已经存有这些信息。\n\n"
- "# 3. 续体\n\n在上一章中，我们学习了 `async` 和 `await` 关键字，从而开始接触 Swift 中的新并发系统。我们将一个使用基于闭包调用的项目迁移到了\
  \ `async/await` 代码中。我们通过重写方法的原始实现来使其适应新系统。但在实际工作中，由于时间限制，或者更糟糕的技术难题，你可能无法从头编写这样的实现。针对这些情况，我们有*续体*，它允许你将现有的基于闭包的调用“封装”成\
  \ `async/await` 形式——甚至包括基于委托的调用！\n\n续体非常有用，因为借助它，你不仅能为自己的基于闭包的代码提供 `async/await`\
  \ 版本，还能为第三方库和框架提供相应版本。这将帮助你创建一致的代码库，在合理的情况下，只使用 `async/await` 而不是基于闭包的调用。\n\n**注意**\n\
  并非所有基于闭包的代码都必然与并发和/或多线程有关。在 Swift 和苹果的 SDK 中，有许多接受闭包的调用与并发完全无关。例如，集合常用的方法 `filter`、`map`\
  \ 和 `reduce`，它们接受闭包来操作集合元素。请记住这一点，因为项目中完全不含任何闭包是很难做到的，而这也是正常的。`async/await` 的目标只是消除与并发任务相关的基于闭包的调用。\n\
  \n## 理解续体\n\n我们在前面的章节中已经简要接触过*续体*的概念，本章将继续沿用相同的含义进行讲解。\n\n简而言之，*续体*就是指在 `async`\
  \ 调用完成后发生的事情。当我们使用 `async/await` 时，续体就是 `await` 调用下面的所有代码。如果你使用的是基于闭包的代码，续体就是写在完成处理器中的代码。而如果你使用的是基于委托的代码，续体就是某个操作完成后可以调用的任何方法，例如原始的\
  \ `UIImagePickerController` 的 `imagePickerController(didFinishPickingMediaWithInfo:)`\
  \ 方法。\n\n新的并发系统允许我们将基于闭包代码形式甚至是基于委托代码形式的续体“转换”为 `async/await` 形式。\n\n为了更好地理解这个简短但重要的概念，我们将回到社交媒体应用的原始版本。我们将使用那个没有\
  \ `async/await` 的版本来阐述这个概念。\n\n\n\n### 将基于闭包的调用转换为 async/await\n\n打开 `Shared ➤ API\
  \ ➤ UserAPI.swift` 文件。查看 `fetchUserInfo(completionHandler:)` 方法。为了方便起见，代码清单 3-1\
  \ 展示了其原始实现。\n\n```\nfunc fetchUserInfo(\ncompletionHandler: @escaping (_ userInfo:\
  \ UserInfo?, _ error: Error?) -> Void\n) {\nlet url = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json\"\
  )!\nlet session = URLSession.shared\nlet dataTask = session.dataTask(with: url)\
  \ { data, response, error in\nif let error = error {\ncompletionHandler(nil, error)\n\
  } else if let data = data {\ndo {\nlet userInfo = try JSONDecoder().decode(UserInfo.self,\
  \ from: data)\ncompletionHandler(userInfo, nil)\n} catch {\ncompletionHandler(nil,\
  \ error)\n}\n}\n}\ndataTask.resume()\n}\n代码清单 3-1\nfetchUserInfo(completionHandler:)\
  \ 的原始实现\n```\n\n你可以为该方法提供一个 `async/await` 版本，而无需像我们在第 2 章中那样从头重新实现它。这样做的一个缺点是你无法删除这个原始实现。优点是保留原始实现并没什么不好，因为对于那些尚不打算采用\
  \ `async/await` 的代码库，你始终可以保留基于闭包的调用。代码清单 3-2 展示了我们如何在不重写代码的情况下提供该方法的 `async/await`\
  \ 版本。\n\n```\nfunc fechUserInfo() async throws -> UserInfo {\n// (1)\ntry await\
  \ withCheckedThrowingContinuation { continuation in\n// (2)\nfetchUserInfo { userInfo,\
  \ error in\n// (3)\nif let userInfo = userInfo {\ncontinuation.resume(returning:\
  \ userInfo)\n} else if let error = error {\ncontinuation.resume(throwing: error)\n\
  } else {\n// 抛出一个通用错误。\nlet nsError = NSError(domain: \"com.socialmedia.app\", code:\
  \ 400)\ncontinuation.resume(throwing: nsError)\n}\n}\n}\n}\n代码清单 3-2\n使用 withCheckedThrowingContinuation\n\
  ```\n\n代码清单 3-2 本质上将基于闭包的代码包装在一个*受检查的续体（Checked Continuation）*中。`withCheckedThrowingContinuation`\
  \ —— 以及我们稍后会探讨的其他变体 —— 是一个方法，它为闭包提供了一个参数。它提供的参数就是实际的续体，当你的异步闭包调用完成时，你有责任恢复（resume）该续体。在代码清单\
  \ 3-1 中，续体的类型是 `CheckedContinuation<T, E>`，这意味着我们可以用对象或错误来恢复续体。这完全合理，因为任何涉及网络调用的操作都可能失败。\n\
  \n让我们逐步解析代码清单 3-2：\n\n* `(1)` 将调用 `withCheckedThrowingContinuation`。这是一个可以抛出错误的\
  \ `async` 函数。因此，我们用 `try await` 来调用它，并且函数签名与我们在第 2 章中看到的该代码的异步版本类似。调用此方法时，我们需要传递给它一个闭包，该闭包会提供一个续体对象，我们需要在操作完成后恢复它。\n\
  \n* `(2)` 将像在其他任何上下文中一样，调用基于闭包的 `fetchUserInfo(completionHandler:)` 版本。\n\n* `(3)`\
  \ 是魔法发生的地方。如果 `fetchUserInfo(completionHandler:)` 成功完成并且我们得到了一个 `UserInfo` 对象，我们将通过调用\
  \ `continuation.resume(returning: userInfo)` 来恢复续体。如果收到错误，我们将调用 `continuation.resume(throwing:\
  \ error)`。当调用 `continuation.resume(returning:)` 方法时，它会导致 `async` 版本 `fetchUserInfo()`\
  \ 的调用者返回结果对象；而调用 `continuation.resume(throwing:)` 则会导致它抛出错误。最终，代码清单 3-2 中方法的调用者，其行为将完全等同于第\
  \ 2 章中代码清单 2-10 的调用者。请记住，使用续体时，你**必须**在某个时间点且**恰好**调用一次续体。你不能忘记调用它，也不能多次调用它。如果忘记调用，程序将陷入死锁状态。\n\
  \n除了 `withCheckedThrowingContinuation` 之外，我们还有另外三个方法可用于创建此类续体：\n\n* `withCheckedContinuation`\n\
  * `withUnsafeThrowingContinuation`\n* `withUnsafeContinuation`\n\n当原始的基于闭包的代码不会返回任何类型的错误时，请使用\
  \ `withCheckedContinuation`。\n\n非安全变体 —— `withUnsafeThrowingContinuation` 和 `withUnsafeContinuation`\
  \ —— 类似于它们对应的受检查版本。主要区别在于，使用受检查续体时，Swift 会在检测到违规行为（例如多次调用续体或完全忘记调用续体）时记录错误，从而帮助你进行保护。非安全续体不具备这些特性，但它们的速度可能稍快。总的来说，我不建议你使用非安全续体，但要知道在大多数情况下你可以互换使用它们。\n\
  \n### 将基于委托的代码转换为 async/await\n\n将基于委托的代码转换为 `async/await` 是一个更复杂的过程，因为这类 API 可能会根据发生的事件类型来调用不同的委托方法。这自然会产生“跳转性”很强的代码。虽然这些调用可能发生在同一线程上，但由于它们调用方法的方式，结果可能难以预测。例如，*ContactsUI*\
  \ 框架提供了一个 `CNContactPickerViewController` 对象，当用户在一个方法中选择联系人时，它会通知你；如果用户取消了选择，则会调用另一个不同的方法。\n\
  \n针对本节内容，请下载“第 3 章 - 联系人选择器（基础项目）”项目。\n\n\n\n#### `ContactPicker` 项目\n\n该项目非常简单（图\
  \ 3-1）。它由一个顶部标签构成，标签上显示静态提示文字\"Select a Contact\"。在其下方有一个按钮\"Select Contact\"，点击该按钮会弹出一个\
  \ `CNContactPickerViewController`，用户可使用它来选择联系人。一旦选中联系人，按钮下方会出现一个新标签，以黑色文字显示联系人的姓名。如果用户取消操作，该标签将变为红色，并显示文字\"\
  Cancelled\"。\n\n![](img/532302_1_En_3_Fig1_HTML.png)\n\n屏幕截图展示了联系人选择器，其中包含 Wi-Fi、满格电池和\
  \ 9:06 时间等标签，以及格式、选择联系人、选择联系人按钮下方和 John Appleseed。\n\n图 3-1\n\n`ContactPicker` 应用\n\
  \n打开 `ViewController.swift` 文件。本例的核心在于清单 3-3 中的方法。\n\n```\nfunc contactPickerDidCancel(_\
  \ picker: CNContactPickerViewController) {\n    selectedContactLabel.text = \"Cancelled\"\
  \n    selectedContactLabel.textColor = .red\n    selectedContactLabel.isHidden =\
  \ false\n}\n\nfunc contactPicker(_ picker: CNContactPickerViewController, didSelect\
  \ contact: CNContact) {\n    let nameFormatter = CNContactFormatter()\n    nameFormatter.style\
  \ = .fullName\n    let contactName = nameFormatter.string(from: contact)\n    selectedContactLabel.text\
  \ = contactName\n    selectedContactLabel.textColor = .black\n    selectedContactLabel.isHidden\
  \ = false\n}\n```\n\n清单 3-3  \n`CNContactPickerViewController` 委托方法\n\n当点击\"Select\
  \ Contact\"按钮时，将调用 `promptContact()` 方法。该方法会创建、配置并显示一个 `CNContactPickerDelegate`。如果用户取消操作，将调用\
  \ `contactPickerDidCancel(_)` 方法，将标签设置为红色并显示文字\"Cancelled\"。如果用户选择联系人，则会调用 `contactPicker(_:didSelect)`\
  \ 方法，将标签文本设置为联系人姓名，颜色设置为黑色。这是一个简单的例子，但它说明了基于委托的调用方式的复杂性。\n\n基于委托的 API 可能非常杂乱，尤其是当它们有很多可能的调用方法时。通过创建一个围绕\
  \ `CNContactPickerViewControllerDelegate` 及其方法的包装对象，我们可以为调用方创建一个更简洁的 API。\n\n####\
  \ 将基于委托的调用包装到 async/await 替代方案中\n\n现在，我们将继续创建这样一个包装器。我们将修改\"第 3 章 - ContactPicker\
  \ (基础项目)\"项目。您可以下载\"第 3 章 - ContactPicker (Async-Await)\"项目来查看最终结果。\n\n我们的任务是将清单\
  \ 3-4 中所示的 `promptContact()` 的当前实现替换为清单 3-5 中的新实现，并在此过程中移除 `ViewController` 中所有与联系人选择逻辑相关的代码，例如委托遵循声明和委托方法。\n\
  \n```\nfunc promptContact() {\n    async {\n        let contactPicker = ContactPicker(viewController:\
  \ self)\n        if let contact = await contactPicker.pickContact() {\n        \
  \    // 已选择联系人…\n        } else {\n            // 选择已取消…\n        }\n    }\n}\n\
  ```\n\n清单 3-5  \n`promptContact()` 的新实现\n\n```\nfunc promptContact() {\n    let\
  \ picker = CNContactPickerViewController()\n    picker.delegate = self\n    picker.displayedPropertyKeys\
  \ = [CNContactGivenNameKey, CNContactNamePrefixKey, CNContactNameSuffixKey]\n  \
  \  present(picker, animated: true)\n}\n```\n\n清单 3-4  \n`promptContact()` 的原始实现\n\
  \n在清单 3-5 中，我们安全地解包了一个可选值，因为如果用户点击取消而没有选择联系人，我们将没有要显示的联系人信息。您也可以选择在用户取消选择时抛出一个错误，但由于这是该项目中唯一可能的失败原因，因此我们不会使用错误。\n\
  \n我们将从创建一个新对象开始。创建一个新文件 `ContactPicker.swift`，并添加清单 3-6 中的代码。\n\n```\nimport Foundation\n\
  import ContactsUI\n\nclass ContactPicker: NSObject, CNContactPickerDelegate {\n\n\
  }\n```\n\n清单 3-6  \n`ContactPicker` 的起始代码\n\n我们将使用此对象来封装联系人选择器的所有逻辑。它将负责显示联系人选择器\
  \ UI 并将结果返回给我们。\n\n接下来，我们需要基本属性以及一个用于引用延续类型的类型别名，如清单 3-7 所示。\n\n```\nprivate typealias\
  \ ContactCheckedContinuation = CheckedContinuation<CNContact?, Never>\nprivate unowned\
  \ var viewController: UIViewController\nprivate var contactContinuation: ContactCheckedContinuation?\n\
  private var picker: CNContactPickerViewController\n```\n\n清单 3-7  \n基本属性\n\n`viewController`\
  \ 属性将用于呈现 UI。我们需要存储 `picker`，以便在调用 `promptPicker()` 时显示它。最后，由于有两种不同的委托方法，我们需要存储检查后的延续，以便在任一委托方法被调用时可以引用它。\n\
  \n初始化器应接受将要呈现选择器的视图控制器。清单 3-8 包含了初始化器的实现。\n\n```\ninit(viewController: UIViewController)\
  \ {\n    self.viewController = viewController\n    picker = CNContactPickerViewController()\n\
  \    super.init()\n    picker.delegate = self\n}\n```\n\n清单 3-8  \n`ContactPicker`\
  \ 的初始化器\n\n初始化器接受一个属性（负责显示选择器的 `ViewController`）。选择器是内部的，因此无需暴露它。我们将在 `promptContact()`\
  \ 被点击时初始化延续。\n\n`promptContact()` 有一个非常有趣的实现。清单 3-9 展示了使该方法正常工作所需的代码。\n\n```\n@MainActor\n\
  func pickContact() async -> CNContact? {\n    viewController.present(picker, animated:\
  \ true)\n    return await withCheckedContinuation({ (continuation: ContactCheckedContinuation)\
  \ in\n        self.contactContinuation = continuation\n    })\n}\n```\n\n清单 3-9\
  \  \n`pickContact()` 的异步版本\n\n\n\n我们仅将此方法标记为 `@MainActor`，而非整个类。这是因为 `ContactPicker`\
  \ 类可能在不同线程中执行各种不同操作，但我们只关心此方法中的 `MainActor`，因为它通过模态展示联系人选择器与 UI 交互。\n\n`withCheckedContinuation`\
  \ 的方法体仅将 continuation 赋值给我们的 `contactContinuation` 属性。再次说明，我们需要以某种方式存储 continuation，因为我们可能从两个不同的委托方法中恢复它。\n\
  \n列表 3-10 将实现我们需要的委托方法：`contactPicker(_:didSelect)` 和 `contactPickerDidCancel(_)`。\n\
  \n```swift\n@MainActor\nfunc contactPicker(_ picker: CNContactPickerViewController,\
  \ didSelect contact: CNContact) {\ncontactContinuation?.resume(returning: contact)\n\
  contactContinuation = nil\npicker.dismiss(animated: true, completion: nil)\n}\n\
  @MainActor\nfunc contactPickerDidCancel(_ picker: CNContactPickerViewController)\
  \ {\ncontactContinuation?.resume(returning: nil)\ncontactContinuation = nil\n}\n\
  列表 3-10\n从两个不同的委托方法中恢复 continuation\n```\n\n这些方法非常直接。两个方法都会恢复 continuation，选择联系人时传递联系人，未选择联系人（选择被取消）时传递\
  \ `nil`。在恢复后将 `contactContinuation` 属性赋值为 `nil`，可确保我们无法多次调用 continuation。\n\n我们已经完成了\
  \ `ContactPicker` 类的实现，现在需要回到 `ViewController`。你可以移除 `CNContactPickerDelegate` 的遵循及其相关的委托方法。你还可以用列表\
  \ 3-11 中的代码替换 `promptContact()` 的实现。\n\n```swift\nfunc promptContact() {\nTask {\n\
  let contactPicker = ContactPicker(viewController: self)\nif let contact = await\
  \ contactPicker.pickContact() {\nlet nameFormatter = CNContactFormatter()\nnameFormatter.style\
  \ = .fullName\nlet contactName = nameFormatter.string(from: contact)\nselectedContactLabel.text\
  \ = contactName\nselectedContactLabel.textColor = .black\nselectedContactLabel.isHidden\
  \ = false\n} else {\nselectedContactLabel.text = \"Cancelled\"\nselectedContactLabel.textColor\
  \ = .red\nselectedContactLabel.isHidden = false\n}\n}\n}\n列表 3-11\n`pickContact()`\
  \ 的最终实现\n```\n\n现在 `ViewController` 明显更简洁了。点击“选择联系人”按钮的行为应与我们将其全部改为使用 `async/await`\
  \ 之前完全一致。\n\n注意\n\n尽管我们成功为基于委托的调用提供了 `async/await` 版本，这很不错，但你应该考虑这样做是否 *真的* 有必要。有时，基于委托的调用（如\
  \ CoreBluetooth、Core Location）的复杂性并不值得为它们提供 `async/await` 版本。话虽如此，通过练习来更好地理解 continuation\
  \ 的工作方式，也是一项很好的训练。\n\n### 在 iOS 13 和 14 中支持 async/await\n\n我们之前提过这一点，但值得再次强调：虽然使用\
  \ Xcode 13.3 可以使用 `async/await`，但除非你使用 iOS 15 SDK 或更高版本编译，否则 Apple 不提供任何使用它们的 API。\n\
  \n如果你打开第 2 章中我们的社交媒体应用的 `async/await` 版本（如果没有，可以下载“第 2 章 - 社交媒体应用 (Async-Await)(iOS\
  \ 14)”），并将部署目标版本更改为 iOS 13 或 iOS 14，你会看到项目无法再编译。大多数错误与不存在的 `async` 方法有关。图 3-2 显示了\
  \ Xcode 显示的报错。\n\n![](img/532302_1_En_3_Fig2_HTML.jpg)\n\n一张截图显示了 iOS 第二章社交媒体应用中的四个问题，其中\
  \ Swift 编译器错误、Data、AsyncImage 和 bordered prominent 仅适用于 iOS 15.0 或更高版本。\n\n图 3-2\n\
  \n我们无法在 iOS 14 及更低版本中使用 `async/await`\n\nXcode 的建议——直接使用可用性检查——理论上听起来不错，但如果你让 Xcode\
  \ 为你修复，项目状态会比现在更糟。因为它会将所有 `async` 调用包裹在可用性检查中，在你成功运行项目后，它在 iOS 13 和 iOS 14 中将 *什么都不做*。\n\
  \n解决方案是使用可用性检查，但在 `URLSession` 和 `LAContext` 的扩展中。我们将在不触及 `UserAPI` 和 `UserProfileViewModel`\
  \ 的情况下修复此项目。稍后我们需要修复一些 SwiftUI 问题，但我们无需改动逻辑代码，从而可以轻松添加 `async/await` 代码而不会破坏任何功能。你也可以下载完整修复后的项目，名为“第\
  \ 2 章 - 社交媒体应用 (Async-Await)(iOS 14)(已修复)”。\n\n首先，在“Shared”文件夹内创建一个文件夹或组，命名为“Extensions”。然后在该组内，创建一个新文件，命名为“LAContext+Extensions.swift”。其内容如列表\
  \ 3-12 所示。\n\n```swift\nextension LAContext {\n@available(iOS, introduced: 13, deprecated:\
  \ 15, message: \"该方法不再必要。请使用 iOS 15 中可用的 API。\")\nfunc evaluatePolicy(_ policy:\
  \ LAPolicy, localizedReason: String) async throws -> Bool {\ntry await withCheckedThrowingContinuation({\
  \ continuation in\nself.evaluatePolicy(policy, localizedReason: localizedReason)\
  \ { success, error in\nif let error = error {\ncontinuation.resume(throwing: error)\n\
  } else {\ncontinuation.resume(returning: success)\n}\n}\n})\n}\n}\n列表 3-12\n将 evaluatePolicy(_:localizedReason)\
  \ async 向后移植到 iOS 14\n```\n\n`@available` 检查将确保这段代码只能在 iOS 13 和 iOS 14 上运行。更旧的 iOS\
  \ 版本不支持 `async/await`，因此我们将它们完全排除。当部署目标为 iOS 15 时，我们会收到一条警告：“该方法不再必要。请使用 iOS 15\
  \ 中可用的 API。”当我们开始以 iOS 15 为目标时，就可以完全移除此扩展，代码无需做任何进一步更改即可正常运行。\n\n这里的 continuation\
  \ 使我们能够将基于闭包的调用平滑转换为 SDK 中已有的 `async/await` 调用，但仅限于以 iOS 15 及以上版本为目标时。我们不是返回错误，而是将此方法转换为一个可抛出错误的方法。\n\
  \n在图 3-3 中，我们看到警告生效，提示我们在低于 iOS 15 的模拟器上运行时更新代码。你可能需要清理构建文件夹并重新编译以使警告显示：\n\n![](img/532302_1_En_3_Fig3_HTML.jpg)\n\
  \n一张截图展示了 iOS 社交媒体应用中发现的三个问题，其中 Deprecation 和 evaluate policy 已在 iOS 15 中弃用，警告为使用\
  \ iOS 15 中可用的 API。\n\n图 3-3\n\n\n\n警告在`@available`检查中，提醒我们更新代码。\n\n接下来，我们需要在`URLSession`中提供`data(from:)`方法。进入“Shared”➤“Extensions”目录，创建一个名为“URLSession+Extensions.swift”的文件，代码如清单\
  \ 3-13 所示。\n\n```swift\nextension URLSession {\n@available(iOS, introduced: 13,\
  \ deprecated: 15, message: \"This method is no longer necessary. Use the API available\
  \ in iOS 15.\")\nfunc data(from url: URL) async throws -> (Data, URLResponse) {\n\
  try await withCheckedThrowingContinuation({ continuation in\nself.dataTask(with:\
  \ url) { data, response, error in\nif let error = error {\ncontinuation.resume(throwing:\
  \ error)\n} else {\ncontinuation.resume(returning: (data!, response!))\n}\n}\n.resume()\n\
  })\n}\n}\n```\n*清单 3-13 将`data(from:)`方法向后兼容至 iOS 13 和 iOS 14*\n\n这段代码与清单 3-13 中的代码没有太大区别。也许最有趣的部分是返回类型是一个`(Data,\
  \ Response)`类型的元组，但总的来说，将这个方法暴露给 iOS 14 和 iOS 13 并不复杂。请注意，我们强制解包了返回的`data`和`response`属性。我们这样做是因为，如果你查看\
  \ API 原始的异步签名，它们在元组中并未标记为可选值，因此可以安全地假设，如果没有收到错误，这两个变量将具有非 nil 值。如果你对此有疑问，可以随意将元组元素标记为可选值。\n\
  \n如果现在尝试编译项目，我们仍然会收到两个错误，但这些错误与`async/await`不再有任何关系。我们需要修复的错误位于`UserProfileView`中，因此打开“UserProfileView.swift”文件。\n\
  \n第一个错误提示在低于 iOS 15 的版本中没有`AsyncImage`。我们可以为网络图片提供自己的实现，但这超出了本书的范围。相反，当在低于 iOS 15\
  \ 的版本上运行时，我们将提供一个简单的蓝色圆形。此错误的修复方法见清单 3-14。\n\n```swift\nif #available(iOS 15.0,\
  \ *) {\nAsyncImage(url: userInfo.avatarUrl)\n.frame(width: 150, height: 150)\n.aspectRatio(contentMode:\
  \ .fit)\n.clipShape(Circle())\n} else {\nCircle()\n.frame(width: 150, height: 150)\n\
  .foregroundColor(.white)\n}\n```\n*清单 3-14 为不在 iOS 15 上的设备创建替代视图*\n\n最后，我们需要修复的最后一个错误与\
  \ iOS 15 中引入的按钮突出样式有关。最简单的修复方法是从`UserProfileView`中删除`.buttonStyle(.borderedProminent)`这一行。\n\
  \n就这样！你已经成功地将两个在 iOS 14 中不存在且是 iOS 15 原生支持的异步调用进行了向后兼容，如果你现在尝试编译应用程序，它应该没有问题地运行。如果你想测试\
  \ iOS 14 和 iOS 13 的兼容性，请确保在安装了这些 iOS 版本的模拟器中运行。如果没有，你可以转到 Xcode 的“Window”菜单，接着选择“Organizer”，然后在那里添加具有不同\
  \ iOS 版本的新模拟器。\n\n请注意，不幸的是，你不能免费将所有`async/await`代码自动向后兼容到 iOS 14 及更低版本。你需要手动创建扩展并手写`continuation`方法。如果你有大量基于闭包且希望向后兼容的代码，请记住这一点。\n\
  \n## 总结\n\n在本章中，我们探讨了什么是`continuation`，并学习了如何使用它们将基于闭包的代码转换为`async/await`代码，而无需从头开始为意图替换的方法编写新实现。我们还学习了如何通过围绕委托方法创建包装器对象，为那些使用委托的调用提供异步\
  \ API。最后，我们学习了如何使用`continuation`将`async/await`代码向后兼容到 iOS 14 和 iOS 13——我们不能兼容到更低版本，因为此功能仅在\
  \ iOS 13、14 和 15 上可用。\n\n## 练习\n\n### 编程练习\n\n下载“第 2 章练习”项目（我们在第 2 章中使用的同一个基础项目）。\n\
  \n1.  使用`checked continuation`为`requestPermissions`和`requestData`函数提供`async/await`版本。你不应删除原始实现。\n\
  \n2.  修改`ContentViewViewModel.swift`的实现，使其使用这些方法的`async/await`版本，而不是基于闭包的版本。\n\n\
  解决方案可以在“第 2 章练习 - 已解决 Continuation”项目中找到。\n\n"
- "# 4. 结构化并发\n\n到目前为止，我们已经详细讨论了`async/await`是什么以及它是如何工作的。我们已经看到这个新工具如何帮助我们编写类似于过程式编程的结构化代码，因为我们可以摆脱其他类型的回调（如闭包和委托），这些回调破坏了代码的线性可读性。但我们已经看到，所有这些代码实际上并没有同时、并发或以多线程方式运行。\n\
  \n考虑我们在第 2 章（清单 4-1）中编写的社交媒体应用中的`authenticateAndFetchProfile`方法的异步版本。\n\n```swift\n\
  func authenticateAndFetchProfile() async {\nisAuthenticated = await authenticateWithBiometrics()\n\
  if isAuthenticated {\ndo {\nlet userApi = UserAPI()\nloadingStatus = .loading\n\
  userInfo = try await userApi.fetchUserInfo()\nfollowingFollowersInfo = try await\
  \ userApi.fetchFollowingAndFollowers()\nself.loadingStatus = .idle\n} catch {\n\
  loadingStatus = .error(error)\n}\n}\n}\n```\n*清单 4-1 `authenticateAndFetchProfile`的异步版本*\n\
  \n这个方法有三个异步调用，但并非所有调用同时执行。事实上，我们*需要*生物识别操作完成，才能下载任何要显示的信息。下载个人资料信息和关注者*依赖于*身份验证成功。目前，该函数经过三个基本步骤：\n\
  \n1.  使用生物识别进行身份验证。\n\n2.  下载个人资料信息。\n\n3.  下载关注者和关注用户信息。\n\n这两个下载操作都依赖于身份验证，但除此之外，它们彼此完全独立，如果愿意，我们可以同时执行它们。在本章中，我们将开始同时执行多个任务。\n\
  \n注意\n\n在第 1 章中，我们将并发定义为“一个线程（或你的程序）同时处理多件事情的能力。”这严格来说并不意味着同时做多件事，通常，当人们想到并发时，他们真正想到的是多线程或并行。然而，为了与社区赋予该词的含义保持一致，从这一点开始，当我们谈论并发时，我们指的是同时执行多个任务。\n\
  \n\n\n## 理解结构化并发\n\n结构化并发遵循与结构化编程相同的理念。其核心是按照代码预期执行的顺序来编写代码，并看到可预测（或至少半可预测）的结果。与基于闭包的代码不同，变量具有明确定义的作用域，你可以期望代码不会跳转到其他破坏代码阅读流程的地方。这也让你无需操心其他细节，比如内存管理（闭包中捕获的变量会发生什么？闭包能否被持有？`weak\
  \ self`？嗯？）。\n\n而以上这些还仅仅是思考那些非并发的基于闭包的调用时的情况。你能想象你的代码中包含多个基于闭包的并发调用，其中大量独立代码同时运行的情形吗？\n\
  \n有了结构化并发，我们可以让多个代码路径同时运行，并得到可预测的结果，而无需考虑那些在多个基于闭包的调用之间跳转的迷宫般的代码。\n\n新的 `async/await`\
  \ 系统提供了两种实现结构化并发的方式：`async let` 构造体和任务组。\n\n### `async let` 构造体\n\n也称为 *async let\
  \ 绑定*。用这段代码创建你的第一个并发片段简单得令人难以置信。如果你知道如何用 `let` 创建一个常量，那么你就能使用 `async let`。要并发运行代码，你只需要在\
  \ `let` 声明前加上 `async` 关键字。声明的其余部分看起来就像普通的 Swift 变量初始化。请注意，要执行此操作，你必须处于异步上下文中——要么在\
  \ `Task` 内部，要么在标记为 `async` 的函数内。当你的代码在 `async let` 声明中运行时，赋值之后的所有内容都将在其他地方执行（被启动的函数和方法可能会在不同的线程中运行），并且这些任务将并发运行。`async\
  \ let` 任务作为创建它们的任务的子任务被创建。\n\n说到这里，我们可以对代码清单 4-1 做一些修改。我们之前提到过，可以同时获取个人资料信息和关注者及关注用户的数据，因为它们彼此完全独立。我们将创建一个不同的函数来说明\
  \ `async let` 是如何工作的。代码清单 4-2 中的函数创建了一个新函数 `fetchData`，它将并发执行两次网络调用来填充 `UserProfileView`\
  \ 屏幕。\n\n```swift\nfunc fetchData() async throws -> (userInfo: UserInfo, followingFollowersInfo:\
  \ FollowerFollowingInfo) {\n    let userApi = UserAPI()\n    async let userInfo\
  \ = userApi.fetchUserInfo()\n    async let followers = userApi.fetchFollowingAndFollowers()\n\
  \    return (try await userInfo, try await followers)\n}\n```\n\n*代码清单 4-2 — 使用\
  \ `async let` 并发运行代码*\n\n如果你在 `async let` 调用之间插入打印语句，你会看到它们被立即调用。`userInfo` 和 `followers`\
  \ 会同时运行，但代码在即将返回之前会暂停。回想一下，`await` 关键字是一个挂起点，这意味着我们的函数将暂停，直到 `fetchUserInfo` 和 `fetchFollowingAndFollowers`\
  \ 都返回或其中任何一个抛出错误。\n\n你可能还记得，在第 2 章中，我们说过每个 `async` 调用都必须配对一个 `await`。但我们从未说过 `await`\
  \ 必须在同一行。使用 `async let` 时，当你需要作为 `async let` 一部分赋值的变量的值时，才需要使用 `await` 关键字。因此，如果你的\
  \ `async let` 调用返回一个值供另一个函数使用，你就在调用点处 `await`。如果你需要在函数内部并发获取多个值，你可以在 `return` 语句处\
  \ `await`。`async` 调用必须与 `await` 关键字配对的规则并没有被违反。\n\n使用 `async let` 非常有用，你可以在任何地方使用\
  \ `await` 关键字，无论是在单个变量声明中，在等待数组元素时，在返回元组之前（就像我们在代码清单 4-2 中所做的那样），等等。\n\n如果你愿意，可以将函数最后一行代码\
  \ `return (try await userInfo, try await followers)` 改写为 `return try await (userInfo,\
  \ followers)`，这样可以少写一些代码。选择哪种方式纯粹是风格问题。\n\n代码清单 4-3 展示了使用了新的 `fetchData()` 方法的 `authenticateAndFetchProfile()`\
  \ 方法所做的修改：\n\n```swift\nfunc authenticateAndFetchProfile() async {\n    isAuthenticated\
  \ = await authenticateWithBiometrics()\n    if isAuthenticated {\n        do {\n\
  \            loadingStatus = .loading\n            let data = try await fetchData()\n\
  \            userInfo = data.userInfo\n            followingFollowersInfo = data.followingFollowersInfo\n\
  \            self.loadingStatus = .idle\n        } catch {\n            loadingStatus\
  \ = .error(error)\n        }\n    }\n}\n```\n\n*代码清单 4-3 — 对 `authenticateAndFetchProfile()`\
  \ 的修改*\n\n现在我们调用了 `fetchData` 方法，它将返回一个元组。请注意，我们仍然需要使用 `await` 来调用它，因为即使其内部的逻辑可能包含\
  \ `async let` 调用，这个方法本身的签名仍然是 `async` 的。这个方法只会在其内部的两个 `async let` 任务都完成后才返回。也就是说，你仍然可以用\
  \ `async let` 来调用 `fetchData`，以使其与其他任务并发运行。\n\n> **注意**\n> 虽然我们使用 `async let` 构造体来明确声明我们并发运行任务的意图，但最终决定是否真正并发运行你的代码，或者为多个调用重用另一个线程，仍然取决于系统。也就是说，系统可能会决定将\
  \ `fetchUserInfo` 和 `fetchFollowingAndFollowers` 都运行在一个不同但共享的线程中，本质上使它们串行运行在非主线程上。\n\
  \n如果你不想自己动手修改，可以下载“第 2 章 - 社交媒体应用 (Async-Await)(`async let`)”示例项目来查看实际运行的代码。\n\n\
  ### 任务组\n\n当你明确知道某项任务涉及的并发数量时，`async let` 构造体是理想的选择。在我们的社交媒体应用中，我们知道需要获取个人资料信息和关注者信息——恰好是两个可以同时运行的任务。但有时你可能不知道完成应用的某个特定功能所需的并发数量。想象一下，你有一个允许用户下载动态数量图片的应用，或者你想同时对可变数量的图片应用滤镜。在这些情况下，我们可能需要一个任务、两个任务、300\
  \ 个任务，甚至更多。针对这些情况，`async/await` 系统为我们提供了任务组。\n\n任务组是一种结构化并发工具，它允许我们同时运行未知数量（可能）的并发任务，前提是这些任务是相关的。如果你的任务太多，Swift\
  \ 不会同时运行所有任务，它会优先处理任务，并尽可能多地并发运行它们。\n\n\n\n#### 任务组实战\n\n要创建任务组，你可以使用 `withTaskGroup`\
  \ 和 `withThrowingTaskGroup` 函数。与创建显式续体时类似，当你的组可以无异常完成时使用前者，而当组可能抛出错误时则使用后者。\n\n\
  我准备了一个简单的 SwiftUI 项目，它将执行以下任务：\n\n1.  从服务器获取包含图片列表的 JSON 文件。\n2.  在任务组中下载每个 URL，将图片存储到本地，然后渲染一个显示这些图片的\
  \ SwiftUI 视图。\n\n由于我们在获取文件列表之前不知道需要下载多少张图片，因此可以使用任务组来尽可能多地并发下载。\n\n**注**：计算机系统的线程数量并非无限。任务组会尽力并发下载所有图片，但也会进行优化和任务优先级排序。如果你同时处理大量并发任务，请注意任务组可能会将部分任务排队延后，它们不一定会同时执行所有任务。\n\
  \n##### 图片下载器项目\n\n这个项目是一个 SwiftUI 应用，它从互联网下载图片列表，然后下载该列表中的所有图片。你可以下载“Chapter 4\
  \ - ImageDownloader”项目来查看。我们只会讨论源代码的关键部分，因为把所有代码都放在这里会占用大量篇幅。\n\n运行后，应用会有两个界面。第一个界面如图\
  \ 4-1 所示。\n\n![](img/532302_1_En_4_Fig1_HTML.jpg)\n\n截图展示了下载器应用的主界面，其中包含无线网络和满格电池图标，时间为\
  \ 8:16，以及“无内容显示”文字和下方的“加载图片”按钮。\n\n**图 4-1** – ImageDownloader 应用的主界面\n\n点击“加载图片”按钮后，应用将开始下载图片。稍等片刻，所有图片都会显示在界面中。图\
  \ 4-2 展示了应用加载部分内容后的界面截图。\n\n![](img/532302_1_En_4_Fig2_HTML.jpg)\n\n截图展示了三张猫咪照片，截图顶部显示有无线网络和电池图标。\n\
  \n**图 4-2** – 下载图片后的用户界面\n\n**注**：希望你喜欢猫咪。\n\n我们的 JSON 数据返回一个 `imageName-url` 配对数组。每张图片都有对应的名称和\
  \ URL。文件 `ServerImage.swift`（如代码清单 4-4 所示）展示了其内容：\n\n```swift\nimport Foundation\n\
  struct ServerImage: Codable {\n    let imageName: String\n    let url: URL\n}\n\
  ```\n\n**代码清单 4-4** – `ServerImage` 对象\n\n`ImageManager.swift` 文件中的 `ImageManager`\
  \ 类包含了所有核心逻辑。该类有两个重要的属性，如代码清单 4-5 所示。\n\n```swift\nprivate let imageListURL = URL(string:\
  \ \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/taskgroups/imagelist_tif.json\"\
  )!\nprivate let urlSession = URLSession.shared\n```\n\n**代码清单 4-5** – `ImageDownloader`\
  \ 类的主要属性\n\n`imageListURL` 变量用于存储稍后下载图片列表的 URL。我们通过 `urlSession` 变量复用了相同的 URL 会话进行所有下载。\n\
  \n**注**：我故意创建了文件体积较大的图片（每张约 25 MB）。这是为了让你有足够的时间感受此项目的异步并发特性。如果你的网络不设限或速度较慢，可以将 `imageListURL`\
  \ 变量中存储的 URL 中的“tif”部分替换为“jpg”。这会使程序使用体积更小的 JPEG 图片（约 3 MB）。\n\n然后，`ImageManager`\
  \ 类包含三个方法。代码清单 4-6 展示了用于下载并解析列表本身的函数。\n\n```swift\nfunc fetchImageList() async throws\
  \ -> [ServerImage] {\n    let (data, _) = try await urlSession.data(from: imageListURL)\n\
  \    let urls = try jsonDecoder.decode([ServerImage].self, from: data)\n    return\
  \ urls\n}\n```\n\n**代码清单 4-6** – `fetchImageList` 方法\n\n我们再次体会到 `async/await` 的简洁性。请想象一下，如果使用基于闭包的调用，这个方法会是什么样子。\n\
  \n下载单张图片的方法更有趣一些，如代码清单 4-7 所示。\n\n```swift\n/// 返回本地图片路径。\nfunc download(_ serverImage:\
  \ ServerImage) async throws -> URL {\n    let fileManager = FileManager.default\n\
  \    let tmpDir = fileManager.temporaryDirectory\n    let (downloadedImageUrl, _)\
  \ = try await urlSession.download(from: serverImage.url)\n    let destinationUrl\
  \ = tmpDir.appendingPathComponent(serverImage.imageName)\n    // 如果目标路径已存在，则删除它。\n\
  \    try? fileManager.removeItem(at: destinationUrl)\n    try fileManager.moveItem(at:\
  \ downloadedImageUrl, to: destinationUrl)\n    return destinationUrl\n}\n```\n\n\
  **代码清单 4-7** – 下载单张图片\n\n\n\n首先，我们使用`urlSession`的`download`方法而非`data`方法，因为这些都是潜在的大文件。我们会将它们存储在路径（`destinationUrl`）中，并且在存储新文件之前，我们会移除该路径下的任何旧文件，以防止可能的干扰错误。在本地存储图片后，我们会将本地\
  \ URL 返回给调用者。\n\n最后一个方法比较有趣。该方法会下载类型为`ServerImage`的对象数组中的所有图片，详见 4-8。\n\n```\n///\
  \ Downloads all the images in the array and returns an array of URLs to the local\
  \ files\nfunc download(serverImages: [ServerImage]) async throws -> [URL] {\n  \
  \  var urls: [URL] = []\n    try await withThrowingTaskGroup(of: URL.self) { group\
  \ in\n        for image in serverImages {\n            group.addTask(priority: .userInitiated)\
  \ {\n                let imageUrl = try await self.download(image)\n           \
  \     return imageUrl\n            }\n        }\n        for try await imageUrl\
  \ in group {\n            urls.append(imageUrl)\n        }\n    }\n    return urls\n\
  }\n```\n*代码清单 4-8 使用任务组同时下载多个图片的实现*\n\n从高层次来看，该函数首先声明了一个 URL 变量。在这个变量中，我们将存储所有下载的图片的本地\
  \ URL。然后，我们创建一个任务组，这本身是一个可等待的操作，最后，我们返回这些 URL。再次强调，我们可以体会到`async/await`提供的线性特性。\n\
  \n当你使用`withTaskGroup`或`withThrowingTaskGroup`创建任务组时，需要指定该组将产生的数据类型。在本例中，我们的任务组产生\
  \ URL，因为`download(serverImages:)`方法会返回 URL。这两个任务组方法的闭包会为我们提供任务组本身——这里我们将其命名为`group`。\n\
  \n我们通过`addTask`方法向该组提交任务，一旦任务被提交，它们就会开始执行。在我们的`download(serverImages:)`函数中，我们遍历所有服务器图片，并在每次迭代中创建一个下载图片的任务。这会使任务组*在最佳情况下*同时执行所有任务。就像`async/await`系统中的其他工具一样，系统会对任务进行优先级排序，如果所有资源都可用，它会尝试并发执行所有任务，但如果你提交了大量任务，也不必对任务组未能同时执行所有任务感到惊讶。我们可以选择性地指定优先级。我们的方法使用了`.userInitiated`优先级，这是可用的最高优先级。我们将在下一章详细讨论优先级。\n\
  \n需要记住的一点是，添加到组中的任务可能不会按照提交的顺序执行。如果你想使用任务组，那么设计代码时务必使执行顺序无关紧要。\n\n最后，在`withThrowingTaskGroup`内部，我们有另一个循环——一个可等待的`for`循环。这个循环将在下载过程中陆续接收所有\
  \ URL。它会逐个接收每个 URL，这样我们就不会使`URLs`变量处于无效状态。再次强调，不要期望按特定顺序获取 URL。`group`变量本身是一个集合，因此我们不仅可以用`for-in`遍历它，还可以使用高阶函数（如`filter`、`map`、`reduce`）来处理结果。是的，`for`循环可以使用`await`关键字来处理那些随时间发送值的代码。\n\
  \n请注意，如果任何图片下载任务发生错误，整个任务组都会抛出错误。请记住这一点，因为它可能导致意料之外的行为。如果你认为图片下载可能会失败，在这个特定项目中，为下载任务提供一个默认图片可能是个好主意。\n\
  \n## 总结\n\n在本章中，我们学习了什么是结构化并发。我们了解到结构化并发借鉴了结构化编程的思想，这使得编写和理解并发代码变得非常有用。\n\n我们探讨了两种创建结构化并发的方式：首先，`async\
  \ let`绑定，当你确切知道需要多少并发时，这种方法非常有用。使用`async let`时，我们需要在需要变量值的时候使用`await`关键字。另一个结构化并发工具是任务组。当我们想同时运行多个任务，但不确定具体的并发数量时（例如同时从网络下载多张图片），或者当并发来自动态源（如用户输入）时，我们会使用任务组。\n\
  \n## 练习题\n\n优化应用\n\n下载“Chapter 4 Exercise – ForumApp”项目。该应用会消费几个 Web 服务并渲染以下界面：\n\
  \n![](img/532302_1_En_4_Figa_HTML.jpg) 一张截图显示了三张照片，前两张显示“加载图片错误，重试”，最后一张是一条粗直线，屏幕顶部是电池和\
  \ Wi-Fi 图标。 ![](img/532302_1_En_4_Figb_HTML.jpg) 一张截图显示了四张照片，其中`AndylbanezK`位于总帖子数、主题数和新帖子数下方，以及在线好友列表，如姓名和加入日期。\n\
  \n根据给定的源代码，执行以下操作：\n\n1. 目前，该应用使用了`async/await`，但并未使用并发。请识别可以并发运行的代码并优化应用。\n\n2.\
  \ 获取“在线好友”的代码在`ForumAPI.swift`文件的`fetchProfiles(for:)`方法中硬编码为最多 3 个好友。请修复代码，使其使用任务组来并发获取所有用户资料，并且不再硬编码最大的资料获取数量。\n\
  \n你可以下载“Chapter 4 Exercise – Forum App (Solved)”来查看解决方案。\n\n"
- "# 5. 非结构化并发\n\n在上一章中，我们详细讨论了结构化并发。我们了解到结构化并发遵循与结构化编程相同的理念。与结构化并发自然对应的是非结构化并发。\n\
  \n非结构化并发以牺牲少量易用性为代价，提供了更多的灵活性。在使用非结构化并发时，你的代码不一定会遵循我们喜欢的自上而下的结构。幸运的是，使用非结构化并发仍然非常容易，其灵活性也不会显著增加程序的复杂性。\n\
  \n为了使用非结构化并发，我们使用一个我们已经了解的对象：`Task`。\n\n## 深入理解 Task\n\n`Task`是一个有用的对象，它允许我们执行两项重要操作：\n\
  \n1.  使用其初始化器创建任务的那一刻，它会异步启动闭包中的代码。\n2.  它为我们创建一个并发上下文，使我们能够以调用`async`方法的方式使用并发。\n\
  \n\n\n### 创建任务\n\n`Task` 是一个可以存储值、错误、两者皆存储或两者皆不存储的对象。要创建一个异步、无结构化任务，我们调用 `Task`\
  \ 并使用一个闭包（即我们想要异步运行的代码）对其进行初始化。我们在本书中一直在持续这样做。例如，代码清单 5-1 是来自第 2 章的一个小片段，它使用 `Task`\
  \ 调用某个 `async` 方法。\n\n```\nfunc authenticateAndFetchProfile() {\n    Task {\n  \
  \      //...\n        let userProfile = try await fetchUserInfo()\n        //...\n\
  \    }\n}\n代码清单 5-1\n使用 Task 调用异步代码\n```\n\n在代码清单 5-1 中，`fetchUserInfo()` 方法在 `authenticateAndFetchProfile()`\
  \ 方法被调用时立即执行。你无法决定 `Task` 内部代码何时执行。它总是在初始化后立即执行。\n\n当你想使用 `Task` 进行并发操作时，你拥有的第一个灵活性是指定优先级。优先级类型为\
  \ `Task.Priority`，与你在使用任务组时可以使用的类型相同。代码清单 5-2 展示了在使用新的并发系统时你可以使用的优先级选项。\n\n```\n\
  static let background: TaskPriority\nstatic let high: TaskPriority\nstatic let low:\
  \ TaskPriority\nstatic var medium: TaskPriority\nstatic let userInitiated: TaskPriority\n\
  static let utility: TaskPriority\n代码清单 5-2\n可用的优先级选项\n```\n\n`Task` 是一个对象，因此你可以将其存储在一个变量中。这也是“无结构化并发”这一名称的部分由来。你可以有多个\
  \ `Task` 对象，将它们存储在变量中，甚至存储在集合中。无结构化并发能做到而结构化并发做不到的一件事就是取消任务。任务取消是一个重要主题，本章在讨论任务树时会进一步探讨。现在，请记住你可以通过调用\
  \ `cancel()` 方法来取消任务。\n\n代码清单 5-3 展示了如何声明一个任务、将其存入变量并在后续取消它。\n\n```\nfunc authenticate()\
  \ {\n    let authenticationTask = Task {\n        let context = LAContext()\n  \
  \      let policy = LAPolicy.deviceOwnerAuthenticationWithBiometrics\n        return\
  \ try await context.evaluatePolicy(policy, localizedReason: \"To log in\")\n   \
  \ }\n    authenticationTask.cancel()\n}\n代码清单 5-3\n创建一个 Task，并在之后显式取消它\n```\n\n\
  我们创建了一个类型为 `Task<Bool, Error>` 的变量。这是因为 `context.evaluatePolicy(_:localizedReason:)`\
  \ 返回一个 `Bool` 值，并且可能抛出错误。如果我们需要继续执行某些工作，可以对 `Task` 的 value 进行 await，如代码清单 5-4 所示。\n\
  \n```\nTask {\n    let authenticationSuccessful = try await authenticationTask.value\n\
  \    if authenticationSuccessful {\n        // 身份验证成功\n    }\n}\n代码清单 5-4\n等待 Task\
  \ 的值\n```\n\n我们需要使用 `try await`，因为我们的任务可能返回一个值并抛出错误。注意这个新创建的 `Task` 中缺少了 `do-catch`\
  \ 语句。这段代码会隐式创建一个类型为 `Task<(), Error>` 的任务，因为它不返回任何内容，但可能抛出错误（由 `context.evaluatePolicy`\
  \ 抛出的错误）。任务不需要显式的 `do-catch` 代码块，因为错误会被闭包自身捕获，但如果在你的应用程序上下文中这样做有意义，也可以添加这些语句。\n\n\
  当你使用 `Task {}` 创建一个新任务时，它会继承生成它的任务的上下文信息。继承的信息包括任务运行的参与者（如果你在 `@MainActor` 上运行的内容中生成一个\
  \ `Task`，那么该任务也将在 `@MainActor` 上运行）以及优先级。如果你新生成的 `Task` 是一个根任务（即它创建了一个异步上下文，但本身并非在异步上下文中运行），它将继承其所在任何线程的参与者。\n\
  \n### 无结构化并发实战\n\n既然你对无结构化并发有了更好的理解，并且终于了解了 `Task` 对象是什么，我们可以开始编写一些示例代码，以便更好地理解这一切是如何工作的。\n\
  \n我们将处理并修改上一章创建的项目——ImageDownloader 项目。该项目运行得很好，但有两个主要问题我想解决：\n\n1. 当应用启动时，它会在屏幕中央显示一个\
  \ `ProgressView`，直到所有图像下载完成。这意味着如果我们有很多图像，或者它们**非常大**，`ProgressView` 将会显示很长时间。一旦图像下载完成，视图会刷新并一次性显示所有图像。\n\
  \n2. 无法保证图像的显示顺序。图像会按照下载完成的先后顺序添加到数组中。这本身无害，但如果你有一个按时间顺序显示元素的应用程序，这就很重要了。\n\n我们将修改原始项目并解决这两个问题。如果你想直接下载修改后的版本，可以自由下载“第\
  \ 4 章 - ImageDownloaderUnstructured”项目。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n#### 修改 `ImageManager` 类\n\n首先，将代码清单 5-5 中的代码添加到文件顶部。\n\n```\nenum ImageDownloadStatus\
  \ {\ncase downloading(_ task: Task)\ncase error(_ error: Error)\ncase downloaded(_\
  \ localImageURL: URL)\n}\nstruct ImageDownload: Identifiable {\nlet id: UUID = UUID()\n\
  let status: ImageDownloadStatus\n}\n代码清单 5-5\n附加对象\n```\n\n目前，`ContentView` 从 `ContentViewViewModel`\
  \ 读取 URL 数组，并将其显示在 UI 中。我们将对此进行更改，让 `ImageManager` 成为图像的实际数据源。我们还将让视图读取 `ImageDownload`\
  \ 对象，而不是 URL 对象。这将帮助我们根据图像的下载状态（`ImageDownloadStatus` 枚举）显示不同的 UI。我们需要让 `ImageDownload`\
  \ 遵循 `Identifiable` 协议，以便它能与 SwiftUI 良好配合。\n\n此外，由于 `ImageManager` 类现在将成为 SwiftUI\
  \ 的数据源，因此需要将其标记为 `@MainActor`，如代码清单 5-6 所示。\n\n```\n@MainActor\nclass ImageManager:\
  \ ObservableObject {\n代码清单 5-6\n将 ImageManager 标记为 @MainActor\n```\n\n现在，转到 `TaskGroupsApp.swift`\
  \ 文件，并修改其中 `ImageManager` 类变量的声明，以添加 `@MainActor` 属性，如代码清单 5-7 所示。\n\n```\n@MainActor\n\
  fileprivate let imageManager = ImageManager()\n代码清单 5-7\n将 imageManager 变量标记为 @MainActor\n\
  ```\n\n回到 `ImageManager.swift` 文件，这次将 `images` 变量的类型修改为 `[ImageDownload]`。同时，添加\
  \ `@Published` 属性。这两个更改如代码清单 5-8 所示。\n\n```\n@Published private(set) var images:\
  \ [ImageDownload] = []\n代码清单 5-8\n为远程图像创建可发布的属性\n```\n\n因为 SwiftUI 会将其用作数据源，所以只要这个数组发生变化，我们的\
  \ UI 就会更新。\n\n最后，我们将根据代码清单 5-9 修改 `download(serverImages:)` 函数。\n\n```\nfunc download(serverImages:\
  \ [ServerImage]) {\nfor imageIndex in (0..<serverImages.count) {\nlet downloadTask\
  \ = Task {\ndo {\nlet imageUrl = try await download(serverImages[imageIndex])\n\
  self.images[imageIndex] = ImageDownload(status: .downloaded(imageUrl))\n} catch\
  \ {\nself.images[imageIndex] = ImageDownload(status: .error(error))\n}\n}\nimages.append(ImageDownload(status:\
  \ .downloading(downloadTask)))\n}\n}\n代码清单 5-9\n新版本的 download(serverImages:)\n```\n\
  \n这就是实现部分魔法的地方。我们将首先遍历所有已下载的 `ServerImage`。对于每个服务器图像，我们将创建一个显式的 `Task`。我们还会立即将此任务以\
  \ `.downloading(_)` 状态添加到 `images` 数组中。该枚举跟踪任务本身，以便我们稍后可以根据需要取消它。\n\n任务主体将尝试下载图像。如果下载失败，我们将使用\
  \ `.error(_)` 值替换其在 `images` 数组中的条目。如果成功，我们将使用 `.downloaded(url)` 值替换它。简而言之，任务的主体将根据下载是否成功，用不同的枚举值替换其在数组中的位置。并且由于这是一个\
  \ `@Published` 属性，SwiftUI 可以观察其更改，并实时获知该数组发生的任何情况。\n\n#### 修改 `ContentViewViewModel`\
  \ 类\n\n`ContentViewViewModel.swift` 文件中的主要修改是 `downloadImages()` 函数，如代码清单 5-10 所示。我们还从这个文件中移除了\
  \ `imageUrls` 数组，因为该工作已委托给 `ImageManager` 类。\n\n```\nfunc downloadImages() {\nTask\
  \ {\nguard let manager = imageManager else { return }\ndo {\nlet imageList = try\
  \ await manager.fetchImageList()\nmanager.download(serverImages: imageList)\n} catch\
  \ {\nprint(error)\n}\n}\n}\n代码清单 5-10\n新的 downloadImages() 方法\n```\n\n视图模型现在是一个非常轻量的类，只包含这个方法。我们可以将所有事情委托给\
  \ `ImageManager` 类，但我更倾向于将其保留为一个独立的逻辑类。\n\n#### 修改 `ContentView` 对象\n\n`body` 属性按照代码清单\
  \ 5-11 进行修改。\n\n```\nvar body: some View {\nScrollView {\nLazyVStack {\nif let manager\
  \ = viewModel.imageManager {\nForEach(manager.images) { imageDownload in\nswitch\
  \ imageDownload.status {\ncase .error(_): imageErrorView()\ncase .downloading(_):\
  \ imageDownloadView()\ncase .downloaded(let url): imageView(for: url)\n}\n}\n}\n\
  }\n}\n.onAppear {\nviewModel.imageManager = imageManager\nviewModel.downloadImages()\n\
  }\n}\n代码清单 5-11\n新的 body 属性\n```\n\n我们将根据 `ImageDownload` 对象的 `ImageDownloadStatus`\
  \ 属性来显示不同的视图。如果出现错误，我们将显示一个“x”标记。如果正在下载，我们将显示一个图片占位符。如果图片已下载完成，我们将显示图片本身。代码清单 5-12\
  \ 展示了这些额外方法的实现。\n\n```\n@ViewBuilder\nfunc imageDownloadView() -> some View {\n\
  VStack {\nImage(systemName: \"photo\")\n.resizable()\n.frame(width: 300, height:\
  \ 300)\n.foregroundColor(.gray)\n}\n}\n@ViewBuilder\nfunc imageErrorView() -> some\
  \ View {\nVStack {\nImage(systemName: \"xmark\")\n.resizable()\n.frame(width: 300,\
  \ height: 300)\n}\n}\n@ViewBuilder\nfunc imageView(for url: URL) -> some View {\n\
  Image(uiImage: UIImage(data: viewModel.data(for: url))!)\n.resizable()\n.frame(width:\
  \ 300, height: 300)\n}\n代码清单 5-12\n用于创建视图的辅助属性\n```\n\n就这样！如果你现在运行应用，将会看到一个带有图片占位符的\
  \ UI。图 5-1 展示我们的基本 UI。\n\n![](img/532302_1_En_5_Fig1_HTML.jpg)\n\n这张截图显示了一个手机屏幕，上面有三张即将加载的图片，从上到下排列，屏幕顶部有时间、蜂窝网络和电池图标。\n\
  \n图 5-1\n\n显示将要下载的图片的占位符\n\n随着图片的加载，图 5-2 展示了占位符如何被实际图片替换。\n\n![](img/532302_1_En_5_Fig2_HTML.jpg)\n\
  \n这张截图展示了一个手机屏幕，上面有三张猫的图片，从上到下排列，屏幕顶部有时间、蜂窝网络和电池图标。\n\n图 5-2\n\n图片在下载过程中逐个替换占位符\n\
  \n这个改进版的 `ImageDownloader` 项目在下载图片时会显示占位符，而不是在等待所有图片下载完成时显示一个 `ProgressView`，并且图片将始终以相同的顺序显示。很整洁！\n\
  \n\n  \n"
- "# 任务树  \n\nSwift 中的新并发系统由一种名为“任务树”的底层结构驱动。顾名思义，任务树为我们提供了理解并发运行背后机制的心智模型。任务树决定了你的任务之间如何关联运行，同时控制着数据如何被子任务继承。前面我们提到，任务会从启动它的任务中继承参与者（actor）、优先级以及任务本地变量。这要归功于任务树。任务会生成子任务，而这些子任务会从父任务处继承所有这些属性。\
  \  \n\n为了更好地理解这个概念，让我们借助之前编写的一些代码来探索。代码清单 5-13 展示了我们在社交媒体应用 `async let` 版本中使用过的一个函数。\
  \  \n\n```\nfunc fetchData() async throws -> (userInfo: UserInfo, followingFollowersInfo:\
  \ FollowerFollowingInfo) {\nlet userApi = UserAPI()\nasync let userInfo = userApi.fetchUserInfo()\n\
  async let followers = userApi.fetchFollowingAndFollowers()\nreturn (try await userInfo,\
  \ try await followers)\n}\n代码清单 5-13  \n异步从服务器获取数据  \n```  \n\n这段代码中有两个 `async let`\
  \ 调用，分别用于获取用户信息和关注者信息。由于使用了 `async let`，系统会尝试让它们并发运行。  \n\n直觉上你可能认为每个 `async let`\
  \ 调用都隐式启动了一个新任务，但事实并非如此。每个 `async let` 调用会启动一个新的**子**任务。区分这一点很重要，因为 `Task` 只能显式创建。\
  \  \n\n每个子任务都会继承父任务（此处指 `fetchData()` 函数本身）的参与者、优先级和局部变量。当你在一个 `Task` 内部创建另一个 `Task`\
  \ 时，它同样会继承父 `Task` 的属性。但与隐式任务不同的是，你可以根据需求对其进行调整，例如以不同的优先级启动它。严格来说，嵌套任务并非子任务。  \n\
  \n如果要把 `fetchData()` 任务画成一棵树，它看起来会像图 5-3 所示。  \n\n![](img/532302_1_En_5_Fig3_HTML.png)\
  \  \n\n一个流程示意图，展示了 `fetchData`、`userApi.fetchUserInfo()` 和 `userApi.fetchFollowingAndFollowers()`\
  \ 的可视化表示。  \n\n**图 5-3**  \n任务树的可视化表示  \n\n当 `fetchData` 执行时，同一个任务会被用来启动 `fetchUserInfo`\
  \ 和 `fetchFollowingAndFollowers`。这一点需要反复强调，请务必记住：**任务始终是显式创建的**。除非我们手动将这些调用包装在 `Task`\
  \ 中，否则它们将在同一个 `Task` 下运行。一个任务可以运行多个并发子任务，这些子任务共享相同的参与者、优先级和任务本地变量。  \n\n关于任务树，你需要考虑的另一个重要方面是：**父任务必须在其所有子任务都完成工作后才能结束自身工作**。即使这种终止并不成功（例如抛出了错误），它仍然是一种终止，并且任务可以在发生此类异常情况时完成。\
  \  \n\n任务树还控制着另外两个方面。它们非常重要，值得单独用章节来阐述：错误传播和任务取消。  \n\n## 错误传播  \n\n让我们回到 `fetchData`\
  \ 树。`fetchData` 本身可能抛出错误，它生成的所有子任务也可能抛出错误。假设 `fetchUserInfo` 中发生了错误。如果该函数抛出错误，函数执行将在该点终止，将错误向上传递给调用方，并且不会执行错误发生点之后的任何代码。到目前为止，如果我们完全没有使用新的并发系统，情况也会完全一样。这就是\
  \ Swift（实际上也是许多其他编程语言）中错误传播的工作原理。  \n\n但当我们使用新的并发系统时，事情就没那么简单了。当然，`fetchUserInfo`\
  \ 可能抛出错误，但 `fetchFollowingAndFollowers` 可能正常完成并返回预期值。  \n\n如果抛出了错误，它会沿着任务树向上传播，直到到达调用方。任何正在等待或并发运行的其他子任务都将被标记为已取消。\
  \  \n\n\n\n### 任务取消\n\n任务取消非常重要，但其运作方式并不像你初看时以为的那样。如果你重新阅读上一节的最后一句话，你会注意到我们说的是任务\"\
  将被*标记为*已取消\"。\n\n在这个新的并发系统中，任务取消是协作式的。取消一个任务仅仅意味着你在通知它你希望它被取消。由任务自己来决定在何时以适当的方式实际取消自身，并且你需要自行实现这个逻辑。任务取消采用协作式的原因是，存在一些敏感且重要的任务，强行停止它们的执行可能是不可接受的。如果你正在向数据库写入数据，或者在一个并发任务中修改用户文件，突然取消它可能会导致用户数据损坏（以及大量的一星差评）。\n\
  \n当一个 `Task` 被取消时，它也会将任何子任务标记为已取消，以确保不会执行不必要的工作。\n\n为了更好地解释这个概念，我提供了一个我们将要逐步完成的项目：\"\
  第 5 章——计数器应用\"。\n\n当你启动这个应用时，你会看到一个简单的按钮，如图 5-4 所示。\n\n![](img/532302_1_En_5_Fig4_HTML.jpg)\n\
  \n一张截图展示了手机屏幕，上面显示着\"开始计数\"的文字，以及顶部的时间、蜂窝网络和电池图标。\n\n图 5-4\n\n一个简单的界面，带有一个用于启动计数器的按钮\n\
  \n点击按钮将开始在两个不同的区域同时打印数字 1 到 10 以及 11 到 20。图 5-5 展示了这一运行中的动作。\n\n![](img/532302_1_En_5_Fig5_HTML.jpg)\n\
  \n一张截图展示了手机屏幕，上面分别圈出了数字 1、2、11 和 12，底部有\"取消\"按钮，以及顶部的时间、蜂窝网络和电池图标。\n\n图 5-5\n\n\
  在界面中显示数字。界面每秒更新一次\n\n用于输出待绘制数字的函数位于代码清单 5-14 中。\n\n```swift\nfunc countFrom1To10()\
  \ async throws -> Bool {\n    for i in (1...10) {\n        try? await Task.sleep(nanoseconds:\
  \ 1_000_000_000)\n        values1To10 += [i]\n    }\n    return true\n}\nfunc countFrom11To20()\
  \ async throws -> Bool {\n    for i in (11...20) {\n        try? await Task.sleep(nanoseconds:\
  \ 1_000_000_000)\n        values11to20 += [i]\n    }\n    return true\n}\n代码清单 5-14\n\
  这些方法输出要在界面中显示的数字\n```\n\n代码清单 5-15 展示了异步启动这两个函数的方法。\n\n```swift\nfunc startCounting()\
  \ {\n    isCounting = true\n    counterTask = Task {\n        async let counter1To10DidFinish\
  \ = countFrom1To10()\n        async let counter11To20DidFinish = countFrom11To20()\n\
  \        do {\n            let _ = try await (counter1To10DidFinish, counter11To20DidFinish)\n\
  \        } catch {\n            self.error = error\n        }\n    }\n}\n代码清单 5-15\n\
  异步启动两个计数方法\n```\n\n`counterTask` 是一个类型为 `Task<Void, Never>` 的变量。将任务存储在变量中，可以让我们稍后取消它，如代码清单\
  \ 5-16 所示。\n\n```swift\nButton(\"Cancel\") {\n    viewModel.counterTask?.cancel()\n\
  }\n代码清单 5-16\n给用户手动控制任务的能力\n```\n\n你可以看到，`counterTask` 变量充当了 `countFrom1to10` 和\
  \ `countFrom11to20` 的父任务。你认为当你点击\"取消\"按钮时会发生什么？数字会完全停止打印，并且界面仅显示已成功打印出来的数字吗？它会清除所有数字吗？请花一分钟思考一下。\n\
  \n但正确答案并非这两种情况。在你点击取消按钮的那一刻，所有数字会立即显示在界面上（而不是像之前那样一次显示一个数字），并且任务看起来像是毫无问题地完成了。这到底是怎么回事？\n\
  \n***取消是协作式的***。这意味着任务不会被任何其他人明确地、自动地取消。之前，我们说任务被*标记为已取消*。取消是协作式的，意味着任务需要检查自身的取消状态，并在适当的时候取消执行。立即取消任务是不正确的，因为你的代码可能正在执行某些不能被意外中断的关键操作。因此，与其由其他人来取消你的代码，不如让你的代码等待一个合适的时机自行停止执行。\n\
  \n要检查取消状态，你需要将取消检查放置在合理的位置。Swift 为你提供了 `Task.checkCancellation()` 静态方法和 `Task.isCancelled`\
  \ 静态属性。当你处于一个可以抛出异常的异步上下文中时，使用前者；当你的上下文未被标记为 `throws` 时，使用后者。\n\n基于此，我们现在需要让 `countFrom1To10()`\
  \ 和 `countFrom11To20()` 方法在某个时刻检查自身的取消状态，并在适当时返回。一种实现方法是在我们将值追加到变量之前放置一个检查。代码清单\
  \ 5-17 展示了如何实现。\n\n```swift\nfunc countFrom1To10() async throws -> Bool {\n    for\
  \ i in (1...10) {\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n \
  \       if Task.isCancelled { return false }\n        values1To10 += [i]\n    }\n\
  \    return true\n}\n代码清单 5-17\n向 countFrom1To10() 添加任务取消检查\n```\n\n将检查放在值追加到数组之后也是可以接受的。如果两个位置都放置取消检查是合理的，那甚至更好。代码清单\
  \ 5-18 展示了包含一些额外检查的方法。\n\n```swift\nfunc countFrom1To10() async throws -> Bool {\n\
  \    for i in (1...10) {\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n\
  \        if Task.isCancelled { return false }\n        values1To10 += [i]\n    \
  \    if Task.isCancelled { return false }\n    }\n    return true\n}\n代码清单 5-18\n\
  添加额外的取消检查\n```\n\n并没有一个固定的公式来识别取消检查应放置的位置，但重要的是在设计代码时要将取消纳入考量，因为你希望代码的使用者不会让你的操作不必要地持续运行。苹果的许多异步方法已经考虑了取消。例如，如果你取消一个正在运行\
  \ `URLSession` 数据任务的任务，它会自动响应取消操作。\n\n如果你现在运行代码并点击\"取消\"按钮，前几个数字会停止在原地打印，而从 11 到\
  \ 20 的数字则会一直打印到结束。图 5-6 展示了这一运行中的行为。\n\n![](img/532302_1_En_5_Fig6_HTML.jpg)\n\n\
  一张截图展示了手机屏幕，上面分别圈出了数字 1 以及 11 到 20，底部有\"取消\"按钮，以及顶部的时间、蜂窝网络和电池图标。\n\n图 5-6\n\n只有一个任务在检查取消状态，因此取消未能按预期工作\n\
  \n在我们修复 `countFrom11to20` 之前，你可能想知道为什么点击取消时数字会立即显示出来，而不是像点击\"取消\"按钮之前那样每秒显示一个数字。原因是，`try?\
  \ await Task.sleep(nanoseconds: 1_000_000_000)` 调用中的错误通过 `try?` 被静默处理了。代码这样编写是因为当\
  \ `Task` 被取消时，`sleep(nanoseconds:)` 方法实际上会抛出一个错误。由于错误被静默处理，任务不会休眠一秒，循环会立即执行。本质上，取消是一个被抛出的错误，你可以捕获它并对其进行与其他错误不同的处理。\n\
  \n\n\n为了提供协作任务取消的示例，我不得不静默错误并手动添加取消检查。通常，你可以预期新并发系统中的任何方法以及苹果自身的异步方法，在某个时刻已经执行了取消检查。如果你移除`try`后的问号，则可以避免在该特定方法中进行取消检查。\n\
  \n清单 5-19 修复了`countFrom11to20`方法。\n\n```swift\nfunc countFrom11To20() async throws\
  \ -> Bool {\n    for i in (11...20) {\n        if Task.isCancelled { return false\
  \ }\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n        values11to20\
  \ += [i]\n        if Task.isCancelled { return false }\n    }\n    return true\n\
  }\n```\n清单 5-19 修复`countFrom11To20`方法\n\n现在，无论何时你点击“取消”按钮，数字将不会像我们添加取消检查之前那样从上到下打印。有趣的是，由于异步代码的特性，根据你取消的时机，你可能在\
  \ UI 中看到不同的输出。例如，应用尝试每秒打印两个数字（1 和 11，2 和 12 等），但根据你取消的时机，你可能只得到一对中的一个数字。图 5-7 展示了当我在显示第三对时取消任务所发生的情况。\n\
  \n![](img/532302_1_En_5_Fig7_HTML.jpg)\n\n一张截图展示了一个移动屏幕，上面分别圈出了数字 1、2、11、12 和 13，底部有“取消”按钮，顶部有时间、蜂窝网络和电池符号。\n\
  \n图 5-7 任务在同一时间被取消，但其中一个任务稍微领先于另一个\n\n### 任务取消与任务组\n\n理解使用任务组的结构化并发可能导致你的代码向调用者返回部分结果而非完整集合，这一点非常重要。思考清单\
  \ 5-20 中的代码，它来自第 4 章的`ImageDownloader`项目。\n\n```swift\nfunc download(serverImages:\
  \ [ServerImage]) async throws -> [URL] {\n    var urls: [URL] = []\n    try await\
  \ withThrowingTaskGroup(of: URL.self) { group in\n        for image in serverImages\
  \ {\n            group.addTask(priority: .userInitiated) {\n                let\
  \ imageUrl = try await self.download(image)\n                return imageUrl\n \
  \           }\n        }\n        for try await imageUrl in group {\n          \
  \  urls.append(imageUrl)\n        }\n    }\n    return urls\n}\n```\n清单 5-20 在任务组中下载多个图片\n\
  \n如果你有 10 张图片要下载，并且在所有图片下载完成之前，`withThrowingTaskGroup`调用内部发生错误（或者你调用`group.cancelAll()`取消组），`urls`数组将包含一个部分结果，该结果仅包含在异常退出之前成功下载的图片。请确保记录此行为，因为你的代码的调用者可能未意识到这一点，并可能导致他们的程序出现意外行为。\n\
  \n## 使用分离任务的无结构化并发\n\n我们已经提到，任务树确保任务从其父任务继承一些属性，例如优先级、Actor 和局部变量。完全有可能从另一个任务启动一个不继承其父任务任何属性的任务。这些任务被称为*分离任务*，当你需要并发，但这种并发并非严格相关时，它们非常有用。例如，从互联网下载图片可以是一个任务。你可能稍后想要将这些图片存储在本地缓存中。将图片存储在本地缓存的过程可以是一个分离任务，这样如果下载任务被取消但图片已下载，缓存保存操作将顺利进行而不会出现问题。\n\
  \n要启动一个分离任务，你只需使用`Task`的静态方法`detached`。清单 5-21 展示了如何创建一个。\n\n```swift\nTask.detached(priority:\
  \ .low) {\n    imageManager.writeImageToCache(image)\n}\n```\n清单 5-21 创建分离任务\n\n\
  从语法上讲，与标准任务相比没有太大区别，但在处理它们时，请务必注意任务树和继承属性。指定优先级是可选的，就像处理普通任务时一样。\n\n## 总结\n\n本章详细讨论了无结构化并发和任务树。我们大量介绍了`Task`对象及其在创建并发时的行为。这种类型的并发称为无结构化并发，它赋予我们更多控制权，允许我们手动取消任务或将它们作为参数传递。\n\
  \n我们讨论了结构化并发如何与`Task`协同工作。我们提到，在`Task`内部调用异步方法会使这些方法成为父任务的子任务。这些子任务继承父任务的所有属性，包括优先级、Actor\
  \ 和局部变量。启动异步方法并不意味着它们在不同的任务中运行。任务始终使用`Task {}`对象显式创建。\n\n我们还讨论了任务树以及它如何管理任务的执行。任务树为你提供了一个心智模型，帮助你理解子任务继承了哪些信息。此外，它还管理着取消是如何发生的。\n\
  \n我们了解到任务取消并非直截了当。“取消”一个任务仅仅意味着它将被标记为已取消，但任务自身负责寻找合适的时机来停止执行，因为强制停止异步代码可能对用户造成灾难性后果，例如数据损坏。我们还简要介绍了任务取消如何与任务组交互，以及它如何可能导致任务组返回部分结果，这可能是出乎意料的。\n\
  \n最后，我们讨论了分离任务，这是一种不继承父任务任何属性的无结构化并发形式。这些任务完全独立。\n\n## 练习\n\n### 改进项目\n\n下载“第 4\
  \ 章 - `ImageDownloader`”项目并执行以下更改：\n\n1.  修改它，使其不再使用任务组下载图片。相反，它应该使用无结构化并发与`Task`来下载每张图片。提示：你可以创建一个名为`ServerImageView`的单独视图，并附带一个用于下载单张图片的视图模型。\n\
  2.  添加功能，如果用户点击“取消”按钮，允许他们取消独立的图片下载任务。\n3.  SwiftUI 包含一个名为`.task`的视图修饰符，它会在视图出现时执行其内容，并在视图消失时取消执行，本质上取代了`onAppear`和`onDisappear`修饰符的行为。使用它在占位视图（可以是`ProgressView`）出现时自动下载图片。\n\
  \n完成此练习后，你的程序应类似于图 5-8。\n\n![](img/532302_1_En_5_Fig8_HTML.jpg)\n\n一张截图展示了一个移动屏幕，上面有三个正在加载的图片，顶部有时间、蜂窝网络和电池符号。\n\
  \n图 5-8 图片正在下载时显示的 UI\n\n如果你点击“取消”按钮（或者发生错误），UI 应类似于图 5-9。\n\n![](img/532302_1_En_5_Fig9_HTML.jpg)\n\
  \n一张截图展示了一个移动屏幕，上面有三个加载失败的图片，顶部有时间、蜂窝网络和电池符号。\n\n图 5-9 图片下载已被取消，或发生了其他错误\n\n当然，如果没有发生错误，图片应该像基础练习中那样正常显示。\n\
  \n你可以在“第 4 章 - `ImageDownloaderWithTask`”项目中找到我的解决方案。\n\n\n\n"
- "# 6. 参与者（Actors）\n\n到目前为止，我们讨论了在 Swift 中使用相互独立的任务编写并发代码的方法。你可以运行一些任务，并通常将结果传递到主线程。但有些情况下，你需要在程序中拥有*共享的可变状态*——一个代码可以读取和写入的公共可变源。这个源可以是一个简单的变量、一个文件，也可以是任何其他并发访问有危险，但又需要同时被多个任务使用的资源。\n\
  \n如果你有多个可以访问只读资源的代码段，你的程序将始终处于有效状态，无需担心数据损坏。但如果有多个任务，并且其中至少有一个可以向共享资源写入数据，那就会产生问题。这被称为*数据竞争*，或者如第\
  \ 1 章中所述，称为*竞态条件*。竞态条件非常危险，因为如果多个代码段可以并发写入文件，就会导致数据损坏。如果多个任务正在读取该资源，它们都会得到垃圾数据，甚至可能与它们试图读取的数据不同。最糟糕的是，如果你在底层编写并发代码，引入数据竞争非常容易，而调试却极其困难。\n\
  \n因此，如果你使用值语义（结构体或枚举），就不会遇到这个问题。值语义是只读的，如果发生改变，会创建一个副本，所有修改都*局部*于该变量。每个任务都会操作数据的不同副本，尽管这可能不是你期望的结果。\n\
  \n在第 1 章中，我们看到这个问题的底层解决方案是使用锁来手动同步对资源的访问。但在新的 Swift 并发模型中，我们有一种更简单的方法来实现这种同步：*参与者*。\n\
  \n## 参与者介绍\n\n参与者是 Swift 中引入的一种新的引用类型，由新的并发模型支持。参与者将其自身状态与程序其他部分隔离，并提供对可变状态的同步访问。简单地说，如果你有一个参与者，它包含一个可以被多个任务读取和写入的简单变量，该参与者确保一次只能有一个任务进行读写操作。它确保了对给定资源的互斥访问。\n\
  \n对可变状态的每次访问都通过参与者来完成。要声明一个参与者，只需使用 `actor` 关键字并为其命名，这与声明结构体或类非常相似。参与者作为引用类型，具有许多类似类的特性。它们可以遵循协议，并通过扩展获得更多功能。与类的主要区别在于，参与者会隔离自身状态。参与者可能暂停零次或多次（在其方法中包含其他\
  \ `await` 调用），因此你可以轻松地将参与者与新的并发系统中的其他部分集成。\n\n清单 6-1 展示了如何声明一个参与者。在这个例子中，我们还将创建一个\
  \ `Videogame` 结构体，用于本章的示例。\n\n```\nactor VideogameLibrary {\n    var videogames:\
  \ [Videogame] = []\n    func fetchGames(by company: String) -> [Videogame] {\n \
  \       let games = videogames.filter { $0.title.caseInsensitiveCompare(company)\
  \ == .orderedSame }\n        return games\n    }\n    func countGames(by company:\
  \ String) -> Int {\n        let games = fetchGames(by: company)\n        return\
  \ games.count\n    }\n    func add(games: [Videogame]) {\n        self.videogames.append(contentsOf:\
  \ games)\n    }\n    func fetchGames(by year: Int) -> [Videogame] {\n        let\
  \ games = videogames.filter { $0.releaseYear == year }\n        return games\n \
  \   }\n}\n```\n\n清单 6-1  \n声明一个参与者\n\n这里引用了一个 `Videogame` 对象，其声明在清单 6-2 中。\n\n```\n\
  struct Videogame {\n    let title: String\n    let releaseYear: Int\n    let company:\
  \ String\n}\n```\n\n清单 6-2  \n`Videogame` 结构体\n\n我们可以看到它的声明看起来与类非常相似，作为引用类型，可以预期其行为也类似。你可能会疑惑为什么参与者是引用类型而不是值类型。原因很简单：参与者封装了*共享的*可变状态。它是一种期望被多个代码路径修改的类型。如果它是结构体，调用者修改它后最终会得到各自的副本。\n\
  \n\n\n## 与 Actor 交互\n\n所有对 actor 的调用都需要异步完成，因此需要使用 `await` 关键字。这是 actor 用来同步状态并防止并发修改的机制。由于对\
  \ actor 的调用可以被 `await` 挂起，其他调用方将被暂停，等待轮到它们访问。\n\n在内部，actor 无需以异步方式调用自身的方法和属性。因为\
  \ actor 是隔离的，其内部的任何调用都会按顺序执行，直到某个操作完成。\n\n清单 6-3 展示了我们如何尝试向一个电子游戏库中添加一些游戏。\n\n```\n\
  let library = VideogameLibrary()\nfunc addGames(to library: VideogameLibrary) {\n\
  \    let zelda5 = Videogame(title: \"塞尔达传说：时之笛\", releaseYear: 1998, company: \"\
  Nintendo\")\n    let zelda6 = Videogame(title: \"塞尔达传说：姆吉拉的假面\", releaseYear: 2020,\
  \ company: \"Nintendo\")\n    let tales1 = Videogame(title: \"仙乐传说\", releaseYear:\
  \ 2004, company: \"Namco\")\n    let tales2 = Videogame(title: \"深渊传说\", releaseYear:\
  \ 2005, company: \"Namco\")\n    let eternalSonata = Videogame(title: \"永恒终焉\",\
  \ releaseYear: 2008, company: \"tri-Crescendo\")\n    let games = [zelda5, zelda6,\
  \ tales1, tales2, eternalSonata]\n    library.add(games: games)\n}\n清单 6-3\n向库中添加游戏\n\
  ```\n\n`addGames` 方法只是一个方便快速添加一些电子游戏的函数。然而，如果你尝试编译这段代码，你会收到一个错误，因为“Actor 隔离的实例方法‘add(games:)’不能从非隔离的上下文中引用”。\n\
  \n该方法期望我们添加 `await` 关键字。尽管 `add(games:)` 方法并未标记为 `async`，但作为 actor 提供的保护机制，暴露给我们的\
  \ API 实际上是 `async` 的。编译器正在帮助你避免误用 actor，从而防止引入数据竞争。\n\n这样做的直接结果是，actor 只能在 `async`\
  \ 上下文中运行，因此，要让代码编译通过，我们需要同时向 `add(games:)` 方法添加 `await` 关键字，并将其包裹在 `Task`（或 `Task.detached`）中。编译通过的修正方法如清单\
  \ 6-4 所示。\n\n```\nfunc addGames(to library: VideogameLibrary) {\n    let zelda5\
  \ = Videogame(title: \"塞尔达传说：时之笛\", releaseYear: 1998, company: \"Nintendo\")\n\
  \    let zelda6 = Videogame(title: \"塞尔达传说：姆吉拉的假面\", releaseYear: 2020, company:\
  \ \"Nintendo\")\n    let tales1 = Videogame(title: \"仙乐传说\", releaseYear: 2004,\
  \ company: \"Namco\")\n    let tales2 = Videogame(title: \"深渊传说\", releaseYear:\
  \ 2005, company: \"Namco\")\n    let eternalSonata = Videogame(title: \"永恒终焉\",\
  \ releaseYear: 2008, company: \"tri-Crescendo\")\n    let games = [zelda5, zelda6,\
  \ tales1, tales2, eternalSonata]\n    Task {\n        await library.add(games: games)\n\
  \    }\n}\n清单 6-4\n与 actor 交互需要在异步上下文中进行\n```\n\n当对 `add(games:)` 方法执行多次调用时，actor\
  \ 每次只会执行其中一个调用。在清单 6-5 中，我们创建了一个新方法，用于向库中添加更多游戏。\n\n```\nfunc addNewGames(to library:\
  \ VideogameLibrary) {\n    let pokemon1 = Videogame(title: \"宝可梦 黄\", releaseYear:\
  \ 1998, company: \"Game Freak\")\n    let pokemon2 = Videogame(title: \"宝可梦 金\"\
  , releaseYear: 1999, company: \"Game Freak\")\n    let pokemon3 = Videogame(title:\
  \ \"宝可梦 红宝石\", releaseYear: 2002, company: \"Game Freak\")\n    let games = [pokemon1,\
  \ pokemon2, pokemon3]\n    Task {\n        await library.add(games: games)\n   \
  \ }\n}\n清单 6-5\n向库中添加更多游戏\n```\n\n现在我们有两个添加游戏的方法。让我们尝试调用它们，如清单 6-6 所示。\n\n```\n\
  addGames(to: library)\naddNewGames(to: library)\n清单 6-6\n调用两个将调用 actor 的方法\n```\n\
  \n此时情况变得有趣起来。我们无法保证 `addGames` 或 `addNewGames` 中的游戏哪个会先被添加。但可以保证的是，无论哪个先执行，actor\
  \ 都会确保其中一个函数中的所有游戏在另一个函数开始运行之前全部添加到数组中。因此，数组要么先包含 `addGames` 中的所有游戏（按添加顺序），再包含 `addNewGames`\
  \ 中的游戏（按添加顺序）；要么先包含 `addNewGames` 中的游戏（按添加顺序），再包含 `addGames` 中的游戏（同样按正确顺序）。游戏绝不会以交错顺序或任何类似混乱的方式被添加。\n\
  \n此外，对整个 actor 状态的访问是同步的。如果有人正在向库中添加游戏，同时另有人正在查询集合，actor 只会执行其中一个调用，直到完成。清单 6-7\
  \ 将创建三个不同的任务：两个用于添加游戏，一个用于按给定年份过滤游戏并打印其数量。\n\n```\nTask {\n    addGames(to: library)\n\
  }\nTask {\n    let games1998 = await library.fetchGames(by: 1998)\n    print(\"\\\
  (games1998.count) games\")\n}\nTask {\n    addNewGames(to: library)\n}\n清单 6-7\n\
  从不同任务访问 actor\n```\n\n`addGames` 中有一款 1998 年发布的游戏。`addNewGames` 中也有一款 1998 年发布的游戏。总计，该年份共有两款游戏。理想情况下，上述代码会打印\
  \ `2 games`，但由于这些任务试图并发访问 actor，三个任务中只有一个会先执行其内容。如果尝试运行这段代码，你会发现它大多数时候打印 `0 games`，有时也可能打印\
  \ `1 games`。互斥访问意味着同一时间只有一个人能进入 actor 并完成其工作，无论调用 actor 的哪个方法。任何对 actor 的调用都会阻塞它，直到其工作完成。\n\
  \n这也是一个向您展示任务优先级如何工作的好机会。您可以通过为添加游戏的任务分配更高的优先级来告诉编译器您希望这些游戏先被添加。清单 6-8 更改了任务的优先级。`.utility`\
  \ 是尽可能最低的优先级，因此在这种情况下，它*大多数时候*会最后执行，打印 `2 games`。\n\n```\nTask(priority: .high)\
  \ {\n    addGames(to: library)\n}\nTask(priority: .utility) {\n    let games1998\
  \ = await library.fetchGames(by: 1998)\n    print(\"\\(games1998.count) games\"\
  )\n}\nTask(priority: .high) {\n    addNewGames(to: library)\n}\n清单 6-8\n为任务分配优先级\n\
  ```\n\n\n\n### 对 Actor 的非隔离访问\n\n有时你可能知道访问某个 actor 不会引发数据竞争。针对这些情况，你可以将 Actor 中的某些方法标记为\
  \ `nonisolated`。\n\n为了演示这一点，我们将为 `VideogameLibrary` 添加一个新类型和属性，即拥有者信息。代码清单 6-9 展示了这个新类型。\n\
  \n```\nstruct Owner {\n    let name: String\n    let favoriteGenre: String\n}\n\
  ```\n\n现在我们将修改该 Actor，使其拥有这个新属性以及一个初始化器。代码清单 6-10 展示了这些修改。\n\n```\nactor VideogameLibrary\
  \ {\n    var videogames: [Videogame] = []\n    let owner: Owner\n\n    init(owner:\
  \ Owner) {\n        self.owner = owner\n    }\n\n    func fetchOwnerInfo() -> String\
  \ {\n        return \"\\(owner.name) (\\(owner.favoriteGenre))\"\n    }\n    //...\n\
  }\n```\n\n请注意，我们还添加了一个 `fetchOwnerInfo` 方法。这有助于我们获取一个包含拥有者姓名和喜爱游戏类型的拼接字符串。\n\n最后，代码清单\
  \ 6-11 使用这个新类型初始化了该库。\n\n```\nlet owner = Owner(name: \"Andy Ibanez\", favoriteGenre:\
  \ \"JRPG\")\nlet library = VideogameLibrary(owner: owner)\n```\n\n现在，如果你想调用 `fetchOwnerInfo`\
  \ 方法，则需要像代码清单 6-12 那样异步调用它。\n\n```\nTask {\n    let ownerInfo = await library.fetchOwnerInfo()\n\
  \    print(ownerInfo)\n}\n```\n\n但在这个例子中，我们知道同步访问拥有者信息并无风险。由于它是一个不可变的结构体，我们完全应该能够在不使用\
  \ `await` 的情况下调用它。我们可以告诉编译器这个方法是非隔离的，这样我们就可以像调用其他方法一样调用它。代码清单 6-13 展示了如何实现。\n\n\
  ```\nnonisolated func fetchOwnerInfo() -> String {\n    return \"\\(owner.name)\
  \ (\\(owner.favoriteGenre))\"\n}\n```\n\n正因如此，我们不仅可以去掉了 `await` 关键字（如果保留了它，你会收到一条有用的警告），而且也不再需要在异步上下文中调用此方法。在代码清单\
  \ 6-14 中，我们创建了一个新方法，用于打印 `VideogameLibrary` 的拥有者信息。请注意，该函数并非 `async`，它没有使用 `Task`，并且\
  \ `fetchOwnerInfo` 方法也不再需要被等待。\n\n```\nfunc printOwnerInfo(of library: VideogameLibrary)\
  \ {\n    let ownerInfo = library.fetchOwnerInfo()\n    print(ownerInfo)\n}\n```\n\
  \n### Actor 与协议遵循\n\n如果你计划让你的 Actor 遵循某个协议，甚至通过扩展来遵循它，需要牢记一个重要事项。\n\n当你打算遵循某个协议时，如果该协议包含可变要求，你将会遇到问题。例如，请看代码清单\
  \ 6-15 中的新类型。\n\n```\nactor Game {\n    let name: String\n    let year: Int\n\n\
  \    init(name: String, year: Int) {\n        self.name = name\n        self.year\
  \ = year\n    }\n}\n\nextension Game: Equatable {\n    static func == (lhs: Game,\
  \ rhs: Game) -> Bool {\n        return lhs.name == rhs.name\n    }\n}\n```\n\n我们让这个\
  \ Actor 遵循 `Equatable` 协议，以便能够使用 `==` 运算符比较两个 `Game` 实例。这个例子可以正常编译，因为 `==` 函数依赖于两个不可变属性，而且该函数本身不需要修改我们的\
  \ Actor。\n\n然而，请考虑代码清单 6-16 中的遵循情况。\n\n```\nextension Game: Hashable {\n    func\
  \ hash(into hasher: inout Hasher) {\n    }\n}\n```\n\n直接尝试使用这种遵循方式会导致 Swift 报错，提示\
  \ Actor 隔离的方法 `hash(into:)` 无法满足协议要求。编译器期望 `hash(into:)` 是一个同步操作。\n\n在这种情况下，我们可以通过给方法添加\
  \ `nonisolated` 关键字来轻松解决问题。代码清单 6-17 添加了缺失的关键字。\n\n```\nextension Game: Hashable\
  \ {\n    nonisolated func hash(into hasher: inout Hasher) {\n    }\n}\n```\n\n这确实能满足编译器的要求，但你应该始终停下来思考一下这样做是否合理。`hash(into:)`\
  \ 方法是否会依赖于被隔离的属性？如果是，那么你实现此方法的任何尝试都可能会出错。你可能会发现，要让 Actor 遵循那些要求其方法为同步的协议，并非易事。\n\
  \n\n\n## Actor 重入问题\n\n当我们进入一个 Actor 时，如果它有很多工作要做，可能会挂起并调用其他异步方法。这会导致一个常见问题，即 Actor\
  \ 重入问题（Actor Reentrancy problem）。\n\nActor 重入问题发生在你假设程序在遇到 `await` 调用之前保持整体状态时。让我们通过一个例子来解释。我们将为现有的\
  \ `VideogameLibrary` Actor 添加一个新方法。清单 6-18 展示了这个新方法。\n\n```\nfunc addGamesAndPrintResults(_\
  \ games: [Videogame]) async throws {\n    let existingGameCount = videogames.count\n\
  \    // 假设这里正在执行一个长时间运行的操作。\n    try await Task.sleep(nanoseconds: 1_000_000_000)\n\
  \    add(games: games)\n    let newGameCount = existingGameCount + games.count\n\
  \    print(\"添加前的游戏数量: \\(existingGameCount)\")\n    print(\"现在的游戏数量: \\(newGameCount)\"\
  )\n}\n```\n\n*清单 6-18 — `addGamesAndPrintResults` 方法展示了 Actor 重入问题*\n\n这个新方法将：\n\
  \n1.  获取当前游戏库中的游戏数量。\n2.  休眠并等待任务一秒钟。\n3.  向游戏库中添加游戏。\n4.  打印添加新游戏之前的游戏数量。\n5. \
  \ 打印现在的游戏数量。\n\n当多个任务同时访问此方法时，就会发生 Actor 重入问题。当一个任务访问它时，它会将当前游戏数量存储在 `existingGameCount`\
  \ 变量中。然后它会遇到一个耗时的 `await` 调用。与此同时，第二个任务可能访问此方法，并将游戏数量存储在一个新的 `existingGameCount`\
  \ 变量中。如果第一个任务在第二个任务离开 await 之前完成，那么第二个任务中的 `existingGameCount` 变量将持有错误的数据，因为游戏库中的游戏比之前更多了。\n\
  \n为了更好地说明这个问题，请看图 6-1。\n\n![](img/532302_1_En_6_Fig1_HTML.png)\n\n*一个模型图展示了 `andysLibrary`、任务\
  \ 1 和任务 2，其中包含 `videogames.count` 等于 3，以及任务 1 和任务 2 内部的代码。*\n\n*图 6-1 — Actor 重入问题的图示*\n\
  \n两个任务正在访问 Actor 以添加更多游戏。我们假设游戏库中已有 3 款游戏。第一个任务添加了 4 款游戏，第二个任务添加了 2 款。在执行结束时，任务\
  \ 1 将打印现在有 7 款游戏，任务 2 将打印现有 5 款。但两个任务同时进入，我们知道 Actor 可以防止状态同时被修改。因此，其中一个任务打印了错误的数据。\n\
  \n每个任务打印结果时，都表现得像是唯一访问并打印该 Actor 的任务。如果任务 1 在任务 2 之前完成，任务 2 应该知道游戏库实际上有 7 款游戏，因此它应该总共打印出\
  \ 11 款游戏。\n\n这里的问题在于，我们在进入 `await` 调用之前就假设了游戏的数量。无法保证在离开挂起点后，程序的状态会和之前一样。我们在 `await`\
  \ 调用*之前验证了我们的假设*。\n\n不幸的是，在这种情况下 Actor 无法保护你。这纯粹是一个逻辑问题，取决于开发者。但一个好的经验法则是，你应该在 `await`\
  \ 调用*之后*验证你的假设。在这种情况下，我们的假设是游戏库中的游戏数量。如果我们从挂起返回后再计算这个值，会更有意义。只需移动 `existingGameCount`\
  \ 变量，程序就能被修复。清单 6-19 将 `existingGameCount` 变量放在了更合理的位置。\n\n```\nfunc addGamesAndPrintResults(_\
  \ games: [Videogame]) async throws {\n    // 假设这里正在执行一个长时间运行的操作。\n    try await\
  \ Task.sleep(nanoseconds: 1_000_000_000)\n    let existingGameCount = videogames.count\n\
  \    add(games: games)\n    let newGameCount = existingGameCount + games.count\n\
  \    print(\"添加前的游戏数量: \\(existingGameCount)\")\n    print(\"现在的游戏数量: \\(newGameCount)\"\
  )\n}\n```\n\n*清单 6-19 — 将假设移至更合适的位置*\n\n通过将我们的假设移至 await 调用之后，任务 1 和任务 2 每次调用可能仍会打印不同的结果，但可以肯定的是，无论谁先完成，后完成的任务都将拥有所有正确的数据来呈现给用户。\n\
  \n## Actor 与分离任务\n\n回想一下，分离任务不会从父任务继承任何内容，包括父任务可能正在其上运行的 Actor。Actor 不会被继承。考虑清单\
  \ 6-20 中添加到 `VideogameLibrary` 的新方法。\n\n```\nfunc playRandomGame() {\n    guard\
  \ let game = videogames.randomElement() else { return }\n    print(\"正在玩 \\(game.title)\"\
  )\n}\n\nfunc playRandomGameLater() {\n    Task.detached {\n        await self.playRandomGame()\n\
  \    }\n}\n```\n\n*清单 6-20 — 从分离任务启动 Actor 方法*\n\n`playRandomGame` 方法被隔离到 Actor\
  \ 中。但请注意，`playRandomGameLater` 要求我们使用 `await` 调用 `self.playRandomGame()`。这是因为一旦我们启动分离任务，我们就跳转到了另一个\
  \ Actor。处于不同的 Actor 将迫使我们使用 await 来调用该 Actor 的方法。\n\n## 使用 Actor 的一般性建议\n\nActor\
  \ 非常适合存在共享可变状态的情况。它使得从多个部分访问可变数据变得容易，但它绝非万能灵药。\n\n为了有效使用 Actor，这里列出一些我建议你在使用 Actor\
  \ 时牢记的提示：\n\n1.  **让你的 Actor 尽可能小。** 虽然 Actor 会借助 Swift 编译器保护你免受许多误用，但它无法保护你免受 Actor\
  \ 重入等问题的影响。保持 Actor 小巧有助于你有效地使用它们。\n\n2.  **保持你 Actor 的所有操作是*原子性*的。** 原子性操作被视为一个单一单元。保持方法简短有助于实现这一点。通常，原子性意味着要么一次性完成所有工作，要么如果单个操作失败，整个操作将被丢弃。尽可能避免在\
  \ Actor 内部使用 `await` 调用有助于实现原子性。\n\n3.  **所有关于所需状态的假设，在 Actor 方法内部使用时，应该放在 `await`\
  \ 调用之后。** 如果你的方法只包含一个 await 调用，这很容易做到，但如果有多个 await 调用，则可能难以推断程序的状态。\n\n4.  **不要在\
  \ SwiftUI 中将 Actor 用作 `ObservableObject`。** 编译器允许你这样使用，但 `ObservableObject` 会期望它始终在主线程上运行。拥有包含昂贵调用的\
  \ Actor 将导致你的 SwiftUI 应用出现明显的延迟。\n\n\n\n## 总结\n\n本章我们学习了参与者引用类型。当程序中需要共享可变状态时，这些类型非常有用。共享可变状态是指多个进程可能异步访问的数据。允许对可变数据进行异步访问是危险的，可能导致数据损坏。参与者拥有一种机制，能自动将其自身状态与程序其他部分隔离，并提供同步访问，从而防止其数据被多个进程同时写入，避免读取损坏。我们可以通过使用\
  \ `nonisolated` 关键字，对特定方法选择退出这种隔离行为。\n\n由于参与者的隔离特性，除非方法被标记为 `nonisolated`，否则对参与者外部的所有调用都必须使用\
  \ `await` 关键字异步完成。如果未使用 `await`，Swift 编译器会报错，阻止你同步访问参与者。\n\n由于参与者是常规类型，它们可以遵循协议，并具有与类类似的行为。两者主要区别在于参与者的隔离性。如果要遵循协议，需要留意协议对可变性或其他可能要求某些遵循项为\
  \ `nonisolated` 的要求。并非总是能遵循所有协议，因为将某些方法标记为 `nonisolated` 可能会妨碍我们获得期望的行为。\n\n"
- "# 7. 可发送类型\n\n最简单的并发程序即使处理并发也相当独立。但在复杂程序中，你需要跨隔离边界传递数据，从一个异步任务到另一个异步任务，从一个参与者到另一个参与者。数据需要是线程安全的。正如我们在参与者中学到的，跨异步域共享可变数据可能导致数据竞争，进而造成数据损坏。\n\
  \nSwift 需要一种定义安全跨隔离边界共享数据的方式。Swift Evolution 的成员提出了一个非常优雅的解决方案，引入了可发送类型。\n\n## 理解可发送类型\n\
  \n可发送类型可以跨异步任务和参与者共享。根据定义，可发送类型需要防止数据竞争。此类类型应无法同时被多个操作修改。它们只能提供同步访问。\n\nSwift 默认提供了一些可安全用于并发的可发送类型，包括：\n\
  \n1.  **值类型**。只要不包含任何不可发送的属性，枚举和结构体等值类型就是可发送的。正如我们在讨论参与者时所述，值类型是不可变的。如果尝试修改值类型，会创建一个包含新数据的新副本。这使得结构体和枚举可以在新的并发系统中即开即用。可能会创建多个副本，但现有副本在删除前始终按原样存在。\n\
  \n2.  **参与者**。参与者是为了共享可变数据而创建的，因此其存在的全部意义就是在新的并发模型中使用。你可以在没有任何约束的情况下跨隔离边界共享参与者，但需注意它们可能具有\
  \ `nonisolated` 功能。参与者始终是可发送的。\n\n3.  **类**。类*可以*被设为可发送，但需要满足某些约束。回想一下，类是引用类型，对类实例的任何修改都是对真实数据的修改。与结构体不同，不会创建副本。标记为\
  \ `final` 且只有只读属性的类，很容易被设为可发送。如果类包含可变属性且未标记为 private，另一种使其可发送的方法是在类内部实现自己的同步机制。这听起来很难——也确实如此。\n\
  \n4.  **方法和闭包**可以显式地设为可发送。\n\n在许多情况下，Swift 可以推断类型的可发送性。结构体和参与者就是例子。但如果你手动将类变为线程安全，Swift\
  \ 无法识别，并会阻止你以编译器认为危险的方式使用它。\n\n### 可发送协议\n\nSwift 中除值类型和参与者之外的可发送类型都遵循 `Sendable`\
  \ 协议。仅需遵循此协议，编译器就会检查你对可发送类型的使用，确保你不会以可能导致数据竞争的方式使用它们。\n\n#### 分析可发送类型\n\n为了更好地理解可发送类型的行为，我们将对其进行分析，了解其特殊之处和需注意的事项。\n\
  \n\n\n### 结构体\n\n大多数情况下，结构体默认是可发送的。但在某些情况下它们无法做到。假设我们有一个结构体，其属性包含一个类类型，如代码清单 7-1\
  \ 所示。\n\n```swift\nclass TVShow {\n    let title: String\n    var rating: Int\n\
  \    init(title: String, rating: Int) {\n        self.title = title\n        self.rating\
  \ = rating\n    }\n}\nstruct TVShowLibrary {\n    var shows: [TVShow] = []\n}\n\
  ```\n\n*代码清单 7-1 一个属性为类数组的结构体*\n\n这段代码声明了一个结构体 `TVShowLibrary`，其唯一属性是一个 `TVShow`\
  \ 数组。然而，`TVShow` 是一个可变类。我们很可能希望在观看电视剧几个月后修改其评分。\n\n如果你尝试用这个结构体跨越隔离边界（例如，在非隔离上下文中声明一个\
  \ `TVShowLibrary` 并在 `Task.detached {}` 中捕获它），编译器会阻止你，即使它是结构体。普通的 `Task {}` 捕获不会受到影响，因为它们会继承自顶层上下文的\
  \ Actor，在本例中即 `@MainActor`。在代码清单 7-2 中，我们声明了一个 `TVShowLibrary` 实例，然后在两个 `Task` 中捕获它。\n\
  \n```swift\nvar tvShowLibrary = TVShowLibrary()\nlet show = TVShow(name: \"Card\
  \ Captor Sakura\")\ntvShowLibrary.shows += [show]\nTask {\n    tvShowLibrary.shows.first?.rating\
  \ = 20\n    print(\"Current score Task 1: \\(tvShowLibrary.shows.first!.rating)\"\
  )\n}\nTask {\n    tvShowLibrary.shows.first?.rating = 30\n    print(\"Current score\
  \ Task 2: \\(tvShowLibrary.shows.first!.rating)\")\n}\n```\n\n*代码清单 7-2 在任务中捕获包含非可发送类型的结构体*\n\
  \n直觉上，你可能会认为编译器应该阻止你这样做。毕竟，你正在捕获一个可变值并同时从两个任务中修改它！但这是完全可以接受的，因为两个 `Task` 调用都拥有与启动它们的\
  \ Actor 相同的 Actor。如果你从非异步上下文中启动这些任务，它们将继承主 Actor。\n\n并且输出结果将始终如你所预期。上面的任务总会打印评分为\
  \ 20，下面的任务总会打印评分为 30。不会发生竞态条件。\n\n结构体默认是可发送的，除非它们包含同样不可发送的属性。我们的 `TVShowLibrary`\
  \ 对象是不可发送的，因为它包含一个 `TVShow` 数组。`TVShow` 是一个类，默认是不可发送的。由于 `TVShow` 不可发送，整个 `TVShowLibrary`\
  \ 也就不可发送了。如果我们把代码清单 7-2 中的 `Task {}` 调用改为分离任务，就能更清晰地观察到这种行为。代码清单 7-3 展示了这一改动。\n\n\
  ```swift\nvar tvShowLibrary = TVShowLibrary()\nlet show = TVShow(name: \"Card Captor\
  \ Sakura\")\ntvShowLibrary.shows += [show]\nTask.detached {\n    tvShowLibrary.shows.first?.rating\
  \ = 20\n    print(\"Current score Task 1: \\(tvShowLibrary.shows.first!.rating)\"\
  )\n}\nTask.detached {\n    tvShowLibrary.shows.first?.rating = 30\n    print(\"\
  Current score Task 2: \\(tvShowLibrary.shows.first!.rating)\")\n}\n```\n\n*代码清单\
  \ 7-3 从分离任务中捕获可变非可发送类型*\n\n这下就有意思了。由于 `Task.detached` 不会继承顶层上下文的 Actor，每个任务都完全独立运行。这必然会导致数据竞争，而\
  \ Swift 会保护你免受其害。图 7-1 展示了你会遇到的错误。\n\n![屏幕截图显示了 TVShow 代码，包含变量 tv show library 和两次声明的\
  \ Task.detached，其中任务 1 和任务 2 被高亮以指示引用。](img/532302_1_En_7_Fig1_HTML.png)\n\n*图 7-1\
  \ 编译器保护你免受数据竞争*\n\n> **注意**\n> Xcode 13 和 Xcode 14 在此场景下的行为存在差异。在 Xcode 13 中，你会得到图\
  \ 7-1 所示的错误。在 Xcode 14 中，你会得到相同的提示信息，但显示为警告。\n\n在这种情况下，最合理的解决方案是将 `TVShowLibrary`\
  \ 改为 Actor，而非结构体。这正是一个 Actor 的完美使用场景，因为多个任务都需要修改它。\n\n### 类\n\n类默认是不可发送的。但是，当类被标记为\
  \ `final` 且拥有只读属性时，你可以使其遵循 `Sendable` 协议。你可以将 `TVShow` 标记为遵循 `Sendable`，这样代码就能编译通过，但并非毫无警告。图\
  \ 7-2 展示了尝试这样做时会得到的警告。\n\n![屏幕截图显示了类 TV Show 的代码，包含七行代码，其中第一行和第二行有一些错误被高亮。](img/532302_1_En_7_Fig2_HTML.png)\n\
  \n*图 7-2 使类符合可发送性*\n\n将类标记为 `final` 会消除顶部的警告，但无法消除底部的警告。将 `rating` 改为 `let` 变量会消除底部的警告，但此后我们就无法修改评分了。根据经验法则，如果你有需要可发送的类，将其标记为\
  \ `final` 并使所有属性变为只读是可行的方法，但这里的情况并不允许这样做。\n\n最终，解决这个类问题的唯一方法是选择退出编译器的安全检查。为此，请在遵循\
  \ `Sendable` 之前添加 `@unchecked` 属性。代码清单 7-4 展示了不会产生任何警告的新 `TVShow` 类。\n\n```swift\n\
  class TVShow: @unchecked Sendable {\n    let name: String\n    var rating: Int =\
  \ 0\n    init(name: String) {\n        self.name = name\n    }\n}\n```\n\n*代码清单\
  \ 7-4 选择退出编译时检查*\n\n需要再次强调，当你使用 `@unchecked` 时，你是在选择退出编译器的检查。由于这个类自身没有同步机制，当多个任务或\
  \ Actor 同时修改它时，**将会**导致数据竞争。你可以通过使用类似 `NSLock` 的机制来添加自己的同步机制。代码清单 7-5 展示了一个非常简单的实现。\n\
  \n```swift\nclass TVShow: @unchecked Sendable {\n    let name: String\n    var rating:\
  \ Int = 0 {\n        willSet {\n            mutex.lock()\n        }\n        didSet\
  \ {\n            mutex.unlock()\n        }\n    }\n    let mutex = NSLock()\n  \
  \  init(name: String) {\n        self.name = name\n    }\n}\n```\n\n*代码清单 7-5 手动实现锁以同步状态*\n\
  \n通过使用锁，我们可以在设置变量之前锁定它，并在设置之后解锁。这个例子足够简单，但更复杂的类则无法享受同样的好处。\n\n> **警告**\n> 我不建议你在生产代码中使用此代码，除非你真正理解锁等并发原语的工作原理。新的并发系统旨在帮助开发者无需关注此类细节。\n\
  \n\n\n### 闭包\n\n在 Swift 中，闭包是**一等公民**。你可以将闭包和函数引用传递到代码的其他部分，随时调用它们。在使用 Swift 集合的\
  \ `filter`、`map` 和 `reduce` 方法时，你可能已经见过这种用法。回顾一下，代码清单 [7-6] 展示了 `filter` 方法的一个简单用法。\n\
  \n```\nlibrary.shows.filter { $0.rating >= 10 && $0.rating <= 30 }\n代码清单 7-6\n使用\
  \ filter 方法\n```\n\n由于你可以在代码的其他部分传递函数和闭包，因此可以很确定它们也应该能够被发送。\n\n无论是函数还是闭包都不能遵循协议，但我们可以使用\
  \ `@Sendable` 属性来代替。当我们使用这个属性时，编译器会明白它不需要为任何内容进行同步，因为 `@Sendable` 函数的主体是可发送的，并且可发送闭包只能捕获可发送的类型。\n\
  \n如果你查看 `Task` 的文档，会发现它的签名与代码清单 [7-7] 中的相同。\n\n```\n@frozen struct Task where Success\
  \ : Sendable, Failure : Error\n代码清单 7-7\nTask 的声明\n\n```\n\n它有一个遵循 `Sendable` 的泛型类型\
  \ `Success`。因此，任务是在 `Sendable` 类型上操作的。现在，让我们看看它的初始化器和 `detached` 静态方法的声明。它们都在代码清单\
  \ [7-8] 中。\n\n```\n@discardableResult init(\npriority: TaskPriority? = nil,\noperation:\
  \ @escaping () async -> Success\n)\n//...\n@discardableResult static func detached(\n\
  priority: TaskPriority? = nil,\noperation: @escaping () async throws -> Success\n\
  ) -> Task\n代码清单 7-8\nTask 的初始化器和 detached 静态方法的声明\n\n```\n\n我们已经确定 `Success` 是遵循\
  \ `Sendable` 的类型。这就是 Swift 施展魔法，确保非可发送类型无法传递到其他并发域的方式。初始化器接受一个返回 `Sendable` 类型的闭包，而\
  \ `detached` 方法返回一个具有相同要求的 `Task`。\n\n我们可以创建自己的具有相同行为的 `Sendable` 函数。代码清单 [7-9]\
  \ 声明了一个带有 `@Sendable` 闭包的方法。该方法会在执行闭包前后打印一些内容。你可以使用这样的函数来对你的方法进行基准测试。\n\n```\nfunc\
  \ logBeginningAndEnd(operation: @Sendable () -> Void) {\nprint(\"调用闭包\")\noperation()\n\
  print(\"闭包结束\")\n}\n代码清单 7-9\n声明一个接受 @Sendable 闭包的方法\n\n```\n\n现在，让我们尝试调用这个方法，并传递一个非可发送的内容。代码清单\
  \ [7-10] 创建了一个新的 `TVShowLibrary` 实例，并使用这个方法。\n\n```\nvar tvShowLibrary = TVShowLibrary()\n\
  logBeginningAndEnd {\nlet showsCount = tvShowLibrary.shows.count\nprint(\"\\(showsCount)\
  \ 部节目\")\n}\n代码清单 7-10\n调用一个捕获非可发送类型的 @Sendable 闭包\n\n```\n\n编译器不会让你编译通过，你会看到与图\
  \ [7-1] 中相同的错误。\n\n在 Swift 中，你可以将实际函数传递给闭包参数。代码清单 [7-11] 尝试将一个函数传递给一个期望闭包的方法，但我们传递的函数不是\
  \ `@Sendable` 的。\n\n```\nfunc doSomething() {\n}\nlogBeginningAndEnd(operation:\
  \ doSomething)\n代码清单 7-11\n将非可发送函数传递给可发送闭包\n\n```\n\nSwift 在这里也会保护你，但会给出一个警告。Swift\
  \ 会警告你：“将非可发送函数值转换为 `@Sendable () -> Void` 可能会引入数据竞争”。\n\n因此，如果你确定你的函数可以在不同线程间共享，别忘了将它们标记为\
  \ `@Sendable`，这样系统就不会发送任何不必要的警告，就像代码清单 [7-12] 那样。\n\n```\n@Sendable func doSomething()\
  \ {\n}\n代码清单 7-12\n将 doSomething 函数标记为 Sendable 将消除警告\n\n```\n\n当然，不要把你所有的函数或方法都标记为\
  \ `@Sendable`。只有当你确定这些函数在不同并发域中使用是安全的，并且你打算这样使用它们时，才这样做。\n\n最后，如果你有一个可以存储闭包的变量，你也可以将其约束为\
  \ `@Sendable` 闭包。代码清单 [7-13] 声明了一个类，该类有一个属性可以存储 `@Sendable` 闭包。\n\n```\nclass MyClass\
  \ {\nvar aClosure: @Sendable () -> Void\ninit(aClosure: @escaping @Sendable () ->\
  \ Void) {\nself.aClosure = aClosure\n}\n}\n代码清单 7-13\n声明一个可以存储 @Sendable 闭包的变量\n\
  \n```\n\n最后，当你将闭包传递给方法，并且希望该闭包是 `@Sendable` 时，可以在闭包顶部使用 `@Sendable in` 语法来标记它。代码清单\
  \ [7-14] 将一个显式的 `@Sendable` 闭包传递给了 `MyClass` 的初始化器。\n\n```\nlet myObject = MyClass\
  \ { @Sendable in\nlet a = 3\n}\n代码清单 7-14\n使用 @Sendable in 语法\n\n```\n\n在这个特定示例中，没有必要这样做，因为\
  \ `MyClass` 已经将该闭包视为 `@Sendable`，但在某些情况下这会很有用，比如我们讨论异步序列时。\n\n## 总结\n\n在本章中，你学习了\
  \ Swift 用于确保数据不能在不同并发域或不同线程之间被修改的机制。类型层面的 `Sendable` 协议和 `@Sendable` 属性帮助我们告诉编译器，允许在并发域之间共享数据，因为它们已经受到保护，可以避免数据竞争。许多类型（例如只读结构体和\
  \ `actor` 类型）默认会自动遵循该协议。当尝试在不同线程间共享这些类型时，Swift 会检查其 `Sendable` 遵循性。如果我们的类型是可发送的，但\
  \ Swift 编译器无法推断出来，我们可以将其标记为 `@unchecked @Sendable`，以告诉 Swift 这确实是一个可发送类型，但我们需要负责同步其内部状态。\n\
  \n"
- "# 主执行者与最终执行者\n\n在第 [6] 章中，我们学习了执行者。执行者是同步自身内部状态的引用类型，因此从不同线程修改它们是安全的。这是通过保证一次只有一个任务或线程可以修改执行者的状态来实现的。执行者是在并发上下文中使用的可发送类型。执行者是你实例化的类型，并且在大多数情况下，可以像普通类一样对待。但是，当我们*需要*某些总是保证在同一个线程上运行，但可能分布在甚至不同文件中时，会发生什么呢？\n\
  \n在学习全局执行者之前，我想谈谈我们的老朋友：主线程。我现在想讨论这个，是因为它与本章的主题相关。\n\n\n\n## 主线程\n\n如果你为苹果平台编程已有一段时间，一定对主线程（The\
  \ Main Thread）有所了解。如果这是你第一次听说它，别担心，我们将在本节中重温这个概念。主线程的唯一职责是运行你的 UI 代码。无论是要更新标签、为视图添加颜色，还是切换开关，你都需要在主线程上执行这些操作。我们不允许在主线程之外更新\
  \ UI，否则轻则引发警告，重则导致运行时崩溃。当我们运行异步任务时——无论是使用新的并发系统还是 GCD 等旧工具——若想将返回数据显示在 UI 中，就必须在主线程上完成。\n\
  \n由于主线程负责更新 UI，在其上执行任何高开销操作都会导致应用卡顿数秒，或使 UI 出现明显的卡顿和帧率下降。如果应用长时间无响应，系统将自行介入并终止它。正因如此，包括\
  \ `URLSession` 中所有网络调用在内的许多 API，默认都会在独立线程中运行——无论你使用的是这些方法的 `async/await` 版本，还是传统的基于闭包的版本。你*可以*强制让\
  \ `URLSession` 和其他异步 API 在主线程上运行，但绝对不应该这么做，而且我怀疑你永远找不到一个合理的借口。\n\n简而言之，任何与 UIKit（以及扩展的\
  \ SwiftUI）相关的操作都必须在主线程上完成，并且需要避免用高开销任务阻塞主线程。传统上，我们会通过调用类似 `DispatchQueue.main.async`\
  \ 的方式将数据交给主线程处理。这个方法接受一个在主线程上执行的闭包，因此非常适合在此处理 UI 相关操作。`DispatchQueue` 是 GCD 中的一个对象，其静态属性\
  \ `main` 指向始终在主线程上运行的“主队列”。这是一种快速且无痛地返回主线程的方式，既安全又便捷，但若大量使用，也容易形成令人头疼的“末日金字塔”。iOS\
  \ 中以“UI”为前缀的任何对象（如 `UIButton`、`UISwitch`），或 macOS 中的任何 AppKit 对象，都应仅从主线程进行修改。\n\n\
  **提示**\n\n从 Xcode 14 及其附带的所有操作系统版本开始，`UIImage` 和 `UIColor` 是“所有 UI 前缀对象都应从主线程修改”这一规则的特例。自该\
  \ Xcode 版本起，`UIImage` 和 `UIColor` 遵循 `Sendable` 协议，因此可以安全地在不同并发域之间传递。\n\n在现代并发系统中，系统会决定是否在不同的线程中启动你的任务。请记住，我们之前学到：任务在遇到\
  \ `await` 关键字时会暂停，而系统可能会决定在另一个线程中执行该调用。如果发生暂停，你既不知道代码将在何处执行，甚至不知道它会使用哪个线程来交付结果。那么，在使用新并发系统时，我们如何将结果交付到主线程，以便在完成高开销任务后更新\
  \ UI 呢？问得好！\n\n### 主执行器\n\n我终于可以向大家解释一个贯穿本书、却一直难以找到合适时机说明的概念了。没错，我说的就是主执行器（Main\
  \ Actor），在代码中表现为 `@MainActor`。\n\nUIKit 和 SwiftUI 都是庞大的框架。仔细想想，它们由成百上千个类组成，并且很可能分散在框架内的不同文件中。它们都有一个共同要求：任何\
  \ UI 更新都应在主线程上完成。将某个声明标记为 `@MainActor`，意味着该特定功能将在主执行器上运行。`@MainActor` 本质上被视为一种属性。自\
  \ iOS 15、macOS 12、watchOS 8 和 tvOS 16 起，这些框架中的大多数类都已标记为 `@MainActor`。对于 SwiftUI，创建\
  \ `ObservableObjects` 需要手动标记为 `@MainActor`，因为该协议并未自带此标记。将 UIKit、SwiftUI 和 AppKit\
  \ 中的所有对象都标记为 `@MainActor`，是一种确保它们全部在主线程上运行的优雅解决方案。\n\n#### 使用 `@MainActor`\n\n与\
  \ `@Sendable` 属性类似，你也可以在多种场景下使用 `@MainActor`“属性”。首先，你可以将其作为类型声明（如结构体或类）的一部分。代码清单\
  \ 8-1 声明了两种新类型，其中一种被标记为 `@MainActor`。\n\n```\nstruct MusicAlbum {\nlet name: String\n\
  let artist: String\nlet releaseYear: Int\n}\n@MainActor class MusicLibrary {\nvar\
  \ name: String\nvar albums: [MusicAlbum] = []\ninit(name: String) {\nself.name =\
  \ name\n}\n}\n代码清单 8-1\n为类添加 @MainActor\n```\n\n因此，我们对 `MusicLibrary` 实例执行的每一操作也都需要在主执行器上运行。`MusicLibrary`\
  \ 中的每个属性和方法也都会在主执行器上运行。假设你有一个函数 `createLibraryAndAddAlbum`，该函数是在 `MusicLibrary`\
  \ 对象本身之外创建的。你可能会尝试在这个新函数中操作你的音乐库。在代码清单 8-2 中，我们尝试在未运行于 `@MainActor` 上下文中使用该类型。\n\
  \n```\nfunc createLibraryAndAddAlbum() {\nlet library = MusicLibrary(name: \"Andy's\
  \ Library\")\nlet album = MusicAlbum(name: \"Imaginareum\", artist: \"Nightwish\"\
  , releaseYear: 2011)\nlibrary.shows += [album]\n}\n代码清单 8-2\n在非 Main Actor 上下文中操作\
  \ MusicLibrary\n```\n\n如果尝试编译，你会遇到与尝试在并发域之间发送非 Sendable 类型时非常相似的错误。即：\n\n```\nCall\
  \ to main actor-isolated initializer 'init(name:)' in a synchronous nonisolated\
  \ context\n...\nProperty 'albums' isolated to global actor 'MainActor' can not be\
  \ mutated from this context\n```\n\n通过为 `createLibraryAndAddAlbum` 添加 `@MainActor`，该函数也将在主执行器上运行。这样，`MusicLibrary`\
  \ 和 `createLibraryAndAddAlbum` 函数将在同一执行器（同一线程）上运行，无论它们是否位于同一文件，甚至跨越不同框架。这就是主执行器被称为*全局执行器*的原因。\n\
  \n代码清单 8-3 将能够无错编译。\n\n```\n@MainActor\nfunc createLibraryAndAddAlbum() {\nlet library\
  \ = MusicLibrary(name: \"Andy's Library\")\nlet album = MusicAlbum(name: \"Imaginareum\"\
  , artist: \"Nightwish\", releaseYear: 2011)\nlibrary.albums += [album]\n}\n代码清单\
  \ 8-3\n我们可以将 @MainActor 添加到分散的声明中，即使它们位于不同文件或框架中\n```\n\n如果你位于另一个执行器中，可以调用标记为 `@MainActor`\
  \ 的方法，但这需要异步完成（使用 `await` 或 `async let`），因为 `@MainActor` 会同步所有使用它的声明之间的内部状态。\n\n\
  这正是许多人在使用主执行器时常感困惑的地方。\n\n假设你在 `MusicLibrary` 对象中加入了代码清单 8-4 中的方法。\n\n```\n@MainActor\n\
  func populateFromWebService() async {\nalbums = []\nalbums = try await WebService.shared.albumsFromService()\n\
  }\n代码清单 8-4\n一个用于获取专辑的异步方法\n```\n\n假设 `populateFromWebService` 方法是一个会暂停的长时间运行操作。执行器将在何处执行？\n\
  \n这个长时间运行的操作——即 `populateFromWebService` 函数本身——仍会在另一个线程上运行。你无法预知其运行位置，只知道主执行器上的方法会暂停，线程在其他工作完成后才会返回继续执行。\n\
  \n\n\n在主 actor 本身上执行的，是 `albums` 方法的*赋值*操作。仅仅是赋值。`populateFromWebService` 会在其他地方运行，但其返回数据赋值给\
  \ `self.albums` 的操作则会运行在主 actor 上。许多人都误以为 `populateFromWebService` 本身会在主 actor 上执行。也就是说，如果这个方法正在从某个慢速服务下载\
  \ JSON 数据并解析它，或者执行任何耗时超过几毫秒的操作，它就是在主线程上运行的。这种理解是不正确的，幸运的是，全局 actor 系统比这要智能得多。如果你在\
  \ `@MainActor` 上运行某些内容，要知道它的所有语句都会在主 actor 上运行，但如果它遇到了一个引起挂起的调用，那么触发挂起的操作的执行将在其他地方完成，而数据则会在主线程上返回（并进行赋值）。可以说，`await`\
  \ 的“左侧”会在主线程上执行，而 `await` 关键字的“右侧”则会在其他地方进行。\n\n你不必将整个类或结构体的声明都标记为主 actor。如果你只需要某些属性和方法在主\
  \ actor 上运行，你可以仅将它们标记为 `@MainActor`。代码清单 8-5 修改了 `MusicLibrary` 对象，添加了一个新变量和一个新方法，移除了整个声明中的\
  \ `@MainActor` 标记，并将其添加到了新添加的符号上。\n\n```\nclass MusicLibrary {\n    var name: String\n\
  \    var albums: [MusicAlbum] = []\n    @MainActor var albumCover: UIImage?\n  \
  \  init(name: String) {\n        self.name = name\n    }\n    @MainActor func updateAlbumCover()\
  \ {\n        // ... 从互联网下载新封面\n        // 并更新 albumCover 属性。\n    }\n}\n代码清单 8-5\n\
  仅将部分属性和方法标记为 @MainActor\n```\n\n现在，这个类可以在任何地方使用，但任何我们对 `albumCover` 想要执行的操作，都必须在运行于主\
  \ actor 的上下文中完成。\n\n如果你将整个类隔离到主 actor 上运行（通过将其标记为 `@MainActor class MyClass`...），那么该类将始终在主\
  \ actor 上运行，从其他地方调用它则需要等待。如果你有一些方法需要对主 actor 是 `nonisolated`（非隔离）的（如同常规 actor 定义，全局\
  \ actor 可以拥有非隔离的方法），你可以将其标记为 `nonisolated`，并从任何其他并发上下文中使用它。\n\n代码清单 8-6 将 `MusicLibrary`\
  \ 类标记为在主 actor 上运行，并为其添加了一个 `nonisolated` 方法。\n\n```\n@MainActor\nclass MusicLibrary\
  \ {\n    var name: String\n    var albums: [MusicAlbum] = []\n    @MainActor var\
  \ albumCover: UIImage?\n    init(name: String) {\n        self.name = name\n   \
  \ }\n    nonisolated func libraryPurpose() -> String {\n        \"这个库存放着我最喜欢的歌曲\"\
  \n    }\n}\n代码清单 8-6\n向运行在主 actor 上的类添加 nonisolated 方法\n```\n\n请注意，`nonisolated`\
  \ 方法必须是*真正*隔离的。你不能返回该类中的某个属性派生的属性。我们无法返回 `name`、`albums`，甚至是专辑数量（`albums.count`），因为这些属性都是隔离到主\
  \ actor 上的，我们无法通过非隔离的上下文返回隔离的属性。同样，也不能对存储属性使用 `nonisolated` 关键字。\n\n就像 `@Sendable`\
  \ 一样，我们也可以将闭包和函数标记为 `@MainActor`，以便让它们在主线程上运行。我们已经看到函数如何被标记为 `@MainActor`。对于闭包，你可以使用类似于\
  \ `@Sendable` 的语法，但将 `@Sendable` 替换为 `@MainActor`。总的来说，任何可以使用 `@Sendable` 的地方，也都可以使用\
  \ `@MainActor`。这包括变量闭包声明、作为函数参数的闭包声明等等。\n\n代码清单 8-7 展示了如何将闭包标记为 `@MainActor`。\n\n\
  ```\nTask { @MainActor in\n}\n代码清单 8-7\n将闭包标记为在 @MainActor 上运行\n```\n\n在这个特定示例中，我们声明了一个将在主\
  \ actor 上运行的 Task。我向你展示这个是为了让你看到，你真的可以在任何地方使用 `@MainActor`。除非是为了更新 UI，否则在主线程上运行闭包可能不是一个好主意。\n\
  \n你也可以通过使用静态的 `run` 方法在 `@MainActor` 上运行任何代码。代码清单 8-8 展示了如何做到这一点。\n\n```\nTask {\n\
  \    await MainActor.run {\n        // 更新你的 UI。\n    }\n}\n代码清单 8-8\n在主 actor 上运行代码\n\
  ```\n\n`await` 关键字是必需的。因为我们可能并非处于也在主 actor 上运行的上下文中，所以这些调用需要异步进行。这种在主 actor 上运行代码的方法很有用。如果你不得不继续编写基于闭包的代码，并且还无法完全迁移到\
  \ `async/await`，你可以使用这种方法快速将信息传递回主线程，而无需使用 GCD 及其 `DispatchQueue.main.async` 方法。\n\
  \n## 理解全局 Actor\n\n要理解什么是全局 actor，最简单的方法就是理解主 actor。\n\n正如我们之前所说，主 actor 是一个全局 actor。全局\
  \ actor 可以应用于各种声明，即使它们位于框架中的不同文件里。之前我们提到过，UIKit（除了 SwiftUI 之外创建 iOS 应用的主要框架）及其 macOS\
  \ 对应框架 AppKit，它们的类型分散在不同的文件中。必须有一种方法可以确保这些 UI 类以与新的 Swift 并发系统良好协作的方式在主线程上运行。\n\n\
  一个可以跨不同声明应用的 actor（即使它们位于不同文件中）就是*全局 actor*。正如你本章所见，主 actor 是在 Apple 平台上开发现代并发应用的一个非常重要的组成部分，因为它为我们提供了一种在主线程上执行工作以更新\
  \ UI 的方式。主 actor 将同步所有对其的访问，以确保所有 UI 更新都能正确完成，且没有竞态条件。\n\n`@MainActor` 是 Apple 提供给我们的一种全局\
  \ actor。它很出色，能完成它的工作，但我们可以创建自己的全局 actor 吗？答案是响亮的：可以！\n\n\n\n### 创建全局 Actor\n\n您可以创建自己的全局\
  \ Actor，使其与程序的其他部分隔离，就像 `@MainActor` 将其状态隔离到主线程以进行 UI 更新一样。为此，声明一个将用作属性的结构体，并为其赋予一个名为\
  \ `shared` 的静态属性。同时使用 `@globalActor` 属性标记此结构体。\n\n列表 8-9 声明了一个名为 `@MediaActor` 的全局\
  \ Actor。\n\n```\n@globalActor\nstruct MediaActor {\n    actor ActorType { }\n  \
  \  static let shared: ActorType = ActorType()\n}\n列表 8-9\n声明我们自己的全局 Actor\n```\n\
  \n现在，我们标记为 `@MediaActor` 的所有内容都将在同一个 Actor 上运行，自动同步全局 Actor 的状态，并确保不会发生数据竞争。在此示例中，我们将其命名为\
  \ `MediaActor`，但您可以根据应用程序上下文为您的 Actor 命名任何合适的名称，例如 `@DatabaseActor`。\n\n在列表 8-10\
  \ 的示例中，我们将创建一个全局的 `Videogame` 数组。然后，我们将从多个不同的位置对其进行读写，以展示我们的 `@MediaActor` 的实际运行情况。\n\
  \n```\nstruct Videogame {\n    let id = UUID()\n    let name: String\n    let releaseYear:\
  \ Int\n    let developer: String\n}\n@MediaActor var videogames: [Videogame] = []\n\
  列表 8-10\n创建一个新对象以及一个在我们的 MediaActor 上运行的全局变量\n```\n\n注意\n\n在此示例中，`videogames` 是一个全局变量。通常，我不赞同这样使用全局变量，但我认为这是一个学习全局\
  \ Actor 的极好示例。\n\n现在，假设您有一个视图控制器，可以在其中对此数组执行操作。我们可以添加一个随机电子游戏、移除一个随机电子游戏以及检索一个随机电子游戏的信息。列表\
  \ 8-11 展示了这样一个视图控制器的精简版本。\n\n```\n@MainActor\nclass ViewController: UIViewController\
  \ {\n    @MediaActor\n    func addRandomVideogames() {\n        let zeldaOot = Videogame(name:\
  \ \"The Legend of Zelda: Ocarina of Time\", releaseYear: 1998, developer: \"Nintendo\"\
  )\n        let xillia = Videogame(name: \"Tales of Xillia\", releaseYear: 2013,\
  \ developer: \"Bandai Namco\")\n        let legendOfHeroes = Videogame(name: \"\
  The Legend of Heroes: A Tear of Vermilion\", releaseYear: 2004, developer: \"Nihon\
  \ Falcom\")\n        videogames += [zeldaOot, xillia, legendOfHeroes]\n    }\n \
  \   @MediaActor\n    func removeRandomvideogame() {\n        if let randomElement\
  \ = videogames.randomElement() {\n            videogames.removeAll { $0.id == randomElement.id\
  \ }\n        }\n    }\n    @MediaActor\n    func getRandomGame() -> Videogame? {\n\
  \        return videogames.randomElement()\n    }\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        Task {\n            await addRandomVideogames()\n\
  \            await removeRandomvideogame()\n            if let randomGame = await\
  \ getRandomGame() {\n                print(\"Random game: \\(randomGame.name)\"\
  )\n            }\n        }\n    }\n}\n列表 8-11\n添加操作以处理 videogames\n```\n\n这看起来有很多内容需要解析，但实际上非常直接。\n\
  \n首先，`class ViewController` 声明被标记为 `@MainActor`。在所有随 Xcode 13 发布的 OS 版本中，我们不需要将\
  \ `@MainActor` 属性添加到类，但我决定添加它，以便您能看到一个声明可以包含多个在不同 Actor 上运行的符号。此类的大部分内容将在 `@MainActor`\
  \ 上运行，但 `addRandomVideogames`、`removeRandomVideogame` 和 `getRandomVideogame` 都将在我们新的\
  \ `@MediaActor` 上运行。因为它们都具有我们自己的 `@MediaActor` 属性，所以它们可以与我们之前声明的全局 `videogames`\
  \ 变量交互。并且它们都将以线程安全的方式与其交互，因为它们都隔离在 `@MediaActor` 上。这是一个优美的系统，我们可以标记代码的分布式部分以在同一个线程或\
  \ Actor 上运行，其内部的所有同步将防止我们引入数据竞争。\n\n在 `viewDidLoad` 中，我们将同时运行所有电子游戏操作。我们将添加一个电子游戏，移除一个电子游戏，然后获取一个来打印其信息。将\
  \ `viewDidLoad` 标记为 `@MediaActor` 没有意义，即使我们尝试这样做，也会被阻止，因为已知此方法在大多数实现中会修改 UI。`viewDidLoad`\
  \ 必须在主 Actor 上运行。\n\n由于 `viewDidLoad` 在 `@MainActor` 上运行，而我们所有的电子游戏操作都在 `@MediaActor`\
  \ 上运行，如果我们想从一个全局 Actor 访问另一个全局 Actor，我们需要*异步地*执行此操作。因此，我们使用 `Task {}` 创建一个异步上下文，并且我们需要对每个电子游戏操作使用\
  \ `await`，或者如果合理的话，使用 `async let` 并发调用它。获取电子游戏也是一个异步操作，因此我们可以在 `if let` 的右侧使用 `await`\
  \ 来调用它。\n\n现在，如果我们想有另一个操作这些电子游戏的函数 `showAvailableVideogames`，它可以放在任何地方。假设我们有一个虚构的\
  \ `Functions.swift` 文件，它完全独立于 `ViewController` 和 Actor 声明，我们可以就在那里添加新函数，添加 `@MediaActor`\
  \ 属性，那么在 `@MediaActor` 上运行的任何内容都可以同步与其交互，而在其外部的内容则异步交互。列表 8-12 展示了这个新方法。\n\n```\n\
  @MediaActor\nfunc showAvailableGames() {\n    for game in videogames {\n       \
  \ print(\"\\(game.name)\")\n    }\n}\n列表 8-12\nshowAvailableGames 方法位于其自己的文件中，但仍隔离在\
  \ @MediaActor 中\n```\n\n## 总结\n\n全局 Actor 允许我们标记分布在多个文件和其他逻辑或物理位置（例如不同框架）中的声明，并使它们在同一个线程上运行。我们说这些声明*隔离*于它们所运行的\
  \ Actor。全局 Actor 会同步其所有访问，对于开发者来说，只需像使用属性一样使用全局 Actor，即可确保它们在同一个 Actor 上运行并避免数据竞争。\n\
  \nApple 在其所有具有 UI 的平台（包括 iOS、macOS、watchOS 和 tvOS）上都提供了 `@MainActor` 全局 Actor。每个\
  \ UI 元素，无论它来自 UIKit、AppKit 还是 SwiftUI，都隔离在主 Actor 上运行，如果我们想要更新或刷新 UI，我们需要在运行这些更新之前进入\
  \ `@MainActor`。这将确保所有对主线程的访问都由主 Actor 同步，它会刷新我们的 UI，并且我们不会看到与在主线程之外绘制 UI 相关的警告或错误。\n\
  \n我们可以为自己的功能创建自己的全局 Actor。例如，如果我们有一个与数据库交互的框架，我们可以为它的所有类添加我们自己的全局属性，以确保所有读写操作都发生在同一个线程中，从而避免数据竞争。\n\
  \n"
- "# 9. AsyncSequence\n\n在 Swift 中，我们有*序列 (Sequences)* 的概念。形式上，`Sequence` 是一个协议，那些需要对其元素进行顺序和迭代访问的类型都依赖于此协议。数组遵循\
  \ `Sequence`，因为你可以通过 `for-in` 循环、`forEach` 方法以及像 `filter`、`map` 和 `reduce` 这样的高阶函数来遍历它们。你可以简单地使用数字索引（如\
  \ `myArray[2]`）来访问其元素。字典也非常相似。你可以像遍历数组一样遍历它们的键和值，要访问字典中的元素，你只需调用 `myDictionary[myHashableKey]`。集合的行为类似，你甚至可以实现自己的遵循\
  \ `Sequence` 的类型。\n\n由新的并发系统提供的 `AsyncSequence` 协议，允许我们实现类似的功能，但针对的是异步类型。它是一个叠加了异步性的序列——`AsyncSequence`！\n\
  \n\n\n## AsyncSequence 简介\n\n`AsyncSequence` 的行为与序列（Sequence）几乎一致。你可以对序列执行的所有操作几乎都能对它执行，从迭代到应用高阶函数。它与\
  \ `Sequence` 有一个关键区别：`AsyncSequence` 本身不存储任何值。它不像数组那样将数据存储在内存中。严格来说，它也不是一个值生成器。相反，`AsyncSequence`\
  \ 只是一个接口，允许你在值随时间就绪时，立即访问它们。这些值是异步发出的，因此当它们可用时，你需要使用 `await` 来等待它们。\n\n实际上，我们之前已经使用过\
  \ `AsyncSequence`。回到第 5 章，当时我们在讨论结构化并发时，学习了任务组。任务组允许我们运行数量不定的并发任务，并在一个使用了 `await`\
  \ 的循环中观察它们的结果。回顾一下，代码清单 9-1 是我们当时使用的原始示例之一。\n\n```\n/// 下载数组中的所有图像，并返回本地文件的 URL\
  \ 数组\nfunc download(serverImages: [ServerImage]) async throws -> [URL] {\n    var\
  \ urls: [URL] = []\n    try await withThrowingTaskGroup(of: URL.self) { group in\n\
  \        for image in serverImages {\n            group.addTask(priority: .userInitiated)\
  \ {\n                let imageUrl = try await self.download(image)\n           \
  \     return imageUrl\n            }\n        }\n        for try await imageUrl\
  \ in group {\n            urls.append(imageUrl)\n        }\n    }\n    return urls\n\
  }\n代码清单 9-1\n任务组使用 AsyncSequence 传递其结果\n```\n\n请注意 `\"for try await...\"` 这部分。这个\
  \ `for` 循环正在使用一个 `AsyncSequence`。我们不知道这个 `AsyncSequence` 的具体类型。我们只知道任务组正在运行数量不定的任务，并且随着它们完成，它们会向这个循环传递一个\
  \ `URL` 对象。在组中启动的每个任务完成下载之前，这些 `URL` 是不存在的。但这是如何实现的呢？为了理解 `AsyncSequence` 的工作原理，我们需要先了解序列的一般工作方式。\n\
  \n## 深入浅出序列与异步序列\n\n`for-in` 循环——以及由此引申出的高阶函数——期望有一个 `Sequence` 来工作。`Sequence` 是一个带有一些约束的协议，感兴趣的类型必须采纳它。其中一个要求是实现一个返回迭代器的\
  \ `makeIterator()` 方法。理解迭代器对于理解序列工作原理的基础并非必不可少，因此现在你只需要知道，迭代器是遵循 `IteratorProtocol`\
  \ 协议的类型，而该协议要求实现一个名为 `next()` 的方法，该方法返回序列泛型类型 `Element` 的可选实例。换句话说，如果你的序列是一个 `Int`\
  \ 数组，`next()` 方法将返回一个可选的 Int（`Int?`）。在迭代过程中，循环的每次运行时都会调用此方法，直到没有更多元素可返回（直到它返回 `nil`）。\n\
  \n假设你有代码清单 9-2 中的数组，并且你对其迭代，在每次迭代中打印一个值。\n\n```\nlet myArray = [1, 2, 3, 4, 5]\n\
  for item in myArray {\n    print(item)\n}\n代码清单 9-2\n声明一个数组并迭代它\n```\n\n这个 `for-in`\
  \ 循环将运行 5 个元素，在每次迭代中，局部变量 `item` 将存储由 `next() -> Int?` 返回的一个值。一旦集合返回 `nil`，迭代就会停止，代码将开始在循环下方执行。简而言之，`for-in`\
  \ 迭代仅仅是得益于 `Sequence` 符合性而提供的语法糖。\n\nAsyncSequence 并没有那么不同。主要区别在于，它们没有 `makeIterator`\
  \ 方法，而是有一个 `makeAsyncIterator` 方法，正如你可能已经猜到的那样，该方法返回一个遵循 `AsyncIteratorProtocol`\
  \ 协议的迭代器。该迭代器要求你实现一个 `next() async -> Element?` 方法。因为 `next` 方法是 `async` 的，我们可以在\
  \ `for-in` 循环和高阶函数中使用它。\n\n因此，Sequence 和 AsyncSequence 非常相似。主要区别在于，Sequence 确实存储其数据，而\
  \ AsyncSequence 则随时间从异步源传递数据；并且底层协议分别是非异步和异步的，以支持各自的功能。\n\n## AsyncSequence 具体类型\n\
  \n有多种类型遵循 `AsyncSequence`。通常，你不需要关心底层类型，但了解这一点很有趣，因为这也与普通 Sequence 的操作方式不同。\n\n\
  每当你在 AsyncSequence 上调用高阶函数时，例如 `drop(while:)`、`filter`、`map` 和 `reduce`，都会返回一个全新的遵循\
  \ AsyncSequence 的类型。\n\n如果你在异步序列上调用 `drop(while:)`，你将得到一个 `AsyncThrowingDropWhileSequence`\
  \ 或 `AsyncDropWhileSequence`；使用 `filter` 将返回一个 `AsyncThrowingFilterSequence` 或 `AsyncFilterSequence`，以此类推，适用于你所执行的任何其他高阶函数。它们数量太多，无法一一列举，但你应该明白了。它们可以毫无问题地链式调用。当数组被改变时，普通序列会返回一个\
  \ `ArraySlice<Element>`，因为数组切片是被返回元素的“窗口”，它不包含新数据的副本，只是“查看”新数组中应包含的元素。由于 AsyncSequence\
  \ 不包含数据，在原始序列上拥有“窗口”是没有意义的。相反，这些类型将限制或改变每次迭代中传递的内容，并完全跳过某些迭代。在返回新数据（如 `map`）的数组上的高阶函数，将返回普通的\
  \ `Element` 类型数组。\n\n\n\n## AsyncSequence 示例\n\n虽然我们之前已经使用过`AsyncSequences`，但我准备了一个不依赖任务组的示例。我们将使用`URL`对象的新增`lines`属性，该属性会打开一个文件，并逐行读取，每次迭代返回一行内容。\n\
  \n以下示例读取一个返回某些数据的真实 URL。作为参考，我们将逐行读取的文件内容列在清单 9-3 中。\n\n```\nThe Legend of Zelda:\
  \ Ocarina of Time|1998|10\nThe Legend of Zelda: Majora's Mask|2000|10\nThe Legend\
  \ of Zelda: The Wind Waker|2003|10\nTales of Vesperia|2008|8\nTales of Graces|2011|9\n\
  Tales of the Abyss|2006|10\nTales of Xillia|2013|10\n清单 9-3\n我们将逐行读取的文件\n```\n\n\
  我们有一个与 CSV 文件非常相似的文件。在解析时，我们将创建不同类型的`Videogame`对象，每个对象都包含标题、发行年份和评分。\n\n每一行将被解析为一个`Videogame`对象，该对象定义在清单\
  \ 9-4 中。\n\n```\nStruct Videogame {\nlet title: String\nlet year: Int?\nlet score:\
  \ Int?\ninit(rawLine: String) {\nlet splat = rawLine.split(separator: \"|\")\nself.title\
  \ = String(splat[0])\nself.year = Int(splat[1])\nself.score = Int(splat[2])\n}\n\
  }\n清单 9-4\n一个新的 Videogame 对象\n```\n\n现在让我们进入最有趣的部分。清单 9-5 将负责从 Web 服务器加载游戏数据，并将整个文件解析为一个`Videogame`数组。\n\
  \n```\nFunc loadVideogames() async {\nlet url = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/tutorials/async-await/part11/videogames.csv\"\
  )!\nvar videogames: [Videogame] = []\ndo {\nfor try await videogameLine in url.lines\
  \ {\nif rawVg.contains(\"|\") {\n// 有效的游戏数据\nvideogames += [Videogame(rawLine: videogameLine)]\n\
  }\n}\n} catch {\n// 处理错误\n}\n}\n清单 9-5\n从服务器逐行读取文件\n```\n\n我们通过声明指向文件位置的 URL 开始这个函数。然后，我们声明一个空的`[Videogame]`数组，每当有新游戏数据可用时，我们将它追加到这个数组中。\n\
  \n`for-in`循环等待`String`类型的行（`videogameLine`）。这是因为`url.lines`是一个`AsyncSequence`，我们需要对它进行`await`操作。\n\
  \n每次获取到`videogameLine`时，我们会检查它是否包含管道字符`|`，如果包含，我们将通过将这个原始行传递给`Videogame`初始化器来创建新的游戏对象。`Videogame`初始化器会解析这一行，并在每次迭代中创建一个`Videogame`实例，然后将其追加到`videogames`数组中。\n\
  \n我们需要在`do-catch`代码块中执行此操作，因为我们的文件位于远程服务器上，随时可能发生错误。\n\n如果你已经使用 Swift 编程一段时间，你无疑会注意到我们可以在这里编写更优雅的代码。通过在`url.lines`上使用高阶函数，我们可以编写更符合惯用法的代码，使其更简洁。\n\
  \n在清单 9-6 中，我们为`loadVideogames`提供了一个新的实现，它使用了高阶函数。\n\n```\nFunc loadVideogames()\
  \ async {\nlet url = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/tutorials/async-await/part11/videogames.csv\"\
  )!\nlet videogames =\nurl\n.lines\n.filter { $0.contains(\"|\") }\n.map { Videogame(rawLine:\
  \ $0) }\ndo {\nfor try await videogame in videogames {\nprint(\"\\(videogame.title)\
  \ (\\(videogame.year ?? 0))\")\n}\n} catch {\n}\n}\n清单 9-6\n使用高阶函数创建游戏数组\n```\n\n\
  现在，与普通序列不同，`videogames`数组不会立即生成。如果`lines`是一个非异步集合，那么`videogames`最终会是一个`Videogame`数组——`[Videogame]`或`Array<Videogame>`。\n\
  \n由于`lines`是一个异步序列，我们的`videogames`变量的类型不会是`[Videogame]`，而是`AsyncMapSequence<AsyncFilterSequence<AsyncLineSequence<URL.AsyncBytes>>,\
  \ Videogame>`。\n\n这就是为什么我之前说通常不需要关心`AsyncSequence`的具体类型，虽然这个签名看起来很复杂，但它很容易理解。从后往前看创建`videogames`变量的高阶函数：\n\
  \n1.  通过调用`map()`我们得到了`AsyncMapSequence`。\n2.  通过调用`filter()`我们得到了`AsyncFilterSequence`。\n\
  3.  我们得到了`AsyncLineSequence`，也就是`URL`的`lines`属性的类型。\n\n与普通的`Sequence`不同，`filter-map`操作在声明时并不会立即“启动”。相反，我们得到一个具体类型的`AsyncSequence`，之后需要将其提供给一个`for-in`循环。`AsyncSequences`只有在被用于`for-in`循环时才会“启动”。当你构建和链式组合异步序列时，你只是在构建一长串指令集，循环随后将使用这些指令集随时间逐步传递数据。你可以将其视为一个“查询”，它告诉循环在数据可用时应该提供什么。\n\
  \n如果你在另一个循环中使用同一个异步序列，你将立即获得数据，因为它会被缓存。`AsyncSequences`不会多次运行从异步源获取数据，因为那样效率非常低。\n\
  \n因此，清单 9-6 会同步运行，直到遇到循环本身。随着异步序列的执行，它可能会在每次迭代中多次暂停，从异步源获取数据。\n\n随着你对`AsyncSequence`的进一步探索，你会发现它相比普通的`Sequence`有一些更多的限制。首先，你无法获取`videogames`中元素的`count`。这是因为该变量并没有存储数据——正如我们所说，它只是一种“查询”，告诉`for-in`循环在每次迭代中应返回什么。你必须在`for-in`循环中执行该序列，才能计算出它的`count`。其次，并非所有在普通序列中预期的高阶函数都可用。`dropFirst`就是一个例子。\n\
  \n因为`await`循环可以像普通循环一样处理，你可以执行在普通循环中能做的任何操作，包括使用`continue`和`break`语句来改变循环的执行。清单\
  \ 9-7 使用了`continue`语句，仅打印评分为 10 的游戏。\n\n```\nFor try await videogame in videogames\
  \ {\nif videogame.score == 10 {\ncontinue\n}\nprint(\"\\(videogame.title) (\\(videogame.year\
  \ ?? 0))\")\n}\n清单 9-7\n在带 await 的循环中使用 continue 语句\n```\n\n在这个特定示例中，我们可以在`videogames`变量中增加一个新的`filter`调用。这样只会返回评分为\
  \ 10 的游戏，而无需在循环中使用`continue`语句。清单 9-8 包含了消除`continue`语句所需的更改。\n\n```\nLet videogames\
  \ =\nurl\n.lines\n.filter { $0.contains(\"|\") }\n.map { Videogame(rawLine: $0)\
  \ }\n.filter { $0.score != 10 } // 在此处应用过滤器\ndo {\nfor try await videogame in videogames\
  \ {\nprint(\"\\(videogame.title) (\\(videogame.year ?? 0))\")\n}\n} catch {\n}\n\
  清单 9-8\n在 videogames 库上调用更多高阶函数\n```\n\n\n\n### 支持`AsyncSequence`的原生 API\n\n苹果在其\
  \ SDK 中新增了许多使用`AsyncSequence`的 API。`URL.lines`是其中之一，但还有更多。以下并非完整列表，而是我个人常用的几个：\n\
  \n*   `FileHandle.standardInput.bytes.lines`，可用于接收来自命令行或其他来源的输入。每条命令均通过`for-in`循环传递。\n\
  *   可通过 URL 访问`lines`和`resourceBytes`成员属性。本章探讨了`lines`的用法，而`resourceBytes`与之类似。\n\
  *   `URLSession`提供了`bytes(from:)`方法，可用于从网络逐字节下载数据。\n*   `NotificationCenter`现在增加了\
  \ API，可通过`await`监听你感兴趣的新`notifications`。在`for-in`循环中接收通知，能大幅减少处理通知中心触发所需的逻辑。\n\n\
  ## `AsyncStream`对象\n\n本书探讨了如何迁移现有代码和模式，以使用现代并发系统的新特性。例如，我们将基于闭包的代码和基于委托的调用迁移为使用`async/await`，从而简化其使用方式。当存在随时间传递数据的异步数据源时，SDK\
  \ 提供了大量通过委托和闭包接收数据流的 API。我们可以为这些数据流创建`AsyncSequence`包装器，使其在循环中传递数据。两个典型的例子是蓝牙（通过委托调用传递数据包）和\
  \ CoreLocation（同样通过委托调用传递坐标）。将它们封装在`AsyncStream`中，就能对外提供可在`for-in`循环中使用的 API，从而获得更自然的接口。\n\
  \n`AsyncStream`使我们能够实现适用于`for-in`循环的流式功能，而无需自行实现任何迭代器。我们可以用它来迁移基于委托和基于闭包的调用，使其改为在循环中接收数据。为此，`AsyncStream`遵循了`AsyncSequence`协议。\n\
  \n为了演示如何使用`AsyncStream`，我们将创建一个小项目，该项目会接收可用的 CoreLocation 数据并将其显示在 UI 中。\n\n###\
  \ `CoreLocationAsyncStream`项目\n\n创建一个名为“CoreLocationAsyncStream”的新 SwiftUI 项目。该应用将接收位置信息，并在位置更新时将其显示在列表中。图\
  \ 9-1 展示了最终产品的截图。\n\n![](img/532302_1_En_9_Fig1_HTML.jpg)\n手机截图包含时间、WiFi 信号、满电电池图标，屏幕显示了“停止更新”和位置信息。\n\
  \n**图 9-1** UI 会随着新位置数据的到达显示一个位置列表\n\n你可以使用基于委托的调用来构建此应用，但为了更深入理解`AsyncStream`和`AsyncSequence`的工作原理，我们将使用`AsyncStream`。同时，这也有助于让代码更整洁，并将所有与位置相关的逻辑集中管理。\n\
  \n#### `LocationUpdater`类\n\n创建一个名为`LocationUpdater.swift`的新类。我们将使用此类管理与位置相关的所有事务，包括请求权限、获取位置更新以及将更新传递给订阅方。确保导入了`CoreLocation`，并为其添加代码清单\
  \ 9-9 中列出的内容。\n\n```\nimport Foundation\nimport CoreLocation\n\nclass LocationUpdater:\
  \ NSObject, CLLocationManagerDelegate {\n    private(set) var authorizationStatus:\
  \ CLAuthorizationStatus\n    private let locationManager: CLLocationManager\n\n\
  \    override init() {\n        locationManager = CLLocationManager()\n        authorizationStatus\
  \ = locationManager.authorizationStatus\n        super.init()\n        locationManager.delegate\
  \ = self\n        locationManager.desiredAccuracy = kCLLocationAccuracyBest\n  \
  \  }\n\n    func start() {\n        locationManager.startUpdatingLocation()\n  \
  \  }\n\n    func stop() {\n        locationManager.stopUpdatingLocation()\n    }\n\
  \n    func requestPermission() async -> CLAuthorizationStatus {\n    }\n\n    //\
  \ MARK: - 位置委托\n\n    func locationManager(_ manager: CLLocationManager, didUpdateLocations\
  \ locations: [CLLocation]) {\n    }\n\n    func locationManagerDidChangeAuthorization(_\
  \ manager: CLLocationManager) {\n        authorizationStatus = manager.authorizationStatus\n\
  \    }\n}\n```\n\n**代码清单 9-9** `LocationUpdater`类的初始部分\n\n##### 请求位置使用权限\n\n在遵循以下步骤之前，请确保已在`Info.plist`文件中添加了`NSLocationWhenInUseUsageDescription`（隐私\
  \ - 位置使用描述）键。这是一个面向用户的字符串，用于解释为何需要跟踪用户位置。\n\n`CoreLocation`通过委托调用传递授权状态的变化。我们可以借此机会使用续体（continuations）来处理。没错，这正是我们在第\
  \ 3 章中学到的续体。\n\n首先，添加一个属性来跟踪将传递授权状态的续体。代码见清单 9-10。\n\n```\nprivate var permissionContinuation:\
  \ CheckedContinuation?\n```\n\n**代码清单 9-10** 此属性将帮助我们桥接委托调用与`async/await`之间的权限状态变更\n\
  \n回到空的`requestPermission()`方法，并用代码清单 9-11 中的代码补全它。\n\n```\nfunc requestPermission()\
  \ async -> CLAuthorizationStatus {\n    locationManager.requestWhenInUseAuthorization()\n\
  \    if authorizationStatus != .notDetermined {\n        return authorizationStatus\n\
  \    }\n    return await withCheckedContinuation { continuation in\n        permissionContinuation\
  \ = continuation\n    }\n}\n```\n\n**代码清单 9-11** 启动续体以获取位置访问的授权状态\n\n我们仅在授权状态为`.notDetermined`时请求权限。如果状态不同，则立即返回。原因在于，当你初始化`CLLocationManager`对象时，系统会自动请求权限。如果在系统正在获取授权状态时调用请求方法，你将在未调用`resume`的情况下丢弃续体，从而导致死锁。这是少数可能发生死锁的情况之一（如果你启动了一个续体但在恢复之前它消失了）；好消息是，在运行应用进行测试时，这个错误很容易被发现。\n\
  \n你还需要在`locationManagerDidChangeAuthorization`委托方法中添加一行代码。该方法的完整实现见代码清单 9-12。\n\n\
  ```\nfunc locationManagerDidChangeAuthorization(_ manager: CLLocationManager) {\n\
  \    authorizationStatus = manager.authorizationStatus\n    permissionContinuation?.resume(returning:\
  \ authorizationStatus)\n}\n```\n\n**代码清单 9-12** 当授权状态变化时，我们将恢复续体\n\n在本应用中，我们只关心在程序运行时权限变更一次的情况。但更好的做法是设置一个无限循环，持续报告授权变更。我们可以使用`AsyncStream`来实现这一点，每次委托方法被调用时发送位置授权更新，并且永不调用`finish()`。当状态变化时，我们用新状态恢复`permissionContinuation`，这样依赖它的`await`调用就能继续执行。\n\
  \n使用`async/await`异步请求权限，只需完成以上步骤。代码清单 9-13 展示了如何使用此逻辑请求权限。\n\n```\nlet locationUpdater\
  \ = LocationUpdater()\n// ...\nlet authorized = await locationUpdater.requestPermission()\n\
  if [CLAuthorizationStatus.authorizedAlways, .authorizedWhenInUse].contains(authorized)\
  \ {\n    // 权限已授权\n}\n```\n\n**代码清单 9-13** 使用`requestPermission`方法异步请求位置访问权限\n\n\
  \n\n##### 在循环中接收位置信息\n\n现在让我们实现接收位置对象的逻辑。\n\n在内部，`AsyncStream` 通过延续（continuation）机制工作。其核心理念是：当你创建一个\
  \ `AsyncStream` 时，它会为你提供一个延续，你可以通过该延续发送任意数量的、你所关注类型的事件。在本项目中，我们将发送 `CLLocation`\
  \ 类型的对象。这些延续的类型与我们之前在第 3 章学到的并不完全相同，但行为非常相似。主要区别在于，第 3 章中的延续必须且仅能恢复一次，而 `AsyncStream`\
  \ 的延续可以调用任意次数的 `yield()` 来产出对象。当你完成所有操作后，需要调用 `finish()` 使序列返回 `nil`，从而终止循环。如果不调用\
  \ `finish()`，你的 `for-in` 循环将永远不会结束——除非被显式取消。在某些场景下这可能是你期望的行为，但在其他场景中则会类似死锁。\n\n\
  添加一个用于保存 `AsyncStream` 延续的属性。你可以在代码清单 9-14 中看到它。\n\n```\nprivate var streamContinuation:\
  \ AsyncStream.Continuation?\n代码清单 9-14 为我们的 CLLocation AsyncStream 创建延续\n```\n\n\
  `AsyncStream` 的泛型类型定义了 `for-in` 循环在每次迭代中将接收哪种类型的对象。在本例中，该类型为 `CLLocation`。\n\n接下来，我们将实现一个\
  \ `locations` 属性。其类型将是 `AsyncStream<CLLocation>`。`for-in` 循环将使用此属性来获取可用时的新位置对象。将代码清单\
  \ 9-15 中的代码添加到 `LocationUpdater` 类中。\n\n```\nvar locations: AsyncStream {\n    let\
  \ stream = AsyncStream(CLLocation.self) { continuation in\n        continuation.onTermination\
  \ = { @Sendable _ in\n            self.stop()\n            self.streamContinuation\
  \ = nil\n        }\n        self.streamContinuation = continuation\n        self.start()\n\
  \    }\n    return stream\n}\n代码清单 9-15 我们可以使用 locations 属性实时获取 CLLocation 对象\n\
  ```\n\n创建 `AsyncStream` 时，你需要定义它将接收哪种类型的对象。我们将流式传输 `CLLocation` 对象，因此使用 `CLLocation.self`。初始化器还接收一个闭包，该闭包会提供流的延续，其类型为\
  \ `AsyncStream<CLLocation>.Continuation`。我们可以在延续上设置一个可选的 `onTermination` 闭包，该闭包将在我们对\
  \ `AsyncStream` 调用 `finish()` 后被调用。如果你需要关闭数据管道或执行任何其他类型的清理工作，请使用此闭包。在本项目中，如果用户按下按钮选择不再接收位置更新，我们将通知位置管理器停止追踪位置。请注意，延续被标记为\
  \ `@Sendable`。这意味着该闭包可以在不同的并发域中安全使用。如果不这样标记，你将无法阻止 `locationManager` 传递更新。\n\n下一行将延续赋值给我们的\
  \ `streamContinuation` 变量。我们需要保留此变量，因为位置事件是通过代理方法传递的。配置好延续后，我们可以通过调用 `start()` 方法开始追踪用户的位置。这将启动\
  \ `locationManager` 发送位置更新的能力。\n\n现在，`locations` 变量可以实时传递 `CLLocation` 对象了，但工作尚未完全完成。我们还没有正确调用\
  \ `finish()` 方法，因此这个循环永远不会结束，而且实际上也并未在任何地方传递位置对象。\n\n当 `stop()` 方法被调用时，我们将停止流式传输。修改此方法，使其看起来像代码清单\
  \ 9-16 中的代码。\n\n```\nfunc stop() {\n    locationManager.stopUpdatingLocation()\n\
  \    streamContinuation?.finish()\n}\n代码清单 9-16 结束延续\n```\n\n当我们调用 `finish()` 时，延续的\
  \ `onTermination` 闭包也将被调用。在这个特定示例中，`stop()` 触发 `onTermination`，而 `onTermination`\
  \ 又调用 `stop()`，这看起来可能有些奇怪。我们这样做是因为，如果运行 `for-in` 循环的 `Task` 被取消，我们也希望停止接收位置。你可以在\
  \ `onTermination` 中直接调用 `locationManager.stopUpdatingLocation()`，但我更倾向于调用我们自己的 `stop()`\
  \ 方法这种惯用做法。因为我们在 `onTermination` 中将 `streamContinuation` 设置为 `nil`，所以这里不存在递归调用的风险。\n\
  \n现在我们可以对 `locationManager(_ manager: CLLocationManager, didUpdateLocations locations:\
  \ [CLLocation])` 进行必要的修改。我们需要将接收到位置传递给延续。代码清单 9-17 展示了其最终实现。\n\n```\nfunc locationManager(_\
  \ manager: CLLocationManager, didUpdateLocations locations: [CLLocation]) {\n  \
  \  locations.forEach { streamContinuation?.yield($0) }\n}\n代码清单 9-17 将位置对象传递给延续\n\
  ```\n\n你可能已经注意到，代理给我们的是一个位置对象的数组。每次调用此方法时，它可能包含多个对象。因此，我们将遍历接收到的对象数组，并在每次调用时将每个对象\
  \ `yield()` 给延续。至此，我们完成了 `LocationUpdater` 的功能。调用者现在可以使用 `locations` 属性在循环中实时接收事件。\n\
  \n代码清单 9-18 展示了调用者如何在 `for-in` 循环中使用此对象来接收位置信息。\n\n```\nself locationUpdater = LocationUpdater()\n\
  //... 在确认已授权之后。\nfor await newCoordinate in locationUpdater.locations {\n    //\
  \ 对接收到的 newCoordinate 对象进行处理。\n}\n代码清单 9-18 使用 locations AsyncStream\n```\n\n\n\n\
  ### 完成项目\n\n现在可以继续编写应用的其他部分。打开 `ContentView.swift` 文件，在其中创建 `ContentViewViewModel`\
  \ 类。如果你愿意，也可以将其创建在另一个文件中。它的整个实现较小，因此我将所有代码放在代码清单 9-19 中。\n\n```\n@MainActor\nclass\
  \ ContentViewViewModel: ObservableObject {\n@Published private(set) var locations:\
  \ [CLLocation] = []\nlet locationUpdater = LocationUpdater()\nfunc startUpdating()\
  \ async {\nlet authorized = await locationUpdater.requestPermission()\nif [CLAuthorizationStatus.authorizedAlways,\
  \ .authorizedWhenInUse].contains(authorized) {\nfor await newCoordinate in locationUpdater.locations\
  \ {\nlocations += [newCoordinate]\n}\n}\n}\nfunc stopUpdating() {\nlocationUpdater.stop()\n\
  }\n}\n代码清单 9-19\n用于显示位置的视图的 ViewModel\n```\n\n我们将整个类设置为在 `@MainActor` 上运行，因为它可以更新\
  \ UI。视图将读取 `@Published locations` 属性，以在列表中显示它们。\n\n`startUpdating` 方法将启动接收位置的操作。它会先异步请求跟踪用户位置的权限。一旦获得权限，我们将在循环中访问\
  \ `locationUpdater` 的 `locations` 属性。这是我们之前创建的 `AsyncStream<CLLocation>`。`AsyncStream`\
  \ 是一个 `AsyncSequence`，因此我们可以使用 `await` 对其进行迭代。这个循环将无限运行，直到调用 `stopUpdating` 方法，该方法会导致序列返回\
  \ `nil`，从而结束循环。\n\n最后，我们可以实现 UI。UI 也相对较小，因此我可以将其发布在一个代码清单中。代码清单 9-20 展示了我们完成的 UI。\n\
  \n```\n@MainActor\nstruct ContentView: View {\n@StateObject var viewModel = ContentViewViewModel()\n\
  var body: some View {\nNavigationView {\nList(viewModel.locations, id: \\.hash)\
  \ { location in\nText(\"\\(location.coordinate.longitude), \\(location.coordinate.latitude)\"\
  )\n}\n.navigationTitle(\"位置\")\n.task {\nawait viewModel.startUpdating()\n}\n.navigationBarItems(\n\
  leading: EmptyView(),\ntrailing: Button(\"停止更新\") {\nviewModel.stopUpdating()\n\
  }\n)\n.navigationViewStyle(.stack)\n}\n}\n}\n代码清单 9-20\n应用的 UI\n```\n\n我们完成了！我们使用\
  \ `.task` 修饰符来调用视图模型的 `startUpdating` 方法。`.task` 会在视图出现时被调用，并在视图消失时被取消，因此在处理并发时使用它非常有用。“停止更新”按钮将停止流。\n\
  \n你可以下载已完成的名为“`CoreLocationAsyncStream`”的项目。\n\n### `AsyncThrowingStream` 对象\n\n\
  与新的并发系统中的许多对象一样，`AsyncStream` 也有其抛出变体，当你循环可能抛出错误时可以使用。这个对象是 `AsyncThrowingStream`，并且使用起来与\
  \ `AsyncStream` 一样简单。\n\n你可以 `yield` 值，正常 `finish`，或通过 `finish(with:)` 抛出错误来结束。如果你使用\
  \ `AsyncThrowingStream`，你将需要使用 `for try await` 循环。\n\n## 总结\n\n在本章中，我们学习了 `AsyncSequence`。`AsyncSequence`\
  \ 几乎与普通的 `Sequence` 相同，区别在于它们与新的并发系统一起工作。`AsyncSequence` 可以在 `for-in` 循环中随时间传递数据，直到底层源决定发送\
  \ `nil` 值。虽然你可以使用许多高阶函数（例如 `filter`、`map` 和 `reduce`），但这些操作不会启动，直到你在循环中使用 `AsyncSequence`，这与\
  \ `Sequence` 不同，后者在链式调用时操作会自动触发。\n\n我们还学习了 `AsyncStream`。我们可以使用 `AsyncStream` 将基于闭包或基于代理的调用（随时间传递数据）桥接到\
  \ `async/await` 世界。我们探讨了如何将其与 `CoreLocation` 框架一起使用，以及在使用此对象时需要注意的事项。`AsyncStream`\
  \ 是一个 `AsyncSequence`，因此你可以对 `AsyncSequence` 做的所有事情，都可以对 `AsyncStream` 做。如果你的序列可能抛出错误，你可以使用\
  \ `AsyncThrowingStream` 代替 `AsyncStream`。\n\n"
- '# 10. `@TaskLocal`


  Swift 作为一种语言，拥有丰富的特性。语言本身通过引入许多功能来支持现代并发系统的存在，使得在编译时而非运行时捕获许多常见的并发问题成为可能。这使得即使应用在后台大量使用并发，也能轻松发布非常健壮的应用。


  Swift 有一个略微晦涩的功能——属性包装器。它们在 SwiftUI 的许多地方被使用（`@State`、`@StateObject`、`@EnvironmentObject`
  等），但除此之外，许多开发者并不知道可以有与 SwiftUI 无关的属性包装器。他们甚至可以创建自己的属性包装器。你可以几乎立即识别出属性包装器，因为它们以 `@`
  符号开头，尽管它们可能与其他 Swift 功能（例如属性或全局 actor）混淆。


  Swift 团队引入了一个有趣的属性包装器，用于与新的并发系统一起使用。我们说的是 `@TaskLocal`，它可以用于在任务树中的其他任务之间共享数据。正如我们所了解的，任务树决定了任务如何继承某些属性，包括它们运行的
  actor、优先级、取消状态和*任务局部变量*。我们已经了解了之前所有继承上下文的工作原理，但尚未学习任务局部变量。


  ## `@TaskLocal` 属性包装器介绍


  `@TaskLocal` 值可以在任务的上下文中读取和写入。该值是隐式共享的，并且任务本身创建的任何子任务（无论是 `async let` 还是组任务）都可以访问它。




  ### 使用 `@TaskLocal`


  要使用这个属性包装器，标记为 `@TaskLocal` 的属性必须是 `static`。它们可以是可选类型，也可以有默认值。


  读取它们的值时，你不需要做任何特殊处理。你可以像使用任何属性一样，在任何地方尝试使用该值，但如果该值未被父任务预先设置，它将是 `nil` 或你为其分配的默认值。


  代码清单 10-1 展示了我们如何声明 `@TaskLocal` 变量。


  ```

  class ViewController: UIViewController {

  @TaskLocal static var currentVideogame: Videogame?

  // ...

  }

  代码清单 10-1

  声明 @TaskLocal 变量

  ```


  `@TaskLocal` 变量必须是 `static`。在这个例子中，我们使用了在第 8 章中创建的 `Videogame` 结构体。现在我们可以使用这个属性在任务树中向下共享一个
  `Videogame`。


  现在，代码清单 10-2 展示了读取这个变量是多么简单。


  ```

  // 在 ViewController 外部

  func expensiveVidegameOperation() async {

  if let vg = await ViewController.currentVideogame {

  print("我们正在处理 \(vg.title)")

  }

  }

  代码清单 10-2

  读取 @TaskLocal 变量

  ```


  这段假设的代码位于视图控制器外部的某个位置。我想强调的是，`@TaskLocal` 属性不受任何作用域的限制。它们仅受限于任务本身，而这个任务可以存在于许多不同的地方。


  细心的读者可能已经注意到，访问这个变量是一个 `await` 操作。`TaskLocal` 属性会在任务内部同步对其的访问，以防止出现数据竞争。


  写入 `@TaskLocal` 属性则不是那么直接。如果你尝试使用 `=` 运算符进行简单的赋值，编译器会阻止你，因为它是只读属性。


  你不能进行简单的赋值，而是需要将变量绑定到任务树中。为此，你需要在变量名前使用 `$` 符号，并调用其上的 `withValue` 方法。为避免混淆，代码清单
  10-3 展示了如何将变量绑定到任务。


  ```

  override func viewDidLoad() {

  super.viewDidLoad()

  // 加载视图后进行任何额外的设置。

  let vg = Videogame(title: "塞尔达传说：时之笛", year: 1998)

  Self.$currentVideogame.withValue(vg) {

  // 我们可以在这里启动一些使用 LocalValue 的异步任务

  }

  }

  代码清单 10-3

  绑定一个后续可由任务使用的值

  ```


  如果你对 Swift 的属性包装器不熟悉，我建议你阅读我写的一篇关于此主题的专门博文。^(²) 简而言之，属性包装器可以增强普通属性的能力。通过使用美元符号 `$`，我们可以访问属性包装器的内部能力。我们的
  `Videogame` 结构体没有提供 `withValue` 方法，但包装它的属性包装器提供了这个方法。


  在代码清单 10-3 中，我们将一个新的 `vg` 变量绑定到我们的 `currentVideogame` 任务值。从这里开始生成的所有任务，只要它们是任务树的一部分，就可以访问它。


  代码清单 10-4 将创建一个更复杂的层次结构，其中共享了一个 `@TaskLocal` 值。


  ```

  class ViewController: UIViewController {

  @TaskLocal static var currentVideogame: Videogame?

  override func viewDidLoad() {

  super.viewDidLoad()

  // 加载视图后进行任何额外的设置。

  let vg = Videogame(title: "塞尔达传说：时之笛", year: 1998)

  Self.$currentVideogame.withValue(vg) {

  Task {

  await expensiveVidegameOperation()

  Task {

  await expensiveVidegameOperation()

  Task.detached {

  await expensiveVidegameOperation()

  }

  }

  }

  }

  }

  }

  代码清单 10-4

  在更复杂的层次结构中向下共享 @TaskLocal 变量

  ```


  我们从绑定 `Videogame` 任务局部变量后启动一些任务开始。我们启动一个 `Task`，在其中调用 `expensiveVideogameOperation`，这将打印“我们正在处理
  塞尔达传说：时之笛”。在它 `await` 之后，我们启动另一个 `Task`，它是当前 `Task` 的子任务。调用 `expensiveVideogameOperation`
  也将打印“我们正在处理 塞尔达传说：时之笛”，因为这个子任务可以访问相同的父任务。


  当我们启动一个分离任务时，情况就更有趣了。当我们启动分离任务时，我们也调用了 `expensiveVideogameOperation`，但这次它打印的是“在任务层次结构中未找到游戏！”正如我们在第
  5 章中讨论的，分离任务完全独立于启动它们的任何任务，并且它们实际上没有父任务可言，尽管它们可以是其他任务的父任务（只要这些任务不是作为分离任务启动的）。因此，在代码清单
  10-4 中，我们的分离任务没有 `currentVideogame`。它不属于之前子任务所处的同一任务树。


  你可以在分离任务内将不同的 `Videogame` 绑定到 `@TaskLocal` 变量，并且分离任务的任何子任务都可以访问它——再次记住，分离任务实际上并不是它的子任务。代码清单
  10-5 展示了这一能力。


  ```

  Task.detached {

  await expensiveVidegameOperation()

  let anotherVg = Videogame(title: "深渊传说", year: 2005)

  await Self.$currentVideogame.withValue(anotherVg) {

  await expensiveVidegameOperation()

  }

  }

  代码清单 10-5

  为在分离任务内使用而分配 @TaskLocal 变量

  ```


  ## 总结


  你可能会遇到需要将某个值共享给任务层次结构中所有子任务的情况。`@TaskLocal` 属性包装器非常适合这种情况。值将被共享给一个任务的所有子任务以及同一任务树内的所有任务，但任何分离任务由于它们的分离特性，将无法访问上层任务局部变量。




