  raw: 'What will execute on the main actor itself is the *assignment* of the albums
    methods. Just the assignment. `populateFromWebService` will be running somewhere
    else, but the assignment of its returned data to `self.albums` will run on the
    main actor. A lot of people are under the impression that `populateFromWebService`
    itself would execute on the main actor. That is, if this method is downloading
    some JSON data from a slow service and parsing it or doing anything else that
    can take anything longer than milliseconds, it is running on the main thread.
    That is not correct, and fortunately the global actors system is smarter than
    that. If you are running something on `@MainActor`, always know that all its statements
    will run on the main actor, but if it finds a call that suspends, the execution
    of whatever triggered the suspension will be done somewhere else, and the data
    will be returned (and assigned) on the main thread. The “left” side of an `await`
    will execute on the main thread, and the “right” side of the await keyword will
    take place someplace else, so to speak.


    You do not have to mark an entire class or struct declaration as main actor. If
    you only require some properties and methods to run on the main actor, you can
    mark only those as `@MainActor`. Listing [8-5](#532302_1_En_8_Chapter.xhtml#PC6)
    modifies the `MusicLibrary` object to add a new variable and a new method, gets
    rid of the `@MainActor` mark in the entire declaration, and adds it to the newly
    added symbol.


    ```

    class MusicLibrary {

    var name: String

    var albums: [MusicAlbum] = []

    @MainActor var albumCover: UIImage?

    init(name: String) {

    self.name = name

    }

    @MainActor func updateAlbumCover() {

    // ... Download a new cover from the internet

    // and update the albumCover property.

    }

    }

    Listing 8-5

    Marking only some properties and methods as @MainActor

    ```


    Now this class will be usable everywhere, but whatever action we want to do on
    the `albumCover`, it must be done in a context that is running on the main actor.


    If you isolate an entire class to run on the main actor (by marking it as `@MainActor
    class MyClass`…), then that class will always run on the main actor and calling
    it from somewhere else will need to await. If you have some methods that need
    to be nonisolated to the main actor (as a normal actor definition, global actors
    can have methods that are nonisolated), you can mark it as `nonisolated` and use
    it from any other concurrent context.


    Listing [8-6](#532302_1_En_8_Chapter.xhtml#PC7) marks the `MusicLibrary` class
    as running on the main actor and adds a nonisolated method to it.


    ```

    @MainActor

    class MusicLibrary {

    var name: String

    var albums: [MusicAlbum] = []

    @MainActor var albumCover: UIImage?

    init(name: String) {

    self.name = name

    }

    nonisolated func libraryPurpose() -> String {

    "This library holds my favorite songs"

    }

    }

    Listing 8-6

    Adding a nonisolated method to a class running on the main actor

    ```


    Note that `nonisolated` methods need to be *truly* isolated. You cannot return
    a property derived from one of our properties in the class. We would not be able
    to return the `name`, the `albums`, or even the number of albums (`albums.count`),
    because those properties are isolated to the main actor, and we cannot return
    isolated properties through a nonisolated context. It is also not possible to
    use the `nonisolated` keyword with stored properties.


    Just like `@Sendable`, we can also mark closures and functions with `@MainActor`
    to run them on the main thread. We have seen how a function can be marked as `@MainActor`.
    For closures, you can use a syntax similar to `@Sendable,` but by replacing `@Sendable`
    with `@MainActor`. In general, wherever you can use `@Sendable`, you can also
    use `@MainActor`. This includes a variable closure declaration, a closure declaration
    as a parameter to a function, and more.


    Listing [8-7](#532302_1_En_8_Chapter.xhtml#PC8) shows how to mark a closure as
    `@MainActor`.


    ```

    Task { @MainActor in

    }

    Listing 8-7

    Marking a closure as running on the @MainActor

    ```


    In this particular example, we are declaring a Task that will run on the main
    actor. I wanted to show you this so you can see that you can really use `@MainActor`
    everywhere. It may not be a good idea to run a closure on the main thread unless
    it is to update your UI.


    You can also run any code on the `@MainActor` by using a static `run` method.
    Listing [8-8](#532302_1_En_8_Chapter.xhtml#PC9) shows how this is done.


    ```

    Task {

    await MainActor.run {

    // Update your UI.

    }

    }

    Listing 8-8

    Running code on the main actor

    ```


    The `await` keyword is necessary. Because we may not be in a context that is also
    running on the main actor, the calls need to be done asynchronously. This method
    of running code on the main actor is useful. If you have to keep writing closure-based
    code and you can’t migrate to `async/await` completely just yet, you can use this
    to quickly relay information back to the main thread without having to use the
    GCD and its `DispatchQueue.main.async` method.


    ## Understanding Global Actors


    To understand what a global actor is, the easiest way to do so is by understanding
    the main actor.


    As we said before, the main actor is a global actor. A global actor can be applied
    to various declarations, even if they are across different files in a framework.
    Earlier, we mentioned that UIKit, the main framework to make iOS apps other than
    SwiftUI, and its equivalent macOS counterpart, AppKit, have their types spread
    out across different files. There had to be a way to ensure these UI classes ran
    on the main thread in a way that played well with the new Swift concurrency system.


    An actor that can be applied across different declarations, even if they are in
    different files, is a *global actor*. As you have seen throughout this chapter,
    the main actor is a very important part of developing modern concurrent apps on
    Apple platforms, because it provides us with a way to do work on the main thread
    to update our UI. The main actor will synchronize all access to it to ensure all
    UI updates are done properly, with no race conditions.


    `@MainActor` is a global actor Apple provides to us. It’s great, it does its work,
    but can we create our own global actors? The answer is a loud yes!'
