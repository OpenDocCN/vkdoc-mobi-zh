    A schematic diagram depicts the execution flow of Threads A and B, which consists
    of resource C with the correct symbol at Thread A and resource D with the incorrect
    symbol and vice versa of symbols at Thread B.


    Figure 1-1


    Deadlocking in action


    Figure [1-1](#532302_1_En_1_Chapter.xhtml#Fig1) illustrates how Thread A may try
    to access Resource C and Resource D, one after the other, and how Thread B may
    try to do the same but in different order. In this example, the deadlock will
    happen rather soon, because Thread A will get hold of Resource C while Thread
    B gets hold of Resource D. Whoever needs each other’s resource first will cause
    the deadlock .


    Despite how simple this problem looks, it is the culprit of a lot of bugs in a
    lot of multithreaded software. The simple solution would be to prevent each process
    from attempting to access a busy resource. But how can this be achieved?


    ##### Solving the Deadlocking Problem


    The deadlock problem has many established solutions. *Mutex* and *Semaphores*
    being the most used ones. There is also *Inter-process communication through pipes*,
    but we will not talk about it because it goes beyond a single program.


    ###### Mutex


    *Mutex* is short for *Mutually exclusive lock* (or *flag*). A mutex will signal
    other processes that a process is currently using some resource by adding a *lock*
    to it and preventing other processes from grabbing until that lock is freed. Ideally,
    a process will acquire a lock to all the resources it will need at once, even
    before using them. This way, if *Thread A* needs *Resource C* and *Resource D*,
    it can lock them before *Thread B* tries to access them. *Thread B* will wait
    until all the locks are freed before attempting to access the resources itself.
    Figure [1-2](#532302_1_En_1_Chapter.xhtml#Fig2) illustrates how this is done.


    ![](images/532302_1_En_1_Chapter/532302_1_En_1_Fig2_HTML.png)


    A schematic diagram depicts the execution flow of Thread A and B, which consists
    of Resources C and D with the lock symbol, continue execution with locked resources,
    and wait for resources to get unlocked with the refresh symbol.


    Figure 1-2


    Using a mutex


    Keep in mind that in this specific situation, it means that *Thread A* and *Thread
    B*, while multithreaded, will not run strictly at the same time, because *Thread
    B* needs the same resources as *Thread A* and it will wait for them to be free.
    For this reason, it is important to identify tasks that can be run in parallel
    before designing a multithreaded system.'
  trans: '好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。



    ### 并发与异步编程


    并发是指一个线程（或你的程序）同时处理多件事情的能力。它可能是在响应不同的事件，例如网络处理程序、UI 事件处理程序、操作系统中断等。可能存在多个线程，并且所有这些线程都可以是并发的。


    Apple 的 SDK 中提供了多种不同的利用并发的 API。代码清单 1-2 展示了如何根据设备请求使用 Touch ID 或 Face ID 的权限。


    ```

    func requestBiometricUnlock() {

    let context = LAContext()

    var error: NSError? = nil

    let canEvaluate = context.canEvaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,
    error: &error)

    if canEvaluate {

    if context.biometryType != .none {

    // (1)

    context.evaluatePolicy(

    .deviceOwnerAuthenticationWithBiometrics,

    localizedReason: "To access your data") { (success, error) in

    // (2)

    if success {

    // ...

    }

    }

    }

    }

    }

    代码清单 1-2

    生物识别解锁是一个异步任务

    ```


    `(1)` 调用了 `context.evaluatePolicy`，这是一个*并发调用*。这将要求系统挂起你的应用，以便其接管控制权。在你的应用被挂起时，系统会请求使用生物识别的权限。当系统运行
    `context.evaluatePolicy` 时，你的应用所运行的线程可能正在做完全不同的事情，甚至与你的应用无关。当用户响应提示，接受或拒绝生物识别请求时，结果会被传递给你的应用。系统会等待一个合适的时机，将用户的选择通知给你的应用。该选择将通过完成处理器（也称为*回调*）在
    `(2)` 处交付给你的应用，此时你的应用将重新控制该线程。该选择的交付线程可能与发起 `context.evaluatePolicy` 调用的线程不同——这一点很重要，因为如果响应需要更新
    UI，你需要在主线程上执行该工作。这也被称为*阻塞机制*或*中断*，因为 `evaluatePolicy` 对于该线程来说是一个*阻塞*调用。如果你已经从事
    iOS 开发至少几个月，你应该对这种处理各种事件的方式很熟悉。`URLSession`、图片选择器等许多 API 都使用了这种机制。


    人们常常认为异步编程就是同时运行多个任务。这是一个不同的概念，称为*多线程*，我们将在下一点中讨论。


    **注意：** 如果你正在考虑在你的应用中实现生物识别解锁来保护资源，请不要使用上述代码。它已被简化用于解释并发的工作原理，并且没有采取正确的安全措施来保护你的用户数据。


    多线程是指同时运行多个任务的行为。通常涉及多个线程（因此得名多线程）。在你的应用的上下文中，许多任务可以同时运行。同时从互联网下载多张图片，或者在你的网页浏览器中打开一些标签页的同时下载一个文件，这些都是多线程的例子。这允许我们*并行*运行任务，有时也被称为*并行性*。


    ### 多线程陷阱


    并发和多线程传统上都是难以解决的问题。自从它们被引入计算机世界以来，开发者们不得不开发各种范例和工具来使处理并发变得更容易。因为程序员习惯于过程式思维，编写在不可预知的时间执行的代码很难做到正确无误。


    在本节中，我们将讨论编写底层多线程代码的开发者经常遇到的一些问题，以及他们为应对这些问题而创建的模型。理解本节很重要，因为这些传统问题是真实存在的，但它们的解决方案已经在
    `async/await` 系统中实现了。它也将帮助你决定下次在程序中需要实现并发或多线程时，应该使用哪种技术。


    #### 死锁


    在多线程的上下文中，当两个不同的进程互相等待对方完成时，就会发生*死锁*，这有效地使得它们任何一方都无法首先完成。


    当两个进程共享一个资源时，可能会发生这种情况。如果*线程 B* 想要*线程 A* 持有的一个资源，而*线程 A* 想要*线程 B* 持有的一个资源，那么两个进程都会互相等待对方完成，陷入永久的死锁状态。图
    1-1 展示了这种情况可能如何发生。


    ![](img/532302_1_En_1_Fig1_HTML.jpg)


    *示意图描绘了线程 A 和 B 的执行流程，其中线程 A 持有资源 C 并带有正确符号，持有资源 D 并带有错误符号；而线程 B 则相反。*


    **图 1-1** – 死锁发生过程


    图 1-1 展示了线程 A 可能尝试依次访问资源 C 和资源 D，而线程 B 可能尝试做同样的事情但顺序不同。在这个例子中，死锁会很快发生，因为线程 A 会占据资源
    C，而线程 B 会占据资源 D。任何一个线程只要先需要对方手里的资源，就会导致死锁。


    尽管这个问题看起来简单，但它是许多多线程软件中大量错误的罪魁祸首。简单的解决方案是防止每个进程尝试访问一个正被占用的资源。但这如何实现呢？


    ##### 解决死锁问题


    死锁问题有很多成熟的解决方案。*互斥锁*和*信号量*是最常用的。还有*通过管道进行进程间通信*，但我们不讨论这个，因为它超出了单个程序的范畴。


    ###### 互斥锁


    *互斥锁*是*互斥锁（或标志）*的简称。互斥锁通过向资源添加一个*锁*来向其他进程发出信号，表明某个进程正在使用该资源，并阻止其他进程获取该资源，直到该锁被释放。理想情况下，一个进程会一次性获取它所需的所有资源的锁，甚至在使用它们之前就获取。这样，如果*线程
    A* 需要*资源 C* 和*资源 D*，它可以在*线程 B* 尝试访问它们之前将它们锁定。*线程 B* 将等待所有锁被释放后，再尝试访问这些资源本身。图 1-2
    展示了这是如何实现的。


    ![](img/532302_1_En_1_Fig2_HTML.png)


    *示意图描绘了线程 A 和 B 的执行流程，其中包括带有锁符号的资源 C 和 D，使用锁定资源继续执行，以及等待资源解锁并带有刷新符号。*


    **图 1-2** – 使用互斥锁


    请记住，在这种特定情况下，这意味着*线程 A* 和*线程 B*，虽然是多线程，但并不会严格地同时运行，因为*线程 B* 需要*线程 A* 正在使用的相同资源，并且它会等待这些资源被释放。因此，在设计多线程系统之前，识别可以并行运行的任务非常重要。

