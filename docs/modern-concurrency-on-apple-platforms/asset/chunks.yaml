  trans: '

    ### `NSOperation` APIs


    作为比 GCD 层级更高的工具，`NSOperation` API 是一套用于多线程编程的高级工具。尽管没有 GCD 那样广为人知，它在 SDK 的某些部分中仍占有一席之地。例如，CloudKit
    API 就采用了这项技术。


    这套工具确实为你省去了多线程编程中的大量痛点，但同时也丧失了不少灵活性。你无需手动管理锁或信号量，相应的 API 也更为简单。它抽象了如此多的细节，以至于你甚至无法察觉用它运行的任务是否位于不同线程。如果系统认为在同一个线程中运行你的任务更为合理，它就会这么做；否则，它会尊重你运行多线程的意图。甚至，如果系统判断不值得为某个任务另开一个线程，它可能会选择将该任务在主线程中执行。代码清单
    1-5 创建了两个不同的任务，分别在不同队列中从 1 数到 10 和从 10 数到 20。


    ```

    func startCounting() {

    /// 为此我们需要一个队列。

    let operationQueue = OperationQueue()

    /// 如果你稍后需要识别队列，可以为其设置一个可选名称。

    operationQueue.name = "Counting queue"

    /// 这个任务将从 1 数到 10...

    let from1To10 = BlockOperation {

    for i in (1 ... 10) {

    print(i)

    }

    }

    /// ...而这个任务将从 11 数到 20

    let from11To20 = BlockOperation {

    for i in (11 ... 20) {

    print(i)

    }

    }

    /// 将操作添加到队列中

    operationQueue.addOperation(from1To10)

    operationQueue.addOperation(from11To20)

    /// 确保程序在操作运行期间不会提前退出。

    operationQueue.waitUntilAllOperationsAreFinished()

    }

    Listing 1-5

    NSOperation API 的多线程使用

    ```


    使用这些 API 非常简单。你首先创建一个 `OperationQueue`。这个队列的职责是执行你添加到其中的任何任务。你也可以为它命名，以便稍后引用或搜索时使用。


    在*代码清单* *1-5* 中，我们创建了两个任务（本例中是 `BlockOperation` 的实例——原始 API 基于 Objective-C，因此在
    Swift 中表现为闭包），即 `from1To10` 和 `from11To20`。一旦通过 `OperationQueue.addOperation`
    调用将它们提交到队列，它们就会立即开始执行。在这个例子中，你会看到数字几乎是交错打印的。每次运行程序时，得到的结果都会不同。


    同时运行多个任务很容易，但如果你希望一个任务在另一个任务之后执行，因为前者依赖于后者的数据，或者仅仅因为这样更合理，又该如何做呢？


    在这种情况下，`BlockOperation` 提供了一种方法，允许你将一个操作定义为另一个操作的依赖。如果你将 `from1to10` 设为 `from11to20`
    的依赖，那么数字序列就会按你期望的顺序打印。代码清单 1-6 修改了代码清单 1-5 的一部分，通过创建依赖关系来按顺序打印数字。


    ```

    // 确保数字按顺序打印。我们在将操作添加到队列之前执行此操作。

    from11To20.addDependency(from1To10)

    /// 将操作添加到队列中

    operationQueue.addOperation(from1To10)

    operationQueue.addOperation(from11To20)

    Listing 1-6

    将操作添加为其他操作的依赖

    ```


    值得注意的是，虽然使用此框架你无法管理线程，但你可以检查每个*操作*的状态（`isCancelled`、`isFinished` 等），并且可以随时取消你的操作（通过调用
    `cancel`）。如果一个操作被取消，依赖于它的其他操作也会被取消。


    如你所见，使用 `NSOperation` API 很简单。当你有多线程编程的简单需求时，它仍然是一个很不错的工具。


    ### 介绍 `async/await`


    `async/await` 是一套用于编写并发和多线程代码的高级系统。使用它，你无需考虑手动管理线程或死锁问题。系统会在底层为你处理所有这些细节以及更多工作。通过使用非常简单的结构，你将能够编写出安全且强大的并发和多线程代码。值得注意的是，这个系统层级非常高，很难被错误使用。虽然系统不会让你对并发和多线程原语进行精细控制，但它会提供一整套抽象，让你以一种截然不同的方式思考多线程代码。从语义上讲，很难将
    `async/await` 与我们之前探讨过的任何其他系统进行比较，因为 `async/await` 深度集成在 Swift 语言本身之中，而不是以框架或库的形式附加的。得益于
    Swift 对可读性的重视，该系统暴露的原语更容易理解。


    为了让你快速了解本书其余部分将要学习的内容，我们将在代码清单 1-7 中使用 `async/await` 重写代码清单 1-4。


    ```

    @MainActor

    func fetchUser() async {

    let userData = await userApi.fetchUserData()

    usernameLabel.text = userData.username

    let movies = userApi.fetchMovies(for: userData.id)

    userMovies = movies

    }

    Listing 1-7

    async/await 的实际应用

    ```


    代码清单 1-7 去掉了代码清单 1-4 中的大量代码。你可以看到，那些将结果推迟到主线程执行的代码不见了。你还可以看到，代码可以从上到下阅读——就像普通的程序性编程风格一样！这个版本的获取用户数据
    API 读起来更简单，写起来也更简单。`@MainActor` 就是所谓的*全局执行体*。我们将在本书后面探讨执行体和全局执行体。现在，你只需知道 `@MainActor`
    会确保带有此标记的函数或类中的成员更新在主线程中运行。


    通过理解何时直接使用系统的关键字（代码清单 1-7 展示了 `async` 和 `await` 本身就是关键字）以及系统的其他原语，你将能够编写任何程序员都能理解的并发和多线程代码。更棒的是，如果一位开发者刚接触
    Apple 平台开发，但拥有使用其他采用 `async/await` 技术的经验，他们将能快速熟悉这套系统。你的代码库将更加整洁，并欢迎团队中的新开发者加入。


    使用 `async/await` 将避免你编写底层并发代码。你永远不需要直接管理线程。锁也完全不是你的责任。如你所见，这个新系统允许我们编写富有表达力的代码，而回调地狱已成为过去。


    重要的是要记住，尽管这是一个高级系统，你仍可能会遇到极少数需要底层工具的特殊情况。话虽如此，大多数开发者在整个职业生涯中可能都找不到一个需要将 `async/await`
    搁置一旁的实际用例。


    ## 环境要求


    要跟学本书，你至少需要从 App Store 下载 Xcode 13。如果你想在 iOS 14 和 iOS 13 上使用 `async/await`，则需要
    Xcode 13.3。你应该能够熟练阅读和编写 Swift 代码。部分示例将使用 SwiftUI 编写，以避免 UI 代码干扰你对各章节实际内容的关注。

