    \ 改为 Actor，而非结构体。这正是一个 Actor 的完美使用场景，因为多个任务都需要修改它。\n\n### 类\n\n类默认是不可发送的。但是，当类被标记为\
    \ `final` 且拥有只读属性时，你可以使其遵循 `Sendable` 协议。你可以将 `TVShow` 标记为遵循 `Sendable`，这样代码就能编译通过，但并非毫无警告。图\
    \ 7-2 展示了尝试这样做时会得到的警告。\n\n![屏幕截图显示了类 TV Show 的代码，包含七行代码，其中第一行和第二行有一些错误被高亮。](img/532302_1_En_7_Fig2_HTML.png)\n\
    \n*图 7-2 使类符合可发送性*\n\n将类标记为 `final` 会消除顶部的警告，但无法消除底部的警告。将 `rating` 改为 `let` 变量会消除底部的警告，但此后我们就无法修改评分了。根据经验法则，如果你有需要可发送的类，将其标记为\
    \ `final` 并使所有属性变为只读是可行的方法，但这里的情况并不允许这样做。\n\n最终，解决这个类问题的唯一方法是选择退出编译器的安全检查。为此，请在遵循\
    \ `Sendable` 之前添加 `@unchecked` 属性。代码清单 7-4 展示了不会产生任何警告的新 `TVShow` 类。\n\n```swift\n\
    class TVShow: @unchecked Sendable {\n    let name: String\n    var rating: Int\
    \ = 0\n    init(name: String) {\n        self.name = name\n    }\n}\n```\n\n*代码清单\
    \ 7-4 选择退出编译时检查*\n\n需要再次强调，当你使用 `@unchecked` 时，你是在选择退出编译器的检查。由于这个类自身没有同步机制，当多个任务或\
    \ Actor 同时修改它时，**将会**导致数据竞争。你可以通过使用类似 `NSLock` 的机制来添加自己的同步机制。代码清单 7-5 展示了一个非常简单的实现。\n\
    \n```swift\nclass TVShow: @unchecked Sendable {\n    let name: String\n    var\
    \ rating: Int = 0 {\n        willSet {\n            mutex.lock()\n        }\n\
    \        didSet {\n            mutex.unlock()\n        }\n    }\n    let mutex\
    \ = NSLock()\n    init(name: String) {\n        self.name = name\n    }\n}\n```\n\
    \n*代码清单 7-5 手动实现锁以同步状态*\n\n通过使用锁，我们可以在设置变量之前锁定它，并在设置之后解锁。这个例子足够简单，但更复杂的类则无法享受同样的好处。\n\
    \n> **警告**\n> 我不建议你在生产代码中使用此代码，除非你真正理解锁等并发原语的工作原理。新的并发系统旨在帮助开发者无需关注此类细节。\n"
- fmt: '# Closures


    In Swift, closures are first-class citizens. You can pass closures and function
    references around other parts of your code to call them anytime. You have likely
    seen this when working with the `filter`, `map`, and `reduce` methods of collections
    in Swift. To recap, Listing [7-6] shows a simple use of the `filter` method.


    ```

    library.shows.filter { $0.rating >= 10 && $0.rating <= 30 }

    Listing 7-6

    Using the filter method

    ```


    Because you can pass functions and closures around other pieces of your code,
    you can be more than certain that they should be able to be sendable as well.


    Neither functions or closures can conform to protocols, but we can use the `@Sendable`
    attribute instead. When we use this attribute, the compiler will understand that
    it doesn’t need to synchronize for anything, because the body of `@Sendable` functions
    are sendable, and sendable closures can only capture sendable types.


    If you ever look at the documentation for `Task`, you will see that its signature
    is the same one in Listing [7-7].


    ```

    @frozen struct Task where Success : Sendable, Failure : Error

    Listing 7-7

    Declaration for Task

    ```


    It has a generic type `Success` that conforms to `Sendable`. So tasks operate
    on `Sendable` types. Now let’s take a look at the declarations for its initializer
    and for the `detached` static method. They are both in Listing [7-8].


    ```

    @discardableResult init(

    priority: TaskPriority? = nil,

    operation: @escaping () async -> Success

    )

    //...

    @discardableResult static func detached(

    priority: TaskPriority? = nil,

    operation: @escaping () async throws -> Success

    ) -> Task

    Listing 7-8

    Declarations for a Task’s initializer and the detached static method

    ```


    We have established that `Success` is something that conforms to `Sendable`. This
    is how Swift does its magic to ensure that non-sendable types cannot be transferred
    to other concurrent domains. The initializer takes a closure that returns a `Sendable`
    type, and the `detached` method returns a `Task` with the same requirements.


    We can create our own `Sendable` functions with this same behavior. Listing [7-9]
    declares a method with a `@Sendable` closure. This method will print something
    before executing the method, and something after doing so. You could use a function
    like this to benchmark your methods.


    ```

    func logBeginningAndEnd(operation: @Sendable () -> Void) {

    print("Calling Closure")

    operation()

    print("Closure finished")

    }

    Listing 7-9

    Declaring a method that takes a @Sendable closure

    ```


    Now let’s try calling this method, passing something that is not sendable. Listing
    [7-10] creates a new `TVShowLibrary` instance and makes use of this method.


    ```

    var tvShowLibrary = TVShowLibrary()

    logBeginningAndEnd {

    let showsCount = tvShowLibrary.shows.count

    print("\(showsCount) Shows")

    }

    Listing 7-10

    Calling a @Sendable closure capturing a non-sendable type

    ```


    The compiler will not let you compile this, and you will see the same errors as
    in Figure [7-1].


    You know that in Swift, you can pass an actual function to a closure parameter.
    Listing [7-11] attempts to pass a function to a method that expects a closure,
    but the function we are passing is not `@Sendable`.


    ```

    func doSomething() {

    }

    logBeginningAndEnd(operation: doSomething)

    Listing 7-11

    Passing a non-sendable function to a sendable closure

    ```


    Swift will protect you here as well, but with a warning. Swift will warn you that
    “Converting non-sendable function value to `@Sendable () -> Void` may introduce
    data races”.


    So, if you are certain that your functions can be shared across different threads,
    don’t forget to mark them as `@Sendable` so the system doesn’t send out any unnecessary
    warnings, like in Listing [7-12].


    ```

    @Sendable func doSomething() {

    }

    Listing 7-12

    Marking the doSomething function as Sendable will silence the warning

    ```


    And naturally, don’t go on marking every single function or method you have as
    `@Sendable`. Only do this when you are certain the functions are safe to use in
    different concurrency domains and you intend to use them as such.


    Finally, if you have a variable that can store a closure, you can constrain it
    to `@Sendable` closures as well. Listing [7-13] declares a class which has a property
    that can store a `@Sendable` closure.


    ```

    class MyClass {

    var aClosure: @Sendable () -> Void

    init(aClosure: @escaping @Sendable () -> Void) {

    self.aClosure = aClosure

    }

    }

    Listing 7-13

    Declaring a variable that can store a @Sendable closure

    ```


    Finally, when you pass in a closure to a method, and you want that closure to
    be `@Sendable`, you can use the `@Sendable in` syntax at the top of your closure
    to mark it as such. Listing [7-14] passes an explicit `@Sendable` closure to the
    `MyClass` initializer.


    ```

    let myObject = MyClass { @Sendable in

    let a = 3

    }

    Listing 7-14

    Using the @Sendable in syntax

    ```


    In this specific example, it’s not necessary to do this, because `MyClass` is
    already treating the closure as `@Sendable`, but there will be times in which
    this will be useful, like when we talk about async sequences.


    ## Summary


    In this chapter, you learned about the mechanism that Swift uses to ensure that
    data cannot be mutated across different concurrency domains, or different threads.
    The `Sendable` protocol for types and the `@Sendable` attribute helps us tell
    the compiler that sharing data across concurrent domains should be allowed because
    they are protected against data races. Many types will have the conformance automatically
    by default, such us read-only structs and `actor` types. Swift will check for
    `Sendable` conformance when attempting to share these types across different threads.
    If we have a type that can be sendable but the Swift compiler cannot infer it,
    we can mark it as `@unchecked @Sendable` to tell Swift that this is indeed a sendable
    type, but we are responsible for synchronizing its internal state.


    # The Main Actor & Final Actors


    In Chapter [6], we learned about actors. Actors are reference types that synchronize
    their own internal state, so it is safe to mutate them from different threads.
    This is done by guaranteeing that only one task or thread can mutate the actor’s
    state at a time. Actors are sendable types meant to be used in a concurrent context.
    Actors are types that you instantiate and, for the most part, treat as normal
    classes. But what happens when we need *something* that is always guaranteed to
    run on the same thread, but when it may be spread out, even across different files?


    Before we study global actors, I want to talk about an old friend of ours: the
    main thread. I want to do this now because it is linked to this chapter’s main
    topic.'
