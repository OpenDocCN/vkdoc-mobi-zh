  raw: '## Summary


    Concurrency and multithreading are traditional computing problems. Doing concurrency
    at the lower level and managing resources yourself can be a challenge because
    they are easy to misuse. Misusing these resources and not getting your multithreaded
    code right will result in bugs in the best case and user data corruption in the
    worst case. Because of this, many developers, including Apple, have designed multiple
    tools to abstract away the details and provide easier interfaces. In the case
    of Apple, they have given developers the following tools (sorted from lower level
    to higher level):


    *   `pthread` s


    *   `NSThread` s


    *   The Grand Central Dispatch (GCD)


    *   `NSOperation` and related APIs


    *   `async/await`


    Most developers will never need to go down to the `pthread` or `NSThread` level
    . The GCD , and `NSOperation` APIs provide higher-level abstractions, whereas
    “async/await” not only will provide abstractions for the multithreading primitives,
    but it will also provide a whole system that most developers can use without even
    knowing what the components underneath are. This new system allows us to write
    shorter code that is easier to read and easier to write. It’s worth studying this
    new system in detail, and that’s what this book is about.


    ## Exercises


    Answer the Questions


    1.  When using traditional concurrency tools, what are some pitfalls you can fall
    into if you don’t use them correctly?


    2.  Prior to `async/await`, what were some concurrency tools available on Apple’s
    platforms?


    3.  What advantages does `async/await` have over other, lower-level concurrency
    tools?


    Footnotes [1](#532302_1_En_1_Chapter.xhtml#Fn1_source)


    # 2. Introducing async/await


    In the last chapter, we talked about some common problems people run into when
    writing concurrent and multithreaded code. We also saw some of the options Apple
    has for developers for this job, from lower-level alternatives that are hard to
    use correctly, to higher-level alternatives that are easier to use, but have less
    flexibility.


    The rest of this book will focus on the new concurrency system which we will simply
    call `async/await`. In this chapter, we will explore the basic building of this
    new system – the `async` and `await` keywords. We will not delve into multithreading
    just yet. Once you understand how to use these keywords and how they behave with
    the APIs in the SDK you already know, you will have the right tools to learn everything
    this new system can do. But before we move on, let’s talk a bit more about closures
    and callbacks (or blocks, as they are called in Objective-C).


    ## Closures and Their Place in Concurrency and Multithreading


    To work through this chapter, I recommend you get the sample project “Chapter
    [2](#532302_1_En_2_Chapter.xhtml) - Social Media App ”. First, we will talk about
    the existing code in the app that makes use of closure-based concurrency , and
    later we will modify it to use `async/await` instead.


    The sample app consists of two different views.


    The first view shows a simple button you can tap to authenticate with biometrics
    , as shown in Figure [2-1](#532302_1_En_2_Chapter.xhtml#Fig1).


    ![](images/532302_1_En_2_Chapter/532302_1_En_2_Fig1_HTML.jpg)


    A screenshot of a smartphone depicts the time, a WIFI signal, a fully charged
    battery, and the word Authenticate.


    Figure 2-1


    Entry point of the Social Media App


    And the second screen, Figure [2-2](#532302_1_En_2_Chapter.xhtml#Fig2), shows
    a profile view once successfully authenticated:


    ![](images/532302_1_En_2_Chapter/532302_1_En_2_Fig2_HTML.jpg)


    A screenshot of the smartphone depicts time, a WIFI signal, a fully charged battery,
    and a photo of a man named Andybanez''s profile with zero followers and followings.


    Figure 2-2


    Main profile view of the Social Media App


    Upon authenticating, the app will consume two different web services : One to
    retrieve the user profile, and one to fetch their followers and following users
    counts.


    Note


    If you run this app in the simulator, you will need to enroll to Face ID. To do
    this, open the simulator, go to Feature menu ➤ FaceID, and ensure *Enrolled* is
    ticked. Rerun the app afterwards.


    Closure-based concurrency is, at the time of this writing, present in most apps
    that use concurrency. Open the file *UserAPI.swift* and you will see the code
    in Listing [2-1](#532302_1_En_2_Chapter.xhtml#PC1), which looks all too familiar.


    ```

    class UserAPI {

    func fetchUserInfo(

    completionHandler: @escaping (_ userInfo: UserInfo?, _ error: Error?) -> Void

    ) {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json")!

    let session = URLSession.shared

    let dataTask = session.dataTask(with: url) { data, response, error in

    if let error = error {

    completionHandler(nil, error)

    } else if let data = data {

    do {

    let userInfo = try JSONDecoder().decode(UserInfo.self, from: data)

    completionHandler(userInfo, nil)

    } catch {

    completionHandler(nil, error)

    }

    }

    }

    dataTask.resume()

    }

    //...

    }

    Listing 2-1

    Downloading some data from a server and parsing it to show it to the user

    ```


    This code may look intimidating to newcomers, but seasoned developers can tell
    what’s going on. The code above will create a `URLSessionDataTask` , which is
    the Foundation object we have for downloading data from the network via HTTP.
    We need to call `resume()` on the newly defined `dataTask` in order to actually
    perform a download. Once the task is finished, we check if we have an error. If
    we do, we call the function’s `completionHandler` by not giving it any `userInfo`
    and giving it an `Error` instead. If we do have some data, we will try to parse
    it into a `UserInfo` object. If there is an error in the parsing process, we will
    once again call the handler with an error. If it succeeds, we got what we wanted,
    and we call the handler with the newly downloaded object.


    You may have seen variations of this function. For example, some developers may
    choose to define the function as taking two closures where one only takes the
    `userInfo` object and the other one only takes an error, so the closures called
    are different for each case. This will allow you to get rid of the optionals,
    but if there is common code that needs to run regardless of the case, you will
    have longer code. Listing [2-2](#532302_1_En_2_Chapter.xhtml#PC2) shows how this
    would be done.


    ```

    func fetchUserInfo(

    success: @escaping (_ userInfo: UserInfo) -> Void,

    failure: @escaping (_ error: Error) -> Void

    ) {

    //...

    }

    Listing 2-2

    An alternative way to deal with completion handlers

    ```


