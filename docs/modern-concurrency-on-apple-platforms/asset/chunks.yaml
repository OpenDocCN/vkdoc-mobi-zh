  trans: '

    ###### 信号量


    `Semaphore`（信号量）是一种锁，与互斥锁非常相似。使用这种解决方案，任务会获取对资源的锁。任何其他到达并需要该资源的任务都会发现该资源正忙。当原始线程释放资源时，它会*通知*感兴趣的相关方资源已空闲，然后它们在与资源交互时会遵循相同的加锁和通知流程。


    互斥锁和信号量听起来很相似，但关键区别在于它们锁定的资源类型。如果你发现自己需要决定保护什么（在使用 `async/await` 时不会遇到这种情况），那么思考哪种方式在你的用例中更有意义就很重要了。通常，互斥锁可用于保护任何本身不涉及任何执行逻辑的资源，例如文件、套接字和其他文件系统元素。信号量可用于保护程序本身的执行，例如共享的代码执行路径。这些可能是具有共享状态的可变函数或类。在某些情况下，多个线程执行一个函数可能会产生意想不到的后果，而信号量正是一个很好的工具。例如，一个将日志写入磁盘的函数可以用信号量保护，因为如果多个进程同时写入日志，日志最终会被损坏。谁拥有日志函数的信号量，谁就需要通知其他感兴趣的相关方该资源已空闲，以便它们可以继续执行。


    一个经验法则是，在获取信号量时始终添加超时机制，如果进程耗时过长，则让其超时。如果在你的程序上下文中这是可以接受的（不会发生数据损坏，或者取消任务不会产生其他意外后果），请考虑添加超时，以便信号量在一段时间后再次变为空闲。


    使用信号量将允许线程进行*同步*，因为它们能够相互协调资源，从而公平地使用这些资源。


    #### 饥饿


    *饥饿*问题发生在程序陷入永久等待资源以执行某些工作但永远无法获得资源的状态时。图 1-3 说明了这个问题。


    ![](img/532302_1_En_1_Fig3_HTML.png)


    图 1-3：哲学家就餐问题


    图 1-3 描述了所谓的*哲学家就餐问题*，这是饥饿问题的一个经典例子。该问题描述了五位想要在一张共用餐桌上就餐的哲学家。他们都有自己的盘子，并且有五把叉子。然而，每位哲学家需要两把叉子才能吃饭。这意味着只有两位哲学家可以吃饭，而且只能是那些不直接相邻的哲学家。当一位哲学家不吃饭时，他会放下两把叉子。但可能出现这样的情况：一位哲学家决定吃个不停，导致另一位哲学家挨饿。


    对于低层多线程开发人员来说幸运的是，可以使用我们上面讨论过的*信号量*来解决这个问题。思路是使用一个信号量来跟踪使用中的叉子，这样当有叉子可用时，它就可以通知另一位哲学家。


    #### 竞态条件


    这可能是大多数开发人员最熟悉的多线程问题，*竞态条件*与死锁非常相似，不同之处在于它们可能导致数据或内存损坏，从而引发其他不良后果。当处理多线程时，两个进程同时读取数据本身并非坏事。如果资源是只读的，则没有坏处。但是，如果进程可以以任何方式修改或更新资源，那么这些进程将不断地覆盖另一个进程刚刚写入的数据，这最终会导致读取和写入损坏的数据。如果涉及的资源是用户数据，用户将会不满。如果资源由操作系统提供，则可能导致其他意外后果，并最终引发死锁等多线程问题。图
    1-4 说明了这个陷阱。


    ![](img/532302_1_En_1_Fig4_HTML.jpg)


    图 1-4：多个线程同时写入同一个文件


    如果历史日志被多个没有任何控制的线程写入，事件可能会以随机顺序记录，一个线程可能会覆盖另一个线程刚刚写入的行。因此，历史日志的写入操作应该被锁定。一个线程在写入日志时会获得一个*互斥锁*，并在使用完成后释放它。任何其他需要写入日志的线程都将等待，直到锁被释放。


    死锁和竞态条件非常相似。主要区别在于，在死锁中，我们有多个进程在等待彼此完成；而在竞态条件中，两个进程都在写入数据并损坏数据，因为没有进程知道涉及的资源正被其他人使用。这意味着死锁的解决方案也适用于竞态条件，因此只需使用互斥锁或信号量来锁定你的资源，以确保仅由一个进程对资源进行独占访问。这称为*原子操作*。


    #### 活锁


    生活中有一句谚语：“*过犹不及*。”理解随意地使用锁并不能解决所有多线程问题是很重要的。识别出一个多线程问题，然后扔一个互斥锁上去就了事，这听起来很诱人。不幸的是，事情并非如此简单。你需要理解你的问题，并确定锁应该放在哪里。


    同样，当进程在释放和获取资源的条件上过于宽松时，也可能出现这个问题。如果 `线程 A` 可以请求 `线程 B` 的一个资源，并且 `线程 B` 不加思考地顺从，而
    `线程 B` 也可以对 `线程 A` 做同样的事，那么最终可能发生的情况是，它们将无法再向对方请求资源，因为它们甚至无法执行到执行流程中的那个点。


    这是一个现实生活中的经典例子。假设你正走向一扇关闭的门，而另一个人几乎同时到达。你可能想让对方先进，但对方可能告诉你应该你先走。如果你熟悉这种尴尬的感觉，那么你就知道我们多线程程序中的活锁是什么感觉了。


    ### 现有的多线程与并发工具


    苹果公司提供了一些较低级别的工具来编写多线程和并发代码。我们将展示其中一些工具的示例。它们按从低级到高级的顺序列出。级别越低，越难正确使用该系统，并且在现实世界中遇到它的可能性也越小。你应该了解这些工具，以便在需要时能够使用它们。

    '
- fmt: "#### pthreads\n\n`pthreads`（POSIX Threads）是 IEEE 定义的标准实现。^([¹](#fn1)) 其名称中的`POSIX`（Portable\
    \ Operating System Interface，可移植操作系统接口）表明它们不仅可在 Apple 操作系统上使用，也可在许多平台上运行。传统上，硬件供应商会提供各自专有的多线程\
    \ API。得益于这一标准，你可以在多个 POSIX 系统中使用相似的接口。`pthreads` 的一大优势是，只要系统兼容 POSIX（包括某些 Linux\
    \ 发行版），它们便广泛可用。\n\n`pthreads` 的缺点是它们完全用 C 语言编写。C 是一种非常底层的编程语言，并且正逐渐淡出许多开发者的知识体系。开发者越年轻，掌握\
    \ C 语言的可能性就越小。虽然我不认为 C 语言会很快消失，但事实上很难找到熟悉 C 语言（更不用说正确使用它）的 iOS 开发者。`pthreads`\
    \ 是我们可用的最底层的多线程 API，因此学习曲线非常陡峭。如果你选择使用 `pthreads`，那是因为你需要高度精确地控制整个多线程和并发流程，不过大多数开发者很少（甚至从未）需要下降到这一层级。你将需要手动启动线程并管理诸如互斥锁（`mutex`）等资源。如果你因在其他平台使用过\
    \ `pthreads` 而熟悉它，可以在这里沿用这些知识，但要注意未来的维护者可能既不熟悉 `pthreads` 也不熟悉 C 语言本身。\n\n####\
    \ NSThreads\n\n`NSThread` 是 Apple 提供的一个 Foundation 对象。它属于底层工具，但不如 `pthreads` 那样底层。由于它是\
    \ Foundation 对象，因此提供了 Objective-C 接口。这一接口让更多开发者能接触该工具，但随着时间推移，了解 Objective-C 的\
    \ iOS 开发者可能会越来越少。事实上，完全有可能找到拥有数年经验却从未使用过该语言的 iOS 开发者，尽管 `NSThread` 也可以在 Swift\
    \ 中使用。\n\n如果你想进行多线程编程，最终需要创建多个 `NSThread` 对象，并负责管理它们。每个 `NSThread` 对象都含有可用于检查线程状态的属性，例如\
    \ `executing`、`cancelled` 和 `finished`。你可以设置每个线程的优先级，这在多线程中是非常真实的需求。你甚至可以获取主线程，并判断当前线程是否为主线程，从而避免在主线程上执行耗时任务。\n\
    \n与 `pthreads` 类似，大多数开发者很少（甚至从未）需要下降到这一层级。\n\n#### Grand Central Dispatch (GCD)\n\
    \n接下来我们将讨论 Apple 平台上第一个用于高级并发和多线程的高层工具。Grand Central Dispatch（以下简称 GCD）在 Apple\
    \ 的 SDK 中无处不在，以至于你很可能在不知不觉中使用过它。如果我遇到一个从未写过类似代码清单 1-3 中代码的开发者，我会感到惊讶。\n\n```\n\
    DispatchQueue.main.async {\n    nameLabel.text = userResponse.username\n}\nListing\
    \ 1-3\n在主线程上调用代码\n```\n\n看起来很熟悉？这是 GCD 中最著名的调用之一，因为它能让你快速无痛地将某些工作推迟到主线程执行。例如，在\
    \ `URLSessionTask` 的某个子类完成某些工作后，你希望更新 UI 时，很可能会看到这个调用。\n\n作为高层框架，GCD 让你免除了比 `pthreads`\
    \ 和 `NSThreads` 更多的繁琐工作。使用 GCD，你永远无需手动管理线程。从这个意义上说，它确实是一个高层框架，但它也带来了一些自身的负担。代码清单\
    \ 1-4 展示了一些开发者在使用 GCD 时遇到的经典问题。\n\n```\nfunc fetchUser() {\n    userApi.fetchUserData\
    \ { userData in\n        DispatchQueue.main.async {\n            self.usernameLabel.text\
    \ = userData.username\n            self.userApi.fetchFavoriteMovies(for: userData.id)\
    \ { movies in\n                DispatchQueue.main.async {\n                  \
    \  self.userMovies = movies\n                }\n            }\n        }\n   \
    \ }\n}\nListing 1-4\n厄运金字塔（pyramid of doom）\n```\n\n代码清单 1-4 展示了一段假设的代码，它从某个地方获取用户数据及其最喜欢的电影。这种用法在\
    \ GCD 中非常典型。当你的工作需要多次依赖于其他任务的调用时，你的代码就会开始呈现“厄运金字塔”的形状。虽然有办法解决这个问题（例如创建不同的函数来分别获取用户数据和电影），但这并不完全优雅。\n\
    \n尽管有这些缺点，GCD 仍然是创建并发和多线程代码的一种非常流行的方法。它为你内置了许多保护机制，因此你无需成为多线程理论专家也能避免犯错。我们这里看到的示例仅展示了它提供的极少一部分功能。虽然这个工具足够高层，能让你免去许多麻烦，但它也暴露了大量底层功能，并让你能够直接操作某些原语，例如信号量（`semaphores`）。\n\
    \n最后，这项技术是开源的，因此可以在 Apple 产品之外的平台上找到。GCD 体量庞大，详细讨论其特性已超出本书范围，但请注意，它已被广泛使用很长时间，你在职业生涯中很可能会见识到一些使用它的高级技巧。"
  raw: '#### pthreads


    *pthreads* (POSIX Threads) are the implementation of a standard defined by the
    IEEE.^([¹](#fn1)) The *POSIX* part of their name (Portable Operating System Interface)
    tells us that they are available in many platforms, and not only on Apple’s operating
    systems. Traditionally, hardware vendors used to sell their products offering
    their own, proprietary multithreading APIs. Thanks to this standard you can expect
    to have a familiar interface in multiple POSIX systems. The great advantage of
    pthreads is that they are available in a wide array of systems if they are POSIX
    compliant, including some Linux distributions.


    The disadvantage is that pthreads are purely written in C. C is a very low-level
    programming language, and it is a language that is slowly fading from the knowledge
    base of many developers. The younger they are, the less likely they are to know
    C. While I do not expect C to disappear any time soon, the truth is that it’s
    very hard to find iOS developers who know the C programming language, let alone
    use it correctly. pthreads are the lowest-level multithreading APIs we have available,
    and as such they have a very steep learning curve. If you opt to use pthreads
    , it’s because you have highly specific needs to control the entire multithreading
    and concurrency flow, though most developers will not need to drop down to these
    levels often, if at all. You will be launching threads and managing resources
    such as mutex more manually. If you are familiar with pthreads because you worked
    with them in another platform, you can use your knowledge here too, but be aware
    future programmers who will maintain your code may not be familiar with either
    pthreads or the C language itself.


    #### NSThreads


    *NSThread* is a Foundation object provided by Apple. They are low level, but not
    as low level as pthreads. Since they are foundation objects, they offer an Objective-C
    interface . Offering this interface will expose the tool to many more developers,
    but as time goes on, less iOS developers are likely to know Objective-C. In fact,
    it’s entirely possible to find iOS developers with some years of experience who
    have never had to use this language before, although it can be used in Swift as
    well.


    If you want to work with multithreading, you will end up creating multiple `NSThread`
    objects, and you are responsible for managing them all. Each `NSThread` object
    has properties you can use to check the status of the thread, such as `executing`,
    `cancelled`, and `finished`. You can set the priority of each thread which is
    a very real use case in multithreading. You can even get the main thread back
    and ask if the current thread is the main thread to avoid doing expensive work
    on it.


    Just like pthreads , most developers will not have to drop down to this level
    often, if at all.


    #### The Grand Central Dispatch (GCD)


    We will now talk about the first high-level tool for high-level concurrency and
    multithreading on Apple platforms. The Grand Central Dispatch (simply called GCD
    from here on) is so ubiquitous throughout Apple’s SDKs that you have likely used
    it even without knowing. I’d be surprised if I met a developer who has never written
    a line like Listing [1-3](#532302_1_En_1_Chapter.xhtml#PC4).


    ```

    DispatchQueue.main.async {

    nameLabel.text = userResponse.username

    }

    Listing 1-3

    Calling code on the main thread

    ```


    Looks familiar? This is one of the most famous calls on the GCD because it allows
    you to defer some work quickly and painlessly to be done on the main thread .
    This call is likely to be found after a subclass of `URLSessionTask` finishes
    some work and you want to update your UI, for example.


    The GCD , being high level, saves you from doing a lot of work than `pthread`
    s and `NSThread` s . With the GCD, you will never concern yourself with managing
    threads manually. It truly is a high-level framework in that sense, but it carries
    its own baggage as well. Listing [1-4](#532302_1_En_1_Chapter.xhtml#PC5) shows
    a classic issue some developers have when working with the GCD .


    ```

    func fetchUser() {

    userApi.fetchUserData { userData in

    DispatchQueue.main.async {

    self.usernameLabel.text = userData.username

    self.userApi.fetchFavoriteMovies(for: userData.id) { movies in

    DispatchQueue.main.async {

    self.userMovies = movies

    }

    }

    }

    }

    }

    Listing 1-4

    The pyramid of doom

    ```


    Listing [1-4](#532302_1_En_1_Chapter.xhtml#PC5) shows hypothetical code that would
    retrieve a user’s data and their favorite movies from somewhere. This usage is
    very typical with the GCD . When your work requires you to do more than one call
    that depends on the task of another, your code starts looking like a *pyramid
    of doom* . There are ways to solve this (like creating different functions for
    fetching the user data and their movies), but it’s not entirely elegant.


    Despite its drawbacks, the GCD is a very popular way to create concurrent and
    multithreaded code. It has a lot of protections in place already for you, so you
    don’t have to be an expert in the theory of multithreading to avoid making mistakes.
    The samples we saw here only show a very tiny bit of functionality it offers.
    While the tool is high level enough to save you from many headaches, it exposes
    a lot of lower level functionality, and it gives you the ability to directly interact
    with some primitives such as semaphores .


    Finally, this technology is open source, so it’s possible to find in platform
    outside of anything Apple develops. The GCD is big, and talking about its features
    would go outside the scope of this book, but be aware that it has been in use
    for a very long time and it’s possible you are going to see some advanced techniques
    with it in your career.'
