- fmt: '# Before You Get Started


    While Apple managed to backport the new concurrency system to iOS 13 and iOS 14,
    it is recommended you study this system with iOS 15. There are no native APIs
    that use `async/await` in lower iOS versions, and you would need to provide an
    alternative to them every time you are interested in using them.


    It is recommended you have at least Xcode 13, but you should have the latest version
    if possible. At the time of this writing, the latest Xcode version is 13.4.1.
    The exercises and sample code were tested on this Xcode version. This implies
    your Mac will need to run macOS Monterey as Xcode 13 cannot run on anything lower
    than Monterey.


    # Acknowledgments


    Whenever you decide to buy a technical book, you usually see one or two author
    names, and maybe a reviewer attached to it, but there are a lot of people involved
    in a single book, both directly and indirectly. It will not be possible to acknowledge
    everyone who has helped make this book possible, but I’d like to single out a
    few.


    First, I’d like to give a big kudos to Alexis Marechal. Alexis has, in short,
    saved my career as a software developer. Alexis is not only a great teacher, but
    also a great friend. His teaching style has greatly inspired mine, and I hope
    I can do justice to that in this book. A big thank-you to Carlos Anibarro and
    Jose Luis Vera for their teachings and words of encouragement as well.


    Writing a book is something I have always wanted to do, but Ernesto Campohermoso
    is the first person who ever asked me, “When are you going to write a book?” That
    single question was a great push for this book to come into existence.


    Ivan Galarza is the first person I mentored in iOS development, and he became
    a very reliable iOS engineer in a short time thanks to all the talent he has.
    He was the ideal candidate to review a book in progress. His input helped me make
    sure everything makes sense and that this book will be something people would
    like to read.


    A big thank-you to all the folks at Apress for the process that made writing this
    book possible. The entire experience has been a joy, from being contacted to write
    a book to turning in the final chapters. The final form of this book would have
    not been possible without their tenacity and amazing work ethic.


    Finally, I’d like to give a big thanks to all the readers of my blog, andyibanez.com.
    The comments and feedback I received in the original tutorial series for this
    topic helped me greatly improve this book. I cannot reply to every message I get,
    but I am thankful to all my readers. Thank you all.


    # About the Author About the Technical Reviewer


    # 1. Introduction


    Programmers are used to writing programs that are executed in a linear fashion.
    As you write, test, and execute your program, you expect your instructions to
    run in the order that you wrote them. In Listing [1-1](#532302_1_En_1_Chapter.xhtml#PC2),
    you have a program that will first assign a variable `a` to the number `2`. It
    will then assign a variable `b` to the number `3`, followed by assigning a variable
    `sum`, the sum of `a + b`, and it will finally print a result to the console.
    There is no way this program will work if you try to `print(sum)` before you even
    managed to calculate the value for `sum`.


    ```

    let a = 2

    let b = 3

    let sum = a + b // This variable depends on the values for a and b, but the variables
    themselves can be assigned in any order.

    print(sum) // We can only print a variable that we have the value of.

    Listing 1-1

    A simple program that runs from top to bottom

    ```


    This is called *procedural programming*, because you write simple statements,
    and they are executed from top to bottom. Even if you add statements that can
    alternate the execution flow, it’s still easy to follow. If you call a function
    when working with procedural programming, your program will “jump” to a different
    place in memory and execute its contents, but the execution of these lines will
    also be done procedurally in the same order they were written until control flow
    is returned to the caller.


    Even people who are not programmers can follow any instruction set if they are
    written in a specific order and *if they are doing one thing at a time*. Someone
    following a cooking recipe, or someone building a doghouse from an online tutorial
    may not be a programmer, but people are naturally good at doing something if they
    have the steps clearly laid down.


    But computer programs grow and become more complex. While it is true that a lot
    of complex software can be written that follows such a linear execution flow,
    often programs will need to start doing more than one thing at once; rather than
    having a clear code execution path that you can follow with your bare eyes, your
    program may need to execute in such a way that it’s not obvious to tell what’s
    going on at a simple glance of the source code. Such programs are multithreaded,
    and they can run multiple (and often – but not always – unrelated) code paths
    at the same time.


    In this book, we will learn how to use Apple’s `async/await` implementation for
    asynchronous and multithreaded programming. In this chapter, we will also talk
    about older technologies Apple provides for this purpose, and how the new `async/await`
    system is better and helps you to not concern yourself with traditional concurrency
    pitfalls.


    ## Important Concepts to Know


    Concurrency and asynchronous programming are very wide topics. While I’d love
    to cover everything, it would go out of the scope of this book. Instead, we will
    define four important concepts that will be relevant while we explore Apple’s
    `async/await` system, introduced in 2021. We will define them with as few words
