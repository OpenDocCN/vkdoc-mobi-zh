    3.  `最后，获取用户的粉丝和关注用户。`\n\n使用闭包，这是意大利面条式代码。使用`async/await`，我们可以几乎原样地编写这三个语句。我们将把基于闭包的代码转换为`async/await`，但在开始之前，让我们先学习一些理论知识。\n"
- fmt: '### The `async` keyword


    The core of the system are the `async` and `await` keywords. It is crucial to
    understand how to use them to use the rest of the system.


    Functions that can be run asynchronously, or that can run at the same time alongside
    other functions, have the `async` keyword before the return type of a function.
    This will tell the compiler and other programmers that your function is asynchronous.
    Listing [2-6](#532302_1_En_2_Chapter.xhtml#PC8) shows what an `async` declaration
    looks like.


    ```

    func fetchUserInfo() async throws -> UserInfo { /*...*/ }

    Listing 2-6

    An async function declaration

    ```


    The declaration on Listing [2-6](#532302_1_En_2_Chapter.xhtml#PC8) will be the
    base of migrating our closure-based code into `async/await`. We have not even
    written much code yet, and we can already see some benefits. The completion handler
    is completely gone. If your function can throw errors, as is the case of our original
    `fetchUserInfo` method, you can mark the `async` function as `throws`, which will
    make error handling more natural. Finally, this function will return a `UserInfo`,
    which is not an optional, so you save yourself from having to unwrap the object
    and potentially other checks.


    In order to call an `async` function you need to be inside a concurrent context.
    There are a few ways to create such contexts:


    - The body of an `async` function is a concurrent context by itself. If a function
    is not marked as `async`, it cannot call `async` functions directly. Listing [2-7](#532302_1_En_2_Chapter.xhtml#PC9)
    will not compile.


    ```

    func authenticateAndFetchProfile() {

    //...

    let userProfile = try await fetchUserInfo()

    //...

    }

    Listing 2-7

    Attempting to call an async function outside an async context

    ```


    Marking the function as `async` will allow it to compile. Listing [2-8](#532302_1_En_2_Chapter.xhtml#PC10)
    fixes the code to get it to compile.


    ```

    func authenticateAndFetchProfile() async {

    //...

    let userProfile = try await fetchUserInfo()

    //...

    }

    Listing 2-8

    Creating an async context with the async keyword

    ```


    But what happens if we don’t have a concurrent context? Somewhere up there in
    your call hierarchy, you will find yourself in a situation in which there’s no
    concurrent context at all to run code in. Luckily the other method to create async
    contexts will help us deal with this problem.


    - By creating a `Task` object. `Task` is a very powerful object, and it will allow
    us to do multithreading later. We will also be able to have some control over
    them, such as cancelling them. We will explore such features in later chapters.
    For now, we will just use `Task` to create a concurrent context. `Task` has an
    initializer with a closure, and that closure itself is a concurrent context. Listing
    [2-9](#532302_1_En_2_Chapter.xhtml#PC11) shows how to use `Task`.


    ```

    func authenticateAndFetchProfile() {

    Task {

    //...

    let userProfile = try await fetchUserInfo()

    //...

    }

    }

    Listing 2-9

    Creating an async context with Task

    ```


    Even though `authenticateAndFetchProfile()` is not marked as `async`, creating
    a `Task` within it will allow us to run async functions.


    ### The `await` keyword


    Every call to an async function must be paired up with the `await` keyword at
    some point. `await` itself has special semantics, and it’s not just syntax to
    call `async` functions.


    If during your code’s execution the `await` keyword is encountered, your program
    can choose to suspend the currently executing function. For this reason, the `await`
    keyword is also commonly known as a suspension point. This is a decision the system
    will make, and you have no control over it. When we say it may suspend, we mean
    that the current execution will be paused and the `async` function will continue
    executing somewhere else. No code will be executed in your current function if
    it is suspended.


    To better understand suspension, Listing [2-10](#532302_1_En_2_Chapter.xhtml#PC12)
    will modify Listing [2-8](#532302_1_En_2_Chapter.xhtml#PC10) to add some `print`
    statement before and after the awaited call.


    ```

    func authenticateAndFetchProfile() async {

    //...

    print("Fetching user info")

    let userProfile = try await fetchUserInfo()

    print("User info fetched")

    //...

    }

    Listing 2-10

    Adding print statements will cause them to print their contents in order

    ```


    Listing [2-10](#532302_1_En_2_Chapter.xhtml#PC12) will print `Fetching user info`,
    and after a little while, it will print `User info fetched`. This is actually
    the order the statements were written in, and you didn’t have to dabble with any
    closures or anything to get that output. Nice!


    What’s happening during an `await` call that suspends is that you are returning
    control to the system, and as such, you have no control over when you will get
    control back. The same thread that called `fetchUserInfo()` will be free to do
    other work, and that other work is none of your concern since it’s handled by
    the system. It could be another task within your app, or it would be outside of
    your realm. Until control is returned to you, you cannot continue executing statements.
    For this reason, the code in Listing [2-10](#532302_1_En_2_Chapter.xhtml#PC12)
    will print the statements in the order they are written in, but it may take a
    little bit to print `User info fetched` as you have handled the thread to the
    system, and downloading the user info is a lengthy task. When the user info has
    finished download, a `return` statement will be reached within the `fetchUserInfo`
    call, and this statement is what will return control back to you. Note that it
    is up to the system to decide when it will give you back control, and it doesn’t
    happen immediately after hitting the `return` statement. The system may be executing
    other concurrent tasks and it needs to sort out its priorities before coming back
    to you.


    In summary, after hitting a suspension point (`await` keyword), if the system
    chooses to suspend, nothing underneath it will be executed until control is given
    back to you. While suspension takes place, the system is using that thread to
    do other work.


    Anything that happens after an `await` call is a continuation. We need to continue
    doing the work we were doing before we were suspended. This is important, because
    it’s possible that when we get control back, the statements in our code underneath
    the `await` may run in a different thread. In Listing [2-10](#532302_1_En_2_Chapter.xhtml#PC12),
    it means that the first `print` statement may run in a thread, and the second
    `print` statement may run in an entirely different thread. Using `async/await`
    does not save you from having to do UI work on the main thread, so if you need
    to update your UI, you need to defer that work to the main thread. In practice,
    this is done through a system-wide global actor called `@MainActor`. We will talk
    more about global actors in a later chapter.


    With all this theory in place, we can now get our feet wet. We will rewrite the
    closure-based code to use `async/await` instead.'
