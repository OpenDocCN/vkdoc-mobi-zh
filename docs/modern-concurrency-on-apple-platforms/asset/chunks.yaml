    \ 2005, company: \"Namco\")\n    let eternalSonata = Videogame(title: \"永恒终焉\"\
    , releaseYear: 2008, company: \"tri-Crescendo\")\n    let games = [zelda5, zelda6,\
    \ tales1, tales2, eternalSonata]\n    Task {\n        await library.add(games:\
    \ games)\n    }\n}\n清单 6-4\n与 actor 交互需要在异步上下文中进行\n```\n\n当对 `add(games:)` 方法执行多次调用时，actor\
    \ 每次只会执行其中一个调用。在清单 6-5 中，我们创建了一个新方法，用于向库中添加更多游戏。\n\n```\nfunc addNewGames(to library:\
    \ VideogameLibrary) {\n    let pokemon1 = Videogame(title: \"宝可梦 黄\", releaseYear:\
    \ 1998, company: \"Game Freak\")\n    let pokemon2 = Videogame(title: \"宝可梦 金\"\
    , releaseYear: 1999, company: \"Game Freak\")\n    let pokemon3 = Videogame(title:\
    \ \"宝可梦 红宝石\", releaseYear: 2002, company: \"Game Freak\")\n    let games = [pokemon1,\
    \ pokemon2, pokemon3]\n    Task {\n        await library.add(games: games)\n \
    \   }\n}\n清单 6-5\n向库中添加更多游戏\n```\n\n现在我们有两个添加游戏的方法。让我们尝试调用它们，如清单 6-6 所示。\n\n```\n\
    addGames(to: library)\naddNewGames(to: library)\n清单 6-6\n调用两个将调用 actor 的方法\n```\n\
    \n此时情况变得有趣起来。我们无法保证 `addGames` 或 `addNewGames` 中的游戏哪个会先被添加。但可以保证的是，无论哪个先执行，actor\
    \ 都会确保其中一个函数中的所有游戏在另一个函数开始运行之前全部添加到数组中。因此，数组要么先包含 `addGames` 中的所有游戏（按添加顺序），再包含\
    \ `addNewGames` 中的游戏（按添加顺序）；要么先包含 `addNewGames` 中的游戏（按添加顺序），再包含 `addGames` 中的游戏（同样按正确顺序）。游戏绝不会以交错顺序或任何类似混乱的方式被添加。\n\
    \n此外，对整个 actor 状态的访问是同步的。如果有人正在向库中添加游戏，同时另有人正在查询集合，actor 只会执行其中一个调用，直到完成。清单 6-7\
    \ 将创建三个不同的任务：两个用于添加游戏，一个用于按给定年份过滤游戏并打印其数量。\n\n```\nTask {\n    addGames(to: library)\n\
    }\nTask {\n    let games1998 = await library.fetchGames(by: 1998)\n    print(\"\
    \\(games1998.count) games\")\n}\nTask {\n    addNewGames(to: library)\n}\n清单 6-7\n\
    从不同任务访问 actor\n```\n\n`addGames` 中有一款 1998 年发布的游戏。`addNewGames` 中也有一款 1998 年发布的游戏。总计，该年份共有两款游戏。理想情况下，上述代码会打印\
    \ `2 games`，但由于这些任务试图并发访问 actor，三个任务中只有一个会先执行其内容。如果尝试运行这段代码，你会发现它大多数时候打印 `0 games`，有时也可能打印\
    \ `1 games`。互斥访问意味着同一时间只有一个人能进入 actor 并完成其工作，无论调用 actor 的哪个方法。任何对 actor 的调用都会阻塞它，直到其工作完成。\n\
    \n这也是一个向您展示任务优先级如何工作的好机会。您可以通过为添加游戏的任务分配更高的优先级来告诉编译器您希望这些游戏先被添加。清单 6-8 更改了任务的优先级。`.utility`\
    \ 是尽可能最低的优先级，因此在这种情况下，它*大多数时候*会最后执行，打印 `2 games`。\n\n```\nTask(priority: .high)\
    \ {\n    addGames(to: library)\n}\nTask(priority: .utility) {\n    let games1998\
    \ = await library.fetchGames(by: 1998)\n    print(\"\\(games1998.count) games\"\
    )\n}\nTask(priority: .high) {\n    addNewGames(to: library)\n}\n清单 6-8\n为任务分配优先级\n\
    ```\n"
- fmt: "### Nonisolated Access to an Actor\n\nThere will be times in which you know\
    \ that accessing an actor will not cause data races. For these cases, you can\
    \ mark some methods in your actor as `nonisolated`.\n\nTo demonstrate this, we\
    \ will add a new type and property to our `VideogameLibrary`. We will add the\
    \ owner information to it. Listing [6-9](#532302_1_En_6_Chapter.xhtml#PC9) shows\
    \ this new type.\n\n```\nstruct Owner {\n    let name: String\n    let favoriteGenre:\
    \ String\n}\n```\n\nWe will now modify the actor to have this new property, alongside\
    \ an initializer. Listing [6-10](#532302_1_En_6_Chapter.xhtml#PC10) shows these\
    \ modifications.\n\n```\nactor VideogameLibrary {\n    var videogames: [Videogame]\
    \ = []\n    let owner: Owner\n\n    init(owner: Owner) {\n        self.owner =\
    \ owner\n    }\n\n    func fetchOwnerInfo() -> String {\n        return \"\\(owner.name)\
    \ (\\(owner.favoriteGenre))\"\n    }\n    //...\n}\n```\n\nNote that we also added\
    \ a `fetchOwnerInfo` method. This will help us get a concatenated string with\
    \ the owner’s name and favorite videogame genre.\n\nFinally, Listing [6-11](#532302_1_En_6_Chapter.xhtml#PC11)\
    \ initializes the library with this new type.\n\n```\nlet owner = Owner(name:\
    \ \"Andy Ibanez\", favoriteGenre: \"JRPG\")\nlet library = VideogameLibrary(owner:\
    \ owner)\n```\n\nNow, if you wanted to call the `fetchOwnerInfo` method, you will\
    \ need to call it asynchronously, as seen in Listing [6-12](#532302_1_En_6_Chapter.xhtml#PC12).\n\
    \n```\nTask {\n    let ownerInfo = await library.fetchOwnerInfo()\n    print(ownerInfo)\n\
    }\n```\n\nBut in this example, we know that there’s nothing dangerous about accessing\
    \ the owner info synchronously. Because it is an immutable struct, we should really\
    \ be able to call it without needing to do so with `await`. We can tell the compiler\
    \ that this method is nonisolated so we can call it as we would any other method.\
    \ Listing [6-13](#532302_1_En_6_Chapter.xhtml#PC13) shows how this is done.\n\n\
    ```\nnonisolated func fetchOwnerInfo() -> String {\n    return \"\\(owner.name)\
    \ (\\(owner.favoriteGenre))\"\n}\n```\n\nAnd because of this, not only can we\
    \ lose the `await` keyword (you will get a helpful warning if you leave it), but\
    \ we also no longer need to call this method in an asynchronous context. In Listing\
    \ [6-14](#532302_1_En_6_Chapter.xhtml#PC14) we create a new method that prints\
    \ the owner info of a `VideogameLibrary`. Note that function is not `async`, it\
    \ does not use a `Task`, and the `fetchOwnerInfo` method no longer needs to be\
    \ awaited.\n\n```\nfunc printOwnerInfo(of library: VideogameLibrary) {\n    let\
    \ ownerInfo = library.fetchOwnerInfo()\n    print(ownerInfo)\n}\n```\n\n### Actors\
    \ and Protocol Conformance\n\nThere is one important thing you need to keep in\
    \ mind if you are planning on making your actor conform with protocols, or even\
    \ extend them with extensions.\n\nWhen you intend to conform to a protocol, you\
    \ will find issues along the way if the protocol has mutable requirements. For\
    \ example, take a look at the new type in Listing [6-15](#532302_1_En_6_Chapter.xhtml#PC15).\n\
    \n```\nactor Game {\n    let name: String\n    let year: Int\n\n    init(name:\
    \ String, year: Int) {\n        self.name = name\n        self.year = year\n \
    \   }\n}\n\nextension Game: Equatable {\n    static func == (lhs: Game, rhs: Game)\
    \ -> Bool {\n        return lhs.name == rhs.name\n    }\n}\n```\n\nWe are making\
    \ the actor conform to the `Equatable` protocol so we can compare two `Game`s\
    \ with the `==` operator. This example will compile fine, because the `==` function\
    \ relies on two immutable properties, and because the `==` function itself does\
    \ not require our actor to be mutated.\n\nHowever, consider the conformance in\
    \ Listing [6-16](#532302_1_En_6_Chapter.xhtml#PC16).\n\n```\nextension Game: Hashable\
    \ {\n    func hash(into hasher: inout Hasher) {\n    }\n}\n```\n\nAttempting to\
    \ use this conformance as-is will cause Swift to yield an error saying that the\
    \ actor-isolated method `hash(into:)` cannot be used to satisfy a protocol requirement.\
    \ The compiler is expecting `hash(into:)` to be a synchronous operation.\n\nIn\
    \ this case, we can easily solve the issue by adding the `nonisolated` keyword\
    \ to the method. Listing [6-17](#532302_1_En_6_Chapter.xhtml#PC17) adds the missing\
    \ keyword.\n\n```\nextension Game: Hashable {\n    nonisolated func hash(into\
    \ hasher: inout Hasher) {\n    }\n}\n```\n\nThis will effectively satisfy the\
    \ compiler, but you should always stop to consider if this makes sense. Will the\
    \ `hash(into:)` method depend on the isolated properties? If so, any attempts\
    \ you do to implement this method will likely be broken. You may find times in\
    \ which it really is not easy to conform to protocols that expect their methods\
    \ to be synchronous."
  raw: '### Nonisolated Access to an Actor


    There will be times in which you know that accessing an actor will not cause data
    races . For these cases, you can mark some methods in your actor as `nonisolated`
    .


    To demonstrate this, we will add a new type and property to our `VideogameLibrary`.
    We will add the owner information to it. Listing [6-9](#532302_1_En_6_Chapter.xhtml#PC9)
    shows this new type.


    ```

    struct Owner {

    let name: String

    let favoriteGenre: String

    }

    Listing 6-9

    The new Owner type

    ```


    We will now modify the actor to have this new property, alongside an initializer.
    Listing [6-10](#532302_1_En_6_Chapter.xhtml#PC10) shows these modifications.


    ```

    actor VideogameLibrary {

    var videogames: [Videogame] = []

    let owner: Owner

    init(owner: Owner) {

    self.owner = owner

    }

    func fetchOwnerInfo() -> String {

    return "\(owner.name) (\(owner.favoriteGenre))"

    }

    //...

    }

    Listing 6-10

    Adding the owner property to the actor

    ```


    Note that we also added a `fetchOwnerInfo` method. This will help us get a concatenated
    string with the owner’s name and favorite videogame genre.


    Finally, Listing [6-11](#532302_1_En_6_Chapter.xhtml#PC11) initializes the library
    with this new type.


    ```

    let owner = Owner(name: "Andy Ibanez", favoriteGenre: "JRPG")

    let library = VideogameLibrary(owner: owner)

    Listing 6-11

    Initializing the VideogameLibrary with the owner info

    ```


    Now, if you wanted to call the `fetchOwnerInfo` method , you will need to call
    it asynchronously, as seen in Listing [6-12](#532302_1_En_6_Chapter.xhtml#PC12).


    ```

    Task {

    let ownerInfo = await library.fetchOwnerInfo()

    print(ownerInfo)

    }

    Listing 6-12

    Calling the fetchOwnerInfo method

    ```


    But in this example, we know that there’s nothing dangerous about accessing the
    owner info synchronously. Because it is an immutable struct, we should really
    be able to call it without needing to do so with `await`. We can tell the compiler
    that this method is nonisolated so we can call it as we would any other method.
    Listing [6-13](#532302_1_En_6_Chapter.xhtml#PC13) shows how this is done.


    ```

    nonisolated func fetchOwnerInfo() -> String {

    return "\(owner.name) (\(owner.favoriteGenre))"

    }

    Listing 6-13

    Marking a method as nonisolated

    ```


    And because of this, not only can we lose the `await` keyword (you will get a
    helpful warning if you leave it), but we also no longer need to call this method
    in an asynchronous context. In Listing [6-14](#532302_1_En_6_Chapter.xhtml#PC14)
    we create a new method that prints the owner info of a `VideogameLibrary`. Note
    that function is not `async`, it does not use a `Task`, and the `fetchOwnerInfo`
    method no longer needs to be awaited.


    ```

    func printOwnerInfo(of library: VideogameLibrary) {

    let ownerInfo = library.fetchOwnerInfo()

    print(ownerInfo)

    }

    Listing 6-14

    Calling a nonisolated method doesn’t require asynchronicity

    ```


    ## Actors and Protocol Conformance


    There is one important thing you need to keep in mind if you are planning on making
    your actor conform with protocols , or even extend them with extensions.


    When you intend to conform to a protocol, you will find issues along the way if
    the protocol has mutable requirements. For example, take a look at the new type
    in Listing [6-15](#532302_1_En_6_Chapter.xhtml#PC15).


    ```

    actor Game {

    let name: String

    let year: Int

    init(name: String, year: Int) {

    self.name = name

    self.year = year

    }

    }

    extension Game: Equatable {

    static func == (lhs: Game, rhs: Game) -> Bool {

    return lhs.name == rhs.name

    }

    }

    Listing 6-15

    Making an actor conform to a type

    ```


    We are making the actor conform to the `Equatable` protocol so we can compare
    two `Game`s with the `==` operator. This example will compile fine, because the
    `==` function relies on two immutable properties, and because the `==` function
    itself does not require our actor to be mutated.


    However, consider the conformance in Listing [6-16](#532302_1_En_6_Chapter.xhtml#PC16).


    ```

    extension Game: Hashable {

    func hash(into hasher: inout Hasher) {

    }

    }

    Listing 6-16

    Conforming an actor to the Hashable Protocol

    ```


    Attempting to use this conformance as-is will cause Swift to yield an error saying
    that the actor-isolated method `hash(into:)` cannot be used to satisfy a protocol
    requirement. The compiler is expecting `hash(into:)` to be a synchronous operation.


    In this case, we can easily solve the issue by adding the `nonisolated` keyword
    to the method. Listing [6-17](#532302_1_En_6_Chapter.xhtml#PC17) adds the missing
    keyword.


    ```

    extension Game: Hashable {

    nonisolated func hash(into hasher: inout Hasher) {

    }

    }

    Listing 6-17

    Marking hash(into:) as nonisolated

    ```


    This will effectively satisfy the compiler, but you should always stop to consider
    if this makes sense. Will the `hash(into:)` method depend on the isolated properties?
    If so, any attempts you do to implement this method will likely be broken. You
    may find times in which it really is not easy to conform to protocols that expect
    their methods to be synchronous.'
  trans: "\n### 对 Actor 的非隔离访问\n\n有时你可能知道访问某个 actor 不会引发数据竞争。针对这些情况，你可以将 Actor 中的某些方法标记为\
    \ `nonisolated`。\n\n为了演示这一点，我们将为 `VideogameLibrary` 添加一个新类型和属性，即拥有者信息。代码清单 6-9\
    \ 展示了这个新类型。\n\n```\nstruct Owner {\n    let name: String\n    let favoriteGenre:\
    \ String\n}\n```\n\n现在我们将修改该 Actor，使其拥有这个新属性以及一个初始化器。代码清单 6-10 展示了这些修改。\n\n```\n\
    actor VideogameLibrary {\n    var videogames: [Videogame] = []\n    let owner:\
    \ Owner\n\n    init(owner: Owner) {\n        self.owner = owner\n    }\n\n   \
    \ func fetchOwnerInfo() -> String {\n        return \"\\(owner.name) (\\(owner.favoriteGenre))\"\
    \n    }\n    //...\n}\n```\n\n请注意，我们还添加了一个 `fetchOwnerInfo` 方法。这有助于我们获取一个包含拥有者姓名和喜爱游戏类型的拼接字符串。\n\
    \n最后，代码清单 6-11 使用这个新类型初始化了该库。\n\n```\nlet owner = Owner(name: \"Andy Ibanez\"\
    , favoriteGenre: \"JRPG\")\nlet library = VideogameLibrary(owner: owner)\n```\n\
    \n现在，如果你想调用 `fetchOwnerInfo` 方法，则需要像代码清单 6-12 那样异步调用它。\n\n```\nTask {\n    let\
    \ ownerInfo = await library.fetchOwnerInfo()\n    print(ownerInfo)\n}\n```\n\n\
    但在这个例子中，我们知道同步访问拥有者信息并无风险。由于它是一个不可变的结构体，我们完全应该能够在不使用 `await` 的情况下调用它。我们可以告诉编译器这个方法是非隔离的，这样我们就可以像调用其他方法一样调用它。代码清单\
    \ 6-13 展示了如何实现。\n\n```\nnonisolated func fetchOwnerInfo() -> String {\n    return\
    \ \"\\(owner.name) (\\(owner.favoriteGenre))\"\n}\n```\n\n正因如此，我们不仅可以去掉了 `await`\
    \ 关键字（如果保留了它，你会收到一条有用的警告），而且也不再需要在异步上下文中调用此方法。在代码清单 6-14 中，我们创建了一个新方法，用于打印 `VideogameLibrary`\
    \ 的拥有者信息。请注意，该函数并非 `async`，它没有使用 `Task`，并且 `fetchOwnerInfo` 方法也不再需要被等待。\n\n```\n\
    func printOwnerInfo(of library: VideogameLibrary) {\n    let ownerInfo = library.fetchOwnerInfo()\n\
    \    print(ownerInfo)\n}\n```\n\n### Actor 与协议遵循\n\n如果你计划让你的 Actor 遵循某个协议，甚至通过扩展来遵循它，需要牢记一个重要事项。\n\
    \n当你打算遵循某个协议时，如果该协议包含可变要求，你将会遇到问题。例如，请看代码清单 6-15 中的新类型。\n\n```\nactor Game {\n\
    \    let name: String\n    let year: Int\n\n    init(name: String, year: Int)\
    \ {\n        self.name = name\n        self.year = year\n    }\n}\n\nextension\
    \ Game: Equatable {\n    static func == (lhs: Game, rhs: Game) -> Bool {\n   \
    \     return lhs.name == rhs.name\n    }\n}\n```\n\n我们让这个 Actor 遵循 `Equatable`\
    \ 协议，以便能够使用 `==` 运算符比较两个 `Game` 实例。这个例子可以正常编译，因为 `==` 函数依赖于两个不可变属性，而且该函数本身不需要修改我们的\
    \ Actor。\n\n然而，请考虑代码清单 6-16 中的遵循情况。\n\n```\nextension Game: Hashable {\n    func\
    \ hash(into hasher: inout Hasher) {\n    }\n}\n```\n\n直接尝试使用这种遵循方式会导致 Swift 报错，提示\
    \ Actor 隔离的方法 `hash(into:)` 无法满足协议要求。编译器期望 `hash(into:)` 是一个同步操作。\n\n在这种情况下，我们可以通过给方法添加\
    \ `nonisolated` 关键字来轻松解决问题。代码清单 6-17 添加了缺失的关键字。\n\n```\nextension Game: Hashable\
    \ {\n    nonisolated func hash(into hasher: inout Hasher) {\n    }\n}\n```\n\n\
    这确实能满足编译器的要求，但你应该始终停下来思考一下这样做是否合理。`hash(into:)` 方法是否会依赖于被隔离的属性？如果是，那么你实现此方法的任何尝试都可能会出错。你可能会发现，要让\
    \ Actor 遵循那些要求其方法为同步的协议，并非易事。\n"
- fmt: "# Actor Reentrancy\n\nWhen we enter an actor, the actor may suspend if it\
    \ has a lot of work to do, calling other asynchronous methods. This can lead to\
    \ a common problem known as the Actor Reentrancy problem.\n\nThe actor reentrancy\
    \ problem occurs when you assume the overall state of your program before it reaches\
    \ an `await` call. Let’s explain this with an example. We will add a new method\
    \ to our existing `VideogameLibrary` actor. Listing [6-18](#532302_1_En_6_Chapter.xhtml#PC18)\
    \ shows this new method.\n\n```\nfunc addGamesAndPrintResults(_ games: [Videogame])\
    \ async throws {\n    let existingGameCount = videogames.count\n    // Imagine\
    \ a long-running operation is taking place here.\n    try await Task.sleep(nanoseconds:\
    \ 1_000_000_000)\n    add(games: games)\n    let newGameCount = existingGameCount\
    \ + games.count\n    print(\"Games before: \\(existingGameCount)\")\n    print(\"\
    Games now: \\(newGameCount)\")\n}\n```\n\n*Listing 6-18 — The `addGamesAndPrintResults`\
    \ method illustrates the actor reentrancy problem*\n\nThis new method will:\n\n\
    1. Get the number of games currently in our game library.\n2. Sleep and await\
    \ the task for a second.\n3. Add games to the library.\n4. Print how many games\
    \ were there before we added new games.\n5. Print how many games there are now.\n\
    \nThe actor reentrancy problem occurs when multiple tasks access this method.\
    \ When one task accesses it, it will store the current game count in the `existingGameCount`\
    \ variable. It will then hit a lengthy `await` call. In the meantime, a second\
    \ task could access this method and also store the number of games in a new `existingGameCount`\
    \ variable. If the first task finishes before the second one leaves the await,\
    \ the `existingGameCount` variable in the second task will essentially hold incorrect\
    \ data, because the library has more games than it had before.\n\nTo better illustrate\
    \ this problem, take a look at Figure [6-1](#532302_1_En_6_Chapter.xhtml#Fig1).\n\
    \n![](images/532302_1_En_6_Chapter/532302_1_En_6_Fig1_HTML.png)\n\n*A model diagram\
    \ represents `andysLibrary`, Task 1, and Task 2, which includes `videogames.count`\
    \ equal to 3, and with codes inside Tasks 1 and 2.*\n\n*Figure 6-1 — The actor\
    \ reentrancy problem illustrated*\n\nTwo tasks are accessing the actor to add\
    \ more games. We assume the library has 3 games already. The first task adds 4\
    \ games to it, and the second one adds 2. At the end of their executions, Task\
    \ 1 will print that there are now 7 games, and Task 2 will print that we have\
    \ 5. But both tasks entered at the same time, and we know that actors prevent\
    \ the state to be modified at the same time. So, one of the tasks is printing\
    \ incorrect data.\n\nEach of the tasks is printing the results as if it were the\
    \ only one accessing the actor and printing it. If Task 1 finishes before Task\
    \ 2, Task 2 should know that the library had in fact 7 games, and so it should\
    \ have printed 11 games total.\n\nThe problem here is that we assumed how many\
    \ games we had before we entered the `await` call. There is no guarantee that\
    \ after we leave a suspension point the state of the program will be as it was\
    \ before. We are *checking our assumptions* before an `await`ed call.\n\nUnfortunately,\
    \ actors cannot protect you in this situation. This is purely a logic issue that\
    \ is up to the developer. But a good rule of thumb is that you should check for\
    \ your assumptions *after* an awaited call. In this case, our assumption is the\
    \ number of games in the videogame library. It would make more sense if we calculated\
    \ that after we come back from a suspension. By simply moving the `existingGameCount`\
    \ variable, the program will be fixed. Listing [6-19](#532302_1_En_6_Chapter.xhtml#PC19)\
    \ places the `existingGameCount` variable in a more logical place.\n\n```\nfunc\
    \ addGamesAndPrintResults(_ games: [Videogame]) async throws {\n    // Imagine\
    \ a long-running operation is taking place here.\n    try await Task.sleep(nanoseconds:\
    \ 1_000_000_000)\n    let existingGameCount = videogames.count\n    add(games:\
    \ games)\n    let newGameCount = existingGameCount + games.count\n    print(\"\
    Games before: \\(existingGameCount)\")\n    print(\"Games now: \\(newGameCount)\"\
    )\n}\n```\n\n*Listing 6-19 — Moving the assumptions to a more appropriate place*\n\
    \nBy moving our assumptions to be after the await call, Task 1 and Task 2 may\
    \ still print different results in each call, but one thing is for sure, that\
    \ no matter who finishes first, the task to finish second will have all the right\
    \ data to show to the user.\n\n## Actors and Detached Tasks\n\nRecall that detached\
