  trans: '

    ### 将基于闭包的调用转换为 async/await


    打开 `Shared ➤ API ➤ UserAPI.swift` 文件。查看 `fetchUserInfo(completionHandler:)` 方法。为了方便起见，代码清单
    3-1 展示了其原始实现。


    ```

    func fetchUserInfo(

    completionHandler: @escaping (_ userInfo: UserInfo?, _ error: Error?) -> Void

    ) {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json")!

    let session = URLSession.shared

    let dataTask = session.dataTask(with: url) { data, response, error in

    if let error = error {

    completionHandler(nil, error)

    } else if let data = data {

    do {

    let userInfo = try JSONDecoder().decode(UserInfo.self, from: data)

    completionHandler(userInfo, nil)

    } catch {

    completionHandler(nil, error)

    }

    }

    }

    dataTask.resume()

    }

    代码清单 3-1

    fetchUserInfo(completionHandler:) 的原始实现

    ```


    你可以为该方法提供一个 `async/await` 版本，而无需像我们在第 2 章中那样从头重新实现它。这样做的一个缺点是你无法删除这个原始实现。优点是保留原始实现并没什么不好，因为对于那些尚不打算采用
    `async/await` 的代码库，你始终可以保留基于闭包的调用。代码清单 3-2 展示了我们如何在不重写代码的情况下提供该方法的 `async/await`
    版本。


    ```

    func fechUserInfo() async throws -> UserInfo {

    // (1)

    try await withCheckedThrowingContinuation { continuation in

    // (2)

    fetchUserInfo { userInfo, error in

    // (3)

    if let userInfo = userInfo {

    continuation.resume(returning: userInfo)

    } else if let error = error {

    continuation.resume(throwing: error)

    } else {

    // 抛出一个通用错误。

    let nsError = NSError(domain: "com.socialmedia.app", code: 400)

    continuation.resume(throwing: nsError)

    }

    }

    }

    }

    代码清单 3-2

    使用 withCheckedThrowingContinuation

    ```


    代码清单 3-2 本质上将基于闭包的代码包装在一个*受检查的续体（Checked Continuation）*中。`withCheckedThrowingContinuation`
    —— 以及我们稍后会探讨的其他变体 —— 是一个方法，它为闭包提供了一个参数。它提供的参数就是实际的续体，当你的异步闭包调用完成时，你有责任恢复（resume）该续体。在代码清单
    3-1 中，续体的类型是 `CheckedContinuation<T, E>`，这意味着我们可以用对象或错误来恢复续体。这完全合理，因为任何涉及网络调用的操作都可能失败。


    让我们逐步解析代码清单 3-2：


    * `(1)` 将调用 `withCheckedThrowingContinuation`。这是一个可以抛出错误的 `async` 函数。因此，我们用 `try
    await` 来调用它，并且函数签名与我们在第 2 章中看到的该代码的异步版本类似。调用此方法时，我们需要传递给它一个闭包，该闭包会提供一个续体对象，我们需要在操作完成后恢复它。


    * `(2)` 将像在其他任何上下文中一样，调用基于闭包的 `fetchUserInfo(completionHandler:)` 版本。


    * `(3)` 是魔法发生的地方。如果 `fetchUserInfo(completionHandler:)` 成功完成并且我们得到了一个 `UserInfo`
    对象，我们将通过调用 `continuation.resume(returning: userInfo)` 来恢复续体。如果收到错误，我们将调用 `continuation.resume(throwing:
    error)`。当调用 `continuation.resume(returning:)` 方法时，它会导致 `async` 版本 `fetchUserInfo()`
    的调用者返回结果对象；而调用 `continuation.resume(throwing:)` 则会导致它抛出错误。最终，代码清单 3-2 中方法的调用者，其行为将完全等同于第
    2 章中代码清单 2-10 的调用者。请记住，使用续体时，你**必须**在某个时间点且**恰好**调用一次续体。你不能忘记调用它，也不能多次调用它。如果忘记调用，程序将陷入死锁状态。


    除了 `withCheckedThrowingContinuation` 之外，我们还有另外三个方法可用于创建此类续体：


    * `withCheckedContinuation`

    * `withUnsafeThrowingContinuation`

    * `withUnsafeContinuation`


    当原始的基于闭包的代码不会返回任何类型的错误时，请使用 `withCheckedContinuation`。


    非安全变体 —— `withUnsafeThrowingContinuation` 和 `withUnsafeContinuation` —— 类似于它们对应的受检查版本。主要区别在于，使用受检查续体时，Swift
    会在检测到违规行为（例如多次调用续体或完全忘记调用续体）时记录错误，从而帮助你进行保护。非安全续体不具备这些特性，但它们的速度可能稍快。总的来说，我不建议你使用非安全续体，但要知道在大多数情况下你可以互换使用它们。


    ### 将基于委托的代码转换为 async/await


    将基于委托的代码转换为 `async/await` 是一个更复杂的过程，因为这类 API 可能会根据发生的事件类型来调用不同的委托方法。这自然会产生“跳转性”很强的代码。虽然这些调用可能发生在同一线程上，但由于它们调用方法的方式，结果可能难以预测。例如，*ContactsUI*
    框架提供了一个 `CNContactPickerViewController` 对象，当用户在一个方法中选择联系人时，它会通知你；如果用户取消了选择，则会调用另一个不同的方法。


    针对本节内容，请下载“第 3 章 - 联系人选择器（基础项目）”项目。

    '
- fmt: "#### The `ContactPicker` Project\n\nThis project is very simple (Figure [3-1](#532302_1_En_3_Chapter.xhtml#Fig1)).\
    \ It consists of a top label with a static prompt \"Select a Contact\". Underneath\
    \ it, we have a button, \"Select Contact\" that, when tapped, will present a `CNContactPickerViewController`\
    \ that our users can use to select a contact. Once a contact is selected, a new\
    \ label will appear underneath the button with a black text showing the contact's\
    \ name. If they cancel the operation, the label will be red instead, and it will\
    \ show the text \"Cancelled\".\n\n![](images/532302_1_En_3_Chapter/532302_1_En_3_Fig1_HTML.png)\n\
    \nA screenshot depicts the contact picker, which includes the labels Wi Fi, full\
    \ battery, and time 9:06, as well as the format, select a contact, below select\
    \ contact button, and John Appleseed.\n\nFigure 3-1\n\nThe `ContactPicker` app\n\
    \nOpen the `ViewController.swift` file. The core of this example lies in the methods\
    \ in Listing [3-3](#532302_1_En_3_Chapter.xhtml#PC3).\n\n```\nfunc contactPickerDidCancel(_\
    \ picker: CNContactPickerViewController) {\n    selectedContactLabel.text = \"\
    Cancelled\"\n    selectedContactLabel.textColor = .red\n    selectedContactLabel.isHidden\
    \ = false\n}\n\nfunc contactPicker(_ picker: CNContactPickerViewController, didSelect\
    \ contact: CNContact) {\n    let nameFormatter = CNContactFormatter()\n    nameFormatter.style\
    \ = .fullName\n    let contactName = nameFormatter.string(from: contact)\n   \
    \ selectedContactLabel.text = contactName\n    selectedContactLabel.textColor\
    \ = .black\n    selectedContactLabel.isHidden = false\n}\n```\n\nListing 3-3 \
    \ \n`CNContactPickerViewController` delegate methods\n\nWhen our \"Select Contact\"\
    \ button is tapped, the `promptContact()` method will be called. This will create,\
    \ configure, and show a `CNContactPickerDelegate`. If the user cancels the operation,\
    \ the `contactPickerDidCancel(_)` method will be called, setting the label to\
    \ red with the text \"Cancelled\". If the user selects a contact, the `contactPicker(_:didSelect)`\
    \ method will be called instead, setting the label text to the contact name and\
    \ its color to black. This is a simple example, but it illustrates the complexity\
    \ of delegate-based calls.\n\nDelegate-based APIs can be very messy, especially\
    \ if they have a lot of possible method calls. We can create a more streamlined\
    \ API for our callers by creating a wrapping object around `CNContactPickerViewControllerDelegate`\
    \ and its methods.\n\n#### Wrapping delegate-based calls in async/await alternatives\n\
    \nWe will now proceed to create such a wrapper. We will modify the \"Chapter [3](#532302_1_En_3_Chapter.xhtml)\
    \ - ContactPicker (Base Project)\" project. You can download the \"Chapter [3](#532302_1_En_3_Chapter.xhtml)\
    \ - ContactPicker (Async-Await)\" project to see the final result.\n\nOur task\
    \ is to replace the current implementation of `promptContact()`, shown in Listing\
    \ [3-4](#532302_1_En_3_Chapter.xhtml#PC4), with the new implementation in Listing\
    \ [3-5](#532302_1_En_3_Chapter.xhtml#PC5), and getting rid of all the contact\
    \ selection logic in `ViewController` along the way, such as the delegate conformance\
    \ and delegate methods.\n\n```\nfunc promptContact() {\n    async {\n        let\
    \ contactPicker = ContactPicker(viewController: self)\n        if let contact\
    \ = await contactPicker.pickContact() {\n            // Contact selected…\n  \
    \      } else {\n            // Selection Cancelled…\n        }\n    }\n}\n```\n\
    \nListing 3-5  \nA new implementation for `promptContact()`\n\n```\nfunc promptContact()\
    \ {\n    let picker = CNContactPickerViewController()\n    picker.delegate = self\n\
    \    picker.displayedPropertyKeys = [CNContactGivenNameKey, CNContactNamePrefixKey,\
    \ CNContactNameSuffixKey]\n    present(picker, animated: true)\n}\n```\n\nListing\
    \ 3-4  \nOriginal implementation for `promptContact()`\n\nIn Listing [3-5](#532302_1_En_3_Chapter.xhtml#PC5),\
    \ we safely unwrap an optional, because if the user tapped Cancel instead of selecting\
    \ a contact, we will have no contact information to show. You could alternatively\
    \ throw an error when the user cancels the selection, but because it's the only\
    \ possible failure reason in this project, we will not use errors.\n\nWe will\
    \ start by creating a new object. Create a new file, `ContactPicker.swift`, and\
    \ add the code in Listing [3-6](#532302_1_En_3_Chapter.xhtml#PC6).\n\n```\nimport\
    \ Foundation\nimport ContactsUI\n\nclass ContactPicker: NSObject, CNContactPickerDelegate\
    \ {\n\n}\n```\n\nListing 3-6  \nStarting `ContactPicker`\n\nWe will use this object\
    \ to wrap all the logic of the contact picker. It will be responsible for showing\
    \ the contact picker UI and returning the result to us.\n\nNext, we need the basic\
    \ properties alongside a typealias we will use to refer to the continuation type,\
    \ as shown in Listing [3-7](#532302_1_En_3_Chapter.xhtml#PC7).\n\n```\nprivate\
    \ typealias ContactCheckedContinuation = CheckedContinuation<CNContact?, Never>\n\
    private unowned var viewController: UIViewController\nprivate var contactContinuation:\
    \ ContactCheckedContinuation?\nprivate var picker: CNContactPickerViewController\n\
    ```\n\nListing 3-7  \nBasic properties\n\nThe `viewController` property will present\
    \ the UI. We need to store the `picker` to show it when we call `promptPicker()`.\
    \ Finally, because there are two different delegate methods, we need to store\
    \ the checked continuation, so we can reference it when either delegate method\
    \ is called.\n\nThe initializer should take the view controller that will present\
    \ the picker. Listing [3-8](#532302_1_En_3_Chapter.xhtml#PC8) has the implementation\
    \ for the initializer.\n\n```\ninit(viewController: UIViewController) {\n    self.viewController\
    \ = viewController\n    picker = CNContactPickerViewController()\n    super.init()\n\
    \    picker.delegate = self\n}\n```\n\nListing 3-8  \nThe initializer for `ContactPicker`\n\
    \nThe initializer takes a single property (the `ViewController` responsible for\
    \ showing the picker). The picker is internal, so there's no need to expose it.\
    \ We will initialize the continuation when `promptContact()` is tapped.\n\n`promptContact()`\
    \ has a very interesting implementation. Listing [3-9](#532302_1_En_3_Chapter.xhtml#PC9)\
    \ shows what we need to get this method to work.\n\n```\n@MainActor\nfunc pickContact()\
    \ async -> CNContact? {\n    viewController.present(picker, animated: true)\n\
    \    return await withCheckedContinuation({ (continuation: ContactCheckedContinuation)\
    \ in\n        self.contactContinuation = continuation\n    })\n}\n```\n\nListing\
    \ 3-9  \nThe async version of `pickContact()`"
  raw: '#### The ContactPicker Project


    This project is very simple (Figure [3-1](#532302_1_En_3_Chapter.xhtml#Fig1)).
    It consists of a top label with a static prompt “Select a Contact”. Underneath
    it, we have a button, “Select Contact” that, when tapped, will present a `CNContactPickerViewController`
    that our users can use to select a contact. Once a contact is selected, a new
    label will appear underneath the button with a black text showing the contact’s
    name. If they cancel the operation, the label will be red instead, and it will
    show the text “Cancelled”.


    ![](images/532302_1_En_3_Chapter/532302_1_En_3_Fig1_HTML.png)


    A screenshot depicts the contact picker, which includes the labels Wi Fi, full
    battery, and time 9:06, as well as the format, select a contact, below select
    contact button, and John Appleseed.


    Figure 3-1


    The ContactPicker app


    Open the `ViewController.swift` file . The core of this example lies in the methods
    in Listing [3-3](#532302_1_En_3_Chapter.xhtml#PC3).


    ```

    func contactPickerDidCancel(_ picker: CNContactPickerViewController) {

    selectedContactLabel.text = "Cancelled"

    selectedContactLabel.textColor = .red

    selectedContactLabel.isHidden = false

    }

    func contactPicker(_ picker: CNContactPickerViewController, didSelect contact:
    CNContact) {

    let nameFormatter = CNContactFormatter()

    nameFormatter.style = .fullName

    let contactName = nameFormatter.string(from: contact)

    selectedContactLabel.text = contactName

    selectedContactLabel.textColor = .black

    selectedContactLabel.isHidden = false

    }

    Listing 3-3

    CNContactPickerViewController delegate methods

    ```


    When our “Select Contact” button is tapped, the `promptContact()` method will
    be called. This will create, configure, and show a `CNContactPickerDelegate`.
    If the user cancels the operation, the `contactPickerDidCancel(_)` method will
    be called, setting the label to red with the text “Cancelled”. If the user selects
    a contact, the `contactPicker(_:didSelect)` method will be called instead, setting
    the label text to the contact name and its color to black. This is a simple example,
    but it illustrates the complexity of delegate-based calls.


    Delegate-based APIs can be very messy, especially if they have a lot of possible
    method calls. We can create a more streamlined API for our callers by creating
    a wrapping object around `CNContactPickerViewControllerDelegate` and its methods.


    #### Wrapping delegate-based calls in async/await alternatives


    We will now proceed to create such a wrapper. We will modify the “Chapter [3](#532302_1_En_3_Chapter.xhtml)
    - ContactPicker (Base Project)” project. You can download the “Chapter [3](#532302_1_En_3_Chapter.xhtml)
    - ContactPicker (Async-Await)” project to see the final result.


    Our task is to replace the current implementation of `promptContact()` , shown
    in Listing [3-4](#532302_1_En_3_Chapter.xhtml#PC4), with the new implementation
    in Listing [3-5](#532302_1_En_3_Chapter.xhtml#PC5), and getting rid of all the
    contact selection logic in `ViewController` along the way, such as the delegate
    conformance and delegate methods.


    ```

    func promptContact() {

    async {

    let contactPicker = ContactPicker(viewController: self)

    if let contact = await contactPicker.pickContact() {

    // Contact selected…

    } else {

    // Selection Cancelled…

    }

    }

    }

    Listing 3-5

    A new implementation for promptContact()

    ```


    ```

    func promptContact() {

    let picker = CNContactPickerViewController()

    picker.delegate = self

    picker.displayedPropertyKeys = [CNContactGivenNameKey, CNContactNamePrefixKey,
    CNContactNameSuffixKey]

    present(picker, animated: true)

    }

    Listing 3-4

    Original implementation for promptContact()

    ```


    In Listing [3-5](#532302_1_En_3_Chapter.xhtml#PC5), we safely unwrap an optional,
    because if the user tapped Cancel instead of selecting a contact, we will have
    no contact information to show. You could alternatively throw an error when the
    user cancels the selection, but because it’s the only possible failure reason
    in this project, we will not use errors.


    We will start by creating a new object. Create a new file, `ContactPicker.swift`,
    and add the code in Listing [3-6](#532302_1_En_3_Chapter.xhtml#PC6).


    ```

    import Foundation

    import ContactsUI

    class ContactPicker: NSObject, CNContactPickerDelegate {

    }

    Listing 3-6

    Starting ContactPicker

    ```


    We will use this object to wrap all the logic of the contact picker. It will be
    responsible for showing the contact picker UI and returning the result to us.


    Next, we need the basic properties alongside a typealias we will use to refer
    to the continuation type, as shown in Listing [3-7](#532302_1_En_3_Chapter.xhtml#PC7).


    ```

    private typealias ContactCheckedContinuation = CheckedContinuation

    private unowned var viewController: UIViewController

    private var contactContinuation: ContactCheckedContinuation?

    private var picker: CNContactPickerViewController

    Listing 3-7

    Basic properties

    ```


    The `viewController` property will present the UI. We need to store the `picker`
    to show it when we call `promptPicker()`. Finally, because there are two different
    delegate methods , we need to store the checked continuation , so we can reference
    it when either delegate method is called.


    The initializer should take the view controller that will present the picker.
    Listing [3-8](#532302_1_En_3_Chapter.xhtml#PC8) has the implementation for the
    initializer.


    ```

    init(viewController: UIViewController) {

    self.viewController = viewController

    picker = CNContactPickerViewController()

    super.init()

    picker.delegate = self

    }

    Listing 3-8

    The initializer for ContactPicker

    ```


    The initializer takes a single property (the ViewController responsible from showing
    the picker). The picker is internal, so there’s no need to expose it. We will
    initialize the continuation when `promptContact()` is tapped.


    `promptContact()` has a very interesting implementation. Listing [3-9](#532302_1_En_3_Chapter.xhtml#PC9)
    shows what we need to get this method to work.


    ```

    @MainActor

    func pickContact() async -> CNContact? {

    viewController.present(picker, animated: true)

    return await withCheckedContinuation({ (continuation: ContactCheckedContinuation)
    in

    self.contactContinuation = continuation

    })

    }

    Listing 3-9

    The async version of pickContact()

