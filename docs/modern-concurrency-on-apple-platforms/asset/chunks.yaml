  trans: '

    ### 使用 `async/await`


    苹果所有基于闭包的并发 API 都提供了 `async/await` 版本，可在 iOS 15 及更高版本中使用。虽然使用 Xcode 13.3 可以在低至
    iOS 13 的系统上使用 `async/await`，但苹果原生支持 `async/await` 的 API 仅适用于 iOS 15 及以上版本。


    现在我们将开始把所有基于闭包的代码迁移到 `async/await`。你可以从“第 2 章 - 社交媒体应用 (Async-Await)”下载已完成的项目。


    让我们从 `Shared ➤ API ➤ UserAPI.swift` 文件开始。


    首先迁移 `fetchUserInfo(completionHandler:)`。因此，使用代码清单 2-11 中的签名创建新函数。


    ```

    func fetchUserInfo() async throws -> UserInfo {

    }

    代码清单 2-11

    fetchUserInfo 的 async/await 版本的基本签名

    ```


    代码清单 2-11 中的函数可以标记为 `throws`。通常，如果你要建模可以抛出错误或返回有效值的代码，只需将方法标记为 `throws`，然后将结果类型分配为调用成功时返回的对象。本质上，原完成处理程序闭包的内容已被重新组织到函数签名中。


    你可以立即看出 `async/await` 帮助我们编写更具语义性的代码。在 Swift 中，我们可以从函数中抛出错误，但令人惊讶的是，许多开发者并不这样编写代码。这是因为大多数非琐碎的应用程序本质上是并发的（例如，使用网络调用），而且由于我们无法以惯用方式处理闭包中的错误，唯一的解决方案是将错误作为闭包的一部分返回。有了
    `async/await`，我们的函数签名更具可读性，因此也更具自文档性。


    现在，我们将使用苹果在 iOS 15 中提供的第一个 `async/await` API。


    所有返回数据的 `URLSession` 方法都有 `async/await` 变体。在代码清单 2-12 中，我们将实现返回用户信息 JSON 为 `Data`
    的逻辑。


    ```

    func fetchUserInfo() async throws -> UserInfo {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json")!

    let session = URLSession.shared

    let (userInfoData, response) = try await session.data(from: url)

    }

    代码清单 2-12

    使用 async/await 进行网络调用

    ```


    目前一切顺利，但这段代码还不能编译，因为我们没有返回任何内容。我希望你注意到，调用 `session.data(from:)` 根本不需要闭包。你也不再需要调用
    `resume()`——一旦你调用 `data(from:)` 的异步版本，任务就会开始。


    现在我们需要将 JSON 解析为 API 消费者可以使用的对象。代码清单 2-13 将完成该方法，包括 JSON 解析并返回值。


    ```

    func fetchUserInfo() async throws -> UserInfo {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json")!

    let session = URLSession.shared

    let (userInfoData, response) = try await session.data(from: url)

    let userInfo = try JSONDecoder().decode(UserInfo.self, from: userInfoData)

    return userInfo

    }

    代码清单 2-13

    发起网络请求、解析结果 JSON 并通过 async/await 代码按顺序返回对象

    ```


    就是这样。这就是 `fetchUserInfo` 完整的 `async` 版本。我们将一个 15 行的代码块缩减为仅 5 行（尽管在书中很难体会到！）。感谢代码清单
    2-13，我们才能真正体会到 `async/await` 的优雅。


    让我们借此机会，通过这个示例来总结一下目前所学的关于 `async/await` 的所有内容。


    首先，我们将 `fetchUserInfo` 方法声明为 `async`。请注意，由于 Swift 支持方法重载，`fetchUserInfo()` 和 `fetchUserInfo(completionHandler:)`
    可以共存。通过将函数标记为 `async`，我们创建了一个并发上下文，在此上下文中我们可以调用其他 `async` 函数，而调用我们函数的调用者本身也需要处于并发上下文中（要么他们自己也标记为
    `async`，要么在 `Task {}` 调用中）。


    当执行到达 `let (userInfoData, response) = try await session.data(from: url)` 这一行时，我们的代码被挂起，它正在执行的线程可以自由地去做其他工作——可能与我们的应用程序无关。得益于这种挂起，后续将数据转换为对象的行将不会执行，因为我们依赖于上一行的数据。当
    `session.data(from:)` 完成下载内容后，它会通知系统准备好返回给调用者。系统最终会通过返回并赋值 `(userInfoData, response)`
    变量来通知你的应用程序。系统返回并且这些变量有了值之后，代码将按照编写的顺序继续执行：解析 JSON，然后将该对象返回给调用者。这是最纯粹的过程式编程。


    当然，代码也可能抛出错误。设备可能没有网络连接，或者服务器可能宕机。如果发生错误，你可以直观地预见到会发生什么，因为这与代码不是异步的情况完全相同：`session.data(from:)`
    会抛出一个错误（符合 `Error` 的对象，因此我们将函数标记为 `throws`），并且所有后续行都不会执行。因此，在此示例中，调用者必须使用 `try`、`try?`
    或 `try!` 调用 `fetchUserInfo()`（在此情况下，强烈不推荐使用 `try!`）。


    如果你理解了以上所有内容，请继续阅读。理解 `async/await` 在最基本层面上的工作原理对于充分利用其所有特性至关重要，因此如果需要，请随意休息一下。


    你可能注意到代码此时在以下行有一个警告：


    ```

    let (userInfoData, response) = try await session.data(from: url)

    ```


    `session.data(from:)` 返回一个元组，因此我们可以将其解构为两个不同的变量。由于你没有使用 `response` 变量，你可以将其替换为下划线（`_`），但我将其放在这里是为了展示，如果
    API 有其他要求（例如需要检查标头，或以不同方式处理 HTTP 状态码），你可以使用这个类型为 `URLResponse` 的变量。你需要将其转换为 `HTTPURLResponse`
    才能获得任何有意义的信息。


    接下来，代码清单 2-14 是获取关注者/关注信息的方法的 `async/await` 版本。


    ```

    func fetchFollowingAndFollowers() async throws -> FollowerFollowingInfo {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_followers.json")!

    let session = URLSession.shared

    let (data, _) = try await session.data(from: url)

    let followingFollowers = try JSONDecoder().decode(FollowerFollowingInfo.self,
    from: data)

    return followingFollowers

    }

    代码清单 2-14

    获取关注者和正在关注用户的 async/await 版本方法

    ```


    **注意**


    有很好的方法可以抽象这些调用并避免代码复用，但这超出了本书的范围。


    现在，让我们转到 `Shared ➤ Views ➤ UserProfileView ➤ UserProfileViewModel.swift`。


    代码清单 2-15 首先将 `@MainActor` 属性添加到类中。


    ```

    @MainActor

    class UserProfileViewModel: ObservableObject {/*..*/}

    代码清单 2-15

    将 @MainActor 全局 Actor 添加到类声明中

    ```

    '
- fmt: "我们之前简要讨论过全局 Actor，清单 [2-15](#532302_1_En_2_Chapter.xhtml#PC18) 首次在实际场景中使用了`@MainActor`全局\
    \ Actor。这将确保每当属性更新时，都会在主线程上执行。这一点很重要，因为 SwiftUI 使用 Observable 对象来更新 UI，因此更新它们需要在主线程上完成。\n\
    \n最简单的迁移方法是`authenticateWithBiometrics(completionHandler:)`，因此我们从这个方法开始。Apple\
    \ 也提供了这些 API 的`async`版本。清单 [2-16](#532302_1_En_2_Chapter.xhtml#PC19) 展示了如何使用`authenticateWithBiometrics`的`async`版本。\n\
    \n```swift\nprivate func authenticateWithBiometrics() async -> Bool {\n    let\
    \ context = LAContext()\n    do {\n        let success = try await context.evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,\
    \ localizedReason: \"To fetch your profile\")\n        return success\n    } catch\
    \ {\n        return false\n    }\n}\n```\n\n这个调用可能会抛出错误，但对于我们 API 的使用者来说，可能没有必要关心这些细节。在这种情况下，如果发生任何错误，将在内部处理，并向调用者返回`false`。因此，我们不会将该方法标记为`throws`。\n\
    \n清单 [2-17](#532302_1_En_2_Chapter.xhtml#PC20) 将创建`fetchUserInfo`的`async`版本。\n\
    \n```swift\nprivate func fetchUserInfo() async {\n    do {\n        let userApi\
    \ = UserAPI()\n        self.loadingStatus = .loading\n        print(\"Beginning\
    \ data download\")\n        print(\"Downloading User info\")\n        self.userInfo\
    \ = try await userApi.fetchUserInfo()\n        print(\"User info downloaded\"\
    )\n        self.loadingStatus = .idle\n    } catch {\n        self.loadingStatus\
    \ = .error(error)\n    }\n    print(\"Ending function\")\n}\n```\n\n清单 [2-17](#532302_1_En_2_Chapter.xhtml#PC20)\
    \ 是一个非常有趣的代码片段。我在这里保留 print 语句只是为了表明它们会按照你编写的顺序打印出来。再次向过程式编程致以微小的敬意。\n\n同样值得注意的是，我们不需要做任何特殊操作就能回到主线程。`self.userInfo`和`self.loadingStatus`的赋值在主线程上运行非常重要，因为它们直接与\
    \ UI 相关联。因为我们将类标记为`@MainActor`，所以所有对属性的更新都将在主线程上运行。如果你没有将整个类标记为`@MainActor`，也可以仅将此方法标记为`@MainActor`。\n\
    \n让我们继续往下进行。我们现在将编写`fetchFollowingFollowers()`的`async`版本。清单 [2-18](#532302_1_En_2_Chapter.xhtml#PC21)\
    \ 提供了这样的实现。\n\n```swift\nprivate func fetchFollowingFollowers() async {\n    do\
    \ {\n        let userApi = UserAPI()\n        self.loadingStatus = .loading\n\
    \        self.followingFollowersInfo = try await userApi.fetchFollowingAndFollowers()\n\
    \        self.loadingStatus = .idle\n    } catch {\n        self.loadingStatus\
    \ = .error(error)\n    }\n}\n```\n\n这段代码与`fetchUserInfo`非常相似，因此这里不应该有什么新内容。\n\n\
    最后，我们将创建`authenticateAndFetchProfile()`的`async`版本，它为我们一步步完成所有操作：进行身份验证，如果成功，则获取用户配置文件，然后获取关注者和正在关注的信息。清单\
    \ [2-19](#532302_1_En_2_Chapter.xhtml#PC22) 提供了其初始实现。\n\n```swift\nfunc authenticateAndFetchProfile()\
    \ async {\n    isAuthenticated = await authenticateWithBiometrics()\n    if isAuthenticated\
    \ {\n        await fetchUserInfo()\n        await fetchFollowingFollowers()\n\
    \    }\n}\n```\n\n这个新方法比原始的`authenticateAndFetchProfile(completionHandler:)`方法短得多。你不仅能欣赏到它的简洁，而且缺少\
    \ completion handler 再次使我们的代码非常易于阅读。我们也不再需要那些烦人的`DispatchQueue.main.async`调用了，这些调用曾使我们的代码嵌套更深，因为`@MainActor`将确保触发\
    \ UI 更新的属性更改在主线程上运行。\n\n我们的方法现在是`async`的，但这意味着在 SwiftUI 中，当按下“Authenticate”按钮时，我们将需要使用`Task`。打开`Shared\
    \ ➤ Views ➤ UserProfileView ➤ UserProfileView.swift`，找到“Authenticate”按钮（第 52 行），并将对`viewModel.authenticateAndFetchProfile()`的调用包装在一个`Task`中。清单\
    \ [2-20](#532302_1_En_2_Chapter.xhtml#PC23) 展示了如何实现。\n\n```swift\nButton {\n \
    \   Task {\n        await viewModel.authenticateAndFetchProfile()\n    }\n} label:\
    \ {\n    if viewModel.availableBiometricType == .none {\n        Text(\"Authenticate\"\
    )\n    } else {\n        Label {\n            Text(\"Authenticate\")\n       \
    \ } icon: {\n            Image(systemName: imageNameForBiometricType(viewModel.availableBiometricType))\n\
    \        }\n    }\n}\n.buttonStyle(.borderedProminent)\n```\n\n由于 SwiftUI 本身不在异步上下文中运行，因此为每个需要异步功能的地方创建一个异步上下文非常重要。在这种情况下，`authenticateAndFetchProfile()`是一个异步任务。\n\
    \n我们快完成了，但在结束之前，你可能已经注意到我们的`fetchUserProfile()`和`fetchFollowingFollowers()`的`async`版本非常相似。在这种特定情况下，我们可以通过完全删除这两个函数并将其内容移动到`authenticateAndFetchProfile()`中来进一步减少代码。清单\
    \ [2-21](#532302_1_En_2_Chapter.xhtml#PC24) 为`authenticateAndFetchProfile()`提供了一个新版本，该版本会比原始版本稍长，但对我们来说更有意义，因为它消除了两个多余的方法。\n\
    \n```swift\nfunc authenticateAndFetchProfile() async {\n    isAuthenticated =\
    \ await authenticateWithBiometrics()\n    if isAuthenticated {\n        do {\n\
    \            let userApi = UserAPI()\n            loadingStatus = .loading\n \
    \           userInfo = try await userApi.fetchUserInfo()\n            followingFollowersInfo\
    \ = try await userApi.fetchFollowingAndFollowers()\n            self.loadingStatus\
    \ = .idle\n        } catch {\n            loadingStatus = .error(error)\n    \
    \    }\n    }\n}\n```\n\n缺少 completion handler 使我们能够用一行代码获取用户配置文件以及关注者和正在关注的数据。正因为如此，我们可以删除为此目的而创建的函数。\n\
    \n我们完成了！我们已经将所有基于 completion handler 的代码转换为`async/await`。请记住，在本例中，这样做非常容易，因为我们的应用很小。有一些技术可以用于加速更大项目中的迁移，我们将在下一章讨论*Continuations*时探讨这些技术。\n\
    \n### async get 属性\n\n`async/await`不仅限于函数调用。你还可以在只读计算属性中使用它。清单 [2-22](#532302_1_En_2_Chapter.xhtml#PC25)\
    \ 展示了如何实现，但我们不会在我们的社交媒体应用中使用它。\n\n```swift\nvar userInfo: UserInfo {\n    get\
    \ async throws {\n        let url = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json\"\
    )!\n        let session = URLSession.shared\n        let (userInfoData, _) = try\
    \ await session.data(from: url)\n        let userInfo = try JSONDecoder().decode(UserInfo.self,\
    \ from: userInfoData)\n        return userInfo\n    }\n}\n```\n\n在清单 [2-22](#532302_1_En_2_Chapter.xhtml#PC25)\
    \ 中，我们声明了一个既可以是`async`又可以是`throws`的属性。通常，我不建议你使用这个特性，除非你实现某种缓存机制。否则，你 API 的使用者访问该属性的频率可能会远高于预期，这将导致他们的应用出现显著的延迟。在某些情况下，避免使用缓存机制可能是合理的，但你需要在具体情况下进行分析。"
  raw: 'We have had brief discussions on Global Actors before, and Listing [2-15](#532302_1_En_2_Chapter.xhtml#PC18)
    uses the `@MainActor` global actor in the real world for the first time. This
    will ensure that whenever a property is updated, it will happen on the main thread.
    This is important, because SwiftUI uses Observables to update the UI, and thus
    updating them needs to be done on the main thread.


    The easiest method to migrate is `authenticateWithBiometrics(completionHandler:),`
    so we will start with that. Apple also provides `async` versions of these APIs.
    Listing [2-16](#532302_1_En_2_Chapter.xhtml#PC19) shows how to use the async version
    of `authenticateWithBiomatrics` .


    ```

    private func authenticateWithBiometrics() async -> Bool {

    let context = LAContext()

    do {

    let success = try await context.evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,
    localizedReason: "To fetch your profile")

    return success

    } catch {

    return false

    }

    }

    Listing 2-16

    async version of authenticateWithBiometrics

    ```


    This call may throw an error, but it may not make sense for the consumers of our
    API to concern themselves with those details. In this case, if any errors occur,
    they will be handled internally, returning `false` to our caller. Therefore, we
    don’t mark the method as `throws`.


    Listing [2-17](#532302_1_En_2_Chapter.xhtml#PC20) will create an async version
    of fetchUserInfo.


    ```

    private func fetchUserInfo() async {

    do {

    let userApi = UserAPI()

    self.loadingStatus = .loading

    print("Beginning data download")

    print("Downloading User info")

    self.userInfo = try await userApi.fetchUserInfo()

    print("User info downloaded")

    self.loadingStatus = .idle

    } catch {

    self.loadingStatus = .error(error)

    }

    print("Ending function")

    }

    Listing 2-17

    async version of fetchUserInfo

    ```


    Listing [2-17](#532302_1_En_2_Chapter.xhtml#PC20) is a very interesting piece
    of code. I’m keeping the print statements here just to show that they will be
    printed in the order you wrote them. Once again, a tiny shoutout to procedural
    programming.


    It is also worth noting that we do not need to do anything special to go back
    to the main thread. It is important that the assignment of the `self.userInfo`
    and `self.loadingStatus` run on the main thread, because they are directly linked
    to your UI. Because we marked the class as `@MainActor` , all the updates to the
    properties will run on the main thread. If you don’t mark the entire class as
    `@MainActor`, you can mark this method only.


    Let’s continue working through. We will now write the async version of `fetchFollowingFollowers()`.
    Listing [2-18](#532302_1_En_2_Chapter.xhtml#PC21) offers such implementation .


    ```

    private func fetchFollowingFollowers() async {

    do {

    let userApi = UserAPI()

    self.loadingStatus = .loading

    self.followingFollowersInfo = try await userApi.fetchFollowingAndFollowers()

    self.loadingStatus = .idle

    } catch {

    self.loadingStatus = .error(error)

    }

    }

    Listing 2-18

    async version of fetchFollowingFollowers()

    ```


    This piece of code is very similar to `fetchUserInfo`, so there shouldn’t be anything
    new here.


    Finally, we will create the async version of `authenticateAndFetchProfile()` which
    does everything for us, one step after the other: Authenticate, and if successful,
    retrieve the user profile, followed by the follower and following info. Listing
    [2-19](#532302_1_En_2_Chapter.xhtml#PC22) provides an initial implementation of
    it.


    ```

    func authenticateAndFetchProfile() async {

    isAuthenticated = await authenticateWithBiometrics()

    if isAuthenticated {

    await fetchUserInfo()

    await fetchFollowingFollowers()

    }

    }

    Listing 2-19

    authenticateAndFetchProfile() calls multiple async methods

    ```


    This new method is much shorter than the original `authenticateAndFetchProfile(completionHandler)`
    method. Not only can you appreciate the shortness, once again the lack of completion
    handlers makes our code very easy to read. We also no longer have the pesky `DispatchQueue.main.async`
    calls that nested our code even further because the `@MainActor` will ensure that
    the property changes that trigger UI updates run on the main thread.


    Our method is now `async`, but doing this implies that in SwiftUI we will need
    to use a `Task` when our “Authenticate” button is pressed. Open Shared ➤ Views
    ➤ UserProfileView ➤ UserProfileView.swift, find the “Authenticate” button (line
    52), and wrap the call to `viewModel.authenticateAndFetchProfile()` in a `Task`.
    Listing [2-20](#532302_1_En_2_Chapter.xhtml#PC23) shows how this is done.


    ```

    Button {

    Task {

    await viewModel.authenticateAndFetchProfile()

    }

    } label: {

    if viewModel.availableBiometricType == .none {

    Text("Authenticate")

    } else {

    Label {

    Text("Authenticate")

    } icon: {

    Image(systemName: imageNameForBiometricType(viewModel.availableBiometricType))

    }

    }

    }

    .buttonStyle(.borderedProminent)

    Listing 2-20

    It’s possible to use Task within SwiftUI

    ```


    Because SwiftUI itself does not run in an async context, it is important that
    we create one for each functionality that requires it. In this case, `authenticateAndFetchProfile()`
    is an async task.


    We are almost done, but before we wrap up, you may have noticed that our ‘async’
    versions of `fetchUserProfile()` and ‌`fetchFollowingFollowers()` are very similar.
    In this particular case, we can get rid of even more code by getting rid of these
    two functions entirely and moving their contents to


    `authenticateAndFetchProfile()` `.` Listing [2-21](#532302_1_En_2_Chapter.xhtml#PC24)
    provides a new version for `authenticateAndFetchProfile()` which will be slightly
    longer than the original, but it will make more sense to us as it has gotten rid
    of two methods that were superfluous.


    ```

    func authenticateAndFetchProfile() async {

    isAuthenticated = await authenticateWithBiometrics()

    if isAuthenticated {

    do {

    let userApi = UserAPI()

    loadingStatus = .loading

    userInfo = try await userApi.fetchUserInfo()

    followingFollowersInfo = try await userApi.fetchFollowingAndFollowers()

    self.loadingStatus = .idle

    } catch {

    loadingStatus = .error(error)

    }

    }

    }

    Listing 2-21

    A different implementation for authenticateAndFetchProfile()

    ```


    The lack of completion handlers allows us to have one-liners for fetching the
    user profile and following and followers data. Because of this, we can eliminate
    the functions we had created for these purposes.


    And we are done! We have transformed all our completion-handler-based code into
    `async/await`. Keep in mind that in this case it was very easy to do so, because
    our app is small. There are techniques we can use to accelerate the migration
    in bigger projects, and we will explore them when we talk about *Continuations*
    in the next chapter.


    ### async get properties


    `async/await` is not limited to function calls. You can also use it in read-only
    calculated properties . Listing [2-22](#532302_1_En_2_Chapter.xhtml#PC25) shows
    how this can be done, but we will not be using this in our Social Media App .


    ```

    var userInfo: UserInfo {

    get async throws {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json")!

    let session = URLSession.shared

    let (userInfoData, _) = try await session.data(from: url)

    let userInfo = try JSONDecoder().decode(UserInfo.self, from: userInfoData)

    return userInfo

    }

    }

    Listing 2-22

    Using async get properties

    ```


    In Listing [2-22](#532302_1_En_2_Chapter.xhtml#PC25), we declare a property that
    can be both `async` and `throws`. In general I do not recommend you use this,
    unless you implement some sort of caching mechanism. Otherwise, consumers of your
    API may access the property much more often than planned and that will result
    in significant delays in their apps. There may be cases in which it makes sense
    to avoid a caching mechanism, but you will have to analyze it on a case-by-case
    basis.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格按照注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n我们之前简要讨论过全局 Actor，清单\
    \ 2-15 首次在实际场景中使用了`@MainActor`全局 Actor。这将确保每当属性更新时，都会在主线程上执行。这一点很重要，因为 SwiftUI\
    \ 使用 Observable 对象来更新 UI，因此更新它们需要在主线程上完成。\n\n最简单的迁移方法是`authenticateWithBiometrics(completionHandler:)`，因此我们从这个方法开始。Apple\
    \ 也提供了这些 API 的`async`版本。清单 2-16 展示了如何使用`authenticateWithBiometrics`的`async`版本。\n\
    \n```swift\nprivate func authenticateWithBiometrics() async -> Bool {\n    let\
    \ context = LAContext()\n    do {\n        let success = try await context.evaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,\
    \ localizedReason: \"To fetch your profile\")\n        return success\n    } catch\
    \ {\n        return false\n    }\n}\n```\n\n这个调用可能会抛出错误，但对于我们 API 的使用者来说，可能没有必要关心这些细节。在这种情况下，如果发生任何错误，将在内部处理，并向调用者返回`false`。因此，我们不会将该方法标记为`throws`。\n\
    \n清单 2-17 将创建`fetchUserInfo`的`async`版本。\n\n```swift\nprivate func fetchUserInfo()\
    \ async {\n    do {\n        let userApi = UserAPI()\n        self.loadingStatus\
    \ = .loading\n        print(\"Beginning data download\")\n        print(\"Downloading\
    \ User info\")\n        self.userInfo = try await userApi.fetchUserInfo()\n  \
    \      print(\"User info downloaded\")\n        self.loadingStatus = .idle\n \
    \   } catch {\n        self.loadingStatus = .error(error)\n    }\n    print(\"\
    Ending function\")\n}\n```\n\n清单 2-17 是一个非常有趣的代码片段。我在这里保留 print 语句只是为了表明它们会按照你编写的顺序打印出来。再次向过程式编程致以微小的敬意。\n\
    \n同样值得注意的是，我们不需要做任何特殊操作就能回到主线程。`self.userInfo`和`self.loadingStatus`的赋值在主线程上运行非常重要，因为它们直接与\
    \ UI 相关联。因为我们将类标记为`@MainActor`，所以所有对属性的更新都将在主线程上运行。如果你没有将整个类标记为`@MainActor`，也可以仅将此方法标记为`@MainActor`。\n\
    \n让我们继续往下进行。我们现在将编写`fetchFollowingFollowers()`的`async`版本。清单 2-18 提供了这样的实现。\n\n\
    ```swift\nprivate func fetchFollowingFollowers() async {\n    do {\n        let\
    \ userApi = UserAPI()\n        self.loadingStatus = .loading\n        self.followingFollowersInfo\
    \ = try await userApi.fetchFollowingAndFollowers()\n        self.loadingStatus\
    \ = .idle\n    } catch {\n        self.loadingStatus = .error(error)\n    }\n\
    }\n```\n\n这段代码与`fetchUserInfo`非常相似，因此这里不应该有什么新内容。\n\n最后，我们将创建`authenticateAndFetchProfile()`的`async`版本，它为我们一步步完成所有操作：进行身份验证，如果成功，则获取用户配置文件，然后获取关注者和正在关注的信息。清单\
    \ 2-19 提供了其初始实现。\n\n```swift\nfunc authenticateAndFetchProfile() async {\n   \
    \ isAuthenticated = await authenticateWithBiometrics()\n    if isAuthenticated\
    \ {\n        await fetchUserInfo()\n        await fetchFollowingFollowers()\n\
    \    }\n}\n```\n\n这个新方法比原始的`authenticateAndFetchProfile(completionHandler:)`方法短得多。你不仅能欣赏到它的简洁，而且缺少\
    \ completion handler 再次使我们的代码非常易于阅读。我们也不再需要那些烦人的`DispatchQueue.main.async`调用了，这些调用曾使我们的代码嵌套更深，因为`@MainActor`将确保触发\
    \ UI 更新的属性更改在主线程上运行。\n\n我们的方法现在是`async`的，但这意味着在 SwiftUI 中，当按下“Authenticate”按钮时，我们将需要使用`Task`。打开`Shared\
    \ ➤ Views ➤ UserProfileView ➤ UserProfileView.swift`，找到“Authenticate”按钮（第 52 行），并将对`viewModel.authenticateAndFetchProfile()`的调用包装在一个`Task`中。清单\
    \ 2-20 展示了如何实现。\n\n```swift\nButton {\n    Task {\n        await viewModel.authenticateAndFetchProfile()\n\
    \    }\n} label: {\n    if viewModel.availableBiometricType == .none {\n     \
    \   Text(\"Authenticate\")\n    } else {\n        Label {\n            Text(\"\
    Authenticate\")\n        } icon: {\n            Image(systemName: imageNameForBiometricType(viewModel.availableBiometricType))\n\
    \        }\n    }\n}\n.buttonStyle(.borderedProminent)\n```\n\n由于 SwiftUI 本身不在异步上下文中运行，因此为每个需要异步功能的地方创建一个异步上下文非常重要。在这种情况下，`authenticateAndFetchProfile()`是一个异步任务。\n\
    \n我们快完成了，但在结束之前，你可能已经注意到我们的`fetchUserProfile()`和`fetchFollowingFollowers()`的`async`版本非常相似。在这种特定情况下，我们可以通过完全删除这两个函数并将其内容移动到`authenticateAndFetchProfile()`中来进一步减少代码。清单\
    \ 2-21 为`authenticateAndFetchProfile()`提供了一个新版本，该版本会比原始版本稍长，但对我们来说更有意义，因为它消除了两个多余的方法。\n\
    \n```swift\nfunc authenticateAndFetchProfile() async {\n    isAuthenticated =\
    \ await authenticateWithBiometrics()\n    if isAuthenticated {\n        do {\n\
    \            let userApi = UserAPI()\n            loadingStatus = .loading\n \
    \           userInfo = try await userApi.fetchUserInfo()\n            followingFollowersInfo\
    \ = try await userApi.fetchFollowingAndFollowers()\n            self.loadingStatus\
    \ = .idle\n        } catch {\n            loadingStatus = .error(error)\n    \
    \    }\n    }\n}\n```\n\n缺少 completion handler 使我们能够用一行代码获取用户配置文件以及关注者和正在关注的数据。正因为如此，我们可以删除为此目的而创建的函数。\n\
    \n我们完成了！我们已经将所有基于 completion handler 的代码转换为`async/await`。请记住，在本例中，这样做非常容易，因为我们的应用很小。有一些技术可以用于加速更大项目中的迁移，我们将在下一章讨论*Continuations*时探讨这些技术。\n\
    \n### async get 属性\n\n`async/await`不仅限于函数调用。你还可以在只读计算属性中使用它。清单 2-22 展示了如何实现，但我们不会在我们的社交媒体应用中使用它。\n\
    \n```swift\nvar userInfo: UserInfo {\n    get async throws {\n        let url\
    \ = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json\"\
    )!\n        let session = URLSession.shared\n        let (userInfoData, _) = try\
    \ await session.data(from: url)\n        let userInfo = try JSONDecoder().decode(UserInfo.self,\
    \ from: userInfoData)\n        return userInfo\n    }\n}\n```\n\n在清单 2-22 中，我们声明了一个既可以是`async`又可以是`throws`的属性。通常，我不建议你使用这个特性，除非你实现某种缓存机制。否则，你\
    \ API 的使用者访问该属性的频率可能会远高于预期，这将导致他们的应用出现显著的延迟。在某些情况下，避免使用缓存机制可能是合理的，但你需要在具体情况下进行分析。\n"
- fmt: "### async/await in iOS 13 and iOS 14\n\nEarlier, we mentioned that while the\
    \ `async/await` system works on iOS 13 and iOS 14, Apple doesn’t have any APIs\
    \ that are marked as such. This means that if you think about it, there’s nothing\
    \ you can use `async/await` on in these versions. You may be wondering what the\
    \ point is to have `async/await` support in these versions if Apple doesn’t offer\
    \ any `async/await` APIs in them to begin with. If you need to support those versions,\
    \ I will teach you a trick to have the `async/await` variants of those methods\
    \ when we talk about *Continuations* in the next chapter.\n\n### Summary\n\nIn\
    \ this chapter, you learned how to use the basic building blocks of the `async/await`\
    \ system, which are the keywords the system takes its name from. It’s very important\
    \ to understand how `async` and `await` work in tandem in order to use all the\
    \ features of this new system.\n\nWe also explained the main differences between\
    \ closure-based concurrency and `async/await`. We showed how this system works\
    \ with suspensions and how these suspensions behave very different than what we\
    \ expect to see in completion handlers or closures.\n\n### Exercises\n\n**Coding\
    \ Exercise**\n\nDownload the “Chapter [2](#532302_1_En_2_Chapter.xhtml) Exercise”\
    \ project. This is a HealthKit project that reads data from the Health app and\
    \ displays it in the app. This app is currently using closure-based calls. Having\
    \ in-depth HealthKit knowledge is not necessary to complete this exercise.\n\n\
    1.  Refactor the `HealthManager` class (in the `HealthManager.swift` file) to\
    \ use `async/await` instead of closure-based calls. Remove the closure-based methods\
    \ once you are done. Hint: iOS 15 provides a new `HKSampleQueryDescriptor` object\
    \ which supports Swift Concurrency. Alongside it, you will need to use a new `HKSamplePredicate<HKSample>`\
    \ object for the retrieval logic.\n\n2.  Refactor `ContentViewViewModel` (in the\
    \ `ContentViewViewModel.swift` file) to use your `async/await` methods instead\
    \ of the closure-based calls.\n\n    The “Chapter [2](#532302_1_En_2_Chapter.xhtml)\
    \ Exercise - Solved async-await” project contains the answers.\n\n**Note**\nI\
    \ recommend you run this exercise on a physical device. While it will work on\
    \ a simulator, you will need to add data manually to the Health app on it. Your\
    \ iPhone is likely to already be storing this info.\n\n# 3. Continuations\n\n\
    In the last chapter, we learned about the `async` and `await` keywords to get\
    \ started with the new concurrency system in Swift. We migrated a project that\
    \ was using closure-based calls into `async/await` code. We did so by rewriting\
    \ the original implementations of the methods to adapt them to the new system.\
    \ But in the real world, you may not have the luxury of writing such implementations\
    \ from scratch due to time constraints, or worse, technical difficulties. For\
    \ these scenarios, we have *Continuations*, which will allow to “wrap” existing\
    \ closure-based calls into `async/await` – and even delegate-based ones!\n\nContinuations\
    \ are useful, because not only will you be able to provide `async/await` versions\
    \ of your own closure-based code, but also for third-party libraries and frameworks.\
    \ This will help you create a consistent codebase that only uses `async/await`\
    \ instead of closure-based calls when it makes sense to do so.\n\n**Note**\nNot\
    \ all closure-based code is necessarily so because it deals with concurrency and/or\
    \ multithreading. There are multiple calls in both Swift and Apple’s SDKs that\
    \ take closures and have nothing to do with concurrency. For example, the popular\
    \ methods of collections, `filter`, `map`, and `reduce`, take closures to operate\
    \ on their elements. Keep this in mind because it’s very hard to have projects\
    \ that don’t have closures of any kind, and that’s fine. `async/await` aims to\
    \ eliminate closure-based calls for concurrency-related tasks only.\n\n## Understanding\
    \ Continuations\n\nWe have briefly touched the concepts of *Continuations* in\
    \ previous chapters, and we will work through this chapter keeping that same meaning.\n\
    \nIn short, a *Continuation* is whatever happens after an `async` call is finished.\
    \ When we are using `async/await`, a continuation is simply everything below an\
    \ `await` call. If you are using closure-based code, the continuation is the code\
    \ written within your completion handlers. And if you are using delegate-based\
    \ code, the continuation would be whatever methods can be called after an action\
    \ is done, such as the original `UIImagePickerController`’s `imagePickerController(didFinishPickingMediaWithInfo:)`\
    \ method.\n\nThe new concurrency system allows us to “convert” a continuation\
    \ in the shape of closure-based code and even delegate-based code into `async/await`.\n\
    \nTo better understand this short – but important – concept, we will go back to\
    \ the original version of the Social Media App. We will use the version that doesn’t\
    \ have `async/await` to illustrate this concept."
