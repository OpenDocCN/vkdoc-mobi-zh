  trans: "\n## 摘要\n\n并发与多线程是传统的计算问题。在底层进行并发管理并自行管理资源极具挑战性，因为这类操作极易被误用。若未能正确使用这些资源或编写正确的多线程代码，轻则引发程序缺陷（bug），重则导致用户数据损坏。正因如此，包括苹果在内的众多开发者设计了多种工具来封装底层细节，提供更简便的接口。以苹果平台为例，他们为开发者提供了以下工具（按抽象层级从低到高排列）：\n\
    \n* `pthread` 线程\n* `NSThread` 线程\n* 大中央调度（GCD）\n* `NSOperation` 及相关 API\n* `async/await`\n\
    \n大多数开发者无需深入到 `pthread` 或 `NSThread` 层级。GCD 与 `NSOperation` API 提供了更高层级的抽象，而 `async/await`\
    \ 不仅为多线程原语提供了抽象，还构建了一整套体系——大多数开发者甚至无需了解底层组件便可直接使用。这套新系统能让我们编写更简洁、易读且易写的代码。深入研习这套新系统非常值得，而本书正是为此而作。\n\
    \n## 练习题\n\n回答以下问题：\n\n1.  使用传统并发工具时，若未正确使用，可能陷入哪些陷阱？\n2.  在 `async/await` 出现之前，苹果平台上有哪些可用的并发工具？\n\
    3.  `async/await` 相较于其他底层并发工具有哪些优势？\n\n# 2. 初识 async/await\n\n上一章我们探讨了编写并发与多线程代码时常遇到的问题，也了解了苹果为开发者提供的多种方案——从难以正确使用的底层替代方案，到更易用但灵活性稍低的高层替代方案。\n\
    \n本书剩余部分将聚焦于新的并发体系，我们将其简称为 `async/await`。本章将探索这套新体系的基础构建块——`async` 和 `await` 关键字。目前我们暂不深入多线程细节。当理解如何运用这些关键字，以及它们与你已熟悉的\
    \ SDK 中 API 的交互方式后，你便掌握了学习这套新体系所有功能的正确工具。但在继续之前，让我们先多聊聊闭包与回调（在 Objective-C 中称为\
    \ blocks）。\n\n## 闭包在并发与多线程中的定位\n\n在学习本章时，我建议你获取示例项目“第 2 章 - 社交媒体应用”。首先，我们将讨论应用中那些基于闭包并发的现有代码，后续再将其改造为使用\
    \ `async/await`。\n\n示例应用包含两个不同的视图。\n\n第一个视图显示一个简单的按钮，点击后可通过生物识别进行身份验证，如图 2-1 所示。\n\
    \n![](img/532302_1_En_2_Fig1_HTML.jpg)\n\n手机截图中显示时间、WiFi 信号、满电电池以及“Authenticate”（验证）字样。\n\
    \n**图 2-1** 社交媒体应用的入口点\n\n第二个界面（图 2-2）在成功验证后显示个人资料视图：\n\n![](img/532302_1_En_2_Fig2_HTML.jpg)\n\
    \n手机截图中显示时间、WiFi 信号、满电电池，以及一位名为 Andybanez 的男士头像，其关注者与被关注数均为零。\n\n**图 2-2** 社交媒体应用的主个人资料视图\n\
    \n验证成功后，应用将调用两个不同的网络服务：一个用于获取用户资料，另一个用于获取其关注者与被关注者数量。\n\n> **注意**：若在模拟器中运行此应用，需先注册\
    \ Face ID。操作方式：打开模拟器，进入“功能”菜单 ➤ FaceID，确保已勾选“已注册”选项，然后重新运行应用。\n\n在撰写本文时，大多数涉及并发的应用都采用基于闭包的并发方式。打开\
    \ `UserAPI.swift` 文件，你将看到清单 2-1 中这再熟悉不过的代码。\n\n```\nclass UserAPI {\n    func\
    \ fetchUserInfo(\n        completionHandler: @escaping (_ userInfo: UserInfo?,\
    \ _ error: Error?) -> Void\n    ) {\n        let url = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json\"\
    )!\n        let session = URLSession.shared\n        let dataTask = session.dataTask(with:\
    \ url) { data, response, error in\n            if let error = error {\n      \
    \          completionHandler(nil, error)\n            } else if let data = data\
    \ {\n                do {\n                    let userInfo = try JSONDecoder().decode(UserInfo.self,\
    \ from: data)\n                    completionHandler(userInfo, nil)\n        \
    \        } catch {\n                    completionHandler(nil, error)\n      \
    \          }\n            }\n        }\n        dataTask.resume()\n    }\n   \
    \ //...\n}\n```\n\n**清单 2-1** 从服务器下载数据并解析以展示给用户\n\n这段代码对新手来说可能令人望而生畏，但有经验的开发者能一眼看穿其逻辑。上述代码创建了一个\
    \ `URLSessionDataTask`，这是 Foundation 框架中用于通过 HTTP 从网络下载数据的对象。我们需要在新建的 `dataTask`\
    \ 上调用 `resume()` 才能真正执行下载。任务完成后，我们检查是否有错误：若有，则调用函数的 `completionHandler`，不传递 `userInfo`\
    \ 而仅传递一个 `Error`；若有数据，则尝试将其解析为 `UserInfo` 对象。若解析出错，同样向处理器传递错误；若成功，则获得所需结果，并用新下载的对象调用处理器。\n\
    \n你可能见过该函数的变体。例如，有些开发者会选择将此函数定义为接收两个闭包：一个仅接收 `userInfo` 对象，另一个仅接收错误，这样不同情况调用不同的闭包。这能消除可选类型，但如果存在无论成功失败都需要执行的公共代码，代码会变得更长。清单\
    \ 2-2 展示了这种实现方式。\n\n```\nfunc fetchUserInfo(\n    success: @escaping (_ userInfo:\
    \ UserInfo) -> Void,\n    failure: @escaping (_ error: Error) -> Void\n) {\n \
    \   //...\n}\n```\n\n**清单 2-2** 处理完成处理器的另一种方式\n"
- fmt: "# 排版后的文本\n\n为了保持本书篇幅简短，我们会采取一些捷径，例如强制解包可选值。请记住，始终要安全且负责任地处理可选值。\n\n现在，我们想要下载这个用户信息并用它来更新一个变量。打开`UserProfileViewModel.swift`文件并找到`fetchUserInfo()`函数。列表\
    \ [2-3](#532302_1_En_2_Chapter.xhtml#PC3) 展示了调用点的样子。\n\n```swift\nprivate func\
    \ fetchUserInfo() {\n  let userApi = UserAPI()\n  print(\"Beginning data download\"\
    )\n  print(\"Downloading User info\")\n  self.loadingStatus = .loading\n  userApi.fetchUserInfo\
    \ { userInfo, error in\n    DispatchQueue.main.async {\n      print(\"User info\
    \ downloaded\")\n      if let error = error {\n        self.loadingStatus = .error(error)\n\
    \      } else if let userInfo = userInfo {\n        self.loadingStatus = .idle\n\
    \        self.userInfo = userInfo\n      }\n    }\n  }\n  print(\"Ending function\"\
    )\n}\n```\n*列表 2-3 调用 fetchUserInfo 方法*\n\n上述代码将调用我们`API`对象中的`fetchUserInfo(_)`函数。如果成功，它会从视图模型中设置一个`userInfo`变量，否则设置一个错误。\n\
    \n运行应用并检查打印语句。\n\n新开发者可能期望控制台打印如下内容：\n\n```\nBeginning data download\nDownloading\
    \ User info\nUser info downloaded\nEnding function\n```\n\n但实际情况并非如此，你会看到如下输出：\n\
    \n```\nBeginning data download\nDownloading User info\nEnding function\nUser info\
    \ downloaded\n```\n\n这是因为当并发任务启动时，线程仍在执行你的代码。它会在`fetchUserInfo`调用之前开始打印语句，并且由于数据下载是一个*并发*调用，`dataTask.resume`的执行被挂起，因此线程会在下载本身完成之前执行函数调用*之后*的内容。当下载完成时，`dataTask`中的内容会继续执行，在所有其他内容之后打印`User\
    \ info downloaded`。假设你的数据下载速度快于线程其余部分的执行时间——这是不可能的，因为你期望网络调用比本地 CPU 调用更快——那么它有可能按预期顺序打印语句，但即便如此，也不能保证一定会这样。\n\
    \n现在，假设你想只在用户通过生物识别认证后才下载用户信息。你的函数将类似于列表 [2-4](#532302_1_En_2_Chapter.xhtml#PC6)。\n\
    \n```swift\nfunc authenticateAndFetchProfile() {\n  authenticateWithBiometrics\
    \ { success in\n    if success {\n      self.isAuthenticated = true\n      let\
    \ userApi = UserAPI()\n      userApi.fetchUserInfo { userInfo, error in\n    \
    \    DispatchQueue.main.async {\n          if let error = error {\n          \
    \  self.loadingStatus = .error(error)\n          } else if let userInfo = userInfo\
    \ {\n            self.loadingStatus = .idle\n            self.userInfo = userInfo\n\
    \          }\n        }\n      }\n    }\n  }\n}\n```\n*列表 2-4 回调地狱*\n\n由于我们依赖生物识别读取状态来决定是否下载个人资料，我们需要等待它响应，然后才能进行用户个人资料调用。一旦我们收到响应，我们的闭包就会执行，用户调用就会生效。\n\
    \n更糟糕的是，我们甚至还没有完成端点的消费。我们还需要消费下载关注者和粉丝数据的方法。`UserAPI.swift`文件中有一个方法`fetchFollowingAndFollowers(_)`，我们可以用它来实现这一点。列表\
    \ [2-5](#532302_1_En_2_Chapter.xhtml#PC7) 修改了`authenticateAndFetchProfile()`方法，以便在获取主个人资料后下载粉丝和关注用户。\n\
    \n```swift\nfunc authenticateAndFetchProfile() {\n  authenticateWithBiometrics\
    \ { success in\n    if success {\n      self.isAuthenticated = true\n      let\
    \ userApi = UserAPI()\n      userApi.fetchUserInfo { userInfo, error in\n    \
    \    DispatchQueue.main.async {\n          if let error = error {\n          \
    \  self.loadingStatus = .error(error)\n          } else if let userInfo = userInfo\
    \ {\n            self.userInfo = userInfo\n            userApi.fetchFollowingAndFollowers\
    \ { followingFollowers, error in\n              if let error = error {\n     \
    \           self.loadingStatus = .error(error)\n              } else {\n     \
    \           self.followersFollowing = followingFollowers\n              }\n  \
    \          }\n          }\n        }\n      }\n    }\n  }\n}\n```\n*列表 2-5 更大的回调地狱*\n\
    \n你可能认为列表 [2-5](#532302_1_En_2_Chapter.xhtml#PC7) 中的代码是夸张的，但确实存在这样的代码库。有些开发者通过使用信号量的技巧来强制\
    \ API 调用一个接一个地被调用。其他开发者可能会选择使用`NSOperationQueue`来实现。有些人会使用 GCD。还有的人可能会觉得将其拆分为多个函数调用更实用，但如果某些操作依赖于其他操作，拆分为不同的函数调用会使代码难以追踪。\n\
    \n有了新的`async/await`系统，你将能够完全摒弃闭包来实现这个特定目的，并且能够编写更接近过程式编程的代码。它还将帮助你和你团队的其他成员为函数签名定义指导方针，从而避免像列表\
    \ [2-1](#532302_1_En_2_Chapter.xhtml#PC1) 和列表 [2-2](#532302_1_En_2_Chapter.xhtml#PC2)\
    \ 的函数签名之间出现的不匹配问题。\n\n## 开始使用 async/await\n\n回想一下，在过程式编程中，代码是按从上到下的逻辑顺序执行的。如果你回到列表\
    \ [2-3](#532302_1_En_2_Chapter.xhtml#PC3)，你会意识到由于`print`语句被调用的顺序，这里的情况并非如此。\n\n\
    如果我们不是通过闭包传递数据，而是通过函数的标准`return`语句来传递数据，那岂不是很好？这正是新系统允许我们做的。通过摒弃闭包，你可以编写自然的代码，从而更容易地表达你的意图，使未来的开发者（包括未来的你自己）能够更清晰地理解代码库的功能。\n\
    \n以过程式思维来考虑，我们可以将社交媒体应用的任务总结为一个三步程序：\n\n1.  `首先使用生物识别认证用户。`\n2.  `然后获取他们的用户个人资料。`\n\
    3.  `最后，获取用户的粉丝和关注用户。`\n\n使用闭包，这是意大利面条式代码。使用`async/await`，我们可以几乎原样地编写这三个语句。我们将把基于闭包的代码转换为`async/await`，但在开始之前，让我们先学习一些理论知识。"
  raw: 'To keep the book short, we will take some shortcuts such as force-unwrapping
    optionals. Remember to always work with your optionals safely and responsibly.


    Now, we want to download this user info and update a variable with it. Open the
    file `UserProfileViewModel.swift` and find the `fetchUserInfo()` function . Listing
    [2-3](#532302_1_En_2_Chapter.xhtml#PC3) shows what the call site looks like.


    ```

    private func fetchUserInfo() {

    let userApi = UserAPI()

    print("Beginning data download")

    print("Downloading User info")

    self.loadingStatus = .loading

    userApi.fetchUserInfo { userInfo, error in

    DispatchQueue.main.async {

    print("User info downloaded")

    if let error = error {

    self.loadingStatus = .error(error)

    } else if let userInfo = userInfo {

    self.loadingStatus = .idle

    self.userInfo = userInfo

    }

    }

    }

    print("Ending function")

    }

    Listing 2-3

    Calling the fetchUserInfo method

    ```


    The code above will call the `fetchUserInfo(_)` function from our API object.
    It will set a `userInfo` variable from our view model if it succeeds and set an
    error if otherwise.


    Run the app and check the print statements.


    New developers may expect the console to print:


    ```

    Beginning data download

    Downloading User info

    User info downloaded

    Ending function

    ```


    But reality is different, and you will see this output instead:


    ```

    Beginning data download

    Downloading User info

    Ending function

    User info downloaded

    ```


    This happens because the moment the concurrent task is launched, the thread is
    still executing your code. It will begin printing the statements before the `fetchUserInfo`
    call, and because the data download is a *concurrent* call, execution for `dataTask.resume`
    is suspended, so the thread will execute the contents *after* the function call
    before the download itself finishes. When the download finishes, the contents
    of `dataTask` will continue executing, printing `User info downloaded` after everything
    else. Hypothetically, if your data download was faster than the execution time
    of the rest of the thread – which is impossible because you would be expecting
    a network call to be faster than a local CPU call – there is a chance it would
    print the statements in the expected order, but even then, there is no guarantee
    that would be the case.


    Now, suppose you want to download the user info only after the user has authenticated
    with biometrics. Your function will look similar to Listing [2-4](#532302_1_En_2_Chapter.xhtml#PC6).


    ```

    func authenticateAndFetchProfile() {

    authenticateWithBiometrics { success in

    if success {

    self.isAuthenticated = true

    let userApi = UserAPI()

    userApi.fetchUserInfo { userInfo, error in

    DispatchQueue.main.async {

    if let error = error {

    self.loadingStatus = .error(error)

    } else if let userInfo = userInfo {

    self.loadingStatus = .idle

    self.userInfo = userInfo

    }

    }

    }

    }

    }

    }

    Listing 2-4

    A pyramid of doom

    ```


    Since we depend on the biometric read status to decide whether we should download
    the profile or not, we need to wait for it to respond before proceeding to the
    user profile call. Once we get a response, our closure will execute, and the user
    call will work.


    To make matters worse, we are not even done consuming our endpoints. We still
    need to consume the method that downloads the following and followers’ data. The
    `UserAPI.swift` file has a method `fetchFollowingAndFollowers(_)` that we can
    use to do just that. Listing [2-5](#532302_1_En_2_Chapter.xhtml#PC7) modifies
    the `authenticateAndFetchProfile`() method to download the followers and following
    users after fetching the main profile.


    ```

    func authenticateAndFetchProfile() {

    authenticateWithBiometrics { success in

    if success {

    self.isAuthenticated = true

    let userApi = UserAPI()

    userApi.fetchUserInfo { userInfo, error in

    DispatchQueue.main.async {

    if let error = error {

    self.loadingStatus = .error(error)

    } else if let userInfo = userInfo {

    self.userInfo = userInfo

    userApi.fetchFollowingAndFollowers { followingFollowers, error in

    if let error = error {

    self.loadingStatus = .error(error)

    } else {

    self.followersFollowing = followingFollowers

    }

    }

    }

    }

    }

    }

    }

    }

    Listing 2-5

    An even bigger pyramid of doom

    ```


    You might think that the code in Listing [2-5](#532302_1_En_2_Chapter.xhtml#PC7)
    is an exaggeration, but there really are codebases like that. Some developers
    go around it by using tricks with semaphores to force the API calls to get called
    one after the other. Other developers may opt to use `NSOperationQueue` for this.
    Some will use the GCD. Others may just find it pragmatic to just separate this
    into multiple function calls, but separating it into different function calls
    will make it hard to keep track of the code if certain operations depend on others.


    With the new `async/await` system, you will be able to scratch closures completely
    for this specific purpose, and you will be able to write code that more closely
    resembles procedural programming. It will also help you and the rest of your team
    define guidelines for function signatures so there are no mismatches like there
    are between the function signatures of Listing [2-1](#532302_1_En_2_Chapter.xhtml#PC1)
    and Listing [2-2](#532302_1_En_2_Chapter.xhtml#PC2).


    ## Getting Started with async/await


    Recall that in procedural programming, code is executed from top to bottom, in
    a logical order. If you go back to Listing [2-3](#532302_1_En_2_Chapter.xhtml#PC3),
    you will realize that’s not what’s happening here thanks to the order the `print`
    statements are called in.


    Wouldn’t it be great if instead of passing data through closures we could pass
    it via standard `return` statements from functions? This is exactly what the new
    system allows us to do. By getting rid of the closures , you can write natural
    code that will allow you to express your intentions easier, making it clearer
    for future developers (including your future self) to better grasp what the codebase
    is doing.


    Thinking procedurally, we can summarize the tasks of our Social Media App as a
    three-step program:


    1.  `First authenticate the user with biometrics.`


    2.  `Then fetch their user profile.`


    3.  `Finally, fetch the user''s followers and following users.`


    With closures, this is spaghetti code. With async/await, we can write those three
    statements as-is, almost literally. We will convert our closure-based code into
    async/await, but before we do, let’s tackle some theory.'
