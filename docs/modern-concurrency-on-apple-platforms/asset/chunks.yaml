  raw: '## Actor Reentrancy


    When we enter an actor, the actor may suspend if it has a lot of work to do, calling
    other asynchronous methods. This can lead to a common problem known as the Actor
    Reentrancy problem .


    The actor reentrancy problem occurs when you assume the overall state of your
    program before it reaches an `await` call. Let’s explain this with an example.
    We will add a new method to our existing `VideogameLibrary` actor. Listing [6-18](#532302_1_En_6_Chapter.xhtml#PC18)
    shows this new method.


    ```

    func addGamesAndPrintResults(_ games: [Videogame]) async throws {

    let existingGameCount = videogames.count

    // Imagine a long-running operation is taking place here.

    try await Task.sleep(nanoseconds: 1_000_000_000)

    add(games: games)

    let newGameCount = existingGameCount + games.count

    print("Games before: \(existingGameCount)")

    print("Games now: \(newGameCount)")

    }

    Listing 6-18

    The addGamesAndPrintResults method illustrates the actor reentrancy problem

    ```


    This new method will:


    1.  Get the number of games currently in our game library.


    2.  Sleep and await the task for a second.


    3.  Add games to the library.


    4.  Print how many games were there before we added new games.


    5.  Print how many games there are now.


    The actor reentrancy problem occurs when multiple tasks access this method. When
    one task accesses it, it will store the current game count in the `existingGameCount`
    variable. It will then hit a lengthy `await` call. In the meantime, a second task
    could access this method and also store the number of games in a new `existingGameCount`
    variable. If the first task finishes before the second one leaves the await, the
    `existingGameCount` variable in the second task will essentially hold incorrect
    data, because the library has more games than it had before.


    To better illustrate this problem, take a look at Figure [6-1](#532302_1_En_6_Chapter.xhtml#Fig1).


    ![](images/532302_1_En_6_Chapter/532302_1_En_6_Fig1_HTML.png)


    A model diagram represents andysLibrary, Task 1, and Task 2, which includes videogames
    dot count equal to 3, and with codes inside Tasks 1 and 2.


    Figure 6-1


    The actor reentrancy problem illustrated


    Two tasks are accessing the actor to add more games. We assume the library has
    3 games already. The first task adds 4 games to it, and the second one adds 2\.
    At the end of their executions, Task 1 will print that there are now 7 games,
    and Task 2 will print that we have 5\. But both tasks entered at the same time,
    and we know that actors prevent the state to be modified at the same time. So,
    one of the tasks is printing incorrect data.


    Each of the tasks is printing the results as if it were the only one accessing
    the actor and printing it. If Task 1 finishes before Task 2, Task 2 should know
    that the library had in fact 7 games, and so it should have printed 11 games total.


    The problem here is that we assumed how many games we had before we entered the
    `await` call. There is no guarantee that after we leave a suspension point the
    state of the program will be as it was before. We are *checking our assumptions*
    before an `await`ed call.


    Unfortunately, actors cannot protect you in this situation. This is purely a logic
    issue that is up to the developer. But a good rule of thumb is that you should
    check for your assumptions *after* an awaited call. In this case, our assumption
    is the number of games in the videogame library. It would make more sense if we
    calculated that after we come back from a suspension. By simply moving the `existingGameCount`
    variable, the program will be fixed. Listing [6-19](#532302_1_En_6_Chapter.xhtml#PC19)
    places the `existingGameCount` variable in a more logical place.


    ```

    func addGamesAndPrintResults(_ games: [Videogame]) async throws {

    // Imagine a long-running operation is taking place here.

    try await Task.sleep(nanoseconds: 1_000_000_000)

    let existingGameCount = videogames.count

    add(games: games)

    let newGameCount = existingGameCount + games.count

    print("Games before: \(existingGameCount)")

    print("Games now: \(newGameCount)")

    }

    Listing 6-19

    Moving the assumptions to a more appropriate place

    ```


    By moving our assumptions to be after the await call, Task 1 and Task 2 may still
    print different results in each call, but one thing is for sure, that no matter
    who finishes first, the task to finish second will have all the right data to
    show to the user.


    ## Actors and Detached Tasks


    Recall that detached tasks don’t inherit anything from a parent task. This includes
    the actor a parent task may be running on. Actors are not inherited. Consider
    the new methods added to VideogameLibrary in Listing [6-20](#532302_1_En_6_Chapter.xhtml#PC20).


    ```

    func playRandomGame() {

    guard let game = videogames.randomElement() else { return }

    print("Playing \(game.title)")

    }

    func playRandomGameLater() {

    Task.detached {

    await self.playRandomGame()

    }

    }

    Listing 6-20

    Launching an actor method from a detached task

    ```


    The `playRandomGame` method is isolated to the actor. But note that `playRandomGameLater`
    requires we call `self.playRandomGame` with `await`. This is because the moment
    we launched the detached task, we jumped to a different actor. Being in a different
    actor will force us to call the actor’s method with await.


    ## General Tips for Working with Actors


    Actors are great for those situations in which you have a shared mutable state
    . It makes accessing mutable data from multiple parts easy, but it is not a silver
    bullet by any means.


    To make effective use of actors, here’s a list of tips I recommend you keep in
    mind when you are working with them:


    1.  Make your actors as small as possible. While actors will protect you from
    a lot of misuse thanks to the Swift compiler, it will not protect you from problems
    such as actor reentrancy. Keeping your actors small will help you make effective
    use of them.


    2.  Keep all your actor’s operations *atomic*. An atomic operation is treated
    as a single unit. Keeping your methods short will help with this. In general,
    atomicity means that you either complete all your work at once, or if a single
    operation fails, the entire operation is discarded. Avoiding `await` calls within
    actors as much as possible will aid with atomicity.


    3.  All your assumptions about the needed state should go after the `await` calls
    when used within an actor’s methods. It is very easy to do if your method contains
    a single await call, but if you have multiple, it can be hard to reason about
    your program’s state.


    4.  Do not use an actor as an `ObservableObject` in SwiftUI . The compiler has
    no issues allowing you to do that, but ObservableObject will expect that it will
    always run on the main thread. Having an actor with expensive calls will result
    in visible lags in your SwiftUI app.'
  trans: "\n# Actor 重入问题\n\n当我们进入一个 Actor 时，如果它有很多工作要做，可能会挂起并调用其他异步方法。这会导致一个常见问题，即\
    \ Actor 重入问题（Actor Reentrancy problem）。\n\nActor 重入问题发生在你假设程序在遇到 `await` 调用之前保持整体状态时。让我们通过一个例子来解释。我们将为现有的\
    \ `VideogameLibrary` Actor 添加一个新方法。清单 6-18 展示了这个新方法。\n\n```\nfunc addGamesAndPrintResults(_\
    \ games: [Videogame]) async throws {\n    let existingGameCount = videogames.count\n\
    \    // 假设这里正在执行一个长时间运行的操作。\n    try await Task.sleep(nanoseconds: 1_000_000_000)\n\
    \    add(games: games)\n    let newGameCount = existingGameCount + games.count\n\
    \    print(\"添加前的游戏数量: \\(existingGameCount)\")\n    print(\"现在的游戏数量: \\(newGameCount)\"\
    )\n}\n```\n\n*清单 6-18 — `addGamesAndPrintResults` 方法展示了 Actor 重入问题*\n\n这个新方法将：\n\
    \n1.  获取当前游戏库中的游戏数量。\n2.  休眠并等待任务一秒钟。\n3.  向游戏库中添加游戏。\n4.  打印添加新游戏之前的游戏数量。\n5.\
    \  打印现在的游戏数量。\n\n当多个任务同时访问此方法时，就会发生 Actor 重入问题。当一个任务访问它时，它会将当前游戏数量存储在 `existingGameCount`\
    \ 变量中。然后它会遇到一个耗时的 `await` 调用。与此同时，第二个任务可能访问此方法，并将游戏数量存储在一个新的 `existingGameCount`\
    \ 变量中。如果第一个任务在第二个任务离开 await 之前完成，那么第二个任务中的 `existingGameCount` 变量将持有错误的数据，因为游戏库中的游戏比之前更多了。\n\
    \n为了更好地说明这个问题，请看图 6-1。\n\n![](img/532302_1_En_6_Fig1_HTML.png)\n\n*一个模型图展示了 `andysLibrary`、任务\
    \ 1 和任务 2，其中包含 `videogames.count` 等于 3，以及任务 1 和任务 2 内部的代码。*\n\n*图 6-1 — Actor\
    \ 重入问题的图示*\n\n两个任务正在访问 Actor 以添加更多游戏。我们假设游戏库中已有 3 款游戏。第一个任务添加了 4 款游戏，第二个任务添加了\
    \ 2 款。在执行结束时，任务 1 将打印现在有 7 款游戏，任务 2 将打印现有 5 款。但两个任务同时进入，我们知道 Actor 可以防止状态同时被修改。因此，其中一个任务打印了错误的数据。\n\
    \n每个任务打印结果时，都表现得像是唯一访问并打印该 Actor 的任务。如果任务 1 在任务 2 之前完成，任务 2 应该知道游戏库实际上有 7 款游戏，因此它应该总共打印出\
    \ 11 款游戏。\n\n这里的问题在于，我们在进入 `await` 调用之前就假设了游戏的数量。无法保证在离开挂起点后，程序的状态会和之前一样。我们在 `await`\
    \ 调用*之前验证了我们的假设*。\n\n不幸的是，在这种情况下 Actor 无法保护你。这纯粹是一个逻辑问题，取决于开发者。但一个好的经验法则是，你应该在\
    \ `await` 调用*之后*验证你的假设。在这种情况下，我们的假设是游戏库中的游戏数量。如果我们从挂起返回后再计算这个值，会更有意义。只需移动 `existingGameCount`\
    \ 变量，程序就能被修复。清单 6-19 将 `existingGameCount` 变量放在了更合理的位置。\n\n```\nfunc addGamesAndPrintResults(_\
    \ games: [Videogame]) async throws {\n    // 假设这里正在执行一个长时间运行的操作。\n    try await\
    \ Task.sleep(nanoseconds: 1_000_000_000)\n    let existingGameCount = videogames.count\n\
    \    add(games: games)\n    let newGameCount = existingGameCount + games.count\n\
    \    print(\"添加前的游戏数量: \\(existingGameCount)\")\n    print(\"现在的游戏数量: \\(newGameCount)\"\
    )\n}\n```\n\n*清单 6-19 — 将假设移至更合适的位置*\n\n通过将我们的假设移至 await 调用之后，任务 1 和任务 2 每次调用可能仍会打印不同的结果，但可以肯定的是，无论谁先完成，后完成的任务都将拥有所有正确的数据来呈现给用户。\n\
    \n## Actor 与分离任务\n\n回想一下，分离任务不会从父任务继承任何内容，包括父任务可能正在其上运行的 Actor。Actor 不会被继承。考虑清单\
    \ 6-20 中添加到 `VideogameLibrary` 的新方法。\n\n```\nfunc playRandomGame() {\n    guard\
    \ let game = videogames.randomElement() else { return }\n    print(\"正在玩 \\(game.title)\"\
    )\n}\n\nfunc playRandomGameLater() {\n    Task.detached {\n        await self.playRandomGame()\n\
    \    }\n}\n```\n\n*清单 6-20 — 从分离任务启动 Actor 方法*\n\n`playRandomGame` 方法被隔离到 Actor\
    \ 中。但请注意，`playRandomGameLater` 要求我们使用 `await` 调用 `self.playRandomGame()`。这是因为一旦我们启动分离任务，我们就跳转到了另一个\
    \ Actor。处于不同的 Actor 将迫使我们使用 await 来调用该 Actor 的方法。\n\n## 使用 Actor 的一般性建议\n\nActor\
    \ 非常适合存在共享可变状态的情况。它使得从多个部分访问可变数据变得容易，但它绝非万能灵药。\n\n为了有效使用 Actor，这里列出一些我建议你在使用 Actor\
    \ 时牢记的提示：\n\n1.  **让你的 Actor 尽可能小。** 虽然 Actor 会借助 Swift 编译器保护你免受许多误用，但它无法保护你免受\
    \ Actor 重入等问题的影响。保持 Actor 小巧有助于你有效地使用它们。\n\n2.  **保持你 Actor 的所有操作是*原子性*的。** 原子性操作被视为一个单一单元。保持方法简短有助于实现这一点。通常，原子性意味着要么一次性完成所有工作，要么如果单个操作失败，整个操作将被丢弃。尽可能避免在\
    \ Actor 内部使用 `await` 调用有助于实现原子性。\n\n3.  **所有关于所需状态的假设，在 Actor 方法内部使用时，应该放在 `await`\
    \ 调用之后。** 如果你的方法只包含一个 await 调用，这很容易做到，但如果有多个 await 调用，则可能难以推断程序的状态。\n\n4.  **不要在\
    \ SwiftUI 中将 Actor 用作 `ObservableObject`。** 编译器允许你这样使用，但 `ObservableObject` 会期望它始终在主线程上运行。拥有包含昂贵调用的\
    \ Actor 将导致你的 SwiftUI 应用出现明显的延迟。\n"
- fmt: '# Summary


    In this chapter, we learned about actor reference types. These types are great
    when we need to have a shared mutable state in our program. Shared mutable state
    is data that multiple processes may want to access asynchronously. Allowing asynchronous
    access to mutable data is dangerous and can lead to data corruption. Actors have
    a mechanism that helps them automatically isolate their own state from the rest
    of the program and provide synchronized access to itself, preventing its data
    from being written to at the same time by multiple processes and avoiding corrupted
    reads. We can opt out of this isolated behavior for specific methods by using
    the `nonisolated` keyword.


    Due to its isolated status, all calls to the actor outside of itself must be done
    asynchronously, using the `await` keyword, unless they are marked as `nonisolated`.
    The Swift compiler will not let you access the actor synchronously as it will
    complain about the lack of the `await` keyword.


    As actors are normal types, they can conform to protocols and have behaviors similar
    to that of classes. The main difference between the two is the isolation of the
    actor. If we want to conform to a protocol, we need to keep in mind the protocol’s
    requirements for mutation or other requirement that would need certain conformances
    to be `nonisolated`. It will not always be possible to conform to all protocols,
    as marking certain methods as `nonisolated` could prevent us from getting the
    behavior we want.


    # 7. Sendable Types


    The simplest concurrent programs are fairly isolated, even when they are dealing
    with concurrency. But in complex programs, you will need to pass data around across
    isolation boundaries, from one async task to another, from one actor to another.
    The data will need to be thread-safe. As we learned with actors, sharing mutable
    data across asynchronous domains can result in data races and therefore data corruption.


    Swift needed a way to define a safe way to share data across isolation boundaries.
    The Swift Evolution folks came up with a very elegant solution and introduced
    sendable types.


    ## Understanding Sendable Types


    A sendable type can be shared across asynchronous tasks and across actors. By
    definition, a sendable type needs to be protected against data races. This type
    should be impossible to mutate from more than one operation at the same time.
    These types should offer synchronized access only.


    Out of the box, Swift has some sendable types that are safe to use concurrently,
    including:


    1.  Value types. Value types such as enums and structs are sendable as long as
    they don’t have any properties that aren’t sendable. As we discussed when we talked
    about actors, value types are immutable. If you attempt to mutate a value type,
    a new copy is created with the new data. This makes structs and enums work out
    of the box with the new concurrency system. Multiple copies may be created, but
    an existing copy will always exist as-is until it is deleted.


    2.  Actors. Actors were made to share mutable data, so their whole purpose of
    existing was to be used in the new concurrency model. You can share actors across
    isolation boundaries without any constraints, keeping in mind that they may have
    `nonisolated` functionality. Actors are always sendable.


    3.  Classes. These *can* be made sendable, but they will need to have certain
    constraints. Recall that classes are reference types and any modifications to
    an instance of a class is a modification to the real data. No copy is created
    unlike structs. A class marked as `final` that has read-only properties can very
    easily be made sendable. Another way to make a class sendable, if it has mutable
    properties and is not marked private, is by implementing your own synchronization
    mechanism within the class. This sounds hard to do – and it is.


    4.  Methods and closures can be made sendable, but explicitly.


    In many cases, Swift can infer the sendability of types. Structs and actors are
    one example. But if you do the work to make a class thread-safe, Swift has no
    way to do that, and it will stop you from using it in a way the compiler deems
    dangerous.


    ### The Sendable Protocol


    Sendable types in Swift outside of value types and actors conform to the `Sendable`
    protocol. By simply conforming to this protocol, the compiler will check your
    usage of sendable types to ensure you are not trying to use them in a way that
    may result in data races.


    #### Analyzing Sendable Types


    To better understand how sendable types behave, we will analyze them to learn
    about their quirks and special considerations.'
