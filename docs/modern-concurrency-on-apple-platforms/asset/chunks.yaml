    `withCheckedContinuation` 的方法体仅将 continuation 赋值给我们的 `contactContinuation` 属性。再次说明，我们需要以某种方式存储
    continuation，因为我们可能从两个不同的委托方法中恢复它。


    列表 3-10 将实现我们需要的委托方法：`contactPicker(_:didSelect)` 和 `contactPickerDidCancel(_)`。


    ```swift

    @MainActor

    func contactPicker(_ picker: CNContactPickerViewController, didSelect contact:
    CNContact) {

    contactContinuation?.resume(returning: contact)

    contactContinuation = nil

    picker.dismiss(animated: true, completion: nil)

    }

    @MainActor

    func contactPickerDidCancel(_ picker: CNContactPickerViewController) {

    contactContinuation?.resume(returning: nil)

    contactContinuation = nil

    }

    列表 3-10

    从两个不同的委托方法中恢复 continuation

    ```


    这些方法非常直接。两个方法都会恢复 continuation，选择联系人时传递联系人，未选择联系人（选择被取消）时传递 `nil`。在恢复后将 `contactContinuation`
    属性赋值为 `nil`，可确保我们无法多次调用 continuation。


    我们已经完成了 `ContactPicker` 类的实现，现在需要回到 `ViewController`。你可以移除 `CNContactPickerDelegate`
    的遵循及其相关的委托方法。你还可以用列表 3-11 中的代码替换 `promptContact()` 的实现。


    ```swift

    func promptContact() {

    Task {

    let contactPicker = ContactPicker(viewController: self)

    if let contact = await contactPicker.pickContact() {

    let nameFormatter = CNContactFormatter()

    nameFormatter.style = .fullName

    let contactName = nameFormatter.string(from: contact)

    selectedContactLabel.text = contactName

    selectedContactLabel.textColor = .black

    selectedContactLabel.isHidden = false

    } else {

    selectedContactLabel.text = "Cancelled"

    selectedContactLabel.textColor = .red

    selectedContactLabel.isHidden = false

    }

    }

    }

    列表 3-11

    `pickContact()` 的最终实现

    ```


    现在 `ViewController` 明显更简洁了。点击“选择联系人”按钮的行为应与我们将其全部改为使用 `async/await` 之前完全一致。


    注意


    尽管我们成功为基于委托的调用提供了 `async/await` 版本，这很不错，但你应该考虑这样做是否 *真的* 有必要。有时，基于委托的调用（如 CoreBluetooth、Core
    Location）的复杂性并不值得为它们提供 `async/await` 版本。话虽如此，通过练习来更好地理解 continuation 的工作方式，也是一项很好的训练。


    ### 在 iOS 13 和 14 中支持 async/await


    我们之前提过这一点，但值得再次强调：虽然使用 Xcode 13.3 可以使用 `async/await`，但除非你使用 iOS 15 SDK 或更高版本编译，否则
    Apple 不提供任何使用它们的 API。


    如果你打开第 2 章中我们的社交媒体应用的 `async/await` 版本（如果没有，可以下载“第 2 章 - 社交媒体应用 (Async-Await)(iOS
    14)”），并将部署目标版本更改为 iOS 13 或 iOS 14，你会看到项目无法再编译。大多数错误与不存在的 `async` 方法有关。图 3-2 显示了
    Xcode 显示的报错。


    ![](img/532302_1_En_3_Fig2_HTML.jpg)


    一张截图显示了 iOS 第二章社交媒体应用中的四个问题，其中 Swift 编译器错误、Data、AsyncImage 和 bordered prominent
    仅适用于 iOS 15.0 或更高版本。


    图 3-2


    我们无法在 iOS 14 及更低版本中使用 `async/await`


    Xcode 的建议——直接使用可用性检查——理论上听起来不错，但如果你让 Xcode 为你修复，项目状态会比现在更糟。因为它会将所有 `async` 调用包裹在可用性检查中，在你成功运行项目后，它在
    iOS 13 和 iOS 14 中将 *什么都不做*。


    解决方案是使用可用性检查，但在 `URLSession` 和 `LAContext` 的扩展中。我们将在不触及 `UserAPI` 和 `UserProfileViewModel`
    的情况下修复此项目。稍后我们需要修复一些 SwiftUI 问题，但我们无需改动逻辑代码，从而可以轻松添加 `async/await` 代码而不会破坏任何功能。你也可以下载完整修复后的项目，名为“第
    2 章 - 社交媒体应用 (Async-Await)(iOS 14)(已修复)”。


    首先，在“Shared”文件夹内创建一个文件夹或组，命名为“Extensions”。然后在该组内，创建一个新文件，命名为“LAContext+Extensions.swift”。其内容如列表
    3-12 所示。


    ```swift

    extension LAContext {

    @available(iOS, introduced: 13, deprecated: 15, message: "该方法不再必要。请使用 iOS 15 中可用的
    API。")

    func evaluatePolicy(_ policy: LAPolicy, localizedReason: String) async throws
    -> Bool {

    try await withCheckedThrowingContinuation({ continuation in

    self.evaluatePolicy(policy, localizedReason: localizedReason) { success, error
    in

    if let error = error {

    continuation.resume(throwing: error)

    } else {

    continuation.resume(returning: success)

    }

    }

    })

    }

    }

    列表 3-12

    将 evaluatePolicy(_:localizedReason) async 向后移植到 iOS 14

    ```


    `@available` 检查将确保这段代码只能在 iOS 13 和 iOS 14 上运行。更旧的 iOS 版本不支持 `async/await`，因此我们将它们完全排除。当部署目标为
    iOS 15 时，我们会收到一条警告：“该方法不再必要。请使用 iOS 15 中可用的 API。”当我们开始以 iOS 15 为目标时，就可以完全移除此扩展，代码无需做任何进一步更改即可正常运行。


    这里的 continuation 使我们能够将基于闭包的调用平滑转换为 SDK 中已有的 `async/await` 调用，但仅限于以 iOS 15 及以上版本为目标时。我们不是返回错误，而是将此方法转换为一个可抛出错误的方法。


    在图 3-3 中，我们看到警告生效，提示我们在低于 iOS 15 的模拟器上运行时更新代码。你可能需要清理构建文件夹并重新编译以使警告显示：


    ![](img/532302_1_En_3_Fig3_HTML.jpg)


    一张截图展示了 iOS 社交媒体应用中发现的三个问题，其中 Deprecation 和 evaluate policy 已在 iOS 15 中弃用，警告为使用
    iOS 15 中可用的 API。


    图 3-3

    '
- fmt: '警告在`@available`检查中，提醒我们更新代码。


    接下来，我们需要在`URLSession`中提供`data(from:)`方法。进入“Shared”➤“Extensions”目录，创建一个名为“URLSession+Extensions.swift”的文件，代码如[清单3-13](#532302_1_En_3_Chapter.xhtml#PC13)所示。


    ```swift

    extension URLSession {

    @available(iOS, introduced: 13, deprecated: 15, message: "This method is no longer
    necessary. Use the API available in iOS 15.")

    func data(from url: URL) async throws -> (Data, URLResponse) {

    try await withCheckedThrowingContinuation({ continuation in

    self.dataTask(with: url) { data, response, error in

    if let error = error {

    continuation.resume(throwing: error)

    } else {

    continuation.resume(returning: (data!, response!))

    }

    }

    .resume()

    })

    }

    }

    ```

    *清单3-13 将`data(from:)`方法向后兼容至iOS 13和iOS 14*


    这段代码与[清单3-13](#532302_1_En_3_Chapter.xhtml#PC13)中的代码没有太大区别。也许最有趣的部分是返回类型是一个`(Data,
    Response)`类型的元组，但总的来说，将这个方法暴露给iOS 14和iOS 13并不复杂。请注意，我们强制解包了返回的`data`和`response`属性。我们这样做是因为，如果你查看API原始的异步签名，它们在元组中并未标记为可选值，因此可以安全地假设，如果没有收到错误，这两个变量将具有非nil值。如果你对此有疑问，可以随意将元组元素标记为可选值。


    如果现在尝试编译项目，我们仍然会收到两个错误，但这些错误与`async/await`不再有任何关系。我们需要修复的错误位于`UserProfileView`中，因此打开“UserProfileView.swift”文件。


    第一个错误提示在低于iOS 15的版本中没有`AsyncImage`。我们可以为网络图片提供自己的实现，但这超出了本书的范围。相反，当在低于iOS 15的版本上运行时，我们将提供一个简单的蓝色圆形。此错误的修复方法见[清单3-14](#532302_1_En_3_Chapter.xhtml#PC14)。


    ```swift

    if #available(iOS 15.0, *) {

    AsyncImage(url: userInfo.avatarUrl)

    .frame(width: 150, height: 150)

    .aspectRatio(contentMode: .fit)

    .clipShape(Circle())

    } else {

    Circle()

    .frame(width: 150, height: 150)

    .foregroundColor(.white)

    }

    ```

    *清单3-14 为不在iOS 15上的设备创建替代视图*


    最后，我们需要修复的最后一个错误与iOS 15中引入的按钮突出样式有关。最简单的修复方法是从`UserProfileView`中删除`.buttonStyle(.borderedProminent)`这一行。


    就这样！你已经成功地将两个在iOS 14中不存在且是iOS 15原生支持的异步调用进行了向后兼容，如果你现在尝试编译应用程序，它应该没有问题地运行。如果你想测试iOS
    14和iOS 13的兼容性，请确保在安装了这些iOS版本的模拟器中运行。如果没有，你可以转到Xcode的“Window”菜单，接着选择“Organizer”，然后在那里添加具有不同iOS版本的新模拟器。


    请注意，不幸的是，你不能免费将所有`async/await`代码自动向后兼容到iOS 14及更低版本。你需要手动创建扩展并手写`continuation`方法。如果你有大量基于闭包且希望向后兼容的代码，请记住这一点。


    ## 总结


    在本章中，我们探讨了什么是`continuation`，并学习了如何使用它们将基于闭包的代码转换为`async/await`代码，而无需从头开始为意图替换的方法编写新实现。我们还学习了如何通过围绕委托方法创建包装器对象，为那些使用委托的调用提供异步API。最后，我们学习了如何使用`continuation`将`async/await`代码向后兼容到iOS
    14和iOS 13——我们不能兼容到更低版本，因为此功能仅在iOS 13、14和15上可用。


    ## 练习


    ### 编程练习


    下载“第[2](#532302_1_En_2_Chapter.xhtml)章练习”项目（我们在第[2](#532302_1_En_2_Chapter.xhtml)章中使用的同一个基础项目）。


    1.  使用`checked continuation`为`requestPermissions`和`requestData`函数提供`async/await`版本。你不应删除原始实现。


    2.  修改`ContentViewViewModel.swift`的实现，使其使用这些方法的`async/await`版本，而不是基于闭包的版本。


    解决方案可以在“第[2](#532302_1_En_2_Chapter.xhtml)章练习 - 已解决Continuation”项目中找到。


    # 4. 结构化并发


    到目前为止，我们已经详细讨论了`async/await`是什么以及它是如何工作的。我们已经看到这个新工具如何帮助我们编写类似于过程式编程的结构化代码，因为我们可以摆脱其他类型的回调（如闭包和委托），这些回调破坏了代码的线性可读性。但我们已经看到，所有这些代码实际上并没有同时、并发或以多线程方式运行。


    考虑我们在第[2](#532302_1_En_2_Chapter.xhtml)章（[清单4-1](#532302_1_En_4_Chapter.xhtml#PC1)）中编写的社交媒体应用中的`authenticateAndFetchProfile`方法的异步版本。


    ```swift

    func authenticateAndFetchProfile() async {

    isAuthenticated = await authenticateWithBiometrics()

    if isAuthenticated {

    do {

    let userApi = UserAPI()

    loadingStatus = .loading

    userInfo = try await userApi.fetchUserInfo()

    followingFollowersInfo = try await userApi.fetchFollowingAndFollowers()

    self.loadingStatus = .idle

    } catch {

    loadingStatus = .error(error)

    }

    }

    }

    ```

    *清单4-1 `authenticateAndFetchProfile`的异步版本*


    这个方法有三个异步调用，但并非所有调用同时执行。事实上，我们*需要*生物识别操作完成，才能下载任何要显示的信息。下载个人资料信息和关注者*依赖于*身份验证成功。目前，该函数经过三个基本步骤：


    1.  使用生物识别进行身份验证。


    2.  下载个人资料信息。


    3.  下载关注者和关注用户信息。


    这两个下载操作都依赖于身份验证，但除此之外，它们彼此完全独立，如果愿意，我们可以同时执行它们。在本章中，我们将开始同时执行多个任务。


    注意


    在第[1](#532302_1_En_1_Chapter.xhtml)章中，我们将并发定义为“一个线程（或你的程序）同时处理多件事情的能力。”这严格来说并不意味着同时做多件事，通常，当人们想到并发时，他们真正想到的是多线程或并行。然而，为了与社区赋予该词的含义保持一致，从这一点开始，当我们谈论并发时，我们指的是同时执行多个任务。'
