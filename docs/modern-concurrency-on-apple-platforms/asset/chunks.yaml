  trans: '

    # 闭包


    在 Swift 中，闭包是**一等公民**。你可以将闭包和函数引用传递到代码的其他部分，随时调用它们。在使用 Swift 集合的 `filter`、`map`
    和 `reduce` 方法时，你可能已经见过这种用法。回顾一下，代码清单 [7-6] 展示了 `filter` 方法的一个简单用法。


    ```

    library.shows.filter { $0.rating >= 10 && $0.rating <= 30 }

    代码清单 7-6

    使用 filter 方法

    ```


    由于你可以在代码的其他部分传递函数和闭包，因此可以很确定它们也应该能够被发送。


    无论是函数还是闭包都不能遵循协议，但我们可以使用 `@Sendable` 属性来代替。当我们使用这个属性时，编译器会明白它不需要为任何内容进行同步，因为 `@Sendable`
    函数的主体是可发送的，并且可发送闭包只能捕获可发送的类型。


    如果你查看 `Task` 的文档，会发现它的签名与代码清单 [7-7] 中的相同。


    ```

    @frozen struct Task where Success : Sendable, Failure : Error

    代码清单 7-7

    Task 的声明


    ```


    它有一个遵循 `Sendable` 的泛型类型 `Success`。因此，任务是在 `Sendable` 类型上操作的。现在，让我们看看它的初始化器和 `detached`
    静态方法的声明。它们都在代码清单 [7-8] 中。


    ```

    @discardableResult init(

    priority: TaskPriority? = nil,

    operation: @escaping () async -> Success

    )

    //...

    @discardableResult static func detached(

    priority: TaskPriority? = nil,

    operation: @escaping () async throws -> Success

    ) -> Task

    代码清单 7-8

    Task 的初始化器和 detached 静态方法的声明


    ```


    我们已经确定 `Success` 是遵循 `Sendable` 的类型。这就是 Swift 施展魔法，确保非可发送类型无法传递到其他并发域的方式。初始化器接受一个返回
    `Sendable` 类型的闭包，而 `detached` 方法返回一个具有相同要求的 `Task`。


    我们可以创建自己的具有相同行为的 `Sendable` 函数。代码清单 [7-9] 声明了一个带有 `@Sendable` 闭包的方法。该方法会在执行闭包前后打印一些内容。你可以使用这样的函数来对你的方法进行基准测试。


    ```

    func logBeginningAndEnd(operation: @Sendable () -> Void) {

    print("调用闭包")

    operation()

    print("闭包结束")

    }

    代码清单 7-9

    声明一个接受 @Sendable 闭包的方法


    ```


    现在，让我们尝试调用这个方法，并传递一个非可发送的内容。代码清单 [7-10] 创建了一个新的 `TVShowLibrary` 实例，并使用这个方法。


    ```

    var tvShowLibrary = TVShowLibrary()

    logBeginningAndEnd {

    let showsCount = tvShowLibrary.shows.count

    print("\(showsCount) 部节目")

    }

    代码清单 7-10

    调用一个捕获非可发送类型的 @Sendable 闭包


    ```


    编译器不会让你编译通过，你会看到与图 [7-1] 中相同的错误。


    在 Swift 中，你可以将实际函数传递给闭包参数。代码清单 [7-11] 尝试将一个函数传递给一个期望闭包的方法，但我们传递的函数不是 `@Sendable`
    的。


    ```

    func doSomething() {

    }

    logBeginningAndEnd(operation: doSomething)

    代码清单 7-11

    将非可发送函数传递给可发送闭包


    ```


    Swift 在这里也会保护你，但会给出一个警告。Swift 会警告你：“将非可发送函数值转换为 `@Sendable () -> Void` 可能会引入数据竞争”。


    因此，如果你确定你的函数可以在不同线程间共享，别忘了将它们标记为 `@Sendable`，这样系统就不会发送任何不必要的警告，就像代码清单 [7-12] 那样。


    ```

    @Sendable func doSomething() {

    }

    代码清单 7-12

    将 doSomething 函数标记为 Sendable 将消除警告


    ```


    当然，不要把你所有的函数或方法都标记为 `@Sendable`。只有当你确定这些函数在不同并发域中使用是安全的，并且你打算这样使用它们时，才这样做。


    最后，如果你有一个可以存储闭包的变量，你也可以将其约束为 `@Sendable` 闭包。代码清单 [7-13] 声明了一个类，该类有一个属性可以存储 `@Sendable`
    闭包。


    ```

    class MyClass {

    var aClosure: @Sendable () -> Void

    init(aClosure: @escaping @Sendable () -> Void) {

    self.aClosure = aClosure

    }

    }

    代码清单 7-13

    声明一个可以存储 @Sendable 闭包的变量


    ```


    最后，当你将闭包传递给方法，并且希望该闭包是 `@Sendable` 时，可以在闭包顶部使用 `@Sendable in` 语法来标记它。代码清单 [7-14]
    将一个显式的 `@Sendable` 闭包传递给了 `MyClass` 的初始化器。


    ```

    let myObject = MyClass { @Sendable in

    let a = 3

    }

    代码清单 7-14

    使用 @Sendable in 语法


    ```


    在这个特定示例中，没有必要这样做，因为 `MyClass` 已经将该闭包视为 `@Sendable`，但在某些情况下这会很有用，比如我们讨论异步序列时。


    ## 总结


    在本章中，你学习了 Swift 用于确保数据不能在不同并发域或不同线程之间被修改的机制。类型层面的 `Sendable` 协议和 `@Sendable` 属性帮助我们告诉编译器，允许在并发域之间共享数据，因为它们已经受到保护，可以避免数据竞争。许多类型（例如只读结构体和
    `actor` 类型）默认会自动遵循该协议。当尝试在不同线程间共享这些类型时，Swift 会检查其 `Sendable` 遵循性。如果我们的类型是可发送的，但
    Swift 编译器无法推断出来，我们可以将其标记为 `@unchecked @Sendable`，以告诉 Swift 这确实是一个可发送类型，但我们需要负责同步其内部状态。


    # 主执行者与最终执行者


    在第 [6] 章中，我们学习了执行者。执行者是同步自身内部状态的引用类型，因此从不同线程修改它们是安全的。这是通过保证一次只有一个任务或线程可以修改执行者的状态来实现的。执行者是在并发上下文中使用的可发送类型。执行者是你实例化的类型，并且在大多数情况下，可以像普通类一样对待。但是，当我们*需要*某些总是保证在同一个线程上运行，但可能分布在甚至不同文件中时，会发生什么呢？


    在学习全局执行者之前，我想谈谈我们的老朋友：主线程。我现在想讨论这个，是因为它与本章的主题相关。

    '
- fmt: '# The Main Thread


    If you have been programming for Apple platforms for a while, you know about The
    Main Thread. If this is the first time you hear about it, worry not, because we
    are going to have a refresher on it in this section. The main thread’s sole responsibility
    is to run your UI code. If you want to update a label, add some color to view,
    or toggle a switch, you need to do those operations on the main thread. We are
    not allowed to update our UI outside the main thread. Doing so will result in
    warnings in the best case and runtime crashes in the worst case. If we are running
    asynchronous tasks – whether with the new concurrency system or with older tools
    such as the GCD – and you are interested in showing the returning data in your
    UI, you need to do that on the main thread.


    Because the main thread is responsible of updating your UI, doing any expensive
    operations on it will leave your app hanged for a few seconds, or it can leave
    your app with visible stutters and visible frame drops in the UI. If your app
    hangs for a long time, then the system will take matters in its own hands and
    kill it. This is the reason a lot of APIs, including all the networking calls
    in `URLSession`, default to running in separate threads, doesn’t matter if you
    use the `async/await` variations of these methods or the traditional closure-based
    ones. You *can* force `URLSession` and other asynchronous APIs to run on the main
    thread, but you absolutely shouldn’t, and I doubt you will ever find a good excuse
    for it.


    In short, anything you do with UIKit (and by extension, SwiftUI) needs to be done
    on the main thread, and you need to avoid clogging it up with expensive work.
    Traditionally, we would handle data to the main thread calling something like
    `DispatchQueue.main.async`. This method takes a closure that executes on the main
    thread so it’s ideal to work with your UI there. `DispatchQueue` is an object
    from the GCD, and the `main` static property refers to the `main queue`, which
    always runs on the main thread. This is a quick and painless way to get back to
    the main thread, safe, but it is also a fact that it can create pretty pyramids
    of doom if you are using it extensively. Any object that starts with the “UI”
    prefix (`UIButton`, `UISwitch`) in iOS or any AppKit object in macOS should be
    mutated from the main thread only.


    **Tip**


    As of Xcode 14 and all OS releases accompanying it, `UIImage` and `UIColor` are
    the exception to the rule that states “all UI-prefixed objects should be mutated
    from the main thread.” Starting on this Xcode version, `UIImage` and `UIColor`
    conform to the `Sendable` protocol, so it is safe to pass them across different
    concurrency domains.


    In the case of the modern concurrency system, the system will decide if it should
    launch your tasks in different threads. Remember we learned that our tasks suspend
    when they hit an `await` keyword and the system decided to launch that call in
    a different thread. If a suspension takes place, you do not know where the code
    will execute, or even what thread it will use to deliver its results. How can
    we deliver results to the main thread when using the new concurrency system, so
    we can update our UI after finishing an expensive task? Well, I’m glad you asked!


    ## The Main Actor


    I can finally explain to you something that we have been using throughout the
    book, but it was hard to find an appropriate time to explain it. Yes, I am talking
    about the main actor, which in code appears as `@MainActor`.


    UIKit and SwiftUI are both big frameworks. If you think about it, they are made
    up of hundreds if not thousands of classes and they are likely spread out in different
    files within the framework. They both have the requirement that any UI update
    should be done on the main thread. Marking a declaration as `@MainActor` means
    that that specific piece of functionality will run on the main actor. `@MainActor`
    is essentially treated as an attribute. As iOS 15, macOS 12, watchOS 8, and tvOS
    16, most of the classes in these frameworks are marked with `@MainActor`. In the
    case of SwiftUI, creating `ObservableObjects` should manually be marked as `@MainActor`
    as the protocol doesn’t come with it out of the box. Marking all objects in UIKit,
    SwiftUI, and AppKit as `@MainActor` is a very elegant solution to making sure
    all of them run on the main thread.


    ### Using the `@MainActor`


    Just like the `@Sendable` attributes, you can use the `@MainActor` “attribute”
    in many different places as well. First, you can use it as part of a type declaration,
    like a struct or a class. Listing [8-1](#532302_1_En_8_Chapter.xhtml#PC1) declares
    two new types, one of them is marked as `@MainActor`.


    ```

    struct MusicAlbum {

    let name: String

    let artist: String

    let releaseYear: Int

    }

    @MainActor class MusicLibrary {

    var name: String

    var albums: [MusicAlbum] = []

    init(name: String) {

    self.name = name

    }

    }

    Listing 8-1

    Adding @MainActor to a class

    ```


    Because of this, every operation we want to perform on `MusicLibrary` instances
    needs to run on the main actor as well. Every property and method within `MusicLibrary`
    will run on the main actor as well. Imagine you have a function, `createLibraryAndAddAlbum`,
    that is created outside the context of the `MusicLibrary` object itself. You may
    be tempted to work on your music library within this new function. In Listing
    [8-2](#532302_1_En_8_Chapter.xhtml#PC2), we attempt to use this type in a context
    that does not run on the `@MainActor`.


    ```

    func createLibraryAndAddAlbum() {

    let library = MusicLibrary(name: "Andy''s Library")

    let album = MusicAlbum(name: "Imaginareum", artist: "Nightwish", releaseYear:
    2011)

    library.shows += [album]

    }

    Listing 8-2

    Working on a MusicLibrary without being on a Main Actor context

    ```


    If you try to compile this, you will get errors that are very similar to what
    you would get when attempting to send non-sendable types across different concurrency
    domains. Namely:


    ```

    Call to main actor-isolated initializer ''init(name:)'' in a synchronous nonisolated
    context

    ...

    Property ''albums'' isolated to global actor ''MainActor'' can not be mutated
    from this context

    ```


    By adding `@MainActor` to `createLibraryAndAddAlbum`, the function will be running
    on main actor too. Both the `MusicLibrary` and `createLibraryAndAddAlbum` function
    will be running on the same actor (the same thread), and it doesn’t matter if
    these two are in the same file or even across different frameworks. This is the
    reason the main actor is called a *global actor*.


    Listing [8-3](#532302_1_En_8_Chapter.xhtml#PC4) will compile without an issue.


    ```

    @MainActor

    func createLibraryAndAddAlbum() {

    let library = MusicLibrary(name: "Andy''s Library")

    let album = MusicAlbum(name: "Imaginareum", artist: "Nightwish", releaseYear:
    2011)

    library.albums += [album]

    }

    Listing 8-3

    We can add @MainActor to declarations that are spread out, even in different files
    or frameworks

    ```


    If you are in a different actor, you can call methods marked as `@MainActor`,
    but doing so requires you to do it asynchronously (using `await` or `async let`),
    because the `@MainActor` synchronizes its own internal state across all declarations
    that use it.


    Now, this is where a lot of people get confused when working with the main actor.


    Suppose you add the method in Listing [8-4](#532302_1_En_8_Chapter.xhtml#PC5)
    to the `MusicLibrary` object.


    ```

    @MainActor

    func populateFromWebService() async {

    albums = []

    albums = try await WebService.shared.albumsFromService()

    }

    Listing 8-4

    An asynchronous method to fetch albums

    ```


    Assume that the `populateFromWebService` method is a long-running operation that
    will suspend. Where will the actor execute?


    The long-running operation, the `populateFromWebService` function itself, will
    still run on a different thread. You do not know where it will run. You just know
    that your method on the main actor will suspend, and the thread will be doing
    other work before coming back to you.'
