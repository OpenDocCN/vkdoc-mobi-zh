    \ the main actor (as a normal actor definition, global actors can have methods\
    \ that are nonisolated), you can mark it as `nonisolated` and use it from any\
    \ other concurrent context.\n\nListing [8-6](#532302_1_En_8_Chapter.xhtml#PC7)\
    \ marks the `MusicLibrary` class as running on the main actor and adds a `nonisolated`\
    \ method to it.\n\n```\n@MainActor\nclass MusicLibrary {\n    var name: String\n\
    \    var albums: [MusicAlbum] = []\n    @MainActor var albumCover: UIImage?\n\
    \    init(name: String) {\n        self.name = name\n    }\n    nonisolated func\
    \ libraryPurpose() -> String {\n        \"This library holds my favorite songs\"\
    \n    }\n}\nListing 8-6\nAdding a nonisolated method to a class running on the\
    \ main actor\n```\n\nNote that `nonisolated` methods need to be *truly* isolated.\
    \ You cannot return a property derived from one of our properties in the class.\
    \ We would not be able to return the `name`, the `albums`, or even the number\
