    成为图像的实际数据源。我们还将让视图读取 `ImageDownload` 对象，而不是 URL 对象。这将帮助我们根据图像的下载状态（`ImageDownloadStatus`
    枚举）显示不同的 UI。我们需要让 `ImageDownload` 遵循 `Identifiable` 协议，以便它能与 SwiftUI 良好配合。


    此外，由于 `ImageManager` 类现在将成为 SwiftUI 的数据源，因此需要将其标记为 `@MainActor`，如代码清单 5-6 所示。


    ```

    @MainActor

    class ImageManager: ObservableObject {

    代码清单 5-6

    将 ImageManager 标记为 @MainActor

    ```


    现在，转到 `TaskGroupsApp.swift` 文件，并修改其中 `ImageManager` 类变量的声明，以添加 `@MainActor` 属性，如代码清单
    5-7 所示。


    ```

    @MainActor

    fileprivate let imageManager = ImageManager()

    代码清单 5-7

    将 imageManager 变量标记为 @MainActor

    ```


    回到 `ImageManager.swift` 文件，这次将 `images` 变量的类型修改为 `[ImageDownload]`。同时，添加 `@Published`
    属性。这两个更改如代码清单 5-8 所示。


    ```

    @Published private(set) var images: [ImageDownload] = []

    代码清单 5-8

    为远程图像创建可发布的属性

    ```


    因为 SwiftUI 会将其用作数据源，所以只要这个数组发生变化，我们的 UI 就会更新。


    最后，我们将根据代码清单 5-9 修改 `download(serverImages:)` 函数。


    ```

    func download(serverImages: [ServerImage]) {

    for imageIndex in (0..<serverImages.count) {

    let downloadTask = Task {

    do {

    let imageUrl = try await download(serverImages[imageIndex])

    self.images[imageIndex] = ImageDownload(status: .downloaded(imageUrl))

    } catch {

    self.images[imageIndex] = ImageDownload(status: .error(error))

    }

    }

    images.append(ImageDownload(status: .downloading(downloadTask)))

    }

    }

    代码清单 5-9

    新版本的 download(serverImages:)

    ```


    这就是实现部分魔法的地方。我们将首先遍历所有已下载的 `ServerImage`。对于每个服务器图像，我们将创建一个显式的 `Task`。我们还会立即将此任务以
    `.downloading(_)` 状态添加到 `images` 数组中。该枚举跟踪任务本身，以便我们稍后可以根据需要取消它。


    任务主体将尝试下载图像。如果下载失败，我们将使用 `.error(_)` 值替换其在 `images` 数组中的条目。如果成功，我们将使用 `.downloaded(url)`
    值替换它。简而言之，任务的主体将根据下载是否成功，用不同的枚举值替换其在数组中的位置。并且由于这是一个 `@Published` 属性，SwiftUI 可以观察其更改，并实时获知该数组发生的任何情况。


    #### 修改 `ContentViewViewModel` 类


    `ContentViewViewModel.swift` 文件中的主要修改是 `downloadImages()` 函数，如代码清单 5-10 所示。我们还从这个文件中移除了
    `imageUrls` 数组，因为该工作已委托给 `ImageManager` 类。


    ```

    func downloadImages() {

    Task {

    guard let manager = imageManager else { return }

