    \ `async/await` system works on iOS 13 and iOS 14 , Apple doesn’t have any APIs\
    \ that are marked as such. This means that if you think about it, there’s nothing\
    \ you can use `async/await` on in these versions. You may be wondering what the\
    \ point is to have `async/await` support in these versions if Apple doesn’t offer\
    \ any `async/await` APIs in them to begin with. If you need to support those versions,\
    \ I will teach you a trick to have the `async/await` variants of those methods\
    \ when we talk about *Continuations* in the next chapter.\n\n## Summary\n\nIn\
    \ this chapter, you learned how to use the basic building blocks of the `async/await`\
    \ system, which are the keywords the system takes its name from. It’s very important\
    \ to understand how `async` and `await` work in tandem in order to use all the\
    \ features of this new system.\n\nWe also explained the main differences between\
    \ closure-based concurrency and `async/await`. We showed how this system works\
    \ with suspensions and how these suspensions behave very different than what we\
    \ expect to see in completion handlers or closures.\n\n## Exercises\n\nCoding\
    \ Exercise\n\nDownload the “Chapter [2](#532302_1_En_2_Chapter.xhtml) Exercise”\
    \ project. This is a HealthKit project that reads data from the Health app and\
    \ displays it in the app. This app is currently using closure-based calls. Having\
    \ in-depth HealthKit knowledge is not necessary to complete this exercise.\n\n\
    1.  Refactor the `HealthManager` class (in the HealthManager.swift, file) to use\
    \ `async/await` instead of closure-based calls. Remove the closure-based methods\
    \ once you are done. Hint: iOS 15 provides a new `HKSampleQueryDescriptor` object\
    \ which supports Swift Concurrency. Alongside it, you will need to use a new `HKSamplePredicate<HKSample>`\
    \ object for the retrieval logic.\n\n2.  Refactor `ContentViewViewModel` (in the\
    \ ContentViewViewModel.swift file) to use your `async/await` methods instead of\
    \ the closure-based calls.\n\n    The “Chapter [2](#532302_1_En_2_Chapter.xhtml)\
    \ Exercise - Solved async-await” project contains the answers.\n\nNote\n\nI recommend\
    \ you run this exercise on a physical device. While it will work on a simulator,\
    \ you will need to add data manually to the Health app on it. Your iPhone is likely\
    \ to already be storing this info.\n\n# 3. Continuations\n\nIn the last chapter,\
    \ we learned about the `async` and `await` keywords to get started with the new\
    \ concurrency system in Swift. We migrated a project that was using closure-based\
    \ calls into `async/await` code. We did so by rewriting the original implementations\
    \ of the methods to adapt them to the new system. But in the real world, you may\
    \ not have the luxury of writing such implementations from scratch due to time\
    \ constraints, or worse, technical difficulties. For these scenarios, we have\
    \ *Continuations*, which will allow to “wrap” existing closure-based calls into\
    \ async/await – and even delegate-based ones!\n\nContinuations are useful, because\
    \ not only will you be able to provide `async/await` versions of your own closure-based\
    \ code , but also for third-party libraries and frameworks. This will help you\
    \ create a consistent codebase that only uses async/await instead of closure-based\
    \ calls when it makes sense to do so.\n\nNote\n\nNot all closure-based code is\
    \ necessarily so because it deals with concurrency and/or multithreading. There\
    \ are multiple calls in both Swift and Apple’s SDKs that take closures and have\
    \ nothing to do with concurrency. For example, the popular methods of collections,\
    \ `filter`, `map`, and `reduce`, take closures to operate on their elements. Keep\
    \ this in mind because it’s very hard to have projects that don’t have closures\
    \ of any kind, and that’s fine. `async/await` aims to eliminate closure-based\
    \ calls for concurrency-related tasks only.\n\n## Understanding Continuations\n\
    \nWe have briefly touched the concepts of *Continuations* in previous chapters,\
    \ and we will work through this chapter keeping that same meaning.\n\nIn short,\
    \ a *Continuation* is whatever happens after an `async` call is finished. When\
    \ we are using `async/await` , a continuation is simply everything below an `await`\
    \ call. If you are using closure-based code , the continuation is the code written\
    \ within your completion handlers. And if you are using delegate-based code ,\
    \ the continuation would be whatever methods can be called after an action is\
    \ done, such as the original `UIImagePickerController`’s `imagePickerController(didFinishPickingMediaWithInfo:)`\
    \ method.\n\nThe new concurrency system allows us to “convert” a continuation\
    \ in the shape of closure-based code and even delegate-based code into `async/await`.\n\
    \nTo better understand this short – but important – concept, we will go back to\
    \ the original version of the Social Media App. We will use the version that doesn’t\
    \ have `async/await` to illustrate this concept."
  trans: "\n### iOS 13 和 iOS 14 中的 async/await\n\n此前，我们提到虽然 `async/await` 机制在 iOS\
    \ 13 和 iOS 14 上能够运行，但苹果并没有提供任何以此标识的 API。这意味着，仔细想想，在这些版本中你其实无法对任何东西使用 `async/await`。你可能会疑惑，既然苹果在这些版本中根本没有提供任何\
    \ `async/await` 的 API，那么支持这个功能又有什么意义呢？如果你需要支持这些版本，我将在下一章讨论*续体*时，教你一个小技巧，让你能够获得那些方法的\
    \ `async/await` 版本。\n\n### 本章小结\n\n在本章中，你学习了如何使用 `async/await` 机制的基本构建块，也就是该机制名称所源自的那些关键字。为了充分运用这个新系统的所有特性，理解\
    \ `async` 和 `await` 如何协同工作至关重要。\n\n我们还解释了基于闭包的并发与 `async/await` 之间的主要区别。我们展示了这个机制如何与挂起操作配合，以及这些挂起操作的行为与我们通常在完成处理器或闭包中看到的有何不同。\n\
    \n### 练习\n\n**编程练习**\n\n下载“Chapter 2 Exercise”项目。这是一个 HealthKit 项目，它从“健康”App 读取数据并显示在应用中。该应用目前使用的是基于闭包的调用。完成此练习无需深入了解\
    \ HealthKit。\n\n1.  重构 `HealthManager` 类（位于 `HealthManager.swift` 文件中），使其使用 `async/await`\
    \ 替代基于闭包的调用。完成后删除基于闭包的方法。提示：iOS 15 提供了一个新的 `HKSampleQueryDescriptor` 对象，它支持 Swift\
    \ 并发。同时，你需要使用一个新的 `HKSamplePredicate<HKSample>` 对象来实现检索逻辑。\n\n2.  重构 `ContentViewViewModel`（位于\
    \ `ContentViewViewModel.swift` 文件中），使其使用你的 `async/await` 方法替代基于闭包的调用。\n\n    “Chapter\
    \ 2 Exercise - Solved async-await”项目中包含了答案。\n\n**注意**\n我建议你在真机上运行此练习。虽然在模拟器上也能运行，但你需要在模拟器的“健康”App\
    \ 中手动添加数据。而你的 iPhone 很可能已经存有这些信息。\n\n# 3. 续体\n\n在上一章中，我们学习了 `async` 和 `await`\
    \ 关键字，从而开始接触 Swift 中的新并发系统。我们将一个使用基于闭包调用的项目迁移到了 `async/await` 代码中。我们通过重写方法的原始实现来使其适应新系统。但在实际工作中，由于时间限制，或者更糟糕的技术难题，你可能无法从头编写这样的实现。针对这些情况，我们有*续体*，它允许你将现有的基于闭包的调用“封装”成\
    \ `async/await` 形式——甚至包括基于委托的调用！\n\n续体非常有用，因为借助它，你不仅能为自己的基于闭包的代码提供 `async/await`\
    \ 版本，还能为第三方库和框架提供相应版本。这将帮助你创建一致的代码库，在合理的情况下，只使用 `async/await` 而不是基于闭包的调用。\n\n\
    **注意**\n并非所有基于闭包的代码都必然与并发和/或多线程有关。在 Swift 和苹果的 SDK 中，有许多接受闭包的调用与并发完全无关。例如，集合常用的方法\
    \ `filter`、`map` 和 `reduce`，它们接受闭包来操作集合元素。请记住这一点，因为项目中完全不含任何闭包是很难做到的，而这也是正常的。`async/await`\
    \ 的目标只是消除与并发任务相关的基于闭包的调用。\n\n## 理解续体\n\n我们在前面的章节中已经简要接触过*续体*的概念，本章将继续沿用相同的含义进行讲解。\n\
    \n简而言之，*续体*就是指在 `async` 调用完成后发生的事情。当我们使用 `async/await` 时，续体就是 `await` 调用下面的所有代码。如果你使用的是基于闭包的代码，续体就是写在完成处理器中的代码。而如果你使用的是基于委托的代码，续体就是某个操作完成后可以调用的任何方法，例如原始的\
    \ `UIImagePickerController` 的 `imagePickerController(didFinishPickingMediaWithInfo:)`\
    \ 方法。\n\n新的并发系统允许我们将基于闭包代码形式甚至是基于委托代码形式的续体“转换”为 `async/await` 形式。\n\n为了更好地理解这个简短但重要的概念，我们将回到社交媒体应用的原始版本。我们将使用那个没有\
    \ `async/await` 的版本来阐述这个概念。\n"
- fmt: '### Converting closure-based calls into async/await


    Open the `Shared ➤ API ➤ UserAPI.swift` file. Take a look at the `fetchUserInfo(completionHandler:)`
    method. For your convenience, Listing [3-1](#532302_1_En_3_Chapter.xhtml#PC1)
    shows the original implementation.


    ```

    func fetchUserInfo(

    completionHandler: @escaping (_ userInfo: UserInfo?, _ error: Error?) -> Void

    ) {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json")!

    let session = URLSession.shared

    let dataTask = session.dataTask(with: url) { data, response, error in

    if let error = error {

    completionHandler(nil, error)

    } else if let data = data {

    do {

    let userInfo = try JSONDecoder().decode(UserInfo.self, from: data)

    completionHandler(userInfo, nil)

    } catch {

    completionHandler(nil, error)

    }

    }

    }

    dataTask.resume()

    }

    Listing 3-1

    Original implementation for fetchUserInfo(completionHandler:)

    ```


    You can provide an `async/await` version for this method without reimplementing
    it from scratch like we did in Chapter [2](#532302_1_En_2_Chapter.xhtml). The
    disadvantage of doing this is that you won’t be able to delete this original implementation.
    The advantage is that keeping the original implementation is not so bad, because
    you will always have the closure-based call for codebases that don’t want to adopt
    `async/await` yet. Listing [3-2](#532302_1_En_3_Chapter.xhtml#PC2) shows we can
    provide an `async/await` version of this method without writing it again.


    ```

    func fechUserInfo() async throws -> UserInfo {

    // (1)

    try await withCheckedThrowingContinuation { continuation in

    // (2)

    fetchUserInfo { userInfo, error in

    // (3)

    if let userInfo = userInfo {

    continuation.resume(returning: userInfo)

    } else if let error = error {

    continuation.resume(throwing: error)

    } else {

    // Throw a generic error.

    let nsError = NSError(domain: "com.socialmedia.app", code: 400)

    continuation.resume(throwing: nsError)

    }

    }

    }

    }

    Listing 3-2

    Using withCheckedThrowingContinuation

    ```


    Listing [3-2](#532302_1_En_3_Chapter.xhtml#PC2) essentially wraps closure-based
    code within a *Checked Continuation.* `withCheckedThrowingContinuation` – and
    other variants we will explore in a bit – is a method that provides a closure
    with a parameter. The parameter it gives you is the actual continuation, and you
    are responsible for resuming it when your asynchronous call with the closure is
    finished. In Listing [3-1](#532302_1_En_3_Chapter.xhtml#PC1), the continuation
    is of type `CheckedContinuation<T, E>`, meaning that we can resume the continuation
    with either an object or an error. This makes perfect sense because anything with
    a network call always has a chance of failing.


    Let’s walk through Listing [3-2](#532302_1_En_3_Chapter.xhtml#PC2) step by step:


    * `(1)` will call `withCheckedThrowingContinuation`. This is an `async` function
    that can throw. For this reason, we call it with `try await`, and the function
    signature is similar to the async version of this code we saw in Chapter [2](#532302_1_En_2_Chapter.xhtml).
    When calling this method, we need to pass it a closure that will provide us with
    a continuation object we need to resume after it’s done.


    * `(2)` will call the closure-based version of `fetchUserInfo(completionHandler:)`
    as you would call it in any other context.


    * `(3)` is where the magic happens. If `fetchUserInfo(completionHandler:)` finishes
    successfully and we have a `UserInfo` object, we will resume the continuation
    by calling `continuation.resume(returning: userInfo)`. If we get an error, we
    will instead call `continuation.resume(throwing: error)`. When calling the `continuation.resume(returning:)`
    method, it will cause the caller of the `async` version of `fetchUserInfo()` to
    return the resulting object, and calling `continuation.resume(throwing:)` will
    cause it to throw an error instead. In the end, the caller of the method in Listing
    [3-2](#532302_1_En_3_Chapter.xhtml#PC2) will behave the same as the caller in
    Listing [2-10](#532302_1_En_2_Chapter.xhtml#PC12) all the way back in Chapter
    [2](#532302_1_En_2_Chapter.xhtml). Keep in mind that when using continuations,
    you **must** call the continuation at some point exactly once. You cannot forget
    to call it, and you cannot call it more than once. If you forget to call it, you
    will be in a deadlocked state.


    Alongside `withCheckedThrowingContinuation`, we have three additional methods
    we can use to create this type of continuations:


    * `withCheckedContinuation`

    * `withUnsafeThrowingContinuation`

    * `withUnsafeContinuation`


    Use `withCheckedContinuation` when the original closure-based code does not give
    you back an error of any kind.


    The unsafe variants – `withUnsafeThrowingContinuation` and `withUnsafeContinuation`
    – are like their Checked counterparts. The main difference is, when working with
    Checked Continuations, Swift will help protect you by logging errors when any
    violations are encountered – calling continuations more than once or forgetting
    to call them completely. Unsafe continuations do not have these features, but
    they could be slightly faster. In general, I do not recommend you use Unsafe continuations,
    but be aware that you can use them interchangeably in most situations.


    ### Converting delegate-based code into async/await


    Converting delegate-based code into `async/await` is a more involved process since
    these types of APIs may call different delegate methods depending on what kind
    of events are happening. This will create naturally “jumpy” code. While the calls
    may happen in the same thread, they can be unpredictable because of the way they
    call their methods. For example, the *ContactsUI* framework offers an object,
    `CNContactPickerViewController`, which notifies you when the user chooses a contact
    in one method, and if they cancel the selection, a different method will be called.


    For this section, download the “Chapter [3](#532302_1_En_3_Chapter.xhtml) - Contact
    Picker (Base Project)” project.'
