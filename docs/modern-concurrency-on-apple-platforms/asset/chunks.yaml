- fmt: '### Using `async/await`


    All of Apple’s closure-based concurrency APIs have an `async/await` version you
    can use on iOS 15 and up. While with Xcode 13.3 you can use `async/await` on iOS
    versions as low as iOS 13, Apple’s native APIs with `async/await` support are
    only available on iOS 15 and above.


    We will now begin migrating all our closure-based code into `async/await`. You
    can download the finished project from “Chapter [2](#532302_1_En_2_Chapter.xhtml)
    - Social Media App (Async-Await)”.


    Let’s start with the `Shared ➤ API ➤ UserAPI.swift` file.


    We will first migrate the `fetchUserInfo(completionHandler:)`. So create a new
    function with the signature in Listing [2-11](#532302_1_En_2_Chapter.xhtml#PC13).


    ```

    func fetchUserInfo() async throws -> UserInfo {

    }

    Listing 2-11

    Basic signature for the async/await version of fetchUserInfo

    ```


    The function in Listing [2-11](#532302_1_En_2_Chapter.xhtml#PC13) can be marked
    as `throws`. In general, if you are modeling code that can throw errors or return
    a valid value, you can simply mark your method as `throws` and then assign the
    result type as the object you would get back if the call was successful. Essentially,
    the contents of the would-be completion handler closure have been moved around
    in the function signature.


    Right off the bat, you can tell that `async/await` helps us write more semantic
    code. In Swift, we can throw errors from functions, yet surprisingly many developers
    don’t write code like this. This is because most non-trivial apps are concurrent
    by nature (e.g., consuming network calls), and because we can’t handle errors
    from a closure in an idiomatic way, our only solution is to return errors as part
    of closures. With `async/await`, our function signatures are more readable and
    hence more self-documented.


    We will now make use of the first `async/await` API Apple provides us with iOS
    15.


    All the `URLSession` methods that return data have `async/await` variants. In
    Listing [2-12](#532302_1_En_2_Chapter.xhtml#PC14), we will implement the logic
    that will return us the user info JSON as `Data`.


    ```

    func fetchUserInfo() async throws -> UserInfo {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json")!

    let session = URLSession.shared

    let (userInfoData, response) = try await session.data(from: url)

    }

    Listing 2-12

    Network calls with async/await

    ```


    So far so good, but this code won’t compile yet because we are not returning anything.
    I want you to appreciate the fact that the call to `session.data(from:)` does
    not take a closure at all. You also don’t need to call `resume()` anymore – as
    soon as you call the async version of `data(from:)`, the task will begin.


    We now need to parse the JSON into an object that our API consumers can use. Listing
    [2-13](#532302_1_En_2_Chapter.xhtml#PC15) will complete the method with the JSON
    parsing and return a value.


    ```

    func fetchUserInfo() async throws -> UserInfo {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_profile.json")!

    let session = URLSession.shared

    let (userInfoData, response) = try await session.data(from: url)

    let userInfo = try JSONDecoder().decode(UserInfo.self, from: userInfoData)

    return userInfo

    }

    Listing 2-13

    Consuming a network request, parsing its results as JSON, and returning an object
    procedurally from async/await code

    ```


    And that’s it. That’s the entire `async` version of `fetchUserInfo`. We have turned
    a 15-line code block into a mere 5 (although it’s hard to appreciate in the book!).
    Thanks to Listing [2-13](#532302_1_En_2_Chapter.xhtml#PC15), we can really appreciate
    the elegance of `async/await`.


    Let’s take this chance to recap everything we have learned about `async/await`
    so far using this example.


    First, we declared the `fetchUserInfo` method as `async`. Note that since Swift
    supports method overloading, both `fetchUserInfo()` and `fetchUserInfo(completionHandler:)`
    can exist side by side. By marking the function as `async`, we have created a
    concurrent context where we can call other `async` functions, and callers to our
    function need to be within concurrent contexts themselves (either they need to
    be marked as `async` themselves, or within a `Task {}` call).


    When execution reaches the `let (userInfoData, response) = try await session.data(from:
    url)` line, our code is suspended, and the thread it’s executing on is free to
    do other work – possibly unrelated to our app. Thanks to this suspension, the
    line that follows, which converts the data into an object, will not execute since
    we depend on the data from the line above. When `session.data(from:)` has finished
    downloading its contents, it will let the system know it’s ready to return to
    the caller. The system will eventually give your app a heads-up by returning and
    assigning the `(userInfoData, response)` variables. After the system returns and
    those variables have values, the code will continue executing in the order it
    was written, by parsing the JSON, and later returning that object to the caller.
    It is procedural programming in its purest form.


    Naturally, it is also possible that the code will throw an error. The device may
    not have internet connectivity, or the server may be down. If an error occurs,
    you can intuitively tell what will happen because it’s exactly the same as if
    the code was not asynchronous: An error (an object that conforms to `Error`) will
    be thrown (hence we marked the function as `throws`) by `session.data(from:)`,
    and all the lines underneath will not be executed. For this reason, in this example,
    the caller will have to call `fetchUserInfo()` with a `try`, `try?`, or `try!`
    call (in this case, `try!` is not recommended at all).


    If you understand all that, feel free to continue. It’s important to understand
    how `async/await` works at the most basic level to make use of all its features,
    so feel free to take a break if you need it.


    You may notice the code has a warning at this point, on the following line:


    ```

    let (userInfoData, response) = try await session.data(from: url)

    ```


    `session.data(from:)` returns a tuple, so we can decompose it into two different
    variables. Since you are not using the `response` variable, you can replace it
    with an underscore (`_`), but the reason I put it there is to show that, if the
    API has other requirements (it requires you to inspect headers, or to work with
    HTTP status codes in different ways), you can use this variable, which is of type
    `URLResponse`. You would need to cast it to `HTTPURLResponse` to get anything
    meaningful out of it.


    Moving on, Listing [2-14](#532302_1_En_2_Chapter.xhtml#PC17) is the `async/await`
    version of the method that fetches the followers/following info.


    ```

    func fetchFollowingAndFollowers() async throws -> FollowerFollowingInfo {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/user_followers.json")!

    let session = URLSession.shared

    let (data, _) = try await session.data(from: url)

    let followingFollowers = try JSONDecoder().decode(FollowerFollowingInfo.self,
    from: data)

    return followingFollowers

    }

    Listing 2-14

    async/await version of the method that fetches followers and following users

    ```


    **Note**


    There are wonderful ways to abstract away and avoid code reuse in these calls,
    but they are out of the scope of this book.


    Now, let’s go to `Shared ➤ Views ➤ UserProfileView ➤ UserProfileViewModel.swift`.


    Listing [2-15](#532302_1_En_2_Chapter.xhtml#PC18) will begin by adding the `@MainActor`
    attribute to the class.


    ```

    @MainActor

    class UserProfileViewModel: ObservableObject {/*..*/}

    Listing 2-15

    Adding the @MainActor global actor to a class declaration

    ```'
