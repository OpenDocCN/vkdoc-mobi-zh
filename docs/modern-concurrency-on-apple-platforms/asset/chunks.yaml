    \n*Figure 7-1 The compiler protecting you from data races*\n\n> **Note**\n> There\
    \ is a difference to how Xcode 13 and Xcode 14 behave in this scenario. In Xcode\
    \ 13, you will get the error shown in Figure [7-1](#532302_1_En_7_Chapter.xhtml#Fig1).\
