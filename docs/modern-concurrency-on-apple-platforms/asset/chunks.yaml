- fmt: '### Concurrency and Asynchronous Programming


    Concurrency is the ability of a thread (or your program) to deal with multiple
    things at once. It may be responding to different events, such as network handlers,
    UI event handlers, OS interruptions, and more. There may be multiple threads and
    all of them can be concurrent.


    There are different APIs throughout Apple’s SDKs that make use of concurrency.
    Listing [1-2](#532302_1_En_1_Chapter.xhtml#PC3) shows how to request permission
    to use Touch ID or Face ID, depending on the device.


    ```

    func requestBiometricUnlock() {

    let context = LAContext()

    var error: NSError? = nil

    let canEvaluate = context.canEvaluatePolicy(.deviceOwnerAuthenticationWithBiometrics,
    error: &error)

    if canEvaluate {

    if context.biometryType != .none {

    // (1)

    context.evaluatePolicy(

    .deviceOwnerAuthenticationWithBiometrics,

    localizedReason: "To access your data") { (success, error) in

    // (2)

    if success {

    // ...

    }

    }

    }

    }

    }

    Listing 1-2

    Biometric unlock is an asynchronous task

    ```


    `(1)` calls `context.evaluatePolicy`, which is a *concurrent call*. This will
    ask the system to suspend your app so it can take over. The system will request
    permission to use biometrics while your app is suspended. The thread your app
    was running on may be doing something entirely different and not even related
    to your app while the system is running `context.evaluatePolicy`. When the user
    responds to the prompt, either accepting or rejecting the biometric request, it
    will deliver the result to your app. The system will wait for an appropriate time
    to notify your app with the user’s selection. The selection will be delivered
    to your app in the completion handler (also called a *callback*) on `(2)`, at
    which point your app will be in control of the thread again. The selection may
    be delivered in a different thread than the one which launched the `context.evaluatePolicy`
    call – this is important to know, because if the response updates the UI, you
    need to do that work on the main thread. This is also called a *blocking mechanism*
    or *interruption*, as `evaluatePolicy` is a *blocking* call for the thread. If
    you have done iOS for at least a few months now, you are familiar with this way
    of dealing with various events. `URLSession`, image pickers, and more APIs make
    use of this mechanism.


    People often think that asynchronous programming is the act of running multiple
    tasks at once. This is a different concept called *Multithreading*, and we will
    talk about it in the next point.


    **Note:** If you are thinking on implementing biometric unlock to resources within
    your app, please don’t use the code above. It has been simplified to explain how
    concurrency works, and it doesn''t have the right safety measures to protect your
    user''s data.


    Multithreading is the act of running multiple tasks at once. Multiple threads
    (hence its name – multithreading) are usually involved. Many tasks can be running
    at the same time in the context of your app. Downloading multiple images from
    the internet at the same time or downloading a file from your web browser while
    you open some tabs are some examples of multithreading. This allow us to run tasks
    in *parallel* and is sometimes called *parallelism*.


    ### Multithreading Pitfalls


    Concurrency and multithreading are traditionally hard problems to solve. Ever
    since their introduction in the computer world, developers have had to develop
    paradigms and tools to make dealing with concurrency easier. Because programmers
    are used to thinking procedurally, writing code that executes at unexpected times
    is hard to get right.


    In this section we will talk about some of the problems developers who write low-level
    multithreading code often face, and the models they have created to work with
    them. It is important you understand this section because these traditional problems
    are real, but their solutions are already implemented in the `async/await` system.
    It will also help you decide which technology you should use next time you need
    to implement concurrency or multithreading in your programs.


    #### Deadlocks


    In the context of multithreading, a *deadlock* occurs when two different processes
    are waiting on the other to finish, effectively making it impossible for any of
    them to finish to begin with.


    This can happen when both processes are sharing a resource. If *Thread B* wants
    a resource that *Thread A* is holding, and *Thread A* wants a resource that *Thread
    B* has, both processes will be waiting for each other to finish, sitting in a
    perpetual deadlock state. Figure [1-1](#532302_1_En_1_Chapter.xhtml#Fig1) illustrates
    how this might occur.


    ![](images/532302_1_En_1_Chapter/532302_1_En_1_Fig1_HTML.jpg)


    *A schematic diagram depicts the execution flow of Threads A and B, which consists
    of resource C with the correct symbol at Thread A and resource D with the incorrect
    symbol and vice versa of symbols at Thread B.*


    **Figure 1-1** – Deadlocking in action


    Figure [1-1](#532302_1_En_1_Chapter.xhtml#Fig1) illustrates how Thread A may try
    to access Resource C and Resource D, one after the other, and how Thread B may
    try to do the same but in different order. In this example, the deadlock will
    happen rather soon, because Thread A will get hold of Resource C while Thread
    B gets hold of Resource D. Whoever needs each other’s resource first will cause
    the deadlock.


    Despite how simple this problem looks, it is the culprit of a lot of bugs in a
    lot of multithreaded software. The simple solution would be to prevent each process
    from attempting to access a busy resource. But how can this be achieved?


    ##### Solving the Deadlocking Problem


    The deadlock problem has many established solutions. *Mutex* and *Semaphores*
    being the most used ones. There is also *Inter-process communication through pipes*,
    but we will not talk about it because it goes beyond a single program.


    ###### Mutex


    *Mutex* is short for *Mutually exclusive lock* (or *flag*). A mutex will signal
    other processes that a process is currently using some resource by adding a *lock*
    to it and preventing other processes from grabbing until that lock is freed. Ideally,
    a process will acquire a lock to all the resources it will need at once, even
    before using them. This way, if *Thread A* needs *Resource C* and *Resource D*,
    it can lock them before *Thread B* tries to access them. *Thread B* will wait
    until all the locks are freed before attempting to access the resources itself.
    Figure [1-2](#532302_1_En_1_Chapter.xhtml#Fig2) illustrates how this is done.


    ![](images/532302_1_En_1_Chapter/532302_1_En_1_Fig2_HTML.png)


    *A schematic diagram depicts the execution flow of Thread A and B, which consists
    of Resources C and D with the lock symbol, continue execution with locked resources,
    and wait for resources to get unlocked with the refresh symbol.*


    **Figure 1-2** – Using a mutex


    Keep in mind that in this specific situation, it means that *Thread A* and *Thread
    B*, while multithreaded, will not run strictly at the same time, because *Thread
    B* needs the same resources as *Thread A* and it will wait for them to be free.
    For this reason, it is important to identify tasks that can be run in parallel
    before designing a multithreaded system.'
