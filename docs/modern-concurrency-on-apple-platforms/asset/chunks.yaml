    ### `async` 关键字


    该系统的核心是 `async` 和 `await` 关键字。理解如何使用它们对于使用系统的其余部分至关重要。


    可以异步运行，或者可以与其他函数同时运行的函数，在其返回类型前有 `async` 关键字。这将告诉编译器和其他程序员你的函数是异步的。代码清单 2-6 展示了
    `async` 声明的样子。


    ```

    func fetchUserInfo() async throws -> UserInfo { /*...*/ }

    代码清单 2-6

    一个异步函数声明

    ```


    代码清单 2-6 中的声明将是我们将基于闭包的代码迁移到 `async/await` 的基础。我们甚至还没写多少代码，就已经能看到一些好处了。完成处理程序完全消失了。如果你的函数可能抛出错误，就像我们最初的
    `fetchUserInfo` 方法那样，你可以将 `async` 函数标记为 `throws`，这将使错误处理更加自然。最后，这个函数将返回一个 `UserInfo`，它不是可选项，这样你就不必解包该对象以及进行其他可能的检查。


    要调用 `async` 函数，你需要位于并发上下文中。有几种创建此类上下文的方法：


    -   `async` 函数的函数体本身就是一个并发上下文。如果一个函数没有被标记为 `async`，它就不能直接调用 `async` 函数。代码清单 2-7
    将无法编译。


    ```

    func authenticateAndFetchProfile() {

    //...

    let userProfile = try await fetchUserInfo()

    //...

    }

    代码清单 2-7

    尝试在异步上下文之外调用异步函数

    ```


    将该函数标记为 `async` 将使其能够编译。代码清单 2-8 通过修复代码使其能够编译。


    ```

    func authenticateAndFetchProfile() async {

    //...

    let userProfile = try await fetchUserInfo()

    //...

    }

    代码清单 2-8

    使用 async 关键字创建异步上下文

    ```


    但如果我们没有并发上下文会怎样？在你的调用层级中的某个位置，你可能会发现自己处于完全没有并发上下文来运行代码的情况。幸运的是，另一种创建异步上下文的方法将帮助我们处理这个问题。


    -   通过创建一个 `Task` 对象。`Task` 是一个非常强大的对象，它允许我们在后面进行多线程操作。我们还能对它们进行一些控制，例如取消它们。我们将在后面的章节中探讨这些特性。现在，我们只需使用
    `Task` 来创建一个并发上下文。`Task` 有一个带有闭包的初始化器，而该闭包本身就是一个并发上下文。代码清单 2-9 展示了如何使用 `Task`。


    ```

    func authenticateAndFetchProfile() {

    Task {

    //...

    let userProfile = try await fetchUserInfo()

    //...

    }

    }

    代码清单 2-9

    使用 Task 创建异步上下文

    ```


    即使 `authenticateAndFetchProfile()` 没有被标记为 `async`，在其中创建一个 `Task` 也能允许我们运行异步函数。


    ### `await` 关键字


    每次调用异步函数时，都必须在某个点上配对一个 `await` 关键字。`await` 本身具有特殊的语义，它不仅仅是调用 `async` 函数的语法。


    如果在代码执行过程中遇到 `await` 关键字，你的程序可以选择挂起当前正在执行的函数。因此，`await` 关键字通常也被称为**挂起点**。这是系统会做出的决定，你无法控制。当我们说它可能会挂起时，意味着当前执行将会暂停，而该
    `async` 函数将在其他地方继续执行。如果你的当前函数被挂起，其中的代码将不会被执行。


    为了更好地理解挂起，代码清单 2-10 将修改代码清单 2-8，在被等待的调用前后添加一些 `print` 语句。


    ```

    func authenticateAndFetchProfile() async {

    //...

    print("正在获取用户信息")

    let userProfile = try await fetchUserInfo()

    print("用户信息已获取")

    //...

    }

    代码清单 2-10

    添加 print 语句将使其按顺序打印内容

    ```


    代码清单 2-10 将打印 `正在获取用户信息`，过一会儿后，它将打印 `用户信息已获取`。这实际上就是这些语句编写的顺序，并且你无需涉足任何闭包或其他东西就能得到该输出。太好了！


    在发生挂起的 `await` 调用期间发生的情况是，你将控制权交还给系统，因此你无法控制何时能收回控制权。调用 `fetchUserInfo()` 的同一个线程将可以自由地去做其他工作，并且这些其他工作与你无关，因为它们由系统处理。它可能是你应用中的另一个任务，也可能超出你的领域。在控制权返回给你之前，你无法继续执行语句。因此，代码清单
    2-10 中的代码将按照编写的顺序打印这些语句，但是打印 `用户信息已获取` 可能需要一点时间，因为你已将线程交由系统处理，而下载用户信息是一项耗时的任务。当用户信息下载完成后，`fetchUserInfo`
    调用中会执行一个 `return` 语句，正是这个语句会将控制权返回给你。请注意，由系统决定何时将控制权交还给你，并且这不会在遇到 `return` 语句后立即发生。系统可能正在执行其他并发任务，在回到你的任务之前，它需要先处理好优先级。


    总之，在遇到挂起点（`await` 关键字）后，如果系统选择挂起，那么在控制权交还给你之前，其后的任何代码都不会被执行。在挂起发生期间，系统会利用该线程去做其他工作。


    在 `await` 调用之后发生的任何事情都是**延续**。我们需要继续执行在被挂起之前正在做的工作。这很重要，因为当我们收回控制权时，`await` 之后的代码中的语句可能会在不同的线程上运行。在代码清单
    2-10 中，这意味着第一个 `print` 语句可能在一个线程上运行，而第二个 `print` 语句可能在一个完全不同的线程上运行。使用 `async/await`
    并不能免除你在主线程上执行 UI 工作的责任，因此如果你需要更新 UI，你需要将该工作延期到主线程。在实践中，这是通过一个名为 `@MainActor` 的全局参与者来完成的。我们将在后面的章节中详细讨论全局参与者。


    有了所有这些理论基础，我们现在可以动手实践了。我们将重写基于闭包的代码，改用 `async/await`。

