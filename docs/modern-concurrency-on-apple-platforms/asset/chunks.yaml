- fmt: 'We are marking this method with the `@MainActor` and not the whole class.
    This is because the `ContactPicker` class could be doing all sorts of different
    things in different threads, but we only care about the `MainActor` in this method
    because it interacts with the UI by presenting the contact picker modally.


    The body of `withCheckedContinuation` does nothing but assign the continuation
    to our `contactContinuation` property. Again, we need to store the continuation
    somehow because we can resume it from two different delegate methods.


    Listing [3-10](#532302_1_En_3_Chapter.xhtml#PC10) will implement the delegate
    methods we need: `contactPicker(_:didSelect)` and `contactPickerDidCancel(_)`.


    ```swift

    @MainActor

    func contactPicker(_ picker: CNContactPickerViewController, didSelect contact:
    CNContact) {

    contactContinuation?.resume(returning: contact)

    contactContinuation = nil

    picker.dismiss(animated: true, completion: nil)

    }

    @MainActor

    func contactPickerDidCancel(_ picker: CNContactPickerViewController) {

    contactContinuation?.resume(returning: nil)

    contactContinuation = nil

    }

    Listing 3-10

    Resuming the continuation from two different delegate methods

    ```


    These methods are very straightforward. Both methods will resume the continuation,
    either passing a contact when selecting it, or passing in `nil` if no contact
    is selected (the selection has been cancelled). Assigning the `contactContinuation`
    property to `nil` after resuming it will ensure that we cannot call the continuation
    more than once.


    We have finished implementing the `ContactPicker` class, so now we need to go
    back to `ViewController`. You can remove the `CNContactPickerDelegate` conformance
    and its associated delegate methods. You can also replace the `promptContact()`
    implementation with the code in Listing [3-11](#532302_1_En_3_Chapter.xhtml#PC11).


    ```swift

    func promptContact() {

    Task {

    let contactPicker = ContactPicker(viewController: self)

    if let contact = await contactPicker.pickContact() {

    let nameFormatter = CNContactFormatter()

    nameFormatter.style = .fullName

    let contactName = nameFormatter.string(from: contact)

    selectedContactLabel.text = contactName

    selectedContactLabel.textColor = .black

    selectedContactLabel.isHidden = false

    } else {

    selectedContactLabel.text = "Cancelled"

    selectedContactLabel.textColor = .red

    selectedContactLabel.isHidden = false

    }

    }

    }

    Listing 3-11

    The final implementation for pickContact()

    ```


    `ViewController` is now significantly smaller. Tapping the Choose Contact button
    should behave exactly as it did before we changed it all to use `async/await`.


    Note


    While it is wonderful that we managed to offer an `async/await` version for a
    delegate-based call, you should consider if it’s *really* necessary to do so.
    Sometimes, the complexity of the delegate-based calls (CoreBluetooth, Core Location)
    will not be worthy to offer `async/await` versions for them. With that said, it’s
    a good exercise to work on to better understand how continuations work.


    ### Supporting async/await in iOS 13 and 14


    We mentioned this before, but it’s worth mentioning it again: While with Xcode
    13.3 you can use `async/await`, Apple doesn’t offer any APIs that use them unless
    you compile with the iOS 15 SDK or above.


    If you open the `async/await` version of our Social Media App from Chapter [2](#532302_1_En_2_Chapter.xhtml)
    (feel free to download the “Chapter [2](#532302_1_En_2_Chapter.xhtml) - Social
    Media App (Async-Await)(iOS 14)” if you don’t have it), and change the deployment
    target version to iOS 13 or iOS 14, you will see the project doesn’t compile anymore.
    Most of the errors have to do with the missing `async` methods that do not exist.
    Figure [3-2](#532302_1_En_3_Chapter.xhtml#Fig2) shows the errors that Xcode shows.


    ![](images/532302_1_En_3_Chapter/532302_1_En_3_Fig2_HTML.jpg)


    A screenshot represents the chapter two social media app of i O S with four issues,
    where swift compiler error, data, Asynclmage, and bordered prominent are only
    available in i O S 15.0 or newer.


    Figure 3-2


    We can’t use `async/await` with iOS 14 and lower


    Xcode’s suggestion – to use the availability checks directly – sounds good in
    theory, but if you let Xcode fix it for you, the project will be in a worse state
    than it is now. Because it will wrap all our `async` calls in availability checks,
    the project will do *nothing* in iOS 13 and iOS 14 after you get it to run.


    The solution is to use the availability check, but in extensions for `URLSession`
    and `LAContext`. We will fix this project without touching `UserAPI` and `UserProfileViewModel`.
    We will need to fix some SwiftUI issues later, but we don’t have to touch the
    logic code, making it easy to add `async/await` code without breaking any functionality.
    You can download the complete and fixed project as well, called “Chapter [2](#532302_1_En_2_Chapter.xhtml)
    - Social Media App (Async-Await)(iOS 14)(Fixed)”.


    Start by creating a folder or group inside the “Shared” folder, and name it “Extensions”.
    Then inside that group, create a new file called “LAContext+Extensions.swift”.
    Its contents will look like Listing [3-12](#532302_1_En_3_Chapter.xhtml#PC12).


    ```swift

    extension LAContext {

    @available(iOS, introduced: 13, deprecated: 15, message: "This method is no longer
    necessary. Use the API available in iOS 15.")

    func evaluatePolicy(_ policy: LAPolicy, localizedReason: String) async throws
    -> Bool {

    try await withCheckedThrowingContinuation({ continuation in

    self.evaluatePolicy(policy, localizedReason: localizedReason) { success, error
    in

    if let error = error {

    continuation.resume(throwing: error)

    } else {

    continuation.resume(returning: success)

    }

    }

    })

    }

    }

    Listing 3-12

    Backporting evaluatePolicy(_:localizedReason) async to iOS 14

    ```


    The `@available` check will ensure that this piece of code can only be run on
    iOS 13 and iOS 14. Older versions of iOS do not support `async/await`, so we will
    just exclude them altogether. When the deployment target is iOS 15, we will get
    a warning that reads “This method is no longer necessary. Use the API available
    in iOS 15.” When we start targeting iOS 15, we will be able to completely remove
    this extension, and the code will just work without having to do any further changes.


    The continuation here allows us to smoothly convert a closure-based call into
    an `async/await` call that already exists in the SDK, but when targeting iOS 15
    and up only. Instead of returning an error, we convert the method into a throwing
    one.


    In Figure [3-3](#532302_1_En_3_Chapter.xhtml#Fig3), we see the warning in action,
    prompting us to update the code when running on a simulator lower than iOS 15.
    You may need to clean the build folder and compile again to get the warning to
    show up:


    ![](images/532302_1_En_3_Chapter/532302_1_En_3_Fig3_HTML.jpg)


    A screenshot depicts three issues discovered in the social media app in I O S,
    where deprecation, and evaluate policy were deprecated in I O S 15, warning is
    to use the A P I available in I O S 15.


    Figure 3-3'
