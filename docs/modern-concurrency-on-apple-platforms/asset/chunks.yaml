    \ how the concurrency primitives such as locks work. The new concurrency system\
    \ aims to aid developers into not concerning themselves with such details."
  raw: '##### Structs


    Most of the time, structs will be sendable out of the box. But there are situations
    in which they can’t be. Imagine that we have a struct that has a property with
    a class type, like in Listing [7-1](#532302_1_En_7_Chapter.xhtml#PC1).


    ```

    class TVShow {

    let title: String

    var rating: Int

    init(title: String, rating: Int) {

    self.title = title

    self.rating = rating

    }

    }

    struct TVShowLibrary {

    var shows: [TVShow] = []

    }

    Listing 7-1

    A struct with a property which is an array of classes

    ```


    This code declares a struct, `TVShowLibrary` , whose only property is an array
    of `TVShow`s. `TVShow,` however, is a mutable class. It makes sense that we will
    want to change the rating of a TV show a few months after watching it.


    If you try to cross isolation boundaries (declaring a `TVShowLibrary` in a nonisolated
    context and capturing it within a Task.detached `{}`, for example) with this struct,
    the compiler will stop you, even though it is a struct. Normal `Task {}` captures
    will not be affected, because they will inherit the actor from the top context,
    which in this case is the `@MainActor`. In Listing [7-2](#532302_1_En_7_Chapter.xhtml#PC2),
    we declare a `TVShowLibrary` instance and then we capture it within two `Tasks`.


    ```

    var tvShowLibrary = TVShowLibrary()

    let show = TVShow(name: "Card Captor Sakura")

    tvShowLibrary.shows += [show]

    Task {

    tvShowLibrary.shows.first?.rating = 20

    print("Current score Task 1: \(tvShowLibrary.shows.first!.rating)")

    }

    Task {

    tvShowLibrary.shows.first?.rating = 30

    print("Current score Task 2: \(tvShowLibrary.shows.first!.rating)")

    }

    Listing 7-2

    Capturing a struct with non-sendable types in Tasks

    ```


    Intuitively, you may think that the compiler should stop you from doing this.
    After all, you are capturing a mutable value and mutating it from two tasks at
    the same time! But this is perfectly acceptable because both `Task` calls have
    the same actor of whatever launched them. If you launched the tasks from a non-asynchronous
    context, they would inherit the main actor.


    And the output will always be what you expect it to be. The task above will always
    print the rating is 20, and the task below will always print the rating is 30\.
    No race conditions will take place.


    Structs will be sendable by default, unless they have properties that are not
    sendable as well. Our `TVShowLibrary` object is not sendable, because it has an
    array of `TVShows`. `TVShow` is a class, which is not sendable by default. Because
    `TVShow` is not sendable, our entire `TVShowLibrary` is not sendable either. We
    can observe this behavior better if we change the Task {} calls from Listing [7-2](#532302_1_En_7_Chapter.xhtml#PC2)
    into detached tasks. Listing [7-3](#532302_1_En_7_Chapter.xhtml#PC3) makes this
    change.


    ```

    var tvShowLibrary = TVShowLibrary()

    let show = TVShow(name: "Card Captor Sakura")

    tvShowLibrary.shows += [show]

    Task.detached {

    tvShowLibrary.shows.first?.rating = 20

    print("Current score Task 1: \(tvShowLibrary.shows.first!.rating)")

    }

    Task.detached {

    tvShowLibrary.shows.first?.rating = 30

    print("Current score Task 2: \(tvShowLibrary.shows.first!.rating)")

    }

    Listing 7-3

    Capturing mutable non-sendable types from detached tasks

    ```


    Now this is more interesting. Because `Task.detached` does not inherit the actor
    from the top context, each of them run completely independently. That would certainly
    cause data races, and Swift is there to protect you from it. Figure [7-1](#532302_1_En_7_Chapter.xhtml#Fig1)
    shows the errors you would get.


    ![](images/532302_1_En_7_Chapter/532302_1_En_7_Fig1_HTML.png)


    A screenshot represents the TVShow code, which consists of the variables tv show
    library and Task. detached declared twice with Tasks 1 and 2 highlighted to indicate
    the reference.


    Figure 7-1


    The compiler protecting you from data races


    Note


    There is a difference to how Xcode 13 and Xcode 14 behave in this scenario. In
    Xcode 13, you will get the error shown in Figure [7-1](#532302_1_En_7_Chapter.xhtml#Fig1).
    In Xcode 14, you will get the same messages, but as warnings.


    The most sensible solution, in this case, is changing the `TVShowLibrary` so it
    is an actor instead of a struct. This is the perfect usage for an actor because
    multiple tasks are interested in mutating it.


    ##### Classes


    Classes are not sendable by default. You can, however, conform to the `Sendable`
    protocol when they are marked as `final` and have read-only properties. You can
    mark the `TVShow` as conforming to `Sendable`, and your code would compile, but
    not without getting any warnings. Figure [7-2](#532302_1_En_7_Chapter.xhtml#Fig2)
    shows the warnings we get when attempting to do so.


    ![](images/532302_1_En_7_Chapter/532302_1_En_7_Fig2_HTML.png)


    A screenshot represents the code of the class TV Show, which consists of seven
    lines of code and the first and second lines with some errors highlighted.


    Figure 7-2


    Conforming a class to sendable


    Marking the class as final will silence the top warning, but not the bottom one.
    Making the rating a `let` variable will silence the bottom warning, but we will
    not be able to mutate the score later. As a rule of thumb, if you have classes
    that need to be sendable, marking them as final and making everything read-only
    is the way to go, but it is not possible, as it is the case here.


    Ultimately, the only way we could fix the class is by opting out of compiler safety
    checks. To do this, add the `@unchecked` attribute before the `Sendable` conformance.
    Listing [7-4](#532302_1_En_7_Chapter.xhtml#PC4) shows the new `TVShow` class that
    does not yield any warnings.


    ```

    class TVShow: @unchecked Sendable {

    let name: String

    var rating: Int = 0

    init(name: String) {

    self.name = name

    }

    }

    Listing 7-4

    Opting out from compile-time checks

    ```


    This needs to be said again. You are opting out from compiler checks when you
    use `@unchecked`. Because this class has no synchronization of its own, it **will**
    cause data races when multiple tasks or actors mutate it at the same time. You
    can add your own synchronization mechanism by using something like `NSLock`. Listing
    [7-5](#532302_1_En_7_Chapter.xhtml#PC5) shows a very simple implementation of
    this .


    ```

    class TVShow: @unchecked Sendable {

    let name: String

    var rating: Int = 0 {

    willSet {

    mutex.lock()

    }

    didSet {

    mutex.unlock()

    }

    }

    let mutex = NSLock()

    init(name: String) {

    self.name = name

    }

    }

    Listing 7-5

    Manually implementing a lock to the synchronize state

    ```


    By using the lock, we can lock it before we set the variable, and unlock It after
    it is set. This example is simple enough, but more complex classes won’t have
    the same benefit.


    Caution


    I do not recommend you use this code in production unless you truly understand
    how the concurrency primitives such as locks work. The new concurrency system
    aims to aid developers into not concerning themselves with such details.'
