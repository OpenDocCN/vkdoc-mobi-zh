- fmt: '### Creating Global Actors


    You can create your own global actors to isolate them from the rest of the program,
    similar to how the `@MainActor` isolates its state to the main thread for UI updates.
    To do so, declare a struct that will be used as an attribute, and give it a static
    property named `shared`. Mark this struct with the `@globalActor` attribute as
    well.


    Listing [8-9](#532302_1_En_8_Chapter.xhtml#PC10) declares a global actor called
    `@MediaActor`.


    ```

    @globalActor

    struct MediaActor {

    actor ActorType { }

    static let shared: ActorType = ActorType()

    }

    Listing 8-9

    Declaring our own global actor

    ```


    Now everything we mark as `@MediaActor` will run on the same actor, synchronizing
    the global actor’s state automatically and ensuring no data races take place.
    In this example, we named it `MediaActor`, but you can name your actors anything
    that makes sense in the context of your app, such as `@DatabaseActor`.


    In the example in Listing [8-10](#532302_1_En_8_Chapter.xhtml#PC11), we will create
    a global `Videogame`s array. We will then read and write it from multiple different
    places to show our `@MediaActor` in action.


    ```

    struct Videogame {

    let id = UUID()

    let name: String

    let releaseYear: Int

    let developer: String

    }

    @MediaActor var videogames: [Videogame] = []

    Listing 8-10

    Creating a new object and a global variable that runs on our MediaActor

    ```


    Note


    in this example, `videogames` is a global variable. In general, I do not condone
    the usage of global variables like this, but I think it’s a very good example
    to learn about global actors.


    Now, suppose you have a view controller where you can perform operations on this
    array. We can add a random videogame, remove a random videogame, and retrieve
    the information of a random videogame. Listing [8-11](#532302_1_En_8_Chapter.xhtml#PC12)
    shows a short version of such a view controller.


    ```

    @MainActor

    class ViewController: UIViewController {

    @MediaActor

    func addRandomVideogames() {

    let zeldaOot = Videogame(name: "The Legend of Zelda: Ocarina of Time", releaseYear:
    1998, developer: "Nintendo")

    let xillia = Videogame(name: "Tales of Xillia", releaseYear: 2013, developer:
    "Bandai Namco")

    let legendOfHeroes = Videogame(name: "The Legend of Heroes: A Tear of Vermilion",
    releaseYear: 2004, developer: "Nihon Falcom")

    videogames += [zeldaOot, xillia, legendOfHeroes]

    }

    @MediaActor

    func removeRandomvideogame() {

    if let randomElement = videogames.randomElement() {

    videogames.removeAll { $0.id == randomElement.id }

    }

    }

    @MediaActor

    func getRandomGame() -> Videogame? {

    return videogames.randomElement()

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    Task {

    await addRandomVideogames()

    await removeRandomvideogame()

    if let randomGame = await getRandomGame() {

    print("Random game: \(randomGame.name)")

    }

    }

    }

    }

    Listing 8-11

    Adding operation to operate on videogames

    ```


    This looks like it has a lot to unpack, but it’s very straightforward.


    First, the `class ViewController` declaration is marked as `@MainActor`. In all
    the OS versions released with Xcode 13, we do not need to add the `@MainActor`
    attributes to classes, but I decided to add it so you can see a declaration can
    have multiple symbols that are run on different actors. Most of this class will
    run on the `@MainActor`, but the `addRandomVideogames`, `removeRandomVideogame`,
    and `getRandomVideogame` will all run on our new `@MediaActor`. Because they all
    have our own `@MediaActor` attribute, they can interact with the global `videogames`
    variable we declared earlier. And all of them will interact with it in a thread-safe
    manner because all of them are isolated to `@MediaActor`. It’s a beautiful system
    where we can mark distributed portions of our code to run on the same thread or
    actor, and all the internal synchronization of it will prevent us from introducing
    data races.


    In `viewDidLoad`, we will run all videogame operations at once. We will add a
    videogame, we will remove a videogame, and then we will fetch one to print its
    info. It wouldn’t make sense to mark `viewDidLoad` as `@MediaActor`, and even
    if we tried to, we would be stopped because this method is known to modify your
    UI in most implementations. `viewDidLoad` must run on the main actor.


    Because `viewDidLoad` runs on `@MainActor` and all our videogame operations run
    on `@MediaActor`, if we want to access one global actor from the other global
    actor, we need to do so *asynchronously*. For this reason, we create an asynchronous
    context with `Task {}`, and we need to either `await` on each videogame operation
    or call it concurrently with `async let` if it makes sense to do so. Fetching
    a videogame is also an asynchronous operation, so we can use await on the right
    side of the `if let` to call it.


    Now, if we want to have another function that operates on these videogames, `showAvailableVideogames`,
    it can be anywhere. Suppose we have an imaginary `Functions.swift` file, completely
    independent of the `ViewController` and the actor declaration, we can just add
    the new function there, add the `@MediaActor` attribute, and anything running
    on the `@MediaActor` can interact with it synchronously and everything outside
    of it asynchronously. Listing [8-12](#532302_1_En_8_Chapter.xhtml#PC13) shows
    this new method.


    ```

    @MediaActor

    func showAvailableGames() {

    for game in videogames {

    print("\(game.name)")

    }

    }

    Listing 8-12

    The showAvailableGames method is in its own file, but it’s still isolated to the
    @MediaActor

    ```


    ## Summary


    Global Actors allow us to mark declarations spread across different files and
    other logical or physical locations, such as different frameworks, and have them
    run in the same thread. We say these declarations are *isolated* to the actor
    they are running on. The global actor will synchronize all its accesses, and for
    the developer, it is as easy as using the global actors as attributes to ensure
    they run on the same actor and avoid data races.


    Apple provides the `@MainActor` global actor in all its platforms that have a
    UI. This includes iOS, macOS, watchOS, and tvOS. Every UI element, whether it
    comes from UIKit, AppKit, or SwiftUI, runs isolated to the main actor, and if
    we want to update or refresh our UI, we need to go the `@MainActor` before running
    these updates. This will ensure all accesses to the main thread are synchronized
    by the main actor, it will refresh our UI, and we will not see warnings or errors
    related to drawing our UI outside of the main thread.


    We can create our own global actors for our own functionality. For example, if
    we had a framework that interacted with a database, we could add our own global
    attribute to all its classes to ensure all reads and writes happen in the same
    thread to avoid data races.


    # 9. AsyncSequence


    In Swift, we have the concept of *Sequences*. Formally, `Sequence` is a protocol
    that types that need sequential and iterated access to their elements depend on.
    Arrays conform to `Sequence`, because you can iterate through them via a `for-in`
    loop, the `forEach` method, and with higher-order functions such as `filter`,
    `map`, and `reduce`. You can simply access their elements with a numbered index
    such as `myArray[2]`. Dictionaries are very similar. You can iterate over their
    keys and values in the same ways as an array, and to access an element in a dictionary,
    you can simply call `myDictionary[myHashableKey]`. Sets behave similarly, and
    you can even implement your own types that conform to `Sequence`.


    The `AsyncSequence` protocol, provided by the new concurrency system, allows us
    to achieve similar functionality, but for asynchronous types. Is a Sequence with
    asynchronicity added on top – `AsyncSequence`!'
  raw: '### Creating Global Actors


    You can create your own global actors to isolate them from the rest of the program,
    similar to how the `@MainActor` isolates its state to the main thread for UI updates.
    To do so, declare a struct that will be used as an attribute, and give it a static
    property named `shared`. Mark this struct with the `@globalActor` attribute as
    well.


    Listing [8-9](#532302_1_En_8_Chapter.xhtml#PC10) declares a global actor called
    `@MediaActor` .


    ```

    @globalActor

    struct MediaActor {

    actor ActorType { }

    static let shared: ActorType = ActorType()

    }

    Listing 8-9

    Declaring our own global actor

    ```


    Now everything we mark as `@MediaActor` will run on the same actor, synchronizing
    the global actor’s state automatically and ensuring no data races take place.
    In this example, we named it `MediaActor` , but you can name your actors anything
    that makes sense in the context of your app, such as `@DatabaseActor` .


    In the example in Listing [8-10](#532302_1_En_8_Chapter.xhtml#PC11), we will create
    a global `Videogame`s array. We will then read and write it from multiple different
    places to show our `@MediaActor` in action.


    ```

    struct Videogame {

    let id = UUID()

    let name: String

    let releaseYear: Int

    let developer: String

    }

    @MediaActor var videogames: [Videogame] = []

    Listing 8-10

    Creating a new object and a global variable that runs on our MediaActor

    ```


    Note


    in this example, videogames is a global variable. In general, I do not condone
    the usage of global variables like this, but I think it’s a very good example
    to learn about global actors.


    Now, suppose you have a view controller where you can perform operations on this
    array. We can add a random videogame, remove a random videogame, and retrieve
    the information of a random videogame . Listing [8-11](#532302_1_En_8_Chapter.xhtml#PC12)
    shows a short version of such a view controller.


    ```

    @MainActor

    class ViewController: UIViewController {

    @MediaActor

    func addRandomVideogames() {

    let zeldaOot = Videogame(name: "The Legend of Zelda: Ocarina of Time", releaseYear:
    1998, developer: "Nintendo")

    let xillia = Videogame(name: "Tales of Xillia", releaseYear: 2013, developer:
    "Bandai Namco")

    let legendOfHeroes = Videogame(name: "The Legend of Heroes: A Tear of Vermilion",
    releaseYear: 2004, developer: "Nihon Falcom")

    videogames += [zeldaOot, xillia, legendOfHeroes]

    }

    @MediaActor

    func removeRandomvideogame() {

    if let randomElement = videogames.randomElement() {

    videogames.removeAll { $0.id == randomElement.id }

    }

    }

    @MediaActor

    func getRandomGame() -> Videogame? {

    return videogames.randomElement()

    }

    override func viewDidLoad() {

    super.viewDidLoad()

    Task {

    await addRandomVideogames()

    await removeRandomvideogame()

    if let randomGame = await getRandomGame() {

    print("Random game: \(randomGame.name)")

    }

    }

    }

    }

    Listing 8-11

    Adding operation to operate on videogames

    ```


    This looks like it has a lot to unpack, but it’s very straightforward.


    First, the `class ViewController` declaration is marked as `@MainActor`. In all
    the OS versions released with Xcode 13, we do not need to add the `@MainActor`
    attributes to classes, but I decided to add it so you can see a declaration can
    have multiple symbols that are run on different actors. Most of this class will
    run on the `@MainActor`, but the `addRandomVideogames`, `removeRandomVideogame`,
    and `getRandomVideogame` will all run on our new `@MediaActor`. Because they all
    have our own @MediaActor attribute, they can interact with the global videogames
    variable we declared earlier. And all of them will interact with it in a thread-safe
    manner because all of them are isolated to `@MediaActor`. It’s a beautiful system
    where we can mark distributed portions of our code to run on the same thread or
    actor, and all the internal synchronization of it will prevent us from introducing
    data races.


    In `viewDidLoad` , we will run all videogame operations at once. We will add a
    videogame, we will remove a videogame, and then we will fetch one to print its
    info. It wouldn’t make sense to mark `viewDidLoad` as `@MediaActor`, and even
    if we tried to, we would be stopped because this method is known to modify your
    UI in most implementations. `viewDidLoad` must run on the main actor.


    Because `viewDidLoad` runs on `@MainActor` and all our videogame operations run
    on `@MediaActor`, if we want to access one global actor from the other global
    actor, we need to do so *asynchronously*. For this reason, we create an asynchronous
    context with `Task {}`, and we need to either `await` on each videogame operation
    or call it concurrently with `async let` if it makes sense to do so. Fetching
    a videogame is also an asynchronous operation, so we can use await on the right
    side of the if let to call it.


    Now, if we want to have another function that operates on these videogames, `showAvailableVideogames`,
    it can be anywhere. Suppose we have an imaginary Functions.swift file, completely
    independent of the `ViewController` and the actor declaration, we can just add
    the new function there, add the `@MediaActor` attribute, and anything running
    on the `@MediaActor` can interact with it synchronously and everything outside
    of it asynchronously. Listing [8-12](#532302_1_En_8_Chapter.xhtml#PC13) shows
    this new method.


    ```

    @MediaActor

    func showAvailableGames() {

    for game in videogames {

    print("\(game.name)")

    }

    }

    Listing 8-12

    The showAvailableGames method is in its own file, but it’s still isolated to the
    @MediaActor

    ```


    ## Summary


    Global Actors allow us to mark declarations spread across different files and
    other logical or physical locations, such as different frameworks, and have them
    run in the same thread. We say these declarations are *isolated* to the actor
    they are running on. The global actor will synchronize all its accesses, and for
    the developer, it is as easy as using the global actors as attributes to ensure
    they run on the same actor and avoid data races.


    Apple provides the `@MainActor` global actor in all its platforms that have a
    UI. This includes iOS, macOS, watchOS, and tvOS. Every UI element, whether it
    comes from UIKit, AppKit, or SwiftUI, runs isolated to the main actor, and if
    we want to update or refresh our UI, we need to go the `@MainActor` before running
    these updates. This will ensure all accesses to the main thread are synchronized
    by the main actor, it will refresh our UI , and we will not see warnings or errors
    related to drawing our UI outside of the main thread.


    We can create our own global actors for our own functionality. For example, if
    we had a framework that interacted with a database, we could add our own global
    attribute to all its classes to ensure all reads and writes happen in the same
    thread to avoid data races.


    # 9. AsyncSequence


    In Swift, we have the concept of *Sequences*. Formally, `Sequence` is a protocol
    that types that need sequential and iterated access to their elements depend on.
    Arrays conform to `Sequence`, because you can iterate through them via a `for-in`
    loop, the `forEach` method , and with higher-order functions such as `filter`,
    `map`, and `reduce`. You can simply access their elements with a numbered index
    such as `myArray[2]`. Dictionaries are very similar. You can iterate over their
    keys and values in the same ways as an array, and to access an element in a dictionary,
    you can simply call `myDictionary[myHashableKey]`. Sets behave similarly, and
    you can even implement your own types that conform to `Sequence`.


    The `AsyncSequence` protocol, provided by the new concurrency system, allows us
    to achieve similar functionality, but for asynchronous types. Is a Sequence with
    asynchronicity added on top – `AsyncSequence`!'
  trans: "\n### 创建全局 Actor\n\n您可以创建自己的全局 Actor，使其与程序的其他部分隔离，就像 `@MainActor` 将其状态隔离到主线程以进行\
    \ UI 更新一样。为此，声明一个将用作属性的结构体，并为其赋予一个名为 `shared` 的静态属性。同时使用 `@globalActor` 属性标记此结构体。\n\
    \n列表 8-9 声明了一个名为 `@MediaActor` 的全局 Actor。\n\n```\n@globalActor\nstruct MediaActor\
    \ {\n    actor ActorType { }\n    static let shared: ActorType = ActorType()\n\
    }\n列表 8-9\n声明我们自己的全局 Actor\n```\n\n现在，我们标记为 `@MediaActor` 的所有内容都将在同一个 Actor 上运行，自动同步全局\
    \ Actor 的状态，并确保不会发生数据竞争。在此示例中，我们将其命名为 `MediaActor`，但您可以根据应用程序上下文为您的 Actor 命名任何合适的名称，例如\
    \ `@DatabaseActor`。\n\n在列表 8-10 的示例中，我们将创建一个全局的 `Videogame` 数组。然后，我们将从多个不同的位置对其进行读写，以展示我们的\
    \ `@MediaActor` 的实际运行情况。\n\n```\nstruct Videogame {\n    let id = UUID()\n   \
    \ let name: String\n    let releaseYear: Int\n    let developer: String\n}\n@MediaActor\
    \ var videogames: [Videogame] = []\n列表 8-10\n创建一个新对象以及一个在我们的 MediaActor 上运行的全局变量\n\
    ```\n\n注意\n\n在此示例中，`videogames` 是一个全局变量。通常，我不赞同这样使用全局变量，但我认为这是一个学习全局 Actor 的极好示例。\n\
    \n现在，假设您有一个视图控制器，可以在其中对此数组执行操作。我们可以添加一个随机电子游戏、移除一个随机电子游戏以及检索一个随机电子游戏的信息。列表 8-11\
    \ 展示了这样一个视图控制器的精简版本。\n\n```\n@MainActor\nclass ViewController: UIViewController\
    \ {\n    @MediaActor\n    func addRandomVideogames() {\n        let zeldaOot =\
    \ Videogame(name: \"The Legend of Zelda: Ocarina of Time\", releaseYear: 1998,\
    \ developer: \"Nintendo\")\n        let xillia = Videogame(name: \"Tales of Xillia\"\
    , releaseYear: 2013, developer: \"Bandai Namco\")\n        let legendOfHeroes\
    \ = Videogame(name: \"The Legend of Heroes: A Tear of Vermilion\", releaseYear:\
    \ 2004, developer: \"Nihon Falcom\")\n        videogames += [zeldaOot, xillia,\
    \ legendOfHeroes]\n    }\n    @MediaActor\n    func removeRandomvideogame() {\n\
    \        if let randomElement = videogames.randomElement() {\n            videogames.removeAll\
    \ { $0.id == randomElement.id }\n        }\n    }\n    @MediaActor\n    func getRandomGame()\
    \ -> Videogame? {\n        return videogames.randomElement()\n    }\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        Task {\n        \
    \    await addRandomVideogames()\n            await removeRandomvideogame()\n\
    \            if let randomGame = await getRandomGame() {\n                print(\"\
    Random game: \\(randomGame.name)\")\n            }\n        }\n    }\n}\n列表 8-11\n\
    添加操作以处理 videogames\n```\n\n这看起来有很多内容需要解析，但实际上非常直接。\n\n首先，`class ViewController`\
    \ 声明被标记为 `@MainActor`。在所有随 Xcode 13 发布的 OS 版本中，我们不需要将 `@MainActor` 属性添加到类，但我决定添加它，以便您能看到一个声明可以包含多个在不同\
    \ Actor 上运行的符号。此类的大部分内容将在 `@MainActor` 上运行，但 `addRandomVideogames`、`removeRandomVideogame`\
    \ 和 `getRandomVideogame` 都将在我们新的 `@MediaActor` 上运行。因为它们都具有我们自己的 `@MediaActor`\
    \ 属性，所以它们可以与我们之前声明的全局 `videogames` 变量交互。并且它们都将以线程安全的方式与其交互，因为它们都隔离在 `@MediaActor`\
    \ 上。这是一个优美的系统，我们可以标记代码的分布式部分以在同一个线程或 Actor 上运行，其内部的所有同步将防止我们引入数据竞争。\n\n在 `viewDidLoad`\
    \ 中，我们将同时运行所有电子游戏操作。我们将添加一个电子游戏，移除一个电子游戏，然后获取一个来打印其信息。将 `viewDidLoad` 标记为 `@MediaActor`\
    \ 没有意义，即使我们尝试这样做，也会被阻止，因为已知此方法在大多数实现中会修改 UI。`viewDidLoad` 必须在主 Actor 上运行。\n\n\
    由于 `viewDidLoad` 在 `@MainActor` 上运行，而我们所有的电子游戏操作都在 `@MediaActor` 上运行，如果我们想从一个全局\
    \ Actor 访问另一个全局 Actor，我们需要*异步地*执行此操作。因此，我们使用 `Task {}` 创建一个异步上下文，并且我们需要对每个电子游戏操作使用\
    \ `await`，或者如果合理的话，使用 `async let` 并发调用它。获取电子游戏也是一个异步操作，因此我们可以在 `if let` 的右侧使用\
    \ `await` 来调用它。\n\n现在，如果我们想有另一个操作这些电子游戏的函数 `showAvailableVideogames`，它可以放在任何地方。假设我们有一个虚构的\
    \ `Functions.swift` 文件，它完全独立于 `ViewController` 和 Actor 声明，我们可以就在那里添加新函数，添加 `@MediaActor`\
    \ 属性，那么在 `@MediaActor` 上运行的任何内容都可以同步与其交互，而在其外部的内容则异步交互。列表 8-12 展示了这个新方法。\n\n```\n\
    @MediaActor\nfunc showAvailableGames() {\n    for game in videogames {\n     \
    \   print(\"\\(game.name)\")\n    }\n}\n列表 8-12\nshowAvailableGames 方法位于其自己的文件中，但仍隔离在\
    \ @MediaActor 中\n```\n\n## 总结\n\n全局 Actor 允许我们标记分布在多个文件和其他逻辑或物理位置（例如不同框架）中的声明，并使它们在同一个线程上运行。我们说这些声明*隔离*于它们所运行的\
    \ Actor。全局 Actor 会同步其所有访问，对于开发者来说，只需像使用属性一样使用全局 Actor，即可确保它们在同一个 Actor 上运行并避免数据竞争。\n\
    \nApple 在其所有具有 UI 的平台（包括 iOS、macOS、watchOS 和 tvOS）上都提供了 `@MainActor` 全局 Actor。每个\
    \ UI 元素，无论它来自 UIKit、AppKit 还是 SwiftUI，都隔离在主 Actor 上运行，如果我们想要更新或刷新 UI，我们需要在运行这些更新之前进入\
    \ `@MainActor`。这将确保所有对主线程的访问都由主 Actor 同步，它会刷新我们的 UI，并且我们不会看到与在主线程之外绘制 UI 相关的警告或错误。\n\
    \n我们可以为自己的功能创建自己的全局 Actor。例如，如果我们有一个与数据库交互的框架，我们可以为它的所有类添加我们自己的全局属性，以确保所有读写操作都发生在同一个线程中，从而避免数据竞争。\n\
    \n# 9. AsyncSequence\n\n在 Swift 中，我们有*序列 (Sequences)* 的概念。形式上，`Sequence` 是一个协议，那些需要对其元素进行顺序和迭代访问的类型都依赖于此协议。数组遵循\
    \ `Sequence`，因为你可以通过 `for-in` 循环、`forEach` 方法以及像 `filter`、`map` 和 `reduce` 这样的高阶函数来遍历它们。你可以简单地使用数字索引（如\
    \ `myArray[2]`）来访问其元素。字典也非常相似。你可以像遍历数组一样遍历它们的键和值，要访问字典中的元素，你只需调用 `myDictionary[myHashableKey]`。集合的行为类似，你甚至可以实现自己的遵循\
    \ `Sequence` 的类型。\n\n由新的并发系统提供的 `AsyncSequence` 协议，允许我们实现类似的功能，但针对的是异步类型。它是一个叠加了异步性的序列——`AsyncSequence`！\n"
- fmt: "# Introducing AsyncSequence\n\nAn `AsyncSequence` behaves almost like a sequence.\
    \ You can do almost everything you can with a normal sequence, from iterating\
    \ over it, to applying higher-order functions. There is one key difference to\
    \ `Sequence`s: `AsyncSequence`s do not store any values of their own. It’s not\
    \ like an array that is storing its data in memory. Strictly speaking, it isn’t\
    \ a value generator either. Instead, an `AsyncSequence` is a mere interface that\
    \ allows you to access values that are being emitted over time, right as they\
    \ become available. These values are emitted asynchronously, and as such you need\
    \ to `await` on them as they become available.\n\nWe have actually used an `AsyncSequence`\
    \ before. Back in Chapter [5](#532302_1_En_5_Chapter.xhtml), when we were talking\
    \ about Structured Concurrency, we learned about task groups. Task groups allow\
    \ us to run a dynamic number of concurrent tasks and observe their results in\
    \ an awaited loop. To recap, Listing [9-1](#532302_1_En_9_Chapter.xhtml#PC1) is\
    \ one of the original examples we used back then.\n\n```\n/// Downloads all the\
    \ images in the array and returns an array of URLs to the local files\nfunc download(serverImages:\
    \ [ServerImage]) async throws -> [URL] {\n    var urls: [URL] = []\n    try await\
    \ withThrowingTaskGroup(of: URL.self) { group in\n        for image in serverImages\
    \ {\n            group.addTask(priority: .userInitiated) {\n                let\
    \ imageUrl = try await self.download(image)\n                return imageUrl\n\
    \            }\n        }\n        for try await imageUrl in group {\n       \
    \     urls.append(imageUrl)\n        }\n    }\n    return urls\n}\nListing 9-1\n\
    Task groups deliver their results using an AsyncSequence\n```\n\nNotice the `\"\
    for try await...\"` part. This `for` loop is using an `AsyncSequence`. We do not\
    \ know what the concrete type for this `AsyncSequence`. All we know is that the\
    \ task group is running a variable number of tasks, and as they finish, they deliver\
    \ a `URL` object to this loop. The `URL`s cannot exist until each task launched\
    \ by the group is done downloading. But how is this magic done? In order to understand\
    \ how `AsyncSequence` works, we need to understand how sequences in general work.\n\
    \n## A Short Dive into Sequences and AsyncSequences\n\n`for-in` loops – and by\
    \ extension, higher-order functions – expect a `Sequence` to work. `Sequence`\
    \ is a protocol with some constraints that interested types must adopt. One of\
    \ these requirements is to implement a `makeIterator()` method that returns an\
    \ iterator. Understanding iterators is not essential to understanding the basics\
    \ of how sequences work, so for now, you just need to know that iterators are\
    \ types that conform to `IteratorProtocol`, and this protocol has a requirement\
    \ to implement a method called `next()` which returns an optional instance of\
    \ the sequence’s generic type `Element`. In order words, if your sequence is an\
    \ array of `Int`s, the `next()` method will return an optional Int (`Int?`). During\
    \ iterations, this method is called for each run of the loop until there are no\
    \ more elements to return (until it returns `nil`).\n\nImagine you have the array\
    \ in Listing [9-2](#532302_1_En_9_Chapter.xhtml#PC2), and you iterate over it,\
    \ printing a value from it on each iteration.\n\n```\nlet myArray = [1, 2, 3,\
    \ 4, 5]\nfor item in myArray {\n    print(item)\n}\nListing 9-2\nDeclaring an\
    \ array and iterating over it\n```\n\nThis `for-in` loop will run 5 items, and\
    \ on each iteration, the `item` local variable will store a value returned by\
    \ `next() -> Int?`. The moment the collection returns `nil`, the iteration stops,\
    \ and the code will begin executing below the loop. In short, `for-in` iterations\
    \ are simply syntactic sugar provided thanks to the `Sequence` conformance.\n\n\
    AsyncSequences are not that different. The main differences are that instead of\
    \ a `makeIterator` method, they have a `makeAsyncIterator` method that, like you\
    \ may have guessed it, returns an iterator that conforms to the `AsyncIteratorProtocol`\
    \ protocol. This iterator requires you to implement a `next() async -> Element?`\
    \ method. Because the `next` method is `async`, we can use it in `for-in` loops\
    \ and with higher-order functions.\n\nTherefore, Sequences and AsyncSequences\
    \ are very similar. The main differences are that Sequences do store their data\
    \ and AsyncSequences deliver them over time from an asynchronous source, and the\
    \ underlying protocols are non-async and async, respectively, to support their\
    \ functionality.\n\n## AsyncSequence Concrete Types\n\nThere are various types\
    \ that conform to `AsyncSequence`. In general, you do not need to concern yourself\
    \ with the underlying type, but it’s interesting to know, because this is also\
    \ different to how normal Sequences operate.\n\nWhenever you call a higher-order\
    \ function in an AsyncSequence, such as `drop(while:)`, `filter`, `map`, and `reduce`,\
    \ a completely new type that conforms to AsyncSequence is returned to you.\n\n\
    If you call `drop(while:)` on an async sequence, you will get a `AsyncThrowingDropWhileSequence`\
    \ or `AsyncDropWhileSequence`; using `filter` will return you an `AsyncThrowingFilterSequence`\
    \ or `AsyncFilterSequence`, and so on for any other higher-order function you\
    \ perform. There’s too many of them to list, but you get the idea. They can be\
    \ chained without an issue. Normal sequences return an `ArraySlice<Element>` when\
    \ the array is mutated, because an array slice is a “window” of the returned elements,\
    \ it does not contain a copy of the new data, it just “sees” the elements that\
    \ should be included for the new array. Because AsyncSequences do not contain\
    \ data, it doesn’t make sense to have “windows” in the original. Instead, these\
    \ types will restrict or mutate what will be delivered on each iteration, skipping\
    \ some iterations altogether. Higher-order functions on arrays that return new\
    \ data such as `map` will be normal arrays of type `Element`."
  raw: '## Introducing AsyncSequence


    An `AsyncSequence` behaves almost like a sequence. You can do almost everything
    you can with a normal sequence, from iterating over it, to applying higher-order
    functions . There is one key difference to `Sequence`s: `AsyncSequence`s do not
    store any values of their own. It’s not like an array that is storing its data
    in memory. Strictly speaking, it isn’t a value generator either. Instead, an `AsyncSequence`
    is a mere interface that allows you to access values that are being emitted over
    time, right as they become available. These values are emitted asynchronously,
    and as such you need to `await` on them as they become available.


    We have actually used an `AsyncSequence` before. Back in Chapter [5](#532302_1_En_5_Chapter.xhtml),
    when we were talking about Structured Concurrency, we learned about task groups.
    Task groups allow us to run a dynamic number of concurrent tasks and observe their
    results in an awaited loop. To recap, Listing [9-1](#532302_1_En_9_Chapter.xhtml#PC1)
    is one of the original examples we used back then.


    ```

    /// Downloads all the images in the array and returns an array of URLs to the
    local files

    func download(serverImages: [ServerImage]) async throws -> [URL] {

    var urls: [URL] = []

    try await withThrowingTaskGroup(of: URL.self) { group in

    for image in serverImages {

    group.addTask(priority: .userInitiated) {

    let imageUrl = try await self.download(image)

    return imageUrl

    }

    }

    for try await imageUrl in group {

    urls.append(imageUrl)

    }

    }

    return urls

    }

    Listing 9-1

    Task groups deliver their results using an AsyncSequence

    ```


    Notice the “`for try await...`” part. This `for` loop is using an `AsyncSequence`.
    We do not know what the concrete type for this `AsyncSequence`. All we know is
    that the task group is running a variable number of tasks, and as they finish,
    they deliver a `URL` object to this loop. The `URL`s cannot exist until each task
    launched by the group is done downloading. But how is this magic done? In order
    to understand how `AsyncSequence` works, we need to understand how sequences in
    general work.


    ### A Short Dive into Sequences and AsyncSequences


    `for-in` loops – and by extension, higher-order functions – expect a `Sequence`
    to work. `Sequence` is a protocol with some constraints that interested types
    must adopt. One of these requirements is to implement a `makeIterator()` method
    that returns an iterator. Understanding iterators is not essential to understanding
    the basics of how sequences work, so for now, you just need to know that iterators
    are types that conform to `IteratorProtocol`, and this protocol has a requirement
    to implement a method called `next()` which returns an optional instance of the
    sequence’s generic type `Element`. In order words, if your sequence is an array
    of `Int`s, the `next()` method will return an optional Int (`Int?`). During iterations,
    this method is called for each run of the loop until there are no more elements
    to return (until it returns `nil`).


    Imagine you have the array in Listing [9-2](#532302_1_En_9_Chapter.xhtml#PC2),
    and you iterate over it, printing a value from it on each iteration.


    ```

    let myArray = [1, 2, 3, 4, 5]

    for item in myArray {

    print(item)

    }

    Listing 9-2

    Declaring an array and iterating over it

    ```


    This `for-in` loop will run 5 items, and on each iteration, the `item` local variable
    will store a value returned by `next() -> Int?`. The moment the collection returns
    `nil`, the iteration stops, and the code will begin executing below the loop.
    In short, `for-in` iterations are simply syntactic sugar provided thanks to the
    `Sequence` conformance.


    AsyncSequences are not that different. The main differences are that instead of
    a `makeIterator` method, they have a `makeAsyncIterator` method that, like you
    may have guessed it, returns an iterator that conforms to the `AsyncIteratorProtocol`
    protocol. This iterator requires you to implement a `next() async -> Element?`
    method. Because the `next` method is `async`, we can use it in `for-in` loops
    and with higher-order functions.


    Therefore, Sequences and AsyncSequences are very similar. The main differences
    are that Sequences do store their data and AsyncSequences deliver them over time
    from an asynchronous source, and the underlying protocols are non-async and async,
    respectively, to support their functionality.


    ### AsyncSequence Concrete Types


    There are various types that conform to `AsyncSequence` . In general, you do not
    need to concern yourself with the underlying type, but it’s interesting to know,
    because this is also different to how normal Sequences operate.


    Whenever you call a higher-order function in an AsyncSequence, such as `drop(while:)`,
    `filter`, `map`, and `reduce`, a completely new type that conforms to AsyncSequence
    is returned to you.


    If you call `drop(while:)` on an async sequence, you will get a `AsyncThrowingDropWhileSequence`
    or `AsyncDropWhileSequence`; using filter will return you an `AsyncThrowingFilterSequence`
    or `AsyncFilterSequence`, and so on for any other higher-order function you perform.
    There’s too many of them to list, but you get the idea. They can be chained without
    an issue. Normal sequences return an `ArraySlice<Element>` when the array is mutated,
    because an array slice is a “window” of the returned elements, it does not contain
    a copy of the new data, it just “sees” the elements that should be included for
    the new array. Because AsyncSequences do not contain data, it doesn’t make sense
    to have “windows” in the original. Instead, these types will restrict or mutate
    what will be delivered on each iteration, skipping some iterations altogether.
    Higher-order functions on arrays that return new data such as map will be normal
    arrays of type `Element`.'
  trans: "\n# AsyncSequence 简介\n\n`AsyncSequence` 的行为与序列（Sequence）几乎一致。你可以对序列执行的所有操作几乎都能对它执行，从迭代到应用高阶函数。它与\
    \ `Sequence` 有一个关键区别：`AsyncSequence` 本身不存储任何值。它不像数组那样将数据存储在内存中。严格来说，它也不是一个值生成器。相反，`AsyncSequence`\
    \ 只是一个接口，允许你在值随时间就绪时，立即访问它们。这些值是异步发出的，因此当它们可用时，你需要使用 `await` 来等待它们。\n\n实际上，我们之前已经使用过\
    \ `AsyncSequence`。回到第 5 章，当时我们在讨论结构化并发时，学习了任务组。任务组允许我们运行数量不定的并发任务，并在一个使用了 `await`\
    \ 的循环中观察它们的结果。回顾一下，代码清单 9-1 是我们当时使用的原始示例之一。\n\n```\n/// 下载数组中的所有图像，并返回本地文件的 URL\
    \ 数组\nfunc download(serverImages: [ServerImage]) async throws -> [URL] {\n   \
    \ var urls: [URL] = []\n    try await withThrowingTaskGroup(of: URL.self) { group\
    \ in\n        for image in serverImages {\n            group.addTask(priority:\
    \ .userInitiated) {\n                let imageUrl = try await self.download(image)\n\
    \                return imageUrl\n            }\n        }\n        for try await\
    \ imageUrl in group {\n            urls.append(imageUrl)\n        }\n    }\n \
    \   return urls\n}\n代码清单 9-1\n任务组使用 AsyncSequence 传递其结果\n```\n\n请注意 `\"for try\
    \ await...\"` 这部分。这个 `for` 循环正在使用一个 `AsyncSequence`。我们不知道这个 `AsyncSequence` 的具体类型。我们只知道任务组正在运行数量不定的任务，并且随着它们完成，它们会向这个循环传递一个\
    \ `URL` 对象。在组中启动的每个任务完成下载之前，这些 `URL` 是不存在的。但这是如何实现的呢？为了理解 `AsyncSequence` 的工作原理，我们需要先了解序列的一般工作方式。\n\
    \n## 深入浅出序列与异步序列\n\n`for-in` 循环——以及由此引申出的高阶函数——期望有一个 `Sequence` 来工作。`Sequence`\
    \ 是一个带有一些约束的协议，感兴趣的类型必须采纳它。其中一个要求是实现一个返回迭代器的 `makeIterator()` 方法。理解迭代器对于理解序列工作原理的基础并非必不可少，因此现在你只需要知道，迭代器是遵循\
    \ `IteratorProtocol` 协议的类型，而该协议要求实现一个名为 `next()` 的方法，该方法返回序列泛型类型 `Element` 的可选实例。换句话说，如果你的序列是一个\
    \ `Int` 数组，`next()` 方法将返回一个可选的 Int（`Int?`）。在迭代过程中，循环的每次运行时都会调用此方法，直到没有更多元素可返回（直到它返回\
    \ `nil`）。\n\n假设你有代码清单 9-2 中的数组，并且你对其迭代，在每次迭代中打印一个值。\n\n```\nlet myArray = [1,\
    \ 2, 3, 4, 5]\nfor item in myArray {\n    print(item)\n}\n代码清单 9-2\n声明一个数组并迭代它\n\
    ```\n\n这个 `for-in` 循环将运行 5 个元素，在每次迭代中，局部变量 `item` 将存储由 `next() -> Int?` 返回的一个值。一旦集合返回\
    \ `nil`，迭代就会停止，代码将开始在循环下方执行。简而言之，`for-in` 迭代仅仅是得益于 `Sequence` 符合性而提供的语法糖。\n\n\
    AsyncSequence 并没有那么不同。主要区别在于，它们没有 `makeIterator` 方法，而是有一个 `makeAsyncIterator`\
    \ 方法，正如你可能已经猜到的那样，该方法返回一个遵循 `AsyncIteratorProtocol` 协议的迭代器。该迭代器要求你实现一个 `next()\
    \ async -> Element?` 方法。因为 `next` 方法是 `async` 的，我们可以在 `for-in` 循环和高阶函数中使用它。\n\n\
    因此，Sequence 和 AsyncSequence 非常相似。主要区别在于，Sequence 确实存储其数据，而 AsyncSequence 则随时间从异步源传递数据；并且底层协议分别是非异步和异步的，以支持各自的功能。\n\
    \n## AsyncSequence 具体类型\n\n有多种类型遵循 `AsyncSequence`。通常，你不需要关心底层类型，但了解这一点很有趣，因为这也与普通\
    \ Sequence 的操作方式不同。\n\n每当你在 AsyncSequence 上调用高阶函数时，例如 `drop(while:)`、`filter`、`map`\
    \ 和 `reduce`，都会返回一个全新的遵循 AsyncSequence 的类型。\n\n如果你在异步序列上调用 `drop(while:)`，你将得到一个\
    \ `AsyncThrowingDropWhileSequence` 或 `AsyncDropWhileSequence`；使用 `filter` 将返回一个\
    \ `AsyncThrowingFilterSequence` 或 `AsyncFilterSequence`，以此类推，适用于你所执行的任何其他高阶函数。它们数量太多，无法一一列举，但你应该明白了。它们可以毫无问题地链式调用。当数组被改变时，普通序列会返回一个\
    \ `ArraySlice<Element>`，因为数组切片是被返回元素的“窗口”，它不包含新数据的副本，只是“查看”新数组中应包含的元素。由于 AsyncSequence\
    \ 不包含数据，在原始序列上拥有“窗口”是没有意义的。相反，这些类型将限制或改变每次迭代中传递的内容，并完全跳过某些迭代。在返回新数据（如 `map`）的数组上的高阶函数，将返回普通的\
    \ `Element` 类型数组。\n"
- fmt: '# AsyncSequence Example


    While we have used `AsyncSequences` before, I have prepared an example that does
    not rely on task groups. Instead, we will use the new `lines` property of the
    `URL` object which opens a file, and reads it line by line, returning a single
    line on each iteration.


    The following example reads a real URL which returns some data. For reference,
    the file we will read line by line is in Listing [9-3](#532302_1_En_9_Chapter.xhtml#PC3).


    ```

    The Legend of Zelda: Ocarina of Time|1998|10

    The Legend of Zelda: Majora''s Mask|2000|10

    The Legend of Zelda: The Wind Waker|2003|10

    Tales of Vesperia|2008|8

    Tales of Graces|2011|9

    Tales of the Abyss|2006|10

    Tales of Xillia|2013|10

    Listing 9-3

    A file we will read line by line

    ```


    We have a file very similar to a CSV file. When parsing it, we will create different
    kinds of `Videogame` objects that each have a title, release year, and score.


    Each line will be parsed into a `Videogame` object, which is in Listing [9-4](#532302_1_En_9_Chapter.xhtml#PC4).


    ```

    Struct Videogame {

    let title: String

    let year: Int?

    let score: Int?

    init(rawLine: String) {

    let splat = rawLine.split(separator: "|")

    self.title = String(splat[0])

    self.year = Int(splat[1])

    self.score = Int(splat[2])

    }

    }

    Listing 9-4

    A new Videogame object

    ```


    Now let’s get to the interesting part. Listing [9-5](#532302_1_En_9_Chapter.xhtml#PC5)
    will oversee loading the videogames from a webserver, and it will parse the whole
    file in an array of `Videogame`s.


    ```

    Func loadVideogames() async {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/tutorials/async-await/part11/videogames.csv")!

    var videogames: [Videogame] = []

    do {

    for try await videogameLine in url.lines {

    if rawVg.contains("|") {

    // Valid videogame

    videogames += [Videogame(rawLine: videogameLine)]

    }

    }

    } catch {

    // Handle the error

    }

    }

    Listing 9-5

    Reading a file from a server line by line

    ```


    We begin this function by declaring a URL pointing to the location of the file.
    Then, we declare an empty `[Videogame]` array where we will append each new videogame
    as it becomes available.


    The `for-in` loop waits for lines (`videogameLine`) which are of type `String`.
    This is because `url.lines` is an `AsyncSequence`, and we have to `await` on it.


    Each time we get a `videogameLine`, we will check if it contains the pipe character
    `|`, and if it does, we will create a new videogame by passing this raw line to
    the `Videogame` initializer. The `Videogame` initializer will parse this line
    and create a `Videogame` instance on each iteration, which will be appended to
    the `videogames` array.


    We need to do this within a `do-catch` block, because our file is in a remote
    server and an error may occur anytime.


    If you have been programming in Swift for a while, you have no doubt noticed that
    we can create prettier code here. By using higher-order functions on `url.lines`,
    we can create more idiomatic code and make this more elegant.


    In Listing [9-6](#532302_1_En_9_Chapter.xhtml#PC6), we have a new implementation
    for `loadVideogames`, which will use higher-order functions.


    ```

    Func loadVideogames() async {

    let url = URL(string: "https://www.andyibanez.com/fairesepages.github.io/tutorials/async-await/part11/videogames.csv")!

    let videogames =

    url

    .lines

    .filter { $0.contains("|") }

    .map { Videogame(rawLine: $0) }

    do {

    for try await videogame in videogames {

    print("\(videogame.title) (\(videogame.year ?? 0))")

    }

    } catch {

    }

    }

    Listing 9-6

    Using higher-order functions to create the videogames array

    ```


    Now, unlike normal sequences, the videogames array is not going to be there instantly.
    If `lines` were a non-async collection, videogames would ultimately be an array
    of `Videogame`s – `[Videogame]` or `Array<Videogame>`.


    Because `lines` is an async sequence, our videogames variable will not be of type
    `[Videogame]`. Instead, it will be of type `AsyncMapSequence<AsyncFilterSequence<AsyncLineSequence<URL.AsyncBytes>>,
    Videogame>`.


    This is the reason I said you don’t generally concern yourself with the underlying
    type of an `AsyncSequence`, but while this signature looks complicated, it’s easy
    to understand. Going from last to first in the higher-order functions that created
    the videogames variable:


    1. We got the `AsyncMapSequence` from calling `map()`.

    2. We got the `AsyncFilterSequence` by calling `filter()`.

    3. We got the `AsyncLineSequence`, which is the type of the `lines` property of
    `URL`.


    Unlike normal `Sequence`s, the filter-map operation does not "kickstart" immediately
    upon declaration. Instead, we get a concrete type for an `AsyncSequence` that
    we must later feed to a `for-in` loop. `AsyncSequences` will never "start" until
    they are used in a `for-in` loop. When you are building and chaining your async
    sequences, you are simply building a long instruction set that a loop will later
    use to deliver its data over time. You can think of it as a "query" that tells
    the loop what it should deliver as data becomes available.


    If you use the same async sequence in another loop, you will get the data instantly,
    because it will be cached. `AsyncSequences` will never run multiple times getting
    the data from the async source, as it would be very inefficient.


    So, Listing [9-6](#532302_1_En_9_Chapter.xhtml#PC6) will run synchronously without
    an issue until it hits the loop itself. As the async sequence is executed, it
    may suspend multiple times for each iteration, getting the data from an asynchronous
    source.


    As you play around with `AsyncSequence`, you will discover it has some more limitations
    compared to normal `Sequence`s. First, you cannot get the `count` of elements
    on `videogames`. This is because the variable is not storing data – as we said,
    it''s just a "query" of sorts that tells a `for-in` loop what it should return
    on each iteration. You necessarily need to execute the sequence in a `for-in`
    loop to be able to figure out its `count`. Next, not all higher-order functions
    that would expect to see from normal sequences are available. `dropFirst` is an
    example.


    Because `await`ed loops can be treated like normal loops, you can do anything
    you can do in such loops, including using `continue` and `break` statements to
    alter the execution of the loop. Listing [9-7](#532302_1_En_9_Chapter.xhtml#PC7)
    makes use of the `continue` statement to only print videogames with a score of
    10.


    ```

    For try await videogame in videogames {

    if videogame.score == 10 {

    continue

    }

    print("\(videogame.title) (\(videogame.year ?? 0))")

    }

    Listing 9-7

    Using continue statements in awaited loops

    ```


    In this specific example, we could just add a new `filter` call to the `videogames`
    variable. This would return only the videogames with a score of 10 without having
    to use the `continue` statement in the loop. Listing [9-8](#532302_1_En_9_Chapter.xhtml#PC8)
    has the required changes to eliminate the `continue` statement.


    ```

    Let videogames =

    url

    .lines

    .filter { $0.contains("|") }

    .map { Videogame(rawLine: $0) }

    .filter { $0.score != 10 } // Apply the filter here

    do {

    for try await videogame in videogames {

    print("\(videogame.title) (\(videogame.year ?? 0))")

    }

    } catch {

    }

    Listing 9-8

    Calling more higher-order functions on the videogames library

    ```'
