    # Preface


    Concurrency is a topic a lot of developers find scary. And for good reason. Concurrency
    is probably one of the most complicated topics in the world of programming. When
    you look at it from a very high level, concurrency allows us to do a lot of work
    at the same time. Sometimes related, sometimes unrelated. The definition is simple,
    but as a programmer, it is hard to reason about concurrent programs. We learn
    to write code that can be read from top to bottom, and code usually makes sense
    when you read it in such a manner. In fact, the way developers reason about code
    is not too different to how non-programmers reason about a cooking recipe. Humans
    can understand anything they read if it is structured and makes sense.


    But the very nature of concurrency breaks this top-to-bottom reading flow. Not
    only do we need to reason about concurrency differently, but we also need to keep
    in mind other factors that make it harder, such as shared mutable data, locks,
    threads…. Concurrency is naturally very complicated, especially when dealing with
    lower-level tools.


    Luckily, the new `async`/`await` system, introduced in 2021, makes concurrency
    easier to reason about because it abstracts a lot of the complexity behind language-integrated
    features that are easy to use and hard to misuse. If you have written concurrent
    code before with anything other than `async`/`await` in any other platform (and
    that includes but is not limited to iOS, macOS, and other Apple platforms), you
    do not have to concern yourself with mutexes, semaphores, or any other low-level
    concurrency primitives. If you have never written concurrent code before, you
    can write amazing multithreaded software in a way that makes sense without ever
    having to concern yourself with the complexities of traditional concurrency. This
    new system is very powerful and easy to use for both developers familiar with
    concurrency as well as those who have never written concurrent code before.


    ## Who This Book Is For


    This book is aimed at intermediate iOS developers and above. You should find this
    book to be of your skill level if you have been writing Apple apps a bit over
    a year. Having experience with other concurrency tools in either Apple platforms
    or anything else may help you grasp this book easier, but previous concurrency
    knowledge is by no means necessary. You should be familiar with the basic process
    of writing and maintaining an iOS app to take advantage of this book.


    ## How This Book Is Organized


    I tried my best to organize this book in a way that makes sense. There were topics
    that recursively required the knowledge of other topics before they could be properly
    understood. For those situations, I spent a little bit more time explaining some
    concepts at a higher level so you could get by before they got properly introduced.


    **Chapter** [**1**](#532302_1_En_1_Chapter.xhtml) introduces concurrency and its
    traditional problems when trying to implement it. It discusses low-level concurrency
    primitives and how they can be used. It also discusses the traditional problems
    you will find when you try to implement a concurrency system without using higher-level
    tools such as `async`/`await`.


    **Chapter** [**2**](#532302_1_En_2_Chapter.xhtml) formally introduces `async`
    and `await` as keywords of the Swift language. These two keywords are essential
    to understand to use the concurrency system effectively. Every single topic makes
    use of `async`/`await`, so this chapter is completely dedicated to these keywords.


    **Chapter** [**3**](#532302_1_En_3_Chapter.xhtml) introduces Continuations, a
    tool that helps you migrate closure-based or even delegate-based code to use `async`/`await`.
    This can help you "bridge" such code into the `async`/`await` world, making them
    easier to write and understand. You will also learn how to backport concurrent
    code to iOS 14 and 13.


    **Chapter** [**4**](#532302_1_En_4_Chapter.xhtml) introduces the concept of Structured
    Concurrency. You will write your first concurrent code here. Structured concurrency
    helps you write multithreaded code that is easy to read and write.


    **Chapter** [**5**](#532302_1_En_5_Chapter.xhtml) introduces the concept of Unstructured
    Concurrency, a topic that will help you write streamlined concurrent code with
    a little bit more of flexibility than Structured Concurrency.


    **Chapter** [**6**](#532302_1_En_6_Chapter.xhtml) introduces the concept of Actors.
    Actors are reference types that isolate their own state, so they are useful when
    you need to write concurrent code that deals with shared mutable state. It helps
    you answer questions such as "What happens if two processes write to this variable
    at the same time?"


    **Chapter** [**7**](#532302_1_En_7_Chapter.xhtml) is all about Sendable types,
    which are objects that can be used safely in concurrent code, either because they
    have built-in protection (such as actors) or because the developers took special
    care of these types to make them usable concurrently (like classes that implement
    their own synchronization mechanism).


    **Chapter** [**8**](#532302_1_En_8_Chapter.xhtml) discusses Global Actors, a tool
    to help you write concurrent code that is spread out across different files and
    even frameworks. It also discusses the Main Actor, a global actor that you use
    when you need to update your app''s UI.


    **Chapter** [**9**](#532302_1_En_9_Chapter.xhtml) is all about async sequences.
    These sequences can help you receive values over time in an asynchronous context,
    helping you eliminate the usage of closures and delegates in some scenarios.


    **Chapter** [**10**](#532302_1_En_10_Chapter.xhtml), the final chapter, covers
    the usage of a property wrapper called `@TaskLocal`, which you can use to share
    data down a concurrent tasks tree.'
