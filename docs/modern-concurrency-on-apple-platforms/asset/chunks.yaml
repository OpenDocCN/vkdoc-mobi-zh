- fmt: "# The Task Tree\n\nThe new concurrency system in Swift is driven by an underlying\
    \ structure called the task tree. Like the name states, the task tree gives us\
    \ a mental model of how concurrency works behind the scenes. This task tree dictates\
    \ how your tasks are going to run in relation to others. It also controls how\
    \ data is inherited to child tasks. Earlier, we mentioned that a task inherits\
    \ the actor, priority, and task local variables from the task that launched it.\
    \ This is thanks to the task tree. Tasks spawn child tasks and these child tasks\
    \ inherit all these attributes from their parents.\n\nTo better understand this\
    \ concept, let’s explore with some of the code we have written previously. Listing\
    \ [5-13](#532302_1_En_5_Chapter.xhtml#PC13) brings back a function we had in the\
    \ `async let` version of our Social Media App.\n\n```\nfunc fetchData() async\
    \ throws -> (userInfo: UserInfo, followingFollowersInfo: FollowerFollowingInfo)\
    \ {\nlet userApi = UserAPI()\nasync let userInfo = userApi.fetchUserInfo()\nasync\
    \ let followers = userApi.fetchFollowingAndFollowers()\nreturn (try await userInfo,\
    \ try await followers)\n}\nListing 5-13\nAsynchronously fetching data from a server\n\
    ```\n\nThis code has two `async let` calls that retrieve the user info and followers\
    \ info, respectively. Because they are `async let`, the system will try to run\
    \ them concurrently.\n\nIntuitively, you may think that each `async let` call\
    \ launches a new task implicitly, but this is not the case. Each `async let` call\
    \ will launch a new *child* task. The distinction is important because `Task`s\
    \ can only be created explicitly.\n\nEach child task will inherit the information\
    \ we received earlier from the parent (in this case, the parent is the `fetchData()`\
    \ function itself) – actor, priority, and local variables. When you create `Task`\
    \ within another `Task`, it will also inherit the parent `Task`’s attributes,\
    \ but unlike implicit tasks, you can tweak it a bit according to your necessities,\
    \ like spawning it with a different priority. Nested tasks are not child tasks,\
    \ strictly speaking.\n\nIf you were to draw the `fetchData()` task as a tree,\
    \ it would look like Figure [5-3](#532302_1_En_5_Chapter.xhtml#Fig3).\n\n![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig3_HTML.png)\n\
    \nA flow diagram depicts the visual representation with `fetchData`, `userApi.fetchUserInfo()`,\
    \ and `userApi.fetchFollowingAndFollowers()`.\n\nFigure 5-3  \nA visual representation\
    \ of a task tree\n\nWhen `fetchData` is executed, the same task is used to launch\
    \ `fetchUserInfo` and `fetchFollowingAndFollowers`. This needs to be repeated\
    \ and it’s very important you don’t forget. **Tasks are always created explicitly**.\
    \ Unless we manually make those calls wrapped within a `Task`, they will be run\
    \ under the same `Task`. One task can run multiple concurrent child tasks, with\
    \ the same actor, priority, and task local variables.\n\nAnother important aspect\
    \ of the task tree you need to consider is that **a parent task can only finish\
    \ its work when all its children have finished their work**. Even if such termination\
    \ is not successful (i.e., an error is thrown), it’s still a termination, and\
    \ a task can be completed when such abnormal situations occur.\n\nThere are two\
    \ other aspects that are also governed by the task tree. They are important enough\
    \ to warrant their own sections: Error propagation and task cancellation.\n\n\
    ## Error Propagation\n\nLet’s go back to the `fetchData` tree. `fetchData` itself\
    \ can throw, and so can all the child tasks it spawns. Suppose an error occurs\
    \ in `fetchUserInfo`. If the function throws an error, execution of the function\
    \ will end at that point, throw the error up to the caller, and it will not execute\
    \ anything underneath the point the error took place. So far, that’s exactly what\
    \ would happen if we weren’t using the new concurrency system at all. That’s how\
    \ error propagation works in Swift (and in many other programming languages, in\
    \ fact).\n\nBut when we are working with the new concurrency system, things are\
    \ not so straightforward. Sure, `fetchUserInfo` could throw an error, but `fetchFollowingAndFollowers`\
    \ could complete normally and return an expected value.\n\nIf an error is thrown,\
    \ it will be propagated up the task tree until it reaches the caller. Any other\
    \ child tasks that are either awaiting or running concurrently will be marked\
    \ as cancelled."
  raw: '## The Task Tree


    The new concurrency system in Swift is driven by an underlying structure called
    the task tree . Like the name states, the task tree gives us a mental model of
    how concurrency works behind the scenes. This task tree dictates how your tasks
    are going to run in relation to others. It also controls how data is inherited
    to child tasks. Earlier, we mentioned that a task inherits the actor, priority,
    and task local variables from the task that launched it. This is thanks to the
    task tree. Tasks spawn child tasks and these child tasks inherit all these attributes
    from their parents.


    To better understand this concept, let’s explore with some of the code we have
    written previously. Listing [5-13](#532302_1_En_5_Chapter.xhtml#PC13) brings back
    a function we had in the `async let` version of our Social Media App.


    ```

    func fetchData() async throws -> (userInfo: UserInfo, followingFollowersInfo:
    FollowerFollowingInfo) {

    let userApi = UserAPI()

    async let userInfo = userApi.fetchUserInfo()

    async let followers = userApi.fetchFollowingAndFollowers()

    return (try await userInfo, try await followers)

    }

    Listing 5-13

    Asynchronously fetching data from a server

    ```


    This code has two `async let` calls that retrieve the user info and followers
    info, respectively. Because they are `async let` , the system will try to run
    them concurrently.


    Intuitively, you may think that each `async let` call launches a new task implicitly,
    but this is not the case. Each `async let` call will launch a new *child* task.
    The distinction is important because `Task`s can only be created explicitly.


    Each child task will inherit the information we received earlier from the parent
    (in this case, the parent is the `fetchData()` function itself) – actor, priority,
    and local variables. When you create `Task` within another `Task`, it will also
    inherit the parent `Task`’`s` attributes, but unlike implicit tasks, you can tweak
    it a bit according to your necessities, like spawning it with a different priority.
    Nested tasks are not child tasks, strictly speaking.


    If you were to draw the `fetchData()` task as a tree, it would look like Figure
    [5-3](#532302_1_En_5_Chapter.xhtml#Fig3).


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig3_HTML.png)


    A flow diagram depicts the visual representation with fetchData, userApi dot fetchUserInfo,
    and userApi dot fetchFollowingandFollowers.


    Figure 5-3


    A visual representation of a task tree


    When `fetchData` is executed, the same task is used to launch `fetchUserInfo`
    and `fetchFollowingAndFollowers`. This needs to be repeated and it’s very important
    you don’t forget. ***Tasks*** ***are always created explicitly***. Unless we manually
    make those calls wrapped within a `Task`, they will be run under the same `Task`.
    One task can run multiple concurrent child tasks, with the same actor, priority,
    and task local variables.


    Another important aspect of the task tree you need to consider is that ***a parent
    task can only finish its work when all its children have finished their work***.
    Even if such termination is not successful (i.e., an error is thrown), it’s still
    a termination, and a task can be completed when such abnormal situations occur.


    *There are two other aspects that are also governed by the task tree* . *They
    are important enough to warrant their own sections: Error propagation and task
    cancellation.*


    ### Error Propagation


    Let’s go back to the `fetchData` tree . `fetchData` itself can throw, and so can
    all the child tasks it spawns. Suppose an error occurs in `fetchUserInfo`. If
    the function throws an error, execution of the function will end at that point,
    throw the error up to the caller, and it will not execute anything underneath
    the point the error took place. So far, that’s exactly what would happen if we
    weren’t using the new concurrency system at all. That’s how error propagation
    works in Swift (and in many other programming languages, in fact).


    But when we are working with the new concurrency system, things are not so straightforward.
    Sure, `fetchUserInfo` could throw an error, but `fetchFollowingAndFollowers` could
    complete normally and return an expected value.


    If an error is thrown, it will be propagated up the task tree until it reaches
    the caller. Any other child tasks that are either awaiting or running concurrently
    will be marked as cancelled.'
  trans: "  \n# 任务树  \n\nSwift 中的新并发系统由一种名为“任务树”的底层结构驱动。顾名思义，任务树为我们提供了理解并发运行背后机制的心智模型。任务树决定了你的任务之间如何关联运行，同时控制着数据如何被子任务继承。前面我们提到，任务会从启动它的任务中继承参与者（actor）、优先级以及任务本地变量。这要归功于任务树。任务会生成子任务，而这些子任务会从父任务处继承所有这些属性。\
    \  \n\n为了更好地理解这个概念，让我们借助之前编写的一些代码来探索。代码清单 5-13 展示了我们在社交媒体应用 `async let` 版本中使用过的一个函数。\
    \  \n\n```\nfunc fetchData() async throws -> (userInfo: UserInfo, followingFollowersInfo:\
    \ FollowerFollowingInfo) {\nlet userApi = UserAPI()\nasync let userInfo = userApi.fetchUserInfo()\n\
    async let followers = userApi.fetchFollowingAndFollowers()\nreturn (try await\
    \ userInfo, try await followers)\n}\n代码清单 5-13  \n异步从服务器获取数据  \n```  \n\n这段代码中有两个\
    \ `async let` 调用，分别用于获取用户信息和关注者信息。由于使用了 `async let`，系统会尝试让它们并发运行。  \n\n直觉上你可能认为每个\
    \ `async let` 调用都隐式启动了一个新任务，但事实并非如此。每个 `async let` 调用会启动一个新的**子**任务。区分这一点很重要，因为\
    \ `Task` 只能显式创建。  \n\n每个子任务都会继承父任务（此处指 `fetchData()` 函数本身）的参与者、优先级和局部变量。当你在一个\
    \ `Task` 内部创建另一个 `Task` 时，它同样会继承父 `Task` 的属性。但与隐式任务不同的是，你可以根据需求对其进行调整，例如以不同的优先级启动它。严格来说，嵌套任务并非子任务。\
    \  \n\n如果要把 `fetchData()` 任务画成一棵树，它看起来会像图 5-3 所示。  \n\n![](img/532302_1_En_5_Fig3_HTML.png)\
    \  \n\n一个流程示意图，展示了 `fetchData`、`userApi.fetchUserInfo()` 和 `userApi.fetchFollowingAndFollowers()`\
    \ 的可视化表示。  \n\n**图 5-3**  \n任务树的可视化表示  \n\n当 `fetchData` 执行时，同一个任务会被用来启动 `fetchUserInfo`\
    \ 和 `fetchFollowingAndFollowers`。这一点需要反复强调，请务必记住：**任务始终是显式创建的**。除非我们手动将这些调用包装在\
    \ `Task` 中，否则它们将在同一个 `Task` 下运行。一个任务可以运行多个并发子任务，这些子任务共享相同的参与者、优先级和任务本地变量。  \n\n\
    关于任务树，你需要考虑的另一个重要方面是：**父任务必须在其所有子任务都完成工作后才能结束自身工作**。即使这种终止并不成功（例如抛出了错误），它仍然是一种终止，并且任务可以在发生此类异常情况时完成。\
    \  \n\n任务树还控制着另外两个方面。它们非常重要，值得单独用章节来阐述：错误传播和任务取消。  \n\n## 错误传播  \n\n让我们回到 `fetchData`\
    \ 树。`fetchData` 本身可能抛出错误，它生成的所有子任务也可能抛出错误。假设 `fetchUserInfo` 中发生了错误。如果该函数抛出错误，函数执行将在该点终止，将错误向上传递给调用方，并且不会执行错误发生点之后的任何代码。到目前为止，如果我们完全没有使用新的并发系统，情况也会完全一样。这就是\
    \ Swift（实际上也是许多其他编程语言）中错误传播的工作原理。  \n\n但当我们使用新的并发系统时，事情就没那么简单了。当然，`fetchUserInfo`\
    \ 可能抛出错误，但 `fetchFollowingAndFollowers` 可能正常完成并返回预期值。  \n\n如果抛出了错误，它会沿着任务树向上传播，直到到达调用方。任何正在等待或并发运行的其他子任务都将被标记为已取消。\
    \  \n"
- fmt: "### Task Cancellation\n\nTask cancellation is very important, yet it does\
    \ not work like you would expect at first glance. If you reread the last sentence\
    \ in the previous paragraph, you will notice that we said that the tasks \"will\
    \ be *marked* as cancelled.\"\n\nWith this new concurrency system, task cancellation\
    \ is cooperative. Cancelling a task simply means that you are notifying it that\
    \ you intend it to be cancelled. It is up to the task to actually find an appropriate\
    \ time to cancel itself, and you need to implement this logic by yourself. The\
    \ reason task cancellation is cooperative is because there are sensitive yet important\
    \ tasks that may not be acceptable to forcefully stop their execution. If you\
    \ are writing data to a database, or you are modifying a user file in a concurrent\
    \ task, abruptly cancelling it can lead to user data corruption (and many 1-star\
    \ reviews).\n\nWhen a `Task` is cancelled, it also marks any children subtasks\
    \ as cancelled, attempting to ensure no unnecessary work will be done.\n\nTo explain\
    \ this concept better, I have provided a project, \"Chapter [5](#532302_1_En_5_Chapter.xhtml)\
    \ – Counter App\" that we will work through.\n\nWhen you launch the app, you will\
    \ see a simple button, as seen in Figure [5-4](#532302_1_En_5_Chapter.xhtml#Fig4).\n\
    \n![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig4_HTML.jpg)\n\nA screenshot\
    \ represents a mobile screen with start counting on it along with time, cellular,\
    \ and battery symbols on the top.\n\nFigure 5-4\n\nA simple UI with a button to\
    \ start a counter\n\nTapping the button will start showing the numbers 1 to 10\
    \ and 11 to 20 getting printed in two different sections, at the same time. Figure\
    \ [5-5](#532302_1_En_5_Chapter.xhtml#Fig5) shows this action in progress.\n\n\
    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig5_HTML.jpg)\n\nA screenshot\
    \ represents a mobile screen with numbers 1, 2, 11, and 12 encircled separately,\
    \ cancel at the bottom, along with time, cellular, and battery symbols on the\
    \ top.\n\nFigure 5-5\n\nShowing numbers in the UI. The UI is updated every second\n\
    \nThe functions that output the numbers to draw are in Listing [5-14](#532302_1_En_5_Chapter.xhtml#PC14).\n\
    \n```swift\nfunc countFrom1To10() async throws -> Bool {\n    for i in (1...10)\
    \ {\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n        values1To10\
    \ += [i]\n    }\n    return true\n}\nfunc countFrom11To20() async throws -> Bool\
    \ {\n    for i in (11...20) {\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n\
    \        values11to20 += [i]\n    }\n    return true\n}\nListing 5-14\nThe methods\
    \ output the numbers to show in the UI\n```\n\nListing [5-15](#532302_1_En_5_Chapter.xhtml#PC15)\
    \ shows the method that launches these two functions asynchronously.\n\n```swift\n\
    func startCounting() {\n    isCounting = true\n    counterTask = Task {\n    \
    \    async let counter1To10DidFinish = countFrom1To10()\n        async let counter11To20DidFinish\
    \ = countFrom11To20()\n        do {\n            let _ = try await (counter1To10DidFinish,\
    \ counter11To20DidFinish)\n        } catch {\n            self.error = error\n\
    \        }\n    }\n}\nListing 5-15\nLaunching both counter methods asynchronously\n\
    ```\n\n`counterTask` is a variable of type `Task<Void, Never>`. Storing the task\
    \ in a variable will allow us to cancel it later, as seen in Listing [5-16](#532302_1_En_5_Chapter.xhtml#PC16).\n\
    \n```swift\nButton(\"Cancel\") {\n    viewModel.counterTask?.cancel()\n}\nListing\
    \ 5-16\nGiving the user manual control over the task\n```\n\nYou can see that\
    \ the `counterTask` variable acts as a parent task for `countFrom1to10` and `countFrom11to20`.\
    \ What do you think will happen when you tap the \"Cancel\" button? Will the number\
    \ stop printing altogether and the UI display the ones it managed to print? Will\
    \ it erase all the numbers? Feel free to take a minute to think about it.\n\n\
    But the right answer is neither of those options. The moment you tap the Cancel\
    \ button, all the numbers will be displayed in the UI instantly (unlike one number\
    \ at a time, like it had been doing) and the task will appear like it finished\
    \ without an issue. What's going on here?\n\n***Cancellation is cooperative***.\
    \ This means that the tasks will not be explicitly and automatically cancelled\
    \ by anyone. Earlier, we said that tasks are *marked as cancelled*. Cancellation\
    \ being cooperative means that tasks need to check their cancellation status and\
    \ cancel execution when it is appropriate. It is not correct to cancel tasks instantly,\
    \ because your code could be doing something essential that cannot be unexpectedly\
    \ interrupted. So instead of having someone else cancel your code, your code needs\
    \ to wait for an appropriate time to stop executing itself.\n\nTo check for cancellation,\
    \ you need to place cancellation checks where it makes sense to do so. Swift provides\
    \ you with the `Task.checkCancellation()` static method and the `Task.isCancelled`\
    \ static property. Use the former when you are within an async context that can\
    \ throw, and the latter when your context is not marked as `throws`.\n\nWith this\
    \ in mind, we now need our `countFrom1To10()` and `countFrom11To20()` methods\
    \ to check their cancellation status at some point and return when it makes sense.\
    \ One way we can do this is to place a check before we append the value to the\
    \ variable. Listing [5-17](#532302_1_En_5_Chapter.xhtml#PC17) shows how this is\
    \ done.\n\n```swift\nfunc countFrom1To10() async throws -> Bool {\n    for i in\
    \ (1...10) {\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n    \
    \    if Task.isCancelled { return false }\n        values1To10 += [i]\n    }\n\
    \    return true\n}\nListing 5-17\nAdding a task cancellation check to countFrom1To10()\n\
    ```\n\nIt would also be acceptable to add the check after you append the value\
    \ to the array. And even better, if it makes sense to have the cancellation check\
    \ in both places, you can do that too. Listing [5-18](#532302_1_En_5_Chapter.xhtml#PC18)\
    \ shows the method with some additional checks.\n\n```swift\nfunc countFrom1To10()\
    \ async throws -> Bool {\n    for i in (1...10) {\n        try? await Task.sleep(nanoseconds:\
    \ 1_000_000_000)\n        if Task.isCancelled { return false }\n        values1To10\
    \ += [i]\n        if Task.isCancelled { return false }\n    }\n    return true\n\
    }\nListing 5-18\nAdding additional cancellation checks\n```\n\nThere is no formula\
    \ to identify where the cancellation checks should go, but it is important that\
    \ you design your code with cancellation in mind, because you don't want consumers\
    \ of your code to have unnecessarily running operations. Many of Apple's async\
    \ methods are already accounting for cancellation. If you cancel a task that has\
    \ a `URLSession` data task running, for example, it will react to cancellations\
    \ automatically.\n\nIf you run the code now and tap the Cancel button, the first\
    \ numbers will stop printing in place, whereas the ones that go from 11 to 20\
    \ will still print to the end. Figure [5-6](#532302_1_En_5_Chapter.xhtml#Fig6)\
    \ shows this behavior in action.\n\n![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig6_HTML.jpg)\n\
    \nA screenshot represents a mobile screen with numbers 1, 11 to 20 encircled separately,\
    \ cancel at the bottom, along with time, cellular, and battery symbols on the\
    \ top.\n\nFigure 5-6\n\nOnly one task is checking for cancellation, therefore\
    \ cancellation is not working as expected\n\nBefore we fix `countFrom11to20`,\
    \ you may be wondering why exactly the numbers show up instantly when cancelling,\
    \ instead of showing one number per second like it does before the \"Cancel\"\
    \ button is tapped. The reason is that the `try? await Task.sleep(nanoseconds:\
    \ 1_000_000_000)` call has the error silenced with `try?`. The code was written\
    \ like this because the `sleep(nanoseconds:)` method actually throws an error\
    \ when the `Task` it's running on has been cancelled. Because the error is silenced,\
    \ the task doesn't sleep for one second, and the loop gets executed immediately.\
    \ Essentially, cancellation is an error that gets thrown, and you can catch it\
    \ and handle it differently than the others."
  raw: '### Task Cancellation


    Task cancellation is very important, yet it does not work like you would expect
    at first glance. If you reread the last sentence in the previous paragraph, you
    will notice that we said that the tasks “will be *marked* as cancelled.”


    With this new concurrency system, task cancellation is cooperative. Cancelling
    a task simply means that you are notifying it that you intend it to be cancelled.
    It is up to the task to actually find an appropriate time to cancel itself, and
    you need to implement this logic by yourself. The reason task cancellation is
    cooperative is because there are sensitive yet important tasks that may not be
    acceptable to forcefully stop their execution. If you are writing data to a database,
    or you are modifying a user file in a concurrent task, abruptly cancelling it
    can lead to user data corruption (and many 1-star reviews).


    When a Task is cancelled , it also marks any children subtasks as cancelled, attempting
    to ensure no unnecessary work will be done.


    To explain this concept better, I have provided a project, “Chapter [5](#532302_1_En_5_Chapter.xhtml)
    – Counter App” that we will work through.


    When you launch the app, you will see a simple button, as seen in Figure [5-4](#532302_1_En_5_Chapter.xhtml#Fig4).


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig4_HTML.jpg)


    A screenshot represents a mobile screen with start counting on it along with time,
    cellular, and battery symbols on the top.


    Figure 5-4


    A simple UI with a button to start a counter


    Tapping the button will start showing the numbers 1 to 10 and 11 to 20 getting
    printed in two different sections, at the same time. Figure [5-5](#532302_1_En_5_Chapter.xhtml#Fig5)
    shows this action in progress.


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig5_HTML.jpg)


    A screenshot represents a mobile screen with numbers 1, 2, 11, and 12 encircled
    separately, cancel at the bottom, along with time, cellular, and battery symbols
    on the top.


    Figure 5-5


    Showing numbers in the UI. The UI is updated every second


    The functions that output the numbers to draw are in Listing [5-14](#532302_1_En_5_Chapter.xhtml#PC14).


    ```

    func countFrom1To10() async throws -> Bool {

    for i in (1...10) {

    try? await Task.sleep(nanoseconds: 1_000_000_000)

    values1To10 += [i]

    }

    return true

    }

    func countFrom11To20() async throws -> Bool {

    for i in (11...20) {

    try? await Task.sleep(nanoseconds: 1_000_000_000)

    values11to20 += [i]

    }

    return true

    }

    Listing 5-14

    The methods output the numbers to show in the UI

    ```


    Listing [5-15](#532302_1_En_5_Chapter.xhtml#PC15) shows the method that launches
    these two functions asynchronously.


    ```

    func startCounting() {

    isCounting = true

    counterTask = Task {

    async let counter1To10DidFinish = countFrom1To10()

    async let counter11To20DidFinish = countFrom11To20()

    do {

    let _ = try await (counter1To10DidFinish, counter11To20DidFinish)

    } catch {

    self.error = error

    }

    }

    }

    Listing 5-15

    Launching both counter methods asynchronously

    ```


    `counterTask` is a variable of type `Task<Void, Never>`. Storing the task in a
    variable will allow us to cancel it later, as seen in Listing [5-16](#532302_1_En_5_Chapter.xhtml#PC16).


    ```

    Button("Cancel") {

    viewModel.counterTask?.cancel()

    }

    Listing 5-16

    Giving the user manual control over the task

    ```


    You can see that the `counterTask` variable acts as a parent task for `countFrom1to10`
    and `countFrom11to20`. What do you think will happen when you tap the “Cancel”
    button? Will the number stop printing altogether and the UI display the ones it
    managed to print? Will it erase all the numbers? Feel free to take a minute to
    think about it.


    But the right answer is neither of those options. The moment you tap the Cancel
    button, all the numbers will be displayed in the UI instantly (unlike one number
    at a time, like it had been doing) and the task will appear like it finished without
    an issue. What’s going on here?


    ***Cancellation is cooperative***. This means that the tasks will not be explicitly
    and automatically cancelled by anyone. Earlier, we said that tasks are *marked
    as cancelled*. Cancellation being cooperative means that tasks need to check their
    cancellation status and cancel execution when it is appropriate. It is not correct
    to cancel tasks instantly, because your code could be doing something essential
    that cannot be unexpectedly interrupted. So instead of having someone else cancel
    your code, your code needs to wait for an appropriate time to stop executing itself.


    To check for cancellation, you need to place cancellation checks where it makes
    sense to do so. Swift provides you with the `Task.checkCancellation()`static method
    and the `Task.isCancelled` static property . Use the former when you are within
    an async context that can throw, and the latter when your context is not marked
    as `throws`.


    With this in mind, we now need our countFrom1To10() and countFrom11To20() methods
    to check their cancellation status at some point and return when it makes sense.
    One way we can do this is to place a check before we append the value to the variable.
    Listing [5-17](#532302_1_En_5_Chapter.xhtml#PC17) shows how this is done.


    ```

    func countFrom1To10() async throws -> Bool {

    for i in (1...10) {

    try? await Task.sleep(nanoseconds: 1_000_000_000)

    if Task.isCancelled { return false }

    values1To10 += [i]

    }

    return true

    }

    Listing 5-17

    Adding a task cancellation check to countFrom1To10()

    ```


    It would also be acceptable to add the check after you append the value to the
    array. And even better, if it makes sense to have the cancellation check in both
    places, you can do that too. Listing [5-18](#532302_1_En_5_Chapter.xhtml#PC18)
    shows the method with some additional checks.


    ```

    func countFrom1To10() async throws -> Bool {

    for i in (1...10) {

    try? await Task.sleep(nanoseconds: 1_000_000_000)

    if Task.isCancelled { return false }

    values1To10 += [i]

    if Task.isCancelled { return false }

    }

    return true

    }

    Listing 5-18

    Adding additional cancellation checks

    ```


    There is no formula to identify where the cancellation checks should go, but it
    is important that you design your code with cancellation in mind, because you
    don’t want consumers of your code to have unnecessarily running operations. Many
    of Apple’s async methods are already accounting for cancellation. If you cancel
    a task that has a `URLSession` data task running, for example, it will react to
    cancellations automatically.


    If you run the code now and tap the Cancel button, the first numbers will stop
    printing in place, whereas the ones that go from 11 to 20 will still print to
    the end. Figure [5-6](#532302_1_En_5_Chapter.xhtml#Fig6) shows this behavior in
    action.


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig6_HTML.jpg)


    A screenshot represents a mobile screen with numbers 1, 11 to 20 encircled separately,
    cancel at the bottom, along with time, cellular, and battery symbols on the top.


    Figure 5-6


    Only one task is checking for cancellation, therefore cancellation is not working
    as expected


    Before we fix countFrom11to20 , you may be wondering why exactly the numbers show
    up instantly when cancelling, instead of showing one number per second like it
    does before the “Cancel” button is tapped. The reason is that the t`ry? await
    Task.sleep(nanoseconds: 1_000_000_000)` call has the error silenced with `try?`.
    The code was written like this because the `sleep(nanoseconds:)` method actually
    throws an error when the `Task` it’s running on has been cancelled. Because the
    error is silenced, the task doesn’t sleep for one second, and the loop gets executed
    immediately. Essentially, cancellation is an error that gets thrown, and you can
    catch it and handle it differently than the others.'
  trans: "\n### 任务取消\n\n任务取消非常重要，但其运作方式并不像你初看时以为的那样。如果你重新阅读上一节的最后一句话，你会注意到我们说的是任务\"\
    将被*标记为*已取消\"。\n\n在这个新的并发系统中，任务取消是协作式的。取消一个任务仅仅意味着你在通知它你希望它被取消。由任务自己来决定在何时以适当的方式实际取消自身，并且你需要自行实现这个逻辑。任务取消采用协作式的原因是，存在一些敏感且重要的任务，强行停止它们的执行可能是不可接受的。如果你正在向数据库写入数据，或者在一个并发任务中修改用户文件，突然取消它可能会导致用户数据损坏（以及大量的一星差评）。\n\
    \n当一个 `Task` 被取消时，它也会将任何子任务标记为已取消，以确保不会执行不必要的工作。\n\n为了更好地解释这个概念，我提供了一个我们将要逐步完成的项目：\"\
    第 5 章——计数器应用\"。\n\n当你启动这个应用时，你会看到一个简单的按钮，如图 5-4 所示。\n\n![](img/532302_1_En_5_Fig4_HTML.jpg)\n\
    \n一张截图展示了手机屏幕，上面显示着\"开始计数\"的文字，以及顶部的时间、蜂窝网络和电池图标。\n\n图 5-4\n\n一个简单的界面，带有一个用于启动计数器的按钮\n\
    \n点击按钮将开始在两个不同的区域同时打印数字 1 到 10 以及 11 到 20。图 5-5 展示了这一运行中的动作。\n\n![](img/532302_1_En_5_Fig5_HTML.jpg)\n\
    \n一张截图展示了手机屏幕，上面分别圈出了数字 1、2、11 和 12，底部有\"取消\"按钮，以及顶部的时间、蜂窝网络和电池图标。\n\n图 5-5\n\n\
    在界面中显示数字。界面每秒更新一次\n\n用于输出待绘制数字的函数位于代码清单 5-14 中。\n\n```swift\nfunc countFrom1To10()\
    \ async throws -> Bool {\n    for i in (1...10) {\n        try? await Task.sleep(nanoseconds:\
    \ 1_000_000_000)\n        values1To10 += [i]\n    }\n    return true\n}\nfunc\
    \ countFrom11To20() async throws -> Bool {\n    for i in (11...20) {\n       \
    \ try? await Task.sleep(nanoseconds: 1_000_000_000)\n        values11to20 += [i]\n\
    \    }\n    return true\n}\n代码清单 5-14\n这些方法输出要在界面中显示的数字\n```\n\n代码清单 5-15 展示了异步启动这两个函数的方法。\n\
    \n```swift\nfunc startCounting() {\n    isCounting = true\n    counterTask = Task\
    \ {\n        async let counter1To10DidFinish = countFrom1To10()\n        async\
    \ let counter11To20DidFinish = countFrom11To20()\n        do {\n            let\
    \ _ = try await (counter1To10DidFinish, counter11To20DidFinish)\n        } catch\
    \ {\n            self.error = error\n        }\n    }\n}\n代码清单 5-15\n异步启动两个计数方法\n\
    ```\n\n`counterTask` 是一个类型为 `Task<Void, Never>` 的变量。将任务存储在变量中，可以让我们稍后取消它，如代码清单\
    \ 5-16 所示。\n\n```swift\nButton(\"Cancel\") {\n    viewModel.counterTask?.cancel()\n\
    }\n代码清单 5-16\n给用户手动控制任务的能力\n```\n\n你可以看到，`counterTask` 变量充当了 `countFrom1to10`\
    \ 和 `countFrom11to20` 的父任务。你认为当你点击\"取消\"按钮时会发生什么？数字会完全停止打印，并且界面仅显示已成功打印出来的数字吗？它会清除所有数字吗？请花一分钟思考一下。\n\
    \n但正确答案并非这两种情况。在你点击取消按钮的那一刻，所有数字会立即显示在界面上（而不是像之前那样一次显示一个数字），并且任务看起来像是毫无问题地完成了。这到底是怎么回事？\n\
    \n***取消是协作式的***。这意味着任务不会被任何其他人明确地、自动地取消。之前，我们说任务被*标记为已取消*。取消是协作式的，意味着任务需要检查自身的取消状态，并在适当的时候取消执行。立即取消任务是不正确的，因为你的代码可能正在执行某些不能被意外中断的关键操作。因此，与其由其他人来取消你的代码，不如让你的代码等待一个合适的时机自行停止执行。\n\
    \n要检查取消状态，你需要将取消检查放置在合理的位置。Swift 为你提供了 `Task.checkCancellation()` 静态方法和 `Task.isCancelled`\
    \ 静态属性。当你处于一个可以抛出异常的异步上下文中时，使用前者；当你的上下文未被标记为 `throws` 时，使用后者。\n\n基于此，我们现在需要让 `countFrom1To10()`\
    \ 和 `countFrom11To20()` 方法在某个时刻检查自身的取消状态，并在适当时返回。一种实现方法是在我们将值追加到变量之前放置一个检查。代码清单\
    \ 5-17 展示了如何实现。\n\n```swift\nfunc countFrom1To10() async throws -> Bool {\n  \
    \  for i in (1...10) {\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n\
    \        if Task.isCancelled { return false }\n        values1To10 += [i]\n  \
    \  }\n    return true\n}\n代码清单 5-17\n向 countFrom1To10() 添加任务取消检查\n```\n\n将检查放在值追加到数组之后也是可以接受的。如果两个位置都放置取消检查是合理的，那甚至更好。代码清单\
    \ 5-18 展示了包含一些额外检查的方法。\n\n```swift\nfunc countFrom1To10() async throws -> Bool\
    \ {\n    for i in (1...10) {\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n\
    \        if Task.isCancelled { return false }\n        values1To10 += [i]\n  \
    \      if Task.isCancelled { return false }\n    }\n    return true\n}\n代码清单 5-18\n\
    添加额外的取消检查\n```\n\n并没有一个固定的公式来识别取消检查应放置的位置，但重要的是在设计代码时要将取消纳入考量，因为你希望代码的使用者不会让你的操作不必要地持续运行。苹果的许多异步方法已经考虑了取消。例如，如果你取消一个正在运行\
    \ `URLSession` 数据任务的任务，它会自动响应取消操作。\n\n如果你现在运行代码并点击\"取消\"按钮，前几个数字会停止在原地打印，而从 11\
    \ 到 20 的数字则会一直打印到结束。图 5-6 展示了这一运行中的行为。\n\n![](img/532302_1_En_5_Fig6_HTML.jpg)\n\
    \n一张截图展示了手机屏幕，上面分别圈出了数字 1 以及 11 到 20，底部有\"取消\"按钮，以及顶部的时间、蜂窝网络和电池图标。\n\n图 5-6\n\
    \n只有一个任务在检查取消状态，因此取消未能按预期工作\n\n在我们修复 `countFrom11to20` 之前，你可能想知道为什么点击取消时数字会立即显示出来，而不是像点击\"\
    取消\"按钮之前那样每秒显示一个数字。原因是，`try? await Task.sleep(nanoseconds: 1_000_000_000)` 调用中的错误通过\
    \ `try?` 被静默处理了。代码这样编写是因为当 `Task` 被取消时，`sleep(nanoseconds:)` 方法实际上会抛出一个错误。由于错误被静默处理，任务不会休眠一秒，循环会立即执行。本质上，取消是一个被抛出的错误，你可以捕获它并对其进行与其他错误不同的处理。\n"
- fmt: "为了提供协作任务取消的示例，我不得不静默错误并手动添加取消检查。通常，你可以预期新并发系统中的任何方法以及苹果自身的异步方法，在某个时刻已经执行了取消检查。如果你移除`try`后的问号，则可以避免在该特定方法中进行取消检查。\n\
    \n清单[5-19](#532302_1_En_5_Chapter.xhtml#PC19)修复了`countFrom11to20`方法。\n\n```swift\n\
    func countFrom11To20() async throws -> Bool {\n    for i in (11...20) {\n    \
    \    if Task.isCancelled { return false }\n        try? await Task.sleep(nanoseconds:\
    \ 1_000_000_000)\n        values11to20 += [i]\n        if Task.isCancelled { return\
    \ false }\n    }\n    return true\n}\n```\n清单 5-19 修复`countFrom11To20`方法\n\n现在，无论何时你点击“取消”按钮，数字将不会像我们添加取消检查之前那样从上到下打印。有趣的是，由于异步代码的特性，根据你取消的时机，你可能在\
    \ UI 中看到不同的输出。例如，应用尝试每秒打印两个数字（1和11，2和12等），但根据你取消的时机，你可能只得到一对中的一个数字。图[5-7](#532302_1_En_5_Chapter.xhtml#Fig7)展示了当我在显示第三对时取消任务所发生的情况。\n\
    \n![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig7_HTML.jpg)\n\n一张截图展示了一个移动屏幕，上面分别圈出了数字1、2、11、12和13，底部有“取消”按钮，顶部有时间、蜂窝网络和电池符号。\n\
    \n图 5-7 任务在同一时间被取消，但其中一个任务稍微领先于另一个\n\n### 任务取消与任务组\n\n理解使用任务组的结构化并发可能导致你的代码向调用者返回部分结果而非完整集合，这一点非常重要。思考清单[5-20](#532302_1_En_5_Chapter.xhtml#PC20)中的代码，它来自第[4](#532302_1_En_5_Chapter.xhtml)章的`ImageDownloader`项目。\n\
    \n```swift\nfunc download(serverImages: [ServerImage]) async throws -> [URL] {\n\
    \    var urls: [URL] = []\n    try await withThrowingTaskGroup(of: URL.self) {\
    \ group in\n        for image in serverImages {\n            group.addTask(priority:\
    \ .userInitiated) {\n                let imageUrl = try await self.download(image)\n\
    \                return imageUrl\n            }\n        }\n        for try await\
    \ imageUrl in group {\n            urls.append(imageUrl)\n        }\n    }\n \
    \   return urls\n}\n```\n清单 5-20 在任务组中下载多个图片\n\n如果你有10张图片要下载，并且在所有图片下载完成之前，`withThrowingTaskGroup`调用内部发生错误（或者你调用`group.cancelAll()`取消组），`urls`数组将包含一个部分结果，该结果仅包含在异常退出之前成功下载的图片。请确保记录此行为，因为你的代码的调用者可能未意识到这一点，并可能导致他们的程序出现意外行为。\n\
    \n## 使用分离任务的无结构化并发\n\n我们已经提到，任务树确保任务从其父任务继承一些属性，例如优先级、Actor和局部变量。完全有可能从另一个任务启动一个不继承其父任务任何属性的任务。这些任务被称为*分离任务*，当你需要并发，但这种并发并非严格相关时，它们非常有用。例如，从互联网下载图片可以是一个任务。你可能稍后想要将这些图片存储在本地缓存中。将图片存储在本地缓存的过程可以是一个分离任务，这样如果下载任务被取消但图片已下载，缓存保存操作将顺利进行而不会出现问题。\n\
    \n要启动一个分离任务，你只需使用`Task`的静态方法`detached`。清单[5-21](#532302_1_En_5_Chapter.xhtml#PC21)展示了如何创建一个。\n\
    \n```swift\nTask.detached(priority: .low) {\n    imageManager.writeImageToCache(image)\n\
    }\n```\n清单 5-21 创建分离任务\n\n从语法上讲，与标准任务相比没有太大区别，但在处理它们时，请务必注意任务树和继承属性。指定优先级是可选的，就像处理普通任务时一样。\n\
    \n## 总结\n\n本章详细讨论了无结构化并发和任务树。我们大量介绍了`Task`对象及其在创建并发时的行为。这种类型的并发称为无结构化并发，它赋予我们更多控制权，允许我们手动取消任务或将它们作为参数传递。\n\
    \n我们讨论了结构化并发如何与`Task`协同工作。我们提到，在`Task`内部调用异步方法会使这些方法成为父任务的子任务。这些子任务继承父任务的所有属性，包括优先级、Actor和局部变量。启动异步方法并不意味着它们在不同的任务中运行。任务始终使用`Task\
    \ {}`对象显式创建。\n\n我们还讨论了任务树以及它如何管理任务的执行。任务树为你提供了一个心智模型，帮助你理解子任务继承了哪些信息。此外，它还管理着取消是如何发生的。\n\
    \n我们了解到任务取消并非直截了当。“取消”一个任务仅仅意味着它将被标记为已取消，但任务自身负责寻找合适的时机来停止执行，因为强制停止异步代码可能对用户造成灾难性后果，例如数据损坏。我们还简要介绍了任务取消如何与任务组交互，以及它如何可能导致任务组返回部分结果，这可能是出乎意料的。\n\
    \n最后，我们讨论了分离任务，这是一种不继承父任务任何属性的无结构化并发形式。这些任务完全独立。\n\n## 练习\n\n### 改进项目\n\n下载“第[4](#532302_1_En_4_Chapter.xhtml)章\
    \ - `ImageDownloader`”项目并执行以下更改：\n\n1.  修改它，使其不再使用任务组下载图片。相反，它应该使用无结构化并发与`Task`来下载每张图片。提示：你可以创建一个名为`ServerImageView`的单独视图，并附带一个用于下载单张图片的视图模型。\n\
    2.  添加功能，如果用户点击“取消”按钮，允许他们取消独立的图片下载任务。\n3.  SwiftUI 包含一个名为`.task`的视图修饰符，它会在视图出现时执行其内容，并在视图消失时取消执行，本质上取代了`onAppear`和`onDisappear`修饰符的行为。使用它在占位视图（可以是`ProgressView`）出现时自动下载图片。\n\
    \n完成此练习后，你的程序应类似于图[5-8](#532302_1_En_5_Chapter.xhtml#Fig8)。\n\n![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig8_HTML.jpg)\n\
    \n一张截图展示了一个移动屏幕，上面有三个正在加载的图片，顶部有时间、蜂窝网络和电池符号。\n\n图 5-8 图片正在下载时显示的 UI\n\n如果你点击“取消”按钮（或者发生错误），UI\
    \ 应类似于图[5-9](#532302_1_En_5_Chapter.xhtml#Fig9)。\n\n![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig9_HTML.jpg)\n\
    \n一张截图展示了一个移动屏幕，上面有三个加载失败的图片，顶部有时间、蜂窝网络和电池符号。\n\n图 5-9 图片下载已被取消，或发生了其他错误\n\n当然，如果没有发生错误，图片应该像基础练习中那样正常显示。\n\
    \n你可以在“第[4](#532302_1_En_4_Chapter.xhtml)章 - `ImageDownloaderWithTask`”项目中找到我的解决方案。"
  raw: 'To provide an example of cooperative task cancellation , I had to silence
    the error and manually add the cancellation checks. In general, you can expect
    that any method of the new concurrency system is already checking for cancellation
    at some point, alongside Apple’s own async methods. You can avoid checking for
    cancellation in this specific method if you remove the question mark after the
    `try`.


    Listing [5-19](#532302_1_En_5_Chapter.xhtml#PC19) fixes the `countFrom11to20`
    method .


    ```

    func countFrom11To20() async throws -> Bool {

    for i in (11...20) {

    if Task.isCancelled { return false }

    try? await Task.sleep(nanoseconds: 1_000_000_000)

    values11to20 += [i]

    if Task.isCancelled { return false }

    }

    return true

    }

    Listing 5-19

    Fixing the countFrom11To20 method

    ```


    And now, whenever you tap the “Cancel” button , the numbers will not print from
    top to bottom like they were doing before we added the cancellation checks. It’s
    interesting to note that due to the nature of asynchronous code, you may see different
    outputs in the UI depending on when you cancel. For example, the app tries to
    print two numbers every second (1 and 11, 2 and 12, etc.), but depending on when
    you cancel you may get only one number of a pair. Figure [5-7](#532302_1_En_5_Chapter.xhtml#Fig7)
    shows what happened when I cancelled the task when it was showing the third pair.


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig7_HTML.jpg)


    A screenshot represents a mobile screen with numbers 1, 2, 11, 12, and 13 encircled
    separately, cancel at the bottom, along with time, cellular, and battery symbols
    on the top.


    Figure 5-7


    The tasks were cancelled at the same time, but one of them was slightly ahead
    of the other


    ### Task Cancellation and Task Groups


    It is very important to understand that structured concurrency with task groups
    can make your code return partial results to the caller instead of a complete
    collection. Consider the code in Listing [5-20](#532302_1_En_5_Chapter.xhtml#PC20),
    which is from the ImageDownloader project from Chapter [4](#532302_1_En_4_Chapter.xhtml).


    ```

    func download(serverImages: [ServerImage]) async throws -> [URL] {

    var urls: [URL] = []

    try await withThrowingTaskGroup(of: URL.self) { group in

    for image in serverImages {

    group.addTask(priority: .userInitiated) {

    let imageUrl = try await self.download(image)

    return imageUrl

    }

    }

    for try await imageUrl in group {

    urls.append(imageUrl)

    }

    }

    return urls

    }

    Listing 5-20

    Downloading multiple images in a Task Group

    ```


    If you have 10 images to download, and an error were to occur (or you cancel the
    group calling `group.cancelAll()`) within the `withThrowingTaskGroupCall` before
    all images are downloaded, the `URLs` array will contain a partial result consisting
    of only the images it managed to download before the unusual exit took place.
    Make sure you document this behavior, as callers to your code may not be aware
    of this and may cause their programs to have unexpected behavior.


    ## Unstructured Concurrency with Detached Tasks


    We have mentioned that the task tree ensures tasks inherit some properties from
    their parents such as priority, actor, and local variables. It is entirely possible
    to launch a task from another task that doesn’t inherit anything from its parent.
    These are called *Detached Tasks* , and they are useful when you need concurrency,
    but this concurrency is not strictly related. For example, downloading images
    from the internet could be one task. You may later want to store those images
    in a local cache. The process of storing the images in a local cache can be a
    detached task, that way if the task is cancelled but the image is downloaded,
    the cache-saving operation will proceed without an issue.


    To launch a detached task , you simply use the `detached` static method of task
    . Listing [5-21](#532302_1_En_5_Chapter.xhtml#PC21) shows how we can create one.


    ```

    Task.detached(priority: .low) {

    imageManager.writeImageToCache(image)

    }

    Listing 5-21

    Creating a detached task

    ```


    Syntactically, there’s not much difference when it comes to standard tasks but
    be aware of the task tree and inheritance properties when you work with them.
    Specifying the priority is optional, just like when working with normal tasks.


    ## Summary


    This chapter was packed with a discussion of unstructured concurrency and the
    task tree. We gave a lot of coverage to the Task object and how it behaves when
    it comes to creating concurrency. This type of concurrency is called unstructured
    concurrency , and it gives us more control, allowing us to cancel the tasks manually
    or passing them around as arguments.


    We talked about how structured concurrency works when used alongside `Task`s.
    We said that calling async methods within a Task will make the methods child tasks
    of the parent task. These child tasks inherit all the properties of the parent
    including priority, actor, and local variables. Launching async methods does not
    mean they run in a different task. Tasks are always explicitly created with the
    `Task {}` object.


    We also talked about the task tree and how it governs the execution of your tasks.
    The task tree gives you a mental model of what kind of information is being inherited
    by child tasks. Also, it governs how cancellation takes place.


    We learned that task cancellation is not straightforward. “Cancelling” a task
    simply means that will be marked as cancelled, but the tasks themselves are responsible
    for finding an appropriate time to stop execution, as forcefully stopping asynchronous
    code can have disastrous consequences for your users, such as data corruption.
    We also touched on how task cancellation works with task groups and how it can
    cause them to deliver partial results, which may be unexpected.


    Finally, we talked about detached tasks , which are a form of unstructured concurrency
    that don’t inherit anything from a parent task. These tasks are completely independent.


    ## Exercises


    Improve the Project


    Download the “Chapter [4](#532302_1_En_4_Chapter.xhtml) - ImageDownloader” project
    and do the following changes:


    1.  Change it so the images are no longer downloaded with a task group. Instead,
    it should use unstructured concurrency with Task to download each image. Hint:
    You can create a separate view, called ServerImageView, with an accompanying view
    model to download a single image.


    2.  Add the ability to let users cancel an independent image download task if
    they tap the “Cancel” button.


    3.  SwiftUI includes a view modifier called `.task`, which will execute its contents
    when a view appears, and it will cancel the execution when the view goes out of
    view, essentially replacing the behavior for the `onAppear` and `onDisappear`
    modifiers. Use it to automatically download an image when its placeholder view
    (which can be a `ProgressView`) appears.


    By the end of this exercise, your program should look similar to Figure [5-8](#532302_1_En_5_Chapter.xhtml#Fig8).


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig8_HTML.jpg)


    A screenshot depicts a mobile screen with three photos loading, along with time,
    cellular, and battery symbols on the top.


    Figure 5-8


    The UI that shows when images are downloading


    If you tap the “Cancel” button (or if an error occurs), the UI should look similar
    to Figure [5-9](#532302_1_En_5_Chapter.xhtml#Fig9).


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig9_HTML.jpg)


    A screenshot depicts a mobile screen with three error-loading photos, along with
    time, cellular, and battery symbols on the top.


    Figure 5-9


    An image download has been cancelled, or another error has occurred


    And naturally, if no errors occur, the images should appear like they originally
    did in the base exercise.


    You can find my solution in the “Chapter [4](#532302_1_En_4_Chapter.xhtml) - ImageDownloaderWithTask”
    project.'
  trans: "\n为了提供协作任务取消的示例，我不得不静默错误并手动添加取消检查。通常，你可以预期新并发系统中的任何方法以及苹果自身的异步方法，在某个时刻已经执行了取消检查。如果你移除`try`后的问号，则可以避免在该特定方法中进行取消检查。\n\
    \n清单 5-19 修复了`countFrom11to20`方法。\n\n```swift\nfunc countFrom11To20() async throws\
    \ -> Bool {\n    for i in (11...20) {\n        if Task.isCancelled { return false\
    \ }\n        try? await Task.sleep(nanoseconds: 1_000_000_000)\n        values11to20\
    \ += [i]\n        if Task.isCancelled { return false }\n    }\n    return true\n\
    }\n```\n清单 5-19 修复`countFrom11To20`方法\n\n现在，无论何时你点击“取消”按钮，数字将不会像我们添加取消检查之前那样从上到下打印。有趣的是，由于异步代码的特性，根据你取消的时机，你可能在\
    \ UI 中看到不同的输出。例如，应用尝试每秒打印两个数字（1 和 11，2 和 12 等），但根据你取消的时机，你可能只得到一对中的一个数字。图 5-7\
    \ 展示了当我在显示第三对时取消任务所发生的情况。\n\n![](img/532302_1_En_5_Fig7_HTML.jpg)\n\n一张截图展示了一个移动屏幕，上面分别圈出了数字\
    \ 1、2、11、12 和 13，底部有“取消”按钮，顶部有时间、蜂窝网络和电池符号。\n\n图 5-7 任务在同一时间被取消，但其中一个任务稍微领先于另一个\n\
    \n### 任务取消与任务组\n\n理解使用任务组的结构化并发可能导致你的代码向调用者返回部分结果而非完整集合，这一点非常重要。思考清单 5-20 中的代码，它来自第\
    \ 4 章的`ImageDownloader`项目。\n\n```swift\nfunc download(serverImages: [ServerImage])\
    \ async throws -> [URL] {\n    var urls: [URL] = []\n    try await withThrowingTaskGroup(of:\
    \ URL.self) { group in\n        for image in serverImages {\n            group.addTask(priority:\
    \ .userInitiated) {\n                let imageUrl = try await self.download(image)\n\
    \                return imageUrl\n            }\n        }\n        for try await\
    \ imageUrl in group {\n            urls.append(imageUrl)\n        }\n    }\n \
    \   return urls\n}\n```\n清单 5-20 在任务组中下载多个图片\n\n如果你有 10 张图片要下载，并且在所有图片下载完成之前，`withThrowingTaskGroup`调用内部发生错误（或者你调用`group.cancelAll()`取消组），`urls`数组将包含一个部分结果，该结果仅包含在异常退出之前成功下载的图片。请确保记录此行为，因为你的代码的调用者可能未意识到这一点，并可能导致他们的程序出现意外行为。\n\
    \n## 使用分离任务的无结构化并发\n\n我们已经提到，任务树确保任务从其父任务继承一些属性，例如优先级、Actor 和局部变量。完全有可能从另一个任务启动一个不继承其父任务任何属性的任务。这些任务被称为*分离任务*，当你需要并发，但这种并发并非严格相关时，它们非常有用。例如，从互联网下载图片可以是一个任务。你可能稍后想要将这些图片存储在本地缓存中。将图片存储在本地缓存的过程可以是一个分离任务，这样如果下载任务被取消但图片已下载，缓存保存操作将顺利进行而不会出现问题。\n\
    \n要启动一个分离任务，你只需使用`Task`的静态方法`detached`。清单 5-21 展示了如何创建一个。\n\n```swift\nTask.detached(priority:\
    \ .low) {\n    imageManager.writeImageToCache(image)\n}\n```\n清单 5-21 创建分离任务\n\
    \n从语法上讲，与标准任务相比没有太大区别，但在处理它们时，请务必注意任务树和继承属性。指定优先级是可选的，就像处理普通任务时一样。\n\n## 总结\n\n\
    本章详细讨论了无结构化并发和任务树。我们大量介绍了`Task`对象及其在创建并发时的行为。这种类型的并发称为无结构化并发，它赋予我们更多控制权，允许我们手动取消任务或将它们作为参数传递。\n\
    \n我们讨论了结构化并发如何与`Task`协同工作。我们提到，在`Task`内部调用异步方法会使这些方法成为父任务的子任务。这些子任务继承父任务的所有属性，包括优先级、Actor\
    \ 和局部变量。启动异步方法并不意味着它们在不同的任务中运行。任务始终使用`Task {}`对象显式创建。\n\n我们还讨论了任务树以及它如何管理任务的执行。任务树为你提供了一个心智模型，帮助你理解子任务继承了哪些信息。此外，它还管理着取消是如何发生的。\n\
    \n我们了解到任务取消并非直截了当。“取消”一个任务仅仅意味着它将被标记为已取消，但任务自身负责寻找合适的时机来停止执行，因为强制停止异步代码可能对用户造成灾难性后果，例如数据损坏。我们还简要介绍了任务取消如何与任务组交互，以及它如何可能导致任务组返回部分结果，这可能是出乎意料的。\n\
    \n最后，我们讨论了分离任务，这是一种不继承父任务任何属性的无结构化并发形式。这些任务完全独立。\n\n## 练习\n\n### 改进项目\n\n下载“第\
    \ 4 章 - `ImageDownloader`”项目并执行以下更改：\n\n1.  修改它，使其不再使用任务组下载图片。相反，它应该使用无结构化并发与`Task`来下载每张图片。提示：你可以创建一个名为`ServerImageView`的单独视图，并附带一个用于下载单张图片的视图模型。\n\
    2.  添加功能，如果用户点击“取消”按钮，允许他们取消独立的图片下载任务。\n3.  SwiftUI 包含一个名为`.task`的视图修饰符，它会在视图出现时执行其内容，并在视图消失时取消执行，本质上取代了`onAppear`和`onDisappear`修饰符的行为。使用它在占位视图（可以是`ProgressView`）出现时自动下载图片。\n\
    \n完成此练习后，你的程序应类似于图 5-8。\n\n![](img/532302_1_En_5_Fig8_HTML.jpg)\n\n一张截图展示了一个移动屏幕，上面有三个正在加载的图片，顶部有时间、蜂窝网络和电池符号。\n\
    \n图 5-8 图片正在下载时显示的 UI\n\n如果你点击“取消”按钮（或者发生错误），UI 应类似于图 5-9。\n\n![](img/532302_1_En_5_Fig9_HTML.jpg)\n\
    \n一张截图展示了一个移动屏幕，上面有三个加载失败的图片，顶部有时间、蜂窝网络和电池符号。\n\n图 5-9 图片下载已被取消，或发生了其他错误\n\n当然，如果没有发生错误，图片应该像基础练习中那样正常显示。\n\
    \n你可以在“第 4 章 - `ImageDownloaderWithTask`”项目中找到我的解决方案。\n"
- fmt: "# 6. Actors\n\nSo far, we have covered about writing concurrent code in Swift\
    \ using tasks that are independent of each other. You run some tasks, and oftentimes\
    \ deliver the results to the main thread. But there are cases in which you need\
    \ to have *shared mutable state* in your program – a common mutable source that\
    \ your code can read from and write to. This source can be a simple variable,\
    \ or it can be a file, or it can be any other kind of resource that is dangerous\
    \ to access concurrently, yet it needs to be available to multiple tasks at the\
    \ same time.\n\nIf you have multiple pieces of code that can access a read-only\
    \ resource, your program will always be in a valid state, and you do not have\
    \ to worry about data corruption in that case. But if you have multiple tasks\
    \ and at least one of them can write data to a shared resource, then we have a\
    \ problem. This is called a *data race* , or, as we called it in Chapter [1](#532302_1_En_1_Chapter.xhtml),\
    \ a *race condition.* Race conditions are dangerous, because if multiple pieces\
    \ of code can write concurrently to a file, it will lead to data corruption. If\
    \ multiple tasks are reading from that resource, all of them are going to have\
    \ trash data that may not even be the same they attempted to read. The worst part\
    \ is, if you are writing concurrent code at the low level, introducing data races\
    \ is very easy to do, and very hard to debug.\n\nFor this reason, if you are using\
    \ value semantics (structs or enums), you will not have this problem. Value semantics\
    \ are read-only, and if they mutate, a copy is created, and all mutation is *local*\
    \ to that variable. Each task would operate on a different copy of the data, although\
    \ it may not be what you want.\n\nIn Chapter [1](#532302_1_En_1_Chapter.xhtml),\
    \ we saw that the low-level fix solution to this problem is to manually synchronize\
    \ access to the resources by using locks. But in the new Swift concurrency model,\
    \ we have a much easier way to create a such synchronization: *Actors*.\n\n##\
    \ Introducing Actors\n\nActors are a new type of reference types introduced in\
    \ Swift , supported by the new concurrency model. Actors isolate their own state\
    \ from the rest of the program, and they provide synchronized access to mutable\
    \ state. In simpler terms, if you have an actor that has a simple variable that\
    \ can be read by and written to by multiple tasks, the task ensures only one of\
    \ them can do so at a time. It ensures mutual access to a given resource.\n\n\
    Every access to a mutable state is done through the actor. To declare an actor,\
    \ you simply use the `actor` keyword and give it a name, very similar to declaring\
    \ a struct or a class. Actors, being reference types, have a lot of features like\
    \ that of classes. They can conform to protocols and receive more functionality\
    \ through extensions. The main difference with classes is actors isolate their\
    \ own state. An actor may suspend zero or more times (have other `await` calls\
    \ within its methods), so you can integrate actors with the rest of the new concurrency\
    \ system easily.\n\nListing [6-1](#532302_1_En_6_Chapter.xhtml#PC1) shows how\
    \ to declare an actor. In this case, we will also create a `Videogame` struct\
    \ which we will use for the examples in this chapter.\n\n```\nactor VideogameLibrary\
    \ {\n    var videogames: [Videogame] = []\n    func fetchGames(by company: String)\
    \ -> [Videogame] {\n        let games = videogames.filter { $0.title.caseInsensitiveCompare(company)\
    \ == .orderedSame }\n        return games\n    }\n    func countGames(by company:\
    \ String) -> Int {\n        let games = fetchGames(by: company)\n        return\
    \ games.count\n    }\n    func add(games: [Videogame]) {\n        self.videogames.append(contentsOf:\
    \ games)\n    }\n    func fetchGames(by year: Int) -> [Videogame] {\n        let\
    \ games = videogames.filter { $0.releaseYear == year }\n        return games\n\
    \    }\n}\n```\n\nListing 6-1  \nDeclaring an actor\n\nWe have a `Videogame` object\
    \ referenced here, whose declaration is in Listing [6-2](#532302_1_En_6_Chapter.xhtml#PC2).\n\
    \n```\nstruct Videogame {\n    let title: String\n    let releaseYear: Int\n \
    \   let company: String\n}\n```\n\nListing 6-2  \nThe `Videogame` struct\n\nWe\
    \ can appreciate that it’s declaration looks very similar to a class, and it being\
    \ a reference type, we can expect its behavior to be similar. You might be wondering\
    \ why actors are reference types instead of value types. The reason is simple:\
    \ An actor encapsulates *shared* mutable state . It’s a type that expects to be\
    \ mutated by multiple code paths. If it were a struct, callers mutating it would\
    \ end up with their own copy."
  raw: '# 6. Actors


    So far, we have covered about writing concurrent code in Swift using tasks that
    are independent of each other. You run some tasks, and oftentimes deliver the
    results to the main thread. But there are cases in which you need to have *shared
    mutable state* in your program – a common mutable source that your code can read
    from and write to. This source can be a simple variable, or it can be a file,
    or it can be any other kind of resource that is dangerous to access concurrently,
    yet it needs to be available to multiple tasks at the same time.


    If you have multiple pieces of code that can access a read-only resource, your
    program will always be in a valid state, and you do not have to worry about data
    corruption in that case. But if you have multiple tasks and at least one of them
    can write data to a shared resource, then we have a problem. This is called a
    *data race* , or, as we called it in Chapter [1](#532302_1_En_1_Chapter.xhtml),
    a *race condition.* Race conditions are dangerous, because if multiple pieces
    of code can write concurrently to a file, it will lead to data corruption. If
    multiple tasks are reading from that resource, all of them are going to have trash
    data that may not even be the same they attempted to read. The worst part is,
    if you are writing concurrent code at the low level, introducing data races is
    very easy to do, and very hard to debug.


    For this reason, if you are using value semantics (structs or enums), you will
    not have this problem. Value semantics are read-only, and if they mutate, a copy
    is created, and all mutation is *local* to that variable. Each task would operate
    on a different copy of the data, although it may not be what you want.


    In Chapter [1](#532302_1_En_1_Chapter.xhtml), we saw that the low-level fix solution
    to this problem is to manually synchronize access to the resources by using locks.
    But in the new Swift concurrency model, we have a much easier way to create a
    such synchronization: *Actors*.


    ## Introducing Actors


    Actors are a new type of reference types introduced in Swift , supported by the
    new concurrency model. Actors isolate their own state from the rest of the program,
    and they provide synchronized access to mutable state. In simpler terms, if you
    have an actor that has a simple variable that can be read by and written to by
    multiple tasks, the task ensures only one of them can do so at a time. It ensures
    mutual access to a given resource.


    Every access to a mutable state is done through the actor. To declare an actor,
    you simply use the `actor` keyword and give it a name, very similar to declaring
    a struct or a class. Actors, being reference types, have a lot of features like
    that of classes. They can conform to protocols and receive more functionality
    through extensions. The main difference with classes is actors isolate their own
    state. An actor may suspend zero or more times (have other `await` calls within
    its methods), so you can integrate actors with the rest of the new concurrency
    system easily.


    Listing [6-1](#532302_1_En_6_Chapter.xhtml#PC1) shows how to declare an actor.
    In this case, we will also create a Videogame struct which we will use for the
    examples in this chapter.


    ```

    actor VideogameLibrary {

    var videogames: [Videogame] = []

    func fetchGames(by company: String) -> [Videogame] {

    let games = videogames.filter { $0.title.caseInsensitiveCompare(company) == .orderedSame
    }

    return games

    }

    func countGames(by company: String) -> Int {

    let games = fetchGames(by: company)

    return games.count

    }

    func add(games: [Videogame]) {

    self.videogames.append(contentsOf: games)

    }

    func fetchGames(by year: Int) -> [Videogame] {

    let games = videogames.filter { $0.releaseYear == year }

    return games

    }

    }

    Listing 6-1

    Declaring an actor

    ```


    We have a Videogame object referenced here, whose declaration is in Listing [6-2](#532302_1_En_6_Chapter.xhtml#PC2).


    ```

    struct Videogame {

    let title: String

    let releaseYear: Int

    let company: String

    }

    Listing 6-2

    The Videogame struct

    ```


    We can appreciate that it’s declaration looks very similar to a class, and it
    being a reference type, we can expect its behavior to be similar. You might be
    wondering why actors are reference types instead of value types. The reason is
    simple: An actor encapsulates *shared* mutable state . It’s a type that expects
    to be mutated by multiple code paths. If it were a struct, callers mutating it
    would end up with their own copy.'
  trans: "\n# 6. 参与者（Actors）\n\n到目前为止，我们讨论了在 Swift 中使用相互独立的任务编写并发代码的方法。你可以运行一些任务，并通常将结果传递到主线程。但有些情况下，你需要在程序中拥有*共享的可变状态*——一个代码可以读取和写入的公共可变源。这个源可以是一个简单的变量、一个文件，也可以是任何其他并发访问有危险，但又需要同时被多个任务使用的资源。\n\
    \n如果你有多个可以访问只读资源的代码段，你的程序将始终处于有效状态，无需担心数据损坏。但如果有多个任务，并且其中至少有一个可以向共享资源写入数据，那就会产生问题。这被称为*数据竞争*，或者如第\
    \ 1 章中所述，称为*竞态条件*。竞态条件非常危险，因为如果多个代码段可以并发写入文件，就会导致数据损坏。如果多个任务正在读取该资源，它们都会得到垃圾数据，甚至可能与它们试图读取的数据不同。最糟糕的是，如果你在底层编写并发代码，引入数据竞争非常容易，而调试却极其困难。\n\
    \n因此，如果你使用值语义（结构体或枚举），就不会遇到这个问题。值语义是只读的，如果发生改变，会创建一个副本，所有修改都*局部*于该变量。每个任务都会操作数据的不同副本，尽管这可能不是你期望的结果。\n\
    \n在第 1 章中，我们看到这个问题的底层解决方案是使用锁来手动同步对资源的访问。但在新的 Swift 并发模型中，我们有一种更简单的方法来实现这种同步：*参与者*。\n\
    \n## 参与者介绍\n\n参与者是 Swift 中引入的一种新的引用类型，由新的并发模型支持。参与者将其自身状态与程序其他部分隔离，并提供对可变状态的同步访问。简单地说，如果你有一个参与者，它包含一个可以被多个任务读取和写入的简单变量，该参与者确保一次只能有一个任务进行读写操作。它确保了对给定资源的互斥访问。\n\
    \n对可变状态的每次访问都通过参与者来完成。要声明一个参与者，只需使用 `actor` 关键字并为其命名，这与声明结构体或类非常相似。参与者作为引用类型，具有许多类似类的特性。它们可以遵循协议，并通过扩展获得更多功能。与类的主要区别在于，参与者会隔离自身状态。参与者可能暂停零次或多次（在其方法中包含其他\
    \ `await` 调用），因此你可以轻松地将参与者与新的并发系统中的其他部分集成。\n\n清单 6-1 展示了如何声明一个参与者。在这个例子中，我们还将创建一个\
    \ `Videogame` 结构体，用于本章的示例。\n\n```\nactor VideogameLibrary {\n    var videogames:\
    \ [Videogame] = []\n    func fetchGames(by company: String) -> [Videogame] {\n\
    \        let games = videogames.filter { $0.title.caseInsensitiveCompare(company)\
    \ == .orderedSame }\n        return games\n    }\n    func countGames(by company:\
    \ String) -> Int {\n        let games = fetchGames(by: company)\n        return\
    \ games.count\n    }\n    func add(games: [Videogame]) {\n        self.videogames.append(contentsOf:\
    \ games)\n    }\n    func fetchGames(by year: Int) -> [Videogame] {\n        let\
    \ games = videogames.filter { $0.releaseYear == year }\n        return games\n\
    \    }\n}\n```\n\n清单 6-1  \n声明一个参与者\n\n这里引用了一个 `Videogame` 对象，其声明在清单 6-2 中。\n\n\
    ```\nstruct Videogame {\n    let title: String\n    let releaseYear: Int\n   \
    \ let company: String\n}\n```\n\n清单 6-2  \n`Videogame` 结构体\n\n我们可以看到它的声明看起来与类非常相似，作为引用类型，可以预期其行为也类似。你可能会疑惑为什么参与者是引用类型而不是值类型。原因很简单：参与者封装了*共享的*可变状态。它是一种期望被多个代码路径修改的类型。如果它是结构体，调用者修改它后最终会得到各自的副本。\n"
- fmt: "# Interacting with an Actor\n\nAll calls to an actor need to be done asynchronously,\
    \ hence needing the `await` keyword. This is the mechanism actors use to synchronize\
    \ their state and prevent concurrent mutations. Because a call to an actor can\
    \ be `await`ed, other callers to it will be suspended, waiting their turn to access\
    \ it.\n\nInternally, there is no need for the actor to call its own methods and\
    \ properties asynchronously. Because the actor is isolated, any calls within itself\
    \ will run sequentially until an operation is complete.\n\nListing [6-3](#532302_1_En_6_Chapter.xhtml#PC3)\
    \ shows how we might try to add some games to a videogame library.\n\n```\nlet\
    \ library = VideogameLibrary()\nfunc addGames(to library: VideogameLibrary) {\n\
    \    let zelda5 = Videogame(title: \"The Legend of Zelda: Ocarina of Time\", releaseYear:\
    \ 1998, company: \"Nintendo\")\n    let zelda6 = Videogame(title: \"The Legend\
    \ of Zelda: Majora's Mask\", releaseYear: 2020, company: \"Nintendo\")\n    let\
    \ tales1 = Videogame(title: \"Tales of Symphonia\", releaseYear: 2004, company:\
    \ \"Namco\")\n    let tales2 = Videogame(title: \"Tales of the Abyss\", releaseYear:\
    \ 2005, company: \"Namco\")\n    let eternalSonata = Videogame(title: \"Eternal\
    \ Sonata\", releaseYear: 2008, company: \"tri-Crescendo\")\n    let games = [zelda5,\
    \ zelda6, tales1, tales2, eternalSonata]\n    library.add(games: games)\n}\nListing\
    \ 6-3\nAdding games to a library\n```\n\nThe `addGames` method is just a convenience\
    \ function to quickly add some videogames. However, if you tried to compile this,\
    \ you would get an error because “Actor-isolated instance method ‘add(games:)’\
    \ can not be referenced from a non-isolated context”.\n\nThe method is expecting\
    \ us to add the `await` keyword. Despite the fact that the `add(games:)` method\
    \ is not marked as `async`, the API exposed to us is indeed `async` as a protection\
    \ provided by the actor. The compiler is helping you misuse actors, avoiding the\
    \ introduction of data races.\n\nThe direct implication of this is that actors\
    \ can only run in `async` contexts, so ultimately, to get that to compile, we\
    \ need to both add the `await` keyword to the `add(games:)` method and wrap it\
    \ in a `Task` (or `Task.detached`). The fixed method that compiles is in Listing\
    \ [6-4](#532302_1_En_6_Chapter.xhtml#PC4).\n\n```\nfunc addGames(to library: VideogameLibrary)\
    \ {\n    let zelda5 = Videogame(title: \"The Legend of Zelda: Ocarina of Time\"\
    , releaseYear: 1998, company: \"Nintendo\")\n    let zelda6 = Videogame(title:\
    \ \"The Legend of Zelda: Majora's Mask\", releaseYear: 2020, company: \"Nintendo\"\
    )\n    let tales1 = Videogame(title: \"Tales of Symphonia\", releaseYear: 2004,\
    \ company: \"Namco\")\n    let tales2 = Videogame(title: \"Tales of the Abyss\"\
    , releaseYear: 2005, company: \"Namco\")\n    let eternalSonata = Videogame(title:\
    \ \"Eternal Sonata\", releaseYear: 2008, company: \"tri-Crescendo\")\n    let\
    \ games = [zelda5, zelda6, tales1, tales2, eternalSonata]\n    Task {\n      \
    \  await library.add(games: games)\n    }\n}\nListing 6-4\nInteracting with actors\
    \ needs to be done in an async context\n```\n\nWhen multiple calls to the `add(games:)`\
    \ method are performed, the actor will only execute one of those calls at once.\
    \ In Listing [6-5](#532302_1_En_6_Chapter.xhtml#PC5), we have created a new method\
    \ that adds even more games to the library.\n\n```\nfunc addNewGames(to library:\
    \ VideogameLibrary) {\n    let pokemon1 = Videogame(title: \"Pokémon Yellow\"\
    , releaseYear: 1998, company: \"Game Freak\")\n    let pokemon2 = Videogame(title:\
    \ \"Pokémon Gold\", releaseYear: 1999, company: \"Game Freak\")\n    let pokemon3\
    \ = Videogame(title: \"Pokémon Ruby\", releaseYear: 2002, company: \"Game Freak\"\
    )\n    let games = [pokemon1, pokemon2, pokemon3]\n    Task {\n        await library.add(games:\
    \ games)\n    }\n}\nListing 6-5\nAdding more games to the library\n```\n\nWe now\
    \ have two methods that add games. Let’s try calling them now, as in Listing [6-6](#532302_1_En_6_Chapter.xhtml#PC6).\n\
    \n```\naddGames(to: library)\naddNewGames(to: library)\nListing 6-6\nCalling two\
    \ methods that call the actor\n```\n\nNow this is where things become interesting.\
    \ There is no guaranteed to know if the games from `addGames` or `addNewGames`\
    \ will be added first. But what is guaranteed is that whichever gets to execute\
    \ first, the actor will ensure all the games in one of these functions are added\
    \ to the array before the other one gets to run. So, the array will either contain\
    \ all the games from `addGames` first, in the order they were added, followed\
    \ by the games in `addNewGames` in order they were added, or it will contain the\
    \ games of `addNewGames` in the order they were added followed by games from `addGames`\
    \ in the correct order as well. The games will never be added in an interleaved\
    \ order or anything crazy like that.\n\nMoreover, access to the entire actor state\
    \ is synchronized. If you have someone adding games to the library and someone\
    \ querying the collection at the same time, the actor will only execute one of\
    \ those calls until it is done executing. Listing [6-7](#532302_1_En_6_Chapter.xhtml#PC7)\
    \ will create three different tasks, two to add games and one to filter the games\
    \ by a given year and print how many of them there are.\n\n```\nTask {\n    addGames(to:\
    \ library)\n}\nTask {\n    let games1998 = await library.fetchGames(by: 1998)\n\
    \    print(\"\\(games1998.count) games\")\n}\nTask {\n    addNewGames(to: library)\n\
    }\nListing 6-7\nAccessing the actor from different tasks\n```\n\n`addGames` has\
    \ one game released in 1998. `addNewGames` also has one game released in 1998.\
    \ In total, there's two games released in that year. Ideally, the code above would\
    \ print `2 games`, but because the tasks attempt to access the actor concurrently,\
    \ only of three tasks will get to execute its content first. If you try to run\
    \ this code, you will notice it prints `0 games` most of the time. It could also\
    \ print `1 games`. Mutually exclusive access means that only one person will enter\
    \ the actor and do its work, it doesn't matter what method of the actor is being\
    \ called. Any call to the actor will block it until it's done doing its work.\n\
    \nThis is also a good chance to show you how task priorities work. You can tell\
    \ the compiler that you want the games to be added first by assigning a higher\
    \ priority to the tasks that add games. Listing [6-8](#532302_1_En_6_Chapter.xhtml#PC8)\
    \ changes the priority of the tasks. `.utility` is the lowest possible priority,\
    \ so in this case, it will execute last *most of the time*, printing `2 games`.\n\
    \n```\nTask(priority: .high) {\n    addGames(to: library)\n}\nTask(priority: .utility)\
    \ {\n    let games1998 = await library.fetchGames(by: 1998)\n    print(\"\\(games1998.count)\
    \ games\")\n}\nTask(priority: .high) {\n    addNewGames(to: library)\n}\nListing\
    \ 6-8\nAssigning priorities to tasks\n```"
  raw: '## Interacting with an Actor


    All calls to an actor need to be done asynchronously, hence needing the `await`
    keyword. This is the mechanism actors use to synchronize their state and prevent
    concurrent mutations. Because a call to an actor can be `await`ed, other callers
    to it will be suspended, waiting their turn to access it.


    Internally, there is no need for the actor to call its own methods and properties
    asynchronously. Because the actor is isolated, any calls within itself will run
    sequentially until an operation is complete.


    Listing [6-3](#532302_1_En_6_Chapter.xhtml#PC3) shows how we might try to add
    some games to a videogame library .


    ```

    let library = VideogameLibrary()

    func addGames(to library: VideogameLibrary) {

    let zelda5 = Videogame(title: "The Legend of Zelda: Ocarina of Time", releaseYear:
    1998, company: "Nintendo")

    let zelda6 = Videogame(title: "The Legend of Zelda: Majora''s Mask", releaseYear:
    2020, company: "Nintendo")

    let tales1 = Videogame(title: "Tales of Symphonia", releaseYear: 2004, company:
    "Namco")

    let tales2 = Videogame(title: "Tales of the Abyss", releaseYear: 2005, company:
    "Namco")

    let eternalSonata = Videogame(title: "Eternal Sonata", releaseYear: 2008, company:
    "tri-Crescendo")

    let games = [zelda5, zelda6, tales1, tales2, eternalSonata]

    library.add(games: games)

    }

    Listing 6-3

    Adding games to a library

    ```


    The `addGames` method is just a convenience function to quickly add some videogames.
    However, if you tried to compile this, you would get an error because “Actor-isolated
    instance method ‘add(games:)’ can not be referenced from a non-isolated context”.


    The method is expecting us to add the `await` keyword. Despite the fact that the
    `add(games:)` method is not marked as async, the API exposed to us is indeed async
    as a protection provided by the actor. The compiler is helping you misuse actors,
    avoiding the introduction of data races .


    The direct implication of this is that actors can only run in async contexts ,
    so ultimately, to get that to compile, we need to both add the `await` keyword
    to the `add(games:)` method and wrap it in a `Task` (or `Task.detached`). The
    fixed method that compiles is in Listing [6-4](#532302_1_En_6_Chapter.xhtml#PC4).


    ```

    func addGames(to library: VideogameLibrary) {

    let zelda5 = Videogame(title: "The Legend of Zelda: Ocarina of Time", releaseYear:
    1998, company: "Nintendo")

    let zelda6 = Videogame(title: "The Legend of Zelda: Majora''s Mask", releaseYear:
    2020, company: "Nintendo")

    let tales1 = Videogame(title: "Tales of Symphonia", releaseYear: 2004, company:
    "Namco")

    let tales2 = Videogame(title: "Tales of the Abyss", releaseYear: 2005, company:
    "Namco")

    let eternalSonata = Videogame(title: "Eternal Sonata", releaseYear: 2008, company:
    "tri-Crescendo")

    let games = [zelda5, zelda6, tales1, tales2, eternalSonata]

    Task {

    await library.add(games: games)

    }

    }

    Listing 6-4

    Interacting with actors needs to be done in an async context

    ```


    When multiple calls to the `add(games:)` method are performed, the actor will
    only execute one of those calls at once. In Listing [6-5](#532302_1_En_6_Chapter.xhtml#PC5),
    we have created a new method that adds even more games to the library.


    ```

    func addNewGames(to library: VideogameLibrary) {

    let pokemon1 = Videogame(title: "Pokémon Yellow", releaseYear: 1998, company:
    "Game Freak")

    let pokemon2 = Videogame(title: "Pokémon Gold", releaseYear: 1999, company: "Game
    Freak")

    let pokemon3 = Videogame(title: "Pokémon Ruby", releaseYear: 2002, company: "Game
    Freak")

    let games = [pokemon1, pokemon2, pokemon3]

    Task {

    await library.add(games: games)

    }

    }

    Listing 6-5

    Adding more games to the library

    ```


    We now have two methods that add games. Let’s try calling them now, as in Listing
    [6-6](#532302_1_En_6_Chapter.xhtml#PC6).


    ```

    addGames(to: library)

    addNewGames(to: library)

    Listing 6-6

    Calling two methods that call the actor

    ```


    Now this is where things become interesting. There is no guaranteed to know if
    the games from `addGames` or `addNewGames` will be added first. But what is guaranteed
    is that whichever gets to execute first, the actor will ensure all the games in
    one of these functions are added to the array before the other one gets to run.
    So, the array will either contain all the games from `addGames` first, in the
    order they were added, followed by the games in `addNewGames` in order they were
    added, or it will contain the games of `addNewGames` in the order they were added
    followed by games from `addGames` in the correct order as well. The games will
    never be added in an interleaved order or anything crazy like that.


    Moreover, access to the entire actor state is synchronized. If you have someone
    adding games to the library and someone querying the collection at the same time,
    the actor will only execute one of those calls until it is done executing. Listing
    [6-7](#532302_1_En_6_Chapter.xhtml#PC7) will create three different tasks , two
    to add games and one to filter the games by a given year and print how many of
    them there are.


    ```

    Task {

    addGames(to: library)

    }

    Task {

    let games1998 = await library.fetchGames(by: 1998)

    print("\(games1998.count) games")

    }

    Task {

    addNewGames(to: library)

    }

    Listing 6-7

    Accessing the actor from different tasks

    ```


    `addGames` has one game released in 1998\. `addNewGames` also has one game released
    in 1998\. In total, there’s two games released in that year. Ideally, the code
    above would print `2 games`, but because the tasks attempt to access the actor
    concurrently, only of three tasks will get to execute its content first. If you
    try to run this code, you will notice it prints `0 games` most of the time. It
    could also print `1 games`. Mutually exclusive access means that only one person
    will enter the actor and do its work, it doesn’t matter what method of the actor
    is being called. Any call to the actor will block it until it’s done doing its
    work.


    This is also a good chance to show you how task priorities work. You can tell
    the compiler that you want the games to be added first by assigning a higher priority
    to the tasks that add games. Listing [6-8](#532302_1_En_6_Chapter.xhtml#PC8) changes
    the priority of the tasks . `.utility` is the lowest possible priority, so in
    this case, it will execute last *most of the time*, printing `2 games`.


    ```

    Task(priority: .high) {

    addGames(to: library)

    }

    Task(priority: .utility) {

    let games1998 = await library.fetchGames(by: 1998)

    print("\(games1998.count) games")

    }

    Task(priority: .high) {

    addNewGames(to: library)

    }

    Listing 6-8

    Assigning priorities to tasks

    ```'
