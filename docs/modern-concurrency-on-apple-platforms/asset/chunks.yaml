  trans: '

    # 主线程


    如果你为苹果平台编程已有一段时间，一定对主线程（The Main Thread）有所了解。如果这是你第一次听说它，别担心，我们将在本节中重温这个概念。主线程的唯一职责是运行你的
    UI 代码。无论是要更新标签、为视图添加颜色，还是切换开关，你都需要在主线程上执行这些操作。我们不允许在主线程之外更新 UI，否则轻则引发警告，重则导致运行时崩溃。当我们运行异步任务时——无论是使用新的并发系统还是
    GCD 等旧工具——若想将返回数据显示在 UI 中，就必须在主线程上完成。


    由于主线程负责更新 UI，在其上执行任何高开销操作都会导致应用卡顿数秒，或使 UI 出现明显的卡顿和帧率下降。如果应用长时间无响应，系统将自行介入并终止它。正因如此，包括
    `URLSession` 中所有网络调用在内的许多 API，默认都会在独立线程中运行——无论你使用的是这些方法的 `async/await` 版本，还是传统的基于闭包的版本。你*可以*强制让
    `URLSession` 和其他异步 API 在主线程上运行，但绝对不应该这么做，而且我怀疑你永远找不到一个合理的借口。


    简而言之，任何与 UIKit（以及扩展的 SwiftUI）相关的操作都必须在主线程上完成，并且需要避免用高开销任务阻塞主线程。传统上，我们会通过调用类似 `DispatchQueue.main.async`
    的方式将数据交给主线程处理。这个方法接受一个在主线程上执行的闭包，因此非常适合在此处理 UI 相关操作。`DispatchQueue` 是 GCD 中的一个对象，其静态属性
    `main` 指向始终在主线程上运行的“主队列”。这是一种快速且无痛地返回主线程的方式，既安全又便捷，但若大量使用，也容易形成令人头疼的“末日金字塔”。iOS
    中以“UI”为前缀的任何对象（如 `UIButton`、`UISwitch`），或 macOS 中的任何 AppKit 对象，都应仅从主线程进行修改。


    **提示**


    从 Xcode 14 及其附带的所有操作系统版本开始，`UIImage` 和 `UIColor` 是“所有 UI 前缀对象都应从主线程修改”这一规则的特例。自该
    Xcode 版本起，`UIImage` 和 `UIColor` 遵循 `Sendable` 协议，因此可以安全地在不同并发域之间传递。


    在现代并发系统中，系统会决定是否在不同的线程中启动你的任务。请记住，我们之前学到：任务在遇到 `await` 关键字时会暂停，而系统可能会决定在另一个线程中执行该调用。如果发生暂停，你既不知道代码将在何处执行，甚至不知道它会使用哪个线程来交付结果。那么，在使用新并发系统时，我们如何将结果交付到主线程，以便在完成高开销任务后更新
    UI 呢？问得好！


    ## 主执行器


    我终于可以向大家解释一个贯穿本书、却一直难以找到合适时机说明的概念了。没错，我说的就是主执行器（Main Actor），在代码中表现为 `@MainActor`。


    UIKit 和 SwiftUI 都是庞大的框架。仔细想想，它们由成百上千个类组成，并且很可能分散在框架内的不同文件中。它们都有一个共同要求：任何 UI 更新都应在主线程上完成。将某个声明标记为
    `@MainActor`，意味着该特定功能将在主执行器上运行。`@MainActor` 本质上被视为一种属性。自 iOS 15、macOS 12、watchOS
    8 和 tvOS 16 起，这些框架中的大多数类都已标记为 `@MainActor`。对于 SwiftUI，创建 `ObservableObjects` 需要手动标记为
    `@MainActor`，因为该协议并未自带此标记。将 UIKit、SwiftUI 和 AppKit 中的所有对象都标记为 `@MainActor`，是一种确保它们全部在主线程上运行的优雅解决方案。


    ### 使用 `@MainActor`


    与 `@Sendable` 属性类似，你也可以在多种场景下使用 `@MainActor`“属性”。首先，你可以将其作为类型声明（如结构体或类）的一部分。代码清单
    8-1 声明了两种新类型，其中一种被标记为 `@MainActor`。


    ```

    struct MusicAlbum {

    let name: String

    let artist: String

    let releaseYear: Int

    }

    @MainActor class MusicLibrary {

    var name: String

    var albums: [MusicAlbum] = []

    init(name: String) {

    self.name = name

    }

    }

    代码清单 8-1

    为类添加 @MainActor

    ```


    因此，我们对 `MusicLibrary` 实例执行的每一操作也都需要在主执行器上运行。`MusicLibrary` 中的每个属性和方法也都会在主执行器上运行。假设你有一个函数
    `createLibraryAndAddAlbum`，该函数是在 `MusicLibrary` 对象本身之外创建的。你可能会尝试在这个新函数中操作你的音乐库。在代码清单
    8-2 中，我们尝试在未运行于 `@MainActor` 上下文中使用该类型。


    ```

    func createLibraryAndAddAlbum() {

    let library = MusicLibrary(name: "Andy''s Library")

    let album = MusicAlbum(name: "Imaginareum", artist: "Nightwish", releaseYear:
    2011)

    library.shows += [album]

    }

    代码清单 8-2

    在非 Main Actor 上下文中操作 MusicLibrary

    ```


    如果尝试编译，你会遇到与尝试在并发域之间发送非 Sendable 类型时非常相似的错误。即：


    ```

    Call to main actor-isolated initializer ''init(name:)'' in a synchronous nonisolated
    context

    ...

    Property ''albums'' isolated to global actor ''MainActor'' can not be mutated
    from this context

    ```


    通过为 `createLibraryAndAddAlbum` 添加 `@MainActor`，该函数也将在主执行器上运行。这样，`MusicLibrary`
    和 `createLibraryAndAddAlbum` 函数将在同一执行器（同一线程）上运行，无论它们是否位于同一文件，甚至跨越不同框架。这就是主执行器被称为*全局执行器*的原因。


    代码清单 8-3 将能够无错编译。


    ```

    @MainActor

    func createLibraryAndAddAlbum() {

    let library = MusicLibrary(name: "Andy''s Library")

    let album = MusicAlbum(name: "Imaginareum", artist: "Nightwish", releaseYear:
    2011)

    library.albums += [album]

    }

    代码清单 8-3

    我们可以将 @MainActor 添加到分散的声明中，即使它们位于不同文件或框架中

    ```


    如果你位于另一个执行器中，可以调用标记为 `@MainActor` 的方法，但这需要异步完成（使用 `await` 或 `async let`），因为 `@MainActor`
    会同步所有使用它的声明之间的内部状态。


    这正是许多人在使用主执行器时常感困惑的地方。


    假设你在 `MusicLibrary` 对象中加入了代码清单 8-4 中的方法。


    ```

    @MainActor

    func populateFromWebService() async {

    albums = []

    albums = try await WebService.shared.albumsFromService()

    }

    代码清单 8-4

    一个用于获取专辑的异步方法

    ```


    假设 `populateFromWebService` 方法是一个会暂停的长时间运行操作。执行器将在何处执行？


    这个长时间运行的操作——即 `populateFromWebService` 函数本身——仍会在另一个线程上运行。你无法预知其运行位置，只知道主执行器上的方法会暂停，线程在其他工作完成后才会返回继续执行。

    '
- fmt: "What will execute on the main actor itself is the *assignment* of the `albums`\
    \ methods. Just the assignment. `populateFromWebService` will be running somewhere\
    \ else, but the assignment of its returned data to `self.albums` will run on the\
    \ main actor. A lot of people are under the impression that `populateFromWebService`\
    \ itself would execute on the main actor. That is, if this method is downloading\
    \ some JSON data from a slow service and parsing it or doing anything else that\
    \ can take anything longer than milliseconds, it is running on the main thread.\
    \ That is not correct, and fortunately the global actors system is smarter than\
    \ that. If you are running something on `@MainActor`, always know that all its\
    \ statements will run on the main actor, but if it finds a call that suspends,\
    \ the execution of whatever triggered the suspension will be done somewhere else,\
    \ and the data will be returned (and assigned) on the main thread. The “left”\
    \ side of an `await` will execute on the main thread, and the “right” side of\
    \ the `await` keyword will take place someplace else, so to speak.\n\nYou do not\
    \ have to mark an entire class or struct declaration as main actor. If you only\
    \ require some properties and methods to run on the main actor, you can mark only\
