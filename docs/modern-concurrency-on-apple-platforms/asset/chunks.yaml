- fmt: "## Summary\n\nConcurrency and multithreading are traditional computing problems.\
    \ Doing concurrency at the lower level and managing resources yourself can be\
    \ a challenge because they are easy to misuse. Misusing these resources and not\
    \ getting your multithreaded code right will result in bugs in the best case and\
    \ user data corruption in the worst case. Because of this, many developers, including\
    \ Apple, have designed multiple tools to abstract away the details and provide\
    \ easier interfaces. In the case of Apple, they have given developers the following\
    \ tools (sorted from lower level to higher level):\n\n* `pthread` s\n* `NSThread`\
    \ s\n* The Grand Central Dispatch (GCD)\n* `NSOperation` and related APIs\n* `async/await`\n\
    \nMost developers will never need to go down to the `pthread` or `NSThread` level.\
    \ The GCD, and `NSOperation` APIs provide higher-level abstractions, whereas `async/await`\
    \ not only will provide abstractions for the multithreading primitives, but it\
    \ will also provide a whole system that most developers can use without even knowing\
    \ what the components underneath are. This new system allows us to write shorter\
    \ code that is easier to read and easier to write. It’s worth studying this new\
    \ system in detail, and that’s what this book is about.\n\n## Exercises\n\nAnswer\
    \ the Questions\n\n1. When using traditional concurrency tools, what are some\
    \ pitfalls you can fall into if you don’t use them correctly?\n\n2. Prior to `async/await`,\
    \ what were some concurrency tools available on Apple’s platforms?\n\n3. What\
    \ advantages does `async/await` have over other, lower-level concurrency tools?\n\
    \n# 2. Introducing async/await\n\nIn the last chapter, we talked about some common\
    \ problems people run into when writing concurrent and multithreaded code. We\
    \ also saw some of the options Apple has for developers for this job, from lower-level\
    \ alternatives that are hard to use correctly, to higher-level alternatives that\
    \ are easier to use, but have less flexibility.\n\nThe rest of this book will\
    \ focus on the new concurrency system which we will simply call `async/await`.\
    \ In this chapter, we will explore the basic building of this new system – the\
    \ `async` and `await` keywords. We will not delve into multithreading just yet.\
    \ Once you understand how to use these keywords and how they behave with the APIs\
    \ in the SDK you already know, you will have the right tools to learn everything\
    \ this new system can do. But before we move on, let’s talk a bit more about closures\
    \ and callbacks (or blocks, as they are called in Objective-C).\n\n## Closures\
    \ and Their Place in Concurrency and Multithreading\n\nTo work through this chapter,\
    \ I recommend you get the sample project “Chapter 2 - Social Media App”. First,\
    \ we will talk about the existing code in the app that makes use of closure-based\
    \ concurrency, and later we will modify it to use `async/await` instead.\n\nThe\
    \ sample app consists of two different views.\n\nThe first view shows a simple\
    \ button you can tap to authenticate with biometrics, as shown in Figure 2-1.\n\
    \n![](images/532302_1_En_2_Chapter/532302_1_En_2_Fig1_HTML.jpg)\n\nA screenshot\
    \ of a smartphone depicts the time, a WIFI signal, a fully charged battery, and\
    \ the word Authenticate.\n\n**Figure 2-1** Entry point of the Social Media App\n\
