    # 关于作者与审校者


    # 1. 引言


    程序员习惯于编写线性执行的程序。在编写、测试和执行程序时，您期望指令按照编写顺序运行。在代码清单 1-1 中，程序会先将变量 `a` 赋值为数字 `2`，再将变量
    `b` 赋值为数字 `3`，接着将 `a + b` 的和赋值给变量 `sum`，最后在控制台打印结果。如果您在计算出 `sum` 的值之前就尝试执行 `print(sum)`，这个程序是绝对无法正常运行的。


    ```

    let a = 2

    let b = 3

    let sum = a + b // 该变量依赖 a 和 b 的值，但变量本身的赋值顺序可以任意。

    print(sum) // 只有获取到变量的值后才能将其打印出来。

    代码清单 1-1

    一个自上而下执行的简单程序

    ```


    这被称为*过程式编程*，因为您编写简单的语句，它们会自上而下地执行。即使添加了可以改变执行流程的语句，代码依然易于理解。在过程式编程中调用函数时，程序会“跳转”到内存中的另一个位置执行其内容，但这些行的执行也会以过程式的方式按照编写顺序进行，直到控制权返回给调用者。


    即使是非程序员，只要指令按照特定顺序编写，并且*一次只做一件事*，他们也能遵循任何指令集。无论是按照菜谱烹饪，还是根据在线教程搭建狗屋的人，可能都不是程序员，但只要步骤清晰明确，人们天生就善于完成任务。


    但计算机程序会成长并变得愈发复杂。虽然很多复杂软件确实可以遵循这种线性执行流程来编写，但程序往往需要同时执行多项任务。您的程序可能需要以这样一种方式执行，以至于仅凭肉眼扫视源码很难判断发生了什么——而不是拥有一个清晰的、可以用肉眼追踪的代码执行路径。这类程序是多线程的，它们可以同时运行多个（通常——但并非总是——互不相关的）代码路径。


    在本书中，我们将学习如何使用苹果的 `async/await` 实现进行异步和多线程编程。在本章中，我们还将讨论苹果为此提供的旧技术，以及新的 `async/await`
    系统如何更优秀，并帮助您避免传统的并发陷阱。


    ## 需要了解的重要概念


    并发和异步编程是非常宽泛的主题。虽然我很想涵盖所有内容，但这会超出本书的范围。相反，我们将定义四个重要概念，这些概念在我们探索苹果于 2021 年推出的 `async/await`
    系统时将非常相关。我们将尽可能用最简洁的语言来定义它们，因为在阅读本书各章节的过程中，牢记这些概念非常重要。新系统本身的概念将在后续章节中介绍。


    > **注意**

    >

    > 苹果并非 `async/await` 系统的原创者。该技术此前已在其他平台上使用。微软于 2011 年宣布 C# 将获得 `async/await` 支持，包含这些特性的
    C# 于 2012 年正式向公众发布。


    ### 线程


    *线程*的概念即使在相同语境下（此处指并发和异步编程）也可能有所不同。在本书中，我们将*线程*视为一个可以独立运行的工作单元。在 iOS 中，*主线程*负责运行应用的
    UI，因此所有与 UI 相关的任务（更新视图层级、移除和添加视图）都必须发生在主线程中。尝试在主线程之外更新 UI 可能会导致意外行为，甚至更糟——崩溃。


    在底层多线程框架中，开发者会手动创建线程，并且需要自己手动同步、停止线程以及进行其他线程管理操作。手动处理线程是软件多线程编程中最困难的部分之一。

