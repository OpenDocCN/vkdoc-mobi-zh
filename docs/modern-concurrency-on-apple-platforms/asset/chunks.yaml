    \ the `@MainActor` mark in the entire declaration, and adds it to the newly added\
    \ symbol.\n\n```\nclass MusicLibrary {\n    var name: String\n    var albums:\
    \ [MusicAlbum] = []\n    @MainActor var albumCover: UIImage?\n    init(name: String)\
    \ {\n        self.name = name\n    }\n    @MainActor func updateAlbumCover() {\n\
    \        // ... Download a new cover from the internet\n        // and update\
    \ the albumCover property.\n    }\n}\nListing 8-5\nMarking only some properties\
    \ and methods as @MainActor\n```\n\nNow this class will be usable everywhere,\
    \ but whatever action we want to do on the `albumCover`, it must be done in a\
