- fmt: '### The `NSOperation` APIs


    Sitting at a higher level than the GCD, the `NSOperation` APIs are a high-level
    tool to do multithreading. Despite the fact they are not as widely known as the
    GCD, they found their place in some parts of the SDK. For example, the CloudKit
    APIs make use of this technology.


    This one truly abstracts a lot of the pains of multithreading for you, but it
    loses a lot of flexibility. You will never have to manage locks or semaphores
    with it, and in turn the API is simple. This tool abstracts so many details to
    the point that you don’t even know if tasks you run with it are running on different
    threads. If the system thinks it makes sense to run your tasks in the same thread,
    it will do that. Otherwise, it may honor your intention of running in multiple
    threads. It may even choose to run your task in the main thread if it sees it’s
    not worth it to launch another thread for its work. Listing [1-5](#532302_1_En_1_Chapter.xhtml#PC6)
    creates two different tasks that count from 1 to 10 and from 10 to 20 in different
    queues.


    ```

    func startCounting() {

    /// We will need a queue for this.

    let operationQueue = OperationQueue()

    /// You can give your queue an optional name, if you need to identify it later.

    operationQueue.name = "Counting queue"

    /// This will just count from 1 to 10...

    let from1To10 = BlockOperation {

    for i in (1 ... 10) {

    print(i)

    }

    }

    /// ... and this from 11 to 20

    let from11To20 = BlockOperation {

    for i in (11 ... 20) {

    print(i)

    }

    }

    /// Add the operations to the queue

    operationQueue.addOperation(from1To10)

    operationQueue.addOperation(from11To20)

    /// To ensure the program doesn''t exit early while the operations are running.

    operationQueue.waitUntilAllOperationsAreFinished()

    }

    Listing 1-5

    Multithreaded usage of the NSOperation APIs

    ```


    Using these APIs is very simple. You begin by creating an `OperationQueue`. This
    queue’s responsibility is to execute any task you add to it. You can also give
    it a name to refer to it later, or if you need to search for it.


    In *Listing* [*1-5*](#532302_1_En_1_Chapter.xhtml#PC6), we create two tasks (in
    this case, instances of `BlockOperation` – the original API is in Objective-C,
    so in Swift, it’s a closure), `from1To10` and `from11To20`. They begin executing
    as soon as they are submitted to the queue via the `OperationQueue.addOperation`
    call. In this example, you will see that the numbers get printed almost in an
    interleaved manner. The results you get are going to be different each time you
    run the program.


    It’s very easy to run multiple tasks at once, but what if you want to run one
    task after the other because one of them depends on the data of another, or simply
    because it makes sense to do so?


    In that case, `BlockOperation` has a method that allows you to define an operation
    as a dependency of another. If you make `from1to10` a dependency of `from11to20`,
    then the number sequence will be printed in the order you expect. Listing [1-6](#532302_1_En_1_Chapter.xhtml#PC7)
    modifies a portion of Listing [1-5](#532302_1_En_1_Chapter.xhtml#PC6) to print
    the numbers in order by creating a dependency.


    ```

    // Ensure the numbers print in order. We do this before adding the operations
    to the queue.

    from11To20.addDependency(from1To10)

    /// Add the operations to the queue

    operationQueue.addOperation(from1To10)

    operationQueue.addOperation(from11To20)

    Listing 1-6

    Adding operations as dependencies of other operations

    ```


    It’s worth to note that while you don’t have thread management abilities with
    this framework, you can check the status of each *operation* (`isCancelled`, `isFinished`,
    etc.), and you can cancel your operations at any time (by calling `cancel` on
    it). If an operation gets cancelled, other operations that depended on it will
    also be cancelled.


    Using the `NSOperation` APIs is simple, as you have evidenced. It can still be
    a great tool when you have simple multithreaded needs.


    ### Introducing `async/await`


    `async/await` is a high-level system to write concurrent and multithreaded code.
    By using it, you don’t have to think about manual thread management or deadlocks.
    The system will take care of all those details and more for you under the hood.
    By using very simple constructs, you will be able to write safe and powerful concurrent
    and multithreaded code. It is worth noting that this system is very high level.
    It’s hard to use it incorrectly. While the system won’t give you fine-grain control
    over the concurrency and multithreading primitives, it will give you a whole set
    of abstractions to think of multithreaded code very differently. Semantically,
    it’s hard to compare `async/await` with any of the other systems we have explored
    before, because `async/await` is deeply integrated into Swift, the language, itself.
    It’s not an add-on in the form of a framework or a library. The primitives this
    system exposes are easier to understand thanks to Swift’s focus on readability.


    To give you a quick look of what we will be studying for the rest of this book,
    we will rewrite Listing [1-4](#532302_1_En_1_Chapter.xhtml#PC5) in Listing [1-7](#532302_1_En_1_Chapter.xhtml#PC8)
    using `async/await`.


    ```

    @MainActor

    func fetchUser() async {

    let userData = await userApi.fetchUserData()

    usernameLabel.text = userData.username

    let movies = userApi.fetchMovies(for: userData.id)

    userMovies = movies

    }

    Listing 1-7

    async/await in action

    ```


    Listing [1-7](#532302_1_En_1_Chapter.xhtml#PC8) has gotten rid of a lot of code
    in Listing [1-4](#532302_1_En_1_Chapter.xhtml#PC5). You can see that the code
    that defers the results to the main thread is gone. You can also see that the
    code can be read from top to bottom – just like a normal procedural programming
    style would do! This version of the user data fetching API is simpler to read
    and simpler to write. `@MainActor` is what’s known as a *global actor*. We will
    explore actors and global actors later in the book. For now, know that the `@MainActor`
    will ensure that member updates within a function or class marked with it will
    run in the main thread.


    By understanding when to use the system’s keywords directly (Listing [1-7](#532302_1_En_1_Chapter.xhtml#PC8)
    shows that `async` and `await` are keywords themselves) and the rest of the system’s
    primitives, you will be able to write concurrent and multithreaded code that any
    programmer will be able to understand. And to make things even better, if a developer
    is new to Apple platform development but they have experience with another technology
    that makes use of `async/await`, they will be able to quickly become familiar
    with the system. Your codebase will be cleaner and welcoming for new developers
    in your team.


    Using `async/await` will prevent you from having to write low-level concurrent
    code. You will never manage threads directly. Locks are also not your responsibility
    at all. As you saw, this new system allows us to write expressive code, and pyramids
    of doom are a thing of the past.


    It is important to remember that as much as a high-level system this is, you may
    find the extremely peculiar case in which you need a lower-level tool. That said,
    most developers will be able to go through their careers without finding a single
    use case to put `async/await` aside.


    ## Requirements


    To follow along, you will need to download at least Xcode 13 from the App Store.
    If you want to use `async/await` in iOS 14 and iOS 13, you will need Xcode 13.3.
    You should be comfortable reading and writing Swift code. Some examples will be
    written in SwiftUI so as to prevent the UI code distracting you from the actual
    contents of each chapter.'
