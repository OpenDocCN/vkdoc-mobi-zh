- fmt: "### Native APIs That Use `AsyncSequence`\n\nApple has added many APIs across\
    \ their SDKs that make use of `AsyncSequence`. `URL.lines` is one, but there’s\
    \ more. This is not an exhaustive list, but these are the ones I find myself using\
    \ more often:\n\n*   `FileHandle.standardInput.bytes.lines`, which can be used\
    \ to receive input from the command line or other sources. Each command is delivered\
    \ in a `for-in` loop.\n*   URLs can access both the `lines` and `resourceBytes`\
    \ member properties. In this chapter we explored how to use `lines`. `resourceBytes`\
    \ is similar.\n*   `URLSession` has a `bytes(from:)` method, which you can use\
    \ to download data byte by byte from the network.\n*   `NotificationCenter` now\
    \ has APIs to `await` on new `notifications` of the types you are interested in.\
    \ Receiving notifications in a `for-in` loop can greatly help you reduce the logic\
    \ you need to deal with notification center triggers.\n\n## The `AsyncStream`\
    \ Object\n\nIn this book, we have explored ways to migrate existing code and patterns\
    \ to use the new features of the modern concurrency system. For example, we have\
    \ migrated closure-based code and delegate-based call to use `async/await` instead,\
    \ simplifying their usage. There are times in which you have an asynchronous data\
    \ source that delivers data over time. The SDK offers many APIs that receive streams\
    \ of data in delegates and closures. We can create `AsyncSequence` wrappers for\
    \ these and have them deliver their data in a loop. Two examples of this would\
    \ be Bluetooth, which delivers packet data in a delegate call, and CoreLocation,\
    \ which delivers coordinates, also in a delegate call. Wrapping them in `AsyncStreams`\
    \ will allow us to expose an API that can be used in `for-in` loops and have a\
    \ more natural interface.\n\n`AsyncStream` allows us to achieve stream-like functionality\
    \ that works with `for-in` loop without having to implement any iterators ourselves.\
    \ We can use it to migrate delegate-based and closure-based calls to receive their\
    \ data in a loop instead. To achieve this, `AsyncStream` conforms to `AsyncSequence`.\n\
    \nTo show you how you can use `AsyncStream`, we will create a small project that\
    \ will receive CoreLocation data as it becomes available and show it in a UI.\n\
    \n### The `CoreLocationAsyncStream` Project\n\nCreate a new SwiftUI project called\
    \ “CoreLocationAsyncStream”. This app will receive locations and show them in\
    \ a list as they are updated. Figure [9-1](#532302_1_En_9_Chapter.xhtml#Fig1)\
    \ shows a screenshot of the final product.\n\n![](images/532302_1_En_9_Chapter/532302_1_En_9_Fig1_HTML.jpg)\n\
    A screenshot of the mobile includes time, WIFI signal, full charge battery, and\
    \ the screen depicts the stop updating and locations.\n\n**Figure 9-1** The UI\
    \ will show a list of locations as they become available\n\nYou can make this\
    \ app by using delegate-based calls, but we want to use `AsyncStream` to better\
    \ understand how `AsyncStream` and `AsyncSequence` work. It will also help make\
    \ your code cleaner and keep anything to do with location in one place only.\n\
    \n#### The `LocationUpdater` Class\n\nCreate a new class called `LocationUpdater.swift`.\
    \ We will use this class to manage everything to do with location, from asking\
    \ permission to getting location updates to delivering those updates to interested\
    \ parties. Make sure you `import CoreLocation`, and give it the contents outlined\
    \ in Listing [9-9](#532302_1_En_9_Chapter.xhtml#PC9).\n\n```\nimport Foundation\n\
    import CoreLocation\n\nclass LocationUpdater: NSObject, CLLocationManagerDelegate\
    \ {\n    private(set) var authorizationStatus: CLAuthorizationStatus\n    private\
    \ let locationManager: CLLocationManager\n\n    override init() {\n        locationManager\
    \ = CLLocationManager()\n        authorizationStatus = locationManager.authorizationStatus\n\
    \        super.init()\n        locationManager.delegate = self\n        locationManager.desiredAccuracy\
    \ = kCLLocationAccuracyBest\n    }\n\n    func start() {\n        locationManager.startUpdatingLocation()\n\
    \    }\n\n    func stop() {\n        locationManager.stopUpdatingLocation()\n\
    \    }\n\n    func requestPermission() async -> CLAuthorizationStatus {\n    }\n\
    \n    // MARK: - Location Delegate\n\n    func locationManager(_ manager: CLLocationManager,\
    \ didUpdateLocations locations: [CLLocation]) {\n    }\n\n    func locationManagerDidChangeAuthorization(_\
    \ manager: CLLocationManager) {\n        authorizationStatus = manager.authorizationStatus\n\
    \    }\n}\n```\n\n**Listing 9-9** The beginning of the `LocationUpdater` class\n\
    \n##### Asking for Location Usage Permission\n\nBefore you follow the following\
    \ steps, make sure you add the `NSLocationWhenInUseUsageDescription` (`Privacy\
    \ - Location When In Use Usage Description`) key to your `Info.plist` file. This\
    \ is a user-facing string explaining the user why we need to track their location.\n\
    \n`CoreLocation` delivers the status change of authorization on a delegate call.\
    \ We can take this chance to use continuations for this. Yes, they are the same\
    \ continuations we learned about all the way back in Chapter [3](#532302_1_En_3_Chapter.xhtml).\n\
    \nStart by adding a property that will keep track of the continuation that will\
    \ deliver the authorization status. You can find it in Listing [9-10](#532302_1_En_9_Chapter.xhtml#PC10).\n\
    \n```\nprivate var permissionContinuation: CheckedContinuation?\n```\n\n**Listing\
    \ 9-10** This property will help us bridge the delegate call to `async/await`\
    \ for permission status changes\n\nGo back to the empty `requestPermission()`\
    \ method, and complete it with the code Listing [9-11](#532302_1_En_9_Chapter.xhtml#PC11).\n\
    \n```\nfunc requestPermission() async -> CLAuthorizationStatus {\n    locationManager.requestWhenInUseAuthorization()\n\
    \    if authorizationStatus != .notDetermined {\n        return authorizationStatus\n\
    \    }\n    return await withCheckedContinuation { continuation in\n        permissionContinuation\
    \ = continuation\n    }\n}\n```\n\n**Listing 9-11** Starting the continuation\
    \ to get the authorization status for location access\n\nWe are only going to\
    \ ask for the permission when the authorization status is `.notDetermined`. If\
    \ we have a different status, we will return it immediately. The reason for this\
    \ is that permission is always requested when you initialize a `CLLocationManager`\
    \ object; the permission is requested automatically by the system. If you call\
    \ the request method while the system is fetching the authorization status, you\
    \ will discard a continuation without calling `resume` on it, and you will be\
    \ deadlocked. This is one of the few situations where you can deadlock yourself\
    \ (if you start a continuation and it goes away before you can resume it), and\
    \ the good news is that this bug is easy to catch as you run your app to test\
    \ it.\n\nYou will also need to add one more line to the `locationManagerDidChangeAuthorization`\
    \ delegate method. The finished implementation for this method is in Listing [9-12](#532302_1_En_9_Chapter.xhtml#PC12).\n\
    \n```\nfunc locationManagerDidChangeAuthorization(_ manager: CLLocationManager)\
    \ {\n    authorizationStatus = manager.authorizationStatus\n    permissionContinuation?.resume(returning:\
    \ authorizationStatus)\n}\n```\n\n**Listing 9-12** When the authorization status\
    \ changes, we will resume the continuation\n\nIn this app, we are only interested\
    \ in knowing when the permission changes once in our program. It may be a good\
    \ idea to have an infinite loop that always reports authorization changes. We\
    \ could do this with an `AsyncStream`, sending location authorization updates\
    \ every time the delegate method is called and never calling `finish()`. When\
    \ the status changes, we resume the `permissionContinuation` with it, so the awaited\
    \ calls depending on it can continue executing.\n\nThis is all we need to do to\
    \ request permission one time asynchronously using `async/await`. Listing [9-13](#532302_1_En_9_Chapter.xhtml#PC13)\
    \ shows how you can use this logic to request permission.\n\n```\nlet locationUpdater\
    \ = LocationUpdater()\n// ...\nlet authorized = await locationUpdater.requestPermission()\n\
    if [CLAuthorizationStatus.authorizedAlways, .authorizedWhenInUse].contains(authorized)\
    \ {\n    // Permission authorized\n}\n```\n\n**Listing 9-13** Using the `requestPermission`\
    \ method to request location access asynchronously"
  raw: '### Native APIs That Use AsyncSequence


    Apple has added many APIs across their SDKs that make use of `AsyncSequence`.
    `URL.lines` is one, but there’s more. This is not an exhaustive list, but these
    are the ones I find myself using more often:


    *   `FileHandle.standardInput.bytes.lines`, which can be used to receive input
    from the command line or other sources. Each command is delivered in a `for-in`
    loop.


    *   URLs can access both the `lines` and `resourceBytes` member properties. In
    this chapter we explored how to use `lines`. `resourceBytes` is similar.


    *   `URLSession` has a `bytes(from:)` method, which you can use to download data
    byte by byte from the network.


    *   `NotificationCenter` now has APIs to `await` on new `notifications` of the
    types you are interested in. Receiving notifications in a for-in loop can greatly
    help you reduce the logic you need to deal with notification center triggers.


    ## The AsyncStream Object


    In this book, we have explored ways to migrate existing code and patterns to use
    the new features of the modern concurrency system. For example, we have migrated
    closure-based code and delegate-based call to use `async/await` instead, simplifying
    their usage. There are times in which you have an asynchronous data source that
    delivers data over time. The SDK offers many APIs that receive streams of data
    in delegates and closures. We can create `AsyncSequence` wrappers for these and
    have them deliver their data in a loop. Two examples of this would be Bluetooth,
    which delivers packet data in a delegate call, and CoreLocation , which delivers
    coordinates, also in a delegate call. Wrapping them in AsyncStreams will allow
    us to expose an API that can be used in `for-in` loops and have a more natural
    interface.


    `AsyncStream` allows us to achieve stream-like functionality that works with `for-in`
    loop without having to implement any iterators ourselves. We can use it to migrate
    delegate-based and closure-based calls to receive their data in a loop instead.
    To achieve this, `AsyncStream` conforms to `AsyncSequence`.


    To show you how you can use `AsyncStream`, we will create a small project that
    will receive CoreLocation data as it becomes available and show it in a UI.


    ### The CoreLocationAsyncStream Project


    Create a new SwiftUI project called “CoreLocationAsyncStream ”. This app will
    receive locations and show them in a list as they are updated. Figure [9-1](#532302_1_En_9_Chapter.xhtml#Fig1)
    shows a screenshot of the final product.


    ![](images/532302_1_En_9_Chapter/532302_1_En_9_Fig1_HTML.jpg)


    A screenshot of the mobile includes time, WIFI signal, full charge battery, and
    the screen depicts the stop updating and locations.


    Figure 9-1


    The UI will show a list of locations as they become available


    You can make this app by using delegate-based calls, but we want to use `AsyncStream`
    to better understand how `AsyncStream` and `AsyncSequence` work. It will also
    help make your code cleaner and keep anything to do with location in one place
    only.


    #### The LocationUpdater Class


    Create a new class called `LocationUpdater.swift` . We will use this class to
    manage everything to do with location, from asking permission to getting location
    updates to delivering those updates to interested parties. Make sure you `import
    CoreLocation`, and give it the contents outlined in Listing [9-9](#532302_1_En_9_Chapter.xhtml#PC9).


    ```

    import Foundation

    import CoreLocation

    class LocationUpdater: NSObject, CLLocationManagerDelegate {

    private(set) var authorizationStatus: CLAuthorizationStatus

    private let locationManager: CLLocationManager

    override init() {

    locationManager = CLLocationManager()

    authorizationStatus = locationManager.authorizationStatus

    super.init()

    locationManager.delegate = self

    locationManager.desiredAccuracy = kCLLocationAccuracyBest

    }

    func start() {

    locationManager.startUpdatingLocation()

    }

    func stop() {

    locationManager.stopUpdatingLocation()

    }

    func requestPermission() async -> CLAuthorizationStatus {

    }

    // MARK: - Location Delegate

    func locationManager(_ manager: CLLocationManager, didUpdateLocations locations:
    [CLLocation]) {

    }

    func locationManagerDidChangeAuthorization(_ manager: CLLocationManager) {

    authorizationStatus = manager.authorizationStatus

    }

    }

    Listing 9-9

    The beginning of the LocationUpdater class

    ```


    ##### Asking for Location Usage Permission


    Before you follow the following steps. Make sure you add the `NSLocationWhenInUseUsageDescription`
    (`Privacy - Location When In Use Usage Description.`) key to your Info.plist file.
    This is a user-facing string explaining the user why we need to track their location.


    `CoreLocation` delivers the status change of authorization on a delegate call.
    We can take this chance to use continuations for this. Yes, they are the same
    continuations we learned about all the way back in Chapter [3](#532302_1_En_3_Chapter.xhtml).


    Start by adding a property that will keep track of the continuation that will
    deliver the authorization status. You can find it in Listing [9-10](#532302_1_En_9_Chapter.xhtml#PC10).


    ```

    private var permissionContinuation: CheckedContinuation?

    Listing 9-10

    This property will help us bridge the delegate call to async/await for permission
    status changes

    ```


    Go back to the empty `requestPermission()` method, and complete it with the code
    Listing [9-11](#532302_1_En_9_Chapter.xhtml#PC11).


    ```

    func requestPermission() async -> CLAuthorizationStatus {

    locationManager.requestWhenInUseAuthorization()

    if authorizationStatus != .notDetermined {

    return authorizationStatus

    }

    return await withCheckedContinuation { continuation in

    permissionContinuation = continuation

    }

    }

    Listing 9-11

    Starting the continuation to get the authorization status for location access

    ```


    We are only going to ask for the permission when the authorization status is `.notDetermined`.
    If we have a different status, we will return it immediately. The reason for this
    is that permission is always requested when you initialize a `CLLocationManager`
    object , the permission is requested automatically by the system. If you call
    the request method while the system is fetching the authorization status, you
    will discard a continuation without calling `resume` on it, and you will be deadlocked.
    This is one of the few situations where you can deadlock yourself (if you start
    a continuation and it goes away before you can resume it), and the good news is
    that this bug is easy to catch as you run your app to test it.


    You will also need to add one more line to the `locationManagerDidChangeAuthorization`
    delegate method . The finished implementation for this method is in Listing [9-12](#532302_1_En_9_Chapter.xhtml#PC12).


    ```

    func locationManagerDidChangeAuthorization(_ manager: CLLocationManager) {

    authorizationStatus = manager.authorizationStatus

    permissionContinuation?.resume(returning: authorizationStatus)

    }

    Listing 9-12

    When the authorization status changes, we will resume the continuation

    ```


    In this app, we are only interested in knowing when the permission changes once
    in our program. It may be a good idea to have an infinite loop that always reports
    authorization changes. We could do this with an `AsyncStream`, sending location
    authorization updates every time the delegate method is called and never calling
    `finish().` When the status changes, we resume the `permissionContinuation` with
    it, so the awaited calls depending on it can continue executing.


    This is all we need to do to request permission one time asynchronously using
    `async/await` . Listing [9-13](#532302_1_En_9_Chapter.xhtml#PC13) shows how you
    can use this logic to request permission.


    ```

    let locationUpdater = LocationUpdater()

    // ...

    let authorized = await locationUpdater.requestPermission()

    if [CLAuthorizationStatus.authorizedAlways, .authorizedWhenInUse].contains(authorized)
    {

    // Permission authorized

    }

    Listing 9-13

    Using the requestPermission method to request location access asynchronously

    ```'
  trans: "\n### 支持`AsyncSequence`的原生 API\n\n苹果在其 SDK 中新增了许多使用`AsyncSequence`的 API。`URL.lines`是其中之一，但还有更多。以下并非完整列表，而是我个人常用的几个：\n\
    \n*   `FileHandle.standardInput.bytes.lines`，可用于接收来自命令行或其他来源的输入。每条命令均通过`for-in`循环传递。\n\
    *   可通过 URL 访问`lines`和`resourceBytes`成员属性。本章探讨了`lines`的用法，而`resourceBytes`与之类似。\n\
    *   `URLSession`提供了`bytes(from:)`方法，可用于从网络逐字节下载数据。\n*   `NotificationCenter`现在增加了\
    \ API，可通过`await`监听你感兴趣的新`notifications`。在`for-in`循环中接收通知，能大幅减少处理通知中心触发所需的逻辑。\n\
    \n## `AsyncStream`对象\n\n本书探讨了如何迁移现有代码和模式，以使用现代并发系统的新特性。例如，我们将基于闭包的代码和基于委托的调用迁移为使用`async/await`，从而简化其使用方式。当存在随时间传递数据的异步数据源时，SDK\
    \ 提供了大量通过委托和闭包接收数据流的 API。我们可以为这些数据流创建`AsyncSequence`包装器，使其在循环中传递数据。两个典型的例子是蓝牙（通过委托调用传递数据包）和\
    \ CoreLocation（同样通过委托调用传递坐标）。将它们封装在`AsyncStream`中，就能对外提供可在`for-in`循环中使用的 API，从而获得更自然的接口。\n\
    \n`AsyncStream`使我们能够实现适用于`for-in`循环的流式功能，而无需自行实现任何迭代器。我们可以用它来迁移基于委托和基于闭包的调用，使其改为在循环中接收数据。为此，`AsyncStream`遵循了`AsyncSequence`协议。\n\
    \n为了演示如何使用`AsyncStream`，我们将创建一个小项目，该项目会接收可用的 CoreLocation 数据并将其显示在 UI 中。\n\n###\
    \ `CoreLocationAsyncStream`项目\n\n创建一个名为“CoreLocationAsyncStream”的新 SwiftUI 项目。该应用将接收位置信息，并在位置更新时将其显示在列表中。图\
    \ 9-1 展示了最终产品的截图。\n\n![](img/532302_1_En_9_Fig1_HTML.jpg)\n手机截图包含时间、WiFi 信号、满电电池图标，屏幕显示了“停止更新”和位置信息。\n\
    \n**图 9-1** UI 会随着新位置数据的到达显示一个位置列表\n\n你可以使用基于委托的调用来构建此应用，但为了更深入理解`AsyncStream`和`AsyncSequence`的工作原理，我们将使用`AsyncStream`。同时，这也有助于让代码更整洁，并将所有与位置相关的逻辑集中管理。\n\
    \n#### `LocationUpdater`类\n\n创建一个名为`LocationUpdater.swift`的新类。我们将使用此类管理与位置相关的所有事务，包括请求权限、获取位置更新以及将更新传递给订阅方。确保导入了`CoreLocation`，并为其添加代码清单\
    \ 9-9 中列出的内容。\n\n```\nimport Foundation\nimport CoreLocation\n\nclass LocationUpdater:\
    \ NSObject, CLLocationManagerDelegate {\n    private(set) var authorizationStatus:\
    \ CLAuthorizationStatus\n    private let locationManager: CLLocationManager\n\n\
    \    override init() {\n        locationManager = CLLocationManager()\n      \
    \  authorizationStatus = locationManager.authorizationStatus\n        super.init()\n\
    \        locationManager.delegate = self\n        locationManager.desiredAccuracy\
    \ = kCLLocationAccuracyBest\n    }\n\n    func start() {\n        locationManager.startUpdatingLocation()\n\
    \    }\n\n    func stop() {\n        locationManager.stopUpdatingLocation()\n\
    \    }\n\n    func requestPermission() async -> CLAuthorizationStatus {\n    }\n\
    \n    // MARK: - 位置委托\n\n    func locationManager(_ manager: CLLocationManager,\
    \ didUpdateLocations locations: [CLLocation]) {\n    }\n\n    func locationManagerDidChangeAuthorization(_\
    \ manager: CLLocationManager) {\n        authorizationStatus = manager.authorizationStatus\n\
    \    }\n}\n```\n\n**代码清单 9-9** `LocationUpdater`类的初始部分\n\n##### 请求位置使用权限\n\n在遵循以下步骤之前，请确保已在`Info.plist`文件中添加了`NSLocationWhenInUseUsageDescription`（隐私\
    \ - 位置使用描述）键。这是一个面向用户的字符串，用于解释为何需要跟踪用户位置。\n\n`CoreLocation`通过委托调用传递授权状态的变化。我们可以借此机会使用续体（continuations）来处理。没错，这正是我们在第\
    \ 3 章中学到的续体。\n\n首先，添加一个属性来跟踪将传递授权状态的续体。代码见清单 9-10。\n\n```\nprivate var permissionContinuation:\
    \ CheckedContinuation?\n```\n\n**代码清单 9-10** 此属性将帮助我们桥接委托调用与`async/await`之间的权限状态变更\n\
    \n回到空的`requestPermission()`方法，并用代码清单 9-11 中的代码补全它。\n\n```\nfunc requestPermission()\
    \ async -> CLAuthorizationStatus {\n    locationManager.requestWhenInUseAuthorization()\n\
    \    if authorizationStatus != .notDetermined {\n        return authorizationStatus\n\
    \    }\n    return await withCheckedContinuation { continuation in\n        permissionContinuation\
    \ = continuation\n    }\n}\n```\n\n**代码清单 9-11** 启动续体以获取位置访问的授权状态\n\n我们仅在授权状态为`.notDetermined`时请求权限。如果状态不同，则立即返回。原因在于，当你初始化`CLLocationManager`对象时，系统会自动请求权限。如果在系统正在获取授权状态时调用请求方法，你将在未调用`resume`的情况下丢弃续体，从而导致死锁。这是少数可能发生死锁的情况之一（如果你启动了一个续体但在恢复之前它消失了）；好消息是，在运行应用进行测试时，这个错误很容易被发现。\n\
    \n你还需要在`locationManagerDidChangeAuthorization`委托方法中添加一行代码。该方法的完整实现见代码清单 9-12。\n\
    \n```\nfunc locationManagerDidChangeAuthorization(_ manager: CLLocationManager)\
    \ {\n    authorizationStatus = manager.authorizationStatus\n    permissionContinuation?.resume(returning:\
    \ authorizationStatus)\n}\n```\n\n**代码清单 9-12** 当授权状态变化时，我们将恢复续体\n\n在本应用中，我们只关心在程序运行时权限变更一次的情况。但更好的做法是设置一个无限循环，持续报告授权变更。我们可以使用`AsyncStream`来实现这一点，每次委托方法被调用时发送位置授权更新，并且永不调用`finish()`。当状态变化时，我们用新状态恢复`permissionContinuation`，这样依赖它的`await`调用就能继续执行。\n\
    \n使用`async/await`异步请求权限，只需完成以上步骤。代码清单 9-13 展示了如何使用此逻辑请求权限。\n\n```\nlet locationUpdater\
    \ = LocationUpdater()\n// ...\nlet authorized = await locationUpdater.requestPermission()\n\
    if [CLAuthorizationStatus.authorizedAlways, .authorizedWhenInUse].contains(authorized)\
    \ {\n    // 权限已授权\n}\n```\n\n**代码清单 9-13** 使用`requestPermission`方法异步请求位置访问权限\n"
- fmt: "##### Receiving Locations in a Loop\n\nNow let’s implement the logic to receive\
    \ the location objects.\n\nInternally, `AsyncStream` works with continuations.\
    \ The idea is that when you create an `AsyncStream`, it gives you a continuation\
    \ where you will send an undefined number of events of the type you are interested\
    \ in. In this project, we will send objects of type `CLLocation`. The types of\
    \ these continuations are not strictly the same as that we learned about in Chapter\
    \ [3](#532302_1_En_3_Chapter.xhtml), but they behave very similarly. The main\
    \ difference is that the continuations from Chapter [3](#532302_1_En_3_Chapter.xhtml)\
    \ must be resumed exactly once, whereas `AsyncStream` continuations can `yield()`\
    \ any number of objects, and when you are done, you need to call `finish()` to\
    \ make the sequence return `nil` and therefore stop the loop. Not calling `finish()`\
    \ will result in your `for-in` loop never finishing unless it gets explicitly\
    \ cancelled – which may be what you want in some scenarios, but feel like deadlocks\
    \ in others.\n\nAdd a property that will hold the `AsyncStream` continuation.\
    \ You can see it in Listing [9-14](#532302_1_En_9_Chapter.xhtml#PC14).\n\n```\n\
    private var streamContinuation: AsyncStream.Continuation?\nListing 9-14\nCreating\
    \ a continuation for our CLLocation AsyncStream\n```\n\nThe generic type of `AsyncStream`\
    \ tells us what kind of object the `for-in` loop will receive in every iteration.\
    \ In this case, `CLLocation`.\n\nNow, we are going to implement a `locations`\
    \ property. Its type will be `AsyncStream<CLLocation>`. This is the property `for-in`\
    \ loops will use to get new location objects as they become available. Add the\
    \ code in Listing [9-15](#532302_1_En_9_Chapter.xhtml#PC15) to the `LocationUpdater`\
    \ class.\n\n```\nvar locations: AsyncStream {\n    let stream = AsyncStream(CLLocation.self)\
    \ { continuation in\n        continuation.onTermination = { @Sendable _ in\n \
    \           self.stop()\n            self.streamContinuation = nil\n        }\n\
    \        self.streamContinuation = continuation\n        self.start()\n    }\n\
    \    return stream\n}\nListing 9-15\nWe can use the locations property to get\
    \ CLLocation objects in real time\n```\n\nWhen creating an `AsyncStream`, you\
    \ need to define what kind of object it will receive. We will stream `CLLocation`\
    \ objects, so we go with `CLLocation.self`. The initializer also takes a closure\
    \ that gives you the stream’s continuation, of type `AsyncStream<CLLocation>.Continuation`.\
    \ We can set up an optional `onTermination` closure on the continuation that will\
    \ get called after we call `finish()` on an `AsyncStream`. Use this closure if\
    \ you need to close data pipes or do any other kind of cleanup. In this project,\
    \ if the user chooses to no longer receive location updates by pressing a button,\
    \ we will tell the location manager to stop tracking the location. Notice that\
    \ the continuation is marked as `@Sendable`. This closure may safely be used across\
    \ different concurrent domains. If you don’t mark it as such, you won’t be able\
    \ to stop the `locationManager` from delivering updates.\n\nThe next line assigns\
    \ the continuation to our `streamContinuation` variable. We need to keep this\
    \ variable around because location events are delivered on a delegate method.\
    \ After we have configured the continuation, we can start tracking the user’s\
    \ location, by calling the `start()` method. This will start the `locationManager`’s\
    \ ability to send location updates.\n\nThe `locations` variable can now deliver\
    \ `CLLocation` objects in real time, but we are not quite done yet. We are not\
    \ properly calling the `finish()` method, so this loop will never end, and we\
    \ are not actually delivering location objects anywhere.\n\nWe will stop streaming\
    \ when the `stop()` method gets called. Modify this method so it looks like the\
    \ one in Listing [9-16](#532302_1_En_9_Chapter.xhtml#PC16).\n\n```\nfunc stop()\
    \ {\n    locationManager.stopUpdatingLocation()\n    streamContinuation?.finish()\n\
    }\nListing 9-16\nFinishing the continuation\n```\n\nWhen we call `finish()`, the\
    \ continuation’s `onTermination` closure will be called as well. In this particular\
    \ example, it may look weird that `stop()` can trigger `onTermination`, and that\
    \ `onTermination` calls `stop()`. We are doing this because in the event the `Task`\
    \ that is running the `for-in` loop is cancelled, we want to stop receiving locations\
    \ as well. You could directly call `locationManager.stopUpdatingLocation()` within\
    \ `onTermination`, but I prefer the idiomatic approach of calling our own `stop()`.\
    \ Because we set `streamContinuation` to `nil` within `onTermination`, there is\
    \ no danger or recursive calls here.\n\nNow we can do the required changes to\
    \ the `locationManager(_ manager: CLLocationManager, didUpdateLocations locations:\
    \ [CLLocation])`. We need to deliver the locations we receive to the continuation.\
    \ Listing [9-17](#532302_1_En_9_Chapter.xhtml#PC17) shows its final implementation.\n\
    \n```\nfunc locationManager(_ manager: CLLocationManager, didUpdateLocations locations:\
    \ [CLLocation]) {\n    locations.forEach { streamContinuation?.yield($0) }\n}\n\
    Listing 9-17\nDelivering the location objects to the continuation\n```\n\nYou\
    \ may have noticed the delegate gives us an array of location objects. Each time\
    \ this method is called, it may have more than one object. So we will iterate\
    \ over the array of received objects and `yield()` them to the continuation on\
    \ each call. With this, we have finished the functionality for `LocationUpdater`,\
    \ and callers can now use the `locations` property to receive events in real time\
    \ in a loop.\n\nListing [9-18](#532302_1_En_9_Chapter.xhtml#PC18) shows how callers\
    \ can make use of this object to receive location objects in a `for-in` loop.\n\
    \n```\nself locationUpdater = LocationUpdater()\n//... After confirming we are\
    \ authorized.\nfor await newCoordinate in locationUpdater.locations {\n    //\
    \ Do something with the newly received newCoordinate object.\n}\nListing 9-18\n\
    Using the locations AsyncStream\n```"
  raw: '##### Receiving Locations in a Loop


    Now let’s implement the logic to receive the location objects .


    Internally, `AsyncStream` works with continuations. The idea is that when you
    create an `AsyncStream`, it gives you a continuation where you will send an undefined
    number of events of the type you are interested in. In this project, we will send
    objects of type `CLLocation`. The types of these continuations are not strictly
    the same as that we learned about in Chapter [3](#532302_1_En_3_Chapter.xhtml),
    but they behave very similarly. The main difference is that the continuations
    from Chapter [3](#532302_1_En_3_Chapter.xhtml) must be resumed exactly once, whereas
    `AsyncStream` continuations can `yield()` any number of objects, and when you
    are done, you need to call `finish()` to make the sequence return `nil` and therefore
    stop the loop. Not calling `finish()` will result in your `for-in` loop never
    finishing unless it gets explicitly cancelled – which may be what you want in
    *some* scenarios, but feel like deadlocks in others.


    Add a property that will hold the `AsyncStream` continuation. You can see it in
    Listing [9-14](#532302_1_En_9_Chapter.xhtml#PC14).


    ```

    private var streamContinuation: AsyncStream.Continuation?

    Listing 9-14

    Creating a continuation for our CLLocation AsyncStream

    ```


    The generic type of `AsyncStream` tells us what kind of object the for-in loop
    will receive in every iteration. In this case, `CLLocation`.


    Now, we are going to implement a locations property. Its type will be `AsyncStream<CLLocation>`.
    This is the property `for-in` loops will use to get new location objects as they
    become available. Add the code in Listing [9-15](#532302_1_En_9_Chapter.xhtml#PC15)
    to the `LocationUpdater` class.


    ```

    var locations: AsyncStream {

    let stream = AsyncStream(CLLocation.self) { continuation in

    continuation.onTermination = { @Sendable _ in

    self.stop()

    self.streamContinuation = nil

    }

    self.streamContinuation = continuation

    self.start()

    }

    return stream

    }

    Listing 9-15

    We can use the locations property to get CLLocation objects in real time

    ```


    When creating an `AsyncStream`, you need to define what kind of object it will
    receive. We will stream `CLLocation` objects, so we go with `CLLocation.self`.
    The initializer also takes a closure that gives you the stream’s continuation,
    of type `AsyncStream<CLLocation>.Continuation`. We can set up an optional `onTermination`
    closure on the continuation that will get called after we call `finish()` on an
    `AsyncStream`. Use this closure if you need to close data pipes or do any other
    kind of cleanup. In this project, if the user chooses to no longer receive location
    updates by pressing a button, we will tell the location manager to stop tracking
    the location. Notice that the continuation is marked as `@Sendable`. This closure
    may safely be used across different concurrent domains. If you don’t mark it as
    such, you won’t be able to stop the `locationManager` from delivering updates.


    The next line assigns the continuation to our `streamContinuation` variable. We
    need to keep this variable around because location events are delivered on a delegate
    method. After we have configured the continuation, we can start tracking the user’s
    location, by calling the `start()` method . This will start the `locationManager`’s
    ability to send location updates.


    The locations variable can now deliver `CLLocation` objects in real time, but
    we are not quite done yet. We are not properly calling the `finish()` method ,
    so this loop will never end, and we are not actually delivering location objects
    anywhere.


    We will stop streaming when the `stop()` method gets called. Modify this method
    so it looks like the one in Listing [9-16](#532302_1_En_9_Chapter.xhtml#PC16).


    ```

    func stop() {

    locationManager.stopUpdatingLocation()

    streamContinuation?.finish()

    }

    Listing 9-16

    Finishing the continuation

    ```


    When we call `finish()`, the continuation’s `onTermination` closure will be called
    as well. In this particular example , it may look weird that `stop()` can trigger
    `onTermination`, and that `onTermination` calls `stop()`. We are doing this because
    in the event the `Task` that is running the `for-in` loop is cancelled, we want
    to stop receiving locations as well. You could directly call `locationManager.stopUpdatingLocation`()
    within `onTermination`, but I prefer the idiomatic approach of calling our own
    `stop()`. Because we set `streamContinuation` to `nil` within `onTermination`,
    there is no danger or recursive calls here.


    Now we can do the required changes to the `locationManager(_ manager: CLLocationManager,
    didUpdateLocations locations: [CLLocation])`. We need to deliver the locations
    we receive to the continuation. Listing [9-17](#532302_1_En_9_Chapter.xhtml#PC17)
    shows its final implementation.


    ```

    func locationManager(_ manager: CLLocationManager, didUpdateLocations locations:
    [CLLocation]) {

    locations.forEach { streamContinuation?.yield($0) }

    Listing 9-17

    Delivering the location objects to the continuation

    ```


    You may have noticed the delegate gives us an array of location objects. Each
    time this method is called, it may have more than one object. So we will iterate
    over the array of received objects and `yield()` them to the continuation on each
    call. With this, we have finished the functionality for `LocationUpdater`, and
    callers can now use the locations property to receive events in real time in a
    loop.


    Listing [9-18](#532302_1_En_9_Chapter.xhtml#PC18) shows how callers can make use
    of this object to receive location objects in a `for-in` loop.


    ```

    self locationUpdater = LocationUpdater()

    //... After confirming we are authorized.

    for await newCoordinate in locationUpdater.locations {

    // Do something with the newly received newCoordinate object.

    }

    Listing 9-18

    Using the locations AsyncStream

    ```'
  trans: "\n##### 在循环中接收位置信息\n\n现在让我们实现接收位置对象的逻辑。\n\n在内部，`AsyncStream` 通过延续（continuation）机制工作。其核心理念是：当你创建一个\
    \ `AsyncStream` 时，它会为你提供一个延续，你可以通过该延续发送任意数量的、你所关注类型的事件。在本项目中，我们将发送 `CLLocation`\
    \ 类型的对象。这些延续的类型与我们之前在第 3 章学到的并不完全相同，但行为非常相似。主要区别在于，第 3 章中的延续必须且仅能恢复一次，而 `AsyncStream`\
    \ 的延续可以调用任意次数的 `yield()` 来产出对象。当你完成所有操作后，需要调用 `finish()` 使序列返回 `nil`，从而终止循环。如果不调用\
    \ `finish()`，你的 `for-in` 循环将永远不会结束——除非被显式取消。在某些场景下这可能是你期望的行为，但在其他场景中则会类似死锁。\n\n\
    添加一个用于保存 `AsyncStream` 延续的属性。你可以在代码清单 9-14 中看到它。\n\n```\nprivate var streamContinuation:\
    \ AsyncStream.Continuation?\n代码清单 9-14 为我们的 CLLocation AsyncStream 创建延续\n```\n\
    \n`AsyncStream` 的泛型类型定义了 `for-in` 循环在每次迭代中将接收哪种类型的对象。在本例中，该类型为 `CLLocation`。\n\
    \n接下来，我们将实现一个 `locations` 属性。其类型将是 `AsyncStream<CLLocation>`。`for-in` 循环将使用此属性来获取可用时的新位置对象。将代码清单\
    \ 9-15 中的代码添加到 `LocationUpdater` 类中。\n\n```\nvar locations: AsyncStream {\n  \
    \  let stream = AsyncStream(CLLocation.self) { continuation in\n        continuation.onTermination\
    \ = { @Sendable _ in\n            self.stop()\n            self.streamContinuation\
    \ = nil\n        }\n        self.streamContinuation = continuation\n        self.start()\n\
    \    }\n    return stream\n}\n代码清单 9-15 我们可以使用 locations 属性实时获取 CLLocation 对象\n\
    ```\n\n创建 `AsyncStream` 时，你需要定义它将接收哪种类型的对象。我们将流式传输 `CLLocation` 对象，因此使用 `CLLocation.self`。初始化器还接收一个闭包，该闭包会提供流的延续，其类型为\
    \ `AsyncStream<CLLocation>.Continuation`。我们可以在延续上设置一个可选的 `onTermination` 闭包，该闭包将在我们对\
    \ `AsyncStream` 调用 `finish()` 后被调用。如果你需要关闭数据管道或执行任何其他类型的清理工作，请使用此闭包。在本项目中，如果用户按下按钮选择不再接收位置更新，我们将通知位置管理器停止追踪位置。请注意，延续被标记为\
    \ `@Sendable`。这意味着该闭包可以在不同的并发域中安全使用。如果不这样标记，你将无法阻止 `locationManager` 传递更新。\n\n\
    下一行将延续赋值给我们的 `streamContinuation` 变量。我们需要保留此变量，因为位置事件是通过代理方法传递的。配置好延续后，我们可以通过调用\
    \ `start()` 方法开始追踪用户的位置。这将启动 `locationManager` 发送位置更新的能力。\n\n现在，`locations` 变量可以实时传递\
    \ `CLLocation` 对象了，但工作尚未完全完成。我们还没有正确调用 `finish()` 方法，因此这个循环永远不会结束，而且实际上也并未在任何地方传递位置对象。\n\
    \n当 `stop()` 方法被调用时，我们将停止流式传输。修改此方法，使其看起来像代码清单 9-16 中的代码。\n\n```\nfunc stop()\
    \ {\n    locationManager.stopUpdatingLocation()\n    streamContinuation?.finish()\n\
    }\n代码清单 9-16 结束延续\n```\n\n当我们调用 `finish()` 时，延续的 `onTermination` 闭包也将被调用。在这个特定示例中，`stop()`\
    \ 触发 `onTermination`，而 `onTermination` 又调用 `stop()`，这看起来可能有些奇怪。我们这样做是因为，如果运行 `for-in`\
    \ 循环的 `Task` 被取消，我们也希望停止接收位置。你可以在 `onTermination` 中直接调用 `locationManager.stopUpdatingLocation()`，但我更倾向于调用我们自己的\
    \ `stop()` 方法这种惯用做法。因为我们在 `onTermination` 中将 `streamContinuation` 设置为 `nil`，所以这里不存在递归调用的风险。\n\
    \n现在我们可以对 `locationManager(_ manager: CLLocationManager, didUpdateLocations locations:\
    \ [CLLocation])` 进行必要的修改。我们需要将接收到位置传递给延续。代码清单 9-17 展示了其最终实现。\n\n```\nfunc locationManager(_\
    \ manager: CLLocationManager, didUpdateLocations locations: [CLLocation]) {\n\
    \    locations.forEach { streamContinuation?.yield($0) }\n}\n代码清单 9-17 将位置对象传递给延续\n\
    ```\n\n你可能已经注意到，代理给我们的是一个位置对象的数组。每次调用此方法时，它可能包含多个对象。因此，我们将遍历接收到的对象数组，并在每次调用时将每个对象\
    \ `yield()` 给延续。至此，我们完成了 `LocationUpdater` 的功能。调用者现在可以使用 `locations` 属性在循环中实时接收事件。\n\
    \n代码清单 9-18 展示了调用者如何在 `for-in` 循环中使用此对象来接收位置信息。\n\n```\nself locationUpdater =\
    \ LocationUpdater()\n//... 在确认已授权之后。\nfor await newCoordinate in locationUpdater.locations\
    \ {\n    // 对接收到的 newCoordinate 对象进行处理。\n}\n代码清单 9-18 使用 locations AsyncStream\n\
    ```\n"
- fmt: '### Finishing the Project


    We can now continue writing the rest of the app. Go to the `ContentView.swift`
    file and create the `ContentViewViewModel` class there. You can create it on a
    different file if you wish. Its entire implementation is small, so I will put
    all of it in Listing [9-19](#532302_1_En_9_Chapter.xhtml#PC19).


    ```

    @MainActor

    class ContentViewViewModel: ObservableObject {

    @Published private(set) var locations: [CLLocation] = []

    let locationUpdater = LocationUpdater()

    func startUpdating() async {

    let authorized = await locationUpdater.requestPermission()

    if [CLAuthorizationStatus.authorizedAlways, .authorizedWhenInUse].contains(authorized)
    {

    for await newCoordinate in locationUpdater.locations {

    locations += [newCoordinate]

    }

    }

    }

    func stopUpdating() {

    locationUpdater.stop()

    }

    }

    Listing 9-19

    ViewModel for the view that will show the locations

    ```


    We are making the whole class run on the `@MainActor` due to the fact it can update
    the UI. The view will read the `@Published locations` property to display them
    in the list.


    The `startUpdating` method will kickstart the operation to receive locations.
    It will begin by asynchronously requesting permission to track the user’s location.
    Once we have permission, we will access the `locationUpdater`’s locations property
    in the loop. This is the `AsyncStream<CLLocation>` we created earlier. `AsyncStream`
    is an `AsyncSequence`, so we can iterate over it with an `await`. This loop will
    be infinite until the `stopUpdating` method is called, which will cause the sequence
    to return `nil` and hence end the loop.


    Finally, we can implement the UI. The UI is also rather small, so I can post it
    in a single listing. Listing [9-20](#532302_1_En_9_Chapter.xhtml#PC20) shows our
    completed UI.


    ```

    @MainActor

    struct ContentView: View {

    @StateObject var viewModel = ContentViewViewModel()

    var body: some View {

    NavigationView {

    List(viewModel.locations, id: \.hash) { location in

    Text("\(location.coordinate.longitude), \(location.coordinate.latitude)")

    }

    .navigationTitle("Locations")

    .task {

    await viewModel.startUpdating()

    }

    .navigationBarItems(

    leading: EmptyView(),

    trailing: Button("Stop Updating") {

    viewModel.stopUpdating()

    }

    )

    .navigationViewStyle(.stack)

    }

    }

    }

    Listing 9-20

    The UI of the app

    ```


    We are done! We use the `.task` modifier to call the view model’s `startUpdating`
    method. `.task` is called as soon as the view appears, and cancelled when it disappears,
    so it’s useful to use it when working with concurrency. The “Stop Updating” button
    will stop the stream.


    You can download the finished project, called “`CoreLocationAsyncStream`”.


    ### The `AsyncThrowingStream` Object


    Like many objects in the new concurrency system, `AsyncStream` has its throwing
    variation which you can use if your loop can throw errors. The object is `AsyncThrowingStream`,
    and it is as easy to use as `AsyncStream`.


    You will be able to `yield` values, `finish` it normally, or `finish(with:)` with
    an error. If you are using `AsyncThrowingStream`, you will need to have a `for
    try await` loop.


    ### Summary


    In this chapter, we learned about `AsyncSequence`s. `AsyncSequence`s are almost
    like normal `Sequence`s, except they work with the new concurrency system. `AsyncSequence`s
    can deliver their data over time in a `for-in` loop, until the underlying source
    decides to send a `nil` value. While you can use many of the higher-order functions
    such as `filter`, `map`, and `reduce`, these operations won’t start until you
    use your `AsyncSequence` in a loop, unlike Sequences where the operations are
    triggered automatically as they are chained.


    We also learned about `AsyncStream`. We can use `AsyncStream` to bridge closure-based
    or delegate-based calls that deliver data over time to the `async/await` world.
    We explored how we can use it with the `CoreLocation` framework, and the considerations
    you need to keep in mind when using this object. An `AsyncStream` is an `AsyncSequence`,
    so everything you can do with `AsyncSequence`, you can do with `AsyncStream`.
    If your sequence can throw, you can use `AsyncThrowingStream` instead of `AsyncStream`.


    # 10. `@TaskLocal`


    Swift as a language is rich in a lot of features. The language itself supports
    the existence of the modern concurrency system, by introducing features that make
    it possible to catch a lot of common concurrency problems at compile-time rather
    than runtime. This makes it easy to release very robust apps even if they use
    a lot of concurrency behind the scenes.


    Swift has one very slightly obscure feature – Property wrappers. They are used
    in many places in SwiftUI (`@State`, `@StateObject`, `@EnvironmentObject`, etc.),
    but other than that, many developers are not aware that it’s possible to have
    property wrappers that have nothing to do with SwiftUI. They can even create their
    own. You can recognize property wrappers almost instantly because they begin with
    the `@` symbol, although they may be confused with other Swift features (such
    as attributes or even global actors).


    The Swift team has brought an interesting property wrapper that is to be used
    with the new concurrency system. We are talking about `@TaskLocal`, and it can
    be used to share data across other tasks in the task tree. As we have learned,
    the task tree dictates how tasks will inherit some properties, including the actor
    they are running on, the priority, cancellation status, and *task local variables*.
    We have already learned how all the previous inherited context works, but we have
    yet to learn about task local variables.


    ## Introducing the `@TaskLocal` Property Wrapper


    `@TaskLocal` values can be read and written to in the context of a task. The value
    is shared implicitly, and it is accessible by any child tasks the task itself
    may create, whether they are `async let` or `group tasks`.'
