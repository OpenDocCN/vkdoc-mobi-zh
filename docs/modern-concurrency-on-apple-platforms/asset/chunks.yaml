- fmt: "# Understanding Structured Concurrency\n\nStructured Concurrency follows the\
    \ same idea as structured programming. It’s all about writing code in the order\
    \ we expect it to run and seeing predictable (or at least semi-predictable) results.\
    \ Unlike closure-based code, variables have a well-defined scope, and you can\
    \ expect your code to not jump to other places that break the reading flow of\
    \ your code. This also spares you from concerning yourself with other details\
    \ such as memory management (what happens to variables captured in blocks? can\
    \ closures be retained? `weak self`? huh?).\n\nAnd that is if you are only thinking\
    \ about closure-based calls that are not concurrent. Can you picture your code\
    \ with multiple closure-based concurrent calls, where a lot of independent code\
    \ is running at the same time?\n\nWith structured concurrency, we can have multiple\
    \ code paths running at the same time with results we can predict, without having\
    \ to think about labyrinths of code that jump through multiple closure-based calls.\n\
    \nThe new `async/await` system offers two ways to do structured concurrency: the\
    \ `async let` construct, and task groups.\n\n## The `async let` Construct\n\n\
    Also known as an *async let binding*. Creating your first bits of concurrent with\
    \ this code is underwhelmingly simple. If you know how to create a constant with\
    \ `let`, you can use `async let`. To run code concurrently, all you need to do\
    \ is to tack the `async` keyword before a `let` declaration. The rest of your\
    \ declaration looks like a normal Swift variable initialization. Do note that\
    \ to be able to do this, you must be within an asynchronous context – either inside\
    \ a `Task` or within a function marked as `async`. As your code runs through `async\
    \ let` declarations, everything after the assignment will take place somewhere\
    \ else (the functions and methods launched may run in different threads), and\
    \ the tasks will run concurrently. `async let` tasks are created as subtasks of\
    \ the task that created them.\n\nWith that said, we can do some changes to Listing\
    \ [4-1](#532302_1_En_4_Chapter.xhtml#PC1). We said earlier that we can fetch the\
    \ profile info and followers and following users’ data at the same time because\
    \ they are completely independent of each other. We will create a different function\
    \ to illustrate how `async let` works. The function in Listing [4-2](#532302_1_En_4_Chapter.xhtml#PC2)\
    \ creates a new function, `fetchData`, that will do the two network calls concurrently\
    \ to fill the `UserProfileView` screen.\n\n```swift\nfunc fetchData() async throws\
    \ -> (userInfo: UserInfo, followingFollowersInfo: FollowerFollowingInfo) {\n \
    \   let userApi = UserAPI()\n    async let userInfo = userApi.fetchUserInfo()\n\
    \    async let followers = userApi.fetchFollowingAndFollowers()\n    return (try\
    \ await userInfo, try await followers)\n}\n```\n\n*Listing 4-2 — Using `async\
    \ let` to run code concurrently*\n\nIf you were to add print statements sandwiched\
    \ between the `async let` calls, you would see that they get called instantly.\
    \ `userInfo` and `followers` will run at the same time, but the code suspends\
    \ right before it’s time to return. Recall that the `await` keyword is a suspension\
    \ point, meaning our function will suspend until both `fetchUserInfo` and `fetchFollowingAndFollowers`\
    \ return or either of them throws an error.\n\nYou may remember that in Chapter\
    \ [2](#532302_1_En_2_Chapter.xhtml) we said that every `async` call must be paired\
    \ with an `await`. But we never said that the `await` must be on the same line.\
    \ With `async let`, the `await` keyword is needed when you need the value of the\
    \ variable that was assigned as part of the `async let`. So, if your `async let`\
    \ call returns a value another function will depend on, you await at the call\
    \ site. If you need to get multiple values concurrently inside a function, you\
    \ can await right at the `return` statement. The rule that states that an `async`\
    \ call must be paired with an `await` keyword is not violated.\n\nUsing `async\
    \ let` is useful and you can use the `await` keyword anywhere, whether it is in\
    \ a single variable declaration, or when waiting for array elements, before returning\
    \ a tuple like we did in Listing [4-2](#532302_1_En_4_Chapter.xhtml#PC2), and\
    \ more.\n\nIf you prefer, you can write the last line of the function, which currently\
    \ is `return (try await userInfo, try await followers)`, as `return try await\
    \ (userInfo, followers)`, saving you from writing some code. Whichever you choose\
    \ is a stylistic choice.\n\nListing [4-3](#532302_1_En_4_Chapter.xhtml#PC3) shows\
    \ the changes to the `authenticateAndFetchProfile()` method that makes use of\
    \ the new `fetchData()` method:\n\n```swift\nfunc authenticateAndFetchProfile()\
    \ async {\n    isAuthenticated = await authenticateWithBiometrics()\n    if isAuthenticated\
    \ {\n        do {\n            loadingStatus = .loading\n            let data\
    \ = try await fetchData()\n            userInfo = data.userInfo\n            followingFollowersInfo\
    \ = data.followingFollowersInfo\n            self.loadingStatus = .idle\n    \
    \    } catch {\n            loadingStatus = .error(error)\n        }\n    }\n\
    }\n```\n\n*Listing 4-3 — Changes to `authenticateAndFetchProfile()`*\n\nWe are\
    \ now calling the `fetchData` method which will return a tuple. Note that we still\
    \ need to call it with `await`, because even though the logic within it may have\
    \ `async let` calls, this signature itself for this method is still `async`. This\
    \ method will only return when both `async let` tasks within it have finished.\
    \ That said, you could still call `fetchData` with `async let` to run it concurrently\
    \ alongside other tasks.\n\n> **Note**\n> While we use the `async let` construct\
    \ to explicitly state our intention of running tasks concurrently, it is still\
    \ up to the system to decide if it will indeed run your code concurrently or if\
    \ it will reuse another thread for multiple calls. That is to say, the system\
    \ may decide to run `fetchUserInfo` and `fetchFollowingAndFollowers`, both in\
    \ a different but shared thread, essentially running them serially, away from\
    \ the main thread.\n\nYou can download the “Chapter [2](#532302_1_En_2_Chapter.xhtml)\
    \ - Social Media App (Async-Await)(`async let`)” sample project to see the code\
    \ in action if you don’t want to do the changes yourself.\n\n## Task Groups\n\n\
    `async let` constructs are ideal when you know the amount of concurrency involved\
    \ for a given task. In our Social Media App, we know that we need to fetch the\
    \ profile info and the followers info – that’s exactly two tasks we can run at\
    \ the same time. But there will be times in which you don’t know the amount of\
    \ concurrency needed to finish a certain functionality of your app. Imagine you\
    \ have an app that allows users to download a dynamic number of images, or you\
    \ want to apply filters to a variable number of images at once. In these cases,\
    \ we could need one task, two tasks, 300 tasks, or more. For these situations,\
    \ the `async/await` system provides us with Task Groups.\n\nTask Groups are a\
    \ structured concurrency tool that allows us to run an unknown number of (possibly)\
    \ concurrent tasks at once, provided they are related. If you have too many tasks\
    \ Swift won’t run all of them at once, and it will prioritize tasks and run as\
    \ many of them as possible concurrently."
  raw: '## Understanding Structured Concurrency


    Structured Concurrency follows the same idea as structured programming. It’s all
    about writing code in the order we expect it to run and seeing predictable (or
    at least semi-predictable) results. Unlike closure-based code, variables have
    a well-defined scope, and you can expect your code to not jump to other places
    that break the reading flow of your code. This also spares you from concerning
    yourself with other details such as memory management (what happens to variables
    captured in blocks? can closures be retained? “weak self”? huh?).


    And that is if you are only thinking about closure-based calls that are not concurrent.
    Can you picture your code with multiple closure-based concurrent calls, where
    a lot of independent code is running at the same time?


    With structured concurrency , we can have multiple code paths running at the same
    time with results we can predict, without having to think about labyrinths of
    code that jump through multiple closure-based calls.


    The new `async/await` system offers two ways to do structured concurrency: the
    `async let` construct, and task groups.


    ### The async let construct


    Also known as an *async let binding* . Creating your first bits of concurrent
    with this code is underwhelmingly simple. If you know how to create a constant
    with `let`, you can use `async let` . To run code concurrently, all you need to
    do is to tack the `async` keyword before a `let` declaration. The rest of your
    declaration looks like a normal Swift variable initialization. Do note that to
    be able to do this, you must be within an asynchronous context – either inside
    a `Task` or within a function marked as `async`. As your code runs through `async
    let` declarations, everything after the assignment will take place somewhere else
    (the functions and methods launched may run in different threads), and the tasks
    will run concurrently. `async let` tasks are created as subtasks of the task that
    created them.


    With that said, we can do some changes to Listing [4-1](#532302_1_En_4_Chapter.xhtml#PC1).
    We said earlier that we can fetch the profile info and followers and following
    users’ data at the same time because they are completely independent of each other.
    We will create a different function to illustrate how `async let` works. The function
    in Listing [4-2](#532302_1_En_4_Chapter.xhtml#PC2) creates a new function, `fetchData`,
    that will do the two network calls concurrently to fill the `UserProfileView`
    screen.


    ```

    func fetchData() async throws -> (userInfo: UserInfo, followingFollowersInfo:
    FollowerFollowingInfo) {

    let userApi = UserAPI()

    async let userInfo = userApi.fetchUserInfo()

    async let followers = userApi.fetchFollowingAndFollowers()

    return (try await userInfo, try await followers)

    }

    Listing 4-2

    Using async let to run code concurrently

    ```


    If you were to add print statements sandwiched between the `async let` calls,
    you would see that they get called instantly. `userInfo` and `followers` will
    run at the same time, but the code suspends right before it’s time to return.
    Recall that the `await` keyword is a suspension point, meaning our function will
    suspend until both `fetchUserInfo` and `fetchFollowingAndFollowers` return or
    either of them throws an error.


    You may remember that in Chapter [2](#532302_1_En_2_Chapter.xhtml) we said that
    every `async` call must be paired with an `await`. But we never said that the
    await must be on the same line. With `async let` , the `await` keyword is needed
    when you need the value of the variable that was assigned as part of the `async
    let`. So, if your `async let` call returns a value another function will depend
    on, you await at the call site. If you need to get multiple values concurrently
    inside a function, you can await right at the `return` statement. The rule that
    states that an `async` call must be paired with an `await` keyword is not violated.


    Using `async let` is useful and you can use the `await` keyword anywhere, whether
    it is in a single variable declaration, or when waiting for array elements, before
    returning a tuple like we did in Listing [4-2](#532302_1_En_4_Chapter.xhtml#PC2),
    and more.


    If you prefer, you can write the last line of the function, which currently is
    `return (try await userInfo, try await followers)`, as `return try await (userInfo,
    followers)`, saving you from writing some code. Whichever you choose is a stylistic
    choice.


    Listing [4-3](#532302_1_En_4_Chapter.xhtml#PC3) shows the changes to the `authenticateAndFetchProfile()`
    method that makes use of the new `fetchData()` method :


    ```

    func authenticateAndFetchProfile() async {

    isAuthenticated = await authenticateWithBiometrics()

    if isAuthenticated {

    do {

    loadingStatus = .loading

    let data = try await fetchData()

    userInfo = data.userInfo

    followingFollowersInfo = data.followingFollowersInfo

    self.loadingStatus = .idle

    } catch {

    loadingStatus = .error(error)

    }

    }

    }

    Listing 4-3

    Changes to authenticateAndFetchProfile()

    ```


    We are now calling the `fetchData` method which will return a tuple. Note that
    we still need to call it with `await`, because even though the logic within it
    may have `async let` calls, this signature itself for this method is still `async`.
    This method will only return when both `async let` tasks within it have finished.
    That said, you could still call `fetchData` with `async let` to run it concurrently
    alongside other tasks.


    Note


    While we use the `async let` construct to explicitly state our intention of running
    tasks concurrently, it is still up to the system to decide if it will indeed run
    your code concurrently or if it will reuse another thread for multiple calls.
    That is to say, the system may decide to run `fetchUserInfo` and `fetchFollowingAndFollowers`,
    both in a different but shared thread, essentially running them serially, away
    from the main thread.


    You can download the “Chapter [2](#532302_1_En_2_Chapter.xhtml) - Social Media
    App (Async-Await)(async let)” sample project to see the code in action if you
    don’t want to do the changes yourself.


    ### Task Groups


    `async let` constructs are ideal when you know the amount of concurrency involved
    for a given task. In our Social Media App , we know that we need to fetch the
    profile info and the followers info – that’s exactly two tasks we can run at the
    same time. But there will be times in which you don’t know the amount of concurrency
    needed to finish a certain functionality of your app. Imagine you have an app
    that allows users to download a dynamic number of images, or you want to apply
    filters to a variable number of images at once. In these cases, we could need
    one task, two tasks, 300 tasks, or more. For these situations, the `async/await`
    system provides us with Task Groups.


    Task Groups are a structured concurrency tool that allows us to run an unknown
    number of (possibly) concurrent tasks at once, provided they are related. If you
    have too many tasks Swift won’t run all of them at once, and it will prioritize
    tasks and run as many of them as possible concurrently.'
  trans: "\n# 理解结构化并发\n\n结构化并发遵循与结构化编程相同的理念。其核心是按照代码预期执行的顺序来编写代码，并看到可预测（或至少半可预测）的结果。与基于闭包的代码不同，变量具有明确定义的作用域，你可以期望代码不会跳转到其他破坏代码阅读流程的地方。这也让你无需操心其他细节，比如内存管理（闭包中捕获的变量会发生什么？闭包能否被持有？`weak\
    \ self`？嗯？）。\n\n而以上这些还仅仅是思考那些非并发的基于闭包的调用时的情况。你能想象你的代码中包含多个基于闭包的并发调用，其中大量独立代码同时运行的情形吗？\n\
    \n有了结构化并发，我们可以让多个代码路径同时运行，并得到可预测的结果，而无需考虑那些在多个基于闭包的调用之间跳转的迷宫般的代码。\n\n新的 `async/await`\
    \ 系统提供了两种实现结构化并发的方式：`async let` 构造体和任务组。\n\n## `async let` 构造体\n\n也称为 *async let\
    \ 绑定*。用这段代码创建你的第一个并发片段简单得令人难以置信。如果你知道如何用 `let` 创建一个常量，那么你就能使用 `async let`。要并发运行代码，你只需要在\
    \ `let` 声明前加上 `async` 关键字。声明的其余部分看起来就像普通的 Swift 变量初始化。请注意，要执行此操作，你必须处于异步上下文中——要么在\
    \ `Task` 内部，要么在标记为 `async` 的函数内。当你的代码在 `async let` 声明中运行时，赋值之后的所有内容都将在其他地方执行（被启动的函数和方法可能会在不同的线程中运行），并且这些任务将并发运行。`async\
    \ let` 任务作为创建它们的任务的子任务被创建。\n\n说到这里，我们可以对代码清单 4-1 做一些修改。我们之前提到过，可以同时获取个人资料信息和关注者及关注用户的数据，因为它们彼此完全独立。我们将创建一个不同的函数来说明\
    \ `async let` 是如何工作的。代码清单 4-2 中的函数创建了一个新函数 `fetchData`，它将并发执行两次网络调用来填充 `UserProfileView`\
    \ 屏幕。\n\n```swift\nfunc fetchData() async throws -> (userInfo: UserInfo, followingFollowersInfo:\
    \ FollowerFollowingInfo) {\n    let userApi = UserAPI()\n    async let userInfo\
    \ = userApi.fetchUserInfo()\n    async let followers = userApi.fetchFollowingAndFollowers()\n\
    \    return (try await userInfo, try await followers)\n}\n```\n\n*代码清单 4-2 — 使用\
    \ `async let` 并发运行代码*\n\n如果你在 `async let` 调用之间插入打印语句，你会看到它们被立即调用。`userInfo` 和\
    \ `followers` 会同时运行，但代码在即将返回之前会暂停。回想一下，`await` 关键字是一个挂起点，这意味着我们的函数将暂停，直到 `fetchUserInfo`\
    \ 和 `fetchFollowingAndFollowers` 都返回或其中任何一个抛出错误。\n\n你可能还记得，在第 2 章中，我们说过每个 `async`\
    \ 调用都必须配对一个 `await`。但我们从未说过 `await` 必须在同一行。使用 `async let` 时，当你需要作为 `async let`\
    \ 一部分赋值的变量的值时，才需要使用 `await` 关键字。因此，如果你的 `async let` 调用返回一个值供另一个函数使用，你就在调用点处 `await`。如果你需要在函数内部并发获取多个值，你可以在\
    \ `return` 语句处 `await`。`async` 调用必须与 `await` 关键字配对的规则并没有被违反。\n\n使用 `async let`\
    \ 非常有用，你可以在任何地方使用 `await` 关键字，无论是在单个变量声明中，在等待数组元素时，在返回元组之前（就像我们在代码清单 4-2 中所做的那样），等等。\n\
    \n如果你愿意，可以将函数最后一行代码 `return (try await userInfo, try await followers)` 改写为 `return\
    \ try await (userInfo, followers)`，这样可以少写一些代码。选择哪种方式纯粹是风格问题。\n\n代码清单 4-3 展示了使用了新的\
    \ `fetchData()` 方法的 `authenticateAndFetchProfile()` 方法所做的修改：\n\n```swift\nfunc\
    \ authenticateAndFetchProfile() async {\n    isAuthenticated = await authenticateWithBiometrics()\n\
    \    if isAuthenticated {\n        do {\n            loadingStatus = .loading\n\
    \            let data = try await fetchData()\n            userInfo = data.userInfo\n\
    \            followingFollowersInfo = data.followingFollowersInfo\n          \
    \  self.loadingStatus = .idle\n        } catch {\n            loadingStatus =\
    \ .error(error)\n        }\n    }\n}\n```\n\n*代码清单 4-3 — 对 `authenticateAndFetchProfile()`\
    \ 的修改*\n\n现在我们调用了 `fetchData` 方法，它将返回一个元组。请注意，我们仍然需要使用 `await` 来调用它，因为即使其内部的逻辑可能包含\
    \ `async let` 调用，这个方法本身的签名仍然是 `async` 的。这个方法只会在其内部的两个 `async let` 任务都完成后才返回。也就是说，你仍然可以用\
    \ `async let` 来调用 `fetchData`，以使其与其他任务并发运行。\n\n> **注意**\n> 虽然我们使用 `async let`\
    \ 构造体来明确声明我们并发运行任务的意图，但最终决定是否真正并发运行你的代码，或者为多个调用重用另一个线程，仍然取决于系统。也就是说，系统可能会决定将 `fetchUserInfo`\
    \ 和 `fetchFollowingAndFollowers` 都运行在一个不同但共享的线程中，本质上使它们串行运行在非主线程上。\n\n如果你不想自己动手修改，可以下载“第\
    \ 2 章 - 社交媒体应用 (Async-Await)(`async let`)”示例项目来查看实际运行的代码。\n\n## 任务组\n\n当你明确知道某项任务涉及的并发数量时，`async\
    \ let` 构造体是理想的选择。在我们的社交媒体应用中，我们知道需要获取个人资料信息和关注者信息——恰好是两个可以同时运行的任务。但有时你可能不知道完成应用的某个特定功能所需的并发数量。想象一下，你有一个允许用户下载动态数量图片的应用，或者你想同时对可变数量的图片应用滤镜。在这些情况下，我们可能需要一个任务、两个任务、300\
    \ 个任务，甚至更多。针对这些情况，`async/await` 系统为我们提供了任务组。\n\n任务组是一种结构化并发工具，它允许我们同时运行未知数量（可能）的并发任务，前提是这些任务是相关的。如果你的任务太多，Swift\
    \ 不会同时运行所有任务，它会优先处理任务，并尽可能多地并发运行它们。\n"
- fmt: "#### Task Groups in Action\n\nTo create a Task Group, you can use the `withTaskGroup`\
    \ and `withThrowingTaskGroup` functions. Just like when creating explicit continuations,\
    \ you use the former when your group can complete without an issue, and the latter\
    \ when your group can throw an error.\n\nI have provided a simple SwiftUI project\
    \ that will perform the following tasks:\n\n1. It will retrieve a JSON file from\
    \ a server that contains a list of images.\n2. It will download each URL in a\
    \ task group, store them locally, and then render a SwiftUI view displaying said\
    \ images.\n\nBecause we do not know the number of images we need to download until\
    \ we get the file list, we can use a task group to try to download as many of\
    \ them as possible concurrently.\n\n**Note**: A computer system doesn’t have an\
    \ infinite number of threads. Task groups will do their best to download all the\
    \ images concurrently, but it will optimize and prioritize tasks. If you are dealing\
    \ with a lot of concurrent tasks at once, be aware that task groups may queue\
    \ tasks for later, and they will not necessarily execute all of them at the same\
    \ time.\n\n##### The Image Downloader Project\n\nThe project is a SwiftUI app\
    \ that downloads an image list from the Internet and then downloads all the images\
    \ in that list. You can download the “Chapter 4 - ImageDownloader” project to\
    \ check it out. We will only discuss key points of the source code, as putting\
    \ it all here would consume a lot of space.\n\nWhen run, the app has two screens.\
    \ The first one, shown in Figure 4-1, is the first screen.\n\n![](images/532302_1_En_4_Chapter/532302_1_En_4_Fig1_HTML.jpg)\n\
    \nA screenshot depicts the main screen of the downloader app, which includes wi-fi\
    \ and full battery symbols, and the time is 8:16, as well as a nothing to show\
    \ and below load images button.\n\n**Figure 4-1** – The main screen of the ImageDownloader\
    \ app\n\nTapping the “Load Images” button will cause the app to download the images.\
    \ After a little while, all the images will be displayed in the UI. Figure 4-2\
    \ shows a screenshot of the UI after the app loads some contents.\n\n![](images/532302_1_En_4_Chapter/532302_1_En_4_Fig2_HTML.jpg)\n\
    \nA screenshot depicts three photographs of cats, with Wi-Fi and battery symbols\
    \ at the top of the screenshot.\n\n**Figure 4-2** – The UI upon downloading the\
    \ images\n\n**Note**: I hope you like cats.\n\nOur JSON data returns an array\
    \ of `imageName-url` pairs. Each image has a name and a URL associated with it.\
    \ The file `ServerImage.swift`, in Listing 4-4 shows its contents:\n\n```swift\n\
    import Foundation\nstruct ServerImage: Codable {\n    let imageName: String\n\
    \    let url: URL\n}\n```\n\n**Listing 4-4** – The `ServerImage` object\n\nThe\
    \ `ImageManager` class, in the `ImageManager.swift` file, contains all the magic.\
    \ The class has two important properties, shown in Listing 4-5.\n\n```swift\n\
    private let imageListURL = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/taskgroups/imagelist_tif.json\"\
    )!\nprivate let urlSession = URLSession.shared\n```\n\n**Listing 4-5** – The main\
    \ properties of the `ImageDownloader` class\n\nThe `imageListURL` variable stores\
    \ the URL to download the image list later. We are reusing the same URL session\
    \ to download everything, in the `urlSession` variable.\n\n**Note**: I have deliberately\
    \ created big images in terms of file size (around 25 MB each). This is to give\
    \ you some time to appreciate the async concurrency of this project. If you do\
    \ not have unlimited internet, or your internet is too slow, replace the “tif”\
    \ portion of the URL stored in the `imageListURL` variable with “jpg”. This will\
    \ cause the program to use JPEG images that are much smaller in size (around 3\
    \ MB).\n\nThen, the `ImageManager` class has three methods. Listing 4-6 shows\
    \ the function used to download and parse the list itself.\n\n```swift\nfunc fetchImageList()\
    \ async throws -> [ServerImage] {\n    let (data, _) = try await urlSession.data(from:\
    \ imageListURL)\n    let urls = try jsonDecoder.decode([ServerImage].self, from:\
    \ data)\n    return urls\n}\n```\n\n**Listing 4-6** – The `fetchImageList` method\n\
    \nWe can once again appreciate the simplicity of `async/await`. Try to picture\
    \ in your head what this method would look like if you were using closure-based\
    \ calls instead.\n\nThe method to download a single image is a bit more interesting,\
    \ as seen in Listing 4-7.\n\n```swift\n/// Returns the local image path.\nfunc\
    \ download(_ serverImage: ServerImage) async throws -> URL {\n    let fileManager\
    \ = FileManager.default\n    let tmpDir = fileManager.temporaryDirectory\n   \
    \ let (downloadedImageUrl, _) = try await urlSession.download(from: serverImage.url)\n\
    \    let destinationUrl = tmpDir.appendingPathComponent(serverImage.imageName)\n\
    \    // If the destination already exists, remove it.\n    try? fileManager.removeItem(at:\
    \ destinationUrl)\n    try fileManager.moveItem(at: downloadedImageUrl, to: destinationUrl)\n\
    \    return destinationUrl\n}\n```\n\n**Listing 4-7** – Downloading a single image"
  raw: '#### Task Groups in Action


    To create a Task Group , you can use the `withTaskGroup` and `withThrowingTaskGroup`
    functions . Just like when creating explicit continuations, you use the former
    when your group can complete without an issue, and the latter when your group
    can throw an error.


    I have provided a simple SwiftUI project that will perform the following tasks:


    1.  It will retrieve a JSON file from a server that contains a list of images.


    2.  It will download each URL in a task group, store them locally, and then render
    a SwiftUI view displaying said images.


    Because we do not know the number of images we need to download until we get the
    file list, we can use a task group to try to download as many of them as possible
    concurrently.


    Note


    A computer system doesn’t have an infinite number of threads. Task groups will
    do their best to download all the images concurrently, but it will optimize and
    prioritize tasks. If you are dealing with a lot of concurrent tasks at once, be
    aware that task groups may queue tasks for later, and they will not necessarily
    execute all of them at the same time.


    ##### The Image Downloader Project


    The project is a SwiftUI app that downloads an image list from the Internet and
    then downloads all the images in that list. You can download the “Chapter [4](#532302_1_En_4_Chapter.xhtml)
    - ImageDownloader” project to check it out. We will only discuss key points of
    the source code, as putting it all here would consume a lot of space.


    When run, the app has two screens. The first one, shown in Figure [4-1](#532302_1_En_4_Chapter.xhtml#Fig1),
    is the first screen.


    ![](images/532302_1_En_4_Chapter/532302_1_En_4_Fig1_HTML.jpg)


    A screenshot depicts the main screen of the downloader app, which includes wi-fi
    and full battery symbols, and the time is 8:16, as well as a nothing to show and
    below load images button.


    Figure 4-1


    The main screen of the ImageDownloader app


    Tapping the “Load Images” button will cause the app to download the images. After
    a little while, all the images will be displayed in the UI. Figure [4-2](#532302_1_En_4_Chapter.xhtml#Fig2)
    shows a screenshot of the UI after the app loads some contents.


    ![](images/532302_1_En_4_Chapter/532302_1_En_4_Fig2_HTML.jpg)


    A screenshot depicts three photographs of cats, with Wi-Fi and battery symbols
    at the top of the screenshot.


    Figure 4-2


    The UI upon downloading the images


    Note


    I hope you like cats.


    Our JSON data returns an array of `imageName-url` pairs. Each image has a name
    and a URL associated with it. The file `ServerImage.swift`, in Listing [4-4](#532302_1_En_4_Chapter.xhtml#PC4)
    shows its contents:


    ```

    import Foundation

    struct ServerImage: Codable {

    let imageName: String

    let url: URL

    }

    Listing 4-4

    The ServerImage object

    ```


    The `ImageManager` class, in the `ImageManager.swift` file, contains all the magic.
    The class has two important properties, shown in Listing [4-5](#532302_1_En_4_Chapter.xhtml#PC5).


    ```

    private let imageListURL = URL(string: "https://www.andyibanez.com/fairesepages.github.io/books/async-await/taskgroups/imagelist_tif.json")!

    private let urlSession = URLSession.shared

    Listing 4-5

    The main properties of the ImageDownloader class

    ```


    The `imageListURL` variable stores the URL to download the image list later. We
    are reusing the same URL session to download everything, in the `urlSession` variable.


    Note


    I have deliberately created big images in terms of file size (around 25 MB each).
    This is to give you some time to appreciate the async concurrency of this project.
    If you do not have unlimited internet, or your internet is too slow, replace the
    “tif” portion of the URL stored in the `imageListURL` variable with “jpg”. This
    will cause the program to use JPEG images that are much smaller in size (around
    3 MB).


    Then, the `ImageManager` class has three methods. Listing [4-6](#532302_1_En_4_Chapter.xhtml#PC6)
    shows the function used to download and parse the list itself.


    ```

    func fetchImageList() async throws -> [ServerImage] {

    let (data, _) = try await urlSession.data(from: imageListURL)

    let urls = try jsonDecoder.decode([ServerImage].self, from: data)

    return urls

    }

    Listing 4-6

    The fetchImageList method

    ```


    We can once again appreciate the simplicity of `async/await`. Try to picture in
    your head what this method would look like if you were using closure-based calls
    instead.


    The method to download a single image is a bit more interesting, as seen in Listing
    [4-7](#532302_1_En_4_Chapter.xhtml#PC7).


    ```

    /// Returns the local image path.

    func download(_ serverImage: ServerImage) async throws -> URL {

    let fileManager = FileManager.default

    let tmpDir = fileManager.temporaryDirectory

    let (downloadedImageUrl, _) = try await urlSession.download(from: serverImage.url)

    let destinationUrl = tmpDir.appendingPathComponent(serverImage.imageName)

    // If the destination already exists, remove it.

    Try? fileManager.removeItem(at: destinationUrl)

    try fileManager.moveItem(at: downloadedImageUrl, to: destinationUrl)

    return destinationUrl

    }

    Listing 4-7

    Downloading a single image

    ```'
  trans: "\n#### 任务组实战\n\n要创建任务组，你可以使用 `withTaskGroup` 和 `withThrowingTaskGroup` 函数。与创建显式续体时类似，当你的组可以无异常完成时使用前者，而当组可能抛出错误时则使用后者。\n\
    \n我准备了一个简单的 SwiftUI 项目，它将执行以下任务：\n\n1.  从服务器获取包含图片列表的 JSON 文件。\n2.  在任务组中下载每个\
    \ URL，将图片存储到本地，然后渲染一个显示这些图片的 SwiftUI 视图。\n\n由于我们在获取文件列表之前不知道需要下载多少张图片，因此可以使用任务组来尽可能多地并发下载。\n\
    \n**注**：计算机系统的线程数量并非无限。任务组会尽力并发下载所有图片，但也会进行优化和任务优先级排序。如果你同时处理大量并发任务，请注意任务组可能会将部分任务排队延后，它们不一定会同时执行所有任务。\n\
    \n##### 图片下载器项目\n\n这个项目是一个 SwiftUI 应用，它从互联网下载图片列表，然后下载该列表中的所有图片。你可以下载“Chapter\
    \ 4 - ImageDownloader”项目来查看。我们只会讨论源代码的关键部分，因为把所有代码都放在这里会占用大量篇幅。\n\n运行后，应用会有两个界面。第一个界面如图\
    \ 4-1 所示。\n\n![](img/532302_1_En_4_Fig1_HTML.jpg)\n\n截图展示了下载器应用的主界面，其中包含无线网络和满格电池图标，时间为\
    \ 8:16，以及“无内容显示”文字和下方的“加载图片”按钮。\n\n**图 4-1** – ImageDownloader 应用的主界面\n\n点击“加载图片”按钮后，应用将开始下载图片。稍等片刻，所有图片都会显示在界面中。图\
    \ 4-2 展示了应用加载部分内容后的界面截图。\n\n![](img/532302_1_En_4_Fig2_HTML.jpg)\n\n截图展示了三张猫咪照片，截图顶部显示有无线网络和电池图标。\n\
    \n**图 4-2** – 下载图片后的用户界面\n\n**注**：希望你喜欢猫咪。\n\n我们的 JSON 数据返回一个 `imageName-url`\
    \ 配对数组。每张图片都有对应的名称和 URL。文件 `ServerImage.swift`（如代码清单 4-4 所示）展示了其内容：\n\n```swift\n\
    import Foundation\nstruct ServerImage: Codable {\n    let imageName: String\n\
    \    let url: URL\n}\n```\n\n**代码清单 4-4** – `ServerImage` 对象\n\n`ImageManager.swift`\
    \ 文件中的 `ImageManager` 类包含了所有核心逻辑。该类有两个重要的属性，如代码清单 4-5 所示。\n\n```swift\nprivate\
    \ let imageListURL = URL(string: \"https://www.andyibanez.com/fairesepages.github.io/books/async-await/taskgroups/imagelist_tif.json\"\
    )!\nprivate let urlSession = URLSession.shared\n```\n\n**代码清单 4-5** – `ImageDownloader`\
    \ 类的主要属性\n\n`imageListURL` 变量用于存储稍后下载图片列表的 URL。我们通过 `urlSession` 变量复用了相同的 URL\
    \ 会话进行所有下载。\n\n**注**：我故意创建了文件体积较大的图片（每张约 25 MB）。这是为了让你有足够的时间感受此项目的异步并发特性。如果你的网络不设限或速度较慢，可以将\
    \ `imageListURL` 变量中存储的 URL 中的“tif”部分替换为“jpg”。这会使程序使用体积更小的 JPEG 图片（约 3 MB）。\n\n\
    然后，`ImageManager` 类包含三个方法。代码清单 4-6 展示了用于下载并解析列表本身的函数。\n\n```swift\nfunc fetchImageList()\
    \ async throws -> [ServerImage] {\n    let (data, _) = try await urlSession.data(from:\
    \ imageListURL)\n    let urls = try jsonDecoder.decode([ServerImage].self, from:\
    \ data)\n    return urls\n}\n```\n\n**代码清单 4-6** – `fetchImageList` 方法\n\n我们再次体会到\
    \ `async/await` 的简洁性。请想象一下，如果使用基于闭包的调用，这个方法会是什么样子。\n\n下载单张图片的方法更有趣一些，如代码清单 4-7\
    \ 所示。\n\n```swift\n/// 返回本地图片路径。\nfunc download(_ serverImage: ServerImage) async\
    \ throws -> URL {\n    let fileManager = FileManager.default\n    let tmpDir =\
    \ fileManager.temporaryDirectory\n    let (downloadedImageUrl, _) = try await\
    \ urlSession.download(from: serverImage.url)\n    let destinationUrl = tmpDir.appendingPathComponent(serverImage.imageName)\n\
    \    // 如果目标路径已存在，则删除它。\n    try? fileManager.removeItem(at: destinationUrl)\n\
    \    try fileManager.moveItem(at: downloadedImageUrl, to: destinationUrl)\n  \
    \  return destinationUrl\n}\n```\n\n**代码清单 4-7** – 下载单张图片\n"
- fmt: "首先，我们使用`urlSession`的`download`方法而非`data`方法，因为这些都是潜在的大文件。我们会将它们存储在路径（`destinationUrl`）中，并且在存储新文件之前，我们会移除该路径下的任何旧文件，以防止可能的干扰错误。在本地存储图片后，我们会将本地URL返回给调用者。\n\
    \n最后一个方法比较有趣。该方法会下载类型为`ServerImage`的对象数组中的所有图片，详见[4-8](#532302_1_En_4_Chapter.xhtml#PC8)。\n\
    \n```\n/// Downloads all the images in the array and returns an array of URLs\
    \ to the local files\nfunc download(serverImages: [ServerImage]) async throws\
    \ -> [URL] {\n    var urls: [URL] = []\n    try await withThrowingTaskGroup(of:\
    \ URL.self) { group in\n        for image in serverImages {\n            group.addTask(priority:\
    \ .userInitiated) {\n                let imageUrl = try await self.download(image)\n\
    \                return imageUrl\n            }\n        }\n        for try await\
    \ imageUrl in group {\n            urls.append(imageUrl)\n        }\n    }\n \
    \   return urls\n}\n```\n*代码清单 4-8 使用任务组同时下载多个图片的实现*\n\n从高层次来看，该函数首先声明了一个URL变量。在这个变量中，我们将存储所有下载的图片的本地URL。然后，我们创建一个任务组，这本身是一个可等待的操作，最后，我们返回这些URL。再次强调，我们可以体会到`async/await`提供的线性特性。\n\
    \n当你使用`withTaskGroup`或`withThrowingTaskGroup`创建任务组时，需要指定该组将产生的数据类型。在本例中，我们的任务组产生URL，因为`download(serverImages:)`方法会返回URL。这两个任务组方法的闭包会为我们提供任务组本身——这里我们将其命名为`group`。\n\
    \n我们通过`addTask`方法向该组提交任务，一旦任务被提交，它们就会开始执行。在我们的`download(serverImages:)`函数中，我们遍历所有服务器图片，并在每次迭代中创建一个下载图片的任务。这会使任务组*在最佳情况下*同时执行所有任务。就像`async/await`系统中的其他工具一样，系统会对任务进行优先级排序，如果所有资源都可用，它会尝试并发执行所有任务，但如果你提交了大量任务，也不必对任务组未能同时执行所有任务感到惊讶。我们可以选择性地指定优先级。我们的方法使用了`.userInitiated`优先级，这是可用的最高优先级。我们将在下一章详细讨论优先级。\n\
    \n需要记住的一点是，添加到组中的任务可能不会按照提交的顺序执行。如果你想使用任务组，那么设计代码时务必使执行顺序无关紧要。\n\n最后，在`withThrowingTaskGroup`内部，我们有另一个循环——一个可等待的`for`循环。这个循环将在下载过程中陆续接收所有URL。它会逐个接收每个URL，这样我们就不会使`URLs`变量处于无效状态。再次强调，不要期望按特定顺序获取URL。`group`变量本身是一个集合，因此我们不仅可以用`for-in`遍历它，还可以使用高阶函数（如`filter`、`map`、`reduce`）来处理结果。是的，`for`循环可以使用`await`关键字来处理那些随时间发送值的代码。\n\
    \n请注意，如果任何图片下载任务发生错误，整个任务组都会抛出错误。请记住这一点，因为它可能导致意料之外的行为。如果你认为图片下载可能会失败，在这个特定项目中，为下载任务提供一个默认图片可能是个好主意。\n\
    \n## 总结\n\n在本章中，我们学习了什么是结构化并发。我们了解到结构化并发借鉴了结构化编程的思想，这使得编写和理解并发代码变得非常有用。\n\n我们探讨了两种创建结构化并发的方式：首先，`async\
    \ let`绑定，当你确切知道需要多少并发时，这种方法非常有用。使用`async let`时，我们需要在需要变量值的时候使用`await`关键字。另一个结构化并发工具是任务组。当我们想同时运行多个任务，但不确定具体的并发数量时（例如同时从网络下载多张图片），或者当并发来自动态源（如用户输入）时，我们会使用任务组。\n\
    \n## 练习题\n\n优化应用\n\n下载“Chapter [4](#532302_1_En_4_Chapter.xhtml) Exercise – ForumApp”项目。该应用会消费几个Web服务并渲染以下界面：\n\
    \n![](images/532302_1_En_4_Chapter/532302_1_En_4_Figa_HTML.jpg) 一张截图显示了三张照片，前两张显示“加载图片错误，重试”，最后一张是一条粗直线，屏幕顶部是电池和Wi-Fi图标。\
    \ ![](images/532302_1_En_4_Chapter/532302_1_En_4_Figb_HTML.jpg) 一张截图显示了四张照片，其中`AndylbanezK`位于总帖子数、主题数和新帖子数下方，以及在线好友列表，如姓名和加入日期。\n\
    \n根据给定的源代码，执行以下操作：\n\n1. 目前，该应用使用了`async/await`，但并未使用并发。请识别可以并发运行的代码并优化应用。\n\n\
    2. 获取“在线好友”的代码在`ForumAPI.swift`文件的`fetchProfiles(for:)`方法中硬编码为最多3个好友。请修复代码，使其使用任务组来并发获取所有用户资料，并且不再硬编码最大的资料获取数量。\n\
    \n你可以下载“Chapter [4](#532302_1_En_4_Chapter.xhtml) Exercise – Forum App (Solved)”来查看解决方案。\n\
    \n# 5. 非结构化并发\n\n在上一章中，我们详细讨论了结构化并发。我们了解到结构化并发遵循与结构化编程相同的理念。与结构化并发自然对应的是非结构化并发。\n\
    \n非结构化并发以牺牲少量易用性为代价，提供了更多的灵活性。在使用非结构化并发时，你的代码不一定会遵循我们喜欢的自上而下的结构。幸运的是，使用非结构化并发仍然非常容易，其灵活性也不会显著增加程序的复杂性。\n\
    \n为了使用非结构化并发，我们使用一个我们已经了解的对象：`Task`。\n\n## 深入理解Task\n\n`Task`是一个有用的对象，它允许我们执行两项重要操作：\n\
    \n1.  使用其初始化器创建任务的那一刻，它会异步启动闭包中的代码。\n2.  它为我们创建一个并发上下文，使我们能够以调用`async`方法的方式使用并发。"
  raw: "First, we are using the `download` method of `urlSession` instead of `data`,\
    \ because these are potentially big files. We will store them in a path (`destinationUrl`),\
    \ and we will remove any file at this path before we store the new one just to\
    \ prevent any distracting errors. After we store the image locally, we will return\
    \ the local URL to the caller.\n\nThe last method is the interesting one. It’s\
    \ a method that will download all the images in an array of objects of type `ServerImage`,\
    \ seen in Listing [4-8](#532302_1_En_4_Chapter.xhtml#PC8).\n\n```\n/// Downloads\
    \ all the images in the array and returns an array of URLs to the local files\n\
    func download(serverImages: [ServerImage]) async throws -> [URL] {\nvar urls:\
    \ [URL] = []\ntry await withThrowingTaskGroup(of: URL.self) { group in\nfor image\
    \ in serverImages {\ngroup.addTask(priority: .userInitiated) {\nlet imageUrl =\
    \ try await self.download(image)\nreturn imageUrl\n}\n}\nfor try await imageUrl\
    \ in group {\nurls.append(imageUrl)\n}\n}\nreturn urls\n}\nListing 4-8\nImplementing\
    \ a task group to download multiple images at once\n```\n\nAt a high level, the\
    \ function begins by declaring a variable of URLs. In this variable, we will store\
    \ all the local URLs of the images we download. Then, we create a task group,\
    \ which is by itself an operation that can be awaited, and finally, we return\
    \ the images. Once again, we can appreciate the linearity provided by async/await.\n\
    \nWhen you create a task group with either `withTaskGroup` or `withThrowingTaskGroup`\
    \ , you need to specify the data type the group will yield. In this case, our\
    \ group is yielding URLs, because the `download(serverImages:)` method will return\
    \ URLs. The closure of either task group method will provide us with the task\
    \ group itself – in this case, we named it `group`.\n\nWe submit tasks to this\
    \ group with the `addTask` method , and as soon as a task is submitted, they begin\
    \ executing. In our `download(serverImages:)` function, we are iterating over\
    \ all the server images, and on each iteration we create a task to download the\
    \ image. This will cause the group to execute all your tasks at the same time\
    \ *in the best case.* Just like the other tools in the `async/await` system, the\
    \ system will prioritize the tasks and if it has all the resources available,\
    \ it will try to execute all the tasks concurrently, but don’t be surprised if\
    \ you have a task group that is not executing every single task at the same time,\
    \ especially if you submit a lot of tasks to it. We can optionally specify the\
    \ priority . Our method uses the `.userInitiated` priority , which is the highest\
    \ priority available. We will talk more about priorities in the next chapter.\n\
    \nOne important thing to keep in mind is that tasks added to the group may not\
    \ execute in the order they were submitted. If you want to use task groups, it’s\
    \ important you design your code in a way that makes the order irrelevant.\n\n\
    Finally, within `withThrowingTaskGroup` , we have another loop – an awaited `for`\
    \ loop. This loop will receive all the URLs as they are downloaded. It will receive\
    \ each URL one by one, so we cannot put the `URLs` variable in an invalid state.\
    \ Once again, do not expect to get the URLs in a specific order. The group variable\
    \ itself is a collection, so not only can we iterate over it with `for-in`, but\
    \ we can also use higher-order functions such as `filter`, `map`, `reduce` to\
    \ process the results. And yes, `for` loops can have the `await` keyword for code\
    \ that will emit values over time.\n\nNote that if an error occurs in any image\
    \ download task, the whole group will throw an error. Keep this in mind as it\
    \ can cause surprising behavior. If you think your image downloads will fail,\
    \ it’s probably a good idea to provide a default image for the download task in\
    \ this specific project.\n\n## Summary\n\nIn this chapter, we learned what structured\
    \ concurrency is. We learned that structured concurrency gets its ideas from structured\
    \ programming, and it makes it really useful to write and understand concurrency\
    \ code.\n\nWe explored two different ways with which we can create structured\
    \ concurrency: First, the `async let` binding , which is useful when you know\
    \ how much concurrency you need. When we use `async let`, we will need to use\
    \ the `await` keyword at the time when we need to have the variable’s value. The\
    \ other structured concurrency tool is task groups. We use task groups when want\
    \ to run multiple tasks at the same time, but we don’t know the exact amount of\
    \ concurrency involved, such as downloading multiple images from the network at\
    \ the same time, or when the concurrency comes from a dynamic source such as user\
    \ input.\n\n## Exercises\n\nImprove the App\n\nDownload the “Chapter [4](#532302_1_En_4_Chapter.xhtml)\
    \ Exercise – ForumApp” project. This app will consume a few web services and render\
    \ the following screen:\n\n![](images/532302_1_En_4_Chapter/532302_1_En_4_Figa_HTML.jpg)A\
    \ screenshot depicts three photographs, first two are of error loading image retry,\
    \ the last one is of a thick straight line, and the top of the screen is battery\
    \ and Wi-Fi symbols. ![](images/532302_1_En_4_Chapter/532302_1_En_4_Figb_HTML.jpg)A\
    \ screenshot represents the four photographs where AndylbanezK below total posts,\
    \ threads, and new posts, and online friends list like name and member since date.\n\
    \nGiven the source of the code, perform the following:\n\n1.  Currently, the app\
    \ uses async/await, but it does not use concurrency. Identify the code that could\
    \ be run concurrently and optimize the app.\n\n2.  The code that retrieves the\
    \ “Online Friends” is hard-coded to a maximum of 3 friends in the `ForumAPI.swift`\
    \ file, `fetchProfiles(for:)` method. Fix the code so that it uses a task group\
    \ to fetch all the profiles concurrently and is no longer hard-coded to a maximum\
    \ number of profiles.\n\n    You can download the “Chapter [4](#532302_1_En_4_Chapter.xhtml)\
    \ Exercise – Forum App (Solved)” to see the solution.\n\n# 5. Unstructured Concurrency\n\
    \nIn the last chapter, we talked extensively about structured concurrency. We\
    \ learned that structured concurrency follows the same ideas of structured programming.\
    \ A natural counterpart for structured concurrency is unstructured concurrency.\n\
    \nUnstructured concurrency offers more flexibility in exchange for slightly less\
    \ usability. When working with unstructured concurrency, your code will not necessarily\
    \ follow the top-to-bottom structure we have come to love. Luckily, working with\
    \ unstructured concurrency is still very easy, and the flexibility won’t increase\
    \ the complexity of your program considerably.\n\nTo work with unstructured concurrency\
    \ , we use an object we already know: `Task`.\n\n## Tasks in Depth\n\n`Task` is\
    \ a useful object that allows us to do two important things:\n\n1.  The moment\
    \ a task is created with its initializer, it launches the code within the closure\
    \ asynchronously.\n\n2.  It creates a concurrent context for us to be able to\
    \ use concurrency in the way of calling `async` methods ."
  trans: "\n首先，我们使用`urlSession`的`download`方法而非`data`方法，因为这些都是潜在的大文件。我们会将它们存储在路径（`destinationUrl`）中，并且在存储新文件之前，我们会移除该路径下的任何旧文件，以防止可能的干扰错误。在本地存储图片后，我们会将本地\
    \ URL 返回给调用者。\n\n最后一个方法比较有趣。该方法会下载类型为`ServerImage`的对象数组中的所有图片，详见 4-8。\n\n```\n\
    /// Downloads all the images in the array and returns an array of URLs to the\
    \ local files\nfunc download(serverImages: [ServerImage]) async throws -> [URL]\
    \ {\n    var urls: [URL] = []\n    try await withThrowingTaskGroup(of: URL.self)\
    \ { group in\n        for image in serverImages {\n            group.addTask(priority:\
    \ .userInitiated) {\n                let imageUrl = try await self.download(image)\n\
    \                return imageUrl\n            }\n        }\n        for try await\
    \ imageUrl in group {\n            urls.append(imageUrl)\n        }\n    }\n \
    \   return urls\n}\n```\n*代码清单 4-8 使用任务组同时下载多个图片的实现*\n\n从高层次来看，该函数首先声明了一个 URL\
    \ 变量。在这个变量中，我们将存储所有下载的图片的本地 URL。然后，我们创建一个任务组，这本身是一个可等待的操作，最后，我们返回这些 URL。再次强调，我们可以体会到`async/await`提供的线性特性。\n\
    \n当你使用`withTaskGroup`或`withThrowingTaskGroup`创建任务组时，需要指定该组将产生的数据类型。在本例中，我们的任务组产生\
    \ URL，因为`download(serverImages:)`方法会返回 URL。这两个任务组方法的闭包会为我们提供任务组本身——这里我们将其命名为`group`。\n\
    \n我们通过`addTask`方法向该组提交任务，一旦任务被提交，它们就会开始执行。在我们的`download(serverImages:)`函数中，我们遍历所有服务器图片，并在每次迭代中创建一个下载图片的任务。这会使任务组*在最佳情况下*同时执行所有任务。就像`async/await`系统中的其他工具一样，系统会对任务进行优先级排序，如果所有资源都可用，它会尝试并发执行所有任务，但如果你提交了大量任务，也不必对任务组未能同时执行所有任务感到惊讶。我们可以选择性地指定优先级。我们的方法使用了`.userInitiated`优先级，这是可用的最高优先级。我们将在下一章详细讨论优先级。\n\
    \n需要记住的一点是，添加到组中的任务可能不会按照提交的顺序执行。如果你想使用任务组，那么设计代码时务必使执行顺序无关紧要。\n\n最后，在`withThrowingTaskGroup`内部，我们有另一个循环——一个可等待的`for`循环。这个循环将在下载过程中陆续接收所有\
    \ URL。它会逐个接收每个 URL，这样我们就不会使`URLs`变量处于无效状态。再次强调，不要期望按特定顺序获取 URL。`group`变量本身是一个集合，因此我们不仅可以用`for-in`遍历它，还可以使用高阶函数（如`filter`、`map`、`reduce`）来处理结果。是的，`for`循环可以使用`await`关键字来处理那些随时间发送值的代码。\n\
    \n请注意，如果任何图片下载任务发生错误，整个任务组都会抛出错误。请记住这一点，因为它可能导致意料之外的行为。如果你认为图片下载可能会失败，在这个特定项目中，为下载任务提供一个默认图片可能是个好主意。\n\
    \n## 总结\n\n在本章中，我们学习了什么是结构化并发。我们了解到结构化并发借鉴了结构化编程的思想，这使得编写和理解并发代码变得非常有用。\n\n我们探讨了两种创建结构化并发的方式：首先，`async\
    \ let`绑定，当你确切知道需要多少并发时，这种方法非常有用。使用`async let`时，我们需要在需要变量值的时候使用`await`关键字。另一个结构化并发工具是任务组。当我们想同时运行多个任务，但不确定具体的并发数量时（例如同时从网络下载多张图片），或者当并发来自动态源（如用户输入）时，我们会使用任务组。\n\
    \n## 练习题\n\n优化应用\n\n下载“Chapter 4 Exercise – ForumApp”项目。该应用会消费几个 Web 服务并渲染以下界面：\n\
    \n![](img/532302_1_En_4_Figa_HTML.jpg) 一张截图显示了三张照片，前两张显示“加载图片错误，重试”，最后一张是一条粗直线，屏幕顶部是电池和\
    \ Wi-Fi 图标。 ![](img/532302_1_En_4_Figb_HTML.jpg) 一张截图显示了四张照片，其中`AndylbanezK`位于总帖子数、主题数和新帖子数下方，以及在线好友列表，如姓名和加入日期。\n\
    \n根据给定的源代码，执行以下操作：\n\n1. 目前，该应用使用了`async/await`，但并未使用并发。请识别可以并发运行的代码并优化应用。\n\n\
    2. 获取“在线好友”的代码在`ForumAPI.swift`文件的`fetchProfiles(for:)`方法中硬编码为最多 3 个好友。请修复代码，使其使用任务组来并发获取所有用户资料，并且不再硬编码最大的资料获取数量。\n\
    \n你可以下载“Chapter 4 Exercise – Forum App (Solved)”来查看解决方案。\n\n# 5. 非结构化并发\n\n在上一章中，我们详细讨论了结构化并发。我们了解到结构化并发遵循与结构化编程相同的理念。与结构化并发自然对应的是非结构化并发。\n\
    \n非结构化并发以牺牲少量易用性为代价，提供了更多的灵活性。在使用非结构化并发时，你的代码不一定会遵循我们喜欢的自上而下的结构。幸运的是，使用非结构化并发仍然非常容易，其灵活性也不会显著增加程序的复杂性。\n\
    \n为了使用非结构化并发，我们使用一个我们已经了解的对象：`Task`。\n\n## 深入理解 Task\n\n`Task`是一个有用的对象，它允许我们执行两项重要操作：\n\
    \n1.  使用其初始化器创建任务的那一刻，它会异步启动闭包中的代码。\n2.  它为我们创建一个并发上下文，使我们能够以调用`async`方法的方式使用并发。\n"
- fmt: "### Creating Tasks\n\n`Task` is an object that can store a value, an error,\
    \ both, or neither. To create an asynchronous, unstructured task, we call `Task`\
    \ and initialize it with a closure which is the code we want to run asynchronously.\
    \ We have been doing this continuously throughout the book. For example, Listing\
    \ [5-1](#532302_1_En_5_Chapter.xhtml#PC1) is a small snippet from Chapter [2](#532302_1_En_2_Chapter.xhtml)\
    \ that calls some `async` method with `Task`.\n\n```\nfunc authenticateAndFetchProfile()\
    \ {\n    Task {\n        //...\n        let userProfile = try await fetchUserInfo()\n\
    \        //...\n    }\n}\nListing 5-1\nUsing Task to call async code\n```\n\n\
    In Listing [5-1](#532302_1_En_5_Chapter.xhtml#PC1), the `fetchUserInfo()` info\
    \ method is called the moment `authenticateAndFetchProfile()` method. You cannot\
    \ decide when the code within a `Task` will execute. It will always be done immediately\
    \ upon initialization.\n\nWhen you want to do concurrency using `Task`, the first\
    \ bit of flexibility you have at your disposal is specifying the priority. The\
    \ priority is of type `Task.Priority`, which is the same one you can use when\
    \ working with task groups. Listing [5-2](#532302_1_En_5_Chapter.xhtml#PC2) shows\
    \ the available priority options you have at your disposal when working with the\
    \ new concurrency system.\n\n```\nstatic let background: TaskPriority\nstatic\
    \ let high: TaskPriority\nstatic let low: TaskPriority\nstatic var medium: TaskPriority\n\
    static let userInitiated: TaskPriority\nstatic let utility: TaskPriority\nListing\
    \ 5-2\nAvailable priority options\n```\n\nA `Task` is an object, as such, you\
    \ can store it in a variable. This is where part of the reason this is called\
    \ “unstructured concurrency” comes from. You can have multiple `Task` objects,\
    \ store them in variables, or even in collections. And one thing you can do with\
    \ unstructured concurrency that you can’t do with structured concurrency is cancelling\
    \ tasks. Task cancellation is an important topic, and we will talk more about\
    \ it when we talk about the Task Tree in this chapter. For now, keep in mind that\
    \ you can cancel tasks by calling the `cancel()` method.\n\nListing [5-3](#532302_1_En_5_Chapter.xhtml#PC3)\
    \ shows how we can declare a task, store it in a variable, and cancel it later.\n\
    \n```\nfunc authenticate() {\n    let authenticationTask = Task {\n        let\
    \ context = LAContext()\n        let policy = LAPolicy.deviceOwnerAuthenticationWithBiometrics\n\
    \        return try await context.evaluatePolicy(policy, localizedReason: \"To\
    \ log in\")\n    }\n    authenticationTask.cancel()\n}\nListing 5-3\nCreating\
    \ a Task, and explicitly cancelling it later\n```\n\nWe created a variable of\
    \ type `Task<Bool, Error>`. This is because the `context.evaluatePolicy(_:localizedReason:)`\
    \ returns a `Bool` and can throw an error. We can await on the `Task`’s value\
    \ if we need it to continue doing some work, as seen in Listing [5-4](#532302_1_En_5_Chapter.xhtml#PC4).\n\
    \n```\nTask {\n    let authenticationSuccessful = try await authenticationTask.value\n\
    \    if authenticationSuccessful {\n        // Successfully authenticated.\n \
    \   }\n}\nListing 5-4\nAwaiting on a Task’s value\n```\n\nWe need to do `try await`\
    \ because our task can return a value and throw an error. Note the lack of a `do-catch`\
    \ statement in this newly created `Task`. This code will implicitly create a task\
    \ that is of type `Task<(), Error>`, because it doesn’t return anything, but it\
    \ can throw an error (the error thrown by `context.evaluatePolicy`). Tasks do\
    \ not need an explicit `do-catch` block because they will be captured by closure\
    \ itself but add these statements if it makes sense in the context of your application.\n\
    \nWhen you create a new task with `Task {}`, it will inherit contextual information\
    \ from the task that spawned it. The information inherited includes the actor\
    \ the task is running on (if you spawn a `Task` in something that runs on the\
    \ `@MainActor`, then the task will also run on the `@MainActor`), and priority.\
    \ If your newly spawned `Task` is a root task – it creates an asynchronous context\
    \ but it itself is not running in one – it will inherit the actor of whatever\
    \ thread it is running on.\n\n### Unstructured Concurrency in Action\n\nNow that\
    \ you have a better understanding of what unstructured concurrency is, and you\
    \ finally learned what the `Task` object is, we can start writing some sample\
    \ code to better understand how it all works.\n\nWe will work and modify the project\
    \ we created in the last chapter – the ImageDownloader project. The project worked\
    \ perfectly fine, but it had two main issues that I’d like to address:\n\n1. When\
    \ the app launched, it showed a `ProgressView` in the center until all images\
    \ were done downloading. This means if we had a lot of images or they were *really*\
    \ big, the `ProgressView` would be shown for a very long time. Once the images\
    \ were done downloading, the view would refresh and show all the images at once.\n\
    \n2. There was no guaranteed to the order the images would be displayed in. Images\
    \ would be added to the array in a first-downloaded basis. This is not harmful\
    \ by itself, but if you had an app that displayed a chronological order of elements,\
    \ it would matter.\n\nWe will modify the original project and address these two\
    \ issues. If you would like to download the modifications directly, feel free\
    \ to download the “Chapter [4](#532302_1_En_4_Chapter.xhtml) - ImageDownloaderUnstructured”\
    \ project."
  raw: '### Creating Tasks


    Task is an object that can store a value, an error, both, or neither. To create
    an asynchronous, unstructured task , we call Task and initialize it with a closure
    which is the code we want to run asynchronously. We have been doing this continuously
    throughout the book. For example, Listing [5-1](#532302_1_En_5_Chapter.xhtml#PC1)
    is a small snippet from Chapter [2](#532302_1_En_2_Chapter.xhtml) that calls some
    `async` method with `Task`.


    ```

    func authenticateAndFetchProfile() {

    Task {

    //...

    let userProfile = try await fetchUserInfo()

    //...

    }

    }

    Listing 5-1

    Using Task to call async code

    ```


    In Listing [5-1](#532302_1_En_5_Chapter.xhtml#PC1), the `fetchUserInfo()` info
    method is called the moment `authenticateAndFetchProfile()` method . You cannot
    decide when the code within a `Task` will execute. It will always be done immediately
    upon initialization.


    When you want to do concurrency using `Task`, the first bit of flexibility you
    have at your disposal is specifying the priority. The priority is of type `Task.Priority`,
    which is the same one you can use when working with task groups. Listing [5-2](#532302_1_En_5_Chapter.xhtml#PC2)
    shows the available priority options you have at your disposal when working with
    the new concurrency system.


    ```

    static let background: TaskPriority

    static let high: TaskPriority

    static let low: TaskPriority

    static var medium: TaskPriority

    static let userInitiated: TaskPriority

    static let utility: TaskPriority

    Listing 5-2

    Available priority options

    ```


    A Task is an object, as such, you can store it in a variable. This is where part
    of the reason this is called “unstructured concurrency ” comes from. You can have
    multiple `Task` objects, store them in variables, or even in collections. And
    one thing you can do with unstructured concurrency that you can’t do with structured
    concurrency is cancelling tasks. Task cancellation is an important topic, and
    we will talk more about it when we talk about the Task Tree in this chapter. For
    now, keep in mind that you can cancel tasks by calling the `cancel()` method.


    Listing [5-3](#532302_1_En_5_Chapter.xhtml#PC3) shows how we can declare a task,
    store it in a variable, and cancel it later.


    ```

    func authenticate() {

    let authenticationTask = Task {

    let context = LAContext()

    let policy = LAPolicy.deviceOwnerAuthenticationWithBiometrics

    return try await context.evaluatePolicy(policy, localizedReason: "To log in")

    }

    authenticationTask.cancel()

    }

    Listing 5-3

    Creating a Task, and explicitly cancelling it later

    ```


    We created a variable of type `Task<Bool, Error>`. This is because the `context.evaluatePolicy(_:localizedReason:)`
    returns a Bool and can throw an error.


    We can await on the Task’s value if we need it to continue doing some work, as
    seen in Listing [5-4](#532302_1_En_5_Chapter.xhtml#PC4).


    ```

    Task {

    let authenticationSuccessful = try await authenticationTask.value

    if authenticationSuccessful {

    // Successfully authenticated.

    }

    }

    Listing 5-4

    Awaiting on a Task’s value

    ```


    We need to do `try await` because our task can return a value and throw an error.
    Note the lack of a `do-catch` statement in this newly created `Task`. This code
    will implicitly create a task that is of type `Task<()`, `Error>`, because it
    doesn’t return anything, but it can throw an error (the error thrown by `context.evaluatePolicy`).
    Tasks do not need an explicit `do-catch` block because they will be captured by
    closure itself but add these statements if it makes sense in the context of your
    application.


    When you create a new task with `Task {}`, it will inherit contextual information
    from the task that spawned it. The information inherited includes the actor the
    task is running on (if you spawn a `Task` in something that runs on the `@MainActor,`
    then the task will also run on the `@MainActor`), and priority. If your newly
    spawned Task is a root task – it creates an asynchronous context but it itself
    is not running in one – it will inherit the actor of whatever thread it is running
    on.


    ### Unstructured Concurrency in Action


    Now that you have a better understanding of what unstructured concurrency is,
    and you finally learned what the Task object is, we can start writing some sample
    code to better understand how it all works.


    We will work and modify the project we created in the last chapter – the ImageDownloader
    project .


    The project worked perfectly fine, but it had two main issues that I’d like to
    address:


    1.  When the app launched, it showed a `ProgressView` in the center until all
    images were done downloading. This means if we had a lot of images or they were
    *really* big, the `ProgressView` would be shown for a very long time. Once the
    images were done downloading, the view would refresh and show all the images at
    once.


    2.  There was no guaranteed to the order the images would be displayed in. Images
    would be added to the array in a first-downloaded basis. This is not harmful buy
    itself, but if you had an app that displayed a chronological order of elements,
    it would matter.


    We will modify the original project and address these two issues. If you would
    like to download the modifications directly, feel free to download the “Chapter
    [4](#532302_1_En_4_Chapter.xhtml) - ImageDownloaderUnstructured” project.'
  trans: "\n### 创建任务\n\n`Task` 是一个可以存储值、错误、两者皆存储或两者皆不存储的对象。要创建一个异步、无结构化任务，我们调用 `Task`\
    \ 并使用一个闭包（即我们想要异步运行的代码）对其进行初始化。我们在本书中一直在持续这样做。例如，代码清单 5-1 是来自第 2 章的一个小片段，它使用 `Task`\
    \ 调用某个 `async` 方法。\n\n```\nfunc authenticateAndFetchProfile() {\n    Task {\n\
    \        //...\n        let userProfile = try await fetchUserInfo()\n        //...\n\
    \    }\n}\n代码清单 5-1\n使用 Task 调用异步代码\n```\n\n在代码清单 5-1 中，`fetchUserInfo()` 方法在\
    \ `authenticateAndFetchProfile()` 方法被调用时立即执行。你无法决定 `Task` 内部代码何时执行。它总是在初始化后立即执行。\n\
    \n当你想使用 `Task` 进行并发操作时，你拥有的第一个灵活性是指定优先级。优先级类型为 `Task.Priority`，与你在使用任务组时可以使用的类型相同。代码清单\
    \ 5-2 展示了在使用新的并发系统时你可以使用的优先级选项。\n\n```\nstatic let background: TaskPriority\n\
    static let high: TaskPriority\nstatic let low: TaskPriority\nstatic var medium:\
    \ TaskPriority\nstatic let userInitiated: TaskPriority\nstatic let utility: TaskPriority\n\
    代码清单 5-2\n可用的优先级选项\n```\n\n`Task` 是一个对象，因此你可以将其存储在一个变量中。这也是“无结构化并发”这一名称的部分由来。你可以有多个\
    \ `Task` 对象，将它们存储在变量中，甚至存储在集合中。无结构化并发能做到而结构化并发做不到的一件事就是取消任务。任务取消是一个重要主题，本章在讨论任务树时会进一步探讨。现在，请记住你可以通过调用\
    \ `cancel()` 方法来取消任务。\n\n代码清单 5-3 展示了如何声明一个任务、将其存入变量并在后续取消它。\n\n```\nfunc authenticate()\
    \ {\n    let authenticationTask = Task {\n        let context = LAContext()\n\
    \        let policy = LAPolicy.deviceOwnerAuthenticationWithBiometrics\n     \
    \   return try await context.evaluatePolicy(policy, localizedReason: \"To log\
    \ in\")\n    }\n    authenticationTask.cancel()\n}\n代码清单 5-3\n创建一个 Task，并在之后显式取消它\n\
    ```\n\n我们创建了一个类型为 `Task<Bool, Error>` 的变量。这是因为 `context.evaluatePolicy(_:localizedReason:)`\
    \ 返回一个 `Bool` 值，并且可能抛出错误。如果我们需要继续执行某些工作，可以对 `Task` 的 value 进行 await，如代码清单 5-4\
    \ 所示。\n\n```\nTask {\n    let authenticationSuccessful = try await authenticationTask.value\n\
    \    if authenticationSuccessful {\n        // 身份验证成功\n    }\n}\n代码清单 5-4\n等待\
    \ Task 的值\n```\n\n我们需要使用 `try await`，因为我们的任务可能返回一个值并抛出错误。注意这个新创建的 `Task` 中缺少了\
    \ `do-catch` 语句。这段代码会隐式创建一个类型为 `Task<(), Error>` 的任务，因为它不返回任何内容，但可能抛出错误（由 `context.evaluatePolicy`\
    \ 抛出的错误）。任务不需要显式的 `do-catch` 代码块，因为错误会被闭包自身捕获，但如果在你的应用程序上下文中这样做有意义，也可以添加这些语句。\n\
    \n当你使用 `Task {}` 创建一个新任务时，它会继承生成它的任务的上下文信息。继承的信息包括任务运行的参与者（如果你在 `@MainActor` 上运行的内容中生成一个\
    \ `Task`，那么该任务也将在 `@MainActor` 上运行）以及优先级。如果你新生成的 `Task` 是一个根任务（即它创建了一个异步上下文，但本身并非在异步上下文中运行），它将继承其所在任何线程的参与者。\n\
    \n### 无结构化并发实战\n\n既然你对无结构化并发有了更好的理解，并且终于了解了 `Task` 对象是什么，我们可以开始编写一些示例代码，以便更好地理解这一切是如何工作的。\n\
    \n我们将处理并修改上一章创建的项目——ImageDownloader 项目。该项目运行得很好，但有两个主要问题我想解决：\n\n1. 当应用启动时，它会在屏幕中央显示一个\
    \ `ProgressView`，直到所有图像下载完成。这意味着如果我们有很多图像，或者它们**非常大**，`ProgressView` 将会显示很长时间。一旦图像下载完成，视图会刷新并一次性显示所有图像。\n\
    \n2. 无法保证图像的显示顺序。图像会按照下载完成的先后顺序添加到数组中。这本身无害，但如果你有一个按时间顺序显示元素的应用程序，这就很重要了。\n\n\
    我们将修改原始项目并解决这两个问题。如果你想直接下载修改后的版本，可以自由下载“第 4 章 - ImageDownloaderUnstructured”项目。\n"
- fmt: '#### Modifying the `ImageManager` Class


    Start by adding the code in Listing [5-5](#532302_1_En_5_Chapter.xhtml#PC5) to
    the top of the file.


    ```

    enum ImageDownloadStatus {

    case downloading(_ task: Task)

    case error(_ error: Error)

    case downloaded(_ localImageURL: URL)

    }

    struct ImageDownload: Identifiable {

    let id: UUID = UUID()

    let status: ImageDownloadStatus

    }

    Listing 5-5

    Additional objects

    ```


    Currently, `ContentView` reads an array of URLs from the `ContentViewViewModel`
    and displays them in the UI. We will change this, so the `ImageManager` is the
    actual data source of the images. We will also make the view read `ImageDownload`
    objects instead of URL objects. This will help us show a different UI depending
    on the download status of the image (the `ImageDownloadStatus` enum). We need
    to make `ImageDownload` conform to `Identifiable` so it plays nicely with SwiftUI.


    Also, since the `ImageManager` class will be a data source for SwiftUI now, mark
    it as `@MainActor`, as seen in Listing [5-6](#532302_1_En_5_Chapter.xhtml#PC6).


    ```

    @MainActor

    class ImageManager: ObservableObject {

    Listing 5-6

    Marking ImageManager as @MainActor

    ```


    Now go to the `TaskGroupsApp.swift` file and change the declaration of the `ImageManager`
    class variable there as well to add the `@MainActor` attribute, as seen in Listing
    [5-7](#532302_1_En_5_Chapter.xhtml#PC7).


    ```

    @MainActor

    fileprivate let imageManager = ImageManager()

    Listing 5-7

    Marking the imageManager variable as @MainActor

    ```


    Go back to the `ImageManager.swift` file, and this time modify the `images` variable
    to be of type `[ImageDownload]`. Also, add the `@Published` attribute. Both changes
    are shown in Listing [5-8](#532302_1_En_5_Chapter.xhtml#PC8).


    ```

    @Published private(set) var images: [ImageDownload] = []

    Listing 5-8

    Creating a published property for remote images

    ```


    Because SwiftUI will use this as a data source, whenever this array changes, our
    UI will update.


    Finally, we will modify the `download(serverImages:)` function as per Listing
    [5-9](#532302_1_En_5_Chapter.xhtml#PC9).


    ```

    func download(serverImages: [ServerImage]) {

    for imageIndex in (0.. {

    do {

    let imageUrl = try await download(serverImages[imageIndex])

    self.images[imageIndex] = ImageDownload(status: .downloaded(imageUrl))

    } catch {

    self.images[imageIndex] = ImageDownload(status: .error(error))

    }

    }

    images.append(ImageDownload(status: .downloading(downloadTask)))

    }

    }

    Listing 5-9

    A new version of download(serverImages:)

    ```


    This is where part of the magic will happen. We will start by iterating over all
    the `ServerImage`s we have downloaded. For each server image, we will create an
    explicit `Task`. We will also add this task immediately to the `images` array
    with the `.downloading(_)` status. The enum tracks the task itself because we
    can cancel it later if we want.


    The task body will attempt to download the image. If the download fails, we will
    replace its entry in the `images` array with the `.error(_)` value. If it succeeds,
    we will replace it with the `.downloaded(url)` value. In short, the body of the
    task will replace its place in the array with a different enum value depending
    on whether the download was successful or not. And because this is a `@Published`
    property, SwiftUI can observe its changes and be notified in real time of whatever
    happens with this array.


    #### Modifying the `ContentViewViewModel` Class


    The main modification in the `ContentViewViewModel.swift` file is the `downloadImages()`
    function as in Listing [5-10](#532302_1_En_5_Chapter.xhtml#PC10). We have also
    eliminated the `imageUrls` array from this file as that work has been delegated
    to the `ImageManager` class.


    ```

    func downloadImages() {

    Task {

    guard let manager = imageManager else { return }

    do {

    let imageList = try await manager.fetchImageList()

    manager.download(serverImages: imageList)

    } catch {

    print(error)

    }

    }

    }

    Listing 5-10

    The new downloadImages() method

    ```


    The view model is now a very light class, containing only this method. We could
    delegate everything to the `ImageManager` class, but I prefer to keep it as a
    separate logic class.


    #### Modifying the `ContentView` Object


    The `body` property is modified as per Listing [5-11](#532302_1_En_5_Chapter.xhtml#PC11).


    ```

    var body: some View {

    ScrollView {

    LazyVStack {

    if let manager = viewModel.imageManager {

    ForEach(manager.images) { imageDownload in

    switch imageDownload.status {

    case .error(_): imageErrorView()

    case .downloading(_): imageDownloadView()

    case .downloaded(let url): imageView(for: url)

    }

    }

    }

    }

    }

    .onAppear {

    viewModel.imageManager = imageManager

    viewModel.downloadImages()

    }

    }

    Listing 5-11

    The new body property

    ```


    We will display a new view depending on the `ImageDownloadStatus` property of
    the `ImageDownload` object. If we have an error, we will show an “x” mark. If
    we are currently downloading it, we will show a photo placeholder. If we have
    the image, we will show the image itself. Listing [5-12](#532302_1_En_5_Chapter.xhtml#PC12)
    shows the implementation of these additional methods.


    ```

    @ViewBuilder

    func imageDownloadView() -> some View {

    VStack {

    Image(systemName: "photo")

    .resizable()

    .frame(width: 300, height: 300)

    .foregroundColor(.gray)

    }

    }

    @ViewBuilder

    func imageErrorView() -> some View {

    VStack {

    Image(systemName: "xmark")

    .resizable()

    .frame(width: 300, height: 300)

    }

    }

    @ViewBuilder

    func imageView(for url: URL) -> some View {

    Image(uiImage: UIImage(data: viewModel.data(for: url))!)

    .resizable()

    .frame(width: 300, height: 300)

    }

    Listing 5-12

    Helper properties to create the views

    ```


    And that’s it! If you run the app now, you will see a UI with placeholders for
    the images. Figure [5-1](#532302_1_En_5_Chapter.xhtml#Fig1) shows our basic UI.


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig1_HTML.jpg)


    A screenshot represents a mobile screen with three photos about to load, one below
    the other, and time, cellular, and battery symbols on the top.


    Figure 5-1


    Showing placeholders for images that will be downloaded


    As the images load, Figure [5-2](#532302_1_En_5_Chapter.xhtml#Fig2) shows the
    placeholders getting replaced with images as they are downloaded.


    ![](images/532302_1_En_5_Chapter/532302_1_En_5_Fig2_HTML.jpg)


    A screenshot depicts a mobile screen with three photos of cats one below the other,
    and time, cellular, and battery on the top.


    Figure 5-2


    The images replace the placeholders one by one as they are downloaded


    This improved version of the `ImageDownloader` project shows placeholders for
    images as they are downloaded instead of showing a `ProgressView` while waiting
    for all the images until they are downloaded, and the images will always show
    up in the same order. Neat!'
