    ```

    *清单 3-14 为不在 iOS 15 上的设备创建替代视图*


    最后，我们需要修复的最后一个错误与 iOS 15 中引入的按钮突出样式有关。最简单的修复方法是从`UserProfileView`中删除`.buttonStyle(.borderedProminent)`这一行。


    就这样！你已经成功地将两个在 iOS 14 中不存在且是 iOS 15 原生支持的异步调用进行了向后兼容，如果你现在尝试编译应用程序，它应该没有问题地运行。如果你想测试
    iOS 14 和 iOS 13 的兼容性，请确保在安装了这些 iOS 版本的模拟器中运行。如果没有，你可以转到 Xcode 的“Window”菜单，接着选择“Organizer”，然后在那里添加具有不同
    iOS 版本的新模拟器。


    请注意，不幸的是，你不能免费将所有`async/await`代码自动向后兼容到 iOS 14 及更低版本。你需要手动创建扩展并手写`continuation`方法。如果你有大量基于闭包且希望向后兼容的代码，请记住这一点。


    ## 总结


    在本章中，我们探讨了什么是`continuation`，并学习了如何使用它们将基于闭包的代码转换为`async/await`代码，而无需从头开始为意图替换的方法编写新实现。我们还学习了如何通过围绕委托方法创建包装器对象，为那些使用委托的调用提供异步
    API。最后，我们学习了如何使用`continuation`将`async/await`代码向后兼容到 iOS 14 和 iOS 13——我们不能兼容到更低版本，因为此功能仅在
    iOS 13、14 和 15 上可用。


    ## 练习


    ### 编程练习


    下载“第 2 章练习”项目（我们在第 2 章中使用的同一个基础项目）。


    1.  使用`checked continuation`为`requestPermissions`和`requestData`函数提供`async/await`版本。你不应删除原始实现。


    2.  修改`ContentViewViewModel.swift`的实现，使其使用这些方法的`async/await`版本，而不是基于闭包的版本。


    解决方案可以在“第 2 章练习 - 已解决 Continuation”项目中找到。


    # 4. 结构化并发


    到目前为止，我们已经详细讨论了`async/await`是什么以及它是如何工作的。我们已经看到这个新工具如何帮助我们编写类似于过程式编程的结构化代码，因为我们可以摆脱其他类型的回调（如闭包和委托），这些回调破坏了代码的线性可读性。但我们已经看到，所有这些代码实际上并没有同时、并发或以多线程方式运行。


    考虑我们在第 2 章（清单 4-1）中编写的社交媒体应用中的`authenticateAndFetchProfile`方法的异步版本。


    ```swift

    func authenticateAndFetchProfile() async {

    isAuthenticated = await authenticateWithBiometrics()

    if isAuthenticated {

    do {

    let userApi = UserAPI()

    loadingStatus = .loading

    userInfo = try await userApi.fetchUserInfo()

    followingFollowersInfo = try await userApi.fetchFollowingAndFollowers()

    self.loadingStatus = .idle

    } catch {

    loadingStatus = .error(error)

    }

    }

    }

    ```

    *清单 4-1 `authenticateAndFetchProfile`的异步版本*


    这个方法有三个异步调用，但并非所有调用同时执行。事实上，我们*需要*生物识别操作完成，才能下载任何要显示的信息。下载个人资料信息和关注者*依赖于*身份验证成功。目前，该函数经过三个基本步骤：


    1.  使用生物识别进行身份验证。


    2.  下载个人资料信息。


    3.  下载关注者和关注用户信息。


    这两个下载操作都依赖于身份验证，但除此之外，它们彼此完全独立，如果愿意，我们可以同时执行它们。在本章中，我们将开始同时执行多个任务。


    注意


    在第 1 章中，我们将并发定义为“一个线程（或你的程序）同时处理多件事情的能力。”这严格来说并不意味着同时做多件事，通常，当人们想到并发时，他们真正想到的是多线程或并行。然而，为了与社区赋予该词的含义保持一致，从这一点开始，当我们谈论并发时，我们指的是同时执行多个任务。

