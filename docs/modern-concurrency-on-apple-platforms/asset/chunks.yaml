    // Outside of ViewController

    func expensiveVidegameOperation() async {

    if let vg = await ViewController.currentVideogame {

    print("We are processing \(vg.title)")

    }

    }

    Listing 10-2

    Reading a @TaskLocal variable

    ```


    This hypothetical code is somewhere outside the view controller. I want to highlight
    the fact that `@TaskLocal` properties are not constrained to any scope. They are
    just constrained to a task itself, and this task can exist in many different places.


    The observant may have noticed that accessing this variable is an `await` operation.
    `TaskLocal` properties synchronize their accesses within the task as to prevent
    data races from occurring.


    Writing to `@TaskLocal` properties is not as straightforward. If you try to do
    a simple assignment, with the `=` operator, the compiler will stop you because
    it is read-only property.


    Instead of doing a simple assignment, you need to bind the variable down the task
    tree. To do this, you need to use the `$` symbol before the variable name and
    call the `withValue` method on it. To avoid confusion, Listing [10-3](#532302_1_En_10_Chapter.xhtml#PC3)
    shows how to bind a variable to task.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    let vg = Videogame(title: "The Legend of Zelda: Ocarina of Time", year: 1998)

    Self.$currentVideogame.withValue(vg) {

    // we can launch some async tasks here that make use of the LocalValue

    }

    }

    Listing 10-3

    Binding a value that can be used later by tasks

    ```


    If you are not familiar with Swift’s property wrappers, I recommend you read a
    dedicated blogpost I have on the topic.^([²](#fn2)) But in short, a property can
    augment the capabilities of a normal property. By using the dollar symbol `$`,
    we can access the internal capabilities of the property wrapper. Our Videogame
    struct does not provide the `withValue` method , but the property wrapper wrapping
    it does.


    In Listing [10-3](#532302_1_En_10_Chapter.xhtml#PC3), we are binding a new `vg`
    variable to our `currentVideogame` task value. All tasks spawned from here on
    out will have access to it for as long as they are part of the task tree.


    Listing [10-4](#532302_1_En_10_Chapter.xhtml#PC4) will create a more complex hierarchy
    were a `@TaskLocal` value is being shared.


    ```

    class ViewController: UIViewController {

    @TaskLocal static var currentVideogame: Videogame?

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    let vg = Videogame(title: "The Legend of Zelda: Ocarina of Time", year: 1998)

    Self.$currentVideogame.withValue(vg) {

    Task {

    await expensiveVidegameOperation()

    Task {

    await expensiveVidegameOperation()

    Task.detached {

    await expensiveVidegameOperation()

    }

    }

    }

    }

    }

    }

    Listing 10-4

    Sharing down a @TaskLocal variable down a more complex hierarchy

    ```


    We start by launching some tasks after binding our `Videogame` task local variable.
    We start a Task where we call `expensiveVideogameOperation` , which will print
    “We are processing The Legend of Zelda: Ocarina of Time”. After it `await`s, we
    launch another `Task`, which is a child of the current `Task`. Calling `expensiveVideogameOperation`
    will also print “We are processing The Legend of Zelda: Ocarina of Time”, because
    this child task has access to the same parent.


    Things are more interesting when we launch a detached task. When we launch the
    detached task, we also call `expensiveVideogameOperation`, but this time it prints
    “No videogame found in the task hierarchy!” As we discussed in Chapter [5](#532302_1_En_5_Chapter.xhtml),
    detached tasks are completely independent of any task that launched them and they
    don’t really have a parent to speak of, although they can be parents of other
    tasks (as long as they aren’t launched as detached tasks too). For this reason,
    our detached task in Listing [10-4](#532302_1_En_10_Chapter.xhtml#PC4) doesn’t
    have the `currentVideogame`. It’s not part of the same task tree the previous
    child tasks were.


    You can bind a different Videogame to the @TaskLocal variable within the detached
    task, and any child tasks of the detached task would have access to it – again
    keeping in mind that detached tasks are not really its children. Listing [10-5](#532302_1_En_10_Chapter.xhtml#PC5)
    shows this capability in action.


    ```

    Task.detached {

    await expensiveVidegameOperation()

    let anotherVg = Videogame(title: "Tales of the Abyss", year: 2005)

    await Self.$currentVideogame.withValue(anotherVg) {

    await expensiveVidegameOperation()

    }

    }

    Listing 10-5

    Assigning the @TaskLocal variable to be used within a detached task

    ```


    ## Summary


    You may find situations where you need to share a value to all the children in
    the task hierarchy. The `@TaskLocal` property wrapper is a very good candidate
    for this. Values will be shared to all the children of a task and all tasks that
    are within that same task tree, but any detached tasks will not have access to
    upper-level task local variables due to their detached nature.'
