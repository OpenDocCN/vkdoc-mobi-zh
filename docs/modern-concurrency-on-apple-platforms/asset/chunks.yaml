- fmt: '###### Semaphores


    A `Semaphore` is a type of lock, very similar to a mutex. With this solution,
    a task will acquire a lock to a resource. Any other tasks that arrive and need
    that resource will see that the resource is busy. When the original thread frees
    the resources, it will *signal* interested parties that the resource is free,
    and they will follow the same process of locking and signaling as they interact
    with the resource.


    Mutex and Semaphores sound similar, but the key difference lies in what kind of
    resource they are locking, and if you ever find yourself in a situation in which
    you need to decide what to protect (you won’t find such a case when using `async/await`),
    it is important to think about what makes sense in your use case. In general,
    a mutex can be used to protect anything that doesn’t have any sort of execution
    on its own, such as files, sockets, and other filesystem elements. Semaphores
    can be used to protect execution in your program itself such as shared code execution
    paths. These can be mutating functions or classes with shared state. There may
    be cases in which executing a function by more than one thread will have unintended
    consequences, and semaphores are a good tool for that. For example, a function
    that writes a log to disk may be protected with a semaphore because if multiple
    processes write to the log at the same time, the log will become corrupted for
    the end user. Whoever has a semaphore to the logging function needs to signal
    the other interested parties that it is free so they can continue their execution.


    A rule of thumb is to always add a timeout whenever a semaphore is acquired and
    let processes timeout if they take too long. If this is acceptable in the context
    of your program (no data corruption can occur, or there can be no other unintentional
    consequences to canceling tasks), consider adding a timeout so the semaphore is
    free again after a certain period.


    The use of semaphores will allow threads to *synchronize*, as they will be able
    to coordinate the resources amongst each other so they both have their fair usage
    of them.


    #### Starvation


    The *Starvation* problem happens when a program is stuck in a state of perpetually
    waiting for resources to do some work but never receiving them. Figure [1-3](#532302_1_En_1_Chapter.xhtml#Fig3)
    illustrates this problem.


    ![](images/532302_1_En_1_Chapter/532302_1_En_1_Fig3_HTML.png)


    Figure 1-3: The dining philosophers problem


    Figure [1-3](#532302_1_En_1_Chapter.xhtml#Fig3) describes what is known as the
    *dining philosophers problem*, and it is a classical representation of the starvation
    problem. The problem illustrates five philosophers who want to eat at a shared
    table. All of them have their own dishes, and there are five forks. However, each
    philosopher needs two forks to eat. This means that only two philosophers get
    to eat, and only the ones who are not sitting directly next to each other. When
    a philosopher is not eating, he puts both forks down. But there can be a situation
    in which a philosopher decides to overeat, leaving another to starve.


    Luckily for low-level multithreading developers, it’s possible to use the *semaphores*
    we talked about above to solve this problem. The idea is to have a semaphore that
    keeps track of the used forks, so it can signal another philosopher when a fork
    is free to be used.


    #### Race Conditions


    Likely the multithreading problem most developers are familiar with, *Race Conditions*
    are very similar to deadlocks, with the exception that they can cause data or
    memory corruption that will lead to other unpleasant consequences. When we are
    dealing with multithreading, it isn’t inherently a bad thing that two processes
    are reading data at the same time. If the resource is read-only, there is no harm.
    However, if the processes can modify or update the resource in any way, the processes
    will continually overwrite the data another process just wrote, and this will
    eventually lead to reading and writing corrupted data. If the resource in question
    is user data, we will have unhappy users. If the resource is provided by the OS,
    we can cause other unwanted consequences and eventually reach one of the multithreading
    issues such as deadlocks. Figure [1-4](#532302_1_En_1_Chapter.xhtml#Fig4) illustrates
    this pitfall.


    ![](images/532302_1_En_1_Chapter/532302_1_En_1_Fig4_HTML.jpg)


    Figure 1-4: Multiple threads writing to the same file at the same time


    If a history log is being written to by any threads with no control, events may
    be registered in a random order, and one thread may override the line another
    thread just wrote. For this reason, the History Log should be locked at the writing
    operation. A thread writing to it will get a *mutex* to the log, and it will free
    it after it’s done using it. Anyone else needing to write to the log will be waiting
    until the lock is freed.


    Deadlocks and race conditions are very similar. The main difference, in deadlocks,
    is we have multiple processes waiting for the other to finish, whereas in race
    conditions we have both processes writing data and corrupting it because no processes
    know that the resource in question is being used by someone else. This means that
    the solutions for deadlocking also apply to race conditions, so just block your
    resource with a mutex or semaphore to guarantee exclusive access to the resource
    by one process only. This is called an *Atomic Operation*.


    #### Livelocks


    There is a saying in life that goes “*you can have too much of a nice thing*.”
    It is important to understand that throwing locks willy-nilly is not a solution
    to all multithreading problems. It may be tempting to identify a multithreading
    issue, throw a mutex at it, and call it a day. Unfortunately, it’s not so easy.
    You need to understand your problem and identify where the lock should go.


    Similarly, this problem can occur when processes are too lenient with the conditions
    under which they can release and attain resources. If `Thread A` can ask `Thread
    B` for a resource and `Thread B` complies without any thought, and `Thread B`
    can do the same to `Thread A`, it may happen that eventually they will not be
    able to ask each other for the resource back because they can’t even get to that
    point of the execution.


    This is a classic example in real life. Suppose you are walking towards a closed
    door and someone else arrives to it at almost the same time as you. You may want
    to let the other person go in first, but they may tell you that you should go
    first instead. If you are familiar with this awkward feeling, you know what a
    livelock feels like for our multithreaded programs.


    ### Existing Multithreading and Concurrency Tools


    Apple offers some lower-level tools to write multithreaded and concurrent code.
    We will show examples for some of them. They are listed from lower level to higher
    level. The lower the level, the harder it is to use that system correctly, and
    the less likely it is that you will encounter it in the real world anyway. You
    should be aware of these tools so you can be prepared to work with them if you
    ever need to.'
