    - **Disabled:** 当通过编程方式将按钮的`enabled`属性设置为`NO`，或者通过添加一个自定义属性（请参阅下面的提示框）来指示该按钮当前无法使用时生效。

    - **Selected:** 当选中*Toggles selected state*且按钮被点击一次后，以及随后的每次反选点击时使用。


    > **提示** Disabled 状态与*User Interaction Enabled*复选框不对应，您不能在 SpriteBuilder 中编辑`enabled`属性。除非您想向按钮添加一个自定义属性，将其命名为`enabled`，并将其类型设置为`Bool`，值设置为`0`。可惜，除非您在*Item
    Code Connections*选项卡上指定一个*Custom class*，否则您不能添加自定义属性。但谁说过这个类必须是一个真正的*自定义*类呢？

    >

    > 事实上，您可以在*Custom class*字段中输入节点的原始类（此处为`CCButton`）（由 Cocos2D 提供），以使*Edit Custom
    Properties*按钮出现在*Item Properties*选项卡底部。然后，您可以添加该类中通常不能在 SpriteBuilder 中编辑的任何`Bool`、`Int`、`Float`和`String`属性。


    在这种情况下，按钮仅使用*Normal*和*Highlighted*状态。当使用本书的图形时，点击*Sprite frame*下拉菜单并选择`SpriteSheets/UserInterface/P_exit.png`。对正常和高亮的精灵帧属性都执行此操作。当使用您自己的图形时，只需确保两个状态的精灵帧都设置为相同的图像即可。


    为了给用户一个视觉提示，表明她当前正在触摸按钮，只需将正常状态的*Background opacity*和*Label opacity*更改为略低于 1.0
    的值，例如 0.8。这会使按钮略微透明，仅在触摸时变为完全不透明。

    '
- fmt: "# 视觉高亮的另一种选择\n\n另一种视觉高亮选项是，除了将正常状态或高亮状态的一个或两个颜色属性设置为非默认值外，其他所有正常状态和高亮状态的设置均保留默认值。这样，按钮的背景和/或标签会在高亮时改变颜色——例如，从正常状态下的浅灰色变为亮白色。在这种情况中，该效果也通过将按钮的`Label\
    \ color`设置为正常状态下的浅灰色来实现。\n\n**提示** 使用颜色进行高亮时，最佳效果是通过细微的颜色变化实现的。例如，你可以使用同一颜色的浅色和深色版本。将背景或标签颜色从绿色改为红色……好吧，这只会看起来很丑。\n\
    \n## `CCLabelTTF`属性\n\n按钮的`CCLabelTTF`属性与常规`Label TTF`节点的属性相同。[Figure 6-4](#part0015.html#Fig4)中的图片未显示`Font\
    \ Effects`部分；这将在“标签与本地化”章节中详细讨论。\n\n![9781484202630_Fig06-04.jpg](images/00088.jpeg)\n\
    \n[Figure 6-4](#part0015.html#_Fig4)。`CCLabelTTF`属性\n\n标签的`Font name`、`Font size`和`Alignment`属性应该是不言自明的。点击`Font\
    \ size`的`UI`按钮以及内边距属性，可以防止这些属性在iPad上运行时按2倍缩放，从而保持按钮与iPhone上相同的大小，而不是放大。你可以尝试此操作，然后使用`Cmd+1`和`Cmd+2`切换屏幕尺寸来查看效果。但请通过点击[Figure\
    \ 6-4](#part0015.html#Fig4)中所示的圆点图标，将其恢复为点缩放。\n\n`Horizontal padding`和`Vertical\
    \ padding`设置允许你将按钮的标签声明为宽和高增加两倍的点数。如[Figure 6-4](#part0015.html#Fig4)所示的20点水平内边距，使标签总宽度增加40点，这也会相应地扩展按钮的背景图像。内边距主要用于控制标签与背景图像边框的缩进距离。\n\
    \n在这种情况下，将`Horizontal padding`从默认的10设置为20，以确保标签的字母完全打印在背景图像的纯灰色区域内，而不是绘制在背景图像形状不规则的边框上或附近。\n\
    \n## 分配按钮选择器\n\n在按钮的`Item Code Connections`选项卡中，在`CCControl`部分的`Selector`字段中输入`shouldPauseGame`。请参见[Figure\
    \ 6-5](#part0015.html#Fig5)。`Target`下拉菜单应设置为`Document root`。\n\n![9781484202630_Fig06-05.jpg](images/00089.jpeg)\n\
    \n[Figure 6-5](#part0015.html#_Fig5)。暂停按钮将运行`shouldPauseGame`选择器\n\n还有一个`Continuous`复选框，你不应该勾选它；如果勾选，只要用户手指按住按钮，按钮就会每帧运行一次选择器。这对于快速射击或方向键按钮可能有用，但在这里是不需要的。\n\
    \n**提示** 我喜欢在用户发起的操作前加上“should”前缀，因为它们可以被视为请求，而不是必须无条件执行的命令。如果这听起来矛盾，请考虑一个平台游戏，你可以跳跃和二段跳，且跳跃按钮始终处于激活状态。用户通过让跳跃按钮运行`shouldJump`选择器来请求跳跃。该方法首先检查玩家是否在地面上，如果是，则发起跳跃。如果请求是在玩家在空中时发送的，`shouldJump`选择器将发起二段跳或忽略该请求。\n\
    \n最佳实践是双重检查所有用户交互的有效性。例如，如果你没有在按下按钮时立即禁用暂停按钮，用户可能不小心再次点击暂停按钮，可能导致问题，比如动画运行两次。因此，使用“should”前缀命名选择器是一个很好的指示，表明应执行某个操作，但也可以根据某些条件被拒绝或以不同方式解释。\n\
    \n## 分配`GameMenuLayer`类和实例变量\n\n按钮的`shouldPauseGame`选择器被发送到`Document root`。文档根节点是`GameMenuLayer.ccb`的根节点。因此，`GameMenuLayer.ccb`的根节点需要有一个自定义类，在该类中可以实现选择器。\n\
    \n**警告** 一个常见的错误是设置按钮本身的自定义类，从而创建`CCButton`的子类来处理按钮选择器。按钮永远不会作为其自身选择器的接收者。\n\n\
    在`GameMenuLayer.ccb`中选择根节点，并切换到`Item Code Connections`选项卡。在`Custom class`字段中输入`GameMenuLayer`。\n\
    \n此外，你还需要从`GameScene`类中访问`GameMenuLayer`根节点。打开`GameScene.ccb`，选择引用`GameMenuLayer.ccb`的子文件节点，然后将`Doc\
    \ root var`设置为`_gameMenuLayer`。这会将`GameMenuLayer.ccb`根节点的引用分配给`GameScene`实例变量`_gameMenuLayer`，你将在下一步中添加该变量。\n\
    \n**警告** 另一个常见错误是编辑`GameMenuLayer.ccb`根节点的`Doc root var`字段，而不是其在`GameScene.ccb`中的引用。这样做实际上会在`GameMenuLayer`实例变量中创建一个自引用。将变量类型更改为`Owner\
    \ var`也不起作用，因为所有者是你在使用`CCBReader`方法`load:owner:`时在代码中指定的引用。\n\n## 编程实现`GameMenuLayer`\n\
    \n是时候再次启动Xcode，添加`GameMenuLayer`类和`shouldPauseGame`方法了。\n\n你的首要目标始终是让新的代码连接尽快在技术上发挥作用，并验证它们是否工作。在未确认连接的选择器确实运行且实例变量或属性被正确分配之前，就开始编写代码是潜在的时间浪费。你可能会倾向于在逻辑中寻找缺陷，从而可能在错误的地方浪费大量时间寻找问题。这相当于编程中的“你插电了吗？”问题。\n\
    \n### 实现并确认代码连接\n\n创建一个新的Objective-C类，就像上一章创建`Trigger`和`PlayTimelineWhenTriggered`类一样。这一次，将新类命名为`GameMenuLayer`，并使其成为`CCNode`的子类。如果需要回忆，请查看[Figure\
    \ 2-10](#part0011.html#Fig10)和[Figure 2-11](#part0011.html#Fig11)。\n\n添加该类满足了将`GameMenuLayer`分配为`GameMenuLayer.ccb`根节点自定义类的要求。你可以通过添加[Listing\
    \ 6-1](#part0015.html#list1)中的代码来确认该类至少被实例化一次，该代码仅在`CCBReader`加载了使用此类的节点时记录日志。\n\
    \n[***Listing 6-1***](#part0015.html#_list1)。日志记录确认至少加载了一个使用`GameMenuLayer`类的节点\n\
    \n```\n#import \"GameMenuLayer.h\"\n#import \"GameScene.h\"\n\n@implementation\
    \ GameMenuLayer\n\n-(void) didLoadFromCCB\n{\n    NSLog(@“YAY! didLoadFromCCB:\
    \ %@\", self);\n}\n\n-(void) shouldPauseGame\n{\n    NSLog(@\"BUTTON: should pause\
    \ game\");\n}\n\n@end\n```\n\n为了满足将`_gameMenuLayer`变量分配给`GameScene.ccb`根节点的要求，打开`GameScene.m`，导入新的`GameMenuLayer`类，并在文件顶部添加`_gameMenuLayer`实例变量，如[Listing\
    \ 6-2](#part0015.html#list2)中高亮显示的部分。"
  raw: 'Another option for a visual highlight is to leave both normal and highlighted
    state settings at their default values except for one or both color properties
    of either the normal or highlighted state. The button’s background and/or label
    would then change color when highlighted—for instance, lit up with a bright white
    as opposed to a light gray in the normal state. In this instance, that effect
    is also used by making the button’s *Label color* a light gray in the normal state.


    **Tip**  When using colors for highlights, the best effects are achieved with
    only subtle color variations. For instance, you could use lighter and darker versions
    of the same color. Changing the background or label color from green to red...well,
    that’s just going to look ugly.


    CCLabelTTF Properties


    The button’s *CCLabelTTF* properties are the same as those for a regular *Label
    TTF* node. The image in [Figure 6-4](#part0015.html#Fig4) does not show the *Font
    Effects* section; this will be discussed in detail in the “Labels & Localization”
    chapter.


    ![9781484202630_Fig06-04.jpg](images/00088.jpeg)


    [Figure 6-4](#part0015.html#_Fig4). CCLabelTTF properties


    The label’s *Font name*, *Font size*, and *Alignment* properties should be self-explanatory.
    Clicking the *UI* button for Font size as well as the padding properties prevents
    these properties from scaling by a factor of 2 when running on iPad, effectively
    keeping the button the same size as on an iPhone rather than scaling it up. You
    can give this a try and then toggle screen sizes with Cmd+1 and Cmd+2 to see the
    effect. But revert it back to point scaling by clicking the dot icon as shown
    in [Figure 6-4](#part0015.html#Fig4).


    The *Horizontal padding* and *Vertical padding* settings allow you to declare
    the button’s label to be twice this many points wider and higher. The horizontal
    padding of 20 shown in [Figure 6-4](#part0015.html#Fig4) makes the label 40 points
    wider in total, which will also expand the button’s background image accordingly.
    Padding is mainly used to control how far the label is inset from the background
    image’s borders.


    In this case, set *Horizontal padding* from its default 10 to 20 to ensure that
    the label’s letters are printed entirely on the solid gray area of the background
    image rather than drawn over or close to the background image’s unevenly shaped
    borders.


    Assigning the Button Selector


    On the *Item Code Connections* tab for the button, enter **shouldPauseGame** as
    the button’s *Selector* in the *CCControl* section. See [Figure 6-5](#part0015.html#Fig5)
    for reference. The *Target* drop-down menu should be set to *Document root*.


    ![9781484202630_Fig06-05.jpg](images/00089.jpeg)


    [Figure 6-5](#part0015.html#_Fig5). The pause button will run the shouldPauseGame
    selector


    There’s also a *Continuous* check box that you should not check; if you check
    it, the button would run the selector once every frame as long as the user keeps
    a finger on the button. This can be useful for a rapid fire or d-pad button, but
    here it is undesirable.


    **Tip**  I like to prefix user-initiated actions with “should” because they can
    be seen as a request, not a command that must be obeyed indiscriminately. If that
    sounds contradictory, consider a platformer game where you can jump and double-jump,
    with the jump button always being active. The user requests a jump by having the
    jump button run the shouldJump selector. The method first checks if the player
    is on ground, and if so, initiates the jump. If the request is sent when the player
    is in the air, the shouldJump selector will either initiate a double-jump or ignore
    the request.


    It is best practice to double-check all user interactions for validity. For instance,
    if you didn’t instantly disable the pause button when pressed, the user might
    tap the pause button a second time accidentally, potentially causing issues like
    running the animation twice. Naming selectors with the “should” prefix is therefore
    a nice indicator that an action should be performed but can also be denied or
    interpreted differently based on certain conditions.


    Assigning the GameMenuLayer Class and Ivar


    The button’s shouldPauseGame selector is sent to the *Document root*. The document
    root is the root node of *GameMenuLayer.ccb*. Therefore, the root node of *GameMenuLayer.ccb*
    needs to have a custom class where the selector can be implemented.


    **Caution**  It’s a common mistake to set the custom class of the button itself,
    consequently creating a subclass of *CCButton* to handle the button selectors.
    Buttons are never the receivers of their own selectors.


    Select the root node in *GameMenuLayer.ccb*, and switch to the *Item Code Connections*
    tab. In the *Custom class* field, enter **GameMenuLayer**.


    Furthermore, you’ll want access to the *GameMenuLayer* root node from within the
    GameScene class. Open *GameScene.ccb*, select the sub file node referencing *GameMenuLayer.ccb*,
    and then set Doc root var to _gameMenuLayer. This will assign a reference to the
    *GameMenuLayer.ccb* root node to the *GameScene* ivar named _gameMenuLayer, which
    you’ll add next.


    **Caution**  Another common mistake is to edit the Doc root var field of the *GameMenuLayer.ccb*
    root node rather than its reference in *GameScene.ccb*. Doing so will literally
    create a self reference in a *GameMenuLayer* ivar. Changing the variable type
    to Owner var will not work either because the owner is a reference you specify
    in code when using the *CCBReader* method load:owner:.


    Programming the GameMenuLayer


    It’s time to fire up Xcode again to add the GameMenuLayer class and the shouldPauseGame
    method.


    Your first goal should always be to make new code connections technically functional
    as soon as possible and verify that they work. It’s a potential waste of time
    to start writing code without first confirming that the connected selectors actually
    run and the ivars or properties are being assigned properly. You may be inclined
    to find the flaw in your logic instead, possibly wasting time looking for issues
    in all the wrong places. It’s the programming equivalent for “Did you plug it
    in?” issues.


    Implementing and Confirming Code Connections


    Create a new Objective-C class just like you did in the last chapter with the
    Trigger and PlayTimelineWhenTriggered classes. This time, name the new class **GameMenuLayer**
    and make it a subclass of *CCNode*. Look at [Figure 2-10](#part0011.html#Fig10)
    and [Figure 2-11](#part0011.html#Fig11) if you need to refresh your memory.


    Adding the class satisfies the requirement created by assigning GameMenuLayer
    as the custom class of the *GameMenuLayer.ccb* root node. You can confirm that
    the class is instantiated at least once by adding the code in [Listing 6-1](#part0015.html#list1)
    to merely log whenever a node with this class has been loaded by *CCBReader*.


    [***Listing 6-1***](#part0015.html#_list1). Logging confirms that at least one
    node using the GameMenuLayer class is loaded


    ```

    #import "GameMenuLayer.h"

    #import "GameScene.h"


    @implementation GameMenuLayer


    -(void) didLoadFromCCB

    {

        NSLog(@“YAY! didLoadFromCCB: %@", self);

    }


    -(void) shouldPauseGame

    {

        NSLog(@"BUTTON: should pause game");

    }


    @end

    ```


    To satisfy the _gameMenuLayer variable assignment to *GameScene.ccb*’s root node,
    open *GameScene.m* to import the new GameMenuLayer class and to add the _gameMenuLayer
    ivar at the top of the file as highlighted in [Listing 6-2](#part0015.html#list2).'
