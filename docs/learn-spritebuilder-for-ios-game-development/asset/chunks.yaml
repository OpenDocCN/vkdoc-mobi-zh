    node from the *Node Library View* onto the stage. This node should be a child
    of the root node but *not* a child of the P_bg sprite. Change the label’s text
    to **READY!**, and increase its *Font size* to *100*. Feel free to edit any other
    label properties as you see fit. But do uncheck the label’s *Visible* check box
    at the very top of the properties tab so that it starts out initially hidden.
    You should also change the label’s position types to % and values to *50* so that
    it is centered on the stage.


