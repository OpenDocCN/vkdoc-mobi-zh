    \  \n\n尽管如此，不要让我阻止你这样做。只是要做好准备，进行大量调整、实验，甚至时不时地失败。最好时不时地用 Finder（或者一旦 SpriteBuilder\
    \ 具备“复制 CCB”功能，就用它）制作玩家的备份副本。创建可靠的软体物理需要时间、汗水、精力，以及你能投入的一切。结果（如图 10-18 所示）值得付出努力！\
    \  \n\n![9781484202630_Fig10-18.jpg](img/00161.jpeg)  \n\n图 10-18：我有一张嘴，无论多么痛苦，我都必须咧嘴笑\
    \  \n\n总结  \n\n本章教你创建软体对象的基本原理。本质上只是弹簧关节和距离关节的正确组合。在实现不同类型的软体方面有很大的实验空间。一般来说，试验软体物理也很有趣，无论你的游戏项目是否需要它，所以我鼓励你尝试不同的变体。\
    \  \n\n你还学习了使用 Cocos2D 自有渲染器进行自定义绘制。我希望我能够传达出它比纯 OpenGL 更容易使用。使用可变数量的顶点自定义绘制纹理，在软体物理之外有许多应用。例如，你可以用可管理的精力制作一面在风中飘扬的旗帜动画，而无需借助着色器编程——那是一个完全不同的领域，超出了本书的范围。如果你想了解更多关于\
    \ iOS 底层图形编程的知识，可以查阅 Apress 出版的《Pro OpenGL ES for iOS》。  \n\n软体玩家部分结束了游戏玩法的改动。你可以在`11\
    \ - Soft-Body Player`文件夹中找到最终项目。在接下来的两章中，你将添加音乐、音效和视觉效果。  \n\n**第三部分**  \n\n现在你是一名\
    \ SpriteBuilder 专家！  \n\n**第 11 章**  \n\n音频和标签  \n\n在本章中，你将学习如何播放音频，包括音效和音乐。音效可以通过时间线播放，但大部分需要利用\
    \ ObjectAL（Cocos2D 和 SpriteBuilder 使用的音频引擎）进行编程实现。  \n\n本章后半部分专门介绍标签——具体来说，是 TrueType\
    \ 字体特效，以及为何及如何使用位图字体标签。你还将了解标签文本的本地化，以及如何确保本地化标签在运行时能够嵌入数值信息，例如分数和其他计数器。  \n\n\
    介绍 ObjectAL  \n"
- fmt: '# Cocos2D Audio Framework


    `Cocos2D` includes the `ObjectAL` audio framework to play back sound effects and
    music. `ObjectAL` is a framework built around the low-level `OpenAL` API, which
    is best used for short sound effects (`.wav`, `.caf`, `.aiff`), and Apple''s `AVAudioPlayer`,
    which is best used to decode and stream long-running audio (mp3, m4a, mp4, ac3).
    The architecture is depicted in [Figure 11-1](#part0022.html#Fig1).


    ![9781484202630_Fig11-01.jpg](images/00162.jpeg)


    [Figure 11-1](#part0022.html#_Fig1). The architecture of `ObjectAL` encapsulates
    both `OpenAL` and `AVAudioPlayer` frameworks.


    The `OALSimpleAudio` singleton provides a simple-to-use programming interface
    for all essential audio needs. It generally knows of two types of audio: *effects*
    for short, memory-buffered sound effects, and *bg* (background) for long-running
    audio like music and speech. The effects commands will play audio through `OpenAL`,
    while the background commands will be played back by `AVAudioPlayer`.


    It''s crucial to know the difference between the two types of audio files and
    corresponding formats. [Table 11-1](#part0022.html#Tab1) summarizes the important
    details.


    [Table 11-1](#part0022.html#_Tab1). Differences between short sound effects played
    through `OpenAL` and long audio played through `AVAudioPlayer`


    | | Short Sound-Effects/OpenAL | Long-Running Audio/AVAudioPlayer |

    | --- | --- | --- |

    | **Playback Delay** | None or small delay, depending on file size and format
    | Small delay if not preloaded |

    | **Format on Disk** | Any software-decodable format | Any software-decodable
    format, or any hardware format if using hardware |

    | **Decoding** | During load | During playback |

    | **Memory Use** | Entire file loaded and decompressed into memory | File streamed
    in real time (very low memory usage) |

    | **Simultaneous Playback** | 32 simultaneous effects | Limited only by CPU |

    | **Playback Performance** | Good | Excellent with 1 track (hardware decoding).
    Still good with 2 or a few tracks, but additional tracks tax the CPU significantly.
    |

    | **Looped Playback** | Yes (on or off) | Yes (specific number of loops, unlimited
    loops, or off) |

    | **Panning** | Yes (mono files only) | Yes |

    | **Positional Audio** | Yes (mono files only) | No |

    | **Modify Pitch** | Yes | No |

    | **Audio Power Metering** | No | Yes |

    | **Recommended Formats** | 44 or 22 kHz sample rate with 16 bits per sample.
    Uncompressed PCM. Prefer mono. Containers: `.caf`, `.aiff` or `.wav`. Duration:
    a fraction of a second to a few seconds. | MP3 or AAC encoding, variable or constant
    bitrate between 80 kbps to 192 kbps. Mono or stereo. Containers: mp3, m4a, mp4.
    Duration: a few seconds to several minutes. |


    **Caution** Not all audio formats are supported by mobile devices. For instance,
    OGG and FLAC files cannot be played on iOS. It''s best to stick to the most common
    formats: `.caf` and `.wav` for sound effects, and for long-running audio use either
    mp3 or m4a. If you have an audio file in a different format, use an audio converter
    like `SoundConverter` or an audio editor like `Audacity` to convert the files.
    And if you have an audio file in the correct format but it won''t play, it may
    have been created/modified by an audio program that writes nonstandard extensions
    or adds metadata that will trip up `OpenAL` or `AVAudioPlayer`. In that case,
    open the audio file in `Audacity`, re-export it to the same format, and then try
    again.


    You''ll learn more about `OALSimpleAudio`''s programming interface shortly in
    this chapter. Suffice it to say that `ObjectAL` covers all of your audio needs.
    If you need more functionality than offered by `OALSimpleAudio` but don''t know
    where to start (besides the documentation and `ObjectAL` demos, obviously), I
    recommend you take a look at how the `OALSimpleAudio` class uses the `ObjectAL`,
    `OALAudioTrack`, and `OALAudioSession` classes.


    You can dig deeper into `ObjectAL` on its homepage at [http://kstenerud.github.io/ObjectAL-for-iPhone](http://kstenerud.github.io/ObjectAL-for-iPhone),
    where you''ll find the documentation and class reference as well as the download
    archive, which contains additional demo projects.


    # Using Audio Files in SpriteBuilder


    Although you can add audio files directly to the Xcode project, bypassing `SpriteBuilder`,
    it is recommended that you allow `SpriteBuilder` to manage all audio files, whether
    they''ll be used in Timelines or not.


    ## Importing Audio into SpriteBuilder


    If you use `SpriteBuilder` to manage your audio files, you needn''t worry too
    much about the audio format details. It''s best if your input files are uncompressed
    audio files like WAV files.


    In the book''s downloadable archive is an `Audio` folder that contains the audio
    files. If you want to use your own audio files, you can use any other audio files
    instead, but they should be in `.wav` or `.caf` format. You should visit [http://opengameart.org](http://opengameart.org)
    if you are looking for free sound effects and music, but keep in mind that "free
    to download" doesn''t necessarily mean "free to use in a commercial app." Always
    check the licenses for `OpenGameArt` resources to see if re-use in commercial
    applications is allowed. (The commercial apps category includes free apps showing
    commercial ads.)


    I assume you have either located or created an `Audio` folder that contains two
    music files, named `game-music.wav` and `menu-music.wav`, and short sound effects
    named `menu-sfx.wav`, `splat1.wav`, `splat2.wav`, and `splat3.wav`. You should
    drag and drop the `Audio` folder onto SpriteBuilder''s `File View` so that the
    `Audio` folder appears in the `File View`. If you select one of the `.wav` files
    in the `Audio` folder, you''ll see a preview image with settings as shown in [Figure
    11-2](#part0022.html#Fig2).


    ![9781484202630_Fig11-02.jpg](images/00163.jpeg)


    [Figure 11-2](#part0022.html#_Fig2). Audio file preview and settings


    You can play back the audio within `SpriteBuilder` using the *Play* button. Underneath,
    you see the duration expressed in seconds and an indication of whether the audio
    file is mono or stereo. Below that are the publishing settings, where you can
    choose between CAF format (uncompressed) for short sound effects and MP4 format
    (compressed) for long-running audio. The MP4 format also allows you to change
    the quality setting. The lower the quality setting is, the smaller the resulting
    file will be. The default audio quality settings are editable in the *File ![image](images/00008.jpeg)
    Project Settings* dialog.


    `SpriteBuilder` will automatically assume an imported audio file shorter than
    15 seconds is a sound effect and will thus select the corresponding CAF format.
    Otherwise, it will have MP4 preselected for you. Also note, at the time of this
    writing, only audio files with the `.caf` and `.wav` extensions could be imported.
    If you already have files in the `.mp3` or `.m4a` format, you can either add them
    to Xcode directly or, preferably, convert them to `.wav` or `.caf` to be able
    to manage them with `SpriteBuilder`.


    ## Playing Sound Effects via the Timeline


    In `SpriteBuilder`, you can add sound-effects keyframes to any Timeline. This
    is most useful if you need to synchronize audio playback with other Timeline animations,
    such as the appearance of an object or matching the moment when the moving object
    starts to slow down. Timeline sound effects will be played through `OALSimpleAudio`''s
    effects channel, thus using `OpenAL` for playback regardless of the file format.


    **Caution** If the node owning a Timeline''s `CCBAnimationManager` deallocates,
    any sound effect played through that Timeline will be cut short (stopped) or won''t
    even get to play at all. This typically affects the playback of audio files with
    a duration longer than the Timeline whose end has the node removed from the scene—for
    instance, via a *Callbacks* keyframe.'
