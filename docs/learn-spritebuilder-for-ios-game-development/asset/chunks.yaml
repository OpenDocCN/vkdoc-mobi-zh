- fmt: 'You may also want to remove two rope elements and then move the individual
    sprites and their joints apart so that the rope segments have less overlap.


    ## Adding Ropes and Chains to the Level


    You can now place one or more `Rope.ccb` instances to `Level1.ccb`—or any other
    level CCB, for that matter.


    You should also drag a plain node from the *Node Library View* onto the level’s
    `CCPhysicsNode` and rename it in the Timeline to `chains` & `ropes` & `springs`.
    Then add any chains, ropes, and (later) springs to this container node. You will
    mainly want to do so to ensure the proper draw order for these objects; they should
    be drawn behind the borders and in front of the gears and saws. (See [Figure 9-11](#part0019.html#Fig11).)


    ![9781484202630_Fig09-11.jpg](images/00128.jpeg)


    [Figure 9-11](#part0019.html#_Fig11). Chains, ropes, and springs draw order in
    the `Level1.ccb` Timeline


    You should definitely try to rotate the chain and rope instances so that they
    start out swinging due to gravity. Try to avoid placing chains and ropes within
    trigger areas or largely within borders for now. Positioning them in that way
    would cause incorrect collision behavior, which you’ll see how to fix in the next
    section.


    In SpriteBuilder, the placed chains and ropes will look rather stiff, like in
    [Figure 9-12](#part0019.html#Fig12).


    ![9781484202630_Fig09-12.jpg](images/00129.jpeg)


    [Figure 9-12](#part0019.html#_Fig12). Chain and rope placed in the level


    The result in-game will be nicely animated chains and ropes, as seen in [Figure
    9-13](#part0019.html#Fig13)


    ![9781484202630_Fig09-13.jpg](images/00130.jpeg)


    [Figure 9-13](#part0019.html#_Fig13). Chain and rope in motion, bending and flexing
    nicely


    **Note**  The rope’s visual design using sprites works best if the rope can’t
    bend too much. If you need a really elastic, flexible rope, you may need to resort
    to drawing the rope using Cocos2d’s `CCRenderer`. Each node class can override
    the `–(void)draw:(CCRenderer *)renderer transform:(const GLKMatrix4 *)transform`
    method to perform custom drawing. You’ll find an example in the next chapter.


    ## Fixing Chain and Rope Collisions


    The chain and rope may also appear wildly distorted, as shown in [Figure 9-14](#part0019.html#Fig14),
    when they are partially stuck inside a collision or overlapping. This can lead
    to the entire chain or ball jittering, separating, or even leaving the screen.
    If the player character touches such an unresting chain or rope, it may be accelerated
    to a high velocity instantly.


    ![9781484202630_Fig09-14.jpg](images/00131.jpeg)


    [Figure 9-14](#part0019.html#_Fig14). The effect of a complex physics object “exploding.”
    Physics debug drawing highlights the large distances between the chain and rope
    segments


    [Figure 9-14](#part0019.html#Fig14) shows what can happen momentarily to the distorted
    chain and ball when they’re placed so that they overlap each other. The `drawPhysicsShapes`
    custom property on `GameScene.ccb` was enabled to highlight the physics objects
    and joints. This effect is typically referred to as an “exploding” physics object.


    ## Minimizing the Risk of Physics Bodies “Exploding”


    The number one cause you always have to watch out for but can never prevent entirely
    occurs when two complex physics bodies somehow get stuck inside each other. Both
    objects’ constraints will frantically try to resolve their constraints, adding
    forces to the other body, which in turn fights back through its own constraints.


    This can happen so quickly that the effect seems like everything is okay one moment
    and the objects are completely whacked, if not gone altogether, a moment later.


    The effect isn’t always this extreme, but it can be. Editing each joint’s `Max
    force` setting will help reduce the probability of the complete and utter destruction
    of complex interacting physics objects. With a maximum force applied to all constraints,
    chains and ropes could still get stuck within each other, wiggling and fighting
    each other, but their joint connections will largely remain intact.'
