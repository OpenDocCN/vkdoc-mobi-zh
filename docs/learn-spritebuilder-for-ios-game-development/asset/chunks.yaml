- fmt: '## 排版后的文本


    将`Color Node`拖放到舞台上现有`Gradient Node`的上方。时间线将如图 2-19 所示。


    ![9781484202630_Fig02-19.jpg](images/00028.jpeg)


    [Figure 2-19](#part0011.html#_Fig19). 时间线以层级视图列出 CCB 文件中的节点


    现在，如果你希望`Color Node`绘制在`Gradient Node`的后面（下方），只需在时间线大纲视图中将其拖放到`Gradient Node`的上方。结果应与图
    2-20 相同。


    ![9781484202630_Fig02-20.jpg](images/00029.jpeg)


    [Figure 2-20](#part0011.html#_Fig20). `CCNodeColor`通过拖放向上移动以反转绘制顺序


    在舞台上，如果移动颜色节点，它现在应该滑到渐变节点下方。示例见图 2-21。


    ![9781484202630_Fig02-21.jpg](images/00030.jpeg)


    [Figure 2-21](#part0011.html#_Fig21). 颜色节点现在绘制在渐变节点的后面


    时间线中的拖放操作也用于移动节点，使其成为另一节点的子节点，从而改变节点的父节点。值得注意的是，子节点总是绘制在其父节点的前面。


    **提示** 双击时间线中的节点，你可以在`SpriteBuilder`中为其指定一个描述性的、纯信息性的名称。节点在时间线中的名称可以与其`Name`属性不同，但为了减少混淆，最佳实践是确保节点在时间线中的名称与其`Name`属性保持一致。


    最后，再次删除`Color Node`，它仅用于演示绘制顺序。选中颜色节点，然后按`Backspace`键，或使用菜单：“Edit”![image](images/00008.jpeg)“Delete”。


    ### 用渐变填充图层


    掌握了这些知识，便可以用渐变节点轻松填充整个图层。将内容尺寸缩放类型分别更改为“Width in percent of parent container”和“Height
    in percent of parent container”。在内容尺寸的“Width”和“Height”字段中输入`100`和`100`。假设位置和锚点均设置为默认值`0,
    0`（缩放为`1, 1`，旋转为`0`），这将使渐变填充整个图层。参考图 2-22。


    ![9781484202630_Fig02-22.jpg](images/00031.jpeg)


    [Figure 2-22](#part0011.html#_Fig22). 渐变节点内容尺寸设置为`100%`以填充整个图层


    由于`Level1`图层可能比屏幕更宽，你可能需要缩小视图以查看整个图层进行确认。“Zoom In”、“Zoom Out”和“Reset View”命令位于“Document”菜单中——虽然使用键盘快捷键`Cmd
    +`、`Cmd –`和`Cmd 0`要方便得多。你也可以按住`Cmd`键并用鼠标左键拖动舞台来平移图层。


    在继续之前，可以随意尝试`CCNodeGradient`的属性。例如，更改渐变颜色和决定渐变方向的`Vector`属性。这样做也有助于你更好地观察下一章将要实现的滚动效果的早期版本。


    ### 创建子文件引用


    作为最后一步，你需要在`GameScene`中实际引用这个新的`Level1.ccb`。这通过`Sub File`节点实现。


    你可以直接将一个`Sub File`节点拖放到舞台上，然后编辑其`CCB File`属性，指向所需的`CCB`文件。但有一个更简单的方法。这时左侧的“Tileless
    Editor View”资源导航器就派上用场了。


    双击打开`GameScene.ccb`。然后，在“Resource Navigator”窗格中选择“Tileless Editor View”选项卡（左数第二个）。它将列出一个名为`Level1`的项——即`Level1.ccb`——和一个预览缩略图，如图
    2-23 所示。


    ![9781484202630_Fig02-23.jpg](images/00032.jpeg)


    [Figure 2-23](#part0011.html#_Fig23). 显示`Level1.ccb`内容缩略图的“Tileless Editor View”


    **注意** 缩略图仅在保存`CCB`或发布项目时更新。如果未看到缩略图或显示错误的预览图像，请尝试发布一次项目。如果`SpriteBuilder`提示，确认“Save
    All”文档。


    你应该从“Tileless Editor View”中将`Level1`项拖放到舞台上，创建一个引用`Level1.ccb`文件内容的`Sub File`节点。如果你检查新节点的“Item
    Properties”选项卡，你将看到一个引用`Levels/Level1.ccb`的`CCB File`条目。在时间线中，这个新节点被标记为`CCBFile`。你可能希望双击它并赋予其一个可识别的名称——例如“level
    content”。


    由于`Sub File`节点有自己的位置，且被引用的`Level1.ccb`被视为`Sub File`节点的子节点，因此你需要将新节点的位置更改为`0,0`，以便这个虚拟关卡与屏幕左下角正确对齐。此外，“change
    scene”按钮现在绘制在关卡内容的下方——只需将时间线中的`CCButton`条目拖到“level content”节点下方，如前所述。


    当你创建越来越多的代表游戏单个元素的`CCB`文件时，它们都将在“Tileless Editor View”中可用。它们将成为你游戏的预制内容节点自定义库，有时被称为*prefabs*（“预制件”的简称）或模板。


    ### 添加玩家精灵


    第一个预制件将是玩家角色，它将会是一个精灵。精灵需要图像资源。


    此外，应尽可能将精灵打包到*图集纹理*中以提高渲染性能。`Cocos2d`将图集纹理称为“spritesheets”，但它们是同一回事：一个包含多个图像的大纹理，并带有元信息，告诉`Cocos2d`在图集纹理中的何处可以找到给定名称的图像。幸运的是，`SpriteBuilder`为你自动完成了精灵表的生成以及从精灵表加载图像的过程。


    **提示** 特定图像在同一场景中使用的越频繁，将其放入精灵表的好处就越大。但是，如果你添加了太多或太大的图像，生成的精灵表的尺寸可能会超过`4096 x
    4096`像素的最大值。如果发生这种情况，`SpriteBuilder`将生成一条警告消息，要解决此问题，你必须删除一些图像，最好将它们添加到新的精灵表中。


    ### 创建精灵表


    现在你应在文件视图中创建一个新文件夹，命名为`SpriteSheets`。然后向其添加一个子文件夹，命名为`Global`。接着，右键单击`Global`文件夹以调出上下文菜单（见图
    2-24），并选择“Make Smart Sprite Sheet”。


    ![9781484202630_Fig02-24.jpg](images/00033.jpeg)


    [Figure 2-24](#part0011.html#_Fig24). 开始操作！将文件夹转换为智能精灵表


    你会注意到“Atlas”文件夹图标变成了粉红色。在其上方的预览区域中，你会获得一些额外的选项来更改精灵表的发布格式。现在，你可以保留格式为`PNG`（未压缩，无抖动），但推荐的格式是选择了“Compress”的`PVR
    RGBA8888`，以节省内存并显著加快这些图像的加载速度。使用压缩的`PVR`没有缺点。`Cocos2D`用户可能会通过其`.pvr.ccz`扩展名识别这种纹理格式。'
  raw: 'Drag and drop a Color Node onto the stage, on top of the existing Gradient
    Node. The Timeline will look like [Figure 2-19](#part0011.html#Fig19).


    ![9781484202630_Fig02-19.jpg](images/00028.jpeg)


    [Figure 2-19](#part0011.html#_Fig19). The Timeline lists a CCB file’s nodes in
    a hierarchical view


    Now if you want the Color Node to be drawn behind (under) the Gradient Node, you
    just drag and drop it in the Timeline outline view above the Gradient Node. The
    result should be the same as in [Figure 2-20](#part0011.html#Fig20).


    ![9781484202630_Fig02-20.jpg](images/00029.jpeg)


    [Figure 2-20](#part0011.html#_Fig20). CCNodeColor moved upwards via drag and drop
    to reverse the draw order


    In the stage, the color node should now slide under the gradient node if you move
    it. See [Figure 2-21](#part0011.html#Fig21) for an example.


    ![9781484202630_Fig02-21.jpg](images/00030.jpeg)


    [Figure 2-21](#part0011.html#_Fig21). Color node is now drawn behind the gradient
    node


    The drag-and-drop operations in the Timeline are also used to move a node so that
    it becomes a child of another node, essentially changing the node’s parent. It
    is worth noting that child nodes are always drawn in front of their parent node.


    **Tip**  Double-clicking a node in the Timeline allows you to give it a descriptive,
    purely informational name within SpriteBuilder. A node’s name in the Timeline
    can be different from its Name property but it’s good practice to ensure a node’s
    name in the Timeline is the same as its Name property, to avoid confusion.


    Finally, delete the Color Node again, it only served to demonstrate the draw order.
    Select the color node, and press Backspace, or use the menu: Edit ![image](images/00008.jpeg)
    Delete.


    Filling the Layer with a Gradient


    Armed with that knowledge, it becomes easy to fill the entire layer with the gradient
    node. Change the content size scale types to Width in percent of parent container
    and Height in percent of parent container. Enter 100 and 100 for both content
    size Width and Height fields. Provided that both position and anchor point are
    both set to their default values of 0, 0, (scale being 1, 1 and rotation being
    0), this will make the gradient fill the entire layer. See [Figure 2-22](#part0011.html#Fig22)
    for reference.


    ![9781484202630_Fig02-22.jpg](images/00031.jpeg)


    [Figure 2-22](#part0011.html#_Fig22). Gradient node content size set to 100% to
    fill the entire layer


    Because the Level1 layer is likely wider than the screen, you may want to zoom
    out to see the entire layer to confirm this. The Zoom In, Zoom Out, and Reset
    View commands are found in the Document menu—though the keyboard shortcuts Cmd
    +, Cmd – and Cmd 0 are far more convenient to use. You can also pan the layer
    around by holding down the Cmd key and dragging the stage with the left mouse
    button.


    Feel free to experiment with the CCNodeGradient properties before moving on. For
    instance, change the gradient colors and the Vector property that determines the
    direction of the gradient. Doing so will also help you to better see the early
    version of the scrolling effect you’ll be implementing in the next chapter.


    Creating a Sub File Reference


    As the last step, you need to actually reference this new Level1.ccb in the GameScene.
    This is done with the Sub File node.


    You could just drag a Sub File node onto the stage and then edit its CCB File
    property to point to the desired CCB file. But there’s an easier way. Here’s where
    the Tileless Editor View on the left-hand Resource Navigator comes in handy.


    Open the GameScene.ccb by double-clicking it. Then select the Tileless Editor
    View tab (second from the left) in the Resource Navigator pane. It’ll list a single
    item named Level1—that’s the Level1.ccb—along with a preview thumbnail image as
    shown in [Figure 2-23](#part0011.html#Fig23).


    ![9781484202630_Fig02-23.jpg](images/00032.jpeg)


    [Figure 2-23](#part0011.html#_Fig23). Tileless Editor View with a thumbnail image
    of Level1.ccb contents


    **Note**  The thumbnails are updated only when a CCB is saved or the project is
    published. If you don’t see a thumbnail or it shows the wrong preview image, try
    publishing the project once. Confirm to Save All documents if SpriteBuilder asks.


    You should drag and drop the Level1 item from the Tileless Editor View to create
    a Sub File node that references the Level1.ccb file’s contents. If you inspect
    the new node’s Item Properties tab, you’ll see a CCB File entry that references
    Levels/Level1.ccb. In the Timeline, this new node is labeled CCBFile. You may
    want to double-click it and give it a recognizable name—for instance, “level content.”


    Because the Sub File node has a position of its own and the referenced Level1.ccb
    is treated like a child of the Sub File node, you need to change the new node’s
    position to 0,0 so that the dummy Level is properly aligned with the lower-left
    corner of the screen. Also, the “change scene” button is now being drawn underneath
    the level content—just drag the CCButton entry in the Timeline below the “level
    content” node as described earlier.


    As you create more and more CCB files representing individual elements of your
    game, they will all become available in the Tileless Editor View. They will become
    your game’s custom library of prefabricated content nodes, sometimes called *prefabs*
    (short for “prefabricated”) or templates.


    Adding the Player Sprite


    The first prefab will be the player character, and it will be a sprite. Sprites
    need an image resource.


    Moreover, as much as possible, sprites should be packed into *atlas textures*
    to improve rendering performance. Cocos2d refers to atlas textures as “spritesheets,”
    but they are the same thing: a large texture containing multiple images with meta
    information that tells Cocos2d where inside the atlas texture to find the image
    for a given name. Fortunately, SpriteBuilder automates both Sprite Sheet generation
    and loading images from a Sprite Sheet for you.


    **Tip**  The more often a particular image is used in the same scene, the more
    it will benefit from being in a spritesheet. However, if you add too many or too
    large images, the dimensions of the resulting Sprite Sheet may become greater
    than the maximum of 4096 x 4096 pixels. If that is the case, SpriteBuilder will
    generate a warning message, and to fix it you’d have to remove some images, preferably
    by adding them to a new Sprite Sheet.


    Creating a Sprite Sheet


    You should create a new folder in the File View now, and name it *SpriteSheets*.
    Then add a subfolder to it and name it *Global*. Then right-click the Global folder
    to bring up a context menu (see [Figure 2-24](#part0011.html#Fig24)), and select
    *Make Smart Sprite Sheet*.


    ![9781484202630_Fig02-24.jpg](images/00033.jpeg)


    [Figure 2-24](#part0011.html#_Fig24). Make it so! Turning a folder into a Smart
    Sprite Sheet


    You’ll notice the Atlas folder icon turned pink. And above it, in the preview
    area, you get a few extra options to change the sprite sheet’s publishing format.
    For now, you can leave the format as PNG (uncompressed, no dithering), but the
    recommended format is PVR RGBA8888 with Compress selected to conserve memory and
    to load these images significantly faster. There is no downside to using compressed
    PVR. Cocos2D users may recognize this texture format by its .pvr.ccz extension.'
