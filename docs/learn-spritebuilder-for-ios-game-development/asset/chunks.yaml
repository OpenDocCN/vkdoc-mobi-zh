- fmt: "在编程方面，您学习了如何更改起始场景、如何创建自定义类、如何响应按钮选择器、如何加载 CCB 文件以及如何在场景之间进行转换。\n\n您现在有了一个包含两个场景的骨架应用，您可以通过点击按钮在两个场景之间来回切换。在下一章中，您将滚动关卡以确保玩家保持在屏幕中央。此外，您还将为玩家添加触摸控制和移动功能。\n\
    \n## 第 3 章 控制与滚动\n\n大多数游戏都需要某种方式来控制玩家角色。您将学习使用 Cocos2D 动作来让玩家穿过您设计的关卡。由于本项目中的关卡比屏幕大，并且为了增加世界的深度感，您还将实现视差滚动。\n\
    \n### 触摸即动：移动玩家\n\n首要任务是添加响应触摸事件的代码。您将使用它来移动玩家。为此，您首先必须在`GameScene`类中建立对玩家节点的引用。\n\
    \n#### 通过名称查找玩家节点\n\n在`GameScene.m`类中，在类的`@implementation`部分下方添加[清单 3-1]（#part0012.html#list1）中的括号和变量声明。\n\
    \n**清单 3-1**。向`GameScene`类添加这些实例变量\n\n```\n@implementation GameScene\n{\n    __weak\
    \ CCNode* _levelNode;\n    __weak CCPhysicsNode* _physicsNode;\n    __weak CCNode*\
    \ _playerNode;\n    __weak CCNode* _backgroundNode;\n}\n```\n\n这段代码声明了名为`_levelNode`、`_physicsNode`、`_playerNode`和`_backgroundNode`的私有变量（称为实例变量）。它们是私有的，因为它们是在类的`@implementation`部分声明的。私有变量对其他类不可见，甚至对子类也不可见。\n\
    \n`_playerNode`被声明为`CCNode`，而不是`CCSprite`。这主要是因为这里我们不需要其特定于精灵的功能，所以通过其超类来引用它是可以的。如果稍后您需要使用其`CCSprite`功能，您可以将变量定义更改为`__weak\
    \ CCSprite* _playerNode`，或者像这样进行强制转换：\n\n```\nCCSprite* playerSprite = (CCSprite*)_playerNode;\n\
    ```\n\n> **提示** 如果您对 Objective-C 经验不足，可以通过阅读 Apple 的“使用 Objective-C 编程”指南来很好地理解该语言和面向对象编程的概念：[https://developer.apple.com/library/mac/documentation/cocoa/conceptual/ProgrammingWithObjectiveC](https://developer.apple.com/library/mac/documentation/cocoa/conceptual/ProgrammingWithObjectiveC)。Apress\
    \ 在其库中也有几本关于 Objective-C 的书籍，网址为 [www.apress.com](http://www.apress.com)。\n> \n\
    > 如果您是一位经验丰富的程序员，并且主要面临语法上的困扰，您会发现 Ray Wenderlich 的“Objective-C 速查表”很有帮助：[http://www.raywenderlich.com/4872/objective-c-cheat-sheet-and-quick-reference](http://www.raywenderlich.com/4872/objective-c-cheat-sheet-and-quick-reference)。\n\
    \n`__weak`关键字向编译器发出信号，表明此变量不应保留分配给它的对象。如果您向`_playerNode`实例发送`removeFromParent`消息，它将允许释放内存，并且由于`__weak`关键字，`_playerNode`引用将自动变为`nil`。\n\
    \n通常，将不是由类创建或拥有的对象指针实例变量声明为`__weak`是一种良好的做法。具体在 Cocos2D 中，当引用是节点的父节点（或祖父节点等）或兄弟节点时，您应始终将对节点的引用声明为`__weak`。省略`__weak`关键字会创建一个强引用，在最坏的情况下会导致保留循环——一种情况，在其最简单的形式中，节点\
    \ A 强引用节点 B，而节点 B 也持有对节点 A 的强引用，并且两者都不释放对方，因此两者都无法释放。在`__weak`不合适的情况下，您会很快注意到，因为引用通常比预期更早变为`nil`。\n\
    \n> **提示** 要了解有关弱变量和强变量的更多信息，以及何时以及为何使用它们以及一般内存管理指南，您可以在 Apple 的“高级内存管理编程指南”中找到这些信息：[https://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt](https://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt)，特别是“实用内存管理”部分。该指南由“过渡到\
    \ ARC 发行说明”补充，可在此处找到：[https://developer.apple.com/library/mac/releasenotes/ObjectiveC/RN-TransitioningToARC](https://developer.apple.com/library/mac/releasenotes/ObjectiveC/RN-TransitioningToARC)。请注意，本书的项目、SpriteBuilder\
    \ 和 Cocos2d-Swift 都使用 ARC（自动引用计数）来使内存管理更加容易。\n\n声明了上述变量后，您应该获取对玩家节点的引用并将其分配给`_playerNode`。获取节点引用的最简单方法是通过其名称。为此，请在\
    \ SpriteBuilder 中打开`Level1.ccb`并选择玩家节点。在“项目属性”选项卡上，在“名称”文本字段中输入`player`（全部小写）。\n\
    \n> **注意** 只有节点的“名称”属性可用于通过其名称获取节点。仅更改时间线中节点的名称不会使其可通过此名称访问。时间线名称仅在 SpriteBuilder\
    \ 中用于清晰性。\n\n发布项目并返回 Xcode。在`GameScene.m`中，将[清单 3-2]（#part0012.html#list2）中突出显示的代码添加到已存在的`didLoadFromCCB`方法中。\n\
    \n**清单 3-2**。启用用户交互\n\n```\n-(void) didLoadFromCCB\n{\n    // enable receiving\
    \ input events\n    self.userInteractionEnabled = YES;\n\n    // load the current\
    \ level\n    [self loadLevelNamed:nil];\n}\n```\n\n第一行允许`GameScene`类接收触摸事件。接下来，将下面显示的[清单\
    \ 3-3]（#part0012.html#list3）代码添加到`didLoadFromCCB`方法中。此代码将在本书后面展开；它目前尚未加载关卡。\n\n\
    **清单 3-3**。通过名称获取玩家节点\n\n```\n-(void) loadLevelNamed:(NSString*)levelCCB\n{\n\
    \    // get the current level's player in the scene by searching for it recursively\n\
    \    _playerNode = [self getChildByName:@\"player\" recursively:YES];\n    NSAssert1(_playerNode,\
    \ @\"player node not found in level: %@\", levelCCB);\n}\n```\n\n这里，返回了第一个名称为`player`的子节点。搜索是递归执行的，这意味着搜索覆盖了整个节点层次结构，包括`self`节点中所有子节点和孙节点。结果被分配给`_playerNode`实例变量。\n\
    \n如果无法通过名称找到`_playerNode`，这里的`NSAssert`将抛出异常并在日志中输出一条消息。像这样的安全措施是很好的做法，因为它们使您能够在出现意外情况时立即发现问题，而不是让您困惑为什么玩家不会移动。为了本书其余部分的简洁性和可读性，我将省略安全检查，但您可以在本书的[第\
    \ 14 章]（#part0025.html）：调试和最佳实践中了解有关调试策略和防御性编程技术的更多信息。"
  raw: 'On the programming side, you learned how to change the start scene, how to
    create custom classes, how to react to button selectors, and how to load CCB files,
    and how to do transitioning between scenes.


    You now have a skeleton app with two scenes between which you can change back
    and forth with a tap of a button. In the next chapter, you’ll scroll the level
    to ensure the player stays centered on the screen. And you’ll add touch controls
    and movement to the player.


    Chapter    3


    Controlling and Scrolling


    Most games need some way to control the player character. You’ll learn to use
    Cocos2D actions to move the player through the level you designed. Due to this
    project’s levels being larger than the screen, and to add the impression of depth
    to the world, you’ll also implement parallax scrolling as well.


    Touch and Go: Moving the Player


    The first order of business is to add code that reacts to touch events. You’ll
    use that to move the player around. To do so, you first have to establish a reference
    to the player node in the *GameScene* class.


    Finding the Player Node by Its Name


    In the GameScene.m class, add the brackets and variable declarations of [Listing
    3-1](#part0012.html#list1) just below the class’ @implementation section.


    [***Listing 3-1***](#part0012.html#_list1). Add these ivars to the GameScene class


    ```

    @implementation GameScene

    {

        __weak CCNode* _levelNode;

        __weak CCPhysicsNode* _physicsNode;

        __weak CCNode* _playerNode;

        __weak CCNode* _backgroundNode;

    }

    ```


    This code declares private variables (known as *ivars*) named _levelNode, _physicsNode,
    _playerNode, and _backgroundNode. They are private because they are being declared
    in the @implementation section of the class. Private variables are not visible
    to other classes, not even subclasses.


    The _playerNode is declared as CCNode, not CCSprite. This is mainly because we
    don’t need its sprite-specific functionality here, so it’s okay to reference it
    by its super class. If at a later time you need to use its CCSprite functionality,
    you can change the variable definition to __weak CCSprite* _playerNode or simply
    cast it like so:


    ```

    CCSprite* playerSprite = (CCSprite*)_playerNode;

    ```


    **Tip**  If you have little experience with Objective-C, you can get a good understanding
    of the language and object-oriented programming concepts by reading through Apple’s
    “Programming with Objective-C” guide: [https://developer.apple.com/library/mac/documentation/cocoa/conceptual/ProgrammingWithObjectiveC](https://developer.apple.com/library/mac/documentation/cocoa/conceptual/ProgrammingWithObjectiveC).
    Apress also has several Objective-C titles in its library at [www.apress.com](http://www.apress.com).


    If you are an experienced programmer and you’re mainly facing syntactical squabbles,
    you’ll find Ray Wenderlich’s “Objective-C Cheat Sheet” helpful: [http://www.raywenderlich.com/4872/objective-c-cheat-sheet-and-quick-reference](http://www.raywenderlich.com/4872/objective-c-cheat-sheet-and-quick-reference).


    The __weak keyword signals the compiler that this variable should not retain the
    object assigned to it. If you were to send the removeFromParent message to the
    _playerNode instance, it would be allowed to deallocate and the _playerNode reference
    would automatically become nil, both because of the __weak keyword.


    In general, it is good practice to declare object pointer ivars not created or
    owned by a class as __weak. In Cocos2D specifically, you should always declare
    references to nodes as __weak when the reference is either a parent (or grandparent,
    etc.) or a sibling of the node. Omitting the __weak keyword creates a strong reference,
    and in the worst case a retain cycle—a situation where in its simplest form, node
    A strongly references node B while B also holds a strong reference to A and both
    never let go of each other, and therefore both can’t deallocate. In cases where
    __weak is inappropriate, you’ll quickly notice it because the reference generally
    becomes nil earlier than expected.


    **Tip**  To learn more about weak and strong variables, and when and why to use
    them as well as general memory-management guidelines, you’ll find that information
    in Apple’s “Advanced Memory Management Programming Guide”: [https://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt](https://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt),
    specifically the “Practical Memory Management” section. The guide is amended by
    the “Transitioning to ARC Release Notes” found here: [https://developer.apple.com/library/mac/releasenotes/ObjectiveC/RN-TransitioningToARC](https://developer.apple.com/library/mac/releasenotes/ObjectiveC/RN-TransitioningToARC).
    Note that the book’s projects, SpriteBuilder, and Cocos2d-Swift all use ARC (automatic
    reference counting) to make memory management a lot easier.


    With the preceding variables declared, you should get a reference to the player
    node and assign it to _playerNode. The simplest way to get a node reference is
    by its name. To do so, open the Level1.ccb within SpriteBuilder and select the
    player node. On the Item Properties tab, enter **player** (all lowercase) into
    the Name text field.


    **Caution**  Only the Name property of a node can be used to obtain the node by
    its name. Changing the name of a node in the Timeline alone will not make it accessible
    by this name. The Timeline names are only for clarity in SpriteBuilder.


    Publish the project and go back to Xcode. In GameScene.m, add the code highlighted
    in [Listing 3-2](#part0012.html#list2) to the already existing didLoadFromCCB
    method.


    [***Listing 3-2***](#part0012.html#_list2). Enable user interaction


    ```

    -(void) didLoadFromCCB

    {

        // enable receiving input events

        self.userInteractionEnabled = YES;


    // load the current level

        [self loadLevelNamed:nil];

    }

    ```


    The first line allows the GameScene class to receive touch events. Add the [Listing
    3-3](#part0012.html#list3) code shown next to the didLoadFromCCB method. It will
    be expanded upon later in the book; it doesn’t currently load levels yet.


    [***Listing 3-3***](#part0012.html#_list3). Getting the player node by its name


    ```

    -(void) loadLevelNamed:(NSString*)levelCCB

    {

        // get the current level''s player in the scene by searching for it recursively

        _playerNode = [self getChildByName:@"player" recursively:YES];

        NSAssert1(_playerNode, @"player node not found in level: %@", levelCCB);

    }

    ```


    Here the first child node that goes by the name “player” is returned. The search
    is performed recursively, which means search covers the entire node hierarchy,
    including all child and grandchild nodes of all children in the self node. The
    result is assigned to the _playerNode ivar.


    If the _playerNode couldn’t be found by its name, the NSAssert here will throw
    an exception and spit out a message in the log. Safety measures like these are
    good practice because they allow you to catch issues the moment something doesn’t
    appear to be as expected, rather than leaving you wondering why the player won’t
    move. For the rest of the book, I’ll leave out the safety checks for brevity and
    readability, but you can learn more about debugging strategies and defensive programming
    techniques in this book’s [chapter 14](#part0025.html): Debugging and Best Practices.'
