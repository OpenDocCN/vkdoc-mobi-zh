- fmt: "I used to work on game-translation tools and processes. If the preceding list\
    \ sounds like a lot to consider, I can tell you it’s just the tip of the iceberg.\
    \ And I’m merely recalling these issues from memory; I probably neglected to mention\
    \ a few more things to consider.\n\nFortunately, you don’t have to consider all\
    \ cases, as they won’t all apply to your app. And as an independent developer,\
    \ you’re more easily forgiven if your app is English-only or provides great fun\
    \ for players despite the occasional localization oddity. Yet there’s a real risk\
    \ for ridicule if you try to translate cheaply or automatically. In that case,\
    \ it’s probably better not to translate at all.\n\nAlso, iOS provides ways to\
    \ format strings in a localized manner, based on the device’s locale. For example,\
    \ you can format dates in the current locale by passing an `NSDate` through an\
    \ `NSDateFormatter`.\n\n**Tip** You’ll find a plethora of helpful information\
    \ on Apple’s Internationalization website: [https://developer.apple.com/internationalization/](https://developer.apple.com/internationalization/).\n\
    \n## TrueType vs. Bitmap Fonts\n\nOn modern GUI operating systems, TrueType fonts\
    \ with the `.ttf` or similar extension are used almost exclusively. Their main\
    \ benefit is that they scale to any dimension without losing quality, because\
    \ TrueType fonts describe the characters (also called *glyphs*) as outlines. A\
    \ glyph’s outlines are either straight lines or Bezier curves. With a purely mathematical\
    \ description of the glyphs in a font, it is possible to render them at various\
    \ point sizes with clearly defined, sharp outlines. A glyph can also be expressed\
    \ with a relatively small dataset, thus TrueType fonts are typically smaller in\
    \ file size than a bitmap font.\n\nBitmap fonts are relatively common in games.\
    \ They don’t scale without losing image quality, but they render faster because\
    \ glyphs in a bitmap font are just sprites that need to be drawn at the right\
    \ position, rather than each outline and curve having to be calculated by the\
    \ CPU and then drawn onto the frame buffer. With the font being sprites, you can\
    \ also use any image as a glyph. The screenshot of Glyph Designer in [Figure 11-13](#part0022.html#Fig13)\
    \ illustrates this perfectly.\n\n![9781484202630_Fig11-13.jpg](images/00174.jpeg)\n\
    \n[Figure 11-13](#part0022.html#_Fig13). Any image can be used as a glyph in a\
    \ bitmap font\n\nAs long as a label’s text doesn’t change at all, the rendering\
    \ performance of TrueType and bitmap fonts in Cocos2D is the same. Both are drawn\
    \ just like sprites. If you are considering having multiple labels using the same\
    \ font, bitmap fonts will be faster because the bitmap font can draw all glyphs\
    \ from the same texture, whereas the TrueType label uses a unique texture for\
    \ each label. This also affects memory usage—with few labels, TrueType fonts may\
    \ require less memory, but each additional TrueType font label eats up significantly\
    \ more memory than additional bitmap font labels using the same font.\n\nAlso,\
    \ if the text of a TrueType font changes, a new texture needs to be created with\
    \ the new text rendering. It’s the throwing away the old texture and replacing\
    \ it with a new one part that makes TrueType labels particularly unfitting for\
    \ text that frequently changes. The larger the area occupied by the label, the\
    \ longer it takes to update its text.\n\nSo while you can make decent menus with\
    \ TrueType fonts and get to choose from a great variety of fonts, for any in-game\
    \ UI text that changes frequently (scores, lives, timers, unit names, etc.), you\
    \ should consider using bitmap fonts. In fact, the performance hit of a TrueType\
    \ font label can be so severe that updating even a single timer label every second\
    \ can cause the game to hiccup slightly when the label is updated.\n\nBut the\
    \ usual premature-optimization caveat applies: if you don’t experience any performance\
    \ or memory issues, choose whatever type of font works well enough to do the job.\n\
    \n## Creating and Importing a Bitmap Font\n\nTo create a bitmap font, you’ll typically\
    \ use a tool made for the job. The most popular tools on OS X are Glyph Designer\
    \ and bmGlyph, which cost in the range of $10 to $30. Both tools can export the\
    \ format supported by Cocos2D, which is an `.fnt` file alongside a `.png` file\
    \ of the same name. If your tool allows you to choose the encoding for the `.fnt`\
    \ file, choose text and not XML.\n\nThe `.fnt` format is a plain-text format;\
    \ you can open it with any text editor. Unfortunately, the extension `.fnt` is\
    \ used by a number of different formats. To verify that an `.fnt` file you created\
    \ or downloaded is in the correct format, the first couple lines should look very\
    \ similar to the ones in [Listing 11-16](#part0022.html#list16). If your file\
    \ looks very different from this, it’s probably not in a format that Cocos2D understands.\
    \ You may need to re-export the file or use a different glyph tool.\n\n**[Listing\
    \ 11-16](#part0022.html#_list16).** An excerpt of an `.fnt` file when viewed in\
    \ a text editor (indentation is not representative)\n\n```\ninfo face=\"Fixed\"\
    \ size=64 bold=0 italic=0 charset=\"\" unicode=0\n     stretchH=100 smooth=1 aa=1\
    \ spacing=2,2\ncommon lineHeight=84 base=82 scaleW=1024 scaleH=512 pages=1 packed=0\n\
    page id=0 file=\"gd.png\"\nchars count=95\nchar id=32 x=424 y=277 width=0 height=0\
    \ xoffset=0 yoffset=80\n     xadvance=38 page=0 chnl=0 letter=\"space\"\nchar\
    \ id=33 x=268 y=214 width=21 height=58 xoffset=26 yoffset=11\n     xadvance=46\
    \ page=0 chnl=0 letter=\"!\"\n...\n```\n\nWhile all tools can export in the `.fnt`\
    \ format that Cocos2D understands, SpriteBuilder has additional requirements that\
    \ some glyph tools may not adhere to. SpriteBuilder requires the bitmap font to\
    \ be supplied in four resolutions, which typically implies different scaling for\
    \ each font.\n\nAssuming you created a single font named `gd.fnt` with an accompanying\
    \ `gd.png`, you can make this font compatible with SpriteBuilder by creating a\
    \ folder named `gd.bmfont`. Inside that folder, create four additional subfolders\
    \ named `resources-phone`, `resources-phonehd`, `resources-tablet`, and `resources-tablethd`.\
    \ Then add a copy of the `gd.fnt` and `gd.png` files to each resources subfolder.\
    \ The resulting structure should be like the one in [Figure 11-14](#part0022.html#Fig14).\n\
    \n![9781484202630_Fig11-14.jpg](images/00175.jpeg)\n\n[Figure 11-14](#part0022.html#_Fig14).\
    \ SpriteBuilder requires bitmap fonts to be in a `.bmfont` folder with additional\
    \ subfolders\n\n**Caution** Be sure to use the same name (excluding the extension)\
    \ for the `.bmfont` folder and the actual font files. If you were to rename `gd.bmfont`\
    \ to `myfont.bmfont`, the font would no longer work because SpriteBuilder would\
    \ be looking for `myfont.fnt` and `myfont.png` files.\n\nHowever, you’ll probably\
    \ want the bitmap font to have a different scaling for each resolution. There\
    \ are two variants that will work well for SpriteBuilder that resemble the two\
    \ scaling options available in SpriteBuilder: absolute scaling (iPad screen is\
    \ assumed to be 512x384 points) and UI scaling (iPad screen is assumed to be the\
    \ original size of 1024x768 points). The default option should be absolute scaling\
    \ unless you designed your game to use UI scaling throughout. [Table 11-2](#part0022.html#Tab2)\
    \ shows the bitmap font scaling factors for each folder and an example of what\
    \ this means specifically for a given font size of 48 at 100% scaling.\n\n[Table\
    \ 11-2](#part0022.html#_Tab2). Bitmap font scaling for each resources folder\n\
    \n| | Absolute (iPad screen is 512x384) | UI Scale (iPad screen is 1024x768) |\n\
    | --- | --- | --- |\n| `resources-phone` | 25% (i.e., Font size: 12) | 50% (i.e.,\
    \ Font size: 24) |\n| `resources-phonehd` | 50% (i.e., Font size: 24) | 100% (i.e.,\
    \ Font size: 48) |\n| `resources-tablet` | 50% (i.e., Font size: 24) | 50% (i.e.,\
    \ Font size: 24) |\n| `resources-tablethd` | 100% (i.e., Font size: 48) | 100%\
    \ (i.e., Font size: 48) |"
