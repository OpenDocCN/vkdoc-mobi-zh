    \n如果你现在运行游戏，至少应该能听到偶尔播放的音效，尤其是在接触弹簧时。当前的设置并不是出色的音效设计，但它展示了播放声音和确定冲击力的基本原理。\n\n\
    ### 短时间不重复播放音效\n\n为游戏事件播放音效时（特别是涉及物理碰撞的情况），一个常见问题是音效可能在短时间内重复播放。要么新声音总是打断上一个，要么新声音叠加到已播放的声音上，增加音量和整体噪音。这两种情况通常都不理想。\n\
    \n使用`OALSimpleAudio`时，无法确定给定的音效是否仍在播放，也无法在播放完成时获得通知。因此，你必须添加一个`BOOL`类型的实例变量（ivar），在播放声音时将其置为`YES`，并在短时间内将其置回`NO`。\n\
    \n将代码清单 11-9 中显示的实例变量添加到`GameScene.m`。\n\n**代码清单 11-9**. 添加播放声音标志\n\n```\n@implementation\
    \ GameScene\n{\n    // 现有的实例变量省略……\n\nBOOL _playingCollisionSound;\n}\n```\n\n\
    然后改进代码清单 11-6 中的`playCollisionSoundWithPair:`方法，添加代码清单 11-10 中高亮显示的行。\n\n**代码清单\
    \ 11-10**. 音效开始播放后短时间内不再播放新音效\n\n```\n-(void) playCollisionSoundWithPair:(CCPhysicsCollisionPair*)pair\n\
    {\n    if (_playingCollisionSound == NO)\n    {\n        NSString* splat = [NSString\
    \ stringWithFormat:@\"Audio/splat%i.caf\",\n                           arc4random_uniform(3)\
    \ +  1];\n\nCGFloat pitch = 0.8 + (arc4random_uniform(50) / 100.0);\n        [[OALSimpleAudio\
    \ sharedInstance] playEffect:splat\n                                         \
    \    volume:1.0\n                                              pitch:pitch\n \
    \                                               pan:0.0\n                    \
    \                           loop:NO];\n\n_playingCollisionSound = YES;\n     \
    \   [self scheduleBlock:^(CCTimer *timer) {\n            _playingCollisionSound\
    \ = NO;\n        } delay:0.4];\n    }\n}\n```\n\n现在，音效不再与`totalKineticEnergy`绑定，而是在每次碰撞时播放。如果没有`_playingCollisionSound`标志，这很可能会导致声音在短时间内重复播放。因此，它在播放声音时被设置为`YES`，并安排了一个延迟\
    \ 0.4 秒的块，将`_playingCollisionSound`实例变量重置为`NO`，以便下一次碰撞播放另一个音效。\n\n你应该将此原则应用于所有在相同类型的音效开始播放后短时间内不应再次播放的声音。\n\
    \n### 调整音频音量\n\n你可能还记得你已经创建了一个带有音量滑块的设置弹出窗口。现在正是让它们发挥作用的好时机。\n\n在 Xcode 中打开`SettingsLayer.m`，并添加代码清单\
    \ 11-11 中高亮显示的`_playingEffectSliderAudio`实例变量。\n\n**代码清单 11-11**. 添加另一个播放时间变量\n\
    \n```\n@implementation SettingsLayer\n{\n    __weak CCSlider* _musicSlider;\n\
    \    __weak CCSlider* _effectsSlider;\n\nBOOL _playingEffectSliderAudio;\n}\n\
    ```\n\n然后将代码清单 11-12 中高亮显示的行添加到`SettingsLayer.m`的`volumeDidChange:`方法中。\n\n**代码清单\
    \ 11-12**. 移动音效滑块时播放音效\n\n```\n-(void) volumeDidChange:(CCSlider*)sender\n{\n\
    \    if (sender == _musicSlider)\n    {\n        [GameState sharedGameState].musicVolume\
    \ = _musicSlider.sliderValue;\n    }\n    else if (sender == _effectsSlider)\n\
    \    {\n        [GameState sharedGameState].effectsVolume = _effectsSlider.sliderValue;\n\
    \nif (_playingEffectSliderAudio == NO)\n        {\n            [[OALSimpleAudio\
    \ sharedInstance] playEffect:@\"Audio/menu-sfx.caf\"];\n\n_playingEffectSliderAudio\
    \ = YES;\n            [self scheduleBlock:^(CCTimer *timer) {\n              \
    \  _playingEffectSliderAudio = NO;\n            } delay:0.2f];\n        }\n  \
    \  }\n}\n```\n\n这将在移动音效音量滑块时播放一个音效作为音频提示。该声音在 0.2 秒内被阻止重复播放，使其听起来更悦耳。\n\n如果不播放音效，那么当拖动音效音量滑块时，玩家将不知道给定的音量实际有多响。音乐方面不会出现这个问题，因为菜单音乐已经在播放，并且当你拖动音乐音量滑块时，它会自动调整音量。\n\
    \n要实际更改`OALSimpleAudio`的音效和背景通道使用的音量，你需要编辑`GameState.m`文件。找到`setMusicVolume`和`setEffectsVolume`方法，并添加代码清单\
    \ 11-13 中高亮显示的行。\n\n**代码清单 11-13**. 改变音量\n\n```\n-(void) setMusicVolume:(CGFloat)volume\n\
    {\n    [OALSimpleAudio sharedInstance].bgVolume = volume;\n    [[NSUserDefaults\
    \ standardUserDefaults] setDouble:volume\n                                   \
    \           forKey:KeyForMusicVolume];\n}\n\n-(void) setEffectsVolume:(CGFloat)volume\n\
    {\n    [OALSimpleAudio sharedInstance].effectsVolume = volume;\n    [[NSUserDefaults\
    \ standardUserDefaults] setDouble:volume\n                                   \
    \           forKey:KeyForEffectsVolume];\n}\n```\n\n现在，音量滑块已经可以正常工作了。你可以随意尝试它们。但请注意，启动应用程序时这些音量设置并不会生效。为了解决这个问题，将代码清单\
    \ 11-14 中高亮显示的行添加到`GameState.m`的`sharedGameState`方法中。\n\n**代码清单 11-14**. 启动应用时初始化音量\n\
    \n```\n+(GameState*) sharedGameState\n{\n    static GameState* sharedInstance;\n\
    \    static dispatch_once_t onceToken;\n    dispatch_once(&onceToken, ^{\n   \
    \     sharedInstance = [[GameState alloc] init];\n        OALSimpleAudio audio\
    \ = [OALSimpleAudio sharedInstance];\n        audio.effectsVolume = sharedInstance.effectsVolume;\n\
    \        audio.bgVolume = sharedInstance.musicVolume;\n    });\n    return sharedInstance;\n\
    }\n```\n\n这将`OALSimpleAudio`的音量设置为从`GameState`共享实例恢复的音量，这确保了`GameState`类首次使用时，音量从`NSUserDefaults`加载。这保证在游戏早期发生，但也可以通过添加一行看似无意义的代码来强制初始化，如下所示：\n\
    \n```\n[GameState sharedGameState];\n```\n\n这只会初始化单例（如果尚未初始化），并丢弃返回的实例。\n\n###\
    \ 处理标签\n"
- fmt: '# Custom TrueType Fonts in SpriteBuilder


    Thus far, I haven’t provided a thorough introduction to label-specific properties.
    And I haven’t mentioned the fact that you can localize them or explained why there
    are two types of labels: `TTF` (TrueType font) and `BM-Font` (bitmap font).


    ## Importing a Custom TrueType Font


    In principle, adding a custom TrueType font to SpriteBuilder is as simple as dragging
    and dropping it onto the project. In the book’s *Graphics* archive, you’ll find
    a *Fonts* folder that you should drag and drop onto SpriteBuilder’s *File View*.
    Alternatively, create a *Fonts* folder and drag and drop a custom `.ttf` file
    into it. You can easily find TrueType fonts on the web—just be careful that the
    font is distributed under a permissive license or is in the public domain.


    You can then select the font on the *Item Properties* tab of a `Label TTF` node.
    Click on the *Font name* drop-down list in the `CCLabelTTF` section, select the
    *User Fonts* section, and browse into the *Fonts* folder. The *System Fonts* are
    the fonts that are built into iOS and always available.


    In practice, there are several hurdles that may prevent you from using the custom
    TrueType font. First of all, it needs to be a valid file. Double-clicking the
    `.ttf` file in Finder should open the Font Book app, displaying an alphabet of
    glyphs. If that doesn’t happen or you get an error, the font is most likely corrupt
    or not in the correct format.


    Next you have to consider that the font name does not necessarily refer to the
    font’s file name. There are three names for a font: its file name, its family
    name, and its font name. For use in SpriteBuilder, the font name and file name
    (excluding the file extension) should match; otherwise, the font will not work.


    Once you have added a TrueType font to SpriteBuilder, publish and add the code
    fragment in [Listing 11-15](#part0022.html#list15) to any method that runs when
    the app launches—for instance, the `didLoadFromCCB` method in `MainScene.m`.


    [***Listing 11-15***](#part0022.html#_list15). Logging a font family and names


    ```

    for (NSString* family in [UIFont familyNames])

    {

        NSLog(@"%@ (family)”, family);

        for (NSString* name in [UIFont fontNamesForFamilyName:family])

        {

            NSLog(@"   %@ (name)“, name);

        }

    }

    ```


    Check the Debug Console in Xcode. If you added the `PARPG.ttf` font file from
    the Graphics archive, the log will print something like this amidst many other
    fonts:


    ```

    2014-09-09 16:36:25.433 LearnSpriteBuilder[91808:60b] Fixed (family)

    2014-09-09 16:36:25.434 LearnSpriteBuilder[91808:60b]    PARPG (name)

    ```


    It shows that the font family is oddly named “Fixed,” while the font name is identical
    to the font’s file name. In cases where you have a font file whose file name doesn’t
    match the font name, you should simply rename the font, re-import it in SpriteBuilder,
    and update any labels in question to use the font with the new name.


    **Note:** Using a custom TrueType font with SpriteBuilder does not require editing
    the `Info.plist` file. You would only have to if you wanted to add a custom TrueType
    font but aren’t using SpriteBuilder to do so.


    Whether the importing of the TrueType font was successful can only be determined
    by running the app. SpriteBuilder will use and display the font correctly. However,
    when you run the game and there’s a mismatch between the font name and the font’s
    file name, the font will be replaced with a font of a closely related (or wild
    guess) font family. More often than not, this means that Arial will be used in
    place of the custom font. It shouldn’t be too hard to notice, but a safe indicator
    is when the label’s dimensions aren’t the same as in SpriteBuilder.


    ## Editing Label Properties


    The `CCLabelTTF` properties were partially covered in [Figure 6-4](#part0015.html#Fig4)
    where the label is edited as part of a *Button* node. Now let’s look at the label
    properties as shown by an actual `Label TTF` node. See [Figure 11-5](#part0022.html#Fig5)
    for reference.


    ![9781484202630_Fig11-05.jpg](images/00166.jpeg)


    [Figure 11-5](#part0022.html#_Fig5). Label TTF properties


    The *Label* *text* field obviously allows text entry. Underneath it is the *Localize*
    check box, and to the right of it the localization *Edit* button. The *Label text*
    field and the *Localize* check box also exist for `Label BM-Font` nodes. I’ll
    explain how localization works shortly.


    *Font name* and *Font size* should be pretty clear by now. The *Opacity* is the
    same as for sprites and tells how transparent the label is—in the range of 0 (fully
    transparent) to 1 (opaque). The *Color* property affects the label’s texture but
    has the same effect as setting the draw color. Interestingly, you can set both
    *Color* and *Draw Color* under the *Font Effects* section to create a sort of
    combined color. To avoid that side-effect, make sure that either *Color* or *Draw
    Color* is set to white.


    The *Adjusts font size to fit* check box is slightly misplaced—it actually belongs
    to the *Dimensions* property further down. If you set a non-zero dimension and
    check *Adjusts font size to fit*, the font will use the largest possible font
    size to fit all the text on a single line into the given dimensions. Naturally,
    this means that *Adjusts font size to fit* also disables line wrapping. *Alignment*
    defines how the label is aligned within its dimensions.


    `Label TTF` nodes have a special section labeled *Font Effects*, where you can
    edit outlines and shadows. See [Figure 11-6](#part0022.html#Fig6) for reference.


    ![9781484202630_Fig11-06.jpg](images/00167.jpeg)


    [Figure 11-6](#part0022.html#_Fig6). Font Effects properties


    The draw color is the fill color of the font. As I said earlier, this is combined
    with the node’s *Color* property. So be sure to set *Color* to white if you want
    the actual *Draw color* being used to be unchanged.


    The *Outline color* takes effect only if *Outline width* is greater than `0`.
    The effect of setting *Outline width* to `2` and `8` is shown in [Figure 11-7](#part0022.html#Fig7)
    by the labels in the middle and at the bottom.


    ![9781484202630_Fig11-07.jpg](images/00168.jpeg)


    [Figure 11-7](#part0022.html#_Fig7). Label TTF outline widths from top to bottom:
    no outline, 2 points, and 8 points


    *Shadow color* also takes effect only if the *Shadow blur* radius is greater than
    `0`. With *Shadow offset*, you can alter the position of the shadow underneath
    the label. [Figure 11-8](#part0022.html#Fig8) shows example shadows with a blur
    radius of `8` and `24`, offset slightly to the right and down.


    ![9781484202630_Fig11-08.jpg](images/00169.jpeg)


    [Figure 11-8](#part0022.html#_Fig8). Label TTF with shadows that have a blur radius
    of 8 (top) and 24 (bottom)


    You can create rather interesting effects by combining outlines and shadows with
    a little experimentation.


    ## Adding a Credits String


    Let’s try adding a neat-looking credits label that you can then use to test the
    translation feature. Open `MainScene.ccb`, and drag and drop a `Label TTF` node
    onto the stage. Change the label’s position types to `%` and values to `50x7`
    on the *Item Properties* tab.


    As *Label text*, enter the following without the quotes: “Made with SpriteBuilder
    & Cocos2D”. As *Font name*, use the `Fonts/PARPG.ttf` font that you’ll find by
    browsing into the *User Fonts* section of the drop-down menu. Use a *Font size*
    of `23`. You may later want to decrease the font size, but for now let’s assume
    you want to optimize the label size for the English language to see what can happen
    when you switch to a different localization setting.'
