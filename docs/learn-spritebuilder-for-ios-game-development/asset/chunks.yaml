    In fact, all the libraries used by SpriteBuilder apps—most notably Cocos2D-Swift,
    Chipmunk2D and ObjectAL—are fully compatible.


    How Does Android Support Work?


    The development of SpriteBuilder and Cocos2D since version 3 (Cocos2D-Swift to
    be precise) is done by Apportable developers. Apportable is a company that specializes
    in cross-compiling Objective-C code for the Android platform.


    Originally, Apportable was a command-line tool for expert programmers and game-development
    studios. The company has since created Xcode plugins and integrated them into
    SpriteBuilder, beginning with version 1.3\. You’ll know them as SpriteBuilder
    Android plugins.


    You will also often hear of a framework called *BridgeKit*. This is the framework
    that Apportable created to give Objective-C developers access to Android, Java,
    and Verde features and functionality. Verde is a lightweight equivalent of UIKit.
    You’ll find the BridgeKit reference here: [http://static.apportable.com/documentation/BridgeKit/html/](http://static.apportable.com/documentation/BridgeKit/html/).


    The SpriteBuilder Android plugins work by cross-compiling Objective-C code to
    native ARM and x86 code that runs on Android devices. There are no emulation layers,
    virtual machines, or Java translations done. The resulting executable will typically
    run faster than if the same code were written in Java using Google’s Android SDK.


    Like any other cross-platform development, porting to Android with the goal of
    publishing a nontrivial app on the Android store(s) does require extra work compared
    to targeting a single platform. There’s no such thing as free ports. Each ecosystem
    has its own unique programming interfaces, device capabilities, design requirements,
    user expectations, developer guidelines, publishing policies, and processes.


    Most notably, on Android there’s a much wider variety of devices, which poses
    challenges regarding how to scale the app to a great variety of screen resolutions
    but also varying CPU and GPU performance specs, different OS versions, and so
    on.


    Fortunately, SpriteBuilder does make it easier to adapt to varying screen resolutions,
    while the Android Xcode plugins allows you to use any Cocos2D feature and continue
    to use many iOS frameworks. BridgeKit then gives you access to all the important
    Android features without having to revert to writing C++ or Java code.'
  trans: '

    ### 着色器效果最佳实践


    -   **亮度、对比度、饱和度和色调**仅改变单个像素的颜色，几乎在所有图像处理程序中都能找到。所有这些效果都只使用单个值，应该是不言自明的。但即使你不了解某个效果的作用，只需添加它并移动滑块，就能看到它的效果。

    -   **像素化、模糊和泛光**会改变渲染内容的外观。你已经见过**像素化**效果，它基本上会缩小内容，使其变成像素艺术。**模糊**效果会使内容平滑，看起来不那么锐利。**泛光**是一种让明亮区域渗入周围较暗区域，使其呈现发光效果的特效。你可以调整其**模糊半径**和**强度**，而**亮度阈值**则决定了在应用泛光效果前，区域需要达到的亮度。

    -   **折射、反射和玻璃**是复杂的效果，需要一张法线贴图，这是一种将每个像素的 RGB 值视为法线向量的图像。通俗地说，法线贴图会改变光线从表面折射或反射的方式。这三种效果都使用一个环境参考，即一个或多个节点，这些节点应能在**效果**节点中被反射看到。（见图
    12-10。）


    ![9781484202630_Fig12-10.jpg](img/00189.jpeg)


    *图 12-10.* 玻璃效果像透镜一样扭曲背景，同时在其表面略微反射环境节点


    **效果**节点非常强大，但更复杂的效果需要对图形学和着色器编程有一定理解，才能领会其含义并想象各种参数所产生的结果。


    在我撰写本文时，`CCEffectNode`、`CCEffect` 及相关类的编程接口尚未向公众开放，并且仍在开发中。当然，你最终会在 Cocos2D 开发者库参考（也称为*类参考*）中找到这些类的文档，并且你随时可以查看头文件
    `CCEffect.h` 和 `CCEffectNode.h`。


    与任何效果一样，创建出色的着色器效果主要在于使用与该效果配合良好的图像。我使用了一个设计精良的菜单屏幕，它在粒子效果和着色器效果下都表现良好，因此工作起来很容易。想象一下，如果你只有纯色的占位图形——效果就不会那么好。效果本身无法创造奇迹。你必须为着色器和粒子效果提供良好的输入，才能产生良好的输出。


    虽然尽早开始设计效果很诱人，但实际上应该将效果开发推迟到项目拥有所有功能且大部分美术资源就绪之后。到那时，你已经确定了游戏运行流畅，并且有剩余性能可供效果使用。


    能够验证即使在新增效果和旧设备上游戏依然运行流畅，也能为你节省大量时间，让你**不必**去设计你想要的超级效果，因为最终你可能因性能问题而不得不缩减或完全移除该效果。而且，在大部分美术资源定稿后，设计出漂亮的效果也会容易得多。


    请记住，即使是像**亮度**和**对比度**这样简单的效果，也可能对性能产生显著影响，具体取决于你测试的设备。并且一定要在真机上测试效果，因为模拟器从一开始就非常慢。


    这也是将效果实现推迟到项目后期的另一个原因：添加效果很容易导致模拟器即使对于简单测试也变得不可用，更不用说实际玩游戏了。


    **提示** 请记住，如果你想为特定精灵应用效果，你**不必**使用**效果**节点。只需选中该精灵，切换到**项目属性**选项卡，在 `CCSprite`
    属性的底部，混合模式下方，即可找到效果用户界面。与**效果**节点不同，直接应用于精灵的效果不会影响该精灵的子节点。


    ### 总结


    你已经学会了如何创建精灵帧关键帧动画，并增强了 `SoftBodyDrawNode` 以支持精灵帧动画。你也了解了如何重写 `setSpriteFrame:`
    属性设置器，以便在显示特定精灵帧时运行自定义代码。


    在粒子效果和着色器效果方面，你已经学会了如何在技术上实现它们，尽管设计出出色的效果需要大量的实验和经验。幸运的是，花时间调整和试验效果是件有趣的事——以至于我应该提醒你，如果你的目标是完成一个游戏，并创建一个在大多数设备上都能良好运行的游戏，那么不要在项目早期就花费过多时间调整效果。


    你可以在本书下载存档的 *13 - 动画和效果* 文件夹中找到包含精灵帧动画、粒子效果和着色器效果的项目版本。


    ## 第 13 章：移植到安卓


    如果你能在安卓设备上构建并运行你的 SpriteBuilder 应用，那该有多酷？


    你可以做到！


    这样做无需编写 Java 或 C++ 代码。SpriteBuilder 提供了必要的 Xcode 插件，用于将你的 Objective-C 代码交叉编译到安卓平台。事实上，SpriteBuilder
    应用使用的所有库——最著名的是 Cocos2D-Swift、Chipmunk2D 和 ObjectAL——都是完全兼容的。


    ### 安卓支持是如何工作的？


    自版本 3（准确说是 Cocos2D-Swift）以来，SpriteBuilder 和 Cocos2D 的开发是由 Apportable 开发者完成的。Apportable
    是一家专门为安卓平台交叉编译 Objective-C 代码的公司。


    最初，Apportable 是面向专业程序员和游戏开发工作室的命令行工具。该公司随后创建了 Xcode 插件，并将其集成到从 1.3 版本开始的 SpriteBuilder
    中。你可能会将它们称为 SpriteBuilder 安卓插件。


    你还会经常听到一个名为 **BridgeKit** 的框架。这是 Apportable 创建的框架，旨在让 Objective-C 开发者能够访问安卓、Java
    和 Verde 的功能。Verde 是 UIKit 的轻量级等价物。你可以在此处找到 BridgeKit 参考文档：[`static.apportable.com/documentation/BridgeKit/html/`](http://static.apportable.com/documentation/BridgeKit/html/)。


    SpriteBuilder 安卓插件通过将 Objective-C 代码交叉编译为可在安卓设备上运行的本地 ARM 和 x86 代码来工作。这里没有模拟层、虚拟机或
    Java 转换。与使用谷歌安卓 SDK 用 Java 编写的相同代码相比，生成的可执行文件运行速度通常更快。


    像任何其他跨平台开发一样，以在安卓商店发布一个有一定规模的应用为目标进行移植，确实需要比针对单一平台更多的工作。不存在所谓的免费移植。每个生态系统都有其独特的编程接口、设备能力、设计要求、用户期望、开发者指南、发布政策和流程。


    最值得注意的是，安卓上的设备种类繁多，这带来了挑战：如何让应用适应各种各样的屏幕分辨率，以及不同的 CPU 和 GPU 性能规格、不同的操作系统版本等等。


    幸运的是，SpriteBuilder 确实使适应不同屏幕分辨率变得更容易，而安卓 Xcode 插件允许你使用任何 Cocos2D 功能，并继续使用许多 iOS
    框架。然后，BridgeKit 让你能够访问所有重要的安卓功能，而无需回头编写 C++ 或 Java 代码。

    '
- fmt: '# 跨平台开发的注意事项与 SpriteBuilder Android 插件


    然而，并非所有 iOS 框架和功能都能映射到 Android 上的等效实现。例如，为了存储排行榜和成就，你在 iOS 上使用 `Game Center`，其在
    Android 上的等效实现是 `Google Play Games`。两者必须分别集成。`Game Center` 不能在 Android 上运行，`Google
    Play Games` 也不能在 iOS 上运行。此外，它们的技术差异很大（具有不同的需求和功能集），因此创建一个简单的转换层来将 `Game Center`
    方法和回调映射到 `Google Play Games` 是不可行的。


    所有这些都意味着你可能需要手动做一些额外的工作。你也可能需要直接使用 `C++` 或 `Java` 编写针对 Android SDK 接口的代码，但随着 `Apportable`
    不断为 `SpriteBuilder` Android 插件添加功能，这正变得越来越简单。


    ## SpriteBuilder Android 文档


    你可以在 SpriteBuilder Android 文档页面找到比我能提供的更多细节：[http://android.spritebuilder.com](http://android.spritebuilder.com)。


    如果你计划走跨平台路线，绝对应该花半小时左右通读整个文档。你会学到很多东西，包括哪些功能是可行的，已知问题是什么，以及在开始项目之前你可能需要考虑的其他任何事情。有些事情可能会影响设计和技术决策，而另一些则在撰写本文时尚未确定，例如最低支持的
    Android 版本。


    如果你的项目是使用`SpriteBuilder v1.2`或更早版本创建的（例如本书前面章节中的项目），你也应该参考该文档。这些项目需要经过一个转换过程。


    推荐的方法是使用最新的 SpriteBuilder 版本创建一个新的 SpriteBuilder 项目，然后将你原始的 `CCB`、资源和源代码文件恢复到
    SpriteBuilder 和 `Xcode` 中。同样，有关详细信息，请参阅 SpriteBuilder Android 文档，因为该过程虽然不太难遵循，但涉及的内容略多一些。


    ## 安装 Android Xcode 插件


    如果你首次运行`SpriteBuilder v1.3 beta`，或者每当有更新时，你会看到一条消息，提示正在安装 Android Xcode 插件，如[图
    13-1](#Fig1)所示。


    ![9781484202630_Fig13-01.jpg](images/00190.jpeg)


    <span id="Fig1">**图 13-1.**</span> SpriteBuilder v1.3 及更新版本会自动将 Android 支持作为 Xcode
    插件安装


    **警告** 每当你看到[图 13-1](#Fig1)中的消息时，你应该关闭并重启 Xcode，以便 Xcode 加载并使用这些插件的最新版本。


    如果你需要卸载或重新安装 Android Xcode 插件，可以在此处找到如何移除插件的说明：[http://android.spritebuilder.com/#uninstalling-the-spritebuilder-android-plugin](http://android.spritebuilder.com/#uninstalling-the-spritebuilder-android-plugin)。一旦你移除了所有插件文件，下次启动
    SpriteBuilder 时它们将自动重新安装。


    **注意** Android 插件与`SpriteBuilder v1.3 beta`捆绑在一起，但将来它们必须单独安装。你可以通过访问[http://android.spritebuilder.com](http://android.spritebuilder.com)来判断是否已经如此，那里也有最新的安装说明。


    你可以通过打开`Xcode` ![image](images/00008.jpeg) -> `Preferences`（偏好设置）来验证 Android 插件是否已安装。在最右侧的工具栏上，你会找到一个“双箭头”符号，如[图
    13-2](#Fig2)所示。如果你点击它们，会出现一个弹出菜单，其中包含 *Apportable* 作为一个菜单项。


    ![9781484202630_Fig13-02.jpg](images/00191.jpeg)


    <span id="Fig2">**图 13-2.**</span> 通过测试是否有 *Apportable* 偏好设置面板可用，来验证 Android 插件是否已安装


    如果你点击 *Apportable* 菜单项，你将看到 *Apportable* 偏好设置面板，如[图 13-3](#Fig3)所示。在撰写本文时，只有一个选项：*Enable
    MTP for transfers to Android devices*（启用 MTP 以传输到 Android 设备）。如果你在将成功构建的应用传输到设备上时遇到问题，可能需要取消选中此复选框。稍后会对此进行更多说明。


    ![9781484202630_Fig13-03.jpg](images/00192.jpeg)


    <span id="Fig3">**图 13-3.**</span> 当你在传输阶段遇到问题时，绝对应该禁用 MTP 传输


    目前，你可能希望取消选中 *Enable MTP* 复选框，以避免可能的传输问题。一旦你确认测试项目在你的 Android 设备上运行正常，你可以尝试重新启用它，看看传输是否仍然有效。


    至少在我对三星 Galaxy S4 设备的测试中，MTP 传输一开始并没有快多少。那是少数几次它还能工作的情况。启用 MTP 后，我经常收到错误消息，主要是提示“传输意外退出”，但也提到了连接丢失和超时。Apportable
    开发人员确认，他们发现三星设备在 MTP 传输方面存在众所周知的问题。


    ## Android 开发先决条件


    如果你以前从未进行过 Android 开发，以下是你需要了解的内容。


    ### 安装 Android SDK 是可选的


    首先，对于 SpriteBuilder Android 支持，你**不**需要安装 Android SDK。所需的一切都包含在 SpriteBuilder
    Android 插件中。在你提问之前：Eclipse 代码编辑器也不是必需的。即使你想为你的应用编写额外的 Java 代码，也是如此。你可以在 Xcode
    内完成这些操作。


    你可能仍然想安装 Android SDK，只是为了能够访问 Android SDK 的离线文档。这没有坏处，也不会影响 SpriteBuilder Android
    插件。


    ### Android 设备是必需的


    接下来，你需要一台 Android 设备。这是无法避免的。在撰写本文时以及可预见的将来，SpriteBuilder Android 插件不支持 Android
    模拟器。


    Android 模拟器在可靠性和准确性方面也无法与 iOS 模拟器相比。也许这个区别最好用*仿真*与*模拟*的不同来解释。


    *仿真器*只是从外部模仿设备的行为，但并不运行与设备相同的代码路径、框架和库。而*模拟器*则尽可能多地实现和使用设备的软件，包括相同的框架和软件库。在需要仿真层的地方，它们被编写为模拟代码整体上的内部行为。


    如果你可以选择设备，我建议你坚持使用流行型号。这意味着主要是三星 Galaxy 和 Google Nexus 系列，但 LG G3、HTC One 和 Sony
    Experia 也是受欢迎的选择。尝试购买一部手机，因为它们的普及度远高于平板电脑，除非你想专门为平板电脑进行开发——在这种情况下，就买一台平板电脑。


    务必购买一台可以升级到最新 Android 操作系统的设备。Google 设备通常在最长的时间内获得最多的操作系统更新，而且几乎没有延迟。


    ### 通过 USB 连接 Android 设备


    一旦你拥有 Android 设备，将其连接到你的 Mac。确保直接将其插入 Mac 上的 USB 端口。避免使用 USB 集线器和延长线，因为它们可能会阻止操作系统识别设备。它们还可能减慢传输速率或使传输不可靠。


    第三方数据线也是如此。如果可能，请使用设备附带的 USB 数据线。


    **注意** 与 iOS 一样，无法通过 WiFi 或蓝牙连接传输应用和调试它们。有线 USB 连接是开发的必要条件。


    ### 启用开发者选项'
  raw: 'Yet it’s not possible to map all iOS frameworks and functionality to some
    Android equivalent. For instance, to store leaderboards and achievements, you
    use Game Center on iOS whose equivalent on Android is Google Play Games. Both
    have to be integrated separately. Game Center won’t work on Android, and Google
    Play Games won’t work on iOS. In addition, both are technically too different
    (with different requirements and feature sets), so it isn’t feasible to have equivalents
    to a simple translation layer that maps Game Center methods and callbacks to Google
    Play Games.


    All this means you might have to do some extra work manually. You also might have
    to write against the Android SDK interfaces directly with C++ or Java, but it’s
    getting less and less complicated every day, as Apportable is constantly adding
    features to the SpriteBuilder Android plugins.


    SpriteBuilder Android Documentation


    You’ll find more details than I can possibly cover on the SpriteBuilder Android
    documentation page: [http://android.spritebuilder.com](http://android.spritebuilder.com).


    If you plan on taking the cross-platform route, you should definitely take the
    half hour or so to read through the entire documentation. You’ll learn a great
    number of things, including what’s possible, what the known issues are, and anything
    else you may have to consider **before** starting with your project. Some things
    may affect design and technical decisions, while others simply haven’t been decided
    at the time of this writing, such as the lowest supported Android version.


    You should also refer to the documentation if you have a project that was created
    with SpriteBuilder v1.2 or earlier (like the book’s projects in earlier chapters).
    These projects have to undergo a conversion process.


    The recommended way is to create a new SpriteBuilder project with the latest SpriteBuilder
    version, and then restore your original CCB, resource, and source code files into
    both SpriteBuilder and Xcode. Again, for details refer to the SpriteBuilder Android
    documentation because the process is a bit more involved, though not too difficult
    to follow.


    Installing Android Xcode Plugins


    If you run SpriteBuilder v1.3 beta for the first time or whenever there’s an update,
    you’ll see a message stating that Android Xcode plugins are being installed, as
    shown in [Figure 13-1](#part0024.html#Fig1).


    ![9781484202630_Fig13-01.jpg](images/00190.jpeg)


    [Figure 13-1](#part0024.html#_Fig1). SpriteBuilder v1.3 and newer versions automatically
    install Android Support as Xcode plugins


    **Caution**  Whenever you see the message in [Figure 13-1](#part0024.html#Fig1),
    you should close and restart Xcode so that Xcode will load and use the latest
    versions of the plugins.


    If you need to uninstall or re-install the Android Xcode plugins, you can find
    the instructions on how to remove the plugins here: [http://android.spritebuilder.com/#uninstalling-the-spritebuilder-android-plugin](http://android.spritebuilder.com/#uninstalling-the-spritebuilder-android-plugin).
    Once you’ve removed all of the plugin files, they will automatically be re-installed
    the next time you launch SpriteBuilder.


    **Note**  The Android plugins are bundled with SpriteBuilder v1.3 beta, but in
    the future they will have to be installed separately. You can find out whether
    this is already the case by visiting [http://android.spritebuilder.com](http://android.spritebuilder.com),
    where you’ll also find up-to-date installation instructions.


    You can verify that the Android plugins have been installed by opening Xcode ![image](images/00008.jpeg)
    Preferences. On the toolbar at the far right, you’ll find a “two arrows” symbol
    shown in [Figure 13-2](#part0024.html#Fig2), and if you click on them a popup
    menu will appear that includes *Apportable* as a menu item.


    ![9781484202630_Fig13-02.jpg](images/00191.jpeg)


    [Figure 13-2](#part0024.html#_Fig2). Verify that Android plugins have been installed
    by testing if there’s an Apportable Preferences pane available


    If you click the *Apportable* menu item, you’ll get to see the *Apportable* preferences
    pane as shown in [Figure 13-3](#part0024.html#Fig3). At the time of this writing,
    there was only one option: *Enable MTP for transfers to Android devices*. You
    may need to uncheck this check box if you’re having trouble transferring successfully
    built apps onto the device. More on this later.


    ![9781484202630_Fig13-03.jpg](images/00192.jpeg)


    [Figure 13-3](#part0024.html#_Fig3). You should definitely disable MTP transfers
    when you run into problems during the transfer stage


    For the moment, you may want to uncheck the *Enable MTP* check box to avoid possible
    transfer problems. Once you’ve confirmed that the test project is working fine
    on your Android device, you can try to re-enable it to see whether transferring
    still works.


    At least in my tests with a Samsung Galaxy S4 device, MTP transfers weren’t that
    much faster to begin with. That’s the few times it worked. With MTP enabled, I
    frequently received error messages, mainly stating that “transfer quit unexpectedly”
    but also mentioning connection loss and timeouts. The Apportable developers confirmed
    that they found Samsung devices to be notoriously problematic with MTP transfers.


    Android Development Prerequisites


    If you’ve never done any Android development before, here’s what you need to know.


    Installing Android SDK Is Optional


    First of all, with SpriteBuilder Android support you do **not** have to install
    the Android SDK. All that’s needed is included in the SpriteBuilder Android plugins.
    And before you ask: the Eclipse code editor isn’t needed either. Not even if you
    want to write additional Java code for your app. You can do that from within Xcode.


    You may still want to install the Android SDK just to have access to the Android
    SDK offline documentation. It can’t hurt, and it won’t affect the SpriteBuilder
    Android plugins.


    An Android Device Is Mandatory


    Next, you’ll need an Android device. There’s no way around this. At the time of
    this writing and the foreseeable future, Android emulators are not supported by
    the SpriteBuilder Android plugins.


    Android emulators also can’t really be compared to the iOS Simulator in terms
    of reliability and accuracy. Perhaps the difference is best explained by how *emulation*
    differs from *simulation*.


    An *emulator* outwardly mimics device behavior but does not run the same code
    paths, frameworks, and libraries as the device. A *simulator*, on the other hand,
    implements and uses as much of the device’s software as possible, including the
    same frameworks and software libraries. Where emulation layers are necessary,
    they are written to mimic the internal behavior of the code as a whole.


    If you have the option to choose a device, I recommend that you stick with popular
    models. That means the Samsung Galaxy and Google Nexus series mainly, but the
    LG G3, HTC One, and Sony Experia are also popular contenders. Try to get a phone,
    as they are far more widely used than tablets, unless you want to develop specifically
    for tablets—in that case, get a tablet.


    Be sure to get a device that can be upgraded to the latest Android OS. The Google
    devices generally receive the most OS updates for the longest time period, with
    little to no delays.


    Connecting an Android Device via USB


    Once you have an Android device, connect it to your Mac. Be sure to plug it straight
    into a USB port on your Mac. Avoid using USB hubs and extension cords, as they
    can prevent the device from being recognized by the operating system. They may
    also slow down transfer rates or make transfers unreliable.


    The same goes for third-party cables. If at all possible, use the USB cable that
    came with the device.


    **Note**  Like on iOS, transferring apps and debugging them is not possible via
    WiFi or Bluetooth connections. A wired USB connection is mandatory for development.


    Enabling Developer Options'
  trans: '

    # 跨平台开发的注意事项与 SpriteBuilder Android 插件


    然而，并非所有 iOS 框架和功能都能映射到 Android 上的等效实现。例如，为了存储排行榜和成就，你在 iOS 上使用 `Game Center`，其在
    Android 上的等效实现是 `Google Play Games`。两者必须分别集成。`Game Center` 不能在 Android 上运行，`Google
    Play Games` 也不能在 iOS 上运行。此外，它们的技术差异很大（具有不同的需求和功能集），因此创建一个简单的转换层来将 `Game Center`
    方法和回调映射到 `Google Play Games` 是不可行的。


    所有这些都意味着你可能需要手动做一些额外的工作。你也可能需要直接使用 `C++` 或 `Java` 编写针对 Android SDK 接口的代码，但随着 `Apportable`
    不断为 `SpriteBuilder` Android 插件添加功能，这正变得越来越简单。


    ## SpriteBuilder Android 文档


    你可以在 SpriteBuilder Android 文档页面找到比我能提供的更多细节：[`android.spritebuilder.com`](http://android.spritebuilder.com)。


    如果你计划走跨平台路线，绝对应该花半小时左右通读整个文档。你会学到很多东西，包括哪些功能是可行的，已知问题是什么，以及在开始项目之前你可能需要考虑的其他任何事情。有些事情可能会影响设计和技术决策，而另一些则在撰写本文时尚未确定，例如最低支持的
    Android 版本。


    如果你的项目是使用`SpriteBuilder v1.2`或更早版本创建的（例如本书前面章节中的项目），你也应该参考该文档。这些项目需要经过一个转换过程。


    推荐的方法是使用最新的 SpriteBuilder 版本创建一个新的 SpriteBuilder 项目，然后将你原始的 `CCB`、资源和源代码文件恢复到
    SpriteBuilder 和 `Xcode` 中。同样，有关详细信息，请参阅 SpriteBuilder Android 文档，因为该过程虽然不太难遵循，但涉及的内容略多一些。


    ## 安装 Android Xcode 插件


    如果你首次运行`SpriteBuilder v1.3 beta`，或者每当有更新时，你会看到一条消息，提示正在安装 Android Xcode 插件，如图
    13-1 所示。


    ![9781484202630_Fig13-01.jpg](img/00190.jpeg)


    <span id="Fig1">**图 13-1.**</span> SpriteBuilder v1.3 及更新版本会自动将 Android 支持作为 Xcode
    插件安装


    **警告** 每当你看到图 13-1 中的消息时，你应该关闭并重启 Xcode，以便 Xcode 加载并使用这些插件的最新版本。


    如果你需要卸载或重新安装 Android Xcode 插件，可以在此处找到如何移除插件的说明：[`android.spritebuilder.com/#uninstalling-the-spritebuilder-android-plugin`](http://android.spritebuilder.com/#uninstalling-the-spritebuilder-android-plugin)。一旦你移除了所有插件文件，下次启动
    SpriteBuilder 时它们将自动重新安装。


    **注意** Android 插件与`SpriteBuilder v1.3 beta`捆绑在一起，但将来它们必须单独安装。你可以通过访问[`android.spritebuilder.com`](http://android.spritebuilder.com)来判断是否已经如此，那里也有最新的安装说明。


    你可以通过打开`Xcode` ![image](img/00008.jpeg) -> `Preferences`（偏好设置）来验证 Android 插件是否已安装。在最右侧的工具栏上，你会找到一个“双箭头”符号，如图
    13-2 所示。如果你点击它们，会出现一个弹出菜单，其中包含 *Apportable* 作为一个菜单项。


    ![9781484202630_Fig13-02.jpg](img/00191.jpeg)


    <span id="Fig2">**图 13-2.**</span> 通过测试是否有 *Apportable* 偏好设置面板可用，来验证 Android 插件是否已安装


    如果你点击 *Apportable* 菜单项，你将看到 *Apportable* 偏好设置面板，如图 13-3 所示。在撰写本文时，只有一个选项：*Enable
    MTP for transfers to Android devices*（启用 MTP 以传输到 Android 设备）。如果你在将成功构建的应用传输到设备上时遇到问题，可能需要取消选中此复选框。稍后会对此进行更多说明。


    ![9781484202630_Fig13-03.jpg](img/00192.jpeg)


    <span id="Fig3">**图 13-3.**</span> 当你在传输阶段遇到问题时，绝对应该禁用 MTP 传输


    目前，你可能希望取消选中 *Enable MTP* 复选框，以避免可能的传输问题。一旦你确认测试项目在你的 Android 设备上运行正常，你可以尝试重新启用它，看看传输是否仍然有效。


    至少在我对三星 Galaxy S4 设备的测试中，MTP 传输一开始并没有快多少。那是少数几次它还能工作的情况。启用 MTP 后，我经常收到错误消息，主要是提示“传输意外退出”，但也提到了连接丢失和超时。Apportable
    开发人员确认，他们发现三星设备在 MTP 传输方面存在众所周知的问题。


    ## Android 开发先决条件


    如果你以前从未进行过 Android 开发，以下是你需要了解的内容。


    ### 安装 Android SDK 是可选的


    首先，对于 SpriteBuilder Android 支持，你**不**需要安装 Android SDK。所需的一切都包含在 SpriteBuilder
    Android 插件中。在你提问之前：Eclipse 代码编辑器也不是必需的。即使你想为你的应用编写额外的 Java 代码，也是如此。你可以在 Xcode
    内完成这些操作。


    你可能仍然想安装 Android SDK，只是为了能够访问 Android SDK 的离线文档。这没有坏处，也不会影响 SpriteBuilder Android
    插件。


    ### Android 设备是必需的


    接下来，你需要一台 Android 设备。这是无法避免的。在撰写本文时以及可预见的将来，SpriteBuilder Android 插件不支持 Android
    模拟器。


    Android 模拟器在可靠性和准确性方面也无法与 iOS 模拟器相比。也许这个区别最好用*仿真*与*模拟*的不同来解释。


    *仿真器*只是从外部模仿设备的行为，但并不运行与设备相同的代码路径、框架和库。而*模拟器*则尽可能多地实现和使用设备的软件，包括相同的框架和软件库。在需要仿真层的地方，它们被编写为模拟代码整体上的内部行为。


    如果你可以选择设备，我建议你坚持使用流行型号。这意味着主要是三星 Galaxy 和 Google Nexus 系列，但 LG G3、HTC One 和 Sony
    Experia 也是受欢迎的选择。尝试购买一部手机，因为它们的普及度远高于平板电脑，除非你想专门为平板电脑进行开发——在这种情况下，就买一台平板电脑。


    务必购买一台可以升级到最新 Android 操作系统的设备。Google 设备通常在最长的时间内获得最多的操作系统更新，而且几乎没有延迟。


    ### 通过 USB 连接 Android 设备


    一旦你拥有 Android 设备，将其连接到你的 Mac。确保直接将其插入 Mac 上的 USB 端口。避免使用 USB 集线器和延长线，因为它们可能会阻止操作系统识别设备。它们还可能减慢传输速率或使传输不可靠。


    第三方数据线也是如此。如果可能，请使用设备附带的 USB 数据线。


    **注意** 与 iOS 一样，无法通过 WiFi 或蓝牙连接传输应用和调试它们。有线 USB 连接是开发的必要条件。


    ### 启用开发者选项

