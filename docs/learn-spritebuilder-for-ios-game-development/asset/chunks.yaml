- fmt: "为了使自定义属性在 SpriteBuilder 中可编辑，请转到 SpriteBuilder 并打开`GameScene.ccb`。然后在时间线中选择根节点。如果你查看“项目属性”选项卡，你应该会看到一个水平分隔线，上面写着“GameScene”，旁边有一个向下的三角形。顺便提一下，这个三角形允许你展开和折叠属性部分，就像\
    \ Finder 中的文件夹一样。[图 4-2](#part0013.html#Fig2) 显示了在“GameScene”部分上方折叠的`CCNode`属性部分，你会在那里找到此练习的目标：“编辑自定义属性”按钮。\n\
    \n![9781484202630_Fig04-02.jpg](images/00061.jpeg)\n\n[图 4-2](#part0013.html#_Fig2).\
    \ 令人望而生畏的“编辑自定义属性”按钮\n\n**注意**：“编辑自定义属性”按钮并非出现在每个节点上。它仅适用于那些在“项目代码连接”选项卡的“自定义类”字段中设置了特定类名称的节点。自定义属性将被分配给节点的自定义类。如果没有自定义类，就不能有自定义属性。\n\
    \n如果你点击“编辑自定义属性”按钮，会弹出一个对话框。它最初是空的，没有定义任何属性，但除此之外，它看起来与[图 4-3](#part0013.html#Fig3)\
    \ 中显示的相同。\n\n![9781484202630_Fig04-03.jpg](images/00062.jpeg)\n\n[图 4-3](#part0013.html#_Fig3).\
    \ 自定义属性编辑对话框，已定义了一些属性\n\n通过点击`+`按钮，你可以添加将分配给节点自定义类中同名实例变量（`ivar`）或属性（`property`）的属性。由于你正在编辑`GameScene.ccb`根节点（其自定义类设置为`GameScene`）的属性，因此在此处输入的变量必须在`GameScene`类中声明。这部分你已经在[代码清单\
    \ 4-1](#part0013.html#list1) 中完成了。\n\n现在你需要添加三个自定义属性。将它们命名为与[代码清单 4-1](#part0013.html#list1)\
    \ 中以`_player`开头的三个实例变量完全相同的名称。将每个属性的类型更改为`Float`，并赋予它们与[图 4-3](#part0013.html#Fig3)\
    \ 或[代码清单 4-3](#part0013.html#list3) 中相同的值。点击“完成”，并注意 SpriteBuilder 是如何将这些属性添加到“项目属性”选项卡底部的，如[图\
    \ 4-4](#part0013.html#Fig4) 所示。现在，你可以像编辑任何其他节点属性一样编辑这些属性。\n\n![9781484202630_Fig04-04.jpg](images/00063.jpeg)\n\
    \n[图 4-4](#part0013.html#_Fig4). 自定义属性在“项目属性”选项卡中是可编辑的\n\n**注意**：SpriteBuilder\
    \ 不区分属性（`property`）和实例变量（`ivar`）。对于 SpriteBuilder 来说，自定义属性都被统称为“属性”，尽管像本例中，它们也可以被声明为实例变量。\n\
    \n照常发布、构建并运行。你会注意到与上一次运行相比行为没有变化。但现在这三个设计参数被存储在 SpriteBuilder 中并可在此编辑。尝试在 SpriteBuilder\
    \ 中更改这些自定义属性，并观察玩家行为如何相应地改变。\n\n如果你需要重命名或移除一个自定义属性，只需点击“编辑自定义属性”按钮，然后双击“属性名”列进行重命名，或者点击`-`（减号）按钮删除选中的属性。\n\
    \n**警告**：请记住，SpriteBuilder 假定你已经为每个自定义属性在节点的自定义类中声明了同名的实例变量或属性。如果你忘记声明某个属性或实例变量，拼错了某个名称，或者仅在\
    \ SpriteBuilder 中重命名了某个自定义属性，加载 CCB 将会失败，并会在调试控制台打印以`*** [PROPERTY] ERROR HINT`开头的错误。要查看控制台，请在\
    \ Xcode 中转到“视图”![image](images/00008.jpeg) “调试区域”![image](images/00008.jpeg) “激活控制台”。\n\
    \n构造关卡物理\n\n我觉得重力有点偏低。感觉太像月球了，应该更接近地球。或者只是更强一点。如果牛顿能像在 SpriteBuilder 中一样轻松地改变重力，他一定会很高兴。\n\
    \n然后你将创建包围关卡的边界，防止玩家离开可玩区域，并引导其走向出口。\n\n更改重力\n\n要更改重力，请打开`Level1.ccb`，并在时间线中选择物理节点（如果未重命名，它会显示为`CCPhysicsNode`）。在其“项目属性”选项卡中，有一个标记为`CCPhysicsNode`的部分，其中包含“重力”属性，如[图\
    \ 4-5](#part0013.html#Fig5) 所示。将重力`Y`值从其默认值`-100`改为`-200`。该值为负，因为在 Cocos2D 中，正`Y`轴向上延伸，而重力是向下的力。\n\
    \n![9781484202630_Fig04-05.jpg](images/00064.jpeg)\n\n[图 4-5](#part0013.html#_Fig5).\
    \ 将`CCPhysicsNode`的重力增加到`-200`\n\n请注意，重力不是一个单一值，而是一个具有`x`/`y`分量的向量。没有什么能阻止你增加一点侧向重力，尽管那会相当不寻常。\n\
    \n再次发布、构建并运行。看看你是否喜欢新的重力。请随时返回到`GameScene.ccb`根节点，尝试调整三个`_player`值以及重力，以感受更大或更极端的值。当你完成实验后，你可能希望分别将值恢复为[图\
    \ 4-4](#part0013.html#Fig4) 和[图 4-5](#part0013.html#Fig5) 中的值。否则，不同的值可能会在本书后续内容中引入不可预测的行为，或者仅仅导致你无法完成关卡。\n\
    \n你应该保持“睡眠时间阈值”属性不变。它决定了物理体进入睡眠状态的速度，睡眠状态是指物体静止不动以减少 CPU 负载的状态。当对物体施加力时，睡眠中的物体会被唤醒，并且物体必须具有非常小的速度和角动量才能开始睡眠。此设置对于离开屏幕并在巨大虚空中持续下落的物体不产生效果。\n\
    \n插曲：处理丢失的物体\n\nCocos2D 永远不会自动移除节点。当前不在屏幕上的节点仍然是场景层次结构的一部分；它们会留在内存中并执行动作，尽管它们不会被渲染。\n\
    \n如果你编写一个游戏，其中节点被创建但从未在它们移出可玩区域时被删除，最终游戏的帧率会随着时间的推移而下降。在这种情况下，你必须编写代码来定期检查每个节点的位置是否越过了某个假想边界——例如，在`update:`方法中。如果确定某个节点位于允许边界之外，则向该节点发送`removeFromParent`消息以将其移除。[代码清单\
    \ 4-6](#part0013.html#list6) 给出了一个示例。\n\n[***代码清单 4-6***](#part0013.html#_list6).\
    \ 基于`Y`坐标移除节点的示例\n\n```\n-(void) update:(CCTime)delta\n{\n    if (_playerNode.position.y\
    \ < (-_playerNode.contentSize.height))\n    {\n        [_playerNode removeFromParent];\n\
    \    }\n\n// more code here ...\n}\n```\n\n这里的括号`(-_playerNode.contentSize.height)`只是为了清晰起见，因为其前面有一个容易被忽略的负号。\n\
    \n在这个项目中，你不需要像[代码清单 4-6](#part0013.html#list6) 中那样的检查，因为你将用不可逾越的墙壁包围关卡。\n\n创建静态关卡边界\n\
    \n你可能还记得本章前面提到物理体有两种模式：动态和静态。动态允许物体在世界中自由移动，并且它会响应冲量和力，包括重力。对于不可移动的物理体，你应该选择静态模式。\n\
    \n设置为静态的物体永远不会通过自身或通过力改变其位置或旋转，无论其他物体如何猛烈撞击它。然而，你仍然可以手动更改静态物体的位置和旋转。但是，对于这个练习，你只需要一些非动画的、刚性的墙壁。\n\
    \n创建墙壁模板"
  raw: 'To make custom properties editable in SpriteBuilder, go to SpriteBuilder and
    open the GameScene.ccb. Then select the root node in the Timeline. If you look
    at the Item Properties tab, you should see a horizontal divider that reads GameScene
    next to a downward-pointing triangle. That triangle, by the way, allows you to
    expand and collapse sections of properties, much like folders in Finder. [Figure
    4-2](#part0013.html#Fig2) shows the collapsed CCNode properties section above
    the GameScene section, where you’ll find the goal of this exercise: the Edit Custom
    Properties button.


    ![9781484202630_Fig04-02.jpg](images/00061.jpeg)


    [Figure 4-2](#part0013.html#_Fig2). The ominous Edit Custom Properties button


    **Note**  The Edit Custom Properties button does not appear on every node. It
    is available only on nodes that have their Custom class field on the Item Code
    Connections tab set to a specific class name. Custom properties will be assigned
    to the custom class of a node. Without a custom class, there can’t be custom properties.


    If you click on the Edit Custom Properties button, a dialog will appear. It’s
    empty at first, with no properties defined, but otherwise it looks the same as
    in [Figure 4-3](#part0013.html#Fig3).


    ![9781484202630_Fig04-03.jpg](images/00062.jpeg)


    [Figure 4-3](#part0013.html#_Fig3). The custom properties editing dialog with
    some properties defined


    By clicking on the + button, you can add properties that will be assigned to ivars
    or properties of the same name in the node’s custom class. Since you are editing
    the properties of the GameScene.ccb root node whose custom class is set to GameScene,
    the variables entered here must be declared in the GameScene class. This part
    you already completed earlier in [Listing 4-1](#part0013.html#list1).


    Now you need to add three custom properties. Name them exactly like the three
    ivars in [Listing 4-1](#part0013.html#list1) that start with _player. Change each
    property’s type to Float, and give them the same values as in [Figure 4-3](#part0013.html#Fig3)
    or [Listing 4-3](#part0013.html#list3). Click Done and notice how SpriteBuilder
    has added these properties at the bottom of the Item Properties tab, as seen in
    [Figure 4-4](#part0013.html#Fig4). You can now edit these properties like any
    other node property.


    ![9781484202630_Fig04-04.jpg](images/00063.jpeg)


    [Figure 4-4](#part0013.html#_Fig4). Custom properties are editable on the Item
    Properties tab


    **Note**  SpriteBuilder makes no distinction between properties and ivars. For
    SpriteBuilder, custom properties are all termed “properties” although, like in
    this example, they can be declared as ivars as well.


    Publish, build, and run as usual. You’ll notice no change in behavior compared
    to the previous run. But now these three design parameters are stored and edited
    in SpriteBuilder. Try making changes to these custom properties in SpriteBuilder,
    and observe how the player’s behavior changes accordingly.


    If you ever need to rename or remove a custom property, just click the Edit Custom
    Properties button and double-click the Property name column to rename, or click
    the – (minus sign) button to delete the selected property.


    **Caution**  Keep in mind that SpriteBuilder assumes you’ve declared corresponding
    ivars or properties of the same name in the node’s custom class for each custom
    property. If you forgot to declare a property or ivar, misspelled the name of
    one, or renamed a custom property only in SpriteBuilder, loading the CCB will
    fail with errors beginning with *** [PROPERTY] ERROR HINT printed to the debug
    Console. To see the Console, go to View ![image](images/00008.jpeg) Debug Area
    ![image](images/00008.jpeg) Activate Console in Xcode.


    Constructing the Level Physics


    I think gravity is a bit on the low side. Feels too moon-ish, it should be more
    earth-like. Or just stronger. Newton would have rejoiced if he’d been able to
    change gravity as easily as in SpriteBuilder.


    Then you’ll create borders enclosing the level, preventing the player from leaving
    the playable area as well as funneling toward the exit.


    Changing Gravity


    To change gravity, open the Level1.ccb and select the physics node (if it was
    not renamed, it’s listed as CCPhysicsNode) in the Timeline. On its Item Properties
    tab, there is a section labeled CCPhysicsNode that has the Gravity property, as
    seen in [Figure 4-5](#part0013.html#Fig5). Change the gravity Y value from its
    default value of –100 to –200\. The value is negative because the positive Y axis
    in Cocos2D extends upward, but gravity is a force pointing downward.


    ![9781484202630_Fig04-05.jpg](images/00064.jpeg)


    [Figure 4-5](#part0013.html#_Fig5). Increase CCPhysicsNode gravity to –200


    Note that gravity is not a single value but a vector with x/y components. There’s
    nothing stopping you from adding a little sideways gravity, although that would
    be rather unusual.


    Once more, publish, build, and run. See how you like the new gravity. Feel free
    to go back to the GameScene.ccb root node and play around with the three _player
    values as well as gravity to get a feel for more or less extreme values. When
    you are done experimenting, you may want to revert the values to the values in
    [Figure 4-4](#part0013.html#Fig4) and [Figure 4-5](#part0013.html#Fig5), respectively.
    Otherwise, different values may introduce unpredictable behavior later in the
    book, or simply prevent you from completing the level.


    You should leave the Sleep time threshold property as is. It determines how quickly
    physics bodies will go to sleep, a state where they rest without moving to reduce
    the load on the CPU. Sleeping bodies will awake when forces are applied to them,
    and a body must have very little velocity and angular momentum to start sleeping.
    This setting does not come into effect for bodies that leave the screen and continue
    to fall forever in a big empty void.


    Interlude: Dealing with Lost Bodies


    Cocos2D will never remove nodes automatically. Nodes not currently visible on
    screen are still part of the scene hierarchy; they remain in memory and perform
    actions though they will not be rendered.


    If you were to program a game where nodes are created but never deleted as they
    move outside the playable area, eventually the game’s frame rate is going to decrease
    over time. In such instances, you have to have code in place that checks periodically
    whether each node’s position has crossed an imaginary boundary—for instance, in
    the update: method. If a node is determined to be outside the allowed boundary,
    that node is sent the removeFromParent message in order to remove it. An example
    is given in [Listing 4-6](#part0013.html#list6).


    [***Listing 4-6***](#part0013.html#_list6). Example for removing a node based
    on its Y coordinate


    ```

    -(void) update:(CCTime)delta

    {

        if (_playerNode.position.y < (-_playerNode.contentSize.height))

        {

            [_playerNode removeFromParent];

        }


    // more code here ...

    }

    ```


    The (-_playerNode.contentSize.height) is in brackets only for clarity because
    there’s an easily overlooked minus sign in front of it.


    In this project you don’t need a check like in [Listing 4-6](#part0013.html#list6),
    because you’ll enclose the level with impenetrable walls.


    Creating Static Level Borders


    You may remember from earlier in this chapter that physics bodies have two modes:
    Dynamic and Static. Dynamic allows a body to move freely about the world, and
    it will react to impulses and forces, including gravity. For immovable physics
    bodies, you would instead choose the Static mode.


    Bodies that are set to Static will never, ever change their position or rotation
    by themselves or through forces, no matter how hard other bodies impact it. You
    can still manually change a Static body’s position and rotation, however. But
    for this exercise you just need some nonanimated, rigid walls.


    Creating the Wall Templates'
