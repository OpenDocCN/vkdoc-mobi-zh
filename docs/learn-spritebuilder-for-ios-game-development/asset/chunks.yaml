    {\n    GameState* gameState = [GameState sharedGameState];\n    _musicSlider.sliderValue\
    \ = gameState.musicVolume;\n    _effectsSlider.sliderValue = gameState.effectsVolume;\n\
    }\n\n-(void) volumeDidChange:(CCSlider*)sender\n{\n    if (sender == _musicSlider)\n\
    \    {\n        [GameState sharedGameState].musicVolume = _musicSlider.sliderValue;\n\
    \    }\n    else if (sender == _effectsSlider)\n    {\n        [GameState sharedGameState].effectsVolume\
    \ = _effectsSlider.sliderValue;\n    }\n}\n\n-(void) shouldClose\n{\n    [[NSUserDefaults\
    \ standardUserDefaults] synchronize];\n    [self removeFromParent];\n    [_mainMenuButtons\
    \ show];\n}\n\n@end\n```\n\n在 `didLoadFromCCB` 方法中，音量值被赋给了滑块的值。巧合的是，`sliderValue`\
    \ 和音量都使用 0.0 到 1.0 的相同值范围。初始状态下，`GameState` 的音量将返回 1.0，这会将两个音量滑块的手柄都置于最右侧。每当 `volumeDidChange:`\
    \ 方法运行时，会将接收到的 `sender` 与现有的实例变量进行比较，以确定是音乐音量还是音效音量发生了变化。在这两种情况下，相应的 `GameState`\
    \ 属性都会被赋予当前的 `sliderValue`。\n\n`shouldClose` 方法现在还会调用 `NSUserDefaults` 的 `synchronize`\
    \ 方法，以确保当设置弹出窗口关闭时，`GameState` 中的数据会被持久化到磁盘。这只是一个预防措施。`NSUserDefaults` 确实会定期同步其数据，但如果应用程序在关闭设置弹出窗口后不久崩溃，或者你在\
    \ Xcode 中点击了停止按钮，它可能无法及时同步。\n\n**注意** 你不应该每次 `NSUserDefaults` 的值发生变化时都调用 `synchronize`，因为磁盘访问是一个相对较慢的操作。就像我之前提到的关注点分离：开发者真的需要关心同步\
    \ `NSUserDefaults` 才能将 `GameState` 中的值写入磁盘这一事实吗？你可以通过向 `GameState` 添加一个相应的 `synchronize`\
    \ 方法并调用它来改善这一点。\n\n如果你现在运行项目并打开设置菜单，你会注意到滑块手柄最初位于最右侧。拖动滑块手柄，关闭设置弹出窗口，然后退出应用或点击\
    \ Xcode 中的停止按钮。\n\n然后，你可以从 Xcode 重新启动应用，你会看到滑块的位置（以及它们的值）已经被持久化保存。你也可以尝试在设置弹出窗口仍然打开时点击\
    \ Xcode 中的停止按钮，那么对滑块的任何更改在下次启动时很可能会恢复到之前的状态。\n\n**注意** 将音量滑块与实际音频音量关联将在接下来的音频章节中完成。\n\
    \n## 总结\n\n现在你拥有了一个带有功能完善的设置菜单、动画效果流畅的主菜单。音量值由 `GameState` 类持久化存储，下一章还将对其进行增强，以同时存储已解锁的关卡。\n\
    \n你还学习了在过程中如何组织代码，如何将任何节点转换为按钮，以及如何将按钮事件转发给实际需要处理该事件的类。\n\n你可以在 `08 - Main Menu\
    \ and Settings` 文件夹中找到项目当前的状态。\n\n## 第 8 章：选择和解锁关卡\n\n对于这个游戏，你希望为用户提供一种方式来选择他们要开始的关卡。由于关卡被划分到不同的世界中，你将使用一个*滚动视图*节点，允许用户在世界之间滑动切换。\n\
    \n此外，你还需要一种灵活的方式来增加更多关卡，同时跟踪玩家已经解锁了哪些关卡。`GameState` 类将在这一方面发挥作用。\n\n当然，你还必须添加其他关卡的\
    \ CCB 文件。你将添加几个占位关卡，之后你可以根据自己的需要，用你自己的图形和实际游戏内容来更新它们。你甚至还将学习如何统计应用中当前的关卡文件数量。\n\
    \n此外，作为各种菜单的完善，你将添加一个关卡完成弹出窗口，允许用户继续玩下一个关卡。\n\n### 添加内容节点\n\n你将首先设计*滚动视图*的*内容*节点。*内容*节点是一个容器，其内容将可滚动。在本例中，你将把每个世界的关卡选择屏幕设计为单独的页面，随后在*滚动视图*节点中启用分页功能，这样在每次滑动操作后，每个世界菜单都会在屏幕上居中显示。这种行为类似于在\
    \ iOS 相册中翻阅照片。\n\n在滚动视图中，*内容*节点的内容尺寸决定了可滚动区域的大小。*滚动视图*的内容尺寸决定了用户可以触摸和拖动的区域。它也决定了*内容*节点的边界。*内容*节点的边缘被限定在由*滚动视图*的位置和内容尺寸所定义的边缘范围内。\n\
    \n**注意** 内容仍会在*滚动视图*的边界之外绘制。如果你需要内容仅绘制在*滚动视图*区域内，则必须在其上绘制一个充当边框的精灵图。或者，你也可以通过编程方式将*滚动视图*添加到一个\
    \ `CCClippingNode` 中。\n\n设置启用分页的内容时，你需要考虑到：*滚动视图*会根据*滚动视图*尺寸与*内容*节点尺寸的比例来自动确定页面数量。\n\
    \n例如，如果你想要五个独立的、水平滚动的页面，每个页面宽度为 100 点，那么*滚动视图*的宽度必须为 100，而*内容*节点的总尺寸必须为 500。这是假设页面之间没有边距的情况。如果各个页面之间有边距，你还必须考虑边距的大小，并且要接受这样一个事实：任何增加的边距都会导致各个页面在进一步滚动时，其吸附位置逐渐发生偏移。这时*滚动视图*的行为会表现得像第一页左对齐，而最后一页右对齐。\n\
    \n那么，我们开始吧。在 `UserInterface` 文件夹中创建一个新的 CCB 文件，并将此文档命名为 `MainMenuLevelSelect.ccb`。在创建\
    \ CCB 文档之前，CCB 类型必须设置为*节点*。选中根节点，在*项目属性*标签页中，将内容尺寸类型设置为 `%`。因为你将向*滚动视图*添加三个页面，并且只允许水平滚动，所以必须将内容尺寸设置为宽度\
    \ 300%、高度 100%。这将使*滚动视图*的*内容*节点尺寸是*滚动视图*本身尺寸的三倍，无论*滚动视图*的尺寸是多少。\n\n你还应该将根节点命名为\
    \ `levelSelect`，以便轻松获取其引用。在*项目代码连接*标签页中，你需要设置一个自定义类，名为 `MainMenuLevelSelect`。这个类稍后将接收按钮事件。它还将处理高亮显示已解锁的关卡。\n\
    \n接下来添加内容。在*无图块编辑器视图*中，请确保底部的 `UserInterface` 精灵表已勾选。你应该会看到一些以大写字母 `W` 开头后跟一个数字的图像。这些是世界特定的关卡选择图像。名为\
    \ `W1_bg`、`W2_bg` 等的图像是定义页面视觉效果的背景图。从每种背景图中拖入一个——你总共需要添加三个。所有三张图像的尺寸都是 411x290\
    \ 点。你很快就会明白这一点的重要性。\n"
- fmt: "目前，这三张图片可能都位于相同的位置。你需要将它们水平方向均匀排列。*W1_bg* 的位置应为 `0x0`。*W2_bg* 应位于 `441x0`，*W3_bg*\
    \ 应位于 `882x0`。这些位置在图片之间添加了 30 点宽的边距。此边距完全是可选的，但很重要，因为它会影响单个页面的大小。此外，将每个背景精灵的锚点设置为\
    \ `0x0`，这样第一个背景精灵的左下角将会对齐根节点的位置，也就是*滚动视图*的左下角。结果应类似于[图 8-1](#part0018.html#Fig1)。\n\
    \n![9781484202630_Fig08-01.jpg](images/00108.jpeg)\n\n[图 8-1](#part0018.html#_Fig1)\
    \ 均匀分布的三张页面背景图片\n\n### 添加滚动视图节点\n\n[图 8-1](#part0018.html#Fig1) 中的设置已足够尝试实际的*滚动视图*节点。打开*MainScene.ccb*，切换到*节点库视图*。从那里拖放一个*滚动视图*节点到舞台上。\n\
    \n选中*滚动视图*节点，编辑其属性，将位置类型设置为`%`，值设置为`50`。将锚点设置为 `0.5x0.5`，以便*滚动视图*节点在场景中居中。\n\n\
    现在是关键点：*滚动视图*的内容大小。你知道单个背景图片（页面）宽度为 411 点。通过设置第二和第三张背景图片的位置，你已在上一页的基础上增加了 30 点的水平距离，从而添加了\
    \ 30 点的边距。这意味着单个页面的宽度为 411 点加上 30 点。将`441x290`作为*滚动视图*的内容大小输入。\n\n继续设置`CCScrollView`特有的属性。它们显示在[图\
    \ 8-2](#part0018.html#Fig2) 中。第一步应该是通过下拉菜单将*内容节点*值设置为*UserInterface/MainMenuLevelSelect.ccb*。第一张背景图片应立即出现在舞台上由*滚动视图*定义的区域内。如果没有出现，请从菜单中选择\
    \ File ![image](images/00008.jpeg) Save All，或直接点击发布按钮一次。\n\n![9781484202630_Fig08-02.jpg](images/00109.jpeg)\n\
    \n[图 8-2](#part0018.html#_Fig2) 滚动视图的属性\n\n*滚动视图*节点应仅水平滚动；因此，取消选中*启用垂直滚动*。*反弹*设置决定了边缘处的行为。也就是说，如果你尝试在第一页向左滚动，或在最后一页向右滚动，当*反弹*选中时，你可以稍微向该方向拖动*内容*节点，但它会不断反弹回来。禁用*反弹*时，在第一页向左拖动或在最后一页向右拖动完全无效。反弹有助于向用户指示滚动内容的边界。最后，*启用分页*将使每个页面滚动并吸附到位。没有分页，你可以无任何吸附地滚动浏览*内容*节点。\n\
    \n在*项目代码连接*标签页中，你还应分配一个 Doc root 变量。在相应字段中输入`_levelSelectScrollView`。\n\n由于存在边距，图片左对齐，边距完全向右延伸，如[图\
    \ 8-3](#part0018.html#Fig3) 所示。通常这不成问题，因为它允许用户看到页面右侧更多内容，鼓励用户滑动。它也显示在到达最后一页时右侧有更多的空白空间。然而，有时更重要的事情是不顾边距将*滚动视图*页面在舞台上居中。要应对这\
    \ 30 点的边距，你需要向*滚动视图*的 X 位置额外添加 15 点。为此，将*滚动视图*的 X 位置类型更改为 points，输入`299`（284 加\
    \ 15），然后将位置类型更改回`%`。你将得到 52.6% 的 X 位置，并且页面在屏幕上居中。是否让页面居中由你自己决定。\n\n![9781484202630_Fig08-03.jpg](images/00110.jpeg)\n\
    \n[图 8-3](#part0018.html#_Fig3) 在 SpriteBuilder 中选中的滚动视图节点。注意页面图片在滚动视图内左对齐。为清晰起见，背景和按钮节点已被隐藏\n\
    \n## 显示滚动视图弹出框\n\n在尝试*滚动视图*之前，你需要创建`MainMenuLevelSelect`类和`_levelSelectScrollView`实例变量。我们先处理实例变量。\n\
    \n在 Xcode 中打开*MainScene.m*。添加[代码清单 8-1](#part0018.html#list1) 中高亮显示的代码。\n\n[***代码清单\
    \ 8-1***](#part0018.html#_list1) 添加 CCScrollView 实例变量\n\n```\n#import \"MainScene.h\"\
    \n\n@implementation MainScene\n{\n    __weak CCScrollView* _levelSelectScrollView;\n\
    }\n\n-(void) didLoadFromCCB\n{\n    NSLog(@\"scroll view: %@\", _levelSelectScrollView);\n\
    }\n\n@end\n```\n\n`NSLog` 行仅用于验证赋值是否正确完成。它应输出类似如下的内容：\n\n```\nLearnSpriteBuilder[67794:60b]\
    \ scroll view: <CCScrollView = 0x9b54490 | Name = >\n```\n\n如果在`MainScene`中仍有`playButtonPressed`方法，你可以将其删除。它是在[第\
    \ 2 章](#part0011.html) 中添加的原始播放按钮所使用的。你还应检查*MainScene.ccb*是否仍包含该按钮。如果包含，你也可以将其删除。如果删除了按钮及其选择器代码，你将暂时无法玩第一个关卡，但你稍后会重新添加此功能。\n\
    \n目前，你无需对`CCScrollView`实例变量执行任何进一步操作，但稍后将使用它来解释如何响应某些*滚动视图*事件。\n\n接下来，创建一个新的 Cocoa\
    \ Touch 类，如[图 2-10](#part0011.html#Fig10) 和图 2-11 所示。将类命名为`MainMenuLevelSelect`，并将其设为`CCNode`的子类。创建类后，打开*MainMenuLevelSelect.h*并添加[代码清单\
    \ 8-2](#part0018.html#list2) 中高亮显示的代码。\n\n[***代码清单 8-2***](#part0018.html#_list2)\
    \ MainMenuLevelSelect 头文件\n\n```\n#import \"CCNode.h\"\n\n@class MainMenuButtons;\n\
    \n@interface MainMenuLevelSelect : CCNode\n\n@property (weak) MainMenuButtons*\
    \ mainMenuButtons;\n\n@end\n```\n\n这些添加与`SettingsLayer`中的类似，使`MainMenuButtons`类能够将自身赋值给`MainMenuLevelSelect`类，以便它可以向后者发送消息。与在`SettingsLayer`中一样，你只需用它来关闭关卡选择弹出框。\n\
    \n*MainMenuLevelSelect.m* 目前不需要任何修改。\n\n另一方面，*MainMenuButtons.m* 需要多处添加。添加[代码清单\
    \ 8-3](#part0018.html#list3) 中高亮显示的代码。\n\n[***代码清单 8-3***](#part0018.html#_list3)\
    \ MainMenuButtons.m 节选，包含新增的高亮代码\n\n```\n#import \"MainMenuButtons.h\"\n#import\
    \ \"SettingsLayer.h\"\n#import \"MainMenuLevelSelect.h\"\n\n@implementation MainMenuButtons\n\
    {\n    __weak MainMenuLevelSelect* _levelSelect;\n}\n\n-(void) didLoadFromCCB\n\
    {\n    _levelSelect = (MainMenuLevelSelect*)[self.parent\n                   \
    \                       getChildByName:@\"levelSelect\"\n                    \
    \                         recursively:YES];\n    _levelSelect.parent.visible =\
    \ NO;\n    _levelSelect.mainMenuButtons = self;\n}\n\n// ... 其余方法已省略\n```\n\n\
    这会导入新的`MainMenuLevelSelect`类头文件，以便为该类添加一个名为`_levelSelect`的实例变量。到目前为止，一切顺利。"
  raw: 'Right now, all three images are likely at the same position. You need to space
    them out evenly in a horizontal direction. The *W1_bg* position should be 0x0\.
    *W2_bg* should be at position 441x0 and *W3_bg* should be at 882x0\. These positions
    add a 30-point-wide margin between the images. The margin is entirely optional,
    but it is important to consider because it contributes to the size of an individual
    page. Additionally, set each background sprite’s anchor point to 0x0 simply because
    this will align the first background sprite’s lower left corner with the root
    node’s position and thus the *Scroll View*’s lower left corner. The result should
    look like [Figure 8-1](#part0018.html#Fig1).


    ![9781484202630_Fig08-01.jpg](images/00108.jpeg)


    [Figure 8-1](#part0018.html#_Fig1). Three page-background images spread out evenly


    Adding the Scroll View Node


    The setup in [Figure 8-1](#part0018.html#Fig1) is enough to try out an actual
    *Scroll View* node. Open *MainScene.ccb*, and switch to the *Node Library View*.
    From there drag and drop a *Scroll View* node onto the stage.


    With the *Scroll View* node selected, edit its properties so that the position
    types are set to % and values are set to 50\. Set the anchor point to 0.5x0.5
    so that the *Scroll View* node is centered on the scene.


    Now the important bit: the *Scroll View*’s content size. You know that individual
    background images (pages) are 411 points wide. You’ve also added a 30-point margin
    by setting the position of the second and third background images so that there
    is an added 30 points of horizontal distance on the previous page. This means
    a single page is 411 points plus 30 points wide. Enter 441x290 as the *Scroll
    View*’s content size.


    Moving on to the properties specific to CCScrollView. They are shown in [Figure
    8-2](#part0018.html#Fig2). Your first step should be to set the *Content node*
    value via the drop-down menu to *UserInterface/MainMenuLevelSelect.ccb*. The first
    background image should immediately appear on the stage within the area defined
    by the *Scroll View*. If it doesn’t, choose File ![image](images/00008.jpeg) Save
    All from the menu or simply click the publish button once.


    ![9781484202630_Fig08-02.jpg](images/00109.jpeg)


    [Figure 8-2](#part0018.html#_Fig2). The Scroll View’s properties


    The *Scroll View* node should scroll only horizontally; therefore, uncheck *Vertical
    scroll enabled*. The *Bounces* setting determines the behavior at the edges. That
    is, if you try to scroll left on the first page, or right on the last page, with
    *Bounces* checked, you can drag the *Content* node slightly in that direction,
    but it will keep bouncing back. With *Bounces* disabled, dragging left on the
    first page or right on the last page simply has no effect. Bouncing is helpful
    to indicate the borders of the scrolling content to the user. Last, *Paging enabled*
    will scroll and snap each page in place. Without paging, you can scroll through
    the *Content* node without any kind of snapping.


    On the *Item Code Connection* tab, you should also assign a Doc root var. Enter
    ***_levelSelectScrollView*** in the corresponding field.


    Due to the margin, the images are left-aligned with the margin extending entirely
    to the right, as you can see in [Figure 8-3](#part0018.html#Fig3). Usually, this
    isn’t a problem since it allows you to see more of the page to the right, encouraging
    the user to swipe. It also shows more clear space to the right when you reach
    the last page. However, sometimes it’s more important to center the *Scroll View*
    pages on the stage despite the margin. To combat the 30-point margin in this case,
    you would have to add another 15 points to the *Scroll View*’s X position. To
    do that, change the *Scroll View*’s X position type to points, enter **299** (284
    plus 15), and then change the position type back to %. You’ll get an X position
    of 52.6%, and the pages are centered on the screen. I’ll leave it up to you whether
    you prefer the pages centered or not.


    ![9781484202630_Fig08-03.jpg](images/00110.jpeg)


    [Figure 8-3](#part0018.html#_Fig3). The Scroll View node selected in SpriteBuilder.
    Notice the page image being left aligned within the Scroll View. The background
    and button nodes have been hidden for visual clarity


    Showing the Scroll View Popover


    Before you can try out the *Scroll View*, you’ll have to create the MainMenuLevelSelect
    class and the _levelSelectScrollView ivar. Let’s do the ivar first.


    Open *MainScene.m* in Xcode. Add the code highlighted in [Listing 8-1](#part0018.html#list1).


    [***Listing 8-1***](#part0018.html#_list1). Adding the CCScrollView ivar


    ```

    #import "MainScene.h"


    @implementation MainScene

    {

        __weak CCScrollView* _levelSelectScrollView;

    }


    -(void) didLoadFromCCB

    {

        NSLog(@"scroll view: %@", _levelSelectScrollView);

    }


    @end

    ```


    The NSLog line exists only to verify the assignment was done properly. It should
    log something similar to this:


    ```

    LearnSpriteBuilder[67794:60b] scroll view: <CCScrollView = 0x9b54490 | Name = >

    ```


    If there is still a playButtonPressed method in MainScene, you can remove that.
    It was used by the original play button that you added way back in [Chapter 2](#part0011.html).
    You should also check if *MainScene.ccb* still contains that button. If it does,
    you can remove that as well. If you remove the button and its selector code, you
    won’t be able to play the first level for now, but you’ll add this functionality
    back in shortly.


    For now, you don’t need to do anything further with the CCScrollView ivar, but
    it will be used shortly to explain how to react to certain *Scroll View* events.


    Next, create a new Cocoa Touch Class as shown in [Figure 2-10](#part0011.html#Fig10)
    and 2-11. Name the class **MainMenuLevelSelect**, and make it a subclass of CCNode.
    Once the class is created, open the *MainMenuLevelSelect.h* and add the code highlighted
    in [Listing 8-2](#part0018.html#list2).


    [***Listing 8-2***](#part0018.html#_list2). MainMenuLevelSelect header


    ```

    #import "CCNode.h"


    @class MainMenuButtons;


    @interface MainMenuLevelSelect : CCNode


    @property (weak) MainMenuButtons* mainMenuButtons;


    @end

    ```


    The additions are analogous to those in SettingsLayer, enabling the MainMenuButtons
    class to assign itself to the MainMenuLevelSelect class so that it can send messages
    back to it. You’ll need it only for closing the level-selection popover, just
    like you did in SettingsLayer, too.


    *MainMenuLevelSelect.m* does not need any modifications for now.


    *MainMenuButtons.m*, on the other hand, requires several additions. Add the code
    highlighted in [Listing 8-3](#part0018.html#list3).


    [***Listing 8-3***](#part0018.html#_list3). Excerpt of MainMenuButtons.m with
    new additions highlighted


    ```

    #import "MainMenuButtons.h"

    #import "SettingsLayer.h"

    #import "MainMenuLevelSelect.h"


    @implementation MainMenuButtons

    {

        __weak MainMenuLevelSelect* _levelSelect;

    }


    -(void) didLoadFromCCB

    {

        _levelSelect = (MainMenuLevelSelect*)[self.parent

                                              getChildByName:@"levelSelect"

                                                 recursively:YES];

        _levelSelect.parent.visible = NO;

        _levelSelect.mainMenuButtons = self;

    }


    // ... remaining methods omitted

    ```


    This imports the new MainMenuLevelSelect class header in order to add an ivar
    for that class named _levelSelect. So far, so good.'
  trans: "\n目前，这三张图片可能都位于相同的位置。你需要将它们水平方向均匀排列。*W1_bg* 的位置应为 `0x0`。*W2_bg* 应位于 `441x0`，*W3_bg*\
    \ 应位于 `882x0`。这些位置在图片之间添加了 30 点宽的边距。此边距完全是可选的，但很重要，因为它会影响单个页面的大小。此外，将每个背景精灵的锚点设置为\
    \ `0x0`，这样第一个背景精灵的左下角将会对齐根节点的位置，也就是*滚动视图*的左下角。结果应类似于图 8-1。\n\n![9781484202630_Fig08-01.jpg](img/00108.jpeg)\n\
    \n图 8-1 均匀分布的三张页面背景图片\n\n### 添加滚动视图节点\n\n图 8-1 中的设置已足够尝试实际的*滚动视图*节点。打开*MainScene.ccb*，切换到*节点库视图*。从那里拖放一个*滚动视图*节点到舞台上。\n\
    \n选中*滚动视图*节点，编辑其属性，将位置类型设置为`%`，值设置为`50`。将锚点设置为 `0.5x0.5`，以便*滚动视图*节点在场景中居中。\n\n\
    现在是关键点：*滚动视图*的内容大小。你知道单个背景图片（页面）宽度为 411 点。通过设置第二和第三张背景图片的位置，你已在上一页的基础上增加了 30 点的水平距离，从而添加了\
    \ 30 点的边距。这意味着单个页面的宽度为 411 点加上 30 点。将`441x290`作为*滚动视图*的内容大小输入。\n\n继续设置`CCScrollView`特有的属性。它们显示在图\
    \ 8-2 中。第一步应该是通过下拉菜单将*内容节点*值设置为*UserInterface/MainMenuLevelSelect.ccb*。第一张背景图片应立即出现在舞台上由*滚动视图*定义的区域内。如果没有出现，请从菜单中选择\
    \ File ![image](img/00008.jpeg) Save All，或直接点击发布按钮一次。\n\n![9781484202630_Fig08-02.jpg](img/00109.jpeg)\n\
    \n图 8-2 滚动视图的属性\n\n*滚动视图*节点应仅水平滚动；因此，取消选中*启用垂直滚动*。*反弹*设置决定了边缘处的行为。也就是说，如果你尝试在第一页向左滚动，或在最后一页向右滚动，当*反弹*选中时，你可以稍微向该方向拖动*内容*节点，但它会不断反弹回来。禁用*反弹*时，在第一页向左拖动或在最后一页向右拖动完全无效。反弹有助于向用户指示滚动内容的边界。最后，*启用分页*将使每个页面滚动并吸附到位。没有分页，你可以无任何吸附地滚动浏览*内容*节点。\n\
    \n在*项目代码连接*标签页中，你还应分配一个 Doc root 变量。在相应字段中输入`_levelSelectScrollView`。\n\n由于存在边距，图片左对齐，边距完全向右延伸，如图\
    \ 8-3 所示。通常这不成问题，因为它允许用户看到页面右侧更多内容，鼓励用户滑动。它也显示在到达最后一页时右侧有更多的空白空间。然而，有时更重要的事情是不顾边距将*滚动视图*页面在舞台上居中。要应对这\
    \ 30 点的边距，你需要向*滚动视图*的 X 位置额外添加 15 点。为此，将*滚动视图*的 X 位置类型更改为 points，输入`299`（284 加\
    \ 15），然后将位置类型更改回`%`。你将得到 52.6% 的 X 位置，并且页面在屏幕上居中。是否让页面居中由你自己决定。\n\n![9781484202630_Fig08-03.jpg](img/00110.jpeg)\n\
    \n图 8-3 在 SpriteBuilder 中选中的滚动视图节点。注意页面图片在滚动视图内左对齐。为清晰起见，背景和按钮节点已被隐藏\n\n## 显示滚动视图弹出框\n\
    \n在尝试*滚动视图*之前，你需要创建`MainMenuLevelSelect`类和`_levelSelectScrollView`实例变量。我们先处理实例变量。\n\
    \n在 Xcode 中打开*MainScene.m*。添加代码清单 8-1 中高亮显示的代码。\n\n***代码清单 8-1*** 添加 CCScrollView\
    \ 实例变量\n\n```\n#import \"MainScene.h\"\n\n@implementation MainScene\n{\n    __weak\
    \ CCScrollView* _levelSelectScrollView;\n}\n\n-(void) didLoadFromCCB\n{\n    NSLog(@\"\
    scroll view: %@\", _levelSelectScrollView);\n}\n\n@end\n```\n\n`NSLog` 行仅用于验证赋值是否正确完成。它应输出类似如下的内容：\n\
    \n```\nLearnSpriteBuilder[67794:60b] scroll view: <CCScrollView = 0x9b54490 |\
    \ Name = >\n```\n\n如果在`MainScene`中仍有`playButtonPressed`方法，你可以将其删除。它是在第 2 章 中添加的原始播放按钮所使用的。你还应检查*MainScene.ccb*是否仍包含该按钮。如果包含，你也可以将其删除。如果删除了按钮及其选择器代码，你将暂时无法玩第一个关卡，但你稍后会重新添加此功能。\n\
    \n目前，你无需对`CCScrollView`实例变量执行任何进一步操作，但稍后将使用它来解释如何响应某些*滚动视图*事件。\n\n接下来，创建一个新的 Cocoa\
    \ Touch 类，如图 2-10 和图 2-11 所示。将类命名为`MainMenuLevelSelect`，并将其设为`CCNode`的子类。创建类后，打开*MainMenuLevelSelect.h*并添加代码清单\
    \ 8-2 中高亮显示的代码。\n\n***代码清单 8-2*** MainMenuLevelSelect 头文件\n\n```\n#import \"CCNode.h\"\
    \n\n@class MainMenuButtons;\n\n@interface MainMenuLevelSelect : CCNode\n\n@property\
    \ (weak) MainMenuButtons* mainMenuButtons;\n\n@end\n```\n\n这些添加与`SettingsLayer`中的类似，使`MainMenuButtons`类能够将自身赋值给`MainMenuLevelSelect`类，以便它可以向后者发送消息。与在`SettingsLayer`中一样，你只需用它来关闭关卡选择弹出框。\n\
    \n*MainMenuLevelSelect.m* 目前不需要任何修改。\n\n另一方面，*MainMenuButtons.m* 需要多处添加。添加代码清单\
    \ 8-3 中高亮显示的代码。\n\n***代码清单 8-3*** MainMenuButtons.m 节选，包含新增的高亮代码\n\n```\n#import\
    \ \"MainMenuButtons.h\"\n#import \"SettingsLayer.h\"\n#import \"MainMenuLevelSelect.h\"\
    \n\n@implementation MainMenuButtons\n{\n    __weak MainMenuLevelSelect* _levelSelect;\n\
    }\n\n-(void) didLoadFromCCB\n{\n    _levelSelect = (MainMenuLevelSelect*)[self.parent\n\
    \                                          getChildByName:@\"levelSelect\"\n \
    \                                            recursively:YES];\n    _levelSelect.parent.visible\
    \ = NO;\n    _levelSelect.mainMenuButtons = self;\n}\n\n// ... 其余方法已省略\n```\n\n\
    这会导入新的`MainMenuLevelSelect`类头文件，以便为该类添加一个名为`_levelSelect`的实例变量。到目前为止，一切顺利。\n"
- fmt: '# 排班后的 Markdown 文档


    在`didLoadFromCCB`中，你通过名称获取对`MainMenuLevelSelect`实例的引用。之前你已经做过几次了。但等等，`MainMenuButtons`类与`Scroll
    View`或`Scroll View`的`Content`节点没有关系，这意味着它们不是`MainMenuButtons`类的子节点。如果你仔细查看`getChildByName:`方法，你会发现它实际上是发送给`MainMenuButtons`父节点的。由于`MainMenuButtons`是`MainScene`节点的子节点，因此`self.parent`是对`MainScene`实例的引用。`MainScene`包含`Scroll
    View`作为子节点，而`Scroll View`又包含`Content`节点作为子节点。因此，`MainMenuLevelSelect`实例可以通过其名称递归地找到。


    类似地，`_levelSelect.parent.visible = NO`会隐藏`CCScrollView`，因为它是`MainMenuLevelSelect`实例的父节点。隐藏`CCScrollView`实例而不是`MainMenuLevelSelect`实例很重要，因为这将禁用`CCScrollView`的所有触摸事件。如果你只让`_levelSelect`不可见，视觉上效果相同，但用户可能在不经意间仍然可以滑动各个页面。由于`CCScrollView`始终保持不可见，你可以选择在`MainScene.ccb`中选中`Scroll
    View`节点，并取消勾选其`Visible`属性以隐藏它。


    最后，`_levelSelect`被分配了对`MainMenuButtons`实例的引用，以便当用户关闭`MainMenuLevelSelect`弹出框时，它可以向`MainMenuButtons`实例发送`show`消息。


    剩下的工作是更新`shouldPlayGame`方法，使其与[清单 8-4](#part0018.html#list4)中的版本一致。


    [***Listing 8-4***](#part0018.html#_list4). 显示关卡选择弹出框


    ```

    -(void) shouldPlayGame

    {

        _levelSelect.parent.visible = YES;

        self.visible = NO;

    }

    ```


    这使得`CCScrollView`可见，并隐藏了`MainMenuButtons`实例。


    请注意，与`SettingsLayer`不同，`CCScrollView`实例在应该显示时不会从场景中移除并重新加载；相反，你只需切换其可见状态的开关。如果你需要频繁访问某个给定节点（或节点分支），与加载`CCB`甚至以编程方式创建新的节点实例相比，更改可见状态要高效得多。当然，更改可见状态不会释放内存。但是，同样，如果你需要频繁使用某个节点，你必须拥有足够的空闲内存以便随时显示它，因此此类节点也可以一直保留在内存中。


    此外，在加载或创建节点的过程中，通常需要额外的内存。具体来说，加载纹理时，通常在一两帧内，内存使用量会翻倍，然后立即回落到纹理实际使用的量。当你的应用非常接近收到内存警告时，最好不要移除你将要频繁使用的节点。


    话虽如此，将`CCScrollView`及其`Content`节点始终保留在场景中的真正原因是出于实用性考虑。你需要创建一个额外的`CCB`文件，其中仅包含`Scroll
    View`节点，以便能够通过`CCBReader`加载`Scroll View`及其`Content`节点。目前，只有`MainMenuLevelSelect.ccb`（`Scroll
    View`的`Content`节点）是一个单独的`CCB`实例，而`Scroll View`节点是直接添加到`MainScene.ccb`中的。因此，你只能通过`CCBReader`加载`MainMenuLevelSelect.ccb`的`Content`节点。


    如果你要将`CCScrollView`从其父节点中移除，你就必须以编程方式创建另一个`CCScrollView`实例，并用通过`CCBReader`加载的`Content`节点对其进行初始化，或者将其赋值给`Scroll
    View`的`contentNode`属性——但只能是在第二次及之后的每次，这会使代码进一步复杂化。


    **提示** 始终考虑“保持简单愚蠢”（KISS）原则（不要与同名的乐队混淆）。参见 [http://en.wikipedia.org/wiki/KISS_principle](http://en.wikipedia.org/wiki/KISS_principle)。该原则可以这样理解：*如果可以用更少的代码实现相同的行为，请选择编写更少的代码*。更少的代码缺陷更少，也更容易理解、修改和重用。特别要注意重复的代码，或者除了少数参数外本质上做相同事情的代码。这类代码应该被提取到自己的方法中。


    这种设置足以在 Xcode 中试用`Scroll View`。发布、构建并运行。你现在可以左右滑动三张背景图像，每个页面会吸附到由`Scroll View`定义的区域。还要注意，你仍然可以点击`Scroll
    View`下方的按钮。你还可以测试`Scroll View`接受触摸和拖动移动的边界，以及它不接受的地方。


    ---


    ## 设计滚动视图内容节点


    目前你还不能真正点击一个关卡来玩，也不能关闭`Scroll View`弹出框。为了实现这一点，让我们最终确定关卡选择页面的设计，使每个页面代表一个特定的世界。


    **注意** 在以下描述中，我将使用`#`字符作为数字`1`、`2`和`3`的占位符，用于指代整个`W#_something`图像组。


    首先为每个页面添加一个关闭按钮。打开`MainMenuLevelSelect.ccb`。然后将一个`CloseButton.ccb`拖放到每个`W#_bg`精灵上。可以通过使用底部选中了正确`UserInterface`文件夹的`Tileless
    Editor View`，或者从`File View`中拖动`CloseButton.ccb`来完成。最好将每个按钮直接放到`W#_bg`精灵上，这样它就成为页面背景图像的子节点。


    选择每个`CloseButton`，在`Item Properties`选项卡中将其`Position`类型更改为`%`，并将值设置为`100`。这就是按钮所需的全部设置。


    现在为每个世界添加标志和标题。在`Tileless Editor View`上，确保另一个`UserInterface`文件夹已被选中——即包含所有`W#`图像的`UserInterface`精灵表所在的文件夹。你可以在[图
    8-4](#part0018.html#Fig4) 中看到一个片段。


    ![9781484202630_Fig08-04.jpg](images/00111.jpeg)


    [Figure 8-4](#part0018.html#_Fig4). 用于滚动视图页面的各种`W#`图像的 UserInterface 精灵表


    将`W1_logo`拖到`W1_bg`精灵上。然后将`W1_title`拖到`W1_logo`精灵上。`W1_title`应该是`W1_logo`的子节点，而`W1_logo`应该是`W1_bg`的子节点。然后对`W2`和`W3`的标题和标志图像重复此步骤，并确保将它们添加到对应的`W2`和`W3`背景精灵中。请参见[图
    8-5](#part0018.html#Fig5) 作为参考。


    ![9781484202630_Fig08-05.jpg](images/00112.jpeg)


    [Figure 8-5](#part0018.html#_Fig5). 已添加标志和标题


    依次选择每个标志和标题图像以更改它们的位置。标志位置类型应为`%`，值应为`50x85`，而标题位置类型也应为百分比，值设置为`50x0`。这将使图像整齐地居中对齐在每个页面的顶部。


    对于每个世界的三个关卡按钮，最好使用`Box Layout`节点来水平对齐它们。从`Node Library View`中拖一个`Box Layout`到每个`W#_bg`精灵上，然后将`Box
    Layout`节点的位置类型更改为`%`，值设置为`50x35`。同时，将锚点更改为`0.5x0.5`，以便子节点以`Box Layout`节点的位置为中心，并将`Spacing`设置为`30`，以保持关卡按钮之间固定的距离。'
  raw: 'In didLoadFromCCB, you obtain the reference to the MainMenuLevelSelect instance
    by its name. You’ve done that a couple times before. But wait, the MainMenuButtons
    class has no relation to the *Scroll View* or the *Scroll View*’s *Content* node,
    meaning they aren’t children of the MainMenuButtons class. If you take a closer
    look at the getChildByName: method, you’ll notice it is actually sent to the MainMenuButtons
    parent node. Since MainMenuButtons is a child of the MainScene node, self.parent
    is a reference to the MainScene instance. The MainScene contains the *Scroll View*
    as a child, and the *Scroll View* contains the *Content* node as a child. Therefore,
    the MainMenuLevelSelect instance can be found by its name recursively.


    In the same light, _levelSelect.parent.visible = NO hides the CCScrollView because
    it is the parent of the MainMenuLevelSelect instance. It is important to hide
    the CCScrollView instance rather than the MainMenuLevelSelect instance because
    this will disable all touch events for the CCScrollView. If you only made _levelSelect
    invisible, it has the same effect visually, but the user could still swipe through
    the various pages unknowingly. Since the CCScrollView is always made invisible,
    you can optionally select the *Scroll View* node in *MainScene.ccb* and uncheck
    its *Visible* property to hide it.


    Last, the _levelSelect is assigned a reference to the MainMenuButtons instance
    so that it can later send the show message to the MainMenuButtons instance when
    the user closes the MainMenuLevelSelect popover.


    What remains is to update the shouldPlayGame method to the version in [Listing
    8-4](#part0018.html#list4).


    [***Listing 8-4***](#part0018.html#_list4). Showing the level-selection popover


    ```

    -(void) shouldPlayGame

    {

        _levelSelect.parent.visible = YES;

        self.visible = NO;

    }

    ```


    This makes the CCScrollView visible and hides the MainMenuButtons instance.


    Notice that, unlike with the SettingsLayer, the CCScrollView instance is not removed
    from the scene and reloaded when it should be shown; rather, you simply change
    its visible state on and off. Changing visible state is a lot more efficient if
    you need a given node (or branch of nodes) frequently compared to loading a CCB
    or even just creating new node instances programmatically. Of course, changing
    visible states will not free memory. But, again, if you need a node frequently,
    you have to have enough spare memory to be able to show it at any time, so such
    nodes also can stay in memory the whole time.


    Furthermore, it often requires additional memory to create or load a node during
    the process of loading or creating it. Specifically, when loading textures it
    is common that, for just a frame or two, the memory usage increases twofold and
    immediately drops back down to what the texture really uses. When your app is
    getting very close to receiving memory warnings, it is better to not remove nodes
    that you are going to need frequently.


    That said, the real reason to keep the CCScrollView and its *Content* node in
    the scene for the entire time is a pragmatic one. You would have to create an
    additional CCB file that contains just the *Scroll View* node in order to be able
    to load the *Scroll View* and its *Content* node with CCBReader. At the moment,
    only the *MainMenuLevelSelect.ccb* (the *Scroll View*’s *Content* node) is a separate
    CCB instance while the *Scroll View* node was added directly to *MainScene.ccb*.
    So you would be able to load only the *MainMenuLevelSelect.ccb Content* node with
    CCBReader.


    If you were to remove the CCScrollView from its parent node, you would have to
    create another instance of the CCScrollView programmatically, initializing it
    with a *Content* node loaded with CCBReader or assigning it to the *Scroll View*’s
    contentNode property—but only the second time and every time after that, further
    complicating the code.


    **Tip**  Always consider the “Keep it simple stupid,” or KISS, principle (not
    to be mistaken for the band of the same name). See [http://en.wikipedia.org/wiki/KISS_principle](http://en.wikipedia.org/wiki/KISS_principle).
    The principle translates to this: *If you can create the same behavior with less
    code, choose to write less code*. Less code has fewer bugs and is easier to understand,
    change, and reuse. Watch out specifically for duplicated code or code that does
    essentially the same thing except for a few parameters. This is code that ought
    to be extracted into its own method.


    This setup suffices to try out the *Scroll View* in Xcode. Publish, build, and
    run. You can now swipe the three background images left and right, and each page
    will snap to the area defined by the *Scroll View*. Notice also how you can still
    tap the buttons underneath the *Scroll View*. You can also test the boundaries
    where the *Scroll View* still accepts touch and drag movements and where it doesn’t.


    Designing the Scroll View Content Node


    What you can’t do at this point is actually tap a level to play it, nor can you
    close the *Scroll View* popover. To be able to do that, let’s finalize the design
    of the level-selection pages so that each page represents a given world.


    **Note**  I’ll use the # character as a placeholder for the digits 1, 2, and 3
    whenever I want to refer to the entire group of *W#_something* images in the following
    descriptions.


    Start by adding a close button to each page. Open *MainMenuLevelSelect.ccb*. Then
    drag and drop one *CloseButton.ccb* onto each *W#_bg* sprite. Do so by using either
    the *Tileless Editor View* with the correct *UserInterface* folder at the bottom
    checked, or by dragging the *CloseButton.ccb* from the *File View*. It’s best
    to drop each button directly onto a *W#_bg* sprite so that it becomes a child
    of the page background image.


    Select each *CloseButton*, and change its *Position* types to % and its values
    to 100 on the *Item Properties* tab. That’s all that the buttons need.


    Now add the logo and title for each world. On the *Tileless Editor View*, make
    sure the other *UserInterface* folder is checked—the one that refers to the *UserInterface*
    Sprite Sheet containing all the *W#* images. You can see an excerpt in [Figure
    8-4](#part0018.html#Fig4).


    ![9781484202630_Fig08-04.jpg](images/00111.jpeg)


    [Figure 8-4](#part0018.html#_Fig4). The UserInterface Sprite Sheet with the various
    W# images used for the Scroll View pages


    Drag the *W1_logo* onto the *W1_bg* sprite. Then drag the *W1_title* onto the
    *W1_logo* sprite. *W1_title* should be a child of *W1_logo*, and *W1_logo* should
    be a child of *W1_bg*. Then repeat this step for the *W2* and *W3* title and logo
    images, and be sure to add them to their corresponding *W2* and *W3* background
    sprites. See [Figure 8-5](#part0018.html#Fig5) for reference.


    ![9781484202630_Fig08-05.jpg](images/00112.jpeg)


    [Figure 8-5](#part0018.html#_Fig5). Logo and title have been added


