  trans: '

    # Cocos2D 音频框架


    `Cocos2D` 包含 `ObjectAL` 音频框架，用于播放音效和音乐。`ObjectAL` 是一个基于底层 `OpenAL` API 构建的框架，最适合播放短音效（`.wav`、`.caf`、`.aiff`），同时也使用了苹果的
    `AVAudioPlayer`，后者最适合解码和流式播放长时间音频（mp3、m4a、mp4、ac3）。其架构如图 11-1 所示。


    ![9781484202630_Fig11-01.jpg](img/00162.jpeg)


    图 11-1。`ObjectAL` 的架构封装了 `OpenAL` 和 `AVAudioPlayer` 两个框架。


    `OALSimpleAudio` 单例为所有基本音频需求提供了简单易用的编程接口。它通常区分两种音频类型：*音效*（短小、内存缓冲的音效）和 *背景音乐*（长时间播放的音频，如音乐和语音）。音效指令将通过
    `OpenAL` 播放音频，而背景音乐指令则由 `AVAudioPlayer` 播放。


    理解两种音频文件及相应格式的区别至关重要。表 11-1 总结了关键细节。


    表 11-1。通过 `OpenAL` 播放的短音效与通过 `AVAudioPlayer` 播放的长音频之间的区别


    | | 短音效/OpenAL | 长音频/AVAudioPlayer |

    | --- | --- | --- |

    | **播放延迟** | 无延迟或小延迟，取决于文件大小和格式 | 若未预加载则有小延迟 |

    | **磁盘格式** | 任何软件可解码的格式 | 任何软件可解码的格式，若使用硬件则支持任何硬件格式 |

    | **解码** | 加载时进行 | 播放时进行 |

    | **内存使用** | 整个文件加载并解压缩到内存中 | 文件实时流式传输（内存使用率极低） |

    | **同时播放** | 32 个并发音效 | 仅受 CPU 限制 |

    | **播放性能** | 良好 | 1 个音轨时极佳（硬件解码）。2 个或少量音轨时仍然良好，但更多音轨会显著增加 CPU 负担。 |

    | **循环播放** | 支持（开/关） | 支持（指定循环次数、无限循环或关闭） |

    | **声像调整** | 支持（仅单声道文件） | 支持 |

    | **定位音频** | 支持（仅单声道文件） | 不支持 |

    | **调整音高** | 支持 | 不支持 |

    | **音频功率测量** | 不支持 | 支持 |

    | **推荐格式** | 采样率 44 或 22 kHz，每样本 16 位。未压缩 PCM。推荐单声道。容器格式：`.caf`、`.aiff` 或 `.wav`。时长：零点几秒到几秒。
    | MP3 或 AAC 编码，可变或固定比特率，范围 80 kbps 至 192 kbps。单声道或立体声。容器格式：mp3、m4a、mp4。时长：几秒到几分钟。
    |


    **注意** 并非所有音频格式都受移动设备支持。例如，OGG 和 FLAC 文件无法在 iOS 上播放。最好坚持使用最常见的格式：音效使用 `.caf` 和
    `.wav`，长音频使用 mp3 或 m4a。如果你的音频文件是其他格式，请使用像 `SoundConverter` 这样的音频转换器或像 `Audacity`
    这样的音频编辑器来转换文件。此外，如果你的音频文件格式正确但无法播放，可能是由于某个音频程序创建或修改时写入了非标准扩展名，或添加了会干扰 `OpenAL`
    或 `AVAudioPlayer` 的元数据。在这种情况下，请在 `Audacity` 中打开该音频文件，重新导出为相同格式，然后重试。


    本章稍后将详细介绍 `OALSimpleAudio` 的编程接口。可以说，`ObjectAL` 能够满足你所有的音频需求。如果你需要 `OALSimpleAudio`
    未提供的更多功能，但不知从何入手（显然，除了文档和 `ObjectAL` 示例之外），我建议你看看 `OALSimpleAudio` 类如何使用 `ObjectAL`、`OALAudioTrack`
    和 `OALAudioSession` 类。


    你可以在 `ObjectAL` 的主页 [`kstenerud.github.io/ObjectAL-for-iPhone`](http://kstenerud.github.io/ObjectAL-for-iPhone)
    上深入了解 `ObjectAL`，那里有文档、类参考以及包含更多演示项目的下载存档。


    # 在 SpriteBuilder 中使用音频文件


    虽然你可以绕过 `SpriteBuilder`，直接将音频文件添加到 Xcode 项目中，但建议你让 `SpriteBuilder` 管理所有音频文件，无论它们是否会在时间线中使用。


    ## 将音频导入 SpriteBuilder


    如果你使用 `SpriteBuilder` 来管理音频文件，则无需过多担心音频格式的细节。最好使用未压缩的音频文件，如 WAV 文件。


    本书的可下载存档中有一个包含音频文件的 `Audio` 文件夹。如果你想使用自己的音频文件，可以用其他音频文件代替，但它们应该是 `.wav` 或 `.caf`
    格式。如果你正在寻找免费的音效和音乐，可以访问 [`opengameart.org`](http://opengameart.org)，但请记住，“免费下载”并不一定意味着“可在商业应用中免费使用”。请务必检查
    `OpenGameArt` 资源的许可证，以确认是否允许在商业应用中使用。（商业应用类别包括展示商业广告的免费应用。）


    我假设你已经找到或创建了一个 `Audio` 文件夹，其中包含两个音乐文件，分别命名为 `game-music.wav` 和 `menu-music.wav`，以及名为
    `menu-sfx.wav`、`splat1.wav`、`splat2.wav` 和 `splat3.wav` 的短音效文件。你应该将 `Audio` 文件夹拖放到
    SpriteBuilder 的 `文件视图` 中，以便 `Audio` 文件夹出现在 `文件视图` 中。如果你在 `Audio` 文件夹中选择一个 `.wav`
    文件，将看到一个包含设置的预览图像，如图 11-2 所示。


    ![9781484202630_Fig11-02.jpg](img/00163.jpeg)


    图 11-2。音频文件预览和设置


    你可以在 `SpriteBuilder` 中使用 *播放* 按钮播放音频。下方可以看到以秒为单位的时长，以及音频文件是单声道还是立体声的指示。再往下是发布设置，你可以在其中选择用于短音效的
    CAF 格式（未压缩）和用于长音频的 MP4 格式（压缩）。MP4 格式还允许你更改质量设置。质量设置越低，生成的文件越小。默认的音频质量设置可以在 *文件
    ![image](img/00008.jpeg) 项目设置* 对话框中编辑。


    `SpriteBuilder` 会自动将时长小于 15 秒的导入音频文件视为音效，并因此选择相应的 CAF 格式。否则，会预选 MP4 格式。另请注意，在撰写本文时，只有扩展名为
    `.caf` 和 `.wav` 的音频文件才能被导入。如果你已经有 `.mp3` 或 `.m4a` 格式的文件，你可以将它们直接添加到 Xcode，或者更推荐的做法是，将它们转换为
    `.wav` 或 `.caf` 格式，以便通过 `SpriteBuilder` 管理它们。


    ## 通过时间线播放音效


    在 `SpriteBuilder` 中，你可以向任何时间线添加音效关键帧。当你需要将音频播放与其他时间线动画（例如某个对象的出现，或匹配移动对象开始减速的瞬间）同步时，这非常有用。时间线中的音效将通过
    `OALSimpleAudio` 的音效通道播放，因此无论文件格式如何，都会使用 `OpenAL` 进行播放。


    **注意** 如果拥有时间线 `CCBAnimationManager` 的节点被释放，那么通过该时间线播放的任何音效都将被中断（停止）或根本无法播放。这通常会影响那些时长超过时间线的音频文件，而该时间线的结尾会导致节点从场景中移除——例如，通过
    *回调* 关键帧。

