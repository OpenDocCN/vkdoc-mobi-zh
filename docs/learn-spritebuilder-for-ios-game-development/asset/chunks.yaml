  trans: '

    您可能还需要移除两个绳索元素，然后将各个子图形及其关节分开，从而减少绳索段之间的重叠。


    ## 向关卡中添加绳索与链条


    现在，您可以将一个或多个`Rope.ccb`实例放置到`Level1.ccb`（或任何其他关卡的 CCB 文件中）。


    此外，您还应该从*节点库视图*中拖拽一个纯节点到关卡的`CCPhysicsNode`上，并在时间线中将其重命名为 `chains`、`ropes` 和 `springs`。然后将所有链条、绳索以及（后续的）弹簧添加到此容器节点中。这样做主要是为了确保这些对象的正确绘制顺序：它们应绘制在边框之后，齿轮和锯片之前。（请参见图
    9-11。）


    ![9781484202630_Fig09-11.jpg](img/00128.jpeg)


    图 9-11。`Level1.ccb` 时间线中链条、绳索和弹簧的绘制顺序


    您绝对应该尝试旋转链条和绳索实例，使其在重力作用下开始摆动。目前请尽量避免将链条和绳索放置在触发区域内或大部分位于边框内。这样放置会导致错误的碰撞行为，您将在下一节中了解如何修复。


    在 SpriteBuilder 中，放置好的链条和绳索看起来会相当僵硬，如图 9-12 所示。


    ![9781484202630_Fig09-12.jpg](img/00129.jpeg)


    图 9-12。放置在关卡中的链条和绳索


    游戏中的实际效果将是生动呈现动画效果的链条和绳索，如图 9-13 所示。


    ![9781484202630_Fig09-13.jpg](img/00130.jpeg)


    图 9-13。运动中的链条和绳索，弯曲并柔韧地摆动


    **注意**   如果绳索不能过度弯曲，使用子图形设计的视觉表现效果最佳。如果您需要一根极具弹性和柔韧性的绳索，可能需要借助 Cocos2d 的 `CCRenderer`
    来绘制绳索。每个节点类都可以重写 `–(void)draw:(CCRenderer *)renderer transform:(const GLKMatrix4
    *)transform` 方法以执行自定义绘制。下一章中会提供一个示例。


    ## 修复链条和绳索的碰撞问题


    当链条或绳索部分卡在碰撞体内或发生重叠时，它们可能会严重变形，如图 9-14 所示。这可能导致整个链条或球体抖动、分离，甚至飞出屏幕。如果玩家角色触碰到这种不稳定的链条或绳索，可能会瞬间被加速到极高的速度。


    ![9781484202630_Fig09-14.jpg](img/00131.jpeg)


    图 9-14。复杂物理对象“爆炸”的效果。物理调试绘制高亮了链条与绳索段之间的大距离


    图 9-14 展示了当变形的链条和球体放置得相互重叠时，可能瞬间发生的情况。启用 `GameScene.ccb` 上的 `drawPhysicsShapes`
    自定义属性，可以高亮显示物理对象和关节。这种效果通常被称为物理对象“爆炸”。


    ## 最小化物理体“爆炸”的风险


    您必须始终留意但永远无法完全防止的最常见原因，是两个复杂物理体以某种方式卡在对方内部。两个对象各自的约束会疯狂地尝试解决约束，向对方体施力，而对方体又通过其自身的约束进行反击。


    这个过程可能发生得如此之快，以至于前一秒看起来一切正常，下一秒对象就完全失控，甚至消失不见。


    这种效果并非总是如此极端，但确实可能发生。调整每个关节的 `最大力` 设置，有助于降低复杂交互物理对象完全毁灭的概率。即使对所有约束施加了最大力，链条和绳索仍可能相互卡住、扭动和对抗，但它们的关节连接大体上会保持完整。

    '
- fmt: '当然，您当然应该从一开始就避免将链条和绳索放置在相互重叠的位置。


    导致复杂物理对象爆炸的另一个原因是，该对象部分或完全卡在静态物体的碰撞形状中。在这种情况下，最可能的罪魁祸首是边界元素，链条和绳索段当前会与它们发生碰撞。如果您在关卡中放置链条或绳索，使其部分重叠边界精灵甚至触发区域，您会注意到链条或绳索行为异常。


    您需要编辑受影响物体的碰撞类别和遮罩来解决此问题，并允许链条和球体即使在部分放置在边界内时也能自由摆动。


    ### 定义碰撞类别


    在开始定义碰撞类别之前，花点时间考虑引入碰撞类别的目标会很有帮助。在这种情况下，主要目标是防止链条和绳索与触发器和边界发生碰撞。它们仍然应该能够与其他链条和绳索以及玩家发生碰撞。


    其余情况取决于具体需求——链条和绳索可能需要也可能不需要与齿轮和锯子发生碰撞。我假设您希望它们与链条和绳索发生碰撞。由于齿轮和锯子是静态物体，它们无论如何都不会与其他静态物体发生碰撞——这包括边界和触发器。因此，目前不需要将齿轮和锯子归入特定的类别。


    当然，玩家必须与所有物体发生碰撞，包括链条、绳索、触发器和边界。显然，玩家需要被包含在碰撞类别和遮罩的编辑中。


    由于链条和绳索在碰撞方面应表现相同，因此使用单个碰撞类别“`obstacle`”（障碍物）来代表两者是合理的。这个`obstacle`碰撞类别也应适用于未来具有完全相同碰撞行为的物体，即与除边界和触发器之外的所有物体发生碰撞。


    **提示** 在创建类别时，重要的是只考虑期望的行为，而不是对象的类型。否则，您很快就会创建过多的类别，这将使编辑碰撞行为更加耗时，甚至可能用尽类别。请记住，您最多只能创建32个独特的类别。请参阅[第4章](#part0013.html)中关于碰撞类别和遮罩的段落。


    这个思想实验有助于隔离需要编辑其类别和遮罩的碰撞参与者：`player`（玩家）、`trigger`（触发器）、`border`（边界）和`obstacle`（障碍物）。稍后您还会将弹簧加入其中。


    巧合的是，您将按如下方式命名相应的碰撞类别：`player`、`trigger`、`border`和`obstacle`。所需的碰撞类别和遮罩在[表9-1](#part0019.html#Tab1)中概述。


    [表9-1](#part0019.html#_Tab1). 防止链条和绳索与触发器和边界碰撞，同时保留现有碰撞行为所需的碰撞类别和遮罩


    ![Table9-1.jpg](images/00132.jpeg)


    ### 编辑碰撞类别和遮罩


    让我们从玩家开始编辑过程。打开`Player.ccb`，并选择根节点（`CCSprite`）。在“Item Physics”选项卡上，在“Categories”字段中输入`player`，并在“Masks”字段中输入以下内容：`trigger,
    border, obstacle`。


    为了创建多个独立的类别和遮罩标签，您必须用逗号将它们分隔开。如果您使用任何其他字符（例如空格）分隔标签，您将得到一个组合的单个标签。您不希望像[图9-15](#part0019.html#Fig15)左侧那样出现一个单一的“`trigger
    border obstacle`”标签；您想要像[图9-15](#part0019.html#Fig15)右侧那样三个独立的标签。


    ![9781484202630_Fig09-15.jpg](images/00133.jpeg)


    [图9-15](#part0019.html#_Fig15). 您输入到“Categories”和“Masks”字段中的标签必须用逗号分隔才能创建单个标签（如右侧所示）


    现在，玩家已设置为与`trigger`、`border`和`obstacle`发生碰撞。


    现在打开`TriggerOnce.ccb`，并对您可能创建的任何其他触发器（例如`TriggerForever.ccb`）重复此过程。选择`CCNodeColor`节点以编辑其“Item
    Physics”属性。


    在“Categories”字段中输入**`trigger`**，在“Masks”字段中输入**`player`**。这可确保玩家能够与触发器发生碰撞，因为玩家的碰撞掩码中已经有`trigger`，而触发器现在的碰撞掩码中也有`player`。只有当两个参与者都在其“Masks”字段中拥有对方的类别，或者至少一个参与者的“Masks”字段为空时，才会发生碰撞。


    边界的编辑方式相同，只是您会在`Prefabs/Borders`下找到多个边界CCB文件，从`Border1.ccb`开始。您需要打开每个边界CCB文件，在其根节点的“Categories”字段中输入`border`，并在其“Masks”字段中输入`player`。这确保了所有边界精灵对玩家来说仍然是不可穿透的碰撞体。


    最后，这是最繁琐的部分，您需要编辑`Chain.ccb`和`Rope.ccb`中的每个启用了物理属性的节点，以更新它们的类别和遮罩。在每个启用了物理属性的节点的“Categories”字段中输入**`obstacle`**，并在其“Masks”字段中输入**`player,
    obstacle`**，以使链条或绳索与玩家以及其他链条和绳索都能发生碰撞。再次注意，必须用逗号分隔各项以创建单独的标签，如您在[图9-15](#part0019.html#Fig15)右侧所见。


    **提示** 您可能想先输入一次“Masks”文本，确保其正确，然后通过单击字段并按`Cmd+A`或使用文本选择来选择标签。要使用文本选择，请将鼠标从文本的一端拖到另一端。当选中时，标签会以深蓝色显示。然后您可以按`Cmd+C`复制，按`Cmd+V`将标签粘贴到另一个节点的“Masks”字段中。这样，您可以降低创建拼写错误的风险。


    如果您忘记编辑某个链条或绳索元素的类别或遮罩，该元素可能仍会与玩家发生碰撞。为确保正确性，请在编辑完成后验证类别和遮罩。


    选择时间线中的第一个节点；这很可能是静态的`hook`节点。查看其“Item Physics”选项卡，并确认“Categories”和“Masks”是正确的。现在按下向下箭头键选择时间线中的下一个节点。通过重复按向下箭头键，您可以快速验证一系列节点的碰撞和其他设置。这绝对比用鼠标点击每个节点要好。


