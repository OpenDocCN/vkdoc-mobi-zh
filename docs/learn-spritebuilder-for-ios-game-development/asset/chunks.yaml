- fmt: '作为最容易建模为软体的形状，圆形无疑是首选，因为圆周上任意两个相对的主体都可以通过关节连接，而更多的关节将圆周主体连接在一起，从而保持圆形的形状。关节连接自然会相互平衡。


    除非希望该主体具有较大的可变形性，否则最好有一个中心主体，通过距离关节与圆周主体相连，以防止形状向内折叠。此外，许多（如果不是全部）相连的主体需要相互碰撞，以正确分布力，并进一步降低主体向内折叠的风险。[图
    10-1](#part0020.html#Fig1) 展示了本章将要创建的软体玩家对象的最终设置。


    ### 配置软体玩家


    你将分步创建这个主体，以便观察每一步添加的效果。希望这能让你很好地理解关节连接如何相互作用，并最终形成一个柔软且有弹性的主体。


    #### 创建新的玩家 CCB


    让我们从基础开始。在 SpriteBuilder 中右键单击 `Prefabs` 文件夹，添加一个新文件。将文档命名为 `PlayerSoftBody.ccb`，并在创建前将其类型更改为
    `Sprite`。


    在新建的 `PlayerSoftBody.ccb` 中，选择根节点，然后在`Item Properties`选项卡中将 Sprite 帧更改为 `SpriteSheets/Global/player.png`。然后切换到`Item
    Code Connections`选项卡，并在根节点的自定义类中输入 `SoftBodyDrawNode`。


    对于此步骤及后续步骤，最好启用物理调试绘制。这将非常具有教育意义，因为你可以观察软体中原本不可见部分（包括圆周主体和关节连接）的行为。打开 `GameScene.ccb`，并选择其根节点。在`Item
    Properties`选项卡中，你将找到熟悉的 `drawPhysicsShapes` 设置。将其值设置为 `1` 以启用物理调试绘制。


    现在打开 `Level1.ccb`，并对你想要使用新软体玩家的任何其他关卡 CCB 文件重复以下步骤：


    1.  在关卡中找到玩家对象并选择它。如果在舞台上选择困难，请使用时间轴。在玩家的`Item Properties`选项卡上，将`CCB File`属性从
    `Prefabs/Player.ccb` 更改为 `Prefabs/PlayerSoftBody.ccb`。此关卡将使用新的软体玩家。

    2.  在 Xcode 中，右键单击`Source`组并选择`New File`。再创建一个 Objective-C 类，并将其命名为 `SoftBodyDrawNode`。确保将子类设置为
    `CCSprite`，因为 `SoftBodyPlayer.ccb` 是类型为 `Sprite` 的 CCB 文件。现在，让该类保持为空——目前你只需要此类来避免在测试应用时出现
    `CCBReader` 错误。


    你可以通过发布和运行应用来测试它。如果指定关卡中的玩家看起来冻结在原地，则说明你已经成功替换了它。目前玩家不会移动，因为它尚未启用物理效果。


    #### 添加中心和圆周主体


    可以说，这个新玩家需要一个柔软的外壳。与其使用一个大的圆形形状，不如使用几个较小的圆形主体来逼近圆形形状。我称之为*圆周主体*。对于这个玩家的大小，总共需要八个圆周主体，再加上一个中心主体。


    中心主体很容易。从`Node Library View`拖放一个节点到舞台上。将节点位置编辑为 `32x32`，使其居中于玩家图像上。然后切换到`Item
    Physics`选项卡，并勾选`Enable Physics`复选框。将形状类型更改为 `Circle`，并将`Corner radius`设置为 `10`。同时，取消勾选
    `Allows rotation`。


    **注意** 软体的各个主体不需要也不应该绕着自己的轴旋转。任何旋转都将来自施加于整个主体的合力，通过主体间的碰撞以及关节来传递。


    现在编辑回调和碰撞属性。`Collision`类型应设置为 `player`，同时在`Categories`字段中也输入 `player`。在`Masks`字段中，输入（不带引号）：“`trigger,
    border, obstacle, spring, player`”。请注意，现在 `player` 是遮罩的一部分，因为构成玩家新软体的各个主体也应该相互碰撞，这既是为了相互传递力，也是为了防止圆周主体被推入或越过中心主体。


    选中中心节点后，复制（`Cmd+C`）并粘贴（`Cmd+V`）该节点八次，这样你总共得到九个节点，每个节点都启用了物理效果，并且具有与初始节点相同的属性。你可能希望在时间轴中将第一个节点重命名为
    `center`，以便知道哪一个是中心节点。这一点至关重要，因为你将要编写的代码假定中心节点是根节点的第一个子节点。如果不是，你可以在时间轴中拖动节点以重新排序。


    你还应该重命名时间轴中的其他节点，以突出它们在圆周上的位置。以下描述假设第一个节点在右侧，并且节点按顺时针方向排列。因此，节点名称应为：`right`，`bottom-right`，`bottom`，`bottom-left`，`left`，`top-left`，`top`，`top-right`。请参阅[图
    10-2](#part0020.html#Fig2) 以查看 `SoftBodyPlayer.ccb` 的时间轴当前应如何显示。


    ![9781484202630_Fig10-02.jpg](images/00145.jpeg)


    [图 10-2](#part0020.html#_Fig2). 玩家的中心和圆周节点


    #### 查找圆周上的点


    现在第一个问题来了：将节点定位在圆周上。`right`、`left`、`top` 和 `bottom` 节点相当容易，但其他节点呢？近似值可能就足够了，但节点的位置应该等距分布；否则，主体将无法均匀滚动和旋转。特别是如果你想创建一个更大的主体，甚至可能需要超过八个主体来构成圆周。那么，你如何确定圆周上主体（或点）的位置呢？


    事实证明，这只需要对特定角度应用 `sin` 和 `cos`，然后乘以圆的半径，即可得到圆周上一点的 x、y 坐标。你将编写一个简单的方法，用于打印给定数量点均匀分布在圆周上的位置。


    在 Xcode 中打开 `SoftBodyDrawNode.m`。在 `@implementation` 和 `@end` 行之间添加[代码清单 10-1](#part0020.html#list1)
    中的代码。


    [***代码清单 10-1***](#part0020.html#_list1). *将圆周上点的位置打印到 Xcode 控制台*


    ```

    -(void) didLoadFromCCB

    {

        [self logPointsOnCircleWithRadius:30

                                   origin:CGPointMake(32, 32)

                                numPoints:8];

    }


    -(void) logPointsOnCircleWithRadius:(CGFloat)radius

                                 origin:(CGPoint)origin

                              numPoints:(int)numPoints

    {

        CGFloat deltaAngle = 360.0 / numPoints;

        CGFloat angle = 360.0;


    for (int i = 1; i <= numPoints; i++)

        {

            CGPoint pos = CGPointMake(

                            origin.x + radius * cos(CC_DEGREES_TO_RADIANS(angle)),

                            origin.y + radius * sin(CC_DEGREES_TO_RADIANS(angle)));

            NSLog(@"circumference point %i: {%.1f, %.1f} (angle: %.1f)”,

                  i, pos.x, pos.y, angle);


    angle -= deltaAngle;

        }

    }

    ```


    此示例中的 `deltaAngle` 将为 `45`，表示点需要分布在 45 度角上。`angle` 属性设置为 `360`，并将递减到 `0`。这将按顺时针顺序打印点。如果你想要逆时针顺序，只需将
    `angle` 变量从 `0` 向上计数即可。'
  raw: 'By far the easiest shape to model as a soft-body is the circle, since every
    two opposing bodies on the circle’s circumference can be connected with joints,
    while more joints connect the circumference bodies together to hold the shape
    in circle form. The joint connections naturally balance each other out.


    Unless the body is meant to be heavily deformable it helps to have a center body
    which connects to the circumference bodies with distance joints to prevent the
    shape from folding in on itself. And many, if not all of the connected bodies
    need to collide with one another to distribute the forces properly and again to
    reduce the risk of the body folding in on itself. [Figure 10-1](#part0020.html#Fig1)
    shows the finished setup of the soft-body player object you’re going to create
    in this chapter.


    Configuring the Soft-Body Player


    You’ll create this body in discrete steps so that you can see the effect each
    step adds. I hope this gives you a good feel of how the joint connections interact
    and ultimately create a soft and wobbly body.


    Creating the New Player CCB


    Let’s start with the basics. Right-click the *Prefabs* folder in SpriteBuilder
    to add a new file. Name the document ***PlayerSoftBody.ccb***, and change its
    type to *Sprite* before creating it.


    In the new *PlayerSoftBody.ccb*, select the root node, and on the *Item Properties*
    tab change the Sprite frame to *SpriteSheets/Global/player.png*. Then switch to
    the *Item Code Connections* tab and enter **SoftBodyDrawNode** as the custom class
    of the root node.


    For this and the following steps, it’s best to have physics debug drawing enabled.
    This will be very educational because you can observe the behavior of the otherwise
    invisible parts of the soft body—both circumference bodies and the joint connections.
    Open *GameScene.ccb*, and select its root node. On the *Item Properties* tab,
    you’ll find the familiar _drawPhysicsShapes setting. Set its value to 1 to enable
    physics debug drawing.


    Now open *Level1.ccb*, and repeat the following steps for any other Level CCB
    file you want to play with the new soft-body player:


    1.  Locate the player object in the level and select it. Use the Timeline in case
    selection on the stage proves difficult. On the player’s *Item Properties* tab,
    change the *CCB File* property from *Prefabs/Player.ccb* to *Prefabs/PlayerSoftBody.ccb*.
    This level will then use the new soft-body player.

    2.  In Xcode, right-click the *Source* group and select *New File*. Create yet
    another Objective-C class, and name it **SoftBodyDrawNode**. Be sure to set the
    subclass to CCSprite, since the *SoftBodyPlayer.ccb* is a CCB file of type *Sprite*.
    For now, leave the class empty as is—you only need the class right now to avoid
    CCBReader errors when testing the app.


    You can test it out by publishing and running the app. If the player in the specified
    level appears frozen in place, you’ve correctly replaced it. The player won’t
    move at the moment because it doesn’t have physics enabled.


    Adding Center and Circumference Bodies


    This new player needs a soft outer shell, so to speak. Instead of using one large
    circle shape, you now have to approximate the circular shape using several smaller
    bodies, also with a circle shape. I call these the *circumference bodies*. For
    the size of this player, a total of eight circumference bodies are needed, plus
    an additional body at the center.


    The center body is easy. Drag and drop a node from the *Node Library View* onto
    the stage. Edit the node’s position to 32x32 so that it is centered on the player
    image. Then switch to the *Item Physics* tab, and check the *Enable Physics* check
    box. Change the shape type to *Circle*, and set the *Corner radius* to *10*. Also,
    uncheck *Allows rotation*.


    **Note**  Individual bodies of the soft body needn’t and shouldn’t rotate around
    their own axis. Any rotation will come from the combined force applied to the
    body as a whole, distributed through body-to-body collisions and, of course, the
    joints.


    Now edit the callback and collision properties. The *Collision* type should be
    set to *player*, and likewise enter **player** in the *Categories* field, too.
    In the *Masks* field, enter (without quotes): “**trigger, border, obstacle, spring,
    player**”. Notice that player is now part of the mask because the individual bodies
    making up the player’s new soft body should also collide with each other, both
    to distribute force to one another as well as prevent circumference bodies from
    being pushed into or past the center body.


    With the center node selected, copy (Cmd+C) and paste (Cmd+V) the node eight times
    so that you get a total of nine nodes, each with physics enabled and the same
    properties as the initial node. You may want to rename the first node in the Timeline
    to **center** so that you know which one the center node is. This is crucial because
    the code you’re about to write assumes that the center node is the first of the
    root node’s children. If that isn’t the case, you can drag the node in the Timeline
    to reorder it.


    You should also rename the other nodes in the Timeline as well, to highlight their
    position on the circle. The following description assumes the first node is on
    the right and the nodes will be arranged in clockwise direction. Therefore, the
    node names ought to be: *right*, *bottom-right*, *bottom*, *bottom-left*, *left*,
    *top-left*, *top*, *top-right*. See [Figure 10-2](#part0020.html#Fig2) to see
    what the *SoftBodyPlayer.ccb*’s Timeline should look like now.


    ![9781484202630_Fig10-02.jpg](images/00145.jpeg)


    [Figure 10-2](#part0020.html#_Fig2). The player’s center and circumference nodes


    Finding Points on the Circumference of a Circle


    Now here’s the first problem: positioning the nodes on a circle. The right, left,
    top, and bottom nodes are fairly easy, but what about the other ones? An approximation
    may suffice, but the positions of the nodes should be equally spaced; otherwise,
    the body won’t roll and rotate evenly. Especially if you want to create a larger
    body, you may even need more than eight bodies to form the circumference. So how
    would you go about determining the position of bodies (or points) on a circle’s
    circumference?


    It turns out that it just involves applying sin and cos to a specific angle, multiplied
    by the circle’s radius to get the x,y coordinates of a point on the circle. You
    are going to write a simple method that prints out the position of a given number
    of points on a circle, distributed evenly.


    Open *SoftBodyDrawNode.m* in Xcode. Add the code in [Listing 10-1](#part0020.html#list1)
    between the @implementation and @end lines.


    [***Listing 10-1***](#part0020.html#_list1). *Printing positions of points on
    a circle to the* *Xcode console*


    ```

    -(void) didLoadFromCCB

    {

        [self logPointsOnCircleWithRadius:30

                                   origin:CGPointMake(32, 32)

                                numPoints:8];

    }


    -(void) logPointsOnCircleWithRadius:(CGFloat)radius

                                 origin:(CGPoint)origin

                              numPoints:(int)numPoints

    {

        CGFloat deltaAngle = 360.0 / numPoints;

        CGFloat angle = 360.0;


    for (int i = 1; i <= numPoints; i++)

        {

            CGPoint pos = CGPointMake(

                            origin.x + radius * cos(CC_DEGREES_TO_RADIANS(angle)),

                            origin.y + radius * sin(CC_DEGREES_TO_RADIANS(angle)));

            NSLog(@"circumference point %i: {%.1f, %.1f} (angle: %.1f)”,

                  i, pos.x, pos.y, angle);


    angle -= deltaAngle;

        }

    }

    ```


    The deltaAngle in this example will be 45, indicating that the points need to
    be distributed on 45-degree angles. The angle property is set to 360 and will
    be counted down to 0\. This will print the points in clockwise order. If you want
    counter-clockwise ordering, you simply count up the angle variable from 0.'
