    Implementing the Button Selector


    Now you know that the custom class is loaded by the reader. All that’s left to
    do is implement the button selector. Create the button method, and name it exactly
    as you entered it on the Code Connections Selector field for the button. Your
    GameScene implementation should now have this additional method:


    ```

    -(void) exitButtonPressed

    {

        NSLog(@"Get me outa here!");

    }

    ```


    **Tip**  You can optionally set up the selectors for Button, Text Field, and Slider
    nodes so that they receive the sending node as a parameter. To do so, you would
    simply append a colon to the selector name—for instance, exitButtonPressed would
    become exitButtonPressed: in the Selector field on the Code Connections tab for
    the node. Then update the method signature accordingly, for brevity, in a single
    line:


    -(void) exitButtonPressed:(CCControl*)sender {  NSLog(@"Sender: %@", sender);  }


    Instead of CCControl*, you can use the sending node’s specific class—for instance,
    CCButton*. CCControl is the super class which Button, Text Field, and Slider nodes
    inherit from and is guaranteed to work for all of them.


    Run the app, tap the button, and you’ll see a message like this in the Debug Console:


    ```

    2014-06-05 20:24:02-959 LearnSpriteBuilder[49437:60b] Get me outa here!

    ```


    Changing the Scene on Button Tap


    Would be even nicer if tapping the button actually did change to the menu scene,
    don’t you think? Connecting scenes is a task that you have to code, but it’s really
    straightforward and the same procedure for all scene transitions. See [Listing
    2-1](#part0011.html#list1).


    [***Listing 2-1***](#part0011.html#_list1). Changing the scene on button press


    ```

    -(void) exitButtonPressed

    {

        NSLog(@"Get me outa here!");


    CCScene* scene = [CCBReader loadAsScene:@"MainScene"];

        CCTransition* transition = [CCTransition transitionFadeWithDuration:1.5];

        [[CCDirector sharedDirector] presentScene:scene withTransition:transition];

    }

    ```


    **Caution**  You should not append the .ccb file extension when loading CCBs.
    It’s a common and understandable mistake, but CCBReader will fail to load files
    where you specify the .ccb extension. Published CCB files are converted to a binary
    format optimized for fast loading and compact storage. This binary file format
    carries the extension .ccbi—that’s .ccb with a trailing *i*. The plain text format
    .ccb files aren’t actually in the bundle. Therefore, it’s important to omit the
    file extension in calls to CCBReader. Or, perhaps to remind you of the differing
    extensions, you can also append the .ccbi extension.


    First, CCBReader is used to load a SpriteBuilder CCB file as the scene with the
    loadAsScene: method. The loadAsScene method is a convenience method. It returns
    a CCScene object with your CCB file’s root node as the only child. To better understand
    this, here’s the equivalent code to loadAsScene but implemented using the load:
    method:


    ```

    CCNode* ccbRootNode = [CCBReader load:@"MainScene"];

    CCScene* scene = [CCScene node];

    [scene addChild:ccbRootNode];

    ```


    Here scene is what the method returns. To access the MainScene’s root node, you
    would have to write


    ```

    CCNode* rootNode = scene.children.firstObject;

    ```


    Now that you have an instance of a CCScene, it can be presented with an optional
    transition:


    ```

    CCTransition* transition = [CCTransition transitionFadeWithDuration:1.5];

    [[CCDirector sharedDirector] presentScene:scene withTransition:transition];

    ```


    A transition is a way to animate the scene change. The fade transition fades one
    scene to black before fading the new scene in. You can also use cross-fade, fading
    to color and a variety of moving and pushing transitions.


    What are these transition methods’ exact names? This information is always at
    your fingertips with Xcode code completion suggestions—if you don’t get suggestions,
    check that the option is turned on under Xcode Preferences ![image](images/00008.jpeg)
    Text Editing ![image](images/00008.jpeg) Suggest completions while typing.


    Once you start typing parts of a class or method name, you should see a list of
    the available completion suggestions like in [Figure 2-12](#part0011.html#Fig12).
    If not, try pressing the ESC key at this point.


    ![9781484202630_Fig02-12.jpg](images/00020.jpeg)


    [Figure 2-12](#part0011.html#_Fig12). Taking advantage of Xcode auto-completion
    suggestions


    **Tip**  You can also find a list of transitions in the Cocos2d class reference:
    [http://www.cocos2d-swift.org/docs/api/Classes/CCTransition.html](http://www.cocos2d-swift.org/docs/api/Classes/CCTransition.html).
    Or type *CCTransition* anywhere in Xcode, and then right-click the text and select
    Jump to Definition. (Alternatively, put the cursor anywhere on the text and select
    Navigate ![image](images/00008.jpeg) Jump to Definition from the menu.) This will
    open the interface for CCTransition, where you’ll find, along with documentation,
    the names of methods and properties and other details of the class.


    Now that you know how to the start scene in AppDelegate and how to change scenes
    when tapping a button, run the app and try it if you haven’t done so yet—I’ll
    leave it as an exercise to change the starting scene back to the MainScene and
    to add another button on the MainScene. So that, when the button in the MainScene
    is tapped, it transitions to the GameScene. An example of this project state is
    provided with the book in the *01 - Change Scenes with Buttons* folder.


    Creating a Level Sub File Node


    Back to SpriteBuilder—specifically, the GameScene.ccb file. The game we’re building
    should support multiple levels. Because each level will have the same basic game
    play, it makes sense to reuse the GameScene.ccb for each level so that you don’t
    have to re-implement common features in each level separately. For instance, the
    HUD or heads-up display—a misnomer, but a commonly used term that refers to any
    nonscrolling content, like pause buttons and score labels in a scrolling world.


    This is where the Sub File node comes in handy. It allows you to create template
    CCB files that can be instantiated multiple times and edited in a single file.
    Consider the Sub File node being the equivalent of a class in Objective-C. The
    GameScene will have three Sub File nodes, one for the actual level contents, one
    for the HUD layer, and one for any popovers like the pause and “game over” menus.


    Since re-organizing resources at a later point is tedious and error prone, it’s
    important to start with a project structure that can grow with the project. For
    this exercise, start by adding a new folder named *Levels* to the project, where
    all the game’s level files will be added to. You can create a folder via the File
    ![image](images/00008.jpeg) New ![image](images/00008.jpeg) Folder menu or by
    right-clicking in the Resource Navigator view on the lower left half of the File
    View tab—that’s where the CCB files and other resources are listed.'
