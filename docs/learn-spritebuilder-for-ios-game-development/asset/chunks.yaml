  trans: '

    那么，祝你玩得开心，享受过程，并创造出一些精彩的游戏！


    ## 第二章：打下基础


    在本章中，你将学习使用 `SpriteBuilder` 的基础知识，包括其用户界面，以及使用 `Objective-C` 和 `Xcode` 在 `Cocos2d-Swift`
    中编写程序的初步步骤。你将学习如何在 `SpriteBuilder` 中创建最重要的元素，以及 `SpriteBuilder`、`Xcode` 和 `Cocos2D`
    之间是如何关联的。在本章结束时，你将拥有一个可继续扩展的骨架框架。


    我假设你已经从 Mac App Store 下载并安装了 `SpriteBuilder` 和 `Xcode`：


    *   `SpriteBuilder`：[`itunes.apple.com/app/spritebuilder/id784912885`](https://itunes.apple.com/app/spritebuilder/id784912885)

    *   `Xcode`：[`itunes.apple.com/app/xcode/id497799835`](https://itunes.apple.com/app/xcode/id497799835)


    ## 创建一个 SpriteBuilder 项目


    启动 `SpriteBuilder` 后，直接前往 文件 ![image](img/00008.jpeg) 新建 ![image](img/00008.jpeg)
    Cocos2D 项目 来开始一个新的空白项目。将其保存在你之后能找到的地方——例如，在“文稿”或“桌面”文件夹中——最好使用一个你之后能认出的名称。本书中的主要示例项目名为
    `LearnSpriteBuilder.spritebuilder`。


    如果你以前没有使用过 `SpriteBuilder`，你应该熟悉它的用户界面以及本书中用于描述 `SpriteBuilder` 特定区域和视图的术语。该用户界面分为四个主要区域，如图
    2-1 所示。


    ![9781484202630_Fig02-01.jpg](img/00009.jpeg)


    图 2-1。SpriteBuilder 用户界面


    1.  **资源导航器**（左侧）。这是一个标签栏视图，你可以在其中找到以下内容：从最左边的标签到最右边的标签：在*文件视图*（如图所示）中的项目文件，包含资源预览区域和预览下方的文件列表；在*无图块编辑器视图*中的资源视觉概览；在*节点库视图*中的可用节点列表；以及*警告视图*中的任何警告或错误（希望永远不会有）。

    2.  **舞台视图**（顶部中央）。舞台的内容（可以是场景、图层、节点、粒子发射器或精灵）在此显示。你可以在此视图中选择节点，并使用选择手柄来移动、调整大小或旋转所选节点。

    3.  **时间轴视图**（底部中央）。舞台中的节点和关节按层级顺序列在左侧，定义了节点的绘制顺序和父子关系。右侧是实际的时间轴，带有用于创建动画的关键帧编辑器（此处的*动画*指节点的属性随时间变化）。

    4.  **详情检查器**（右侧），也称为**详情视图**。这也是一个包含四个窗格的标签栏视图。从左到右分别是*项目属性*，你可以在其中找到选定项的可编辑设置和属性；*项目代码连接*，你可以在其中分配自定义类、变量和选择器；*项目物理*，你可以在其中启用物理并编辑物理体和形状属性；最后是*项目模板*标签，用于从选定节点及其属性创建命名模板，但目前仅用于粒子效果。


    这个新创建的项目实际上是一个功能完备、可运行的 `SpriteBuilder` 项目。你现在可以通过选择 文件 ![image](img/00008.jpeg)
    发布 或点击工具栏上相应的发布按钮来尝试运行。


    发布过程会复制、转换并缓存与 `SpriteBuilder` 项目关联的 Xcode 项目中的资源。


    ## SpriteBuilder 项目的 Xcode 项目


    每个 `<*项目名称*>.spritebuilder` 文件夹内都有一个 Xcode 项目，其对应名称为 `<*项目名称*>.xcodeproj`。参见图
    2-2 示例。最顶层带有黄色图标、名为 `LearnSpriteBuilder.spritebuilder` 的文件夹就是项目文件夹。其内部包含项目的 `LearnSpriteBuilder.xcodeproj`
    文件，而应用程序的源代码和发布的资源文件则在 `Source` 文件夹内。`SpriteBuilder Resources` 文件夹包含 `SpriteBuilder`
    在其文件视图中列出的资源和 `CCB` 文件。


    ![9781484202630_Fig02-02.jpg](img/00010.jpeg)


    图 2-2。在 Finder 中看到的 SpriteBuilder 项目结构


    **注意** `SpriteBuilder` 项目是扩展名为 `*.spritebuilder` 的文件夹。只有文件夹具有 `.spritebuilder`
    后缀时，`SpriteBuilder` 才能识别该项目。如果 `SpriteBuilder` 未运行，你可以使用 Finder 手动复制、移动或重命名 `SpriteBuilder`
    项目文件夹，前提是你保留 `.spritebuilder` 后缀。


    双击项目的 `.xcodeproj` 文件，或通过 Xcode 的 文件 ![image](img/00008.jpeg) 打开 命令打开它。Xcode 会显示一个类似于图
    2-3 所示的用户界面。


    ![9781484202630_Fig02-03.jpg](img/00011.jpeg)


    图 2-3。Xcode 用户界面


    Xcode 用户界面包含以下区域：


    1.  **工具栏**，带有方案和设备选择下拉菜单。使用方案下拉菜单更改应用程序应在哪个设备或模拟器上运行。

    2.  **导航器区域**，包含多个标签。默认的、最左边的标签（如图所示）显示项目中的文件。其他标签允许你搜索项目文件、查看构建警告和错误、管理断点以及执行其他任务。

    3.  **编辑器区域**，你在此处键入源代码。

    4.  **调试区域**，显示调试信息。左侧显示运行时变量的值，右侧是控制台，日志语句会打印在此处。

    5.  **实用工具区域**，包含有关选定项的信息。在这种情况下，它显示有关所选 `MainScene.m` 文件的详细信息。


    你可以通过单击播放按钮（工具栏上最左边的图标）来构建并运行这个基本的 `SpriteBuilder` Xcode 项目。项目将构建并在已连接的设备或 iOS
    模拟器上启动，具体取决于工具栏中选择的运行目标。你应该会在你的设备或 iOS 模拟器上看到与几秒钟前在 `SpriteBuilder` 中看到的完全相同的场景。


    **提示** 如果你以前没有使用过 Xcode，并且需要更多关于如何使用它的说明，请查阅 Xcode 指南，该指南可通过 帮助 ![image](img/00008.jpeg)
    Xcode 概览 或在线访问 [`developer.apple.com/library/ios/documentation/ToolsLanguages/Conceptual/Xcode_Overview`](https://developer.apple.com/library/ios/documentation/ToolsLanguages/Conceptual/Xcode_Overview)
    获取。


    ## 第一个场景，第一段代码


    第一个目标是创建第二个场景，然后连接按钮，这样你就可以在两个场景之间来回切换。这第二个场景将是游戏场景，而现有的 `MainScene` 将成为菜单界面。这是游戏场景和菜单场景之间一种常见的、基础性的分离。


    场景包含游戏当前渲染的所有内容（节点）。其他场景可以使用过渡效果替换当前可见的场景，就像 Cocoa touch 视图可以通过动画从一个视图过渡到另一个视图一样。


    **注意** 一个常见的误解是，场景和节点可以和视图互换使用。事实并非如此。`Cocos2D` 有自己的 `UIView` 类，名为 `CCGLView`，它使用
    OpenGL 指令渲染所有场景和节点。因此，其他 `UIView` 实例可以完全位于 `Cocos2D` 视图及其当前显示的场景之上或之下。


    ### 创建 GameScene

    '
- fmt: 'Go to File ![image](images/00008.jpeg) New ![image](images/00008.jpeg) File,
    or right-click the Project Navigator pane below the preview area and choose New
    File from the context menu to create a new SpriteBuilder document file, also known
    as a `CCB file`. Select the `Scene` type, and enter `GameScene.ccb` as the file
    name (as shown in [Figure 2-4](#part0011.html#Fig4)) and click the **Create**
    button.


    ![9781484202630_Fig02-04.jpg](images/00012.jpeg)


    [Figure 2-4](#part0011.html#_Fig4). Creating the `GameScene.ccb`


    To be precise, creating a new `CCB file` lets you choose one of five different
    types. Here’s a quick rundown of their purpose and major differences:


    - **Scene:** A presentable scene. Contrary to what you might expect, its root
    node is a `CCNode`, not a `CCScene`. Its main difference from the `Node` type
    is that it defaults to display a nice device frame around it in SpriteBuilder.

    - **Node:** Essentially, the same as `Scene`, but it has no device frame, and
    it has a root node of class `CCNode`.

    - **Layer:** The only `CCB file` type whose content size can be set. This makes
    it ideal for any fixed-size layer. Again, the root node is of class `CCNode`.

    - **Sprite:** Because sprites are so commonplace in games, this `CCB file` has
    a `CCSprite` as its root node. Other than that, though, it’s the same as the `Node`
    type.

    - **Particles:** Same as for `Sprite` type, except here the root node is using
    the `CCParticleSystem` class.


    **Note** Technically, all `CCB file` types can be used interchangeably. The main
    difference between `Scene`, `Node`, and `Layer` is one of terminology and how
    it’s displayed in SpriteBuilder. The `Layer` type is the only one that allows
    for a user-definable content size. `Layer` need only be used over `Node` or `Scene`
    whenever the contents need a fixed, custom size—for instance, for game levels
    or fixed-size overlay menus.


    The `GameScene.ccb` will be presented as an iPhone device frame with no contents
    (black screen). Time to fill it with some content.


    ### Reviewing the Node Library


    On the Resource Navigator pane (left side), click on the Node Library View tab.
    This brings up a list of items that can be dragged and dropped onto the stage.
    Most of these items are nodes, inheriting from Cocos2d’s base class `CCNode`.
    The only other types of items are joints used by the physics engine. In [Figure
    2-5](#part0011.html#Fig5), you’ll find the full list of nodes available at the
    time of this writing.


    ![9781484202630_Fig02-05.jpg](images/00013.jpeg)


    [Figure 2-5](#part0011.html#_Fig5). List of available nodes in SpriteBuilder


    I’ll quickly go over the various node types and their purpose:


    - **Node:** An invisible node that is used to group (or “layer”) other nodes.
    Imagine them being folders that contain related items. This affects draw order,
    and it can be useful to access related items easier in code, or just to sort,
    move, or collapse nodes in the SpriteBuilder timeline.

    - **Sub File:** A placeholder for embedding another `CCB file`. This is a very
    powerful node because it allows you to use other `CCB files` like templates and
    to create and edit a single `CCB file` that is used (instantiated) multiple times.
    Dragging a `CCB file` onto a stage will automatically create a `Sub File` node.

    - **Physics Node:** This represents the physics world. Any node with physics enabled
    has to be a child or grandchild of a `Physics Node`, or it won’t have physics
    enabled after all. Generally, only one `Physics Node` should be used per scene.
    Multiple worlds are possible, but their children will not be able to interact
    with each other.

    - **Color and Gradient Node:** Look at these colors, wow! Essentially, these are
    just sprites without images. They’re great for quick-and-dirty backgrounds or
    for use as placeholders for as-of-yet missing graphics.

    - **Sprite:** The main constituent of any 2D game. Use this tool to draw a single
    sprite frame, a texture in its entirety, or a part of a larger texture. The `Sprite
    9 Slice` can be used to create a resizable background for a menu screen or button,
    but it’s rarely needed thanks to the `Button` node.

    - **Particle System:** For explosions, exhaust smoke, fire swords, and the like.
    It animates a bunch of particles based on parameters that define how particles
    are created, what they do over time, and how long they live. Particles don’t interact
    with physics, and you can’t access individual particles in code. Particles can
    be drawn and animated more efficiently than the equivalent number of sprites.

    - **Label TTF and BM-Font:** For text and such. `TTF` stands for *Truetype Font*.
    The advantage these offer is that you can use any built-in iOS or custom `TTF`
    font. The disadvantage is that every change in text internally creates a new texture,
    which is inefficient for score counters. `TTF` fonts are best used for static
    text. For animated text, `BM-Fonts` are preferable, but they must be created with
    an external tool like Glyph Designer.

    - **Button:** A button is the ultimate combination of a `Sprite 9 Slice` (background
    image) and a `Label TTF` (text) to create the most awesome thing in the world.
    Almost. Well, you can tap or click it, and it can send a message in code which,
    if you set it up properly, won’t even crash but will actually run some code!

    - **Text Field:** An editable label. A user can tap or click it and type some
    text, and your code receives a message either when text editing ends or even every
    time the text changes.

    - **Slider:** A user can move the slider handle left or right. Your code receives
    a message while the slider is dragged. Technically, it always operates with values
    in the range `0.0` to `1.0`.

    - **Scroll View:** Despite its name, this is not meant to create scrolling game
    worlds. It’s intended to be dragged and moved by the user and to create a scrolling
    and snapping effect similar to the one used for browsing photos in the Photo library.
    You’ll later use a `Scroll View` to create a level selection screen.

    - **Box Layout:** Makes the tedious task of evenly spacing nodes a snap. You can
    align its child nodes horizontally or vertically, but alas, despite its name you
    cannot align them on a grid with multiple rows and columns by itself. However,
    you can use a horizontal `Box Layout` that contains multiple vertical `Box Layout`
    nodes as children, each of which contains the nodes in each column—or vice versa,
    with the horizontal and vertical alignment `Box Layout` nodes swapped.'
