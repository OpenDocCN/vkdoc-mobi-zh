    \ node];\n[scene addChild:ccbRootNode];\n```\n\n这里的`scene`就是方法返回的内容。要访问`MainScene`的根节点，您需要编写：\n\
    \n```\nCCNode* rootNode = scene.children.firstObject;\n```\n\n现在您有了一个`CCScene`实例，它可以附带一个可选的过渡来呈现：\n\
    \n```\nCCTransition* transition = [CCTransition transitionFadeWithDuration:1.5];\n\
    [[CCDirector sharedDirector] presentScene:scene withTransition:transition];\n\
    ```\n\n过渡是一种为场景切换添加动画效果的方式。淡入淡出过渡先将一个场景渐变为黑色，再将新场景淡入。您也可以使用交叉淡入淡出、渐变成指定颜色以及各种移动和推入式过渡。\n\
    \n这些过渡方法的确切名称是什么？这些信息始终可以通过 Xcode 的代码补全建议随时获取——如果您没有看到建议，请检查该选项是否已在`Xcode Preferences`\
    \ ![image](img/00008.jpeg)`Text Editing` ![image](img/00008.jpeg)`Suggest completions\
    \ while typing`中开启。\n\n一旦您开始键入类名或方法名的一部分，您应该会看到可用补全建议的列表，如图 2-12 所示。如果未显示，请在此处尝试按`ESC`键。\n\
    \n![9781484202630_Fig02-12.jpg](img/00020.jpeg)\n\n图 2-12 利用 Xcode 自动补全建议\n\n\
    **提示** 您还可以在 Cocos2d 类参考中找到过渡列表：[`www.cocos2d-swift.org/docs/api/Classes/CCTransition.html`](http://www.cocos2d-swift.org/docs/api/Classes/CCTransition.html)。或者在\
    \ Xcode 中任意位置输入`*CCTransition*`，然后右键单击文本并选择`Jump to Definition`。（或者，将光标放在文本任意位置，然后选择`Navigate`\
    \ ![image](img/00008.jpeg)`Jump to Definition` from the menu。）这将打开`CCTransition`的接口，您可以在其中找到方法名称、属性及其他类详细信息，以及相关文档。\n\
    \n现在您已经了解了如何在`AppDelegate`中启动场景，以及如何在点击按钮时切换场景，请运行应用程序并尝试操作——如果您还没有这样做的话——我将把它作为练习留给您：将起始场景改回`MainScene`，并在`MainScene`上添加另一个按钮。这样，当`MainScene`中的按钮被轻触时，它会过渡到`GameScene`。本书在`01\
    \ - Change Scenes with Buttons`文件夹中提供了此项目状态的示例。\n\n# 创建关卡子文件节点\n\n回到 SpriteBuilder——具体来说，是`GameScene.ccb`文件。我们正在构建的游戏应支持多个关卡。由于每个关卡将具有相同的基本玩法，因此为每个关卡重用`GameScene.ccb`是合理的，这样您就不必在每个关卡中单独重新实现常见功能。例如，HUD\
    \ 或平视显示器——这个术语虽然有些用词不当，但通常用于指代任何非滚动内容，例如滚动世界中的暂停按钮和分数标签。\n\n这就是子文件节点派上用场的地方。它允许您创建模板\
    \ CCB 文件，这些文件可以多次实例化，并在单个文件中进行编辑。将子文件节点视为 Objective-C 中类的等效概念。`GameScene`将包含三个子文件节点：一个用于实际关卡内容，一个用于\
    \ HUD 层，以及一个用于暂停和“游戏结束”菜单等弹出窗口。\n\n由于在后期重新组织资源既繁琐又容易出错，因此从一个能够随项目扩展的项目结构开始非常重要。对于此练习，首先在项目中添加一个名为`Levels`的新文件夹，所有游戏关卡文件都将添加到此文件夹中。您可以通过`File`\
    \ ![image](img/00008.jpeg)`New` ![image](img/00008.jpeg)`Folder`菜单，或在资源导航器视图（文件视图选项卡左下角——即列出\
    \ CCB 文件和其他资源的位置）中右键单击来创建文件夹。\n\n```"
- fmt: 'First, create a CCB that will contain the level’s nodes. Since a level needs
    a specific size, in this case to determine the scrollable area of the world, the
    `Layer` document type is the right choice. Select the `Levels` folder before you
    issue the File ![image](images/00008.jpeg) New ![image](images/00008.jpeg) File
    command, and before you right-click the `Levels` folder and select New File. This
    will display the dialog in [Figure 2-13](#part0011.html#Fig13).


    ![9781484202630_Fig02-13.jpg](images/00021.jpeg)


    [Figure 2-13](#part0011.html#_Fig13). `Level1.ccb` is of type `Layer` and uses
    a custom content size


    Name the new layer `Level1.ccb`, and give it a size of `4000` by `500`. Then click
    Create. Initially, the new CCB will be empty (black).


    The `Level1.ccb` file should be in the subfolder named `Levels`. If it isn’t,
    move it to the `Levels` folder by dragging the `Level1.ccb` onto the `Levels`
    folder. The project’s file hierarchy should be exactly like the one shown in [Figure
    2-14](#part0011.html#Fig14).


    ![9781484202630_Fig02-14.jpg](images/00022.jpeg)


    [Figure 2-14](#part0011.html#_Fig14). `Level1.ccb` should be in the folder named
    `Levels`


    Switch to the Node Library View, and drag and drop a `Gradient Node` onto the
    stage or onto the root node in the timeline.


    ## The Node Selection Handles


    Now before you make this gradient fill the entire level, have a look at the selection
    handles for a node. You can easily spot the selected node in the stage because
    its corners are marked with tiny circles, the selection handles.


    As you move your mouse over a selected node in the stage, the mouse cursor will
    change to one of the following icons, and its corresponding action can be performed
    through clicking and dragging:


    ![9781484202630_unFig02-01.jpg](images/00023.jpeg)


    Within the node’s rectangular area, the mouse cursor shows a 4-way cross of arrows
    (1). Click and drag when this is your mouse cursor to move the node. If the cross
    of arrows has a circle at its center (2), the mouse is hovering near the node’s
    `anchorPoint` and dragging will cause the `anchorPoint` to move instead. The `anchorPoint`
    itself is often mistaken as a way to reposition a node, but alas it’s mainly the
    center of rotation and scale operations for a node. Typically, the `anchorPoint`
    is either at the lower left corner `(0, 0)` or the center `(0.5, 0.5)` of a node.


    **Caution** Unless mentioned specifically in this book, you should leave the `anchorPoint`
    at its default value. Watch out for the slight difference in icons 1 and 2 before
    starting to drag a node.


    The two-way arrow handle (3) allows you to scale the node and becomes visible
    when hovering over one of the four selection handles. It can be mistaken for resizing
    the node, but except for `Color Node` and `Gradient Node`, changing a node’s size
    by changing its scale will result in reduced image quality, in particular when
    enlarging the node through scaling. If you move the mouse cursor slightly outside
    the node but hover near a selection handle, its shape will change to a bent 2-way
    arrow (4), which allows you to rotate the node when dragging.


    Finally, the two split-in-half arrows (5) indicate the skew action. You can grab
    a node between two selection handles to move that edge along its axis, forming
    a trapezoid-shaped node.


    ## Editing Node Properties


    For precision changes, the mouse drag operations are unsuitable. You can use the
    Nudge, Move, and Align commands from the Object menu for finer control, but this
    doesn’t suit every situation either. Most of the time, when you know the exact
    value of a property you’ll want to use the Item Properties view on the right side
    of Detail View. All node types present the same basic properties at the top, labeled
    `CCNode`, as seen in [Figure 2-15](#part0011.html#Fig15).


    ![9781484202630_Fig02-15.jpg](images/00024.jpeg)


    [Figure 2-15](#part0011.html#_Fig15). `CCNode` properties are used by all nodes


    The Visible check box is self-explanatory, and the Name text field can be used
    to give a node a custom name to identify it in code.


    The Position setting is in points, not pixels. A Retina and non-Retina iPad, for
    instance, have the same point dimensions of `1024 x 768` points. This makes the
    position universal for all devices. To further support alignment and perhaps personal
    preference, you can change a node’s reference corner. (See [Figure 2-16](#part0011.html#Fig16).)
    By default, it is set to Bottom-left, which means the node’s position is relative
    to the lower left corner of the root node. Change it to Top-left and the node’s
    position will be the same as that of a `UIView`, which also considers views to
    be positioned relative to the upper-left corner of the view, layer, or screen.


    ![9781484202630_Fig02-16.jpg](images/00025.jpeg)


    [Figure 2-16](#part0011.html#_Fig16). The Corner Alignment settings for the Position
    property


    The position’s scale type can also be adjusted individually for each axis. By
    default, coordinates are considered to be *X in Points*, but always scaling up
    on the iPad. This has the effect that when you change the document to Document
    ![image](images/00008.jpeg) Resolution ![image](images/00008.jpeg) Tablet, the
    relative position of the node remains the same on tablet devices.


    By default, SpriteBuilder assumes that Universal apps will want to treat the iPad
    screen essentially as a roughly two times larger screen—the `1024 x 768` iPad
    point extents are `1.8` times wider and `2-4` times higher than a widescreen iPhone
    5C/5S dimensions of `568 x 320`. If that is not what you wish, you’ll have to
    change node positions to *X in UI Points* (see [Figure 2-17](#part0011.html#Fig17))
    to actually allow you to cram more nodes onto the larger screen real estate. In
    other words the player would actually be able to see more of the same world on
    an iPad.


    ![9781484202630_Fig02-17.jpg](images/00026.jpeg)


    [Figure 2-17](#part0011.html#_Fig17). The Position Type settings


    The same UI point scaling type can also be applied to a node’s scale property.


    Finally, the *percent of parent container* settings is the most important and
    the most frequently used setting for positions. It allows you to completely ignore
    most resolution-dependent considerations. The most common use is to quickly center
    a node on the screen regardless of the target device being a 3.5” or 4” iPhone
    or an iPad. Simply set the position types for both coordinates to percent of parent
    container and enter `50%` x `50%`.


    The Content Size property extends this scale type list by two additional settings:
    Width inset in points and Width inset in UI points, shown in [Figure 2-18](#part0011.html#Fig18).
    The difference between regular and UI point scaling is the same as mentioned above.
    The inset changes the `contentSize` from defining the actual width and height
    of the node to defining the distance from the edges of the parent node.


    ![9781484202630_Fig02-18.jpg](images/00027.jpeg)


    [Figure 2-18](#part0011.html#_Fig18). Size types available for the Content Size
    property


    Assuming an example node is centered on the layer with Position `50%`, `50%` and
    `AnchorPoint` `0.5`, `0.5`, an inset of `100 x 40` would change the node’s `contentSize`
    so that it is `100` by `40` points smaller than its parent. In this particular
    instance, the node is perfectly centered so its size would be `50` points smaller
    on both the left and right sides, and `20` points smaller on the top and bottom.
    The same effect can be achieved by editing the position and `content size`, though
    less conveniently.


    ## Changing Node Draw Order


    One last but important property is the draw order, in Cocos2d often referred to
    as `zOrder`. Sprite Kit users know it as `zPosition`. But alas, there is no such
    property under the `CCNode` properties or anywhere else. The trick here is that,
    in SpriteBuilder, draw order is solely defined by the order of children in their
    parent container. In SpriteBuilder, the only way to change draw order is by reordering
    nodes in the Timeline View.'
