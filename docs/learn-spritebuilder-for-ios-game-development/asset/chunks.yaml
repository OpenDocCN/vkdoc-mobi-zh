- fmt: "# Creating an Exit Node\n\nIn `SpriteBuilder`, right-click the `Prefabs` folder\
    \ in the File View and create a New File. Name the file `Exit1.ccb`, and change\
    \ its type to `Sprite` before clicking the Create button. Then select the root\
    \ `CCSprite` in the Timeline, and on the Item Properties tab, click the “Sprite\
    \ frame” drop-down menu. You can use any image, but when you are using the book’s\
    \ example graphics you should select the `SpriteSheets/Level1a/level1_foreground_doughnut.png`.\
    \ The doughnut will act as the exit object for the first world.\n\nWith the sprite\
    \ still selected, switch to the Item Physics tab. Select the “Enable physics”\
    \ check box, and change the body type to `Static`; this prevents the exit node\
    \ from moving or rotating due to gravity or other forces. Then enter `exit` in\
    \ the “Collision type” field. This will allow you to easily determine when the\
    \ player collided with this specific object. Leave the Categories and Masks fields\
    \ empty so that the player surely collides with the exit node.\n\nLast, edit the\
    \ doughnut’s polygon shape to approximately match the doughnut’s outline, but\
    \ try to use no more than eight points or so. The doughnut doesn’t need to have\
    \ a very precise collision shape. Something like the one shown in [Figure 4-15](#part0013.html#Fig15)\
    \ absolutely suffices.\n\n![9781484202630_Fig04-15.jpg](images/00075.jpeg)\n\n\
    [Figure 4-15](#part0013.html#_Fig15). This is not an exit. Well, not yet\n\nThen\
    \ switch over to the `Player.ccb`, select the player sprite, and switch to the\
    \ Item Physics tab. Here you need to enter `player` in the “Collision type” field.\
    \ Also, check that both Categories and Masks fields are empty here as well.\n\n\
    The last thing to do in `SpriteBuilder` before you’ll write some code is to open\
    \ the `Level1.ccb` and drag and drop the `Exit1` node from the Tileless Editor\
    \ onto the `CCPhysicsNode` in the Timeline. The `Exit1` doughnut needs to be a\
    \ child node of the `CCPhysicsNode`. This is important; if it isn’t, the exit\
    \ node’s physics behavior, including collisions, will not work.\n\nYou can then\
    \ freely rotate and position the exit doughnut where you want it to be, normally\
    \ somewhere near the right end of the level. However, for testing it may be a\
    \ better idea to position it in the vicinity of the player to be able to test\
    \ the upcoming code more quickly. You can later move it into its intended place.\n\
    \n# Implementing the Exit Collision Callback\n\nSwitch over to Xcode, and open\
    \ the `GameScene.m` file. Add the code in [Listing 4-14](#part0013.html#list14)\
    \ at the bottom of the file, just above the `@end` line.\n\n[***Listing 4-14***](#part0013.html#_list14).\
    \ This exit collision handler just removes both the player and exit node\n\n```objc\n\
    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair\n             \
    \            player:(CCNode *)player\n                           exit:(CCNode\
    \ *)exit\n{\n    [player removeFromParent];\n    [exit removeFromParent];\n\n\
    return NO;\n}\n```\n\nFor now, this method just removes both the player and exit\
    \ nodes from their parent, effectively deleting them. The return value doesn’t\
    \ play a role here, but it is returning `NO` to allow the two bodies to intersect.\n\
    \n**Tip** Unlike other physics engines (for example, `Box2D`), and respectively\
    \ earlier versions of `Chipmunk2D` (the physics engine used by `Cocos2D`), it\
    \ is legal to remove a colliding node during a collision callback method.\n\n\
    Build and run the project. Move the player toward the exit doughnut. Once they\
    \ intersect, they will both disappear and the view will jump to the level’s lower-left\
    \ corner simply because there’s no player to center on anymore.\n\nFor now, removing\
    \ the player is all the exit does. If you don’t like it, feel free to comment\
    \ out both `removeFromParent` lines in [Listing 4-14](#part0013.html#list14).\
    \ You’ll later come back to this method to create a popover menu.\n\n# Summary\n\
    \nYour game is now set up to move the player through the level using physics forces\
    \ and gravity, while impenetrable static physics walls prevent the player from\
    \ leaving the level boundaries.\n\nYou can even exit the level, sort of, by implementing\
    \ a specific physics collision callback method. You also learned about customizing\
    \ these callback methods with the Collision type property, and how to prevent\
    \ bodies from colliding in the first place via the Categories and Masks identifiers.\n\
    \n---\n\n# Chapter 5\n\n# Timelines & Triggers\n\nOne of `SpriteBuilder`’s major\
    \ features is its ability to create Timeline animations using keyframes. It can\
    \ even animate static physics bodies through keyframes while providing proper\
    \ physics collisions, a feature that is unheard of in other 2D game engines.\n\
    \nThis chapter explains how to create Timeline animations with `SpriteBuilder`\
    \ and how to play such animations using `CCBAnimationManager`. At the end, you’ll\
    \ have rotating physics gear and saw objects that can push the player forward.\n\
    \nYou’ll also create a reusable trigger node that you can place in the level with\
    \ a corresponding `Trigger` class. This allows you to run code when the player\
    \ enters the trigger area—for instance, playing a Timeline animation on target\
    \ nodes.\n\n## What Are Timelines and Keyframes?\n\nSo far you’ve known the Timeline\
    \ as a view in `SpriteBuilder` (see [Figure 5-1](#part0014.html#Fig1)) and as\
    \ the area where the hierarchy of nodes in a CCB is presented. You mainly used\
    \ it to change the draw order of nodes and to rename them. But the Timeline can\
    \ also animate properties of nodes using keyframes.\n\nA keyframe animation simply\
    \ records the values of properties of a node at a given keyframe. Say you have\
    \ three keyframes and, for example, the rotation property is being animated. As\
    \ the Timeline animation moves from one keyframe to the next, the node’s rotation\
    \ property is continuously updated. The difference between the most recent keyframe’s\
    \ rotation value and the next keyframe’s rotation value, as well as the easing\
    \ mode, determines how the rotation value changes over time. The entire animation\
    \ is called a *Timeline* in `SpriteBuilder`.\n\nKeyframe animations enable you\
    \ to create smooth animations with relatively few keyframes because the in-between\
    \ values are interpolated. Furthermore, the interpolation can be changed from\
    \ a linear progression to an equation that computes the values between two keyframes\
    \ dynamically. This is typically referred to as *easing*, and it allows for effects\
    \ like the rotation slowing down or speeding up as it nears a keyframe.\n\nHave\
    \ a look at the various control areas as highlighted in [Figure 5-1](#part0014.html#Fig1).\n\
    \n![9781484202630_Fig05-01.jpg](images/00076.jpeg)\n\n[Figure 5-1](#part0014.html#_Fig1).\
    \ The Timeline animation editor view and its controls\n\nLet me run you through\
    \ the various editing controls in the Timeline that are important to creating\
    \ keyframe-based animations."
  raw: 'Since this game requires the player to move from A to B, where A is left and
    B is right, there’s got to be something at B that brings the player to a new level.
    This is where you’ll need an exit of sorts and a collision callback method that
    triggers the exit-level code. This should be straightforward with what you just
    learned.


    Creating an Exit Node


    In SpriteBuilder, right-click the Prefabs folder in the File View and create a
    New File. Name the file **Exit1.ccb**, and change its type to Sprite before clicking
    the Create button. Then select the root CCSprite in the Timeline, and on the Item
    Properties tab, click the “Sprite frame” drop-down menu. You can use any image,
    but when you are using the book’s example graphics you should select the SpriteSheets/Level1a/level1_foreground_doughnut.png.
    The doughnut will act as the exit object for the first world.


    With the sprite still selected, switch to the Item Physics tab. Select the “Enable
    physics” check box, and change the body type to Static; this prevents the exit
    node from moving or rotating due to gravity or other forces. Then enter **exit**
    in the “Collision type” field. This will allow you to easily determine when the
    player collided with this specific object. Leave the Categories and Masks fields
    empty so that the player surely collides with the exit node.


    Last, edit the doughnut’s polygon shape to approximately match the doughnut’s
    outline, but try to use no more than eight points or so. The doughnut doesn’t
    need to have a very precise collision shape. Something like the one shown in [Figure
    4-15](#part0013.html#Fig15) absolutely suffices.


    ![9781484202630_Fig04-15.jpg](images/00075.jpeg)


    [Figure 4-15](#part0013.html#_Fig15). This is not an exit. Well, not yet


    Then switch over to the Player.ccb, select the player sprite, and switch to the
    Item Physics tab. Here you need to enter **player** in the “Collision type” field.
    Also, check that both Categories and Masks fields are empty here as well.


    The last thing to do in SpriteBuilder before you’ll write some code is to open
    the Level1.ccb and drag and drop the Exit1 node from the Tileless Editor onto
    the CCPhysicsNode in the Timeline. The Exit1 doughnut needs to be a child node
    of the CCPhysicsNode. This is important; if it isn’t, the exit node’s physics
    behavior, including collisions, will not work.


    You can then freely rotate and position the exit doughnut where you want it to
    be, normally somewhere near the right end of the level. However, for testing it
    may be a better idea to position it in the vicinity of the player to be able to
    test the upcoming code more quickly. You can later move it into its intended place.


    Implementing the Exit Collision Callback


    Switch over to Xcode, and open the GameScene.m file. Add the code in [Listing
    4-14](#part0013.html#list14) at the bottom of the file, just above the @end line.


    [***Listing 4-14***](#part0013.html#_list14). This exit collision handler just
    removes both the player and exit node


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                               exit:(CCNode *)exit

    {

        [player removeFromParent];

        [exit removeFromParent];


    return NO;

    }

    ```


    For now, this method just removes both the player and exit nodes from their parent,
    effectively deleting them. The return value doesn’t play a role here, but it is
    returning NO to allow the two bodies to intersect.


    **Tip**  Unlike other physics engines (for example, Box2D), and respectively earlier
    versions of Chipmunk2D (the physics engine used by Cocos2D), it is legal to remove
    a colliding node during a collision callback method.


    Build and run the project. Move the player toward the exit doughnut. Once they
    intersect, they will both disappear and the view will jump to the level’s lower-left
    corner simply because there’s no player to center on anymore.


    For now, removing the player is all the exit does. If you don’t like it, feel
    free to comment out both removeFromParent lines in [Listing 4-14](#part0013.html#list14).
    You’ll later come back to this method to create a popover menu.


    Summary


    Your game is now set up to move the player through the level using physics forces
    and gravity, while impenetrable static physics walls prevent the player from leaving
    the level boundaries.


    You can even exit the level, sort of, by implementing a specific physics collision
    callback method. You also learned about customizing these callback methods with
    the Collision type property, and how to prevent bodies from colliding in the first
    place via the Categories and Masks identifiers.


    Chapter    5


    Timelines & Triggers


    One of SpriteBuilder’s major features is its ability to create Timeline animations
    using keyframes. It can even animate static physics bodies through keyframes while
    providing proper physics collisions, a feature that is unheard of in other 2D
    game engines.


    This chapter explains how to create Timeline animations with SpriteBuilder and
    how to play such animations using CCBAnimationManager. At the end, you’ll have
    rotating physics gear and saw objects that can push the player forward.


    You’ll also create a reusable trigger node that you can place in the level with
    a corresponding Trigger class. This allows you to run code when the player enters
    the trigger area—for instance, playing a Timeline animation on target nodes.


    What Are Timelines and Keyframes?


    So far you’ve known the Timeline as a view in SpriteBuilder (see [Figure 5-1](#part0014.html#Fig1))
    and as the area where the hierarchy of nodes in a CCB is presented. You mainly
    used it to change the draw order of nodes and to rename them. But the Timeline
    can also animate properties of nodes using keyframes.


    A keyframe animation simply records the values of properties of a node at a given
    keyframe. Say you have three keyframes and, for example, the rotation property
    is being animated. As the Timeline animation moves from one keyframe to the next,
    the node’s rotation property is continuously updated. The difference between the
    most recent keyframe’s rotation value and the next keyframe’s rotation value,
    as well as the easing mode, determines how the rotation value changes over time.
    The entire animation is called a *Timeline* in SpriteBuilder.


    Keyframe animations enable you to create smooth animations with relatively few
    keyframes because the in-between values are interpolated. Furthermore, the interpolation
    can be changed from a linear progression to an equation that computes the values
    between two keyframes dynamically. This is typically referred to as *easing*,
    and it allows for effects like the rotation slowing down or speeding up as it
    nears a keyframe.


    Have a look at the various control areas as highlighted in [Figure 5-1](#part0014.html#Fig1).


    ![9781484202630_Fig05-01.jpg](images/00076.jpeg)


    [Figure 5-1](#part0014.html#_Fig1). The Timeline animation editor view and its
    controls


    Let me run you through the various editing controls in the Timeline that are important
    to creating keyframe-based animations.'
  trans: "\n# 创建出口节点\n\n在 `SpriteBuilder` 中，右键点击文件视图中的 `Prefabs` 文件夹并创建一个新文件。将文件命名为\
    \ `Exit1.ccb`，并将其类型更改为 `Sprite`，然后点击“创建”按钮。接着在时间线中选择根节点 `CCSprite`，在“项目属性”选项卡中，点击“精灵帧”下拉菜单。你可以使用任意图片，但若使用本书的示例图形，应选择\
    \ `SpriteSheets/Level1a/level1_foreground_doughnut.png`。这个甜甜圈将作为第一个世界的出口对象。\n\n\
    保持精灵处于选中状态，切换到“项目物理”选项卡。勾选“启用物理”复选框，并将刚体类型更改为 `Static`；这将防止出口节点因重力或其他力而移动或旋转。然后在“碰撞类型”字段中输入\
    \ `exit`。这能让你轻松判断玩家何时与此特定物体发生碰撞。将“类别”和“掩码”字段留空，确保玩家一定会与出口节点碰撞。\n\n最后，编辑甜甜圈的多边形形状，使其大致匹配甜甜圈的轮廓，但尽量使用不超过八个顶点。甜甜圈不需要非常精确的碰撞形状。像图\
    \ 4-15 中所示的形状就完全足够了。\n\n![9781484202630_Fig04-15.jpg](img/00075.jpeg)\n\n图 4-15。这还不是出口。嗯，暂时还不是\n\
    \n然后切换到 `Player.ccb`，选择玩家精灵，再切换到“项目物理”选项卡。在这里你需要在“碰撞类型”字段中输入 `player`。同时，确保此处的“类别”和“掩码”字段也为空。\n\
    \n在开始编写代码之前，在 `SpriteBuilder` 中要做的最后一件事是打开 `Level1.ccb`，将 `Exit1` 节点从图块编辑器拖放到时间线中的\
    \ `CCPhysicsNode` 上。`Exit1` 甜甜圈必须是 `CCPhysicsNode` 的子节点。这一点很重要；否则，出口节点的物理行为（包括碰撞）将无法正常工作。\n\
    \n然后你可以自由旋转和定位出口甜甜圈到所需位置，通常是在关卡右端的某处。但为了测试，较好的做法是将其放置在玩家附近，以便更快地测试即将编写的代码。之后你可以再将其移动到预定位置。\n\
    \n# 实现出口碰撞回调\n\n切换到 Xcode，打开 `GameScene.m` 文件。在文件底部，`@end` 行上方添加代码清单 4-14 中的代码。\n\
    \n***代码清单 4-14***。这个出口碰撞处理器仅移除玩家和出口节点\n\n```objc\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \          exit:(CCNode *)exit\n{\n    [player removeFromParent];\n    [exit removeFromParent];\n\
    \nreturn NO;\n}\n```\n\n目前，这个方法仅将玩家和出口节点从其父节点中移除，从而有效地删除它们。返回值在此处并不起关键作用，但它返回\
    \ `NO` 以允许两个刚体相互穿透。\n\n**提示** 与其他物理引擎（例如 `Box2D`）以及较早版本的 `Chipmunk2D`（`Cocos2D`\
    \ 所使用的物理引擎）不同，在碰撞回调方法中移除正在碰撞的节点是被允许的。\n\n构建并运行项目。将玩家移向出口甜甜圈。一旦它们相交，两者都会消失，并且视图会跳转到关卡的左下角，仅仅因为没有玩家可以居中显示。\n\
    \n目前，出口仅实现移除玩家的功能。如果你不喜欢这样，可以随时注释掉代码清单 4-14 中的两行 `removeFromParent` 代码。稍后你将回到此方法，创建一个弹出菜单。\n\
    \n# 小结\n\n现在你的游戏已经设置好，可以通过物理力和重力让玩家在关卡中移动，而不可穿透的静态物理墙壁则防止玩家离开关卡边界。\n\n你甚至可以通过实现特定的物理碰撞回调方法，实现某种程度上的“离开关卡”。你还学习了如何利用“碰撞类型”属性自定义这些回调方法，以及如何通过“类别”和“掩码”标识符从一开始就防止物体发生碰撞。\n\
    \n---\n\n# 第 5 章\n\n# 时间线与触发器\n\n`SpriteBuilder` 的主要功能之一是其能够使用关键帧创建时间线动画。它甚至可以通过关键帧为静态物理体制作动画，同时提供正确的物理碰撞，这是其他\
    \ 2D 游戏引擎中闻所未闻的功能。\n\n本章将解释如何使用 `SpriteBuilder` 创建时间线动画，以及如何使用 `CCBAnimationManager`\
    \ 播放此类动画。最后，你将拥有能够推动玩家前进的旋转物理齿轮和锯片物体。\n\n你还将创建一个可重用的触发器节点，你可以将其放置在关卡中，并配备相应的 `Trigger`\
    \ 类。这使得你可以在玩家进入触发器区域时运行代码——例如，在目标节点上播放时间线动画。\n\n## 什么是时间线和关键帧？\n\n到目前为止，你已将时间线视为\
    \ `SpriteBuilder` 中的一个视图（见图 5-1），以及展示 CCB 中节点层次结构的区域。你主要用它来更改节点的绘制顺序和重命名它们。但时间线也可以使用关键帧来动画化节点的属性。\n\
    \n关键帧动画只是记录给定关键帧处节点属性的值。假设你有三个关键帧，例如旋转属性正在被动画化。当时间线动画从一个关键帧移动到下一个关键帧时，节点的旋转属性会被持续更新。最近一个关键帧的旋转值与下一个关键帧的旋转值之间的差异，以及缓动模式，决定了旋转值随时间变化的方式。整个动画在\
    \ `SpriteBuilder` 中被称为*时间线*。\n\n关键帧动画使你能够用相对较少的关键帧创建平滑的动画，因为中间值是通过插值计算出来的。此外，插值可以从线性变化改为动态计算两个关键帧之间值的方程。这通常被称为*缓动*，它可以实现诸如旋转在接近关键帧时减慢或加速的效果。\n\
    \n请查看图 5-1 中高亮显示的各种控制区域。\n\n![9781484202630_Fig05-01.jpg](img/00076.jpeg)\n\n\
    图 5-1。时间线动画编辑器视图及其控制项\n\n接下来，我将为你介绍时间线中对于创建基于关键帧的动画至关重要的各种编辑控件。\n"
- fmt: '1.  **Timeline Controls:** These controls allow you to reset, fast forward,
    reverse, stop, and play an animation. The rightmost button toggles whether or
    not the animation loops during playback, but it does not affect playback in the
    game. (See **3\. Timeline Chain**.)

    2.  **Timeline List:** A CCB file can contain multiple timelines. With the drop-down
    menu, you can add, remove, duplicate, and rename a timeline, and select the currently
    edited timeline. In [Figure 5-1](#part0014.html#Fig1), *Default Timeline* is selected.

    3.  **Timeline Chain:** This control allows you to specify the Timeline that should
    be played when the current timeline playback has ended. If this is set to *No
    chained timeline*, the Timeline will play only once. In order to loop a Timeline
    in the game, you set this drop-down menu to the Timeline currently being edited.
    To loop the Timeline in [Figure 5-1](#part0014.html#Fig1), the chained Timeline
    would have to be changed to *Default Timeline*.

    4.  **Timeline Scale:** This control scales the keyframe view underneath it.

    5.  **Timeline Cursor:** This shows the point in time where the animation currently
    is. You can drag the handle to manually play the animation back and forth.

    6.  **Keyframes:** Those rectangular handles represent the keyframes. You can
    drag them left and right to change their position. If you drag the handle so it
    is centered on a keyframe of a selected node, you can edit this keyframe’s property
    value on the Item Properties tab. Between two keyframes is the keyframe segment,
    which you can right-click to change the easing mode.


    [Table 5-1](#part0014.html#Tab1) is a list of animatable properties. Note that
    not all properties are animatable in all nodes. Whether or not they are depends,
    for one thing, on the type of the node and whether that node is the root node
    of a CCB file. Root nodes cannot be animated at all, except for Sprite CCB files
    where you can at least animate the Color, Opacity, and Sprite Frame properties
    of the `CCSprite` root node.


    [Table 5-1](#part0014.html#_Tab1). Animatable properties, their keyboard shortcut
    for creating keyframes, and their availability


    | Property | Shortcut | Availability |

    | --- | --- | --- |

    | Color | C | Sprite, Sprite 9 Slice, Label TTF and BM-Font, Color and Gradient
    nodes. |

    | Opacity | O | Sprite, Sprite 9 Slice, Label TTF and BM-Font, Color and Gradient
    nodes. |

    | Position | P | All node types. |

    | Rotation | R | All node types. |

    | Scale | S | All node types. |

    | Skew | K | All node types. Not to be used with physics-enabled nodes. |

    | Sprite Frame | F | Sprite and Sprite 9 Slice nodes. |

    | Visible | V | All node types. |


    **Caution** At the time of this writing, the Chipmunk physics engine does not
    support skewed and scaled nodes. If this still holds true, nodes with physics
    enabled should not animate both the Skew and Scale properties.


    ## Using the Timeline Editor


    Enough theory, let’s try something specific. Switch to the Tileless Editor View
    tab, and drag and drop the doughnut image from the `Level1a` Sprite Sheet onto
    the `CCPhysicsNode` in `Level1.ccb`.


    The new doughnut image must be a child of the `CCPhysicsNode` so that it scrolls
    along with the other level nodes. Since there’s already an exit node using the
    doughnut image, think of this doughnut as the imaginary place where the player
    enters the level. You might want to move it to a position on the far left of the
    level so that you see it right when the game launches.


    With the doughnut image selected in the Timeline, you can now start to add keyframes
    to create a Timeline animation. But first change the Timeline duration from its
    overly lengthy default of 10 seconds to, say, 6 seconds. To do so, click on the
    timestamp digits in the upper right area of the Timeline, which shows the timestamp
    of the Timeline Cursor in `Minutes:Seconds:Frames` format. Clicking on this digit
    counter opens up the *Timeline duration* editing dialog seen in [Figure 5-2](#part0014.html#Fig2).
    Enter 6 seconds and click Done.


    ![9781484202630_Fig05-02.jpg](images/00077.jpeg)


    [Figure 5-2](#part0014.html#_Fig2). Changing the duration of the current Timeline


    You may be wondering what the Frames field represents. SpriteBuilder plays back
    animations at a rate of 30 frames per second. So whenever you need a Timeline
    duration of less than a second, or perhaps a second and a half, you’ll have to
    edit the Frames field. It accepts values between 0 and 29. For instance, if you
    wanted a Timeline duration of 1.5 seconds, you would have to enter **1** in the
    `Secs` field and **15** in the `Frames` field.


    **Note** You can’t change the 30 frames per second (fps) playback speed in SpriteBuilder.
    Changing the frame rate is not necessary, however. A keyframe animation interpolates
    between two keyframes on a frame-by-frame basis. Assuming that the game actually
    runs at 60 fps, Timeline animations will also run at the game’s frame rate of
    60 fps. If the game’s frame rate is high, there will be more interpolated in-between
    states and thus the animation will run more smoothly than in SpriteBuilder.


    Make sure that the entire duration of the animation is visible in the Timeline.
    Use the Timeline Scale slider or resize the SpriteBuilder window to have all 6
    seconds of the animation visible. You’ll notice that to the right of the 6 seconds
    marker is a shadow drawn toward the right—this marks the end of the current animation.


    Then move the Timeline Cursor to the far left. Click and drag the Cursor handle—that’s
    the blue-ish downward-facing arrow located on the timescale bar from which a vertical
    line extends downward. The timestamp digits should display the values `00:00:00`.
    Finally, make sure the doughnut image that’s supposed to visualize the level-entry
    point is still selected.


    ## Adding Keyframes


    With the correct node selected and the Timeline Cursor at the desired location,
    you can begin adding keyframes. You’ll find one way to do this is by going through
    the menu via `Animations` ![image](images/00008.jpeg) `Insert Keyframe` and selecting
    the corresponding keyframe type,—for instance, `Position` or `Scale`. However,
    this is not too comfortable. Instead, you should get in the habit of using the
    keyboard shortcuts listed in [Table 5-1](#part0014.html#Tab1).


    Since the level-entry doughnut should scale a little over time, press the `S`
    key now to add a keyframe for the `Scale` property. You’ll notice that like in
    [Figure 5-3](#part0014.html#Fig3) the doughnut item expanded to show the list
    of animatable properties, with the `Scale` property drawn in bold to signal that
    this property has at least one keyframe in the current timeline.


    Now move the Timeline Cursor to the 3-seconds mark. It doesn’t need to be precisely
    at `00:03:00`; a fraction of a second either way won’t make a noticeable difference.
    Press `S` one more time to add a second `Scale` keyframe.


    Notice how the two keyframes are now connected with a pink, horizontal line? I’ll
    refer to the space between two keyframes as the *Keyframe Segment*, where the
    pink line visualizes the form of interpolation between two keyframes. There’s
    the Instant interpolation mode which, when set, actually hides the pink line in
    a Keyframe Segment.


    Finally, move the Timeline Cursor to the far right to `00:06:00` and press `S`
    once more to add a third keyframe. You now have a keyframe animation of the `Scale`
    property that spans the Timeline’s full duration of 6 seconds. It should look
    like the one shown in [Figure 5-3](#part0014.html#Fig3).


    ![9781484202630_Fig05-03.jpg](images/00078.jpeg)


    [Figure 5-3](#part0014.html#_Fig3). A Timeline animation of the `Scale` property
    with three keyframes


    **Caution** If you were to animate the `Scale` property of a node that has physics
    enabled, this would trigger an assertion in debug builds. The problem is that
    one naturally assumes the physics shape would scale along with the node, but it
    does not.


    ## Editing Animation Settings'
