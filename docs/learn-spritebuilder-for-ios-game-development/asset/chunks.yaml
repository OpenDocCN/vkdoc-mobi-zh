    \ 0），因为发送给`nil`对象的消息默认返回 0。\n\n你可能想知道为什么我没有直接赋值给`_name`实例变量，或者为什么通过`_parent.name`而不是`self.parent.name`获取名称。\n\
    \n根据经验法则，在仅读取变量值时，应优先使用实例变量（如果可用）。这会使代码更简洁，并且作为副作用，执行速度会稍快。但是，在为属性赋值时，最佳实践是通过`self.name`赋值给属性，而不是直接赋值给`_name`实例变量。原因在于`self.name\
    \ = @\"..\"`内部会运行属性设置器方法`[self setName:@\"..\"]`，该方法可能会执行其他代码。绕过属性设置器可能导致各种问题。如果你对直接赋值给实例变量的潜在副作用有任何疑虑，请始终赋值给属性或运行属性设置器方法。\n\
    \n清单 5-8 的下一个代码片段重印在清单 5-9 中，以便你专注于接下来讨论的代码。\n\n```\nNSPointerArray* triggers\
    \ = [triggerArrays objectForKey:_name];\nif (triggers == nil)\n{\n    triggers\
    \ = [NSPointerArray weakObjectsPointerArray];\n    [triggerArrays setObject:triggers\
    \ forKey:_name];\n}\n\n[triggers addPointer:(void*)self];\n```\n"
- fmt: "# NSPointerArray and Trigger/Target Management\n\n## Setting Up Triggers with\
    \ NSPointerArray\n\nIn the first line, an `NSPointerArray` is obtained by looking\
    \ up the object using the trigger's `_name` in the `triggerArrays`. Initially,\
    \ there will be no such object, resulting in `triggers` being `nil`. If that is\
    \ the case, the `if` block will create an `NSPointerArray` and assign it to `triggers`,\
    \ as well as storing it in the `triggerArrays` dictionary using the trigger's\
    \ `_name` as the key.\n\nThe curious part is definitely the `NSPointerArray`.\
    \ It sounds like a regular `NSArray` or `NSMutableArray`, but it's actually not\
    \ a subclass of either. It does behave much like a trimmed-down variant of `NSMutableArray`,\
    \ though. And its specialty is storing pointer references and allowing you to\
    \ store zeroing weak references to objects—meaning the triggers array does not\
    \ retain the trigger nodes added to it. If a trigger node stored in the triggers\
    \ array deallocates, the Objective-C runtime will automatically set the corresponding\
    \ pointer to `nil` in the array rather than leaving a dangling pointer (which,\
    \ when used, will cause crashes or bugs). The `weakObjectsPointerArray` initializer\
    \ configures the array to behave this way.\n\nBut why? Consider that both the\
    \ trigger and target nodes could be removed from the node hierarchy at any given\
    \ point in time, whether they have been triggered or not. Trigger nodes should\
    \ not be kept from deallocating simply because you maintain a list of triggers\
    \ in a global array. Hence, storing them weakly (not retaining) in an `NSPointerArray`\
    \ allows triggers that are removed from the node hierarchy to deallocate.\n\n\
    **Caution**  `NSPointerArray` is available only on devices running iOS 6.0 or\
    \ newer.\n\nWith the triggers array set up, all that's left to do is pass in `self`\
    \ in the call to `addPointer:`, but not without casting it to `(void*)` because\
    \ `NSPointerArray` stores generic `void*` pointer values. The `(void*)` cast doesn't\
    \ alter the object reference in any way; it's merely a way of stating to the compiler\
    \ that the `self` object can safely be represented as a `void*` pointer.\n\n##\
    \ Finding and Storing Targets\n\nThe remaining lines of [Listing 5-8](#part0014.html#list8)\
    \ that we haven't discussed so far are reprinted in [Listing 5-10](#part0014.html#list10)\
    \ for the sake of clarity, focus, and zen.\n\n[**Listing 5-10**](#part0014.html#_list10).\
    \ Searching for targets\n\n```\nif ([targetArrays objectForKey:_name] == nil)\n\
    {\n    NSPointerArray* targets = [NSPointerArray weakObjectsPointerArray];\n \
    \   [targetArrays setObject:targets forKey:_name];\n\n[self addTargetsTo:targets\
    \ searchInNode:self.scene];\n}\n```\n\nNotice that targets are searched only when\
    \ there's no corresponding entry of the given `_name` in the `targetArrays` dictionary.\
    \ This is to prevent searching the same targets multiple times in cases where\
    \ you have multiple triggers of the same name. Only the first trigger needs to\
    \ search for targets because the other triggers will refer to the same targets.\n\
    \nIf there's no array with the given `_name` in `targetArrays`, the code in [Listing\
    \ 5-10](#part0014.html#list10) will create an `NSPointerArray` storing weak pointer\
    \ references and assign it to `targets`. The same array is also assigned to `targetArrays`\
    \ using the trigger `_name` as its key. Next a method is called that performs\
    \ the actual search recursively, starting with the `self.scene` node. It adds\
    \ all the target nodes of the same name to the `targets` array.\n\nThe `addTargetsTo:searchInNode:`\
    \ method is shown in [Listing 5-11](#part0014.html#list11)—you should add this\
    \ method to your `Trigger.m` file just below the `onEnter` method.\n\n[**Listing\
    \ 5-11**](#part0014.html#_list11). Recursively searching for and gathering target\
    \ nodes\n\n```\n-(void) addTargetsTo:(NSPointerArray*)targets searchInNode:(CCNode*)node\n\
    {\n    for (CCNode* child in node.children)\n    {\n        if ([child.name isEqualToString:_name])\n\
    \        {\n            if ([child conformsToProtocol:@protocol(TriggerDelegate)])\n\
    \            {\n                [targets addPointer:(void*)child];\n         \
    \   }\n        }\n\n[self addTargetsTo:targets searchInNode:child];\n    }\n}\n\
    ```\n\nThe `addTargetsTo:searchInNode:` method runs recursively and tries to collect\
    \ all instances of nodes given a specific name and whose class conforms the `TriggerDelegate`\
    \ protocol. You can't use `getChildByName:` here because that will return only\
    \ the first child node with the given name, but you need a list of all nodes of\
    \ the same name.\n\nIf a target node has the correct name and conforms to the\
    \ `TriggerDelegate` protocol, a reference to the target node is added to the `targets`\
    \ array.\n\nThe last line continues the recursive search by calling the `addTargetsTo:searchInNode:`\
    \ method again, but with `child` as the parameter. This ensures that every node\
    \ in the scene is processed once and not a single one will be missed.\n\nIt also\
    \ means the trigger system in its current version won't recognize nodes added\
    \ after loading the `GameScene.ccb` file. If you need this, I'll leave it as an\
    \ exercise for you to do.\n\nYou could add a `+(void) addTarget:(CCNode*)target`\
    \ method to the `Trigger` class that assigns the target node, based on its name,\
    \ to the correct targets array stored in `targetArrays`. You should verify that\
    \ the target node conforms to the `TriggerDelegate` protocol before adding it.\
    \ To add a target node, you could then call `[Trigger addTarget:aTargetNode]`\
    \ from any other class, provided that you did add `#import \"Trigger.h\"` to that\
    \ class' implementation file.\n\n## Forwarding Trigger Events to Targets\n\nWhat's\
    \ left is to inform target nodes when the trigger is activated. This is where\
    \ the `triggerActivatedBy:` method in [Listing 5-12](#part0014.html#list12) comes\
    \ into play.\n\nAdd the code in [Listing 5-12](#part0014.html#list12) to `Trigger.m`\
    \ below the `addTargetsTo:searchInNode:` method.\n\n[**Listing 5-12**](#part0014.html#_list12).\
    \ Sending trigger messages to targets\n\n```\n-(void) triggerActivatedBy:(CCNode*)activator\n\
    {\n    NSPointerArray* targets = [targetArrays objectForKey:_name];\n\nfor (id\
    \ target in targets)\n    {\n         [target didTriggerWithNode:activator];\n\
    \    }\n\nif (_repeatsForever == NO)\n    {\n        NSPointerArray* triggers\
    \ = [triggerArrays objectForKey:_name];\n        [self updateTriggers:triggers];\n\
    \        [self cleanupTriggers:triggers];\n    }\n}\n```\n\nBased on the trigger's\
    \ `_name`, the list of targets is obtained from `targetArrays`. All targets are\
    \ enumerated to send the `didTriggerWithNode:` message to each target, which allows\
    \ each target to run custom code when triggered.\n\nDeclaring the `target` variable\
    \ with the `id` keyword in the `for` loop allows you to send the `didTriggerWithNode:`\
    \ message without the compiler complaining that the selector is not declared.\
    \ If for some reason you need to declare `target` as `CCNode*`, you will have\
    \ to include the `TriggerDelegate` protocol to tell the compiler that you are\
    \ certain that this reference implements the `TriggerDelegate` selectors. The\
    \ alternative `for` loop would then have to look like this:\n\n```\nfor (CCNode<TriggerDelegate>*\
    \ target in targets)\n```\n\nAlso note that individual target variables may be\
    \ `nil` because `targets` is an array storing its pointers weakly. Fortunately,\
    \ you don't need to perform an extra `nil` check because sending messages to `nil`\
    \ objects is legal in Objective-C, effectively skipping all `nil` targets.\n\n\
    **Caution**  As with casting, adding a protocol to a variable declaration does\
    \ not automatically make the object implement the protocol's selectors. So this\
    \ can still raise an undeclared selector runtime error if a target node's class\
    \ doesn't implement the `didTriggerWithNode:` method.\n\n## Cleaning Up Triggers\
    \ and Targets\n\nUnless the trigger is repeating—meaning its initial `triggerCount`\
    \ was set to 1 or more—the `NSPointerArray` containing all triggers of the same\
    \ name needs to be updated and possibly cleaned up. That's what the last two methods\
    \ are for.\n\nAdd the `updateTriggers:` and `cleanupTriggers:` methods in [Listing\
    \ 5-13](#part0014.html#list13) below the `triggerActivatedBy:` method.\n\n[**Listing\
    \ 5-13**](#part0014.html#_list13). Update and cleanup triggers"
  raw: 'In the first line, an NSPointerArray is obtained by looking up the object
    using the trigger’s _name in the triggerArrays. Initially, there will be no such
    object, resulting in triggers being nil. If that is the case, the if block will
    create an NSPointerArray and assign it to triggers, as well as storing it in the
    triggerArrays dictionary using the trigger’s _name as the key.


    The curious part is definitely the NSPointerArray. It sounds like a regular NSArray
    or NSMutableArray, but it’s actually not a subclass of either. It does behave
    much like a trimmed-down variant of NSMutableArray, though. And its specialty
    is storing pointer references and allowing you to store zeroing weak references
    to objects—meaning the triggers array does not retain the trigger nodes added
    to it. If a trigger node stored in the triggers array deallocates, the Objective-C
    runtime will automatically set the corresponding pointer to nil in the array rather
    than leaving a dangling pointer (which, when used, will cause crashes or bugs).
    The weakObjectsPointerArray initializer configures the array to behave this way.


    But why? Consider that both the trigger and target nodes could be removed from
    the node hierarchy at any given point in time, whether they have been triggered
    or not. Trigger nodes should not be kept from deallocating simply because you
    maintain a list of triggers in a global array. Hence, storing them weakly (not
    retaining) in an NSPointerArray allows triggers that are removed from the node
    hierarchy to deallocate.


    **Caution**  NSPointerArray is available only on devices running iOS 6.0 or newer.


    With the triggers array set up, all that’s left to do is pass in self in the call
    to addPointer:, but not without casting it to (void*) because NSPointerArray stores
    generic void* pointer values. The (void*) cast doesn’t alter the object reference
    in any way; it’s merely a way of stating to the compiler that the self object
    can safely be represented as a void* pointer.


    Finding and Storing Targets


    The remaining lines of [Listing 5-8](#part0014.html#list8) that we haven’t discussed
    so far are reprinted in [Listing 5-10](#part0014.html#list10) for the sake of
    clarity, focus, and zen.


    [***Listing 5-10***](#part0014.html#_list10). Searching for targets


    ```

    if ([targetArrays objectForKey:_name] == nil)

    {

        NSPointerArray* targets = [NSPointerArray weakObjectsPointerArray];

        [targetArrays setObject:targets forKey:_name];


    [self addTargetsTo:targets searchInNode:self.scene];

    }

    ```


    Notice that targets are searched only when there’s no corresponding entry of the
    given _name in the targetArrays dictionary. This is to prevent searching the same
    targets multiple times in cases where you have multiple triggers of the same name.
    Only the first trigger needs to search for targets because the other triggers
    will refer to the same targets.


    If there’s no array with the given _name in targetArrays, the code in [Listing
    5-10](#part0014.html#list10) will create an NSPointerArray storing weak pointer
    references and assign it to targets. The same array is also assigned to targetArrays
    using the trigger _name as its key. Next a method is called that performs the
    actual search recursively, starting with the self.scene node. It adds all the
    target nodes of the same name to the targets array.


    The addTargetsTo:searchInNode: method is shown in [Listing 5-11](#part0014.html#list11)—you
    should add this method to your Trigger.m file just below the onEnter method.


    [***Listing 5-11***](#part0014.html#_list11). Recursively searching for and gathering
    target nodes


    ```

    -(void) addTargetsTo:(NSPointerArray*)targets searchInNode:(CCNode*)node

    {

        for (CCNode* child in node.children)

        {

            if ([child.name isEqualToString:_name])

            {

                if ([child conformsToProtocol:@protocol(TriggerDelegate)])

                {

                    [targets addPointer:(void*)child];

                }

            }


    [self addTargetsTo:targets searchInNode:child];

        }

    }

    ```


    The addTargetsTo:searchInNode: method runs recursively and tries to collect all
    instances of nodes given a specific name and whose class conforms the TriggerDelegate
    protocol. You can’t use getChildByName: here because that will return only the
    first child node with the given name, but you need a list of all nodes of the
    same name.


    If a target node has the correct name and conforms to the TriggerDelegate protocol,
    a reference to the target node is added to the targets array.


    The last line continues the recursive search by calling the addTargetsTo:searchInNode:
    method again, but with child as the parameter. This ensures that every node in
    the scene is processed once and not a single one will be missed.


    It also means the trigger system in its current version won’t recognize nodes
    added after loading the GameScene.ccb file. If you need this, I’ll leave it as
    an exercise for you to do.


    You could add a +(void) addTarget:(CCNode*)target method to the Trigger class
    that assigns the target node, based on its name, to the correct targets array
    stored in targetArrays. You should verify that the target node conforms to the
    TriggerDelegate protocol before adding it. To add a target node, you could then
    call [Trigger addTarget:aTargetNode] from any other class, provided that you did
    add #import "Trigger.h" to that class’ implementation file.


    Forwarding Trigger Events to Targets


    What’s left is to inform target nodes when the trigger is activated. This is where
    the triggerActivatedBy: method in [Listing 5-12](#part0014.html#list12) comes
    into play.


    Add the code in [Listing 5-12](#part0014.html#list12) to Trigger.m below the addTargetsTo:searchInNode:
    method.


    [***Listing 5-12***](#part0014.html#_list12). Sending trigger messages to targets


    ```

    -(void) triggerActivatedBy:(CCNode*)activator

    {

        NSPointerArray* targets = [targetArrays objectForKey:_name];


    for (id target in targets)

        {

             [target didTriggerWithNode:activator];

        }


    if (_repeatsForever == NO)

        {

            NSPointerArray* triggers = [triggerArrays objectForKey:_name];

            [self updateTriggers:triggers];

            [self cleanupTriggers:triggers];

        }

    }

    ```


    Based on the trigger’s _name, the list of targets is obtained from targetArrays.
    All targets are enumerated to send the didTriggerWithNode: message to each target,
    which allows each target to run custom code when triggered.


    Declaring the target variable with the id keyword in the for loop allows you to
    send the didTriggerWithNode: message without the compiler complaining that the
    selector is not declared. If for some reason you need to declare target as CCNode*,
    you will have to include the TriggerDelegate protocol to tell the compiler that
    you are certain that this reference implements the TriggerDelegate selectors.
    The alternative for loop would then have to look like this:


    ```

    for (CCNode<TriggerDelegate>* target in targets)

    ```


    Also note that individual target variables may be nil because targets is an array
    storing its pointers weakly. Fortunately, you don’t need to perform an extra nil
    check because sending messages to nil objects is legal in Objective-C, effectively
    skipping all nil targets.


    **Caution**  As with casting, adding a protocol to a variable declaration does
    not automatically make the object implement the protocol’s selectors. So this
    can still raise an undeclared selector runtime error if a target node’s class
    doesn’t implement the didTriggerWithNode: method.


    Cleaning Up Triggers and Targets


    Unless the trigger is repeating—meaning its initial triggerCount was set to 1
    or more—the NSPointerArray containing all triggers of the same name needs to be
    updated and possibly cleaned up. That’s what the last two methods are for.


    Add the updateTriggers: and cleanupTriggers: methods in [Listing 5-13](#part0014.html#list13)
    below the triggerActivatedBy: method.


    [***Listing 5-13***](#part0014.html#_list13). Update and cleanup triggers'
  trans: "\n# NSPointerArray 与触发/目标管理\n\n## 使用 NSPointerArray 设置触发器\n\n第一行代码通过触发器\
    \ `_name` 在 `triggerArrays` 中查找对象，获取一个 `NSPointerArray`。初始状态下不存在这样的对象，因此 `triggers`\
    \ 为 `nil`。如果是这种情况，`if` 代码块将创建一个 `NSPointerArray` 并赋值给 `triggers`，同时使用触发器 `_name`\
    \ 作为键将其存入 `triggerArrays` 字典中。\n\n有趣的部分无疑是 `NSPointerArray`。它听起来像是普通的 `NSArray`\
    \ 或 `NSMutableArray`，但实际上不是这两者的子类。不过它的行为很像简化版的 `NSMutableArray`。它的特长是存储指针引用，并允许你存储对对象的零弱引用——这意味着触发器数组不会保留添加到其中的触发节点。如果存储在触发器数组中的触发节点被释放，Objective-C\
    \ 运行时会自动将数组中对应的指针设为 `nil`，而不是留下悬空指针（使用悬空指针会导致崩溃或错误）。`weakObjectsPointerArray`\
    \ 初始化器正是将数组配置为这种工作方式。\n\n但这是为什么呢？考虑到触发节点和目标节点都可能随时从节点层级中移除，无论它们是否已被触发。触发节点不应该仅仅因为你在全局数组中维护了一个触发器列表而无法被释放。因此，将它们弱引用（不保留）存储在\
    \ `NSPointerArray` 中，允许从节点层级中移除的触发节点正常释放。\n\n**注意**  `NSPointerArray` 仅适用于运行 iOS\
    \ 6.0 或更高版本的设备。\n\n设置好触发器数组后，剩下的就是在调用 `addPointer:` 时传入 `self`，但需要将其强制转换为 `(void*)`，因为\
    \ `NSPointerArray` 存储的是通用的 `void*` 指针值。`(void*)` 强制转换不会以任何方式改变对象引用；它只是向编译器表示 `self`\
    \ 对象可以安全地表示为 `void*` 指针。\n\n## 查找并存储目标\n\n为了清晰、专注于要点并保持简洁，清单 5-8 中我们尚未讨论的剩余行重新列在清单\
    \ 5-10 中。\n\n**清单 5-10**. 搜索目标\n\n```\nif ([targetArrays objectForKey:_name] ==\
    \ nil)\n{\n    NSPointerArray* targets = [NSPointerArray weakObjectsPointerArray];\n\
    \    [targetArrays setObject:targets forKey:_name];\n\n[self addTargetsTo:targets\
    \ searchInNode:self.scene];\n}\n```\n\n请注意，只有在 `targetArrays` 字典中没有给定 `_name`\
    \ 的对应条目时，才会搜索目标。这是为了防止在存在多个同名触发器的情况下重复搜索相同的目标。只有第一个触发器需要搜索目标，因为其他触发器将引用相同的目标。\n\
    \n如果 `targetArrays` 中没有给定 `_name` 的数组，清单 5-10 中的代码将创建一个存储弱指针引用的 `NSPointerArray`\
    \ 并赋值给 `targets`。同一个数组也会使用触发器 `_name` 作为键赋值给 `targetArrays`。接下来调用一个方法，该方法从 `self.scene`\
    \ 节点开始递归执行实际搜索，将所有同名的目标节点添加到 `targets` 数组中。\n\n`addTargetsTo:searchInNode:` 方法如清单\
    \ 5-11 所示——你应该将此方法添加到 `Trigger.m` 文件中 `onEnter` 方法的下方。\n\n**清单 5-11**. 递归搜索并收集目标节点\n\
    \n```\n-(void) addTargetsTo:(NSPointerArray*)targets searchInNode:(CCNode*)node\n\
    {\n    for (CCNode* child in node.children)\n    {\n        if ([child.name isEqualToString:_name])\n\
    \        {\n            if ([child conformsToProtocol:@protocol(TriggerDelegate)])\n\
    \            {\n                [targets addPointer:(void*)child];\n         \
    \   }\n        }\n\n[self addTargetsTo:targets searchInNode:child];\n    }\n}\n\
    ```\n\n`addTargetsTo:searchInNode:` 方法递归运行，尝试收集所有具有特定名称且其类遵循 `TriggerDelegate`\
    \ 协议的节点实例。此处不能使用 `getChildByName:`，因为该方法只会返回第一个具有给定名称的子节点，而你需要的是所有同名节点的列表。\n\n\
    如果目标节点名称正确且遵循 `TriggerDelegate` 协议，则将该目标节点的引用添加到 `targets` 数组中。\n\n最后一行通过再次调用\
    \ `addTargetsTo:searchInNode:` 方法（但以 `child` 作为参数）继续递归搜索。这确保了场景中的每个节点都会被处理一次，不会遗漏任何一个。\n\
    \n这也意味着当前版本的触发器系统无法识别在加载 `GameScene.ccb` 文件后添加的节点。如果你需要这个功能，我会将其留作练习供你完成。\n\n\
    你可以向 `Trigger` 类添加一个 `+(void) addTarget:(CCNode*)target` 方法，该方法根据目标节点的名称将其分配到存储在\
    \ `targetArrays` 中的正确目标数组。在添加目标节点之前，你应该验证该目标节点是否遵循 `TriggerDelegate` 协议。然后，你可以从任何其他类中调用\
    \ `[Trigger addTarget:aTargetNode]` 来添加目标节点，前提是你已在该类的实现文件中添加了 `#import \"Trigger.h\"\
    `。\n\n## 将触发事件转发给目标\n\n剩下的就是在触发器被激活时通知目标节点。这就是清单 5-12 中的 `triggerActivatedBy:`\
    \ 方法发挥作用的地方。\n\n将清单 5-12 中的代码添加到 `Trigger.m` 文件中 `addTargetsTo:searchInNode:`\
    \ 方法的下方。\n\n**清单 5-12**. 向目标发送触发消息\n\n```\n-(void) triggerActivatedBy:(CCNode*)activator\n\
    {\n    NSPointerArray* targets = [targetArrays objectForKey:_name];\n\nfor (id\
    \ target in targets)\n    {\n         [target didTriggerWithNode:activator];\n\
    \    }\n\nif (_repeatsForever == NO)\n    {\n        NSPointerArray* triggers\
    \ = [triggerArrays objectForKey:_name];\n        [self updateTriggers:triggers];\n\
    \        [self cleanupTriggers:triggers];\n    }\n}\n```\n\n根据触发器的 `_name`，从 `targetArrays`\
    \ 获取目标列表。枚举所有目标，向每个目标发送 `didTriggerWithNode:` 消息，这允许每个目标在被触发时运行自定义代码。\n\n在 `for`\
    \ 循环中使用 `id` 关键字声明 `target` 变量，允许你发送 `didTriggerWithNode:` 消息而不会导致编译器报错选择器未声明。如果出于某种原因你需要将\
