    \ OpenGL 命令不同，`position` 以点（points）为单位。这是新 `Cocos2D` 渲染 API 的一个优势——在编写渲染代码时，不再需要考虑点到像素的转换。在两个纹理坐标字段中，本示例仅使用了\
    \ `texCoord1`。它定义了映射到该顶点的纹理内的坐标。纹理坐标表示为纹理大小的百分比，范围在 `0.0` 到 `1.0` 之间。最后，颜色是带有\
    \ alpha 值的 RGB 值，范围也在 `0.0` 到 `1.0` 之间。\n\n`_enlargeTextureRadius` 实例变量将用于增加纹理坐标的半径。这确保了玩家图像不会被裁剪。`_enlargeDrawRadius`\
    \ 用于整体放大玩家，有效地将其缩放。稍后我会对此进行更多说明。\n\n现在，在 `didLoadFromCCB` 下方添加 列表 10-10 中缺失的 `setup`\
    \ 方法。\n\n**列表 10-10.** *内存缓冲区的初始设置与存储物体的初始位置*\n\n```\n-(void) setup\n{\n    [self\
    \ freeAllocatedMemory];\n\n    _numVertices = (int)_children.count + 1;\n    _vertices\
    \ = calloc(_numVertices, sizeof(CCVertex));\n    _initialBodyPositions = calloc(_numVertices,\
    \ sizeof(CGPoint));\n\n    int i = 0;\n    CGPoint centerPos = ((CCNode*)_children[0]).positionInPoints;\n\
    \n    for (CCNode* child in _children)\n    {\n        if (child.physicsBody)\n\
    \        {\n            if (i == 0)\n            {\n                _initialBodyPositions[i]\
    \ = centerPos;\n            }\n            else\n            {\n             \
    \   CGPoint centerToChild = ccpSub(child.positionInPoints,\n                 \
    \                              centerPos);\n                CGFloat newRadius\
    \ = ccpLength(centerToChild) +\n                                    _enlargeTextureRadius;\n\
    \                CGPoint newPos = ccpMult(ccpNormalize(centerToChild),\n     \
    \                                    newRadius);\n                _initialBodyPositions[i]\
    \ = ccpAdd(newPos, centerPos);\n            }\n\n            i++;\n        }\n\
    \    }\n\n    [self updateTextureCoordinates];\n}\n```\n\n`setup` 方法首先调用了 `freeAllocatedMemory`。这只是为了防止该方法运行多次。如果先前分配的内存没有被释放，它将丢失（泄漏），因为内存仍被分配，但你将无法再访问它。这是因为\
    \ `setup` 方法分配了新的内存块，并将指针赋值给了 `_vertices` 和 `_initialBodyPositions`。\n\n`_numVertices`\
    \ 实例变量被设置为子节点数量加一。有九个子节点（一个中心节点加八个圆周节点），这样就有 10 个顶点。为什么是 10？第十个顶点是用于闭合循环的。中心顶点是第一个，然后是右侧顶点，接着是其他顶点，直到右上顶点。这就是需要再复制一次右侧顶点的地方，以便可以绘制由顶点中心（1）、右上（9）和右侧（2）形成的三角形。请参阅\
    \ Figure 10-5 以获得直观说明。\n\n![9781484202630_Fig10-05.jpg](img/00148.jpeg)\n\n**Figure\
    \ 10-5.** *这个* *三角形扇* *（带有顶点编号）用于绘制带纹理的软体玩家*\n\n本质上，软体圆必须被分割成三角形，才能被 `Cocos2D`\
    \ 渲染器绘制。第一个三角形是 `1-2-3`，后续的三角形可以通过简单地每添加一个顶点来增加。在 `1-2-3` 之后，下一个三角形是 `1-3-4`，接着是\
    \ `1-4-5`，以此类推。这被称为*三角形扇*，这是一种绘制模式，其中每个后续顶点都被假定为与起始顶点和上一个顶点形成另一个三角形。\n\n在 `列表\
    \ 10-10` 中，`_vertices` 和 `_initialBodyPositions` 都被分配了内存。分配的内存量是 `_numVertices`\
    \ 乘以相应类型的大小。例如，`_vertices` 将分配 `10 * 48` 字节的内存，总共 480 字节。所以实际上并不多，特别是相对于精灵的纹理内存而言。这两个指针都指向一个已分配的内存块，并且都可以像\
    \ `Objective-C` 数组一样，使用与 `C` 语言相同的下标操作符进行访问。例如，请参见 `列表 10-11` 中最后一行的赋值。\n\n**提示**\
    \ 纹理内存大小是纹理尺寸乘以颜色深度的倍数。相应图像的文件大小通常要小得多。一个常见的初学者错误是认为纹理内存使用量与图像文件大小相同。唉，纹理内存（对于未压缩格式）可以通过以下伪代码计算：`pixelWidth\
    \ * pixelHeight * (colorBitDepth / 8)`。例如，一个 `4096x4096` 的 32 位颜色图像作为未压缩纹理将使用这么多内存：`4096\
    \ * 4096 * (32 / 8) = 67,108,864` 字节（等于 64 兆字节）。\n\n中心节点的位置需要作为参考（原点）点，并存储在 `centerPos`\
    \ 变量中。你需要在 `for` 循环内部进行计算，该循环枚举所有子节点。第一个节点是中心节点。它的位置照原样赋值给 `_initialBodyPositions`。剩余的点会被更新，以将圆的半径增加\
    \ `_enlargeTextureRadius` 实例变量中指定的值。`列表 10-11` 重印了循环的这一部分。\n\n**列表 10-11.** 假设物体初始位置位于一个更大的圆上\n\
    \n```\nCGPoint centerToChild = ccpSub(child.positionInPoints, centerPos);\nCGFloat\
    \ newRadius = ccpLength(centerToChild) + _enlargeTextureRadius;\nCGPoint newPos\
    \ = ccpMult(ccpNormalize(centerToChild), newRadius);\n_initialBodyPositions[i]\
    \ = ccpAdd(newPos, centerPos);\n```\n\n从子节点的位置中减去 `centerPos` 会返回一个相对于原点 (`0x0`)\
    \ 的位置。这与你在 `列表 10-1` 中将原点加到圆上每个点所做的操作完全相反。该点相对于原点的长度返回圆的半径，该半径增加了 `_enlargeTextureRadius`。这个\
    \ `newRadius` 然后与归一化后的 `centerToChild` 点相乘。*归一化* 是指将向量的长度缩减为一个单位，同时保持其相对方向。\n\n\
    以 `Figure 10-5` 中的顶点 #3 为例。假设它到中心（顶点 #1）的长度是 25 个点，这等于圆的半径。现在，如果你将顶点 1 和 3 之间的归一化向量乘以\
    \ 33，你将得到一个点 *3b*，它沿着由顶点 1 到 3 定义的直线向外延伸。对所有点都这样做，最终圆会变得更大。\n\n由于 `_initialBodyPositions`\
    \ 用于计算纹理坐标，让我说明一下为什么可能需要进行此操作。`Figure 10-3` 已经说明了某些节点仍然位于图像内部，导致出现 `Figure 10-6`\
    \ 中所示的次优纹理坐标。为了避免裁剪掉部分纹理，纹理坐标需要假设一个半径稍大的圆。否则，玩家的一些头发、肚子和嘴巴可能会丢失。另一方面，这个增加的半径不能太大。如果太大，`Global`\
    \ Sprite Sheet 中其他图像的部分也可能被绘制出来。\n\n![9781484202630_Fig10-06.jpg](img/00149.jpeg)\n\
    \n**Figure 10-6.** *纹理坐标* *需要足够大以包含整个图像，但又不能过大以至于绘制出精灵表中相邻图像的部分*\n"
- fmt: '# Calculating Texture Coordinates


    Calculating the texture coordinates is done in the `updateTextureCoordinates`
    method. Add the code in [Listing 10-12](#part0020.html#list12) below the `setup`
    method. The method was separated because if you want to run a sprite frame animation
    in the soft-body player, you have to call this method every time the `spriteFrame`
    property changes in order to update the texture coordinates to the new sprite
    frame’s coordinates.


    [***Listing 10-12***](#part0020.html#_list12). Updating texture coordinates


    ```

    -(void) updateTextureCoordinates

    {

        CCSpriteFrame* spriteFrame = self.spriteFrame;

        CGSize textureSize = spriteFrame.texture.contentSize;

        CGRect frameRect = spriteFrame.rect;

        CGSize frameSize = spriteFrame.originalSize;


    for (int i = 0; i < _numVertices; i++)

        {

            _vertices[i].color = GLKVector4Make(1.0, 1.0, 1.0, 1.0);


    CGPoint pos = _initialBodyPositions[i];

            pos.x += frameRect.origin.x;

            pos.y = (frameRect.origin.y + frameSize.height) - pos.y;


    _vertices[i].texCoord1 = (GLKVector2){

                MAX(0.0, MIN(pos.x / textureSize.width, 1.0)),

                1.0 - MAX(0.0, MIN(pos.y / textureSize.height, 1.0)),

            };

        }


    int lastIndex = _numVertices - 1;

        _vertices[lastIndex].texCoord1 = _vertices[1].texCoord1;

        _vertices[lastIndex].color = _vertices[1].color;

    }

    ```


    At first, the `updateTextureCoordinates` creates local copies of some variables.
    The `CCSpriteFrame` class defines the region within a texture. A Sprite Sheet
    texture typically contains multiple images, and sprite frames are the way to access
    these images.


    The `spriteFrame.texture.contentSize` is the total size of the texture in points.
    This size will be consistent across all devices, regardless of whether the texture
    is the *tablethd* version or the regular phone version. The sprite frame’s *rect*
    defines the position and size within the texture where this particular image is
    located. The `originalSize` property refers to the untrimmed size.


    Within the for loop in [Listing 10-12](#part0020.html#list12), each vertex color
    is set to a full white, opaque color. If they weren’t set to this color, you wouldn’t
    be able to see the texture you’re going to draw. Feel free to try different colors
    and transparency.


    Each body’s position is first offset by the sprite frame’s origin. Since OpenGL
    draws textures upside down, and internally Cocos2D maps most commands directly
    to OpenGL (or Metal) commands, the *y* coordinate needs to be subtracted from
    the sprite frame’s origin plus its height. Otherwise, the player would be drawn
    upside down.


    The resulting position is assigned to the `texCoord1` field of the vertex. But
    first, it is converted from absolute coordinates in points to percentage values
    in the range of 0.0 to 1.0. The `MIN`/`MAX` macros ensure the values aren’t outside
    of this range, which would likely provoke a crash. Once more, the *y* coordinate
    needs to be upside down—subtracting the result from 1.0 inverses the texture coordinate.


    After all nine `_numVertices` have been processed, there’s but one last vertex.
    The values are simply copied from the second vertex (at index 1), thus creating
    a duplicate of vertex #2, which was shown in [Figure 10-6](#part0020.html#Fig6)
    as the last vertex in the `_vertices` array.


    This concludes the setup of vertices and texture coordinates.


    # Not Trimming Sprite Sheet Sprites


    While we’re on the topic of sprite frames, you should uncheck the *Trim sprites*
    check box for the *Global* Sprite Sheet in SpriteBuilder, as shown in [Figure
    10-7](#part0020.html#Fig7).


    ![9781484202630_Fig10-07.jpg](images/00150.jpeg)


    [Figure 10-7](#part0020.html#_Fig7). Uncheck the “Trim sprites” check box to prevent
    the images from being rotated


    Unchecking *Trim sprites* prevents the player image from possibly being rotated.
    The custom drawing code does not account for the sprite frame possibly being rotated
    within the Sprite Sheet.


    # Drawing the Texture with CCRenderer


    What’s left is to actually draw the texture based on each body’s current position.
    In Cocos2D, all custom drawing has to be done within the `draw:transform:` method,
    using the supplied `CCRenderer` object. Add the code in [Listing 10-13](#part0020.html#list13)
    below the `updateTextureCoordinates` method in *SoftBodyDrawNode.m*.


    [***Listing 10-13***](#part0020.html#_list13). *Drawing the* *soft-body texture*


    ```

    -(void) draw:(CCRenderer *)renderer transform:(const GLKMatrix4 *)transform

    {

        int numTriangles = _numVertices - 2;

        CCRenderBuffer buffer = [renderer enqueueTriangles:numTriangles

                                               andVertexes:_numVertices

                                                 withState:self.renderState

                                           globalSortOrder:0];


    int i = 0;

        CGPoint centerPos = ((CCNode*)_children[0]).position;


    for (CCNode* child in _children)

        {

            CGPoint vertexPos = child.position;

            if (i > 0)

            {

                CGPoint vectorToCenter = ccpSub(child.position, centerPos);

                CGFloat length = ccpLength(vectorToCenter);

                CGPoint normalVector = ccpMult(vectorToCenter, 1.0 / length);

                vectorToCenter = ccpMult(normalVector, length +

                                         _enlargeDrawRadius);

                vertexPos = ccpAdd(vectorToCenter, centerPos);

            }


    _vertices[i].position = GLKVector4Make(vertexPos.x, vertexPos.y,

                                                   0.0, 1.0);


    CCVertex v = CCVertexApplyTransform(_vertices[i], transform);

            CCRenderBufferSetVertex(buffer, i, v);

            i++;

        }


    int lastIndex = _numVertices - 1;

        _vertices[lastIndex].position = GLKVector4Make(

                                          _vertices[1].position.x,

                                          _vertices[1].position.y,

                                          0.0, 1.0);

        CCVertex v = CCVertexApplyTransform(_vertices[lastIndex],

                                            transform);

        CCRenderBufferSetVertex(buffer, lastIndex, v);


    for (int i = 0; i < numTriangles; i++)

        {

            CCRenderBufferSetTriangle(buffer, i, 0, i+1, i+2);

        }

    }

    ```


    First, the number of triangles is determined. Since the first three vertices form
    one triangle and each subsequent triangle forms another triangle in a triangle
    fan, the number of triangles is the number of vertices minus two. The `CCRenderer`
    object is then queried for a `CCRenderBuffer` struct type. The buffer is allocated
    by `CCRenderer` to hold the given number of triangles and vertices.


    The render state to draw textured triangles is already set up for you by the `CCSprite`
    base class, so you can simply pass in `self.renderState`. The render state is
    simply the combination of the blend mode, shader, and texture. Already and implicitly
    set up by `CCSprite` are the blend mode and shader program, whereas the texture
    is assigned by `CCBReader` via the `spriteFrame` property. In case you want to
    know, the default blend mode and shader for a `CCSprite` are set as follows:


    ```

    self.blendMode = [CCBlendMode premultipliedAlphaMode];

    self.shader = [CCShader positionTextureColorShader];

    ```


    **Tip** If you want to do custom drawing with textures, it’ll be easiest to do
    so in a `CCSprite` subclass. Otherwise, you’ll have to create a `CCRenderState`
    object yourself in order to pass the blend mode, shader program and a (optional)
    texture to `CCRenderer`. You may also want to make use of the `CCRenderCheckVisibility`
    method that prevents anything from being drawn outside the region defined by this
    method. It’s not used in this example because the player is always visible. And
    if you have to or want to use OpenGL commands directly, you should do so by writing
    the code in a block or method enqueued by `CCRenderer`’s `enqueueBlock:` or `enqueueMethod:`
    method. Bypassing `CCRenderer` for custom drawing code may lead to unexpected
    side effects, and you won’t benefit from Cocos2D’s new Metal renderer (not to
    be confused with Nu Metal).'
