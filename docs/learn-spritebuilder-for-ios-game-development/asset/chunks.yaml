    介绍 `SpriteBuilder` 及其用户界面。此处解释了最常见的任务。同时，本章包含对 `Cocos2D` 编程的快速介绍。你将最终创建一个项目，通过按下按钮即可在场景之间切换。


    第 3 章—控制与滚动


    在本章中，你将添加触摸输入和多个背景层的视差滚动。你将学习如何使用精灵表和预制件。引入了一个玩家预制件，其简单的移动通过移动动作来实现。


    第 4 章—物理与碰撞


    你将学习如何为游戏添加物理效果，特别是不可移动、不可穿透的墙壁以及动态物体。玩家移动被实际物理效果所取代。碰撞回调方法用于触发关卡退出。还将解释如何启用物理调试绘制。


    第 5 章—时间线与触发器


    深入解释时间线，然后使用它来动画化旋转的物理对象。你将学习如何创建触发器区域，当玩家进入时运行代码。最终项目现在可以实现简单的物理交互。


    第 6 章—菜单与弹出视图


    解释了一种强大且简单的方法来创建弹出式菜单，例如暂停菜单和游戏结束菜单。同样的概念可用于创建全屏菜单，而无需中断正在运行的场景。菜单通过时间线进行动画，并使用时间线委托方法在时间线结束时接收通知。


    第 7 章—主场景与游戏状态


    主菜单设计有动画背景，以及一个带有音频音量滑块的设置菜单。引入了一个`GameState`类，它通过`NSUserDefaults`存储全局的、用户特定的游戏数据。


    第 8 章—选择与解锁关卡


    借助滚动视图节点添加了关卡选择界面。详细解释了`CCScrollView`的工作原理、如何编程以及如何响应其委托方法。关卡选择页面分为多个世界，每个关卡通过完成前一关卡来解锁。


    第 9 章—物理关节


    本章专门介绍如何用关节（特别是链条、绳索和弹簧）创建物理对象。详细解释了关节的工作原理、用途以及应避免的操作。


    第 10 章—软体物理


    玩家预制件被替换为软体玩家。软体物体是一种由关节连接的可变形物理对象，其碰撞形状被分成多个较小的物体。本章还介绍了使用 `Cocos2D` 进行自定义渲染，因为玩家的纹理需要随时绘制以匹配其变形后的形状。


    第 11 章—音频与标签


    你将学习如何通过时间线播放简短音效，以及如何使用 `ObjectAL` 以编程方式播放音效，还将学习如何播放背景音乐。本章的另一半内容涉及`Label TTF`的属性，如阴影和轮廓，同时也解释了如何在
    `SpriteBuilder` 中创建、导入和使用位图字体。


    第 12 章—视觉效果与动画


    你将首次创建精灵帧动画，并使其与玩家的自定义渲染类协同工作。在关于视觉效果的章节中，必须介绍粒子效果节点。最终，将使用效果节点，这些本质上是着色器程序，你可以在
    `SpriteBuilder` 中添加和设计。在本章结束时，你几乎认不出原来的主菜单场景。


    第 13 章—移植到 Android


    首先，你将了解为 `Android` 开发所需的条件。然后，你将创建一个新项目，用于测试部署到 `Android` 设备。最后，你将转换 `Bouncy Beast`
    项目，并修复出现的任何编译、启动和布局问题。你将获得关于如何最好地使用 `SpriteBuilder` 进行跨平台开发的建议。


    第 14 章—调试与最佳实践


    本章介绍如何使用 `Xcode` 和 `Cocos2D` 进行调试。你将学习捕获或防止编程错误的技术。基本上，这是一本自助指南，很快就会证明其价值。此外，还有一节内容讲解如何解决一些最常见的
    `SpriteBuilder` 和 `Cocos2D` 问题。


    ## 开始之前


    如果你对 `SpriteBuilder`、`Cocos2D` 或相关技术及流程有任何疑问，请访问 `SpriteBuilder` 论坛（[`www.spritebuilder.com`](http://www.spritebuilder.com)）和
    `Cocos2D` 论坛（[`www.cocos2d-swift.org`](http://www.cocos2d-swift.org)）。


    我也经常在 `StackOverflow`（[`www.stackoverflow.com`](http://www.stackoverflow.com)）上回答标注了
    `Cocos2D` 标签的编程问题。

