  trans: '

    首先，创建一个将包含关卡节点的 CCB。由于关卡需要特定大小（本例中用于确定世界的可滚动区域），因此选择 `Layer` 文档类型最为合适。在发出 文件 ![image](img/00008.jpeg)
    新建 ![image](img/00008.jpeg) 文件命令之前，或者在右键单击 `Levels` 文件夹并选择新建文件之前，请先选中 `Levels`
    文件夹。这将弹出如图 2-13 所示的对话框。


    ![9781484202630_Fig02-13.jpg](img/00021.jpeg)


    图 2-13。 `Level1.ccb` 类型为 `Layer`，并使用自定义内容大小


    将新层命名为 `Level1.ccb`，并设置其大小为 `4000` x `500`。然后点击创建。最初，新的 CCB 将是空的（黑色）。


    `Level1.ccb` 文件应位于名为 `Levels` 的子文件夹中。如果不在，请将 `Level1.ccb` 拖拽到 `Levels` 文件夹上，将其移动到
    `Levels` 文件夹中。项目的文件层级结构必须与图 2-14 所示完全一致。


    ![9781484202630_Fig02-14.jpg](img/00022.jpeg)


    图 2-14。 `Level1.ccb` 应位于名为 `Levels` 的文件夹中


    切换到节点库视图，将一个 `渐变节点` 拖拽到舞台或时间轴中的根节点上。


    ## 节点选择手柄


    在让这个渐变填充整个关卡之前，先来看一下节点的选择手柄。你可以很容易地在舞台上找到选中的节点，因为它的四个角都用小圆圈（即选择手柄）标记了出来。


    当鼠标移到舞台上选中的节点上时，鼠标指针会变为以下图标之一，并且通过点击和拖拽可以执行相应的操作：


    ![9781484202630_unFig02-01.jpg](img/00023.jpeg)


    在节点的矩形区域内，鼠标指针会显示为一个四向箭头十字 (1)。当鼠标指针为此形状时，点击并拖拽即可移动节点。如果箭头十字中心有一个圆圈 (2)，说明鼠标正悬停在节点的
    `anchorPoint` 附近，拖拽将会移动 `anchorPoint` 的位置。`anchorPoint` 本身常被误认为是重新定位节点的方式，但实际上它主要是节点旋转和缩放操作的中心点。通常，`anchorPoint`
    要么位于节点的左下角 `(0, 0)`，要么位于其中心 `(0.5, 0.5)`。


    **注意**：除非本书中特别说明，否则应将 `anchorPoint` 保留为其默认值。在开始拖拽节点前，请留意图标 1 和图标 2 之间的细微差别。


    双向箭头手柄 (3) 用于缩放节点，当鼠标悬停在四个选择手柄之一上时会出现。它可能被误认为是调整节点大小，但对于 `颜色节点` 和 `渐变节点` 以外的节点，通过更改缩放比例来改变节点大小会导致图像质量下降，尤其是在通过缩放放大节点时。如果将鼠标指针稍微移到节点外部但靠近选择手柄，其形状会变为弯曲的双向箭头
    (4)，此时拖拽可以旋转节点。


    最后，分成两半的双向箭头 (5) 表示倾斜操作。你可以抓住两个选择手柄之间的节点边缘，沿其轴方向移动该边缘，从而形成梯形节点。


    ## 编辑节点属性


    对于精确的修改，鼠标拖拽操作并不合适。你可以使用“对象”菜单中的“微移”、“移动”和“对齐”命令来进行更精细的控制，但这也不能适用于所有情况。大多数情况下，当你知道某个属性的确切值时，你会希望使用详情视图右侧的“项目属性视图”。所有节点类型在顶部都显示相同的基本属性，标记为
    `CCNode`，如图 2-15 所示。


    ![9781484202630_Fig02-15.jpg](img/00024.jpeg)


    图 2-15。所有节点都使用 `CCNode` 属性


    “可见”复选框不言自明，“名称”文本字段可用于为节点指定自定义名称，以便在代码中识别。


    “位置”设置使用点（points）为单位，而不是像素。例如，Retina 和非 Retina iPad 的点尺寸相同，都是 `1024 x 768` 点。这使得位置对所有设备通用。为了进一步支持对齐或个人偏好，你可以更改节点的参考角点（参见图
    2-16）。默认情况下，它设置为“左下”，这意味着节点的位置是相对于根节点的左下角。更改为“左上”后，节点的位置将与 `UIView` 相同，即视图的位置相对于视图、图层或屏幕的左上角。


    ![9781484202630_Fig02-16.jpg](img/00025.jpeg)


    图 2-16。位置属性的角点对齐设置


    位置的缩放类型也可以针对每个轴单独调整。默认情况下，坐标被视为 *以点为单位*，但在 iPad 上始终会放大。这样做的效果是，当您将文档更改为 文档 ![image](img/00008.jpeg)
    分辨率 ![image](img/00008.jpeg) 平板电脑 时，节点在平板设备上的相对位置保持不变。


    默认情况下，SpriteBuilder 假设通用应用会将 iPad 屏幕视为大致大两倍的屏幕——`1024 x 768` 的 iPad 点范围比宽屏 iPhone
    5C/5S 的 `568 x 320` 尺寸宽 `1.8` 倍、高 `2.4` 倍。如果你不希望这样，则必须将节点位置更改为 *以 UI 点为单位*（参见图
    2-17），以便真正能够在更大的屏幕空间上摆放更多节点。换句话说，玩家在 iPad 上实际上能够看到更多同一世界的内容。


    ![9781484202630_Fig02-17.jpg](img/00026.jpeg)


    图 2-17。位置类型设置


    相同的 UI 点缩放类型也可以应用于节点的缩放属性。


    最后，*父容器百分比* 设置是位置设置中最重要且最常用的一项。它允许你完全忽略大多数与分辨率相关的考虑。最常见的用途是快速将节点在屏幕上居中，无论目标设备是
    3.5 英寸或 4 英寸的 iPhone 还是 iPad。只需将两个坐标的位置类型都设置为父容器百分比，并输入 `50%` x `50%` 即可。


    内容大小属性扩展了此缩放类型列表，增加了两个额外设置：以点为单位的内边距宽度和以 UI 点为单位的内边距宽度，如图 2-18 所示。常规点缩放与 UI 点缩放的差异如上所述。内边距将
    `contentSize` 从定义节点的实际宽度和高度，更改为定义节点与父节点边缘之间的距离。


    ![9781484202630_Fig02-18.jpg](img/00027.jpeg)


    图 2-18。可用于内容大小属性的大小类型


    假设一个示例节点以位置 `50%`, `50%` 和 `AnchorPoint` `0.5`, `0.5` 居中在图层上，那么 `100 x 40` 的内边距会将节点的
    `contentSize` 更改为比其父节点小 `100` x `40` 点。在这个例子中，节点完美居中，因此其左右两侧各小 `50` 点，上下两侧各小 `20`
    点。通过编辑位置和 `content size` 也可以达到同样的效果，只是不那么方便。


    ## 更改节点绘制顺序


    最后一个但同样重要的属性是绘制顺序，在 Cocos2d 中通常称为 `zOrder`。Sprite Kit 用户将其称为 `zPosition`。但是，在
    `CCNode` 属性或其他任何地方都没有这个属性。这里的技巧是，在 SpriteBuilder 中，绘制顺序仅由其父容器中子节点的顺序定义。在 SpriteBuilder
    中，更改绘制顺序的唯一方法是在时间轴视图中重新排列节点。

