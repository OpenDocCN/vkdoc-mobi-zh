- fmt: '您可以将齿轮和锯子对象从“Tileless Editor View”拖放到`gears and saws`节点中。对于本书的图形，我还建议您更改`gears
    and saws`节点的绘制顺序，使其绘制在巧克力边框之后。将`gears and saws`节点拖放到时间线中`borders`节点的上方。结果可能如图[Figure
    5-7](#part0014.html#Fig7)所示。


    ![9781484202630_Fig05-07.jpg](images/00082.jpeg)


    [Figure 5-7](#part0014.html#_Fig7). 添加到`Level1.ccb`中的齿轮和锯子对象


    顺便提一下：在`Level1.ccb`中，按下“Timeline Controls”中的“Play”按钮。您会注意到不仅关卡入口的甜甜圈有动画效果，齿轮和锯子对象也会播放各自的时间线。这允许您预览和微调动画，即便某些动画是在其他CCB文件中编辑的。


    例如，假设您想要两个齿轮对象在旋转时牙齿互相啮合，一个顺时针旋转，另一个逆时针旋转。为此，您需要更改关卡中某个齿轮实例的`Rotation`属性，以使齿轮牙齿啮合。`Sub
    File`节点的`Rotation`属性将定义所引用CCB文件动画的起始点（或偏移量）——类似于节点位置定义了位置（移动）动画的初始起始点。然后您可以定位这两个齿轮，并按下“Timeline
    Play”按钮查看它们是否啮合。如果没有，请再次选择齿轮`Sub File`节点——每次按下“Play”，它都会取消选择之前所有已选中的节点——并更改齿轮的`Rotation`属性。重复此操作，直到齿轮在运动中完美啮合。


    此时，您可能会产生疑问：在编辑时间线动画时，之前您无法编辑已动画化节点的属性，除非时间线光标恰好位于特定的关键帧上。但现在您可以播放和停止动画，无论时间线光标位于何处，您都可以编辑节点的属性，并且这些属性始终保持一致。这是为什么呢？


    要理解这一点，请考虑您正在编辑CCB文件（例如`Gear1.ccb`）中某个特定节点的关键帧。在这里，您通过为特定属性添加关键帧并编辑每个关键帧的属性值，来告诉节点在动画期间要执行的操作。具体到位置、旋转和缩放动画，这些属性必须相对于节点的当前状态来考虑。


    然后您将`Gear1.ccb`的一个实例放置到`Level1.ccb`中。这会创建一个引用`Gear1.ccb`的`Sub File`节点。该`Sub File`节点代表`Gear1.ccb`的一个特定实例。`Sub
    File`节点允许您指定被引用节点的初始位置、旋转和缩放。在播放期间，齿轮的时间线将相对于`Sub File`节点的位置、旋转和缩放进行播放。再次证明，通过简单地调整各个`Sub
    File`节点实例的动画起始值，就能实现更丰富的动画变化，这体现了使用多个CCB文件和`Sub File`节点的实用性。


    在关卡中至少放置一个齿轮或锯子对象后，您应该发布并运行Xcode项目。如果发现动画在旋转一圈后停止，请检查时间线链是否设置为循环，方法是将其设置为`Default
    Timeline`。


    ---


    ### 如何不让动画自动播放


    您是否注意到到目前为止，动画在启动游戏时都会自动播放？迟早，您会遇到不希望动画自动播放的情况。比如现在。


    假设您希望在游戏运行时的适当时间播放动画，这需要您进行设置和编码。要创建一个初始状态下不活动的锯子，您应该创建`Saw1.ccb`的副本。如果可以，建议使用SpriteBuilder的“Duplicate”命令；否则，按照之前描述的方法，使用Finder进行复制。将副本重命名为`Saw1_noautoplay.ccb`，并在SpriteBuilder中打开它。


    #### 编辑时间线以取消自动播放


    首先，您需要阻止动画立即启动。点击时间线列表（Timeline List）——即位于“Timeline Controls”下方、当前显示为“Default
    Timeline”的栏。参见[Figure 5-1](#part0014.html#Fig1)。如果上下文菜单未显示或与[Figure 5-8](#part0014.html#Fig8)所示不同，我确定您是试图右键单击它。请改用鼠标左键，就像操作时间线链一样。


    ![9781484202630_Fig05-08.jpg](images/00083.jpeg)


    [Figure 5-8](#part0014.html#_Fig8). 单击时间线列表会弹出时间线上下文菜单，您可以在其中选择、创建、复制和编辑时间线


    在时间线上下文菜单中，选择“Edit Timelines”。这将弹出一个对话框，类似[Figure 5-9](#part0014.html#Fig9)所示，但只包含`Default
    Timeline`条目。


    ![9781484202630_Fig05-09.jpg](images/00084.jpeg)


    [Figure 5-9](#part0014.html#_Fig9). 创建一个新的、未使用的`Timeline`，仅用于防止`Default Timeline`自动播放


    您会注意到`Default Timeline`的“Autoplay”复选框默认是选中的。首先，尝试取消选中它，以防止此时间线自动播放。如果可行，那就一切顺利。


    但如果无法取消选中（这是一个bug），只需使用`+`按钮添加另一个时间线，并选中新时间线的“Autoplay”复选框。这将创建第二个时间线，以便您通过勾选其“Autoplay”复选框来取消`Default
    Timeline`的自动播放。在我使用的SpriteBuilder版本中，这个变通方法是必要的，但在您使用的版本中可能已不再需要。


    这里的关键是，无论如何都要取消选中“Autoplay”复选框。


    ---


    ### 以编程方式播放动画


    在`Level1.ccb`中放置一个`Saw1_noautoplay.ccb`的实例，最好作为`gears and saws`的子节点，但无论如何都要放在`CCPhysicsNode`分支下。在“Item
    Properties”选项卡中，将锯子的名称更改为`sawNoAutoplay`。我以讲烂梗而闻名，但这次确实是无心之举。


    构建并运行应用程序，您会注意到锯子没有动画。这是好事。那么，当需要时如何播放它呢？


    SpriteBuilder提供了一组工具类。您已经认识了`CCBReader`，它负责加载CCB文件。另一个最常用的SpriteBuilder类是`CCAnimationManager`。它可能更广为人知的名字是`CCBAnimationManager`，但它后来成为了Cocos2D引擎的内部类。它负责存储和播放动画时间线，Cocos2D将动画时间线称为*序列*。


    **注意** 序列和时间线是紧密相关的术语，但并不完全相同。Cocos2D使用术语*序列*来表示任何一组包装在`CCActionSequence`类中的`CCAction`类，该类按顺序运行其包装的动作。例如，当一个节点从A移动到B，然后旋转90度，再移动到C，这就是一个序列。SpriteBuilder中的时间线可以被认为是多个序列的复合体，因为例如，您可以在执行移动和旋转动作的同时，对节点的透明度和缩放进行动画。通常来说，一个时间线是一个或多个并行播放的序列。


    每个节点实例都有一个`animationManager`属性，通过它您可以访问`CCAnimationManager`，从而按名称播放动画。为了快速测试，请在`GameScene.m`的`loadLevelNamed:`方法末尾添加[Listing
    5-1](#part0014.html#list1)中的代码。'
  raw: 'You can then drag and drop gear and saw objects from the Tileless Editor View
    into the gears and saws node. For the book’s graphics, I also recommend you change
    the draw order of the gears and saws node so they are drawn behind the chocolate
    borders. Drag and drop the gears and saws node so it is above the borders node
    in the Timeline. It might look like what is shown in [Figure 5-7](#part0014.html#Fig7).


    ![9781484202630_Fig05-07.jpg](images/00082.jpeg)


    [Figure 5-7](#part0014.html#_Fig7). Gear and Saw objects added to the Level1.ccb


    Just for kicks: while you’re in the Level1.ccb, press the Play button in the Timeline
    Controls. You’ll notice not only that the level-entry doughnut animates, but the
    gear and saw objects will also play their respective timelines. This allows you
    to preview and fine-tune animations, even if some animations were edited in other
    CCB files.


    For instance, imagine you wanted two gear objects to interlock their teeth while
    rotating, with one rotating clockwise while the other rotates counter-clockwise.
    To do so, you would have to change the Rotation property of one gear instance
    in the level to get the gear teeth to interlock. The Rotation property of the
    Sub File node will define the starting point (or offset) for the animations of
    the referenced CCB file—much like a node’s position defines the initial starting
    point of a position (move) animation. You can then position the two gears and
    press the Timeline Play button to see whether they are interlocking. If they are
    not, select the gear Sub File node again—each time you press Play, it will deselect
    all previously selected nodes—and change the gear’s Rotation property. Repeat
    this until the gears interlock perfectly in motion.


    At this point, you may be wondering the following: When editing a Timeline animation,
    you previously could not edit the properties of the animated node unless the Timeline
    Cursor was exactly on a specific keyframe. But now you can play and stop the animation,
    and no matter where the Timeline Cursor is located, you can always edit the node’s
    properties and they’re always the same, too. How come?


    To understand that, consider that you were editing the keyframes of a particular
    node in a CCB file—for instance, Gear1.ccb. Here you tell the node what to do
    exactly during an animation by adding keyframes for specific properties and editing
    property values for each keyframe. For position, rotation, and scale animations
    specifically, these properties have to be considered relative to the node’s current
    state.


    Then you placed an instance of Gear1.ccb in the Level1.ccb. That created a Sub
    File node that references Gear1.ccb. This Sub File node represents a particular
    instance of the Gear1.ccb. The Sub File node allows you to specify the referenced
    node’s initial position, rotation, and scale. During playback, the Timeline of
    the gear plays relative to the Sub File node’s position, rotation, and scale.
    Once again, this proves the utility of working with multiple CCB files and Sub
    File nodes by allowing a greater variation of animations simply by tweaking the
    starting values of the animation for individual Sub File node instances.


    With at least one gear or saw object placed in the level, you should publish and
    run the Xcode project. If you notice an animation stopping after a single revolution,
    check that the Timeline Chain is set to loop by setting it to Default Timeline.


    How Not to Autoplay Animations


    Have you noticed that the animations so far are playing automatically when you
    launch the game? Sooner or later there will be a time where you don’t want that.
    Like, for instance, right now.


    Assuming you’d like to play back an animation at an appropriate time while the
    game is running, that’s something you need to set up and code. To create an initially
    inactive saw, you should create a duplicate of Saw1.ccb. If it is available, you
    should prefer to use SpriteBuilder’s Duplicate command; otherwise, make the copy
    using Finder as described earlier. Rename the duplicate to **Saw1_noautoplay.ccb**,
    and open it in SpriteBuilder.


    Editing Timelines to Uncheck Autoplay


    First, you will want to prevent the animation from starting right away. Click
    on the Timeline List—that’s the bar just below the Timeline Controls that currently
    reads “Default Timeline.” See [Figure 5-1](#part0014.html#Fig1) for reference.
    If the context menu won’t show up or doesn’t look like the one shown in [Figure
    5-8](#part0014.html#Fig8), I’m pretty sure you’re trying to right-click it. Use
    the left mouse button instead, just like with the Timeline Chain.


    ![9781484202630_Fig05-08.jpg](images/00083.jpeg)


    [Figure 5-8](#part0014.html#_Fig8). Clicking the Timeline List brings up the Timelines
    context menu, from where you can select, create, duplicate, and edit Timelines


    From the Timelines context menu, choose Edit Timelines. This will bring up a dialog
    like in [Figure 5-9](#part0014.html#Fig9) but with just the Default Timeline entry.


    ![9781484202630_Fig05-09.jpg](images/00084.jpeg)


    [Figure 5-9](#part0014.html#_Fig9). Creating a new, unused Timeline just to prevent
    the Default Timeline from playing automatically


    You’ll notice that the Default Timeline’s Autoplay check box is initially checked.
    First, try to uncheck it to prevent this Timeline from playing automatically.
    If this works, all is good and fine.


    But if you can’t uncheck it (it’s a bug), simply add another Timeline using the
    + button and check the Autoplay check box for the new Timeline. This will create
    a second Timeline just so that you can check its Autoplay check box to get rid
    of Autoplay for the Default Timeline. This workaround was necessary in the SpriteBuilder
    version I was working with but may no longer be necessary in the version you are
    using.


    The important aspect here is to uncheck the Autoplay check box one way or another.


    Playing Animations Programmatically


    Place an instance of the Saw1_noautoplay.ccb in the Level1.ccb, preferably as
    a child of the gears and saws node, but in any case under the CCPhysicsNode branch.
    On the Item Properties tab, change the saw’s Name to **sawNoAutoplay**. I’m well
    known for bad puns, but this one was truly unintentional.


    Build and run the app, you will notice the saw won’t animate. That’s good. Now
    how to play it when the time comes?


    SpriteBuilder comes with a set of utility classes. You already got acquainted
    with CCBReader, which is responsible for loading CCB files. The other most commonly
    used SpriteBuilder class is the CCAnimationManager. It’s perhaps better known
    as *CCBAnimationManager*, but it has since become an internal class of the Cocos2D
    engine. It is responsible for storing and playing animation timelines, which Cocos2D
    refers to as *sequences*.


    **Note**  Sequences and Timelines are closely related terms, though not exactly
    identical. Cocos2D uses the term *sequence* for any set of CCAction classes wrapped
    in a CCActionSequence class that runs the actions it wraps in sequential order.
    For instance, when a node moves from A to B, then rotates 90 degrees, then moves
    to C, that’s a sequence. A Timeline in SpriteBuilder can then be considered a
    composite of multiple sequences because, for example, you could also animate a
    node’s opacity and scale while performing the move and rotate actions. Generally
    speaking, a Timeline is one or more sequences playing in parallel.


    Every node instance has an animationManager property through which you can access
    the CCAnimationManager and thus play back animations by name. For a quick test,
    add the code in [Listing 5-1](#part0014.html#list1) at the end of the loadLevelNamed:
    method in GameScene.m.'
