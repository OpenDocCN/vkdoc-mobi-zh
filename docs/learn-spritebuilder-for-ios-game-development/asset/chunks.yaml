  trans: '

    您只需点击源代码编辑窗口左侧的灰色垂直区域，即可轻松添加、启用或禁用断点。如果您在 Xcode 中启用了行号（`*Xcode*` `![image](img/00008.jpeg)`
    `*偏好设置*` `![image](img/00008.jpeg)` `*文本编辑*` `![image](img/00008.jpeg)` `*行号*`），行号就会显示在那里。在图
    14-6 中，第 103 行添加了一个断点。应用会一直运行，直到执行到带有断点的代码行，然后暂停。接下来将要执行的行会以绿色高亮显示——这就是执行指针。


    ![9781484202630_Fig14-06.jpg](img/00212.jpeg)


    图 14-6. 断点暂停了程序执行


    在源代码窗口下方，您会找到*变量视图*，在这里可以检查变量的值。默认情况下，如果应用在 Objective-C 实例方法内的任何位置暂停，Xcode 会显示
    self 引用，以及所有局部变量和周围代码正在使用的变量。您可以通过点击图 14-6 左下角的 *自动* 下拉菜单来更改此行为。另外，请注意*控制台*视图是隐藏的。您可以通过右下角的两个图标来更改*变量*和*控制台*视图的可见性。


    因此，尽管这是一个相当明显的问题，我们还是尝试调试一下为什么`_playerNode`可能是 *nil*。已经设置了断点，应用运行到了这个位置。您可以在*变量视图*中清晰地看到，`_playerNode`变量指向一个有效的对象。您可以展开该对象以查看其更多属性和实例变量，但这不是重点。我想展示的是如何逐行运行您的代码，这能让您看到变量在每一行之后如何变化，以及代码走了哪个条件分支以及原因。


    图 14-7 高亮显示了同样出现在图 14-6 中的调试工具栏。


    ![9781484202630_Fig14-07.jpg](img/00213.jpeg)


    图 14-7. 调试工具栏


    从左到右，第一个按钮隐藏调试区，第二个按钮显示断点是否全局启用。如果它没有高亮为蓝色，则所有断点都不会触发。第三个按钮暂停和恢复程序执行。通常，在断点触发后，您可以用它来继续运行应用到下一个断点（如果有的话）。


    第四个按钮（单步跳过）、第五个按钮（单步跳入）和第六个按钮（单步跳出）在图 14-8 中高亮显示，它们正是我要强调的。


    ![9781484202630_Fig14-08.jpg](img/00214.jpeg)


    图 14-8. 单步跳过、单步跳入和单步跳出命令图标


    当应用执行暂停时，您可以使用“单步跳过”命令前进到同一函数中的下一行。这实际上会执行高亮显示的代码行，执行完毕后会再次暂停。“单步跳入”命令的工作方式与“单步跳过”类似，但如果执行指针位于调用方法（发送消息）的行上，“单步跳入”命令将继续在该方法内部执行。有时，这只会将您带到一个
    `@property` 语句或一个您并不想查看的方法，例如单例的 `sharedInstance` 类方法。在这种情况下，“单步跳出”命令会运行当前方法的剩余部分，直到执行返回到调用方法。


    在前面的例子中，点击一次“单步跳过”命令图标会进入图 14-9 所示的状态。


    ![9781484202630_Fig14-09.jpg](img/00215.jpeg)


    图 14-9. 跳过图 14-6 中高亮的那一行后，您可以看到 `_playerNode` 变成了 `nil`


    显然，在这个例子中，将 `nil` 赋值给 `_playerNode` 会使其取该值，这一点非常清楚。您可以看到图 14-9 中的*变量视图*反映了这一点。您无需记录日志或猜测——您可以实际看到值在何时、何地以及为什么发生了变化。


    设置断点和单步跳过代码对于调试来说，与 `NSLog` 语句同样基础。两者相辅相成，`NSLog` 最适用于断点触发过于频繁或干扰用户输入，导致无法重现特定问题的情况。断点和单步执行代码极具启发性，因为您可以直观地看到代码的走向，并通过变量视图了解其原因。


    那么，您要解决的问题就变成了：弄清楚为什么某个值没有达到它应有的值。但您可以通过使用断点快速找到问题所在，而不是基于猜测修改代码然后再次尝试，寄希望于下一次能成功。


    ## 分析代码


    Xcode 一个鲜为人知的功能是所谓的*分析*构建。您可以通过 `*Product*` `![image](img/00008.jpeg)` `*Analyze*`
    来运行分析构建。这会运行 Xcode 自带的 Clang 静态分析器工具。


    该分析试图发现常见、已知和潜在的 Bug 来源。这包括内存管理和逻辑错误。然而，分析器报告的问题并非都是实际存在的问题。首先，对于非您编写的代码（如 Cocos2D
    和 Chipmunk 源代码）中发现的问题，应予以忽略。假定如果它们是真正的问题，开发者最终会修复。


    图 14-10 显示了一次分析构建的输出。在 Cocos2d 目标中找到的 12 个问题可以忽略。在 LearnSpriteBuilder 项目中只有一个问题，并且给出了修复建议。


    ![9781484202630_Fig14-10.jpg](img/00216.jpeg)


    图 14-10. 分析构建发现潜在问题并给出修复建议


    您可能从图中注意到，似乎存在某种问题。但图中显示的信息并未说明分析器为何认为这是一个问题。到目前为止，日志记录一直工作正常。这里可能是什么问题，您应该修复它吗？


    关于编译器错误，我能给出的最佳建议可能显而易见，以至于我不太敢提：用确切的错误信息去 Google 搜索。您甚至无需将其重新输入到 Google 的搜索框中——Xcode
    显示的每段文本都可以作为文本复制到剪贴板。在常规的 Cmd+C（拷贝）命令无效的地方，通常有一个包含*拷贝*项的右键菜单。


    **提示** 从 Xcode 复制字符串时，它们可能包含对您项目的特定引用，例如路径、文件名、行号、类和变量名。如果搜索结果不理想或未找到任何内容，请确保移除这些项目特定的引用，只搜索原始的错误信息，去掉可能仅存在于您自己项目中的任何变量、函数或类名。


    Google 搜索结果中的顶部链接之一解释了错误信息背后的原因：`NSUInteger` 数据类型在 32 位设备上是 32 位（`unsigned int`）类型，在
    iPhone 5S 等 64 位设备上是 64 位（`unsigned long`）。尽管从 `unsigned int` 到 `unsigned long`
    的转换会隐式发生，但在构建代码的 32 位版本时，编译器仍然会对此转换发出警告。分析器本质上是在告诉您会产生这个警告，而修复这个问题是一种良好的编程风格。

