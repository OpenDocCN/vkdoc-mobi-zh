    在SpriteBuilder中发布项目，然后从Xcode构建并运行项目。链条和绳索应该不再与边界和触发器发生碰撞。为了验证这一点，在`Level1.ccb`中放置或移动一个链条或绳索，使其与边界精灵或触发区域重叠。链条和绳索之间也应该仍然能够相互碰撞。玩家的碰撞行为应该和以前一样：被边界阻挡，被齿轮推动，被锯子杀死，并且能够触发关卡出口和其他触发区域。


    如果某些情况不尽如人意，请反复检查参与碰撞的节点的碰撞类别和遮罩。请注意，一些边缘情况未被考虑，这些情况最容易通过适当的关卡设计来避免。例如，链条和绳索会与出口节点发生碰撞。


