- fmt: "You’ll now need to assign the `CCPhysicsNode` reference to the `_physicsNode`\
    \ ivar in order to make the scrolling code work with the newly introduced physics\
    \ node. Because `getChildByName:` returns a reference to a `CCNode` class, you\
    \ have to cast the returned node if it is of another class. Add this code at the\
    \ top of the `loadLevelNamed:` method in `GameScene.m`:\n\n```\n_physicsNode =\
    \ (CCPhysicsNode*)[self getChildByName:@\"physics\" recursively:YES];\n```\n\n\
    Note that casting an object reference to another class like this never generates\
    \ a compile error. That doesn’t mean it’s always correct, however. At runtime,\
    \ if the particular object is cast to a class of which the object isn’t a member\
    \ of, sending messages to this object is prone to crashing with “unrecognized\
    \ selector sent to instance” or other errors. Only use casts when you are absolutely\
    \ sure that an object is of a given class. If you can’t be sure of this at compile\
    \ time, it is customary to verify the class membership with the `isKindOfClass:`\
    \ method before performing the cast, as in the following code:\n\n```\nCCNode*\
    \ node = [self getChildByName:@\"physics\" recursively:YES];\nif ([node isKindeOfClass:[CCPhysicsNode\
    \ class]])\n{\n    _physicsNode = (CCPhysicsNode*)node;\n}\n```\n\nWhile you’re\
    \ at it, add the following line to assign the `_backgroundNode` reference, also\
    \ in the `loadLevelNamed:` method:\n\n```\nbackgroundNode = [self getChildByName:@\"\
    background\" recursively:YES];\n```\n\nTo summarize, your `loadLevelNamed:` method\
    \ should be like the one in [Listing 3-9](#part0012.html#list9), excluding any\
    \ comments and error-checking code.\n\n[***Listing 3-9***](#part0012.html#_list9).\
    \ Assigning physics, background, and player node in `loadLevelNamed`\n\n```\n\
    -(void) loadLevelNamed:(NSString*)levelCCB\n{\n    _physicsNode = (CCPhysicsNode*)[self\
    \ getChildByName:@\"physics\" recursively:YES];\n    _backgroundNode = [self getChildByName:@\"\
    background\" recursively:YES];\n    _playerNode = [self getChildByName:@\"player\"\
    \ recursively:YES];\n}\n```\n\nYou can optionally add statements like `NSAssert(_physicsNode);`\
    \ to verify that these nodes were indeed found and assigned. If they aren’t found\
    \ and `nil` is returned, you either forgot to add them to the level or you named\
    \ them incorrectly. Both issues are a common source of (human) error when working\
    \ with SpriteBuilder, so it makes sense to verify references using `NSAssert`.\n\
    \n**Tip** If you want to learn more about assertions, breakpoints, and resolving\
    \ issues in general, please refer to the debugging chapter at the end of the book.\
    \ Learning to debug issues properly is absolutely worth investing the time in\
    \ because it’ll quickly pay back in improved productivity, which is much better\
    \ than banging your head for days over a seemingly inexplicable issue. I’ll shut\
    \ up about it until then, I promise, but please do yourself the favor and check\
    \ it out.\n\nLooking at [Listing 3-9](#part0012.html#list9), it seems rather unnecessary\
    \ to search through the entire node hierarchy starting with `self` when you know\
    \ that the background and physics nodes are children of the `_levelNode`, and\
    \ the player is a child of the physics node. A slightly better (but entirely optional)\
    \ version of the preceding code is shown in [Listing 3-10](#part0012.html#list10).\n\
    \n[***Listing 3-10***](#part0012.html#_list10). This version of `loadLevelNamed:`\
    \ avoids searching recursively where it isn’t necessary\n\n```\n-(void) loadLevelNamed:(NSString*)levelCCB\n\
    {\n    _physicsNode = (CCPhysicsNode*)[_levelNode getChildByName:@\"physics\"\
    \ recursively:NO];\n    _backgroundNode = [_levelNode getChildByName:@\"background\"\
    \ recursively:NO];\n    _playerNode = [_physicsNode getChildByName:@\"player\"\
    \ recursively:YES];\n}\n```\n\nNote that in [Listing 3-10](#part0012.html#list10)\
    \ it is crucial to get the reference to the `_physicsNode` first because it’s\
    \ being used to search for the player, so it must be assigned by that point. The\
    \ version in [Listing 3-10](#part0012.html#list10) also doesn’t use a recursive\
    \ search for the `_physicsNode` and `_backgroundNode` because they should always\
    \ be direct children of the `_levelNode`.\n\nNow in the `scrollToTarget:` method,\
    \ you need to locate the last line:\n\n```\n_levelNode.positionInPoints = ccpNeg(viewPos);\n\
    ```\n\nReplace it with the line in [Listing 3-11](#part0012.html#list11) in order\
    \ to reroute the position updates from the `_levelNode` to the `_physicsNode`.\n\
    \n[***Listing 3-11***](#part0012.html#_list11). Replace `_levelNode` with `_physicsNode`\
    \ in `scrollToTarget`\n\n```\n_physicsNode.positionInPoints = ccpNeg(viewPos);\n\
    ```\n\nThis will decouple the `_backgroundNode` position so that it can be updated\
    \ independently from the `_physicsNode` position, whereas the `_levelNode` position\
    \ will now remain fixed at (0,0). If you publish, build, and run now, you will\
    \ notice that the background layers stay fixed.\n\nTo visualize the current layout,\
    \ look at [Figure 3-19](#part0012.html#Fig19). This is the node hierarchy as returned\
    \ by a call to `[CCBReader loadAsScene:@\"GameScene\"]`. In brackets are the CCB\
    \ files where the content of certain nodes originates from. Note that `GameScene`,\
    \ despite its name, is a regular `CCNode` subclass and not a subclass of `CCScene`.\n\
    \n![9781484202630_Fig03-19.jpg](images/00058.jpeg)\n\n[Figure 3-19](#part0012.html#_Fig19).\
    \ The game’s node hierarchy in its current state\n\n**Tip** You can dump the entire\
    \ node hierarchy in its current state to the console by writing `[self walkSceneGraph:0]`\
    \ anywhere in your code. This can be useful if you suspect a node may not be in\
    \ the correct location in the node hierarchy. Also note that *scene graph* can\
    \ be used synonymously with *node hierarchy*.\n\nBefore you get the background\
    \ layers to scroll again, let’s recap the code from the `scrollToTarget:` method.\
    \ [Listing 3-12](#part0012.html#list12) includes the change made in [Listing 3-11](#part0012.html#list11).\n\
    \n[***Listing 3-12***](#part0012.html#_list12). Version of `scrollToTarget:` that\
    \ assigns position to `_physicsNode`\n\n```\n-(void) scrollToTarget:(CCNode*)target\n\
    {\n    CGSize viewSize = [CCDirector sharedDirector].viewSize;\n    CGPoint viewCenter\
    \ = CGPointMake(viewSize.width / 2.0, viewSize.height / 2.0);\n\n    CGPoint viewPos\
    \ = ccpSub(target.positionInPoints, viewCenter);\n\n    CGSize levelSize = _levelNode.contentSizeInPoints;\n\
    \    viewPos.x = MAX(0.0, MIN(viewPos.x, levelSize.width - viewSize.width));\n\
    \    viewPos.y = MAX(0.0, MIN(viewPos.y, levelSize.height - viewSize.height));\n\
    \n    _physicsNode.positionInPoints = ccpNeg(viewPos);\n\n    // Parallax scrolling\
    \ code will be added here ...\n}\n```\n\nThe preceding code does the following:\n\
    \n*   Assigns `viewPos` the `target.positionInPoints` offset by `viewCenter`\n\
    *   Clamps `viewPos` so that scrolling stops at level borders inset by `viewCenter`\n\
    *   Assigns negated `viewPos` to the `_physicsNode`\n\nSomehow you’ll have to\
    \ derive a parallax position for each of the background layers every time the\
    \ `_physicsNode`’s position has been updated.\n\nThe inset part is most important\
    \ part to understand to comprehend the following parallax scrolling code. Since\
    \ you want each layer’s position to be relative to the position of the `_physicsNode`\
    \ (aka `viewPos` in this method), it’s crucial to consider that `viewPos` (the\
    \ center of the view) should keep a distance from the level’s borders. This minimum\
    \ distance must be at least `viewCenter.width` in the horizontal direction and\
    \ `viewCenter.height` in the vertical direction, to prevent the viewable area\
    \ from showing the outside of the level borders (i.e., empty space)."
  raw: 'You’ll now need to assign the CCPhysicsNode reference to the _physicsNode
    ivar in order to make the scrolling code work with the newly introduced physics
    node. Because getChildByName: returns a reference to a CCNode class, you have
    to cast the returned node if it is of another class. Add this code at the top
    of the loadLevelNamed: method in GameScene.m:


    ```

    _physicsNode = (CCPhysicsNode*)[self getChildByName:@"physics" recursively:YES];

    ```


    Note that casting an object reference to another class like this never generates
    a compile error. That doesn’t mean it’s always correct, however. At runtime, if
    the particular object is cast to a class of which the object isn’t a member of,
    sending messages to this object is prone to crashing with “unrecognized selector
    sent to instance” or other errors. Only use casts when you are absolutely sure
    that an object is of a given class. If you can’t be sure of this at compile time,
    it is customary to verify the class membership with the isKindOfClass: method
    before performing the cast, as in the following code:


    ```

    CCNode* node = [self getChildByName:@"physics" recursively:YES];

    if ([node isKindeOfClass:[CCPhysicsNode class]])

    {

        _physicsNode = (CCPhysicsNode*)node;

    }

    ```


    While you’re at it, add the following line to assign the _backgroundNode reference,
    also in the loadLevelNamed: method:


    ```

    backgroundNode = [self getChildByName:@"background" recursively:YES];

    ```


    To summarize, your loadLevelNamed: method should be like the one in [Listing 3-9](#part0012.html#list9),
    excluding any comments and error-checking code.


    [***Listing 3-9***](#part0012.html#_list9). Assigning physics, background, and
    player node in loadLevelNamed


    ```

    -(void) loadLevelNamed:(NSString*)levelCCB

    {

        _physicsNode = (CCPhysicsNode*)[self getChildByName:@"physics" recursively:YES];

        _backgroundNode = [self getChildByName:@"background" recursively:YES];

        _playerNode = [self getChildByName:@"player" recursively:YES];

    }

    ```


    You can optionally add statements like NSAssert(_physicsNode); to verify that
    these nodes were indeed found and assigned. If they aren’t found and nil is returned,
    you either forgot to add them to the level or you named them incorrectly. Both
    issues are a common source of (human) error when working with SpriteBuilder, so
    it makes sense to verify references using NSAssert.


    **Tip**  If you want to learn more about assertions, breakpoints, and resolving
    issues in general, please refer to the debugging chapter at the end of the book.
    Learning to debug issues properly is absolutely worth investing the time in because
    it’ll quickly pay back in improved productivity, which is much better than banging
    your head for days over a seemingly inexplicable issue. I’ll shut up about it
    until then, I promise, but please do yourself the favor and check it out.


    Looking at [Listing 3-9](#part0012.html#list9), it seems rather unnecessary to
    search through the entire node hierarchy starting with self when you know that
    the background and physics nodes are children of the _levelNode, and the player
    is a child of the physics node. A slightly better (but entirely optional) version
    of the preceding code is shown in [Listing 3-10](#part0012.html#list10).


    [***Listing 3-10***](#part0012.html#_list10). This version of loadLevelNamed:
    avoids searching recursively where it isn’t necessary


    ```

    -(void) loadLevelNamed:(NSString*)levelCCB

    {

        _physicsNode = (CCPhysicsNode*)[_levelNode getChildByName:@"physics" recursively:NO];

        _backgroundNode = [_levelNode getChildByName:@"background" recursively:NO];

        _playerNode = [_physicsNode getChildByName:@"player" recursively:YES];

    }

    ```


    Note that in [Listing 3-10](#part0012.html#list10) it is crucial to get the reference
    to the _physicsNode first because it’s being used to search for the player, so
    it must be assigned by that point. The version in [Listing 3-10](#part0012.html#list10)
    also doesn’t use a recursive search for the _physicsNode and _backgroundNode because
    they should always be direct children of the _levelNode.


    Now in the scrollToTarget: method, you need to locate the last line:


    ```

    _levelNode.positionInPoints = ccpNeg(viewPos);

    ```


    Replace it with the line in [Listing 3-11](#part0012.html#list11) in order to
    reroute the position updates from the _levelNode to the _physicsNode.


    [***Listing 3-11***](#part0012.html#_list11). Replace _levelNode with _physicsNode
    in scrollToTarget


    ```

    _physicsNode.positionInPoints = ccpNeg(viewPos);

    ```


    This will decouple the _backgroundNode position so that it can be updated independently
    from the _physicsNode position, whereas the _levelNode position will now remain
    fixed at 0,0\. If you publish, build, and run now, you will notice that the background
    layers stay fixed.


    To visualize the current layout, look at [Figure 3-19](#part0012.html#Fig19).
    This is the node hierarchy as returned by a call to [CCBReader loadAsScene:@"GameScene"].
    In brackets are the CCB files where the content of certain nodes originates from.
    Note that GameScene, despite its name, is a regular CCNode subclass and not a
    subclass of CCScene.


    ![9781484202630_Fig03-19.jpg](images/00058.jpeg)


    [Figure 3-19](#part0012.html#_Fig19). The game’s node hierarchy in its current
    state


    **Tip**  You can dump the entire node hierarchy in its current state to the console
    by writing **[self walkSceneGraph:0]** anywhere in your code. This can be useful
    if you suspect a node may not be in the correct location in the node hierarchy.
    Also note that *scene graph* can be used synonymously with *node hierarchy*.


    Before you get the background layers to scroll again, let’s recap the code from
    the scrollToTarget: method. [Listing 3-12](#part0012.html#list12) includes the
    change made in [Listing 3-11](#part0012.html#list11).


    [***Listing 3-12***](#part0012.html#_list12). Version of scrollToTarget: that
    assigns position to _physicsNode


    ```

    -(void) scrollToTarget:(CCNode*)target

    {

        CGSize viewSize = [CCDirector sharedDirector].viewSize;

        CGPoint viewCenter = CGPointMake(viewSize.width / 2.0, viewSize.height / 2.0);


    CGPoint viewPos = ccpSub(target.positionInPoints, viewCenter);


    CGSize levelSize = _levelNode.contentSizeInPoints;

        viewPos.x = MAX(0.0, MIN(viewPos.x, levelSize.width - viewSize.width));

        viewPos.y = MAX(0.0, MIN(viewPos.y, levelSize.height - viewSize.height));


    _physicsNode.positionInPoints = ccpNeg(viewPos);


    // Parallax scrolling code will be added here ...

    }

    ```


    The preceding code does the following:


    *   Assigns viewPos the target.positionInPoints offset by viewCenter

    *   Clamps viewPos so that scrolling stops at level borders inset by viewCenter

    *   Assigns negated viewPos to the _physicsNode


    Somehow you’ll have to derive a parallax position for each of the background layers
    every time the _physicsNode’s position has been updated.


    The inset part is most important part to understand to comprehend the following
    parallax scrolling code. Since you want each layer’s position to be relative to
    the position of the _physicsNode (aka viewPos in this method), it’s crucial to
    consider that viewPos (the center of the view) should keep a distance from the
    level’s borders. This minimum distance must be at least viewCenter.width in the
    horizontal direction and viewCenter.height in the vertical direction, to prevent
    the viewable area from showing the outside of the level borders (ie empty space).'
  trans: "\n现在，你需要将 `CCPhysicsNode` 引用赋值给 `_physicsNode` 实例变量，以使滚动代码与新引入的物理节点协同工作。由于\
    \ `getChildByName:` 返回的是 `CCNode` 类的引用，如果返回的节点属于其他类，则必须对节点进行强制类型转换。请在 `GameScene.m`\
    \ 的 `loadLevelNamed:` 方法顶部添加以下代码：\n\n```\n_physicsNode = (CCPhysicsNode*)[self\
    \ getChildByName:@\"physics\" recursively:YES];\n```\n\n请注意，像这样将一个对象引用强制转换为另一个类永远不会产生编译错误。但这并不意味着它总是正确的。在运行时，如果特定对象被强制转换为它不属于的类，则向此对象发送消息很容易因“无法识别的选择器发送到实例”或其他错误而导致崩溃。只有在绝对确定对象属于某个给定类时，才使用强制类型转换。如果在编译时无法确定，通常的做法是在执行强制类型转换之前，使用\
    \ `isKindOfClass:` 方法验证类的成员身份，如下列代码所示：\n\n```\nCCNode* node = [self getChildByName:@\"\
    physics\" recursively:YES];\nif ([node isKindeOfClass:[CCPhysicsNode class]])\n\
    {\n    _physicsNode = (CCPhysicsNode*)node;\n}\n```\n\n与此同时，请在 `loadLevelNamed:`\
    \ 方法中添加以下行来赋值 `_backgroundNode` 引用：\n\n```\nbackgroundNode = [self getChildByName:@\"\
    background\" recursively:YES];\n```\n\n总结一下，你的 `loadLevelNamed:` 方法应该类似于**列表 3-9**\
    \ 中的代码，不包括任何注释和错误检查代码。\n\n***列表 3-9***. 在 `loadLevelNamed` 中分配物理节点、背景节点和玩家节点\n\
    \n```\n-(void) loadLevelNamed:(NSString*)levelCCB\n{\n    _physicsNode = (CCPhysicsNode*)[self\
    \ getChildByName:@\"physics\" recursively:YES];\n    _backgroundNode = [self getChildByName:@\"\
    background\" recursively:YES];\n    _playerNode = [self getChildByName:@\"player\"\
    \ recursively:YES];\n}\n```\n\n你可以选择性地添加诸如 `NSAssert(_physicsNode);` 之类的语句，以验证这些节点确实已被找到并赋值。如果它们未被找到且返回了\
    \ `nil`，则说明你忘记将它们添加到关卡中，或者命名有误。在使用 SpriteBuilder 时，这两个问题都是常见的（人为）错误来源，因此使用 `NSAssert`\
    \ 来验证引用是合理的。\n\n**提示** 如果你想了解更多关于断言、断点和解决问题的通用方法，请参考本书末尾的调试章节。学会正确调试问题是完全值得投入时间的，因为它能迅速提高生产力，这远比为某个看似无法解释的问题而苦恼好得多。关于这一点，我在此保证不再唠叨，但请务必为自己考虑一下，去查阅相关内容。\n\
    \n观察**列表 3-9**，当你知道背景节点和物理节点是 `_levelNode` 的子节点，而玩家是物理节点的子节点时，从 `self` 开始搜索整个节点层次结构就显得有些多余了。一个稍微改进（但完全可选）的版本如**列表\
    \ 3-10** 所示。\n\n***列表 3-10***. 此版本的 `loadLevelNamed:` 避免了不必要的递归搜索\n\n```\n-(void)\
    \ loadLevelNamed:(NSString*)levelCCB\n{\n    _physicsNode = (CCPhysicsNode*)[_levelNode\
    \ getChildByName:@\"physics\" recursively:NO];\n    _backgroundNode = [_levelNode\
    \ getChildByName:@\"background\" recursively:NO];\n    _playerNode = [_physicsNode\
    \ getChildByName:@\"player\" recursively:YES];\n}\n```\n\n请注意，在**列表 3-10** 中，首先获取\
    \ `_physicsNode` 的引用至关重要，因为它被用来搜索玩家节点，所以必须在此时完成赋值。**列表 3-10** 中的版本也没有对 `_physicsNode`\
    \ 和 `_backgroundNode` 使用递归搜索，因为它们始终应该是 `_levelNode` 的直接子节点。\n\n现在，在 `scrollToTarget:`\
    \ 方法中，你需要找到最后一行：\n\n```\n_levelNode.positionInPoints = ccpNeg(viewPos);\n```\n\
    \n将其替换为**列表 3-11** 中的行，以便将位置更新从 `_levelNode` 重新路由到 `_physicsNode`。\n\n***列表 3-11***.\
    \ 在 `scrollToTarget` 中将 `_levelNode` 替换为 `_physicsNode`\n\n```\n_physicsNode.positionInPoints\
    \ = ccpNeg(viewPos);\n```\n\n这将解耦 `_backgroundNode` 的位置，使其可以独立于 `_physicsNode`\
    \ 的位置进行更新，而 `_levelNode` 的位置现在将保持在 (0,0) 不变。如果你现在发布、构建并运行，会发现背景层保持固定。\n\n要可视化当前布局，请查看**图\
    \ 3-19**。这是通过调用 `[CCBReader loadAsScene:@\"GameScene\"]` 返回的节点层次结构。方括号内是某些节点内容来源的\
    \ CCB 文件。请注意，`GameScene`，尽管名称如此，但它是常规的 `CCNode` 子类，而不是 `CCScene` 的子类。\n\n![9781484202630_Fig03-19.jpg](img/00058.jpeg)\n\
    \n**图 3-19**. 游戏当前状态的节点层次结构\n\n**提示** 你可以在代码中的任何位置编写 `[self walkSceneGraph:0]`，将整个节点层次结构的当前状态转储到控制台。如果你怀疑某个节点可能不在节点层次结构中的正确位置，这会很有用。另请注意，*场景图*\
    \ 可与 *节点层次结构* 互换使用。\n\n在让背景层再次滚动之前，让我们回顾一下 `scrollToTarget:` 方法中的代码。**列表 3-12**\
    \ 包含了**列表 3-11** 中所做的更改。\n\n***列表 3-12***. 将位置赋值给 `_physicsNode` 的 `scrollToTarget:`\
    \ 版本\n\n```\n-(void) scrollToTarget:(CCNode*)target\n{\n    CGSize viewSize =\
    \ [CCDirector sharedDirector].viewSize;\n    CGPoint viewCenter = CGPointMake(viewSize.width\
    \ / 2.0, viewSize.height / 2.0);\n\n    CGPoint viewPos = ccpSub(target.positionInPoints,\
    \ viewCenter);\n\n    CGSize levelSize = _levelNode.contentSizeInPoints;\n   \
    \ viewPos.x = MAX(0.0, MIN(viewPos.x, levelSize.width - viewSize.width));\n  \
    \  viewPos.y = MAX(0.0, MIN(viewPos.y, levelSize.height - viewSize.height));\n\
    \n    _physicsNode.positionInPoints = ccpNeg(viewPos);\n\n    // 视差滚动代码将添加在此处\
    \ ...\n}\n```\n\n上述代码执行以下操作：\n\n*   将 `viewPos` 赋值为 `target.positionInPoints`\
    \ 偏移 `viewCenter` 后的值\n*   对 `viewPos` 进行钳制，使滚动在由 `viewCenter` 缩进的关卡边界处停止\n* \
    \  将取反后的 `viewPos` 赋值给 `_physicsNode`\n\n你需要想办法在每次 `_physicsNode` 的位置更新后，为每个背景层派生出一个视差位置。\n\
    \n理解缩进部分对于理解接下来的视差滚动代码至关重要。由于你希望每个图层的位置都相对于 `_physicsNode` 的位置（在此方法中也称为 `viewPos`），因此必须考虑到\
    \ `viewPos`（视图的中心）应与关卡边界保持一定距离。这个最小距离在水平方向必须至少为 `viewCenter.width`，在垂直方向至少为 `viewCenter.height`，以防止可视区域显示关卡边界之外的区域（即空白区域）。\n"
- fmt: "[Figure 3-3](#part0012.html#Fig3) helps to understand this if you imagine\
    \ that `viewPos` is at the center of each Viewable Area. The actual Scrollable\
    \ Area rectangle (i.e., allowed positions for `viewPos`) must be larger than the\
    \ left and bottom of the Level Area, and smaller than the top and right side of\
    \ the Level Area. This smaller sized Scrollable Area rectangle is said to be an\
    \ inset of the larger Level Area rectangle.\n\nTherefore, the relative position\
    \ of each background layer can’t be relative to the full extents of the level’s\
    \ size, which is 4000 by 500 points. Instead, only the scrollable area must be\
    \ considered when calculating the parallax factor. If you’re having trouble imagining\
    \ this, have another look at the diagram in [Figure 3-3](#part0012.html#Fig3).\n\
    \nHere’s an example: On an iPhone 5, `viewCenter` would be 284x160. Therefore,\
    \ the scrollable area ranges from the following:\n\n```\n284x160 to 4000 – 284\
    \ x 500 – 160 = 3716x340 points\n```\n\nIn other words, the scrollable area is\
    \ the size of the level minus the size of the view. Hence, dividing the `viewPos`\
    \ by the scrollable area (`levelSize` minus `viewSize`) gives you the percentage\
    \ of where the `_physicsNode` position within the scrollable area currently is:\n\
    \n```\nCGPoint viewPosPercent = CGPointMake(viewPos.x / (levelSize.width - viewSize.width),\n\
    \                                     viewPos.y / (levelSize.height - viewSize.height));\n\
    ```\n\nYou now have the `_physicsNode`'s position in a range of 0.0 to 1.0, where\
    \ *0,0* refers to the lower-left scrollable area position of 284x160 and *1,1*\
    \ refers to the top-right position 3716x340. Next you have to apply this percentage\
    \ to every layer, taking into account the layer’s own size.\n\nTry to do the calculation\
    \ in [Listing 3-13](#part0012.html#list13) in your head or on paper once, using\
    \ 568x384 as the `layerSize` width and height and 568x320 as the `viewSize` width\
    \ and height and tell me what values you get for `layerPos` when `viewPosPercent`\
    \ is 0.5, 0.5.\n\n[***Listing 3-13***](#part0012.html#_list13). Calculating the\
    \ layer’s position relative to `viewPosPercent`\n\n```\nfor (CCNode* layer in\
    \ _backgroundNode.children)\n{\n    CGSize layerSize = layer.contentSizeInPoints;\n\
    \    CGPoint layerPos = CGPointMake(viewPosPercent.x * (layerSize.width - viewSize.width),\n\
    \                                   viewPosPercent.y * (layerSize.height - viewSize.height));\n\
    }\n```\n\nIf neither you nor I made a mistake, you should have noticed that where\
    \ `layerSize` and `viewSize` are the same, the result is 0. And 0 multiplied by\
    \ whatever remains 0. Thus, on the x axis you get 0 as `layerPos.x`, while `layerPos.y`\
    \ is calculated to be the following:\n\n```\n0.5 * (384 – 320) = 32 points\n```\n\
    \nIn English: this layer can move vertically within a range of 64 points and its\
    \ Y position is currently offset by 32 points.\n\nAfter the `layerPos` has been\
    \ calculated, it is negated just like `viewPos` and assigned to the layer:\n\n\
    ```\nlayer.positionInPoints = ccpNeg(layerPos);\n```\n\nBe sure to use `positionInPoints`\
    \ so that the position is properly converted from points to other position types,\
    \ if needed. To put everything in context, [Listing 3-14](#part0012.html#list14)\
    \ shows the updated `scrollToTarget:` method again in full.\n\n[***Listing 3-14***](#part0012.html#_list14).\
    \ Scrolling with parallaxing layers\n\n```\n-(void) scrollToTarget:(CCNode*)target\n\
    {\n    CGSize viewSize = [CCDirector sharedDirector].viewSize;\n    CGPoint viewCenter\
    \ = CGPointMake(viewSize.width / 2.0, viewSize.height / 2.0);\n\n    CGPoint viewPos\
    \ = ccpSub(target.positionInPoints, viewCenter);\n\n    CGSize levelSize = _levelNode.contentSizeInPoints;\n\
    \    viewPos.x = MAX(0.0, MIN(viewPos.x, levelSize.width - viewSize.width));\n\
    \    viewPos.y = MAX(0.0, MIN(viewPos.y, levelSize.height - viewSize.height));\n\
    \n    _physicsNode.positionInPoints = ccpNeg(viewPos);\n\n    CGPoint viewPosPercent\
    \ = CGPointMake(viewPos.x / (levelSize.width - viewSize.width),\n            \
    \                             viewPos.y / (levelSize.height - viewSize.height));\n\
    \n    for (CCNode* layer in _backgroundNode.children)\n    {\n        CGSize layerSize\
    \ = layer.contentSizeInPoints;\n        CGPoint layerPos = CGPointMake(viewPosPercent.x\
    \ * (layerSize.width - viewSize.width),\n                                    \
    \   viewPosPercent.y * (layerSize.height - viewSize.height));\n        layer.positionInPoints\
    \ = ccpNeg(layerPos);\n    }\n}\n```\n\nOne last thing, remember how you used\
    \ the `_levelNode` in the `touchBegan:withEvent:` method to convert the touch\
    \ location relative to the `_levelNode`? You’ll have to replace this use of `_levelNode`\
    \ with `_physicsNode` as well, as seen in the code fragment in [Listing 3-15](#part0012.html#list15).\n\
    \n[***Listing 3-15***](#part0012.html#_list15). Replace `_levelNode` with `_physicsNode`\
    \ in `touchBegan:withEvent`\n\n```\nCGPoint pos = [touch locationInNode:_physicsNode];\n\
    ```\n\nIf you were to keep using the `_levelNode`, you would notice that you’re\
    \ prevented from scrolling further than approximately half a screen size. That’s\
    \ because the `_levelNode` no longer changes its position during scrolling, with\
    \ the `_physicsNode` having taken its place.\n\nPublish, build, and run. You can\
    \ now see the background layers parallaxing like in [Figure 3-20](#part0012.html#Fig20).\n\
    \n![9781484202630_Fig03-20.jpg](images/00059.jpeg)\n\n[Figure 3-20](#part0012.html#_Fig20).\
    \ Player moving toward the right and up shows the effect of parallaxing background\
    \ layers\n\n## Summary\n\nIn this chapter, you learned how to control the player\
    \ with touches and actions, and how to scroll the level contents and background\
    \ layers as the player moves about the level. You also learned a lot about images,\
    \ SpriteSheets and the settings related to image conversion and publishing.\n\n\
    The current state of the project can be found in the *03 - Parallax Scrolling*\
    \ folder.\n\nIn the next chapter, you’ll learn more about `CCPhysicsNode` and\
    \ how to create impenetrable level borders to keep the player from falling outside\
    \ the level.\n\n## Chapter 4: Physics & Collisions\n\nIn this chapter, you’ll\
    \ learn more about editing physics properties with SpriteBuilder and how to control\
    \ the player through physics rather than actions. You’ll add impenetrable physics\
    \ bodies as level borders to prevent the player character from moving outside\
    \ the level boundaries.\n\nYou’ll also learn about how to run code when a collision\
    \ occurs—in this case, to trigger game events like ending the current level—and\
    \ how to set up collision categories and masks to allow certain physics bodies\
    \ to pass through each other.\n\n### Player Physics\n\nIn the previous chapter,\
    \ you already added a Physics node to the `Level1.ccb` and made the player node\
    \ a child of the newly introduced Physics node. This instance of `CCPhysicsNode`\
    \ acts as the physics world that controls global physics behaviors—most of all,\
    \ gravity. Any node that should move and interact like a physics object must be\
    \ a child or grandchild of a `CCPhysicsNode`.\n\nLet’s give this a try right away\
    \ and enable physics for the player.\n\n#### Enabling Physics for the Player Sprite\n\
    \nFirst try this: open `Level1.ccb`, select the player, and try to switch to the\
    \ Item Physics tab—the third tab in the Details Inspector on the right. You’ll\
    \ notice it’s grayed out—it can’t be selected. This is always the case for Sub\
    \ File nodes: they do not support physics.\n\nInstead, open the `Player.ccb` in\
    \ the Prefabs folder and select the `CCSprite` root node. Now you can switch to\
    \ the Item Physics tab and select the Enable Physics check box. Behind the scenes,\
    \ when the CCB is being loaded, the `CCBReader` will create an instance of the\
    \ `CCPhysicsBody` class and assign it to the node’s `physicsBody` property. When\
    \ discussing nodes with physics, I will use the term “body” synonymously for “node,”\
    \ primarily when the context refers to the physics properties and behavior of\
    \ the node."
  raw: '[Figure 3-3](#part0012.html#Fig3) helps to understand this if you imagine
    that viewPos is at the center of each Viewable Area. The actual Scrollable Area
    rectangle (ie allowed positions for viewPos) must be larger than the left and
    bottom of the Level Area, and smaller than the top and right side of the Level
    Area. This smaller sized Scrollable Area rectangle is said to be an inset of the
    larger Level Area rectangle.


    Therefore, the relative position of each background layer can’t be relative to
    the full extents of the level’s size, which is 4000 by 500 points. Instead, only
    the scrollable area must be considered when calculating the parallax factor. If
    you’re having trouble imagining this, have another look at the diagram in [Figure
    3-3](#part0012.html#Fig3).


    Here’s an example: On an iPhone 5, viewCenter would be 284x160\. Therefore, the
    scrollable area ranges from the following:


    ```

    284x160 to 4000 – 284 x 500 – 160 = 3716x340 points

    ```


    In other words, the scrollable area is the size of the level minus the size of
    the view. Hence, dividing the viewPos by the scrollable area (levelSize minus
    viewSize) gives you the percentage of where the _physicsNode position within the
    scrollable area currently is:


    ```

    CGPoint viewPosPercent = CGPointMake(viewPos.x / (levelSize.width - viewSize.width),

                                         viewPos.y / (levelSize.height - viewSize.height));

    ```


    You now have the _physicsNode’s position in a range of 0.0 to 1.0, where *0,0*
    refers to the lower-left scrollable area position of 284x160 and *1,1* refers
    to the top-right position 3716x340\. Next you have to apply this percentage to
    every layer, taking into account the layer’s own size.


    Try to do the calculation in [Listing 3-13](#part0012.html#list13) in your head
    or on paper once, using 568x384 as the layerSize width and height and 568x320
    as the viewSize width and height and tell me what values you get for layerPos
    when viewPosPercent is 0.5, 0.5.


    [***Listing 3-13***](#part0012.html#_list13). Calculating the layer’s position
    relative to viewPosPercent


    ```

    for (CCNode* layer in _backgroundNode.children)

    {

        CGSize layerSize = layer.contentSizeInPoints;

        CGPoint layerPos = CGPointMake(viewPosPercent.x * (layerSize.width - viewSize.width),

                                       viewPosPercent.y * (layerSize.height - viewSize.height));

    }

    ```


    If neither you nor I made a mistake, you should have noticed that where layerSize
    and viewSize are the same, the result is 0\. And 0 multiplied by whatever remains
    0\. Thus, on the x axis you get 0 as layerPos.x, while layerPos.y is calculated
    to be the following:


    ```

    0.5 * (384 – 320) = 32 points

    ```


    In English: this layer can move vertically within a range of 64 points and its
    Y position is currently offset by 32 points.


    After the layerPos has been calculated, it is negated just like viewPos and assigned
    to the layer:


    ```

    layer.positionInPoints = ccpNeg(layerPos);

    ```


    Be sure to use positionInPoints so that the position is properly converted from
    points to other position types, if needed. To put everything in context, [Listing
    3-14](#part0012.html#list14) shows the updated scrollToTarget: method again in
    full.


    [***Listing 3-14***](#part0012.html#_list14). Scrolling with parallaxing layers


    ```

    -(void) scrollToTarget:(CCNode*)target

    {

        CGSize viewSize = [CCDirector sharedDirector].viewSize;

        CGPoint viewCenter = CGPointMake(viewSize.width / 2.0, viewSize.height / 2.0);


    CGPoint viewPos = ccpSub(target.positionInPoints, viewCenter);


    CGSize levelSize = _levelNode.contentSizeInPoints;

        viewPos.x = MAX(0.0, MIN(viewPos.x, levelSize.width - viewSize.width));

        viewPos.y = MAX(0.0, MIN(viewPos.y, levelSize.height - viewSize.height));


    _physicsNode.positionInPoints = ccpNeg(viewPos);


    CGPoint viewPosPercent = CGPointMake(viewPos.x / (levelSize.width - viewSize.width),

                                             viewPos.y / (levelSize.height - viewSize.height));


    for (CCNode* layer in _backgroundNode.children)

        {

            CGSize layerSize = layer.contentSizeInPoints;

            CGPoint layerPos = CGPointMake(viewPosPercent.x * (layerSize.width - viewSize.width),

                                           viewPosPercent.y * (layerSize.height - viewSize.height));

            layer.positionInPoints = ccpNeg(layerPos);

        }

    }

    ```


    One last thing, remember how you used the _levelNode in the touchBegan:withEvent:
    method to convert the touch location relative to the _levelNode? You’ll have to
    replace this use of _levelNode with _physicsNode as well, as seen in the code
    fragment in [Listing 3-15](#part0012.html#list15).


    [***Listing 3-15***](#part0012.html#_list15). Replace _levelNode with _physicsNode
    in touchBegan:withEvent


    ```

    CGPoint pos = [touch locationInNode:_physicsNode];

    ```


    If you were to keep using the _levelNode, you would notice that you’re prevented
    from scrolling further than approximately half a screen size. That’s because the
    _levelNode no longer changes its position during scrolling, with the _physicsNode
    having taken its place.


    Publish, build, and run. You can now see the background layers parallaxing like
    in [Figure 3-20](#part0012.html#Fig20).


    ![9781484202630_Fig03-20.jpg](images/00059.jpeg)


    [Figure 3-20](#part0012.html#_Fig20). Player moving toward the right and up shows
    the effect of parallaxing background layers


    Summary


    In this chapter, you learned how to control the player with touches and actions,
    and how to scroll the level contents and background layers as the player moves
    about the level. You also learned a lot about images, SpriteSheets and the settings
    related to image conversion and publishing.


    The current state of the project can be found in the *03 - Parallax Scrolling*
    folder.


    In the next chapter, you’ll learn more about CCPhysicsNode and how to create impenetrable
    level borders to keep the player from falling outside the level.


    Chapter    4


    Physics & Collisions


    In this chapter, you’ll learn more about editing physics properties with SpriteBuilder
    and how to control the player through physics rather than actions. You’ll add
    impenetrable physics bodies as level borders to prevent the player character from
    moving outside the level boundaries.


    You’ll also learn about how to run code when a collision occurs—in this case,
    to trigger game events like ending the current level—and how to set up collision
    categories and masks to allow certain physics bodies to pass through each other.


    Player Physics


    In the previous chapter, you already added a Physics node to the Level1.ccb and
    made the player node a child of the newly introduced Physics node. This instance
    of CCPhysicsNode acts as the physics world that controls global physics behaviors—most
    of all, gravity. Any node that should move and interact like a physics object
    must be a child or grandchild of a CCPhysicsNode.


    Let’s give this a try right away and enable physics for the player.


    Enabling Physics for the Player Sprite


    First try this: open Level1.ccb, select the player, and try to switch to the Item
    Physics tab—the third tab in the Details Inspector on the right. You’ll notice
    it’s grayed out—it can’t be selected. This is always the case for Sub File nodes:
    they do not support physics.


    Instead, open the Player.ccb in the Prefabs folder and select the CCSprite root
    node. Now you can switch to the Item Physics tab and select the Enable Physics
    check box. Behind the scenes, when the CCB is being loaded, the CCBReader will
    create an instance of the CCPhysicsBody class and assign it to the node’s physicsBody
    property. When discussing nodes with physics, I will use the term “body” synonymously
    for “node,” primarily when the context refers to the physics properties and behavior
    of the node.'
