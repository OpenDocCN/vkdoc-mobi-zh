    \n构造关卡物理\n\n我觉得重力有点偏低。感觉太像月球了，应该更接近地球。或者只是更强一点。如果牛顿能像在 SpriteBuilder 中一样轻松地改变重力，他一定会很高兴。\n\
    \n然后你将创建包围关卡的边界，防止玩家离开可玩区域，并引导其走向出口。\n\n更改重力\n\n要更改重力，请打开`Level1.ccb`，并在时间线中选择物理节点（如果未重命名，它会显示为`CCPhysicsNode`）。在其“项目属性”选项卡中，有一个标记为`CCPhysicsNode`的部分，其中包含“重力”属性，如图\
    \ 4-5 所示。将重力`Y`值从其默认值`-100`改为`-200`。该值为负，因为在 Cocos2D 中，正`Y`轴向上延伸，而重力是向下的力。\n\n\
    ![9781484202630_Fig04-05.jpg](img/00064.jpeg)\n\n图 4-5. 将`CCPhysicsNode`的重力增加到`-200`\n\
    \n请注意，重力不是一个单一值，而是一个具有`x`/`y`分量的向量。没有什么能阻止你增加一点侧向重力，尽管那会相当不寻常。\n\n再次发布、构建并运行。看看你是否喜欢新的重力。请随时返回到`GameScene.ccb`根节点，尝试调整三个`_player`值以及重力，以感受更大或更极端的值。当你完成实验后，你可能希望分别将值恢复为图\
    \ 4-4 和图 4-5 中的值。否则，不同的值可能会在本书后续内容中引入不可预测的行为，或者仅仅导致你无法完成关卡。\n\n你应该保持“睡眠时间阈值”属性不变。它决定了物理体进入睡眠状态的速度，睡眠状态是指物体静止不动以减少\
    \ CPU 负载的状态。当对物体施加力时，睡眠中的物体会被唤醒，并且物体必须具有非常小的速度和角动量才能开始睡眠。此设置对于离开屏幕并在巨大虚空中持续下落的物体不产生效果。\n\
    \n插曲：处理丢失的物体\n\nCocos2D 永远不会自动移除节点。当前不在屏幕上的节点仍然是场景层次结构的一部分；它们会留在内存中并执行动作，尽管它们不会被渲染。\n\
    \n如果你编写一个游戏，其中节点被创建但从未在它们移出可玩区域时被删除，最终游戏的帧率会随着时间的推移而下降。在这种情况下，你必须编写代码来定期检查每个节点的位置是否越过了某个假想边界——例如，在`update:`方法中。如果确定某个节点位于允许边界之外，则向该节点发送`removeFromParent`消息以将其移除。代码清单\
    \ 4-6 给出了一个示例。\n\n***代码清单 4-6***. 基于`Y`坐标移除节点的示例\n\n```\n-(void) update:(CCTime)delta\n\
    {\n    if (_playerNode.position.y < (-_playerNode.contentSize.height))\n    {\n\
    \        [_playerNode removeFromParent];\n    }\n\n// more code here ...\n}\n\
    ```\n\n这里的括号`(-_playerNode.contentSize.height)`只是为了清晰起见，因为其前面有一个容易被忽略的负号。\n\n\
    在这个项目中，你不需要像代码清单 4-6 中那样的检查，因为你将用不可逾越的墙壁包围关卡。\n\n创建静态关卡边界\n\n你可能还记得本章前面提到物理体有两种模式：动态和静态。动态允许物体在世界中自由移动，并且它会响应冲量和力，包括重力。对于不可移动的物理体，你应该选择静态模式。\n\
    \n设置为静态的物体永远不会通过自身或通过力改变其位置或旋转，无论其他物体如何猛烈撞击它。然而，你仍然可以手动更改静态物体的位置和旋转。但是，对于这个练习，你只需要一些非动画的、刚性的墙壁。\n\
    \n创建墙壁模板\n"
- fmt: '您将在`Level1b`精灵表中找到第一关的所有墙体图像。这些图像的名称为`level1_foreground_top1.png`到`level1_foreground_top7.png`。您也可以使用自己创建或从互联网下载的图像——操作流程相同。


    准备好图像后，在`Prefabs`文件夹中新建一个子文件夹：右键点击`Prefabs`文件夹，选择“新建文件夹”选项。将新文件夹命名为`Borders`。右键点击`Borders`文件夹，创建一个新文件。


    实际上，您将创建多个包含墙体模板的文件，但我仅描述第一个文件的创建过程。其余文件的创建和编辑方式相同，留作您的练习。


    在“新建文件”对话框中，依次将文件命名为`Border1.ccb`，并将其类型设置为`Sprite`。然后点击“创建”。


    创建`Border1.ccb`后，在时间轴中选择`CCSprite`根节点。在右侧“详细信息检查器”的“项目属性”选项卡中，将精灵的“精灵帧”属性更改为`SpriteSheets/Level1b/level1_foreground_top1.png`。


    **提示**：如果您处理的是非常暗（甚至全黑）的图像，可能无法看清精灵的轮廓。这种情况下，您可以转到`Document`->`Stage Color`，选择一个对比度高的背景色。灰色通常效果不错。如果您有自虐倾向，可以试试绿色。


    您可能需要放大精灵以便更容易地编辑其形状。从`Document`菜单中选择“放大”和“缩小”命令来实现。


    在“项目物理”选项卡的“详细信息检查器”中，勾选“启用物理”复选框。然后将刚体的类型更改为`Static`，并确保“物理形状”设置为`Polygon`。请参考[图4-6](#part0013.html#Fig6)。


    ![9781484202630_Fig04-06.jpg](images/00065.jpeg)


    [图4-6](#part0013.html#_Fig6). 静态边框图像的物理设置


    编辑物理形状


    当物理形状设置为`Polygon`时，您可以手动修改刚体的形状。注意到选择矩形的角手柄颜色发生变化了吗？之前是灰蓝色，现在变成了粉红色，呃，就是粉色。到底是谁选的颜色？


    粉色手柄表示您可以拖放各个角点来改变多边形形状。尝试点击并拖动某些选择角，创建一个类似[图4-7](#part0013.html#Fig7)所示的形状。


    ![9781484202630_Fig04-07.jpg](images/00066.jpeg)


    [图4-7](#part0013.html#_Fig7). 边框图像的物理形状矩形略有修改


    **提示**：当您切换到“项目物理”选项卡以外的其他“详细信息检查器”选项卡时，常规的选择矩形将出现，您将无法再编辑物理形状。要查看和编辑节点的物理形状，您必须停留在“项目物理”选项卡上。


    显然，[图4-7](#part0013.html#Fig7)中图像的轮廓无法用四条边来完美建模。您可以通过点击线段上或附近的任意位置来添加点。尝试通过添加更多点并将其拖动到所需位置，来描摹[图4-8](#part0013.html#Fig8)中所示的图像轮廓。不需要完美——远远不需要。


    ![9781484202630_Fig04-08.jpg](images/00067.jpeg)


    [图4-8](#part0013.html#_Fig8). 使用尽可能少的点描摹图像轮廓的最终形状


    **注意**：*线段*（或简称为*段*）是具有两个定义端点的线。虽然通常您也可以称其为*线*，但从技术上讲，线具有无限长度。*线段*是两点之间的线，具有有限长度。在提及两点之间的线时，我将使用*线段*一词，但如果您更喜欢，也可以将其理解为“线”。


    为了获得最佳性能，请尽量最小化多边形点的数量。根据经验，大多数形状可以用6到12个点合理地进行轮廓描摹。如果需要的顶点更多，您应该考虑更粗略地描摹图像轮廓。随着多边形点数量的增加，复杂形状的计算成本也会增加。过于精细的形状还可能导致或多或少微妙的碰撞问题，例如物体卡住或以不真实的方式相互弹开。


    如果您需要删除形状上的一个点，只需右键点击该点，它就会消失。如果您想完全重新开始，请取消选中并重新选中“启用物理”复选框。这会将多边形形状重置为矩形。但是，这也会将刚体重置为`Dynamic`，并将所有其他物理属性重置为默认值；因此，请仅在万不得已时使用。


    编辑多边形形状时，需要注意两点：线段绝不能交叉，并且线段不能相互平行或接近平行。`SpriteBuilder`会以红色高亮显示无效线段。


    您仍然可以发布并使用包含无效线段的形状，但在碰撞检测和碰撞响应方面，它们将无法正确工作。[图4-9](#part0013.html#Fig9)显示了两个无效线段的示例：上半部分中两条线段相交（重叠），而下半部分中两条线段过于接近，形成了一个非常尖锐的边缘。


    ![9781484202630_Fig04-09.jpg](images/00068.jpeg)


    [图4-9](#part0013.html#_Fig9). 此形状包含一些无效线段，在碰撞期间可能会行为异常


    现在，重复创建边框`CCB`文件并编辑其余边框精灵的碰撞形状。如果您愿意，可以只制作一个额外的边框`CCB`精灵，这样至少可以增加一点多样性。


    **提示**：请记住，您可以随时返回边框`CCB`并更改其碰撞形状和其他属性。对边框`CCB`所做的所有更改都将反映在该`CCB`的所有“子文件”实例中——例如，您即将添加到关卡中的几十个边框。


    添加关卡边框


    设置好边框元素后，您现在可以将它们添加到关卡中。


    打开`Level1.ccb`。首先，从“节点库视图”中将一个常规`Node`拖到时间轴的`CCPhysicsNode`上，使其成为`CCPhysicsNode`的子节点。然后，将这个新节点重命名为`borders`。然后，您可以将所有边框节点分组到这个`borders`节点下。这样，您就可以展开和折叠其子节点，有效地将`borders`节点当作`Finder`中的文件夹使用。


    编辑完关卡的边框后，您会很乐意能够折叠`borders`节点，避免边框节点堆满时间轴。此外，您可以点击`borders`节点上的眼睛或锁定符号，分别隐藏其所有子节点或将其设置为只读。


    现在，切换到“Tileless编辑器视图”选项卡，开始将边框元素拖放到舞台上。最好将第一个元素直接拖放到时间轴的`borders`节点上，使其成为`borders`节点的子节点。选中新添加的边框节点后，您可以直接将其他所有边框节点拖放到舞台上。被拖放的节点将自动成为选中节点的兄弟节点，即它们共享同一个父节点。


    请确保每种边框类型只添加一次。然后在时间轴中将每个边框的名称更改为类似`border1`到`border7`的名称，以便您能在时间轴中轻松识别其类型。请参考[图4-10](#part0013.html#Fig10)。


    ![9781484202630_Fig04-10.jpg](images/00069.jpeg)


    [图4-10](#part0013.html#_Fig10). 添加了边框的`Level1.CCB`时间轴'
  raw: 'You’ll find all wall images for the first level in the Level1b spritesheet.
    The images are named level1_foreground_top1.png through level1_foreground_top7.png.
    You can also use images you create yourself or download from the Internet—the
    process is the same.


    With the images at hand, add a subfolder in the Prefabs folder by right-clicking
    the Prefabs folder and choosing the New Folder option. Name the new folder Borders.
    Right-click the Borders folder, and create a New File.


    Actually, you’re going to create several files with wall templates, but I’m only
    going to describe the creation of the first. The rest are created and edited in
    the same way and left for you as an exercise.


    In the New File dialog, consecutively name the file, starting with Border1.ccb,
    and choose Sprite as its type. Then click Create.


    After creating the Border1.ccb, select the CCSprite root node in the Timeline.
    Change the sprite’s Sprite frame property to SpriteSheets/Level1b/level1_foreground_top1.png
    on the Item Properties tab in the Details Inspector on the right.


    **Tip**  If you are working with very dark, if not black, images, you may not
    be able to make out the sprite’s outline. If that is the case, you can go to Document
    ![image](images/00008.jpeg) Stage Color and select a background color that gives
    you good contrast. Gray usually works well. Try Green if you have masochistic
    tendencies.


    You may want to zoom in on the sprite to make it easier to edit its shape. Choose
    the Zoom In and Zoom Out commands from the Document menu to do so.


    In the Details Inspector on the Item Physics tab, select the “Enable physics”
    check box. Then change the body’s type to Static and ensure “Physics shape” is
    set to Polygon. See [Figure 4-6](#part0013.html#Fig6) for reference.


    ![9781484202630_Fig04-06.jpg](images/00065.jpeg)


    [Figure 4-6](#part0013.html#_Fig6). A static border image’s physics settings


    Editing Physics Shapes


    With the Physics shape set to Polygon, you can manually modify the body’s shape.
    Notice how the selection rectangle’s corner handles have changed color? Previously,
    they were a grayish blue, but now they are pinkish, uhm, pink. Who picks these
    colors, anyway?


    The pink handles tell you that you can drag and drop individual corner points
    to change the polygon shape. Try clicking and dragging some of the selection corners
    to create a shape like the one shown in [Figure 4-7](#part0013.html#Fig7).


    ![9781484202630_Fig04-07.jpg](images/00066.jpeg)


    [Figure 4-7](#part0013.html#_Fig7). Border image’s physics shape rectangle slightly
    modified


    **Tip**  When you switch to another Details Inspector tab other than the Item
    Physics tab, the regular selection rectangle will appear and you can no longer
    edit the physics shape. In order to view and edit a node’s physics shape, you
    have to be on the Item Physics tab.


    It’s obvious that four edges don’t suffice to model the outline for the image
    in [Figure 4-7](#part0013.html#Fig7). You can add points by clicking anywhere
    on or near a line segment. Try to trace the image’s outline as seen in [Figure
    4-8](#part0013.html#Fig8) by adding more points and dragging them to their desired
    position. It doesn’t need to be perfect—far from it.


    ![9781484202630_Fig04-08.jpg](images/00067.jpeg)


    [Figure 4-8](#part0013.html#_Fig8). The final version of the shape using as few
    points as possible to trace the image’s outline


    **Note**  A *line segment*, or just *segment*, is a line with two defined end
    points. Though commonly you would refer to it as a *line* as well, technically
    a line has infinite length. A *segment* is a line between two points, having finite
    length. I’ll be using *segment* when I refer to the line between two points, but
    feel free to read the word as “line” if you prefer.


    For the best performance, try to minimize the number of polygon-shaped points.
    As a rule of thumb, most shapes can be reasonably outlined with anywhere between
    6 to 12 points. Where more vertices are required, you should consider tracing
    the image outline more roughly. Complex shapes are computationally more expensive
    as the number of polygon points increases. Too-elaborate shapes can also introduce
    more or less subtle issues, like objects getting stuck or bouncing off of each
    other in unrealistic ways.


    If you need to delete a point on the shape, just right-click the point and it’s
    gone. And if you want to completely start over, deselect and reselect the “Enable
    physics” check box. This will reset the polygon shape to a rectangle. However,
    this will also reset the body to Dynamic as well as resetting all other physics
    properties to their default values; so use this only as a last resort.


    When editing polygon shapes, there are two things to watch out for: segments must
    never cross, and segments must not be parallel or close to being parallel to each
    other. SpriteBuilder will highlight invalid segments in red.


    You can still publish and use shapes with invalid segments, but they will not
    behave correctly when it comes to collision detection and collision responses.
    [Figure 4-9](#part0013.html#Fig9) shows an example of two invalid segments: in
    the upper half two segments are intersecting (overlapping), while in the lower
    half two segments are too close to each other, forming a very sharp edge.


    ![9781484202630_Fig04-09.jpg](images/00068.jpeg)


    [Figure 4-9](#part0013.html#_Fig9). This shape has some invalid segments and will
    likely behave improperly during collisions


    Now repeat creating border CCB files and editing their collision shapes for the
    remaining border sprites. If you like, you can cut it short and do only one additional
    border CCB sprite, so you have at least a little variety.


    **Tip**  Keep in mind that you can always go back to the border CCBs at any time
    and change their collision shapes and other properties. All changes to a border
    CCB will be reflected by all Sub File instances of that CCB—for instance, the
    possibly dozens of borders you are going to add to the level.


    Adding Level Borders


    With the border elements set up, you can now add them to the level.


    Open Level1.ccb. Start by dragging a regular Node from the Node Library View onto
    the CCPhysicsNode in the Timeline so that it becomes a child node of the CCPhysicsNode.
    Then rename this new node as **borders**. You can then group all the border nodes
    under this borders node. This, in turn, allows you to expand and collapse its
    children, effectively using the borders node like a folder in Finder.


    Once you’re done editing the level’s borders, you will be glad to be able to collapse
    the borders node and not have the border nodes clutter up the Timeline. Moreover,
    you can click on the eye or lock symbols on the borders node in order to hide
    all of its child nodes respectively to make them read-only.


    Now switch to the Tileless Editor View tab and start dragging and dropping border
    elements onto the stage. It’s best to drag and drop the first one directly onto
    the borders node in the Timeline so that it becomes a child node of the borders
    node. With the newly added border node selected, you can then drag and drop all
    other border nodes directly onto the stage. Dropped nodes will automatically become
    siblings of the selected node, as in they share the same parent.


    Be sure you add each border type exactly once. Then change the name of each in
    the Timeline to something like **border1** through **border7** so that you can
    easily identify their type in the Timeline. See [Figure 4-10](#part0013.html#Fig10)
    for reference.


    ![9781484202630_Fig04-10.jpg](images/00069.jpeg)


    [Figure 4-10](#part0013.html#_Fig10). Level1.CCB Timeline with borders added'
