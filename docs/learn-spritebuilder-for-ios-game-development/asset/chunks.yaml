    ```


    ## 显示和移除弹出菜单


    在 Xcode 中，让我们在您实际创建相应的 CCB 文件之前，继续实现一些代码。目标是按名称显示一个弹出屏幕——在本例中，是在点击暂停按钮时显示暂停菜单弹出层。


    在`GameMenuLayer.m`中，更新`shouldPauseGame`方法，如***列表 6-5***所示。


    ***列表 6-5***. 显示暂停弹出菜单


    ```

    -(void) shouldPauseGame

    {

        [_gameScene showPopoverNamed:@"UserInterface/Popovers/PauseMenuLayer"];

    }

    ```


    这调用了一个尚未在`GameScene`类中定义的方法`showPopoverNamed:`。由于我们还需要移除弹出菜单，因此使用***列表 6-6***中高亮显示的方法声明来更新`GameScene.h`接口。


    ***列表 6-6***. 声明用于显示和移除弹出层的方法


    ```

    #import "CCNode.h"


    @interface GameScene : CCNode<CCPhysicsCollisionDelegate,CCBAnimationManagerDelegate>


    -(void) showPopoverNamed:(NSString*)popoverName;

    -(void) removePopover;


    @end

    ```


    在类的`@interface`部分声明方法允许这些方法从其他类中调用，而不会引发编译器警告。


    现在，在`GameScene.m`中添加***列表 6-7***中的`showPopoverNamed:`方法。将其添加到文件的最底部，紧接在`@end`行之上。


    ***列表 6-7***. 显示弹出菜单


    ```

    -(void) showPopoverNamed:(NSString*)name

    {

        if (_popoverMenuLayer == nil)

        {

            GameMenuLayer* newMenuLayer = (GameMenuLayer*)[CCBReader load:name];

            [self addChild:newMenuLayer];


            _popoverMenuLayer = newMenuLayer;

            _popoverMenuLayer.gameScene = self;


            _gameMenuLayer.visible = NO;

            _levelNode.paused = YES;

        }

    }

    ```


    检查`_popoverMenuLayer`是否为`nil`可确保同一时间只存在一个可见的弹出菜单，即使该方法因意外情况连续运行两次。然后使用`CCBReader
    load:`方法按名称加载 CCB。返回值被转换为`GameMenuLayer*`，这假设所有弹出菜单都使用`GameMenuLayer`作为其自定义类。然后，在将`newMenuLayer`赋值给实例变量`_popoverMenuLayer`之前，将其添加为子节点。


    您可能想知道：“为什么不直接赋值给`_popoverMenuLayer`，然后移除局部变量`newMenuLayer`？”原因是`_popoverMenuLayer`被声明为`__weak`，因此它不会保留任何赋值给它的引用。但当`CCBReader
    load:`返回时，即使只有很短的时间，也没有强引用持有返回的节点。因此，ARC 会释放该节点，并将`_popoverMenuLayer`引用设置为`nil`，甚至会在下一行`addChild:`运行之前发生！准确地说：在调试配置中，根据设备不同，它可能工作也可能不工作，但在发布配置中肯定不工作。


    **提示**：我建议在`addChild:`行之前直接添加一行`NSAssert`来验证`newMenuLayer`不为`nil`。弹出层可能位于不同的文件夹，CCB
    名称中可能有拼写错误，或者弹出层 CCB 文件根本尚未创建或发布。这些是常见且经常重复出现的问题，不仅限于此示例游戏。尽早尝试捕获这些问题是一个好主意。


    与之前的`_gameMenuLayer.gameScene`类似，`_popoverMenuLayer.gameScene`被赋值为`self`，以允许`GameMenuLayer`类内部的方法向`GameScene`实例发送消息。

    '
- fmt: '# 排版后的文档


    当弹出菜单显示时，暂停按钮和其他静态用户界面元素应被隐藏。将`_gameMenuLayer.visible`设置为`NO`可有效隐藏该层，从而隐藏暂停按钮，进而使该按钮处于非激活状态。可以说，看不见的按钮就是无法触摸的按钮。


    暂停`_levelNode`会暂停`levelNode`的所有子节点，从而阻止游戏继续运行。暂停一个节点会暂停其时间线动画、正在运行的动作以及计划的调度器。由于`_physicsNode`是`_levelNode`的子节点，物理世界也将被暂停。


    要移除弹出菜单，你还需要在`showPopoverNamed:`方法下方添加来自[Listing 6-8](#part0015.html#list8)的`removePopover`方法。该方法只是将节点从其父节点（`GameScene`节点）中移除，并将`_popoverMenuLayer`实例变量设置为`nil`，以允许新的弹出菜单出现。尽管`_popoverMenuLayer`应该会立即自动变为`nil`，但显式地为其赋值为`nil`是提醒自己这是有意为之的好习惯。


    [***Listing 6-8***](#part0015.html#_list8)。移除弹出菜单


    ```

    -(void) removePopover

    {

        if (_popoverMenuLayer)

        {

            [_popoverMenuLayer removeFromParent];

            _popoverMenuLayer = nil;


    _gameMenuLayer.visible = YES;

            _levelNode.paused = NO;

        }

    }

    ```


    最后，包含暂停按钮的`_gameMenuLayer`再次变为可见，并且`_physicsNode`被取消暂停。


    通过此设置，你可以干净利落地显示和隐藏弹出菜单。只剩下一件事需要准备。在`GameMenuLayer.m`中，你应该在`shouldPauseGame`方法下方添加[Listing
    6-9](#part0015.html#list9)中的两个方法。


    [***Listing 6-9***](#part0015.html#_list9)。使`GameMenuLayer`能够通过播放特定时间线动画来恢复游戏


    ```

    -(void) shouldResumeGame

    {

        CCAnimationManager* am = self.animationManager;

        if ([am.runningSequenceName isEqualToString:@"resume game"] == NO)

        {

            [am runAnimationsForSequenceNamed:@"resume game"];

        }

    }


    -(void) resumeGameDidEnd

    {

        [_gameScene removePopover];

    }

    ```


    这里的思路是，`shouldResumeGame`运行一个名为`resume game`的特定时间线。但前提是这个特定的时间线当前没有在运行，以防止用户快速连续多次点击恢复按钮，从而意外地重新启动该时间线。


    **注意**：时间线名称区分大小写。因此，建议为所有时间线名称遵循一个通用规则——例如，全部使用小写字母或使用驼峰命名法（每个单词以大写字母开头）。


    ## 暂停游戏


    剩下要做的就是创建一个实际的暂停菜单弹出窗口，作为`Layer`类型的CCB文件。在其中，创建一个名为`resume game`的时间线动画，该动画有一个`Callbacks`关键帧，用于运行`resumeGameDidEnd`选择器。


    ## 创建暂停菜单弹出窗口


    对于此弹出菜单以及后续的弹出菜单，在SpriteBuilder的*File View*中的`UserInterface`文件夹下添加一个名为`Popovers`的子文件夹。然后右键单击`Popovers`文件夹，选择*New
    File*，创建一个类型为`Layer`的CCB文档，命名为`PauseMenuLayer.ccb`。


    对于此弹出菜单和所有其他弹出菜单CCB，你应做的第一件事是将根节点的*Content size*属性设置为宽度和高度均为`100%`，以便将其缩放以匹配每个设备的屏幕尺寸。保持根节点选中状态，选择*Item
    Code Connections*选项卡，并在*Custom class*中输入`GameMenuLayer`。这与`GameMenuLayer`的类是相同的。


    **注意**：对所有弹出菜单（包括`GameMenuLayer`本身）使用相同类的原因是，它们都共享大量公共代码。例如，它们都会暂停游戏，并且都有一个重启按钮。此外，`GameMenuLayer`中的代码简短明了。


    接下来，你需要添加一个比任何设备屏幕都稍小的背景图形，以便它可以轻松地在所有设备上居中。大约`320x240`是一个不错的尺寸。使用比任何屏幕尺寸都小的背景可以大大简化用户界面设计。你只需居中内容，完全忽略任何屏幕尺寸的考虑。只有从图层背景到屏幕边缘的距离会变化。


    从*Node Library View*中拖放一个*Sprite*到舞台上，并将其*Sprite frame*更改为`SpriteSheets/UserInterface/P_bg.png`。或者，你也可以从*Tileless
    Editor View*中拖放`P_bg`；你可能需要在*Tileless Editor View*下方的*Filter folders*列表中勾选*UserInterface*复选框。无论你如何创建精灵，都应将其位置类型设置为`%`，并将两个位置值都设置为`50`，以便精灵居中。


    **提示**：如果你因为图像太暗而难以看到精灵图像，请转到Document ![image](images/00008.jpeg) Stage Color，并为舞台选择不同的背景颜色。


    你也必须为所有后续节点使用`%`位置。标签和按钮的实际布局由你决定，重要的是使图层中的所有节点成为背景精灵的子节点，这样它们的位置始终相对于背景精灵的左下角，而不是相对于屏幕的左下角。这样，如果你决定背景不应该居中而是稍微偏移，你可以将精灵与背景一起移动。


    从*Node Library View*添加一个*Label TTF*，使其成为`P_bg`精灵的子节点，并将其位置类型更改为`%`。将其拖放到你喜欢的位置。哦，还要将*Label
    text*字段改为类似`Game Paused`的内容。你可能还想选择不同的字体或更改字体大小。


    接下来，从*Node Library View*中依次添加三个*Button*节点。使它们成为`P_bg`精灵的子节点，并将它们的位置类型也改为`%`。然后将它们移动到适当的位置。参见[Figure
    6-6](#part0015.html#Fig6)了解可能的结果。


    ![9781484202630_Fig06-06.jpg](images/00090.jpeg)


    [Figure 6-6](#part0015.html#_Fig6)。完成的`PauseMenuLayer.ccb`


    对于每个按钮，在*Item Properties*选项卡上执行以下步骤：


    *   根据正在编辑的按钮，将*Title*设置为`Restart`、`Exit`或`Resume`。

    *   将*Normal State*和*Highlighted State*的*Sprite frame*都更改为相同的图像。你可能想使用来自`SpriteSheets/UserInterface`的以下图像：`P_restart.png`、`P_exit.png`、`P_resume.png`。

    *   对于*Highlighted State*，将*Background color*和*Label color*都更改为灰色——例如，十六进制代码为`#999999`的网页颜色。这将在触摸按钮时提供视觉提示：在高亮状态下，它们会显得更暗。

    *   在*CCLabelTTF*部分，根据需要编辑*Font name*和*Font size*。你可能需要增加*Horizontal padding*，甚至增加*Vertical
    padding*，以使背景图像稍大，从而按钮文本完全包含在背景框中。


    编辑属性后，切换到*Item Code Connections*选项卡。对于每个按钮，输入相应的*Selector*：`shouldRestartGame`、`shouldExitGame`和`shouldResumeGame`。


    你现在可以发布、构建并运行项目。然后点击暂停按钮查看你的新弹出菜单。请注意，在此阶段点击图层上的任何按钮都会导致崩溃。


    如果节点不在它们应该的位置，请验证父子关系是否正确，并且所有节点的位置类型都已设置为`%`。参考[Figure 6-6](#part0015.html#Fig6)进行对照。


    ## 幕间：全屏弹出窗口


    一个仅临时替换当前场景的游戏内菜单是常见需求，开发者常常不知道如何实现它。'
  raw: 'When a popover menu is shown, the pause button and other static user interface
    elements should be hidden. Setting the _gameMenuLayer.visible to NO effectively
    hides the layer and thus the pause button, which in turn makes the button inactive.
    A button you can’t see is a button you can’t touch, so to speak.


    Pausing the _levelNode prevents the game from advancing by pausing all of the
    child nodes of the levelNode. Pausing a node pauses its Timeline animations, running
    actions, and scheduled selectors. Because the _physicsNode is a child of the _levelNode,
    the physics world will also be paused.


    In order to remove a popover menu, you also need to add the removePopover method
    from [Listing 6-8](#part0015.html#list8) just below the showPopoverNamed: method.
    It just removes the node from its parent (the GameScene node) and sets the _popoverMenuLayer
    ivar to nil to allow a new popover to appear. Even though the _popoverMenuLayer
    should become nil automatically right away, it’s a good idea to remind yourself
    that this is intentional by explicitly assigning nil.


    [***Listing 6-8***](#part0015.html#_list8). Removing a popover


    ```

    -(void) removePopover

    {

        if (_popoverMenuLayer)

        {

            [_popoverMenuLayer removeFromParent];

            _popoverMenuLayer = nil;


    _gameMenuLayer.visible = YES;

            _levelNode.paused = NO;

        }

    }

    ```


    Finally, the _gameMenuLayer with the pause button is made visible again and the
    _physicsNode is unpaused.


    With this setup, you can show and hide popover menus quite neatly. There’s only
    one thing left to prepare. In GameMenuLayer.m, you should add the two methods
    of [Listing 6-9](#part0015.html#list9) just below the shouldPauseGame method.


    [***Listing 6-9***](#part0015.html#_list9). Enabling the GameMenuLayer to resume
    the game by playing a specific timeline animation


    ```

    -(void) shouldResumeGame

    {

        CCAnimationManager* am = self.animationManager;

        if ([am.runningSequenceName isEqualToString:@"resume game"] == NO)

        {

            [am runAnimationsForSequenceNamed:@"resume game"];

        }

    }


    -(void) resumeGameDidEnd

    {

        [_gameScene removePopover];

    }

    ```


    The idea here is that shouldResumeGame runs a Timeline with a specific name: *resume
    game*. But only if this specific Timeline isn’t currently running, to prevent
    the user from tapping the resume button multiple times in quick succession and
    thus unintentionally restarting the Timeline.


    **Caution**  Timeline names are case sensitive. Because of this, it’s recommended
    to follow a common rule for all Timeline names—for instance, no uppercase letters
    at all or camel casing, where each word begins with an uppercase letter.


    Pausing the Game


    What’s left to do is to create the actual pause menu popover as a Layer CCB. In
    it, a Timeline animation with the name *resume game* is created that has a *Callbacks*
    keyframe that will run the resumeGameDidEnd selector.


    Creating the Pause Menu Popover


    For this and the following popover menus, add a subfolder named *Popovers* to
    the *UserInterface* folder in SpriteBuilder’s *File View*. Then right-click the
    *Popovers* folder, select *New File* to create a CCB document of type *Layer*,
    named *PauseMenuLayer.ccb*.


    The first thing you should do to this and all other popover CCBs is to set the
    root node’s *Content size* property to *100%* for both width and height, in order
    to scale it up to match each device’s screen size. With the root node still selected,
    select the *Item Code Connections* tab and enter **GameMenuLayer** as the *Custom
    class*. That’s the same class as for the GameMenuLayer.


    **Note**  The reason for using the same class for all popover menus, including
    the GameMenuLayer itself, is that they all share a lot of common code. For instance,
    all of them will pause the game, and they all have a restart button. Plus the
    code in GameMenuLayer is short and simple.


    Next you’ll want to add a background graphic that’s somewhat smaller than any
    device’s screen so that it can easily be centered on all devices. About 320x240
    is a good size. Using a background that’s smaller than any screen size greatly
    simplifies user interface design. You can just center the content and completely
    ignore any screen size considerations. Only the distance from the layer’s background
    to the screen edges will vary.


    Drag and drop a *Sprite* from the *Node Library View* onto the stage and change
    its *Sprite frame* to *SpriteSheets/UserInterface/P_bg.png*. Alternatively, you
    can also drag and drop the P_bg from the *Tileless Editor View*; you may need
    to check the *UserInterface* check box in the *Filter folders* list below the
    *Tileless Editor View*. No matter how you create the sprite, you should set its
    position types to *%* and both position values to *50* so that the sprite is centered.


    **Tip**  If you’re having difficulty seeing the sprite image since it’s pretty
    dark, go to Document ![image](images/00008.jpeg) Stage Color and select a different
    background color for the stage.


    You have to use % positions for all following nodes as well. The actual layout
    of labels and buttons is up to you, it’s only important to make all nodes in the
    layer children of the background sprite so that their positions are always relative
    to the background sprite’s lower left corner rather than relative to the screen’s
    lower left corner. This allows you to move the sprites along with the background
    if you ever decide that the background shouldn’t be centered but rather offset
    a little.


    Add a *Label TTF* from the *Node Library View*, make it a child of the P_bg sprite,
    and change its position types to *%*. Drag and move it to where you like. Oh,
    and change the *Label text* field to something like *Game Paused*. You may also
    want to pick a different font or change the font size.


    Proceed by adding three *Button* nodes, one after another, from the *Node Library
    View*. Make those children of the P_bg sprite, and change their position types
    to *%* as well. Then move them to appropriate locations. See [Figure 6-6](#part0015.html#Fig6)
    for a possible result.


    ![9781484202630_Fig06-06.jpg](images/00090.jpeg)


    [Figure 6-6](#part0015.html#_Fig6). The completed PauseMenuLayer.ccb


    For each button, perform the following steps on the *Item Properties* tab:


    *   Set *Title* to *Restart*, *Exit*, or *Resume*, depending on which button you
    are editing.

    *   Change *Sprite frame* for both *Normal State* and *Highlighted State* to the
    same image. You may want to use the following images from *SpriteSheets/UserInterface*:
    *P_restart.png*, *P_exit.png*, *P_resume.png*.

    *   For *Highlighted State*, change both *Background color* and *Label color*
    to a gray color—for instance, the web color with hex code #999999\. This will
    give a visual cue when touching the buttons: they will appear darker while highlighted.

    *   Under the *CCLabelTTF* section, edit the *Font name* and *Font size* as you
    like. You may need to increase *Horizontal padding*, perhaps even *Vertical padding*,
    to make the background image slightly larger so that the button’s text is wholly
    contained in the background frame.


    After editing the properties, switch to the *Item Code Connections* tab. For each
    button, enter the corresponding *Selector*: shouldRestartGame, shouldExitGame,
    and shouldResumeGame.


    You can publish, build, and run the project now. Then tap the pause button to
    see your new popover menu. Note that tapping any button on the layer will cause
    a crash at this stage.


    If nodes aren’t where they are supposed to be, verify the parent-child relationship
    is correct and that position types are set to *%* for all nodes. See [Figure 6-6](#part0015.html#Fig6)
    for reference.


    Interlude: Full-Screen Popovers


    An in-game menu that only temporarily replaces the current scene is a frequent
    request, and developers are often left wondering how to implement that.'
