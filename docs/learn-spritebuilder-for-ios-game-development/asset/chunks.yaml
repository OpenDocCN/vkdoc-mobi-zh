  trans: "\n# 异常断点：关键的调试利器\n\n在每个 Xcode 项目中，你都必须做一件事：添加一个异常断点，如图 Figure 3-1 所示。要添加异常断点，请点击\
    \ Xcode 中的断点导航器标签页（标签栏中高亮显示的朝右箭头状图标）。在面板底部有一个添加按钮（`+` 符号）。点击它并选择“添加异常断点”。你也可以通过右键点击来编辑该断点。在\
    \ Figure 3-1 中，它被设置为仅捕获 Objective-C 异常。当程序运行到导致错误的代码行时，异常断点会暂停程序，从而让你准确知道程序错误的位置，而不是让\
    \ Xcode 总是跳转到 `main` 方法。异常断点是关键的调试利器。\n\n![9781484202630_Fig03-01.jpg](img/00040.jpeg)\n\
    \nFigure 3-1. 为每个项目添加异常断点是关键的调试手段\n\n现在，触摸事件已启用，并且 `_playerNode` 引用也已赋值，你可以轻松地将玩家移动到触摸位置。目前，使用\
    \ Listing 3-4 中的代码即可。将 Listing 3-4 的代码添加到 `GameScene.m` 实现文件中，放在 `loadLevelNamed:`\
    \ 方法下方。\n\n***Listing 3-4***. 将玩家传送至触摸位置\n\n```\n-(void) touchBegan:(UITouch *)touch\
    \ withEvent:(UIEvent *)event\n{\n    _playerNode.position = [touch locationInNode:self];\n\
    }\n```\n\n这段代码获取触摸位置，并将其从触摸的 Cocoa 坐标系（原点在左上角）转换为 Cocos2D 使用的 OpenGL 坐标系（原点在左下角）。它还将位置转换到所提供节点的局部坐标空间中（此例中为\
    \ `self`）。转换结果直接应用到 `_playerNode` 上。现在，当你构建并运行应用时，玩家会瞬间移动到屏幕上你点击的位置。\n\n# 分配关卡节点实例变量\n\
    \n在接下来的步骤中，你需要一个对关卡节点的引用。除了像玩家那样通过名称获取外，你也可以让 SpriteBuilder 将其直接赋值给 `GameScene`\
    \ 类，前提是该类已经声明了一个同名的实例变量或属性。而你的代码已经做到了这一点，因为 Listing 3-1 中已经做了声明。\n\n通过 SpriteBuilder\
    \ 分配变量和通过名称获取节点同样合适。在大多数情况下，这取决于个人偏好，不过建议不要在计划执行的 `update:` 方法中频繁使用 `getChildByName:`\
    \ 方法，尤其是在涉及递归搜索和深层节点层次结构时。\n\n**警告** 在撰写本文时，从 SpriteBuilder 内部分配变量仅适用于给定 CCB 文件的直接子级节点。它不能用于将位于通过子文件（`CCBFile`）节点导入的另一个\
    \ CCB 文件中的节点分配为实例变量或属性。这就是玩家节点通过名称获取的原因。\n\n在 SpriteBuilder 中打开 `GameScene.ccb`，选择引用\
    \ `Levels/Level1.ccb` 的 `CCBFile` 实例。然后，在右侧的“细节检查器”中，切换到“项目代码连接”标签页。在第二行的文本字段中，输入\
    \ `_levelNode`，这是你在 Listing 3-1 中已声明的实例变量名称。将下拉菜单保留设置为“Doc root var”，如图 Figure\
    \ 3-2 所示。\n\n![9781484202630_Fig03-02.jpg](img/00041.jpeg)\n\nFigure 3-2. 文档根变量会将节点分配给在\
    \ CCB 根节点的自定义类中声明的同名实例变量或属性\n\n如果你发布、构建并运行应用，`CCBReader` 会在发送 `didLoadFromCCB`\
    \ 消息之前赋值 `_levelNode` 实例变量。这是创建对 CCB 文件中所包含节点引用的最简单、最高效的方式。\n\n如果你想确认变量是否已被赋值，可以在\
    \ `didLoadFromCCB` 中添加如下日志语句：\n\n```\nNSLog(@\"_levelNode = %@\", _levelNode);\n\
    ```\n\n运行项目，你会在 Xcode 调试控制台中看到上面这行日志。如有必要，请在 Xcode 中通过“视图”![image](img/00008.jpeg)“调试区域”![image](img/00008.jpeg)“激活控制台”打开控制台。如果看到\
    \ `_levelNode = (null)`，那么 Figure 3-2 中的变量名可能与该实例变量的名称不匹配。否则，日志中的信息将类似于：\n\n```\n\
    LearnSpriteBuilder[54443:70b] _levelNode = <CCNode = 0x9f77b30 | Name = >\n```\n\
    \n# 使用 `CCActionMoveTo` 移动玩家\n\n为了将玩家平滑地移动到目标位置，你可以用 Listing 3-5 中基于动作的移动代码替换\
    \ `touchBegan:withEvent:` 方法的内容。\n\n***Listing 3-5***. 使用移动动作平滑移动玩家\n\n```\n-(void)\
    \ touchBegan:(UITouch *)touch withEvent:(UIEvent *)event\n{\n    CGPoint pos =\
    \ [touch locationInNode:_levelNode];\n    CCAction* move = [CCActionMoveTo actionWithDuration:0.2\
    \ position:pos];\n    [_playerNode runAction:move];\n}\n```\n\n首先，触摸位置相对于 `_levelNode`\
    \ 进行转换。这一点很重要，因为它允许玩家在 `_levelNode` 的完整范围（4000x500 点）内移动，而不是局限于屏幕空间（4 英寸 iPhone\
    \ 上为 568x320 点，iPad 上为 1024x768 点）。然而，这一点在游戏中尚未体现，因为还没有滚动功能；因此，玩家无法移动到初始屏幕位置以外的地方。\n\
    \n接下来，创建一个 `CCActionMoveTo` 动作，该动作会在一段时间内将节点移动到指定坐标。然后对该 `_playerNode` 运行此动作。请注意，如果你增加持续时间，会注意到移动动作不会堆叠，玩家最终也不会到达你最后一次点击的位置。要解决这个问题，你需要给动作分配一个标签——你可以选择任意整数。使用这个标签，你可以在运行新动作之前，停止带有相同标签的现有动作。Listing\
    \ 3-6 展示了包含这一改进的更新后代码。\n\n***Listing 3-6***. 按标签停止动作，以避免同时运行多个移动动作\n\n```\n-(void)\
    \ touchBegan:(UITouch *)touch withEvent:(UIEvent *)event\n{\n    [_playerNode\
    \ stopActionByTag:1];\n\n    CGPoint pos = [touch locationInNode:_levelNode];\n\
    \    CCAction* move = [CCActionMoveTo actionWithDuration:20.2 position:pos];\n\
    \    move.tag = 1;\n    [_playerNode runAction:move];\n}\n```\n\n**提示** 你可以在 Cocos2d-Swift\
    \ 类参考中找到所有可用的动作类。它们的类名总是以 `CCAction` 开头：[`www.cocos2d-swift.org/docs/api/index.html`](http://www.cocos2d-swift.org/docs/api/index.html)。\n\
    \n现在，如果构建并运行项目，你应该会看到点击屏幕时，玩家在屏幕上方平滑移动。但玩家仍然无法“离开”初始屏幕。这时就需要滚动登场了。\n\n# 滚动关卡\n\
    \n说到滚动，许多开发者会自然而然地认为是摄像机在背景上移动，从而产生滚动效果。某些引擎和工具集确实采用这种方式，尤其是以 3D 开发工具为核心的情况下。但在\
    \ 2D 游戏引擎中，更常见、更实用的做法是让内容层向移动的反方向移动。\n\n事实上，在 Cocos2D 和许多其他 2D 引擎中，并没有摄像机的概念。甚至连\
    \ Cocos2D 所依赖的渲染技术 OpenGL 也没有摄像机。只有设备屏幕。要改变屏幕上显示的内容，你就必须移动场景中的内容，因为屏幕所代表的摄像机视图是固定的——相对于虚拟世界来说是固定的。当然，你可以在现实世界中自由地移动、倾斜和放下手机，但这不会影响屏幕上显示的内容。\n\
    \n实际上，如果你摔了手机，可能会影响屏幕。但这完全是另一回事了。\n\n# 安排更新\n"
- fmt: "在我们的场景中，如果玩家向右上方移动，实际上我们要做的是将`_levelNode`向左下方移动，以保持玩家在屏幕中心。这给玩家一种向右上方移动的印象，但实际上，玩家一直保持在屏幕中心，而整个关卡的内容则向左下方移动。\n\
    \n尽管如此，玩家的位置依然是你所期望的那样：被限制在关卡节点的范围内，并且是绝对位置。玩家的位置范围将从关卡节点的原点（左下角坐标为`0,0`）到关卡节点的完整范围，此处为`4000x500`点。\n\
    \n为了进行设置，请在`GameScene.m`文件底部的`@end`行上方，添加[清单3-7](#part0012.html#list7)中的`update:`方法。\n\
    \n[***清单3-7***](#part0012.html#_list7) `update:`方法，每帧自动调用一次\n\n```\n-(void) update:(CCTime)delta\n\
    {\n    // 更新滚动节点位置到玩家节点，并加偏移量以在视图中居中玩家\n    [self scrollToTarget:_playerNode];\n\
    }\n```\n\n当在节点类中实现时，`update:`方法由`Cocos2D`自动调用。它在渲染节点到屏幕前的每一帧都会运行。我们需要使用该方法进行滚动，因为玩家的位置当前会随时间被`CCActionMoveTo`更新。之后，玩家的位置将由物理引擎修改。在这两种情况下，我们无法确切知道玩家位置更新的具体时间或位置；因此，滚动位置会在每一帧被重新计算。\n\
    \n与你之前使用旧版`Cocos2D`时不同，你不再需要显式地调度`update:`方法。你仍然可以像`CCNode`类参考文档（[http://www.cocos2d-swift.org/docs/api/Classes/CCNode.html](http://www.cocos2d-swift.org/docs/api/Classes/CCNode.html)）中描述的那样，使用节点的`schedule`和`unschedule`方法来调度其他方法或代码块。例如，要在延迟后执行一次选择器，你可以这样写：\n\
    \n```\n[self scheduleOnce:@selector(theDelayedMethod:) delay:2.5];\n```\n\n然后在同一个类中实现对应的选择器。该选择器必须接受一个`CCTime`类型的参数：\n\
    \n```\n-(void) theDelayedMethod:(CCTime)delta\n{\n    // 你的代码写在这里 ...\n}\n```\n\
    \n**警告** 你绝不应在`Cocos2D`游戏中使用`NSTimer`、任何`performSelector`变体或`Grand Central Dispatch`方法（如`dispatch_after`）来调度定时事件。这些计时方法在节点或`Cocos2D`暂停时不会自动暂停，并且除了`NSTimer`，你甚至无法手动暂停和恢复它们。你也不知道这些计时方法在更新/渲染循环中具体何时运行，或者它们是否能可靠地按相同顺序运行。你应该完全依赖前面提到的`CCNode`调度方法，或者使用包含`CCActionDelay`以及`CCActionCallBlock`或`CCActionCallFunc`的`CCActionSequence`，以便在特定时间或固定间隔后运行代码。\n\
    \n`delta`参数是增量时间，即自上次调用`update:`方法以来的时间差。在每秒60帧的情况下，`delta`时间通常约为`0.0167`。该值以秒为单位。\n\
    \n`delta`时间通常用于以相同速度移动节点，无论帧率如何；然而，这样做存在严重的缺点。本书中我们不会使用`delta`时间，因为我们使用`Cocos2D`的物理引擎进行移动。特别是物理游戏，在帧率降低时应该减速，而不是跳过帧并向前跳跃，导致对象在单帧内移动更远的距离。\n\
    \n### 向相反方向移动关卡节点\n\n当然，你还需要在`GameScene.m`中添加[清单3-8](#part0012.html#list8)中的`scrollToTarget:`方法，以完成基本的滚动功能。`target`参数是我们的`_playerNode`，但我没有直接使用`_playerNode`实例变量，而是将其作为参数传入。这使你可以滚动到不同的目标节点，以便在你完成本书学习并准备扩展项目时使用。\n\
    \n[***清单3-8***](#part0012.html#_list8) 滚动到目标需要一点数学计算\n\n```\n-(void) scrollToTarget:(CCNode*)target\n\
    {\n    CGSize viewSize = [CCDirector sharedDirector].viewSize;\n    CGPoint viewCenter\
    \ = CGPointMake(viewSize.width / 2.0, viewSize.height / 2.0);\n    \n    CGPoint\
    \ viewPos = ccpSub(target.positionInPoints, viewCenter);\n    \n    CGSize levelSize\
    \ = _levelNode.contentSizeInPoints;\n    viewPos.x = MAX(0.0, MIN(viewPos.x, levelSize.width\
    \ - viewSize.width));\n    viewPos.y = MAX(0.0, MIN(viewPos.y, levelSize.height\
    \ - viewSize.height));\n    \n    _levelNode.positionInPoints = ccpNeg(viewPos);\n\
    }\n```\n\n这看起来像数学，闻起来像几何学。而且对你的健康有好处！好吧，我想我需要一个更有说服力的理由。好吧：它其实很简单！好多了吗？\n\n前两行只是设置代码，将视图的大小赋值给`viewSize`，该大小等于屏幕的尺寸（以点为单位）。然后计算视图的中心点并赋值给`viewCenter`。这里没有棘手的数学问题。\n\
    \n`viewPos`变量初始化为`target`的`positionInPoints`减去`viewCenter`。通过`ccpSub`函数进行这个减法，是使目标节点保持在视图中心的关键。如果你不这样做，滚动功能仍然有效，但目标节点会出现在屏幕的左下角。\n\
    \n**提示** `ccpSub`函数以及其他带有`ccp`前缀的函数都在`CGPointExtension.h`头文件中声明。你可以在Xcode项目的`libs/cocos2d-ios.xcodeproj/cocos2d/Support/Math`路径下找到这个文件。`ccp`函数执行许多常用的向量数学运算，如加、减、乘、点积，或计算两点之间的距离。\n\
    \n值得注意的一点是使用了`positionInPoints`而不是`position`。`position`值的解释方式取决于节点的`positionType`属性——例如，如果节点的`positionType`在`SpriteBuilder`中设置为“父容器百分比”，那么`position`值的范围通常是`0.0`到`1.0`。`positionInPoints`属性会根据`positionType`转换位置，并返回以点为单位的绝对位置，赋值时则反之。`contentSize`和`scale`属性都有对应的`contentSizeInPoints`和`scaleInPoints`方法，当你以点为单位进行计算时，应优先使用它们。\n\
    \n`levelSize`变量从`_levelNode.contentSizeInPoints`赋值。它用于接下来的两行代码中，这两行代码通过`MIN`和`MAX`宏将`viewPos`限制在关卡的大小范围内。\n\
    \n`viewPos`坐标首先通过内部的`MIN`宏被限制在关卡的边界内。这里从`levelSize`中减去了`viewSize`。这是一个内缩计算，因为屏幕的滚动距离不应使视图中心点比`viewCenter`更接近关卡的边缘（对于两个轴的两个方向都是如此）。关卡四个边界上的内缩距离被可视化为双向箭头，如[图3-3](#part0012.html#Fig3)所示。两个边界距离相加后恰好等于`viewSize`。或者换句话说，可滚动区域比关卡区域小两倍的`viewCenter`，即一个`viewSize`。\n\
    \n![9781484202630_Fig03-03.jpg](images/00042.jpeg)\n\n[图3-3](#part0012.html#_Fig3)\
    \ 关卡区域与可滚动区域的关系。箭头描绘了可滚动区域的内缩范围。请注意，当靠近关卡边界时，玩家并不固定在其中心位置。该示意图未按比例绘制。"
  raw: 'In our case, if the player moves to the right and up, for example, what we’re
    really going to do is to move the _levelNode toward the left and down to keep
    the player centered on the screen. That gives the impression of the player moving
    toward the right and up, but really the player stays centered on the screen while
    the entire level’s content moves to the left and down.


    Still, the player’s position is going to be what you would expect: limited to
    the confines of the level node and in an absolute position. The player’s position
    will range from the level node’s origin (lower-left corner at 0,0) to the full
    extents of the level node, here: 4000x500 points.


    To set this up, add the update: method from [Listing 3-7](#part0012.html#list7)
    just above the @end line at the bottom of the GameScene.m file.


    [***Listing 3-7***](#part0012.html#_list7). The update: method is automatically
    called once per frame


    ```

    -(void) update:(CCTime)delta

    {

        // update scroll node position to player node, with offset to center player
    in the view

        [self scrollToTarget:_playerNode];

    }

    ```


    The update: method is called automatically by Cocos2D when implemented in a node
    class. It runs every frame before rendering the nodes to the screen. We need to
    use that method for scrolling because our player’s position is currently updated
    over time by the CCActionMoveTo. Later, the player’s position will be modified
    by the physics engine. In both cases, we don’t know exactly when or where the
    player position update occurs; therefore, the scroll position is simply recalculated
    every frame.


    Unlike you did with previous Cocos2D versions, you no longer have to explicitly
    schedule the update: method. You can still schedule other methods or blocks using
    the node schedule and unschedule methods as documented in the CCNode class reference:
    [http://www.cocos2d-swift.org/docs/api/Classes/CCNode.html](http://www.cocos2d-swift.org/docs/api/Classes/CCNode.html).
    For example, to run a selector once after a delay, you would write


    ```

    [self scheduleOnce:@selector(theDelayedMethod:) delay:2.5];

    ```


    Then implement the corresponding selector in the same class. The selector must
    take one parameter of type CCTime:


    ```

    -(void) theDelayedMethod:(CCTime)delta

    {

        // Your code here ...

    }

    ```


    **Caution**  You should never use NSTimer, any performSelector variant, or Grand
    Central Dispatch methods like dispatch_after in a Cocos2D game to schedule timed
    events. These timing methods do not pause automatically when the node or Cocos2D
    is paused, and with the exception of NSTimer you can’t even manually pause and
    resume them. You also don’t know when exactly in the update/render loop these
    timing methods will run, or whether they’ll reliable run in the same order. You
    should solely rely on the CCNode scheduling methods mentioned earlier, or use
    a CCActionSequence that contains both a CCActionDelay and either a CCActionCallBlock
    or CCActionCallFunc to run code after a given time or at specific intervals.


    The delta parameter is the delta time, or difference in time, since the last call
    to the update: method. At 60 frames per second, delta time is usually around 0.0167\.
    This value is in seconds.


    Delta time is generally used to move nodes at the same speed regardless of frame
    rate; however, there are severe drawbacks to doing so. We won’t be using delta
    time in this book because we’re using Cocos2D’s physics engine for movements.
    Physics games in particular should slow down as the frame rate decreases rather
    than skipping frames and moving ahead, thus leaving objects to advance greater
    distances per individual frame.


    Moving the Level Node in the Opposite Direction


    Of course, you’ll also have to add the scrollToTarget: method in [Listing 3-8](#part0012.html#list8)
    to the GameScene.m as well complete the basic scrolling. The target parameter
    is our _playerNode but instead of using the _playerNode ivar directly, I decided
    to pass it in as a parameter. This enables you to scroll to different target nodes
    after you’ve completed the book and are ready to extend the project.


    [***Listing 3-8***](#part0012.html#_list8). Scrolling to target requires a tiny
    bit of math


    ```

    -(void) scrollToTarget:(CCNode*)target

    {

        CGSize viewSize = [CCDirector sharedDirector].viewSize;

        CGPoint viewCenter = CGPointMake(viewSize.width / 2.0, viewSize.height / 2.0);


    CGPoint viewPos = ccpSub(target.positionInPoints, viewCenter);


    CGSize levelSize = _levelNode.contentSizeInPoints;

        viewPos.x = MAX(0.0, MIN(viewPos.x, levelSize.width - viewSize.width));

        viewPos.y = MAX(0.0, MIN(viewPos.y, levelSize.height - viewSize.height));


    _levelNode.positionInPoints = ccpNeg(viewPos);

    }

    ```


    This looks like math. Smells like geometry. And it’s good for your health! Okay,
    I guess I need a more convincing argument. Okay: it’s really simple! Better?


    The first two lines are just setup code to assign the size of the view to viewSize,
    which is equal to the size of the screen in points. And then the center point
    of the view is calculated and assigned to viewCenter. No troublesome math there.


    The viewPos variable is initialized with the target’s positionInPoints with the
    viewCenter subtracted from it. This subtraction with the ccpSub function is what
    keeps the target node centered in the view. If you didn’t do that, scrolling would
    still function but the target node would appear at the lower-left corner of the
    screen.


    **Tip**  The ccpSub function along with others carrying the *ccp* prefix are declared
    in the CGPointExtension.h header file. You will find this file in the Xcode project
    under libs/cocos2d-ios.xcodeproj/cocos2d/Support/Math. The ccp functions perform
    many commonly needed vector math operations, like add, subtract, multiply, dot
    product, or calculate the distance between two points.


    Worth noting is the use of positionInPoints rather than position. The position
    values are interpreted differently based on a node’s positionType property—for
    instance, if the node’s positionType is set in SpriteBuilder to “percent in parent
    container,” the position value range is typically in the order of 0.0 to 1.0\.
    The positionInPoints property converts the position based on positionType and
    returns the absolute position in points, and vice versa during assignment. The
    contentSize and scale properties both have equivalent contentSizeInPoints and
    scaleInPoints methods that you should prefer whenever you calculate in points.


    The levelSize variable is assigned from _levelNode.contentSizeInPoints. It is
    used in the two following lines, which clamp the viewPos to the level’s size using
    the MIN and MAX macros.


    The viewPos coordinates are first clamped to the level extents using the inner
    MIN macro. Here viewSize is subtracted from the levelSize. This is an inset calculation
    because the screen should never scroll closer than viewCenter to the level’s borders,
    on both sides for both axes. The insets on all four borders of the level are visualized
    as two-faced arrows, which are shown in [Figure 3-3](#part0012.html#Fig3). Both
    border distances added together are conveniently equal to viewSize. Or, in other
    words, the scrollable area is two times viewCenter or one viewSize smaller than
    the level area.


    ![9781484202630_Fig03-03.jpg](images/00042.jpeg)


    [Figure 3-3](#part0012.html#_Fig3). Relation of Level Area to Scrollable Area.
    Arrows depict the Scrollable Area inset. Note the player is not tied to its center
    position when near level borders. The diagram is not drawn to scale'
  trans: "\n在我们的场景中，如果玩家向右上方移动，实际上我们要做的是将`_levelNode`向左下方移动，以保持玩家在屏幕中心。这给玩家一种向右上方移动的印象，但实际上，玩家一直保持在屏幕中心，而整个关卡的内容则向左下方移动。\n\
    \n尽管如此，玩家的位置依然是你所期望的那样：被限制在关卡节点的范围内，并且是绝对位置。玩家的位置范围将从关卡节点的原点（左下角坐标为`0,0`）到关卡节点的完整范围，此处为`4000x500`点。\n\
    \n为了进行设置，请在`GameScene.m`文件底部的`@end`行上方，添加清单 3-7 中的`update:`方法。\n\n***清单 3-7***\
    \ `update:`方法，每帧自动调用一次\n\n```\n-(void) update:(CCTime)delta\n{\n    // 更新滚动节点位置到玩家节点，并加偏移量以在视图中居中玩家\n\
    \    [self scrollToTarget:_playerNode];\n}\n```\n\n当在节点类中实现时，`update:`方法由`Cocos2D`自动调用。它在渲染节点到屏幕前的每一帧都会运行。我们需要使用该方法进行滚动，因为玩家的位置当前会随时间被`CCActionMoveTo`更新。之后，玩家的位置将由物理引擎修改。在这两种情况下，我们无法确切知道玩家位置更新的具体时间或位置；因此，滚动位置会在每一帧被重新计算。\n\
    \n与你之前使用旧版`Cocos2D`时不同，你不再需要显式地调度`update:`方法。你仍然可以像`CCNode`类参考文档（[`www.cocos2d-swift.org/docs/api/Classes/CCNode.html`](http://www.cocos2d-swift.org/docs/api/Classes/CCNode.html)）中描述的那样，使用节点的`schedule`和`unschedule`方法来调度其他方法或代码块。例如，要在延迟后执行一次选择器，你可以这样写：\n\
    \n```\n[self scheduleOnce:@selector(theDelayedMethod:) delay:2.5];\n```\n\n然后在同一个类中实现对应的选择器。该选择器必须接受一个`CCTime`类型的参数：\n\
    \n```\n-(void) theDelayedMethod:(CCTime)delta\n{\n    // 你的代码写在这里 ...\n}\n```\n\
    \n**警告** 你绝不应在`Cocos2D`游戏中使用`NSTimer`、任何`performSelector`变体或`Grand Central Dispatch`方法（如`dispatch_after`）来调度定时事件。这些计时方法在节点或`Cocos2D`暂停时不会自动暂停，并且除了`NSTimer`，你甚至无法手动暂停和恢复它们。你也不知道这些计时方法在更新/渲染循环中具体何时运行，或者它们是否能可靠地按相同顺序运行。你应该完全依赖前面提到的`CCNode`调度方法，或者使用包含`CCActionDelay`以及`CCActionCallBlock`或`CCActionCallFunc`的`CCActionSequence`，以便在特定时间或固定间隔后运行代码。\n\
    \n`delta`参数是增量时间，即自上次调用`update:`方法以来的时间差。在每秒 60 帧的情况下，`delta`时间通常约为`0.0167`。该值以秒为单位。\n\
    \n`delta`时间通常用于以相同速度移动节点，无论帧率如何；然而，这样做存在严重的缺点。本书中我们不会使用`delta`时间，因为我们使用`Cocos2D`的物理引擎进行移动。特别是物理游戏，在帧率降低时应该减速，而不是跳过帧并向前跳跃，导致对象在单帧内移动更远的距离。\n\
    \n### 向相反方向移动关卡节点\n\n当然，你还需要在`GameScene.m`中添加清单 3-8 中的`scrollToTarget:`方法，以完成基本的滚动功能。`target`参数是我们的`_playerNode`，但我没有直接使用`_playerNode`实例变量，而是将其作为参数传入。这使你可以滚动到不同的目标节点，以便在你完成本书学习并准备扩展项目时使用。\n\
    \n***清单 3-8*** 滚动到目标需要一点数学计算\n\n```\n-(void) scrollToTarget:(CCNode*)target\n\
    {\n    CGSize viewSize = [CCDirector sharedDirector].viewSize;\n    CGPoint viewCenter\
    \ = CGPointMake(viewSize.width / 2.0, viewSize.height / 2.0);\n    \n    CGPoint\
    \ viewPos = ccpSub(target.positionInPoints, viewCenter);\n    \n    CGSize levelSize\
    \ = _levelNode.contentSizeInPoints;\n    viewPos.x = MAX(0.0, MIN(viewPos.x, levelSize.width\
    \ - viewSize.width));\n    viewPos.y = MAX(0.0, MIN(viewPos.y, levelSize.height\
    \ - viewSize.height));\n    \n    _levelNode.positionInPoints = ccpNeg(viewPos);\n\
    }\n```\n\n这看起来像数学，闻起来像几何学。而且对你的健康有好处！好吧，我想我需要一个更有说服力的理由。好吧：它其实很简单！好多了吗？\n\n前两行只是设置代码，将视图的大小赋值给`viewSize`，该大小等于屏幕的尺寸（以点为单位）。然后计算视图的中心点并赋值给`viewCenter`。这里没有棘手的数学问题。\n\
    \n`viewPos`变量初始化为`target`的`positionInPoints`减去`viewCenter`。通过`ccpSub`函数进行这个减法，是使目标节点保持在视图中心的关键。如果你不这样做，滚动功能仍然有效，但目标节点会出现在屏幕的左下角。\n\
    \n**提示** `ccpSub`函数以及其他带有`ccp`前缀的函数都在`CGPointExtension.h`头文件中声明。你可以在 Xcode 项目的`libs/cocos2d-ios.xcodeproj/cocos2d/Support/Math`路径下找到这个文件。`ccp`函数执行许多常用的向量数学运算，如加、减、乘、点积，或计算两点之间的距离。\n\
    \n值得注意的一点是使用了`positionInPoints`而不是`position`。`position`值的解释方式取决于节点的`positionType`属性——例如，如果节点的`positionType`在`SpriteBuilder`中设置为“父容器百分比”，那么`position`值的范围通常是`0.0`到`1.0`。`positionInPoints`属性会根据`positionType`转换位置，并返回以点为单位的绝对位置，赋值时则反之。`contentSize`和`scale`属性都有对应的`contentSizeInPoints`和`scaleInPoints`方法，当你以点为单位进行计算时，应优先使用它们。\n\
    \n`levelSize`变量从`_levelNode.contentSizeInPoints`赋值。它用于接下来的两行代码中，这两行代码通过`MIN`和`MAX`宏将`viewPos`限制在关卡的大小范围内。\n\
    \n`viewPos`坐标首先通过内部的`MIN`宏被限制在关卡的边界内。这里从`levelSize`中减去了`viewSize`。这是一个内缩计算，因为屏幕的滚动距离不应使视图中心点比`viewCenter`更接近关卡的边缘（对于两个轴的两个方向都是如此）。关卡四个边界上的内缩距离被可视化为双向箭头，如图\
    \ 3-3 所示。两个边界距离相加后恰好等于`viewSize`。或者换句话说，可滚动区域比关卡区域小两倍的`viewCenter`，即一个`viewSize`。\n\
    \n![9781484202630_Fig03-03.jpg](img/00042.jpeg)\n\n图 3-3 关卡区域与可滚动区域的关系。箭头描绘了可滚动区域的内缩范围。请注意，当靠近关卡边界时，玩家并不固定在其中心位置。该示意图未按比例绘制。\n"
- fmt: '# Parallax Scrolling


    The smaller of the two candidates, `viewPos` or `levelSize minus viewSize`, is
    returned by the `MIN` macro to the enclosing `MAX` macro, which in turn ensures
    that the `viewPos` is always equal to or greater than 0.0. Together, this prevents
    the `_levelNode` from scrolling past its borders.


    Finally, the `viewPos` is negated (multiplied by –1.0) and then assigned to the
    `_levelNode.positionInPoints`. Remember what I said earlier about moving the level
    node in the opposite direction? That’s what this line does. For instance, if the
    calculated `viewPos` is 850,340, the `ccpNeg` method would change the coordinates
    to –850,–340 so that movement of the `_levelNode` goes in the opposite direction
    of where the player is going.


    Publish the SpriteBuilder project. Then build and run the Xcode project. You are
    now able to scroll over the level’s area, but no further.


    If you’re having trouble noticing the scrolling motion, go back to SpriteBuilder
    and change the Vector property of the `Level1.ccb` Color Gradient node to make
    its gradient slanted. Or simply add more Color Node or Gradient Node instances
    to `Level1.ccb` as you see fit in order to see something visual scroll by as you
    move the player. Then publish and re-run the project.


    ## Parallax Scrolling


    While you’re enjoying scrolling, why not make it better with parallaxing background
    layers?


    Parallaxing is a way to create the impression of depth in 2D games by moving background
    layers slower than the actual game layer. Some games even add foreground layers
    that move faster to give the impression of some objects being even closer to the
    camera than the game characters are.


    There are multiple ways to implement parallax scrolling, the simplest being just
    moving the layers at different speeds given a specific speed factor for each layer.
    But this approach has the drawback that you never quite know how large each layer
    needs to be, and it’s hard to judge which parts of what background layer will
    be visible when the player arrives at a given point in the level.


    The parallaxing approach I used for this book derives the scrolling speed factor
    for each layer based on each background layer’s size in relation to the level’s
    size. That way, the background layers also align perfectly with the level borders.
    If the player is in the far-left corner of the level, the background layer’s lower-left
    corners will align with the level’s lower left corner. The same goes for the other
    three corners. The background layers neither “overshoot” nor will they be “too
    short,” and their scrolling speed is solely determined by their content size relative
    to the level node’s content size.


    ## Adding a Background CCB


    First, in SpriteBuilder’s Resource Navigator, switch to the File View tab, and
    then add a subfolder in the Levels folder and name it `Parallax`. Select the folder,
    and create a new CCB via File ![image](images/00008.jpeg) New ![image](images/00008.jpeg)
    File, as shown in [Figure 3-4](#part0012.html#Fig4).


    ![9781484202630_Fig03-04.jpg](images/00043.jpeg)


    [Figure 3-4](#part0012.html#_Fig4). Create a new Node CCB file for the background
    layers


    This time select Node as the CCB type, and enter `Background1.ccb` as the document
    name. Then click Create. Your File View should look like [Figure 3-5](#part0012.html#Fig5).


    ![9781484202630_Fig03-05.jpg](images/00044.jpeg)


    [Figure 3-5](#part0012.html#_Fig5). Current state of the File View in SpriteBuilder


    Now switch to the Node Library View tab also in the Resource Navigator, and drag
    and drop a Gradient Node onto the stage. Feel free to change the gradient colors.
    The important part is that the node position should be set to 0,0 and its Content
    size should be large enough to fill both iPhone and iPad screens. At the time
    of this writing, this means the content size of the gradient layer should be 568x384
    at a minimum to cover the entire visible area on all current devices. [Figure
    3-6](#part0012.html#Fig6) shows the Gradient Node’s properties.


    ![9781484202630_Fig03-06.jpg](images/00045.jpeg)


    [Figure 3-6](#part0012.html#_Fig6). Background gradient node properties


    **Note** When you create a CCB of type Layer, you’ll notice it defaults to the
    same 568x384 dimensions. 568 points is the width of a 4-inch iPhone, while the
    iPad’s screen is only 512 points wide—or more precisely, SpriteBuilder considers
    the iPad screen to be half its points size at 512x384, not its actual 1024x768
    point size. That’s because SpriteBuilder will scale up node positions and sizes
    by a factor of 2 on iPads by default. The height of 384 points stems from the
    fact that, at half its 768-point height, the iPad screen is still slightly higher
    than the 4-inch iPhone screen with 320 points. The somewhat odd 568x384 content
    size is the lowest common denominator that fits all iPhone and iPad screen sizes.
    It can be scaled with factors 2x and 4x to match iPhone Retina, iPad, and iPad
    Retina resolutions—not perfectly, but close enough.


    As for the gradient colors, if you do want to get them exactly the same as those
    used by the book’s graphics, click on the color rectangle next to the “Start color”
    property. This will open the OS X color selection dialog. On the Color Palettes
    tab (the third tab in the floating color wheel dialog), set the Palettes drop-down
    menu to Web Safe Colors. Then select the orange-yellowish color with the `FFCC33`
    code next to it. Do the same for the End Color, but choose the pinkish color with
    the color code `FF6699`.


    Note that you could also use a sprite with a gradient image; however, if you don’t
    need any more details other than the gradient itself, the Gradient Node is likely
    faster and definitely consumes a lot less memory.


    ## Adding the Main Background Sprite


    There’s also a background sprite provided with the book’s downloadable archive,
    named `level1_background_Cerberus.png`. It’s depicted in [Figure 3-7](#part0012.html#Fig7).
    It will be drawn over the gradient and is slightly larger than the gradient. The
    larger a background layer or image is, the faster it will parallax as the player
    moves across the level. As before, if you prefer you can provide an image of your
    own creation provided that the image size matches.


    ![9781484202630_Fig03-07.jpg](images/00046.jpeg)


    [Figure 3-7](#part0012.html#_Fig7). Cerberus background image


    Speaking of image sizes. Since SpriteBuilder assumes all images to be designed
    for iPad Retina resolution by default, the image has to be correspondingly huge:
    2375x1625 pixels. SpriteBuilder will automatically create downscaled versions
    of the image for non-Retina iPads and Retina iPhones (1188x813 pixels) and non-Retina
    iPhones (594x406 pixels). As you can see, when scaled down to non-Retina iPhone
    point dimensions, the image is just barely larger than the 4-inch iPhone’s dimensions
    of 568x320 points.


    **Tip** This image is not sized ideally for downscaling because you’ll end up
    with fractional dimensions like 1187.5 x 812.5 when dividing by 2 or 4. There
    can’t be fractional pixels in an image, so the image size is rounded to the next
    nearest integer value. It doesn’t make a difference for huge background images
    like this one, but for smaller images it’s important to choose an iPad Retina
    image size that is divisible by 4 without a remainder. Otherwise, artifacts may
    appear due to minimal differences in the image aspect ratio on devices where the
    app uses downscaled versions of the image.


    Before adding the Cerberus image, create a folder named `Sprites` and inside it
    a subfolder named `Level1` in the File View. This is where you’ll store images
    for that particular level, which should not be in a SpriteSheet. Why shouldn’t
    it be in a SpriteSheet? Quite simply, because the image is far too big to benefit
    from being in a SpriteSheet, and it’s used only once in a level, anyway. It would
    take up way too much space and leave little room for other images that are used
    more than once.'
