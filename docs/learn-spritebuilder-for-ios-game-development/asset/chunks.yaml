  trans: '

    # SpriteBuilder 中的自定义 TrueType 字体


    到目前为止，我还没有对标签特有属性进行深入介绍，也没有提及可以对它们进行本地化，或者解释为何存在两种标签类型：`TTF`（TrueType 字体）和 `BM-Font`（位图字体）。


    ## 导入自定义 TrueType 字体


    原则上，向 SpriteBuilder 添加自定义 TrueType 字体只需将其拖放到项目中。在本书的 *Graphics* 归档文件中，您会找到一个 *Fonts*
    文件夹，将其拖放到 SpriteBuilder 的 *File View* 中即可。或者，创建一个 *Fonts* 文件夹，然后将自定义的 `.ttf` 文件拖放到其中。您可以在网上轻松找到
    TrueType 字体，但要注意确保该字体采用宽松许可证分发，或者属于公共领域。


    然后，您可以在 `Label TTF` 节点的 *Item Properties* 选项卡中选择该字体。点击 `CCLabelTTF` 部分的 *Font
    name* 下拉列表，选择 *User Fonts* 部分，然后浏览到 *Fonts* 文件夹。*System Fonts* 是 iOS 内置且始终可用的字体。


    实际上，存在几个障碍可能会阻止您使用自定义 TrueType 字体。首先，它必须是一个有效的文件。在 Finder 中双击 `.ttf` 文件应会打开“字体册”应用，并显示字形字母表。如果未出现这种情况或出现错误，则字体多半已损坏或格式不正确。


    接下来，您必须考虑字体名称不一定指向字体文件名。字体有三个名称：文件名、族名称和字体名称。要在 SpriteBuilder 中使用，字体名称和文件名（不包括文件扩展名）应匹配；否则，字体将无法工作。


    将 TrueType 字体添加到 SpriteBuilder 后，发布并添加代码清单 11-15 中的代码片段到应用启动时运行的任意方法中——例如，`MainScene.m`
    中的 `didLoadFromCCB` 方法。


    ***代码清单 11-15***. 记录字体族和名称


    ```

    for (NSString* family in [UIFont familyNames])

    {

        NSLog(@"%@ (family)”, family);

        for (NSString* name in [UIFont fontNamesForFamilyName:family])

        {

            NSLog(@"   %@ (name)“, name);

        }

    }

    ```


    检查 Xcode 中的调试控制台。如果您从 Graphics 归档中添加了 `PARPG.ttf` 字体文件，日志将在众多其他字体中打印类似如下内容：


    ```

    2014-09-09 16:36:25.433 LearnSpriteBuilder[91808:60b] Fixed (family)

    2014-09-09 16:36:25.434 LearnSpriteBuilder[91808:60b]    PARPG (name)

    ```


    这表明字体族的名称很奇怪，是“Fixed”，而字体名称则与字体的文件名相同。如果字体文件的文件名与字体名称不匹配，您只需重命名该字体，在 SpriteBuilder
    中重新导入，并更新所有相关标签以使用新名称的字体。


    **注意：** 在 SpriteBuilder 中使用自定义 TrueType 字体无需编辑 `Info.plist` 文件。只有您想添加自定义 TrueType
    字体但又不使用 SpriteBuilder 进行操作时，才需要编辑该文件。


    TrueType 字体是否导入成功，只能通过运行应用来确定。SpriteBuilder 会正确使用并显示该字体。但是，当您运行游戏时，如果字体名称和字体文件名不匹配，字体将被替换为近似（或随机猜测）的字体族。通常情况下，这意味着
    Arial 将被用来替代自定义字体。这应该不难察觉，但一个可靠的指示是标签的尺寸与 SpriteBuilder 中不同。


    ## 编辑标签属性


    `CCLabelTTF` 属性在图 6-4 中已有部分介绍，当时标签是作为 *Button* 节点的一部分进行编辑的。现在，让我们通过实际的 `Label
    TTF` 节点来查看标签属性。请参考图 11-5。


    ![9781484202630_Fig11-05.jpg](img/00166.jpeg)


    图 11-5. Label TTF 属性


    *Label* *text* 字段显然用于输入文本。其下方是 *Localize* 复选框，右侧是本地化的 *Edit* 按钮。*Label text* 字段和
    *Localize* 复选框在 `Label BM-Font` 节点中也存在。我稍后将解释本地化是如何工作的。


    *Font name* 和 *Font size* 现在应该很清楚了。*Opacity* 与精灵相同，表示标签的透明度——范围从 0（完全透明）到 1（不透明）。*Color*
    属性会影响标签的纹理，但效果与设置绘制颜色相同。有趣的是，您可以同时设置 *Font Effects* 部分下的 *Color* 和 *Draw Color*，以创建一种组合颜色。要避免这种副作用，请确保将
    *Color* 或 *Draw Color* 其中之一设置为白色。


    *Adjusts font size to fit* 复选框位置略有不妥——实际上它应属于更下方的 *Dimensions* 属性。如果您设置一个非零的尺寸并勾选
    *Adjusts font size to fit*，字体将使用尽可能大的字号以将所有文本适配到给定尺寸的单行内。自然，这也意味着 *Adjusts font
    size to fit* 会禁用自动换行。*Alignment* 定义了标签如何在其尺寸范围内对齐。


    `Label TTF` 节点有一个特殊的 *Font Effects* 部分，您可以在其中编辑轮廓和阴影。请参考图 11-6。


    ![9781484202630_Fig11-06.jpg](img/00167.jpeg)


    图 11-6. 字体效果属性


    绘制颜色是字体的填充色。如前所述，它会与节点的 *Color* 属性结合使用。因此，如果您希望实际使用的 *Draw color* 保持不变，请确保将 *Color*
    设置为白色。


    *Outline color* 仅在 *Outline width* 大于 `0` 时生效。在图 11-7 中，中间和底部的标签展示了将 *Outline
    width* 分别设置为 `2` 和 `8` 的效果。


    ![9781484202630_Fig11-07.jpg](img/00168.jpeg)


    图 11-7. Label TTF 轮廓宽度（自上而下）：无轮廓、2 点和 8 点


    *Shadow color* 同样仅在 *Shadow blur* 半径大于 `0` 时生效。通过 *Shadow offset*，您可以更改标签下方阴影的位置。图
    11-8 展示了模糊半径分别为 `8` 和 `24`、且略微向右下方偏移的示例阴影。


    ![9781484202630_Fig11-08.jpg](img/00169.jpeg)


    图 11-8. Label TTF 阴影（顶部：模糊半径 8，底部：模糊半径 24）


    通过将轮廓和阴影进行组合并稍加尝试，您可以创造出相当有趣的效果。


