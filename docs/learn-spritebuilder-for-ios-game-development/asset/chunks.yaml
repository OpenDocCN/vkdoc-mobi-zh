    physics game objects so that you can design levels with greater variation.


    Chapter    9


    Physics Joints


    In this chapter, you’ll add more game elements to make the levels more fun to
    design and play. Many complex physics objects require the use of joints. *Joints*
    are a means of keeping individual bodies together, and they define the freedom
    of movement between the connections.


    Physics objects like chains, ropes, and springs all require joints to operate.
    Joints are also used to model soft-body physics. You will learn about this advanced
    technique in the next chapter after I lay the foundation for joint editing in
    this chapter.


    Joints can also be difficult to tame. They are the reason for most physics glitches
    observed in games. Be it a horse and carriage suddenly launching high up in the
    air, ragdolls not coming to rest and limbs constantly jittering, or complex bodies
    seemingly stretching to infinity or compressing to a fraction of the original
    size. Examples are aplenty.


    What Are Joints?


    A *joint* is an invisible physics object that connects exactly two bodies together.
    The joint defines the connection points between the two bodies, called *joint
    anchors*. These anchors should not be confused with a node’s anchor point, which
    determines the node’s texture offset. The joint anchor is the point where the
    joint applies force to a body, which need not be within the node’s collision shape
    or texture.


    Joints add constraints to two physics bodies. These constraints can force, for
    example, the bodies to keep a fixed distance or a relative angle to each other.


    The constraint parameters also determine how rigid the constraint is. Some constraints
    are soft, allowing the bodies to move apart or closer to each other with only
    little force applied to get them to their intended distance or rotation. Other
    constraints may be very rigid, allowing very little tolerance in distance variation
    and thus applying a potentially enormous amount of force to the bodies.


    **Caution**  The more rigid a constraint is, the more likely or severe physics
    glitches can be. Imagine a soft rubber band and a metal spring connecting two
    bodies—for instance, two buckets filled with water. The soft rubber band hardly
    pulls the two objects together when pulled, because there is very little force
    applied to the bodies even if the band is stretched out by twice its original
    length. A metal spring, on the other hand, requires a large amount of force to
    extend it even by just a little bit. If you let go of the metal spring, its reaction
    will be much more violent than the rubber band stretched by the same distance.


    A *constraint* means that the physics engine is applying forces to the bodies
    of the joint in an attempt to keep the bodies positioned within the limits defined
    by the joint constraints, rather than just changing their positions. This has
    the effect that joints may never move bodies to a precise location that satisfies
    all constraints. This means two bodies connected with a joint are unlikely to
    ever come to rest at the exact same relative positions they originally had when
    you designed them in SpriteBuilder.


    Joints can also be used as a means of moving objects through the world. Just entertain
    the following thought: Thus far, the game world scrolls by keeping the player
    centered. What if you add another invisible node with a physics body and connect
    that body with a soft spring joint to the player. Then let the camera follow the
    invisible node. The camera will then smoothly accelerate and decelerate depending
    on the player’s movement. If you want the camera to look ahead rather than lag
    behind, you could reverse the setup by moving the invisible node that drags the
    player behind.


    Types of Joints


    In SpriteBuilder, three different joint types are available from the *Node Library
    View* as shown in [Figure 9-1](#part0019.html#Fig1).


    ![9781484202630_Fig09-01.jpg](images/00118.jpeg)


    [Figure 9-1](#part0019.html#_Fig1). Joints in the Node Library View


    **Tip**  These joints can also be created in code by using the CCPhysicsJoint
    class methods. Even though CCPhysicsJoint exposes eight joint-creation methods
    in SpriteBuilder, they are only variations of the three joint types: pivot, distance,
    and spring. The only joint type CCPhysicsJoint exposes that is (currently) not
    editable in SpriteBuilder is the ratchet joint, a kind of pivot joint that rotates
    smoothly in one direction but rotates in discrete angles in the opposite direction.


    Here is a description of the three joint types:


    *   **Pivot joint** This is also known as a pin, hinge, or revolute joint. The
    pivot joint has only one anchor, which is the point the two bodies will rotate
    around. Consider that, unlike in reality (that is, with gears), the pivot joint
    does not have to be directly on top of either of the two connected bodies in order
    to rotate the connected bodies around its anchor.

    *   **Distance joint** This type of joint keeps two bodies at a fixed distance
    from each other, while allowing them to revolve freely around each other. Optionally,
    you can enforce a minimum and maximum distance that the two bodies must not exceed;
    otherwise, they are allowed to stretch and contract their distance to a small
    degree if a large force is applied.

    *   **Spring joint** This is a variation of the distance joint in that stretching
    and contracting is the desired behavior. You can adjust the rigidity (stiffness)
    of the spring as well as how much it springs back and forth (damping).


    While three joint types may not sound like much, there’s a lot you can do with
    them—especially if you consider that you can combine the various joints. Many
    specialized joint types of physics engines are built on these three basic joint
    types.


    The same two bodies can be connected with different kinds of joints, and multiple
    bodies can be interconnected with joints. This is usually done to create bodies
    with a “soft” feel to them. However, you have to be careful in doing so, because
    interconnected joints add constraints that can end up fighting against each other.
    In the worst case, the object will behave erratically, folding in on itself or
    “exploding” and possibly triggering an assertion.


    Creating a Chain


    You are probably eager to get going, so let’s dive right in.


    Right-click the *Prefabs* folder in SpriteBuilder’s *File View* and select *New
    File*. Create a document of type *Node*, and name it **Chain.ccb**. Now switch
    to the *Tileless Editor View*, ensure the *GameElements* entry below the *Tileless
    Editor View* is selected, and confirm it contains the images shown in [Figure
    9-2](#part0019.html#Fig2).'
