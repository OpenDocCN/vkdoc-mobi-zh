  trans: '

    1.  **时间轴控制：** 这些控制选项允许你重置、快进、快退、停止和播放动画。最右侧的按钮用于切换动画在播放时是否循环，但这不影响游戏中的播放效果。（参见**3\.
    时间轴链**。）

    2.  **时间轴列表：** 一个 CCB 文件可以包含多个时间轴。通过下拉菜单，你可以添加、删除、复制和重命名时间轴，并选择当前正在编辑的时间轴。在图 5-1
    中，选中了 *默认时间轴*。

    3.  **时间轴链：** 此控件允许你指定当前时间轴播放结束后应播放哪个时间轴。如果设置为*无链接时间轴*，则该时间轴将仅播放一次。为了在游戏中循环播放一个时间轴，你需要将此下拉菜单设置为当前正在编辑的时间轴。要在图
    5-1 中循环播放时间轴，需要将链接的时间轴更改为*默认时间轴*。

    4.  **时间轴缩放：** 此控件用于缩放其下方的关键帧视图。

    5.  **时间轴光标：** 显示动画当前所处的时间点。你可以拖动光标手柄来手动向前或向后播放动画。

    6.  **关键帧：** 这些矩形手柄代表关键帧。你可以左右拖动它们来改变其位置。如果你拖动某个手柄使其位于选定节点的一个关键帧上，则可以在“项目属性”选项卡中编辑该关键帧的属性值。两个关键帧之间是关键帧段，你可以右键单击它来更改缓动模式。


    表 5-1 列出了可设置动画的属性列表。请注意，并非所有属性在所有节点类型中都可设置动画。属性是否可设置动画，一方面取决于节点类型，另一方面取决于该节点是否为
    CCB 文件的根节点。根节点完全不能设置动画，但精灵 CCB 文件除外，在该类文件中，你至少可以设置 `CCSprite` 根节点的颜色、不透明度和精灵帧属性。


    表 5-1. 可设置动画的属性、创建关键帧的快捷键及其可用性


    | 属性 | 快捷键 | 可用性 |

    | --- | --- | --- |

    | 颜色 | C | 精灵、精灵 9 切片、标签 TTF 和 BM-Font、颜色和渐变节点。 |

    | 透明度 | O | 精灵、精灵 9 切片、标签 TTF 和 BM-Font、颜色和渐变节点。 |

    | 位置 | P | 所有节点类型。 |

    | 旋转 | R | 所有节点类型。 |

    | 缩放 | S | 所有节点类型。 |

    | 倾斜 | K | 所有节点类型。不适用于启用了物理引擎的节点。 |

    | 精灵帧 | F | 精灵和精灵 9 切片节点。 |

    | 可见性 | V | 所有节点类型。 |


    **注意** 在撰写本文时，Chipmunk 物理引擎不支持倾斜和缩放的节点。如果此情况仍然存在，则启用了物理引擎的节点不应同时为“倾斜”和“缩放”属性设置动画。


    ## 使用时间轴编辑器


    理论讲够了，让我们来实际操作一下。切换到“无图块编辑器视图”选项卡，将 `Level1a` 精灵图中的甜甜圈图像拖拽到 `Level1.ccb` 中的 `CCPhysicsNode`
    上。


    新的甜甜圈图像必须是 `CCPhysicsNode` 的子节点，这样它才能与其它关卡节点一起滚动。由于已经有一个使用甜甜圈图像的出口节点，可以将这个甜甜圈视为玩家进入关卡的假想位置。你可能会想把它移动到关卡最左侧的位置，以便在游戏启动时立即看到它。


    在时间轴中选中甜甜圈图像后，现在可以开始添加关键帧来创建时间轴动画。但首先，将时间轴持续时间从其默认的过长 10 秒更改为 6 秒。为此，请点击时间轴右上区域显示时间戳的数字，这些数字以“分钟:秒:帧”格式显示时间轴光标的时间戳。点击此数字计数器会打开在图
    5-2 中看到的*时间轴持续时间*编辑对话框。输入 6 秒并点击“完成”。


    ![9781484202630_Fig05-02.jpg](img/00077.jpeg)


    图 5-2. 更改当前时间轴的持续时间


    你可能想知道“帧”字段代表什么。SpriteBuilder 以每秒 30 帧的速率播放动画。因此，当你需要时间轴持续时间少于 1 秒，或者需要 1.5 秒时，就必须编辑“帧”字段。该字段接受
    0 到 29 之间的值。例如，如果你想要一个 1.5 秒的时间轴持续时间，则应在“秒”字段中输入 **1**，在“帧”字段中输入 **15**。


    **注意** 你无法在 SpriteBuilder 中更改每秒 30 帧的播放速度。不过，更改帧率并非必需。关键帧动画是在每帧基础上对两个关键帧之间进行插值。假设游戏实际以
    60 fps 运行，那么时间轴动画也会以游戏的 60 fps 帧率运行。如果游戏的帧率很高，将会有更多的中间插值状态，因此动画运行起来会比在 SpriteBuilder
    中更流畅。


    确保整个动画持续时间在时间轴中可见。使用时间轴缩放滑块或调整 SpriteBuilder 窗口大小，以使动画的 6 秒全部可见。你会注意到，在 6 秒标记的右侧有一个向右绘制的阴影——这标记着当前动画的结束。


    然后将时间轴光标移到最左侧。点击并拖动光标手柄——即位于时间标尺栏上的蓝色向下箭头，从该箭头向下延伸出一条垂直线。时间戳数字应显示 `00:00:00`。最后，确保代表关卡入口点的甜甜圈图像仍被选中。


    ## 添加关键帧


    选中正确的节点并将时间轴光标定位到所需位置后，就可以开始添加关键帧了。你会发现一种方法是经由 `Animations` ![image](img/00008.jpeg)
    `Insert Keyframe` 菜单，然后选择相应的关键帧类型，例如 `Position` 或 `Scale`。不过，这种方法不够便捷。相反，你应该养成使用表
    5-1 中列出的键盘快捷键的习惯。


    由于关卡入口的甜甜圈应该随着时间的推移稍微缩放，现在按 `S` 键为 `Scale` 属性添加一个关键帧。你会注意到，如同图 5-3 所示，甜甜圈项目会展开显示可设置动画的属性列表，其中
    `Scale` 属性以粗体显示，表示该属性在当前时间轴中至少有一个关键帧。


    现在将时间轴光标移动到 3 秒标记处。不需要精确到 `00:03:00`；相差几分之一秒不会产生明显的差异。再次按 `S` 键添加第二个 `Scale` 关键帧。


    看到两个关键帧现在由一条粉红色的水平线连接了吗？我将两个关键帧之间的空间称为*关键帧段*，其中的粉红线直观地显示了两个关键帧之间的插值形式。有一种“即时”插值模式，当设置为该模式时，实际上会在关键帧段中隐藏粉红线。


    最后，将时间轴光标移动到最右侧的 `00:06:00`，再次按 `S` 键添加第三个关键帧。现在，你拥有了一个跨度为时间轴完整 6 秒持续时间的 `Scale`
    属性的关键帧动画。它应该看起来像图 5-3 中显示的那样。


    ![9781484202630_Fig05-03.jpg](img/00078.jpeg)


    图 5-3. 具有三个关键帧的 `Scale` 属性时间轴动画


    **注意** 如果你要为启用了物理引擎的节点的 `Scale` 属性设置动画，这将在调试构建中触发断言。问题在于人们通常想当然地认为物理形状会随节点一起缩放，但实际上它不会。


    ## 编辑动画设置

