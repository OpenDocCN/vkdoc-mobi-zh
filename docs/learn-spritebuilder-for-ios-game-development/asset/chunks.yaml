    \ *)pair\n                 collisionTypeA:(CCNode *)nodeA\n                 collisionTypeB:(CCNode\
    \ *)nodeB;\n\n-(BOOL) ccPhysicsCollisionPreSolve:(CCPhysicsCollisionPair *)pair\n\
