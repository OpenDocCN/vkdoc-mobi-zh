    You don’t have to know the exact breaking point value. For instance, if you determine
    that a joint (at rest) breaks at 1,100 but doesn’t break at a 1,200 breaking force,
    you are within 10% of the breaking point (at rest) and can start experimenting
    actual gameplay behavior with the 1,200 value. If 1,200 causes the joint to break
    too easily when you apply just a minimal amount of force, you’ll need to increase
    the breaking force, anyway.


    Finding the breaking point is done only to show you the minimal base value where
    the joint breaks under minimal force, but you’ll certainly have to consider that
    the joint is supposed to withhold some, but not too much, extra force.


    You can disable the breaking force by simply setting the *Breaking force* field
    back to *unlimited*. You can alter a joint’s `breakingForce` property in code
    as well. For instance, this code disables the breaking force by setting it to
    infinite programmatically:


    ```

    joint.breakingForce = INFINITY;

    ```


    ## Motor Example


    Open *Rope.ccb*, and select the hook joint that connects the first rope segment
    with the *hook* node.


    On the *Item Properties* tab, uncheck both *Spring Enabled* and *Limit Enabled*
    in case they are enabled for this joint. This allows the joint to rotate 360 degrees
    around itself; otherwise, a motor force that applies torque would be limited to
    within the angle limits.


    Then select the *Motor enabled* check box and enter *–4* in the *Rate* field.
    The negative value will make the joint rotate counter-clockwise.


    If you place a rope in the level and run the project, you’ll see the rope is trying
    to swirl around its hook point. Try different rate values to see what happens
    if the rope spins faster or slower.


    Programmatically altering a motor joint is very limited at the time of this writing.
    There is currently no public property to alter a motor joint’s rate property in
    code. You also can’t invalidate and create a new motor joint in order to change
    the rate property because this would reset the joint’s existing momentum. You’d
    have to use the private Chipmunk classes and C functions to programmatically alter
    a motor joint.


    ## Summary


    In this chapter, you learned a lot about joints and how to make complex physics
    objects like chains and ropes. You also learned how to create mechanical, trigger-activated
    objects like the spring. You’ll find the resulting project in the *10 - Chains
    Ropes and Springs* folder.


    I hope you also take away the many potential problems associated with joints.
    They can cause very odd behavior if used incorrectly or allowed to accumulate
    too much force. It takes time to get a good feel for both values and how to model
    complex physics bodies with joints.


    In the next chapter, you’ll raise the complexity level as you implement a soft-body
    physics player with custom rendering to deform the player’s texture.


    # Chapter 10: Soft-Body Physics


    In this chapter, you will change the player character from a rigid object to a
    soft-body physics object. A *soft body* is an object whose predetermined shape
    can bend and flex under the forces applied to it. If the body is also trying to
    relax back into its predetermined shape, it is often referred to as “jelly” physics—especially
    if the shape is easily deforming and altogether wobbly. That’s the kind of soft
    body you’ll create in this chapter.


    Since a deformable body changes its shape, the texture (sprite) used to display
    the body needs to be deformed also. A regular `CCSprite` won’t do that, as skewing
    and scaling the texture alone won’t suffice. So in the second half of this chapter
    you’ll dive into Cocos2D’s rendering API, which is based on OpenGL. You’ll use
    it to wrap all OpenGL commands for the renderer in such a way that even custom
    drawing code can be accelerated by benefitting from Cocos2D’s internal-rendering
    optimizations.


    ## Rigid Bodies vs. Soft Bodies


    A rigid body has a shape that simply will not budge. The shape remains the same
    no matter how much force is applied to the rigid body. The main reasons why this
    kind of physics is predominant is that it’s a lot easier to program, it can utilize
    faster algorithms, and the resulting physics simulation produces coherent, reliable
    results.


    The disadvantage of rigid bodies is that it only coarsely simulates real-world
    physics. As long as bodies aren’t contacting one another, everything works, feels
    and behaves like in the real world. But once two rigid bodies collide, their collision
    response is only a rough approximation of what would happen in the real world.
    The absorption of collision force into heat and dissipation of force due to deformation
    is approximated with only a single parameter: *elasticity* (sometimes called *bounciness*
    or *restitution*).


    In other words, even rigid bodies that are supposed to model light objects such
    as balloons or leaves will stack on top of one another as if they were strong,
    solid bodies.


    Soft-body physics tries to solve this problem by allowing each body’s shape to
    be deformable to varying degrees. The application of soft-body physics in games
    is currently limited to modeling vehicle damage (most notably BeamNG.drive) and
    so-called “jelly physics,” where the shape of bodies is easily deformable but
    the shape itself tries to revert back to its designed shape.


    **Note** You may have heard of other applications for soft-body physics—for instance,
    cloth and hair simulation and modeling facial expressions by simulating muscles.
    However, these are almost exclusively used as visual effects and do not affect
    the physics world as a whole. That’s the kind of physics that can be GPU-accelerated
    on current desktop computers. It looks impressive, but it is purely a visual effect
    and likely to remain that way—unlike fluid simulation, which has been used by
    games like “Where’s My Water” and “Feed Me Oil” to great effect. In games, fluid
    simulation is achieved by using a large number of tiny rigid bodies with a circle
    shape and a custom renderer that traces the outer bodies to draw blobs formed
    by a group of bodies. To prevent individual bodies from simply becoming tiny droplets,
    the bodies attract each other to form bonds—most likely programmatically, but
    spring joints could also be used.


    Soft-body physics does not require a specialized physics engine. It can be simulated
    using rigid bodies and joints. The basic underlying principle to make a body “soft”
    is to model the body in question using several rigid bodies that form the outer
    shape and joining the bodies together by using a combination of spring joints,
    often combined with a distance joint to define the minimum and maximum distances
    the connected bodies can be apart. Normally, the inside of the body consists of
    one or more shapes that hold the outer form more or less in shape. They act as
    the bones for the soft part.


    By far the easiest shape to model as a soft body is the circle, since every two
    opposing bodies on the circle’s circumference can be connected with joints, while
    more joints connect the circumference bodies together to hold the shape in circle
    form. The joint connections naturally balance each other out.


    Unless the body is meant to be heavily deformable, it helps to have a center body
    that connects to the circumference bodies with distance joints to prevent the
    shape from folding in on itself. And many, if not all, the connected bodies need
    to collide with one another to distribute the forces properly and again to reduce
    the risk of the body folding in on itself. [Figure 10-1](#part0020.html#Fig1)
    shows the finished setup of the soft-body player object you’re going to create
    in this chapter.


    ![9781484202630_Fig10-01.jpg](images/00144.jpeg)


    [Figure 10-1](#part0020.html#_Fig1). The final setup of the soft-body player'
