    ![9781484202630_Fig07-07.jpg](images/00101.jpeg)


    [图 7-7](#part0017.html#_Fig7) 使用Box Layout节点的初始效果看起来不会太好


    让我们快速分析一下[图 7-7](#part0017.html#Fig7)中发生了什么。`verticalLayout`节点垂直对齐其子节点：设置标签和两个水平布局节点，每个水平布局节点包含一个`Label
    TTF`和一个`Slider`节点。'
  raw: 'If you want to see the new logo and buttons in the game, you still have to
    add the *MainMenuButtons.ccb* to the *MainScene.ccb*. Do so as described earlier
    for the *MainMenuBackground.ccb* by either dragging the .ccb file itself onto
    the *MainScene.ccb* stage or by dragging it from the Tileless Editor View.


    Either way, you should change the new CCBFile node’s position to 0,0 and give
    it a proper name—for instance, ***logoAndButtons***.


    Creating Buttons Out of Ordinary Sprites


    Hmmm, isn’t there something amiss? So far the buttons aren’t really buttons, just
    a sprite with a label. How do you make them click?


    Easy, by adding a button! And then removing the button’s frame and label so that
    it’s just an invisible touch area that runs a selector. The only downside is that
    you can’t animate the button’s highlighted state because there’s no notification
    sent by the button when it’s merely highlighted. But at least you’ll have a way
    to create buttons without having to make the images play by the rules of the *Button*
    node.


    **Note**  Try using *play.png* or *settings.png* as the button’s normal-state
    sprite frame and you’ll know what I mean by said rules. Or create a Sprite 9 Slice
    and assign it the SpriteSheets/Menu/play.png. Internally, the *Button* node uses
    a Sprite 9 Slice, which is responsible for scaling the nine different regions
    of the sprite, well, differently.


    Open *MainMenuButtons.ccb*, and repeat the following steps for both the *play*
    and *settings* sprites:


    8.    Drag and drop a *Button* from the Node Library View onto the sprite (play
    or settings) in the timeline so the button becomes a child of the sprite.


    9.    Change the button’s position types to % and the values to 50 to center the
    button on the sprite.


    10.   Clear the button’s Title field on the Item Properties tab by removing all
    characters. This makes the button’s label disappear.


    11.   For both *Normal State* and *Highlighted State*, change the *Sprite frame*
    property to the <NULL> item. This removes the button’s background images. It is
    now an invisible button.


    12.   The size of the button will be a bit too small. Change the button’s *Preferred
    size* property to 60x60.


    You now have two invisible buttons on both the *play* and *settings* sprites.
    The fact that the buttons rotate along with the sprites won’t matter much since
    the buttons are square and cover the sprite’s circular-shaped images well enough,
    regardless of rotation. Though you could, of course, apply the same reverse-animation
    trick you used for the sprite’s labels.


    Connecting the Buttons


    To connect the buttons with selectors, switch to the *Item Code Connections* tab.
    Then select each button in order and, in the Selector field, enter ***shouldPlayGame***
    for the play button and *shouldShowSettings* for the settings button.


    There’s one more thing missing though. The selectors need to be sent somewhere,
    and that somewhere is the *Document root*. This term refers to the root node of
    the *MainMenuButtons.ccb*. Select its root node, and enter **MainMenuButtons**
    in the *Custom class* field.


    Now open the Xcode project and add a new Objective-C class. Do so as described
    in [Chapter 2](#part0011.html), [Figure 2-9](#part0011.html#Fig9) and following.
    The class’ name must be MainMenuButtons, and it should be a subclass of CCNode.


    Edit the *MainMenuButtons.m* file to add the methods in [Listing 7-2](#part0017.html#list2).


    [***Listing 7-2***](#part0017.html#_list2). Testing that the button selectors
    work


    ```

    #import "MainMenuButtons.h"


    @implementation MainMenuButtons


    -(void) shouldPlayGame

    {

        NSLog(@"PLAY");

    }


    -(void) shouldShowSettings

    {

        NSLog(@"SETTINGS”);

    }


    @end

    ```


    This code is just to test that the buttons work. If you run the app and tap the
    buttons, you’ll see the preceding NSLog statements printed to the Xcode console.


    Settings Menu


    The settings menu will be implemented as a popover, much like the *pause* and
    *game over* menus of the game. There are several notable new features here. One
    is a universal close button that closes the overlay it is added to by simply removing
    the corresponding parent node. To ease creating the settings menu layout, the
    *Box Layout* node is used to arrange the nodes in rows and columns.


    Another feature is the Slider controls, and I’ll describe how they can be used
    to change a property’s value—in this case, audio volume levels. Because the audio
    volumes should be persisted across app launches, the *GameState* singleton class
    is introduced at the end of this chapter.


    Designing the Settings Menu with Box Layout


    Right-click the *UserInterface* folder, select *New File* to create a new CCB
    document named *SettingsLayer.ccb* of type *Layer* with the default size of 568x384\.
    Start by changing the root node’s *Content size* types to *%* for the layer to
    shrink and expand with its parent node’s size and, thus, the screen size. The
    content size width and height values should be 100, 100.


    As you have so frequently done before, drag a *Node* from the Node Library View
    onto the stage, change its position type to *%*, and position values to *50*.
    Then rename the node to settingsLayer. This node will act as the screen-centering
    container node for the rest of the items.


    From the *UserInterface* section in the Tileless Editor View, drag the S_bg image
    onto the *settingsLayer node*. Alternatively, drag a sprite node from the Node
    Library View and change its *Sprite frame* to *S_bg.png*. The new sprite must
    be a child node of *settingsLayer*. It should automatically center on the stage.


    Introducing Box Layout Nodes


    Now for the *Box Layout* node. It can position nodes in either a horizontal or
    vertical layout, meaning the nodes will either be stacked vertically or aligned
    horizontally. The settings menu is supposed to have a label and two volume sliders
    for music and effects, all aligned vertically. But the sliders will have a label
    next to them, aligned horizontally.


    This grid-like layout can be emulated using the parent-child relationship. A vertical
    *Box Layout* node has two horizontal *Box Layout* nodes for the sliders as children.


    From the Node Library View, drag and drop a *Box Layout* node onto the *settingsLayer*
    so that it becomes a child of the *settingsLayer* node. On the *Item Properties*
    tab, change the *Direction* property under the *CCLayoutBox* section from its
    default *Horizontal* setting to the *Vertical* setting. To differentiate the layout
    nodes, you should rename the layout node in the Timeline to ***verticalLayout***.


    Then you should add a Label TTF and two additional *Box Layout* nodes as children
    of the *verticalLayout* node. You should rename the two *CCLayoutBox* entries
    in the Timeline to *horizontalLayoutMusic* and *horizontalLayoutSfx*. As for the
    label, change its *Label text* to ***Settings*** and increase its *Font Size*
    to *32*.


    Each slider will be added to one of the horizontal layout nodes, together with
    a label node. From the Node Library View, drag a *Label TTF* and a *Slider* node
    to the *horizontalLayoutMusic* node, and then repeat this step for the *horizontalLayoutSfx*
    node. Select each label, and change its text to ***Music Volume*** or ***Effects
    Volume***, depending on whether the label is a child of the *horizontalLayoutMusic*
    or *horizontalLayoutSfx* node, respectively.


    The initial result will not look too good, just like in [Figure 7-7](#part0017.html#Fig7).


    ![9781484202630_Fig07-07.jpg](images/00101.jpeg)


    [Figure 7-7](#part0017.html#_Fig7). The initial result using Box Layout nodes
    won’t look too good


    Let’s quickly dissect what’s happening in [Figure 7-7](#part0017.html#Fig7). The
    *verticalLayout* node vertically aligns its children: the settings label and the
    two horizontal layout nodes, each of which contains a Label TTF and a *Slider*
    node.'
  trans: '

    如果你想在游戏中看到新的标志和按钮，仍然需要将`MainMenuButtons.ccb`添加到`MainScene.ccb`中。按照之前为`MainMenuBackground.ccb`所述的步骤操作：将`.ccb`文件直接拖放到`MainScene.ccb`的场景舞台，或从平铺编辑器视图中拖放。


    无论采用哪种方式，都应将新的`CCBFile`节点的位置改为`0,0`，并为其指定一个合适的名称——例如`logoAndButtons`。


    ### 用普通精灵创建按钮


    嗯，是不是少了点什么？到目前为止，这些按钮并不是真正的按钮，只是带有标签的精灵。如何让它们变得可点击呢？


    很简单，添加一个按钮！然后移除按钮的边框和标签，使其成为一个只运行选择器的不可见触摸区域。唯一的缺点是你无法为按钮的高亮状态添加动画效果，因为按钮在被高亮时不会发送通知。但至少，你可以通过这种方式创建按钮，而无需让图片遵循`Button`节点的规则。


    **注意**：尝试使用`play.png`或`settings.png`作为按钮正常状态的精灵帧，你就会明白我所说的规则是什么意思。或者创建一个`Sprite
    9 Slice`，并将其分配为`SpriteSheets/Menu/play.png`。在内部，`Button`节点使用`Sprite 9 Slice`，它负责以不同的方式缩放精灵的九个不同区域。


    打开`MainMenuButtons.ccb`，并针对`play`和`settings`精灵重复以下步骤：


    8. 从节点库视图拖放一个`Button`到时间轴中的精灵（`play`或`settings`）上，使该按钮成为精灵的子节点。

    9. 将按钮的位置类型改为`%`，并将值设为`50`，使按钮在精灵上居中。

    10. 在“项目属性”选项卡中，清空按钮的“标题”字段（删除所有字符）。这样按钮的标签就会消失。

    11. 对于“正常状态”和“高亮状态”，将“精灵帧”属性更改为`<NULL>`项。这将移除按钮的背景图片。此时它成为一个不可见按钮。

    12. 按钮的尺寸会有点小。将按钮的“首选尺寸”属性改为`60x60`。


    现在，你在`play`和`settings`精灵上都创建了两个不可见按钮。由于按钮是方形的，且能很好地覆盖精灵的圆形图像（无论旋转角度如何），因此按钮随精灵旋转并不会造成太大影响。当然，你也可以对按钮应用之前用于精灵标签的反向动画技巧。


    ### 连接按钮


    要将按钮与选择器连接，请切换到“项目代码连接”选项卡。然后按顺序选择每个按钮，并在“选择器”字段中，为播放按钮输入`shouldPlayGame`，为设置按钮输入`shouldShowSettings`。


    但还缺少一件事。选择器需要发送到某个地方，而这个目标位置就是“文档根节点”。该术语指的是`MainMenuButtons.ccb`的根节点。选择其根节点，并在“自定义类”字段中输入`MainMenuButtons`。


    现在打开 Xcode 项目并添加一个新的`Objective-C`类。按照第 2 章、图 2-9 及后续说明进行操作。类名必须为`MainMenuButtons`，并且应该是`CCNode`的子类。


    编辑`MainMenuButtons.m`文件，添加列表 7-2 中的方法。


    ***列表 7-2*** 测试按钮选择器是否工作


    ```

    #import "MainMenuButtons.h"


    @implementation MainMenuButtons


    -(void) shouldPlayGame

    {

        NSLog(@"PLAY");

    }


    -(void) shouldShowSettings

    {

        NSLog(@"SETTINGS");

    }


    @end

    ```


    这段代码仅用于测试按钮是否工作。如果你运行应用并点击按钮，会看到上述`NSLog`语句打印到 Xcode 控制台。


    ### 设置菜单


    设置菜单将实现为弹出窗口，类似于游戏中的“暂停”和“游戏结束”菜单。这里有几个值得注意的新功能。一个是通用关闭按钮，它通过移除对应的父节点来关闭其所在的覆盖层。为了简化设置菜单的布局，使用了`Box
    Layout`节点来按行和列排列节点。


    另一个功能是滑块控件，我将描述如何使用它们来更改属性的值——在本例中，是音频音量级别。由于音量应在应用启动间持久保存，因此在本章末尾引入了`GameState`单例类。


    #### 使用 Box Layout 设计设置菜单


    右键单击`UserInterface`文件夹，选择“新建文件”创建一个名为`SettingsLayer.ccb`的`CCB`文档，类型为`Layer`，默认大小为`568x384`。首先，将根节点的“内容尺寸”类型改为`%`，使图层能根据其父节点（即屏幕）的尺寸进行缩放。内容尺寸的宽度和高度值应为`100,
    100`。


    像之前频繁操作的那样，从节点库视图拖放一个`Node`到场景舞台，将其位置类型改为`%`，位置值设为`50`。然后将节点重命名为`settingsLayer`。此节点将作为其余项目的屏幕居中容器节点。


    从平铺编辑器视图的`UserInterface`部分，将`S_bg`图片拖放到`settingsLayer`节点上。或者，从节点库视图拖放一个精灵节点，并将其“精灵帧”改为`S_bg.png`。新的精灵必须是`settingsLayer`的子节点。它应自动在场景舞台上居中。


    #### 介绍 Box Layout 节点


    接下来是`Box Layout`节点。它可以按水平或垂直布局定位节点，这意味着节点要么垂直堆叠，要么水平对齐。设置菜单应包含一个标签以及用于音乐和音效的两个音量滑块，所有内容垂直对齐。但滑块旁边会有一个水平对齐的标签。


    这种网格状布局可以通过父子关系模拟。一个垂直的`Box Layout`节点包含两个用于滑块的水平的`Box Layout`节点作为子节点。


    从节点库视图，拖放一个`Box Layout`节点到`settingsLayer`上，使其成为`settingsLayer`节点的子节点。在“项目属性”选项卡中，将`CCLayoutBox`部分下的`Direction`属性从默认的`Horizontal`（水平）改为`Vertical`（垂直）。为了区分布局节点，你应在时间轴中将该布局节点重命名为`verticalLayout`。


    然后，添加一个`Label TTF`和另外两个`Box Layout`节点作为`verticalLayout`节点的子节点。将时间轴中的两个`CCLayoutBox`条目重命名为`horizontalLayoutMusic`和`horizontalLayoutSfx`。对于标签，将其“标签文本”改为`Settings`，并将“字体大小”增加到`32`。


    每个滑块将与一个标签节点一起添加到其中一个水平布局节点中。从节点库视图，拖放一个`Label TTF`和一个`Slider`节点到`horizontalLayoutMusic`节点，然后对`horizontalLayoutSfx`节点重复此步骤。选择每个标签，并根据标签是`horizontalLayoutMusic`还是`horizontalLayoutSfx`节点的子节点，将其文本分别改为`Music
    Volume`或`Effects Volume`。


    初始效果看起来不会太好，就像图 7-7 中一样。


    ![9781484202630_Fig07-07.jpg](img/00101.jpeg)


    图 7-7 使用 Box Layout 节点的初始效果看起来不会太好


    让我们快速分析一下图 7-7 中发生了什么。`verticalLayout`节点垂直对齐其子节点：设置标签和两个水平布局节点，每个水平布局节点包含一个`Label
    TTF`和一个`Slider`节点。

