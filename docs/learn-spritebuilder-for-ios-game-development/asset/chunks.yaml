- fmt: "# 默认滑块样式调整\n\n默认滑块看起来有些单调。选择一个滑块后，转到*Item Properties*选项卡，你会看到[图7-11](#part0017.html#Fig11)中所示的`CCSlider`部分。这些设置允许你更改与滑块背景（可拉伸线条）和滑块手柄相关联的图像。\n\
    \n![9781484202630_Fig07-11.jpg](images/00105.jpeg)\n\n[图7-11](#part0017.html#_Fig11).\
    \ 滑块图像设置\n\n将*Background*图像更改为`SpriteSheets/UserInterface/S_bar.png`，并将正常状态下的*Handle*图像设置为`SpriteSheets/UserInterface/S_ball.png`（如[图7-11](#part0017.html#Fig11)顶部的设置所示）。\n\
    \n为*Highlighted State*将*Background*和*Handle*图像都设置为`<NULL>`。这意味着高亮状态——即用户拖动手柄时的状态——将使用与正常状态相同的图像。\n\
    \n请注意，滑块背景图像应具有特定尺寸，因为它会根据需要拉伸。这同样适用于其他可拉伸的`CCControl`图像，例如按钮背景图像。在内部，滑块和按钮使用`CCSprite\
    \ 9 Slice`节点来处理图像；然而，该精灵的属性并未暴露。因此，如果使用了尺寸不正确的滑块或按钮背景图像，其显示效果将从“不太正确”到令人厌恶——或者干脆与预期效果不符。\n\
    \n如果需要查询内置图像的尺寸，你可以在任何SpriteBuilder项目的`ccbResources`文件夹中找到默认的滑块和按钮图像。\n\n`ccbSliderBgNormal.png`和`ccbSliderBgHighlighted.png`图像被用作滑块的默认背景图像。这些图像尺寸为28x10像素，但其*Scale\
    \ from*属性（如[第3章](#part0012.html)的[图3-8](#part0012.html#Fig8)所示）设置为2倍。你可以为自己的背景图像使用28x10的尺寸，并将这些图像的*Scale\
    \ from*属性设置为2倍，或者以56x20像素的分辨率设计它们，而无需担心更改*Scale from*设置。\n\n# 连接滑块\n\n这应该已经是基本操作了：选择效果滑块并切换到*Item\
    \ Code Connections*选项卡。在*Selector*字段中输入`volumeDidChange:`，并勾选*Continuous*复选框。同时在*Doc\
    \ root var*字段中输入`_effectsSlider`。\n\n对音乐滑块重复此操作：将其*Selector*设置为`volumeDidChange:`，同样勾选*Continuous*复选框，然后在*Doc\
    \ root var*字段中输入`_musicSlider`。\n\n是的，两个滑块使用相同的选择器。另请注意两个选择器末尾的冒号——如果选择器末尾有冒号，则表示该方法接收一个参数。发送这些选择器的`CCControl`类既支持你之前使用过的无参数方法，也支持像本例这样带单一参数的方法。该参数始终是正在运行选择器的`CCControl`对象——在本例中，即`CCSlider`实例。稍后我会对此进行详细说明。\n\
    \n缺少什么？当然是根节点的自定义类！选择根节点，并在*Custom class*字段中输入`SettingsLayer`。\n\n现在你可以切换到Xcode，在*Source*组中创建`SettingsLayer`类。请参见[第2章](#part0011.html)中的[图2-9](#part0011.html#Fig9)。`SettingsLayer`子类应为`CCNode`。\n\
    \n编辑`SettingsLayer.h`，添加一个用于持有`MainMenuButtons`实例引用的属性，如[清单7-3](#part0017.html#list3)所示。使用`@class`可以避免在`SettingsLayer.h`头文件中`#import`相应的头文件——这是你应该尽量避免的做法。\n\
    \n[***清单7-3***](#part0017.html#_list3). `SettingsLayer`接口\n\n```\n#import \"CCNode.h\"\
    \n\n@class MainMenuButtons;\n\n@interface SettingsLayer : CCNode\n\n@property\
    \ (weak) MainMenuButtons* mainMenuButtons;\n\n@end\n```\n\n`SettingsLayer.m`需要添加[清单7-4](#part0017.html#list4)中高亮显示的内容。\n\
    \n[***清单7-4***](#part0017.html#_list4). 滑块选择器将发送者作为输入参数接收\n\n```\n#import \"SettingsLayer.h\"\
    \n#import \"MainMenuButtons.h\"\n\n@implementation SettingsLayer\n{\n    __weak\
    \ CCSlider* _musicSlider;\n    __weak CCSlider* _effectsSlider;\n}\n\n-(void)\
    \ volumeDidChange:(CCSlider*)sender\n{\n    NSLog(@\"volume changed, sender: %@\"\
    , sender);\n}\n\n@end\n```\n\n`sender`参数的类型始终是`CCControl*`，但由于可以确定只有滑块会运行此选择器，因此可以安全地假设参数类型为`CCSlider*`。当然，`CCSlider`是`CCControl`的子类。两个`CCSlider`实例变量将用于确定哪个滑块执行了`volumeDidChange:`选择器。\n\
    \n在测试滑块之前，需要在`MainMenuButtons.m`中加载并显示设置层。具体来说，将现有的`shouldShowSettings`方法替换为[清单7-5](#part0017.html#list5)中的方法。\n\
    \n[***清单7-5***](#part0017.html#_list5). 显示设置层\n\n```\n-(void) shouldShowSettings\n\
    {\n    SettingsLayer* settingsLayer = (SettingsLayer*)[CCBReader load:\n     \
    \                                               @\"UserInterface/SettingsLayer\"\
    ];\n    settingsLayer.mainMenuButtons = self;\n    [self.parent addChild:settingsLayer];\n\
    \nself.visible = NO;\n}\n```\n\n`SettingsLayer`由`CCBReader`加载，使用`SettingsLayer.ccb`文件的完整路径。然后分配`mainMenuButtons`引用，并将`settingsLayer`添加为`MainMenuButtons`父节点（即`MainScene`实例）的子节点。这是因为`MainMenuButtons`实例本身被设置为不可见——如果`settingsLayer`是`MainMenuButtons`的子节点，它也会被隐藏，那将适得其反。\n\
    \n现在你可以运行游戏并点击*Settings*按钮来打开设置弹出窗口。如果移动滑块，你将在Xcode控制台中看到类似如下（已缩短）的日志行：\n\n```\n\
    [..] volume changed, sender: <CCSlider = 0x10a13ebf0 | Name = musicSlider>\n[..]\
    \ volume changed, sender: <CCSlider = 0x10a135f70 | Name = effectsSlider>\n```\n\
    \n每个`sender`对象都是`CCSlider`的不同实例。如果你在*Item Properties*选项卡中为滑块设置了名称，该名称也会被记录。\n\n\
    # 关闭设置弹出窗口\n\n目前你还无法关闭设置弹出窗口。你应该通过引入一个通用的关闭按钮来解决这个问题。你可以在其他图层中使用相同的按钮，并且通常可以在按钮上使用相同的概念，这些按钮应该将选择器转发到特定的父类。\n\
    \n但在许多情况下，你无法这样做，因为按钮和其他`CCControl`节点会将它们的选择器发送到文档根节点——即CCB根节点的自定义类。特别是如果*Button*位于其自己的CCB文件中，你将不得不为每个特定任务创建一个单独的按钮——甚至可能为相同任务但不同用例创建单独的按钮。有一个简单的解决方案。\n\
    \n右键点击*UserInterface*文件夹，选择*New File*。将新文档命名为`CloseButton.ccb`，然后这次使用*Node*类型，再点击*Create*。选择根节点后，切换到*Item\
    \ Code Connections*选项卡并设置其自定义类。这里应将其命名为`CloseButton`。\n\n然后从节点库视图中将*Button*节点拖到舞台上。在*Item\
    \ Properties*选项卡上，你只需要将按钮正常状态和*Highlighted State*的精灵帧更改为`SpriteSheets/UserInterface/S_back.png`，并将*Highlighted\
    \ State*的*Background*颜色更改为浅灰色。然后，在*Item Code Connections*选项卡上，在*Selector*字段中输入`shouldClose`。你还应清空*Title*字段，以移除按钮上的所有文本。"
  raw: 'The default sliders look a bit dull. If you select a slider and go to the
    *Item Properties* tab, you’ll notice the *CCSlider* section shown in [Figure 7-11](#part0017.html#Fig11).
    These settings allow you to change the images associated with the slider’s background
    (the stretchable line) and the slider’s handle.


    ![9781484202630_Fig07-11.jpg](images/00105.jpeg)


    [Figure 7-11](#part0017.html#_Fig11). Slider image settings


    Change the *Background* image to *SpriteSheets/UserInterface/S_bar.png*, and set
    the *Handle* image to *SpriteSheets/UserInterface/S_ball.png* for the normal state
    (the topmost setting in [Figure 7-11](#part0017.html#Fig11)).


    Set both the *Background* and *Handle* images to *<NULL>* for the *Highlighted
    State*. This means the highlighted state—the state while the user is dragging
    the handle—will use the same images as the normal state.


    Note that the slider background image should have a specific size, since it is
    stretched as needed. This goes for other stretchable *CCControl* images as well,
    such as the button background image. Internally, the slider and button use the
    *CCSprite 9 Slice* node for the images; however, that sprite’s properties are
    not exposed. So if you use an incorrectly sized slider or button background image,
    it will look anywhere between “not quite correct” to abhorrent—or just not what
    it’s supposed to look like.


    You will find the default slider and button images in any SpriteBuilder project
    in the *ccbResources* folder if you need to look up the sizes of the built-in
    images.


    The *ccbSliderBgNormal.png* and *ccbSliderBgHighlighted.png* images are used as
    the slider’s default background images. The images are 28x10 pixels in size but
    have their *Scale from* property (shown in [Figure 3-8](#part0012.html#Fig8) in
    [Chapter 3](#part0012.html)) set to 2x. You can use the 28x10 size for your own
    background images and set the *Scale from* property for those images to 2x, or
    you can design them with a 56x20-pixel resolution and not worry about changing
    the *Scale from* setting.


    Connecting the Sliders


    This should be almost second nature by now: Select the effects slider and switch
    to the *Item Code Connections* tab. Enter ***volumeDidChange:*** in the *Selector*
    field, and check the *Continuous* check box. Also enter ***_effectsSlider*** in
    the *Doc root var* field.


    Repeat this for the music slider: set its *Selector* to ***volumeDidChange:***,
    also check the *Continuous* check box, and then enter ***_musicSlider*** in the
    *Doc root var* field.


    Yes, both sliders use the same selector. Also note the trailing colon in both
    selectors—if there’s a colon at the end of a selector, the method receives a parameter.
    The CCControl class that sends these selectors supports sending parameterless
    methods, as you’ve used before, as well as methods with a single parameter, as
    in this case. The parameter is always the CCControl object running the selector—in
    this case, the CCSlider instances. I’ll say more on this shortly.


    What’s missing? The custom class for the root node of course! Select the root
    node, and enter ***SettingsLayer*** in the *Custom class* field.


    Now you can move over to Xcode and create the SettingsLayer class in the *Source*
    group. See [Figure 2-9](#part0011.html#Fig9) in [Chapter 2](#part0011.html). The
    SettingsLayer subclass should be CCNode.


    Edit *SettingsLayer.h* to add a property that holds a reference to a MainMenuButtons
    instance like in [Listing 7-3](#part0017.html#list3). The @class avoids having
    to #import the corresponding header file in the *SettingsLayer.h* header file—something
    you should strive to avoid when possible.


    [***Listing 7-3***](#part0017.html#_list3). The SettingsLayer interface


    ```

    #import "CCNode.h"


    @class MainMenuButtons;


    @interface SettingsLayer : CCNode


    @property (weak) MainMenuButtons* mainMenuButtons;


    @end

    ```


    *SettingsLayer.m* needs the additions highlighted in [Listing 7-4](#part0017.html#list4).


    [***Listing 7-4***](#part0017.html#_list4). The slider selectors receive the sender
    as an input parameter


    ```

    #import "SettingsLayer.h"

    #import "MainMenuButtons.h"


    @implementation SettingsLayer

    {

        __weak CCSlider* _musicSlider;

        __weak CCSlider* _effectsSlider;

    }


    -(void) volumeDidChange:(CCSlider*)sender

    {

        NSLog(@"volume changed, sender: %@", sender);

    }


    @end

    ```


    The sender parameter is always of type CCControl*, but since you can be certain
    that only sliders run this selector, you can safely assume the parameter to be
    of type CCSlider*. CCSlider is, of course, a subclass of CCControl. The two CCSlider
    ivars will be used to determine which slider performed the volumeDidChange: selector.


    Before you can try out the sliders, you need to load and show the settings layer
    in *MainMenuButtons.m*. Specifically, replace the existing shouldShowSettings
    method with the one in [Listing 7-5](#part0017.html#list5).


    [***Listing 7-5***](#part0017.html#_list5). Show the settings layer


    ```

    -(void) shouldShowSettings

    {

        SettingsLayer* settingsLayer = (SettingsLayer*)[CCBReader load:

                                                        @"UserInterface/SettingsLayer"];

        settingsLayer.mainMenuButtons = self;

        [self.parent addChild:settingsLayer];


    self.visible = NO;

    }

    ```


    SettingsLayer is loaded by CCBReader, using the full path to the *SettingsLayer.ccb*
    file. Then the mainMenuButtons reference is assigned, and the settingsLayer is
    added as a child not to the MainMenuButtons class but to its parent (the MainScene
    instance). This is because the MainMenuButtons instance itself is set to invisible—if
    the settings layer were a child of MainMenuButtons it, too, would be hidden. That
    would be counterproductive.


    You can now run the game and tap the *Settings* button to open the settings popover.
    If you move the sliders, you will see lines like the following (shortened) lines
    logged to the Xcode Console:


    ```

    [..] volume changed, sender: <CCSlider = 0x10a13ebf0 | Name = musicSlider>

    [..] volume changed, sender: <CCSlider = 0x10a135f70 | Name = effectsSlider>

    ```


    Each sender object is a different instance of CCSlider. If you gave the sliders
    a name on the Item Properties tab, this name will also be logged.


    Dismissing the Settings Popover


    You can’t currently dismiss the settings popover. You should fix that by introducing
    a generic close button. You can use the same button for other layers, and you
    can use the same concept in general for buttons that should instead forward their
    selectors to a specific parent class.


    But in many cases, you can’t do that because buttons and other *CCControl* nodes
    send their selector to the document root—the CCB root node’s custom class. Especially
    if the *Button* would be in its own CCB file, you would have to create a separate
    button for each specific task—perhaps even separate buttons for the same task
    but different use cases. There’s a simple solution.


    Right-click the *UserInterface* folder and select *New File*. Name the new document
    ***CloseButton.ccb*** and, for a change, use the *Node* type before clicking *Create*.
    With the root node selected, switch to the *Item Code Connections* tab and set
    its custom class. Here it should be named ***CloseButton***.


    Then drag a *Button* node from the Node Library View onto the stage. On the *Item
    Properties* tab, you need to change only the button’s sprite frame for the normal
    state and the *Highlighted State* to *SpriteSheets/UserInterface/S_back.png* and
    change the *Background* color of the *Highlighted State* to a light gray color.
