    \ 关键帧时，游戏将恢复。\n\n作为练习，请在标签变为可见的相同时间点添加三个额外的 `Callbacks` 关键帧。为每个关键帧使用相同的选择器 `updateReadyCounter`，在\
    \ `GameMenuLayer` 中实现相应的方法，并向 `GameMenuLayer` 类添加一个 `int` 类型的 `_readyCounter`\
    \ 实例变量。\n\n`_readyCounter` 应在 `shouldResumeGame` 方法中设置为 3，并在每次 `updateReadyCounter`\
    \ 运行时减一。在同一方法中，根据 `_readyCounter` 的值，将标签的 `text` 属性更新为 `3`、`2` 和 `1`，以创建一个倒计时标签。\n\
    \n为此，你需要一个对标签的引用，因此可以为其命名并通过名称获取，或者更高效地使用 `Item Code Connections` 选项卡将标签引用分配给一个\
    \ `CCLabelTTF*` 类型的 `_readyLabel` 实例变量，你需要在 `GameMenuLayer.m` 文件中将其添加为实例变量。\n\n\
    ## 插曲：当应用进入后台时暂停游戏\n\n如果应用进入后台时游戏能自动暂停，那该多好啊？例如，在接听电话或用户在玩游戏时点击主页按钮时，就会发生这种情况。\n\
    \n此外，如果任何节点都能实现 `UIApplicationDelegate` 方法之一，并在 iOS 发送这些方法时直接接收，而无需手动传递这些消息或注册通知等，那岂不是更棒？没错，实际上实现起来相当简单。\n\
    \n在 Xcode 中打开 `AppDelegate.m` 文件。就在 `startScene` 方法下方，添加列表 6-14 中的方法。\n\n***列表\
    \ 6-14***。 将 `UIApplicationDelegate` 消息转发到节点\n\n```\n-(void) performSelector:(SEL)selector\n\
    \                 onNode:(CCNode*)node\n             withObject:(id)object\n \
    \             recursive:(BOOL)recursive\n{\n    if ([node respondsToSelector:selector])\n\
    \    {\n        [node performSelector:selector withObject:object];\n    }\n\n\
    if (recursive)\n    {\n        for (CCNode* child in node.children)\n        {\n\
    \            [self performSelector:selector\n                           onNode:child\n\
    \                       withObject:object\n                        recursive:YES];\n\
    \        }\n    }\n}\n```\n\n**提示** 如果你认为将来会用到列表 6-14 中的方法，可以将它作为 `NSObject` 的一个类别添加。\n\
    \n`performSelector:onNode:withObject:recursive:` 方法模仿了由 `NSObject` 类定义的其他 `performSelector`\
    \ 方法的行为，不同之处在于，它首先通过测试 `respondsToSelector:` 来检查给定节点是否实现了该选择器，只有实现了才会运行该选择器。\n\
    \n**注意** `performSelector:withObject:` 这一行可能会产生“可能导致泄漏”的警告。只要所执行的选择器不返回指针或 `id`\
    \ 类型，你可以安全地忽略此警告。还要注意，选择器必须且只能接受一个参数。如果你需要使用其他消息签名，则必须创建列表 6-14 中方法的变体，使其不接受对象或接受两个对象，并使用\
    \ `performSelector` 或 `performSelector:withObject:withObject:` 方法来传递对象。\n\n如果设置了\
    \ `recursive` 标志，则相同的方法也会对该节点的每个子节点及其子节点执行。实际上，节点层次结构中的每个节点只要实现了给定的选择器，就有机会运行它。\n\
    \n这不是向其他节点传递消息的最高效方式，因此应避免将其用于频繁的事件，或将其作为正确获取要发送消息的节点引用的替代方案。但它作为一种方便的方式来分发不常见的消息非常有效，无需知道哪些节点可能对接收该消息感兴趣。另一种选择是向\
    \ `NSNotificationCenter` 注册一个节点，当然，还要正确地取消注册，这比仅仅实现一个特定的 `UIApplicationDelegate`\
    \ 选择器更繁琐且更容易出错。\n\n一个示例用途是将 `applicationWillResignActive:` 消息转发给任何对处理该特定消息感兴趣的节点。将列表\
    \ 6-15 中的代码添加到 `AppDelegate.m` 中新添加的 `performSelector:onNode:withObject:recursive:`\
    \ 方法下方。\n\n***列表 6-15***。 将 `UIApplicationDelegate` 消息转发到场景中的所有节点\n\n```\n-(void)\
    \ applicationWillResignActive:(UIApplication *)application\n{\n    CCScene* scene\
    \ =  [CCDirector sharedDirector].runningScene;\n    [self performSelector:_cmd\n\
    \                   onNode:scene\n               withObject:application\n    \
    \            recursive:YES];\n\n[super applicationWillResignActive:application];\n\
    }\n```\n\n从 `CCDirector` 获取的当前正在运行的场景会在该场景上以及递归地在其所有子节点上运行 `_cmd` 选择器，并传递 `application`\
    \ 对象。`CCDirector` 类是 Cocos2D 的 `UIViewController` 子类和 Cocos2D 应用状态的管理器。\n\n这里的\
    \ `_cmd` 选择器是什么，它来自哪里？\n\n这是每个 Objective-C 方法在幕后接收的一个隐藏的方法参数。它是当前运行方法的选择器。换句话说，在此示例中，`_cmd`\
    \ 等同于编写 `@selector(applicationWillResignActive:)`。另一个隐式的 Objective-C 方法参数是你已经频繁使用的：它就是\
    \ `self` 关键字。\n\n要实际在应用即将不活跃时暂停游戏，请将列表 6-16 中的方法添加到 `GameMenuLayer.m` 中，可能就放在已有的\
    \ `shouldPauseGame` 方法下方，因为它除了运行 `shouldPauseGame` 方法外什么也不做。\n\n***列表 6-16***。\
    \ `GameMenuLayer` 类接收 `applicationWillResignActive:` 并运行 `shouldPauseGame`\n\n\
    ```\n-(void) applicationWillResignActive:(UIApplication *)application\n{\n   \
    \ [self shouldPauseGame];\n}\n```\n\n如果现在构建并运行应用，在游戏运行时按下 Home 键以关闭应用。实际上，应用不会关闭——它将被发送到后台，停留不确定的时间。\n\
    \n然后再次点击应用图标以重新启动应用。你应该会看到应用从你关闭的位置继续运行，但游戏被暂停，并显示了暂停弹出菜单。\n\n## 击杀玩家\n\n游戏结束状态可以像暂停一样通过弹出菜单处理，功能几乎相同，允许玩家重新开始关卡或退出当前游戏会话。\n\
    \n当然，玩家必须死掉！还有什么比用圆锯将其切割成碎片更好的击杀方式呢？\n\n### 创建“游戏结束”弹出视图\n\n在 SpriteBuilder 中，右键单击\
    \ `Popovers` 文件夹并添加 `New File`。将新文档命名为 `GameOverMenuLayer.ccb`，将其类型设置为 `Layer`，然后单击\
    \ `Create`。编辑“游戏结束”菜单遵循与暂停菜单相同的基本原则，因此我在这里只说明不同之处。\n\n例如，“游戏结束”菜单的预制图形均以 `G_`\
    \ 开头，尽管你可以自由使用其他图像。并且不应该有“继续”按钮，只有“退出”和“重新开始”按钮。由于没有继续功能，你也不需要添加 `resume game`\
    \ 时间线。并且标签的文本不应显示 `Game Paused`，而应显示 `Game Over`。\n"
- fmt: "Be sure to set the *Custom class* of the `GameOverMenuLayer.ccb` root node\
    \ to `GameMenuLayer`; otherwise, none of the buttons will work. Likewise, the\
    \ exit and restart buttons should have their *Selector* fields set to `shouldExitGame`\
    \ and `shouldRestartGame`, respectively. That’s what’s important for functionality,\
    \ the rest is just visual appeal. I’m not saying that visuals aren’t important\
    \ too, but they’re not as important for continuing with the book.\n\nBut you are\
    \ free to spend some time to animate the nodes on the menu shown in [Figure 6-10](#part0015.html#Fig10).\
    \ For instance, why not animate the *Color* property of the *Game over* label?\
    \ Select the *Game over* label node, and then add multiple *Color* keyframes by\
    \ pressing *C*. Move the Timeline Cursor onto each keyframe and, on the *Item\
    \ Properties* tab, click the colored rectangle next to the *Color* property, which\
    \ presents the OS X color-picker dialog to let you pick a color. Right-click the\
    \ individual *Keyframe Segments*, and change the easing modes to whatever you\
    \ like.\n\n![9781484202630_Fig06-10.jpg](images/00094.jpeg)\n\n[Figure 6-10](#part0015.html#_Fig10).\
    \ What the Game Over menu might look like\n\nRun this animation and you’ll weep\
    \ tears of delight. Such vivid colors. But enough with the sentimentalities. Art\
    \ really isn’t my strong point, so let’s move on to kill the player.\n\n## Showing\
    \ the \"Game Over\" Popover\n\nGo back to Xcode, and open `GameScene.m`. Locate\
    \ the `ccPhysicsCollision` methods, and below the last one, add the collision\
    \ method shown in [Listing 6-17](#part0015.html#list17).\n\n[**_Listing 6-17_**](#part0015.html#_list17).\
    \ There will not be blood: responding to a collision between player and saw\n\n\
    ```\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair\n        \
    \                 player:(CCNode *)player\n                            saw:(CCNode\
    \ *)saw\n{\n    [self showPopoverNamed:@\"UserInterface/Popovers/GameOverMenuLayer\"\
    ];\n    return YES;\n}\n```\n\nThe third parameter is named `saw`, in line with\
    \ the *Collision* type of each saw prefab. If there is a collision between player\
    \ and saw, the method simply shows the `GameOverMenuLayer` popover now. It’s a\
    \ pretty harsh ending, but alas, there will *not* be blood. Not now, anyway.\n\
    \n**Note** If you find that some or all of the saws do not run the collision method\
    \ in [Listing 6-17](#part0015.html#list17), open each saw prefab in the *Prefabs*\
    \ folder in SpriteBuilder. Each of them should have their *Collision type* set\
    \ to *saw* on the *Item Physics* tab. You may want to confirm this now, and where\
    \ the *Collision* type is missing or incorrect, enter *saw*. Be sure to check\
    \ the sprite node of each CCB, not their root nodes.\n\n## Interlude: Fixing the\
    \ Initial Scroll Position\n\nWow! Game Over was quick. Is there anything else\
    \ we could do?\n\nYou may have noticed that when you press the restart button\
    \ or whenever you change from the menu scene to the game scene, the level view\
    \ isn’t centered on the player initially. That’s kind of bad, and it’s a result\
    \ of the `GameScene` updating its scroll position only after the first time the\
    \ `update:` method has run. But the very first frame is rendered earlier.\n\n\
    Fortunately, the fix is easy. Open `GameScene.m`, and locate the `loadLevelNamed:`\
    \ method. Add the highlighted line of [Listing 6-18](#part0015.html#list18) at\
    \ the end of the method.\n\n[**_Listing 6-18_**](#part0015.html#_list18). Fixing\
    \ the initial scroll position\n\n```\n-(void) loadLevelNamed:(NSString*)levelCCB\n\
    {\n    // existing code omitted ...\n\n[self scrollToTarget:_playerNode];\n}\n\
    ```\n\nThis will ensure the `_physicsNode.position` is updated according to the\
    \ player’s initial position before the scene is rendered for the first time. If\
    \ you run the game now and restart or exit to the main menu via the pause menu,\
    \ the screen will be centered on the player immediately. This will be particularly\
    \ noticeable when presenting the `GameScene` with a transition.\n\n**Tip** Sometimes\
    \ such inconsistencies or visual glitches in the first or first couple frames\
    \ of a scene can’t be avoided. In that case, you could start the scene with a\
    \ full-screen popover presented, perhaps one that uses the exact same background\
    \ as the preceding loading scene so that the user won’t even notice the difference.\
    \ Then just fade out or remove the popover menu after a few frames have been drawn,\
    \ using a *Callbacks* keyframe in the popover’s Default Timeline.\n\n## Summary\n\
    \nYou can now pause the game and kill the player. Both actions present a popover\
    \ menu to restart and exit the level or, in the case of the pause menu, resume\
    \ the game with a *ready* animation. There were a number of cool tricks dispersed\
    \ throughout this chapter as well.\n\nThe project at this stage of the book is\
    \ also found in the book’s downloadable archive in the *07 - Popover Menus* folder.\n\
    \n## Part II: Getting Down to Business with SpriteBuilder\n\n## Chapter 7: Main\
    \ Scene and Game State\n\nSo far we’ve fully neglected the main scene, where the\
    \ game’s main menu ought to be. The main menu is a good place to add a *Settings*\
    \ menu that allows you to change the volume of background music and sound effects.\n\
    \nThe settings popover requires a grid-based layout, which is why you’ll use the\
    \ *Box Layout* node for the first time. You’ll also add a way to store the game\
    \ state permanently—for instance, unlocked levels and audio volumes—so that it\
    \ doesn’t get lost if the app is terminated.\n\n### Main Scene Background\n\n\
    It’s time to give the game’s main menu a make-over. Right now `MainScene.ccb`\
    \ is still the pale, blue scene with the SpriteBuilder label and a play button.\n\
    \n#### Designing the Background Images\n\nIn the previous chapter, you already\
    \ added the Menu and UserInterface Sprite Sheets. Switch to the Tileless Editor\
    \ View and, at the bottom, check the *Menu* folder so that it isn’t filtered out.\
    \ You should find the Menu images like they are in [Figure 7-1](#part0017.html#Fig1).\n\
    \n![9781484202630_Fig07-01.jpg](images/00095.jpeg)\n\n[Figure 7-1](#part0017.html#_Fig1).\
    \ The Menu images as seen in the Tileless Editor View\n\nIf you want to provide\
    \ your own images, you should have about three screen-sized images forming the\
    \ menu’s background layers. *Screen-sized* means the lowest common denominator\
    \ size—that is, 568x384 points if your app should run on both iPhones and iPads.\
    \ Considering that the iPad is scaled by a factor of two and that there are Retina\
    \ iPads that add another scale factor of two, the full-screen images should be\
    \ 2272x1536 pixels in size. If you design your app to run only on iPhones, your\
    \ reference size should be 568x320 points. Thus, you only need images that fit\
    \ the iPhone Retina screen—in other words, the full-screen images should be 1136x640\
    \ pixels in size. See [Chapter 3](#part0012.html) if you need a refresher on resolution\
    \ and image sizes.\n\nYou may be wondering why all of the background layer images\
    \ should be screen-sized. Isn’t this a waste of memory and doesn’t it increase\
    \ file size? Actually, no. If you place these images in a Sprite Sheet, SpriteBuilder\
    \ will cut off any excess transparent areas. It will crop off the transparent\
    \ parts and store only the smallest possible rectangle that encloses any and all\
    \ nontransparent pixels. [Figure 7-2](#part0017.html#Fig2) illustrates this.\n\
    \n![9781484202630_Fig07-02.jpg](images/00096.jpeg)\n\n[Figure 7-2](#part0017.html#_Fig2).\
    \ SpriteBuilder crops images in Sprite Sheets so that only the smallest possible\
    \ rectangle enclosing all nontransparent pixels remain. Here the dark gray area\
    \ at the top is cut off"
  raw: 'Be sure to set the *Custom class* of the *GameOverMenuLayer.ccb* root node
    to GameMenuLayer; otherwise, none of the buttons will work. Likewise, the exit
    and restart buttons should have their *Selector* fields set to shouldExitGame
    and shouldRestartGame, respectively. That’s what’s important for functionality,
    the rest is just visual appeal. I’m not saying that visuals aren’t important too,
    but they’re not as important for continuing with the book.


    But you are free to spend some time to animate the nodes on the menu shown in
    [Figure 6-10](#part0015.html#Fig10). For instance, why not animate the Color property
    of the *Game over* label? Select the *Game over* label node, and then add multiple
    *Color* keyframes by pressing *C*. Move the Timeline Cursor onto each keyframe
    and, on the *Item Properties* tab, click the colored rectangle next to the Color
    property, which presents the OS X color-picker dialog to let you pick a color.
    Right-click the individual *Keyframe Segments*, and change the easing modes to
    whatever you like.


    ![9781484202630_Fig06-10.jpg](images/00094.jpeg)


    [Figure 6-10](#part0015.html#_Fig10). What the Game Over menu might look like


    Run this animation and you’ll weep tears of delight. Such vivid colors. But enough
    with the sentimentalities. Art really isn’t my strong point, so let’s move on
    to kill the player.


    Showing the “Game Over” Popover


    Go back to Xcode, and open GameScene.m. Locate the ccPhysicsCollision methods,
    and below the last one, add the collision method shown in [Listing 6-17](#part0015.html#list17).


    [***Listing 6-17***](#part0015.html#_list17). There will not be blood: responding
    to a collision between player and saw


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                                saw:(CCNode *)saw

    {

        [self showPopoverNamed:@"UserInterface/Popovers/GameOverMenuLayer"];

        return YES;

    }

    ```


    The third parameter is named saw, in line with the Collision type of each saw
    prefab. If there is a collision between player and saw, the method simply shows
    the GameOverMenuLayer popover now. It’s a pretty harsh ending, but alas, there
    will *not* be blood. Not now, anyway.


    **Note**  If you find that some or all of the saws do not run the collision method
    in [Listing 6-17](#part0015.html#list17), open each saw prefab in the *Prefabs*
    folder in SpriteBuilder. Each of them should have their *Collision type* set to
    *saw* on the *Item Physics* tab. You may want to confirm this now, and where the
    *Collision* type is missing or incorrect, enter *saw*. Be sure to check the sprite
    node of each CCB, not their root nodes.


    Interlude: Fixing the Initial Scroll Position


    Wow! Game Over was quick. Is there anything else we could do?


    You may have noticed that when you press the restart button or whenever you change
    from the menu scene to the game scene, the level view isn’t centered on the player
    initially. That’s kind of bad, and it’s a result of the GameScene updating its
    scroll position only after the first time the update: method has run. But the
    very first frame is rendered earlier.


    Fortunately, the fix is easy. Open GameScene.m, and locate the loadLevelNamed:
    method. Add the highlighted line of [Listing 6-18](#part0015.html#list18) at the
    end of the method.


    [***Listing 6-18***](#part0015.html#_list18). Fixing the initial scroll position


    ```

    -(void) loadLevelNamed:(NSString*)levelCCB

    {

        // existing code omitted ...


    [self scrollToTarget:_playerNode];

    }

    ```


    This will ensure the _physicsNode.position is updated according to the player’s
    initial position before the scene is rendered for the first time. If you run the
    game now and restart or exit to the main menu via the pause menu, the screen will
    be centered on the player immediately. This will be particularly noticeable when
    presenting the GameScene with a transition.


    **Tip**  Sometimes such inconsistencies or visual glitches in the first or first
    couple frames of a scene can’t be avoided. In that case, you could start the scene
    with a full-screen popover presented, perhaps one that uses the exact same background
    as the preceding loading scene so that the user won’t even notice the difference.
    Then just fade out or remove the popover menu after a few frames have been drawn,
    using a *Callbacks* keyframe in the popover’s Default Timeline.


    Summary


    You can now pause the game and kill the player. Both actions present a popover
    menu to restart and exit the level or, in the case of the pause menu, resume the
    game with a *ready* animation. There were a number of cool tricks dispersed throughout
    this chapter as well.


    The project at this stage of the book is also found in the book’s downloadable
    archive in the *07 - Popover Menus* folder.


    Part    II


    Getting Down to Business with SpriteBuilder


    Chapter    7


    Main Scene and Game State


    So far we’ve fully neglected the main scene, where the game’s main menu ought
    to be. The main menu is a good place to add a *Settings* menu that allows you
    to change the volume of background music and sound effects.


    The settings popover requires a grid-based layout, which is why you’ll use the
    *Box Layout* node for the first time. You’ll also add a way to store the game
    state permanently—for instance, unlocked levels and audio volumes—so that it doesn’t
    get lost if the app is terminated.


    Main Scene Background


    It’s time to give the game’s main menu a make-over. Right now *MainScene.ccb*
    is still the pale, blue scene with the SpriteBuilder label and a play button.


    Designing the Background Images


    In the previous chapter, you already added the Menu and UserInterface Sprite Sheets.
    Switch to the Tileless Editor View and, at the bottom, check the *Menu* folder
    so that it isn’t filtered out. You should find the Menu images like they are in
    [Figure 7-1](#part0017.html#Fig1).


    ![9781484202630_Fig07-01.jpg](images/00095.jpeg)


    [Figure 7-1](#part0017.html#_Fig1). The Menu images as seen in the Tileless Editor
    View


    If you want to provide your own images, you should have about three screen-sized
    images forming the menu’s background layers. *Screen-sized* means the lowest common
    denominator size—that is, 568x384 points if your app should run on both iPhones
    and iPads. Considering that the iPad is scaled by a factor of two and that there
    are Retina iPads that add another scale factor of two, the full-screen images
    should be 2272x1536 pixels in size. If you design your app to run only on iPhones,
    your reference size should be 568x320 points. Thus, you only need images that
    fit the iPhone Retina screen—in other words, the full-screen images should be
    1136x640 pixels in size. See [Chapter 3](#part0012.html) if you need a refresher
    on resolution and image sizes.


    You may be wondering why all of the background layer images should be screen-sized.
    Isn’t this a waste of memory and doesn’t it increase file size? Actually, no.
    If you place these images in a Sprite Sheet, SpriteBuilder will cut off any excess
    transparent areas. It will crop off the transparent parts and store only the smallest
    possible rectangle that encloses any and all nontransparent pixels. [Figure 7-2](#part0017.html#Fig2)
    illustrates this.


    ![9781484202630_Fig07-02.jpg](images/00096.jpeg)


    [Figure 7-2](#part0017.html#_Fig2). SpriteBuilder crops images in Sprite Sheets
    so that only the smallest possible rectangle enclosing all nontransparent pixels
    remain. Here the dark gray area at the top is cut off'
  trans: "\n请务必将 `GameOverMenuLayer.ccb` 根节点的*自定义类*设置为 `GameMenuLayer`；否则所有按钮都将失效。同样，退出和重新开始按钮的*选择器*字段应分别设置为\
    \ `shouldExitGame` 和 `shouldRestartGame`。这是实现功能的关键，其余部分仅关乎视觉美观。我并非说视觉效果不重要，但对于继续本书而言，功能优先级更高。\n\
    \n但你完全可以花些时间让图 6-10 所示菜单中的节点动起来。例如，为什么不给*游戏结束*标签的*颜色*属性添加动画呢？选中*游戏结束*标签节点，然后按下\
    \ *C* 键添加多个*颜色*关键帧。将时间轴光标移动到每个关键帧上，在*项目属性*选项卡中，点击*颜色*属性旁边的彩色矩形，即可调出 OS X 取色器对话框来选择颜色。右键点击各个*关键帧段*，可按喜好更改缓动模式。\n\
    \n![9781484202630_Fig06-10.jpg](img/00094.jpeg)\n\n图 6-10. 游戏结束菜单的可能样式\n\n运行动画后，你会喜极而泣——如此生动的色彩！不过感伤到此为止。艺术并非我的强项，所以让我们继续前进，让玩家“阵亡”吧。\n\
    \n## 显示“游戏结束”弹出层\n\n返回 Xcode，打开 `GameScene.m`。找到 `ccPhysicsCollision` 方法，在最后一个方法下方添加代码清单\
    \ 6-17 所示的碰撞方法。\n\n**_ 代码清单 6-17_**. 不会有血腥场面：处理玩家与锯子的碰撞\n\n```\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \           saw:(CCNode *)saw\n{\n    [self showPopoverNamed:@\"UserInterface/Popovers/GameOverMenuLayer\"\
    ];\n    return YES;\n}\n```\n\n第三个参数名为 `saw`，与每个锯子预设体的*碰撞*类型一致。若玩家与锯子发生碰撞，该方法会立即显示\
    \ `GameOverMenuLayer` 弹出层。结局虽残酷，但不会有血腥——至少现在没有。\n\n**注意** 如果你发现部分或全部锯子未执行代码清单\
    \ 6-17 中的碰撞方法，请在 SpriteBuilder 中打开 *Prefabs* 文件夹内的每个锯子预设体。确保它们的*项目物理*选项卡中的*碰撞类型*设为\
    \ *saw*。建议现在确认，若*碰撞*类型缺失或错误，请填入 *saw*。检查时请确认是 CCB 的精灵节点，而非根节点。\n\n## 插曲：修复初始滚动位置\n\
    \n哇！游戏结束得太快了。我们还能做点什么吗？\n\n你可能注意到，按下重新开始按钮或从菜单场景切换至游戏场景时，关卡视图初始并未以玩家为中心。这有点糟糕，原因在于\
    \ `GameScene` 仅在 `update:` 方法首次运行后才更新滚动位置，而第一帧的渲染会更早完成。\n\n幸运的是，修复很简单。打开 `GameScene.m`，找到\
    \ `loadLevelNamed:` 方法，在方法末尾添加代码清单 6-18 中高亮显示的行。\n\n**_ 代码清单 6-18_**. 修复初始滚动位置\n\
    \n```\n-(void) loadLevelNamed:(NSString*)levelCCB\n{\n    // 现有代码省略 ...\n\n[self\
    \ scrollToTarget:_playerNode];\n}\n```\n\n这将确保在场景首次渲染前，`_physicsNode.position`\
    \ 会根据玩家的初始位置更新。现在运行游戏，无论是重新开始还是通过暂停菜单退出到主菜单，屏幕都会立即以玩家为中心。当使用过渡效果呈现 `GameScene`\
    \ 时，这点尤为明显。\n\n**提示** 有时场景的第一帧或前几帧出现这样的不一致或视觉故障是难以避免的。此时，你可以用一个全屏弹出层启动场景，或许使用与上一个加载场景完全相同的背景，这样用户甚至不会察觉差异。然后，在绘制几帧后，利用弹出层默认时间轴中的*回调*关键帧淡出或移除弹出菜单。\n\
    \n## 总结\n\n你现在可以暂停游戏并让玩家“阵亡”。这两种操作都会显示一个弹出菜单，用于重新开始、退出关卡，或在暂停菜单中通过*准备*动画恢复游戏。本章还穿插了许多巧妙技巧。\n\
    \n本书当前阶段的项目也收录在可下载存档的 *07 - 弹出菜单* 文件夹中。\n\n## 第二部分：在 SpriteBuilder 中正式开始工作\n\n\
    ## 第 7 章：主场景与游戏状态\n\n到目前为止，我们完全忽略了主场景——游戏主菜单的所在之处。主菜单是添加*设置*菜单的好地方，可用于调整背景音乐和音效的音量。\n\
    \n设置弹出层需要基于网格的布局，因此你将首次使用*盒式布局*节点。你还需要添加一种永久存储游戏状态（例如已解锁的关卡和音频音量）的方式，以便应用终止时数据不会丢失。\n\
    \n### 主场景背景\n\n是时候给游戏主菜单进行改头换面了。目前 `MainScene.ccb` 仍是一个苍白、蓝色的场景，带有 SpriteBuilder\
    \ 标签和一个播放按钮。\n\n#### 设计背景图片\n\n在上一章中，你已经添加了 Menu 和 UserInterface 精灵表。切换到无图块编辑器视图，并选中底部的\
    \ *Menu* 文件夹，使其不被过滤掉。你应该能找到如图 7-1 所示的菜单图片。\n\n![9781484202630_Fig07-01.jpg](img/00095.jpeg)\n\
    \n图 7-1. 无图块编辑器视图中显示的菜单图片\n\n如果你想提供自定义图片，则应有大约三张全屏大小的图片组成菜单的背景层。*全屏大小*指的是最低通用尺寸——也就是说，如果你的应用需同时运行在\
    \ iPhone 和 iPad 上，尺寸应为 568x384 点。考虑到 iPad 缩放倍率为 2，且 Retina iPad 额外增加 2 倍缩放因子，全屏图片的实际尺寸应为\
    \ 2272x1536 像素。如果你的应用仅设计为在 iPhone 上运行，参考尺寸应为 568x320 点。因此，你只需要适合 iPhone Retina\
    \ 屏幕的图片——即全屏图片尺寸应为 1136x640 像素。关于分辨率和图片尺寸，如需复习可参见第 3 章。\n\n你可能会想，为什么所有背景层图片都必须是全屏大小？这难道不是浪费内存并增加文件体积吗？实际上不会。如果你将这些图片放入精灵表，SpriteBuilder\
    \ 会裁剪掉多余的透明区域。它会剔除透明部分，仅存储能包裹所有非透明像素的最小矩形。图 7-2 展示了这一过程。\n\n![9781484202630_Fig07-02.jpg](img/00096.jpeg)\n\
    \n图 7-2. SpriteBuilder 裁剪精灵表中的图片，仅保留包裹所有非透明像素的最小矩形。此处顶部的深灰色区域被裁剪掉了\n"
- fmt: '# 排版后的内容


    [Figure 7-2](#part0017.html#Fig2)是`M_frontsmoke.png`图像的高亮彩色版本。顶部的灰色矩形是SpriteBuilder裁剪掉的区域，因为它只包含透明像素。该图像还使用纯色为任何不完全透明的像素着色，从而突出显示半透明像素。这强调了即使是一个或几乎不可见的像素，也会显著减少SpriteBuilder的裁剪量。[Figure
    7-2](#part0017.html#Fig2)中的图像可以通过移除图像两侧向上涂抹的半透明云状像素来优化，从而增加裁剪量。


    这对游戏开发者来说是一个持续的挑战：视觉质量与内存使用/性能之间的权衡。


    [Figure 7-3](#part0017.html#Fig3)显示了菜单精灵表的预览图像。您会注意到，`M_bg.png`图像使用的空间与`M_monsters.png`和`M_frontsmoke.png`两张图像大致相同。此外，一些图像被旋转，以便在精灵表中更高效地打包图像。


    ![9781484202630_Fig07-03.jpg](images/00097.jpeg)


    [Figure 7-3](#part0017.html#_Fig3). SpriteBuilder通过裁剪透明的矩形区域和旋转单个图像，自动优化了菜单精灵表


    由于这些精灵表优化，主要包含透明区域的屏幕尺寸或通常较大的图像，在精灵表中消耗的内存和占用的空间，与它们在图像程序中被裁剪后的大小一样多。


    我告诉你这些是因为，将所有图像绘制在相同大小的画布上，同时依赖SpriteBuilder裁剪透明区域，这会让游戏的图形设计变得容易得多。


    首先，你可以将每个屏幕尺寸的精灵放置在相同位置（通常是`0, 0`或屏幕中心），它们会像在图像程序中一样重叠。无需调整位置。Cocos2D会考虑裁剪掉的区域并相应地偏移精灵纹理。


    然后，你可以在图像程序中完成整个场景或图层的布局。许多艺术家更喜欢这样做。艺术家可以在`2272x1536`的画布上按自己的意愿移动元素，这些元素在游戏中也会以相同方式显示。只需保存图像、发布并运行应用程序，即可在游戏中看到新的布局。


    ## 设计背景CCB


    由于你可能希望在其他场景中重用菜单的背景图层，将其设计在单独的图层中是个好主意。


    右键点击`UserInterface`文件夹（注意是文件夹，而非同名的精灵表），选择`New File`。将此新文档命名为`MainMenuBackground.ccb`，将其类型设置为`Layer`，默认尺寸为`568x384`，然后点击`Create`。


    与往常一样，对图层CCB的根节点要做的第一件事是将其`Content size`类型设置为`%`，`Content size`值设置为`100`。这确保了图层能够根据不同的屏幕分辨率正确缩放，同时在所有设备上保持居中。


    从节点库视图中将一个常规的`Node`拖放到`MainMenuBackground.ccb`舞台上。将节点的位置类型设置为`%`，值设置为`50`，以便节点在图层中居中。你可能还希望将时间线中的节点重命名为`background`。`background`节点将成为背景图像的容器。


    现在，你可以将背景图像从无贴图编辑器视图中拖放到`background`节点上。按以下顺序添加图像（另请参见[Figure 7-4](#part0017.html#Fig4)）：


    *   `M_bg`

    *   `M_monsters`

    *   `M_frontsmoke`


    ![9781484202630_Fig07-04.jpg](images/00098.jpeg)


    [Figure 7-4](#part0017.html#_Fig4). 一个可怕的动画。看起来不像。看起来也没什么特别，但它确实有它的效果。这里没有展示，因为你需要看到它动起来的样子


    它们都应该是居中的`background`节点的子节点，这样精灵会自动在图层中居中。精灵自动居中是因为精灵的锚点默认为`0.5x0.5`，这意味着纹理是围绕精灵的位置居中绘制的。


    **注意**：更改节点的锚点会影响缩放和旋转操作，以及边界框和碰撞检测。锚点只改变节点的视觉表现，这种变化可能不会反映在物理引擎等方面。你永远不应该将锚点误解为定位节点的方式。始终使用位置来移动节点。在设计良好的Cocos2D应用中，很少会看到锚点的值不是`0`、`0.5`或`1`。通常，`0x0`和`0.5x0.5`是最常见的锚点设置。


    ## 背景动画


    没有什么比静态背景更无趣的了。任何东西只要有一点运动，就会变得更有吸引力。如果图像在设计时就考虑了一点运动，这一点尤其正确，这也是为什么背景图像一开始就被分成单独图层的原因。否则，你完全可以只使用一张静态且乏味的背景图像。


    例如，考虑一下OS X屏幕保护程序——具体来说，是经典屏幕保护程序，它只是显示图像而不做动画。然后将其与Ken Burns屏幕保护程序进行比较，后者中的图像会缓慢平移和缩放。哪一个看起来更有活力？


    如果你需要另一个例子，想想电视节目。每当镜头中没有人类或动物，并且场景基本上是静态的（如果不是照片的话），摄像机*总是*缓慢地平移或缩放，或者两者兼而有之。人们常说，看电视学不到东西。


    在[Figure 7-4](#part0017.html#Fig4)中，你可以看到，只需使用几个缩放动画并让怪物上下缓慢移动（当然，要使用缓动），就能让背景图像变得多么恐怖。


    具体来说，你应该为每个背景图像和`background`节点添加三个关键帧。首先，通过按下`S`键为`background`节点添加三个缩放关键帧。一个关键帧应位于两端，第三个位于中间（5秒标记处）。将时间线光标移到中间的关键帧上，在`Item
    Properties`选项卡中，为`background`节点将两个`Scale`值都设置为`1.02`。


    这是一个微小的缩放量，但一旦你播放动画，就会注意到效果。然后，右键点击一个`Keyframe Segment`，选择`Ease In/Out`。对另一个`Keyframe
    Segment`也重复此操作。再次播放动画，你会发现动画现在更加平滑。


    接下来，重复为`M_bg`和`M_frontsmoke`精灵添加三个带有`Ease In/Out`缓动的缩放关键帧。对于`M_bg`，将中间关键帧的缩放值设置为X和Y分别为`1.01`和`1.02`。对于`M_frontsmoke`，将中间关键帧的`Scale`值设置为X和Y分别为`1.02`和`1.06`。我相信你会注意到这如何进一步增强了动画效果。


    现在选择`M_monsters`节点，将其Y位置属性更改为`–15`。这会将节点向下移动一点。然后，通过按下`P`键添加三个位置关键帧——同样，一个在两端，一个在中心。将时间线光标移到中心关键帧上，然后将Y位置属性编辑为`0`。别忘了对两个关键帧段都应用`Ease
    In/Out`模式。这将使怪物的上下运动与缩放运动同步。


    最后，你希望这个动画无限循环。为此，左键点击[Figure 7-4](#part0017.html#Fig4)中显示`No chained timeline`的底部栏，从列表中选择`Default
    Timeline`，将动画链接到自身，从而实现循环。


    最终的动画显示，整个背景图层缓慢地向你靠近，同时怪物从烟雾中升起。随着背景后退，怪物也会随之下降，沉入烟雾之中。'
  raw: '[Figure 7-2](#part0017.html#Fig2) is the *M_frontsmoke.png* image with colorized
    highlights. The gray rectangle at the top is the area SpriteBuilder cuts off because
    it contains only transparent pixels. The image also highlights the semi-transparent
    pixels by using a solid color for any pixel that isn’t fully transparent. This
    emphasizes how even a single or just barely visible pixel can significantly reduce
    how much SpriteBuilder can crop. The image in [Figure 7-2](#part0017.html#Fig2)
    could be optimized to increase the amount of cropping by removing the semi-transparent
    clouds of pixels smeared upwards on both sides of the image.


    This is a constant struggle for game developers: visual quality vs. memory usage/performance.


    [Figure 7-3](#part0017.html#Fig3) shows the Menu Sprite Sheet’s preview image.
    You’ll notice that the *M_bg.png* image uses about the same space as the two *M_monsters.png*
    and *M_frontsmoke.png* images. Furthermore, some images are rotated to pack the
    images more efficiently in the Sprite Sheet.


    ![9781484202630_Fig07-03.jpg](images/00097.jpeg)


    [Figure 7-3](#part0017.html#_Fig3). SpriteBuilder automatically optimized the
    Menu Sprite Sheet by cropping transparent, rectangular areas and by rotating individual
    images


    As a result of these Sprite Sheet optimizations, screen-sized or generally large
    images that contain mainly transparent areas consume just as much memory and occupy
    just as much space in the Sprite Sheet as if their size had been cropped by an
    image program.


    I’m telling you this because drawing all images on the same-sized canvas while
    relying on SpriteBuilder to crop transparent areas makes graphics design for games
    a lot easier.


    For one, you can place each screen-sized sprite at the same position (typically
    0, 0 or the center of the screen) and they will overlap just like they do in the
    image program. No fiddling with positions necessary. Cocos2D considers the cropped-off
    areas and offsets the sprite textures accordingly.


    You can then do the entire layout of a scene or layer in the image program. Many
    artists prefer to do so. The artist will be able to move the elements within this
    2272x1536 canvas as she sees fit, and they will appear the same way in the game.
    Just save the images, publish, and run the app to see the new layout in the game.


    Designing the Background CCB


    Since you may want to re-use the menu’s background layer in other scenes, it’s
    a good idea to design it in a separate layer.


    Right-click the *UserInterface* folder—the folder, not the Sprite Sheet of the
    same name—and select *New File*. Name this new document ***MainMenuBackground.ccb***,
    set its type to *Layer* with the default 568x384 size, and then click *Create*.


    As usual, the first thing to do to a Layer CCB’s root node is set its *Content
    size* types to *%* and *Content size* values to *100*. This ensures the layer
    properly scales with varying screen resolutions while remaining centered on all
    devices.


    Add a regular *Node* from the Node Library View onto the *MainMenuBackground.ccb*
    stage. Set the node’s position types to *%* and its values to *50* so that the
    node is centered on the layer. You may also want to rename the node in the timeline
    to ***background***. The *background* node will be the container for the background
    images.


    You can now drag and drop the background images from the Tileless Editor View
    onto the *background* node. Add the images in this order (see also [Figure 7-4](#part0017.html#Fig4)):


    *   *M_bg*

    *   *M_monsters*

    *   *M_frontsmoke*


    ![9781484202630_Fig07-04.jpg](images/00098.jpeg)


    [Figure 7-4](#part0017.html#_Fig4). A scary animation. Doesn’t look like it. Doesn’t
    look like much either, but it has its effect. It’s not shown here because you
    have to see it in motion


    They should all be children of the centered *background* node so that the sprites
    will automatically be centered on the layer. The sprites center automatically
    because the anchor point for sprites defaults to 0.5x0.5, meaning the texture
    is drawn centered on the sprite’s position.


    **Note**  Changing a node’s anchor point affects scale and rotate operations,
    as well as bounding box and collision detection. The anchor point only shifts
    the visual representation of a node, and this change may not be represented by,
    say, physics. You should never mistake the anchor point as a way to position nodes.
    Always use the position to move nodes. In well-designed Cocos2D apps, it should
    be very rare to find any anchor point having any values other than 0, 0.5 or 1.
    In general, anchor points set to 0x0 and 0.5x0.5 are by far the most commonly
    used.


    Animating the Background


    Nothing is as unexciting as a static background. Anything can be made more attractive
    with just a bit of motion. And this is even more true if the images were designed
    with a little motion in mind, which is why the background images are split into
    separate layers in the first place. Otherwise, you could have just used a single,
    static, and boring background image.


    Consider, for instance, the OS X screen savers—specifically, the Classic screen
    saver that draws images without animating them. Then compare it with the Ken Burns
    screen saver, where the images are panning and zooming slowly. Which one looks
    more lively?


    If you need another example, consider TV programs. Any time there isn’t a human
    being or animal in focus and the scene is largely static, if not a photograph,
    the camera *always* pans or zooms slowly, perhaps both. And they say you can’t
    learn anything from watching TV.


    In [Figure 7-4](#part0017.html#Fig4), you can see how little it takes to make
    the background images even scarier through the use of a few scale animations and
    moving the monsters slowly up and down—of course, with easing.


    Specifically, you should add three keyframes to each of the background images
    and the *background* node. Start by adding three scale keyframes to the *background*
    node by pressing S. One keyframe should be at either end, and the third should
    be in the middle at the 5-seconds mark. Move the Timeline Cursor over the keyframe
    in the middle and, on the *Item Properties* tab, for the *background* node, set
    both *Scale* values to *1.02*.


    It’s a miniscule amount of scaling, but once you play the animation, you’ll notice
    the effect already. Then right-click a *Keyframe Segment* and select *Ease In/Out*.
    Repeat this for the other *Keyframe Segment* too. Play the animation again, and
    you’ll notice it will be even smoother now.


    Next, repeat adding three scale keyframes with *Ease In/Out* easing to the *M_bg*
    and *M_frontsmoke* sprites. For *M_bg*, set the middle keyframe’s scale values
    to *1.01* and *1.02* for X and Y. And for *M_frontsmoke*, set the middle keyframe’s
    *Scale* values to *1.02* and *1.06* for X and Y. I’m sure you’ll notice how this
    enhances the animation further.


    Now select the *M_monsters* node and change its Y position property to *–15*.
    This will move the node down a bit. Then add three position keyframes by pressing
    the P key—again, one keyframe at either end and one at the center. Move the Timeline
    Cursor over the center keyframe, and then edit the Y position property to *0*.
    Don’t forget to apply the *Ease In/Out* mode to both Keyframe Segments. This will
    make the monsters move up and down synchronized with the scale movement.


    Last, you’ll want this animation to loop forever. To do so, left-click on the
    bottom bar that reads *No chained timeline* in [Figure 7-4](#part0017.html#Fig4)
    and select *Default Timeline* from the list to chain the animation to itself,
    thus looping it.


    The resulting animation shows the entire background layer slowly coming at you
    while the monsters rise out of the smoke. As the background recedes, so will the
    monsters as they drop down into the smoke.'
  trans: '

    # 排版后的内容


    图 7-2 是`M_frontsmoke.png`图像的高亮彩色版本。顶部的灰色矩形是 SpriteBuilder 裁剪掉的区域，因为它只包含透明像素。该图像还使用纯色为任何不完全透明的像素着色，从而突出显示半透明像素。这强调了即使是一个或几乎不可见的像素，也会显著减少
    SpriteBuilder 的裁剪量。图 7-2 中的图像可以通过移除图像两侧向上涂抹的半透明云状像素来优化，从而增加裁剪量。


    这对游戏开发者来说是一个持续的挑战：视觉质量与内存使用/性能之间的权衡。


    图 7-3 显示了菜单精灵表的预览图像。您会注意到，`M_bg.png`图像使用的空间与`M_monsters.png`和`M_frontsmoke.png`两张图像大致相同。此外，一些图像被旋转，以便在精灵表中更高效地打包图像。


    ![9781484202630_Fig07-03.jpg](img/00097.jpeg)


    图 7-3. SpriteBuilder 通过裁剪透明的矩形区域和旋转单个图像，自动优化了菜单精灵表


    由于这些精灵表优化，主要包含透明区域的屏幕尺寸或通常较大的图像，在精灵表中消耗的内存和占用的空间，与它们在图像程序中被裁剪后的大小一样多。


    我告诉你这些是因为，将所有图像绘制在相同大小的画布上，同时依赖 SpriteBuilder 裁剪透明区域，这会让游戏的图形设计变得容易得多。


    首先，你可以将每个屏幕尺寸的精灵放置在相同位置（通常是`0, 0`或屏幕中心），它们会像在图像程序中一样重叠。无需调整位置。Cocos2D 会考虑裁剪掉的区域并相应地偏移精灵纹理。


    然后，你可以在图像程序中完成整个场景或图层的布局。许多艺术家更喜欢这样做。艺术家可以在`2272x1536`的画布上按自己的意愿移动元素，这些元素在游戏中也会以相同方式显示。只需保存图像、发布并运行应用程序，即可在游戏中看到新的布局。


    ## 设计背景 CCB


    由于你可能希望在其他场景中重用菜单的背景图层，将其设计在单独的图层中是个好主意。


    右键点击`UserInterface`文件夹（注意是文件夹，而非同名的精灵表），选择`New File`。将此新文档命名为`MainMenuBackground.ccb`，将其类型设置为`Layer`，默认尺寸为`568x384`，然后点击`Create`。


    与往常一样，对图层 CCB 的根节点要做的第一件事是将其`Content size`类型设置为`%`，`Content size`值设置为`100`。这确保了图层能够根据不同的屏幕分辨率正确缩放，同时在所有设备上保持居中。


    从节点库视图中将一个常规的`Node`拖放到`MainMenuBackground.ccb`舞台上。将节点的位置类型设置为`%`，值设置为`50`，以便节点在图层中居中。你可能还希望将时间线中的节点重命名为`background`。`background`节点将成为背景图像的容器。


    现在，你可以将背景图像从无贴图编辑器视图中拖放到`background`节点上。按以下顺序添加图像（另请参见图 7-4）：


    *   `M_bg`

    *   `M_monsters`

    *   `M_frontsmoke`


    ![9781484202630_Fig07-04.jpg](img/00098.jpeg)


    图 7-4. 一个可怕的动画。看起来不像。看起来也没什么特别，但它确实有它的效果。这里没有展示，因为你需要看到它动起来的样子


    它们都应该是居中的`background`节点的子节点，这样精灵会自动在图层中居中。精灵自动居中是因为精灵的锚点默认为`0.5x0.5`，这意味着纹理是围绕精灵的位置居中绘制的。


    **注意**：更改节点的锚点会影响缩放和旋转操作，以及边界框和碰撞检测。锚点只改变节点的视觉表现，这种变化可能不会反映在物理引擎等方面。你永远不应该将锚点误解为定位节点的方式。始终使用位置来移动节点。在设计良好的
    Cocos2D 应用中，很少会看到锚点的值不是`0`、`0.5`或`1`。通常，`0x0`和`0.5x0.5`是最常见的锚点设置。


    ## 背景动画


    没有什么比静态背景更无趣的了。任何东西只要有一点运动，就会变得更有吸引力。如果图像在设计时就考虑了一点运动，这一点尤其正确，这也是为什么背景图像一开始就被分成单独图层的原因。否则，你完全可以只使用一张静态且乏味的背景图像。


    例如，考虑一下 OS X 屏幕保护程序——具体来说，是经典屏幕保护程序，它只是显示图像而不做动画。然后将其与 Ken Burns 屏幕保护程序进行比较，后者中的图像会缓慢平移和缩放。哪一个看起来更有活力？


    如果你需要另一个例子，想想电视节目。每当镜头中没有人类或动物，并且场景基本上是静态的（如果不是照片的话），摄像机*总是*缓慢地平移或缩放，或者两者兼而有之。人们常说，看电视学不到东西。


    在图 7-4 中，你可以看到，只需使用几个缩放动画并让怪物上下缓慢移动（当然，要使用缓动），就能让背景图像变得多么恐怖。


    具体来说，你应该为每个背景图像和`background`节点添加三个关键帧。首先，通过按下`S`键为`background`节点添加三个缩放关键帧。一个关键帧应位于两端，第三个位于中间（5
    秒标记处）。将时间线光标移到中间的关键帧上，在`Item Properties`选项卡中，为`background`节点将两个`Scale`值都设置为`1.02`。


    这是一个微小的缩放量，但一旦你播放动画，就会注意到效果。然后，右键点击一个`Keyframe Segment`，选择`Ease In/Out`。对另一个`Keyframe
    Segment`也重复此操作。再次播放动画，你会发现动画现在更加平滑。


    接下来，重复为`M_bg`和`M_frontsmoke`精灵添加三个带有`Ease In/Out`缓动的缩放关键帧。对于`M_bg`，将中间关键帧的缩放值设置为
    X 和 Y 分别为`1.01`和`1.02`。对于`M_frontsmoke`，将中间关键帧的`Scale`值设置为 X 和 Y 分别为`1.02`和`1.06`。我相信你会注意到这如何进一步增强了动画效果。


    现在选择`M_monsters`节点，将其 Y 位置属性更改为`–15`。这会将节点向下移动一点。然后，通过按下`P`键添加三个位置关键帧——同样，一个在两端，一个在中心。将时间线光标移到中心关键帧上，然后将
    Y 位置属性编辑为`0`。别忘了对两个关键帧段都应用`Ease In/Out`模式。这将使怪物的上下运动与缩放运动同步。


    最后，你希望这个动画无限循环。为此，左键点击图 7-4 中显示`No chained timeline`的底部栏，从列表中选择`Default Timeline`，将动画链接到自身，从而实现循环。


    最终的动画显示，整个背景图层缓慢地向你靠近，同时怪物从烟雾中升起。随着背景后退，怪物也会随之下降，沉入烟雾之中。

