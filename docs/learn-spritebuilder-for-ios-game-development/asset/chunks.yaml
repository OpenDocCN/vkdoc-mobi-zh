- fmt: '**Tip** A common misconception is that image file size equals memory usage,
    but nothing could be further from the truth. An `image.png` file that’s 100 KB
    in size could easily consume 16 megabytes of memory as a texture. The maximum,
    uncompressed size of a texture in bytes is calculated from the image properties:
    `width x height x (bpp / 8)` where `bpp` stands for “bits per pixel.” Simply reducing
    color bit depth from 32-bit (4 bytes per color) to 16-bit (2 bytes per color)
    already halves a texture’s memory usage. The compressed PVR format further decreases
    memory usage without affecting image quality, while the lossy PVRTC reduces memory
    usage even further at the expense of image quality.


    It shouldn’t matter which atlas type you use for the rest of the book, but if
    you run into an out of memory situation in your app, the atlas type is how you
    can most easily and quickly reduce memory usage and even increase performance.
    To do so, simply select one of those cute pink sprite sheet folders with a smiley
    icon and change the texture type. For instance, the sprite sheet in [Figure 2-25](#part0011.html#Fig25)
    uses `PVR RGBA8888`—a texture in PVR format with 8 bits for each RGB color channel
    and another 8 bits for the alpha channel (transparency).


    ![9781484202630_Fig02-25.jpg](images/00034.jpeg)


    [Figure 2-25](#part0011.html#_Fig25). Sprite sheet publish format settings


    **Tip** The `RGBA4444` and `RGB565` formats reduce color bit depth to 16-bit,
    which can cause “color-bleeding”—specifically, in images with gradients. For these
    formats, you may want to enable the Dither check box. The `RGB565` is suitable
    only for images without any transparency—for instance, opaque background images—as
    it trades additional color vibrancy for the alpha channel. The PVRTC variants
    are a “last-resort” measure since they use a lossy compression, much like JPG,
    but they will further reduce memory usage and improve rendering performance. You
    should only consider using PVRTC for fast-moving, short-lived, or small images—where
    the reduced quality isn’t noticeable. For instance, a spritesheet containing nothing
    but variations of bullets could be an ideal PVRTC candidate. If in doubt, experiment.
    The original images will be left untouched, you can always revert the spritesheet
    export format without any loss.


    Now that you have turned the Global folder into a Sprite Sheet and set its export
    format, you should drag and drop the `player.png` provided in the book’s downloadable
    archive from Finder onto the *Global* sprite sheet folder. Be sure to drag the
    image itself, not the folder containing the images. The other images will be used
    at a later time.


    If you want to use your own player image, you should create an image that’s 256
    x 256 pixels in size and its contents circular in shape, and name it `player.png`.
    The player is circular because later in the book it will become a deformable soft-body
    physics object, and a circular shaped image is easiest to draw onto a deformable
    body.


    **Tip** Dragging and dropping files from Finder onto SpriteBuilder’s File View
    is the only way to add external resource files to SpriteBuilder.


    ## Creating the Player Prefab


    Now create another folder named `Prefabs` in the root of the File View.


    Select the folder, and choose `File` ![image](images/00008.jpeg) `New` ![image](images/00008.jpeg)
    `File` from the menu, or right-click it and select `New File`. Name the new document
    `Player.ccb`, and click the `Sprite` button to create the document with a `CCSprite`
    as its root node. See [Figure 2-26](#part0011.html#Fig26).


    ![9781484202630_Fig02-26.jpg](images/00035.jpeg)


    [Figure 2-26](#part0011.html#_Fig26). Creating the `Player.ccb` as a Sprite


    Your project’s File View should now look like in [Figure 2-27](#part0011.html#Fig27).


    ![9781484202630_Fig02-27.jpg](images/00036.jpeg)


    [Figure 2-27](#part0011.html#_Fig27). The project’s file and folder structure
    so far


    If any of the files are not where they are supposed to be, simply drag and drop
    them now to move them to the correct location.'
