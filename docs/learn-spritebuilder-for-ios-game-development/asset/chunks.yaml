- fmt: "**Caution** 您可能会想尝试将弹簧关节的刚度从 90 增加到 900，并将阻尼减小到 0。测试后别忘了重置这些值！您会注意到弹簧板不会完全静止，如果轻轻触碰它，弹簧板会立即将玩家向上弹起。这可能会给您带来一些灵感，或许您可以利用它产生不错的效果，但关键在于，作用力非常大的关节（及其对连接物体施加的力）会给物理模拟增添不稳定性和不准确性。即使是看起来无害的物体，也可能突然给其他物体注入高速度，尽管这些物体本身并没有明显移动。\n\
    \n## 释放弹簧锁\n\n当锁止到位时，弹簧将无法使用。您需要创建一个`SpringBoard`类来释放锁，然后再将锁复原以重置弹簧板。\n\n在`Spring.ccb`中选择`springboard_spring`节点，并切换到\
    \ **Item Code Connections** 选项卡。在自定义类字段中输入`SpringBoard`。然后切换到 **Item Physics**\
    \ 选项卡，在 **Collision type** 字段中输入`spring`。这使得`GameScene`类能够实现一个碰撞方法，当玩家触碰弹簧板时，该方法会调用`SpringBoard`中的方法。\n\
    \n现在发布并打开 Xcode，但先不要运行项目。首先，您需要创建另一个 Objective-C 类（右键点击 **Source** 文件夹，选择 **New\
    \ File**）。将类命名为`SpringBoard`，并确保它是`CCSprite`的子类，因为`springboard_spring`是一个精灵。\n\
    \n打开`SpringBoard.h`接口文件。您只需添加一个公共方法声明，以便其他对象可以指示弹簧释放其锁。将[代码清单 9-1](#part0019.html#list1)中的代码添加到`SpringBoard.h`中。\n\
    \n[***代码清单 9-1***](#part0019.html#_list1) SpringBoard 头文件声明了公共方法`letGo`\n\n```objc\n\
    #import \"CCSprite.h\"\n\n@interface SpringBoard : CCSprite\n\n-(void) letGo;\n\
    \n@end\n```\n\n目标是暂时禁用距离关节。不幸的是，您只能使（移除）关节失效。因此，要重置弹簧板，您必须在代码中创建一个新的距离关节实例，并赋予其与之前删除的关节相同的属性。最简单的方法是保留对关节的引用，即使它已失效，只需不在\
    \ ivar 上使用`__weak`关键字即可。这使得`_lockJoint`成为强引用，意味着分配给该 ivar 的关节在`SpringBoard`实例本身释放之前不会释放。\n\
    \n将[代码清单 9-2](#part0019.html#list2)中高亮显示的代码添加到`SpringBoard.m`中。请注意，该清单仅显示类的前半部分，而非完整的实现。最重要的是，不要删除`@end`。\n\
    \n[***代码清单 9-2***](#part0019.html#_list2) 查找并分配`_lockJoint`距离关节\n\n```objc\n#import\
    \ \"SpringBoard.h\"\n\n@implementation SpringBoard\n{\n    CCPhysicsJoint* _lockJoint;\
    \  // 注意：这里没有使用 __weak！\n}\n\n-(void) didLoadFromCCB\n{\n    Class distanceJointClass\
    \ = NSClassFromString(@\"CCPhysicsSlideJoint\");\n\n    for (CCPhysicsJoint* joint\
    \ in self.physicsBody.joints)\n    {\n        if ([joint isKindOfClass:distanceJointClass])\n\
    \        {\n            _lockJoint = joint;\n            break;\n        }\n \
    \   }\n}\n```\n\n不幸的是，Cocos2d 引擎仅公开了通用的`CCPhysicsJoint`类。所有其他具体的关节类，如`CCPhysicsSpringJoint`和`CCPhysicsSlideJoint`（距离关节），都是私有的。为了避免导入私有头文件或使用其他技巧，我们通过名称获取`CCPhysicsSlideJoint`的类类型。当然，该名称的类必须存在；否则`NSClassFromString`会返回`nil`。\n\
    \n在`didLoadFromCCB`中，枚举了`self.physicsBody.joints`列表。由于弹簧板只包含两个关节，且它们类型不同，搜索可以简化为简单的`isKindOfClass`检查。一旦找到第一个距离关节，就将其分配给`_lockJoint`\
    \ ivar，循环通过`break`关键字结束。\n\n**提示**  [代码清单 9-2](#part0019.html#list2)中的“查找我的关节”代码在您向`Spring.ccb`添加更多距离关节时可能会失效。不幸的是，无论是在\
    \ SpriteBuilder 还是代码中，关节都没有名称或标签来帮助您轻松识别它们。但是，您可以为关节的节点指定唯一名称来标识它们。然后，您可以在代码中访问关节的物体及其节点，并比较节点名称以确定它们是否是您要查找的节点。例如，以下代码片段可以在[代码清单\
    \ 9-2](#part0019.html#list2)的`for`循环内工作：\n\n```objc\nif ([joint.bodyA.node.name\
    \ isEqualToString:@\"node A\"] &&\n    [joint.bodyB.node.name isEqualToString:@\"\
    node B\"]) {\n        // 执行某些操作\n}\n```\n\n将距离关节分配给`_lockJoint`后，实现`letGo`方法就非常简单了。在`didLoadFromCCB`方法下方添加[代码清单\
    \ 9-3](#part0019.html#list3)中的方法。\n\n[***代码清单 9-3***](#part0019.html#_list3) 使`_lockJoint`失效会将其从世界中移除\n\
    \n```objc\n-(void) letGo\n{\n    if (_lockJoint.valid)\n    {\n        [_lockJoint\
    \ invalidate];\n\n        [self scheduleOnce:@selector(resetSpring) delay:0.5];\n\
    \    }\n}\n```\n\n不要在意方法的名称。它被命名为`invalidate`，但完全可以命名为`remove`，因为它执行的就是移除操作。通常，如果`_lockJoint`是一个`__weak`\
    \ ivar，那么调用`invalidate`后，`_lockJoint`引用会自动设置为`nil`。然而，`_lockJoint`是一个强引用，因此`CCPhysicsJoint`实例会保留在内存中，尽管它不再参与物理模拟。\n\
    \n半秒钟后，将调度执行`resetSpring`方法。请注意，重复调用`letGo`方法会重置已调度选择器的定时器。由于玩家可能会持续与弹簧碰撞，因此首先检查`_lockJoint`是否仍然有效。这保证了弹簧会在与玩家初次碰撞后的\
    \ 0.5 秒后重置，而不是在最近一次碰撞之后。\n\n现在，在`letGo`方法下方添加[代码清单 9-4](#part0019.html#list4)中的`resetSpring`方法。\n\
    \n[***代码清单 9-4***](#part0019.html#_list4) 使用前一个`_lockJoint`的物体创建一个新关节\n\n```objc\n\
    -(void) resetSpring\n{\n    _lockJoint = [CCPhysicsJoint\n                  connectedDistanceJointWithBodyA:_lockJoint.bodyA\n\
    \                                            bodyB:_lockJoint.bodyB\n        \
    \                                  anchorA:CGPointMake(0, -300.0)\n          \
    \                                anchorB:CGPointMake(32.0, 32.0)\n           \
    \                           minDistance:223.0\n                              \
    \        maxDistance:223.0];\n}\n```\n\n不幸的是，您不能直接将已失效的关节重新添加到物理世界中——您必须创建一个新的。这就是保留失效的`CCPhysicsJoint`实例在内存中的唯一原因：以便访问其`bodyA`和`bodyB`属性，这样您就不必在每次重新创建`_lockJoint`时查找相关的节点。\n\
    \n锚点和距离属性是照搬 SpriteBuilder 中的设置。从技术上讲，这也有点不便，因为`_lockJoint`实例内部仍然拥有所有这些属性。然而，您必须通过私有的\
    \ Objective-C API（一个名为`constraint`的私有属性）才能访问另一个私有的`ChipmunkConstraint`类。在这种情况下，锚点和距离属性不太可能改变，所以您可以直接在代码中输入它们。"
  raw: '**Caution**  You may be tempted to see how far you can take this. Try increasing
    the spring joint’s stiffness from 90 to 900, and reduce damping to 0\. Don’t forget
    to reset these values after the test! You’ll notice the spring board will not
    be entirely at rest, and if you touch it slightly, it will already and significantly
    push the player upward. This may give you ideas, and perhaps you can use it for
    a good effect, but really the point here is that very strongly opposing joints
    (and the forces they impose on the connected bodies) add unrest and inaccuracies
    to the physics simulation. Even potentially harmless-looking objects can suddenly
    infuse other objects with high velocities even though they aren’t moving much
    by themselves.


    Releasing the Spring Lock


    With the lock in place, the spring is no longer usable. You’ll need to create
    a SpringBoard class to release the lock and then also put the lock back in place
    to reset the springboard.


    Select the *springboard_spring* node in *Spring.ccb*, and switch to the *Item
    Code Connections* tab. Enter **SpringBoard** as the custom class. Then switch
    to the *Item Physics* tab, and enter **spring** in the *Collision type* field.
    This allows the *GameScene* class to implement a collision method that calls a
    SpringBoard method when the player touches the springboard.


    Now publish and open Xcode, but don’t run the project just yet. First you have
    to create another Objective-C class (by right-clicking the *Source* folder and
    selecting *New File*). Name the class **SpringBoard**, and be sure to make it
    a subclass of *CCSprite* because the *springboard_spring* is a sprite.


    Open the *SpringBoard.h* interface file. You only need to add a public method
    declaration with which other objects can instruct the spring to let go of its
    lock. Add the code in [Listing 9-1](#part0019.html#list1) to *SpringBoard.h*.


    [***Listing 9-1***](#part0019.html#_list1). The SpringBoard header declared the
    public letGo method


    ```

    #import "CCSprite.h"


    @interface SpringBoard : CCSprite


    -(void) letGo;


    @end

    ```


    The goal is to temporarily disable the distance joint. Unfortunately, you can
    only invalidate (remove) a joint. So, to reset the springboard, you’ll have to
    create a new distance joint instance in code and give it the same properties as
    the previously deleted joint. The easiest way to do so is to keep a reference
    to the joint even after it has been invalidated by simply not using the __weak
    keyword on the ivar. This makes _lockJoint a strong reference, meaning the joint
    assigned to the ivar will not deallocate until the SpringBoard instance itself
    deallocates.


    Add the highlighted code of [Listing 9-2](#part0019.html#list2) to *SpringBoard.m*.
    Note that the listing shows only the first half of the class, not the entire implementation.
    Most importantly, don’t remove the @end.


    [***Listing 9-2***](#part0019.html#_list2). Finding and assigning the _lockJoint
    distance joint


    ```

    #import "SpringBoard.h"


    @implementation SpringBoard

    {

        CCPhysicsJoint* _lockJoint;  // Notice: not using __weak here!

    }


    -(void) didLoadFromCCB

    {

        Class distanceJointClass = NSClassFromString(@"CCPhysicsSlideJoint");


    for (CCPhysicsJoint* joint in self.physicsBody.joints)

        {

            if ([joint isKindOfClass:distanceJointClass])

            {

                _lockJoint = joint;

                break;

            }

        }

    }

    ```


    Unfortunately, the Cocos2d engine exposes only the generic CCPhysicsJoint class
    publicly. All the other concrete joint classes, like CCPhysicsSpringJoint and
    CCPhysicsSlideJoint (the distance joint), are private. To avoid importing a private
    header or performing other trickery, the Class type of the CCPhysicsSlideJoint
    is obtained by its name. Of course, a class by that name still has to exist; otherwise,
    NSClassFromString would return nil.


    In didLoadFromCCB, the list of self.physicsBody.joints is enumerated. Since the
    springboard contains only two joints, and they are of a different type, the search
    can be simplified to a simple isKindOfClass check. Once the first distance joint
    is found, it is assigned to the _lockJoint ivar and the loop ends with the break
    keyword.


    **Tip**  The “find my joint” code in [Listing 9-2](#part0019.html#list2) may cease
    to function when you add more distance joints to the *Spring.ccb*. Unfortunately,
    there’s no name or tag for joints that helps you to identify them easily, neither
    in SpriteBuilder nor in code. However, you can give the joint’s nodes a unique
    name to identify them. You can then access the joint’s bodies and their nodes
    in code and compare the node names to find out if they are the nodes you are looking
    for. For example, this code snippet would work inside the for loop of [Listing
    9-2](#part0019.html#list2):


    if ([joint.bodyA.node.name isEqualToString:@"node A"] &&

        [joint.bodyB.node.name isEqualToString:@"node B"]) {

            // do something

    }


    With the distance joint assigned to _lockJoint, implementing the letGo method
    is dead simple. Add the method in [Listing 9-3](#part0019.html#list3) below the
    didLoadFromCCB method.


    [***Listing 9-3***](#part0019.html#_list3). Invalidating the _lockJoint will remove
    it from the world


    ```

    -(void) letGo

    {

        if (_lockJoint.valid)

        {

            [_lockJoint invalidate];


    [self scheduleOnce:@selector(resetSpring) delay:0.5];

        }

    }

    ```


    Never mind the name of the method. It’s named *invalidate*, but it could as well
    have been named *remove* because it does exactly that. Normally, if _lockJoint
    were a __weak ivar, the _lockJoint reference would be set to nil automatically
    after the call to invalidate. However, _lockJoint is a strong reference, so the
    CCPhysicsJoint instance remains in memory even though it no longer participates
    in the physics simulation.


    After half a second, the resetSpring method is scheduled to run. Note that repeatedly
    calling the letGo method would reset the scheduled selector’s timer. Because the
    player may continue to collide with the spring, it is first checked whether the
    _lockJoint is still valid. This guarantees that the spring will be reset 0.5 seconds
    after the initial collision with the player rather than after the most recent
    collision.


    Now add the resetSpring method in [Listing 9-4](#part0019.html#list4) below the
    letGo method.


    [***Listing 9-4***](#part0019.html#_list4). Creating a new joint with the bodies
    from the previous _lockJoint


    ```

    -(void) resetSpring

    {

        _lockJoint = [CCPhysicsJoint

                      connectedDistanceJointWithBodyA:_lockJoint.bodyA

                                                bodyB:_lockJoint.bodyB

                                              anchorA:CGPointMake(0, -300.0)

                                              anchorB:CGPointMake(32.0, 32.0)

                                          minDistance:223.0

                                          maxDistance:223.0];

    }

    ```


    Unfortunately, you can’t just re-add an invalidated joint to the physics world—you
    have to create a new one. This is the sole reason for keeping the invalidated
    CCPhysicsJoint instance in memory: to access its bodyA and bodyB properties so
    that you don’t need to find the associated nodes every time you create the _lockJoint
    anew.


    The anchor and distance properties have been entered as they were in SpriteBuilder.
    That, too, is a bit unfortunate because technically the _lockJoint instance still
    has all these properties internally. However, you’d have to go through a private
    Objective-C API (a private property named constraint) to gain access to another
    private ChipmunkConstraint class. In this case, the anchor and distance properties
    are unlikely to change, so you can just enter them in code.'
  trans: "```markdown\n\n**Caution** 您可能会想尝试将弹簧关节的刚度从 90 增加到 900，并将阻尼减小到 0。测试后别忘了重置这些值！您会注意到弹簧板不会完全静止，如果轻轻触碰它，弹簧板会立即将玩家向上弹起。这可能会给您带来一些灵感，或许您可以利用它产生不错的效果，但关键在于，作用力非常大的关节（及其对连接物体施加的力）会给物理模拟增添不稳定性和不准确性。即使是看起来无害的物体，也可能突然给其他物体注入高速度，尽管这些物体本身并没有明显移动。\n\
    \n## 释放弹簧锁\n\n当锁止到位时，弹簧将无法使用。您需要创建一个`SpringBoard`类来释放锁，然后再将锁复原以重置弹簧板。\n\n在`Spring.ccb`中选择`springboard_spring`节点，并切换到\
    \ **Item Code Connections** 选项卡。在自定义类字段中输入`SpringBoard`。然后切换到 **Item Physics**\
    \ 选项卡，在 **Collision type** 字段中输入`spring`。这使得`GameScene`类能够实现一个碰撞方法，当玩家触碰弹簧板时，该方法会调用`SpringBoard`中的方法。\n\
    \n现在发布并打开 Xcode，但先不要运行项目。首先，您需要创建另一个 Objective-C 类（右键点击 **Source** 文件夹，选择 **New\
    \ File**）。将类命名为`SpringBoard`，并确保它是`CCSprite`的子类，因为`springboard_spring`是一个精灵。\n\
    \n打开`SpringBoard.h`接口文件。您只需添加一个公共方法声明，以便其他对象可以指示弹簧释放其锁。将代码清单 9-1 中的代码添加到`SpringBoard.h`中。\n\
    \n***代码清单 9-1*** SpringBoard 头文件声明了公共方法`letGo`\n\n```objc\n#import \"CCSprite.h\"\
    \n\n@interface SpringBoard : CCSprite\n\n-(void) letGo;\n\n@end\n```\n\n目标是暂时禁用距离关节。不幸的是，您只能使（移除）关节失效。因此，要重置弹簧板，您必须在代码中创建一个新的距离关节实例，并赋予其与之前删除的关节相同的属性。最简单的方法是保留对关节的引用，即使它已失效，只需不在\
    \ ivar 上使用`__weak`关键字即可。这使得`_lockJoint`成为强引用，意味着分配给该 ivar 的关节在`SpringBoard`实例本身释放之前不会释放。\n\
    \n将代码清单 9-2 中高亮显示的代码添加到`SpringBoard.m`中。请注意，该清单仅显示类的前半部分，而非完整的实现。最重要的是，不要删除`@end`。\n\
    \n***代码清单 9-2*** 查找并分配`_lockJoint`距离关节\n\n```objc\n#import \"SpringBoard.h\"\n\
    \n@implementation SpringBoard\n{\n    CCPhysicsJoint* _lockJoint;  // 注意：这里没有使用\
    \ __weak！\n}\n\n-(void) didLoadFromCCB\n{\n    Class distanceJointClass = NSClassFromString(@\"\
    CCPhysicsSlideJoint\");\n\n    for (CCPhysicsJoint* joint in self.physicsBody.joints)\n\
    \    {\n        if ([joint isKindOfClass:distanceJointClass])\n        {\n   \
    \         _lockJoint = joint;\n            break;\n        }\n    }\n}\n```\n\n\
    不幸的是，Cocos2d 引擎仅公开了通用的`CCPhysicsJoint`类。所有其他具体的关节类，如`CCPhysicsSpringJoint`和`CCPhysicsSlideJoint`（距离关节），都是私有的。为了避免导入私有头文件或使用其他技巧，我们通过名称获取`CCPhysicsSlideJoint`的类类型。当然，该名称的类必须存在；否则`NSClassFromString`会返回`nil`。\n\
    \n在`didLoadFromCCB`中，枚举了`self.physicsBody.joints`列表。由于弹簧板只包含两个关节，且它们类型不同，搜索可以简化为简单的`isKindOfClass`检查。一旦找到第一个距离关节，就将其分配给`_lockJoint`\
    \ ivar，循环通过`break`关键字结束。\n\n**提示**  代码清单 9-2 中的“查找我的关节”代码在您向`Spring.ccb`添加更多距离关节时可能会失效。不幸的是，无论是在\
    \ SpriteBuilder 还是代码中，关节都没有名称或标签来帮助您轻松识别它们。但是，您可以为关节的节点指定唯一名称来标识它们。然后，您可以在代码中访问关节的物体及其节点，并比较节点名称以确定它们是否是您要查找的节点。例如，以下代码片段可以在代码清单\
    \ 9-2 的`for`循环内工作：\n\n```objc\nif ([joint.bodyA.node.name isEqualToString:@\"\
    node A\"] &&\n    [joint.bodyB.node.name isEqualToString:@\"node B\"]) {\n   \
    \     // 执行某些操作\n}\n```\n\n将距离关节分配给`_lockJoint`后，实现`letGo`方法就非常简单了。在`didLoadFromCCB`方法下方添加代码清单\
    \ 9-3 中的方法。\n\n***代码清单 9-3*** 使`_lockJoint`失效会将其从世界中移除\n\n```objc\n-(void) letGo\n\
    {\n    if (_lockJoint.valid)\n    {\n        [_lockJoint invalidate];\n\n    \
    \    [self scheduleOnce:@selector(resetSpring) delay:0.5];\n    }\n}\n```\n\n\
    不要在意方法的名称。它被命名为`invalidate`，但完全可以命名为`remove`，因为它执行的就是移除操作。通常，如果`_lockJoint`是一个`__weak`\
    \ ivar，那么调用`invalidate`后，`_lockJoint`引用会自动设置为`nil`。然而，`_lockJoint`是一个强引用，因此`CCPhysicsJoint`实例会保留在内存中，尽管它不再参与物理模拟。\n\
    \n半秒钟后，将调度执行`resetSpring`方法。请注意，重复调用`letGo`方法会重置已调度选择器的定时器。由于玩家可能会持续与弹簧碰撞，因此首先检查`_lockJoint`是否仍然有效。这保证了弹簧会在与玩家初次碰撞后的\
    \ 0.5 秒后重置，而不是在最近一次碰撞之后。\n\n现在，在`letGo`方法下方添加代码清单 9-4 中的`resetSpring`方法。\n\n***代码清单\
    \ 9-4*** 使用前一个`_lockJoint`的物体创建一个新关节\n\n```objc\n-(void) resetSpring\n{\n    _lockJoint\
    \ = [CCPhysicsJoint\n                  connectedDistanceJointWithBodyA:_lockJoint.bodyA\n\
    \                                            bodyB:_lockJoint.bodyB\n        \
    \                                  anchorA:CGPointMake(0, -300.0)\n          \
    \                                anchorB:CGPointMake(32.0, 32.0)\n           \
    \                           minDistance:223.0\n                              \
    \        maxDistance:223.0];\n}\n```\n\n不幸的是，您不能直接将已失效的关节重新添加到物理世界中——您必须创建一个新的。这就是保留失效的`CCPhysicsJoint`实例在内存中的唯一原因：以便访问其`bodyA`和`bodyB`属性，这样您就不必在每次重新创建`_lockJoint`时查找相关的节点。\n\
    \n锚点和距离属性是照搬 SpriteBuilder 中的设置。从技术上讲，这也有点不便，因为`_lockJoint`实例内部仍然拥有所有这些属性。然而，您必须通过私有的\
    \ Objective-C API（一个名为`constraint`的私有属性）才能访问另一个私有的`ChipmunkConstraint`类。在这种情况下，锚点和距离属性不太可能改变，所以您可以直接在代码中输入它们。\n\
    \n```"
- fmt: '新创建的关节直接赋值给`_lockJoint`，替换之前的关节。由于之前的锁定关节没有强引用持有，ARC会自动释放其内存。因此，你只需在内存中保留最新创建的`_lockJoint`。一旦`SpringBoard`实例被释放，剩余的`_lockJoint`实例也会被释放。


    `CCPhysicsJoint`类允许你像在SpriteBuilder中编辑（枢轴、弹簧和距离）一样，在代码中创建相同的关节。不过，存在一些只能通过SpriteBuilder实现的变体。例如，你无法通过`CCPhysicsJoint`接口创建一个同时启用弹簧和限制的枢轴关节。可用的`CCPhysicsJoint`初始化方法请参考[清单9-5](#part0019.html#list5)。


    [**清单9-5**](#part0019.html#_list5). 创建`CCPhysicsJoint`实例


    ```

    // 创建一个弹簧关节

    +(CCPhysicsJoint*)connectedSpringJointWithBodyA:(CCPhysicsBody*)bodyA

                                              bodyB:(CCPhysicsBody*)bodyB

                                            anchorA:(CGPoint)anchorA

                                            anchorB:(CGPoint)anchorB

                                         restLength:(CGFloat)restLength

                                          stiffness:(CGFloat)stiffness

                                            damping:(CGFloat)damping;


    // 创建一个距离关节

    +(CCPhysicsJoint*)connectedDistanceJointWithBodyA:(CCPhysicsBody*)bodyA

                                                bodyB:(CCPhysicsBody*)bodyB

                                              anchorA:(CGPoint)anchorA

                                              anchorB:(CGPoint)anchorB;


    +(CCPhysicsJoint*)connectedDistanceJointWithBodyA:(CCPhysicsBody*)bodyA

                                                bodyB:(CCPhysicsBody*)bodyB

                                              anchorA:(CGPoint)anchorA

                                              anchorB:(CGPoint)anchorB

                                          minDistance:(CGFloat)min

                                          maxDistance:(CGFloat)max;


    // 创建枢轴关节

    +(CCPhysicsJoint*)connectedPivotJointWithBodyA:(CCPhysicsBody*)bodyA

                                             bodyB:(CCPhysicsBody*)bodyB

                                           anchorA:(CGPoint)anchorA;


    +(CCPhysicsJoint*)connectedRotarySpringJointWithBodyA:(CCPhysicsBody*)bodyA

                                                    bodyB:(CCPhysicsBody*)bodyB

                                                restAngle:(CGFloat)restAngle

                                                stiffness:(CGFloat)stiffness

                                                  damping:(CGFloat)damping;


    +(CCPhysicsJoint*)connectedMotorJointWithBodyA:(CCPhysicsBody*)bodyA

                                             bodyB:(CCPhysicsBody*)bodyB

                                              rate:(CGFloat)rate;


    +(CCPhysicsJoint*)connectedRotaryLimitJointWithBodyA:(CCPhysicsBody*)bodyA

                                                   bodyB:(CCPhysicsBody*)bodyB

                                                     min:(CGFloat)min

                                                     max:(CGFloat)max;


    // 唯一当前无法在SpriteBuilder中编辑的枢轴关节属性

    +(CCPhysicsJoint*)connectedRatchetJointWithBodyA:(CCPhysicsBody*)bodyA

                                               bodyB:(CCPhysicsBody*)bodyB

                                               phase:(CGFloat)phase

                                             ratchet:(CGFloat)ratchet;

    ```


    接下来还需要实际调用`SpringBoard`类的`letGo`方法。这一步在*GameScene*实现文件中完成。打开*GameScene.m*，添加[清单9-6](#part0019.html#list6)中高亮显示的头文件导入。


    [**清单9-6**](#part0019.html#_list6). 在`GameScene.m`中导入`SpringBoard.h`


    ```

    #import "GameScene.h"

    #import "Trigger.h"

    #import "GameMenuLayer.h"

    #import "GameState.h"

    #import "SpringBoard.h"

    ```


    然后在其他`ccPhysicsCollisionBegin`方法下方添加[清单9-7](#part0019.html#list7)中的方法。


    [**清单9-7**](#part0019.html#_list7). 响应玩家与弹簧之间的碰撞


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair*)pair

                             player:(CCNode*)player

                             spring:(SpringBoard*)spring

    {

        [spring letGo];

        return YES;

    }

    ```


    现在，当玩家与碰撞类型设置为`spring`的物理体碰撞时，将执行[清单9-7](#part0019.html#list7)中的方法，该方法进而调用`SpringBoard`的`letGo`方法。这里我们可以安全地假设所有弹簧都是`SpringBoard`类的实例；因此，可以安全地将`spring`参数视为`SpringBoard*`类型，而非`CCNode*`类型。


    从该方法返回`YES`可确保玩家与弹簧发生碰撞，而非相互穿过。


    弹簧的实现就到这里。现在你可以在关卡中放置*Spring.ccb*的实例了。你应该将它们添加到*chains & ropes & springs*节点中。当你运行游戏并用玩家触摸弹簧时，弹簧会向外加速，将玩家推开。你可以修改弹簧关节的阻尼和刚度参数，以及弹簧世界挂钩的位置（通过编辑*Anchor
    A*）来改变弹簧力。


    ## 关节断裂与电机


    到目前为止，我忽略了与断裂关节和添加扭矩相关的属性。我知道这些内容非常有趣，所以我们快速在链条和绳索上尝试一下。


    ## 断裂力示例


    打开*Chain.ccb*，选择连接最后一个链节与球的关节。这很可能是时间线中的最后一个`CCPhysicsPivotJoint`实例。


    *Item Properties*选项卡上的*Breaking force*字段设置的是关节能够承受的应力阈值。如果关节应力超过了*Breaking force*中输入的自定义值，该关节将被移除。更改*Breaking
    force*旁边的单选按钮，以便在其旁边的文本字段中输入值。至于具体的值，请输入**1060**。如果你问我如何确定这个值：尝试和纠错。如果你按照指示修改了关节属性，它应该能正常工作；否则，你可能需要使用更高或更低的值——请参见下面的讨论。


    **注意** *Max force*必须设置为“无限制”，或者设置为等于或高于*Breaking force*的值。


    在游戏中使用一个旋转角度为0（这样它就不会摆动）的链条实例来测试一下。仅摆动就可能导致断裂力被超过，因为即使*Breaking force*值略低为*1050*，也会导致连接断开。如果设置正确，玩家仅触摸球或链条就会导致关节消失，球会从链条上掉落。


    这里存在一个问题。*Breaking force*设置并不十分可靠，因此不适合用于必须触发的触发事件。例如，如果触摸球时球必须掉落，你应该实现一个碰撞方法，而不是使用碰撞类型。


    确定断裂力也很繁琐，但如果你遵循以下原则，确定它并非不可能：


    *   为*Breaking force*输入一个任意较大的值，例如*100*。

    *   检查相关关节是否断裂。理想情况下，关节体应处于静止状态。

    *   如果关节断裂，将该值加倍再次尝试。

    *   重复加倍操作，直到关节不再断裂。此时你已知晓实际断裂点所在的两个上下界。

    *   通过将差值减半来缩小断裂点的范围。例如，如果在5,000时关节断裂，而在10,000时停止断裂，接下来应尝试7,500。

    *   继续缩小范围，直到接近断裂点。'
  raw: 'The newly created joint is assigned directly to _lockJoint, replacing the
    previous one. Since the previous lock joint has no strong reference holding on
    to it, ARC will automatically release its memory. So you really just keep the
    most recently created _lockJoint in memory. And once the SpringBoard instance
    deallocates, the remaining _lockJoint instance will also deallocate.


    The CCPhysicsJoint class allows you to create the same joints in code as the ones
    you can edit in SpriteBuilder (pivot, spring, and distance). However, variations
    exist that you can achieve only with SpriteBuilder. For instance, you can’t create
    a pivot joint with both spring and limit enabled through the CCPhysicsJoint interface.
    See [Listing 9-5](#part0019.html#list5) for a reference of available CCPhysicsJoint
    initializers.


    [***Listing 9-5***](#part0019.html#_list5). Creating CCPhysicsJoint instances


    ```

    // Creating a Spring Joint

    +(CCPhysicsJoint*)connectedSpringJointWithBodyA:(CCPhysicsBody*)bodyA

                                              bodyB:(CCPhysicsBody*)bodyB

                                            anchorA:(CGPoint)anchorA

                                            anchorB:(CGPoint)anchorB

                                         restLength:(CGFloat)restLength

                                          stiffness:(CGFloat)stiffness

                                            damping:(CGFloat)damping;


    // Creating a Distance Joint

    +(CCPhysicsJoint*)connectedDistanceJointWithBodyA:(CCPhysicsBody*)bodyA

                                                bodyB:(CCPhysicsBody*)bodyB

                                              anchorA:(CGPoint)anchorA

                                              anchorB:(CGPoint)anchorB;


    +(CCPhysicsJoint*)connectedDistanceJointWithBodyA:(CCPhysicsBody*)bodyA

                                                bodyB:(CCPhysicsBody*)bodyB

                                              anchorA:(CGPoint)anchorA

                                              anchorB:(CGPoint)anchorB

                                          minDistance:(CGFloat)min

                                          maxDistance:(CGFloat)max;


    // Creating Pivot Joints

    +(CCPhysicsJoint*)connectedPivotJointWithBodyA:(CCPhysicsBody*)bodyA

                                             bodyB:(CCPhysicsBody*)bodyB

                                           anchorA:(CGPoint)anchorA;


    +(CCPhysicsJoint*)connectedRotarySpringJointWithBodyA:(CCPhysicsBody*)bodyA

                                                    bodyB:(CCPhysicsBody*)bodyB

                                                restAngle:(CGFloat)restAngle

                                                stiffness:(CGFloat)stiffness

                                                  damping:(CGFloat)damping;


    +(CCPhysicsJoint*)connectedMotorJointWithBodyA:(CCPhysicsBody*)bodyA

                                             bodyB:(CCPhysicsBody*)bodyB

                                              rate:(CGFloat)rate;


    +(CCPhysicsJoint*)connectedRotaryLimitJointWithBodyA:(CCPhysicsBody*)bodyA

                                                   bodyB:(CCPhysicsBody*)bodyB

                                                     min:(CGFloat)min

                                                     max:(CGFloat)max;


    // The only Pivot Joint properties not currently editable in SpriteBuilder

    +(CCPhysicsJoint*)connectedRatchetJointWithBodyA:(CCPhysicsBody*)bodyA

                                               bodyB:(CCPhysicsBody*)bodyB

                                               phase:(CGFloat)phase

                                             ratchet:(CGFloat)ratchet;

    ```


    What’s still missing is to actually call the SpringBoard class’ letGo method.
    This is done in the *GameScene* implementation file. Open *GameScene.m*, and add
    the header import highlighted in [Listing 9-6](#part0019.html#list6).


    [***Listing 9-6***](#part0019.html#_list6). Importing SpringBoard.h in GameScene.m


    ```

    #import "GameScene.h"

    #import "Trigger.h"

    #import "GameMenuLayer.h"

    #import "GameState.h"

    #import "SpringBoard.h"

    ```


    Then add the method in [Listing 9-7](#part0019.html#list7) just below the other
    ccPhysicsCollisionBegin methods.


    [***Listing 9-7***](#part0019.html#_list7). Responding to collisions between player
    and spring


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair*)pair

                             player:(CCNode*)player

                             spring:(SpringBoard*)spring

    {

        [spring letGo];

        return YES;

    }

    ```


    Now when the player collides with a physics body whose *Collision* type is set
    to spring, it will run the method in [Listing 9-7](#part0019.html#list7), which
    in turn calls the SpringBoard’s letGo method. Here we can safely assume that all
    springs are instances of the SpringBoard class; therefore, it’s safe to assume
    the spring parameter to be of type SpringBoard* rather than CCNode*.


    Returning YES from the method ensures the player and spring do collide rather
    than passing through each other.


    That’s it for the spring. You can now place instances of *Spring.ccb* in the level.
    You should add them to the *chains & ropes & springs* node. When you run the game
    and touch a spring with the player, the spring should accelerate outward, pushing
    the player away. You can alter the spring joint’s damping and stiffness parameters
    as well as the position of the spring’s world hook (by editing *Anchor A*) to
    alter the spring force.


    Breaking Joints and Motors


    Thus far, I have neglected the properties related to breaking joints and adding
    torque. I know they can be very intriguing, so let’s quickly try them on the chain
    and rope.


    Breaking Force Example


    Open *Chain.ccb*, and select the joint that connects the last chain segment with
    the ball. This is most likely the last CCPhysicsPivotJoint instance in the Timeline.


    The *Breaking force* field on the *Item Properties* tab is set to a stress threshold
    that the joint is able to withstand. If the joint stress exceeds the arbitrary
    value entered in *Breaking force*, the joint will be removed. Change the radio
    button next to *Breaking force* so that you can enter a value in the text field
    next to it. As for the value, enter **1060**. If you ask me how I determined that
    value: trial and error. It should work if you change the joint properties as instructed;
    otherwise, you may find you need to use a higher or lower value—see the following
    discussion.


    **Caution**  *Max force* must be either unlimited or set to a value equal to or
    higher than *Breaking force*.


    Try this in the game with a chain instance whose rotation is 0 so that it does
    not swing. Swinging alone might cause the breaking force to be exceeded, because
    even just a slightly lower *Breaking force* value of *1050* would always sever
    the connection. If you get this right, merely touching the ball or chain with
    the player will cause the joint to disappear, and the ball will drop from the
    chain.


    Now there’s a problem here. The *Breaking force* setting is not very reliable
    and thus not suitable for triggered events that have to happen. For instance,
    if touching the ball should always drop it, you should implement a collision method
    rather than using collision types.


    Breaking force is also tedious to determine, but it’s not impossible to determine
    it if you follow this principle:


    *   Enter an arbitrary high value for *Breaking force*, say, *100*.

    *   Check if the joint in question breaks. Ideally, the joint bodies should be
    at rest.

    *   If the joint breaks, double the value and try again.

    *   Repeat doubling the value until the joint no longer breaks. You now know two
    upper and lower bounds between which the actual breaking point lies.

    *   Narrow down the breaking point by halving the difference. For instance, if
    at 5,000 the joint breaks but stops it breaking at 10,000, you should try 7,500
    next.

    *   Keep narrowing down the value until you get close enough to the breaking point.'
