    \ scrollViewDidEndDragging:(CCScrollView *)scrollView\n                  willDecelerate:(BOOL)decelerate\n\
    {\n    NSLog(@\"%@%@\",\n          NSStringFromSelector(_cmd), decelerate ? @\"\
    YES\" : @\"NO\");\n}\n-(void) scrollViewWillBeginDecelerating:(CCScrollView *)scrollView\n\
    {\n    NSLog(@\"%@\", NSStringFromSelector(_cmd));\n    // 此委托方法仅在未启用分页时运行\n}\n\
    -(void) scrollViewDidEndDecelerating:(CCScrollView *)scrollView\n{\n    NSLog(@\"\
    %@\", NSStringFromSelector(_cmd));\n}\n```\n\n你可以根据需求使用这些方法。对于本项目，你暂时还用不到它们。但例如，`scrollViewWillBeginDragging:`\
    \ 和 `scrollViewDidEndDecelerating:` 可用于判断页面切换。这样，当用户浏览页面时，你就能在不同页面上开始或停止动画。\n\n\
    ## 总结\n\n你可以在 `09 - Level Selection Scroll View` 文件夹中找到项目的当前状态。\n\n现在你已经掌握了如何使用\
    \ `Scroll View` 节点，以及如何解锁并为项目添加更多关卡。在下一章中，你将通过添加更多物理游戏对象来丰富游戏内容，从而设计出更多样化的关卡。\n\
    \n## 第九章：物理关节\n\n本章将添加更多游戏元素，使关卡的设计和游玩更具趣味性。许多复杂的物理对象都需要用到关节。*关节* 是一种将独立物体连接在一起的手段，并定义了连接之间的运动自由度。\n\
    \n像链条、绳索和弹簧这类物理对象都需要关节才能运作。关节也用于模拟软体物理。在本章为关节编辑打下基础后，下一章你将学习这项高级技术。\n\n关节有时也很难掌控。它们是游戏中大多数物理故障的根源。无论是马车突然高高抛向空中、布娃娃无法静止且肢体不停抖动，还是复杂物体看似无限拉伸或压缩至原始尺寸的一小部分，这样的例子比比皆是。\n\
    \n### 什么是关节？\n\n*关节* 是一种不可见的物理对象，它恰好连接两个物体。关节定义了两个物体之间的连接点，称为 *关节锚点*。不要将这些锚点与节点的锚点（用于确定节点纹理偏移）混淆。关节锚点是关节对物体施加力的位置，该位置不必位于节点的碰撞形状或纹理范围内。\n\
    \n关节为两个物理体添加了约束。这些约束可以强制要求物体之间保持固定距离或相对角度。\n\n约束参数也决定了约束的刚性程度。有些约束是柔性的，允许物体相互分离或靠近，只需施加很小的力就能达到预期的距离或旋转角度。其他约束可能非常刚性，允许的距离变化容差极小，因此会对物体施加巨大的力。\n\
    \n**注意** 约束的刚性越强，物理故障发生的可能性和严重程度就越高。想象一根柔软的橡皮筋和一根金属弹簧分别连接两个物体——例如，两个装满水的水桶。柔软的橡皮筋在拉伸时几乎不会将两个物体拉拢，因为即使橡皮筋被拉伸到原始长度的两倍，对物体施加的力也非常小。相比之下，金属弹簧即使只拉伸一点点，也需要很大的力。如果松开金属弹簧，它的反弹会比拉伸相同距离的橡皮筋剧烈得多。\n\
    \n*约束* 意味着物理引擎正在对关节的物体施加力，试图将物体保持在关节约束定义的范围内，而不仅仅是改变它们的位置。这导致关节可能永远无法将物体移动到满足所有约束的精确位置。这意味着，用关节连接的两个物体几乎不可能在你最初于\
    \ `SpriteBuilder` 中设计它们的相对位置上完全静止下来。\n\n关节也可以用作在游戏世界中移动物体的手段。只需考虑以下想法：到目前为止，游戏世界通过保持玩家居中来进行滚动。如果你添加另一个带有物理体的不可见节点，并用一个软弹簧关节将其与玩家连接，然后让摄像机跟随这个不可见节点，那会怎样？那么摄像机将根据玩家的移动平滑地加速和减速。如果你希望摄像机超前于玩家而不是滞后，你可以反转这种设置，改为移动不可见节点来拖拽玩家。\n\
    \n### 关节的类型\n\n在 `SpriteBuilder` 中，可以从 `节点库视图` 中使用三种不同的关节类型，如 图 9-1 所示。\n\n![9781484202630_Fig09-01.jpg](img/00118.jpeg)\n\
    \n图 9-1. 节点库视图中的关节\n\n**提示** 这些关节也可以通过使用 `CCPhysicsJoint` 类方法在代码中创建。尽管 `CCPhysicsJoint`\
    \ 在 `SpriteBuilder` 中暴露了八种关节创建方法，但它们只是三种关节类型的变体：枢轴关节、距离关节和弹簧关节。`CCPhysicsJoint`\
    \ 暴露的唯一一种（目前）无法在 `SpriteBuilder` 中编辑的关节类型是棘轮关节，它是一种在一个方向平滑旋转，而在相反方向以离散角度旋转的枢轴关节。\n\
    \n以下是三种关节类型的描述：\n\n*   **枢轴关节** 也称为销钉关节、铰链关节或旋转关节。枢轴关节只有一个锚点，即两个物体将围绕其旋转的点。请注意，与现实世界（例如齿轮）不同，枢轴关节不必直接位于两个连接物体中的任何一个之上，以便使其围绕锚点旋转。\n\
    *   **距离关节** 这种关节使两个物体保持固定距离，同时允许它们自由地相互绕转。你也可以选择设置一个最小和最大距离，两个物体不得超出此范围；否则，如果施加较大的力，它们可以稍微拉伸或收缩距离。\n\
    *   **弹簧关节** 这是距离关节的一种变体，其核心行为就是拉伸和收缩。你可以调整弹簧的刚性（劲度系数）以及其来回弹跳的幅度（阻尼）。\n\n虽然只有三种关节类型听起来不多，但你可以用它们做很多事情——特别是考虑到你可以组合各种关节。许多物理引擎专用的关节类型都是基于这三种基本关节类型构建的。\n\
    \n相同的两个物体可以用不同类型的关节连接，多个物体也可以通过关节互连。这通常是为了创建具有“柔软”感觉的物体。但是，操作时必须小心，因为互连的关节会增加约束，最终可能相互冲突。在最坏的情况下，物体会表现出不稳定的行为，自我折叠或“爆炸”，甚至可能触发断言。\n\
    \n### 创建链条\n\n你可能已经迫不及待了，让我们直接开始吧。\n\n在 `SpriteBuilder` 的 `文件视图` 中，右键单击 `Prefabs`\
    \ 文件夹，选择 `新建文件`。创建一个类型为 `节点` 的文档，并将其命名为 `Chain.ccb`。现在切换到 `无图块编辑器视图`，确保选中 `无图块编辑器视图`\
    \ 下方的 `GameElements` 条目，并确认它包含 图 9-2 中所示的图片。\n"
- fmt: '![9781484202630_Fig09-02.jpg](images/00119.jpeg)


    [Figure 9-2](#part0019.html#_Fig2). The chain and spring images


    If the chain and spring images aren’t there, you’ll find them in the *GameElements*
    folder of the *Graphics* archive. Drag and drop the PNG images whose names start
    with `chainball` and `springboard` into the *GameElements* Sprite Sheet in SpriteBuilder
    before proceeding. Alternatively, use your own images. Just to give you a size
    reference, the `chainball` image is 416x416 pixels and the `springboard` is 254x234
    pixels, making these images much smaller than the gear and saw.


    ## Setting Up the Chain Sprites


    Drag and drop two `chainball` chain images onto the `Chain.ccb` stage, one of
    each kind. One looks like the lowercase letter l (`chainball_chain1.png`), and
    the other looks like an 8 (`chainball_chain2.png`). I will refer to them as simply
    the *letter I chain* and *letter 8 chain* images. They are the two rightmost images
    in the first row in [Figure 9-2](#part0019.html#Fig2). Also, drag and drop one
    `chainball_ball.png` (the leftmost image in the top row in [Figure 9-2](#part0019.html#Fig2))
    onto the stage.


    Make sure all sprites are children of the root node, because you don’t want them
    to be children of each other. Positions don’t matter yet—you’ll first edit the
    physics properties.


    Select the letter-8 chain, and on the *Item Physics* tab, select the *Enable Physics*
    check box. You should leave all physics properties at their default values. You
    may want to edit the physics shape to make the rectangle slightly smaller, but
    don’t add any vertices—there’s no need to make the chain’s collision shape more
    detailed than a rectangle. With this done, you can copy (`Cmd+C`) and paste (`Cmd+V`)
    the node twice so that you have a total of three chains that look like an “8”.


    Proceed to do the same for the letter “l” chain node. Select it, select *Enable
    Physics*, and definitely edit its collision shape to make it smaller. Zoom the
    view in and out with `Cmd+` and `Cmd–` to be able to edit the collision shape
    more precisely. After editing the collision shape, create two additional copies
    of the sprite. You should now have a total of six chain sprites, three of each
    kind.


    Now select the ball sprite and also select its *Enable Physics* check box. But
    in this case change its *Physics Shape* to *Circle*, and set the *Corner radius*
    to *42*. Since the collision shape is offset slightly from the ball’s center,
    click and drag its center handle to move the collision circle so that it is wholly
    contained within the ball and just about centered. It doesn’t need to be perfectly
    centered. You should also change the ball’s density to *0.5*; otherwise, the player
    will have a hard time pushing the ball out of the way.


    Finally, go to the *Node Library View* and drag and drop a plain node onto the
    stage, making it a child node of the root node like the others. This will become
    the “hook” node for the chain, marking the spot where the chain will be affixed
    to the world so that the chain won’t simply fall down.


    Move the *hook* node slightly upward by changing its position to `0x10` so that
    the topmost chain element will correctly revolve around the hook. On the *Item
    Physics* tab for the `CCNode`, check *Enable Physics* and change the body’s type
    to *Static*. Also, set the *Physics Shape* to *Circle*, and change the *Corner
    radius* to *8*. You should also rename this node to **hook** in the Timeline.


    Now arrange these images in the pattern shown in [Figure 9-3](#part0019.html#Fig3).


    ![9781484202630_Fig09-03.jpg](images/00120.jpeg)


    [Figure 9-3](#part0019.html#_Fig3). The chain with the ball properly arranged


    Select a `chainball_chain2` in the Timeline, and set its position to `0x0`. This
    will be the topmost chain element. Now select a `chainball_chain1` sprite in the
    Timeline, and set its position to `0x–24`. This should make it look like it hooks
    perfectly into the first chain. Repeat this process for the remaining four chains,
    alternating `chain1` and `chain2` so that they look like [Figure 9-3](#part0019.html#Fig3)
    and decreasing the Y position for every chain element by another –24 points. The
    chain element’s Y positions from top to bottom should be 0, –24, –48, –72, –96,
    and –120. The ball’s Y position should be –178.


    Since the `chain1` sprites should be drawn on top of all `chain2` sprites, you
    need to move the `chain1` sprites below the `chain2` sprites in the Timeline to
    ensure their draw order is correct. The ball is supposed to be drawn underneath
    the last `chain1` sprite, so it’s best to move the ball just between the `chain2`
    and `chain1` sprites. Also, just because it seems more natural, you may want to
    move the *hook* node to the very top.


    Note that the physics simulation is blissfully unaware of the node draw order.
    Despite the ball being sorted in between the two types of chain elements, it will
    still dangle perfectly fine at the end of the chain.


    **Caution** Physics-enabled bodies ignore their node’s parent-child relationship.
    This means a physics-enabled child node will not move if its parent moves. The
    physics engine knows no parent-child concept and will therefore treat all physics-enabled
    bodies as independent of one another. I strongly recommended that you design all
    complex physics objects without any parent-child relationships, except where the
    child items do not have physics enabled and should follow along with their physics-enabled
    parent node. You will see an example in the discussion of the *Spring* object,
    which you’ll add later in this chapter.


    Now open the `Level1.ccb`, and place an instance of `Chain.ccb` somewhere near
    the player’s starting position. If you publish and run this now, the chain will
    not behave at all like a chain. Instead, it will fall down and its individual
    pieces will come apart because you haven’t connected them with joints yet.


    ## Adding Pivot Joints to the Chain


    Let’s make this a chain that deserves its name. Open `Chain.ccb` and, from the
    *Node Library View*, drag and drop a *Physics Pivot Joint* onto the stage. This
    will add a pink circle object that, when selected, shows two additional, smaller
    circles underneath it. See [Figure 9-4](#part0019.html#Fig4).


    ![9781484202630_Fig09-04.jpg](images/00121.jpeg)


    [Figure 9-4](#part0019.html#_Fig4). Dragging a connection from the pivot joint
    on the right to the hook node on the left


    Notice that the new joint added itself as a `CCPhysicsJoint` in the Timeline under
    the *Joints* group. You can select a joint like other nodes by clicking on it
    either in the stage or in the Timeline. Likewise, you can drag and drop joints
    like nodes, too. Unfortunately, at least at the time of this writing, you can’t
    copy and paste joints.


    The two smaller circles underneath a joint, as shown in [Figure 9-4](#part0019.html#Fig4),
    indicate that the joint hasn’t been connected with other bodies.


    You can click and drag on one of the two small circles to draw out a line. If
    you have some experience with Interface Builder, you’ll find this behavior is
    similar to connecting IB outlets and actions. You can drag the line over a physics-enabled
    node onto the stage or on the timeline, and when you release the mouse button
    the connection is made if the highlighted drop target was a valid physics-enabled
    node. This makes a connection with the physics body and the joint.'
