- fmt: '# A for loop is used to enumerate over every child node in order to create
    the vertex positions for the current frame.


    The first node is the center node, and its position is simply taken as is. For
    all remaining child nodes, the position is extended outward from the center by
    `_enlargeDrawRadius`. The principle and algorithm are the same as in [Listing
    10-11](#part0020.html#list11).


    The resulting `vertexPos` is converted to a `GLKVector4` type by using the `GLKVector4Make`
    function and assigned as the position of the vertex at the index that corresponds
    to the child node being enumerated. The third coordinate is the z coordinate,
    with which you can influence the draw order of the vertex. In this case, it is
    zero, so it will use the same draw order as designed by SpriteBuilder. The last
    coordinate (w) has to be 1.0 for all vertices.


    Updating the render buffer with the new vertex is done by `CCRenderBufferSetVertex`,
    which essentially copies `_vertices[i]` to the render buffer at index `i`. Since
    the vertex position is expressed in coordinates relative to the sprite’s parent,
    `CCVertexApplyTransform` is used to apply the transform passed into the draw method.
    This has the effect of moving the vertex position to world (scene) coordinates.


    After the for loop, the last vertex is set to become a copy of the second vertex.
    This closes the last triangle 1-9-10, which is the same as 1-9-2 in [Figure 10-6](#part0020.html#Fig6).


    Finally, the `CCRenderBufferSetTriangle` creates all the triangles from the vertices
    already set before with `CCRenderBufferSetVertex`, in the order 0-1-2, 0-2-3,
    0-3-4 and so on. Keep in mind that index `i` is zero-based, so index 0 is the
    center vertex, unlike in [Figure 10-6](#part0020.html#Fig6) where the center node
    is labeled as *vertex #1*.


    You can have some fun now by running the game in its current state with the new
    renderer. Since the player’s bodies aren’t held together by joints, they are free
    to go, while the new renderer draws the texture between the individual bodies.
    This leads to some heavy distortion and some hilarious results, one can be seen
    in [Figure 10-8](#part0020.html#Fig8). But it does prove that drawing the texture
    works in general, and it also gives you an example of what things may look like
    if all the bodies together don’t form a coherent body. The texture can sometimes
    stretch far and thin, or it can become flipped as bodies travel in opposite directions.


    ![9781484202630_Fig10-08.jpg](images/00151.jpeg)


    [Figure 10-8](#part0020.html#_Fig8). *Zooming in on the newly textured player
    shows its lack of coherence*


    # Playing Me Softly. . .


    Let’s add some coherence to the player body to make it truly “soft.” It’s important
    to understand (and thus I repeat it) how each joint adds to the mix.


    A *distance joint* keeps two bodies a fixed distance apart, no more and no less.
    If neither the *Minimum distance* nor *Maximum distance* check box is enabled,
    you can remove the distance joint. If either or both the *Minimum distance* and
    *Maximum distance* check boxes are enabled and set to different values, you can
    add a *spring joint* to the same two bodies to make the connection springy.


    But without the proper stiffness of the spring joint or a very small difference
    between minimum and maximum distance, the spring joint will not contribute much
    to the mix. A spring joint alone should have its rest length enabled; otherwise,
    it will not be able to keep the bodies at the desired distance, much like a distance
    joint without the minimum and/or maximum distance enabled.


    ## Connecting the Circumference Bodies


    The first thing to try is to connect the circumference bodies. It’s best to start
    simple with a distance joint—you can always add more joints at a later time.


    Open `PlayerSoftBody.ccb` in SpriteBuilder. From the *Node Library View*, drag
    and drop a *Physics Distance Joint* onto the stage. Drag the left circle of the
    two small circles onto the node labeled *right* so that it becomes *Body A*, and
    then drag the right circle onto the node labeled *bottom-right* so that it becomes
    *Body B*.


    On the joint’s *Item Properties* tab, check the *Collide bodies* check box. If
    you don’t do this, when connecting two bodies that were previously able to collide,
    they would no longer collide, even if their Categories and Masks matched. Set
    all Anchor values to 0 so that the joint anchors exactly on the positions of the
    two nodes. Then enable both the *Minimum distance* and *Maximum distance* check
    boxes. This will automatically fill the distance fields with the current distance
    (22.95) between the joint’s bodies.


    **Tip**  Be sure to enable the *Minimum distance* and *Maximum distance* check
    boxes after you’ve edited the anchor points. Editing the anchor point will change
    the joint’s length (the distance between two bodies), so the *Minimum distance*
    and *Maximum distance* values may no longer represent the joint’s actual length
    and instead represent the length it formerly had. If you need to update the distance
    values, simply uncheck and check the *Enable* check box to update the value.


    For reference, the distance joint’s properties are shown in [Figure 10-9](#part0020.html#Fig9).


    ![9781484202630_Fig10-09.jpg](images/00152.jpeg)


    [Figure 10-9](#part0020.html#_Fig9). The first circumference distance joint’s
    properties


    Now continue to add seven more distance joints in the same way. Start by connecting
    the bottom-right node with the bottom node, and continue to connect the neighboring
    nodes in clockwise order. Once you have added eight distance joints that form
    a circle as shown in [Figure 10-10](#part0020.html#Fig10), be sure to verify that
    all of the joint’s properties are identical. Tiny variations in minimum/maximum
    distance are acceptable.


    ![9781484202630_Fig10-10.jpg](images/00153.jpeg)


    [Figure 10-10](#part0020.html#_Fig10). All circumference nodes have been connected
    with distance joints


    You should publish and run the game now. The player has already gained the necessary
    coherence, yet it behaves more like a Hacky Sack. If you ever wanted to create
    a Hacky Sack game, now you know how to do so. Otherwise, read on to learn how
    to make the player behave more like a squishy ball.


    ## Increasing the Player’s Bounciness


    There are two ways to proceed from here. It depends on what the result should
    feel like.


    If you wanted to make an actual ball, like a basketball or a soccer ball, it might
    suffice to add eight more distance joints. Each joint would connect the center
    body with one of the circumference bodies and would have both the minimum and
    maximum distance enabled and set to the same value. The *Collide bodies* property
    would be left unchecked because it would be unlikely the ball would contract enough
    for circumference bodies to come in contact with the center body. The result would
    be a bouncy ball that compresses while under pressure.


    However, you couldn’t control the ball’s bounciness when using only distance joints.
    The fact that the distance joints even allow being compressed despite the minimum
    and maximum distance settings means you would be relying on a side effect of the
    physics engine’s implementation of the distance joint. That’s never a good thing
    to do, as it can change in future updates.'
