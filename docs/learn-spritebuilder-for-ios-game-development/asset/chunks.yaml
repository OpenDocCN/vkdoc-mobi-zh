  raw: 'Of course, you should certainly avoid placing chains and ropes so that they
    start out overlapping in the first place.


    The other cause of exploding complex physics objects is when the object is partially
    or entirely stuck in a static body’s collision shape. In this instance, the most
    likely culprit will be the border elements, with which the chain and rope segments
    will currently collide. If you position a chain or rope in the level so that it
    partially overlaps a border sprite or even a trigger area, you will notice the
    chain or rope misbehaving.


    You need to edit the affected body’s collision categories and masks in order to
    fix this, and to allow the chain and ball to swing freely even when placed partially
    inside a border.


    Defining the Collision Categories


    Before I start to define collision categories, it really helps to take a moment
    to consider the goals for introducing collision categories. In this instance,
    the primary goal is to prevent the chains and ropes from colliding with triggers
    and borders. They should still be able to collide with other chains and ropes,
    and with the player.


    The rest depends—chains and ropes may or may not need to collide with gears and
    saws. I’ll assume you’ll want them to collide with chains and ropes. Since gears
    and saws are static bodies, they will not collide with other static bodies anyway—this
    includes borders and triggers. Thus, gears and saws need not be in a specific
    category for now.


    Of course, the player must still collide with everything, including chains, ropes,
    triggers, and borders. Obviously, the player needs to be included in editing the
    collision categories and masks.


    Since chains and ropes should behave identically in terms of collisions, it makes
    sense to use a single collision category “obstacle” for both. This obstacle collision
    category also should be used for future objects whose exact collision behavior
    is the same, meaning collisions with everything but borders and triggers.


    **Tip**  It is important when creating categories to consider only the desired
    behavior rather than the types of objects. Otherwise, you’ll quickly end up creating
    too many categories, which will make editing collision behaviors more time consuming,
    and you may even run out of categories. Remember that you can’t create more than
    32 unique categories. See the paragraph on collision categories and masks in [Chapter
    4](#part0013.html).


    This thought experiment helped to isolate the collision participants whose categories
    and masks need to be edited: player, trigger, border, and obstacle. You’ll later
    add the spring to the mixture as well.


    Coincidentally, you’ll be naming the corresponding collision categories as follows:
    player, trigger, border, and obstacle. The required collision categories and masks
    are outlined in [Table 9-1](#part0019.html#Tab1).


    [Table 9-1](#part0019.html#_Tab1). Collision categories and masks needed to prevent
    chains and ropes from colliding with triggers and borders while preserving existing
    collision behavior


    ![Table9-1.jpg](images/00132.jpeg)


    Editing Collision Categories and Masks


    Let’s start the editing process with the player. Open *Player.ccb*, and select
    the root node (*CCSprite*). On the *Item Physics* tab, enter player in the *Categories*
    field, and enter the following in the *Masks* field: **trigger, border, obstacle**.


    In order to create multiple independent category and mask labels, you have to
    separate them with a comma. If you separate the tags with any other character—space,
    for instance—you’ll get a single combined label. You don’t want a single “trigger
    border obstacle” label like you see on the left side of [Figure 9-15](#part0019.html#Fig15);
    you want three separate labels like on the right side of [Figure 9-15](#part0019.html#Fig15).


    ![9781484202630_Fig09-15.jpg](images/00133.jpeg)


    [Figure 9-15](#part0019.html#_Fig15). Labels you type into the Categories and
    Masks fields must be comma-separated to create individual labels (like those shown
    on the right side)


    The player is now set up to collide with triggers, borders, and obstacles.


    Now open the *TriggerOnce.ccb*, and repeat the process for any additional triggers
    you may have created, such as the *TriggerForever.ccb*. Select the *CCNodeColor*
    node to edit its *Item Physics* properties.


    Enter **trigger** in the *Categories* field and **player** in the *Masks* field.
    This ensures that the player can collide with triggers, since the player already
    has *trigger* in its collision mask and the trigger now has the player in its
    collision mask as well. Collisions occur only when both participants have each
    other’s category in their *Masks* field, or when the *Masks* field is empty for
    at least one participant.


    The borders are edited in the same way, except you’ll find multiple border CCB
    files under *Prefabs/Borders*, starting with *Border1.ccb*. You need to open each
    border CCB and in the its root node’s *Categories* field enter *border* and in
    its *Masks* field enter *player*. This ensures that all border sprites continue
    to be impenetrable collisions for the player.


    Finally, and this is where it gets tedious, you need to edit each physics-enabled
    node in both *Chain.ccb* and *Rope.ccb* to update their categories and masks.
    In each physics-enabled node’s *Categories* field, enter **obstacle**, and in
    its *Masks* field enter **player, obstacle** to make the chain or rope collide
    with the player as well as other chains and ropes. Again, note that the items
    must be comma-separated to create separate labels, as you saw on the right side
    of [Figure 9-15](#part0019.html#Fig15).


    **Tip**  You may want to enter the *Masks* text once, ensure that it is correct,
    and then select the labels either by clicking in the field and pressing Cmd+A
    or by using text selection. To use text selection, drag the mouse from one end
    of the text to the other. The labels are drawn in a dark blue color when selected.
    You can then press Cmd+C to copy and Cmd+V to paste the labels in another node’s
    *Masks* field. That way, you can reduce the risk of creating a typo.


    If you forget to edit one chain or rope element’s categories or masks, that element
    might still collide with the player. To ensure correctness, verify the categories
    and masks once you are done editing.


    Select the first node in the Timeline; this will most likely be the static *hook*
    node. Look at its *Item Physics* tab, and confirm that the *Categories* and *Masks*
    are correct. Now press the down arrow key to select the next node in the Timeline.
    By repeatedly pressing the down arrow key, you can quickly verify the collision
    and other settings of a series of nodes. It definitely beats clicking each node
    with the mouse.


    Good. Now that all the physics nodes in *Chain.ccb* and *Rope.ccb* have their
    categories and masks set, you can give this a try.


    Publish the project in SpriteBuilder, and then build and run the project from
    Xcode. The chains and ropes should no longer collide with borders and triggers.
    To verify this, place or move a chain or rope in *Level1.ccb* so that it overlaps
    a border sprite or trigger area. Chains and ropes should also still collide with
    each other. The player’s collisions should behave as they used to: being stopped
    by borders, being pushed by gears and killed by saws, and being able to trigger
    the level exit and other trigger areas.


    If something is not quite as it is supposed to be, double-check and triple-check
    the collision categories and masks of the nodes involved in the collision. Note
    that some fringe cases have not been considered, which are most easily prevented
    by proper level design. For instance, chains and ropes will collide with the exit
    node.


    Variations of Collision Behavior


