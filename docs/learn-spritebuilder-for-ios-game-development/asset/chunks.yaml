  trans: '好的，这是根据您的要求排版后的 Markdown 文档。


    好的，但动画是如何确定要对哪些值进行插值的呢？目前，当你播放这个动画时，什么也不会发生。


    这里的关键点在于，关键帧允许你在给定时间点编辑特定属性。目前，所有关键帧的 `Scale` 属性都设置为 `1,1`，所以即使动画在运行，它也不会改变 `Scale`
    属性的值。


    保持甜甜圈图像被选中，切换到 `Item Properties` 选项卡。然后在 0 到 6 秒之间来回移动时间轴光标，注意 `Scale` 属性在大部分时间都是灰色的。实际上，你只有在时间轴光标恰好位于某个属性的关键帧上时，才能更改该属性值。


    移动时间轴光标，使其正好位于中间的关键帧上。当 `Item Properties` 选项卡中的 `Scale` 属性值变为可编辑时，你就知道位置对了。使用时间轴缩放滑块拉远时间轴，可以更轻松地定位光标。一旦光标位于中间关键帧上并且
    `Scale` 属性可编辑，就将 X 轴和 Y 轴的缩放属性值都更改为 `1.3`。


    现在点击时间轴控制区域的“播放”按钮，你会看到甜甜圈放大又缩小。切换循环按钮，让动画循环播放。完成后，停止动画播放并再次拖拽时间轴光标。注意，当你在关键帧之间移动光标时，`Scale`
    属性值会发生变化。这向你展示了属性值在两个关键帧之间是如何插值的。


    循环动画……呜呼！


    为了让动画在游戏中（而不仅仅是在 SpriteBuilder 中）循环，你必须将时间轴链接到自身。


    时间轴链的功能是，告知动画在当前时间轴播放结束时，开始播放另一个时间轴动画。因此，将时间轴动画链接到自身会导致其循环。为此，点击底部的“时间轴链”下拉菜单（在
    图 5-1 中显示为 *No chained timeline*），然后从列表中选择 *Default Timeline*。


    你现在可以发布并运行项目，看看动画的实际效果。目前，甜甜圈是线性地进行缩放。


    # 使用缓动函数让动画更平滑


    你可以使用缓动模式来平滑动画。缓动会影响两个关键帧之间的值随时间变化的方式。不同的缓动类型可以应用于每个关键帧段。


    要编辑缓动模式，请在关键帧段上右键单击。通常，两个关键帧之间会有一条粉红色的线。这会弹出一个上下文菜单，其中包含所有可用的缓动模式，如 图 5-4 所示。


    ![9781484202630_Fig05-04.jpg](img/00079.jpeg)


    图 5-4。右键单击关键帧段以弹出缓动上下文菜单


    通过右键单击两个关键帧段中的每一个，从列表中选择一种缓动模式。可以随意尝试不同的缓动模式组合。


    请注意，选择缓动模式后，粉红色线条会略有变化。默认的“线性”缓动模式下，线条是纯粉色的。如果你选择“瞬间”缓动模式，粉红色线条会完全消失。从技术上讲，`Instant`
    不是一种缓动模式；它只是将动画值设置为时间轴光标到达关键帧那一刻该关键帧的值。对于所有其他缓动模式，粉红色线条的一端或两端会变得略微有点阴影，具体取决于你选择了
    `In`、`Out` 或 `In/Out` 缓动模式。


    `In`、`Out` 和 `In/Out` 模式确定了缓动应用于关键帧段的位置：


    *   **In：** 应用于关键帧段的开始

    *   **Out：** 应用于关键帧段的结束

    *   **In/Out：** 应用于关键帧段的开始和结束


    这些术语可能会让人有点困惑。以 图 5-5 中看到的 Elastic `In` 缓动模式为例：第一列，第二行。


    你可能会认为缓动最接近段的末端，因为那里的振幅最大。或许人们会自然地认为这是一种 `Out` 模式，但实际上，缓动是从起始处开始的，并以越来越大的振幅逐渐逼近目标值。


    如果有疑问，可以参考 图 5-5 中的图表，不过，试验起来真的很简单，因为即使时间轴动画正在播放，你也可以更改缓动模式。


    ![9781484202630_Fig05-05.jpg](img/00080.jpeg)


    图 5-5。缓动模式图示


    图 5-5 中的图表说明了动画属性的值如何随时间变化。以右下角的 `Back In/Out` 缓动图为例，假设每个水平边代表一个关键帧。如果你使用 `Back
    In/Out` 缓动模式在值 `100` 到 `200` 之间对旋转属性进行动画，图表告诉你，旋转值会先略微下降到 `100` 以下，然后增加到略高于 `200`
    的值，最后收束于 `200`。两个关键帧之间的持续时间决定了该动画在多少帧上进行插值。动画越长，插值越平滑。


    **警告** 如果两个关键帧之间的时间非常短——例如 `10` 帧或更少——你几乎感觉不到缓动效果。假设旋转动画有三帧要插值，即使是 `Back In/Out`
    模式，第一帧会将旋转属性设为 `100`，第二帧则会设为 `150`，因为第三帧的旋转属性必须达到另一个关键帧的值 `200`。只有当两个关键帧之间至少有半秒的时间，并且游戏以
    `30 fps` 或更高的帧率运行时，缓动模式才有效，并且才会呈现出 图 5-5 中的曲线。对于短于半秒的序列，你可能希望避免使用除 `Linear` 或
    `Instant` 之外的缓动模式。


    各种缓动模式的差异最好通过实际操作来感受，所以你一定要多试验，尤其是在几个关键帧段上组合使用不同的缓动模式和不同的持续时间。作为练习，尝试添加另一个序列，使用三个或更多关键帧对甜甜圈的旋转属性（R
    键）进行动画，使甜甜圈左右轻微摇摆并回到原位。


    如果添加关键帧失败（可能伴有错误提示音），则表明可能没有选中节点。


    如果需要删除关键帧，请选中它的手柄，然后按 `Backspace` 键，或者右键单击关键帧手柄，然后从上下文菜单中选择 `Delete`。


    单击并拖拽可以移动关键帧，以延长或缩短与前后关键帧之间的持续时间。


    **提示** 为了使动画平滑循环，你需要在时间轴的两端各设置一个关键帧，并且这两个关键帧的动画属性值必须完全相同。这确保了动画在通过最后一个关键帧并继续与第一个关键帧衔接时能够平滑过渡。


    如果动画在通过某个关键帧时表现异常，请检查该位置是否有两个或更多关键帧。尝试移动感觉“跳跃”的那个关键帧，看看它下面是否还藏着另一个关键帧。


    # 物理节点的关键帧动画


    既然你已经了解了关键帧动画的基础知识以及如何编辑它们，那么就可以准备添加一些动态的游戏元素了。最令人惊叹的部分是，你将要对启用了物理属性的节点进行动画，并且它们在游戏中，尽管受到动作驱动，但仍然会表现得很好。


    但是，对启用了物理属性的节点进行关键帧动画，只有在该节点的物理体设置为 `Static` 时才可行。


    # 添加齿轮和锯片'
- fmt: "在 `SpriteBuilder` 的文件视图中，选择 `Sprite Sheets` 文件夹。右键点击它，创建一个新文件夹，并将其命名为 `GameElements`。右键点击\
    \ `GameElements` 文件夹，选择“制作智能精灵表”。你也可以选择将精灵表的发布格式更改为推荐的 `PVR RGBA8888` 格式并勾选 `Compress`。\n\
    \n在本书的可下载存档中，您会找到一个同名的 `GameElements` 文件夹，其中包含 `circularsaw1.png` 和 `gear1.png`\
    \ 等文件。将 `GameElements` 文件夹中的所有文件从 `Finder` 拖放至 `SpriteBuilder` 中的 `GameElements`\
    \ 精灵表中。\n\n现在，重复以下步骤两次，一次针对齿轮游戏元素，另一次针对圆锯游戏元素，以创建两个新的 `ccb` 文件，分别命名为 `Gear1.ccb`\
    \ 和 `Saw1.ccb`。\n\n1.  右键点击`Prefabs`文件夹，选择新建文件。\n2.  分别将文档命名为 `Gear1.ccb` 和 `Saw1.ccb`，并将其类型更改为\
    \ `Node`。我将在本列表之后解释为什么选择 `Node` 而不是精灵。然后点击创建。\n3.  切换到无图块编辑器视图。打开 `Gear1.ccb`，然后将\
    \ `gear1` 拖放到舞台上。打开 `Saw1.ccb`，然后将 `saw1` 拖放到舞台上。或者，您可以将 `gear1.png` 和 `circularsaw1.png`\
    \ 从 `GameElements` 精灵表拖放到各自的舞台上。此时，`Gear1.ccb` 中应有一个齿轮精灵，`Saw1.ccb` 中应有一个锯子精灵。\n\
    4.  在项目属性标签页中，将齿轮/锯子精灵的位置设置为 `0, 0`。将锚点保持在 `0.5, 0.5`。这确保了当齿轮/锯子精灵放置在关卡中时，其中心位于枢轴点上。\n\
    5.  切换到项目物理标签页。勾选启用物理复选框。将刚体类型更改为 `Static`。保持类别和蒙版为空。\n6.  在碰撞类型字段中，编辑齿轮对象时输入\
    \ `gear`，编辑圆锯对象时输入 `saw`。\n7.  仅针对齿轮精灵：将物理形状下拉菜单保持为 `Polygon`。按照[第 4 章](#part0013.html)中的说明编辑多边形形状，使多边形轮廓大致匹配齿轮及其齿牙，如图\
    \ [5-6](#part0014.html#Fig6) 所示。\n\n    ![9781484202630_Fig05-06.jpg](images/00081.jpeg)\n\
    \n    [图 5-6](#part0014.html#_Fig6) 齿轮多边形形状和属性\n\n8.  仅针对锯子精灵：将物理形状下拉菜单更改为 `Circle`。将建议的半径从\
    \ `208` 更改为 `190`，大约缩小 `10%`。\n\n还记得我之前提到过，根节点通常无法被动画化，只有 `CCSprite` 根节点可以动画化少数视觉属性：精灵帧、不透明度和颜色吗？\n\
    \n这就是为什么我没有使用精灵 `CCB` 文档，而是选择使用 `Node` `CCB` 文档并将精灵作为子节点的原因。这样，您可以在 `CCB` 文件中完全动画化精灵，因为精灵不是根节点。另一种方案是单独编辑和动画化关卡中的每个齿轮和锯子实例，但这根本不可行。\n\
    \n## 动画化齿轮和锯子\n\n您可以继续动画化齿轮和锯子对象。如前所述，我将以 `Gear1.ccb` 为例进行说明，您应将相同步骤也应用于 `Saw1.ccb`。当然不强制，但我建议您做两次以养成习惯。\n\
    \n请随意创建 `Gear1.ccb` 和 `Saw1.ccb` 的其他副本，它们的内容基本相同，但旋转动画不同。您可以改变速度，或者让对象只旋转 `180`\
    \ 度然后改变方向。如果您这样做，应该为额外的 `CCB` 文件选择能描述其行为的合理名称。例如，`Gear1_180AndBack.ccb` 可能是我刚才描述的行为的一个好名字。\n\
    \n**提示** 请注意，目前没有“复制”命令。但未来如果有，最可能找到该命令的地方是在 `CCB` 的右键上下文菜单中。\n\n幸运的是，您仍可以使用 `Finder`\
    \ 复制 `CCB` 文件。在 `Finder` 中，您可以在项目根目录下的 `SpriteBuilder Resources` 文件夹中找到 `SpriteBuilder`\
    \ 文件视图中列出的所有文件。例如，本书项目的 `Prefabs` 文件存储在 `LearnSpriteBuilder.spritebuilder/SpriteBuilder\
    \ Resources/Prefabs` 文件夹中。您可以简单地复制并粘贴一个 `.ccb` 文件，在 `Finder` 中创建副本，然后在 `Finder`\
    \ 或 `SpriteBuilder` 中重命名它。复制的 `CCB` 文件会立即出现在 `SpriteBuilder` 的文件视图中。如果您没有复制相应的\
    \ `.ppng` 预览图像，`SpriteBuilder` 将在您下次保存或发布项目时生成它。\n\n这种变通方法甚至允许您在项目之间复制 `CCB` 文件，尽管其中的子文件节点和精灵帧引用很可能在此过程中丢失，需要重新设置。\n\
    \n不用担心创建太多副本——发布的 `CCBi` 文件非常小（最多几 `KB`），并且如果所有精灵使用相同的图像，内存使用也几乎不会增加。一个精灵实例（不包括纹理内存）不到\
    \ `1` `KB`。\n\n对于以下描述，请在第二轮操作中打开 `Gear1.ccb` 和 `Saw1.ccb`。\n\n根据您是在 `Gear1.ccb`\
    \ 还是 `Saw1.ccb` 中，选择齿轮/锯子精灵节点，并将默认时间线的持续时间更改为 `4` 秒，如图 [5-2](#part0014.html#Fig2)\
    \ 所示。这 `4` 秒将是完成一整圈旋转所需的时间。如果您愿意，可以稍微改变一下持续时间。\n\n在选中齿轮/锯子精灵，且时间线光标位于最左侧的 `00:00:00`\
    \ 位置时，按 `R` 键创建一个关键帧。然后将时间线光标移动到时间线的最右侧，再次按 `R` 键创建第二个关键帧。在时间线光标仍位于第二个关键帧时，在项目属性标签页中将旋转属性设置为\
    \ `360`。这将使对象顺时针旋转 `360` 度。要测试这一点，请按时间线控件中的播放按钮。请参见图 [5-1](#part0014.html#Fig1)。\n\
    \n最后，需要将时间线链从无链接时间线更改为默认时间线，以便旋转动画无限循环。请务必左键点击时间线链下拉菜单，因为右键点击无效。\n\n根据您的需要，重复上述步骤任意多次，以创建您想要的尽可能多的旋转对象变体。\n\
    \n**提示** 要创建逆时针旋转动画，只需将第二个关键帧的旋转属性设置为 `–360`。或者，将第一个关键帧的旋转设置为 `360`，第二个关键帧设置为\
    \ `0`。两种方法都可以。您可能希望创建一个不同名称的 `CCB` 文件副本，以便在关卡中同时使用顺时针和逆时针旋转的对象。\n\n理论上，您还可以将关卡中选中的齿轮或锯子对象的\
    \ `x` 缩放从 `1` 更改为 `–1`，从而有效地翻转它并反转旋转动画。但在撰写本文时，这并不能正确地旋转物理碰撞形状。一般来说，请将 `–1` 缩放牢记在心，这不仅是一种沿一个或两个轴翻转图像的简单方法，也是一种反转旋转和位置动画方向的方法。\n\
    \n## 向关卡添加齿轮和锯子\n\n现在，您应该在 `Level1.ccb` 中放置一个或多个齿轮和锯子对象。但首先，将一个 `Node` 对象从节点库视图拖放到\
    \ `CCPhysicsNode` 上。将新节点重命名为 `gears` 和 `saws` 或类似名称。这允许您一次性更改齿轮和锯子节点的绘制顺序。您还可以在时间线中隐藏齿轮和锯子，这随着您向关卡添加越来越多的节点而变得越来越重要。"
  raw: 'In SpriteBuilder’s File View, select the Sprite Sheets folder. Right-click
    it to create a New Folder, and name it **GameElements**. Right-click the GameElements
    folder, and select Make Smart Sprite Sheet. Optionally, you may want to change
    the Sprite Sheet’s publish format to the recommended PVR RGBA8888 format with
    Compress selected.


    In the book’s downloadable archive, you’ll find an identically named GameElements
    folder, with circularsaw1.png and gear1.png files in it, among others. Drag and
    drop all of the files in the GameElements folder from Finder onto the GameElements
    Sprite Sheet in SpriteBuilder.


    Now repeat the following steps twice, once for the gear and the other time for
    the circular saw game element to create two new ccb files, named Gear1.ccb and
    Saw1.ccb.


    1.  Right-click the Prefabs folder, and select New File.

    2.  Name the document Gear1.ccb and Saw1.ccb, respectively, and change its type
    to Node. I’ll explain why it’s a Node and not a sprite after this list. Then click
    Create.

    3.  Switch to Tileless Editor View. Open Gear1.ccb, and then drag and drop the
    gear1 onto the stage. Open Saw1.ccb, and drag and drop the saw1 onto the stage.
    Alternatively, you can drag the gear1.png and circularsaw1.png from the GameElements
    Sprite Sheet onto the respective stages. There should now be a gear sprite in
    Gear1.ccb and a saw sprite in Saw1.ccb.

    4.  On the Item Properties tab, set the gear/saw sprite’s position to 0, 0\. Leave
    the anchor point at 0.5, 0.5. This ensures the gear/saw sprite is centered on
    its pivot point when placed in the level.

    5.  Switch to the Item Physics tab. Select the *Enable physics* check box. Change
    the body type to Static. Leave Categories and Masks empty.

    6.  In the *Collision type* field, enter **gear** when editing the gear object,
    and **saw** when editing the circular saw object.

    7.  Only for the gear sprite: leave the *Physics shape* drop-down menu set to
    Polygon. Edit the Polygon shape as explained in [Chapter 4](#part0013.html) so
    that the polygon outline coarsely matches the gear and its gear teeth as shown
    in [Figure 5-6](#part0014.html#Fig6).


    ![9781484202630_Fig05-06.jpg](images/00081.jpeg)


    [Figure 5-6](#part0014.html#_Fig6). Gear polygon shape and properties


    8.  Only for the saw sprite: change the *Physics shape* drop-down menu to Circle.
    Change the suggested radius from 208 to 190, about 10% smaller.


    Remember how I mentioned earlier that root nodes typically can’t be animated,
    and only CCSprite root nodes can animate a few visual properties: sprite frames,
    opacity, and color?


    That’s why I didn’t use a Sprite CCB document but instead chose to use a Node
    CCB document with a sprite as child node. That way, you can fully animate the
    sprite within the CCB file, because the sprite is not the root node. The alternative
    of editing and animating each gear and saw instance in the level separately simply
    wouldn’t be feasible.


    Animating the Gear and Saw


    You can move on to animate the gear and saw objects. As before, I’ll explain it
    once for the Gear1.ccb and you should apply the same steps to the Saw1.ccb as
    well. You don’t necessarily have to, but I recommend doing it twice to get in
    the habit.


    Feel free to create additional duplicates of Gear1.ccb and Saw1.ccb with essentially
    the same content but different rotation animations. You could alter the speed,
    or make the object rotate only by 180 degrees and then change direction. If you
    do that, you should pick sensible names for the additional CCB files that describe
    what the object does. For instance, Gear1_180AndBack.ccb might be a good name
    for the behavior I just described.


    **Tip**  Notice that there’s currently no Duplicate command. But when there will
    be, the most likely place to find that command will be in a CCB’s right-click
    context menu.


    Fortunately, you can still duplicate CCB files using Finder. In Finder, you will
    find all files listed in SpriteBuilder’s File View in the SpriteBuilder Resources
    folder under the project’s root folder. For instance, the book project’s Prefabs
    files are stored in the LearnSpriteBuilder.spritebuilder/SpriteBuilder Resources/Prefabs
    folder. You can simply copy and paste a .ccb file to create a duplicate in Finder,
    and then rename it in Finder or SpriteBuilder. Copied CCB files will appear in
    SpriteBuilder’s File View momentarily. If you did not duplicate the corresponding
    .ppng preview image, SpriteBuilder will generate it the next time you save or
    publish the project.


    This workaround even allows you to copy CCB files between projects, though Sub
    File nodes and Sprite frame references contained within it are likely to be lost
    in the process and will need to be set again.


    Don’t worry about creating too many duplicates—the published CCBi files are tiny
    (a few kilobytes at most), and if the sprites all use the same image there’s hardly
    any increase in memory usage either. A sprite instance, excluding the texture
    memory, is less than a kilobyte.


    For the following descriptions, open the Gear1.ccb and the Saw1.ccb in your second
    pass.


    Select the gear/saw sprite node, depending on whether you are in Gear1.ccb or
    Saw1.ccb, and change the duration of the Default Timeline to 4 seconds, like in
    [Figure 5-2](#part0014.html#Fig2). Those 4 seconds will be how long it takes to
    complete a full revolution. Feel free to vary the duration a little if you like.


    With the gear/saw sprite selected and the Timeline Cursor moved to the 00:00:00
    location on the far left, press the R key to create a keyframe. Then move the
    Timeline Cursor to the far right of the Timeline and press R again to create a
    second keyframe. With the Timeline Cursor still on the second keyframe, set the
    Rotation property to 360 on the Item Properties tab. This will make the object
    rotate 360 degrees clockwise. To test this out, press the Play button in the Timeline
    Controls. See [Figure 5-1](#part0014.html#Fig1).


    Finally, the Timeline Chain needs to be changed from *No chained timeline* to
    *Default Timeline* in order for the rotation animation to loop indefinitely. Be
    sure to left-click the Timeline Chain drop-down menu because right-clicking won’t
    work.


    Repeat the preceding steps as many times as you like to create as many variations
    of rotating objects as you want.


    **Tip**  To create a counter-clockwise rotation animation, simply set the Rotation
    property to –360 for the second keyframe. Alternatively, set Rotation in the first
    keyframe to 360 and in the second keyframe set it to 0\. Either way works fine.
    You may want to create a duplicate CCB file with a different name so that you
    can use both clockwise and counter-clockwise rotating objects in the level.


    Theoretically, you could also change the x scale of selected gear or saw objects
    in the level from 1 to –1, effectively flipping it and reversing the rotation
    animation. But at the time of this writing that did not correctly rotate the physics
    collision shape. Generally speaking, keep a scale of –1 in the back of your head
    as an easy way to not only flip images along one or both axes, but also as a way
    to reverse the direction of the rotation and position animations.


    Adding Gears and Saws to the Level


    You should now place one or more gear and saw objects in the Level1.ccb. But first,
    drag and drop a Node object from the Node Library View onto the CCPhysicsNode.
    Rename the new node to **gears** and **saws** or something similar. This allows
    you to change the draw order of the gear and saw nodes all at once. You will also
    be able to hide the gears and saws in the Timeline, which becomes increasingly
    important the more nodes you add to the level.'
