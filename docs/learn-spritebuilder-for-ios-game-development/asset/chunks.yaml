- fmt: "在`SpriteBuilder`中，打开`UserInterface`文件夹中的`MainMenuButtons.ccb`。目标是使音效播放与标志和按钮的出现同步。\n\
    \n你可以像添加`Callbacks`关键帧一样添加`Sound effects`关键帧：按住`Option`键，然后左键单击添加关键帧。总共应添加三个`Sound\
    \ effects`关键帧。将第一个放在时间线开始附近，另外两个放在`Play`和`Settings`按钮开始出现的位置附近。最终结果请参考[图11-4](#part0022.html#Fig4)。\n\
    \n要让关键帧实际播放音效，需要双击每个关键帧以编辑其属性。弹出菜单如[图11-3](#part0022.html#Fig3)所示。从弹出菜单中选择一个音频文件。最左侧的关键帧应使用`Audio/splat2.wav`文件，而另外两个关键帧应使用`Audio/splat3.wav`。\n\
    \n![9781484202630_Fig11-03.jpg](images/00164.jpeg)\n\n[图11-3](#part0022.html#_Fig3).\
    \ 为音效关键帧分配音频文件\n\n可以随意调整`Pitch`、`Pan`和`Gain`设置。`Pitch`值为`1.0`表示以原始音高（频率）播放音频文件。选择`0.01`到`1.0`之间的值可降低声音音高，同时也会增加其持续时间。使用高于`1.0`的值可提高音高并缩短持续时间。`Pitch`值为`2.0`时，将以两倍原始速度播放效果。\n\
    \n`Pan`的范围是`-1.0`到`1.0`，其中`-1.0`表示音效完全在左扬声器播放，`1.0`表示仅在右扬声器播放。默认平移值`0.0`表示左右扬声器音量相同。平移对立体声文件无效；只有单声道音频文件才能进行平移。\n\
    \n`Gain`设置用于增加声音音量。不过它和音量并不完全相同。如果`Gain`增加过多，会导致声音失真。但通常它可用于平衡一些声音，这些声音的音量可能比其他声音低或高10%到20%。值为`1.0`表示音量不变。较低的值降低音量，较高的值增加音量。\n\
    \n将关键帧移动到所需位置并分配音频文件后，结果将类似于[图11-4](#part0022.html#Fig4)。请注意，音频文件波形可能会超出时间线末尾，表示音频播放时间比时间线长。这是否会成为问题取决于具体情况。在这里这无关紧要。\n\
    \n![9781484202630_Fig11-04.jpg](images/00165.jpeg)\n\n[图11-4](#part0022.html#_Fig4).\
    \ 三个已分配音频文件的音效关键帧\n\n如果发布并运行游戏，菜单标志和按钮应与音效一起出现。如果退出游戏并返回主菜单，此过程将重复。\n\n虽然这很简洁，但音效时间线不适合播放需要与游戏事件（如碰撞或加速）同步的声音。它也无法用于播放循环声音，这实际上排除了通过时间线播放背景音乐的可能——即使不考虑流式音频应通过`ObjectAL`的“长音频”背景音频播放方法（`AVAudioPlayer`）播放这一事实。\n\
    \n编程音频播放\n\n流式音频和游戏事件的音频需要编程实现，但通过`OALSimpleAudio`类提供的简化接口，使用`ObjectAL`相当容易。你可以在这里找到类参考：`http://kstenerud.github.io/ObjectAL-for-iPhone/documentation/interface_o_a_l_simple_audio.html`。\n\
    \n播放长音频/流式音频\n\n通常有两种播放流式音频的方式。`ObjectAL`将流式音频称为“背景”音乐，通常缩写为“bg”。一种方式是预加载一段流式音频然后播放。或者，也可以不预加载直接播放音乐。\n\
    \n只有在需要通过`seekTime`参数在非常具体的时间点（以秒为单位）启动播放时，才需要预加载背景音轨。或者当需要确保背景音轨无任何延迟地开始播放时——例如，需要唇形同步的语音音频。[清单11-1](#part0022.html#list1)展示了一个播放预加载背景音轨的示例。\n\
    \n[***清单11-1***](#part0022.html#_list1). 预加载背景音轨并在稍后播放\n\n```\nOALSimpleAudio*\
    \ audio = [OALSimpleAudio sharedInstance];\n[audio preloadBg:@\"Audio/menu-music.m4a\"\
    \ seekTime:0.0];\n\n// 稍后可以播放最近预加载的音轨：\n[audio playBgWithLoop:YES];\n```\n\n在`OALSimpleAudio`接口中，没有委托机制或通知来告知预加载何时完成，也没有必要存在这样的机制。预加载不是多线程的。在上面的示例中，除非`preloadBg`已完成其工作并预加载了文件，否则执行不会继续到`playBgWithLoop`方法。\n\
    \n**注意**  与其他资源文件一样，音频文件位于`SpriteBuilder`项目的子文件夹中。因此，需要在路径中指定`Audio`文件夹。如果音频文件的输出类型设置为`MP4`，其文件扩展名将是`.m4a`（纯音频MPEG-4），而不是`.mp4`（常规音频/视频MPEG-4）。\n\
    \n除此之外，如果你计划移植到`Android`，不建议像这些示例中那样指定发布后的文件扩展名（`.m4a`和`.caf`）。`Android`的所有音频文件将以`OGG`格式发布，扩展名为`.ogg`。在你阅读本文时，`Cocos2D`和`ObjectAL`可能已经允许你完全省略音频文件扩展名，或者你可以使用音频文件的原始扩展名（`.wav`）。\n\
    \n在大多数情况下，直接播放背景音乐会更简单且足够快。在`Xcode`中打开`MainScene.m`文件，找到`didLoadFromCCB`方法。将[清单11-2](#part0022.html#list2)中高亮显示的行添加到该方法末尾。\n\
    \n[***清单11-2***](#part0022.html#_list2). 在`MainScene.m`中添加音乐播放\n\n```\n-(void)\
    \ didLoadFromCCB\n{\n    // 为简洁起见，省略了现有代码 ...\n\n    OALSimpleAudio* audio = [OALSimpleAudio\
    \ sharedInstance];\n    [audio playBg:@\"Audio/menu-music.m4a\" loop:YES];\n}\n\
    ```\n\n`playBg`方法在播放音频文件之前会在内部预加载它。启用循环后，音轨将无限循环播放。以这种方式播放音频的缺点是无法指定`seekTime`。\n\
    \n接下来，打开`SceneManager.m`并找到其`presentGameScene`方法，以完善音乐播放。为了播放游戏音乐，请将[清单11-3](#part0022.html#list3)中高亮显示的代码添加到该方法末尾。\n\
    \n[***清单11-3***](#part0022.html#_list3). 在呈现游戏场景时播放游戏音乐\n\n```\n-(void) presentGameScene\n\
    {\n    // 为简洁起见，省略了现有代码 ...\n\n    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];\n\
    \    [audio playBg:@\"Audio/game-music.m4a\" loop:YES];\n}\n```\n\n现在运行游戏，你应该会在菜单中听到音乐，并且在玩游戏时听到不同的音乐。\n\
    \n你可能希望改进此行为——例如，在从一个关卡前进到另一个关卡或重新开始关卡时，让游戏音乐音轨重新开始。解决此问题的一种方法是在`SceneManager`的`presentGameScene`方法中增加一个类型为`BOOL`的额外参数——例如，`presentGameSceneWithMusic:(BOOL)playMusic`。仅当从主菜单呈现游戏场景时，才将`YES`传递给`playMusic`；否则，向该参数传递`NO`。在方法内部，添加一个条件，仅在`playMusic`为`YES`时播放音乐。\n\
    \n播放音效"
  raw: 'In SpriteBuilder, open *MainMenuButtons.ccb* in the *UserInterface* folder.
    The goal is to synchronize the sound-effects playback with the appearance of the
    logo and buttons.


    You can add *Sound effects* keyframes just like *Callbacks* keyframes by holding
    down the Option key, and then left-clicking to add a keyframe. You should add
    a total of three *Sound effects* keyframes. Place the first one near the start
    of the Timeline, and place the other two close to when the *Play* and *Settings*
    buttons start to appear. Refer to [Figure 11-4](#part0022.html#Fig4) for the final
    result.


    To actually have the keyframes play back a sound effect, you have to double-click
    each one to edit the keyframe’s properties. The popover menu is shown in [Figure
    11-3](#part0022.html#Fig3). From the popover menu, select an audio file. The leftmost
    keyframe should use the *Audio/splat2.wav* file, while the other two keyframes
    should use *Audio/splat3.wav*.


    ![9781484202630_Fig11-03.jpg](images/00164.jpeg)


    [Figure 11-3](#part0022.html#_Fig3). Assigning an audio file to a Sound effects
    keyframe


    Feel free to play with the *Pitch*, *Pan*, and *Gain* settings. A pitch of 1.0
    means the audio file will be played back at its original pitch (frequency). Choose
    a value between 0.01 and 1.0 to lower the sound’s pitch, which will also increase
    its duration. Use a value above 1.0 to increase the pitch and shorten its duration.
    A pitch of 2.0 will play back the effect at twice its original speed.


    Pan is in the range of –1.0 and 1.0, where –1.0 plays the sound effect entirely
    on the left speaker and 1.0 plays it only on the right speaker. The default panning
    value of 0.0 plays the sound equally on both speakers. Panning has no effect on
    stereo files; only mono audio files can be panned.


    The *Gain* setting increases the sound’s volume. It’s not quite the same as volume
    though. If you increase *Gain* by too much, it will add distortion to the sound.
    But, generally, it can be used to level out some sounds that would otherwise be
    10 to 20% quieter or louder than other sounds. A value of 1.0 means the volume
    is unchanged. Lower values reduce the volume, while higher values increase it.


    Once you’ve moved the keyframes to the desired locations and assigned the audio
    files, the result will resemble [Figure 11-4](#part0022.html#Fig4). Notice that
    the audio file waveforms may run past the end of the Timeline, indicating that
    the audio plays longer than the Timeline. Whether this is or isn’t a problem depends
    on the situation. Here it doesn’t matter.


    ![9781484202630_Fig11-04.jpg](images/00165.jpeg)


    [Figure 11-4](#part0022.html#_Fig4). Three Sound effects keyframes with assigned
    audio files


    If you publish and run the game, the menu logo and buttons should appear together
    with the sound effects. This will be repeated if you exit the game and return
    to the main menu.


    While this is neat and dandy, the sound-effects Timeline is not suitable for playing
    sounds that need to be synchronized with game events, such as collisions or acceleration.
    It also can’t be used to play back looping sounds, which effectively rules out
    playing background music through the Timeline—even when you put aside the fact
    that streaming audio should be played back through ObjectAL’s “long audio” background
    audio-playback method (AVAudioPlayer).


    Programming Audio Playback


    Streaming audio and audio for game events need to be programmed, but that’s rather
    easy with ObjectAL’s simplified interface provided by the OALSimpleAudio class.
    You’ll find the class reference here:  [http://kstenerud.github.io/ObjectAL-for-iPhone/documentation/interface_o_a_l_simple_audio.html](http://kstenerud.github.io/ObjectAL-for-iPhone/documentation/interface_o_a_l_simple_audio.html).


    Playing Long/Streaming Audio


    You generally have two ways of playing streaming audio. ObjectAL refers to streaming
    audio as “background” music, usually abbreviated as “bg.” One way to play it is
    to preload a piece of streaming audio and then play it. Or you can play a piece
    of music without preloading it.


    Preloading background tracks is only required if you need to start the playback
    at a very specific point in time (in seconds) by using by the seekTime parameter.
    Or when you need to be sure that the background track starts playing with no delay
    whatsoever—for example, if it’s a speech audio that needs to be lip-synched. [Listing
    11-1](#part0022.html#list1) shows an example of playing a preloaded background
    track.


    [***Listing 11-1***](#part0022.html#_list1). Preloading a background track and
    playing it at a later time


    ```

    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];

    [audio preloadBg:@"Audio/menu-music.m4a" seekTime:0.0];


    // later you can play back the most recently preloaded track:

    [audio playBgWithLoop:YES];

    ```


    In the OALSimpleAudio interface, there is no delegate mechanism or notification
    that tells you when preloading has finished, nor is there a need to have one.
    Preloading is not multithreaded. In the preceding example, execution will not
    continue to the playBgWithLoop method unless preloadBg has done its job and already
    preloaded the file.


    **Caution**  As with other resource files, the audio file is in a subfolder in
    the SpriteBuilder project. Thus, the Audio folder needs to be specified in the
    path. And if the audio file’s output type is set to MP4, its file extension will
    be .m4a (audio-only MPEG-4) and not .mp4 (regular audio/video MPEG-4).


    In addition to that, specifying the published file extensions (.m4a and .caf)
    as in these examples is not recommended if you plan to port to Android. All Audio
    files for Android will be published in the OGG format with the .ogg extension.
    By the time you read this, Cocos2D respectively ObjectAL will allow you to omit
    the audio file extension altogether or you can use the audio file’s original extension
    (.wav).


    In most cases, it’s simpler and fast enough to just play the background music
    directly. Open the *MainScene.m* file in Xcode, and locate the didLoadFromCCB
    method. Add the lines highlighted in [Listing 11-2](#part0022.html#list2) to the
    end of the method.


    [***Listing 11-2***](#part0022.html#_list2). Adding music playback to MainScene.m


    ```

    -(void) didLoadFromCCB

    {

        // existing code omitted for brevity ...


    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];

        [audio playBg:@"Audio/menu-music.m4a" loop:YES];

    }

    ```


    The playBg method internally preloads the audio file before playing it. With looping
    enabled, the audio track will loop indefinitely. The drawback of playing audio
    this way is that you can’t specify a seekTime.


    Let’s complete the music playback by opening *SceneManager.m* and locating its
    presentGameScene method. In order to play the game music, add the code highlighted
    in [Listing 11-3](#part0022.html#list3) to the end of the method.


    [***Listing 11-3***](#part0022.html#_list3). Playing game music when presenting
    the game scene


    ```

    -(void) presentGameScene

    {

        // existing code omitted for brevity ...


    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];

        [audio playBg:@"Audio/game-music.m4a" loop:YES];

    }

    ```


    If you play the game now, you should hear music playing in the menu and different
    music when you play the game.


    You may want to improve this behavior—for instance, to have the game music track
    start over if you advance from one level to another or restart the level. One
    way to fix that is to extend the presentGameScene method in SceneManager with
    an additional parameter of type BOOL—for instance, presentGameSceneWithMusic:(BOOL)playMusic.
    You would only pass in YES for playMusic when presenting the game scene from the
    main menu; otherwise, you would pass NO to that parameter. Inside the method,
    add a condition to play the music only when playMusic is YES.


    Playing Sound Effects'
