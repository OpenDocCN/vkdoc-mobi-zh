    the vertex and texture coordinates for the sprites.


    However, it doesn’t currently update the texture coordinates when the spriteFrame
    property changes. Thus, the sprite frame animation currently has no effect.


    To fix this, you’ll first have to add an ivar that marks the point in time at
    which the player has been initialized. This _didLoad flag is important because
    initially CCBReader will assign at least one CCSpriteFrame to the sprite’s spriteFrame
    property, whose setter you’re going to override in order to call the updateTextureCoordinates
    method every time the sprite frames change.


    But the initial spriteFrame assignments should not trigger the updateTextureCoordinates
    method, as its values may not be set up and initialized yet.


    Add the ivar highlighted in [Listing 12-1](#part0023.html#list1) to the SoftBodyDrawNode
    implementation in *SoftBodyDrawNode.m*.


    [***Listing 12-1***](#part0023.html#_list1). The _didLoad flag is used to determine
    whether the node has been fully initialized


    ```

    @implementation SoftBodyDrawNode

    {

        // existing ivars omitted for brevity ...


    BOOL _didLoad;

    }

    ```


    Then update the didLoadFromCCB method. Add the highlighted line in [Listing 12-2](#part0023.html#list2)
    to the end of the method. This will mark the node as being fully set up for our
    intents and purposes.


    [***Listing 12-2***](#part0023.html#_list2). The node is considered initialized
    by the time the didLoadFromCCB method returns


    ```

    -(void) didLoadFromCCB

    {

        [self setup];

        _didLoad = YES;

    }

    ```


    The key change here is to override the spriteFrame property setter method, which
    is aptly named setSpriteFrame:. It follows the common naming scheme for property
    setters (*set* with an uppercase first letter of property name, receiving a parameter
    of property type) and getters (same as the property name, taking no parameters
    and returning the property type).


    Every time the Timeline animation changes the spriteFrame property, you’ll need
    to run the updateTextureCoordinates method in order to point it to the new area
    within the Sprite Sheet texture to draw from. If that isn’t done, it will simply
    keep on drawing the sprite frame that was set initially.


    Add the setSpriteFrame: method of [Listing 12-3](#part0023.html#list3) to *SoftBodyDrawNode.m*,
    preferably at the very bottom just above the @end line.


    [***Listing 12-3***](#part0023.html#_list3). Overriding the spriteFrame property
    setter to update texture coordinates


    ```

    -(void) setSpriteFrame:(CCSpriteFrame *)spriteFrame

    {

        [super setSpriteFrame:spriteFrame];


    if (_didLoad)

        {

            [self updateTextureCoordinates];

        }

    }

    ```


    The _didLoad flag prevents the updateTextureCoordinates method from being run
    before didLoadFromCCB. This is important because the setup method called in [Listing
    12-2](#part0023.html#list2) needs to run before any call to updateTextureCoordinates;
    otherwise, the _vertices pointer’s memory would not have been allocated, resulting
    in a crash.


    Of course, setSpriteFrame: does get called at least once before didLoadFromCCB,
    by CCBReader. At some point, CCBReader has to assign the sprite’s initial spriteFrame
    as set up in SpriteBuilder, and any assignments issued by CCBReader itself need
    not update the texture coordinates.


    Now you can build and run the game, and you’ll see the player blink its eyes about
    every three seconds, or whatever duration you set for the default Timeline in
    SoftBodyPlayer.ccb.


    Comparing Sprite Frames


    You may also want to override the setSpriteFrame: method in other CCSprite subclasses
    if you want to run code when specific frames are being displayed but you don’t
    want to (or can’t) use the *Callbacks* keyframes to do so.


    You can get and store sprite frames in ivars (or arrays or dictionaries) which,
    when passed into the setSpriteFrame: method, should run specific selectors. For
    instance, this can be used to synchronize sound effects or speech to start with
    a specific sprite frame.


    **Note**  This is a theoretical example. You needn’t add the following code to
    the project.


    Assuming that _triggerFrame is a CCSpriteFrame* ivar (it must be declared without
    the __weak keyword), you can assign it in didLoadFromCCB of the CCSprite subclass
    in which you want to monitor an animation to play a sound effect when a specific
    sprite frame is set. [Listing 12-4](#part0023.html#list4) shows you how it’s done.
    Take note that, as with all resources, you have to specify the relative path to
    the file.


    [***Listing 12-4***](#part0023.html#_list4). Obtaining a sprite frame reference
    for a given animation image


    ```

    -(void) didLoadFromCCB

    {

        _triggerFrame = [CCSpriteFrame frameWithImageNamed:

                         @"SpriteSheets/Anims/facepalm42.png"];

    }

    ```


    The frameWithImageNamed: method will return the cached image if it has already
    been loaded. This will be the case if the image is in the same Sprite Sheet as
    the sprite frame that the sprite initially uses. That would be the sprite frame
    that’s assigned to the sprite in SpriteBuilder.


    The frameWithImageNamed: method and similar “look up by name” methods perform
    at least a string comparison. More likely, they’ll also run some name-mangling
    code in order to locate the image resource, which could theoretically be found
    in a number of different locations.


    Therefore, it’s recommended to avoid running frameWithImageNamed: and similar
    methods while the gameplay is underway. Loading resources at runtime is a common
    source of short, intermittent drops in frame rate (appropriately nicknamed *hiccups*).


    With a strong reference to the sprite frame in question assigned to _triggerFrame,
    you can now override setSpriteFrame: and compare the incoming spriteFrame parameter
    with the one referenced by _triggerFrame.


    If both are equal, that’s when you can fire a method to run any code that’s supposed
    to be synchronized with specific sprite frames. In [Listing 12-5](#part0023.html#list5),
    that would play a sound effect specific to the animation.


    [***Listing 12-5***](#part0023.html#_list5). Running a method when the new spriteFrame
    matches a specific sprite frame


    ```

    -(void) setSpriteFrame:(CCSpriteFrame *)spriteFrame

    {

        [super setSpriteFrame:spriteFrame];


    if ([_triggerFrame isEqual:spriteFrame])

        {

            [self playFacepalmSoundEffect];

        }

    }

    ```'
  trans: "\n# 第一与第五关键帧\n\n第一帧和第五帧（最后一帧）应为你所熟知的角色睁大眼睛的图像。第二帧和第四帧应使用半闭眼睛的精灵帧。第三帧（中间帧）应使用角色完全闭眼的精灵帧。\n\
    \n将这些帧组合播放，将使角色眨眼，整个动画时长仅约半秒。\n\n现在点击 `Timeline Duration` 控件，将动画长度改为大约 3 秒。这会影响角色眨眼的频率。如果你将时间线设为\
    \ 10 秒，角色将每隔 10 秒才眨眼一次。如果你将其缩短至 1 秒，角色眨眼就会非常频繁。\n\n**注意** 修改 `Timeline Duration`\
    \ 后，请确认没有任何精灵帧关键帧被截断。眨眼动画的播放时长不应超过半秒。如果你将 `Timeline Duration` 设置为少于半秒，则可能不可逆地删除多余的关键帧——即那些时间戳现在大于时间线持续时间的帧。\n\
    \n最后，点击 `Timeline Chain` 下拉菜单，选择 `Default Timeline`。这将使时间线在游戏中无限循环。\n\n现在，如果你在游戏中尝试...动画并不会播放。精灵帧关键帧尚未产生任何效果，因为\
    \ `SoftBodyPlayer.ccb` 使用了一个自定义类来执行自定义渲染。\n\n## 为 SoftBodyDrawNode 添加精灵帧动画\n\n\
    `SoftBodyPlayer.ccb` 使用了一个名为 `SoftBodyDrawNode` 的自定义类。这个 `CCSprite` 子类使用最初分配给\
    \ `CCSprite` 的 `spriteFrame` 属性来初始化精灵的顶点和纹理坐标。\n\n然而，当 `spriteFrame` 属性改变时，它目前并不会更新纹理坐标。因此，精灵帧动画目前不起作用。\n\
    \n要解决此问题，你首先需要添加一个实例变量，用于标记角色初始化的时间点。这个 `_didLoad` 标志很重要，因为最初 `CCBReader` 会至少将一个\
    \ `CCSpriteFrame` 赋值给精灵的 `spriteFrame` 属性。你将要重写该属性的设置方法，以便每次精灵帧变化时调用 `updateTextureCoordinates`\
    \ 方法。\n\n但初始的 `spriteFrame` 赋值不应触发 `updateTextureCoordinates` 方法，因为此时其值可能尚未设置或初始化。\n\
    \n将代码清单 12-1 中高亮显示的实例变量添加到 `SoftBodyDrawNode.m` 文件中的 `SoftBodyDrawNode` 实现里。\n\
    \n***代码清单 12-1***. 使用 `_didLoad` 标志来确定节点是否已完全初始化\n\n```\n@implementation SoftBodyDrawNode\n\
    {\n    // 为简洁起见，省略了现有实例变量……\n\n    BOOL _didLoad;\n}\n```\n\n然后更新 `didLoadFromCCB`\
    \ 方法。将代码清单 12-2 中高亮显示的行添加到该方法末尾。这将标记该节点已完全按照我们的意图设置完毕。\n\n***代码清单 12-2***. 当 `didLoadFromCCB`\
    \ 方法返回时，节点被认为已完成初始化\n\n```\n- (void) didLoadFromCCB\n{\n    [self setup];\n  \
    \  _didLoad = YES;\n}\n```\n\n这里的关键改动是重写 `spriteFrame` 属性的设置方法，其名称为 `setSpriteFrame:`。它遵循属性设置器（setter，以属性名首字母大写并加\
    \ set 前缀，接收属性类型的参数）和获取器（getter，与属性名相同，无参数，返回属性类型）的通用命名规范。\n\n每次时间线动画改变 `spriteFrame`\
    \ 属性时，你都需要运行 `updateTextureCoordinates` 方法，以便将其指向精灵表单纹理中新的绘制区域。如果不这样做，它将持续绘制最初设置的精灵帧。\n\
    \n将代码清单 12-3 中的 `setSpriteFrame:` 方法添加到 `SoftBodyDrawNode.m` 文件中，最好放在文件最底部，紧邻\
    \ `@end` 行之前。\n\n***代码清单 12-3***. 重写 `spriteFrame` 属性设置器以更新纹理坐标\n\n```\n- (void)\
    \ setSpriteFrame:(CCSpriteFrame *)spriteFrame\n{\n    [super setSpriteFrame:spriteFrame];\n\
    \n    if (_didLoad)\n    {\n        [self updateTextureCoordinates];\n    }\n\
    }\n```\n\n`_didLoad` 标志防止了 `updateTextureCoordinates` 方法在 `didLoadFromCCB` 之前运行。这一点很重要，因为代码清单\
    \ 12-2 中调用的 `setup` 方法必须在任何 `updateTextureCoordinates` 调用之前执行；否则，`_vertices` 指针的内存尚未分配，会导致程序崩溃。\n\
    \n当然，`setSpriteFrame:` 在 `didLoadFromCCB` 之前至少会被 `CCBReader` 调用一次。在某些时候，`CCBReader`\
    \ 必须分配精灵在 SpriteBuilder 中设置的初始 `spriteFrame`，而 `CCBReader` 本身发出的任何赋值都不需要更新纹理坐标。\n\
    \n现在你可以构建并运行游戏，你会看到角色大约每三秒眨一次眼，或者按照你在 `SoftBodyPlayer.ccb` 中为默认时间线设置的任何时长。\n\n\
    ## 比较精灵帧\n\n如果你希望在显示特定帧时运行代码，但又不希望（或无法）使用 `Callbacks` 关键帧来实现，那么你也可以在其他 `CCSprite`\
    \ 子类中重写 `setSpriteFrame:` 方法。\n\n你可以获取精灵帧并将其存储在实例变量（或数组、字典）中，当这些帧被传入 `setSpriteFrame:`\
    \ 方法时，应运行特定的选择器。例如，这可用于同步音效或语音，使其在特定的精灵帧开始时触发。\n\n**注意** 这是一个理论上的示例。你无需将以下代码添加到项目中。\n\
    \n假设 `_triggerFrame` 是一个 `CCSpriteFrame*` 类型的实例变量（必须在不使用 `__weak` 关键字的情况下声明），你可以在想要监控动画播放音效的\
    \ `CCSprite` 子类的 `didLoadFromCCB` 方法中对其进行赋值。当设置特定精灵帧时，代码清单 12-4 展示了如何操作。请注意，与所有资源一样，你必须指定文件的相对路径。\n\
    \n***代码清单 12-4***. 获取给定动画图像的精灵帧引用\n\n```\n- (void) didLoadFromCCB\n{\n    _triggerFrame\
    \ = [CCSpriteFrame frameWithImageNamed:\n                     @\"SpriteSheets/Anims/facepalm42.png\"\
    ];\n}\n```\n\n如果图像已被加载，`frameWithImageNamed:` 方法将返回缓存的图像。如果该图像与精灵最初使用的精灵帧位于同一个精灵表单中，就会出现这种情况。那是在\
    \ SpriteBuilder 中分配给精灵的精灵帧。\n\n`frameWithImageNamed:` 方法及类似的“按名称查找”方法至少会执行一次字符串比较。更可能的是，为了定位图像资源，它们还会运行一些名称修饰代码。该资源理论上可能存在于多个不同的位置。\n\
    \n因此，建议避免在游戏运行过程中调用 `frameWithImageNamed:` 及类似方法。在运行时加载资源是导致帧率短暂、间歇性下降（恰如其分地昵称为*打嗝*）的常见原因。\n\
    \n当 `_triggerFrame` 持有相关精灵帧的强引用后，你现在可以重写 `setSpriteFrame:` 方法，并将传入的 `spriteFrame`\
    \ 参数与 `_triggerFrame` 引用的帧进行比较。\n\n如果两者相等，就是你触发某个方法运行代码的时机，这些代码应当与特定的精灵帧同步。代码清单\
    \ 12-5 中的代码将播放与该动画相关的特定音效。\n\n***代码清单 12-5***. 当新的 spriteFrame 与特定精灵帧匹配时运行方法\n\
    \n```\n- (void) setSpriteFrame:(CCSpriteFrame *)spriteFrame\n{\n    [super setSpriteFrame:spriteFrame];\n\
    \n    if ([_triggerFrame isEqual:spriteFrame])\n    {\n        [self playFacepalmSoundEffect];\n\
    \    }\n}\n```\n"
- fmt: '为了比较两个精灵帧，应使用`isEqual:`方法。虽然在此示例中直接进行指针比较`_triggerFrame == spriteFrame`也行得通，但使用`isEqual:`是更好的风格，因为许多Objective-C对象不能仅通过其指针值进行比较。


    这个潜在陷阱最好通过示例来说明：您可以创建两个`CCColor`实例，两者使用相同的初始化方法和参数（`initWithWhite:1.0 alpha:1.0`），然而您将得到两个不同的对象，它们占据两个不同的内存地址。


    使用相等运算符`==`进行的指针相等性测试将评估为`NO`（假），但使用`isEqual:`则给`CCColor`一个机会来比较其属性。假设`isEqual:`方法已正确实现，它将判定其所有属性是否完全相同——在这种情况下，即使两个对象可能是两个独立的对象，`isEqual:`也会返回`YES`（真）。


    ## 粒子效果


    粒子效果可能是最著名的视觉效果类型，至少在2D游戏中如此。在SpriteBuilder和Cocos2D中，它们被称为*粒子系统*，这相当于更广为人知且更具描述性的术语*粒子发射器*。


    `CCParticleSystem`节点是一个发射粒子的节点。此后，当我提及粒子系统时，我将使用*发射器*。它更好地描述了该节点的作用。


    ### 粒子效果的局限性


    粒子的优势在于，它们的渲染效率比使用相同数量的具有相同行为的精灵更高。其缺点是，除了发射器提供的参数之外，您完全无法访问或控制单个粒子。


    例如，您无法访问、移除或以其他方式修改特定的粒子。您甚至无法识别或获取单个粒子的引用，也无法对它们运行动作。


    虽然粒子系统节点本身可以启用物理效果，但这没什么用：单个粒子不会与其他物理体或其他粒子发生碰撞。只有作为整体的发射器节点才能拥有碰撞形状，并可以被物理引擎移动。除非粒子效果被设计成（大致）将所有发射出的粒子包含在物理形状内，否则这可能不会太有用。一个带有圆形物理形状的粒子环可能是一个最佳用例。


    粒子效果也是性能问题的主要来源。总粒子数超过100的粒子发射器可能使用了过多的粒子。三位数的粒子计数绝对应该敲响警钟，并受到严格审查。


    大量的粒子可能对于设计用于特定场景（也许是唯一的粒子效果，或者该场景对性能不敏感）的特殊效果来说是合理的。此外，使用大量非常小的粒子配合一个小粒子纹理仍然可以工作得很好。


    一个常见的错误是设计允许数百个粒子的粒子效果，却只意识到这个发射器即使在高端设备上也会将帧率拖到最低点。另一个常见错误是拥有一个（大部分）运行良好的粒子效果，但除了特定的旧设备，iPhone
    4由于其低性能的图形硬件而尤其常见。始终要准备好移除一个效果，或为此类情况准备一个有更少粒子的备份效果。尽早在一台设备上测试您的粒子效果，如果可能，请特别在您能接触到的最慢设备上进行测试。


    粒子纹理必须是方形图像。任何非方形的纹理都会被缩放，从而被拉伸以匹配最近的方形尺寸。通常，粒子纹理应该是不起眼的，比如云彩或渐变图案。如果粒子纹理几乎没有可辨别的细节，粒子效果通常看起来最好。例外情况是那些具有少量单独粒子的非常特定的粒子效果，比如飘落的树叶或围绕被打晕的角色头部旋转的卡通星星。


    每个粒子发射器只能使用单一纹理发射粒子。如果您需要将多种纹理组合到同一个粒子效果中，您必须创建多个发射器节点，并决定哪个发射器的粒子应绘制在其他发射器的粒子之上或之下。


    对于应该具有更复杂行为的效果也是如此，例如一个大多数粒子应围绕发射器位置旋转，但偶尔有一些粒子应从中心射出并飞远的效果。这需要两个发射器。


    ## 编辑粒子系统参数


    对于粒子发射器示例，您将向菜单背景添加一个火焰辉光。


    打开`UserInterface`文件夹中的`MainMenuBackground.ccb`。从*节点库视图*中，将一个*粒子系统（发射器）*节点拖放到舞台上。然后，在时间轴上拖动它并将其移动到`M_monsters`和`M_frontsmoke`节点之间。（参见[图12-4](#part0023.html#Fig4)。）


    ![9781484202630_Fig12-04.jpg](images/00183.jpeg)


    [图12-4](#part0023.html#_Fig4)。`CCParticleSystem`节点应位于`M_frontsmoke`图像之上


    选中`CCParticleSystem`节点，切换到*项目属性*标签页，将发射器节点的位置设置为`0x-200`。新的粒子应出现在背景图像底部附近。


    我将解释每个粒子发射器属性。当您逐一查看每个粒子发射器属性时，您应该将[图12-5](#part0023.html#Fig5)和[图12-6](#part0023.html#Fig6)中显示的值应用于新添加的*粒子系统*节点。


    ![9781484202630_Fig12-05.jpg](images/00184.jpeg)


    [图12-5](#part0023.html#_Fig5)。径向和重力粒子发射器通用的粒子系统值


    ![9781484202630_Fig12-06.jpg](images/00185.jpeg)


    [图12-6](#part0023.html#_Fig6)。模式特定属性和粒子纹理


    如果您不关心最终结果，可以随意使用您认为合适的其他值。最终结果应该看起来像向上移动的热等离子体，在怪物和顶部的云层上产生漂亮的光照效果。


    如果效果做对了，您会发现最终效果很难被识别为实际的粒子效果。它几乎可能被误认为是一个复杂得多的着色器效果。


    您对粒子发射器唯一的控制是粒子生成参数。而且这些参数有很多。[图12-5](#part0023.html#Fig5)中包含了径向和重力粒子发射器通用的函数和参数。


    *开始粒子*和*停止粒子*按钮允许您在SpriteBuilder中开始和停止发射粒子。这些按钮不会改变游戏中发射器的行为；它们仅用于在编辑器中阻止发射器发射粒子。


    粒子发射器可以处于两种模式之一：径向模式或重力模式。径向模式使您能够创建粒子围绕发射器位置旋转的效果，而重力模式则使您能够让粒子朝任何方向飞离，可以是曲线或直线，带有或不带重力。


    请注意，此重力是按发射器设置的，并且完全独立于物理世界的重力。更改发射器模式将极大地改变粒子的行为，并允许您使用[图12-6](#part0023.html#Fig6)中所示的两组模式属性之一。


    `Position var`属性决定粒子的生成位置。如果此属性设置为`0x0`，粒子将在与发射器节点完全相同的位置生成。如果将`x`设置为`250`，每个新粒子将在一个正负250点的范围内随机化其初始位置。如果粒子发射器的位置在`250x0`，那么粒子允许在沿`x`轴的0到500之间生成。这种随机化的正负变化被许多其他粒子发射器属性所使用，由关键字`var`或`±`符号表示。'
  raw: 'To compare the two sprite frames, the isEqual: method is used. While in this
    case a direct pointer comparison _triggerFrame == spriteFrame would have worked
    too, it is better style to use isEqual: because many Objective-C objects can’t
    be compared through their pointer values alone.


    This potential pitfall is best explained by example: you can create two instances
    of CCColor, both using the same init method and parameters (initWithWhite:1.0
    alpha:1.0), yet you’ll have two different objects occupying two different memory
    addresses.


    The pointer equality test using the equality operator == will evaluate to NO (false),
    but using isEqual: gives CCColor the chance to compare its properties. Assuming
    the isEqual: method is properly implemented, it will determine that all of its
    properties are identical—in which case, isEqual: returns YES (true) even though
    both may be two separate objects.


    Particle Effects


    Particle effects are possibly the best known type of visual effect, at least in
    2D games. In SpriteBuilder and Cocos2D, they’re referred to as a *particle system*,
    which is the equivalent of the better known and more descriptive term *particle
    emitter*.


    The *CCParticleSystem* node is a node that emits particles. Henceforth, I shall
    use *emitter* when I refer to a particle system. It better describes what the
    node does.


    Limitations of Particle Effects


    The thing with particles is that they can be rendered more efficiently than if
    you were to use the same number of sprites with the same behavior. The downside
    to that is that you have absolutely no access or control over individual particles
    except for the parameters provided by the emitter.


    For instance, you can’t access, remove, or otherwise modify specific particles.
    You can’t even identify or obtain references to individual particles, nor can
    you run actions on them.


    While the particle system node itself can have physics enabled, there’s little
    use in that: individual particles will not collide with other physics bodies or
    other particles. Only the emitter node as a whole can have a collision shape and
    can be moved about by the physics engine. Unless the particle effect is designed
    to (roughly) contain all emitted particles within the physics shape, this probably
    won’t be too useful. A ring of particles with a circle physics shape is likely
    the best possible use case.


    Particle effects are also a major source of performance issues. Particle emitters
    with a total particles count of over 100 are likely using far too many particles.
    A three-digit particle count should definitely ring an alarm bell and be put under
    tight scrutiny.


    A large particle count may be justifiable for a special effect designed to be
    used in a specific scene, perhaps as the only particle effect or where the scene
    isn’t performance critical. Also, using a lot of very small particles with a small
    particle texture can still work well.


    A common mistake is to design particle effects with hundreds of allowed particles
    only to realize that this emitter will sink the frame rate to rock bottom even
    on high-end devices. Another common mistake is having a particle effect that runs
    (mostly) fine except for specific older devices, with the iPhone 4 being a particularly
    common candidate due to its underpowered graphics hardware. Always be prepared
    to remove an effect, or have a backup effect with fewer particles for such cases.
    Test your particle effects early on a device, and if you can, test them specifically
    on the slowest device you have access to.


    Particle textures have to be square images. Any nonsquare texture will be scaled
    and therefore stretched to match the nearest square size. In general, particle
    textures should be rather nondescript, like a cloud or gradient pattern. Particle
    effects typically look best if the particle texture has little discernible detail.
    Exceptions are very specific particle effects with few individual particles, like
    dropping leaves or cartoon stars circling around a knocked-out character’s head.


    Each particle emitter can only emit particles using a single texture. If you need
    to combine multiple textures into the same particle effect, you’ll have to create
    multiple emitter nodes and decide whose particles should be drawn over or under
    the other emitter’s particles.


    The same goes for effects that should have more complex behavior, such as an effect
    where most particles should orbit the emitter’s position but occasionally some
    of them should shoot out and away from the center. This requires two emitters.


    Editing Particle System Parameters


    For the particle-emitter example, you’ll be adding a fire glow to the menu background.


    Open *MainMenuBackground.ccb* in the *UserInterface* folder. From the *Node Library
    View*, drag and drop a *Particle System (emitter)* node onto the stage. Then drag
    and move it in the Timeline so that it is between the *M_monsters* and *M_frontsmoke*
    nodes. (See [Figure 12-4](#part0023.html#Fig4).)


    ![9781484202630_Fig12-04.jpg](images/00183.jpeg)


    [Figure 12-4](#part0023.html#_Fig4). The CCParticleSystem node should be above
    the M_frontsmoke image


    With the *CCParticleSystem* node selected, switch to the *Item Properties* tab
    and set the position of the emitter node to 0x-200\. New particles should appear
    close to the bottom of the background images.


    I will explain each particle-emitter property. As you go over each particle-emitter
    property, you should apply the values shown in [Figure 12-5](#part0023.html#Fig5)
    and [Figure 12-6](#part0023.html#Fig6) to the newly added *Particle System* node.


    ![9781484202630_Fig12-05.jpg](images/00184.jpeg)


    [Figure 12-5](#part0023.html#_Fig5). Particle System values common to both radial
    and gravity particle emitters


    ![9781484202630_Fig12-06.jpg](images/00185.jpeg)


    [Figure 12-6](#part0023.html#_Fig6). Mode-specific properties and the particle
    texture


    Feel free to use other values as you see fit if you don’t care much about the
    end result, which is supposed to look like hot plasma moving upward, generating
    a nice lighting effect on the monsters and in the clouds at the top.


    If the effect is done right, you’ll find that the final effect is very hard to
    discern as an actual particle effect. It could almost be mistaken for a much more
    complex shader effect.


    The only control you have over a particle emitter is the particle spawn parameters.
    And there are plenty of them. [Figure 12-5](#part0023.html#Fig5) contains just
    the functions and parameters common to both radial and gravity particle emitters.


    The *Start Particles* and *Stop Particles* buttons allow you to start and stop
    emitting particles within SpriteBuilder. These buttons do not alter the emitter’s
    behavior in the game; they exist only to stop emitters from emitting particles
    in the editor.


    A particle emitter can be in one of two modes, radial or gravity. The radial mode
    enables you to create an effect where the particles swirl around the position
    of the emitter, while the gravity mode enables you to let particles fly away in
    any direction, curved or straight, with or without gravity.


    Note that this gravity is set per emitter and is completely independent from the
    physics world’s gravity. Changing the emitter mode will drastically alter the
    behavior of the particles and allow you to use one of the two sets of mode properties
    shown in [Figure 12-6](#part0023.html#Fig6).


    The *Position var* property determines where a particle spawns. If this property
    is set to 0x0, the particle will spawn at exactly the same position as the emitter
    node. With x set to 250, each new particle will randomize its initial position
    within a range of plus/minus 250 points. If the particle emitter’s position is
    at 250x0, the particles are allowed to spawn between 0 to 500 along the *x* axis.
    This type of randomized plus/minus variation is used by many other particle-emitter
    properties, indicated either by the keyword var or by the ± symbol.'
  trans: '

    为了比较两个精灵帧，应使用`isEqual:`方法。虽然在此示例中直接进行指针比较`_triggerFrame == spriteFrame`也行得通，但使用`isEqual:`是更好的风格，因为许多
    Objective-C 对象不能仅通过其指针值进行比较。


    这个潜在陷阱最好通过示例来说明：您可以创建两个`CCColor`实例，两者使用相同的初始化方法和参数（`initWithWhite:1.0 alpha:1.0`），然而您将得到两个不同的对象，它们占据两个不同的内存地址。


    使用相等运算符`==`进行的指针相等性测试将评估为`NO`（假），但使用`isEqual:`则给`CCColor`一个机会来比较其属性。假设`isEqual:`方法已正确实现，它将判定其所有属性是否完全相同——在这种情况下，即使两个对象可能是两个独立的对象，`isEqual:`也会返回`YES`（真）。


    ## 粒子效果


    粒子效果可能是最著名的视觉效果类型，至少在 2D 游戏中如此。在 SpriteBuilder 和 Cocos2D 中，它们被称为*粒子系统*，这相当于更广为人知且更具描述性的术语*粒子发射器*。


    `CCParticleSystem`节点是一个发射粒子的节点。此后，当我提及粒子系统时，我将使用*发射器*。它更好地描述了该节点的作用。


    ### 粒子效果的局限性


    粒子的优势在于，它们的渲染效率比使用相同数量的具有相同行为的精灵更高。其缺点是，除了发射器提供的参数之外，您完全无法访问或控制单个粒子。


    例如，您无法访问、移除或以其他方式修改特定的粒子。您甚至无法识别或获取单个粒子的引用，也无法对它们运行动作。


    虽然粒子系统节点本身可以启用物理效果，但这没什么用：单个粒子不会与其他物理体或其他粒子发生碰撞。只有作为整体的发射器节点才能拥有碰撞形状，并可以被物理引擎移动。除非粒子效果被设计成（大致）将所有发射出的粒子包含在物理形状内，否则这可能不会太有用。一个带有圆形物理形状的粒子环可能是一个最佳用例。


    粒子效果也是性能问题的主要来源。总粒子数超过 100 的粒子发射器可能使用了过多的粒子。三位数的粒子计数绝对应该敲响警钟，并受到严格审查。


    大量的粒子可能对于设计用于特定场景（也许是唯一的粒子效果，或者该场景对性能不敏感）的特殊效果来说是合理的。此外，使用大量非常小的粒子配合一个小粒子纹理仍然可以工作得很好。


    一个常见的错误是设计允许数百个粒子的粒子效果，却只意识到这个发射器即使在高端设备上也会将帧率拖到最低点。另一个常见错误是拥有一个（大部分）运行良好的粒子效果，但除了特定的旧设备，iPhone
    4 由于其低性能的图形硬件而尤其常见。始终要准备好移除一个效果，或为此类情况准备一个有更少粒子的备份效果。尽早在一台设备上测试您的粒子效果，如果可能，请特别在您能接触到的最慢设备上进行测试。


    粒子纹理必须是方形图像。任何非方形的纹理都会被缩放，从而被拉伸以匹配最近的方形尺寸。通常，粒子纹理应该是不起眼的，比如云彩或渐变图案。如果粒子纹理几乎没有可辨别的细节，粒子效果通常看起来最好。例外情况是那些具有少量单独粒子的非常特定的粒子效果，比如飘落的树叶或围绕被打晕的角色头部旋转的卡通星星。


    每个粒子发射器只能使用单一纹理发射粒子。如果您需要将多种纹理组合到同一个粒子效果中，您必须创建多个发射器节点，并决定哪个发射器的粒子应绘制在其他发射器的粒子之上或之下。


    对于应该具有更复杂行为的效果也是如此，例如一个大多数粒子应围绕发射器位置旋转，但偶尔有一些粒子应从中心射出并飞远的效果。这需要两个发射器。


    ## 编辑粒子系统参数


    对于粒子发射器示例，您将向菜单背景添加一个火焰辉光。


    打开`UserInterface`文件夹中的`MainMenuBackground.ccb`。从*节点库视图*中，将一个*粒子系统（发射器）*节点拖放到舞台上。然后，在时间轴上拖动它并将其移动到`M_monsters`和`M_frontsmoke`节点之间。（参见图
    12-4。）


    ![9781484202630_Fig12-04.jpg](img/00183.jpeg)


    图 12-4。`CCParticleSystem`节点应位于`M_frontsmoke`图像之上


    选中`CCParticleSystem`节点，切换到*项目属性*标签页，将发射器节点的位置设置为`0x-200`。新的粒子应出现在背景图像底部附近。


    我将解释每个粒子发射器属性。当您逐一查看每个粒子发射器属性时，您应该将图 12-5 和图 12-6 中显示的值应用于新添加的*粒子系统*节点。


    ![9781484202630_Fig12-05.jpg](img/00184.jpeg)


    图 12-5。径向和重力粒子发射器通用的粒子系统值


    ![9781484202630_Fig12-06.jpg](img/00185.jpeg)


    图 12-6。模式特定属性和粒子纹理


    如果您不关心最终结果，可以随意使用您认为合适的其他值。最终结果应该看起来像向上移动的热等离子体，在怪物和顶部的云层上产生漂亮的光照效果。


    如果效果做对了，您会发现最终效果很难被识别为实际的粒子效果。它几乎可能被误认为是一个复杂得多的着色器效果。


    您对粒子发射器唯一的控制是粒子生成参数。而且这些参数有很多。图 12-5 中包含了径向和重力粒子发射器通用的函数和参数。


    *开始粒子*和*停止粒子*按钮允许您在 SpriteBuilder 中开始和停止发射粒子。这些按钮不会改变游戏中发射器的行为；它们仅用于在编辑器中阻止发射器发射粒子。


    粒子发射器可以处于两种模式之一：径向模式或重力模式。径向模式使您能够创建粒子围绕发射器位置旋转的效果，而重力模式则使您能够让粒子朝任何方向飞离，可以是曲线或直线，带有或不带重力。


    请注意，此重力是按发射器设置的，并且完全独立于物理世界的重力。更改发射器模式将极大地改变粒子的行为，并允许您使用图 12-6 中所示的两组模式属性之一。


    `Position var`属性决定粒子的生成位置。如果此属性设置为`0x0`，粒子将在与发射器节点完全相同的位置生成。如果将`x`设置为`250`，每个新粒子将在一个正负
    250 点的范围内随机化其初始位置。如果粒子发射器的位置在`250x0`，那么粒子允许在沿`x`轴的 0 到 500 之间生成。这种随机化的正负变化被许多其他粒子发射器属性所使用，由关键字`var`或`±`符号表示。

    '
- fmt: '# 粒子发射器属性详解


    *Emit rate*（发射率）决定每秒生成多少个粒子。*Duration*（持续时间）决定发射器在停止前持续发射粒子的时长（以秒为单位）。*Duration*
    为 `-1` 表示发射器永远不会停止发射粒子。


    *Total particles*（总粒子数）值决定最多可以同时存在的粒子数量。为了在仍能达到预期效果的前提下，尽可能将该数字保持低位是至关重要的。为了创建与原始效果相同或类似但使用更少粒子的效果而进行的调整，通常是非常值得投入时间的。


    *Life*（生命周期）指粒子保持可见的持续时间（以秒为单位）。在存活期间，粒子会计入 *Total particles*（总粒子数）的计数。对于此属性及以下所有属性，加减号右侧的值字段表示一个随机值，该值会从左侧的值中随机加上或减去。


    在本例中，每个粒子的默认生命周期为六秒，加上一个在 `-2.0` 到 `2.0` 范围内的随机值。这意味着每个粒子的随机生命周期将在四到八秒之间。


    > **提示** *Life*（生命周期）、*emit rate*（发射率）和 *total particles*（总粒子数）会相互影响。如果你希望发射器发出一串粒子然后暂停，你只需确保生命周期和发射率的设置使得在部分粒子的生命周期结束前，发射的粒子数已达到总粒子数。


    假设发射率为每秒 10 个粒子，生命周期为 3 秒，那么在 3 秒内将会有 30 个粒子存活。如果将总粒子数设置为 15，发射器将发射粒子 1.5 秒，然后停止发射新粒子
    1.5 秒。3 秒后，它将再次发射粒子 1.5 秒，然后再暂停 1.5 秒。


    相应地，如果你希望粒子特效连续、不间断地发射粒子流，总粒子数必须足够大，并且可能需要缩短生命周期和/或降低发射率。


    *Start size*（起始大小）和 *End size*（结束大小）分别指粒子在生成时及其生命周期结束时的尺寸。这些值在粒子生命周期内进行线性插值。鉴于粒子纹理是方形的，这些尺寸同时指粒子的宽度和高度。


    在此示例中，暂时忽略变化值，粒子从 `150x150` 开始，6 秒后，即它们消失的那一刻，其大小将变为 `300x300`。这对于粒子特效来说相当大，但这种大小可以有效地使用相对较少的单个粒子创建大规模效果。


    *Start spin*（起始自旋）和 *End spin*（结束自旋）决定了粒子在生命周期开始和结束时的旋转角度以及旋转速度。旋转速度由 *Start spin*
    和 *End spin* 之间的差值决定，该差值在粒子生命周期内进行线性插值。如果 *Start spin* 为 `0`，*End spin* 为 `360`，粒子将在其生命周期内旋转一周。自然地，如果生命周期为
    1 秒而不是 10 秒，这种旋转会更快。


    *Angle*（角度）设置粒子初始运动的方向，单位为度，方向为逆时针。角度为 0 度表示粒子向右移动；角度为 90 度表示粒子向上移动。


    *Start color*（起始颜色）和 *End color*（结束颜色）决定了粒子开始和结束其生命周期时的颜色和透明度。这些颜色在粒子生命周期内进行线性插值。


    如果你希望粒子在接近结束时平滑淡出，请确保在颜色选择器对话框中将 *End color*（结束颜色）的 *Opacity*（不透明度）设置为 `0%`。如果你希望避免粒子在其生命周期内改变其初始颜色，请使用黑色作为
    *End color*（结束颜色）。最常见的情况是，粒子被设置为以 `0%` 不透明度的黑色结束，以创建良好且平滑的淡出效果。


    *Blend src*（混合源）和 *Blend dst*（混合目标）与 *Sprite*（精灵）节点的设置相同。它们影响粒子与背景的混合方式。与大多数支持混合的其他节点不同，粒子默认使用加法混合。基本上，这意味着粒子会提亮已有的背景颜色。


    大多数 *src*（源）和 *dst*（目标）混合值的组合只会产生或多或少的黑色矩形。除了两种基本模式——*Normal*（正常）和 *Additive*（加法）——之外，我发现将
    *Dst Color*（目标颜色）作为 *src*（源）、*Dst Alpha*（目标 Alpha）作为 *dst*（目标）会产生一种非常微妙的混合效果，非常适合在粒子移动时增强场景的照明。


    *reset on visibility toggle*（可见性切换时重置）复选框，如果启用，意味着当通过代码更改其可见状态时，粒子发射器将移除所有现有粒子。如果未选中该复选框，发射器将继续生成粒子，但在其可见状态设置为
    `NO` 时不渲染粒子。


    > **提示** 你可以创建一个粒子发射器，取消勾选 *reset on visibility toggle*（可见性切换时重置）复选框，并让粒子发射器运行几秒钟，以便它生成一些初始粒子。然后，你可以使用淡入动作或播放一个时间轴，将发射器节点的不透明度从
    `0` 更改为 `1`，使其淡入视图。当不希望看到粒子发射器累积生成粒子，而是希望它一开始就“完全发育”时，通常需要这样做。


    [Figure 12-6](#part0023.html#Fig6) 显示了 `CCParticleSystem` 节点的模式特定属性。*Gravity mode*（重力模式）属性仅在粒子发射器处于
    *Gravity mode*（重力模式）时应用，而 *Radial mode*（径向模式）属性仅在粒子发射器处于 *Radial mode*（径向模式）时生效。


    重力会影响每个粒子。例如，你可以通过设置正的 Y 值来使粒子向上加速，或者创建一个“弹簧”效果，使粒子开始向上移动，但最终掉头并落回。重力以点为单位，每帧都会简单地加到粒子的位置上。


    再次强调，此重力仅应用于该特定 *Particle System*（粒子系统）节点的粒子，并且与 `CCPhysicsNode` 的重力无关。


    *Speed*（速度）决定粒子的运动速度，以点每秒为单位。*Speed*（速度）的初始方向由 *Angle*（角度）属性给出，但由于重力、切向加速度和径向加速度的影响，它可能会在粒子生命周期内发生变化。


    标记为 *Tang. acc*（切向加速度）的属性指的是 *tangential acceleration*（切向加速度），而 *Radial acc*（径向加速度）代表
    *radial acceleration*（径向加速度）。两者都会导致粒子的旋转自旋。


    仅增加径向加速度值，你会注意到粒子存活时间越长，它们就会加速并远离发射器的位置。如果再加上切向加速度，粒子将从发射器位置向外螺旋运动。使用切向加速度，你可以使发射器看起来像处于径向模式一样，只是无法阻止粒子加速。因此，它们必然会远离发射器位置。


    要创建真正的轨道粒子，你必须将粒子发射器设置为径向模式。然后，你可以编辑 *Start radius*（起始半径）和 *End radius*（结束半径）来确定粒子轨道的半径，无论是向外还是向内移动。或者将
    *Start radius*（起始半径）和 *End radius*（结束半径）设置为相同的半径，仅调整变化量，以创建类似环的效果。


    *Rotate*（旋转）属性是粒子每秒围绕发射器位置移动的角度（以度为单位）。只有指定了合适的 *Rotate*（旋转）值并且粒子生命周期足够长时，你才会看到粒子从
    *Start radius*（起始半径）向 *End radius*（结束半径）运行。'
  raw: 'The *Emit rate* determines how many particles will be spawned per second.
    The *Duration* determines how long (in seconds) the emitter will emit particles
    before it stops. A *Duration* of –1 means the emitter will never stop to emit
    particles. The *Total particles* value determines how many particles can be alive
    at most. It is absolutely crucial to keep this number as low as possible to still
    achieve the desired effect. The tweaking involved to create the same effect or
    a similar effect that uses fewer particles than the original effect is often time
    well spent.


    *Life* refers to the duration (in seconds) a particle remains visible. While alive,
    a particle counts toward the *Total particles* count. For this and all following
    properties, the value field to the right of the plus/minus sign refers to a variance
    that is randomly added to or subtracted from the value to the left.


    In this case, the default lifetime for every particle is six seconds, plus a random
    value in the range of –2.0 and 2.0\. This means each particle will have a random
    lifetime between four to eight seconds.


    **Tip**  Life, emit rate, and total particles influence each other. If you want
    an emitter that shoots out a stream of particles and then pauses, you’ll simply
    have to ensure that the lifetime and emit rate are such that the emitted particles
    reach the total particle count before some of the particles’ lives end.


    With an emit rate of 10 particles per second and a lifetime of 3 seconds, you’ll
    have 30 particles living within 3 seconds. Now if you set the total particle count
    to 15, the emitter will emit particles for 1.5 seconds and then stop emitting
    new particles for another 1.5 seconds. After 3 seconds, it will emit new particles
    for another 1.5 seconds and then pause another 1.5 seconds.


    Accordingly, if you want the particle effect to emit a continuous, uninterrupted
    stream of particles, the total particle count must be large enough and the lifetime
    and/or emit rate may need to be reduced.


    *Start size* and *End* *size* refer to the size of particles when they are spawned
    and when their lifetime ends, respectively. The values are linearly interpolated
    during the lifetime of the particle. Given that particle textures are square,
    the dimensions refer to both particle width and height.


    In this example, ignoring the variation values for a moment, the particles start
    out at 150x150 and after 6 seconds, the moment they disappear, their size will
    be 300x300\. That’s pretty big for particle effects, but that size can be effective
    for creating large-scale effects using relatively few individual particles.


    *Start spin* and *End* *spin* determine both the rotation of the particles at
    the start and end of their lifetime as well as the speed of rotation. The rotation
    speed is determined by the difference between *Start spin* and *End spin*, which
    is linearly interpolated over the particle’s lifetime. If *Start spin* was *0*
    and *End spin* was *360*, the particles would rotate one revolution over their
    lifetime. Naturally, this rotation will be faster if the lifetime is 1 second
    rather than 10 seconds.


    The *Angle* sets the initial direction the particles take, in degrees and in counter-clockwise
    direction. An angle of 0 degrees means the particles move to the right; an angle
    of 90 degrees means the particles move upward.


    *Start color* and *End* *color* determine the color and transparency that particles
    begin and end their lives with. The colors are interpolated linearly over the
    lifetime of a particle.


    If you want the particles to fade out smoothly toward the end, make sure to set
    the *Opacity* in the color wheel dialog to *0%* for the *End color*. If you want
    to avoid the particle having to change its initial color over its lifetime, use
    black as the *End color*. Most commonly, particles are set up to end with the
    color black at *0%* opacity to create a nice and smooth fade-out effect.


    *Blend src* and *Blend dst* are the same settings as for *Sprite* nodes. They
    affect how the particles blend with the background. Unlike most other nodes that
    support blending, particles default to additive blending. Basically, this means
    that particles brighten the already existing background colors.


    Most combinations of *src* and *dst* blend values just create more or less black
    rectangles. Besides the two basic modes—*Normal* and *Additive*—I found that *Dst
    Color* for *src* with *Dst Alpha* for *dst* create a very subtle blending effect
    that is well suited to enhancing a scene’s lighting as particles move about.


    The *reset on visibility toggle* check box, if enabled, means that the particle
    emitter will remove all existing particles when its visible state is changed by
    code. If the box is unchecked, the emitter will keep spawning but not render particles
    while its visible state is set to NO.


    **Tip**  You can create a particle emitter, uncheck the *reset on visibility toggle*
    check box, and keep the particle emitter running for a few seconds to allow it
    to spawn some of the initial particles. You can then use a fade action or play
    a Timeline that changes the opacity of the emitter node from 0 to 1, fading it
    into view. This is commonly needed where the particle emitter should not be seen
    building up its particles but instead should start out “fully developed.”


    [Figure 12-6](#part0023.html#Fig6) shows the mode-specific properties of the *CCParticleSystem*
    node. The *Gravity mode* properties are applied only when the particle emitter
    is in *Gravity mode*, and the *Radial mode* properties are effective only when
    the particle emitter is in *Radial mode*.


    Gravity affects each particle. You can use this, for example, to accelerate particles
    upward by setting a positive Y value or to create a spring where particles start
    moving upward but eventually turn around and fall back down. Gravity is specified
    in points, and it is simply added to the particle’s position every frame.


    Again, this gravity is applied only to that particular *Particle System* node’s
    particles, and it has no correlation with the gravity of the CCPhysicsNode.


    *Speed* determines the speed of motion of particles, in points per second. *Speed*
    is initially in the direction given by the *Angle* property, but it can change
    over the lifetime of a particle due to gravity, tangential acceleration, and radial
    acceleration.


    The property labeled *Tang. acc* refers to *tangential acceleration*, while *Radial
    acc* stands for *radial acceleration*. Both contribute to rotational spin for
    particles.


    By increasing the radial acceleration value alone, you’ll notice that particles
    will speed up and move away from the emitter’s position the longer they live.
    Add tangential acceleration to the mix and particles will spiral outward from
    the emitter’s position. With tangential acceleration, you can make emitters look
    like the ones in radial mode except that you can’t prevent the particles from
    speeding up. Thus, inevitably, they’ll be moving away from the emitter position.


    To create truly orbiting particles, you have to set the particle emitter to radial
    mode. Then you can edit the *Start radius* and *End radius* to determine the radius
    of the orbit of the particles, either moving outward or inward. Or set both *Start
    radius* and *End radius* to the same radius, only adjusting the variance, to create
    a ringlike effect.


    The *Rotate* property is the angle (in degrees) that the particles will move around
    the emitter’s position every second. You will see the particles orbiting from
    *Start radius* to *End radius* only if you specify a decent *Rotate* value and
    the particle lifetime is long enough.'
  trans: '

    # 粒子发射器属性详解


    *发射率*决定每秒生成多少个粒子。*持续时间*决定发射器在停止前持续发射粒子的时长（以秒为单位）。*持续时间*为 `-1` 表示发射器永远不会停止发射粒子。


    *总粒子数*值决定最多可以同时存在的粒子数量。为了在仍能达到预期效果的前提下，尽可能将该数字保持低位是至关重要的。为了创建与原始效果相同或类似但使用更少粒子的效果而进行的调整，通常是非常值得投入时间的。


    *生命周期*指粒子保持可见的持续时间（以秒为单位）。在存活期间，粒子会计入*总粒子数*的计数。对于此属性及以下所有属性，加减号右侧的值字段表示一个随机值，该值会从左侧的值中随机加上或减去。


    在本例中，每个粒子的默认生命周期为六秒，加上一个在 `-2.0` 到 `2.0` 范围内的随机值。这意味着每个粒子的随机生命周期将在四到八秒之间。


    > **提示** *生命周期*、*发射率*和*总粒子数*会相互影响。如果你希望发射器发出一串粒子然后暂停，你只需确保生命周期和发射率的设置使得在部分粒子的生命周期结束前，发射的粒子数已达到总粒子数。


    假设发射率为每秒 10 个粒子，生命周期为 3 秒，那么在 3 秒内将会有 30 个粒子存活。如果将总粒子数设置为 15，发射器将发射粒子 1.5 秒，然后停止发射新粒子
    1.5 秒。3 秒后，它将再次发射粒子 1.5 秒，然后再暂停 1.5 秒。


    相应地，如果你希望粒子特效连续、不间断地发射粒子流，总粒子数必须足够大，并且可能需要缩短生命周期和/或降低发射率。


    *起始大小*和*结束大小*分别指粒子在生成时及其生命周期结束时的尺寸。这些值在粒子生命周期内进行线性插值。鉴于粒子纹理是方形的，这些尺寸同时指粒子的宽度和高度。


    在此示例中，暂时忽略变化值，粒子从 `150x150` 开始，6 秒后，即它们消失的那一刻，其大小将变为 `300x300`。这对于粒子特效来说相当大，但这种大小可以有效地使用相对较少的单个粒子创建大规模效果。


    *起始自旋*和*结束自旋*决定了粒子在生命周期开始和结束时的旋转角度以及旋转速度。旋转速度由*起始自旋*和*结束自旋*之间的差值决定，该差值在粒子生命周期内进行线性插值。如果*起始自旋*为
    `0`，*结束自旋*为 `360`，粒子将在其生命周期内旋转一周。自然地，如果生命周期为 1 秒而不是 10 秒，这种旋转会更快。


    *角度*设置粒子初始运动的方向，单位为度，方向为逆时针。角度为 0 度表示粒子向右移动；角度为 90 度表示粒子向上移动。


    *起始颜色*和*结束颜色*决定了粒子开始和结束其生命周期时的颜色和透明度。这些颜色在粒子生命周期内进行线性插值。


    如果你希望粒子在接近结束时平滑淡出，请确保在颜色选择器对话框中将*结束颜色*的*不透明度*设置为 `0%`。如果你希望避免粒子在其生命周期内改变其初始颜色，请使用黑色作为*结束颜色*。最常见的情况是，粒子被设置为以
    `0%` 不透明度的黑色结束，以创建良好且平滑的淡出效果。


    *混合源*和*混合目标*与*精灵*节点的设置相同。它们影响粒子与背景的混合方式。与大多数支持混合的其他节点不同，粒子默认使用加法混合。基本上，这意味着粒子会提亮已有的背景颜色。


    大多数*源*和*目标*混合值的组合只会产生或多或少的黑色矩形。除了两种基本模式——*正常*和*加法*——之外，我发现将*目标颜色*作为*源*、*目标 Alpha*作为*目标*会产生一种非常微妙的混合效果，非常适合在粒子移动时增强场景的照明。


    *可见性切换时重置*复选框，如果启用，意味着当通过代码更改其可见状态时，粒子发射器将移除所有现有粒子。如果未选中该复选框，发射器将继续生成粒子，但在其可见状态设置为
    `NO` 时不渲染粒子。


    > **提示** 你可以创建一个粒子发射器，取消勾选*可见性切换时重置*复选框，并让粒子发射器运行几秒钟，以便它生成一些初始粒子。然后，你可以使用淡入动作或播放一个时间轴，将发射器节点的不透明度从
    `0` 更改为 `1`，使其淡入视图。当不希望看到粒子发射器累积生成粒子，而是希望它一开始就“完全发育”时，通常需要这样做。


    Figure 12-6 显示了 `CCParticleSystem` 节点的模式特定属性。*重力模式*属性仅在粒子发射器处于*重力模式*时应用，而*径向模式*属性仅在粒子发射器处于*径向模式*时生效。


    重力会影响每个粒子。例如，你可以通过设置正的 Y 值来使粒子向上加速，或者创建一个“弹簧”效果，使粒子开始向上移动，但最终掉头并落回。重力以点为单位，每帧都会简单地加到粒子的位置上。


    再次强调，此重力仅应用于该特定*粒子系统*节点的粒子，并且与 `CCPhysicsNode` 的重力无关。


    *速度*决定粒子的运动速度，以点每秒为单位。*速度*的初始方向由*角度*属性给出，但由于重力、切向加速度和径向加速度的影响，它可能会在粒子生命周期内发生变化。


    标记为*切向加速度*的属性指的是*切向加速度*，而*径向加速度*代表*径向加速度*。两者都会导致粒子的旋转自旋。


    仅增加径向加速度值，你会注意到粒子存活时间越长，它们就会加速并远离发射器的位置。如果再加上切向加速度，粒子将从发射器位置向外螺旋运动。使用切向加速度，你可以使发射器看起来像处于径向模式一样，只是无法阻止粒子加速。因此，它们必然会远离发射器位置。


    要创建真正的轨道粒子，你必须将粒子发射器设置为径向模式。然后，你可以编辑*起始半径*和*结束半径*来确定粒子轨道的半径，无论是向外还是向内移动。或者将*起始半径*和*结束半径*设置为相同的半径，仅调整变化量，以创建类似环的效果。


    *旋转*属性是粒子每秒围绕发射器位置移动的角度（以度为单位）。只有指定了合适的*旋转*值并且粒子生命周期足够长时，你才会看到粒子从*起始半径*向*结束半径*运行。

