- fmt: "# Improving the Soft-Body Player\n\nThe solution you should be more interested\
    \ in uses spring joints. Again, you have two choices. One is to connect the center\
    \ body with each circumference body as explained in the previous paragraph. However,\
    \ despite using eight spring joints, this creates a rather wobbly structure that\
    \ is prone to collapse in on itself if a strong force is applied to the body at\
    \ one point. Increasing spring stiffness doesn’t really help. Though there are\
    \ certainly uses for this kind of wobbly, bouncing, pudding-like blob.\n\nThe\
    \ other solution is to use just four spring joints that connect one circumference\
    \ body with the body directly opposite to it. That’s what you should be doing.\
    \ With the `PlayerSoftBody.ccb` open, drag and drop four spring joints onto the\
    \ stage. Connect a joint with the right node and the left node. Connect the next\
    \ joint with the bottom-right and top-left nodes, and then bottom and top nodes\
    \ as well as bottom-left and top-right nodes.\n\nThen select each spring joint\
    \ in turn to edit the joint properties. The `Collide bodies` property can be left\
    \ unchecked, while opposing bodies are unlikely to get close enough to ever get\
    \ in contact with each other. The anchor-point values should all be set to `0`\
    \ to align the joint anchors with the node positions. Afterward, you should enable\
    \ `Rest length`, which will show `60` as the length value, give or take a tiny\
    \ fraction for the two diagonal spring joints. Leave damping set to `1`, but change\
    \ stiffness to `100`. Confirm that you’ve applied all these settings to all four\
    \ spring joints correctly. The result should be a ball-grid that looks like the\
    \ one in [Figure 10-11](#part0020.html#Fig11).\n\n![9781484202630_Fig10-11.jpg](images/00154.jpeg)\n\
    \n[Figure 10-11](#part0020.html#_Fig11). Four spring joints connect opposing circumference\
    \ bodies.\n\nYou should try this version in the game to see how this design has\
    \ improved the previous version. The Hacky Sack has become a jelly blob. It works\
    \ well, but the center node isn’t attached to the body yet, and the body is perhaps\
    \ too easily deformed.\n\n## Connecting the Center Node\n\nOne problem of the\
    \ current setup is that it does not prevent the springs from expanding or contracting\
    \ too much. And, of course, the center node ought to be affixed to the entire\
    \ construct; otherwise, it may be squeezed outside the player.\n\nYou could use\
    \ spring joints to connect the center with the circumference bodies, but you already\
    \ have springs set up with opposing circumference bodies. Additional spring joints\
    \ to the center won’t affect the body much. In fact, either the opposing spring\
    \ joints or the ones connecting with the center would take precedence, making\
    \ the others mostly useless.\n\nIt makes more sense to add distance joints to\
    \ the center. That way, you can control the minimum and maximum contraction of\
    \ each circumference body from the center. This allows you to take control of\
    \ the overall deformability of the shape.\n\nFrom the `Node Library View`, drag\
    \ and drop eight distance joints onto the `PlayerSoftBody.ccb` stage. Connect\
    \ the first joint with the center node and the right node. Continue connecting\
    \ the other joints so that all connect with the center node as `Body A` and with\
    \ a circumference node as `Body B`—just like the spokes of a wheel.\n\nOnce you\
    \ have all the joints connected, select each newly added distance joint in turn\
    \ to edit its properties. The `Collide bodies` check box should be checked, as\
    \ there is a good chance that the center body may collide with a circumference\
    \ body. Allowing this collision to happen helps to avoid the problem where a circumference\
    \ body may be pushed inward past the center and then get stuck at the opposite\
    \ side of the body. It may still happen, but it takes a lot more force to make\
    \ it happen.\n\nYou should also enable the `Minimum distance` and `Maximum distance`\
    \ check boxes, and enter **24** as the minimum distance and **34** as the maximum\
    \ distance. This gives the spring joints some, but not too much, room to contract\
    \ and expand. The result can be seen in [Figure 10-12](#part0020.html#Fig12).\n\
    \n![9781484202630_Fig10-12.jpg](images/00155.jpeg)\n\n[Figure 10-12](#part0020.html#_Fig12).\
    \ Adding distance joints to the center add stability to the soft-body player.\n\
    \nTry this version in the game. It feels almost complete, depending on what you\
    \ imagine a good soft-body player should feel like.\n\n## Improving the Soft-Body\
    \ Player\n\nThere are numerous ways to create a soft-body object, but many follow\
    \ the same guiding principles outlined so far. There are also many ways to tweak\
    \ the behavior of the soft-body player without changing the setup by much.\n\n\
    I’d like to suggest some changes that you may want to experiment with at a later\
    \ point:\n\n*   Center Body:\n    *   Increase or decrease its circle shape radius.\n\
    \    *   Increase or decrease the body’s density (and thus its mass).\n    * \
    \  Remove “player” from its mask to prevent circumference bodies from colliding\
    \ with it.\n*   Circumference Bodies:\n    *   Change the friction and elasticity\
    \ to alter the collision behavior with borders and other objects.\n    *   Double\
    \ the number of circumference bodies while decreasing their circle shape radius.\n\
    *   Circumference Distance Joints:\n    *   Alter the `Minimum distance` and `Maximum\
    \ distance` values to allow more room between circumference bodies.\n    *   Replace\
    \ them with spring joints with rest enabled.\n    *   Uncheck `Collide bodies`.\n\
    *   Center Distance Joints:\n    *   Alter the `Minimum distance` and `Maximum\
    \ distance` values.\n    *   Uncheck `Collide bodies`.\n*   Opposing Spring Joints:\n\
    \    *   Increase or decrease `Stiffness`.\n    *   Replace them with distance\
    \ joints with distance limit enabled.\n*   Any Joint:\n    *   Enable `Max Force`,\
    \ and experiment with force values.\n\nDepending on the design of your game, one\
    \ of those solutions may work better than the one I present in the book. Factors\
    \ to consider are the overall bounciness of the object, how much it can be deformed,\
    \ how stable it is in general, and how prone it is to warp in on itself if put\
    \ under enormous pressure.\n\nIn particular, if you can’t allow your object to\
    \ permanently deform in an unfortunate way, you may need to resort to programming.\
    \ For instance, you could have a check in place that determines opposing nodes’\
    \ positions, perhaps in relation to the center node. If the opposing bodies are\
    \ determined to be too close (for too long), you may want to manually set their\
    \ positions to the initial positions.\n\nOne more thing to keep in mind: if you\
    \ move body positions or change joint anchors, be sure to check all connecting\
    \ joints. They may need to have their `Minimum distance`, `Maximum distance`,\
    \ and `Rest Length` properties updated.\n\nAnd finally, apply only one change\
    \ at a time! This makes it easier to learn the effect of individual changes. Two\
    \ or more changes combined can create quite a different result, and it’s very\
    \ hard to determine which changes contribute what to the newly observed behavior.\n\
    \n## Improving Texture Rendering\n\nThere are two remaining problems with the\
    \ player as of now. Thanks to the circumference bodies, the actual collision shape\
    \ of the player has become larger—by about the radius of the circumference body’s\
    \ circle shape. The other problem relates to the texture. As of now, the positions\
    \ of the circumference nodes determine the texture coordinates. Since the circumference\
    \ nodes are somewhat inside the player, the player’s outer shape seems cut off."
