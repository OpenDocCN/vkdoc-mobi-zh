    a long-won battle: numeric sorting. If you feel tempted to format numbered items
    by padding with zero—for instance, Level0001—because you might have up to a thousand
    levels, please don’t! Modern operating systems are well aware of the numeric sorting
    problem. You will no longer see numbered files sorted in this particular order:
    Level1 - Level10 - Level2\. At the same time, the string-formatting code Level%i
    fits all numbers, from one to gazillions. Having to consider padded zeros makes
    every format string more complex than it needs to be.


    With the reference to the GameScene instance, you can send it the loadLevelNamed:
    method, passing in the generated level string. You should do so before presenting
    the scene so that the scene is fully prepared before it is rendered. The loadLevelNamed:
    method is the same one you’ve already used before, except you haven’t been using
    it from another class. To prevent the compiler from complaining about a missing
    selector declaration, you have to open *GameScene.h* and add the declaration as
    shown in [Listing 8-13](#part0018.html#list13).


    [***Listing 8-13***](#part0018.html#_list13). Declaring the loadLevelNamed: selector


    ```

    #import "CCNode.h"


    @interface GameScene : CCNode <CCPhysicsCollisionDelegate,

                                   CCBAnimationManagerDelegate>


    -(void) showPopoverNamed:(NSString*)popoverName;

    -(void) removePopover;


    -(void) loadLevelNamed:(NSString*)levelCCB;


    @end

    ```'
  trans: "``` \nNSArray* array = @[obj1, obj2, obj3];\nNSDictionary* dict = @{key1:\
    \ obj1, key2: obj2, key3: obj3};\nNSNumber* number = @(1234);\nNSNumber* number\
    \ = @(YES);\nNSNumber* number = @(count);\n```\n\n字面量语法比使用前述类的常规初始化器更易读且更简洁。表达式`@(count)`因此获取`count`值并返回一个`NSNumber`对象。`NSNumber`类通过`stringValue`属性方便地创建其值的字符串表示形式。因此，`@(count).stringValue`是将数字转换为`NSString`对象的简写，将`1`变成`@\"\
    1\"`。然后可以将此字符串与按钮的名称进行比较，这些名称应具有`1`至`9`作为其名称字符串。\n\n**注意**：为什么不直接使用`NSNumber`呢？原因很简单：`NSNumber`是一个不可变类。如果值必须更改，则必须创建一个新的`NSNumber`对象。也没有对应的`NSMutableNumber`类。\n\
    \n相反，字符串到数字的转换发生在`button.name.intValue`中。`button.name`是一个`NSString`对象，`NSString`有几个便利属性，如`intValue`，它尝试将字符串转换为`int`值。但是，如果转换失败——例如，如果您使用了字符串`@\"\
    one\"`——该属性将简单地返回`0`。\n\n按钮的父节点是一个`CCSprite`——属于`*W#_l#*`精灵之一。如果按钮的关卡可访问，则精灵会被赋予`whiteColor`，这会移除任何着色效果。`CCColor`是`Cocos2D`使用的颜色类；它与`UIColor`和`NSColor`非常相似。\n\
    \n**注意**：更改`color`属性会对节点应用所谓的“颜色着色”效果。通过着色无法使精灵比其原始图像更亮，因为没有比白色更亮的着色颜色。将白色作为颜色（默认）将使节点看起来像其原始图像。\n\
    \n由于解锁关卡仅在`GameScene`播放时发生，`代码清单 8-8`中的代码不需要在每次显示`Scroll View`时重新运行。这很好，因为`Scroll\
    \ View`只是切换其可见状态来显示和隐藏；因此，`didLoadFromCCB`只会在`MainScene`加载后运行一次。\n\n### 关闭关卡选择弹出窗口\n\
