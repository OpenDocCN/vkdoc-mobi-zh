    This book is dedicated to the very few fine folk who happen to share life with
    me, if only occasionally.


    Gabi, Alex, Brandon, Janet and Vincent and their significant others, my parents,
    grandparents (RIP), aunts and uncles, nieces and nephews and my co-conspirator
    Marcus.


    And you, dear reader.


    # About the Author


    ![9781484202630_unFM-01.jpg](images/00005.jpeg)


    **Steffen Itterheim** has been working in the game industry since 1999. After
    a 7-year tenure as a software engineer with the Electronic Arts Phenomic studio,
    he became a self-employed Cocos2D developer, book author and blogger. Since 2014
    he has been working for Apportable on SpriteBuilder while dabbling with Unity
    in his free time for a change of perspective. Quite literally.


    Steffen is an active StackOverflow.com participant when he’s not playing games—most
    recently, Grimrock 2 and Sniper Elite III. He also has a thing for model railroads.


    # About the Technical Reviewers


    ![9781484202630_unFM-02.jpg](images/00006.jpeg)


    **Leland Long’s** programming career began on a VIC-20 computer. He moved up to
    the Apple IIe and then on to the Mac 512, where he began using Lightspeed Pascal
    to write fancier and more complex games.


    As a hobbyist, Leland has written a few programs over the years in BASIC and Pascal,
    but he never pursued learning the more common languages (like C) or learning object-oriented
    concepts. The release of the iPhone SDK changed that! Based on that event, Leland
    dove headfirst into learning all that he could about Objective-C and iOS programming.
    He is currently an IT Director for a flooring-installation company in South Carolina,
    where he lives with his youngest daughter. His other two daughters and six grandchildren
    live close enough to keep life entertaining.


    ![9781484202630_unFM-03.jpg](images/00007.jpeg)


    **Martin Walsh** is an indie game developer and co-founder of the startup game
    studio Pedro. He is also a regular contributor to the popular open source gaming
    framework Cocos2D and the SpriteBuilder development suite. When not coding he
    is usually dabbling in VR with the Oculus Rift, soldering old, retro arcade PCBs
    or reading about Synthetic biology. Martin is also a serial Kickstarter backer.


    You can find him most days in the SpriteBuilder forum helping fellow devs and
    sharing resources at twitter.com/martin64k.


    # Acknowledgments


    This book would not have been possible without the Cocos2D community. Kudos to
    you; keep making crazy stuff!


    The book wouldn’t be possible either, and certainly not at this level of quality,
    without the hardworking people at Apportable, including those who, like me, are
    scattered around the world. Specifically, I’d like to thank (in no particular
    order) Viktor Lidholt, Collin Jackson, Christina Kelly, Nicky Weber, Scott Lembcke,
    Martin Walsh, Benjamin Encz, Lars Birkemose, and Thayer Andrews for their cooperation
    and support and for enduring me getting hopelessly lost in translation.


    Of course, I shall not forget those who worked directly with me on this book.
    Many thanks go to Kevin Walter and Mark Powers for keeping me both up to date
    and busy, Peter Alau and Michelle Lowman for signing me on, and Leland Long and
    Martin Walsh for providing technical feedback.


    Then there’s Marcus, who I collaborate with in the same office: thanks for providing
    me with much needed changes in perspective, a surprisingly well-engineered, armchair-fitting
    gambling table for keyboard and mouse and steering-wheel controlled games, a virtual
    reality helmet (Self-made? We wish!), and the occasional coop game and movie.


    I wish to thank everyone else who I might have forgotten to mention here. Rest
    assured, it was merely my lack of long-term memory that you aren’t mentioned here
    by name. By now I probably regret not having expressed my thanks to you specifically.


    # Introduction


    After I updated my previous book, *Learn cocos2d 2* to its 3rd edition (published
    late 2012), I had absolutely no intention of writing another technical book. Certainly
    not one about Cocos2D.


    For one, writing a book is a lot of work and that makes it even more painful to
    see it go out of date even before it is published. This fate is shared by many
    technical books.


    On the other hand, Cocos2D in its 2.x version was fairly stable. It also didn’t
    seem to have gone anywhere. It was merely being maintained at the time, with new
    features being developed not in the best interest of the community, but instead
    in the best interest of the company that had, at the time, internalized the development
    of the open source project Cocos2D.


    In fall 2013, Apple released iOS 7. With it came Sprite Kit, a 2D rendering engine
    very similar to Cocos2D at the time. Interest in Cocos2D waned rapidly.


    It was at that time that Apportable took to Cocos2D. It hired developers from
    the community to work on Cocos2D to improve it and, ultimately, to make it better
    than Sprite Kit in every regard. And so work on the 3.x branch began.


    At the same time, SpriteBuilder was to become not just one of many but *the* visual
    editor for Cocos2D. It was well integrated, without quirky setup steps, and there
    was no having to wait for it to catch up to support newer Cocos2D versions.


    Over the course of 2014, SpriteBuilder and Cocos2D became one. And exciting new
    features were added: a fully integrated Objective-C version of the Chipmunk physics
    engine, a new renderer API that transparently supports both OpenGL and Metal,
    and built-in shader effects without having to write any shader code.


    Cocos2D is now more alive and vibrant like never before.


    When Apportable came to me with the idea for a book on SpriteBuilder and Cocos2D,
    it didn’t take long for me to accept the challenge. Too much had changed that
    I didn’t want to leave undocumented, and I was excited that SpriteBuilder and
    Cocos2D might become what I always hoped they would become.


    Knowing what goes out of date most quickly, I was confident that I could avoid
    most of the pitfalls of technology becoming outdated in order to keep the book
    valid and applicable for a longer time. The fact that the book revolves mostly
    around SpriteBuilder will certainly help in that regard, as did writing the book
    against the very latest development branches. As I write these lines, it’s early
    November 2014 and SpriteBuilder v1.3, which this book covers, has just been submitted
    to the Mac App Store for review.


    My next project will have me updating the SpriteBuilder and Cocos2D online documentation.
    It is intended to be a reference manual that goes well with this book. I will
    do my best to point out anything that may have changed significantly since the
    book was published.


    You will find this documentation online at [http://www.cocos2d-swift.org/docs](http://www.cocos2d-swift.org/docs).
    The first version will cover SpriteBuilder v1.3 and Cocos2D v3.3. I recommend
    that you keep this link open in a browser tab while reading through this book.


    Personally, I’m glad that I can recover from writing now by…writing more documentation.
    Online documentation is a different format with different requirements and possibilities,
    and I look forward to updating and improving that side of things, too.'
