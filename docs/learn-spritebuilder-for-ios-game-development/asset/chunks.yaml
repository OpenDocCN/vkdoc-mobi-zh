  trans: "\n至此，您应该看到 Android 设备的屏幕首先变黑，直到开始显示 `MainScene.ccb` 的内容。想证明这真的有效吗？请看 图 13-14。\n\
    \n![9781484202630_Fig13-14.jpg](img/00203.jpeg)\n\nFigure 13-14。哇！用 Objective-C\
    \ 编写的 SpriteBuilder 应用竟然可以在 Android 设备上运行——就是这么简单！\n\n## 故障排除\n\n如果您在此简单测试、Android\
    \ 设备设置、设备连接、让 Xcode 列出设备、传输等工作时遇到任何问题，您应该搜索相关问题，如有必要，可以在 SpriteBuilder 论坛的“Android”板块提问：[`forum.spritebuilder.com/category/android`](http://forum.spritebuilder.com/category/android)。\n\
    \n在提问之前，请考虑执行以下操作：\n\n- **保持耐心**。传输和启动 Android 应用时，日志可能会长时间没有更新，看似卡住。完整的 Bouncy\
    \ Beast 项目大约需要 90 秒传输，大部分时间没有任何日志活动。启动时，还可能再有 10 到 30 秒无响应。这是正常的，每次都会发生——与 iOS\
    \ 不同，这里没有增量传输来加速连续传输。\n- **确保您已遵循本章前面描述的 Android 设备设置和连接步骤**。请验证您没有启用或禁用任何未明确提及的开发设置。\n\
    - **确保 HelloSpriteBuilder iOS 项目能在 iOS 设备或模拟器上正常运行**，这样您就知道问题特定于为 Android 构建。\n\
    - **尝试在 Xcode 中执行 *Product* ![image](img/00008.jpeg) *Clean Build Folder*（按住 Option\
    \ 键）**。同时，从设备上删除（卸载）任何先前部署的应用版本。然后重启 Xcode。再尝试运行一次。有时这可以修复“非常奇怪”的问题。\n- **确保已阅读\
    \ SpriteBuilder Android 文档**，特别是“故障排除”和“已知问题”章节：[`android.spritebuilder.com`](http://android.spritebuilder.com)。\n\
    \n如果您无法解决问题，请在 SpriteBuilder 论坛提问。提问时，请详细描述您尝试过什么、观察到了什么、您正在测试的设备（型号、Android 版本）以及您使用的\
    \ SpriteBuilder 和 Xcode 版本。\n\n**注意** 我分别在 Xcode 5.1 和 Xcode 6.0 上成功测试了 Android\
    \ 部署。我在 OS X 10.9 Mavericks 上进行了测试。如果您仍在使用 Xcode 5.0 或更早版本并遇到问题，您应考虑升级 Xcode。不过，OS\
    \ X 版本应该没有影响。\n\n如果您使用的是 Xcode、iOS 或 OS X 的测试版，您应该考虑到某些问题可能恰恰是因为您使用了测试版软件而发生的。测试版软件可能会引入与第三方软件（如\
    \ Cocos2D、SpriteBuilder 或 Apportable 的 BridgeKit）的兼容性问题。\n\n# SpriteBuilder 应用的结构\n\
    \n如果您检查 HelloSpriteBuilder Xcode 项目中的文件，您会注意到一些奇怪的新增内容，特别是如果您过去使用 SpriteBuilder\
    \ v1.2 或更早版本创建的项目。图 13-15 显示了一些特定于 Android 文件的源码树。\n\n![9781484202630_Fig13-15.jpg](img/00204.jpeg)\n\
    \nFigure 13-15。SpriteBuilder v1.3 项目包含了一些特定于 Android 的文件\n\n首先，有一个 *Platforms*\
    \ 组，其中包含特定于每个平台的 iOS、Android 和 Mac 组。*Source/Platforms/Android* 组包含 *HelloSpriteBuilderActivity.java*\
    \ 文件。该文件的内容重新打印在 清单 13-1 中。\n\n***Listing 13-1***。HelloSpriteBuilderActivity.java\
    \ 文件\n\n```java\npackage org.cocos2d.HelloSpriteBuilder;\n\nimport org.cocos2d.CCActivity;\n\
    \npublic class HelloSpriteBuilderActivity extends CCActivity {\n\n}\n```\n\n`HelloSpriteBuilderActivity.java`\
    \ 简单地创建了一个新类，该类扩展了 Cocos2D 提供的 `CCActivity` 类。这与同名的 Objective-C 类 `HelloSpriteBuilderActivity`\
    \ 保持一致，其接口显示在 清单 13-2 中。\n\n***Listing 13-2***。HelloSpriteBuilderActivity.h\n\n\
    ```objectivec\n#import \"CCActivity.h\"\n\nBRIDGE_CLASS(\"org.cocos2d.HelloSpriteBuilder.HelloSpriteBuilderActivity\"\
    )\n@interface HelloSpriteBuilderActivity : CCActivity\n\n@end\n```\n\n特殊的宏 `BRIDGE_CLASS`\
    \ 引用了上述的 Java 类 `HelloSpriteBuilderActivity`，本质上是连接了两者。还有一个用于 Java 接口/Objective-C\
    \ 协议（名为 `BRIDGE_INTERFACE`）的类似物。只有当您打算使用 BridgeKit 中未提供的功能时，才需要桥接 Java 到 Objective-C。否则，请优先使用\
    \ BridgeKit 已经暴露的功能，因为您可以纯粹使用 Objective-C 代码与其交互。\n\n`HelloSpriteBuilderActivity`\
    \ 的实现只做两件事：启动第一个场景并响应返回键，告诉应用结束。代码重新打印在 清单 13-3 中。\n\n***Listing 13-3***。HelloSpriteBuilderActivity.m\n\
    \n```objectivec\n#import \"HelloSpriteBuilderActivity.h\"\n\n@implementation HelloSpriteBuilderActivity\n\
    \n-(CCScene*)startScene\n{\n    return [CCBReader loadAsScene:@\"MainScene\"];\n\
    }\n\n-(BOOL)onKeyUp:(int32_t)keyCode keyEvent:(AndroidKeyEvent*)event\n{\n   \
    \ if (keyCode == AndroidKeyEventKeycodeBack)\n    {\n        [self finish];\n\
    \    }\n    return NO;\n}\n\n@end\n```\n\n这里的关键点是 Android 应用完全忽略 `AppDelegate`\
    \ 类。如果您在 `AppDelegate` 的 `startScene` 方法中更改了启动场景，您也必须更改 `Activity` 类中的 `startScene`\
    \ 方法。此外，您在 `AppDelegate` 文件中编写的任何自定义代码都不会包含在 Android 构建中。同样，`Activity` 类中的任何代码也不会在\
    \ iOS 构建中运行。\n\n**提示** 您通常应该创建一个包含通用代码和数据的类，供 `AppDelegate` 和 `Activity` 类共同使用。最简单的例子是声明一个静态的\
    \ `NSString* FirstSceneToLaunch = @\"MainScene\"`；初始化为要启动的第一个场景的名称。然后，您可以在 `AppDelegate`\
    \ 和 `Activity` 类中导入该头文件，并在两个文件中使用 `FirstSceneToLaunch` 标识符。这样，您只需在一个地方编辑，而不必冒着\
    \ `AppDelegate` 和 `Activity` 执行完全不同的操作的风险。\n\n在 *Resources/Platforms/Android*\
    \ 组中，您会找到 *AndroidManifest.xml*。它包含各种构建参数以及与 iOS 上的 *Info.plist* 类似的设置。您可能需要编辑此文件以使用某些特定于\
    \ Android 的功能，例如排行榜和应用内购买。请参阅相关 Android SDK API 的文档，其中会指出对 `AndroidManifest.xml`\
    \ 的任何要求。\n\nAndroid 版本的 *Info.plist* 仅包含关于您应用的基本信息，主要是其名称、默认本地化和包标识符。您还会找到两个文件夹引用，`Published-iOS`\
    \ 和 `Published-Android`，它们包含由 SpriteBuilder 管理的资源文件的 iOS 和 Android 版本。当然，只有 iOS\
    \ 资源文件会包含在 iOS 构建中，而只有 Android 资源文件会包含在 Android 构建中。\n\n**提示** 这两个 *Published*\
    \ 文件夹会使项目大小增加约一倍，这可能是使用源代码控制软件的用户需要关心的问题。您应该从源代码控制中排除这两个文件夹。获取仓库副本的新用户只需打开 SpriteBuilder\
    \ 项目并发布一次，即可在本地创建已发布文件的副本。这样，您就可以避免在源代码控制下存储数十甚至数百兆字节的已发布资源文件。\n\n# 转换 Bouncy\
    \ Beast\n"
- fmt: "确认简单测试项目可以正常工作后，您就可以开始着手处理主要任务：转换Bouncy Beast项目。这个项目将作为示例，展示您可能遇到的问题以及如何修复或规避这些问题。显然，我无法提供所有可能问题的解决方案。\n\
    \nBouncy Beast项目在设计时就考虑到了移植到Android平台，不过实际上我唯一做的就是避免依赖Apple以及第三方框架。具体来说，第三方框架可能会带来问题。您应先在SpriteBuilder论坛上询问特定框架是否与Android插件兼容。如果没人知道，您应该像刚才创建的那个项目一样，将其集成到一个简单的测试应用中。先让该框架的基本功能（例如成功登录）正常运行，然后尝试为Android构建它，并记录下所有错误。\n\
    \nApple的框架通常得到广泛支持，但有些可能根本无法在Android上使用，另一些则可能缺少一两个功能。框架越依赖于硬件，其可移植性就越低。\n\n转换的起点可以在`15\
    \ - Prior to making Android-specific fixes`文件夹中找到。其中包含一个已更新至SpriteBuilder v1.3格式的项目，该格式是向Android发布项目所必需的。\n\
    \n## 修复编译器错误\n\n假设您最初是使用SpriteBuilder v1.3或更高版本创建的LearnSpriteBuilder项目，那您现在就可以打开`LearnSpriteBuilder.spritebuilder`项目了。如果您不确定创建项目时使用的是哪个SpriteBuilder版本，也可以使用`14\
    \ - Prior to making Android-specific fixes`项目，该项目与之前的`13 - Animations and Effects`项目相同，只是已升级到v1.3格式。\n\
    \n现在，转到`File` ![image](images/00008.jpeg) `Project Settings`，确认Android平台已包含在发布目标中。否则，Android目标将缺少所有资源文件。然后，为了确保万无一失，请使用`File`\
    \ ![image](images/00008.jpeg) `Clean Cache`，然后使用`File` ![image](images/00008.jpeg)\
    \ `Publish`重新发布所有文件。这可能需要一两分钟。\n\n发布完成后，打开`LearnSpriteBuilder.xcodeproj`项目。选择LearnSpriteBuilder\
    \ iOS scheme（如[Figure 13-11](#part0024.html#Fig11)所示）和任意iOS设备。构建并运行。这仅仅是为了确认项目在iOS上确实能正常工作。如果iOS构建已经失败，那么尝试Android构建就没有意义了。\n\
    \n一旦iOS构建成功运行，选择`LearnSpriteBuilder Android` scheme和一个Android设备。再次参考[Figure 13-11](#part0024.html#Fig11)。尝试运行项目。如果您使用的是本书提供的项目之一，而不是自己创建的项目，那么构建可能会更早地失败。简化的错误信息将是：\n\
    \n```\nPrefix.pch:12:9: 'UIKit/UIKit.h' file not found\n```\n\n`UIKit`框架在Android上不可用，因为Android使用了一个完全不同的用户界面框架。但是，我不记得在代码中任何地方引用过`UIKit`类。事实证明，`UIKit`引用是由早期版本的SpriteBuilder创建的Xcode项目引入的。在最新的SpriteBuilder\
    \ v1.3测试版中，已经不再引用`UIKit`。\n\n唉，如果您需要修复这个或类似的iOS框架头文件问题，您将不得不使用特定于平台的宏来防止iOS框架头文件在除iOS之外的任何平台上被导入。更新`Prefix.pch`文件，该文件位于`Supporting\
    \ Files`组中，使其看起来像[Listing 13-4](#part0024.html#list4)中所示（更改部分已高亮显示）。\n\n[***Listing\
    \ 13-4***](#part0024.html#_list4). 当构建目标不是iOS时，避免导入UIKit头文件\n\n```\n#import <Availability.h>\n\
    \n#ifdef __OBJC__\n#if __CC_PLATFORM_IOS\n#import <UIKit/UIKit.h>\n#endif\n#import\
    \ <Foundation/Foundation.h>\n#import \"cocos2d.h\"\n#import \"cocos2d-ui.h\"\n\
    #endif\n```\n\nCocos2d 提供了三个宏，允许您根据目标平台包含或排除代码的编译：\n\n```\n__CC_PLATFORM_IOS\n\
    __CC_PLATFORM_MAC\n__CC_PLATFORM_ANDROID\n```\n\n当为特定平台构建时，只有一个宏的值为`1`（即为真）。其他宏的值将为假。针对iOS和Android特定代码的典型切换如[Listing\
    \ 13-5](#part0024.html#list5)所示。\n\n[***Listing 13-5***](#part0024.html#_list5).\
    \ 基于目标平台的条件代码编译\n\n```\n#if __CC_PLATFORM_IOS\n// iOS specific code here\n#elif\
    \ __CC_PLATFORM_ANDROID\n// Android specific code here\n#endif\n```\n\n再次尝试构建。您将会看到一个不明确的错误：\n\
    \n```\nGameMenuLayer.m:49:38: Expected a type\n```\n\n`GameMenuLayer.m`中有问题的行是[Listing\
    \ 13-6](#part0024.html#list6)中方法的签名。\n\n[***Listing 13-6***](#part0024.html#_list6).\
    \ 什么意外的类型？\n\n```\n-(void) applicationWillResignActive:(UIApplication *)application\n\
    {\n    [self shouldPauseGame];\n}\n```\n\n如果您仔细看，您会注意到Xcode用红色下划线标出了`UIApplication`关键字的开头。这就是错误所在。所以很明显，`UIApplication`在Android上也不可用。这是有道理的，因为Android使用不同的启动机制。由于这个方法并非至关重要（它在应用进入后台时暂停游戏），我们暂且通过添加[Listing\
    \ 13-7](#part0024.html#list7)中高亮显示的行，将整个方法排除在Android构建之外。\n\n[***Listing 13-7***](#part0024.html#_list7).\
    \ 在Android上忽略这个方法\n\n```\n#if __CC_PLATFORM_IOS\n-(void) applicationWillResignActive:(UIApplication\
    \ *)application\n{\n    [self shouldPauseGame];\n}\n#endif\n```\n\n在稍后的阶段，您将需要在`LearnSpriteBuilderActivity`类中实现`applicationWillResignActive:`方法相应的等效方法。等效的方法是`onPause`方法。目前，更重要的是让应用在设备上运行。完成此修复后，编译问题应该会清除，应用应该会传输到设备上。\n\
    \n## 修复启动问题\n\n当您让项目成功编译并传输后，您就接近成功了。现在可能是个好时机，开始担心最糟糕的启动问题：黑屏、应用无响应、日志中没有指示。\n\
    \n如果这发生在您身上，缩小问题范围的最佳方法是添加`NSLog`语句。从`LearnSpriteBuilderActivity.m`中的`startScene`方法开始，如[Listing\
    \ 13-8](#part0024.html#list8)所示。\n\n[***Listing 13-8***](#part0024.html#_list8).\
    \ 记录第一个场景的启动是个好主意\n\n```\n- (CCScene *)startScene\n{\n    NSLog(@\"startScene\"\
    );\n    return [CCBReader loadAsScene:@\"MainScene\"];\n}\n```\n\n如果这没有记录任何内容，您就知道问题与应用初始化有关。在这种情况下，您应该在SpriteBuilder论坛上发布完整的日志以寻求帮助。这类问题应该很少见。根据我的发现，这类问题可能与`开发者选项`有关——就我而言，我必须启用`OpenGL跟踪`和`保持唤醒`模式才能解决启动问题。\n\
    \n在这个案例中，项目应该正常启动，直到引发一个Java异常，该异常会打印到日志中，并附带一个（在此特定情况下，几乎没什么用的）调用栈。错误信息复制如下：\n\
    \n```\nW/System.err(17501): java.io.FileNotFoundException: Audio/menu-music.m4a\n\
    W/System.err(17501):     at android.content.res.AssetManager.openAssetFd(Native\
    \ Method)\nW/System.err(17501):     at android.content.res.AssetManager.openFd(AssetManager.java:332)\n\
    W/System.err(17501):     at dalvik.system.NativeStart.run(Native Method)\n```\n\
    \n信息很明确：这是一个文件未找到异常。它找不到`Audio/menu-music.m4a`文件。快速检查Xcode中`Resources`组内的`Published-Android`文件夹，发现Android的音频文件已被转换为`ogg`格式，而不是`m4a`格式。"
  raw: 'With the simple test project confirmed working, you can take part in the tour
    de force: converting the Bouncy Beast project. This shall serve as an example
    of what you may encounter and how to fix or work around issues. Obviously, I cannot
    present the solution to every conceivable issue.


    The Bouncy Beast project was designed with an Android port in mind, though really
    the only thing I did was avoid relying on Apple and specifically third-party frameworks.
    Specifically, third-party frameworks can be a problem. You should ask in the SpriteBuilder
    forum first whether a given framework is compatible with the Android plugins.
    If no one knows, you should incorporate it into a simple test app like the one
    you just created. Get the framework’s fundamental features to work, such as logging
    in successfully. Then try to build it for Android and note any errors.


    Apple frameworks are generally widely supported, but some may not be available
    for Android at all—others may be missing a feature or two. The more hardware-specific
    a framework is, the less likely it is to be portable.


    The starting point for the conversion can be found in the *15 - Prior to making
    Android-specific fixes* folder. It contains a project that was updated to the
    SpriteBuilder v1.3 format required to publish projects to Android.


    Fixing Compiler Errors


    Assuming you’ve originally created the LearnSpriteBuilder project with SpriteBuilder
    v1.3 or later, you can open the *LearnSpriteBuilder.spritebuilder* project now.
    If you’re not sure which SpriteBuilder version you used to create the project,
    you can also use the *14 - Prior to making Android-specific fixes* project, which
    is the same project as *13 - Animations and Effects* before, except that the project
    has been upgraded to the v1.3 format.


    Now go to *File* ![image](images/00008.jpeg) *Project Settings* and verify that
    the Android platform is included as the publishing target. Otherwise, the Android
    target would be missing all resource files. Then, just to be sure, use *File*
    ![image](images/00008.jpeg) *Clean Cache* and then *File* ![image](images/00008.jpeg)
    *Publish* to republish all files. This may take a minute or two.


    When publishing is complete, open the *LearnSpriteBuilder.xcodeproj* project.
    Select the LearnSpriteBuilder iOS scheme (shown in [Figure 13-11](#part0024.html#Fig11))
    and any iOS device. Build and run. This is just to verify the project is indeed
    working on iOS. There’s no point in trying the Android build if the iOS build
    is already failing.


    Once the iOS build runs successfully, select the *LearnSpriteBuilder Android*
    scheme and an Android device. Again, refer to [Figure 13-11](#part0024.html#Fig11).
    Try to run the project. If you used one of the projects provided with the book
    instead of creating your own project, the build may fail a bit earlier. The abbreviated
    error message will be:


    ```

    Prefix.pch:12:9: ''UIKit/UIKit.h'' file not found

    ```


    The UIKit framework is not available on Android since Android uses a completely
    different user interface framework. However, I can’t remember making any reference
    to UIKit classes anywhere. It turns out that the UIKit reference is included by
    Xcode projects created by earlier versions of SpriteBuilder. In the latest SpriteBuilder
    v1.3 beta, there is no reference to UIKit anymore.


    Alas, if you need to fix this or similar issues with iOS framework headers, you
    will have to use a platform-specific macro to prevent the iOS framework header
    from being imported on any platform except iOS. Update the *Prefix.pch* file,
    which is in the *Supporting Files* group so that it looks like the one in [Listing
    13-4](#part0024.html#list4) (changes highlighted).


    [***Listing 13-4***](#part0024.html#_list4). Avoid importing the UIKit header
    when the build target isn’t iOS


    ```

    #import <Availability.h>


    #ifdef __OBJC__

    #if __CC_PLATFORM_IOS

    #import <UIKit/UIKit.h>

    #endif

    #import <Foundation/Foundation.h>

    #import "cocos2d.h"

    #import "cocos2d-ui.h"

    #endif

    ```


    There are three macros provided by Cocos2d that allow you to include or exclude
    code from building, depending on the target platform:


    ```

    __CC_PLATFORM_IOS

    __CC_PLATFORM_MAC

    __CC_PLATFORM_ANDROID

    ```


    Only one macro holds the value 1 (is true) when building for a specific platform.
    The others will evaluate to false. A typical switch between iOS and Android-specific
    code would look like that shown in [Listing 13-5](#part0024.html#list5).


    [***Listing 13-5***](#part0024.html#_list5). Conditional code compilation based
    on target platform


    ```

    #if __CC_PLATFORM_IOS

    // iOS specific code here

    #elif __CC_PLATFORM_ANDROID

    // Android specific code here

    #endif

    ```


    Try to build again. You’ll get a nondescript error:


    ```

    GameMenuLayer.m:49:38: Expected a type

    ```


    The problematic line in *GameMenuLayer.m* is the method signature of the method
    in [Listing 13-6](#part0024.html#list6).


    [***Listing 13-6***](#part0024.html#_list6). What unexpected type?


    ```

    -(void) applicationWillResignActive:(UIApplication *)application

    {

        [self shouldPauseGame];

    }

    ```


    If you look closely, you’ll notice that Xcode underlined in red the beginning
    of the UIApplication keyword. That’s where the error is. So apparently UIApplication
    is also not available on Android. This makes sense because Android uses a different
    launch mechanism. Since this method isn’t crucial (it pauses the game when the
    app enters background), just exclude the entire method from Android builds for
    now by adding the highlighted lines in [Listing 13-7](#part0024.html#list7).


    [***Listing 13-7***](#part0024.html#_list7). Just ignore this on Android


    ```

    #if __CC_PLATFORM_IOS

    -(void) applicationWillResignActive:(UIApplication *)application

    {

        [self shouldPauseGame];

    }

    #endif

    ```


    At a later point, you’ll want to implement the corresponding equivalent of the
    applicationWillResignActive: method in the LearnSpriteBuilderActivity class. The
    equivalent method is the onPause method. For now, it’s more important to get the
    app running on the device. After this fix, compilation problems should be cleared
    and the app should be transferred to the device.


    Fixing Launch Problems


    When you get the project to compile and transfer, you’re getting close. Now might
    be a good time to start fearing the worst launch issue of all: a black screen,
    app freezes, no indication in the log.


    If that were to happen to you, the best way to narrow down the cause is to add
    NSLog statements. Start with the startScene method in *LearnSpriteBuilderActivity.m*
    as shown in [Listing 13-8](#part0024.html#list8).


    [***Listing 13-8***](#part0024.html#_list8). Logging the launch of the first scene
    is a good idea


    ```

    - (CCScene *)startScene

    {

        NSLog(@"startScene");

        return [CCBReader loadAsScene:@"MainScene"];

    }

    ```


    If that doesn’t log anything, you know the problem is related to the initialization
    of the app. In that case, you should post the full log on the SpriteBuilder forum
    to request help. This type of problem should be rare. As I found out, such issues
    can be related to the *Developer options*—in my case, I had to enable *OpenGL*
    traces and *Stay awake* mode to work around launch issues.


    In this case, the project should launch fine until it raises a Java exception,
    which is printed to the log including a (in this particular case, hardly useful)
    call stack. The error is reprinted here:


    ```

    W/System.err(17501): java.io.FileNotFoundException: Audio/menu-music.m4a

    W/System.err(17501):     at android.content.res.AssetManager.openAssetFd(Native
    Method)

    W/System.err(17501):     at android.content.res.AssetManager.openFd(AssetManager.java:332)

    W/System.err(17501):     at dalvik.system.NativeStart.run(Native Method)

    ```


    The message is pretty clear: this is a file not found exception. It can’t find
    the *Audio/menu-music.m4a* file. A quick check in the *Published-Android* folder
    in the *Resources* group in Xcode reveals that the audio files for Android have
    been converted to *ogg*, not *m4a*.'
  trans: "\n确认简单测试项目可以正常工作后，您就可以开始着手处理主要任务：转换 Bouncy Beast 项目。这个项目将作为示例，展示您可能遇到的问题以及如何修复或规避这些问题。显然，我无法提供所有可能问题的解决方案。\n\
    \nBouncy Beast 项目在设计时就考虑到了移植到 Android 平台，不过实际上我唯一做的就是避免依赖 Apple 以及第三方框架。具体来说，第三方框架可能会带来问题。您应先在\
    \ SpriteBuilder 论坛上询问特定框架是否与 Android 插件兼容。如果没人知道，您应该像刚才创建的那个项目一样，将其集成到一个简单的测试应用中。先让该框架的基本功能（例如成功登录）正常运行，然后尝试为\
    \ Android 构建它，并记录下所有错误。\n\nApple 的框架通常得到广泛支持，但有些可能根本无法在 Android 上使用，另一些则可能缺少一两个功能。框架越依赖于硬件，其可移植性就越低。\n\
    \n转换的起点可以在`15 - Prior to making Android-specific fixes`文件夹中找到。其中包含一个已更新至 SpriteBuilder\
    \ v1.3 格式的项目，该格式是向 Android 发布项目所必需的。\n\n## 修复编译器错误\n\n假设您最初是使用 SpriteBuilder v1.3\
    \ 或更高版本创建的 LearnSpriteBuilder 项目，那您现在就可以打开`LearnSpriteBuilder.spritebuilder`项目了。如果您不确定创建项目时使用的是哪个\
    \ SpriteBuilder 版本，也可以使用`14 - Prior to making Android-specific fixes`项目，该项目与之前的`13\
    \ - Animations and Effects`项目相同，只是已升级到 v1.3 格式。\n\n现在，转到`File` ![image](img/00008.jpeg)\
    \ `Project Settings`，确认 Android 平台已包含在发布目标中。否则，Android 目标将缺少所有资源文件。然后，为了确保万无一失，请使用`File`\
    \ ![image](img/00008.jpeg) `Clean Cache`，然后使用`File` ![image](img/00008.jpeg) `Publish`重新发布所有文件。这可能需要一两分钟。\n\
    \n发布完成后，打开`LearnSpriteBuilder.xcodeproj`项目。选择 LearnSpriteBuilder iOS scheme（如\
    \ Figure 13-11 所示）和任意 iOS 设备。构建并运行。这仅仅是为了确认项目在 iOS 上确实能正常工作。如果 iOS 构建已经失败，那么尝试\
    \ Android 构建就没有意义了。\n\n一旦 iOS 构建成功运行，选择`LearnSpriteBuilder Android` scheme 和一个\
    \ Android 设备。再次参考 Figure 13-11。尝试运行项目。如果您使用的是本书提供的项目之一，而不是自己创建的项目，那么构建可能会更早地失败。简化的错误信息将是：\n\
    \n```\nPrefix.pch:12:9: 'UIKit/UIKit.h' file not found\n```\n\n`UIKit`框架在 Android\
    \ 上不可用，因为 Android 使用了一个完全不同的用户界面框架。但是，我不记得在代码中任何地方引用过`UIKit`类。事实证明，`UIKit`引用是由早期版本的\
    \ SpriteBuilder 创建的 Xcode 项目引入的。在最新的 SpriteBuilder v1.3 测试版中，已经不再引用`UIKit`。\n\n\
    唉，如果您需要修复这个或类似的 iOS 框架头文件问题，您将不得不使用特定于平台的宏来防止 iOS 框架头文件在除 iOS 之外的任何平台上被导入。更新`Prefix.pch`文件，该文件位于`Supporting\
    \ Files`组中，使其看起来像 Listing 13-4 中所示（更改部分已高亮显示）。\n\n***Listing 13-4***. 当构建目标不是\
    \ iOS 时，避免导入 UIKit 头文件\n\n```\n#import <Availability.h>\n\n#ifdef __OBJC__\n#if\
    \ __CC_PLATFORM_IOS\n#import <UIKit/UIKit.h>\n#endif\n#import <Foundation/Foundation.h>\n\
    #import \"cocos2d.h\"\n#import \"cocos2d-ui.h\"\n#endif\n```\n\nCocos2d 提供了三个宏，允许您根据目标平台包含或排除代码的编译：\n\
    \n```\n__CC_PLATFORM_IOS\n__CC_PLATFORM_MAC\n__CC_PLATFORM_ANDROID\n```\n\n当为特定平台构建时，只有一个宏的值为`1`（即为真）。其他宏的值将为假。针对\
    \ iOS 和 Android 特定代码的典型切换如 Listing 13-5 所示。\n\n***Listing 13-5***. 基于目标平台的条件代码编译\n\
    \n```\n#if __CC_PLATFORM_IOS\n// iOS specific code here\n#elif __CC_PLATFORM_ANDROID\n\
    // Android specific code here\n#endif\n```\n\n再次尝试构建。您将会看到一个不明确的错误：\n\n```\nGameMenuLayer.m:49:38:\
    \ Expected a type\n```\n\n`GameMenuLayer.m`中有问题的行是 Listing 13-6 中方法的签名。\n\n***Listing\
    \ 13-6***. 什么意外的类型？\n\n```\n-(void) applicationWillResignActive:(UIApplication\
    \ *)application\n{\n    [self shouldPauseGame];\n}\n```\n\n如果您仔细看，您会注意到 Xcode\
    \ 用红色下划线标出了`UIApplication`关键字的开头。这就是错误所在。所以很明显，`UIApplication`在 Android 上也不可用。这是有道理的，因为\
    \ Android 使用不同的启动机制。由于这个方法并非至关重要（它在应用进入后台时暂停游戏），我们暂且通过添加 Listing 13-7 中高亮显示的行，将整个方法排除在\
    \ Android 构建之外。\n\n***Listing 13-7***. 在 Android 上忽略这个方法\n\n```\n#if __CC_PLATFORM_IOS\n\
    -(void) applicationWillResignActive:(UIApplication *)application\n{\n    [self\
    \ shouldPauseGame];\n}\n#endif\n```\n\n在稍后的阶段，您将需要在`LearnSpriteBuilderActivity`类中实现`applicationWillResignActive:`方法相应的等效方法。等效的方法是`onPause`方法。目前，更重要的是让应用在设备上运行。完成此修复后，编译问题应该会清除，应用应该会传输到设备上。\n\
    \n## 修复启动问题\n\n当您让项目成功编译并传输后，您就接近成功了。现在可能是个好时机，开始担心最糟糕的启动问题：黑屏、应用无响应、日志中没有指示。\n\
    \n如果这发生在您身上，缩小问题范围的最佳方法是添加`NSLog`语句。从`LearnSpriteBuilderActivity.m`中的`startScene`方法开始，如\
    \ Listing 13-8 所示。\n\n***Listing 13-8***. 记录第一个场景的启动是个好主意\n\n```\n- (CCScene *)startScene\n\
    {\n    NSLog(@\"startScene\");\n    return [CCBReader loadAsScene:@\"MainScene\"\
    ];\n}\n```\n\n如果这没有记录任何内容，您就知道问题与应用初始化有关。在这种情况下，您应该在 SpriteBuilder 论坛上发布完整的日志以寻求帮助。这类问题应该很少见。根据我的发现，这类问题可能与`开发者选项`有关——就我而言，我必须启用`OpenGL\
    \ 跟踪`和`保持唤醒`模式才能解决启动问题。\n\n在这个案例中，项目应该正常启动，直到引发一个 Java 异常，该异常会打印到日志中，并附带一个（在此特定情况下，几乎没什么用的）调用栈。错误信息复制如下：\n\
    \n```\nW/System.err(17501): java.io.FileNotFoundException: Audio/menu-music.m4a\n\
    W/System.err(17501):     at android.content.res.AssetManager.openAssetFd(Native\
    \ Method)\nW/System.err(17501):     at android.content.res.AssetManager.openFd(AssetManager.java:332)\n\
    W/System.err(17501):     at dalvik.system.NativeStart.run(Native Method)\n```\n\
    \n信息很明确：这是一个文件未找到异常。它找不到`Audio/menu-music.m4a`文件。快速检查 Xcode 中`Resources`组内的`Published-Android`文件夹，发现\
    \ Android 的音频文件已被转换为`ogg`格式，而不是`m4a`格式。\n"
- fmt: '音频资源会自动解析为每个平台正确的文件扩展名，前提是你使用与添加到 `SpriteBuilder` 的原始资源文件相同的扩展名。在这种情况下，它应该是
    `menu-music.wav`，而对于所有其他音频文件，你需要使用 `.wav` 扩展名，因为所有音频文件都是作为 `.wav` 文件添加到 `SpriteBuilder`
    中的。


    Java 异常不会指示错误发生在哪个文件和哪行代码。这可能会给查找异常来源带来一些麻烦，但在这种情况下，它允许你在项目中搜索 `menu-music` 字符串：按下
    `Cmd+Shift+F` 在所有项目文件中搜索字符串。


    你会在 `MainScene.m` 的 `didLoadFromCCB` 方法中找到对这段音乐的引用。将音频文件的扩展名更改为 `.wav`，如[代码清单
    13-9](#part0024.html#list9) 所示。


    [***代码清单 13-9***](#part0024.html#_list9). 根据平台播放正确的音频文件需要使用音频文件的原始扩展名


    ```

    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];

    [audio playBg:@"Audio/menu-music.wav" loop:YES];

    ```


    另一种方法是暂时注释掉这一行。播放音乐或特效对于应用的运行并非至关重要。当你第一次尝试将应用移植到 Android 时，你应该记录下这些次要问题，注释掉相关代码，并继续寻找真正有问题的部分。许多任务，比如音频播放，应该在以后修复更严重的问题（如果有的话）之后再处理。同样，当应用暂停时不显示暂停菜单也是如此——目前没有它应用也能正常运行。


    **注意** `ObjectAL` 的 `playBg` 和 `playEffect` 命令还有其他用途——例如，在 `SceneManager` 类的 `presentGameSceneWithMusic`
    方法中。它们也可能导致异常——例如，在加载关卡时。我相信你现在知道如何处理了。只需应用原始的 `.wav` 扩展名，如[代码清单 13-9](#part0024.html#list9)
    所示。


    实施该修复（或注释掉 `playBg` 这一行）后，应用应该能够构建、传输、启动，并呈现游戏的菜单屏幕，包括你之前添加到菜单中的所有效果。请亲自查看[图 13-16](#part0024.html#Fig16)。


    ![9781484202630_Fig13-16.jpg](images/00205.jpeg)


    [图 13-16](#part0024.html#_Fig16). `Bouncy Beast` 成功在 Android 设备上启动，呈现菜单屏幕


    ## 修复布局问题


    当你首次在 Android 上运行应用时，界面可能不会像在 iOS 设备上那样整洁。具体来说，不同的屏幕分辨率可能会导致意外问题。


    这类问题的典型表现是，当你点击主菜单上的“开始游戏”按钮时，关卡选择滚动视图会发生偏移，如[图 13-17](#part0024.html#Fig17) 所示。


    ![9781484202630_Fig13-17.jpg](images/00206.jpeg)


    [图 13-17](#part0024.html#_Fig17). 在 1920x1080 像素分辨率的设备上，关卡选择滚动视图发生了偏移


    如果你打开 `MainScene.ccb` 并选择 `CCScrollView` 节点，你会注意到在“属性”窗格中，滚动视图的“内容大小”被设置为一个固定的点值：440x290（像素为
    880x580）。


    我测试用的 Android 设备分辨率为 1920x1080 像素，而 iPhone 5 的分辨率为 1136x640 像素。因此，滚动视图的内容大小在 Android
    设备上占据了屏幕更小的部分，这最终导致了位置偏移。


    修复方法非常简单：选中 `CCScrollView`，将其“内容大小类型”改为 `%`（百分比），并保留数值不变。数值将变为 77.5% 和 90.6%。发布并运行项目，滚动视图在此设备以及其他屏幕大于
    iPhone 的设备上就会恢复正常。


    当你发现某个节点的位置与在 iOS 上不同时，检查是否可通过使用百分比定位或百分比内容大小来解决问题，这总是一个好主意。但是，请务必在 iOS 上验证此类更改，以防更改仅仅是将问题从一个平台转移到了另一个平台。


    ## 隔离问题


    现在，我可以向你介绍更多我遇到的其他问题——比如在向 `Trigger` 类的 `NSPointerArray` 添加指针时发生的冻结——但它们并不具有代表性。毕竟，我使用的是
    `SpriteBuilder`、`Cocos2D` 和 Android 插件的测试版。例如，`NSPointerArray` 的 bug 后来已经被修复了。


    但你总是有可能遇到一个你认为可能不是自己代码错误导致的 bug。


    在这种情况下，最好在隔离环境中验证问题。这意味着像之前一样创建一个新的 `SpriteBuilder` 项目，然后尝试查看相同的节点设置是否会导致同样的问题。如果是，你可以将该项目打包成
    zip 文件，提交到论坛或 GitHub 的 issue 报告中。这对于 `SpriteBuilder` 和 `Cocos2D` 的开发者来说将非常有帮助，他们可以据此为你提供修复或解决方案。


    另一方面，如果你无法在隔离环境中重现该问题，那么问题更可能特定于你的应用、其代码、设置和资源。在这种情况下，你应该采取另一种方法：复制一份你的项目。（在复制之前，请关闭
    `SpriteBuilder` 和 `Xcode`。）然后编辑项目，移除任何不相关的部分、CCB 文件和代码。


    这样做后，要么你会得到一个能复现问题的最小化应用，你可以将其作为可测试示例提交；要么你会发现在移除或禁用项目的特定部分后问题消失了。这将是一个明确的指示，表明问题就出在你最后移除的那个区域、那段代码或那个
    CCB 文件中。然后，你应该将该部分添加回项目，看看问题是否再次出现。现在，你可以专注于项目的某个特定方面，并通过重复移除/禁用项目部分的过程来缩小搜索范围。


    无论如何，只需在 `SpriteBuilder` 论坛上发帖，就能获得帮助。


    ## 何时移植到 Android


    将项目移植到 Android 的最佳时机要么是从一开始，要么是在你的应用发布到 iOS App Store 并取得足够成功，值得投入精力创建 Android
    移植版本之后。在项目中途改变方向意义不大。


    ### 在 iOS 上发布后进行移植


    我向任何 Android 开发新手推荐这种方法，因为它能增加你成功在一个平台上发布项目的几率——这本身已是一项具有挑战性的任务。这么多有趣的游戏最终未能发布，就是因为开发者失去兴趣，或遇到阻碍性问题而放弃。在你处理最初几个项目时就担心第二个平台，必须被视为有害的做法。这会增加你的工作量，并阻碍你实现发布应用的初衷。


    而且，如果应用未在 iOS 平台上证明是成功的，那么将其移植到 Android 又有什么意义呢？这正是我的想法。作为一名经验丰富的开发者，至少你可以根据早期应用的成功和失败来推断下一个应用成功可能性，并基于以往的经验进行构建。


    在 iOS 发布后进行移植的缺点是，一旦你有了一个完整的、但从未在 Android 上测试运行过的应用，最初让它能在 Android 上运行可能会更加困难。我理解这对于初学者来说尤其困难。


    所有你之前不必做的跨平台决策，都会一下子找上门来。对于这种情况，我只能建议你坚持下去。一次解决一个问题，无论问题看起来多么微小。每一个修复都会让你离目标更近一步。'
  raw: 'Audio resources will automatically resolve to the correct file extension for
    each platform if you use the same extension as the original resource file that
    was added to SpriteBuilder. In this case, it would be *menu-music.wav*, and for
    all other audio files you need to use the .*wav* extension as well, since all
    audio files were added to SpriteBuilder as .wav files.


    The Java exception doesn’t indicate what file and line of code the error occurred
    on. That can create a little problem finding the source of an exception, but in
    this case it allows you to search the project for the *menu-music* string: press
    Cmd+Shift+F to search for a string in all project files.


    You’ll find the music is referenced in *MainScene.m*, in the didLoadFromCCB method.
    Change the audio file’s extension to .wav, as shown in [Listing 13-9](#part0024.html#list9).


    [***Listing 13-9***](#part0024.html#_list9). Playing the correct audio file based
    on the platform requires using the audio file’s original extension


    ```

    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];

     [audio playBg:@"Audio/menu-music. wav" loop:YES];

    ```


    The alternative is to just comment out the line for now. Playing music or effects
    isn’t crucial for the app to work. When this is your first attempt to port your
    app to Android, you should make notes of such minor issues, comment out the code,
    and keep looking for truly problematic issues. Many tasks, like audio playback,
    should be fixed at a later time, after you’ve fixed worse problems (if there are
    any). The same goes for not bringing up the pause menu when the app is paused—again,
    the app will function fine without it for now.


    **Note**  There are other uses of the ObjectAL playBg and playEffect commands—for
    example, in the presentGameSceneWithMusic method in the SceneManager class. They
    may cause exceptions as well—for instance, when loading a level. I’m confident
    that you now know how to handle it. Just apply the original .wav extension as
    in [Listing 13-9](#part0024.html#list9).


    With that fix implemented (or the playBg line commented out), the app should build,
    transfer, launch, and present you the game’s menu screen, including all the effects
    you’ve added to the menu earlier. See for yourself in [Figure 13-16](#part0024.html#Fig16).


    ![9781484202630_Fig13-16.jpg](images/00205.jpeg)


    [Figure 13-16](#part0024.html#_Fig16). Bouncy Beast launched successfully on an
    Android device, presenting the menu screen


    Fixing Layout Issues


    When you run an app on Android for the first time, things may not always look
    as neat as they did on the iOS devices. Specifically, the varying screen resolutions
    can cause unexpected issues.


    Representative of issues of this kind is what happens when you tap the play button
    on the main menu. The level selection scroll view is offset as seen in [Figure
    13-17](#part0024.html#Fig17).


    ![9781484202630_Fig13-17.jpg](images/00206.jpeg)


    [Figure 13-17](#part0024.html#_Fig17). The level selection scroll view is offset
    on a 1920x1080 pixel resolution device


    If you open *MainScene.ccb* and select the *CCScrollView* node, you’ll notice
    that on the *Item Properties* pane the scroll view’s *Content size* is set to
    a fixed size in points: 440x290 (880x580 in pixels).


    The Android device I’m testing on has a resolution of 1920x1080 pixels, while
    an iPhone 5 has a resolution of 1136x640 pixels. Hence, the content size of the
    scroll view takes up a much smaller portion of the screen on the Android device,
    which ends up causing a position offset.


    The fix is tremendously simple: with the *CCScrollView* selected, change its *Content
    size types* to % and leave the values unmodified. The values will change to 77.5%
    and 90.6%. Publish and run the project, and the scroll view will be fine again
    on this and other devices with larger-than-iPhone screens.


    When you find a node at a position different than it was on iOS, it’s always a
    good idea to check whether % position or % content size will fix the problem.
    However, be sure to verify such changes on iOS, just in case the change merely
    shifted the problem from one platform to the other.


    Isolating Issues


    Now I could tell you a bit more about several other problems I’ve encountered—such
    as a freeze that occurred when adding a pointer to the Trigger class’ NSPointerArray—but
    they aren’t really representative. After all, I was using beta versions of SpriteBuilder,
    Cocos2D, and the Android plugins. The NSPointerArray bug, for instance, has since
    been fixed.


    But there is always a chance that you run into a bug that you suspect may not
    be your fault.


    In that case, it’s best to verify the problem in isolation. This means creating
    a new SpriteBuilder project as you did earlier, and then trying to see if the
    same setup of nodes causes the same issue. If it does, you can zip up that project
    and submit it on the forum or in a github issue report. This will be tremendously
    helpful for the SpriteBuilder and Cocos2D developers in their efforts to provide
    you with a fix or workaround.


    On the other hand, if you can’t reproduce the issue in isolation, it’s more likely
    that the problem is specific to your app, its code, settings, and resources. You
    should take another approach in that case: Make a copy of your project. (Close
    SpriteBuilder and Xcode before you do so.) Then edit the project by removing any
    unrelated parts, CCBs, and code.


    You either get to a relatively minimal app that produces the problem, which you
    can submit as a testable example, or you’ll find the problem goes away after removing
    or disabling a specific part of the project. That would be a clear indicator that
    the problem is within that area, the piece of code, or the CCB file that you last
    removed. You should then add that part back into your project to see if the problem
    surfaces again. You can now focus on a specific aspect of your project and narrow
    down your search by repeating the process of removing/disabling parts of the project.


    In any case, help is just one SpriteBuilder forum post away.


    When to Port to Android


    The best times to port a project to Android is either right from the beginning
    or after your app is published to the iOS App Store and becomes successful enough
    to warrant the effort to create an Android port. It makes little sense to change
    course midway through a project.


    Porting After Publishing on iOS


    This approach is what I recommend to anyone new to Android development because
    it increases your chances of successfully publishing the project on one platform—a
    challenging task in itself. So many interesting games don’t get published at all
    because developers lose interest or run into a blocking issue and give up. Having
    to worry about a second platform while tackling your first few projects has to
    be considered harmful. It increases your workload and deters you from the goal
    of publishing an app in the first place.


    And what point is there in porting an app to Android if it hasn’t been proven
    to be successful on the iOS platform? My thoughts exactly. As an experienced developer,
    at least you can extrapolate the next app’s likelihood of success from your earlier
    app’s successes and failures and build on your previous experiences.


    The downside of porting after an iOS release is that once you do have a complete
    app that’s never been tested to run on Android, it will likely be more difficult
    to get it initially working on Android. Which I understand is increasingly more
    difficult in particular for beginning developers.


    Every cross-platform decision you didn’t have to make thus far will come to haunt
    you all at once. The only advice I can give for such cases is to push through.
    Tackle one problem at a time, as tiny as it may seem. Every fix gets you closer
    to the goal.'
  trans: '

    音频资源会自动解析为每个平台正确的文件扩展名，前提是你使用与添加到 `SpriteBuilder` 的原始资源文件相同的扩展名。在这种情况下，它应该是 `menu-music.wav`，而对于所有其他音频文件，你需要使用
    `.wav` 扩展名，因为所有音频文件都是作为 `.wav` 文件添加到 `SpriteBuilder` 中的。


    Java 异常不会指示错误发生在哪个文件和哪行代码。这可能会给查找异常来源带来一些麻烦，但在这种情况下，它允许你在项目中搜索 `menu-music` 字符串：按下
    `Cmd+Shift+F` 在所有项目文件中搜索字符串。


    你会在 `MainScene.m` 的 `didLoadFromCCB` 方法中找到对这段音乐的引用。将音频文件的扩展名更改为 `.wav`，如代码清单 13-9
    所示。


    ***代码清单 13-9***. 根据平台播放正确的音频文件需要使用音频文件的原始扩展名


    ```

    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];

    [audio playBg:@"Audio/menu-music.wav" loop:YES];

    ```


    另一种方法是暂时注释掉这一行。播放音乐或特效对于应用的运行并非至关重要。当你第一次尝试将应用移植到 Android 时，你应该记录下这些次要问题，注释掉相关代码，并继续寻找真正有问题的部分。许多任务，比如音频播放，应该在以后修复更严重的问题（如果有的话）之后再处理。同样，当应用暂停时不显示暂停菜单也是如此——目前没有它应用也能正常运行。


    **注意** `ObjectAL` 的 `playBg` 和 `playEffect` 命令还有其他用途——例如，在 `SceneManager` 类的 `presentGameSceneWithMusic`
    方法中。它们也可能导致异常——例如，在加载关卡时。我相信你现在知道如何处理了。只需应用原始的 `.wav` 扩展名，如代码清单 13-9 所示。


    实施该修复（或注释掉 `playBg` 这一行）后，应用应该能够构建、传输、启动，并呈现游戏的菜单屏幕，包括你之前添加到菜单中的所有效果。请亲自查看图 13-16。


    ![9781484202630_Fig13-16.jpg](img/00205.jpeg)


    图 13-16. `Bouncy Beast` 成功在 Android 设备上启动，呈现菜单屏幕


    ## 修复布局问题


    当你首次在 Android 上运行应用时，界面可能不会像在 iOS 设备上那样整洁。具体来说，不同的屏幕分辨率可能会导致意外问题。


    这类问题的典型表现是，当你点击主菜单上的“开始游戏”按钮时，关卡选择滚动视图会发生偏移，如图 13-17 所示。


    ![9781484202630_Fig13-17.jpg](img/00206.jpeg)


    图 13-17. 在 1920x1080 像素分辨率的设备上，关卡选择滚动视图发生了偏移


    如果你打开 `MainScene.ccb` 并选择 `CCScrollView` 节点，你会注意到在“属性”窗格中，滚动视图的“内容大小”被设置为一个固定的点值：440x290（像素为
    880x580）。


    我测试用的 Android 设备分辨率为 1920x1080 像素，而 iPhone 5 的分辨率为 1136x640 像素。因此，滚动视图的内容大小在 Android
    设备上占据了屏幕更小的部分，这最终导致了位置偏移。


    修复方法非常简单：选中 `CCScrollView`，将其“内容大小类型”改为 `%`（百分比），并保留数值不变。数值将变为 77.5% 和 90.6%。发布并运行项目，滚动视图在此设备以及其他屏幕大于
    iPhone 的设备上就会恢复正常。


    当你发现某个节点的位置与在 iOS 上不同时，检查是否可通过使用百分比定位或百分比内容大小来解决问题，这总是一个好主意。但是，请务必在 iOS 上验证此类更改，以防更改仅仅是将问题从一个平台转移到了另一个平台。


    ## 隔离问题


    现在，我可以向你介绍更多我遇到的其他问题——比如在向 `Trigger` 类的 `NSPointerArray` 添加指针时发生的冻结——但它们并不具有代表性。毕竟，我使用的是
    `SpriteBuilder`、`Cocos2D` 和 Android 插件的测试版。例如，`NSPointerArray` 的 bug 后来已经被修复了。


    但你总是有可能遇到一个你认为可能不是自己代码错误导致的 bug。


    在这种情况下，最好在隔离环境中验证问题。这意味着像之前一样创建一个新的 `SpriteBuilder` 项目，然后尝试查看相同的节点设置是否会导致同样的问题。如果是，你可以将该项目打包成
    zip 文件，提交到论坛或 GitHub 的 issue 报告中。这对于 `SpriteBuilder` 和 `Cocos2D` 的开发者来说将非常有帮助，他们可以据此为你提供修复或解决方案。


    另一方面，如果你无法在隔离环境中重现该问题，那么问题更可能特定于你的应用、其代码、设置和资源。在这种情况下，你应该采取另一种方法：复制一份你的项目。（在复制之前，请关闭
    `SpriteBuilder` 和 `Xcode`。）然后编辑项目，移除任何不相关的部分、CCB 文件和代码。


    这样做后，要么你会得到一个能复现问题的最小化应用，你可以将其作为可测试示例提交；要么你会发现在移除或禁用项目的特定部分后问题消失了。这将是一个明确的指示，表明问题就出在你最后移除的那个区域、那段代码或那个
    CCB 文件中。然后，你应该将该部分添加回项目，看看问题是否再次出现。现在，你可以专注于项目的某个特定方面，并通过重复移除/禁用项目部分的过程来缩小搜索范围。


    无论如何，只需在 `SpriteBuilder` 论坛上发帖，就能获得帮助。


    ## 何时移植到 Android


    将项目移植到 Android 的最佳时机要么是从一开始，要么是在你的应用发布到 iOS App Store 并取得足够成功，值得投入精力创建 Android
    移植版本之后。在项目中途改变方向意义不大。


    ### 在 iOS 上发布后进行移植


    我向任何 Android 开发新手推荐这种方法，因为它能增加你成功在一个平台上发布项目的几率——这本身已是一项具有挑战性的任务。这么多有趣的游戏最终未能发布，就是因为开发者失去兴趣，或遇到阻碍性问题而放弃。在你处理最初几个项目时就担心第二个平台，必须被视为有害的做法。这会增加你的工作量，并阻碍你实现发布应用的初衷。


    而且，如果应用未在 iOS 平台上证明是成功的，那么将其移植到 Android 又有什么意义呢？这正是我的想法。作为一名经验丰富的开发者，至少你可以根据早期应用的成功和失败来推断下一个应用成功可能性，并基于以往的经验进行构建。


    在 iOS 发布后进行移植的缺点是，一旦你有了一个完整的、但从未在 Android 上测试运行过的应用，最初让它能在 Android 上运行可能会更加困难。我理解这对于初学者来说尤其困难。


    所有你之前不必做的跨平台决策，都会一下子找上门来。对于这种情况，我只能建议你坚持下去。一次解决一个问题，无论问题看起来多么微小。每一个修复都会让你离目标更近一步。

