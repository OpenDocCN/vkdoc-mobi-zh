    ## 使用位图字体


    在这个游戏中，得分标签并没有太好的用途，但我们可以统计玩家受到高冲击力打击的次数。纯粹为了演示目的。同时也为了展示如何在运行时修改本地化文本。


    首要任务是，在 SpriteBuilder 中打开`GameMenuLayer.ccb`。你可以在`UserInterface`文件夹中找到它。从“节点库视图”（Node
    Library View）中，将一个“Label BM-Font”（标签-位图字体）节点拖放到舞台上。


    编辑该标签的属性——具体来说，将位置类型（position type）设置为百分比（%），值设为 99x99，这样标签会位于右上角。为了方便将标签与屏幕边界对齐，将“锚点”（Anchor
    point）的两个值都改为 1。这会将标签从部分位于屏幕外移动到完全位于屏幕内。在排列位图字体标签时，使用“锚点”非常有效。你可能已经注意到，`CCLabelBMFont`的属性不提供任何文本对齐属性，如图
