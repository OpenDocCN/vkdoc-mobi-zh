    你可以通过发布和运行应用来测试它。如果指定关卡中的玩家看起来冻结在原地，则说明你已经成功替换了它。目前玩家不会移动，因为它尚未启用物理效果。


    #### 添加中心和圆周主体


    可以说，这个新玩家需要一个柔软的外壳。与其使用一个大的圆形形状，不如使用几个较小的圆形主体来逼近圆形形状。我称之为*圆周主体*。对于这个玩家的大小，总共需要八个圆周主体，再加上一个中心主体。


    中心主体很容易。从`Node Library View`拖放一个节点到舞台上。将节点位置编辑为 `32x32`，使其居中于玩家图像上。然后切换到`Item
    Physics`选项卡，并勾选`Enable Physics`复选框。将形状类型更改为 `Circle`，并将`Corner radius`设置为 `10`。同时，取消勾选
    `Allows rotation`。


    **注意** 软体的各个主体不需要也不应该绕着自己的轴旋转。任何旋转都将来自施加于整个主体的合力，通过主体间的碰撞以及关节来传递。


    现在编辑回调和碰撞属性。`Collision`类型应设置为 `player`，同时在`Categories`字段中也输入 `player`。在`Masks`字段中，输入（不带引号）：“`trigger,
    border, obstacle, spring, player`”。请注意，现在 `player` 是遮罩的一部分，因为构成玩家新软体的各个主体也应该相互碰撞，这既是为了相互传递力，也是为了防止圆周主体被推入或越过中心主体。


    选中中心节点后，复制（`Cmd+C`）并粘贴（`Cmd+V`）该节点八次，这样你总共得到九个节点，每个节点都启用了物理效果，并且具有与初始节点相同的属性。你可能希望在时间轴中将第一个节点重命名为
    `center`，以便知道哪一个是中心节点。这一点至关重要，因为你将要编写的代码假定中心节点是根节点的第一个子节点。如果不是，你可以在时间轴中拖动节点以重新排序。


    你还应该重命名时间轴中的其他节点，以突出它们在圆周上的位置。以下描述假设第一个节点在右侧，并且节点按顺时针方向排列。因此，节点名称应为：`right`，`bottom-right`，`bottom`，`bottom-left`，`left`，`top-left`，`top`，`top-right`。请参阅图
    10-2 以查看 `SoftBodyPlayer.ccb` 的时间轴当前应如何显示。


    ![9781484202630_Fig10-02.jpg](img/00145.jpeg)


    图 10-2. 玩家的中心和圆周节点


    #### 查找圆周上的点


    现在第一个问题来了：将节点定位在圆周上。`right`、`left`、`top` 和 `bottom` 节点相当容易，但其他节点呢？近似值可能就足够了，但节点的位置应该等距分布；否则，主体将无法均匀滚动和旋转。特别是如果你想创建一个更大的主体，甚至可能需要超过八个主体来构成圆周。那么，你如何确定圆周上主体（或点）的位置呢？


    事实证明，这只需要对特定角度应用 `sin` 和 `cos`，然后乘以圆的半径，即可得到圆周上一点的 x、y 坐标。你将编写一个简单的方法，用于打印给定数量点均匀分布在圆周上的位置。


    在 Xcode 中打开 `SoftBodyDrawNode.m`。在 `@implementation` 和 `@end` 行之间添加代码清单 10-1 中的代码。


    ***代码清单 10-1***. *将圆周上点的位置打印到 Xcode 控制台*


    ```

    -(void) didLoadFromCCB

    {

        [self logPointsOnCircleWithRadius:30

                                   origin:CGPointMake(32, 32)

                                numPoints:8];

    }


    -(void) logPointsOnCircleWithRadius:(CGFloat)radius

                                 origin:(CGPoint)origin

                              numPoints:(int)numPoints

    {

        CGFloat deltaAngle = 360.0 / numPoints;

        CGFloat angle = 360.0;


    for (int i = 1; i <= numPoints; i++)

        {

            CGPoint pos = CGPointMake(

                            origin.x + radius * cos(CC_DEGREES_TO_RADIANS(angle)),

                            origin.y + radius * sin(CC_DEGREES_TO_RADIANS(angle)));

            NSLog(@"circumference point %i: {%.1f, %.1f} (angle: %.1f)”,

                  i, pos.x, pos.y, angle);


    angle -= deltaAngle;

        }

    }

    ```


    此示例中的 `deltaAngle` 将为 `45`，表示点需要分布在 45 度角上。`angle` 属性设置为 `360`，并将递减到 `0`。这将按顺时针顺序打印点。如果你想要逆时针顺序，只需将
    `angle` 变量从 `0` 向上计数即可。


    ```'
- fmt: "`for`循环枚举每个点。循环计数器`i`仅用于在日志中打印点的编号。用于确定圆周上点的实际计算公式以伪代码形式编写，如[***清单 10-2***](#part0020.html#list2)所示。\n\
    \n[***清单 10-2***](#part0020.html#_list2). 算法：在给定半径和弧度角度的情况下确定圆上的点\n\n```\nx =\
    \ radius * cos(angle);\ny = radius * sin(angle);\n```\n\n此计算要求`angle`以弧度而非度数为单位。因此，你需要使用\
    \ Cocos2D 内置宏`CC_DEGREES_TO_RADIANS(angle)`进行转换，该宏接受一个以度数为单位的角度，返回以弧度为单位的角。当然，也存在一个执行反向转换的配套宏：`CC_RADIANS_TO_DEGREES(angle)`。\n\
    \n[***清单 10-2***](#part0020.html#list2)中的代码返回一个相对于圆心的位置。换言之，假设圆的中心位于位置`0x0`。由于对于玩家角色而言，圆以玩家图像为中心位于位置`32x32`，因此最终的`x`/`y`坐标需要根据圆的实际中心位置进行偏移。[***清单\
    \ 10-1***](#part0020.html#list1)中的`NSLog`行只打印小数点后一位，如`%.1f`格式字符串所示。这足以满足我们的精度要求。\n\
    \n如果现在运行项目，圆上点的所需位置将打印到 Xcode 控制台。请参见[***清单 10-3***](#part0020.html#list3)。\n\n\
    ***[清单 10-3](#part0020.html#_list3).*** *[***清单 10-1***](#part0020.html#list1)中代码的输出。半径为\
    \ 30、中心在 32x32 的圆上的点*\n\n```\ncircumference point 1: {62.0, 32.0} (angle: 360.0)\n\
    circumference point 2: {53.2, 10.8} (angle: 315.0)\ncircumference point 3: {32.0,\
    \ 2.0} (angle: 270.0)\ncircumference point 4: {10.8, 10.8} (angle: 225.0)\ncircumference\
    \ point 5: {2.0, 32.0} (angle: 180.0)\ncircumference point 6: {10.8, 53.2} (angle:\
    \ 135.0)\ncircumference point 7: {32.0, 62.0} (angle: 90.0)\ncircumference point\
    \ 8: {53.2, 53.2} (angle: 45.0)\n```\n\n**注意**  你可能想知道为什么半径是 30 而不是 32。这与刚性玩家角色的碰撞半径相同。但请记住，每个周界体本身代表一个圆形形状，这实际上会增加玩家角色的碰撞半径。如果有什么区别的话，周界节点位置的半径应该小于之前的碰撞半径。但事实证明，折衷更好。与之前的刚体版本相比，允许玩家角色的总尺寸增大，有助于更好地说明软体物理的设计和最终效果。物体越小，就越难使其变得柔软*且*稳定。\n\
    \n### 定位圆周上的节点\n\n现在你可以获取[***清单 10-3***](#part0020.html#list3)中的位置，并以顺时针方向将其应用到从右到右上角的节点上。名为*right*的节点位置应为`62x32`，节点*bottom-right*应位于`53.2x10.8`，节点*bottom*应位于`32x2`，依此类推。通过选中从中心到右上角的所有节点，验证节点位置是否正确更新。这将产生与[**图\
    \ 10-3**](#part0020.html#Fig3)相同的圆形布局。放大（Cmd +/-）可以更清楚地看到节点之间的相对位置。\n\n![9781484202630_Fig10-03.jpg](images/00146.jpeg)\n\
    \n[**图 10-3**](#part0020.html#_Fig3). 八个周界节点均匀分布在圆上\n\n请注意，现在总共有九个子节点，每个节点都启用了物理特性，均匀分布在玩家角色的精灵上。另外，请注意玩家角色精灵本身（根节点）没有启用物理特性。\n\
    \n还有一点需要注意：如果你切换到*Item Physics*选项卡，选择一个周界节点，然后持续选择当前选中的节点及其相邻的周界节点，你会看到相邻节点的碰撞半径不会重叠。相反，它们之间有一个微小的间隙，如[**图\
    \ 10-4**](#part0020.html#Fig4)所示。这个间隙至关重要！\n\n![9781484202630_Fig10-04.jpg](images/00147.jpeg)\n\
    \n[**图 10-4**](#part0020.html#_Fig4). 通过物理调试绘制高亮显示周界物理体及其圆形形状\n\n如果软体物理对象中的任意两个周界体重叠或接触，整个软体将持续处于不稳定状态。然而，如果间隙太宽，其他物体（无论是软体对象自身的物体，还是链条和绳索元素等外部物体）可能过于容易地穿过软体的外部物体之间，从而导致软体卡住。\n\
    \n[**图 10-4**](#part0020.html#Fig4)还说明了周界体如何放大玩家角色的实际碰撞半径。你稍后将通过使用更大的半径绘制玩家角色的纹理来适应这一点，从而有效地将其缩放。\n\
    \n### 移动和绘制软体玩家角色\n\n如果在启用了物理调试绘制的情况下运行当前状态的项目，你会注意到玩家角色的圆形物体正在下落，仅此而已。玩家角色精灵自身停留在其原始位置，并且你也无法移动玩家角色，因为精灵本身不再具有物理体。你必须将移动力均匀地应用于所有物体，并且必须使用中心节点作为新的玩家角色节点。\n\
    \n#### 移动软体玩家角色\n\n移动更改很快就会实现。在 Xcode 中，打开`GameScene.m`添加一个名为`_softBodyPlayer`的新`BOOL`实例变量，该变量允许你对那些尚未将玩家角色替换为新的软体玩家角色的关卡进行向后兼容。添加[***清单\
    \ 10-4***](#part0020.html#list4)中高亮显示的行。\n\n[***清单 10-4***](#part0020.html#_list4).\
    \ 当玩家角色节点是软体版本时设置的实例变量\n\n```\n@implementation GameScene\n{\n    __weak CCNode*\
    \ _levelNode;\n    __weak CCPhysicsNode* _physicsNode;\n    __weak CCNode* _playerNode;\n\
    \    __weak CCNode* _backgroundNode;\n    __weak GameMenuLayer* _gameMenuLayer;\n\
    \    __weak GameMenuLayer* _popoverMenuLayer;\n\nCGFloat _playerNudgeRightVelocity;\n\
    \    CGFloat _playerNudgeUpVelocity;\n    CGFloat _playerMaxVelocity;\n    BOOL\
    \ _acceleratePlayer;\n\nBOOL _drawPhysicsShapes;\n    BOOL _softBodyPlayer;\n\
    }\n```\n\n然后找到`loadLevelNamed:`方法。替换`loadLevelNamed:`末尾的代码，使方法的末尾看起来像[***清单 10-5***](#part0020.html#list5)。准确地说，需要添加`if`条件，同时将`scrollToTarget:`方法替换为[***清单\
    \ 10-5***](#part0020.html#list5)中的方法。\n\n[***清单 10-5***](#part0020.html#_list5).\
    \ *确定软体玩家角色并* *相应地更新 _playerNode*\n\n```\n-(void) loadLevelNamed:(NSString*)levelCCB\n\
    {\n    // ... previous code omitted\n\n    _playerNode = [_physicsNode getChildByName:@\"\
    player\" recursively:YES];\n\n    // Soft-body player's first child node is the\
    \ actual player sprite\n    if (_playerNode.children.count > 0)\n    {\n     \
    \   CCNode* center = _playerNode.children.firstObject;\n        _playerNode =\
    \ center;\n        _softBodyPlayer = YES;\n    }\n\n    CGPoint offset = (_softBodyPlayer\
    \ ?\n                          _playerNode.parent.positionInPoints : CGPointZero);\n\
    \    [self scrollToTarget:_playerNode withOffset:offset];\n}\n```\n\n如果`_playerNode`有子节点（这仅适用于新的软体玩家对象），则第一个对象将替换`_playerNode`引用。这使得软体玩家角色的中心节点成为新的`_playerNode`。实例变量`_softBodyPlayer`被设置为`YES`，以指示此关卡正在使用软体玩家角色。"
  raw: 'The for loop enumerates each point. The loop counter “i” is used only to print
    out the point’s number in the log. The actual calculation for determining a point
    on a circle’s circumference is written in pseudo-code as shown in [Listing 10-2](#part0020.html#list2).


    [***Listing 10-2***](#part0020.html#_list2). Algorithm to determine a point on
    a circle with a given radius and angle in radians


    ```

    x = radius * cos(angle);

    y = radius * sin(angle);

    ```


    This calculation requires that angle is expressed in radians, not degrees. Hence,
    you perform the conversion using the Cocos2D built-in macro CC_DEGREES_TO_RADIANS(angle),
    which takes an angle in degrees and returns the angle in radians. Of course, a
    companion macro to do the same in reverse also exists: CC_RADIANS_TO_DEGREES(angle).


    The result of the code in [Listing 10-2](#part0020.html#list2) returns a position
    relative to the circle’s origin. In other words, the circle is assumed to have
    its center at position 0x0\. Since, in the case of the player, the circle is centered
    on the player image at position 32x32, the final *x*/*y* coordinates need to be
    offset by the circle’s actual origin position. The NSLog line in [Listing 10-1](#part0020.html#list1)
    prints only one digit after the comma, as indicated by the %.1f format string.
    This is sufficiently accurate for our purposes.


    If you run the project now, the desired locations of the points on the circle
    will be printed to the Xcode console. See [Listing 10-3](#part0020.html#list3).


    ***[Listing 10-3](#part0020.html#_list3).*** *Output of the code in [Listing 10-1](#part0020.html#list1).
    Points on a circle with radius 30 and center at 32x32*


    ```

    circumference point 1: {62.0, 32.0} (angle: 360.0)

    circumference point 2: {53.2, 10.8} (angle: 315.0)

    circumference point 3: {32.0, 2.0} (angle: 270.0)

    circumference point 4: {10.8, 10.8} (angle: 225.0)

    circumference point 5: {2.0, 32.0} (angle: 180.0)

    circumference point 6: {10.8, 53.2} (angle: 135.0)

    circumference point 7: {32.0, 62.0} (angle: 90.0)

    circumference point 8: {53.2, 53.2} (angle: 45.0)

    ```


    **Note**  You may be wondering why the radius is 30 rather than 32\. It’s the
    same collision radius as for the rigid player. But, bearing in mind that each
    circumference body represents a circle shape of its own, this will actually increase
    the collision radius of the player. If anything, the radius for the positions
    of the circumference nodes ought to be less than the previous collision radius.
    But it turned out that it’s better to compromise. Allowing the player’s total
    size to grow compared to the previous rigid-body version serves to better illustrate
    the design and resulting effects of soft-body physics. The smaller an object is,
    the harder it becomes to make it soft *and* stable.


    Positioning Nodes on the Circle’s Circumference


    Now you can take the positions of [Listing 10-3](#part0020.html#list3) and apply
    them to the nodes from right to top-right in clockwise fashion. The position of
    the node named *right* should be 62x32, the node *bottom-right* should be at position
    53.2x10.8, the node *bottom* should be at position 32x2, and so on. Verify that
    you updated the node positions correctly by selecting all nodes from center down
    to top-right. This should give you the same circular layout as shown in [Figure
    10-3](#part0020.html#Fig3). Zoom in (Cmd +/–) to better see the positions of the
    nodes relative to each other.


    ![9781484202630_Fig10-03.jpg](images/00146.jpeg)


    [Figure 10-3](#part0020.html#_Fig3). The eight circumference nodes are positioned
    and distributed evenly in a circle


    Notice that you now have a total of nine child nodes, each with physics enabled,
    distributed evenly on the player’s sprite. Also, note that the player sprite itself
    (the root node) does not have physics enabled.


    One more thing to take note of: if you switch to the *Item Physics* tab, select
    a circumference node, and then keep selecting the currently selected node and
    a neighboring circumference node, you’ll see the collision radius of the neighbors
    do not overlap. Instead, there’s a tiny gap in between them, as shown in [Figure
    10-4](#part0020.html#Fig4). This gap is crucial!


    ![9781484202630_Fig10-04.jpg](images/00147.jpeg)


    [Figure 10-4](#part0020.html#_Fig4). The circumference physics bodies and their
    circle shapes highlighted through physics debug drawing


    If any two circumference bodies in a soft-body physics object overlap or touch,
    the entire soft-body will be in constant unrest. If the gap is too wide, however,
    other bodies (both those on the soft-body object itself and external bodies such
    as the chain and rope elements) may too easily pass in between the soft-body’s
    outer bodies, thus causing the soft body to become stuck.


    [Figure 10-4](#part0020.html#Fig4) also illustrates how the circumference bodies
    enlarge the player’s actual collision radius. You’ll later accommodate this by
    simply drawing the player’s texture using the larger radius, effectively scaling
    it up.


    Moving and Drawing the Soft-Body Player


    If you run the current state of the project with physics debug drawing enabled,
    you’ll notice the player’s circle bodies falling down, and no more. The player
    sprite itself remains at its original location, and you can’t move the player
    either because the sprite itself no longer has a physics body. You will have to
    apply the movement force to all bodies equally, and you’ll have to use the center
    node as the new player node.


    Moving the Soft-Body Player


    The movement changes are quickly implemented. In Xcode, open *GameScene.m* to
    add a new BOOL ivar named _softBodyPlayer that allows you to make the code backward-compatible
    for those levels where you haven’t replaced the player with the new soft-body
    player. Add the line highlighted in [Listing 10-4](#part0020.html#list4).


    [***Listing 10-4***](#part0020.html#_list4). An ivar that is set when the player
    node is the soft-body version


    ```

    @implementation GameScene

    {

        __weak CCNode* _levelNode;

        __weak CCPhysicsNode* _physicsNode;

        __weak CCNode* _playerNode;

        __weak CCNode* _backgroundNode;

        __weak GameMenuLayer* _gameMenuLayer;

        __weak GameMenuLayer* _popoverMenuLayer;


    CGFloat _playerNudgeRightVelocity;

        CGFloat _playerNudgeUpVelocity;

        CGFloat _playerMaxVelocity;

        BOOL _acceleratePlayer;


    BOOL _drawPhysicsShapes;

        BOOL _softBodyPlayer;

    }

    ```


    Then locate the loadLevelNamed: method. Replace the code at the end of loadLevelNamed:
    so that the end of the method looks like [Listing 10-5](#part0020.html#list5).
    To be precise, the if condition needs to be added while the scrollToTarget: method
    is replaced by the one in [Listing 10-5](#part0020.html#list5).


    [***Listing 10-5***](#part0020.html#_list5). *Determining the soft-body player
    and* *updating _playerNode* *accordingly*


    ```

    -(void) loadLevelNamed:(NSString*)levelCCB

    {

        // ... previous code omitted


    _playerNode = [_physicsNode getChildByName:@"player" recursively:YES];


    // Soft-body player''s first child node is the actual player sprite

        if (_playerNode.children.count > 0)

        {

            CCNode* center = _playerNode.children.firstObject;

            _playerNode = center;

            _softBodyPlayer = YES;

        }


    CGPoint offset = (_softBodyPlayer ?

                          _playerNode.parent.positionInPoints : CGPointZero);

        [self scrollToTarget:_playerNode withOffset:offset];

    }

    ```


    If the _playerNode has children, which is only the case for the new soft-body
    player object, the first object replaces the _playerNode reference. This makes
    the soft-body player’s center node the new _playerNode. The _softBodyPlayer ivar
    is set to YES to indicate that this level is using the soft-body player.'
  trans: "\n`for`循环枚举每个点。循环计数器`i`仅用于在日志中打印点的编号。用于确定圆周上点的实际计算公式以伪代码形式编写，如***清单 10-2***所示。\n\
    \n***清单 10-2***. 算法：在给定半径和弧度角度的情况下确定圆上的点\n\n```\nx = radius * cos(angle);\ny =\
