  raw: 'Click the duration box as seen in [Figure 5-2](#part0014.html#Fig2) to edit
    the Timeline duration. Set it to 1 second and 15 frames, or 00:01:15\. This equals
    1.5 seconds since SpriteBuilder plays back animations at 30 frames per second.


    Select the *logoAndButtons* node, and move it just outside the left side of the
    layer. An X position of –20 (in %) will do fine. Then move the Timeline Cursor
    to the far left, and press the P key to create a keyframe. Move the Timeline Cursor
    to the far right, and press P again to create a second keyframe. Edit the *logoAndButtons*
    node position so it has an X position of 50 (in %). This will create a dull, slide-in
    motion, but the good thing is that logo and buttons follow suit.


    To spice up the movement, right-click the Keyframe Segment and select the *Elastic
    Out* easing mode. This will be a bit too bouncy initially. Right-click the Keyframe
    Segment again. With either one of the Elastic or regular Ease modes selected,
    the *Easing Setting* menu item will be enabled; click it to open a tiny popup
    window that allows you to set an ambiguous floating-point value.


    In this case, the value is called *Period*, and it defines how springy the animation
    is. The lower the value is, the more the node will move back and forth before
    coming to rest. In this case, enter a value of ***0.9***, click *Done*, and play
    the animation again. It’s less springy now.


    **Caution**  The *Easing Setting* value will be reset to its default value if
    you change the Keyframe Segment’s easing mode to another easing mode. I’m afraid
    you will have to re-enter the setting value whenever you select another easing
    mode.


    The entry animation can certainly be spiced up some more. A nice effect is to
    scale in the buttons at the appropriate time. Repeat the following steps for both
    the play and settings sprite nodes:


    1.  Select the sprite node (*play* or *settings*).

    2.  Move the Timeline Cursor to about the middle of the timeline.

    3.  Add a Scale keyframe by pressing S. Set both Scale X and Y properties to 0.

    4.  Move the Timeline Cursor to the far right end of the timeline.

    5.  Press S to add another Scale keyframe. Set both Scale X and Y properties to
    1.

    6.  Right-click the Keyframe Segment, and choose the *Bounce Out* easing mode.


    You may want to try moving the first keyframes for the play and settings sprites
    so that their scale animations start at slightly different time stamps. See [Figure
    7-6](#part0017.html#Fig6) to see what the entry Timeline might look like.


    ![9781484202630_Fig07-06.jpg](images/00100.jpeg)


    [Figure 7-6](#part0017.html#_Fig6). The entry Timeline moves the nodes in from
    the left and, at some point, scales the buttons in too


    Editing the Loop Animation


    So much for the *entry* Timeline. Now switch to the *loop* Timeline. You’ll notice
    that, for one, all of the existing keyframes disappeared. You are editing an as-of-yet
    blank Timeline. In addition, the *logoAndButtons* node—and, with it, both the
    logo and button sprites—have moved to their original location just left of the
    layer.


    This shouldn’t bother you too much, but it’s worth considering that whatever you
    animate in one Timeline is not reflected in another Timeline. So if you want to
    chain two Timelines, you have to design the start of the next Timeline in exactly
    the way the previous Timeline leaves the node to prevent the nodes from making
    any sudden movements.


    In this instance, it’s an easy fix, just select the *logoAndButtons* node and
    change its position to 50%x50%. Since you have the loop animation selected, this
    position change will not affect the *logoAndButtons* position in the entry Timeline.


    Change the Timeline duration as described earlier, and make it 2 seconds long.
    Then, for both the *play* and *settings* sprites, do the following:


    1.  Select the sprite node (*play* or *settings*).

    2.  Move the Timeline Cursor to the far left.

    3.  Press R to create a Rotation keyframe.

    4.  Move the Timeline Cursor to the far right.

    5.  Press R to create another Rotation keyframe.

    6.  Change the value for the *Rotation* property to *360*. This applies the value
    to the rightmost keyframe.


    Play the animation. Notice how the sprites rotate. Also notice how the labels
    rotate with their parent sprites. Argh. Perhaps, on second thought, it wasn’t
    such a good idea to make the labels child nodes of the play and settings sprites?


    Not quite. You could still apply a trick: if you play the same animation of a
    parent node on the child node, but backwards, the two animations will cancel each
    other out! So if you rotate each label in the opposite direction of their parent
    sprites, they will stop rotating! Try this for both labels:


    1.  Select the label of the sprite node (*play* or *settings*).

    2.  Move the Timeline Cursor to the far left.

    3.  Press R to create a Rotation keyframe.

    4.  Change the value for the *Rotation* property to *360*. This applies the value
    to the leftmost keyframe.

    5.  Move the Timeline Cursor to the far right.

    6.  Press R to create another Rotation keyframe.

    7.  Change the value for the *Rotation* property to *0*. This applies the value
    to the rightmost keyframe.


    The result is that the sprites now rotate clockwise while their child labels rotate
    counter-clockwise. Since both animations start and stop at the same time, and
    both animate a full revolution, the label’s rotation cancels out their parent
    sprites’ rotation, and thus the labels remain fixed.


    Now I wouldn’t have told you to do it in this seemingly dumb way if there wasn’t
    a neat side-effect to it as well. Right-click the Keyframe Segments for each label,
    and change their easing modes to *Ease In/Out*. You can optionally right-click
    again and change the *Easing* settings to a slightly lower Rate value—for instance,
    in the range 1,3 to 1,8.


    In any case, since the two animations are no longer synchronized—the label’s rotation
    speeds up and slows down over time thanks to easing—the labels now sway left and
    right.


    Though this is just an odd example you are encouraged to experiment with such
    stacked animations. You’ll find the most curious ways to animate nodes if you
    animate the parent differently than the child.


    For instance, imagine you were to move a regular node 200 points to the right
    with one easing mode, and move its child sprite node 150 points to the left using
    a different easing mode so that the sprite ultimately moves 50 points to the right
    but has the combined effect of two different easing modes.


    If you run the app now, you should see the logo slide in from the left. The buttons
    then appear with their scale animation while the logo is still moving. Once this
    timeline has ended, the buttons start rotating.


    **Tip**  What if you wanted to have the buttons rotate even while the entry Timeline
    is running? There are generally two ways to do so.


    One is to duplicate the rotation keyframes for the sprites and their labels in
    the entry Timeline. That works well here but would amount to twice the work, and
    even more if you ever changed how the buttons rotate.


    The alternative is to create a custom CCB document for each button and create
    the rotation animation there. However, this means you would have to create a Custom
    class for each button’s CCB document, though you can use the same class for both
    buttons. Obtaining a reference to the *MainScene* class is still possible in more
    than one way. For instance, the following code in the class’ onEnter method obtains
    a reference to the MainScene object: MainScene* mainScene = (MainScene*)self.scene.children.firstObject;


