- fmt: '取消勾选“受重力影响”（`Affected by gravity`）可防止重力影响弹簧。你取消选中此复选框，是因为你可能希望将弹簧用作倒置或侧向弹簧，而重力只会减小向上弹簧的力，同时增加向下弹簧的力。禁用旋转将防止弹簧向侧面旋转，尤其是在它碰到物体时。在不借助编程的情况下，要让弹簧始终对准同一朝外方向已经足够困难了。


    此外，别忘了定义跳板的碰撞形状。请记住，弹簧的碰撞形状应包含其子级精灵（即板子）的形状。不过，形状的10个点已经足够了。（参见[图9-18](#part0019.html#Fig18)。）其中两个点用于允许在玩家未击中跳板中心时，让两侧给予玩家一个略微向外的旋转。


    ![9781484202630_Fig09-18.jpg](images/00139.jpeg)


    [图9-18](#part0019.html#_Fig18). 蘑菇形弹簧包含了板子的碰撞形状。缩放级别为8倍，因此图像略显模糊。


    如[图9-18](#part0019.html#Fig18)所示，你应尽量使弹簧的底部尽可能呈矩形。这个“螺栓”部分应尽可能紧密地贴合由`springboard_metal`定义的轴套。


    说到此处：选择`springboard_metal`，进入“物品物理”（`Item Physics`）选项卡，然后启用物理（`Enable physics`）。接着将主体的类型改为静态（`Static`）。你可以立即开始编辑轴套的碰撞形状。


    设计一个单主体的轴套起初可能有点不寻常，因为你必须同时描绘轴套的内壁和外壁。这里有一个技巧可以降低混淆度：从初始的矩形多边形开始，将最底部的两个点向下拖动，使其超过弹簧底部几个点。现在，你可以更轻松地挖出轴套的形状。同样，10个点应该就足够了。（参见[图9-19](#part0019.html#Fig19)作为参考。）


    ![9781484202630_Fig09-19.jpg](images/00140.jpeg)


    [图9-19](#part0019.html#_Fig19). 跳板的轴套碰撞形状


    这里的棘手之处在于，既要让轴套尽可能笔直，又要使其比跳板的螺栓形状稍大一点。毕竟，弹簧应在轴套内无阻碍地上下移动，而其侧向移动则应尽可能被轴套限制。[图9-20](#part0019.html#Fig20)展示了两种重叠的碰撞形状，这是通过先进的图像处理技术（由艺术家完成）呈现的。


    ![9781484202630_Fig09-20.jpg](images/00141.jpeg)


    [图9-20](#part0019.html#_Fig20). 轴套和螺栓碰撞形状在同一图像中呈现


    **提示**：如果你想快速测试重叠情况，请在时间线（Timeline）中折叠`springboard_spring`，以隐藏其子节点。在时间线中选中任一节点后，可以使用上下方向键快速选择另一个节点，只要“物品物理”（`Item
    Physics`）选项卡处于选中状态，舞台上的碰撞形状就会随之改变。反复按上下方向键可在两个形状之间快速切换，以验证两者是否完美契合，且没有任何重叠。


    ## 为跳板添加关节


    现在进入核心部分：通过使用关节使跳板发挥作用。此过程需要几个步骤，我将展示每一步如何改善弹簧的行为。


    首先，从“节点库视图”（`Node Library View`）中将一个节点拖到舞台上。在时间线中将该节点重命名为`springstopper`。在“物品物理”（`Item
    Physics`）选项卡中，勾选“启用物理”（`Enable physics`），然后将主体类型改为静态（`Static`）。该节点的位置及其碰撞形状目前无关紧要。


    接着，从“节点库视图”（`Node Library View`）中将一个“物理弹簧关节”（`Physics Spring Joint`）拖到舞台上并选中。将关节的“主体
    A”（`Body A`）连接到`springstopper`节点，将“主体 B”（`Body B`）连接到`springboard_spring`节点。将“锚点
    A”（`Anchor A`）设置为`0x100`，将“锚点 B”（`Anchor B`）设置为`32x70`。'
  raw: 'Unchecking *Affected by gravity* prevents gravity from influencing the spring.
    You deselect this check box because you may want to use the spring as an upside
    down or sideways spring, and gravity would only serve to decrease the force of
    an upward spring while increasing it for a downward-oriented spring. Disabling
    rotation will prevent the spring from rotating to the sides, especially when it
    hits an object. It’s difficult enough to keep the spring aligned to the same outward-facing
    direction without resorting to programming.


    And let’s not forget to define the springboard’s collision shape. Keep in mind
    that the spring’s collision shape should encompass the shape of its child sprite,
    the board. Still, 10 points for the shape are plenty. (See [Figure 9-18](#part0019.html#Fig18).)
    Two points are spent to allow the sides to give the player a slightly outward-oriented
    spin if the player misses the center of the springboard.


    ![9781484202630_Fig09-18.jpg](images/00139.jpeg)


    [Figure 9-18](#part0019.html#_Fig18). The shroom-shaped spring includes the board’s
    collision shape. The zoom level is 8x, hence the blurred image


    As seen in [Figure 9-18](#part0019.html#Fig18), you should try to make the bottom
    of the spring as rectangular as possible. That’s the “bolt” part that should fit
    into the shaft defined by the *springboard_metal* as closely as possible.


    Speaking of which: select the *springboard_metal*, go to the *Item Physics* tab
    to *Enable physics*. Then change the body’s type to *Static*. You can begin editing
    the shaft’s collision shape right away.


    Designing a shaft with a single body may be a little unusual at first because
    you have to trace both the inner and outer walls of the shaft. Here’s a trick
    that makes this less confusing: from the initial rectangular polygon, drag the
    two bottom-most points down, several points past the bottom of the spring. Now
    you can carve out the shaft more easily. Again, 10 points should suffice. (See
    [Figure 9-19](#part0019.html#Fig19) for reference.)


    ![9781484202630_Fig09-19.jpg](images/00140.jpeg)


    [Figure 9-19](#part0019.html#_Fig19). The springboard’s shaft collision shape


    The tricky part here is to design the shaft as straight as possible while making
    it just slightly larger than the springboard’s bolt shape. After all, the spring
    is supposed to move unhindered up and down in the shaft, while its sideward movement
    should be restricted as much as possible by the shaft. [Figure 9-20](#part0019.html#Fig20)
    shows both collision shapes overlaid, using advanced image-processing technology
    (an artist did it).


    ![9781484202630_Fig09-20.jpg](images/00141.jpeg)


    [Figure 9-20](#part0019.html#_Fig20). Shaft and bolt collision shapes rendered
    in the same image


    **Tip**  If you want to test the overlap quickly, collapse the *springboard_spring*
    in the Timeline so that its child nodes are hidden. With either node selected
    in the Timeline, you can use the up and down arrows to quickly select the other
    node, which will change the collision shape on the stage, as long as the *Item
    Physics* tab is selected. Tap the up and down arrow repeatedly to quickly switch
    between the two shapes to verify that both shapes fit well, without any overlap.


    Adding Joints to the Springboard


    Now to the gist of it: making the springboard functional by using joints. This
    process will take several steps, and I will show you how each step improves the
    spring behavior.


    Start by dragging a node from the *Node Library View* onto the stage. Rename the
    node in the Timeline to **springstopper**. On the *Item Physics* tab, check *Enable
    physics*, and then change the body type to *Static*. The position of the node
    and its collision shape don’t matter for now.


    Now drag a *Physics Spring Joint* from the *Node Library View* onto the stage
    and select it. Connect *Body A* of the joint with the *springstopper* node, and
    connect *Body B* with the *springboard_spring* node. Set *Anchor A* to *0x100*
    and *Anchor B* to *32x70*.'
  trans: '

    取消勾选“受重力影响”（`Affected by gravity`）可防止重力影响弹簧。你取消选中此复选框，是因为你可能希望将弹簧用作倒置或侧向弹簧，而重力只会减小向上弹簧的力，同时增加向下弹簧的力。禁用旋转将防止弹簧向侧面旋转，尤其是在它碰到物体时。在不借助编程的情况下，要让弹簧始终对准同一朝外方向已经足够困难了。


    此外，别忘了定义跳板的碰撞形状。请记住，弹簧的碰撞形状应包含其子级精灵（即板子）的形状。不过，形状的 10 个点已经足够了。（参见图 9-18。）其中两个点用于允许在玩家未击中跳板中心时，让两侧给予玩家一个略微向外的旋转。


    ![9781484202630_Fig09-18.jpg](img/00139.jpeg)


    图 9-18. 蘑菇形弹簧包含了板子的碰撞形状。缩放级别为 8 倍，因此图像略显模糊。


    如图 9-18 所示，你应尽量使弹簧的底部尽可能呈矩形。这个“螺栓”部分应尽可能紧密地贴合由`springboard_metal`定义的轴套。


    说到此处：选择`springboard_metal`，进入“物品物理”（`Item Physics`）选项卡，然后启用物理（`Enable physics`）。接着将主体的类型改为静态（`Static`）。你可以立即开始编辑轴套的碰撞形状。


    设计一个单主体的轴套起初可能有点不寻常，因为你必须同时描绘轴套的内壁和外壁。这里有一个技巧可以降低混淆度：从初始的矩形多边形开始，将最底部的两个点向下拖动，使其超过弹簧底部几个点。现在，你可以更轻松地挖出轴套的形状。同样，10
    个点应该就足够了。（参见图 9-19 作为参考。）


    ![9781484202630_Fig09-19.jpg](img/00140.jpeg)


    图 9-19. 跳板的轴套碰撞形状


    这里的棘手之处在于，既要让轴套尽可能笔直，又要使其比跳板的螺栓形状稍大一点。毕竟，弹簧应在轴套内无阻碍地上下移动，而其侧向移动则应尽可能被轴套限制。图 9-20
    展示了两种重叠的碰撞形状，这是通过先进的图像处理技术（由艺术家完成）呈现的。


    ![9781484202630_Fig09-20.jpg](img/00141.jpeg)


    图 9-20. 轴套和螺栓碰撞形状在同一图像中呈现


    **提示**：如果你想快速测试重叠情况，请在时间线（Timeline）中折叠`springboard_spring`，以隐藏其子节点。在时间线中选中任一节点后，可以使用上下方向键快速选择另一个节点，只要“物品物理”（`Item
    Physics`）选项卡处于选中状态，舞台上的碰撞形状就会随之改变。反复按上下方向键可在两个形状之间快速切换，以验证两者是否完美契合，且没有任何重叠。


    ## 为跳板添加关节


    现在进入核心部分：通过使用关节使跳板发挥作用。此过程需要几个步骤，我将展示每一步如何改善弹簧的行为。


    首先，从“节点库视图”（`Node Library View`）中将一个节点拖到舞台上。在时间线中将该节点重命名为`springstopper`。在“物品物理”（`Item
    Physics`）选项卡中，勾选“启用物理”（`Enable physics`），然后将主体类型改为静态（`Static`）。该节点的位置及其碰撞形状目前无关紧要。


    接着，从“节点库视图”（`Node Library View`）中将一个“物理弹簧关节”（`Physics Spring Joint`）拖到舞台上并选中。将关节的“主体
    A”（`Body A`）连接到`springstopper`节点，将“主体 B”（`Body B`）连接到`springboard_spring`节点。将“锚点
    A”（`Anchor A`）设置为`0x100`，将“锚点 B”（`Anchor B`）设置为`32x70`。

