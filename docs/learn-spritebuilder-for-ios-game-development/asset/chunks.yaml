- fmt: '### Shader-Effects Best Practices


    - **Brightness, Contrast, Saturation, and Hue** only change the color of individual
    pixels and can be found in almost any imaging program. All of these effects use
    just a single value and should be self-explanatory. But even if you don’t know
    what the effect does, just add it and move the slider to see what it does.

    - **Pixellate, Blur, and Bloom** alter the look of the rendered content. You’ve
    already seen **Pixellate**, which basically scales down its content, turning it
    into pixel art. The **Blur** effect smooths the content, making it look less sharp.
    **Bloom** is an effect where bright areas bleed into surrounding darker areas,
    making them appear to glow. You can alter its **Blur Radius** and the **Intensity**,
    while the **Luminance Threshold** determines how bright an area needs to be before
    the bloom effect is applied.

    - **Refraction, Reflection, and Glass** are complex effects requiring a Normal
    Map, which is an image where each pixel’s RGB values are considered the normal
    vectors. In layman’s terms, the Normal Map image alters how light is supposed
    to refract or reflect from the surface. All three effects also use an Environment
    reference, which is one or more nodes that should be seen reflected in the **Effect**
    node. (See Figure 12-10.)


    ![9781484202630_Fig12-10.jpg](images/00189.jpeg)


    *Figure 12-10*. The glass effect distorts the background like a lens while slightly
    reflecting the Environment node on its surface


    The **Effect** node is very powerful, but the more complex effects require some
    understanding of graphics and shader programming to grasp the meaning and to imagine
    the resulting effects of the various parameters.


    The programming interface of `CCEffectNode` and `CCEffect` and related classes
    hasn’t been made available to the public while I’m writing this and is still a
    work in progress. Of course, you’ll eventually find these classes documented in
    the Cocos2D Developer Library Reference (also known as a *class reference*), and
    you can always peek into the header files `CCEffect.h` and `CCEffectNode.h`.


    As with any effect, creating good shader effects is mostly a matter of using images
    that work well with the effect. I had it easy with a well-designed menu screen
    that works well with both particle and shader effects. Imagine if you had only
    flat-colored dummy graphics—it wouldn’t look nearly as good. Effects in themselves
    can’t work magic. You have to provide good input for shaders and particle effects
    to generate good output.


    While it’s tempting to start designing effects early, the development of effects
    should really be deferred until the project has all of the features and most of
    the artwork. By that time, you have established that the game runs well and there’s
    spare performance to be taken up by effects.


    Being able to verify that the game still runs smoothly even with the newly added
    effects and on older devices will also save you a lot of time **not** designing
    the uber-effect you want, and that you may eventually have to scale down or remove
    entirely due to performance issues. And with most of the artwork finalized, it’ll
    be a lot easier to design great-looking effects, too.


    Keep in mind that even simple effects like **Brightness** and **Contrast** can
    have a significant impact on performance, depending on which device you test them
    on. And do test effects on the device, because the Simulator is very slow to begin
    with.


    That’s also another reason to defer implementing effects until late in the project:
    adding effects can easily make the Simulator unusable even for simple tests, let
    alone actually playing the game.


    **Tip** Remember that you don’t have to use the **Effect** node if you want to
    apply an effect to a specific sprite. Just select the sprite in question, and
    switch to the **Item Properties** tab to find the effects user interface at the
    bottom of the `CCSprite` properties, just below the blend modes. Unlike the **Effect**
    node, effects applied directly to a sprite will not affect the sprite’s child
    nodes.


    ### Summary


    You’ve learned how to create sprite frame keyframe animations, and you’ve enhanced
    the `SoftBodyDrawNode` to work with sprite frame animations. You also know how
    to override the `setSpriteFrame:` property setter in order to run custom code
    when a specific sprite frame is displayed.


    On the particle and shader effects front, you’ve learned how to implement them
    technically, although designing great effects takes a lot of experimenting and
    experience. Fortunately, it’s fun to spend time tweaking and experimenting with
    effects—so much so that I should warn you not to spend too much time tweaking
    effects too early in the project if your goal is to complete a game and create
    one that performs well across most devices.


    You’ll find the version of the project with sprite frame animations, particle
    effects, and shader effects in the *13 - Animations and Effects* folder in the
    book’s download archive.


    ## Chapter 13: Porting to Android


    How cool would it be if you could build and run your SpriteBuilder app on Android
    devices?


    You can!


    There’s no Java or C++ programming needed to do so. SpriteBuilder provides the
    necessary plugins for Xcode to cross-compile your Objective-C code to Android.
    In fact, all the libraries used by SpriteBuilder apps—most notably Cocos2D-Swift,
    Chipmunk2D and ObjectAL—are fully compatible.


    ### How Does Android Support Work?


    The development of SpriteBuilder and Cocos2D since version 3 (Cocos2D-Swift to
    be precise) is done by Apportable developers. Apportable is a company that specializes
    in cross-compiling Objective-C code for the Android platform.


    Originally, Apportable was a command-line tool for expert programmers and game-development
    studios. The company has since created Xcode plugins and integrated them into
    SpriteBuilder, beginning with version 1.3. You’ll know them as SpriteBuilder Android
    plugins.


    You will also often hear of a framework called **BridgeKit**. This is the framework
    that Apportable created to give Objective-C developers access to Android, Java,
    and Verde features and functionality. Verde is a lightweight equivalent of UIKit.
    You’ll find the BridgeKit reference here: [http://static.apportable.com/documentation/BridgeKit/html/](http://static.apportable.com/documentation/BridgeKit/html/).


    The SpriteBuilder Android plugins work by cross-compiling Objective-C code to
    native ARM and x86 code that runs on Android devices. There are no emulation layers,
    virtual machines, or Java translations done. The resulting executable will typically
    run faster than if the same code were written in Java using Google’s Android SDK.


    Like any other cross-platform development, porting to Android with the goal of
    publishing a nontrivial app on the Android store(s) does require extra work compared
    to targeting a single platform. There’s no such thing as free ports. Each ecosystem
    has its own unique programming interfaces, device capabilities, design requirements,
    user expectations, developer guidelines, publishing policies, and processes.


    Most notably, on Android there’s a much wider variety of devices, which poses
    challenges regarding how to scale the app to a great variety of screen resolutions
    but also varying CPU and GPU performance specs, different OS versions, and so
    on.


    Fortunately, SpriteBuilder does make it easier to adapt to varying screen resolutions,
    while the Android Xcode plugins allows you to use any Cocos2D feature and continue
    to use many iOS frameworks. BridgeKit then gives you access to all the important
    Android features without having to revert to writing C++ or Java code.'
