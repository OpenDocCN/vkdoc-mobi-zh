    ## 本地化积分标签


    文本的本地化是通过在同一个`key`下提供同一文本的多个语言版本完成的。`key`是用于标识一组本地化字符串的任何文本字符串（通常是原始英文文本）。


    在*MainScene.ccb*中，选择带有积分文本的*CCLabelTTF*，也就是你最近添加的那个。在*Label text*字段下，勾选*Localize*复选框。这将启用复选框右侧的*Edit*按钮。点击*Edit*按钮。这将打开字符串本地化对话框，如[图11-10](#part0022.html#Fig10)所示。


    ![9781484202630_Fig11-10.jpg](images/00171.jpeg)


    [Figure 11-10](#part0022.html#_Fig10). 初始本地化对话框，仅包含一个字符串和一种语言


    添加本地化字符串时，首先要做的是添加一种或多种语言。点击*+Add Language*按钮，会弹出一个可选语言的下拉列表。你可以使用任何你喜欢的语言。我选择了德语，因为我从小就说德语。添加语言后，它会出现右下角的列表中。但添加语言还会在左侧的文本网格视图中增加一列。并且会在*Key*列的左侧出现一个黄色感叹号图标，因为对于给定的*Key*，还没有德语翻译。参见[图11-11](#part0022.html#Fig11)。


    ![9781484202630_Fig11-11.jpg](images/00172.jpeg)


    [Figure 11-11](#part0022.html#_Fig11). 添加德语作为语言后，列已更新，警告图标表示缺少翻译文本


    现在你需要做的，就是在*German (de)*列中为本地化对话框中当前唯一的字符串输入文本。输入以下内容作为可能的德语翻译（不含引号）：“Entwickelt
    mit SpriteBuilder & Cocos2D”。确保在*German (de)*列中输入字符串。如果操作正确，警告图标应该会消失。


    你可以将*Comment*字段留空。它可以用来为翻译人员留下注释，例如提示该字符串在任何语言中都不能超过的最大字符数。


    请注意，你可以并且应该更改*Key*列中的条目，主要是为了防止在你本意是输入实际语言字符串时意外编辑了键。我倾向于为键使用全大写字符，以强调它是一个键，而不是标签使用的实际字符串。输入`CREDITS_LABEL`作为键。


    编辑完成后，只需通过左上角的红色X按钮关闭窗口即可。


    根据你的*SpriteBuilder*版本是否会自动将本地化对话框中的`key`与标签的文本字段同步，你可能需要或不需要编辑*Label text*字段。如果*Label
    text*字段中包含任何其他文本，请输入`CREDITS_LABEL`。你会注意到，标签不再更改为*Label text*字段中的文本。这是因为当启用*Localize*时，*Label
    text*字段的含义发生了变化。它变成了本地化字符串的键。


    你可以在*SpriteBuilder*中快速测试你的本地化字符串。从菜单中选择*Document ![image](images/00008.jpeg) View
    in Language ![image](images/00008.jpeg) German (de)*，以查看此屏幕的德语版本。所有具有对应德语字符串的本地化标签将以德语显示。那些对于所选语言缺少字符串的标签将显示其键。这是使用全大写文本作为键或采用任何其他样式以清晰区分键与实际字符串的另一个好理由。[图11-12](#part0022.html#Fig12)显示了将标签翻译成德语后的菜单屏幕。


    ![9781484202630_Fig11-12.jpg](images/00173.jpeg)


    [Figure 11-12](#part0022.html#_Fig12). 主菜单，标签已翻译成德语


    正如你在[图11-12](#part0022.html#Fig12)中看到的，有两个标签不再适合，因为德语文本更长。这仅仅是触及了为什么本地化既困难又耗时的表面原因，特别是如果从一开始就没有考虑这一点。尽管你可以减小德语版本中积分标签的字体大小，但这必须在代码中完成。而且这个选项不适用于*Settings*按钮——如果你让那个标签更小，你几乎无法阅读文本，甚至根本看不到。


