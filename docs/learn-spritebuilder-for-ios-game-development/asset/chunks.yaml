    ## 创建跳板


    创建跳板显然需要用到弹簧关节。但你还需要一个距离关节，在弹簧被激活前将其锁定——就像弓箭手在松开弓弦发射箭矢前，一直拉着弓弦一样。


    ### 原理相同：弹簧、弹弓和弓


    首先，让我澄清一点，这里的跳板对象在功能上与弹弓或弓并无区别。都是有一个弹簧试图将物体拉向特定方向，只是力度有所不同。我敢打赌，弓发射箭矢的速度比弹弓发射小鸟（无论是否愤怒）的速度要快得多。


    还必须有一个相反的力将弹簧向后拉并使其保持锁定状态。通常，这个相反的力由弓箭手在瞄准时握着弓弦的手来扮演。只有当锁定（握力）松开时，弹簧才会加速物体（箭矢）。物体最终会脱离弹簧的影响范围。通常，这发生在弹簧经过其静止位置并开始减速时。


    在计算机物理中，真正的问题与在弹簧被拉回以及加速过程中如何连接可移动物体有关。通常，你需要一些辅助碰撞——例如，一个碗状的容器，在弹簧加速时将物体固定住。或者在弓箭的例子中，可以在弓架上箭头的正上方和正下方放置两个微小的圆形碰撞销，仅用于将箭矢固定到位，并且可能确保它沿着正确的方向发射。


    为了实现用计算机物理模拟真实世界物理，你经常需要实施此类“取巧”手段——一个常见的误解是两种物理机制基本一致，但事实并非如此。计算机物理使用了大量的简化和粗略的近似，以便实时处理数量可观的物理对象。


    对于跳板而言，你最需要关注的是如何阻止弹簧，防止它从底座中弹出。因此，它必须有一个限位碰撞体，在弹簧离开底座的轴套之前将其骤然停止。


    话虽如此，让我们来审视一下跳板的组成部分，如图 [9-16](#part0019.html#Fig16) 所示。


    ![9781484202630_Fig09-16.jpg](images/00137.jpeg)


    [图 9-16](#part0019.html#_Fig16). 跳板由以下部分组成（从上到下）：板（`springboard_spring.png`），弹簧（`springboard_spring.png`）和底座（`springboard_metal.png`）


    板将被固定在弹簧上，这引出一个有趣的问题：如何让两个独立的物理体一起移动，且它们的相对位置完全没有偏差？


    简而言之：你做不到。而且你也不需要用到两个物理体。


    没有哪个关节“强”到可以不可移动地将一个物体固定到另一个物体上。用关节连接的两个物体的相对位置总是可能发生偏离，无论连接设置得多硬。你也可以在物理模拟运行后的每一帧更新被固定物体的位置，但这可能导致不理想的物理碰撞行为，因为被固定物体是瞬间跳跃到位，而不是逐渐移动过去。


    实际的解决方案是：只使用一个物理体来定义组合对象的碰撞属性和形状。被固定的“物体”仅仅是这个物理体的子精灵，没有物理属性。在这个例子中，弹簧将为弹簧和板两者定义碰撞形状，而板没有物理体，只是作为弹簧的子节点添加，从而以一个固定偏移量跟随弹簧移动。


    另一个问题是如何让弹簧保持垂直向上移动，而不会在碰到物体时旋转或侧移。这需要在底座上添加一个不可见的轴套，以及前面提到的用于在恰当时刻阻止弹簧的不可见“限位”物体。


    ## 设计跳板


    右键单击`Prefabs`文件夹，并添加一个`New File`。将其命名为`Spring.ccb`，并在创建前将其类型设置为`Node`。


    在`Tileless Editor View`中，将`springboard_spring`和`springboard_metal`图片拖放到舞台上。确保在时间线中`springboard_spring`位于`springboard_metal`之上。然后将`springboard_board`拖放到时间线中的`springboard_spring`上，使板成为弹簧的子节点。（参见[图
    9-17](#part0019.html#Fig17)）


    ![9781484202630_Fig09-17.jpg](images/00138.jpeg)


    [图 9-17](#part0019.html#_Fig17). 跳板的视觉设置


    选择`springboard_metal`，并将其位置设置为`0x0`。选择`springboard_spring`并将其位置更改为`0x-16`，这样它会沉入底座中。最后，选择`springboard_board`，将其位置类型更改为`%`，并将值更改为`50`和`105`。


    **注意** 50% 的 X 偏移是为了抵消子精灵以其父纹理左下角为中心而非以父节点实际位置为中心的效果。这是 Cocos2D 早期版本中一个不幸的设计决策。通过添加多个精灵，每个都是前一个精灵的子节点，可以最好地说明这种效果。你会注意到每个新子节点的位置都在其父节点的左下方。最好通过添加
    50% 的偏移来使子精灵以其父节点为中心，因为即使改变锚点也能达到效果，但最好在可以通过改变节点位置来实现时，避免更改锚点。


    现在选择`springboard_spring`，并切换到`Item Physics`选项卡。勾选`Enable physics`，并取消勾选`Affected
    by gravity`和`Allows rotation`。'
  raw: '1.  What is necessary to allow chains and ropes to pass through each other?

    2.  What if you wanted chains and ropes to collide with borders, just not triggers?

    3.  What if you wanted ropes to collide with ropes and you wanted chains to collide
    with chains, but you also wanted to disallow ropes colliding with chains (and
    vice versa)?


    Here are the solutions:


    1.  To allow chains and ropes to pass through each other, remove *obstacle* from
    each chain and rope node’s mask so that only *player* is included in their collision
    mask. (See [Table 9-2](#part0019.html#Tab2).)


    [Table 9-2](#part0019.html#_Tab2). Settings to allow chains and ropes to pass
    through each other


    ![Table9-2.jpg](images/00134.jpeg)


    2.  To get chains and ropes to collide with borders (and not just triggers), add
    **obstacle** to each border’s mask (player, obstacle) and add **border** to each
    chain and rope node’s mask (player, obstacle, border). (See [Table 9-3](#part0019.html#Tab3).)


    [Table 9-3](#part0019.html#_Tab3). Settings to allow chains and ropes to collide
    with borders


    ![Table9-3.jpg](images/00135.jpeg)


    3.  The final scenario assumes you want ropes to collide only with ropes and chains
    to collide only with chains. This requires all chain and rope nodes to have unique
    categories, correspondingly named *chain* and *rope*, and include them in their
    collision mask (player, chain/player, rope). You would have to edit the masks
    of *player* (trigger, border, chain, rope) and, optionally, all border nodes (player,
    chain, rope) to include the *chain* and *rope* categories. The *obstacle* category
    can be removed from all masks. (See [Table 9-4](#part0019.html#Tab4).)


    [Table 9-4](#part0019.html#_Tab4). Settings to allow chains to collide with chains
    and ropes collide with ropes, but prevent chains from colliding with ropes. Player
    and borders collide with both chains and ropes


    ![Table9-4.jpg](images/00136.jpeg)


    Creating a Springboard


    Creating a springboard obviously involves using the spring joint. But you’ll also
    need a distance joint to keep the spring locked until activated—just like an archer
    keeps the string pulled backward on her bow until she releases her grip on the
    string to fire the arrow.


    All the Same: Springs, Slings, and Bows


    First, let me clarify that the springboard object here will function no different
    than a slingshot or a bow. There’s a spring trying to pull an object in a specific
    direction, though with varying degrees of force. I wager a bow will fire an arrow
    at a higher velocity than a slingshot fires a bird, angry or not.


    There must also be an opposing force that pulls the spring backward and keeps
    it locked in place. Usually, the part of the opposing force is played by the archer’s
    grip keeping the string pulled back while aiming. Only when the lock (grip) is
    released will the spring accelerate the object (arrow). The object will eventually
    leave the influence of the spring. Usually, this happens when the spring has passed
    its resting position and is slowing down.


    In computer physics, the real problem is related to attaching the movable object
    while the spring is held back and while it is accelerating. Usually, you’ll need
    some helper collisions—for instance, a bowl-shaped container that holds the object
    in place while the spring accelerates. Or in the case of bow and arrow, there
    could be two tiny, circular collision pins just above and below the arrow’s head
    on the bow frame just to hold the arrow in place, and perhaps to ensure it is
    firing in the correct general direction.


    You often have to implement such “cheats” to model real-world physics with computer
    physics—a common misunderstanding is that both types of physics work generally
    the same, but that’s not true. Computer physics work with a lot of simplifications
    and gross exaggerations in order to process a decent quantity of physics objects
    in real time.


    In the case of the springboard, you’ll be most concerned with stopping the spring,
    to avoid the spring from shooting out and away from its base. Therefore, it has
    to have a stopper collision that stops the spring abruptly before it can leave
    the base’s shaft.


    That said, let’s examine the springboard’s constituent components, which are shown
    in [Figure 9-16](#part0019.html#Fig16).


    ![9781484202630_Fig09-16.jpg](images/00137.jpeg)


    [Figure 9-16](#part0019.html#_Fig16). The springboard consists of the following
    (from top to bottom): the board (springboard_spring.png), the spring (springboard_spring.png),
    and the base (springboard_metal.png)


    The board will be affixed to the spring, which poses an interesting question:
    how do you get two independent physics bodies to move together without their relative
    positions deviating at all?


    Short answer: you can’t do it. And you do not need to use two physics bodies.


    No joint is “strong” enough to immovably affix one body to another. Two bodies
    connected with a joint can always deviate in their relative position to each other,
    no matter how stiff the connection is set up to be. You could also update the
    affixed body’s position every frame after the physics simulation has run, but
    this may lead to undesirable physics collision behavior because the affixed body
    would snap rather than move into place.


    The actual solution is to use just a single physics body that defines the collision
    properties and shape for the combined object. The affixed “bodies” are simply
    child sprites of the actual body, without physics. In this case, the spring will
    define the collision shape for both the spring and board, while the board has
    no physics body and is simply added as a child of the spring, thus following it
    at a fixed offset.


    Another issue is how to keep the spring moving straight up, rather than rotating
    or moving sideways when it hits an object. This requires adding an invisible shaft
    to the base body and the aforementioned invisible “stopper” body that stops the
    spring at just the right moment.


    Designing the Springboard


    Right-click the *Prefabs* folder, and add a *New File*. Name it **Spring.ccb**,
    and set its type to *Node* before creating it.


    From the *Tileless Editor View*, drag and drop the *springboard_spring* and *springboard_metal*
    images onto the stage. Make sure that *springboard_spring* is above *springboard_metal*
    in the Timeline. Then drag the *springboard_board* onto the *springboard_spring*
    in the Timeline so that the board becomes a child node of the spring. (See [Figure
    9-17](#part0019.html#Fig17).)


    ![9781484202630_Fig09-17.jpg](images/00138.jpeg)


    [Figure 9-17](#part0019.html#_Fig17). The visual setup of the springboard


    Select the *springboard_metal*, and set its position to *0x0*. Select the *springboard_spring*
    and change its position to *0x-16*, which will sink it into the base. Finally,
    select the *springboard_board*, and change its position types to *%* and change
    its values to *50* and *105*.


    **Note**  A 50% X offset combats the effect of having child sprites centered on
    their parent texture’s lower left corner rather than on the parent’s actual position.
    It’s an unfortunate design decision of Cocos2D from its early days. This effect
    is best illustrated by adding several sprites, each a child of the previous sprite.
    You’ll notice the positions are such that each new child is positioned below and
    to the left of its parent. Centering child sprites on their parent is best done
    by adding a 50% offset because even though changing anchor point would also work,
    it’s best to avoid changing the anchor point whenever you can do so by altering
    the node’s position.


    Now select the *springboard_spring*, and switch to the *Item Physics* tab. Check
    *Enable physics*, and uncheck *Affected by gravity* and *Allows rotation*.'
  trans: '

    1.  需要怎样设置，才能让链条和绳索彼此穿过？

    2.  如果希望链条和绳索与边框碰撞，但不与触发器碰撞，应该怎样设置？

    3.  如果希望绳索仅与绳索碰撞，链条仅与链条碰撞，但禁止绳索与链条碰撞（反之亦然），应该怎样设置？


    以下是解决方案：


    1.  要允许链条和绳索彼此穿过，请从每个链条和绳索节点的遮罩中移除`obstacle`，使其碰撞遮罩仅包含`player`。（参见表 9-2）


    表 9-2. 允许链条和绳索彼此穿过的设置


    ![Table9-2.jpg](img/00134.jpeg)


    2.  要使链条和绳索与边框碰撞（而不仅仅是触发器），请将`obstacle`添加到每个边框的遮罩（`player`, `obstacle`）中，并将`border`添加到每个链条和绳索节点的遮罩（`player`,
    `obstacle`, `border`）中。（参见表 9-3）


    表 9-3. 允许链条和绳索与边框碰撞的设置


    ![Table9-3.jpg](img/00135.jpeg)


    3.  最后一种场景假设你希望绳索仅与绳索碰撞，链条仅与链条碰撞。这要求所有链条和绳索节点拥有唯一的类别，分别命名为`chain`和`rope`，并将它们包含在自己的碰撞遮罩中（`player`,
    `chain`/`player`, `rope`）。你需要编辑`player`的遮罩（`trigger`, `border`, `chain`, `rope`），并且可选地编辑所有边框节点（`player`,
    `chain`, `rope`）的遮罩，以包含`chain`和`rope`类别。可以从所有遮罩中移除`obstacle`类别。（参见表 9-4）


    表 9-4. 允许链条与链条碰撞、绳索与绳索碰撞，但禁止链条与绳索碰撞的设置。玩家和边框与链条和绳索都发生碰撞


    ![Table9-4.jpg](img/00136.jpeg)


    ## 创建跳板


    创建跳板显然需要用到弹簧关节。但你还需要一个距离关节，在弹簧被激活前将其锁定——就像弓箭手在松开弓弦发射箭矢前，一直拉着弓弦一样。


    ### 原理相同：弹簧、弹弓和弓


    首先，让我澄清一点，这里的跳板对象在功能上与弹弓或弓并无区别。都是有一个弹簧试图将物体拉向特定方向，只是力度有所不同。我敢打赌，弓发射箭矢的速度比弹弓发射小鸟（无论是否愤怒）的速度要快得多。


    还必须有一个相反的力将弹簧向后拉并使其保持锁定状态。通常，这个相反的力由弓箭手在瞄准时握着弓弦的手来扮演。只有当锁定（握力）松开时，弹簧才会加速物体（箭矢）。物体最终会脱离弹簧的影响范围。通常，这发生在弹簧经过其静止位置并开始减速时。


    在计算机物理中，真正的问题与在弹簧被拉回以及加速过程中如何连接可移动物体有关。通常，你需要一些辅助碰撞——例如，一个碗状的容器，在弹簧加速时将物体固定住。或者在弓箭的例子中，可以在弓架上箭头的正上方和正下方放置两个微小的圆形碰撞销，仅用于将箭矢固定到位，并且可能确保它沿着正确的方向发射。


    为了实现用计算机物理模拟真实世界物理，你经常需要实施此类“取巧”手段——一个常见的误解是两种物理机制基本一致，但事实并非如此。计算机物理使用了大量的简化和粗略的近似，以便实时处理数量可观的物理对象。


    对于跳板而言，你最需要关注的是如何阻止弹簧，防止它从底座中弹出。因此，它必须有一个限位碰撞体，在弹簧离开底座的轴套之前将其骤然停止。


    话虽如此，让我们来审视一下跳板的组成部分，如图 9-16 所示。


    ![9781484202630_Fig09-16.jpg](img/00137.jpeg)


    图 9-16. 跳板由以下部分组成（从上到下）：板（`springboard_spring.png`），弹簧（`springboard_spring.png`）和底座（`springboard_metal.png`）


    板将被固定在弹簧上，这引出一个有趣的问题：如何让两个独立的物理体一起移动，且它们的相对位置完全没有偏差？


    简而言之：你做不到。而且你也不需要用到两个物理体。


    没有哪个关节“强”到可以不可移动地将一个物体固定到另一个物体上。用关节连接的两个物体的相对位置总是可能发生偏离，无论连接设置得多硬。你也可以在物理模拟运行后的每一帧更新被固定物体的位置，但这可能导致不理想的物理碰撞行为，因为被固定物体是瞬间跳跃到位，而不是逐渐移动过去。


    实际的解决方案是：只使用一个物理体来定义组合对象的碰撞属性和形状。被固定的“物体”仅仅是这个物理体的子精灵，没有物理属性。在这个例子中，弹簧将为弹簧和板两者定义碰撞形状，而板没有物理体，只是作为弹簧的子节点添加，从而以一个固定偏移量跟随弹簧移动。


    另一个问题是如何让弹簧保持垂直向上移动，而不会在碰到物体时旋转或侧移。这需要在底座上添加一个不可见的轴套，以及前面提到的用于在恰当时刻阻止弹簧的不可见“限位”物体。


