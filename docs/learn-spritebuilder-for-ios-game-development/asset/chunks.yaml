- fmt: "This was just a simple example of the analyzer, but it can do a lot more.\
    \ For instance, it will highlight problems in code by using arrows to show the\
    \ flow of execution that, if followed, will lead to the proclaimed issue. In [Figure\
    \ 14-11](#part0025.html#Fig11), an uninitialized variable `testIfTrue` is sent\
    \ to a method. And the method’s return value assigned to `testIfTrue` is declared\
    \ a *Dead store*, meaning a variable that is not actually being used. This indicates\
    \ that either the variable is not needed or perhaps some other variable was incorrectly\
    \ used in its place.\n\n![9781484202630_Fig14-11.jpg](images/00217.jpeg)\n\n[Figure\
    \ 14-11](#part0025.html#_Fig11). The analyze build uses arrows to point out the\
    \ flow of logic leading to an issue\n\n**Caution** The analyze build may sometimes\
    \ report false positives. Code that it deems flawed but isn’t. Not every problem\
    \ reported by the analyzer needs to be fixed, but you ought to understand the\
    \ reason for the report well enough to be confident that the issue can be disregarded.\
    \ It’s the same as with compiler warnings.\n\n## Cocos2D Framerate Stats\n\nIn\
    \ addition to doing debug drawing for physics, Cocos2D can also draw profiling\
    \ counters, most notably the framerate display. To enable these profiling labels,\
    \ you only need to add the line in [Listing 14-8](#part0025.html#list8) anywhere\
    \ in your code—for instance, in the `startScene` method in `AppDelegate.m`.\n\n\
    [***Listing 14-8***](#part0025.html#_list8). Enabling profiling labels\n\n```\n\
    [CCDirector sharedDirector].displayStats = YES;\n```\n\nCocos2D will then draw\
    \ three numbers in the lower left corner, as shown in [Figure 14-12](#part0025.html#Fig12).\n\
    \n![9781484202630_Fig14-12.jpg](images/00218.jpeg)\n\n[Figure 14-12](#part0025.html#_Fig12).\
    \ The game runs with profiling labels enabled\n\nFrom top to bottom, these numbers\
    \ are:\n\n*   *Draw Calls* (here: 12): A draw call basically occurs every time\
    \ OpenGL needs to draw from a different texture, but there are other reasons too.\
    \ Each draw call incurs a penalty, so the goal is to have as few as possible.\
    \ The way to achieve that is by using Sprite Sheets to combine multiple images\
    \ in the same texture, and to use as few Sprite Sheets as possible. The draw call\
    \ of 12 in this example is reasonably low. You will most likely see performance\
    \ degradation if the number of draw calls is close to or even above 100.\n*  \
    \ *Seconds per Frame* (here: 0.057): This refers to the average time it took to\
    \ complete the update cycle for a frame, which includes processing game logic,\
    \ physics, and rendering. To achieve 60 frames per second (fps), the seconds per\
    \ frame must be 0.0166 or less. You have twice as long if your framerate target\
    \ is 30 fps. The main use of the seconds-per-frame counter is to see how much\
    \ room you have to add more game logic before the framerate drops again.\n*  \
    \ *Frames per second* (here: 15.0): That’s the framerate, and before you wonder:\
    \ it’s only 15 frames per second because the screenshot was taken in the iOS Simulator.\
    \ The Simulator uses a software renderer that is quite slow. The game runs with\
    \ 60 fps on most devices. Also, note that this value is an average of the most\
    \ recent frames, so a value of 45 actually means that half of the frames were\
    \ rendered within 0.0166 seconds (60 fps) and the other half took more than that\
    \ (30 fps).\n\nIt is worth noting that iOS devices have vertical synchronization\
    \ (vsync) always enabled. The framerate counter gives you an average number of\
    \ frames over multiple frames. In reality, you can only have a constant framerate\
    \ of 60, 30, 20, 15, 12, 10, and 6 fps. All of these values are factors of 60.\
    \ Due to vsync being enabled, if a frame did not complete its update-and-render\
    \ cycle within 0.0166 seconds, it will be displayed at the earliest in another\
    \ 0.0166 seconds, not as soon as it’s done. So once the game starts taking more\
    \ than 0.0166 seconds to complete every frame, the framerate falls back to 30\
    \ fps.\n\nFor some games where the framerate fluctuates heavily between 30 to\
    \ 60 fps, it can make sense to lock the framerate at a constant 30 fps. This may\
    \ feel smoother than a constantly fluctuating framerate that skips a couple frames,\
    \ and thus drops to 30 fps and then renders a few more frames at 60 fps. To change\
    \ the maximum framerate, you can add the lines in [Listing 14-9](#part0025.html#list9)\
    \ to the `startScene` method in `AppDelegate.m`.\n\n[***Listing 14-9***](#part0025.html#_list9).\
    \ Restricting framerate to 30 fps\n\n```\nCGFloat framesPerSecond = 30;\n[CCDirector\
    \ sharedDirector].animationInterval = 1.0 / framesPerSecond;\n```\n\nThe division\
    \ by `framesPerSecond` is necessary because the `animationInterval` is expressed\
    \ as seconds per frame.\n\n## Walking the Scene Graph\n\nAnother useful debugging\
    \ feature of Cocos2D is a function that prints out the nodes and their children\
    \ recursively, given a specific starting node. (See [Listing 14-10](#part0025.html#list10).)\
    \ You may want to add that line to the `didLoadFromCCB` method in the `MainScene`\
    \ or `GameScene` class, or both.\n\n[***Listing 14-10***](#part0025.html#_list10).\
    \ Logging the scene graph\n\n```\n[self.scene walkSceneGraph:0];\n```\n\nThis\
    \ prints out the scene or node graph recursively, beginning with `self.scene`.\
    \ You can use any other node as the starting point. The parameter ought to be\
    \ `0` because it’s used only internally to properly indent child nodes. You can\
    \ see an example output in [Listing 14-11](#part0025.html#list11).\n\n[***Listing\
    \ 14-11***](#part0025.html#_list11). Output of `walkSceneGraph`\n\n```\nwalk tree:\
    \ -> <CCScene = 0x10a620550 | Name = (null)> 0x10a620550\nwalk tree: ---> <CCNode\
    \ = 0x10a36a130 | Name = > 0x10a36a130\nwalk tree: ----> <CCNode = 0x10a36cad0\
    \ | Name = background> 0x10a36cad0\nwalk tree: -----> <CCNodeGradient = 0x10a36d710\
    \ | Name = > 0x10a36d710\nwalk tree: -----> <CCSprite = 0x10a36e850 | Rect = (0.00,0.00,593.50,406.00)\
    \ |\n                   tag =  > 0x10a36e850\nwalk tree: -----> <CCNode = 0x10a36fe00\
    \ | Name = > 0x10a36fe00\nwalk tree: ------> <CCNodeColor = 0x10a370690 | Name\
    \ = > 0x10a370690\nwalk tree: ------> <CCSprite = 0x10a371780 | Rect = (916.5,0.5,102.0,42.0)\
    \ |\n                    tag =  > 0x10a371780\nwalk tree: ------> <CCSprite =\
    \ 0x10a374a80 | Rect = (916.5,0.5,102.0,42.0) |\n                    tag =  >\
    \ 0x10a374a80\n```\n\nThis can be helpful in determining whether a given node\
    \ is in the place in the hierarchy that you expect it to be. If it isn’t, this\
    \ tells you where it is or whether it’s not there at all. In this case, the `CCScene`\
    \ has a single `CCNode` child node, which in turn has a child `CCNode` whose name\
    \ is `background`.\n\n**Tip** The formatting and logged properties may not suit\
    \ all purposes. You may want to make a copy of the `walkSceneGraph` method found\
    \ in the `CCNode+Debug.m` file and modify it to generate the output you find more\
    \ helpful.\n\n## Debugging Advice\n\nIt is my sincerest wish that you take an\
    \ analytical approach to debugging. Ask yourself “Why?” constantly. As a programmer,\
    \ you have the rare fortune to work with a deterministic system where the same\
    \ conditions always lead to the exact same outcome. Given logs, assertions, breakpoints,\
    \ and stepping through code, you have all the tools needed to analyze where your\
    \ code is going wrong.\n\nBut don’t forget the compiler has a say in this, too—which\
    \ is to say: don’t ignore compiler warnings. They, too, inform you of potential,\
    \ and sometimes actual, issues. Ignoring them should be done only if you understand\
    \ the reason for the warning and the implications of not fixing it.\n\nThe worst\
    \ thing you can do when you encounter a problem is to become angry. I know that’s\
    \ easier said than done. Especially, when you’re already stressed out, there’s\
    \ a delivery date to meet, and you’re working on code that you just don’t feel\
    \ comfortable with."
  raw: 'This was just a simple example of the analyzer, but it can do a lot more.
    For instance, it will highlight problems in code by using arrows to show the flow
    of execution that, if followed, will lead to the proclaimed issue. In [Figure
    14-11](#part0025.html#Fig11), an uninitialized variable testIfTrue is sent to
    a method. And the method’s return value assigned to testIfTrue is declared a *Dead
    store*, meaning a variable that is not actually being used. This indicates that
    either the variable is not needed or perhaps some other variable was incorrectly
    used in its place.


    ![9781484202630_Fig14-11.jpg](images/00217.jpeg)


    [Figure 14-11](#part0025.html#_Fig11). The analyze build uses arrows to point
    out the flow of logic leading to an issue


    **Caution**  The analyze build may sometimes report false positives. Code that
    it deems flawed but isn’t. Not every problem reported by the analyzer needs to
    be fixed, but you ought to understand the reason for the report well enough to
    be confident that the issue can be disregarded. It’s the same as with compiler
    warnings.


    Cocos2D Framerate Stats


    In addition to doing debug drawing for physics, Cocos2D can also draw profiling
    counters, most notably the framerate display. To enable these profiling labels,
    you only need to add the line in [Listing 14-8](#part0025.html#list8) anywhere
    in your code—for instance, in the startScene method in *AppDelegate.m*.


    [***Listing 14-8***](#part0025.html#_list8). Enabling profiling labels


    ```

    [CCDirector sharedDirector].displayStats = YES;

    ```


    Cocos2D will then draw three numbers in the lower left corner, as shown in [Figure
    14-12](#part0025.html#Fig12).


    ![9781484202630_Fig14-12.jpg](images/00218.jpeg)


    [Figure 14-12](#part0025.html#_Fig12). The game runs with profiling labels enabled


    From top to bottom, these numbers are:


    *   *Draw Calls* (here: 12): A draw call basically occurs every time OpenGL needs
    to draw from a different texture, but there are other reasons too. Each draw call
    incurs a penalty, so the goal is to have as few as possible. The way to achieve
    that is by using Sprite Sheets to combine multiple images in the same texture,
    and to use as few Sprite Sheets as possible. The draw call of 12 in this example
    is reasonably low. You will most likely see performance degradation if the number
    of draw calls is close to or even above 100\.

    *   ***Seconds per Frame*** **(here: 0.057):** This refers to the average time
    it took to complete the update cycle for a frame, which includes processing game
    logic, physics, and rendering. To achieve 60 frames per second (fps), the seconds
    per frame must be 0.0166 or less. You have twice as long if your framerate target
    is 30 fps. The main use of the seconds-per-frame counter is to see how much room
    you have to add more game logic before the framerate drops again.

    *   ***Frames per second*** **(here: 15.0):** That’s the framerate, and before
    you wonder: it’s only 15 frames per second because the screenshot was taken in
    the iOS Simulator. The Simulator uses a software renderer that is quite slow.
    The game runs with 60 fps on most devices. Also, note that this value is an average
    of the most recent frames, so a value of 45 actually means that half of the frames
    were rendered within 0.0166 seconds (60 fps) and the other half took more than
    that (30 fps).


    It is worth noting that iOS devices have vertical synchronization (vsync) always
    enabled. The framerate counter gives you an average number of frames over multiple
    frames. In reality, you can only have a constant framerate of 60, 30, 20, 15,
    12, 10, and 6 fps. All of these values are factors of 60\. Due to vsync being
    enabled, if a frame did not complete its update-and-render cycle within 0.0166
    seconds, it will be displayed at the earliest in another 0.0166 seconds, not as
    soon as it’s done. So once the game starts taking more than 0.0166 seconds to
    complete every frame, the framerate falls back to 30 fps.


    For some games where the framerate fluctuates heavily between 30 to 60 fps, it
    can make sense to lock the framerate at a constant 30 fps. This may feel smoother
    than a constantly fluctuating framerate that skips a couple frames, and thus drops
    to 30 fps and then renders a few more frames at 60 fps. To change the maximum
    framerate, you can add the lines in [Listing 14-9](#part0025.html#list9) to the
    startScene method in *AppDelegate.m*.


    [***Listing 14-9***](#part0025.html#_list9). Restricting framerate to 30 fps


    ```

    CGFloat framesPerSecond = 30;

    [CCDirector sharedDirector].animationInterval = 1.0 / framesPerSecond;

    ```


    The division by framesPerSecond is necessary because the animationInterval is
    expressed as seconds per frame.


    Walking the Scene Graph


    Another useful debugging feature of Cocos2D is a function that prints out the
    nodes and their children recursively, given a specific starting node. (See [Listing
    14-10](#part0025.html#list10).) You may want to add that line to the didLoadFromCCB
    method in the MainScene or GameScene class, or both.


    [***Listing 14-10***](#part0025.html#_list10). Logging the scene graph


    ```

    [self.scene walkSceneGraph:0];

    ```


    This prints out the scene or node graph recursively, beginning with self.scene.
    You can use any other node as the starting point. The parameter ought to be 0
    because it’s used only internally to properly indent child nodes. You can see
    an example output in [Listing 14-11](#part0025.html#list11).


    [***Listing 14-11***](#part0025.html#_list11). Output of walkSceneGraph


    ```

    walk tree: -> <CCScene = 0x10a620550 | Name = (null)> 0x10a620550

    walk tree: ---> <CCNode = 0x10a36a130 | Name = > 0x10a36a130

    walk tree: ----> <CCNode = 0x10a36cad0 | Name = background> 0x10a36cad0

    walk tree: -----> <CCNodeGradient = 0x10a36d710 | Name = > 0x10a36d710

    walk tree: -----> <CCSprite = 0x10a36e850 | Rect = (0.00,0.00,593.50,406.00) |

                       tag =  > 0x10a36e850

    walk tree: -----> <CCNode = 0x10a36fe00 | Name = > 0x10a36fe00

    walk tree: ------> <CCNodeColor = 0x10a370690 | Name = > 0x10a370690

    walk tree: ------> <CCSprite = 0x10a371780 | Rect = (916.5,0.5,102.0,42.0) |

                        tag =  > 0x10a371780

    walk tree: ------> <CCSprite = 0x10a374a80 | Rect = (916.5,0.5,102.0,42.0) |

                        tag =  > 0x10a374a80

    ```


    This can be helpful in determining whether a given node is in the place in the
    hierarchy that you expect it to be. If it isn’t, this tells you where it is or
    whether it’s not there at all. In this case, the CCScene has a single CCNode child
    node, which in turn has a child CCNode whose name is *background*.


    **Tip**  The formatting and logged properties may not suit all purposes. You may
    want to make a copy of the walkSceneGraph method found in the *CCNode+Debug.m*
    file and modify it to generate the output you find more helpful.


    Debugging Advice


    It is my sincerest wish that you take an analytical approach to debugging. Ask
    yourself “Why?” constantly. As a programmer, you have the rare fortune to work
    with a deterministic system where the same conditions always lead to the exact
    same outcome. Given logs, assertions, breakpoints, and stepping through code,
    you have all the tools needed to analyze where your code is going wrong.


    But don’t forget the compiler has a say in this, too—which is to say: don’t ignore
    compiler warnings. They, too, inform you of potential, and sometimes actual, issues.
    Ignoring them should be done only if you understand the reason for the warning
    and the implications of not fixing it.


    The worst thing you can do when you encounter a problem is to become angry. I
    know that’s easier said than done. Especially, when you’re already stressed out,
    there’s a delivery date to meet, and you’re working on code that you just don’t
    feel comfortable with.'
  trans: "\n这只是分析器的一个简单示例，但它能做的事情远不止于此。例如，它可以通过箭头突出代码中的问题，显示执行流程，如果遵循该流程，将导致所报告的问题。在图\
    \ 14-11 中，一个未初始化的变量`testIfTrue`被传递给一个方法。而该方法返回的值赋给`testIfTrue`后，被声明为*死存储*，意味着该变量实际上未被使用。这表明要么该变量并不需要，要么其他变量被错误地用于其位置。\n\
    \n![9781484202630_Fig14-11.jpg](img/00217.jpeg)\n\n图 14-11. 分析构建使用箭头指出导致问题的逻辑流程\n\
    \n**注意**：分析构建有时可能会报告误报，即它认为有缺陷但实际上没有问题的代码。并非分析器报告的每个问题都需要修复，但你应该充分理解报告的原因，从而确信该问题可以忽略。这与编译器警告的道理相同。\n\
    \n## Cocos2D 帧率统计\n\n除了对物理引擎进行调试绘制外，Cocos2D 还可以绘制性能分析计数器，最显眼的是帧率显示。要启用这些性能分析标签，你只需在代码中的任意位置（例如，在`AppDelegate.m`的`startScene`方法中）添加代码清单\
    \ 14-8 中的那一行代码。\n\n***代码清单 14-8***. 启用性能分析标签\n\n```\n[CCDirector sharedDirector].displayStats\
    \ = YES;\n```\n\n然后，Cocos2D 将在左下角绘制三个数字，如图 14-12 所示。\n\n![9781484202630_Fig14-12.jpg](img/00218.jpeg)\n\
    \n图 14-12. 启用性能分析标签后运行的游戏\n\n从上到下，这些数字分别是：\n\n*   *绘制调用次数*（此处为：12）：基本上，每次 OpenGL\
    \ 需要从不同的纹理进行绘制时，就会发生一次绘制调用，但还有其他原因。每次绘制调用都会产生性能开销，因此目标是尽可能少地调用。实现这一目标的途径是使用精灵表将多个图像合并到同一纹理中，并尽可能少地使用精灵表。本例中\
    \ 12 次绘制调用是相当低的。如果绘制调用次数接近或超过 100，你很可能会看到性能下降。\n*   *每帧耗时*（此处为：0.057）：这指的是完成一帧更新周期所需的平均时间，包括处理游戏逻辑、物理和渲染。要达到每秒\
    \ 60 帧（fps），每帧耗时必须为 0.0166 秒或更少。如果你的帧率目标是 30 fps，那么你有两倍的时间。每帧耗时计数器的主要用途是查看在帧率再次下降之前，你还有多少空间来添加更多游戏逻辑。\n\
    *   *帧率*（此处为：15.0）：这就是帧率。在你疑惑之前先说明：这只是每秒 15 帧，因为截屏是在 iOS 模拟器中进行的。模拟器使用一个相当缓慢的软件渲染器。该游戏在大多数设备上以\
    \ 60 fps 运行。另外，请注意，这个值是最近几帧的平均值，所以 45 的值实际上意味着有一半的帧在 0.0166 秒（60 fps）内渲染完成，而另一半耗时更长（30\
    \ fps）。\n\n值得注意的是，iOS 设备始终启用了垂直同步（vsync）。帧率计数器给出的是多帧的平均帧数。实际上，你只能获得恒定的帧率：60、30、20、15、12、10\
    \ 和 6 fps。所有这些值都是 60 的因数。由于启用了垂直同步，如果一帧没有在 0.0166 秒内完成其更新和渲染周期，它将最早在另一个 0.0166\
    \ 秒后显示，而不是一旦完成就立即显示。因此，一旦游戏开始花费超过 0.0166 秒来完成每一帧，帧率就会回落到 30 fps。\n\n对于某些帧率在 30\
    \ 到 60 fps 之间剧烈波动的游戏，将帧率锁定在恒定的 30 fps 可能是有意义的。这可能会比一个持续波动、跳过几帧从而导致降至 30 fps、然后又以\
    \ 60 fps 渲染几帧的帧率感觉更平滑。要更改最大帧率，你可以在`AppDelegate.m`的`startScene`方法中添加代码清单 14-9 中的代码行。\n\
    \n***代码清单 14-9***. 将帧率限制为 30 fps\n\n```\nCGFloat framesPerSecond = 30;\n[CCDirector\
    \ sharedDirector].animationInterval = 1.0 / framesPerSecond;\n```\n\n除以`framesPerSecond`是必要的，因为`animationInterval`以秒每帧表示。\n\
    \n## 遍历场景图\n\nCocos2D 另一个有用的调试功能是一个函数，它可以递归地打印出给定起始节点及其所有子节点。（参见代码清单 14-10。）你可能想将这行代码添加到`MainScene`或`GameScene`类的`didLoadFromCCB`方法中，或者两者都添加。\n\
    \n***代码清单 14-10***. 记录场景图\n\n```\n[self.scene walkSceneGraph:0];\n```\n\n这会从`self.scene`开始递归地打印出场景或节点图。你可以使用任何其他节点作为起始点。参数应为`0`，因为它仅内部用于恰当地缩进子节点。你可以在代码清单\
    \ 14-11 中看到一个输出示例。\n\n***代码清单 14-11***. `walkSceneGraph`的输出\n\n```\nwalk tree:\
    \ -> <CCScene = 0x10a620550 | Name = (null)> 0x10a620550\nwalk tree: ---> <CCNode\
    \ = 0x10a36a130 | Name = > 0x10a36a130\nwalk tree: ----> <CCNode = 0x10a36cad0\
    \ | Name = background> 0x10a36cad0\nwalk tree: -----> <CCNodeGradient = 0x10a36d710\
    \ | Name = > 0x10a36d710\nwalk tree: -----> <CCSprite = 0x10a36e850 | Rect = (0.00,0.00,593.50,406.00)\
    \ |\n                   tag =  > 0x10a36e850\nwalk tree: -----> <CCNode = 0x10a36fe00\
    \ | Name = > 0x10a36fe00\nwalk tree: ------> <CCNodeColor = 0x10a370690 | Name\
    \ = > 0x10a370690\nwalk tree: ------> <CCSprite = 0x10a371780 | Rect = (916.5,0.5,102.0,42.0)\
    \ |\n                    tag =  > 0x10a371780\nwalk tree: ------> <CCSprite =\
    \ 0x10a374a80 | Rect = (916.5,0.5,102.0,42.0) |\n                    tag =  >\
    \ 0x10a374a80\n```\n\n这有助于确定某个给定节点是否位于层次结构中你期望的位置。如果不是，它会告诉你它在哪里，或者它是否根本不存在。在这个例子中，`CCScene`有一个单一的`CCNode`子节点，而该子节点又有一个名为`background`的子`CCNode`节点。\n\
    \n**提示**：格式化和记录的属性可能并非适用于所有目的。你可能需要复制`CCNode+Debug.m`文件中的`walkSceneGraph`方法，并对其进行修改，以生成你觉得更有用的输出。\n\
    \n## 调试建议\n\n我诚挚地希望你能以分析性的方法进行调试。不断问自己“为什么？”作为程序员，你拥有难得的好运，可以在一个确定性系统上工作，其中相同的条件总是导致完全相同的结果。借助日志、断言、断点和单步执行代码，你拥有了分析代码出错位置所需的所有工具。\n\
    \n但别忘了编译器对此也有发言权——也就是说：不要忽略编译器警告。它们也通知你潜在的问题，有时是实际的问题。只有在你理解了警告的原因以及不修复它的影响时，才应该忽略它们。\n\
    \n当遇到问题时，你能做的最糟糕的事情就是生气。我知道这说起来容易做起来难。尤其是当你已经压力很大，有交付日期要赶，并且正在处理你感觉不太舒服的代码时。\n"
- fmt: '但愤怒和最终沮丧会严重影响你分析问题的能力，这将使你定位和修复 bug 所需的时间增加，甚至可能十倍。因此，关于调试，我能给出的最好建议就是保持冷静。无论你选择冥想、散步、喝杯咖啡、购物还是玩游戏，任何能让你远离一个恼人问题的方式，往往都是之后更容易解决问题的好方法。


    当你依赖其他代码时——例如，使用`Cocos2D`类并调用它们的方法，但它们的表现出乎意料——你需要使用不同的工具。你可以使用的其他工具是类或 API 参考。类参考包含了对类及其方法的简短描述。一个好的类参考会告诉你，你对某个类或方法及其参数的假设是否正确，以及在什么条件下该方法会返回什么值。很多时候，你会发现你最初对该类或方法如何工作的假设是错误的。


    **提示**  `Cocos2D`类参考可以在这里找到：[http://www.cocos2d-swift.org/docs/api/index.html](http://www.cocos2d-swift.org/docs/api/index.html)。苹果的类参考可以通过谷歌搜索类名加上“class
    reference”轻松找到，例如搜索`NSArray class reference`。


    尽管如此，如果你发现某个`Cocos2D`方法有问题——例如，它在你期望返回对象引用时返回了`nil`——你可以使用`Step Into`命令来深入`Cocos2D`代码。你可能会惊讶于通过单步执行`Cocos2D`代码能学到多少东西，以及它做了哪些假设。你可能无法完全理解所有内容，但如果你使用`Step
    Over`、`Step Into`和`Step Out`命令来跟踪程序执行，观察它通过`Cocos2D`源代码的路径，你仍然可以很好地掌握它做了什么以及具体在哪里出错。


    例如，也许`Cocos2D`根本找不到你试图加载的文件，你可以看到这一点，因为它不会进入带有`fileExistsAtPath:` 条件的`if`块。而且，由于作用域内有一个`NSString`变量，你可以在“变量视图”中看到实际的路径，以防它被`Cocos2D`修改过。


    经过时间和经验的积累，你将学会凭直觉评估此类情况，并更快地找到最可能的原因。一旦遇到意想不到的问题，设置断点并检查变量是一个好习惯。直观地看到变量的状态以及代码逐行运行时的行为，会让大多数问题变得相当明显。


    有时，即使调试工具在手，你也可能花了几个小时甚至几天都找不到某个特定问题。如果你一小时内找不到原因，并且认为自己已经尝试了所有能力范围内的方法去理解问题，那么不要犹豫，去问吧。前往`SpriteBuilder`（[http://forum.spritebuilder.com](http://forum.spritebuilder.com)）和`Cocos2D`（[http://forum.cocos2d-swift.org](http://forum.cocos2d-swift.org)）论坛提出与它们相关的任何问题。或者前往[http://stackoverflow.com](http://stackoverflow.com)提出你编程方面的问题。当然，你应该先尽可能缩小问题范围，并搜索你所遇到问题的所有方面。很可能已经有人遇到过类似的问题，甚至一模一样的问题。


    我甚至听程序员说过，他们曾试图在自己的代码中修复一个特定的 bug 长达一周之久。这简直是疯了。你可以复制一份项目，然后开始逐一移除或修改可能有问题的代码段，并再次尝试，直到问题无法复现。那么问题一定与你最后移除的代码有关。由于这很可能不止一行代码，你可以对那个特定的类或方法采用相同的方法，直到找到有问题的行。当你接近问题但仍无法弄清时，那就是将该代码片段以及你目前所知的一切发布到`SpriteBuilder`或`Cocos2D`论坛的好时机。


    不要在一个特定的 bug 上花费太长时间也是个好主意。先去做点别的事情，这样你就可以稍后以全新的视角来看待问题。带着 bug 睡一觉，第二天再处理，效果有时出奇地好。如果是崩溃或其他致命
    bug，如果你想在项目中继续做其他事情，也许可以暂时绕过它。


    在我结束这个话题之前，最后一点是：把调试看作是一项编程任务，就像编写代码一样。它不是你工作的障碍，而是编程中不可或缺的基本方面。编写代码和调试代码都可以通过练习来学习。要编写代码，你需要学习编程语言；要编写更好的代码，你需要学习代码设计和架构。调试也一样，你需要学习用于调试应用程序的工具。最终，你将学习到避免问题并及早发现问题的策略，以及分类
    bug 并选择正确工具进行分析的方法。


    这些建议只是你可以尝试的方法的冰山一角，而且相当概括。但我确实希望它能让你摆正心态：bug 是在挑战你，需要你去克服它们。而每次你成功克服，你都会成为更好的程序员，并因此更经常、更快速地成功。此外，修复那个时隐时现、让你烦恼不已的该死的
    bug，会给人一种非常振奋的感觉。


    ### 常见问题


    在撰写本书的过程中，我自己也遇到了许多问题，这些问题可以归因于人为错误或对`SpriteBuilder`界面的误解。有些问题出现得相当频繁，所以我想在这里总结一下。


    ### nil 引用


    一个常见的问题是发现实例变量或属性是`nil`。通过断点或`NSLog`很容易发现这种情况。但为什么它是`nil`呢？


    如果你通过`SpriteBuilder`的“项目代码连接”选项卡分配了变量，请检查以下几点：


    *   变量类型是否设置为“doc root var”。

    *   是否存在误解，例如“doc root var”被分配给了`CCB`根节点的自定义类，而不是节点的自定义类。

    *   `CCB`的根节点是否将其“自定义类”字段设置为正确的类。

    *   相关的自定义类是否声明了同名且对应的实例变量或属性。


    如果你通过名称来分配变量——例如，使用`getChildByName:`——你应该验证以下几点：'
  raw: 'But being angry and eventually frustrated seriously impacts your ability to
    approach a problem analytically, which will increase the time it takes you to
    locate and fix the bug, possibly tenfold. So the best advice I can give when it
    comes to debugging is to keep...your...calm. Whether you meditate, take a stroll,
    get a cup of coffee, go shopping, play a game, anything that lets you get away
    from a really annoying problem is frequently a very good way to solve the problem
    more easily at a later time.


    Where you depend on other code—for instance, when using Cocos2D classes and calling
    their methods, and they behave unexpectedly—you need to use different tools. The
    other tools you can use are the class or API references. Class references contain
    short descriptions of classes and their methods. A good class reference will tell
    you whether your assumptions about a given class or method and its parameters
    are indeed correct, and under which conditions the method returns what values.
    More often than not, you’ll find your assumptions about how the class or method
    works were wrong to begin with.


    **Tip**  The Cocos2D class reference can be found here: [http://www.cocos2d-swift.org/docs/api/index.html](http://www.cocos2d-swift.org/docs/api/index.html).
    The Apple class references are easily Googled by using the name of the class followed
    by class reference—for instance “NSArray class reference”.


    Nevertheless, if you find that a Cocos2D method is at fault—say, it returns nil
    where you expect it to return an object reference—you can use the Step Into command
    to wade through the code in Cocos2D. You may be surprised how much you can learn
    from stepping through Cocos2D code and what assumptions it makes. You might not
    understand all of it, but you may still be able to get a good grasp of what it
    does and where exactly it goes wrong if you use the Step Over, Into, and Out commands
    to follow the program execution to see which path it takes through the Cocos2D
    sources.


    For instance, maybe Cocos2D is simply not able to find the file you’re trying
    to load, and you can see that because it will not step into the if block with
    the fileExistsAtPath: condition. And since there’s an NSString variable in scope,
    you’ll see in the *Variables View* what the actual path is, in case it has been
    modified by Cocos2D.


    Given time and experience, you’ll learn to assess such situations intuitively
    and hunt down the most likely cause more quickly. It’s a good idea to set a breakpoint
    and inspect variables as soon as you run into an unexpected problem. Visually,
    seeing what the state of variables is and what your code does when you run it
    line by line will make the majority of issues rather obvious.


    Sometimes, even with the debugging tools at hand, you may fail to find a particular
    problem for hours, or maybe even for days. If you can’t find the cause within
    an hour and think you have tried everything within your power to understand the
    problem, don’t hesitate to ask. Go to the SpriteBuilder ([http://forum.spritebuilder.com](http://forum.spritebuilder.com))
    and Cocos2D ([http://forum.cocos2d-swift.org](http://forum.cocos2d-swift.org))
    forums to ask any questions related to them. Or go to [http://stackoverflow.com](http://stackoverflow.com)
    to ask your programming-centric questions. Of course, you should first narrow
    down the problem as much as possible and search for all aspects of the problem
    you’re experiencing. There’s a good chance someone else already had a similar
    problem, if not the same problem.


    I’ve even heard from programmers that they were trying to fix a particular bug
    in their own code for up to a week. That’s just madness. You may want to make
    a copy of your project and then start removing or altering possibly offending
    sections of code one by one and try again until you can no longer reproduce the
    issue. The problem must then be related to the code you removed last. Since that
    is likely going to be more than one line of code, you can use the same approach
    on that particular class or method until you find out what line may be the problem.
    When you get close but still can’t figure out the issue, that’s a good time to
    post that code fragment and everything you know so far on the SpriteBuilder or
    Cocos2D forum.


    It’s also a good idea not to focus too long on fixing a particular bug. Do something
    else for a while so that you can later look at the problem with a fresh set of
    eyes, so to speak. Sleeping overnight on a bug and working on it the next day
    can do wonders. If it’s a crash or other showstopper bug, you may be able to work
    around it temporarily if you want to continue doing something else within your
    project.


    The last point before I let it go of this topic is to consider debugging as a
    programming task, just like writing code. It’s not a hindrance to your work but
    an essential, fundamental aspect of programming. Both writing and debugging code
    can be learned through exercise. To write code, you need to learn the programming
    language, and to write better code you need to learn about code design and architecture.
    The same goes for debugging, where you need to learn the tools used to debug an
    application. Eventually, you’ll learn about strategies for avoiding issues and
    catching them early, as well as classifying bugs and picking the right tools for
    analyzing them.


    This advice is just scratching the surface of measures you can try, and it’s rather
    generalized. But I do hope it puts you in the right state of mind: bugs are challenging
    you to overcome them. And every time you succeed, you become a better programmer,
    and you’ll continue to succeed more often and more quickly because of it. Plus,
    it can be a very uplifting feeling to fix that pesky bastard of a bug that’s been
    bothering you on and off.


    Frequently Encountered Issues


    While writing the book, I myself came across many issues that can be attributed
    to human error or misunderstandings about the SpriteBuilder interface. Some issues
    surfaced rather frequently, so I would like to summarize them here.


    Nil References


    A common problem is realizing that an ivar or property is nil. This condition
    is easy to find out with a breakpoint or NSLog. But why is it nil?


    If you assign the variable via SpriteBuilder’s *Item Code Connections* tab, check
    the following:


    *   Whether the variable type is set to “doc root var.”

    *   Whether there is a misunderstanding, such as the doc root var is assigned
    to the CCB root node’s Custom class, rather than the Custom class of the node.

    *   Whether the CCB’s root node has its Custom class field set to the correct
    class.

    *   Whether the custom class in question has declared a corresponding ivar or
    property of the same name.


    If you assign the variable by its name—for instance, by using getChildByName:,
    you should verify the following:'
