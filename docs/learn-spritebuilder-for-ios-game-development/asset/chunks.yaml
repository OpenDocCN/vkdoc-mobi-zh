    You will find this documentation online at [http://www.cocos2d-swift.org/docs](http://www.cocos2d-swift.org/docs).
    The first version will cover SpriteBuilder v1.3 and Cocos2D v3.3\. I recommend
    that you keep this link open in a browser tab while reading through this book.


    Personally, I’m glad that I can recover from writing now by…writing more documentation.
    Online documentation is a different format with different requirements and possibilities,
    and I look forward to updating and improving that side of things, too.'
  trans: '

    添加断点


    分析代码


    Cocos2D 帧率统计


    遍历场景图


    调试建议


    常见问题


    空引用


    动画播放问题


    音频播放问题


    为精灵 CCB 类继承 CCSprite


    无法编辑自定义类字段


    无法为节点添加自定义属性


    物理碰撞未按预期工作


    节点未释放


    总结


    索引


    本书献给那些与我分享生活的少数优秀的人，哪怕只是偶尔。


    加比、亚历克斯、布兰登、珍妮特和文森特以及他们的伴侣，我的父母，祖父母（安息），叔伯姑婶，侄子侄女，还有我的同谋马库斯。


    还有你，亲爱的读者。


    # 关于作者


    ![9781484202630_unFM-01.jpg](img/00005.jpeg)


    **史蒂芬·伊特海姆**自 1999 年起便投身游戏行业。在电子艺界 Phenomic 工作室担任软件工程师七年后，他成为一名独立 Cocos2D 开发者、书籍作者和博主。自
    2014 年起，他受雇于 Apportable 公司从事 SpriteBuilder 开发，闲暇之余也会涉猎 Unity 以转换视角——字面意义上的。


    不玩游戏时，史蒂芬是 StackOverflow.com 的活跃参与者；他最近在玩《魔岩山传说 2》和《狙击精英 III》。此外，他对模型铁路也颇有兴趣。


    # 关于技术审校


    ![9781484202630_unFM-02.jpg](img/00006.jpeg)


    **利兰·朗**的编程生涯始于一台 VIC-20 电脑。他先后升级到 Apple IIe 和 Mac 512，并在后者的平台上开始使用 Lightspeed
    Pascal 编写更精美、更复杂的游戏。


    作为爱好者，利兰多年来用 BASIC 和 Pascal 编写过一些程序，但从未深入学习更主流的语言（如 C）或面向对象概念。iPhone SDK 的发布改变了这一切！基于这一契机，利兰一头扎进
    Objective-C 和 iOS 编程的学习中。他目前在南卡罗来纳州一家地板安装公司担任 IT 总监，与最小的女儿同住。他的另外两个女儿和六个孙辈住得足够近，让生活充满乐趣。


    ![9781484202630_unFM-03.jpg](img/00007.jpeg)


    **马丁·沃尔什**是一名独立游戏开发者，也是初创游戏工作室 Pedro 的联合创始人。他还是流行开源游戏框架 Cocos2D 和 SpriteBuilder
    开发套件的定期贡献者。不写代码时，他通常会用 Oculus Rift 鼓捣 VR，焊接老式复古街机电路板，或阅读合成生物学方面的文章。马丁还是一名频繁的 Kickstarter
    支持者。


    大多数时候，你可以在 SpriteBuilder 论坛找到他，帮助其他开发者，并在 twitter.com/martin64k 分享资源。


    # 致谢


    没有 Cocos2D 社区，本书不可能问世。向你们致敬！请继续创造疯狂的作品！


    没有 Apportable 公司辛勤工作的人们（包括像我一样散落世界各地的成员），本书也不可能达到如此质量。在此，我要特别感谢（排名不分先后）维克多·利德霍尔特、科林·杰克逊、克里斯蒂娜·凯利、尼基·韦伯、斯科特·莱姆克、马丁·沃尔什、本杰明·恩茨、拉尔斯·比尔克莫斯和塞耶·安德鲁斯，感谢他们的合作与支持，并容忍我在翻译中屡屡迷失方向。


    当然，我不会忘记那些与我直接合作完成本书的人。衷心感谢凯文·沃尔特和马克·鲍尔斯让我保持信息更新且忙碌，感谢彼得·阿劳和米歇尔·洛曼签约我，以及利兰·朗和马丁·沃尔什提供技术反馈。


    还有马库斯，我与他在同一间办公室合作：感谢他为我提供了亟需的视角转换，一张出人意料地设计精良、适合键盘鼠标和方向盘操控游戏的扶手椅式赌桌，一个虚拟现实头盔（自制的？我们也希望！），以及偶尔的合作游戏和电影。


    我想感谢所有我可能在此忘记提及的人。请放心，你们未在此被点名只是我长期记忆力的缺失。此刻，我或许正后悔未能向你们单独表达谢意。


    # 引言


    在我将上一本书《学习 cocos2d 2》更新至第三版（2012 年末出版）后，我完全没有再写技术书的打算，尤其不是关于 Cocos2D 的。


    首先，写书工作量巨大，眼见它在出版前就已过时更是痛苦——这是许多技术书籍的共同命运。


    另一方面，Cocos2D 的 2.x 版本相当稳定，似乎也未停滞不前。当时它仅处于维护阶段，新功能的开发并非最符合社区利益，而是最符合当时已将开源项目 Cocos2D
    收归内部的公司利益。


    2013 年秋，苹果发布了 iOS 7，随之而来的 Sprite Kit 是一款与当时 Cocos2D 非常相似的 2D 渲染引擎。人们对 Cocos2D
    的兴趣迅速消退。


    就在那时，Apportable 接手了 Cocos2D。它从社区聘请开发者来改进 Cocos2D，最终目标是让它在各个方面超越 Sprite Kit。于是，3.x
    分支的开发工作开始了。


    与此同时，SpriteBuilder 不仅要成为众多编辑器之一，更要成为 Cocos2D 的*可视化编辑器*。它集成良好，没有古怪的设置步骤，也无需等待它赶上对更新版
    Cocos2D 的支持。


    2014 年间，SpriteBuilder 和 Cocos2D 合二为一。激动人心的新功能被加入：完全集成的 Objective-C 版 Chipmunk
    物理引擎，一个透明支持 OpenGL 和 Metal 的新渲染器 API，以及无需编写任何着色器代码的内置着色效果。


    Cocos2D 如今比以往任何时候都更有活力。


    当 Apportable 向我提出写一本关于 SpriteBuilder 和 Cocos2D 的书的构想时，我很快接受了挑战。因为变化太多，我不想让它们湮没无闻，而且我兴奋地看到
    SpriteBuilder 和 Cocos2D 有可能成为我一直期望的样子。


    深知哪些内容最容易过时，我有信心避免大部分技术过时的陷阱，让本书在更长时间内保持有效和实用。本书主要围绕 SpriteBuilder 这一事实无疑有助于此，同样，我基于最新的开发分支来写书也有帮助。写下这些文字时正值
    2014 年 11 月初，本书所涵盖的 SpriteBuilder v1.3 刚刚提交至 Mac App Store 审核。


    我的下一个项目将是更新 SpriteBuilder 和 Cocos2D 的在线文档。它旨在成为一本与本书相辅相成的参考手册。我将尽最大努力指出任何自本书出版后可能发生重大变化的内容。


    你可以在 [`www.cocos2d-swift.org/docs`](http://www.cocos2d-swift.org/docs) 在线找到这份文档。第一个版本将涵盖
    SpriteBuilder v1.3 和 Cocos2D v3.3。我建议你在阅读本书时，在浏览器标签页中打开此链接。


    就我个人而言，我很高兴现在可以通过……写更多文档来从写书的工作中恢复过来。在线文档是一种不同的格式，有着不同的要求和可能性，我也期待更新和改进那方面的内容。'
- fmt: '# 排版后的文档


    I also very much look forward to getting your feedback on the `SpriteBuilder`（[http://forum.spritebuilder.com](http://forum.spritebuilder.com)）
    and `Cocos2D`（[http://forum.cocos2d-swift.org](http://forum.cocos2d-swift.org)）forums
    so that I can integrate that feedback in the online documentation.


    And who knows, perhaps after another period of never wanting to write another
    book again I’ll get back to making revisions to this book. I’m starting to think
    that technical writing is, in fact, dangerously addictive.


    In any case, I hope you will enjoy reading this book as much as I enjoyed getting
    high on writing it.


    ## Part I: Introducing SpriteBuilder and Cocos2D-iphone version 3


    ### Chapter 1: Introduction


    Welcome to *Learn SpriteBuilder for iOS Game Development*. This chapter serves
    as an introduction. It explains what you will get out of this book, the program
    versions used by the book, and where to get the resource files, just to name a
    few items.


    #### What’s in This Book?


    In this book, you will learn `SpriteBuilder` by example. The book will guide you
    through the creation of a physics-driven, parallax-scrolling game with the help
    of `SpriteBuilder` and `Cocos2D`（`Cocos2d-Swift` to be precise）. The main influence
    in the design of the example game have been top-selling apps `Badland` and `Leo''s
    Fortune`. The level-based structure will enable you to add more content to the
    game, even without writing additional code.


    As your guide, I will walk you through the individual steps necessary to create
    the game project. Along the way, I’ll explain the `SpriteBuilder` features, caveats,
    workarounds, and helpful tips and tricks as you are most likely to come across
    or need them.


    The book’s projects and resources are available for download on [http://www.apress.com](http://www.apress.com)
    and [http://www.spritebuilder.com](http://www.spritebuilder.com). It is recommended
    to use the provided resources, but of course you are free to use your own images,
    audio, and font files. The example projects allow you to start or continue with
    any chapter.


    **Caution** The book projects are in folders numbered from 00 to 16. The project
    numbers do not correlate with chapter numbers. You will find the corresponding
    projects mentioned in each chapter, usually near the end of a chapter.


    Whenever there’s an easy way and a more efficient way, I’ll be sure to teach you
    the efficient way. In most cases, it doesn’t even amount to notably more work
    in any stage of the process. If I had to pick one such efficiency-boosting feature,
    it would be prefabs accessible through the *Tileless Editor View* and the `Sub
    File` node. It is very important to create as many reusable `CCB` files for individual
    parts of your game as is feasible. It’s the object-oriented approach to designing
    scenes.


    This book is not a complete reference to `SpriteBuilder`, although it covers almost
    all that is nontrivial. You are welcome and encouraged to explore the `SpriteBuilder`
    menus, dialogs, preferences, and even its codebase on your own to learn more.
    However, this is not a requirement to be able to successfully and efficiently
    use `SpriteBuilder`.


    If at any point you need to look something up that’s not explained in this book,
    you can refer to `SpriteBuilder`’s online guide maintained by the folks at `MakeGamesWith.Us`
    at [https://www.makegameswith.us/docs](https://www.makegameswith.us/docs) or ask
    a question in the `SpriteBuilder` forum at [http://www.spritebuilder.com](http://www.spritebuilder.com).


    #### Who Is This Book for?


    You’ve already picked up this book and are reading this paragraph to see if it
    would be a good fit for you. That tells me you have an interest in developing
    games or graphical apps for iOS, you tend to prefer working visually rather than
    program everything, or at least you find the concept intriguing. And perhaps you’re
    already familiar with `Cocos2D` and want to learn how `SpriteBuilder` because
    a visual design tool could change your workflow. If so, this is the right book
    for you.


    You certainly want to know whether this book fits your experience level, your
    programming and technology knowledge, and perhaps even your exact requirements
    for the app you have in mind. This will be more difficult to assess because I
    don’t know you, nor your goals. I do know that if you have an interest in `SpriteBuilder`,
    `Cocos2D`, and game development in general you’ll definitely get something out
    of this book.


    I’ll try by making some assumptions.


    These are the three archetype developers I have in mind for whom this book would
    be a good fit. Beginning developers and those without prior `SpriteBuilder` experience
    will get the most of the step-by-step development of a game with `SpriteBuilder`
    while learning the `SpriteBuilder` user interface and basics of `Cocos2D`.


    Experienced developers will pleasantly acknowledge the benefits of using a graphical
    design tool like `SpriteBuilder`. The workflow tips that I’ll showcase in this
    book will improve your efficiency. Plus you’ll get some candy on top—tricks and
    topics you’ll hardly find covered online, such as creating soft-body physics,
    cool visual effects, and porting your `SpriteBuilder` game to Android.


    ##### The Absolute Beginner


    First, assuming you’ve never ever programmed a mobile app before, if you have
    no experience with `Xcode` and `Cocoa touch` whatsoever, and you don’t know any
    `Objective-C` either, I would strongly recommend picking up an introductory book
    that goes along with this book. Any recent book or tutorial that teaches iOS app
    development with `Objective-C` and `Xcode` from the ground up will be helpful.
    This book assumes you have a working knowledge of `Objective-C` and `Xcode`, so
    a guide or reference on `Objective-C` and `Xcode` would come in handy. Fortunately,
    there are plenty of tutorials and books to choose from. But start by consulting
    the Apple Developer Library first.


    As a beginner, you can do a lot within `SpriteBuilder` and reduce the amount of
    code quite significantly. You may even be able to create simple games with very
    little programming. However, I’m cautious about spelling this out because it may
    create false expectations. You may need to tone down your initial expectations
    for your first `SpriteBuilder` game, especially considering that at this point
    it may be almost impossible for you to judge what is and is not possible with
    `SpriteBuilder` in the first place.


    But if you go ahead with a motivation to learn, and perhaps do not try to implement
    your grandest design as your first game, I’m sure you’ll get along just fine.
    Expect to invest a lot of time into any and all technology, since this isn’t just
    a single program you set out to learn—it’s a whole, seemingly overwhelming conglomerate
    of terms and technologies when you venture into game app development. As long
    as you stay patient and eager to learn, it won’t be unpleasant. Plus there’s a
    friendly and helpful community that embraces newcomers like you.


    ##### The Experienced App Developer


    My second assumption is that you may be a seasoned iOS app developer but haven’t
    tried making games yet, perhaps because you would not want to miss out on graphical
    design tools like `Interface Builder`. For you, it should be fairly simple to
    pick up how the `Cocos2D` framework works, after all there’s plenty of documentation
    available. You may want to learn specifically how games are designed and how this
    is different from using `Interface Builder`. You’ll be able to pick up a lot of
    these concepts by reading the book.


    You may need to change some habits and expectations, but besides that I do not
    see any reason why you wouldn’t benefit from reading this book if your goal is
    to make games with `SpriteBuilder`. I suppose the same could be said if you have
    prior mobile game development experience, just not with `Cocos2D` or `SpriteBuilder`.


    ##### The Experienced Cocos2D Game Developer'
