  trans: '

    ![9781484202630_Fig09-02.jpg](img/00119.jpeg)


    图 9-2. 链条与弹簧图像


    如果链条和弹簧图像不在此处，你可以在*Graphics*存档的*GameElements*文件夹中找到它们。在继续操作之前，请将文件名以 `chainball`
    和 `springboard` 开头的 PNG 图像拖放到 SpriteBuilder 的*GameElements*精灵表中。或者，你也可以使用自己的图像。给你一个尺寸参考：`chainball`
    图像为 416x416 像素，`springboard` 为 254x234 像素，这些图像比齿轮和锯片小得多。


    ## 设置链条精灵


    将两个 `chainball` 链条图像拖放到 `Chain.ccb` 舞台上，各取一种。其中一个看起来像小写字母 l (`chainball_chain1.png`)，另一个看起来像数字
    8 (`chainball_chain2.png`)。我将它们简称为*l 型链条*和*8 型链条*图像。它们是图 9-2 第一行中最右侧的两个图像。同时，将一个
    `chainball_ball.png`（图 9-2 中顶行最左侧的图像）拖放到舞台上。


    确保所有精灵都是根节点的子节点，因为你不希望它们彼此成为子节点。位置暂时不重要——你将首先编辑物理属性。


    选择 8 型链条，然后在*项目物理*选项卡中，选中*启用物理*复选框。你应该将所有物理属性保留为默认值。你或许希望编辑物理形状，使矩形略微变小，但不要添加任何顶点——无需将链条的碰撞形状做得比矩形更精细。完成后，你可以复制（`Cmd+C`）并粘贴（`Cmd+V`）该节点两次，这样你总共就有三个看起来像“8”的链条。


    接下来，对 l 型链条节点执行相同操作。选中它，勾选*启用物理*，然后务必编辑其碰撞形状使其变小。使用 `Cmd+` 和 `Cmd–` 放大或缩小视图，以便更精确地编辑碰撞形状。编辑碰撞形状后，再创建该精灵的两个副本。现在你应该总共有六个链条精灵，每种三个。


    现在选中球体精灵，并勾选其*启用物理*复选框。但在这种情况下，将其*物理形状*更改为*圆形*，并将*边角半径*设置为*42*。由于碰撞形状相对于球体中心略有偏移，请单击并拖动其中心手柄来移动碰撞圆，使其完全包含在球体内部并大致居中。不需要完美居中。你还应该将球体的密度更改为*0.5*；否则，玩家将很难将球体推开。


    最后，转到*节点库视图*，将一个普通节点拖放到舞台上，像其他节点一样使其成为根节点的子节点。这将成为链条的“挂钩”节点，标记链条固定在世界中的位置，这样链条就不会直接掉下来。


    将*挂钩*节点向上移动一点，将其位置更改为 `0x10`，这样最顶部的链条元素就能正确地围绕挂钩旋转。在`CCNode`的*项目物理*选项卡中，勾选*启用物理*，并将刚体类型更改为*静态*。同时，将*物理形状*设置为*圆形*，并将*边角半径*更改为*8*。你还应该在时间线中将此节点重命名为**hook**。


    现在，按照图 9-3 所示的图案排列这些图像。


    ![9781484202630_Fig09-03.jpg](img/00120.jpeg)


    图 9-3. 链条与球体正确排列


    在时间线中选择一个 `chainball_chain2`，并将其位置设置为 `0x0`。这将是顶部的链条元素。现在在时间线中选择一个 `chainball_chain1`
    精灵，并将其位置设置为 `0x–24`。这应该使其看起来完美地勾入了第一个链条。对其余四个链条重复此过程，交替使用 `chain1` 和 `chain2`，使其看起来像图
    9-3，并且每个链条元素的 Y 位置再减少 24 点。链条元素从上到下的 Y 位置应为 0、–24、–48、–72、–96 和 –120。球体的 Y 位置应为
    –178。


    由于 `chain1` 精灵应绘制在所有 `chain2` 精灵之上，你需要在时间线中将 `chain1` 精灵移动到 `chain2` 精灵下方，以确保它们的绘制顺序正确。球体应绘制在最后一个
    `chain1` 精灵下方，因此最好将球体移动到 `chain2` 和 `chain1` 精灵之间。此外，为了让结构更自然，你可能希望将*挂钩*节点移动到最顶层。


    请注意，物理模拟完全不知道节点的绘制顺序。尽管球体排序在两种链条元素之间，但它仍然会完美地悬挂在链条末端。


    **注意** 启用了物理的刚体会忽略其节点的父子关系。这意味着，如果其父节点移动，启用了物理的子节点不会随之移动。物理引擎没有父子概念，因此会将所有启用了物理的刚体视为相互独立。我强烈建议你设计所有复杂的物理对象时不要使用任何父子关系，除非子项没有启用物理并且应该跟随其启用了物理的父节点移动。你将在稍后本章添加的*弹簧*对象的讨论中看到一个例子。


    现在打开 `Level1.ccb`，并在靠近玩家起始位置的地方放置一个 `Chain.ccb` 的实例。如果现在发布并运行，链条的行为将完全不像链条。相反，它会掉下来，并且各个部分会散开，因为你还没有用关节连接它们。


    ## 为链条添加枢轴关节


    让我们把这个链条变得名副其实。打开 `Chain.ccb`，从*节点库视图*中，将一个*物理枢轴关节*拖放到舞台上。这将添加一个粉色的圆形对象，选中它时，会在其下方显示两个额外的小圆圈。参见图
    9-4。


    ![9781484202630_Fig09-04.jpg](img/00121.jpeg)


    图 9-4. 从右侧的枢轴关节拖出一条连接线到左侧的挂钩节点


    注意，新关节会以 `CCPhysicsJoint` 的形式添加到时间线的*关节*组下。你可以像选择其他节点一样，通过在舞台或时间线上单击来选择关节。同样，你也可以像拖放节点一样拖放关节。但不幸的是，至少在撰写本文时，你还不能复制和粘贴关节。


    关节下方的两个小圆圈，如图 9-4 所示，表示该关节尚未与其他刚体连接。


    你可以单击并拖动其中一个小圆圈来画出一条线。如果你有使用 Interface Builder 的经验，你会发现这种行为类似于连接 IB 输出口和操作。你可以将这条线拖到舞台或时间线上的一个启用了物理的节点上，当高亮的放置目标是一个有效的启用了物理的节点时，松开鼠标按钮即可建立连接。这将建立物理刚体与关节之间的连接。

    '
- fmt: '在此实例中，从左侧的圆形处拖拽一条线，并将其放置到`hook`节点上。您可能会发现，将线拖到时间轴中的`hook`节点上比在舞台上定位它（如[图9-4](#part0019.html#Fig4)所示）更容易。这主要是因为`hook`节点是隐藏的，且其碰撞形状很小。


    从关节下方的右侧圆形处拖拽一条线，连接到第一个链条元素，然后松开。同样，将线拖放到时间轴中的节点上可能会更容易。完成此操作后，两个较小的圆形将消失，表明该关节已正确连接到两个刚体。


    **注意：** 如果在发布`SpriteBuilder`项目时，一个或两个关节连接器未连接到物理体，将会生成警告，提示该关节将无法正常工作。


    ### 编辑通用关节属性


    在保持枢轴关节选中的状态下，转到`Item Properties`选项卡。您将看到一系列新的属性。


    [图9-5](#part0019.html#Fig5)显示了所有关节共有的属性，除了`Reference`属性（该属性仅存在于枢轴关节上），而其他关节则有一个额外的`Anchor
    B`设置。枢轴关节是唯一具有单个锚点的关节。


    ![9781484202630_Fig09-05.jpg](images/00122.jpeg)


    [图9-5](#part0019.html#_Fig5). （几乎）所有关节共有的关节属性


    `Body A`和`Body B`字段显示了所连接节点的时间轴名称。右侧的箭头允许您方便地选择该特定节点。`X`图标允许您移除当前连接，而它左侧的圆形图标允许您拖拽一条线并重新将关节与一个刚体连接。这些圆形按钮与舞台上关节形状下方显示的图标等效（如果关节仅连接到一个或零个刚体）。


    默认情况下，`Collide bodies`复选框未被选中，因为在大多数情况下，您不希望通过关节连接的刚体相互碰撞。在此例中，链条元素是重叠的，因此如果它们相互碰撞，将会出现问题。在设计`Spring`对象时，您会发现选中`Collide
    bodies`的另一个良好用途。


    `Anchor A`（以及对于其他关节的`Anchor B`）决定了两个刚体之间的连接位置。坐标以点为单位，并且始终相对于`Body A`节点，在此例中为`hook`节点。由于您希望第一个链条被固定到钩子上，请将`Anchor
    A`设置为`0x0`。


    `Breaking force`和`Max force`默认设置为无穷大，这意味着关节永远不会断开连接，并且允许使用最大力量来解决其约束。


    `Max force`可以专门用于控制不稳定的关节连接。为了避免施加和积累过大的力量，您可以限制关节用来解决其约束的最大力量。这样做可以防止巨大的力量破坏复杂的物体，或者以防将与之接触的物体以高速弹开。


    通过`Breaking force`，您可以确定关节能够承受的最大力量。如果超过该力量值，关节将被移除，从而切断两个刚体之间的连接。您需要通过实验为每个关节找到合适的断裂力。如果刚体在关节静止时也会分离，则表明断裂力设置得太低。


    **警告：** 如果设置了离散的`Breaking force`值，则该值应小于或等于`Max force`值，以避免在解决碰撞时出现精度问题。


    ### 编辑枢轴关节属性


    让我来逐一介绍枢轴关节特有的其余属性，从`Reference`属性开始，该属性显示在[图9-5](#part0019.html#Fig5)的底部。


    `Reference`属性决定了`Spring`和`Limit`部分的参考角度。如果启用了`Spring`，则`Reference`属性决定了弹簧的方向；对于`Limit`，`Reference`属性决定了`Min`/`Max`值的中心角度。更直观的方法是，只需启用`Spring`或`Limit`，然后更改`Reference`角度以观察其效果。完成后，请务必将`Reference`重置为`0`，并取消选中`Spring`和`Limit`。


    其余属性显示在[图9-6](#part0019.html#Fig6)中。


    ![9781484202630_Fig09-06.jpg](images/00123.jpeg)


    [图9-6](#part0019.html#_Fig6). 枢轴关节特有的属性


    启用`Spring Enabled`允许连接的刚体分离并弹回，而不是被严格限制在枢轴关节的锚点上。这就像是将枢轴关节与弹簧关节结合。`Reference`角度决定了弹簧的自然方向，但它并不会严格约束刚体沿着这个确切的角度运动。`Rest
    Angle`设置允许您进一步偏移弹簧角度，以防您需要同时启用`Spring`和`Limit`，但弹簧需要指向与`Reference`角度不同的方向。请注意，负角度值是完全允许的。


    `Spring Damping`和`Stiffness`值与弹簧关节的相同。当两个刚体彼此靠近或远离运动时，阻尼就会起作用。默认阻尼值为1，完全不会改变刚体的速度。但是，阻尼值为0.9会使两个刚体远离或靠近彼此的速度每秒减少10%。阻尼值为0将允许两个刚体只能以非常低的速度彼此远离或靠近。如果您想要一个名副其实的弹簧，您会希望使用介于0.5和1之间的阻尼值。


    弹簧的`Stiffness`值本质上决定了弹簧的强度。高刚度值将使两个刚体施加很大的力量，以快速达到它们预期的位置，而低刚度值则只会逐渐将两个刚体拉在一起或将其分开。


    启用`Limit Enabled`设置允许您确定两个刚体可以围绕彼此旋转的`Min`和`Max`角度。准确地说，它决定了相对于`Body A`的角度限制。由于链条的枢轴关节应该有一个角度限制，请选中`Limit
    Enabled`复选框，并在`Min`和`Max`字段中输入从`–135`到`135`的范围，如[图9-7](#part0019.html#Fig7)所示。这可以防止链条元素彼此过度重叠，并特别防止它们完成一整圈旋转，这对于真实世界的链条来说是不可能的行为。


    ![9781484202630_Fig09-07.jpg](images/00124.jpeg)


    [图9-7](#part0019.html#_Fig7). 启用了角度限制的枢轴关节


    请注意，当`Reference`角度设置为0时，舞台上的关节上会有一个向上的箭头，以及一个较短和一个较长的选择手柄。您可以拖动这些手柄来更改`Min`/`Max`值。如果您从`Body
    B`（第一个链条元素）的角度来看这个限制，您可能会认为第一个链条元素只允许向任一侧旋转45度。但正如我之前所说，角度限制是相对于`Body A`的；因此，更直观的初始观察是不正确的。


    相反，[图9-7](#part0019.html#Fig7)中显示的设置允许钩子向任一侧旋转135度。反过来，另一个`Body B`也被允许旋转相同的量。因此，从`Body
    B`的角度来看，选择手柄只是指向了错误的方向。这可能会让人困惑一段时间，所以请尽量记住：角度限制始终是相对于`Body A`的，并且角度限制同样适用于`Body
    B`，但方向相反。'
  raw: 'In this instance, drag from the left circle and drop the line onto the *hook*
    node. You may find it easier to drop the line onto the *hook* node in the Timeline
    rather than trying to locate it on the stage as shown in [Figure 9-4](#part0019.html#Fig4).
    That’s mainly because the hook is invisible and has only a small collision shape.


    Drag a line from the right circle below the joint onto the first chain element
    and then drop the line. Again it may be easier to drop the line on the node in
    the Timeline. Once this is done, the two smaller circles will be gone, indicating
    that this joint is properly connected to two bodies.


    **Note**  Not connecting one or both joint connectors to physics bodies will generate
    a warning when publishing the SpriteBuilder project, indicating that the joint
    will not be functional.


    Editing Common Joint Properties


    With the pivot joint still selected, go to the *Item Properties* tab. You’ll see
    a host of new properties.


    [Figure 9-5](#part0019.html#Fig5) shows the properties common to all joints, except
    for the *Reference* property (which exists only on pivot joints), while the other
    joints have an additional *Anchor B* setting. The pivot joint is the only joint
    with a single anchor point.


    ![9781484202630_Fig09-05.jpg](images/00122.jpeg)


    [Figure 9-5](#part0019.html#_Fig5). Joint properties common to (almost) all joints


    The *Body A* and *Body B* fields show the Timeline names of the connected nodes.
    The right-facing arrow allows you to conveniently select that particular node.
    The X icon lets you remove the current connection, while the circle icon to the
    left of it allows you to drag a line and reconnect the joint with a body. The
    circle buttons are equivalent to the same icons displayed underneath the joint
    shape on the stage if the joint is connected to just one body or no body.


    The *Collide bodies* check box is not selected by default, because in most cases
    you don’t want bodies connected via a joint to be colliding with one another.
    In this case, the chain elements are overlapping, so if they did collide with
    each other it would be a problem. You’ll find a good use for selecting *Collide
    bodies* when designing the *Spring* object.


    *Anchor A* (and, for other joints, *Anchor B* as well) determines where the connection
    between the two bodies is made. The coordinates are in points and always relative
    to the *Body A* node, which in this case is the *hook* node. Since you want the
    first chain to be pinned to the hook, set *Anchor A* to *0x0*.


    *Breaking force* and *Max force* are set to infinity by default, meaning the joint
    will never sever its connections and it is allowed to use maximum force to resolve
    its constraints.


    *Max force* can be used specifically to get restless joint connections under control.
    To avoid applying and accumulating too much force, you can limit the maximum force
    the joint applies to resolve its constraints. Doing this prevents a large amount
    of force from corrupting the complex object or from propelling objects touching
    it away at high speeds.


    With *Breaking force*, you can determine the maximum amount of force the joint
    will be able to withstand. If that amount of force is exceeded, the joint will
    be removed, separating the connection between the two bodies. You will have to
    find an appropriate breaking force for each joint through experimentation. If
    the bodies come apart even when the joint is at rest, you’ll know that the breaking
    force is too low.


    **Caution**  If a discrete *Breaking force* is set, its value should be equal
    to or smaller than *Max force* to avoid accuracy issues when resolving collisions.


    Editing Pivot-Joint Properties


    Let me run down the remaining properties specific to pivot joints, starting with
    the *Reference* property, which is shown at the bottom of [Figure 9-5](#part0019.html#Fig5).


    The *Reference* property determines the reference angle for the *Spring* and *Limit*
    sections. If *Spring* is enabled, the *Reference* property determines the direction
    of the spring; for the *Limit*, the *Reference* property determines the center
    angle of the *Min*/*Max* value. It is probably more instructive to just enable
    either *Spring* or *Limit*, and then change the *Reference* angle to see its effect.
    Be sure to reset *Reference* to *0* and uncheck *Spring* and *Limit* once you
    are done.


    The remaining properties are shown in [Figure 9-6](#part0019.html#Fig6).


    ![9781484202630_Fig09-06.jpg](images/00123.jpeg)


    [Figure 9-6](#part0019.html#_Fig6). Properties specific to the pivot joint.


    *Spring Enabled* allows the connected bodies to separate and bounce back rather
    than being rigidly confined to the pivot joint’s anchor. It is like combining
    a pivot joint with a spring joint. The *Reference* angle determines the natural
    direction of the spring, but it does not rigidly constrain the movement of the
    bodies along this very angle. The *Rest Angle* setting allows you to further offset
    the spring angle in case you need to enable both *Spring* and *Limit*, but the
    spring needs to point in a different direction than the *Reference* angle. Note
    that negative angle values are perfectly okay.


    The *Spring Damping* and *Stiffness* values are the same as for the spring joint.
    Damping comes into effect when the two bodies are either moving toward or away
    from each other. The default damping of 1 does not change the bodies’ velocities
    at all. But a value of 0.9 would reduce the two bodies’ velocity pointing away
    from or toward each other by 10% every second. A damping value of 0 would allow
    the two bodies to move away or toward each other only at very low speed. If you
    want a spring that deserves its name, you’ll want to use a damping value somewhere
    between 0.5 and 1.


    A spring’s stiffness essentially determines how strong the spring is. A high stiffness
    value will have the two bodies apply a lot of force to quickly take their intended
    positions, while a low stiffness value would only gradually pull the two bodies
    together or away from each other.


    The *Limit Enabled* setting allows you to determine the *Min* and *Max* angles
    the two bodies are allowed to rotate around each other. To be precise, it determines
    the angle limits relative to *Body A*. Since the pivot joints for the chain should
    have an angle limit, select the *Limit Enabled* check box and enter a range from
    *–135* to *135* in the *Min* and *Max* fields, as shown in [Figure 9-7](#part0019.html#Fig7).
    This prevents the chain elements from overlapping each other too much and specifically
    prevents them from making a complete revolution, an impossible behavior for a
    real-world chain.


    ![9781484202630_Fig09-07.jpg](images/00124.jpeg)


    [Figure 9-7](#part0019.html#_Fig7). Pivot joint with angle limits enabled


    Notice how, with the *Reference* angle setting being 0, there is an upward-facing
    arrow on the joint on the stage, as well as a shorter and a longer selection handle.
    You can drag these handles to change the *Min*/*Max* values. If you look at this
    limit from the perspective of *Body B*, the first chain element, you might think
    that the first chain element is allowed to rotate only by 45 degrees to either
    side. But like I said before, angle limits are relative to *Body A*; hence, the
    more natural initial observation is incorrect.


    Instead, the setup shown in [Figure 9-7](#part0019.html#Fig7) allows the hook
    to rotate 135 degrees to either side. In turn, the other *Body B* is also allowed
    to rotate by the same amount. So, from the perspective of *Body B*, the selection
    handles are simply pointing in the wrong direction. This is probably going to
    be confusing for a while, so try to keep in mind that angle limits are always
    relative to *Body A*, and the angle limits are equally applied to *Body B* but
    in the opposite direction.'
  trans: '

    在此实例中，从左侧的圆形处拖拽一条线，并将其放置到`hook`节点上。您可能会发现，将线拖到时间轴中的`hook`节点上比在舞台上定位它（如图 9-4 所示）更容易。这主要是因为`hook`节点是隐藏的，且其碰撞形状很小。


    从关节下方的右侧圆形处拖拽一条线，连接到第一个链条元素，然后松开。同样，将线拖放到时间轴中的节点上可能会更容易。完成此操作后，两个较小的圆形将消失，表明该关节已正确连接到两个刚体。


    **注意：** 如果在发布`SpriteBuilder`项目时，一个或两个关节连接器未连接到物理体，将会生成警告，提示该关节将无法正常工作。


    ### 编辑通用关节属性


    在保持枢轴关节选中的状态下，转到`Item Properties`选项卡。您将看到一系列新的属性。


    图 9-5 显示了所有关节共有的属性，除了`Reference`属性（该属性仅存在于枢轴关节上），而其他关节则有一个额外的`Anchor B`设置。枢轴关节是唯一具有单个锚点的关节。


    ![9781484202630_Fig09-05.jpg](img/00122.jpeg)


    图 9-5. （几乎）所有关节共有的关节属性


    `Body A`和`Body B`字段显示了所连接节点的时间轴名称。右侧的箭头允许您方便地选择该特定节点。`X`图标允许您移除当前连接，而它左侧的圆形图标允许您拖拽一条线并重新将关节与一个刚体连接。这些圆形按钮与舞台上关节形状下方显示的图标等效（如果关节仅连接到一个或零个刚体）。


    默认情况下，`Collide bodies`复选框未被选中，因为在大多数情况下，您不希望通过关节连接的刚体相互碰撞。在此例中，链条元素是重叠的，因此如果它们相互碰撞，将会出现问题。在设计`Spring`对象时，您会发现选中`Collide
    bodies`的另一个良好用途。


    `Anchor A`（以及对于其他关节的`Anchor B`）决定了两个刚体之间的连接位置。坐标以点为单位，并且始终相对于`Body A`节点，在此例中为`hook`节点。由于您希望第一个链条被固定到钩子上，请将`Anchor
    A`设置为`0x0`。


    `Breaking force`和`Max force`默认设置为无穷大，这意味着关节永远不会断开连接，并且允许使用最大力量来解决其约束。


    `Max force`可以专门用于控制不稳定的关节连接。为了避免施加和积累过大的力量，您可以限制关节用来解决其约束的最大力量。这样做可以防止巨大的力量破坏复杂的物体，或者以防将与之接触的物体以高速弹开。


    通过`Breaking force`，您可以确定关节能够承受的最大力量。如果超过该力量值，关节将被移除，从而切断两个刚体之间的连接。您需要通过实验为每个关节找到合适的断裂力。如果刚体在关节静止时也会分离，则表明断裂力设置得太低。


    **警告：** 如果设置了离散的`Breaking force`值，则该值应小于或等于`Max force`值，以避免在解决碰撞时出现精度问题。


    ### 编辑枢轴关节属性


    让我来逐一介绍枢轴关节特有的其余属性，从`Reference`属性开始，该属性显示在图 9-5 的底部。


    `Reference`属性决定了`Spring`和`Limit`部分的参考角度。如果启用了`Spring`，则`Reference`属性决定了弹簧的方向；对于`Limit`，`Reference`属性决定了`Min`/`Max`值的中心角度。更直观的方法是，只需启用`Spring`或`Limit`，然后更改`Reference`角度以观察其效果。完成后，请务必将`Reference`重置为`0`，并取消选中`Spring`和`Limit`。


    其余属性显示在图 9-6 中。


    ![9781484202630_Fig09-06.jpg](img/00123.jpeg)


    图 9-6. 枢轴关节特有的属性


    启用`Spring Enabled`允许连接的刚体分离并弹回，而不是被严格限制在枢轴关节的锚点上。这就像是将枢轴关节与弹簧关节结合。`Reference`角度决定了弹簧的自然方向，但它并不会严格约束刚体沿着这个确切的角度运动。`Rest
    Angle`设置允许您进一步偏移弹簧角度，以防您需要同时启用`Spring`和`Limit`，但弹簧需要指向与`Reference`角度不同的方向。请注意，负角度值是完全允许的。


    `Spring Damping`和`Stiffness`值与弹簧关节的相同。当两个刚体彼此靠近或远离运动时，阻尼就会起作用。默认阻尼值为 1，完全不会改变刚体的速度。但是，阻尼值为
    0.9 会使两个刚体远离或靠近彼此的速度每秒减少 10%。阻尼值为 0 将允许两个刚体只能以非常低的速度彼此远离或靠近。如果您想要一个名副其实的弹簧，您会希望使用介于
    0.5 和 1 之间的阻尼值。


    弹簧的`Stiffness`值本质上决定了弹簧的强度。高刚度值将使两个刚体施加很大的力量，以快速达到它们预期的位置，而低刚度值则只会逐渐将两个刚体拉在一起或将其分开。


    启用`Limit Enabled`设置允许您确定两个刚体可以围绕彼此旋转的`Min`和`Max`角度。准确地说，它决定了相对于`Body A`的角度限制。由于链条的枢轴关节应该有一个角度限制，请选中`Limit
    Enabled`复选框，并在`Min`和`Max`字段中输入从`–135`到`135`的范围，如图 9-7 所示。这可以防止链条元素彼此过度重叠，并特别防止它们完成一整圈旋转，这对于真实世界的链条来说是不可能的行为。


    ![9781484202630_Fig09-07.jpg](img/00124.jpeg)


    图 9-7. 启用了角度限制的枢轴关节


    请注意，当`Reference`角度设置为 0 时，舞台上的关节上会有一个向上的箭头，以及一个较短和一个较长的选择手柄。您可以拖动这些手柄来更改`Min`/`Max`值。如果您从`Body
    B`（第一个链条元素）的角度来看这个限制，您可能会认为第一个链条元素只允许向任一侧旋转 45 度。但正如我之前所说，角度限制是相对于`Body A`的；因此，更直观的初始观察是不正确的。


    相反，图 9-7 中显示的设置允许钩子向任一侧旋转 135 度。反过来，另一个`Body B`也被允许旋转相同的量。因此，从`Body B`的角度来看，选择手柄只是指向了错误的方向。这可能会让人困惑一段时间，所以请尽量记住：角度限制始终是相对于`Body
    A`的，并且角度限制同样适用于`Body B`，但方向相反。

    '
- fmt: 'Also, take note that `Min` can never be greater than the `Max` value, and
    vice versa. This may lead to some odd editing behavior where you enter a value
    and SpriteBuilder changes it back to make it the same as the other value. Or,
    if you drag the `Min`/`Max` selection handles, they may suddenly flip to the other
    side or overlap one another to adhere to the “Min must be smaller or equal to
    Max” rule.


    Finally, the mysterious `Motor`. (See [Figure 9-6](#part0019.html#Fig6).) Only
    pivot joints currently provide a `Motor` property. This is not actually a motor;
    rather, it is a constraint that applies a constant rotational force (torque) to
    the connected bodies. The mysterious `Rate` property is the desired angular velocity
    the bodies should take on. Higher values result in more torque. In order to reverse
    the direction of the rotation, simply enter a negative value. A motor’s `Max force`
    may need to be set to prevent the objects from spinning too fast.


    A motor works best if one of the two bodies either has a high density or is a
    static body, while the other has a low density and has a circle collision shape
    (wheel). But, of course, you are not limited to creating motorized vehicles with
    wheels. You could also use it to create a bear trap that snaps open and shut,
    though any type of motor that needs to be turned on and off or sped up and slowed
    down requires writing code.


    ## Connecting the Chain Elements


    You are now tasked with adding the six pivot joints to `Chain.ccb`. Unfortunately,
    you can’t copy and paste the existing joint, but please do try it in case this
    feature has been added by the time you are reading this.


    If you can’t copy and paste the existing joint, drag and drop six more pivot joints
    from the `Node Library View` onto the stage. Connect the joints one by one to
    the chain elements and the ball. Connect the `Body A` of each joint to the `Body
    B` of the previous joint, and connect `Body B` to the next element in the chain.


    Don’t forget to check `Limit Enabled` for each joint and then set the `Min`/`Max`
    values to `–135` and `135`, respectively.


    If you need help finding good anchors, you can set the anchor for joints whose
    `Body A` is a `chain2` element to 9.5x6 and, for those joints where `Body A` is
    a `chain1` element, set the anchor to 6.5x4. Yes, you need only two different
    anchor values because the anchors are relative to `Body A`, and you only have
    the aforementioned two different types of chain elements that have already been
    moved in place. The ball doesn’t need to be considered because it’s attached as
    `Body B` to the last joint.


    The result of this editing operation should look like [Figure 9-8](#part0019.html#Fig8).


    ![9781484202630_Fig09-08.jpg](images/00125.jpeg)


    [Figure 9-8](#part0019.html#_Fig8). Ball and chain are hooked up, and the selected
    joint shows the angle limits.


    You can now try out your “ball on a chain(TM)”. Feel free to add additional `Chain.ccb`
    instances to `Level1.ccb`. Definitely try rotating the chains so that they start
    out swinging.


    **Note** You may observe strange behavior with the chains at this time—for instance,
    collisions with invisible areas. You’ll fix the collision categories and masks
    later. For now, just ignore the fact that the chains will behave erratically when
    they intersect walls or triggers. For now, just move the chains to a collision-free
    area to test them.


    ## Creating a Rope


    How to create a physics rope is a frequently asked question, yet the solution
    is not nearly as complex as you might imagine. In fact, if you observed the behavior
    of the chain, you may have noticed that it isn’t too far from how a physics-simulated
    rope should behave.


    ### Turning the Chain into a Rope


    In fact, you’re just going to modify the chain to make a rope. To do so, create
    a duplicate of `Chain.ccb` and rename it to `Rope.ccb`.


    **Note** If SpriteBuilder has no duplication functionality yet, you can make a
    copy with Finder. Locate the project’s `.spritebuilder` folder and browse into
    the SpriteBuilder Resources/Prefabs folder in order to make a duplicate of the
    `Chain.ccb`. You should then rename the duplicate to `Rope.ccb`. In SpriteBuilder’s
    `File View`, the `Rope.ccb` should automatically appear in the `Prefabs` folder.


    Open the `Rope.ccb`. Several modifications to the chain are necessary to turn
    it into a rope.


    First, select all the `chain2` sprites, and on the `Item Properties` tab, change
    their `Sprite frame` to `SpriteSheets/GameElements/chainball_chain1.png` in order
    to replace the 8-shaped chain elements with the l-shaped ones. This step is added
    only to improve the visual appearance of the rope.


    Because changing the sprite frames also changes the locations of the pivot joints,
    you should select the joints that are offset from the rope and change their anchor
    to 6.5x4 so that all pivot joints are on the rope and spaced evenly. Also, if
    you switch to the `Item Physics` tab and select the former `chain2` sprites, you’ll
    notice their collision shape is too big for the image. So you should also edit
    the collision shape to more closely match the `chain1` images that you are using
    as rope segments.


    Also, change the `Scale` property of the ball to `0.5x0.5` to make it smaller.
    Change its Y position to –156 to make it connect with the rope. And, on the `Item
    Physics` tab, change its density to `0.15` to make the ball lighter. These new
    settings will reduce stress on the rope and allow it to swing more easily.


    The former chain segments will feel more like a rope if you tweak the joints so
    that the spring is enabled and the angle limit is smaller than before. Perform
    the following steps on all pivot joints with the exception of the first one, the
    one that connects to the `hook` node.


    For each joint, select the `Spring Enabled` check box and then change `Damping`
    to `0.5` and `Stiffness` to `8.0`. Also, ensure `Limit Enabled` is still checked
    before changing the `Min`/`Max` values to `–45` and `45`.


    The spring settings allow the rope to expand and contract slightly, which automatically
    has the effect of distributing forces throughout the rope. A force applied to
    an individual rope segment will therefore spread throughout the entire rope. The
    smaller angle limit also causes any rope segment reaching the limit to pass on
    any further rotation to its connected segment. Again, this helps to give the impression
    that forces acting on individual rope segments affect the entire rope.


    The resulting rope should look like the one in [Figure 9-9](#part0019.html#Fig9).
    Notice that the ball was moved in front of all chain segments to ensure that chain
    segments are drawn in front of the ball.


    ![9781484202630_Fig09-09.jpg](images/00126.jpeg)


    [Figure 9-9](#part0019.html#_Fig9). The chain is now a rope.


    You may have noticed that the rope’s pivot joints now display two buttons underneath
    them, labeled `S` and `L` as shown in [Figure 9-10](#part0019.html#Fig10).


    ![9781484202630_Fig09-10.jpg](images/00127.jpeg)


    [Figure 9-10](#part0019.html#_Fig10). Switching between spring and limit display.


    These buttons allow you to switch between displaying, and thus visually editing,
    the spring’s rest angle when `S` is highlighted. If you click on the `L` button,
    you can see and edit the joint’s `Min`/`Max` angle limits. These two buttons are
    merely switching the display and edit modes of the joint. Changing the button
    states does not alter any of the joint’s settings.


    Feel free to later experiment with the spring and limit values. For example, try
    lowering stiffness and increasing damping to create a rubber-band-type rope, or
    try changing `Min`/`Max` angles to very low angles like –10/10 so that the rope
    is more resistant to bending—more like the stem of a young tree.'
