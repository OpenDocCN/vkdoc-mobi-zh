    **注意**：将来可以尝试仅对`_playerNode`（中心节点）施加力，或不均匀地分布力——例如，仅对周边刚体施加力而不对中心刚体施力。每种方法都会产生不同的运动行为，欢迎您自行实验。


    `scrollToTarget:`方法被调用时，使用`_playerNode`的父节点位置作为偏移量，就像之前在代码清单 10-5 中那样。


    在无错误地编译此代码之前，您需要更新`scrollToTarget:`方法。应用代码清单 10-7 中高亮显示的更改。改动不大，只需添加`withOffset:(CGPoint)offset`参数，并在赋值`viewPos`的那一行中将`offset`加到`target.positionInPoints`上。为简洁起见，省略了方法的其余部分。您不应移除该方法剩余部分，而是保持不变。


    ***代码清单 10-7*** *为`scrollToTarget:`方法添加`offset`参数*


    ```objc

    -(void) scrollToTarget:(CCNode*)target withOffset:(CGPoint)offset

    {

        CGSize viewSize = [CCDirector sharedDirector].viewSize;

        CGPoint viewCenter = CGPointMake(viewSize.width / 2.0,

                                         viewSize.height / 2.0);


        CGPoint viewPos = ccpSub(ccpAdd(target.positionInPoints, offset),

                                 viewCenter);


    // ... 省略剩余代码

    }

    ```


    有了这些代码，您就几乎可以尝试运行了。在此之前，请在 SpriteBuilder 中打开`GameScene.ccb`并选择根节点。请记住，有一些自定义属性控制着玩家的部分行为。由于现在用的是九个更小、质量更低的刚体而非一个大型刚体，且物理力均等地施加到所有九个刚体上，如果不更改设计参数，这些刚体将移动得过快。对于`_playerNudgeRightVelocity`，请输入**4**，而`_playerNudgeUpVelocity`的一个合适值是**12**。再次检查`_drawPhysicsShapes`是否设置为`1`。


    保存并发布。构建并运行。您现在看到的是……嗯，九个较小的刚体（通过物理调试绘制）在关卡中弹跳，而假设的摄像机正跟随其中一个（中心节点）。每个刚体都像独立的玩家一样行动。如果任何一个刚体撞到锯子，游戏就结束了。


    ## 设置顶点与纹理坐标


    您肯定注意到了，玩家那张友善的脸仍固定在原始位置，它不会随着刚体移动。事实上，通过您将要实现的自定义绘制代码，精灵的位置永远不会改变。取而代之的是，您将根据中心节点确定的位置来绘制精灵的纹理，并使用由周边节点确定的形状。


    尽管软体体根本不是一个连贯的整体，但这正是让您了解绘制代码如何工作的关键。它还让您能够看到，如果软体设置因编辑错误或软体对象自身折叠而出现歪斜时会发生什么。


    让我们从平淡无奇的部分开始：声明变量、调用设置代码以及处理内存释放。将`SoftBodyDrawNode.m`更新为代码清单 10-8 中的代码。


    ***代码清单 10-8*** *`SoftBodyDrawNode`类的变量、设置与`dealloc`方法*


    ```objc

    #import "SoftBodyDrawNode.h"


    @implementation SoftBodyDrawNode

    {

    @private

        int _numVertices;

        CCVertex* _vertices;

        CGPoint* _initialBodyPositions;


        CGFloat _enlargeTextureRadius;

        CGFloat _enlargeDrawRadius;

    }


    -(void) dealloc

    {

        [self freeAllocatedMemory];

    }


    -(void) freeAllocatedMemory

    {

        free(_vertices);

        _vertices = nil;


        free(_initialBodyPositions);

        _initialBodyPositions = nil;

    }


    -(void) didLoadFromCCB

    {

        [self setup];

    }


    @end

    ```


    对于绘制代码，您将使用已分配的内存缓冲区。这是经典的 C 语言内存管理。由于`CGPoint`和`CCVertex`是结构体数据类型，不能直接添加到常规的
    Cocoa 集合类（如`NSArray`）中，除非先用`NSValue`对象包装（装箱）它们。因为装箱和拆箱会产生不必要的开销，这在紧凑的渲染循环中是需要避免的，而且
    C 语言风格的内存缓冲区确实并不复杂，因此它们堪称最佳选择。


    在本例中，`_vertices`和`_initialBodyPositions`是指向内存块的指针，这些内存块将分配恰好容纳`_numVertices`个`CCVertex`和`CGPoint`类型。顶点用于绘制纹理，而`_initialBodyPositions`让您能够访问在
    SpriteBuilder 中设计的刚体位置。它们用于计算未变形玩家的纹理坐标，但理论上您也可以利用它们来确定每个刚体当前经历的变形程度（与其原始位置的偏差）。


    由`dealloc`调用的`freeAllocatedMemory`方法，通过对这些指针调用`free`来负责释放它们所指向的内存。这些变量还被设置为`nil`，仅仅是因为不留下悬挂指针是一种良好的编程风格。（*悬挂指针*是指指向已释放内存块的指针。）由于`_vertices`和`_initialBodyPositions`都将使用
    C 语言标准库函数（`malloc`、`calloc`、`realloc`）手动分配，因此它们的内存也必须使用`free`函数手动释放。


    **注意**：ARC 仅让您免于手动管理 Objective-C 类实例的内存，但不会释放使用 C 函数或 C 语言变体以及 Cocoa 的前身 Core
    Foundation 分配的内存。


    `CCVertex`是由 Cocos2D 渲染 API 暴露的结构体类型。请参考代码清单 10-9，其中字段以方括号显示。


    ***代码清单 10-9*** *`CCVertex`类型定义了顶点位置、两个纹理坐标以及一个颜色属性*


    ```objc

    typedef struct CCVertex {

        GLKVector4 position;  // position (x, y, z, w)

        GLKVector2 texCoord1, texCoord2;  // texture coordinates (x, y)

        GLKVector4 color;  // color (r, g, b, a)

    } CCVertex;

    ```

    '
- fmt: '`GLKVector2`和`GLKVector4`类型由 Apple 的 `GLKit` 定义，也是包含两个或四个 `float`（而非 `CGFloat`）值的结构体。与大多数底层
    OpenGL 命令不同，`position` 以点（points）为单位。这是新 `Cocos2D` 渲染 API 的一个优势——在编写渲染代码时，不再需要考虑点到像素的转换。在两个纹理坐标字段中，本示例仅使用了
    `texCoord1`。它定义了映射到该顶点的纹理内的坐标。纹理坐标表示为纹理大小的百分比，范围在 `0.0` 到 `1.0` 之间。最后，颜色是带有 alpha
    值的 RGB 值，范围也在 `0.0` 到 `1.0` 之间。


    `_enlargeTextureRadius` 实例变量将用于增加纹理坐标的半径。这确保了玩家图像不会被裁剪。`_enlargeDrawRadius` 用于整体放大玩家，有效地将其缩放。稍后我会对此进行更多说明。


    现在，在 `didLoadFromCCB` 下方添加 `[列表 10-10](#part0020.html#list10)` 中缺失的 `setup` 方法。


    **[列表 10-10](#part0020.html#_list10).** *内存缓冲区的初始设置与存储物体的初始位置*


    ```

    -(void) setup

    {

        [self freeAllocatedMemory];


    _numVertices = (int)_children.count + 1;

        _vertices = calloc(_numVertices, sizeof(CCVertex));

        _initialBodyPositions = calloc(_numVertices, sizeof(CGPoint));


    int i = 0;

        CGPoint centerPos = ((CCNode*)_children[0]).positionInPoints;


    for (CCNode* child in _children)

        {

            if (child.physicsBody)

            {

                if (i == 0)

                {

                    _initialBodyPositions[i] = centerPos;

                }

                else

                {

                    CGPoint centerToChild = ccpSub(child.positionInPoints,

                                                   centerPos);

                    CGFloat newRadius = ccpLength(centerToChild) +

                                        _enlargeTextureRadius;

                    CGPoint newPos = ccpMult(ccpNormalize(centerToChild),

                                             newRadius);

                    _initialBodyPositions[i] = ccpAdd(newPos, centerPos);

                }


    i++;

            }

        }


    [self updateTextureCoordinates];

    }

    ```


    `setup` 方法首先调用了 `freeAllocatedMemory`。这只是为了防止该方法运行多次。如果先前分配的内存没有被释放，它将丢失（泄漏），因为内存仍被分配，但你将无法再访问它。这是因为
    `setup` 方法分配了新的内存块，并将指针赋值给了 `_vertices` 和 `_initialBodyPositions`。


    `_numVertices` 实例变量被设置为子节点数量加一。有九个子节点（一个中心节点加八个圆周节点），这样就有 10 个顶点。为什么是 10？第十个顶点是用于闭合循环的。中心顶点是第一个，然后是右侧顶点，接着是其他顶点，直到右上顶点。这就是需要再复制一次右侧顶点的地方，以便可以绘制由顶点中心（1）、右上（9）和右侧（2）形成的三角形。请参阅
    [Figure 10-5](#part0020.html#Fig5) 以获得直观说明。


    ![9781484202630_Fig10-05.jpg](images/00148.jpeg)


    **[Figure 10-5](#part0020.html#_Fig5).** *这个* *三角形扇* *（带有顶点编号）用于绘制带纹理的软体玩家*


    本质上，软体圆必须被分割成三角形，才能被 `Cocos2D` 渲染器绘制。第一个三角形是 `1-2-3`，后续的三角形可以通过简单地每添加一个顶点来增加。在
    `1-2-3` 之后，下一个三角形是 `1-3-4`，接着是 `1-4-5`，以此类推。这被称为*三角形扇*，这是一种绘制模式，其中每个后续顶点都被假定为与起始顶点和上一个顶点形成另一个三角形。


    在 `[列表 10-10](#part0020.html#list10)` 中，`_vertices` 和 `_initialBodyPositions`
    都被分配了内存。分配的内存量是 `_numVertices` 乘以相应类型的大小。例如，`_vertices` 将分配 `10 * 48` 字节的内存，总共
    480 字节。所以实际上并不多，特别是相对于精灵的纹理内存而言。这两个指针都指向一个已分配的内存块，并且都可以像 `Objective-C` 数组一样，使用与
    `C` 语言相同的下标操作符进行访问。例如，请参见 `[列表 10-11](#part0020.html#list11)` 中最后一行的赋值。


    **提示** 纹理内存大小是纹理尺寸乘以颜色深度的倍数。相应图像的文件大小通常要小得多。一个常见的初学者错误是认为纹理内存使用量与图像文件大小相同。唉，纹理内存（对于未压缩格式）可以通过以下伪代码计算：`pixelWidth
    * pixelHeight * (colorBitDepth / 8)`。例如，一个 `4096x4096` 的 32 位颜色图像作为未压缩纹理将使用这么多内存：`4096
    * 4096 * (32 / 8) = 67,108,864` 字节（等于 64 兆字节）。


    中心节点的位置需要作为参考（原点）点，并存储在 `centerPos` 变量中。你需要在 `for` 循环内部进行计算，该循环枚举所有子节点。第一个节点是中心节点。它的位置照原样赋值给
    `_initialBodyPositions`。剩余的点会被更新，以将圆的半径增加 `_enlargeTextureRadius` 实例变量中指定的值。`[列表
    10-11](#part0020.html#list11)` 重印了循环的这一部分。


    **[列表 10-11](#part0020.html#_list11).** 假设物体初始位置位于一个更大的圆上


    ```

    CGPoint centerToChild = ccpSub(child.positionInPoints, centerPos);

    CGFloat newRadius = ccpLength(centerToChild) + _enlargeTextureRadius;

    CGPoint newPos = ccpMult(ccpNormalize(centerToChild), newRadius);

    _initialBodyPositions[i] = ccpAdd(newPos, centerPos);

    ```


    从子节点的位置中减去 `centerPos` 会返回一个相对于原点 (`0x0`) 的位置。这与你在 `[列表 10-1](#part0020.html#list1)`
    中将原点加到圆上每个点所做的操作完全相反。该点相对于原点的长度返回圆的半径，该半径增加了 `_enlargeTextureRadius`。这个 `newRadius`
    然后与归一化后的 `centerToChild` 点相乘。*归一化* 是指将向量的长度缩减为一个单位，同时保持其相对方向。


    以 `[Figure 10-5](#part0020.html#Fig5)` 中的顶点 #3 为例。假设它到中心（顶点 #1）的长度是 25 个点，这等于圆的半径。现在，如果你将顶点
    1 和 3 之间的归一化向量乘以 33，你将得到一个点 *3b*，它沿着由顶点 1 到 3 定义的直线向外延伸。对所有点都这样做，最终圆会变得更大。


    由于 `_initialBodyPositions` 用于计算纹理坐标，让我说明一下为什么可能需要进行此操作。`[Figure 10-3](#part0020.html#Fig3)`
    已经说明了某些节点仍然位于图像内部，导致出现 `[Figure 10-6](#part0020.html#Fig6)` 中所示的次优纹理坐标。为了避免裁剪掉部分纹理，纹理坐标需要假设一个半径稍大的圆。否则，玩家的一些头发、肚子和嘴巴可能会丢失。另一方面，这个增加的半径不能太大。如果太大，`Global`
    Sprite Sheet 中其他图像的部分也可能被绘制出来。


    ![9781484202630_Fig10-06.jpg](images/00149.jpeg)


    **[Figure 10-6](#part0020.html#_Fig6).** *纹理坐标* *需要足够大以包含整个图像，但又不能过大以至于绘制出精灵表中相邻图像的部分*'
  raw: 'The GLKVector2 and GLKVector4 types are defined by Apple’s GLKit and are also
    structs containing two four-float (not CGFloat) values. The position, unlike most
    low-level OpenGL commands, is in points. That’s one benefit of the new Cocos2D
    rendering API—you no longer have to consider point-to-pixel conversion when writing
    rendering code. Of the two texture-coordinate fields, only texCoord1 is used in
    this example. It defines the coordinate within the texture that maps to this vertex.
    Texture coordinates are expressed as a percentage of the texture’s size in the
    range 0.0 to 1.0\. Finally, the colors are RGB values with an alpha value, also
    in the range of 0.0 to 1.0.


    The _enlargeTextureRadius ivar will be used to increase the radius for the texture
    coordinates. This ensures that the player image isn’t cut off. The _enlargeDrawRadius
    is used to enlarge the player as a whole, effectively scaling it up. I’ll say
    more about this shortly.


    Now add the missing setup method in [Listing 10-10](#part0020.html#list10) just
    below didLoadFromCCB.


    [***Listing 10-10***](#part0020.html#_list10). *Initial setup of memory* *buffers*
    *and storing the bodies’ initial positions*


    ```

    -(void) setup

    {

        [self freeAllocatedMemory];


    _numVertices = (int)_children.count + 1;

        _vertices = calloc(_numVertices, sizeof(CCVertex));

        _initialBodyPositions = calloc(_numVertices, sizeof(CGPoint));


    int i = 0;

        CGPoint centerPos = ((CCNode*)_children[0]).positionInPoints;


    for (CCNode* child in _children)

        {

            if (child.physicsBody)

            {

                if (i == 0)

                {

                    _initialBodyPositions[i] = centerPos;

                }

                else

                {

                    CGPoint centerToChild = ccpSub(child.positionInPoints,

                                                   centerPos);

                    CGFloat newRadius = ccpLength(centerToChild) +

                                        _enlargeTextureRadius;

                    CGPoint newPos = ccpMult(ccpNormalize(centerToChild),

                                             newRadius);

                    _initialBodyPositions[i] = ccpAdd(newPos, centerPos);

                }


    i++;

            }

        }


    [self updateTextureCoordinates];

    }

    ```


    The setup method first calls freeAllocatedMemory. This is just in case the method
    runs more than once. If the previously allocated memory isn’t freed, it will be
    lost (leaked), because the memory will still be allocated but you won’t have any
    access to it anymore. This is because the setup method allocates new chunks of
    memory and assigns the pointers to the _vertices and _initialBodyPositions.


    The _numVertices ivar is set to the number of child nodes plus one. With nine
    child nodes (one center plus eight circumference nodes), that makes 10 vertices.
    Why 10? The tenth vertex is the one that closes the loop. The center vertex is
    the first, then comes the right one, then the other ones, up to the top-right
    vertex. And that’s where you need to duplicate the right vertex once more so that
    the triangle formed by the vertices center (1), top-right (9), and right (2) can
    be drawn. See [Figure 10-5](#part0020.html#Fig5) for visual clarification.


    ![9781484202630_Fig10-05.jpg](images/00148.jpeg)


    [Figure 10-5](#part0020.html#_Fig5). *This* *triangle fan* *(with vertex numbers)
    is used to draw the textured soft-body player*


    Essentially, the soft-body circle must be divided into triangles to be drawable
    by the Cocos2D renderer. The first triangle is 1-2-3, and subsequent triangles
    can be added by simply adding one more vertex each. After 1-2-3, the next triangle
    is 1-3-4 followed by 1-4-5 and so on. This is called a *triangle fan*, which is
    a drawing mode where each subsequent vertex is assumed to form another triangle
    with the originating vertex and the last vertex.


    In [Listing 10-10](#part0020.html#list10), both _vertices and _initialBodyPositions
    are allocated. The amount of memory allocated is _numVertices multiplied by the
    size of the corresponding type. For instance, _vertices will allocate 10 * 48
    bytes of memory, a total of 480 bytes. So it’s really not much, especially in
    relation to the sprite’s texture memory. Both pointers point to an allocated chunk
    of memory, and both can be accessed like an Objective-C array using the same subscripting
    operator as in C. See, for instance, the assignment in the last line in [Listing
    10-11](#part0020.html#list11).


    **Tip**  Texture memory size is a multiple of the texture size times color depth.
    The file size of the corresponding image will typically be far smaller. A common
    beginner’s mistake is to assume texture memory usage is identical to the image
    file size. Alas, texture memory (for uncompressed formats) can be calculated with
    the following pseudo-code: pixelWidth * pixelHeight * (colorBitDepth / 8). For
    instance, a 4096x4096 image with 32-bit colors will use this much memory as an
    uncompressed texture: 4096 * 4096 * (32 / 8) = 67,108,864 bytes (equals 64 megabytes).


    The center node’s position is needed as a reference (origin) point and is stored
    in the centerPos variable. You need it for the calculation inside the for loop,
    which enumerates over all child nodes. The first node is the center node. Its
    position is assigned to _initialBodyPositions as is. The remaining points are
    updated to enlarge the radius of the circle by the value specified in the _enlargeTextureRadius
    ivar. [Listing 10-11](#part0020.html#list11) reprints this part of the loop.


    [***Listing 10-11***](#part0020.html#_list11). Assuming the initial body positions
    to be on a larger circle


    ```

    CGPoint centerToChild = ccpSub(child.positionInPoints, centerPos);

    CGFloat newRadius = ccpLength(centerToChild) + _enlargeTextureRadius;

    CGPoint newPos = ccpMult(ccpNormalize(centerToChild), newRadius);

    _initialBodyPositions[i] = ccpAdd(newPos, centerPos);

    ```


    Subtracting the centerPos from the child node’s position returns a position that
    is relative to the origin (0x0). That’s the exact opposite of what you did in
    [Listing 10-1](#part0020.html#list1) when adding the origin to each point on the
    circle. The length of this point from the origin returns the circle’s radius,
    which is increased by _enlargeTextureRadius. This newRadius is then multiplied
    with the normalized centerToChild point. *Normalizing* means reducing the vector’s
    length to one unit while retaining its relative orientation.


    Take, for instance, vertex #3 from [Figure 10-5](#part0020.html#Fig5). Assume
    its length to the center (vertex #1) is 25 points, which is equal to the circle’s
    radius. Now if you multiply the normalized vector between vertices 1 and 3 by
    33, you’ll get a point *3b* that extends further outward on the line defined by
    vertices 1 to 3\. Do this to all the points and the circle ends up being larger.


    Since the _initialBodyPositions are used to calculate the texture coordinates,
    let me illustrate why exactly you may need to do so. [Figure 10-3](#part0020.html#Fig3)
    already illustrates that some of the nodes are positioned still within the image,
    resulting in the suboptimal texture coordinates shown in [Figure 10-6](#part0020.html#Fig6).
    To avoid cutting off parts of the texture, the texture coordinates need to assume
    a circle with a slightly larger radius. Otherwise, some of the hair, belly, and
    mouth of the player may be missing. On the other hand, this added radius must
    not be too large. If it is, parts of other images in the *Global* Sprite Sheet
    may be drawn as well.


    ![9781484202630_Fig10-06.jpg](images/00149.jpeg)


    [Figure 10-6](#part0020.html#_Fig6). *Texture coordinates* *need to be large enough
    to encompass the entire image, but so large that they draw parts of neighboring
    images in the Sprite Sheet*'
