    The literal syntax is easier to read and shorter than using the regular initializers
    for the preceding classes. The expression @(count) thus takes the count value
    and returns an NSNumber object. The NSNumber class conveniently creates a string
    representation of its value via the stringValue property. Therefore, @(count).stringValue
    is shorthand for converting a number to a NSString object, turning a 1 into @"1".
    This string can then be compared with the names of the buttons, which should have
    1 through 9 as their name string.


    **Note**  Why not use a NSNumber to begin with? That’s simple: NSNumber is an
    immutable class. You have to create a new NSNumber object if the value must change.
    There is no corresponding NSMutableNumber class, either.


    The counterpart, string-to-number conversion, happens in button.name.intValue.
    The button.name is an NSString object, and NSString has several convenience properties
    like intValue, which attempt to convert the string to an int value. However, if
    that fails—for instance, if you used the string @"one"—the property will simply
    return 0.


    The button’s parent node is a CCSprite—one of the *W#_l#* sprites. If the button’s
    level is accessible, the sprite gets the whiteColor assigned, which removes any
    tinting. CCColor is the color class used by Cocos2D; it is very similar to UIColor
    and NSColor.


    **Note**  Changing the color property applies the so-called *color-tinting* effect
    to the node. You cannot make a sprite brighter than its original image through
    tinting because there is no brighter tint color than white. Applying white as
    the color (the default) will make the node look like its original image.


