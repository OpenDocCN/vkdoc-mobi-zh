    onto the `CCLayoutBox` node so that each `Box Layout` node has three `W#_l#` sprites
    as children. See [Figure 8-6](#part0018.html#Fig6) for reference, and ignore the
    `CCButton` nodes for now. Now change the color property of all `W#_l#` sprites
    except the first (`W1_l1`) to a light gray—color code `#999999` works well. This
    will dim the images, signaling to the user that those levels haven’t been unlocked
    yet. The first level is, of course, always unlocked.


    ![9781484202630_Fig08-06.jpg](images/00113.jpeg)


    [Figure 8-6](#part0018.html#_Fig6). The first page’s layout. The other page’s
    layout is the same except it uses the corresponding W2 and W3 images


    Then add one button as a child to each `W#_l#` sprite, for a total of nine buttons.
    But you should add only one button for now, edit its properties as described next,
    and then copy and paste the button eight more times and move it to its corresponding
    `W#_l#` sprite.


    The button’s position and anchor point should be `0x0`. Change the preferred size
    types to `%` and the values to `100x100` to enlarge the button to the `W#_l#`
    sprite’s size. Then clear the `Title` field and change the `Sprite frame` properties
    of the `Normal` and `Highlighted State` to `<NULL>`. This gives you the same invisible
    button as in the `MainMenuButtons.ccb`.


    On the button’s `Item Code Connections` tab, enter `shouldLoadLevel:` as the selector.
    Note the trailing colon, because you’ll want to receive the button as a parameter.


    Now you can copy and paste the button eight times. Then drag one copy of the button
    so that each `W#_l#` sprite has one button as a child.


    Finally, you’ll need a way to identify the buttons to know which level you should
    be loading when a particular button is tapped. One way to do so is to use a consecutive
    numbering scheme by entering `1` as the name for the first button; `2` would be
    the name of the second button, and so on until the last button, whose name should
    be `9`. Be sure to enter only digits, and don’t pad with zeros. The name property
    will be the only property unique to each button. The layout of the first page
    is given as an example in [Figure 8-6](#part0018.html#Fig6).


    The result can be seen in [Figure 8-7](#part0018.html#Fig7), which shows the first
    two pages of the `Scroll View`.


    ![9781484202630_Fig08-07.jpg](images/00114.jpeg)


    [Figure 8-7](#part0018.html#_Fig7). The final design of two Scroll View pages.
    Note the dimmed level buttons


    ## Unlocking Levels


    Before you can program the level-selection buttons, you’ll have to update the
    `GameState` class to record which levels are unlocked and what the most recently
    played level is.


    Open `GameState.h`, and add the highlighted code of [Listing 8-5](#part0018.html#list5).


    [***Listing 8-5***](#part0018.html#_list5). Adding level properties to GameState


    ```

    #import <Foundation/Foundation.h>


    @interface GameState : NSObject


    +(GameState*) sharedGameState;


    @property CGFloat musicVolume;

    @property CGFloat effectsVolume;


    @property int currentLevel;

    @property (readonly) int highestUnlockedLevel;

    -(BOOL) unlockNextLevel;


    @end

    ```


    The `currentLevel` is the level that is currently being played. This will play
    a role in the `unlockNextLevel` method. The `highestUnlockedLevel` is what it
    says, the highest numbered level the player is allowed to play. This particular
    property is set to `readonly` so that it is illegal for other classes to change
    this property. Only the `unlockNextLevel` method should be allowed to change it,
    and this is done by implementing both property getter and setter methods. Indeed,
    you can mark a property `readonly` while also overriding the property’s setter
    method.


    Add the methods in [Listing 8-6](#part0018.html#list6) to `GameState.m`, just
    above the `@end` line.


    [***Listing 8-6***](#part0018.html#_list6). Setter and getter for the readonly
    property highestUnlockedLevel


    ```

    static NSString* KeyForUnlockedLevel = @"unlockedLevel";


    -(void) setHighestUnlockedLevel:(int)level

    {

        int totalLevelCount = 9;

        if (_currentLevel > 0 && _currentLevel <= totalLevelCount)

        {

            [[NSUserDefaults standardUserDefaults] setInteger:level

                                                       forKey:KeyForUnlockedLevel];

        }

    }


    -(int) highestUnlockedLevel

    {

        NSNumber* number = [[NSUserDefaults standardUserDefaults]

                            objectForKey:KeyForUnlockedLevel];

        return (number ? [number intValue] : 1);

    }

    ```


    The setter method defines the maximum number of levels in the game; this game
    is intended to have nine levels. The `currentLevel` property is tested to be in
    the range 1 through 9 before it is stored in `NSUserDefaults`. The getter method
    obtains the stored `NSNumber` and either returns its `intValue` or 1 if there
    is no entry for the key `KeyForUnlockedLevel` yet. It returns 1 because the first
    level should always be unlocked.


    Unlocking levels is done with the `unlockNextLevel` method, as you can see in
    [Listing 8-7](#part0018.html#list7). Add it just after the `highestUnlockedLevel`
    method.


    [***Listing 8-7***](#part0018.html#_list7). Unlocking the next level


    ```

    -(BOOL) unlockNextLevel

    {

        int highest = self.highestUnlockedLevel;

        if (_currentLevel >= highest)

        {

             [self setHighestUnlockedLevel:_currentLevel + 1];

        }


    return (highest < self.highestUnlockedLevel);

    }

    ```


    The currently `highestUnlockedLevel` is obtained from the property setter via
    `self.highestUnlockedLevel` and assigned to the `highest` variable. If `currentLevel`
    is equal to or greater than the `highest` number, the `setHighestUnlockedLevel:`
    setter is called so that it unlocks the next level following the current level.
    At the end, the method returns a `BOOL` value that indicates whether the next
    level was indeed unlocked or not, by comparing the previous `highest` number with
    the current `highestUnlockedLevel`.


    ## Highlighting Level Buttons


    The level buttons need to be unlocked—that is, their color set to white—if their
    level is currently accessible. “Accessible” means that the button’s level number
    is less than or equal to `highestUnlockedLevel`. You’ll also want to launch the
    `GameScene` and load the button’s corresponding level file.


    Add the highlighted code in [Listing 8-8](#part0018.html#list8) to `MainMenuLevelSelect.m`.
    The code in `didLoadFromCCB` will enumerate all buttons to compare each button’s
    level number with the current `highestUnlockedLevel`. If the button’s level should
    be unlocked, the button’s parent sprite gets its color set to white, removing
    the dimming effect caused by applying a gray color to it in SpriteBuilder.


    [***Listing 8-8***](#part0018.html#_list8). Level buttons whose level is unlocked
    should not be grayed out


    ```

    #import "MainMenuLevelSelect.h"

    #import "MainMenuButtons.h"

    #import "SceneManager.h"

    #import "GameState.h"


    @implementation MainMenuLevelSelect


    -(void) didLoadFromCCB

    {

        int count = 1;

        int highest = [GameState sharedGameState].highestUnlockedLevel;

        CCNode* button;


    while ((button = [self getChildByName:@(count).stringValue

                                  recursively:YES]))

        {

            if (button.name.intValue <= highest)

            {

                CCSprite* sprite = (CCSprite*)button.parent;

                sprite.color = [CCColor whiteColor];

            }


    count++;

        }

    }


    @end

    ```


    The assignment to the `button` variable occurs within the `while` condition. This
    is legal and safe to do, but it requires you to use double brackets to prevent
    the compiler from complaining—after all, it’s a common mistake to use the assignment
    operator `=` instead of the equality operator `==` in conditions. The brackets
    ensure that the assignment occurs first, and only afterward is the result (`button`)
    used as the condition—which is `true` as long as `button` is not `nil`.


    Of note is the `@(count).stringValue` literal. In modern Objective-C, you can
    initialize arrays, dictionaries, and numbers using the literal syntax.'
