- fmt: '好的，这是根据您的要求排版后的 Markdown 文档。



    Okay, but how does the animation determine which values to interpolate? Right
    now, nothing happens when you play this animation.


    The important point here is that the keyframes allow you to edit the given property
    at the given point in time. Right now, the `Scale` property is set to `1,1` for
    all keyframes, so even though the animation runs, it doesn’t alter the `Scale`
    property values.


    With the doughnut image still selected, switch to the `Item Properties` tab. Then
    move the Timeline Cursor back and forth anywhere between 0 and 6 seconds and notice
    how the `Scale` property is grayed out most of the time. In fact, you can change
    the values of an animated property only when the Timeline Cursor is exactly on
    top of a keyframe for the given property.


    Move the Timeline Cursor so that it is exactly on the middle keyframe. You’ll
    know the correct position when the `Scale` property values become editable on
    the `Item Properties` tab. Use the Timeline Scale slider to zoom out the Timeline
    to make it easier to position the Cursor. Once the Cursor is on top of the middle
    keyframe and the `Scale` property is editable, change the scale property values
    for both the X and Y axis to `1.3`.


    Now click the Play button on the Timeline Controls area and you’ll see the doughnut
    scales up and down. Toggle the loop button to keep playing the animation in a
    loop. When you are done, stop the animation playback and drag the Timeline Cursor
    once more. Notice how the `Scale` property values change as you move the Cursor
    between keyframes. That shows you how the property values interpolate between
    two keyframes.


    Looping Animations…Wheeeeee!


    In order to make the animation loop in the game, not just SpriteBuilder, you’ll
    have to chain the Timeline to itself.


    A Timeline Chain simply tells the animation to start playing another Timeline
    animation when the timeline playback ends. Thus, chaining a Timeline animation
    to itself causes it to loop. To do so, click on the Timeline Chain drop-down menu
    at the bottom, where it says *No chained timeline* in [Figure 5-1](#part0014.html#Fig1),
    and select the *Default Timeline* from the list.


    You can publish and run the project now to see the animation in action. As of
    now, the doughnut scales up and down linearly.


    # Easing Animations with Ease


    You can smooth out the animation using easing modes. Easing affects how the values
    between two keyframes change over time. Different kinds of easing can be applied
    to each Keyframe Segment.


    To edit the easing mode, right-click in the Keyframe Segment. Usually there will
    be a pink line between the two keyframes. This brings up a context menu with all
    the available easing modes, as seen in [Figure 5-4](#part0014.html#Fig4).


    ![9781484202630_Fig05-04.jpg](images/00079.jpeg)


    [Figure 5-4](#part0014.html#_Fig4). Right-click the keyframe segment to bring
    up the easing context menu


    Pick one easing mode from the list by right-clicking each of the two Keyframe
    Segments. Feel free to try various combinations of easing modes.


    Notice that after selecting an easing mode the pink line changes slightly. The
    line is a flat-colored pink line for the default Linear easing mode. The pink
    line disappears completely if you select the Instant easing mode. Technically,
    `Instant` is not an easing mode; it simply sets the animated value to that of
    the keyframe the moment the Timeline Cursor reaches the keyframe. For all other
    easing modes, the pink line becomes slightly shaded at one or both ends, depending
    on whether you picked an `In`, `Out`, or `In/Out` easing mode.


    The `In`, `Out`, and `In/Out` modes determine where in the Keyframe Segment the
    easing is applied:


    *   **In:** Applied at the beginning of the Keyframe Segment

    *   **Out:** Applied at the end of the Keyframe Segment

    *   **In/Out:** Applied at both the beginning and end of the Keyframe Segment


    The terminology may be slightly confusing. Take, for example, the Elastic `In`
    easing mode seen in [Figure 5-5](#part0014.html#Fig5): first column; second row.


    You might think that the easing is applied most near the end of the segment because
    that’s where the amplitude is greatest. Perhaps naturally one might assume that
    this is an easing `Out` mode, but truly the easing starts at the beginning and
    gradually hones in on the target value in ever larger amplitudes.


    When in doubt, take [Figure 5-5](#part0014.html#Fig5) as a reference, though it’s
    really easy to experiment because you can change the easing modes even while the
    Timeline animation is playing.


    ![9781484202630_Fig05-05.jpg](images/00080.jpeg)


    [Figure 5-5](#part0014.html#_Fig5). Easing modes illustrated


    The diagrams in [Figure 5-5](#part0014.html#Fig5) illustrate how an animated property’s
    value changes over time. Take the `Back In/Out` easing diagram at the bottom right,
    for instance, and consider that each horizontal side of the diagram represents
    a keyframe. If you were to animate, say, the rotation property between the values
    `100` to `200` using a `Back In/Out` easing mode, the diagram tells you that the
    rotation value would first fall slightly below `100` before increasing to a value
    slightly above `200` and finally closing in at `200`. The duration between two
    keyframes determines over how many frames this animation is interpolated. The
    longer the animation is, the smoother the interpolation can be.


    **Caution** If there’s very little time between two keyframes—for example, `10`
    frames or less—you will hardly notice the easing effect. Say the rotation animation
    had three frames to interpolate between, the first frame would start the rotation
    property at `100`, and the second frame would set it to `150` even for the `Back
    In/Out` mode because the third frame rotation property has to be at the other
    keyframe’s value of `200`. An easing mode is only effective and will only resemble
    the curves in [Figure 5-5](#part0014.html#Fig5) when there’s at least half a second
    between the two keyframes and the game runs at `30 fps` or more. For sequences
    shorter than half a second, you may want to avoid using easing modes other than
    `Linear` or `Instant`.


    The various easing modes are best seen in action, so you should definitely experiment
    a lot, especially with the combination of various easing modes along several Keyframe
    Segments and at varying durations. As an exercise, try adding another sequence
    animating the doughnut’s rotation property (R key) over three or more keyframes
    so that the doughnut sways slightly from left to right and back.


    If adding a keyframe fails, possibly with an error sound, you may not have a node
    selected.


    If you need to remove a keyframe, select its handle and press `Backspace` or right-click
    the keyframe handle and select `Delete` from the context menu.


    Clicking and dragging is the way to move keyframes to lengthen or shorten the
    duration to the previous and next keyframes.


    **Tip** In order to smoothly loop an animation, you’ll need one keyframe at both
    ends of the timeline, with both having the exact same values for the animated
    property. This ensures that the animation transitions smoothly when it passes
    over the last keyframe and continues with the first.


    If an animation acts erroneously when passing over a keyframe, check whether there
    are two or more keyframes at the exact same location. Try moving the keyframe
    where the animation seems to “jump” to see if there’s another keyframe underneath
    it.


    # Keyframe Animations for Physics Nodes


    Now that you know the basics of keyframe animations and how to edit them, you
    are ready to add some animated game-play elements. The astonishing part here is
    that you’ll be animating nodes with physics enabled, and they’ll behave properly
    in the game despite being animated by actions.


    However, keyframe animations of physics-enabled nodes are possible only if the
    node’s physics body is set to `Static`.


