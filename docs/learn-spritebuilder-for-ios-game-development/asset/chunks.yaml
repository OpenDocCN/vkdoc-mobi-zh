    \n编程音频播放\n\n流式音频和游戏事件的音频需要编程实现，但通过`OALSimpleAudio`类提供的简化接口，使用`ObjectAL`相当容易。你可以在这里找到类参考：`http://kstenerud.github.io/ObjectAL-for-iPhone/documentation/interface_o_a_l_simple_audio.html`。\n\
    \n播放长音频/流式音频\n\n通常有两种播放流式音频的方式。`ObjectAL`将流式音频称为“背景”音乐，通常缩写为“bg”。一种方式是预加载一段流式音频然后播放。或者，也可以不预加载直接播放音乐。\n\
    \n只有在需要通过`seekTime`参数在非常具体的时间点（以秒为单位）启动播放时，才需要预加载背景音轨。或者当需要确保背景音轨无任何延迟地开始播放时——例如，需要唇形同步的语音音频。清单\
    \ 11-1 展示了一个播放预加载背景音轨的示例。\n\n***清单 11-1***. 预加载背景音轨并在稍后播放\n\n```\nOALSimpleAudio*\
    \ audio = [OALSimpleAudio sharedInstance];\n[audio preloadBg:@\"Audio/menu-music.m4a\"\
    \ seekTime:0.0];\n\n// 稍后可以播放最近预加载的音轨：\n[audio playBgWithLoop:YES];\n```\n\n在`OALSimpleAudio`接口中，没有委托机制或通知来告知预加载何时完成，也没有必要存在这样的机制。预加载不是多线程的。在上面的示例中，除非`preloadBg`已完成其工作并预加载了文件，否则执行不会继续到`playBgWithLoop`方法。\n\
    \n**注意**  与其他资源文件一样，音频文件位于`SpriteBuilder`项目的子文件夹中。因此，需要在路径中指定`Audio`文件夹。如果音频文件的输出类型设置为`MP4`，其文件扩展名将是`.m4a`（纯音频\
    \ MPEG-4），而不是`.mp4`（常规音频/视频 MPEG-4）。\n\n除此之外，如果你计划移植到`Android`，不建议像这些示例中那样指定发布后的文件扩展名（`.m4a`和`.caf`）。`Android`的所有音频文件将以`OGG`格式发布，扩展名为`.ogg`。在你阅读本文时，`Cocos2D`和`ObjectAL`可能已经允许你完全省略音频文件扩展名，或者你可以使用音频文件的原始扩展名（`.wav`）。\n\
    \n在大多数情况下，直接播放背景音乐会更简单且足够快。在`Xcode`中打开`MainScene.m`文件，找到`didLoadFromCCB`方法。将清单\
    \ 11-2 中高亮显示的行添加到该方法末尾。\n\n***清单 11-2***. 在`MainScene.m`中添加音乐播放\n\n```\n-(void)\
    \ didLoadFromCCB\n{\n    // 为简洁起见，省略了现有代码 ...\n\n    OALSimpleAudio* audio = [OALSimpleAudio\
    \ sharedInstance];\n    [audio playBg:@\"Audio/menu-music.m4a\" loop:YES];\n}\n\
    ```\n\n`playBg`方法在播放音频文件之前会在内部预加载它。启用循环后，音轨将无限循环播放。以这种方式播放音频的缺点是无法指定`seekTime`。\n\
    \n接下来，打开`SceneManager.m`并找到其`presentGameScene`方法，以完善音乐播放。为了播放游戏音乐，请将清单 11-3 中高亮显示的代码添加到该方法末尾。\n\
    \n***清单 11-3***. 在呈现游戏场景时播放游戏音乐\n\n```\n-(void) presentGameScene\n{\n    // 为简洁起见，省略了现有代码\
    \ ...\n\n    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];\n    [audio\
    \ playBg:@\"Audio/game-music.m4a\" loop:YES];\n}\n```\n\n现在运行游戏，你应该会在菜单中听到音乐，并且在玩游戏时听到不同的音乐。\n\
    \n你可能希望改进此行为——例如，在从一个关卡前进到另一个关卡或重新开始关卡时，让游戏音乐音轨重新开始。解决此问题的一种方法是在`SceneManager`的`presentGameScene`方法中增加一个类型为`BOOL`的额外参数——例如，`presentGameSceneWithMusic:(BOOL)playMusic`。仅当从主菜单呈现游戏场景时，才将`YES`传递给`playMusic`；否则，向该参数传递`NO`。在方法内部，添加一个条件，仅在`playMusic`为`YES`时播放音乐。\n\
    \n播放音效\n"
- fmt: "假设你希望在弹出层关闭时播放音效，可以通过在`CloseButton.m`文件的`shouldClose`方法末尾添加[代码清单11-4](#part0022.html#list4)中高亮显示的代码轻松实现。\n\
    \n[**代码清单11-4**](#part0022.html#_list4) 关闭弹出层时播放音效\n\n```\n-(void) shouldClose\n\
    {\n    // existing code omitted for brevity ...\n\n[[OALSimpleAudio sharedInstance]\
    \ playEffect:@\"Audio/menu-sfx.caf\"];\n}\n```\n\n菜单音效体积小且对时间不敏感，因此无需预加载即可播放。但与背景音乐不同，游戏过程中播放的音效应始终预加载。否则，特定音效首次播放时可能会出现短暂但可察觉的卡顿。想象一下，当玩家跳跃、射击或被击中时，游戏因首次从较慢的闪存中加载音效而冻结十分之一秒的场景。即使此项目中的音效加载速度足够快而不会导致延迟，也应避免这种情况。\n\
    \n遗憾的是，无法将音频文件直接分配给特定场景并告诉它预加载所有关联的音频文件。你本质上需要维护一个由特定场景或整个游戏使用的音效列表，然后逐一预加载这些音效。幸运的是，此项目中仅使用了三种游戏音效，且命名一致。（参见[图11-2](#part0022.html#Fig2)）\n\
    \n请在`SceneManager.m`文件的`presentGameScene`方法末尾添加[代码清单11-5](#part0022.html#list5)中高亮显示的代码。\n\
    \n[**代码清单11-5**](#part0022.html#_list5) 预加载所有溅射音效\n\n```\n+(void) presentGameScene\n\
    {\n    // existing code omitted for brevity ...\n\nOALSimpleAudio* audio = [OALSimpleAudio\
    \ sharedInstance];\n    for (int i = 1; i <= 3; i++)\n    {\n        NSString*\
    \ path = [NSString stringWithFormat:@\"Audio/splat%i.caf\", i];\n        [audio\
    \ preloadEffect:path];\n    }\n}\n```\n\n此处，每个音频文件的路径字符串在`for`循环中生成。将相似的音频文件按相同方式编号有助于扩展，例如若要增加十几个文件，只需增加循环的上限即可——尽管不使用循环也能预加载现有的三个音频文件。例如，以下代码同样有效：\n\
    \n```\n[audio preloadEffect:@\"Audio/splat1.caf\"];\n[audio preloadEffect:@\"\
    Audio/splat2.caf\"];\n[audio preloadEffect:@\"Audio/splat3.caf\"];\n```\n\n要播放预加载的音效，只需使用与预加载时完全相同的路径即可——例如：\n\
    \n```\n[[OALSimpleAudio sharedInstance] playEffect:@\"Audio/splat3.caf\"];\n```\n\
    \n请务必查看Xcode调试控制台（`View` → `Debug Area` → `Activate Console`）以检查`ObjectAL`的错误。例如，若尝试预加载或播放不在资源包中的音频文件，或路径出错，控制台将显示类似日志：\n\
    \n```\nOAL Error: +[OALTools urlForPath:bundle:]: Could not find full path of\
    \ file Audio/splash3.caf\n```\n\n何时何地播放音效是一个优秀的设计问题。在此项目中，当玩家碰撞齿轮、弹簧、链条和绳索时，仅在碰撞显著时播放溅射音效。判断方法之一是检查传入每个物理碰撞委托方法的`CCPhysicsCollisionPair`对象。\n\
    \n`CCPhysicsCollisionPair`方法包含两个属性：`totalImpulse`和`totalKineticEnergy`，分别揭示冲量向量（即冲击力方向）和碰撞耗散的总能量。后者对物理爱好者来说可能有些奇怪：能量不会被耗散，只会转换形式。但在计算机游戏物理模拟中，没有热量的概念（热量是冲击能量最常见的转换形式）。因此，当发生强力碰撞时，通常认为*能量耗散*或损失了。否则，物理模拟将无法消除碰撞体的速度，从而在碰撞后两个物体的速度之和保持不变的意义上使所有碰撞“完美”。\n\
    \n`totalKineticEnergy`仅在显著碰撞时非零。我们可以利用这一点：当`totalKineticEnergy`非零时，假定需要播放溅射音效。请将[代码清单11-6](#part0022.html#list6)中的方法添加到`GameScene.m`中，最好放在`ccPhysicsCollisionBegin`方法之下。\n\
    \n[**代码清单11-6**](#part0022.html#_list6) 播放碰撞音效\n\n```\n-(void) playCollisionSoundWithPair:(CCPhysicsCollisionPair*)pair\n\
    {\n    if (pair.totalKineticEnergy > 0.0)\n    {\n        NSString* splat = [NSString\
    \ stringWithFormat:@\"Audio/splat%i.caf\",\n                           arc4random_uniform(3)\
    \ + 1];\n\nCGFloat pitch = 0.8 + (arc4random_uniform(50) / 100.0);\n        [[OALSimpleAudio\
    \ sharedInstance] playEffect:splat\n                                         \
    \    volume:1.0\n                                              pitch:pitch\n \
    \                                               pan:0.0\n                    \
    \                           loop:NO];\n    }\n}\n```\n\n如果`totalKineticEnergy`大于零，则碰撞耗散了能量，因此一定是显著的。此时，从三种溅射音效中随机选择一种。`arc4random_uniform(3)`方法返回一个小于3的整数——即0到2之间的数。加1后，得到1到3之间的数。\n\
    \n**提示** 生成随机数的方法有很多，但只有`arc4random`相关方法最接近生成“真正随机”的数。特别地，`arc4random_uniform`变体生成均匀分布的随机数，且无（模）偏差。此处不再深入解释，但通常建议优先使用`arc4random_uniform()`而非`rand()`等其他随机数方法。\n\
    \n此音效使用`OALSimpleAudio`的`playEffect`变体（参数最多）播放。除音频文件本身外，还可以指定播放音量。此音量并非绝对音量，而是相对于后续介绍的`effectsVolume`属性。`playEffect`的音量为`1.0`时，表示音频文件以与`effectsVolume`相同的音量播放。\n\
    \n音调（`pitch`）在0.8到1.3之间随机化，以在不使用多个音效的情况下创造更丰富的声音变化。这也展示了如何使用`arc4random_uniform`生成浮点数。若将0到49之间的值除以`100.0`，则得到0.0到0.49之间的值。注意，必须写成`100.0`（带小数点）或进行类型转换（`(CGFloat)100`）。若除数直接写成`100`，则会进行整数除法，结果始终为`0`。\n\
    \n为快速测试此音效播放，请将[代码清单11-7](#part0022.html#list7)中高亮显示的行添加到`ccPhysicsCollisionBegin:`方法中，该方法在玩家与弹簧对象碰撞时调用。\n\
    \n[**代码清单11-7**](#part0022.html#_list7) 碰撞弹簧时播放音效\n\n```\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \        spring:(SpringBoard *)spring\n{\n    [spring letGo];\n    [self playCollisionSoundWithPair:pair];\n\
    \    return YES;\n}\n```"
  raw: 'Assuming you’ll want to play a sound effect every time a popover layer is
    closed, you can do so easily by adding the code highlighted in [Listing 11-4](#part0022.html#list4)
    at the end of the shouldClose method found in *CloseButton.m*.


    [***Listing 11-4***](#part0022.html#_list4). Playing a sound effect when closing
    popovers


    ```

    -(void) shouldClose

    {

        // existing code omitted for brevity ...


    [[OALSimpleAudio sharedInstance] playEffect:@"Audio/menu-sfx.caf"];

    }

    ```


    The menu sound effect is small and not time-critical, so it’s not a problem to
    play it without preloading. But unlike background tracks, sound effects played
    during gameplay should always be preloaded. Otherwise, the first time a specific
    sound effect plays, there may be a small but possibly noticeable hiccup. Imagine
    if the player jumps, shoots, or gets hit and the game freezes for a tenth of a
    second the first time this happens because the sound effect needed to be loaded
    from relatively slow flash memory. You’ll want to avoid that scenario even if
    the sound effects used in this particular project will most likely load quickly
    enough that you will not notice a delay.


    Unfortunately, there’s no way to assign audio files to a given scene and then
    tell it to preload all associated audio files. You essentially have to keep a
    list of sound effects used by a given scene, or by the game overall, and then
    preload those sound effects one after another. Fortunately, in this project you’re
    using only three gameplay sound effects, and they’re consistently named. (See
    [Figure 11-2](#part0022.html#Fig2).)


    Add the code highlighted in [Listing 11-5](#part0022.html#list5) at the end of
    the presentGameScene method in *SceneManager.m*.


    [***Listing 11-5***](#part0022.html#_list5). Preloading all splat sound effects


    ```

    +(void) presentGameScene

    {

        // existing code omitted for brevity ...


    OALSimpleAudio* audio = [OALSimpleAudio sharedInstance];

        for (int i = 1; i <= 3; i++)

        {

            NSString* path = [NSString stringWithFormat:@"Audio/splat%i.caf", i];

            [audio preloadEffect:path];

        }

    }

    ```


    Here the path string for every audio file is generated within the for loop. It
    helps to have similar audio files numbered in the same way so that if you were
    to add a dozen more, you would need to increase only the loop’s upper bound—even
    though there’s nothing speaking against preloading the three existing audio files
    without a loop. For example, the following will do the job just as well:


    ```

    [audio preloadEffect:@"Audio/splat1.caf"];

    [audio preloadEffect:@"Audio/splat2.caf"];

    [audio preloadEffect:@"Audio/splat3.caf"];

    ```


    To play back a preloaded sound effect, you would simply play it with the exact
    same path you’ve used to preload it—for instance:


    ```

    [[OALSimpleAudio sharedInstance] playEffect:@"Audio/splat3.caf"];

    ```


    Be sure to watch the Xcode Debug Console (*View ![image](images/00008.jpeg) Debug
    Area ![image](images/00008.jpeg) Activate Console*) for any ObjectAL errors. For
    instance, if you try to preload or play an audio file that isn’t in the bundle
    or where you made a mistake in the path, you’ll see it logged in the console:


    ```

    OAL Error: +[OALTools urlForPath:bundle:]: Could not find full path of file Audio/splash3.caf

    ```


    When and where to play sound effects is a good design question. In this project,
    you’ll play the splat sounds whenever the player impacts the gears, springs, chains,
    and ropes, but only if the impact was significant. One way to decide that is to
    look at the CCPhysicsCollisionPair object passed into every physics-collision
    delegate method.


    The CCPhysicsCollisionPair method contains two properties, totalImpulse and totalKineticEnergy,
    that reveal both the impulse vector (that is, the direction of impact force) and
    the total energy dissipated by the impact. The latter may seem odd for physics
    buffs: energy doesn’t dissipate; it only changes form. However, in computer-game
    physics simulations, there is no concept of heat, which is the most common form
    of how impact energy is transformed. Therefore, it is simply said that *energy
    dissipates*, or is lost, when there is a forceful impact. Otherwise, the physics
    simulation couldn’t get rid of the colliding body’s velocities, effectively making
    all collisions “perfect” in the sense that the sum of the velocities of both impacting
    bodies would remain the same.


    The totalKineticEnergy is only non-zero for significant impacts. We can use that
    to simply assume a splat sound needs to be played if the totalKineticEnergy is
    non-zero. Add the method in [Listing 11-6](#part0022.html#list6) to *GameScene.m*,
    preferably just below the ccPhysicsCollisionBegin methods.


    [***Listing 11-6***](#part0022.html#_list6). Playing impact sounds


    ```

    -(void) playCollisionSoundWithPair:(CCPhysicsCollisionPair*)pair

    {

        if (pair.totalKineticEnergy > 0.0)

        {

            NSString* splat = [NSString stringWithFormat:@"Audio/splat%i.caf",

                               arc4random_uniform(3) + 1];


    CGFloat pitch = 0.8 + (arc4random_uniform(50) / 100.0);

            [[OALSimpleAudio sharedInstance] playEffect:splat

                                                 volume:1.0

                                                  pitch:pitch

                                                    pan:0.0

                                                   loop:NO];

        }

    }

    ```


    If totalKineticEnergy is greater than zero, the impact dissipated energy and therefore
    must have been significant. In this case, one of three splat sound effects is
    chosen randomly. The arc4random_uniform(3) method returns an integer number less
    than 3—in other words, a number in the range of 0 to 2\. By adding 1, you get
    a number in the range of 1 to 3.


    **Tip**  There are many ways to generate random numbers, but only arc4random methods
    come closest to generating “truly random” numbers. The arc4random_uniform variant
    specifically generates uniformly distributed random numbers without (modulo) bias.
    An explanation would go too far, so I’ll just say it’s generally recommended to
    favor arc4random_uniform() over rand() and other random-number methods.


    The effect is played using OALSimpleAudio’s playEffect variant with the most parameters.
    Next to the audio file itself, you can specify a volume to play the effect at.
    This volume is not an absolute volume but relative to the effectsVolume property
    that we’ll be getting at next. A playEffect volume of 1.0 means the audio file
    is played at the same volume as effectsVolume.


    The pitch is randomized between 0.8 and 1.3 to create greater sound variety without
    having to use multiple effects. This also shows an example of how to generate
    floating-point numbers with arc4random_uniform. If you divide a value in the range
    of 0 to 49 and divide it by 100.0, you get a value in the range of 0.0 to 0.49\.
    Note that it’s important to write *100.0* with the dot or casting the value: (CGFloat)100\.
    If the divisor is simply written as *100*, it is an integer division that always
    results in *0*.


    To quickly test this sound effect playback, add the highlighted line in [Listing
    11-7](#part0022.html#list7) to the ccPhysicsCollisionBegin: method that is called
    when the player collides with a spring object.


    [***Listing 11-7***](#part0022.html#_list7). Playing a sound effect when colliding
    with springs


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                             spring:(SpringBoard *)spring

    {

        [spring letGo];

        [self playCollisionSoundWithPair:pair];

        return YES;

    }

    ```'
