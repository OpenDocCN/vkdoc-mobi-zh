    This in itself doesn’t do anything yet. But it allows you to implement one or
    several of the four collision delegate methods shown in [Listing 4-12](#part0013.html#list12)
    in the GameScene class. Each type of method can appear multiple times, with different
    collision type parameter names in the class implementing the CCPhysicsCollisionDelegate
    protocol.


    [***Listing 4-12***](#part0013.html#_list12). Example method declarations of the
    four collision delegate messages


    ```

    -(BOOL) ccPhysicsCollision Begin:(CCPhysicsCollisionPair *)pair

                     collisionTypeA:(CCNode *)nodeA

                     collisionTypeB:(CCNode *)nodeB;


    -(BOOL) ccPhysicsCollision PreSolve:(CCPhysicsCollisionPair *)pair

                     collisionTypeA:(CCNode *)nodeA

                     collisionTypeB:(CCNode *)nodeB;


    -(void) ccPhysicsCollision PostSolve:(CCPhysicsCollisionPair *)pair

                     collisionTypeA:(CCNode *)nodeA

                     collisionTypeB:(CCNode *)nodeB;


    -(void) ccPhysicsCollision Separate:(CCPhysicsCollisionPair *)pair

                     collisionTypeA:(CCNode *)nodeA

                     collisionTypeB:(CCNode *)nodeB;

    ```


    Note that the methods in [Listing 4-12](#part0013.html#list12) are nonfunctional
    examples; there’s a trick to naming the parameters collisionTypeA and collisionTypeB
    that decides which colliding bodies call which method. I’ll explain this shortly.


    Upon closer inspection, you’ll notice that all four collision callback methods
    take the same parameters as input, and two of them return a BOOL. Following is
    a list that explains under which circumstances and in which order each of these
    methods is called:


    *   ***Begin*** methods are called when two bodies first come into contact. It’s
    always the first method called in a collision event between two bodies. By returning
    NO, the collision is ignored, bodies are allowed to pass through each other, and
    PreSolve and PostSolve methods for this collision event will not be called.

    *   ***PreSolve*** methods get called repeatedly for as long as two bodies are
    in contact, and before the collision has been resolved. This allows you to tweak
    the collision response by (temporarily) modifying the contacting body’s properties,
    such as friction or restitution. Returning NO will not resolve the collision so
    that the two bodies are allowed to penetrate for this particular point in time.

    *   ***PostSolve*** methods get called after the collision has been resolved,
    meaning the bodies have been moved apart and their velocities updated. PostSolve
    can be used to reset any temporarily modified properties from the PreSolve step.
    But more importantly, other collision-based properties like totalKineticEnergy
    and totalImpulse have now been calculated. This allows you to break joints or
    play sounds as necessary, perhaps when the impact force exceeds a given threshold.

    *   ***Separate*** methods get called the moment two previously contacting bodies
    are no longer in contact.


    **Tip**  A Begin method is always followed by a corresponding Separate method,
    even if the Begin method returned NO. You can rely on counting the number of Begin
    and End calls to determine how many, or if any, two bodies of the given collision
    types are currently in contact with each other.


    Collision Types and Callback Parameter Names


    The collision callback methods in [Listing 4-12](#part0013.html#list12) all take
    the same parameters as input. The names of the collisionTypeA and collisionTypeB
    parameters actually play an essential role in determining which collision callback
    method runs when two objects collide.


    If you take another look at the Item Physics tab shown in [Figure 4-1](#part0013.html#Fig1),
    you’ll notice there’s a “Collision type” field. You can enter any name there,
    but it must be a legal Objective-C identifier—meaning it should be all letters
    and digits, with no spaces or special characters except an underscore, and the
    name must not start with a digit.


    The Collision type identifier can then be used as the name of either or both collisionTypeA
    and collisionTypeB parameters in collision callback methods.


    **Caution**  Setting or changing the “Collision type” setting does not affect
    whether any two bodies can collide or not. The “Collision type” is solely used
    to determine which callback method, if any, runs when a collision between two
    bodies occurs where at least one has a non-empty Collision type.


    Give it a shot: open the Player.ccb and select the player sprite. Then switch
    to the Item Physics tab and enter **player** in the “Collision type” field. You
    can then implement the wildcard callback method in [Listing 4-13](#part0013.html#list13)
    to be notified whenever the player starts colliding with another shape.


    [***Listing 4-13***](#part0013.html#_list13). Collision callback that runs when
    the player collides with any other body


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                           wildcard:(CCNode *)wildcard

    {

        NSLog(@“collision - player: %@, wildcard: %@", player, wildcard);

        return YES;

    }

    ```


    This method will just print a message to the debug Console. Note that the second
    parameter’s name is player, the same string you entered as the body’s “Collision
    type.” The third parameter’s name is the special identifier wildcard, which stands
    literally for “any body.”


    The wildcard parameter refers to any node with a physics body, regardless of its
    collision type. Because no other body has a “Collision type” value except the
    player, the preceding method will be called whenever the player touches any other
    body in the level.


    You should know that you can’t have a callback method with two wildcard parameters.
    The second parameter should always be named the same as a Collision type identifier;
    otherwise, the callback method will never run to begin with. You can’t use wildcard
    as the second parameter’s name, though.


    In other words, there is no way to run a callback method every time any two bodies
    collide. If you’ve used Cocos2D or physics engines before, you may be used to
    doing just that. Then, within the method, decide which types of bodies are colliding
    and how to proceed from there. The approach using the Collision type identifier
    and naming the callback method parameters allow you to sort out these collision
    notifications more efficiently and will automatically distribute collision event-handling
    code to different methods, based on the bodies’ collision types.


    The third method parameter in [Listing 4-13](#part0013.html#list13) could also
    have been the name of another body’s Collision type, such as *exit*. For instance,
    the following method signature will be used shortly to determine collisions between
    the player and the exit node:


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                               exit:(CCNode *)exit;

    ```


    **Tip**  The method parameter’s name before the colon and the local variable’s
    name after the colon need not be identical like in [Listing 4-12](#part0013.html#list12).
    But it is a best practice to use the same identifiers in collision callback methods,
    like in [Listing 4-13](#part0013.html#list13), to avoid any confusion.'
