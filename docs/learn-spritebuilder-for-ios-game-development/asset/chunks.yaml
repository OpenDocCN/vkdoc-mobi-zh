    \ *)nodeB;\n\n-(void) ccPhysicsCollisionSeparate:(CCPhysicsCollisionPair *)pair\n\
    \                 collisionTypeA:(CCNode *)nodeA\n                 collisionTypeB:(CCNode\
    \ *)nodeB;\n```\n\n请注意，代码清单 4-12 中的方法只是非功能性示例；在如何命名参数 `collisionTypeA` 和 `collisionTypeB`\
    \ 上有一个技巧，它决定了哪些碰撞体会调用哪些方法。我稍后会解释这一点。\n\n仔细观察，你会发现所有四个碰撞回调方法都接收相同的参数，其中两个方法返回`BOOL`值。以下列表说明了每种方法在何种情况下以及按何种顺序被调用：\n\
    \n-   **Begin** 方法：在两个物体首次接触时被调用。它始终是两个物体碰撞事件中第一个被调用的方法。通过返回`NO`，碰撞会被忽略，物体允许相互穿过，并且该碰撞事件的\
    \ `PreSolve` 和 `PostSolve` 方法将不会被调用。\n-   **PreSolve** 方法：在两个物体保持接触期间，且在碰撞解析之前，会反复调用此方法。这允许你通过（临时）修改接触物体的属性（如摩擦力或恢复力）来调整碰撞响应。返回`NO`将不会解析碰撞，从而允许两个物体在此时穿透彼此。\n\
    -   **PostSolve** 方法：在碰撞解析后调用，这意味着物体已被分开且速度已更新。`PostSolve`可用于重置来自 `PreSolve` 步骤的任何临时修改的属性。但更重要的是，其他基于碰撞的属性（如\
    \ `totalKineticEnergy` 和 `totalImpulse`）此时已被计算出来。这允许你在必要时（例如，当冲击力超过给定阈值时）断开关节或播放声音。\n\
    -   **Separate** 方法：在两个先前接触的物体不再接触的时刻被调用。\n\n**提示**  `Begin` 方法之后总会跟随一个对应的 `Separate`\
    \ 方法，即使 `Begin` 方法返回了 `NO`。你可以通过统计 `Begin` 和 `End` 调用的次数来确定给定碰撞类型的两个物体当前是否相互接触，以及有多少个物体正在接触。\n\
    \n## 碰撞类型与回调参数名称\n\n代码清单 4-12 中的碰撞回调方法都接收相同的参数。`collisionTypeA` 和 `collisionTypeB`\
    \ 参数的名称实际上在决定两个物体碰撞时哪个碰撞回调方法会被执行起到了关键作用。\n\n如果你再次查看图 4-1 中显示的“Item Physics”选项卡，会注意到有一个“Collision\
    \ type”字段。你可以在此输入任何名称，但它必须是合法的 Objective-C 标识符——也就是说，只能由字母和数字组成，除了下划线外不能包含空格或特殊字符，并且名称不能以数字开头。\n\
    \n然后，`Collision type` 标识符可以用作碰撞回调方法中 `collisionTypeA` 和/或 `collisionTypeB` 参数的名称。\n\
    \n**警告**  设置或更改“Collision type”不会影响两个物体是否能发生碰撞。“Collision type”仅用于确定当两个物体发生碰撞（且至少有一个物体的\
    \ `Collision type` 非空）时，应运行哪个回调方法（如果有的话）。\n\n试一下：打开 `Player.ccb` 并选择玩家精灵。然后切换到“Item\
    \ Physics”选项卡，在“Collision type”字段中输入 **player**。接着，你就可以实现代码清单 4-13 中的通配符回调方法，以便在玩家开始与其他形状碰撞时收到通知。\n\
    \n**代码清单 4-13.** 玩家与任何其他物体碰撞时运行的碰撞回调\n\n```objc\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \      wildcard:(CCNode *)wildcard\n{\n    NSLog(@\"collision - player: %@, wildcard:\
    \ %@\", player, wildcard);\n    return YES;\n}\n```\n\n此方法仅向调试控制台打印一条消息。注意，第二个参数的名称是\
    \ `player`，与你输入到物体“Collision type”中的字符串相同。第三个参数的名称是特殊标识符 `wildcard`，它字面意思代表“任何物体”。\n\
    \n`wildcard` 参数指代任何具有物理体的节点，无论其碰撞类型如何。由于除了玩家之外，没有其他物体具有“Collision type”值，因此每当玩家接触到关卡中的任何其他物体时，上述方法都会被调用。\n\
    \n你应该知道，不能拥有包含两个 `wildcard` 参数的回调方法。第二个参数应始终命名为与某个 `Collision type` 标识符相同的名称；否则，回调方法将永远不会运行。不过，你不能使用\
    \ `wildcard` 作为第二个参数的名称。\n\n换句话说，没有办法让回调方法在任何两个物体碰撞时都运行。如果你之前使用过 Cocos2D 或物理引擎，你可能已经习惯了这样做。然后在方法内部，判断哪些类型的物体正在碰撞，以及如何继续处理。使用\
    \ `Collision type` 标识符和命名回调方法参数的方法可以让你更有效地过滤这些碰撞通知，并根据物体的碰撞类型自动将碰撞事件处理代码分发到不同的方法中。\n\
    \n代码清单 4-13 中的第三个方法参数也可以是另一个物体的 `Collision type` 名称，例如 `exit`。例如，以下方法签名很快将用于确定玩家与出口节点之间的碰撞：\n\
    \n```objc\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair\n  \
    \                       player:(CCNode *)player\n                           exit:(CCNode\
    \ *)exit;\n```\n\n**提示**  冒号前的方法参数名称与冒号后的局部变量名称不必像代码清单 4-12 中那样完全相同。但最佳实践是在碰撞回调方法中使用相同的标识符，如代码清单\
    \ 4-13 所示，以避免混淆。"
- fmt: '# 碰撞回调方法


    碰撞回调方法始终返回一个`BOOL`值。如果返回`YES`，则告诉物理引擎碰撞体应该发生碰撞。如果返回`NO`，碰撞体会相互穿过而不受影响。然而，使用类别（`Categories`）和掩码（`Masks`）来过滤掉不需要的碰撞更为高效，这样甚至不会运行碰撞回调方法。在不需要为相关碰撞体处理额外碰撞代码的情况下，这更可取。


    ## 使用类别和掩码忽略碰撞


    在发送碰撞回调方法之前，物理引擎首先评估碰撞体的`Categories`和`Masks`属性。这些属性用于在实际碰撞检测、解析和回调代码执行之前过滤掉碰撞。


    只要可能，最好使用碰撞类别（`Categories`）和掩码（`Masks`）来过滤掉任何非碰撞体，因为这比从`Begin`接触回调方法中返回`NO`更高效。


    掩码使用与类别相同的标识符。为了帮助你更好地理解这一点，可以这样想：在本文的其余部分，将`Masks`视为“与哪些类别碰撞”的简称。


    最多可以有32个唯一的类别标识符，它们只是你在`SpriteBuilder`中输入的任意字符串。`Categories`和`Masks`字段都可以包含多个标识符。这些设置的示例如[图
    4-14](#part0013.html#Fig14)所示。


    ![9781484202630_Fig04-14.jpg](images/00073.jpeg)


    [图 4-14](#part0013.html#_Fig14). 碰撞类别和掩码的使用示例


    **提示**  在开发游戏时，你应该将类别标识符及其确切名称记录在一个列表中。这有助于你避免错误，比如错误地命名标识符，并且你可以跟踪已使用了32个标识符中的多少个。你还应该坚持使用复数或单数名称，这样你永远不必纠结标识符是`enemy`还是`enemies`。这使回忆它们变得更加容易。


    默认情况下，`Categories`和`Masks`都是空的。令人困惑的一点是，“空”的类别意味着该碰撞体实际上是所有已定义类别的成员。同样，“空”的掩码意味着该碰撞体被设置为与所有已定义类别碰撞。这意味着物理体默认与所有其他碰撞体碰撞，除非它们的类别和掩码被设置为特定的标识符。


    更令人困惑的是，碰撞体的类别和掩码都会在交叉引用测试中被考虑，并且只需要两个测试中的一个为真，碰撞就会发生。


    如果你有两个碰撞体A和B，要使它们碰撞，要么A的一个类别必须在B的掩码中，要么B的一个类别必须在A的掩码中。记住我之前说的：空字段被视为该字段中设置了所有标识符。这意味着如果你将A的类别和掩码设置为`ACat`，但只将B的类别设置为`BCat`，而将其掩码字段留空，两个碰撞体仍然会发生碰撞，因为B的空掩码字段匹配A的任何和所有类别。


    如果你明确想要阻止碰撞体A和B碰撞，你必须同时填写两个碰撞体的`Categories`和`Masks`字段，并确保A的类别不在B的掩码中，且B的类别不在A的掩码中。请屏住呼吸，接下来是[表
    4-1](#part0013.html#Tab1)，它将说明这一点。


    [表 4-1](#part0013.html#_Tab1). 一个虚构的射击游戏中使用的类别和掩码，其中子弹不应相互碰撞，也不应与各自的所有者碰撞


    ![Table4-1.jpg](images/00074.jpeg)


    创建两个不碰撞的碰撞体A和B的最简单方法是将碰撞体A的`Categories`和`Masks`字段都设置为`ACat`，并将碰撞体B的`Categories`和`Masks`字段都设置为`BCat`。实际用于替换`ACat`和`BCat`的字符串无关紧要；重要的是每个碰撞体的类别标识符不得在另一个碰撞体的`Masks`列表中，并且任何字段都不能为空。


    **提示**  由于任何碰撞体在其`Categories`和`Masks`字段中最多可以有32个标识符，碰撞过滤很容易变得非常令人困惑。最好提前画出一张图表，确定哪些类型的碰撞体**不应与**哪些类型的其他碰撞体碰撞，而不是确定哪些应该碰撞。确定哪些碰撞体不应碰撞需要使用类别标识符，反之则不然，因为碰撞体默认是碰撞的。


    尝试使用标识符来规划哪些碰撞体**应该碰撞**会繁琐得多。而且你很可能最终会使用更多的标识符。仅仅是因为你需要模拟那些无需标识符就已经正常工作的碰撞行为。


    例如，在一个虚构的射击游戏中，你可能希望防止玩家的子弹与玩家以及其他敌人的子弹碰撞，但玩家的子弹应该与敌人碰撞——反之亦然，敌人和敌人的子弹也是如此。当然，敌人和玩家应该碰撞。


    [表 4-1](#part0013.html#Tab1) 展示了如何使用`Categories`和`Masks`设置标识符。


    如果你希望允许子弹相互碰撞，你只需要将子弹的`Categories`分别从`playerBullet`和`enemyBullet`更改为`player`和`enemy`。如果你希望子弹也能够击中它们的所有者，你只需清除玩家和敌人子弹的`Categories`字段。


    `playerBullet`和`enemyBullet`标识符的存在仅仅是为了避免碰撞，这些标识符甚至在[表 4-1](#part0013.html#Tab1)中未用于任何其他`Masks`字段。因此，你可以将它们合并为一个通用的`NoCollision`类别标识符，从而减少使用的总标识符数量。


    **提示**  使用与对象类型或类紧密对应的类别标识符是很常见且可以理解的。如果你发现自己达到了32个标识符的限制，请梳理你的标识符，并尝试找出可以合并多种节点类型的类别标识符的情况。我几乎可以保证，如果你仔细思考实际的碰撞行为应该是什么，总是有减少标识符数量的空间。


    设置`Categories`和`Masks`可能会很快变得非常复杂。我强烈建议你在纸上或绘图应用中绘制它们，并绘制连接箭头以直观地查看谁应该与谁碰撞。这样的表格或图表可以帮助你跟踪碰撞设置，并且更容易发现你是否需要额外的类别，或者是否可以将两个类别合并为一个。


    请记住，如果两个碰撞体的`Categories`和`Masks`阻止它们碰撞，它们相应的碰撞回调方法也不会触发。同样，如果你主要关心的是确定哪些类型的碰撞体发生了碰撞以便运行自定义代码，你只需要设置碰撞类型标识符。


    **提示**  只有在**阻止与某些类型的碰撞体碰撞**时，才需要编辑`Categories`和`Masks`。但是，一旦你开始为一个或多个碰撞体编辑它们，可能还需要编辑看似无关的碰撞体的`Categories`和`Masks`，以确保某些碰撞体仍然会碰撞。


    ## 让玩家离开'
  raw: 'The collision callback methods always return a BOOL value. If you return YES,
    you tell the physics engine that the colliding bodies should collide. If you return
    NO, the colliding bodies will pass through each other unaffected. It is, however,
    more efficient to use the Categories and Masks to sort out unwanted collisions
    and thus not even run the collision callback method. This is preferable in situations
    where you don’t need to process additional collision code for the bodies in question.


    Ignoring Collisions with Categories and Masks


    Before a collision callback method is sent, the physics engine first evaluates
    a body’s Categories and Masks properties. These are used to sort out collisions
    before the actual collision detection, resolve, and callback code is performed.


    It is preferable to use collision Categories and Masks to filter out any noncolliding
    bodies whenever you can because it’s more efficient than returning NO from the
    *Begin* contact callback method.


    The masks use the same identifiers as the categories. To you better understand
    this, it may help to think of *Masks* as a short name for “collides with categories”
    in the rest of the text.


    There can be up to 32 unique category identifiers, which are simply arbitrary
    strings that you enter in SpriteBuilder. Both Categories and Masks fields can
    contain multiple identifiers. An example of these settings is shown in [Figure
    4-14](#part0013.html#Fig14).


    ![9781484202630_Fig04-14.jpg](images/00073.jpeg)


    [Figure 4-14](#part0013.html#_Fig14). Example usage of collision categories and
    masks


    **Tip**  While working on your game, you should make note of the category identifiers
    and their exact names in a list. This helps you avoid mistakes like incorrectly
    naming an identifier, and you can keep track of how many of the 32 identifiers
    you’ve already used. You should also stick to either plural or singular names,
    so you never have to wonder whether the identifier was *enemy* or *enemies*. This
    makes it easier to recall them.


    Categories and Masks are both empty by default. The confusing bit here is that
    an “empty” category means that this body is actually a member of all previously
    defined categories. Likewise, an “empty” mask means that the body is set up to
    collide with all previously defined categories. That means physics bodies default
    to colliding with all other bodies unless their categories and masks are set to
    specific identifiers.


    Further adding to the confusion is the fact that both a body’s category and a
    body’s mask are considered in a cross-reference test, and only one of the two
    tests need to be true in order for collision to occur.


    If you have two bodies, A and B, one of A’s categories must also be in B’s mask
    or one of B’s categories must be in A’s mask for both of them to collide. Keep
    in mind what I said earlier: an empty field is treated as if all identifiers are
    set in that field. That means if you set A’s category and mask to *ACat* but only
    B’s category to *BCat*, leaving its masks field empty, the two bodies will still
    collide because body B’s empty mask field matches any and all categories of body
    A.


    If you expressly want to prevent two bodies A and B from colliding, you will have
    to fill in both the Categories and Masks fields for both bodies and ensure that
    A’s category is not included in B’s mask, and B’s category is not included in
    A’s mask. Hold your breath, there’s [Table 4-1](#part0013.html#Tab1) coming up,
    which illustrates this.


    [Table 4-1](#part0013.html#_Tab1). Categories and masks used by an imaginary shoot
    ‘em game where bullets should not collide with each other and their respective
    owners


    ![Table4-1.jpg](images/00074.jpeg)


    The simplest form of creating two noncolliding bodies A and B would be to set
    both the Categories and Masks fields for body A to *ACat* and both the Categories
    and Masks for body B to *BCat*. The actual strings used in place of *ACat* and
    *BCat* are not relevant; the important part is that each body’s category identifiers
    must not be in the other body’s Masks list, nor should any of the fields be empty.


    **Tip**  Because any body can have up to 32 identifiers in both its Categories
    and Masks fields, the collision filtering can easily get pretty confusing. It
    is best to draw out a chart ahead of time to determine which types of bodies ***should
    not collide*** with what types of other bodies rather than which ones should collide.
    Determining what bodies should not collide requires you to use category identifiers,
    but not vice versa, because bodies collide by default.


    It’s going to be a lot more tedious trying to use identifiers to map out what
    bodies ***should be colliding***. You are likely to end up using a lot more identifiers,
    too. Simply because you would have to model collision behavior that is already
    working without identifiers.


    For instance, in an imaginary shoot ’em up game, you may want to prevent the player’s
    bullets from colliding with the player and other enemy bullets, but the player
    bullets should collide with enemies—and vice versa for enemies and enemy bullets.
    And, of course, enemies and players should collide.


    [Table 4-1](#part0013.html#Tab1) shows you how the identifiers would be set up
    using Categories and Masks.


    If you want to allow bullets to hit each other, all you need to do is change the
    bullet’s Categories from playerBullet and enemyBullet to player and enemy, respectively.
    If you want the bullets to be able to hit their owners as well, you simply clear
    the Categories field for both player and enemy bullets.


    The *playerBullet* and *enemyBullet* identifiers exist solely to avoid collisions,
    these identifiers aren’t even used in any other Masks fields in [Table 4-1](#part0013.html#Tab1).
    Hence, you can combine them into a generic NoCollision category identifier, reducing
    the total number of identifiers used by one.


    **Tip**  It’s pretty common and understandable to go with category identifiers
    that closely model the types or classes of objects used. If you ever find yourself
    running into the 32-identifiers limit, do map out your identifiers and try to
    find cases where you can combine category identifiers of multiple types of nodes.
    I can almost guarantee there’ll be room for reducing the number of identifiers
    if you think closely about what the actual collision behavior should be.


    Setting up Categories and Masks can get pretty hairy real quick. I strongly recommend
    you draw them on paper or in a diagram application, and draw connecting arrows
    to visually see who is supposed to be colliding with whom. Such a table or diagram
    helps you keep track of your collision setup, and it will make it easier to spot
    whether you need an additional category, or whether you could combine two categories
    into one.


    Keep in mind that if two bodies’ Categories and Masks prevent them from colliding,
    their corresponding collision callback methods will not fire either. Likewise,
    if you are mainly interested in determining which types of bodies have collided
    in order to run custom code, all you need to set up is the Collision type identifier.


    **Tip**  Editing Categories and Masks is required only when it comes to *preventing
    collisions* with certain types of bodies. But once you start editing them for
    one or more bodies, it may be required to edit Categories and Masks of seemingly
    unrelated bodies to ensure certain bodies will still be colliding.


    Letting the Player Leave'
