    \                                recursively:NO];\n    _physicsNode.debugDraw\
    \ = _drawPhysicsShapes;\n    _physicsNode.collisionDelegate = self;\n    _backgroundNode\
    \ = [_levelNode getChildByName:@\"background\" recursively:NO];\n    _playerNode\
    \ = [_physicsNode getChildByName:@\"player\" recursively:YES];\n}\n```\n\nThis\
    \ in itself doesn’t do anything yet. But it allows you to implement one or several\
    \ of the four collision delegate methods shown in [Listing 4-12](#part0013.html#list12)\
    \ in the `GameScene` class. Each type of method can appear multiple times, with\
    \ different collision type parameter names in the class implementing the `CCPhysicsCollisionDelegate`\
    \ protocol.\n\n**[Listing 4-12](#part0013.html#_list12).** Example method declarations\
    \ of the four collision delegate messages\n\n```objc\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                 collisionTypeA:(CCNode *)nodeA\n                 collisionTypeB:(CCNode\
    \ *)nodeB;\n\n-(BOOL) ccPhysicsCollisionPreSolve:(CCPhysicsCollisionPair *)pair\n\
    \                 collisionTypeA:(CCNode *)nodeA\n                 collisionTypeB:(CCNode\
    \ *)nodeB;\n\n-(void) ccPhysicsCollisionPostSolve:(CCPhysicsCollisionPair *)pair\n\
    \                 collisionTypeA:(CCNode *)nodeA\n                 collisionTypeB:(CCNode\
    \ *)nodeB;\n\n-(void) ccPhysicsCollisionSeparate:(CCPhysicsCollisionPair *)pair\n\
    \                 collisionTypeA:(CCNode *)nodeA\n                 collisionTypeB:(CCNode\
    \ *)nodeB;\n```\n\nNote that the methods in [Listing 4-12](#part0013.html#list12)\
    \ are nonfunctional examples; there’s a trick to naming the parameters `collisionTypeA`\
    \ and `collisionTypeB` that decides which colliding bodies call which method.\
    \ I’ll explain this shortly.\n\nUpon closer inspection, you’ll notice that all\
    \ four collision callback methods take the same parameters as input, and two of\
    \ them return a `BOOL`. Following is a list that explains under which circumstances\
    \ and in which order each of these methods is called:\n\n- **Begin** methods are\
    \ called when two bodies first come into contact. It’s always the first method\
    \ called in a collision event between two bodies. By returning `NO`, the collision\
    \ is ignored, bodies are allowed to pass through each other, and `PreSolve` and\
    \ `PostSolve` methods for this collision event will not be called.\n- **PreSolve**\
    \ methods get called repeatedly for as long as two bodies are in contact, and\
    \ before the collision has been resolved. This allows you to tweak the collision\
    \ response by (temporarily) modifying the contacting body’s properties, such as\
    \ friction or restitution. Returning `NO` will not resolve the collision so that\
    \ the two bodies are allowed to penetrate for this particular point in time.\n\
