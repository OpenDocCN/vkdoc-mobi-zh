- fmt: "[***Listing 5-1***](#part0014.html#_list1). Running an animation using `CCAnimationManager`\n\
    \n```\nCCNode* sawNoAutoplay = [_physicsNode getChildByName:@\"sawNoAutoplay\"\
    \ recursively:YES];\n[sawNoAutoplay.animationManager runAnimationsForSequenceNamed:@\"\
    Default Timeline\"];\n```\n\nThe first line you should be familiar with. You obtain\
    \ a reference to the node by name. The animation manager is then instructed to\
    \ run the sequence named `Default Timeline`, which must be the exact name of the\
    \ Timeline in `SpriteBuilder`, including case. If you build and run this, you’ll\
    \ notice the non-autoplaying saw is now animating again.\n\n**Note** It’s important\
    \ to note that each CCB file has its own `CCAnimationManager` instance where only\
    \ that specific CCB file’s timelines are stored. All Timeline animations edited\
    \ in a CCB file are stored in the `CCAnimationManager` of the CCB’s root node,\
    \ while each of the CCB's child node’s `animationManager` instances forwards animation\
    \ requests to the root node’s `animationManager` instance.\n\nTherefore, in [Listing\
    \ 5-1](#part0014.html#list1) it wouldn’t work if you used, say, the `animationManager`\
    \ of `self` (`GameScene.ccb`), `_physicsNode` or `_levelNode` (both `Level1.ccb`).\
    \ You have to use a reference to either the `Saw1_noautoplay.ccb` root node or\
    \ one of its child nodes.\n\n## Animation Playback Completion Callback\n\nThe\
    \ `CCAnimationManager` class allows you to get notified when playback of an animation\
    \ has ended and a looping animation is repeating. To receive these notifications,\
    \ you have to implement the `CCBAnimationManagerDelegate` protocol in the `GameScene.h`\
    \ by adding the protocol in the angle brackets as shown in [Listing 5-2](#part0014.html#list2).\n\
    \n[***Listing 5-2***](#part0014.html#_list2). Adding the `CCBAnimationManagerDelegate`\
    \ protocol to `GameScene.h`\n\n```\n#import \"CCNode.h\"\n\n@interface GameScene\
    \ : CCNode <CCPhysicsCollisionDelegate, CCBAnimationManagerDelegate>\n\n@end\n\
    ```\n\nThen update the `GameScene.m` code from [Listing 5-1](#part0014.html#list1)\
    \ with the highlighted line in [Listing 5-3](#part0014.html#list3), which assigns\
    \ `self`, the `GameScene` class instance, as the animation manager’s delegate.\n\
    \n[***Listing 5-3***](#part0014.html#_list3). Assigning the animation manager\
    \ delegate\n\n```\nCCNode* sawNoAutoplay = [_physicsNode getChildByName:@\"sawNoAutoplay\"\
    \ recursively:YES];\nsawNoAutoplay.animationManager.delegate = self;\n[sawNoAutoplay.animationManager\
    \ runAnimationsForSequenceNamed:@\"Default Timeline\"];\n```\n\nBelow the `loadLevelNamed:`\
    \ method, you should then add the `completedAnimationSequenceNamed:` callback\
    \ method as seen in [Listing 5-4](#part0014.html#list4).\n\n[***Listing 5-4***](#part0014.html#_list4).\
    \ This callback method runs whenever an animation has ended\n\n```\n-(void) completedAnimationSequenceNamed:(NSString*)name\n\
    {\n    NSLog(@\"completed animation sequence: %@\", name);\n}\n```\n\nEvery time\
    \ this method runs, it will log the name of the animation whose playback ended.\
    \ The method also runs whenever a looping animation has reached the end of its\
    \ animation cycle and starts over. This allows you to wait for a looping animation\
    \ to play back to complete before stopping or replacing it with another animation,\
    \ in order to prevent nasty jumps in the animation playback.\n\nAlternatively,\
    \ you can also set a block that runs whenever an animation ends. The advantage\
    \ is that you do not have to implement the `CCBAnimationManagerDelegate` protocol\
    \ in the current class to do so; the disadvantage is that you get the `CCAnimationManager`\
    \ as input, so you have to refer to the `lastCompletedSequenceName` property to\
    \ get the name of the Timeline that ended. It’s also slightly more verbose to\
    \ set an animation callback block as you can see in [Listing 5-5](#part0014.html#list5).\n\
    \n[***Listing 5-5***](#part0014.html#_list5). Using an animation callback block\
    \ to be notified of “animation ended” events\n\n```\n[sawNoAutoplay.animationManager\
    \ setCompletedAnimationCallbackBlock:^(CCAnimationManager* sender) {\n    NSLog(@\"\
    completed animation sequence: %@\", sender.lastCompletedSequenceName);\n}];\n\
    ```\n\nDeciding whether to implement the `CCBAnimationManagerDelegate` protocol\
    \ or use the callback block variant is a matter of personal preference.\n\n##\
    \ Differentiating Between Animations\n\nNote once again that each CCB file has\
    \ its own `CCAnimationManager` instance. In this instance, only the animations\
    \ in `Saw1_noautoplay.ccb` will call the callback method in [Listing 5-4](#part0014.html#list4).\n\
    \nLikewise, if you were to use `self.animationManager.delegate = self;`, the method\
    \ in [Listing 5-4](#part0014.html#list4) would run every time a Timeline animation\
    \ of the `GameScene.ccb` ends. However, it would not run, for example, when a\
    \ Timeline animation of `Player.ccb` or `Background1.ccb` ends.\n\nNote that it’s\
    \ possible to use the same class as a delegate of multiple animation-manager instances.\
    \ If you needed to be informed in `GameScene` about other CCBs’ animation events,\
    \ you could do it like this:\n\n```\nself.animationManager.delegate = self;\n\
    _levelNode.animationManager.delegate = self;\n_playerNode.animationManager.delegate\
    \ = self;\n_backgroundNode.animationManager.delegate = self;\n```\n\nNotice, though,\
    \ that the callback method in [Listing 5-4](#part0014.html#list4) receives only\
    \ the name of the sequence that ended. So unless you renamed each Timeline animation,\
    \ you would have no way of discerning which CCB’s `Default Timeline` ended. You\
    \ would have to edit the Timelines as seen in [Figure 5-8](#part0014.html#Fig8)\
    \ and rename them by double-clicking their name in the dialog shown in [Figure\
    \ 5-9](#part0014.html#Fig9).\n\n## Triggering Animations on Collision\n\nSince\
    \ it doesn’t make much sense to prevent an animation from playing automatically,\
    \ only to play it when the level loads, you’re going to trigger the playback of\
    \ the animation when the player enters a certain area.\n\n### Adding Trigger Targets\
    \ to the Level\n\nFirst things first: remove the temporary animation playback\
    \ code in [Listing 5-1](#part0014.html#list1) from the `loadLevelNamed:` method.\n\
    \nNext, open `Level1.ccb` in `SpriteBuilder`. Assuming you have already added\
    \ one instance of `Saw1_noautoplay.ccb` to the gears and saws node, add another\
    \ one. You should have at least two of them.\n\nYou should rename the existing\
    \ saw instance in the Timeline, and then make a copy of the saw and arrange it\
    \ as you see fit. Just be sure the saws don’t overlap the player and the player\
    \ can’t touch them right away, as you’re going to make them deadly in a while.\n\
    \nSelect each `Saw1_noautoplay` prefab instance in turn, and change its name property\
    \ on the Item Properties tab to `triggerSawRotation`. The trigger node will get\
    \ the same name—that will make the connection between the trigger area and the\
    \ to-be-triggered nodes.\n\n### Creating a Trigger CCB\n\nWhat would be a good\
    \ trigger node? Color nodes are arguably the best option, though in general you\
    \ can use any type of node. Trigger areas should be visible while editing but\
    \ see-through (transparent). The node color can be used to highlight different\
    \ types of triggers with different colors.\n\nOnce again, you should create the\
    \ trigger object as a template. You should be familiar with the process by now,\
    \ so I’ll keep the instructions short and to the point.\n\nCreate a New File in\
    \ the `Prefabs` folder, name it `TriggerOnce.ccb`, and change its type to `Layer`.\
    \ The `Layer` type allows you to specify an initial size. It shouldn’t be too\
    \ small or too large, and the actual size isn’t that important—it will only determine\
    \ the trigger node’s initial size in the level. A size of 128x128 works fine.\
    \ Then click Create.\n\n**Note** The `Layer` type is important because it will\
    \ give you a rectangular selection handle when placed in the level. You may have\
    \ noticed that the saw and gear instances have rotational selection handles. Rectangular\
    \ selection handles are simply easier to work with when you need to resize the\
    \ node often, which you’ll need to do in order to adjust the trigger area’s size\
    \ and rectangular shape."
  raw: '[***Listing 5-1***](#part0014.html#_list1). Running an animation using CCAnimationManager


    ```

    CCNode* sawNoAutoplay = [_physicsNode getChildByName:@"sawNoAutoplay" recursively:YES];

    [sawNoAutoplay.animationManager runAnimationsForSequenceNamed:@"Default Timeline"];

    ```


    The first line you should be familiar with. You obtain a reference to the node
    by name. The animation manager is then instructed to run the sequence named Default
    Timeline, which must be the exact name of the Timeline in SpriteBuilder, including
    case. If you build and run this, you’ll notice the non-autoplaying saw is now
    animating again.


    **Note**  It’s important to note that each CCB file has its own CCAnimationManager
    instance where only that specific CCB file’s timelines are stored. All Timeline
    animations edited in a CCB file are stored in the CCAnimationManager of the CCB’s
    root node, while each of the CCB''s child node’s animationManager instances forwards
    animation requests to the root node’s animationManager instance.


    Therefore, in [Listing 5-1](#part0014.html#list1) it wouldn’t work if you used,
    say, the animationManager of self (GameScene.ccb), _physicsNode or _levelNode
    (both Level1.ccb). You have to use a reference to either the Saw1_noautoplay.ccb
    root node or one of its child nodes.


    Animation Playback Completion Callback


    The CCAnimationManager class allows you to get notified when playback of an animation
    has ended and a looping animation is repeating. To receive these notifications,
    you have to implement the CCBAnimationManagerDelegate protocol in the GameScene.h
    by adding the protocol in the angle brackets as shown in [Listing 5-2](#part0014.html#list2).


    [***Listing 5-2***](#part0014.html#_list2). Adding the CCBAnimationManagerDelegate
    protocol to GameScene.h


    ```

    #import "CCNode.h"


    @interface GameScene : CCNode <CCPhysicsCollisionDelegate, CCBAnimationManagerDelegate>


    @end

    ```


    Then update the GameScene.m code from [Listing 5-1](#part0014.html#list1) with
    the highlighted line in [Listing 5-3](#part0014.html#list3), which assigns self,
    the GameScene class instance, as the animation manager’s delegate.


    [***Listing 5-3***](#part0014.html#_list3). Assigning the animation manager delegate


    ```

    CCNode* sawNoAutoplay = [_physicsNode getChildByName:@"sawNoAutoplay" recursively:YES];

    sawNoAutoplay.animationManager.delegate = self;

    [sawNoAutoplay.animationManager runAnimationsForSequenceNamed:@"Default Timeline"];

    ```


    Below the loadLevelNamed: method, you should then add the completedAnimationSequenceNamed:
    callback method as seen in [Listing 5-4](#part0014.html#list4).


    [***Listing 5-4***](#part0014.html#_list4). This callback method runs whenever
    an animation has ended


    ```

    -(void) completedAnimationSequenceNamed:(NSString*)name

    {

        NSLog(@"completed animation sequence: %@", name);

    }

    ```


    Every time this method runs, it will log the name of the animation whose playback
    ended. The method also runs whenever a looping animation has reached the end of
    its animation cycle and starts over. This allows you to wait for a looping animation
    to play back to complete before stopping or replacing it with another animation,
    in order to prevent nasty jumps in the animation playback.


    Alternatively, you can also set a block that runs whenever an animation ends.
    The advantage is that you do not have to implement the CCBAnimationManagerDelegate
    protocol in the current class to do so; the disadvantage is that you get the CCAnimationManager
    as input, so you have to refer to the lastCompletedSequenceName property to get
    the name of the Timeline that ended. It’s also slightly more verbose to set an
    animation callback block as you can see in [Listing 5-5](#part0014.html#list5).


    [***Listing 5-5***](#part0014.html#_list5). Using an animation callback block
    to be notified of “animation ended” events


    ```

    [sawNoAutoplay.animationManager setCompletedAnimationCallbackBlock:^(CCAnimationManager*
    sender) {

        NSLog(@"completed animation sequence: %@", sender.lastCompletedSequenceName);

    }];

    ```


    Deciding whether to implement the CCBAnimationManagerDelegate protocol or use
    the callback block variant is a matter of personal preference.


    Differentiating Between Animations


    Note once again that each CCB file has its own CCAnimationManager instance. In
    this instance, only the animations in Saw1_noautoplay.ccb will call the callback
    method in [Listing 5-4](#part0014.html#list4).


    Likewise, if you were to use self.animationManager.delegate = self;, the method
    in [Listing 5-4](#part0014.html#list4) would run every time a Timeline animation
    of the GameScene.ccb ends. However, it would not run, for example, when a Timeline
    animation of Player.ccb or Background1.ccb ends.


    Note that it’s possible to use the same class as a delegate of multiple animation-manager
    instances. If you needed to be informed in GameScene about other CCBs’ animation
    events, you could do it like this:


    ```

    self.animationManager.delegate = self;

    _levelNode.animationManager.delegate = self;

    _playerNode.animationManager.delegate = self;

    _backgroundNode.animationManager.delegate = self;

    ```


    Notice, though, that the callback method in [Listing 5-4](#part0014.html#list4)
    receives only the name of the sequence that ended. So unless you renamed each
    Timeline animation, you would have no way of discerning which CCB’s Default Timeline
    ended. You would have to edit the Timelines as seen in [Figure 5-8](#part0014.html#Fig8)
    and rename them by double-clicking their name in the dialog shown in [Figure 5-9](#part0014.html#Fig9).


    Triggering Animations on Collision


    Since it doesn’t make much sense to prevent an animation from playing automatically,
    only to play it when the level loads, you’re going to trigger the playback of
    the animation when the player enters a certain area.


    Adding Trigger Targets to the Level


    First things first: remove the temporary animation playback code in [Listing 5-1](#part0014.html#list1)
    from the loadLevelNamed: method.


    Next, open Level1.ccb in SpriteBuilder. Assuming you have already added one instance
    of Saw1_noautoplay.ccb to the gears and saws node, add another one. You should
    have at least two of them.


    You should rename the existing saw instance in the Timeline, and then make a copy
    of the saw and arrange it as you see fit. Just be sure the saws don’t overlap
    the player and the player can’t touch them right away, as you’re going to make
    them deadly in a while.


    Select each Saw1_noautoplay prefab instance in turn, and change its name property
    on the Item Properties tab to **triggerSawRotation**. The trigger node will get
    the same name—that will make the connection between the trigger area and the to-be-triggered
    nodes.


    Creating a Trigger CCB


    What would be a good trigger node? Color nodes are arguably the best option, though
    in general you can use any type of node. Trigger areas should be visible while
    editing but see-through (transparent). The node color can be used to highlight
    different types of triggers with different colors.


    Once again, you should create the trigger object as a template. You should be
    familiar with the process by now, so I’ll keep the instructions short and to the
    point.


    Create a New File in the Prefabs folder, name it **TriggerOnce.ccb**, and change
    its type to Layer. The Layer type allows you to specify an initial size. It shouldn’t
    be too small or too large, and the actual size isn’t that important—it will only
    determine the trigger node’s initial size in the level. A size of 128x128 works
    fine. Then click Create.


    **Note**  The Layer type is important because it will give you a rectangular selection
    handle when placed in the level. You may have noticed that the saw and gear instances
    have rotational selection handles. Rectangular selection handles are simply easier
    to work with when you need to resize the node often, which you’ll need to do in
    order to adjust the trigger area’s size and rectangular shape.'
  trans: "\n***清单 5-1***. 使用 `CCAnimationManager` 运行动画\n\n```\nCCNode* sawNoAutoplay\
    \ = [_physicsNode getChildByName:@\"sawNoAutoplay\" recursively:YES];\n[sawNoAutoplay.animationManager\
    \ runAnimationsForSequenceNamed:@\"Default Timeline\"];\n```\n\n第一行代码你应该很熟悉，即通过名称获取节点的引用。随后指示动画管理器运行名为\
    \ `Default Timeline` 的序列，该名称必须与 `SpriteBuilder` 中时间轴的确切名称一致（包括大小写）。如果你构建并运行程序，会注意到非自动播放的锯子现在又开始运行动画了。\n\
    \n**注意** 需要特别指出的是，每个 CCB 文件都有自己的 `CCAnimationManager` 实例，其中仅存储该特定 CCB 文件的时间轴。在某个\
    \ CCB 文件中编辑的所有时间轴动画都存储在该 CCB 根节点的 `CCAnimationManager` 中，而该 CCB 的每个子节点的 `animationManager`\
    \ 实例都会将动画请求转发给根节点的 `animationManager` 实例。\n\n因此，在清单 5-1 中，如果你使用 `self`（`GameScene.ccb`）、`_physicsNode`\
    \ 或 `_levelNode`（均为 `Level1.ccb`）的 `animationManager`，将无法生效。你必须使用对 `Saw1_noautoplay.ccb`\
    \ 根节点或其某个子节点的引用。\n\n## 动画播放完成回调\n\n`CCAnimationManager` 类允许你在动画播放结束或循环动画重复时收到通知。要接收这些通知，你需要在\
    \ `GameScene.h` 中通过添加尖括号内的协议来实现 `CCBAnimationManagerDelegate` 协议，如清单 5-2 所示。\n\
    \n***清单 5-2***. 向 `GameScene.h` 添加 `CCBAnimationManagerDelegate` 协议\n\n```\n#import\
    \ \"CCNode.h\"\n\n@interface GameScene : CCNode <CCPhysicsCollisionDelegate, CCBAnimationManagerDelegate>\n\
    \n@end\n```\n\n然后，按照清单 5-3 中高亮显示的行，更新清单 5-1 中的 `GameScene.m` 代码，将 `self`（`GameScene`\
    \ 类实例）指定为动画管理器的委托。\n\n***清单 5-3***. 指定动画管理器委托\n\n```\nCCNode* sawNoAutoplay =\
    \ [_physicsNode getChildByName:@\"sawNoAutoplay\" recursively:YES];\nsawNoAutoplay.animationManager.delegate\
    \ = self;\n[sawNoAutoplay.animationManager runAnimationsForSequenceNamed:@\"Default\
    \ Timeline\"];\n```\n\n在 `loadLevelNamed:` 方法下方，你应该添加 `completedAnimationSequenceNamed:`\
    \ 回调方法，如清单 5-4 所示。\n\n***清单 5-4***. 该回调方法在动画结束时运行\n\n```\n-(void) completedAnimationSequenceNamed:(NSString*)name\n\
    {\n    NSLog(@\"completed animation sequence: %@\", name);\n}\n```\n\n每次该方法运行时，都会记录播放结束的动画名称。当循环动画达到其动画周期终点并重新开始时，该方法也会运行。这允许你等待循环动画播放完成，然后再停止或替换为另一个动画，以避免动画播放中出现令人不适的跳跃。\n\
    \n或者，你也可以设置一个在动画结束时运行的块。这样做的好处是无需在当前类中实现 `CCBAnimationManagerDelegate` 协议；缺点是你需要将\
    \ `CCAnimationManager` 作为输入，因此必须引用 `lastCompletedSequenceName` 属性来获取已结束的时间轴名称。设置动画回调块的代码也稍显繁琐，如清单\
    \ 5-5 所示。\n\n***清单 5-5***. 使用动画回调块来接收“动画结束”事件的提醒\n\n```\n[sawNoAutoplay.animationManager\
    \ setCompletedAnimationCallbackBlock:^(CCAnimationManager* sender) {\n    NSLog(@\"\
    completed animation sequence: %@\", sender.lastCompletedSequenceName);\n}];\n\
    ```\n\n是选择实现 `CCBAnimationManagerDelegate` 协议，还是使用回调块变体，这取决于个人偏好。\n\n## 区分不同动画\n\
    \n再次注意，每个 CCB 文件都有其自己的 `CCAnimationManager` 实例。在此实例中，只有 `Saw1_noautoplay.ccb`\
    \ 中的动画会调用清单 5-4 中的回调方法。\n\n同样，如果你使用 `self.animationManager.delegate = self;`，那么每次\
    \ `GameScene.ccb` 的时间轴动画结束时，清单 5-4 中的方法都会运行。但是，例如当 `Player.ccb` 或 `Background1.ccb`\
    \ 的时间轴动画结束时，该方法则不会运行。\n\n注意，一个类可以作为多个动画管理器实例的委托。如果你需要在 `GameScene` 中获知其他 CCB 的动画事件，可以这样做：\n\
    \n```\nself.animationManager.delegate = self;\n_levelNode.animationManager.delegate\
    \ = self;\n_playerNode.animationManager.delegate = self;\n_backgroundNode.animationManager.delegate\
    \ = self;\n```\n\n不过请注意，清单 5-4 中的回调方法仅接收已结束序列的名称。因此，除非你重命名了每个时间轴动画，否则无法分辨是哪个 CCB\
    \ 的 `Default Timeline` 结束了。你必须像图 5-8 那样编辑时间轴，并在图 5-9 所示的对话框中双击其名称进行重命名。\n\n##\
    \ 在碰撞时触发动画\n\n既然阻止动画自动播放，而仅在关卡加载时播放没有太大意义，你将在玩家进入特定区域时触发动画播放。\n\n### 向关卡添加触发目标\n\
    \n首先：从 `loadLevelNamed:` 方法中移除清单 5-1 中的临时动画播放代码。\n\n接下来，在 `SpriteBuilder` 中打开\
    \ `Level1.ccb`。假设你已经在齿轮和锯子节点中添加了一个 `Saw1_noautoplay.ccb` 实例，请再添加一个。你至少应该有两个这样的实例。\n\
    \n你应该重命名时间轴中现有的锯子实例，然后复制一个锯子，并根据需要摆放它们。只需确保锯子不与玩家重叠，并且玩家不能立即碰到它们，因为你稍后将让它们变得致命。\n\
    \n依次选中每个 `Saw1_noautoplay` 预制体实例，并在“项目属性”选项卡中将其名称属性更改为 `triggerSawRotation`。触发节点将获得相同的名称——这将在触发区域和将被触发的节点之间建立联系。\n\
    \n### 创建触发 CCB\n\n什么是好的触发节点？颜色节点可以说是最佳选择，尽管通常你可以使用任何类型的节点。触发区域在编辑时应可见，但应是透明的。节点颜色可以用来以不同颜色高亮显示不同类型的触发点。\n\
    \n同样，你应该将触发对象创建为模板。你应该已经熟悉这个过程，所以我会尽可能简明扼要地给出说明。\n\n在 `Prefabs` 文件夹中新建文件，命名为 `TriggerOnce.ccb`，并将其类型更改为\
    \ `Layer`。`Layer` 类型允许你指定初始尺寸。它不应太小或太大，实际尺寸并不重要——它只会决定触发节点在关卡中的初始大小。128x128 的尺寸就很好。然后点击创建。\n\
    \n**注意** `Layer` 类型很重要，因为它会在你放置到关卡中时提供一个矩形选择手柄。你可能已经注意到，锯子和齿轮实例带有旋转选择手柄。当你需要频繁调整节点大小时（你需要调整触发区域的大小和矩形形状），矩形选择手柄用起来更简单。\n"
- fmt: "# 排版后的文档\n\n从节点库视图中拖放一个`Color`节点到`TriggerOnce.ccb`舞台。在“属性”选项卡中，将位置设置为`0, 0`。然后将宽度和高度的内容大小类型更改为与根节点相同的宽度和高度（`128x128`），以使颜色节点填充图层的整个区域。此外，选择你喜欢的颜色，并将不透明度设置为`0.3`——实际值并不重要。你以后可能需要回来将不透明度和颜色更改为更合适的值，因为这很大程度上取决于使用的图形、触发区域的数量和大小，以及最重要的是个人偏好。\n\
    \n**注意**：你也可以将颜色节点的内容大小类型设置为`%`，并将宽度和高度设置为`100`，以填充整个关卡。然而，在撰写本文时的SpriteBuilder版本中，如果启用物理效果，这将创建一个`1x1`大小的多边形碰撞形状。因此我避免这样做。两种方法效果相同——毕竟`TriggerOnce.ccb`图层及其颜色节点的大小不需要改变。\n\
    \n在颜色节点的“物理”选项卡上，勾选“启用物理”，将类型更改为“静态”，并在碰撞类型中输入`trigger`。这将允许你单独处理与触发器的碰撞。类别和掩码可以留空——目前除了玩家之外，没有其他可能激活触发器的动态对象。\n\
    \n在颜色节点的“代码连接”选项卡上，输入`Trigger`作为自定义类名。这将为添加到关卡中的每个`TriggerOnce.ccb`创建一个（即将添加的）`Trigger`类的实例。\n\
    \n由于这个特定的触发器只需触发一次，请再次切换到“属性”选项卡。在底部，单击“编辑自定义属性”按钮，添加一个名为`triggerCount`、类型为`Int`、值为`1`的自定义属性。这将使触发器只激活一次，然后自行移除。如果省略此属性或将其设置为`0`，它将创建一个每次玩家进入时都触发的`Trigger`实例。值大于`1`将使触发器激活指定次数，然后从关卡中自行移除。\n\
    \n**提示**：你可以用同样的方式添加另一个触发器CCB，将其命名为`TriggerForever.ccb`，并省略`triggerCount`参数或将其值设置为`0`。我相信你最终会找到重复可激活触发区域的用途。\n\
    \n请注意，也可以创建带有多边形形状的触发器，而非纯矩形形状。然而，多边形形状在SpriteBuilder中不会直观地反映出来，因为颜色节点填充的是矩形区域。如果你想在SpriteBuilder中直观地显示多边形触发器区域，则需要使用带有相应触发器图像的精灵节点。\n\
    \n另一方面，你几乎总是可以用多个矩形触发器来建模更复杂的触发器区域。触发器碰撞区域也通常不需要非常精确。因此，最好完全避免使用多边形形状的触发器，而是组合使用多个矩形触发器区域。\n\
    \n## 向关卡添加触发器\n\n在向`Level1.ccb`添加任何触发器之前，应首先从节点库视图中拖放另一个普通节点到`Level1.ccb`时间线中的`CCPhysicsNode`上。然后将此节点重命名为`triggers`。这将成为所有触发器节点的容器。\n\
    \n现在，你可以从“平铺编辑器”视图中拖放一个`TriggerOnce`到时间线中的`triggers`节点上。在“属性”选项卡中将触发器的名称属性更改为`triggerSawRotation`。该名称将触发器与同名的节点连接起来——你之前添加的锯片节点也具有`triggerSawRotation`作为其名称。当玩家（或其他节点）导致触发器激活时，目标节点将收到一条消息。\n\
    \n更改触发器的位置，并使用选择手柄调整（缩放）对象以最佳匹配触发器区域的所需大小。只需确保玩家能够与其发生碰撞即可。\n\n如果你想要形成更复杂的触发器形状，也可以创建此新触发器的副本。多个触发器可以重叠而不会出现问题。\n\
    \n## 创建Trigger类\n\n如果你现在构建并运行Xcode项目，将收到一个来自`CCBReader`的错误，指出找不到自定义类`Trigger`。你可能想尝试运行该项目以熟悉该错误消息，因为你可能会不时遇到它。\n\
    \n要修复此错误，你需要添加一个与你之前在触发器颜色节点的“代码连接”选项卡的“自定义类”字段中输入的名称相同的类。该类名为`Trigger`，如果这不明显的话。\n\
    \n在Xcode中，选择“项目导航器”选项卡。这是最左侧的选项卡，其中以层次结构视图显示文件、组（黄色文件夹图标）和文件夹（蓝色文件夹图标），类似于Finder显示文件和文件夹的方式。右键单击`Source`组并选择“新文件”。这将打开与[图2-9](#part0011.html#Fig9)相同的对话框。在“iOS\
    \ Cocoa Touch”部分，选择“Objective-C类”，然后点击“下一步”，这将显示你在[图2-10](#part0011.html#Fig10)中看到的对话框。在“类”字段中输入`Trigger`，并将其设为`CCNode`的子类，然后点击“下一步”。你将获得Xcode项目中的两个新文件，名为`Trigger.h`和`Trigger.m`。\n\
    \n再次尝试运行项目，你将再次收到一个关于缺少名为`triggerCount`的属性的错误消息。`Trigger`类仍然缺少此属性或实例变量。\n\n这次让我们使用一个合适的`@property`，因为你可能需要在运行时从其他类访问或更改此值。打开`Trigger.h`并添加`@property`，如[代码清单5-6](#part0014.html#list6)所示，以及定义目标节点需要实现的方法的`@protocol`。此外，添加`triggerActivatedBy:`方法的声明。\n\
    \n[***代码清单5-6***](#part0014.html#_list6). 向`Trigger.h`添加`triggerCount`属性\n\n```objc\n\
    #import \"CCNode.h\"\n\n@protocol TriggerDelegate <NSObject>\n-(void) didTriggerWithNode:(CCNode*)activator;\n\
    @end\n\n@interface Trigger : CCNode\n\n@property int triggerCount;\n\n-(void)\
    \ triggerActivatedBy:(CCNode*)activator;\n\n@end\n```\n\n这允许你在没有错误的情况下运行项目，尽管触发器本身还不能工作。\n\
    \n## 编程Trigger类\n\n`Trigger.m`的实现会稍微复杂一些，但它也是一个可重用的类，你可能希望在自己的项目中使用。它在加载时收集所有触发器和目标节点。`Trigger`类将触发器碰撞事件转发给所有目标节点，更新`triggerCount`，并在必要时移除不再需要的触发器节点。\n\
    \n### 初始化触发器和目标数组\n\n首先更新`Trigger.m`，使其与[代码清单5-7](#part0014.html#list7)类似。\n\n\
    [***代码清单5-7***](#part0014.html#_list7). 初始化触发器和目标存储字典的Trigger实现\n\n```objc\n#import\
    \ \"Trigger.h\"\n\nstatic NSMutableDictionary* targetArrays;\nstatic NSMutableDictionary*\
    \ triggerArrays;\n\n@implementation Trigger\n{\n    BOOL _repeatsForever;\n}\n\
    \n-(void) didLoadFromCCB\n{\n    if (targetArrays == nil)\n    {\n        targetArrays\
    \ = [NSMutableDictionary dictionary];\n        triggerArrays = [NSMutableDictionary\
    \ dictionary];\n    }\n\n    [targetArrays removeAllObjects];\n    [triggerArrays\
    \ removeAllObjects];\n\n    _repeatsForever = (_triggerCount <= 0);\n}\n\n@end\n\
    ```\n\n首先，声明了两个静态的`NSMutableDictionary`变量。关键字`static`意味着这些变量将与`Trigger`类的所有实例共享。本质上，它们是全局变量，但由于它们在实现文件的范围内声明，因此只能由`Trigger.m`文件中的代码访问。\n\
    \n`@implementation`部分声明了一个实例变量`_repeatsForever`，它将用于确定此特定触发器实例是否永远不会自行移除。"
  raw: 'Drag and drop a Color node from the Node Library View onto the TriggerOnce.ccb
    stage. On the Item Properties tab, set the position to 0, 0. Then change the Content
    size type for both width and height to the same width and height of the root node
    (128x128) so that the color node fills the layer’s entire area. Also, pick a color
    of your choice and set the opacity to 0.3—though the actual value doesn’t matter.
    You may want to come back later and change opacity and color to more appropriate
    values because this depends a lot on the graphics used, the number and size of
    trigger areas and, above all, personal preference.


    **Note**  You can also set the color node’s Content size type to % and width and
    height to 100 in order to fill the entire level. However, in the SpriteBuilder
    version at the time of this writing, this would create a 1x1 sized polygon collision
    shape when enabling physics. Hence, I refrained from doing so. Both ways are going
    to work equally well—after all, the size of the TriggerOnce.ccb layer and its
    color node doesn’t need to be changed.


    On the Item Physics tab for the color node, check Enable physics, change the type
    to Static, and as the Collision type enter **trigger**. This will allow you to
    handle collisions with triggers separately. Categories and Masks can be left empty—currently,
    there aren’t any other dynamic objects that might activate triggers besides the
    player.


    On the Item Code Connections tab for the color node, enter **Trigger** as the
    Custom class name. This will create an instance of the (soon to be added) Trigger
    class for every TriggerOnce.ccb added to the level.


    Since this particular trigger should trigger only once, switch to the Item Properties
    tab once more. At the bottom, click the Edit Custom Properties button and add
    a custom property named **triggerCount** of type Int with value 1\. This will
    make the trigger activate only once before removing itself. If you omit adding
    this property or set it to 0, it will create a Trigger instance that triggers
    every time the player enters it. Values greater than 1 will make the trigger activate
    the given number of times before removing itself from the level.


    **Tip**  Feel free to add another trigger CCB in the same way, name it TriggerForever.ccb,
    and omit the triggerCount parameter or set its value to 0\. I’m sure you will
    find a use for a repeatedly activatable trigger area eventually.


    Note that it’s also possible to create triggers with polygon shapes as opposed
    to purely rectangular shapes. However, a polygon shape will not be reflected visually
    in SpriteBuilder because the color node fills a rectangular area. You would have
    to use a sprite node with a corresponding trigger image if you wanted to visually
    display a polygon trigger area in SpriteBuilder.


    On the other hand, you can almost always model more complex trigger areas with
    multiple rectangular triggers. Trigger collision areas also rarely need to be
    very precise either. So it’s best to avoid using polygon-shaped triggers altogether
    and instead combine multiple rectangular trigger areas.


    Adding Triggers to the Level


    Before you add any triggers to Level1.ccb, you should first drag another plain
    Node from the Node Library View onto the CCPhysicsNode in the Level1.ccb Timeline.
    Then rename this node to **triggers**. This will be the container for all the
    trigger nodes.


    Now you can drag a TriggerOnce from the Tileless Editor View onto the triggers
    node in the Timeline. Change the trigger’s Name property on the Item Properties
    tab to **triggerSawRotation**. The name connects the trigger with nodes of the
    same name—the saw nodes you’ve added earlier also have *triggerSawRotation* as
    their name. The target nodes will receive a message when the player (or other
    nodes) cause the trigger to activate.


    Change the trigger’s position, and use the selection handles to resize (scale)
    the object to best match the desired size of the trigger area. Just make sure
    the player will be able to collide with it.


    You can also create copies of this new trigger if you want to form a more complex
    trigger shape. Multiple triggers can overlap without issues.


    Creating the Trigger Class


    If you were to build and run the Xcode project now, you would receive an error
    originating from CCBReader that states that the custom class Trigger cannot be
    found. You may want to try and run the project just to get acquainted with the
    error message, as you’ll probably encounter it from time to time.


    To fix this error, you’ll need to add a class of the same name as you’ve entered
    under the Item Code Connections tab in the Custom class field of the trigger’s
    color node. That class’ name is *Trigger*, in case this wasn’t obvious.


    In Xcode, select the Project Navigator tab. That’s the leftmost tab where the
    files, groups (yellow folder icons), and folders (blue folder icons) are shown
    in a hierarchical view not unlike Finder displays files and folders. Right-click
    the Source group and select New File. This will open the same dialog as in [Figure
    2-9](#part0011.html#Fig9). From the iOS Cocoa Touch section, select Objective-C
    class, and then click Next, which will show the dialog you see in [Figure 2-10](#part0011.html#Fig10).
    Enter **Trigger** in the Class field, and make it a Subclass of *CCNode* before
    clicking Next. You’ll end up with two new files in the Xcode project, named Trigger.h
    and Trigger.m.


    Again, try to run the project, and once more you’ll receive an error message regarding
    a missing property named triggerCount. The Trigger class is still missing this
    property or ivar.


    Let’s use a proper @property this time because you may possibly want to access
    or change this value at runtime from other classes. Open Trigger.h and add the
    @property like in [Listing 5-6](#part0014.html#list6), as well as the @protocol
    that defines the method that target nodes need to implement. Also, add the declaration
    of the triggerActivatedBy: method.


    [***Listing 5-6***](#part0014.html#_list6). Adding the triggerCount property to
    Trigger.h


    ```

    #import "CCNode.h"


    @protocol TriggerDelegate <NSObject>

    -(void) didTriggerWithNode:(CCNode*)activator;

    @end


    @interface Trigger : CCNode


    @property int triggerCount;


    -(void) triggerActivatedBy:(CCNode*)activator;


    @end

    ```


    This allows you to run the project without errors, although the trigger itself
    doesn’t work yet.


    Programming the Trigger Class


    The Trigger.m implementation will be a tad more complex, but it’s also a reusable
    class that you may want to use in your own projects. It collects all the trigger
    and target nodes upon loading. The Trigger class forwards the trigger collision
    event to all target nodes, updates the triggerCount and, if necessary, removes
    the trigger nodes when they are no longer needed.


    Initializing Trigger and Target Arrays


    Start by updating Trigger.m so that it resembles [Listing 5-7](#part0014.html#list7).


    [***Listing 5-7***](#part0014.html#_list7). Trigger implementation initializing
    trigger and target storage dictionaries


    ```

    #import "Trigger.h"


    static NSMutableDictionary* targetArrays;

    static NSMutableDictionary* triggerArrays;


    @implementation Trigger

    {

        BOOL _repeatsForever;

    }


    -(void) didLoadFromCCB

    {

        if (targetArrays == nil)

        {

            targetArrays = [NSMutableDictionary dictionary];

            triggerArrays = [NSMutableDictionary dictionary];

        }


    [targetArrays removeAllObjects];

        [triggerArrays removeAllObjects];


    _repeatsForever = (_triggerCount <= 0);

    }


    @end

    ```


    At first, two static NSMutableDictionary variables are declared. The keyword static
    means these variables will be shared with all instances of the Trigger class.
    Essentially, they are global variables, but because they are declared in the scope
    of the implementation file they are accessible only to code in the Trigger.m file.


    The @implementation section declares an ivar _repeatsForever, which will be used
    to determine whether this particular trigger instance will never remove itself.'
