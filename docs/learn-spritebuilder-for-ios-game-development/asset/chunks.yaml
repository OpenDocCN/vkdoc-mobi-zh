- fmt: '### Audio Quality

    - **Audio quality**: This affects the size and quality of published audio files.
    The effect on app size varies depending on the audio files. Quality level 1 creates
    the smallest files but also low-quality audio.


    ### Screen Mode

    - The **Screen mode** setting if changed to `Fixed` disables `SpriteBuilder`''s
    scaling to adapt `CCBs` to the device resolution. It’s main use case is when your
    game is iPhone-only and you want to treat the 3.5-inch and 4-inch iPhones as essentially
    the same devices, with the widescreen iPhones being slightly (88 points) wider.
    In that case, it may be a little easier to use fixed mode, but it’s generally
    not recommended because it makes screen layouts more difficult.


    ### Orientation

    - Last, the **Orientation** setting should be self-explanatory. Change it when
    your game is supposed to run in portrait mode. The book’s project uses landscape
    orientation.


    ## Adding Additional Background Layers


    Back to parallaxing layers. You obviously need more than one layer to get the
    desired depth effect. Moreover, it’s not a good idea to compose each parallax
    layer out of a single image like the Cerberus sprite. The closer a layer appears
    to the viewer, the larger its size needs to be. It would be wasteful for texture
    memory usage, and there comes a point where textures simply won’t work anymore:
    a texture can be at most 4096x4096 pixels. This is a hardware limitation.


    Instead, you should compose such large layers out of multiple individual nodes,
    sprites mostly. In order to scroll multiple sprites at once, you need to add them
    to the same layer, where “layer” refers to a regular node acting as a container
    for these sprites.


    **Note** If you’ve used `Cocos2D` before, you may be thinking “`CCLayer`” whenever
    I say “layer.” But there is no special `Layer` node anymore. The `CCLayer` class
    itself was never more than just a plain `CCNode` with the added capability of
    handling user input. Now the user input functionality is in the `CCResponder`
    class, which all node classes inherit, including `CCNode`. That means you simply
    use a `CCNode` whenever you used to use a `CCLayer`.


    Drag and drop three additional `Node` instances from the Node Library onto the
    stage. You may want to rename these nodes in the Timeline View (double-click a
    node to edit its name) like in [Figure 3-10](#part0012.html#Fig10).


    ![9781484202630_Fig03-10.jpg](images/00049.jpeg)


    [Figure 3-10](#part0012.html#_Fig10). The initial layer nodes in `Background1.ccb`


    Now select each of these three nodes, and make sure their position is set to `0,
    0`. Since the goal is to derive the parallax scrolling factor based on each parallax
    layer’s size, change each node’s “Content size” property to a value that’s greater
    than or equal to `568x384` but smaller than or equal to the level’s size (`4000x500`
    points). Each node’s “Content size” should be larger than the one above it in
    the Timeline. If that was too confusing, just copy the content size values in
    [Figure 3-10](#part0012.html#Fig10), where I set the layer sizes to `1000x415`,
    `2000x450`, and `3000x480`, respectively.


    **Tip** You could also create a `CCB` file of type `Node` and use those as parallax
    layers. I added them to the same `CCB` because it’s mainly static content that
    is not being re-used for other backgrounds, and it makes it easier to see each
    layer’s relative size.


    When you select each layer node, its selection rectangle will show you the size
    of the background layer. Nodes added to a layer must be within this area to be
    seen in the game. However, the selection rectangle goes away as soon as you select
    another node. To permanently see the layer’s size visually while adding nodes
    to it, you should drag and drop a color node onto each layer node in the Timeline.
    Each color node should be a child of one layer node. If, after dropping, the color
    node didn’t become a layer’s child, simply drag it in the Timeline View and drop
    it onto a layer node. The result should look like that shown in [Figure 3-10](#part0012.html#Fig10).


    Perform the following steps for each color node in sequence:


    1.  Set the Content size type to `% .. in percent of parent container` for both
    width and height.

    2.  Set the Content size width and height to `100%` to expand the color node to
    its parent layer’s size.

    3.  Set the color node’s Opacity property to a low value like `0.1` to better
    see the nodes of other layers behind it.

    4.  Change the color property to a color of your choice.


    [Figure 3-11](#part0012.html#Fig11) shows the Item Properties of one color node;
    its properties are representative of all three color nodes.


    ![9781484202630_Fig03-11.jpg](images/00050.jpeg)


    [Figure 3-11](#part0012.html#_Fig11). Properties of color nodes visually highlighting
    each layer’s size


    When you’ve made these changes to all three color node instances, the result will
    look like a multicolored, multilayered image like in [Figure 3-12](#part0012.html#Fig12).


    ![9781484202630_Fig03-12.jpg](images/00051.jpeg)


    [Figure 3-12](#part0012.html#_Fig12). Background layers highlighted with color
    nodes


    The color nodes will be a permanent visual size indicator for each layer. By unchecking
    their Visible check box (see [Figure 3-11](#part0012.html#Fig11)), you can later
    hide these helper nodes in both `SpriteBuilder` and in the app. You can leave
    these color nodes in the `CCB` because their memory consumption is negligible,
    and invisible nodes don’t impact rendering performance either.


    ## Adding SpriteSheets for Background Graphics


    At this point, you should add the background images provided with the book. You
    can also add your own background images. The process is similar, but I’ll use
    the book’s graphics as an example.


    In the book’s downloadable archive, inside the `Graphics` folder, you’ll find
    PNG image files whose names begin with `level1_` inside correspondingly named
    folders `Level1a` and `Level1b`. Drag and drop these folders onto the `SpriteSheets`
    folder to add the images they contain to the project.


    Then change both `Level1a` and `Level1b` folders to a `SpriteSheet` by right-clicking
    one after the other and selecting *Make Smart SpriteSheet* from the context menu.
    The folder will turn pink with a smiling icon, just like the `Global SpriteSheet`.
    Select each `SpriteSheet` folder, change the export format to `PVR RGBA8888`,
    and select the `Compress` check box for iOS like in [Figure 2-25](#part0011.html#Fig25)
    in [Chapter 2](#part0011.html). Doing this saves memory, improves performance,
    and costs nothing.


    **Caution** At the time of this writing, `SpriteSheets` must not contain subfolders.


    After you make these changes and publish the project, you should end up with a
    File View and preview as shown in [Figure 3-13](#part0012.html#Fig13).


    ![9781484202630_Fig03-13.jpg](images/00052.jpeg)


    [Figure 3-13](#part0012.html#_Fig13). `SpriteSheets` with `Level1` graphics


    **Note** The reason why there are two `SpriteSheets` is because the images are
    too large to fit in a single `SpriteSheet`. A `SpriteSheet`’s dimensions for `tablethd`
    scaled images must not exceed the texture size limit of `4096x4096` pixels.


    ## Designing the Background Layers


    You can now add these images as sprites to the layers in `Background1.ccb`. You
    can just drag the images from the `SpriteSheets` or from the Tileless Editor View
    onto the stage.


    **Tip** I recommend placing a copy of each image in the desired layer first, optionally
    renaming them in the Timeline, and editing any shared properties such as Opacity
    or Scale. Then you can select one of these template sprites and use copy and paste
    to add more sprites of the same type using the same name. The advantage of this
    workflow is that copies of a node automatically share the same parent; they will
    be siblings. That spares you the trouble of accidentally adding images to the
    root node or the wrong layer. Plus, they’re easily identifiable because each copy
    takes over the source sprite’s name.'
