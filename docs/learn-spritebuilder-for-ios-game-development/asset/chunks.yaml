- fmt: "> **Note** – If the *Project settings* dialog doesn't show the Android settings,\
    \ it means the SpriteBuilder Android plugins haven't been installed or failed\
    \ to function correctly. You may want to try re-installing the SpriteBuilder Android\
    \ plugins and check the “Troubleshooting” section at [http://android.spritebuilder.com](http://android.spritebuilder.com).\n\
    \nClose the settings dialog and then publish the project (*File* → *Publish*).\
    \ Wait for publishing to finish. It shouldn't take more than a couple seconds.\n\
    \nNext, you’ll want to quit Xcode (*Xcode* → *Quit Xcode*) if it’s still running.\
    \ This is just in case SpriteBuilder has installed or updated the Android plugins\
    \ for Xcode. You want to be sure Xcode has recognized the plugins and loaded the\
    \ latest versions, which it will only do upon launch.\n\nUsing Finder, locate\
    \ the `HelloAndroid.spritebuilder` folder and open it. There’s a `HelloAndroid.xcodeproj`\
    \ inside, which you should double-click to open the HelloAndroid project in Xcode.\n\
    \n### Selecting Scheme and Target Platform\n\nBefore you can build and run the\
    \ project, you’ll have to select a scheme and platform. New SpriteBuilder projects\
    \ typically default to build the iOS scheme with an iOS device as the deployment\
    \ target, as seen in [Figure 13-10](#part0024.html#Fig10).\n\n![9781484202630_Fig13-10.jpg](images/00199.jpeg)\n\
    \n[Figure 13-10](#part0024.html#_Fig10). The initially selected scheme and platform\
    \ default to building the iOS version of the app\n\nBy clicking on a scheme—in\
    \ this case, it’s *HelloSpriteBuilder*—you bring up the scheme selection list\
    \ shown in [Figure 13-11](#part0024.html#Fig11). When you move over one of the\
    \ scheme items, a submenu pops up that allows you to choose the deployment target.\
    \ This is how you select what targets will be compiled and which device the resulting\
    \ app will be built for and, if possible, deployed to.\n\n![9781484202630_Fig13-11.jpg](images/00200.jpeg)\n\
    \n[Figure 13-11](#part0024.html#_Fig11). Scheme and platform selection menu; you\
    \ should select the HelloSpriteBuilder Android scheme\n\nYou should highlight\
    \ the *HelloSpriteBuilder Android* scheme, and in the submenu select the Android\
    \ device as shown in [Figure 13-11](#part0024.html#Fig11). The device will have\
    \ the Android icon next to it.\n\n> **Tip** – If there’s no Android device listed,\
    \ make sure the Android device is connected directly to one of your Mac’s USB\
    \ ports using the USB cable that came with the device. Using USB hubs, the USB\
    \ ports on your keyboard (also a hub) or third-party USB cables may prevent the\
    \ device from being recognized. You should also try using a different USB port.\
    \ The device must also have USB debugging enabled as explained earlier. It does\
    \ **not** need to have a SIM or SD card installed, you **don’t** have to be signed\
    \ in to a Google or other account on the device, and you do **not** need to install\
    \ additional drivers. Sometimes resolving connectivity issues is as simple as\
    \ unplugging the device and plugging it back in. If that doesn’t help, try rebooting\
    \ your Mac and turn the device off and on again. Note that you will have to restart\
    \ Xcode for it to recognize new devices.\n\nThe long list of schemes and platforms\
    \ can be confusing. Note that if you want to build the project for a different\
    \ platform, you have to select the corresponding app scheme. App schemes have\
    \ an icon with a pencil and paintbrush drawn over a ruler, forming the letter\
    \ *A*. The other schemes are libraries and scripts needed by the project which,\
    \ when selected and run, will most likely compile but won’t produce runnable or\
    \ deployable output.\n\n### Build, Run, Transfer, Launch\n\nWith *HelloSpriteBuilder\
    \ Android* set as the scheme, and the Android device selected as the target platform\
    \ as shown in [Figure 13-12](#part0024.html#Fig12), you can now hit the run button\
    \ (*Product* → *Run*).\n\n![9781484202630_Fig13-12.jpg](images/00201.jpeg)\n\n\
    [Figure 13-12](#part0024.html#_Fig12). HelloSpriteBuilder Android scheme is selected\
    \ as the build target\n\nThe project will build, and it may point out quite a\
    \ large number of warnings as in [Figure 13-13](#part0024.html#Fig13). You needn’t\
    \ worry about them, except for those that appear under *HelloSpriteBuilder Android*\
    \ and the *HelloSpriteBuilder* project. Even those are harmless in a new project,\
    \ but once you do have custom code in your project you should take care of any\
    \ warnings triggered by code that you’ve written.\n\n![9781484202630_Fig13-13.jpg](images/00202.jpeg)\n\
    \n[Figure 13-13](#part0024.html#_Fig13). Lots of warnings, but nothing to worry\
    \ about. Carry on\n\n> **Tip** – Some developers like to enable the *Build Settings*\
    \ flag *Treat all Warnings as Errors* to help discipline themselves so that they\
    \ are forced to learn, understand, and fix whatever warning pops up in their own\
    \ code. This is certainly a step in the right direction toward writing warning-free\
    \ code. It does get in the way when you want to do things quickly, but if you\
    \ keep doing things quickly, ignoring all warnings, this is a slippery slope to\
    \ doing things sloppy. Warnings are there for a reason—don’t just ignore them\
    \ if you don’t understand their meaning.\n\nIf all goes according to plan, after\
    \ successfully compiling the code (albeit with warnings) the transfer process\
    \ will start. After a couple seconds, the Xcode Console (*View* → *Debug Area*\
    \ → *Activate Console*) will log success:\n\n```\nPreparing to run org.cocos2d.HelloSpriteBuilder\
    \ on device cd25acab\n4516 KB/s (17771319 bytes in 3.842s)\n    pkg: /data/local/tmp/HelloSpriteBuilderAndroid-debug.apk\n\
    Success\n```\n\n> **Tip** – If you get aborted transfers or a dialog saying that\
    \ “transfer quit unexpectedly,” you should open *Xcode Preferences* and switch\
    \ to the *Apportable* tab to uncheck the *Enable MTP transfers* check box. If\
    \ you receive a message indicating “no provisioned Android devices connected,”\
    \ know that the error is misleading. It’s trying to tell you that there’s simply\
    \ no Android device with USB debugging enabled connected and that Xcode couldn’t\
    \ find one. There’s no provisioning necessary for Android development. If restarting\
    \ Xcode doesn’t fix it, follow the connectivity troubleshooting tips just before\
    \ [Figure 13-11](#part0024.html#Fig11).\n\nIf transfer was successful, the app\
    \ will begin launching. You’ll see a lot of things logged to the console. You\
    \ can safely ignore everything in the log up until the point where Cocos2D begins\
    \ to initialize. This will be indicated by the line that prints the Cocos2D project\
    \ name and version number, such as:\n\n```\nD/HelloSpriteBuilder(28956): cocos2d:\
    \ Cocos2D-Swift version 3.3.0-develop\n```\n\nFollowing that will be some system\
    \ and OpenGL specifications. From this point onward, the log will contain almost\
    \ exactly the same text as you’ll see when you launch the app on an iOS device\
    \ or the iOS Simulator. There’s only one line I like to point out that’s Android\
    \ specific:\n\n```\nI/Choreographer(28956): Skipped 159 frames!\n            \
    \            The application may be doing too much work on its main thread.\n\
    ```\n\nIt’s quite normal for an app to skip one or two hundred frames or so when\
    \ launching. Though it’s the same as on iOS: if an app takes too long to launch,\
    \ it may be terminated by the OS. On iOS “too long” is defined as 10 seconds.\
    \ And 180 frames equals 3 seconds.\n\n> **Tip** – If, while developing, you notice\
    \ that the number of skipped frames continues to go up and over 300 frames, you\
    \ should consider launching with an empty scene before you transition from that\
    \ initial scene to the previous launch scene. You should design that empty scene\
    \ as your loading scene or splash screen, where you preload any assets—specifically\
    \ textures (take relatively long to load) and preferably asynchronously (so as\
    \ to not block the main thread)."
  raw: '**Note**  If the *Project settings* dialog doesn’t show the Android settings,
    it means the SpriteBuilder Android plugins haven’t been installed or failed to
    function correctly. You may want to try re-installing the SpriteBuilder Android
    plugins and check the “Troubleshooting” section at [http://android.spritebuilder.com](http://android.spritebuilder.com).


    Close the settings dialog and then publish the project (*File* ![image](images/00008.jpeg)
    *Publish*). Wait for publishing to finish. It shouldn’t take more than a couple
    seconds.


    Next, you’ll want to quit Xcode (*Xcode* ![image](images/00008.jpeg) *Quit Xcode*)
    if it’s still running. This is just in case SpriteBuilder has installed or updated
    the Android plugins for Xcode. You want to be sure Xcode has recognized the plugins
    and loaded the latest versions, which it will only do upon launch.


    Using Finder, locate the *HelloAndroid.spritebuilder* folder and open it. There’s
    a *HelloAndroid.xcodeproj* inside, which you should double-click to open the HelloAndroid
    project in Xcode.


    Selecting Scheme and Target Platform


    Before you can build and run the project, you’ll have to select a scheme and platform.
    New SpriteBuilder projects typically default to build the iOS scheme with an iOS
    device as the deployment target, as seen in [Figure 13-10](#part0024.html#Fig10).


    ![9781484202630_Fig13-10.jpg](images/00199.jpeg)


    [Figure 13-10](#part0024.html#_Fig10). The initially selected scheme and platform
    default to building the iOS version of the app


    By clicking on a scheme—in this case, it’s *HelloSpriteBuilder*—you bring up the
    scheme selection list shown in [Figure 13-11](#part0024.html#Fig11). When you
    move over one of the scheme items, a submenu pops up that allows you to choose
    the deployment target. This is how you select what targets will be compiled and
    which device the resulting app will be built for and, if possible, deployed to.


    ![9781484202630_Fig13-11.jpg](images/00200.jpeg)


    [Figure 13-11](#part0024.html#_Fig11). Scheme and platform selection menu; you
    should select the HelloSpriteBuilder Android scheme


    You should highlight the *HelloSpriteBuilder Android* scheme, and in the submenu
    select the Android device as shown in [Figure 13-11](#part0024.html#Fig11). The
    device will have the Android icon next to it.


    **Tip**  If there’s no Android device listed, make sure the Android device is
    connected directly to one of your Mac’s USB ports using the USB cable that came
    with the device. Using USB hubs, the USB ports on your keyboard (also a hub) or
    third-party USB cables may prevent the device from being recognized. You should
    also try using a different USB port. The device must also have USB debugging enabled
    as explained earlier. It does **not** need to have a SIM or SD card installed,
    you **don’t** have to be signed in to a Google or other account on the device,
    and you do **not** need to install additional drivers. Sometimes resolving connectivity
    issues is as simple as unplugging the device and plugging it back in. If that
    doesn’t help, try rebooting your Mac and turn the device off and on again. Note
    that you will have to restart Xcode for it to recognize new devices.


    The long list of schemes and platforms can be confusing. Note that if you want
    to build the project for a different platform, you have to select the corresponding
    app scheme. App schemes have an icon with a pencil and paintbrush drawn over a
    ruler, forming the letter *A*. The other schemes are libraries and scripts needed
    by the project which, when selected and run, will most likely compile but won’t
    produce runnable or deployable output.


    Build, Run, Transfer, Launch


    With *HelloSpriteBuilder Android* set as the scheme, and the Android device selected
    as the target platform as shown in [Figure 13-12](#part0024.html#Fig12), you can
    now hit the run button (*Product* ![image](images/00008.jpeg) *Run*).


    ![9781484202630_Fig13-12.jpg](images/00201.jpeg)


    [Figure 13-12](#part0024.html#_Fig12). HelloSpriteBuilder Android scheme is selected
    as the build target


    The project will build, and it may point out quite a large number of warnings
    as in [Figure 13-13](#part0024.html#Fig13). You needn’t worry about them, except
    for those that appear under *HelloSpriteBuilder Android* and the *HelloSpriteBuilder*
    project. Even those are harmless in a new project, but once you do have custom
    code in your project you should take care of any warnings triggered by code that
    you’ve written.


    ![9781484202630_Fig13-13.jpg](images/00202.jpeg)


    [Figure 13-13](#part0024.html#_Fig13). Lots of warnings, but nothing to worry
    about. Carry on


    **Tip**  Some developers like to enable the *Build Settings* flag *Treat all Warnings
    as Errors* to help discipline themselves so that they are forced to learn, understand,
    and fix whatever warning pops up in their own code. This is certainly a step in
    the right direction toward writing warning-free code. It does get in the way when
    you want to do things quickly, but if you keep doing things quickly, ignoring
    all warnings, this is a slippery slope to doing things sloppy. Warnings are there
    for a reason—don’t just ignore them if you don’t understand their meaning.


    If all goes according to plan, after successfully compiling the code (albeit with
    warnings) the transfer process will start. After a couple seconds, the Xcode Console
    (*View* ![image](images/00008.jpeg) *Debug Area* ![image](images/00008.jpeg) *Activate
    Console*) will log success:


    ```

    Preparing to run org.cocos2d.HelloSpriteBuilder on device cd25acab

    4516 KB/s (17771319 bytes in 3.842s)

        pkg: /data/local/tmp/HelloSpriteBuilderAndroid-debug.apk

    Success

    ```


    **Tip**  If you get aborted transfers or a dialog saying that “transfer quit unexpectedly,”
    you should open *Xcode Preferences* and switch to the *Apportable* tab to uncheck
    the *Enable MTP transfers* check box. If you receive a message indicating “no
    provisioned Android devices connected,” know that the error is misleading. It’s
    trying to tell you that there’s simply no Android device with USB debugging enabled
    connected and that Xcode couldn’t find one. There’s no provisioning necessary
    for Android development. If restarting Xcode doesn’t fix it, follow the connectivity
    troubleshooting tips just before [Figure 13-11](#part0024.html#Fig11).


    If transfer was successful, the app will begin launching. You’ll see a lot of
    things logged to the console. You can safely ignore everything in the log up until
    the point where Cocos2D begins to initialize. This will be indicated by the line
    that prints the Cocos2D project name and version number, such as:


    ```

    D/HelloSpriteBuilder(28956): cocos2d: Cocos2D-Swift version 3.3.0-develop

    ```


    Following that will be some system and OpenGL specifications. From this point
    onward, the log will contain almost exactly the same text as you’ll see when you
    launch the app on an iOS device or the iOS Simulator. There’s only one line I
    like to point out that’s Android specific:


    ```

    I/Choreographer(28956): Skipped 159 frames!

                            The application may be doing too much work on its main
    thread.

    ```


    It’s quite normal for an app to skip one or two hundred frames or so when launching.
    Though it’s the same as on iOS: if an app takes too long to launch, it may be
    terminated by the OS. On iOS “too long” is defined as 10 seconds. And 180 frames
    equals 3 seconds.


    **Tip**  If, while developing, you notice that the number of skipped frames continues
    to go up and over 300 frames, you should consider launching with an empty scene
    before you transition from that initial scene to the previous launch scene. You
    should design that empty scene as your loading scene or splash screen, where you
    preload any assets—specifically textures (take relatively long to load) and preferably
    asynchronously (so as to not block the main thread).'
  trans: "\n> **注意** – 如果*项目设置*对话框中没有显示 Android 设置，说明 SpriteBuilder Android 插件未安装或未能正常运行。建议您尝试重新安装\
    \ SpriteBuilder Android 插件，并查阅 [`android.spritebuilder.com`](http://android.spritebuilder.com)\
    \ 上的“故障排除”章节。\n\n关闭设置对话框，然后发布项目（*文件* → *发布*）。等待发布完成，这个过程通常只需几秒钟。\n\n接下来，如果 Xcode\
    \ 仍在运行，请退出 Xcode（*Xcode* → *退出 Xcode*）。这是为了防止 SpriteBuilder 为 Xcode 安装或更新了 Android\
    \ 插件。您需要确保 Xcode 已识别这些插件并加载了最新版本，而 Xcode 只有在重新启动时才会执行此操作。\n\n使用 Finder 找到 `HelloAndroid.spritebuilder`\
    \ 文件夹并打开它。其中有一个 `HelloAndroid.xcodeproj`，双击它即可在 Xcode 中打开 HelloAndroid 项目。\n\n\
    ### 选择 Scheme 和目标平台\n\n在构建和运行项目之前，您需要选择一个 scheme 和平台。新建的 SpriteBuilder 项目通常默认构建\
    \ iOS scheme，并将 iOS 设备设为部署目标，如图 13-10 所示。\n\n![9781484202630_Fig13-10.jpg](img/00199.jpeg)\n\
    \n图 13-10。初始选择的 scheme 和平台默认会构建应用的 iOS 版本\n\n点击 scheme（此处为 *HelloSpriteBuilder*），会弹出如图\
    \ 13-11 所示的 scheme 选择列表。将鼠标悬停在某个 scheme 项上时，会弹出一个子菜单，允许您选择部署目标。通过此操作，您可以指定要编译的目标、构建的应用所针对的设备，以及（在条件允许时）部署到的设备。\n\
    \n![9781484202630_Fig13-11.jpg](img/00200.jpeg)\n\n图 13-11。Scheme 和平台选择菜单；您应选择\
    \ HelloSpriteBuilder Android scheme\n\n您应高亮选择 *HelloSpriteBuilder Android* scheme，并在子菜单中选择\
    \ Android 设备，如图 13-11 所示。该设备旁边会显示 Android 图标。\n\n> **提示** – 如果列表中没有显示 Android\
    \ 设备，请确保 Android 设备已通过其附带的 USB 线缆直接连接到 Mac 的某个 USB 端口。使用 USB 集线器、键盘上的 USB 端口（也是集线器）或第三方\
    \ USB 线缆可能会导致设备无法被识别。您还应尝试使用不同的 USB 端口。此外，设备必须先按照前文所述开启 USB 调试功能。设备**无需**安装 SIM\
    \ 卡或 SD 卡，您**不必**在设备上登录 Google 或其他账户，也**无需**安装额外驱动程序。有时，只需拔下设备再重新插上即可解决连接问题。如果这不起作用，请尝试重启\
    \ Mac 并重新开关设备。请注意，您必须重启 Xcode 才能识别新设备。\n\n大量的 scheme 和平台列表可能会令人困惑。请注意，如果您要为不同平台构建项目，必须选择对应的应用\
    \ scheme。应用 scheme 的图标上，一把铅笔和画笔绘制在直尺之上，构成字母 *A* 的形状。其他 scheme 是项目所需的库和脚本，如果选中并运行它们，大多可以编译，但不会生成可运行或可部署的输出。\n\
    \n### 构建、运行、传输、启动\n\n如图 13-12 所示，将 *HelloSpriteBuilder Android* 设为 scheme，并选择\
    \ Android 设备作为目标平台后，您就可以点击运行按钮（*产品* → *运行*）。\n\n![9781484202630_Fig13-12.jpg](img/00201.jpeg)\n\
    \n图 13-12。HelloSpriteBuilder Android scheme 被选为构建目标\n\n项目将开始构建，并且可能会在如图 13-13\
    \ 所示的位置显示大量警告。除了出现在 *HelloSpriteBuilder Android* 和 *HelloSpriteBuilder* 项目下的警告外，您无需担心其他警告。即使是这些警告，在新项目中也是无害的，但一旦您在项目中添加了自定义代码，就需要处理由您编写的代码触发的任何警告。\n\
    \n![9781484202630_Fig13-13.jpg](img/00202.jpeg)\n\n图 13-13。大量警告，但无需担心，继续操作即可\n\
    \n> **提示** – 有些开发者喜欢启用*构建设置*中的*将所有警告视为错误*标志，以此自律，迫使自己学习、理解并修复自己代码中出现的任何警告。这无疑是朝着编写无警告代码迈出的正确一步。当然，在您想快速完成操作时，这可能会带来不便；但如果您总是快速操作而忽略所有警告，就会很容易滑向草率行事。警告的存在是有原因的——如果您不理解其含义，请不要忽视它们。\n\
    \n如果一切顺利，在成功编译代码后（尽管有警告），传输过程就会开始。几秒钟后，Xcode 控制台（*视图* → *调试区域* → *激活控制台*）会记录成功信息：\n\
    \n```\nPreparing to run org.cocos2d.HelloSpriteBuilder on device cd25acab\n4516\
    \ KB/s (17771319 bytes in 3.842s)\n    pkg: /data/local/tmp/HelloSpriteBuilderAndroid-debug.apk\n\
    Success\n```\n\n> **提示** – 如果传输中断或出现提示“传输意外退出”的对话框，请打开*Xcode 偏好设置*，切换到*Apportable*\
    \ 标签页，取消选中*启用 MTP 传输*复选框。如果您收到提示“未连接已配置的 Android 设备”，请注意该错误信息具有误导性。它实际上是在告诉您，没有连接已开启\
    \ USB 调试的 Android 设备，Xcode 无法找到。Android 开发不需要任何配置。如果重启 Xcode 无法解决问题，请遵循 图 13-11\
    \ 之前提到的连接故障排除建议。\n\n如果传输成功，应用将开始启动。您会在控制台中看到大量日志信息。在 Cocos2D 开始初始化之前，您可以安全地忽略日志中的所有内容。初始化开始的标志是打印\
    \ Cocos2D 项目名称和版本号的行，例如：\n\n```\nD/HelloSpriteBuilder(28956): cocos2d: Cocos2D-Swift\
    \ version 3.3.0-develop\n```\n\n随后会显示一些系统和 OpenGL 规范信息。从这一刻起，日志内容将与您在 iOS 设备或\
    \ iOS 模拟器上启动应用时看到的内容几乎完全相同。不过，我想特别指出一行与 Android 相关的日志：\n\n```\nI/Choreographer(28956):\
    \ Skipped 159 frames!\n                        The application may be doing too\
    \ much work on its main thread.\n```\n\n应用在启动时跳过一两百帧是相当正常的现象。不过，这和在 iOS 上一样：如果应用启动时间过长，可能会被操作系统终止。在\
    \ iOS 上，“过长”的定义是 10 秒。而 180 帧相当于 3 秒。\n\n> **提示** – 如果在开发过程中，您注意到跳过的帧数持续增加并超过\
    \ 300 帧，您应考虑先启动一个空白场景，然后再从该初始场景过渡到之前的启动场景。您可以将这个空白场景设计为加载场景或启动画面，在此场景中预加载所有资源——尤其是纹理（加载时间相对较长），并且最好采用异步方式（以免阻塞主线程）。\n"
- fmt: "至此，您应该看到 Android 设备的屏幕首先变黑，直到开始显示 `MainScene.ccb` 的内容。想证明这真的有效吗？请看 [图 13-14](#part0024.html#Fig14)。\n\
    \n![9781484202630_Fig13-14.jpg](images/00203.jpeg)\n\n[Figure 13-14](#part0024.html#_Fig14)。哇！用\
    \ Objective-C 编写的 SpriteBuilder 应用竟然可以在 Android 设备上运行——就是这么简单！\n\n## 故障排除\n\n\
    如果您在此简单测试、Android 设备设置、设备连接、让 Xcode 列出设备、传输等工作时遇到任何问题，您应该搜索相关问题，如有必要，可以在 SpriteBuilder\
    \ 论坛的“Android”板块提问：[http://forum.spritebuilder.com/category/android](http://forum.spritebuilder.com/category/android)。\n\
    \n在提问之前，请考虑执行以下操作：\n\n- **保持耐心**。传输和启动 Android 应用时，日志可能会长时间没有更新，看似卡住。完整的 Bouncy\
    \ Beast 项目大约需要 90 秒传输，大部分时间没有任何日志活动。启动时，还可能再有 10 到 30 秒无响应。这是正常的，每次都会发生——与 iOS\
    \ 不同，这里没有增量传输来加速连续传输。\n- **确保您已遵循本章前面描述的 Android 设备设置和连接步骤**。请验证您没有启用或禁用任何未明确提及的开发设置。\n\
    - **确保 HelloSpriteBuilder iOS 项目能在 iOS 设备或模拟器上正常运行**，这样您就知道问题特定于为 Android 构建。\n\
    - **尝试在 Xcode 中执行 *Product* ![image](images/00008.jpeg) *Clean Build Folder*（按住\
    \ Option 键）**。同时，从设备上删除（卸载）任何先前部署的应用版本。然后重启 Xcode。再尝试运行一次。有时这可以修复“非常奇怪”的问题。\n\
    - **确保已阅读 SpriteBuilder Android 文档**，特别是“故障排除”和“已知问题”章节：[http://android.spritebuilder.com](http://android.spritebuilder.com)。\n\
    \n如果您无法解决问题，请在 SpriteBuilder 论坛提问。提问时，请详细描述您尝试过什么、观察到了什么、您正在测试的设备（型号、Android 版本）以及您使用的\
    \ SpriteBuilder 和 Xcode 版本。\n\n**注意** 我分别在 Xcode 5.1 和 Xcode 6.0 上成功测试了 Android\
    \ 部署。我在 OS X 10.9 Mavericks 上进行了测试。如果您仍在使用 Xcode 5.0 或更早版本并遇到问题，您应考虑升级 Xcode。不过，OS\
    \ X 版本应该没有影响。\n\n如果您使用的是 Xcode、iOS 或 OS X 的测试版，您应该考虑到某些问题可能恰恰是因为您使用了测试版软件而发生的。测试版软件可能会引入与第三方软件（如\
    \ Cocos2D、SpriteBuilder 或 Apportable 的 BridgeKit）的兼容性问题。\n\n# SpriteBuilder 应用的结构\n\
    \n如果您检查 HelloSpriteBuilder Xcode 项目中的文件，您会注意到一些奇怪的新增内容，特别是如果您过去使用 SpriteBuilder\
    \ v1.2 或更早版本创建的项目。[图 13-15](#part0024.html#Fig15) 显示了一些特定于 Android 文件的源码树。\n\n\
    ![9781484202630_Fig13-15.jpg](images/00204.jpeg)\n\n[Figure 13-15](#part0024.html#_Fig15)。SpriteBuilder\
    \ v1.3 项目包含了一些特定于 Android 的文件\n\n首先，有一个 *Platforms* 组，其中包含特定于每个平台的 iOS、Android\
    \ 和 Mac 组。*Source/Platforms/Android* 组包含 *HelloSpriteBuilderActivity.java* 文件。该文件的内容重新打印在\
    \ [清单 13-1](#part0024.html#list1) 中。\n\n[***Listing 13-1***](#part0024.html#_list1)。HelloSpriteBuilderActivity.java\
    \ 文件\n\n```java\npackage org.cocos2d.HelloSpriteBuilder;\n\nimport org.cocos2d.CCActivity;\n\
    \npublic class HelloSpriteBuilderActivity extends CCActivity {\n\n}\n```\n\n`HelloSpriteBuilderActivity.java`\
    \ 简单地创建了一个新类，该类扩展了 Cocos2D 提供的 `CCActivity` 类。这与同名的 Objective-C 类 `HelloSpriteBuilderActivity`\
    \ 保持一致，其接口显示在 [清单 13-2](#part0024.html#list2) 中。\n\n[***Listing 13-2***](#part0024.html#_list2)。HelloSpriteBuilderActivity.h\n\
    \n```objectivec\n#import \"CCActivity.h\"\n\nBRIDGE_CLASS(\"org.cocos2d.HelloSpriteBuilder.HelloSpriteBuilderActivity\"\
    )\n@interface HelloSpriteBuilderActivity : CCActivity\n\n@end\n```\n\n特殊的宏 `BRIDGE_CLASS`\
    \ 引用了上述的 Java 类 `HelloSpriteBuilderActivity`，本质上是连接了两者。还有一个用于 Java 接口/Objective-C\
    \ 协议（名为 `BRIDGE_INTERFACE`）的类似物。只有当您打算使用 BridgeKit 中未提供的功能时，才需要桥接 Java 到 Objective-C。否则，请优先使用\
    \ BridgeKit 已经暴露的功能，因为您可以纯粹使用 Objective-C 代码与其交互。\n\n`HelloSpriteBuilderActivity`\
    \ 的实现只做两件事：启动第一个场景并响应返回键，告诉应用结束。代码重新打印在 [清单 13-3](#part0024.html#list3) 中。\n\n\
    [***Listing 13-3***](#part0024.html#_list3)。HelloSpriteBuilderActivity.m\n\n```objectivec\n\
    #import \"HelloSpriteBuilderActivity.h\"\n\n@implementation HelloSpriteBuilderActivity\n\
    \n-(CCScene*)startScene\n{\n    return [CCBReader loadAsScene:@\"MainScene\"];\n\
    }\n\n-(BOOL)onKeyUp:(int32_t)keyCode keyEvent:(AndroidKeyEvent*)event\n{\n   \
    \ if (keyCode == AndroidKeyEventKeycodeBack)\n    {\n        [self finish];\n\
    \    }\n    return NO;\n}\n\n@end\n```\n\n这里的关键点是 Android 应用完全忽略 `AppDelegate`\
    \ 类。如果您在 `AppDelegate` 的 `startScene` 方法中更改了启动场景，您也必须更改 `Activity` 类中的 `startScene`\
    \ 方法。此外，您在 `AppDelegate` 文件中编写的任何自定义代码都不会包含在 Android 构建中。同样，`Activity` 类中的任何代码也不会在\
    \ iOS 构建中运行。\n\n**提示** 您通常应该创建一个包含通用代码和数据的类，供 `AppDelegate` 和 `Activity` 类共同使用。最简单的例子是声明一个静态的\
    \ `NSString* FirstSceneToLaunch = @\"MainScene\"`；初始化为要启动的第一个场景的名称。然后，您可以在 `AppDelegate`\
    \ 和 `Activity` 类中导入该头文件，并在两个文件中使用 `FirstSceneToLaunch` 标识符。这样，您只需在一个地方编辑，而不必冒着\
    \ `AppDelegate` 和 `Activity` 执行完全不同的操作的风险。\n\n在 *Resources/Platforms/Android*\
    \ 组中，您会找到 *AndroidManifest.xml*。它包含各种构建参数以及与 iOS 上的 *Info.plist* 类似的设置。您可能需要编辑此文件以使用某些特定于\
    \ Android 的功能，例如排行榜和应用内购买。请参阅相关 Android SDK API 的文档，其中会指出对 `AndroidManifest.xml`\
    \ 的任何要求。\n\nAndroid 版本的 *Info.plist* 仅包含关于您应用的基本信息，主要是其名称、默认本地化和包标识符。您还会找到两个文件夹引用，`Published-iOS`\
    \ 和 `Published-Android`，它们包含由 SpriteBuilder 管理的资源文件的 iOS 和 Android 版本。当然，只有 iOS\
    \ 资源文件会包含在 iOS 构建中，而只有 Android 资源文件会包含在 Android 构建中。\n\n**提示** 这两个 *Published*\
    \ 文件夹会使项目大小增加约一倍，这可能是使用源代码控制软件的用户需要关心的问题。您应该从源代码控制中排除这两个文件夹。获取仓库副本的新用户只需打开 SpriteBuilder\
    \ 项目并发布一次，即可在本地创建已发布文件的副本。这样，您就可以避免在源代码控制下存储数十甚至数百兆字节的已发布资源文件。\n\n# 转换 Bouncy\
    \ Beast"
  raw: 'At this point, you should see the Android device’s screen turn black at first,
    until it begins to show the *MainScene.ccb* contents. Want proof that this really
    works? Take a look at [Figure 13-14](#part0024.html#Fig14).


    ![9781484202630_Fig13-14.jpg](images/00203.jpeg)


    [Figure 13-14](#part0024.html#_Fig14). Whoa! SpriteBuilder app written in Objective-C
    running on an Android device—just like that!


    Troubleshooting


    If you encounter any issues regarding this simple test, the setup of your Android
    device, getting the device connected, getting Xcode to list the device, having
    transfers work, and so on, you should search your issue and, if necessary, ask
    about it in the “Android” section of the SpriteBuilder forum: [http://forum.spritebuilder.com/category/android](http://forum.spritebuilder.com/category/android).


    Before you do so, consider doing the following:


    *   Be patient. Transferring and launching an Android app may seem to hang with
    no updates posted to the log for quite a while. The full Bouncy Beast project
    takes about 90 seconds to transfer, most of it without any log activity. When
    it launches, it can take another 10 to 30 seconds of inactivity. This is normal
    and happens every time—there aren’t any incremental transfers that speed up consecutive
    transfers as there are on iOS.

    *   Ensure you’ve followed the Android device setup and connection steps described
    earlier in this chapter. Verify that you didn’t enable or disable any development
    settings not mentioned explicitly.

    *   Ensure that the HelloSpriteBuilder iOS project runs fine on an iOS device
    or Simulator so that you know the problem is specific to building for Android.

    *   Try issuing a *Product* ![image](images/00008.jpeg) *Clean Build Folder* (by
    holding the Option key pressed) in Xcode. At the same time, delete (uninstall)
    any previously deployed version of the app from the device. And restart Xcode.
    Then try running again. Sometimes this can fix the “really weird” kinds of issues.

    *   Be sure to have read the SpriteBuilder Android documentation, specifically
    the “Troubleshooting” and “Known Issues” sections: [http://android.spritebuilder.com](http://android.spritebuilder.com).


    If you can’t resolve the issue, ask about it in the SpriteBuilder forum. When
    you do, describe in detail what you attempted and observed, what device you are
    testing with (model, Android version), and what SpriteBuilder and Xcode versions
    you are using.


    **Note**  I successfully tested Android deployment with both Xcode 5.1 and Xcode
    6.0\. I tested on OS X 10.9 Mavericks. If you’re still using Xcode 5.0 or earlier
    and you do encounter issues, you should consider upgrading Xcode. The OS X version
    shouldn’t matter though.


    If you’re using a beta version of Xcode, iOS, or OS X you should consider the
    possibility that certain issues may occur exactly because you’re using beta software.
    Beta software may introduce compatibility issues with third-party software like
    Cocos2D, SpriteBuilder, or Apportable’s BridgeKit.


    Anatomy of a SpriteBuilder App


    If you examine the files in the HelloSpriteBuilder Xcode project, you’ll notice
    a few curious additions, especially if you used to work with projects created
    with SpriteBuilder v1.2 or earlier. [Figure 13-15](#part0024.html#Fig15) shows
    the source tree with some Android-specific files.


    ![9781484202630_Fig13-15.jpg](images/00204.jpeg)


    [Figure 13-15](#part0024.html#_Fig15). SpriteBuilder v1.3 projects include some
    Android-specific files


    First of all, there is a *Platforms* group, which contains iOS, Android, and Mac
    groups with files specific to each platform. The *Source/Platforms/Android* group
    contains the *HelloSpriteBuilderActivity.java* file. The contents of the file
    are reprinted in [Listing 13-1](#part0024.html#list1).


    [***Listing 13-1***](#part0024.html#_list1). The HelloSpriteBuilderActivity.java
    file


    ```

    package org.cocos2d.HelloSpriteBuilder;


    import org.cocos2d.CCActivity;


    public class HelloSpriteBuilderActivity extends CCActivity {


    }

    ```


    *HelloSpriteBuilderActivity.java* simply creates a new class extending the CCActivity
    class provided by Cocos2D. This goes in line with the *HelloSpriteBuilderActivity*
    Objective-C class of the same name, whose interface is shown in [Listing 13-2](#part0024.html#list2).


    [***Listing 13-2***](#part0024.html#_list2). HelloSpriteBuilderActivity.h


    ```

    #import "CCActivity.h"


    BRIDGE_CLASS("org.cocos2d.HelloSpriteBuilder.HelloSpriteBuilderActivity")

    @interface HelloSpriteBuilderActivity : CCActivity


    @end

    ```


    The special macro BRIDGE_CLASS refers to the aforementioned *HelloSpriteBuilderActivity*
    Java class, essentially connecting the two. There’s also an analog for Java interfaces/Objective-C
    protocols named BRIDGE_INTERFACE. You only need to Bridge a Java to Objective-C
    if you intend to use functionality not available in BridgeKit. Otherwise, prefer
    to use the already exposed functionality of BridgeKit, since you can interface
    with it purely using Objective-C code.


    The HelloSpriteBuilderActivity implementation does only two things: launch the
    first scene and respond to the Back key, telling the app to finish. The code is
    reprinted in [Listing 13-3](#part0024.html#list3).


    [***Listing 13-3***](#part0024.html#_list3). HelloSpriteBuilderActivity.m


    ```

    #import "HelloSpriteBuilderActivity.h"


    @implementation HelloSpriteBuilderActivity


    -(CCScene*)startScene

    {

        return [CCBReader loadAsScene:@"MainScene"];

    }


    -(BOOL)onKeyUp:(int32_t)keyCode keyEvent:(AndroidKeyEvent*)event

    {

        if (keyCode == AndroidKeyEventKeycodeBack)

        {

            [self finish];

        }

        return NO;

    }


    @end

    ```


    The key point to take away here is that Android apps completely ignore the AppDelegate
    class. If you change the launch scene in *AppDelegate*’s startScene method, you’ll
    also have to change the startScene method in the Activity class. Furthermore,
    any custom code you write in the *AppDelegate* file will not be included in Android
    builds. Likewise, any code in the Activity class will not run in iOS builds.


    **Tip**  You should generally create a class that contains common code and data
    that needs to be used by both *AppDelegate* and the Activity class. The simplest
    example is to declare a static NSString* FirstSceneToLaunch = @"MainScene"; initialized
    to the name of the first scene to launch. You can then import that header in both
    *AppDelegate* and the Activity class and use the FirstSceneToLaunch identifier
    in both files. That way, you need to edit in only one place, instead of risking
    that *AppDelegat*e and Activity do completely different things.


    In the *Resources/Platforms/Android* group, you’ll find the *AndroidManifest.xml*.
    It contains various build parameters as well as settings similar to the *Info.plist*
    on iOS. You may need to edit this file to use certain Android-specific features,
    such as Leaderboards and In-App purchases. Refer to the documentation of the Android
    SDK API in question, which will point out any requirements for the *AndroidManifest.xml*.


    The Android version of the *Info.plist* contains just basic information about
    your app, mainly its name, default localization, and bundle identifier. You’ll
    also find two folder references, Published-iOS and Published-Android, containing
    the iOS and Android versions of the resource files managed by SpriteBuilder. Of
    course, only the iOS resource files are included in iOS builds, while only the
    Android resource files are included in Android builds.


    **Tip**  The two *Published* folders do about double the size of the project,
    which may be a concern for users of source-control software. You should exclude
    these two folders from source control. A new user obtaining a copy of the repository
    would simply have to open the SpriteBuilder project and publish once to create
    local copies of the published files. That way, you’ll avoid storing dozens, if
    not hundreds, of megabytes of published resource files under source control.


