  trans: '

    # 盒子布局的对齐与间距问题


    对齐和间距还有很大改进空间。此外，`verticalLayout` 节点的内容顺序是颠倒的，标签位于底部，而 `horizontalLayoutSfx` 位于顶部。这是
    `Direction` 属性设置为 `Vertical` 的 `Box Layout` 节点的一个不理想行为。解决办法很简单：在时间轴中拖动 `verticalLayout`
    的子节点，使其顺序与在图层上显示的顺序相反即可。


    节点也没有在图层上居中，而是向右上方偏移。这是因为 `Box Layout` 节点的锚点默认为 `0, 0`。因此，即使 `verticalLayout`
    节点的位置在舞台上居中，由于其锚点设置，其内容会向右上方延伸。选中 `verticalLayout` 节点，将其 X 轴和 Y 轴的 `Anchor point`
    属性均改为 `0.5`，即可使节点居中。你还需要将 `verticalLayout` 节点的 `Spacing` 属性改为 `30`，以增加滑块和标签之间的垂直间距。


    不过，滑块仍然太宽，并且与标签重叠。你可以通过选中一个滑块，然后将 `Preferred size` 属性的 `Width` 从默认值 `200` 改为 `150`
    来减小滑块尺寸。对两个 `CCSlider` 节点都执行此操作。


    然而，标签仍然与滑块重叠。这是一个间距问题，可以通过编辑 `horizontalLayoutMusic` 和 `horizontalLayoutSfx` 两个盒子布局节点的
    `Spacing` 属性来解决。将两者的间距都设置为 `20`。


    ## 使用盒子布局实现左对齐


    如果你眼尖，可能会发现两个标签和滑块仍然没有完美对齐。音乐音量标签似乎比音效音量标签缩进得稍多一点，而滑块的起始和结束 X 位置也不一致。如果你想明确看到这个效果，可以选中音效音量标签，将其文字改为
    `FX Volume`。我打赌你现在能看到了。示例请参见图 7-8。


    ![9781484202630_Fig07-08.jpg](img/00102.jpeg)


    图 7-8。标签和滑块未对齐


    问题在于，除非标签使用完全相同的文本，否则它们的尺寸会不同。即使两个标签的字符数相同，除非你使用等宽字体（如 Courier），否则它们的尺寸仍可能不同。但
    Courier 是一种难看的字体：看起来像这样。


    幸运的是，这个问题很容易解决，只需确保 `horizontalLayoutMusic` 和 `horizontalLayoutSfx` 两个盒子布局节点具有相同的内容尺寸即可。如果你分别选中这两个节点，会发现它们的
    `content size` 属性不同。如果你已将子标签的文字设置为 `FX Volume`，则 `horizontalLayoutMusic` 节点的宽度为
    `246`，而 `horizontalLayoutSfx` 节点的宽度仅为 `230`。


    这意味着 `horizontalLayoutSfx` 的内容尺寸宽度少了 16 点。因此，你只需使其加宽 16 点。考虑到你已为两个水平布局节点将 `Spacing`
    属性设置为 `20`，你只需要增加 `horizontalLayoutSfx` 节点的间距。


    选中 `horizontalLayoutSfx` 节点，将 `Spacing` 改为 `36`——即原来的 20 点加上缺失的 16 点。仅此而已：对齐问题解决。


    检查两个水平布局节点的内容尺寸，确认它们的宽度现在相同。现在两个标签都已左对齐，滑块也是如此。


    ## 使用盒子布局实现居中对齐


    但如果你希望标签居中对齐，并且不用在更改标签文字时担心调整 `Box Layout` 节点的间距属性，那该怎么办呢？


    目前，每个标签和滑块都在一个 `Box Layout` 节点中水平对齐，而这两个盒子布局节点则在另一个 `Box Layout` 节点中垂直对齐。你完全可以颠倒这个设置。在这种情况下，你可以将两个标签放在一个垂直对齐的
    `Box Layout` 节点中，并将两个滑块放在另一个垂直对齐的 `Box Layout` 节点中。然后，将两个垂直盒子布局节点添加到一个水平对齐的 `Box
    Layout` 节点中。


    结果将会有所不同，因为每个垂直列的宽度由宽度最大的节点决定。换句话说，现在是最宽的标签决定了所有标签相对于旁边所有滑块的对齐方式。


    试试看，首先移除 `horizontalLayoutSfx` 和 `horizontalLayoutMusic` 节点。这也会移除它们的子节点。


    然后，将一个 `Box Layout` 节点拖放到现有的 `verticalLayout` 节点上，并将其命名为 `horizontalLayout`。再将两个
    `Box Layout` 节点拖放到 `horizontalLayout` 节点上，将它们的 `Direction` 属性改为 `Vertical`，并在时间轴中将它们的名称改为
    `verticalLayoutLabels` 和 `verticalLayoutSliders`。


    接着，向 `verticalLayoutLabels` 节点添加两个 `Label TTF` 节点，并分别将它们的标签文字改为 `FX Volume` 和
    `Music Volume`。同时，向 `verticalLayoutSliders` 节点添加两个 `Slider` 节点。你可能希望在时间轴中编辑标签和滑块的名称，以表明它们对应的是音乐还是音效音量。参见图
    7-9。


    ![9781484202630_Fig07-09.jpg](img/00103.jpeg)


    图 7-9。标签和滑块在各自独立的垂直列中对齐


    现在，你仍然面临与之前相同的问题：滑块和标签的位置过于紧凑。因此，将名为 `horizontalLayout` 和 `verticalLayoutSliders`
    的 `Box Layout` 节点的 `Spacing` 属性设置为 `25`，而 `verticalLayoutLabels` 则应使用 `18` 的 `Spacing`
    值。观察每个更改如何影响相关节点。


    这种设置的优势在于，它的行为更接近自动布局，至少就水平对齐而言是如此，而水平对齐通常比垂直对齐更重要。你仍然会遇到与之前相同的问题，但现在是垂直对齐问题——因此需要将
    `verticalLayoutLabels` 的间距设置为 `18`，以便更好地与滑块对齐。


    当涉及到 `Label TTF` 节点时，无论采用哪种方式，都很难获得完美的对齐。


    尽管如此，如果你更改标签文字或字体大小，或者更改滑块的宽度，这种新设置将相应调整另一列中节点的位置。结果将类似于图 7-10 所示。注意，标签现在在其垂直列内居中对齐。


    ![9781484202630_Fig07-10.jpg](img/00104.jpeg)


    图 7-10。标签现在居中对齐


    无法给出哪种布局更优的通用建议——是像第一个示例那样先列后行，还是像第二个示例那样先行后列。有时一种方式更易于操作；有时另一种方式更简便。如果你能让基于网格布局中的所有节点具有相同的尺寸，那绝对会有所帮助。


    但是，唉，对于标签来说这几乎不可能，除非你使用等宽字体。不过，如果对齐不必完美，有时在标签中填充空格字符会有所帮助。


    **提示** 如果你迫切需要指定标签的尺寸，有一件事可以尝试：使用 `Button` 节点代替 `Label TTF`！你可以将按钮的精灵帧设置为 `<NULL>`
    以隐藏背景精灵，并且你仍然可以通过 `Preferred size` 和 `Max size` 属性以及标签的 `Horizontal padding` 和
    `Vertical padding` 来更改按钮的尺寸。最终你将得到一个尺寸可调的标签。


    ## 更改滑块视觉效果

