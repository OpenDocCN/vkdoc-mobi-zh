- fmt: "# Debugging & Best Practices\n\nBut even if that should fail, or simply proves\
    \ to be too much work, I have an alternative proposition to make. Imagine you\
    \ do have a successful iOS app and you continue to earn some extra cash. You can\
    \ now do one of two things with relative ease and comfort:\n\n* Hire and pay another\
    \ developer to (help you) port your `SpriteBuilder` project to Android.\n* Begin\
    \ working on the improved successor of your game, or simply your next app idea.\
    \ Start from scratch, but this time build it as a cross-platform app from the\
    \ start. Spend that extra cash on Android devices for testing.\n\nThe common misconception\
    \ held by beginning developers that I continue to warn about is this: building\
    \ an app for multiple platforms from the start **does not** increase your chances\
    \ of success.\n\nIt does increase your financial success **if** you have a successful\
    \ app in the first place. But an app that fails on iOS because it simply isn’t\
    \ a good quality app or users have no real use for it is going to fail on any\
    \ platform. Yet building a quality app that has the same level of quality on multiple\
    \ platforms takes more time and resources. So even if the overall revenue is higher\
    \ for both platforms together, the “revenue for time spent” ratio may actually\
    \ be less than if you had published for one platform only.\n\nPlus, you now have\
    \ to do everything post-release twice: releasing updates, answering customer support\
    \ questions, and so on—even the amount of marketing increases.\n\nTo put you in\
    \ the right mindset: unless you have a few published titles under your belt (on\
    \ any platform), I recommend you focus on publishing your app for iOS exclusively.\
    \ Once an app does become successful, thanks to the `SpriteBuilder` Android plugins,\
    \ you can port after the iOS release with relative ease. Otherwise, just make\
    \ another iOS app.\n\n## Cross-Platform from the Start\n\nIf you do have experience\
    \ creating and publishing apps for iOS, Android, and/or other platforms, you should\
    \ definitely start a new project with both platforms in mind. This includes designing\
    \ the game such that it handles multiple device resolutions well. Plan to have\
    \ different code paths and resources for slower devices, or plan ahead and exclude\
    \ certain devices that you expect to be running your app too slowly.\n\nYour day-to-day\
    \ work with `SpriteBuilder` and Android will be such that each new feature is\
    \ added and tested on one platform. Typically, initial development will be done\
    \ on iOS simply because it’s generally quicker and more reliable to deploy and\
    \ run apps on iOS devices. When it’s confirmed to be working, you immediately\
    \ test the new code and resources on an Android device. If there are any unresolvable\
    \ platform-specific issues, you can continue working on other iOS features while\
    \ waiting for an answer to a question you posted.\n\nNote that the overhead of\
    \ compiling, deploying, and running each feature on two platforms alone means\
    \ the time it takes to develop for both platforms increases. Like I said, there’s\
    \ no such thing as free ports.\n\nAdding to that: even on iOS it’s not a good\
    \ idea to only ever test your app on one particular device, and doing the same\
    \ on Android is almost wantonly negligent. Most developers making a living off\
    \ of selling mobile apps juggle several different testing devices to cover the\
    \ most widely used screen sizes and performance specs.\n\nYou should have at least\
    \ one device that represents the minimal specifications your app will run on.\
    \ This enables you to tell with near certainty that your app meets the performance\
    \ requirements even on the slowest supported devices.\n\nDoing cross-platform\
    \ development from the start and frequently testing your app on both platforms\
    \ will lead to better cross-platform apps. You’ll also learn to understand the\
    \ differences in OS design and behavior for both platforms along the way. One\
    \ problem with apps that have been ported late is that they often feel foreign\
    \ to users of the other platform. Foreign in terms of terminology, how the app\
    \ responds to user input, how it integrates system menus, how the user interface\
    \ is designed, and so on.\n\n## Summary\n\nI hope you’re as excited about the\
    \ astounding possibility of being able to write Objective-C code and bringing\
    \ that to Android devices with relative ease. Personally, I’m delighted that I\
    \ don’t have to use a C++ or Java game engine and framework to do so.\n\nYou’ll\
    \ find the Android-compatible version of Bouncy Beast in the *16 - Bouncy Beast\
    \ for Android* folder. Finally, I made a couple final tweaks and added eight more\
    \ levels using two additional graphic sets. You can find this final project in\
    \ the *17 - Final Project with Graphics and Levels for all Worlds* folder.\n\n\
    ## Chapter 14: Debugging & Best Practices\n\nDebugging is the art of understanding\
    \ the root causes of a programming or specification issue so that you can either\
    \ fix the issue, work around it, or alter your program specifications and requirements.\n\
    \nWhy mention this at all in a book about `SpriteBuilder`?\n\nBecause you’ll inevitably\
    \ run into problems that you can easily solve on your own with just basic knowledge\
    \ of debugging tools and techniques. These problems are logging, asserting, adding\
    \ breakpoints, stepping through code, and inspecting variable values. The latter\
    \ two are performed while your app is running, which allows you to see exactly\
    \ which paths your code is taking.\n\nIn this chapter, I give many code examples\
    \ you don’t need to add to your Xcode project. The code provided here serves as\
    \ debugging examples, but it doesn’t add anything of significance to the Bouncy\
    \ Beast project itself.\n\n**Tip** You’ll find a lot more detailed explanations\
    \ about debugging apps with Xcode in the Apple developer library: [https://developer.apple.com/library/mac/documentation/ToolsLanguages/Conceptual/Xcode_Overview/DebugYourApp/DebugYourApp.html](https://developer.apple.com/library/mac/documentation/ToolsLanguages/Conceptual/Xcode_Overview/DebugYourApp/DebugYourApp.html).\n\
    \n### Logging Messages and Variables\n\n*Logging* means printing a text string\
    \ to the Xcode debug console. Logging can be effective in printing out values\
    \ of variables, especially if these values change over time. It is often used\
    \ together with marking the flow of program execution, meaning when specific code\
    \ runs in time relative to other code.\n\nYou have used `NSLog` before—for instance,\
    \ in *MainMenuLevelSelect.m*, to log whenever the `CCScrollView` delegate methods\
    \ fire. Listing 14-1 shows one use of `NSLog`.\n\n**Listing 14-1.** `NSLog` used\
    \ to log when Scroll View delegate methods run\n\n```\n-(void) scrollViewDidEndDragging:(CCScrollView\
    \ *)scrollView\n                  willDecelerate:(BOOL)decelerate\n{\n    NSLog(@\"\
    %@%@\", NSStringFromSelector(_cmd), decelerate ? @\"YES\" : @\"NO\");\n}\n```\n\
    \nTogether with the other delegate method’s logging, `NSLog` will print a series\
    \ of strings to the Xcode debug console, as seen in Figure 14-1, when you interact\
    \ with the *Scroll View*.\n\n![9781484202630_Fig14-01.jpg](images/00207.jpeg)\n\
    \n**Figure 14-1.** `NSLog` output in Xcode’s debug console after interacting with\
    \ the level-selection Scroll View"
  raw: 'But even if that should fail, or simply proves to be too much work, I have
    an alternative proposition to make. Imagine you do have a successful iOS app and
    you continue to earn some extra cash. You can now do one of two things with relative
    ease and comfort:


    *   Hire and pay another developer to (help you) port your SpriteBuilder project
    to Android.

    *   Begin working on the improved successor of your game, or simply your next
    app idea. Start from scratch, but this time build it as a cross-platform app from
    the start. Spend that extra cash on Android devices for testing.


    The common misconception held by beginning developers that I continue to warn
    about is this: building an app for multiple platforms from the start **does not**
    increase your chances of success.


    It does increase your financial success **if** you have a successful app in the
    first place. But an app that fails on iOS because it simply isn’t a good quality
    app or users have no real use for it is going to fail on any platform. Yet building
    a quality app that has the same level of quality on multiple platforms takes more
    time and resources. So even if the overall revenue is higher for both platforms
    together, the “revenue for time spent” ratio may actually be less than if you
    had published for one platform only.


    Plus, you now have to do everything post-release twice: releasing updates, answering
    customer support questions, and so on—even the amount of marketing increases.


    To put you in the right mindset: unless you have a few published titles under
    your belt (on any platform), I recommend you focus on publishing your app for
    iOS exclusively. Once an app does become successful, thanks to the SpriteBuilder
    Android plugins, you can port after the iOS release with relative ease. Otherwise,
    just make another iOS app.


    Cross-Platform from the Start


    If you do have experience creating and publishing apps for iOS, Android, and/or
    other platforms, you should definitely start a new project with both platforms
    in mind. This includes designing the game such that it handles multiple device
    resolutions well. Plan to have different code paths and resources for slower devices,
    or plan ahead and exclude certain devices that you expect to be running your app
    too slowly.


    Your day-to-day work with SpriteBuilder and Android will be such that each new
    feature is added and tested on one platform. Typically, initial development will
    be done on iOS simply because it’s generally quicker and more reliable to deploy
    and run apps on iOS devices. When it’s confirmed to be working, you immediately
    test the new code and resources on an Android device. If there are any unresolvable
    platform-specific issues, you can continue working on other iOS features while
    waiting for an answer to a question you posted.


    Note that the overhead of compiling, deploying, and running each feature on two
    platforms alone means the time it takes to develop for both platforms increases.
    Like I said, there’s no such thing as free ports.


    Adding to that: even on iOS it’s not a good idea to only ever test your app on
    one particular device, and doing the same on Android is almost wantonly negligent.
    Most developers making a living off of selling mobile apps juggle several different
    testing devices to cover the most widely used screen sizes and performance specs.


    You should have at least one device that represents the minimal specifications
    your app will run on. This enables you to tell with near certainty that your app
    meets the performance requirements even on the slowest supported devices.


    Doing cross-platform development from the start and frequently testing your app
    on both platforms will lead to better cross-platform apps. You’ll also learn to
    understand the differences in OS design and behavior for both platforms along
    the way. One problem with apps that have been ported late is that they often feel
    foreign to users of the other platform. Foreign in terms of terminology, how the
    app responds to user input, how it integrates system menus, how the user interface
    is designed, and so on.


    Summary


    I hope you’re as excited about the astounding possibility of being able to write
    Objective-C code and bringing that to Android devices with relative ease. Personally,
    I’m delighted that I don’t have to use a C++ or Java game engine and framework
    to do so.


    You’ll find the Android-compatible version of Bouncy Beast in the *16 - Bouncy
    Beast for Android* folder. Finally, I made a couple final tweaks and added eight
    more levels using two additional graphic sets. You can find this final project
    in the *17 - Final Project with Graphics and Levels for all Worlds* folder.


    Chapter    14


    Debugging & Best Practices


    Debugging is the art of understanding the root causes of a programming or specification
    issue so that you can either fix the issue, work around it, or alter your program
    specifications and requirements.


    Why mention this at all in a book about SpriteBuilder?


    Because you’ll inevitably run into problems that you can easily solve on your
    own with just basic knowledge of debugging tools and techniques. These problems
    are logging, asserting, adding breakpoints, stepping through code, and inspecting
    variable values. The latter two are performed while your app is running, which
    allows you to see exactly which paths your code is taking.


    In this chapter, I give many code examples you don’t need to add to your Xcode
    project. The code provided here serves as debugging examples, but it doesn’t add
    anything of significance to the Bouncy Beast project itself.


    **Tip**  You’ll find a lot more detailed explanations about debugging apps with
    Xcode in the Apple developer library: [https://developer.apple.com/library/mac/documentation/ToolsLanguages/Conceptual/Xcode_Overview/DebugYourApp/DebugYourApp.html](https://developer.apple.com/library/mac/documentation/ToolsLanguages/Conceptual/Xcode_Overview/DebugYourApp/DebugYourApp.html).


    Logging Messages and Variables


    *Logging* means printing a text string to the Xcode debug console. Logging can
    be effective in printing out values of variables, especially if these values change
    over time. It is often used together with marking the flow of program execution,
    meaning when specific code runs in time relative to other code.


    You have used NSLog before—for instance, in *MainMenuLevelSelect.m*, to log whenever
    the CCScrollView delegate methods fire. [Listing 14-1](#part0025.html#list1) shows
    one use of NSLog.


    [***Listing 14-1***](#part0025.html#_list1). NSLog used to log when Scroll View
    delegate methods run


    ```

    -(void) scrollViewDidEndDragging:(CCScrollView *)scrollView

                      willDecelerate:(BOOL)decelerate

    {

        NSLog(@"%@%@", NSStringFromSelector(_cmd), decelerate ? @"YES" : @"NO");

    }

    ```


    Together with the other delegate method’s logging, NSLog will print a series of
    strings to the Xcode debug console, as seen in [Figure 14-1](#part0025.html#Fig1),
    when you interact with the *Scroll View*.


    ![9781484202630_Fig14-01.jpg](images/00207.jpeg)


    [Figure 14-1](#part0025.html#_Fig1). NSLog output in Xcode’s debug console after
    interacting with the level-selection Scroll View'
  trans: "\n# 调试与最佳实践\n\n但即使失败，或单纯因为工作量太大而难以推进，我也有替代方案供你参考。假设你确实拥有一款成功的 iOS 应用，并且持续获得额外收入。此时你可以相对轻松地选择以下两条路：\n\
    \n* 聘请并付费让另一位开发者（协助你）将`SpriteBuilder`项目移植到 Android 平台。\n* 着手开发当前游戏的改进版，或者直接开始下一个应用创意。这次从零开始，但一开始就将其构建为跨平台应用。将额外收入用于购买\
    \ Android 测试设备。\n\n我始终在警示初级开发者一个常见的误解：从一开始就为多个平台开发应用**并不会**提高你的成功概率。\n\n只有当你**确实**拥有了一款成功的应用，跨平台开发才会增加你的财务收益。但如果一款应用在\
    \ iOS 上失败——仅仅因为质量不佳或用户并无实际需求——那么它在任何平台上都注定失败。而要在多个平台上打造同等质量的优质应用，需要投入更多时间和资源。因此，即便双平台总收入更高，\"\
    时间投入与收入比\"却可能低于仅针对单一平台发布的情况。\n\n此外，发布后所有工作都需要双倍执行：发布更新、处理客户支持问题等——连营销工作量也会翻倍。\n\
    \n为了帮你树立正确认知：除非你已经成功发布过几款应用（不限平台），否则我建议你专注于仅在 iOS 平台发布应用。一旦某款应用取得成功，借助`SpriteBuilder`的\
    \ Android 插件，你可以在 iOS 发布后相对轻松地完成移植。否则，不如继续开发下一款 iOS 应用。\n\n## 从一开始就采用跨平台方案\n\n\
    如果你确实拥有为 iOS、Android 或其他平台创建和发布应用的经验，那么在新项目中必须从一开始就兼顾双平台。这包括设计游戏时确保它能适配多种设备分辨率。针对性能较弱的设备规划不同的代码路径和资源，或者提前规划并排除那些你预期运行速度过慢的特定设备。\n\
    \n在使用`SpriteBuilder`和 Android 的日常工作中，每个新功能将在单一平台上添加和测试。通常情况下，初始开发会在 iOS 上完成，因为部署和运行应用在\
    \ iOS 设备上通常更快更稳定。当功能确认正常后，立即在 Android 设备上测试新代码和资源。如果遇到无法解决的平台特定问题，可以在等待问题解答的同时继续开发其他\
    \ iOS 功能。\n\n请注意，仅双平台编译、部署和运行每个功能所带来的额外开销，就意味着开发时间会增加。如我所说，世上没有免费的移植。\n\n此外：即使在\
    \ iOS 上，仅用单一特定设备测试应用也不是好习惯；在 Android 上同样如此，甚至近乎疏忽大意。大多数靠销售移动应用谋生的开发者会同时使用多台测试设备，以覆盖最常用的屏幕尺寸和性能规格。\n\
    \n你至少应该拥有一台代表应用运行最低规格要求的设备。这样你就能近乎确定地判断，即使在性能最差的受支持设备上，你的应用也能满足性能要求。\n\n从开发之初就采用跨平台方案并频繁在双平台测试，将有助于打造更好的跨平台应用。在此过程中，你还能逐渐理解两个平台在操作系统设计和行为上的差异。后期移植的应用常出现的问题之一，就是会让另一平台的用户感到\"\
    陌生\"——无论是术语使用、应用对用户输入的响应方式、系统菜单的集成模式，还是用户界面设计等方面。\n\n## 小结\n\n希望你也和我一样，对能用 Objective-C\
    \ 编写代码并相对轻松地将其移植到 Android 设备的惊人可能性感到兴奋。就我个人而言，我很高兴不必为此使用 C++或 Java 游戏引擎及框架。\n\n\
    你可以在 *16 - Bouncy Beast for Android* 文件夹中找到兼容 Android 版本的 Bouncy Beast。最后，我做了几项最终调整，并使用另外两套图形资源集新增了\
    \ 8 个关卡。你可以在 *17 - Final Project with Graphics and Levels for all Worlds* 文件夹中找到这个最终项目。\n\
    \n## 第 14 章：调试与最佳实践\n\n调试是一门理解程序或规范问题根本原因的艺术，以便你能修复问题、规避问题，或修改程序规范和需求。\n\n在一本关于`SpriteBuilder`的书中为何要提及这一点？\n\
    \n因为你不可避免地会遇到一些问题，而仅凭基本的调试工具和技术知识，你就能轻松自行解决。这些问题涉及日志记录、断言、添加断点、单步执行代码以及检查变量值。后两项操作需要在应用运行时进行，这能让你精确观察到代码的执行路径。\n\
    \n在本章中，我会给出许多你无需添加到 Xcode 项目中的代码示例。此处列出的代码仅作为调试示例，并不对 Bouncy Beast 项目本身增加任何实质性内容。\n\
    \n**提示** 你可以在 Apple 开发者库中找到关于使用 Xcode 调试应用的更详细说明：[`developer.apple.com/library/mac/documentation/ToolsLanguages/Conceptual/Xcode_Overview/DebugYourApp/DebugYourApp.html`](https://developer.apple.com/library/mac/documentation/ToolsLanguages/Conceptual/Xcode_Overview/DebugYourApp/DebugYourApp.html)。\n\
    \n### 记录消息与变量\n\n*日志记录*指的是将文本字符串打印到 Xcode 调试控制台。日志记录能有效输出变量的值，尤其当这些值随时间变化时。它通常与标记程序执行流程配合使用，即标记特定代码相对于其他代码在时间上运行的位置。\n\
    \n你之前已经使用过`NSLog`——例如，在*MainMenuLevelSelect.m*中，当`CCScrollView`的代理方法触发时进行日志记录。代码清单\
    \ 14-1 展示了`NSLog`的一种用法。\n\n**代码清单 14-1.** 使用`NSLog`记录滚动视图代理方法运行情况\n\n```\n-(void)\
    \ scrollViewDidEndDragging:(CCScrollView *)scrollView\n                  willDecelerate:(BOOL)decelerate\n\
    {\n    NSLog(@\"%@%@\", NSStringFromSelector(_cmd), decelerate ? @\"YES\" : @\"\
    NO\");\n}\n```\n\n与其他代理方法的日志记录配合使用时，当你与*滚动视图*交互时，`NSLog`会向 Xcode 调试控制台打印一系列字符串，如图\
    \ 14-1 所示。\n\n![9781484202630_Fig14-01.jpg](img/00207.jpeg)\n\n**图 14-1.** 与关卡选择滚动视图交互后，Xcode\
    \ 调试控制台中的`NSLog`输出\n"
- fmt: "# This series of log statements instantly visualizes the flow of execution.\
    \ You can clearly see that `scrollViewWillBeginDragging:` is the first delegate\
    \ method called, while `scrollViewDidEndDragging` with `decelerate` enabled causes\
    \ the Scroll View to continue scrolling past the point where the user stopped\
    \ dragging. The Scroll View does so to move the nearest page to its designated\
    \ position. Once the page has been moved to its position, the scrolling ends with\
    \ `scrollViewDidEndDecelerating`.\n\nLogging is particularly useful if you need\
    \ to monitor the change of values over time—for instance, logging the position\
    \ of a node and its distance to another node in the `update` method.\n\n**Caution**\
    \ Printing a log line to the console takes time, and printing a long string with\
    \ many format specifiers and variables will take longer than a short string. If\
    \ you call `NSLog` once every frame, it may already be enough to show a noticeable\
    \ slowdown. So don’t forget to remove or comment the `NSLog` statements after\
    \ they’ve done their job.\n\nThe `NSLog` function takes the same format strings\
    \ as `NSString`. This allows you to print out any variable along with the message.\
    \ [Listing 14-2](#part0025.html#list2) shows how you can log a variety of basic\
    \ data types.\n\n[***Listing 14-2***](#part0025.html#_list2). Logging basic data\
    \ types with format strings\n\n```\nint intValue = 123;\nNSUInteger unsignedIntegerValue\
    \ = 456789;\nCGFloat floatValue = 0.123456789;\nNSLog(@\"intValue=%i integerValue=%lu\
    \ floatValue=%f floatValue.2=%.2f\",\n      intValue, unsignedIntegerValue, floatValue,\
    \ floatValue);\n```\n\nThe resulting log string looks like this:\n\n```\nintValue=123\
    \ integerValue=456789 floatValue=0.123457 floatValue.2=0.12\n```\n\nThe most commonly\
    \ used format identifiers are `%i` and `%u` for `int` and `unsigned int` values,\
    \ `%f` and `%.1f` for floating-point values. The latter specifies that only the\
    \ first three digits following the decimal separator should be printed. This helps\
    \ readability because logging positions as `237.352349x288.927534` is a lot less\
    \ readable than `237.4x288.9`—especially, if representing the exact floating-point\
    \ value is of little significance.\n\nSometimes you may see `%d` being used, which\
    \ is simply an alias for `%i`. And if you want to log `NSInteger` or `NSUInteger`,\
    \ you have to use the format specifiers for long integers `%li` and `%lu`, as\
    \ well as cast the `NSInteger`/`NSUInteger` value to `(long)` and `(unsigned long)`,\
    \ respectively.\n\n**Caution** If you get a compiler warning on an `NSLog` line\
    \ that indicates you are not using the correct format specifier or that the value\
    \ will be truncated, you should fix that problem. Otherwise, the logged value\
    \ may be different from the actual value, which is going to be a source of confusion.\n\
    \n[Listing 14-3](#part0025.html#list3) shows you how to log Objective-C class\
    \ instances, also known as *objects*.\n\n[***Listing 14-3***](#part0025.html#_list3).\
    \ Logging objects (Objective-C class instances)\n\n```\nNSString* helloLog = @\"\
    Hello Log\";\nNSLog(@\"string=%@ self=%@ cmd=%@\", helloLog, self, NSStringFromSelector(_cmd));\n\
    ```\n\nThe `%@` format specifier can be used for any pointer to an Objective-C\
    \ class instance. The `%@` format specifier actually sends the `description` message\
    \ to the object, which then returns a description string you can customize by\
    \ implementing the `description` method. An example is shown in [Listing 14-4](#part0025.html#list4).\n\
    \n[***Listing 14-4***](#part0025.html#_list4). A custom `description` method\n\
    \n```\n-(NSString*) description\n{\n    return [NSString stringWithFormat:\n \
    \           @\"%@ selfPointer=%p selfClass=%@\",\n            [super description],\
    \ self, NSStringFromClass([self class])];\n}\n```\n\nSo instead of formatting\
    \ the same information repeatedly for multiple `NSLog` statements, it’s preferable\
    \ to override the `description` method to return a custom description string that\
    \ contains all necessary information about the object. In this case, it also prints\
    \ out the pointer value (the memory address of the object) with the `%p` specifier\
    \ and the name of the class, in addition to calling `[super description]`, which\
    \ returns the super class’ description string.\n\nThe resulting output string\
    \ of [Listing 14-3](#part0025.html#list3) might look like this:\n\n```\nstring=Hello\
    \ Log self=<GameScene = 0x10a52bb00 | Name = >\n selfPointer=0x10a52bb00 selfClass=GameScene\
    \ cmd=didLoadFromCCB\n```\n\nLast, there are struct types like `CGPoint`, `CGSize`,\
    \ and `CGRect`. You can log them by printing each struct field individually, or\
    \ for the aforementioned structs you can use the conversion methods `NSStringFromCGPoint`,\
    \ `NSStringFromCGSize`, and `NSStringFromCGRect`. [Listing 14-5](#part0025.html#list5)\
    \ shows an example use.\n\n[***Listing 14-5***](#part0025.html#_list5). There\
    \ are two ways of printing a point\n\n```\nCGPoint point = CGPointMake(1024, 768);\n\
    NSLog(@\"point=%.0fx%.0f point=%@\", point.x, point.y, NSStringFromCGPoint(point));\n\
    ```\n\nThe output of `NSStringFromCGPoint` is formatted in the same format required\
    \ by the inverse conversion function `CGPointFromString`, which takes a string\
    \ like `{1024, 768}` and returns a `CGPoint`. Here’s the output of [Listing 14-5](#part0025.html#list5):\n\
    \n```\npoint=1024x768 point={1024, 768}\n```\n\n**Tip** You’ll need the format\
    \ specifiers frequently for `NSLog`, `NSAssert`, and `NSString`. The full list\
    \ with descriptions is available at [https://developer.apple.com/library/mac/documentation/Cocoa/Conceptual/Strings/Articles/formatSpecifiers.html](https://developer.apple.com/library/mac/documentation/Cocoa/Conceptual/Strings/Articles/formatSpecifiers.html).\n\
    \nOne last thing: it’s not unusual to leave commented-out `NSLog` statements in\
    \ your code. Eventually, you may need them again, so this will save you time.\
    \ If you haven’t used a commented-out `NSLog` statement in weeks, and it doesn’t\
    \ look like you’re ever going to need it again, feel free to remove it.\n\n##\
    \ Adding an Exception Breakpoint (Xcode 5)\n\nBefore moving on to assertions,\
    \ there’s one crucial item you should always add to your project if you are using\
    \ Xcode 5: the exception breakpoint. I find it so important that I’ve added instructions\
    \ to add the exception breakpoint early in the book. Here I’d like to show you\
    \ how to add it and what difference it makes.\n\n**Tip** Xcode 6 users will appreciate\
    \ that adding an exception breakpoint is no longer necessary to have Xcode point\
    \ to the offending line of code.\n\n[Figure 14-2](#part0025.html#Fig2) shows you\
    \ what you normally see when the program aborts. Xcode 5 opens `main.m` and points\
    \ to the `UIApplicationMain` line as the culprit. That’s not useful information—it\
    \ just tells you that the app crashed, but it does not tell you where exactly\
    \ the exception occurred.\n\n![9781484202630_Fig14-02.jpg](images/00208.jpeg)\n\
    \n[Figure 14-2](#part0025.html#_Fig2). An assertion raised an exception that halted\
    \ the program. Without an exception breakpoint, Xcode 5 will show you the main\
    \ function\n\nTo fix that, you’ll have to add an exception breakpoint in Xcode\
    \ 5. Xcode 6 users can still do so. The most noticeable difference the exception\
    \ breakpoint will have in Xcode 6 is that the app will halt before the exception\
    \ (assertion) message and call stack have been printed to the log.\n\nTo add an\
    \ exception breakpoint in Xcode, select the *Breakpoint Navigator* tab (which\
    \ is shown in [Figure 14-3](#part0025.html#Fig3)), click the + button in the lower\
    \ left corner, and then select *Add Exception Breakpoint*.\n\n![9781484202630_Fig14-03.jpg](images/00209.jpeg)\n\
    \n[Figure 14-3](#part0025.html#_Fig3). Adding an exception breakpoint"
  raw: 'This series of log statements instantly visualizes the flow of execution.
    You can clearly see that scrollViewWillBeginDragging: is the first delegate method
    called, while scrollViewDidEndDragging with decelerate enabled causes the *Scroll
    View* to continue scrolling past the point where the user stopped dragging. The
    *Scroll View* does so to move the nearest page to its designated position. Once
    the page has been moved to its position, the scrolling ends with scrollViewDidEndDecelerating.


    Logging is particularly useful if you need to monitor the change of values over
    time—for instance, logging the position of a node and its distance to another
    node in the update method.


    **Caution**  Printing a log line to the console takes time, and printing a long
    string with many format specifiers and variables will take longer than a short
    string. If you call NSLog once every frame, it may already be enough to show a
    noticeable slowdown. So don’t forget to remove or comment the NSLog statements
    after they’ve done their job.


    The NSLog function takes the same format strings as NSString. This allows you
    to print out any variable along with the message. [Listing 14-2](#part0025.html#list2)
    shows how you can log a variety of basic data types.


    [***Listing 14-2***](#part0025.html#_list2). Logging basic data types with format
    strings


    ```

    int intValue = 123;

    NSUInteger unsignedIntegerValue = 456789;

    CGFloat floatValue = 0.123456789;

    NSLog(@"intValue=%i integerValue=%lu floatValue=%f floatValue.2=%.2f",

          intValue, unsignedIntegerValue, floatValue, floatValue);

    ```


    The resulting log string looks like this:


    ```

    intValue=123 integerValue=456789 floatValue=0.123457 floatValue.2=0.12

    ```


    The most commonly used format identifiers are %i and %u for int and unsigned int
    values, %f and %.1f for floating-point values. The latter specifies that only
    the first three digits following the decimal separator should be printed. This
    helps readability because logging positions as 237.352349x288.927534 is a lot
    less readable than 237.4x288.9—especially, if representing the exact floating-point
    value is of little significance.


    Sometimes you may see %d being used, which is simply an alias for %i. And if you
    want to log NSInteger or NSUInteger, you have to use the format specifiers for
    long integers %li and %lu, as well as cast the NSInteger/NSUInteger value to (long)
    and (unsigned long), respectively.


    **Caution**  If you get a compiler warning on an NSLog line that indicates you
    are not using the correct format specifier or that the value will be truncated,
    you should fix that problem. Otherwise, the logged value may be different from
    the actual value, which is going to be a source of confusion.


    [Listing 14-3](#part0025.html#list3) shows you how to log Objective-C class instances,
    also known as *objects*.


    [***Listing 14-3***](#part0025.html#_list3). Logging objects (Objective-C class
    instances)


    ```

    NSString* helloLog = @"Hello Log";

    NSLog(@"string=%@ self=%@ cmd=%@", helloLog, self, NSStringFromSelector(_cmd));

    ```


    The %@ format specifier can be used for any pointer to an Objective-C class instance.
    The %@ format specifier actually sends the description message to the object,
    which then returns a description string you can customize by implementing the
    description method. An example is shown in [Listing 14-4](#part0025.html#list4).


    [***Listing 14-4***](#part0025.html#_list4). A custom description method


    ```

    -(NSString*) description

    {

        return [NSString stringWithFormat:

                @"%@ selfPointer=%p selfClass=%@",

                [super description], self, NSStringFromClass([self class])];

    }

    ```


    So instead of formatting the same information repeatedly for multiple NSLog statements,
    it’s preferable to override the description method to return a custom description
    string that contains all necessary information about the object. In this case,
    it also prints out the pointer value (the memory address of the object) with the
    %p specifier and the name of the class, in addition to calling [super description],
    which returns the super class’ description string.


    The resulting output string of [Listing 14-3](#part0025.html#list3) might look
    like this:


    ```

    string=Hello Log self=<GameScene = 0x10a52bb00 | Name = >

     selfPointer=0x10a52bb00 selfClass=GameScene cmd=didLoadFromCCB

    ```


    Last, there are struct types like CGPoint, CGSize, and CGRect. You can log them
    by printing each struct field individually, or for the aforementioned structs
    you can use the conversion methods NSStringFromCGPoint, NSStringFromCGSize, and
    NSStringFromCGRect. [Listing 14-5](#part0025.html#list5) shows an example use.


    [***Listing 14-5***](#part0025.html#_list5). There are two ways of printing a
    point


    ```

    CGPoint point = CGPointMake(1024, 768);

    NSLog(@"point=%.0fx%.0f point=%@", point.x, point.y, NSStringFromCGPoint(point));

    ```


    The output of NSStringFromCGPoint is formatted in the same format required by
    the inverse conversion function CGPointFromString, which takes a string like {1024,
    768} and returns a CGPoint. Here’s the output of [Listing 14-5](#part0025.html#list5):


    ```

    point=1024x768 point={1024, 768}

    ```


    **Tip**  You’ll need the format specifiers frequently for NSLog, NSAssert, and
    NSString. The full list with descriptions is available at [https://developer.apple.com/library/mac/documentation/Cocoa/Conceptual/Strings/Articles/formatSpecifiers.html](https://developer.apple.com/library/mac/documentation/Cocoa/Conceptual/Strings/Articles/formatSpecifiers.html).


    One last thing: it’s not unusual to leave commented-out NSLog statements in your
    code. Eventually, you may need them again, so this will save you time. If you
    haven’t used a commented-out NSLog statement in weeks, and it doesn’t look like
    you’re ever going to need it again, feel free to remove it.


    Adding an Exception Breakpoint (Xcode 5)


    Before moving on to assertions, there’s one crucial item you should always add
    to your project if you are using Xcode 5: the exception breakpoint. I find it
    so important that I’ve added instructions to add the exception breakpoint early
    in the book. Here I’d like to show you how to add it and what difference it makes.


    **Tip**  Xcode 6 users will appreciate that adding an exception breakpoint is
    no longer necessary to have Xcode point to the offending line of code.


    [Figure 14-2](#part0025.html#Fig2) shows you what you normally see when the program
    aborts. Xcode 5 opens *main.m* and points to the UIApplicationMain line as the
    culprit. That’s not useful information—it just tells you that the app crashed,
    but it does not tell you where exactly the exception occurred.


    ![9781484202630_Fig14-02.jpg](images/00208.jpeg)


    [Figure 14-2](#part0025.html#_Fig2). An assertion raised an exception that halted
    the program. Without an exception breakpoint, Xcode 5 will show you the main function


    To fix that, you’ll have to add an exception breakpoint in Xcode 5. Xcode 6 users
    can still do so. The most noticeable difference the exception breakpoint will
    have in Xcode 6 is that the app will halt before the exception (assertion) message
    and call stack have been printed to the log.


    To add an exception breakpoint in Xcode, select the *Breakpoint Navigator* tab
    (which is shown in [Figure 14-3](#part0025.html#Fig3)), click the + button in
    the lower left corner, and then select *Add Exception Breakpoint*.


    ![9781484202630_Fig14-03.jpg](images/00209.jpeg)


    [Figure 14-3](#part0025.html#_Fig3). Adding an exception breakpoint'
  trans: "\n# 这一系列日志语句能立即将执行流程可视化。你可以清楚地看到，`scrollViewWillBeginDragging:` 是第一个被调用的委托方法，而启用了`decelerate`属性的`scrollViewDidEndDragging`会导致滚动视图在用户停止拖拽后继续滚动。滚动视图这样做是为了将最近的页面移动到其指定位置。一旦页面到位，滚动便会以`scrollViewDidEndDecelerating`结束。\n\
    \n当你需要监测值随时间的变化时，日志记录尤其有用——例如，在`update`方法中记录节点的位置及其与另一个节点的距离。\n\n**注意** 向控制台打印一行日志需要时间，而打印一个包含多个格式说明符和变量的长字符串所需时间比短字符串更长。如果每帧都调用一次`NSLog`，就足以导致明显的速度下降。因此，别忘了在`NSLog`语句完成其使命后将其移除或注释掉。\n\
    \n`NSLog`函数使用与`NSString`相同的格式字符串。这允许你随消息一起打印出任何变量。代码清单 14-2 展示了如何记录多种基本数据类型。\n\
    \n***代码清单 14-2***. 使用格式字符串记录基本数据类型\n\n```\nint intValue = 123;\nNSUInteger unsignedIntegerValue\
    \ = 456789;\nCGFloat floatValue = 0.123456789;\nNSLog(@\"intValue=%i integerValue=%lu\
    \ floatValue=%f floatValue.2=%.2f\",\n      intValue, unsignedIntegerValue, floatValue,\
    \ floatValue);\n```\n\n生成的日志字符串如下：\n\n```\nintValue=123 integerValue=456789 floatValue=0.123457\
    \ floatValue.2=0.12\n```\n\n最常用的格式标识符包括用于`int`和`unsigned int`值的`%i`和`%u`，以及用于浮点值的`%f`和`%.1f`。后者指定只打印小数点后的前三位数字。这有助于提高可读性，因为将位置记录为`237.352349x288.927534`远不如`237.4x288.9`易读——尤其是在精确浮点数值意义不大的情况下。\n\
    \n有时你可能会看到`%d`被使用，它其实就是`%i`的别名。而如果你要记录`NSInteger`或`NSUInteger`，则必须使用长整型的格式说明符`%li`和`%lu`，并分别将`NSInteger`/`NSUInteger`值强制转换为`(long)`和`(unsigned\
    \ long)`。\n\n**注意** 如果某行`NSLog`出现编译器警告，提示你未使用正确的格式说明符或值将被截断，则应当修复该问题。否则，记录的值可能与实际值不同，这将成为混淆的根源。\n\
    \n代码清单 14-3 展示了如何记录 Objective-C 类实例，也就是所谓的*对象*。\n\n***代码清单 14-3***. 记录对象（Objective-C\
    \ 类实例）\n\n```\nNSString* helloLog = @\"Hello Log\";\nNSLog(@\"string=%@ self=%@\
    \ cmd=%@\", helloLog, self, NSStringFromSelector(_cmd));\n```\n\n`%@`格式说明符可用于任何指向\
    \ Objective-C 类实例的指针。实际上，`%@`格式说明符会向对象发送`description`消息，然后该对象返回一个描述字符串，你可以通过实现`description`方法来定制该字符串。代码清单\
    \ 14-4 中给出了一个示例。\n\n***代码清单 14-4***. 自定义的`description`方法\n\n```\n-(NSString*)\
    \ description\n{\n    return [NSString stringWithFormat:\n            @\"%@ selfPointer=%p\
    \ selfClass=%@\",\n            [super description], self, NSStringFromClass([self\
    \ class])];\n}\n```\n\n因此，与其在多个`NSLog`语句中重复格式化相同信息，更好的做法是重写`description`方法，使其返回一个包含对象所有必要信息的自定义描述字符串。在此例中，除了调用返回父类描述字符串的`[super\
    \ description]`之外，它还使用`%p`说明符打印指针值（对象的内存地址）以及类名。\n\n代码清单 14-3 的输出字符串可能如下所示：\n\n\
    ```\nstring=Hello Log self=<GameScene = 0x10a52bb00 | Name = >\n selfPointer=0x10a52bb00\
    \ selfClass=GameScene cmd=didLoadFromCCB\n```\n\n最后，还有一些结构体类型，例如`CGPoint`、`CGSize`和`CGRect`。你可以通过逐个打印每个结构体字段来记录它们，或者针对上述结构体，使用转换方法`NSStringFromCGPoint`、`NSStringFromCGSize`和`NSStringFromCGRect`。代码清单\
    \ 14-5 展示了一个用法示例。\n\n***代码清单 14-5***. 打印一个点有两种方法\n\n```\nCGPoint point = CGPointMake(1024,\
    \ 768);\nNSLog(@\"point=%.0fx%.0f point=%@\", point.x, point.y, NSStringFromCGPoint(point));\n\
    ```\n\n`NSStringFromCGPoint`的输出格式与反向转换函数`CGPointFromString`所需的格式相同，该函数接收一个类似`{1024,\
    \ 768}`的字符串并返回一个`CGPoint`。以下是代码清单 14-5 的输出结果：\n\n```\npoint=1024x768 point={1024,\
    \ 768}\n```\n\n**提示** 你经常需要为`NSLog`、`NSAssert`和`NSString`使用格式说明符。包含描述的完整列表可在此处获取：[`developer.apple.com/library/mac/documentation/Cocoa/Conceptual/Strings/Articles/formatSpecifiers.html`](https://developer.apple.com/library/mac/documentation/Cocoa/Conceptual/Strings/Articles/formatSpecifiers.html)。\n\
    \n最后一点：在代码中保留注释掉的`NSLog`语句并不罕见。最终你可能还会用到它们，所以这能为你节省时间。如果你已经数周没有使用某条注释掉的`NSLog`语句，并且看起来你永远也用不到它了，那么请放心地将其删除。\n\
    \n## 添加异常断点（Xcode 5）\n\n在进入断言之前，如果你使用的是 Xcode 5，有一个关键项你应该始终添加到项目中：异常断点。我觉得它非常重要，因此我在本书早期就添加了关于设置异常断点的说明。这里我想向你展示如何添加它以及它所带来的差异。\n\
    \n**提示** Xcode 6 的用户会很高兴地发现，不再需要添加异常断点来让 Xcode 指向出错的代码行。\n\n图 14-2 展示了程序中止时通常看到的情况。Xcode\
    \ 5 会打开`main.m`并将`UIApplicationMain`行标记为罪魁祸首。这并非有用的信息——它只告诉你应用崩溃了，但并未指明异常发生的具体位置。\n\
    \n![9781484202630_Fig14-02.jpg](img/00208.jpeg)\n\n图 14-2. 断言引发了一个异常，导致程序暂停。如果没有异常断点，Xcode\
    \ 5 将显示 main 函数\n\n要解决这个问题，你需要在 Xcode 5 中添加一个异常断点。Xcode 6 的用户仍然可以这么做。异常断点在 Xcode\
    \ 6 中最显著的区别是，应用会在异常（断言）消息和调用堆栈打印到日志之前暂停。\n\n要在 Xcode 中添加异常断点，请选择*断点导航器*选项卡（如图\
    \ 14-3 所示），点击左下角的+按钮，然后选择*添加异常断点*。\n\n![9781484202630_Fig14-03.jpg](img/00209.jpeg)\n\
    \n图 14-3. 添加异常断点\n"
- fmt: 'Once the exception breakpoint has been added, right-click it and select *Edit
    Breakpoint* to bring up the popover menu shown in [Figure 14-4](#part0025.html#Fig4).
    Change the *Exception* type to Objective-C. This prevents C++ exceptions from
    being caught, which you probably don’t want. Though normally there won’t be any
    C++ code in your app, the OpenAL framework and possibly others may sometimes raise
    C++ exceptions you don’t need to deal with.


    ![9781484202630_Fig14-04.jpg](images/00210.jpeg)


    [Figure 14-4](#part0025.html#_Fig4). Editing the exception breakpoint to catch
    only Objective-C exceptions


    When you run the app and it crashes due to an exception, instead of showing the
    `main()` function, Xcode 5 will point to the offending line in your code as shown
    in [Figure 14-5](#part0025.html#Fig5). If the exception is raised in an Apple
    or other framework for which there is no source code available, Xcode will show
    the line in your code that makes the call.


    **Note** If the crash wasn’t due to an exception, Xcode might still point out
    the `main()` function as the culprit, as shown in [Figure 14-2](#part0025.html#Fig2).
    In that case, you have run into a more low-level problem, perhaps a divide-by-zero
    or buffer-overflow problem or you’re addressing an object that has been released
    from memory.


    ![9781484202630_Fig14-05.jpg](images/00211.jpeg)


    [Figure 14-5](#part0025.html#_Fig5). With an exception breakpoint added, Xcode
    5 shows the line closest to the error for which there is source code available.
    Xcode 6 behaves like this by default


    **Note** With an exception breakpoint enabled, the program execution is halted
    before the exception message and call stack are printed to the debug console in
    Xcode. You can see in [Figure 14-5](#part0025.html#Fig5) that the NSAssert message
    hasn’t been printed to the console. If you need that information, just click the
    *Continue program execution* button once to see the message and call stack in
    the console. On the horizontal toolbar in the center, it’s the third icon from
    the left—the one that looks like a combined pause and play icon.


    ## Asserting Assumptions


    Bugs are unavoidable. They come in many shapes and forms. Code that detects when
    current conditions prevent the code from functioning correctly is essential to
    avoiding bugs.


    Naturally, your code makes assumptions about the state of the program. Assertions
    are used to verify such assumptions which, if not true, would cause the app to
    malfunction.


    The `NSAssert` macro and its variants `NSAssert1` through `NSAssert5` allow you
    to write a test within your code that asserts that the given condition must be
    true. Otherwise, an exception will be raised.


    How is this helpful?


    Imagine you have an ivar that you expect to be non-nil. This is an assumption.
    Should the assumption be wrong for whatever reason, and the ivar is nil, all messages
    to that object will be ignored. This obviously will affect program flow because
    some methods you expect to run won’t run. But it’s not immediately obvious because
    the app doesn’t crash instantly; instead, some lines of code simply have no effect
    or return default values.


    The earlier you can catch such a situation, the closer to the source of the problem
    the error is reported—and the easier it will be fixed.


    Imagine you had a specific method that needs to be executed every frame, but it
    doesn’t seem to be working. You change the method’s code, but it makes no difference.
    You then decide to add `NSLog` statements, but they don’t print. Since there are
    a number of `if/else` statements inside this method, you eventually decide to
    add an `NSLog` at the start or end of the function. It still won’t log anything.
    Then you consider the calling code, and so on and so on. Eventually, you realize
    the pointer to the class whose method didn’t run is nil. Sound familiar?


    **Tip** Whenever you find and fix a bug caused by an assumption that didn’t hold
    true, you should add an assertion in case it happens again.


    To avoid such situations, double-check such assignments with an assertion—especially,
    if one of the failure points includes human error, such as making a typo. For
    instance, in *GameScene.m*, several ivars are declared (as shown in [Listing 14-6](#part0025.html#list6)),
    which are supposed to be assigned by editing the node’s *doc root var* setting
    in SpriteBuilder. Some are obtained by a call to `getChildByName:`, which assumes
    there’s a node matching that name, and maybe even assuming there is only one node
    with that name.


    [***Listing 14-6***](#part0025.html#_list6). These ivars are partially assigned
    by SpriteBuilder, by using `getChildByName` or by other means


    ```

    @implementation GameScene

    {

        __weak CCNode* _levelNode;

        __weak CCPhysicsNode* _physicsNode;

        __weak CCNode* _playerNode;

        __weak CCNode* _backgroundNode;

        __weak GameMenuLayer* _gameMenuLayer;

        __weak GameMenuLayer* _popoverMenuLayer;


    // Other ivars omitted for brevity...

    }

    ```


    A lot can go wrong here, and it’s quite common to forget to assign the *doc root
    var* in SpriteBuilder or to make a typo in the node’s name. Or you might assign
    the *doc root var* to the wrong node or in the wrong CCB file, or you might edit
    a node’s name in the Timeline rather than its name property. It is good style
    to verify the assumption that these variables have to be non-nil after a given
    point during the initialization of the class.


    For instance, the end of the `loadLevelNamed:` method in [Listing 14-7](#part0025.html#list7)
    would be a good place to assert that crucial ivars are non-nil.


    [***Listing 14-7***](#part0025.html#_list7). Asserting that specific ivars are
    non-nil after the level was loaded


    ```

    -(void) loadLevelNamed:(NSString*)levelCCB

    {

        // Existing code omitted for brevity...


    NSAssert1(_physicsNode, @"physics node not found in level: %@", levelCCB);

        NSAssert1(_backgroundNode, @"bg node not found in level: %@", levelCCB);

        NSAssert1(_playerNode, @"player node not found in level: %@", levelCCB);

    }

    ```


    To test a pointer variable for being non-nil, it suffices to just write the ivar’s
    name. In a condition or assertion, writing `_playerNode` is equal to writing `_playerNode
    != nil`.


    You can also use the same format strings as in `NSLog`; however, with `NSAssert`
    being a macro and not an actual C function, you have to use `NSAssert1` through
    `NSAssert5` to match the number of format-string parameters. In the preceding
    example, there’s one format-string parameter, `levelCCB`, so `NSAssert1` needed
    to be used.


    An assertion is said to have failed when its condition evaluates to false (`NO`).
    The `NSAssert` macro then raises an exception, which causes Xcode to halt program
    execution to show you the offending line of code—much like in [Figure 14-5](#part0025.html#Fig5).


    Assertions are evaluated only in debug builds. Still you ought to limit the use
    of assertions in code that runs every frame because this can slow down your app
    in debug builds. You can switch between Debug and Release build configurations
    by choosing *Product* ![image](images/00008.jpeg) *Scheme* ![image](images/00008.jpeg)
    *Edit Scheme* in Xcode. Then select the *Run* profile, where you’ll find the *Build
    Configuration* setting on the *Info* tab.


    **Caution** Since assertions are evaluated only in debug builds, it is crucial
    to avoid running any code or calling any method in the assertion’s condition that
    alters the program state. Otherwise, the program will behave differently in debug
    and release builds.


    ## Adding Breakpoints


    Breakpoints enable you to halt (pause) program execution at a specific line of
    code. Optionally, you can edit conditions that need to be met for the breakpoint
    to trigger.'
