- fmt: '# Springboard Implementation Guide


    ## Setting Up Rest Length


    Select the `Enable` check box next to the `Rest length` field to enable the spring’s
    desired resting length, and then enter `10` in the `Rest length` field. This will
    be the size the spring will want to expand or shrink to whenever it can. If enabled,
    the `Rest length` property adds a drag handle on the spring joint as in [Figure
    9-21](#part0019.html#Fig21). To make the spring pull harder toward the `Body A`
    anchor, increase `Stiffness` to `90`.


    ![9781484202630_Fig09-21.jpg](images/00142.jpeg)


    [Figure 9-21](#part0019.html#_Fig21). A spring joint with rest length enabled
    has a draggable length handle


    Most likely, the joint will not point straight down onto the springboard, due
    to the springstopper’s position. You generally have two options: edit the joint’s
    anchor, or change the position of the node the joint is attached to. The latter
    option is always preferred whenever you are free to move the node. Select the
    `springstopper` node, and change its position to `0x64`.


    Notice that whenever you move a node, the joint anchor attached to it will move
    along with it. This may or may not be what you want. It is generally advisable
    to move the nodes into their desired positions before adding and connecting joints.
    Also note that joint anchors need not be on or inside the connected node’s collision
    shape or texture area. If the body is dynamic, it will “feel” the force at that
    point even if the point isn’t near the shape or sprite—consider the joint’s force
    acting more like magnetism than someone actually grabbing and pulling the object.


    ## Testing the Springboard for the First Time


    Naturally, you’ll need to place an instance of the `Spring.ccb` onto `Level1.ccb`.
    Place it near the player’s starting point so that you can immediately see it in
    the game. You should move the spring instance into the `chains & ropes & springs`
    node to ensure the spring’s draw order is the same as the draw order of the chains
    and ropes.


    You should place the spring so that the base seems to be glued onto a surface
    of a border sprite. No need to be perfect, though.


    Publish, build, and run the project. You should find that the spring is pulled
    out and away from the shaft by an invisible spring. And this happens instantly
    when the level starts.


    If the spring doesn’t come out of the shaft easily or does not come out at all,
    verify that the shaft and bolt collision shapes don’t touch or overlap, and that
    they are both almost parallel to each other. Refer to [Figure 9-20](#part0019.html#Fig20)
    for a suitable example.


    ## Blocking the Spring’s Movement


    Let’s tackle the first problem: stopping the spring so that it won’t leave the
    shaft. The springstopper will get that job.


    Open `Spring.ccb`, and select the `springstopper` node. On the `Item Physics`
    tab, enter `springstopper` in the `Categories` field and enter `spring` in the
    `Masks` field.


    **Caution** Be sure to enter `springstopper`, not `springboard`, in `Categories`
    and `Masks`. For some reason, I kept mixing the two up. If the collisions in this
    section won’t work, be sure to double-check the `springstopper` label.


    You also need to edit the stopper’s collision shape. The main problem right now
    is that it’s only about half as wide as it ought to be. Drag the two leftmost
    points to the left and the two rightmost points to the right so that the collision
    shape spans the full width of the springboard base. The height of the springstopper’s
    collision shape doesn’t matter, but its lower horizontal collision segment should
    be almost parallel to the horizontal axis. (See [Figure 9-22](#part0019.html#Fig22).)


    ![9781484202630_Fig09-22.jpg](images/00143.jpeg)


    [Figure 9-22](#part0019.html#_Fig22). The springstopper’s collision shape


    The springstopper is supposed to suddenly prevent the spring from expanding any
    further. It ought to keep the spring in its shaft so that it can’t move to the
    side, and it gives the impression of a spring that is actually extending upward
    due to actual spring force rather than being pulled from the outside.


    Before you can test this, you have to select the `springboard_spring`. On the
    `Item Physics` tab, enter `spring` in the `Categories` field and enter `springstopper,
    player, obstacle` in the `Masks` field. This will make the spring the only body
    that will collide with the springstopper.


    To ensure collisions with the player continue to work, you also have to open `Player.ccb`
    and then add `spring` to the player sprite’s `Masks` field so that it contains
    the following labels: `trigger, border, obstacle, spring`.


    And if you want the spring to collide with the chains and ropes, you’ll have to
    edit `Chain.ccb` and `Rope.ccb` in order to add `spring` to each physics body’s
    `Masks` field.


    **Note** The springboard’s base (`springstopper_metal`) needs no specific `Category`
    or `Masks` settings. Because it’s a static body, it won’t collide with other static
    bodies anyway, and all other bodies should certainly collide with the springboard
    base.


    If you run this now, you will notice that the spring is still passing through
    the `springstopper` node. There’s one minor yet important detail I haven’t mentioned
    yet. Select the `CCPhysicsSpringJoint` in `Spring.ccb`, and switch to the `Item
    Properties` tab. You’ll see the `Collide bodies` check box isn’t selected. This
    means that the two bodies connected to this joint will not collide, regardless
    of their collision categories and masks. In this case, you want the springboard
    to stop at the springstopper, so select the `Collide bodies` check box.


    You can now publish and try this out. You may want to enable physics debug drawing
    to verify that the springboard is still slightly inside the shaft when it stops
    at the springstopper. If it isn’t, simply increase or decrease the height of the
    bottom segment of the springstopper’s collision shape. Also, verify that the player
    isn’t blocked by the springstopper.


    ## Adding a Spring Lock


    A springboard that springs up the instant the level starts is pretty useless.
    You can easily turn this springboard into a touch-activated spring that can even
    reset itself to its locked position after a short time by using a distance joint.


    In `Spring.ccb`, drag and drop a `Physics Distance Joint` onto the stage. Connect
    `Body A` with the springstopper. This will generate a static “world anchor” for
    this joint end, so it doesn’t actually matter what the position of the connected
    static physics body is. In fact, you’ll move that anchor far away shortly. Connect
    `Body B` with the `springboard_spring`. On the joint’s `Item Properties` tab,
    change `Anchor A` to `0x-200`. This moves the world anchor far below the spring.
    Set `Anchor B` to `32x32`, which about centers that end of the joint on the spring.


    The trick now is to enable both the `Minimum distance` and `Maximum distance`
    check boxes. By default, the distances encompass the full length of the joint
    as it is now. The joint will also draw two drag handles similar to the joint shown
    in [Figure 9-21](#part0019.html#Fig21). Don’t drag them. However, if you did drag
    them, you could click the `Enable` check box twice so that it is turned off and
    on. Doing this will reset the `Minimum distance` and `Maximum distance` fields.


    This distance joint now allows absolutely no movement away from or toward its
    world anchor. Even without the spring joint pulling on the spring, it will rest
    in place now. Give it a try.'
