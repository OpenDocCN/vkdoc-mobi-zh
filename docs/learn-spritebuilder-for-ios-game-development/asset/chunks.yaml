- fmt: 'I can’t possibly describe how to precisely arrange these images—feel free
    to be creative. Should you not have any images available, you can simply use `Color
    Node` and `Gradient Node` instances as placeholders for real images. The resulting
    timeline might resemble the one in [Figure 3-14](#part0012.html#Fig14).


    ![9781484202630_Fig03-14.jpg](images/00053.jpeg)


    [Figure 3-14](#part0012.html#_Fig14). Timeline of the `Background1.ccb` parallax
    layers with sprites


    **Tip**  To avoid accidentally moving or otherwise editing a layer and the nodes
    it contains, you can click in the Lock column in the Timeline so that a Lock symbol
    appears to the right of the node’s name. When the lock is active, all of the node’s
    properties will not be editable, all Item Properties fields are grayed out, and
    the same applies to the locked node’s children.


    To further ease editing, click on the eye column just left of the lock column
    to hide a node and its children. Contrary to a node’s `Visible` property check
    box on the `Item Properties` pane, the eye column can be used to hide nodes within
    `SpriteBuilder`. When you publish and run the app, nodes without the eye symbol
    will still be visible in the app.


    Whether you use your own images, the ones provided with the book, or just color
    nodes, keep this in mind: it’s important to add a couple visible nodes to each
    layer and position them so that they are at least partially inside each layer’s
    extents, as visualized by the color nodes you’ve added in the previous step. Otherwise,
    you won’t be able to enjoy the parallaxing effect.


    The result of your background layer editing operation might resemble something
    like what’s shown in [Figure 3-15](#part0012.html#Fig15).


    ![9781484202630_Fig03-15.jpg](images/00054.jpeg)


    [Figure 3-15](#part0012.html#_Fig15). `Background1.ccb` contents after adding
    graphics to parallax layers


    Before you get to program the parallax scrolling, open `Level1.ccb` in `SpriteBuilder`.


    At this point, you should remove any extraneous nodes from `Level1.ccb` that you
    may have added while testing scrolling. Also, remove the original background gradient
    node since that’s now part of the `Background1.ccb`. To delete a node, select
    it and use `Edit` ![image](images/00008.jpeg) `Delete` or press `Backspace`. You
    should end up with an empty stage with just the player node on it. If you accidentally
    removed the player, just drag and drop it from the `Tileless Editor View` onto
    the stage once more.


    Switch to the `Tileless Editor View`. In the list should be a section labeled
    *Parallax*, which contains a preview image of `Background1.ccb`. For brevity,
    I’ve unchecked all the `Filter` folders currently not needed in [Figure 3-16](#part0012.html#Fig16).


    ![9781484202630_Fig03-16.jpg](images/00055.jpeg)


    [Figure 3-16](#part0012.html#_Fig16). `Tileless Editor View` shows a preview image
    of `Background1.CCB`


    Now you can drag and drop the `Background1` from the `Tileless Editor View` onto
    the `Level1` stage to create a `Sub File` node referencing `Background1.ccb`.
    Then change its position to `0,0` to align it perfectly with the stage borders.
    Make sure you set its `Name` property to `"background"` because you’ll soon add
    code to get a reference to the node by this name. The `Name` property is on the
    `Item Properties` tab in the `Details Inspector`. Changing the node’s name in
    the Timeline will *not* make it accessible by name via code.


    Oh, hey! The player’s gone. Hmmm...it’s probably behind the background now.


    Select the player node in the Timeline, and drag and drop it so that it is below
    the background node in the Timeline hierarchy. Make sure it doesn’t become a child
    of the background; it should be on the same level as the background. [Figure 3-17](#part0012.html#Fig17)
    is what the `Level1` Timeline should resemble now, with the background node above
    the player node.


    ![9781484202630_Fig03-17.jpg](images/00056.jpeg)


    [Figure 3-17](#part0012.html#_Fig17). Timeline of `Level1.ccb` at the current
    stage


    You can publish, build, and run now to check out the new background. Notice that
    there’s no parallaxing effect yet, and as you move from left to right the background
    layers seem to disappear one by one.


    **Caution**  If you notice the game running slowly in the iOS Simulator at this
    point, there’s no need to worry. The iOS Simulator is terribly slow when it comes
    to rendering graphics—it’s a software renderer that doesn’t use your Mac’s powerful
    graphics hardware at all! Apple chose to sacrifice performance in order to have
    the iOS Simulator’s output match exactly what you would see on a device. If you
    want to verify performance of an app **always** test by running the app on a device.


    The same goes for memory usage—the iOS Simulator can take advantages of all the
    free memory available on your Mac, so it’s very unlikely to run into low memory
    situations in the iOS Simulator. On the other hand, iOS devices have at most 1
    GB of RAM, of which only a fraction is available to apps. The earlier and more
    often you start testing on an actual device, the better.


    While I’m at it, know that the iPhone 4’s performance is significantly behind
    all other devices, including its iPhone 3GS predecessor. The iPhone 4 has to render
    four times as many pixels due to its Retina screen, yet its technical specs clock
    it in at just about 33% faster CPU and GPU compared to the iPhone 3GS.


    Prepare to Parallax in 3, 2, 1...


    To get the background layers to parallax requires some setup steps. The very first
    thing to do is introduce a physics node into the equation, and then change the
    player node to become a child node of the physics node. From then on, the physics
    node will be the level’s content container rather than the `Level1.ccb` itself.


    **Note**  I’ll explain the use of the physics node in the next chapter. Technically,
    you could use any other node type for the time being, but you’ll need a physics
    node in the next chapter. Because replacing a node with one of a different type
    isn’t currently possible in `SpriteBuilder`, it makes sense to use the physics
    node right away.


    The main reason for adding the player (and other game objects) as the child of
    another node is to be able to move the level contents independently from the parallaxing
    background. If you were to continue using the `Level1.ccb` root node as the player’s
    parent node, the changes made to the player’s parent position would offset all
    of the `Level1.ccb` child nodes, including the background. That would make the
    background scrolling code more complicated and harder to understand, and it would
    be difficult to add stationary nodes, such as the in-game pause button to the
    level.


    From the `Node Library View`, drag and drop a physics node onto the `Level1.ccb`
    stage. Set its position to `0,0`, and change its `Name` property to `"physics"`
    (that’s for the next chapter). In the Timeline view, drag and drop the player
    node so that it becomes a child of the `CCPhysicsNode` as in [Figure 3-18](#part0012.html#Fig18)
    by dropping it exactly on the `CCPhysicsNode`.


    ![9781484202630_Fig03-18.jpg](images/00057.jpeg)


    [Figure 3-18](#part0012.html#_Fig18). The player node is now a child of a `CCPhysicsNode`


    **Note**  You may have noticed that you can’t drag and drop the player node onto
    the background node. This is because the background node is a `Sub File` (`CCBFile`)
    node, which does not accept child nodes. There are other nodes that can’t have
    child nodes: `Particle System`, `Label TTF`, `Label BM-Font`, `Button`, `Text
    Field`, `Slider`, and `Scroll View`. This limitation is imposed on nodes that
    create or manage their branch of the node hierarchy. For instance, a button actually
    contains a sprite and a label node as children, while `Scroll View` and `Sub File`
    nodes “inherit” the nodes of a CCB file, even though these nodes aren’t shown
    in the Timeline.'
