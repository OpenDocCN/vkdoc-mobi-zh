    \ 32 个独特的类别。请参阅第 4 章中关于碰撞类别和遮罩的段落。  \n\n这个思想实验有助于隔离需要编辑其类别和遮罩的碰撞参与者：`player`（玩家）、`trigger`（触发器）、`border`（边界）和`obstacle`（障碍物）。稍后您还会将弹簧加入其中。\
