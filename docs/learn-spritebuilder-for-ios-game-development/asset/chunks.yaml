    The `updateTriggers:` method simply reduces the `triggerCount` property of each
    trigger by one. It assumes that all triggers of the same name start with the same
    `triggerCount`; otherwise, some triggers may trigger more often than others, which
    is probably not what you want. Specifically, it doesn’t allow you to combine `TriggerOnce.ccb`
    and `TriggerForever.ccb` to trigger the same targets. If that’s what you need,
    you would have to update `cleanupTriggers:` so that it only removes triggers whose
    `triggerCount` has reached 0 and where the trigger isn’t set to repeat forever.


    The `cleanupTriggers:` method then tests the current trigger’s `_triggerCount`,
    which has just been decreased. If it is 0 or less, it can be assumed that all
    the triggers have done their job and can be removed. As I said earlier, each trigger
    is the child of a `CCNode`, the root node of the `TriggerOnce.ccb`, so it is best
    to remove the trigger’s parent by sending it the `removeFromParent` message. Removing
    the parent will also remove any child nodes, including the trigger node itself.


    Considering that these triggers have done their job, neither the targets’ nor
    the triggers’ `NSPointerArray` are needed anymore. Hence, they are being removed
    from the `targetArrays` and `triggerArrays`.


    ## Informing Triggers About Collisions


    What’s left at this point is to actually send the `triggerActivatedBy:` message
    to a `Trigger` instance on collision, and implement a class that conforms to the
    `TriggerDelegate` protocol that then runs custom code when its `didTriggerWithNode:`
    selector runs.


    This is where the `Collision` type of the color node in the `TriggerOnce.ccb`
    comes into play. You’ve set this field to `trigger`. Therefore, you should add
    a collision method to `GameScene.m` whose third parameter is named `trigger`.


    Add the code in [Listing 5-14](#part0014.html#list14) at the end of `GameScene.m`,
    just above the `@end` keyword.


    [***Listing 5-14***](#part0014.html#_list14). Responding to collisions between
    player and trigger nodes


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                             trigger:(Trigger *)trigger

    {

        [trigger triggerActivatedBy:player];


    // return NO to allow the bodies to pass through each other

        return NO;

    }

    ```


    Notice that the third parameter is a pointer to a `Trigger` instance rather than
    a `CCNode` instance. You can declare the parameter to be a `Trigger*` instead
    of `CCNode*` under the assumption that the `trigger` parameter will always be
    a `Trigger` class instance. If it is not, it will result in a “unrecognized selector
    sent to instance” error.


    You will also have to import the `Trigger.h` in the `GameScene.m` file. Add the
    following line at the top of the `GameScene.m` file, just below the other `#import`
    lines:


    ```

    #import "Trigger.h"

    ```


    Importing the `Trigger.h` file will make the `Trigger` class known to the `GameScene`
    class. This will get rid of the “Use of undeclared identifier ''Trigger''” error.


    ## Triggering Target Nodes


    Every target node that’s supposed to be activated by a trigger needs to have the
    following:


    *   A custom class assigned to the node in SpriteBuilder.

    *   The custom class’ header needs to `#import "Trigger.h"`.

    *   The custom class’ `@interface` needs to adopt the `TriggerDelegate` protocol.

    *   The custom class’ `@implementation` needs to have a `–(void) didTriggerWithNode:(CCNode*)activator`
    method with the desired functionality.


    Since playing an animation when activated by a trigger will be a common use case,
    it makes sense to write a generic class `PlayTimelineWhenTriggered`. But before
    you write this class, open `Saw1_noautoplay.ccb` in SpriteBuilder, and then select
    the root node. Do **not** select the saw sprite. Switch to the Item Code Connections
    tab, and enter `PlayTimelineWhenTriggered` in the Custom class field.


    **Caution** The `PlayTimelineWhenTriggered` class inherits from `CCNode`. This
    is why it won’t work as a custom class of a sprite node that inherits from `CCSprite`.
    Custom classes for sprite nodes need to inherit from the `CCSprite` class. The
    same is true for other node types—for instance, the custom class of a button needs
    to inherit from `CCButton`.


    You should return to Xcode now to add the `PlayTimelineWhenTriggered` class.


    Right-click the Source group and select New File. Once again, you’ll go through
    the dialogs in [Figure 2-9](#part0011.html#Fig9) and [Figure 2-10](#part0011.html#Fig10).
    Name the class `PlayTimelineWhenTriggered`, and make it a Subclass of `CCNode`
    before clicking Next to create the files. Open the `PlayTimelineWhenTriggered.h`
    file, and enhance it with the code highlighted in [Listing 5-15](#part0014.html#list15).


    [***Listing 5-15***](#part0014.html#_list15). Extending the PlayTimelineWhenTriggered
    class to become a TriggerDelegate


    ```

    #import "CCNode.h"

    #import "Trigger.h"


    @interface PlayTimelineWhenTriggered : CCNode <TriggerDelegate>


    @property NSString* timelineName;


    @end

    ```


    Adopting the `TriggerDelegate` protocol is necessary to allow instances of this
    class to be used as a target by the `Trigger` class. The `timelineName` property
    is just to allow more flexibility for this class.


    If `timelineName` is `nil` or an empty string, the class will play the Default
    Timeline when activated; otherwise, it will attempt to play the Timeline whose
    name is given by `timelineName`. In any node where you set the `PlayTimelineWhenTriggered`
    class as its Custom class, you can then add a custom property `timelineName` of
    type String that allows you to specify the name of the Timeline to be played.
    Refer to [Figure 4-2](#part0013.html#Fig2) and [Figure 4-3](#part0013.html#Fig3)
    if you don’t remember how to add custom properties to a node.


    Let’s move on to the `PlayTimelineWhenTriggered.m`, shown in its entirety in [Listing
    5-16](#part0014.html#list16). I suppose I needn’t say this anymore: make your
    `PlayTimelineWhenTriggered.m` look like the one in [Listing 5-16](#part0014.html#list16).


    [***Listing 5-16***](#part0014.html#_list16). Playing a Timeline when triggered


    ```

    #import "PlayTimelineWhenTriggered.h"


    @implementation PlayTimelineWhenTriggered


    -(void) didLoadFromCCB

    {

        if (_timelineName.length == 0)

        {

            _timelineName = @"Default Timeline";

        }

    }


    -(void) didTriggerWithNode:(CCNode*)activator

    {

         [self.animationManager runAnimationsForSequenceNamed:_timelineName];

    }


    @end

    ```


    The `didLoadFromCCB` method is used to assign the `@"Default Timeline"` string
    to `_timelineName` if `_timelineName` is initially either an empty string or `nil`.
    The `_timelineName` ivar is automatically created by the compiler just by adding
    the `@property` to the class’ `@interface`. The `didTriggerWithNode:` method plays
    the animation specified by `_timelineName` when a `Trigger` activates it.


    Quite simple, isn’t it? You will probably need to create many variants of classes
    implementing the `TriggerDelegate` protocol to perform all kinds of different
    things when triggers are activated. But for each class, you should strive to use
    custom properties to allow yourself or your team to alter the class’ behavior.


    If you publish, build, and run the app and move the player into a trigger area
    that activates the `Saw1_noautoplay.ccb`, it will crash.


