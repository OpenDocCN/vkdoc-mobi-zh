    Setting Up Vertices and Texture Coordinates


    You surely noticed that the player’s friendly face is stuck to its original location.
    It won’t move at all with the bodies. In fact, with the custom draw code you’re
    going to implement, the sprite position will never change. Instead, you’ll simply
    draw the sprite’s texture at a location determined by the center node and use
    a shape determined by the circumference nodes.


    Even though the soft body is anything but a coherent body, that’s exactly what
    will allow you to see how the drawing code works. It also allows you to see what
    happens if the soft-body setup is somehow askew, be it because of an editing mistake
    or because the soft-body object has folded in on itself.


    Let’s start with the unspectacular part first: declaring variables, calling the
    setup code, and taking care of deallocation. Update *SoftBodyDrawNode.m* to the
    code in [Listing 10-8](#part0020.html#list8).


    [***Listing 10-8***](#part0020.html#_list8). *Variables, setup and* *dealloc*
    *of the SoftBodyDrawNode class*


    ```

    #import "SoftBodyDrawNode.h"


    @implementation SoftBodyDrawNode

    {

    @private

        int _numVertices;

        CCVertex* _vertices;

        CGPoint* _initialBodyPositions;


    CGFloat _enlargeTextureRadius;

        CGFloat _enlargeDrawRadius;

    }


    -(void) dealloc

    {

        [self freeAllocatedMemory];

    }


    -(void) freeAllocatedMemory

    {

        free(_vertices);

        _vertices = nil;


    free(_initialBodyPositions);

        _initialBodyPositions = nil;

    }


    -(void) didLoadFromCCB

    {

        [self setup];

    }


    @end

    ```


    For the drawing code, you’ll make use of the allocated memory buffer. This is
    classic C-programming memory management. Since CGPoint and CCVertex are struct
    data types, they cannot be added to regular Cocoa collection classes like NSArray
    without wrapping (boxing) them first with NSValue objects. Since wrapping and
    unwrapping creates unnecessary overhead, something you’ll want to avoid in tight
    render loops, and since C-style memory buffers really aren’t that complex, they
    are arguably the best choice.


    In this case, _vertices and _initialBodyPositions are pointers to a block of memory
    that will be allocated to hold exactly _numVertices CCVertex and CGPoint types.
    The vertices are used to draw the texture, while _initialBodyPositions gives you
    access to the positions of the bodies as they were designed in SpriteBuilder.
    They are needed to compute the texture coordinates from the nondeformed player,
    but theoretically you could also use them to determine the degree of deformation
    (the deviation from its original position) each body is currently experiencing.


    The freeAllocatedMemory method called by dealloc takes care of releasing the memory
    allocated to these pointers by calling free on them. The variables are also set
    to nil simply because it’s good style never to leave a pointer dangling. (A *dangling
    pointer* is a pointer that points to a deallocated block of memory.) Since both
    _vertices and _initialBodyPositions will be allocated manually using the C programming
    language’s standard library functions (malloc, calloc, realloc), their memory
    must also be deallocated manually using the free function.


    **Caution**  ARC frees you only from manually managing the memory of Objective-C
    class instances, but not memory allocated with C functions or the C language variant
    and the predecessor of Cocoa, named Core Foundation.


    CCVertex is a struct type exposed by the Cocos2D rendering API. See [Listing 10-9](#part0020.html#list9)
    for reference, with the fields shown in brackets.


    ***[Listing 10-9](#part0020.html#_list9).*** *The* *CCVertex type* *defines the
    vertex position, two texture coordinates,and a color property*


    ```

    typedef struct CCVertex {

        GLKVector4 position;  // position (x, y, z, w)

        GLKVector2 texCoord1, texCoord2;  // texture coordinates (x, y)

        GLKVector4 color;  // color (r, g, b, a)

    } CCVertex;

    ```'
