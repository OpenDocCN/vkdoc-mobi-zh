    \n### 初始化触发器和目标数组\n\n首先更新`Trigger.m`，使其与代码清单 5-7 类似。\n\n***代码清单 5-7***. 初始化触发器和目标存储字典的\
    \ Trigger 实现\n\n```objc\n#import \"Trigger.h\"\n\nstatic NSMutableDictionary*\
    \ targetArrays;\nstatic NSMutableDictionary* triggerArrays;\n\n@implementation\
    \ Trigger\n{\n    BOOL _repeatsForever;\n}\n\n-(void) didLoadFromCCB\n{\n    if\
    \ (targetArrays == nil)\n    {\n        targetArrays = [NSMutableDictionary dictionary];\n\
    \        triggerArrays = [NSMutableDictionary dictionary];\n    }\n\n    [targetArrays\
    \ removeAllObjects];\n    [triggerArrays removeAllObjects];\n\n    _repeatsForever\
    \ = (_triggerCount <= 0);\n}\n\n@end\n```\n\n首先，声明了两个静态的`NSMutableDictionary`变量。关键字`static`意味着这些变量将与`Trigger`类的所有实例共享。本质上，它们是全局变量，但由于它们在实现文件的范围内声明，因此只能由`Trigger.m`文件中的代码访问。\n\
    \n`@implementation`部分声明了一个实例变量`_repeatsForever`，它将用于确定此特定触发器实例是否永远不会自行移除。\n"
- fmt: "`didLoadFromCCB`方法包含两个全局字典的初始化和清理代码。如果`targetArrays`为`nil`，则会创建一个`NSMutableDictionary`实例并赋值。`triggerArrays`也执行相同操作，因为可以简单假设：如果`targetArrays`为`nil`，那么`triggerArrays`也将为`nil`。\n\
    \n接下来，两个字典都被要求执行`removeAllObjects`。乍看之下这有点奇怪，对吧？\n\n这里体现了前瞻性：最终你将能够切换关卡。由于这两个字典是全局（静态）变量，在切换关卡并呈现其他场景时，它们及其内容将保留在内存中。因此，在每个包含至少一个`Trigger`实例的新关卡中，需要清除这些字典中所有剩余的引用。\n\
    \n**注意**：让每个触发器都执行`removeAllObjects`似乎效率较低，因为只需执行一次即可，但我认为这还不足以证明需要添加额外代码，在每个`Trigger`实例创建时检查`targetArrays`和`triggerArrays`是否为空。无论你是这样做，还是直接对每个实例调用`removeAllObjects`方法，最终的工作量都差不多，但会增加更多代码。\n\
    \n最后，`_repeatsForever`被设置为`_triggerCount`小于或等于0的结果。这意味着如果`_triggerCount`初始为0或负值，触发器将重复执行。如果在SpriteBuilder中省略添加`triggerCount`自定义属性，就会出现这种情况，因为实例变量会被初始化为0。\n\
    \n**提示**：在Objective-C中，所有静态变量和实例变量始终初始化为0。对于`BOOL`类型实例变量，0等同于`NO`；对于`id`和Objective-C类指针变量，0等同于`nil`。此外，由于每个SpriteBuilder项目都启用了自动引用计数（ARC），每个`id`类型和Objective-C类指针的局部变量也会初始化为`nil`。唯一需要在读取前赋值的变量是原始数据类型的局部变量（如`BOOL`、`int`、`CGFloat`、`double`、`NSUInteger`等）以及C结构体和C指针（如`void*`）。\n\
    \n此版本的项目应能构建并运行无误，但触发器尚无法工作。\n\n### 查找触发器与目标\n\n下一步是为每个触发器收集一组目标。触发器只需通过触发器节点和目标节点使用相同的名称即可建立连接。同一个触发器不仅可以有多个目标，还可以有多个同名触发器激活相同的目标。\n\
    \n### 查找并存储触发器\n\n你应该将[清单5-8](#part0014.html#list8)添加到`Trigger.m`中的`@end`行上方。\n\
    \n```\n-(void) onEnter\n{\n    [super onEnter];\n\n    self.parent.visible = NO;\n\
    \n    NSAssert1(_parent.name.length > 0, @\"Trigger node has no name: %@\", self);\n\
    \    self.name = _parent.name;\n\n    NSPointerArray* triggers = [triggerArrays\
    \ objectForKey:_name];\n    if (triggers == nil)\n    {\n        triggers = [NSPointerArray\
    \ weakObjectsPointerArray];\n        [triggerArrays setObject:triggers forKey:_name];\n\
    \    }\n\n    [triggers addPointer:(void*)self];\n\n    if ([targetArrays objectForKey:_name]\
    \ == nil)\n    {\n        NSPointerArray* targets = [NSPointerArray weakObjectsPointerArray];\n\
    \        [targetArrays setObject:targets forKey:_name];\n\n        [self addTargetsTo:targets\
    \ searchInNode:self.scene];\n        NSAssert1(targets.count > 0, @\"no target\
    \ found for trigger named '%@'\", _name);\n    }\n}\n```\n\n请注意，你不能使用`didLoadFromCCB`来查找所有触发器和目标；相反，你必须使用`onEnter`。由于`didLoadFromCCB`在每个节点加载后立即运行，如果你在`didLoadFromCCB`中运行[清单5-8](#part0014.html#list8)中的代码，很可能目标或触发器节点尚未加载。你最早可以在节点层级结构中搜索所有目标和触发器节点的时机是`onEnter`运行时。`onEnter`方法会在每个节点实例作为子节点添加到另一个节点后发送给该实例。\n\
    \n**注意**：请注意`onEnter`需要调用其`[super onEnter]`实现。如果你省略调用`[super onEnter]`，编译器会发出警告。如果不调用父类实现，调度和输入事件将无法正常工作或工作不正常。始终关注编译器警告！警告旨在提高代码质量并让你意识到潜在问题。如果想了解特定警告及其修复方法，请搜索确切的警告或错误文本。\n\
    \n[清单5-8](#part0014.html#list8)中的首要任务是将触发器节点的可见状态设置为`NO`。实际上，它设置的是触发器的父节点。这是因为代表触发器区域视觉效果的彩色节点是带有自定义类`Trigger`的节点，但彩色节点是`TriggerOnce.ccb`根节点的子节点。如果我想设计更复杂的触发器（例如使用多个彩色节点），我倾向于隐藏根节点。\n\
    \n接下来，节点接管其父节点的名称。这是因为在`Level1.ccb`中，`Name`属性被赋值给引用`TriggerOnce.ccb`的子文件节点实例。这会将此名称赋值给`TriggerOnce.ccb`根节点，即彩色节点的父节点。通过`_parent.name`赋值给`self.name`只是为了方便，因为它允许你使用在`CCNode`类中声明的`_name`实例变量。\n\
    \n**提示**：由于忘记给触发器命名是常见错误，我决定在此处添加一个断言，如果`_parent.name.length`为0（意味着父节点的名称是`nil`或空字符串），它会警告你。此断言在两种情况下都会失败：如果`_parent.name`为`nil`，整个测试也会返回`nil`（即0），因为发送给`nil`对象的消息默认返回0。\n\
    \n你可能想知道为什么我没有直接赋值给`_name`实例变量，或者为什么通过`_parent.name`而不是`self.parent.name`获取名称。\n\
    \n根据经验法则，在仅读取变量值时，应优先使用实例变量（如果可用）。这会使代码更简洁，并且作为副作用，执行速度会稍快。但是，在为属性赋值时，最佳实践是通过`self.name`赋值给属性，而不是直接赋值给`_name`实例变量。原因在于`self.name\
    \ = @\"..\"`内部会运行属性设置器方法`[self setName:@\"..\"]`，该方法可能会执行其他代码。绕过属性设置器可能导致各种问题。如果你对直接赋值给实例变量的潜在副作用有任何疑虑，请始终赋值给属性或运行属性设置器方法。\n\
    \n[清单5-8](#part0014.html#list8)的下一个代码片段重印在[清单5-9](#part0014.html#list9)中，以便你专注于接下来讨论的代码。\n\
    \n```\nNSPointerArray* triggers = [triggerArrays objectForKey:_name];\nif (triggers\
    \ == nil)\n{\n    triggers = [NSPointerArray weakObjectsPointerArray];\n    [triggerArrays\
    \ setObject:triggers forKey:_name];\n}\n\n[triggers addPointer:(void*)self];\n\
    ```"
  raw: 'The didLoadFromCCB method contains initialization and cleanup code for the
    two global dictionaries. If targetArrays is nil, it will create an NSMutableDictionary
    instance and assign it. The same is done for triggerArrays because it can simply
    be assumed that if targetArrays is nil then triggerArrays will be nil, too.


    Next, both dictionaries are instructed to removeAllObjects. That’s kind of odd
    on first sight, right?


    Here’s to foresight: eventually you’ll be able to change levels. Given that the
    two dictionaries are global (static) variables, they and their contents will remain
    in memory as you switch levels and present other scenes. So in every new level
    that contains at least one Trigger instance, those dictionaries need to be cleared
    of any remaining references.


    **Note**  It may seem kind of inefficient to have every trigger removeAllObjects
    when doing so once would suffice, but I find it’s not enough to justify adding
    extra code to check whether targetArrays and triggerArrays are empty every time
    a Trigger instance is created. Whether you do that or simply issue the removeAllObjects
    method for every instance amounts to the same work anyway, but it’ll be more code.


    Finally, _repeatsForever is set to the result of _triggerCount being equal to
    or less than 0\. This means the trigger will be repeating if _triggerCount is
    initially 0 or a negative value. This would be the case if you’d simply omit adding
    the triggerCount custom property in SpriteBuilder because ivars are initialized
    to 0.


    **Tip**  In Objective-C, all static variables and all ivars are always initialized
    to 0\. For BOOL ivars, 0 equals NO; for id and Objective-C class pointer variables,
    0 equals nil. Furthermore, since automatic reference counting (ARC) is enabled
    in every SpriteBuilder project, each local variable of type id and Objective-C
    class pointers are initialized to nil as well. The only variables you have to
    assign a value before reading from them are local variables that are primitive
    data types (i.e., BOOL, int, CGFloat, double, NSUInteger and similar) and C structs
    and C pointers like void*.


    This version of the project should build and run without errors, but triggers
    won’t be functional yet.


    Finding Triggers and Targets


    The next step is to collect a set of targets for each trigger. Triggers connect
    to targets simply by using the same name for trigger and target nodes. Not only
    can there be multiple targets for a single trigger, there can also be multiple
    triggers of the same name activating the same target(s).


    Finding and Storing Triggers


    You should add [Listing 5-8](#part0014.html#list8) to Trigger.m just above the
    @end line.


    [***Listing 5-8***](#part0014.html#_list8). Storing the trigger and target nodes
    in onEnter


    ```

    -(void) onEnter

    {

        [super onEnter];


    self.parent.visible = NO;


    NSAssert1(_parent.name.length > 0, @"Trigger node has no name: %@", self);

        self.name = _parent.name;


    NSPointerArray* triggers = [triggerArrays objectForKey:_name];

        if (triggers == nil)

        {

            triggers = [NSPointerArray weakObjectsPointerArray];

            [triggerArrays setObject:triggers forKey:_name];

        }


    [triggers addPointer:(void*)self];


    if ([targetArrays objectForKey:_name] == nil)

        {

            NSPointerArray* targets = [NSPointerArray weakObjectsPointerArray];

            [targetArrays setObject:targets forKey:_name];


    [self addTargetsTo:targets searchInNode:self.scene];

            NSAssert1(targets.count > 0, @"no target found for trigger named ''%@''",
    _name);

        }

    }

    ```


    Notice that you can’t use didLoadFromCCB to find all triggers and targets; instead,
    you have to use onEnter. Since didLoadFromCCB runs immediately after each individual
    node has been loaded, there likely will be target or trigger nodes that haven’t
    been loaded yet if you were to run the code in [Listing 5-8](#part0014.html#list8)
    in didLoadFromCCB. The soonest you can start searching for all target and trigger
    nodes in the node hierarchy is when onEnter runs. The onEnter method is sent to
    each node instance after it has been added as a child to another node.


    **Caution**  Notice that onEnter requires calling its [super onEnter] implementation.
    The compiler will warn you if you omit calling [super onEnter]. If you don’t call
    the super implementation, scheduling and input events will not work or won’t work
    correctly. Always heed compiler warnings! Warnings are there to improve your code
    quality and to make you aware of potential issues. Search for the exact warning
    or error text if you want to find out more about a specific warning and how to
    fix it.


    The first order of business in [Listing 5-8](#part0014.html#list8) is to set the
    visible status of the trigger node to NO. Actually, it’s setting the trigger’s
    parent node. That’s because the color node representing the trigger area visually
    is the node with the custom class Trigger. But the color node is a child node
    of the TriggerOnce.ccb root node. I prefer to hide the root node in case I want
    to design more complex triggers with multiple color nodes, for instance.


    Next the node takes over its parent’s name. That is because in Level1.ccb the
    Name property is assigned to the Sub File node instance that references the TriggerOnce.ccb.
    That ends up assigning this name to the TriggerOnce.ccb root node, the color node’s
    parent. Assigning self.name from _parent.name is merely a convenience because
    it allows you to use the _name ivar declared in the CCNode class.


    **Tip**  Since forgetting to give a trigger a name can be a common mistake, I
    decided to add an assertion here that warns you if the _parent.name.length is
    0—meaning the parent’s name is either nil or an empty string. This assertion will
    fail in both cases: if _parent.name is nil, the entire test will also return nil
    (aka 0) because messages sent to nil objects return 0 by default.


    You may be wondering why I did not assign directly to the _name ivar or why I
    got the name via _parent.name rather than self.parent.name.


    As a rule of thumb, you should prefer to use an ivar, where available, when merely
    reading its value. It makes the code shorter and, as a side-effect, slightly faster.
    However, when assigning a value to a property, it is best practice to assign to
    the property via self.name rather than assigning to the _name ivar directly. The
    rationale here is that self.name = @".." internally runs the property setter method
    [self setName:@".."], which may perform additional code. Bypassing the property
    setter can result in all kinds of issues. If you have the slightest doubt about
    possible side-effects of assigning directly to an ivar, always assign to the property
    or run the property setter method instead.


    The next code fragment of [Listing 5-8](#part0014.html#list8) is reprinted in
    [Listing 5-9](#part0014.html#list9) to allow you to focus on just the code discussed
    next.


    [***Listing 5-9***](#part0014.html#_list9). Creating a triggers NSPointerArray
    and assigning self to it


    ```

    NSPointerArray* triggers = [triggerArrays objectForKey:_name];

    if (triggers == nil)

    {

        triggers = [NSPointerArray weakObjectsPointerArray];

        [triggerArrays setObject:triggers forKey:_name];

    }


    [triggers addPointer:(void*)self];

    ```'
