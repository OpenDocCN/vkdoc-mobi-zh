    剩下要做的就是创建一个实际的暂停菜单弹出窗口，作为`Layer`类型的 CCB 文件。在其中，创建一个名为`resume game`的时间线动画，该动画有一个`Callbacks`关键帧，用于运行`resumeGameDidEnd`选择器。


    ## 创建暂停菜单弹出窗口


    对于此弹出菜单以及后续的弹出菜单，在 SpriteBuilder 的*文件视图*中的`UserInterface`文件夹下添加一个名为`Popovers`的子文件夹。然后右键单击`Popovers`文件夹，选择*新建文件*，创建一个类型为`Layer`的
    CCB 文档，命名为`PauseMenuLayer.ccb`。


    对于此弹出菜单和所有其他弹出菜单 CCB，你应做的第一件事是将根节点的*内容大小*属性设置为宽度和高度均为`100%`，以便将其缩放以匹配每个设备的屏幕尺寸。保持根节点选中状态，选择*项目代码连接*选项卡，并在*自定义类*中输入`GameMenuLayer`。这与`GameMenuLayer`的类是相同的。


    **注意**：对所有弹出菜单（包括`GameMenuLayer`本身）使用相同类的原因是，它们都共享大量公共代码。例如，它们都会暂停游戏，并且都有一个重启按钮。此外，`GameMenuLayer`中的代码简短明了。


    接下来，你需要添加一个比任何设备屏幕都稍小的背景图形，以便它可以轻松地在所有设备上居中。大约`320x240`是一个不错的尺寸。使用比任何屏幕尺寸都小的背景可以大大简化用户界面设计。你只需居中内容，完全忽略任何屏幕尺寸的考虑。只有从图层背景到屏幕边缘的距离会变化。


    从*节点库视图*中拖放一个*精灵*到舞台上，并将其*精灵帧*更改为`SpriteSheets/UserInterface/P_bg.png`。或者，你也可以从*无碎片编辑器视图*中拖放`P_bg`；你可能需要在*无碎片编辑器视图*下方的*筛选文件夹*列表中勾选*UserInterface*复选框。无论你如何创建精灵，都应将其位置类型设置为`%`，并将两个位置值都设置为`50`，以便精灵居中。


    **提示**：如果你因为图像太暗而难以看到精灵图像，请转到文档 ![image](img/00008.jpeg) 舞台颜色，并为舞台选择不同的背景颜色。


    你也必须为所有后续节点使用`%`位置。标签和按钮的实际布局由你决定，重要的是使图层中的所有节点成为背景精灵的子节点，这样它们的位置始终相对于背景精灵的左下角，而不是相对于屏幕的左下角。这样，如果你决定背景不应该居中而是稍微偏移，你可以将精灵与背景一起移动。


    从*节点库视图*添加一个*TTF 标签*，使其成为`P_bg`精灵的子节点，并将其位置类型更改为`%`。将其拖放到你喜欢的位置。哦，还要将*标签文字*字段改为类似`游戏暂停`的内容。你可能还想选择不同的字体或更改字体大小。


    接下来，从*节点库视图*中依次添加三个*按钮*节点。使它们成为`P_bg`精灵的子节点，并将它们的位置类型也改为`%`。然后将它们移动到适当的位置。参见图
    6-6 了解可能的结果。


    ![9781484202630_Fig06-06.jpg](img/00090.jpeg)


    **图 6-6**。完成的`PauseMenuLayer.ccb`


    对于每个按钮，在*项目属性*选项卡上执行以下步骤：


    *   根据正在编辑的按钮，将*标题*设置为`重新开始`、`退出`或`继续`。

    *   将*正常状态*和*高亮状态*的*精灵帧*都更改为相同的图像。你可能想使用来自`SpriteSheets/UserInterface`的以下图像：`P_restart.png`、`P_exit.png`、`P_resume.png`。

    *   对于*高亮状态*，将*背景颜色*和*标签颜色*都更改为灰色——例如，十六进制代码为`#999999`的网页颜色。这将在触摸按钮时提供视觉提示：在高亮状态下，它们会显得更暗。

    *   在*CCLabelTTF*部分，根据需要编辑*字体名称*和*字体大小*。你可能需要增加*水平内边距*，甚至增加*垂直内边距*，以使背景图像稍大，从而按钮文本完全包含在背景框中。


    编辑属性后，切换到*项目代码连接*选项卡。对于每个按钮，输入相应的*选择器*：`shouldRestartGame`、`shouldExitGame`和`shouldResumeGame`。


    你现在可以发布、构建并运行项目。然后点击暂停按钮查看你的新弹出菜单。请注意，在此阶段点击图层上的任何按钮都会导致崩溃。


    如果节点不在它们应该的位置，请验证父子关系是否正确，并且所有节点的位置类型都已设置为`%`。参考图 6-6 进行对照。


    ## 幕间：全屏弹出窗口


    一个仅临时替换当前场景的游戏内菜单是常见需求，开发者常常不知道如何实现它。

    '
- fmt: "通常，开发者会寻求使用场景推入（`push`）和弹出（`pop`）方法，甚至在保存和恢复游戏状态时替换场景。虽然这两种方法各有用途，但在不切换场景的情况下，在当前场景之上创建一个非破坏性的全屏“场景”其实非常简单。只需对你刚刚创建的弹出层进行少量增强即可实现。让我们来试试。\n\
    \n从“节点库视图”（*Node Library View*）中拖拽一个“颜色节点”（*Color Node*）到`PauseMenuLayer.ccb`的画布上。将时间轴中的颜色节点移动到`P_bg`背景精灵的上方。确保颜色节点不是背景精灵的子节点。然后将颜色节点的位置设置为`0,0`，并将“内容大小”（*Content\
    \ size*）改为使用“%”类型，同时将宽度和高度的值都设为`100`。这样颜色节点就会扩展以填满整个屏幕。\n\n如果你在游戏中运行并点击暂停按钮，游戏视图会突然消失。这是因为你看到的是一个具有纯色背景的全屏弹出菜单。如果你喜欢，也可以使用“渐变节点”（*Gradient\
    \ Node*）来代替颜色节点。\n\n**提示**  如果在显示此类全屏弹出层时因帧率低而注意到卡顿，只需将背景中`_levelNode`的可见属性（`visible`）设置为`NO`。这将防止它在弹出层之后被渲染，从而提高渲染性能。\n\
    \n但等等，还有更多功能！除了全屏弹出层，你还可以在弹出层显示时调暗关卡视图。这很容易实现，只需将颜色节点的“颜色”（`Color`）属性改为黑色，然后将其“不透明度”（`Opacity`）设置为大约`0.5`即可。\n\
    \n你还可以调整颜色节点的“混合源”（`Blend src`）和“混合目标”（`Blend dst`）设置来创建额外的效果。尝试将“混合源”设置为`One`，将“混合目标”设置为`One\
    \ - Dst Color`以获得伪彩色效果。同时尝试更改颜色节点的颜色和不透明度。\n\n或者，将“混合源”设置为`One - Dst Color`，将“混合目标”设置为`Src\
    \ Alpha Saturate`，并将“不透明度”设置为`1`，颜色设置为白色，以创建照片负片效果，如[图6-7](#part0015.html#Fig7)所示。\n\
    \n![9781484202630_Fig06-07.jpg](images/00091.jpeg)\n\n[图 6-7](#part0015.html#_Fig7).\
    \ 在游戏中呈现的`PauseMenuLayer`，通过使用混合模式应用了照片负片效果\n\n**注意**  缩写`src`和`dst`分别代表“源”（*source*）和“目标”（*destination*）。这些属性指的是\
    \ OpenGL 混合模式，它们会影响重叠的源和目标缓冲区中像素颜色的混合方式。\n\n混合模式在渐变节点或任何其他节点上可能工作方式不同，甚至完全无效。在\
    \ SpriteBuilder 中更改混合模式也不会显示它们在游戏中的实际效果——你必须在模拟器或设备上测试混合模式的设置。\n\n当然，你也可以使用一个背景图像足够大以覆盖最大屏幕尺寸的“精灵”（*Sprite*），来替代颜色节点或`P_bg`精灵，从而创建一个带有全屏背景图像的全屏弹出层。\n\
    \n**使用 SceneManager 切换场景**\n\n此时，暂停弹出菜单中的重新开始和退出按钮还不会执行任何操作。甚至可能会导致崩溃。重新开始和退出按钮只是呈现一个新场景来移除当前场景，因此你无需担心关闭弹出层之类的事情。\n\
    \n由于你将要在项目的不同位置呈现场景，并且通常每个场景都应使用相同的转场效果来呈现，因此只使用一个方法来以特定方式呈现特定场景是完全合理的。这样，你就不必为了更改使用的转场类型或持续时间而浏览所有用于场景切换的代码。\n\
    \n一个只包含所谓“类”方法（类似于 C++ 中的静态方法）的类有助于提取那些不适合任何现有类的常见重复性任务。\n\n在 Xcode 中向“Source”组添加一个新的\
    \ Objective-C 类。将新类命名为`SceneManager`，并将“Subclass of”字段更改为`NSObject`（所有 Objective-C\
    \ 类的基类）。它不需要是`CCNode`，因为此类不会作为子节点添加到节点层次结构中。\n\n将[代码清单 6-10](#part0015.html#list10)中高亮显示的代码添加到`SceneManager.h`文件中。\n\
    \n[***代码清单 6-10***](#part0015.html#_list10). `SceneManager`接口仅声明类方法\n\n```\n#import\
    \ <Foundation/Foundation.h>\n\n@interface SceneManager : NSObject\n\n+(void) presentMainMenu;\n\
    +(void) presentGameScene;\n\n@end\n```\n\n`SceneManager.m`实现了这两个类方法——由开头的`+`字符表示。\n\
    \n为简洁起见，我将[代码清单 6-11](#part0015.html#list11)中的变量声明为`id`类型，并只给了它们单字母标识符，以便这些行足够短，避免在书中添加换行。当然，除非在不存在任何歧义的非常短的代码片段中，否则通常应避免使用单字母变量名。\n\
    \n[***代码清单 6-11***](#part0015.html#_list11). `SceneManager`使用特定的转场和持续时间呈现每个场景\n\
    \n```\n#import \"SceneManager.h\"\n\n@implementation SceneManager\n\n+(void) presentMainMenu\n\
    {\n    id s = [CCBReader loadAsScene:@\"MainScene\"];\n    id t = [CCTransition\
    \ transitionMoveInWithDirection:CCTransitionDirectionLeft\n                  \
    \                            duration:1.0];\n    [[CCDirector sharedDirector]\
    \ presentScene:s withTransition:t];\n}\n\n+(void) presentGameScene\n{\n    id\
    \ s = [CCBReader loadAsScene:@\"GameScene\"];\n    id t = [CCTransition transitionMoveInWithDirection:CCTransitionDirectionRight\n\
    \                                              duration:1.0];\n    [[CCDirector\
    \ sharedDirector] presentScene:s withTransition:t];\n}\n\n@end\n```\n\n**注意**  使用通用类型`id`代替指向特定\
    \ Objective-C 类的指针是完全合法的，并且实际上非常有用，如果你不需要对该特定对象执行任何操作，只需将其传递给其他方法。\n\n定义了`SceneManager`方法后，打开`GameMenuLayer.m`。在顶部，在其他`#import`行下方，添加[代码清单\
    \ 6-12](#part0015.html#list12)中的行，以使`SceneManager`类对`GameMenuLayer`实现文件可见。\n\n\
    [***代码清单 6-12***](#part0015.html#_list12). 添加`SceneManager`导入\n\n```\n#import\
    \ \"SceneManager.h\"\n```\n\n然后，在`shouldPauseGame`方法下方添加[代码清单 6-13](#part0015.html#list13)中的方法。\n\
    \n[***代码清单 6-13***](#part0015.html#_list13). 重新开始和退出按钮仅呈现一个场景\n\n```\n-(void)\
    \ shouldRestartGame\n{\n    [SceneManager presentGameScene];\n}\n\n-(void) shouldExitGame\n\
    {\n    [SceneManager presentMainMenu];\n}\n```\n\n请注意，调用`SceneManager`类方法不需要拥有`SceneManager`类的实例。你可以直接使用类名本身作为接收者来调用它们。类方法的缺点是无法访问类的状态——例如，如果`SceneManager`类有任何属性或实例变量（`ivars`），它们无法访问。\n\
    \n`SceneManager`纯粹作为一个实用工具类运行，执行重复的、无状态的代码，这些代码需要从其他各种类中访问以执行特定目的（呈现场景）。如果你有符合此描述的任务，应该考虑将其放在一个仅包含类方法的类中。\n\
    \n**添加回调关键帧**\n\n在恢复游戏之前，最好先通过动画移除暂停弹出菜单。这给用户一些时间准备恢复游戏，也许可以在关闭暂停菜单后引入一个 3..2..1\
    \ 的倒计时器。\n\n理论上，你可以为`animationManager.delegate`赋值并实现`completedAnimationSequenceNamed:`方法，以了解“恢复游戏”（*resume\
    \ game*）时间线是否播放完毕。"
  raw: 'Usually, developers are seeking to use push and pop scene methods, or even
    replace scenes while saving and restoring game states. While there’s use for both,
    it’s really simple to create a nondestructive full-screen “scene” on top of the
    current scene without having to change scenes. You can do that with minor enhancements
    to the popover layer you’ve just created. Let’s try it.


    Drag and drop a *Color Node* from the *Node Library View* onto the *PauseMenuLayer.ccb*
    stage. Move the color node in the Timeline so that it is above the P_bg background
    sprite. Be sure the color node is not a child of the background sprite. Then set
    the color node’s position to 0,0 and change *Content size* to use *%* types and
    *100* as the value for both width and height. This expands the color node to fill
    the screen.


    If you run this in the game and tap the pause button, suddenly your game view
    disappears. This is because you are looking at a full-screen popover menu with
    a solid color background. If you prefer, you can also use a *Gradient Node* instead
    of the color node.


    **Tip**  If you notice lag due to low framerate when displaying such a full-screen
    popover, simply set the visible property of the _levelNode in the background to
    NO. This will prevent it from being rendered behind the popover, improving rendering
    performance.


    But wait, there’s more to it! In addition to a full-screen popover, you can also
    dim the level view while the popover is presented. This is easily achieved by
    changing the color node’s Color property to black and then setting its Opacity
    to about 0.5.


    You can also play with the color node’s Blend src and Blend dst settings to create
    additional effects. Try setting Blend src to One and Blend dst to One - Dst Color
    to get false colors. Try changing the color node’s color and opacity, too.


    Or set Blend src to One - Dst Color and Blend dst to Src Alpha Saturate with Opacity
    set to 1 and white color to create a photo-negative effect as shown in [Figure
    6-7](#part0015.html#Fig7).


    ![9781484202630_Fig06-07.jpg](images/00091.jpeg)


    [Figure 6-7](#part0015.html#_Fig7). The PauseMenuLayer presented in the game with
    a photo-negative effect applied by using blend modes


    **Note**  The src and dst abbreviations stand for *source* and *destination*,
    respectively. These properties refer to OpenGL blend modes, which affect how the
    colors of pixels in overlapping source and destination buffers are blended together.


    The blend modes may work differently or not at all for a gradient node, or any
    other node for that matter. Changing blend modes in SpriteBuilder will also not
    show you the actual results as they appear in the game—you have to test blend-mode
    settings in the Simulator or on a device.


    Of course, you can also use a *Sprite* with a background image large enough to
    cover the largest screen size, either in place of the color node or instead of
    the P_bg sprite, in order to create a full-screen popover with a full-screen background
    image.


    Changing Scenes with SceneManager


    At this point, the restart and exit buttons in the Pause popover menu won’t do
    anything yet. Except maybe crash. The restart and exit buttons simply present
    a new scene that will remove the current scene, so you won’t have to worry about
    closing the popover or anything.


    Since you will be presenting scenes from various places throughout the project,
    and typically each scene should be presented with the same transition, it makes
    perfect sense to have only one method that presents a particular scene in a particular
    way. That way, you won’t have to skim all of your code for scene changes in order
    to change the type of transition used or its duration.


    A class that contains only so-called “class” methods (similar to static methods
    in C++) helps to extract such common, repetitive tasks that are unfitting to any
    existing class.


    Add a new Objective-C class to the Source group in Xcode. Name the new class **SceneManager**,
    and change the *Subclass of* field to NSObject, the base class of all Objective-C
    classes. It doesn’t need to be a *CCNode* because this class will not be added
    as a child to the node hierarchy.


    Add the code highlighted in [Listing 6-10](#part0015.html#list10) to the SceneManager.h
    file.


    [***Listing 6-10***](#part0015.html#_list10). The SceneManager interface declares
    only class methods


    ```

    #import <Foundation/Foundation.h>


    @interface SceneManager : NSObject


    +(void) presentMainMenu;

    +(void) presentGameScene;


    @end

    ```


    The SceneManager.m implements these two class methods—as denoted by the leading
    + character.


    For brevity, I declared the variables in [Listing 6-11](#part0015.html#list11)
    to be of type id and gave them only single-letter identifiers just so the lines
    are short enough to avoid having to add line breaks in the book. Of course, single-letter
    variable names should generally be avoided except for very short code fragments
    where there can’t be any ambiguities.


    [***Listing 6-11***](#part0015.html#_list11). SceneManager presents each scene
    with a specific transition and duration


    ```

    #import "SceneManager.h"


    @implementation SceneManager


    +(void) presentMainMenu

    {

        id s = [CCBReader loadAsScene:@"MainScene"];

        id t = [CCTransition transitionMoveInWithDirection:CCTransitionDirectionLeft

                                                  duration:1.0];

        [[CCDirector sharedDirector] presentScene:s withTransition:t];

    }


    +(void) presentGameScene

    {

        id s = [CCBReader loadAsScene:@"GameScene"];

        id t = [CCTransition transitionMoveInWithDirection:CCTransitionDirectionRight

                                                  duration:1.0];

        [[CCDirector sharedDirector] presentScene:s withTransition:t];

    }


    @end

    ```


    **Note**  Using the generic type *id* in place of a pointer to a specific Objective-C
    class is perfectly legal, and in fact very useful if you don’t actually need to
    do anything with the particular object except pass it on to other methods.


    With the SceneManger methods defined, open GameMenuLayer.m. At the top, below
    the other #import lines, add the line in [Listing 6-12](#part0015.html#list12)
    to make the SceneManager class known to the GameMenuLayer implementation file.


    [***Listing 6-12***](#part0015.html#_list12). Adding the SceneManager import


    ```

    #import "SceneManager.h"

    ```


    Then add the methods in [Listing 6-13](#part0015.html#list13) just below the shouldPauseGame
    method.


    [***Listing 6-13***](#part0015.html#_list13). Restart and exit buttons simply
    present a scene


    ```

    -(void) shouldRestartGame

    {

        [SceneManager presentGameScene];

    }


    -(void) shouldExitGame

    {

        [SceneManager presentMainMenu];

    }

    ```


    Notice that calling the SceneManager class methods does not require having an
    instance of the SceneManager class. You can just call them by using the class’
    name itself as the receiver. The drawback of class methods is that they do not
    have access to the class’ state—for instance, they couldn’t access any of the
    SceneManager class’ properties and ivars if it had any.


    The SceneManager acts purely as a utility class that runs repetitive, stateless
    code that needs to be accessible from various other classes to perform a specific
    purpose (presenting scenes). If you have a task that fits this description, you
    should consider putting it in a class that has only class methods.


    Adding a Callbacks Keyframe


    Before resuming the game, it is a good idea to first remove the pause popover
    menu with an animation. This gives the user some time to prepare herself for resuming
    play, perhaps introducing a 3..2..1 countdown timer after dismissing the pause
    menu.


    Now, theoretically, you could assign an animationManager.delegate and implement
    the completedAnimationSequenceNamed: method to find out if the *resume game* Timeline
    is done playing.'
  trans: "\n通常，开发者会寻求使用场景推入（`push`）和弹出（`pop`）方法，甚至在保存和恢复游戏状态时替换场景。虽然这两种方法各有用途，但在不切换场景的情况下，在当前场景之上创建一个非破坏性的全屏“场景”其实非常简单。只需对你刚刚创建的弹出层进行少量增强即可实现。让我们来试试。\n\
    \n从“节点库视图”（*Node Library View*）中拖拽一个“颜色节点”（*Color Node*）到`PauseMenuLayer.ccb`的画布上。将时间轴中的颜色节点移动到`P_bg`背景精灵的上方。确保颜色节点不是背景精灵的子节点。然后将颜色节点的位置设置为`0,0`，并将“内容大小”（*Content\
    \ size*）改为使用“%”类型，同时将宽度和高度的值都设为`100`。这样颜色节点就会扩展以填满整个屏幕。\n\n如果你在游戏中运行并点击暂停按钮，游戏视图会突然消失。这是因为你看到的是一个具有纯色背景的全屏弹出菜单。如果你喜欢，也可以使用“渐变节点”（*Gradient\
    \ Node*）来代替颜色节点。\n\n**提示**  如果在显示此类全屏弹出层时因帧率低而注意到卡顿，只需将背景中`_levelNode`的可见属性（`visible`）设置为`NO`。这将防止它在弹出层之后被渲染，从而提高渲染性能。\n\
    \n但等等，还有更多功能！除了全屏弹出层，你还可以在弹出层显示时调暗关卡视图。这很容易实现，只需将颜色节点的“颜色”（`Color`）属性改为黑色，然后将其“不透明度”（`Opacity`）设置为大约`0.5`即可。\n\
    \n你还可以调整颜色节点的“混合源”（`Blend src`）和“混合目标”（`Blend dst`）设置来创建额外的效果。尝试将“混合源”设置为`One`，将“混合目标”设置为`One\
    \ - Dst Color`以获得伪彩色效果。同时尝试更改颜色节点的颜色和不透明度。\n\n或者，将“混合源”设置为`One - Dst Color`，将“混合目标”设置为`Src\
    \ Alpha Saturate`，并将“不透明度”设置为`1`，颜色设置为白色，以创建照片负片效果，如图 6-7 所示。\n\n![9781484202630_Fig06-07.jpg](img/00091.jpeg)\n\
    \n图 6-7. 在游戏中呈现的`PauseMenuLayer`，通过使用混合模式应用了照片负片效果\n\n**注意**  缩写`src`和`dst`分别代表“源”（*source*）和“目标”（*destination*）。这些属性指的是\
    \ OpenGL 混合模式，它们会影响重叠的源和目标缓冲区中像素颜色的混合方式。\n\n混合模式在渐变节点或任何其他节点上可能工作方式不同，甚至完全无效。在\
    \ SpriteBuilder 中更改混合模式也不会显示它们在游戏中的实际效果——你必须在模拟器或设备上测试混合模式的设置。\n\n当然，你也可以使用一个背景图像足够大以覆盖最大屏幕尺寸的“精灵”（*Sprite*），来替代颜色节点或`P_bg`精灵，从而创建一个带有全屏背景图像的全屏弹出层。\n\
    \n**使用 SceneManager 切换场景**\n\n此时，暂停弹出菜单中的重新开始和退出按钮还不会执行任何操作。甚至可能会导致崩溃。重新开始和退出按钮只是呈现一个新场景来移除当前场景，因此你无需担心关闭弹出层之类的事情。\n\
    \n由于你将在项目的不同位置呈现场景，并且通常每个场景都应使用相同的转场效果来呈现，因此只使用一个方法来以特定方式呈现特定场景是完全合理的。这样，你就不必为了更改使用的转场类型或持续时间而浏览所有用于场景切换的代码。\n\
    \n一个只包含所谓“类”方法（类似于 C++ 中的静态方法）的类有助于提取那些不适合任何现有类的常见重复性任务。\n\n在 Xcode 中向“Source”组添加一个新的\
    \ Objective-C 类。将新类命名为`SceneManager`，并将“Subclass of”字段更改为`NSObject`（所有 Objective-C\
    \ 类的基类）。它不需要是`CCNode`，因为此类不会作为子节点添加到节点层次结构中。\n\n将代码清单 6-10 中高亮显示的代码添加到`SceneManager.h`文件中。\n\
    \n***代码清单 6-10***. `SceneManager`接口仅声明类方法\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface SceneManager : NSObject\n\n+(void) presentMainMenu;\n+(void) presentGameScene;\n\
    \n@end\n```\n\n`SceneManager.m`实现了这两个类方法——由开头的`+`字符表示。\n\n为简洁起见，我将代码清单 6-11 中的变量声明为`id`类型，并只给了它们单字母标识符，以便这些行足够短，避免在书中添加换行。当然，除非在不存在任何歧义的非常短的代码片段中，否则通常应避免使用单字母变量名。\n\
    \n***代码清单 6-11***. `SceneManager`使用特定的转场和持续时间呈现每个场景\n\n```\n#import \"SceneManager.h\"\
    \n\n@implementation SceneManager\n\n+(void) presentMainMenu\n{\n    id s = [CCBReader\
    \ loadAsScene:@\"MainScene\"];\n    id t = [CCTransition transitionMoveInWithDirection:CCTransitionDirectionLeft\n\
    \                                              duration:1.0];\n    [[CCDirector\
    \ sharedDirector] presentScene:s withTransition:t];\n}\n\n+(void) presentGameScene\n\
    {\n    id s = [CCBReader loadAsScene:@\"GameScene\"];\n    id t = [CCTransition\
    \ transitionMoveInWithDirection:CCTransitionDirectionRight\n                 \
    \                             duration:1.0];\n    [[CCDirector sharedDirector]\
    \ presentScene:s withTransition:t];\n}\n\n@end\n```\n\n**注意**  使用通用类型`id`代替指向特定\
    \ Objective-C 类的指针是完全合法的，并且实际上非常有用，如果你不需要对该特定对象执行任何操作，只需将其传递给其他方法。\n\n定义了`SceneManager`方法后，打开`GameMenuLayer.m`。在顶部，在其他`#import`行下方，添加代码清单\
    \ 6-12 中的行，以使`SceneManager`类对`GameMenuLayer`实现文件可见。\n\n***代码清单 6-12***. 添加`SceneManager`导入\n\
    \n```\n#import \"SceneManager.h\"\n```\n\n然后，在`shouldPauseGame`方法下方添加代码清单 6-13\
    \ 中的方法。\n\n***代码清单 6-13***. 重新开始和退出按钮仅呈现一个场景\n\n```\n-(void) shouldRestartGame\n\
    {\n    [SceneManager presentGameScene];\n}\n\n-(void) shouldExitGame\n{\n    [SceneManager\
    \ presentMainMenu];\n}\n```\n\n请注意，调用`SceneManager`类方法不需要拥有`SceneManager`类的实例。你可以直接使用类名本身作为接收者来调用它们。类方法的缺点是无法访问类的状态——例如，如果`SceneManager`类有任何属性或实例变量（`ivars`），它们无法访问。\n\
    \n`SceneManager`纯粹作为一个实用工具类运行，执行重复的、无状态的代码，这些代码需要从其他各种类中访问以执行特定目的（呈现场景）。如果你有符合此描述的任务，应该考虑将其放在一个仅包含类方法的类中。\n\
    \n**添加回调关键帧**\n\n在恢复游戏之前，最好先通过动画移除暂停弹出菜单。这给用户一些时间准备恢复游戏，也许可以在关闭暂停菜单后引入一个 3..2..1\
    \ 的倒计时器。\n\n理论上，你可以为`animationManager.delegate`赋值并实现`completedAnimationSequenceNamed:`方法，以了解“恢复游戏”（*resume\
    \ game*）时间线是否播放完毕。\n"
- fmt: '# 排版后的内容


    然而，我还没有解释如何在时间线（Timeline）中使用`Callbacks`关键帧，也没有解释如何利用它们在时间线的任意位置运行自定义选择器。这种情况非常适合使用`Callbacks`关键帧。事实上，任何时候需要在时间线动画的特定时间点调用选择器，你都可以使用`Callbacks`关键帧。


    在SpriteBuilder中，打开`PauseMenuLayer.ccb`。左键单击`Timeline List`（参见[图5-1](#part0014.html#Fig1)），然后选择`New
    Timeline`。这将创建并选中一个名为`Untitled Timeline`的新时间线。再次左键单击`Timeline List`，然后选择`Edit
    Timelines`，调出与[图5-9](#part0014.html#Fig9)相同的时间线编辑对话框。双击`Untitled Timeline`文本进行编辑，将此时间线重命名为`**resume
    game**`。保持`resume game`时间线的`Autoplay`复选框未选中，然后单击`Done`。


    **Caution** 一旦在CCB中拥有多个时间线，验证正在编辑的时间线是否正确就变得至关重要。在编辑前检查`Timeline List`，尤其是在你疑惑为什么编辑没有产生任何变化时。适应切换时间线的概念可能需要一些时间，可以通过左键单击`Timeline
    List`，然后从`Timelines`子菜单中选择所需时间线来实现。


    接下来，通过单击时间线右上角的数字框来编辑时间线时长（参见[图5-2](#part0014.html#Fig2)）。将时间线设为两秒长；这应该足够。现在将时间线光标移动到时间线末尾，即2秒标记处。这就是你应该添加`Callbacks`关键帧的位置。


    如果你之前尝试添加`Callbacks`关键帧，很可能没有成功。诀窍是按住`Option`键，然后单击`Callbacks`分段以添加一个`Callbacks`关键帧。


    添加`Callbacks`关键帧后，它仍然不会执行任何操作——你需要编辑该关键帧的属性。为此，双击该关键帧。将出现一个如图[6-8](#part0015.html#Fig8)所示的气泡框，你需要在`Selector`字段中输入`**resumeGameDidEnd**`。


    **Tip** 音效关键帧也是通过按住Option键单击音效分段来添加的，并且可以通过双击关键帧进行编辑。


    ![9781484202630_Fig06-08.jpg](images/00092.jpeg)


    [图6-8](#part0015.html#_Fig8). 编辑Callbacks关键帧


    与其他关键帧一样，你也可以右键单击`Callbacks`或`Sound effects`关键帧来执行`Cut`、`Copy`或`Delete`操作。你也可以通过左键单击选择关键帧并按`Backspace`键来删除关键帧。


    **Note** 如果在尝试剪切或删除`Callbacks`或`Sound effects`关键帧时收到提示“根节点无法移除”的消息，只需取消选择根节点，方法是选择任何其他节点，或单击舞台上任何节点外的区域，以取消选择当前选中的节点。


    你已经在[代码清单6-9](#part0015.html#list9)中添加了处理恢复游戏所需的代码。`shouldResumeGame`方法运行`resume
    game`时间线，该时间线最终将运行`resumeGameDidEnd`选择器。


    如果现在构建并运行应用，暂停游戏，然后点击恢复，暂停菜单气泡框将在两秒后消失，游戏继续。


    你现在也可以重新开始关卡并退出到主菜单，因为`SceneManager`会切换场景（参见[代码清单6-13](#part0015.html#list13)）。作为练习，你可以添加另一个`SceneManager`类方法，该方法呈现`GameScene`但不使用过渡效果。然后更新`shouldRestartGame`方法以使用你新建的`SceneManager`方法。


    ## 在恢复时为暂停菜单添加动画效果


    点击暂停菜单上的恢复按钮后没有任何视觉反馈，这有点糟糕。如何为`PauseMenuLayer.ccb`的`resume game`时间线添加动画效果完全取决于你，除了末尾运行`resumeGameDidEnd`选择器的`Callbacks`关键帧之外。在接下来的段落中，我仅提供一个示例和灵感，说明你可以在这两秒内做什么。


    首先，考虑对`P_bg`背景精灵执行动画也会移动、缩放和旋转其子节点。唯一不被继承的属性大约是不透明度。如果你想让弹出层慢慢淡出，恐怕你必须为每个单独的按钮、标签和背景精灵添加相同的不透明度关键帧——而且，还要让它们都在相同的时间戳以相同的不透明度值开始和结束。因此，我决定不让该层淡出。


    **Tip** 如果你按照混合模式插曲中的说明操作，可能会发现舞台上难以看清事物。如果是这种情况，请单击时间线中`CCNodeColor`条目右侧的眼睛符号来隐藏颜色节点，同时保持它在游戏中可见。


    选择`P_bg`精灵节点，然后按`V`插入一个`Visible`关键帧。将此关键帧移到最左侧，时间戳`00:00:00`。可见属性只能开启和关闭；因此，`Keyframe
    Segment`会绘制得更粗，并且行为不同，即使目前只有一个关键帧，它也会填充整个分段。将时间线光标移到1秒标记稍后处，然后按`V`键添加另一个`Visible`关键帧。如果需要视觉提示，请参见[图6-9](#part0015.html#Fig9)。


    接下来，在时间戳`00:00:00`和`00:01:00`处用`P`键添加两个`Position`关键帧。将时间线光标移动到第二个关键帧（右侧的那个），然后拖拽`P_bg`精灵将其移动到屏幕的左上角。右键单击`Position
    Keyframe Segment`，然后选择`Ease In`缓动模式。这就完成了向左上角移动的动画，但单独来看相当乏味。


    选中`P_bg`精灵，同样在时间戳`00:00:00`和`00:01:00`处添加两个`Scale`关键帧。将时间线光标移动到第二个关键帧，然后将`Scale`属性的X轴和Y轴分别更改为`0.2`和`0.1`。右键单击`Keyframe
    Segment`，然后选择`Ease Out`缓动模式。如果运行此动画，整个暂停层应该在滑向左上角的同时向后移动（缩小）。


    ![9781484202630_Fig06-09.jpg](images/00093.jpeg)


    [图6-9](#part0015.html#_Fig9). 带有闪烁READY！标签的resume game时间线示例


    如果你还想添加某种就绪指示器，从`Node Library View`拖拽一个`Label TTF`节点放到舞台上。此节点应该是根节点的子节点，但*不是*`P_bg`精灵的子节点。将标签的文本改为`**READY!**`，并将其`Font
    size`增加到`*100*`。你可以根据自己的需要编辑任何其他标签属性。但请务必取消选中属性选项卡最顶部的标签`Visible`复选框，以便它初始时是隐藏的。你还应将标签的位置类型改为`%`，值改为`*50*`，使其在舞台上居中。


    在选中新标签的情况下，将时间线光标移动到大约1秒标记处，然后按`V`。将时间线光标向右移动，再次按`V`。重复此操作，直到你拥有大约三个等间距、等大小的`Keyframe
    Segment`，如图[6-9](#part0015.html#Fig9)所示。拖拽移动关键帧以均匀间距，或者故意使间距不均匀。重要的是，最后一个关键帧应将标签的`Visible`属性设置为`NO`。在标签可见的每两个关键帧之间，会绘制一个粉红色的`Keyframe
    Segment`。'
  raw: 'However, I haven’t explained how to use the *Callbacks* keyframes in the Timeline,
    and I haven’t explained how they can be used to run custom selectors at any point
    in the Timeline. This situation is a good use for a *Callbacks* keyframe. In fact,
    any time you need to call a selector at a specific point in time during a Timeline
    animation, you would use a *Callbacks* keyframe.


    In SpriteBuilder, open the *PauseMenuLayer.ccb*. Left-click on the *Timeline List*
    (see [Figure 5-1](#part0014.html#Fig1)), and select *New Timeline*. This will
    create and select a new timeline named *Untitled Timeline*. Left-click the *Timeline
    List* again, and then select *Edit Timelines* to bring up the same Timelines editing
    dialog as shown in [Figure 5-9](#part0014.html#Fig9). Double-click the *Untitled
    Timeline* text to edit it, and rename this Timeline **resume game**. Leave the
    *Autoplay* check box unchecked for the *resume game* Timeline, and then click
    *Done*.


    **Caution**  Once you have more than one timeline in a CCB, it becomes crucial
    to verify that you are editing the correct Timeline. Check the *Timeline List*
    before making edits, especially if you’re wondering why an edit wouldn’t change
    anything. It may take some time to get used to the idea of switching Timelines,
    which you can do by left-clicking the *Timeline List*, and then select the desired
    Timeline from the *Timelines* submenu.


    Next, edit the Timeline duration by clicking on the digits box in the upper right
    corner of the Timeline. (See [Figure 5-2](#part0014.html#Fig2) for reference.)
    Make the Timeline two seconds long; this should be enough time. Now move the Timeline
    Cursor to the end of the timeline at the 2-seconds mark. Here’s where you should
    add a *Callbacks* keyframe.


    If you tried to add a *Callbacks* keyframe before you probably couldn’t. The trick
    is to hold the *Option* key, and then click on the *Callbacks* segment to add
    a *Callbacks* keyframe.


    With a *Callbacks* keyframe added, it still won’t do anything yet—you’ll have
    to edit the keyframe’s properties. To do so, double-click the keyframe. A popover
    like the one shown in [Figure 6-8](#part0015.html#Fig8) will appear, where you
    should enter **resumeGameDidEnd** in the *Selector* field.


    **Tip**  The sound effects keyframes are also added by Option-clicking on the
    sound-effects segment, and they’re editable by double-clicking a keyframe.


    ![9781484202630_Fig06-08.jpg](images/00092.jpeg)


    [Figure 6-8](#part0015.html#_Fig8). Editing a Callbacks keyframe


    As with other keyframes, you can also right-click a *Callbacks* or *Sound effects*
    keyframe to *Cut*, *Copy*, or *Delete* it. You can also delete keyframes by selecting
    a keyframe with a left-click and pressing the *Backspace* key.


    **Note**  If you receive a message that says “the root node cannot be removed”
    when trying to cut or delete a *Callbacks* or *Sound effects* keyframe, just deselect
    the root node by selecting any other node or by clicking on the stage, outside
    any node, to deselect the currently selected node(s).


    You’ve already added the necessary code to handle resuming a game in [Listing
    6-9](#part0015.html#list9). The shouldResumeGame method runs the *resume game*
    Timeline, which in turn will eventually run the resumeGameDidEnd selector.


    If you build and run the app now, pause the game, and then click resume, the pause
    menu popover will disappear after two seconds and the game continues.


    You can also restart the level and exit to the menu now, as the SceneManager will
    change scenes. (See [Listing 6-13](#part0015.html#list13).) As an exercise for
    you, you may want to add another SceneManager class method that presents the GameScene
    but without using a transition. Then update the shouldRestartGame method to use
    your new SceneManager method.


    Animating the Pause Menu on Resume


    Having no visual feedback at all after tapping the resume button on the pause
    menu is kind of dreadful. How exactly you animate the *resume game* Timeline of
    the *PauseMenuLayer.ccb* is up to you, except for the *Callbacks* keyframe at
    the end that runs the resumeGameDidEnd selector. In the following paragraphs,
    I give just an example and some inspiration as to what you can do in those two
    seconds.


    First, consider that animating the P_bg background sprite will also move, scale,
    and rotate its child nodes. About the only property that is not inherited is opacity.
    If you wanted to slowly fade out the popover layer, I’m afraid you would have
    to add the same opacity keyframes to each individual button, the label, and the
    background sprite—and on top of that, make them all start and end at the same
    time stamp with the same opacity values. Therefore, I decided not to fade out
    the layer.


    **Tip**  If you followed the blend-mode interlude, you may find it difficult to
    see things on the stage. If that is the case, click the eye symbol in the Timeline
    to the right of the *CCNodeColor* entry to hide the color node while leaving it
    visible in the game.


    Select the P_bg sprite node and press *V* to insert a *Visible* keyframe. Move
    this keyframe to the far left, time stamp 00:00:00\. The visible property can
    only be turned on and off; therefore, the *Keyframe Segment* is drawn thicker
    and it behaves differently, filling the entire segment even though there’s just
    one keyframe so far. Move the Timeline Cursor just past the 1-second mark, and
    add another *Visible* keyframe with the *V* key. See [Figure 6-9](#part0015.html#Fig9)
    if you need a visual hint.


    Next add two *Position* keyframes with the *P* key at the 00:00:00 and 00:01:00
    timestamps. Move the Timeline Cursor onto the second keyframe, the one to the
    right, and then drag and move the P_bg sprite to the upper left corner of the
    screen. Right-click the *Position Keyframe Segment*, and select the *Ease In*
    easing mode. This completes the move animation to the upper left corner, and in
    itself it’s rather boring.


    Add two *Scale* keyframes with the P_bg sprite selected, also at the 00:00:00
    and 00:01:00 time stamps. Move the Timeline Cursor onto the second keyframe, and
    then change the Scale property to 0.2 and 0.1 for the X and Y axes. Right-click
