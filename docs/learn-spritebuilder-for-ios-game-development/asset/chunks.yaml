    \ 14-2 所示。这种情况下，你遇到了更底层的问题，可能是除零错误、缓冲区溢出，或者你正在访问一个已从内存中释放的对象。\n\n![9781484202630_Fig14-05.jpg](img/00211.jpeg)\n\
    \n图 14-5. 添加异常断点后，Xcode 5 会显示可获取源代码的代码中距离错误最近的行。Xcode 6 默认就是这种行为\n\n**注意** 启用异常断点后，程序执行会在异常消息和调用栈打印到\
    \ Xcode 调试控制台之前暂停。你可以在图 14-5 中看到`NSAssert`消息尚未打印到控制台。如果需要在控制台中查看该信息，只需点击一次*继续程序执行*按钮即可。在中间的横向工具栏上，该按钮是从左数第三个图标——看起来像一个结合了暂停和播放的图标。\n\
    \n## 断言假设\n\nBug 是不可避免的，它们形式多样、层出不穷。能够检测当前条件是否阻止代码正常运行的代码，对于避免 Bug 至关重要。\n\n自然，你的代码会对程序的状态做出各种假设。断言正是用来验证这些假设的——如果假设不成立，应用就会出故障。\n\
    \n`NSAssert`宏及其变体`NSAssert1`到`NSAssert5`允许你在代码中编写测试，断言给定的条件必须为真。否则，就会抛出一个异常。\n\
    \n这有什么帮助呢？\n\n假设你有一个 ivar，期望它不为 nil。这是一个假设。如果该假设因某种原因不成立，ivar 为 nil，那么发送给该对象的所有消息都会被忽略。这显然会影响程序流程，因为你期望运行的某些方法不会执行。但这并不容易立即察觉，因为应用不会立刻崩溃；相反，只是有些代码行不起作用或返回默认值。\n\
    \n你越早发现这种情况，错误报告的位置就越接近问题的根源，修复起来也就越容易。\n\n假设你有一个特定方法需要每帧执行，但它似乎没有正常工作。你修改了方法的代码，但没有任何效果。于是你决定添加`NSLog`语句，但它们没有输出。由于该方法内部有多个`if/else`语句，你最终决定在函数的开头或结尾添加一个`NSLog`。它仍然什么也不会记录。然后你开始检查调用代码，如此反复。最终，你发现那个方法未执行的类的指针是\
    \ nil。听起来很熟悉吧？\n\n**提示** 每当你发现并修复一个由不成立的假设引起的 Bug 时，都应该添加一个断言，以防再次发生。\n\n为了避免这种情况，请用断言来双重检查这类赋值——尤其是在可能出错的地方包括人为失误（比如拼写错误）时。例如，在*GameScene.m*中，声明了几个\
    \ ivar（如代码清单 14-6 所示），这些 ivar 本应通过在 SpriteBuilder 中编辑节点的*doc root var*设置来赋值。其中一些是通过调用`getChildByName:`获得的，这假设存在一个匹配该名称的节点，甚至可能假设只有一个同名节点。\n\
    \n***代码清单 14-6***. 这些 ivar 部分由 SpriteBuilder 赋值，部分通过`getChildByName:`或其他方式赋值\n\
    \n```\n@implementation GameScene\n{\n    __weak CCNode* _levelNode;\n    __weak\
    \ CCPhysicsNode* _physicsNode;\n    __weak CCNode* _playerNode;\n    __weak CCNode*\
    \ _backgroundNode;\n    __weak GameMenuLayer* _gameMenuLayer;\n    __weak GameMenuLayer*\
    \ _popoverMenuLayer;\n\n// 为简洁起见，省略了其他 ivar...\n}\n```\n\n这里有很多地方可能出错，在 SpriteBuilder\
    \ 中忘记分配*doc root var*或节点名称拼写错误是相当常见的。或者你可能将*doc root var*分配到了错误的节点或错误的 CCB 文件中，或者你编辑的是节点的时间线（Timeline）中的名称而非其名称属性。在类初始化过程中的某个特定时间点之后，验证这些变量必须为非\
    \ nil 的假设是一种良好的编程风格。\n\n例如，代码清单 14-7 中`loadLevelNamed:`方法的末尾就是一个很好的位置，可以断言关键的\
    \ ivar 是非 nil 的。\n\n***代码清单 14-7***. 在加载关卡后断言特定的 ivar 为非 nil\n\n```\n-(void) loadLevelNamed:(NSString*)levelCCB\n\
    {\n    // 为简洁起见，省略了现有代码...\n\n    NSAssert1(_physicsNode, @\"physics node not\
    \ found in level: %@\", levelCCB);\n    NSAssert1(_backgroundNode, @\"bg node\
    \ not found in level: %@\", levelCCB);\n    NSAssert1(_playerNode, @\"player node\
    \ not found in level: %@\", levelCCB);\n}\n```\n\n要测试一个指针变量是否为非 nil，只需写出 ivar\
    \ 的名称即可。在条件或断言中，写`_playerNode`等同于写`_playerNode != nil`。\n\n你也可以使用与`NSLog`相同的格式字符串；然而，由于`NSAssert`是一个宏而非真正的\
    \ C 函数，你必须使用`NSAssert1`到`NSAssert5`来匹配格式字符串参数的数量。在上面的例子中，有一个格式字符串参数`levelCCB`，因此需要使用`NSAssert1`。\n\
    \n当断言的条件求值为假（`NO`）时，就称断言失败。然后`NSAssert`宏会抛出一个异常，导致 Xcode 暂停程序执行，并显示有问题的代码行——就像图\
    \ 14-5 中那样。\n\n断言仅在调试构建中求值。尽管如此，你还是应该限制在每帧运行的代码中使用断言，因为这可能会在调试构建中拖慢你的应用。你可以通过选择\
    \ Xcode 中的*Product* ![image](img/00008.jpeg) *Scheme* ![image](img/00008.jpeg)\
    \ *Edit Scheme*，在 Debug 和 Release 构建配置之间切换。然后选择*Run*配置，你会在*Info*标签页中找到*Build Configuration*设置。\n\
    \n**警告** 由于断言仅在调试构建中求值，因此绝对要避免在断言的条件下运行任何会改变程序状态的代码或调用任何方法。否则，程序在调试构建和发布构建中的行为会不同。\n\
    \n## 添加断点\n\n断点使你能够在特定代码行暂停（停止）程序执行。你还可以编辑触发断点需要满足的条件。\n"
- fmt: 'You can easily add and enable or disable a breakpoint by clicking on the gray
    vertical area to the left of the source-code editing window. If you have line
    numbers enabled in Xcode (`*Xcode*` `![image](images/00008.jpeg)` `*Preferences*`
    `![image](images/00008.jpeg)` `*Text Editing*` `![image](images/00008.jpeg)` `*Line
    numbers*`), that''s where the line numbers are shown. In [Figure 14-6](#part0025.html#Fig6),
    a breakpoint was added in line 103. The app ran until the line of code with the
    breakpoint was reached, and then it halted. The line that will be executed next
    is highlighted with a green tint—that''s the execution pointer.


    ![9781484202630_Fig14-06.jpg](images/00212.jpeg)


    [Figure 14-6](#part0025.html#_Fig6). A breakpoint halted program execution


    Below the source code window, you''ll find the *Variables View*, where you can
    inspect the values of variables. By default, Xcode will show you the self-reference
    if the app halted anywhere within an Objective-C instance method, plus any local
    variables and those being used by the surrounding code. You can change this behavior
    by clicking on the *Auto* drop-down menu in the lower left corner of [Figure 14-6](#part0025.html#Fig6).
    Also, note that the *Console* view is hidden. You can change the visibility of
    *Variables* and *Console* views with the two icons in the lower right corner.


    So, despite this being a pretty obvious problem, let''s try and debug why `_playerNode`
    might be *nil*. The breakpoint was set, and the app ran up until this point. You
    can clearly see in the *Variables View* that the `_playerNode` variable points
    to a valid object. You can unfold the object to see more of its properties and
    ivars, but that''s not really the point. What I like to show is how you can run
    through your code line by line, which allows you to see how variables change after
    each line and what conditional path is taken and why.


    [Figure 14-7](#part0025.html#Fig7) highlights the debug toolbar that''s also in
    [Figure 14-6](#part0025.html#Fig6).


    ![9781484202630_Fig14-07.jpg](images/00213.jpeg)


    [Figure 14-7](#part0025.html#_Fig7). The debug toolbar


    From left to right, the first button hides the debug area, and the second shows
    you whether breakpoints are globally enabled or not. If it''s not highlighted
    in blue, no breakpoints will trigger. The third button pauses and resumes program
    execution. You normally use it to continue running the app to the next breakpoint
    (if any) after a breakpoint was triggered.


    The fourth button (Step Over), fifth button (Step Into), and sixth button (Step
    Out) highlighted in [Figure 14-8](#part0025.html#Fig8) are what I''m after.


    ![9781484202630_Fig14-08.jpg](images/00214.jpeg)


    [Figure 14-8](#part0025.html#_Fig8). The Step Over, Step Into, and Step Out command
    icons


    While the application execution is halted, you can use the Step Over command to
    advance to the next line in the same function. This essentially executes the highlighted
    line of code and halts again when it''s done. The Step Into command works just
    like the Step Over command, except if the execution pointer is on a line that
    calls a method (sends a message), the Step Into command will continue execution
    inside that method. Sometimes, this will merely bring you to an `@property` statement
    or to a method you don''t really want to look at, such as a singleton''s `sharedInstance`
    class method. In that case, the Step Out command runs the remainder of the current
    method until execution returns to the calling method.


    In the preceding example, clicking the Step Over command icon once leads to [Figure
    14-9](#part0025.html#Fig9).


    ![9781484202630_Fig14-09.jpg](images/00215.jpeg)


    [Figure 14-9](#part0025.html#_Fig9). After stepping over the line highlighted
    in [Figure 14-6](#part0025.html#Fig6), you can see that `_playerNode` became `nil`


    Obviously, in this example it''s very clear that assigning `nil` to `_playerNode`
    will have it take on that value. You can see this is reflected by the *Variables
    View* in [Figure 14-9](#part0025.html#Fig9). You don''t need to log nor guess—you
    can actually see when, where, and why the value changed.


    Setting breakpoints and stepping over code are as fundamental to debugging as
    `NSLog` statements are. The two go hand in hand, with `NSLog` being most suitable
    in cases where breakpoints would otherwise trigger so often or interfere with
    user input that a given issue can''t be reproduced. Breakpoints and single-stepping
    through your code are extremely instructive, as you can literally see what paths
    your code is taking and, through the Variables View, you can also see why.


    The question for you then becomes one of figuring out why a given value doesn''t
    have the value it''s supposed to have. But you can quickly arrive at that point
    by using breakpoints, rather than making changes to your code based on guesses
    and then trying again, hoping it might work the next time.


    ## Analyzing Your Code


    A lesser known feature of Xcode are the so-called *analyze* builds. You can run
    an analyze build via `*Product*` `![image](images/00008.jpeg)` `*Analyze*`. This
    runs the Clang Static Analyzer tool that ships with Xcode.


    The analysis tries to find common, known, and potential sources of bugs. This
    includes memory management and logic errors. However, not all issues reported
    by the analyzer need to be actual problems. For one, any issue found in code not
    written by you, such as the Cocos2D and Chipmunk sources, need to be disregarded.
    Assume that if they are actual problems the developers will eventually fix them.


    [Figure 14-10](#part0025.html#Fig10) shows the output of an Analyze build. The
    12 issues found in the Cocos2d target can be ignored. There''s only one issue
    in the LearnSpriteBuilder project, and a suggestion is made to fix it.


    ![9781484202630_Fig14-10.jpg](images/00216.jpeg)


    [Figure 14-10](#part0025.html#_Fig10). The analyze build finds potential issues
    and makes suggestions on how to fix them


    As you may notice from the figure, there seems to be some kind of problem. But
    the information shown in the figure doesn''t tell you why the analyzer deems this
    a problem. So far the logging has worked fine. What could be the problem here,
    and should you fix it?


    Possibly the best tip I can give regarding compiler errors is so obvious I''m
    afraid to mention it: Google the exact error message. You don''t even have to
    type it back into Google''s search field—every piece of text displayed by Xcode
    can be copied to the clipboard as text. Where the regular Cmd+C (Copy) command
    won''t work, there''s usually a right-click context menu with a *Copy* item.


    **Tip** When you copy strings from Xcode, they may contain specific references
    to your project, such as path, file name, line numbers, class, and variable names.
    If the search results are unsatisfactory or nothing was found, make sure you remove
    those project-specific references and Google only for the raw error message, stripped
    of any variable, function, or class names that may exist only in your own project.


    One of the top links from Google Search explains the reason behind the error message:
    the `NSUInteger` data type is a 32-bit (`unsigned int`) type on 32-bit devices
    and 64-bit (`unsigned long`) on 64-bit devices such as the iPhone 5S. Though the
    conversion from `unsigned int` to `unsigned long` will occur implicitly, the compiler
    will nevertheless warn about this conversion when building the 32-bit version
    of the code. And the analyzer is essentially telling you that this warning will
    occur, and it''s just good style to fix that problem.'
