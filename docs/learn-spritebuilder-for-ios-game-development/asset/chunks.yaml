    **注意** 本书将不会使用，也几乎不会提及 `Swift`。在本书写作之初，`Swift` 甚至尚未向开发者开放。


    `Cocos2d-Swift` 是一个流行的、免费且开源的 2D 渲染引擎，并配备了物理框架。它最初由 `Ricardo Quesada` 在 2008 年创建为
    `Cocos2d-iPhone`，并最终成为 iOS 平台上最流行的 2D 游戏引擎。它非常受欢迎，以至于到 2013 年，苹果公司在 `iOS 7` 中发布了自己的
    2D 渲染框架，命名为 `Sprite Kit`。`Sprite Kit` 的许多设计和术语都借鉴了当时的 `Cocos2d-iPhone`。


    `Sprite Kit` 的发布是一个出人意料且早该到来的催化剂，催生了 `Cocos2d-iPhone` 引擎的第三次重大迭代，该版本还顺带获得了一个新名称：`Cocos2d-Swift`。现在，整个开发团队基本上已经触及并改进了引擎的各个方面，使其在每个方面都优于
    `Sprite Kit`。


    `Cocos2D` 包含了紧密集成的 `Chipmunk` (2D) 物理引擎以及大量酷炫的新功能。例如，其渲染器现在即使不比 `Sprite Kit` 更快，也与之相当，并且可以选择使用苹果公司新的
    `Metal` 渲染框架。还有一个 `CCEffectNode`，使开发者能够创建令人惊叹的视觉着色器效果，而无需编写实际的着色器代码。自定义和调试 `Cocos2D`
    应用程序通常比使用 `Sprite Kit` 更容易，因为您可以单步执行、分析，并在必要时修改底层引擎的源代码。


    ## 关于 Apportable


    您可能会好奇：`Apportable` 是谁？他们具体是做什么的？


    他们的使命宣言很简单：让开发者能够用 `Objective-C` 编写应用程序，并通过交叉编译将其移植到 `Android` 平台，同时具有原生性能。您可以在其网站
    `[`www.apportable.com`](http://www.apportable.com)` 上了解更多关于 `Apportable` 的信息。


    在理想情况下，使用 `Apportable` 将一个用 `Objective-C` 编写的现有 iOS 应用移植到 `Android` 无需更改任何代码。实际上，如果您没有从一开始就在
    `Android` 上测试项目，您可能需要多做一点工作。具体来说，这是因为市面上有众多不同规格和特性的 `Android` 设备。


    如果您查看 `Apportable` 令人印象深刻的客户名单，您会发现他们都是游戏开发者。`Apportable` 对此表示敬意，并聘请了许多现在致力于 `Cocos2D`
    和 `SpriteBuilder` 开发的开发者。所有这些技术都是免费且开源的，并将保持免费和开源。只有在您想使用 `Apportable` 移植到 `Android`，并且需要超出基本功能之外的功能时，您才可能需要支付一些费用。在撰写本文时，服务条款和价格尚未确定。


    拥有像 `Apportable` 这样的选择的价值在于，您能够专注于自己熟悉的平台、工具和技术，同时仍然能够在需要时让应用程序在 `Android` 设备上运行。而且，您无需重写大部分代码库，也无需因使用更古老或性能较差的编程语言而妥协。


    ## 关于程序版本


    在您开始阅读本书其余部分之前，我们需要讨论一下技术更新和兼容性的问题。


    本书是为 `Xcode 6`、`iOS 8` 以及 `SpriteBuilder v1.3` 和 `Cocos2d-Swift v3.3` 编写并测试的。在我写下这些文字时，是
    2014 年 10 月 9 日。但在您阅读本书时，这些技术中的一部分或全部可能已经更新到了下一个小版本或主要版本。


    我已尽力避免使用任何（可能）特定于版本的代码或功能。然而，我预测未来变化的能力是有限的，这从我至今未能中彩票就可以看出。


    根据我编写三个版本的“Learn Cocos2D”的经验，这些差异通常很小。所以，不要仅仅因为现在可能有了 `Xcode 6.2` 或 `SpriteBuilder
    v1.5` 就把书收起来。


    对于因版本更新导致操作方法略有不同而给您带来的任何不便，我提前致歉，但我对此无能为力。不过，我可以为您提供一些方法来应对这些问题。


    就 `SpriteBuilder` 和 `Cocos2D` 而言，您可以访问 `[`www.spritebuilder.com`](http://www.spritebuilder.com)`、`[`www.cocos2d-swift.org`](http://www.cocos2d-swift.org)`
    或 `[`www.learn-cocos2d.com`](http://www.learn-cocos2d.com)`，了解影响本书的重大变更，并获取有关如何解决问题或如何精确修改代码以使其适应新版本的指导。


    关于 `Xcode` 和 `iOS`，如果在您阅读本书时已经有了 `Xcode 7` 或 `iOS 9`，您总是可以使用 `Xcode 6`（以及 `iOS
    8 SDK`）来编译本书的代码，从而完全避免任何潜在问题。


    具体到 `Xcode` 的更新，问题更多不在于手册说明不再适用，而是苹果在每个新版本 `Xcode` 中不断引入新的编译器警告和错误。这些改进似乎能将曾经完全可接受的代码变成一连串“哦，不，你不能再这样做了，你疯了吗？！”的语句。对于有经验的开发者来说，编译器能捕获更多潜在问题是极受欢迎的；然而，对于那些试图通过示例代码学习，但代码并未用最新版
    `Xcode` 测试过的开发者来说，这可能是一次令人清醒，甚至是令人沮丧的经历。


    因此，如果您觉得没有精力去应对更新版编译器偶尔的吹毛求疵，我建议您使用 `Xcode 6`。您可以在 `[`developer.apple.com/downloads/index.action?name=Xcode%206`](https://developer.apple.com/downloads/index.action?name=Xcode%206)`
    找到旧版 `Xcode`。请注意，您需要是注册的苹果 `iOS` 或 `OS X` 开发者才能访问此链接。


    ## 关于 Xcode 版本


    部分截图是使用 `Xcode 5.1` 截取的。在某些情况下，这是有意的；另一些时候，则仅仅是因为当时 `Xcode 6` 尚未发布。并非总是可能或可行地将截图更新到最新的
    `Xcode 6` 版本。


    我已验证其功能是相同的。就截图而言，`Xcode 5.1` 和 `Xcode 6.0` 之间的任何差异纯粹是视觉上的。


    ## 关于示例项目


    本书附带一个可下载的压缩包，您可以从本书网站 `[`www.apress.com/9781484202630`](http://www.apress.com/9781484202630)`
    下载。在压缩包中，您会找到资源文件和完整的 `SpriteBuilder` 项目。每个项目都包含了项目 `Bouncy Beast` 在不同阶段的快照。


    **提示** 我建议您在解压后保留该压缩包。如果您对某个项目做了破坏性的更改，可以从压缩包中恢复原始状态。


    当您打开这些示例 `SpriteBuilder` 项目之一时，`SpriteBuilder` 很可能会提示您将 `Cocos2D` 更新到最新版本。我建议您不要更新
    `Cocos2D`，而是继续使用该项目测试时所用的 `Cocos2D` 版本。新的 `Cocos2D` 版本可能需要您修改代码，或者可能以其他方式破坏现有代码。我假设当您打开示例项目时，您更希望看到它能正常工作，而不是需要深入进去调试和修复任何破坏性的更改。


    **提示** 您随时可以稍后更新 `SpriteBuilder` 项目的 `Cocos2D` 版本，方法是在 `SpriteBuilder` 菜单中选择 `文件`![image](img/00008.jpeg)`更新
    Cocos2D`。

