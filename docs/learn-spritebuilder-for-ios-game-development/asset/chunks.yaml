    \n请务必查看 Xcode 调试控制台（`View` → `Debug Area` → `Activate Console`）以检查`ObjectAL`的错误。例如，若尝试预加载或播放不在资源包中的音频文件，或路径出错，控制台将显示类似日志：\n\
    \n```\nOAL Error: +[OALTools urlForPath:bundle:]: Could not find full path of\
    \ file Audio/splash3.caf\n```\n\n何时何地播放音效是一个优秀的设计问题。在此项目中，当玩家碰撞齿轮、弹簧、链条和绳索时，仅在碰撞显著时播放溅射音效。判断方法之一是检查传入每个物理碰撞委托方法的`CCPhysicsCollisionPair`对象。\n\
    \n`CCPhysicsCollisionPair`方法包含两个属性：`totalImpulse`和`totalKineticEnergy`，分别揭示冲量向量（即冲击力方向）和碰撞耗散的总能量。后者对物理爱好者来说可能有些奇怪：能量不会被耗散，只会转换形式。但在计算机游戏物理模拟中，没有热量的概念（热量是冲击能量最常见的转换形式）。因此，当发生强力碰撞时，通常认为*能量耗散*或损失了。否则，物理模拟将无法消除碰撞体的速度，从而在碰撞后两个物体的速度之和保持不变的意义上使所有碰撞“完美”。\n\
    \n`totalKineticEnergy`仅在显著碰撞时非零。我们可以利用这一点：当`totalKineticEnergy`非零时，假定需要播放溅射音效。请将代码清单\
    \ 11-6 中的方法添加到`GameScene.m`中，最好放在`ccPhysicsCollisionBegin`方法之下。\n\n**代码清单 11-6**\
    \ 播放碰撞音效\n\n```\n-(void) playCollisionSoundWithPair:(CCPhysicsCollisionPair*)pair\n\
    {\n    if (pair.totalKineticEnergy > 0.0)\n    {\n        NSString* splat = [NSString\
    \ stringWithFormat:@\"Audio/splat%i.caf\",\n                           arc4random_uniform(3)\
    \ + 1];\n\nCGFloat pitch = 0.8 + (arc4random_uniform(50) / 100.0);\n        [[OALSimpleAudio\
    \ sharedInstance] playEffect:splat\n                                         \
    \    volume:1.0\n                                              pitch:pitch\n \
    \                                               pan:0.0\n                    \
    \                           loop:NO];\n    }\n}\n```\n\n如果`totalKineticEnergy`大于零，则碰撞耗散了能量，因此一定是显著的。此时，从三种溅射音效中随机选择一种。`arc4random_uniform(3)`方法返回一个小于\
    \ 3 的整数——即 0 到 2 之间的数。加 1 后，得到 1 到 3 之间的数。\n\n**提示** 生成随机数的方法有很多，但只有`arc4random`相关方法最接近生成“真正随机”的数。特别地，`arc4random_uniform`变体生成均匀分布的随机数，且无（模）偏差。此处不再深入解释，但通常建议优先使用`arc4random_uniform()`而非`rand()`等其他随机数方法。\n\
    \n此音效使用`OALSimpleAudio`的`playEffect`变体（参数最多）播放。除音频文件本身外，还可以指定播放音量。此音量并非绝对音量，而是相对于后续介绍的`effectsVolume`属性。`playEffect`的音量为`1.0`时，表示音频文件以与`effectsVolume`相同的音量播放。\n\
    \n音调（`pitch`）在 0.8 到 1.3 之间随机化，以在不使用多个音效的情况下创造更丰富的声音变化。这也展示了如何使用`arc4random_uniform`生成浮点数。若将\
    \ 0 到 49 之间的值除以`100.0`，则得到 0.0 到 0.49 之间的值。注意，必须写成`100.0`（带小数点）或进行类型转换（`(CGFloat)100`）。若除数直接写成`100`，则会进行整数除法，结果始终为`0`。\n\
    \n为快速测试此音效播放，请将代码清单 11-7 中高亮显示的行添加到`ccPhysicsCollisionBegin:`方法中，该方法在玩家与弹簧对象碰撞时调用。\n\
    \n**代码清单 11-7** 碰撞弹簧时播放音效\n\n```\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \        spring:(SpringBoard *)spring\n{\n    [spring letGo];\n    [self playCollisionSoundWithPair:pair];\n\
    \    return YES;\n}\n```\n"
- fmt: "你应该再添加两个`ccPhysicsCollisionBegin`方法，将玩家与障碍物和齿轮配对。在[代码清单11-8](#part0022.html#list8)的其他`ccPhysicsCollisionBegin`方法下方添加代码。\n\
    \n[**代码清单 11-8**](#part0022.html#_list8). 与障碍物和齿轮碰撞时播放音效\n\n```\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \      obstacle:(CCNode*)obstacle\n{\n    [self playCollisionSoundWithPair:pair];\n\
    \    return YES;\n}\n\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \          gear:(CCNode*)gear\n{\n    [self playCollisionSoundWithPair:pair];\n\
    \    return YES;\n}\n```\n\n为了让后两个碰撞方法被调用，你需要在SpriteBuilder中打开`Chain.ccb`、`Rope.ccb`和`Gear1.ccb`，然后为链条和绳索元素以及齿轮的物理体编辑对应的物理*碰撞*类型。`Chain`和`Rope`的*碰撞*类型应为`obstacle`，`Gear`的碰撞类型应为`gear`。\n\
    \n如果你现在运行游戏，至少应该能听到偶尔播放的音效，尤其是在接触弹簧时。当前的设置并不是出色的音效设计，但它展示了播放声音和确定冲击力的基本原理。\n\n\
    ### 短时间不重复播放音效\n\n为游戏事件播放音效时（特别是涉及物理碰撞的情况），一个常见问题是音效可能在短时间内重复播放。要么新声音总是打断上一个，要么新声音叠加到已播放的声音上，增加音量和整体噪音。这两种情况通常都不理想。\n\
    \n使用`OALSimpleAudio`时，无法确定给定的音效是否仍在播放，也无法在播放完成时获得通知。因此，你必须添加一个`BOOL`类型的实例变量（ivar），在播放声音时将其置为`YES`，并在短时间内将其置回`NO`。\n\
    \n将[代码清单11-9](#part0022.html#list9)中显示的实例变量添加到`GameScene.m`。\n\n[**代码清单 11-9**](#part0022.html#_list9).\
    \ 添加播放声音标志\n\n```\n@implementation GameScene\n{\n    // 现有的实例变量省略……\n\nBOOL _playingCollisionSound;\n\
    }\n```\n\n然后改进[代码清单11-6](#part0022.html#list6)中的`playCollisionSoundWithPair:`方法，添加[代码清单11-10](#part0022.html#list10)中高亮显示的行。\n\
    \n[**代码清单 11-10**](#part0022.html#_list10). 音效开始播放后短时间内不再播放新音效\n\n```\n-(void)\
    \ playCollisionSoundWithPair:(CCPhysicsCollisionPair*)pair\n{\n    if (_playingCollisionSound\
    \ == NO)\n    {\n        NSString* splat = [NSString stringWithFormat:@\"Audio/splat%i.caf\"\
    ,\n                           arc4random_uniform(3) +  1];\n\nCGFloat pitch =\
    \ 0.8 + (arc4random_uniform(50) / 100.0);\n        [[OALSimpleAudio sharedInstance]\
    \ playEffect:splat\n                                             volume:1.0\n\
    \                                              pitch:pitch\n                 \
    \                               pan:0.0\n                                    \
    \           loop:NO];\n\n_playingCollisionSound = YES;\n        [self scheduleBlock:^(CCTimer\
    \ *timer) {\n            _playingCollisionSound = NO;\n        } delay:0.4];\n\
    \    }\n}\n```\n\n现在，音效不再与`totalKineticEnergy`绑定，而是在每次碰撞时播放。如果没有`_playingCollisionSound`标志，这很可能会导致声音在短时间内重复播放。因此，它在播放声音时被设置为`YES`，并安排了一个延迟0.4秒的块，将`_playingCollisionSound`实例变量重置为`NO`，以便下一次碰撞播放另一个音效。\n\
    \n你应该将此原则应用于所有在相同类型的音效开始播放后短时间内不应再次播放的声音。\n\n### 调整音频音量\n\n你可能还记得你已经创建了一个带有音量滑块的设置弹出窗口。现在正是让它们发挥作用的好时机。\n\
    \n在Xcode中打开`SettingsLayer.m`，并添加[代码清单11-11](#part00222.html#list11)中高亮显示的`_playingEffectSliderAudio`实例变量。\n\
    \n[**代码清单 11-11**](#part0022.html#_list11). 添加另一个播放时间变量\n\n```\n@implementation\
    \ SettingsLayer\n{\n    __weak CCSlider* _musicSlider;\n    __weak CCSlider* _effectsSlider;\n\
    \nBOOL _playingEffectSliderAudio;\n}\n```\n\n然后将[代码清单11-12](#part0022.html#list12)中高亮显示的行添加到`SettingsLayer.m`的`volumeDidChange:`方法中。\n\
    \n[**代码清单 11-12**](#part0022.html#_list12). 移动音效滑块时播放音效\n\n```\n-(void) volumeDidChange:(CCSlider*)sender\n\
    {\n    if (sender == _musicSlider)\n    {\n        [GameState sharedGameState].musicVolume\
    \ = _musicSlider.sliderValue;\n    }\n    else if (sender == _effectsSlider)\n\
    \    {\n        [GameState sharedGameState].effectsVolume = _effectsSlider.sliderValue;\n\
    \nif (_playingEffectSliderAudio == NO)\n        {\n            [[OALSimpleAudio\
    \ sharedInstance] playEffect:@\"Audio/menu-sfx.caf\"];\n\n_playingEffectSliderAudio\
    \ = YES;\n            [self scheduleBlock:^(CCTimer *timer) {\n              \
    \  _playingEffectSliderAudio = NO;\n            } delay:0.2f];\n        }\n  \
    \  }\n}\n```\n\n这将在移动音效音量滑块时播放一个音效作为音频提示。该声音在0.2秒内被阻止重复播放，使其听起来更悦耳。\n\n如果不播放音效，那么当拖动音效音量滑块时，玩家将不知道给定的音量实际有多响。音乐方面不会出现这个问题，因为菜单音乐已经在播放，并且当你拖动音乐音量滑块时，它会自动调整音量。\n\
    \n要实际更改`OALSimpleAudio`的音效和背景通道使用的音量，你需要编辑`GameState.m`文件。找到`setMusicVolume`和`setEffectsVolume`方法，并添加[代码清单11-13](#part0022.html#list13)中高亮显示的行。\n\
    \n[**代码清单 11-13**](#part0022.html#_list13). 改变音量\n\n```\n-(void) setMusicVolume:(CGFloat)volume\n\
    {\n    [OALSimpleAudio sharedInstance].bgVolume = volume;\n    [[NSUserDefaults\
    \ standardUserDefaults] setDouble:volume\n                                   \
    \           forKey:KeyForMusicVolume];\n}\n\n-(void) setEffectsVolume:(CGFloat)volume\n\
    {\n    [OALSimpleAudio sharedInstance].effectsVolume = volume;\n    [[NSUserDefaults\
    \ standardUserDefaults] setDouble:volume\n                                   \
    \           forKey:KeyForEffectsVolume];\n}\n```\n\n现在，音量滑块已经可以正常工作了。你可以随意尝试它们。但请注意，启动应用程序时这些音量设置并不会生效。为了解决这个问题，将[代码清单11-14](#part0022.html#list14)中高亮显示的行添加到`GameState.m`的`sharedGameState`方法中。\n\
    \n[**代码清单 11-14**](#part0022.html#_list14). 启动应用时初始化音量\n\n```\n+(GameState*) sharedGameState\n\
    {\n    static GameState* sharedInstance;\n    static dispatch_once_t onceToken;\n\
    \    dispatch_once(&onceToken, ^{\n        sharedInstance = [[GameState alloc]\
    \ init];\n        OALSimpleAudio audio = [OALSimpleAudio sharedInstance];\n  \
    \      audio.effectsVolume = sharedInstance.effectsVolume;\n        audio.bgVolume\
    \ = sharedInstance.musicVolume;\n    });\n    return sharedInstance;\n}\n```\n\
    \n这将`OALSimpleAudio`的音量设置为从`GameState`共享实例恢复的音量，这确保了`GameState`类首次使用时，音量从`NSUserDefaults`加载。这保证在游戏早期发生，但也可以通过添加一行看似无意义的代码来强制初始化，如下所示：\n\
    \n```\n[GameState sharedGameState];\n```\n\n这只会初始化单例（如果尚未初始化），并丢弃返回的实例。\n\n###\
    \ 处理标签"
  raw: 'You should also add two more ccPhysicsCollisionBegin methods, pairing the
    player with obstacles and gears. Add the code in [Listing 11-8](#part0022.html#list8)
    below the other ccPhysicsCollisionBegin methods.


    [***Listing 11-8***](#part0022.html#_list8). Playing sound effects when colliding
    with obstacles and gears


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                           obstacle:(CCNode*)obstacle

    {

        [self playCollisionSoundWithPair:pair];

        return YES;

    }


    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                               gear:(CCNode*)gear

    {

        [self playCollisionSoundWithPair:pair];

        return YES;

    }

    ```


    In order for the latter two collision methods to be called, you will have to open
    *Chain.ccb*, *Rope.ccb*, and *Gear1.ccb* in SpriteBuilder. Then edit the corresponding
    physics *Collision* type for the chain and rope elements and for the gear’s physics
    body. The *Collision* type for *Chain* and *Rope* should be *obstacle*, and the
    collision type for *Gear* should be *gear*.


    If you play the game now, you should at least hear the occasional sound effect
    playing, in particular when touching springs. The current setup isn’t great sound
    design, but it shows the basic principle of playing sound and determining the
    force of an impact.


    Not Playing Sound Effects for a Short While


    A common problem when playing sound effects for game events—specifically, if there
    are physics collisions involved—is that sound effects may play repeatedly in a
    short time frame. Either the new sound always cuts off the previous one or the
    new sounds add to the already-playing sounds, increasing the volume and general
    noisiness of the effect. Both are generally undesirable.


    With OALSimpleAudio, there is no way to determine whether a given sound effect
    is still playing or to be notified of its completion. Instead, you have to add
    a BOOL ivar that you flip on when playing the sound and flip off after a short
    time period.


    Add the ivar shown in [Listing 11-9](#part0022.html#list9) to *GameScene.m*.


    [***Listing 11-9***](#part0022.html#_list9). Adding the play sound flag


    ```

    @implementation GameScene

    {

        // existing ivars omitted ...


    BOOL _playingCollisionSound;

    }

    ```


    Then improve the playCollisionSoundWithPair: method in [Listing 11-6](#part0022.html#list6)
    with the lines highlighted in [Listing 11-10](#part0022.html#list10).


    [***Listing 11-10***](#part0022.html#_list10). Don’t play a new sound effect for
    a short time after a sound effect has started playing


    ```

    -(void) playCollisionSoundWithPair:(CCPhysicsCollisionPair*)pair

    {

        if (_playingCollisionSound == NO)

        {

            NSString* splat = [NSString stringWithFormat:@"Audio/splat%i.caf",

                               arc4random_uniform(3) + 1];


    CGFloat pitch = 0.8 + (arc4random_uniform(50) / 100.0);

            [[OALSimpleAudio sharedInstance] playEffect:splat

                                                 volume:1.0

                                                  pitch:pitch

                                                    pan:0.0

                                                   loop:NO];


    _playingCollisionSound = YES;

            [self scheduleBlock:^(CCTimer *timer) {

                _playingCollisionSound = NO;

            } delay:0.4];

        }

    }

    ```


    Now the sound effect is no longer tied to totalKineticEnergy but plays on every
    collision. Without the _playingCollisionSound flag, this will likely cause the
    sound to be played repeatedly in a short time frame. Therefore, it is set to YES
    when playing the sound, and a block is scheduled with a 0.4-second delay to reset
    the _playingCollisionSound ivar to NO so that the next collision will play another
    sound effect.


    You should apply this principle to all sounds that must not be played again for
    a short time after a sound effect of the same type has begun playing.


    Adjusting Audio Volumes


    You probably remember that you’ve already created a Settings popover with volume
    sliders. Now would be a good time to make them functional.


    Open *SettingsLayer.m* in Xcode, and add the _playingEffectSliderAudio ivar highlighted
    in [Listing 11-11](#part0022.html#list11).


    [***Listing 11-11***](#part0022.html#_list11). Adding another playback timing
    variable


    ```

    @implementation SettingsLayer

    {

        __weak CCSlider* _musicSlider;

        __weak CCSlider* _effectsSlider;


    BOOL _playingEffectSliderAudio;

    }

    ```


    Then add the highlighted lines of [Listing 11-12](#part0022.html#list12) to the
    volumeDidChange: method in *SettingsLayer.m*.


    [***Listing 11-12***](#part0022.html#_list12). Playing a sound effect when moving
    the sound-effect slider


    ```

    -(void) volumeDidChange:(CCSlider*)sender

    {

        if (sender == _musicSlider)

        {

            [GameState sharedGameState].musicVolume = _musicSlider.sliderValue;

        }

        else if (sender == _effectsSlider)

        {

            [GameState sharedGameState].effectsVolume = _effectsSlider.sliderValue;


    if (_playingEffectSliderAudio == NO)

            {

                [[OALSimpleAudio sharedInstance] playEffect:@"Audio/menu-sfx.caf"];


    _playingEffectSliderAudio = YES;

                [self scheduleBlock:^(CCTimer *timer) {

                    _playingEffectSliderAudio = NO;

                } delay:0.2f];

            }

        }

    }

    ```


    This will play a sound effect as an audio cue when moving the sound-effects volume
    slider. The sound is prevented from repeating for 0.2 seconds to make it a little
    more pleasing to the ears.


    Without playing the sound effect, when dragging the sound-effects volume slider
    the player wouldn’t know how loud a given volume actually is. You don’t have this
    problem with music since the menu music is already playing and will adjust its
    volume when you drag the music volume slider.


    To actually change the volumes used by OALSimpleAudio’s effects and background
    channels, you’ll have to edit the *GameState.m* file. Locate the setMusicVolume
    and setEffectsVolume methods, and add the highlighted lines of [Listing 11-13](#part0022.html#list13).


    [***Listing 11-13***](#part0022.html#_list13). Changing volumes


    ```

    -(void) setMusicVolume:(CGFloat)volume

    {

        [OALSimpleAudio sharedInstance].bgVolume = volume;

        [[NSUserDefaults standardUserDefaults] setDouble:volume

                                                  forKey:KeyForMusicVolume];

    }


    -(void) setEffectsVolume:(CGFloat)volume

    {

        [OALSimpleAudio sharedInstance].effectsVolume = volume;

        [[NSUserDefaults standardUserDefaults] setDouble:volume

                                                  forKey:KeyForEffectsVolume];

    }

    ```


    The sound volume sliders are now functional. Feel free to try them out. Notice
    that the volumes are not respected when starting the app, however. To fix that,
    add the highlighted lines of [Listing 11-14](#part0022.html#list14) to the sharedGameState
    method in *GameState.m*.


    [***Listing 11-14***](#part0022.html#_list14). Initializing volumes upon launching
    the app


    ```

    +(GameState*) sharedGameState

    {

        static GameState* sharedInstance;

        static dispatch_once_t onceToken;

        dispatch_once(&onceToken, ^{

            sharedInstance = [[GameState alloc] init];

            OALSimpleAudio audio = [OALSimpleAudio sharedInstance];

            audio.effectsVolume = sharedInstance.effectsVolume;

            audio.bgVolume = sharedInstance.musicVolume;

        });

        return sharedInstance;

    }

    ```


    This sets the volumes of OALSimpleAudio to the volumes restored from the GameState
    sharedInstance, which ensures the volumes are loaded from NSUserDefaults the first
    time the class GameState is used. This is guaranteed to happen very early in the
    game, but it could be forced by adding a seemingly nonsensical line like the following:


    ```

    [GameState sharedGameState];

    ```


    This would just initialize the singleton (if it isn’t already), discarding the
    returned instance.


    Working with Labels'
  trans: "\n你应该再添加两个`ccPhysicsCollisionBegin`方法，将玩家与障碍物和齿轮配对。在代码清单 11-8 的其他`ccPhysicsCollisionBegin`方法下方添加代码。\n\
    \n**代码清单 11-8**. 与障碍物和齿轮碰撞时播放音效\n\n```\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \      obstacle:(CCNode*)obstacle\n{\n    [self playCollisionSoundWithPair:pair];\n\
    \    return YES;\n}\n\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
