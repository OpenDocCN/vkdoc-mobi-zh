  trans: '

    **提示** 一个常见的误解是认为图像文件大小等同于内存占用，但事实远非如此。一个大小为 100 KB 的 `image.png` 文件，作为纹理时可能轻易消耗
    16 MB 的内存。纹理未压缩时的最大字节数由图像属性计算得出：`宽度 x 高度 x (每像素位数 / 8)`，其中 `每像素位数` 代表“每个像素所占的比特数”。仅将颜色位深度从
    32 位（每个颜色 4 字节）降低到 16 位（每个颜色 2 字节），就能将纹理的内存占用减半。压缩的 PVR 格式可在不影响图像质量的情况下进一步降低内存占用，而有损的
    PVRTC 格式则以牺牲图像质量为代价，进一步降低内存占用。


    本书其余部分使用哪种图集类型并不重要，但如果在应用中遇到内存不足的情况，选择图集类型就是最简便快捷地降低内存占用、甚至提升性能的方法。为此，只需选中那些带有笑脸图标的粉色精灵表单文件夹，然后更改纹理类型。例如，图
    2-25 中的精灵表单使用了 `PVR RGBA8888`——这是一种 PVR 格式的纹理，每个 RGB 颜色通道占 8 位，Alpha 通道（透明度）也占
    8 位。


    ![9781484202630_Fig02-25.jpg](img/00034.jpeg)


    图 2-25. 精灵表单发布格式设置


    **提示** `RGBA4444` 和 `RGB565` 格式将颜色位深度降低至 16 位，这可能导致“颜色渗溢”——尤其是在包含渐变的图像中。对于这些格式，你可能需要启用“抖动”复选框。`RGB565`
    格式仅适用于不含任何透明度的图像——例如不透明的背景图像——因为它用额外的色彩鲜艳度换取了 Alpha 通道。PVRTC 变体是一种“最后手段”，因为它们采用了类似
    JPG 的有损压缩，但能进一步降低内存占用并提升渲染性能。你应当仅考虑将 PVRTC 用于快速移动、短暂存在或小尺寸的图像——因为在这些场景中，画质降低不易察觉。例如，一个仅包含各种子弹变体的精灵表单就是
    PVRTC 的理想候选。如有疑问，可以进行实验。原始图像不会受影响，你随时可以无损地还原精灵表单的导出格式。


    现在，既然已经将“全局”文件夹转换为精灵表单并设置了其导出格式，你应该从访达中将本书可下载存档中提供的 `player.png` 拖放到 *Global*
    精灵表单文件夹中。请务必拖动图像本身，而不是包含图像的文件夹。其他图像将在后续使用。


    如果你想使用自己的玩家图像，应创建一个尺寸为 256 x 256 像素、内容为圆形形状的图像，并将其命名为 `player.png`。玩家图像是圆形的，因为本书后续内容中它将变为一个可变形的软体物理对象，而圆形图像最容易绘制到可变形体上。


    **提示** 从访达将文件拖放到 SpriteBuilder 的文件视图中，是向 SpriteBuilder 添加外部资源文件的唯一方式。


    ## 创建玩家预制体


    现在，在文件视图的根目录下创建另一个名为 `Prefabs` 的文件夹。


    选中该文件夹，然后从菜单中选择 `文件` ![image](img/00008.jpeg) `新建` ![image](img/00008.jpeg) `文件`，或者右键单击它并选择
    `新建文件`。将新文档命名为 `Player.ccb`，然后点击 `精灵` 按钮，以 `CCSprite` 作为其根节点来创建文档。参见 图 2-26。


    ![9781484202630_Fig02-26.jpg](img/00035.jpeg)


    图 2-26. 创建 `Player.ccb` 作为精灵


    此时，项目的文件视图应类似于 图 2-27 所示。


    ![9781484202630_Fig02-27.jpg](img/00036.jpeg)


    图 2-27. 截至目前项目的文件和文件夹结构


    如果任何文件不在其应处的位置，现在只需拖放它们即可将其移动到正确的位置。

    '
- fmt: '**Caution** 将资源移动到不同的文件夹，甚至重命名它们，都会导致 `SpriteBuilder` 丢失对该资源的所有现有引用。因此，尽早为给定项目构思一个合理的文件夹结构并坚持使用，在正确的位置创建资源至关重要。资源文件应在首次使用前就放置在适当的位置并恰当命名。虽然之后移动或重命名资源文件并非不可能，但使用该文件的次数越多，更新引用以指向新路径或名称所需进行的更改也就越多。


    目前的 `Player.ccb` 看起来像是一个空无一物的黑色虚影。点击舞台下方时间线中的 `CCSprite` 根节点，或者点击舞台中央来选中该精灵。现在，你应该会在舞台上看到一个带有四个选择手柄的圆形选区，右侧的“项目属性”选项卡应该会显示该精灵节点的属性。


    当前，`Sprite frame` 属性被设置为`<NULL>`，这就是你什么也看不到的原因。点击 `Sprite frame` 下拉菜单，将其更改为全局精灵表文件夹中的
    `player.png`，如图 [Figure 2-28](#part0011.html#Fig28) 所示。


    ![9781484202630_Fig02-28.jpg](images/00037.jpeg)


    [Figure 2-28](#part0011.html#_Fig28). 为玩家选择正确的 `Sprite frame` 图像


    现在，`player.png` 图像应显示在舞台中央。目前，`Player.ccb` 的设置到此为止。选择 `File` ![image](images/00008.jpeg)
    `Save All` 或 `File` ![image](images/00008.jpeg) `Publish` 以允许 `SpriteBuilder`
    更新项目的预览图像。


    ## 创建玩家预置体实例


    现在，双击 `Level1.ccb` 将其打开。切换到“Tileless 编辑器视图”（左起第二个选项卡）。你会在该视图中看到 `player` 列出了多次，如图
    [Figure 2-29](#part0011.html#Fig29) 所示。


    ![9781484202630_Fig02-29.jpg](images/00038.jpeg)


    [Figure 2-29](#part0011.html#_Fig29). Tileless 编辑器视图中出现奇怪的重复条目


    实际上，列表中同时显示了全局精灵表文件夹中的图像以及预置体文件夹中的 `Player.ccb`。


    为避免意外使用玩家的图像而不是其 `Player.ccb` 预置体，你应该取消选中“Tileless 编辑器视图”下方列表中的 `Global` 复选框，参见
    [Figure 2-30](#part0011.html#Fig30)。你还应该取消选中 `Levels` 文件夹，因为你不会再将一个关卡 `CCB` 文件拖放到另一个
    `CCB` 文件中——至少在本书的课程中不会，因为切换关卡将通过代码完成。


    ![9781484202630_Fig02-30.jpg](images/00039.jpeg)


    [Figure 2-30](#part0011.html#_Fig30). 筛选复选框用于更改“Tileless 编辑器视图”中显示哪个文件夹的内容


    一旦你取消选中 `Global` 和 `Levels` 文件夹，它们的内容将不再出现在“Tileless 编辑器视图”中。


    现在，你应该将 `Player` 拖放到 `Level1.ccb` 舞台上，以创建一个引用 `Player.ccb` 的子文件节点。尝试将玩家放置在关卡的非常靠左的位置，因为游戏将从左向右滚动。


    要移动舞台，请按住 `Cmd` 键，然后左键单击并拖动。


    如果你现在发布、构建并运行游戏，你所添加到 `Level1.ccb` 的玩家实例可能在屏幕上可见，也可能不可见，这取决于设备以及你放置玩家实例的具体位置。如果你在
    `GameScene` 中看不到玩家，请将其在 `Level1.ccb` 中的位置向关卡的左下角移动，直到你可以在应用中看到它。


    此状态的项目也体现在 `02 - Level with Player Prefab` 文件夹内的项目中。


    ## 总结


    在本章中，你学习了使用 `SpriteBuilder` 和 `Cocos2d` 的基础知识，如何创建 `CCB` 文件和节点，如何编辑它们的属性，以及如何进行代码连接。具体来说，你了解到了重要的子文件节点及其使用方法，在后续章节中，它的好处将变得更加明显。'
  raw: '**Caution**  Moving resources to different folders, or even renaming them,
    will cause SpriteBuilder to lose any existing references to that resource. It
    is crucial to create resources in the right place and therefore to come up with
    a sound folder structure for the given project as early as possible, and then
    stick with it. Resource files should be in an appropriate location and named appropriately
    before making first use of them. It’s not impossible to move or rename resource
    files at a later time, but the more often you have used that file, the more changes
    you’d have to make to update references so they point to the new path or name.


    The Player.ccb in its current state is a seemingly empty, black void. Click the
    CCSprite root node in the Timeline below the stage, or select the sprite by clicking
    in the center of the stage. You should now see a circular selection in the stage
    with the four selection handles, and the Item Properties tab on the right should
    show the sprite node’s properties.


    Currently, the *Sprite frame* property is set to <NULL>, and that’s why you’re
    not seeing anything. Click on the Sprite frame drop-down menu, and change it to
    the player.png in the Global sprite sheet folder as seen in [Figure 2-28](#part0011.html#Fig28).


    ![9781484202630_Fig02-28.jpg](images/00037.jpeg)


    [Figure 2-28](#part0011.html#_Fig28). Selecting the correct Sprite frame image
    for the player


    Now the player.png image should be displayed on the center stage. For now, that’s
    it for the Player.ccb. Choose File ![image](images/00008.jpeg) Save All or File
    ![image](images/00008.jpeg) Publish to allow SpriteBuilder to update the project’s
    preview images.


    Creating an Instance of the Player Prefab


    Now double-click the Level1.ccb to open it. Switch to the Tileless Editor View
    (the second tab from the left). You’ll see the player listed multiple times in
    the Tileless Editor View like in [Figure 2-29](#part0011.html#Fig29).


    ![9781484202630_Fig02-29.jpg](images/00038.jpeg)


    [Figure 2-29](#part0011.html#_Fig29). Tileless Editor View with curiously duplicate
    entries


    Actually, the list is showing both the image in the Global sprite sheet folder
    as well as the Player.ccb in the Prefabs folder.


    To avoid accidentally using the player’s image rather than its Player.ccb prefab,
    you should uncheck the Global check box in the list below the Tileless Editor
    View, see [Figure 2-30](#part0011.html#Fig30). You should also uncheck the Levels
    folder since you won’t drag and drop a level CCB file to another CCB again—at
    least not during the course of this book, since changing levels will be done by
    code.


    ![9781484202630_Fig02-30.jpg](images/00039.jpeg)


    [Figure 2-30](#part0011.html#_Fig30). Filter check boxes change which folder’s
    contents appear in the Tileless Editor View


    Once you’ve unchecked the Global and Levels folders, their contents should no
    longer appear in the Tileless Editor View.


    You should now drag and drop the Player onto the Level1.ccb stage to create a
    Sub File node referencing the Player.ccb. Try to place the player very far left
    in the level as the game will scroll from left to right.


    To move the stage, hold down the Cmd key and then left-click and drag.


    If you publish, build, and run the game now, the player instance you added to
    the Level1.ccb may or may not be visible on the screen, depending on the device
    and where exactly you positioned the player instance. If you can’t see the player
    in the GameScene, move its position in Level1.ccb toward the lower-left corner
    of the level until you can see it in the app.


    This state of the project is also reflected in the project inside the *02 - Level
    with Player Prefab* folder.


    Summary


    In this chapter, you’ve learned the basics of working with SpriteBuilder and Cocos2d,
    how to create CCB files and nodes, how to edit their properties, and how to make
    code connections. Specifically, you learned about the important Sub File node
    and how to use it, and its benefits will become even more obvious in the coming
    chapters.'
  trans: '

    **Caution** 将资源移动到不同的文件夹，甚至重命名它们，都会导致 `SpriteBuilder` 丢失对该资源的所有现有引用。因此，尽早为给定项目构思一个合理的文件夹结构并坚持使用，在正确的位置创建资源至关重要。资源文件应在首次使用前就放置在适当的位置并恰当命名。虽然之后移动或重命名资源文件并非不可能，但使用该文件的次数越多，更新引用以指向新路径或名称所需进行的更改也就越多。


    目前的 `Player.ccb` 看起来像是一个空无一物的黑色虚影。点击舞台下方时间线中的 `CCSprite` 根节点，或者点击舞台中央来选中该精灵。现在，你应该会在舞台上看到一个带有四个选择手柄的圆形选区，右侧的“项目属性”选项卡应该会显示该精灵节点的属性。


    当前，`Sprite frame` 属性被设置为`<NULL>`，这就是你什么也看不到的原因。点击 `Sprite frame` 下拉菜单，将其更改为全局精灵表文件夹中的
    `player.png`，如图 Figure 2-28 所示。


    ![9781484202630_Fig02-28.jpg](img/00037.jpeg)


    Figure 2-28. 为玩家选择正确的 `Sprite frame` 图像


    现在，`player.png` 图像应显示在舞台中央。目前，`Player.ccb` 的设置到此为止。选择 `File` ![image](img/00008.jpeg)
    `Save All` 或 `File` ![image](img/00008.jpeg) `Publish` 以允许 `SpriteBuilder` 更新项目的预览图像。


    ## 创建玩家预置体实例


    现在，双击 `Level1.ccb` 将其打开。切换到“Tileless 编辑器视图”（左起第二个选项卡）。你会在该视图中看到 `player` 列出了多次，如图
    Figure 2-29 所示。


    ![9781484202630_Fig02-29.jpg](img/00038.jpeg)


    Figure 2-29. Tileless 编辑器视图中出现奇怪的重复条目


    实际上，列表中同时显示了全局精灵表文件夹中的图像以及预置体文件夹中的 `Player.ccb`。


    为避免意外使用玩家的图像而不是其 `Player.ccb` 预置体，你应该取消选中“Tileless 编辑器视图”下方列表中的 `Global` 复选框，参见
    Figure 2-30。你还应该取消选中 `Levels` 文件夹，因为你不会再将一个关卡 `CCB` 文件拖放到另一个 `CCB` 文件中——至少在本书的课程中不会，因为切换关卡将通过代码完成。


    ![9781484202630_Fig02-30.jpg](img/00039.jpeg)


    Figure 2-30. 筛选复选框用于更改“Tileless 编辑器视图”中显示哪个文件夹的内容


    一旦你取消选中 `Global` 和 `Levels` 文件夹，它们的内容将不再出现在“Tileless 编辑器视图”中。


    现在，你应该将 `Player` 拖放到 `Level1.ccb` 舞台上，以创建一个引用 `Player.ccb` 的子文件节点。尝试将玩家放置在关卡的非常靠左的位置，因为游戏将从左向右滚动。


    要移动舞台，请按住 `Cmd` 键，然后左键单击并拖动。


    如果你现在发布、构建并运行游戏，你所添加到 `Level1.ccb` 的玩家实例可能在屏幕上可见，也可能不可见，这取决于设备以及你放置玩家实例的具体位置。如果你在
    `GameScene` 中看不到玩家，请将其在 `Level1.ccb` 中的位置向关卡的左下角移动，直到你可以在应用中看到它。


    此状态的项目也体现在 `02 - Level with Player Prefab` 文件夹内的项目中。


    ## 总结


    在本章中，你学习了使用 `SpriteBuilder` 和 `Cocos2d` 的基础知识，如何创建 `CCB` 文件和节点，如何编辑它们的属性，以及如何进行代码连接。具体来说，你了解到了重要的子文件节点及其使用方法，在后续章节中，它的好处将变得更加明显。

