    \n***清单 10-2***中的代码返回一个相对于圆心的位置。换言之，假设圆的中心位于位置`0x0`。由于对于玩家角色而言，圆以玩家图像为中心位于位置`32x32`，因此最终的`x`/`y`坐标需要根据圆的实际中心位置进行偏移。***清单\
    \ 10-1***中的`NSLog`行只打印小数点后一位，如`%.1f`格式字符串所示。这足以满足我们的精度要求。\n\n如果现在运行项目，圆上点的所需位置将打印到\
    \ Xcode 控制台。请参见***清单 10-3***。\n\n***清单 10-3.*** ****清单 10-1***中代码的输出。半径为 30、中心在\
    \ 32x32 的圆上的点*\n\n```\ncircumference point 1: {62.0, 32.0} (angle: 360.0)\ncircumference\
    \ point 2: {53.2, 10.8} (angle: 315.0)\ncircumference point 3: {32.0, 2.0} (angle:\
    \ 270.0)\ncircumference point 4: {10.8, 10.8} (angle: 225.0)\ncircumference point\
    \ 5: {2.0, 32.0} (angle: 180.0)\ncircumference point 6: {10.8, 53.2} (angle: 135.0)\n\
    circumference point 7: {32.0, 62.0} (angle: 90.0)\ncircumference point 8: {53.2,\
    \ 53.2} (angle: 45.0)\n```\n\n**注意**  你可能想知道为什么半径是 30 而不是 32。这与刚性玩家角色的碰撞半径相同。但请记住，每个周界体本身代表一个圆形形状，这实际上会增加玩家角色的碰撞半径。如果有什么区别的话，周界节点位置的半径应该小于之前的碰撞半径。但事实证明，折衷更好。与之前的刚体版本相比，允许玩家角色的总尺寸增大，有助于更好地说明软体物理的设计和最终效果。物体越小，就越难使其变得柔软*且*稳定。\n\
    \n### 定位圆周上的节点\n\n现在你可以获取***清单 10-3***中的位置，并以顺时针方向将其应用到从右到右上角的节点上。名为*right*的节点位置应为`62x32`，节点*bottom-right*应位于`53.2x10.8`，节点*bottom*应位于`32x2`，依此类推。通过选中从中心到右上角的所有节点，验证节点位置是否正确更新。这将产生与**图\
    \ 10-3**相同的圆形布局。放大（Cmd +/-）可以更清楚地看到节点之间的相对位置。\n\n![9781484202630_Fig10-03.jpg](img/00146.jpeg)\n\
    \n**图 10-3**. 八个周界节点均匀分布在圆上\n\n请注意，现在总共有九个子节点，每个节点都启用了物理特性，均匀分布在玩家角色的精灵上。另外，请注意玩家角色精灵本身（根节点）没有启用物理特性。\n\
    \n还有一点需要注意：如果你切换到*Item Physics*选项卡，选择一个周界节点，然后持续选择当前选中的节点及其相邻的周界节点，你会看到相邻节点的碰撞半径不会重叠。相反，它们之间有一个微小的间隙，如**图\
    \ 10-4**所示。这个间隙至关重要！\n\n![9781484202630_Fig10-04.jpg](img/00147.jpeg)\n\n**图 10-4**.\
    \ 通过物理调试绘制高亮显示周界物理体及其圆形形状\n\n如果软体物理对象中的任意两个周界体重叠或接触，整个软体将持续处于不稳定状态。然而，如果间隙太宽，其他物体（无论是软体对象自身的物体，还是链条和绳索元素等外部物体）可能过于容易地穿过软体的外部物体之间，从而导致软体卡住。\n\
    \n**图 10-4**还说明了周界体如何放大玩家角色的实际碰撞半径。你稍后将通过使用更大的半径绘制玩家角色的纹理来适应这一点，从而有效地将其缩放。\n\n\
    ### 移动和绘制软体玩家角色\n\n如果在启用了物理调试绘制的情况下运行当前状态的项目，你会注意到玩家角色的圆形物体正在下落，仅此而已。玩家角色精灵自身停留在其原始位置，并且你也无法移动玩家角色，因为精灵本身不再具有物理体。你必须将移动力均匀地应用于所有物体，并且必须使用中心节点作为新的玩家角色节点。\n\
    \n#### 移动软体玩家角色\n\n移动更改很快就会实现。在 Xcode 中，打开`GameScene.m`添加一个名为`_softBodyPlayer`的新`BOOL`实例变量，该变量允许你对那些尚未将玩家角色替换为新的软体玩家角色的关卡进行向后兼容。添加***清单\
    \ 10-4***中高亮显示的行。\n\n***清单 10-4***. 当玩家角色节点是软体版本时设置的实例变量\n\n```\n@implementation\
    \ GameScene\n{\n    __weak CCNode* _levelNode;\n    __weak CCPhysicsNode* _physicsNode;\n\
