- fmt: '首先，确保您的 Android 设备已安装所有可用更新。设备应至少运行 Android 4.2，且 Android 4.4 更佳，因为 4.2 和
    4.3 版本可能因 Android 漏洞导致应用在调试时冻结或卡死。


    找到并打开*设置*应用。在*更多*标签页中，向下滚动并点击底部的*关于设备*项。（参见[图 13-4](#part0024.html#Fig4)）。


    ![9781484202630_Fig13-04.jpg](images/00193.jpeg)


    [图 13-4](#part0024.html#_Fig4)。点击底部的“关于设备”以找到“版本号”项


    要启用开发者选项，您必须向下滚动并找到*版本号*项。（参见[图 13-5](#part0024.html#Fig5)）。即使*版本号*呈灰色，您也可以连续点击它至少七次来启用它。


    ![9781484202630_Fig13-05.jpg](images/00194.jpeg)


    [图 13-5](#part0024.html#_Fig5)。要启用开发者选项，您必须点击“版本号”项七次


    点击几次后，您会看到一个小的弹出视图，提示您距离启用开发者选项仅差几次点击。继续点击*版本号*，直到消息消失。然后返回上一屏幕，您会在*关于设备*上方找到一个新的菜单项，标记为*开发者选项*。（参见[图
    13-6](#part0024.html#Fig6)）。


    ![9781484202630_Fig13-06.jpg](images/00195.jpeg)


    [图 13-6](#part0024.html#_Fig6)。现在可以访问开发者选项


    点击*开发者选项*。您可能会收到一个警告，提示开发者设置仅供开发使用，这正是您的意图。


    虽然开发者选项可能导致错误，但出现错误的可能性并不比在 iOS 设备上启用开发模式时更高或更低。


    **注意** Android 拥有大量 iOS 上不可用的调试功能，这些功能确实会增加干扰应用的可能性。某些设置会大幅降低性能和电池寿命。某些设置甚至可能阻止您成功传输或启动应用。因此，在您完成本章之前，我强烈建议您完全按照此处描述设置开发者选项，暂时保留所有其他选项不变。


    ### 启用 USB 调试


    为了将应用传输到 Android 设备，您必须启用 USB 调试设置。（参见[图 13-7](#part0024.html#Fig7)）。


    ![9781484202630_Fig13-07.jpg](images/00196.jpeg)


    [图 13-7](#part0024.html#_Fig7)。启用“USB 调试”，为避免锁屏问题，也请启用“保持唤醒”模式


    这会使设备在连接到 USB 端口时处于调试模式。此状态存在潜在安全风险，Android 会在您启用此选项时发出警告。毕竟，它允许任何计算机在没有任何安全验证的情况下写入和读取设备。


    **提示** 如果您担心设备及其数据的安全与隐私，应考虑使用单独的 Android 设备进行测试。备份设备然后将其恢复为出厂默认设置也是安全的。然而，您不会希望每天早上都执行此操作，然后每晚再从备份中恢复。更简单的方法是，在调试完成后，将顶部的*开发者选项*开关（如图
    13-7 所示）关闭。您也可以完全移除*开发者选项*条目，但这需要清除*设置*数据，这意味着您将丢失*设置*应用中的所有设置。


    ### 启用保持唤醒


    与 USB 调试一起，您还应启用*保持唤醒*模式。这可以防止设备在连接到 USB 端口时休眠或进入锁屏。然而，即使启用了此模式，当您拔掉 USB 线缆时，屏幕仍会变暗并进入休眠。


    我必须启用*保持唤醒*，因为当设备休眠并显示锁屏时，传输的应用在传输后无法启动。要么屏幕变黑，应用无响应，要么屏幕仅显示锁屏。当我滑动解锁时，应用会直接退出或因错误而关闭。


    您的情况可能有所不同，我观察到的现象可能纯属巧合。因此，您可以在禁用*保持唤醒*模式的情况下测试部署，但只有在确认能够在 Android 设备上构建和运行应用后才能这样做。


    **注意** 让设备长时间处于*保持唤醒*模式存在屏幕烧屏的风险。*烧屏*是一种残影现象，由长时间显示相同的静态屏幕造成。长时间保持点亮的 LCD 像素会失去恢复到不点亮状态的能力。这种情况很少发生，但仍有可能。


    ### 启用 OpenGL 堆栈跟踪


    我建议您暂时开启的另一个选项是*OpenGL 跟踪*。


    点击*开启 OpenGL 跟踪*项，如图 13-8 所示。会弹出一个窗口，询问您想要的跟踪类型。选择*glGetError 上的调用堆栈*选项。


    ![9781484202630_Fig13-08.jpg](images/00197.jpeg)


    [图 13-8](#part0024.html#_Fig8)。点击“开启 OpenGL 跟踪”，将 `glGetError` 调用堆栈输出到调试日志


    出于某种原因，如果不开启*OpenGL 跟踪*，我的设备通常无法启动应用，并在发生 `GL_INVALID_OPERATION` 错误时中止。该错误在项目的任何代码运行之前很久就出现了，甚至在
    `Cocos2D` 本身（以及它的 `OpenGL` 视图）开始初始化之前。


    作为参考，以下是启动失败时我在日志中看到的内容：


    ```

    D/OpenGLRenderer(11473): GL error from OpenGLRenderer: 0x502

    E/OpenGLRenderer(11473):   GL_INVALID_OPERATION

    ```


    紧接着：什么都没有。应用就直接停止启动了。


    开启*OpenGL 跟踪*为我解决了这个问题；当我关闭它时，应用再次无法启动。如果您遇到同样的冻结和相同的错误信息，请检查启用 *OpenGL 跟踪*是否也能为您解决这个问题。由于开启此选项并无坏处，您可以保持其开启。


    ### 确认部署到 Android


    当您使用 `SpriteBuilder` v1.3 或更高版本创建新的 `SpriteBuilder` 项目时，该项目将自动内置对 Android 的支持。


    在本书的进行过程中，您已经创建了一个相当复杂的项目，也许您知道这句格言：“复杂的系统往往有复杂的问题。”因此，最好先通过尝试使用新的 `SpriteBuilder`
    项目进行 Android 支持，来尽可能排除其他问题。您可以按照此处描述操作，也可以打开*14 - HelloSpriteBuilder Android*项目。


    ### 创建新的 SpriteBuilder 项目


    打开 `SpriteBuilder`，选择*文件* ![image](images/00008.jpeg) *新建* ![image](images/00008.jpeg)
    *项目* 来创建一个新项目。将其命名为**HelloSpriteBuilder**，并保存到您喜欢的任何位置（您的*文档*文件夹是个不错的选择）。新项目包含一个带有颜色节点和
    `SpriteBuilder` 标志的 `MainScene.ccb`。


    快速查看一下*文件* ![image](images/00008.jpeg) *项目设置*对话框。您会看到 iOS 和 Android 平台都已选中，如图
    13-9 所示。这意味着 `SpriteBuilder` 将发布两套资源，一套用于 iOS，一套用于 Android。您可以为每个平台单独取消选择*phone*、*phonehd*、*tablet*
    和 *tablethd* 资源。现在，请将它们全部保持选中状态。


    ![9781484202630_Fig13-09.jpg](images/00198.jpeg)


    [图 13-9](#part0024.html#_Fig9)。“项目设置”对话框显示 iOS 和 Android 平台均已选中'
  raw: 'First, make sure you’ve installed all available updates for your Android device.
    The device should be running at least Android 4.2—and 4.4 is even better, as versions
    4.2 and 4.3 may cause the app to freeze/hang when debugging due to an Android
    bug.


    Locate the *Settings* app and open it. On the *More* tab, scroll down and tap
    the *About device* item at the very bottom. (See [Figure 13-4](#part0024.html#Fig4)).


    ![9781484202630_Fig13-04.jpg](images/00193.jpeg)


    [Figure 13-4](#part0024.html#_Fig4). Tap on “About device” at the bottom to find
    the “Build number” item


    To enable the developer options, you have to scroll down and locate the *Build
    number* item. (See [Figure 13-5](#part0024.html#Fig5).) Even though *Build number*
    is grayed out, you can use it by tapping it at least seven times.


    ![9781484202630_Fig13-05.jpg](images/00194.jpeg)


    [Figure 13-5](#part0024.html#_Fig5). To enable developer options, you have to
    tap the “Build number” item seven times


    After a couple taps, you’ll see a small popup view telling you that you are only
    a few taps away from enabling developer options. Keep tapping on *Build number*
    until the message goes away. Then return to the previous screen, where you’ll
    find a new menu item labeled *Developer options* just above *About device*. (See
    [Figure 13-6](#part0024.html#Fig6)).


    ![9781484202630_Fig13-06.jpg](images/00195.jpeg)


    [Figure 13-6](#part0024.html#_Fig6). Developer options are now accessible


    Tap on *Developer options*. You may get a warning that developer settings are
    intended for development use only, which is exactly what you intend.


    While there is a possibility that the developer options can cause errors, errors
    are no more or less likely than when enabling development mode on an iOS device.


    **Caution**  Android has a plethora of debugging features that aren’t available
    on iOS, and they do increase the likelihood of interfering with apps. Some settings
    can greatly reduce performance and battery lifetime. Some settings can even prevent
    you from successfully transferring or launching the app. So, until you’ve completed
    the chapter, I highly recommend you set the developer options exactly as described
    here, leaving all other options as they are for now.


    Enabling USB Debugging


    In order to transfer apps to the Android device, you have to enable the USB debugging
    setting. (See [Figure 13-7](#part0024.html#Fig7)).


    ![9781484202630_Fig13-07.jpg](images/00196.jpeg)


    [Figure 13-7](#part0024.html#_Fig7). Enable “USB debugging” and, to avoid lock-screen
    issues, enable “Stay awake” mode, too


    This puts the device in debugging mode while it is connected to a USB port. This
    state poses a potential security risk, which Android will warn you about when
    enabling this option. After all, it allows any computer to write to and read from
    the device without any security verification whatsoever.


    **Tip**  If you are concerned about the security and privacy of your device and
    its data, you should consider using a separate Android device just for testing.
    The option to back up your device and then reset it to factory defaults is considered
    safe, too. However, it’s not something you’ll want to do every morning and then
    restore from backup every evening. It’s easier to simply turn the *Developer options*
    on/off slider at the very top (shown in [Figure 13-7](#part0024.html#Fig7)) to
    off when you are done debugging. You can also remove the *Developer options* entry
    altogether, but this requires clearing the *Settings* data, which means you’ll
    lose all settings in the *Settings* app.


    Enabling Stay Awake


    Alongside USB debugging, you should enable *Stay awake* mode. This prevents the
    device from sleeping or going to the lock screen while connected to a USB port.
    Yet, even with this mode enabled, the screen will dim and go to sleep when you
    unplug it from the USB cable.


    I had to enable *Stay awake* because transferred apps failed to launch after transfer
    whenever the device was sleeping and showing the lock screen. Either the screen
    went black with no response from the app or the screen just showed the lock screen.
    When I swiped the lock screen, the app would just quit or shut down with an error.


    Your mileage may vary, and perhaps the actions I observed were pure coincidence.
    So you may want to test deployment with *Stay awake* mode disabled, but only do
    so after you confirm that you can build and run apps on your Android device.


    **Caution**  Keeping the device in *Stay awake* mode for many hours poses the
    risk of screen burn-ins. A *burn-in* is a ghost image caused by displaying the
    same, static screen for very long time. LCD pixels that stay lit for a long time
    lose their ability to relax to an unlit state. It’s rare for this to happen, but
    it’s a possibility.


    Enabling OpenGL Stack Trace


    Another option I recommend turning on for now is *OpenGL traces*.


    Tap the *Turn on OpenGL traces* item, which is shown in [Figure 13-8](#part0024.html#Fig8).
    A popup will ask you what type of trace you’d like. Pick the *Call stack on glGetError*
    option.


    ![9781484202630_Fig13-08.jpg](images/00197.jpeg)


    [Figure 13-8](#part0024.html#_Fig8). Tap “Turn on OpenGL traces” to post the glGetError
    call stack to the debug log


    For some reason, without *OpenGL traces* turned on, my device often failed to
    launch the app, aborting with a GL_INVALID_OPERATION error. The error appeared
    long before any of the project’s own code ran, even before Cocos2D itself (and
    thus its OpenGL view) began initializing.


    For reference, here’s what I saw in my log when the launch failed:


    ```

    D/OpenGLRenderer(11473): GL error from OpenGLRenderer: 0x502

    E/OpenGLRenderer(11473):   GL_INVALID_OPERATION

    ```


    Following that: nothing. The app just stopped launching.


    Turning on *OpenGL traces* fixed that problem for me; when I turned it off, the
    app failed to launch again. If you get the same freeze with the same error message,
    check if enabling OpenGL traces fixes that problem for you too. Since it doesn’t
    hurt to have this option enabled, you can just leave it turned on.


    Confirming Deployment to Android


    When you create a new SpriteBuilder project with SpriteBuilder v1.3 or later,
    it will automatically have support for Android built-in.


    Over the course of the book, you’ve already created a decently complex project,
    and maybe you know this adage: “Complex systems tend to have complex problems.”
    Therefore, it’s best to rule out as many additional problems first by trying Android
    support with a new SpriteBuilder project. You can either follow the descriptions
    here or open the *14 - HelloSpriteBuilder Android* project.


    Creating a New SpriteBuilder Project


    Open SpriteBuilder, and select *File* ![image](images/00008.jpeg) *New* ![image](images/00008.jpeg)
    *Project* to create a new project. Name it **HelloSpriteBuilder**, and save it
    wherever you like. (Your *Documents* folder would be a good choice.) The new project
    contains a *MainScene.ccb* with a color node and the SpriteBuilder logo.


    Have a quick look at the *File* ![image](images/00008.jpeg) *Project Settings*
    dialog. You’ll see both iOS and Android platforms selected, as shown in [Figure
    13-9](#part0024.html#Fig9). This means SpriteBuilder will publish two sets of
    resources, one for iOS and one for Android. You can deselect the *phone*, *phonehd*,
    *tablet*, and *tablethd* resources for each platform individually. For now, leave
    them all selected.


    ![9781484202630_Fig13-09.jpg](images/00198.jpeg)


    [Figure 13-9](#part0024.html#_Fig9). The “Project settings” dialog shows both
    iOS and Android platforms selected'
  trans: '

    首先，确保您的 Android 设备已安装所有可用更新。设备应至少运行 Android 4.2，且 Android 4.4 更佳，因为 4.2 和 4.3
    版本可能因 Android 漏洞导致应用在调试时冻结或卡死。


    找到并打开*设置*应用。在*更多*标签页中，向下滚动并点击底部的*关于设备*项。（参见图 13-4）。


    ![9781484202630_Fig13-04.jpg](img/00193.jpeg)


    图 13-4。点击底部的“关于设备”以找到“版本号”项


    要启用开发者选项，您必须向下滚动并找到*版本号*项。（参见图 13-5）。即使*版本号*呈灰色，您也可以连续点击它至少七次来启用它。


    ![9781484202630_Fig13-05.jpg](img/00194.jpeg)


    图 13-5。要启用开发者选项，您必须点击“版本号”项七次


    点击几次后，您会看到一个小的弹出视图，提示您距离启用开发者选项仅差几次点击。继续点击*版本号*，直到消息消失。然后返回上一屏幕，您会在*关于设备*上方找到一个新的菜单项，标记为*开发者选项*。（参见图
    13-6）。


    ![9781484202630_Fig13-06.jpg](img/00195.jpeg)


    图 13-6。现在可以访问开发者选项


    点击*开发者选项*。您可能会收到一个警告，提示开发者设置仅供开发使用，这正是您的意图。


    虽然开发者选项可能导致错误，但出现错误的可能性并不比在 iOS 设备上启用开发模式时更高或更低。


    **注意** Android 拥有大量 iOS 上不可用的调试功能，这些功能确实会增加干扰应用的可能性。某些设置会大幅降低性能和电池寿命。某些设置甚至可能阻止您成功传输或启动应用。因此，在您完成本章之前，我强烈建议您完全按照此处描述设置开发者选项，暂时保留所有其他选项不变。


    ### 启用 USB 调试


    为了将应用传输到 Android 设备，您必须启用 USB 调试设置。（参见图 13-7）。


    ![9781484202630_Fig13-07.jpg](img/00196.jpeg)


    图 13-7。启用“USB 调试”，为避免锁屏问题，也请启用“保持唤醒”模式


    这会使设备在连接到 USB 端口时处于调试模式。此状态存在潜在安全风险，Android 会在您启用此选项时发出警告。毕竟，它允许任何计算机在没有任何安全验证的情况下写入和读取设备。


    **提示** 如果您担心设备及其数据的安全与隐私，应考虑使用单独的 Android 设备进行测试。备份设备然后将其恢复为出厂默认设置也是安全的。然而，您不会希望每天早上都执行此操作，然后每晚再从备份中恢复。更简单的方法是，在调试完成后，将顶部的*开发者选项*开关（如图
    13-7 所示）关闭。您也可以完全移除*开发者选项*条目，但这需要清除*设置*数据，这意味着您将丢失*设置*应用中的所有设置。


    ### 启用保持唤醒


    与 USB 调试一起，您还应启用*保持唤醒*模式。这可以防止设备在连接到 USB 端口时休眠或进入锁屏。然而，即使启用了此模式，当您拔掉 USB 线缆时，屏幕仍会变暗并进入休眠。


    我必须启用*保持唤醒*，因为当设备休眠并显示锁屏时，传输的应用在传输后无法启动。要么屏幕变黑，应用无响应，要么屏幕仅显示锁屏。当我滑动解锁时，应用会直接退出或因错误而关闭。


    您的情况可能有所不同，我观察到的现象可能纯属巧合。因此，您可以在禁用*保持唤醒*模式的情况下测试部署，但只有在确认能够在 Android 设备上构建和运行应用后才能这样做。


    **注意** 让设备长时间处于*保持唤醒*模式存在屏幕烧屏的风险。*烧屏*是一种残影现象，由长时间显示相同的静态屏幕造成。长时间保持点亮的 LCD 像素会失去恢复到不点亮状态的能力。这种情况很少发生，但仍有可能。


    ### 启用 OpenGL 堆栈跟踪


    我建议您暂时开启的另一个选项是*OpenGL 跟踪*。


    点击*开启 OpenGL 跟踪*项，如图 13-8 所示。会弹出一个窗口，询问您想要的跟踪类型。选择*glGetError 上的调用堆栈*选项。


    ![9781484202630_Fig13-08.jpg](img/00197.jpeg)


    图 13-8。点击“开启 OpenGL 跟踪”，将 `glGetError` 调用堆栈输出到调试日志


    出于某种原因，如果不开启*OpenGL 跟踪*，我的设备通常无法启动应用，并在发生 `GL_INVALID_OPERATION` 错误时中止。该错误在项目的任何代码运行之前很久就出现了，甚至在
    `Cocos2D` 本身（以及它的 `OpenGL` 视图）开始初始化之前。


    作为参考，以下是启动失败时我在日志中看到的内容：


    ```

    D/OpenGLRenderer(11473): GL error from OpenGLRenderer: 0x502

    E/OpenGLRenderer(11473):   GL_INVALID_OPERATION

    ```


    紧接着：什么都没有。应用就直接停止启动了。


    开启*OpenGL 跟踪*为我解决了这个问题；当我关闭它时，应用再次无法启动。如果您遇到同样的冻结和相同的错误信息，请检查启用 *OpenGL 跟踪*是否也能为您解决这个问题。由于开启此选项并无坏处，您可以保持其开启。


    ### 确认部署到 Android


    当您使用 `SpriteBuilder` v1.3 或更高版本创建新的 `SpriteBuilder` 项目时，该项目将自动内置对 Android 的支持。


    在本书的进行过程中，您已经创建了一个相当复杂的项目，也许您知道这句格言：“复杂的系统往往有复杂的问题。”因此，最好先通过尝试使用新的 `SpriteBuilder`
    项目进行 Android 支持，来尽可能排除其他问题。您可以按照此处描述操作，也可以打开*14 - HelloSpriteBuilder Android*项目。


    ### 创建新的 SpriteBuilder 项目


    打开 `SpriteBuilder`，选择*文件* ![image](img/00008.jpeg) *新建* ![image](img/00008.jpeg)
    *项目* 来创建一个新项目。将其命名为**HelloSpriteBuilder**，并保存到您喜欢的任何位置（您的*文档*文件夹是个不错的选择）。新项目包含一个带有颜色节点和
    `SpriteBuilder` 标志的 `MainScene.ccb`。


    快速查看一下*文件* ![image](img/00008.jpeg) *项目设置*对话框。您会看到 iOS 和 Android 平台都已选中，如图 13-9
    所示。这意味着 `SpriteBuilder` 将发布两套资源，一套用于 iOS，一套用于 Android。您可以为每个平台单独取消选择*phone*、*phonehd*、*tablet*
    和 *tablethd* 资源。现在，请将它们全部保持选中状态。


    ![9781484202630_Fig13-09.jpg](img/00198.jpeg)


    图 13-9。“项目设置”对话框显示 iOS 和 Android 平台均已选中

