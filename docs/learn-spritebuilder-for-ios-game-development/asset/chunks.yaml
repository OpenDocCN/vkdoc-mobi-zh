- fmt: '# Alignment and Spacing Issues with Box Layout


    Alignment and spacing leave a lot to be desired. Also, the contents of the `verticalLayout`
    node are in reverse order, with the label at the bottom and the `horizontalLayoutSfx`
    at the top. This is an unfortunate behavior of `Box Layout` nodes whose `Direction`
    is set to `Vertical`. It can be easily worked around by dragging the `verticalLayout`
    child nodes in the Timeline so that they are in reverse order as they appear on
    the layer.


    The nodes are also not centered on the layer but offset to the right and up. This
    is because the anchor point of `Box Layout` nodes defaults to `0, 0`. So even
    though the `verticalLayout` node’s position is centered on the stage, its content
    extends to the right and up because of the anchor point. Select the `verticalLayout`
    node, and change its `Anchor point` property to `0.5` for both the X axis and
    Y axis. This will center the nodes. You should also change the `verticalLayout`
    node’s `Spacing` property to `30` to increase the vertical space between the sliders
    and the labels.


    The sliders are still too wide, though, and they are overlapping the labels. You
    can decrease the slider’s size by selecting a slider, and then changing the `Width`
    of the `Preferred size` property from its default `200` to `150`. Do this for
    both `CCSlider` nodes.


    The labels still overlap with the sliders, however. This is a spacing issue, and
    fixed by editing the `Spacing` property for both the `horizontalLayoutMusic` and
    `horizontalLayoutSfx` box layout nodes. Set the spacing to `20` for both.


    ## Left-Alignment with Box Layout


    If you have eagle eyes, you may have spotted that the two labels and sliders still
    do not align perfectly. The music volume label seems to be slightly more indented
    than the effects volume label, while the sliders do not start and end at the same
    X position either. If you want to pronounce this effect, select the effects volume
    label and change its text to `FX Volume`. I bet now you can see it. See [Figure
    7-8](#part0017.html#Fig8) for an example.


    ![9781484202630_Fig07-08.jpg](images/00102.jpeg)


    [Figure 7-8](#part0017.html#_Fig8). The labels and sliders do not align correctly


    The problem here is that the size of the labels will be different unless they
    use the exact same text. Even if both labels had the same number of characters,
    they might still be different in size unless you are using a fixed-width font
    such as Courier. But Courier is an ugly font: It looks like this.


    Fortunately, this can be fixed easily by ensuring that both the `horizontalLayoutMusic`
    and `horizontalLayoutSfx` box layout nodes have the same content size. If you
    select one and the other, you’ll notice their `content size` properties differ.
    The `horizontalLayoutMusic` node has a width of `246`, while the width of `horizontalLayoutSfx`
    is just `230` if you’ve set its child label’s text to `FX Volume`.


    This means that the `horizontalLayoutSfx` content size is 16 points less wide.
    So you merely need to make it 16 points wider. Consider the `Spacing` property
    that you’ve set to `20` for both horizontal layout nodes. You need to increase
    the spacing for the `horizontalLayoutSfx` node only.


    Select the `horizontalLayoutSfx` node, and change `Spacing` to `36`—that’s the
    original 20 plus the missing 16 points. That is all: alignment fixed.


    Check the content size of the two horizontal layout nodes to confirm that their
    width is now the same. Both labels are now left-aligned, as are the sliders.


    ## Center-Alignment with Box Layout


    But what if you wanted the labels to be center-aligned and not have to worry about
    adjusting the `Box Layout` node’s spacing properties whenever you change a label’s
    text?


    As of now, you have each label and slider aligned horizontally in a `Box Layout`
    node, and the two box layout nodes are aligned vertically in another `Box Layout`
    node. You can always reverse this setup. In this instance, you could have both
    labels in a vertically aligned `Box Layout` node, and both sliders in another
    vertically aligned `Box Layout` node. You would then add both vertical box layout
    nodes to a horizontally aligned `Box Layout` node.


    The result will be different in so far that each vertical column’s width is defined
    by the node with the largest width. In other words, the widest label now defines
    the alignment of all labels in relation to all sliders next to the labels.


    Give this a shot by first removing the `horizontalLayoutSfx` and `horizontalLayoutMusic`
    nodes. This will also remove their child nodes.


    Then drag and drop a `Box Layout` node onto the existing `verticalLayout` node
    and name it `horizontalLayout`. Drag and drop two more `Box Layout` nodes onto
    the `horizontalLayout` node, change their `Direction` property to `Vertical` and
    change their names in the Timeline to `verticalLayoutLabels` and `verticalLayoutSliders`.


    Then add two `Label TTF` nodes to the `verticalLayoutLabels` node, and change
    their label text to `FX Volume` and `Music Volume`, respectively. Also, add two
    `Slider` nodes to the `verticalLayoutSliders` node. You may want to edit the label
    and slider names in the Timeline so that they reflect whether they refer to music
    or effects volume. See [Figure 7-9](#part0017.html#Fig9) for reference.


    ![9781484202630_Fig07-09.jpg](images/00103.jpeg)


    [Figure 7-9](#part0017.html#_Fig9). Labels and sliders aligned in separate vertical
    columns


    Now you still have the same problem as before: the sliders and labels are positioned
    too tightly. Therefore, set the `Spacing` property to `25` for the `Box Layout`
    nodes named `horizontalLayout` and `verticalLayoutSliders`, while `verticalLayoutLabels`
    should use a `Spacing` of `18`. Observe how each change affects the nodes involved.


    The advantage of this setup is that it behaves a little more like auto-layout,
    at least considering horizontal alignment, which tends to be more important than
    vertical alignment. You still have the same problem as before, but now with vertical
    alignment—hence, the spacing of `verticalLayoutLabels` needed to be set to `18`
    to better align them with the sliders.


    It’s difficult to get the alignment correct either way when there are `Label TTF`
    nodes involved.


    Still, if you change a label’s text or font size, or a slider’s width, this new
    setup will shift the position of the nodes in the other column accordingly. The
    result will be like those shown in [Figure 7-10](#part0017.html#Fig10). Notice
    the labels are now center-aligned inside their vertical column.


    ![9781484202630_Fig07-10.jpg](images/00104.jpeg)


    [Figure 7-10](#part0017.html#_Fig10). The labels are now center-aligned


    It’s not possible to give a general recommendation as to which type of layout
    is preferable—columns first, rows second as in the first example, or rows first
    and columns second as in the second example. Sometimes one is easier to work with;
    at other times, the other way is easier. It definitely helps if you can make all
    nodes involved in a grid-based layout the same dimensions.


    But, alas, with labels this is almost never possible unless you are using a fixed-width
    font. Sometimes padding labels with space characters can help, though, if the
    alignment doesn’t have to be perfect.


    **Tip** There’s one thing you can experiment with if you need to specify the dimensions
    of a label really badly: use `Button` nodes in place of `Label TTF`! You can set
    the button’s sprite frames to `<NULL>` in order to hide the background sprites,
    and you’ll still be able to change the button’s size via the `Preferred size`
    and `Max size` properties, as well as the label’s `Horizontal padding` and `Vertical
    padding`. You would end up with a label whose extents you can modify.


    ## Changing the Slider Visuals'
