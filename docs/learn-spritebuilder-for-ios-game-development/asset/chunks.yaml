    \n`__weak`关键字向编译器发出信号，表明此变量不应保留分配给它的对象。如果您向`_playerNode`实例发送`removeFromParent`消息，它将允许释放内存，并且由于`__weak`关键字，`_playerNode`引用将自动变为`nil`。\n\
    \n通常，将不是由类创建或拥有的对象指针实例变量声明为`__weak`是一种良好的做法。具体在 Cocos2D 中，当引用是节点的父节点（或祖父节点等）或兄弟节点时，您应始终将对节点的引用声明为`__weak`。省略`__weak`关键字会创建一个强引用，在最坏的情况下会导致保留循环——一种情况，在其最简单的形式中，节点\
    \ A 强引用节点 B，而节点 B 也持有对节点 A 的强引用，并且两者都不释放对方，因此两者都无法释放。在`__weak`不合适的情况下，您会很快注意到，因为引用通常比预期更早变为`nil`。\n\
    \n> **提示** 要了解有关弱变量和强变量的更多信息，以及何时以及为何使用它们以及一般内存管理指南，您可以在 Apple 的“高级内存管理编程指南”中找到这些信息：[`developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt`](https://developer.apple.com/library/ios/documentation/Cocoa/Conceptual/MemoryMgmt)，特别是“实用内存管理”部分。该指南由“过渡到\
    \ ARC 发行说明”补充，可在此处找到：[`developer.apple.com/library/mac/releasenotes/ObjectiveC/RN-TransitioningToARC`](https://developer.apple.com/library/mac/releasenotes/ObjectiveC/RN-TransitioningToARC)。请注意，本书的项目、SpriteBuilder\
    \ 和 Cocos2d-Swift 都使用 ARC（自动引用计数）来使内存管理更加容易。\n\n声明了上述变量后，您应该获取对玩家节点的引用并将其分配给`_playerNode`。获取节点引用的最简单方法是通过其名称。为此，请在\
    \ SpriteBuilder 中打开`Level1.ccb`并选择玩家节点。在“项目属性”选项卡上，在“名称”文本字段中输入`player`（全部小写）。\n\
    \n> **注意** 只有节点的“名称”属性可用于通过其名称获取节点。仅更改时间线中节点的名称不会使其可通过此名称访问。时间线名称仅在 SpriteBuilder\
    \ 中用于清晰性。\n\n发布项目并返回 Xcode。在`GameScene.m`中，将清单 3-2 中突出显示的代码添加到已存在的`didLoadFromCCB`方法中。\n\
    \n**清单 3-2**。启用用户交互\n\n```\n-(void) didLoadFromCCB\n{\n    // enable receiving\
    \ input events\n    self.userInteractionEnabled = YES;\n\n    // load the current\
    \ level\n    [self loadLevelNamed:nil];\n}\n```\n\n第一行允许`GameScene`类接收触摸事件。接下来，将下面显示的清单\
    \ 3-3 代码添加到`didLoadFromCCB`方法中。此代码将在本书后面展开；它目前尚未加载关卡。\n\n**清单 3-3**。通过名称获取玩家节点\n\
    \n```\n-(void) loadLevelNamed:(NSString*)levelCCB\n{\n    // get the current level's\
    \ player in the scene by searching for it recursively\n    _playerNode = [self\
    \ getChildByName:@\"player\" recursively:YES];\n    NSAssert1(_playerNode, @\"\
    player node not found in level: %@\", levelCCB);\n}\n```\n\n这里，返回了第一个名称为`player`的子节点。搜索是递归执行的，这意味着搜索覆盖了整个节点层次结构，包括`self`节点中所有子节点和孙节点。结果被分配给`_playerNode`实例变量。\n\
    \n如果无法通过名称找到`_playerNode`，这里的`NSAssert`将抛出异常并在日志中输出一条消息。像这样的安全措施是很好的做法，因为它们使您能够在出现意外情况时立即发现问题，而不是让您困惑为什么玩家不会移动。为了本书其余部分的简洁性和可读性，我将省略安全检查，但您可以在本书的第\
    \ 14 章：调试和最佳实践中了解有关调试策略和防御性编程技术的更多信息。\n"
- fmt: "# Exception Breakpoints: An Essential Debugging Aid\n\nThere’s but one thing\
    \ that you ought to do in every Xcode project: add an exception breakpoint as\
    \ shown in [Figure 3-1](#part0012.html#Fig1). To do this, click on the Breakpoint\
    \ Navigator tab in Xcode (the right-facing arrow-like icon highlighted in tab\
    \ bar). At the bottom of the pane is an Add button (a `+` symbol). Click it and\
    \ choose Add Exception Breakpoint. You can optionally edit the breakpoint by right-clicking\
    \ it. In [Figure 3-1](#part0012.html#Fig1), it is set to catch Objective-C exceptions\
    \ only. The exception breakpoint will halt the program at the offending line of\
    \ code so that you know exactly where a program error occurred, rather than Xcode\
    \ always jumping to the main method. Exception breakpoints are an essential debugging\
    \ aid.\n\n![9781484202630_Fig03-01.jpg](images/00040.jpeg)\n\n[Figure 3-1](#part0012.html#_Fig1).\
    \ Adding an exception breakpoint to every project is an essential debugging aid\n\
    \nNow that touch events are enabled and the `_playerNode` reference is assigned,\
    \ you can move the player to a touch location easily. For the moment, the code\
    \ in [Listing 3-4](#part0012.html#list4) will do. Add the [Listing 3-4](#part0012.html#list4)\
    \ code to the `GameScene.m` implementation file below the `loadLevelNamed:` method.\n\
    \n[***Listing 3-4***](#part0012.html#_list4). Teleporting the player to the touch\
    \ location\n\n```\n-(void) touchBegan:(UITouch *)touch withEvent:(UIEvent *)event\n\
    {\n    _playerNode.position = [touch locationInNode:self];\n}\n```\n\nThis takes\
    \ the location of the touch and transforms it from the touch’s Cocoa coordinate\
    \ system (origin in the upper-left corner) to the OpenGL coordinate system used\
    \ by Cocos2D (origin in the lower-left corner). It also converts the position\
    \ to the local coordinate space of the supplied node, in this instance `self`.\
    \ The result is directly applied to the `_playerNode`, which will now, when you\
    \ build and run, instantly zap to where you tap on the screen.\n\n# Assigning\
    \ the Level-Node ivar\n\nFor the next steps, you need to have a reference to the\
    \ level node. Instead of getting it by name like the player, you can also have\
    \ SpriteBuilder assign it to the `GameScene` class directly, provided that the\
    \ class already declares an ivar or property of the same name. Which it already\
    \ does since [Listing 3-1](#part0012.html#list1).\n\nAssigning a variable via\
    \ SpriteBuilder and obtaining a node by name are equally fine. For the most part,\
    \ it’s a matter of personal preference, though it’s recommended not to use the\
    \ `getChildByName:` method frequently in a scheduled method or in `update:` methods,\
    \ in particular with recursive searches and a deep-node hierarchy.\n\n**Caution**\
    \ At the time of this writing, assigning variables from within SpriteBuilder works\
    \ only for nodes that are direct descendants of a given CCB file. It cannot be\
    \ used to assign nodes to ivars or properties where the node is in another CCB\
    \ imported via a Sub File (`CCBFile`) node. This is the reason why the player\
    \ node was obtained by name.\n\nOpen the `GameScene.ccb` within SpriteBuilder,\
    \ and select the `CCBFile` instance that references the `Levels/Level1.ccb`. Then,\
    \ on the Details Inspector on the right side, switch to the Item Code Connections\
    \ tab. In the second row’s text field, enter `_levelNode`, which is the name of\
    \ the ivar you already declared in [Listing 3-1](#part0012.html#list1). Do leave\
    \ the drop-down menu set to “Doc root var” as shown in [Figure 3-2](#part0012.html#Fig2).\n\
    \n![9781484202630_Fig03-02.jpg](images/00041.jpeg)\n\n[Figure 3-2](#part0012.html#_Fig2).\
    \ A doc root var assigns a node to a correspondingly named ivar or property declared\
    \ in the CCB root node’s custom class\n\nIf you publish, build, and run, the `_levelNode`\
    \ ivar will be assigned by `CCBReader` before it sends the `didLoadFromCCB` message.\
    \ That’s the easiest, most efficient way to create a reference to a node contained\
    \ within a CCB.\n\nIf you want to confirm that the variable has been assigned,\
    \ you could add this log statement to `didLoadFromCCB`:\n\n```\nNSLog(@\"_levelNode\
    \ = %@\", _levelNode);\n```\n\nRun the project and you’ll find the preceding line\
    \ logged in the Xcode Debug Console. If necessary, open the Console in Xcode under\
    \ View ![image](images/00008.jpeg) Debug Area ![image](images/00008.jpeg) Activate\
    \ Console. If you see `_levelNode = (null)`, the variable name in [Figure 3-2](#part0012.html#Fig2)\
    \ probably doesn’t match the ivar’s name. Otherwise, the message in the log will\
    \ be similar to this:\n\n```\nLearnSpriteBuilder[54443:70b] _levelNode = <CCNode\
    \ = 0x9f77b30 | Name = >\n```\n\n# Moving the Player with `CCActionMoveTo`\n\n\
    To move the player smoothly to the desired location, you can replace the contents\
    \ of the `touchBegan:withEvent:` method with the action-based movement code in\
    \ [Listing 3-5](#part0012.html#list5).\n\n[***Listing 3-5***](#part0012.html#_list5).\
    \ Moving the player smoothly with a move action\n\n```\n-(void) touchBegan:(UITouch\
    \ *)touch withEvent:(UIEvent *)event\n{\n    CGPoint pos = [touch locationInNode:_levelNode];\n\
    \    CCAction* move = [CCActionMoveTo actionWithDuration:0.2 position:pos];\n\
    \    [_playerNode runAction:move];\n}\n```\n\nFirst, the touch location is converted\
    \ relative to the `_levelNode`. This is important to allow the player to move\
    \ about the full extents of the `_levelNode` (4000x500 points) rather than being\
    \ confined to the screen space (568x320 points on 4-inch iPhones or 1024x768 points\
    \ on iPads). However, this isn’t reflected by the game yet because there is no\
    \ scrolling; hence, the player can’t move further than the initial screen position.\n\
    \nNext, a `CCActionMoveTo` is created that moves a node to a given coordinate\
    \ over time. This action is then run on the `_playerNode`. Note that if you increase\
    \ the duration you will notice that the move actions don’t stack and the player\
    \ won’t end up where you last tapped. To fix that, you’d have to assign a tag—an\
    \ arbitrary integer number of your choice—to the action. Using this tag, you can\
    \ stop the existing action with the same tag before running the new one. [Listing\
    \ 3-6](#part0012.html#list6) shows the updated code with this improvement.\n\n\
    [***Listing 3-6***](#part0012.html#_list6). Stop an action by tag to avoid having\
    \ multiple move actions running simultaneously\n\n```\n-(void) touchBegan:(UITouch\
    \ *)touch withEvent:(UIEvent *)event\n{\n    [_playerNode stopActionByTag:1];\n\
    \n    CGPoint pos = [touch locationInNode:_levelNode];\n    CCAction* move = [CCActionMoveTo\
    \ actionWithDuration:20.2 position:pos];\n    move.tag = 1;\n    [_playerNode\
    \ runAction:move];\n}\n```\n\n**Tip** You can find all available action classes\
    \ in the Cocos2d-Swift class reference. Their class names always begin with `CCAction`:\
    \ [http://www.cocos2d-swift.org/docs/api/index.html](http://www.cocos2d-swift.org/docs/api/index.html).\n\
    \nIf you build and run the project now, you should see the player moving smoothly\
    \ across the screen when tapping. But the player won’t be able to “leave” the\
    \ initial screen. That’s where scrolling comes into play.\n\n# Scrolling the Level\n\
    \nNow, when I say scrolling, many developers naturally assume that it’s the camera\
    \ panning over the background that creates the scrolling effect. Some engines\
    \ and toolsets actually do it this way, mainly if 3D development tools are at\
    \ the core. But in 2D game engines, it is a lot more common and practical to move\
    \ the content layer in the opposite direction of the movement.\n\nIn fact, in\
    \ Cocos2D and many other 2D engines, there is no concept of a camera. Not even\
    \ OpenGL, the rendering technology Cocos2D is based on, has a camera. There’s\
    \ just the device screen. In order to change what’s visible on the screen, you’ll\
    \ have to move the contents of the scene as the camera view that the screen represents\
    \ stays fixed—fixed relative to the virtual world, that is. Of course, you can\
    \ move, tilt, and drop your phone freely in the real world, but that doesn’t affect\
    \ what’s displayed on screen.\n\nActually, if you drop your phone, it may affect\
    \ its screen. But that’s something else entirely.\n\n# Scheduling Updates"
  raw: 'There’s but one thing that you ought to do in every Xcode project: add an
    exception breakpoint as shown in [Figure 3-1](#part0012.html#Fig1). To do this,
    click on the Breakpoint Navigator tab in Xcode (the right-facing arrow-like icon
    highlighted in tab bar). At the bottom of the pane is an Add button (a + symbol).
    Click it and choose Add Exception Breakpoint. You can optionally edit the breakpoint
    by right-clicking it. In [Figure 3-1](#part0012.html#Fig1), it is set to catch
    Objective-C exceptions only. The exception breakpoint will halt the program at
    the offending line of code so that you know exactly where a program error occurred,
    rather than Xcode always jumping to the main method. Exception breakpoints are
    an essential debugging aid.


    ![9781484202630_Fig03-01.jpg](images/00040.jpeg)


    [Figure 3-1](#part0012.html#_Fig1). Adding an exception breakpoint to every project
    is an essential debugging aid


    Now that touch events are enabled and the _playerNode reference is assigned, you
    can move the player to a touch location easily. For the moment, the code in [Listing
    3-4](#part0012.html#list4) will do. Add the [Listing 3-4](#part0012.html#list4)
    code to the GameScene.m implementation file below the loadLevelNamed: method.


    [***Listing 3-4***](#part0012.html#_list4). Teleporting the player to the touch
    location


    ```

    -(void) touchBegan:(UITouch *)touch withEvent:(UIEvent *)event

    {

        _playerNode.position = [touch locationInNode:self];

    }

    ```


    This takes the location of the touch and transforms it from the touch’s Cocoa
    coordinate system (origin in the upper-left corner) to the OpenGL coordinate system
    used by Cocos2D (origin in the lower-left corner). It also converts the position
    to the local coordinate space of the supplied node, in this instance self. The
    result is directly applied to the _playerNode, which will now, when you build
    and run, instantly zap to where you tap on the screen.


    Assigning the Level-Node ivar


    For the next steps, you need to have a reference to the level node. Instead of
    getting it by name like the player, you can also have SpriteBuilder assign it
    to the GameScene class directly, provided that the class already declares an ivar
    or property of the same name. Which it already does since [Listing 3-1](#part0012.html#list1).


    Assigning a variable via SpriteBuilder and obtaining a node by name are equally
    fine. For the most part, it’s a matter of personal preference, though it’s recommended
    not to use the getChildByName: method frequently in a scheduled method or in update:
    methods, in particular with recursive searches and a deep-node hierarchy.


    **Caution**  At the time of this writing, assigning variables from within SpriteBuilder
    works only for nodes that are direct descendants of a given CCB file. It cannot
    be used to assign nodes to ivars or properties where the node is in another CCB
    imported via a Sub File (CCBFile) node. This is the reason why the player node
    was obtained by name.


    Open the GameScene.ccb within SpriteBuilder, and select the CCBFile instance that
    references the Levels/Level1.ccb. Then, on the Details Inspector on the right
    side, switch to the Item Code Connections tab. In the second row’s text field,
    enter **_levelNode**, which is the name of the ivar you already declared in [Listing
    3-1](#part0012.html#list1). Do leave the drop-down menu set to “Doc root var”
    as shown in [Figure 3-2](#part0012.html#Fig2).


    ![9781484202630_Fig03-02.jpg](images/00041.jpeg)


    [Figure 3-2](#part0012.html#_Fig2). A doc root var assigns a node to a correspondingly
    named ivar or property declared in the CCB root node’s custom class


    If you publish, build, and run, the _levelNode ivar will be assigned by CCBReader
    before it sends the didLoadFromCCB message. That’s the easiest, most efficient
    way to create a reference to a node contained within a CCB.


    If you want to confirm that the variable has been assigned, you could add this
    log statement to didLoadFromCCB:


    ```

    NSLog(@"_levelNode = %@", _levelNode);

    ```


    Run the project and you’ll find the preceding line logged in the Xcode Debug Console.
    If necessary, open the Console in Xcode under View ![image](images/00008.jpeg)
    Debug Area ![image](images/00008.jpeg) Activate Console. If you see _levelNode
    = (null) , the variable name in [Figure 3-2](#part0012.html#Fig2) probably doesn’t
    match the ivar’s name. Otherwise, the message in the log will be similar to this:


    ```

    LearnSpriteBuilder[54443:70b] _levelNode = <CCNode = 0x9f77b30 | Name = >

    ```


    Moving the Player with CCActionMoveTo


    To move the player smoothly to the desired location, you can replace the contents
    of the touchBegan:withEvent: method with the action-based movementcode in [Listing
    3-5](#part0012.html#list5).


    [***Listing 3-5***](#part0012.html#_list5). Moving the player smoothly with a
    move action


    ```

    -(void) touchBegan:(UITouch *)touch withEvent:(UIEvent *)event

    {

        CGPoint pos = [touch locationInNode:_levelNode];

        CCAction* move = [CCActionMoveTo actionWithDuration:0.2 position:pos];

        [_playerNode runAction:move];

    }

    ```


    First, the touch location is converted relative to the _levelNode. This is important
    to allow the player to move about the full extents of the _levelNode (4000x500
    points) rather than being confined to the screen space (568x320 points on 4-inch
    iPhones or 1024x768 points on iPads). However, this isn’t reflected by the game
    yet because there is no scrolling; hence, the player can’t move further than the
    initial screen position.


    Next, a CCActionMoveTo is created that moves a node to a given coordinate over
    time. This action is then run on the _playerNode. Note that if you increase the
    duration you will notice that the move actions don’t stack and the player won’t
    end up where you last tapped. To fix that, you’d have to assign a tag—an arbitrary
    integer number of your choice—to the action. Using this tag, you can stop the
    existing action with the same tag before running the new one. [Listing 3-6](#part0012.html#list6)
    shows the updated code with this improvement.


    [***Listing 3-6***](#part0012.html#_list6). Stop an action by tag to avoid having
    multiple move actions running simultaneously


    ```

    -(void) touchBegan:(UITouch *)touch withEvent:(UIEvent *)event

    {

        [_playerNode stopActionByTag:1];


    CGPoint pos = [touch locationInNode:_levelNode];

        CCAction* move = [CCActionMoveTo actionWithDuration:20.2 position:pos];

        move.tag = 1;

        [_playerNode runAction:move];

    }

    ```


    **Tip**  You can find all available action classes in the Cocos2d-Swift class
    reference. Their class names always begin with *CCAction*: [http://www.cocos2d-swift.org/docs/api/index.html](http://www.cocos2d-swift.org/docs/api/index.html).


    If you build and run the project now, you should see the player moving smoothly
    across the screen when tapping. But the player won’t be able to “leave” the initial
    screen. That’s where scrolling comes into play.


    Scrolling the Level


    Now, when I say scrolling, many developers naturally assume that it’s the camera
    panning over the background that creates the scrolling effect. Some engines and
    toolsets actually do it this way, mainly if 3D development tools are at the core.
    But in 2D game engines, it is a lot more common and practical to move the content
    layer in the opposite direction of the movement.


    In fact, in Cocos2D and many other 2D engines, there is no concept of a camera.
    Not even OpenGL, the rendering technology Cocos2D is based on, has a camera. There’s
    just the device screen. In order to change what’s visible on the screen, you’ll
    have to move the contents of the scene as the camera view that the screen represents
    stays fixed—fixed relative to the virtual world, that is. Of course, you can move,
    tilt, and drop your phone freely in the real world, but that doesn’t affect what’s
    displayed on screen.


    Actually, if you drop your phone, it may affect its screen. But that’s something
    else entirely.


