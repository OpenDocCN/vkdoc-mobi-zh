  trans: "\n# 尝试强化此动画效果\n\n尝试通过增加时间线时长并相应移动关键帧来强化此动画效果，或使其更加微妙。动画中的细腻感和同步性大有可为。因此，尽管你可以为此动画尝试不同的缓动模式，但最佳效果是所有节点使用相同的缓动模式。否则，动作将无法同步，从而削弱预期效果。\n\
    \n## 通过菜单启动\n\n要在游戏中尝试此动画，你需要完成一些额外的清理步骤。首先，你尚未将背景添加到仍包含原始节点的 `MainScene.ccb`\
    \ 中。\n\n打开 `MainScene.ccb`，移除渐变色和标签节点。实际上，除了播放按钮外，移除所有多余的节点；否则，你将无法在下一章之前游玩关卡。但你可能需要将播放按钮移出原位，靠近左下角。\n\
    \n清除 `MainScene` 后，将 `MainMenuBackground` 拖放到舞台上，既可以从无图块编辑器视图中拖动，也可以从文件视图中拖动 `MainMenuBackground.ccb`。然后将新创建的\
    \ `CCBFile` 实例的位置设置为 `0, 0`。你还应在时间线中将该 `CCBFile` 实例重命名为 `background`。\n\n原始播放按钮应绘制在背景前方。它在时间线中应位于\
    \ `background` 节点之下。如果不是，请在时间线中将播放按钮向下拖动以更改绘制顺序。\n\n发布项目后，你可以运行 Xcode 并进行尝试——尽管通过暂停菜单再退出游戏回到主菜单有些麻烦。打开\
    \ `AppDelegate.m`，找到 `startScene` 方法。然后修改其中的代码行，使其加载 `MainScene.ccb`，如代码清单 7-1\
    \ 所示。\n\n***代码清单 7-1***。通过 MainScene.ccb 启动应用\n\n```\n-(CCScene*) startScene\n\
    {\n    return [CCBReader loadAsScene:@\"MainScene\"];\n}\n```\n\n游戏现在将使用 `MainScene`\
    \ 启动，但仍缺少徽标和按钮。\n\n## 主场景徽标和按钮\n\n让我们添加一些按钮和徽标。由于菜单 Sprite 表中的按钮图片 `play.png`\
    \ 和 `settings.png` 需要旋转动画，你需要在按钮功能实现上发挥一些创意。\n\n此外，你还将使用时间线链来实现一个开场序列，让按钮从屏幕侧面飞入。\n\
    \n### 设计徽标和按钮\n\n但首先要做的是。再次为按钮创建一个新的 CCB 文件。右键单击 `UserInterface` 文件夹，选择 *新建文件*。将文档命名为\
    \ `MainMenuButtons.ccb`，将其设为 *层*，保留默认大小，然后点击 *创建*。你可能还需要立即更改舞台颜色。进入 *文档 ![image](img/00008.jpeg)\
    \ 舞台颜色 ![image](img/00008.jpeg) 白色*，以便更清晰地查看图片。\n\n再次强调，在层 CCB 上要做的第一件事是选择根节点，并将其\
    \ *内容大小* 类型更改为 `%`，值为 `100`，以确保正确的缩放和居中。\n\n像之前多次实践的那样，一个分组节点对于定位和动画都非常有用。从节点库视图中将一个常规\
    \ *节点* 拖放到舞台上。将该节点的位置类型更改为 `%`，值设为 `50`。为节点取一个合适的名称，比如 `logoAndButtons`。我敢打赌，在使用\
    \ SpriteBuilder 几天后，你就能闭着眼睛完成这些步骤。\n\n现在，你可以从无图块编辑器视图中将 `play`、`settings` 和 `title`\
    \ 图片拖放到 `logoAndButtons` 节点上。这些精灵的实际位置并不重要，但我会提供我使用的数值。\n\n标题精灵应稍稍高于中心位置，因此将其位置改为\
    \ `0, 50`。播放精灵的位置应设为 `-50, -60`，设置精灵的位置设为 `50, -60`。负值位置完全没问题，因为节点的位置始终相对于父节点——本例中为\
    \ `logoAndButtons`。现在，这三个精灵之间应该有一定的间距，如图 7-5 所示。\n\n![9781484202630_Fig07-05.jpg](img/00099.jpeg)\n\
    \n图 7-5。MainMenuButtons.ccb 内容\n\n**提示** 如果你需要看到背景以正确对齐按钮和徽标，你可以随时将 `MainMenuBackground.ccb`\
    \ 拖放到舞台上，并将其移动到时间线顶部，使其绘制在背景中。但是，不要忘记移除该背景层，或者至少取消选中其 *可见* 属性。仅取消眼睛符号只会将其从 SpriteBuilder\
    \ 中隐藏，但它仍然会渲染 `MainMenuBackground.ccb` 的两个实例。这将对性能造成严重影响。\n\n按钮上可能需要添加一些文字，因为仅靠图片本身并不能真正传达含义。从节点库视图中，将一个\
    \ *Label TTF* 节点拖到播放精灵上，然后将另一个 *Label TTF* 节点拖到设置精灵上。这些标签应分别作为播放精灵和设置精灵节点的子节点。\n\
    \n对于两个标签，首先选中标签，然后将其位置类型改为 `%`，值设为 `50`。这会将标签居中于对应的精灵上。然后输入适当的 *标签文本*——例如，播放标签输入\
    \ *PLAY*（全大写），设置标签输入 *Settings*。播放标签可以使用 *字号* 20，而设置标签如果文本不希望超出齿轮图片范围，则 *字号* 不应超过\
    \ 16。结果应类似于图 7-5。\n\n### 制作徽标和按钮的动画\n\n这次动画制作会稍微有趣一些。你将创建一个开场时间线，在按钮开始旋转之前，将徽标和按钮移入位置。\n\
    \n左键单击 *时间线列表*（如第 5 章 的图 5-1 所示），选择 *编辑时间线* 以调出图 5-9 所示的对话框。点击 `+` 按钮创建第二条时间线，并将其命名为\
    \ `loop`。双击列表中的 *Default Timeline*，将其名称改为 `entry`。保持自动播放复选框不变。然后点击 *完成*。\n\n目标是让入场动画自动播放。入场动画随后链接到循环动画，而循环动画又链接到自身以无限循环。总体而言，这是一种非常便捷的方式，可以创建带有一次性入场动画的循环动画。让我们先进行此设置。\n\
    \n*时间线列表* 应显示 `entry`，表示已选中入场时间线。如果不是，左键单击 *时间线列表* 并选择 `entry` 时间线。\n\n在时间线底部，左键单击\
    \ *无链接时间线* 并将其设置为 `loop`。再次左键单击 *时间线列表*，从 *时间线* 子菜单中选择 `loop` 动画。再次在底部显示 *无链接时间线*\
    \ 的位置左键单击，并选择 `loop`。这将正确地将 `entry` 时间线链接到 `loop`，并将 `loop` 链接到自身以无限重复。\n\n**注意**\
    \ SpriteBuilder 不会按顺序播放链接的时间线。SpriteBuilder 只会播放当前选中的时间线，并可选择使其循环。要测试链接的时间线，你实际上需要运行应用。\n\
    \n### 编辑入场动画\n\n再次选择入场时间线。这是你要制作动画的第一个时间线。思路是按钮最初在屏幕外，然后飞入屏幕。这需要非常短的动画——毕竟，用户希望快速使用你的应用，而不会等待动画完成，无论你在这上面花了多少功夫。\n"
- fmt: '点击`duration`框，如[图 5-2](#part0014.html#Fig2)所示，以编辑时间线时长。将其设置为1秒15帧，即`00:01:15`。这相当于1.5秒，因为SpriteBuilder以每秒30帧的速度播放动画。


    选择`logoAndButtons`节点，并将其移动到图层左侧外部。X位置设为`–20`（百分比）即可。然后将时间线光标移至最左端，按下`P`键创建一个关键帧。将时间线光标移至最右端，再次按下`P`键创建第二个关键帧。编辑`logoAndButtons`节点的位置，将其X位置设为`50`（百分比）。这将创建一个平淡的滑入动画，但好处是徽标和按钮会随之移动。


    为了增加动感，右键点击关键帧片段，选择`Elastic Out`缓动模式。初始时这可能会显得过于弹跳。再次右键点击关键帧片段。在选中`Elastic`或常规`Ease`模式之一后，`Easing
    Setting`菜单项将被启用；点击它可打开一个微小的弹出窗口，允许您设置一个模糊的浮点数值。


    在本例中，该值名为`Period`，它定义了动画的弹性程度。该值越低，节点在停止前来回移动的幅度越大。在本例中，输入值`0.9`，点击`Done`，然后再次播放动画。现在的弹性会减弱。


    **警告**  如果您将关键帧片段的缓动模式更改为另一种缓动模式，`Easing Setting`值将重置为其默认值。恐怕每当您选择另一种缓动模式时，都必须重新输入该设置值。


    入场动画当然可以进一步优化。一个不错的效果是在适当的时间对按钮进行缩放。请对`play`和`settings`精灵节点重复以下步骤：


    1.  选择精灵节点（`play`或`settings`）。

    2.  将时间线光标移至时间线中间附近。

    3.  按下`S`添加一个缩放关键帧。将`Scale X`和`Scale Y`属性均设置为`0`。

    4.  将时间线光标移至时间线的最右端。

    5.  按下`S`添加另一个缩放关键帧。将`Scale X`和`Scale Y`属性均设置为`1`。

    6.  右键点击关键帧片段，选择`Bounce Out`缓动模式。


    您可以尝试移动`play`和`settings`精灵的第一个关键帧，使它们的缩放动画在略有不同的时间点开始。请参见[图 7-6](#part0017.html#Fig6)了解入场时间线可能的效果。


    ![9781484202630_Fig07-06.jpg](images/00100.jpeg)


    [图 7-6](#part0017.html#_Fig6). 入场时间线将节点从左侧移入，并在某个时刻将按钮也缩放进来


    编辑循环动画


    关于`entry`时间线就介绍到这里。现在切换到`loop`时间线。您会注意到，首先，所有现有的关键帧都消失了。您正在编辑一个迄今为止仍是空白的时间线。此外，`logoAndButtons`节点——以及其中的徽标和按钮精灵——已移回其原始位置，即图层左侧稍外。


    这不应给您带来太大困扰，但值得考虑的是，您在一个时间线中制作的动画不会反映在另一个时间线中。因此，如果您想串联两个时间线，您必须精确地按照前一个时间线离开节点时的状态来设计下一个时间线的起始状态，以防止节点出现任何突然运动。


    在本例中，修复很简单：只需选择`logoAndButtons`节点并将其位置更改为`50%x50%`。由于您已选中循环动画，此位置更改不会影响`logoAndButtons`在入场时间线中的位置。


    按前述方法更改时间线时长，将其设为2秒。然后，对`play`和`settings`精灵执行以下操作：


    1.  选择精灵节点（`play`或`settings`）。

    2.  将时间线光标移至最左端。

    3.  按下`R`创建一个旋转关键帧。

    4.  将时间线光标移至最右端。

    5.  按下`R`创建另一个旋转关键帧。

    6.  将`Rotation`属性的值更改为`360`。这将把该值应用于最右端的关键帧。


    播放动画。注意精灵是如何旋转的。同时注意标签如何随其父精灵一起旋转。啊。也许再想一想，将标签设为`play`和`settings`精灵的子节点并非一个好主意？


    并非如此。您仍然可以运用一个技巧：如果您在子节点上播放与父节点相同的动画，但方向相反，那么两个动画将相互抵消！因此，如果您让每个标签朝与其父精灵相反的方向旋转，它们就会停止旋转！请对两个标签尝试以下操作：


    1.  选择精灵节点的标签（`play`或`settings`）。

    2.  将时间线光标移至最左端。

    3.  按下`R`创建一个旋转关键帧。

    4.  将`Rotation`属性的值更改为`360`。这将把该值应用于最左端的关键帧。

    5.  将时间线光标移至最右端。

    6.  按下`R`创建另一个旋转关键帧。

    7.  将`Rotation`属性的值更改为`0`。这将把该值应用于最右端的关键帧。


    结果是精灵现在顺时针旋转，而它们的子标签则逆时针旋转。由于两个动画同时开始和结束，并且都完成一整圈旋转，因此标签的旋转抵消了其父精灵的旋转，从而标签保持固定。


    如果这个看似笨拙的做法没有带来巧妙副作用，我本不会让您这样做。右键点击每个标签的关键帧片段，将其缓动模式更改为`Ease In/Out`。您可以选择再次右键点击，将`Easing`设置中的`Rate`值略微调低——例如，范围在`1,3`到`1,8`之间。


    无论如何，由于两个动画不再同步——得益于缓动，标签的旋转速度会随时间加快和减慢——标签现在会左右摇摆。


    尽管这只是一个奇怪的示例，但鼓励您尝试此类堆叠动画。如果您对父节点和子节点使用不同的动画方式，您会发现最奇特的节点动画方法。


    例如，想象您用一种缓动模式将一个普通节点向右移动200点，同时用另一种不同的缓动模式将其子精灵节点向左移动150点，这样精灵最终向右移动了50点，但具有两种不同缓动模式的组合效果。


    如果您现在运行应用，您应该会看到徽标从左侧滑入。在徽标仍在移动时，按钮会通过缩放动画出现。此时间线结束后，按钮开始旋转。


    **提示**  如果您希望即使在入场时间线运行时按钮也在旋转，该怎么办？通常有两种方法可以实现。


    一种是在入场时间线中为精灵及其标签复制旋转关键帧。这种方法在此处效果很好，但工作量大了一倍，如果您以后改变按钮的旋转方式，工作量会更大。


    另一种方法是为每个按钮创建一个自定义的CCB文档，并在其中创建旋转动画。然而，这意味着您需要为每个按钮的CCB文档创建一个自定义类，尽管您可以为两个按钮使用同一个类。获取`MainScene`类的引用仍然有多种方式。例如，在类的`onEnter`方法中，以下代码获取了`MainScene`对象的引用：`MainScene*
    mainScene = (MainScene*)self.scene.children.firstObject;`


