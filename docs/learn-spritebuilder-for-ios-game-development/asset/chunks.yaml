- fmt: 'If you play this animation, the menu will zoom out and move to the upper left,
    at which point the `ready` label starts to blink three times. If you run this
    in the game, the game will resume when the Timeline reaches the `Callbacks` keyframe.


    As an exercise for you, add three additional `Callbacks` keyframes at the same
    time stamps where the label becomes visible. Use the same selector `updateReadyCounter`
    for each keyframe, implement the corresponding method in `GameMenuLayer`, and
    add a `_readyCounter` ivar of type `int` to the `GameMenuLayer` class.


    The `_readyCounter` should be set to 3 in the `shouldResumeGame` method and decreased
    by one every time `updateReadyCounter` runs. In the same method, you update the
    label’s `text` property to `3`, `2`, and `1`, depending on the `_readyCounter`,
    to create a countdown label.


    You’ll need a reference to the label to do so, so either give it a name and get
    it by name, or more efficiently use the `Item Code Connections` tab to assign
    the label reference to a `_readyLabel` ivar of type `CCLabelTTF*`, which you’ll
    have to add as an ivar in the `GameMenuLayer.m` file.


    ## Interlude: Pausing the Game When It Enters the Background


    Wouldn’t it be nice if the game would automatically pause whenever the app enters
    the background? This happens, for instance, when receiving a phone call or the
    user taps the home button while playing.


    Furthermore, wouldn’t it be awesome if any node could implement one of the `UIApplicationDelegate`
    methods and receive them as they are sent by iOS without having to manually pass
    these messages along or registering notifications and what not? Well yes, and
    in fact it’s quite straightforward to implement.


    Open the `AppDelegate.m` file in Xcode. Just below the `startScene` method, add
    the method from [Listing 6-14](#part0015.html#list14).


    [***Listing 6-14***](#part0015.html#_list14). Forwarding `UIApplicationDelegate`
    messages to nodes


    ```

    -(void) performSelector:(SEL)selector

                     onNode:(CCNode*)node

                 withObject:(id)object

                  recursive:(BOOL)recursive

    {

        if ([node respondsToSelector:selector])

        {

            [node performSelector:selector withObject:object];

        }


    if (recursive)

        {

            for (CCNode* child in node.children)

            {

                [self performSelector:selector

                               onNode:child

                           withObject:object

                            recursive:YES];

            }

        }

    }

    ```


    **Tip** The method in [Listing 6-14](#part0015.html#list14) could be added as
    a category on `NSObject` instead—in particular, if you find that you have use
    for it in the future.


    The `performSelector:onNode:withObject:recursive:` method mimics the behavior
    of other `performSelector` methods defined by the `NSObject` class, except that
    it runs the selector only if the given node implements it by testing for `respondsToSelector:`
    first.


    **Note** The `performSelector:withObject:` line may generate a “may cause a leak”
    warning. You can safely ignore it as long as the performed selector does not return
    a pointer or `id` type. Also note that the selector must take a single parameter—no
    more and no less. If you need to use other message signatures, you would have
    to make a variant of the method in [Listing 6-14](#part0015.html#list14) that
    takes no object or two objects, and use either the `performSelector` or `performSelector:withObject:withObject:`
    methods to pass the objects along.


    If the `recursive` flag is set, the same method will also be run for each of the
    node’s children and their children. Effectively, every node in the node hierarchy
    gets a chance to run the given selector merely by having implemented it.


    This is not the most efficient way of passing messages to other nodes, so avoid
    using this for frequent events or as a replacement for properly obtaining references
    of nodes to which you want to send messages. But it works well as a convenience
    to distribute rare messages without knowing which nodes may be interested in receiving
    that message. The alternative would be to register a node with `NSNotificationCenter`
    and, of course, properly unregister it as well, which is more cumbersome and error
    prone than just implementing a specific `UIApplicationDelegate` selector.


    An example use is to forward the `applicationWillResignActive:` message to any
    node interested in handling that particular message. Add the code in [Listing
    6-15](#part0015.html#list15) to `AppDelegate.m` just below the newly added `performSelector:onNode:withObject:recursive:`
    method.


    [***Listing 6-15***](#part0015.html#_list15). Forwarding a `UIApplicationDelegate`
    message to all nodes in the scene


    ```

    -(void) applicationWillResignActive:(UIApplication *)application

    {

        CCScene* scene = [CCDirector sharedDirector].runningScene;

        [self performSelector:_cmd

                       onNode:scene

                   withObject:application

                    recursive:YES];


    [super applicationWillResignActive:application];

    }

    ```


    The currently running scene obtained from `CCDirector` runs the `_cmd` selector
    on the scene and recursively on all of its child nodes, passing along the `application`
    object. The `CCDirector` class is the Cocos2D `UIViewController` subclass and
    manager of Cocos2D application states.


    What’s the `_cmd` selector here, and where does it come from?


    It’s a hidden method parameter every Objective-C method receives behind the scenes.
    It is the selector of the currently running method. In other words, in this example
    `_cmd` is identical to writing `@selector(applicationWillResignActive:)`. The
    other implicit Objective-C method parameter is one you’ve already made frequent
    use of: it’s the `self` keyword.


    To actually pause the game when the application will resign, add the method in
    [Listing 6-16](#part0015.html#list16) to `GameMenuLayer.m`, perhaps just below
    the already existing `shouldPauseGame` method since it doesn’t do anything but
    run the `shouldPauseGame` method.


    [***Listing 6-16***](#part0015.html#_list16). The `GameMenuLayer` class receives
    `applicationWillResignActive:` and runs `shouldPauseGame`


    ```

    -(void) applicationWillResignActive:(UIApplication *)application

    {

        [self shouldPauseGame];

    }

    ```


    If you build and run the app now, press the Home button once the game is running
    to close the app. Actually, the app won’t close—it will be sent to the background
    for an indefinite time.


    Then tap the app’s icon again to relaunch the app. You should see that the app
    continues from where you closed it, but the game is paused and the pause popover
    menu is shown.


    ## Killing the Player


    The Game Over state can be handled just like pause with a popover menu, with nearly
    the same functionality, allowing the player either to restart the level or to
    exit the current game session.


    And, of course, the player needs to die! And what better way to kill the player
    than by slicing it up with a circular saw?


    ### Creating a “Game Over” Popover


    In SpriteBuilder, right-click the `Popovers` folder and add a `New File`. Name
    the new document `GameOverMenuLayer.ccb`, set its type to `Layer`, and then click
    `Create`. Editing the `Game over` menu follows the same basic principle as the
    pause menu, so I will only note the differences here.


    For instance, the predesigned graphics for the `Game over` menu all start with
    a `G_`, though you are free to use other images. And there should be no resume
    button, only exit and restart buttons. Since there’s no resume function, you needn’t
    add the `resume game` Timeline either. And the label’s text shouldn’t read `Game
    Paused`, but rather `Game Over`.'
