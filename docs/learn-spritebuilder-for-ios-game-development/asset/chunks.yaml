- fmt: '# Try to Intensify This Animation Effect


    Try to intensify this animation effect or make it even more subtle by increasing
    the timeline duration and moving the keyframes accordingly. There’s a lot to be
    gained with subtlety in animations. And synchronicity. Therefore, while you may
    want to try different easing modes for this animation, the best effect is when
    all nodes use the same easing mode. Otherwise, the movements will not be synchronized,
    diminishing the desired effect.


    ## Launching with the Menu


    To try this animation in the game you need to complete a few more housekeeping
    steps. For one, you haven’t yet added the background to the `MainScene.ccb`, which
    still contains the original nodes.


    Open the `MainScene.ccb`, and remove the gradient and label nodes. In fact, remove
    any excess nodes except for the play button; otherwise, you won’t be able to play
    a level until the next chapter. But you may want to move the play button out of
    the way, near the lower-left corner.


    With the `MainScene` cleared, drag and drop the `MainMenuBackground` onto the
    stage, either by dragging it from the Tileless Editor View or by dragging the
    `MainMenuBackground.ccb` from the File View. Then set the position of the newly
    created `CCBFile` instance to `0, 0`. You should also rename the `CCBFile` instance
    to `background` in the Timeline.


    The original play button should be drawn in front of the background. It should
    be underneath the `background` node in the Timeline. If it’s not, drag the play
    button downward in the Timeline to change the draw order.


    After you publish the project, you can run Xcode and try it out—though it’s a
    bit awkward to go through the pause menu and then exit the game to the main menu.
    Open `AppDelegate.m`, and locate the `startScene` method. Then change the line
    it contains so that it loads `MainScene.ccb`, as seen in [Listing 7-1](#part0017.html#list1).


    [***Listing 7-1***](#part0017.html#_list1). Launching the app with MainScene.ccb


    ```

    -(CCScene*) startScene

    {

        return [CCBReader loadAsScene:@“MainScene"];

    }

    ```


    The game will now launch with the `MainScene`, but it’s still missing the logo
    and buttons.


    ## Main Scene Logo and Buttons


    Let’s add some buttons and the logo. Since the button images `play.png` and `settings.png`
    from the Menu Sprite Sheet should have a rotation animation, you need to get a
    little creative regarding how they work as buttons.


    Also, you’ll want to use the Timeline Chain to have an intro sequence where the
    buttons come flying in from the side of the screen.


    ### Designing Logo and Buttons


    But first things first. Once more, create a new CCB file for the buttons. Right-click
    the `UserInterface` folder and select *New File*. Name the document `MainMenuButtons.ccb`,
    make it a *Layer*, leave the default size, and click *Create*. You should probably
    change the stage color right away, too. Go to *Document ![image](images/00008.jpeg)
    Stage Color ![image](images/00008.jpeg) White* to better see the images.


    Again, the first thing to do on a Layer CCB is to select the root node and change
    its *Content size* types to `%` with values of `100` to ensure proper scaling
    and centering.


    As it has so many times before, a grouping node will come in handy for both positioning
    and animation. Add a regular *Node* from the Node Library View onto the stage.
    Change the node’s position types to `%` and its values to `50`. Give the node
    a nice name, let’s say `logoAndButtons`. I bet you can do these steps in your
    sleep after just a few days of working with SpriteBuilder.


    From the Tileless Editor View, you can now drag and drop the `play`, `settings`,
    and `title` images onto the `logoAndButtons` node. The actual position for these
    sprites are not really important, but I’ll give you the values I used.


    The title sprite should be slightly above center, so change its position to `0,
    50`. The play sprite’s position should be at `–50, –60`, and the settings sprite’s
    position at `50, –60`. Negative positions are absolutely okay since the position
    of a node is always relative to the parent node—in this case, `logoAndButtons`.
    The three sprites should now have some space between them, as you can see in [Figure
    7-5](#part0017.html#Fig5).


    ![9781484202630_Fig07-05.jpg](images/00099.jpeg)


    [Figure 7-5](#part0017.html#_Fig5). The MainMenuButtons.ccb contents


    **Tip**  If you need to see the background to properly align buttons and logos,
    you can always drag and drop `MainMenuBackground.ccb` onto the stage and move
    it to the top of the Timeline so that it is drawn in the background. However,
    you should not forget to remove that background layer or at least uncheck its
    *Visible* property. Merely unchecking the eye symbol will only hide it from SpriteBuilder,
    but it will still render two instances of `MainMenuBackground.ccb`. That would
    be a major drag on performance.


    The buttons could use some text on them because the images alone do not really
    convey meaning. From the Node Library View, drag one *Label TTF* node onto the
    play sprite, and then drag another *Label TTF* onto the settings sprite. The labels
    should be child nodes of the play and sprite nodes, respectively.


    For both labels, you first select the label and then change its position type
    to `%` and value to `50`. This centers the label on the respective sprite. Then
    enter appropriate *Label text*—for example, *PLAY* (all caps) for the play label
    and *Settings* for the settings label. The play label could use a *Font size*
    of 20, while the settings label allows for no more than *Font size* 16 if the
    text is not supposed to draw beyond the gear image. The result should look similar
    to [Figure 7-5](#part0017.html#Fig5).


    ### Animating Logo and Buttons


    Animating will be a tad more interesting this time. You’ll create an intro Timeline
    that moves the logo and buttons in place, before they start rotating.


    Left-click the *Timeline List* (as shown in [Figure 5-1](#part0014.html#Fig1)
    in [Chapter 5](#part0014.html)), and select *Edit Timelines* to bring up the dialog
    shown in [Figure 5-9](#part0014.html#Fig9). Click the `+` button to create a second
    Timeline and name it `loop`. Double-click *Default Timeline* in the list to change
    its name to `entry`. Leave the Autoplay check box as is. Then click *Done*.


    The goal is to have the entry animation play automatically. The entry animation
    is then chained to run the loop animation, while the loop animation is chained
    to itself to loop forever. Overall, this is a very convenient way to create a
    looping animation with a one-time entry animation. Let’s set this up first.


    The *Timeline List* should read `entry`, showing that the entry Timeline is selected.
    If it’s not, left-click the *Timelines List* and select the `entry` Timeline.


    At the bottom of the Timeline, left-click *No chained timeline* and set it to
    `loop`. Left-click on the *Timeline List* again and, from the *Timelines* submenu,
    choose the `loop` animation. Again, at the bottom where it says *No chained timeline*,
    perform a left-click and select `loop`. This will properly chain the `entry` Timeline
    to `loop`, and `loop` on itself to repeat forever.


    **Note**  SpriteBuilder will not play back chained Timelines in sequence. SpriteBuilder
    will play only the currently selected Timeline, and optionally loop it. To test
    chained Timelines, you’ll have to actually run the app.


    ### Editing the Entry Animation


    Select the entry Timeline again. This is the first one you’ll animate. The idea
    is that the buttons are initially off-screen and come zapping in. This mandates
    a very short animation—after all, the user will want to use your app quickly and
    not wait for its animations to finish, no matter how hard you worked on them.'
