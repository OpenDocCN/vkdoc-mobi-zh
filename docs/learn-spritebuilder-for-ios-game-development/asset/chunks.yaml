    \ 指定的动画。\n\n很简单，不是吗？你可能需要创建许多实现 `TriggerDelegate` 协议的类变体，以便在触发器被激活时执行各种不同的操作。但对于每个类，你都应努力使用自定义属性，以便让您或您的团队能够调整类的行为。\n\
