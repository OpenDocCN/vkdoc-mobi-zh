    在我结束这个话题之前，最后一点是：把调试看作是一项编程任务，就像编写代码一样。它不是你工作的障碍，而是编程中不可或缺的基本方面。编写代码和调试代码都可以通过练习来学习。要编写代码，你需要学习编程语言；要编写更好的代码，你需要学习代码设计和架构。调试也一样，你需要学习用于调试应用程序的工具。最终，你将学习到避免问题并及早发现问题的策略，以及分类
    bug 并选择正确工具进行分析的方法。


    这些建议只是你可以尝试的方法的冰山一角，而且相当概括。但我确实希望它能让你摆正心态：bug 是在挑战你，需要你去克服它们。而每次你成功克服，你都会成为更好的程序员，并因此更经常、更快速地成功。此外，修复那个时隐时现、让你烦恼不已的该死的
    bug，会给人一种非常振奋的感觉。


    ### 常见问题


    在撰写本书的过程中，我自己也遇到了许多问题，这些问题可以归因于人为错误或对`SpriteBuilder`界面的误解。有些问题出现得相当频繁，所以我想在这里总结一下。


    ### nil 引用


    一个常见的问题是发现实例变量或属性是`nil`。通过断点或`NSLog`很容易发现这种情况。但为什么它是`nil`呢？


    如果你通过`SpriteBuilder`的“项目代码连接”选项卡分配了变量，请检查以下几点：


    *   变量类型是否设置为“doc root var”。

    *   是否存在误解，例如“doc root var”被分配给了`CCB`根节点的自定义类，而不是节点的自定义类。

    *   `CCB`的根节点是否将其“自定义类”字段设置为正确的类。

    *   相关的自定义类是否声明了同名且对应的实例变量或属性。


    如果你通过名称来分配变量——例如，使用`getChildByName:`——你应该验证以下几点：

    '
- fmt: '# 节点名称与动画播放问题排查指南


    ## 节点名称检查


    - 检查节点的名称是否与`SpriteBuilder`中的节点名称相同。

    - 检查是否存在其他具有完全相同名称的节点。

    - 注意：时间线中的节点名称与其*Name*属性是两个不同的概念。只有*Name*属性起作用；时间线中的节点名称仅用于信息展示，`Cocos2D`不会使用它。

    - 测试`[self.scene getChildByName:@"theNameOfTheNode" recursively:YES]`是否能找到该节点。如果找不到，则说明该节点当前不在场景中。注意：在节点的`init`和`didLoadFromCCB`方法中，`self.scene`为`nil`，因此请务必在`onEnter`或更晚的时间点执行该测试。

    - 如果某个`CCB`根节点在另一个`CCB`文件中通过*Sub File*（`CCBFile`）节点引用，则该根节点的名称将不会被使用。在这种情况下，名称需要设置在*Sub
    File*节点上，而不是*Sub File*节点引用的`CCB`根节点上。


    ## 动画播放问题


    如果通过`self.animationManager`以编程方式播放的动画无法播放，请检查以下项目：


    - 代码中的动画名称是否与`SpriteBuilder`中的动画名称完全一致（包括大小写）。

    - 每个`CCB`都有自己的动画管理器实例。如果`self.animationManager`由包含该时间线的`CCB`根节点的自定义类使用，则说明你正在使用正确的实例。否则，请仔细检查你是否在使用位于该`CCB`子节点（不是`CCBFile`子文件引用）的自定义类中的`self.animationManager`。

    - 时间线是否链接到了自身。如果没有，它将不会循环播放。这意味着如果时间线最初在屏幕外或不可见，它可能已经播放了一次动画，然后停止了。


    ### 动画只播放一次但不循环


    如果动画只播放一次但不循环，请尝试以下操作：


    - 检查时间线是否链接到了自身。可能它没有链接，或者链接到了错误的时间线。


    ### 动画未播放音效或未执行回调


    如果动画未播放其音效或未执行其*Callbacks*（回调）选择器，请执行以下操作：


    - 确认包含该时间线的`CCB`根节点未被从场景中移除（`removeFromParent`）。一旦你移除了根节点，它将停止播放其自身的时间线及其子节点的时间线。如果时间线没有动画效果，请记住时间线需要一个活跃的节点才能运行。


    ## 音频播放问题


    如果以编程方式播放音频，有时声音不会播放。以下是一些需要检查的事项：


    - 验证路径和文件名是否完全相同，包括大小写。很容易忘记指定文件夹——例如，`@"Audio/effect.m4a"`。

    - 注意，音频文件扩展名在发布过程中可能会改变。例如，如果输入文件是`*.wav`扩展名，实际扩展名将是`*.caf`或`*.m4a`，具体取决于音频格式是设置为`CAF`还是`MP4`。

    - 不是你创建的音频文件可能已损坏，可能不符合格式规范，或者包含异常元数据。音频播放器远不如`OpenAL`和`AVAudioPlayer`挑剔，因此声音可能在桌面上播放正常。要测试此问题，请使用`Audacity`打开受影响的音频文件，并将其重新导出为相同格式或不同的（`.wav`）格式。


    ## 为精灵CCB类子类化CCSprite


    当启动应用程序或加载场景时，可能会出现以下特定的错误消息：


    ```

    reason: ''[<NameOfClass 0x7a043520> setValue:forUndefinedKey:]: this class is
    not key value coding-compliant for the key spriteFrame.''

    ```


    这表明你创建了一个类型为*sprite*的`CCB`，并为其分配了一个自定义类。但是，该自定义类并未继承`CCSprite`，而是继承了其他类（很可能是`CCNode`）。将自定义类的父类改为`CCSprite`即可修复此错误。


    ## 无法编辑自定义类字段


    你可能选中了一个*Sub File*（`CCBFile`）节点。在这种情况下，*Custom class*字段会变灰且无法编辑。自定义类需要在引用的`CCB`文件中进行编辑。


    ## 无法向节点添加自定义属性


    为了使节点具有自定义属性，必须在*Item Code Connections*选项卡上为其分配*Custom Class*字段。该自定义类需要具有与自定义属性名称匹配的属性或实例变量。


    ## 物理碰撞未按预期工作


    如果两个节点正在碰撞但本不应碰撞，或者它们未碰撞但应该碰撞，请检查以下几点：


    - 两个刚体的类别和遮罩必须匹配。如果两者应该碰撞，则一个的类别应包含在另一个的遮罩中，反之亦然。

    - 请记住，空的类别和遮罩字段意味着“匹配所有类别/遮罩”，这与你对空字段的预期完全相反。

    - 静态刚体不会与其他静态刚体碰撞。例如，两个`Gear1.ccb`实例无法被强制碰撞。

    - 两个刚体必须具有相同的`CCPhysicsNode`作为它们的父节点（或祖父节点、曾祖父节点等）。

    - 虽然场景中可以有多个`CCPhysicsNode`实例，但它们代表完全独立的物理世界。两个`CCPhysicsNode`实例之间绝对不存在任何交互。

    - 启用物理调试绘图以确认碰撞形状确实重叠。碰撞形状可能与节点绘制的图像有很大不同。仅查看精灵有时不足以评估情况。

    - 确认形状已正确设置，没有自相交的线条。选中节点，切换到*Item Physics*选项卡，查找任何以红色高亮显示的线条。

    - 通过至少一个关节连接的刚体默认将不会相互碰撞，除非在关节上勾选了相应的*Collide bodies*标志。


    ## 节点未释放


    有时你会确定一个节点或整个场景并未按照预期释放。你可以通过使用`Instruments`（一个用于运行时分析和分析的Xcode工具）并查看存活对象来验证这一点，或者更简单地通过实现`-
    (void)dealloc`方法，并使用`NSLog`或断点测试该方法是否运行。如果它没有运行，则表明该对象仍在内存中。


    原因通常很简单，但可能很难追踪，因为它完全取决于指向该对象的指针存储在哪里或分配给了哪里。以下是一些需要考虑的事项：


    - 任何分配给实例变量或属性的对象，只要该引用未设置为`nil`，默认会保留在内存中。这被称为强引用（`strong reference`）。本书项目中的大多数实例变量都声明为`__weak`，以允许它们在从节点图中移除时被释放。

    - 只要节点是节点图的一部分（即，它在当前场景中处于活跃状态），该节点就会被其父节点的`children`数组保留。

    - 相当常见的是*retain cycles*（循环引用），其中你至少有两个类，A和B。类A的实例对类B的实例有强引用，而类B的实例对类A的实例有强引用。只要它们彼此强引用，两个实例都不会释放。你可以通过`__weak`引用或在特定点至少将一个引用设置为`nil`来打破这个循环。


    基本上，当给定对象未释放时，要问的问题是：谁（仍然）持有此对象的引用？这会使调试变得稍微容易一些，因为你可以集中精力检查该对象对另一个属性、实例变量或集合（`NSArray`、`NSDictionary`等）的每次赋值，以及该引用在你期望节点释放时是否仍为非`nil`。


    # 总结'
  raw: '*   Check that the name of the node is the same as the name of the node in
    SpriteBuilder.

    *   Check that there is no other node with the exact same name.

    *   Check that the name of the node in the Timeline and its *Name* property are
    two different things. Only the *Name* property counts; the node’s name in the
    Timeline is purely informational and not used by Cocos2D.

    *   Test whether [self.scene getChildByName:@"theNameOfTheNode" recursively:YES]
    finds the node. If it doesn’t, the node in question simply isn’t in the current
    scene. Note that self.scene is nil during a node’s init and didLoadFromCCB methods,
    so be sure to perform that test in onEnter or at a later time.

    *   Check that the name of a CCB root node will not be used if it is referenced
    in another CCB file via a *Sub File* (CCBFile) node. In that case, the name needs
    to be set on the *Sub File* node, not the CCB’s root node that the *Sub File*
    node references.


    Animation Playback Issues


    If an animation played programmatically through the self.animationManager won’t
    play, check the following items:


    *   The name of the animation in code matches the name of the animation in SpriteBuilder.
    Note that the case must match, too.

    *   Each CCB has its own animation manager instance. If self.animationManager
    is used by the root node’s custom class of the CCB that contains the Timeline,
    you are using the correct instance. Otherwise, double-check that you are using
    self.animationManager in a node’s custom class that is a child node of the CCB
    containing the Timeline and isn’t a CCBFile (Sub File) reference.

    *   The Timeline is chained to itself. If it isn’t, it won’t loop. This means
    if the Timeline is initially off-screen or otherwise not visible, it may have
    already played its animation once and then stopped.


    If an animation is playing once but isn’t looping, try doing the following:


    *   Check that the Timeline is chained to itself. Perhaps it’s not chained or
    it’s chained to the wrong Timeline.


    If an animation does not play its sound effect or does not run its *Callbacks*
    selector, do the following:


    *   Verify that the root node of the CCB containing the Timeline is not removed
    from the scene (removeFromParent). As soon as you remove the root node, it will
    stop playing its Timelines as well as the Timelines of its child nodes. If the
    Timeline doesn’t animate anything, keep in mind that Timelines need an active
    node to run on.


    Audio Playback Issues


    If you play back audio programmatically, sometimes the audio won’t play. Here
    are a few things you should check:


    *   Verify that the path and file name are identical, including the use of uppercase
    and lowercase. It’s easy to forget that you have to specify the folder as well—for
    instance, @"Audio/effect.m4a".

    *   Consider that the audio file extension may change during publishing. For example,
    if the input files have the *.wav* extension, the actual extension will be *.caf*
    or *.m4a*, depending on whether the audio format was set to CAF or MP4.

    *   Audio that you didn’t create may be corrupt, it might not adhere to the specifications
    of the format, or it might contain unusual metadata. Audio players are much less
    picky than OpenAL and AVAudioPlayer, so the sound may play fine on the desktop.
    To test this problem, open the affected audio file with Audacity and re-export
    it to the same format or a different (.wav) format.


    Subclassing CCSprite for Sprite CCB Classes


    This particular error message may occur when launching the app or loading a scene:


    ```

    reason: ''[<NameOfClass 0x7a043520> setValue:forUndefinedKey:]: this class is
    not key value coding-compliant for the key spriteFrame.''

    ```


    It indicates that you created a CCB of type *sprite* and assigned a custom class
    to it. However, the custom class does not subclass CCSprite but some other class,
    most likely CCNode. Changing the custom class’ superclass to CCSprite will fix
    this error.


    Can’t Edit the Custom Class Field


    You have a *Sub File* (CCBFile) node selected. In that case, the *Custom class*
    field is grayed out and can’t be edited. The custom class needs to be edited in
    the referenced CCB file.


    Can’t Add Custom Properties to a Node


    In order for a node to have custom properties, it has to have the *Custom Class*
    field assigned on the *Item Code Connections* tab. That custom class needs to
    have properties or ivars matching the custom properties’ names.


    Physics Collisions Are Not Working as Expected


    If two nodes are colliding but shouldn’t be or they don’t collide but should,
    here are a few things to check:


    *   The categories and masks of the two bodies involved must match. If both should
    collide, the category of one should be in the mask of the other, and vice versa.

    *   Keep in mind that empty category and mask fields means “match all categories/masks,
    which is the exact opposite of what you would expect from an empty field.

    *   Static bodies do not collide with other static bodies. Two *Gear1.ccb* instances
    could not be made to collide, for instance.

    *   Both bodies must have the same *CCPhysicsNode* as their parent (or grandparent
    or great grandparent, etc.).

    *   Although you can have multiple CCPhysicsNode instances in a scene, they represent
    completely separate physics worlds. There is absolutely no interaction between
    two CCPhysicsNode instances possible.

    *   Enable physics debug drawing to confirm that the collision shapes, in fact,
    do overlap. The collision shapes can be very different from the images the node
    draws. Merely looking at the sprites is sometimes not enough to assess the situation.

    *   Verify that the shapes are correctly set up without self-intersecting lines.
    Select the node, switch to the *Item Physics* tab, and look for any lines highlighted
    in red.

    *   Bodies connected with at least one joint will default to not collide with
    each other, unless the corresponding *Collide bodies* flag is checked on the joint.


    A Node Is Not Deallocating


    Sometimes you determine that a node or the entire scene doesn’t deallocate when
    you expect it to. You can verify this by using Instruments (an Xcode tool for
    runtime analysis and profiling) and looking at the live objects, or quite simply
    by implementing the –(void) dealloc method and testing with an NSLog or breakpoint
    whether the method runs or not. If it doesn’t, the object is still in memory.


    The reason for this is often quite simple, yet it can be difficult to track down
    because it all depends on where pointers to that object have been stored or where
    they have been assigned to. Here are a few things to consider:


    *   Any object assigned to an ivar or property defaults to being kept in memory
    (retained) as long as the reference is not set to nil. This is said to be a *strong
    reference*. Most ivars in the book project are declared as __weak to allow them
    to be deallocated when they are removed from the node graph.

    *   As long as a node is part of the node graph (i.e., it is active in the current
    scene), the node is retained by its parent’s children array.

    *   Quite common are *retain cycles*, where you have at a minimum two classes,
    A and B. Class instance A has a strong reference to the instance of class B, and
    the instance of class B has a strong reference to the instance of class A. Both
    instances will not deallocate as long as they strongly reference each other. You
    can break the cycle with __weak references or by setting at least one reference
    to nil at a certain point.


    Basically, the question to ask when a given object doesn’t allocate is: who is
    (still) holding a reference to this object? That makes it somewhat easier to debug
    because you can concentrate on checking every assignment of the object to another
    property, ivar, or collection (NSArray, NSDictionary, etc.) and whether that reference
    is still non-nil at the time you expect the node to deallocate.


