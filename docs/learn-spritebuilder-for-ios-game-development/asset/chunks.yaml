- fmt: '现在从 Finder 中将 `level1_background_Cerberus.png` 文件拖放到 `Sprites/Level1/` 文件夹中。然后从文件视图将其拖放到
    `Background1.ccb` 舞台上。将 Cerberus 精灵（sprite）的位置改为 `0,0`。由于精灵的锚点（anchor point）默认为
    `0.5, 0.5`，精灵会居中于背景层的左下角，这不是你需要的，因此将锚点属性改为 `0,0`。现在 Cerberus 精灵应该位于渐变图层上方，并且比它略大。


    ## 处理图像


    仅靠背景渐变和精灵（sprite）图层还不足以看到视差（parallaxing）效果，但我想先深入探讨一下图像与项目设置，因为在添加更多图像之前，熟悉可用的选项非常重要。如果使用得当，你可以轻松提升性能或减小应用的
    bundle 大小，并且你可能已经对这些图像设置的功能感到好奇了。


    在文件视图中选中 `level1_background_Cerberus.png` 图像。在文件视图上方，你会看到预览区域，显示图像的缩略图以及额外设置，如[图3-8](#part0012.html#Fig8)所示。


    ![9781484202630_Fig03-08.jpg](images/00047.jpeg)


    [图3-8](#part0012.html#_Fig8). 图像预览及设置


    如果出于某种原因，你只有适用于 iPhone Retina 和非 Retina iPad 的 2x 缩放比例版本图像，你可以将“缩放来源（Scale from）”设置从“默认（Default）”改为“2x”。这并不会节省内存；相反，SpriteBuilder
    会从 2x 图像中创建出按比例缩小的 1x 版本和放大的 4x 版本。这意味着 4x 图像拥有与原始 2x 版本相同的细节水平。更改“缩放来源（Scale
    from）”设置也会反映在使用该图像的舞台中，如果你将“缩放来源（Scale from）”分别从 2x 改为 1x，图像在舞台上会变得两倍或四倍大。


    你还可以将图像拖放到 [图3-8](#part0012.html#Fig8) 中标记为 `AUTO` 的四个方块之一。这会用你拖放的图像替换特定缩放比例下的图像，例如，iPad
    Retina（`tablethd`）会显示一个不同的图像，或者只是同一图像的按比例缩放的版本。一个很好的例子是标题画面，当应用在 iPad 上启动时，会额外显示“HD”标注。


    强烈建议你为应用支持的最高分辨率创建所有图像。尽管 SpriteBuilder 提供了完全的自由度，但最终归结为两种选择：如果你希望应用在所有 iPad 型号上运行，则以
    568x384 点分辨率 4x 比例创建所有图像；如果你的应用仅针对 iPhone 尺寸设备设计，并且不作为原生 iPad 应用在 iPad 上运行，则以
    iPhone 点分辨率 568x320 的 2x 比例创建图像。


    例如，一个填满 iPad Retina 屏幕（SpriteBuilder 中默认为 4x 比例）的背景图像，其像素至少应为 2048x1536，而 2272x1536
    像素则更佳，因为当按 2 倍和 4 倍系数缩小时，它还能覆盖整个 4 英寸 iPhone 屏幕。如果你的应用仅为 iPhone 设计（在 SpriteBuilder
    中所有图像使用 2x 比例），一个填满整个 Retina 屏幕的背景图像必须是 1136x640 像素（568x320 点）。但如果你希望以后能选择制作 iPad
    版本，无论如何你都应该为 iPad Retina 分辨率设计图像。


    **提示** 尽管 SpriteBuilder 让你完全掌控缩放设置，但说到“摆弄”这些设置，我还是带着一丝无奈。你看，SpriteBuilder 提供了明确的
    1x、2x、4x 缩放比例，分别对应 iPhone、iPhone Retina、iPad 和 iPad Retina 设备，这使得为 iOS 开发变得异常简单。如果你偏离这条路，你将需要大量额外的编码和测试工作。请不要这样做！


    但老实说，iPad Retina 图像大得惊人。它们会显著增大你的 bundle 大小，这显然不是你想要的。相反，你应该尝试[第2章](#part0011.html)的[图2-25](#part0011.html#Fig25)中所示的导出格式和压缩（Compress）设置。即使是
    16 位色深，对于大多数图像来说质量仍然不错，但它能将内存使用和文件大小减少高达 50%。`PVRTC` 更进一步，但以牺牲图像质量为代价。如果这还不够，请阅读下一节“项目设置（Project
    Settings）”，了解减少应用大小的更多选项。


    现在还有第三种选择，那就是在通用的 iPhone 加 iPad 应用中，对大多数（如果不是全部）游戏元素使用 2x 分辨率图像，并将相关节点的缩放类型改为
    UI 点。这将得到一个 iPad 版本，其中世界的可见区域大约是 iPhone 设备上的两倍，世界看起来像是缩放了（游戏对象显得更小）。当然，你的游戏设计需要考虑到这一点；它必须在两种设备上都公平且可玩——尤其是要考虑到多人游戏中的不公平优势以及悬殊的难度差异。很少有游戏采用这种方法，原因也很充分——它会极大地改变
    iPhone 和 iPad 版本之间的游戏体验。


    ## 项目设置（Project Settings）


    如果你正在开发一个仅限 iPhone 的应用，SpriteBuilder 允许你将默认缩放比例从 4x 进行调整，并更改要发布的资源。打开文件 ![image](images/00008.jpeg)
    -> 项目设置（Project Settings）对话框，如[图3-9](#part0012.html#Fig9)所示。


    ![9781484202630_Fig03-09.jpg](images/00048.jpeg)


    [图3-9](#part0012.html#_Fig9). 项目设置对话框


    如果你的应用不应在 iPad 设备上原生运行，或者你希望 iPad 版本显示比例上更大的游戏世界区域，你可以将“默认缩放来源（Default scaling
    from）”设置改为 `2x (phonehd)`。请注意，默认缩放比例的更改不会应用于现有图像，仅适用于此后添加到 SpriteBuilder 的新图像。对于我们的项目，请将此设置保留为
    `4x (tablethd)`。


    **警告** Apple 要求应用开发者支持 Retina 分辨率。据报告，有应用因在 Retina 设备上未使用 Retina 尺寸图像而导致看起来“模糊”而被拒绝，尽管
    Apple 对游戏似乎不那么严格。不过，我强烈建议不要对任何图像使用 `Scale from` 设置为 `1x`，因为它在 iPad Retina 设备上会显得明显质量低下。唯一的例外是如果你在设计像素艺术游戏。


    之后，如果你发现应用下载大小增长得太多，可以考虑根据需要取消勾选一个或多个发布目标复选框（`phone`、`phonehd`、`tablet` 或 `tablethd`），以减少
    bundle 的大小。以下是各 iOS 设备将从哪个类别加载资源的快速概览：


    *   ***`phone`***：仅由 iPhone 3GS 使用

    *   ***`phonehd`***：由 iPhone 4 及更新 iPhone 使用

    *   ***`tablet`***：由非 Retina iPad 使用：iPad 1 和 2，第一代 iPad mini

    *   ***`tablethd`***：由第三代 iPad、第二代 iPad mini 及更新 iPad 使用


    如果你的最低部署目标是 iOS 7 或更新版本，请务必取消勾选 `phone`。除了 iPhone 3GS 之外，没有其他非 Retina iPhone 设备受
    Cocos2D 支持，而 3GS 支持的最高操作系统是 iOS 6。如果你的应用仅适用于 iPad，请同时取消勾选 `phone` 和 `phonehd`
    复选框。同样，如果你的应用仅适用于 iPhone，则应取消勾选 `tablet` 和 `tablethd` 复选框。取消勾选不需要的发布目标可以显著减小应用的下载大小。


    **注意** SpriteBuilder 应用将无法在初代 iPhone、iPhone 3G 以及相应的 iPod touch 型号（第一代和第三代，以及拥有
    8 GB 闪存的第三代）上运行。


    至于其他选项，为了本书的项目，请保持默认设置不变，我将快速介绍一些更不常见的选项：'
  raw: 'Now drag and drop the level1_background_Cerberus.png file from Finder into
    the Sprites/Level1/ folder. Then drag it from the File View onto the Background1.ccb
    stage. Change the Cerberus sprite’s position to 0,0. Because the anchor point
    for sprites defaults to 0.5, 0.5 the sprite is centered on the lower-left corner
    of the background layer. This is not what you need, so change the Anchor point
    property to 0,0\. Now the Cerberus sprite should be above and slightly larger
    than the gradient.


    Working with Images


    The background gradient and sprite layers aren’t enough to see the parallaxing
    effect, but first I want to digress into image and project settings because it’s
    important to familiarize yourself with the available options before adding more
    images. When they are used correctly, you can easily improve performance or reduce
    the bundle size of your app, and you’re probably already wondering what these
    image settings do.


    Select the level1_background_Cerberus.png image in the File View. Above the File
    View, you’ll see the preview area showing a thumbnail of the image along with
    additional settings as seen in [Figure 3-8](#part0012.html#Fig8).


    ![9781484202630_Fig03-08.jpg](images/00047.jpeg)


    [Figure 3-8](#part0012.html#_Fig8). Image Preview with settings


    If for some reason you have only 2x scaled versions of an image, suitable for
    use on iPhone Retina and non-Retina iPads, you could change the “Scale from” setting
    from Default to 2x. This does not conserve memory; instead, SpriteBuilder will
    now create both a downscaled 1x version and an upscaled 4x version from the 2x
    image. This means the 4x image has the same level of detail as the original 2x
    version. Changing the “Scale from” setting will also be reflected in stages where
    the image is used, where it will become twice or four times as big if you change
    the “Scale from” setting from 2x and 1x, respectively.


    You can also drag and drop an image onto one of the 4 squares, labeled AUTO in
    [Figure 3-8](#part0012.html#Fig8). This will replace the image for the particular
    scale with the image you dropped onto it so that, for instance, the iPad Retina
    (tablethd) would display a different image or just a differently sized version
    of the same image. A good example for this is a title screen that has an additional
    “HD” callout when the app launches on an iPad.


    It is highly recommended that you create all images for the highest resolution
    your app supports. Although SpriteBuilder gives you all the freedom, it boils
    down to just two choices: create all images at 4x the 568x384 point resolution
    if you want your app to run on all iPad models, or create images at 2x the iPhone
    point resolution of 568x320 if your app is designed *only* for iPhone-sized devices
    and doesn’t run on iPads as a native iPad app.


    For instance, a background image that fills an iPad Retina screen (default 4x
    scale in SpriteBuilder) must be at least 2048x1536 pixels, and 2272x1536 pixels
    is even better to also cover the entire 4-inch iPhone screen when downscaled by
    factors 2 and 4\. If your app is designed only for iPhones (using 2x scale for
    all images in SpriteBuilder), a background image that fills the entire Retina
    screen must be 1136x640 pixels (568x320 points). But if you wanted to have the
    option to make an iPad version at a later time, you should definitely design your
    images for the iPad Retina resolution, anyway.


    **Tip**  Though SpriteBuilder gives you full control over messing with the scale
    settings, I say “mess” with a wee bit of resignation. You see, SpriteBuilder offers
    a clear 1x, 2x, 4x scale for iPhone, iPhone Retina, iPad, and iPad Retina devices
    that just makes it super-easy to develop for iOS. If you leave this path, you’re
    setting yourself up for a ton of extra coding and testing. Please don’t go there!


    But let’s face it, iPad Retina images are frickin’ huge. They significantly increase
    your bundle size, which you don’t want, understandably. Instead, you should experiment
    with the export formats and the Compress settings as seen in [Figure 2-25](#part0011.html#Fig25)
    in [Chapter 2](#part0011.html). Even 16-bit color depth is still good quality
    for most images, but it cuts down memory usage and file size by up to 50%. PVRTC
    goes even further at the expense of image quality. And if that’s not enough, read
    the next section, “Project Settings,” for more options to reduce app size.


    Now there’s a third option as well, and that’s using 2x resolution images for
    most, if not all, game elements in a universal iPhone plus iPad app, and changing
    the scale type to UI points for relevant nodes. This gives you an iPad version
    where the visible area of the world is roughly twice as large as on iPhone devices,
    with the world seemingly zoomed out (game objects appear smaller). Of course,
    your game design needs to respect that;it needs to be fair and playable on both
    devices—specifically, considering unfair advantages in multiplayer as well as
    greatly differing difficulty levels. Not many games use that approach, and for
    good reason—it can drastically alter the play experience between iPhone and iPad
    versions.


    Project Settings


    If you’re developing an iPhone-only app, SpriteBuilder gives you the option to
    change the default scaling from 4x as well as to change which resources to publish.
    Open the File ![image](images/00008.jpeg) Project Settings dialog, which is shown
    in [Figure 3-9](#part0012.html#Fig9).


    ![9781484202630_Fig03-09.jpg](images/00048.jpeg)


    [Figure 3-9](#part0012.html#_Fig9). Project Settings dialog


    If your app shouldn’t run natively on iPad devices, or you want the iPad version
    to show a proportionally larger portion of the game world, you can change the
    “Default scaling from:” setting to 2x (phonehd). Note that changes to the default
    scaling are not applied to existing images, only to new images added to SpriteBuilder
    henceforth. For our project, leave this setting at 4x (tablethd).


    **Caution**  Apple requires app developers to support Retina resolutions. Apps
    have reportedly been rejected for looking “blurry” because they weren’t using
    Retina-sized images on Retina devices, although Apple seems to be less strict
    when it comes to games. Still, I strongly advise against using the *Scale from*
    setting 1x for any image, because it will have noticeably low quality on iPad
    Retina devices. The only exception is if you are designing a pixel-art game.


    When you later find your app download size has increased too much, consider unchecking
    one or more of the publishing target check boxes labeled phone, phonehd, tablet,
    or tablethd as needed to reduce the size of the bundle. Here’s a quick overview
    of which iOS device will load resources from which category:


    *   ***phone***: Used only by iPhone 3GS

    *   ***phonehd***: Used by iPhone 4 and newer iPhones

    *   ***tablet***: Used by non-Retina iPads: iPad 1 and 2, iPad mini first generation

    *   ***tablethd***: Used by iPad third and iPad mini second generation and newer
    iPads


    If your minimum deployment target is iOS 7 or newer, definitely uncheck phone.
    There is no non-Retina iPhone device supported by Cocos2D other than the iPhone
    3GS, and the 3GS’ highest supported operating system is iOS 6\. If your app is
    for iPads only, uncheck both the phone and phonehd check boxes. Likewise, if your
    app is for iPhone only, you should uncheck the tablet and tablethd check boxes.
    Unchecking unneeded publish targets can significantly reduce your app’s download
    size.


    **Note**  SpriteBuilder apps will not run on the original iPhone and the iPhone
    3G as well as corresponding iPod touch models (first and second generation, and
    third generation with 8-GB flash memory).


    As for the other options, leave them as is for the book’s project, I’ll quickly
    go over the more elusive options:'
