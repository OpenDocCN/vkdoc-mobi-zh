    # 排班后的 Markdown 文档


    在`didLoadFromCCB`中，你通过名称获取对`MainMenuLevelSelect`实例的引用。之前你已经做过几次了。但等等，`MainMenuButtons`类与`Scroll
    View`或`Scroll View`的`Content`节点没有关系，这意味着它们不是`MainMenuButtons`类的子节点。如果你仔细查看`getChildByName:`方法，你会发现它实际上是发送给`MainMenuButtons`父节点的。由于`MainMenuButtons`是`MainScene`节点的子节点，因此`self.parent`是对`MainScene`实例的引用。`MainScene`包含`Scroll
    View`作为子节点，而`Scroll View`又包含`Content`节点作为子节点。因此，`MainMenuLevelSelect`实例可以通过其名称递归地找到。


    类似地，`_levelSelect.parent.visible = NO`会隐藏`CCScrollView`，因为它是`MainMenuLevelSelect`实例的父节点。隐藏`CCScrollView`实例而不是`MainMenuLevelSelect`实例很重要，因为这将禁用`CCScrollView`的所有触摸事件。如果你只让`_levelSelect`不可见，视觉上效果相同，但用户可能在不经意间仍然可以滑动各个页面。由于`CCScrollView`始终保持不可见，你可以选择在`MainScene.ccb`中选中`Scroll
    View`节点，并取消勾选其`Visible`属性以隐藏它。


    最后，`_levelSelect`被分配了对`MainMenuButtons`实例的引用，以便当用户关闭`MainMenuLevelSelect`弹出框时，它可以向`MainMenuButtons`实例发送`show`消息。


    剩下的工作是更新`shouldPlayGame`方法，使其与清单 8-4 中的版本一致。


    ***Listing 8-4***. 显示关卡选择弹出框


    ```

    -(void) shouldPlayGame

    {

        _levelSelect.parent.visible = YES;

        self.visible = NO;

    }

    ```


    这使得`CCScrollView`可见，并隐藏了`MainMenuButtons`实例。


    请注意，与`SettingsLayer`不同，`CCScrollView`实例在应该显示时不会从场景中移除并重新加载；相反，你只需切换其可见状态的开关。如果你需要频繁访问某个给定节点（或节点分支），与加载`CCB`甚至以编程方式创建新的节点实例相比，更改可见状态要高效得多。当然，更改可见状态不会释放内存。但是，同样，如果你需要频繁使用某个节点，你必须拥有足够的空闲内存以便随时显示它，因此此类节点也可以一直保留在内存中。


    此外，在加载或创建节点的过程中，通常需要额外的内存。具体来说，加载纹理时，通常在一两帧内，内存使用量会翻倍，然后立即回落到纹理实际使用的量。当你的应用非常接近收到内存警告时，最好不要移除你将要频繁使用的节点。


    话虽如此，将`CCScrollView`及其`Content`节点始终保留在场景中的真正原因是出于实用性考虑。你需要创建一个额外的`CCB`文件，其中仅包含`Scroll
    View`节点，以便能够通过`CCBReader`加载`Scroll View`及其`Content`节点。目前，只有`MainMenuLevelSelect.ccb`（`Scroll
    View`的`Content`节点）是一个单独的`CCB`实例，而`Scroll View`节点是直接添加到`MainScene.ccb`中的。因此，你只能通过`CCBReader`加载`MainMenuLevelSelect.ccb`的`Content`节点。


    如果你要将`CCScrollView`从其父节点中移除，你就必须以编程方式创建另一个`CCScrollView`实例，并用通过`CCBReader`加载的`Content`节点对其进行初始化，或者将其赋值给`Scroll
    View`的`contentNode`属性——但只能是在第二次及之后的每次，这会使代码进一步复杂化。


    **提示** 始终考虑“保持简单愚蠢”（KISS）原则（不要与同名的乐队混淆）。参见 [`en.wikipedia.org/wiki/KISS_principle`](http://en.wikipedia.org/wiki/KISS_principle)。该原则可以这样理解：*如果可以用更少的代码实现相同的行为，请选择编写更少的代码*。更少的代码缺陷更少，也更容易理解、修改和重用。特别要注意重复的代码，或者除了少数参数外本质上做相同事情的代码。这类代码应该被提取到自己的方法中。


    这种设置足以在 Xcode 中试用`Scroll View`。发布、构建并运行。你现在可以左右滑动三张背景图像，每个页面会吸附到由`Scroll View`定义的区域。还要注意，你仍然可以点击`Scroll
    View`下方的按钮。你还可以测试`Scroll View`接受触摸和拖动移动的边界，以及它不接受的地方。


    ---


    ## 设计滚动视图内容节点


    目前你还不能真正点击一个关卡来玩，也不能关闭`Scroll View`弹出框。为了实现这一点，让我们最终确定关卡选择页面的设计，使每个页面代表一个特定的世界。


    **注意** 在以下描述中，我将使用`#`字符作为数字`1`、`2`和`3`的占位符，用于指代整个`W#_something`图像组。


    首先为每个页面添加一个关闭按钮。打开`MainMenuLevelSelect.ccb`。然后将一个`CloseButton.ccb`拖放到每个`W#_bg`精灵上。可以通过使用底部选中了正确`UserInterface`文件夹的`Tileless
    Editor View`，或者从`File View`中拖动`CloseButton.ccb`来完成。最好将每个按钮直接放到`W#_bg`精灵上，这样它就成为页面背景图像的子节点。


    选择每个`CloseButton`，在`Item Properties`选项卡中将其`Position`类型更改为`%`，并将值设置为`100`。这就是按钮所需的全部设置。


    现在为每个世界添加标志和标题。在`Tileless Editor View`上，确保另一个`UserInterface`文件夹已被选中——即包含所有`W#`图像的`UserInterface`精灵表所在的文件夹。你可以在图
    8-4 中看到一个片段。


    ![9781484202630_Fig08-04.jpg](img/00111.jpeg)


    Figure 8-4. 用于滚动视图页面的各种`W#`图像的 UserInterface 精灵表


    将`W1_logo`拖到`W1_bg`精灵上。然后将`W1_title`拖到`W1_logo`精灵上。`W1_title`应该是`W1_logo`的子节点，而`W1_logo`应该是`W1_bg`的子节点。然后对`W2`和`W3`的标题和标志图像重复此步骤，并确保将它们添加到对应的`W2`和`W3`背景精灵中。请参见图
    8-5 作为参考。


    ![9781484202630_Fig08-05.jpg](img/00112.jpeg)


    Figure 8-5. 已添加标志和标题


    依次选择每个标志和标题图像以更改它们的位置。标志位置类型应为`%`，值应为`50x85`，而标题位置类型也应为百分比，值设置为`50x0`。这将使图像整齐地居中对齐在每个页面的顶部。


    对于每个世界的三个关卡按钮，最好使用`Box Layout`节点来水平对齐它们。从`Node Library View`中拖一个`Box Layout`到每个`W#_bg`精灵上，然后将`Box
    Layout`节点的位置类型更改为`%`，值设置为`50x35`。同时，将锚点更改为`0.5x0.5`，以便子节点以`Box Layout`节点的位置为中心，并将`Spacing`设置为`30`，以保持关卡按钮之间固定的距离。

