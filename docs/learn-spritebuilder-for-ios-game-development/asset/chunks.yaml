- fmt: 'With that said, have fun, enjoy the ride, and make some great games!


    ## Chapter 2: Laying the Groundwork


    In this chapter, you will learn the basics of working with `SpriteBuilder`, including
    its user interface and the first programming steps with `Cocos2d-Swift` using
    `Objective-C` and `Xcode`. You will learn how to create the most important elements
    in `SpriteBuilder` and how `SpriteBuilder`, `Xcode`, and `Cocos2D` are connected.
    At the end of this chapter, you will have a skeleton framework that you’ll continue
    to expand on.


    I assume you have downloaded and installed both `SpriteBuilder` and `Xcode` from
    the Mac App Store:


    *   `SpriteBuilder`: [https://itunes.apple.com/app/spritebuilder/id784912885](https://itunes.apple.com/app/spritebuilder/id784912885)

    *   `Xcode`: [https://itunes.apple.com/app/xcode/id497799835](https://itunes.apple.com/app/xcode/id497799835)


    ## Creating a SpriteBuilder Project


    After launching `SpriteBuilder`, go straight to File ![image](images/00008.jpeg)
    New ![image](images/00008.jpeg) Cocos2D Project to start a new blank project.
    Save it anywhere where you’ll be able to locate it again—for instance, in the
    Documents or Desktop folder—and preferably use a name you’ll recognize again.
    The main example project in this book is named `LearnSpriteBuilder.spritebuilder`.


    If you haven’t used `SpriteBuilder` before, you should familiarize yourself with
    its user interface and the terminologies used throughout the book to describe
    specific areas and views in `SpriteBuilder`. The user interface is split into
    four main areas as shown in [Figure 2-1](#part0011.html#Fig1).


    ![9781484202630_Fig02-01.jpg](images/00009.jpeg)


    [Figure 2-1](#part0011.html#_Fig1). SpriteBuilder user interface


    1.  **Resource Navigator** (on the left). This is a tab bar view where you’ll
    find the following: from the leftmost tab to the rightmost tab: your project files
    in the *File View* (depicted) with a resource preview area and a list of files
    below the preview; a visual overview of resources in the *Tileless Editor View*;
    a list of available nodes in the *Node Library View*; and any warnings or errors
    (hopefully, none ever) in the *Warnings View*.

    2.  **Stage View** (at the top center). This is where the contents of a stage
    (which can be a scene, layer, node, particle emitter, or sprite) are displayed.
    You can select nodes in this view and use selection handles to move, resize, or
    rotate selected nodes.

    3.  **Timeline View** (bottom center). This is where nodes and joints in the stage
    are listed on the left side in hierarchical order, defining node draw order and
    parent-child relationships. The right side is the actual timeline, with its keyframe
    editor used to create animations (*animations* here being changes to a node’s
    properties over time).

    4.  **Details Inspector** (on the right), also known as **Detail View**. This
    is also a tab bar view with four panes. From left to right they are *Item Properties*,
    where you’ll find the selection’s editable settings and properties; *Item Code
    Connections*, where you can assign custom classes, variables, and selectors; *Item
    Physics*, where you can enable physics and edit physics body and shape properties;
    and finally, the *Item Templates* tab, which is used to create named templates
    from selected nodes and their properties but is currently used only by particle
    effects.


    The newly created project is actually a functional, runnable `SpriteBuilder` project.
    You can try this now by choosing File ![image](images/00008.jpeg) Publish or by
    clicking the corresponding Publish button on the toolbar.


    The publishing process copies, converts, and caches the resources in the Xcode
    project associated with the `SpriteBuilder` project.


    ## The SpriteBuilder Project’s Xcode Project


    An Xcode project is located within every `<*projectname*>.spritebuilder` folder
    with a corresponding name `<*projectname*>.xcodeproj`. See [Figure 2-2](#part0011.html#Fig2)
    for an example. The topmost folder with the yellow icon named `LearnSpriteBuilder.spritebuilder`
    is the project’s folder. Inside it is the project’s `LearnSpriteBuilder.xcodeproj`
    file, and the source code and published resource files for the app are found inside
    the `Source` folder. The `SpriteBuilder Resources` folder contains the resource
    and `CCB` files that `SpriteBuilder` lists in its File View.


    ![9781484202630_Fig02-02.jpg](images/00010.jpeg)


    [Figure 2-2](#part0011.html#_Fig2). SpriteBuilder project structure as seen in
    Finder


    **Note** `SpriteBuilder` projects are folders with the extension `*.spritebuilder`.
    `SpriteBuilder` will recognize projects only if the folder has the `.spritebuilder`
    suffix. If `SpriteBuilder` isn’t running, you can manually copy, move, or rename
    a `SpriteBuilder` project folder using Finder, provided that you keep the `.spritebuilder`
    suffix.


    Double-click the project’s `.xcodeproj` file, or open it via the File ![image](images/00008.jpeg)
    Open command in Xcode. Xcode will greet you with a user interface similar to the
    one shown in [Figure 2-3](#part0011.html#Fig3).


    ![9781484202630_Fig02-03.jpg](images/00011.jpeg)


    [Figure 2-3](#part0011.html#_Fig3). Xcode user interface


    The Xcode user interface contains the following areas:


    1.  **Toolbar**, with scheme and device selection drop-down menu. Use the scheme
    drop-down menu to change which device or simulator the app should run on.

    2.  **Navigator area**, which contains multiple tabs. The default, leftmost tab
    (depicted) shows the files in the project. Other tabs allow you to search the
    project’s files, see build warnings and errors, manage breakpoints, and perform
    other tasks.

    3.  **Editor area**, where you type in source code.

    4.  **Debug area**, which displays debugging information. The left side displays
    values of variables at runtime, while the right side is the Console, where log
    statements are printed.

    5.  **Utility area**, which contains information about selected items. In this
    case, it shows detailed information about the selected `MainScene.m` file.


    You can build and run this minimal `SpriteBuilder` Xcode project by clicking the
    Play button, which is the leftmost icon on the toolbar. The project will build
    and launch either on a connected device or the iOS Simulator, depending on which
    run target is selected in the toolbar. You should see the exact same scene you
    saw in `SpriteBuilder` seconds before on your device or the iOS Simulator.


    **Tip** If you haven’t used Xcode before and need more instructions on how to
    use it, you should consult the Xcode Guide available via Help ![image](images/00008.jpeg)
    Xcode Overview or online at [https://developer.apple.com/library/ios/documentation/ToolsLanguages/Conceptual/Xcode_Overview](https://developer.apple.com/library/ios/documentation/ToolsLanguages/Conceptual/Xcode_Overview).


    ## First Scene, First Code


    The first goal is to create a second scene and then connecting buttons so you
    can switch back and forth between the two scenes. This second scene is going to
    be the game scene, while the existing `MainScene` will become the menu screen.
    This is a commonplace, rudimentary separation between game and menu scenes.


    A scene contains all the content (nodes) that the game currently renders. Other
    scenes can replace the currently visible scene using transitions, just like Cocoa
    touch views can transition from one view to another with or without animations.


    **Note** A common misconception is that scenes and nodes can be used interchangeably
    with views. This is not so. `Cocos2D` has its own `UIView` class named `CCGLView`
    that renders all the scenes and nodes using OpenGL instructions. Therefore, other
    `UIView` instances can be either entirely on top of or behind the `Cocos2D` view
    and the scene it currently displays.


