- fmt: '- **字符串长度**：某些语言比其它语言更冗长。但这并不意味着冗长的语言中没有一个很短的词来表达原语言中相当长的词。

    - **外来字符**：这些需要正确的字符串处理。所有字符串都应为 Unicode 并正确编码。用户希望使用所有语言字符保存文档，你的应用程序应允许这样做，并且当文件名包含变音符号、尖音符或抑音符（更不用说阿拉伯语、俄语或亚洲字符）时不会崩溃。

    - **日期、时间和数字格式**：这些可能不同。例如，在美国，值`1,001`是一千零一，但对德国人来说，它只比`1`多一点。另外，请考虑我们格式化日期时把最不重要的数字放在前面：`16/12/14`是2014年12月16日。对你来说，这个日期可能毫无意义。对我们德国人来说，斜杠是不寻常的日期分隔符；我们使用点号。

    - **本地化**：这不应影响应用程序的存储格式，例如存档。一个常见的问题是，在英语语言环境的设备上，将像`1,234`这样的数字保存到文件。当语言环境切换到德语后，应用程序重新启动并读取该值，它会将其读取为`1.234`，或引发运行时错误，因为应用程序不（正确）解释点号。

    - **货币**：货币可能因你切换的语言而异。它可能是美元、欧元、英镑、日元——你说得出来的货币。

    - **度量单位**：这些也可能不同。一码到底等于多少腕尺？一码有多少英寸，我真的需要知道吗？在欧洲和其他国家，长度以米和厘米为单位。谁知道呢，也许某个国家甚至用土豆和脚趾来衡量重量。而且德国普通成年人的鞋码大多在`36`到`46`之间，而不是`6`到`12`；衬衫尺码`52-54`在英/美对应缩写`XXL`。所以你甚至不能指望尺码在所有地方都是数字或字母。

    - **屏幕键盘与实体键盘**：这些有不同的布局。尤其是 OS X 应用程序应该根据按键的键码（keycode）而不是它打印出的字母来响应——例如，WASD键在德沃夏克键盘上是分散的。但总的来说，你需要考虑到非字母和非数字字符在某些语言中可能更难输入，需要借助`Shift`和`Control`键，或将屏幕键盘切换到不同的页面。

    - **词序**：句子中形容词、名词和动词的顺序可能不同，或理解方式不同。这对于名称生成器来说可能至关重要。例如，在一款生成“丰饶的伤害之剑”的 RPG 中，按照相同的词序直译过来，对法语使用者来说可能读起来更像是“伤害之丰饶剑”，这多少会甚至完全改变其含义。

    - **专有名词**：这些不必翻译。最明显的例子是应用程序的名称。这款书的应用程序在德语中应该叫“`Hüpfende Bestie`”，还是你更愿意保留它作为国际化的“`Bouncy
    Beast`”？当然，译者需要知道任何专有名词，包括角色和地点名称。

    - **文化差异**：在一个国家习惯于用“你好吗？”问候，这在世界其他地区可能被视为虚伪的礼貌，通常不合适。同样，手势也可能是个问题。可能最著名的冒犯手势是竖起大拇指，这在伊斯兰和亚洲国家被认为粗鲁且无礼。在澳大利亚，它还算可以——但若上下移动这个手势，就会变成严重的侮辱。

    - **上下文**：在某些语言中，相同的词根据上下文可能有不同的含义。在一种上下文中是确认，在另一种上下文中则是侮辱。

    - **发音**：某些语言中，相同的词在发音上有细微差别，这可能会造成两种完全不同含义的天壤之别。


    - **嵌入文本**：避免在需要翻译的图片中嵌入文本。这会增加所有人的应用体积，而且你将不得不重新创建每张带有翻译文本的图片。翻译服务不会为你翻译图片，只会翻译文本。

    - **自动翻译服务**：这些服务效果不够好。除非你想让你的用户对你的应用哭笑不得，并且通常认为你的翻译尝试是廉价的，否则请忘掉 `Babelfish` 或
    `Google Translate`。如果用户明显感觉这是由计算机翻译的，会显著降低应用在他们眼中的主观价值。'
  raw: '*   **String length** Some languages are more verbose than others. That doesn’t
    mean that the verbose language doesn’t have a very short word for a rather long
    word in the original language.

    *   **Foreign characters** These require proper string handling. All strings should
    be Unicode and properly encoded. A user will want to save documents using all
    language characters, and your app should allow it and not crash when the name
    of a file contains an umlaut, acute or grave character—let alone Arabian, Russian,
    or Asian characters.

    *   **Date, time, and number formats** These may be different. For instance, in
    the USA the value 1,001 is a thousand and one, but for us Germans it’s just barely
    more than 1\. Also, consider that we format our dates with the least significant
    number first: 16/12/14 is the sixteenth of December in the year 2014\. For you,
    this date may not make any sense. For us Germans, the slashes are unusual date
    separators; we use dots.

    *   **Localization** This must not affect your app’s storage format, such as savegames.
    A common problem is saving a number like 1,234 to a file on a device with an English
    locale. With the locale changed to German, the app is relaunched and reads the
    value back as 1.234 or raises a runtime error because the app doesn’t (correctly)
    interpret the dot.

    *   **Currency** The currency may be different for the language you switch to.
    It could be USD, Euros, Pound, Yen—you name it.

    *   **Units of measure** These also may be different. How many elbows is a yard,
    anyway? How many inches are in a yard, and do I really need to know? In Europe
    and other countries, lengths are measured in meters and centimeters. Who knows,
    maybe some country even measures weight in potatoes and toes. And the German shoe
    sizes for typical adults are mostly in the range of 36 to 46, not 6 to 12 and
    a shirt size of 52-54 translates to the abbreviation XXL in the UK/US. So you
    can’t even rely on sizes being numbers or letters everywhere.

    *   **Onscreen vs. offscreen keyboards** These have different layouts. Especially
    OS X apps should react to a key’s keycode rather than the letter it prints—for
    instance, the WASD keys are scattered across a Dvorak keyboard. But generally,
    you need to consider that nonalphabet and nondigit characters may be harder to
    write in some languages, requiring the use of Shift and Control keys or switching
    the onscreen keyboard to a different page.

    *   **Word order** The order of adjectives, nouns, and verbs in a sentence may
    be different or understood differently. This can be crucial for name generators.
    For instance, in an RPG that generates “Plentiful Sword of Hurting,” the direct
    translation in the same order of words might read more like “Hurting Sword of
    Plenty” to a French speaker, somewhat or even completely altering its meaning.

    *   **Proper nouns** These needn’t be translated. The most obvious case is the
    app’s name. Should the book’s app be called “Hüpfende Bestie” in German, or would
    you rather leave it as “Bouncy Beast” internationally? Of course, the translator
    needs to be aware of any proper nouns, including character and location names.

    *   **Cultural differences** It’s customary in one country to greet with “How
    are you?” which may be seen as disingenuous politeness and generally unfitting
    in other regions of this world. Likewise, gestures can also be a problem. Probably
    the best known offender is the thumbs up, which is considered rude and offensive
    in Islamic and Asian countries. In Australia, it is so-so—by moving the gesture
    up and down, it becomes a grave insult.

    *   **Context** The same words can mean different things depending on context
    in some languages. In one context, it’s a confirmation; in another context, it’s
    an insult.

    *   **Pronunciation** Some languages have subtle variations in pronunciation for
    the same word that can make all the difference between two completely different
    meanings.


    *   **Embedded text** Avoid embedding text in images that need to be translated.
    This will increase the app size for everyone, and you’ll have to re-create each
    image with the translated text. Translation services will not translate images
    for you, only text.

    *   **Auto-translation services** These don’t work well enough. Forget Babelfish
    or Google Translate unless you want your users to laugh and cry at your app and
    generally consider your attempt at translation a cheap effort. It significantly
    decreases the app’s subjective value in the eyes of the user if it was clearly
    translated by a computer.'
