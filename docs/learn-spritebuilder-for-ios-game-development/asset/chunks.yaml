    Aborting due to Chipmunk error: You cannot manually reindex objects while the
    space is locked. Wait until the current query or step is complete.

        Failed condition: !space->locked

    ```


    This error is representative of a known issue with most physics engines: during
    collision events, you can’t modify certain aspects of the physics world (known
    as *space* in Chipmunk). In this instance, playing the animation will change the
    node’s rotation, and thus the rotation of the node’s physics body. Chipmunk doesn’t
    like this because the physics world (space) is *locked*, meaning the bodies in
    it are currently processed and need to be in a coherent state where only the physics
    engine itself is allowed to make changes.


    Consider where playing the animation came from: a Trigger instance sent the didTriggerWithNode:
    message, which in turn had its triggerActivatedBy: method run by the GameScene.m
    collision callback method ccPhysicsCollisionBegin:player:trigger.


    Fortunately, there’s a quick and simple fix for such issues. It’s so simple you
    can try this whenever you merely suspect such a *u can’t touch this* issue. I’m
    terribly sorry about the earworm.


    Update the didTriggerWithNode: method in PlayTimelineWhenTriggered.m as shown
    in [Listing 5-17](#part0014.html#list17).


    [***Listing 5-17***](#part0014.html#_list17). Fixing the Chipmunk space ![image](images/00008.jpeg)
    locked error


    ```

    [self scheduleBlock:^(CCTimer *timer) {

        [self.animationManager runAnimationsForSequenceNamed:_timelineName];

    } delay:0.0];

    ```


    Scheduling a block with a 0 delay defers executing the contents of the block until
    the next time the Cocos2D scheduler runs scheduled blocks. At the latest, this
    will run in the next frame.


    **Tip**  If you find that you often need to use the scheduleBlock: trick to prevent
    *space locked* errors, you should consider updating the triggerActivatedBy: method
    in Trigger.m so that the call to didTriggerWithNode: is already deferred to a
    scheduled block. If you do that, you no longer have to schedule blocks in TriggerDelegate
    classes, but on the other hand all didTriggerWithNode: messages will be deferred.


    If you run the project now, the saws start rotating as soon as the player enters
    a trigger area. The current state of the project can be found in the folder 06
    - Triggered Animations.


    Summary


    In this chapter, you’ve learned how to create keyframe animations using the Timeline
    editor and how to play back these animations via CCAnimationManager.


    You then added a generic Trigger class that allows you to run code whenever the
    player enters a given trigger area. Trigger and target nodes are connected simply
    by giving them the same name.


    Chapter    6


    Menus & Popovers


    By this point, you have a level and game elements that make the game playable
    in principle. Before expanding upon more game elements and additional levels,
    I would like to take some time to connect the dots...the menus to be precise.


    The saws should probably kill the player, but this requires a *Game over* menu
    to allow the player to retry or end the level. You can’t pause the game either,
    nor does it pause automatically when the app is sent to the background.


    You’ll learn how menus can be designed to scale easily with varying screen resolutions,
    as well as how to present them as popovers or full-screen views without having
    to change scenes. You will also find use for the *Callbacks* feature of the Timeline.


    Static In-game Menus


    For user interface elements such as a pause button or score display, you’ll need
    a way to fixate these elements on the screen so that they don’t move along when
    the level scrolls. But before you do that, you should add the prepared user interface
    graphics.


    Adding Menu Graphics


    In the book’s downloadable archive in the Graphics folder, you’ll find the *Menu*
    and *UserInterface* folders. You should drag both folders onto the *SpriteSheets*
    folder in SpriteBuilder. Then turn these two folders into Sprite Sheets by right-clicking
    them and selecting *Make Smart Sprite Sheet*. As usual, you should change the
    format to *PVR RGBA8888* with *Compress* checked.


    If you want to use your own menu and UI images, you can do so. There are no fixed
    sizes for the individual images except for the menu background, which should fill
    the entire screen. Though if you use custom graphics, you may need to use different
    values for certain property values (position, content size) to make your images
    fit.


    Adding a Static Game Menu Layer


    The game menu layer will be the node that contains all of the in-game user interface
    controls and labels. For now, you need it just to add a pause button, but it could
    also contain a score label, a countdown timer, the player’s health bar, a virtual
    joypad, buttons to activate special abilities, or just about any other user interface
    element that shouldn’t scroll along with the level.


    All of the user interface elements should be in their own folder, just like the
    prefabs. Your first task is to add a new folder in SpriteBuilder’s *File View*
    and name it **UserInterface**. Then right-click the *UserInterface* folder and
    select *New File* to create a new CCB document. Name this document **GameMenuLayer.ccb**,
    and set its type to *Layer*. Leave the size at the default 568x384, and click
    *Create*.


    Aligning a Button with Reference Corners


    Drag and drop a *Button* node from the *Node Library View* onto the *GameMenuLayer.ccb*
    stage. Drag and move the button so that it is very close, if not touching, the
    upper-left corner of the layer.


    Next, open *GameScene.ccb* and drag and drop the *GameMenuLayer* from the *Tileless
    Editor Vi**ew* onto the stage. Then verify that its position property is set to
    0,0.


    Switch to Phone resolution by pressing Cmd+1 in case you are viewing *GameScene.ccb*
    in iPad resolution. Notice how the button is only partially visible or not visible
    at all.


    **Caution**  When viewing a CCB file that includes another CCB file via a Sub
    File node, you must save the CCB file referenced by the Sub File node in order
    to see its most recent edits.


    In this instance, the *GameMenuLayer.ccb* is included via a Sub File node in the
    *GameScene.ccb*. Whenever you make a change to *GameMenuLayer.ccb*, you have to
    do File ![image](images/00008.jpeg) Save while viewing the *GameMenuLayer.ccb*
    or publish the project in order to see its current state in the *GameScene.ccb*.


    Use the Document ![image](images/00008.jpeg) Resolution ![image](images/00008.jpeg)
    Tablet Landscape and Document ![image](images/00008.jpeg) Resolution ![image](images/00008.jpeg)
    Phone Landscape menu items to switch between iPad and iPhone screen sizes on the
    fly. Or more easily, just press Cmd+1 and Cmd+2 to toggle between the available
    resolutions. CCB files of type *Scene* also offer a *Phone Landscape* *(short)*
    (Cmd+3) resolution representing 3.5-inch iPhones up to iPhone 4S.


    You’ll see the button is fully visible on iPad but not on iPhone due to the *GameMenuLayer.ccb*
    content size being the default 568x384 size. This size is a compromise that scales
    up well on an iPad, but the 384 points height make the layer slightly higher than
    the iPhone screen.


    Open the *GameMenuLayer.ccb* again, and select the root node. Change its *Content
    size* property types for both width and height to % by selecting the *% in parent
    container* items from the drop-down lists. The width and height values should
    automatically change to 100 for both width and height; if not, make sure the value
    is 100 for both. This makes the layer scale with the size of its parent node.
    In this instance, that would be the *GameScene.ccb* root node, which in turn is
    already set to have a content size of 100% because that’s the default setting
    for CCBs of type *Scene*.'
  trans: "\n``` \n由于 Chipmunk 错误而中止：空间被锁定时，无法手动重新索引对象。请等待当前查询或步骤完成。\n    失败条件：!space->locked\n\
    ```\n\n此错误代表了大多数物理引擎的一个已知问题：在碰撞事件期间，无法修改物理世界的某些方面（在 Chipmunk 中称为*空间*）。在此例中，播放动画会更改节点的旋转角度，从而改变节点物理体的旋转。Chipmunk\
    \ 不喜欢这样，因为物理世界（`space`）是*锁定*的，这意味着其中的物体正在被处理，需要处于一种连贯的状态，只有物理引擎本身才能进行更改。\n\n思考一下播放动画的来源：一个\
    \ `Trigger` 实例发送了 `didTriggerWithNode:` 消息，该消息的 `triggerActivatedBy:` 方法由 `GameScene.m`\
    \ 的碰撞回调方法 `ccPhysicsCollisionBegin:player:trigger` 执行。\n\n幸运的是，此类问题有一个快速简便的修复方法。它非常简单，当你仅仅怀疑存在这种“*你别碰*”的问题时，就可以尝试。对于这句洗脑旋律，我深表歉意。\n\
    \n按代码清单 5-17 所示，更新 `PlayTimelineWhenTriggered.m` 文件中的 `didTriggerWithNode:` 方法。\n\
    \n***代码清单 5-17***. 修复 Chipmunk 空间 ![image](img/00008.jpeg) 锁定错误\n\n```\n[self\
    \ scheduleBlock:^(CCTimer *timer) {\n    [self.animationManager runAnimationsForSequenceNamed:_timelineName];\n\
    } delay:0.0];\n```\n\n调度一个延迟为 0 的 block，会将 block 的内容推迟到下一次 Cocos2D 调度器运行已调度 block\
    \ 时再执行。最晚，这会在下一帧运行。\n\n**提示**  如果你发现经常需要使用 `scheduleBlock:` 技巧来防止*空间锁定*错误，你应该考虑更新\
    \ `Trigger.m` 文件中的 `triggerActivatedBy:` 方法，将对 `didTriggerWithNode:` 的调用直接推迟到一个已调度的\
    \ block 中。如果这样做，你就不再需要在 `TriggerDelegate` 类中调度 block 了，但另一方面，所有 `didTriggerWithNode:`\
    \ 消息都会被延迟。\n\n现在运行项目，当玩家进入触发区域时，锯子会立即开始旋转。项目的当前状态可在文件夹 `06 - Triggered Animations`\
    \ 中找到。\n\n## 总结\n\n在本章中，你已经学习了如何使用时间轴编辑器创建关键帧动画，以及如何通过 `CCAnimationManager` 播放这些动画。\n\
    \n接着，你添加了一个通用的 `Trigger` 类，使得当玩家进入指定触发区域时能够运行代码。`Trigger` 和目标节点仅通过赋予它们相同的名称来连接。\n\
    \n# 第 6 章：菜单与弹出视图\n\n至此，你已经拥有了一个关卡和一些游戏元素，使游戏原则上可以运行。在扩展更多游戏元素和额外关卡之前，我想花点时间将各部分连接起来……确切地说是菜单的连接。\n\
    \n锯子应该能杀死玩家，但这需要一个*游戏结束*菜单，让玩家可以重试或结束关卡。你目前也无法暂停游戏，应用被发送到后台时也不会自动暂停。\n\n你将学习如何设计能轻松适应不同屏幕分辨率的菜单，以及如何在无需切换场景的情况下，以弹出视图或全屏视图的形式呈现它们。你还会用到时间轴的*回调*功能。\n\
    \n## 静态游戏内菜单\n\n对于暂停按钮或分数显示等用户界面元素，你需要一种方法将这些元素固定到屏幕上，使它们不随关卡的滚动而移动。但在那之前，你应该先添加准备好的用户界面图形。\n\
    \n### 添加菜单图形\n\n在本书可下载存档的 `Graphics` 文件夹中，你会找到 *Menu* 和 *UserInterface* 两个文件夹。将这两个文件夹拖入\
    \ SpriteBuilder 的 *SpriteSheets* 文件夹中。然后，右键单击这两个文件夹并选择 *Make Smart Sprite Sheet*，将它们转换为精灵表。和往常一样，你应该将格式更改为\
    \ *PVR RGBA8888* 并勾选 *Compress*。\n\n如果你想使用自己的菜单和 UI 图像，也可以。除了菜单背景（应填满整个屏幕）外，各个图像没有固定尺寸。不过，如果使用自定义图形，你可能需要对某些属性值（`position`,\
    \ `content size`）使用不同的值，以使图像适配。\n\n### 添加静态游戏菜单层\n\n游戏菜单层将是一个包含所有游戏内用户界面控件和标签的节点。目前，你只需要它来添加一个暂停按钮，但它也可以包含分数标签、倒计时器、玩家生命条、虚拟摇杆、激活特殊技能的按钮，或任何其他不应随关卡滚动的用户界面元素。\n\
    \n所有用户界面元素都应该放在它们自己的文件夹中，就像预制件一样。你的第一个任务是在 SpriteBuilder 的 *文件视图* 中添加一个新文件夹，并将其命名为\
    \ `UserInterface`。然后右键单击 `UserInterface` 文件夹，选择 *新建文件* 来创建一个新的 CCB 文档。将此文档命名为\
    \ `GameMenuLayer.ccb`，并将其类型设置为 *层*。保持大小为默认的 `568x384`，然后点击 *创建*。\n\n### 使用参考角点对齐按钮\n\
    \n将一个 *按钮* 节点从 *节点库视图* 拖放到 `GameMenuLayer.ccb` 的场景上。拖动并移动按钮，使其非常靠近（甚至接触）图层的左上角。\n\
    \n接下来，打开 `GameScene.ccb`，将 `GameMenuLayer` 从 *无图块编辑器视图* 拖放到场景上。然后验证其 `position`\
    \ 属性是否设置为 `0,0`。\n\n如果你在以 iPad 分辨率查看 `GameScene.ccb`，请按 `Cmd+1` 切换到手机分辨率。注意按钮是部分可见还是完全不可见。\n\
    \n**注意**  在查看通过子文件节点包含另一个 CCB 文件的 CCB 文件时，必须保存被引用的 CCB 文件，才能看到其最新的编辑内容。\n\n在此例中，`GameMenuLayer.ccb`\
    \ 是通过 `GameScene.ccb` 中的一个子文件节点包含进来的。每当你修改 `GameMenuLayer.ccb` 时，必须在查看 `GameMenuLayer.ccb`\
    \ 时执行 文件 ![image](img/00008.jpeg) 保存，或者发布项目，才能在 `GameScene.ccb` 中看到其当前状态。\n\n\
    使用 文档 ![image](img/00008.jpeg) 分辨率 ![image](img/00008.jpeg) 平板横向 和 文档 ![image](img/00008.jpeg)\
    \ 分辨率 ![image](img/00008.jpeg) 手机横向 菜单项，可以在 iPad 和 iPhone 屏幕尺寸间即时切换。或者更简单，直接按\
    \ `Cmd+1` 和 `Cmd+2` 来切换可用分辨率。类型为 *场景* 的 CCB 文件还提供一个 *手机横向（短屏）*（`Cmd+3`）分辨率，代表直至\
    \ iPhone 4S 的 3.5 英寸 iPhone。\n\n你会看到按钮在 iPad 上完全可见，但在 iPhone 上却不可见，这是因为 `GameMenuLayer.ccb`\
    \ 的内容尺寸是默认的 `568x384`。这个尺寸是一个折中方案，在 iPad 上能很好缩放，但 384 点的高度使得图层比 iPhone 屏幕略高。\n\
    \n再次打开 `GameMenuLayer.ccb`，并选择根节点。通过在 *父容器中的百分比* 下拉列表中选择相应项，将其宽度和高度的 *内容尺寸* 属性类型都改为\
    \ `%`。宽度和高度值应自动变为 `100`；如果没有，请确保两者值均为 `100`。这会使图层随其父节点的大小缩放。在此例中，父节点是 `GameScene.ccb`\
    \ 的根节点，而该根节点的内容尺寸已默认设置为 `100%`，因为这是类型为 *场景* 的 CCB 文件的默认设置。\n"
- fmt: '# 排版后内容


    本质上，`GameMenuLayer.ccb`的大小现在在所有设备上都等于屏幕的大小。百分比内容大小设置有效地从父节点向下传递，允许子节点采用屏幕的大小，或者如果它们所有的父节点都这样做，则采用与屏幕大小成比例的大小。


    然而，将`GameMenuLayer.ccb`缩放到屏幕大小并不会自动缩放它包含的节点位置和大小。因此，选择按钮并将其参考角下拉菜单更改为*Top-Left*设置。参考角下拉菜单在[图6-1](#part0015.html#Fig1)中突出显示。然后更改按钮的位置，使其距离其参考角约50
    x 20点。


    ![9781484202630_Fig06-01.jpg](images/00085.jpeg)


    [图6-1](#part0015.html#_Fig1)。按钮的参考角设置为*Top-Left*，使其位置相对于图层的左上角


    更改参考角将定位按钮，使其始终相对于图层的左上角。随着图层在不同屏幕尺寸的设备上高度增加或减少，按钮的位置将保持在水平方向向内50点，以及屏幕左上角下方20点处。


    更改参考角并使图层随场景尺寸缩放，是将节点对齐到屏幕各角的最佳方式，无论设备如何。虽然您可以使用百分比位置类型而不更改参考角来实现类似效果，但在iPhone和iPad设备之间切换时，这样做可能会导致明显的布局问题。


    例如，假设按钮的参考角仍设置为*Bottom-Left*，并且Y位置设置为*95%*。这将使按钮在iPhone上出现在`320 – 320 * 95% =
    16`点距离屏幕顶部边缘下方。而在iPad上，按钮将在`768 – 768 * 95% = 38`点距离屏幕顶部边缘下方。不完全正确：考虑到`SpriteBuilder`在从iPhone切换到iPad时对位置应用2倍缩放，这在iPad上会得到绝对距离为19点位于屏幕顶部边缘下方。


    这种百分比位置将导致iPhone和iPad屏幕之间Y位置相差3点（16点 vs. 19点）。虽然在许多情况下这可能*足够接近*，但在需要精确定位时，您必须更改参考角并以点为单位指定位置。


    ## 编辑按钮属性


    您添加到`GameMenuLayer.ccb`的按钮目前有点难看且毫无特色。选择该按钮，切换到*Item Properties*选项卡，然后对其众多属性感到惊叹，这些属性分为四个部分：`CCNode`、`CCControl`、`CCButton`和`CCLabelTTF`。从哪里开始呢？


    您已经完成了`CCNode`属性的编辑，并且通过编辑其他任何节点应该对它们很熟悉。无需进一步更改它们。那么，让我们看看其余属性部分。


    ### CCControl 属性


    [图6-2](#part0015.html#Fig2)中所示的`CCControl`属性无需更改。尽管如此，我还是会快速解释一下，因为您反正就想知道。我说得对吗？


    请注意，所有继承自`CCControl`的节点都提供这些属性。`CCControl`节点包括*Button*、*Text Field*和*Slider*。


    ![9781484202630_Fig06-02.jpg](images/00086.jpeg)


    [图6-2](#part0015.html#_Fig2)。`CCControl`属性定义了`CCControl`节点的最小和最大尺寸


    *Preferred size*应该被命名为*minimum size*，因为它决定了控件的最小可能尺寸——在本例中，即按钮。相应地，*Max size*决定了最大尺寸，除非将其设置为0以允许按钮的尺寸无限制增长。


    这些设置主要用于标题会以编程方式更改的按钮，因为按钮的大小会随其标签文本的大小而增长或缩小。


    *User Interaction Enabled*应该是自解释的。如果未选中，按钮将不会响应触摸或点击，除非通过将`userInteractionEnabled`属性设置为`YES`以编程方式启用用户交互。所有节点都从`CCResponder`继承此属性，该属性控制节点的自定义类是否会接收触摸和加速度计事件。


    ### CCButton 属性


    `CCButton`属性是您需要施展编辑技巧的地方。最重要的是，*Title*应该反映按钮的功能；将其更改为*PAUSE*，如[图6-3](#part0015.html#Fig3)所示。暂时忽略*Localize*复选框，它将在“标签与本地化”章节中解释。


    ![9781484202630_Fig06-03.jpg](images/00087.jpeg)


    [图6-3](#part0015.html#_Fig3)。设置了正确标题和自定义图形的`CCButton`属性


    当选中时，*Zoom when highlighted*将在用户长按按钮时放大按钮（包括背景和标签）。这是一个遗留特性，因为Cocos2D过去对所有菜单按钮都这样做，不论好坏。我认为这是一个粗糙的效果，所以尽量避免使用。相反，我将简要解释一些巧妙技巧，您可以借助它们在不依赖缩放或更改背景图像的情况下给用户视觉提示。


    选中*Toggles selected state*会使按钮变成一个切换按钮，每次点击时都会从其正常状态切换到选中状态，再切换回来。当按钮处于选中状态时，将使用*Selected
    State*部分的属性。因此，如果您想制作一个切换按钮，请确保为*Normal State*和*Selected State*使用不同的属性；否则，您将无法判断按钮是开还是关，是正常还是选中。


    [图6-3](#part0015.html#Fig3)下半部分的*Normal State*部分代表了按钮所有可能的状态属性。所有按钮状态都具有相同的*Sprite
    frame*、*Background*和*Label*属性。共有四种按钮状态：


    - **Normal:** 默认状态。

    - **Highlighted:** 在触摸按钮期间（长按）生效。

    - **Disabled:** 当通过编程方式将按钮的`enabled`属性设置为`NO`，或者通过添加一个自定义属性（请参阅下面的提示框）来指示该按钮当前无法使用时生效。

    - **Selected:** 当选中*Toggles selected state*且按钮被点击一次后，以及随后的每次反选点击时使用。


    > **提示** Disabled状态与*User Interaction Enabled*复选框不对应，您不能在SpriteBuilder中编辑`enabled`属性。除非您想向按钮添加一个自定义属性，将其命名为`enabled`，并将其类型设置为`Bool`，值设置为`0`。可惜，除非您在*Item
    Code Connections*选项卡上指定一个*Custom class*，否则您不能添加自定义属性。但谁说过这个类必须是一个真正的*自定义*类呢？

    >

    > 事实上，您可以在*Custom class*字段中输入节点的原始类（此处为`CCButton`）（由Cocos2D提供），以使*Edit Custom
    Properties*按钮出现在*Item Properties*选项卡底部。然后，您可以添加该类中通常不能在SpriteBuilder中编辑的任何`Bool`、`Int`、`Float`和`String`属性。


    在这种情况下，按钮仅使用*Normal*和*Highlighted*状态。当使用本书的图形时，点击*Sprite frame*下拉菜单并选择`SpriteSheets/UserInterface/P_exit.png`。对正常和高亮的精灵帧属性都执行此操作。当使用您自己的图形时，只需确保两个状态的精灵帧都设置为相同的图像即可。


    为了给用户一个视觉提示，表明她当前正在触摸按钮，只需将正常状态的*Background opacity*和*Label opacity*更改为略低于1.0的值，例如0.8。这会使按钮略微透明，仅在触摸时变为完全不透明。'
  raw: 'In essence, the size of *GameMenuLayer.ccb* now equals the size of the screen
    on all devices. The % content size setting is effectively passed down from parent
    nodes, allowing child nodes to take on the size of the screen or a size proportional
    to the screen size if all of their parents do the same.


    Scaling *GameMenuLayer.ccb* to the size of the screen won’t automatically scale
    the positions and sizes of the nodes it contains, however. Therefore, select the
    button and change its reference corner drop-down menu to the *Top-Left* setting.
    The reference corner drop-down menu is highlighted in [Figure 6-1](#part0015.html#Fig1).
    Then change the button’s position so that it is about 50 by 20 points away from
    its reference corner.


    ![9781484202630_Fig06-01.jpg](images/00085.jpeg)


    [Figure 6-1](#part0015.html#_Fig1). The button’s reference corner is set to Top-Left
    to make its position relative to the top left corner of the layer


    Changing the reference corner will position the button so that it is always relative
    to the top-left corner of the layer. As the layer’s height increases and decreases
    on devices with different screen sizes, the button’s position will remain at 50
    points inwards horizontally and 20 points below the top-left corner of the screen.


    Changing the reference corner and making the layer scale with the dimensions of
    the scene is the best way to align nodes to each corner of the screen regardless
    of the device. Though you can achieve a similar effect using the % position type
    and without changing the reference corner, doing so can cause noticeable layout
    problems when switching between iPhone and iPad devices.


    For instance, assume the button’s reference corner was still set to *Bottom-Left*
    and the Y position was set to *95%*. That would make the button appear at a distance
    of *320 – 320 * 95% = 16* points below the top screen edge on iPhones. While on
    iPads, the button would be *768 – 768 * 95% = 38* points below the screen. Not
    quite: taking into account that SpriteBuilder applies a 2x scale to positions
    when switching from iPhone to iPad, that gives you an absolute distance of 19
    points below the top screen edge on iPad.


    Such % positions would result in a difference of 3 points (16 points vs. 19 points)
    in Y position between iPhone and iPad screens. While that may be *close enough*
    for many cases, where you need precise positioning you must change the reference
    corner and specify the position in points.


    Editing Button Properties


    The button you’ve added to *GameMenuLayer.ccb* is a tad ugly and nondescript at
    the moment. Select the button, switch to the *Item Properties* tab, and stand
    in awe of its many, many properties divided into four sections: *CCNode*, *CCControl*,
    *CCButton*, and *CCLabelTTF*. Where to start?


    You’ve already completed editing the *CCNode* properties, and you should be familiar
    with them from editing any other node. No need to change them any further. So
    then let’s have a look at the remaining properties sections.


    CCControl Properties


    The *CCControl* properties shown in [Figure 6-2](#part0015.html#Fig2) need no
    changes. Nevertheless, I’ll give you a quick explanation because you just want
    to know anyway. Am I right?


    Note that all nodes that inherit from *CCControl* offer these properties. The
    *CCControl* nodes are *Button*, *Text Field*, and *Slider*.


    ![9781484202630_Fig06-02.jpg](images/00086.jpeg)


    [Figure 6-2](#part0015.html#_Fig2). CCControl properties define the minimum and
    maximum sizes of a CCControl node


    *Preferred size* should have been named *minimum size*, because it determines
    the smallest possible size of a control—in this case, the button. Correspondingly,
    *Max size* determines the maximum size, unless it is set to 0 to allow the button’s
    size to grow without limits.


    These settings are mainly useful for buttons whose title will change programmatically
    because a button’s size grows and shrinks with the size of the label printed on
    it.


    *User Interaction Enabled* should be self-explanatory. If unchecked, the button
    will not respond to touches or clicks unless user interaction is enabled programmatically
    by setting the userInteractionEnabled property to YES. All nodes inherit this
    property from *CCResponder*, which controls whether the node’s custom class will
    receive touch and accelerometer events.


    CCButton Properties


    The *CCButton* properties is where you need to apply some editing love. Above
    all, the *Title* should reflect what the button does; change it to *PAUSE* as
    seen in [Figure 6-3](#part0015.html#Fig3). Ignore the *Localize* check box for
    now, it will be explained in the “Labels & Localization” chapter.


    ![9781484202630_Fig06-03.jpg](images/00087.jpeg)


    [Figure 6-3](#part0015.html#_Fig3). CCButton properties with proper title and
    custom graphics


    When selected, *Zoom when highlighted* will zoom in the button (both background
    and label) when the user taps and holds. This is a legacy feature because Cocos2D
    used to do that to all menu buttons, for better or worse. I think it’s a crude
    effect, so try to avoid it. Instead, I’ll shortly explain neat tricks with which
    you can give the user visual cues without resorting to zooming or changing the
    background image.


    Checking *Toggles selected state* makes the button a toggle button, changing from
    its normal state to its selected state and back every time it is tapped. When
    the button is in the selected state, the properties for the *Selected State* section
    are used. So if you want to make a toggle button, be sure to use different properties
    for *Normal State* and Selected State; otherwise, you won’t be able to tell whether
    the button is on or off, normal or selected.


    The *Normal State* section in the bottom half of [Figure 6-3](#part0015.html#Fig3)
    is representative of all of the button’s possible state properties. All button
    states have the same *Sprite frame*, *Background*, and *Label* properties. There
    are four button states:


    *   **Normal:** The default state.

    *   **Highlighted:** Takes effect for the duration the button is touched (tap
    and hold).

    *   **Disabled:** In effect when the button’s enabled property is set to NO programmatically
    or by adding a custom property (see Tip box that follows) to signal that the button
    currently does not function.

    *   **Selected:** Used when *Toggles selected state* is checked and the button
    has been tapped once, and for every other tap following that.


    **Tip**  The Disabled state does not correspond to the *User Interaction Enabled*
    check box, and you can’t edit the enabled property in SpriteBuilder. Unless you
    want to add a custom property to the button, name it **enabled**, and set its
    type to Bool and its value to 0\. Alas, you can’t add custom properties unless
    you specify a *Custom class* on the *Item Code Connections* tab. But who is to
    say this class has to be a truly *custom* class?


    As a matter of fact, you can enter a node’s original class (here: *CCButton*)
    as provided by Cocos2D in the *Custom class* field to make the *Edit Custom Properties*
    button appear at the bottom of the *Item Properties* tab. Then you can add any
    of the class’ Bool, Int, Float, and String properties that are not normally editable
    in SpriteBuilder.


    In this case, the button uses only the *Normal* and *Highlighted* states. Click
    on the *Sprite frame* drop-down menu and select *SpriteSheets/UserInterface/P_exit.png*
    when using the book’s graphics. Do so for both normal and highlighted sprite frame
    properties. When using your own graphics, just make sure the sprite frame is set
    to the same image for both states.


    To give the user a visual cue that she is currently touching the button, it suffices
    to change the *Background opacity* and *Label opacity* of the normal state to
    a value slightly below 1.0, say 0.8\. This makes the button slightly transparent
    and only becoming fully opaque when touching it.'
