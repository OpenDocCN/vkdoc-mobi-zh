    might look like if you applied the same values or similar values as in [Figure
    12-5](#part0023.html#Fig5) and [Figure 12-6](#part0023.html#Fig6) to the *Particle
    System* node.


    ![9781484202630_Fig12-07.jpg](images/00186.jpeg)


    [Figure 12-7](#part0023.html#_Fig7). The monsters are glowing red hot thanks to
    the particle effect


    The effect is most visible on the monsters, which seem to be glowing hot. Yet
    you can’t make out individual particles and they blend perfectly with the background,
    which makes this effect worth seeing in the game. Preferably you’ll check this
    out on a device since the Simulator now renders this scene with maybe 15 frames
    per second (fps) at most.


    Shader Effects


    Cocos2D’s latest feature is shader effects, typically in the form of the *Effect*
    node, which applies a given shader effect to all of its children.


    Sprites can also have one or more shader effects applied to them without the need
    for a separate *Effect* node. The user interface and available shaders and their
    parameters are the same for both.


    Adding an Effect Node


    To try out the *Effect* node, open *MainScene.ccb* and then drag and drop an *Effect*
    node from the *Node Library View* onto the stage. The *Effect* node, much like
    the *Color* node, has an implied size of 100x100 points.


    Since the *Effect* node applies its effect to its children, this also means that
    it will draw only the children within its frame, determined by the *Effect* node’s
    *Content size* property.


    **Tip**  An *Effect* node without any effects can be used like a clipping node,
    where any content outside the *Effect* node’s rectangle will simply not be drawn
    (clipped). You could make use of that for a split-screen view by dividing the
    screen into two *Effect* nodes, appropriately positioned and sized. Then whatever
    you draw in one *Effect* node will not overlap into the area of the other *Effect*
    node.


    There are many uses for this. For instance, a minimap overlay could use a large
    image for the entire map, but it’s added to an *Effect* node so that it will draw
    only a small portion of the map in a corner of the screen.


    In this case, the *Effect* node should be a full-screen effect. Select the *CCEffectNode*
    in the Timeline, and change its position to *0x0*. Then change the *Content size*
    types to *%*, with both values set to *100*. This stretches the size of the effect
    to the size of the screen.


    Next, drag and drop the *CCEffectNode* in the Timeline so that it becomes the
    topmost node in the list. Then drag the existing background node onto the *CCEffectNode*
    so that the background node becomes a child node of the *CCEffectNode*. See the
    Timeline in [Figure 12-8](#part0023.html#Fig8) for reference.


    ![9781484202630_Fig12-08.jpg](images/00187.jpeg)


    [Figure 12-8](#part0023.html#_Fig8). Multiple effects applied to the menu background
    give it an entirely different look


    Now any effect added to the *CCEffectNode* will be applied to the entire background
    node. In this case, the entire *MainMenuBackground.ccb* will have the shader effects
    applied to it, including the recently added particle effect.


    The results will look something like in [Figure 12-8](#part0023.html#Fig8). A
    darker, scarier, and pixellated version of the background.


    To create this effect, select the *CCEffectNode* in the Timeline and switch to
    the *Item Properties* tab.


    You’ll notice the *CCEffectNode* section at the bottom of the *Item Properties*
    tab shown in [Figure 12-8](#part0023.html#Fig8). With the [+] button, you will
    open a context menu from which you can choose one effect to add to the list. At
    the time of this writing, there are a total of 10 effects, as seen in [Figure
    12-9](#part0023.html#Fig9).


    ![9781484202630_Fig12-09.jpg](images/00188.jpeg)


    [Figure 12-9](#part0023.html#_Fig9). Adding an effect


    To create the effect seen in [Figure 12-8](#part0023.html#Fig8), add *Pixellate*,
    *Hue*, *Brightness*, and *Saturation* effects. The order in which you add these
    effects doesn’t matter, although it may make a difference for other effect combinations.


    The *Pixellate* effect should have a value of *5*, *Hue* a value of –64, *Brightness*
    a value of –0.2, and *Saturation* a value of –0.4\. Feel free to alter the values
    as you see fit. You can also add additional effects if you want.


    **Note**  In the SpriteBuilder version I used, you can add the same effect multiple
    times. This does not make sense for most effects. For instance, using *Pixellate*
    multiple times will make a difference only if each effect uses a different pixellation
    value (say: 3, 5, and 8), and the result will look barely any different from using
    a single *Pixellate* effect with a value of *8* in this example.


    There may be some use for applying the same effect multiple times, but no matter
    how hard I tried, I couldn’t find or even imagine a possible use case. This may
    change once more effects are added in the future.


    If you want to remove an effect, you have to select it in the list by clicking
    on its name or an empty area not used by any controls. Once the effect is highlighted,
    click the [–] button to remove it.


    **Caution**  I found myself frequently hitting Backspace to remove a selected
    effect. Alas, this will in fact remove the CCEffectNode and all of its children.
    Fortunately, you just need to issue *Edit* ![image](images/00008.jpeg) *Undo (Cmd+Z)*
    to bring back the *Effect* node and its children.


    You should publish, build, and run the game. You may see that the effects have
    a noticeable, negative effect on the performance, even in the menu. The animations
    won’t look smooth. Of course, this varies with the device you are testing on.
    It wouldn’t be unheard of if an iPhone 6 runs these effects at 60 fps while an
    iPhone 4 struggles to render just 10 frames per second.


    Not to mention the iOS Simulator—it uses a software renderer, and emulating shader
    effects is particularly slow. Therefore, it’s rather common to see a dramatic
    drop in performance on the Simulator once one or more effects are visible on the
    scene.


    Available Effects


    The currently available effects are roughly divided into three groups:'
