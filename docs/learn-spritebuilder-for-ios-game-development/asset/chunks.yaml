  trans: "\n# 默认滑块样式调整\n\n默认滑块看起来有些单调。选择一个滑块后，转到*Item Properties*选项卡，你会看到图 7-11 中所示的`CCSlider`部分。这些设置允许你更改与滑块背景（可拉伸线条）和滑块手柄相关联的图像。\n\
    \n![9781484202630_Fig07-11.jpg](img/00105.jpeg)\n\n图 7-11. 滑块图像设置\n\n将*Background*图像更改为`SpriteSheets/UserInterface/S_bar.png`，并将正常状态下的*Handle*图像设置为`SpriteSheets/UserInterface/S_ball.png`（如图\
    \ 7-11 顶部的设置所示）。\n\n为*Highlighted State*将*Background*和*Handle*图像都设置为`<NULL>`。这意味着高亮状态——即用户拖动手柄时的状态——将使用与正常状态相同的图像。\n\
    \n请注意，滑块背景图像应具有特定尺寸，因为它会根据需要拉伸。这同样适用于其他可拉伸的`CCControl`图像，例如按钮背景图像。在内部，滑块和按钮使用`CCSprite\
    \ 9 Slice`节点来处理图像；然而，该精灵的属性并未暴露。因此，如果使用了尺寸不正确的滑块或按钮背景图像，其显示效果将从“不太正确”到令人厌恶——或者干脆与预期效果不符。\n\
    \n如果需要查询内置图像的尺寸，你可以在任何 SpriteBuilder 项目的`ccbResources`文件夹中找到默认的滑块和按钮图像。\n\n`ccbSliderBgNormal.png`和`ccbSliderBgHighlighted.png`图像被用作滑块的默认背景图像。这些图像尺寸为\
    \ 28x10 像素，但其*Scale from*属性（如第 3 章的图 3-8 所示）设置为 2 倍。你可以为自己的背景图像使用 28x10 的尺寸，并将这些图像的*Scale\
    \ from*属性设置为 2 倍，或者以 56x20 像素的分辨率设计它们，而无需担心更改*Scale from*设置。\n\n# 连接滑块\n\n这应该已经是基本操作了：选择效果滑块并切换到*Item\
    \ Code Connections*选项卡。在*Selector*字段中输入`volumeDidChange:`，并勾选*Continuous*复选框。同时在*Doc\
    \ root var*字段中输入`_effectsSlider`。\n\n对音乐滑块重复此操作：将其*Selector*设置为`volumeDidChange:`，同样勾选*Continuous*复选框，然后在*Doc\
    \ root var*字段中输入`_musicSlider`。\n\n是的，两个滑块使用相同的选择器。另请注意两个选择器末尾的冒号——如果选择器末尾有冒号，则表示该方法接收一个参数。发送这些选择器的`CCControl`类既支持你之前使用过的无参数方法，也支持像本例这样带单一参数的方法。该参数始终是正在运行选择器的`CCControl`对象——在本例中，即`CCSlider`实例。稍后我会对此进行详细说明。\n\
    \n缺少什么？当然是根节点的自定义类！选择根节点，并在*Custom class*字段中输入`SettingsLayer`。\n\n现在你可以切换到 Xcode，在*Source*组中创建`SettingsLayer`类。请参见第\
    \ 2 章中的图 2-9。`SettingsLayer`子类应为`CCNode`。\n\n编辑`SettingsLayer.h`，添加一个用于持有`MainMenuButtons`实例引用的属性，如清单\
    \ 7-3 所示。使用`@class`可以避免在`SettingsLayer.h`头文件中`#import`相应的头文件——这是你应该尽量避免的做法。\n\n\
    ***清单 7-3***. `SettingsLayer`接口\n\n```\n#import \"CCNode.h\"\n\n@class MainMenuButtons;\n\
    \n@interface SettingsLayer : CCNode\n\n@property (weak) MainMenuButtons* mainMenuButtons;\n\
    \n@end\n```\n\n`SettingsLayer.m`需要添加清单 7-4 中高亮显示的内容。\n\n***清单 7-4***. 滑块选择器将发送者作为输入参数接收\n\
    \n```\n#import \"SettingsLayer.h\"\n#import \"MainMenuButtons.h\"\n\n@implementation\
    \ SettingsLayer\n{\n    __weak CCSlider* _musicSlider;\n    __weak CCSlider* _effectsSlider;\n\
    }\n\n-(void) volumeDidChange:(CCSlider*)sender\n{\n    NSLog(@\"volume changed,\
    \ sender: %@\", sender);\n}\n\n@end\n```\n\n`sender`参数的类型始终是`CCControl*`，但由于可以确定只有滑块会运行此选择器，因此可以安全地假设参数类型为`CCSlider*`。当然，`CCSlider`是`CCControl`的子类。两个`CCSlider`实例变量将用于确定哪个滑块执行了`volumeDidChange:`选择器。\n\
    \n在测试滑块之前，需要在`MainMenuButtons.m`中加载并显示设置层。具体来说，将现有的`shouldShowSettings`方法替换为清单\
    \ 7-5 中的方法。\n\n***清单 7-5***. 显示设置层\n\n```\n-(void) shouldShowSettings\n{\n   \
    \ SettingsLayer* settingsLayer = (SettingsLayer*)[CCBReader load:\n          \
    \                                          @\"UserInterface/SettingsLayer\"];\n\
    \    settingsLayer.mainMenuButtons = self;\n    [self.parent addChild:settingsLayer];\n\
    \nself.visible = NO;\n}\n```\n\n`SettingsLayer`由`CCBReader`加载，使用`SettingsLayer.ccb`文件的完整路径。然后分配`mainMenuButtons`引用，并将`settingsLayer`添加为`MainMenuButtons`父节点（即`MainScene`实例）的子节点。这是因为`MainMenuButtons`实例本身被设置为不可见——如果`settingsLayer`是`MainMenuButtons`的子节点，它也会被隐藏，那将适得其反。\n\
    \n现在你可以运行游戏并点击*Settings*按钮来打开设置弹出窗口。如果移动滑块，你将在 Xcode 控制台中看到类似如下（已缩短）的日志行：\n\n\
    ```\n[..] volume changed, sender: <CCSlider = 0x10a13ebf0 | Name = musicSlider>\n\
    [..] volume changed, sender: <CCSlider = 0x10a135f70 | Name = effectsSlider>\n\
    ```\n\n每个`sender`对象都是`CCSlider`的不同实例。如果你在*Item Properties*选项卡中为滑块设置了名称，该名称也会被记录。\n\
    \n# 关闭设置弹出窗口\n\n目前你还无法关闭设置弹出窗口。你应该通过引入一个通用的关闭按钮来解决这个问题。你可以在其他图层中使用相同的按钮，并且通常可以在按钮上使用相同的概念，这些按钮应该将选择器转发到特定的父类。\n\
    \n但在许多情况下，你无法这样做，因为按钮和其他`CCControl`节点会将它们的选择器发送到文档根节点——即 CCB 根节点的自定义类。特别是如果*Button*位于其自己的\
    \ CCB 文件中，你将不得不为每个特定任务创建一个单独的按钮——甚至可能为相同任务但不同用例创建单独的按钮。有一个简单的解决方案。\n\n右键点击*UserInterface*文件夹，选择*New\
    \ File*。将新文档命名为`CloseButton.ccb`，然后这次使用*Node*类型，再点击*Create*。选择根节点后，切换到*Item Code\
    \ Connections*选项卡并设置其自定义类。这里应将其命名为`CloseButton`。\n\n然后从节点库视图中将*Button*节点拖到舞台上。在*Item\
    \ Properties*选项卡上，你只需要将按钮正常状态和*Highlighted State*的精灵帧更改为`SpriteSheets/UserInterface/S_back.png`，并将*Highlighted\
    \ State*的*Background*颜色更改为浅灰色。然后，在*Item Code Connections*选项卡上，在*Selector*字段中输入`shouldClose`。你还应清空*Title*字段，以移除按钮上的所有文本。\n"
- fmt: "以上就是按钮的 `CCB` 文件的全部内容。你应该打开 `SettingsLayer.ccb`，然后将 `CloseButton.ccb` 拖放到\
    \ `settingsLayer` 节点上。将按钮拖拽并移动到 `S_bg` 背景图片右上角的位置（坐标 140x75），如图 7-12 所示。或者，如果你更希望将其对齐到角落，可以将位置类型更改为\
    \ `%`，并使用 `100, 100` 或稍小一点的值作为位置。\n\n![9781484202630_Fig07-12.jpg](images/00106.jpeg)\n\
    \n图 7-12：`SettingsLayer.ccb` 的最终版本\n\n在 Xcode 中，创建另一个 Objective-C 类，名称为 `CloseButton`，并将\
    \ `CCNode` 作为其父类。打开 `CloseButton.m` 文件，添加清单 7-6 中高亮显示的方法。\n\n清单 7-6：将 `CloseButton`\
    \ 消息转发到最近的父节点\n\n```objectivec\n#import \"CloseButton.h\"\n\n@implementation CloseButton\n\
    \n-(void) shouldClose\n{\n    CCNode* aParent = self.parent;\n\n    do\n    {\n\
    \        if ([aParent respondsToSelector:_cmd])\n        {\n            [aParent\
    \ performSelector:_cmd];\n            break;\n        }\n\n        aParent = aParent.parent;\n\
    \    }\n    while (aParent != nil);\n}\n\n@end\n```\n\n`shouldClose` 方法在进入 `do/while`\
    \ 循环之前获取按钮的父节点。它检查父节点是否响应 `_cmd` 选择器，该选择器指向 `shouldClose` 选择器。使用 `_cmd` 可以更轻松地将此代码应用于其他按钮——你无需更新代码以使用每个特定的选择器。事实上，这段代码强烈建议被添加到像\
    \ `SceneManager` 这样的类方法中，或者作为 `CCNode` 的类别方法。我将把这个留作你的练习。\n\n如果给定的父节点确实响应了相同的选择器，则会执行该选择器，并且循环在\
    \ `break` 语句处结束。否则，`aParent` 变量被设置为 `aParent` 的父节点，从而在节点层次结构中不断向上遍历，接近 `CCScene`\
    \ 实例。如果实际上在找到实现给定选择器的父节点之前就到达了 `CCScene` 实例，循环也会结束，因为场景的父节点保证为 `nil`。\n\n**提示**\
    \ 与之前使用 `performSelector` 的情况类似，你可以忽略“可能导致泄漏”的警告，因为该选择器不返回对象。（它返回 `void`。）\n\n\
    你可以使用 `[aParent performSelector:_cmd withObject:nil afterDelay:0]` 来消除警告。这告诉编译器设置一个定时器，该定时器在触发时执行选择器。当涉及到定时器时，选择器不可能有返回值；因此，编译器停止抱怨。如果选择器声明为不接受参数（如此例所示），则作为参数发送给选择器的无关\
    \ `nil` 对象将被忽略。但是，由于现在涉及到定时器，尽管延迟为 0，选择器不一定会当前帧渲染之前执行。因此，这可能会导致选择器运行前额外延迟一帧——尽管在关闭弹出窗口时这不会成为问题。\n\
    \n现在剩下的工作是在一个 `CCB` 的自定义类（该类是 `CloseButton.ccb` 的祖先）中实现相同的 `shouldClose` 方法。在这种情况下，我们不需要走得很远，`SettingsLayer`\
    \ 应该可以处理它。转到 `SettingsLayer.m`，在其实现中添加清单 7-7 中的方法。\n\n清单 7-7：`shouldClose` 选择器被转发到\
    \ `SettingsLayer` 实例\n\n```objectivec\n-(void) shouldClose\n{\n    [self removeFromParent];\n\
    \    [_mainMenuButtons show];\n}\n```\n\n那么，为什么不直接在 `CloseButton` 的 `shouldClose`\
    \ 方法中移除 `aParent` 呢？（参见清单 7-6。）\n\n**注意** 关注点分离是最基本的编程原则之一。关闭按钮应该通知并让实现留给受影响的类，而不是假定“关闭”意味着\
    \ `removeFromParent` 并且仅此而已——甚至不给被移除的节点机会去了解对它做了什么。那将是非常粗鲁的！更多关于关注点分离的信息，请参见 http://en.wikipedia.org/wiki/Separation_of_concerns。\n\
    \n同样，就像可以在清单 7-7 的 `SettingsLayer` 方法中设置 `_mainMenuButtons.visible` 状态一样，最好让 `MainMenuButtons`\
    \ 类以自己的方式处理它。因此，将清单 7-8 的方法声明添加到 `MainMenuButtons.h` 中。\n\n清单 7-8：声明 `show` 方法\n\
    \n```objectivec\n#import \"CCNode.h\"\n\n@interface MainMenuButtons : CCNode\n\
    \n-(void) show;\n\n@end\n```\n\n当然，还要将相应的 `show` 方法（清单 7-9）添加到 `MainMenuButtons.m`\
    \ 文件中。\n\n清单 7-9：`show` 实现\n\n```objectivec\n-(void) show\n{\n    self.visible\
    \ = YES;\n}\n```\n\n作为注释，我添加了一个关于在 `SettingsLayer` 关闭时可以做什么的建议，除了移除设置图层和显示按钮之外。如果两个\
    \ `CCB` 类都需要播放自己的时间轴动画，一个用于将 `SettingsLayer` 动画移出，另一个用于将 `MainMenuButtons` 动画移入，那该怎么办呢？\n\
    \n无论最终效果如何，它们都需要使用各自的 `animationManager` 实例来运行动画，并且 `SettingsLayer` 必须响应一个 `Callbacks`\
    \ 选择器，以便正确地永久移除自身。\n\n当然，播放动画只是类可能希望以自己的方式响应事件的众多原因之一，而不是由其他类来规定。如果你遵循关注点分离的原则，你会发现，在同一项目中甚至在未来项目中，重用类和单个\
    \ `CCB` 文件会容易得多。\n\n你的工作成果如图 7-13 所示。注意，设置背景图像是透明的——因为该图像被设计为轻微透明。你也可以使用完全不透明的背景，然后降低精灵的不透明度。效果是一样的。\n\
    \n![9781484202630_Fig07-13.jpg](images/00107.jpeg)\n\n图 7-13：包含背景和设置菜单的主场景\n\n\
    ## 持久化游戏状态\n\n由于你希望应用设置能够在多次启动之间持久保存，并且你很快还需要持久化其他数据，例如解锁的关卡，因此是时候引入 `GameState`\
    \ 类了，它负责持久化游戏的各种状态。\n\n## 引入 GameState 类\n\n`GameState` 类将作为 `NSUserDefaults`\
    \ 的包装器，以避免在整个代码中注入带有相同字符串键的相同代码。与 `NSUserDefaults` 一样，它也将是一个单例类。*单例* 是一个只能实例化一次的类。\n\
    \n我听到你在想“终于来了！”吗？还是“呃！？！？” 我知道单例是一个备受争议的话题——有些人甚至对它有极其主观的看法。单例经常被过度使用和/或滥用，尤其对于初学者来说，它们是很诱人的结构，因为全局可访问性使它们成为在对象之间传递数据和引用的极其简单的变通方法。\n\
    \n我只有一个恳求：在使用单例之前，请确保你已经考虑并排除了所有其他选项。只有相对较少的变量和方法才需要是全局的。"
  raw: 'That’s all there is to the button’s CCB file. You should open *SettingsLayer.ccb*
    and drag and drop *CloseButton.ccb* onto the *settingsLayer* node. Drag and move
    the button so that it is in the upper right corner of the *S_bg* background image
    (position 140x75) as seen in [Figure 7-12](#part0017.html#Fig12). Or, if you would
    rather align it with the corner, you can change the position types to *%* and
    use *100, 100* or a little less for the position.


    ![9781484202630_Fig07-12.jpg](images/00106.jpeg)


    [Figure 7-12](#part0017.html#_Fig12). The final version of the SettingsLayer.ccb


    In Xcode, create yet another Objective-C class with the name ***CloseButton***
    and using CCNode as the subclass. Open the *CloseButton.m* file to add the method
    highlighted in [Listing 7-6](#part0017.html#list6).


    [***Listing 7-6***](#part0017.html#_list6). Forwarding the CloseButton message
    to the nearest parent node


    ```

    #import "CloseButton.h"


    @implementation CloseButton


    -(void) shouldClose

    {

        CCNode* aParent = self.parent;


    do

        {

            if ([aParent respondsToSelector:_cmd])

            {

                [aParent performSelector:_cmd];

                break;

            }


    aParent = aParent.parent;

        }

        while (aParent != nil);

    }


    @end

    ```


    The shouldClose method takes the button’s parent before entering the do/while
    loop. It checks if the parent responds to the _cmd selector, which refers to the
    shouldClose selector. The use of _cmd simply makes it easier to use this code
    in other buttons—you don’t have to update the code to use each specific selector.
    In fact, this code cries out to be added to a class method like in the SceneManager,
    or maybe a category on CCNode. I’ll leave this as an exercise for you.


    If the given parent does respond to the same selector, that selector is performed
    and the loop ends at the break statement. Otherwise, the aParent variable is set
    to aParent’s parent, traversing ever closer toward the CCScene instance in the
    node hierarchy. If, in fact, the CCScene instance is reached before a parent implementing
    the given selector was found, the loop will also end because the scene’s parent
    is guaranteed to be nil.


    **Tip**  As with the previous use of performSelector, you can ignore the “may
    cause a leak” warning since the selector does not return an object. (It returns
    void.)


    You can get rid of the warning by using [aParent performSelector:_cmd withObject:nil
    afterDelay:0] instead. This tells the compiler to set up a timer which, in turn,
    performs the selector when it fires. When a timer is involved, there can’t be
    a value returned by the selector; therefore, the compiler stops complaining. The
    extraneous nil object sent as parameter to the selector is simply ignored if the
    selector is declared to take no parameters, as in this case. But because there
    is now a timer involved, and despite the delay being 0, the selector may not necessarily
    be performed before the current frame gets rendered. So this may introduce an
    additional delay of a single frame before the selector runs—though that won’t
    be a problem when dismissing a popover.


    What’s left now is to implement the same shouldClose method in a CCB’s custom
    class that is an ancestor of *CloseButton.ccb*. In this case, we needn’t go very
    far, the SettingsLayer should handle it. Move over to *SettingsLayer.m* to implement
    the method in [Listing 7-7](#part0017.html#list7) in its implementation.


    [***Listing 7-7***](#part0017.html#_list7). The shouldClose selector is forwarded
    to the SettingsLayer instance


    ```

    -(void) shouldClose

    {

        [self removeFromParent];

        [_mainMenuButtons show];

    }

    ```


    So why not just remove aParent directly in the CloseButton’s shouldClose method?
    (See [Listing 7-6](#part0017.html#list6).)


    **Note**  Separation of concerns is one of the most fundamental programming principles.
    The close button should notify and leave the implementation to the affected class,
    rather than assuming that “close” means removeFromParent and nothing else—and
    not even giving the removed node a chance to know what is being done to it. That
    would be rude! For more information on separation of concerns, see [http://en.wikipedia.org/wiki/Separation_of_concerns](http://en.wikipedia.org/wiki/Separation_of_concerns).


    In the same light, just as the _mainMenuButtons.visible state could have been
    set from within the SettingsLayer method in [Listing 7-7](#part0017.html#list7),
    it’s best to let the MainMenuButtons class handle it in the way it sees fit. Therefore,
    add the method declaration of [Listing 7-8](#part0017.html#list8) to *MainMenuButtons.h*.


    [***Listing 7-8***](#part0017.html#_list8). Declaring the show method


    ```

    #import "CCNode.h"


    @interface MainMenuButtons : CCNode


    -(void) show;


    @end

    ```


    And, of course, add the corresponding show method ([Listing 7-9](#part0017.html#list9))
    to the *MainMenuButtons.m* file.


    [***Listing 7-9***](#part0017.html#_list9). The show implementation


    ```

    -(void) show

    {

        self.visible = YES;

    }

    ```


    I’ve added a suggestion as a comment about what you could be doing when the SettingsLayer
    closes, besides removing the settings layer and showing the buttons. What if both
    CCB classes needed to play a Timeline animation of their own, one that animates
    the SettingsLayer out and the MainMenuButtons in?


    Whatever that may look like, they would both need to run the animation using their
    own animationManager instances, and the SettingsLayer would have to respond to
    a Callbacks selector in order to properly remove itself for good.


    Of course, playing an animation is just one of many reasons why a class might
    want to respond to an event in its own way, rather than having it dictated by
    some other class. If you follow the principle of separation of concerns, you will
    find it a lot easier to re-use classes and individual CCB files, within the same
    project and even in future projects.


    The result of your work can be seen in [Figure 7-13](#part0017.html#Fig13). Notice
    that the settings background image is transparent—that’s because the image has
    been designed to be slightly transparent. You could as well use a fully opaque
    background and then lower the opacity of the sprite. Same difference.


    ![9781484202630_Fig07-13.jpg](images/00107.jpeg)


    [Figure 7-13](#part0017.html#_Fig13). The Main Scene with background and Settings
    menu


    Persisting Game States


    Since you’ll want the app settings to persist across launches, and because you’ll
    soon need to persist other data such as unlocked levels, it’s time to introduce
    the GameState class that persists the game’s various states.


    Introducing the GameState Class


    The GameState class will be a wrapper for NSUserDefaults, in order to avoid injecting
    the same code with the same string keys all over the code. Just like NSUserDefaults,
    it will be a singleton class. A *singleton* is a class that can be instantiated
    only once.


    Did I hear you think, “Finally!”? Or was it “Eeww!?!”? I am aware that singletons
    are a hotly debated topic—some people even have extremely subjective opinions
    about it. Singletons are frequently overused and/or misused, and especially for
    beginning programmers they are tempting constructs since the global accessibility
    makes them super-simple workarounds for passing along data and references between
    objects.


    I just have one plea: before you use a singleton, make sure you have exhausted
    all other options or dismissed them as impractical. Only relatively few variables
    and methods need to be global.'
  trans: "\n以上就是按钮的 `CCB` 文件的全部内容。你应该打开 `SettingsLayer.ccb`，然后将 `CloseButton.ccb`\
    \ 拖放到 `settingsLayer` 节点上。将按钮拖拽并移动到 `S_bg` 背景图片右上角的位置（坐标 140x75），如图 7-12 所示。或者，如果你更希望将其对齐到角落，可以将位置类型更改为\
    \ `%`，并使用 `100, 100` 或稍小一点的值作为位置。\n\n![9781484202630_Fig07-12.jpg](img/00106.jpeg)\n\
    \n图 7-12：`SettingsLayer.ccb` 的最终版本\n\n在 Xcode 中，创建另一个 Objective-C 类，名称为 `CloseButton`，并将\
    \ `CCNode` 作为其父类。打开 `CloseButton.m` 文件，添加清单 7-6 中高亮显示的方法。\n\n清单 7-6：将 `CloseButton`\
    \ 消息转发到最近的父节点\n\n```objectivec\n#import \"CloseButton.h\"\n\n@implementation CloseButton\n\
    \n-(void) shouldClose\n{\n    CCNode* aParent = self.parent;\n\n    do\n    {\n\
    \        if ([aParent respondsToSelector:_cmd])\n        {\n            [aParent\
    \ performSelector:_cmd];\n            break;\n        }\n\n        aParent = aParent.parent;\n\
    \    }\n    while (aParent != nil);\n}\n\n@end\n```\n\n`shouldClose` 方法在进入 `do/while`\
    \ 循环之前获取按钮的父节点。它检查父节点是否响应 `_cmd` 选择器，该选择器指向 `shouldClose` 选择器。使用 `_cmd` 可以更轻松地将此代码应用于其他按钮——你无需更新代码以使用每个特定的选择器。事实上，这段代码强烈建议被添加到像\
    \ `SceneManager` 这样的类方法中，或者作为 `CCNode` 的类别方法。我将把这个留作你的练习。\n\n如果给定的父节点确实响应了相同的选择器，则会执行该选择器，并且循环在\
    \ `break` 语句处结束。否则，`aParent` 变量被设置为 `aParent` 的父节点，从而在节点层次结构中不断向上遍历，接近 `CCScene`\
    \ 实例。如果实际上在找到实现给定选择器的父节点之前就到达了 `CCScene` 实例，循环也会结束，因为场景的父节点保证为 `nil`。\n\n**提示**\
    \ 与之前使用 `performSelector` 的情况类似，你可以忽略“可能导致泄漏”的警告，因为该选择器不返回对象。（它返回 `void`。）\n\n\
    你可以使用 `[aParent performSelector:_cmd withObject:nil afterDelay:0]` 来消除警告。这告诉编译器设置一个定时器，该定时器在触发时执行选择器。当涉及到定时器时，选择器不可能有返回值；因此，编译器停止抱怨。如果选择器声明为不接受参数（如此例所示），则作为参数发送给选择器的无关\
    \ `nil` 对象将被忽略。但是，由于现在涉及到定时器，尽管延迟为 0，选择器不一定会当前帧渲染之前执行。因此，这可能会导致选择器运行前额外延迟一帧——尽管在关闭弹出窗口时这不会成为问题。\n\
    \n现在剩下的工作是在一个 `CCB` 的自定义类（该类是 `CloseButton.ccb` 的祖先）中实现相同的 `shouldClose` 方法。在这种情况下，我们不需要走得很远，`SettingsLayer`\
    \ 应该可以处理它。转到 `SettingsLayer.m`，在其实现中添加清单 7-7 中的方法。\n\n清单 7-7：`shouldClose` 选择器被转发到\
    \ `SettingsLayer` 实例\n\n```objectivec\n-(void) shouldClose\n{\n    [self removeFromParent];\n\
    \    [_mainMenuButtons show];\n}\n```\n\n那么，为什么不直接在 `CloseButton` 的 `shouldClose`\
    \ 方法中移除 `aParent` 呢？（参见清单 7-6。）\n\n**注意** 关注点分离是最基本的编程原则之一。关闭按钮应该通知并让实现留给受影响的类，而不是假定“关闭”意味着\
    \ `removeFromParent` 并且仅此而已——甚至不给被移除的节点机会去了解对它做了什么。那将是非常粗鲁的！更多关于关注点分离的信息，请参见 http://en.wikipedia.org/wiki/Separation_of_concerns。\n\
    \n同样，就像可以在清单 7-7 的 `SettingsLayer` 方法中设置 `_mainMenuButtons.visible` 状态一样，最好让 `MainMenuButtons`\
    \ 类以自己的方式处理它。因此，将清单 7-8 的方法声明添加到 `MainMenuButtons.h` 中。\n\n清单 7-8：声明 `show` 方法\n\
    \n```objectivec\n#import \"CCNode.h\"\n\n@interface MainMenuButtons : CCNode\n\
    \n-(void) show;\n\n@end\n```\n\n当然，还要将相应的 `show` 方法（清单 7-9）添加到 `MainMenuButtons.m`\
    \ 文件中。\n\n清单 7-9：`show` 实现\n\n```objectivec\n-(void) show\n{\n    self.visible\
    \ = YES;\n}\n```\n\n作为注释，我添加了一个关于在 `SettingsLayer` 关闭时可以做什么的建议，除了移除设置图层和显示按钮之外。如果两个\
    \ `CCB` 类都需要播放自己的时间轴动画，一个用于将 `SettingsLayer` 动画移出，另一个用于将 `MainMenuButtons` 动画移入，那该怎么办呢？\n\
    \n无论最终效果如何，它们都需要使用各自的 `animationManager` 实例来运行动画，并且 `SettingsLayer` 必须响应一个 `Callbacks`\
    \ 选择器，以便正确地永久移除自身。\n\n当然，播放动画只是类可能希望以自己的方式响应事件的众多原因之一，而不是由其他类来规定。如果你遵循关注点分离的原则，你会发现，在同一项目中甚至在未来项目中，重用类和单个\
    \ `CCB` 文件会容易得多。\n\n你的工作成果如图 7-13 所示。注意，设置背景图像是透明的——因为该图像被设计为轻微透明。你也可以使用完全不透明的背景，然后降低精灵的不透明度。效果是一样的。\n\
    \n![9781484202630_Fig07-13.jpg](img/00107.jpeg)\n\n图 7-13：包含背景和设置菜单的主场景\n\n##\
    \ 持久化游戏状态\n\n由于你希望应用设置能够在多次启动之间持久保存，并且你很快还需要持久化其他数据，例如解锁的关卡，因此是时候引入 `GameState`\
    \ 类了，它负责持久化游戏的各种状态。\n\n## 引入 GameState 类\n\n`GameState` 类将作为 `NSUserDefaults`\
    \ 的包装器，以避免在整个代码中注入带有相同字符串键的相同代码。与 `NSUserDefaults` 一样，它也将是一个单例类。*单例* 是一个只能实例化一次的类。\n\
    \n我听到你在想“终于来了！”吗？还是“呃！？！？” 我知道单例是一个备受争议的话题——有些人甚至对它有极其主观的看法。单例经常被过度使用和/或滥用，尤其对于初学者来说，它们是很诱人的结构，因为全局可访问性使它们成为在对象之间传递数据和引用的极其简单的变通方法。\n\
    \n我只有一个恳求：在使用单例之前，请确保你已经考虑并排除了所有其他选项。只有相对较少的变量和方法才需要是全局的。\n"
- fmt: "**Tip** For object references in particular, avoid having them at all in a\
    \ singleton class. Any property of type `id` or a concrete class pointer is referenced\
    \ strongly by default, preventing the object from deallocating. Since the singleton\
    \ itself will never (normally) deallocate during the runtime of the app, any object\
    \ reference retained by the singleton will also practically become a permanent\
    \ instance unless explicitly set to `nil`. And if you have to set a reference\
    \ to `nil` explicitly, you’re back to how programming was before ARC—that is,\
    \ manual reference counting (MRC) and manual memory management in general.\n\n\
    This said, in this particular case with the class being a wrapper for the already-singleton\
    \ class `NSUserDefaults`, the use of the `GameState` class is sound and justifiable.\
    \ So go ahead and create another Objective-C class in Xcode. You know the drill:\
    \ right-click the *Source* group, choose *New File*, and enter `GameState` as\
    \ the name, but make it a subclass of `NSObject` since singletons need not be,\
    \ nor should they ever be, `CCNode` subclasses.\n\nAfter creating the class, open\
    \ the `GameState.h` file and add the lines highlighted in [Listing 7-10](#part0017.html#list10).\n\
    \n[***Listing 7-10***](#part0017.html#_list10). Declaring the `GameState` methods\
    \ and properties\n\n```\n#import <Foundation/Foundation.h>\n\n@interface GameState\
    \ : NSObject\n\n+(GameState*) sharedGameState;\n\n@property CGFloat musicVolume;\n\
    @property CGFloat effectsVolume;\n\n@end\n```\n\nThe `sharedGameState` class is\
    \ prefixed with a `+`, which makes it a class method accessible from any other\
    \ class. It will return, and if necessary create, the single instance of the `GameState`\
    \ class. The properties will enable you to change and retrieve the volumes as\
    \ if they were properties of the class, when in fact they will run custom setter\
    \ and getter methods instead of referring to ivars.\n\nAdd the code in [Listing\
    \ 7-11](#part0017.html#list11) just below the `@implementation GameState` line\
    \ in the `GameState.m` file. This creates a single instance of the class if there\
    \ is no instance yet. It will then return the instance.\n\n[***Listing 7-11***](#part0017.html#_list11).\
    \ Creating a single instance of the class and returning it\n\n```\n+(GameState*)\
    \ sharedGameState\n{\n    static GameState* sharedInstance;\n    static dispatch_once_t\
    \ onceToken;\n\n    dispatch_once(&onceToken, ^{\n        sharedInstance = [[GameState\
    \ alloc] init];\n    });\n\n    return sharedInstance;\n}\n```\n\n**Note** This\
    \ version of creating and returning a singleton instance is compliant with ARC.\
    \ You may have seen Objective-C class singletons done differently on the Internet.\
    \ Those refer to outdated variants, typically predating ARC, which shouldn’t be\
    \ used and may not even work anymore.\n\nFirst, this method declares two static\
    \ (global) variables. Whether you place them inside the method definition or above\
    \ and outside doesn’t make a difference for static variables. If it bothers you\
    \ that they are declared inside the method because that makes them seem like local\
    \ variables, move them above the method definition. Either way is fine, and in\
    \ both cases both variables will be initialized to `0` (`nil`) by default because\
    \ they are declared static.\n\nThe `sharedInstance` stores the reference to the\
    \ single class instance, while the `onceToken` with its funny data type `dispatch_once_t`\
    \ is nothing else but an integer variable of type `long`.\n\nThe `dispatch_once`\
    \ method runs a block once and only once. The `&onceToken` means to take the address\
    \ of the `onceToken` variable; in other words, a pointer to `onceToken` is passed\
    \ in. Only if `onceToken` is `0` will the block run, and when `dispatch_once`\
    \ has run the block once, it will change `onceToken` to a non-zero value.\n\n\
    The block itself simply allocates and initializes an instance of the class via\
    \ the familiar `alloc/init` sequence and assigns the created instance to the static\
    \ `sharedInstance`, which retains the instance indefinitely. Any other time the\
    \ `sharedGameState` method runs, the block does not run again and the already\
    \ existing `sharedInstance` is returned.\n\nNow add the `musicVolume` property\
    \ setter and getter methods of [Listing 7-12](#part0017.html#list12) below the\
    \ `sharedGameState` method.\n\n[***Listing 7-12***](#part0017.html#_list12). The\
    \ `musicVolume` property setter and getter methods\n\n```\nstatic NSString* KeyForMusicVolume\
    \ = @\"musicVolume\";\n\n-(void) setMusicVolume:(CGFloat)volume\n{\n    [[NSUserDefaults\
    \ standardUserDefaults] setDouble:volume\n                                   \
    \           forKey:KeyForMusicVolume];\n}\n\n-(CGFloat) musicVolume\n{\n    NSNumber*\
    \ number = [[NSUserDefaults standardUserDefaults]\n                        objectForKey:KeyForMusicVolume];\n\
    \    return (number ? number.doubleValue : 1.0);\n}\n```\n\nThe `NSUserDefaults`\
    \ key is declared as a static `NSString*` variable so that you don’t have to write\
    \ the string twice. If you ever made a typo writing the same thing twice over,\
    \ you’ll understand the value of declaring frequently used strings as static variables.\n\
    \nProperty setter and getter methods follow a consistent naming scheme. The getter\
    \ has the same name as the property; the setter prefixes the property name with\
    \ `set`, and the property’s first letter is capitalized.\n\n`NSUserDefaults` is\
    \ the class that persists any integral data type and so-called property list objects:\
    \ `NSData`, `NSString`, `NSNumber`, `NSDate`, `NSArray`, or `NSDictionary`. So\
    \ it won’t save your custom class just like that. But you can save individual\
    \ properties of your classes, like the volumes here.\n\nThe `standardUserDefaults`\
    \ is a singleton accessor just like `sharedGameState`. The `setDouble:forKey:`\
    \ method stores a value of type `double` for the given key, which must be an `NSString*`\
    \ object. The same key is then used in `objectForKey:` to receive the `NSNumber`\
    \ object associated with that key. `NSUserDefaults` will always return integral\
    \ data types wrapped in `NSNumber` objects so that it can return `nil` to signal\
    \ that there’s no entry for the given key, which will be the case when you first\
    \ launch the app.\n\nThis fact is used in the return statement in the `?:` ternary\
    \ operator. It reads: if `number` is `nil`, return the statement after the question\
    \ mark (`number.doubleValue`); otherwise, return the statement after the colon\
    \ (`1.0`). So if `number` is `nil`, it just returns a safe default value—in this\
    \ case, the highest possible volume level of `1.0`. The parentheses are optional\
    \ and used only to enhance readability, to clarify that the result of the expression\
    \ is returned rather than `number`.\n\n**Note** The `CGFloat` type is defined\
    \ as `float` on 32-bit devices (for example, iPhone 5C) but is a `double` type\
    \ on 64-bit devices (such as iPhone 5S). It is good practice to use `setDouble:`\
    \ and `doubleValue` when the type involved is `CGFloat`. This prevents the value\
    \ from being truncated in `NSUserDefaults`. It is not an issue to store a `float`\
    \ value as `double`, nor is returning a `double` that will then be truncated to\
    \ `float`. In the same light, it is a best practice to always use `CGFloat` in\
    \ place of `float` and use `double` only if the type has to be `double` even on\
    \ 32-bit devices.\n\nWithout further ado, add the methods in [Listing 7-13](#part0017.html#list13)\
    \ to `GameState.m` just below the music volume methods. They are the equivalent\
    \ setter and getter methods for the `effectsVolume` property.\n\n[***Listing 7-13***](#part0017.html#_list13).\
    \ The equivalent setter and getter methods for the `effectsVolume` property\n\n\
    ```\nstatic NSString* KeyForEffectsVolume = @\"effectsVolume\";\n\n-(void) setEffectsVolume:(CGFloat)volume\n\
    {\n    [[NSUserDefaults standardUserDefaults] setDouble:volume\n             \
    \                                 forKey:KeyForEffectsVolume];\n}\n\n-(CGFloat)\
    \ effectsVolume\n{\n    NSNumber* number = [[NSUserDefaults standardUserDefaults]\n\
    \                        objectForKey:KeyForEffectsVolume];\n    return (number\
    \ ? number.doubleValue : 1.0);\n}\n```\n\nPersisting the Volume Slider Values\n\
    \nWith the `GameState` class in place, you can now connect the sliders with the\
    \ two volume properties in the `GameState` singleton to persist their values."
  raw: '**Tip**  For object references in particular, avoid having them at all in
    a singleton class. Any property of type id or a concrete class pointer is referenced
    strongly by default, preventing the object from deallocating. Since the singleton
    itself will never (normally) deallocate during the runtime of the app, any object
    reference retained by the singleton will also practically become a permanent instance
    unless explicitly set to nil. And if you have to set a reference to nil explicitly,
    you’re back to how programming was before ARC—that is, manual reference counting
    (MRC) and manual memory management in general.


    This said, in this particular case with the class being a wrapper for the already-singleton
    class NSUserDefaults, the use of the GameState class is sound and justifiable.
    So go ahead and create another Objective-C class in Xcode. You know the drill:
    right-click the *Source* group, choose *New File*, and enter ***GameState*** as
    the name, but make it a subclass of NSObject since singletons need not be, nor
    should they ever be, CCNode subclasses.


    After creating the class, open the *GameState.h* file and add the lines highlighted
    in [Listing 7-10](#part0017.html#list10).


    [***Listing 7-10***](#part0017.html#_list10). Declaring the GameState methods
    and properties


    ```

    #import <Foundation/Foundation.h>


    @interface GameState : NSObject


    +(GameState*) sharedGameState;


    @property CGFloat musicVolume;

    @property CGFloat effectsVolume;


    @end

    ```


    The sharedGameState class is prefixed with a +, which makes it a class method
    accessible from any other class. It will return, and if necessary create, the
    single instance of the GameState class. The properties will enable you to change
    and retrieve the volumes as if they were properties of the class, when in fact
    they will run custom setter and getter methods instead of referring to ivars.


    Add the code in [Listing 7-11](#part0017.html#list11) just below the @implementation
    GameState line in the *GameState.m* file. This creates a single instance of the
    class if there is no instance yet. It will then return the instance.


    [***Listing 7-11***](#part0017.html#_list11). Creating a single instance of the
    class and returning it


    ```

    +(GameState*) sharedGameState

    {

        static GameState* sharedInstance;

        static dispatch_once_t onceToken;


    dispatch_once(&onceToken, ^{

            sharedInstance = [[GameState alloc] init];

        });


    return sharedInstance;

    }

    ```


    **Note**  This version of creating and returning a singleton instance is compliant
    with ARC. You may have seen Objective-C class singletons done differently on the
    Internet. Those refer to outdated variants, typically predating ARC, which shouldn’t
    be used and may not even work anymore.


    First, this method declares two static (global) variables. Whether you place them
    inside the method definition or above and outside doesn’t make a difference for
    static variables. If it bothers you that they are declared inside the method because
    that makes them seem like local variables, move them above the method definition.
    Either way is fine, and in both cases both variables will be initialized to 0
    (nil) by default because they are declared static.


    The sharedInstance stores the reference to the single class instance, while the
    onceToken with its funny data type dispatch_once_t is nothing else but an integer
    variable of type long.


    The dispatch_once method runs a block once and only once. The &onceToken means
    to take the address of the onceToken variable; in other words, a pointer to onceToken
    is passed in. Only if onceToken is 0 will the block run, and when dispatch_once
    has run the block once, it will change onceToken to a non-zero value.


    The block itself simply allocates and initializes an instance of the class via
    the familiar alloc/init sequence and assigns the created instance to the static
    sharedInstance, which retains the instance indefinitely. Any other time the sharedGameState
    method runs, the block does not run again and the already existing sharedInstance
    is returned.


    Now add the musicVolume property setter and getter methods of [Listing 7-12](#part0017.html#list12)
    below the sharedGameState method.


    [***Listing 7-12***](#part0017.html#_list12). The musicVolume property setter
    and getter methods


    ```

    static NSString* KeyForMusicVolume = @"musicVolume";


    -(void) setMusicVolume:(CGFloat)volume

    {

        [[NSUserDefaults standardUserDefaults] setDouble:volume

                                                  forKey:KeyForMusicVolume];

    }


    -(CGFloat) musicVolume

    {

        NSNumber* number = [[NSUserDefaults standardUserDefaults]

                            objectForKey:KeyForMusicVolume];

        return (number ? number.doubleValue : 1.0);

    }

    ```


    The NSUserDefaults key is declared as a static NSString* variable so that you
    don’t have to write the string twice. If you ever made a typo writing the same
    thing twice over, you’ll understand the value of declaring frequently used strings
    as static variables.


    Property setter and getter methods follow a consistent naming scheme. The getter
    has the same name as the property; the setter prefixes the property name with
    set, and the property’s first letter is capitalized.


    NSUserDefaults is the class that persists any integral data type and so-called
    property list objects: NSData, NSString, NSNumber, NSDate, NSArray, or NSDictionary.
    So it won’t save your custom class just like that. But you can save individual
    properties of your classes, like the volumes here.


    The standardUserDefaults is a singleton accessor just like sharedGameState. The
    setDouble:forKey: method stores a value of type double for the given key, which
    must be an NSString* object. The same key is then used in objectForKey: to receive
    the NSNumber object associated with that key. NSUserDefaults will always return
    integral data types wrapped in NSNumber objects so that it can return nil to signal
    that there’s no entry for the given key, which will be the case when you first
    launch the app.


    This fact is used in the return statement in the ?: ternary operator. It reads:
    if number is nil, return the statement after the question mark (number.doubleValue);
    otherwise, return the statement after the colon (1.0). So if number is nil, it
    just returns a safe default value—in this case, the highest possible volume level
    of 1.0\. The parentheses are optional and used only to enhance readability, to
    clarify that the result of the expression is returned rather than number.


    **Note**  The CGFloat type is defined as float on 32-bit devices (for example,
    iPhone 5C) but is a double type on 64-bit devices (such as iPhone 5S). It is good
    practice to use setDouble: and doubleValue when the type involved is CGFloat.
    This prevents the value from being truncated in NSUserDefaults. It is not an issue
    to store a float value as double, nor is returning a double that will then be
    truncated to float. In the same light, it is a best practice to always use CGFloat
    in place of float and use double only if the type has to be double even on 32-bit
    devices.


    Without further ado, add the methods in [Listing 7-13](#part0017.html#list13)
    to *GameState.m* just below the music volume methods. They are the equivalent
    setter and getter methods for the effectsVolume property.


    [***Listing 7-13***](#part0017.html#_list13). The equivalent setter and getter
    methods for the effectsVolume property


    ```

    static NSString* KeyForEffectsVolume = @"effectsVolume";


    -(void) setEffectsVolume:(CGFloat)volume

    {

        [[NSUserDefaults standardUserDefaults] setDouble:volume

                                                  forKey:KeyForEffectsVolume];

    }


    -(CGFloat) effectsVolume

    {

        NSNumber* number = [[NSUserDefaults standardUserDefaults]

                            objectForKey:KeyForEffectsVolume];

        return (number ? number.doubleValue : 1.0);

    }

    ```


    Persisting the Volume Slider Values


    With the GameState class in place, you can now connect the sliders with the two
    volume properties in the GameState singleton to persist their values.'
  trans: "\n**提示** 特别针对对象引用，应避免在单例类中出现任何此类引用。任何类型为 `id` 或具体类指针的属性默认都会被强引用，从而阻止对象释放。由于单例本身在应用运行期间通常不会释放，因此单例所持有的任何对象引用实际上也会成为永久实例，除非显式将其设置为\
    \ `nil`。而如果你不得不显式将引用设置为 `nil`，那就又回到了 ARC 出现之前的编程方式——即手动引用计数（MRC）和一般的手动内存管理。\n\n\
    话虽如此，在本例中，该类作为已是单例的 `NSUserDefaults` 类的封装，使用 `GameState` 类是合理且有正当理由的。因此，继续在 Xcode\
    \ 中创建另一个 Objective-C 类吧。流程你应该很熟悉：右键点击 *Source* 组，选择 *New File*，然后输入名称 `GameState`，但将其设置为\
    \ `NSObject` 的子类，因为单例不需要也不应该是 `CCNode` 的子类。\n\n创建类后，打开 `GameState.h` 文件，添加 代码清单\
    \ 7-10 中高亮显示的行。\n\n***代码清单 7-10***。 声明 `GameState` 的方法和属性\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface GameState : NSObject\n\n+(GameState*) sharedGameState;\n\n@property\
    \ CGFloat musicVolume;\n@property CGFloat effectsVolume;\n\n@end\n```\n\n`sharedGameState`\
    \ 类以 `+` 前缀，这使其成为一个类方法，可从任何其他类访问。它将返回（并在必要时创建）`GameState` 类的单一实例。这些属性将使你能够像操作类的属性一样更改和获取音量值，而实际上它们将运行自定义的\
    \ setter 和 getter 方法，而非直接引用实例变量。\n\n在 `GameState.m` 文件中，将 代码清单 7-11 中的代码添加在 `@implementation\
    \ GameState` 行下方。这段代码会在没有实例时创建该类的单一实例，然后返回该实例。\n\n***代码清单 7-11***。 创建并返回类的单一实例\n\
    \n```\n+(GameState*) sharedGameState\n{\n    static GameState* sharedInstance;\n\
    \    static dispatch_once_t onceToken;\n\n    dispatch_once(&onceToken, ^{\n \
    \       sharedInstance = [[GameState alloc] init];\n    });\n\n    return sharedInstance;\n\
    }\n```\n\n**注意** 这种创建并返回单例实例的方式与 ARC 兼容。你或许曾在网上见过其他不同的 Objective-C 类单例实现方式。那些方式属于过时的变体，通常出现在\
    \ ARC 出现之前，不应再使用，甚至可能已无法正常运行。\n\n首先，此方法声明了两个静态（全局）变量。对于静态变量而言，将它们放在方法定义内部还是外部，效果并无区别。如果你介意它们声明在方法内部，从而看上去像是局部变量，可以将其移到方法定义之上。两种方式均可，且在两种情况下，这两个变量都会因被声明为\
    \ static 而被默认初始化为 `0`（`nil`）。\n\n`sharedInstance` 用于存储对单一类实例的引用，而 `onceToken`\
    \ 的数据类型 `dispatch_once_t` 看起来有些奇特，实际上不过是一个类型为 `long` 的整型变量。\n\n`dispatch_once`\
    \ 方法会运行一个代码块，且仅运行一次。`&onceToken` 表示获取 `onceToken` 变量的地址；换句话说，传入的是指向 `onceToken`\
    \ 的指针。只有当 `onceToken` 为 `0` 时，代码块才会运行；而当 `dispatch_once` 运行过一次代码块后，它会将 `onceToken`\
    \ 更改为非零值。\n\n该代码块本身仅通过熟悉的 `alloc/init` 序列来分配并初始化该类的一个实例，然后将创建的实例赋值给静态变量 `sharedInstance`，后者会无限期持有该实例。此后任何时候运行\
    \ `sharedGameState` 方法，该代码块都不会再次运行，而是直接返回已存在的 `sharedInstance`。\n\n现在，在 `sharedGameState`\
    \ 方法下方添加 代码清单 7-12 中 `musicVolume` 属性的 setter 和 getter 方法。\n\n***代码清单 7-12***。\
    \ `musicVolume` 属性的 setter 和 getter 方法\n\n```\nstatic NSString* KeyForMusicVolume\
    \ = @\"musicVolume\";\n\n-(void) setMusicVolume:(CGFloat)volume\n{\n    [[NSUserDefaults\
    \ standardUserDefaults] setDouble:volume\n                                   \
    \           forKey:KeyForMusicVolume];\n}\n\n-(CGFloat) musicVolume\n{\n    NSNumber*\
    \ number = [[NSUserDefaults standardUserDefaults]\n                        objectForKey:KeyForMusicVolume];\n\
    \    return (number ? number.doubleValue : 1.0);\n}\n```\n\n`NSUserDefaults` 的键被声明为静态\
    \ `NSString*` 变量，这样就不必重复编写该字符串两次。如果你曾因重复编写相同内容而出现拼写错误，就会理解将频繁使用的字符串声明为静态变量的价值。\n\
    \n属性的 setter 和 getter 方法遵循一致的命名规范。getter 方法与属性同名；setter 方法则以 `set` 作为属性名的前缀，且属性名的首字母大写。\n\
    \n`NSUserDefaults` 是一个用于持久化任何整数数据类型以及所谓的属性列表对象（即 `NSData`、`NSString`、`NSNumber`、`NSDate`、`NSArray`\
    \ 或 `NSDictionary`）的类。因此它无法直接保存你的自定义类。但你可以保存类的各个属性，比如这里的音量值。\n\n`standardUserDefaults`\
    \ 是一个单例访问器，与 `sharedGameState` 类似。`setDouble:forKey:` 方法为给定的键存储一个 `double` 类型的值，该键必须是一个\
    \ `NSString*` 对象。随后，使用相同的键通过 `objectForKey:` 获取与该键关联的 `NSNumber` 对象。`NSUserDefaults`\
    \ 始终会返回包装在 `NSNumber` 对象中的整数数据类型，这样它就可以通过返回 `nil` 来指示给定键没有对应的条目——这正是首次启动应用时的情况。\n\
    \n在 `?:` 三元运算符的返回语句中利用了这一点。其逻辑是：如果 `number` 为 `nil`，则返回问号后的语句（`number.doubleValue`）；否则返回冒号后的语句（`1.0`）。因此，如果\
    \ `number` 为 `nil`，它会直接返回一个安全的默认值——本例中为可能的最高音量值 `1.0`。括号是可选的，仅用于增强可读性，以明确返回的是整个表达式的结果，而非\
    \ `number` 本身。\n\n**注意** `CGFloat` 类型在 32 位设备（例如 iPhone 5C）上被定义为 `float`，但在 64\
    \ 位设备（例如 iPhone 5S）上则为 `double` 类型。当涉及的类型为 `CGFloat` 时，使用 `setDouble:` 和 `doubleValue`\
    \ 是良好的实践。这可以防止该值在 `NSUserDefaults` 中被截断。将 `float` 值存储为 `double` 没有问题，返回一个 `double`\
    \ 值（随后会被截断为 `float`）也没有问题。同理，最佳实践是始终使用 `CGFloat` 代替 `float`，并且仅在即使 32 位设备上也必须是\
    \ `double` 类型时才使用 `double`。\n\n闲话少叙，在 `GameState.m` 文件中，在音乐音量方法的下方添加 代码清单 7-13\
    \ 中的方法。它们是 `effectsVolume` 属性对应的 setter 和 getter 方法。\n\n***代码清单 7-13***。 `effectsVolume`\
    \ 属性对应的 setter 和 getter 方法\n\n```\nstatic NSString* KeyForEffectsVolume = @\"\
    effectsVolume\";\n\n-(void) setEffectsVolume:(CGFloat)volume\n{\n    [[NSUserDefaults\
    \ standardUserDefaults] setDouble:volume\n                                   \
    \           forKey:KeyForEffectsVolume];\n}\n\n-(CGFloat) effectsVolume\n{\n \
    \   NSNumber* number = [[NSUserDefaults standardUserDefaults]\n              \
    \          objectForKey:KeyForEffectsVolume];\n    return (number ? number.doubleValue\
    \ : 1.0);\n}\n```\n\n### 持久化滑块值\n\n有了 `GameState` 类，你现在可以将滑块与 `GameState` 单例中的两个音量属性连接起来，以持久化它们的值。\n"
- fmt: "# 排版后内容\n\nAdd the lines highlighted in [Listing 7-14](#part0017.html#list14)\
    \ to `SettingsLayer.m`.\n\n[***Listing 7-14***](#part0017.html#_list14). Connecting\
    \ the slider values with GameState properties\n\n```\n#import \"SettingsLayer.h\"\
    \n#import \"MainMenuButtons.h\"\n#import \"GameState.h\"\n\n@implementation SettingsLayer\n\
    {\n    __weak CCSlider* _musicSlider;\n    __weak CCSlider* _effectsSlider;\n\
    }\n\n-(void) didLoadFromCCB\n{\n    GameState* gameState = [GameState sharedGameState];\n\
    \    _musicSlider.sliderValue = gameState.musicVolume;\n    _effectsSlider.sliderValue\
    \ = gameState.effectsVolume;\n}\n\n-(void) volumeDidChange:(CCSlider*)sender\n\
    {\n    if (sender == _musicSlider)\n    {\n        [GameState sharedGameState].musicVolume\
    \ = _musicSlider.sliderValue;\n    }\n    else if (sender == _effectsSlider)\n\
    \    {\n        [GameState sharedGameState].effectsVolume = _effectsSlider.sliderValue;\n\
    \    }\n}\n\n-(void) shouldClose\n{\n    [[NSUserDefaults standardUserDefaults]\
    \ synchronize];\n    [self removeFromParent];\n    [_mainMenuButtons show];\n\
    }\n\n@end\n```\n\nIn `didLoadFromCCB`, the volume values are assigned to the slider\
    \ values. Coincidentally, both `sliderValue` and volumes use the same value range\
    \ between 0.0 and 1.0. Initially, the `GameState` volumes will return 1.0, which\
    \ will position both volume slider handles to the far right. Whenever the `volumeDidChange:`\
    \ method runs, the received `sender` is compared with the existing ivars in order\
    \ to determine whether it was the music or the effects volume that changed. In\
    \ both cases, the corresponding `GameState` property is assigned the current `sliderValue`.\n\
    \nThe `shouldClose` method now also calls the `NSUserDefaults` method `synchronize`\
    \ to ensure the data in `GameState` is persisted to disk when the settings popover\
    \ is closed. This is just a precaution. `NSUserDefaults` does synchronize its\
    \ data periodically, but it may not do so soon enough if the app were to crash\
    \ shortly after closing the settings popover—or if you hit the stop button in\
    \ Xcode.\n\n**Note** You certainly should not call `synchronize` every time an\
    \ `NSUserDefaults` value changes, because disk access is a comparatively slow\
    \ operation. And like I said before about separation of concerns: should a developer\
    \ really concern himself with the fact that synchronizing `NSUserDefaults` is\
    \ required to write the values in `GameState` to disk? You can certainly improve\
    \ this by adding a corresponding `synchronize` method to `GameState` and call\
    \ that instead.\n\nIf you run the project now and open the settings menu, you’ll\
    \ notice the slider handles start out at the far right. Drag the slider handles,\
    \ close the settings popover, and then quit the app or hit the stop button in\
    \ Xcode.\n\nYou can then relaunch the app from Xcode, and you’ll see the slider\
    \ positions (and thus their values) will have been persisted. You can also try\
    \ hitting the stop button in Xcode while the settings popover is still open, and\
    \ any changes to the sliders will most likely have been reverted to their previous\
    \ state on the next relaunch.\n\n**Note** Connecting the volume sliders with actual\
    \ audio volumes will be done in the upcoming audio chapter.\n\n## Summary\n\n\
    You now have a nicely animated main menu with a functional settings menu. The\
    \ volume values are persistently stored by the `GameState` class, which will be\
    \ enhanced in the next chapter to store unlocked levels as well.\n\nYou also learned\
    \ about structuring code in the process, as well as how to turn any node into\
    \ a button and how to forward button events to classes that actually need to handle\
    \ the event.\n\nYou can find the current state of the project in the `08 - Main\
    \ Menu and Settings` folder.\n\n## Chapter 8: Selecting and Unlocking Levels\n\
    \nFor this game, you will want to give users a way to select which level they\
    \ want to start with. Since the levels are separated into different worlds, you’ll\
    \ use a *Scroll View* node to allow the user to swipe between worlds.\n\nIn addition,\
    \ you’ll want a flexible way to add more levels while keeping track of which levels\
    \ the player has already unlocked. The `GameState` class will help in that area.\n\
    \nOf course, you’ll have to add additional-level CCB files. You’ll be adding several\
    \ dummy levels that you can then update with your own graphics and actual gameplay\
    \ as you please. You’ll even learn how to count the level files currently in the\
    \ app.\n\nMoreover, and this completes the various menus, you’ll add a level-completion\
    \ popover that will allow the user to play along with the next level.\n\n### Adding\
    \ the Content Node\n\nYou’ll start by designing the *Scroll View*’s *Content*\
    \ node. The *Content* node is a container whose content will be scrolled. In this\
    \ case, you’ll want to design each world’s level-selection screen as an individual\
    \ page, and later enable pagination in the *Scroll View* node so that each world\
    \ menu will be centered on the screen after every swipe gesture. This behavior\
    \ is similar to flipping through photos in the iOS photo album.\n\nIn a scrolling\
    \ view, the *Content* node’s content size determines the size of the scrollable\
    \ area. The *Scroll View*’s content size determines the area where the user can\
    \ touch and drag. It also determines the bounds for the *Content* node. The *Content*\
    \ node’s edges are constrained to the edges defined by the *Scroll View*’s position\
    \ and content size.\n\n**Note** The content will still be drawn outside the *Scroll\
    \ View*’s boundaries. If you need the content to draw only within the *Scroll\
    \ View*’s area, you would have to draw a sprite over it that acts as a frame.\
    \ Or you could add the *Scroll View* to a `CCClippingNode` programmatically.\n\
    \nThe setup of pagination-enabled content requires you to consider that the *Scroll\
    \ View* automatically determines the number of pages based on the ratio of the\
    \ *Scroll View* size in relation to the *Content* node size.\n\nFor example, if\
    \ you wanted five individual, horizontally scrolling pages that are each 100 points\
    \ in width, the width of the *Scroll View* must be 100 and the total size of the\
    \ *Content* node must be 500. That’s assuming the pages have no margin. With margins\
    \ between individual pages, you also have to consider the size of the margin and\
    \ live with the fact that any added margins causes the individual pages to slowly\
    \ shift their snap positions as you scroll further. The *Scroll View* then behaves\
    \ as if the first page were left-aligned while the last page is right-aligned.\n\
    \nSo here we go. Create a new CCB file in the `UserInterface` folder, and name\
    \ this document `MainMenuLevelSelect.ccb`. The CCB type must be set to *Node*\
    \ before you create the CCB document. Select the root node, and on the *Item Properties*\
    \ tab, set the content size types to `%`. Since you’ll add three pages to the\
    \ *Scroll View* and only horizontal scrolling will be allowed, you have to set\
    \ the content size to 300% width and 100% height. This will make the *Scroll View*’s\
    \ *Content* node three times as large as the *Scroll View*’s size, no matter what\
    \ the size of the *Scroll View* will be.\n\nYou should also name the root node\
    \ `levelSelect` so that a reference to it can be obtained easily. On the *Item\
    \ Code Connections* tab, you need to set a custom class by the name of `MainMenuLevelSelect`.\
    \ This class will later receive the button events. It will also handle highlighting\
    \ the levels that have already been unlocked.\n\nOn to adding content. On the\
    \ *Tileless Editor View*, make sure that the `UserInterface` Sprite Sheet is checked\
    \ at the bottom. You should see a number of images starting with an uppercase\
    \ `W` followed by a digit. These are the world-specific, level-selection images.\
    \ The ones named `W1_bg`, `W2_bg`, and so on are the background images defining\
    \ a page visually. Drag and drop one of each—you should add three in total. All\
    \ three images are 411x290 points in size. You will see the importance of this\
    \ shortly."
  raw: 'Add the lines highlighted in [Listing 7-14](#part0017.html#list14) to *SettingsLayer.m*.


    [***Listing 7-14***](#part0017.html#_list14). Connecting the slider values with
    GameState properties


    ```

    #import "SettingsLayer.h"

    #import "MainMenuButtons.h"

    #import "GameState.h"


    @implementation SettingsLayer

    {

        __weak CCSlider* _musicSlider;

        __weak CCSlider* _effectsSlider;

    }


    -(void) didLoadFromCCB

    {

        GameState* gameState = [GameState sharedGameState];

        _musicSlider.sliderValue = gameState.musicVolume;

        _effectsSlider.sliderValue = gameState.effectsVolume;

    }


    -(void) volumeDidChange:(CCSlider*)sender

    {

        if (sender == _musicSlider)

        {

            [GameState sharedGameState].musicVolume = _musicSlider.sliderValue;

        }

        else if (sender == _effectsSlider)

        {

            [GameState sharedGameState].effectsVolume = _effectsSlider.sliderValue;

        }

    }


    -(void) shouldClose

    {

        [[NSUserDefaults standardUserDefaults] synchronize];

        [self removeFromParent];

        [_mainMenuButtons show];

    }


    @end

    ```


    In didLoadFromCCB, the volume values are assigned to the slider values. Coincidentally,
    both sliderValue and volumes use the same value range between 0.0 and 1.0\. Initially,
    the GameState volumes will return 1.0, which will position both volume slider
    handles to the far right. Whenever the volumeDidChange: method runs, the received
    sender is compared with the existing ivars in order to determine whether it was
    the music or the effects volume that changed. In both cases, the corresponding
    GameState property is assigned the current sliderValue.


    The shouldClose method now also calls the NSUserDefaults method synchronize to
    ensure the data in GameState is persisted to disk when the settings popover is
    closed. This is just a precaution. NSUserDefaults does synchronize its data periodically,
    but it may not do so soon enough if the app were to crash shortly after closing
    the settings popover—or if you hit the stop button in Xcode.


    **Note**  You certainly should not call synchronize every time an NSUserDefaults
    value changes, because disk access is a comparatively slow operation. And like
    I said before about separation of concerns: should a developer really concern
    himself with the fact that synchronizing NSUserDefaults is required to write the
    values in GameState to disk? You can certainly improve this by adding a corresponding
    synchronize method to GameState and call that instead.


    If you run the project now and open the settings menu, you’ll notice the slider
    handles start out at the far right. Drag the slider handles, close the settings
    popover, and then quit the app or hit the stop button in Xcode.


    You can then relaunch the app from Xcode, and you’ll see the slider positions
    (and thus their values) will have been persisted. You can also try hitting the
    stop button in Xcode while the settings popover is still open, and any changes
    to the sliders will most likely have been reverted to their previous state on
    the next relaunch.


    **Note**  Connecting the volume sliders with actual audio volumes will be done
    in the upcoming audio chapter.


    Summary


    You now have a nicely animated main menu with a functional settings menu. The
    volume values are persistently stored by the GameState class, which will be enhanced
    in the next chapter to store unlocked levels as well.


    You also learned about structuring code in the process, as well as how to turn
    any node into a button and how to forward button events to classes that actually
    need to handle the event.


    You can find the current state of the project in the *08 - Main Menu and Settings*
    folder.


    Chapter    8


    Selecting and Unlocking Levels


    For this game, you will want to give users a way to select which level they want
    to start with. Since the levels are separated into different worlds, you’ll use
    a *Scroll View* node to allow the user to swipe between worlds.


    In addition, you’ll want a flexible way to add more levels while keeping track
    of which levels the player has already unlocked. The GameState class will help
    in that area.


    Of course, you’ll have to add additional-level CCB files. You’ll be adding several
    dummy levels that you can then update with your own graphics and actual gameplay
    as you please. You’ll even learn how to count the level files currently in the
    app.


    Moreover, and this completes the various menus, you’ll add a level-completion
    popover that will allow the user to play along with the next level.


    Adding the Content Node


    You’ll start by designing the *Scroll View*’s *Content* node. The *Content* node
    is a container whose content will be scrolled. In this case, you’ll want to design
    each world’s level-selection screen as an individual page, and later enable pagination
    in the *Scroll View* node so that each world menu will be centered on the screen
    after every swipe gesture. This behavior is similar to flipping through photos
    in the iOS photo album.


    In a scrolling view, the *Content* node’s content size determines the size of
    the scrollable area. The *Scroll View*’s content size determines the area where
    the user can touch and drag. It also determines the bounds for the *Content* node.
    The *Content* node’s edges are constrained to the edges defined by the *Scroll
    View*’s position and content size.


    **Note**  The content will still be drawn outside the *Scroll View*’s boundaries.
    If you need the content to draw only within the *Scroll View*’s area, you would
    have to draw a sprite over it that acts as a frame. Or you could add the *Scroll
    View* to a CCClippingNode programmatically.


    The setup of pagination-enabled content requires you to consider that the *Scroll
    View* automatically determines the number of pages based on the ratio of the *Scroll
    View* size in relation to the *Content* node size.


    For example, if you wanted five individual, horizontally scrolling pages that
    are each 100 points in width, the width of the *Scroll View* must be 100 and the
    total size of the *Content* node must be 500\. That’s assuming the pages have
    no margin. With margins between individual pages, you also have to consider the
    size of the margin and live with the fact that any added margins causes the individual
    pages to slowly shift their snap positions as you scroll further. The *Scroll
    View* then behaves as if the first page were left-aligned while the last page
    is right-aligned.


    So here we go. Create a new CCB file in the *UserInterface* folder, and name this
    document ***MainMenuLevelSelect.ccb***. The CCB type must be set to *Node* before
    you create the CCB document. Select the root node, and on the *Item Properties*
    tab, set the content size types to %. Since you’ll add three pages to the *Scroll
    View* and only horizontal scrolling will be allowed, you have to set the content
    size to 300% width and 100% height. This will make the *Scroll View*’s *Content*
    node three times as large as the *Scroll View*’s size, no matter what the size
    of the *Scroll View* will be.


    You should also name the root node levelSelect so that a reference to it can be
    obtained easily. On the *Item Code Connections* tab, you need to set a custom
    class by the name of MainMenuLevelSelect. This class will later receive the button
    events. It will also handle highlighting the levels that have already been unlocked.


    On to adding content. On the *Tileless Editor View*, make sure that the *UserInterface*
    Sprite Sheet is checked at the bottom. You should see a number of images starting
    with an uppercase W followed by a digit. These are the world-specific, level-selection
    images. The ones named *W1_bg*, *W2_bg*, and so on are the background images defining
    a page visually. Drag and drop one of each—you should add three in total. All
    three images are 411x290 points in size. You will see the importance of this shortly.'
  trans: "\n# 排版后内容\n\n将代码清单 7-14 中高亮显示的代码行添加到 `SettingsLayer.m` 中。\n\n***代码清单 7-14***.\
