    \ = NO;\n    [_mainMenuButtons show];\n}\n```\n\n`Content`节点的父实例是`Scroll View`。所以只需将父节点的`visible`状态设置为`NO`，然后让`MainMenuButtons`节点显示自身。\n\
    \n### 加载关卡\n\n剩下的工作是注册每个关卡的按钮按下事件，并测试该关卡是否已解锁。如果已解锁，则加载关卡；否则，嗯，也许以后可以播放一个轻蔑的音效。\n\
    \n将`代码清单 8-10`中的方法添加到`MainMenuLevelSelect.m`中的`shouldClose`方法下方。\n\n***代码清单 8-10***.\
    \ 加载关卡……或者不加载\n\n```\n-(void) shouldLoadLevel:(CCButton*)sender\n{\n    GameState*\
    \ gameState = [GameState sharedGameState];\n\nint levelNumber = sender.name.intValue;\n\
    \    if (levelNumber <= gameState.highestUnlockedLevel)\n    {\n        gameState.currentLevel\
    \ = levelNumber;\n        [SceneManager presentGameScene];\n    }\n    else\n\
    \    {\n        // maybe play a 'access denied' sound effect here\n    }\n}\n\
    ```\n\n和之前一样，按钮的`name`属性通过`NSString`的`intValue`属性转换为`int`。唯一的区别是按钮作为`sender`对象传递给该方法。因此，根据用户点击的是哪个关卡按钮，`sender`将是实际被点击的按钮。\n\
    \n如果从按钮`name`获取的`levelNumber`小于或等于`highestUnlockedLevel`，用户即可游玩该特定关卡。此时，`GameState`单例的`currentLevel`属性被更新，以便在`SceneManager`中随时可用。`SceneManager`随后呈现当前关卡的`GameScene`——这是一个您稍后将更新的方法。如果用户点击了一个当前被锁定的关卡按钮，`shouldLoadLevel:`方法会直接忽略该请求。\n\
    \n现在打开`SceneManager.m`。首先导入`GameScene`和`GameState`的头文件。将它们添加到文件顶部其他`import`行所在的位置。参见`代码清单\
    \ 8-11`。\n\n***代码清单 8-11***. 导入`GameScene`头文件\n\n```\n#import \"SceneManager.h\"\
    \n#import \"GameScene.h\"\n#import \"GameState.h\"\n```\n\n找到`presentGameScene`方法。将其内容替换为`代码清单\
    \ 8-12`。\n\n***代码清单 8-12***. 呈现`GameScene`并加载当前关卡\n\n```\n+(void) presentGameScene\n\
    {\n    CCScene* scene = [CCBReader loadAsScene:@\"GameScene\"];\n    GameScene*\
    \ gameScene = (GameScene*)scene.children.firstObject;\n\nint levelNumber = [GameState\
    \ sharedGameState].currentLevel;\n    NSString* level = [NSString stringWithFormat:@\"\
    Levels/Level%i\",\n                       levelNumber];\n    [gameScene loadLevelNamed:level];\n\
    \nid t = [CCTransition transitionPushWithDirection:CCTransitionDirectionLeft\n\
    \                                            duration:1.0];\n    [[CCDirector\
    \ sharedDirector] presentScene:scene withTransition:t];\n}\n```\n\n`GameScene`像往常一样，使用`CCBReader`的`loadAsScene:`方法加载。我之前提到过，但值得再次指出：`loadAsScene:`方法返回一个通用的`CCScene`对象，其唯一子节点始终是所加载`CCB`文件的根节点。在这种情况下，它是`GameScene`类的一个实例。\n\
    \n然后，当前关卡编号被转换为格式为`Levels/Level%i`的字符串。例如，对于第一关，结果字符串将是`Levels/Level1`；对于第 2,345\
    \ 关，将是`Levels/Level2345`。\n\n**提示**：开发人员仍然经常用额外的零填充文件名，以应对一场早已取胜的战役：数字排序。如果您想通过补零来格式化编号项——例如`Level0001`——因为您可能有上千个关卡，请不要这样做！现代操作系统已经充分意识到了数字排序问题。您不会再看到以`Level1\
    \ - Level10 - Level2`这种特定顺序排序的编号文件。同时，`Level%i`这个字符串格式化代码适用于从一到无穷大的所有数字。考虑补零只会使每个格式字符串变得比实际需要更复杂。\n\
    \n有了对`GameScene`实例的引用，您可以向其发送`loadLevelNamed:`方法，并传入生成的关卡字符串。您应该在呈现场景之前执行此操作，以便场景在渲染之前已完全准备好。`loadLevelNamed:`方法与您之前使用过的方法相同，只是您之前没有从其他类中使用过它。为防止编译器抱怨缺少选择器声明，您必须打开`GameScene.h`并添加声明，如`代码清单\
    \ 8-13`所示。\n\n***代码清单 8-13***. 声明`loadLevelNamed:`选择器\n\n```\n#import \"CCNode.h\"\
    \n\n@interface GameScene : CCNode <CCPhysicsCollisionDelegate,\n             \
    \                  CCBAnimationManagerDelegate>\n\n-(void) showPopoverNamed:(NSString*)popoverName;\n\
    -(void) removePopover;\n\n-(void) loadLevelNamed:(NSString*)levelCCB;\n\n@end\n\
    ```"
- fmt: "在`GameScene.m`中，你现在应该从`didLoadFromCCB`方法中移除`[self loadLevelNamed:nil];`这一行。\n\
    \n虽然现在可以成功加载第一关，但这是个谬误。毕竟，第一关已经被`GameScene.ccb`引用了，但你并没有加载传递给`loadLevelNamed:`方法的特定关卡。你现在应该通过更新`GameScene.m`中的`loadLevelNamed:`方法来改变这一点。如[清单8-14](#part0018.html#list14)所示，所有新行都位于该方法的顶部。\n\
    \n[***清单8-14***](#part0018.html#_list14)：实际的关卡加载过程\n\n```objectivec\n-(void) loadLevelNamed:(NSString*)levelCCB\n\
    {\n    [_levelNode removeFromParent];\n\n    CCNode* level = [CCBReader load:levelCCB];\n\
    \    [self addChild:level];\n\n    _levelNode = level;\n\n    _physicsNode = (CCPhysicsNode*)[_levelNode\
    \ getChildByName:@\"physics\"\n                                              \
    \    recursively:NO];\n    _physicsNode.debugDraw = _drawPhysicsShapes;\n    _physicsNode.collisionDelegate\
    \ = self;\n\n    _backgroundNode = [_levelNode getChildByName:@\"background\"\
    \ recursively:NO];\n    _playerNode = [_physicsNode getChildByName:@\"player\"\
    \ recursively:YES];\n\n    [self scrollToTarget:_playerNode];\n}\n```\n\n`_levelNode`是对当前引用`Level1.ccb`的子文件节点的引用。加载关卡应该首先移除现有的关卡。然后`CCBReader`加载最初由`MainMenuLevelSelect.m`中的`shouldLoadLevel:`方法生成的`levelCCB`字符串。接着，该关卡作为子节点添加到`GameScene`。\n\
    \n最后，`_levelNode`引用被新的关卡替换。请注意，因为`_levelNode`是一个`__weak`引用，你不能直接将`CCBReader load:`返回的节点赋值给它。它很可能会被Objective-C运行时设置为`nil`，因为此时直到下一行（将其添加为子节点）之前，没有对该关卡节点的强引用。\n\
    \n如果你现在运行此程序，按Play，然后点击第一关按钮，你应该会像之前一样进入`GameScene`并加载第一关。或者，等等。现在没有暂停按钮了。\n\n\
    我真是糊涂了。我完全忘了一件事。看看[图8-8](#part0018.html#Fig8)。\n\n![9781484202630_Fig08-08.jpg](images/00115.jpeg)\n\
    \n[图8-8](#part0018.html#_Fig8)：`GameScene.ccb`中的默认节点顺序\n\n到目前为止，`GameScene`一直依赖SpriteBuilder中节点的排序来决定绘制顺序。关卡内容（`_levelNode`）首先绘制，然后`GameMenuLayer`绘制在关卡之上。\n\
    \n然而，现在你正在移除`_levelNode`，加载一个新的，并将其作为子节点添加到`GameScene`。添加节点会将其放在列表的末尾；因此，绘制顺序现在颠倒过来了，你再也看不到暂停按钮了。\n\
    \n要修复此问题，请将[清单8-15](#part0018.html#list15)中的`addChild:`行替换为[清单8-15](#part0018.html#list15)中的那一行。\n\
    \n[***清单8-15***](#part0018.html#_list15)：修复绘制顺序\n\n```objectivec\nlevel.zOrder\
    \ = -1;\n[self addChild:level];\n```\n\n`zOrder`属性决定了节点的绘制顺序。具有较低`zOrder`的节点在具有较高`zOrder`的节点之前绘制，但前提是它们具有相同的父节点。具有相同`zOrder`的节点按照它们添加到父节点的顺序绘制。请注意，前面的代码可以简化为一行：\n\
    \n```objectivec\n[self addChild:level z:-1];\n```\n\n现在加载关卡可以工作了！但你想证明吗？好吧，无论如何，还有一件事需要考虑：现在`GameScene`在`GameScene.ccb`文件中引用了`Level1.ccb`。所以当你加载`GameScene`时，它实际上会同时加载`Level1.ccb`，然后将其替换为你选择加载的任何关卡的另一个新实例。这有点低效，连续加载两个关卡，并让它们同时存在于内存中。\n\
    \n### 添加一个虚拟关卡\n\n要解决这个问题，进入SpriteBuilder，右键点击`Levels`文件夹。选择`New File`，并将其命名为`DummyLevel.ccb`。将其类型设置为`Node`，然后点击`Create`。就这样。你只需要一个空的CCB。\n\
    \n现在打开`GameScene.ccb`，选择关卡内容节点。在`Item Properties`标签页中，点击`CCB File`下拉菜单。选择新创建的`Levels/DummyLevel.ccb`作为子文件节点的引用。现在`GameScene`除了左上角的暂停按钮外将是空的。\n\
    \n**注意**：如果`GameScene`仍然包含一个改变场景的按钮，你应该将其移除，因为它不再需要。\n\n你现在应该发布、构建并运行应用程序。点击播放，并加载第一关。这应该会显示带有第一关的`GameScene`。这证明了关卡加载正确；如果没有加载，`GameScene`将是一个黑屏，上面只有暂停按钮。\n\
    \n### 通关关卡\n\n如果你玩通关并到达出口会发生什么？没错，视图会重置到左下角，你就卡住了。是时候修复这个问题并在此时解锁下一关了。\n\n在SpriteBuilder中，右键点击`UserInterface/Popovers`文件夹以添加一个新文件。将文档命名为`LevelCompleteLayer.ccb`，并在创建前将其类型设置为`Layer`。然后将根节点的内容尺寸类型改为`%`，值改为`100x100`。接着切换到`Item\
    \ Code Connections`标签页，并输入`GameMenuLayer`作为类名。这是你的共同弹出层类，供其他游戏内弹出层共享。\n\n你需要一个背景图片、标签和按钮。从`Tileless\
    \ Editor View`的`UserInterface`部分，将任何以`_bg`结尾的图片拖到舞台上。例如，我使用了`W2_bg`。将背景精灵的位置类型改为`%`，值改为`50x50`，然后完成。\n\
    \n接着切换到`Node Library View`，将一个标签TTF节点拖到背景精灵上，使标签成为精灵的子节点。将标签的位置类型改为`%`，值改为`50x66`。将标签的标题设置为表示关卡完成的内容——例如，“Level\
    \ Complete”听起来不错。你可以随意以任何方式更改标签。\n\n最后，从`Node Library View`添加一个按钮，并将其放到背景精灵上，也使其成为子节点。将按钮的位置类型改为`%`，值改为`50x30`。首选尺寸为`170x50`会稍微放大按钮图像。按钮的标题应为`Next\
    \ Level`或类似内容。此外，将`Normal State`和`Highlighted State`的`spriteFrame`都改为`SpriteSheets/UserInterface/P_resume.png`，并将`Highlighted\
    \ State`的`Background`和`Label`颜色都改为浅灰色（`#999999`），以便在按钮按下时提供视觉反馈。\n\n别忘了在`Item\
    \ Code Connections`上设置选择器，并在`Selector`字段中输入`shouldLoadNextLevel`。这样就完成了如图[图8-9](#part0018.html#Fig9)所示的极简化的通关弹出层。\n\
    \n![9781484202630_Fig08-09.jpg](images/00116.jpeg)\n\n[图8-9](#part0018.html#_Fig9)：通关：一切都很棒\n\
    \n**提示**：如果你想使此弹出层更完整，考虑向其添加重试和退出按钮。毕竟，该弹出层使用与其他弹出层相同的`GameMenuLayer`类，所以只需将按钮的选择器连接到`shouldRestartGame`和`shouldExitGame`即可。\n\
    \n回到Xcode。你需要在玩家与出口对象碰撞时显示此弹出层。打开`GameScene.m`，通过在[清单8-16](#part0018.html#list16)中的其他导入行下方添加高亮显示的行来导入`GameState`头文件。\n\
    \n[***清单8-16***](#part0018.html#_list16)：导入`GameState`头文件\n\n```objectivec\n#import\
    \ \"GameScene.h\"\n#import \"Trigger.h\"\n#import \"GameMenuLayer.h\"\n#import\
    \ \"GameState.h\"\n```"
  raw: 'In *GameScene.m*, you should now remove the line [self loadLevelNamed:nil];
    from the didLoadFromCCB method.


    Although this will now successfully load the first level, it’s a fallacy. After
    all, the first level is already referenced by the GameScene.ccb, yet you aren’t
    loading the particular level passed in to the loadLevelNamed: method. You should
    change that now by updating the loadLevelNamed: method in *GameScene.m*. As highlighted
    by [Listing 8-14](#part0018.html#list14), all the new lines are at the top of
    the method.


    [***Listing 8-14***](#part0018.html#_list14). The actual level-loading procedure


    ```

    -(void) loadLevelNamed:(NSString*)levelCCB

    {

        [_levelNode removeFromParent];


    CCNode* level = [CCBReader load:levelCCB];

        [self addChild:level];


    _levelNode = level;


    _physicsNode = (CCPhysicsNode*)[_levelNode getChildByName:@"physics"

                                                      recursively:NO];

        _physicsNode.debugDraw = _drawPhysicsShapes;

        _physicsNode.collisionDelegate = self;


    _backgroundNode = [_levelNode getChildByName:@"background" recursively:NO];

        _playerNode = [_physicsNode getChildByName:@"player" recursively:YES];


    [self scrollToTarget:_playerNode];

    }

    ```


    The _levelNode is the reference to the *Sub File* node currently referencing Level1.ccb.
    Loading a level should first remove the existing level. Then CCBReader loads the
    levelCCB string originally generated by the shouldLoadLevel: method in *MainMenuLevelSelect.m*.
    The level is then added as a child to the GameScene.


    Finally, the _levelNode reference is replaced by the new level. Note that because
    _levelNode is a __weak reference, you couldn’t assign the node returned from CCBReader
    load: directly to it. It would likely be set to nil by the Objective-C runtime
    because at that point there would be no strong reference to the level node until
    the next line, where it is added as a child.


    If you run this now, press Play, and then tap the first-level button, you should
    enter the GameScene with the first level loaded as before. Or wait. There’s no
    pause button anymore.


    Silly me. I totally forgot one thing. Take a look at [Figure 8-8](#part0018.html#Fig8).


    ![9781484202630_Fig08-08.jpg](images/00115.jpeg)


    [Figure 8-8](#part0018.html#_Fig8). The default node order in GameScene.ccb


    So far, the GameScene has relied on the ordering of nodes in SpriteBuilder to
    determine the draw order. The level content (_levelNode) is drawn first, and then
    the GameMenuLayer is drawn on top of the level.


    However, now you are removing the _levelNode, loading a new one, and adding it
    as a child node to the GameScene. Adding a node will always put it at the end
    of the list; therefore, the draw order is now reversed, and you can no longer
    see the pause button.


    To fix this, replace the addChild: line of [Listing 8-15](#part0018.html#list15)
    with the one in [Listing 8-15](#part0018.html#list15).


    [***Listing 8-15***](#part0018.html#_list15). Fixing the draw order


    ```

    level.zOrder = -1;

    [self addChild:level];

    ```


    The zOrder property determines the node’s draw order. Nodes with a lower zOrder
    are drawn before nodes with a higher zOrder, but only if they have the same parent.
    Nodes with the same zOrder are drawn in the order they were added to the parent.
    Note that the preceding code can be shortened to a single line:


    ```

    [self addChild:level z:-1];

    ```


    Now loading levels works! But you want proof? Okay, there’s one thing to consider,
    anyway: right now the GameScene references the *Level1.ccb* in the *GameScene.ccb*
    file. So when you load the GameScene, it will actually load the *Level1.ccb* along
    with it, and then replace it with a newly loaded instance of whatever level you
    chose to load. That’s kind of inefficient, having two levels loaded one after
    the other and having both in memory at the same time.


    Adding a Dummy Level


    To fix this, go into SpriteBuilder and right-click the *Levels* folder. Select
    *New File*, and name it ***DummyLevel.ccb***. Set its type to *Node*, and click
    *Create*. That’s all. You just need an empty CCB.


    Now open the *GameScene.ccb*, and select the level *Content* node. On the *Item
    Properties* tab, click the *CCB File* drop-down menu. Select the newly created
    *Levels/DummyLevel.ccb* as the *Sub File* node’s reference. The GameScene will
    be empty now except for the pause button in the upper left corner.


    **Note**  If GameScene still contains a button that changes scenes, you should
    remove it, because it is no longer needed.


    You should now publish, build, and run the app. Tap play, and load the first level.
    This should present the GameScene with the first level. This proves that the level
    was loaded correctly; if it hadn’t been, the GameScene would have been a black
    screen with just the pause button on it.


    Winning Levels


    What happens if you play through the level and reach the exit? That’s right, the
    view resets to the lower left corner and you’re stuck. It’s time to fix that and
    unlock the next level at that point.


    In SpriteBuilder, right-click the *UserInterface/Popovers* folder to add a *New
    File*. Name the document ***LevelCompleteLayer.ccb***, and set its type to *Layer*
    before creating it. Then change the root node’s content size types to % and values
    to 100x100\. Then switch to the *Item Code Connections* tab, and enter GameMenuLayer
    as the class name. That’s your collective popover class shared by the other in-game
    popover layers.


    You need a background image, label, and button. From the *UserInterface* section
    in the *Tileless Editor View*, drag any image that ends in *_bg* onto the stage.
    For instance, I used *W2_bg*. Change the background sprite’s position types to
    % and its values to 50x50 and you’re done with it.


    Then switch to the *Node Library View*, and drag a *Label TTF* node onto the background
    sprite so that the label becomes a child of the sprite. Change the label’s position
    types to % and its values to 50x66\. Set the label’s *Title* to something that
    indicates level completeness—for instance, “Level Complete” sounds fine. Feel
    free to change the label in any way you like.


    Last, add a *Button* from the *Node Library View* and drop this onto the background
    sprite, also making it a child. Change the button’s position types to % and its
    values to 50x30\. A preferred size of 170x50 enlarges the button image slightly.
    The button’s *Title* should read *Next Level* or something similar. Also, change
    the *SpriteFrame* of both *Normal State* and *Highlighted State* to *SpriteSheets/UserInterface/P_resume.png*,
    and change both *Background* and *Label* color of *Highlighted State* to a light
    gray (*#999999*) for visual feedback when the button is pressed.


    Don’t forget to set the selector on the *Item Code Connections*, and enter **shouldLoadNextLevel**
    in the *Selector* field. That completes the wonderfully minimalistic *Level Complet*e
    popover seen in [Figure 8-9](#part0018.html#Fig9).


    ![9781484202630_Fig08-09.jpg](images/00116.jpeg)


    [Figure 8-9](#part0018.html#_Fig9). Level complete: Everything is awesome


    **Tip**  If you want to make this popover more complete, consider adding retry
    and exit buttons to it. After all, the popover uses the same GameMenuLayer class
    as the other popovers, so it’s only a matter of connecting the button’s selectors
    to shouldRestartGame and shouldExitGame.


    Back to Xcode. You’ll want to show this popover when the player collides with
    the exit object. Open *GameScene.m*, and import the GameState header by adding
    the highlighted line in [Listing 8-16](#part0018.html#list16) just below the other
    import lines.


    [***Listing 8-16***](#part0018.html#_list16). Importing the GameState header


    ```

    #import "GameScene.h"

    #import "Trigger.h"

    #import "GameMenuLayer.h"

    #import "GameState.h"

    ```'
  trans: "\n在`GameScene.m`中，你现在应该从`didLoadFromCCB`方法中移除`[self loadLevelNamed:nil];`这一行。\n\
    \n虽然现在可以成功加载第一关，但这只是个谬误。毕竟，第一关已经被`GameScene.ccb`引用了，但你并没有加载传递给`loadLevelNamed:`方法的特定关卡。你现在应该通过更新`GameScene.m`中的`loadLevelNamed:`方法来改变这一点。如清单\
    \ 8-14 所示，所有新行都位于该方法的顶部。\n\n***清单 8-14***：实际的关卡加载过程\n\n```objectivec\n-(void)\
    \ loadLevelNamed:(NSString*)levelCCB\n{\n    [_levelNode removeFromParent];\n\n\
    \    CCNode* level = [CCBReader load:levelCCB];\n    [self addChild:level];\n\n\
    \    _levelNode = level;\n\n    _physicsNode = (CCPhysicsNode*)[_levelNode getChildByName:@\"\
    physics\"\n                                                  recursively:NO];\n\
    \    _physicsNode.debugDraw = _drawPhysicsShapes;\n    _physicsNode.collisionDelegate\
    \ = self;\n\n    _backgroundNode = [_levelNode getChildByName:@\"background\"\
    \ recursively:NO];\n    _playerNode = [_physicsNode getChildByName:@\"player\"\
    \ recursively:YES];\n\n    [self scrollToTarget:_playerNode];\n}\n```\n\n`_levelNode`是对当前引用`Level1.ccb`的子文件节点的引用。加载关卡应该首先移除现有的关卡。然后`CCBReader`加载最初由`MainMenuLevelSelect.m`中的`shouldLoadLevel:`方法生成的`levelCCB`字符串。接着，该关卡作为子节点添加到`GameScene`。\n\
    \n最后，`_levelNode`引用被新的关卡替换。请注意，因为`_levelNode`是一个`__weak`引用，你不能直接将`CCBReader load:`返回的节点赋值给它。它很可能会被\
    \ Objective-C 运行时设置为`nil`，因为此时直到下一行（将其添加为子节点）之前，没有对该关卡节点的强引用。\n\n如果你现在运行此程序，按下\
    \ Play 键，然后点击第一关按钮，你应该会像之前一样进入`GameScene`并加载第一关。或者，等等。现在没有暂停按钮了。\n\n我真是糊涂了。我完全忘了一件事。看看图\
    \ 8-8。\n\n![9781484202630_Fig08-08.jpg](img/00115.jpeg)\n\n图 8-8：`GameScene.ccb`中的默认节点顺序\n\
    \n到目前为止，`GameScene`一直依赖 SpriteBuilder 中节点的排序来决定绘制顺序。关卡内容（`_levelNode`）首先绘制，然后`GameMenuLayer`绘制在关卡之上。\n\
    \n然而，现在你正在移除`_levelNode`，加载一个新的，并将其作为子节点添加到`GameScene`。添加节点会将其放在列表的末尾；因此，绘制顺序现在颠倒过来了，你再也看不到暂停按钮了。\n\
    \n要修复此问题，请将清单 8-15 中的`addChild:`行替换为清单 8-15 中的那一行。\n\n***清单 8-15***：修复绘制顺序\n\n\
    ```objectivec\nlevel.zOrder = -1;\n[self addChild:level];\n```\n\n`zOrder`属性决定了节点的绘制顺序。具有较低`zOrder`的节点在具有较高`zOrder`的节点之前绘制，但前提是它们具有相同的父节点。具有相同`zOrder`的节点按照它们添加到父节点的顺序绘制。请注意，前面的代码可以简化为一行：\n\
    \n```objectivec\n[self addChild:level z:-1];\n```\n\n现在加载关卡可以工作了！但你想证明这一点吗？好吧，无论如何，还有一件事需要考虑：现在`GameScene`在`GameScene.ccb`文件中引用了`Level1.ccb`。所以当你加载`GameScene`时，它实际上会同时加载`Level1.ccb`，然后将其替换为你选择加载的任何关卡的另一个新实例。这有点低效，因为连续加载了两个关卡，并让它们同时存在于内存中。\n\
    \n### 添加一个虚拟关卡\n\n要解决这个问题，进入 SpriteBuilder，右键点击`Levels`文件夹。选择`New File`，并将其命名为`DummyLevel.ccb`。将其类型设置为`Node`，然后点击`Create`。就这样。你只需要一个空的\
    \ CCB。\n\n现在打开`GameScene.ccb`，选择关卡内容节点。在`Item Properties`标签页中，点击`CCB File`下拉菜单。选择新创建的`Levels/DummyLevel.ccb`作为子文件节点的引用。现在`GameScene`除了左上角的暂停按钮外将是空的。\n\
    \n**注意**：如果`GameScene`仍然包含一个改变场景的按钮，你应该将其移除，因为它不再需要。\n\n你现在应该发布、构建并运行应用程序。点击播放，并加载第一关。这应该会显示带有第一关的`GameScene`。这证明了关卡加载正确；如果没有加载，`GameScene`将是一个黑屏，上面只有暂停按钮。\n\
    \n### 通关关卡\n\n如果你玩通关并到达出口会发生什么？没错，视图会重置到左下角，你就卡住了。是时候修复这个问题并在此时解锁下一关了。\n\n在 SpriteBuilder\
    \ 中，右键点击`UserInterface/Popovers`文件夹以添加一个新文件。将文档命名为`LevelCompleteLayer.ccb`，并在创建前将其类型设置为`Layer`。然后将根节点的内容尺寸类型改为`%`，值改为`100x100`。接着切换到`Item\
    \ Code Connections`标签页，并输入`GameMenuLayer`作为类名。这是你的共同弹出层类，供其他游戏内弹出层共享。\n\n你需要一个背景图片、标签和按钮。从`Tileless\
    \ Editor View`的`UserInterface`部分，将任何以`_bg`结尾的图片拖到舞台上。例如，我使用了`W2_bg`。将背景精灵的位置类型改为`%`，值改为`50x50`，然后完成。\n\
    \n接着切换到`Node Library View`，将一个标签 TTF 节点拖到背景精灵上，使标签成为精灵的子节点。将标签的位置类型改为`%`，值改为`50x66`。将标签的标题设置为表示关卡完成的内容——例如，“Level\
    \ Complete”听起来不错。你可以随意以任何方式更改标签。\n\n最后，从`Node Library View`添加一个按钮，并将其放到背景精灵上，也使其成为子节点。将按钮的位置类型改为`%`，值改为`50x30`。首选尺寸为`170x50`会稍微放大按钮图像。按钮的标题应为`Next\
    \ Level`或类似内容。此外，将`Normal State`和`Highlighted State`的`spriteFrame`都改为`SpriteSheets/UserInterface/P_resume.png`，并将`Highlighted\
    \ State`的`Background`和`Label`颜色都改为浅灰色（`#999999`），以便在按钮按下时提供视觉反馈。\n\n别忘了在`Item\
    \ Code Connections`上设置选择器，并在`Selector`字段中输入`shouldLoadNextLevel`。这样就完成了如图图 8-9\
    \ 所示的极简化的通关弹出层。\n\n![9781484202630_Fig08-09.jpg](img/00116.jpeg)\n\n图 8-9：通关：一切都很棒\n\
    \n**提示**：如果你想使此弹出层更完整，考虑向其添加重试和退出按钮。毕竟，该弹出层使用与其他弹出层相同的`GameMenuLayer`类，所以只需将按钮的选择器连接到`shouldRestartGame`和`shouldExitGame`即可。\n\
    \n回到 Xcode。你需要在玩家与出口对象碰撞时显示此弹出层。打开`GameScene.m`，通过在清单 8-16 中的其他导入行下方添加高亮显示的行来导入`GameState`头文件。\n\
    \n***清单 8-16***：导入`GameState`头文件\n\n```objectivec\n#import \"GameScene.h\"\n#import\
    \ \"Trigger.h\"\n#import \"GameMenuLayer.h\"\n#import \"GameState.h\"\n```\n"
- fmt: "Then locate the physics collision method with `player` and `exit` as parameters,\
    \ and replace it with the version in [Listing 8-17](#part0018.html#list17).\n\n\
    [**Listing 8-17**](#part0018.html#_list17). Colliding with the exit object shows\
    \ the Level Complete popover and unlocks the next level\n\n```\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \          exit:(CCNode *)exit\n{\n    [[GameState sharedGameState] unlockNextLevel];\n\
    \    [[GameState sharedGameState] synchronize];\n\n    [self showPopoverNamed:@\"\
    UserInterface/Popovers/LevelCompleteLayer\"];\n\n    return NO;\n}\n```\n\nThis\
    \ unlocks the next level. Thanks to the checks performed in [Listing 8-6](#part0018.html#list6)\
    \ and [Listing 8-7](#part0018.html#list7), you can call this method every time\
    \ a level is completed. Even if you are replaying level 1 again, it won’t reset\
    \ the highest unlocked level back to level 2. The `GameState` is synchronized,\
    \ and the changes are written back to disk because you really don’t want the player\
    \ losing an unlocked level even if the app were to crash a second later.\n\nNote\
    \ that the `synchronize` method may or may not be defined, depending on whether\
    \ you followed my earlier advice to add it to `GameState`. If it is undefined,\
    \ you can add it to `GameState.h` and `GameState.m` now or just replace the call\
    \ to `synchronize` with the following line:\n\n```\n[[NSUserDefaults standardUserDefaults]\
    \ synchronize];\n```\n\nIt’s the same thing. And, of course, the `LevelCompleteLayer`\
    \ is shown as a popup.\n\nWhich brings you to the `GameMenuLayer` class already.\
    \ In `GameMenuLayer.m`, add an import for the `GameState` header just below the\
    \ other import lines, as seen in [Listing 8-18](#part0018.html#list18).\n\n[**Listing\
    \ 8-18**](#part0018.html#_list18). Adding the `GameState` header\n\n```\n#import\
    \ \"GameMenuLayer.h\"\n#import \"GameScene.h\"\n#import \"SceneManager.h\"\n#import\
    \ \"GameState.h\"\n```\n\nYou then just need to add the selector shown in [Listing\
    \ 8-19](#part0018.html#list19). Add it just above the `@end` line.\n\n[**Listing\
    \ 8-19**](#part0018.html#_list19). Loading the next level\n\n```\n-(void) shouldLoadNextLevel\n\
    {\n    [GameState sharedGameState].currentLevel += 1;\n    [SceneManager presentGameScene];\n\
    }\n```\n\nThis should be pretty straightforward. The current level is increased\
    \ by one because the player is going to the next level. The `presentGameScene`\
    \ method then presents a new `GameScene` instance and instructs the instance to\
    \ load the current level.\n\nThis is pretty much it. However, you don’t have any\
    \ additional levels yet. But you can still try one thing: play the first level\
    \ and reach the exit. Confirm that the Level Complete popover is shown, and then\
    \ tap the *Next Level* button. Doing this will most certainly cause a crash because\
    \ there’s simply no `Level2.ccb` in your project yet. But if you relaunch the\
    \ app and tap the play button you should notice that the Level 2 button is no\
    \ longer grayed out. So, in principle, the unlocking part works.\n\n**Tip**  If\
    \ you ever need to reset the highest unlocked level, just delete the app from\
    \ the device and simulator. This will also delete all items stored by the app,\
    \ including its User Defaults dictionary.\n\n## Adding More Levels\n\nThere’s\
    \ a shortcut to adding more levels. Open Finder, and locate the `LearnSpriteBuilder.spritebuilder`\
    \ project folder. Inside that folder, you’ll find the `Packages/SpriteBuilder\
    \ Resources.sbpack` folder, which contains all the files SpriteBuilder shows in\
    \ its *File View*. Therefore, if you move into the `Levels` folder, you’ll find\
    \ your `Level1.ccb` and `DummyLevel.ccb` files, among others.\n\n**Note**  The\
    \ `*.sbpack` folder is a so-called *package* and looks like a file rather than\
    \ a folder. Finder allows you to browse into package contents by right-clicking\
    \ the package and then selecting *Show Package Contents* from the context menu.\n\
    \nYou can then just duplicate the `Level1.ccb` (by copying and pasting) eight\
    \ more times and rename the copies so that they are called `Level2.ccb`, `Level3.ccb`,\
    \ and so on, up to `Level9.ccb`.\n\nThis won’t make the game very interesting\
    \ to play through, but at least you can confirm that it works technically. Don’t\
    \ forget to publish it in SpriteBuilder before you try it out.\n\nYou can then\
    \ start modifying each duplicated level as you see fit. If you prefer to start\
    \ each level from scratch, here’s a checklist of things that a level has to have\
    \ in order to function technically:\n\n- Create a CCB using the `Level#.ccb` naming\
    \ scheme. The CCB must be of type *Layer*.\n- The CCB’s root node defines the\
    \ level’s size. The default level size is 4000x500.\n- Optionally, add a parallaxing\
    \ background—for instance, `Background1.ccb`.\n- Add a Physics Node whose name\
    \ property must be set to `\"physics\"`.\n- Add one `Player.ccb` prefab instance\
    \ to the *Physics* node. The player’s name property must be set to `\"player\"\
    `.\n- Add an `Exit.ccb` prefab instance to the *Physics* node.\n\nYou may want\
    \ to consider adding special code for the very last level. Obviously, it can’t\
    \ load another level yet. So in the collision delegate method with the `player`\
    \ and `exit` parameters, check if `currentLevel` is equal to or greater than the\
    \ `GameState` level count. You will have to create a `levelCount` property in\
    \ `GameState` with a custom property getter that just returns a constant value.\n\
    \nThe alternative would be to not have an exit in the last level, and instead\
    \ add a different type of exit that runs a different kind of physics collision\
    \ delegate method. That way, you can most easily handle this special case and\
    \ present a Game Won popover.\n\n### Counting Level Files\n\nSince the number\
    \ of levels is hardly ever predetermined in a game, you may be wondering if you\
    \ couldn’t just count the levels? Well yes, you can!\n\nYou would have to count\
    \ the number of `Level#.ccbi` files in the bundle’s `Published-iOS/Levels` directory.\
    \ Adding [Listing 8-20](#part0018.html#list20) to `GameState.m` (just above `@end`)\
    \ is entirely optional. Take note, however, that if you do add it, unlocking more\
    \ levels will work only if you have consecutively named `Level#.ccb` files in\
    \ SpriteBuilder.\n\n[**Listing 8-20**](#part0018.html#_list20). Counting the levels\
    \ in the game\n\n```\n-(int) levelCount\n{\n    NSBundle* mainBundle = [NSBundle\
    \ mainBundle];\n    NSString* path;\n    int count = 0;\n\n    do\n    {\n   \
    \     count++;\n        NSString* level = [NSString stringWithFormat:@\"Level%i\"\
    , count];\n        path = [mainBundle pathForResource:level\n                \
    \                    ofType:@\"ccbi\"\n                               inDirectory:@\"\
    Published-iOS/Levels\"];\n    } while (path != nil);\n\n    count--;\n    return\
    \ count;\n}\n```\n\nThis `do/while` loop starts counting with one, generating\
    \ a level string `\"Level1\"`. This is passed into the `pathForResource` method\
    \ of the `NSBundle` class. It doesn’t look for a file directly; rather, it requires\
    \ you to pass in the individual path components: file name, extension (here, called\
    \ *type*) and path (*directory*). The file name is `\"Level1\"`. The extension\
    \ is `\"ccbi\"` because published CCB files are converted to the binary `ccbi`\
    \ format. And the directory is `\"Published-iOS/Levels\"`. Therefore, it will\
    \ look for the file `\"Published-iOS/Levels/Level1.ccbi\"` in the root of the\
    \ bundle.\n\n**Note**  A *bundle*, which is sometimes called a *package*, is just\
    \ a folder structure that OS X and iOS treat like a single file. Every app is\
    \ a bundle, and you can peek inside its contents in OS X if you right-click an\
    \ `.app` file and select *Show Package Contents*."
  raw: 'Then locate the physics collision method with player and exit as parameters,
    and replace it with the version in [Listing 8-17](#part0018.html#list17).


    [***Listing 8-17***](#part0018.html#_list17). Colliding with the exit object shows
    the Level Complete popover and unlocks the next level


    ```

    -(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair *)pair

                             player:(CCNode *)player

                               exit:(CCNode *)exit

    {

        [[GameState sharedGameState] unlockNextLevel];

        [[GameState sharedGameState] synchronize];


    [self showPopoverNamed:@"UserInterface/Popovers/LevelCompleteLayer"];


    return NO;

    }

    ```


    This unlocks the next level. Thanks to the checks performed in [Listing 8-6](#part0018.html#list6)
    and [Listing 8-7](#part0018.html#list7), you can call this method every time a
    level is completed. Even if you are replaying level 1 again, it won’t reset the
    highest unlocked level back to level 2\. The GameState is synchronized, and the
    changes are written back to disk because you really don’t want the player losing
    an unlocked level even if the app were to crash a second later.


    Note that the synchronize method may or may not be defined, depending on whether
    you followed my earlier advice to add it to GameState. If it is undefined, you
    can add it to *GameState.h* and *GameState.m* now or just replace the call to
    synchronize with the following line:


    ```

    [[NSUserDefaults standardUserDefaults] synchronize];

    ```


    It’s the same thing. And, of course, the LevelCompleteLayer is shown as a popup.


    Which brings you to the GameMenuLayer class already. In GameMenuLayer.m, add an
    import for the GameState header just below the other import lines, as seen in
    [Listing 8-18](#part0018.html#list18).


    [***Listing 8-18***](#part0018.html#_list18). Adding the GameState header


    ```

    #import "GameMenuLayer.h"

    #import "GameScene.h"

    #import "SceneManager.h"

    #import "GameState.h"

    ```


    You then just need to add the selector shown in [Listing 8-19](#part0018.html#list19).
    Add it just above the @end line.


    [***Listing 8-19***](#part0018.html#_list19). Loading the next level


    ```

    -(void) shouldLoadNextLevel

    {

        [GameState sharedGameState].currentLevel += 1;

        [SceneManager presentGameScene];

    }

    ```


    This should be pretty straightforward. The current level is increased by one because
    the player is going to the next level. The presentGameScene method then presents
    a new GameScene instance and instructs the instance to load the current level.


    This is pretty much it. However, you don’t have any additional levels yet. But
    you can still try one thing: play the first level and reach the exit. Confirm
    that the Level Complete popover is shown, and then tap the *Next Level* button.
    Doing this will most certainly cause a crash because there’s simply no *Level2.ccb*
    in your project yet. But if you relaunch the app and tap the play button you should
    notice that the Level 2 button is no longer grayed out. So, in principle, the
    unlocking part works.


    **Tip**  If you ever need to reset the highest unlocked level, just delete the
    app from the device and simulator. This will also delete all items stored by the
    app, including its User Defaults dictionary.


    Adding More Levels


    There’s a shortcut to adding more levels. Open Finder, and locate the *LearnSpriteBuilder.spritebuilder*
    project folder. Inside that folder, you’ll find the *Packages/SpriteBuilder Resources.sbpack*
    folder, which contains all the files SpriteBuilder shows in its *File View*. Therefore,
    if you move into the *Levels* folder, you’ll find your *Level1.ccb* and *DummyLevel.ccb*
    files, among others.


    **Note**  The *.sbpack* folder is a so-called *package* and looks like a file
    rather than a folder. Finder allows you to browse into package contents by right-clicking
    the package and then selecting *Show Package Contents* from the context menu.


    You can then just duplicate the *Level1.ccb* (by copying and pasting) eight more
    times and rename the copies so that they are called *Level2.ccb*, *Level3.ccb*,
    and so on, up to *Level9.ccb*.


    This won’t make the game very interesting to play through, but at least you can
    confirm that it works technically. Don’t forget to publish it in SpriteBuilder
    before you try it out.


    You can then start modifying each duplicated level as you see fit. If you prefer
    to start each level from scratch, here’s a checklist of things that a level has
    to have in order to function technically:


    *   Create a CCB using the *Level#.ccb* naming scheme. The CCB must be of type
    *Layer*.

    *   The CCB’s root node defines the level’s size. The default level size is 4000x500.

    *   Optionally, add a parallaxing background—for instance, *Background1.ccb*.

    *   Add a Physics Node whose name property must be set to “physics.”

    *   Add one *Player.ccb* prefab instance to the *Physics* node. The player’s name
    property must be set to “player.”

    *   Add an *Exit.ccb* prefab instance to the *Physics* node.


    You may want to consider adding special code for the very last level. Obviously,
    it can’t load another level yet. So in the collision delegate method with the
    player and exit parameters, check if currentLevel is equal to or greater than
    the GameState level count. You will have to create a levelCount property in GameState
    with a custom property getter that just returns a constant value.


    The alternative would be to not have an exit in the last level, and instead add
    a different type of exit that runs a different kind of physics collision delegate
    method. That way, you can most easily handle this special case and present a Game
    Won popover.


    Counting Level Files


    Since the number of levels is hardly ever predetermined in a game, you may be
    wondering if you couldn’t just count the levels? Well yes, you can!


    You would have to count the number of *Level#.ccbi* files in the bundle’s *Published-iOS/Levels*
    directory. Adding [Listing 8-20](#part0018.html#list20) to *GameState.m* (just
    above @end) is entirely optional. Take note, however, that if you do add it, unlocking
    more levels will work only if you have consecutively named *Level#.ccb* files
    in SpriteBuilder.


    [***Listing 8-20***](#part0018.html#_list20). Counting the levels in the game


    ```

    -(int) levelCount

    {

        NSBundle* mainBundle = [NSBundle mainBundle];

        NSString* path;

        int count = 0;


    do

        {

            count++;

            NSString* level = [NSString stringWithFormat:@"Level%i", count];

            path = [mainBundle pathForResource:level

                                        ofType:@"ccbi"

                                   inDirectory:@"Published-iOS/Levels"];

        } while (path != nil);


    count--;

        return count;

    }

    ```


    This do/while loop starts counting with one, generating a level string "Level1".
    This is passed into the pathForResource method of the NSBundle class. It doesn’t
    look for a file directly; rather, it requires you to pass in the individual path
    components: file name, extension (here, called *type*) and path (*directory*).
    The file name is "Level1". The extension is “*ccbi*” because published CCB files
    are converted to the binary *ccbi* format. And the directory is “ "Published-iOS/Levels".
    Therefore, it will look for the file "Published-iOS/Levels/Level1.ccbi" in the
    root of the bundle.


    **Note**  A *bundle*, which is sometimes called a *package*, is just a folder
    structure that OS X and iOS treat like a single file. Every app is a bundle, and
    you can peek inside its contents in OS X if you right-click an .app file and select
    *Show Package Contents*.'
  trans: "\n接下来，找到以 `player` 和 `exit` 为参数的物理碰撞方法，并将其替换为代码清单 8-17 中的版本。\n\n**代码清单 8-17**.\
    \ 与出口对象碰撞时显示关卡完成弹窗并解锁下一关\n\n```\n-(BOOL) ccPhysicsCollisionBegin:(CCPhysicsCollisionPair\
    \ *)pair\n                         player:(CCNode *)player\n                 \
    \          exit:(CCNode *)exit\n{\n    [[GameState sharedGameState] unlockNextLevel];\n\
    \    [[GameState sharedGameState] synchronize];\n\n    [self showPopoverNamed:@\"\
    UserInterface/Popovers/LevelCompleteLayer\"];\n\n    return NO;\n}\n```\n\n这样就能解锁下一关。得益于代码清单\
    \ 8-6 和代码清单 8-7 中执行的检查，你可以在每次完成关卡时调用此方法。即使你重玩第一关，它也不会将已解锁的最高关卡重置回第二关。`GameState`\
    \ 会被同步，更改也会写回磁盘——因为你绝对不希望玩家即使在一秒后应用崩溃的情况下丢失已解锁的关卡。\n\n请注意，`synchronize` 方法可能已定义也可能未定义，具体取决于你是否按照我之前的建议将其添加到\
    \ `GameState` 中。如果该方法未定义，你现在可以将其添加到 `GameState.h` 和 `GameState.m` 中，或者直接将调用 `synchronize`\
    \ 的代码替换为以下行：\n\n```\n[[NSUserDefaults standardUserDefaults] synchronize];\n```\n\
    \n这两者是等效的。当然，`LevelCompleteLayer` 会以弹窗形式显示。\n\n这样一来，你已经接触到了 `GameMenuLayer` 类。在\
    \ `GameMenuLayer.m` 中，在其他 import 行下方添加一条针对 `GameState` 头文件的 import，如代码清单 8-18\
    \ 所示。\n\n**代码清单 8-18**. 添加 `GameState` 头文件\n\n```\n#import \"GameMenuLayer.h\"\
    \n#import \"GameScene.h\"\n#import \"SceneManager.h\"\n#import \"GameState.h\"\
    \n```\n\n接着，你只需要添加代码清单 8-19 中所示的选择器。将其添加在 `@end` 行上方即可。\n\n**代码清单 8-19**. 加载下一关\n\
    \n```\n-(void) shouldLoadNextLevel\n{\n    [GameState sharedGameState].currentLevel\
    \ += 1;\n    [SceneManager presentGameScene];\n}\n```\n\n这应该相当直白。当前关卡数加一，因为玩家要进入下一关。然后\
    \ `presentGameScene` 方法会呈现一个新的 `GameScene` 实例，并指示该实例加载当前关卡。\n\n大致就是这样。不过，你目前还没有任何额外的关卡。但你仍然可以尝试一件事：玩第一关并到达出口。确认关卡完成弹窗显示后，点击\
    \ *Next Level* 按钮。这样做几乎肯定会引发崩溃，因为你的项目中根本就没有 `Level2.ccb`。但如果你重新启动应用并点击播放按钮，应该会注意到第二关按钮不再呈灰色。因此，解锁功能在原理上是可行的。\n\
    \n**提示** 如果你需要重置已解锁的最高关卡，只需从设备或模拟器中删除该应用。这也会删除应用存储的所有项目，包括其用户默认设置字典。\n\n## 添加更多关卡\n\
    \n添加更多关卡有一个快捷方式。打开 Finder，找到 `LearnSpriteBuilder.spritebuilder` 项目文件夹。在该文件夹内，你会找到\
    \ `Packages/SpriteBuilder Resources.sbpack` 文件夹，里面包含 SpriteBuilder 在 *File View*\
    \ 中显示的所有文件。因此，如果你进入 `Levels` 文件夹，就能找到你的 `Level1.ccb` 和 `DummyLevel.ccb` 等文件。\n\
    \n**注意** `*.sbpack` 文件夹是一个所谓的*包*(package)，它看起来像一个文件而不是文件夹。Finder 允许你通过右键单击该包，然后从上下文菜单中选择\
    \ *Show Package Contents* 来浏览包内的内容。\n\n然后，你可以将 `Level1.ccb` 再复制八份（通过复制粘贴），并将副本重命名为\
    \ `Level2.ccb`、`Level3.ccb`，以此类推，直到 `Level9.ccb`。\n\n这样虽然不会让游戏变得很有趣，但至少你可以从技术上确认它能正常工作。在尝试之前，别忘了在\
    \ SpriteBuilder 中发布它。\n\n之后，你可以根据自己的需要修改每个复制的关卡。如果你希望从头开始创建每个关卡，以下是关卡在技术上必须满足的要素清单：\n\
    \n-   使用 `Level#.ccb` 命名方案创建一个 CCB 文件。该 CCB 的文件类型必须是 *Layer*。\n-   CCB 的根节点定义了关卡的大小。默认关卡大小为\
    \ 4000x500。\n-   可选地，添加一个视差滚动背景——例如 `Background1.ccb`。\n-   添加一个物理节点，其 name 属性必须设置为\
    \ `\"physics\"`。\n-   在 *Physics* 节点中添加一个 `Player.ccb` 预制体实例。玩家的 name 属性必须设置为\
    \ `\"player\"`。\n-   在 *Physics* 节点中添加一个 `Exit.ccb` 预制体实例。\n\n你可能需要考虑为最后一关添加特殊代码。显然，它还不能加载另一关。因此，在带有\
    \ `player` 和 `exit` 参数的碰撞委托方法中，检查 `currentLevel` 是否等于或大于 `GameState` 的关卡计数。你需要在\
    \ `GameState` 中创建一个 `levelCount` 属性，并提供一个返回常量值的自定义属性 getter 方法。\n\n另一种方法是在最后一关不设置出口，而是添加一种不同类型的出口，该出口会运行另一种物理碰撞委托方法。这样，你可以更轻松地处理这种特殊情况，并显示一个游戏胜利的弹窗。\n\
    \n### 统计关卡文件数量\n\n由于游戏中的关卡数量几乎从未事先确定，你可能想知道是否可以直接统计关卡数量？答案是肯定的，可以！\n\n你需要统计 bundle\
    \ 中 `Published-iOS/Levels` 目录下的 `Level#.ccbi` 文件数量。将代码清单 8-20 添加到 `GameState.m`\
    \ 中（放在 `@end` 之上）完全是可选的。但请注意，如果你添加了它，只有当你在 SpriteBuilder 中有连续命名的 `Level#.ccb`\
    \ 文件时，解锁更多关卡的功能才会生效。\n\n**代码清单 8-20**. 统计游戏中的关卡数量\n\n```\n-(int) levelCount\n\
    {\n    NSBundle* mainBundle = [NSBundle mainBundle];\n    NSString* path;\n  \
    \  int count = 0;\n\n    do\n    {\n        count++;\n        NSString* level\
    \ = [NSString stringWithFormat:@\"Level%i\", count];\n        path = [mainBundle\
    \ pathForResource:level\n                                    ofType:@\"ccbi\"\n\
    \                               inDirectory:@\"Published-iOS/Levels\"];\n    }\
    \ while (path != nil);\n\n    count--;\n    return count;\n}\n```\n\n这个 `do/while`\
    \ 循环从 1 开始计数，生成关卡字符串 `\"Level1\"`。该字符串被传递给 `NSBundle` 类的 `pathForResource` 方法。该方法不直接查找文件；而是要求你传入各个路径组件：文件名、扩展名（这里称为\
    \ *type*）和路径（*directory*）。文件名是 `\"Level1\"`。扩展名是 `\"ccbi\"`，因为发布的 CCB 文件会被转换为二进制的\
    \ `ccbi` 格式。目录是 `\"Published-iOS/Levels\"`。因此，它会在 bundle 的根目录中查找文件 `\"Published-iOS/Levels/Level1.ccbi\"\
    `。\n\n**注意** 一个 *bundle*（有时称为 *包*）只是一个文件夹结构，但 OS X 和 iOS 将其视为单个文件。每个应用都是一个 bundle，在\
    \ OS X 中，如果你右键单击一个 `.app` 文件并选择 *Show Package Contents*，就可以查看其内容。\n"
- fmt: "# 排版后的文本\n\nYou can see and browse the bundle files in Xcode: just locate\
    \ the `Resources` group, and you’ll see a `Published-iOS` folder with a blue icon.\
    \ That folder and all of its contents will be added to the compiled app bundle\
    \ as is. However, you shouldn’t manually add files to that folder or edit them\
    \ because the `Published-iOS` and `Published-Android` folders are managed by SpriteBuilder,\
    \ meaning your changes may be lost when publishing the SpriteBuilder project.\n\
    \nThis loop is repeated until the first `Level#.ccb` file returns a path string\
    \ that is `nil`，indicating that the file couldn’t be found. Because the level\
    \ file that wasn’t found was already counted, the count variable is reduced by\
    \ one just after the loop before returning the value.\n\nIn order to use the `levelCount`\
    \ method, edit the `setHighestUnlockedLevel:` method and replace the first line\
    \ with the one highlighted in [Listing 8-21](#part0018.html#list21).\n\n[***Listing\
    \ 8-21***](#part0018.html#_list21). Assigning the `levelCount` result\n\n```\n\
    -(void) setHighestUnlockedLevel:(int)level\n{\n    int totalLevelCount = [self\
    \ levelCount];\n\nif (_currentLevel > 0 && _currentLevel <= totalLevelCount)\n\
    \    {\n        [[NSUserDefaults standardUserDefaults] setInteger:level\n    \
    \                                               forKey:KeyForUnlockedLevel];\n\
    \    }\n}\n```\n\n## Showing the Correct Level-Selection Page\n\nLast but not\
    \ least, let’s return to the `Scroll View` one more time. When you’ve played through\
    \ the first three levels, you’ve unlocked the first level of the second world.\
    \ Yet when you open the level-selection popover in the `MainScene`, it will always\
    \ show the first page. This ought to be fixed.\n\nOpen `MainScene.m`, and import\
    \ the `GameState` header just below the other import, as shown in [Listing 8-22](#part0018.html#list22).\n\
    \n[***Listing 8-22***](#part0018.html#_list22). Importing `GameState`\n\n```\n\
    #import \"MainScene.h\"\n#import \"GameState.h\"\n```\n\nThen go to the `didLoadFromCCB`\
    \ method, and replace it with the version in [Listing 8-23](#part0018.html#list23).\n\
    \n[***Listing 8-23***](#part0018.html#_list23). Switching to the page with the\
    \ highest unlocked level\n\n```\n-(void) didLoadFromCCB\n{\n    int numPages =\
    \ _levelSelectScrollView.numHorizontalPages;\n    if (numPages > 0)\n    {\n \
    \       int highest = [GameState sharedGameState].highestUnlockedLevel;\n    \
    \    int worldPage = (highest - 1) / numPages;\n        worldPage = MIN(worldPage,\
    \ numPages - 1);\n\n_levelSelectScrollView.horizontalPage = worldPage;\n    }\n\
    }\n```\n\nThe `numHorizontalPages` returns 3 in this case, because there are three\
    \ pages (worlds). By dividing the `highestUnlockedLevel` minus 1 by the number\
    \ of pages, the result is a value in the range of 0 to 3—for instance, `(1 – 1)\
    \ / 3 = 0`, which is what happens when you first run the app. Consider that `(3\
    \ – 1) / 3 = 0`, so if you happen to have unlocked all three levels of the first\
    \ world, the first page (index 0) would still be shown. Unlocking another level,\
    \ such as `(4 – 1) / 3 = 1`, will then show the second page (world).\n\n**Note**  If\
    \ you were to uncheck the `Scroll View`’s `Paging enabled` property, `numPages`\
    \ will be 0. Hence, you conduct the test to ensure `numPages` is greater than\
    \ 0. This prevents a division-by-zero error with paging disabled.\n\nThe `MIN`\
    \ macro ensures that `worldPage` is always in the range 0 to `numPages – 1` because\
    \ `highestUnlockedLevel` may be set to 10 after completing the ninth level. The\
    \ resulting `worldPage` index is then assigned to the `Scroll View`’s `horizontalPage`\
    \ index property to have the `Scroll View` show that particular page. Now if you\
    \ have a couple levels and you unlocked the first six levels, you’ll immediately\
    \ see the second page of the `Scroll View` as shown in [Figure 8-10](#part0018.html#Fig10).\n\
    \n![9781484202630_Fig08-10.jpg](images/00117.jpeg)\n\n[Figure 8-10](#part0018.html#_Fig10).\
    \ The level-selection `Scroll View` in action and showing the second page\n\n\
    ## Implementing Scroll View Delegate Methods\n\nThere’s one last bit to understanding\
    \ the `CCScrollView` class. It provides a `CCScrollViewDelegate` protocol defining\
    \ callback methods sent to a delegate if it implements the protocol methods. There’s\
    \ no real use for it at the moment, but it can’t hurt to implement the protocol\
    \ methods to see what `Scroll View` events you can react to.\n\nStill in `MainScene.m`,\
    \ you should add the highlighted code of [Listing 8-24](#part0018.html#list24)\
    \ to the `didLoadFromCCB` method.\n\n[***Listing 8-24***](#part0018.html#_list24).\
    \ Switching to the page with the highest unlocked level\n\n```\n-(void) didLoadFromCCB\n\
    {\n    // Code in Listing 8-23 omitted ...\n\nid levelSelect = _levelSelectScrollView.contentNode;\n\
    \    _levelSelectScrollView.delegate = levelSelect;\n}\n```\n\nThis takes the\
    \ `Scroll View`’s `Content` node and assigns it as the `Scroll View`’s delegate\
    \ instance. The delegate object receives the `CCScrollViewDelegate` methods. The\
    \ use of `id` here is important because if you didn’t use it, the compiler would\
    \ warn that you are trying to assign an incompatible type, unless you were to\
    \ cast it to an object conforming to said protocol: `(id<CCScrollViewDelegate>)`.\n\
    \nNote that you could have assigned the delegate just as well in the `MainMenuLevelSelect`\
    \ class. For instance, the following would work in the `didLoadFromCCB` method\
    \ of `MainMenuLevelSelect.m`:\n\n```\nCCScrollView* scrollView = (CCScrollView*)self.parent;\n\
    scrollView.delegate = self;\n```\n\nIt amounts to the same code, and I leave it\
    \ up to you which you should use. But it serves to illustrate there’s almost always\
    \ more than one way to do the same thing.\n\nNext, open `MainMenuLevelSelect.h`\
    \ to make the class conform to the `CCScrollViewDelegate` protocol, as highlighted\
    \ in [Listing 8-25](#part0018.html#list25).\n\n[***Listing 8-25***](#part0018.html#_list25).\
    \ Conforming to the `CCScrollViewDelegate` protocol\n\n```\n#import \"CCNode.h\"\
    \n\n@class MainMenuButtons;\n\n@interface MainMenuLevelSelect : CCNode <CCScrollViewDelegate>\n\
    \n@property (weak) MainMenuButtons* mainMenuButtons;\n\n@end\n```\n\nThe protocol\
    \ defines the following methods as optional, so you don’t have to implement all\
    \ (or any) of them. I added comments to [Listing 8-26](#part0018.html#list26)\
    \ to explain when each method runs.\n\n[***Listing 8-26***](#part0018.html#_list26).\
    \ The `CCScrollViewDelegate` protocol messages\n\n```\n// Sent repeatedly while\
    \ scrolling (dragging).\n- (void)scrollViewDidScroll:(CCScrollView *)scrollView;\n\
    \n// Sent each time the user begins touching & dragging the scroll view.\n- (void)scrollViewWillBeginDragging:(CCScrollView\
    \ *)scrollView;\n\n// Sent each time the user lifts the finger to stop dragging.\n\
    // decelerate parameter is YES when view will move to the nearest page.\n- (void)scrollViewDidEndDragging:(CCScrollView\
    \ *)scrollView\n                  willDecelerate:(BOOL)decelerate;\n\n// Sent\
    \ immediately after didEndDragging (only if paging is not enabled)\n- (void)scrollViewWillBeginDecelerating:(CCScrollView\
    \ *)scrollView;\n\n// Sent when the scroll view stopped moving.\n- (void)scrollViewDidEndDecelerating:(CCScrollView\
    \ *)scrollView;\n```\n\nYou can see for yourself when each of these delegate methods\
    \ run. Open `MainMenuLevelSelect.m`, and add the methods in [Listing 8-27](#part0018.html#list27)\
    \ just above the `@end` line.\n\n[***Listing 8-27***](#part0018.html#_list27).\
    \ Implementing `CCScrollViewDelegate` stub methods"
  raw: 'You can see and browse the bundle files in Xcode: just locate the *Resources*
    group, and you’ll see a *Published-iOS* folder with a blue icon. That folder and
    all of its contents will be added to the compiled app bundle as is. However, you
    shouldn’t manually add files to that folder or edit them because the *Published-iOS*
    and *Published-Android* folders are managed by SpriteBuilder, meaning your changes
    may be lost when publishing the SpriteBuilder project.


    This loop is repeated until the first *Level#.ccb* file returns a path string
    that is nil, indicating that the file couldn’t be found. Because the level file
    that wasn’t found was already counted, the count variable is reduced by one just
    after the loop before returning the value.


    In order to use the levelCount method, edit the setHighestUnlockedLevel: method
    and replace the first line with the one highlighted in [Listing 8-21](#part0018.html#list21).


    [***Listing 8-21***](#part0018.html#_list21). Assigning the levelCount result


    ```

    -(void) setHighestUnlockedLevel:(int)level

    {

        int totalLevelCount = [self levelCount];


    if (_currentLevel > 0 && _currentLevel <= totalLevelCount)

        {

            [[NSUserDefaults standardUserDefaults] setInteger:level

                                                       forKey:KeyForUnlockedLevel];

        }

    }

    ```


    Showing the Correct Level-Selection Page


    Last but not least, let’s return to the *Scroll View* one more time. When you’ve
    played through the first three levels, you’ve unlocked the first level of the
    second world. Yet when you open the level-selection popover in the *MainScene*,
    it will always show the first page. This ought to be fixed.


    Open *MainScene.m*, and import the GameState header just below the other import,
    as shown in [Listing 8-22](#part0018.html#list22).


    [***Listing 8-22***](#part0018.html#_list22). Importing GameState


    ```

    #import "MainScene.h"

    #import "GameState.h"

    ```


    Then go to the didLoadFromCCB method, and replace it with the version in [Listing
    8-23](#part0018.html#list23).


    [***Listing 8-23***](#part0018.html#_list23). Switching to the page with the highest
    unlocked level


    ```

    -(void) didLoadFromCCB

    {

        int numPages = _levelSelectScrollView.numHorizontalPages;

        if (numPages > 0)

        {

            int highest = [GameState sharedGameState].highestUnlockedLevel;

            int worldPage = (highest - 1) / numPages;

            worldPage = MIN(worldPage, numPages - 1);


    _levelSelectScrollView.horizontalPage = worldPage;

        }

    }

    ```


    The numHorizontalPages returns 3 in this case, because there are three pages (worlds).
    By dividing the highestUnlockedLevel minus 1 by the number of pages, the result
    is a value in the range of 0 to 3—for instance, (1 – 1) / 3 = 0, which is what
    happens when you first run the app. Consider that (3 – 1) / 3 = 0, so if you happen
    to have unlocked all three levels of the first world, the first page (index 0)
    would still be shown. Unlocking another level, such as (4 – 1) / 3 = 1, will then
    show the second page (world).


    **Note**  If you were to uncheck the *Scroll View*’s *Paging enabled* property,
    numPages will be 0\. Hence, you conduct the test to ensure numPages is greater
    than 0\. This prevents a division-by-zero error with paging disabled.


    The MIN macro ensures that worldPage is always in the range 0 to numPages – 1
    because highestUnlockedLevel may be set to 10 after completing the ninth level.
    The resulting worldPage index is then assigned to the *Scroll View*’s horizontalPage
    index property to have the *Scroll View* show that particular page. Now if you
    have a couple levels and you unlocked the first six levels, you’ll immediately
    see the second page of the *Scroll View* as shown in [Figure 8-10](#part0018.html#Fig10).


    ![9781484202630_Fig08-10.jpg](images/00117.jpeg)


    [Figure 8-10](#part0018.html#_Fig10). The level-selection Scroll View in action
    and showing the second page


    Implementing Scroll View Delegate Methods


    There’s one last bit to understanding the CCScrollView class. It provides a CCScrollViewDelegate
    protocol defining callback methods sent to a delegate if it implements the protocol
    methods. There’s no real use for it at the moment, but it can’t hurt to implement
    the protocol methods to see what *Scroll View* events you can react to.


    Still in *MainScene.m*, you should add the highlighted code of [Listing 8-24](#part0018.html#list24)
    to the didLoadFromCCB method.


    [***Listing 8-24***](#part0018.html#_list24). Switching to the page with the highest
    unlocked level


    ```

    -(void) didLoadFromCCB

    {

        // Code in Listing 8-23 omitted ...


    id levelSelect = _levelSelectScrollView.contentNode;

        _levelSelectScrollView.delegate = levelSelect;

    }

    ```


    This takes the *Scroll View*’s *Content* node and assigns it as the *Scroll View*’s
    delegate instance. The delegate object receives the CCScrollViewDelegate methods.
    The use of id here is important because if you didn’t use it, the compiler would
    warn that you are trying to assign an incompatible type, unless you were to cast
    it to an object conforming to said protocol: (id<CCScrollViewDelegate>).


    Note that you could have assigned the delegate just as well in the MainMenuLevelSelect
    class. For instance, the following would work in the didLoadFromCCB method of
    *MainMenuLevelSelect.m*:


    ```

    CCScrollView* scrollView = (CCScrollView*)self.parent;

    scrollView.delegate = self;

    ```


    It amounts to the same code, and I leave it up to you which you should use. But
    it serves to illustrate there’s almost always more than one way to do the same
    thing.


    Next, open *MainMenuLevelSelect.h* to make the class conform to the CCScrollViewDelegate
    protocol, as highlighted in [Listing 8-25](#part0018.html#list25).


    [***Listing 8-25***](#part0018.html#_list25). Conforming to the CCScrollViewDelegate
    protocol


    ```

    #import "CCNode.h"


    @class MainMenuButtons;


    @interface MainMenuLevelSelect : CCNode <CCScrollViewDelegate>


    @property (weak) MainMenuButtons* mainMenuButtons;


    @end

    ```


    The protocol defines the following methods as optional, so you don’t have to implement
    all (or any) of them. I added comments to [Listing 8-26](#part0018.html#list26)
    to explain when each method runs.


    [***Listing 8-26***](#part0018.html#_list26). The CCScrollViewDelegate protocol
    messages


    ```

    // Sent repeatedly while scrolling (dragging).

    - (void)scrollViewDidScroll:(CCScrollView *)scrollView;


    // Sent each time the user begins touching & dragging the scroll view.

    - (void)scrollViewWillBeginDragging:(CCScrollView *)scrollView;


    // Sent each time the user lifts the finger to stop dragging.

    // decelerate parameter is YES when view will move to the nearest page.

    - (void)scrollViewDidEndDragging:(CCScrollView * )scrollView

                      willDecelerate:(BOOL)decelerate;


    // Sent immediately after didEndDragging (only if paging is not enabled)

    - (void)scrollViewWillBeginDecelerating:(CCScrollView *)scrollView;


    // Sent when the scroll view stopped moving.

    - (void)scrollViewDidEndDecelerating:(CCScrollView *)scrollView;

    ```


    You can see for yourself when each of these delegate methods run. Open *MainMenuLevelSelect.m*,
    and add the methods in [Listing 8-27](#part0018.html#list27) just above the @end
    line.


