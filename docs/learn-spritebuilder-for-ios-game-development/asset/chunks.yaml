    # 排版后的内容


    然而，我还没有解释如何在时间线（Timeline）中使用`Callbacks`关键帧，也没有解释如何利用它们在时间线的任意位置运行自定义选择器。这种情况非常适合使用`Callbacks`关键帧。事实上，任何时候需要在时间线动画的特定时间点调用选择器，你都可以使用`Callbacks`关键帧。


    在 SpriteBuilder 中，打开`PauseMenuLayer.ccb`。左键单击`Timeline List`（参见图 5-1），然后选择`New
    Timeline`。这将创建并选中一个名为`Untitled Timeline`的新时间线。再次左键单击`Timeline List`，然后选择`Edit
    Timelines`，调出与图 5-9 相同的时间线编辑对话框。双击`Untitled Timeline`文本进行编辑，将此时间线重命名为`**resume
    game**`。保持`resume game`时间线的`Autoplay`复选框未选中，然后单击`Done`。


    **警告** 一旦在 CCB 中拥有多个时间线，验证正在编辑的时间线是否正确就变得至关重要。在编辑前检查`Timeline List`，尤其是在你疑惑为什么编辑没有产生任何变化时。适应切换时间线的概念可能需要一些时间，可以通过左键单击`Timeline
    List`，然后从`Timelines`子菜单中选择所需时间线来实现。


    接下来，通过单击时间线右上角的数字框来编辑时间线时长（参见图 5-2）。将时间线设为两秒长；这应该足够。现在将时间线光标移动到时间线末尾，即 2 秒标记处。这就是你应该添加`Callbacks`关键帧的位置。


    如果你之前尝试添加`Callbacks`关键帧，很可能没有成功。诀窍是按住`Option`键，然后单击`Callbacks`分段以添加一个`Callbacks`关键帧。


    添加`Callbacks`关键帧后，它仍然不会执行任何操作——你需要编辑该关键帧的属性。为此，双击该关键帧。将出现一个如图 6-8 所示的气泡框，你需要在`Selector`字段中输入`**resumeGameDidEnd**`。


    **提示** 音效关键帧也是通过按住 Option 键单击音效分段来添加的，并且可以通过双击关键帧进行编辑。


    ![9781484202630_Fig06-08.jpg](img/00092.jpeg)


    图 6-8. 编辑 Callbacks 关键帧


    与其他关键帧一样，你也可以右键单击`Callbacks`或`Sound effects`关键帧来执行`Cut`、`Copy`或`Delete`操作。你也可以通过左键单击选择关键帧并按`Backspace`键来删除关键帧。


    **注意** 如果在尝试剪切或删除`Callbacks`或`Sound effects`关键帧时收到提示“根节点无法移除”的消息，只需取消选择根节点，方法是选择任何其他节点，或单击舞台上任何节点外的区域，以取消选择当前选中的节点。


    你已经在代码清单 6-9 中添加了处理恢复游戏所需的代码。`shouldResumeGame`方法运行`resume game`时间线，该时间线最终将运行`resumeGameDidEnd`选择器。


    如果现在构建并运行应用，暂停游戏，然后点击恢复，暂停菜单气泡框将在两秒后消失，游戏继续。


    你现在也可以重新开始关卡并退出到主菜单，因为`SceneManager`会切换场景（参见代码清单 6-13）。作为练习，你可以添加另一个`SceneManager`类方法，该方法呈现`GameScene`但不使用过渡效果。然后更新`shouldRestartGame`方法以使用你新建的`SceneManager`方法。


    ## 在恢复时为暂停菜单添加动画效果


    点击暂停菜单上的恢复按钮后没有任何视觉反馈，这有点糟糕。如何为`PauseMenuLayer.ccb`的`resume game`时间线添加动画效果完全取决于你，除了末尾运行`resumeGameDidEnd`选择器的`Callbacks`关键帧之外。在接下来的段落中，我仅提供一个示例和灵感，说明你可以在这两秒内做什么。


    首先，考虑对`P_bg`背景精灵执行动画也会移动、缩放和旋转其子节点。唯一不被继承的属性大约是不透明度。如果你想让弹出层慢慢淡出，恐怕你必须为每个单独的按钮、标签和背景精灵添加相同的不透明度关键帧——而且，还要让它们都在相同的时间戳以相同的不透明度值开始和结束。因此，我决定不让该层淡出。


    **提示** 如果你按照混合模式插曲中的说明操作，可能会发现舞台上难以看清事物。如果是这种情况，请单击时间线中`CCNodeColor`条目右侧的眼睛符号来隐藏颜色节点，同时保持它在游戏中可见。


    选择`P_bg`精灵节点，然后按`V`插入一个`Visible`关键帧。将此关键帧移到最左侧，时间戳`00:00:00`。可见属性只能开启和关闭；因此，`Keyframe
    Segment`会绘制得更粗，并且行为不同，即使目前只有一个关键帧，它也会填充整个分段。将时间线光标移到 1 秒标记稍后处，然后按`V`键添加另一个`Visible`关键帧。如果需要视觉提示，请参见图
    6-9。


    接下来，在时间戳`00:00:00`和`00:01:00`处用`P`键添加两个`Position`关键帧。将时间线光标移动到第二个关键帧（右侧的那个），然后拖拽`P_bg`精灵将其移动到屏幕的左上角。右键单击`Position
    Keyframe Segment`，然后选择`Ease In`缓动模式。这就完成了向左上角移动的动画，但单独来看相当乏味。


    选中`P_bg`精灵，同样在时间戳`00:00:00`和`00:01:00`处添加两个`Scale`关键帧。将时间线光标移动到第二个关键帧，然后将`Scale`属性的
    X 轴和 Y 轴分别更改为`0.2`和`0.1`。右键单击`Keyframe Segment`，然后选择`Ease Out`缓动模式。如果运行此动画，整个暂停层应该在滑向左上角的同时向后移动（缩小）。


    ![9781484202630_Fig06-09.jpg](img/00093.jpeg)


    图 6-9. 带有闪烁 READY！标签的 resume game 时间线示例


    如果你还想添加某种就绪指示器，从`Node Library View`拖拽一个`Label TTF`节点放到舞台上。此节点应该是根节点的子节点，但*不是*`P_bg`精灵的子节点。将标签的文本改为`**READY!**`，并将其`Font
    size`增加到`*100*`。你可以根据自己的需要编辑任何其他标签属性。但请务必取消选中属性选项卡最顶部的标签`Visible`复选框，以便它初始时是隐藏的。你还应将标签的位置类型改为`%`，值改为`*50*`，使其在舞台上居中。


    在选中新标签的情况下，将时间线光标移动到大约 1 秒标记处，然后按`V`。将时间线光标向右移动，再次按`V`。重复此操作，直到你拥有大约三个等间距、等大小的`Keyframe
    Segment`，如图 6-9 所示。拖拽移动关键帧以均匀间距，或者故意使间距不均匀。重要的是，最后一个关键帧应将标签的`Visible`属性设置为`NO`。在标签可见的每两个关键帧之间，会绘制一个粉红色的`Keyframe
    Segment`。

