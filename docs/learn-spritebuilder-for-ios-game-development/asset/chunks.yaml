  trans: '

    SpriteBuilder 可能会要求你将项目格式转换为新的 Packages 格式。这样做通常是安全的，但不进行转换也没有坏处。Packages 本质上只会改变
    SpriteBuilder 项目中资源文件的位置。Packages 是在本书接近尾声时引入的，因此大多数示例项目会要求你切换到使用 Packages。


    在 SpriteBuilder 中打开示例项目后，你需要发布它。已发布的资源文件已从 Xcode 项目中剥离，以减小归档文件的大小。


    当你打开 SpriteBuilder 项目的 Xcode 项目并构建时，可能会收到警告甚至错误。这些项目均使用 Xcode 6.0 测试过。如果你使用的是
    Xcode 6.1 或更高版本，Apple 可能对构建设置和编译器进行了更改和优化。例如，你可能会被要求更新项目的 Build Settings 或格式。这样做通常是安全的。


    **注意** 首次运行 Xcode 项目时，它可能会出现挂起或花费很长时间才能完成的情况。当你之前从未打开并发布过 SpriteBuilder 项目时，这种情况尤其可能发生。在这种情况下，Xcode
    将启动 SpriteBuilder 项目的发布过程，但不会显示任何进度指示。因此，建议你先打开并发布 SpriteBuilder 项目——这样，你至少能看到一个进度指示器。


    你可能会看到一些编译器警告或错误，指出代码中的潜在问题。如果警告来自某个库目标（Cocos2D、ObjectAL 或 Chipmunk），你可以忽略它们。这些警告通常不严重，甚至可能持续存在多个版本。Cocos2D
    开发人员会不时清理这些警告。以前完全可接受的代码中也可能出现新的错误。这通常发生在较新的 Xcode 版本中，编译器现在会将某些警告视为错误，或者它总体上发现了新的潜在问题。只要它们只是警告，忽略它们即可。它们很可能是由于
    Xcode 的进步而产生的遗留问题。


    然而，如果你在库中遇到编译器错误，可以尝试更新 Cocos2D，看看警告/错误是否消失。如果项目本身的代码（Source 组中的代码）有错误，而你又无法自行修复，请访问
    [`forum.spritebuilder.com`](http://forum.spritebuilder.com) 上的 SpriteBuilder 论坛，查找勘误和修复方法。


    在 17 个 SpriteBuilder 项目中，大多数最初是使用 v1.3 之前的 SpriteBuilder 版本创建的。因此，编号为 00 到 13
    的项目不包含为 Android 平台编译所需的代码。编号为 14 到 16 的项目则支持 Android。相应地，项目 00 到 13 在方案和平台列表中与项目
    14 到 16 有不同的项目。


    **提示** 你可以按照以下说明将不支持 Android 的 SpriteBuilder 项目转换为支持的项目：[`android.spritebuilder.com/#dealing-with-spritebuilder-projects-from-spritebuilder-1-2-and-earlier`](http://android.spritebuilder.com/#dealing-with-spritebuilder-projects-from-spritebuilder-1-2-and-earlier)。


    ## 示例项目与章节对照


    如前所述，示例项目编号与章节编号并不匹配。表 1-1 列出了章节编号和名称，以及特定项目属于哪一章。


    **表 1-1.** 章节与示例项目对照


    | 章节 | 项目文件夹 | 项目说明 |

    | --- | --- | --- |

    | 02 - 奠定基础 | 00 - 起始点 | 与创建一个新的 SpriteBuilder 项目相同。 |

    | 02 - 奠定基础 | 01 - 使用按钮切换场景 | 代表第 2 章中途的项目阶段。 |

    | 02 - 奠定基础 | 02 - 使用玩家预制体的关卡 | 代表第 2 章结束时的项目阶段。 |

    | 03 - 控制与滚动 | 03 - 视差滚动 | 代表第 3 章结束时的项目阶段。 |

    | 04 - 物理与碰撞 | 04 - 物理移动与关卡边界 | 代表第 4 章结束时的项目阶段。 |

    | 05 - 时间线与触发器 | 05 - 时间线动画 | 代表第 5 章中途的项目阶段。 |

    | 05 - 时间线与触发器 | 06 - 触发式动画 | 代表第 5 章结束时的项目阶段。 |

    | 06 - 菜单与弹出视图 | 07 - 弹出式菜单 | 代表第 6 章结束时的项目阶段。 |

    | 07 - 主场景与游戏状态 | 08 - 主菜单与设置 | 代表第 7 章结束时的项目阶段。 |

    | 08 - 选择与解锁关卡 | 09 - 关卡选择滚动视图 | 代表第 8 章结束时的项目阶段。 |

    | 09 - 物理关节 | 10 - 链条、绳索与弹簧 | 代表第 9 章结束时的项目阶段。 |

    | 10 - 软体物理 | 11 - 软体玩家 | 代表第 10 章结束时的项目阶段。 |

    | 11 - 音频与标签 | 12 - 音频、标签与本地化 | 代表第 11 章结束时的项目阶段。 |

    | 12 - 视觉效果与动画 | 13 - 动画与效果 | 代表第 12 章结束时的项目阶段。 |

    | 13 - 移植到 Android | 14 - HelloSpriteBuilder Android | 在第 13 章早期创建的测试项目。 |

    | 13 - 移植到 Android | 15 - 在进行 Android 特定修复之前 | 第 13 章中途 Android 移植的起点。 |

    | 13 - 移植到 Android | 16 - 适用于 Android 的 Bouncy Beast | 代表第 13 章结束时的项目阶段。 |


    ## 关于部署目标


    最终，你需要决定你的应用应该运行在哪些设备上，以及你将支持哪些 iOS 版本。


    理论上，Cocos2D 应用可以运行在任何支持 OpenGL ES 2.0、且至少运行 iOS 5 的设备上。这使得 iPhone 3GS 和第一代 iPad
    成为你能运行应用的最老 iOS 设备。这只是理论上的说法。


    然而，iPhone 3GS 和最新款 iPhone 之间，以及第一代 iPad 和最新款 iPad 之间，性能存在巨大差异。移动技术的发展速度远快于台式电脑技术。


    此外，每款较新的 iOS 设备的市场渗透率都显著高于其前代产品。因此，支持像 iPhone 3GS 这样的老旧设备，甚至可能包括非宽屏手机 iPhone 4
    和 4S，并不总像表面上看起来那样是明智的财务决策。从历史上看，与 Android 市场形成鲜明对比的是，通过专门支持最新的 iOS 版本、最新型号及其独有的功能，你更有可能产生更大的销量，而不是试图尽可能向后兼容。

    '
- fmt: '我的个人建议是跟随苹果的步伐，在其推出新机型并淘汰旧机型时作出选择。如果你不确定该支持哪些设备，那么在开始新项目时，支持那些能够运行最新 `iOS`
    版本的设备。关于 `iOS` 设备列表及其支持的最新操作系统，请参阅维基百科上的列表：[http://en.wikipedia.org/wiki/List_of_iOS_devices](http://en.wikipedia.org/wiki/List_of_iOS_devices)。


    对于 `iOS 8`，可支持的最旧设备是 `iPhone 4S` 和 `iPad 2`。已停产的 `iOS` 机型在应用销售方面很快就会淡出市场。对于 `iOS`
    版本来说，情况也几乎相同。在启动新应用项目时，你完全可以将倒数第二个主要 `iOS` 版本作为最低部署目标。例如，目前 `iOS 8` 是最新的 `iOS`
    版本。通过支持运行 `iOS 7.0` 及以上版本的设备，截至2014年10月5日，你的应用潜在可寻址市场占 `App Store` 使用量的94%。


    苹果会定期更新一张图表，展示用户访问 `App Store` 时所使用的 `iOS` 版本分布情况：[https://developer.apple.com/support/appstore/](https://developer.apple.com/support/appstore/)。该图表反映的是你的可寻址市场，而非仍在运行
    `iOS 6` 及更早版本的潜在数百万台设备。这些较旧的设备大多已损坏、被盗或已被遗忘——或者大多数情况下，它们的用户几乎不再获取任何新应用。也许这些用户对现有设备非常满意，又或者他们知道新应用不太可能在他们的设备上运行。


    但更重要的是，要确保你已发布的应用在受支持的最旧设备和 `iOS` 版本上能够长时间运行，以保持现有客户的满意度。仅凭这一点，就足以反对尝试支持尽可能旧版本的
    `iOS` 系统，这对于游戏来说尤其如此，因为游戏对设备资源的需求比大多数其他类型的应用更苛刻。


    请考虑一下，`iPhone 6` 与 `iPhone 3GS` 之间的性能差距是巨大的。在 `GeekBench` 基准测试中，`iPhone 6（Plus）`比
    `iPhone 3GS` 快10倍以上。与 `iPhone 4S` 相比，同一基准测试中 `iPhone 6（Plus）`仍然快7倍以上。你可以在此处找到所有
    `iOS` 设备的最新性能对比：[http://browser.primatelabs.com/ios-benchmarks](http://browser.primatelabs.com/ios-benchmarks)。


    基于这一基准测试，不难预测，图形密集型游戏的开发者将停止为 `iPhone 4S` 及更早版本、`iPad（第三代）` 及更早版本以及初代 `iPad mini（非
    Retina 屏）`提供游戏，或降低其画质。`iPhone 5` 代及更新的设备在性能上遥遥领先。


    ## 目录


    以下是本书各章节的列表及简要概述。


    [第1章](#part0010.html)—引言


    你正在阅读本章。


    [第2章](#part0011.html)—打好基础


    介绍 `SpriteBuilder` 及其用户界面。此处解释了最常见的任务。同时，本章包含对 `Cocos2D` 编程的快速介绍。你将最终创建一个项目，通过按下按钮即可在场景之间切换。


    [第3章](#part0012.html)—控制与滚动


    在本章中，你将添加触摸输入和多个背景层的视差滚动。你将学习如何使用精灵表和预制件。引入了一个玩家预制件，其简单的移动通过移动动作来实现。


    [第4章](#part0013.html)—物理与碰撞


    你将学习如何为游戏添加物理效果，特别是不可移动、不可穿透的墙壁以及动态物体。玩家移动被实际物理效果所取代。碰撞回调方法用于触发关卡退出。还将解释如何启用物理调试绘制。


    [第5章](#part0014.html)—时间线与触发器


    深入解释时间线，然后使用它来动画化旋转的物理对象。你将学习如何创建触发器区域，当玩家进入时运行代码。最终项目现在可以实现简单的物理交互。


    [第6章](#part0015.html)—菜单与弹出视图


    解释了一种强大且简单的方法来创建弹出式菜单，例如暂停菜单和游戏结束菜单。同样的概念可用于创建全屏菜单，而无需中断正在运行的场景。菜单通过时间线进行动画，并使用时间线委托方法在时间线结束时接收通知。


    [第7章](#part0017.html)—主场景与游戏状态


    主菜单设计有动画背景，以及一个带有音频音量滑块的设置菜单。引入了一个`GameState`类，它通过`NSUserDefaults`存储全局的、用户特定的游戏数据。


    [第8章](#part0018.html)—选择与解锁关卡


    借助滚动视图节点添加了关卡选择界面。详细解释了`CCScrollView`的工作原理、如何编程以及如何响应其委托方法。关卡选择页面分为多个世界，每个关卡通过完成前一关卡来解锁。


    [第9章](#part0019.html)—物理关节


    本章专门介绍如何用关节（特别是链条、绳索和弹簧）创建物理对象。详细解释了关节的工作原理、用途以及应避免的操作。


    [第10章](#part0020.html)—软体物理


    玩家预制件被替换为软体玩家。软体物体是一种由关节连接的可变形物理对象，其碰撞形状被分成多个较小的物体。本章还介绍了使用 `Cocos2D` 进行自定义渲染，因为玩家的纹理需要随时绘制以匹配其变形后的形状。


    [第11章](#part0022.html)—音频与标签


    你将学习如何通过时间线播放简短音效，以及如何使用 `ObjectAL` 以编程方式播放音效，还将学习如何播放背景音乐。本章的另一半内容涉及`Label TTF`的属性，如阴影和轮廓，同时也解释了如何在
    `SpriteBuilder` 中创建、导入和使用位图字体。


    [第12章](#part0023.html)—视觉效果与动画


    你将首次创建精灵帧动画，并使其与玩家的自定义渲染类协同工作。在关于视觉效果的章节中，必须介绍粒子效果节点。最终，将使用效果节点，这些本质上是着色器程序，你可以在
    `SpriteBuilder` 中添加和设计。在本章结束时，你几乎认不出原来的主菜单场景。


    [第13章](#part0024.html)—移植到 Android


    首先，你将了解为 `Android` 开发所需的条件。然后，你将创建一个新项目，用于测试部署到 `Android` 设备。最后，你将转换 `Bouncy Beast`
    项目，并修复出现的任何编译、启动和布局问题。你将获得关于如何最好地使用 `SpriteBuilder` 进行跨平台开发的建议。


    [第14章](#part0025.html)—调试与最佳实践


    本章介绍如何使用 `Xcode` 和 `Cocos2D` 进行调试。你将学习捕获或防止编程错误的技术。基本上，这是一本自助指南，很快就会证明其价值。此外，还有一节内容讲解如何解决一些最常见的
    `SpriteBuilder` 和 `Cocos2D` 问题。


    ## 开始之前


    如果你对 `SpriteBuilder`、`Cocos2D` 或相关技术及流程有任何疑问，请访问 `SpriteBuilder` 论坛（[http://www.spritebuilder.com](http://www.spritebuilder.com)）和
    `Cocos2D` 论坛（[http://www.cocos2d-swift.org](http://www.cocos2d-swift.org)）。


    我也经常在 `StackOverflow`（[http://www.stackoverflow.com](http://www.stackoverflow.com)）上回答标注了
    `Cocos2D` 标签的编程问题。'
  raw: 'My personal recommendation is to follow Apple as it introduces new models
    and discontinues old models. If you are unsure which of them to support, support
    those that are capable of running the latest iOS version when starting a new project.
    For a list of iOS devices and their newest supported operating system, refer to
    this list on Wikipedia: [http://en.wikipedia.org/wiki/List_of_iOS_devices](http://en.wikipedia.org/wiki/List_of_iOS_devices).


    For iOS 8, the oldest targetable devices are iPhone 4S and iPad 2. Discontinued
    iOS models very quickly fall by the wayside in terms of app sales. Almost the
    same goes for iOS versions. You can certainly require the second-to-latest major
    iOS version as your minimum deployment target when starting a new app project.
    For example, at this point in time, iOS 8 is the latest iOS version. By supporting
    devices running iOS 7.0 and up, your app has a potential addressable market that
    amounts to 94% of App Store usage as of October 5, 2014.


    Apple periodically updates a chart that tells you what iOS versions users are
    using when they visit the App Store: [https://developer.apple.com/support/appstore/](https://developer.apple.com/support/appstore/).
    This chart reflects your addressable market, not the potential millions of devices
    still running iOS 6 and earlier. Most of those older devices that have been sold
    are either broken, stolen, or forgotten—or for the most part, their users hardly
    get any new apps. Maybe those users are perfectly happy with the device as is,
    or maybe they know that new apps are unlikely to run on their device.


    But it’s even more important to ensure your published app keeps running on the
    lowest supported device and iOS version as long as possible to keep your existing
    customers happy. That alone speaks against trying to support iOS versions as far
    back as theoretically possible, and this is particularly true for games that are
    more demanding on device resources than most other types of apps.


    Consider that the performance span between an iPhone 6 and an iPhone 3GS is tremendous.
    In the GeekBench benchmark, the iPhone 6 (Plus) is more than 10 times faster than
    the iPhone 3GS. Compared to the iPhone 4S, the iPhone 6 (Plus) is still over 7
    times faster in the same benchmark. You’ll find an up-to-date performance comparison
    of all iOS devices here: [http://browser.primatelabs.com/ios-benchmarks](http://browser.primatelabs.com/ios-benchmarks).


    Based on this benchmark, it’s not hard to predict that developers of graphically
    intense games will stop offering their games or reduce quality on iPhone 4S and
    earlier, iPad (third generation) and earlier, and the original iPad mini (non-Retina).
    Too far ahead are the iPhone 5 generation and newer devices in terms of performance.


    Table of Contents


    Following is a list of chapters in this book with short summaries.


    [Chapter 1](#part0010.html)—Introduction


    You are currently reading this chapter.


    [Chapter 2](#part0011.html)—Laying the Groundwork


    An introduction to SpriteBuilder and its user interface. The most commonly needed
    tasks are explained here. Also, the chapter contains a quick introduction to programming
    with Cocos2D. You end up with a project that allows you to transition between
    scenes by the press of a button.


    [Chapter 3](#part0012.html)—Controlling and Scrolling


    You’ll add touch input and parallax scrolling of multiple background layers in
    this chapter. You’ll learn to use Sprite Sheets and prefabs. A player prefab is
    introduced, and its simplistic movement is performed by move actions.


    [Chapter 4](#part0013.html)—Physics and Collisions


    You learn how to add physics to a game, specifically immovable, impenetrable walls
    as well as dynamic bodies. Player movement is replaced by actual physics. Collision
    callback methods are used to trigger the level exit. How to enable physics debug
    drawing is also explained.


    [Chapter 5](#part0014.html)—Timelines and Triggers


    Timelines are explained in depth, and then used to animate rotating physics objects.
    You’ll learn how to create trigger areas that run code when the player enters
    them. The resulting project now makes simple physics interactions possible.


    [Chapter 6](#part0015.html)—Menus and Popovers


    A powerful, yet easy way to create popover menus, such as the pause and game over
    menus, is explained. The same concept can be used to create full-screen menus
    without interrupting the running scene. The menus are animated with the Timeline,
    using Timeline delegate methods to receive notifications when a Timeline has ended.


    [Chapter 7](#part0017.html)—MainScene and GameState


    The main menu is designed with an animated background and a settings menu with
    audio volume sliders. A *GameState* class is introduced, which stores global,
    user-specific game data via *NSUserDefaults*.


    [Chapter 8](#part0018.html)—Selecting and Unlocking Levels


    A level selection screen is added with the help of the Scroll View node. How *CCScrollView*
    works, how it can be programmed, and how you can respond to its delegate methods
    is carefully explained. The level selection pages are divided into multiple worlds,
    with each level unlocked by completing the previous level.


    [Chapter 9](#part0019.html)—Physics Joints


    This entire chapter is dedicated to creating physics objects out of joints, specifically
    chains, ropes, and springs. How joints work and what you can and probably shouldn’t
    do with them is explained in detail.


    [Chapter 10](#part0020.html)—Soft-Body Physics


    The player prefab is replaced by a soft-body player. A soft-body object is a deformable
    physics object held together by joints, with its collision shape divided into
    multiple smaller bodies. This chapter also introduces custom rendering with Cocos2D
    because the player’s texture needs to be drawn to match its deformed shape at
    any time.


    [Chapter 11](#part0022.html)—Audio and Labels


    You’ll learn how to play short sound effects with the Timeline and how to play
    them programmatically with ObjectAL, and you’ll learn how to play background music.
    The other half of the chapter deals with Label TTF properties like shadows and
    outline, but it also explains how to create, import, and use bitmap fonts in SpriteBuilder.


    [Chapter 12](#part0023.html)—Visual Effects and Animations


    You’ll be creating a sprite frame animation for the first time, and you’ll make
    it work with the player’s custom rendering class. An introduction to Particle
    Effect nodes is mandatory in a chapter on visual effects. This culminates in the
    use of the Effect nodes, which are essentially shader programs that you can add
    and design in SpriteBuilder. At the end of this chapter, you’ll hardly recognize
    the main menu scene.


    [Chapter 13](#part0024.html)—Porting to Android


    At first, you’ll see what is necessary to develop for Android. Then you’ll create
    a new project with which you’ll test deployment to an Android device. Finally,
    you’ll convert the Bouncy Beast project and fix any compilation, launch, and layout
    issues that occur. You’ll get advice on how to best approach cross-platform development
    with SpriteBuilder.


    [Chapter 14](#part0025.html)—Debugging and Best Practices


    This chapter is an introduction to debugging with Xcode and Cocos2D. You’ll learn
    about techniques to catch or prevent programming bugs. Basically, it’s a self-help
    guide that’ll quickly prove invaluable. There’s also a section on troubleshooting
    some of the most common SpriteBuilder and Cocos2D issues.


    Before You Get Started


    If you have any questions regarding SpriteBuilder, Cocos2D, or related technologies
    and processes, please visit the SpriteBuilder forum ([http://www.spritebuilder.com](http://www.spritebuilder.com))
    and the Cocos2D forum ([http://www.cocos2d-swift.org](http://www.cocos2d-swift.org)).


    I’m also frequently answering programming questions on StackOverflow ([http://www.stackoverflow.com](http://www.stackoverflow.com))
    when they are tagged with Cocos2D.'
