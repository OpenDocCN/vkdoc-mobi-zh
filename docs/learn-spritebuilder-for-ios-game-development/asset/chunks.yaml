    \ var`也不起作用，因为所有者是你在使用`CCBReader`方法`load:owner:`时在代码中指定的引用。\n\n## 编程实现`GameMenuLayer`\n\
    \n是时候再次启动 Xcode，添加`GameMenuLayer`类和`shouldPauseGame`方法了。\n\n你的首要目标始终是让新的代码连接尽快在技术上发挥作用，并验证它们是否工作。在未确认连接的选择器确实运行且实例变量或属性被正确分配之前，就开始编写代码是潜在的时间浪费。你可能会倾向于在逻辑中寻找缺陷，从而可能在错误的地方浪费大量时间寻找问题。这相当于编程中的“你插电了吗？”问题。\n\
    \n### 实现并确认代码连接\n\n创建一个新的 Objective-C 类，就像上一章创建`Trigger`和`PlayTimelineWhenTriggered`类一样。这一次，将新类命名为`GameMenuLayer`，并使其成为`CCNode`的子类。如果需要回忆，请查看\
    \ Figure 2-10 和 Figure 2-11。\n\n添加该类满足了将`GameMenuLayer`分配为`GameMenuLayer.ccb`根节点自定义类的要求。你可以通过添加\
    \ Listing 6-1 中的代码来确认该类至少被实例化一次，该代码仅在`CCBReader`加载了使用此类的节点时记录日志。\n\n***Listing\
    \ 6-1***。日志记录确认至少加载了一个使用`GameMenuLayer`类的节点\n\n```\n#import \"GameMenuLayer.h\"\
    \n#import \"GameScene.h\"\n\n@implementation GameMenuLayer\n\n-(void) didLoadFromCCB\n\
    {\n    NSLog(@“YAY! didLoadFromCCB: %@\", self);\n}\n\n-(void) shouldPauseGame\n\
    {\n    NSLog(@\"BUTTON: should pause game\");\n}\n\n@end\n```\n\n为了满足将`_gameMenuLayer`变量分配给`GameScene.ccb`根节点的要求，打开`GameScene.m`，导入新的`GameMenuLayer`类，并在文件顶部添加`_gameMenuLayer`实例变量，如\
    \ Listing 6-2 中高亮显示的部分。\n"
- fmt: '您还将添加一个`_popoverMenuLayer`引用，它将用作当前暂停关卡时绘制在关卡上方的弹出层（popover layer）的引用。此游戏的弹出层会在以下情况下显示：玩家死亡、玩家到达出口，或点击暂停按钮调出暂停菜单。


    [***Listing 6-2***](#part0015.html#_list2). 向`GameScene.m`添加`_gameMenuLayer`实例变量


    ```

    #import "GameScene.h"

    #import "Trigger.h"

    #import "GameMenuLayer.h"


    @implementation GameScene

    {

        // existing ivars omitted for brevity ...


        __weak GameMenuLayer* _gameMenuLayer;

        __weak GameMenuLayer* _popoverMenuLayer;

    }

    ```


    现在您可以构建并运行项目，确认其能无错误启动。检查日志中加载时是否出现`YAY!`消息，以确认`GameMenuLayer`实例已创建。点击暂停按钮也应能在[***Listing
    6-1***](#part0015.html#list1)的`shouldPauseGame`选择器中记录该消息。


    ## 为`GameMenuLayer`分配`GameScene`引用


    您已向`GameScene`类中的`_gameMenuLayer`实例变量分配了`GameMenuLayer`类的引用。但您还需要在`GameMenuLayer`类中有一个指向`GameScene`实例的反向引用。为此，您需要在`GameMenuLayer`类中添加一个`GameScene*`属性。


    打开`GameMenuLayer.h`，并添加[***Listing 6-3***](#part0015.html#list3)中高亮显示的代码，以添加一个名为`gameScene`的弱引用作为属性。


    [***Listing 6-3***](#part0015.html#_list3). `GameMenuLayer`获得一个弱引用的`GameScene*`属性


    ```

    @class GameScene;


    @interface GameMenuLayer : CCNode


    @property (weak) GameScene* gameScene;


    @end

    ```


    注意使用了`@class GameScene;`这一行。它告知编译器`GameScene`是一个Objective-C类，而无需导入其头文件。在Objective-C的头文件中，尽可能优先使用`@class`而非`#import`是一个好习惯。这能最大限度地降低循环导入的风险——其最简单的形式是：接口A声明了一个指向类B的属性并导入了头文件B，同时接口B声明了一个指向类A的属性并导入了头文件A。当出现循环导入时，编译器会完全混淆，并报出未知类型名错误。


    您仍然需要在`GameMenuLayer.m`实现文件中`#import`相应类的头文件，这一点已在[***Listing 6-1***](#part0015.html#list1)中完成。但能够将`#import`从头文件（接口）移动到实现文件是防止循环导入的最佳策略。


    **注意**：对于`@property`，存储标识符不带前导下划线。因此，属性使用`weak`，而实例变量使用`__weak`。我也经常看到开发者使用`assign`存储标识符，可能是因为他们遵循了过时的教程。对于启用ARC的应用，`assign`关键字等同于`unsafe_unretained`，它既不会保留引用，也不会在对象释放时将其设置为`nil`，从而留下一个野指针，可能导致`EXC_BAD_ACCESS`崩溃。对于启用ARC的应用，对于属性和实例变量，您应几乎只使用`weak`存储标识符，或者不写（默认为`strong`）存储标识符。


    现在，您只需要在`GameScene.m`的`didLoadFromCCB`方法中将`self`赋值给`gameScene`属性，如[***Listing
    6-4***](#part0015.html#list4)所示。


    [***Listing 6-4***](#part0015.html#_list4). 将`self`赋值给`GameMenuLayer`的`gameScene`属性


    ```

    -(void) didLoadFromCCB

    {

        _gameMenuLayer.gameScene = self;


    // remaining code omitted...

    }

    ```


    **警告**：`didLoadFromCCB`方法按反向层级顺序运行。这意味着子节点的`didLoadFromCCB`总是在其父节点的`didLoadFromCCB`之前运行。在这种情况下，`_gameMenuLayer`是`GameScene`节点的子节点。这意味着`_gameMenuLayer.gameScene`属性是在`GameMenuLayer`的`didLoadFromCCB`方法运行之后才被赋值的。因此，`GameMenuLayer`中需要有效`_gameScene`引用的代码必须延迟执行——例如，直到`onEnter`方法运行时。


    如果您快速需要一个对`GameScene`自定义类的引用，也可以使用以下代码片段从除节点的`init`和`didLoadFromCCB`方法之外的任何位置获取引用，因为在这些方法中，`self.scene`仍然为`nil`：


    ```

    GameScene* gameScene = (GameScene*)self.scene.children.firstObject;

    ```


    ## 显示和移除弹出菜单


    在Xcode中，让我们在您实际创建相应的CCB文件之前，继续实现一些代码。目标是按名称显示一个弹出屏幕——在本例中，是在点击暂停按钮时显示暂停菜单弹出层。


    在`GameMenuLayer.m`中，更新`shouldPauseGame`方法，如[***Listing 6-5***](#part0015.html#list5)所示。


    [***Listing 6-5***](#part0015.html#list5). 显示暂停弹出菜单


    ```

    -(void) shouldPauseGame

    {

        [_gameScene showPopoverNamed:@"UserInterface/Popovers/PauseMenuLayer"];

    }

    ```


    这调用了一个尚未在`GameScene`类中定义的方法`showPopoverNamed:`。由于我们还需要移除弹出菜单，因此使用[***Listing 6-6***](#part0015.html#list6)中高亮显示的方法声明来更新`GameScene.h`接口。


    [***Listing 6-6***](#part0015.html#list6). 声明用于显示和移除弹出层的方法


    ```

    #import "CCNode.h"


    @interface GameScene : CCNode<CCPhysicsCollisionDelegate,CCBAnimationManagerDelegate>


    -(void) showPopoverNamed:(NSString*)popoverName;

    -(void) removePopover;


    @end

    ```


    在类的`@interface`部分声明方法允许这些方法从其他类中调用，而不会引发编译器警告。


    现在，在`GameScene.m`中添加[***Listing 6-7***](#part0015.html#list7)中的`showPopoverNamed:`方法。将其添加到文件的最底部，紧接在`@end`行之上。


    [***Listing 6-7***](#part0015.html#list7). 显示弹出菜单


    ```

    -(void) showPopoverNamed:(NSString*)name

    {

        if (_popoverMenuLayer == nil)

        {

            GameMenuLayer* newMenuLayer = (GameMenuLayer*)[CCBReader load:name];

            [self addChild:newMenuLayer];


            _popoverMenuLayer = newMenuLayer;

            _popoverMenuLayer.gameScene = self;


            _gameMenuLayer.visible = NO;

            _levelNode.paused = YES;

        }

    }

    ```


    检查`_popoverMenuLayer`是否为`nil`可确保同一时间只存在一个可见的弹出菜单，即使该方法因意外情况连续运行两次。然后使用`CCBReader
    load:`方法按名称加载CCB。返回值被转换为`GameMenuLayer*`，这假设所有弹出菜单都使用`GameMenuLayer`作为其自定义类。然后，在将`newMenuLayer`赋值给实例变量`_popoverMenuLayer`之前，将其添加为子节点。


    您可能想知道：“为什么不直接赋值给`_popoverMenuLayer`，然后移除局部变量`newMenuLayer`？”原因是`_popoverMenuLayer`被声明为`__weak`，因此它不会保留任何赋值给它的引用。但当`CCBReader
    load:`返回时，即使只有很短的时间，也没有强引用持有返回的节点。因此，ARC会释放该节点，并将`_popoverMenuLayer`引用设置为`nil`，甚至会在下一行`addChild:`运行之前发生！准确地说：在调试配置中，根据设备不同，它可能工作也可能不工作，但在发布配置中肯定不工作。


    **提示**：我建议在`addChild:`行之前直接添加一行`NSAssert`来验证`newMenuLayer`不为`nil`。弹出层可能位于不同的文件夹，CCB名称中可能有拼写错误，或者弹出层CCB文件根本尚未创建或发布。这些是常见且经常重复出现的问题，不仅限于此示例游戏。尽早尝试捕获这些问题是一个好主意。


    与之前的`_gameMenuLayer.gameScene`类似，`_popoverMenuLayer.gameScene`被赋值为`self`，以允许`GameMenuLayer`类内部的方法向`GameScene`实例发送消息。'
  raw: 'You will also add a _popoverMenuLayer reference that will be used as the reference
    to the currently displayed popover layer drawn over the current level while the
    level is paused. The popover layers for this game are displayed when the player
    dies, the player makes it to the exit, or the pause button is tapped to bring
    up the pause menu.


    [***Listing 6-2***](#part0015.html#_list2). Adding the _gameMenuLayer ivar to
    GameScene.m


    ```

    #import "GameScene.h"

    #import "Trigger.h"

    #import "GameMenuLayer.h"


    @implementation GameScene

    {

        // existing ivars omitted for brevity ...


    __weak GameMenuLayer* _gameMenuLayer;

        __weak GameMenuLayer* _popoverMenuLayer;

    }

    ```


    Now you can build an run the project to confirm that it launches without errors.
    Check the log for the *YAY!* message upon load to confirm that a GameMenuLayer
    instance has been created. Clicking the pause button should also log the message
    in the shouldPauseGame selector of [Listing 6-1](#part0015.html#list1).


    Assigning a GameScene Reference to GameMenuLayer


    You’ve already assigned a reference to the GameMenuLayer class to the _gameMenuLayer
    ivar in the GameScene class. But you will also need a back reference to the GameScene
    instance in the GameMenuLayer class. For that, you need a GameScene* property
    in the GameMenuLayer class.


    Open GameMenuLayer.h, and add the code highlighted in [Listing 6-3](#part0015.html#list3)
    to add a weak reference named gameScene as a property.


    [***Listing 6-3***](#part0015.html#_list3). GameMenuLayer gets a weak GameScene*
    property


    ```

    @class GameScene;


    @interface GameMenuLayer : CCNode


    @property (weak) GameScene* gameScene;


    @end

    ```


    Note the use of the @class GameScene; line. It tells the compiler that GameScene
    is an Objective-C class without having to import it. It is good practice to prefer
    @class in Objective-C headers over #import whenever possible. This minimizes the
    risk of circular imports, which in its simplest form is an interface A that declares
    a property to class B and imports header B, while interface B declares a property
    to class A and imports header A. The compiler gets all confused and spits out
    unknown type name errors when you have a circular import.


    You still have to #import the corresponding class’ header file in the GameMenuLayer.m
    implementation file, which was done in [Listing 6-1](#part0015.html#list1). But
    being able to move the #import from the header (interface) file to the implementation
    file is the best strategy to prevent circular imports.


    **Note**  For @property, the storage identifiers are written without the leading
    underscores. Hence, it is weak for properties and __weak for ivars. I’ve also
    frequently seen developers use the assign storage identifiers, perhaps because
    they were following outdated tutorials. The assign keyword for ARC-enabled apps
    is the same as unsafe_unretained, which will not retain the reference nor set
    it to nil when it deallocates, leaving a dangling pointer and a potential EXC_BAD_ACCESS
    crash. For ARC-enabled apps, you should almost exclusively use weak storage identifiers
    or no (defaults to strong) storage identifiers for properties and ivars.


    Now you only need to assign self to the gameScene property in didLoadFromCCB in
    GameScene.m as seen in [Listing 6-4](#part0015.html#list4).


    [***Listing 6-4***](#part0015.html#_list4). Assigning self to the GameMenuLayer’s
    gameScene property


    ```

    -(void) didLoadFromCCB

    {

        _gameMenuLayer.gameScene = self;


    // remaining code omitted...

    }

    ```


    **Caution**  The didLoadFromCCB method runs in reverse hierarchical order. This
    means a child’s didLoadFromCCB will always run before the didLoadFromCCB of its
    parent. In this case, _gameMenuLayer is a child of the GameScene node. This means
    that the _gameMenuLayer.gameScene property is assigned after GameMenuLayer’s didLoadFromCCB
    method runs. Code in GameMenuLayer that requires a valid _gameScene reference
    must be deferred—for instance, until the onEnter method runs.


    If you quickly need a reference to the GameScene custom class, you can also use
    this code snippet to get a reference from anywhere except a node’s init and didLoadFromCCB
    methods, because self.scene is still nil at that point:


    ```

    GameScene* gameScene = (GameScene*)self.scene.children.firstObject;

    ```


    Showing and Removing Popover Menus


    While you’re in Xcode, let’s move ahead and implement some code before you’ve
    actually created the corresponding CCB files. The goal is to show a popover screen
    by its name—in this case, the pause menu popover when the pause button is tapped.


    In GameMenuLayer.m, update the shouldPauseGame method as shown in [Listing 6-5](#part0015.html#list5).


    [***Listing 6-5***](#part0015.html#_list5). Showing the pause popover menu


    ```

    -(void) shouldPauseGame

    {

        [_gameScene showPopoverNamed:@"UserInterface/Popovers/PauseMenuLayer"];

    }

    ```


    This calls a yet-to-be-defined method, showPopoverNamed: in the GameScene class.
    Since we’ll also need to remove a popover menu, update the GameScene.h interface
    with the method declarations highlighted in [Listing 6-6](#part0015.html#list6).


    [***Listing 6-6***](#part0015.html#_list6). Declaring methods for showing and
    removing popovers


    ```

    #import "CCNode.h"


    @interface GameScene : CCNode<CCPhysicsCollisionDelegate,CCBAnimationManagerDelegate>


    -(void) showPopoverNamed:(NSString*)popoverName;

    -(void) removePopover;


    @end

    ```


    Declaring methods in the @interface section of a class allows these methods to
    be called from other classes without raising a compiler warning.


    Now add the showPopoverNamed: method in [Listing 6-7](#part0015.html#list7) to
    GameScene.m. Add it at the very bottom of the file, just above the @end line.


    [***Listing 6-7***](#part0015.html#_list7). Showing a popover menu


    ```

    -(void) showPopoverNamed:(NSString*)name

    {

        if (_popoverMenuLayer == nil)

        {

            GameMenuLayer* newMenuLayer = (GameMenuLayer*)[CCBReader load:name];

            [self addChild:newMenuLayer];


    _popoverMenuLayer = newMenuLayer;

            _popoverMenuLayer.gameScene = self;


    _gameMenuLayer.visible = NO;

            _levelNode.paused = YES;

        }

    }

    ```


    Checking that _popoverMenuLayer is nil ensures there can be only one visible popover
    menu at a time, even if the method runs twice in succession by accident. Then
    the CCBReader load: method is used to load the CCB by its name. The return value
    is cast to GameMenuLayer*, which assumes that all popover menus use GameMenuLayer
    as their custom class. The newMenuLayer is then added as a child before it is
    assigned to the ivar _popoverMenuLayer.


    You may wonder, “Why not assign directly to _popoverMenuLayer and remove the local
    variable newMenuLayer?” The reason is that _popoverMenuLayer is declared __weak,
    so it will not retain any references assigned to it. But when CCBReader load:
    returns, there is, if only for a short time, no strong reference holding on to
    the returned node. Therefore, ARC is going to release the node and set the _popoverMenuLayer
    reference to nil even before the next line with addChild: runs! To be precise:
    it may or may not work, depending on the device in debug configurations, but it
    will certainly not work in release configurations.


    **Tip**  I recommend adding an NSAssert line directly before the addChild: line
    to verify that newMenuLayer is not nil. The popover might be in a different folder,
    there might be a typo in the CCB’s name, or the popover CCB file simply wasn’t
    created or published yet. Those are common and often repeatedly occuring issues,
    not just in this example game. It’s a good idea to try and catch those early.


    Like the _gameMenuLayer.gameScene before, the _popoverMenuLayer.gameScene is assigned
    to self, to allow methods inside the GameMenuLayer class to send messages back
    to the GameScene instance.'
