  trans: '

    前往文件 ![image](img/00008.jpeg) 新建 ![image](img/00008.jpeg) 文件，或在预览区下方的项目导航窗格中右击，从上下文菜单中选择新建文件，以创建一个新的
    SpriteBuilder 文档文件，也称为 `CCB 文件`。选择 `Scene` 类型，并输入 `GameScene.ccb` 作为文件名（如图 2-4
    所示），然后点击**创建**按钮。


    ![9781484202630_Fig02-04.jpg](img/00012.jpeg)


    图 2-4. 创建 `GameScene.ccb`


    准确来说，新建一个 `CCB 文件` 时，你可以从五种不同类型中选择。以下是它们的用途和主要区别的快速概述：


    - **Scene（场景）：** 一个可呈现的场景。与你可能预期的相反，它的根节点是 `CCNode`，而不是 `CCScene`。它与 `Node` 类型的主要区别在于，它默认会在
    SpriteBuilder 中围绕自身显示一个漂亮的设备边框。

    - **Node（节点）：** 本质上与 `Scene` 相同，但它没有设备边框，且根节点为 `CCNode` 类。

    - **Layer（层）：** 唯一一个可以设置内容大小的 `CCB 文件`类型。这使其成为任何固定尺寸图层的理想选择。同样，它的根节点属于 `CCNode`
    类。

    - **Sprite（精灵）：** 由于精灵在游戏中非常常见，这种 `CCB 文件` 的根节点是 `CCSprite`。除此之外，它与 `Node` 类型相同。

    - **Particles（粒子）：** 与 `Sprite` 类型相同，只是其根节点使用了 `CCParticleSystem` 类。


    **注意** 从技术上讲，所有 `CCB 文件` 类型都可以互换使用。`Scene`、`Node` 和 `Layer` 之间的主要区别在于术语以及它们在 SpriteBuilder
    中的显示方式。`Layer` 类型是唯一允许用户自定义内容大小的类型。只有当内容需要固定、自定义的大小时（例如游戏关卡或固定大小的覆盖菜单），才需要在 `Node`
    或 `Scene` 之上使用 `Layer`。


    `GameScene.ccb` 将以 iPhone 设备边框的形式呈现，不含任何内容（黑屏）。是时候为其填充一些内容了。


    ### 查看节点库


    在资源导航窗格（左侧），点击节点库视图标签。这将弹出一个列表，其中包含可以拖放到舞台上的项目。这些项目大多是节点，继承自 Cocos2d 的基类 `CCNode`。其他类型的项目是物理引擎使用的关节。在图
    2-5 中，你将找到在编写本文时可用的所有节点列表。


    ![9781484202630_Fig02-05.jpg](img/00013.jpeg)


    图 2-5. SpriteBuilder 中的可用节点列表


    我将快速介绍各种节点类型及其用途：


    - **Node（节点）：** 一个不可见的节点，用于分组（或“分层”）其他节点。可以将它们想象成包含相关项目的文件夹。这会影响绘制顺序，并且在代码中更容易访问相关项目，或者在
    SpriteBuilder 时间线中排序、移动或折叠节点时非常有用。

    - **Sub File（子文件）：** 用于嵌入另一个 `CCB 文件` 的占位符。这是一个非常强大的节点，因为它允许你将其他 `CCB 文件` 作为模板使用，并创建和编辑一个被多次使用（实例化）的单一
    `CCB 文件`。将 `CCB 文件` 拖放到舞台上将自动创建一个 `Sub File` 节点。

    - **Physics Node（物理节点）：** 这代表物理世界。任何启用了物理效果的节点必须是 `Physics Node` 的子节点或孙节点，否则最终将不会启用物理效果。通常，每个场景只应使用一个
    `Physics Node`。多个物理世界是可能的，但它们的子节点将无法相互交互。

    - **Color and Gradient Node（颜色与渐变节点）：** 瞧瞧这些颜色！本质上，这些只是没有图像的精灵。它们非常适合快速简易的背景，或作为尚未完成的图形的占位符。

    - **Sprite（精灵）：** 任何 2D 游戏的主要构成元素。使用此工具绘制单个精灵帧、整个纹理或较大纹理的一部分。`Sprite 9 Slice`（九宫格精灵）可用于创建菜单屏幕或按钮的可调整大小背景，但由于
    `Button`（按钮）节点的存在，它已经很少使用。

    - **Particle System（粒子系统）：** 用于爆炸、排烟、火焰剑等效果。它根据定义粒子如何创建、随时间如何变化以及存活多久的参数，来动画化一组粒子。粒子不与物理效果交互，也无法在代码中访问单个粒子。与同等数量的精灵相比，粒子可以更高效地绘制和动画化。

    - **Label TTF 和 BM-Font（TTF 标签和位图字体）：** 用于文本等内容。`TTF` 代表 *Truetype 字体*。它们的优势在于可以使用任何内置的
    iOS 或自定义 `TTF` 字体。缺点是每次文本更改都会在内部创建一个新纹理，这对于分数计数器来说效率较低。`TTF` 字体最适合用于静态文本。对于动画文本，`BM-Fonts`（位图字体）更可取，但必须使用诸如
    Glyph Designer 之类的外部工具创建。

    - **Button（按钮）：** 一个按钮是 `Sprite 9 Slice`（背景图像）和 `Label TTF`（文本）的终极组合，用于创造出这个世界上最棒的东西——差不多是这样。嗯，你可以点击它，它可以在代码中发送一条消息，如果你设置得当，它甚至不会崩溃，反而会实际运行一些代码！

    - **Text Field（文本字段）：** 一个可编辑的标签。用户可以点击它并输入一些文本，你的代码会在文本编辑结束时，甚至每次文本更改时收到一条消息。

    - **Slider（滑块）：** 用户可以将滑块手柄向左或向右移动。你的代码会在滑块被拖动时收到一条消息。从技术上讲，它始终在 `0.0` 到 `1.0`
    的数值范围内操作。

    - **Scroll View（滚动视图）：** 尽管名称如此，但它并非用于创建滚动的游戏世界。它的设计目的是让用户拖动和移动，并创建类似于在照片库中浏览照片时的滚动和吸附效果。稍后你将使用
    `Scroll View` 来创建关卡选择界面。

    - **Box Layout（盒式布局）：** 使均匀排列节点这项繁琐的工作变得轻而易举。你可以将子节点水平或垂直对齐，但遗憾的是，尽管其名称如此，它本身无法将子节点排列成多行多列的网格。然而，你可以使用一个水平
    `Box Layout`，其中包含多个垂直 `Box Layout` 节点作为子节点，每个垂直 `Box Layout` 节点再包含各列中的节点——或者反过来，将水平和垂直对齐的
    `Box Layout` 节点互换。

