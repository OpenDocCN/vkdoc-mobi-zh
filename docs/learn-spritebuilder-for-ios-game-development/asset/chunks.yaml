  trans: "\n当你在玩家角色的“物理属性”标签页中时，将物理形状改为圆形，并将**圆角半径**设为 32 点。其他设置保持不变，特别是应选中**动态**选项。最终设置应与图\
    \ 4-1 相同。\n\n![9781484202630_Fig04-01.jpg](img/00060.jpeg)\n\n图 4-1. 玩家精灵的物理属性设置\n\
    \n现在可以开始体验乐趣了：发布、构建并运行应用。你会注意到，由于物理引擎施加的重力，玩家角色会立即开始下落。不过，你仍然可以点击屏幕，让玩家角色移动到点击位置。但你无法阻止玩家角色持续加速下落。这是怎么回事？\n\
    \n## 移动与旋转动作与物理引擎冲突\n\n在内部，即使节点正在被移动动作驱动，重力也会持续累积并增加物体的速度。最终，移动动作停止，物理引擎重新接管控制权。\n\
    \n这是将动作与物理引擎结合使用时产生的副作用。更准确地说，影响节点位置或旋转属性的动作不应在动态物体上使用。这些动作会覆盖物理引擎对于位置和旋转的属性，同时（至少暂时）忽略物体的速度。\n\
    \n在某些情况下，移动和旋转动作看似有效，但最终产生的碰撞行为可能与你预期的不符，因为动作施加的移动并未反映在节点的内部状态中，或与其发生冲突。例如，移动动作不会因为途中发生碰撞而停止；相反，它会持续将节点逐步移动穿过碰撞区域，物理引擎则会在每一帧尽力解决这种冲突，从而引发各种问题。\n\
    \n因此，移动启用了物理引擎的节点，应完全通过向节点施加力或使用关节来实现。静态物体是此规则的例外。你可以使用移动和旋转动作（甚至 SpriteBuilder\
    \ 时间轴）来对静态物体进行动画处理，并且它们会表现出正确的物理行为。我将在第 5 章：*时间轴与触发器*中对此进行更详细的说明。\n\n还有纯粹的可视化或功能性动作，例如改变节点颜色或运行代码块。这些动作仍然可以在具有物理体的节点上不加区分地使用。\n\
    \n**注意** 如果你好奇为什么移动和旋转动作不能与物理引擎结合使用，不妨想象一片随风飘动的树叶。通常，像树叶这样轻盈的物体在碰到其他物体会停止。树叶质量很低，因此不会对与之碰撞的物体施加显著的力。但是，如果你使用移动动作让树叶沿着从\
    \ A 到 B 的直线路径移动，它将能够穿过更重或不可穿透的物体。那么在这种情况下，正确的物理行为应该是什么？\n\n树叶最终应该推倒它所撞击的墙壁吗？它应该被允许穿透物体到达预定位置吗？还是它应该停在墙壁处，但因为试图继续前进直到到达目的地（或直到动作结束）而粘在墙上？这意味着树叶可能永远无法到达目的地？\n\
    \n解决这个问题没有唯一正确的方法。事实上，所有可能的变通方案都是错误的。有些方案只在考虑非常有限的条件或特定期望时显得更正确，但并没有普遍可接受的解决方案。\n\
    \n## 通过物理引擎移动玩家角色\n\n由于具有动态 `physicsBody` 的启用物理引擎的节点不应执行任何移动、旋转、缩放或倾斜动作，因此你需要用合适的物理移动来替换移动动作。\n\
    \n触摸事件需要从触摸开始时立即执行移动动作，改为仅仅更改一个标志。如果这个标志被设置，它将导致从 `update:` 方法中调用的一个函数来向给定方向加速玩家角色。\n\
    \n在 `GameScene.m` 文件中，在 `@implementation` 括号内添加以下四个实例变量，如代码清单 4-1 所示。\n\n***代码清单\
    \ 4-1***。物理移动所需的额外实例变量\n\n```\n@implementation GameScene\n{\n    __weak CCNode*\
    \ _levelNode;\n    __weak CCNode* _physicsNode;\n    __weak CCNode* _playerNode;\n\
    \    __weak CCNode* _backgroundNode;\n\n    CGFloat _playerNudgeRightVelocity;\n\
    \    CGFloat _playerNudgeUpVelocity;\n    CGFloat _playerMaxVelocity;\n    BOOL\
    \ _acceleratePlayer;\n}\n```\n\n现在找到 `touchBegan:withEvent:` 方法，并将其内容替换如下：\n\n\
    ```\n-(void) touchBegan:(UITouch *)touch withEvent:(UIEvent *)event\n{\n    _acceleratePlayer\
    \ = YES;\n}\n```\n\n这启用了“用户当前正在触摸屏幕”模式。\n\n当然，你还需要结束此模式。为此，你需要添加 `touchesEnded:`\
    \ 和 `touchesCancelled:` 方法，如代码清单 4-2 所示。\n\n***代码清单 4-2***。当没有活跃触摸时停止加速\n\n```\n\
    -(void) touchEnded:(UITouch *)touch withEvent:(UIEvent *)event\n{\n    _acceleratePlayer\
    \ = NO;\n}\n\n-(void) touchCancelled:(UITouch *)touch withEvent:(UIEvent *)event\n\
    {\n    [self touchEnded:touch withEvent:event];\n}\n```\n\n取消变种很少被发送——例如，当手势识别器识别出一个触摸模式时。但当它被调用时，重要的是其行为必须与\
    \ `touchEnded:` 相同，否则即使用户手指不在屏幕上，玩家角色也会卡在加速模式中。\n\n**提示** 我没有在 `touchCancelled:`\
    \ 中复制 `touchEnded:` 的功能，而是直接转发消息。在这个例子中，两种方式都是一行代码，但一般来说，避免多次编写相同代码是一种好习惯。这被称为\
    \ *DRY 原则*：不要重复自己。它是唯一最重要的编程原则，甚至比“过早优化是万恶之源”更为重要，这一点你可能不知道。过早优化可以这样描述：先让程序能运行——再让它正确——最后让它快起来。按这个顺序。但这有点离题了。如果你愿意做练习，可以在网上搜索这些短语并阅读一些顶级的文章。\n\
    \n现在，`update:` 方法也需要修改，只要 `_acceleratePlayer` 实例变量为 `YES`，就调用 `accelerateTarget:`\
    \ 方法。这在代码清单 4-3 中显示。\n\n***代码清单 4-3***。根据需要加速玩家节点\n\n```\n-(void) update:(CCTime)delta\n\
    {\n    if (_acceleratePlayer)\n    {\n        [self accelerateTarget:_playerNode];\n\
    \    }\n\n    [self scrollToTarget:_playerNode];\n}\n```\n\n这里，在滚动之前加速玩家非常重要，因为滚动需要玩家更新后的位置。如果你反过来操作，通常也能工作，但滚动会滞后于玩家实际位置一帧。这会导致视图跟随玩家时出现微小但可能可察觉的延迟，仿佛在玩家位置后面拖拽。\n\
    \n另外请注意，这两个方法都将 `_playerNode` 作为输入参数，而不是仅仅依赖方法内部可访问的 `_playerNode` 实例变量。这样做的目的是在不增加额外成本的情况下，尽可能使方法具有灵活性。设想你可能想要以同样的方式加速第二个玩家节点。你只需用不同的节点调用\
    \ `accelerateTarget:` 两次即可。或者，如果玩家已经退出关卡，但摄像机仍需继续滚动到关卡中的预定义位置怎么办？你可以将发送给 `scrollToTarget:`\
    \ 方法的参数从 `_playerNode` 更改为位于或正在移动到目标位置的节点。\n\n### 加速玩家角色\n\n现在，在 `update:` 方法下方添加代码清单\
    \ 4-4 中的代码。`accelerateTarget:` 方法将通过改变玩家精灵 `physicsBody` 组件的速度来移动它。\n"
- fmt: '# Listing 4-4 - Moving a target node by changing its velocity


    ```

    -(void) accelerateTarget:(CCNode*)target

    {

        // Temporary variables

        _playerMaxVelocity = 350.0;

        _playerNudgeRightVelocity = 30.0;

        _playerNudgeUpVelocity = 80.0;


    CCPhysicsBody* physicsBody = target.physicsBody;


    if (physicsBody.velocity.x < 0.0)

        {

            physicsBody.velocity = CGPointMake(0.0, physicsBody.velocity.y);

        }


    [physicsBody applyImpulse:CGPointMake(_playerNudgeRightVelocity,

                                              _playerNudgeUpVelocity)];


    if (ccpLength(physicsBody.velocity) > _playerMaxVelocity)

        {

            CGPoint direction = ccpNormalize(physicsBody.velocity);

            physicsBody.velocity = ccpMult(direction, _playerMaxVelocity);

        }

    }

    ```


    The variables prefixed with `_player` are assigned some values at the top. You
    will soon replace them with custom properties to make them editable right within
    SpriteBuilder. For now, these assignments just exist to make the code functional.


    Let’s dissect the core of the method:


    ```

    CCPhysicsBody* physicsBody = target.physicsBody;

    ```


    The target’s `CCPhysicsBody` instance is stored in a local variable. This makes
    the code easier to read, shorter, and minimally faster compared to using `target.physicsBody.velocity`
    every time you need to read from or assign to velocity, for instance. The main
    benefit here is clearly readability; improved performance is only a very, very
    minor but nevertheless positive side-effect.


    Since the game is all about moving from left to right, any already inherent “leftward”
    movement in a negative *x* axis direction is canceled when in movement mode by
    setting the *x* component of the `physicsBody.velocity` to 0:


    ```

    if (physicsBody.velocity.x < 0.0)

    {

        physicsBody.velocity = CGPointMake(0.0, physicsBody.velocity.y);

    }

    ```


    The node may very well be moving to the left—for instance, because external forces
    pushed it to the left or simply because it is rolling down a slope that’s slanted
    toward the left. The user isn’t always touching the screen, and while she isn’t,
    the player’s body is free to go wherever it wants to go. But once the user touches
    the screen, you don’t want her having to tap for longer than usual just to cancel
    out a possible leftward-oriented velocity. At the same time, repeated or continued
    taps should be allowed to increase the horizontal speed toward the right.


    **Caution**  It’s worth noting that the velocity is a `CGPoint` data type. `CGPoint`
    is a C struct, not an object reference (pointer). The same is true for `CGSize`
    and `CGRect` data types. This is why it is required to use `CGPointMake` rather
    than just assigning `physicsBody.velocity.x = 0.0;`. That code would generate
    a compile error: “Expression is not assignable.” That’s because a struct field
    like `velocity.x` isn’t a property in the Objective-C sense—it has no property
    setter method.


    The `applyImpulse:` method uses the previously defined nudge variables as the
    impulse vector. Internally, `applyImpulse:` updates the body’s velocity by multiplying
    the impulse with the inverse of the body’s mass:


    ```

    [physicsBody applyImpulse:CGPointMake(_playerNudgeRightVelocity,

                                          _playerNudgeUpVelocity)];

    ```


    You can think of an impulse to be like the impact of a billiard queue on the cue
    ball. You can do it gently, or you can do it with force. Essentially, an *impulse*
    is force applied at a specific point in time. The effect of an impulse depends
    solely on the body’s mass—if you increase the body’s mass, the same impulse will
    accelerate the body less than it did before.


    If you want to apply an impulse that ignores the body’s mass, you simply alter
    the `physicsBody.velocity` property directly.


    A related concept to applying an impulse is applying a force. A *force* is an
    impulse applied continuously. Taking the previous billiard example, if hitting
    the cue ball is akin to applying a force, the cue ball would continue to accelerate
    over time. A force should be met with an opposing force such as friction or an
    on/off switch (for example, a rocket accelerates until it’s out of fuel) to keep
    the physics simulation reasonably balanced. You don’t often see things continue
    to accelerate past supersonic speeds in the real world. Unless you work in the
    aerospace industry, of course.


    **Note**  In this example, the `CCPhysicsNode` (the player’s parent node) has
    a default gravity force set in its properties. Default gravity will continue to
    accelerate the player downward, unless you combat the effect by applying an upward-oriented
    impulse.


    ## Imposing a Speed Limit on the Player


    The last block of code checks whether the `physicsBody.velocity` has exceeded
    a safe value, and if it has, changes the velocity to the maximum speed while preserving
    the direction:


    ```

    if (ccpLength(physicsBody.velocity) > _playerMaxVelocity)

    {

        CGPoint direction = ccpNormalize(physicsBody.velocity);

        physicsBody.velocity = ccpMult(direction, _playerMaxVelocity);

    }

    ```


    Normalizing the velocity turns it into a unit vector; a vector whose length is
    1 but keeps pointing in the same direction as the original. Multiplying this vector
    by `_playerMaxVelocity` makes velocity’s length equal to `_playerMaxVelocity`
    while still pointing in the same direction. This effectively prevents the speed
    from exceeding `_playerMaxVelocity`. Without this code fragment, the user could
    keep a finger on the screen to make the player accelerate indefinitely.


    **Tip**  The `ccpLength`, `ccpNormalize` and `ccpMult` C functions are all declared
    in the `CGPointExtension.h` file, alongside other 2D vector functions. To quickly
    access their declaration, right-click anywhere on a keyword in the Xcode editor
    and select “Jump to Definition” from the context menu. Try it now with whatever
    keywords, variables, properties, etc. you’re interested in. You’ll notice it doesn’t
    just reveal the origins but also brings you to related code fragments and documentation
    comments. This is a great way to learn more about the code you’re using.


    By now, you may be wondering what unit velocity is. It’s measured in points per
    second (pt/s). If you wanted to move a body from the left to the right side of
    a landscape iPad game in one second over a distance of 1024 points, the *x* velocity
    of that body would have to be, you guessed it, 1024.


    Give this a shot now. Publish, build, and run the project. You can now move the
    player in a parabola curve. Up and down, up and down. Gravity keeps pulling the
    player down. Tapping the screen will move the player upward and to the right.
    You can move over the full extent of the level, but the player character can still
    leave the level’s boundaries and vanish.


    ## Expose Design Values as Custom Properties


    Now, about those temporary variable assignments. Remove the four lines shown in
    Listing 4-5 from the `accelerateTarget:` method.


    **Listing 4-5** - These variable assignments are no longer needed


    ```

    // Temporary variables

    _playerMaxVelocity = 350.0;

    _playerNudgeRightVelocity = 30.0;

    _playerNudgeUpVelocity = 80.0;

    ```


    **Note**  Keep the ivars declared just below the `@implementation` of the `GameScene`—the
    ones shown in Listing 4-1. You’ll still need those.


    It’s a good idea to make design parameters like the preceding one nudge and to
    make maximum velocities editable in SpriteBuilder. This is especially true if
    you plan on doing as little programming as possible, or if you want a nonprogramming
    person (sometimes referred to as *designer* or *artist*) to be able to modify
    design values.'
