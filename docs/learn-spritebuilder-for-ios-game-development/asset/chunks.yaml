    will be faster because the bitmap font can draw all glyphs from the same texture,
    whereas the TrueType label uses a unique texture for each label. This also affects
    memory usage—with few labels, TrueType fonts may require less memory, but each
    additional TrueType font label eats up significantly more memory than additional
    bitmap font labels using the same font.


    Also, if the text of a TrueType font changes, a new texture needs to be created
    with the new text rendering. It’s the throwing away the old texture and replacing
    it with a new one part that makes TrueType labels particularly unfitting for text
    that frequently changes. The larger the area occupied by the label, the longer
    it takes to update its text.


    So while you can make decent menus with TrueType fonts and get to choose from
    a great variety of fonts, for any in-game UI text that changes frequently (scores,
    lives, timers, unit names, etc.), you should consider using bitmap fonts. In fact,
    the performance hit of a TrueType font label can be so severe that updating even
    a single timer label every second can cause the game to hiccup slightly when the
    label is updated.


    But the usual premature-optimization caveat applies: if you don’t experience any
    performance or memory issues, choose whatever type of font works well enough to
    do the job.


    Creating and Importing a Bitmap Font


    To create a bitmap font, you’ll typically use a tool made for the job. The most
    popular tools on OS X are Glyph Designer and bmGlyph, which cost in the range
    of $10 to $30\. Both tools can export the format supported by Cocos2D, which is
    an .fnt file alongside a .png file of the same name. If your tool allows you to
    choose the encoding for the .fnt file, choose text and not XML.


    The .fnt format is a plain-text format; you can open it with any text editor.
    Unfortunately, the extension *.fnt* is used by a number of different formats.
    To verify that an .fnt file you created or downloaded is in the correct format,
    the first couple lines should look very similar to the ones in [Listing 11-16](#part0022.html#list16).
    If your file looks very different from this, it’s probably not in a format that
    Cocos2D understands. You may need to re-export the file or use a different glyph
    tool.


    [***Listing 11-16***](#part0022.html#_list16). An excerpt of an .fnt file when
    viewed in a text editor (indentation is not representative)


    ```

    info face="Fixed" size=64 bold=0 italic=0 charset="" unicode=0

         stretchH=100 smooth=1 aa=1 spacing=2,2

    common lineHeight=84 base=82 scaleW=1024 scaleH=512 pages=1 packed=0

    page id=0 file="gd.png"

    chars count=95

    char id=32 x=424 y=277 width=0 height=0 xoffset=0 yoffset=80

         xadvance=38 page=0 chnl=0 letter="space"

    char id=33 x=268 y=214 width=21 height=58 xoffset=26 yoffset=11

         xadvance=46 page=0 chnl=0 letter="!"

    ...

    ```


    While all tools can export in the .fnt format that Cocos2D understands, SpriteBuilder
    has additional requirements that some glyph tools may not adhere to. SpriteBuilder
    requires the bitmap font to be supplied in four resolutions, which typically implies
    different scaling for each font.


    Assuming you created a single font named *gd.fnt* with an accompanying *gd.png*,
    you can make this font compatible with SpriteBuilder by creating a folder named
    ***gd.bmfont***. Inside that folder, create four additional subfolders named ***resources-phone***,
    ***resources-phonehd***, ***resources-tablet***, and ***resources-tablethd***.
    Then add a copy of the *gd.fnt* and *gd.png* files to each resources subfolder.
    The resulting structure should be like the one in [Figure 11-14](#part0022.html#Fig14).


    ![9781484202630_Fig11-14.jpg](images/00175.jpeg)


    [Figure 11-14](#part0022.html#_Fig14). SpriteBuilder requires bitmap fonts to
    be in a .bmfont folder with additional subfolders


    **Caution**  Be sure to use the same name (excluding the extension) for the *.bmfont*
    folder and the actual font files. If you were to rename *gd.bmfont* to *myfont.bmfont*,
    the font would no longer work because SpriteBuilder would be looking for *myfont.fnt*
    and *myfont.png* files.


    However, you’ll probably want the bitmap font to have a different scaling for
    each resolution. There are two variants that will work well for SpriteBuilder
    that resemble the two scaling options available in SpriteBuilder: absolute scaling
    (iPad screen is assumed to be 512x384 points) and UI scaling (iPad screen is assumed
    to be the original size of 1024x768 points). The default option should be absolute
    scaling unless you designed your game to use UI scaling throughout. [Table 11-2](#part0022.html#Tab2)
    shows the bitmap font scaling factors for each folder and an example of what this
    means specifically for a given font size of 48 at 100% scaling.


    [Table 11-2](#part0022.html#_Tab2). Bitmap font scaling for each resources folder


    |   | Absolute (iPad screen is 512x384) | UI Scale (iPad screen is 1024x768) |

    | --- | --- | --- |

    | resources-phone | 25% (i.e., Font size: 12) | 50% (i.e., Font size: 24) |

    | resources-phonehd | 50% (i.e., Font size: 24) | 100% (i.e., Font size: 48) |

    | resources-tablet | 50% (i.e., Font size: 24) | 50% (i.e., Font size: 24) |

    | resources-tablethd | 100% (i.e., Font size: 48) | 100% (i.e., Font size: 48)
    |'
  trans: "\n我曾从事游戏翻译工具及流程方面的工作。如果前面列举的内容听起来需要考虑很多方面，我可以告诉你，这只是冰山一角。而且我只是凭记忆回忆了这些问题；可能还遗漏了一些需要思考的事项。\n\
    \n幸运的是，你不需要考虑所有情况，因为并非所有情况都适用于你的应用。作为独立开发者，如果你的应用只有英文版，或者尽管偶尔出现本地化怪癖但能为玩家带来巨大乐趣，那么你更容易获得谅解。然而，如果你试图进行廉价或自动化的翻译，就存在被嘲笑的真正风险。在这种情况下，也许完全不翻译反而更好。\n\
    \n此外，iOS 提供了根据设备语言区域进行本地化格式化字符串的方法。例如，你可以通过将 `NSDate` 传递给 `NSDateFormatter`，来以当前语言区域的格式显示日期。\n\
    \n**提示** 你可以在 Apple 的国际化网站上找到大量实用信息：[`developer.apple.com/internationalization/`](https://developer.apple.com/internationalization/)。\n\
    \n## TrueType 字体 vs. 位图字体\n\n在现代 GUI 操作系统中，扩展名为 `.ttf` 或类似格式的 TrueType 字体几乎被普遍使用。它们的主要优势在于可以缩放到任意尺寸而不会损失质量，因为\
    \ TrueType 字体将字符（也称为*字形*）描述为轮廓。字形的轮廓要么是直线，要么是贝塞尔曲线。通过纯粹的数学方式描述字体中的字形，就可以在不同字号下渲染出轮廓清晰锐利的图形。一个字形也可以用相对较小的数据集来表示，因此\
    \ TrueType 字体通常比位图字体的文件体积更小。\n\n位图字体在游戏中相对常见。它们无法在不损失图像质量的情况下缩放，但渲染速度更快，因为位图字体中的字形只是需要在正确位置绘制的精灵，而不需要由\
    \ CPU 计算每条轮廓和曲线再绘制到帧缓冲区。由于字体是精灵，你还可以使用任何图像作为字形。图 11-13 中 Glyph Designer 的截图完美地展示了这一点。\n\
    \n![9781484202630_Fig11-13.jpg](img/00174.jpeg)\n\n图 11-13. 任何图像都可以用作位图字体中的字形\n\
    \n只要标签文本完全不改变，Cocos2D 中 TrueType 字体和位图字体的渲染性能是相同的。两者都像精灵一样绘制。如果你考虑使用多个标签且字体相同，位图字体将更快，因为位图字体可以从同一纹理中绘制所有字形，而\
    \ TrueType 标签则为每个标签使用独立的纹理。这也会影响内存使用——在标签数量少时，TrueType 字体可能占用更少内存，但每增加一个 TrueType\
    \ 字体标签所消耗的内存，会显著多于使用相同字体的位图字体标签。\n\n此外，如果 TrueType 字体的文本发生变化，则需要创建一个包含新文本渲染的新纹理。正是丢弃旧纹理并替换为新纹理这一过程，使得\
    \ TrueType 标签特别不适合频繁变化的文本。标签所占区域越大，更新其文本所需的时间就越长。\n\n因此，虽然你可以使用 TrueType 字体制作漂亮的菜单，并可以从大量字体种类中选择，但对于游戏中频繁变化的\
    \ UI 文本（如分数、生命值、计时器、单位名称等），你应该考虑使用位图字体。事实上，TrueType 字体的性能影响可能非常严重，即使每秒更新一个计时器标签，也可能在更新时导致游戏轻微卡顿。\n\
    \n但通常的过早优化警示依然适用：如果你没有遇到任何性能或内存问题，请选择任何一种能足够胜任工作的字体类型。\n\n## 创建和导入位图字体\n\n要创建位图字体，通常需要使用专门的工具。OS\
    \ X 上最流行的工具是 Glyph Designer 和 bmGlyph，价格在 $10 到 $30 之间。这两个工具都可以导出 Cocos2D 支持的格式，即一个\
    \ `.fnt` 文件以及一个同名的 `.png` 文件。如果你的工具允许选择 `.fnt` 文件的编码，请选择文本格式而非 XML。\n\n`.fnt`\
    \ 格式是纯文本格式；你可以用任何文本编辑器打开它。不幸的是，`.fnt` 扩展名被多种不同的格式使用。要验证你创建或下载的 `.fnt` 文件格式是否正确，其前几行应看起来与代码清单\
    \ 11-16 中的内容非常相似。如果你的文件与此差别很大，那很可能不是 Cocos2D 能够理解的格式。你可能需要重新导出文件，或者使用不同的字形工具。\n\
    \n**代码清单 11-16.** 在文本编辑器中查看的 `.fnt` 文件摘录（缩进不具代表性）\n\n```\ninfo face=\"Fixed\"\
    \ size=64 bold=0 italic=0 charset=\"\" unicode=0\n     stretchH=100 smooth=1 aa=1\
    \ spacing=2,2\ncommon lineHeight=84 base=82 scaleW=1024 scaleH=512 pages=1 packed=0\n\
    page id=0 file=\"gd.png\"\nchars count=95\nchar id=32 x=424 y=277 width=0 height=0\
    \ xoffset=0 yoffset=80\n     xadvance=38 page=0 chnl=0 letter=\"space\"\nchar\
    \ id=33 x=268 y=214 width=21 height=58 xoffset=26 yoffset=11\n     xadvance=46\
    \ page=0 chnl=0 letter=\"!\"\n...\n```\n\n虽然所有工具都能导出 Cocos2D 能理解的 `.fnt` 格式，但\
    \ SpriteBuilder 有一些额外的要求，某些字形工具可能不满足。SpriteBuilder 要求以四种分辨率提供位图字体，这通常意味着每种字体有不同的缩放比例。\n\
    \n假设你创建了一个名为 `gd.fnt` 的字体及相应的 `gd.png` 文件，你可以通过创建一个名为 `gd.bmfont` 的文件夹来使该字体兼容\
    \ SpriteBuilder。在该文件夹内，再创建四个子文件夹，分别命名为 `resources-phone`、`resources-phonehd`、`resources-tablet`\
    \ 和 `resources-tablethd`。然后将 `gd.fnt` 和 `gd.png` 文件的副本添加到每个资源子文件夹中。最终的结构应如图 11-14\
    \ 所示。\n\n![9781484202630_Fig11-14.jpg](img/00175.jpeg)\n\n图 11-14. SpriteBuilder\
    \ 要求位图字体位于 `.bmfont` 文件夹中，并带有额外的子文件夹\n\n**警告** 确保 `.bmfont` 文件夹和实际字体文件使用相同的名称（不含扩展名）。如果你将\
    \ `gd.bmfont` 重命名为 `myfont.bmfont`，字体将无法正常工作，因为 SpriteBuilder 会查找 `myfont.fnt`\
    \ 和 `myfont.png` 文件。\n\n不过，你可能希望位图字体针对每种分辨率有不同的缩放比例。有两种变体能够很好地适用于 SpriteBuilder，它们对应于\
    \ SpriteBuilder 中可用的两种缩放选项：绝对缩放（iPad 屏幕假定为 512x384 点）和 UI 缩放（iPad 屏幕假定为原始尺寸 1024x768\
    \ 点）。默认选项应为绝对缩放，除非你设计的游戏全程使用 UI 缩放。表 11-2 显示了每个文件夹的位图字体缩放因子，以及针对特定字体大小 48 在 100%\
    \ 缩放下的具体示例。\n\n表 11-2. 每个资源文件夹的位图字体缩放\n\n| | 绝对缩放（iPad 屏幕 512x384） | UI 缩放（iPad\
    \ 屏幕 1024x768） |\n| --- | --- | --- |\n| `resources-phone` | 25%（即字号：12） | 50%（即字号：24）\
    \ |\n| `resources-phonehd` | 50%（即字号：24） | 100%（即字号：48） |\n| `resources-tablet`\
    \ | 50%（即字号：24） | 50%（即字号：24） |\n| `resources-tablethd` | 100%（即字号：48） | 100%（即字号：48）\
    \ |\n"
- fmt: '基本上，当你的字形工具本身不能原生创建与 SpriteBuilder 兼容且带有四个资源文件夹的位图字体时，你需要做的就是创建如[图 11-14](#part0022.html#Fig14)
    所示的文件夹结构。只需要文件夹——暂时无需文件。然后，打开你的字形工具，并以原始字体大小（假设为 48）将字体导出到`resources-tablethd`文件夹。接着，在字形工具中将字体大小改为
    24，并重新导出到`resources-tablet`文件夹，然后再导出到`resources-phonehd`文件夹，以创建缩小 50% 的版本。最后，将字体大小设为
    12，并重新导出到`resources-phone`文件夹。


    结果应如[图 11-14](#part0022.html#Fig14) 所示，其中`gd`是你为字体选择的任意名称。无论你为每个资源文件夹选择何种缩放比例，这些文件夹都必须存在。你不应该省略某个文件夹和对应的字体，而应让
    SpriteBuilder 自行决定发布哪些必要的内容。如果这个过程显得繁琐且容易出错，我强烈建议你换用一个原生支持 SpriteBuilder 所需格式的字形工具，例如
    Glyph Designer 和 bmGlyph。


    最后，要将位图字体导入 SpriteBuilder，你只需将`*.bmfont`文件夹拖放到 SpriteBuilder 的“文件视图”（File View）中。由于你已经将图形资源中的`Fonts`文件夹添加到
    SpriteBuilder，那里应该已经有一个`gd.bmfont`被添加了。如果没有，你现在就应该添加它，或者创建一个自定义位图字体并将其添加到 SpriteBuilder
    的`Fonts`文件夹中。添加后，你应该能在 SpriteBuilder 的“文件视图”中看到一个带有`.bmfont`扩展名的独立条目，如[图 11-15](#part0022.html#Fig15)
    所示。


    ![9781484202630_Fig11-15.jpg](images/00176.jpeg)


    [图 11-15](#part0022.html#_Fig15). 在 SpriteBuilder 的文件视图中，一个位图字体的`.bmfont`文件夹被列为一个独立条目


    **注意**：在我使用的 SpriteBuilder 版本中，将`.bmfont`拖放到舞台上并不会创建“Label BM-Font”（标签-位图字体）。如果你也遇到这种情况，这并不表示字体有问题。位图字体目前尚不支持拖放操作。


    ## 使用位图字体


    在这个游戏中，得分标签并没有太好的用途，但我们可以统计玩家受到高冲击力打击的次数。纯粹为了演示目的。同时也为了展示如何在运行时修改本地化文本。


    首要任务是，在 SpriteBuilder 中打开`GameMenuLayer.ccb`。你可以在`UserInterface`文件夹中找到它。从“节点库视图”（Node
    Library View）中，将一个“Label BM-Font”（标签-位图字体）节点拖放到舞台上。


    编辑该标签的属性——具体来说，将位置类型（position type）设置为百分比（%），值设为 99x99，这样标签会位于右上角。为了方便将标签与屏幕边界对齐，将“锚点”（Anchor
    point）的两个值都改为 1。这会将标签从部分位于屏幕外移动到完全位于屏幕内。在排列位图字体标签时，使用“锚点”非常有效。你可能已经注意到，`CCLabelBMFont`的属性不提供任何文本对齐属性，如[图
    11-16](#part0022.html#Fig16) 所示。


    ![9781484202630_Fig11-16.jpg](images/00177.jpeg)


    [图 11-16](#part0022.html#_Fig16). 位图字体标签属性


    说到位图字体标签属性，`Opacity`（不透明度）、`Color`（颜色）和`Blend`（混合）模式属性都继承自精灵属性，效果相同。`Label text`（标签文本）和`Localize`（本地化）属性与
    TTF 标签相同。只有`Font file`（字体文件）属性是新的，但也没什么特别的。


    使用`Font file`（字体文件）属性浏览并选择`Fonts`文件夹中的`gd.bmfont`文件。如果你使用的是自己的位图字体，只需选择那个文件即可。只要字体能正常工作，字体类型实际上并不重要。


    然后，在“标签文本”字段中输入**`Hits: %i`**，如[图 11-16](#part0022.html#Fig16) 所示。你可以在标签的文本字段中使用任何字符串格式说明符，例如`%i`、`%@`、`%.1f`等。这使得你可以在运行时轻松填充缺失部分。勾选“本地化”（Localize）复选框，使初始字符串成为本地化字符串的键，并启用“编辑”（Edit）按钮。点击“编辑”按钮调出本地化对话框。


    在本地化对话框中，在“English (en)”列中输入**`Hits: %i`**，在“German (de)”列中输入**`Treffer: %i`**，或者使用你最初添加的任何语言并输入相应的语言字符串（而非德语文本）。只需确保所有语言字符串包含相同数量和类型的字符串格式说明符。在这种情况下，每个翻译后的语言字符串中都应该有一个`%i`。[图
    11-17](#part0022.html#Fig17) 显示了编辑本地化字符串后的结果。


    ![9781484202630_Fig11-17.jpg](images/00178.jpeg)


    [图 11-17](#part0022.html#_Fig17). 编辑本地化字符串，每个字符串都包含`%i`格式说明符


    最后，在保持选中位图字体标签的情况下，切换到“项代码连接”（Item Code Connections）选项卡。输入`_hitsLabel`作为标签的文档根变量。现在你可以切换到
    Xcode。打开`GameMenuLayer.m`文件，并添加[代码清单 11-17](#part0022.html#list17) 中高亮显示的实例变量（ivars）。


    [***代码清单 11-17***](#part0022.html#_list17). 格式化本地化字符串所需的实例变量


    ```

    @implementation GameMenuLayer

    {

        __weak CCLabelBMFont* _hitsLabel;

        NSString* _hitsLocalizedFormatString;

        int _hitCount;

    }

    ```


    除了预期的`_hitsLabel`，你还需要`_hitsLocalizedFormatString`作为标签原始本地化字符串的引用。这便是在[图 11-17](#part0022.html#Fig17)
    中显示的包含`%i`格式说明符的字符串之一。你需要保留一份原始字符串的副本，原因很简单：字符串需要被格式化，然后设置回标签，以便用实际值替代`%i`格式说明符。但一旦你这样做了，那个格式说明符就会被`_hitCount`数字替换掉。


    在[代码清单 11-17](#part0022.html#list17) 的代码片段下方，添加[代码清单 11-18](#part0022.html#list18)
    中的代码。该类中可能已经存在一个`didLoadFromCCB`方法。如果有，你应该用[代码清单 11-18](#part0022.html#list18)
    中的方法替换它。


    [***代码清单 11-18***](#part0022.html#_list18). 初始化格式字符串并立即更新一次


    ```

    -(void) didLoadFromCCB

    {

        _hitsLocalizedFormatString = _hitsLabel.string;

        [self updateHitsLabel];

    }


    -(void) updateHitsLabel

    {

        if (_hitsLabel)

        {

            _hitsLabel.string = [NSString stringWithFormat:

                                 _hitsLocalizedFormatString, _hitCount];

        }

    }

    ```


    `_hitsLocalizedFormatString`将根据系统语言被设置为`"Hits: %i"`或`"Treffer: %i"`。然后，`updateHitsLabel`方法使用`_hitsLocalizedFormatString`作为`NSString`的`stringWithFormat`方法中的格式字符串。`_hitCount`变量提供了`%i`应该被替换成的值。因此，在
    CCB 加载完成后，位图字体的标签字符串将根据语言变成`"Hits: 0"`或`"Treffer: 0"`。


    现在，在`updateHitsLabel`方法下方添加[代码清单 11-19](#part0022.html#list19) 中的方法。每当你想要更新命中计数标签时，都可以调用该方法，它会在更新标签字符串之前增加`_hitCount`变量。


    [***代码清单 11-19***](#part0022.html#_list19). 增加命中计数标签


    ```

    -(void) increaseHitCount

    {

        _hitCount++;

        [self updateHitsLabel];

    }

    ```


    为了使该方法对其他类公开可用，你需要在`GameMenuLayer`接口中声明它。将[代码清单 11-20](#part0022.html#list20)
    中高亮显示的行添加到`GameMenuLayer.h`中。'
  raw: 'Basically, what you need to do when your glyph tool doesn’t natively create
    a SpriteBuilder-compatible bitmap font with the four resource folders is create
    the folder structure like in [Figure 11-14](#part0022.html#Fig14). Just the folders—no
    files yet. Then open your glyph tool, and export the font at its original font
    size (I’m assuming 48) to the *resources-tablethd* folder. Then change the font
    size in the glyph tool to 24, and re-export the font to the *resources-tablet*
    folder and once more to the *resources-phonehd* folder to create the 50% downscaled
    version. And finally, set the font size to 12 and re-export the font to the *resources-phone*
    folder.


    The result should be like the one shown in [Figure 11-14](#part0022.html#Fig14),
    with “gd” being whatever name you chose for your font. And no matter what scaling
    you choose for each resources folder, they all have to be there. You should not
    omit a folder and font, but rather leave it to SpriteBuilder to publish only what’s
    necessary. If this process proves tedious and error prone, I highly recommend
    switching to a glyph tool that natively supports the format required by SpriteBuilder—like
    Glyph Designer and bmGlyph.


    Finally, to import a bitmap font into SpriteBuilder, you simply drag and drop
    the *.bmfont* folder onto SpriteBuilder’s *File View*. Since you’ve already added
    the *Fonts* folder from the Graphics archive onto SpriteBuilder, there should
    already be a *gd.bmfont* added to SpriteBuilder. But if not, you should add it
    now or create a custom bitmap font and add that to the *Fonts* folder in SpriteBuilder.
    Once added, you should see a single item with the *.bmfont* extension in SpriteBuilder’s
    *File View*, like in [Figure 11-15](#part0022.html#Fig15).


    ![9781484202630_Fig11-15.jpg](images/00176.jpeg)


    [Figure 11-15](#part0022.html#_Fig15). A bitmap font’s .bmfont folder is listed
    as a single item in SpriteBuilder’s File View


    **Note**  In the SpriteBuilder version that I used, dragging and dropping a *.bmfont*
    onto a stage did not create a *Label BM-Font*. If this occurs to you too, it doesn’t
    indicate a problem with the font. Bitmap fonts simply have no drag and drop support
    yet.


    Using the Bitmap Font


    There’s not a really good use for a score label in this game, but we could count
    the number of high-impact hits the player has experienced. Just because. And to
    demonstrate how you can alter a localized label at runtime.


    The first order of business is to open *GameMenuLayer.ccb* in SpriteBuilder. You’ll
    find it in the *UserInterface* folder. From the *Node Library View*, drag and
    drop a *Label BM-Font* node onto the stage.


    Edit the label’s properties—specifically, you should set the position type to
    % and the values to 99x99 so that the label is somewhere in the top right corner.
    To easily align the label with the screen border, change both *Anchor point* values
    to 1\. This will move the label from partially outside the screen to fully inside
    the screen. The *Anchor point* is quite effective when it comes to aligning bitmap
    font labels. You may have noticed that the *CCLabelBMFont* properties do not offer
    any kind of text-alignment properties, as you can see in [Figure 11-16](#part0022.html#Fig16).


    ![9781484202630_Fig11-16.jpg](images/00177.jpeg)


    [Figure 11-16](#part0022.html#_Fig16). Bitmap font label properties


    Speaking of bitmap font label properties, the *Opacity*, *Color*, and *Blend*
    mode properties are borrowed from the sprite properties and have the same effect.
    The *Label text* and *Localize* properties are the same as for TTF labels. Only
    the *Font file* property is new, but it’s nothing special.


    Use the *Font file* property to browse and select the *gd.bmfont* file in the
    *Fonts* folder. If you are using your own bitmap font, just select that. The type
    of font doesn’t actually matter as long as the font is working.


    Then enter ***Hits: %i*** in the *Label text* field as seen in [Figure 11-16](#part0022.html#Fig16).
    You can use any string format specifiers, like *%i*, *%@*, *%.1f*, and so on in
    a label’s text field. This allows you to fill in the missing parts at runtime
    with little effort. Click the *Localize* check box to make the initial string
    the key for the localized string and to enable the *Edit* button. Click the *Edit*
    button to bring up the localization dialog.


    In the localization dialog, enter ***Hits: %i*** in the column labeled *English
    (en)* and enter ***Treffer: %i*** in the column labeled *German (de)*, or use
    whatever language you initially added and enter the corresponding language string
    instead of the German text. Just make sure all language strings contain the same
    number and types of string format specifiers. In this case, there ought to be
    a *%i* in every translated language string. [Figure 11-17](#part0022.html#Fig17)
    shows the result of editing the localized strings.


    ![9781484202630_Fig11-17.jpg](images/00178.jpeg)


    [Figure 11-17](#part0022.html#_Fig17). Editing localized strings, each containing
    the %i string format specifier


    Finally, with the bitmap font label still selected, switch to the *Item Code Connections*
    tab. Enter **_hitsLabel** as the doc root var for the label. Now you can switch
    to Xcode. Open the *GameMenuLayer.m* file, and append the ivars highlighted in
    [Listing 11-17](#part0022.html#list17).


    [***Listing 11-17***](#part0022.html#_list17). The ivars needed to format the
    localized string


    ```

    @implementation GameMenuLayer

    {

        __weak CCLabelBMFont* _hitsLabel;

        NSString* _hitsLocalizedFormatString;

        int _hitCount;

    }

    ```


    Next to the expected _hitsLabel, you’ll need the _hitsLocalizedFormatString as
    a reference to the label’s original localized string. That’s one of the localized
    strings with the *%i* format string specifier that was shown in [Figure 11-17](#part0022.html#Fig17).
    You need to keep a copy of the original string simply because the string needs
    to be formatted and then set to the label to show an actual value in place of
    the *%i* format specifier. But once you’ve done so, that format specifier will
    be replaced by the _hitCount number.


    Add the code in [Listing 11-18](#part0022.html#list18) just below the code fragment
    of [Listing 11-17](#part0022.html#list17). There may already be a didLoadFromCCB
    method in the class. If there is, you should replace it with the one in [Listing
    11-18](#part0022.html#list18).


    [***Listing 11-18***](#part0022.html#_list18). Initializing the format string
    and updating it once


    ```

    -(void) didLoadFromCCB

    {

        _hitsLocalizedFormatString = _hitsLabel.string;

        [self updateHitsLabel];

    }


    -(void) updateHitsLabel

    {

        if (_hitsLabel)

        {

            _hitsLabel.string = [NSString stringWithFormat:

                                 _hitsLocalizedFormatString, _hitCount];

        }

    }

    ```


    The _hitsLocalizedFormatString will be set to either “Hits: %i” or “Treffer: %i”
    depending on the system language. The updateHitsLabel method then uses the _hitsLocalizedFormatString
    as the format string in NSString’s stringWithFormat method. The _hitCount variable
    provides the value that %i should be replaced with. So after the CCB is loaded,
    the bitmap font’s label string will be either “Hits: 0” or “Treffer: 0”, depending
    on the language.


    Now add the method in [Listing 11-19](#part0022.html#list19) just below updateHitsLabel.
    Every time you want to update the hit-count label, you can call that method and
    it will increase the _hitCount variable before updating the label’s string.


    [***Listing 11-19***](#part0022.html#_list19). Increasing the hit-count label


    ```

    -(void) increaseHitCount

    {

        _hitCount++;

        [self updateHitsLabel];

    }

    ```


    To make the method publicly available to other classes, you’ll have to declare
    it in the GameMenuLayer interface. Add the line highlighted in [Listing 11-20](#part0022.html#list20)
    to *GameMenuLayer.h*.'
