  trans: '

    # for 循环用于遍历每一个子节点，以便为当前帧创建顶点位置。


    第一个节点是中心节点，其位置直接采用原始坐标。对于其余所有子节点，位置从中心向外延伸 `_enlargeDrawRadius`。其原理和算法与代码清单 10-11
    相同。


    使用 `GLKVector4Make` 函数将生成的 `vertexPos` 转换为 `GLKVector4` 类型，并将其赋值给与被遍历子节点对应的索引处的顶点位置。第三个坐标为
    z 坐标，你可以通过它影响顶点的绘制顺序。在本例中，该值为零，因此它将使用 SpriteBuilder 设计的相同绘制顺序。最后一个坐标（w）对于所有顶点都必须为
    1.0。


    使用新的顶点更新渲染缓冲区的工作由 `CCRenderBufferSetVertex` 完成，它本质上是将 `_vertices[i]` 复制到索引 `i`
    处的渲染缓冲区。由于顶点位置是相对于精灵父级表示的坐标，因此使用 `CCVertexApplyTransform` 来应用传入绘制方法的变换。这会将顶点位置移动到世界（场景）坐标中。


    for 循环结束后，最后一个顶点被设置为成为第二个顶点的副本。这会闭合最后一个三角形 1-9-10，这与图 10-6 中的 1-9-2 相同。


    最后，`CCRenderBufferSetTriangle` 按照 0-1-2、0-2-3、0-3-4 的顺序，使用之前由 `CCRenderBufferSetVertex`
    设置好的所有顶点创建三角形。请记住，索引 `i` 是从零开始的，因此索引 0 对应的是中心顶点，这与图 10-6 不同，该图中中心节点被标记为*顶点 #1*。


    现在，你可以用新的渲染器在游戏当前状态下运行，找点乐子。由于玩家的身体各部分没有通过关节连接在一起，它们会自由散开，而新的渲染器会在各个身体部分之间绘制纹理。这会导致严重的扭曲和一些滑稽的结果，你可以在图
    10-8 中看到其中一个。但这确实证明了绘制纹理总体上是可以工作的，同时，这也让你了解到，如果所有身体部分没有形成一个连贯的整体时，画面可能会是什么样子。纹理有时会拉伸得又长又薄，或者当身体部分向相反方向运动时，纹理可能会发生翻转。


    ![9781484202630_Fig10-08.jpg](img/00151.jpeg)


    图 10-8。*放大查看新增纹理的玩家，显示了其缺乏连贯性*


    # 温柔地玩耍……


    现在让我们为玩家的身体增加一些连贯性，使其真正变得“柔软”。理解每个关节如何加入到组合中是很重要的（因此我在此重复强调）。


    一个*距离关节*使两个身体保持固定的距离，不多也不少。如果既没有启用*最小距离*复选框，也没有启用*最大距离*复选框，你可以移除该距离关节。如果*最小距离*和*最大距离*复选框中的一个或两个都被启用，并且设置为不同的值，你可以为相同的两个身体添加一个*弹簧关节*，使连接具有弹性。


    但是，如果没有合适的弹簧关节刚度，或者最小距离和最大距离之间的差异非常小，弹簧关节对组合的贡献就不会很大。单独的弹簧关节应该启用其静止长度；否则，它将无法使身体保持在所需的距离上，就像没有启用最小和/或最大距离的距离关节一样。


    ## 连接圆周上的身体


    首先要做的是连接圆周上的身体。最好从一个简单的距离关节开始——你可以在之后随时添加更多的关节。


    在 SpriteBuilder 中打开 `PlayerSoftBody.ccb`。从*节点库视图*中，将一个*物理距离关节*拖放到舞台上。将两个小圆圈中的左侧圆圈拖到标记为
    *right* 的节点上，使其成为*主体 A*，然后将右侧圆圈拖到标记为 *bottom-right* 的节点上，使其成为*主体 B*。


    在关节的*项目属性*选项卡中，勾选*碰撞主体*复选框。如果你不这样做，当连接两个之前能够发生碰撞的身体时，即使它们的类别和遮罩匹配，它们也不会再发生碰撞。将所有锚点值设置为
    0，以便关节准确地锚定在两个节点的位置上。然后同时启用*最小距离*和*最大距离*复选框。这将自动使用关节主体之间的当前距离（22.95）填充距离字段。


    **提示**  请确保在编辑完锚点之后再启用*最小距离*和*最大距离*复选框。编辑锚点会改变关节的长度（两个身体之间的距离），因此*最小距离*和*最大距离*值可能不再代表关节的实际长度，而是代表之前所具有的长度。如果需要更新距离值，只需取消勾选并重新勾选*启用*复选框即可更新该值。


    作为参考，距离关节的属性显示在图 10-9 中。


    ![9781484202630_Fig10-09.jpg](img/00152.jpeg)


    图 10-9。第一个圆周距离关节的属性


    现在继续以相同的方式再添加七个距离关节。从连接 bottom-right 节点和 bottom 节点开始，然后按顺时针方向继续连接相邻节点。一旦你添加了八个距离关节，并形成一个像图
    10-10 所示的圆形，请务必验证所有关节的属性是否相同。最小/最大距离的微小差异是可以接受的。


    ![9781484202630_Fig10-10.jpg](img/00153.jpeg)


    图 10-10。所有圆周节点都已用距离关节连接


    你现在应该发布并运行游戏。玩家已经获得了必要的连贯性，但其行为更像是 Hacky Sack 球。如果你曾经想创建一个 Hacky Sack 游戏，现在你知道怎么做了。否则，请继续阅读，了解如何让玩家的行为更像一个有弹性的球。


    ## 增加玩家的弹性


    从这里开始有两种方法。这取决于你希望结果感觉像什么。


    如果你想要制作一个真正的球，比如篮球或足球，那么添加八个额外的距离关节可能就足够了。每个关节将连接中心身体与一个圆周身体，并且同时启用最小距离和最大距离并设置为相同的值。*碰撞主体*属性将保持未勾选状态，因为球不太可能收缩到圆周身体与中心身体接触的程度。结果将是一个在压力下会压缩的弹力球。


    然而，仅使用距离关节时，你无法控制球的弹性。尽管有最小距离和最大距离的设置，但距离关节仍然允许被压缩，这一事实意味着你是在依赖物理引擎实现距离关节的副作用。这从来都不是一件好事，因为它可能会在未来的更新中发生变化。

