    mark, and then press *V*. Move the Timeline Cursor to the right, and press *V*
    again. Repeat this until you have about three equally spaced and sized *Keyframe
    Segments* as seen in [Figure 6-9](#part0015.html#Fig9). Drag and move the keyframes
    to even out the spacing, or intentionally make the spacing uneven. The important
