    `Xcode` ![image](img/00008.jpeg) `Preferences`，然后导航到 `Downloads` 面板，下载离线文档以便更快地访问或离线访问
    iOS SDK 文档。该文档也可以在线获取：[`developer.apple.com/library/ios/navigation`](https://developer.apple.com/library/ios/navigation)。


    学习本书，不需要注册为苹果的 iOS 开发者。尽管如此，我仍然推荐你注册，尽管目前每年需要支付 99 美元的费用。成为苹果注册开发者有很多好处，最重要的是能够在
    iOS 设备上部署和测试你的应用。如果你计划将应用发布到 App Store，你应该尽早注册，而不是拖延。


    iOS 模拟器可以用来验证你的代码功能是否正常，但它无法衡量你应用的性能表现 —— 网上关于模拟器速度慢的问题比比皆是。简而言之，即使在最快的 Mac 上，iOS
    模拟器的渲染性能也非常糟糕。而且，模拟器会很乐意消耗你 Mac 上数 GB 的内存和大量的 CPU 时间 —— 远超 iOS 设备所能提供的。此外，当用不精确的手指覆盖部分屏幕进行操作时，你的应用感觉会非常不同，而且你无法用
    iOS 模拟器模拟加速度计或多点触控手势。


    简而言之，如果不在实际设备上进行测试，你就无法可靠地测试你的游戏是否有趣、易于操作、控制精准以及性能良好。因此，虽然这不是绝对必要的，但强烈建议你注册成为开发者会员。


    ## 关于 SpriteBuilder


    `SpriteBuilder` 是一款免费的、开源的 OS X 可视化设计工具，专为与 `Cocos2d-Swift` 配合使用而创建。最初，它由 Viktor
    Lidholt 构思并命名为 `CocosBuilder`，于 2011 年发布。Viktor 在 `Apportable` 公司担任 `SpriteBuilder`
    的首席开发人员，他与整个团队一起致力于 `SpriteBuilder` 和 `Cocos2D` 的开发。


    许多 `SpriteBuilder` 和 `Cocos2D` 开发者实际上为 `Apportable` 工作，这是一家专门从事交叉编译 Objective-C
    代码的公司，特别是针对 Android 平台的 `SpriteBuilder` 应用。在理想情况下，你只需获取你的 iOS 应用并为其构建 Android
    版本，它就能像那样正常工作。你可以在第 13 章中找到关于 Android 移植过程的介绍。


    `SpriteBuilder` 与 `Cocos2D` 集成得很好。现在，这两个项目的发布计划是同步的，以确保这两个工具能够和谐地协同工作。文件版本不兼容以及无意识的
    `Cocos2D` 更改破坏编辑器兼容性的日子已经一去不复返了。


    `SpriteBuilder` 也可以用来创建 OS X 应用。在我写这本书的时候，开发人员正在努力增加对 OS X 的支持。所以我确信，当你读到这本书的时候，你将能够使用
    `SpriteBuilder` 启动 OS X 项目。你在本书中学到的大部分内容同样适用于 OS X 应用，尽管有些例外。


    **提示**  如果当你读到这本书时 `SpriteBuilder` 还不支持创建 OS X 应用，你可以在这里找到关于如何启用 OS X 支持的教程：[`jademind.com/blog/posts/porting-cocos2d-game-to-osx-using-spritebuilder/`](http://jademind.com/blog/posts/porting-cocos2d-game-to-osx-using-spritebuilder/)。


    ## 为何使用 SpriteBuilder？


    `SpriteBuilder` 的主要好处是所见即所得（WYSIWYG）。如果你做过任何没有使用设计工具的游戏或图形编程，你会了解典型的开发周期：改变几行代码或仅仅是一个值，构建代码，将应用部署到设备或模拟器上，启动你的应用，导航到你在应用中做出修改的地方，查看修改效果，然后发现——它不太对劲。重新开始。如此循环往复。繁琐、枯燥、耗时、且容易出错。


    使用 `SpriteBuilder`，你可以直观地完成许多事情，并确切地看到它们在应用中的样子。你甚至可以在模拟的设备分辨率之间切换，只需点击一下鼠标，就能测试你的更改在所有支持的分辨率下的效果。更令人惊叹的是你创建时间轴动画的方式，以及你可以直接在
    `SpriteBuilder` 中实时预览它们。你可以精确地看到图层如何随时间移动到视图中并放大以填满屏幕，或者看到你的菜单按钮如何一个接一个快速滚动进入，最终停留在它们指定的位置。


    此外，`SpriteBuilder` 管理应用的资源文件版本，根据不同的设备分辨率自动按需缩放它们。这使你在为多种屏幕分辨率和宽高比开发时，免去了许多繁琐且易出错的工作。这也意味着你无需使用一个或几个外部工具，每个工具只处理开发周期中一小部分工作。


    所以，总而言之，可以说学习 `SpriteBuilder` 是一项值得的努力，不仅因为它能显著减少开发时间，还因为它的操作和实验本身就很有趣。最终，你不仅能更快地获得结果，还能获得更好的结果。更重要的是，对于任何你觉得编码比可视化设计更快的部分，你仍然可以编写代码。一旦加载了在
    `SpriteBuilder` 中设计的节点，你就可以自由地编写代码，随心所欲地修改、替换或丢弃该节点。


    ## 关于 Cocos2D


    本书中提到的 `Cocos2D` 特指 `Cocos2d-Swift`。它实际上只是更名为 `Cocos2d-Swift` 的 `Cocos2d-iPhone`，因为它现在正式支持使用苹果的
    Swift 编程语言制作游戏。

    '
- fmt: '当然，您仍然可以使用 `Cocos2d-Swift` 来编写 100% 的 `Objective-C` 代码，并且 `Cocos2d-Swift`
    的底层引擎本质上是 `Cocos2d-iPhone`，完全由 `Objective-C` 和纯 `C` 编写。但现在，您也可以用 `Swift` 编写程序代码，可以选择性地将
    `Swift` 代码与 `Objective-C` 混合使用，或者完全使用 `Swift` 代码创建应用程序。


    **注意** 本书将不会使用，也几乎不会提及 `Swift`。在本书写作之初，`Swift` 甚至尚未向开发者开放。


    `Cocos2d-Swift` 是一个流行的、免费且开源的 2D 渲染引擎，并配备了物理框架。它最初由 `Ricardo Quesada` 在 2008 年创建为
    `Cocos2d-iPhone`，并最终成为 iOS 平台上最流行的 2D 游戏引擎。它非常受欢迎，以至于到 2013 年，苹果公司在 `iOS 7` 中发布了自己的
    2D 渲染框架，命名为 `Sprite Kit`。`Sprite Kit` 的许多设计和术语都借鉴了当时的 `Cocos2d-iPhone`。


    `Sprite Kit` 的发布是一个出人意料且早该到来的催化剂，催生了 `Cocos2d-iPhone` 引擎的第三次重大迭代，该版本还顺带获得了一个新名称：`Cocos2d-Swift`。现在，整个开发团队基本上已经触及并改进了引擎的各个方面，使其在每个方面都优于
    `Sprite Kit`。


    `Cocos2D` 包含了紧密集成的 `Chipmunk` (2D) 物理引擎以及大量酷炫的新功能。例如，其渲染器现在即使不比 `Sprite Kit` 更快，也与之相当，并且可以选择使用苹果公司新的
    `Metal` 渲染框架。还有一个 `CCEffectNode`，使开发者能够创建令人惊叹的视觉着色器效果，而无需编写实际的着色器代码。自定义和调试 `Cocos2D`
    应用程序通常比使用 `Sprite Kit` 更容易，因为您可以单步执行、分析，并在必要时修改底层引擎的源代码。


    ## 关于 Apportable


    您可能会好奇：`Apportable` 是谁？他们具体是做什么的？


    他们的使命宣言很简单：让开发者能够用 `Objective-C` 编写应用程序，并通过交叉编译将其移植到 `Android` 平台，同时具有原生性能。您可以在其网站
    `[http://www.apportable.com](http://www.apportable.com)` 上了解更多关于 `Apportable`
    的信息。


    在理想情况下，使用 `Apportable` 将一个用 `Objective-C` 编写的现有 iOS 应用移植到 `Android` 无需更改任何代码。实际上，如果您没有从一开始就在
    `Android` 上测试项目，您可能需要多做一点工作。具体来说，这是因为市面上有众多不同规格和特性的 `Android` 设备。


    如果您查看 `Apportable` 令人印象深刻的客户名单，您会发现他们都是游戏开发者。`Apportable` 对此表示敬意，并聘请了许多现在致力于 `Cocos2D`
    和 `SpriteBuilder` 开发的开发者。所有这些技术都是免费且开源的，并将保持免费和开源。只有在您想使用 `Apportable` 移植到 `Android`，并且需要超出基本功能之外的功能时，您才可能需要支付一些费用。在撰写本文时，服务条款和价格尚未确定。


    拥有像 `Apportable` 这样的选择的价值在于，您能够专注于自己熟悉的平台、工具和技术，同时仍然能够在需要时让应用程序在 `Android` 设备上运行。而且，您无需重写大部分代码库，也无需因使用更古老或性能较差的编程语言而妥协。


    ## 关于程序版本


    在您开始阅读本书其余部分之前，我们需要讨论一下技术更新和兼容性的问题。


    本书是为 `Xcode 6`、`iOS 8` 以及 `SpriteBuilder v1.3` 和 `Cocos2d-Swift v3.3` 编写并测试的。在我写下这些文字时，是
    2014 年 10 月 9 日。但在您阅读本书时，这些技术中的一部分或全部可能已经更新到了下一个小版本或主要版本。


    我已尽力避免使用任何（可能）特定于版本的代码或功能。然而，我预测未来变化的能力是有限的，这从我至今未能中彩票就可以看出。


    根据我编写三个版本的“Learn Cocos2D”的经验，这些差异通常很小。所以，不要仅仅因为现在可能有了 `Xcode 6.2` 或 `SpriteBuilder
    v1.5` 就把书收起来。


    对于因版本更新导致操作方法略有不同而给您带来的任何不便，我提前致歉，但我对此无能为力。不过，我可以为您提供一些方法来应对这些问题。


    就 `SpriteBuilder` 和 `Cocos2D` 而言，您可以访问 `[http://www.spritebuilder.com](http://www.spritebuilder.com)`、`[http://www.cocos2d-swift.org](http://www.cocos2d-swift.org)`
    或 `[http://www.learn-cocos2d.com](http://www.learn-cocos2d.com)`，了解影响本书的重大变更，并获取有关如何解决问题或如何精确修改代码以使其适应新版本的指导。


    关于 `Xcode` 和 `iOS`，如果在您阅读本书时已经有了 `Xcode 7` 或 `iOS 9`，您总是可以使用 `Xcode 6`（以及 `iOS
    8 SDK`）来编译本书的代码，从而完全避免任何潜在问题。


    具体到 `Xcode` 的更新，问题更多不在于手册说明不再适用，而是苹果在每个新版本 `Xcode` 中不断引入新的编译器警告和错误。这些改进似乎能将曾经完全可接受的代码变成一连串“哦，不，你不能再这样做了，你疯了吗？！”的语句。对于有经验的开发者来说，编译器能捕获更多潜在问题是极受欢迎的；然而，对于那些试图通过示例代码学习，但代码并未用最新版
    `Xcode` 测试过的开发者来说，这可能是一次令人清醒，甚至是令人沮丧的经历。


    因此，如果您觉得没有精力去应对更新版编译器偶尔的吹毛求疵，我建议您使用 `Xcode 6`。您可以在 `[https://developer.apple.com/downloads/index.action?name=Xcode%206](https://developer.apple.com/downloads/index.action?name=Xcode%206)`
    找到旧版 `Xcode`。请注意，您需要是注册的苹果 `iOS` 或 `OS X` 开发者才能访问此链接。


    ## 关于 Xcode 版本


    部分截图是使用 `Xcode 5.1` 截取的。在某些情况下，这是有意的；另一些时候，则仅仅是因为当时 `Xcode 6` 尚未发布。并非总是可能或可行地将截图更新到最新的
    `Xcode 6` 版本。


    我已验证其功能是相同的。就截图而言，`Xcode 5.1` 和 `Xcode 6.0` 之间的任何差异纯粹是视觉上的。


    ## 关于示例项目


    本书附带一个可下载的压缩包，您可以从本书网站 `[http://www.apress.com/9781484202630](http://www.apress.com/9781484202630)`
    下载。在压缩包中，您会找到资源文件和完整的 `SpriteBuilder` 项目。每个项目都包含了项目 `Bouncy Beast` 在不同阶段的快照。


    **提示** 我建议您在解压后保留该压缩包。如果您对某个项目做了破坏性的更改，可以从压缩包中恢复原始状态。


    当您打开这些示例 `SpriteBuilder` 项目之一时，`SpriteBuilder` 很可能会提示您将 `Cocos2D` 更新到最新版本。我建议您不要更新
    `Cocos2D`，而是继续使用该项目测试时所用的 `Cocos2D` 版本。新的 `Cocos2D` 版本可能需要您修改代码，或者可能以其他方式破坏现有代码。我假设当您打开示例项目时，您更希望看到它能正常工作，而不是需要深入进去调试和修复任何破坏性的更改。


    **提示** 您随时可以稍后更新 `SpriteBuilder` 项目的 `Cocos2D` 版本，方法是在 `SpriteBuilder` 菜单中选择 `文件`![image](images/00008.jpeg)`更新
    Cocos2D`。'
  raw: 'Of course, you can still use Cocos2d-Swift to write apps with 100% Objective-C
    code, and the engine behind Cocos2d-Swift is still essentially Cocos2d-iPhone,
    written entirely in Objective-C and plain C. But now you can also write your program
    code in Swift, either by optionally adding Swift code mixed with Objective-C or
    by creating apps entirely with Swift code.


    **Note**  This book will make no use and little mention of Swift. As I started
    writing this book, Swift wasn’t even available to developers.


    Cocos2d-Swift is a popular, free, and open-source 2D rendering engine with a physics
    framework. It was originally created as Cocos2d-iPhone by Ricardo Quesada in 2008
    and became probably the most popular 2D game engine for iOS. It was so popular
    that by 2013 Apple released its own 2D rendering framework with iOS 7, named *Sprite
    Kit*. Much of Sprite Kit’s design and terminology is borrowed from Cocos2d-iPhone
    at that time.


    Sprite Kit’s release was an unexpected and long overdue catalyst for creating
    the third major iteration of the Cocos2d-iPhone engine, which also got a new name
    along the way: Cocos2d-Swift. Now an entire team of developers have essentially
    touched and improved every aspect of the engine to make it better than Sprite
    Kit in every aspect.


    Cocos2D includes the tightly integrated Chipmunk(2D) physics engine and plenty
    of cool new features to boot. For example, the renderer is now equal to, if not
    faster than, Sprite Kit’s and optionally uses Apple’s new Metal rendering framework.
    There is a *CCEffectNode* that enables developers to create stunning visual shader
    effects without having to write actual shader code. Customizing and debugging
    Cocos2D apps is generally easier than doing the same with Sprite Kit because you
    can step into, analyze and, if need be, modify the underlying engine source code.


    About Apportable


    You may be wondering: who is Apportable and what exactly are they doing?


    Their mission statement is simple: to enable developers to write apps in Objective-C
    and port them to Android through cross-compilation with native performance. You
    can learn more about Apportable on its website: [http://www.apportable.com](http://www.apportable.com).


    In the ideal case, no code changes are necessary to port an existing iOS app written
    in Objective-C to Android with Apportable. In reality, you may need to do a little
    more if you haven’t been testing your project on Android from the start. Specifically,
    because there’s so many different Android devices with wildly varying features
    and specifications.


    If you look at Apportable’s impressive list of customers, you’ll notice they are
    all game developers. Apportable paid respect to that, having hired many developers
    who now work on Cocos2D and SpriteBuilder. All of these technologies are free
    and open source, and they will remain free and open source. Only if you want to
    use Apportable to port to Android and you need more than the basic features, you
    may need to dole out some cash. The terms of service and prices have not been
    determined at the time of this writing.


    The value in having an option like Apportable is to be able to focus on the platform,
    tools, and technologies you are familiar with, while still being able to make
    the app work on Android devices when the time comes. And you can do so without
    having to rewrite large parts of your codebase and without having to compromise
    by either using more archaic or less performant programming languages.


    About Program Versions


    Matching and advances in technology are issues we need to discuss before you set
    out to read the rest of this book.


    This book was written for and tested with Xcode 6, iOS 8 as well as SpriteBuilder
    v1.3 and Cocos2d-Swift v3.3\. As I’m writing these lines, it’s October 9, 2014\.
    But by the time you read this book, some or several of these technologies may
    have advanced to the next minor or major release version.


    I did my best to avoid using any (potentially) version-specific code or features.
    However, my abilities to predict future changes are somewhat limited, judging
    by my failure to win the lottery thus far.


    In my experience from writing three “Learn Cocos2D” editions, these differences
    are usually marginal. So don’t put the book away just because there might be,
    say, Xcode 6.2 or SpriteBuilder v1.5 available now.


    I wish to apologize in advance for any inconveniences caused by updated versions
    that slightly alter the way things work, but there’s nothing I can do to prevent
    that. I can, however, provide you with ways to help you work around such issues.


    As far as SpriteBuilder and Cocos2D are concerned, you can visit [http://www.spritebuilder.com](http://www.spritebuilder.com),
    [http://www.cocos2d-swift.org](http://www.cocos2d-swift.org), or [http://www.learn-cocos2d.com](http://www.learn-cocos2d.com)
    to learn of the major changes affecting the book with instructions on how to work
    around the issues or how exactly to change the code to make it fit the new versions.


    Regarding Xcode and iOS, if an Xcode 7 or iOS 9 is available by the time you’re
    reading this book, you can always grab Xcode 6 (and thus the iOS 8 SDK) to compile
    the book’s code if you want to completely avoid any potential issues.


    Specifically for Xcode updates, it’s not so much about instructions that will
    no longer apply, but additional compiler warnings and errors that Apple continues
    to introduce with every new Xcode version. These improvements can seemingly turn
    once perfectly acceptable code into a series of “oh no you can’t do that anymore,
    are you insane?!?” statements. For experienced developers, it’s highly welcome
    that the compiler catches ever more potential issues; however, for developers
    trying to learn by example with code not tested with the latest Xcode, it can
    be a sobering, if not frustrating, experience.


    Therefore, if you don’t feel up to the task of working around the occasional nitpicking
    by updated compiler versions, I recommend using Xcode 6\. You can find older Xcode
    versions at [https://developer.apple.com/downloads/index.action?name=Xcode%206](https://developer.apple.com/downloads/index.action?name=Xcode%206).
    Note that you need to be a registered Apple iOS or OS X developer in order to
    access this link.


    About Xcode Versions


    Some screenshots were taken with Xcode 5.1\. In some cases, this was intentional;
    other times, it was simply because Xcode 6 wasn’t available at the time. It wasn’t
    always possible or feasible to update screenshots with the latest Xcode 6 version.


    I verified that the functionality is identical. Any difference between Xcode 5.1
    and Xcode 6.0 as far as the screenshots are concerned is purely visual.


    About the Example Projects


    This book comes with a downloadable archive that you can download from the book’s
    website: [http://www.apress.com/9781484202630](http://www.apress.com/9781484202630).
    In the archive, you will find resource files and complete SpriteBuilder projects.
    Each contains a snapshot of the Bouncy Beast project at various stages.


    **Tip**  I recommend that you keep the archive after unpacking it. If you make
    a breaking change to one of the projects, you can restore the original state from
    the archive.


    When you open one of these example SpriteBuilder projects, SpriteBuilder will
    most likely offer to update Cocos2D to the latest version for you. I recommend
    that you not update Cocos2D, but rather continue using the Cocos2D version the
    project was tested with. A new Cocos2D version may require you to make changes
    to your code, or it may break existing code in other ways. I assume that when
    you open one of the example projects, you’d rather see it working rather than
    having to go in, debug, and fix any breaking changes.


    **Tip**  You can always update a SpriteBuilder project’s Cocos2D version at a
    later time by choosing File ![image](images/00008.jpeg) Update Cocos2D from SpriteBuilder’s
    menu.'
