    ## Summary


    In this chapter, you learned how to play sound effects through the Timeline as
    well as programming audio playback with `ObjectAL`. You learned the difference
    between short (`.caf`/`.wav`) and streaming (`mp3`, `m4a`) audio playback.


    You also should have a firm grasp on the differences between TrueType (TTF) and
    bitmap font labels. You also know how to localize text strings, including how
