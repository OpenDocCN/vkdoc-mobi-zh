  trans: '

    # 排版后的文档


    我也非常期待在 `SpriteBuilder`（[`forum.spritebuilder.com`](http://forum.spritebuilder.com)）和
    `Cocos2D`（[`forum.cocos2d-swift.org`](http://forum.cocos2d-swift.org)）论坛上收到你的反馈，以便我能将这些反馈整合到在线文档中。


    谁知道呢，也许在经历又一段再也不想写书的时期之后，我会重新回来修订这本书。我开始觉得，技术写作实际上是一种容易上瘾的危险行为。


    无论如何，我希望你能像我享受写作的兴奋感一样，享受阅读这本书的过程。


    ## 第一部分：介绍 SpriteBuilder 和 Cocos2D-iphone 第 3 版


    ### 第 1 章：引言


    欢迎阅读*学习使用 SpriteBuilder 进行 iOS 游戏开发*。本章作为引言，解释了你将从此书中获得什么、本书使用的程序版本，以及资源文件的获取位置等几项内容。


    #### 本书涵盖什么？


    在本书中，你将通过实例学习 `SpriteBuilder`。本书将引导你借助 `SpriteBuilder` 和 `Cocos2D`（准确来说是 `Cocos2d-Swift`）创建一个基于物理引擎、具有视差滚动效果的游戏。示例游戏的设计主要受到了畅销应用
    `Badland` 和 `Leo''s Fortune` 的启发。基于关卡的结构使你即使不编写额外代码，也能向游戏中添加更多内容。


    作为你的向导，我将带你逐步完成创建游戏项目所需的各个步骤。在此过程中，我会解释你很可能遇到或需要的 `SpriteBuilder` 功能、注意事项、变通方法以及有用的技巧和诀窍。


    本书的项目和资源文件可在 [`www.apress.com`](http://www.apress.com) 和 [`www.spritebuilder.com`](http://www.spritebuilder.com)
    下载。建议使用提供的资源，但你当然也可以自由使用自己的图片、音频和字体文件。示例项目允许你从任何章节开始或继续学习。


    **注意** 本书的项目文件存放在编号从 00 到 16 的文件夹中。项目编号与章节号没有关联。你会在每个章节（通常在章节末尾附近）找到提及的对应项目。


    当存在简单方法和更高效的方法时，我一定会教你高效的方法。在大多数情况下，这甚至不会在流程的任何阶段带来显著更多的工作量。如果非要选出一个能提高效率的功能，那就是通过*无贴图编辑器视图*和
    `Sub File` 节点访问的预制件。尽可能地为游戏中的各个独立部分创建可复用的 `CCB` 文件至关重要。这是一种面向对象的场景设计方法。


    本书并非 `SpriteBuilder` 的完整参考指南，尽管它涵盖了几乎所有重要的内容。欢迎并鼓励你自行探索 `SpriteBuilder` 的菜单、对话框、偏好设置，甚至其代码库，以了解更多。然而，这并非成功且高效使用
    `SpriteBuilder` 的必要条件。


    如果在任何时候你需要查找本书中未解释的内容，可以参考 `MakeGamesWith.Us` 团队维护的 `SpriteBuilder` 在线指南（[`www.makegameswith.us/docs`](https://www.makegameswith.us/docs)），或在
    [`www.spritebuilder.com`](http://www.spritebuilder.com) 的 `SpriteBuilder` 论坛上提问。


    #### 本书适合谁？


    你已经拿起了这本书，正在阅读这一段，想看看它是否适合你。这告诉我，你对为 iOS 开发游戏或图形应用感兴趣，你倾向于更喜欢可视化工作而非一切靠编程，或者至少你觉得这个概念很有趣。又或者，你已经熟悉
    `Cocos2D`，并想了解 `SpriteBuilder` 如何作为一种可视化设计工具改变你的工作流程。如果是这样，这本书就适合你。


    你当然想知道这本书是否适合你的经验水平、编程和技术知识，甚至可能适合你心中应用的确切需求。这会比较难以评估，因为我不了解你，也不知道你的目标。但我确实知道，如果你对
    `SpriteBuilder`、`Cocos2D` 以及一般的游戏开发感兴趣，你一定会从这本书中有所收获。


    我将尝试做一些假设。


    以下是我心目中认为非常适合阅读本书的三类典型开发者。初级开发者和没有 `SpriteBuilder` 经验的开发者，将能通过逐步开发一个使用 `SpriteBuilder`
    的游戏获得最多收获，同时学习 `SpriteBuilder` 用户界面和 `Cocos2D` 的基础知识。


    经验丰富的开发者会愉快地认识到使用像 `SpriteBuilder` 这样的图形设计工具的好处。我将在本书中展示的工作流技巧将提高你的效率。此外，你还会得到一些额外惊喜——在线很难找到的技巧和话题，例如创建软体物理、炫酷视觉效果，以及将你的
    `SpriteBuilder` 游戏移植到 Android。


    ##### 绝对初学者


    首先，假设你从未编程过移动应用，如果你对 `Xcode` 和 `Cocoa touch` 毫无经验，也完全不懂 `Objective-C`，我强烈建议你搭配一本入门书籍来阅读本书。任何从头开始教授使用
    `Objective-C` 和 `Xcode` 进行 iOS 应用开发的最新书籍或教程都会有所帮助。本书假定你具备 `Objective-C` 和 `Xcode`
    的实用知识，因此一本关于 `Objective-C` 和 `Xcode` 的指南或参考书会很有用。幸运的是，有很多教程和书籍可供选择。但请先查阅 Apple
    开发者库。


    作为初学者，你可以在 `SpriteBuilder` 中做很多事情，并大幅减少代码量。你甚至可能只用很少的编程就能创建简单的游戏。然而，我对此持谨慎态度，因为这可能会产生不切实际的期望。你可能需要降低对你第一个
    `SpriteBuilder` 游戏的初始期望，特别是考虑到目前在这一点上，你几乎不可能判断什么是在 `SpriteBuilder` 中可能或不可能是的。


    但是，如果你怀着学习的动力开始，并且尝试不把你最宏大的设计作为你的第一个游戏，我相信你会进展顺利。请准备好投入大量时间到所有技术当中，因为当你进入游戏应用开发领域时，这不仅仅是你开始学习的一个单一程序——它是一个由术语和技术组成的、看似庞大的整体。只要你保持耐心和求知欲，这个过程就不会令人不快。此外，还有一个友好且乐于助人的社区欢迎像你这样的新手。


    ##### 经验丰富的应用开发者


    我的第二个假设是，你可能是一位经验丰富的 iOS 应用开发者，但尚未尝试过制作游戏，也许是因为你不想错过像 `Interface Builder` 这样的图形设计工具。对你来说，掌握
    `Cocos2D` 框架的工作原理应该相当简单，毕竟有大量的文档可供查阅。你可能想专门学习游戏是如何设计的，以及这与使用 `Interface Builder`
    有何不同。通过阅读本书，你将能够了解到很多这些概念。


    你可能需要改变一些习惯和期望，但除此之外，如果你的目标是使用 `SpriteBuilder` 制作游戏，我看不出有什么理由你不能从阅读本书中受益。我想，如果你之前有移动游戏开发经验，只是没有使用过
    `Cocos2D` 或 `SpriteBuilder`，情况也是如此。


    ##### 经验丰富的 Cocos2D 游戏开发者

