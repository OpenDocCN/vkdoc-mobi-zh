    well as programming audio playback with ObjectAL. You learned the difference between
    short (.caf/.wav) and streaming (mp3, m4a) audio playback.


    You also should have a firm grasp on the differences between TrueType (TTF) and
    bitmap font labels. You also know how to localize text strings, including how
    you can use format strings to update the localized string with numbers, or possibly
    other strings.


    The results can be seen in the book project in the folder *12 - Audio Labels and
    Localization*.


    Chapter    12


    Visual Effects and Animations


    In this chapter, you’ll learn how to create sprite frame animations, how to design
    particle effects, and how to apply shader effects via the *Effect* node, which
    is essentially a sprite’s effects list.


    Sprite Frame Animations


    A common way to animate sprites is by cycling through a series of images. This
    is called a *sprite frame animation*. In essence, it’s the same as changing a
    sprite’s texture every so often.


    The term *sprite frame* refers to an extra class, CCSpriteFrame, provided by Cocos2D,
    which has a reference to the texture plus extra information to address the sprite
    as an area within the texture. Often, the texture is in fact a Sprite Sheet texture,
    and the CCSpriteFrame class contains information where a specific image can be
    found within the texture.


    Creating a Sprite Frame Animation


    In the SpriteSheets/Global Sprite Sheet, you should find images named *player-anim1.png*
    through *player-anim3.png*.


    If they aren’t there, check the Graphics archive that came with the book. Inside
    the Global folder, you will find those images, drag and drop them from Finder
    onto the SpriteSheets/Global Sprite Sheet to add them. You can also use your own
    series of images as long as they have the same dimensions as the existing *player.png*.


    Now when you select all three *player-anim#.png* images in the SpriteSheets/Global
    Sprite Sheet and right-click to bring up the context menu, you’ll see the same
    menu item highlighted in [Figure 12-1](#part0023.html#Fig1). But don’t click on
    this menu item just yet.


    ![9781484202630_Fig12-01.jpg](images/00180.jpeg)


    [Figure 12-1](#part0023.html#_Fig1). “Create Keyframes from Selection” creates
    Sprite Frame animation keyframes on the currently selected sprite node


    Because *Create* *Keyframes* *from Selection* is a context menu item, you’d expect
    it to apply at any time—but apply to what?


    In fact, this menu item works only if you have an open CCB file and have selected
    a sprite node. The menu item will do nothing if the selected node isn’t a sprite
    node, or if you have multiple sprite nodes or no sprite nodes selected. There’s
    no feedback in those cases whatsoever. You’ll just notice that the command didn’t
    add any keyframes.


    So open the *PlayerSoftBody.ccb* in the *Prefabs* folder, and then select the
    root node labeled *CCSprite* as seen in [Figure 12-1](#part0023.html#Fig1).


    Make sure the Timeline Cursor is moved to the far left. Then select the three
    *player-anim#.png* images, right-click to bring up the context menu, and select
    *Create Keyframes from Selection*.


    You’ll notice that three sprite frame keyframes have been added to the Timeline.
    If you play this animation, you should see the player close his eye lids.


    **Caution**  At the time of this writing, SpriteBuilder had an issue with keyframes
    on a CCB’s root node: A root node’s sprite frame keyframes could not be selected.
    I had to manually add each sprite frame animation keyframe one by one, moving
    the Timeline Cursor into the desired keyframe position before issuing the *Create
    Keyframes from Selection* command on an individual *player-anim#.png* image. I
    assume the issue will be fixed by the time you read this book; but if it is not,
    at least now you know how to work around it.


    Since the *Create Keyframes from Selection* command creates a very fast sequence
    of keyframes and will almost never match the desired animation speed, SpriteBuilder
    provides a way to evenly space a selection of keyframes.


    In order to select multiple keyframes, you can either click on them with the Shift
    key held down or simply click with your mouse on an empty area on the Timeline
    (where the keyframes are) and start dragging. This will draw a selection rectangle
    that will select all keyframes inside the rectangle when you let go of the mouse
    button.


    With the three sprite frame animation keyframes selected, select the *Animation*
    ![image](images/00008.jpeg) *Stretch Selected Keyframes* menu item as seen in
    [Figure 12-2](#part0023.html#Fig2).


    ![9781484202630_Fig12-02.jpg](images/00181.jpeg)


    [Figure 12-2](#part0023.html#_Fig2). Spacing keyframes equally can be done via
    the Stretch Selected Keyframes command


    This will bring up a small dialog where you can enter a *Stretch Factor* value.
    Enter ***3.0*** as the value and click *Done*. The keyframes should now be further
    apart.


    Since the player is closing his eye lids in the animation, it should also open
    them again a short while later. Move the Timeline Cursor to the position where
    the player should open its eyes again, perhaps half a second after the last sprite
    frame keyframe.


    With the *CCSprite* root node still selected, select *player-anim1.png* and *player-anim2.png*
    in the SpriteSheets/Global Sprite Sheet. Or if you still have all three selected,
    you can also just deselect *player-anim3.png* by clicking on it with the Cmd key
    held down. Either way, *player-anim1.png* and *player-anim2.png* should be selected.
    Then right-click one of the selected images and run the *Create Keyframes from
    Selection* command once more.


    Now those two keyframes are in the wrong order. Select them both, and then run
    *Animation* ![image](images/00008.jpeg) *Reverse Selected Keyframes* (as shown
    in [Figure 12-2](#part0023.html#Fig2)) to reverse their order.


    Running this animation will now have the player close its eye lids and open its
    eyes shortly thereafter. For reference, [Figure 12-3](#part0023.html#Fig3) shows
    the approximate result for this sprite frame animation with a total of five sprite
    frame keyframes.


    ![9781484202630_Fig12-03.jpg](images/00182.jpeg)


    [Figure 12-3](#part0023.html#_Fig3). Being the model for an entire SpriteBuilder
    book can be grueling, tiring work'
  trans: "\n***列表 11-20***. 将 `increaseHitCount` 方法声明为 `public`\n\n```\n#import \"\
    CCNode.h\"\n\n@class GameScene;\n\n@interface GameMenuLayer : CCNode\n\n@property\
    \ (weak) GameScene* gameScene;\n-(void) increaseHitCount;\n\n@end\n```\n\n为了方便起见，你将从负责播放碰撞声音的\
    \ `GameScene` 方法中调用 `increaseHitCount` 方法。打开 `GameScene.m`，找到 `playCollisionSoundWithPair:`\
    \ 方法。在方法开头添加列表 11-21 中高亮显示的代码行，并保持原有代码不变。\n\n***列表 11-21***. 当巨大力量冲击玩家时，增加击中计数器\n\
    \n```\n-(void) playCollisionSoundWithPair:(CCPhysicsCollisionPair*)pair\n{\n \
    \   if (pair.totalKineticEnergy > 0.0)\n    {\n        [_gameMenuLayer increaseHitCount];\n\
    \    }\n\n// 为简洁起见，省略了原有代码……\n}\n```\n\n每当有足够大的力作用于玩家时，击中计数器就会增加，标签也会改变其显示的值。图\
    \ 11-18 展示了游戏的德语版本。\n\n![9781484202630_Fig11-18.jpg](img/00179.jpeg)\n\n图 11-18.\
    \ 游戏德语版本，右上角为击中计数位图字体标签\n\n## 总结\n\n在本章中，你学习了如何通过时间线播放音效，以及如何使用 `ObjectAL` 编程实现音频播放。你还了解了短音频（`.caf`/`.wav`）与流式音频（`mp3`、`m4a`）播放的区别。\n\
    \n同时，你应该对 TrueType（TTF）字体标签和位图字体标签之间的区别有了扎实的掌握。你还知道了如何本地化文本字符串，包括如何使用格式字符串以数字或其他字符串更新本地化字符串。\n\
    \n相关结果可以在本书项目的 `12 - Audio Labels and Localization` 文件夹中查看。\n\n## 第 12 章\n\n#\
    \ 视觉效果与动画\n\n在本章中，你将学习如何创建精灵帧动画、如何设计粒子效果，以及如何通过 `Effect` 节点应用着色器效果（该节点本质上是精灵的效果列表）。\n\
    \n## 精灵帧动画\n\n一种常见的精灵动画方式是通过循环播放一系列图像。这被称为*精灵帧动画*。本质上，它与定时更换精灵的纹理是相同的。\n\n*精灵帧*（Sprite\
    \ Frame）这个术语指的是由 `Cocos2D` 提供的一个额外类 `CCSpriteFrame`，它包含对纹理的引用以及其他信息，用于将精灵定位为纹理内的一个区域。通常情况下，纹理实际上是一个精灵表单（Sprite\
    \ Sheet）纹理，而 `CCSpriteFrame` 类则包含特定图像在纹理中的位置信息。\n\n### 创建精灵帧动画\n\n在 `SpriteSheets/Global\
    \ Sprite Sheet` 中，你应该能找到名为 `player-anim1.png` 到 `player-anim3.png` 的图像。\n\n如果它们不在那里，请检查随书附带的图形存档。在\
    \ `Global` 文件夹内，你就能找到这些图像，将它们从访达（Finder）拖放到 `SpriteSheets/Global Sprite Sheet`\
    \ 中即可添加。你也可以使用自己的一系列图像，只要它们与现有的 `player.png` 尺寸相同即可。\n\n现在，当你在 `SpriteSheets/Global\
    \ Sprite Sheet` 中选中所有三个 `player-anim#.png` 图像并右键点击调出上下文菜单时，你会看到与图 12-1 中高亮显示的相同菜单项。但请先不要点击这个菜单项。\n\
    \n![9781484202630_Fig12-01.jpg](img/00180.jpeg)\n\n图 12-1. “从所选内容创建关键帧”在当前选中的精灵节点上创建精灵帧动画关键帧\n\
    \n因为*从所选内容创建关键帧*是一个上下文菜单项，你可能认为它随时都适用——但适用于什么呢？\n\n实际上，这个菜单项仅在你打开了一个 `CCB` 文件并选中了一个精灵节点时才有效。如果选中的节点不是精灵节点，或者你选中了多个精灵节点或没有选中任何精灵节点，这个菜单项将不会执行任何操作。在上述情况下，都不会有任何反馈。你只会注意到该命令没有添加任何关键帧。\n\
    \n因此，请打开 `Prefabs` 文件夹中的 `PlayerSoftBody.ccb`，然后选中标记为 `CCSprite` 的根节点，如图 12-1\
    \ 所示。\n\n确保时间线光标已移到最左侧。然后选中三个 `player-anim#.png` 图像，右键点击调出上下文菜单，并选择*从所选内容创建关键帧*。\n\
    \n你会注意到时间线上已添加了三个精灵帧关键帧。如果播放此动画，你应该会看到玩家闭上了眼睛。\n\n**注意** 在撰写本文时，SpriteBuilder\
    \ 在处理 CCB 根节点上的关键帧时存在一个问题：根节点的精灵帧关键帧无法被选中。我不得不手动逐个添加每个精灵帧动画关键帧，即先将时间线光标移到所需的关键帧位置，然后再对单个\
    \ `player-anim#.png` 图像执行*从所选内容创建关键帧*命令。我假设在您阅读本书时，这个问题已经修复；但如果尚未修复，至少您现在知道如何绕过它。\n\
    \n由于*从所选内容创建关键帧*命令会创建非常快速的关键帧序列，几乎永远无法匹配所需的动画速度，SpriteBuilder 提供了一种方法来均匀间隔选中的关键帧。\n\
    \n为了选中多个关键帧，你可以按住 Shift 键点击它们，或者直接用鼠标在时间线上（关键帧所在的区域）的空白处点击并开始拖动。这将绘制一个选择矩形，松开鼠标按钮时，矩形内的所有关键帧都会被选中。\n\
    \n选中这三个精灵帧动画关键帧后，选择*动画* ![image](img/00008.jpeg)*拉伸选中的关键帧*菜单项，如图 12-2 所示。\n\n\
    ![9781484202630_Fig12-02.jpg](img/00181.jpeg)\n\n图 12-2. 可以通过“拉伸选中的关键帧”命令来等距间隔关键帧\n\
    \n这将弹出一个小的对话框，你可以在其中输入*拉伸因子*（Stretch Factor）值。输入 `3.0` 作为该值，然后点击*完成*。现在关键帧之间的距离应该更大了。\n\
    \n由于玩家在动画中闭上了眼睛，它应该会在稍后再次睁开眼睛。将时间线光标移动到玩家应该再次睁开眼睛的位置，大概在最后一个精灵帧关键帧之后半秒左右。\n\n\
    在仍然选中 `CCSprite` 根节点的情况下，在 `SpriteSheets/Global Sprite Sheet` 中选中 `player-anim1.png`\
    \ 和 `player-anim2.png`。或者，如果你仍然选中了所有三个，你也可以按住 Cmd 键点击 `player-anim3.png` 来取消选中它。无论哪种方式，都应该选中\
    \ `player-anim1.png` 和 `player-anim2.png`。然后右键点击其中一个选中的图像，再次运行*从所选内容创建关键帧*命令。\n\
    \n现在这两个关键帧的顺序是错误的。同时选中它们，然后运行*动画* ![image](img/00008.jpeg)*反向选中的关键帧*（如图 12-2 所示）来反转它们的顺序。\n\
    \n运行此动画将使玩家先闭上眼睛，然后不久后睁开眼睛。作为参考，图 12-3 展示了该精灵帧动画的大致结果，共包含五个精灵帧关键帧。\n\n![9781484202630_Fig12-03.jpg](img/00182.jpeg)\n\
    \n图 12-3. 担任整本 SpriteBuilder 书籍的模特可是一件艰苦又累人的工作\n"
- fmt: "# The First and Fifth Keyframe\n\nThe first and fifth (last) keyframe should\
    \ be the image of the player as you know it, with eyes wide open. The second and\
    \ fourth keyframe should use the sprite frame with the eyes half closed. The third\
    \ (middle) keyframe should use the sprite frame with the player’s eyes fully closed.\n\
    \nPlayed together, this will make the player blink, and the entire animation runs\
    \ for just about half a second.\n\nNow click on the `Timeline Duration` control,\
    \ and change the length of the animation to about 3 seconds. This affects how\
    \ often the player will blink. If you let the Timeline run for 10 seconds, the\
    \ player will blink only every 10 seconds. If you change it down to just a second,\
    \ the player will blink very frequently.\n\n**Caution** After changing the `Timeline\
    \ Duration`, verify that none of the sprite frame keyframes have been cut off.\
    \ The blinking animation shouldn’t run much longer than half a second. If you\
    \ change the `Timeline Duration` to less than half a second, this may irreversibly\
    \ remove excess keyframes—namely, those whose timestamp would now be greater than\
    \ the Timeline’s duration.\n\nFinally, click on the `Timeline Chain` drop-down\
    \ menu, and select `Default Timeline`. This will have the Timeline loop indefinitely\
    \ in the game.\n\nNow if you try this out in the game... there won’t be an animation\
    \ playing. The sprite frame keyframes don’t have any effect yet because the `SoftBodyPlayer.ccb`\
    \ uses a custom class to perform custom rendering.\n\n## Adding Sprite Frame Animations\
    \ to SoftBodyDrawNode\n\n`SoftBodyPlayer.ccb` uses a custom class called `SoftBodyDrawNode`.\
    \ This `CCSprite` subclass uses the initially assigned `spriteFrame` property\
    \ of `CCSprite` to initialize the vertex and texture coordinates for the sprites.\n\
    \nHowever, it doesn’t currently update the texture coordinates when the `spriteFrame`\
    \ property changes. Thus, the sprite frame animation currently has no effect.\n\
    \nTo fix this, you’ll first have to add an ivar that marks the point in time at\
    \ which the player has been initialized. This `_didLoad` flag is important because\
    \ initially `CCBReader` will assign at least one `CCSpriteFrame` to the sprite’s\
    \ `spriteFrame` property, whose setter you’re going to override in order to call\
    \ the `updateTextureCoordinates` method every time the sprite frames change.\n\
    \nBut the initial `spriteFrame` assignments should not trigger the `updateTextureCoordinates`\
    \ method, as its values may not be set up and initialized yet.\n\nAdd the ivar\
    \ highlighted in [Listing 12-1](#part0023.html#list1) to the `SoftBodyDrawNode`\
    \ implementation in `SoftBodyDrawNode.m`.\n\n[***Listing 12-1***](#part0023.html#_list1).\
    \ The `_didLoad` flag is used to determine whether the node has been fully initialized\n\
    \n```\n@implementation SoftBodyDrawNode\n{\n    // existing ivars omitted for\
    \ brevity ...\n\n    BOOL _didLoad;\n}\n```\n\nThen update the `didLoadFromCCB`\
    \ method. Add the highlighted line in [Listing 12-2](#part0023.html#list2) to\
    \ the end of the method. This will mark the node as being fully set up for our\
    \ intents and purposes.\n\n[***Listing 12-2***](#part0023.html#_list2). The node\
    \ is considered initialized by the time the `didLoadFromCCB` method returns\n\n\
    ```\n- (void) didLoadFromCCB\n{\n    [self setup];\n    _didLoad = YES;\n}\n```\n\
    \nThe key change here is to override the `spriteFrame` property setter method,\
    \ which is aptly named `setSpriteFrame:`. It follows the common naming scheme\
    \ for property setters (set with an uppercase first letter of property name, receiving\
    \ a parameter of property type) and getters (same as the property name, taking\
    \ no parameters and returning the property type).\n\nEvery time the Timeline animation\
    \ changes the `spriteFrame` property, you’ll need to run the `updateTextureCoordinates`\
    \ method in order to point it to the new area within the Sprite Sheet texture\
    \ to draw from. If that isn’t done, it will simply keep on drawing the sprite\
    \ frame that was set initially.\n\nAdd the `setSpriteFrame:` method of [Listing\
    \ 12-3](#part0023.html#list3) to `SoftBodyDrawNode.m`, preferably at the very\
    \ bottom just above the `@end` line.\n\n[***Listing 12-3***](#part0023.html#_list3).\
    \ Overriding the `spriteFrame` property setter to update texture coordinates\n\
    \n```\n- (void) setSpriteFrame:(CCSpriteFrame *)spriteFrame\n{\n    [super setSpriteFrame:spriteFrame];\n\
    \n    if (_didLoad)\n    {\n        [self updateTextureCoordinates];\n    }\n\
    }\n```\n\nThe `_didLoad` flag prevents the `updateTextureCoordinates` method from\
    \ being run before `didLoadFromCCB`. This is important because the `setup` method\
    \ called in [Listing 12-2](#part0023.html#list2) needs to run before any call\
    \ to `updateTextureCoordinates`; otherwise, the `_vertices` pointer’s memory would\
    \ not have been allocated, resulting in a crash.\n\nOf course, `setSpriteFrame:`\
    \ does get called at least once before `didLoadFromCCB`, by `CCBReader`. At some\
    \ point, `CCBReader` has to assign the sprite’s initial `spriteFrame` as set up\
    \ in SpriteBuilder, and any assignments issued by `CCBReader` itself need not\
    \ update the texture coordinates.\n\nNow you can build and run the game, and you’ll\
    \ see the player blink its eyes about every three seconds, or whatever duration\
    \ you set for the default Timeline in `SoftBodyPlayer.ccb`.\n\n## Comparing Sprite\
    \ Frames\n\nYou may also want to override the `setSpriteFrame:` method in other\
    \ `CCSprite` subclasses if you want to run code when specific frames are being\
    \ displayed but you don’t want to (or can’t) use the `Callbacks` keyframes to\
    \ do so.\n\nYou can get and store sprite frames in ivars (or arrays or dictionaries)\
    \ which, when passed into the `setSpriteFrame:` method, should run specific selectors.\
    \ For instance, this can be used to synchronize sound effects or speech to start\
    \ with a specific sprite frame.\n\n**Note** This is a theoretical example. You\
    \ needn’t add the following code to the project.\n\nAssuming that `_triggerFrame`\
    \ is a `CCSpriteFrame*` ivar (it must be declared without the `__weak` keyword),\
    \ you can assign it in `didLoadFromCCB` of the `CCSprite` subclass in which you\
    \ want to monitor an animation to play a sound effect when a specific sprite frame\
    \ is set. [Listing 12-4](#part0023.html#list4) shows you how it’s done. Take note\
    \ that, as with all resources, you have to specify the relative path to the file.\n\
    \n[***Listing 12-4***](#part0023.html#_list4). Obtaining a sprite frame reference\
    \ for a given animation image\n\n```\n- (void) didLoadFromCCB\n{\n    _triggerFrame\
    \ = [CCSpriteFrame frameWithImageNamed:\n                     @\"SpriteSheets/Anims/facepalm42.png\"\
    ];\n}\n```\n\nThe `frameWithImageNamed:` method will return the cached image if\
    \ it has already been loaded. This will be the case if the image is in the same\
    \ Sprite Sheet as the sprite frame that the sprite initially uses. That would\
    \ be the sprite frame that’s assigned to the sprite in SpriteBuilder.\n\nThe `frameWithImageNamed:`\
    \ method and similar “look up by name” methods perform at least a string comparison.\
    \ More likely, they’ll also run some name-mangling code in order to locate the\
    \ image resource, which could theoretically be found in a number of different\
    \ locations.\n\nTherefore, it’s recommended to avoid running `frameWithImageNamed:`\
    \ and similar methods while the gameplay is underway. Loading resources at runtime\
    \ is a common source of short, intermittent drops in frame rate (appropriately\
    \ nicknamed *hiccups*).\n\nWith a strong reference to the sprite frame in question\
    \ assigned to `_triggerFrame`, you can now override `setSpriteFrame:` and compare\
    \ the incoming `spriteFrame` parameter with the one referenced by `_triggerFrame`.\n\
    \nIf both are equal, that’s when you can fire a method to run any code that’s\
    \ supposed to be synchronized with specific sprite frames. In [Listing 12-5](#part0023.html#list5),\
    \ that would play a sound effect specific to the animation.\n\n[***Listing 12-5***](#part0023.html#_list5).\
    \ Running a method when the new spriteFrame matches a specific sprite frame\n\n\
    ```\n- (void) setSpriteFrame:(CCSpriteFrame *)spriteFrame\n{\n    [super setSpriteFrame:spriteFrame];\n\
    \n    if ([_triggerFrame isEqual:spriteFrame])\n    {\n        [self playFacepalmSoundEffect];\n\
    \    }\n}\n```"
