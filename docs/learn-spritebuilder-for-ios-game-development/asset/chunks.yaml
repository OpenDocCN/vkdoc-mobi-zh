- fmt: 'SpriteBuilder may also ask you to convert the project format to the new Packages
    format. This is typically safe to do, but there’s no harm done by not doing it.
    Packages essentially only change the location of resource files within the SpriteBuilder
    project. Packages were introduced sometime near the end of the book, so most example
    projects will ask you to switch over to using Packages.


    Once you have an example project opened in SpriteBuilder, you have to publish
    it. The published resource files have been stripped from the Xcode project to
    reduce the archive size.


    When you open the SpriteBuilder project’s Xcode project and build it, you may
    get warnings or even errors. The projects were all tested with Xcode 6.0. If you’re
    using Xcode 6.1 or later, there’s a chance that Apple made changes and improvements
    to the build settings and compiler. For instance, you may be asked to update the
    project’s Build Settings or format. This is usually safe to do.


    **Note** The first time you run the Xcode project, it may appear to hang or take
    a very long time to complete. This may happen in particular when you haven’t previously
    opened the SpriteBuilder project and published it. In that case, Xcode will launch
    the publish process for the SpriteBuilder project, but it won’t give you any progress
    indication. Therefore, it’s recommended that you open and publish the SpriteBuilder
    project first—that way, at least you get a progress indicator.


    You may get some compiler warnings or errors pointing out potential problems in
    the code. If there are warnings originating from one of the library targets (Cocos2D,
    ObjectAL, or Chipmunk), you can ignore those. They are typically uncritical and
    may even persist for several releases. The Cocos2D developers clean up warnings
    from time to time. New errors in previously perfectly acceptable code can occur,
    too. Usually this happens with newer Xcode versions, where the compiler now treats
    certain cases of warnings as errors, or it simply finds new potential issues in
    general. As long as they’re only warnings, ignore them. They are most likely artifacts
    caused by advancements in Xcode.


    However, if you get compiler errors in the libraries, you may want to try updating
    Cocos2D to see if the warnings/errors go away. If there’s an error in the project’s
    code itself (the code in the Source group) and you can’t fix it by yourself, please
    check the SpriteBuilder forum at [http://forum.spritebuilder.com](http://forum.spritebuilder.com)
    for errata and fixes.


    Of the 17 SpriteBuilder projects, the majority were originally created with SpriteBuilder
    versions prior to v1.3. Therefore, the projects numbered 00 to 13 do not contain
    the necessary code to compile them for the Android platform. The projects numbered
    14 through 16 do have Android support. Accordingly, the projects 00 to 13 will
    have different items in the schemes and platform lists than projects 14 through
    16.


    **Tip** You can convert a SpriteBuilder project that doesn’t have Android support
    to one that does by following the instructions here: [http://android.spritebuilder.com/#dealing-with-spritebuilder-projects-from-spritebuilder-1-2-and-earlier](http://android.spritebuilder.com/#dealing-with-spritebuilder-projects-from-spritebuilder-1-2-and-earlier).


    ## Example Projects Mapped to Chapters


    As I said earlier, the example project numbers do not match the chapter numbers.
    Table 1-1 contains a list of chapter numbers and names and what chapter particular
    projects belong to.


    **Table 1-1.** Mapping Chapters to Example Projects


    | Chapter | Project Folder | Project Notes |

    | --- | --- | --- |

    | 02 - Laying the Groundwork | 00 - Starting Point | Same as creating a new SpriteBuilder
    project. |

    | 02 - Laying the Groundwork | 01 - Change Scenes with Buttons | Represents the
    stage of the project midway through Chapter 2. |

    | 02 - Laying the Groundwork | 02 - Level with Player Prefab | Represents the
    stage of the project at the end of Chapter 2. |

    | 03 - Controlling and Scrolling | 03 - Parallax Scrolling | Represents the stage
    of the project at the end of Chapter 3. |

    | 04 - Physics and Collisions | 04 - Physics Movement and Level Borders | Represents
    the stage of the project at the end of Chapter 4. |

    | 05 - Timelines and Triggers | 05 - Timeline Animations | Represents the stage
    of the project midway through Chapter 5. |

    | 05 - Timelines and Triggers | 06 - Triggered Animations | Represents the stage
    of the project at the end of Chapter 5. |

    | 06 - Menus and Popovers | 07 - Popover Menus | Represents the stage of the project
    at the end of Chapter 6. |

    | 07 - Main Scene and GameState | 08 - Main Menu and Settings | Represents the
    stage of the project at the end of Chapter 7. |

    | 08 - Selecting and Unlocking Levels | 09 - Level Selection Scroll View | Represents
    the stage of the project at the end of Chapter 8. |

    | 09 - Physics Joints | 10 - Chains Ropes and Springs | Represents the stage of
    the project at the end of Chapter 9. |

    | 10 - Soft-Body Physics | 11 - Soft-Body Player | Represents the stage of the
    project at the end of Chapter 10. |

    | 11 - Audio and Labels | 12 - Audio Labels and Localization | Represents the
    stage of the project at the end of Chapter 11. |

    | 12 - Visual Effects and Animations | 13 - Animations and Effects | Represents
    the stage of the project at the end of Chapter 12. |

    | 13 - Porting to Android | 14 - HelloSpriteBuilder Android | Test project created
    early in Chapter 13. |

    | 13 - Porting to Android | 15 - Prior to making Android-specific fixes | Starting
    point for an Android port midway through Chapter 13. |

    | 13 - Porting to Android | 16 - Bouncy Beast for Android | Represents the stage
    of the project at the end of Chapter 13. |


    ## About Deployment Targets


    Eventually, you’ll have to make a decision on which devices your app should run
    on, and which iOS versions you are going to support.


    In theory, Cocos2D apps can run on any device with support for OpenGL ES 2.0 running
    at least iOS 5. That makes the iPhone 3GS and the first iPad the oldest iOS devices
    you can run your app on. In theory.


    However, there’s a huge difference in terms of performance between the iPhone
    3GS and the latest iPhone, and the first iPad compared to the latest iPad. Mobile
    technology is advancing fast, definitely faster than desktop computer technology.


    Furthermore, market penetration of each newer iOS device is significantly higher
    than its predecessors. Therefore, supporting older devices like the iPhone 3GS,
    perhaps even the non-widescreen phones iPhone 4 and 4S, may not always be the
    financially sound decision that it seems to be. Historically, and in stark contrast
    to the Android market, you’re more likely to generate a larger number of sales
    by specifically supporting the latest iOS version, the latest models, and their
    exclusive features rather than trying to reach as far back as you can.'
