- fmt: "从 Node Library 添加条目到舞台有两种方式。这两种方式都需要将所需条目从 Node Library 拖拽到舞台上，或者将其拖拽到时间轴视图左侧的另一个节点上。后一种方法让您可以选择节点在层级中的添加位置——换句话说，就是确定该节点的父节点。\n\
    \n如果将新节点直接拖放到舞台上，它将被添加为当前选中节点的同级节点；如果选中根节点或未选中任何节点，它将被添加为根节点的子节点。\n\n**提示**：可以通过点击舞台上的节点进行选择——更准确地说，是在层级时间轴视图中选择所需节点。按住`Shift`或`Cmd`键的同时进行选择，可以一次选择多个节点。按下`Backspace`键可以删除选中的节点。您可以通过`Edit`\
    \ ![image](images/00008.jpeg) `Undo`撤销大多数操作（包括删除操作），直到保存文档为止。\n\n## 创建按钮\n\n现在，将一个按钮拖拽到舞台或时间轴上。将其放置在舞台上的任意位置——目前这样就可以了。新按钮将被选中并标记为“Title”。\n\
    \n在**Item Properties**窗格（位于右侧）中，您会看到大量的值、按钮、复选框和文本字段。`Button`节点可能是所有节点中最复杂的。其属性示例如[图2-6](#part0011.html#Fig6)所示。现在可以随意调整其设置和值；您几乎不会犯错。如果确实操作失误，可以撤销或直接删除按钮，然后拖拽一个新按钮到舞台上重新开始。\n\
    \n![9781484202630_Fig02-06.jpg](images/00014.jpeg)\n\n[图2-6](#part0011.html#_Fig6).\
    \ `CCButton`属性截选\n\n目前，您可能唯一需要更改的是按钮的文本，可以在`CCButton`部分的`Title`文本框中编辑。输入`Change\
    \ Scene`或类似文字作为标题。\n\n## 分配按钮选择器\n\n真正重要的部分是右侧**Details Inspector**中的**Code Connections**标签页。现在点击此标签页。请参考[图2-7](#part0011.html#Fig7)。\n\
    \n![9781484202630_Fig02-07.jpg](images/00015.jpeg)\n\n[图2-7](#part0011.html#_Fig7).\
    \ 按钮的`Code Connections`标签页\n\n您会看到一个标记为`CCControl`的区域，该区域仅在用户界面节点（即按钮、文本字段和滑块节点）上可见。在这里，您可以指定一个选择器，通俗地说，就是“方法的名称”。这是当按钮被按下时发送的消息（或简单地说“被调用的方法”）。\n\
    \n在`Selector`文本字段中输入`exitButtonPressed`。至于`Target`，保留为`Document root`。请确保不勾选`Continuous`复选框，否则当用户持续按住或按下按钮时，该方法会在每一帧都运行。\n\
    \n如果现在发布并运行代码，然后按下按钮，会发生什么？该死！它仍然显示原始的`MainScene`。\n\n## 更改启动场景\n\n要更改 SpriteBuilder\
    \ 项目启动时加载的场景，请在 Xcode 中打开`AppDelegate.m`文件。找到`startScene`方法，并修改它，使其加载`GameScene`文件：\n\
    \n```\n- (CCScene*) startScene\n{\n    return [CCBReader loadAsScene:@\"GameScene\"\
    ];\n}\n```\n\n`CCBReader`是捆绑在`Cocos2d-Swift`中的类，负责加载 CCB 文件。\n\n您可能常用的`CCBReader`方法是`loadAsScene`和`load`，它们分别加载指定的\
    \ CCB 文件并返回一个`CCScene`和`CCNode`实例。目前，只需注意`loadAsScene:`方法会返回一个普通的`CCScene`实例，其唯一子节点是`GameScene.ccb`的根节点。稍后我将更详细地解释这一点。\n\
    \n再次发布并运行应用程序。它将显示带有按钮的`GameScene`，但点击按钮目前还没有任何实际效果。\n\n## 为 GameScene 创建自定义类\n\
    \n要使代码连接正常工作（无论是在指定选择器时，还是在将节点分配为实例变量（`ivar`，“类的实例变量”的缩写）时），您必须在 SpriteBuilder\
    \ 中指定一个自定义类。然后在 Xcode 中创建同名的类，其中包含相应的选择器或实例变量。反之亦然；顺序并不重要。\n\n对于选择器和实例变量，您都可以指定一个目标，默认分别为`Document\
    \ root`和`Doc root var`。这个所谓的“文档根节点”指的是包含当前编辑节点的 CCB 文件的根节点。根节点是层级中最顶层的节点——即创建\
    \ CCB 文件时就已经存在的节点。（参见[图2-8](#part0011.html#Fig8)。）因此，自定义类属性必须在根节点上进行编辑。\n\n![9781484202630_Fig02-08.jpg](images/00016.jpeg)\n\
    \n[图2-8](#part0011.html#_Fig8). 选中根节点\n\n**注意**：仅在运行时使用已存在的场景加载 CCB 内容时，才将`Owner`设置用作选择器和实例变量的目标。您可以指定一个自定义对象（所有者）作为选择器和实例变量的接收者。一个用途是将覆盖菜单\
    \ CCB 的按钮选择器映射到场景的自定义类。一个常见的误解是`Owner`设置指的是选中节点的自定义类——事实并非如此。\n\n在`GameScene.ccb`中选择根节点，并切换到**Detail\
    \ View**上的**Code Connections**标签页。根节点始终是节点层级中的第一个节点。您可以在时间轴视图中最轻松地选中它，如[图2-8](#part0011.html#Fig8)所示。\n\
    \n选中根节点后，在`Custom class`字段中输入`GameScene`，如[图2-9](#part0011.html#Fig9)所示。请确保大小写也匹配。如果您在自定义类文本字段中输入`gamescene`，但将类命名为`GameScene`，则代码连接将无法工作。您还必须使用有效的`Objective-C`类名。如果不确定，只需使用字母和数字，并且不要以数字开头类名，这样就没问题。\n\
    \n![9781484202630_Fig02-09.jpg](images/00017.jpeg)\n\n[图2-9](#part0011.html#_Fig9).\
    \ `GameScene.ccb`根节点，已分配自定义类\n\n现在切换到 Xcode。您应该仍然打开着项目。如果没有，请转到`File` ![image](images/00008.jpeg)\
    \ `Open Recent`，并从列表中选择项目，或者像之前提到的那样在 Finder 中双击`.xcodeproj`文件。\n\n在项目中选择`Source`组，然后从菜单中选择`File`\
    \ ![image](images/00008.jpeg) `New` ![image](images/00008.jpeg) `File`，或右键单击并从上下文菜单中选择`New\
    \ File`。在点击**Next**之前，从[图2-10](#part0011.html#Fig10)所示的项目列表中选择`Cocoa Touch Class`（Xcode\
    \ 5：`Objective-C Class`）模板。\n\n![9781484202630_Fig02-10.jpg](images/00018.jpeg)\n\
    \n[图2-10](#part0011.html#_Fig10). Xcode 文件模板对话框\n\n将您的类命名为与在 SpriteBuilder 中完全相同的名称。在此示例中，它必须命名为`GameScene`，如[图2-11](#part0011.html#Fig11)所示。使其成为`CCNode`的子类，而不是`CCScene`，因为即使是类型为`Scene`的\
    \ CCB 文件，其根节点也是一个`CCNode`实例。点击**Next**并保存文件。\n\n![9781484202630_Fig02-11.jpg](images/00019.jpeg)\n\
    \n[图2-11](#part0011.html#_Fig11). 创建一个名为`GameScene`的新`Objective-C`类\n\n**提示**：如果您为类型为`Sprite`的\
    \ CCB 文件创建自定义类，则必须使该类成为`CCSprite`的子类。相应地，对于`Particles` CCB 文件，您必须使其成为`CCParticleSystem`的子类。对于所有其他\
    \ CCB 文件类型，您必须使自定义类成为`CCNode`的子类。\n\n现在选择`GameScene.m`文件。作为快速测试类是否已创建并初始化，您可以实现`didLoadFromCCB`方法，该方法由`CCBReader`发送给它创建的每个节点。您的`GameScene.m`实现应该如下所示：\n\
    \n```\n#import \"GameScene.h\"\n\n@implementation GameScene\n```"
  raw: 'You have two ways of adding items from the Node Library onto the stage. Both
    involve dragging the desired item from the Node Library and dropping it either
    directly onto the Stage or dropping them on the left side of the Timeline View
    on another node. The latter approach gives you the option to determine where in
    the hierarchy the node should be added—in other words, what that node’s parent
    should be.


    If you drop the new node directly onto the stage, it will be added as a sibling
    of the currently selected node, or as a child of the root node for cases when
    the root node is selected or when no node is selected.


    **Tip**  Selection can be performed by clicking on a node in the stage—or more
    accurately, by selecting the desired node in the hierarchical Timeline View. Multiple
    selections are possible by holding down the Shift or Cmd key while selecting.
    You can delete selected nodes by pressing the Backspace key. You can Edit ![image](images/00008.jpeg)
    Undo most operations, including deletions, until you save the document.


    Creating a Button


    Now drag and drop a button onto the stage or timeline. Position it anywhere on
    the stage—that’s fine for now. The new button will be selected and labeled “Title”.


    On the Item Properties pane (to the right), you will see a large collection of
    values, buttons, check boxes, and text fields. The Button node is probably the
    most complex node of them all. An example of its properties is shown in [Figure
    2-6](#part0011.html#Fig6). Feel free to play with its settings and values at this
    point; there’s little you can do wrong. And if you do the wrong thing, you can
    Undo or simply delete the button and drag a new one onto the stage to start over.


    ![9781484202630_Fig02-06.jpg](images/00014.jpeg)


    [Figure 2-6](#part0011.html#_Fig6). Excerpt of CCButton properties


    For now, the only thing you probably should change is the button’s text, editable
    under the **CCButton** section in the **Title** text box. Enter “Change Scene”
    or something similar as the title.


    Assigning a Button Selector


    The really important part is the **Code Connections** tab in the Details Inspector
    on the right side. Click on this tab now. See [Figure 2-7](#part0011.html#Fig7)
    for reference.


    ![9781484202630_Fig02-07.jpg](images/00015.jpeg)


    [Figure 2-7](#part0011.html#_Fig7). The button’s Code Connections tab


    You’ll see a section labeled **CCControl** that you’ll only see on user-interface
    nodes, namely Button, Text Field, and Slider nodes. This is where you can specify
    a selector, also known as “the name of a method” for those not afraid to put it
    in layman’s terms. That’s the message being sent (or simply “the method being
    called”) when the button is pressed.


    Enter *exitButtonPressed* in the **Selector** text field. As for **Target**, leave
    it on *Document root*. Be sure to leave the **Continuous** check box unchecked,
    or else the method would run every frame while the user keeps the button tapped
    or pressed.


    What happens now if you publish and run the code, and then press the button? Darn!
    It’s still showing the original MainScene.


    Changing the Launch Scene


    To change the scene with which a SpriteBuilder project launches, open the AppDelegate.m
    file in Xcode. Locate the startScene method, and modify it so it loads the GameScene
    file:


    ```

    - (CCScene*) startScene

    {

        return [CCBReader loadAsScene:@"GameScene"];

    }

    ```


    CCBReader is the class bundled with Cocos2d-Swift that is responsible for loading
    CCB files.


    The CCBReader methods you are likely to use are loadAsScene and load, which both
    load the specified CCB file and return a CCScene and CCNode instance, respectively.
    For now, it’s only noteworthy that loadAsScene: returns a plain CCScene instance
    with the GameScene.ccb root node as its only child. I’ll explain this in more
    detail soon.


    Publish again, and run the app. It’ll bring up the GameScene with the button,
    but tapping the button doesn’t do anything useful yet.


    Creating a Custom Class for the GameScene


    For code connections to work, both when specifying a selector and when assigning
    a node as an *ivar* (short for “instance variable of a class”), you will have
    to specify a custom class in SpriteBuilder. Then create the class of the same
    name containing the corresponding selector/ivar in Xcode. Or vice versa; the order
    is not important.


    Both for selectors and ivars, you can specify a target, which defaults to *Document
    root* and *Doc root var*, respectively. This so-called “document root” refers
    to the root node of the CCB file which contains the currently edited node. The
    root node is the topmost node in the hierarchy—the one that’s already there when
    you create a CCB file. (See [Figure 2-8](#part0011.html#Fig8).) Therefore, the
    custom class property must be edited on the root node.


    ![9781484202630_Fig02-08.jpg](images/00016.jpeg)


    [Figure 2-8](#part0011.html#_Fig8). The root node is selected


    **Note**  Using the *Owner* setting as the target for selectors and ivars is done
    only in cases where you load the contents of a CCB at runtime with an already
    existing scene. You can specify a custom object (owner) as the receiver of selectors
    and ivars. One use for this is to map an overlay-menu CCB’s button selectors to
    the scene’s original custom class. A common misconception is that the *Owner*
    setting refers to the custom class of the selected node—that is not the case.


    Select the root node in the GameScene.ccb, and switch to the Code Connections
    tab on the Detail View. The root node is always the first node in the node hierarchy.
    You can most easily select it in the Timeline View, as seen in [Figure 2-8](#part0011.html#Fig8).


    With the root node selected, enter *GameScene* in the **Custom class** field like
    in [Figure 2-9](#part0011.html#Fig9). Be sure the case matches, too. If you enter
    “gamescene” in the custom class text field but name your class “GameScene,” the
    code connection is not going to work. You also have to use a valid Objective-C
    class name. If in doubt, just stick to letters and numbers and don’t start the
    class name with a number, and you’ll be fine.


    ![9781484202630_Fig02-09.jpg](images/00017.jpeg)


    [Figure 2-9](#part0011.html#_Fig9). GameScene.ccb root node with custom class
    assigned


    Now switch over to Xcode. You should still have the project open. If not, go to
    File ![image](images/00008.jpeg) Open Recent, and select the project from the
    list, or double-click the .xcodeproj in Finder as mentioned earlier.


    Select the “Source” group in the project, and perform File ![image](images/00008.jpeg)
    New ![image](images/00008.jpeg) File from the menu, or right-click and select
    New File from the context menu. Select the Cocoa Touch Class (Xcode 5: Objective-C
    Class) template from the list of items shown in [Figure 2-10](#part0011.html#Fig10)
    before clicking **Next**.


    ![9781484202630_Fig02-10.jpg](images/00018.jpeg)


    [Figure 2-10](#part0011.html#_Fig10). Xcode file templates dialog


    Name your class exactly as you did in SpriteBuilder. In this instance, it must
    be named GameScene as shown in [Figure 2-11](#part0011.html#Fig11). Make it a
    subclass of CCNode, not CCScene, because even in CCB files of type Scene, the
    root node is a CCNode instance. Click **Next** and save the file.


    ![9781484202630_Fig02-11.jpg](images/00019.jpeg)


    [Figure 2-11](#part0011.html#_Fig11). Creating a new Objective-C class named GameScene


    **Tip**  If you ever create a custom class for CCB files of type Sprite, you’ll
    have to make the class a subclass of CCSprite. Accordingly, for Particles CCBs,
    you’ll have to make them a subclass of CCParticleSystem. For all other CCB file
    types, you have to make the custom class a subclass of CCNode.


    Now select the GameScene.m file. As a quick test of whether the class is created
    and initialized, you can implement the didLoadFromCCB method sent by CCBReader
    to every node it creates. Your GameScene.m implementation should look like this:


    ```

    #import "GameScene.h"


    @implementation GameScene'
