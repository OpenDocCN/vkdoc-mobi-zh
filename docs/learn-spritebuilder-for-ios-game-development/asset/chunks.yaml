  trans: '

    # 视差滚动


    `MIN`宏会返回`viewPos`或`levelSize 减去 viewSize`这两个值中较小的那个，并将结果传递给外层的`MAX`宏，该宏进而确保`viewPos`始终大于或等于
    0.0。两者共同作用，防止`_levelNode`滚动超出其边界。


    最后，系统会对`viewPos`取反（乘以–1.0），然后将其赋值给`_levelNode.positionInPoints`。还记得我之前提到的关于朝相反方向移动关卡节点的内容吗？这一行代码实现的就是这个功能。例如，如果计算出的`viewPos`为
    850,340，那么`ccpNeg`方法会将坐标更改为–850,–340，从而使`_levelNode`的移动方向与玩家前进方向相反。


    发布 SpriteBuilder 项目，然后构建并运行 Xcode 项目。现在，你可以在关卡区域内滚动，但无法超出该区域。


    如果你无法清晰感受到滚动效果，可以返回 SpriteBuilder，更改`Level1.ccb`颜色渐变节点的 Vector 属性，使其渐变方向倾斜。或者，直接根据你的需要向`Level1.ccb`添加更多
    Color Node 或 Gradient Node 实例，这样在移动玩家时就能看到一些视觉元素随之滚动。然后重新发布并运行该项目。


    ## 视差滚动


    既然你已经在享受滚动的乐趣，为什么不通过视差背景层让效果更出色呢？


    视差是一种在 2D 游戏中营造深度感的方法，其原理是让背景层的移动速度慢于实际游戏层。有些游戏甚至会添加移动速度更快的前景层，以营造出某些物体比游戏角色更靠近摄像机的效果。


    实现视差滚动有多种方式，最简单的是根据每层特定的速度系数，让各层以不同速度移动。但这种方法存在缺陷：你永远无法确切知道每层需要多大尺寸，也难以判断当玩家到达关卡中某个特定点时，哪些背景层的哪些部分会可见。


    我在本书中采用的视差方法，是根据每个背景层尺寸与关卡尺寸的比例，推导出每层的滚动速度系数。这样一来，背景层也能与关卡边界完美对齐。如果玩家位于关卡的最左侧角落，背景层的左下角将与关卡的左下角对齐。其他三个角落同理。背景层既不会“超出”，也不会“过短”，其滚动速度完全取决于它们相对于关卡节点内容尺寸的内容尺寸。


    ## 添加背景 CCB


    首先，在 SpriteBuilder 的资源导航器中，切换到文件视图标签页，然后在 Levels 文件夹中添加一个子文件夹，命名为`Parallax`。选中该文件夹，通过
    File ![image](img/00008.jpeg) New ![image](img/00008.jpeg) File 创建一个新的 CCB 文件，如图
    3-4 所示。


    ![9781484202630_Fig03-04.jpg](img/00043.jpeg)


    图 3-4。为背景层创建新的节点 CCB 文件


    这次选择 Node 作为 CCB 类型，并将文档名称设置为`Background1.ccb`。然后点击 Create。你的文件视图应如图 3-5 所示。


    ![9781484202630_Fig03-05.jpg](img/00044.jpeg)


    图 3-5。SpriteBuilder 中文件视图的当前状态


    现在，切换到资源导航器中的节点库视图标签页，将一个 Gradient Node 拖放至舞台。你可以随意更改渐变颜色。关键部分是节点位置应设置为 0,0，并且其内容尺寸应足够大，以填充
    iPhone 和 iPad 屏幕。在撰写本文时，这意味着渐变层的内容尺寸至少应为 568x384，才能覆盖当前所有设备的整个可视区域。图 3-6 展示了 Gradient
    Node 的属性。


    ![9781484202630_Fig03-06.jpg](img/00045.jpeg)


    图 3-6。背景渐变节点属性


    **注意** 当你创建类型为 Layer 的 CCB 时，会注意到它默认采用相同的 568x384 尺寸。568 点是 4 英寸 iPhone 的宽度，而
    iPad 屏幕宽度仅为 512 点——更准确地说，SpriteBuilder 默认将 iPad 屏幕视为其点数的一半，即 512x384，而非实际的 1024x768
    点。这是因为 SpriteBuilder 默认会在 iPad 上将节点位置和尺寸放大 2 倍。384 点的高度源于这样一个事实：iPad 屏幕高度为 768
    点的一半后，仍略高于 320 点高的 4 英寸 iPhone 屏幕。这个略显奇怪的 568x384 内容尺寸是能适配所有 iPhone 和 iPad 屏幕尺寸的最小公倍数。它可以按
    2 倍和 4 倍的比例缩放，以匹配 iPhone Retina、iPad 和 iPad Retina 分辨率——虽不完美，但已足够接近。


    至于渐变颜色，如果你确实想让它们与本书图形所用的颜色完全相同，请点击“Start color”属性旁边的颜色矩形。这将打开 OS X 颜色选择对话框。在 Color
    Palettes 选项卡（浮动色轮对话框中的第三个选项卡）中，将 Palettes 下拉菜单设置为 Web Safe Colors。然后选择旁边带有`FFCC33`代码的橙黄色。对
    End Color 执行相同操作，但选择颜色代码为`FF6699`的粉红色。


    请注意，你也可以使用带有渐变图像的精灵；然而，如果除了渐变本身之外不需要更多细节，那么 Gradient Node 可能更快，而且消耗的内存肯定少得多。


    ## 添加主背景精灵


    本书可下载存档中还提供了一个名为`level1_background_Cerberus.png`的背景精灵。图 3-7 描绘了该图像。它将绘制在渐变之上，并且尺寸略大于渐变。背景层或图像越大，玩家在关卡中移动时其视差效果就越快。与之前一样，如果你愿意，也可以提供自己创作的图像，只要图像尺寸匹配即可。


    ![9781484202630_Fig03-07.jpg](img/00046.jpeg)


    图 3-7。Cerberus 背景图像


    说到图像尺寸。由于 SpriteBuilder 默认所有图像均按 iPad Retina 分辨率设计，因此图像必须相应巨大：2375x1625 像素。SpriteBuilder
    将自动为非 Retina iPad 和 Retina iPhone（1188x813 像素）以及非 Retina iPhone（594x406 像素）创建缩小版本的图像。如你所见，当缩小到非
    Retina iPhone 的点尺寸时，该图像仅略大于 4 英寸 iPhone 的 568x320 点尺寸。


    **提示** 这个图像的尺寸并不理想，不适合进行缩小处理，因为除以 2 或 4 时会出现像 1187.5 x 812.5 这样的小数尺寸。图像中不能存在小数像素，因此图像尺寸会四舍五入到最接近的整数值。对于像这样的巨大背景图像来说，这没什么影响，但对于较小的图像而言，选择一个能被
    4 整除且没有余数的 iPad Retina 图像尺寸就很重要了。否则，在应用使用缩小版本图像的设备上，由于图像宽高比的微小差异，可能会出现瑕疵。


    在添加 Cerberus 图像之前，请在文件视图中创建一个名为`Sprites`的文件夹，并在其中创建一个名为`Level1`的子文件夹。你将在此处存储该特定关卡的图像，这些图像不应置于
    SpriteSheet 中。为何不应放入 SpriteSheet？原因很简单：因为该图像太大，放入 SpriteSheet 并无益处，而且它在一个关卡中只会被用到一次。它会占用过多空间，使其他会被多次使用的图像几乎没有空间存放。

