- fmt: "You can then select any one of the border nodes in the Timeline, and just\
    \ copy and paste it (Edit ![image](images/00008.jpeg) Copy and Edit ![image](images/00008.jpeg)\
    \ Paste) to create a sibling with the same name as the source. The copy, unfortunately,\
    \ will be at the exact same position as the original, meaning you don’t instantly\
    \ see that you did create a copy. You’ll have to drag the copy away. Still, copying\
    \ and pasting is the fastest way to fill a level with multiple nodes of the same\
    \ type and preserve at least categorizable names for the nodes.\n\nYou should\
    \ now cover up the walls with borders as you see fit by copying and arranging\
    \ them until there aren’t any “holes” left where the player might be able to squeeze\
    \ out, eventually leaving the level area.\n\nYou can also rotate the borders freely\
    \ to make up the bottom and side borders. The physics shapes will be rotated accordingly\
    \ and behave correctly in the game. The same goes for scaling, though this will\
    \ blur the images, especially if the scale factor for at least one axis is 2 or\
    \ more.\n\n**Caution** I mentioned earlier that physics shapes can’t be scaled.\
    \ Now I’m saying you can scale them. So which is it? Well, the scale property\
    \ of a node with a physics body truly can’t be animated or changed at runtime.\
    \ Still, you can set the initial scale of a physics-enabled node in SpriteBuilder,\
    \ so it will create an appropriately scaled version of the physics collision shape\
    \ when the project is published.\n\nIf you are impatient and want to quickly get\
    \ back to reading this book, just scale up the borders significantly along the\
    \ *x* axis so that you need only a few border nodes to completely surround the\
    \ level with impenetrable borders. You can go back and create a decent-looking\
    \ level at a later time, something like what you see in [Figure 4-11](#part0013.html#Fig11).\n\
    \n![9781484202630_Fig04-11.jpg](images/00070.jpeg)\n\n[Figure 4-11](#part0013.html#_Fig11).\
    \ Don’t count the calories: `Level1.ccb` with delicious chocolate borders\n\n\
    Publish, build, and run the project. If you can’t see or move the player, make\
    \ sure the player isn’t overlapping with a border.\n\nIf you notice any of the\
    \ borders falling down, you forgot to set them to Static. In that case, open the\
    \ corresponding CCB file and check that Static is selected on the Item Physics\
    \ tab.\n\n**Tip** You can quickly open a CCB file by double-clicking on its thumbnail\
    \ in the Tileless Editor View.\n\nIf it’s done correctly, the player should no\
    \ longer be able to move or fall outside the level. Congratulations! You now have\
    \ collisions in your level.\n\n## Interlude: Physics Debug Drawing\n\nThere’s\
    \ one important aspect about collision shapes you have to memorize: the physics\
    \ engine couldn’t care less about what’s drawn on the screen. It considers only\
    \ its internal state.\n\nImage and collision shapes, for instance, may not always\
    \ match up exactly, perhaps caused by an editing accident in SpriteBuilder or\
    \ simply because you’ve modified the image contents without adapting the sprite’s\
    \ collision shape. To debug such issues, it is very helpful to turn on physics\
    \ debug drawing once in a while.\n\n**Caution** Debug drawing will slow down your\
    \ game. If you want to assess your game’s performance or simply play the game,\
    \ be sure to have physics debug drawing turned off.\n\nTo turn debug drawing on,\
    \ add a new `BOOL` to the `GameScene.m` in Xcode as seen in [Listing 4-7](#part0013.html#list7).\n\
    \n[***Listing 4-7***](#part0013.html#_list7). Add the debug draw ivar\n\n```\n\
    @implementation GameScene\n{\n    // Other variables omitted\n\n    BOOL _drawPhysicsShapes;\n\
    }\n```\n\nLocate the `loadLevelNamed:` method in the same class, and insert the\
    \ highlighted line in [Listing 4-8](#part0013.html#list8) after the `_physicsNode`\
    \ is assigned.\n\n[***Listing 4-8***](#part0013.html#_list8). Add the highlighted\
    \ line to the `loadLevelNamed:` method\n\n```\n_physicsNode = (CCPhysicsNode*)[_levelNode\
    \ getChildByName:@\"physics\"\n                                              recursively:NO];\n\
    _physicsNode.debugDraw = _drawPhysicsShapes;\n```\n\nSo...where to set this ivar’s\
    \ value? In SpriteBuilder, of course. Open the `GameScene.ccb` and select its\
    \ root node in the Timeline. On the Item Properties tab, click the Edit Custom\
    \ Properties button. Add a property of the same name as the `_drawPhysicsShapes`\
    \ ivar, but this time use `Bool` as the type and set its value to 1, as seen in\
    \ [Figure 4-12](#part0013.html#Fig12).\n\n![9781484202630_Fig04-12.jpg](images/00071.jpeg)\n\
    \n[Figure 4-12](#part0013.html#_Fig12). Add a custom property to toggle physics\
    \ debug drawing on or off\n\nNow you can publish, build, and run to see what physics\
    \ debug drawing does. Or allow me to direct your attention to [Figure 4-13](#part0013.html#Fig13),\
    \ which provides an example.\n\n![9781484202630_Fig04-13.jpg](images/00072.jpeg)\n\
    \n[Figure 4-13](#part0013.html#_Fig13). Screen shot from the game with physics\
    \ debug drawing enabled\n\nYou may notice the polygons you’ve edited for the borders\
    \ are actually made up of multiple smaller shapes. This is because internally\
    \ the physics engine must work with convex shapes, so SpriteBuilder splices the\
    \ polygons up into as few convex shapes as possible in order to represent non-convex\
    \ (concave) polygons. In a time before SpriteBuilder, you actually had to ensure\
    \ you didn’t accidentally create concave shapes. What a pain that was!\n\n**Note**\
    \ Convex shapes are shapes where, put simply, a segment between any two points\
    \ on or inside the shape is always wholly contained inside the shape. For example,\
    \ circles, triangles, and rectangles are always convex, and so are pentagons,\
    \ hexagons, and similarly rounded shapes. A concave shape, on the other hand,\
    \ is a shape where at least one segment between any two points on or inside the\
    \ shape can be drawn so that it runs at least partially outside the shape’s area.\
    \ For example, L-, T- and U-shaped areas are concave.\n\nTry to create convex\
    \ shapes for dynamic bodies whenever you can to improve collision stability and\
    \ performance. Decomposing a concave shape leaves tiny “cracks” in the shape,\
    \ which can sometimes cause dynamic bodies to respond to collisions unexpectedly,\
    \ like getting stuck for instance. Collision tests performed against dynamic bodies\
    \ with decomposed concave shapes are also computationally more expensive.\n\n\
    The state of the project at this point can be found in the `“04 - Physics Movement\
    \ and Level Borders”` folder.\n\n## Collision Callback Methods\n\nNow it’s time\
    \ to fire up Xcode once more to add code that runs a so-called *callback method*\
    \ whenever specific collision events occur.\n\n### Implementing the Collision\
    \ Delegate Protocol\n\nBefore you can receive contact callback messages, there’s\
    \ a little setup necessary in order to register the `GameScene` class with the\
    \ `CCPhysicsBody` of the level, as referenced by the `_physicsNode` ivar.\n\n\
    Open `GameScene.h`, which you’ll find looks pretty basic, like in [Listing 4-9](#part0013.html#list9).\n\
    \n[***Listing 4-9***](#part0013.html#_list9). The `GameScene` interface\n\n```\n\
    #import \"CCNode.h\"\n\n@interface GameScene : CCNode\n\n@end\n```\n\nIn order\
    \ to allow the class to be used as a receiver of physics collision messages, it\
    \ must implement the `CCPhysicsCollisionDelegate` protocol. This is done by simply\
    \ appending the protocol in angle brackets at the end of the `@interface`, as\
    \ seen in [Listing 4-10](#part0013.html#list10).\n\n[***Listing 4-10***](#part0013.html#_list10).\
    \ `GameScene` is now said to adhere to the `CCPhysicsCollisionDelegate` protocol\n\
    \n```\n#import \"CCNode.h\"\n\n@interface GameScene : CCNode <CCPhysicsCollisionDelegate>\n\
    \n@end\n```\n\nIn `GameScene.m`, you can now register `self` as the collision\
    \ delegate of the `_physicsNode`. In the `loadLevelNamed:` method, add the line\
    \ highlighted in [Listing 4-11](#part0013.html#list11).\n\n[***Listing 4-11***](#part0013.html#_list11).\
    \ Assign the `GameScene` instance as the `_physicsNode`’s collision delegate"
  raw: 'You can then select any one of the border nodes in the Timeline, and just
    copy and paste it (Edit ![image](images/00008.jpeg) Copy and Edit ![image](images/00008.jpeg)
    Paste) to create a sibling with the same name as the source. The copy, unfortunately,
    will be at the exact same position as the original, meaning you don’t instantly
    see that you did create a copy. You’ll have to drag the copy away. Still, copying
    and pasting is the fastest way to fill a level with multiple nodes of the same
    type and preserve at least categorizable names for the nodes.


    You should now cover up the walls with borders as you see fit by copying and arranging
    them until there aren’t any “holes” left where the player might be able to squeeze
    out, eventually leaving the level area.


    You can also rotate the borders freely to make up the bottom and side borders.
    The physics shapes will be rotated accordingly and behave correctly in the game.
    The same goes for scaling, though this will blur the images, especially if the
    scale factor for at least one axis is 2 or more.


    **Caution**  I mentioned earlier that physics shapes can’t be scaled. Now I’m
    saying you can scale them. So which is it? Well, the scale property of a node
    with a physics body truly can’t be animated or changed at runtime. Still, you
    can set the initial scale of a physics-enabled node in SpriteBuilder, so it will
    create an appropriately scaled version of the physics collision shape when the
    project is published.


    If you are impatient and want to quickly get back to reading this book, just scale
    up the borders significantly along the *x* axis so that you need only a few border
    nodes to completely surround the level with impenetrable borders. You can go back
    and create a decent-looking level at a later time, something like what you see
    in [Figure 4-11](#part0013.html#Fig11).


    ![9781484202630_Fig04-11.jpg](images/00070.jpeg)


    [Figure 4-11](#part0013.html#_Fig11). Don’t count the calories: Level1.ccb with
    delicious chocolate borders


    Publish, build, and run the project. If you can’t see or move the player, make
    sure the player isn’t overlapping with a border.


    If you notice any of the borders falling down, you forgot to set them to Static.
    In that case, open the corresponding CCB file and check that Static is selected
    on the Item Physics tab.


    **Tip**  You can quickly open a CCB file by double-clicking on its thumbnail in
    the Tileless Editor View.


    If it’s done correctly, the player should no longer be able to move or fall outside
    the level. Congratulations! You now have collisions in your level.


    Interlude: Physics Debug Drawing


    There’s one important aspect about collision shapes you have to memorize: the
    physics engine couldn’t care less about what’s drawn on the screen. It considers
    only its internal state.


    Image and collision shapes, for instance, may not always match up exactly, perhaps
    caused by an editing accident in SpriteBuilder or simply because you’ve modified
    the image contents without adapting the sprite’s collision shape. To debug such
    issues, it is very helpful to turn on physics debug drawing once in a while.


    **Caution**  Debug drawing will slow down your game. If you want to assess your
    game’s performance or simply play the game, be sure to have physics debug drawing
    turned off.


    To turn debug drawing on, add a new BOOL to the GameScene.m in Xcode as seen in
    [Listing 4-7](#part0013.html#list7).


    [***Listing 4-7***](#part0013.html#_list7). Add the debug draw ivar


    ```

    @implementation GameScene

    {

        // Other variables omitted


    BOOL _drawPhysicsShapes;

    }

    ```


    Locate the loadLevelNamed: method in the same class, and insert the highlighted
    line in [Listing 4-8](#part0013.html#list8) after the _physicsNode is assigned.


    [***Listing 4-8***](#part0013.html#_list8). Add the highlighted line to the loadLevelNamed:
    method


    ```

    _physicsNode = (CCPhysicsNode*)[_levelNode getChildByName:@"physics"

                                                  recursively:NO];

    _physicsNode.debugDraw = _drawPhysicsShapes;

    ```


    So...where to set this ivar’s value? In SpriteBuilder, of course. Open the GameScene.ccb
    and select its root node in the Timeline. On the Item Properties tab, click the
    Edit Custom Properties button. Add a property of the same name as the _drawPhysicsShapes
    ivar, but this time use Bool as the type and set its value to 1, as seen in [Figure
    4-12](#part0013.html#Fig12).


    ![9781484202630_Fig04-12.jpg](images/00071.jpeg)


    [Figure 4-12](#part0013.html#_Fig12). Add a custom property to toggle physics
    debug drawing on or off


    Now you can publish, build, and run to see what physics debug drawing does. Or
    allow me to direct your attention to [Figure 4-13](#part0013.html#Fig13), which
    provides an example.


    ![9781484202630_Fig04-13.jpg](images/00072.jpeg)


    [Figure 4-13](#part0013.html#_Fig13). Screen shot from the game with physics debug
    drawing enabled


    You may notice the polygons you’ve edited for the borders are actually made up
    of multiple smaller shapes. This is because internally the physics engine must
    work with convex shapes, so SpriteBuilder splices the polygons up into as few
    convex shapes as possible in order to represent non-convex (concave) polygons.
    In a time before SpriteBuilder, you actually had to ensure you didn’t accidentally
    create concave shapes. What a pain that was!


    **Note**  Convex shapes are shapes where, put simply, a segment between any two
    points on or inside the shape is always wholly contained inside the shape. For
    example, circles, triangles, and rectangles are always convex, and so are pentagons,
    hexagons, and similarly rounded shapes. A concave shape, on the other hand, is
    a shape where at least one segment between any two points on or inside the shape
    can be drawn so that it runs at least partially outside the shape’s area. For
    example, L-, T- and U-shaped areas are concave.


    Try to create convex shapes for dynamic bodies whenever you can to improve collision
    stability and performance. Decomposing a concave shape leaves tiny “cracks” in
    the shape, which can sometimes cause dynamic bodies to respond to collisions unexpectedly,
    like getting stuck for instance. Collision tests performed against dynamic bodies
    with decomposed concave shapes are also computationally more expensive.


    The state of the project at this point can be found in the “04 - Physics Movement
    and Level Borders” folder.


    Collision Callback Methods


    Now it’s time to fire up Xcode once more to add code that runs a so-called *callback
    method* whenever specific collision events occur.


    Implementing the Collision Delegate Protocol


    Before you can receive contact callback messages, there’s a little setup necessary
    in order to register the GameScene class with the CCPhysicsBody of the level,
    as referenced by the _physicsNode ivar.


    Open GameScene.h, which you’ll find looks pretty basic, like in [Listing 4-9](#part0013.html#list9).


    [***Listing 4-9***](#part0013.html#_list9). The GameScene interface


    ```

    #import "CCNode.h"


    @interface GameScene : CCNode


    @end

    ```


    In order to allow the class to be used as a receiver of physics collision messages,
    it must implement the CCPhysicsCollisionDelegate protocol. This is done by simply
    appending the protocol in angle brackets at the end of the @interface, as seen
    in [Listing 4-10](#part0013.html#list10).


    [***Listing 4-10***](#part0013.html#_list10). GameScene is now said to adhere
    to the CCPhysicsCollisionDelegate protocol


    ```

    #import "CCNode.h"


    @interface GameScene : CCNode <CCPhysicsCollisionDelegate>


    @end

    ```


    In GameScene.m, you can now register self as the collision delegate of the _physicsNode.
    In the loadLevelNamed: method, add the line highlighted in [Listing 4-11](#part0013.html#list11).


    [***Listing 4-11***](#part0013.html#_list11). Assign the GameScene instance as
    the _physicsNode’s collision delegate'
  trans: "\n然后，您可以在时间线中选择任意一个边界节点，直接复制粘贴（编辑 ![image](img/00008.jpeg) 复制 和 编辑 ![image](img/00008.jpeg)\
    \ 粘贴）来创建一个与源节点同名的同级节点。不幸的是，复制出来的节点会位于和原始节点完全相同的位置，这意味着您不会立即看到自己已经创建了一个副本。您必须将副本拖走。尽管如此，复制粘贴仍然是快速用多个同类型节点填满一个层级并保证节点名称至少可分类的最快方法。\n\
    \n现在，您应该根据需要，通过复制和排列边界，用它们将墙壁覆盖起来，直到没有任何“漏洞”让玩家可能挤出去，最终离开关卡区域。\n\n您还可以自由旋转边界来制作底部和侧面的边界。物理形状会相应地旋转，并在游戏中正确表现。缩放也是如此，尽管这会使图像模糊，特别是当至少一个轴的缩放因子为\
    \ 2 或更大时。\n\n**注意** 我之前提到过物理形状不能缩放。现在我又说可以缩放它们。那么到底是怎样呢？实际上，带有物理体的节点的缩放属性确实无法在运行时进行动画或更改。但是，您可以在\
    \ SpriteBuilder 中设置启用了物理的节点的初始缩放，因此当项目发布时，它会创建一个按比例缩放后的物理碰撞形状版本。\n\n如果您没有耐心，想快点继续阅读本书，只需沿着\
    \ *x* 轴大幅缩放边界，这样您只需要少数几个边界节点就能用坚不可摧的边界将整个关卡包围起来。您可以稍后再回来制作一个外观不错的关卡，就像您在图 4-11\
    \ 中看到的那样。\n\n![9781484202630_Fig04-11.jpg](img/00070.jpeg)\n\n图 4-11。别管卡路里了：带有美味巧克力边界的\
    \ `Level1.ccb`\n\n发布、构建并运行项目。如果您看不到或无法移动玩家，请确保玩家没有与边界重叠。\n\n如果您发现任何边界正在下落，说明您忘记将它们设置为静态。在这种情况下，请打开相应的\
    \ CCB 文件，并在“项目物理”选项卡上检查是否选中了“静态”。\n\n**提示** 您可以通过在平铺编辑器视图中双击其缩略图来快速打开 CCB 文件。\n\
    \n如果操作正确，玩家将不再能够移动或掉落到关卡之外。恭喜！现在您的关卡中有了碰撞。\n\n## 插曲：物理调试绘制\n\n关于碰撞形状，有一个重要的方面您必须记住：物理引擎根本不关心屏幕上绘制了什么。它只考虑其内部状态。\n\
    \n例如，图像和碰撞形状可能并不总是完全匹配，这可能是由于 SpriteBuilder 中的编辑错误造成的，或者仅仅是因为您修改了图像内容却没有调整精灵的碰撞形状。要调试此类问题，偶尔打开物理调试绘制非常有用。\n\
    \n**注意** 调试绘制会降低游戏速度。如果您想评估游戏性能或仅仅是想玩游戏，请务必关闭物理调试绘制。\n\n要开启调试绘制，请像代码清单 4-7 中那样，在\
    \ Xcode 的 `GameScene.m` 中添加一个新的 `BOOL` 变量。\n\n***代码清单 4-7***。添加调试绘制的实例变量\n\n```\n\
    @implementation GameScene\n{\n    // 其他变量已省略\n\n    BOOL _drawPhysicsShapes;\n\
    }\n```\n\n找到同一个类中的 `loadLevelNamed:` 方法，并在 `_physicsNode` 被赋值之后，插入代码清单 4-8 中高亮显示的那行代码。\n\
    \n***代码清单 4-8***。在 `loadLevelNamed:` 方法中添加高亮行\n\n```\n_physicsNode = (CCPhysicsNode*)[_levelNode\
    \ getChildByName:@\"physics\"\n                                              recursively:NO];\n\
    _physicsNode.debugDraw = _drawPhysicsShapes;\n```\n\n那么...在哪里设置这个实例变量的值呢？当然是在\
    \ SpriteBuilder 中。打开 `GameScene.ccb` 并在时间线中选择其根节点。在“项目属性”选项卡上，单击“编辑自定义属性”按钮。添加一个与\
    \ `_drawPhysicsShapes` 实例变量同名的属性，但这次将类型设为 `Bool` 并将其值设为 1，如图 4-12 所示。\n\n![9781484202630_Fig04-12.jpg](img/00071.jpeg)\n\
    \n图 4-12。添加一个自定义属性来开启或关闭物理调试绘制\n\n现在您可以发布、构建并运行，看看物理调试绘制的作用。或者允许我将您的注意力引向图 4-13，它提供了一个示例。\n\
    \n![9781484202630_Fig04-13.jpg](img/00072.jpeg)\n\n图 4-13。启用了物理调试绘制的游戏截图\n\n您可能会注意到，您为边界编辑的多边形实际上是由多个更小的形状组成的。这是因为物理引擎内部必须使用凸形状，所以\
    \ SpriteBuilder 会尽可能地将多边形分割成少量的凸形状，以表示非凸（凹）多边形。在 SpriteBuilder 出现之前，您实际上必须确保自己不会意外创建凹形状。那可真麻烦！\n\
    \n**注意** 简单来说，凸形状是指形状内部或边界上任意两点之间的线段始终完全位于该形状内部。例如，圆形、三角形和矩形总是凸的，五边形、六边形以及类似的圆角形状也是凸的。另一方面，凹形状是指形状内部或边界上至少存在两点，它们之间的线段可以绘制成至少有一部分位于该形状区域之外。例如，L\
    \ 形、T 形和 U 形区域是凹的。\n\n对于动态物体，请尽可能尝试创建凸形状，以提高碰撞稳定性和性能。分解凹形状会留下微小的“裂缝”，有时会导致动态物体对碰撞做出意外响应，例如卡住。对具有分解凹形状的动态物体进行碰撞测试，计算成本也更高。\n\
    \n截至此时的项目状态可在 `\"04 - Physics Movement and Level Borders\"` 文件夹中找到。\n\n## 碰撞回调方法\n\
    \n现在是时候再次启动 Xcode，添加代码，以便在特定碰撞事件发生时运行所谓的*回调方法*。\n\n### 实现碰撞委托协议\n\n在您可以接收接触回调消息之前，需要进行一些小的设置，以便将\
    \ `GameScene` 类注册到由 `_physicsNode` 实例变量引用的关卡的 `CCPhysicsBody` 中。\n\n打开 `GameScene.h`，您会发现它看起来很基础，就像代码清单\
    \ 4-9 中那样。\n\n***代码清单 4-9***。`GameScene` 接口\n\n```\n#import \"CCNode.h\"\n\n@interface\
    \ GameScene : CCNode\n\n@end\n```\n\n为了允许该类作为物理碰撞消息的接收者，它必须实现 `CCPhysicsCollisionDelegate`\
    \ 协议。这只需在 `@interface` 的末尾用尖括号附加协议即可完成，如代码清单 4-10 所示。\n\n***代码清单 4-10***。`GameScene`\
    \ 现在被声明为遵循 `CCPhysicsCollisionDelegate` 协议\n\n```\n#import \"CCNode.h\"\n\n@interface\
    \ GameScene : CCNode <CCPhysicsCollisionDelegate>\n\n@end\n```\n\n在 `GameScene.m`\
    \ 中，您现在可以将 `self` 注册为 `_physicsNode` 的碰撞委托。在 `loadLevelNamed:` 方法中，添加代码清单 4-11\
    \ 中高亮显示的那行代码。\n\n***代码清单 4-11***。将 `GameScene` 实例分配为 `_physicsNode` 的碰撞委托\n"
- fmt: "```objc\n-(void) loadLevelNamed:(NSString*)levelCCB\n{\n    _physicsNode =\
