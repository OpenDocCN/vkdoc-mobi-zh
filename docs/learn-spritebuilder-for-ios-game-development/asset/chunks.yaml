    Localizing the Credits Label


    Localization of text is done by providing multiple-language versions of the same
    text under the same key. A *key* is any text string (usually the original English
    text) used to identify a set of localized strings.


    In *MainScene.ccb*, select the *CCLabelTTF with the credits* text, which is the
    one that you’ve added most recently. Under the *Label text* field, check the *Localize*
    check box. This enables the *Edit* button to the right of the check box. Click
    the *Edit* button. This brings up the string localization dialog shown in [Figure
    11-10](#part0022.html#Fig10).


    ![9781484202630_Fig11-10.jpg](images/00171.jpeg)


    [Figure 11-10](#part0022.html#_Fig10). The initial localization dialog with just
    one string and one language


    The very first thing you need to do when adding localized strings is add one or
    more languages. Click the *+Add Language* button to bring up a drop-down list
    of possible languages. You can use any language you like. I went with German because
    that’s what I grew up with. After adding a language, it will appear in the list
    at the bottom right. But adding a language also adds another column to the text
    grid view on the left. And it places a yellow exclamation mark icon to the left
    of the *Key* column, because for the given *Key*, there is no German translation
    yet. See [Figure 11-11](#part0022.html#Fig11).


    ![9781484202630_Fig11-11.jpg](images/00172.jpeg)


    [Figure 11-11](#part0022.html#_Fig11). After adding German as a language, the
    columns are updated and the warning icon indicates missing translation text


    Now all you have to do is to enter text in the *German (de)* column for the only
    string that’s currently in the localization dialog. Enter the following as a possible
    German translation (without quotes): “Entwickelt mit SpriteBuilder & Cocos2D”.
    Be sure to enter the string in the *German (de)* column. If you’ve done this correctly,
    the warning icon should be gone.


    You can leave the *Comment* field empty. It can be used to leave notes for the
    translators, perhaps to mention the maximum number of characters this string must
    not exceed in any language.


    Note that you can and should change the entry in the *Key* column, mainly to prevent
    you from accidentally editing the key where you meant to enter an actual language
    string. I prefer to use all uppercase characters for keys to highlight the fact
    that it is a key, not an actual string used by labels. Enter **CREDITS_LABEL**
    as the key.


    When you are done editing, just close the window via the red X button in the upper
    left corner.


    Depending on whether your SpriteBuilder version automatically synchronizes the
    key from the localization dialog with the label’s text field, you may or may not
    have to edit the *Label text* field. Enter **CREDITS_LABEL** in the *Label text*
    field if it contains any other text. You’ll notice that the label no longer changes
    to the text in the *Label text* field. That’s because the meaning of the *Label
    text* field changes when *Localize* is enabled. It becomes the localized string’s
    key.


    You can quickly try out your localized string within SpriteBuilder. From the menu,
    select *Document ![image](images/00008.jpeg) View in Language ![image](images/00008.jpeg)
    German (de)* to see the German version of this screen. All localized labels with
    a corresponding German string will show up in German. Those labels that have missing
    strings for the selected language will show the key instead. This is another good
    reason to use all-caps text for keys or any other style to clearly differentiate
    keys from actual strings. [Figure 11-12](#part0022.html#Fig12) shows the menu
    screen with labels translated into German.


    ![9781484202630_Fig11-12.jpg](images/00173.jpeg)


    [Figure 11-12](#part0022.html#_Fig12). The main menu with labels translated into
    German


    As you can see in [Figure 11-12](#part0022.html#Fig12), two labels no longer fit
    because they run longer with German text. This is just scratching the surface
    of why localization is difficult and time consuming, especially if it wasn’t considered
    from the get-go. Although you can reduce the credit label’s font size in the German
    version, you’d have to do so in code. And that option is not suitable for the
    *Settings* button—if you made that label any smaller, you could barely read the
    text anymore, if at all.


    Last, the logo remains in English. Localization of resource files is planned for
    a future SpriteBuilder update, but there’s no estimated time of arrival for that
    at the time of this writing. You have to localize any audio (speech) and image
    files using the regular iOS app internationalization techniques for now.


