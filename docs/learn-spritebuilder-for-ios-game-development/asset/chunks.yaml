  trans: "\n# 改进软体角色\n\n你应该更感兴趣的那个解决方案使用了弹簧关节。同样，你有两个选择。一个是像上一段解释的那样，将中心刚体与每个圆周刚体连接起来。然而，尽管使用了八个弹簧关节，这却会形成一个相当松散的结构，如果在某个点对刚体施加较大的力，它很容易向内塌陷。增加弹簧刚度实际上无济于事。不过，这种松散、弹跳、布丁状的团块确实有它的用途。\n\
    \n另一个解决方案是只使用四个弹簧关节，将圆周上的一个刚体与正对面的刚体连接起来。这才是你应该采用的方法。打开 `PlayerSoftBody.ccb` 文件，拖放四个弹簧关节到舞台上。将一个关节与右侧节点和左侧节点连接。接下来连接下一个关节与右下和左上节点，然后连接底部和顶部节点，以及左下和右上节点。\n\
    \n接着，依次选中每个弹簧关节来编辑其属性。`Collide bodies`（碰撞刚体）属性可以保持未选中状态，因为相对的刚体不太可能靠近到相互接触的程度。`anchor-point`（锚点）值都应设置为\
    \ `0`，以使关节锚点与节点位置对齐。之后，你应该启用 `Rest length`（静止长度），这将显示 `60` 作为长度值，对于两个对角弹簧关节，该值可能会有微小的差异。将阻尼（damping）保留为\
    \ `1`，但将刚度（stiffness）改为 `100`。确认你已经正确地将所有这些设置应用于所有四个弹簧关节。结果应该是一个类似于图 10-11 所示的球状网格。\n\
    \n![9781484202630_Fig10-11.jpg](img/00154.jpeg)\n\n图 10-11。四个弹簧关节连接相对的圆周刚体。\n\n\
    你应该在游戏中尝试这个版本，看看这个设计如何改进了之前的版本。Hacky Sack 变成了一个果冻状的团块。它运行良好，但中心节点尚未连接到刚体上，并且该刚体可能太容易变形了。\n\
    \n## 连接中心节点\n\n当前设置的一个问题是，它无法阻止弹簧过度拉伸或收缩。而且，中心节点当然应该固定在整个结构上；否则，它可能会被挤出角色体外。\n\
    \n你可以使用弹簧关节来连接中心节点与圆周刚体，但你已经在相对的圆周刚体之间设置了弹簧。额外添加连接到中心的弹簧关节对刚体影响不大。事实上，无论是相对的弹簧关节还是连接到中心的弹簧关节，其中一个会占主导地位，使得其他关节基本无用。\n\
    \n向中心节点添加距离关节（distance joints）更为合理。这样，你就可以控制每个圆周刚体相对中心节点的最小和最大收缩量。这使你能够控制整体形状的可变形性。\n\
    \n从 `Node Library View`（节点库视图）中，拖放八个距离关节到 `PlayerSoftBody.ccb` 舞台上。将第一个关节与中心节点和右侧节点连接。继续连接其他关节，使得所有关节都以中心节点作为\
    \ `Body A`（刚体 A），以一个圆周节点作为 `Body B`（刚体 B）——就像车轮的辐条一样。\n\n一旦所有关节都连接好，依次选中每个新添加的距离关节来编辑其属性。`Collide\
    \ bodies` 复选框应该被选中，因为中心刚体很可能会与圆周刚体发生碰撞。允许这种碰撞发生有助于避免圆周刚体被向内推过中心，然后卡在刚体另一侧的问题。这种情况仍有可能发生，但需要更大的力才能实现。\n\
    \n你还应该启用 `Minimum distance`（最小距离）和 `Maximum distance`（最大距离）复选框，并输入 **24** 作为最小距离，**34**\
    \ 作为最大距离。这给弹簧关节提供了一些（但又不太多）收缩和伸展的空间。结果如图 10-12 所示。\n\n![9781484202630_Fig10-12.jpg](img/00155.jpeg)\n\
    \n图 10-12。向中心节点添加距离关节增加了软体角色的稳定性。\n\n在游戏中尝试这个版本。这感觉几乎完整了，具体取决于你心中理想的软体角色应该是什么感觉。\n\
    \n## 改进软体角色\n\n创建软体对象的方法有很多种，但许多都遵循迄今为止概述的相同指导原则。同样，有许多方法可以在不大幅改变设置的情况下调整软体角色的行为。\n\
    \n我想提出一些你以后可能想要试验的改动：\n\n*   中心刚体：\n    *   增加或减少其圆形形状的半径。\n    *   增加或减少刚体的密度（从而影响其质量）。\n\
    \    *   从其掩码（mask）中移除“player”（角色），以防止圆周刚体与其碰撞。\n*   圆周刚体：\n    *   更改摩擦力和弹性，以改变与边界及其他物体的碰撞行为。\n\
    \    *   将圆周刚体的数量加倍，同时减小其圆形形状的半径。\n*   圆周距离关节：\n    *   更改 `Minimum distance`\
    \ 和 `Maximum distance` 值，以增加圆周刚体之间的空间。\n    *   将其替换为启用了静止长度（rest enabled）的弹簧关节。\n\
    \    *   取消选中 `Collide bodies`。\n*   中心距离关节：\n    *   更改 `Minimum distance` 和\
    \ `Maximum distance` 值。\n    *   取消选中 `Collide bodies`。\n*   相对的弹簧关节：\n    * \
    \  增加或减少 `Stiffness`（刚度）。\n    *   将其替换为启用了距离限制的距离关节。\n*   任何关节：\n    *   启用 `Max\
    \ Force`（最大力），并尝试不同的力值。\n\n根据你的游戏设计，这些解决方案中的某一个可能比我在书中介绍的方案效果更好。需要考虑的因素包括：物体的整体弹性、它可以变形多少、它在一般情况下有多稳定，以及在承受巨大压力时它向内扭曲的倾向如何。\n\
    \n特别是，如果你不能允许你的物体以不幸的方式永久变形，你可能需要借助编程手段。例如，你可以设置一个检查机制来确定相对节点的位置，也许相对于中心节点。如果确定相对的刚体靠得太近（或持续时间太长），你可能希望手动将它们的位置设置回初始位置。\n\
    \n还有一点要记住：如果你移动了刚体位置或更改了关节锚点，请务必检查所有连接的关节。它们可能需要更新其 `Minimum distance`、`Maximum\
    \ distance` 和 `Rest Length` 属性。\n\n最后，一次只应用一项更改！这样更容易了解每项更改带来的效果。结合两项或更多的更改可能会产生截然不同的结果，而且很难确定哪些更改对观察到的新行为贡献了什么。\n\
    \n## 改进纹理渲染\n\n目前角色还存在两个问题。由于圆周刚体的存在，角色的实际碰撞形状变大了——大约增加了圆周刚体圆形形状的半径量。另一个问题与纹理有关。目前，圆周节点的位置决定了纹理坐标。由于圆周节点大致位于角色内部，角色的外形似乎被截断了。\n"
- fmt: '两个问题都在[图10-13](#part0020.html#Fig13)中可见。首先，你会注意到玩家与齿轮辐条之间的距离相当大，尽管玩家被挤在两段辐条之间。另一个问题是，玩家的一些卷发被截断了，其圆润的腹部形状也是如此。请与[图10-3](#part0020.html#Fig3)对比。


    ![9781484202630_Fig10-13.jpg](images/00156.jpeg)


    [图10-13](#part0020.html#_Fig13)：玩家相对于碰撞形状画得太小，且卷发被截断


    我们来修复这些问题。打开`PlayerSoftBody.ccb`，选择根节点。在*Item Properties*选项卡中，点击底部的*Edit Custom
    Properties*按钮。添加两个类型为`float`的自定义属性，命名为`_enlargeDrawRadius`和`_enlargeTextureRadius`。这两个属性已在`SoftBodyDrawNode`类中声明并使用。暂时将两个值都保留为`0`。


    现在暂时禁用物理调试绘制。打开`GameScene.ccb`，选择根节点，并将`_drawPhysicsShapes`属性设为`0`。然后运行游戏，尝试聚焦于玩家的纹理。如果你在游戏中观察得足够仔细，会发现玩家的纹理呈现明显的八边形形状，且部分被截断，如[图10-14](#part0020.html#Fig14)所示。


    ![9781484202630_Fig10-14.jpg](images/00157.jpeg)


    [图10-14](#part0020.html#_Fig14)：玩家的纹理明显被截断（4倍缩放）


    为了改善这一点，需要将纹理坐标向外移动，远离中心。这实际上增加了玩家纹理坐标的半径。这就是`_enlargeTextureRadius`值的作用。你应该将其设置为`6`，并在游戏中再次尝试。结果应该如[图10-15](#part0020.html#Fig15)所示。


    ![9781484202630_Fig10-15.jpg](images/00158.jpeg)


    [图10-15](#part0020.html#_Fig15)：将玩家的纹理坐标向外移动确保了所有纹理都被绘制（4倍缩放）


    我确定`_enlargeTextureRadius`的值为`6`，仅仅是通过不断增大它直到没有纹理部分被明显截断。请注意，你可以将该值设得更高，但随着值增大，纹理可能会变形，玩家会变小，并且玩家最终会开始绘制Sprite
    Sheet中附近其他图像的部分。因此，你应该选择能无瑕疵绘制纹理的最小值。


    玩家相对于其整体碰撞形状仍然太小。因此，`SoftBodyDrawNode`允许你通过将实际顶点位置移离中心，绘制比其身体指示位置更大的玩家。这会拉伸纹理，其效果类似于增大`scale`属性。


    **注意**：那么为什么不直接增大`scale`属性呢？因为`SoftBodyDrawNode`在其绘制代码中不包含缩放、旋转甚至精灵的位置。一旦你开始为精灵使用自定义绘制代码，就完全由你掌控，而Cocos2D提供的每个便利功能将不再生效，除非你重新实现它们。


    打开`GameScene.ccb`，选择根节点，并将`_drawPhysicsShapes`属性改回`1`。然后运行游戏以观察玩家的碰撞形状。你会注意到玩家绘制得明显比碰撞形状小。现在这种情况比以前更明显，因为你已经增加了纹理坐标的半径，这会导致玩家尺寸减小。当前状态见[图10-16](#part0020.html#Fig16)。


    ![9781484202630_Fig10-16.jpg](images/00159.jpeg)


    [图10-16](#part0020.html#_Fig16)：玩家的纹理绘制在碰撞形状内部（4倍缩放）


    在SpriteBuilder中，打开`PlayerSoftBody.ccb`并选择根节点。将`_enlargeDrawRadius`属性改为`14`。同样，这个值是通过实验确定的，应该大到足以拉伸纹理，使其与圆周体的圆形形状对齐。如果你在游戏中运行，结果将更接近[图10-17](#part0020.html#Fig17)。玩家现在明显比以前大了。你可能希望禁用物理形状绘制以更好地体验最终的软体玩家。


    ![9781484202630_Fig10-17.jpg](images/00160.jpeg)


    [图10-17](#part0020.html#_Fig17)：玩家的纹理被拉伸以覆盖整个碰撞形状（4倍缩放）


    当然，这里还有改进空间。例如，如果你想让软体玩家和之前刚体玩家的大小大致相同，可以尝试这样做。不过这并不像听起来那么容易。你需要减小圆周体的半径，这反过来会增加身体卡在其他小碰撞形状（如链条和绳索段）中的可能性。


    尽管如此，不要让我阻止你这样做。只是要做好准备，进行大量调整、实验，甚至时不时地失败。最好时不时地用Finder（或者一旦SpriteBuilder具备“复制CCB”功能，就用它）制作玩家的备份副本。创建可靠的软体物理需要时间、汗水、精力，以及你能投入的一切。结果（如[图10-18](#part0020.html#Fig18)所示）值得付出努力！


    ![9781484202630_Fig10-18.jpg](images/00161.jpeg)


    [图10-18](#part0020.html#_Fig18)：我有一张嘴，无论多么痛苦，我都必须咧嘴笑


    总结


    本章教你创建软体对象的基本原理。本质上只是弹簧关节和距离关节的正确组合。在实现不同类型的软体方面有很大的实验空间。一般来说，试验软体物理也很有趣，无论你的游戏项目是否需要它，所以我鼓励你尝试不同的变体。


    你还学习了使用Cocos2D自有渲染器进行自定义绘制。我希望我能够传达出它比纯OpenGL更容易使用。使用可变数量的顶点自定义绘制纹理，在软体物理之外有许多应用。例如，你可以用可管理的精力制作一面在风中飘扬的旗帜动画，而无需借助着色器编程——那是一个完全不同的领域，超出了本书的范围。如果你想了解更多关于iOS底层图形编程的知识，可以查阅Apress出版的《Pro
    OpenGL ES for iOS》。


    软体玩家部分结束了游戏玩法的改动。你可以在`11 - Soft-Body Player`文件夹中找到最终项目。在接下来的两章中，你将添加音乐、音效和视觉效果。


    **第三部分**


    现在你是一名SpriteBuilder专家！


    **第11章**


    音频和标签


    在本章中，你将学习如何播放音频，包括音效和音乐。音效可以通过时间线播放，但大部分需要利用ObjectAL（Cocos2D和SpriteBuilder使用的音频引擎）进行编程实现。


    本章后半部分专门介绍标签——具体来说，是TrueType字体特效，以及为何及如何使用位图字体标签。你还将了解标签文本的本地化，以及如何确保本地化标签在运行时能够嵌入数值信息，例如分数和其他计数器。


    介绍ObjectAL'
  raw: 'Both issues are visible in [Figure 10-13](#part0020.html#Fig13). For one,
    you’ll notice the rather large distance between the player and the gear spokes,
    despite the player being squeezed in between two spokes. The other problem is
    that some of the player’s curly hair is cut off, as is its round belly shape.
    Compare it with [Figure 10-3](#part0020.html#Fig3).


    ![9781484202630_Fig10-13.jpg](images/00156.jpeg)


    [Figure 10-13](#part0020.html#_Fig13). The player is drawn too small for its collision
    shape, and its curly hair is cut off


    Let’s fix these problems. Open *PlayerSoftBody.ccb*, and select the root node.
    On the *Item Properties* tab, click the *Edit Custom Properties* button at the
    bottom. Add two custom properties of type float, named _enlargeDrawRadius and
    _enlargeTextureRadius. Both are already declared and in use by the SoftBodyDrawNode
    class. Leave both values at 0 for the moment.


    Now disable physics debug drawing for a second. Open *GameScene.ccb*, select the
    root node, and set the _drawPhysicsShapes property to 0\. Then run the game, and
    try to focus on the player’s texture. If you look closely enough in the game,
    you’ll notice the player’s texture has a noticeable octagonal shape with parts
    of it cut off, as in [Figure 10-14](#part0020.html#Fig14).


    ![9781484202630_Fig10-14.jpg](images/00157.jpeg)


    [Figure 10-14](#part0020.html#_Fig14). The player’s texture is clearly cut off
    (4x scale)


    In order to improve this, the texture coordinates need to be moved outward, away
    from the center. Effectively, this increases the radius for the player’s texture
    coordinates. This is what the _enlargeTextureRadius value does. You should set
    it to 6, and try it out again in the game. The result should be what you see in
    [Figure 10-15](#part0020.html#Fig15).


    ![9781484202630_Fig10-15.jpg](images/00158.jpeg)


    [Figure 10-15](#part0020.html#_Fig15). Moving the player’s texture coordinates
    outward ensures all of the texture is drawn (4x scale)


    I determined the value 6 for _enlargeTextureRadius merely by increasing it until
    no parts of the texture were noticeably cut off. Notice that you can set the value
    much higher, though with increasing values the texture may become distorted, the
    player becomes smaller, and the player will eventually start to draw parts of
    other nearby images within the Sprite Sheet. Therefore, you should opt to use
    the lowest possible value that draws the texture without glitches.


    The player is still too small compared to its overall collision shape. Therefore,
    SoftBodyDrawNode allows you to draw the player larger than its body positions
    indicate, by moving the actual vertex positions away from the center. This will
    stretch the texture and has a similar effect as increasing the scale property.


    **Note**  So why not just increase the scale property? Because the SoftBodyDrawNode
    does not incorporate scale, rotation, or even the sprite’s position into its drawing
    code. Once you start to use custom drawing code for a sprite, it’s all yours and
    each convenience feature Cocos2D provides no longer works unless you re-implement
    it yourself.


    Open *GameScene.ccb*, select the root node, and change the _drawPhysicsShapes
    property back to 1\. Then run the game to observe the player’s collision shape.
    You’ll notice the player will be drawn noticeably smaller than the collision shapes.
    This is true now more so than before, because you already increased the radius
    for the texture coordinates, which has the effect of decreasing the player’s size.
    See [Figure 10-16](#part0020.html#Fig16) for the current state.


    ![9781484202630_Fig10-16.jpg](images/00159.jpeg)


    [Figure 10-16](#part0020.html#_Fig16). The player’s texture is drawn well within
    the collision shape (4x scale)


    In SpriteBuilder, open *PlayerSoftBody.ccb* and select the root node. Change the
    *_enlargeDrawRadius* property to *14*. Again, this value is determined by experimentation
    and should be as large as it needs to be to stretch the texture so that it aligns
    well with the circumference bodies’ circle shapes. If you run this in the game,
    the result will be more like in [Figure 10-17](#part0020.html#Fig17). The player
    is now noticeably larger than before. You may want to disable physics shape drawing
    to better experience the final soft-body player.


    ![9781484202630_Fig10-17.jpg](images/00160.jpeg)


    [Figure 10-17](#part0020.html#_Fig17). The player’s texture is stretched to encompass
    the entire collision shape (4x scale)


    There’s, of course, room for improvement here. For instance, if you want to make
    the soft-body player about the same size as the rigid-body player as before, you
    could try to do so. This won’t be as easy as it sounds, though. You’d have to
    decrease the circumference bodies’ radius, which in turn would increase the likelihood
    of the body getting stuck in other, small collision shapes, such as chain and
    rope segments.


    Nevertheless, don’t allow me to prevent you from doing so. Just be prepared for
    lots and lots of tweaking, experimenting, and even failing every so often. It’s
    a good idea to make backup copies of the player every now and then using Finder
    (or once SpriteBuilder has a “duplicate CCB” feature, use that). Creating reliable
    soft-body physics takes time, sweat, nerves, and everything else you can spare.
    The results (shown in [Figure 10-18](#part0020.html#Fig18)) are well worth the
    effort!


    ![9781484202630_Fig10-18.jpg](images/00161.jpeg)


    [Figure 10-18](#part0020.html#_Fig18). I have a mouth, and I must grin no matter
    how much it hurts


    Summary


    This chapter taught you the basic principles behind creating soft-body objects.
    It’s essentially just the right combination of spring and distance joints. There’s
    lots of room for experimentation to achieve different kinds of soft bodies. It’s
    also fun to experiment with soft-body physics in general, whether you need it
    for your game project or not, so I would encourage you to try out different variations.


    You’ve also learned about custom drawing using Cocos2D’s own renderer. I hope
    I was able to convey how it’s easier to use than pure OpenGL. Custom drawing a
    texture with a varying number of vertices has many applications beyond soft-body
    physics. For instance, you could animate a flag waving in the wind with manageable
    effort and without having to resort to shader programming, a completely different
    beast well beyond the scope of this book. You may want to look into Pro OpenGL
    ES for iOS from Apress if you want to learn more about low-level graphics programming
    for iOS.


    The soft-body player concludes the changes to how the game is played. You’ll find
    the resulting project in the *11 - Soft-Body Player* folder. In the next two chapters,
    you’ll add music, sound, and visual effects.


    Part    III


    Now You’re a SpriteBuilder Pro!


    Chapter    11


    Audio and Labels


    In this chapter, you will learn how to play audio, both sound effects and music.
    Sound effects can be played via the Timeline, but most of it will have to be programmed
    using ObjectAL, the audio engine used by Cocos2D and SpriteBuilder.


    The second half of the chapter is dedicated to labels—specifically, TrueType font
    effects as well as why and how to use bitmap font labels. You will also find an
    introduction on localizing label texts, and how to ensure a localized label can
    be changed to embed numeric information at runtime, such as score and other counters.


    Introducing ObjectAL'
