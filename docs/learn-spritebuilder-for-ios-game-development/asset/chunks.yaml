    \ viewSize.height));\n        layer.positionInPoints = ccpNeg(layerPos);\n   \
    \ }\n}\n```\n\n最后一点，还记得你在`touchBegan:withEvent:`方法中如何使用`_levelNode`将触摸位置相对于`_levelNode`进行转换吗？你需要将这里使用的`_levelNode`也替换为`_physicsNode`，如代码清单\
    \ 3-15 中的代码片段所示。\n\n***代码清单 3-15***。在`touchBegan:withEvent`中将`_levelNode`替换为`_physicsNode`\n\
    \n```\nCGPoint pos = [touch locationInNode:_physicsNode];\n```\n\n如果你继续使用`_levelNode`，你会发现自己无法滚动超过大约半个屏幕的范围。这是因为`_levelNode`在滚动过程中不再改变其位置，而`_physicsNode`已经取代了它的角色。\n\
    \n发布、构建并运行。你现在可以看到背景图层像图 3-20 中那样产生视差效果。\n\n![9781484202630_Fig03-20.jpg](img/00059.jpeg)\n\
    \n图 3-20。玩家向右上方移动时，展示了背景图层视差滚动的效果\n\n## 总结\n\n在本章中，你学习了如何通过触摸和动作控制玩家，以及当玩家在关卡中移动时如何滚动关卡内容和背景图层。你还学习了许多关于图像、精灵表以及与图像转换和发布相关设置的知识。\n\
    \n项目的当前状态可以在 *03 - 视差滚动* 文件夹中找到。\n\n在下一章中，你将学习更多关于`CCPhysicsNode`的知识，以及如何创建不可穿越的关卡边界，以防止玩家掉出关卡。\n\
    \n## 第 4 章：物理与碰撞\n\n在本章中，你将学习更多关于使用 SpriteBuilder 编辑物理属性的方法，以及如何通过物理系统（而非动作）来控制玩家。你会添加不可穿越的物理体作为关卡边界，以防止玩家角色移动到关卡范围之外。\n\
    \n你还将学习如何在碰撞发生时运行代码——例如触发终止当前关卡等游戏事件——以及如何设置碰撞类别和遮罩，以允许某些物理体互相穿过。\n\n### 玩家物理\n\
    \n在上一章中，你已经向`Level1.ccb`添加了一个物理节点，并将玩家节点设置为该新物理节点的子节点。这个`CCPhysicsNode`实例充当了控制全局物理行为（尤其是重力）的物理世界。任何需要像物理对象一样移动和交互的节点，都必须作为`CCPhysicsNode`的直接子节点或子孙节点。\n\
    \n让我们立即尝试为玩家启用物理功能。\n\n#### 为玩家精灵启用物理\n\n首先尝试以下操作：打开`Level1.ccb`，选择玩家，并尝试切换到“项目物理”选项卡——即右侧细节检查器的第三个选项卡。你会注意到它是灰色的——无法选中。子文件节点通常都是这种情况：它们不支持物理功能。\n\
    \n相反，请打开“Prefabs”文件夹中的`Player.ccb`，并选择`CCSprite`根节点。现在你可以切换到“项目物理”选项卡，并勾选“启用物理”复选框。在后台，当\
    \ CCB 被加载时，`CCBReader`将创建一个`CCPhysicsBody`类的实例，并将其分配给节点的`physicsBody`属性。在讨论具有物理属性的节点时，当上下文特指节点的物理属性和行为时，我会将“物理体”作为“节点”的同义词使用。\n"
- fmt: 'While you’re on the Item Physics tab for the player, change the Physics shape
    to a circle and give it a Corner radius of 32 points. Leave the other settings
    as they were, in particular the Dynamic setting should be selected. The settings
    should be the same as in [Figure 4-1](#part0013.html#Fig1).


    ![9781484202630_Fig04-01.jpg](images/00060.jpeg)


    [Figure 4-1](#part0013.html#_Fig1). The player sprite’s physics settings


    Now you can have some fun: publish, build, and run the app. You’ll notice the
    player immediately starts falling due to physics-imposed gravity. Nevertheless,
    you can also tap the screen to make the player move to that location. But you
    can’t prevent the player from continuously falling down ever faster. What’s going
    on here?


    ## Move and Rotate Actions Conflict with Physics


    Internally, gravity accumulates and increases the body’s velocity even while the
    node is being moved by the move action. Eventually, the move action stops and
    physics takes over again.


    This is a side-effect of combining actions with physics. More precisely, actions
    affecting a node’s position or rotation properties should not be used on dynamic
    bodies. They override the physics properties for position and rotation, while
    ignoring the body’s velocity, at least temporarily.


    In some cases, move and rotate actions seem to move but the resulting collision
    behavior won’t be what you’d expect, because the movement imposed by the action
    is not reflected by the node’s internal state or conflicts with it. For instance,
    a move action won’t stop because there’s a collision in the way; instead, it’ll
    continue to move the node through the collision step by step and the physics engine
    will try its best to resolve the situation every frame, causing all sorts of issues.


    Moving a physics-enabled node, therefore, should be done exclusively by applying
    forces to the node, or by using joints. An exception to this rule are static bodies.
    Those you can actually animate using move and rotate actions—and even the SpriteBuilder
    Timeline—and they’ll show correct physics behavior. I’ll say more on this topic
    in [chapter 5](#part0014.html): *Timelines and Triggers*.


    There are also purely visual or functional actions like tinting the node’s color
    or running a block. Those actions can still be used on a node with a physics body
    indiscriminately.


    **Note**  If you are curious as to why move and rotate actions cannot be combined
    with physics, consider a leaf blowing in the wind. Normally, a light object such
    as a leaf will stop when it hits any other object. The leaf has a low mass, so
    it will not exert noticeable force on colliding bodies. However, if you told the
    leaf to move on a straight line from A to B with a move action, this would keep
    it going into and over heavier or impenetrable objects. What should the correct
    physics behavior be in this case?


    Should the leaf eventually topple over the wall it hits? Should it be allowed
    to penetrate objects to get to the intended location? Or should it stop at the
    wall but stick to it because it tries to keep going to its destination until it
    arrives there? Or until the action ends, which means the leaf may never reach
    its destination?


    There is not one right way to solve this. In fact, all of the possible workarounds
    are wrong. Some just seem more correct than others when considering only a narrow
    set of conditions or a specific set of expectations, but there is no generally
    acceptable solution.


    ## Moving the Player Through Physics


    Because a physics-enabled node with a dynamic `physicsBody` should not run any
    move, rotate, scale, or skew actions, you need to replace the move action with
    proper physics movement.


    The touch events need to change from executing a move action as soon as a touch
    begins to merely changing a flag. If this flag is set, it will cause a function
    called from the `update:` method to accelerate the player in a given direction.


    In `GameScene.m`, add the following four ivars within the `@implementation` brackets,
    as seen in [Listing 4-1](#part0013.html#list1).


    ***Listing 4-1***. Additional ivars needed for physics movement


    ```

    @implementation GameScene

    {

        __weak CCNode* _levelNode;

        __weak CCNode* _physicsNode;

        __weak CCNode* _playerNode;

        __weak CCNode* _backgroundNode;


    CGFloat _playerNudgeRightVelocity;

        CGFloat _playerNudgeUpVelocity;

        CGFloat _playerMaxVelocity;

        BOOL _acceleratePlayer;

    }

    ```


    Now locate the `touchBegan:withEvent:` method and replace its body with the following:


    ```

    -(void) touchBegan:(UITouch *)touch withEvent:(UIEvent *)event

    {

        _acceleratePlayer = YES;

    }

    ```


    This enables the “user is currently touching the screen” mode.


    Of course, you also need to end this mode. To do so, you have to add the `touchesEnded:`
    and `touchesCancelled:` methods as seen in [Listing 4-2](#part0013.html#list2).


    ***Listing 4-2***. Stopping acceleration when there’s no active touch


    ```

    -(void) touchEnded:(UITouch *)touch withEvent:(UIEvent *)event

    {

        _acceleratePlayer = NO;

    }


    -(void) touchCancelled:(UITouch *)touch withEvent:(UIEvent *)event

    {

        [self touchEnded:touch withEvent:event];

    }

    ```


    The cancelled variant is sent rarely—for instance, when a gesture recognizer recognizes
    a touch pattern. But when it does get called, it’s important that it behaves the
    same as `touchEnded:` or else the player will be stuck in the acceleration mode
    even though the user may not have a finger on the screen.


    **Tip**  Instead of replicating the functionality of `touchEnded:` in `touchCancelled:`
    I just forward the message. In this case, it’s a one-liner either way, but generally
    it’s good practice to avoid writing the same code more than once. It’s called
    the *DRY principle*: Don’t Repeat Yourself. It’s single-handedly the most important
    programming principle, even more important than premature optimization, which
    is the root of all evil, in case you didn’t know. Premature optimization can be
    paraphrased as follows: Make it work—make it right—make it fast. In that order.
    But I’m digressing. If you want to conduct an exercise, do a web search for these
    phrases and read some of the top articles.


    Now the `update:` method also needs to be amended by calling the `accelerateTarget:`
    method as long as the `_acceleratePlayer` ivar is `YES`. This is shown in [Listing
    4-3](#part0013.html#list3).


    ***Listing 4-3***. Accelerate the player node as needed


    ```

    -(void) update:(CCTime)delta

    {

        if (_acceleratePlayer)

        {

            [self accelerateTarget:_playerNode];

        }


    [self scrollToTarget:_playerNode];

    }

    ```


    Here, it is important to accelerate the player before scrolling because scrolling
    needs the player’s updated position. If you did it the other way, it would still
    work in general, but the scrolling would lag one frame behind the player’s actual
    position. This would have the view follow the player with a minimal but possibly
    noticeable delay, as if it were dragging behind the player’s position.


    Also notice that both methods take the `_playerNode` as an input parameter, rather
    than just relying on the `_playerNode` ivar being accessible within the method.
    The exercise here is to make methods as flexible as possible at no extra cost.
    Consider that you may want to accelerate a second player node the same way. You’d
    just call `accelerateTarget:` twice with different nodes. Or what if your player
    has exited the level but the camera should still continue to scroll to a predefined
    location in the level? You’d change the parameter sent to the `scrollToTarget:`
    method from the `_playerNode` to a node that is at or moving to the desired destination
    position.


    ### Accelerating the Player


    Now add the code in [Listing 4-4](#part0013.html#list4) just below the `update:`
    method. The `accelerateTarget:` method will move the player sprite by changing
    the velocity of its `physicsBody` component.'
