- fmt: 'Finally, I can imagine you may be an experienced Cocos2D developer. Perhaps
    you haven''t been using the latest Cocos2D version, or perhaps you just want to
    learn whether you should really give up some coding and do some designs in `SpriteBuilder`
    instead, and how that might work out.


    You''ll find the programming aspects a walk in the park, and you''ll enjoy the
    workflow benefits of using `SpriteBuilder` that I''ll present to you throughout
    the book. You may even be astonished about how much fun it is *not* to write program
    code, and you''ll appreciate being able to free your mind from tedious, repetitive
    programming tasks while being able to do more of the cool programming tricks you
    haven''t had time to explore yet.


    ## Requirements


    In order to learn from this book, you obviously need to download `SpriteBuilder`
    for free from the Mac App Store. To run `SpriteBuilder`, you need a Mac running
    OS X 10.8 Mountain Lion or newer.


    `Cocos2D` comes bundled with `SpriteBuilder`—you do not have to download it separately.
    There''s still a benefit in doing so, however. If you get the installer version
    from [http://www.cocos2d-swift.org/download](http://www.cocos2d-swift.org/download)
    and install it, you will have the `Cocos2D` API reference documentation available
    in `Xcode`. But you can also access it online: [http://www.cocos2d-swift.org/docs/api](http://www.cocos2d-swift.org/docs/api).


    **Note**  `SpriteBuilder` can automatically update the `Cocos2D` version used
    by your `SpriteBuilder` projects. If there''s a new version available, you will
    be asked to update, and if you allow it, `SpriteBuilder` will create a backup
    copy of `Cocos2D` before installing the new version to that project specifically.
    However, this will not update your downloaded copy of `Cocos2D` nor the `Cocos2D`
    `Xcode` documentation files. If you want to keep the `Cocos2D` `Xcode` documentation
    up to date, you will have to manually download and install each new `Cocos2D`
    version.


    Speaking of `Xcode`: in order to develop apps for iOS, you need to install `Xcode`,
    which is also available for free from the Mac App Store or Apple''s Developer
    Center: [https://developer.apple.com/devcenter/ios](https://developer.apple.com/devcenter/ios).


    The iOS SDK, the iOS Simulator, and the Cocoa touch frameworks come bundled with
    `Xcode`. You do not need to download anything else to develop iOS or OS X apps.
    But you may want to open `Xcode` ![image](images/00008.jpeg) `Preferences` and
    navigate to the `Downloads` pane to download the offline documentation for faster
    access or offline access to the iOS SDK documentation. The documentation is also
    available online: [https://developer.apple.com/library/ios/navigation](https://developer.apple.com/library/ios/navigation).


    It is not necessary to register as an iOS Developer with Apple to learn from this
    book. Still I recommend it, even though it costs a fee of currently $99 per year.
    Being a registered Apple developer has many benefits, most importantly the ability
    to deploy and test your app on an iOS device. If you plan on releasing your app
    to the App Store, you should register now rather than later.


    The iOS Simulator can be used to verify that your code functions, but it cannot
    measure how well your app performs—questions regarding slow Simulator performance
    are aplenty on the web. In short, iOS Simulator rendering performance is abysmal
    even on the fastest Macs. Yet the Simulator will gladly use your Mac''s multiple
    gigabytes of memory and plenty of CPU time—much more than iOS devices provide.
    Plus your app can feel very different when controlled by imprecise fingers covering
    parts of the screen, and you can''t simulate the accelerometer or multitouch gestures
    with the iOS Simulator.


    In short, you cannot reliably test your game for being fun, easy to handle, precise
    to control, and having good performance without testing on an actual device. So
    while it''s not strictly necessary, it''s highly recommended to sign up for the
    developer membership.


    ## About SpriteBuilder


    `SpriteBuilder` is a free, open-source visual design tool for OS X, created specifically
    to work in combination with `Cocos2d-Swift`. Originally, it was conceived as `CocosBuilder`
    by Viktor Lidholt and released in 2011. Viktor works for `Apportable` as the lead
    developer on `SpriteBuilder`, and he is joined with an entire team working on
    both `SpriteBuilder` and `Cocos2D`.


    Many `SpriteBuilder` and `Cocos2D` developers actually work for `Apportable`,
    a company that specializes in cross-compiling Objective-C code and, specifically,
    `SpriteBuilder` apps for the Android platform. In the ideal case, you just take
    your iOS app and build it for Android and it''ll work, just like that. You''ll
    find an introduction to the Android porting process in [Chapter 13](#part0024.html).


    `SpriteBuilder` integrates nicely with `Cocos2D`. Releases for both projects are
    now on the same schedule to ensure both tools work together in harmony. Gone are
    the days of incompatible file versions and unwitting changes to `Cocos2D` that
    break editor compatibility.


    `SpriteBuilder` can also be used to create OS X apps. As I''m writing this, the
    developers are working on adding OS X support. So I''m confident that by the time
    you are reading this, you will be able to start OS X projects with `SpriteBuilder`.
    Most of what you''ll learn in this book can be applied to OS X apps as well, some
    exceptions notwithstanding.


    **Tip**  In case `SpriteBuilder` doesn''t yet support creating OS X apps by the
    time you read this, you can find a tutorial on how to enable OS X support here:
    [http://jademind.com/blog/posts/porting-cocos2d-game-to-osx-using-spritebuilder/](http://jademind.com/blog/posts/porting-cocos2d-game-to-osx-using-spritebuilder/).


    ## Why Use SpriteBuilder?


    `SpriteBuilder`''s major benefit is seeing what you''re doing when you''re doing
    it (WYSIWYG). If you''ve been doing any game or graphical programming without
    a design tool, you''ll know the typical development cycle: Change a few lines
    of code or perhaps just a value, build the code, deploy the app onto the Device
    or Simulator, launch your app, navigate to where you made the change in your app,
    look at the change, and behold—it''s not quite right. Start over. Rinse, and repeat.
    Tedious, tiresome, time-consuming, and error-prone.


    With `SpriteBuilder`, you can do a lot of things visually and see exactly how
    they''ll look in your app. You can even switch between simulated device resolutions
    to test your change for all supported resolutions with a mouse click. Even more
    astonishing is the way you create timeline animations, and the fact that you can
    preview them live in `SpriteBuilder`. You see exactly how the layer moves into
    view and scales up to fill the screen over time. Or how your menu buttons roll
    in one by one in quick succession before coming to rest at their designated positions.


    Moreover, `SpriteBuilder` manages the app''s resource file versions, scaling them
    automatically for different device resolutions as needed. This frees you from
    performing many tedious, error-prone chores when developing for multiple screen
    resolutions and aspect ratios. It also means you don''t have to use one or several
    external tools, each performing only a small aspect of the development cycle.


    So, in summary, you could say that learning `SpriteBuilder` is a worthy endeavor
    not only because it can significantly reduce development time, but also because
    it''s fun to play with and experiment with. At the end of the day, you don''t
    just get results faster, you also get better results. What''s more, you can still
    write code for whatever you feel would still be faster to code rather than design
    visually. Once a node designed in `SpriteBuilder` has been loaded, you are free
    to write code that modifies, replaces, or discards the node as you see fit.


    ## About Cocos2D


    `Cocos2D` in this book refers specifically to `Cocos2d-Swift`. It''s actually
    just `Cocos2d-iPhone` rebranded under the `Cocos2d-Swift` name because it now
    officially supports making games using Apple''s Swift programming language.'
