    *本书深情献给妻子伊丽莎白，她始终陪伴在我身边，对我的人生选择和决定（如承诺撰写更多书籍）给予了无尽的耐心与理解。*

    ——*凯尔·里克特*


    *献给妻子黛博拉，感谢她始终支持我坚持下去，并忍受了无数小时的“橡皮鸭调试”。*

    ——*博·G·博尔*


    # 前言：游戏英雄凯尔·里克特的传奇


    **作者：布伦特·西蒙斯，为凯尔·里克特游戏开发书籍所作**


    你挑对了书。你太棒了！你很棒，而且你想开发游戏。酷。如果我想学开发游戏，我会直接住到凯尔·里克特家，逼他教我。但那样我们可能会分心，有朋友进城，最后出去玩了，结果我什么都没学到。幸运的是，你我都有福——我们有这本书。呼。


    让我介绍一下作者。开发者圈子里的人会告诉你，“凯尔·里克特”当然是个化名。你可能在汤姆·克兰西的小说里见过这个名字：“凯尔·里克特”是一位训练有素、经验丰富的秘密特工，不到
    30 岁就退役，然后通过模拟——游戏——将他在世界各地未公开战场以及近地轨道上遇到的纷争转化为财富，赚了数百万美元。


    想想看，很明显——“凯尔·里克特”这个名字显然是个虚构。“Kyle”听起来像“Guile（诡计）”，而“Richter”显然指代“地震（Richter scale）”。完美游戏英雄的完美名字：聪明、狡猾、危险。然而，为了全面起见，我应该指出，有少数人声称“凯尔·里克特”其实是一群精英忍者谷女孩程序员。这个说法已被调查过，但没找到任何证据。一无所获。我向你保证，我们的顶尖人员都查过了。


    “这反而证明了这一点，”有人说。“如果她们不是忍者，总会有点证据的。因此，她们就是忍者。”（我还应指出，这个理论和这个有缺陷的逻辑来自设计师，而非程序员。正如凯尔会说的：“我知道，对吧？”）


    因为我个人认识凯尔，我可以澄清一下。先看表面特质：凯尔身材像雷神，但身高上更有优势。他樱桃红色的头发如此耀眼，你在他拐弯前就能知道他要来了。孩子、松鼠和素食者常常把他的脸误认为是太阳。


    还有那笑声，那笑声，嗯，我觉得还挺悦耳的。


    无论如何，重要的是他的头脑，他的思维方式，他的沟通方式。在最近一次与他交谈中，他讲述了自己如何处理解雇员工和承包商的事。“一旦我意识到事情不对劲，就结束了，”他说。（凯尔在这里做了个抹脖子的动作。我吓得后退，直到他向我保证他只是让他们去别处寻找幸福。）“没有必要拖延，”他说。


    这告诉我，他对废话毫无耐心，非常务实，且拥有瓦肯人般的情绪控制力。所有这些都是一位优秀教师的特质，尤其是在技术话题上。换句话说，你想学习如何开发游戏，而不必费力阅读一堆空洞无物、胡说八道的内容。这就是本书的作用所在。（空洞和无稽之谈严格限制在本前言中。本书其余部分信息丰富，文笔出色。）


    不是说凯尔喜欢解雇人。他不是。恰恰相反。这个行业非常缺乏人才，而凯尔和其他人一样，努力寻找优秀的 iOS 开发者。这样的人不够多——所以请学习本书的内容，帮帮我们所有人吧！


    同时，凯尔的知识和本书的内容超越了纯技术层面。凯尔了解游戏的历史，知道哪些游戏能成功，哪些不能。你会有疑问。（“持久性。形态。启动日期。”）本书有答案。


    * 你的游戏需要排行榜吗？请参阅第 3 章。

    * 为你的游戏添加多人游戏元素有多棒？在第 5 章中寻找答案。


    但本书是一本技术书，它提供了干货、代码和解释——即使是最新的 API。例如，第 8 章讨论了通过 GameCenter 进行回合制游戏。目前擅长此道的人不多，更不用说能写书讲解的人了。但凯尔可以，而且这本书里就有相关内容。


    如果最后发现凯尔“就是个普通人，你懂吗？”——而且是个经得起玩笑的好好先生，实际上并不像雷神——那也没关系，因为这本书就是个金矿。我为他感到骄傲。


    借用乔治·克林顿的永恒名言：“除非你玩它，否则没什么是好的。”我的意思是：阅读、学习、然后去玩。书是技术性的，但你制作的东西是为了玩，制作这些东西也应该像玩一样。好好享受吧！


    用凯尔·里克特（或“凯尔·里克特”）那不朽而阳光的话来说：“我知道，对吧？”


    # 引言


    iOS 无疑是世界上最流行的开发平台。随着 Apple TV 和 MacOS 上应用开发方式的变化，跨平台共享代码从未如此简单。随着所有这些平台的热度持续飙升，为你的软件添加更多丰富功能比以往任何时候都重要。Game
    Center 和 GameKit 为你的软件添加高级功能提供了一条便捷途径，所需工作量仅为此前的一小部分。'
- fmt: "# Prerequisites\n\nThis book assumes that you have the basic skills and understanding\
    \ required to create an iOS, Mac, or Apple TV app. The book also assumes that\
    \ you have the background necessary to work with `Xcode 13` or newer. There will\
    \ be no primer on how to define methods and variables, install and launch `Xcode`,\
    \ or create and work with new projects or classes. There are many excellent books\
    \ on those topics such as *Beginning iPhone Development with Swift* by Apress.\
    \ When you feel comfortable that you are ready to begin working with some of the\
    \ more advanced framework technologies such as `Game Center` and `GameKit`, we\
    \ assume that you have the basics mastered to a degree that allows you to move\
    \ through this book without consulting other texts for help.\n\n## How This Book\
    \ Is Organized\n\nAs you begin working through this book, you will notice that\
    \ it is broken down into stand-alone chapters. Every effort has been made so that\
    \ each chapter can be read independently of the others. If you have no experience\
    \ with `Game Center` or `GameKit` yet, it is highly recommended that you read\
    \ the first two chapters before skipping around, as they will provide you with\
    \ the basic information on how to get `Game Center` and `GameKit` up and running\
    \ in your development environment.\n\nEach chapter follows along with a simple\
    \ sample iOS game that is introduced in Chapter 1. Following along with the book\
    \ from start to finish will walk you through the process of creating a fully functional\
    \ Game Center– and `GameKit`-leveraged iOS game. In addition, each chapter will\
    \ build onto a `Game Center Manager` class that is designed to be reusable across\
    \ all of your projects.\n\nIf you already have a background in `Game Center` and\
    \ `GameKit` and are looking for help on a specific technology, each chapter is\
    \ designed to walk you through its covered technology, as well as provide samples\
    \ on how to apply the technology to your software.\n\n## Required Software, Materials,\
    \ and Equipment\n\nTo develop iOS, macOS, or Apple TV software—and more specifically\
    \ Game Center– and `GameKit`-based software—you will first need an Intel-based\
    \ or ARM Mac computer running macOS 11 (Big Sur) or newer. While you can develop\
    \ on older versions of macOS, it will not support the most up-to-date release\
    \ of `Xcode`. You will also need a copy of `Xcode`, which you can download for\
    \ free from the Mac App Store or at `http://developer.apple.com`. This book has\
    \ been targeted to work with iOS 15.\n\nIn addition to the software and hardware\
    \ requirements, you will also need a developer account provided by Apple. This\
    \ account lets you build and test software on devices, as well as ship your finished\
    \ product to the App Store. The software developer account is available for $99\
    \ USD a year and you can purchase yours at `https://developer.apple.com/programs/`.\n\
    \n## Acknowledgments\n\nWriting this book would not have been possible without\
    \ the support and help of many people. Looking at the acknowledgments for any\
    \ technical book shows that while there may only be one author, there are dozens\
    \ of people needed to ship a technical book such as this. First, I would like\
    \ to thank Jordan Langille of One Toad Design for taking time out of his busy\
    \ schedule to provide the graphics for the sample program contained within.\n\n\
    I would like to extend a special thanks to everyone at MartianCraft for doing\
    \ their jobs so well and professionally that I was able to find the available\
    \ time to work on this book. In addition, I would like to extend a special thanks\
    \ to Beau G. Bolle for his help bringing this revised edition to print.\n\nLast\
    \ but not least, I would like to thank the community as a whole. Never before\
    \ in my life have I met such a supportive, outstanding group of people. From Cocoaheads\
    \ and NSCoders to conferences and forums, everyone has always been of the highest\
    \ caliber. It is often said of the Apple development community that two competing\
    \ developers can be friends and share code and secrets among each other. Whenever\
    \ I got stuck on a seemingly unsurmountable problem, there has always been someone\
    \ there to help me through it. Throughout all my years of development and my travels\
    \ across the globe, I have never met another group of people as awesome as the\
    \ Apple development community, without whom I may have never shipped my first\
    \ app.\n\n## About the Authors\n\n# Getting Started with GameKit and Game Center\n\
    \nWelcome to *Beginning iOS Game Center and GameKit*! This book is designed to\
    \ walk you through the process of adding `GameKit` and `Game Center` functionality\
    \ into your iOS, Mac, or Apple TV apps and games. It is centered around a sample\
    \ game built for iOS that you will be introduced to later in this chapter. You\
    \ will find that most of the instructions are universal between platforms; however,\
    \ if there is specific behavior for a platform other than iOS, they will be called\
    \ out in the text.\n\nIf you have an existing app or game that you want to add\
    \ `GameKit` or `Game Center` functionality to, you may substitute that project\
    \ instead; I will try to use the most generic approach possible throughout the\
    \ forthcoming chapters to make the functionality easy to implement.\n\nThis book\
    \ is written as a reference and resource to aid you in the process of adding social\
    \ gaming functions into your iOS, Mac, or Apple TV app. While I recommend you\
    \ follow along from beginning to end to gain the most knowledge of the covered\
    \ technologies, it is not a requirement. Every chapter is designed to stand on\
    \ its own. You can skip ahead to the chapters that cover the material that is\
    \ relevant to your project and quickly implement them into your software.\n\n\
    When Apple announced `GameKit` on March 17, 2009, it was presented as an answer\
    \ to the often-frustrating game style networking on iOS devices, which, until\
    \ this point, had been challenging to say the least. `GameKit` added support for\
    \ Bluetooth and local area network (LAN) as well as voice chat services. Shortly\
    \ after, Apple announced the `Game Center` addition to `GameKit` as part of iOS\
    \ 4.0. With the new SDK, Apple brought a wealth of new features—the `Game Center`\
    \ being the most important to the scope of this book. `Game Center` largely stood\
    \ untouched without major updates until 2020 when Apple released a significant\
    \ update to the `Game Center` and `GameKit` frameworks.\n\nDevelopers in the community\
    \ have a tendency to think of `Game Center` as a stand-alone set of Application\
    \ Programming Interfaces (APIs). This is a fallacy. `Game Center` is an integral\
    \ part of `GameKit`. The two complement one another and work hand in hand. You\
    \ will see an abundance of evidence of this in the following pages. For the purpose\
    \ of this book, we are going to address both of these technologies together as\
    \ `GameKit`; however, we may still refer to Game Center–specific functionality\
    \ by its proper name.\n\n> **Note**  \n> Despite their names, `GameKit` and `Game\
    \ Center` are not designed for just games. Apple has in the past cracked down\
    \ on `Game Center` technology being used in nongames. Some developers have received\
    \ the following type of rejection email from Apple:  \n> *“The intended use of\
    \ Game Center is to complement game apps or game functionality within an app.\
    \ However, we noticed that your app does not contain any game play or game features.”*\
    \  \n> These rejections seem to apply mainly toward the use of leaderboards and\
    \ achievements in nongaming apps. The argument can easily be made that adding\
    \ a leaderboard or achievement system to your app adds a gameplay element. If\
    \ you happen to receive this rejection, you still have the option of appealing\
    \ it. There haven’t been any instances of rejection for using `GameKit` networking\
    \ in any app to my knowledge. However, when dealing with guidelines for App Store\
    \ approval, you should always consult the latest Developer Guidelines made available\
    \ by Apple."
  raw: '## Prerequisites


    This book assumes that you have the basic skills and understanding required to
    create an iOS, Mac, or Apple TV app. The book also assumes that you have the background
    necessary to work with Xcode 13 or newer. There will be no primer on how to define
    methods and variables, install and launch Xcode, or create and work with new projects
    or classes. There are many excellent books on those topics such as *Beginning
    iPhone Development with Swift* by Apress. When you feel comfortable that you are
    ready to begin working with some of the more advanced framework technologies such
    as Game Center and GameKit, we assume that you have the basics mastered to a degree
    that allows you to move through this book without consulting other texts for help.


    ## How This Book Is Organized


    As you begin working through this book, you will notice that it is broken down
    into stand-alone chapters. Every effort has been made so that each chapter can
    be read independently of the others. If you have no experience with Game Center
    or GameKit yet, it is highly recommended that you read the first two chapters
    before skipping around, as they will provide you with the basic information on
    how to get Game Center and GameKit up and running in your development environment.


    Each chapter follows along with a simple sample iOS game that is introduced in
    Chapter [1](#216283_2_En_1_Chapter.xhtml). Following along with the book from
    start to finish will walk you through the process of creating a fully functional
    Game Center– and GameKit-leveraged iOS game. In addition, each chapter will build
    onto a Game Center Manager class that is designed to be reusable across all of
    your projects.


    If you already have a background in Game Center and GameKit and are looking for
    help on a specific technology, each chapter is designed to walk you through its
    covered technology, as well as provide samples on how to apply the technology
    to your software.


    ## Required Software, Materials, and Equipment


    To develop iOS, MacOS, or Apple TV software—and more specifically Game Center–
    and GameKit-based software—you will first need an Intel-based or ARM Mac computer
    running MacOS 11 (Big Sur) or newer. While you can develop on older versions of
    MacOS, it will not support the most up-to-date release of Xcode. You will also
    need a copy of Xcode, which you can download for free from the Mac App Store or
    at [`http://developer.apple.com`](http://developer.apple.com) . This book has
    been targeted to work with iOS 15.


    In addition to the software and hardware requirements, you will also need a developer
    account provided by Apple. This account lets you build and test software on devices,
    as well as ship your finished product to the App Store. The software developer
    account is available for $99 USD a year and you can purchase yours at [`https://developer.apple.com/programs/`](https://developer.apple.com/programs/)
    .


    Acknowledgments


    Writing this book would not have been possible without the support and help of
    many people. Looking at the acknowledgments for any technical book shows that
    while there may only be one author, there are dozens of people needed to ship
    a technical book such as this. First, I would like to thank Jordan Langille of
    One Toad Design for taking time out of his busy schedule to provide the graphics
    for the sample program contained within.


    I would like to extend a special thanks to everyone at MartianCraft for doing
    their jobs so well and professionally that I was able to find the available time
    to work on this book. In addition, I would like to extend a special thanks to
    Beau G. Bolle for his help bringing this revised edition to print.


    Last but not least, I would like to thank the community as a whole. Never before
    in my life have I met such a supportive, outstanding group of people. From Cocoaheads
    and NSCoders to conferences and forums, everyone has always been of the highest
    caliber. It is often said of the Apple development community that two competing
    developers can be friends and share code and secrets among each other. Whenever
    I got stuck on a seemingly unsurmountable problem, there has always been someone
    there to help me through it. Throughout all my years of development and my travels
    across the globe, I have never met another group of people as awesome as the Apple
    development community, without whom I may have never shipped my first app.


    About the Authors


    # 1. Getting Started with GameKit and Game Center


    Welcome to *Beginning iOS Game Center and GameKit*! This book is designed to walk
    you through the process of adding GameKit and Game Center functionality into your
    iOS, Mac, or Apple TV apps and games. It is centered around a sample game built
    for iOS that you will be introduced to later in this chapter. You will find that
    most of the instructions are universal between platforms; however, if there is
    specific behavior for a platform other than iOS, they will be called out in the
    text.


    If you have an existing app or game that you want to add GameKit or Game Center
    functionality to, you may substitute that project instead; I will try to use the
    most generic approach possible throughout the forthcoming chapters to make the
    functionality easy to implement.


    This book is written as a reference and resource to aid you in the process of
    adding social gaming functions into your iOS, Mac, or Apple TV app. While I recommend
    you follow along from beginning to end to gain the most knowledge of the covered
    technologies, it is not a requirement. Every chapter is designed to stand on its
    own. You can skip ahead to the chapters that cover the material that is relevant
    to your project and quickly implement them into your software.


    When Apple announced GameKit on March 17, 2009, it was presented as an answer
    to the often-frustrating game style networking on iOS devices, which, until this
    point, had been challenging to say the least. GameKit added support for Bluetooth
    and local area network (LAN) as well as voice chat services. Shortly after, Apple
    announced the Game Center addition to GameKit as part of iOS 4.0\. With the new
    SDK, Apple brought a wealth of new features—the Game Center being the most important
    to the scope of this book. Game Center largely stood untouched without major updates
    until 2020 when Apple released a significant update to the Game Center and GameKit
    frameworks.


    Developers in the community have a tendency to think of Game Center as a stand-alone
    set of Application Programming Interfaces (APIs). This is a fallacy. Game Center
    is an integral part of GameKit. The two complement one another and work hand in
    hand. You will see an abundance of evidence of this in the following pages. For
    the purpose of this book, we are going to address both of these technologies together
    as GameKit; however, we may still refer to Game Center–specific functionality
    by its proper name.


    Note


    Despite their names, GameKit and Game Center are not designed for just games.
    Apple has in the past cracked down on Game Center technology being used in nongames.
    Some developers have received the following type of rejection email from Apple:


    “The intended use of Game Center is to complement game apps or game functionality
    within an app. However, we noticed that your app does not contain any game play
    or game features.”


    These rejections seem to apply mainly toward the use of leaderboards and achievements
    in nongaming apps. The argument can easily be made that adding a leaderboard or
    achievement system to your app adds a gameplay element. If you happen to receive
    this rejection, you still have the option of appealing it. There haven’t been
    any instances of rejection for using GameKit networking in any app to my knowledge.
    However, when dealing with guidelines for App Store approval, you should always
    consult the latest Developer Guidelines made available by Apple.'
  trans: "\n# 先决条件\n\n本书假定您已具备创建 iOS、Mac 或 Apple TV 应用所需的基本技能和理解能力。同时，本书也假定您已掌握使用\
    \ `Xcode 13` 或更新版本所需的背景知识。本书不会提供关于如何定义方法和变量、安装和启动 `Xcode`，或创建及操作新项目或类的基础教程。关于这些主题，已有许多优秀的书籍，例如\
    \ Apress 出版的 *Beginning iPhone Development with Swift*。当您确信自己已准备好开始学习诸如 `Game\
    \ Center` 和 `GameKit` 等更高级的框架技术时，我们假定您已基本掌握这些基础知识，能够在不查阅其他参考书的情况下顺利阅读本书。\n\n##\
    \ 本书的组织结构\n\n当您开始阅读本书时，您会发现它由独立的章节组成。我们已尽力确保每一章都可以独立于其他章节阅读。如果您对 `Game Center`\
    \ 或 `GameKit` 尚无经验，强烈建议您先阅读前两章，然后再跳读其他章节，因为这两章将为您提供在开发环境中启动并运行 `Game Center` 和\
    \ `GameKit` 的基本信息。\n\n每一章都将配合第 1 章中引入的一个简单 iOS 游戏示例进行讲解。从头到尾跟随本书，您将亲历创建一个功能完备、集成了\
    \ Game Center 和 `GameKit` 的 iOS 游戏的全过程。此外，每一章都将为一个可重用于您所有项目的 `Game Center Manager`\
    \ 类添砖加瓦。\n\n如果您已具备 `Game Center` 和 `GameKit` 背景知识，并正在寻求特定技术的帮助，每章都将引导您学习其涵盖的技术，并提供如何将该技术应用于您软件中的示例。\n\
    \n## 所需的软件、材料和设备\n\n要开发 iOS、macOS 或 Apple TV 软件——更具体地说，是基于 Game Center 和 `GameKit`\
    \ 的软件——您首先需要一台运行 macOS 11 (Big Sur) 或更新版本的 Intel 或 ARM 架构 Mac 电脑。虽然您可以在较旧版本的 macOS\
    \ 上进行开发，但这将无法支持最新版本的 `Xcode`。您还需要一份 `Xcode` 的副本，可以从 Mac App Store 或 `http://developer.apple.com`\
    \ 免费下载。本书的目标环境是 iOS 15。\n\n除了软件和硬件要求外，您还需要一个由 Apple 提供的开发者账户。该账户允许您在设备上构建和测试软件，并将最终产品发布到\
    \ App Store。软件开发者账户每年收费 99 美元，您可以在 `https://developer.apple.com/programs/` 购买。\n\
    \n## 致谢\n\n没有许多人的支持和帮助，这本书是不可能完成的。翻阅任何技术书籍的致谢部分都会发现，虽然可能只有一位作者，但出版这样一本技术书籍需要几十个人的共同努力。首先，我要感谢\
    \ One Toad Design 的 Jordan Langille，他在百忙之中抽出时间为本书中的示例程序提供了图形素材。\n\n我特别感谢 MartianCraft\
    \ 的每一位成员，他们工作出色且专业，让我能够腾出时间来撰写本书。此外，我特别感谢 Beau G. Bolle 对本书修订版出版所提供的帮助。\n\n最后但同样重要的是，我要感谢整个社区。在我的一生中，从未遇到过如此支持、如此杰出的一个群体。从\
    \ Cocoaheads 和 NSCoders 到各种会议和论坛，每个人始终都展现出最高水准。人们常说，在 Apple 开发者社区中，两个竞争开发者可以成为朋友，彼此分享代码和秘密。每当我困于看似无法解决的问题时，总会有人伸出援手。在我多年的开发经历和全球旅行中，我从未遇到过像\
    \ Apple 开发者社区这样了不起的群体。没有他们，我可能永远无法发布我的第一个应用。\n\n## 关于作者\n\n# GameKit 和 Game Center\
    \ 入门\n\n欢迎阅读《Beginning iOS Game Center and GameKit》！本书旨在引导您将 `GameKit` 和 `Game\
    \ Center` 功能集成到您的 iOS、Mac 或 Apple TV 应用和游戏中。本书围绕一个为 iOS 构建的示例游戏展开，您将在本章稍后部分接触到它。您会发现，大部分说明在各个平台间是通用的；但是，如果存在\
    \ iOS 之外的特定平台行为，我们会在文中注明。\n\n如果您已有想要添加 `GameKit` 或 `Game Center` 功能的现有应用或游戏，您可以用该项目进行替换；在接下来的章节中，我将尽量采用最通用的方法，以便于您轻松实现相关功能。\n\
    \n本书旨在作为一本参考书和资源，帮助您为 iOS、Mac 或 Apple TV 应用添加社交游戏功能。虽然我建议您从头到尾通读本书，以获得对所涵盖技术最全面的了解，但这并非强制要求。每一章都是独立的。您可以跳转到与您项目相关的章节，并快速将其内容应用到您的软件中。\n\
    \n当 Apple 于 2009 年 3 月 17 日发布 `GameKit` 时，它被作为 iOS 设备上通常令人沮丧的游戏风格网络问题的解决方案，而在此之前，这个问题至少可以说是充满挑战的。`GameKit`\
    \ 增加了对蓝牙和局域网 (LAN) 以及语音聊天服务的支持。不久之后，Apple 宣布在 iOS 4.0 中为 `GameKit` 添加了 `Game Center`。借助新的\
    \ SDK，Apple 带来了大量新功能——其中 `Game Center` 对本书的范畴最为重要。`Game Center` 在很长一段时间内没有重大更新，直到\
    \ 2020 年 Apple 对 `GameKit` 和 `Game Center` 框架进行了重大升级。\n\n社区中的开发者往往认为 `Game Center`\
    \ 是一套独立的应用程序编程接口 (API)。这是一种误解。`Game Center` 是 `GameKit` 不可或缺的一部分。两者相辅相成，携手合作。在接下来的章节中，您将看到大量证据。就本书而言，我们将把这两项技术统称为\
    \ `GameKit`；但在提及 Game Center 特有功能时，我们仍可能使用其正式名称。\n\n> **注意**  \n> 尽管名称如此，`GameKit`\
    \ 和 `Game Center` 并非仅为游戏而设计。Apple 过去曾严厉打击在非游戏应用中使用 `Game Center` 技术的行为。一些开发者收到过类似下面这样的\
    \ Apple 拒绝邮件：  \n> *“Game Center 的预期用途是补充游戏应用或应用内的游戏功能。然而，我们注意到您的应用不包含任何游戏玩法或游戏特性。”*\
    \  \n> 这些拒绝似乎主要针对在非游戏应用中使用排行榜和成就系统的情况。您可以很容易地争辩说，在您的应用中加入排行榜或成就系统增加了一个游戏化元素。如果您碰巧收到这样的拒绝，您仍然有申诉的机会。据我所知，没有任何因在任何应用中使用\
    \ `GameKit` 网络功能而被拒绝的实例。然而，在处理 App Store 审核指南时，您应始终查阅 Apple 提供的最新开发者指南。\n"
- fmt: "# GameKit: An Overview\n\n`GameKit` can be broken up into three individual\
    \ sections: networking, Game Center, and voice chat. Though all of these services\
    \ work together to create a single seamless environment, it can be helpful to\
    \ look at each individually. While there might be overlap between sections, such\
    \ as networking and Game Center, each section of `GameKit` can be broken down\
    \ into a primary category. While these sections are not differentiated in the\
    \ API, you may find it is useful to keep them separate while learning `GameKit`\
    \ development.\n\n## Networking\n\nNetworking in `GameKit` allows you to send\
    \ and receive data between \"peers.\" `GameKit` networking also provides a connection\
    \ protocol to connect to local clients that are found on your Wi-Fi network or\
    \ locally using Bluetooth.\n\n`GameKit` supports creating an ad hoc Bluetooth\
    \ or local wireless network between two iOS devices; Game Center matchmaking also\
    \ supports networking over the Internet supporting up to 16 players at once. `GameKit`\
    \ networking is covered in Chapters [6](#216283_2_En_6_Chapter.xhtml), [7](#216283_2_En_7_Chapter.xhtml),\
    \ and [8](#216283_2_En_8_Chapter.xhtml). Game Center matchmaking is covered in\
    \ Chapter [5](#216283_2_En_5_Chapter.xhtml).\n\n## Game Center\n\nGame Center\
    \ itself handles authentication, friends, leaderboards, achievements, and invitations.\
    \ In a sense, Game Center is providing the server services that are related to\
    \ social interaction. It can also be argued that Game Center contains its own\
    \ networking system. While this is true, we will be grouping that topic in the\
    \ preceding section on networking, which is covered extensively in Chapter [5](#216283_2_En_5_Chapter.xhtml).\
    \ Game Center technologies, such as leaderboards and achievements, are covered\
    \ in Chapters [3](#216283_2_En_3_Chapter.xhtml) and [4](#216283_2_En_4_Chapter.xhtml).\n\
    \n> **Note**  \n> Game Center, in various articles of print and reference documentation,\
    \ sometimes refers to the collective set of Game Center APIs as well as to the\
    \ Game Center app itself.\n\n## Voice Chat\n\n\"Game Voice,\" as Apple often refers\
    \ to it, allows any app (not just games) to provide voice communication over a\
    \ network connection, commonly known as VOIP. The APIs handle the entire listening\
    \ and playback of audio feeds for the user and provide services to handle connections,\
    \ communications, errors, and disconnections. This technology is discussed in\
    \ Chapter [10](#216283_2_En_10_Chapter.xhtml).\n\n# Sample Game: UFOs\n\nIn my\
    \ experience, most developers are \"experience-type\" learners. This means that\
    \ they learn best by doing, not by watching or listening. When I first started\
    \ to learn how to program, I would copy source code out of code magazines line\
    \ by line into a Commodore 64. The experience of physically typing in each line\
    \ of code is what I believe made the information stick. Listening to a lecture\
    \ or watching someone else write code prevented me from retaining a good deal\
    \ of the information. I can't imagine I would have stayed with this career path\
    \ if lectures and demonstrations were my only ways of learning. This book is designed\
    \ in the spirit of other experience-type learners.\n\nThe first thing we cover,\
    \ before moving into `GameKit` itself, is working with the supplied sample game.\
    \ The game, which we call \"UFOs,\" is designed not to be an award-winning, addictive\
    \ game, but rather to be simple enough that it can be thought of as any generic\
    \ project. I have made every effort to reduce the amount of code to less than\
    \ 300 lines. Although the game itself is simple, I feel that it is vital that\
    \ every reader understands the code as if they wrote it themselves. This will\
    \ allow you, as the reader, to detach yourself from the project itself and focus\
    \ on the `GameKit`-specific information. We will start by playing the game and\
    \ then looking at the source code.\n\n> **Note**  \n> The source code for all\
    \ the chapters, as well as the sample project, is available at [`www.apress.com`](http://www.apress.com).\n\
    \n## UFOs: Understanding the Game\n\nThe first thing you need to do is open the\
    \ base project that you downloaded from [apress.​com](http://apress.com). Figure\
    \ [1-1](#216283_2_En_1_Chapter.xhtml#Fig1) shows the file structure for the project.\
    \ We'll quickly run the game to see what it's like.\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig1_HTML.jpg](images/216283_2_En_1_Chapter/216283_2_En_1_Fig1_HTML.jpg)\n\
    \nFigure 1-1: The file structure for the UFO sample project, as seen by the Finder\n\
    \nTo play the game, select Run from Product Menu bar. The game will launch to\
    \ a generic screen with one button labeled \"Play.\" Go ahead and select the Play\
    \ button. You will be taken to the game screen, as seen in Figure [1-2](#216283_2_En_1_Chapter.xhtml#Fig2);\
    \ this screen may vary slightly depending on your selected test device.\n\nThe\
    \ objective of the game is both typical and simple; tilt the device up/down or\
    \ left/right to move your ship around the screen. Once you are positioned over\
    \ a cow, tap anywhere on the screen and hold until the cow has been abducted.\
    \ You are awarded one point for every cow you abduct. Like all the best games,\
    \ there is no ending or way to \"win.\" Every time you abduct a cow, a new one\
    \ will be spawned.\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig2_HTML.jpg](images/216283_2_En_1_Chapter/216283_2_En_1_Fig2_HTML.jpg)\n\
    \nFigure 1-2: A look at the gameplay view from the UFOs sample project\n\nNow\
    \ that you understand how the gameplay works, you can take a look at the source\
    \ code that makes everything happen.\n\n# UFOs: Examining the Source Code\n\n\
    In your group tree, you will see the four class files we will be working with:\
    \ `AppDelegate.swift`, `SceneDelegate.swift`, `GameViewController.swift`, and\
    \ `HomeViewController.swift`. The group tree is shown in Figure [1-3](#216283_2_En_1_Chapter.xhtml#Fig3).\
    \ You will also notice a `Main.storyboard` file which contains the user interface\
    \ elements of the project.\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig3_HTML.jpg](images/216283_2_En_1_Chapter/216283_2_En_1_Fig3_HTML.jpg)\n\
    \nFigure 1-3: A look at the group tree structure for the sample project from within\
    \ Xcode\n\nFirst, take a look at the `AppDelegate.swift` and `SceneDelegate.swift`\
    \ files. These files should look familiar to you from other swift development\
    \ works. They are nothing more than a base `UIApplicationDelegate` and `UIWindowSceneDelegate`\
    \ subclass. If you need to familiarize yourself with the code found here, take\
    \ a look at Apple's sample code for new projects.\n\nThe next group of files is\
    \ also relatively simple; take a look at `UFOViewController.h` and `UFOViewController.m`.\
    \ These are the associated classes for the landing or home screen. All that we\
    \ have here right now is a Play button, but we will be adding leaderboards, achievement,\
    \ and multiplayer controls to this view as we progress through this book.\n\n\
    Finally, we will be working with `UFOGameViewController.m`. This is the main class\
    \ that will be powering all gameplay and where the majority of the `GameKit` functionality\
    \ will be added."
  raw: '## GameKit: An Overview


    GameKit can be broken up into three individual sections: networking, Game Center,
    and voice chat. Though all of these services work together to create a single
    seamless environment, it can be helpful to look at each individually. While there
    might be overlap between sections, such as networking and Game Center, each section
    of GameKit can be broken down into a primary category. While these sections are
    not differentiated in the API, you may find it is useful to keep them separate
    while learning GameKit development.


    ### Networking


    Networking in GameKit allows you to send and receive data between “peers.” GameKit
    networking also provides a connection protocol to connect to local clients that
    are found on your Wi-Fi network or locally using Bluetooth.


    GameKit supports creating an ad hoc Bluetooth or local wireless network between
    two iOS devices; Game Center matchmaking also supports networking over the Internet
    supporting up to 16 players at once. GameKit networking is covered in Chapters
    [6](#216283_2_En_6_Chapter.xhtml), [7](#216283_2_En_7_Chapter.xhtml), and [8](#216283_2_En_8_Chapter.xhtml).
    Game Center matchmaking is covered in Chapter [5](#216283_2_En_5_Chapter.xhtml).


    ### Game Center


    Game Center itself handles authentication, friends, leaderboards, achievements,
    and invitations. In a sense, Game Center is providing the server services that
    are related to social interaction. It can also be argued that Game Center contains
    its own networking system. While this is true, we will be grouping that topic
    in the preceding section on networking, which is covered extensively in Chapter
    [5](#216283_2_En_5_Chapter.xhtml). Game Center technologies, such as leaderboards
    and achievements, are covered in Chapters [3](#216283_2_En_3_Chapter.xhtml) and
    [4](#216283_2_En_4_Chapter.xhtml).


    Note


    Game Center, in various articles of print and reference documentation, sometimes
    refers to the collective set of Game Center APIs as well as to the Game Center
    app itself.


    ### Voice Chat


    “Game Voice,” as Apple often refers to it, allows any app (not just games) to
    provide voice communication over a network connection, commonly known as VOIP.
    The APIs handle the entire listening and playback of audio feeds for the user
    and provide services to handle connections, communications, errors, and disconnections.
    This technology is discussed in Chapter [10](#216283_2_En_10_Chapter.xhtml).


    ## Sample Game: UFOs


    In my experience, most developers are “experience-type” learners. This means that
    they learn best by doing, not by watching or listening. When I first started to
    learn how to program, I would copy source code out of code magazines line by line
    into a Commodore 64\. The experience of physically typing in each line of code
    is what I believe made the information stick. Listening to a lecture or watching
    someone else write code prevented me from retaining a good deal of the information.
    I can’t imagine I would have stayed with this career path if lectures and demonstrations
    were my only ways of learning. This book is designed in the spirit of other experience-type
    learners.


    The first thing we cover, before moving into GameKit itself, is working with the
    supplied sample game. The game, which we call “UFOs,” is designed not to be an
    award-winning, addictive game, but rather to be simple enough that it can be thought
    of as any generic project. I have made every effort to reduce the amount of code
    to less than 300 lines. Although the game itself is simple, I feel that it is
    vital that every reader understands the code as if they wrote it themselves. This
    will allow you, as the reader, to detach yourself from the project itself and
    focus on the GameKit-specific information. We will start by playing the game and
    then looking at the source code.


    Note


    The source code for all the chapters, as well as the sample project, is available
    at [`www.apress.com`](http://www.apress.com).


    ### UFOs: Understanding the Game


    The first thing you need to do is open the base project that you downloaded from
    [apress.​com](http://apress.com). Figure [1-1](#216283_2_En_1_Chapter.xhtml#Fig1)
    shows the file structure for the project. We’ll quickly run the game to see what
    it’s like.


    ![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig1_HTML.jpg](images/216283_2_En_1_Chapter/216283_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    The file structure for the UFO sample project, as seen by the Finder


    To play the game, select Run from Product Menu bar. The game will launch to a
    generic screen with one button labeled “Play.” Go ahead and select the Play button.
    You will be taken to the game screen, as seen in Figure [1-2](#216283_2_En_1_Chapter.xhtml#Fig2);
    this screen may vary slightly depending on your selected test device.


    The objective of the game is both typical and simple; tilt the device up/down
    or left/right to move your ship around the screen. Once you are positioned over
    a cow, tap anywhere on the screen and hold until the cow has been abducted. You
    are awarded one point for every cow you abduct. Like all the best games, there
    is no ending or way to “win.” Every time you abduct a cow, a new one will be spawned.


    ![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig2_HTML.jpg](images/216283_2_En_1_Chapter/216283_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    A look at the gameplay view from the UFOs sample project


    Now that you understand how the gameplay works, you can take a look at the source
    code that makes everything happen.


    ## UFOs: Examining the Source Code


    In your group tree, you will see the four class files we will be working with:
    `AppDelegate.swift, SceneDelegate.swift`, GameViewController.swift, and `HomeViewController.swift`.
    The group tree is shown in Figure [1-3](#216283_2_En_1_Chapter.xhtml#Fig3). You
    will also notice a Main.storyboard file which contains the user interface elements
    of the project.


    ![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig3_HTML.jpg](images/216283_2_En_1_Chapter/216283_2_En_1_Fig3_HTML.jpg)


    Figure 1-3


    A look at the group tree structure for the sample project from within Xcode


    First, take a look at the `AppDelegate.swift and SceneDelegate.swift` files. These
    files should look familiar to you from other swift development works. They are
    nothing more than a base `UIApplicationDelegate and UIWindowSceneDelegate` subclass.
    If you need to familiarize yourself with the code found here, take a look at Apple’s
    sample code for new projects.


    The next group of files is also relatively simple; take a look at `UFOViewController.h`
    and `UFOViewController.m`. These are the associated classes for the landing or
    home screen. All that we have here right now is a Play button, but we will be
    adding leaderboards, achievement, and multiplayer controls to this view as we
    progress through this book.


    Finally, we will be working with `UFOGameViewController.m`. This is the main class
    that will be powering all gameplay and where the majority of the GameKit functionality
    will be added.'
  trans: "\n# GameKit 概述\n\n`GameKit` 可划分为三个独立的功能模块：网络、Game Center 和语音聊天。尽管这些服务共同协作以创造一个无缝集成的环境，但逐一审视每个模块会更有帮助。虽然各模块之间可能存在重叠，例如网络与\
    \ Game Center 部分，但 `GameKit` 的每个模块都可归结为一个主要类别。尽管 API 中并未对这些模块进行区分，但在学习 `GameKit`\
    \ 开发时，将它们分开来思考或许会对你有所帮助。\n\n## 网络\n\n`GameKit` 网络功能允许你在“对等节点”之间发送和接收数据。`GameKit`\
    \ 网络还提供了一套连接协议，用于连接在你的 Wi-Fi 网络上或通过蓝牙在本地发现的客户端。\n\n`GameKit` 支持在两台 iOS 设备之间创建临时的蓝牙或本地无线网络；Game\
    \ Center 匹配功能也支持通过互联网进行网络连接，最多可同时支持 16 名玩家。`GameKit` 网络功能在第 6、7 和 8 章中介绍。Game\
    \ Center 匹配功能在第 5 章中介绍。\n\n## Game Center\n\nGame Center 本身处理身份验证、好友、排行榜、成就和邀请。从某种意义上说，Game\
    \ Center 提供了与社交互动相关的服务器服务。也可以认为 Game Center 包含了自己的网络系统。虽然确实如此，但我们将在前文关于网络的章节中对这一主题进行分组讨论，该部分在第\
    \ 5 章中有详细阐述。Game Center 技术，例如排行榜和成就，将在第 3 和 4 章中介绍。\n\n> **注意**  \n> 在各种印刷品和参考文档中，“Game\
    \ Center”有时既指 Game Center API 的集合，也指 Game Center 应用本身。\n\n## 语音聊天\n\n苹果公司常称之为“Game\
    \ Voice”的功能，允许任何应用（不仅仅是游戏）通过网络连接提供语音通信，通常称为 VOIP。这些 API 负责处理用户音频输入的监听与回放，并提供处理连接、通信、错误和断连的服务。该技术将在第\
    \ 10 章中讨论。\n\n# 示例游戏：UFOs\n\n根据我的经验，大多数开发者都属于“体验型”学习者。这意味着他们通过动手实践而非观看或聆听来学习效果最佳。当我最初学习编程时，会从代码杂志中逐行将源代码抄写到\
    \ Commodore 64 上。我相信，正是这种逐行输入代码的亲身经历让知识得以牢固掌握。而听讲座或看别人写代码则让我难以记住大量信息。如果讲座和演示是我唯一的学习方式，我简直无法想象自己能坚持走这条职业道路。本书正是为其他体验型学习者量身打造的。\n\
    \n在深入 `GameKit` 之前，我们首先要处理的是附带的示例游戏。这个我们称之为“UFOs”的游戏，设计目标并非成为一款获奖连连、令人上瘾的游戏，而是简单到可以被视为任何一个通用项目。我已竭尽全力将代码量控制在\
    \ 300 行以内。尽管游戏本身很简单，但我认为每位读者都能像自己亲手编写的那样理解这些代码至关重要。这样，作为读者，你就能从项目本身抽离出来，专注于 `GameKit`\
    \ 特有的信息。我们将从体验游戏开始，然后查看源代码。\n\n> **注意**  \n> 所有章节的源代码以及示例项目均可从 [`www.apress.com`](http://www.apress.com)\
    \ 获取。\n\n## UFOs：理解游戏\n\n首先，你需要打开从 [apress.​com](http://apress.com) 下载的基础项目。图\
    \ 1-1 展示了项目的文件结构。我们快速运行一下游戏，看看它的样子。\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig1_HTML.jpg](img/216283_2_En_1_Fig1_HTML.jpg)\n\
    \n图 1-1：Finder 中显示的 UFO 示例项目的文件结构\n\n要运行游戏，请从“产品”菜单栏选择“运行”。游戏将启动并显示一个通用屏幕，上面只有一个标有“Play”的按钮。继续操作，选择“Play”按钮。你将进入游戏画面，如图\
    \ 1-2 所示；此画面可能根据你选择的测试设备略有不同。\n\n游戏目标既典型又简单：上下或左右倾斜设备，让你的飞船在屏幕上移动。当飞船定位到一头奶牛上方后，点击屏幕任意位置并按住，直到奶牛被劫持。每劫持一头奶牛，你将获得一分。和所有最棒的游戏一样，这款游戏没有结局，也无法“获胜”。每次你劫持一头奶牛，都会有一头新奶牛生成。\n\
    \n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig2_HTML.jpg](img/216283_2_En_1_Fig2_HTML.jpg)\n\
    \n图 1-2：UFOs 示例项目的游戏画面视图\n\n现在你已经了解了游戏玩法，可以看看实现这一切的源代码了。\n\n# UFOs：检查源代码\n\n在你的文件组树中，你会看到我们将要使用的四个类文件：`AppDelegate.swift`、`SceneDelegate.swift`、`GameViewController.swift`\
    \ 和 `HomeViewController.swift`。文件组树如图 1-3 所示。你还会注意到一个包含项目用户界面元素的 `Main.storyboard`\
    \ 文件。\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig3_HTML.jpg](img/216283_2_En_1_Fig3_HTML.jpg)\n\
    \n图 1-3：从 Xcode 中看到的示例项目的文件组树结构\n\n首先，查看 `AppDelegate.swift` 和 `SceneDelegate.swift`\
    \ 文件。这些文件应该会让你联想到其他 Swift 开发工作。它们只不过是基础的 `UIApplicationDelegate` 和 `UIWindowSceneDelegate`\
    \ 子类。如果你需要熟悉这里的代码，可以查看 Apple 为新项目提供的示例代码。\n\n下一组文件也相对简单：查看 `UFOViewController.h`\
    \ 和 `UFOViewController.m`。这些是与着陆屏或主屏幕关联的类。目前这里只有一个“Play”按钮，但随着本书的深入，我们将在此视图中添加排行榜、成就和多人游戏控件。\n\
    \n最后，我们将处理 `UFOGameViewController.m`。这是驱动所有游戏玩法的主类，并且大部分 `GameKit` 功能都将添加到这里。\n"
- fmt: '### Setting Up the Accelerometer Delegate


    The first thing our sample project needs to do is set itself up to detect accelerometer
    motion; the game will use this motion to move the players’ spaceship. This code
    is found at the top of the `GameViewController` file. Take a look at the following
    code snippet, which is discussed in detail next:


    ```

    private let motionManager = CMMotionManager()

    override func viewDidLoad() {

    super.viewDidLoad()

    motionManager.accelerometerUpdateInterval = 0.05

    motionManager.startAccelerometerUpdates(to: OperationQueue.current!) { (accelerometerData,
    error) in

    self.motionOccurred(with: accelerometerData ?? CMAccelerometerData())

    if error != nil {

    print(error.debugDescription)

    }

    }

    }

    ```


    The first thing we do is set `motionManager` to `CMMotionManager()`; this gives
    us a handy reference back to the main `CMMotionManager`. Next, `viewDidLoad` is
    overrode and code is added to set the accelerometer to test for new motion data
    every 1/20th of a second and then to call `motionOccurred` with the updated data,
    which we will discuss shortly. If there are any errors, they are then printed
    to the console.


    Next, take a look at the additional variable definitions. Let’s break this down
    into sections to understand exactly what is going on here:


    ```

    private var movementSpeed = 15.0

    private var accelerometerDamp = 0.3

    private var accelerometer0Angle = 0.6

    ```


    Here we set some class variables to hold onto some data that we will need when
    we begin to process the accelerometer input. We will be working with these variables
    again when we start to deal with ship movement. For now, you don’t need to understand
    exactly what they are doing, just that they have been set.


    ### Drawing the Player to the View


    Next, we need to create our “player.” At the top of the class file, you will find
    a definition for the `playerImageView` in which a share and initial starting position
    is first defined.


    ```

    private let myPlayerImageView = UIImageView(frame: CGRect(x: 100, y: 70, width:
    80, height: 34))

    ```


    Shifting our focus back into the `viewDidLoad` function, you will find the following
    additional code snippet:


    ```

    myPlayerImageView.animationDuration = 0.75

    myPlayerImageView.animationImages = [

    UIImage(named: "Saucer1")!,

    UIImage(named: "Saucer2")!

    ]

    myPlayerImageView.startAnimating()

    view.addSubview(myPlayerImageView)

    ```


    The next four lines of code are a little-known but very useful part of `UIImageView`.
    We are setting an array of images that the `UIImageView` will cycle through. In
    this example, we are setting two images to be rotated through. We also specify
    how long we want the full animation to take (3/4 of a second for our purposes)
    and the number of times we want the animation to repeat. Once we have set up the
    animation details, we call `startAnimating()` on the `myPlayerImageView` `UIImageView`.
    Then, all that is left for us to do is add the `UIImageView` subview to the main
    view. Now we have a player on the screen that is animating!


    ### Setting Up Cows, Beams, and Scores


    We have some objects to initialize and need to set up our score label.


    ```

    private var cows: [UIImageView] = []

    private let tractorBeamImageView = UIImageView()

    private var score = 0

    ```


    Once the variables are set up, we can once again turn our attention to the `viewDidLoad`
    function and set the score variable we just defined to a label that was created
    in the interface file.


    ```

    scoreLabel.text = formatted(score: score)

    for _ in 0..<7 { spawnCow() }

    updateCowPaths()

    ```


    The last thing we need to do in our `viewDidLoad` function is create some cows
    for placement on the screen. I have created a helper function to spawn these cows.
    Every time it is called, it will create a new cow and place it on the screen.
    We will take a look at this a little later in this section. We also call another
    helper function to update the walking path for the cows. Again, we will look at
    this function in more detail later.


    ### Adding Player Movements


    That takes care of all our initialization and setup code. Now we can move into
    the more exciting parts of the game. First, we look at user input and actions
    and then the gameplay functionality.


    ```

    func movePlayer(_ vertical: Double, _ horizontal: Double) {

    var vertical = vertical

    var horizontal = horizontal

    vertical += accelerometer0Angle

    if vertical > 0.50 {

    vertical = 0.50

    } else if vertical < -0.50 {

    vertical = -0.50

    }

    if horizontal > 0.50 {

    horizontal = 0.50

    } else if horizontal < -0.50 {

    horizontal = -0.50

    }

    if (vertical < 0 && (playerFrame?.origin.y ?? 0.0) < 500) || (vertical > 0 &&
    (playerFrame?.origin.y ?? 0.0) > 20) {

    playerFrame?.origin.y -= CGFloat(vertical * movementSpeed)

    }

    if (horizontal < 0 && (playerFrame?.origin.x ?? 0.0) < 300) || (horizontal > 0
    && (playerFrame?.origin.x ?? 0.0) > 0) {

    playerFrame?.origin.x -= CGFloat(horizontal * movementSpeed)

    }

    myPlayerImageView?.frame = playerFrame ?? CGRect.zero

    }

    ```


    The preceding function is much simpler than first glance would imply. The first
    chunk of code sets our maximum speed; we don’t want the player to be flying around
    the screen too fast. The next section of code ensures that the user cannot move
    their UFO off the screen. Once we have checked both of these safety nets, we update
    the player’s frame and move the UFO.'
