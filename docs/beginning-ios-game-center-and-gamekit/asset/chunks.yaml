- fmt: "# Recurring Leaderboards\n\nApple has recently expanded the capabilities of\
    \ leaderboards to allow time-limited leaderboards, referred to as recurring leaderboards.\
    \ These are added just like a classic leaderboard, except the option for recurring\
    \ is selected when prompted. A recurring leaderboard will feature three new options.\
    \ The first is the date and time that the leaderboard will first become available\
    \ to the user, the second is a duration that the leaderboard will be available\
    \ for, and finally a delay for the leaderboard to reset and become available again.\
    \ Referring to Figure [3-6](#216283_2_En_3_Chapter.xhtml#Fig6), a new leaderboard\
    \ will appear beginning June 7, 2021, and will collect scores for 24 hours; every\
    \ 7 days the leaderboard will reset all of its scores and become available for\
    \ another 24-hour period.\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig6_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6\n\nCreating a recurring leaderboard\n\n# Posting a Score\n\nBefore\
    \ a leaderboard provides any useful functionality, we need to populate it with\
    \ some score data. We begin this process by modifying our `GameCenterManager`\
    \ class once again. Add the following function to the implementation; it should\
    \ look very familiar as it follows the same pattern that we used when we implemented\
    \ the authentication methods:\n\n```\nfunc reportScore(_ score: Int, forCategory\
    \ category: String) {\n    GKLeaderboard.submitScore(score, context: 0, player:\
    \ GKLocalPlayer.local, leaderboardIDs: [category]) { [weak self] error in\n  \
    \      if let error = error {\n            print(\"An error occurred while submitting\
    \ a score. Data will be saved to UserDefaults: \\(error.localizedDescription)\"\
    )\n            let savedScore = SavedScore(score: score, category: category)\n\
    \            self?.storeScoreForLater(savedScore)\n        }\n        DispatchQueue.main.async\
    \ { [weak self] in\n            self?.gameDelegate?.scoreReported(error)\n   \
    \     }\n    }\n}\n```\n\nThis new method takes an integer for the score and a\
    \ `GKLeaderboard` object. The date and user values are already set for us by the\
    \ API. When `submitScore` is called on the `GKLeaderboard`, it accepts the score,\
    \ a player context, and the player that is submitting the score, which should\
    \ always be the local player.\n\nThis concludes all of the required modifications\
    \ to our `GameCenterManager` class. We can now turn our focus back to the game\
    \ itself. We will need to first implement some new gameplay dynamics to handle\
    \ high scores.\n\n## Adding Score Posting to UFOs\n\nThere are two obvious ways\
    \ that we can score in our UFOs game. Firstly, we could implement a system that\
    \ counted how many cows were abducted and submit that as the score. Although this\
    \ approach is the easiest to implement for us, it is not a very fun gameplay technique\
    \ because there is no logical point at which the game ends. Secondly, high-score\
    \ method is harder to implement but makes more sense. It clocks how long the user\
    \ took to abduct ten cows; the user with the lowest time is the winner.\n\nThese\
    \ are topics that must be carefully considered for your own app; sometimes the\
    \ most straightforward approach to high scores isn’t the most fun for the user.\
    \ For the purpose of this book, we will demonstrate the first method in which\
    \ the number of cows abducted is the user’s score. If you were going to implement\
    \ a timer-based system, the approach is very similar: you would start a timer\
    \ at the beginning of the round, and when ten cows are abducted, you would submit\
    \ the time in seconds on the timer.\n\nIn order to implement this score-based\
    \ system, we need to add a way for the player to end a game. In an actual game,\
    \ this could be handled by something being able to kill your player, or a time\
    \ limit. However, for the purpose of this example, we will simply add an exit\
    \ button. This will allow the user to simulate a game-over event while keeping\
    \ the code Game Center–focused without adding extra complexity.\n\nWe add an exit\
    \ button in `UFOGameViewController.xib`, as shown in Figure [3-7](#216283_2_En_3_Chapter.xhtml#Fig7).\
    \ We will need to create a new `IBAction` for the exit button as well. Add the\
    \ following code to `UFOGameViewController`, and connect our exit button to it.\
    \ For the time being, we will just pop the navigation controller back to the root\
    \ view:\n\n```\n@IBAction func exitAction(_ sender: Any) {\n    navigationController?.popViewController(animated:\
    \ true)\n}\n```\n\n**Note:** You are not required to wait until the end of a game\
    \ to submit a new score, but it is generally thought of as good practice. You\
    \ want to avoid submitting a new score multiple times per game if it can be prevented.\n\
    \nA notable exception might be a continuous role-playing game in which the score\
    \ continually updates, and there is no proper ending to submit a score during\
    \ the game.\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig7_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig7_HTML.jpg)\n\
    \nFigure 3-7\n\nAdding the ability to exit the game so a high score can be submitted\n\
    \nThe only remaining step is to actually submit the score to Game Center; if you\
    \ recall, we have already written the method to handle this in our `GameCenterManager`\
    \ class. We already have an instance of our `GameCenterManager` class that we\
    \ used in `UFOViewController` to authenticate the user.\n\nWe will also modify\
    \ the `exitAction` method to just submit the score. To do so, replace the old\
    \ `exitAction` function with the following. Notice how we are using the leaderboard\
    \ ID that we set in App Store Connect; make sure to use the same one that you\
    \ entered, as it will probably not match this example:\n\n```\n@IBAction func\
    \ exitAction(_ sender: Any) {\n    navigationController?.popViewController(animated:\
    \ true)\n    gcManager?.reportScore(Int64(score), forCategory: \"com.dragonforged.ufo.single\"\
    )\n}\n```\n\nWhen you now play and click Exit, you should see a console message\
    \ that looks similar to the following output:\n\n```\n2011-02-10 12:32:47.629\
    \ UFOs[15092:207] Score submitted\n```\n\n> **Tip:** See the section, “A Better\
    \ Approach,” at the end of this chapter for a more complex, but user-friendly,\
    \ approach to submitting scores.\n\nNow that we have a score submitted to a leaderboard,\
    \ in the following sections, we will learn how to present this data back to the\
    \ user. This action has been greatly simplified for the purpose of making this\
    \ section as easy to learn as possible. This will not be the user experience you\
    \ want to present to your user; we are simply trapping the user in the game screen\
    \ while we wait for a network callback. In reality, you will want to handle the\
    \ delegate callback in the previous view. This ensures the user is not waiting\
    \ when they do not have to be. For simplicity’s sake, we will continue to use\
    \ the easier-to-follow methodology.\n\n> **Tip:** You can only have one score\
    \ posted per leaderboard category for each player. You might notice that the scores\
    \ that you are submitting never appear on the leaderboard. If you are noticing\
    \ this behavior, make sure that the score you are submitting is higher than the\
    \ highest score for that player."
  raw: '## Recurring Leaderboards


    Apple has recently expanded the capabilities of leaderboards to allow time-limited
    leaderboards, referred to as recurring leaderboards. These are added just like
    a classic leaderboard, except the option for recurring is selected when prompted.
    A recurring leaderboard will feature three new options. The first is the date
    and time that the leaderboard will first become available to the user, the second
    is a duration that the leaderboard will be available for, and finally a delay
    for the leaderboard to reset and become available again. Referring to Figure [3-6](#216283_2_En_3_Chapter.xhtml#Fig6),
    a new leaderboard will appear beginning June 7, 2021, and will collect scores
    for 24 hours; every 7 days the leaderboard will reset all of its scores and become
    available for another 24-hour period.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig6_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig6_HTML.jpg)


    Figure 3-6


    Creating a recurring leaderboard


    ## Posting a Score


    Before a leaderboard provides any useful functionality, we need to populate it
    with some score data. We begin this process by modifying our GameCenterManager
    class once again. Add the following function to the implementation; it should
    look very familiar as it follows the same pattern that we used when we implemented
    the authentication methods:


    ```

    func reportScore(_ score: Int, forCategory category: String) {

    GKLeaderboard.submitScore(score, context: 0, player: GKLocalPlayer.local, leaderboardIDs:
    [category]) { [weak self] error in

    if let error = error {

    print("An error occurred while submitting a score. Data will be saved to UserDefaults:
    \(error.localizedDescription)")

    let savedScore = SavedScore(score: score, category: category)

    self?.storeScoreForLater(savedScore)

    }

    DispatchQueue.main.async { [weak self] in

    self?.gameDelegate?.scoreReported(error)

    }

    }

    }

    ```


    This new method takes an integer for the score and a GKLeaderboard object. The
    date and user values are already set for us by the API. When submitScore is called
    on the GKLeaderboard, it accepts the score, a player context, and the player that
    is submitting the score, which should always be the local player.


    This concludes all of the required modifications to our GameCenterManager class.
    We can now turn our focus back to the game itself. We will need to first implement
    some new gameplay dynamics to handle high scores.


    ## Adding Score Posting to UFOs


    There are two obvious ways that we can score in our UFOs game. Firstly, we could
    implement a system that counted how many cows were abducted and submit that as
    the score. Although this approach is the easiest to implement for us, it is not
    a very fun gameplay technique because there is no logical point at which the game
    ends. Secondly, high-score method is harder to implement but makes more sense.
    It clocks how long the user took to abduct ten cows; the user with the lowest
    time is the winner.


    These are topics that must be carefully considered for your own app; sometimes
    the most straightforward approach to high scores isn’t the most fun for the user.
    For the purpose of this book, we will demonstrate the first method in which the
    number of cows abducted is the user’s score. If you were going to implement a
    timer-based system, the approach is very similar: you would start a timer at the
    beginning of the round, and when ten cows are abducted, you would submit the time
    in seconds on the timer.


    In order to implement this score-based system, we need to add a way for the player
    to end a game. In an actual game, this could be handled by something being able
    to kill your player, or a time limit. However, for the purpose of this example,
    we will simply add an exit button. This will allow the user to simulate a game-over
    event while keeping the code Game Center–focused without adding extra complexity.


    We add an exit button in UFOGameViewController.xib, as shown in Figure [3-7](#216283_2_En_3_Chapter.xhtml#Fig7).
    We will need to create a new IBAction for the exit button as well. Add the following
    code to UFOGameViewController, and connect our exit button to it. For the time
    being, we will just pop the navigation controller back to the root view:


    ```

    @IBAction func exitAction(_ sender: Any) {

    navigationController?.popViewController(animated: true)

    }

    ```


    Note


    You are not required to wait until the end of a game to submit a new score, but
    it is generally thought of as good practice. You want to avoid submitting a new
    score multiple times per game if it can be prevented.


    A notable exception might be a continuous role-playing game in which the score
    continually updates, and there is no proper ending to submit a score during the
    game.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig7_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig7_HTML.jpg)


    Figure 3-7


    Adding the ability to exit the game so a high score can be submitted


    The only remaining step is to actually submit the score to Game Center; if you
    recall, we have already written the method to handle this in our GameCenterManager
    class. We already have an instance of our GameCenterManager class that we used
    in UFOViewController to authenticate the user.


    We will also modify the exitAction method to just submit the score. To do so,
    replace the old exitAction function with the following. Notice how we are using
    the leaderboard ID that we set in App Store Connect; make sure to use the same
    one that you entered, as it will probably not match this example:


    ```

    @IBAction func exitAction(_ sender: Any) {

    navigationController?.popViewController(animated: true)

    gcManager?.reportScore(Int64(score), forCategory: "com.dragonforged.ufo.single")

    }

    ```


    When you now play and click Exit, you should see a console message that looks
    similar to the following output:


    ```

    2011-02-10 12:32:47.629 UFOs[15092:207] Score submitted

    ```


    Tip


    See the section, “A Better Approach,” at the end of this chapter for a more complex,
    but user-friendly, approach to submitting scores.


    Now that we have a score submitted to a leaderboard, in the following sections,
    we will learn how to present this data back to the user. This action has been
    greatly simplified for the purpose of making this section as easy to learn as
    possible. This will not be the user experience you want to present to your user;
    we are simply trapping the user in the game screen while we wait for a network
    callback. In reality, you will want to handle the delegate callback in the previous
    view. This ensures the user is not waiting when they do not have to be. For simplicity’s
    sake, we will continue to use the easier-to-follow methodology.


    Tip


    You can only have one score posted per leaderboard category for each player. You
    might notice that the scores that you are submitting never appear on the leaderboard.
    If you are noticing this behavior, make sure that the score you are submitting
    is higher than the highest score for that player.'
  trans: "\n# 周期性排行榜\n\n苹果最近扩展了排行榜功能，允许创建限时排行榜，称为周期性排行榜。它们的添加方式与经典排行榜相同，只是在提示时需选择周期性选项。周期性排行榜将新增三个选项：第一个是排行榜首次对用户可用的日期和时间，第二个是排行榜的有效持续时间，最后一个是排行榜重置并重新可用的延迟时间。参考图\
    \ 3-6，新排行榜将于 2021 年 6 月 7 日开始生效，并收集 24 小时的分数；每 7 天排行榜将重置所有分数，并在接下来的 24 小时内再次开放。\n\
    \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig6_HTML.jpg](img/216283_2_En_3_Fig6_HTML.jpg)\n\
    \n图 3-6\n\n创建周期性排行榜\n\n# 提交分数\n\n在排行榜提供任何实用功能之前，我们需要用一些分数数据来填充它。我们通过再次修改`GameCenterManager`类来开始这一过程。在实现中添加以下函数；它看起来应该非常熟悉，因为其遵循的模式与我们实现认证方法时使用的相同：\n\
    \n```\nfunc reportScore(_ score: Int, forCategory category: String) {\n    GKLeaderboard.submitScore(score,\
    \ context: 0, player: GKLocalPlayer.local, leaderboardIDs: [category]) { [weak\
    \ self] error in\n        if let error = error {\n            print(\"提交分数时发生错误。数据将保存到\
    \ UserDefaults：\\(error.localizedDescription)\")\n            let savedScore =\
    \ SavedScore(score: score, category: category)\n            self?.storeScoreForLater(savedScore)\n\
    \        }\n        DispatchQueue.main.async { [weak self] in\n            self?.gameDelegate?.scoreReported(error)\n\
    \        }\n    }\n}\n```\n\n这个新方法接收一个整数作为分数和一个`GKLeaderboard`对象。日期和用户值已由 API\
    \ 自动设置。当在`GKLeaderboard`上调用`submitScore`时，它接受分数、玩家上下文和提交分数的玩家（应始终是本地玩家）。\n\n至此，我们对`GameCenterManager`类的所有必要修改已完成。现在我们可以将注意力转回游戏本身。首先需要实现一些新的游戏机制来处理高分。\n\
    \n## 向 UFO 游戏添加分数提交功能\n\n在我们的 UFO 游戏中，有两种明显的计分方式。第一种是实现一个系统，统计被劫持的奶牛数量，并将其作为分数提交。虽然这种方法对我们来说最容易实现，但游戏体验并不有趣，因为游戏没有合理的结束点。第二种高分方法实现起来更复杂，但更有意义。它会记录用户劫持十头奶牛所用的时间；用时最短的用户获胜。\n\
    \n对于你自己的应用来说，这些是需要仔细考虑的主题；有时最直接的高分方法对用户来说并不有趣。为本书的目的，我们将演示第一种方法，即被劫持的奶牛数量作为用户分数。如果你要实现一个基于计时器的系统，方法非常相似：在回合开始时启动计时器，当十头奶牛被劫持后，提交计时器上的秒数作为分数。\n\
    \n为了实现这个基于分数的系统，我们需要增加玩家结束游戏的途径。在实际游戏中，这可以通过角色死亡或时间限制来实现。但为示例起见，我们只需添加一个退出按钮。这将允许用户模拟游戏结束事件，同时保持代码专注于\
    \ Game Center 而不增加额外复杂性。\n\n我们在`UFOGameViewController.xib`中添加一个退出按钮，如图 3-7 所示。我们还需要为退出按钮创建新的`IBAction`。将以下代码添加到`UFOGameViewController`中，并将退出按钮连接到它。暂时，我们只需让导航控制器返回到根视图：\n\
    \n```\n@IBAction func exitAction(_ sender: Any) {\n    navigationController?.popViewController(animated:\
    \ true)\n}\n```\n\n**注意：** 你不必等到游戏结束才提交新分数，但通常认为这是好习惯。如果可能，应避免在游戏中多次提交新分数。\n\n\
    一个明显的例外可能是连续的角色扮演游戏，其中分数不断更新，且没有合适的结束点来提交分数。\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig7_HTML.jpg](img/216283_2_En_3_Fig7_HTML.jpg)\n\
    \n图 3-7\n\n添加退出游戏功能以便提交高分\n\n剩下的最后一步是实际向 Game Center 提交分数；你可能还记得，我们已经在`GameCenterManager`类中编写了处理此操作的方法。我们已在`UFOViewController`中使用了`GameCenterManager`类的实例来认证用户。\n\
    \n我们还需要修改`exitAction`方法以便直接提交分数。为此，用以下代码替换旧的`exitAction`函数。注意我们使用的是在 App Store\
    \ Connect 中设置的排行榜 ID；请确保使用你输入的那个 ID，因为它很可能与示例不匹配：\n\n```\n@IBAction func exitAction(_\
    \ sender: Any) {\n    navigationController?.popViewController(animated: true)\n\
    \    gcManager?.reportScore(Int64(score), forCategory: \"com.dragonforged.ufo.single\"\
    )\n}\n```\n\n现在当你运行游戏并点击退出时，应该会看到类似以下输出的控制台信息：\n\n```\n2011-02-10 12:32:47.629\
    \ UFOs[15092:207] Score submitted\n```\n\n> **提示：** 关于更复杂但用户友好的分数提交方法，请参见本章末尾的“更好的方法”一节。\n\
    \n现在我们已经向排行榜提交了分数，在接下来的章节中，我们将学习如何将这些数据呈现给用户。为了尽可能简化本节内容，此操作已大大简化。这并非你希望为用户提供的用户体验；我们只是在等待网络回调时将用户困在游戏画面中。实际上，你需要在之前的视图中处理委托回调。这可以确保用户在无需等待时不会等待。为简单起见，我们将继续使用更易理解的方法。\n\
    \n> **提示：** 每个玩家在每个排行榜类别中只能提交一个分数。你可能会注意到提交的分数从未出现在排行榜上。如果遇到这种情况，请确保你提交的分数高于该玩家的最高分数。\n"
- fmt: "# Handling Failures When Submitting a Score\n\nIf a score fails to submit,\
    \ you as the developer are solely responsible for storing the score and resubmitting\
    \ it when the error has been resolved. Nothing is more frustrating to a user than\
    \ earning a new high score and losing it due to a network failure or even a crash.\
    \ This is also a step that Apple likes to test for during app reviews, so keep\
    \ in mind you may have a rejection if you fail to implement it properly.\n\nThere\
    \ are many different ways to store the score information for resubmitting it later;\
    \ however, I feel that the following approach is the easiest for the novice to\
    \ implement. Feel free to implement your own system if you feel that the provided\
    \ one does not suit the needs of your app.\n\nThere are three steps that need\
    \ to be completed to handle and recover from a score submitting failure. The first\
    \ step is to save the score data. Although we do not inform the user of the failure\
    \ in this example, it is a good idea to notify the user that their score could\
    \ not be submitted at this time and that you will automatically retry later. Modify\
    \ the following function in `GameCenterManager` to match the following code:\n\
    \n```\nstatic func reportScore(score: Int, to leaderboard: GKLeaderboard, using\
    \ context: Int, completion: ((Error?) -> ())?) {\n    leaderboard.submitScore(score,\
    \ context: context, player: GKLocalPlayer.local) { (error) in\n        if error\
    \ != nil {\n            self.storeScoreForLater(\n                with: StoredScore(\n\
    \                    score: score,\n                    leaderboardId: leaderboard.baseLeaderboardID,\n\
    \                    context: context,\n                    playerId: GKLocalPlayer.local.gamePlayerID\n\
    \                )\n            )\n        }\n        if let completion = completion\
    \ {\n            completion(error)\n        }\n    }\n}\n```\n\nWe have added\
    \ a few additional lines of code that will run if an error is detected; if it\
    \ is, then the `NSData` from the `GKScore` is captured and saved. We will later\
    \ retrieve the `GKScore` from this `NSData`. We also call a new function that\
    \ we have named `storeScoreForLater`. Let’s take a look at that function now;\
    \ add the following function to the implementation of the `GameCenterManager`\
    \ class:\n\n```\nprivate static func storeScoreForLater(with score: StoredScore)\
    \ {\n    var savedScores: [StoredScore] = []\n    if let data = UserDefaults.standard.data(forKey:\
    \ savedScoresKey) {\n        savedScores = (try? JSONDecoder().decode([StoredScore].self,\
    \ from: data)) ?? []\n    }\n    savedScores.append(score)\n    UserDefaults.standard.setValue(try?\
    \ JSONEncoder().encode(savedScores), forKey: savedScoresKey)\n}\n```\n\nThis snippet\
    \ of code will save the `NSData` that represents our score to the user defaults.\
    \ You could also write this data to a file or even store it in core data. Never\
    \ assume the user has only one unsubmitted score; they may have racked up a number\
    \ of scores across many different leaderboards while playing offline.\n\nWe caught\
    \ a posting failure as well as saved the score to disk to be retried later. The\
    \ last remaining step is to attempt to resubmit the score to Game Center. This\
    \ step can be very complex, depending on how intelligent you want the system to\
    \ be. Most failures of score submissions are related to network access issues\
    \ but could also be caused by Game Center being down or even a DNS issue.\n\n\
    There is no correct answer as to when to repost a score, but the guideline is\
    \ that you don’t want to hold on to a score that could be submitted. Before we\
    \ worry about where to tie in the method to resubmit failed scores, let’s first\
    \ implement a method to retry a score posting. Add the following method to your\
    \ `GameCenterManager` class:\n\n```\nfunc submitAllSavedScores() {\n    let defaults\
    \ = UserDefaults.standard\n    if let savedScoresData = defaults.data(forKey:\
    \ Self.savedScoresKey) {\n        defaults.removeObject(forKey: Self.savedScoresKey)\n\
    \        if let savedScores = try? JSONDecoder().decode([SavedScore].self, from:\
    \ savedScoresData) {\n            savedScores.forEach { savedScore in\n      \
    \          GKLeaderboard.submitScore(savedScore.score, context: 0, player: GKLocalPlayer.local,\
    \ leaderboardIDs: [savedScore.category]) { [weak self] error in\n            \
    \        if let error = error {\n                        print(\"An error occurred\
    \ while submitting a score. Data will be saved to UserDefaults: \\(error.localizedDescription)\"\
    )\n                        self?.storeScoreForLater(savedScore)\n            \
    \        } else {\n                        print(\"Saved score submitted\")\n\
    \                    }\n                }\n            }\n        }\n    }\n}\n\
    ```\n\nThe preceding code will loop through all of the saved scores and attempt\
    \ to resubmit them. We simply log any successes and failures to add back to our\
    \ array of non-submitted scores for retrying again later.\n\nAs mentioned earlier,\
    \ there are dozens of ways to tie back in resubmitting failed scores. To keep\
    \ it simple, we add a call to the `submitAllSavedScores` after we properly authenticate\
    \ with Game Center. Modify the `authenticateLocalUser` method of `GameCenterManager`\
    \ to match the following:\n\n```\nstatic func authenticateLocalUser(completion:\
    \ ((UIViewController?, Error?) -> ())?) {\n    guard GKLocalPlayer.local.authenticateHandler\
    \ == nil else {\n        return\n    }\n    GKLocalPlayer.local.authenticateHandler\
    \ = { (viewController, error) in\n        if error != nil {\n            if let\
    \ completion = completion {\n                completion(nil, error)\n        \
    \        return\n            }\n        } else {\n            if let completion\
    \ = completion, let viewController = viewController {\n                completion(viewController,\
    \ nil)\n            }\n            self.submitAllSavedScores()\n        }\n  \
    \  }\n}\n```"
  raw: '## Handling Failures When Submitting a Score


    If a score fails to submit, you as the developer are solely responsible for storing
    the score and resubmitting it when the error has been resolved. Nothing is more
    frustrating to a user than earning a new high score and losing it due to a network
    failure or even a crash. This is also a step that Apple likes to test for during
    app reviews, so keep in mind you may have a rejection if you fail to implement
    it properly.


    There are many different ways to store the score information for resubmitting
    it later; however, I feel that the following approach is the easiest for the novice
    to implement. Feel free to implement your own system if you feel that the provided
    one does not suit the needs of your app.


    There are three steps that need to be completed to handle and recover from a score
    submitting failure. The first step is to save the score data. Although we do not
    inform the user of the failure in this example, it is a good idea to notify the
    user that their score could not be submitted at this time and that you will automatically
    retry later. Modify the following function in GameCenterManager to match the following
    code:


    ```

    static func reportScore(score: Int, to leaderboard: GKLeaderboard, using context:
    Int, completion: ((Error?) -> ())?) {

    leaderboard.submitScore(score, context: context, player: GKLocalPlayer.local)
    { (error) in

    if error != nil {

    self.storeScoreForLater(

    with: StoredScore(

    score: score,

    leaderboardId: leaderboard.baseLeaderboardID,

    context: context,

    playerId: GKLocalPlayer.local.gamePlayerID

    )

    )

    }

    if let completion = completion {

    completion(error)

    }

    }

    }

    ```


    We have added a few additional lines of code that will run if an error is detected;
    if it is, then the NSData from the GKScore is captured and saved. We will later
    retrieve the GKScore from this NSData. We also call a new function that we have
    named storeScoreForLater. Let’s take a look at that function now; add the following
    function to the implementation of the GameCenterManager class:


    ```

    private static func storeScoreForLater(with score: StoredScore) {

    var savedScores: [StoredScore] = []

    if let data = UserDefaults.standard.data(forKey: savedScoresKey) {

    savedScores = (try? JSONDecoder().decode([StoredScore].self, from: data)) ?? []

    }

    savedScores.append(score)

    UserDefaults.standard.setValue(try? JSONEncoder().encode(savedScores), forKey:
    savedScoresKey)

    }

    ```


    This snippet of code will save the NSData that represents our score to the user
    defaults. You could also write this data to a file or even store it in core data.
    Never assume the user has only one unsubmitted score; they may have racked up
    a number of scores across many different leaderboards while playing offline.


    We caught a posting failure as well as saved the score to disk to be retried later.
    The last remaining step is to attempt to resubmit the score to Game Center. This
    step can be very complex, depending on how intelligent you want the system to
    be. Most failures of score submissions are related to network access issues but
    could also be caused by Game Center being down or even a DNS issue.


    There is no correct answer as to when to repost a score, but the guideline is
    that you don’t want to hold on to a score that could be submitted. Before we worry
    about where to tie in the method to resubmit failed scores, let’s first implement
    a method to retry a score posting. Add the following method to your GameCenterManager
    class:


    ```

    func submitAllSavedScores() {

    let defaults = UserDefaults.standard

    if let savedScoresData = defaults.data(forKey: Self.savedScoresKey) {

    defaults.removeObject(forKey: Self.savedScoresKey)

    if let savedScores = try? JSONDecoder().decode([SavedScore].self, from: savedScoresData)
    {

    savedScores.forEach { savedScore in

    GKLeaderboard.submitScore(savedScore.score, context: 0, player: GKLocalPlayer.local,
    leaderboardIDs: [savedScore.category]) { [weak self] error in

    if let error = error {

    print("An error occurred while submitting a score. Data will be saved to UserDefaults:
    \(error.localizedDescription)")

    self?.storeScoreForLater(savedScore)

    } else {

    print("Saved score submitted")

    }

    }

    }

    }

    }

    }

    ```


    The preceding code will loop through all of the saved scores and attempt to resubmit
    them. We simply log any successes and failures to add back to our array of non-submitted
    scores for retrying again later.


    As mentioned earlier, there are dozens of ways to tie back in resubmitting failed
    scores. To keep it simple, we add a call to the submitAllSavedScores after we
    properly authenticate with Game Center. Modify the authenticateLocalUser method
    of GameCenterManager to match the following:


    ```

    static func authenticateLocalUser(completion: ((UIViewController?, Error?) ->
    ())?) {

    guard GKLocalPlayer.local.authenticateHandler == nil else {

    return

    }

    GKLocalPlayer.local.authenticateHandler = { (viewController, error) in

    if error != nil {

    if let completion = completion {

    completion(nil, error)

    return

    }

    } else {

    if let completion = completion, let viewController = viewController {

    completion(viewController, nil)

    }

    self.submitAllSavedScores()

    }

    }

    ```'
  trans: "\n# 处理提交分数时的失败情况\n\n如果分数提交失败，作为开发者的您需要全权负责存储该分数，并在错误解决后重新提交。没有什么比用户取得新高分却因网络故障甚至崩溃而丢失更令人沮丧的了。这也是苹果在应用审核时喜欢测试的一个环节，因此请记住，如果您未能妥善实现，可能会被拒绝。\n\
    \n存储分数信息以便后续重新提交的方法有很多种；不过，我认为以下方法对于新手来说是最容易实现的。如果您认为提供的方法不适合您的应用需求，请随意实现您自己的系统。\n\
    \n要处理并从分数提交失败中恢复，需要完成三个步骤。第一步是保存分数数据。虽然在此示例中我们不会通知用户失败，但建议告知用户其分数当前无法提交，并说明您稍后将自动重试。请修改`GameCenterManager`中的以下函数，使其与以下代码一致：\n\
    \n```\nstatic func reportScore(score: Int, to leaderboard: GKLeaderboard, using\
    \ context: Int, completion: ((Error?) -> ())?) {\n    leaderboard.submitScore(score,\
    \ context: context, player: GKLocalPlayer.local) { (error) in\n        if error\
    \ != nil {\n            self.storeScoreForLater(\n                with: StoredScore(\n\
    \                    score: score,\n                    leaderboardId: leaderboard.baseLeaderboardID,\n\
    \                    context: context,\n                    playerId: GKLocalPlayer.local.gamePlayerID\n\
    \                )\n            )\n        }\n        if let completion = completion\
    \ {\n            completion(error)\n        }\n    }\n}\n```\n\n我们添加了几行额外的代码，当检测到错误时会运行；如果检测到错误，则捕获并保存`GKScore`中的`NSData`。稍后我们将从该`NSData`中检索`GKScore`。我们还调用了一个名为`storeScoreForLater`的新函数。现在让我们看看这个函数；请将以下函数添加到`GameCenterManager`类的实现中：\n\
    \n```\nprivate static func storeScoreForLater(with score: StoredScore) {\n   \
    \ var savedScores: [StoredScore] = []\n    if let data = UserDefaults.standard.data(forKey:\
    \ savedScoresKey) {\n        savedScores = (try? JSONDecoder().decode([StoredScore].self,\
    \ from: data)) ?? []\n    }\n    savedScores.append(score)\n    UserDefaults.standard.setValue(try?\
    \ JSONEncoder().encode(savedScores), forKey: savedScoresKey)\n}\n```\n\n这段代码会将表示分数的`NSData`保存到用户默认设置中。您也可以将这些数据写入文件，甚至存储在\
    \ Core Data 中。切勿假设用户只有一个未提交的分数；他们在离线游戏时，可能会在多个不同的排行榜上累积许多分数。\n\n我们已经捕获了发布失败的情况，并将分数保存到磁盘以供稍后重试。剩下的最后一步是尝试将分数重新提交到\
    \ Game Center。这一步可能非常复杂，具体取决于您希望系统有多智能。大多数分数提交失败的问题与网络访问有关，但也可能由 Game Center 宕机甚至\
    \ DNS 问题引起。\n\n关于何时重新提交分数并没有标准答案，但原则是不要让可以提交的分数被搁置。在考虑将重试失败分数的方法挂接在何处之前，我们先来实现一个重试分数发布的方法。请将以下方法添加到您的`GameCenterManager`类中：\n\
    \n```\nfunc submitAllSavedScores() {\n    let defaults = UserDefaults.standard\n\
    \    if let savedScoresData = defaults.data(forKey: Self.savedScoresKey) {\n \
    \       defaults.removeObject(forKey: Self.savedScoresKey)\n        if let savedScores\
    \ = try? JSONDecoder().decode([SavedScore].self, from: savedScoresData) {\n  \
    \          savedScores.forEach { savedScore in\n                GKLeaderboard.submitScore(savedScore.score,\
    \ context: 0, player: GKLocalPlayer.local, leaderboardIDs: [savedScore.category])\
    \ { [weak self] error in\n                    if let error = error {\n       \
    \                 print(\"提交分数时发生错误。数据将保存到 UserDefaults：\\(error.localizedDescription)\"\
    )\n                        self?.storeScoreForLater(savedScore)\n            \
    \        } else {\n                        print(\"已提交保存的分数\")\n             \
    \       }\n                }\n            }\n        }\n    }\n}\n```\n\n上述代码将遍历所有已保存的分数，并尝试重新提交它们。我们只是简单地记录成功和失败的情况，以便将失败的分数重新添加到未提交分数数组中，供稍后再次重试。\n\
    \n如前所述，有很多方法可以挂接重试失败分数的逻辑。为简单起见，我们在成功通过 Game Center 进行身份验证后，添加对`submitAllSavedScores`的调用。请修改`GameCenterManager`的`authenticateLocalUser`方法，使其与以下代码一致：\n\
    \n```\nstatic func authenticateLocalUser(completion: ((UIViewController?, Error?)\
    \ -> ())?) {\n    guard GKLocalPlayer.local.authenticateHandler == nil else {\n\
    \        return\n    }\n    GKLocalPlayer.local.authenticateHandler = { (viewController,\
    \ error) in\n        if error != nil {\n            if let completion = completion\
    \ {\n                completion(nil, error)\n                return\n        \
    \    }\n        } else {\n            if let completion = completion, let viewController\
    \ = viewController {\n                completion(viewController, nil)\n      \
    \      }\n            self.submitAllSavedScores()\n        }\n    }\n}\n```\n"
- fmt: "# Presenting a Leaderboard\n\nNow that we have a leaderboard configured in\
    \ App Store Connect, and populated a score into that leaderboard, it is time to\
    \ present the leaderboard to the user. There are two ways of presentation: the\
    \ first is with Apple’s GUI; the second is with a custom GUI. This section will\
    \ take a look at the implementation using Apple’s GUI. In the next section, you\
    \ will learn how to present a leaderboard with custom graphics by accessing the\
    \ raw data for the leaderboard directly.\n\nBefore we can begin, we need to create\
    \ a new button that will trigger the leaderboard. We want to do this outside of\
    \ the game screen because you do not want to drag the user away from a game in\
    \ progress to view a leaderboard. Begin by adding a new button to the `UFOViewController`\
    \ view, as shown in Figure 3-8.\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig8_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig8_HTML.jpg)\n\
    \n*Figure 3-8 – Adding a leaderboard button*\n\nHook up the button to a new action\
    \ that matches the one shown next. When leaderboards were first introduced into\
    \ Game Center, it was required to set up which leaderboard you wanted to launch\
    \ to. In more recent versions of Game Center, the leaderboards share a combined\
    \ Leaderboard interface in which the user can navigate to whatever leaderboard\
    \ they want to view.\n\n```swift\n@IBAction func leaderboardButtonTapped(sender:\
    \ UIButton) {\n    let leaderboardController = GKGameCenterViewController(state:\
    \ .leaderboards)\n    leaderboardController.gameCenterDelegate = self\n    present(leaderboardController,\
    \ animated: true)\n}\n```\n\nWhen you run the program and click the newly added\
    \ Leaderboard button, the result should look similar to the image in Figure 3-9.\
    \ It is worth noting that while the underlying APIs for GameKit and Game Center\
    \ aren’t updated with great frequency, the UI that Apple uses to represent Game\
    \ Center changes rapidly and frequently. Not only does the interface change, but\
    \ some of the navigation has changed in the past as well. For example, in the\
    \ original versions of leaderboards, the user would be presented directly to the\
    \ leaderboards for the game they were accessing; in the current implementation,\
    \ the user is taken to an overview section of leaderboards for the current game.\n\
    \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig9_HTML.png](images/216283_2_En_3_Chapter/216283_2_En_3_Fig9_HTML.png)\n\
    \n*Figure 3-9 – A leaderboard being presented using Apple’s GUI*\n\nThe GUI provides\
    \ a back button to take us to a list of all the leaderboards (see initial view\
    \ in Figure 3-10) that we have configured for the app. If you omit entering a\
    \ category when you create the `GKLeaderboardViewController` instance, you will\
    \ be presented with whatever leaderboard has been selected as the default leaderboard\
    \ in App Store Connect.\n\nThis is all there is to creating and presenting a leaderboard\
    \ using Apple’s GUI. In the next section, we will look at how to customize a leaderboard\
    \ to match your own GUI.\n\n> **Note**\n> Remember that you cannot access any\
    \ Game Center functionality, including leaderboards, before a local user has authenticated.\
    \ If you try to do so, you will receive a `GKErrorNotAuthenticated` error.\n\n\
    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig10_HTML.png](images/216283_2_En_3_Chapter/216283_2_En_3_Fig10_HTML.png)\n\
    \n*Figure 3-10 – A collection of leaderboards, shown with Apple’s GUI*\n\n> **Tip**\n\
    > You can change the order that leaderboards appear (see Figure 3-10) by dragging\
    \ leaderboard entries up and down in App Store Connect.\n\n## Customizing the\
    \ Leaderboard\n\nAs demonstrated in the previous section, presenting a leaderboard\
    \ to the user is straightforward. However, what if you want to customize the appearance\
    \ of a leaderboard? In this section, you will be walked through the process of\
    \ receiving the raw leaderboard information so that you can present it in your\
    \ app in whatever fashion suits your needs.\n\nWe begin the process of adding\
    \ a custom leaderboard by adding a new button and associated action for it to\
    \ `UFOViewController`. Add a new button adjacent to the previous leaderboard button,\
    \ and create a new action for it.\n\nIn the previous example, Apple provides a\
    \ view controller for us. When we are working with our own custom leaderboards,\
    \ we need to create a view controller to handle the presentation. Create a new\
    \ subclass of `UIViewController`, and name it `UFOLeaderboardViewController`.\
    \ Modify the action of the new custom leaderboard button to present a new instance\
    \ of `UFOLeaderboardViewController`, as seen in the following code snippet:\n\n\
    ```swift\n@IBAction func customLeaderboardButtonPressed() {\n    let leaderboardViewController\
    \ = UFOLeaderboardViewController()\n    leaderboardViewController.gcManager =\
    \ gcManager\n    present(leaderboardViewController, animated: true)\n}\n```\n\n\
    The next step is to set up the storyboard for the new `UFOLeaderboardViewController`.\
    \ We will use the setup as shown in Figure 3-11; however, you may provide whatever\
    \ kind of customization you want here. Create the outlets and objects, as shown\
    \ in the figure, and hook up connections for all of them, including the delegate\
    \ and data source for the table.\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig11_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig11_HTML.jpg)\n\
    \n*Figure 3-11 – Creating the xib for a custom leaderboard*\n\nIf you were to\
    \ run the app at this point and click the Custom Leaderboard button, it should\
    \ launch a blank table in the correct orientation and allow you to dismiss it\
    \ to return to the first view.\n\nNow that we got the view controller overhead\
    \ out of the way, we can begin to focus on the Game Center–specific features.\
    \ First, set up the table view delegate and data source methods that we will be\
    \ using. We need to create a new class property to hold the score data for display.\
    \ Create a new `NSArray` object and name it `scoreArray`. Add the following two\
    \ functions to your implementation:\n\n```swift\nextension UFOLeaderboardViewController:\
    \ UITableViewDataSource {\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        return scoreArray?.count ?? 0\n    }\n    \n\
    \    static let tableViewCellIdentifier = \"Cell\"\n    \n    func tableView(_\
    \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n        var cell = tableView.dequeueReusableCell(withIdentifier: UFOLeaderboardViewController.tableViewCellIdentifier)\n\
    \        if cell == nil {\n            cell = UITableViewCell(style: .subtitle,\
    \ reuseIdentifier: UFOLeaderboardViewController.tableViewCellIdentifier)\n   \
    \         cell?.selectionStyle = .none\n        }\n        \n        let score\
    \ = scoreArray?[indexPath.row] as? GKLeaderboard.Entry\n        let playerName\
    \ = score?.player.alias\n        \n        if playerName == nil {\n          \
    \  cell?.textLabel?.text = \"Loading Name...\"\n        } else {\n           \
    \ cell?.textLabel?.text = playerName\n        }\n        \n        cell?.detailTextLabel?.text\
    \ = score?.formattedScore\n        return cell!\n    }\n}\n```\n\nThe first function\
    \ returns the number of items in our table view. We deal with only one section\
    \ in this example, so the number of rows will always equal the number of scores\
    \ that are in our array. The next function displays the score into the cell. We\
    \ use `UITableViewCellStyleSubtitle` in this example, but in most cases, you will\
    \ want to create a more customized cell. The main label is set to the player alias,\
    \ and the secondary label is set to the formatted score value. In the previous\
    \ chapter, it was noted that you should never show a player ID to the user."
  raw: '## Presenting a Leaderboard


    Now that we have a leaderboard configured in App Store Connect, and populated
    a score into that leaderboard, it is time to present the leaderboard to the user.
    There are two ways of presentation: the first is with Apple’s GUI; the second
    is with a custom GUI. This section will take a look at the implementation using
    Apple’s GUI. In the next section, you will learn how to present a leaderboard
    with custom graphics by accessing the raw data for the leaderboard directly.


    Before we can begin, we need to create a new button that will trigger the leaderboard.
    We want to do this outside of the game screen because you do not want to drag
    the user away from a game in progress to view a leaderboard. Begin by adding a
    new button to the UFOViewController view, as shown in Figure [3-8](#216283_2_En_3_Chapter.xhtml#Fig8).


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig8_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig8_HTML.jpg)


    Figure 3-8


    Adding a leaderboard button


    Hook up the button to a new action that matches the one shown next. When leaderboards
    were first introduced into Game Center, it was required to set up which leaderboard
    you wanted to launch to. In more recent versions of Game Center, the leaderboards
    share a combined Leaderboard interface in which the user can navigate to whatever
    leaderboard they want to view.


    ```

    @IBAction func leaderboardButtonTapped(sender: UIButton) {

    let leaderboardController = GKGameCenterViewController(state: .leaderboards)

    leaderboardController.gameCenterDelegate = self  present(leaderboardController,
    animated: true)

    }

    ```


    When you run the program and click the newly added Leaderboard button, the result
    should look similar to the image in Figure [3-9](#216283_2_En_3_Chapter.xhtml#Fig9).
    It is worth noting that while the underlying APIs for GameKit and Game Center
    aren’t updated with great frequency, the UI that Apple uses to represent Game
    Center changes rapidly and frequently. Not only does the interface change, but
    some of the navigation has changed in the past as well. For example, in the original
    versions of leaderboards, the user would be presented directly to the leaderboards
    for the game they were accessing; in the current implementation, the user is taken
    to an overview section of leaderboards for the current game.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig9_HTML.png](images/216283_2_En_3_Chapter/216283_2_En_3_Fig9_HTML.png)


    Figure 3-9


    A leaderboard being presented using Apple’s GUI


    The GUI provides a back button to take us to a list of all the leaderboards (see
    initial view in Figure [3-10](#216283_2_En_3_Chapter.xhtml#Fig10)) that we have
    configured for the app. If you omit entering a category when you create the GKLeaderboardViewController
    instance, you will be presented with whatever leaderboard has been selected as
    the default leaderboard in App Store Connect.


    This is all there is to creating and presenting a leaderboard using Apple’s GUI.
    In the next section, we will look at how to customize a leaderboard to match your
    own GUI.


    Note


    Remember that you cannot access any Game Center functionality, including leaderboards,
    before a local user has authenticated. If you try to do so, you will receive a
    GKErrorNotAuthenticated error.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig10_HTML.png](images/216283_2_En_3_Chapter/216283_2_En_3_Fig10_HTML.png)


    Figure 3-10


    A collection of leaderboards, shown with Apple’s GUI


    Tip


    You can change the order that leaderboards appear (see Figure [3-10](#216283_2_En_3_Chapter.xhtml#Fig10))
    by dragging leaderboard entries up and down in App Store Connect.


    ## Customizing the Leaderboard


    As demonstrated in the previous section, presenting a leaderboard to the user
    is straightforward. However, what if you want to customize the appearance of a
    leaderboard? In this section, you will be walked through the process of receiving
    the raw leaderboard information so that you can present it in your app in whatever
    fashion suits your needs.


    We begin the process of adding a custom leaderboard by adding a new button and
    associated action for it to UFOViewController. Add a new button adjacent to the
    previous leaderboard button, and create a new action for it.


    In the previous example, Apple provides a view controller for us. When we are
    working with our own custom leaderboards, we need to create a view controller
    to handle the presentation. Create a new subclass of UIViewController, and name
    it UFOLeaderboardViewController. Modify the action of the new custom leaderboard
    button to present a new instance of UFOLeaderboardViewController, as seen in the
    following code snippet:


    ```

    @IBAction func customLeaderboardButtonPressed() {

    let leaderboardViewController = UFOLeaderboardViewController()

    leaderboardViewController.gcManager = gcManager

    present(leaderboardViewController, animated: true)

    }

    ```


    The next step is to set up the storyboard for the new UFOLeaderboardViewController.
    We will use the setup as shown in Figure [3-11](#216283_2_En_3_Chapter.xhtml#Fig11);
    however, you may provide whatever kind of customization you want here. Create
    the outlets and objects, as shown in the figure, and hook up connections for all
    of them, including the delegate and data source for the table.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig11_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig11_HTML.jpg)


    Figure 3-11


    Creating the xib for a custom leaderboard


    If you were to run the app at this point and click the Custom Leaderboard button,
    it should launch a blank table in the correct orientation and allow you to dismiss
    it to return to the first view.


    Now that we got the view controller overhead out of the way, we can begin to focus
    on the Game Center–specific features. First, set up the table view delegate and
    data source methods that we will be using. We need to create a new class property
    to hold the score data for display. Create a new NSArray object and name it scoreArray.
    Add the following two functions to your implementation:


    ```

    extension UFOLeaderboardViewController: UITableViewDataSource {

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return scoreArray?.count ?? 0

    }

    static let tableViewCellIdentifier = "Cell"

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    var cell = tableView.dequeueReusableCell(withIdentifier: UFOLeaderboardViewController.tableViewCellIdentifier)

    if cell == nil {

    cell = UITableViewCell(style: .subtitle, reuseIdentifier: UFOLeaderboardViewController.tableViewCellIdentifier)

    cell?.selectionStyle = .none

    }

    let score = scoreArray?[indexPath.row] as? GKLeaderboard.Entry

    let playerName = score?.player.alias

    if playerName == nil {

    cell?.textLabel?.text = "Loading Name..."

    } else {

    cell?.textLabel?.text = playerName

    }

    cell?.detailTextLabel?.text = score?.formattedScore

    return cell!

    }

    }

    ```


    The first function returns the number of items in our table view. We deal with
    only one section in this example, so the number of rows will always equal the
    number of scores that are in our array. The next function displays the score into
    the cell. We use UITableViewCellStyleSubtitle in this example, but in most cases,
    you will want to create a more customized cell. The main label is set to the player
    alias, and the secondary label is set to the formatted score value. In the previous
    chapter, it was noted that you should never show a player ID to the user.'
  trans: "  \n# 展示排行榜\n\n现在，我们已在 App Store Connect 中配置好排行榜，并向其中录入了一个分数，是时候将排行榜展示给用户了。展示方式有两种：第一种是使用\
    \ Apple 的 GUI（图形用户界面），第二种是使用自定义 GUI。本节将介绍如何通过 Apple 的 GUI 实现排行榜展示。在下一节中，你将学习如何直接访问排行榜的原始数据，从而以自定义图形的方式展示排行榜。\n\
    \n在开始之前，我们需要创建一个新按钮，用于触发排行榜的显示。我们希望这个按钮放在游戏屏幕之外，因为你不希望用户在游戏进行中被拖拽出去查看排行榜。首先，在\
    \ `UFOViewController` 视图中添加一个新按钮，如图 3-8 所示。\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig8_HTML.jpg](img/216283_2_En_3_Fig8_HTML.jpg)\n\
    \n*图 3-8 – 添加排行榜按钮*\n\n将按钮连接到如下所示的新操作上。当排行榜功能首次引入 Game Center 时，必须指定要启动的排行榜。而在较新版本的\
    \ Game Center 中，排行榜共享一个统一的排行榜界面，用户可以在其中导航到他们想查看的任何排行榜。\n\n```swift\n@IBAction\
    \ func leaderboardButtonTapped(sender: UIButton) {\n    let leaderboardController\
