- fmt: '### Chat Volume and Muting


    The voice chat volume is set on a per-channel basis. Each channel has an associated
    property that can be used to lower the overall volume of that chat. You cannot
    raise the volume past what the user has selected as the device’s current volume.
    To modify a channel’s volume, add the following line of code:


    ```

    allChannel?.volume = 0.5 //half of max volume

    ```


    In addition, you can mute individual players in a channel by referencing their
    `GKPlayer`. Players can be muted and unmuted using the following two lines of
    code:


    ```

    teamChannel?.setPlayer(player, muted: true)

    teamChannel?.setPlayer(player, muted: false)

    ```


    There might also be circumstances in which you do not want to transmit the user’s
    voice at all times. By default, a user starts a chat in the muted state. You will
    need to unmute a user before he can begin to transmit voice data.


    ```

    squadChannel?.isActive = true

    ```


    **Note:** A user can only transmit voice on one channel at a time; if you unmute
    a channel, the API will automatically mute all other channels.


    This is all that is required in order to completely enable voice chat in your
    Game Center–based networking app. Everything else, including sending and receiving
    the data, is handled for you by the APIs.


    ### Monitoring Player State


    I mentioned earlier in this chapter that it is important to let the user know
    that they are currently transmitting data. Letting the player see who is speaking
    is also an important step. By monitoring player state changes, you can determine
    which users are currently transmitting voice and highlight them in a player list
    or perform some other kind of indication of which player is speaking. The following
    block is easy to set up when you begin your chat and saves you from performing
    polling or delegate callbacks:


    ```

    guard let allChannel = allChannel else {

    return

    }

    allChannel.playerVoiceChatStateDidChangeHandler = { player, state in

    switch state {

    case .connected:

    print("Channel", allChannel.name, "connected.")

    case .disconnected:

    print("Channel", allChannel.name, "disconnected.")

    case .speaking:

    showSpeakingPlayer(player)

    case .silent:

    stopShowingSpeakingPlayer(player)

    case .connecting:

    print("Channel", allChannel.name, "is connecting.")

    @unknown default:

    print("Channel", allChannel.name, "received unknown state", state, ".")

    }

    }

    ```


    **Note:** Player state updates are handled per channel. You will need to configure
    one for each channel that you wish to watch for changes on.


    ## Putting It Together


    In this chapter, we modify our existing code base from Chapter [8](#216283_2_En_8_Chapter.xhtml).
    Begin there by creating a new audio session for your voice chat service. Add the
    following block of code to the `UFOGameViewController.swift` `viewDidLoad()` method.
    In addition, you need to add the `AVFoundation.framework` to your project. Modify
    the relevant section of the `viewDidLoad` method to match the following:


    ```

    if gameIsMultiplayer == false {

    for _ in 0..<5 {

    spawnCow()

    }

    updateCowPaths()

    } else {

    generateAndSendHostNumber()

    var error: Error? = nil

    let audioSession = AVAudioSession.sharedInstance()

    do {

    try audioSession.setCategory(.playAndRecord)

    } catch (let err){

    error = err

    }

    do {

    try audioSession.setActive(true)

    } catch (let err) {

    error = err

    }

    if let error = error {

    print("An error occurred while starting audio session: \(error.localizedDescription)")

    }

    setupVoiceChat()

    }

    ```


    **Caution:** Make sure the device you are building against has both a speaker
    and a microphone available for use.


    You also need to add a new method called `setupVoiceChat`. This method will handle
    the basic configuration.


    ```

    func setupVoiceChat() {

    mainChannel = peerMatch?.voiceChat(withName: "main")

    mainChannel?.start()

    mainChannel?.volume = 1.0

    mainChannel?.isActive = false

    }

    ```


    ## Hooking Up a User Interface


    The last thing we need to do is hook up an action to turn our microphone on and
    off. I have decided to go with a simple toggle button for UFOs, but you may feel
    the need to implement a different approach. Add a new button, as shown in Figure
    [9-1](#216283_2_En_9_Chapter.xhtml#Fig1), and hook up the new action posted next.


    ![../images/216283_2_En_9_Chapter/216283_2_En_9_Fig1_HTML.jpg](images/216283_2_En_9_Chapter/216283_2_En_9_Fig1_HTML.jpg)


    *Figure 9-1: Adding a microphone button to our UFO game demo*


    ```

    @IBAction func startVoice(_ sender: Any) {

    micOn = !micOn

    if micOn {

    micButton.setTitle("Mic On", for: .normal)

    mainChannel?.isActive = true

    } else {

    micButton.setTitle("Mic Off", for: .normal)

    mainChannel?.isActive = false

    }

    }

    ```


    This method determines the current state of the microphone (`on`/`off`) and toggles
    it to the new state. When that happens, we update the button title and turn the
    microphone on or off for the type of network that we are using.


    These are all the required steps to add voice chat into our UFO example project.
    If you run the game on two devices, you will be able to communicate with voice
    back and forth.


    ## Summary


    In this chapter, we learned how to incorporate a traditionally very complex technology
    into our iOS app with very little work. We explored the differences with using
    voice chat on both GameKit and Game Center, as well as implemented examples of
    both systems into our UFO demo game. You now have the skills required to add full-featured
    VOIP technology to any iPhone or iPad app. If you have been following the book
    along from the beginning, you now have all the skills needed to implement all
    aspects of GameKit and Game Center into your apps.


    In the next chapter, we will take a look at another important technology when
    writing games or apps for iOS—StoreKit. Using StoreKit technology, we will learn
    how to sell additional features and add-ons to your product.'
