    if purchasedUpgrade {

    imageArray = [UIImage(named: "Ship1.png"), UIImage(named: "Ship2.png")].compactMap
    { $0 }

    } else {

    imageArray = [UIImage(named: "Saucer1.png"), UIImage(named: "Saucer2.png")].compactMap
    { $0 }

    }

    myPlayerImageView?.animationImages = imageArray

    myPlayerImageView?.startAnimating()

    if let myPlayerImageView = myPlayerImageView {

    view.addSubview(myPlayerImageView)

    }

    }

    ```


    ## Summary


    In this chapter, we covered StoreKit and in-app purchases. By leveraging StoreKit,
    you gain a number of ways to monetize your app, from expandable content to special
    upgrades for your users.


    You should now feel confident adding a variety of products to your own in-app
    store. Although StoreKit isn’t directly a part of Game Center or GameKit, you
    will undoubtedly find an in-app store an invaluable addition to your iOS, Mac,
    or Apple TV software.


    We spent some time talking about ngmoco:) and its experiments and successes with
    the Freemium model. You should now feel confident with App Store Connect and all
    the actions that are required to fully set up an in-app purchase product, as well
    as the required code to get that purchase to display.


    We looked at how to handle failures with purchasing and also the path of a success.
    We also explored some of the advanced topics, such as multiple purchases at once.
    Lastly, we saw how we integrated the entire experience into our UFOs demo app.


    # 11. Game Controllers


    To say the least, Apple has had a long and complicated history with gaming on
    its platforms. When the iPhone first began to gain traction and the world was
    handed the first native SDK, gaming was clearly not a priority. Since that time
    and demonstrated by the technologies this very book is written about, Apple has
    come a long way. iOS Game Controllers were first announced at WWDC 2013 as part
    of iOS 7\. Focusing on the screen while not being able to feel where gaming controls
    were proved difficult. Beginning with iOS 15, Apple would introduce new SDKs to
    handle on-screen Game Controllers.


    ## Types of Physical Game Controllers


    There are two general types of Physical Game Controllers, micro and extended.
    These may also be made available in wired (dock connector) or wireless (Bluetooth)
    models. Regardless of other physical and layout differences, all controllers will
    conform to the same types of input. It is important to note that extended controllers
    have more input controls than the standard controllers.


    Micro controllers feature a directional D-pad, two primary buttons (A, X), and
    a menu button. Extended controllers feature a directional D-pad, four primary
    buttons (A, B, X, Y), three additional buttons (Menu, Options, Home), two sets
    of shoulder buttons, and two directional thumb sticks. Wireless controllers also
    feature a player indicator LED, which has four positions. Beginning with iOS 15,
    software controller functionality has been added to the platform, which is addressed
    later in this chapter.


    Note


    While a Game Controller can add a lot of functionality to your iOS, Mac, or Apple
    TV game, it is important to remember that they must be optional. In addition to
    any Game Controller support, the game must also contain all the required functionality
    through the touch screen, standard controls, or accelerometer where applicable.


    When Game Controllers were first announced, very few companies were manufacturing
    them. By the time iOS 15 was being released, there were dozens of available options
    on the market from big names like Logitech and Razer to smaller companies and
    startups. Game Controllers with Apple compatibility now come in all shapes, sizes,
    and styles.


    ## Connecting to Game Controllers


    When a non-wireless controller (dock connector) is connected to a device, it is
    automatically detected. However, to detect a wireless controller, the app must
    specifically begin looking for one. The sample app adds a new button in the upper
    left-hand corner of the menu screen to toggle searching for a wireless controller.


    A new IBAction is created for the “Find Wireless Controller” button. When the
    user first taps the button, the function startWirelessControllerDiscovery is invoked.
    The second toggle will end the search process with the class method stopWirelessControllerDiscovery.


    ```

    @IBAction func findWirelessController() {

    findingWirelessController.toggle()

    if findingWirelessController {

    GCController.startWirelessControllerDiscovery {

    print("Wireless controller searching has finished")

    }

    } else {

    GCController.stopWirelessControllerDiscovery()

    print("Wireless controller stopped by user")

    }

    }

    ```


    When a new controller is detected, whether it is wireless or physically connected,
    a notification is fired, GCControllerDidConnectNotification. This notification
    and the partner notification for a Game Controller being disconnected should be
    registered at the first chance possible. In the sample project, this is done in
    the viewDidLoad: method of the UFOViewController class.


    ```

    NotificationCenter.default.addObserver(self, selector: #selector(setupControllers),
    name: Notification.Name.GCControllerDidConnect , object: nil)

    NotificationCenter.default.addObserver(self, selector: #selector(setupControllers),
    name: Notification.Name.GCControllerDidDisconnect , object: nil)

    ```


    Note


    When a controller is disconnected, it is recommended that the game automatically
    pause to allow the player to either correct the issue with the controller or return
    to touch-based gameplay. Do not forget to test disconnecting controllers during
    gameplay as part of the quality assurance process.


    Upon receiving either of these notifications, a new function will be called setup
    Controllers:; this method allows the app to keep track of which controllers, as
    there may be more than one, are connected at any given time. The Game Controllers
    are available via the controllers function on the GCController object; this function
    will return an array of all the connected controllers. The value of the controller
    array is also saved to an array property for later use in the sample app.


    ```

    @objc func setupControllers(_ notification: Notification) {

    gameControllerArray = GCController.controllers()

    if gameControllerArray.isEmpty {

    print("No game controllers found")

    } else {

    print("Game Controllers Found", gameControllerArray.count)

    }

    }

    ```


    Note


    It is possible for the controllers to be detected before the notification is set
    up; it is therefore important to check the contents of the controller array when
    the notification is added to determine if there are any currently connected controllers.'
  trans: "\n### 在 `UFOs` 中整合所有元素\n\n根据应用内购买的复杂程度，将其集成到代码中有可能非常简单，也可能非常困难。在 `UFOs`\
    \ 中，我们有一个非常简单的产品：用户只需支付一次性费用，就能解锁一艘不同颜色的飞船。当用户购买该产品后，我们会在用户默认设置中存储一个键值来记录这一操作。要在代码中解锁这个购买项，我们只需检查这个键值，然后执行所需的步骤即可。为此，我们需要向项目中添加一些新的美术资源。这些资源已包含在第\
    \ 10 章的示例代码中（可从 Apress 网站获取）。\n\n完成这一步后，我们需要修改 `viewDidLoad` 函数来更改飞船的图像。以下代码片段展示了这些改动：\n\
    \n```\noverride func viewDidLoad() {\n    purchasedUpgrade = UserDefaults.standard.bool(forKey:\
    \ \"shipPlusAvailable\")\n    let playerFrame = CGRect(x: 100, y: 70, width: 80,\
    \ height: 34)\n    myPlayerImageView = UIImageView(frame: playerFrame)\n    myPlayerImageView?.animationDuration\
    \ = 0.75\n    myPlayerImageView?.animationRepeatCount = 99999\n    var imageArray:\
    \ [UIImage]\n    if purchasedUpgrade {\n        imageArray = [UIImage(named: \"\
    Ship1.png\"), UIImage(named: \"Ship2.png\")].compactMap { $0 }\n    } else {\n\
    \        imageArray = [UIImage(named: \"Saucer1.png\"), UIImage(named: \"Saucer2.png\"\
    )].compactMap { $0 }\n    }\n    myPlayerImageView?.animationImages = imageArray\n\
    \    myPlayerImageView?.startAnimating()\n    if let myPlayerImageView = myPlayerImageView\
    \ {\n        view.addSubview(myPlayerImageView)\n    }\n}\n```\n\n### 本章小结\n\n\
    在本章中，我们介绍了 StoreKit 和应用内购买。通过利用 StoreKit，你获得了多种将应用变现的方式，从可扩展的内容到为用户提供的特殊升级功能。\n\
    \n现在，你应该有信心在自己的应用内商店中添加各种产品了。尽管 StoreKit 并非 Game Center 或 GameKit 的直接组成部分，但你无疑会发现，应用内商店是你\
    \ iOS、Mac 或 Apple TV 软件中不可或缺的补充。\n\n我们花了一些时间讨论了 ngmoco:) 及其在 Freemium 模式上的实验与成功经验。现在，你应该能够自信地使用\
    \ App Store Connect，并完成完全设置一个应用内购买产品所需的所有操作，以及让该购买项显示出来所需的代码。\n\n我们探讨了如何处理购买失败的情况以及成功购买后的流程。此外，我们还探索了一些高级主题，例如一次完成多次购买。最后，我们看到了如何将整个体验集成到我们的\
    \ `UFOs` 演示应用中。\n\n# 11. 游戏控制器\n\n至少可以说，苹果在其平台上的游戏领域有着漫长而复杂的历史。当 iPhone 刚开始获得关注，并且世界迎来了首个原生\
    \ SDK 时，游戏显然并非优先考虑的事项。但从那时起，通过本书所描述的这些技术可以证明，苹果已经取得了长足的进步。iOS 游戏控制器最初是在 2013 年的\
    \ WWDC 上作为 iOS 7 的一部分发布的。将注意力集中在屏幕上，却又无法感知游戏控制器的位置，这被证明是困难的。从 iOS 15 开始，苹果引入了新的\
    \ SDK 来处理屏幕上的游戏控制器。\n\n## 实体游戏控制器的类型\n\n实体游戏控制器通常有两种类型：微型和扩展型。它们也可能以有线（底座连接器）或无线（蓝牙）型号提供。无论其他物理和布局上的差异如何，所有控制器都将遵循相同的输入类型。重要的是要注意，扩展型控制器比标准控制器拥有更多的输入控件。\n\
    \n微型控制器配备了一个方向 D-pad（方向键）、两个主要按钮（A、X）和一个菜单按钮。扩展型控制器配备了一个方向 D-pad、四个主要按钮（A、B、X、Y）、三个附加按钮（菜单、选项、主页）、两组肩部按钮以及两个方向摇杆。无线控制器还带有一个玩家指示灯\
    \ LED，该指示灯有四个位置。从 iOS 15 开始，该平台增加了软件控制器的功能，本章稍后将对此进行介绍。\n\n> **注意**  \n> 虽然游戏控制器可以为你的\
    \ iOS、Mac 或 Apple TV 游戏增添大量功能，但必须记住，它们应当是可选功能。除了对游戏控制器的支持外，游戏还必须通过触摸屏、标准控件或在适用情况下通过加速计，包含所有必需的功能。\n\
    \n游戏控制器首次发布时，很少有公司进行生产。到 iOS 15 发布时，市场上已有数十种可选产品，从罗技和雷蛇这样的大品牌，到较小的公司和初创企业，不一而足。兼容苹果设备的游戏控制器现在形状、尺寸和风格各异。\n\
    \n## 连接游戏控制器\n\n当非无线控制器（底座连接器）连接到设备时，它会自动被检测到。然而，要检测无线控制器，应用必须专门开始搜索。示例应用在菜单屏幕的左上角添加了一个新按钮，用于切换是否搜索无线控制器。\n\
    \n为“查找无线控制器”按钮创建了一个新的 `IBAction`。当用户首次点击该按钮时，会调用 `startWirelessControllerDiscovery`\
    \ 函数。第二次切换将通过类方法 `stopWirelessControllerDiscovery` 结束搜索过程。\n\n```\n@IBAction func\
    \ findWirelessController() {\n    findingWirelessController.toggle()\n    if findingWirelessController\
    \ {\n        GCController.startWirelessControllerDiscovery {\n            print(\"\
    无线控制器搜索已完成\")\n        }\n    } else {\n        GCController.stopWirelessControllerDiscovery()\n\
    \        print(\"用户已停止搜索无线控制器\")\n    }\n}\n```\n\n当检测到新控制器时，无论是无线的还是有线连接的，都会触发一个通知：`GCControllerDidConnectNotification`。这个通知以及与之对应的用于游戏控制器断开连接的通知，应尽早注册。在示例项目中，这是在\
    \ `UFOViewController` 类的 `viewDidLoad:` 方法中完成的。\n\n```\nNotificationCenter.default.addObserver(self,\
    \ selector: #selector(setupControllers), name: Notification.Name.GCControllerDidConnect\
    \ , object: nil)\nNotificationCenter.default.addObserver(self, selector: #selector(setupControllers),\
    \ name: Notification.Name.GCControllerDidDisconnect , object: nil)\n```\n\n> **注意**\
    \  \n> 当控制器断开连接时，建议游戏自动暂停，以便玩家可以解决控制器的问题，或返回基于触摸的游戏操作。作为质量保证流程的一部分，不要忘记在游戏过程中测试控制器断开连接的情况。\n\
    \n收到任一通知后，将调用一个新函数 `setupControllers:`；此方法允许应用随时追踪哪些控制器（可能不止一个）已连接。游戏控制器可通过 `GCController`\
    \ 对象上的 `controllers` 函数获取；该函数会返回一个包含所有已连接控制器的数组。在示例应用中，该控制器数组的值也会保存到一个数组属性中，供后续使用。\n\
    \n```\n@objc func setupControllers(_ notification: Notification) {\n    gameControllerArray\
    \ = GCController.controllers()\n    if gameControllerArray.isEmpty {\n       \
    \ print(\"未找到游戏控制器\")\n    } else {\n        print(\"找到的游戏控制器数量\", gameControllerArray.count)\n\
    \    }\n}\n```\n\n> **注意**  \n> 控制器有可能在通知设置好之前就被检测到；因此，在添加通知时检查控制器数组的内容以确定当前是否有任何已连接的控制器，这一点非常重要。\n"
- fmt: "# Reading Data Through Polling\n\nOnce a controller has been connected to\
    \ a device, the input from that controller needs to be read. In the sample app,\
    \ UFOs, accelerometer data is read every 0.05 seconds. Since not all users will\
    \ have access to Game Controllers, this behavior will still be needed even after\
    \ adding Game Controller support. This makes the accelerometer polling method\
    \ ideal for reading data from the Game Controller. Modify the existing `motionOccurred:`\
    \ function in UFOs to add Game Controller functionality.\n\nFirst, the game must\
    \ determine if the player is using a Game Controller; this is done through determining\
    \ if the device is currently connected to any Game Controllers; in real-world\
    \ applications, you may want to provide the user with an option. In the event\
    \ that one or more Game Controllers are connected, the last one in the array is\
    \ used. In your own apps, it may also be beneficial to allow the user to select\
    \ which controller they intend to use. A new controller object is created, and\
    \ the last controller in the array is stored into it.\n\nThe UFOs game has two\
    \ primary functions: the first begins the tractor beam action, and the second\
    \ moves the ship from location to location on the screen. For the purposes of\
    \ the demo, the Y button on the controller will be used to engage the tractor\
    \ beam. Since the tractor beam remains on as long as the button is continually\
    \ pressed, a bool is created to keep track of when the button is currently pressed/depressed.\n\
    \nThe action from the button is simply passed to the `touchesBegan` function,\
    \ which is the same function that controlled the tractor beam when handling touch\
    \ events. The benefit to this type of approach is that the touch events will still\
    \ work even with a controller connected. Since both standard and extended Game\
    \ Controllers have a Y button, there is no specific code required to handle the\
    \ different controllers.\n\nWhen using a standard controller, the D-pad will be\
    \ used for movement. However, the thumb directional pads on the extended Game\
    \ Controller make for a better experience when controlling the ship so the app\
    \ will use those when available. This is done through the property `extendedGamePad`;\
    \ if this value is non-nil, then an extended controller is currently connected.\n\
    \nLike the A, B, X, and Y buttons, the D-pad values can be accessed via a property\
    \ on the `GCController` object. However, the D-pad returns a float value of 0.0\
    \ to 1.0 for X and Y axes. This value can be used in place of the accelerometer\
    \ value used when a Game Controller is not hooked up. Hooking up the values for\
    \ the thumb stick for the extended Game Controller are nearly identical but are\
    \ stored under the `extendedGamepad` instead of the root `gamepad` property.\n\
    \n```\nfunc motionOccurred(_ accelerometerData: CMAccelerometerData) {\nif let\
    \ controller = /*parentViewController.*/gameControllerArray.last {\n//Testing\
    \ for button press\nlet pressed = controller.microGamepad?.buttonX.isPressed\n\
    if pressed == true && gameControllerXHit == false {\ngameControllerXHit = true\n\
    xButtonAction()\n} else if pressed == false && gameControllerXHit == true {\n\
    gameControllerXHit = false\nxButtonAction()\n}\nif let extendedGamepad = controller.extendedGamepad\
    \ {\naccel[0] = extendedGamepad.leftThumbstick.xAxis.value * accelerometerDamp\
    \ + accel[0] * (1.0 - accelerometerDamp)\naccel[1] = extendedGamepad.leftThumbstick.yAxis.value\
    \ * accelerometerDamp + accel[1] * (1.0 - accelerometerDamp)\n} else if let microGamePad\
    \ = controller.microGamepad {\naccel[0] = microGamePad.leftThumbstick.xAxis.value\
    \ * accelerometerDamp + accel[0] * (1.0 - accelerometerDamp)\naccel[1] = microGamePad.leftThumbstick.yAxis.value\
    \ * accelerometerDamp + accel[1] * (1.0 - accelerometerDamp)\n}\n} else {\naccel[0]\
    \ = accelerometerData.acceleration.x * accelerometerDamp + accel[0] * (1.0 - accelerometerDamp)\n\
    accel[1] = accelerometerData.acceleration.y * accelerometerDamp + accel[1] * (1.0\
    \ - accelerometerDamp)\naccel[2] = accelerometerData.acceleration.z * accelerometerDamp\
    \ + accel[2] * (1.0 - accelerometerDamp)\n}\n}\n```\n\n**Note**  \nThe 0.0 value\
    \ is determined when the D-pad or thumb sticks are at rest; previous to the Game\
    \ Controller framework, developers found it necessary to design a \"dead zone\"\
    \ around the at rest positions; with the Game Controllers, this is no longer necessary,\
    \ and any value above 0.0 should be considered intended movement.\n\n# Data Callbacks\n\
    \nThere are many circumstances where it doesn't make sense to poll for Game Controller\
    \ input each time the game loop cycles. Luckily Apple has provided functionality\
    \ for callbacks that can be set upon a value change on any physical button on\
    \ a Game Controller. In the following snippet, a handler is set for the right\
    \ shoulder button. When the button value is changed, this function will call the\
    \ `rightShoulderButtonAction`:\n\n```\ncontroller.extendedGamepad?.rightShoulder.valueChangedHandler\
    \ = { [weak self] button, value, pressed in\nif pressed {\nself?.rightShoulderButtonAction()\n\
    }\n}\n```\n\nIn addition to setting up a callback per action, the callback can\
    \ be shared across multiple buttons at once. This can be accomplished by creating\
    \ a new block and setting it up as seen in the following code snippet. This will\
    \ cause any action on the A, B, X, and Y buttons to result in the log statement\
    \ being printed:\n\n```\nlet buttonHandler:  GCControllerButtonValueChangedHandler\
    \ = { button, value, pressed in\nprint(\"Handle action for \\(button) pressed:\
    \ \\(pressed), with value: \\(value)\")\n}\ncontroller.extendedGamepad?.buttonA.pressedChangedHandler\
    \ = buttonHandler\ncontroller.extendedGamepad?.buttonB.pressedChangedHandler =\
    \ buttonHandler\ncontroller.extendedGamepad?.buttonX.pressedChangedHandler = buttonHandler\n\
    controller.extendedGamepad?.buttonY.pressedChangedHandler = buttonHandler\n```\n\
    \nIt is also possible to set up data callbacks for dealing with changing axis\
    \ values with the D-pad or thumb sticks. This can be accomplished with the following\
    \ code snippet:\n\n```\ncontroller.extendedGamepad?.rightThumbstick.valueChangedHandler\
    \ = { stick, xValue, yValue in\nprint(\"Right Thumb Stick value did change: \\\
    (xValue), \\(yValue)\")\n}\n```\n\n# Pausing\n\nIf your game supports Game Controllers,\
    \ it must also support the pause button that is found on all Game Controllers.\
    \ Even if your game did not previously support pause, it becomes a requirement\
    \ of having a Game Controller connected. Working with the pause button on a Game\
    \ Controller is very simple and only requires a couple of extra lines of code.\n\
    \n```\ncontroller.extendedGamepad?.buttonMenu.pressedChangedHandler = { [weak\
    \ self] button, value, pressed in\nself?.togglePauseState()\n}\n```\n\n# Player\
    \ Indicator Lights\n\nWireless Game Controllers also feature player indicator\
    \ lights, as the Game Controller framework supports multiple controllers being\
    \ hooked up to a single device. Your game can support multiplayer functionality\
    \ using a single device through additional wireless controllers. Each wireless\
    \ controller will feature four LED lights which will indicate the player number.\
    \ These lights are also used to let the user know they have successfully connected\
    \ a wireless controller, even in single player mode. To illuminate the first light\
    \ of the wireless controller, letting the player know they are successfully connected,\
    \ the following code can be used:\n\n```\nif controller.playerIndex == .indexUnset\
    \ {\ncontroller.playerIndex = .index1\n}\n```\n\nThe `playerIndex` property can\
    \ also be used to illuminate other player index values, from 0 to 3. Only one\
    \ player indicator light can be toggled on at a time per controller."
  raw: '## Reading Data Through Polling


    Once a controller has been connected to a device, the input from that controller
    needs to be read. In the sample app, UFOs, accelerometer data is read every 0.05
    seconds. Since not all users will have access to Game Controllers, this behavior
    will still be needed even after adding Game Controller support. This makes the
    accelerometer polling method ideal for reading data from the Game Controller.
    Modify the existing motionOccurred: function in UFOs to add Game Controller functionality.


    First, the game must determine if the player is using a Game Controller; this
    is done through determining if the device is currently connected to any Game Controllers;
    in real-world applications, you may want to provide the user with an option. In
    the event that one or more Game Controllers are connected, the last one in the
    array is used. In your own apps, it may also be beneficial to allow the user to
    select which controller they intend to use. A new controller object is created,
    and the last controller in the array is stored into it.


    The UFOs game has two primary functions: the first begins the tractor beam action,
    and the second moves the ship from location to location on the screen. For the
    purposes of the demo, the Y button on the controller will be used to engage the
    tractor beam. Since the tractor beam remains on as long as the button is continually
    pressed, a bool is created to keep track of when the button is currently pressed/depressed.


    The action from the button is simply passed to the touchesBegan function, which
    is the same function that controlled the tractor beam when handling touch events.
    The benefit to this type of approach is that the touch events will still work
    even with a controller connected. Since both standard and extended Game Controllers
    have a Y button, there is no specific code required to handle the different controllers.


    When using a standard controller, the D-pad will be used for movement. However,
    the thumb directional pads on the extended Game Controller make for a better experience
    when controlling the ship so the app will use those when available. This is done
    through the property extendedGamePad; if this value is non-nil, then an extended
    controller is currently connected.


    Like the A, B, X, and Y buttons, the D-pad values can be accessed via a property
    on the GCController object. However, the D-pad returns a float value of 0.0 to
    1.0 for X and Y axes. This value can be used in place of the accelerometer value
    used when a Game Controller is not hooked up. Hooking up the values for the thumb
    stick for the extended Game Controller are nearly identical but are stored under
    the extendedGamepad instead of the root gamepad property.


    ```

    func motionOccurred(_ accelerometerData: CMAccelerometerData) {

    if let controller = /*parentViewController.*/gameControllerArray.last {

    //Testing for button press

    let pressed = controller.microGamepad?.buttonX.isPressed

    if pressed == true && gameControllerXHit == false {

    gameControllerXHit = true

    xButtonAction()

    } else if pressed == false && gameControllerXHit == true {

    gameControllerXHit = false

    xButtonAction()

    }

    if let extendedGamepad = controller.extendedGamepad {

    accel[0] = extendedGamepad.leftThumbstick.xAxis.value * accelerometerDamp + accel[0]
    * (1.0 - accelerometerDamp)

    accel[1] = extendedGamepad.leftThumbstick.yAxis.value * accelerometerDamp + accel[1]
    * (1.0 - accelerometerDamp)

    } else if let microGamePad = controller.microGamepad {

    accel[0] = microGamePad.leftThumbstick.xAxis.value * accelerometerDamp + accel[0]
    * (1.0 - accelerometerDamp)

    accel[1] = microGamePad.leftThumbstick.yAxis.value * accelerometerDamp + accel[1]
    * (1.0 - accelerometerDamp)

    }

    } else {

    accel[0] = accelerometerData.acceleration.x * accelerometerDamp + accel[0] * (1.0
    - accelerometerDamp)

    accel[1] = accelerometerData.acceleration.y * accelerometerDamp + accel[1] * (1.0
    - accelerometerDamp)

    accel[2] = accelerometerData.acceleration.z * accelerometerDamp + accel[2] * (1.0
    - accelerometerDamp)

    }

    }

    ```


    Note


    The 0.0 value is determined when the D-pad or thumb sticks are at rest; previous
    to the Game Controller framework, developers found it necessary to design a “dead
    zone” around the at rest positions; with the Game Controllers, this is no longer
    necessary, and any value above 0.0 should be considered intended movement.


    ## Data Callbacks


    There are many circumstances where it doesn’t make sense to poll for Game Controller
    input each time the game loop cycles. Luckily Apple has provided functionality
    for callbacks that can be set upon a value change on any physical button on a
    Game Controller. In the following snippet, a handler is set for the right shoulder
    button. When the button value is changed, this function will call the rightShoulderButtonAction:


    ```

    controller.extendedGamepad?.rightShoulder.valueChangedHandler = { [weak self]
    button, value, pressed in

    if pressed {

    self?.rightShoulderButtonAction()

    }

    }

    ```


    In addition to setting up a callback per action, the callback can be shared across
    multiple buttons at once. This can be accomplished by creating a new block and
    setting it up as seen in the following code snippet. This will cause any action
    on the A, B, X, and Y buttons to result in the log statement being printed:


    ```

    let buttonHandler:  GCControllerButtonValueChangedHandler = { button, value, pressed
    in

    print("Handle action for \(button) pressed: \(pressed), with value: \(value)")

    }

    controller.extendedGamepad?.buttonA.pressedChangedHandler = buttonHandler

    controller.extendedGamepad?.buttonB.pressedChangedHandler = buttonHandler

    controller.extendedGamepad?.buttonX.pressedChangedHandler = buttonHandler

    controller.extendedGamepad?.buttonY.pressedChangedHandler = buttonHandler

    ```


    It is also possible to set up data callbacks for dealing with changing axis values
    with the D-pad or thumb sticks. This can be accomplished with the following code
    snippet:


    ```

    controller.extendedGamepad?.rightThumbstick.valueChangedHandler = { stick, xValue,
    yValue in

    print("Right Thumb Stick value did change: \(xValue), \(yValue)")

    }

    ```


    ## Pausing


    If your game supports Game Controllers, it must also support the pause button
    that is found on all Game Controllers. Even if your game did not previously support
    pause, it becomes a requirement of having a Game Controller connected. Working
    with the pause button on a Game Controller is very simple and only requires a
    couple of extra lines of code.


    ```

    controller.extendedGamepad?.buttonMenu.pressedChangedHandler = { [weak self] button,
    value, pressed in

    self?.togglePauseState()

    }

    ```


    ## Player Indicator Lights


    Wireless Game Controllers also feature player indicator lights, as the Game Controller
    framework supports multiple controllers behind hooked up to a single device. Your
    game can support multiplayer functionality using a single device through additional
    wireless controllers. Each wireless controller will feature four LED lights which
    will indicate the player number. These lights are also used to let the user know
    they have successfully connected a wireless controller, even in single player
    mode. To illuminate the first light of the wireless controller, letting the player
    know they are successfully connected, the following code can be used:


    ```

    if controller.playerIndex == .indexUnset {

    controller.playerIndex = .index1

    }

    ```


    The playerIndex property can also be used to illuminate other player index values,
    from 0 to 3\. Only one player indicator light can be toggled on at a time per
    controller.'
  trans: "\n# 通过轮询读取数据\n\n控制器与设备连接后，需要读取该控制器的输入。在示例应用 UFOs 中，加速度计数据每 0.05 秒读取一次。由于并非所有用户都能使用游戏控制器，因此即使添加了游戏控制器支持，仍需要保留这一行为。这使得加速度计轮询方法成为从游戏控制器读取数据的理想方式。修改\
    \ UFOs 中现有的 `motionOccurred:` 函数以添加游戏控制器功能。\n\n首先，游戏必须判断玩家是否正在使用游戏控制器；这通过确定设备当前是否已连接任何游戏控制器来实现。在实际应用中，你可能希望为用户提供一个选项。当连接了一个或多个游戏控制器时，会使用数组中的最后一个。在你自己的应用中，允许用户选择他们想要使用的控制器也可能是有益的。创建一个新的控制器对象，并将数组中的最后一个控制器存储到其中。\n\
    \nUFOs 游戏有两个主要功能：第一个是启动牵引光束动作，第二个是在屏幕上将飞船从一个位置移动到另一个位置。出于演示目的，将使用控制器上的 Y 按钮来启动牵引光束。由于只要持续按下按钮，牵引光束就会保持开启状态，因此会创建一个布尔值来跟踪按钮当前是按下还是松开。\n\
    \n按钮的操作被简单地传递给 `touchesBegan` 函数，该函数与处理触摸事件时控制牵引光束的函数相同。这种方法的好处是，即使连接了控制器，触摸事件仍然可以工作。由于标准版和加强版游戏控制器都有\
    \ Y 按钮，因此无需编写特定代码来处理不同的控制器。\n\n使用标准控制器时，方向键将用于移动。然而，加强版游戏控制器上的摇杆方向键在控制飞船时能提供更好的体验，因此应用会在可用时使用这些摇杆。这通过\
    \ `extendedGamePad` 属性实现；如果该值非 nil，则表示当前连接了加强版控制器。\n\n与 A、B、X、Y 按钮类似，方向键的值可以通过\
    \ `GCController` 对象的一个属性来访问。但是，方向键为 X 和 Y 轴返回 0.0 到 1.0 的浮点值。这个值可以用来替代未连接游戏控制器时使用的加速度计值。连接加强版游戏控制器的摇杆值几乎相同，但它们存储在\
    \ `extendedGamepad` 下，而不是根 `gamepad` 属性下。\n\n```\nfunc motionOccurred(_ accelerometerData:\
    \ CMAccelerometerData) {\nif let controller = /*parentViewController.*/gameControllerArray.last\
    \ {\n//Testing for button press\nlet pressed = controller.microGamepad?.buttonX.isPressed\n\
    if pressed == true && gameControllerXHit == false {\ngameControllerXHit = true\n\
    xButtonAction()\n} else if pressed == false && gameControllerXHit == true {\n\
    gameControllerXHit = false\nxButtonAction()\n}\nif let extendedGamepad = controller.extendedGamepad\
    \ {\naccel[0] = extendedGamepad.leftThumbstick.xAxis.value * accelerometerDamp\
    \ + accel[0] * (1.0 - accelerometerDamp)\naccel[1] = extendedGamepad.leftThumbstick.yAxis.value\
    \ * accelerometerDamp + accel[1] * (1.0 - accelerometerDamp)\n} else if let microGamePad\
    \ = controller.microGamepad {\naccel[0] = microGamePad.leftThumbstick.xAxis.value\
    \ * accelerometerDamp + accel[0] * (1.0 - accelerometerDamp)\naccel[1] = microGamePad.leftThumbstick.yAxis.value\
    \ * accelerometerDamp + accel[1] * (1.0 - accelerometerDamp)\n}\n} else {\naccel[0]\
    \ = accelerometerData.acceleration.x * accelerometerDamp + accel[0] * (1.0 - accelerometerDamp)\n\
    accel[1] = accelerometerData.acceleration.y * accelerometerDamp + accel[1] * (1.0\
    \ - accelerometerDamp)\naccel[2] = accelerometerData.acceleration.z * accelerometerDamp\
    \ + accel[2] * (1.0 - accelerometerDamp)\n}\n}\n```\n\n**注意**  \n0.0 值表示方向键或摇杆处于静止状态；在游戏控制器框架出现之前，开发者发现有必要在静止位置周围设计一个“死区”；使用游戏控制器后，这已不再必要，任何大于\
    \ 0.0 的值都应被视为预期的移动。\n\n# 数据回调\n\n在许多情况下，在游戏循环的每次迭代中都轮询游戏控制器的输入是不合理的。幸运的是，Apple\
    \ 提供了回调功能，可以在游戏控制器上任何物理按钮的值发生变化时设置这些回调。在下面的代码片段中，为右肩键设置了一个处理器。当按钮值发生变化时，此函数将调用\
    \ `rightShoulderButtonAction`：\n\n```\ncontroller.extendedGamepad?.rightShoulder.valueChangedHandler\
    \ = { [weak self] button, value, pressed in\nif pressed {\nself?.rightShoulderButtonAction()\n\
    }\n}\n```\n\n除了为每个动作设置回调外，回调还可以同时在多个按钮之间共享。这可以通过创建一个新的代码块并按照以下代码片段所示进行设置来实现。这将导致\
    \ A、B、X 和 Y 按钮上的任何动作都会输出日志语句：\n\n```\nlet buttonHandler:  GCControllerButtonValueChangedHandler\
    \ = { button, value, pressed in\nprint(\"Handle action for \\(button) pressed:\
    \ \\(pressed), with value: \\(value)\")\n}\ncontroller.extendedGamepad?.buttonA.pressedChangedHandler\
    \ = buttonHandler\ncontroller.extendedGamepad?.buttonB.pressedChangedHandler =\
    \ buttonHandler\ncontroller.extendedGamepad?.buttonX.pressedChangedHandler = buttonHandler\n\
    controller.extendedGamepad?.buttonY.pressedChangedHandler = buttonHandler\n```\n\
    \n也可以设置数据回调来处理方向键或摇杆的轴值变化。这可以通过以下代码片段实现：\n\n```\ncontroller.extendedGamepad?.rightThumbstick.valueChangedHandler\
    \ = { stick, xValue, yValue in\nprint(\"Right Thumb Stick value did change: \\\
    (xValue), \\(yValue)\")\n}\n```\n\n# 暂停\n\n如果你的游戏支持游戏控制器，那么它也必须支持所有游戏控制器上都有的暂停按钮。即使你的游戏之前不支持暂停，连接游戏控制器后这也成为一项要求。处理游戏控制器上的暂停按钮非常简单，只需要额外几行代码。\n\
    \n```\ncontroller.extendedGamepad?.buttonMenu.pressedChangedHandler = { [weak\
    \ self] button, value, pressed in\nself?.togglePauseState()\n}\n```\n\n# 玩家指示灯\n\
    \n无线游戏控制器还具有玩家指示灯功能，因为游戏控制器框架支持将多个控制器连接到单个设备。你的游戏可以通过额外的无线控制器，在单个设备上支持多人游戏功能。每个无线控制器都会有四个\
    \ LED 灯，用于指示玩家编号。这些灯也用于让用户知道他们已成功连接无线控制器，即使在单人模式下也是如此。要照亮无线控制器的第一个灯，让玩家知道他们已成功连接，可以使用以下代码：\n\
    \n```\nif controller.playerIndex == .indexUnset {\ncontroller.playerIndex = .index1\n\
    }\n```\n\n`playerIndex` 属性也可用于照亮其他玩家索引值，范围从 0 到 3。每个控制器一次只能点亮一个玩家指示灯。\n"
- fmt: "## Snapshotting\n\nIt may become necessary to create a snapshot of the controller\
    \ input state. This can be useful not only for debugging but also for creating\
    \ playback profiles or sending the controller data over a network. Snapshots are\
    \ stored through an `NSData` representation.\n\n```\nlet snapshot = controller.capture()\n\
    ```\n\nYou can check if a controller is a snapshot using the `isSnapshot` property,\
    \ seen in the following brief code snippet:\n\n```\nsnapshot.isSnapshot // returns\
    \ true\n```\n\n## Virtual Controllers\n\nVirtual controllers were introduced to\
    \ the iOS platform as part of the iOS 15 updates. Virtual Controllers provide\
    \ functionality and standardization of on-screen touch controllers. While virtual\
    \ controllers are not new technology, prior to the release of iOS 15, users were\
    \ responsible for rolling their own solution or deploying a third-party solution.\n\
    \n![../images/216283_2_En_11_Chapter/216283_2_En_11_Fig1_HTML.jpg](images/216283_2_En_11_Chapter/216283_2_En_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1\n\nFrom the WWDC announcement of virtual controllers\n\nIn order\
    \ to display a new virtual controller, a new instance of `GCVirtualController`\
    \ needs to be created.\n\n```\nlet configuration = GCVirtualController.Configuration()\n\
    configuration.elements = [GCInputDirectionPad, GCInputButtonA, GCInputButtonB]\n\
    let virtual = GCVirtualController(configuration: configuration)\n```\n\nOnce created,\
    \ it is possible to customize the image shown on a button.\n\n```\nlet customButtonPath1\
    \ = UIBezierPath(rect: .zero)\nvirtual.updateConfiguration(forElement: GCInputButtonA)\
    \ { configuration in\n    configuration.path = customButtonPath1\n    return configuration\n\
    }\n```\n\nThere may be instances where it makes sense to hide the controller button\
    \ temporarily, such as when accessing a menu or while paused. This can be done\
    \ with a quick call to the `isHidden` property as seen in the following snippet:\n\
    \n```\nvirtual.updateConfiguration(forElement: GCInputButtonB) { configuration\
    \ in\n    configuration.isHidden = true\n    return configuration\n}\n```\n\n\
    In order to connect the controller and display it on screen, a simple call to\
    \ `connect` on the controller is performed. Once it is connected, the new handlers\
    \ for the input need to be set up.\n\n```\nvirtual.connect { error in\n    guard\
    \ let extendedGamepad = virtual.controller?.extendedGamepad else {\n        return\n\
    \    }\n    extendedGamepad.dpad.valueChangedHandler = { dpad, xValue, yValue\
    \ in\n        print(\"DPad value did change: \\(xValue), \\(yValue)\")\n    }\n\
    \    extendedGamepad.buttonA.pressedChangedHandler = buttonHandler\n    extendedGamepad.buttonA.pressedChangedHandler\
    \ = buttonHandler\n}\n```\n\nWhen it is time to disconnect the controller, the\
    \ virtual controller object accepts a call of `disconnect`.\n\n```\nvirtual.disconnect()\n\
    ```\n\nThese are all the steps required to create, display, interact with, and\
    \ clean up a virtual controller. Apple has once again gone to great lengths to\
    \ make implementing and working with this technology as easy and straightforward\
    \ as possible. If your game would benefit from access to on-screen controllers,\
    \ there is little reason not to implement this functionality.\n\n## Summary\n\n\
    In this chapter you learned about the Game Controller functionality from both\
    \ physical and virtual controllers, beginning with the requirements of the framework\
    \ to connecting and reading data. This chapter also covered topics such as pausing,\
    \ player indicator lights, and snapshotting data. Game Controllers can be deployed\
    \ using the same principles discussed on iOS, Mac, and Apple TV projects. You\
    \ should now have a strong comfort level with this technology and how it can be\
    \ quickly and easily deployed into your projects to give your users a standardized\
    \ and universal means of input beyond the standard controls that come with the\
    \ device.\n\nIndex A, B `abductCow` function `Accelerometer` motion `Achievements`\
