    \ {\n        return\n    }\n    cowArray = cowArray?.filter({ ($0) as AnyObject\
    \ !== (currentAbductee) as AnyObject })\n    tractorBeamImageView?.removeFromSuperview()\n\
    \    tractorBeamOn = false\n    score += 1\n    scoreLabel.text = String(format:\
    \ \"SCORE %05.0f\", score)\n    if gameIsMultiplayer {\n        gcManager?.sendStringToAllPeers(\"\
    $score:\\(score)\", reliable: true)\n    }\n    currentAbductee?.layer.removeAllAnimations()\n\
    \    currentAbductee?.removeFromSuperview()\n    currentAbductee = nil\n    if\
    \ isHost {\n        spawnCow()\n    }\n    if (gcManager?.achievement(withIdentifierIsComplete:\
    \ \"com.dragonforged.ufo.aduct1\") == false) {\n        gcManager?.submitAchievement(\"\
    com.dragonforged.ufo.aduct1\", percentComplete: 100)\n    }\n    if (gcManager?.achievement(withIdentifierIsComplete:\
    \ \"com.dragonforged.ufo.abduct25\") == false) {\n        var percentComplete\
    \ = gcManager?.percentageCompleteOfAchievement(withIdentifier: \"com.dragonforged.ufo.abduct25\"\
    ) ?? 0.0\n        percentComplete += 4\n        gcManager?.submitAchievement(\"\
    com.dragonforged.ufo.abduct25\", percentComplete: percentComplete)\n    }\n}\n\
    ```\n\n目前我们只关注这个方法的最后几行。首先，我们在单次绑架的标识字符串上调用便利函数 `achievementWithIdentifierIsComplete`。由于这是一个是否已获得的成就，我们无需关心当前的完成百分比。要将该成就标记为已完成，我们将其完成百分比设置为\
    \ `100`。\n\n> **注意：** 如果示例中的标识字符串与你用于单次绑架的 App Store Connect 标识字符串不同，请务必进行更改。\n\
    \n下一个成就的接入方式类似，唯一的区别在于我们使用了增量进度。请看下面这段新添加到 `finishAbducting` 函数末尾的代码：\n\n```swift\n\
    if (gcManager?.achievement(withIdentifierIsComplete: \"com.dragonforged.ufo.abduct25\"\
    ) == false) {\n    var percentComplete = gcManager?.percentageCompleteOfAchievement(withIdentifier:\
    \ \"com.dragonforged.ufo.abduct25\") ?? 0.0\n    percentComplete += 4\n    gcManager?.submitAchievement(\"\
    com.dragonforged.ufo.abduct25\", percentComplete: percentComplete)\n}\n```\n\n\
    在上述代码中，我们沿用了提交完整成就的方法，但有一个主要区别：我们首先需要确定该成就的当前进度，然后在此基础上加上 `4`，因为 `25` 的 `4%` 就是\
    \ `1`。要实现在 25 次中递增 1 次绑架，每次捕获一头新牛时就需要增加 `4%`。\n\n> **提示：** 别忘记我们在 `GameCenterManager`\
    \ 中添加的 `resetAchievement` 方法。它在调试提交代码时非常有用。建议在 `didAuthenticate` 部分保留对此方法的调用，以便在调试期间始终将应用恢复到干净状态。\n\
    \n接下来运行游戏并绑架几头牛。完成后，你会注意到成就界面现在会显示进度，类似于图 4-8 所示。如果你至少绑架了一头牛，就会获得一个完成的成就；如果绑架了少于\
    \ 25 头牛，则会有一个处于进行中的成就。请注意，用户完成成就时并不会收到通知；我们将在后面的“成就完成反馈”一节讨论一种通知方法。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig8_HTML.jpg](img/216283_2_En_4_Fig8_HTML.jpg)\n\
    \n**图 4-8** 正在进行的成就\n\n我们为此项目添加的最后一个钩子用于处理五分钟成就。你的第一反应可能是跟踪游戏时长，并在用户退出游戏时将其作为进度提交。但这可能不是最佳方法。我们希望用户在完成成就时得到通知，而不必等到游戏结束才能看到他们获得了哪些成就。解决这个问题有多种方法。在本例中，我们将每三秒（即五分钟的\
    \ `1%`）触发一个 `NSTimer`，并更新成就进度。将以下代码添加到 `UFOGameViewController` 中：\n\n```swift\n\
    func tickThreeSeconds() {\n    if gcManager?.achievement(withIdentifierIsComplete:\
    \ \"com.dragonforged.ufo.play5\") == true {\n        return\n    } else {\n  \
    \      var percentComplete = gcManager?.percentageCompleteOfAchievement(withIdentifier:\
    \ \"com.dragonforged.ufo.play5\") ?? 0.0\n        percentComplete += 1\n     \
    \   gcManager?.submitAchievement(\"com.dragonforged.ufo.play5\", percentComplete:\
    \ percentComplete)\n    }\n}\n```\n\n与修改 `viewDidAppear` 和 `ViewWillDisappear`\
    \ 函数以匹配以下代码类似，我们将启动一个三秒定时器。每次定时器触发时，我们调用 `tickThreeSeconds`，获取成就当前进度，加上 `1%`，然后提交回服务器。如果成就已经完成，则直接返回。\n\
    \n```swift\noverride func viewDidAppear(_ animated: Bool) {\n    super.viewDidAppear(animated)\n\
    \    timer = Timer.scheduledTimer(\n        timeInterval: 3.0,\n        target:\
    \ self,\n        selector: #selector(tickThreeSeconds),\n        userInfo: nil,\n\
    \        repeats: true)\n}\n\noverride func viewWillDisappear(_ animated: Bool)\
    \ {\n    super.viewWillDisappear(animated)\n    timer?.invalidate()\n    timer\
    \ = nil\n}\n```"
- fmt: '### Achievement Completion Feedback


    It is important to let users know when they have completed an achievement. However,
    you don’t want to just present a `UIAlertView`, as that would be very distracting,
    considering most achievements are going to be completed in the middle of an action,
    such as completing 20 laps in a racing game. You wouldn’t want to take the user
    away from any interaction, so we will need a better system. I have always been
    a fan of the small view that slides in from the bottom or top to inform the user
    of the accomplishment—very similar to the fashion in which you get feedback from
    logging in to Game Center.


    The first thing we need to do in order to implement a feedback system is add a
    new protocol function to `GameCenterManager`. We will use this to inform the delegate
    that an achievement has been completed for the first time. Add the following function
    to the project as an optional protocol:


    ```

    func achievementEarned(_ achievement: GKAchievementDescription?)

    ```


    In addition, we need to modify our existing `submitAchievement:percentComplete:`
    method. Take a look at the last `if` statement block of that function. We want
    to modify it as follows but add an `if` statement to determine whether we have
    a `percentageComplete` over 100, which will call our new protocol. Also notice
    that we are using `GKAchievementDescription` instead of `GKAchievement`. We will
    discuss this further in the next section, “Custom Achievement GUI.”


    ```

    if percentComplete >= 100 {

    GKAchievementDescription.loadAchievementDescriptions(completionHandler: { [weak
    self] achievementDescriptions, error in

    if let error = error {

    print("An error occurred while loading achievement descriptions: \(error.localizedDescription)")

    }

    achievementDescriptions?.forEach{ achievementDescription in

    if achievement.identifier == achievementDescription.identifier {

    self?.delegate?.achievementEarned(achievementDescription)

    }

    }

    })

    }

    ```


    This completes the modifications that we need to make to the `GameCenterManager`
    class. Now we need to hook up the visual feedback for the user. Move back into
    `UFOGameViewController.swift`, and add our new function `achievementEarned`. You
    could add any type of feedback here including a standard `UIAlertView`, but we
    will be exploring something a little more user friendly in this section.


    We need to create some new `IBOutlet`s as part of our `UFOGameViewController`.
    Make a new view. Then, set the background of the view to black with 70% opacity.
    We also create a new label, place it in the center of this view, and set the text
    alignment to the center. Your view should look similar to that shown in Figure
    [4-9](#216283_2_En_4_Chapter.xhtml#Fig9).


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig9_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig9_HTML.jpg)


    *Figure 4-9 Achievement earned view and label*


    First a new frame is created for the completion view, and it is then added as
    a subview to the game view.


    ```

    func achievementEarned(_ achievement: GKAchievementDescription?) {

    achievementCompletionView.frame = CGRect(x: 0, y: 320, width: 480, height: 25)

    view.addSubview(achievementCompletionView)

    achievementcompletionLabel.text = achievement?.achievedDescription

    UIView.animate(

    withDuration: 0.5,

    animations: {

    self.achievementCompletionView.frame = CGRect(x: 0, y: 295, width: 480, height:
    25)

    },

    completion: achievementEarnedAnimationDone

    )

    }

    ```


    Both of these functions are fairly straightforward. When we get a delegate callback
    from completing the achievement, we add our `achievementCompletionView` to our
    game view. Then, we animate it onto the bottom of the view. After a five-second
    delay, we animate it back off the view. You also have access to the images used
    in `GKAchievementDescription`. We will look more into these properties in the
    next section.


    **Tip:** You might need to reset your achievements to see any completion progress.
    You may find that it is helpful to create a new button that resets achievements
    for use during testing.


    If you run the app now and abduct a single cow (assuming you haven’t yet accomplished
    that achievement), you should see output very similar to that shown in Figure
    [4-10](#216283_2_En_4_Chapter.xhtml#Fig10).


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig10_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig10_HTML.jpg)


    *Figure 4-10 Achievement notification banner visible after completing a new achievement
    for the first time*'
