    Game Center uses the same delegate that we used for our invitation handler in
    Chapter [5](#216283_2_En_5_Chapter.xhtml). We will begin by modifying that existing
    function.


    The first step in setting up our app to receive data is to set the receive data
    delegate to our GameCenterManager class. We will use the GameCenterManager class
    as a filter point for passing data back into our game. While you could easily
    receive data in your Game Controller itself, if we pipe everything throughout
