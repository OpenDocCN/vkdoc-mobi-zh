- fmt: '### Watching for Touch Events


    The next aspect of the game that we need to worry about is touch events. We will
    be using a touch to initiate and control the tractor beam. The first step is overriding
    the `touchesBegan` event.


    ```

    override func touchesBegan(_ touches: Set, with event: UIEvent?) {

    currentAbductee = nil

    tractorBeamOn = true

    if gameIsMultiplayer {

    gcManager?.sendStringToAllPeers("$beginTractorBeam", reliable: true)

    }

    tractorBeamImageView?.frame = CGRect(x: (myPlayerImageView?.frame.origin.x ??
    0.0) + 25, y: (myPlayerImageView?.frame.origin.y ?? 0.0) + 10, width: 28, height:
    318)

    tractorBeamImageView?.animationDuration = 0.5

    tractorBeamImageView?.animationRepeatCount = 99999

    let imageArray = [UIImage(named: "Tractor1.png"), UIImage(named: "Tractor2.png")]

    tractorBeamImageView?.animationImages = imageArray.compactMap { $0 }

    tractorBeamImageView?.startAnimating()

    if let tractorBeamImageView = tractorBeamImageView {

    view.insertSubview(tractorBeamImageView, at: 4)

    }

    let cowImageView = hitTest()

    if let cowImageView = cowImageView {

    currentAbductee = cowImageView

    abductCow(cowImageView)

    }

    }

    ```


    We first clear out the pointer to the current abducted cow. This value should
    be `nil` already, but it is best to be diligent. We then set a BOOL for whether
    the tractor beam is on to true/yes. At this point, we need to draw the tractor
    beam. To do this, we set the frame for our `tractorBeamImageView` to where the
    player’s UFO is currently located. We will be using the same animation shortcut
    that was demoed earlier in this section to animate the tractor beam. We then add
    the tractor beam `imageView` to the main view; we use an `insertSubview` function
    here to make sure the tractor beam is below the cows but above the background.
    Then we call our `hitTest` function, which we will look at a little later in this
    chapter. If we get a result back from the `hitTest`, we call our `abductCow` function.


    Before we can move on to the `hitTest` and `abductCow` functions , we must first
    finish handling our touch events. The only other touch event that we are concerned
    with at this point is the `touchesEnded` delegate call. When the user removes
    their finger from the screen, we want to remove the tractor beam from the view
    and let the user resume their movement.


    ```

    override func touchesEnded(_ touches: Set, with event: UIEvent?) {

    tractorBeamOn = false

    if gameIsMultiplayer {

    gcManager?.sendStringToAllPeers("$endTractorBeam", reliable: true)

    }

    tractorBeamImageView?.removeFromSuperview()

    if let currentAbductee = currentAbductee {

    UIView.animate(

    withDuration: 1.0,

    delay: 0,

    options: [.curveEaseIn, .beginFromCurrentState],

    animations: {

    var frame = currentAbductee.frame

    frame.origin.y = 260

    frame.origin.x = (self.myPlayerImageView?.frame.origin.x ?? 0.0) + 15

    currentAbductee.frame = frame

    }

    )

    }

    currentAbductee = nil

    }

    ```


    Set the state variable for the `tractorBeamOn` to `NO`. Then we can remove the
    tractor beam image from the view. The next section of code drops the cow back
    to the ground (if there was one midway in the air). To do this, we just begin
    a simple animation where we return the cow to ground level. The last thing we
    need to do is reset the `currentAbductee` pointer to `nil`.


    ### Spawning and Moving Cows


    As mentioned earlier in this chapter, we also have a convenience function to spawn
    a new cow. This is the function we call from `viewDidLoad` to give the player
    a base number of cows to try and abduct; we also call this whenever we are finished
    abducting a cow.


    ```

    func spawnCow() {

    let x = Int(arc4random() % 480)

    let cowImageView = UIImageView(frame: CGRect(x: CGFloat(x), y: 260, width: 64,
    height: 42))

    cowImageView.image = UIImage(named: "Cow1.png")

    view.addSubview(cowImageView)

    cowArray?.append(cowImageView)

    }

    ```


    **Tip**


    `Arc4Random()` will return a random number the same way that `rand()` or `random()`
    will but will automatically seed itself if it is the first time it is being called.


    We create a new `imageView` that will represent the cow. We then use an `arc4Random()`
    function to produce a random x position. We set the image that the cow will be
    using and add it to the main view. The last thing we need to do here is add the
    `imageView` to our cow array. We will be using this for a hit test as well as
    updating the movement paths.


    While UFOs is not designed to be an extremely challenging game, we do want to
    add at least some aspects of difficulty to the gameplay. The following function
    will cause our cows to randomly wander around the screen:


    ```

    func updateCowPaths() {

    for x in 0..<cowArray?.count ?? 0 {

    let tempCow = cowArray?[x] as? UIImageView

    guard let currentX = tempCow?.frame.origin.x else { return }

    var newX = currentX + CGFloat(arc4random() % 100) - 50

    if newX > 480 {

    newX = 480

    }

    if newX < 0 {

    newX = 0

    }

    if tempCow != currentAbductee {

    UIView.animate(

    withDuration: 3.0,

    delay: 0,

    options: [.curveLinear],

    animations: {

    tempCow?.frame = CGRect(x: CGFloat(newX), y: 260, width: 64, height: 42)

    }

    )

    }

    tempCow?.animationDuration = 0.75

    tempCow?.animationRepeatCount = 99999

    //flip cow

    if newX < currentX {

    let flippedCowImageArray = [UIImage(named: "Cow1Reversed.png"), UIImage(named:
    "Cow2Reversed.png"), UIImage(named: "Cow3Reversed.png")]

    tempCow?.animationImages = flippedCowImageArray.compactMap { $0 }

    } else {

    let cowImageArray = [UIImage(named: "Cow1.png"), UIImage(named: "Cow2.png"), UIImage(named:
    "Cow3.png")]

    tempCow?.animationImages = cowImageArray.compactMap { $0 }

    }

    tempCow?.startAnimating()

    }

    }

    //change the paths for the cows every 3 seconds

    DispatchQueue.main.asyncAfter(deadline: .now() + 3, execute: {

    self.updateCowPaths()

    })

    }

    ```


    We will need to cycle through our array of cow objects. We do this on the first
    line of the preceding function. We then randomize a new x position for the cow.
    A quick check ensures we are not instructing the cow to walk off the screen. Then
    we commit the animation. We also need to handle the direction change for the cow.


    **Note**


    The code that we use to handle that event is not the most efficient manner of
    flipping an image, but it is the easiest to learn if you are new to this type
    of game.


    As we had previously done with the tractor beam and the UFO images, we will add
    some animation frames so the cow walks more realistically. The last thing we do
    is call `performSelector` with a delay of three seconds. This will update the
    cow’s path every three seconds, adding a more realistic appearance of random movement.'
