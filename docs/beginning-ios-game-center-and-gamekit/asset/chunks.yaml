    \ behavior infinitely, such as a river flowing or a torch flickering. These items\
    \ can also be loaded once with the information they need to stay in sync. Also\
    \ consider whether it’s important that these items are even in sync with the server;\
    \ a torch flicker might not need to be in sync on every client at once.\n\nThere\
    \ are, of course, items that will need to be updated throughout the player’s adventures\
    \ in the dungeon. The player themselves will need to be updated every time the\
    \ user performs a new action. For example, if you are running east, you could\
    \ send a packet every frame to tell the server that you are running east. However,\
    \ a much more efficient way to handle this interaction is to tell the server to\
    \ begin moving east at full speed. When you are done moving east, you should inform\
    \ the server that you want to stop. This type of interaction drastically reduces\
    \ the number of messages that need to be sent to the server to accomplish the\
    \ same task. Optimizations such as these is why, when playing modern games, you\
    \ sometimes see disconnected players running into walls—the server never received\
    \ a stop-running command before the client disconnected. These same optimizations\
    \ are why you will sometimes see a very lagged player jumping around in a bunch\
    \ of different directions.\n\nTake the time to carefully design how you will structure\
    \ your network data. You can always add more information, but it becomes very\
    \ difficult to remove data as you dig deeper into your network design. Always\
    \ look for a way to reduce packet size, as there is no downside to packets being\
    \ too small, but a packet that is too large will cause you a lot of suffering\
    \ down the road.\n\n## Prediction and Extrapolation\n\nLet’s take another example\
    \ into consideration: this time, a racing game. Each player controls a car that\
    \ is guided around a track. We know where each car is at the start of the race.\
    \ We also know that any messages we send to the server will have an inherited\
    \ latency due to the round-trip network time. Should we not update the car positions\
    \ until the server tells us to? That would result in a very choppy racing game.\
    \ To account for this very common issue, we use predictive technology.\n\nWe know\
    \ that race cars will, more than likely, continue on a current course for the\
    \ next handful of frames. We will assume things will continue doing what they\
    \ are doing until the server tells us otherwise; if the user steers slightly to\
    \ the left or right, that is a minor correction we will need to make when the\
    \ server informs us of the update. The fact that an object in motion will stay\
    \ in motion until acted on by an outside force is not just a law of physics; it\
    \ is also the first rule of designing a predictive network.\n\nThe chances of\
    \ an object completely reversing its current course are much less likely than\
    \ slightly modifying its current course. This makes it easier to account for minor\
    \ changes if the server informs you that things are out of sync. In the event\
    \ that a player does completely change direction or otherwise break your prediction\
    \ about what actions were going to continue, you are only off the mark by as much\
    \ as your current latency, which is typically only a small fraction of a second.\
    \ If you have an object that is likely to continue doing what it is doing—such\
    \ as a player moving, objects in a falling state, bullet trajectory, or any type\
    \ of physics simulation—the best bet is to continue assuming that those actions\
    \ will continue until the server informs you that they have changed.\n\n## Formatting\
    \ Messages\n\nWhenever you are dealing with designing a network for a game or\
    \ game-like application, you are guaranteed to be dealing with at least two types\
    \ of messages. These are often referred to as state messages and server messages.\
    \ A state message is a message that will directly affect your game engine, such\
    \ as a player moving or opening a chest. Server messages deal with the glue that\
    \ holds everything together, such as connections, disconnections, pings, and errors.\n\
    \nIt becomes important to quickly sort these messages to different handlers. It\
    \ is a good design pattern to keep the parsing of these messages in different\
    \ places. After all, you don’t want to be scanning all your chat messages in a\
    \ first-person shooter for client timeout messages. There are many different methods\
    \ to handle this segregation, but I have found a simple prefix is suitable for\
    \ most cases. If you prefix all of your state messages with a character that you\
    \ will not see in server messages, you can quickly check the first character in\
    \ incoming messages to make sure they are delivered to the correct parser. If\
    \ you are designing a more complex network, you can use a large number of possible\
    \ prefixes to make sure things get to the correct place. In Chapter [8](#216283_2_En_8_Chapter.xhtml),\
    \ we will look at practical examples of message formatting when we begin to send\
    \ and receive data."
  trans: "\n# 仅发送必要数据\n\n初涉网络设计时最容易犯的重大错误之一就是发送过多数据。把一切数据都发出去固然简单。本章开头提到的那个游戏就暴露了这个问题。\n\
    \n> *如果我有更多时间，就会写一封更简短的信。*\n> \n> ——布莱兹·帕斯卡\n\n这句常被误引的名言，放在网络数据包上同样贴切。数据包的大小与网络的速率、稳定性和可扩展性直接相关。花时间弄清楚究竟哪些是必须发送的数据，这一点至关重要。同样值得投入时间的是，思考如何压缩你已有的数据。\n\
    \n来看一个你设计游戏时可能会遇到的假设案例。假设你正在开发一款角色扮演游戏：玩家操控英雄，引导其闯过一系列地牢。在这些地牢中，你可以与物品互动，遭遇各种敌人，并与它们实时战斗。\n\
    \n我们知道会有一些静态数据。例如，地牢的布局在玩家身处其中时通常不会改变，因此我们不应每帧或定期将地图瓦片发送给客户端，而应在玩家首次进入该区域时发送这些数据。可能会有些元素是动态的，但我们可以无限期地预测其行为，比如流动的河流或闪烁的火把。这些元素也可以在加载时一并带上保持同步所需的信息。此外，还要考虑这些元素是否需要与服务端保持同步：火把的闪烁可能并不需要所有客户端同时同步。\n\
    \n当然，在玩家探索地牢的过程中，有些数据需要持续更新。玩家自身的数据需要在用户每次执行新操作时更新。例如，如果你正向东奔跑，你可以在每一帧都发送一个数据包，告诉服务端你正在东行。然而，更高效的处理方式是告诉服务端“以全速开始向东移动”，当你停止东行时，再通知服务端“想要停止”。这种交互方式大幅减少了完成相同任务所需发送的消息数量。正是由于这类优化，你在玩现代游戏时，有时会看到断线的玩家撞墙——因为客户端在断线前从未收到过“停止奔跑”指令。同样，由于这些优化，你有时会看到一个严重卡顿的玩家在多个不同方向之间跳来跳去。\n\
    \n花点时间仔细设计网络数据的结构。你随时可以添加更多信息，但随着网络设计的深入，想要移除数据会变得非常困难。始终寻找减小数据包大小的方法，因为数据包太小没有任何坏处，而数据包太大则会在日后给你带来诸多麻烦。\n\
    \n# 预测与外推\n\n再来看另一个例子：这次是一款赛车游戏。每位玩家控制一辆赛车在赛道上行驶。我们知道每辆车在比赛开始时的位置。同时我们也知道，由于网络往返延迟，我们发送给服务端的任何消息都会带有固有延迟。那我们是否应该等到服务端告知后才更新赛车位置？那样会导致游戏画面非常卡顿。为了解决这个常见问题，我们使用了预测技术。\n\
    \n我们知道赛车在接下来的几帧内很可能会继续沿当前路线行驶。我们假设一切事物都会保持当前状态，直到服务端告诉我们情况有变；如果用户轻微向左或向右转向，当服务端通知我们更新时，我们只需进行微小的修正。运动中的物体在不受外力作用时保持运动状态，这不仅是物理定律，也是设计预测型网络的第一条法则。\n\
    \n物体完全逆转当前运动方向的可能性，远小于其轻微改变当前运动方向的可能性。因此，如果服务端告知你某些状态已不同步，处理微小变化会更容易。万一玩家确实完全改变了方向，或者打破了你对后续动作的预测，你的偏差最多只相当于当前的延迟时间——通常只是几分之一秒。如果一个物体很可能会继续它当前的行为——例如玩家移动、下落中的物体、子弹轨迹或任何类型的物理模拟——最佳策略就是假设这些动作将持续下去，直到服务端通知你它们已发生变化。\n\
    \n# 消息格式化\n\n当你为游戏或类游戏应用设计网络时，你必然会接触到至少两种消息类型。它们通常被称为状态消息和服务端消息。状态消息是直接影响游戏引擎的消息，例如玩家移动或打开宝箱。服务端消息则处理维系整个系统运转的“粘合剂”，例如连接、断开连接、心跳检测和错误信息。\n\
    \n快速将这些消息分类到不同的处理程序非常重要。一个良好的设计模式是将这些消息的解析工作放在不同的位置。毕竟，你不会希望在处理第一人称射击游戏的聊天消息时，还要同时扫描客户端超时消息。有多种方法可以实现这种分离，但我发现使用简单的消息前缀在大多数情况下是合适的。如果你用服务端消息中不会出现的字符作为所有状态消息的前缀，那么你可以快速检查接收消息的第一个字符，确保它们被送到正确的解析器。如果你在设计更复杂的网络，可以使用大量可能的前缀来确保消息到达正确的位置。在第八章\
    \ 8 中，当我们开始收发数据时，会看到消息格式化的实际示例。\n"
- fmt: '# Preventing Cheating and Preventing Timeout-Related Disconnections


    One thing that has not become a big concern on the iOS platform, as of yet, is
    cheating through network exploits. Likewise, the Mac App Store has remained relatively
    free of cheating and abuse. If you are an online gamer, you are probably all too
    familiar with this behavior. A clever user will determine how the network behaves
    and then send commands that the client itself would never send, such as `increase
    hit points to max float` or `decrease respawn time to zero`. Although you might
    need to have your server respond to things such as `increase` or `decrease` hit
    points, you want to make sure the server is in control. For example, instead of
    letting the client say “increase moment speed to fifty,” you should set up the
    message to something like “request increase moment speed” and then have the server
    return the new speed. If you put clients in charge of variables, at some point
    someone will take advantage of this and exploit your system. When thinking through
    your network design, the best practice is to never trust the client to tell you
    the truth about the game state. You will want to remove as much dependence as
    possible on the client’s version of events or state of the world.


    If your client doesn’t have any updates to send out to the server or its peers,
    it is good practice to send a message that simply states, “I’m still here, don’t
    disconnect me,” which is known as a “keep alive” message. Although you don’t have
    to worry about timeout disconnection on the GameKit platform, it is still a good
    idea to make sure that you keep your own line of communication open between idle
    peers.


    When you are designing a message architecture, you can really think of it as designing
    an API; there are a lot of similarities, and you have to follow the same guidelines.
    If you ship version one of your app with a command that lets users query for their
    movement speed, you can’t easily pull out that command in version two because
    previous clients might still be depending on it. Follow the same guidelines that
    API developers do: test everything thoroughly because after it is out in the wild,
    it is very hard to get it back.


    ## What to Do When All Else Fails


    An issue that is bound to come up when you have been working with networks long
    enough is that of what to do when the system you have designed no longer meets
    your needs. Let’s discuss something that might be familiar to those of you who
    have taken some logic or business courses. There is a syndrome known as the “sunk
    cost fallacy,” where when dealing with nonrefundable resources, such as time,
    those costs are weighed as equally as refundable costs.


    Take a look at the following equation:


    `Payoff = project revenue – open cost`


    Now let’s look at the same example using some real-world data. In 1968, Knox and
    Inkster approached 141 horse bettors: 72 of the people had just finished placing
    a $2.00 bet within the past 30 seconds, and 69 people were about to place a $2.00
    bet within the next 30 seconds. The hypothesis was that people who had just committed
    themselves to a course of action would reduce post-decision dissonance by believing
    more strongly than ever that they had picked a winner. Knox and Inkster asked
    the bettors to rate their horse’s chances of winning on a seven-point scale. What
    they found was that people who were about to place a bet rated the chance that
    their horse would win at an average of 3.48, which corresponded to a “fair chance
    of winning,” whereas people who had just finished betting gave an average rating
    of 4.81, which corresponded to a “good chance of winning.” This hypothesis was
    confirmed: after making a $2.00 commitment, people became more confident that
    their bet would pay off. Knox and Inkster performed an ancillary test on the patrons
    of the horses themselves and managed to repeat their finding almost identically.^([¹](#fn1))


    What we are talking about is accepting when it is time to give up and start over.
    Giving up is never a popular solution; our brains are wired against it. We look
    at the nonrefundable cost and calculate that into our favor. Once you have already
    made an investment, it is easier to justify that investment and try to defend
    it. No one wants to be the person to call it quits and throw away all the time
    and money already invested into a project; however, when you spend time and resources
    on a development project, they are spent and they cannot be recouped. You cannot
    justify more time simply based on time spent.


    There is no right answer on when to give up and start over, and there is no wrong
    answer. The only thing you can do is look at the problem objectively. If you hadn’t
    already invested into this problem, what solution would you pick?


    The best approach is to always think through architecture decisions before implementing
    anything. However, it is all too often that developers spend time trying to fix
    something instead of starting over. With networking it is easy to build out a
    design, but it is much harder to change and readapt an existing solution. Sometimes
    the best course of action is to wipe the slate clean and begin anew.


    ## Summary


    In this chapter, we looked at the design of the actual network, as opposed to
    the platform-specific information that we have dealt with in the rest of this
    book so far. You could easily design a working network without the information
    in this chapter, through common sense and gut instinct, but keep in mind the lesson
    learned throughout this chapter: just because it works doesn’t mean it works well.
    Designing a network is easy; designing a network correctly is very difficult.


    There is significantly more information on network design than can easily fit
    into a single chapter, or even a single book. If I can leave you with a final
    piece of advice: when you begin to look at how to structure your network, think
    through everything as you go, and never feel the need to be satisfied with your
    first solution.


    In the next chapter, we will finally get to work with sending our messages from
    one device to another. Chapter [9](#216283_2_En_9_Chapter.xhtml) will also be
    an extension of that technology where we look into how to add voice chat services
    to your app.


    Footnotes [1](#216283_2_En_6_Chapter.xhtml#Fn1_source)


    # 7. Exchanging Data


    In a previous chapter, we explored how to connect to peers through a variety of
    methods. So far, we have not been able to do much with that connection. In this
    chapter, we will learn all that there is to know about exchanging data between
    sets of peers using GameKit and Game Center networking. We have already added
    the ability to find peers using Game Center to our UFO game. We will now add the
    ability to actually play a multiplayer match.


    Because all the groundwork has already been laid out in the previous chapters,
    there are only two items that we need to worry about in regards to exchanging
    data. First, we need to send the actual data; second, we need to receive and process
    that data on the other side. Everything else that you need to do is already done,
    except some logic for disconnecting. Let’s jump right into it by modifying our
    source code from Chapter [5](#216283_2_En_5_Chapter.xhtml).'
