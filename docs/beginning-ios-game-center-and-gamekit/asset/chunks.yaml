    \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig9_HTML.png](img/216283_2_En_3_Fig9_HTML.png)\n\
    \n*图 3-9 – 使用 Apple GUI 展示的排行榜*\n\n该 GUI 提供了一个返回按钮，可以带我们进入应用已配置的所有排行榜列表（参见图 3-10\
    \ 中的初始视图）。如果在创建 `GKLeaderboardViewController` 实例时省略了类别输入，则会显示在 App Store Connect\
    \ 中被选为默认排行榜的那个排行榜。\n\n以上就是使用 Apple GUI 创建和展示排行榜的全部内容。下一节，我们将探讨如何自定义排行榜，使其与你自己的\
    \ GUI 相匹配。\n\n> **注意**\n> 请记住，在本地用户通过身份验证之前，你无法访问任何 Game Center 功能，包括排行榜。如果尝试访问，你将收到\
    \ `GKErrorNotAuthenticated` 错误。\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig10_HTML.png](img/216283_2_En_3_Fig10_HTML.png)\n\
    \n*图 3-10 – 使用 Apple GUI 展示的排行榜集合*\n\n> **提示**\n> 你可以通过在 App Store Connect 中上下拖动排行榜条目，来更改排行榜的显示顺序（参见图\
    \ 3-10）。\n\n## 自定义排行榜\n\n正如上一节所示，向用户展示排行榜是直截了当的。但是，如果你想自定义排行榜的外观呢？在本节中，你将逐步了解如何获取原始排行榜信息，以便在应用中按照你需要的任何方式呈现它。\n\
    \n我们开始添加自定义排行榜的过程：先在 `UFOViewController` 中添加一个新按钮及其关联操作。在上一个排行榜按钮旁边添加一个新按钮，并为其创建一个新操作。\n\
    \n在上一个示例中，Apple 为我们提供了一个视图控制器。当我们处理自己的自定义排行榜时，需要创建一个视图控制器来处理展示。创建一个 `UIViewController`\
    \ 的新子类，并将其命名为 `UFOLeaderboardViewController`。修改新自定义排行榜按钮的操作，使其呈现一个新的 `UFOLeaderboardViewController`\
    \ 实例，如下面代码片段所示：\n\n```swift\n@IBAction func customLeaderboardButtonPressed() {\n\
    \    let leaderboardViewController = UFOLeaderboardViewController()\n    leaderboardViewController.gcManager\
    \ = gcManager\n    present(leaderboardViewController, animated: true)\n}\n```\n\
    \n下一步是为新的 `UFOLeaderboardViewController` 设置 storyboard。我们将使用如图 3-11 所示的设置；不过，你可以在这里进行任何你想要的定制。创建如图中所示的输出口和对象，并为所有对象连接好关联，包括表格的代理和数据源。\n\
    \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig11_HTML.jpg](img/216283_2_En_3_Fig11_HTML.jpg)\n\
    \n*图 3-11 – 为自定义排行榜创建 xib*\n\n如果此时运行应用并点击“自定义排行榜”按钮，它应该会以正确的方向启动一个空白表格，并允许你关闭它以返回第一个视图。\n\
    \n既然我们已经处理了视图控制器的开销，就可以开始专注于 Game Center 特有的功能了。首先，设置我们将要使用的表格视图代理和数据源方法。我们需要创建一个新的类属性来保存用于显示的分数数据。创建一个新的\
    \ `NSArray` 对象并将其命名为 `scoreArray`。在你的实现中添加以下两个函数：\n\n```swift\nextension UFOLeaderboardViewController:\
    \ UITableViewDataSource {\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
    \ section: Int) -> Int {\n        return scoreArray?.count ?? 0\n    }\n    \n\
    \    static let tableViewCellIdentifier = \"Cell\"\n    \n    func tableView(_\
    \ tableView: UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell\
    \ {\n        var cell = tableView.dequeueReusableCell(withIdentifier: UFOLeaderboardViewController.tableViewCellIdentifier)\n\
    \        if cell == nil {\n            cell = UITableViewCell(style: .subtitle,\
    \ reuseIdentifier: UFOLeaderboardViewController.tableViewCellIdentifier)\n   \
    \         cell?.selectionStyle = .none\n        }\n        \n        let score\
    \ = scoreArray?[indexPath.row] as? GKLeaderboard.Entry\n        let playerName\
    \ = score?.player.alias\n        \n        if playerName == nil {\n          \
    \  cell?.textLabel?.text = \"正在加载名称...\"\n        } else {\n            cell?.textLabel?.text\
    \ = playerName\n        }\n        \n        cell?.detailTextLabel?.text = score?.formattedScore\n\
    \        return cell!\n    }\n}\n```\n\n第一个函数返回表格视图中的项目数量。本例中我们只处理一个分区，因此行数始终等于数组中分数的数量。下一个函数将分数显示到单元格中。本例中我们使用了\
    \ `UITableViewCellStyleSubtitle`，但在大多数情况下，你会希望创建一个更自定义的单元格。主标签设置为玩家别名，副标签设置为格式化后的分数值。在上一章中曾指出，你永远不应向用户显示玩家\
    \ ID。\n"
- fmt: "# Modifying GameCenterManager\n\nLet’s take a moment to switch over to our\
    \ `GameCenterManager` class. We create a new function to retrieve scores from\
    \ the Game Center servers. Add the following method to the `GameCenterManager`\
    \ class:\n\n```\nstatic func retrieveScores(from leaderboard: GKLeaderboard, playerScope:\
    \ GKLeaderboard.PlayerScope, timeScope: GKLeaderboard.TimeScope, range: ClosedRange,\
    \ completion: ((GKLeaderboard.Entry?, [GKLeaderboard.Entry]?, Int, Error?) ->\
    \ ())?) {\n    leaderboard.loadEntries(for: playerScope, timeScope: timeScope,\
    \ range: NSRange(range.clamped(to: 1...100))) { (localPlayerEntry, entries, totalPlayerCount,\
    \ error) in\n        if let completion = completion {\n            completion(localPlayerEntry,\
    \ entries, totalPlayerCount, error)\n        }\n    }\n}\n```\n\nWe want to keep\
    \ this call as generic as possible because the ultimate goal of the `GameCenterManager`\
    \ class is to be a reusable class that can easily be dropped into any of your\
    \ future projects.\n\nThe preceding method takes all the arguments that are required\
    \ to create a new `GKLeaderboard` object. Once we have created the object and\
    \ set the properties that are required, we can call the method `loadScoresWithCompletionHandler`\
    \ on the `GKLeaderboard` object.\n\nThese are all the modifications that are needed\
    \ in the `GameCenterManager` class for this section.\n\n# Filtering Results on\
    \ a Custom Leaderboard\n\nLet’s shift our focus back to the `UFOLeaderboardViewController`\
    \ class again. We will next add an action for our segmented controller. This will\
    \ allow the user to switch between global scores and friends-only scores. Connect\
    \ the following method to the `valueChanged` action of the segmented controller:\n\
    \n```\n@IBAction func scopeChanged(_ sender: UISegmentedControl) {\n    scores\
    \ = []\n    if let leaderboard = GameCenterManager.leaderboard {\n        GameCenterManager.retrieveScores(from:\
    \ leaderboard, playerScope: scopeSegmentedControl.selectedSegmentIndex == 0 ?\
    \ .friendsOnly : .global, timeScope: .allTime, range: 1...50) { (localPlayerEntry,\
    \ entries, totalPlayerCount, error) in\n            if let error = error {\n \
    \               print(\"An error occurred: \\(error.localizedDescription)\")\n\
    \            } else {\n                self.scores = entries ?? []\n         \
    \   }\n            self.tableView.reloadData()\n        }\n    }\n}\n```\n\nThis\
    \ method calls the `GameCenterManager` method to retrieve our score list. The\
    \ segmented control has two values: one for friends and one for everyone (global).\
    \ You could easily modify the preceding code to retrieve different time scopes\
    \ as well, but in this example, we request only the all-time scope. An important\
    \ step here that can be easy to overlook is setting the array to an empty array\
    \ and reloading the table. Doing so will remove the scores that are in the table\
    \ when the segmented controller value is changed.\n\nThe `retrieveScores` call\
    \ is fairly straightforward. We use the category we set in App Store Connect for\
    \ the leaderboard we wish to retrieve and set our time and player scope. The last\
    \ argument on the method is a range. In the previous example, we return scores\
    \ from 1st place to 50th place.\n\n**Note**\n\nScore ranges always start at an\
    \ index of 1. You could modify the preceding example with a new range of `NSMakeRange(50,50)`;\
    \ this will retrieve scores from 50th place to 100th place. Make sure you don’t\
    \ request too many scores at a time, as the time it takes to retrieve the score\
    \ data is related to how many scores you are attempting to retrieve.\n\n## Displaying\
    \ the Custom Leaderboard\n\nIf you were to run this project now, you would notice\
    \ the table is always blank. This is caused by an omission. To rectify this, modify\
    \ the existing `IBAction` method to set the property for `gameCenterDelegate`\
    \ to the instance that exists in the `UFOViewController`. Your code should look\
    \ like the following example:\n\n```\n@IBAction func leaderboardButtonTapped(sender:\
    \ UIButton) {\n    let leaderboardController = GKGameCenterViewController(state:\
    \ .leaderboards)\n    leaderboardController.gameCenterDelegate = self\n    present(leaderboardController,\
    \ animated: true)\n}\n```\n\nIf you were to now run the app again, you would see\
    \ output similar to that shown in Figure 3-12. The number of scores, the score\
    \ values, and the player alias will be different, but you should be able to see\
    \ at least one score listed.\n\n![Figure 3-12: An initial view of our custom leaderboard](../images/216283_2_En_3_Chapter/216283_2_En_3_Fig12_HTML.jpg)\n\
    \n**Important**\n\nIt cannot be guaranteed that you will not be returned cached\
    \ data for a leaderboard request. You should assume that the data you are retrieving\
    \ is cached and might not be the most up-to-date.\n\n# Local Player Score\n\n\
    There are oftentimes that you will want to know the local players’ score on a\
    \ given leaderboard. Maybe you want to display their scores at the top of your\
    \ leaderboard, or perhaps you want to fetch a leaderboard that shows other player\
    \ scores that are close to your local player’s score. You can even want to post\
    \ an action in the game when the user has beaten their own previous high score.\n\
    \nApple has provided an easy technique for determining the local players’ score.\
    \ Once you have a reference to the leaderboard you are interested in finding a\
    \ local score for, all that needs to be done is query the property for `localPlayerScore`.\n\
    \n```\nprint(leaderboard.localPlayerScore)\n```\n\n# A Better Approach\n\nIn the\
    \ section “Posting a Score,” earlier in this chapter, we discovered how to post\
    \ new scores to Game Center. Our methodology, while simple, was not the best approach\
    \ from a user-interaction standpoint. It is now time to refactor the posting new\
    \ score code to improve usability. This approach is more complex but delivers\
    \ better performance and has less of an impact on the user.\n\nThe first thing\
    \ we need to do is move our `scoreReported` function from `UFOGameViewController`\
    \ to `UFOViewController`. We also want to modify the exit action in the `UFOViewController`\
    \ to report the score back to Game Center.\n\nThis allows us to exit the game\
    \ without waiting for a network callback from the Game Center delegate.\n\n# Game\
    \ Center Groups\n\nA more recent addition to Game Center functionality allowed\
    \ for Game Center Groups, or more succulently sharing a leaderboard or achievement\
    \ across multiple different apps. Some caveats exist and need to be considered\
    \ before moving to a Game Center Group; most notably all the apps must exist under\
    \ the state App Store Connect account; there is no way to set up a Game Center\
    \ Group between apps under different accounts.\n\nIn order to set up a new Game\
    \ Center Group, you must first launch the Game Center area of the App Store Connect\
    \ portal for the first app you want to add to the group. There is a small section\
    \ to set up a new group; see Figure 3-13.\n\n**Important**\n\nIf your app has\
    \ an existing leaderboard, their leaderboard IDs will be listed with a “grp.”\
    \ prefix. You can keep the ID the same or create a new one when setting them up.\n\
    \n![Figure 3-13: Setting up a Game Center Group](../images/216283_2_En_3_Chapter/216283_2_En_3_Fig13_HTML.jpg)\n\
    \nYou may selectively pick which leaderboards and achievements will be part of\
    \ each group, and the process is reversable to the point where you may delete\
    \ the entire group if you later desire. If your app already has existing leaderboards\
    \ (or achievements), you must decide whether to merge those items with the group\
    \ items. You may of course also create new group-specific leaderboards and achievements.\n\
    \nAll functionality of Game Center Groups is controlled via the App Store Connect\
    \ portal, and it will guide you through merging and controlling leaderboards and\
    \ achievements just as you would do with a non-group leaderboard or achievement.\n\
    \nAccessing the leaderboards from within your app is exactly the same whether\
    \ it is a group or not; you will just need the app to be part of the respected\
    \ group and reference the provided (or created) leaderboard ID."
