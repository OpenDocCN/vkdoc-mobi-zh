- fmt: "## Starting a New Game\n\nStarting a new match with turn-based gaming is a\
    \ very straightforward and simple process. To do so, you need to implement the\
    \ following function as part of the delegate. This new function dismisses the\
    \ `GKTurnBasedMatchmakerViewController` and then passes a copy of the match object\
    \ to your Game Controller. The following code snippet is the procedure we follow\
    \ for tic-tac-toe:\n\n```\nfunc turnBasedMatchmakerViewController(_ viewController:\
    \ GKTurnBasedMatchmakerViewController, didFind match: GKTurnBasedMatch) {\n  \
    \  performSegue(withIdentifier: \"PlayGame\", sender: match)\n    dismiss(animated:\
    \ true)\n}\n```\n\nThen we pass the match to the destination when the segue is\
    \ prepared.\n\n```\noverride func prepare(for segue: UIStoryboardSegue, sender:\
    \ Any?) {\n    guard\n        segue.identifier == \"PlayGame\",\n        let match\
    \ = sender as? GKTurnBasedMatch,\n        let game = segue.destination as? GameViewController\n\
    \    else { return }\n    game.match = match\n}\n```\n\nLet’s now switch attention\
    \ to the `GameViewController` class.\n\n**Important**\n\nYou are strictly limited\
    \ to passing only 4k of data with each new turn. If you cannot limit your game\
    \ data to less than 4k, you can use a URL to point to a server holding the complete\
    \ data set. Alternatively, you could pass only the delta of the game state and\
    \ store the existing data locally.\n\n```\nclass GameViewController: UIViewController\
