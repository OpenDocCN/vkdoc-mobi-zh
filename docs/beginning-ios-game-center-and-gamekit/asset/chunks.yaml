- fmt: "# Why Add Matchmaking and Invitations to Your App?\n\nWhen looking at the\
    \ list of the top ten selling PC or console games for any recent year, you will\
    \ find it heavily dominated by games that demonstrate a strong focus on multiplayer\
    \ interaction. Let’s take a quick look at the number one selling PC game for 2021,\
    \ *Call of Duty: Black Ops Cold War*. While this game does feature a single-player\
    \ mode, this is considered more of an add-on to the game as opposed to the primary\
    \ selling point. The focus was obviously the multiplayer gaming, even at the sacrifice\
    \ of the single-player campaign. In recent years, the industry’s focus has shifted\
    \ from creating rich and in-depth single-player campaigns to putting more effort\
    \ into the multiplayer. There is a perfectly reasonable answer for this new phenomenon:\
    \ you get more bang for the buck with multiplayer. This is not to say that it\
    \ is safe to ignore single-player gaming either; there is a growing demand for\
    \ single-player and couch co-op games.\n\nHumans are, by their very nature, social\
    \ creatures. We crave social interaction for healthy mental development. Video\
    \ games and other social software are increasingly becoming an outlet for that\
    \ interaction. Whether you agree with the sociology of that statement is not what\
    \ is important here, but the fact remains that multiplayer games are becoming\
    \ more and more popular. Software users have grown increasingly fond of multiplayer\
    \ interaction, be it a massive multiplayer online role-playing game or your garden\
    \ variety first-person shooter with an Internet lobby.\n\nAdding a multiplayer\
    \ element to your game can increase user playtime by a hundredfold. If you need\
    \ proof, look at *Quake III Arena* or *Unreal Tournament*, both of which were\
    \ released in 1999 and both of which still had users logging in for many years\
    \ after; there is even an active community to this day more than 20 years later.\
    \ If these games had focused solely on single player, they most likely wouldn’t\
    \ have had such a devoted fan base. Outlined here are some additional reasons\
    \ why adding matchmaking and invitations through Game Center should be a simple\
    \ business decision for your products regardless of what platform you are considering:\n\
    \n- Adding a multiplayer component to a game is a great way to add additional\
    \ polish. Depending on the type of game you are working with, it might be very\
    \ minor additional work to add a multiplayer element.\n- Users have come to expect\
    \ multiplayer from top-notch games on the App Store.\n- You can justify a higher\
    \ selling point if you have a well-done multiplayer component.\n- There is no\
    \ better way to have users download your app on the fly than the auto-buy invitation\
    \ system. If you can set up perspective users for a situation in which they are\
    \ invited to play and can purchase immediately, you will have a much better chance\
    \ of closing the sale; those new users will bring in more users themselves.\n\
    - You can increase playtime or use time in your app or game if you are using an\
    \ ad-supported system. This will result in more income. If you are selling a paid\
    \ app, users will feel like they have gotten more value for their money.\n- Humans\
    \ like to compete, so encourage your users to do what they enjoy. Multiplayer\
    \ might not be for everyone, but for many, it is all they are interested in when\
    \ shopping for a new game.\n\n> **Tip**  \n> Whenever possible, also provide your\
    \ users with a single-player option for your game, as there is still a noticeable\
    \ user base that prefers single-player campaigns.\n\n## Common Matchmaking Scenarios\n\
    \nBefore we begin working with matches and invitations themselves, it is important\
    \ to understand some of the scenarios that you might encounter in your quest to\
    \ implement multiplayer networking into your iOS app or game:\n\n- The first,\
    \ and probably most common, scenario that you could encounter would be players\
    \ who are already in your app and want to create an auto-matched game. Both players\
    \ will already have the app installed and loaded, as well as be in a place where\
    \ it is expected that they will want to begin a networked session with each other.\
    \ The invitee player will receive a notification asking whether they want to join\
    \ a game with the inviter. When both agree, the matchmaking GUI is dismissed and\
    \ a new match is created.\n- Another common scenario that you could encounter\
    \ would be if the user creates a new matchmaking event and invites other players\
    \ from their Game Center friends list. The invited friends will receive a push\
    \ notification informing them that they have been invited to a game; if they already\
    \ have the game installed and accept the invitation, the game will be launched.\
    \ Once all invited players have entered the match, the game will begin. If they\
    \ do not yet have the game installed, they will be prompted to install it, and\
    \ it will automatically be launched after it has been successfully installed.\n\
    - A slightly different event path would occur if a friend is invited and they\
    \ do not yet have the app installed and have decided to install the app. After\
    \ the installation process, the app will automatically launch, and you can continue\
    \ with the normal flow of the matchmaking event.\n- A player can also create a\
    \ new matchmaking event from within the Game Center App itself. In this scenario,\
    \ all players are launched into the app and receive an invitation to join the\
    \ match. The best part about this scenario is that if your app already supports\
    \ invitations, you don’t need to write any additional code to support this scenario.\n\
    - A player can also invite a friend or multiple friends and fill any remaining\
    \ slots with the auto-matcher. This is a mix and match of the first two scenarios,\
    \ and if support for both of them is added, you shouldn’t have any additional\
    \ programming to implement for this scenario.\n- The last scenario you could encounter\
    \ (optionally) is to programmatically auto-match players. In this case, a request\
    \ would be sent to the Game Center servers and matches would be returned for you.\
    \ The player would not see any standard GUI and you have the option to implement\
    \ your own interface.\n\n> **Note**  \n> Matchmaking can only be done between\
    \ two of the same apps. If the bundle identifier doesn’t match, the apps will\
    \ not be able to communicate over the matchmaking system."
  raw: '## Why Add Matchmaking and Invitations to Your App?


    When looking at the list of the top ten selling PC or console games for any recent
    year, you will find it heavily dominated by games that demonstrate a strong focus
    on multiplayer interaction. Let’s take a quick look at the number one selling
    PC game for 2021, *Call of Duty: Black Ops Cold War*. While this game does feature
    a single-player mode, this is considered more of an add-on to the game as opposed
    to the primary selling point. The focus was obviously the multiplayer gaming,
    even at the sacrifice of the single-player campaign. In recent years, the industry’s
    focus has shifted from creating rich and in-depth single-player campaigns to putting
    more effort into the multiplayer. There is a perfectly reasonable answer for this
    new phenomenon: you get more bang for the buck with multiplayer. This is not to
    say that it is safe to ignore single-player gaming either; there is a growing
    demand for single-player and couch co-op games.


    Humans are, by their very nature, social creatures. We crave social interaction
    for healthy mental development. Video games and other social software are increasingly
    becoming an outlet for that interaction. Whether you agree with the sociology
    of that statement is not what is important here, but the fact remains that multiplayer
    games are becoming more and more popular. Software users have grown increasingly
    fond of multiplayer interaction, be it a massive multiplayer online role-playing
    game or your garden variety first-person shooter with an Internet lobby.


    Adding a multiplayer element to your game can increase user playtime by a hundredfold.
    If you need proof, look at *Quake III Arena* or *Unreal Tournament*, both of which
    were released in 1999 and both of which still had users logging in for many years
    after; there is even an active community to this day more than 20 years later.
    If these games had focused solely on single player, they most likely wouldn’t
    have had such a devoted fan base. Outlined here are some additional reasons why
    adding matchmaking and invitations through Game Center should be a simple business
    decision for your products regardless of what platform you are considering:


    *   Adding a multiplayer component to a game is a great way to add additional
    polish. Depending on the type of game you are working with, it might be very minor
    additional work to add a multiplayer element.


    *   Users have come to expect multiplayer from top-notch games on the App Store.


    *   You can justify a higher selling point if you have a well-done multiplayer
    component.


    *   There is no better way to have users download your app on the fly than the
    auto-buy invitation system. If you can set up perspective users for a situation
    in which they are invited to play and can purchase immediately, you will have
    a much better chance of closing the sale; those new users will bring in more users
    themselves.


    *   You can increase playtime or use time in your app or game if you are using
    an ad-supported system. This will result in more income. If you are selling a
    paid app, users will feel like they have gotten more value for their money.


    *   Humans like to compete, so encourage your users to do what they enjoy. Multiplayer
    might not be for everyone, but for many, it is all they are interested in when
    shopping for a new game.


    Tip


    Whenever possible, also provide your users with a single-player option for your
    game, as there is still a noticeable user base that prefers single-player campaigns.


    ## Common Matchmaking Scenarios


    Before we begin working with matches and invitations themselves, it is important
    to understand some of the scenarios that you might encounter in your quest to
    implement multiplayer networking into your iOS app or game:


    *   The first, and probably most common, scenario that you could encounter would
    be players who are already in your app and want to create an auto-matched game.
    Both players will already have the app installed and loaded, as well as be in
    a place where it is expected that they will want to begin a networked session
    with each other. The invitee player will receive a notification asking whether
    they want to join a game with the inviter. When both agree, the matchmaking GUI
    is dismissed and a new match is created.


    *   Another common scenario that you could encounter would be if the user creates
    a new matchmaking event and invites other players from their Game Center friends
    list. The invited friends will receive a push notification informing them that
    they have been invited to a game; if they already have the game installed and
    accept the invitation, the game will be launched. Once all invited players have
    entered the match, the game will begin. If they do not yet have the game installed,
    they will be prompted to install it, and it will automatically be launched after
    it has been successfully installed.


    *   A slightly different event path would occur if a friend is invited and they
    do not yet have the app installed and have decided to install the app. After the
    installation process, the app will automatically launch, and you can continue
    with the normal flow of the matchmaking event.


    *   A player can also create a new matchmaking event from within the Game Center
    App itself. In this scenario, all players are launched into the app and receive
    an invitation to join the match. The best part about this scenario is that if
    your app already supports invitations, you don’t need to write any additional
    code to support this scenario.


    *   A player can also invite a friend or multiple friends and fill any remaining
    slots with the auto-matcher. This is a mix and match of the first two scenarios,
    and if support for both of them is added, you shouldn’t have any additional programming
    to implement for this scenario.


    *   The last scenario you could encounter (optionally) is to programmatically
    auto-match players. In this case, a request would be sent to the Game Center servers
    and matches would be returned for you. The player would not see any standard GUI
    and you have the option to implement your own interface.


    Note


    Matchmaking can only be done between two of the same apps. If the bundle identifier
    doesn’t match, the apps will not be able to communicate over the matchmaking system.'
  trans: "\n# 为何要在你的应用中添加匹配与邀请功能？\n\n查看近些年任何一年 PC 或主机游戏销量前十的榜单，你会发现榜单上绝大多数都是注重多人互动体验的游戏。我们来快速浏览一下\
    \ 2021 年销量第一的 PC 游戏《*使命召唤：黑色行动冷战*》。虽然这款游戏确实包含单人模式，但这更像是游戏的附加内容，而非主要卖点。其核心显然是多人游戏，即便为此牺牲了单人战役模式。近年来，行业的重心已从打造丰富而深刻的单人战役模式，转向了在多人游戏上投入更多精力。这一新趋势有一个非常合理的解释：投入在多人模式上的资金能带来更大的回报。不过，这并不意味着可以完全忽视单人游戏；实际上，对单人游戏和同屏合作游戏的需求正在增长。\n\
    \n人类本质上是社会性动物。我们渴望社交互动来保持健康的心理发展。电子游戏和其他社交软件正日益成为这种互动的出口。无论你是否认同这一观点中的社会学论断，但事实是多人游戏正变得越来越受欢迎。软件用户越来越喜欢多人互动，无论是大型多人在线角色扮演游戏，还是带有网络大厅的常见第一人称射击游戏，皆是如此。\n\
    \n为你的游戏添加多人元素，可以将用户的游玩时间延长百倍。如需证据，看看《*雷神之锤 III 竞技场*》或《*虚幻竞技场*》吧——这两款游戏均于 1999\
    \ 年发布，多年后仍有用户登录；甚至在 20 多年后的今天，依然有一个活跃的社区。如果这些游戏只专注于单人模式，它们很可能就不会拥有如此忠诚的粉丝群。以下列出了一些其他原因，说明为何通过\
    \ Game Center 添加匹配和邀请功能，无论你考虑何种平台，都应为你的产品做出简单明了的商业决策：\n\n-   为游戏添加多人组件是提升品质的绝佳方式。根据你正在开发的游戏类型，添加多人元素可能只需要很少的额外工作量。\n\
    -   用户已经期望 App Store 中的顶级游戏具备多人功能。\n-   如果你拥有精心制作的多人组件，就可以合理地为产品设定更高的售价。\n-  \
    \ 没有比自动购买邀请系统更能让用户即刻下载你的应用的方式了。如果你能让潜在用户处于被邀请玩游戏并可以立即购买的状态，那么你完成销售的机会就会大得多；这些新用户自己也会带来更多的用户。\n\
    -   如果你使用广告支持系统，则可以在你的应用或游戏中增加游戏时间或使用时间。这将带来更多收入。如果你销售付费应用，用户会觉得他们的钱花得更值。\n- \
    \  人类喜欢竞争，所以鼓励你的用户去做他们喜欢的事情。多人模式或许不适合所有人，但对许多人来说，这是他们在寻找新游戏时唯一感兴趣的部分。\n\n> **提示**\
    \  \n> 在可能的情况下，也为你的游戏用户提供单人游戏选项，因为依然有相当一部分用户群体偏好单人战役。\n\n## 常见的匹配场景\n\n在我们开始处理匹配和邀请本身之前，理解在尝试为你的\
    \ iOS 应用或游戏实现多人网络功能时可能遇到的一些场景非常重要：\n\n-   你可能会遇到的第一个（可能也是最常见的）场景是，玩家已经进入你的应用，并希望创建一个自动匹配的游戏。双方玩家都已安装并加载了应用，并且都处于期望与对方开始网络会话的状态。被邀请的玩家会收到一个通知，询问他们是否想与邀请者一起加入游戏。当双方都同意后，匹配\
    \ GUI 会关闭，并创建一个新的比赛。\n-   你可能会遇到的另一个常见场景是，用户创建一个新的匹配事件，并从他们的 Game Center 好友列表中邀请其他玩家。被邀请的好友会收到一个推送通知，告知他们已被邀请加入游戏；如果他们已安装游戏并接受邀请，游戏将会启动。一旦所有被邀请的玩家都进入比赛，游戏就会开始。如果他们尚未安装游戏，系统会提示他们安装，并且在安装成功后，游戏会自动启动。\n\
    -   如果被邀请的好友尚未安装应用但决定安装，则会触发一个略有不同的事件流程。安装过程结束后，应用会自动启动，然后你可以继续匹配事件的正常流程。\n- \
    \  玩家也可以直接从 Game Center 应用内部创建一个新的匹配事件。在此场景中，所有玩家都会被启动到应用中，并收到加入比赛的邀请。此场景的妙处在于，如果你的应用已经支持邀请功能，你无需编写任何额外代码来支持此场景。\n\
    -   玩家还可以邀请一个或多个好友，并通过自动匹配器填充剩余的空位。这是前两种场景的混合体，如果前两种场景的支持都已添加，那么对于此场景，你无需额外的编程工作。\n\
    -   你可能会遇到的最后一个场景（可选）是以编程方式自动匹配玩家。在这种情况下，会向 Game Center 服务器发送请求，然后会为你返回比赛结果。玩家不会看到任何标准\
    \ GUI，你可以选择实现自己的界面。\n\n> **注意**  \n> 匹配只能在同一应用的两个实例之间进行。如果 bundle identifier 不匹配，应用将无法通过匹配系统进行通信。\n"
- fmt: "# Creating a New Match Request\n\nTo create a new match, you first have to\
    \ create a new `GKMatchRequest` object. This object represents the desired parameters\
    \ for the new match that you will be creating. A `GKMatchRequest` is used both\
    \ when presenting a GUI and when creating matches programmatically. When working\
    \ with the GUI, you will pass the `GKMatchRequest` object to a new instance of\
    \ `GKMatchmakerViewController`; on the other hand, if you are handling the matchmaking\
    \ programmatically, you will pass the object to an instance of `GKMatchmaker`.\
    \ See the following sections for more details on programmatic match interaction.\
    \ For the time being, let’s focus on how to create a new match request in your\
    \ code. Take a look at the following code snippet:\n\n```\nlet request = GKMatchRequest()\n\
    request.minPlayers = 2\nrequest.maxPlayers = 2\n```\n\nThis example is the simplest\
    \ demonstration of how to create a new match. You must specify the maximum as\
    \ well as the minimum number of players. In this example, we are creating a new\
    \ request that will require exactly two players.\n\nA `GKMatchRequest` also has\
    \ a property titled `playersToInvite`, in which you can use an array of `GKPlayer`\
    \ identifiers to automatically populate into a new match. This can be very helpful\
    \ when playing multiple games that are chained back-to-back and you want to keep\
    \ the same groups of players together. This property is also prepopulated when\
    \ your app is launched from the Game Center.app with the players that invited\
    \ you into the app.\n\n> **Note:** When accepting an invite to a match with a\
    \ friend, the event is handled from the Game Center App and the `playersToInvite`\
    \ property will be populated.\n\n`GKMatchRequest` also has additional two properties\
    \ that you will be working with in later sections of this chapter. These are `playerAttributes`\
    \ and `playerGroup`. These two properties are discussed in length in the sections\
    \ that share their names.\n\n> **Note:** If you are using Game Center as your\
    \ server for hosting games, you are limited to a maximum of four players. However,\
    \ if you implement your own server as discussed in the “Using Your Own Server”\
    \ section of this chapter, you can include up to 16 players.\n\n# Presenting Match\
    \ GUI\n\nWe begin with the easiest path forward first, by working with the standard\
    \ matchmaking GUI provided to us by Apple. Start by first adding a new button\
    \ to handle presenting the view on the main screen of our test game. I have also\
    \ gone ahead and renamed the old **Play** button to **Single Player** and created\
    \ a new button called **Multiplayer** (see Figure 5-1). We will use the `UFOViewController`\
    \ to act as the delegate for our matchmaking behavior, so set the view controller\
    \ to conform to `GKMatchmakerViewControllerDelegate`. Additionally, modify the\
    \ action function of the multiplayer button we just added to match the following\
    \ code:\n\n```\n@IBAction func multiplayerButtonPressed() {\n    let request =\
    \ GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers = 2\n \
    \   guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:\
    \ request) else {\n        print(\"There was an error creating the matchmaker\
    \ view controller.\")\n        return\n    }\n    matchmakerViewController.matchmakerDelegate\
    \ = self\n    present(matchmakerViewController, animated: true)\n}\n```\n\nWe\
    \ create a new instance of `GKMatchRequest`, as we did in the previous section.\
    \ Our demo game will consist of exactly two players, so we set both the max and\
    \ the min to two.\n\n![Adding a new button for multiplayer in the UFOViewController\
    \ storyboard](images/216283_2_En_5_Chapter/216283_2_En_5_Fig1_HTML.jpg)\n\n**Figure\
    \ 5-1** – Adding a new button for multiplayer in the UFOViewController storyboard\n\
    \nIn the next part of the code snippet, we create a new instance of `GKMatchViewController`\
    \ with the `GKMatchRequest` we just created.\n\nWe also set the delegate to our\
    \ `UFOViewController` class. When that is done, we present it as we present any\
    \ other modal view. You should have output that looks similar to that pictured\
    \ in Figure 5-2.\n\nIf you haven’t already done so, now would be a good time to\
    \ populate your friends list on your sandboxed Game Center account. It is helpful\
    \ to have several unused email addresses available for this process, as you don’t\
    \ want to use any email addresses that have previously been used with iTunes Connect\
    \ or with Game Center. Once you have populated a friend or two, you can go ahead\
    \ and tap on the **Invite Friend** button pictured in Figure 5-2. You should now\
    \ see a list of your friends and have the ability to invite them into your app,\
    \ as shown in Figure 5-3.\n\n> **Reminder:** Do not use any email addresses you\
    \ have previously used in iTunes Connect or Game Center when creating sandboxed\
    \ accounts, as it can cause strange and unexpected behavior.\n\n> **Tip:** Many\
    \ email providers allow you to add a `+` to the end of your email address to act\
    \ as an alias. For example, `GameCenterRocks@Gmail.com` and `GameCenterRocks+new@Gmail.com`\
    \ both go to the same inbox, but Apple will treat them as two different email\
    \ addresses.\n\n![Inviting a friend from your Game Center friends list](images/216283_2_En_5_Chapter/216283_2_En_5_Fig3_HTML.jpg)\n\
    \n**Figure 5-3** – Inviting a friend from your Game Center friends list\n\n![MatchmakerViewController\
    \ creating a new match GUI with two players](images/216283_2_En_5_Chapter/216283_2_En_5_Fig2_HTML.jpg)\n\
    \n**Figure 5-2** – MatchmakerViewController creating a new match GUI with two\
    \ players\n\nBefore we can continue, we need to implement the required delegate\
    \ functions for the `GKMatchmakerViewController`. We need to implement the following\
    \ three functions before we can continue working with matchmaking:\n\n```\nfunc\
    \ matchmakerViewControllerWasCancelled(_ viewController: GKMatchmakerViewController)\
    \ {\n    dismiss(animated: true, completion: nil)\n}\n\nfunc matchmakerViewController(_\
    \ viewController: GKMatchmakerViewController, didFailWithError error: Error) {\n\
    \    dismiss(animated: true, completion: nil)\n    let alert = UIAlertController.init(title:\
    \ \"\", message: \"An error occurred: \\(error.localizedDescription)\", preferredStyle:\
    \ .alert)\n    let defaultAction = UIAlertAction(title: \"Dismiss\", style: .default,\
    \ handler: { action in\n        self.dismiss(animated: true, completion: nil)\n\
    \    })\n    alert.addAction(defaultAction)\n    present(alert, animated: true,\
    \ completion: nil)\n}\n\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
    \ didFind match: GKMatch) {\n    dismiss(animated: true, completion: nil)\n}\n\
    ```\n\nThe first two methods handle user cancellations and failures, while the\
    \ third method handles the successes. The last method will return a `GKMatch`\
    \ object upon success; we will use this object in the following chapters to begin\
    \ a new match.\n\nWhen working with a variable number of players allowed per match,\
    \ the user will have the option of adding and removing player slots from the matchmaker\
    \ view controller as seen in Figure 5-4. When inviting friends into a Game Center\
    \ match, you will have the option of supplying a short message to be displayed\
    \ with the invitation, as seen in Figure 5-5.\n\n![Sending an invitation method\
    \ to a friend asking them to begin a match with you. This message will be sent\
    \ as an iMessage](images/216283_2_En_5_Chapter/216283_2_En_5_Fig5_HTML.png)\n\n\
    **Figure 5-5** – Sending an invitation method to a friend asking them to begin\
    \ a match with you. This message will be sent as an iMessage\n\n![A matchmaker\
    \ screen with a variable number of players](images/216283_2_En_5_Chapter/216283_2_En_5_Fig4_HTML.jpg)\n\
    \n**Figure 5-4** – A matchmaker screen with a variable number of players"
  raw: '## Creating a New Match Request


    To create a new match, you first have to create a new GKMatchRequest object. This
    object represents the desired parameters for the new match that you will be creating.
    A GKMatchRequest is used both when presenting a GUI and when creating matches
    programmatically. When working with the GUI, you will pass the GKMatchRequest
    object to a new instance of GKMatchmakerViewController; on the other hand, if
    you are handling the matchmaking programmatically, you will pass the object to
    an instance of GKMatchmaker. See the following sections for more details on programmatic
    match interaction. For the time being, let’s focus on how to create a new match
    request in your code. Take a look at the following code snippet:


    ```

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 2

    ```


    This example is the simplest demonstration of how to create a new match. You must
    specify the maximum as well as the minimum number of players. In this example,
    we are creating a new request that will require exactly two players.


    A GKMatchRequest also has a property titled playersToInvite, in which you can
    use an array of GKPlayer identifiers to automatically populate into a new match.
    This can be very helpful when playing multiple games that are chained back-to-back
    and you want to keep the same groups of players together. This property is also
    prepopulated when your app is launched from the Game Center.app with the players
    that invited you into the app.


    Note


    When accepting an invite to a match with a friend, the event is handled from the
    Game Center App and the playersToInvite property will be populated.


    GKMatchRequest also has additional two properties that you will be working with
    in later sections of this chapter. These are playerAttributes and playerGroup.
    These two properties are discussed in length in the sections that share their
    names.


    Note


    If you are using Game Center as your server for hosting games, you are limited
    to a maximum of four players. However, if you implement your own server as discussed
    in the “Using Your Own Server” section of this chapter, you can include up to
    16 players.


    ## Presenting Match GUI


    We begin with the easiest path forward first, by working with the standard matchmaking
    GUI provided to us by Apple. Start by first adding a new button to handle presenting
    the view on the main screen of our test game. I have also gone ahead and renamed
    the old Play button to Single Player and created a new button called Multiplayer
    (see Figure [5-1](#216283_2_En_5_Chapter.xhtml#Fig1)). We will use the UFOViewController
    to act as the delegate for our matchmaking behavior, so set the view controller
    to conform to GKMatchmakerViewControllerDelegate. Additionally, modify the action
    function of the multiplayer button we just added to match the following code:


    ```

    @IBAction func multiplayerButtonPressed() {

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 2

    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:
    request) else {

    print("There was an error creating the matchmaker view controller.")

    return

    }

    matchmakerViewController.matchmakerDelegate = self

    present(matchmakerViewController, animated: true)

    }

    ```


    We create a new instance of GKMatchRequest, as we did in the previous section.
    Our demo game will consist of exactly two players, so we set both the max and
    the min to two.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig1_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig1_HTML.jpg)


    Figure 5-1


    Adding a new button for multiplayer in the UFOViewController storyboard


    In the next part of the code snippet, we create a new instance of GKMatchViewController
    with the GKMatchRequest we just created.


    We also set the delegate to our UFOViewController class. When that is done, we
    present it as we present any other modal view. You should have output that looks
    similar to that pictured in Figure [5-2](#216283_2_En_5_Chapter.xhtml#Fig2).


    If you haven’t already done so, now would be a good time to populate your friends
    list on your sandboxed Game Center account. It is helpful to have several unused
    email addresses available for this process, as you don’t want to use any email
    addresses that have previously been used with iTunes Connect or with Game Center.
    Once you have populated a friend or two, you can go ahead and tap on the Invite
    Friend button pictured in Figure [5-2](#216283_2_En_5_Chapter.xhtml#Fig2). You
    should now see a list of your friends and have the ability to invite them into
    your app, as shown in Figure [5-3](#216283_2_En_5_Chapter.xhtml#Fig3).


    Reminder


    Do not use any email addresses you have previously used in iTunes Connect or Game
    Center when creating sandboxed accounts, as it can cause strange and unexpected
    behavior.


    Tip


    Many email providers allow you to add a + to the end of your email address to
    act as an alias. For example, GameCenterRocks@Gmail.​com and GameCenterRocks+​new@Gmail.​com
    both go to the same inbox, but Apple will treat them as two different email addresses.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig3_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig3_HTML.jpg)


    Figure 5-3


    Inviting a friend from your Game Center friends list


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig2_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig2_HTML.jpg)


    Figure 5-2


    MatchmakerViewController creating a new match GUI with two players


    Before we can continue, we need to implement the required delegate functions for
    the GKMatchmakerViewController. We need to implement the following three functions
    before we can continue working with matchmaking:


    ```

    func matchmakerViewControllerWasCancelled(_ viewController: GKMatchmakerViewController)
    {

    dismiss(animated: true, completion: nil)

    }

    func matchmakerViewController(_ viewController: GKMatchmakerViewController, didFailWithError
    error: Error) {

    dismiss(animated: true, completion: nil)

    let alert = UIAlertController.init(title: "", message: "An error occurred: \(error.localizedDescription)",
    preferredStyle: .alert)

    let defaultAction = UIAlertAction(title: "Dismiss", style: .default, handler:
    { action in

    self.dismiss(animated: true, completion: nil)

    })

    alert.addAction(defaultAction)

    present(alert, animated: true, completion: nil)

    }

    func matchmakerViewController(_ viewController: GKMatchmakerViewController, didFind
    match: GKMatch) {

    dismiss(animated: true, completion: nil)

    }

    ```


    The first two methods handle user cancellations and failures, while the third
    method handles the successes. The last method will return a GKMatch object upon
    success; we will use this object in the following chapters to begin a new match.


    When working with a variable number of players allowed per match, the user will
    have the option of adding and removing player slots from the matchmaker view controller
    as seen in Figure [5-4](#216283_2_En_5_Chapter.xhtml#Fig4). When inviting friends
    into a Game Center match, you will have the option of supplying a short message
    to be displayed with the invitation, as seen in Figure [5-5](#216283_2_En_5_Chapter.xhtml#Fig5).


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig5_HTML.png](images/216283_2_En_5_Chapter/216283_2_En_5_Fig5_HTML.png)


    Figure 5-5


    Sending an invitation method to a friend asking them to begin a match with you.
    This message will be sent as an iMessage


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig4_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig4_HTML.jpg)


    Figure 5-4


    A matchmaker screen with a variable number of players'
  trans: "\n# 创建新的比赛请求\n\n要创建一场新比赛，首先需要创建一个新的 `GKMatchRequest` 对象。该对象代表了你即将创建的比赛所需的参数。无论是在展示图形界面时，还是通过编程方式创建比赛时，都会用到\
    \ `GKMatchRequest`。使用图形界面时，你需要将 `GKMatchRequest` 对象传递给 `GKMatchmakerViewController`\
    \ 的新实例；而如果你是以编程方式处理配对，则需要将该对象传递给 `GKMatchmaker` 的实例。有关编程式比赛交互的更多细节，请参考后续章节。现在，我们先将注意力集中在如何在代码中创建新的比赛请求。请看以下代码片段：\n\
    \n```\nlet request = GKMatchRequest()\nrequest.minPlayers = 2\nrequest.maxPlayers\
    \ = 2\n```\n\n这个示例是创建新比赛的最简单演示。你必须指定最大和最小玩家数量。在这个例子中，我们创建了一个恰好需要两名玩家的新请求。\n\n\
    `GKMatchRequest` 还有一个名为 `playersToInvite` 的属性，你可以使用一个 `GKPlayer` 标识符数组来自动填充到新比赛中。当你连续进行多场关联游戏，并希望保持同一组玩家时，这个属性会非常有用。此外，当你的应用通过\
    \ Game Center.app 被邀请你的玩家启动时，该属性会被预填充。\n\n> **注意：** 接受好友的比赛邀请时，事件由 Game Center\
    \ 应用处理，并且 `playersToInvite` 属性会被填充。\n\n`GKMatchRequest` 还有另外两个属性，你将在本章后续部分用到它们：`playerAttributes`\
    \ 和 `playerGroup`。这两个属性将在以其命名的章节中详细讨论。\n\n> **注意：** 如果你使用 Game Center 作为托管游戏的服务端，玩家数量上限为四人。然而，如果你按照本章“使用你自己的服务器”部分的描述实现了自己的服务器，则最多可以包含\
    \ 16 名玩家。\n\n# 展示比赛图形界面\n\n我们首先采用最简单的路径，即使用 Apple 提供的标准配对图形界面。首先添加一个新按钮，用于在测试游戏主屏幕上展示视图。我还提前把原来的\
    \ **Play**（游戏）按钮重命名为 **Single Player**（单人游戏），并创建了一个名为 **Multiplayer**（多人游戏）的新按钮（见图\
    \ 5-1）。我们将让 `UFOViewController` 类充当配对行为的委托，因此需要让视图控制器遵循 `GKMatchmakerViewControllerDelegate`\
    \ 协议。此外，修改我们刚刚添加的多人游戏按钮的动作函数，使其与以下代码匹配：\n\n```\n@IBAction func multiplayerButtonPressed()\
    \ {\n    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
    \ = 2\n    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:\
    \ request) else {\n        print(\"创建配对视图控制器时出错。\")\n        return\n    }\n \
    \   matchmakerViewController.matchmakerDelegate = self\n    present(matchmakerViewController,\
    \ animated: true)\n}\n```\n\n我们创建了一个新的 `GKMatchRequest` 实例，如同上一节所做的那样。我们的演示游戏恰好需要两名玩家，因此我们将最大值和最小值都设置为\
    \ 2。\n\n![在 UFOViewController 故事板中为多人游戏添加新按钮](img/216283_2_En_5_Fig1_HTML.jpg)\n\
    \n**图 5-1** – 在 UFOViewController 故事板中为多人游戏添加新按钮\n\n在代码片段的下一部分，我们使用刚刚创建的 `GKMatchRequest`\
    \ 创建了一个新的 `GKMatchViewController` 实例。\n\n我们还将委托设置为 `UFOViewController` 类。完成后，我们像展示其他任何模态视图一样展示它。你应该会看到类似于图\
    \ 5-2 所示的输出。\n\n如果你还没有这样做，那么现在正是填充你的沙盒 Game Center 账户好友列表的好时机。为此准备几个未使用过的电子邮件地址会很有帮助，因为你不想使用任何之前在\
    \ iTunes Connect 或 Game Center 中使用过的邮箱。一旦你添加了一两个好友，就可以继续点击图 5-2 中所示的 **Invite\
    \ Friend**（邀请好友）按钮。现在你应该能看到你的好友列表，并且能够邀请他们进入你的应用，如图 5-3 所示。\n\n> **提醒：** 创建沙盒账户时，不要使用你在\
    \ iTunes Connect 或 Game Center 中曾经使用过的任何电子邮件地址，否则可能导致奇怪且不可预期的行为。\n\n> **提示：**\
    \ 许多电子邮件提供商允许你在邮箱地址末尾添加 `+` 作为别名。例如，`GameCenterRocks@Gmail.com` 和 `GameCenterRocks+new@Gmail.com`\
    \ 都会发送到同一个收件箱，但 Apple 会将它们视为两个不同的邮箱地址。\n\n![从你的 Game Center 好友列表中邀请好友](img/216283_2_En_5_Fig3_HTML.jpg)\n\
    \n**图 5-3** – 从你的 Game Center 好友列表中邀请好友\n\n![MatchmakerViewController 为两名玩家创建新的比赛图形界面](img/216283_2_En_5_Fig2_HTML.jpg)\n\
    \n**图 5-2** – MatchmakerViewController 为两名玩家创建新的比赛图形界面\n\n在继续之前，我们需要实现 `GKMatchmakerViewController`\
    \ 必需的委托函数。在继续处理配对之前，我们需要实现以下三个函数：\n\n```\nfunc matchmakerViewControllerWasCancelled(_\
    \ viewController: GKMatchmakerViewController) {\n    dismiss(animated: true, completion:\
    \ nil)\n}\n\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
    \ didFailWithError error: Error) {\n    dismiss(animated: true, completion: nil)\n\
    \    let alert = UIAlertController.init(title: \"\", message: \"发生错误：\\(error.localizedDescription)\"\
    , preferredStyle: .alert)\n    let defaultAction = UIAlertAction(title: \"关闭\"\
    , style: .default, handler: { action in\n        self.dismiss(animated: true,\
    \ completion: nil)\n    })\n    alert.addAction(defaultAction)\n    present(alert,\
    \ animated: true, completion: nil)\n}\n\nfunc matchmakerViewController(_ viewController:\
    \ GKMatchmakerViewController, didFind match: GKMatch) {\n    dismiss(animated:\
    \ true, completion: nil)\n}\n```\n\n前两个方法处理用户取消和失败的情况，而第三个方法处理成功的情况。最后一个方法在成功时会返回一个\
    \ `GKMatch` 对象；我们将在后续章节中使用该对象来开始一场新比赛。\n\n当每场比赛允许的玩家数量可变时，用户将能够通过配对视图控制器添加或移除玩家位置，如图\
    \ 5-4 所示。在邀请好友加入 Game Center 比赛时，你可以选择提供一条简短消息与邀请一同显示，如图 5-5 所示。\n\n![向好友发送邀请消息，请求他们与你开始一场比赛。此消息将以\
    \ iMessage 形式发送](img/216283_2_En_5_Fig5_HTML.png)\n\n**图 5-5** – 向好友发送邀请消息，请求他们与你开始一场比赛。此消息将以\
    \ iMessage 形式发送\n\n![一个包含可变玩家数量的配对屏幕](img/216283_2_En_5_Fig4_HTML.jpg)\n\n**图\
    \ 5-4** – 一个包含可变玩家数量的配对屏幕\n"
- fmt: "# Handling Incoming Invitations\n\nWhen implementing matchmaking into your\
    \ app, you also have to implement a system to handle invitations from friends.\
    \ The invitee’s device will receive a push notification informing them that one\
    \ of their friends has invited them to play a game. Assuming they have the game\
    \ installed and accept the invitation, you will be required to handle connecting\
    \ the two players together via a new match. If the invitee does not have the game\
    \ or app installed, they will be prompted to download it. After the download is\
    \ finished, the normal invitation process is followed.\n\n**Note**  \nYou will\
    \ also need to process invitations from new matches created within Game Center.\
    \ You most likely won’t need to write any additional code; however, you do want\
    \ to thoroughly test this interaction path.\n\nWe will process invitations using\
    \ an invitation handler (special thanks to Apple for the naming). Two distinct\
    \ delegate methods of the `GKInviteEventListener` protocol will handle the invite\
    \ process.\n\n**Important**  \nWhen working with the sandboxed mode and invitations,\
    \ there can be some quirkiness. If you find yourself never getting the invited\
    \ push notification, open up the app on both devices and invite the other player\
    \ on both devices. After this has been done once, it normally restores the ability\
    \ to test invitations from the springboard.\n\nNow that we know what kind of parameters\
    \ that we will be working with, as well as the scenarios that we will encounter,\
    \ we can begin to write a new invitation handler. To keep things clean and simple,\
    \ we wrap our invitation handler in its own method in our `GameCenterManager`\
    \ class. Add the following new method to `GameCenterManager`:\n\n```\npublic func\
    \ player(_ player: GKPlayer, didAccept invite: GKInvite) {\n    guard let matchmakerViewController\
    \ = GKMatchmakerViewController(invite: invite) else {\n        print(\"There was\
    \ an error creating the matchmaker view controller.\")\n        return\n    }\n\
    \    matchmakerViewController.matchmakerDelegate = self\n    present(matchmakerViewController,\
    \ animated: true)\n}\n\npublic func player(_ player: GKPlayer, didRequestMatchWithRecipients\
    \ recipientPlayers: [GKPlayer]) {\n    let request = GKMatchRequest()\n    request.minPlayers\
    \ = 2\n    request.maxPlayers = 2\n    request.recipients = recipientPlayers\n\
    \    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:\
    \ request) else {\n        print(\"There was an error creating the matchmaker\
    \ view controller.\")\n        return\n    }\n    matchmakerViewController.matchmakerDelegate\
    \ = self\n    present(matchmakerViewController, animated: true)\n}\n```\n\nLet’s\
    \ break down these functions to see exactly what is happening at each step of\
    \ the process. The first thing we do is create the `GKMatchmakerViewController`\
    \ with the incoming invite object. The delegate for the matchmaker is set to `self`\
    \ and the interface is presented to the user.\n\n**Important**  \nYou cannot accept\
    \ or otherwise process an invitation formally until you have authenticated a local\
    \ user with Game Center. It is, therefore, important to register an invitation\
    \ handler as soon after a successful authentication as possible.\n\nBecause we\
    \ want this to be called as soon as possible after authenticating with Game Center,\
    \ we add a call to our new method after we have successfully authenticated. Modify\
    \ the `processGameCenterAuthentication` method of `UFOViewController` to match\
    \ the following one:\n\n```\nfunc processGameCenterAuthentication(_ error: Error?)\
    \ {\n    if let error = error {\n        print(\"An error occurred during authentication:\
    \ \\(error.localizedDescription)\")\n    }\n}\n```\n\n**Tip**  \nIf you don’t\
    \ have two devices to test invitations on, you can use the simulator as one of\
    \ the devices. Don’t forget to sign in to the simulator and your device from two\
    \ different Game Center accounts, or you won’t be able to invite each other.\n\
    \nWe will use `self` (`UFOViewController`) as the delegate for our invitation\
    \ handler. If you completed the required delegate calls in the last section, “Presenting\
    \ Match GUI,” you will not need to make any additional changes to this class.\n\
    \nCongratulations! You can now handle incoming invitations to your app. In the\
    \ next section, we will explore how to configure auto-matching to populate invitees\
    \ for you.\n\n**Note**  \nThe buy now feature of invitations cannot be tested\
    \ in the sandboxed environment; it can be used only in live apps. The app must\
    \ be installed on every device being used in order to test invitations while in\
    \ sandbox.\n\n# Auto-Matching\n\nAuto-matching is a great feature provided to\
    \ you for no extra work when working with Game Center. Game Center keeps an online\
    \ queue of people who are waiting to join a multiplayer game in your app. If you\
    \ do not fill up a new match request with all invited friends, the auto-matching\
    \ feature will automatically populate the remaining spots with other unmatched\
    \ players online.\n\nKeep in mind that auto-matching is only as useful as your\
    \ game is popular; if you do not have a large enough player base to support auto-matching,\
    \ users will try to join a game for a few moments then exit out when they aren’t\
    \ matched.\n\nYou can filter down the auto-matched results using player groups\
    \ and player attributes, which will be discussed later in this chapter. In addition,\
    \ you can query the activity of any live player group to see what the average\
    \ wait time is to be paired up with a new match; this is also discussed more in\
    \ a later section.\n\n# Matching Programmatically\n\nIt is also possible for your\
    \ app to find matches programmatically without using the matchmaker interface.\
    \ You could use this methodology to implement your own custom GUI for matchmaking\
    \ or create an “instant match” type action, in which users are automatically paired\
    \ and a game begins with no additional user interaction. We will not be using\
    \ this style of matchmaking in our demo app, but the following method will allow\
    \ you to implement a match programmatically:\n\n```\nfunc findProgrammaticMatch()\
    \ {\n    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
    \ = 4\n    GKMatchmaker.shared().findMatch(for: request, withCompletionHandler:\
    \ { match, error in\n        if let error = error {\n            print(\"An error\
    \ occurred during finding a match: \\(error.localizedDescription)\")\n       \
    \ } else if let match = match {\n            print(\"A match has been found: \\\
    (match)\")\n        }\n    })\n}\n```\n\nThe preceding is fairly straightforward.\
    \ We create a new `GKMatchRequest` and set the minimum players to two, as well\
    \ as set the maximum players to four. We then call a new method, `findMatch`,\
    \ and pass in a copy of our new `GKMatchRequest` object. This will call our block\
    \ when a match is found, so it might be a good idea to provide an activity indicator\
    \ if a match isn’t returned quickly. After you have a `GKMatch`, you can begin\
    \ a new multiplayer game, as discussed in the following chapters.\n\nWhen working\
    \ with programmatically added matches, it is important to allow users a way to\
    \ cancel the match request if it is taking too long or if they have changed their\
    \ minds. That action can be accomplished with the following line of code:\n\n\
    ```\nGKMatchmaker.shared().cancel()\n```"
  raw: '## Handling Incoming Invitations


    When implementing matchmaking into your app, you also have to implement a system
    to handle invitations from friends. The invitee’s device will receive a push notification
    informing them that one of their friends has invited them to play a game. Assuming
    they have the game installed and accept the invitation, you will be required to
    handle connecting the two players together via a new match. If the invitee does
    not have the game or app installed, they will be prompted to download it. After
    the download is finished, the normal invitation process is followed.


    Note


    You will also need to process invitations from new matches created within Game
    Center. You most likely won’t need to write any additional code; however, you
    do want to thoroughly test this interaction path.


    We will process invitations using an invitation handler (special thanks to Apple
    for the naming). two distinct delegate methods of the GKInviteEventListener protocol
    will handle the invite process.


    Important


    When working with the sandboxed mode and invitations, there can be some quirkiness.
    If you find yourself never getting the invited push notification, open up the
    app on both devices and invite the other player on both devices. After this has
    been done once, it normally restores the ability to test invitations from the
    springboard.


    Now that we know what kind of parameters that we will be working with, as well
    as the scenarios that we will encounter, we can begin to write a new invitation
    handler. To keep things clean and simple, we wrap our invitation handler in its
    own method in our GameCenterManager class. Add the following new method to GameCenterManager:


    ```

    public func player(_ player: GKPlayer, didAccept invite: GKInvite) {

    guard let matchmakerViewController = GKMatchmakerViewController(invite: invite)
    else {

    print("There was an error creating the matchmaker view controller.")

    return

    }

    matchmakerViewController.matchmakerDelegate = self

    present(matchmakerViewController, animated: true)

    }

    public func player(_ player: GKPlayer, didRequestMatchWithRecipients recipientPlayers:
    [GKPlayer]) {

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 2

    request.recipients = recipientPlayers

    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:
    request) else {

    print("There was an error creating the matchmaker view controller.")

    return

    }

    matchmakerViewController.matchmakerDelegate = self

    present(matchmakerViewController, animated: true)

    }

    ```


    Let’s break down these functions to see exactly what is happening at each step
    of the process. The first thing we do is create the `GKMatchmakerViewController`
    with the incoming invite object. The delegate for the matchmaker is set to self
    and the interface is presented to the user.


    Important


    You cannot accept or otherwise process an invitation formally until you have authenticated
    a local user with Game Center. It is, therefore, important to register an invitation
    handler as soon after a successful authentication as possible.


    Because we want this to be called as soon as possible after authenticating with
    Game Center, we add a call to our new method after we have successfully authenticated.
    Modify the processGameCenterAuthentication method of UFOViewController to match
    the following one:


    ```

    func processGameCenterAuthentication(_ error: Error?) {

    if let error = error {

    print("An error occurred during authentication: \(error.localizedDescription)")

    }

    }

    ```


    Tip


    If you don’t have two devices to test invitations on, you can use the simulator
    as one of the devices. Don’t forget to sign in to the simulator and your device
    from two different Game Center accounts, or you won’t be able to invite each other.


    We will use self (UFOViewController) as the delegate for our invitation handler.
    If you completed the required delegate calls in the last section, “Presenting
    Match GUI,” you will not need to make any additional changes to this class.


    Congratulations! You can now handle incoming invitations to your app. In the next
    section, we will explore how to configure auto-matching to populate invitees for
    you.


    Note


    The buy now feature of invitations cannot be tested in the sandboxed environment;
    it can be used only in live apps. The app must be installed on every device being
    used in order to test invitations while in sandbox.


    ## Auto-Matching


    Auto-matching is a great feature provided to you for no extra work when working
    with Game Center. Game Center keeps an online queue of people who are waiting
    to join a multiplayer game in your app. If you do not fill up a new match request
    with all invited friends, the auto-matching feature will automatically populate
    the remaining spots with other unmatched players online.


    Keep in mind that auto-matching is only as useful as your game is popular; if
    you do not have a large enough player base to support auto-matching, users will
    try to join a game for a few moments then exit out when they aren’t matched.


    You can filter down the auto-matched results using player groups and player attributes,
    which will be discussed later in this chapter. In addition, you can query the
    activity of any live player group to see what the average wait time is to be paired
    up with a new match; this is also discussed more in a later section.


    ## Matching Programmatically


    It is also possible for your app to find matches programmatically without using
    the matchmaker interface. You could use this methodology to implement your own
    custom GUI for matchmaking or create an “instant match” type action, in which
    users are automatically paired and a game begins with no additional user interaction.
    We will not be using this style of matchmaking in our demo app, but the following
    method will allow you to implement a match programmatically:


    ```

    func findProgrammaticMatch() {

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 4

    GKMatchmaker.shared().findMatch(for: request, withCompletionHandler: { match,
    error in

    if let error = error {

    print("An error occurred during finding a match: \(error.localizedDescription)")

    } else if let match = match {

    print("A match has been found: \(match)")

    }

    })

    }

    ```


    The preceding is fairly straightforward. We create a new GKMatchRequest and set
    the minimum players to two, as well as set the maximum players to four. We then
    call a new method, `findMatch,` and pass in a copy of our new GKMatchRequest object.
    This will call our block when a match is found, so it might be a good idea to
    provide an activity indicator if a match isn’t returned quickly. After you have
    a GKMatch, you can begin a new multiplayer game, as discussed in the following
    chapters.


    When working with programmatically added matches, it is important to allow users
    a way to cancel the match request if it is taking too long or if they have changed
    their minds. That action can be accomplished with the following line of code:


    ```

    GKMatchmaker.shared().cancel()

    ```'
  trans: "\n# 处理收到的邀请\n\n在你的应用中实现玩家匹配功能时，还需要实现一个处理好友邀请的系统。被邀请的设备会收到推送通知，告知他们有好友邀请他们一起玩游戏。假设他们已经安装了游戏并接受了邀请，你需要通过建立新的比赛来连接两位玩家。如果被邀请者尚未安装该应用或游戏，系统会提示他们进行下载。下载完成后，将按照正常的邀请流程处理。\n\
    \n**注意**  \n你还需要处理来自 Game Center 中新建比赛的邀请。大概率无需编写任何额外代码；不过，建议你彻底测试这一交互路径。\n\n\
    我们将通过邀请处理器（特别感谢 Apple 的命名）来处理邀请。`GKInviteEventListener` 协议中的两个不同的委托方法将负责处理邀请流程。\n\
    \n**重要**  \n在沙盒模式下处理邀请时，可能会遇到一些怪异情况。如果你发现自己始终收不到邀请推送通知，可以在两台设备上都打开应用，并让双方互相邀请对方。完成一次这个操作后，通常就能恢复从桌面发起邀请测试的功能。\n\
    \n既然我们已经了解了需要处理的参数类型以及可能遇到的各种场景，就可以开始编写新的邀请处理器了。为保持简洁清晰，我们在 `GameCenterManager`\
    \ 类中将其封装成一个独立方法。请在 `GameCenterManager` 中添加以下新方法：\n\n```\npublic func player(_\
    \ player: GKPlayer, didAccept invite: GKInvite) {\n    guard let matchmakerViewController\
    \ = GKMatchmakerViewController(invite: invite) else {\n        print(\"创建匹配视图控制器时出错。\"\
    )\n        return\n    }\n    matchmakerViewController.matchmakerDelegate = self\n\
    \    present(matchmakerViewController, animated: true)\n}\n\npublic func player(_\
    \ player: GKPlayer, didRequestMatchWithRecipients recipientPlayers: [GKPlayer])\
    \ {\n    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
    \ = 2\n    request.recipients = recipientPlayers\n    guard let matchmakerViewController\
    \ = GKMatchmakerViewController(matchRequest: request) else {\n        print(\"\
    创建匹配视图控制器时出错。\")\n        return\n    }\n    matchmakerViewController.matchmakerDelegate\
    \ = self\n    present(matchmakerViewController, animated: true)\n}\n```\n\n我们来逐步解析这两个函数，看看每一步具体做了什么。首先，我们使用传入的邀请对象创建了\
    \ `GKMatchmakerViewController`。将匹配处理器的委托设置为 `self`，并将界面展示给用户。\n\n**重要**  \n在通过\
    \ Game Center 完成本地用户身份验证之前，你无法正式接受或处理邀请。因此，在验证成功后，尽快注册邀请处理器非常重要。\n\n由于我们希望验证成功后能尽快调用此方法，因此在完成身份验证后添加了对这个新方法的调用。请修改\
    \ `UFOViewController` 中的 `processGameCenterAuthentication` 方法，使其与下列代码一致：\n\n```\n\
    func processGameCenterAuthentication(_ error: Error?) {\n    if let error = error\
    \ {\n        print(\"身份验证期间发生错误：\\(error.localizedDescription)\")\n    }\n}\n\
    ```\n\n**提示**  \n如果没有两台设备来测试邀请，可以使用模拟器作为其中一台设备。别忘了用两个不同的 Game Center 账号分别登录模拟器和你的设备，否则双方无法互相邀请。\n\
    \n我们会将自身上下文对象（`UFOViewController`）作为邀请处理器的委托。如果你已经按照上一节《展示匹配界面》的要求完成了必需的委托调用，则无需再对该类进行其他修改。\n\
    \n恭喜！你现在已经能够处理应用收到的邀请。在下一节中，我们将探讨如何配置自动匹配功能，以便为你自动填充被邀请者。\n\n**注意**  \n邀请的“立即购买”功能无法在沙盒环境中测试，仅能在正式版应用中使用。在沙盒环境下测试邀请时，每台测试设备都必须安装该应用。\n\
    \n# 自动匹配\n\n在使用 Game Center 时，自动匹配是一项无需额外工作即可享用的优秀功能。Game Center 会维护一个在线队列，记录等待加入你应用中多人游戏的玩家。如果你在新建比赛请求中没有填满所有受邀好友，自动匹配功能将自动用其他在线未匹配玩家填充剩余空位。\n\
    \n请记住，自动匹配的效果完全取决于你游戏的热度；如果你没有足够多的玩家基础来支持自动匹配，用户可能会尝试加入游戏，但在等待片刻后因未能匹配成功而退出。\n\
    \n你可以使用玩家分组和玩家属性来筛选自动匹配的结果，这些内容将在本章后续部分讨论。此外，你还可以查询任何活跃玩家分组的活动情况，以了解匹配新对手的平均等待时间，这部分内容也将在后面章节中进一步讨论。\n\
    \n# 程序化匹配\n\n你的应用也可以在不使用匹配界面的情况下，以编程方式寻找比赛。你可以利用这种方法实现自定义的匹配界面，或者创建“即时匹配”类型的操作，让用户自动配对并直接开始游戏，无需其他用户交互。我们的演示应用不会使用这种匹配方式，但以下方法可以帮助你以编程方式实现匹配：\n\
    \n```\nfunc findProgrammaticMatch() {\n    let request = GKMatchRequest()\n  \
    \  request.minPlayers = 2\n    request.maxPlayers = 4\n    GKMatchmaker.shared().findMatch(for:\
    \ request, withCompletionHandler: { match, error in\n        if let error = error\
    \ {\n            print(\"寻找匹配过程中发生错误：\\(error.localizedDescription)\")\n     \
    \   } else if let match = match {\n            print(\"已找到匹配：\\(match)\")\n  \
    \      }\n    })\n}\n```\n\n上述代码非常简单。我们创建了一个新的 `GKMatchRequest`，并将最小玩家数设为两人，最大玩家数设为四人。然后调用一个新方法\
    \ `findMatch`，并传入我们新建的 `GKMatchRequest` 对象副本。当找到匹配时，会调用这个闭包；因此，如果匹配结果没有及时返回，最好显示一个活动指示器。获得\
    \ `GKMatch` 对象后，就可以按照后续章节所述开始一个新的多人游戏了。\n\n在使用程序化添加的匹配时，如果匹配耗时过长或用户改变了主意，务必为用户提供取消匹配请求的途径。可通过以下代码行实现这一操作：\n\
    \n```\nGKMatchmaker.shared().cancel()\n```\n"
- fmt: '# Adding a Player to a Match


    There might be occasions in which you will want to add a new player to a match
    after it has already been created. For example, maybe you have a player drop from
    a game and want to replace him without starting the game over, or a player fails
    to connect after a game starts and you want to substitute in a replacement. The
    following function will automatically add a new player to the match using the
    auto-matching behavior:


    ```

    func addPlayer(to match: GKMatch?, with request: GKMatchRequest?) {

    if let match = match, let request = request {

    GKMatchmaker.shared().addPlayers(to: match, matchRequest: request, completionHandler:
    { error in

    if let error = error {

    print("An error occurred during adding a player to match: \(error.localizedDescription)")

    } else {

    print("A player has been added to the match")

    }

    })

    }

    }

    ```


    After a player has been added to a match, you will need to sync that player up
    with the current match. Adding a player will now allow the player to receive and
    send data, but they will not have any access to data that has already been sent
    through the match.


    # Reinvites


    Game Center has the ability to automatically try to reinvite a disconnected player.
    This method is only supported in two-person Game Center matches. The following
    function is called when a player is disconnected; Game Center will automatically
    try to reconnect to that player. If successful, you will receive an additional
    call to `match(_:player:didChange:)`:


    ```

    func match(_ match: GKMatch, shouldReinviteDisconnectedPlayer player: GKPlayer)
    -> Bool {

    true

    }

    ```


    # Player Groups


    Player groups allow you to specify different classifications for each player.
    Game Center, by default, auto-matches everyone into the same group. With player
    groups, you can specify that certain players are looking for groups that contain
    only other players of that group.


    For example, players who want to play a certain level of dungeon or a specific
    race track will be grouped together, so they are paired up with other people who
    want to play that same level. Player groups can be used to segregate players into
    many different types of groupings, such as the following:


    - Players who wish to play the same level of a map (such as a race course), area
    in an RPG, map in a first-person shooter, or level in an action game.


    - Separate players based on skill level. Either have players choose the skill
    level that they wish to play at, or automatically determine their skill level
    based on past performance or previous win streaks.


    - Type of game that is being played. For example, players can be broken down into
    who wants to play Capture the Flag, Team Deathmatch, Domination, or Last Man Standing.


    - Players of the same Clan, Guild, Team, or Network who want to play together.


    - Players who have purchased additional in-app content and can no longer be paired
    up with those who do not have the same content available for any reason.


    A player group isn''t restricted to these items and can be used to group players
    together in whatever fashion meets the needs of your app. A player group is represented
    by the `playerGroup` property on a `GKMatchRequest`. The only restriction placed
    on this property is that it must be represented by an `Int`. Specifying a `playerGroup`
    is rather straightforward, as seen in the following code snippet:


    ```

    let myForestMap = 123456789

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 4

    request.playerGroup = myForestMap

    ```


    Under most circumstances, you will want to let your users select the `playerGroup`
    that they belong to; however, there might be instances in which this is not true,
    such as automatically determining a player''s skill level.


    **Caution:** After you set `playerGroup` to any nonzero value, players will only
    be matched with other players of that group.


    # Player Attributes


    Like player groups, player attributes are used during matchmaking to narrow down
    the possible available games to the user. Player attributes, which generally function
    the same as player groups, do handle some things in a different manner. Some of
    the many uses for player attributes include the following:


    - Often, in role-playing games, characters pick a class. It is common to require
    a group of multiple classes—such as a healer, a fighter, and a mage—in order to
    complete a quest.


    - Sports games often have various positions on a team, such as goalkeeper, fullback,
    midfielder, and forward. A team will require a mix of all of these to be able
    to play.


    - In a submarine simulator game, you could also have various players, such as
    a captain, sonar operator, pilot, and weapons systems.


    - In a first-person shooter game, you could need players in roles such as close-quarter
    combat specialist, sniper, medic, and platoon leader.


    ## Understanding Player Attribute Limitations


    Player attributes can be used to assign these values to each player so that you
    can balance a team that contains the required players. However, there are a number
    of limitations when using player attributes; it is important that you familiarize
    yourself with them before you begin working with player attributes:


    - Only a single player may fill a role. For example, you cannot require three
    midfielders in a soccer game.


    - All roles must be filled before the game is considered ready to start. For example,
    you can''t have a first-person shooter without a sniper (based on the preceding
    example).


    - Each player can fill only one role at a time; players cannot offer to join a
    game in a position that would fill more than one role. For example, you couldn''t
    have a player in a first-person shooter willing to play either a sniper or a medic;
    they will need to pick one before the match request is finalized.


    - Player attributes are used during auto-matching. If you invite a friend into
    a game, they are not tested to see whether they match the role that needs to be
    filled. Instead, they will automatically be assigned a random, unassigned role.
    In short, friends do not get to pick their player attributes.


    - Roles are not displayed anywhere in the standard matchmaking graphical user
    interface. You will need to implement your own system prior to entering this view
    to allow users to select their roles.


    - The `GKMatch` object does not contain information about which players have been
    assigned which roles. You will need to implement your own system after the match
    is connected to determine who is playing which role.


    - There is no system in place to determine which roles are overfilled or which
    are harder to find matches for. For example, everyone might want to play a mage
    in a role-playing game and no one might want to be a healer; therefore, it would
    be much harder for a mage to find an open game, while a healer can easily find
    one.'
  raw: '## Adding a Player to a Match


    There might be occasions in which you will want to add a new player to a match
    after it has already been created. For example, maybe you have a player drop from
    a game and want to replace him without starting the game over, or a player fails
    to connect after a game starts and you want to substitute in a replacement. The
    following function will automatically add a new player to the match using the
    auto-matching behavior:


    ```

    func addPlayer(to match: GKMatch?, with request: GKMatchRequest?) {

    if let match = match, let request = request {

    GKMatchmaker.shared().addPlayers(to: match, matchRequest: request, completionHandler:
    { error in

    if let error = error {

    print("An error occurred during adding a player to match: \(error.localizedDescription)")

    } else {

    print("A player has been added to the match")

    }

    })

    }

    }

    ```


    After a player has been added to a match, you will need to sync that player up
    with the current match. Adding a player will now allow the player to receive and
    send data, but they will not have any access to data that has already been sent
    through the match.


    ## Reinvites


    Game Center has the ability to automatically try to reinvite a disconnected player.
    This method is only supported in two-person Game Center matches. The following
    function is called when a player is disconnected; Game Center will automatically
    try to reconnect to that player. If successful, you will receive an additional
    call to **match(_:player:didChange:)**:


    ```

    func match(_ match: GKMatch, shouldReinviteDisconnectedPlayer player: GKPlayer)
    -> Bool {

    true

    }

    ```


    ## Player Groups


    Player groups allow you to specify different classifications for each player.
    Game Center, by default, auto-matches everyone into the same group. With player
    groups, you can specify that certain players are looking for groups that contain
    only other players of that group.


    For example, players who want to play a certain level of dungeon or a specific
    race track will be grouped together, so they are paired up with other people who
    want to play that same level. Player groups can be used to segregate players into
    many different types of groupings, such as the following:


    *   Players who wish to play the same level of a map (such as a race course),
    area in an RPG, map in a first-person shooter, or level in an action game.


    *   Separate players based on skill level. Either have players choose the skill
    level that they wish to play at, or automatically determine their skill level
    based on past performance or previous win streaks.


    *   Type of game that is being played. For example, players can be broken down
    into who wants to play Capture the Flag, Team Deathmatch, Domination, or Last
    Man Standing.


    *   Players of the same Clan, Guild, Team, or Network who want to play together.


    *   Players who have purchased additional in-app content and can no longer be
    paired up with those who do not have the same content available for any reason.


    A player group isn’t restricted to these items and can be used to group players
    together in whatever fashion meets the needs of your app. A player group is represented
    by the playerGroup property on a GKMatchRequest. The only restriction placed on
    this property is that it must be represented by an Int. Specifying a playerGroup
    is rather straightforward, as seen in the following code snippet:


    ```

    let myForestMap = 123456789

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 4

    request.playerGroup = myForestMap

    ```


    Under most circumstances, you will want to let your users select the playerGroup
    that they belong to; however, there might be instances in which this is not true,
    such as automatically determining a player’s skill level.


    Caution


    After you set playerGroup to any nonzero value, players will only be matched with
    other players of that group.


    ## Player Attributes


    Like player groups, player attributes are used during matchmaking to narrow down
    the possible available games to the user. Player attributes, which generally function
    the same as player groups, do handle some things in a different manner. Some of
    the many uses for player attributes include the following:


    *   Often, in role-playing games, characters pick a class. It is common to require
