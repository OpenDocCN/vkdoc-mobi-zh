    ) ?? false {\n    let enemyScore = Float(dataDictionary[\"data\"]?.replacingOccurrences(of:\
    \ \"$score:\", with: \"\") ?? \"\") ?? 0.0\n    enemeyScoreLabel.text = String(format:\
    \ \"ENEMY %05.0f\", enemyScore)\n}\n```\n\n**提示**  \n从技术上讲，你无需在网络调用中传递分数值，因为分数总是每次增加\
    \ 1；我们可以假设收到新的分数消息就意味着将数值加 1。\n\n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig3_HTML.jpg](img/216283_2_En_7_Fig3_HTML.jpg)\n\
    \n**图 7-3** – 为网络玩家添加分数\n\n**练习**  \n当任何一名玩家得分达到十分时，添加逻辑来宣布游戏获胜者会非常容易。尝试自己将这一逻辑添加到游戏中。\n"
