    \ \"Tractor2.png\")]\n    tractorBeamImageView?.animationImages = imageArray.compactMap\
    \ { $0 }\n    tractorBeamImageView?.startAnimating()\n    if let tractorBeamImageView\
    \ = tractorBeamImageView {\n        view.insertSubview(tractorBeamImageView, at:\
    \ 4)\n    }\n    let cowImageView = hitTest()\n    if let cowImageView = cowImageView\
    \ {\n        currentAbductee = cowImageView\n        abductCow(cowImageView)\n\
    \    }\n}\n\noverride func touchesEnded(_ touches: Set, with event: UIEvent?)\
    \ {\n    tractorBeamOn = false\n    if gameIsMultiplayer {\n        gcManager?.sendStringToAllPeers(\"\
    $endTractorBeam\", reliable: true)\n    }\n    tractorBeamImageView?.removeFromSuperview()\n\
    \    if let currentAbductee = currentAbductee {\n        UIView.animate(\n   \
    \         withDuration: 1.0,\n            delay: 0,\n            options: [.curveEaseIn,\
    \ .beginFromCurrentState],\n            animations: {\n                var frame\
