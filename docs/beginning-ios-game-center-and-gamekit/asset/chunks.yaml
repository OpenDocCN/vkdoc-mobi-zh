    print("You must authenicate first")

    }

    }

    ```


    This method will call back to friendsFinishedLoading when the data has been fully
    retrieved. In the following code snippet, you can see an implementation of what
    that function might look like:


    ```

    func friendsFinishedLoading(_ friends: [GKPlayer]?, error: Error?) {

    if let error = error {

    print("An error occured during friends list request: \(error.localizedDescription)")

    } else if let friends = friends {

    playerDataLoaded(friends, error: error)

    }

    }

    ```


    Once the data has been loaded from the server, a final function is implemented
    to print that data to the console.


    ```

    func playerDataLoaded(_ players: [GKPlayer]?, error: Error?) {

    if let error = error {

    print("An error occured during player lookup: \(error.localizedDescription)")

    } else {

    print("Players loaded: \(players ?? [])")

    }

    }

    ```


    ## Working with Players


    At the heart of Game Center is a social service, and as such, it revolves around
    players be it challenges, multiplayer, leaderboards, or competing for achievements.
    You need to be aware of properties associated with a GKPlayer object. Three properties
    handle the name of the player, gamePlayerID, and teamPlayerID, which are unique
    identifiers that will refer to a player. The gamePlayerID is static and will always
    point to the same player for the same game, while teamPlayerID is unique to the
    player across all games from your developer account. The teamPlayerID therefore
    allows you to identify a player across multiple apps and can be very powerful
    for marketing and cross-promotion. The gamePlayerID and teamPlayerID string should
    never be shown to the user in your app; it is used purely for internal reference.
    The alias or displayName, on the other hand, is dynamic and can be changed by
    the user at any time. A Game Center user can set a new alias at any time; the
    alias property will always display the alias; if you use displayName, it will
    always display the alias unless a user is a friend, and then it will show their
    real names instead. The alias and displayName should never be used to test the
    identity of a user, but they should be the only string used to identify the player
    to your app’s user. It is important to also keep in mind that an alias is not
    unique and more than one player may have identical aliases or displayNames.


    Caution


    Do not make assumptions about the structure of the player identifier string. Its
    format and length are subject to change.


    When looking at any list of player IDs in Game Center, we do not begin with GKPlayer
    objects, instead we have an array of user IDs. To help us work with players, we
    will add two additional convenience methods to translate player IDs into GKPlayers
    objects.


    We need to create two new functions: one will handle an array of player IDs, and
    the other will handle a single player ID. This will save us extra work down the
    road. We add the helper methods to our GameCenterManager class.


    We will add the following two function methods to the GameCenterManager class:


    ```

    func playersForIDs(_ playerIDs: [String]) {

    GKPlayer.loadPlayers(forIdentifiers: playerIDs) { [weak self] players, error in

    DispatchQueue.main.async {

    self?.playerDelegate?.playerDataLoaded(players, error: error)

    }

    }

    }

    func playerForID(_ playerID: String) {

    playersForIDs([playerID])

    }

    ```


    Now, when the App is run (assuming you have friends associated with your Game
    Center account), it will pull down a list of your friends’ player IDs and then
    perform a lookup and print the GKPlayer description to the console. Your output
    should look similar to the following:


    ```

    UFOs[4038:207] Authentication Changed: (playerID: G:1092793231, alias: the_other_kyle,
    status: (null), rid:(null)) UFOs[4038:207] Players loaded:

    ("(playerID: G:1093075676, alias: johncash, status: (null),4-rid:(null))"

    )

    ```


    ## Summary


    In this chapter, you learned how to test for Game Center compatibility and authenticate
    the local user. You should now have a strong grasp of how we will be using the
    Game Center Manager class and the benefits it will have on creating a clean code
    environment that will be easily reusable across multiple projects.


    In the next chapter, we will take an in-depth look at leaderboards and expand
    on topics learned in this chapter. If you have any difficulty with anything discussed
    in this chapter, remember that the included sample code contains working examples
    of all the topics discussed.'
  trans: '

    # 使用 `GKLocalPlayer`


    `GKLocalPlayer` 在使用 Game Center 认证后始终存在且非空；此对象是用户的表示形式。你无需创建 `GKLocalPlayer` 的实例，这通过类方法
    `localPlayer` 处理。`localPlayer` 单例是你与 `localPlayer` 交互的唯一方式。


    `GKLocalPlayer` 具有以下几个相关属性：`authenticated`、`underage`、`isMultiplayerGamingRestricted`
    和 `isPersonalizedCommunicationRestricted`。我们将在下一节中处理 `friends` 属性。我们在前几节的认证代码中已经使用过
    `authenticated` 布尔值。


    `underage`、`isMultiplayerGamingRestricted` 和 `isPersonalizedCommunicationRestricted`
    属性可用于限制支持 Game Center 的应用程序中的内容。以下代码执行年龄限制检查；类似代码也可用于多人游戏或通信限制：


    ```

    if (GKLocalPlayer.local.isUnderage)

    {

    print("用户年龄不足")

    }

    ```


    ## Game Center 好友


    当 Game Center 首次发布时，大量重点放在了构建和管理个人好友列表上。多年来，这已不再是苹果的重点关注对象。本地用户的 `friends` 属性已在
    iOS 8 中弃用，并被 `loadFriendPlayers` 取代，而后者又在 iOS 10 中弃用。最终，`loadRecentPlayers` 被引入，并仍在
    iOS 14 中可用。你可能会注意到此函数不包含“friends”一词；但文档提供了更多信息。以异步方式将可挑战的好友列表加载为 `GKPlayer` 数组。可挑战的玩家是好友等级为
    1 和 2（即 FL1 和 FL2）的玩家。此函数在完成时调用 `completionHandler`。成功时 error 为 nil。设置应用中的 Game
    Center 控件仍然允许你添加好友。


    虽然可玩好友在 Game Center 的新更新中仍然不被优先考虑，但获取已通过身份验证的本地用户的好友 `GKPlayer` 列表的功能仍然存在。


    为了检索所有现有 Game Center 好友的列表，可以使用以下函数：


    ```

    func retrieveFriendsList() {

    if GKLocalPlayer.local.isAuthenticated == true {

    GKLocalPlayer.local.loadRecentPlayers(completionHandler: { [weak self] recentPlayers,
    error in

    DispatchQueue.main.async { [weak self] in

    self?.playerDelegate?.friendsFinishedLoading(recentPlayers, error: error)

    }

    })

    } else {

    print("您必须先进行验证")

    }

    }

    ```


    此方法将在数据完全检索后回调 `friendsFinishedLoading`。在以下代码片段中，你可以看到该函数可能的实现方式：


    ```

    func friendsFinishedLoading(_ friends: [GKPlayer]?, error: Error?) {

    if let error = error {

    print("好友列表请求期间发生错误：\(error.localizedDescription)")

    } else if let friends = friends {

    playerDataLoaded(friends, error: error)

    }

    }

    ```


    一旦数据从服务器加载完毕，将实现一个最终函数将数据打印到控制台。


    ```

    func playerDataLoaded(_ players: [GKPlayer]?, error: Error?) {

    if let error = error {

    print("玩家查找期间发生错误：\(error.localizedDescription)")

    } else {

    print("加载的玩家：\(players ?? [])")

    }

    }

    ```


    ## 使用玩家


    Game Center 的核心是一种社交服务，因此它围绕玩家展开，无论是挑战、多人游戏、排行榜还是争夺成就。你需要了解与 `GKPlayer` 对象相关的属性。有三个属性处理玩家名称：`gamePlayerID`
    和 `teamPlayerID`，它们是标识玩家的唯一标识符。`gamePlayerID` 是静态的，对于同一游戏始终指向同一玩家，而 `teamPlayerID`
    对于你开发者帐户中所有游戏中的该玩家是唯一的。因此，`teamPlayerID` 允许你在多个应用中识别同一玩家，这对于营销和交叉推广非常有用。`gamePlayerID`
    和 `teamPlayerID` 字符串绝不应在你的应用中向用户显示；它们仅用于内部参考。另一方面，`alias` 或 `displayName` 是动态的，用户可以随时更改。Game
    Center 用户可以随时设置新别名；`alias` 属性将始终显示别名；如果你使用 `displayName`，它通常会显示别名，除非用户是好友，此时它将显示其真实姓名。`alias`
    和 `displayName` 绝不应用于验证用户身份，但它们应是向应用用户标识该玩家的唯一字符串。同样重要的是要记住，别名不是唯一的，多个玩家可能拥有相同的别名或
    `displayName`。


    注意


    请勿对玩家标识符字符串的结构做任何假设。其格式和长度可能会发生变化。


    在查看 Game Center 中的任何玩家 ID 列表时，我们不会从 `GKPlayer` 对象开始，而是一个用户 ID 数组。为了帮助我们使用玩家，我们将添加两个额外的便捷方法，将玩家
    ID 转换为 `GKPlayer` 对象。


    我们需要创建两个新函数：一个处理玩家 ID 数组，另一个处理单个玩家 ID。这将为我们未来的工作节省额外精力。我们将这些辅助方法添加到 `GameCenterManager`
    类中。


    我们将向 `GameCenterManager` 类添加以下两个函数方法：


    ```

    func playersForIDs(_ playerIDs: [String]) {

    GKPlayer.loadPlayers(forIdentifiers: playerIDs) { [weak self] players, error in

    DispatchQueue.main.async {

    self?.playerDelegate?.playerDataLoaded(players, error: error)

    }

    }

    }

    func playerForID(_ playerID: String) {

    playersForIDs([playerID])

    }

    ```


    现在，当应用运行时（假设你的 Game Center 账户关联了好友），它将拉取好友的玩家 ID 列表，然后执行查找并将 `GKPlayer` 描述打印到控制台。你的输出应类似于以下内容：


    ```

    UFOs[4038:207] 认证已更改：(playerID: G:1092793231, alias: the_other_kyle, status: (null),
    rid:(null)) UFOs[4038:207] 加载的玩家：

    ("(playerID: G:1093075676, alias: johncash, status: (null),4-rid:(null))"

    )

    ```


    ## 总结


    在本章中，你学习了如何测试 Game Center 兼容性以及如何认证本地用户。现在，你应该已经牢固掌握了如何使用 `GameCenterManager`
    类，以及它对于创建干净、易于在多个项目中重复使用的代码环境所带来的好处。


    在下一章中，我们将深入研究排行榜，并扩展本章所学的主题。如果你对本章讨论的任何内容有疑问，请记住，附带的示例代码包含了所有讨论主题的工作示例。

