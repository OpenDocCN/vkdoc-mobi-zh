    for unmatched players. Game Center will only match new players when it is their
    turn to move. This means that every time you are auto-matched, it will be your
    turn to move.


    The last thing that we will do at the end of each move is send the new game data
    to the next player. This player will, in turn, update the game state and send
    it to the next player (which happens to be the first player again).


    ## GKLocalPlayerListener Extensions


    We will be adding two extension functions GKLocalPlayerListener in order to monitor
    for changes in turn events as well as the end of a match. These will also allow
    us to update the match data as the game progresses.


    ```

    extension GameViewController: GKLocalPlayerListener {

    func player(_ player: GKPlayer, receivedTurnEventFor match: GKTurnBasedMatch,
    didBecomeActive: Bool) {

    guard match.matchID == self.match?.matchID else { return }

    self.match = match

    }

    func player(_ player: GKPlayer, matchEnded match: GKTurnBasedMatch) {

    guard match.matchID == self.match?.matchID else { return }

    self.match = match

    }

    }

    ```


    ## Continuing a Game in Progress


    When you resume a game on your next turn, assuming it is not the first turn of
    a match, you will need to first restore the game state to its current position.
    To do this, we begin by modifying our viewDidLoad function to get the current
    match data. We in turn call an updateView function to set up the current game
    board. The first step of this process is determining the current game state. Among
    other things, here we can determine if the game is ended and, if not, whose turn
    it currently is. We also parse the gameboard data and fill in the current Xs and
    Os to match the game history.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    GKLocalPlayer.local.register(self)

    updateView()

    }

    private func updateView() {

    teamLabel.text = "You are playing \(localPlayer.title)."

    let statusText: String

    let forfeitButtonEnabled: Bool

    switch currentGameStatus {

    case .waitingForLocalPlayer:

    statusText = "It''s your turn."

    forfeitButtonEnabled = true

    case .waitingForOtherPlayer:

    statusText = "It''s \(otherPlayer.title)''s turn."

    forfeitButtonEnabled = true

    case .localPlayerWon:

    statusText = "You won!"

    forfeitButtonEnabled = false

    case .otherPlayerWon:

    statusText = "You lost."

    forfeitButtonEnabled = false

    case .playersTied:

    statusText = "It''s a tie."

    forfeitButtonEnabled = false

    }

    statusLabel.text = statusText

    forfeitButton.isEnabled = forfeitButtonEnabled

    for index in 0..<9 {

    let player = gameBoard[index] ?? .none

    let button = buttons[index]

    button.setTitle(player.buttonTitle, for: .normal)

    button.isEnabled = localPlayerIsCurrentParticipant && player == .none

    }

    }

    private func loadMatchData() {

    guard let match = match, let firstMatchParticipant = match.participants.first
    else {

    localPlayer = .none

    gameBoard = GameBoard()

    updateView()

    return

    }

    localPlayer = firstMatchParticipant.player == GKLocalPlayer.local ? .x : .o

    match.loadMatchData { (data, error) in

    if let error = error {

    print("Load Match Data: \(error.localizedDescription)")

    return

    }

    if self.otherParticipant?.matchOutcome == .quit, self.localParticipant?.matchOutcome
    != .won {

    self.endMatchInTurn(participantOutcome: .won, nextParticipantOutcome: nil)

    return

    }

    guard let data = data else { return }

    do {

    self.gameBoard = try JSONDecoder().decode(GameBoard.self, from: data)

    } catch {

    self.gameBoard = GameBoard()

    }

    self.updateView()

    }

    }

    ```


