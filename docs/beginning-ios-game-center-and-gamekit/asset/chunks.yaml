- fmt: "# Modifying a Single-Player Game\n\nThere are a few modifications that we\
    \ need to make to our single-player game in order to transform it into a multiplayer\
    \ game:\n\n- Once we connect to a new peer, we need to begin the game. We also\
    \ need a way to inform our existing engine that the new game is multiplayer.\n\
    - One device needs to be designated the host device. We will have this one device\
    \ control the movements of the cows, since both devices can’t control cow movement\
    \ themselves. This is an important step if we want both devices to appear in sync.\n\
    - Each peer needs to inform the other peer(s) about its actions, such as movement\
    \ and tractor beam usage.\n- Each peer needs to parse the other peer’s device\
    \ and update its own game state to keep both devices in sync with each other.\n\
    \nThese steps are a representation of the bare minimum that is typically required\
    \ to turn a single-player game into a multiplayer game. Your particular game or\
    \ app might be much more complex. For example, your multiplayer experience might\
    \ be so different from your single-player gameplay that you cannot reuse the same\
    \ class for both modes. On the other hand, your game might be even simpler. For\
    \ example, a multiplayer game of Battleship wouldn’t require either device to\
    \ be the host because there are no computer-controlled elements that you need\
    \ to worry about keeping track of.\n\n# Setting Up Our Engine for Multiplayer\n\
    \nThe very first thing that we need to do is let our game engine know whether\
    \ the state should be set to multiplayer or single player. There are complex ways\
    \ and simple ways of doing this. Depending on your needs, you will most likely\
    \ be able to get away with a simple state variable.\n\nA state variable is the\
    \ approach that we will use for our example, since our game is extremely straightforward.\
    \ In `UFOGameViewController.swift`, we create a new property to represent a `Bool`,\
    \ which will be set to inform the class whether we are in single-player or multiplayer\
    \ mode. Add the following lines into our already existing file:\n\n```\nclass\
    \ UFOGameViewController: UIViewController {\nvar gameIsMultiplayer = false\n}\n\
    ```\n\nWe will use this property throughout our code base to determine whether\
    \ the game is running in multiplayer mode.\n\nWe have an existing function in\
    \ `UFOViewController` that will be called when our game begins a new multiplayer\
    \ match. Game Center returns a `GKMatch` object to help us identify the game.\
    \ We will also add some new methods in our `GameCenterManager` class to handle\
    \ communication to this system. For now, we will simply focus on getting the game\
    \ up and running in a new state.\n\n```\nfunc matchmakerViewController(_ viewController:\
    \ GKMatchmakerViewController, didFind match: GKMatch) {\ndismiss(animated: true,\
    \ completion: nil)\n}\n```\n\nNext, we add a section of code to the end of this\
    \ function to begin a new multiplayer game after we find a peer that we want to\
    \ play against. Go ahead and add the following snippet of code into each method:\n\
    \n```\nlet gameVC = UFOGameViewController()\ngameVC.gcManager = gcManager\ngameVC.gameIsMultiplayer\
    \ = true\nnavigationController?.pushViewController(gameVC, animated: true)\n```\n\
    \nWe also need to hold onto the `GKMatch` that represents a peer. Create two new\
    \ properties in the `UFOGameViewController`, named `peerIDString` and `peerMatch`.\
    \ Set these up in the same fashion that you did for the `gameIsMultiplayer` property.\
    \ The new section of your header should look like the following abstracted snippet:\n\
    \n```\nclass UFOGameViewController: UIViewController {\n//...\nvar peerIDString:\
    \ String?\nvar peerMatch: GKMatch?\n}\n```\n\nNow we need to add logic to set\
    \ these properties for beginning a new multiplayer game. These functions should\
    \ now look like the following ones.\n\nWhen we load our game view controller,\
    \ we know whether it is multiplayer or not, as well as having a reference to our\
    \ peer or peers. Our `GameViewController` now has all the information it needs\
    \ to begin a new multiplayer game.\n\n```\nfunc matchmakerViewController(_ viewController:\
    \ GKMatchmakerViewController, didFind match: GKMatch) {\ndismiss(animated: true,\
    \ completion: nil)\nlet gameVC = UFOGameViewController()\ngameVC.gcManager = gcManager\n\
    gameVC.gameIsMultiplayer = true\ngameVC.peerIDString = nil\ngameVC.peerMatch =\
    \ match\nnavigationController?.pushViewController(gameVC, animated: true)\n}\n\
    ```\n\n## Picking a Host\n\nPicking which device will be the host is harder than\
    \ it sounds. Both devices, when first connected together, are treated as equals.\
    \ How do we then determine which device will have more control than the other?\n\
    \nThe most straightforward and foolproof system that I have used is having each\
    \ device generate a random number. Whichever device has the largest random number\
    \ becomes the host. In the very rare event that both devices generate the same\
    \ random number, we simply try and generate two new random numbers again.\n\n\
    After we have determined the random number, a device has picked for its chance\
    \ at being the host; we need to send that data to the other device. On the other\
    \ side, we need to process the data and have both devices come to the same conclusion\
    \ about which one has been selected as the host. This section deals only with\
    \ generating the host number; the next two sections handle how to send and receive\
    \ this data. We now add the following function to our `UFOGameViewController`\
    \ class:\n\n```\nfunc generateAndSendHostNumber() {\nlet randomHostNumber = Double(arc4random())\n\
    let randomNumberString = \"$Host:\\(randomHostNumber)\"\ngcManager?.sendString(toAllPeers:\
    \ randomNumberString, reliable: true)\n}\n```\n\nFor the purpose of this particular\
    \ example, we will work with a string for sending the data back and forth. You\
    \ could easily send this as an `Int` as well, but whatever we send will first\
    \ need to be converted to data, which we will cover in the next section. In addition,\
    \ we want to make sure this method is called whenever we are dealing with a multiplayer\
    \ game. To do so, we need to add the following to the end of our `viewDidLoad`\
    \ method. We also need to slightly modify our logic to spawn cows. If it is a\
    \ multiplayer game, only the host is responsible for spawning and updating cow\
    \ paths.\n\n> **Tip**  \n> When you begin to deal with more complex networking,\
    \ it is often beneficial to switch to a data type that can easily store more data\
    \ with less parsing, such as a dictionary or an array.\n\n```\noverride func viewDidLoad()\
    \ {\n//...\ngenerateAndSendHostNumber()\nif gameIsMultiplayer == false {\nfor\
    \ _ in 0..<5 {\nspawnCow()\n}\nupdateCowPaths()\n}\n}\n```"
  raw: '## Modifying a Single-Player Game


    There are a few modifications that we need to make to our single-player game in
    order to transform it into a multiplayer game:


    *   Once we connect to a new peer, we need to begin the game. We also need a way
    to inform our existing engine that the new game is multiplayer.


    *   One device needs to be designated the host device. We will have this one device
    control the movements of the cows, since both devices can’t control cow movement
    themselves. This is an important step if we want both devices to appear in sync.


    *   Each peer needs to inform the other peer(s) about its actions, such as movement
    and tractor beam usage.


    *   Each peer needs to parse the other peer’s device and update its own game state
    to keep both devices in sync with each other.


    These steps are a representation of the bare minimum that is typically required
    to turn a single-player game into a multiplayer game. Your particular game or
    app might be much more complex. For example, your multiplayer experience might
    be so different from your single-player gameplay that you cannot reuse the same
    class for both modes. On the other hand, your game might be even simpler. For
    example, a multiplayer game of Battleship wouldn’t require either device to be
    the host because there are no computer-controlled elements that you need to worry
    about keeping track of.


    ## Setting Up Our Engine for Multiplayer


    The very first thing that we need to do is let our game engine know whether the
    state should be set to multiplayer or single player. There are complex ways and
    simple ways of doing this. Depending on your needs, you will most likely be able
    to get away with a simple state variable.


    A state variable is the approach that we will use for our example, since our game
    is extremely straightforward. In UFOGameViewController.swift, we create a new
    property to represent a Bool, which will be set to inform the class whether we
    are in single-player or multiplayer mode. Add the following lines into our already
    existing file:


    ```

    class UFOGameViewController: UIViewController {

    var gameIsMultiplayer = false

    }

    ```


    We will use this property throughout our code base to determine whether the game
    is running in multiplayer mode.


    We have an existing function in UFOViewController that will be called when our
    game begins a new multiplayer match. Game Center returns a GKMatch object to help
    us identify the game. We will also add some new methods in our GameCenterManager
    class to handle communication to this system. For now, we will simply focus on
    getting the game up and running in a new state.


    ```

    func matchmakerViewController(_ viewController: GKMatchmakerViewController, didFind
    match: GKMatch) {

    dismiss(animated: true, completion: nil)

    }

    ```


    Next, we add a section of code to the end of this function to begin a new multiplayer
    game after we find a peer that we want to play against. Go ahead and add the following
    snippet of code into each method:


    ```

    let gameVC = UFOGameViewController()

    gameVC.gcManager = gcManager

    gameVC.gameIsMultiplayer = true

    navigationController?.pushViewController(gameVC, animated: true)

    ```


    We also need to hold onto the GKMatch that represents a peer. Create two new properties
    in the UFOGameViewController, named peerIDString and peerMatch. Set these up in
    the same fashion that you did for the gameIsMultiplayer property. The new section
    of your header should look like the following abstracted snippet:


    ```

    class UFOGameViewController: UIViewController {

    //...

    var peerIDString: String?

    var peerMatch: GKMatch?

    }

    ```


    Now we need to add logic to set these properties for beginning a new multiplayer
    game. These functions should now look like the following ones.


    When we load our game view controller, we know whether it is multiplayer or not,
    as well as having a reference to our peer or peers. Our GameViewController now
    has all the information it needs to begin a new multiplayer game.


    ```

    func matchmakerViewController(_ viewController: GKMatchmakerViewController, didFind
    match: GKMatch) {

    dismiss(animated: true, completion: nil)

    let gameVC = UFOGameViewController()

    gameVC.gcManager = gcManager

    gameVC.gameIsMultiplayer = true

    gameVC.peerIDString = nil

    gameVC.peerMatch = match

    navigationController?.pushViewController(gameVC, animated: true)

    }

    ```


    ### Picking a Host


    Picking which device will be the host is harder than it sounds. Both devices,
    when first connected together, are treated as equals. How do we then determine
    which device will have more control than the other?


    The most straightforward and foolproof system that I have used is having each
    device generate a random number. Whichever device has the largest random number
    becomes the host. In the very rare event that both devices generate the same random
    number, we simply try and generate two new random numbers again.


    After we have determined the random number, a device has picked for its chance
    at being the host; we need to send that data to the other device. On the other
    side, we need to process the data and have both devices come to the same conclusion
    about which one has been selected as the host. This section deals only with generating
    the host number; the next two sections handle how to send and receive this data.
    We now add the following function to our UFOGameViewController class:


    ```

    func generateAndSendHostNumber() {

    let randomHostNumber = Double(arc4random())

    let randomNumberString = "$Host:\(randomHostNumber)"

    gcManager?.sendString(toAllPeers: randomNumberString, reliable: true)

    }

    ```


    For the purpose of this particular example, we will work with a string for sending
    the data back and forth. You could easily send this as an Int as well, but whatever
    we send will first need to be converted to data, which we will cover in the next
    section. In addition, we want to make sure this method is called whenever we are
    dealing with a multiplayer game. To do so, we need to add the following to the
    end of our viewDidLoad method. We also need to slightly modify our logic to spawn
    cows. If it is a multiplayer game, only the host is responsible for spawning and
    updating cow paths.


    Tip


    When you begin to deal with more complex networking, it is often beneficial to
    switch to a data type that can easily store more data with less parsing, such
    as a dictionary or an array.


    ```

    override func viewDidLoad() {

    //...

    generateAndSendHostNumber()

    if gameIsMultiplayer == false {

    for _ in 0..<5 {

    spawnCow()

    }

    updateCowPaths()

    }

    }

    ```'
  trans: "\n# 修改单人游戏\n\n为了将单人游戏转变为多人游戏，我们需要进行以下几项修改：\n\n- 一旦连接到新对等端，游戏就需要开始。我们还需要一种方式通知现有游戏引擎，新游戏是多人模式。\n\
    - 需要指定一台设备为主机设备。我们将让这唯一的一台设备控制奶牛的行动，因为两台设备无法同时控制奶牛移动。如果希望两台设备画面保持同步，这一步至关重要。\n\
    - 每个对等端需要告知其他对等端自身的操作，例如移动和牵引光束的使用。\n- 每个对等端需要解析其他对等端的设备状态，并更新自己的游戏状态，以确保两台设备相互同步。\n\
    \n这些步骤代表了将单人游戏转变为多人游戏通常所需的最低要求。你的具体游戏或应用可能会复杂得多。例如，你的多人游戏体验可能与单人游戏完全不同，以至于无法为两种模式复用同一个类。另一方面，你的游戏也可能更简单。例如，在多人海战游戏中，不需要指定任何一台设备为主机，因为不存在需要你追踪管理的电脑控制元素。\n\
    \n# 为多人游戏设置引擎\n\n我们首先要做的是让游戏引擎知晓状态应设置为多人模式还是单人模式。实现这一点有复杂的方式，也有简单的方式。根据你的需求，很可能只需要一个简单的状态变量即可。\n\
    \n我们将在示例中使用状态变量这种方法，因为我们的游戏非常简单直接。在`UFOGameViewController.swift`文件中，我们创建一个新的`Bool`属性，该属性将用于告知类当前是单人模式还是多人模式。请在已有文件中添加以下几行代码：\n\
    \n```\nclass UFOGameViewController: UIViewController {\nvar gameIsMultiplayer\
    \ = false\n}\n```\n\n我们将在整个代码库中使用此属性来判断游戏是否运行在多人模式下。\n\n在`UFOViewController`中，我们有一个现有函数，当游戏开始新的多人比赛时会被调用。Game\
    \ Center 会返回一个`GKMatch`对象来帮助我们识别游戏。我们还将为`GameCenterManager`类添加一些新方法，用于处理与此系统的通信。目前，我们只需专注于让游戏在新的状态下启动并运行。\n\
    \n```\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
    \ didFind match: GKMatch) {\ndismiss(animated: true, completion: nil)\n}\n```\n\
    \n接下来，我们在该函数的末尾添加一段代码，以便在找到想要对战的对等端后，开始新的多人游戏。请将以下代码片段添加到每个方法中：\n\n```\nlet gameVC\
    \ = UFOGameViewController()\ngameVC.gcManager = gcManager\ngameVC.gameIsMultiplayer\
    \ = true\nnavigationController?.pushViewController(gameVC, animated: true)\n```\n\
    \n我们还需要持有代表对等端的`GKMatch`。在`UFOGameViewController`中创建两个新属性，命名为`peerIDString`和`peerMatch`。按照与设置`gameIsMultiplayer`属性相同的方式设置它们。你的头部文件的新部分应类似下面的抽象代码片段：\n\
    \n```\nclass UFOGameViewController: UIViewController {\n//...\nvar peerIDString:\
    \ String?\nvar peerMatch: GKMatch?\n}\n```\n\n现在，我们需要添加逻辑来设置这些属性，以便开始新的多人游戏。这些函数现在应如下所示。\n\
    \n当加载游戏视图控制器时，我们就能知道它是否是多人模式，并且拥有对等端的引用。现在，我们的`GameViewController`拥有了开始新多人游戏所需的所有信息。\n\
    \n```\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
    \ didFind match: GKMatch) {\ndismiss(animated: true, completion: nil)\nlet gameVC\
    \ = UFOGameViewController()\ngameVC.gcManager = gcManager\ngameVC.gameIsMultiplayer\
    \ = true\ngameVC.peerIDString = nil\ngameVC.peerMatch = match\nnavigationController?.pushViewController(gameVC,\
    \ animated: true)\n}\n```\n\n## 选择主机\n\n选择哪台设备作为主机比听起来要困难。两台设备首次连接时，被视为对等设备。那么我们如何决定哪台设备将拥有比另一台更多的控制权呢？\n\
    \n我使用过的最简单且最可靠的方法是让每台设备生成一个随机数。拥有最大随机数的设备成为主机。在极少数情况下，如果两台设备生成了相同的随机数，我们只需再次尝试生成两个新的随机数。\n\
    \n在确定随机数之后——即某台设备为自己争取成为主机机会所选的数字——我们需要将该数据发送给另一台设备。另一方面，我们需要处理数据，并使两台设备就哪台被选为主机达成一致结论。本节仅处理生成主机编号；接下来的两节将处理如何发送和接收这些数据。现在我们向`UFOGameViewController`类添加以下函数：\n\
    \n```\nfunc generateAndSendHostNumber() {\nlet randomHostNumber = Double(arc4random())\n\
    let randomNumberString = \"$Host:\\(randomHostNumber)\"\ngcManager?.sendString(toAllPeers:\
    \ randomNumberString, reliable: true)\n}\n```\n\n针对这个特定的示例，我们将使用字符串来来回发送数据。你当然也可以将它作为`Int`发送，但无论发送什么，首先都需要转换为数据，这将在下一节中介绍。此外，我们需要确保在处理多人游戏时调用此方法。为此，我们需要在`viewDidLoad`方法的末尾添加以下代码。我们还需要稍微修改生成奶牛的逻辑。如果是多人游戏，只有主机负责生成和更新奶牛路径。\n\
    \n> **提示**  \n> 当开始处理更复杂的网络通信时，切换到一种能够轻松存储更多数据且解析量更少的数据类型（如字典或数组）通常会更有益处。\n\n\
    ```\noverride func viewDidLoad() {\n//...\ngenerateAndSendHostNumber()\nif gameIsMultiplayer\
    \ == false {\nfor _ in 0..<5 {\nspawnCow()\n}\nupdateCowPaths()\n}\n}\n```\n"
- fmt: "### Sending Data\n\nWe will work with two primary functions to send data to\
    \ other connected peers. One will handle sending data to every peer we are connected\
    \ to, and the other will send data only to specified peers, such as teammates\
    \ or other groups of players. First, add the following two methods to our `GameCenterManager`\
    \ class:\n\n```\nfunc sendStringToAllPeers(_ dataString: String, reliable: Bool)\n\
