- fmt: '# `GKTurnBasedEventHandler`


    `GKTurnBasedEventHandler`是一个委托协议，负责处理与回合制游戏相关的重要消息。要为事件设置委托，请使用以下代码：


    ```

    [[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];

    ```


    该协议包含三个可选函数。


    *   `handleInviteFromGameCenter`：当您的委托接收到此函数时，它应使用通过函数传入的`playersToInvite`填充新的`GKMatchRequest`。然后，您需要开始新的比赛或展示匹配器
    GUI。当用户接受来自朋友的比赛邀请时，将调用此函数。


    *   `handleTurnEventForMatch`：当用户接受进行中比赛的推送通知时，您的委托会接收到此消息。您需要结束当前正在执行的任务，并为通过此函数传入的比赛显示游戏。


    *   `handleMatchEnded`：当您的委托接收到此消息时，它应向玩家显示比赛结果和游戏结束视图，并允许玩家选择从 Game Center 中删除比赛数据。


    ## 总结


    在本章中，我们学习了 Game Center 中新增的回合制游戏功能。我们使用了现有的`GameCenterManager`类，并编写了一个全新的示例游戏来配合回合制技术。现在，您应该已经牢固掌握了如何创建新的回合制游戏，以及在点对点之间保留和发送回合数据。通过本章学习的技能，您现在应该能够在几小时内轻松启动并运行回合制游戏的网络组件。


    在下一章中，我们将探讨另一个激动人心的话题：语音聊天。Apple 投入了大量精力，使得在 iOS、Mac 和 Apple TV 应用中轻松使用 IP 语音（VOIP），我们将探索如何快速在您的
    Game Center 或 GameKit 应用中启用 VOIP。


    # 9. Voice Chat


    语音聊天，作为 Game Center 提供的服务之一，远比其它服务更能证明 Apple 的工程实力。Apple 将其他平台上最复杂的功能之一，转变成了在
    iOS、Mac 和 Apple TV 设备上最容易实现的功能。在其他平台上处理 IP 语音时，这通常是整个项目中最复杂、最令人生畏的任务。在本章中，我们将探讨如何将语音聊天服务添加到
    UFO 项目或任何 Apple 平台应用中。本章的简短篇幅充分证明了 Apple 为降低这项技术的门槛所付出的巨大努力，即使是新手开发者也能轻松掌握。


    注意


    在本章中，我们将回到 UFO 项目。井字棋项目已经完成。


    ## Game Center 的语音聊天


    我们首先来看看 Game Center 的语音聊天。使用`GKMatch`来创建语音聊天会话有许多优点，例如易用性、快速实现，以及与使用 GameKit 或自行实现系统相比，减少了所需的开销。一个`GKMatch`语音聊天可以有多个频道，每个频道都有一个关联的接收者列表。例如，在第一人称射击游戏中，您可以为队友设置一个频道，为所有玩家设置另一个频道。这样，您就可以在不向其他队伍泄露信息的情况下，讨论赢得比赛的策略。


    注意


    使用`GKMatch`的语音聊天仅适用于通过 Wi-Fi 连接到互联网的参与者；语音聊天不支持蜂窝网络。


    ### 创建音频会话


    在开始使用语音聊天之前，您首先需要创建一个新的音频会话。在任何聊天服务开始之前执行此操作非常重要。如果您在创建聊天会话之后才创建音频会话，您将无法发送或接收语音数据。在下面的示例中，我们创建了一个新的音频会话，允许我们的应用播放和录制音频，然后将其设置为激活状态。


    提示


    您的应用可能已经有一个用于播放音效的音频会话；如果您已经创建了音频会话，则无需创建新的会话。如果重复使用现有的音频会话，请确保将其设置为允许播放和录制功能。


    ```

    var error: Error? = nil

    let audioSession = AVAudioSession.sharedInstance()

    do {

    try audioSession.setCategory(.playAndRecord)

    } catch (let err){

    error = err

    }

    do {

    try audioSession.setActive(true)

    } catch (let err) {

    error = err

    }

    if let error = error {

    print("An error occurred while starting audio session: \(error.localizedDescription)")

    }

    ```


    ### 创建新的语音频道


    您的应用中可以拥有任意数量的语音聊天频道，每个对等方都可以注册加入任意数量的频道。频道通过名称字符串进行创建和组织。这将决定我们希望用户加入哪些频道。当两个或多个对等方加入同名的频道时，它们将连接到同一个聊天。


    下面的代码片段展示了如何创建三个不同频道的示例。请注意，这些频道是使用当我们开始一个新的基于 Game Center 的网络游戏时返回给我们的`GKMatch`对象创建的：


    ```

    let allChannel = match.voiceChat(withName: "allPlayers")

    let teamChannel = match.voiceChat(withName: "blueTeam")

    let squadChannel = match.voiceChat(withName: "BlueTeamSquad2")

    ```


    在此示例中，我们有一个与所有玩家通信的频道、一个与整个队伍通信的频道，以及第三个用于与小队通话的频道。仅仅创建了频道并不意味着它们会自动开启。在下一节中，我们将探讨如何在特定频道上启动和停止通信。


    ### 启动和停止语音聊天


    在上一节中，我们创建了三个新的语音频道，用于 Game Center 类型的语音聊天。当您想要在这些频道上发送和接收语音时，需要首先告诉 API 您想开始使用该频道。连接到频道后，您就可以通过该频道发送和接收数据。如果您想连接到一个频道但不想发送任何语音音频，请参阅下一节关于麦克风静音的内容。


    要开始使用语音频道，您需要调用上一节创建的`GKVoiceChat`对象上的`start`方法。


    ```

    allChannel?.start()

    teamChannel?.start()

    ```


    当您想离开频道时，只需调用`stop`方法。这比简单地将频道中的所有参与者静音要好，因为应用程序将不再需要接收额外的网络数据。已停止的频道可以随时重新启动。


    ```

    allChannel?.stop()

    teamChannel?.stop()

    ```


    提示


    强烈建议您在传输语音数据时提供视觉和音频指示（例如红灯和咔嗒声）。这样可以降低用户在无意中传输语音数据的可能性。请始终记住，用户的麦克风和传输的语音应被视为敏感数据。从
    iOS 14 开始，iPhone 刘海区域中有一个小的指示灯，用于指示麦克风当前处于活动状态。'
  raw: '## GKTurnBasedEventHandler


    The GKTurnBasedEventHandler is a delegate protocol that is responsible for handling
    important messages related to turn-based games. To set a delegate for events,
    use the following code:


    ```

    [[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];

    ```


    The protocol has three optional functions.


    *   handleInviteFromGameCenter: When your delegate receives this function, it
    should populate a new GKMatchRequest with the playersToInvite that are passed
    in through the function. You then need to begin a new match or present the matchmaker
    GUI. This function is called when the user accepts a match invite from a friend.


    *   handleTurnEventForMatch: Your delegate receives this message when the user
    has accepted a push notification for an in-progress match. You need to end whatever
    task you are performing and display the game for the match that is passed in with
    this function.


    *   handleMatchEnded: When your delegate receives this message, it should display
    the match’s results and game-over views to the player and allow the player the
    option of removing the match data from Game Center.


    ## Summary


    In this chapter, we learned about the new turn-based gaming in Game Center. We
    worked with our existing GameCenterManager class and wrote an entirely new sample
    game to work with the turn-based technology. You should now have a firm grasp
    on how to create a new turn-based game, as well as retain and send turn data between
    peers. With the skills learned in this chapter, you should now be able to easily
    get the networking component of turn-based gaming up and running in a few hours.


    In the next chapter, we will be looking at another exciting topic: voice chat.
    Apple has gone through tremendous lengths to make voice-over IP easy to use in
    iOS, Mac, and Apple TV apps, and we will explore how to quickly get VOIP up and
    running in your Game Center– or GameKit–enabled apps.


    # 9. Voice Chat


    Voice chat, more than any other service provided as part of Game Center, is a
    true testament to Apple engineering. Apple has turned one of the most complicated
    features on other platforms into one of the easiest to implement on iOS, Mac,
    and Apple TV devices. When working with Voice over Internet Protocol (VOIP) on
    other platforms, it is often the most complex and daunting task of an entire project.
    In this chapter, we will explore how to add voice chat services to UFOs or any
    Apple platform app. The shortness of this chapter is evidence of how much work
    Apple has put into this technology to bring it within the grasp of even the greenest
    of developers.


    Note


    In this chapter, we return to the UFOs project. We’re done with tic-tac-toe.


    ## Voice Chat for Game Center


    We begin by looking at voice chat for Game Center. Using a GKMatch to create a
    voice chat session has many advantages, such as ease of use, quickness to implement,
    and reduced required overhead compared to using GameKit or having to implement
    your own system. A GKMatch voice chat can have multiple channels, each with an
    associated list of recipients. For example, you could have one channel for teammates
    in a first-person shooter game and another channel for all players. This would
    allow you to talk about tactics for winning the match without giving away information
    to the other teams.


    Note


    Voice chat using a GKMatch is only available to participants who are connected
    to the Internet via Wi-Fi; voice chat does not support cellular networks.


    ### Creating an Audio Session


    Before you can begin to work with voice chat, you first need to create a new audio
    session. It is important to do this before you begin any chat services. If you
    create the audio session after you create the chat session, you will not be able
    to send or receive voice data. In the following example, we create a new audio
    session that allows our app to play and record audio and then set it to Active.


    Tip


    Your app might already use an audio session for playing sound effects; if you
    have already created an audio session, you are not required to make a new one.
    If you are reusing an existing audio session, make sure that you set it to allow
    both play and record functionality.


    ```

    var error: Error? = nil

    let audioSession = AVAudioSession.sharedInstance()

    do {

    try audioSession.setCategory(.playAndRecord)

    } catch (let err){

    error = err

    }

    do {

    try audioSession.setActive(true)

    } catch (let err) {

    error = err

    }

    if let error = error {

    print("An error occurred while starting audio session: \(error.localizedDescription)")

    }

    ```


    ### Creating New Voice Channels


    You can have as many voice chat channels as you want in your app, and each peer
    can register to be part of as many channels as they want. Channels are created
    and organized by a name string. This is how we will determine what channels we
    want the user to join. When two or more peers join a channel with the same name,
    they are connected to the same chat.


    The code snippet that follows shows an example of how to create three different
    channels. Take note that the channels are created with the GKMatch object that
    is returned to us when we begin a new Game Center–based networking game:


    ```

    let allChannel = match.voiceChat(withName: "allPlayers")

    let teamChannel = match.voiceChat(withName: "blueTeam")

    let squadChannel = match.voiceChat(withName: "BlueTeamSquad2")

    ```


    In this example, we have a channel for communicating with all players, a channel
    for communicating with our entire team, and a third channel that is used to talk
    with our squad. Just because channels have been created doesn’t mean that they
    are automatically turned on. In the next section, we will look at how to start
    and stop communication on a specific channel.


    ### Starting and Stopping Voice Chat


    In the previous section, we created three new voice channels for use with Game
    Center–type voice chat. When you want to transmit and receive voice on those channels,
    you need to first tell the API that you want to begin using that channel. After
    you are connected to a channel, you are able to send and receive data from that
    channel. If you want to connect to a channel and do not want to transmit any voice
    audio, see the following section on muting the microphone.


    To begin using a voice channel, you need to call the start method on the GKVoiceChat
    object that was created in the previous section.


    ```

    allChannel?.start()

    teamChannel?.start()

    ```


    When you want to leave a channel, you simply call the stop method. This is a better
    approach than simply muting all participants in the channel because the app will
    not be required to receive additional network data. A stopped channel can be restarted
    at any time.


    ```

    allChannel?.stop()

    teamChannel?.stop()

    ```


    Tip


    It is highly recommended that you provide both visual and audio indicators when
    you are transmitting voice data, such as a red light and a click sound. This reduces
    the chance that a user will accidentally transmit voice data when they don’t intend
    to. Always remember that a user’s microphone and transmitted voice should be treated
    as sensitive data. As of iOS 14, there is a small indicator light in the notch
    area of the iPhone which indicates the microphone is currently live.'
