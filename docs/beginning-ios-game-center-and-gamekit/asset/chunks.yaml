  raw: '### Adding Network Abduction Code


    The last thing that we need to handle is tying in network support for the abduction
    code. We need to properly remove and respawn cows as they are abducted, as well
    as show the enemy UFO using their tractor beam and animating a cow into the ship.


    Let’s begin by showing and hiding the tractor beam on each device. Because we
    start a tractor beam every time a user touches the screen, and end it when the
    user releases that touch, we can begin there. We have no values that need to be
    transmitted; the only thing we need to be aware of is starting and stopping the
    animation itself. Modify the touchesBegan and touchesEnd methods to send a message
    to the peer. The modified methods are shown as follows:


    ```

    override func touchesBegan(_ touches: Set, with event: UIEvent?) {

    currentAbductee = nil

    tractorBeamOn = true

    if gameIsMultiplayer {

    gcManager?.sendStringToAllPeers("$beginTractorBeam", reliable: true)

    }

    tractorBeamImageView?.frame = CGRect(x: (myPlayerImageView?.frame.origin.x ??
    0.0) + 25, y: (myPlayerImageView?.frame.origin.y ?? 0.0) + 10, width: 28, height:
    318)

    tractorBeamImageView?.animationDuration = 0.5

    tractorBeamImageView?.animationRepeatCount = 99999

    let imageArray = [UIImage(named: "Tractor1.png"), UIImage(named: "Tractor2.png")]

    tractorBeamImageView?.animationImages = imageArray.compactMap { $0 }

    tractorBeamImageView?.startAnimating()

    if let tractorBeamImageView = tractorBeamImageView {

    view.insertSubview(tractorBeamImageView, at: 4)

    }

    let cowImageView = hitTest()

    if let cowImageView = cowImageView {

    currentAbductee = cowImageView

    abductCow(cowImageView)

    }

    }

    override func touchesEnded(_ touches: Set, with event: UIEvent?) {

    tractorBeamOn = false

    if gameIsMultiplayer {

    gcManager?.sendStringToAllPeers("$endTractorBeam", reliable: true)

    }

    tractorBeamImageView?.removeFromSuperview()

    if let currentAbductee = currentAbductee {

    UIView.animate(

    withDuration: 1.0,

    delay: 0,

    options: [.curveEaseIn, .beginFromCurrentState],

    animations: {

    var frame = currentAbductee.frame

    frame.origin.y = 260

    frame.origin.x = (self.myPlayerImageView?.frame.origin.x ?? 0.0) + 15

    currentAbductee.frame = frame

    }

    )

    }

    currentAbductee = nil

    }

    ```


    As you can see, we simply check to make sure that we have a network game and then
    pass a message to begin or end the tractor beams. Next, we add a handler to our
    receivedData function to call two new methods that will display and animate the
    tractor beam on the peer’s device. These two functions are modifications of our
    current tractor beam animation methods and are shown next for your convenience:


    ```

    func beginTractorFromNetwork() {

    otherPlayerTractorBeamImageView?.frame = CGRect(x: (otherPlayerImageView?.frame.origin.x
    ?? 0.0) + 25, y: (otherPlayerImageView?.frame.origin.y ?? 0.0) + 10, width: 28,
    height: 318)

    otherPlayerTractorBeamImageView?.animationDuration = 0.5

    otherPlayerTractorBeamImageView?.animationRepeatCount = 99999

    let imageArray = [UIImage(named: "Tractor1.png"), UIImage(named: "Tractor2.png")]

    otherPlayerTractorBeamImageView?.animationImages = imageArray.compactMap { $0
    }

    otherPlayerTractorBeamImageView?.startAnimating()

    if let otherPlayerTractorBeamImageView = otherPlayerTractorBeamImageView {

    view.insertSubview(otherPlayerTractorBeamImageView, at: 4)

    }

    }

    func endTractorFromNetwork() {

    otherPlayerTractorBeamImageView?.removeFromSuperview()

    }

    ```


    If you were to run the game now, you would see that when each user touches the
    screen, the tractor beam appears on both devices. We don’t need to worry about
    locking the movement for the UFO while the tractor beam is on since this is handled
    for us in the single-player game, and movements are only transmitted to another
    device if they are acceptable on the single-player mode. Next, we need to add
    additional code to handle the hit test, so modify the hitTest function, as follows:


    ```

    func hitTest() -> UIImageView? {

    if !tractorBeamOn {

    return nil

    }

    for x in 0..<(cowArray?.count ?? 0) {

    let tempCow = cowArray?[x] as? UIImageView

    let cowLayer = tempCow?.layer.presentation()

    let cowFrame = cowLayer?.frame

    if cowFrame?.intersects(tractorBeamImageView?.frame ?? CGRect.zero) ?? false {

    tempCow?.frame = cowLayer?.frame ?? CGRect.zero

    tempCow?.layer.removeAllAnimations()

    if gameIsMultiplayer {

    gcManager?.sendStringToAllPeers(String(format: "$abductCowAtIndex:%i", x), reliable:
    true)

    }

    return tempCow

    }

    }

    return nil

    }

    }

    ```


    Here we are using the same trick that we used earlier when we populated the cow
    array. Because we sent the data reliably to enter objects into our array, we know
    that the order of the array is always going to be the same. Because we know the
    order of the array, we can pass the index of the cow we want to modify. In addition
    to sending the data, we also need to write a new if statement to catch this message,
    as shown in the following. You can see this method is set up a lot like the score
    method in which we extract the value that we are interested in and call a new
    method using it:


    ```

    else if dataDictionary["data"]?.hasPrefix("$abductCowAtIndex:") ?? false {

    let index = Int(dataDictionary["data"]?.replacingOccurrences(of: "$abductCowAtIndex:",
    with: "") ?? "") ?? 0

    abductCowFromNetwork(at: index)

    }

    ```


    The following two functions handle the abduction animations that are received
    over the network. They are both very similar to the functions that we use to animate
    an abduction in the single-player mode. You could even modify your existing functions
    to handle the network behavior by calling them with a flag to indicate that they
    are coming from a remote device.


    ```

    func abductCowFromNetwork(at x: Int) {

    otherPlayerCurrentAbductee = cowArray?[x] as? UIImageView

    //otherPlayerCurrentAbductee?.frame = otherPlayerCurrentAbductee?.frame    //
    Skipping redundant initializing to itself

    otherPlayerCurrentAbductee?.layer.removeAllAnimations()

    UIView.animate(

    withDuration: 4.0,

    delay: 0,

    options: [.curveEaseIn, .beginFromCurrentState],

    animations: {

    var frame = self.otherPlayerCurrentAbductee?.frame

    frame?.origin.y = self.otherPlayerImageView?.frame.origin.y ?? 0.0

    self.otherPlayerCurrentAbductee?.frame = frame ?? CGRect.zero

    },

    completion: finishAbductingFromNetwork

    )

    }

    func finishAbductingFromNetwork(_ finished: Bool) {

    cowArray = cowArray?.filter({ ($0) as AnyObject !== (otherPlayerCurrentAbductee)
    as AnyObject })

    endTractorFromNetwork()

    otherPlayerCurrentAbductee?.layer.removeAllAnimations()

    otherPlayerCurrentAbductee?.removeFromSuperview()

    otherPlayerCurrentAbductee = nil

    if isHost {

    spawnCow()

    }

    }

    ```


    We also need to do some overhead to make sure we don’t create any new bugs. For
    example, we add a new pointer to keep track of which cow the enemy is currently
    abducting, if any. If you recall, in the updateCowPaths method, we don’t want
    to update the path for the cow that is being abducted because it will break the
    animation that is being used for the abduction. We need to modify that method
    to also ignore whatever cow the enemy happens to be abducting. If you were to
    run the game again, you would now notice that we have a fully functional multiplayer
    game, as seen in Figure [7-4](#216283_2_En_7_Chapter.xhtml#Fig4).


    ![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig4_HTML.jpg](images/216283_2_En_7_Chapter/216283_2_En_7_Fig4_HTML.jpg)


    Figure 7-4


    A fully functional multiplayer UFO game being played by two people using a Bluetooth
    connection'
  trans: "\n### 添加网络劫持代码\n\n最后需要处理的是为劫持代码提供网络支持。我们需要在奶牛被劫持时正确地移除和重生它们，同时显示敌方 UFO 使用牵引光束并将奶牛移入飞船的动画。\n\
    \n让我们从在每个设备上显示和隐藏牵引光束开始。由于用户每次触摸屏幕时都会启动牵引光束，并在松开触摸时结束它，我们可以从这里入手。这里没有需要传输的值值；我们唯一需要注意的就是启动和停止动画本身。修改`touchesBegan`和`touchesEnd`方法，向对等设备发送消息。修改后的方法如下所示：\n\
    \n```\noverride func touchesBegan(_ touches: Set, with event: UIEvent?) {\n  \
    \  currentAbductee = nil\n    tractorBeamOn = true\n    if gameIsMultiplayer {\n\
    \        gcManager?.sendStringToAllPeers(\"$beginTractorBeam\", reliable: true)\n\
