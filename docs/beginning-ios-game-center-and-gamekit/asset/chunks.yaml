    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig6_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig6_HTML.jpg)


    Figure 5-6


    An empty player attribute mask (0x00000000)


    Player 1 begins a new match and selects Squad Leader as his class. When that player
    creates the match, it will now have a player attribute mask that looks like that
    shown in Figure [5-7](#216283_2_En_5_Chapter.xhtml#Fig7).


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig7_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig7_HTML.jpg)


    Figure 5-7


    A player attribute mask representing the Squad Leader class (0xFF000000)


    Now the creator of the match uses Game Center to auto-match for new players. The
    first player Game Center finds has selected a class of Grenadier. The Grenadier
    will have a mask, which looks like that shown in Figure [5-8](#216283_2_En_5_Chapter.xhtml#Fig8).


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig8_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig8_HTML.jpg)


    Figure 5-8


    A player attribute mask representing the Grenadier class (0x0000FF00)


    When compared to the already existing match’s mask, as shown in Figure [5-9](#216283_2_En_5_Chapter.xhtml#Fig9),
    we can see there are no overlaps, so that player can be invited into the game.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig9_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Comparison of 0xFF000000 and 0x0000FF00


    When these masks are combined to form the new match mask, it will look like that
    shown in Figure [5-10](#216283_2_En_5_Chapter.xhtml#Fig10).


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig10_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig10_HTML.jpg)


    Figure 5-10


    A new match mask, representing two players (0xFF00FF00)


    Player 3 selects Breacher as his class and searches for a game. Game Center finds
    the match that we have been working with and determines that there is room for
    a Breacher by comparing the match’s mask to the Breacher’s mask, as shown in Figure
    [5-11](#216283_2_En_5_Chapter.xhtml#Fig11).


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig11_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig11_HTML.jpg)


    Figure 5-11


    The top is the current match’s mask (0xFF00FF00), and the bottom is a Breacher’s
    mask (0x00FF0000)


    Since there is no overlap between the masks, the Breacher can be invited into
    the game. Player 4 selects the class of Grenadier and has Game Center look for
    a match. Game Center again will find our match in progress and attempt to add
    the new player to it.


    Since the mask supplied by Player 4 overlaps a part of the match’s mask (see Figure
    [5-12](#216283_2_En_5_Chapter.xhtml#Fig12)), that player is not allowed to join.
    If Game Center cannot find an open match for that player, then it will begin looking
    for new players to fill in the holes on that player’s match.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig12_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig12_HTML.jpg)


    Figure 5-12


    The top is the current match’s mask (0xFFFFFF00), and the bottom is a Grenadier
    mask (0x0000FF00)


    Player 5 selects Light Machine Gun as his mask and begins looking for a game to
    join. Game Center compares his mask to the current match’s mask, as shown in Figure
    [5-13](#216283_2_En_5_Chapter.xhtml#Fig13).


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig13_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig13_HTML.jpg)


    Figure 5-13


    The top is the current match’s mask (0xFFFFFF00), and the bottom is a Light Machine
    Gun’s mask (0x000000FF)


    Since there is no overlap between the two mask sets, Player 5 can join the match.
    This will create a complete player attribute mask for the match, as shown in Figure
    [5-14](#216283_2_En_5_Chapter.xhtml#Fig14).


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig14_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig14_HTML.jpg)


    Figure 5-14


    A completed match mask (0xFFFFFFFF)


    If Player 5 never joined the game, and the original inviter wanted to fill the
    slot with a friend from Game Center, the invited friend would not have an option
    to select his class. The match, in that case, would have a mask that looks like
    that shown in Figure [5-15](#216283_2_En_5_Chapter.xhtml#Fig15). The invited friend
    would then be assigned the mask, shown in Figure [5-16](#216283_2_En_5_Chapter.xhtml#Fig16),
    that would complete the match’s mask. This would complete the player attribute
    masks and allow the game to begin.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig16_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig16_HTML.jpg)


    Figure 5-16


    A Machine Gun’s mask (0x000000FF), needed to complete the match’s mas


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig15_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig15_HTML.jpg)


    Figure 5-15


    The current match’s mask (0xFFFFFF0)


    Setting a player attribute is very straightforward and is shown in the following
    code snippet:


    ```

    struct PlayerClass: OptionSet {

    let rawValue: UInt32

    static let squadLeader     = PlayerClass(rawValue: 0xFF000000)

    static let breacher        = PlayerClass(rawValue: 0x00FF0000)

    static let grenadier       = PlayerClass(rawValue: 0x0000FF00)

    static let lightMachineGun = PlayerClass(rawValue: 0x000000FF)

    }

    ...

    let request = GKMatchRequest()

    request.minPlayers = 4

    request.maxPlayers = 4

    request.playerAttributes = PlayerClass.squadLeader.rawValue

    ```'
  trans: '

    ### 使用玩家属性


    不要让一长串限制让你对玩家属性望而却步。即使存在这些限制，它们在创建更好的多人游戏体验方面仍然极具价值。我们来看一个如何使用玩家属性构建比赛的示例：


    ```

    struct PlayerClass: OptionSet {

    let rawValue: UInt32

    static let squadLeader     = PlayerClass(rawValue: 0xFF000000)

    static let breacher        = PlayerClass(rawValue: 0x00FF0000)

    static let grenadier       = PlayerClass(rawValue: 0x0000FF00)

    static let lightMachineGun = PlayerClass(rawValue: 0x000000FF)

    }

    ```


    首先，我们为每个玩家属性定义一个掩码，在本节剩余部分将其称为“职业”。这个示例代表了一个现代军事风格游戏中的标准小队。每个职业被分配了一个不同的掩码值。Game
    Center 使用一种算法，根据以下规则将这些玩家匹配在一起。


    -   比赛的掩码始终以邀请玩家的掩码开始。

    -   如果邀请玩家已设置了玩家属性掩码，Game Center 将忽略所有未设置玩家属性掩码的玩家。

    -   只有当玩家的玩家属性掩码与比赛中已邀请的任何玩家的掩码的任何部分都不重叠时，该玩家才会被添加到比赛中。

    -   将玩家添加到比赛后，该玩家的属性值将逻辑上**或**到比赛的掩码中。

    -   如果比赛的掩码值等于 `FFFFFFFFh`，则认为比赛已满员并可以开始；如果掩码不等于 `FFFFFFFFh`，则 Game Center 将继续搜索可以填补比赛的玩家。

    -   无法查询 Game Center 以查看当前仍在等待哪个玩家。


    以下内容基于我们刚刚定义的职业。一个空白的比赛将拥有如图 5-6 所示的玩家属性掩码。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig6_HTML.jpg](img/216283_2_En_5_Fig6_HTML.jpg)


    **图 5-6** 一个空的玩家属性掩码 (`0x00000000`)


    玩家 1 开始一场新比赛，并选择“班长”作为他的职业。当该玩家创建比赛时，比赛的玩家属性掩码将如图 5-7 所示。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig7_HTML.jpg](img/216283_2_En_5_Fig7_HTML.jpg)


    **图 5-7** 代表“班长”职业的玩家属性掩码 (`0xFF000000`)


    现在，比赛的创建者使用 Game Center 自动匹配新玩家。Game Center 找到的第一个玩家选择了“掷弹兵”职业。“掷弹兵”的掩码将如图 5-8
    所示。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig8_HTML.jpg](img/216283_2_En_5_Fig8_HTML.jpg)


    **图 5-8** 代表“掷弹兵”职业的玩家属性掩码 (`0x0000FF00`)


    将其与已有的比赛掩码（如图 5-9 所示）比较，我们可以看到没有重叠，因此该玩家可以被邀请加入游戏。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig9_HTML.jpg](img/216283_2_En_5_Fig9_HTML.jpg)


    **图 5-9** 比较 `0xFF000000` 和 `0x0000FF00`


    当这些掩码合并形成新的比赛掩码时，它将如图 5-10 所示。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig10_HTML.jpg](img/216283_2_En_5_Fig10_HTML.jpg)


    **图 5-10** 一个新的比赛掩码，代表两名玩家 (`0xFF00FF00`)


    玩家 3 选择“突击手”作为他的职业并搜索游戏。Game Center 找到了我们一直在处理的那个比赛，并通过比较比赛掩码和“突击手”掩码确定有空位，如图
    5-11 所示。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig11_HTML.jpg](img/216283_2_En_5_Fig11_HTML.jpg)


    **图 5-11** 上方是当前比赛的掩码 (`0xFF00FF00`)，下方是“突击手”的掩码 (`0x00FF0000`)


    由于掩码之间没有重叠，因此“突击手”可以被邀请加入游戏。玩家 4 选择了“掷弹兵”职业，并让 Game Center 寻找比赛。Game Center 再次找到了我们正在进行的比赛，并试图将新玩家加入其中。


    由于玩家 4 提供的掩码与比赛掩码的一部分重叠（见图 5-12），因此不允许该玩家加入。如果 Game Center 无法为该玩家找到开放的比赛，它将开始寻找新玩家来填补该玩家比赛的缺口。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig12_HTML.jpg](img/216283_2_En_5_Fig12_HTML.jpg)


    **图 5-12** 上方是当前比赛的掩码 (`0xFFFFFF00`)，下方是“掷弹兵”的掩码 (`0x0000FF00`)


    玩家 5 选择“轻机枪手”作为他的掩码并开始寻找要加入的游戏。Game Center 将他的掩码与当前比赛的掩码进行比较，如图 5-13 所示。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig13_HTML.jpg](img/216283_2_En_5_Fig13_HTML.jpg)


    **图 5-13** 上方是当前比赛的掩码 (`0xFFFFFF00`)，下方是“轻机枪手”的掩码 (`0x000000FF`)


    由于两组掩码之间没有重叠，玩家 5 可以加入比赛。这将为比赛创建一个完整的玩家属性掩码，如图 5-14 所示。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig14_HTML.jpg](img/216283_2_En_5_Fig14_HTML.jpg)


    **图 5-14** 一个已满员的比赛掩码 (`0xFFFFFFFF`)


    如果玩家 5 从未加入游戏，而最初的邀请者想用 Game Center 上的一个朋友来填补这个空位，那么被邀请的朋友将无法选择他的职业。在这种情况下，比赛将拥有一个如图
    5-15 所示的掩码。然后，被邀请的朋友会被分配一个如图 5-16 所示的掩码，这将补全比赛的掩码，从而完成所有玩家属性掩码并允许游戏开始。


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig16_HTML.jpg](img/216283_2_En_5_Fig16_HTML.jpg)


    **图 5-16** 完成比赛掩码所需的“机枪手”掩码 (`0x000000FF`)


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig15_HTML.jpg](img/216283_2_En_5_Fig15_HTML.jpg)


    **图 5-15** 当前比赛的掩码 (`0xFFFFFF0`) [注：原文疑似笔误，但保留]


    设置玩家属性非常简单，如以下代码片段所示：


    ```

    struct PlayerClass: OptionSet {

    let rawValue: UInt32

    static let squadLeader     = PlayerClass(rawValue: 0xFF000000)

    static let breacher        = PlayerClass(rawValue: 0x00FF0000)

    static let grenadier       = PlayerClass(rawValue: 0x0000FF00)

    static let lightMachineGun = PlayerClass(rawValue: 0x000000FF)

    }

    ...

    let request = GKMatchRequest()

    request.minPlayers = 4

    request.maxPlayers = 4

    request.playerAttributes = PlayerClass.squadLeader.rawValue

    ```

