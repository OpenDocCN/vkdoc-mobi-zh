    ```


    This method calls the GameCenterManager method to retrieve our score list. The
    segmented control has two values: one for friends and one for everyone (global).
    You could easily modify the preceding code to retrieve different time scopes as
    well, but in this example, we request only the all-time scope. An important step
    here that can be easy to overlook is setting the array to an empty array and reloading
    the table. Doing so will remove the scores that are in the table when the segmented
