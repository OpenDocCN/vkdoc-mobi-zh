  trans: '

    # 在 App Store Connect 中配置成就


    正如我们在排行榜中看到的那样，如果不先在 App Store Connect 中至少设置一个新成就，你就无法开始处理成就。使用你的 Apple Connect
    用户名和密码登录 App Store Connect（`http://appstoreconnect.apple.com`），并选择我们在之前章节中已经处理过的应用（更多信息请参见第
    2 章）。从控制面板中选择应用后，返回“管理功能”区域，然后进入本书前面介绍的 Game Center 区域。


    你的应用的 Game Center 门户会有一个标有“成就”的部分。你会在成就区域的左上方找到一个“+”按钮。此按钮允许你设置一个新成就，如图 4-2 所示。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig2_HTML.jpg](img/216283_2_En_4_Fig2_HTML.jpg)


    图 4-2


    通过 App Store Connect 门户添加新成就


    你可能会注意到，这个门户页面与排行榜门户页面有很多相似之处。我在表 4-1 中分解了这些属性。


    表 4-1


    iTunes Connect 中的成就属性


    | 属性 | 描述 |

    | --- | --- |

    | 成就参考名称 | 一个在 iTunes Connect 外部不使用的字符串；该字符串用于在 App Store Connect 内轻松定位和引用此成就。
    |

    | 成就 ID | 这是你将在代码中引用的标识符。与排行榜类别类似，Apple 建议你使用反向 DNS 系统，例如 `com.company.appname.achievementname`。
    |

    | 隐藏 | 如果某个成就是隐藏的，用户只有在完成它或增加进度后才能在成就列表中看到它。 |

    | 分值 | 成就可以分配分数。你的应用被分配了 1,000 分。每个完成的成就都会使用户朝着该总分前进。一旦用户达到 1,000 分，他们就解锁了所有成就。你应该为更难以完成的成就分配更多的分数。这能为用户提供更好的成就感，让他们了解成就的价值。分值是可选的，如果你不想在应用中使用它们，可以忽略。
    |


    **提示**


    你不必让你的成就总分加起来正好达到 1,000 分，但你不能超过 1,000 分。要小心考虑你可能想要添加的任何未来成就。一旦某个成就上线，就无法从 App
    Store Connect 中移除；但是，你可以在游戏中将其移除并隐藏。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig3_HTML.jpg](img/216283_2_En_4_Fig3_HTML.jpg)


    图 4-3


    App Store Connect 中新成就的配置视图


    现在是时候创建一个新成就了。我们将创建一个在用户绑架 25 头牛时达到的成就。我们将使用“绑架 25”作为成就名称，这样当有几十个成就时很容易找到。对于我们的成就
    ID，我们将使用 `com.dragonforged.ufo.abduct25`。你可以随意使用你想要的任何 ID，但请确保在接下来的示例中将其替换为 `com.dragonforged.ufo.abduct25`。我们将把这个成就设为非隐藏成就，并为其分配
    10 分。


    **重要**


    任何成就完成时获得的分数都不能超过 100 分。


    要使成就有效，你必须至少配置一种语言。如图 4-4 所示，成就的本地化区域与上一章创建排行榜时遇到的情况大不相同。请参考表 4-2 了解每个属性的信息。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig4_HTML.jpg](img/216283_2_En_4_Fig4_HTML.jpg)


    图 4-4


    在 iTunes Connect 中本地化成就


    **注意**


    每个游戏拥有自己的成就描述；你不能在多个游戏之间共享成就描述。


    表 4-2


    iTunes Connect 中的本地化成就属性


    | 属性 | 描述 |

    | --- | --- |

    | 语言 | 选择此成就将显示的语言。你必须为你发布的产品中将支持的每种本地化设置一种语言。 |

    | 标题 | 这是在应用内显示以描述此成就的标题。 |

    | 达成前描述 | 这是当成就处于非隐藏状态但尚未获得或仅部分完成时显示的描述。 |

    | 达成后描述 | 这是当成就已完全解锁并完成时显示的描述。 |

    | 图片 | 这是当成就获得时将显示给用户的图片。Apple 将提供未获得时的图片，或者在使用自定义成就 GUI 时，你可以指定自己的图片。此图片必须为 512
    x 512 和 72 DPI。 |


    就我们而言，我们将为此成就配置英语。我将使用“绑架 25 头牛”作为标题，但你可以使用你喜欢的任何标题。对于达成前描述，我选择了“用你的 UFO 绑架 25
    头牛。”对于达成后描述，我使用了“你已经掌握了绑架牛的艺术。”我还将使用一个牛过路标志作为图片。完成后，你应该有一个设置完整的成就，它看起来应该类似于图 4-5
    中显示的视图。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig5_HTML.jpg](img/216283_2_En_4_Fig5_HTML.jpg)


    图 4-5


    一个新成就，显示在 iTunes Connect 中


    我们将为我们的游戏处理几个不同的成就设置。继续创建另一个新成就，用于绑架一头牛；这将是我们非渐进式的成就。然后，创建第三个成就，用于五分钟的游戏时间，并将其设置为隐藏。这最后一个成就将让我们处理计时器、渐进式成就和隐藏成就。你可以为这些成就选择任何你想要的分值、描述、标题和图片，但请务必记住成就
    ID。


    现在，你应该在 App Store Connect 中为我们的游戏配置了三个成就。


    我们现在可以回到 Xcode 并开始处理这些成就了。

    '
- fmt: "### Presenting Achievements\n\nUnlike leaderboards, there will be plenty to\
    \ preview GUI-wise before we populate user data into our achievement system. It\
    \ is helpful to see the effects that modifying achievements have on how they are\
    \ displayed through the default GUI. In the remainder of this chapter, we will\
    \ begin by presenting Apple's achievement GUI and then move on to submitting user\
    \ data. We will also cover custom GUI achievements.\n\nBefore we can begin, we\
    \ need to create a new `UIbutton` that will trigger the achievement view. We most\
    \ likely want to do this outside of the game screen, as we did with our two leaderboard\
    \ buttons. We begin by adding a new button to the `UFOViewController` view, as\
    \ shown in Figure [4-6](#216283_2_En_4_Chapter.xhtml#Fig6).\n\nYou also need to\
    \ create and hook up an `IBAction` to our new achievement button. Insert the following\
    \ code into the action that you hooked up to the achievement button:\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig6_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig6_HTML.jpg)\n\
    \nFigure 4-6: Adding a new button to trigger our achievement view\n\n```\n@IBAction\
    \ func achievementButtonPressed() {\n    var achievementViewController: GKGameCenterViewController?\
    \ = nil\n    if let state = GKGameCenterViewControllerState(rawValue: 1) {\n \
    \       achievementViewController = GKGameCenterViewController(state: state)\n\
    \    }\n    achievementViewController?.gameCenterDelegate = self\n    if let achievementViewController\
    \ = achievementViewController {\n        present(achievementViewController, animated:\
    \ true)\n    }\n}\n```\n\nIf you were to run the App and tap on the achievement\
    \ button, you would now see a view similar to the one shown in Figure [4-7](#216283_2_En_4_Chapter.xhtml#Fig7).\
    \ The achievements shown are using Apple's unearned image. Apple recommends that\
    \ you always use its unearned image, but when working with a custom achievement\
    \ GUI, you can override this image and return your own.\n\nNext, recall that we\
    \ set up three achievements, one of them hidden. As you can see in Figure [4-7](#216283_2_En_4_Chapter.xhtml#Fig7),\
    \ the provided view shows us only two achievements. Because we have not submitted\
