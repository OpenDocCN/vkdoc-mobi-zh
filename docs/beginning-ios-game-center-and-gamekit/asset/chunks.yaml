- fmt: "### Performing a Hit Test with a `UIImage`\n\nBefore we can worry about how\
    \ to set up the cow abduction, there are preliminary steps for abducting the cow\
    \ itself. For starters, we must implement a `hitTest` function that was previously\
    \ being called from the `touchesBegan` event that was discussed earlier in this\
    \ section.\n\n```\nfunc hitTest() -> UIImageView? {\n    if !tractorBeamOn {\n\
    \        return nil\n    }\n    for x in 0..<(cowArray?.count ?? 0) {\n      \
    \  let tempCow = cowArray?[x] as? UIImageView\n        let cowLayer = tempCow?.layer.presentation()\n\
    \        let cowFrame = cowLayer?.frame\n        if cowFrame?.intersects(tractorBeamImageView?.frame\
    \ ?? CGRect.zero) ?? false {\n            tempCow?.frame = cowLayer?.frame ??\
    \ CGRect.zero\n            tempCow?.layer.removeAllAnimations()\n            if\
    \ gameIsMultiplayer {\n                gcManager?.sendStringToAllPeers(String(format:\
    \ \"$abductCowAtIndex:%i\", x), reliable: true)\n            }\n            return\
    \ tempCow\n        }\n    }\n    return nil\n}\n```\n\nThe first line is another\
    \ sanity check to ensure that we are not calling the `hitTest` function when the\
    \ `tractorBeam` is not on. Once we make sure we are supposed to be checking for\
    \ the hit, we iterate through our array of cow objects. Since the cows are in\
    \ the middle of an animation, we cannot rely on the data from the frame, as it\
    \ will show where the cow will end up and not where the cow currently is.\n\n\
    To determine where the cow currently is, we ask for the `presentationLayer`. Core\
    \ Graphics provides a useful function for testing whether two `GCRects` intersect,\
    \ and that is what we will be using here. If we hit a cow, we return the object.\
    \ If we get to the end of our loop without passing a hit test, we return `nil`,\
    \ which lets us know that no cow was hit by the tractor beam.\n\n> **Tip：** `presentationLayer`\
    \ can be called on any `CALayer` to provide a best guess on the current values\
    \ of a layer that is currently in the process of being animated. While it does\
    \ not absolutely guarantee the current position of the animation, it provides\
    \ a good-enough solution for our game.\n\n### Abducting a Cow\n\nIn our `touchesBegan`\
    \ function, we tested to see if `hitTest` returned a cow. If it did, we call `abductCow`\
    \ with the object that was returned. We can now take a look at that function.\n\
    \n```\nfunc abductCow(_ cowImageView: UIImageView?) {\n    UIView.animate(\n \
    \       withDuration: 4.0,\n        delay: 0,\n        options: [.curveEaseIn,\
    \ .beginFromCurrentState],\n        animations: {\n            var frame = cowImageView?.frame\n\
    \            frame?.origin.y = self.myPlayerImageView?.frame.origin.y ?? 0.0\n\
    \            cowImageView?.frame = frame ?? CGRect.zero\n        },\n        completion:\
    \ finishAbducting\n    )\n}\n```\n\nWe begin an animation event on our cow object\
    \ (which is an `imageView`). We also set a `completion handler`, which will be\
    \ called once the animation has finished. We set the new y axis coordinate for\
    \ the cow to our UFO’s current y axis coordinate and begin the animation.\n\n\
    Once the animation has stopped, we get a callback to `finishAbducting`. This allows\
    \ us to increase the score, clean up the abducting code, and spawn a new cow.\n\
    \n```\nfunc finishAbducting(_ finished: Bool) {\n    if currentAbductee == nil\
    \ || !tractorBeamOn {\n        return\n    }\n    cowArray = cowArray?.filter({\
    \ ($0) as AnyObject !== (currentAbductee) as AnyObject })\n    tractorBeamImageView?.removeFromSuperview()\n\
    \    tractorBeamOn = false\n    score += 1\n    scoreLabel.text = String(format:\
    \ \"SCORE %05.0f\", score)\n    currentAbductee?.layer.removeAllAnimations()\n\
    \    currentAbductee?.removeFromSuperview()\n    currentAbductee = nil\n    spawnCow()\n\
    }\n```\n\nAt the beginning of the function, we check to see that the tractor beam\
    \ is still on and that we have an abductee, once again just for some extra sanity\
    \ and error checking. Just as we did when the user released their touch from the\
    \ screen, we also want to remove the tractor beam image from the view and correctly\
    \ set the state variables. We award the user with a single point for abducting\
    \ each cow, and we update the `scoreLabel` accordingly. We clean up the old cow\
    \ image and set it back to `nil`. Now we spawn a new cow to replace the abducted\
    \ one.\n\n### Configuring App Store Connect for Game Center\n\nBefore your swift\
    \ app or game can access any of the Game Center functionality, it will need to\
    \ be configured in App Store Connect, formerly called iTunes Connect. Apple uses\
    \ this portal as its main source for app configuration. Such functionality as\
    \ in-app purchase (IAP), TestFlight, and Game Center requires App Store Connect\
    \ configuration.\n\n> **Note：** You can still use any stand-alone GameKit functionality\
    \ without setting up Game Center for your app. See Chapters [6](#216283_2_En_6_Chapter.xhtml),\
    \ [7](#216283_2_En_7_Chapter.xhtml), [8](#216283_2_En_8_Chapter.xhtml), and [10](#216283_2_En_10_Chapter.xhtml)\
    \ for more information on GameKit’s stand-alone functionality.\n\n## Getting Started\
    \ with App Store Connect\n\nIf you have never uploaded an app to the App Store,\
    \ you might be unfamiliar with the App Store Connect portal. However, if you have\
    \ worked with App Store Connect previously, you might want to skip to the next\
    \ section, as this will be refresher for you.\n\nApp Store Connect is a web portal\
    \ accessed from any web browser at [`https://appstoreconnect.apple.com`](https://appstoreconnect.apple.com).\
    \ You will use your existing AppleID, which you registered as a developer with,\
    \ to gain access to the portal. This is the same web application that you will\
    \ use when you want to upload new apps for sale on the App Store, as well as make\
    \ any changes to them, such as price or description. A view of the landing page\
    \ for App Store Connect can be seen in Figure [1-4](#216283_2_En_1_Chapter.xhtml#Fig4).\n\
    \n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig4_HTML.png](images/216283_2_En_1_Chapter/216283_2_En_1_Fig4_HTML.png)\n\
    *Figure 1-4 – A view of App Store Connect taken November 2020*\n\nWhen you log\
    \ in to App Store Connect, you will be presented with a wealth of options. The\
    \ most important of these is setting up your contracts, tax, and banking information.\
    \ While these requirements do not have anything to do with Game Center per se,\
    \ it is good to get them out of the way.\n\nIt may take weeks for Apple to process\
    \ this information, so submit it as soon as possible. Until this information is\
    \ processed and approved, you will be unable to release software on the App Store.\
    \ Once you have completed all the requested information under this section, you\
    \ can focus on the app development itself.\n\n> **Note：** If you plan on releasing\
    \ only free apps, you do not need to complete the paid apps contracts. However,\
    \ if you plan on releasing any paid software in the future, these should be completed\
    \ as soon as possible.\n\nBefore you can access any Game Center–specific information,\
    \ you will need to create a new (or use an existing) app. This is a straightforward\
    \ process that you will be walked through in App Store Connect. You begin under\
    \ the My Apps section; there you will find a small plus button near the web page\
    \ title in the upper left corner. The rest should be fairly self-explanatory.\n\
    \nIf you are not yet ready to upload an app, you can create placeholder data here\
    \ to gain access to the Game Center portal. Once your app has been created in\
    \ App Store Connect, you can begin to configure the Game Center–specific information.\n\
    \n> **Caution：** If you create an app and fail to upload a release build within\
    \ 90 days, Apple will delete the app information and restrict you from creating\
    \ a new app with the same name in the future. This is an effort to prevent people\
    \ from “domain squatting” app names."
  raw: '### Performing a Hit Test with a UIImage


    Before we can worry about how to set up the cow abduction, there are preliminary
    steps for abducting the cow itself. For starters, we must implement a `hitTest`
    function that was previously being called from the `touchesBegan` event that was
    discussed earlier in this section.


    ```

    func hitTest() -> UIImageView? {

    if !tractorBeamOn {

    return nil

    }

    for x in 0..<(cowArray?.count ?? 0) {

    let tempCow = cowArray?[x] as? UIImageView

    let cowLayer = tempCow?.layer.presentation()

    let cowFrame = cowLayer?.frame

    if cowFrame?.intersects(tractorBeamImageView?.frame ?? CGRect.zero) ?? false {

    tempCow?.frame = cowLayer?.frame ?? CGRect.zero

    tempCow?.layer.removeAllAnimations()

    if gameIsMultiplayer {

    gcManager?.sendStringToAllPeers(String(format: "$abductCowAtIndex:%i", x), reliable:
    true)

    }

    return tempCow

    }

    }

    return nil

    }

    ```


    The first line is another sanity check to ensure that we are not calling the `hitTest`
    function when the `tractorBeam` is not on. Once we make sure we are supposed to
    be checking for the hit, we iterate through our array of cow objects. Since the
    cows are in the middle of an animation, we cannot rely on the data from the frame,
    as it will show where the cow will end up and not where the cow currently is.


    To determine where the cow currently is, we ask for the `presentationLayer`. Core
    Graphics provides a useful function for testing whether two `GCRects` intersect,
    and that is what we will be using here. If we hit a cow, we return the object.
    If we get to the end of our loop without passing a hit test, we return `nil, which
    lets us know that no cow was hit by the tractor beam`.


    Tip


    `presentationLayer` can be called on any `CALayer` to provide a best guess on
    the current values of a layer that is currently in the process of being animated.
    While it does not absolutely guarantee the current position of the animation,
    it provides a good-enough solution for our game.


    ### Abducting a Cow


    In our `touchesBegan` function, we tested to see if `hitTest` returned a cow.
    If it did, we call `abductCow` with the object that was returned. We can now take
    a look at that function.


    ```

    func abductCow(_ cowImageView: UIImageView?) {

    UIView.animate(

    withDuration: 4.0,

    delay: 0,

    options: [.curveEaseIn, .beginFromCurrentState],

    animations: {

    var frame = cowImageView?.frame

    frame?.origin.y = self.myPlayerImageView?.frame.origin.y ?? 0.0

    cowImageView?.frame = frame ?? CGRect.zero

    },

    completion: finishAbducting

    )

    }

    ```


    We begin an animation event on our cow object (which is an `imageView`). We also
    set a `completion handler`, which will be called once the animation has finished.
    We set the new y axis coordinate for the cow to our UFO’s current y axis coordinate
    and begin the animation.


    Once the animation has stopped, we get a callback to `finishAbducting`. This allows
    us to increase the score, clean up the abducting code, and spawn a new cow.


    ```

    func finishAbducting(_ finished: Bool) {

    if currentAbductee == nil || !tractorBeamOn {

    return

    }

    cowArray = cowArray?.filter({ ($0) as AnyObject !== (currentAbductee) as AnyObject
    })

    tractorBeamImageView?.removeFromSuperview()

    tractorBeamOn = false

    score += 1

    scoreLabel.text = String(format: "SCORE %05.0f", score)

    currentAbductee?.layer.removeAllAnimations()

    currentAbductee?.removeFromSuperview()

    currentAbductee = nil

    spawnCow()

    }

    ```


    At the beginning of the function, we check to see that the tractor beam is still
    on and that we have an abductee, once again just for some extra sanity and error
    checking. Just as we did when the user released their touch from the screen, we
    also want to remove the tractor beam image from the view and correctly set the
    state variables. We award the user with a single point for abducting each cow,
    and we update the `scoreLabel` accordingly. We clean up the old cow image and
    set it back to `nil`. Now we spawn a new cow to replace the abducted one.


    ### Configuring App Store Connect for Game Center


    Before your swift app or game can access any of the Game Center functionality,
    it will need to be configured in App Store Connect, formerly called iTunes Connect.
    Apple uses this portal as its main source for app configuration. Such functionality
    as in-app purchase (IAP), TestFlight, and Game Center requires App Store Connect
    configuration.


    Note


    You can still use any stand-alone GameKit functionality without setting up Game
    Center for your app. See Chapters [6](#216283_2_En_6_Chapter.xhtml), [7](#216283_2_En_7_Chapter.xhtml),
    [8](#216283_2_En_8_Chapter.xhtml), and [10](#216283_2_En_10_Chapter.xhtml) for
    more information on GameKit’s stand-alone functionality.


    ## Getting Started with App Store Connect


    If you have never uploaded an app to the App Store, you might be unfamiliar with
    the App Store Connect portal. However, if you have worked with App Store Connect
    previously, you might want to skip to the next section, as this will be refresher
    for you.


    App Store Connect is a web portal accessed from any web browser at [`https://appstoreconnect.apple.com`](https://appstoreconnect.apple.com).
    You will use your existing AppleID, which you registered as a developer with,
    to gain access to the portal. This is the same web application that you will use
    when you want to upload new apps for sale on the App Store, as well as make any
    changes to them, such as price or description. A view of the landing page for
    App Store Connect can be seen in Figure [1-4](#216283_2_En_1_Chapter.xhtml#Fig4).


    ![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig4_HTML.png](images/216283_2_En_1_Chapter/216283_2_En_1_Fig4_HTML.png)


    Figure 1-4


    A view of App Store Connect taken November 2020


    When you log in to App Store Connect, you will be presented with a wealth of options.
    The most important of these is setting up your contracts, tax, and banking information.
    While these requirements do not have anything to do with Game Center per se, it
    is good to get them out of the way.


    It may take weeks for Apple to process this information, so submit it as soon
    as possible. Until this information is processed and approved, you will be unable
    to release software on the App Store. Once you have completed all the requested
    information under this section, you can focus on the app development itself.


    Note


    If you plan on releasing only free apps, you do not need to complete the paid
    apps contracts. However, if you plan on releasing any paid software in the future,
    these should be completed as soon as possible.


    Before you can access any Game Center–specific information, you will need to create
    a new (or use an existing) app. This is a straightforward process that you will
    be walked through in App Store Connect. You begin under the My Apps section; there
    you will find a small plus button near the web page title in the upper left corner.
    The rest should be fairly self-explanatory.


    If you are not yet ready to upload an app, you can create placeholder data here
    to gain access to the Game Center portal. Once your app has been created in App
    Store Connect, you can begin to configure the Game Center–specific information.


    Caution


    If you create an app and fail to upload a release build within 90 days, Apple
    will delete the app information and restrict you from creating a new app with
    the same name in the future. This is an effort to prevent people from “domain
    squatting” app names.'
  trans: "\n### 对 `UIImage` 执行命中检测\n\n在考虑如何设置绑架奶牛之前，我们需要先完成一些准备工作。首先，我们必须实现一个 `hitTest`\
    \ 函数，该函数此前会在本节前面讨论的 `touchesBegan` 事件中被调用。\n\n```\nfunc hitTest() -> UIImageView?\
    \ {\n    if !tractorBeamOn {\n        return nil\n    }\n    for x in 0..<(cowArray?.count\
    \ ?? 0) {\n        let tempCow = cowArray?[x] as? UIImageView\n        let cowLayer\
    \ = tempCow?.layer.presentation()\n        let cowFrame = cowLayer?.frame\n  \
    \      if cowFrame?.intersects(tractorBeamImageView?.frame ?? CGRect.zero) ??\
    \ false {\n            tempCow?.frame = cowLayer?.frame ?? CGRect.zero\n     \
    \       tempCow?.layer.removeAllAnimations()\n            if gameIsMultiplayer\
    \ {\n                gcManager?.sendStringToAllPeers(String(format: \"$abductCowAtIndex:%i\"\
    , x), reliable: true)\n            }\n            return tempCow\n        }\n\
    \    }\n    return nil\n}\n```\n\n第一行代码是另一项合理性检查，确保我们在牵引光束未打开时不会调用 `hitTest` 函数。确认需要进行碰撞检测后，我们遍历奶牛对象数组。由于奶牛正在播放动画，我们不能依赖\
    \ `frame` 中的数据，因为它显示的是奶牛最终会移动到的位置，而非其当前位置。\n\n要确定奶牛当前的位置，我们需要获取 `presentationLayer`。Core\
    \ Graphics 提供了一个用于测试两个 `GCRects` 是否相交的有用函数，这正是我们要使用的。如果命中了某头奶牛，我们就返回该对象。如果遍历完整个循环仍未通过命中检测，则返回\
    \ `nil`，这表示牵引光束没有击中任何奶牛。\n\n> **提示：** 可以在任何 `CALayer` 上调用 `presentationLayer`，以提供对正在动画过程中图层当前值的最佳估算。虽然它不能绝对保证动画的当前位置，但为我们的游戏提供了足够好的解决方案。\n\
    \n### 绑架奶牛\n\n在我们的 `touchesBegan` 函数中，我们测试了 `hitTest` 是否返回了一头奶牛。如果是，我们就调用 `abductCow`\
    \ 函数，并将返回的对象作为参数传入。现在，我们来仔细看看这个函数。\n\n```\nfunc abductCow(_ cowImageView: UIImageView?)\
    \ {\n    UIView.animate(\n        withDuration: 4.0,\n        delay: 0,\n    \
    \    options: [.curveEaseIn, .beginFromCurrentState],\n        animations: {\n\
    \            var frame = cowImageView?.frame\n            frame?.origin.y = self.myPlayerImageView?.frame.origin.y\
    \ ?? 0.0\n            cowImageView?.frame = frame ?? CGRect.zero\n        },\n\
    \        completion: finishAbducting\n    )\n}\n```\n\n我们在奶牛对象（即一个 `imageView`）上启动动画事件。我们还设置了一个\
    \ `completion handler`（完成处理程序），它将在动画完成后被调用。我们将奶牛的 Y 轴新坐标设置为 UFO 当前的 Y 轴坐标，然后开始播放动画。\n\
    \n动画停止后，我们会收到 `finishAbducting` 的回调。这使我们能够增加分数、清理绑架代码，并生成一头新奶牛。\n\n```\nfunc finishAbducting(_\
    \ finished: Bool) {\n    if currentAbductee == nil || !tractorBeamOn {\n     \
    \   return\n    }\n    cowArray = cowArray?.filter({ ($0) as AnyObject !== (currentAbductee)\
    \ as AnyObject })\n    tractorBeamImageView?.removeFromSuperview()\n    tractorBeamOn\
    \ = false\n    score += 1\n    scoreLabel.text = String(format: \"SCORE %05.0f\"\
    , score)\n    currentAbductee?.layer.removeAllAnimations()\n    currentAbductee?.removeFromSuperview()\n\
    \    currentAbductee = nil\n    spawnCow()\n}\n```\n\n在函数开头，我们检查牵引光束是否仍然打开并且我们是否还有一个被绑架对象，这同样是出于额外的合理性和错误检查。正如我们在用户从屏幕上松开手指时所做的那样，我们也需要从视图中移除牵引光束图像，并正确设置状态变量。每绑架一头奶牛，我们就奖励用户\
    \ 1 分，并相应地更新 `scoreLabel`。我们清理旧奶牛图像，并将其设置回 `nil`。然后生成一头新奶牛来替换被绑架的奶牛。\n\n### 在\
    \ App Store Connect 中配置 Game Center\n\n在你的 Swift 应用程序或游戏能够访问任何 Game Center 功能之前，需要先在\
    \ App Store Connect（曾用名 iTunes Connect）中进行配置。Apple 使用这个门户网站作为其主要的应用配置来源。诸如应用内购买\
    \ (IAP)、TestFlight 和 Game Center 等功能都需要 App Store Connect 配置。\n\n> **注意：** 你仍然可以在不为应用设置\
    \ Game Center 的情况下，使用任何独立的 GameKit 功能。有关 GameKit 独立功能的更多信息，请参见第 6、7、8 和 10 章。\n\
    \n## App Store Connect 入门\n\n如果你从未向 App Store 上传过应用，可能对 App Store Connect 门户不太熟悉。然而，如果你之前使用过\
    \ App Store Connect，可以跳到下一节，因为这里的内容对你来说是复习。\n\nApp Store Connect 是一个网页门户，可以通过任何网页浏览器在\
    \ [`https://appstoreconnect.apple.com`](https://appstoreconnect.apple.com) 访问。你需要使用已注册为开发者的现有\
    \ AppleID 来访问该门户。当你想要在 App Store 上架销售新应用，或对现有应用进行任何修改（如价格或描述）时，你也将使用这个相同的 Web\
    \ 应用程序。App Store Connect 的登录页面视图如图 1-4 所示。\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig4_HTML.png](img/216283_2_En_1_Fig4_HTML.png)\n\
    *图 1-4 – 2020 年 11 月拍摄的 App Store Connect 界面视图*\n\n登录 App Store Connect 后，你会看到大量的选项。其中最重要的是设置你的合同、税务和银行信息。虽然这些要求本身与\
    \ Game Center 无关，但最好尽早处理它们。\n\nApple 处理这些信息可能需要数周时间，因此请尽快提交。在这些信息被处理并批准之前，你将无法在\
    \ App Store 上发布软件。完成此部分下的所有要求信息后，你就可以专注于应用开发本身了。\n\n> **注意：** 如果你计划仅发布免费应用，则无需完成付费应用合同。但是，如果你将来计划发布任何付费软件，应尽快完成这些合同的填写。\n\
    \n在访问任何 Game Center 特定信息之前，你需要创建一个新的应用（或使用现有应用）。这是一个直接在 App Store Connect 中引导你完成的简单流程。你从“我的\
    \ App”部分开始；在那里，你会在网页标题左上角附近找到一个小加号按钮。其余操作应该相当直观易懂。\n\n如果你尚未准备好上传应用，可以在此处创建占位数据，以便访问\
    \ Game Center 门户。一旦在 App Store Connect 中创建了应用，你就可以开始配置 Game Center 的特定信息了。\n\n\
    > **警告：** 如果你创建了一个应用但在 90 天内未能上传一个发布版本，Apple 将删除该应用信息，并限制你将来使用相同名称创建新应用。这是为了防止有人“域名抢注”应用名称。\n"
- fmt: "### Configuring Game Center in App Store Connect\n\nOnce you have selected\
    \ your app from within App Store Connect, you will see a view similar to the screen\
    \ capture in Figure [1-5](#216283_2_En_1_Chapter.xhtml#Fig5), shown later in this\
