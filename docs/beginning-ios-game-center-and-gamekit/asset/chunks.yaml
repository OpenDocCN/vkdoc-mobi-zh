  trans: '

    # 向比赛中添加玩家


    在比赛创建后，有时你可能需要向其中添加新玩家。例如，也许有玩家中途掉线，你希望在不用重新开始比赛的情况下替换他；或者游戏开始后某位玩家未能成功连接，你想找一名替补。以下函数将利用自动匹配行为，自动向比赛中添加新玩家：


    ```

    func addPlayer(to match: GKMatch?, with request: GKMatchRequest?) {

    if let match = match, let request = request {

    GKMatchmaker.shared().addPlayers(to: match, matchRequest: request, completionHandler:
    { error in

    if let error = error {

    print("向比赛中添加玩家时发生错误：\(error.localizedDescription)")

    } else {

    print("已向比赛添加一名玩家")

    }

    })

    }

    }

    ```


    玩家被添加至比赛后，你需要让该玩家与当前比赛同步。添加玩家后，该玩家将可以接收和发送数据，但无法访问比赛中已发送过的历史数据。


    # 重新邀请


    Game Center 具有自动尝试重新邀请断线玩家的功能。此方法仅支持两人模式的 Game Center 比赛。当玩家断线时，会调用以下函数；Game Center
    将自动尝试重新连接该玩家。如果成功，你会额外收到一次对 `match(_:player:didChange:)` 的调用：


    ```

    func match(_ match: GKMatch, shouldReinviteDisconnectedPlayer player: GKPlayer)
    -> Bool {

    true

    }

    ```


    # 玩家分组


    玩家分组允许你为每位玩家指定不同的分类。默认情况下，Game Center 会自行匹配所有玩家到同一组。通过玩家分组，你可以指定某些玩家只寻找包含同组其他玩家的队伍。


    例如，想要挑战特定难度地牢或特定赛道的玩家会被分到同一组，使他们能与其他有相同游戏意愿的玩家配对。玩家分组可用于将玩家划分到多种不同类型的群体中，例如：


    -   希望玩同一关卡地图（如赛道）、RPG 中的特定区域、第一人称射击游戏中的地图、或动作游戏中某一关的玩家。


    -   根据技能等级区分玩家。既可以由玩家自行选择想玩的技能等级，也可以根据过往表现或连胜记录自动判定其技能等级。


    -   正在进行的游戏类型。例如，可依据玩家想玩“夺旗模式”、“团队死斗”、“占领模式”还是“孤军奋战”进行划分。


    -   希望共同游戏的同一部落、公会、战队或网络内的玩家。


    -   已购买额外应用内内容，且因故无法再与未拥有相同内容的玩家配对的玩家。


    玩家分组并不局限于这些类别，你可以根据应用需求以任何方式将玩家分组。玩家分组通过 `GKMatchRequest` 的 `playerGroup` 属性来表示。该属性唯一的限制是必须为
    `Int` 类型。指定 `playerGroup` 的方法相当直接，如下方代码片段所示：


    ```

    let myForestMap = 123456789

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 4

    request.playerGroup = myForestMap

    ```


    在大多数情况下，你应该让用户自行选择他们所属的 `playerGroup`；但也有一些例外情况，比如自动判定玩家的技能等级。


    **注意：** 一旦将 `playerGroup` 设置为任何非零值，玩家将只会与同组的其他玩家进行匹配。


    # 玩家属性


    与玩家分组类似，玩家属性在匹配过程中用于缩小可供用户选择的游戏范围。玩家属性通常与玩家分组功能相同，但处理某些事情的方式有所不同。玩家属性的诸多用途包括以下几种：


    -   在角色扮演游戏中，角色通常会选择职业。为了完成任务，通常需要一支包含多种职业的队伍——例如治疗者、战士和法师。


    -   体育游戏中通常有各种场上位置，如守门员、后卫、中场和前锋。一支队伍需要这些位置的混合才能进行比赛。


    -   在潜艇模拟游戏中，你也可以安排不同角色的玩家，如舰长、声纳操作员、领航员和武器系统操作员。


    -   在第一人称射击游戏中，你可能需要担任近距离战斗专家、狙击手、医疗兵和排长等角色的玩家。


    ## 了解玩家属性的限制


    玩家属性可用于给每位玩家分配这些值，从而使你能够平衡包含所需角色的队伍。然而，使用玩家属性时存在若干限制；在开始使用玩家属性之前，务必熟悉以下几点：


    -   每个角色只能由一名玩家担任。例如，你不能在一场足球比赛中要求三名中场球员。


    -   所有角色都必须被填满后，游戏才会被认为可以开始。例如，根据前述例子，第一人称射击游戏不能没有狙击手。


    -   每位玩家一次只能担任一个角色；玩家不能以同时满足多个角色的身份加入游戏。例如，你不能让一位第一人称射击游戏的玩家既愿意当狙击手又愿意当医疗兵；他们需要在匹配请求确定之前选择一个。


    -   玩家属性在自动匹配过程中使用。如果你邀请朋友加入游戏，系统不会检查他们是否符合需要填补的角色。相反，他们会被自动分配一个随机且未被占用的角色。简言之，朋友无法选择自己的玩家属性。


    -   玩家属性不会显示在标准匹配界面的任何位置。你需要在进入该视图之前实现自己的系统，以便让用户选择角色。


    -   `GKMatch` 对象不包含关于哪些玩家被分配了哪些角色的信息。你需要在比赛连接后自行实现系统来判断谁在扮演哪个角色。


    -   没有现成系统可以判断哪些角色供过于求，或哪些角色更难找到比赛。例如，在角色扮演游戏中可能每个人都想玩法师，而没人愿意当治疗者；因此，法师玩家找公开比赛会困难得多，而治疗者则能轻易找到比赛。

    '
- fmt: '### Working with Player Attributes


    Don’t let the long list of limitations scare you off from player attributes. Even
    with the listed limitations, they can be extremely valuable in creating a better
    multiplayer experience. Let’s look at an example of how to build a match using
    player attributes:


    ```

    struct PlayerClass: OptionSet {

    let rawValue: UInt32

    static let squadLeader     = PlayerClass(rawValue: 0xFF000000)

    static let breacher        = PlayerClass(rawValue: 0x00FF0000)

    static let grenadier       = PlayerClass(rawValue: 0x0000FF00)

    static let lightMachineGun = PlayerClass(rawValue: 0x000000FF)

    }

    ```


    We begin by defining a mask for each of our player attributes, which we will refer
    to as “classes” for the rest of this section. This example represents a standard
    squad in a modern military-style game. Each class is assigned a different value
    of a mask. Game Center uses an algorithm to match these players together, using
    the following rules.


    - A match’s mask will always begin with the mask of the inviting player.

    - Game Center will ignore all players who have not set a player attribute mask
    if the inviting player has set a player attribute mask.

    - A player will be added to a match only if their player attribute mask doesn’t
    overlap any section of a mask from any players already invited into the match.

    - After adding a player to the match, the value of that player’s attributes value
    is logically OR’ed into the match’s mask.

    - If a match’s mask value is equal to `FFFFFFFFh`, then the match is considered
    complete and can begin; if the mask does not equal `FFFFFFFFh`, then Game Center
    will continue searching for a player who can fill the match.

    - There is no way to query Game Center to see which player is still currently
    being waited on.


    The following is based on the classes we just defined. A blank match will have
    the player attribute mask shown in Figure 5-6.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig6_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig6_HTML.jpg)


    **Figure 5-6** An empty player attribute mask (`0x00000000`)


    Player 1 begins a new match and selects Squad Leader as his class. When that player
    creates the match, it will now have a player attribute mask that looks like that
    shown in Figure 5-7.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig7_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig7_HTML.jpg)


    **Figure 5-7** A player attribute mask representing the Squad Leader class (`0xFF000000`)


    Now the creator of the match uses Game Center to auto-match for new players. The
    first player Game Center finds has selected a class of Grenadier. The Grenadier
    will have a mask, which looks like that shown in Figure 5-8.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig8_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig8_HTML.jpg)


    **Figure 5-8** A player attribute mask representing the Grenadier class (`0x0000FF00`)


    When compared to the already existing match’s mask, as shown in Figure 5-9, we
    can see there are no overlaps, so that player can be invited into the game.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig9_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig9_HTML.jpg)


    **Figure 5-9** Comparison of `0xFF000000` and `0x0000FF00`


    When these masks are combined to form the new match mask, it will look like that
    shown in Figure 5-10.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig10_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig10_HTML.jpg)


    **Figure 5-10** A new match mask, representing two players (`0xFF00FF00`)


    Player 3 selects Breacher as his class and searches for a game. Game Center finds
    the match that we have been working with and determines that there is room for
    a Breacher by comparing the match’s mask to the Breacher’s mask, as shown in Figure
    5-11.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig11_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig11_HTML.jpg)


    **Figure 5-11** The top is the current match’s mask (`0xFF00FF00`), and the bottom
    is a Breacher’s mask (`0x00FF0000`)


    Since there is no overlap between the masks, the Breacher can be invited into
    the game. Player 4 selects the class of Grenadier and has Game Center look for
    a match. Game Center again will find our match in progress and attempt to add
    the new player to it.


    Since the mask supplied by Player 4 overlaps a part of the match’s mask (see Figure
    5-12), that player is not allowed to join. If Game Center cannot find an open
    match for that player, then it will begin looking for new players to fill in the
    holes on that player’s match.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig12_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig12_HTML.jpg)


    **Figure 5-12** The top is the current match’s mask (`0xFFFFFF00`), and the bottom
    is a Grenadier mask (`0x0000FF00`)


    Player 5 selects Light Machine Gun as his mask and begins looking for a game to
    join. Game Center compares his mask to the current match’s mask, as shown in Figure
    5-13.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig13_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig13_HTML.jpg)


    **Figure 5-13** The top is the current match’s mask (`0xFFFFFF00`), and the bottom
    is a Light Machine Gun’s mask (`0x000000FF`)


    Since there is no overlap between the two mask sets, Player 5 can join the match.
    This will create a complete player attribute mask for the match, as shown in Figure
    5-14.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig14_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig14_HTML.jpg)


    **Figure 5-14** A completed match mask (`0xFFFFFFFF`)


    If Player 5 never joined the game, and the original inviter wanted to fill the
    slot with a friend from Game Center, the invited friend would not have an option
    to select his class. The match, in that case, would have a mask that looks like
    that shown in Figure 5-15. The invited friend would then be assigned the mask,
    shown in Figure 5-16, that would complete the match’s mask. This would complete
    the player attribute masks and allow the game to begin.


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig16_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig16_HTML.jpg)


    **Figure 5-16** A Machine Gun’s mask (`0x000000FF`), needed to complete the match’s
    mask


    ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig15_HTML.jpg](images/216283_2_En_5_Chapter/216283_2_En_5_Fig15_HTML.jpg)


    **Figure 5-15** The current match’s mask (`0xFFFFFF0`)


    Setting a player attribute is very straightforward and is shown in the following
    code snippet:


    ```

    struct PlayerClass: OptionSet {

    let rawValue: UInt32

    static let squadLeader     = PlayerClass(rawValue: 0xFF000000)

    static let breacher        = PlayerClass(rawValue: 0x00FF0000)

    static let grenadier       = PlayerClass(rawValue: 0x0000FF00)

    static let lightMachineGun = PlayerClass(rawValue: 0x000000FF)

    }

    ...

    let request = GKMatchRequest()

    request.minPlayers = 4

    request.maxPlayers = 4

    request.playerAttributes = PlayerClass.squadLeader.rawValue

    ```'
