    `tractorBeamImageView` 的 frame 设置为玩家 UFO 当前所在的位置。我们将使用本节前面演示过的相同动画快捷方式来为牵引光束制作动画。接着，我们将牵引光束的
    `imageView` 添加到主视图中；这里使用 `insertSubview` 函数来确保牵引光束位于奶牛层下方，但位于背景层上方。然后我们调用 `hitTest`
    函数，该函数将在本章稍后部分介绍。如果 `hitTest` 返回了结果，我们就调用 `abductCow` 函数。


    在继续讲解 `hitTest` 和 `abductCow` 函数之前，我们必须先完成触摸事件的处理。此时我们关心的另一个触摸事件是 `touchesEnded`
    委托调用。当用户将手指从屏幕上移开时，我们需要将牵引光束从视图中移除，并让用户恢复移动。


