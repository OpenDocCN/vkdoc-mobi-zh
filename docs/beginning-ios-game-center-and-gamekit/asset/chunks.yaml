  trans: '

    # 对等网络


    对等网络（见图 6-1）是 iOS/Mac 平台上最常见的一种网络。其中没有任何一台设备会被区别对待，每台设备都负责向它希望通信的其他所有对等节点发送和接收数据。尽管这种网络看起来可能很复杂，但它却是将多台设备连接在一起进行通信的最简单直接的方法之一。


    ![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig1_HTML.jpg](img/216283_2_En_6_Fig1_HTML.jpg)


    图 6-1：使用六台 iOS 设备的对等网络示意图


    对等网络常用于处理 Game Center 网络连接，因为它是该平台上最容易实现的方式。虽然这种方法具有设置极其简单的优点，但它同样也存在不少缺点。首先，它会产生大量冗余的开销。每个对等节点都需要将其操作告知其他所有对等节点。在如图
    6-1 所示的六路网络中，这意味着每台设备每次想要更新游戏状态时，都需要发送五条消息。此外，如果你正在实现一个需要每个对等节点确认消息成功接收的系统，那么每次事件你还需要接收五条确认消息。


    对等网络的另一个缺点是，当处理大量对等节点时，可能会变得非常混乱。正如你从图 6-1 中看到的那样，事情很快就会变得杂乱无章。与我们在本节中讨论的其他主要网络类型不同，对等网络是唯一一种没有清晰数据流的网络。根据定义，每个对等节点都可以向任何其他对等节点发送消息。这也意味着你必须要追踪每个对等节点需要了解什么信息。在大多数情况下，这是一种完全可以接受的方法。然而，当你开始处理更复杂的网络类型以及需要发送和接收的信息时，这种配置可能就不再理想了。


    此外，没有哪一台设备控制着游戏的状态。如果存在人工智能组件，那么你将需要设计一个系统，使其能够在所有设备之间保持同步。


    ## 客户端-主机网络


    客户端-主机网络会指定一台设备作为主机，或者如果你喜欢这个术语，也可以称为服务器。这台设备负责向所有已连接的客户端发送信息。客户端之间从不直接通信；它们只与主机通信，随后主机再将所需的信息转发给其他客户端。图
    6-2 展示了客户端-主机设置的一个示例。


    ![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig2_HTML.jpg](img/216283_2_En_6_Fig2_HTML.jpg)


    图 6-2：使用五台 iOS 设备的客户端-主机网络示意图


    客户端-服务器网络简化了数据流。每个对等节点或客户端只需要关心自身和主机即可；它们无需知道网络上可能存在的其他设备。这种网络的好处在于，由一台设备来保持所有内容的同步并处理信息流；这使得它成为一个非常安全的网络（在反作弊意义上）。不过，在
    iOS 平台上作弊并不是一个大问题，因为它本身就是一个沙盒系统；Mac 的状态虽然更开放一些，但通常除非游戏变得非常成功，否则这也不是主要问题。


    这种系统还有其他好处，例如只需要一台设备来管理网络状态，并且这台唯一的设备负责控制网络行为。这种网络类型简化了诸如连接、断开连接、传输错误以及其他状态变化（例如由计算机控制的对象，如人工智能）等事件的处理。然而，同样的设置在
    iOS 平台上可能会带来麻烦；如果主机设备需要处理过多的信息，这台设备的运行速度可能会变慢，或者耗电更快。这种方法还需要两套独立的逻辑处理程序，一套用于客户端，一套用于主机。在更大的环境中，当不再需要某位玩家担任主机时，这种类型的系统就变成了专用的服务器系统。


    ## 环形网络


    环形网络（见图 6-3）没有主机，也没有客户端。它的工作方式类似于对等网络，但每个对等节点只负责与一个指定的对等节点通信，并且只从另一个单独定义的对等节点接收信息。信息以环状在一组设备中流动，因此得名。


    这种网络在 iOS 平台上并不常见，因为通常它提供的用于处理断开连接的对等节点的冗余性，并没有太多必要。Apple 已经做了大量基础工作来确保网络保持活跃和稳定，而无需开发者花费额外的设计时间来确保不会出现对等节点与当前已连接的其他对等节点失去联系的情况。不过，有时你在
    iOS 平台上设计网络时，可能会发现这种配置很有用。请记住，当你在环形网络中增加额外的客户端时，信息完成一次环回路所需的时间会随之增加，并且特别容易受到一个或多个延迟设备的拖累。


    ![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig3_HTML.jpg](img/216283_2_En_6_Fig3_HTML.jpg)


    图 6-3：使用六台 iOS 设备的环形网络示意图。请注意，相比图 6-1 所示的对等网络，此图看起来要简洁得多

