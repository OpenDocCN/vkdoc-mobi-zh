    \ at: 4)\n    }\n}\n\nfunc endTractorFromNetwork() {\n    otherPlayerTractorBeamImageView?.removeFromSuperview()\n\
    }\n```\n\n如果现在运行游戏，您会看到当每个用户触摸屏幕时，牵引光束会出现在两个设备上。我们无需担心在牵引光束开启时锁定 UFO 的移动，因为这在单人游戏中已经处理好了，并且只有在单人模式允许的情况下，移动才会传输到另一台设备。接下来，我们需要添加额外代码来处理碰撞检测，因此修改`hitTest`函数，如下所示：\n\
    \n```\nfunc hitTest() -> UIImageView? {\n    if !tractorBeamOn {\n        return\
    \ nil\n    }\n    for x in 0..<(cowArray?.count ?? 0) {\n        let tempCow =\
    \ cowArray?[x] as? UIImageView\n        let cowLayer = tempCow?.layer.presentation()\n\
    \        let cowFrame = cowLayer?.frame\n        if cowFrame?.intersects(tractorBeamImageView?.frame\
    \ ?? CGRect.zero) ?? false {\n            tempCow?.frame = cowLayer?.frame ??\
    \ CGRect.zero\n            tempCow?.layer.removeAllAnimations()\n            if\
    \ gameIsMultiplayer {\n                gcManager?.sendStringToAllPeers(String(format:\
    \ \"$abductCowAtIndex:%i\", x), reliable: true)\n            }\n            return\
    \ tempCow\n        }\n    }\n    return nil\n}\n```\n\n这里我们使用了之前填充奶牛数组时用到的相同技巧。由于我们可靠地发送了数据以将对象放入数组，我们知道数组顺序始终保持一致。由于知道了数组的顺序，我们可以传递要修改的奶牛的索引。除了发送数据外，我们还需要编写一个新的`if`语句来捕获此消息，如下所示。您可以看到这个方法的设置很像分数方法，我们从中提取感兴趣的值并调用一个新的方法来使用它：\n\
    \n```\nelse if dataDictionary[\"data\"]?.hasPrefix(\"$abductCowAtIndex:\") ??\
    \ false {\n    let index = Int(dataDictionary[\"data\"]?.replacingOccurrences(of:\
    \ \"$abductCowAtIndex:\", with: \"\") ?? \"\") ?? 0\n    abductCowFromNetwork(at:\
    \ index)\n}\n```\n\n以下两个函数处理通过网络接收到的劫持动画。它们与我们用于在单人模式下动画化劫持的函数非常相似。您甚至可以通过使用一个标志来指示它们来自远程设备，从而修改现有函数以处理网络行为。\n\
    \n```\nfunc abductCowFromNetwork(at x: Int) {\n    otherPlayerCurrentAbductee\
    \ = cowArray?[x] as? UIImageView\n    //otherPlayerCurrentAbductee?.frame = otherPlayerCurrentAbductee?.frame\
    \    // 跳过冗余的自身初始化\n    otherPlayerCurrentAbductee?.layer.removeAllAnimations()\n\
    \    UIView.animate(\n        withDuration: 4.0,\n        delay: 0,\n        options:\
    \ [.curveEaseIn, .beginFromCurrentState],\n        animations: {\n           \
    \ var frame = self.otherPlayerCurrentAbductee?.frame\n            frame?.origin.y\
    \ = self.otherPlayerImageView?.frame.origin.y ?? 0.0\n            self.otherPlayerCurrentAbductee?.frame\
    \ = frame ?? CGRect.zero\n        },\n        completion: finishAbductingFromNetwork\n\
    \    )\n}\n\nfunc finishAbductingFromNetwork(_ finished: Bool) {\n    cowArray\
    \ = cowArray?.filter({ ($0) as AnyObject !== (otherPlayerCurrentAbductee) as AnyObject\
    \ })\n    endTractorFromNetwork()\n    otherPlayerCurrentAbductee?.layer.removeAllAnimations()\n\
    \    otherPlayerCurrentAbductee?.removeFromSuperview()\n    otherPlayerCurrentAbductee\
    \ = nil\n    if isHost {\n        spawnCow()\n    }\n}\n```\n\n我们还需要做一些额外的工作以确保不会引入新的错误。例如，我们添加一个新的指针来追踪敌人当前正在劫持的奶牛（如果有的话）。如果您还记得，在`updateCowPaths`方法中，我们不想更新正在被劫持的奶牛的路径，因为这会破坏用于劫持的动画。我们需要修改该方法，使其也忽略敌人可能正在劫持的任何奶牛。如果您再次运行游戏，您现在会注意到我们拥有一个功能完整的多人游戏，如图\
    \ 7-4 所示。\n\n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig4_HTML.jpg](img/216283_2_En_7_Fig4_HTML.jpg)\n\
    \n**图 7-4** 一个功能完整的多人 UFO 游戏，两人通过蓝牙连接进行游戏\n"
- fmt: "## Disconnections\n\nThe last step that we need to take when working with\
    \ multiplayer support is to add in logic to handle disconnections and other failures\
    \ that are unrecoverable. Luckily for us, Apple’s APIs handle most of the legwork.\
    \ We do, however, want to add a more universal call to our `GameCenterManager`\
    \ class to make things easier for us.\n\n```\nfunc disconnect() {\n    switch\
    \ matchOrSession {\n    case .match(let match):\n        match.disconnect()\n\
    \    case .session(let session):\n        session.disconnect()\n    case .none:\n\
    \        break\n    }\n}\n```\n\nThis method should be called whenever you wish\
    \ to end a multiplayer game. It will make sure that the peers are safely disconnected\
    \ and prevent a number of issues that would be very hard to troubleshoot.\n\n\
    ## Summary\n\nIn this chapter, we covered a lot of information in a very condensed\
    \ manner. You learned how to send and receive data between two or more iOS, Mac,\
    \ or Apple TV devices using Game Center networking. In addition, you learned how\
    \ to handle network state changes, such as disconnections. We put the principles\
    \ learned in this chapter into use in our UFO game, creating a multiplayer iOS\
    \ game from the ground up in less than seven chapters. In the next chapter, we\
    \ will explore Game Center’s turn-based gaming APIs, which function differently\
    \ enough from real-time gaming to warrant a completely new sample project and\
    \ game.\n\n# 8. Turn-Based Gaming with Game Center\n\nSlightly after the initial\
    \ release of Game Center, Apple would later update the framework with turn-based\
    \ gaming support, in addition to the real-time gaming functionality you are familiar\
    \ with from the previous chapters of this book. With turn-based gaming, you can\
    \ now provide your users with asynchronous gaming. Turn-based games are simply\
    \ any game in which players take turns playing, with notable examples such as\
    \ in tic-tac-toe, chess, Battleship, and Dungeons & Dragons.\n\nTurn-based gaming\
    \ on iOS, Mac, and Apple TV has become very popular in the past several years,\
    \ arguably starting with the megahit Words with Friends. Words with Friends, shown\
    \ in Figure [8-1](#216283_2_En_8_Chapter.xhtml#Fig1), is an asynchronous word\
    \ game similar to Scrabble. Each player receives a selection of letters that they\
    \ must play, in turn, on a board to create a word. There are points awarded based\
    \ on the difficulty of the word, as well as layout on the board. Turn-based gaming\
    \ is traditionally done with a store and forward network–type platform; the server\
    \ holds on to the game data until the next client logs in and retrieves it. Asynchronous\
    \ games have traditionally been more casual games and don’t require all players\
    \ to be present at all times, although some games do require immediate response\
    \ and playing.\n\n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig1_HTML.jpg](images/216283_2_En_8_Chapter/216283_2_En_8_Fig1_HTML.jpg)\n\
    \n**Figure 8-1** Words with Friends by Zynga\n\nBefore the introduction of turn-based\
    \ gaming, Game Center had provided real-time gaming in which all the devices involved\
    \ needed to be active and logged in continuously throughout the multiplayer experience.\
    \ Turn-based gaming adds a more casual experience, letting people run up to 20\
    \ matches at a time and only playing when it is their turn in a particular match.\n\
    \nPrior to these enhancements, writing this type of game would have required you\
    \ to write and deploy your own server to handle the game interaction. Now, you\
    \ can add the networking component of turn-based gaming and be up and running\
    \ in less than a day of work. In this chapter, we explore how to write a simple\
    \ tic-tac-toe game using Game Center’s turn-based gaming APIs.\n\n## A New Sample\
    \ Project\n\nUnfortunately, our existing UFOs sample game is not a suitable experience\
    \ for testing turn-based gaming. It wouldn’t make much sense to have each player\
    \ make a move and then wait for the other player to catch up. Luckily, there is\
    \ another very simple type of game that we can build a project around: tic-tac-toe.\
    \ This classic children’s game is something almost all of us have played and we\
    \ have experience with the rules and strategy.\n\nWe begin by creating a new storyboard-based\
    \ iOS App project. There are three views that we will be working with throughout\
    \ the project:\n\n* **Main View**: This view simply contains a button that launches\
    \ the `HomeViewController`, which we’ll create in the following.\n* **GKTurnBasedMatchmakerViewController**:\
    \ This is the view provided by Apple to create and resume turn-based games. You\
    \ will not need to create this view yourself.\n* **GameViewController**: This\
    \ is the class that handles user input, determining winners and ties, and populating\
    \ the game board at the start of each turn.\n\nWe begin by working with the home\
    \ view. These files will be created for you when you create the new project. The\
    \ very first thing we need to do is make sure to import the proper GameKit frameworks\
    \ and add our reusable `GameCenterManager` class that we have been working on\
    \ throughout this book; you can include the existing one from Chapter [8](#216283_2_En_8_Chapter.xhtml).\
    \ We also need to create a single button in the view to start a new game, as shown\
    \ in Figure [8-2](#216283_2_En_8_Chapter.xhtml#Fig2).\n\n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig2_HTML.jpg](images/216283_2_En_8_Chapter/216283_2_En_8_Fig2_HTML.jpg)\n\
    \n**Figure 8-2** The main view for our new tic-tac-toe game\n\nThe file for the\
    \ new home view controller class should match the following code snippet. We need\
    \ to adhere to the `GameCenterManagerDelegate` as well as the `GKTurnBasedMatchmakerViewController`.\
    \ As in the previous chapters, we also need to create a class instance of `GameCenterManager`.\
    \ The last thing that needs to be added is an `IBAction` to begin a new game.\
    \ Make sure to hook up the Start New Game button to the `IBAction` in the storyboard.\n\
    \nWe also need to modify the `viewDidLoad` function to check for and then authenticate\
    \ our local user with Game Center. This is the same approach that we followed\
    \ in Chapter [2](#216283_2_En_2_Chapter.xhtml).\n\n```\nclass HomeViewController:\
    \ UIViewController {\n    var gcManager: GameCenterManager?\n    \n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        NotificationCenter.default.addObserver(\n\
    \            self,\n            selector: #selector(localUserAuthenticationChanged(_:)),\n\
    \            name: .GKPlayerAuthenticationDidChangeNotificationName,\n       \
    \     object: nil)\n        gcManager = GameCenterManager()\n        gcManager?.authenticateLocalUser(self)\n\
    \    }\n}\n```\n\nWe also need to implement one delegate function to monitor for\
    \ successful authentication and local user changes. We are using this function\
    \ to print some debugging output.\n\n```\n@objc func localUserAuthenticationChanged(_\
    \ notification: Notification?) {\n    if let object = notification?.object {\n\
    \        print(\"Authentication Changed: \\(object)\")\n    }\n}\n```\n\nIn the\
    \ next section, we will see how to call the `GKTurnBasedMatchmakerViewController`\
    \ and how to handle the delegate functions that are required in order to handle\
    \ errors and resume or create new matches."
  raw: '## Disconnections


    The last step that we need to take when working with multiplayer support is to
    add in logic to handle disconnections and other failures that are unrecoverable.
    Luckily for us, Apple’s APIs handle most of the legwork. We do, however, want
    to add a more universal call to our GameCenterManager class to make things easier
    for us.


    ```

    func disconnect() {

    switch matchOrSession {

    case .match(let match):

    match.disconnect()

    case .session(let session):

    session.disconnect()

    case .none:

    break

    }

    }

    ```


    This method should be called whenever you wish to end a multiplayer game. It will
    make sure that the peers are safely disconnected and prevent a number of issues
    that would be very hard to troubleshoot.


    ## Summary


    In this chapter, we covered a lot of information in a very condensed manner. You
    learned how to send and receive data between two or more iOS, Mac, or Apple TV
    devices using Game Center networking. In addition, you learned how to handle network
    state changes, such as disconnections. We put the principles learned in this chapter
    into use in our UFO game, creating a multiplayer iOS game from the ground up in
    less than seven chapters. In the next chapter, we will explore Game Center’s turn-based
    gaming APIs, which function differently enough from real-time gaming to warrant
    a completely new sample project and game.


    # 8. Turn-Based Gaming with Game Center


    Slightly after the initial release of Game Center, Apple would later update the
    framework with turn-based gaming support, in addition to the real-time gaming
    functionality you are familiar with from the previous chapters of this book. With
    turn-based gaming, you can now provide your users with asynchronous gaming. Turn-based
    games are simply any game in which players take turns playing, with notable examples
    such as in tic-tac-toe, chess, Battleship, and Dungeons & Dragons.


    Turn-based gaming on iOS, Mac, and Apple TV has become very popular in the past
    several years, arguably starting with the megahit Words with Friends. Words with
    Friends, shown in Figure [8-1](#216283_2_En_8_Chapter.xhtml#Fig1), is an asynchronous
    word game similar to Scrabble. Each player receives a selection of letters that
    they must play, in turn, on a board to create a word. There are points awarded
    based on the difficulty of the word, as well as layout on the board. Turn-based
    gaming is traditionally done with a store and forward network–type platform; the
    server holds on to the game data until the next client logs in and retrieves it.
    Asynchronous games have traditionally been more casual games and don’t require
    all players to be present at all times, although some games do require immediate
    response and playing.


    ![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig1_HTML.jpg](images/216283_2_En_8_Chapter/216283_2_En_8_Fig1_HTML.jpg)


    Figure 8-1


    Words with Friends by Zynga


    Before the introduction of turn-based gaming, Game Center had provided real-time
    gaming in which all the devices involved needed to be active and logged in continuously
    throughout the multiplayer experience. Turn-based gaming adds a more casual experience,
    letting people run up to 20 matches at a time and only playing when it is their
    turn in a particular match.


    Prior to these enhancements, writing this type of game would have required you
    to write and deploy your own server to handle the game interaction. Now, you can
    add the networking component of turn-based gaming and be up and running in less
    than a day of work. In this chapter, we explore how to write a simple tic-tac-toe
    game using Game Center’s turn-based gaming APIs.


    ## A New Sample Project


    Unfortunately, our existing UFOs sample game is not a suitable experience for
    testing turn-based gaming. It wouldn’t make much sense to have each player make
    a move and then wait for the other player to catch up. Luckily, there is another
    very simple type of game that we can build a project around: tic-tac-toe. This
    classic children’s game is something almost all of us have played and we have
    experience with the rules and strategy.


    We begin by creating a new storyboard-based iOS App project. There are three views
    that we will be working with throughout the project:


    *   Main View: This view simply contains a button that launches the HomeViewController,
    which we’ll create in the following.


    *   GKTurnBasedMatchmakerViewController: This is the view provided by Apple to
    create and resume turn-based games. You will not need to create this view yourself.


    *   GameViewController: This is the class that handles user input, determining
    winners and ties, and populating the game board at the start of each turn.


    We begin by working with the home view. These files will be created for you when
    you create the new project. The very first thing we need to do is make sure to
    import the proper GameKit frameworks and add our reusable GameCenterManager class
    that we have been working on throughout this book; you can include the existing
    one from Chapter [8](#216283_2_En_8_Chapter.xhtml). We also need to create a single
    button in the view to start a new game, as shown in Figure [8-2](#216283_2_En_8_Chapter.xhtml#Fig2).


    ![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig2_HTML.jpg](images/216283_2_En_8_Chapter/216283_2_En_8_Fig2_HTML.jpg)


    Figure 8-2


    The main view for our new tic-tac-toe game


    The file for the new home view controller class should match the following code
    snippet. We need to adhere to the GameCenterManagerDelegate as well as the GKTurnBasedMatchmakerViewController.
    As in the previous chapters, we also need to create a class instance of GameCenterManager.
    The last thing that needs to be added is an IBAction to begin a new game. Make
    sure to hook up the Start New Game button to the IBAction in the storyboard.


    We also need to modify the viewDidLoad function to check for and then authenticate
    our local user with Game Center. This is the same approach that we followed in
    Chapter [2](#216283_2_En_2_Chapter.xhtml).


    ```

    class HomeViewController: UIViewController {

    var gcManager: GameCenterManager?

    override func viewDidLoad() {

    super.viewDidLoad()

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(localUserAuthenticationChanged(_:)),

    name: .GKPlayerAuthenticationDidChangeNotificationName,

    object: nil)

    gcManager = GameCenterManager()

    gcManager?.authenticateLocalUser(self)

    }

    }

    ```


    We also need to implement one delegate function to monitor for successful authentication
    and local user changes. We are using this function to print some debugging output.


    ```

    @objc func localUserAuthenticationChanged(_ notification: Notification?) {

    if let object = notification?.object {

    print("Authentication Changed: \(object)")

    }

    }

    ```


    In the next section, we will see how to call the GKTurnBasedMatchmakerViewController
    and how to handle the delegate functions that are required in order to handle
    errors and resume or create new matches.'
  trans: "\n## 断线处理\n\n在处理多人游戏支持时，最后一步需要添加逻辑来处理断线及其他不可恢复的故障。幸运的是，Apple 的 API 已帮我们完成了大部分繁重工作。但我们仍希望在\
    \ `GameCenterManager` 类中添加一个更通用的调用来简化操作。\n\n```\nfunc disconnect() {\n    switch\
    \ matchOrSession {\n    case .match(let match):\n        match.disconnect()\n\
    \    case .session(let session):\n        session.disconnect()\n    case .none:\n\
    \        break\n    }\n}\n```\n\n当你希望结束一场多人游戏时，应调用此方法。它将确保对等方安全断开连接，并避免许多难以排查的问题。\n\
    \n## 本章小结\n\n在本章中，我们以高度浓缩的方式涵盖了大量信息。你学习了如何利用 Game Center 网络在多个 iOS、Mac 或 Apple\
    \ TV 设备之间发送和接收数据。此外，你还掌握了如何处理网络状态变化（例如断线）。我们将本章所学原理应用于 UFO 游戏，在不到七章的篇幅内从零构建了一款多人\
    \ iOS 游戏。下一章，我们将探索 Game Center 的回合制游戏 API，其运作方式与实时游戏截然不同，因此需要构建全新的示例项目和游戏。\n\n\
    # 8. 使用 Game Center 实现回合制游戏\n\n在 Game Center 首次发布后不久，Apple 便对该框架进行了更新，除了你从前几章熟悉的实时游戏功能外，还增加了回合制游戏支持。借助回合制游戏，你现在可以为用户提供异步游戏体验。回合制游戏泛指所有玩家轮流上场的游戏，典型示例包括井字棋、国际象棋、海战棋以及龙与地下城。\n\
    \n在过去几年中，iOS、Mac 和 Apple TV 上的回合制游戏变得非常流行，其开端可以说源于超级热门游戏《与朋友拼词》。《与朋友拼词》（如图 8-1\
    \ 所示）是一款类似 Scrabble 的异步文字游戏。每位玩家会收到一组字母，轮流在棋盘上拼出单词。根据单词的难度以及棋盘布局，系统会为玩家评分。传统上，回合制游戏采用存储转发式平台：服务器会保存游戏数据，直到下一位玩家登录并获取数据。异步游戏通常更偏向休闲风格，不要求所有玩家时刻在线——尽管某些游戏确实需要即时响应和操作。\n\
    \n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig1_HTML.jpg](img/216283_2_En_8_Fig1_HTML.jpg)\n\
    \n**图 8-1** Zynga 出品的《与朋友拼词》\n\n在回合制游戏推出之前，Game Center 仅提供实时游戏，要求所有参与设备在整个多人游戏过程中始终保持活动状态并持续登录。回合制游戏则带来了更轻松的体验，允许玩家同时运行多达\
    \ 20 场比赛，并且仅在轮到自己的回合时进行游戏。\n\n在这些改进之前，编写此类游戏需要你自行编写并部署服务器来处理游戏交互。而现在，你只需不到一天的时间就能完成回合制游戏的网络组件搭建并投入运行。在本章中，我们将探讨如何利用\
    \ Game Center 的回合制游戏 API 编写一个简单的井字棋游戏。\n\n## 新的示例项目\n\n遗憾的是，我们现有的 UFO 示例游戏并不适合测试回合制游戏。如果让每个玩家移动一步后就等待对方跟上，这显然不合理。幸运的是，我们还可以围绕另一种非常简单的游戏类型来构建项目：井字棋。这款经典的儿童游戏几乎所有人都玩过，我们对其规则和策略都已相当熟悉。\n\
    \n我们首先创建一个基于 storyboard 的新 iOS App 项目。在整个项目中，将涉及三个视图：\n\n* **主视图**：该视图仅包含一个按钮，用于启动我们将要创建的\
    \ `HomeViewController`。\n* **GKTurnBasedMatchmakerViewController**：这是 Apple 提供的视图，用于创建和恢复回合制游戏。你无需自行创建此视图。\n\
    * **GameViewController**：该类负责处理用户输入、判断胜负与平局，并在每回合开始时更新游戏棋盘。\n\n我们先从主视图开始处理。当你创建新项目时，这些文件会自动生成。首先需要做的是确保导入正确的\
    \ GameKit 框架，并添加本书一直在使用的可复用 `GameCenterManager` 类；你可以直接引入第 8 章中的现有版本。此外，我们还需要在视图中创建一个按钮，用于开始新游戏，如图\
    \ 8-2 所示。\n\n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig2_HTML.jpg](img/216283_2_En_8_Fig2_HTML.jpg)\n\
    \n**图 8-2** 新井字棋游戏的主视图\n\n新的主视图控制器类文件应与以下代码片段一致。我们需要遵循 `GameCenterManagerDelegate`\
    \ 和 `GKTurnBasedMatchmakerViewController` 协议。与之前章节类似，我们还需要创建一个 `GameCenterManager`\
    \ 的类实例。最后需要添加的是一个用于开始新游戏的 `IBAction`。请确保在 storyboard 中将“开始新游戏”按钮与 `IBAction` 连接起来。\n\
    \n我们还需要修改 `viewDidLoad` 函数，以检查并通过 Game Center 验证本地用户。这与我们在第 2 章中采用的方法相同。\n\n```\n\
    class HomeViewController: UIViewController {\n    var gcManager: GameCenterManager?\n\
    \    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n      \
    \  NotificationCenter.default.addObserver(\n            self,\n            selector:\
    \ #selector(localUserAuthenticationChanged(_:)),\n            name: .GKPlayerAuthenticationDidChangeNotificationName,\n\
    \            object: nil)\n        gcManager = GameCenterManager()\n        gcManager?.authenticateLocalUser(self)\n\
    \    }\n}\n```\n\n我们还需要实现一个委托函数来监控成功验证和本地用户变化。我们使用此函数输出一些调试信息。\n\n```\n@objc func\
    \ localUserAuthenticationChanged(_ notification: Notification?) {\n    if let\
    \ object = notification?.object {\n        print(\"Authentication Changed: \\\
    (object)\")\n    }\n}\n```\n\n在下一节中，我们将了解如何调用 `GKTurnBasedMatchmakerViewController`，以及如何处理所需的委托函数，以便处理错误并恢复或创建新的比赛。\n"
- fmt: "# GKTurnBasedMatchmakerViewController\n\nApple provides a default class to\
    \ present the GUI for creating a new turn-based match. For programmatically creating\
    \ a match, see the later section “Programmatic Matches.”\n\nWe begin by working\
    \ with a new matchmaker object in the IBAction for the single button that we created\
    \ in the previous section. The approach that we use here is very similar to Game\
    \ Center matchmaking. Take a look at the following sample code. This function\
    \ is very similar to the previous examples of working with real-time gaming and\
    \ matchmaking, with the notable change being switching to `GKTurnBasedMatchmakerViewController`\
    \ and `turnBasedMatchmakerDelegate` instead of their real-time peers. The user\
    \ will be presented with a view similar to the one shown in Figure [8-3](#216283_2_En_8_Chapter.xhtml#Fig3).\n\
    \n```swift\n@IBAction func showMatchmaker() {\n    let match = GKMatchRequest()\n\
    \    match.minPlayers = 2\n    match.maxPlayers = 2\n    let turnMatchmakerVC\
    \ = GKTurnBasedMatchmakerViewController(matchRequest: match)\n    turnMatchmakerVC.turnBasedMatchmakerDelegate\
    \ = self\n    present(turnMatchmakerVC, animated: true)\n}\n```\n\n> **Note:**\
    \ As with all Game Center functionality, you must first authenticate with Game\
    \ Center before you can create a new turn-based game match.\n\nThere are four\
    \ delegate functions that you need to implement to conform to the `GKTurnBasedMatchmakerViewControllerDelegate`.\
    \ The first handles the user canceling in the matchmaker. The only requirement\
    \ here is to call `dismiss` on the game picker modal. You may add additional logic,\
    \ as required, for your app.\n\n```swift\nextension HomeViewController: GKTurnBasedMatchmakerViewControllerDelegate\
    \ {\n    func turnBasedMatchmakerViewControllerWasCancelled(_ viewController:\
    \ GKTurnBasedMatchmakerViewController) {\n        dismiss(animated: true)\n  \
    \  }\n}\n```\n\n> **Important:** The list of current games does not update until\
    \ you close and reopen the `GKTurnBasedMatchmakerViewController`.\n\n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig3_HTML.jpg](images/216283_2_En_8_Chapter/216283_2_En_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3** – Starting a new turn-based match\n\nWe also need to implement\
    \ a delegate function to catch any errors that occur during this phase. The following\
    \ function is called whenever an error is encountered during the matchmaking process.\
    \ For debugging purposes, we are printing the error to the console; however, you\
    \ will want to inform the user that an error has occurred.\n\n```swift\nfunc turnBasedMatchmakerViewController(_\
    \ viewController: GKTurnBasedMatchmakerViewController, didFailWithError error:\
    \ Error) {\n    print(\"Turn Based Matchmaker Failed with Error: \\(error.localizedDescription)\"\
    )\n}\n```\n\nThe last delegate function that we discuss in this section handles\
    \ the user quitting a match from the matchmaker screen. This is accomplished by\
    \ swiping from right to left across a game and selecting the quit option. We pass\
    \ in logic that the quitting player will be the losing player of the match and\
    \ that the remote player will be marked the winner. If you do not call the proper\
    \ function here, you will be able to quit a game, but it will reappear within\
    \ a few seconds.\n\n```swift\nfunc turnBasedMatchmakerViewController(_ viewController:\
    \ GKTurnBasedMatchmakerViewController, playerQuitFor match: GKTurnBasedMatch)\
    \ {\n    guard let localParticipant = match.participants.first(where: { $0.player\
    \ == GKLocalPlayer.local }),\n          let otherParticipant = match.participants.first(where:\
    \ { $0 != localParticipant }) else {\n        return\n    }\n    localParticipant.matchOutcome\
    \ = .quit\n    otherParticipant.matchOutcome = .won\n    match.endMatchInTurn(withMatch:\
    \ match.matchData ?? Data()) { error in\n        if let error = error {\n    \
    \        print(\"An error occurred ending match: \\(error.localizedDescription)\"\
    )\n        }\n    }\n}\n```\n\nThe final required function, `didFindMatch`, is\
    \ discussed in the next section, “Starting a New Game.”\n\n## Establishing Game\
    \ State\n\nBefore we can really dive into the new game, it is important for us\
    \ to do some foundation laying in order to make life easier down the road. The\
    \ first thing we will do is set up the possible states of the game. Tic-tac-toe\
    \ is a very simple game, but there can still be several active states; the first\
    \ two will be applicable to any turn-based game and covering which player we are\
    \ currently waiting on to make their move. The following three states cover a\
    \ game ending status from local player winning, remote player winning, or a tied\
    \ match:\n\n```swift\nprivate enum GameStatus {\n    case waitingForLocalPlayer\n\
    \    case waitingForOtherPlayer\n    case localPlayerWon\n    case otherPlayerWon\n\
    \    case playersTied\n}\n```\n\nThe next piece of groundwork that needs to be\
    \ laid will enable the functionality to detect the current state of the game.\
    \ We will need to determine what the winning combinations of gameplay are to detect\
    \ if they have occurred throughout the gameplay. We are using a brute force approach\
    \ to see if we have a winner, by checking all the rows and columns for three matching\
    \ players. We also need to check for a tie if there are no more places to move.\n\
    \n```swift\nprivate var currentGameStatus: GameStatus {\n    if let localParticipant\
    \ = localParticipant {\n        switch localParticipant.matchOutcome {\n     \
    \   case .none:\n            break\n        case .quit, .lost, .timeExpired:\n\
    \            return .otherPlayerWon\n        case .won, .first, .second, .third,\
    \ .fourth, .customRange:\n            return .localPlayerWon\n        case .tied:\n\
    \            return .playersTied\n        @unknown default:\n            print(\"\
    Unknown GKTurnBasedParticipant.matchOutcome received. Assuming game is in progress.\"\
    )\n        }\n    }\n    let winningCombinations = [\n        // horizontal\n\
    \        [0, 1, 2],\n        [3, 4, 5],\n        [6, 7, 8],\n        // vertical\n\
    \        [0, 3, 6],\n        [1, 4, 7],\n        [2, 5, 8],\n        // diagonal\n\
    \        [0, 4, 8],\n        [2, 4, 6],\n    ]\n    let winningCombination = winningCombinations.first\
    \ { combo in\n        let filledSquares: [Player] = combo.compactMap { gameBoard[$0]\
    \ }.filter { $0 != .none }\n        guard filledSquares.count == combo.count else\
    \ { return false }\n        let uniquePlayers = Set(filledSquares)\n        return\
    \ uniquePlayers.count == 1\n    }\n    guard let winningPlayerIndex = winningCombination?[0],\
    \ let winningPlayer = gameBoard[winningPlayerIndex] else {\n        guard gameBoard.count\
    \ != 9 else { return .playersTied }\n        return localPlayerIsCurrentParticipant\
    \ ? .waitingForLocalPlayer : .waitingForOtherPlayer\n    }\n    return winningPlayer\
    \ == localPlayer ? .localPlayerWon : .otherPlayerWon\n}\n```\n\nFinally, we need\
    \ to set up some functions to encode and store the state of the game board. This\
    \ is done by simply storing the button labels into a `JSONEncoder`. This allows\
    \ for easy and safe storage of information as well as easy network transmittal\
    \ if our game required it.\n\n```swift\nprivate typealias GameBoard = [Int: Player]\n\
    private var gameBoard: GameBoard = [:] {\n    didSet {\n        logGameBoard(\"\
    didSet\")\n    }\n}\nprivate var gameBoardData: Data? {\n    logGameBoard(\"Serializing\"\
    )\n    return try? JSONEncoder().encode(gameBoard)\n}\nprivate func logGameBoard(_\
    \ label: String) {\n    print(([\"\\(label):\"] + gameBoard.map { \"\\($0.key):\
    \ \\($0.value.buttonTitle ?? \"\")\" }).joined(separator: \"\\n\"))\n}\nprivate\
    \ var logError: (Error?) -> Void = { error in\n    guard let error = error else\
    \ { return }\n    print(\"An error occurred updating turn: \\(error.localizedDescription)\"\
    )\n}\n```"
  raw: '## GKTurnBasedMatchmakerViewController


    Apple provides a default class to present the GUI for creating a new turn-based
    match. For programmatically creating a match, see the later section “Programmatic
    Matches.”


    We begin by working with a new matchmaker object in the IBAction for the single
    button that we created in the previous section. The approach that we use here
    is very similar to Game Center matchmaking. Take a look at the following sample
    code. This function is very similar to the previous examples of working with real-time
    gaming and matchmaking, with the notable change being switching to GKTurnBasedMatchmakerViewController
    and turnBasedMatchmakerDelegate instead of their real-time peers. The user will
    be presented with a view similar to the one shown in Figure [8-3](#216283_2_En_8_Chapter.xhtml#Fig3).


    ```

    @IBAction func showMatchmaker() {

    let match = GKMatchRequest()

    match.minPlayers = 2

    match.maxPlayers = 2

    let turnMatchmakerVC = GKTurnBasedMatchmakerViewController(matchRequest: match)

    turnMatchmakerVC.turnBasedMatchmakerDelegate = self

    present(turnMatchmakerVC, animated: true)

    }

    ```


    Note


    As with all Game Center functionality, you must first authenticate with Game Center
    before you can create a new turn-based game match.


    There are four delegate functions that you need to implement to conform to the
    GKTurnBasedMatchmakerViewControllerDelegate. The first handles the user canceling
    in the matchmaker. The only requirement here is to call dismiss on the game picker
    modal. You may add additional logic, as required, for your app.


    ```

    extension HomeViewController: GKTurnBasedMatchmakerViewControllerDelegate {

    func turnBasedMatchmakerViewControllerWasCancelled(_ viewController: GKTurnBasedMatchmakerViewController)
    {

    dismiss(animated: true)

    }

    }

    ```


    Important


    The list of current games does not update until you close and reopen the GKTurnBasedMatchmakerViewController.


    ![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig3_HTML.jpg](images/216283_2_En_8_Chapter/216283_2_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Starting a new turn-based match


    We also need to implement a delegate function to catch any errors that occur during
    this phase. The following function is called whenever an error is encountered
    during the matchmaking process. For debugging purposes, we are printing the error
    to the console; however, you will want to inform the user that an error has occurred.


    ```

    func turnBasedMatchmakerViewController(_ viewController: GKTurnBasedMatchmakerViewController,
    didFailWithError error: Error) {

    print("Turn Based Matchmaker Failed with Error: \(error.localizedDescription)")

    }

    ```


    The last delegate function that we discuss in this section handles the user quitting
    a match from the matchmaker screen. This is accomplished by swiping from right
    to left across a game and selecting the quit option. We pass in logic that the
    quitting player will be the losing player of the match and that the remote player
    will be marked the winner. If you do not call the proper function here, you will
    be able to quit a game, but it will reappear within a few seconds.


    ```

    func turnBasedMatchmakerViewController(_ viewController: GKTurnBasedMatchmakerViewController,
    playerQuitFor match: GKTurnBasedMatch) {

    guard let localParticipant = match.participants.first(where: { $0.player == GKLocalPlayer.local
    }),

    let otherParticipant = match.participants.first(where: {$0 != localParticipant})
    else {

    return

    }

    localParticipant.matchOutcome = .quit

    otherParticipant.matchOutcome = .won

    match.endMatchInTurn(withMatch: match.matchData ?? Data()) { error in

    if let error = error {

    print("An error occurred ending match: \(error.localizedDescription)")

    }

    }

    }

    ```


    The final required function, didFindMatch, is discussed in the next section, “Starting
    a New Game.”


    ## Establishing Game State


    Before we can really dive into the new game, it is important for us to do some
    foundation laying in order to make life easier down the road. The first thing
    we will do is set up the possible states of the game. Tic-tac-toe is a very simple
    game, but there can still be several active states; the first two will be applicable
    to any turn-based game and covering which player we are currently waiting on to
    make their move. The following three states cover a game ending status from local
    player winning, remote player winning, or a tied match:


    ```

    private enum GameStatus {

    case waitingForLocalPlayer

    case waitingForOtherPlayer

    case localPlayerWon

    case otherPlayerWon

    case playersTied

    }

    ```


    The next piece of groundwork that needs to be laid will enable the functionality
    to detect the current state of the game. We will need to determine what the winning
    combinations of gameplay are to detect if they have occurred throughout the gameplay.
    We are using a brute force approach to see if we have a winner, by checking all
    the rows and columns for three matching players. We also need to check for a tie
    if there are no more places to move.


    ```

    private var currentGameStatus: GameStatus {

    if let localParticipant = localParticipant {

    switch localParticipant.matchOutcome {

    case .none:

    break

    case .quit, .lost, .timeExpired:

    return .otherPlayerWon

    case .won, .first, .second, .third, .fourth, .customRange:

    return .localPlayerWon

    case .tied:

    return .playersTied

    @unknown default:

    print("Unknown GKTurnBasedParticipant.matchOutcome received. Assuming game is
    in progress.")

    }

    }

    let winningCombinations = [

    // horizontal

    [0, 1, 2],

    [3, 4, 5],

    [6, 7, 8],

    // vertical

    [0, 3, 6],

    [1, 4, 7],

    [2, 5, 8],

    // diagonal

    [0, 4, 8],

    [2, 4, 6],

    ]

    let winningCombination = winningCombinations.first { combo in

    let filledSquares: [Player] = combo.compactMap{ gameBoard[$0] }.filter{ $0 !=
    .none}

    guard filledSquares.count == combo.count else { return false }

    let uniquePlayers = Set(filledSquares)

    return uniquePlayers.count == 1

    }

    guard let winningPlayerIndex = winningCombination?[0], let winningPlayer = gameBoard[winningPlayerIndex]
    else {

    guard gameBoard.count != 9 else { return .playersTied }

    return localPlayerIsCurrentParticipant ? .waitingForLocalPlayer : .waitingForOtherPlayer

    }

    return winningPlayer == localPlayer ? .localPlayerWon : .otherPlayerWon

    }

    ```


    Finally, we need to set up some functions to encode and store the state of the
    game board. This is done by simply storing the button labels into a JSONEncoder.
    This allows for easy and safe storage of information as well as easy network transmittal
    if our game required it.


    ```

    private typealias GameBoard = [Int: Player]

    private var gameBoard: GameBoard = [:] {

    didSet {

    logGameBoard("didSet")

    }

    }

    private var gameBoardData: Data? {

    logGameBoard("Serializing")

    return try? JSONEncoder().encode(gameBoard)

    }

    private func logGameBoard(_ label: String) {

    print((["\(label):"] + gameBoard.map{ "\($0.key): \($0.value.buttonTitle ?? "")"
    }).joined(separator: "\n"))

    }

    private var logError: (Error?) -> Void = { error in

    guard let error = error else { return }

    print("An error occurred updating turn: \(error.localizedDescription)")

    }

    ```'
