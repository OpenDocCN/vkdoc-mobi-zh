  raw: '## Starting a New Game


    Starting a new match with turn-based gaming is a very straightforward and simple
    process. To do so, you need to implement the following function as part of the
    delegate. This new function dismisses the GKTurnBasedMatchmakerViewController
    and then passes a copy of the match object to your Game Controller. The following
    code snippet is the procedure we follow for tic-tac-toe:


    ```

    func turnBasedMatchmakerViewController(_ viewController: GKTurnBasedMatchmakerViewController,
    didFind match: GKTurnBasedMatch) {

    performSegue(withIdentifier: "PlayGame", sender: match)

    dismiss(animated: true)

    }

    ```


    Then we pass the match to the destination when the segue is prepared.


    ```

    override func prepare(for segue: UIStoryboardSegue, sender: Any?) {

    guard

    segue.identifier == "PlayGame",

    let match = sender as? GKTurnBasedMatch,

    let game = segue.destination as? GameViewController

    else { return }

    game.match = match

    }

    ```


    Let’s now switch attention to the GameViewController class.


    Important


    You are strictly limited to passing only 4k of data with each new turn. If you
    cannot limit your game data to less than 4k, you can use a URL to point to a server
    holding the complete data set. Alternatively, you could pass only the delta of
    the game state and store the existing data locally.


    ```

    class GameViewController: UIViewController {

    var match: GKTurnBasedMatch? {

    didSet {

    loadMatchData()

    }

    }

    @IBOutlet private var buttons: [UIButton]!

    @IBOutlet private var teamLabel: UILabel!

    @IBOutlet private var statusLabel: UILabel!

    @IBOutlet private var forfeitButton: UIButton!

    @IBAction private func makeMove(_ sender: UIButton) {

    }

    @IBAction func forfeitTapped() {

    }

    }

    ```


    We first need to configure the actual game view (GameViewController). We need
    nine spots for the user to move in the tic-tac-toe game, as well as a forfeit
    option and a pair of labels to inform players whose turn it is.


    We use simple UIButtons to handle user input. Modify the storyboard with a layout
    similar to that pictured in Figure [8-4](#216283_2_En_8_Chapter.xhtml#Fig4). You
    need to create IBOutlets for each of the buttons and the label as well as new
    IBAction functions for both making a move and forfeiting. Connect all the board
    buttons to the makeMove function that you previously created. We also need to
    set tags on the UIButtons to help us locate them. Begin with tag 1 in the upper-left
    corner and move left to right, up to down, numbering them.


    ![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig4_HTML.jpg](images/216283_2_En_8_Chapter/216283_2_En_8_Fig4_HTML.jpg)


    Figure 8-4


    A view of the game board, as seen from the storyboard editor


    You now have two new functions in your game view controller, as well as nine button
    outlets and one label outlet. This covers how to begin a new turn-based gaming
    match. In the next section, we look at how to make a move and pass control to
    the next player.


    ## Making the First Move


    The first thing we need to do in a new match-based game, before we make a move,
    is determine who the player is representing. In our example game, there are two
    sides: X and O. We are going to set the first person to always be X and the second
    to always be O. This means that X will always make the first move. With this setup,
    it becomes easy to determine who the player currently is representing using the
    following code and convenience functions.


    The first four pieces of code declare private variables to make determining the
    local player, the remote player, the current player, and the next player easier
    to retrieve. After that a new struct is created for the player which will allow
    us to easily store state information on the progress of the game. Finally, some
    additional variables are set up to easily work with current player and the next
    player.


    ```

    private var localParticipant: GKTurnBasedParticipant? {

    match?.participants.first{ $0.player == GKLocalPlayer.local }

    }

    private var otherParticipant: GKTurnBasedParticipant? {

    guard let localParticipant = localParticipant else { return nil }

    return match?.participants.first{ $0 != localParticipant }

    }

    private var localPlayerIsCurrentParticipant: Bool {

    guard let localParticipant = localParticipant else { return false }

    return match?.currentParticipant == localParticipant

    }

    private var nextParticipant: GKTurnBasedParticipant? {

    guard let localParticipant = localParticipant else { return nil }

    return localPlayerIsCurrentParticipant ? otherParticipant : localParticipant

    }

    private enum Player: String, Codable {

    case none

    case x

    case o

    var title: String {

    switch self {

    case .none: return "unknown"

    case .x: return "❌"

    case .o: return "⭕"

    }

    }

    var buttonTitle: String? {

    switch self {

    case .none: return nil

    case .x, .o: return title

    }

    }

    }

    private var localPlayer: Player = .none

    private var otherPlayer: Player {

    switch localPlayer {

    case .none: return .none

    case .x: return .o

    case .o: return .x

    }

    }

    private var currentPlayer: Player {

    if let currentParticipant = match?.currentParticipant, let firstParticipant =
    match?.participants.first {

    return currentParticipant == firstParticipant ? .x : .o

    }

    return .none

    }

    private var nextPlayer: Player {

    switch currentPlayer {

    case .x: return .o

    case .o, .none: return .x

    }

    }

    ```


    After we have determined who the users are, then we can allow them to make a move.
    We will modify the code for the action to which the nine game buttons are connected.
    First, let’s take a look at the function that will be called when a play space
    button is tapped.


    ```

    @IBAction private func makeMove(_ sender: UIButton) {

    guard let index = buttons.firstIndex(of: sender) else { return }

    gameBoard[index] = localPlayer

    sendMatchData()

    }

    ```


    Next, the sendMatchData function is called, in which the current game state is
    determined to either be the local player has finished their move to end the turn,
    the local player has won so end the match, the players have tied so end the match,
    or the remote player is currently being waited on.


    ```

    private func sendMatchData() {

    switch currentGameStatus {

    case .waitingForLocalPlayer:

    endTurn()

    case .localPlayerWon:

    endMatchInTurn(participantOutcome: .won, nextParticipantOutcome: .lost)

    case .playersTied:

    endMatchInTurn(participantOutcome: .tied, nextParticipantOutcome: .tied)

    case .waitingForOtherPlayer, .otherPlayerWon:

    break

    }

    }

    ```


    If the game state determined that it is the next player’s turn, then endTurn is
    called. Once the proper variables have been set for the match, the next player
    and the current board data match.endTurn are then called and the view is updated.
    This will let Game Center know it is the remote player’s turn.'
  trans: "\n## 开始新游戏\n\n以回合制方式开始新比赛是一个非常直接简单的过程。为此，您需要作为委托的一部分实现以下函数。这个新函数会关闭`GKTurnBasedMatchmakerViewController`，然后将比赛对象的副本传递给您的游戏控制器。以下代码片段是我们为井字棋游戏遵循的流程：\n\
    \n```\nfunc turnBasedMatchmakerViewController(_ viewController: GKTurnBasedMatchmakerViewController,\
    \ didFind match: GKTurnBasedMatch) {\n    performSegue(withIdentifier: \"PlayGame\"\
    , sender: match)\n    dismiss(animated: true)\n}\n```\n\n然后，我们在转场准备就绪时将比赛对象传递给目标控制器。\n\
    \n```\noverride func prepare(for segue: UIStoryboardSegue, sender: Any?) {\n \
    \   guard\n        segue.identifier == \"PlayGame\",\n        let match = sender\
    \ as? GKTurnBasedMatch,\n        let game = segue.destination as? GameViewController\n\
    \    else { return }\n    game.match = match\n}\n```\n\n现在让我们将注意力转向`GameViewController`类。\n\
    \n**重要**\n\n每个新回合中您只能传递 **4k** 大小的数据。如果无法将游戏数据限制在 4k 以内，您可以使用指向持有完整数据集的服务器 URL。或者，您也可以仅传递游戏状态的增量，并将现有数据本地存储。\n\
    \n```\nclass GameViewController: UIViewController {\n    var match: GKTurnBasedMatch?\
    \ {\n        didSet {\n            loadMatchData()\n        }\n    }\n    @IBOutlet\
    \ private var buttons: [UIButton]!\n    @IBOutlet private var teamLabel: UILabel!\n\
    \    @IBOutlet private var statusLabel: UILabel!\n    @IBOutlet private var forfeitButton:\
    \ UIButton!\n    @IBAction private func makeMove(_ sender: UIButton) {\n    }\n\
    \    @IBAction func forfeitTapped() {\n    }\n}\n```\n\n我们首先需要配置实际的游戏视图（`GameViewController`）。在井字棋游戏中，我们需要九个位置供用户落子，以及一个认输选项和两个用于通知玩家轮到谁的标签。\n\
    \n我们使用简单的`UIButton`来处理用户输入。使用与图 8-4 所示类似的布局修改故事板。您需要为每个按钮和标签创建`IBOutlet`，并为落子和认输创建新的`IBAction`函数。将所有棋盘按钮连接到您之前创建的`makeMove`函数。我们还需要为`UIButton`设置标签以帮助定位。从左上角的标签\
    \ 1 开始，从左到右、从上到下进行编号。\n\n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig4_HTML.jpg](img/216283_2_En_8_Fig4_HTML.jpg)\n\
    \n*图 8-4 – 从故事板编辑器看到的游戏棋盘视图*\n\n现在您的游戏视图控制器中有了两个新函数，以及九个按钮出口和一个标签出口。这涵盖了如何开始新的回合制游戏比赛。在下一节中，我们将介绍如何落子并将控制权传递给下一位玩家。\n\
    \n## 进行第一步操作\n\n在基于回合的新游戏中，我们需要做的第一件事是确定玩家代表哪一方。在我们的示例游戏中，有两方：X 和 O。我们将设置第一位玩家始终代表\
    \ X，第二位始终代表 O。这意味着 X 将始终先手。通过这种设置，使用以下代码和便捷函数可以轻松确定当前玩家代表哪一方。\n\n前四段代码声明了私有变量，以便更轻松地获取本地玩家、远程玩家、当前玩家和下一位玩家。之后，为玩家创建了一个新的结构体，便于存储游戏进度的状态信息。最后，设置了一些额外的变量，以便轻松处理当前玩家和下一位玩家。\n\
    \n```\nprivate var localParticipant: GKTurnBasedParticipant? {\n    match?.participants.first{\
    \ $0.player == GKLocalPlayer.local }\n}\nprivate var otherParticipant: GKTurnBasedParticipant?\
    \ {\n    guard let localParticipant = localParticipant else { return nil }\n \
    \   return match?.participants.first{ $0 != localParticipant }\n}\nprivate var\
    \ localPlayerIsCurrentParticipant: Bool {\n    guard let localParticipant = localParticipant\
    \ else { return false }\n    return match?.currentParticipant == localParticipant\n\
    }\nprivate var nextParticipant: GKTurnBasedParticipant? {\n    guard let localParticipant\
    \ = localParticipant else { return nil }\n    return localPlayerIsCurrentParticipant\
    \ ? otherParticipant : localParticipant\n}\nprivate enum Player: String, Codable\
    \ {\n    case none\n    case x\n    case o\n    var title: String {\n        switch\
    \ self {\n        case .none: return \"unknown\"\n        case .x: return \"❌\"\
    \n        case .o: return \"⭕\"\n        }\n    }\n    var buttonTitle: String?\
    \ {\n        switch self {\n        case .none: return nil\n        case .x, .o:\
    \ return title\n        }\n    }\n}\nprivate var localPlayer: Player = .none\n\
    private var otherPlayer: Player {\n    switch localPlayer {\n    case .none: return\
    \ .none\n    case .x: return .o\n    case .o: return .x\n    }\n}\nprivate var\
    \ currentPlayer: Player {\n    if let currentParticipant = match?.currentParticipant,\
    \ let firstParticipant = match?.participants.first {\n        return currentParticipant\
    \ == firstParticipant ? .x : .o\n    }\n    return .none\n}\nprivate var nextPlayer:\
    \ Player {\n    switch currentPlayer {\n    case .x: return .o\n    case .o, .none:\
    \ return .x\n    }\n}\n```\n\n确定了用户身份后，我们就可以允许他们落子了。我们将修改与九个游戏按钮相连的操作代码。首先，让我们看看点击落子空格时会调用的函数。\n\
    \n```\n@IBAction private func makeMove(_ sender: UIButton) {\n    guard let index\
    \ = buttons.firstIndex(of: sender) else { return }\n    gameBoard[index] = localPlayer\n\
    \    sendMatchData()\n}\n```\n\n接下来，调用`sendMatchData`函数，在该函数中判断当前游戏状态：是本地玩家完成落子结束回合、本地玩家获胜从而结束比赛、玩家平局从而结束比赛，还是正在等待远程玩家。\n\
    \n```\nprivate func sendMatchData() {\n    switch currentGameStatus {\n    case\
    \ .waitingForLocalPlayer:\n        endTurn()\n    case .localPlayerWon:\n    \
    \    endMatchInTurn(participantOutcome: .won, nextParticipantOutcome: .lost)\n\
    \    case .playersTied:\n        endMatchInTurn(participantOutcome: .tied, nextParticipantOutcome:\
    \ .tied)\n    case .waitingForOtherPlayer, .otherPlayerWon:\n        break\n \
    \   }\n}\n```\n\n如果游戏状态判定轮到下一位玩家，则调用`endTurn`。一旦为比赛设置了适当的变量，就会调用下一位玩家和当前棋盘数据`match.endTurn`，并更新视图。这将通知\
    \ Game Center 轮到远程玩家操作了。\n"
- fmt: "```swift\nprivate func endTurn() {\n    guard let match = match, let nextParticipant\
    \ = nextParticipant, let gameBoardData = gameBoardData else { return }\n    match.endTurn(withNextParticipants:\
    \ [nextParticipant], turnTimeout: GKTurnTimeoutDefault, match: gameBoardData)\
    \ { [weak self] error in\n        self?.logError(error)\n        self?.updateView()\n\
    \    }\n}\n```\n\nIn the event that the game is finished in a tie or a win, then\
    \ `endMatchInTurn` is called. `participantOutcome` out is passed into the function\
    \ with either win or tie depending on the game state. There are other options\
    \ available for this variable such as `quit`, `lost`, `timeExpired`, and custom\
    \ values, which are not used in our simple tic-tac-toe example but may be applicable\
    \ to your game.\n\n```swift\nprivate func endMatchInTurn(participantOutcome: GKTurnBasedMatch.Outcome,\
    \ nextParticipantOutcome: GKTurnBasedMatch.Outcome?) {\n    guard let match =\
    \ match,\n          let currentParticipant = match.currentParticipant,\n     \
    \     let nextParticipant = nextParticipant,\n          let gameBoardData = gameBoardData\
    \ else { return }\n    currentParticipant.matchOutcome = participantOutcome\n\
    \    if let nextParticipantOutcome = nextParticipantOutcome {\n        nextParticipant.matchOutcome\
    \ = nextParticipantOutcome\n    }\n    match.endMatchInTurn(withMatch: gameBoardData)\
    \ { [weak self] error in\n        self?.logError(error)\n        self?.loadMatchData()\n\
    \    }\n}\n```\n\n> **Note:** The size and order of the participant’s array are\
    \ determined when the match first begins and will be the same throughout the match\
    \ and on each device.\n\n> **Tip:** You might see that there are nil objects in\
    \ the participant array; these are placeholders for unmatched players. Game Center\
    \ will only match new players when it is their turn to move. This means that every\
    \ time you are auto-matched, it will be your turn to move.\n\nThe last thing that\
    \ we will do at the end of each move is send the new game data to the next player.\
    \ This player will, in turn, update the game state and send it to the next player\
    \ (which happens to be the first player again).\n\n## GKLocalPlayerListener Extensions\n\
    \nWe will be adding two extension functions `GKLocalPlayerListener` in order to\
    \ monitor for changes in turn events as well as the end of a match. These will\
    \ also allow us to update the match data as the game progresses.\n\n```swift\n\
    extension GameViewController: GKLocalPlayerListener {\n    func player(_ player:\
    \ GKPlayer, receivedTurnEventFor match: GKTurnBasedMatch, didBecomeActive: Bool)\
    \ {\n        guard match.matchID == self.match?.matchID else { return }\n    \
    \    self.match = match\n    }\n\n    func player(_ player: GKPlayer, matchEnded\
    \ match: GKTurnBasedMatch) {\n        guard match.matchID == self.match?.matchID\
    \ else { return }\n        self.match = match\n    }\n}\n```\n\n## Continuing\
    \ a Game in Progress\n\nWhen you resume a game on your next turn, assuming it\
    \ is not the first turn of a match, you will need to first restore the game state\
    \ to its current position. To do this, we begin by modifying our `viewDidLoad`\
    \ function to get the current match data. We in turn call an `updateView` function\
    \ to set up the current game board. The first step of this process is determining\
    \ the current game state. Among other things, here we can determine if the game\
    \ is ended and, if not, whose turn it currently is. We also parse the gameboard\
    \ data and fill in the current Xs and Os to match the game history.\n\n```swift\n\
    override func viewDidLoad() {\n    super.viewDidLoad()\n    GKLocalPlayer.local.register(self)\n\
    \    updateView()\n}\n\nprivate func updateView() {\n    teamLabel.text = \"You\
    \ are playing \\(localPlayer.title).\"\n    let statusText: String\n    let forfeitButtonEnabled:\
    \ Bool\n    switch currentGameStatus {\n    case .waitingForLocalPlayer:\n   \
    \     statusText = \"It's your turn.\"\n        forfeitButtonEnabled = true\n\
    \    case .waitingForOtherPlayer:\n        statusText = \"It's \\(otherPlayer.title)'s\
    \ turn.\"\n        forfeitButtonEnabled = true\n    case .localPlayerWon:\n  \
    \      statusText = \"You won!\"\n        forfeitButtonEnabled = false\n    case\
    \ .otherPlayerWon:\n        statusText = \"You lost.\"\n        forfeitButtonEnabled\
    \ = false\n    case .playersTied:\n        statusText = \"It's a tie.\"\n    \
    \    forfeitButtonEnabled = false\n    }\n    statusLabel.text = statusText\n\
    \    forfeitButton.isEnabled = forfeitButtonEnabled\n\n    for index in 0..<9\
    \ {\n        let player = gameBoard[index] ?? .none\n        let button = buttons[index]\n\
    \        button.setTitle(player.buttonTitle, for: .normal)\n        button.isEnabled\
