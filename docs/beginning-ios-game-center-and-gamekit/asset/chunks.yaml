- fmt: '# In-App Purchase with StoreKit


    Throughout this book, we have been working with both Game Center and GameKit to
    add rich social networking into your iOS, Mac, and Apple TV apps. However, there
    is another important feature quickly becoming popular in modern software: in-app
    purchases. Allowing your users to purchase upgrades or additional content for
    your app, from directly within your app, opens up a potentially significant new
    revenue stream. Over the past decade, a new business model has emerged called
    Freemium. Freemium is a type of game or product that is offered to your users
    for free but is monetized through selling add-ons.


    We will be taking a look at We Rule by ngmoco:) as an example. The game is initially
    offered for free for both iPhone and iPad players. Each user is in control of
    a virtual kingdom, in which they are responsible for constructing buildings and
    growing crops. The user generates “mojo” over time and can use that in-app currency
    to create new structures and farms. However, some users want to construct faster
    than is normally allowed due the restrictive nature of mojo, which slowly accumulates.
    These power-users can visit the in-app store to purchase more mojo in bulk. It
    offers a number of purchases ranging from very affordable to shockingly expensive.
    It is important to cater to both types of users when working with sellable add-ons.
    Some of your users will be interested in spending one or two dollars occasionally,
    while some will be power-users who want to spend one hundred dollars, or more,
    at a time.


    Freemium has become such a strong business model that ngmoco:) has stopped working
    on games that do not fit into the Freemium model, going so far as to even cancel
    Rolando 3 in mid-development because it couldn’t be adapted to the model. The
    model appears to be paying off well for ngmoco:). As shown in Figure 10-1, the
    current highest selling item in the We Rule store is a $9.99 item. This one in-app
    purchase is retailing for more than most stand-alone iOS games, and the reason
    it was able to get that customer is that it hooked them with a free game first.


    ![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig1_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig1_HTML.jpg)


    Figure 10-1 – Current listing of the best-selling in-app purchases for We Rule
    by ngmoco:)


    Not all games or apps supported by in-app purchase need to be free. You can easily
    add additional features or unlocks in a paid game, such as the Mighty Eagle in
    Angry Birds. In-app purchase is also not only just for games. Almost any software
    can benefit from it, whether you are unlocking pro-level features or charging
    users a subscription for push notification support. As we dive into this chapter,
    we will explore how to add a full-featured in-app store to your iOS, Mac, and
    Apple TV software.


    ## Setting Up Your App in App Store Connect


    As with Game Center, we need to begin working with in-app purchases in App Store
    Connect:


    1.  Log in to App Store Connect ([`https://appstoreconnect.apple.com/login`](https://appstoreconnect.apple.com/login)),
    as discussed in Chapter 2. You will need an existing project to work on. If you
    don’t have a project created in App Store Connect yet, go ahead and create one.


    2.  Select the project you want to add in-app purchase support to. Then, click
    the button called Manage under In-App Purchases section.


    **Important**: You have 90 days from creating an app to upload a binary for review.
    Make sure to save the in-app purchase configuration until you are within 90 days
    of finishing your project.


    ![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig2_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig2_HTML.jpg)


    Figure 10-2 – Setting up your first in-app purchase in App Store Connect


    1.  Selecting the Manage button will bring you to a screen for setting up a new
    product, as shown in Figure 10-2. Once there, click the plus (+) button.


    There are several types of in-app purchase products that you can configure. They
    are detailed here for your convenience:


    ![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig3_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig3_HTML.jpg)


    Figure 10-3 – Setup screen for both consumable and non-consumable purchases in
    App Store Connect


    *   **Consumable**: A consumable in-app purchase must be purchased every time
    the user downloads it. These include in-game currency, as we saw in the We Rule
    example in the previous section. Figure 10-3 shows the consumable purchase setup
    screen.


    ![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig4_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig4_HTML.jpg)


    Figure 10-4 – Setup screen for auto-renewable purchases in App Store Connect


    *   **Non-Consumables**: A non-consumable purchase needs to be purchased only
    once by each user and is often used for unlockable features. Examples of non-consumable
    purchases include additional levels, reusable power-ups, or additional content.


    *   **Auto-Renewable Subscriptions**: An auto-renewable subscription allows the
    user to purchase in-app content for a set duration of time. At the end of that
    time frame, the subscription will automatically renew and charge the customer
    unless they opt out. Magazines and newspapers follow this model, delivering a
    new issue every week or month until the user opts out. Figure 10-4 shows the auto-renewable
    purchase setup screen.


    *   **Non-Renewing Subscriptions**: For the most part, renewable subscriptions
    have done away the need for this model. A non-renewing subscription functions
    the same as an auto-renewable subscription, except that a user is required to
    renew it every time it is set to expire.


    **Note**: Auto-renewable subscriptions will be sent to all devices associated
    with the user’s Apple ID.


    We will begin by adding a non-consumable purchase. We will be using this item
    in our sample UFO game.


    The first item we want to add is a paid upgrade to your current ship; name the
    item `com.dragonforged.ufo.newShip1`. I used the same title for both the product
    ID and the reference name. The reference name is for reference only when searching
    in App Store Connect, whereas the product ID is what will be used in your code
    base to identify this item.


    After you have created a new item, you need to add at least one localized description
    and title, as shown in Figure 10-5. The last thing that you need to do is select
    a pricing tier for this item. You might have also noticed that there is a section
    for uploading a screenshot; we discuss this in the later section “Submitting a
    Purchase GUI Screenshot.”


    ![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig5_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig5_HTML.jpg)'
