- fmt: "# Player Activity\n\nGame Center provides a method to query for recent player\
    \ activity. Your users will often want as much information as possible about how\
    \ long of a wait they could experience while looking for a multiplayer match.\
    \ It is important to establish that player activity is recent activity and not\
    \ current activity. There is no Apple-provided method for determining exactly\
    \ how many players are waiting for a match, but Apple does provide a way to determine\
    \ how many users have recently looked for a match. Let’s take a look at the required\
    \ source code to get player activity. Add the following two new functions to your\
    \ `GameCenterManager` class’s implementation file:\n\n```\nfunc findAllActivity()\
    \ {\n    GKMatchmaker.shared().queryActivity { activity, error in\n        DispatchQueue.main.async\
    \ {\n            self.delegate?.playerActivity?(activity as NSNumber, error: error)\n\
    \        }\n    }\n}\n\nfunc findActivityForPlayerGroup(_ playerGroup: Int) {\n\
    \    GKMatchmaker.shared().queryPlayerGroupActivity(playerGroup) { activity, error\
    \ in\n        let activityDictionary = [\n            \"activity\": activity,\n\
    \            \"playerGroup\": playerGroup,\n        ]\n        DispatchQueue.main.async\
    \ {\n            self.delegate?.playerActivity?(forGroup: activityDictionary,\
    \ error: error)\n        }\n    }\n}\n```\n\nWe also need to add two new protocol\
    \ methods to `GameCenterManagerPlayerDelegate` in `GameCenterManager.swift`. Add\
    \ the following two functions:\n\n```\nfunc playerActivity(_ activity: Int?, error:\
    \ Error?)\nfunc playerActivity(forGroup activityDict: [AnyHashable : Any]?, error:\
    \ Error?)\n```\n\nWhen you implement these new protocol methods in your `UFOViewController`\
    \ as follows:\n\n```\nfunc playerActivity(_ activity: Int?, error: Error?) {\n\
    \    if let error = error {\n        print(\"An error occurred while querying\
    \ player activity: \\(error.localizedDescription)\")\n    } else {\n        print(\"\
    All recent player activity: \\(activity ?? 0)\")\n    }\n}\n\nfunc playerActivity(forGroup\
    \ activityDict: [AnyHashable : Any]?, error: Error?) {\n    if let error = error\
    \ {\n        print(\"An error occurred while querying player activity: \\(error.localizedDescription)\"\
    )\n    } else {\n        if let activity = activityDict?[\"activity\"],\n    \
    \       let playerGroup = activityDict?[\"playerGroup\"] {\n            print(\"\
    All recent player activity: \\(activity) For group: \\(playerGroup)\")\n     \
    \   }\n    }\n}\n```\n\nyou should get output similar to the following:\n\n```\n\
    2021-03-08 11:11:04.007 UFOs[3000:207] All recent player activity: 3 For Group:\
    \ 12345\n2021-03-08 11:11:04.008 UFOs[3000:207] All recent player activity: 3\n\
    ```\n\nSo now that we have player activity for a specified player group, what\
    \ do these numbers mean? Apple has never specified the exact meaning of these\
    \ numbers, but through careful research, it appears that they represent the number\
    \ of users who attempted to connect to a game using the auto-matching feature\
    \ in the last one to three minutes. The numbers seem to reset at an undeterminable\
    \ interval somewhere within that time frame. In addition, there appears to be\
    \ a 15–30 second delay until new numbers are reflected from users attempting to\
    \ join a match.\n\nEven with the limitations imposed by player activity, it can\
    \ still be a very valuable tool in determining possible wait times for your users\
    \ to find a match. However, you want to make sure these numbers are used for informational\
    \ purposes only, as they tend to be just unreliable enough to depend upon.\n\n\
    **Note:** You can implement your own server system to keep track of exactly how\
    \ many players are waiting for a match if the Apple system does not provide specific\
    \ enough information on player activity for the needs of your app.\n\n# Using\
    \ Your Own Server (Hosted Matches)\n\nUnder normal circumstances, Game Center\
    \ will host your match for you; however, Apple has provided a technique for implementing\
    \ your own server to host a match. This approach is called a “hosted match” and\
    \ can be implemented in any app to add increased flexibility to Game Center–based\
    \ multiplayer networking.\n\nWhen using Game Center to host a match, every device\
    \ that is connecting to that match creates an instance of `GKMatch`. The `GKMatch`\
    \ class does all the legwork of connecting, handshaking, sending and receiving\
    \ data, and handling errors. However, there are times when you will need to implement\
    \ your own server, most notably if you want to allow more than four people to\
    \ connect to a single match at a time. In this scenario, you can use Game Center\
    \ to find peers for your match and use your own server to connect those peers.\n\
    \n**Tip:** Using a hosted match allows you to connect up to 16 users, as opposed\
    \ to the limit of four while using Game Center hosting.\n\nThere are several downsides\
    \ to using your own server, however, most notably that you are now responsible\
    \ for all the legwork that was previously given to you for free by Game Center,\
    \ specifically the following:\n\n- You must design and implement all of your own\
    \ networking code to connect the peers together. Game Center will find the matches\
    \ for you, but its involvement stops there.\n- If your app is using the standard\
    \ matchmaking interface, your server must inform the app when a new peer successfully\
    \ connects so that it can update the GUI.\n\nWe will need to make a handful of\
    \ minor changes to our code base in order to support hosted matches on the device\
    \ side. We begin by modifying our multiplayer button action method that we set\
    \ up earlier in this chapter.\n\n```\n@IBAction func multiplayerButtonPressed()\
    \ {\n    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
    \ = 4\n    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:\
    \ request) else {\n        print(\"There was an error creating the matchmaker\
    \ view controller.\")\n        return\n    }\n    matchmakerViewController.matchmakerDelegate\
    \ = self\n    matchmakerViewController.isHosted = true\n    present(matchmakerViewController,\
    \ animated: true)\n}\n```\n\nAs you can see, we added a new line, `matchmakerViewController.isHosted\
    \ = true`, which tells the matchmaker GUI that this match will be hosted on our\
    \ own servers. In addition to setting the `matchMakerViewController` to hosted,\
    \ you will need to have each device connect to your server. This section does\
    \ not deal with how to code the server itself, as there are dozens of languages\
    \ and approaches that can be taken here. However, after a device has connected\
    \ to your server, it needs to call the following with the player who is joining:\n\
    \n```\nmatchmakerViewController.setHostedPlayer(player, didConnect: true)\n```\n\
    \nThis will update the GUI on all the connected players’ screens, informing them\
    \ that a new player is ready to begin a match. After all the players are connected\
    \ to your server, and have confirmed that they are ready, your delegate is called\
    \ to begin the game. When working with Game Center matches, we used the delegate\
    \ callback `matchmakerViewController(_:didFind:)` to begin a match. However, for\
    \ a hosted game, we use the following:\n\n```\nfunc matchmakerViewController(_\
    \ viewController: GKMatchmakerViewController, didFindPlayers playerIDs: [String])\
    \ {\n    dismiss(animated: true, completion: nil)\n    print(\"Players: \\(playerIDs)\"\
    )\n    //Begin Hosted Game\n}\n```\n\nAt this point, you can begin the game with\
    \ your server handling the communication between the connected players. In addition,\
    \ you can begin a hosted match programmatically, as we saw with a Game Center–hosted\
    \ match earlier in this chapter.\n\n```\nfunc findProgrammaticHostedMatch() {\n\
    \    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
    \ = 16\n    GKMatchmaker.shared().findPlayers(forHostedRequest: request) { players,\
    \ error in\n        if let error = error {\n            print(\"An error occurred\
    \ during finding a match: \\(error.localizedDescription)\")\n        } else if\
    \ let players = players {\n            print(\"Players have been found for match:\
    \ \\(players)\")\n        }\n    }\n}\n```\n\nAs you can see, it is very similar\
    \ to our previous method; however, instead of getting back a `GKMatch` object,\
    \ we are returned an array of players. You will also note that we can also increase\
    \ the maximum players to 16."
  raw: '## Player Activity


    Game Center provides a method to query for recent player activity. Your users
    will often want as much information as possible about how long of a wait they
    could experience while looking for a multiplayer match. It is important to establish
    that player activity is recent activity and not current activity. There is no
    Apple-provided method for determining exactly how many players are waiting for
    a match, but Apple does provide a way to determine how many users have recently
    looked for a match. Let’s take a look at the required source code to get player
    activity. Add the following two new functions to your GameCenterManager class’s
    implementation file:


    ```

    func findAllActivity() {

    GKMatchmaker.shared().queryActivity { activity, error in

    DispatchQueue.main.async {

    self.delegate?.playerActivity?(activity as NSNumber, error: error)

    }

    }

    }

    func findActivityForPlayerGroup(_ playerGroup: Int) {

    GKMatchmaker.shared().queryPlayerGroupActivity(playerGroup) { activity, error
    in

    let activityDictionary = [

    "activity": activity,

    "playerGroup": playerGroup,

    ]

    DispatchQueue.main.async {

    self.delegate?.playerActivity?(forGroup: activityDictionary, error: error)

    }

    }

    }

    ```


    We also need to add two new protocol methods to GameCenterManagerPlayerDelegate
    in GameCenterManager.swift. Add the following two functions:


    ```

    func playerActivity(_ activity: Int?, error: Error?)

    func playerActivity(forGroup activityDict: [AnyHashable : Any]?, error: Error?)

    ```


    When you implement these new protocol methods in your UFOViewController as follows:


    ```

    func playerActivity(_ activity: Int?, error: Error?) {

    if let error = error {

    print("An error occurred while querying player activity: \(error.localizedDescription)")

    } else {

    print("All recent player activity: \(activity ?? 0)")

    }

    }

    func playerActivity(forGroup activityDict: [AnyHashable : Any]?, error: Error?)
    {

    if let error = error {

    print("An error occurred while querying player activity: \(error.localizedDescription)")

    } else {

    if let activity = activityDict?["activity"],

    let playerGroup = activityDict?["playerGroup"] {

    print("All recent player activity: \(activity) For group: \(playerGroup)")

    }

    }

    }

    ```


    you should get output similar to the following:


    ```

    2021-03-08 11:11:04.007 UFOs[3000:207] All recent player activity: 3 For Group:
    12345 2021-03-08 11:11:04.008 UFOs[3000:207] All recent player activity: 3

    ```


    So now that we have player activity for a specified player group, what do these
    numbers mean? Apple has never specified the exact meaning of these numbers, but
    through careful research, it appears that they represent the number of users who
    attempted to connect to a game using the auto-matching feature in the last one
    to three minutes. The numbers seem to reset at an undeterminable interval somewhere
    within that time frame. In addition, there appears to be a 15–30 second delay
    until new numbers are reflected from users attempting to join a match.


    Even with the limitations imposed by player activity, it can still be a very valuable
    tool in determining possible wait times for your users to find a match. However,
    you want to make sure these numbers are used for informational purposes only,
    as they tend to be just unreliable enough to depend upon.


    Note


    You can implement your own server system to keep track of exactly how many players
    are waiting for a match if the Apple system does not provide specific enough information
    on player activity for the needs of your app.


    ## Using Your Own Server (Hosted Matches)


    Under normal circumstances, Game Center will host your match for you; however,
    Apple has provided a technique for implementing your own server to host a match.
    This approach is called a “hosted match” and can be implemented in any app to
    add increased flexibility to Game Center–based multiplayer networking.


    When using Game Center to host a match, every device that is connecting to that
    match creates an instance of GKMatch. The GKMatch class does all the legwork of
    connecting, handshaking, sending and receiving data, and handling errors. However,
    there are times when you will need to implement your own server, most notably
    if you want to allow more than four people to connect to a single match at a time.
    In this scenario, you can use Game Center to find peers for your match and use
    your own server to connect those peers.


    Tip


    Using a hosted match allows you to connect up to 16 users, as opposed to the limit
    of four while using Game Center hosting.


    There are several downsides to using your own server, however, most notably that
    you are now responsible for all the legwork that was previously given to you for
    free by Game Center, specifically the following:


    *   You must design and implement all of your own networking code to connect the
    peers together. Game Center will find the matches for you, but its involvement
    stops there.


    *   If your app is using the standard matchmaking interface, your server must
    inform the app when a new peer successfully connects so that it can update the
    GUI.


    We will need to make a handful of minor changes to our code base in order to support
    hosted matches on the device side. We begin by modifying our multiplayer button
    action method that we set up earlier in this chapter.


    ```

    @IBAction func multiplayerButtonPressed() {

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 4

    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:
    request) else {

    print("There was an error creating the matchmaker view controller.")

    return

    }

    matchmakerViewController.matchmakerDelegate = self

    matchmakerViewController.isHosted = true

    present(matchmakerViewController, animated: true)

    }

    ```


    As you can see, we added a new line, `matchmakerViewController.isHosted = true`,
    which tells the matchmaker GUI that this match will be hosted on our own servers.
    In addition to setting the matchMakerViewController to hosted, you will need to
    have each device connect to your server. This section does not deal with how to
    code the server itself, as there are dozens of languages and approaches that can
    be taken here. However, after a device has connected to your server, it needs
    to call the following with the player who is joining:


    ```

    matchmakerViewController.setHostedPlayer(player, didConnect: true)

    ```


    This will update the GUI on all the connected players’ screens, informing them
    that a new player is ready to begin a match. After all the players are connected
    to your server, and have confirmed that they are ready, your delegate is called
    to begin the game. When working with Game Center matches, we used the delegate
    callback **matchmakerViewController(_:didFind:)** to begin a match. However, for
    a hosted game, we use the following:


    ```

    func matchmakerViewController(_ viewController: GKMatchmakerViewController, didFindPlayers
    playerIDs: [String]) {

    dismiss(animated: true, completion: nil)

    print("Players: \(playerIDs)")

    //Begin Hosted Game

    }

    ```


    At this point, you can begin the game with your server handling the communication
    between the connected players. In addition, you can begin a hosted match programmatically,
    as we saw with a Game Center–hosted match earlier in this chapter.


    ```

    func findProgrammaticHostedMatch() {

    let request = GKMatchRequest()

    request.minPlayers = 2

    request.maxPlayers = 16

    GKMatchmaker.shared().findPlayers(forHostedRequest: request) { players, error
    in

    if let error = error {

    print("An error occurred during finding a match: \(error.localizedDescription)")

    } else if let players = players {

    print("Players have been found for match: \(players)")

    }

    }

    }

    ```


    As you can see, it is very similar to our previous method; however, instead of
    getting back a GKMatch object, we are returned an array of players. You will also
    note that we can also increase the maximum players to 16.'
  trans: "\n# 玩家活动\n\nGame Center 提供了一种查询近期玩家活动的方法。你的用户通常希望尽可能了解他们在寻找多人比赛时可能需要等待多长时间。需要明确的是，玩家活动指的是近期活动，而非当前活动。苹果没有提供任何方法来精确判断有多少玩家正在等待比赛，但确实提供了一种方式来确定近期有多少用户寻找过比赛。让我们来看看获取玩家活动所需的源代码。将以下两个新函数添加到你的\
    \ `GameCenterManager` 类的实现文件中：\n\n```\nfunc findAllActivity() {\n    GKMatchmaker.shared().queryActivity\
    \ { activity, error in\n        DispatchQueue.main.async {\n            self.delegate?.playerActivity?(activity\
    \ as NSNumber, error: error)\n        }\n    }\n}\n\nfunc findActivityForPlayerGroup(_\
    \ playerGroup: Int) {\n    GKMatchmaker.shared().queryPlayerGroupActivity(playerGroup)\
    \ { activity, error in\n        let activityDictionary = [\n            \"activity\"\
    : activity,\n            \"playerGroup\": playerGroup,\n        ]\n        DispatchQueue.main.async\
    \ {\n            self.delegate?.playerActivity?(forGroup: activityDictionary,\
    \ error: error)\n        }\n    }\n}\n```\n\n我们还需要在 `GameCenterManager.swift`\
    \ 的 `GameCenterManagerPlayerDelegate` 中添加两个新的协议方法。添加以下两个函数：\n\n```\nfunc playerActivity(_\
    \ activity: Int?, error: Error?)\nfunc playerActivity(forGroup activityDict: [AnyHashable\
    \ : Any]?, error: Error?)\n```\n\n当你在 `UFOViewController` 中实现这些新的协议方法，如下所示：\n\n\
    ```\nfunc playerActivity(_ activity: Int?, error: Error?) {\n    if let error\
    \ = error {\n        print(\"查询玩家活动时发生错误：\\(error.localizedDescription)\")\n \
    \   } else {\n        print(\"所有近期玩家活动：\\(activity ?? 0)\")\n    }\n}\n\nfunc\
    \ playerActivity(forGroup activityDict: [AnyHashable : Any]?, error: Error?) {\n\
    \    if let error = error {\n        print(\"查询玩家活动时发生错误：\\(error.localizedDescription)\"\
    )\n    } else {\n        if let activity = activityDict?[\"activity\"],\n    \
    \       let playerGroup = activityDict?[\"playerGroup\"] {\n            print(\"\
    所有近期玩家活动：\\(activity) 分组：\\(playerGroup)\")\n        }\n    }\n}\n```\n\n你应该能得到类似以下的输出：\n\
    \n```\n2021-03-08 11:11:04.007 UFOs[3000:207] 所有近期玩家活动：3 分组：12345\n2021-03-08\
    \ 11:11:04.008 UFOs[3000:207] 所有近期玩家活动：3\n```\n\n现在我们获得了指定玩家分组的活动数据，但这些数字究竟意味着什么？苹果从未明确说明这些数字的确切含义，但通过仔细研究，它们似乎代表了过去一到三分钟内尝试使用自动匹配功能连接游戏的用户数量。这些数字似乎会在该时间范围内的某个不可确定的间隔内重置。此外，从用户尝试加入比赛到新数字反映出来，似乎存在\
    \ 15 到 30 秒的延迟。\n\n尽管存在这些由玩家活动机制带来的限制，但它仍然是一个非常有价值的工具，可以帮助你判断用户找到比赛的可能等待时间。不过，你需要确保这些信息仅供参考，因为它们往往不够可靠，不足以作为决策依据。\n\
    \n**注意：** 如果苹果系统提供的玩家活动信息不足以满足你的应用需求，你可以自行实现服务器系统来精确追踪有多少玩家正在等待比赛。\n\n# 使用自有服务器（托管比赛）\n\
    \n在正常情况下，Game Center 会为你托管比赛；然而，苹果也提供了一种实现自有服务器来托管比赛的技术。这种方法被称为“托管比赛”，可以在任何应用中实现，以增加基于\
    \ Game Center 的多人在线网络的灵活性。\n\n当使用 Game Center 托管比赛时，连接到该比赛的每台设备都会创建一个 `GKMatch`\
    \ 实例。`GKMatch` 类负责处理连接、握手、发送和接收数据以及处理错误等所有繁重工作。但有时你需要实现自己的服务器，特别是当你想允许同一时间超过四人连接到同一比赛时。在这种情况下，你可以使用\
    \ Game Center 为你的比赛寻找同伴，并使用自己的服务器来连接这些同伴。\n\n**提示：** 使用托管比赛可以连接多达 16 位用户，而使用 Game\
    \ Center 托管时最多只能连接四人。\n\n然而，使用自有服务器也有一些缺点，最显著的是，你现在需要负责以前由 Game Center 免费提供的所有繁重工作，具体包括以下几点：\n\
    \n-   你必须自行设计和实现所有网络代码来连接同伴。Game Center 会为你寻找比赛，但其作用仅止于此。\n-   如果你的应用使用的是标准匹配界面，那么你的服务器必须在新的同伴成功连接时通知应用，以便更新图形用户界面。\n\
    \n为了在设备端支持托管比赛，我们需要对代码库进行一些细微的修改。我们从修改本章前面设置的多人游戏按钮操作方法开始。\n\n```\n@IBAction func\
    \ multiplayerButtonPressed() {\n    let request = GKMatchRequest()\n    request.minPlayers\
    \ = 2\n    request.maxPlayers = 4\n    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:\
    \ request) else {\n        print(\"创建匹配视图控制器时出错。\")\n        return\n    }\n \
    \   matchmakerViewController.matchmakerDelegate = self\n    matchmakerViewController.isHosted\
    \ = true\n    present(matchmakerViewController, animated: true)\n}\n```\n\n如你所见，我们添加了一行新代码\
    \ `matchmakerViewController.isHosted = true`，这告诉匹配图形用户界面，此比赛将在我们自己的服务器上托管。除了将\
    \ `matchMakerViewController` 设置为托管模式外，你还需要让每台设备连接到你的服务器。本节不涉及如何编写服务器代码，因为这里可以使用数十种语言和方法。但是，在设备连接到你的服务器后，它需要针对加入的玩家调用以下代码：\n\
    \n```\nmatchmakerViewController.setHostedPlayer(player, didConnect: true)\n```\n\
    \n这将会更新所有已连接玩家屏幕上的图形用户界面，通知他们新玩家已准备好开始比赛。当所有玩家都连接到你的服务器并确认准备就绪后，你的委托方法将被调用来开始游戏。在使用\
    \ Game Center 比赛时，我们使用委托回调 `matchmakerViewController(_:didFind:)` 来开始比赛。然而，对于托管比赛，我们使用以下方法：\n\
    \n```\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
    \ didFindPlayers playerIDs: [String]) {\n    dismiss(animated: true, completion:\
    \ nil)\n    print(\"玩家：\\(playerIDs)\")\n    //开始托管比赛\n}\n```\n\n此时，你可以开始游戏，由你的服务器处理已连接玩家之间的通信。此外，你也可以像本章前面看到的\
    \ Game Center 托管比赛那样，通过编程方式开始一个托管比赛。\n\n```\nfunc findProgrammaticHostedMatch()\
    \ {\n    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
    \ = 16\n    GKMatchmaker.shared().findPlayers(forHostedRequest: request) { players,\
    \ error in\n        if let error = error {\n            print(\"寻找比赛时发生错误：\\(error.localizedDescription)\"\
    )\n        } else if let players = players {\n            print(\"已为比赛找到玩家：\\\
    (players)\")\n        }\n    }\n}\n```\n\n如你所见，这与之前的方法非常相似；不过，我们返回的不是一个 `GKMatch`\
    \ 对象，而是一个玩家数组。你还会注意到，我们还可以将最大玩家数增加到 16 人。\n"
- fmt: '## Summary


    In this chapter you were introduced to the concepts of matchmaking and invitations.
    We discussed the overwhelming benefits of adding multiplayer to your iOS, Mac,
    or Apple TV app or game, as well as some of the hurdles you might need to jump
    along the way. We explored the matchmaking process from presenting the standard
    Apple GUI to highly customized matches using player groups and player attributes.
    We reviewed how to process invitations in every possible scenario, as well as
    how to query for player activity. Finally, we discovered how it is possible to
    implement your own server to remove some of the limitations placed on Game Center.
    We expanded our reusable Game Center Manager to handle matchmaking, invitations,
    and the required overhead so that you can quickly add multiplayer ability to your
    apps.


    In this chapter, we deeply explored how to create matches and populate them with
    peers. In the upcoming chapters, we will not only learn how to communicate between
    the peers but also explore new methods for locating peers with whom to communicate.
    The next chapter covers information on how to design a Network Environment for
    use with your game or app.


    # 6. Network Design Overview


    In the previous chapters, we learned how to find and establish connections to
    peers through a variety of methods using both Game Center and GameKit. In this
    chapter, we will look at how to design a networking experience for a modern computer
    game. This chapter is written and laid out slightly different than the previous
    chapters you have encountered in this book. Primarily, there will be no associated
    source code with this chapter, and we will only briefly touch on GameKit networking
    topics themselves. This chapter will focus on the concepts of network design from
    an academic viewpoint, as opposed to actually implementing the network itself.
    In the next chapter, you will discover how to tie everything together and have
    your peers begin to communicate with each other.


    While it is entirely possible (and all too often performed) to go ahead and just
    start writing your network logic without any planning or forethought, it is probably
    not a great idea. After all, you wouldn’t begin writing a new app or game without
    first planning out how the logic of it will function. Network design is a complex
    topic, and you should approach it with a plan; otherwise, you could find yourself
    rewriting the entire system from scratch after putting a lot of work and effort
    into it. You don’t want to find yourself up against a wall because the approach
    you took limited your options for future expandability. Just like with software,
    you shouldn’t jump right into writing code on the first day. You should whiteboard
    things out a little and get a feel for the requirements of the project.


    Take, for example, a desktop role-playing game called Clan Lord that was written
    in the late 1990s for the Mac. Clan Lord has maintained a very dedicated fan base
    that has kept the game active and continual to the present day. However, when
    the game was originally written, many network-related issues were seemingly not
    properly thought through for a game that would still be played more than two decades
    later.


    Clan Lord uses frame-by-frame syncing for all of its network calls. This means
    that every frame, every element visible on the player’s screen, has to be transmitted.
    This approach works and works well while you have a small game, a small user base,
    and limited complex functionality. However, when you are designing software, you
    cannot have a limited vision for the future. Always plan for the best or, depending
    on your perspective, the worst case. When designing a network, you must take into
    account what you will want to do six months, a year, or even ten years from now
    with your game or app. It is all too often that software far exceeds its estimated
    life span and continues to operate well beyond when its initial software developers
    had intended; we need to look no further than the Y2K bug to see this in action.
    Every developer assumes something better will be along shortly to replace the
    work they are doing; more often than not they are wrong and products live on long
    past when it makes practical sense to keep them going.


    Clan Lord now suffers from long-ingrained problems, such as a five frames per
    second rendering engine, due to the fact that you cannot sync more than five full
    frames of data per second on the average home network. This could have been prevented
    by implementing some logic into the client when the project was first started;
    for example, it would have been much more efficient to inform the client where
    objects are and when they move, as opposed to fully syncing everything in each
    frame. In addition, player movement is limited to four to five frames per second
    because actions have to be synced back to the server, making it hard to react
    to events. This also could have been prevented by using prediction algorithms,
    discussed later in this chapter, to determine where a player will end up during
    movement.


    Clan Lord is one example of a game that was much more popular or at the very least
    had a much more dedicated fan base than planned and lived a lot longer than anyone
    expected. Sadly, when this happens, you are limited to the vision and design that
    you had when the project was first started. It is much harder to undo something
    later than to do it initially. When designing your network, take time to do it
    carefully and intentionally, as it can haunt you and your app for a very long
    time.


    ## Three Types of Networks


    Although there are many different types of network designs in existence, there
    are three practical and primary kinds of networks that you can implement when
    designing your network infrastructure. Picking a primary type of network is a
    good place to start, as it will guide you toward the next step in the design process.


    We will be focusing on just these three of the primary types of network designs,
    but keep in mind that there are dozens of other well-known network configurations,
    some of which we will briefly touch on in this section. The three types of networks
    we will be discussing in length throughout this chapter are peer-to-peer, client-to-host,
    and ring networking.'
