- fmt: "### Figure 10-5\n\nAdding a localized description to a product in `App Store\
    \ Connect`\n\nAdding a consumable product follows the same procedure as adding\
    \ a non-consumable product. If you want to add a subscription-based product, there\
    \ are a few new fields that you need to be aware of, as shown in Figure [10-6](#216283_2_En_10_Chapter.xhtml#Fig6).\
    \ When configuring a subscription, you need to define a duration. `iTunes Connect`\
    \ allows you to set any of the following: one week, one month, two months, three\
    \ months, six months, or one year. You also have the ability to offer a free subscription\
    \ if the user agrees to a marketing campaign, such as providing you with their\
    \ e-mail address.\n\n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig6_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig6_HTML.jpg)\n\
    \n### Figure 10-6\n\nConfiguring subscription duration in `iTunes Connect`\n\n\
    You should now have at least one product configured for in-app purchase. Your\
    \ screen in `App Store Connect` should look similar to the one shown in Figure\
    \ [10-7](#216283_2_En_10_Chapter.xhtml#Fig7). This concludes the initial configuration\
    \ that we need to do in `App Store Connect` to get in-app purchases working. In\
    \ the next section, we begin to work with the code required to complete a purchase\
    \ on a device.\n\n> **Note**\n>\n> Don’t worry about the “Missing Metadata” error\
    \ yet; this will be handled later in the process. You will still be able to test\
    \ your purchases while waiting to upload a screenshot.\n\n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig7_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig7_HTML.jpg)\n\
    \n### Figure 10-7\n\nProducts set up and ready for use in our app\n\n## Adding\
    \ Products to Your App\n\nUnlike with `Game Center`, Apple does not offer a predesigned\
    \ GUI for in-app purchases. You, as the developer, are required to design a storefront\
    \ for your user. In this section, we learn how to get products that you add in\
    \ `iTunes Connect` to show up for sale in your app.\n\n> **Note**\n>\n> It can\
    \ take several hours for new purchases and changes to be reflected. If you double-check\
    \ everything and are still not seeing products, wait a few hours and try again.\n\
    \n## App IDs and In-App Purchase\n\nWhen working with in-app purchases, Apple\
    \ requires that your `App ID` does not include a wild card, such as `76P4G6KX56.*`.\
    \ You are required to have a unique `App ID`, such as `76P4G6KX56.com.dragonforged.ufo`.\
    \ If you do not have a unique `App ID`, you need to create one. Use the following\
    \ steps to create a new unique `App ID`:\n\n1.  Navigate to [`https://appstoreconnect.apple.com/`](https://appstoreconnect.apple.com/)\
    \ in your web browser, and select your app from the list.\n2.  Select `App Information`\
    \ from the column on the left.\n3.  Fill in the required information about your\
    \ app.\n4.  Click `Submit`.\n5.  Click `Configure` next to the listing, and make\
    \ sure `In-App Purchase` is turned on (it should be on by default).\n\n## Setting\
    \ Up\n\nWe begin by requesting a list of products from our app. First, add the\
    \ `StoreKit` framework to your project. We will be modifying our existing `UFO`\
    \ project from the previous chapter; you can follow along in your own project\
    \ if that is more convenient.\n\n> **Important**\n>\n> `In-App Purchase` does\
    \ not work on the simulator; all testing needs to be done on a device.\n\nCreate\
    \ a new class called `UFOStoreViewController`. We will use this class to display\
    \ a store to the user. Set up the source code file to match the following:\n\n\
    ```swift\nimport UIKit\nimport StoreKit\nclass UFOStoreViewController: UIViewController\
    \ {\n    var productsRequest: SKProductsRequest?\n    @IBOutlet var storeTable:\
    \ UITableView!\n}\nextension UFOStoreViewController: SKProductsRequestDelegate\
    \ {\n}\n```\n\nAs you can see, we imported the `StoreKit` header. Set up the `SKProductsRequestDelegate`,\
    \ and create a new object to hold on to the product request. We need to create\
    \ a way for the user to access the store, so go ahead and add a button to the\
    \ main screen and relevant code to present the new view controller.\n\n## Retrieving\
    \ the Product List\n\nModify the `viewDidLoad` function of our new store view\
    \ controller to begin a new store request using the product identifiers that we\
    \ set up in `App Store Connect`. You might need to modify your product identifiers\
    \ to match the ones that you set up in the previous section.\n\n```swift\noverride\
    \ func viewDidLoad() {\n    super.viewDidLoad()\n    let productIdentifiers: Set\
    \ = [\n        \"com.dragonforged.ufo.newShip1\",\n        \"com.dragonforged.ufo.subscription\"\
    ,\n        \"com.dragonforged.ufo.newShip2\"\n    ]\n    let productsRequest =\
    \ SKProductsRequest(productIdentifiers: productIdentifiers)\n    productsRequest.delegate\
    \ = self\n    productsRequest.start()\n    self.productsRequest = productsRequest\n\
    }\n```\n\nThe product request is released in the delegate callback, shown next.\
    \ Right now, this method just prints your product information to the console and\
    \ logs any invalid products.\n\n```swift\nfunc productsRequest(_ request: SKProductsRequest,\
    \ didReceive response: SKProductsResponse) {\n    for product in response.products\
    \ {\n        print(\"Product title:\", product.localizedTitle)\n        print(\"\
    Product description:\", product.localizedDescription)\n        print(\"Product\
    \ price:\", product.price)\n        print(\"Product id:\", product.productIdentifier)\n\
    \        print(\"\\n\\n\")\n    }\n    for invalidProduct in response.invalidProductIdentifiers\
    \ {\n        print(\"Invalid product identifier: \\(invalidProduct)\")\n    }\n\
    \    productsRequest = nil\n}\n```\n\n> **Note**\n>\n> Although you can retrieve\
    \ a list of invalid product identifiers using the code in this section, there\
    \ are no associated errors to determine why a product is being flagged as invalid.\
    \ Under most occurrences, the product ID is mistyped, or not enough time has passed\
    \ for the product to be distributed to the servers.\n\nIf you were to run the\
    \ game now and navigate to the store, you should get output similar to the following:\n\
    \n```\nProduct title: Ship+\nProduct description: Paint your ship and show off\
    \ to your friends\nProduct price: 8.99\nProduct id: com.dragonforged.ufo.newShip1\n\
    Product title: Subscription\nProduct description: A subscription service\nProduct\
    \ price: 1.99\nProduct id: com.dragonforged.ufo.subscription\n```\n\n> **Note**\n\
    >\n> It can take several seconds to get a response from the product request. Best\
    \ practices dictate that you should present your user with some sort of loading\
    \ indicator.\n\nThese are all the steps required to retrieve your products from\
    \ Apple’s servers. In the next section, we present this data to the user using\
    \ a standard table view."
  raw: 'Figure 10-5


    Adding a localized description to a product in App Store Connect


    Adding a consumable product follows the same procedure as adding a non-consumable
    product. If you want to add a subscription-based product, there are a few new
    fields that you need to be aware of, as shown in Figure [10-6](#216283_2_En_10_Chapter.xhtml#Fig6).
    When configuring a subscription, you need to define a duration. iTunes Connect
    allows you to set any of the following: one week, one month, two months, three
    months, six months, or one year. You also have the ability to offer a free subscription
    if the user agrees to a marketing campaign, such as providing you with their e-mail
    address.


    ![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig6_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Configuring subscription duration in iTunes Connect


    You should now have at least one product configured for in-app purchase. Your
    screen in App Store Connect should look similar to the one shown in Figure [10-7](#216283_2_En_10_Chapter.xhtml#Fig7).
    This concludes the initial configuration that we need to do in App Store Connect
    to get in-app purchases working. In the next section, we begin to work with the
    code required to complete a purchase on a device.


    Note


    Don’t worry about the “Missing Metadata” error yet; this will be handled later
    in the process. You will still be able to test your purchases while waiting to
    upload a screenshot.


    ![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig7_HTML.jpg](images/216283_2_En_10_Chapter/216283_2_En_10_Fig7_HTML.jpg)


    Figure 10-7


    Products set up and ready for use in our app


    ### Adding Products to Your App


    Unlike with Game Center, Apple does not offer a predesigned GUI for in-app purchases.
    You, as the developer, are required to design a storefront for your user. In this
    section, we learn how to get products that you add in iTunes Connect to show up
    for sale in your app.


    Note


    It can take several hours for new purchases and changes to be reflected. If you
    double-check everything and are still not seeing products, wait a few hours and
    try again.


    ### App IDs and In-App Purchase


    When working with in-app purchases, Apple requires that your App ID does not include
    a wild card, such as 76P4G6KX56.*. You are required to have a unique App ID, such
    as [76P4G6KX56.​com](http://76p4g6kx56.com).dragonforged.ufo. If you do not have
    a unique App ID, you need to create one. Use the following steps to create a new
    unique App ID:


    1.  Navigate to [`https://appstoreconnect.apple.com/`](https://appstoreconnect.apple.com/)
    in your web browser, and select your app from the list.


    2.  Select App Information from the column on the left.


    3.  Fill in the required information about your app.


    4.  Click Submit.


    5.  Click Configure next to the listing, and make sure In-App Purchase is turned
    on (it should be on by default).


    ### Setting Up


    We begin by requesting a list of products from our app. First, add the StoreKit
    framework to your project. We will be modifying our existing UFO project from
    the previous chapter; you can follow along in your own project if that is more
    convenient.


    Important


    In-App Purchase does not work on the simulator; all testing needs to be done on
    a device.


    Create a new class called UFOStoreViewController. We will use this class to display
    a store to the user. Set up the source code file to match the following:


    ```

    import UIKit

    import StoreKit

    class UFOStoreViewController: UIViewController {

    var productsRequest: SKProductsRequest?

    @IBOutlet var storeTable: UITableView!

    }

    extension UFOStoreViewController: SKProductsRequestDelegate {

    }

    ```


    As you can see, we imported the StoreKit header. Set up the SKProductsRequestDelegate,
    and create a new object to hold on to the product request. We need to create a
    way for the user to access the store, so go ahead and add a button to the main
    screen and relevant code to present the new view controller.


    ### Retrieving the Product List


    Modify the viewDidLoad function of our new store view controller to begin a new
    store request using the product identifiers that we set up in App Store Connect.
    You might need to modify your product identifiers to match the ones that you set
    up in the previous section.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    let productIdentifiers: Set = [

    "com.dragonforged.ufo.newShip1",

    "com.dragonforged.ufo.subscription",

    "com.dragonforged.ufo.newShip2"

    ]

    let productsRequest = SKProductsRequest(productIdentifiers: productIdentifiers)

    productsRequest.delegate = self

    productsRequest.start()

    self.productsRequest = productsRequest

    }

    ```


    The product request is released in the delegate callback, shown next. Right now,
    this method just prints your product information to the console and logs any invalid
    products.


    ```

    func productsRequest(_ request: SKProductsRequest, didReceive response: SKProductsResponse)
    {

    for product in response.products {

    print("Product title:", product.localizedTitle)

    print("Product description:", product.localizedDescription)

    print("Product price:", product.price)

    print("Product id:", product.productIdentifier)

    print("\n\n")

    }

    for invalidProduct in response.invalidProductIdentifiers {

    print("Invalid product identifier: \(invalidProduct)")

    }

    productsRequest = nil

    }

    ```


    Note


    Although you can retrieve a list of invalid product identifiers using the code
    in this section, there are no associated errors to determine why a product is
    being flagged as invalid. Under most occurrences, the product ID is mistyped,
    or not enough time has passed for the product to be distributed to the servers.


    If you were to run the game now and navigate to the store, you should get output
    similar to the following:


    ```

    Product title: Ship+

    Product description: Paint your ship and show off to your friends

    Product price: 8.99

    Product id: com.dragonforged.ufo.newShip1

    Product title: Subscription

    Product description: A subscription service

    Product price: 1.99

    Product id: com.dragonforged.ufo.subscription

    ```


    Note


    It can take several seconds to get a response from the product request. Best practices
    dictate that you should present your user with some sort of loading indicator.


    These are all the steps required to retrieve your products from Apple’s servers.
    In the next section, we present this data to the user using a standard table view.'
  trans: "\n### 图 10-5\n\n在 `App Store Connect` 中为产品添加本地化描述\n\n添加消耗型产品的流程与非消耗型产品相同。如果你想添加基于订阅的产品，则需要留意几个新的字段，如图\
    \ 10-6 所示。配置订阅时，你需要定义持续时间。`iTunes Connect` 允许你设置以下任一选项：一周、一个月、两个月、三个月、六个月或一年。此外，如果用户同意参与营销活动（例如提供其电子邮件地址），你还可以提供免费订阅。\n\
    \n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig6_HTML.jpg](img/216283_2_En_10_Fig6_HTML.jpg)\n\
    \n### 图 10-6\n\n在 `iTunes Connect` 中配置订阅持续时间\n\n现在，你应该至少配置好了一个用于应用内购买的产品。你在 `App\
    \ Store Connect` 中的界面应类似于图 10-7。至此，我们在 `App Store Connect` 中为使应用内购买正常运行所需的初始配置就完成了。在下一节中，我们将开始编写在设备上完成购买所需的代码。\n\
    \n> **注**\n>\n> 暂时不必担心“缺少元数据”错误；这将在后续流程中处理。在等待上传截图期间，你仍然可以测试购买功能。\n\n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig7_HTML.jpg](img/216283_2_En_10_Fig7_HTML.jpg)\n\
    \n### 图 10-7\n\n产品已设置完毕，可在我们的应用中使用\n\n## 向应用添加产品\n\n与 `Game Center` 不同，苹果并未为应用内购买提供预设计的\
    \ GUI。你需要作为开发者为用户设计一个商店界面。在本节中，我们将学习如何获取你在 `iTunes Connect` 中添加的产品，使其在你的应用中显示为可购买状态。\n\
    \n> **注**\n>\n> 新的购买项或更改可能需要数小时才能生效。如果你反复检查一切无误但仍未看到产品，请等待几小时后再试。\n\n## App ID\
    \ 与应用内购买\n\n在使用应用内购买功能时，苹果要求你的 `App ID` 不能包含通配符，例如 `76P4G6KX56.*`。你必须使用唯一的 `App\
    \ ID`，例如 `76P4G6KX56.com.dragonforged.ufo`。如果你没有唯一的 `App ID`，则需要创建一个。请按照以下步骤创建新的唯一\
    \ `App ID`：\n\n1.  在网页浏览器中导航至 [`https://appstoreconnect.apple.com/`](https://appstoreconnect.apple.com/)，然后从列表中选择你的应用。\n\
    2.  从左侧栏中选择 `App Information`。\n3.  填写关于你应用的必填信息。\n4.  点击 `Submit`。\n5.  点击列表旁边的\
    \ `Configure`，确保 `In-App Purchase` 已开启（默认应已开启）。\n\n## 设置\n\n我们首先从应用中请求一个产品列表。首先，将\
    \ `StoreKit` 框架添加到你的项目中。我们将修改上一章中现有的 `UFO` 项目；如果更方便，你也可以在自己的项目中跟随操作。\n\n> **重要**\n\
    >\n> `In-App Purchase` 在模拟器上无法工作；所有测试都必须在设备上进行。\n\n创建一个名为 `UFOStoreViewController`\
    \ 的新类。我们将使用这个类向用户展示一个商店。将源代码文件设置为匹配以下内容：\n\n```swift\nimport UIKit\nimport StoreKit\n\
    class UFOStoreViewController: UIViewController {\n    var productsRequest: SKProductsRequest?\n\
    \    @IBOutlet var storeTable: UITableView!\n}\nextension UFOStoreViewController:\
    \ SKProductsRequestDelegate {\n}\n```\n\n如你所见，我们导入了 `StoreKit` 头文件。设置 `SKProductsRequestDelegate`，并创建一个新对象来持有产品请求。我们需要创建一种让用户访问商店的方式，因此请继续在主屏幕上添加一个按钮以及呈现新视图控制器的相关代码。\n\
    \n## 检索产品列表\n\n修改我们新商店视图控制器的 `viewDidLoad` 函数，使用我们在 `App Store Connect` 中设置的产品标识符启动一个新的商店请求。你可能需要修改你的产品标识符，使其与你上一节中设置的一致。\n\
    \n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    let productIdentifiers:\
    \ Set = [\n        \"com.dragonforged.ufo.newShip1\",\n        \"com.dragonforged.ufo.subscription\"\
    ,\n        \"com.dragonforged.ufo.newShip2\"\n    ]\n    let productsRequest =\
    \ SKProductsRequest(productIdentifiers: productIdentifiers)\n    productsRequest.delegate\
    \ = self\n    productsRequest.start()\n    self.productsRequest = productsRequest\n\
    }\n```\n\n产品请求在委托回调中释放，如下所示。目前，此方法只是将你的产品信息打印到控制台，并记录任何无效产品。\n\n```swift\nfunc\
    \ productsRequest(_ request: SKProductsRequest, didReceive response: SKProductsResponse)\
    \ {\n    for product in response.products {\n        print(\"Product title:\"\
    , product.localizedTitle)\n        print(\"Product description:\", product.localizedDescription)\n\
    \        print(\"Product price:\", product.price)\n        print(\"Product id:\"\
    , product.productIdentifier)\n        print(\"\\n\\n\")\n    }\n    for invalidProduct\
    \ in response.invalidProductIdentifiers {\n        print(\"Invalid product identifier:\
    \ \\(invalidProduct)\")\n    }\n    productsRequest = nil\n}\n```\n\n> **注**\n\
    >\n> 虽然你可以使用本节中的代码检索无效产品标识符列表，但并没有关联的错误信息来确定产品为何被标记为无效。在大多数情况下，产品 ID 输入有误，或者产品尚未被足够的时间分发到服务器。\n\
    \n如果你现在运行游戏并导航至商店，应该会得到类似于以下内容的输出：\n\n```\nProduct title: Ship+\nProduct description:\
    \ Paint your ship and show off to your friends\nProduct price: 8.99\nProduct id:\
    \ com.dragonforged.ufo.newShip1\nProduct title: Subscription\nProduct description:\
    \ A subscription service\nProduct price: 1.99\nProduct id: com.dragonforged.ufo.subscription\n\
    ```\n\n> **注**\n>\n> 从产品请求获取响应可能需要几秒钟。最佳实践要求你应该向用户显示某种加载指示器。\n\n以上是从苹果服务器检索产品所需的所有步骤。在下一节中，我们将使用标准表格视图向用户展示这些数据。\n"
