    \ { $0 }\n        otherPlayerImageView?.startAnimating()\n        if let otherPlayerImageView\
    \ = otherPlayerImageView {\n            view.addSubview(otherPlayerImageView)\n\
    \        }\n    }\n}\n```\n\n如果我们在两台设备上运行游戏并开始一局新的多人游戏，我们就会看到一个红色的敌方 UFO 静止在天空中。下一步，我们需要将移动数据发送给同伴，以便他们能够更新敌方玩家的位置。为此，我们在\
    \ `movePlayer` 函数的末尾添加一段新代码。\n\n```\nfunc movePlayer(_ vertical: double, _ horizontal:\
    \ double) {\n    //...\n    if gameIsMultiplayer {\n        let positionString\
    \ = \"$PlayerPosition: \\(playerFrame?.origin.x ?? 0.0) \\(playerFrame?.origin.y\
    \ ?? 0.0)\"\n        gcManager?.sendStringToAllPeers(positionString, reliable:\
    \ false)\n    }\n}\n```\n\n在这里，每次移动时都会将玩家坐标发送给同伴。我们选择以不可靠方式发送数据，因为即使发送失败，我们也可以使用下一个数据包。回想一下第\
    \ 7 章的内容，这是发送完整数据而非增量移动数据的好处之一。当玩家移动时，数据会持续更新。\n\n如第 7 章所述，这里非常适合使用预测技术，但为简单起见，我们将逐帧进行同步。此外，将\
    \ x 和 y 坐标发送到另一台设备有更好的方法，例如使用字典或自定义数据格式。然而，将它们编码为字符串是最容易理解的方式。随着游戏或应用的开发，你可以设计此类函数使其更精简、开销更小。\n\
    \n> **提示**\n> \n> 使用 `stringWithFormat` 会产生大量开销。在实践中，应使用 `stringByAppendingString`\
    \ 等方法进一步优化此类代码。\n\n我们还需要更新 `receivedData` 函数，以处理即将接收的新数据类型。请按如下方式修改该函数。此外，我们添加一个新函数来解析传入的数据，同时新增一个名为\
    \ `drawEnemyShipWithData` 的函数，具体如下：\n\n```\nfunc receivedData(_ dataDictionary:\
    \ [AnyHashable : Any]?) {\n    guard let dataDictionary = dataDictionary as? [String:\
    \ String] else { return }\n    if dataDictionary[\"data\"]?.hasPrefix(\"$Host:\"\
    ) ?? false {\n        determineHost(dataDictionary)\n    } else if dataDictionary[\"\
    data\"]?.hasPrefix(\"$PlayerPosition:\") ?? false {\n        drawEnemyShip(withData:\
    \ dataDictionary)\n    } else {\n        print(\"无法确定消息类型：\\(dataDictionary)\"\
    )\n    }\n}\n\nfunc drawEnemyShip(withData dataDictionary: [String : String]?)\
    \ {\n    let dataArray = dataDictionary?[\"data\"]?.components(separatedBy: \"\
    \ \")\n    let x = Double(dataArray?[1] ?? \"\") ?? 0.0\n    let y = Double(dataArray?[2]\
    \ ?? \"\") ?? 0.0\n    otherPlayerImageView?.frame = CGRect(x: CGFloat(x), y:\
    \ CGFloat(y), width: 80, height: 34)\n}\n```\n\n该函数解析来自网络的传入数据。我们从接收到的字符串中提取 x\
    \ 和 y 坐标，并用新位置更新敌方玩家的显示区域。这种逐帧同步两台设备的方法效率非常低下。如果有更多时间，应更新此函数，使用预测技术来判断玩家的移动方向，并且仅在玩家偏离预测时更新数据。不过，对于本演示而言，它已经满足需求。关于预测网络技术的更多信息，请参阅第\
    \ 7 章。\n\n如果现在运行游戏并开始一局新的多人游戏，你会看到每台设备都会反映其配对设备的移动情况。我们还需要生成奶牛、添加牵引光束并更新分数，但我们已经拥有一个功能完备（虽然目前略显单调）的多人游戏，如图\
    \ 7-1 所示。\n\n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig1_HTML.jpg](img/216283_2_En_7_Fig1_HTML.jpg)\n\
    \n*图 7-1. 在 UFO 游戏中添加第二名玩家。每个玩家可独立移动，并通过网络保持同步。*\n"
- fmt: "### Spawning Cows\n\nBecause we want the cow movement to be synced between\
    \ each device, we need to dedicate one device to handling the cow spawning and\
    \ movement paths. We have already picked a host device, so we will let the host\
    \ determine where the cows will be placed. We begin by modifying the `determineHost`\
    \ function. As you can see in the following code, if we are the host, we begin\
    \ our normal spawn cow process:\n\n```\nfunc determineHost(_ dataDictionary: [String\
    \ : String]?) {\n    let dataString = dataDictionary?[\"data\"]?.replacingOccurrences(of:\
    \ \"$Host:\", with: \"\")\n    if Double(dataString ?? \"\") ?? 0.0 == randomHostNumber\
    \ {\n        print(\"Host numbers are equal, we need to reroll them\")\n     \
    \   generateAndSendHostNumber()\n    } else if Double(dataString ?? \"\") ?? 0.0\
    \ > randomHostNumber {\n        isHost = true\n        for _ in 0..<5 {\n    \
    \        spawnCow()\n        }\n        updateCowPaths()\n    } else if Double(dataString\
    \ ?? \"\") ?? 0.0 < randomHostNumber {\n        isHost = false\n    }\n}\n```\n\
    \nWe also need to modify our `spawnCow` function to support the new networking\
    \ behavior. All we are doing here is determining whether we are a network game\
    \ and whether we are the host and then sending the data to our network handlers.\n\
    \n```\nfunc spawnCow() {\n    let x = Int(arc4random() % 480)\n    let cowImageView\
    \ = UIImageView(frame: CGRect(x: CGFloat(x), y: 260, width: 64, height: 42))\n\
    \    cowImageView.image = UIImage(named: \"Cow1.png\")\n    view.addSubview(cowImageView)\n\
    \    cowArray?.append(cowImageView)\n    if isHost && gameIsMultiplayer {\n  \
    \      gcManager?.sendStringToAllPeers(String(format: \"$spawnCow:%i\", x), reliable:\
    \ true)\n    }\n}\n```\n\nModify the `receivedData` function to support the new\
    \ `$spawnCow` message type. We also want to extract the x axis origin from the\
    \ message and pass it to a new method that will handle spawning a cow from the\
    \ network. Both of these functions are shown next:\n\n```\nelse if dataDictionary[\"\
    data\"]?.hasPrefix(\"$spawnCow:\") ?? false {\n    let x = Int(dataDictionary[\"\
    data\"]?.replacingOccurrences(of: \"$spawnCow:\", with: \"\") ?? \"\") ?? 0\n\
    \    spawnCow(fromNetwork: x)\n}\n```\n\n**Tip**  \nOur host doesn’t need to pass\
    \ the y axis coordinate for the cows because they are always spawned on the same\
    \ y axis. If you can eliminate data from a packet, it is always beneficial as\
    \ this type of unnecessary data adds up.\n\nIf you were to run the game now, you\
    \ would see that both devices spawn cows in the exact same location, but the host\
    \ device is the only device that animates the cow movements.\n\nThe next step\
    \ is to add the logic to share the animation control for the cows. Modify the\
    \ existing `updateCowPaths` method to send the `newX` and array position of the\
    \ cow we want to update. The following new code should be added to the end of\
    \ the `for` loop:\n\n```\nif gameIsMultiplayer {\n    let dataString = String(format:\
    \ \"$cowMove:%i:%f\", x, newX)\n    gcManager?.sendStringToAllPeers(dataString,\
    \ reliable: true)\n}\n```\n\n**Note**  \nBecause we set the data for the spawn\
    \ cow call to reliable, it is guaranteed to be received in the order that it was\
    \ sent. This means that we can be assured that the objects in our `cowArray` on\
    \ both devices will be in the same order.\n\nWe also need to add a new data handler\
    \ to our `receivedData` function. We pass the entire dictionary to our new `updateCowPathsFromNetwork`\
    \ function.\n\n```\nelse if dataDictionary[\"data\"]?.hasPrefix(\"$cowMove:\"\
    ) ?? false {\n    updateCowPaths(fromNetwork: dataDictionary)\n}\n\nfunc updateCowPaths(fromNetwork\
    \ dataDictionary: [String : String]?) {\n    let dataArray = dataDictionary?[\"\
    data\"]?.components(separatedBy: \":\")\n    let placeInArray = Int(dataArray?[1]\
    \ ?? \"\") ?? 0\n    let tempCow = cowArray?[placeInArray] as? UIImageView\n \
    \   let currentX = Double(tempCow?.frame.origin.x ?? 0.0)\n    let newX = Double(Int(dataArray?[2]\
    \ ?? \"\") ?? 0)\n    if tempCow != currentAbductee {\n        UIView.animate(\n\
    \            withDuration: 3.0,\n            delay: 0,\n            options: [.curveLinear],\n\
    \            animations: {\n                tempCow?.frame = CGRect(x: CGFloat(newX),\
    \ y: 260, width: 64, height: 42)\n            }\n        )\n    }\n    tempCow?.animationDuration\
    \ = 0.75\n    tempCow?.animationRepeatCount = 99999\n    //flip cow\n    if newX\
    \ < currentX {\n        let flippedCowImageArray = [UIImage(named: \"Cow1Reversed.png\"\
    ), UIImage(named: \"Cow2Reversed.png\"), UIImage(named: \"Cow3Reversed.png\")]\n\
    \        tempCow?.animationImages = flippedCowImageArray.compactMap { $0 }\n \
    \   } else {\n        let cowImageArray = [UIImage(named: \"Cow1.png\"), UIImage(named:\
    \ \"Cow2.png\"), UIImage(named: \"Cow3.png\")]\n        tempCow?.animationImages\
    \ = cowImageArray.compactMap { $0 }\n    }\n    tempCow?.startAnimating()\n}\n\
    ```\n\nThis function is very similar to our existing function for updating cow\
    \ paths. The two differences are that we get our place in the array from the network,\
    \ and we don’t randomly generate a `newX` position. If you were to run the game\
    \ again, you would see that both sets of cows are now in sync with each other.\
    \ When a cow changes position, it is reflected exactly the same on both devices.\
    \ Figure [7-2](#216283_2_En_7_Chapter.xhtml#Fig2) shows the current state of the\
    \ game.\n\n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig2_HTML.jpg](images/216283_2_En_7_Chapter/216283_2_En_7_Fig2_HTML.jpg)\n\
    \n**Figure 7-2** – Syncing up the cow movements over the network between two iOS\
    \ devices\n\nEach player can now abduct cows and increment their score. There\
    \ are, however, still two remaining issues that need to be addressed. The first\
    \ is that we don’t share scores between devices, and the second is that we don’t\
    \ show the other player’s tractor beams or animate the cows into the UFO during\
    \ the abduction. Let’s start off by adding in support for the score.\n\n### Sharing\
    \ Scores\n\nWhen we increment the score, we send that data to our peers. Add the\
    \ following snippet of code to our `finishAbducting` function, right after we\
    \ increment the score:\n\n```\nif gameIsMultiplayer {\n    gcManager?.sendStringToAllPeers(\"\
    $score:\\(score)\", reliable: true)\n}\n```\n\nWe, again, need to modify our `receivedData`\
    \ method to support the new `$score` message. I have chosen to increment the enemy\
    \ score within the `receivedData` method. You can, of course, write a new method\
    \ to handle this functionality. In addition, we need to add a new label for the\
    \ enemy score. It will be placed directly below the local player’s score. Figure\
    \ [7-3](#216283_2_En_7_Chapter.xhtml#Fig3) shows the scores in place.\n\n```\n\
    else if dataDictionary[\"data\"]?.hasPrefix(\"$score:\") ?? false {\n    let enemyScore\
    \ = Float(dataDictionary[\"data\"]?.replacingOccurrences(of: \"$score:\", with:\
    \ \"\") ?? \"\") ?? 0.0\n    enemeyScoreLabel.text = String(format: \"ENEMY %05.0f\"\
    , enemyScore)\n}\n```\n\n**Tip**  \nTechnically, you don’t need to pass the score\
    \ value in with the network call because scores are always incremented by one;\
    \ we can assume a new score message means increment the value by one.\n\n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig3_HTML.jpg](images/216283_2_En_7_Chapter/216283_2_En_7_Fig3_HTML.jpg)\n\
    \n**Figure 7-3** – Adding the score for the networked player\n\n**Exercise** \
    \ \nIt would be very easy to add logic to declare a winner of the game when either\
    \ player reaches a score of ten. Try to add this logic into the game yourself."
  raw: '### Spawning Cows


    Because we want the cow movement to be synced between each device, we need to
    dedicate one device to handling the cow spawning and movement paths. We have already
    picked a host device, so we will let the host determine where the cows will be
    placed. We begin by modifying the determineHost function. As you can see in the
    following code, if we are the host, we begin our normal spawn cow process:


    ```

    func determineHost(_ dataDictionary: [String : String]?) {

    let dataString = dataDictionary?["data"]?.replacingOccurrences(of: "$Host:", with:
    "")

    if Double(dataString ?? "") ?? 0.0 == randomHostNumber {

    print("Host numbers are equal, we need to reroll them")

    generateAndSendHostNumber()

    } else if Double(dataString ?? "") ?? 0.0 > randomHostNumber {

    isHost = true

    for _ in 0..<5 {

    spawnCow()

    }

    updateCowPaths()

    } else if Double(dataString ?? "") ?? 0.0 < randomHostNumber {

    isHost = false

    }

    }

    ```


    We also need to modify our spawnCow function to support the new networking behavior.
    All we are doing here is determining whether we are a network game and whether
    we are the host and then sending the data to our network handlers.


    ```

    func spawnCow() {

    let x = Int(arc4random() % 480)

    let cowImageView = UIImageView(frame: CGRect(x: CGFloat(x), y: 260, width: 64,
    height: 42))

    cowImageView.image = UIImage(named: "Cow1.png")

    view.addSubview(cowImageView)

    cowArray?.append(cowImageView)

    if isHost && gameIsMultiplayer {

    gcManager?.sendStringToAllPeers(String(format: "$spawnCow:%i", x), reliable: true)

    }

    }

    ```


    Modify the receivedData function to support the new $spawnCow message type. We
    also want to extract the x axis origin from the message and pass it to a new method
    that will handle spawning a cow from the network. Both of these functions are
    shown next:


    ```

    else if dataDictionary["data"]?.hasPrefix("$spawnCow:") ?? false {

    let x = Int(dataDictionary["data"]?.replacingOccurrences(of: "$spawnCow:", with:
    "") ?? "") ?? 0

    spawnCow(fromNetwork: x)

    }

    ```


    Tip


    Our host doesn’t need to pass the y axis coordinate for the cows because they
    are always spawned on the same y axis. If you can eliminate data from a packet,
    it is always beneficial as this type of unnecessary data adds up.


    If you were to run the game now, you would see that both devices spawn cows in
    the exact same location, but the host device is the only device that animates
    the cow movements.


    The next step is to add the logic to share the animation control for the cows.
    Modify the existing updateCowPaths method to send the newX and array position
    of the cow we want to update. The following new code should be added to the end
    of the for loop:


    ```

    if gameIsMultiplayer {

    let dataString = String(format: "$cowMove:%i:%f", x, newX)

    gcManager?.sendStringToAllPeers(dataString, reliable: true)

    }

    ```


    Note


    Because we set the data for the spawn cow call to reliable, it is guaranteed to
    be received in the order that it was sent. This means that we can be assured that
    the objects in our cowArray on both devices will be in the same order.


    We also need to add a new data handler to our receivedData function. We pass the
    entire dictionary to our new updateCowPathsFromNetwork function.


    ```

    else if dataDictionary["data"]?.hasPrefix("$cowMove:") ?? false {

    updateCowPaths(fromNetwork: dataDictionary)

    }

    func updateCowPaths(fromNetwork dataDictionary: [String : String]?) {

    let dataArray = dataDictionary?["data"]?.components(separatedBy: ":")

    let placeInArray = Int(dataArray?[1] ?? "") ?? 0

    let tempCow = cowArray?[placeInArray] as? UIImageView

    let currentX = Double(tempCow?.frame.origin.x ?? 0.0)

    let newX = Double(Int(dataArray?[2] ?? "") ?? 0)

    if tempCow != currentAbductee {

    UIView.animate(

    withDuration: 3.0,

    delay: 0,

    options: [.curveLinear],

    animations: {

    tempCow?.frame = CGRect(x: CGFloat(newX), y: 260, width: 64, height: 42)

    }

    )

    }

    tempCow?.animationDuration = 0.75

    tempCow?.animationRepeatCount = 99999

    //flip cow

    if newX < currentX {

    let flippedCowImageArray = [UIImage(named: "Cow1Reversed.png"), UIImage(named:
    "Cow2Reversed.png"), UIImage(named: "Cow3Reversed.png")]

    tempCow?.animationImages = flippedCowImageArray.compactMap { $0 }

    } else {

    let cowImageArray = [UIImage(named: "Cow1.png"), UIImage(named: "Cow2.png"), UIImage(named:
    "Cow3.png")]

    tempCow?.animationImages = cowImageArray.compactMap { $0 }

    }

    tempCow?.startAnimating()

    }

    {

    ```


    This function is very similar to our existing function for updating cow paths.
    The two differences are that we get our place in the array from the network, and
    we don’t randomly generate a newX position. If you were to run the game again,
    you would see that both sets of cows are now in sync with each other. When a cow
    changes position, it is reflected exactly the same on both devices. Figure [7-2](#216283_2_En_7_Chapter.xhtml#Fig2)
    shows the current state of the game.


    ![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig2_HTML.jpg](images/216283_2_En_7_Chapter/216283_2_En_7_Fig2_HTML.jpg)


    Figure 7-2


    Syncing up the cow movements over the network between two iOS devices


    Each player can now abduct cows and increment their score. There are, however,
    still two remaining issues that need to be addressed. The first is that we don’t
    share scores between devices, and the second is that we don’t show the other player’s
    tractor beams or animate the cows into the UFO during the abduction. Let’s start
    off by adding in support for the score.


    ### Sharing Scores


    When we increment the score, we send that data to our peers. Add the following
    snippet of code to our finishAbducting function, right after we increment the
    score:


    ```

    if gameIsMultiplayer {

    gcManager?.sendStringToAllPeers("$score:\(score)", reliable: true)

    }

    ```


    We, again, need to modify our receivedData method to support the new $score message.
    I have chosen to increment the enemy score within the receivedData method. You
    can, of course, write a new method to handle this functionality. In addition,
    we need to add a new label for the enemy score. It will be placed directly below
    the local player’s score. Figure [7-3](#216283_2_En_7_Chapter.xhtml#Fig3) shows
    the scores in place.


    ```

    else if dataDictionary["data"]?.hasPrefix("$score:") ?? false {

    let enemyScore = Float(dataDictionary["data"]?.replacingOccurrences(of: "$score:",
    with: "") ?? "") ?? 0.0

    enemeyScoreLabel.text = String(format: "ENEMY %05.0f", enemyScore)

    }

    ```


    Tip


    Technically, you don’t need to pass the score value in with the network call because
    scores are always incremented by one; we can assume a new score message means
    increment the value by one.


    ![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig3_HTML.jpg](images/216283_2_En_7_Chapter/216283_2_En_7_Fig3_HTML.jpg)


    Figure 7-3


    Adding the score for the networked player


    Exercise


    It would be very easy to add logic to declare a winner of the game when either
    player reaches a score of ten. Try to add this logic into the game yourself.'
