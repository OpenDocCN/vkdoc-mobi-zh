    ```

    func matchmakerViewController(_ viewController: GKMatchmakerViewController, didFind
    match: GKMatch) {

    dismiss(animated: true, completion: nil)

    gcManager?.matchOrSession = .match(match)

    let gameVC = UFOGameViewController()

    gameVC.gcManager = gcManager

    gameVC.gameIsMultiplayer = true

    gameVC.peerMatch = match

    navigationController?.pushViewController(gameVC, animated: true)

    }

    ```


    The important change to focus on in the preceding function is setting the delegate
    to handle the incoming data request to our GameCenterManager class. This allows
    us to handle all incoming data in one centralized place; from there, we can relay
    it out to the relevant sections of the app.


    Next, you need to add the following function to your GameCenterManager class.
    This new function handles incoming data from Game Center. This function assumes
    we will be working with only incoming strings because that is the design we have
    chosen when dealing with sending data in our game. You can easily adapt this method
    to handle receiving other types of objects. In addition, we will expand this new
    function to handle game-specific data. You can also further adapt this setup to
    use a more complex and intelligent system of data parsing, but it will be more
    than suitable for the needs of UFOs.


    ```

    func receivedData(_ dataDictionary: [AnyHashable : Any]?) {

    guard let dataDictionary = dataDictionary as? [String: String] else { return }

    }

    ```


    Tip


    You can use the context property to pass any data to the received delegate method.


    Further modify the receivedData function to handle all the possible types of data
    that will be seen in our game:


    ```

    func receivedData(_ dataDictionary: [AnyHashable : Any]?) {

    guard let dataDictionary = dataDictionary as? [String: String] else { return }

    determineHost(dataDictionary)

    }

    ```


    All that is left now is to implement our function to determine which player is
    the host; add a new function as seen in the following code snippet:


    ```

    func determineHost(_ dataDictionary: [String : String]?) {

    if Double(dataString ?? "") ?? 0.0 == randomHostNumber {

    print("Host numbers are equal, we need to reroll them")

    generateAndSendHostNumber()

    } else if Double(dataString ?? "") ?? 0.0 > randomHostNumber {

    isHost = true

    for _ in 0..<5 {

    spawnCow()

    }

    updateCowPaths()

    } else if Double(dataString ?? "") ?? 0.0 < randomHostNumber {

    isHost = false

    }

    }

    ```


    If you run the game on two devices now, you can see that each log reflects whether
    the device has been designated a host or whether the other device is the host.
    The receivedData function is very flawed, though, because it only works with the
    host data message. In the next section, we will refine this function to accept
    not only the host message but also input for player movements, cow movements,
    and other game actions.


    You now have all the basic skills required to send data between two different
    iOS, Mac, or Apple TV devices, as well as receive and parse that data and have
    your system react to it. If you want to experiment with working with these calls
    in practice, the next section will walk you through several examples of sending
    and receiving data in our UFOs game.


    ## Putting Everything Together


    In the last section, we learned how to receive the data that has been sent to
    a device. In this section, we walk through the exercise of actually using received
    data in a useful way for our game. We add a second player, allow movement information
    to be sent over the network, sync up state data across both devices (such as cow
    movement), track each player’s score, and complete various other required overhead
    tasks associated with our particular game.


    ### Selecting the Host


    Let’s start by improving the host selection logic that was implemented in the
    previous section. Right now, any data that we receive is assumed to be the host
    number. Because most of the data we receive will not be the host number, we need
    to find a way to filter that data to where we can parse it. Modify the generateAndSendHostNumber
    function to match the following code block:


    ```

    func generateAndSendHostNumber() {

    randomHostNumber = Double(arc4random())

    let randomNumberString = "$Host:\(randomHostNumber)"

    gcManager?.sendStringToAllPeers(randomNumberString, reliable: true)

    }

    ```


    As you can see, we now add an identifier prefix to the message that we will send.
    I have chosen for this example the prefix of $Host:, but you can use whatever
    system you want. In addition, we need to modify the receivedData callback to support
    the new format.


    ```

    func receivedData(_ dataDictionary: [AnyHashable : Any]?) {

    guard let dataDictionary = dataDictionary as? [String: String] else { return }

    if dataDictionary["data"]?.hasPrefix("$Host:") ?? false {

    determineHost(dataDictionary)

    } else {

    print("Unable to determine type of message: \(dataDictionary)")

    }

    }

    ```


    If we determine that the message is a host message, we send it to a new helper
    function called determineHost to determine which device is the host. If we are
    unable to determine the type of message, we print a warning message to the console,
    which will help us debug later down the road. We need to move the old code from
    receivedData into determineHost. In addition to moving the code, we need to strip
    off the prefix. Although stripping off the prefix has a lot of overhead, it is
    the easiest way to accomplish this task. In more complex apps, you might need
    to design a more robust message system.


    ```

    func determineHost(_ dataDictionary: [String : String]?) {

    let dataString = dataDictionary?["data"]?.replacingOccurrences(of: "$Host:", with:
    "")

    if Double(dataString ?? "") ?? 0.0 == randomHostNumber {

    print("Host numbers are equal, we need to reroll them")

    generateAndSendHostNumber()

    } else if Double(dataString ?? "") ?? 0.0 > randomHostNumber {

    isHost = true

    } else if Double(dataString ?? "") ?? 0.0 < randomHostNumber {

    isHost = false

    }

    }

    ```


    Now we can still determine who the host is, but we have opened the door to be
    able to process more than only this type of data.


    The next step will be transmitting and displaying our peer’s UFO into our game.
    In this chapter, I have added two new images to the project, EnemySaucer1.png
    and EnemySaucer2.png. These are the same as the originals but with a different
    color scheme applied to them. We will use this new artwork to display the opponent’s
    spacecraft.'
  trans: "\n### 接收数据\n\n`GKMatch` 拥有自己的系统，用于接收传入数据的委托回调。Game Center 沿用了我们在第 5 章中用于邀请处理程序的同一个委托。我们将从修改该现有函数开始。\n\
    \n设置我们的 App 以接收数据的第一步是，将接收数据委托设置给我们的 `GameCenterManager` 类。我们将使用 `GameCenterManager`\
    \ 类作为过滤点，将数据传回游戏。虽然你可以直接在游戏控制器中接收数据，但如果我们将所有数据都通过 `GameCenterManager` 进行管道传输，那么将来将这个类接入其他\
    \ App 会容易得多。\n\n修改 `UFOViewController.swift` 中的 `matchmakerViewController` 函数，使其与以下内容一致：\n\
    \n```\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
    \ didFind match: GKMatch) {\n    dismiss(animated: true, completion: nil)\n  \
