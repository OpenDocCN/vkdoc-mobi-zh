- fmt: '# Less Common Networks


    There are many additional types of network designs available in computer science.
    Some are more practical than others, and some are mostly theoretical. In this
    section, we cover some of the better known “uncommon” networks. Although some
    of these can be implemented on iOS devices, most will likely not have any real
    benefit for the average project:


    - **Headless Client**: The client has no data whatsoever and is controlled by
    a host device. You can think of this type of setup as a computer terminal that
    is booted from a server disk.


    - **Dedicated Server**: The host in this example does not participate in the game
    or activity and is dedicated to sending the information out from the peers and
    collecting new input. This is typically seen deployed by large companies creating
    a gaming community. A dedicated server system can be seen as an extension of the
    client to host setup where the host becomes a dedicated machine.


    - **Mesh/Partial Mesh Network**: This is a peer-to-peer network in which each
    peer may not be aware of the other peers that exist on the network. The packets
    are tagged with a destination and every hop attempts to get the packet closer
    to the destination. A full-mesh network means that every peer is interconnected,
    which is more or less the same as a peer-to-peer network practically speaking.


    - **Tree Network**: This type of network consists of a tree of peers interconnected
    to each other and each controlled by a centralized point. The central point passes
    messages to other central points, and each tree branch passes messages back and
    forth along that branch.


    - **Hybrid Network**: This type of network combines two or more technologies,
    such as two groups of peers who are linked together through a centralized server.


    This covers most of the networks you will encounter during a career of software
    engineering. There is really no limit to the type of network that you can design,
    and every year better designs and flows become available. If you find this topic
    especially interesting, there are many great resources available online that dive
    into network design in much greater detail. In the next section, we will look
    at the actual packets that will be sent and received on your network.


    # Reliable Data vs. Unreliable Data


    When dealing with network design, packet reliability is an important topic. When
    discussing packet reliability, we are specifically referring to the priority of
    the data, the ordering of the packets, and the retry determination factor. Let’s
    look at all these attributes separately and how they relate to network design
    (see Table 6-1) before we dig into the specifics we need for our implementation
    when dealing specifically with the Apple platforms.


    **Table 6-1.** Common Packet Attributes and How They Affect Network Behavior


    | Attribute | Relationship to network design |

    |---|---|

    | Priority | When you are working with low-level networking, you are dealing with
    packets. Each packet is a predetermined size and contains information about the
    event that you want to send to another peer. Packets are typically sent to a queue
    and then sent out to the peer they are addressed for, but because networking isn’t
    precise (especially if you are trying to get the lowest latency), packets might
    not always be received in the order that they are generated. For example, in a
    standard online game, you might be passing two types of information, game state
    changes, and chat information. Obviously, your character requesting an action,
    such as attacking an enemy or dodging an attack, is more important to have in
    a timely manner than a chat message. The solution to this type of problem is to
    set priority for packets. The peer will send cycle through all its pending messages
    and send the highest priority ones first. This allows the vital messages to be
    retried in the event of failure first, as well as bump the important packets to
    the top of the queue. |

    | Ordering | The order in which packets are received can be crucial. For example,
    if you are sending 10 packets, which together make up a very long chat message,
    or together make up the game state, then the order in which those packets are
    received is important to the receiving peer. If the packets aren’t received and
    processed in order, your message could appear scrambled. When this happens with
    a state engine, very unpredictable behavior may follow. There is a certain cost
    overhead involved when ensuring packets are ordered, however. If you are waiting
    for packet 1 of 10, then you can’t do anything with the packets you might have
    already received. This creates a situation in which your network is only as fast
    as your slowest packet. If ordering isn’t critical to your network functioning
    correctly, then you should not worry about the order. Remember that maintaining
    order is expensive; only require it where it is actually required. |

    | Retry | Networks are, by nature, unreliable. Even a desktop machine hooked up
    to a dedicated connection will have lost packets and experienced other failures.
    When you are dealing with network reliability on a mobile device, the only thing
    you can reliably count on is failure. When you send a packet to another peer,
    you can handle it two ways: the first is a send-and-forget system; the second
    is a send-and-verify system. In the first approach, you send a packet and you
    don’t really care if it gets there. Let me clarify: you do care, but if it fails,
    there is nothing you can do about it. A good example of this type of acceptable
    failure is a voice chat packet. If it fails to reach the end of the line successfully,
    resending it will merely bring things out of sync; it is better to just continue
    on streaming the data. The result of course will be a brief loss of voice but
    it’s better than the alternative. In the second approach, the packet is considered
    vital, such as player opening a chest, searching a slain foe for treasure, or
    updating their direction of movement. The peer needs this data to be sent to continue
    smoothly executing the commands. If you skip this packet, it will be frustrating
    to the user, as they will have to retry the action themselves instead of having
    the network retry it for them. |


    Now that we have covered the issues that are important when dealing with sending
    the actual data packets from one device to another, we can look at how these principles
    apply to the Apple platforms themselves.


    There are two types of modes that data can be sent in with GameKit: the first
    is `GKSendDataReliable`; the second is, naturally, `GKSendDataUnreliable`. Let’s
    take a look at what each one of these modes do for us and how they fit in with
    the topics we just discussed. See Table 6-2.


    **Table 6-2.** Packet Attributes and How They Apply to Game Center


    | Attribute | `GKSendDataReliable` | `GKSendDataUnreliable` |

    |---|---|---|

    | Priority | GameKit networking doesn’t factor in any type of priority when dealing
    with packets. Packets are sent in the order that they are fed into the system.
    | GameKit networking doesn’t factor in any type of priority when dealing with
    packets. Packets are sent in the order that they are fed into the system. |

    | Ordering | Packets will be received in the order that they are sent. | Packets
    using this method are not guaranteed to be received in the same order that they
    were sent. |

    | Retry | A packet will be continuously retried until it is successfully received.
    The next packet will not be sent until the first one has been confirmed received.
    | A packet is sent and then removed from the queue. The API does not wait to receive
    a received notification before it sends the next packet. This is naturally faster
    than waiting for a response between each packet. |'
  raw: '## Less Common Networks


    There are many additional types of network designs available in computer science.
    Some are more practical than others, and some are mostly theoretical. In this
    section, we cover some of the better known “uncommon” networks. Although some
    of these can be implemented on iOS devices, most will likely not have any real
    benefit for the average project:


    *   Headless Client: The client has no data whatsoever and is controlled by a
    host device. You can think of this type of setup as a computer terminal that is
    booted from a server disk.


    *   Dedicated Server: The host in this example does not participate in the game
    or activity and is dedicated to sending the information out from the peers and
    collecting new input. This is typically seen deployed by large companies creating
    a gaming community. A dedicated server system can be seen as an extension of the
    client to host setup where the host becomes a dedicated machine.


    *   Mesh/Partial Mesh Network: This is a peer-to-peer network in which each peer
    may not be aware of the other peers that exist on the network. The packets are
    tagged with a destination and every hop attempts to get the packet closer to the
    destination. A full-mesh network means that every peer is interconnected, which
    is more or less the same as a peer-to-peer network practically speaking.


    *   Tree Network: This type of network consists of a tree of peers interconnected
    to each other and each controlled by a centralized point. The central point passes
    messages to other central points, and each tree branch passes messages back and
    forth along that branch.


    *   Hybrid Network: This type of network combines two or more technologies, such
    as two groups of peers who are linked together through a centralized server.


    This covers most of the networks you will encounter during a career of software
    engineering. There is really no limit to the type of network that you can design,
    and every year better designs and flows become available. If you find this topic
    especially interesting, there are many great resources available online that dive
    into network design in much greater detail. In the next section, we will look
    at the actual packets that will be sent and received on your network.


    ## Reliable Data vs. Unreliable Data


    When dealing with network design, packet reliability is an important topic. When
    discussing packet reliability, we are specifically referring to the priority of
    the data, the ordering of the packets, and the retry determination factor. Let’s
    look at all these attributes separately and how they relate to network design
    (see Table [6-1](#216283_2_En_6_Chapter.xhtml#Tab1)) before we dig into the specifics
    we need for our implementation when dealing specifically with the Apple platforms.


    Table 6-1


    Common Packet Attributes and How They Affect Network Behavior


    | Attribute | Relationship to network design |

    | --- | --- |

    | Priority | When you are working with low-level networking, you are dealing with
    packets. Each packet is a predetermined size and contains information about the
    event that you want to send to another peer. Packets are typically sent to a queue
    and then sent out to the peer they are addressed for, but because networking isn’t
    precise (especially if you are trying to get the lowest latency), packets might
    not always be received in the order that they are generated.For example, in a
    standard online game, you might be passing two types of information, game state
    changes, and chat information. Obviously, your character requesting an action,
    such as attacking an enemy or dodging an attack, is more important to have in
    a timely manner than a chat message.The solution to this type of problem is to
    set priority for packets. The peer will send cycle through all its pending messages
    and send the highest priority ones first. This allows the vital messages to be
    retried in the event of failure first, as well as bump the important packets to
    the top of the queue. |

    | Ordering | The order in which packets are received can be crucial. For example,
    if you are sending 10 packets, which together make up a very long chat message,
    or together make up the game state, then the order in which those packets are
    received is important to the receiving peer.If the packets aren’t received and
    processed in order, your message could appear scrambled. When this happens with
    a state engine, very unpredictable behavior may follow. There is a certain cost
    overhead involved when ensuring packets are ordered, however. If you are waiting
    for packet 1 of 10, then you can’t do anything with the packets you might have
    already received. This creates a situation in which your network is only as fast
    as your slowest packet. If ordering isn’t critical to your network functioning
    correctly, then you should not worry about the order. Remember that maintaining
    order is expensive; only require it where it is actually required. |

    | Retry | Networks are, by nature, unreliable. Even a desktop machine hooked up
    to a dedicated connection will have lost packets and experienced other failures.
    When you are dealing with network reliability on a mobile device, the only thing
    you can reliably count on is failure. When you send a packet to another peer,
    you can handle it two ways: the first is a send-and-forget system; the second
    is a send-and-verify system.In the first approach, you send a packet and you don’t
    really care if it gets there. Let me clarify: you do care, but if it fails, there
    is nothing you can do about it. A good example of this type of acceptable failure
    is a voice chat packet. If it fails to reach the end of the line successfully,
    resending it will merely bring things out of sync; it is better to just continue
    on streaming the data. The result of course will be a brief loss of voice but
    it’s better than the alternative.In the second approach, the packet is considered
    vital, such as player opening a chest, searching a slain foe for treasure, or
    updating their direction of movement. The peer needs this data to be sent to continue
    smoothly executing the commands. If you skip this packet, it will be frustrating
    to the user, as they will have to retry the action themselves instead of having
    the network retry it for them. |


    Now that we have covered the issues that are important when dealing with sending
    the actual data packets from one device to another, we can look at how these principles
    apply to the Apple platforms themselves.


    There are two types of modes that data can be sent in with GameKit: the first
    is GKSendDataReliable; the second is, naturally, GKSendDataUnreliable. Let’s take
    a look at what each one of these modes do for us and how they fit in with the
    topics we just discussed. See Table [6-2](#216283_2_En_6_Chapter.xhtml#Tab2).


    Table 6-2


    Packet Attributes and How They Apply to Game Center


    | Attribute | GKSendDataReliable | GKSendDataUnreliable |

    | --- | --- | --- |

    | Priority | GameKit networking doesn’t factor in any type of priority when dealing
    with packets. Packets are sent in the order that they are fed into the system.
    | GameKit networking doesn’t factor in any type of priority when dealing with
