  raw: '### Presenting Achievements


    Unlike leaderboards, there will be plenty to preview GUI-wise before we populate
    user data into our achievement system. It is helpful to see the effects that modifying
    achievements have on how they are displayed through the default GUI. In the remainder
    of this chapter, we will begin by presenting Apple’s achievement GUI and then
    move on to submitting user data. We will also cover custom GUI achievements.


    Before we can begin, we need to create a new UIbutton that will trigger the achievement
    view. We most likely want to do this outside of the game screen, as we did with
    our two leaderboard buttons. We begin by adding a new button to the UFOViewController
    view, as shown in Figure [4-6](#216283_2_En_4_Chapter.xhtml#Fig6).


    You also need to create and hook up an IBAction to our new achievement button.
    Insert the following code into the action that you hooked up to the achievement
    button:


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig6_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig6_HTML.jpg)


    Figure 4-6


    Adding a new button to trigger our achievement view


    ```

    @IBAction func achievementButtonPressed() {

    var achievementViewController: GKGameCenterViewController? = nil

    if let state = GKGameCenterViewControllerState(rawValue: 1) {

    achievementViewController = GKGameCenterViewController(state: state)

    }

    achievementViewController?.gameCenterDelegate = self

    if let achievementViewController = achievementViewController {

    present(achievementViewController, animated: true)

    }

    }

    ```


    If you were to run the App and tap on the achievement button, you would now see
    a view similar to the one shown in Figure [4-7](#216283_2_En_4_Chapter.xhtml#Fig7).
    The achievements shown are using Apple’s unearned image. Apple recommends that
    you always use its unearned image, but when working with a custom achievement
    GUI, you can override this image and return your own.


    Next, recall that we set up three achievements, one of them hidden. As you can
    see in Figure [4-7](#216283_2_En_4_Chapter.xhtml#Fig7), the provided view shows
    us only two achievements. Because we have not submitted any kind of progress to
    the third achievement, its details are hidden from the user. However, you can
    see that the top information line reflects that there is a hidden achievement
    (0 of 3 achievements). Also notice that the achievements are using the localized
    unearned description that was set in iTunes Connect.


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig7_HTML.png](images/216283_2_En_4_Chapter/216283_2_En_4_Fig7_HTML.png)


    Figure 4-7


    Our achievements, as shown with Apple’s default GUI


    These are the only necessary steps to show the user his or her achievement progress
    through Apple’s built-in GUI. In the next section, we will look at how to update
    and progress these achievements. Later in this chapter, you will learn how to
    present achievement using a custom GUI.


    Note


    A user can always see his or her achievement progress in Game Center, but it is
    recommended allowing your user a way to view their progress from within your app
    as well.


    ### Modifying Achievement Progress


    Unlike a leaderboard entry, achievements can be constantly modified and progressed
    through user interaction. As with the other Game Center functionality we have
    been working with, we will create a new method in our GameCenterManager class
    to handle interacting with achievements. Once the following method has been added,
    we will review the method to understand exactly how it functions.


    Tip


    Remember that all this source code is made available to you online. When dealing
    with large functions, it might be easier to copy it from the source code downloaded
    from [apress.​com](http://apress.com).


    ```

    func submitAchievement(_ identifier: String, percentComplete: Double) {

    if GKLocalPlayer.local.isAuthenticated == false {

    return

    }

    guard earnedAchievementCache != nil else {

    populateAchievementCache() {

    self.submitAchievement(identifier, percentComplete: percentComplete)

    }

    return

    }

    if let achievement = achievement(forIdentifier: identifier) {

    let storedProgress = achievement.percentComplete

    guard percentComplete > storedProgress else {

    return

    }

    achievement.percentComplete = percentComplete

    GKAchievement.report([achievement], withCompletionHandler: { [weak self] error
    in

    if let error = error {

    print("An error occurred while reporting an achievement. Data will be saved to
    UserDefaults: \(error.localizedDescription)")

    self?.storeAchievementToSubmitLater(achievement)

    }

    if percentComplete >= 100 {

    GKAchievementDescription.loadAchievementDescriptions(completionHandler: { [weak
    self] achievementDescriptions, error in

    if let error = error {

    print("An error occurred while loading achievement descriptions: \(error.localizedDescription)")

    }

    achievementDescriptions?.forEach{ achievementDescription in

    if achievement.identifier == achievementDescription.identifier {

    self?.gameDelegate?.achievementEarned(achievementDescription)

    }

    }

    })

    }

    DispatchQueue.main.async { [weak self] in

    self?.gameDelegate?.achievementSubmitted(achievement, error: error)

    }

    })

    }

    }

    }

    ```


    Now look at the submitAchievement:percentComplete: function we added. There are
    two primary if/else blocks. The first one is executed if earnedAchievementCache
    is nil, which it will always be the first time this code is executed. Let’s take
    a look at that block of code now.


    ```

    GKAchievement.loadAchievements(completionHandler: { achievements, error in

    if error == nil {

    var tempCache: [String: GKAchievement] = [:]

    for achievement in achievements ?? [] {

    tempCache[achievement.identifier] = achievement

    }

    self.earnedAchievementCache = tempCache as? NSMutableDictionary

    self.submitAchievement(identifier, percentComplete: percentComplete)

    } else {

    DispatchQueue.main.async {

    self.delegate?.achievementSubmitted?(nil, error: error)

    }

    }

    })

    ```


    Important


    The array that is returned by loadAchievementsWithCompletionHandler will not show
    any achievements that you have not yet submitted a percentageCompleted for.


    The primary function of this code snippet is to load a list of achievements into
    the earnedAchievementCache. We call loadAchievementsWithCompletionHandler on GKAchievement.
    This call returns an array of all the achievements that were set up in App Store
    Connect. We then store the GKAchievement object into the dictionary with the identifier
    as the key. At this point, the code calls submitAchievement:percentComplete again.
    This time, earnedAchievementCache is not nil and the second set of code is executed.
    If we encounter an error during this process, we use our standard delegate callback
    to send the error back to our delegate.


    You will need to add new functions to GameCenterManager to handle this delegate
    callback; this is a good time to do that. Add the following optional protocol
    to the header file:


    ```

    func achievementSubmitted(_ achievement: GKAchievement?, error: Error?)

    ```


    Now let’s take a look at the second section of code. The following code, when
    successfully executed, submits the achievement to the Game Center servers:'
  trans: "\n### 呈现成就\n\n与排行榜不同，在将用户数据填充到成就系统之前，有很多 GUI 方面的内容需要预览。查看修改成就对默认 GUI 显示效果的影响会很有帮助。在本章的剩余部分，我们将首先展示苹果的成就\
    \ GUI，然后继续讲解如何提交用户数据。我们还将介绍自定义 GUI 成就。\n\n在开始之前，我们需要创建一个新的 `UIbutton` 来触发成就视图。我们很可能希望像处理排行榜按钮那样，将此按钮放置在游戏画面之外。我们从在\
    \ `UFOViewController` 视图中添加一个新按钮开始，如图 4-6 所示。\n\n你还需要创建并连接一个 `IBAction` 到我们新的成就按钮上。将以下代码插入到你连接到成就按钮的操作中：\n\
    \n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig6_HTML.jpg](img/216283_2_En_4_Fig6_HTML.jpg)\n\
    \n图 4-6：添加一个新按钮来触发我们的成就视图\n\n```\n@IBAction func achievementButtonPressed() {\n\
    \    var achievementViewController: GKGameCenterViewController? = nil\n    if\
    \ let state = GKGameCenterViewControllerState(rawValue: 1) {\n        achievementViewController\
    \ = GKGameCenterViewController(state: state)\n    }\n    achievementViewController?.gameCenterDelegate\
    \ = self\n    if let achievementViewController = achievementViewController {\n\
    \        present(achievementViewController, animated: true)\n    }\n}\n```\n\n\
    如果你运行该 App 并点击成就按钮，你将会看到一个类似于图 4-7 所示的视图。显示的成就使用的是苹果的未获得图像。苹果建议你始终使用其未获得图像，但在使用自定义成就\
    \ GUI 时，你可以覆盖此图像并返回你自己的图像。\n\n接下来，回顾一下我们设置了三个成就，其中一个是隐藏的。正如你在图 4-7 中所见，提供的视图只显示了两个成就。由于我们没有向第三个成就提交任何进度，其详细信息对用户是隐藏的。不过，你可以看到顶部信息行显示有一个隐藏成就（0/3\
    \ 成就）。另请注意，成就使用的是在 iTunes Connect 中设定的本地化未获得描述。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig7_HTML.png](img/216283_2_En_4_Fig7_HTML.png)\n\
    \n图 4-7：我们的成就，以苹果默认 GUI 显示\n\n这些就是通过苹果内置 GUI 向用户展示其成就进度的必要步骤。在下一节中，我们将探讨如何更新和推进这些成就。在本章稍后部分，你将学习如何使用自定义\
    \ GUI 呈现成就。\n\n> **注意：** 用户始终可以在 Game Center 中查看自己的成就进度，但建议您也让用户能够在您的应用内查看其进度。\n\
    \n### 修改成就进度\n\n与排行榜条目不同，成就可以通过用户交互不断修改和推进。与我们处理的其他 Game Center 功能类似，我们将在 `GameCenterManager`\
    \ 类中创建一个新方法来处理与成就的交互。添加以下方法后，我们将对该方法进行回顾，以准确理解其运作方式。\n\n> **提示：** 请记住，所有这些源代码都可以在网上获取。处理大型函数时，从\
    \ [apress.com](http://apress.com) 下载的源代码中复制可能更为简便。\n\n```\nfunc submitAchievement(_\
    \ identifier: String, percentComplete: Double) {\n    if GKLocalPlayer.local.isAuthenticated\
    \ == false {\n        return\n    }\n    guard earnedAchievementCache != nil else\
    \ {\n        populateAchievementCache() {\n            self.submitAchievement(identifier,\
    \ percentComplete: percentComplete)\n        }\n        return\n    }\n    if\
    \ let achievement = achievement(forIdentifier: identifier) {\n        let storedProgress\
    \ = achievement.percentComplete\n        guard percentComplete > storedProgress\
    \ else {\n            return\n        }\n        achievement.percentComplete =\
    \ percentComplete\n        GKAchievement.report([achievement], withCompletionHandler:\
    \ { [weak self] error in\n            if let error = error {\n               \
    \ print(\"向成就报告时发生错误。数据将保存到 UserDefaults: \\(error.localizedDescription)\")\n\
    \                self?.storeAchievementToSubmitLater(achievement)\n          \
    \  }\n            if percentComplete >= 100 {\n                GKAchievementDescription.loadAchievementDescriptions(completionHandler:\
    \ { [weak self] achievementDescriptions, error in\n                    if let\
    \ error = error {\n                        print(\"加载成就描述时发生错误: \\(error.localizedDescription)\"\
    )\n                    }\n                    achievementDescriptions?.forEach{\
    \ achievementDescription in\n                        if achievement.identifier\
    \ == achievementDescription.identifier {\n                            self?.gameDelegate?.achievementEarned(achievementDescription)\n\
    \                        }\n                    }\n                })\n      \
    \      }\n            DispatchQueue.main.async { [weak self] in\n            \
    \    self?.gameDelegate?.achievementSubmitted(achievement, error: error)\n   \
    \         }\n        })\n    }\n}\n```\n\n现在来看看我们添加的 `submitAchievement:percentComplete:`\
    \ 函数。这里有两个主要的 if/else 块。第一个块在 `earnedAchievementCache` 为 `nil` 时执行，这段代码第一次运行时总会是这种情况。现在让我们来看看这段代码。\n\
    \n```\nGKAchievement.loadAchievements(completionHandler: { achievements, error\
    \ in\n    if error == nil {\n        var tempCache: [String: GKAchievement] =\
    \ [:]\n        for achievement in achievements ?? [] {\n            tempCache[achievement.identifier]\
    \ = achievement\n        }\n        self.earnedAchievementCache = tempCache as?\
    \ NSMutableDictionary\n        self.submitAchievement(identifier, percentComplete:\
    \ percentComplete)\n    } else {\n        DispatchQueue.main.async {\n       \
    \     self.delegate?.achievementSubmitted?(nil, error: error)\n        }\n   \
    \ }\n})\n```\n\n> **重要提示：** 由 `loadAchievementsWithCompletionHandler` 返回的数组不会显示任何尚未提交\
    \ `percentageCompleted` 的成就。\n\n这段代码片段的主要功能是将成就列表加载到 `earnedAchievementCache`\
    \ 中。我们在 `GKAchievement` 上调用 `loadAchievementsWithCompletionHandler`。此调用会返回一个数组，其中包含在\
    \ App Store Connect 中设置的所有成就。然后，我们将 `GKAchievement` 对象存储到字典中，以标识符作为键。此时，代码会再次调用\
    \ `submitAchievement:percentComplete`。这次，`earnedAchievementCache` 不为 `nil`，因此会执行第二段代码。如果在此过程中遇到错误，我们将使用标准的委托回调将错误发送回我们的委托。\n\
    \n你需要为 `GameCenterManager` 添加新的函数来处理此委托回调；现在是添加的好时机。将以下可选协议添加到头文件中：\n\n```\nfunc\
    \ achievementSubmitted(_ achievement: GKAchievement?, error: Error?)\n```\n\n\
    现在让我们来看第二段代码。以下代码成功执行后，会向 Game Center 服务器提交成就：\n"
- fmt: "```\nvar achievement = earnedAchievementCache?[identifier ?? \"\"] as? GKAchievement\n\
    if achievement != nil {\nif ((achievement?.percentComplete ?? 0.0) >= 100.0) ||\
    \ ((achievement?.percentComplete ?? 0.0) >= percentComplete) {\nachievement =\
    \ nil\n}\nachievement?.percentComplete = percentComplete\n} else {\nachievement\
    \ = GKAchievement(identifier: identifier ?? \"\")\nachievement?.percentComplete\
    \ = percentComplete\nearnedAchievementCache?.setValue(achievement, forKey: achievement?.identifier\
    \ ?? \"\")\n}\nif let achievement = achievement {\nGKAchievement.report([achievement],\
    \ withCompletionHandler: { error in\nif error != nil {\nself.storeAchievement(toSubmitLater:\
    \ achievement)\n}\nif percentComplete >= 100 {\nGKAchievement.loadAchievements(completionHandler:\
    \ { achievements, error in\nfor achievementDescription in achievements ?? [] {\n\
    if achievement.identifier == self.from(achievementDescription).identifier {\n\
    self.delegate?.achievementEarned?(self.from(achievementDescription))\n}\n}\n})\n\
    }\nDispatchQueue.main.async {\nself.delegate?.achievementSubmitted?(achievement,\
    \ error: error)\n}\n})\n}\n```\n\nThe first line of code retrieves a `GKAchievement`\
    \ object from our `earnedAchievementCache`, based on the identifier string that\
    \ is passed into this function. If the achievement is completed or the reported\
    \ progress is equal to what we have on the Game Center server, we set the achievement\
    \ to `nil`. This prevents us from tying up networking time by submitting progress\
    \ on something that will be ignored. We also set the property for `percentComplete`\
    \ on the `GKAchievement` object to the double that was passed into this method.\n\
    \nIn the event that the achievement doesn't exist in the cache, we create a new\
    \ instance of it. In this event, we also want to add it to our local achievement\
    \ cache.\n\nThe final step, after doing a nil check, is to submit the achievement.\
    \ We call `reportAchievementWithCompletionHandler` on the achievement object.\
    \ We then pass the results back to our delegate using our existing protocol.\n\
    \n> **Note**  \n> All achievements have a `percentageComplete` regardless of whether\
    \ they allow a percentage to be completed at a time. If your achievement can only\
    \ be completely earned or unearned, then you will want to pass `100` for earned.\n\
    \nThe last thing that we need to do in this section is implement our protocol\
    \ method in `UFOGameViewController`. Add the following method to the implementation\
    \ of that file; all we will worry about right now is printing the error and success\
    \ information to the console.\n\n```\nfunc achievementSubmitted(_ achievement:\
    \ GKAchievement?, error: Error?) {\nif let error = error {\nprint(\"There was\
    \ an error in reporting the achievement: \\(error.localizedDescription)\")\n}\
    \ else {\nprint(\"achievement submitted\")\n}\n}\n```\n\n## Resetting Achievements\n\
    \nThere are circumstances when you might want to reset user achievements. Besides\
    \ being extremely helpful in debugging, you might find it useful to provide users\
    \ with an option to reset. You might want to add a prestige mode or give the users\
    \ a chance to start your game over from the beginning.\n\n```\nfunc resetAchievements()\n\
    {\nGKAchievement.resetAchievementsWithCompletionHandler() {(error) in\nself.lastError\
    \ = error\n}\n}\n```\n\n> **Important**  \n> Don't forget to remove the cached\
    \ information you have stored on the achievements, or you will not be able to\
    \ progress the reset achievements until the app is restarted.\n\n## Adding Achievement\
    \ Hooks\n\nThe biggest challenge in implementing achievements into your app is\
    \ adding the hooks to activate and progress those achievements into your normal\
    \ routines. In my personal experience, I have found that adding these hooks when\
    \ the program is almost finished is easier than trying to add them in as you go.\
    \ In this section, I will provide a number of examples of how to tie in achievements;\
    \ your own app may differ significantly, but you should be able to easily adapt\
    \ the examples to suit your needs.\n\nTo make achievements easier to retrieve\
    \ progress details, we first add a few convenience functions to our `GameCenterManager`\
    \ class. This is the first method we will use to populate the local achievement\
    \ cache.\n\n```\nfunc populateAchievementCache(_ completion: (() -> Void)? = nil)\
    \ {\nguard earnedAchievementCache == nil else {\ncompletion?()\nreturn\n}\nGKAchievement.loadAchievements\
    \ { [weak self] achievements, error in\nif let error = error {\nprint(\"An error\
    \ occurred while loading achievements: \\(error.localizedDescription)\")\n} else\
    \ {\nif let achievements = achievements {\nself?.earnedAchievementCache = achievements.reduce(into:\
    \ [:], { result, achievement in\nresult[achievement.identifier] = achievement\n\
    })\n} else {\nself?.earnedAchievementCache = [:]\n}\ncompletion?()\n}\n}\n}\n\
    ```\n\nThe preceding function is very similar to the cache population code in\
    \ the submit achievement progress method previewed in the previous section. We\
    \ will need to populate the local cache in order to work with the other two convenience\
    \ functions. We will want to call the `populateAchievementCache` as soon as we\
    \ can after authenticating. I have added a call to it from the local player did\
    \ authenticate function in `GameCenterManager`. Add the following function as\
    \ well:\n\n```\nfunc percentageCompleteOfAchievement(withIdentifier identifier:\
    \ String?) -> Double {\nif GKLocalPlayer.local.isAuthenticated == false {\nreturn\
    \ -1\n}\nif earnedAchievementCache == nil {\nprint(\"Unable to determine achievement\
    \ progress, local cache is empty\")\n} else {\nlet achievement = earnedAchievementCache?[identifier\
    \ ?? \"\"]\nif let achievement = achievement {\nreturn achievement.percentComplete\n\
    } else {\nreturn 0\n}\n}\nreturn -1\n}\n```\n\nThe preceding function returns\
