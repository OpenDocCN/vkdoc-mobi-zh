  raw: '### Sending Data


    We will work with two primary functions to send data to other connected peers.
    One will handle sending data to every peer we are connected to, and the other
    will send data only to specified peers, such as teammates or other groups of players.
    First, add the following two methods to our GameCenterManager class:


    ```

    func sendStringToAllPeers(_ dataString: String, reliable: Bool)

    func sendString(_ dataString: String, toPeers peers: [String] reliable: Bool)

    ```


    We will use these functions to send strings back and forth, but you can add additional
    methods to accept any type of input that you want to work with for your particular
    game. Keep in mind that everything will need to be converted to data along the
    way. You might also notice that the first function is the same method we called
    previously from our generateAndSendHostNumber.


    Tip


    It is a good idea to implement functions to handle arrays and dictionaries if
    you plan on building a reusable Game Center class. These are both very common
    data types when working with networking messages.


    Before we can really begin to send data back and forth, we need to know the GKMatch
    that was created for our multiplayer game. To do this, we create a new property
    in the GameCenterManager class. We name it matchOrSession and set it to an ID
    type. We need to set this property before we begin a new multiplayer game, after
    we have been returned either a new GKSession or GKMatch. Let’s first take a look
    at sending data to all peers. The new method is posted as follows. After you have
    examined it, we will discuss it in further detail:


    ```

    func sendStringToAllPeers(_ dataString: String, reliable: Bool) {

    guard matchOrSession != nil else {

    print("Game Center Manager matchOrSession property was not set, this needs to
    be set with the GKMatch or GKSession before sending or receiving data")

    return

    }

    guard let dataToSend = dataString.data(using: .utf8) else {

    print("Game Center Manager dataString could not be converted to Data.")

    return

    }

    var sendError: Error?

    if let session = matchOrSession as? MCSession {

    let peers = session.connectedPeers

    let mode: MCSessionSendDataMode = reliable ? .reliable : .unreliable

    do {

    try session.send(dataToSend, toPeers: peers, with: mode)

    } catch {

    sendError = error

    }

    } else if let match = matchOrSession as? GKMatch {

    let mode: GKMatch.SendDataMode = reliable ? .reliable : .unreliable

    do {

    try match.sendData(toAllPlayers: dataToSend, with: mode)

    } catch {

    sendError = error

    }

    } else {

    print("Game Center Manager matchOrSession was not a GKMatch or a GKSession, we
    are unable to send data.")

    }

    if let sendError = sendError {

    print("An error occurred while sending data: \(sendError.localizedDescription)")

    }

    }

    ```


    We need to make sure that we have properly set the matchOrSession property. If
    we haven’t, we will not be able to continue, as we will be using this object to
    send data. After we have ensured that we have the proper information to continue,
    we then transform our NSString to an NSData object. This encodes the string into
    a format that is safe for sending over the network. We also need to set the reliability
    mode, as discussed in Chapter [7](#216283_2_En_7_Chapter.xhtml).


    Now that we have everything in place to actually send data, we first detect whether
    we are working with a GKMatch from a Game Center–type connection or a GKSession
    from a Peer Picker–type connection. All that is left to do is send the data using
    the GameKit APIs.


    Now is a good time to look at how we will selectively send data only to certain
    peers. We can build off the example we already have for sending data to all peers.
    Let’s take a look at our sendString function:


    ```

    func sendString(_ dataString: String, toPeers peers: [Any], reliable: Bool) {

    guard matchOrSession != nil else {

    print("Game Center Manager matchOrSession property was not set, this needs to
    be set with the GKMatch or GKSession before sending or receiving data")

    return

    }

    guard let dataToSend = dataString.data(using: .utf8) else {

    print("Game Center Manager dataString could not be converted to Data.")

    return

    }

    var sendError: Error?

    if let session = matchOrSession as? MCSession, let peerIDs = peers as? [MCPeerID]
    {

    let mode: MCSessionSendDataMode = reliable ? .reliable : .unreliable

    do {

    try session.send(dataToSend, toPeers: peerIDs, with: mode)

    } catch {

    sendError = error

    }

    } else if let match = matchOrSession as? GKMatch, let players = peers as? [GKPlayer]
    {

    let mode: GKMatch.SendDataMode = reliable ? .reliable : .unreliable

    do {

    try match.send(dataToSend, to: players, dataMode: mode)

    } catch {

    sendError = error

    }

    } else {

    print("Game Center Manager matchOrSession was not a GKMatch or a GKSession, or
    peers was not the correct type of array, we are unable to send data.")

    }

    if let sendError = sendError {

    print("An error occurred while sending data: \(sendError.localizedDescription)")

    }

    }

    ```


    This method is very similar to the method for sending data to all peers. The main
    difference is that we use a new API call and feed in an array of peer IDs or players.
    You can, of course, change these methods to accept more than a string when sending
    data, but for the simplicity of our test game, a string is all we need.


    This concludes everything you need to know about sending data between two or more
    iOS, Mac, or Apple TV devices. In the next section, we will look at how to receive
    and parse the data we get from another peer.'
  trans: "\n### 发送数据\n\n我们将使用两个主要函数来向其他已连接的节点发送数据。一个函数用于向所有已连接的节点发送数据，另一个则仅向特定节点（例如队友或其他玩家组）发送数据。首先，在我们的`GameCenterManager`类中添加以下两个方法：\n\
    \n```\nfunc sendStringToAllPeers(_ dataString: String, reliable: Bool)\nfunc sendString(_\
    \ dataString: String, toPeers peers: [String] reliable: Bool)\n```\n\n我们将使用这些函数来来回回地发送字符串，但你可以添加额外的方法，以接受你针对特定游戏想使用的任何输入类型。请记住，所有内容在传输过程中都需要转换为数据。你或许还会注意到，第一个函数与我们之前从`generateAndSendHostNumber`调用的方法相同。\n\
    \n**提示**\n\n如果你计划构建一个可复用的`Game Center`类，最好实现用于处理数组和字典的函数。在处理网络消息时，这两种都是非常常见的数据类型。\n\
    \n在真正开始来回发送数据之前，我们需要知道为多人游戏创建的`GKMatch`。为此，我们在`GameCenterManager`类中创建一个新的属性。我们将其命名为`matchOrSession`，并将其设置为一个\
    \ ID 类型。在开始新的多人游戏之前，在获取到新的`GKSession`或`GKMatch`之后，我们需要设置此属性。首先，让我们看看如何向所有节点发送数据。新方法如下所示。在你查看完它之后，我们将进行更详细的讨论：\n\
    \n```\nfunc sendStringToAllPeers(_ dataString: String, reliable: Bool) {\n   \
    \ guard matchOrSession != nil else {\n        print(\"Game Center Manager 的 matchOrSession\
    \ 属性尚未设置，在发送或接收数据前，需要使用 GKMatch 或 GKSession 进行设置\")\n        return\n    }\n \
    \   guard let dataToSend = dataString.data(using: .utf8) else {\n        print(\"\
    Game Center Manager 的 dataString 无法转换为 Data。\")\n        return\n    }\n    var\
    \ sendError: Error?\n    if let session = matchOrSession as? MCSession {\n   \
    \     let peers = session.connectedPeers\n        let mode: MCSessionSendDataMode\
    \ = reliable ? .reliable : .unreliable\n        do {\n            try session.send(dataToSend,\
    \ toPeers: peers, with: mode)\n        } catch {\n            sendError = error\n\
    \        }\n    } else if let match = matchOrSession as? GKMatch {\n        let\
    \ mode: GKMatch.SendDataMode = reliable ? .reliable : .unreliable\n        do\
    \ {\n            try match.sendData(toAllPlayers: dataToSend, with: mode)\n  \
    \      } catch {\n            sendError = error\n        }\n    } else {\n   \
    \     print(\"Game Center Manager 的 matchOrSession 既不是 GKMatch 也不是 GKSession，我们无法发送数据。\"\
    )\n    }\n    if let sendError = sendError {\n        print(\"发送数据时发生错误：\\(sendError.localizedDescription)\"\
    )\n    }\n}\n```\n\n我们需要确保已正确设置`matchOrSession`属性。如果没有设置，我们将无法继续，因为我们将使用此对象来发送数据。确保我们拥有正确的信息以继续之后，我们将`NSString`转换为`NSData`对象。这会将字符串编码为适合通过网络发送的格式。我们还需要设置可靠性模式，正如第\
    \ 7 章中所讨论的那样。\n\n现在一切就绪，可以实际发送数据了。我们首先检测当前处理的是来自 Game Center 类型连接的`GKMatch`，还是来自\
    \ Peer Picker 类型连接的`GKSession`。剩下的就是使用`GameKit` API 发送数据。\n\n现在我们最好来看看如何有选择地向特定节点发送数据。我们可以基于已构建的向所有节点发送数据的示例进行扩展。让我们看看`sendString`函数：\n\
    \n```\nfunc sendString(_ dataString: String, toPeers peers: [Any], reliable: Bool)\
    \ {\n    guard matchOrSession != nil else {\n        print(\"Game Center Manager\
    \ 的 matchOrSession 属性尚未设置，在发送或接收数据前，需要使用 GKMatch 或 GKSession 进行设置\")\n       \
    \ return\n    }\n    guard let dataToSend = dataString.data(using: .utf8) else\
    \ {\n        print(\"Game Center Manager 的 dataString 无法转换为 Data。\")\n       \
    \ return\n    }\n    var sendError: Error?\n    if let session = matchOrSession\
    \ as? MCSession, let peerIDs = peers as? [MCPeerID] {\n        let mode: MCSessionSendDataMode\
    \ = reliable ? .reliable : .unreliable\n        do {\n            try session.send(dataToSend,\
    \ toPeers: peerIDs, with: mode)\n        } catch {\n            sendError = error\n\
    \        }\n    } else if let match = matchOrSession as? GKMatch, let players\
    \ = peers as? [GKPlayer] {\n        let mode: GKMatch.SendDataMode = reliable\
    \ ? .reliable : .unreliable\n        do {\n            try match.send(dataToSend,\
    \ to: players, dataMode: mode)\n        } catch {\n            sendError = error\n\
    \        }\n    } else {\n        print(\"Game Center Manager 的 matchOrSession\
    \ 既不是 GKMatch 也不是 GKSession，或者 peers 不是正确的数组类型，我们无法发送数据。\")\n    }\n    if let\
    \ sendError = sendError {\n        print(\"发送数据时发生错误：\\(sendError.localizedDescription)\"\
    )\n    }\n}\n```\n\n此方法与向所有节点发送数据的方法非常相似。主要区别在于我们使用了一个新的 API 调用，并传入了一个节点 ID 或玩家的数组。当然，你可以修改这些方法，使其在发送数据时接受字符串以外的内容，但为了我们测试游戏的简便性，仅用字符串就足够了。\n\
    \n以上内容包含了你在两个或更多 iOS、Mac 或 Apple TV 设备之间发送数据所需了解的全部知识。在下一节中，我们将探讨如何接收并解析从另一个节点获取的数据。\n"
- fmt: "### Receiving Data\n\n`GKMatch` has its own system for receiving delegate\
    \ callbacks for incoming data. Game Center uses the same delegate that we used\
    \ for our invitation handler in Chapter [5](#216283_2_En_5_Chapter.xhtml). We\
    \ will begin by modifying that existing function.\n\nThe first step in setting\
    \ up our app to receive data is to set the receive data delegate to our `GameCenterManager`\
    \ class. We will use the `GameCenterManager` class as a filter point for passing\
    \ data back into our game. While you could easily receive data in your Game Controller\
    \ itself, if we pipe everything throughout `GameCenterManager`, it makes it much\
    \ easier to plug this class into future apps.\n\nModify both `matchmakerViewController`\
    \ of `UFOViewController.swift` to match the following:\n\n```\nfunc matchmakerViewController(_\
    \ viewController: GKMatchmakerViewController, didFind match: GKMatch) {\n    dismiss(animated:\
    \ true, completion: nil)\n    gcManager?.matchOrSession = .match(match)\n    let\
    \ gameVC = UFOGameViewController()\n    gameVC.gcManager = gcManager\n    gameVC.gameIsMultiplayer\
    \ = true\n    gameVC.peerMatch = match\n    navigationController?.pushViewController(gameVC,\
    \ animated: true)\n}\n```\n\nThe important change to focus on in the preceding\
    \ function is setting the delegate to handle the incoming data request to our\
    \ `GameCenterManager` class. This allows us to handle all incoming data in one\
    \ centralized place; from there, we can relay it out to the relevant sections\
    \ of the app.\n\nNext, you need to add the following function to your `GameCenterManager`\
    \ class. This new function handles incoming data from Game Center. This function\
    \ assumes we will be working with only incoming strings because that is the design\
    \ we have chosen when dealing with sending data in our game. You can easily adapt\
    \ this method to handle receiving other types of objects. In addition, we will\
    \ expand this new function to handle game-specific data. You can also further\
    \ adapt this setup to use a more complex and intelligent system of data parsing,\
    \ but it will be more than suitable for the needs of UFOs.\n\n```\nfunc receivedData(_\
    \ dataDictionary: [AnyHashable : Any]?) {\n    guard let dataDictionary = dataDictionary\
    \ as? [String: String] else { return }\n}\n```\n\n**Tip:** You can use the context\
    \ property to pass any data to the `received` delegate method.\n\nFurther modify\
    \ the `receivedData` function to handle all the possible types of data that will\
    \ be seen in our game:\n\n```\nfunc receivedData(_ dataDictionary: [AnyHashable\
    \ : Any]?) {\n    guard let dataDictionary = dataDictionary as? [String: String]\
    \ else { return }\n    determineHost(dataDictionary)\n}\n```\n\nAll that is left\
    \ now is to implement our function to determine which player is the host; add\
    \ a new function as seen in the following code snippet:\n\n```\nfunc determineHost(_\
    \ dataDictionary: [String : String]?) {\n    if Double(dataString ?? \"\") ??\
    \ 0.0 == randomHostNumber {\n        print(\"Host numbers are equal, we need to\
    \ reroll them\")\n        generateAndSendHostNumber()\n    } else if Double(dataString\
    \ ?? \"\") ?? 0.0 > randomHostNumber {\n        isHost = true\n        for _ in\
    \ 0..<5 {\n            spawnCow()\n        }\n        updateCowPaths()\n    }\
    \ else if Double(dataString ?? \"\") ?? 0.0 < randomHostNumber {\n        isHost\
    \ = false\n    }\n}\n```\n\nIf you run the game on two devices now, you can see\
    \ that each log reflects whether the device has been designated a host or whether\
    \ the other device is the host. The `receivedData` function is very flawed, though,\
    \ because it only works with the host data message. In the next section, we will\
    \ refine this function to accept not only the host message but also input for\
    \ player movements, cow movements, and other game actions.\n\nYou now have all\
    \ the basic skills required to send data between two different iOS, Mac, or Apple\
    \ TV devices, as well as receive and parse that data and have your system react\
    \ to it. If you want to experiment with working with these calls in practice,\
    \ the next section will walk you through several examples of sending and receiving\
    \ data in our UFOs game.\n\n## Putting Everything Together\n\nIn the last section,\
    \ we learned how to receive the data that has been sent to a device. In this section,\
    \ we walk through the exercise of actually using received data in a useful way\
    \ for our game. We add a second player, allow movement information to be sent\
    \ over the network, sync up state data across both devices (such as cow movement),\
    \ track each player’s score, and complete various other required overhead tasks\
    \ associated with our particular game.\n\n### Selecting the Host\n\nLet’s start\
    \ by improving the host selection logic that was implemented in the previous section.\
    \ Right now, any data that we receive is assumed to be the host number. Because\
    \ most of the data we receive will not be the host number, we need to find a way\
    \ to filter that data to where we can parse it. Modify the `generateAndSendHostNumber`\
    \ function to match the following code block:\n\n```\nfunc generateAndSendHostNumber()\
    \ {\n    randomHostNumber = Double(arc4random())\n    let randomNumberString =\
    \ \"$Host:\\(randomHostNumber)\"\n    gcManager?.sendStringToAllPeers(randomNumberString,\
    \ reliable: true)\n}\n```\n\nAs you can see, we now add an identifier prefix to\
    \ the message that we will send. I have chosen for this example the prefix of\
    \ `$Host:`, but you can use whatever system you want. In addition, we need to\
    \ modify the `receivedData` callback to support the new format.\n\n```\nfunc receivedData(_\
    \ dataDictionary: [AnyHashable : Any]?) {\n    guard let dataDictionary = dataDictionary\
    \ as? [String: String] else { return }\n    if dataDictionary[\"data\"]?.hasPrefix(\"\
    $Host:\") ?? false {\n        determineHost(dataDictionary)\n    } else {\n  \
    \      print(\"Unable to determine type of message: \\(dataDictionary)\")\n  \
    \  }\n}\n```\n\nIf we determine that the message is a host message, we send it\
    \ to a new helper function called `determineHost` to determine which device is\
    \ the host. If we are unable to determine the type of message, we print a warning\
    \ message to the console, which will help us debug later down the road. We need\
    \ to move the old code from `receivedData` into `determineHost`. In addition to\
    \ moving the code, we need to strip off the prefix. Although stripping off the\
    \ prefix has a lot of overhead, it is the easiest way to accomplish this task.\
    \ In more complex apps, you might need to design a more robust message system.\n\
    \n```\nfunc determineHost(_ dataDictionary: [String : String]?) {\n    let dataString\
    \ = dataDictionary?[\"data\"]?.replacingOccurrences(of: \"$Host:\", with: \"\"\
    )\n    if Double(dataString ?? \"\") ?? 0.0 == randomHostNumber {\n        print(\"\
    Host numbers are equal, we need to reroll them\")\n        generateAndSendHostNumber()\n\
    \    } else if Double(dataString ?? \"\") ?? 0.0 > randomHostNumber {\n      \
    \  isHost = true\n    } else if Double(dataString ?? \"\") ?? 0.0 < randomHostNumber\
    \ {\n        isHost = false\n    }\n}\n```\n\nNow we can still determine who the\
    \ host is, but we have opened the door to be able to process more than only this\
    \ type of data.\n\nThe next step will be transmitting and displaying our peer’s\
    \ UFO into our game. In this chapter, I have added two new images to the project,\
    \ `EnemySaucer1.png` and `EnemySaucer2.png`. These are the same as the originals\
    \ but with a different color scheme applied to them. We will use this new artwork\
    \ to display the opponent’s spacecraft."
