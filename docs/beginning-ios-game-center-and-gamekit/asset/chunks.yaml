  trans: '

    ## 总结


    本章介绍了匹配与邀请的概念。我们讨论了为你的 iOS、Mac 或 Apple TV 应用或游戏添加多人模式带来的巨大优势，以及在此过程中可能遇到的一些障碍。我们探索了从展示标准
    Apple 界面到使用玩家群组和玩家属性实现高度自定义匹配的整个匹配流程。我们回顾了如何在各种可能场景下处理邀请，以及如何查询玩家活动。最后，我们发现了如何通过实现自己的服务器来消除
    Game Center 的一些限制。我们还扩展了可复用的 Game Center 管理器，使其能够处理匹配、邀请及所需的开销，从而让你能快速为应用添加多人模式功能。


    在本章中，我们深入探讨了如何创建比赛并用玩家填充比赛。在接下来的章节中，我们不仅会学习玩家之间如何通信，还会探索寻找可通信玩家的新方法。下一章将介绍如何为你的游戏或应用设计网络环境。


    # 6. 网络设计概述


    在前几章中，我们学习了如何通过使用 Game Center 和 GameKit 的多种方法来查找玩家并建立连接。在本章中，我们将探讨如何为现代电脑游戏设计网络体验。本章的撰写和布局与你之前阅读的章节略有不同。主要区别在于，本章不涉及相关源代码，我们仅会简要提及
    GameKit 网络主题本身。本章将从学术角度聚焦于网络设计的概念，而非实际实现网络本身。在下一章中，你将了解如何将所有内容整合起来，让玩家之间开始相互通信。


    虽然完全可以（并且也经常发生）不经过任何计划或思考就直接开始编写网络逻辑，但这可能并非一个好主意。毕竟，你不会在事先不规划好逻辑如何运行的情况下就开始编写一个新应用或游戏。网络设计是一个复杂的主题，你应该有计划地进行；否则，你可能会在投入大量工作后发现自己需要从头重写整个系统。你肯定不希望因为所采用的方法限制了未来扩展的可能性而陷入困境。就像软件开发一样，你不应该在第一天就急着写代码。你应该先做一些白板推演，感受一下项目的需求。


    以一款名为 Clan Lord 的桌面角色扮演游戏为例，它于 20 世纪 90 年代末期为 Mac 编写。Clan Lord 拥有一个非常忠实的粉丝群，使得这款游戏至今仍保持活跃。然而，在游戏最初编写时，许多与网络相关的问题似乎并未为这样一款二十多年后仍会被游玩的游戏做充分考量。


    Clan Lord 对其所有网络调用都采用逐帧同步。这意味着每一帧，玩家屏幕上的每个可见元素都必须被传输。当游戏规模小、用户基数小、功能复杂度有限时，这种方法能良好运作。然而，在设计软件时，你不能对未来抱有限制性的愿景。始终要未雨绸缪，规划最好的情况，或者，取决于你的视角，规划最坏的情况。在设计网络时，你必须考虑到六个月、一年甚至十年后你希望你的游戏或应用做什么。软件远超预期寿命并持续运行远超最初开发者设想的年代，这种情况屡见不鲜；只需看看“千年虫”问题，我们就能看到这一点。每个开发者都认为很快会有更好的东西来取代他们正在做的工作；但通常他们都错了，产品会长期存续下去，远远超过让它们继续运行的实际意义。


    Clan Lord 现在饱受根深蒂固的问题困扰，例如每秒五帧的渲染引擎，这是因为在普通家庭网络上，每秒无法同步超过五帧的完整数据。如果在项目启动之初就在客户端中实现一些逻辑，这原本是可以避免的；例如，将对象的位置及其移动时间告知客户端，而不是每帧都完全同步所有内容，效率会高得多。此外，由于玩家动作必须同步回服务器，玩家移动被限制在每秒四到五帧，这使得对事件做出反应变得困难。这原本也可以通过使用本章稍后讨论的预测算法来避免，该算法用于确定玩家在移动过程中最终会到达的位置。


    Clan Lord 是一个例子，它比计划中更受欢迎（或者说至少拥有一个更忠诚的粉丝群），并且生命周期远超所有人的预期。遗憾的是，当这种情况发生时，你就会受到项目启动之初所定下的愿景和设计的限制。以后撤销某些东西比一开始就做好要困难得多。在设计你的网络时，请花时间仔细并有目的地进行，因为它可能会在很长一段时间内困扰你和你开发的应用程序。


    ## 三种网络类型


    尽管存在多种不同的网络设计类型，但在设计网络基础设施时，你可以实现三种实用且主流的网络。选择一种主要的网络类型是一个好的起点，因为它将引导你进入设计过程的下一步。


    我们将重点讨论这三种主要的网络设计类型，但请记住，还有数十种其他知名的网络配置，我们将在本节中简要提及其中一些。我们将在本章中详细讨论的三种网络类型是：点对点网络、客户端-主机网络和环形网络。

    '
- fmt: '# Peer-to-Peer Network


    A peer-to-peer network (see Figure [6-1](#216283_2_En_6_Chapter.xhtml#Fig1)) is
    the most common network that you will see on the iOS/Mac platform. No device is
    treated any differently than any other device, and each device is in charge of
    sending and receiving data to all the other peers it wishes to communicate with.
    While this type of network may look complicated, it is one of the most simple
    and straightforward approaches to joining together multiple devices in communication.


    ![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig1_HTML.jpg](images/216283_2_En_6_Chapter/216283_2_En_6_Fig1_HTML.jpg)


    Figure 6-1: A visual representation of a peer-to-peer network using six iOS devices


    A peer-to-peer network is commonly used when dealing with Game Center networking
    because it is the easiest to implement on the platform. While this approach has
    the benefit of being extremely easy to set up, it has an equal number of weaknesses.
    Primarily, it can cause a lot of redundant overhead. Each peer needs to inform
    every other peer about its actions. In a six-way network like the one shown in
    Figure [6-1](#216283_2_En_6_Chapter.xhtml#Fig1), this means that each device needs
    to send out five messages every time it wants to update the game state. In addition,
    if you are implementing a system in which each peer confirms a successful message,
    you will also need to receive five messages to confirm each event.


    Another disadvantage of a peer-to-peer network is that it can become very confusing
    to work with a large number of peers. As you can see from Figure [6-1](#216283_2_En_6_Chapter.xhtml#Fig1),
    things can get messy quickly. Unlike the other primary types of networks that
    we will discuss in this section, the peer-to-peer approach is the only one without
    a clear flow. Each peer can message any other peer, by definition. This also means
    that you have to keep track of what every peer needs to know. Under most circumstances,
    this is a perfectly acceptable approach. However, when you begin to deal with
    more complex types of networks and information that needs to be sent and received,
    this configuration might no longer be ideal.


    In addition, no one device is in control of the state of the game. If there are
    artificial intelligence components, then you will need to figure out a system
    that will allow them to stay in sync between all the devices.


    ## Client-to-Host Network


    A client-to-host network designates one device to be the host, or server if you
    prefer that terminology. This device is responsible for sending information to
    all the connected clients. The clients never speak to each other; they speak only
    to the host who then relays the required information back to the other clients.
    An example of what a client-to-host setup looks like is shown in Figure [6-2](#216283_2_En_6_Chapter.xhtml#Fig2).


    ![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig2_HTML.jpg](images/216283_2_En_6_Chapter/216283_2_En_6_Fig2_HTML.jpg)


    Figure 6-2: A visual representation of a client-to-host network using five iOS
    devices


    A client-server network simplifies the flow of data. Each peer or client only
    needs to worry about itself and the host; they do not need to be aware of the
    other devices that might exist on the network. The benefit of this type of network
    is that one device keeps everything in sync and handles the flow of information;
    this makes it a very secure network (in the sense of anti-cheating). Cheating,
    however, is not a large concern on the iOS platform because it’s a sandboxed system
    to begin with; the state of the Mac is a little more open, but often it is not
    a major concern until a game becomes very successful.


    There are other benefits to this system as well, such as the fact that only one
    device needs to worry about the state of the network, and that sole device is
    in charge of the behavior of the network. This type of network simplifies events
    such as connections, disconnections, transmission errors, and other state changes
    such as computer-controlled objects like artificial intelligence. However, this
    same setup could be troublesome on the iOS platform; if the host device has too
    much information to process, that device could run slower or use more battery.
    This approach also requires two separate logic handlers, one for the client and
    one for the host. This type of system becomes a dedicated server system in larger
    environments when one player is no longer needed to be the host.


    ## Ring Network


    A ring network (see Figure [6-3](#216283_2_En_6_Chapter.xhtml#Fig3)) has no host
    and no clients. It works similarly to a peer-to-peer network, but a peer is in
    charge of communicating with only one designated peer and will receive information
    from only another separately defined peer. The information flows through a group
    of devices in the shape of a ring, hence the name.


    This type of network isn’t very common on the iOS platform, as there is not a
    lot of argument for the redundancy that it typically provides for disconnected
    peers. Apple has done a lot of the groundwork to ensure that networks remain active
    and stable, without the need for the developer to spend additional design hours
    ensuring that there won’t be instances where peers lose contact with other peers
    that are currently joined together. There are times, however, where you might
    find this type of configuration useful when designing your network on the iOS
    platform. Keep in mind as you add additional clients to a ring network that the
    time it takes for information to complete a circuit of the ring increases and
    can be especially bogged down by one or more laggy devices.


    ![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig3_HTML.jpg](images/216283_2_En_6_Chapter/216283_2_En_6_Fig3_HTML.jpg)


    Figure 6-3: A visual representation of a ring network using six iOS devices. Notice
    how much simpler this diagram appears than the peer-to-peer network shown in Figure
    [6-1](#216283_2_En_6_Chapter.xhtml#Fig1)'
