    ## Resetting Achievements


    There are circumstances when you might want to reset user achievements. Besides
    being extremely helpful in debugging, you might find it useful to provide users
    with an option to reset. You might want to add a prestige mode or give the users
    a chance to start your game over from the beginning.


    ```

    func resetAchievements()

    {

    GKAchievement.resetAchievementsWithCompletionHandler() {(error) in

    self.lastError = error

    }

    }

    ```


    Important


    Don’t forget to remove the cached information you have stored on the achievements,
    or you will not be able to progress the reset achievements until the app is restarted.


