    ## Local Player Score


    There are oftentimes that you will want to know the local players’ score on a
    given leaderboard. Maybe you want to display their scores at the top of your leaderboard,
    or perhaps you want to fetch a leaderboard that shows other player scores that
    are close to your local player’s score. You can even want to post an action in
    the game when the user has beaten their own previous high score.


