    The biggest challenge in implementing achievements into your app is adding the
    hooks to activate and progress those achievements into your normal routines. In
    my personal experience, I have found that adding these hooks when the program
    is almost finished is easier than trying to add them in as you go. In this section,
    I will provide a number of examples of how to tie in achievements; your own app
    may differ significantly, but you should be able to easily adapt the examples
    to suit your needs.


