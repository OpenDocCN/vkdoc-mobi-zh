    ```


    ## A Better Approach


    In the section “Posting a Score,” earlier in this chapter, we discovered how to
    post new scores to Game Center. Our methodology, while simple, was not the best
    approach from a user-interaction standpoint. It is now time to refactor the posting
    new score code to improve usability. This approach is more complex but delivers
    better performance and has less of an impact on the user.


    The first thing we need to do is move our scoreReported function from UFOGameViewController
    to UFOViewController. We also want to modify the exit action in the UFOViewController
    to report the score back to Game Center.


    This allows us to exit the game without waiting for a network callback from the
    Game Center delegate.


    ## Game Center Groups


    A more recent addition to Game Center functionality allowed for Game Center Groups,
    or more succulently sharing a leaderboard or achievement across multiple different
    apps. Some caveats exist and need to be considered before moving to a Game Center
    Group; most notably all the apps must exist under the state App Store Connect
    account; there is no way to set up a Game Center Group between apps under different
    accounts.


    In order to set up a new Game Center Group, you must first launch the Game Center
    area of the App Store Connect portal for the first app you want to add to the
    group. There is a small section to set up a new group; see Figure [3-13](#216283_2_En_3_Chapter.xhtml#Fig13).


    Important


    If your app has an existing leaderboard, their leaderboard IDs will be listed
    with a “grp.” prefix. You can keep the ID the same or create a new one when setting
    them up.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig13_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig13_HTML.jpg)


    Figure 3-13


    Setting up a Game Center Group


    You may selectively pick which leaderboards and achievements will be part of each
    group, and the process is reversable to the point where you may delete the entire
    group if you later desire. If your app already has existing leaderboards (or achievements),
    you must decide whether to merge those items with the group items. You may of
    course also create new group-specific leaderboards and achievements.


    All functionality of Game Center Groups is controlled via the App Store Connect
    portal, and it will guide you through merging and controlling leaderboards and
    achievements just as you would do with a non-group leaderboard or achievement.


    Accessing the leaderboards from within your app is exactly the same whether it
    is a group or not; you will just need the app to be part of the respected group
    and reference the provided (or created) leaderboard ID.'
  trans: "\n# 修改 GameCenterManager\n\n现在让我们把注意力转到 `GameCenterManager` 类。我们创建一个新函数，用于从\
    \ Game Center 服务器获取分数。请在 `GameCenterManager` 类中添加以下方法：\n\n```\nstatic func retrieveScores(from\
    \ leaderboard: GKLeaderboard, playerScope: GKLeaderboard.PlayerScope, timeScope:\
    \ GKLeaderboard.TimeScope, range: ClosedRange, completion: ((GKLeaderboard.Entry?,\
    \ [GKLeaderboard.Entry]?, Int, Error?) -> ())?) {\n    leaderboard.loadEntries(for:\
    \ playerScope, timeScope: timeScope, range: NSRange(range.clamped(to: 1...100)))\
    \ { (localPlayerEntry, entries, totalPlayerCount, error) in\n        if let completion\
    \ = completion {\n            completion(localPlayerEntry, entries, totalPlayerCount,\
    \ error)\n        }\n    }\n}\n```\n\n我们希望这个调用尽可能通用，因为 `GameCenterManager` 类的最终目标是成为一个可复用类，能够轻松地集成到你未来的任何项目中。\n\
    \n上述方法接收了创建新的 `GKLeaderboard` 对象所需的所有参数。一旦我们创建了该对象并设置了所需的属性，就可以在 `GKLeaderboard`\
    \ 对象上调用 `loadScoresWithCompletionHandler` 方法。\n\n本节对 `GameCenterManager` 类所做的修改就这些。\n\
    \n# 在自定义排行榜上过滤结果\n\n让我们将注意力重新转回到 `UFOLeaderboardViewController` 类。接下来，我们要为分段控制器添加一个操作。这将允许用户在全局分数和仅好友分数之间切换。请将以下方法连接到分段控制器的\
    \ `valueChanged` 操作：\n\n```\n@IBAction func scopeChanged(_ sender: UISegmentedControl)\
    \ {\n    scores = []\n    if let leaderboard = GameCenterManager.leaderboard {\n\
    \        GameCenterManager.retrieveScores(from: leaderboard, playerScope: scopeSegmentedControl.selectedSegmentIndex\
    \ == 0 ? .friendsOnly : .global, timeScope: .allTime, range: 1...50) { (localPlayerEntry,\
    \ entries, totalPlayerCount, error) in\n            if let error = error {\n \
    \               print(\"An error occurred: \\(error.localizedDescription)\")\n\
    \            } else {\n                self.scores = entries ?? []\n         \
    \   }\n            self.tableView.reloadData()\n        }\n    }\n}\n```\n\n此方法调用\
    \ `GameCenterManager` 的方法来获取分数列表。分段控制器有两个值：一个用于好友，一个用于所有人（全局）。你也可以轻松修改上述代码以获取不同的时间范围，但在本例中，我们只请求全部时间范围。这里有一个容易忽略的重要步骤：将数组设置为空数组并重新加载表格。这样做会在分段控制器值改变时清除表格中现有的分数。\n\
    \n`retrieveScores` 调用相当直接。我们使用在 App Store Connect 中为要获取的排行榜设置的类别，并设置时间和玩家范围。该方法最后一个参数是一个范围。在上一个示例中，我们返回从第\
    \ 1 名到第 50 名的分数。\n\n**注意**\n\n分数范围始终从索引 1 开始。你可以将前述示例修改为使用新范围 `NSMakeRange(50,50)`；这将获取从第\
    \ 50 名到第 100 名的分数。确保不要一次请求过多的分数，因为获取分数数据所需的时间与你尝试获取的分数数量有关。\n\n## 显示自定义排行榜\n\n\
    如果你现在运行此项目，会发现表格始终是空白的。这是由于遗漏所致。要解决这个问题，请修改现有的 `IBAction` 方法，将 `gameCenterDelegate`\
    \ 的属性设置为 `UFOViewController` 中存在的实例。你的代码应如下例所示：\n\n```\n@IBAction func leaderboardButtonTapped(sender:\
    \ UIButton) {\n    let leaderboardController = GKGameCenterViewController(state:\
    \ .leaderboards)\n    leaderboardController.gameCenterDelegate = self\n    present(leaderboardController,\
    \ animated: true)\n}\n```\n\n如果你现在再次运行该应用，你会看到类似于图 3-12 所示的输出。分数的数量、具体数值以及玩家别名会有所不同，但你应该能看到至少一个分数被列出。\n\
    \n![图 3-12：自定义排行榜的初始视图](img/216283_2_En_3_Fig12_HTML.jpg)\n\n**重要提示**\n\n无法保证排行榜请求不会返回缓存数据。你应假定获取的数据是缓存的，可能不是最新的。\n\
    \n# 本地玩家分数\n\n很多时候，你会想知道本地玩家在给定排行榜上的分数。也许你想在他们的排行榜顶部显示其分数，或者你可能想获取一个显示与本地玩家分数相近的其他玩家分数的排行榜。你甚至可能想在用户打破自己之前的最高分时在游戏中发布一个动作。\n\
    \n苹果提供了简便的技术来确定本地玩家的分数。一旦你获得了要查找本地分数的排行榜引用，只需查询 `localPlayerScore` 属性即可。\n\n```\n\
    print(leaderboard.localPlayerScore)\n```\n\n# 更佳方法\n\n在本章前面的“发布分数”一节中，我们学习了如何向\
    \ Game Center 发布新分数。我们的方法虽然简单，但从用户交互的角度来看并非最佳方案。现在是时候重构发布新分数的代码以提升可用性了。这种方法更复杂，但性能更好，对用户的影响也更小。\n\
    \n我们需要做的第一件事是将 `scoreReported` 函数从 `UFOGameViewController` 移到 `UFOViewController`。同时，我们还要修改\
    \ `UFOViewController` 中的退出操作，以便将分数报告给 Game Center。\n\n这使我们能够退出游戏，而无需等待来自 Game\
    \ Center 代理的网络回调。\n\n# Game Center 组\n\nGame Center 功能的一个较新添加是 Game Center 组，更简洁地说，就是跨多个不同应用共享排行榜或成就。在迁移到\
    \ Game Center 组之前，存在一些需要注意的限定条件；最值得注意的是，所有应用必须存在于同一个 App Store Connect 账户下；没有办法在不同账户的应用之间设置\
    \ Game Center 组。\n\n要设置一个新的 Game Center 组，你必须首先打开你想要添加到组中的第一个应用的 App Store Connect\
    \ 门户中的 Game Center 区域。那里有一个用于设置新组的小区域；见图 3-13。\n\n**重要提示**\n\n如果你的应用已有排行榜，其排行榜\
    \ ID 将带有“grp.”前缀。在设置时，你可以保持 ID 不变，也可以创建一个新的。\n\n![图 3-13：设置 Game Center 组](img/216283_2_En_3_Fig13_HTML.jpg)\n\
    \n你可以有选择地挑选哪些排行榜和成就将成为每组的一部分，并且该过程是可逆的，如果你以后需要，甚至可以删除整个组。如果你的应用已有排行榜（或成就），则必须决定是否将这些项目与组项目合并。当然，你也可以创建新的特定于组的排行榜和成就。\n\
    \nGame Center 组的所有功能都通过 App Store Connect 门户进行控制，它将引导你完成合并和控制排行榜及成就的过程，就像处理非组排行榜或成就一样。\n\
    \n从你的应用内部访问排行榜的方式，无论是否属于组，都是完全相同的；你只需要让应用成为相应组的一部分，并引用提供的（或创建的）排行榜 ID 即可。\n"
- fmt: '## Summary


    This chapter introduced leaderboards in Game Center. We covered the benefits of
    using a leaderboard, as well as the two available types. We learned how to post
    a score and recover for any errors that occurred during posting. We also looked
    at the requirements of getting leaderboards up and running in your app, using
    either Apple’s provided GUI or a custom one.


    Throughout the chapter, we continued to build our `GameCenterManager` class, adding
    the required methods to post scores, retrieve scores both local and global, and
    display custom and built-in leaderboards. You should now feel confident in adding
    a leaderboard to any existing or new iOS app. In the next chapter, we will explore
    all that Game Center achievements offer.


    # 4. Achievements


    The relatively new gaming concept, achievements, came along much later than leaderboards
    and has gained a dramatic rise in popularity with the release of Microsoft’s Xbox
    360 and newer devices. Achievements offer a higher level of detail overlooked
    in more basic leaderboards. While leaderboards show who currently possesses the
    leading scores, achievements demonstrate a player’s skills and strengths by rewarding
    the player for completing more specific tasks, events, or levels. When the achievements
    start to serve in-game purposes, they become more of a power-up over other players.
    The ability to view the achievements by others gives players a type of “bragging
    rights.” As you are of no doubt aware, bragging rights in a game can extend gameplay
    for a variety of users trying to reach 100% completeness, to maintain their lead
    over their peers, or to knock a peer from the top.


    As social network–enabled gaming spreads and becomes prevalent, the achievement
    system feature has skyrocketed into even more popularity. Social games are filled
    with a niche player base determined to complete 100% of the game.


    Foursquare was one of the first to bring achievements out of the gaming world
    and into the social app universe. Foursquare calls its achievements “stickers”
    (see Figure [4-1](#216283_2_En_4_Chapter.xhtml#Fig1)), but the basic concept is
    the same. Players receive a reward for completing a task, but the number of badges
    does not affect gameplay or, in this case, the ability for the user to use the
    app in any direct manner.


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig1_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig1_HTML.jpg)


    Figure 4-1 Foursquare for iPhone showing achievements, renamed Stickers in later
    versions


    Game Center has made adding an achievement system to your iOS, Mac, or Apple TV
    app simple. In this chapter, we will learn how to add achievements to our demo
    game, UFOs. You will learn everything needed to fully integrate an achievement
    system into your app quickly and easily. Notably, you will learn how to:


    - Create new achievements

    - Display achievement progress

    - Add achievement hooks into your app

    - Progress and reset achievements

    - Customize the appearance of achievements


    ## Why Achievements?


    If it is not already apparent what achievements can add to your social app or
    game, let’s take a moment to review some of the many benefits:


    - Achievements give your users an extra sense of accomplishment and reward.

    - Achievements bring users back into your app more often. Users are more likely
    to return to your app to complete more achievements, making completing the game
    a more rewarding and fun process.

    - Achievements add an easy way for users to share experiences with other users.

    - Achievements in Game Center provide a polished look and feel to the shipping
    product.

    - Achievements give users a greater sense of progression as they make their way
    through your app or game.

    - Achievements provide an alternative way to play the game. If users do not enjoy
    the campaign, they can enjoy a sense of accomplishment through your achievement
    system.

    - Achievements attribute game brand awareness. As users share their accomplishments
    on Twitter, Facebook, and other social platforms, name recognition increases and
    in hand sales.


    ## An Overview of Achievements in Game Center


    Achievements, also known as badges in certain circles, function slightly differently
    in Game Center than on other platforms. As with leaderboards, achievements first
    need to be configured in App Store Connect on a per-app basis. You will be creating
    new instances of a `GKAchievement` object to report progress (more on this object
    later). Unlike leaderboard entries, which are created when a score is reached
    and submitted, achievements can report incremental or partial progress.


    Another notable change from working with leaderboards (see Chapter [3](#216283_2_En_3_Chapter.xhtml)
    for more on leaderboards) is that you will use two different types of objects
    to submit and retrieve achievements. `GKAchievement` is used to submit new achievements
    or update progress on achievements, and `GKAchievementDescription` is used to
    display achievement data to the user. This is contrary to what we saw when working
    with leaderboards, in which `GKScore` objects were used to submit data as well
    as retrieve it.


    As with leaderboards, achievement progress can be shown using either Apple’s included
    graphical user interface (GUI) or a customized one that better matches the look
    and feel of your app. The advantages and disadvantages of each system are the
    same as with leaderboards. Those advantages and disadvantages follow for your
    convenience, with minor achievement-specific information added where appropriate.


    ### Benefits of Using Apple’s Achievement GUI vs. a Custom GUI


    The following are some of the benefits that you will gain by using Apple’s included
    GUI for working with achievements:


    - The look and feel of your achievements are created by some of the best designers
    in the world.

    - The GUI is very simple and easy to implement, making it straightforward to present
    the achievement progress to your users.

    - Users appreciate a familiar interface with which they already know how to interact.

    - Your app is more future-proof than it otherwise would be if you implemented
    your own system. Every revision of Game Center user interfaces is automatically
    taken advantage of by your app.


    The following are a few of the benefits of using your own GUI when working with
    achievements on iOS devices:


    - Your achievement progress can match the custom design of your app.

    - You have more freedom over the returned data and can filter using additional
    criteria.

    - You can implement your own custom caching behavior.

    - You can use custom images for incomplete or in-progress achievements.


    As you can see, as always, there are advantages and disadvantages of each system,
    and there is no right answer in which one you should be using. By the end of this
    chapter, you will have a better understanding of the options and be better equipped
    to decide which approach is the best fit for your app.


    As mentioned in the beginning of this section, you will need to begin with achievements
    in the same manner as we did for leaderboards, in App Store Connect.'
