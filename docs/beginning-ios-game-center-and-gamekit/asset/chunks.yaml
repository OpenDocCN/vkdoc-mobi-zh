  raw: '### Configuring Game Center in App Store Connect


    Once you have selected your app from within App Store Connect, you will see a
    view similar to the screen capture in Figure [1-5](#216283_2_En_1_Chapter.xhtml#Fig5),
    shown later in this section. If you direct your attention to navigation bar, you
    will notice a features item; this is where Game Center items will be configured.


    If you are familiar with in-app purchase in previous apps, this area will seem
    very familiar to you. The process for configuring IAP is similar to working with
    Game Center.


    Once you navigate to the features area for the app, you will be given an option
    to add challenges, new leaderboards, or achievements. We focus on these options
    more in later chapters (Chapter [3](#216283_2_En_3_Chapter.xhtml) covers leaderboards,
    and Chapter [4](#216283_2_En_4_Chapter.xhtml) covers achievements). For now, all
    we need to do is ensure that our app is set up and ready for Game center functionality
    to be added.


    ![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig5_HTML.jpg](images/216283_2_En_1_Chapter/216283_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The first view of the Game Center portal for a new App


    Make sure to check off the Game Center functionality under the General App Information
    on the first tab (“App Store” on your new app), otherwise your App may not register
    as having Game Center functionality.


    Tip


    If you are having difficulty getting your app to acknowledge Game Center, the
    most likely culprit is one of two common issues. Make sure your app is using the
    same bundle ID that is shown in the App Info page. The second issue may be that
    you have not let enough time pass. There can be up to a 30-minute delay between
    making changes in App Store Connect to Game Center and having the app notice those
    changes.


    ## Summary


    You should now have a basic understanding of what GameKit and Game Center have
    to offer, as well as an in-depth understanding of the sample project you will
    be working with throughout the course of this book. Additionally, you should now
    be comfortable setting up a new app in App Store Connect for use with Game Center.


    In the upcoming chapters, you will learn how to incorporate all the functionality
    of Game Center and GameKit into an app. In the next chapter, you will learn how
    to get Game Center incorporated into a project.


    # 2. Game Center: Configuring and Getting Started


    In the last chapter, we learned how to configure Game Center in App Store Connect
    and began working with the sample project, UFOs. In this chapter, we will discuss
    integrating Game Center into our app and get our hands dirty with some code.


    You will learn how to detect Game Center compatibility, explore the limitations
    of the sandbox, authenticate a local player, work with sessions, and retrieve
    a friends list. You will also create the Game Center Manager class that we will
    be working with and expanding throughout the rest of the book.


    ## Creating a Game Center Manager Class


    When Game Center was first released, it was important to test for compatibility
    before implementing it; however, Game Center has readily been available across
    all our platforms for years, and unless you plan on targeting very old devices,
    there is no longer a need to make sure a device is running it. On our way to implementing
    Game Center functionality, the first thing we need to do to perform this check
    is to create our new GameCenterManager class. We will use this class throughout
    the remainder of this book to keep our Game Center functionality in one easy-to-access
    class. This class will house all of our Game Center–specific code and callbacks
    and can be easily shared and reused across all of your apps.


    First, create a new Swift file in Xcode; name the new class GameCenterManager,
    as shown in Figure [2-1](#216283_2_En_2_Chapter.xhtml#Fig1). You will also want
    to add the GameKit.framework to your project at this time, as well as add the
    import GameKit line to the top of the newly created GameCenterManager class.


    ![../images/216283_2_En_2_Chapter/216283_2_En_2_Fig1_HTML.jpg](images/216283_2_En_2_Chapter/216283_2_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Creating the GameCenterManager Class


    ## Authenticating with Game Center


    Before doing anything with Game Center, you first need to authenticate the user.
    The user who is authenticated with Game Center will always be referred to as the
    local player and will be represented by the class GKLocalPlayer. Failing to authenticate
    a local user before making calls to other Game Center functionality will result
    in errors and other undefined behaviors.


    Apple recommends that you authenticate with Game Center as early as possible in
    your app. The primary reason to authenticate before the user needs to access any
    Game Center behavior is to ensure that the user is not waiting for the network
    callbacks to authenticate a user at a time when they want to perform a Game Center
    action. Early authentication also makes sure that the user is not prompted for
    a login in the middle of gameplay, which would detract from the user experience.
    There are additional benefits of authenticating before the user may need to that
    we will explore in upcoming chapters, such as resubmitting high scores that failed
    to submit at an earlier time.


    ### Modifying the GameCenterManager Class


    Handling authentication requires additional code to the GameCenterManager class.
    This is done by expanding on the GameCenterManager struct. The first step is to
    define a new function to handle the authentication; we will call this authenticateLocalUser.
    A completion handler is defined as the calling view controller; this will allow
    us to report errors and successes back to the main game. Next, a quick sanity
    check is done to make sure that the local player authentication handler isn’t
    already defined, and then define it as the calling view controller.


    ```

    class GameCenterManager: UIViewController, GKMatchmakerViewControllerDelegate,
    GKLocalPlayerListener, UIAlertViewDelegate {

    func authenticateLocalUser(_ controller: UIViewController?) {

    let localPlayer = GKLocalPlayer.local

    if localPlayer.isAuthenticated == false {

    localPlayer.authenticateHandler = { [weak self] viewController, error in

    guard let self = self else {

    return

    }

    if let viewController = viewController {

    controller?.present(viewController, animated: true)

    }

    if localPlayer.isAuthenticated {

    localPlayer.unregisterListener(self)

    self.submitAllSavedScores()

    self.submitAllSavedAchievements()

    DispatchQueue.main.asyncAfter(deadline: .now() + 3) { [weak self] in

    self?.populateAchievementCache(nil)

    }

    GKLocalPlayer.local.register(self)

    }

    self.playerDelegate?.processGameCenterAuthentication(error)

    }

    }

    }

    ```


    Tip


    Don’t forget to import the GameKit framework, otherwise, GKLocalPlayer will be
    undefined.'
  trans: "\n### 在 App Store Connect 中配置 Game Center\n\n在 App Store Connect 中选定应用后，你将看到类似本小节后文图\
    \ 1-5 截图的视图。将注意力转向导航栏时，你会注意到 **Features**（功能）选项；这里就是配置 Game Center 项目的地方。\n\n\
    如果你之前熟悉应用内购买（IAP）的配置流程，那么这个界面会让你感到非常熟悉。配置 IAP 的流程与配置 Game Center 类似。\n\n进入应用的\
    \ **Features** 区域后，你将可以选择添加挑战、新的排行榜或成就。我们将在后续章节中更详细地介绍这些选项（第 3 章介绍排行榜，第 4 章介绍成就）。目前，我们只需要确保应用已设置完毕，随时可以添加\
    \ Game Center 功能。\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig5_HTML.jpg](img/216283_2_En_1_Fig5_HTML.jpg)\n\
    \n**图 1-5** — 新应用的 Game Center 门户初始视图\n\n请务必在第一个标签页（新应用中的 \"App Store\"）的 **General\
    \ App Information**（通用应用信息）下勾选 Game Center 功能，否则你的应用可能无法注册为已启用 Game Center 功能。\n\
    \n**提示：** 如果你的应用无法识别 Game Center，最可能的原因通常是以下两个常见问题之一。请确保你的应用使用的 Bundle ID 与应用信息页面显示的\
    \ Bundle ID 一致。第二个问题可能是你等待的时间不够长。在 App Store Connect 中对 Game Center 做出更改，到应用检测到这些更改之间，可能存在长达\
    \ 30 分钟的延迟。\n\n### 本章小结\n\n现在，你应该对 GameKit 和 Game Center 的功能有了基本了解，同时也深入理解了本书后续内容中将使用的示例项目。此外，你现在应该能够轻松地在\
    \ App Store Connect 中创建一个新应用，并为其配置 Game Center 功能。\n\n在接下来的章节中，你将学习如何将 Game Center\
    \ 和 GameKit 的全部功能集成到应用中。在下一章中，你将学习如何将 Game Center 整合到项目中。\n\n---\n\n# 2. Game\
    \ Center：配置与入门\n\n在上一章中，我们学习了如何在 App Store Connect 中配置 Game Center，并开始使用示例项目 *UFOs*。在本章中，我们将讨论如何将\
    \ Game Center 集成到我们的应用中，并动手编写一些代码。\n\n你将学习如何检测 Game Center 兼容性、探索沙盒的限制、验证本地玩家、处理会话以及检索好友列表。你还将创建\
    \ `GameCenterManager` 类，我们将在本书剩余部分使用并扩展这个类。\n\n## 创建 Game Center 管理器类\n\n在 Game\
    \ Center 刚发布时，实施功能前测试兼容性非常重要；然而，多年来 Game Center 已广泛应用于我们所有平台，除非你计划支持非常旧的设备，否则不再需要检查设备是否运行该功能。在实现\
    \ Game Center 功能的过程中，要执行此检查，首先需要创建新的 `GameCenterManager` 类。在本书剩余部分，我们将使用这个类将 Game\
    \ Center 功能集中在一个易于访问的类中。这个类将包含所有 Game Center 特定的代码和回调，并且可以轻松地在你的所有应用中共享和重用。\n\n\
    首先，在 Xcode 中创建一个新的 Swift 文件；将新类命名为 `GameCenterManager`，如图 2-1 所示。同时，你需要将 `GameKit.framework`\
    \ 添加到项目中，并在新创建的 `GameCenterManager` 类顶部添加 `import GameKit` 代码行。\n\n![../images/216283_2_En_2_Chapter/216283_2_En_2_Fig1_HTML.jpg](img/216283_2_En_2_Fig1_HTML.jpg)\n\
    \n**图 2-1** — 创建 `GameCenterManager` 类\n\n## 通过 Game Center 进行身份验证\n\n在使用 Game\
    \ Center 做任何操作之前，首先需要验证用户身份。使用 Game Center 进行身份验证的用户将始终被称为*本地玩家*，并由 `GKLocalPlayer`\
    \ 类表示。如果在调用其他 Game Center 功能之前未能验证本地用户，将导致错误和其他未定义行为。\n\nApple 建议在应用中尽早通过 Game\
    \ Center 进行身份验证。在用户需要访问任何 Game Center 行为之前进行身份验证的主要原因是，确保用户在执行 Game Center 操作时无需等待网络回调来验证身份。提前验证还可以确保用户在游戏过程中不会突然弹出登录提示，从而影响用户体验。在用户可能需要之前进行身份验证还有其他好处，我们将在后续章节中探讨，例如重新提交之前未能成功提交的高分。\n\
    \n### 修改 GameCenterManager 类\n\n处理身份验证需要向 `GameCenterManager` 类添加额外代码。这通过扩展 `GameCenterManager`\
    \ 结构体来实现。第一步是定义一个处理身份验证的新函数；我们将其命名为 `authenticateLocalUser`。完成处理程序被定义为调用视图控制器；这将允许我们向主游戏报告错误和成功。接下来，进行一个快速检查以确保本地玩家身份验证处理程序尚未定义，然后将其定义为调用视图控制器。\n\
    \n```swift\nclass GameCenterManager: UIViewController, GKMatchmakerViewControllerDelegate,\
    \ GKLocalPlayerListener, UIAlertViewDelegate {\n    func authenticateLocalUser(_\
    \ controller: UIViewController?) {\n        let localPlayer = GKLocalPlayer.local\n\
    \        if localPlayer.isAuthenticated == false {\n            localPlayer.authenticateHandler\
    \ = { [weak self] viewController, error in\n                guard let self = self\
    \ else {\n                    return\n                }\n                if let\
    \ viewController = viewController {\n                    controller?.present(viewController,\
    \ animated: true)\n                }\n                if localPlayer.isAuthenticated\
    \ {\n                    localPlayer.unregisterListener(self)\n              \
    \      self.submitAllSavedScores()\n                    self.submitAllSavedAchievements()\n\
    \                    DispatchQueue.main.asyncAfter(deadline: .now() + 3) { [weak\
    \ self] in\n                        self?.populateAchievementCache(nil)\n    \
    \                }\n                    GKLocalPlayer.local.register(self)\n \
    \               }\n                self.playerDelegate?.processGameCenterAuthentication(error)\n\
    \            }\n        }\n    }\n}\n```\n\n**提示：** 别忘记导入 `GameKit` 框架，否则 `GKLocalPlayer`\
    \ 将无法被识别。\n"
- fmt: '### Authenticating from UFOViewController


    The preceding function will serve as a helper for authenticating with Game Center.
    While the Game Center Manager code has been configured to log the player in, your
    app needs to call this new function. You will need to swift your attention back
    to the `HomeViewController`, which is the view controller that the game launches
    to, before any gameplay begins. The following code can be added into the `viewDidLoad`
    function:


    ```

    func authenticateLocalUser(_ controller: UIViewController?) {

    let localPlayer = GKLocalPlayer.local

    if localPlayer.isAuthenticated == false {

    localPlayer.authenticateHandler = { [weak self] viewController, error in

    guard let self = self else {

    return

    }

    if let viewController = viewController {

    controller?.present(viewController, animated: true)

    }

    if localPlayer.isAuthenticated {

    localPlayer.unregisterListener(self)

    self.submitAllSavedScores()

    self.submitAllSavedAchievements()

    DispatchQueue.main.asyncAfter(deadline: .now() + 3) { [weak self] in

    self?.populateAchievementCache(nil)

    }

    GKLocalPlayer.local.register(self)

    }

    self.playerDelegate?.processGameCenterAuthentication(error)

    }

    }

    }

    ```


    The first line of code calls the `authenticateLocalUser` function from the Game
    Center Manager. After that, an error check is performed before the login view
    controller is shown. In the event that an error is encountered, we present the
    user with an alert window letting them know about the error. If there was no error,
    then the Game Center Login screen is presented.


    Game Center handles the required login views and authentication as well as any
    account creation at this point. However, we do need to watch our authentication
    completion handler in order to catch any errors encountered while authenticating.


    > **Caution**

    > If you have cancelled a Game Center login three or more times from within an
    app, you will not be able to sign in from that app again until you have gone to
    the `GameCenter.app` and signed in. This is an undocumented behavior and can be
    a real pain to trace if you do not know what you are searching for. In addition,
    if you find you are unable to sign in even from `GameCenter.app`, you can reset
    the simulator or restore the device to resolve these issues. It is rare for a
    user of your app to face these issues, but as a developer, the constant debugging
    and error testing more often than not will put you into an expected behavioral
    state.


    > **Tip**

    > If you encounter the error “This game is not recognized by Game Center,” make
    sure to check your bundle identifier and that it matches the app that you set
    up in App Store Connect.


    It is important here to take a few moments to talk about thread safety. Thread
    safety may be a term you are very familiar with, might be something you have heard
    briefly touched on in our materials, or may even be a completely new term for
    you. While it is beyond the scope of this book to dive too deeply into threads,
    it’s important to at least have a cursory understanding of the technology.


    When an app executes and runs, it can do so in sequence along a single thread,
    meaning that the next task will not begin until the previous task has finished.
    This is called synchronous execution. On the other hand, you can have multiple
    tasks all running at the same time and finishing in whatever order they happen
    to finish; this is called asynchronous. Running code asynchronously is often faster
    because modern devices have multiple cores which can each handle one or more tasks
    at a time. However not knowing when tasks will finish running, having tasks finish
    before other tasks, or trying to have two tasks modify the same object at once
    can result in bugs, unexpected behavior, and even hard-to-track-down race conditions.


    You may have noticed that when reviewing sample codes, frameworks, methods, or
    functions, the author will sometimes denote whether something is thread safe,
    isn’t thread safe, or needs to be executed on the main thread. These notations
    will allow you to make smart decisions on how to write the most optimal code and
    guide you through avoiding bugs and crashes. As a general rule of thumb, if you
    are updating an interface item, such as displaying a button, launching an alert,
    or changing the color of something on the screen, that action must be done on
    the main thread.


    Many of the features of Game Center and GameKit will require the execution of
    the code on the main thread. Since we are not running the authentication of the
    local user on a background thread, there are not any changes that we need to make
    in the sample app. However, if you are designing an app that will be authenticating
    from a background thread, make sure to access the authentication function through
    a main thread; while there are numerous ways to accomplish this, the easiest,
    albeit perhaps not the most optimal, is as follows:


    ```

    DispatchQueue.main.async { [unowned self] in

    self.yourCodeHere()

    }

    ```


    While your app should continue to function normally whether or not a user has
    signed into Game Center, it may be necessary to set some flags or perform some
    other actions upon successful login.


    You can add the following code snippet to the end of the `authenticateLocalUser`
    completion handler:


    ```

    if (GKLocalPlayer.local.isAuthenticated)

    {

    print("Successfully authenticated")

    }

    ```


    Now when you log in, you should see “Successfully authenticated” printed to the
    console, as well as the image shown in Figure [2-2](#216283_2_En_2_Chapter.xhtml#Fig2)
    (with your Game Center name instead).


    > **Caution**

    > When logging in to Game Center for testing purposes, always create a new Apple
    ID. Never use an existing Apple ID to log in to Game Center from the sandbox environment.
    There have been historic incidents where a user account can become broken during
    testing, and it can be a huge hassle to deal with a broken account on your primary
    Apple ID.


    ![../images/216283_2_En_2_Chapter/216283_2_En_2_Fig2_HTML.jpg](images/216283_2_En_2_Chapter/216283_2_En_2_Fig2_HTML.jpg)


    **Figure 2-2** – The standard welcome back message the user will see when logging
    in to Game Center


    > **Tip**

    > If you are having trouble logging in, make sure your bundle ID in the `info.plist`
    matches a bundle ID that has Game Center enabled for it in App Store Connect.
    See Chapter [1](#216283_2_En_1_Chapter.xhtml) for more information on configuring
    Game Center in App Store Connect.


    ## Watching for Status Changes


    With multiple apps running in the background and depending on the device side
    by side, the authentication can become a little more complex, with a user logging
    in and out through different apps. For example, the user may log out of Game Center,
    or even log in as a different user, while your app is in the background. Therefore,
    it is vital that you listen for changes to the local user through the `NSNotification`
    system.


    Add the following snippet of code in `viewDidLoad` of `UFOViewController.m` right
    after the test is performed to verify whether Game Center is available:


    ```

    NotificationCenter.default.addObserver(self, selector: #selector(localUserAuthenticationChanged(_:)),
    name: NSNotification.Name.GKPlayerAuthenticationDidChangeNotificationName, object:
    nil)

    ```


    You also want to add a new function to `UFOViewController`. This function will
    be called whenever player authentication status changes.


    ```

    @objc private func localUserAuthenticationChanged(_ notification: Notification)
    {

    print("Authentication changed: \(notification.object ?? "()")")

    }

    ```


    This new function will print the description for the new `GKLocalPlayer` when
    authentication changes. You will need to determine what special steps need to
    be taken in your app to handle local player changes.


    > **Tip**

    > Do not forget to test user switching before shipping your app, as Apple will
    test it in the review stage.'
  raw: '### Authenticating from UFOViewController


    The preceding function will serve as a helper for authenticating with Game Center.
    While the Game Center Manager code has been configured to log the player in, your
    app needs to call this new function. You will need to swift your attention back
    to the HomeViewController, which is the view controller that the game launches
    to, before any gameplay begins. The following code can be added into the viewDidLoad
    function:


    ```

    func authenticateLocalUser(_ controller: UIViewController?) {

    let localPlayer = GKLocalPlayer.local

    if localPlayer.isAuthenticated == false {

    localPlayer.authenticateHandler = { [weak self] viewController, error in

    guard let self = self else {

    return

    }

    if let viewController = viewController {

    controller?.present(viewController, animated: true)

    }

    if localPlayer.isAuthenticated {

    localPlayer.unregisterListener(self)

    self.submitAllSavedScores()

    self.submitAllSavedAchievements()

    DispatchQueue.main.asyncAfter(deadline: .now() + 3) { [weak self] in

    self?.populateAchievementCache(nil)

    }

    GKLocalPlayer.local.register(self)

    }

    self.playerDelegate?.processGameCenterAuthentication(error)

    }

    }

    }

    ```


    The first line of code calls the authenticateLocalUser function from the Game
    Center Manager. After that, an error check is performed before the login view
    controller is shown. In the event that an error is encountered, we present the
    user with an alert window letting them know about the error. If there was no error,
    then the Game Center Login screen is presented.


    Game Center handles the required login views and authentication as well as any
    account creation at this point. However, we do need to watch our authentication
    completion handler in order to catch any errors encountered while authenticating.


    Caution


    If you have cancelled a Game Center login three or more times from within an app,
    you will not be able to sign in from that app again until you have gone to the
    GameCenter.app and signed in. This is an undocumented behavior and can be a real
    pain to trace if you do not know what you are searching for. In addition, if you
    find you are unable to sign in even from Game Center.app, you can reset the simulator
    or restore the device to resolve these issues. It is rare for a user of your app
    to face these issues, but as a developer, the constant debugging and error testing
    more often than not will put you into an expected behavioral state.


    Tip


    If you encounter the error “This game is not recognized by Game Center,” make
    sure to check your bundle identifier and that it matches the app that you set
    up in App Store Connect.


    It is important here to take a few moments to talk about thread safety. Thread
    safety may be a term you are very familiar with, might be something you have heard
    briefly touched on in our materials, or may even be a completely new term for
    you. While it is beyond the scope of this book to dive too deeply into threads,
    it’s important to at least have a cursory understanding of the technology.


    When an app executes and runs, it can do so in sequence along a single thread,
    meaning that the next task will not begin until the previous task has finished.
    This is called synchronous execution. On the other hand, you can have multiple
    tasks all running at the same time and finishing in whatever order they happen
    to finish; this is called asynchronous. Running code asynchronously is often faster
    because modern devices have multiple cores which can each handle one or more tasks
    at a time. However not knowing when tasks will finish running, having tasks finish
    before other tasks, or trying to have two tasks modify the same object at once
    can result in bugs, unexpected behavior, and even hard-to-track-down race conditions.


    You may have noticed that when reviewing sample codes, frameworks, methods, or
    functions, the author will sometimes denote whether something is thread safe,
    isn’t thread safe, or needs to be executed on the main thread. These notations
    will allow you to make smart decisions on how to write the most optimal code and
    guide you through avoiding bugs and crashes. As a general rule of thumb, if you
    are updating an interface item, such as displaying a button, launching an alert,
    or changing the color of something on the screen, that action must be done on
    the main thread.


    Many of the features of Game Center and GameKit will require the execution of
    the code on the main thread. Since we are not running the authentication of the
    local user on a background thread, there are not any changes that we need to make
    in the sample app. However, if you are designing an app that will be authenticating
    from a background thread, make sure to access the authentication function through
    a main thread; while there are numerous ways to accomplish this, the easiest,
    albeit perhaps not the most optimal, is as follows:


    ```

    DispatchQueue.main.async { [unowned self] in

    self.yourCodeHere()

    }

    ```


    While your app should continue to function normally whether or not a user has
    signed into Game Center, it may be necessary to set some flags or perform some
    other actions upon successful login.


    You can add the following code snippet to the end of the authenticateLocalUser
    completion handler:


    ```

    if (GKLocalPlayer.local.isAuthenticated)

    {

    print("Successfully authenticated")

    }

    ```


    Now when you log in, you should see “Successfully authenticated” printed to the
    console, as well as the image shown in Figure [2-2](#216283_2_En_2_Chapter.xhtml#Fig2)
    (with your Game Center name instead).


    Caution


    When logging in to Game Center for testing purposes, always create a new Apple
    ID. Never use an existing Apple ID to log in to Game Center from the sandbox environment.
    There have been historic incidents where a user account can become broken during
    testing, and it can be a huge hassle to deal with a broken account on your primary
    Apple ID.


    ![../images/216283_2_En_2_Chapter/216283_2_En_2_Fig2_HTML.jpg](images/216283_2_En_2_Chapter/216283_2_En_2_Fig2_HTML.jpg)


    Figure 2-2


    The standard welcome back message the user will see when logging in to Game Center


    Tip


    If you are having trouble logging in, make sure your bundle ID in the info.plist
    matches a bundle ID that has Game Center enabled for it in App Store Connect.
    See Chapter [1](#216283_2_En_1_Chapter.xhtml) for more information on configuring
    Game Center in App Store Connect.


    ## Watching for Status Changes


    With multiple apps running in the background and depending on the device side
    by side, the authentication can become a little more complex, with a user logging
    in and out through different apps. For example, the user may log out of Game Center,
    or even log in as a different user, while your app is in the background. Therefore,
    it is vital that you listen for changes to the local user through the NSNotification
    system.


    Add the following snippet of code in viewDidLoad of UFOViewController.m right
    after the test is performed to verify whether Game Center is available:


    ```

    NotificationCenter.default.addObserver(self, selector: #selector(localUserAuthenticationChanged(_:)),
    name: NSNotification.Name.GKPlayerAuthenticationDidChangeNotificationName, object:
    nil)

    ```


    You also want to add a new function to UFOViewController. This function will be
    called whenever player authentication status changes.


    ```

    @objc private func localUserAuthenticationChanged(_ notification: Notification)
    {

    print("Authentication changed: \(notification.object ?? "()")")

    }

    ```


    This new function will print the description for the new GKLocalPlayer when authentication
    changes. You will need to determine what special steps need to be taken in your
    app to handle local player changes.


    Tip


    Do not forget to test user switching before shipping your app, as Apple will test
    it in the review stage.'
  trans: '

    ### 从 UFOViewController 进行身份验证


    前面的函数将作为通过 Game Center 进行身份验证的辅助函数。虽然 Game Center Manager 代码已配置为让玩家登录，但你的应用需要调用这个新函数。你需要将注意力转回
    `HomeViewController`，这是游戏启动后、任何游戏开始前所显示的视图控制器。可以将以下代码添加到 `viewDidLoad` 函数中：


    ```

    func authenticateLocalUser(_ controller: UIViewController?) {

    let localPlayer = GKLocalPlayer.local

    if localPlayer.isAuthenticated == false {

    localPlayer.authenticateHandler = { [weak self] viewController, error in

    guard let self = self else {

    return

    }

    if let viewController = viewController {

    controller?.present(viewController, animated: true)

    }

    if localPlayer.isAuthenticated {

    localPlayer.unregisterListener(self)

    self.submitAllSavedScores()

    self.submitAllSavedAchievements()

    DispatchQueue.main.asyncAfter(deadline: .now() + 3) { [weak self] in

    self?.populateAchievementCache(nil)

    }

    GKLocalPlayer.local.register(self)

    }

    self.playerDelegate?.processGameCenterAuthentication(error)

    }

    }

    }

    ```


    第一行代码调用了 Game Center Manager 中的 `authenticateLocalUser` 函数。之后，在显示登录视图控制器之前，会执行一次错误检查。如果遇到错误，我们会向用户显示一个警告窗口，告知他们错误信息。如果没有错误，则会显示
    Game Center 登录界面。


    Game Center 会在此处处理所需的登录视图、身份验证以及任何账户创建流程。然而，我们确实需要关注身份验证完成处理程序，以便捕获身份验证过程中遇到的任何错误。


    > **注意**

    > 如果你在某个应用内取消 Game Center 登录三次或更多次，那么在前往 `GameCenter.app` 并登录之前，你将无法再从该应用登录。这是一种未记录的行为，如果你不清楚自己在查找什么，追踪起来会非常麻烦。此外，如果你发现即使在
    `GameCenter.app` 中也无法登录，可以通过重置模拟器或恢复设备来解决这些问题。你的应用用户很少会遇到这些问题，但作为开发者，频繁的调试和错误测试很可能会让你陷入意料之外的*行为状态*。


    > **提示**

    > 如果遇到“Game Center 无法识别此游戏”的错误，请确保检查你的 bundle identifier，并且它与你在 App Store Connect
    中设置的应用相匹配。


    这里有必要花点时间讨论一下线程安全。线程安全可能是一个你非常熟悉的术语，也可能是在我们的资料中简要提到过的概念，甚至对你来说可能是一个全新的术语。虽然深入探讨线程超出了本书的范围，但至少对其技术有一个初步的了解是很重要的。


    当应用执行和运行时，它可以沿着单个线程按顺序执行，这意味着下一个任务必须等前一个任务完成后才能开始。这被称为同步执行。另一方面，你也可以让多个任务同时运行，并以它们各自完成时的顺序结束；这被称为异步执行。异步运行代码通常更快，因为现代设备拥有多个核心，每个核心可以同时处理一个或多个任务。然而，不知道任务何时结束、任务在其它任务之前完成，或者试图让两个任务同时修改同一个对象，都可能导致错误、意外行为，甚至难以追踪的竞争条件。


    你可能已经注意到，在查阅示例代码、框架、方法或函数时，作者有时会注明某些内容是否是线程安全的、不是线程安全的，或者需要在主线程上执行。这些标注将帮助你做出明智的决策，以编写最优化的代码，并引导你避免错误和崩溃。作为一般经验法则，如果你正在更新界面元素，例如显示一个按钮、弹出警告或更改屏幕上某个内容的颜色，该操作必须在主线程上执行。


    Game Center 和 GameKit 的许多功能都要求代码在主线程上执行。由于我们不是在后台线程上运行本地用户的身份验证，因此示例应用中不需要做任何更改。但是，如果你正在设计一个将从后台线程进行身份验证的应用，请确保通过主线程访问身份验证函数；虽然有很多方法可以实现这一点，但最简单（尽管可能不是最优）的方法如下：


    ```

    DispatchQueue.main.async { [unowned self] in

    self.yourCodeHere()

    }

    ```


    无论用户是否已登录 Game Center，你的应用都应继续正常运行，但在成功登录后，可能有必要设置一些标志或执行一些其他操作。


    你可以将以下代码片段添加到 `authenticateLocalUser` 完成处理程序的末尾：


    ```

    if (GKLocalPlayer.local.isAuthenticated)

    {

    print("成功通过身份验证")

    }

    ```


    现在，当你登录时，你应该会在控制台中看到“成功通过身份验证”的输出，以及图 2-2 中显示的图像（其中显示的是你的 Game Center 名称）。


    > **注意**

    > 为测试目的登录 Game Center 时，请始终创建一个新的 Apple ID。切勿使用现有的 Apple ID 从沙盒环境登录 Game Center。历史上有过用户账户在测试期间损坏的事例，处理主
    Apple ID 上的损坏账户可能会非常麻烦。


    ![../images/216283_2_En_2_Chapter/216283_2_En_2_Fig2_HTML.jpg](img/216283_2_En_2_Fig2_HTML.jpg)


    **图 2-2** – 用户登录 Game Center 时将看到的标准欢迎回来消息


    > **提示**

    > 如果你在登录时遇到问题，请确保 `info.plist` 中的 bundle ID 与 App Store Connect 中启用了 Game Center
    的 bundle ID 相匹配。有关在 App Store Connect 中配置 Game Center 的更多信息，请参阅第 1 章。


    ## 监听状态变化


    由于多个应用在后台运行，并且取决于设备并排运行的情况，身份验证可能会变得稍微复杂一些，因为用户会通过不同的应用登录和注销。例如，当你的应用在后台时，用户可能会注销
    Game Center，甚至以不同用户身份登录。因此，通过 `NSNotification` 系统监听本地用户的变化至关重要。


    在 `UFOViewController.m` 的 `viewDidLoad` 中，紧接在验证 Game Center 是否可用的测试之后，添加以下代码片段：


    ```

    NotificationCenter.default.addObserver(self, selector: #selector(localUserAuthenticationChanged(_:)),
    name: NSNotification.Name.GKPlayerAuthenticationDidChangeNotificationName, object:
    nil)

    ```


    你还需要向 `UFOViewController` 添加一个新函数。每当玩家身份验证状态改变时，都会调用此函数。


    ```

    @objc private func localUserAuthenticationChanged(_ notification: Notification)
    {

    print("身份验证已更改: \(notification.object ?? "()")")

    }

    ```


    这个新函数将在身份验证更改时打印新的 `GKLocalPlayer` 的描述。你需要确定在你的应用中需要采取哪些特殊步骤来处理本地玩家的更改。


    > **提示**

    > 在发布应用之前，不要忘记测试用户切换，因为苹果会在审核阶段进行此项测试。

    '
- fmt: '# Working with `GKLocalPlayer`


    The `GKLocalPlayer` will always exist and be non-nil when authenticated with Game
    Center; this object is a representation of the user. You will never create an
    instance of `GKLocalPlayer`; this is handled through the class method `localPlayer`.
    The `localPlayer` singleton will be the only way that you will interact with the
    `localPlayer`.


    The `GKLocalPlayer` has several properties associated with it: `authenticated`,
    `underage`, `isMultiplayerGamingRestricted`, and `isPersonalizedCommunicationRestricted`.
    We will be dealing with the `friends` property in the following section. We have
    already worked with the `authenticated` Boolean in our authentication code in
    the previous sections.


    The `underage`, `isMultiplayerGamingRestricted`, and `isPersonalizedCommunicationRestricted`
    properties are useful for restricting content in a Game Center–enabled app. The
    following code performs an underage check; similar code can be added for multiplayer
    or communication restrictions:


    ```

    if (GKLocalPlayer.local.isUnderage)

    {

    print("User is Underage")

    }

    ```


    ## Game Center Friends


    When Game Center was first released, a lot of focus was placed on building and
    managing your personal friends list. Over the years this has become less of a
    priority and focus for Apple. The `friends` property of the local user was deprecated
    in iOS 8 and replaced with a `loadFriendPlayers` which was in turn deprecated
    in iOS 10. Finally, `loadRecentPlayers` was introduced and remains usable in iOS
    14. You may notice that this function doesn’t include the language “friends”;
    however, the documentation provides more insight. Asynchronously load the challengeable
    friends list as an array of `GKPlayer`. A challengeable player is a player with
    friend levels 1 and 2, or FL1 and FL2. This function calls a `completionHandler`
    when finished. The error will be nil on success. The Game Center controls in the
    settings app still lets you add friends.


    While having playable friends continues to be deprioritized in new updates to
    Game Center, the functionality does remain to get a list of `GKPlayer`s that are
    friends to the authenticated local user.


    In order to retrieve a list of all of your existing Game Center friends, the following
    function may be utilized:


    ```

    func retrieveFriendsList() {

    if GKLocalPlayer.local.isAuthenticated == true {

    GKLocalPlayer.local.loadRecentPlayers(completionHandler: { [weak self] recentPlayers,
    error in

    DispatchQueue.main.async { [weak self] in

    self?.playerDelegate?.friendsFinishedLoading(recentPlayers, error: error)

    }

    })

    } else {

    print("You must authenicate first")

    }

    }

    ```


    This method will call back to `friendsFinishedLoading` when the data has been
    fully retrieved. In the following code snippet, you can see an implementation
    of what that function might look like:


    ```

    func friendsFinishedLoading(_ friends: [GKPlayer]?, error: Error?) {

    if let error = error {

    print("An error occured during friends list request: \(error.localizedDescription)")

    } else if let friends = friends {

    playerDataLoaded(friends, error: error)

    }

    }

    ```


    Once the data has been loaded from the server, a final function is implemented
    to print that data to the console.


    ```

    func playerDataLoaded(_ players: [GKPlayer]?, error: Error?) {

    if let error = error {

    print("An error occured during player lookup: \(error.localizedDescription)")

    } else {

    print("Players loaded: \(players ?? [])")

    }

    }

    ```


    ## Working with Players


    At the heart of Game Center is a social service, and as such, it revolves around
    players be it challenges, multiplayer, leaderboards, or competing for achievements.
    You need to be aware of properties associated with a `GKPlayer` object. Three
    properties handle the name of the player, `gamePlayerID`, and `teamPlayerID`,
    which are unique identifiers that will refer to a player. The `gamePlayerID` is
    static and will always point to the same player for the same game, while `teamPlayerID`
    is unique to the player across all games from your developer account. The `teamPlayerID`
    therefore allows you to identify a player across multiple apps and can be very
    powerful for marketing and cross-promotion. The `gamePlayerID` and `teamPlayerID`
    string should never be shown to the user in your app; it is used purely for internal
    reference. The `alias` or `displayName`, on the other hand, is dynamic and can
    be changed by the user at any time. A Game Center user can set a new alias at
    any time; the `alias` property will always display the alias; if you use `displayName`,
    it will always display the alias unless a user is a friend, and then it will show
    their real names instead. The `alias` and `displayName` should never be used to
    test the identity of a user, but they should be the only string used to identify
    the player to your app’s user. It is important to also keep in mind that an alias
    is not unique and more than one player may have identical aliases or `displayName`s.


    Caution


    Do not make assumptions about the structure of the player identifier string. Its
    format and length are subject to change.


    When looking at any list of player IDs in Game Center, we do not begin with `GKPlayer`
    objects, instead we have an array of user IDs. To help us work with players, we
    will add two additional convenience methods to translate player IDs into `GKPlayer`s
    objects.


    We need to create two new functions: one will handle an array of player IDs, and
    the other will handle a single player ID. This will save us extra work down the
    road. We add the helper methods to our `GameCenterManager` class.


    We will add the following two function methods to the `GameCenterManager` class:


    ```

    func playersForIDs(_ playerIDs: [String]) {

    GKPlayer.loadPlayers(forIdentifiers: playerIDs) { [weak self] players, error in

    DispatchQueue.main.async {

    self?.playerDelegate?.playerDataLoaded(players, error: error)

    }

    }

    }

    func playerForID(_ playerID: String) {

    playersForIDs([playerID])

    }

    ```


    Now, when the App is run (assuming you have friends associated with your Game
    Center account), it will pull down a list of your friends’ player IDs and then
    perform a lookup and print the `GKPlayer` description to the console. Your output
    should look similar to the following:


    ```

    UFOs[4038:207] Authentication Changed: (playerID: G:1092793231, alias: the_other_kyle,
    status: (null), rid:(null)) UFOs[4038:207] Players loaded:

    ("(playerID: G:1093075676, alias: johncash, status: (null),4-rid:(null))"

    )

    ```


    ## Summary


    In this chapter, you learned how to test for Game Center compatibility and authenticate
    the local user. You should now have a strong grasp of how we will be using the
    `GameCenterManager` class and the benefits it will have on creating a clean code
    environment that will be easily reusable across multiple projects.


    In the next chapter, we will take an in-depth look at leaderboards and expand
    on topics learned in this chapter. If you have any difficulty with anything discussed
    in this chapter, remember that the included sample code contains working examples
    of all the topics discussed.'
