  trans: '

    ## 摘要


    本章介绍了 Game Center 中的排行榜。我们涵盖了使用排行榜的优势，以及两种可用的类型。我们学习了如何提交分数，以及如何处理提交过程中出现的任何错误。我们还探讨了在应用中使用
    Apple 提供的 GUI 或自定义 GUI 来启动并运行排行榜所需满足的要求。


    在本章中，我们持续构建了 `GameCenterManager` 类，添加了所需的方法来提交分数、获取本地和全局分数，以及显示自定义和内置排行榜。现在，您应该已经能够自信地为任何现有或新的
    iOS 应用添加排行榜了。在下一章中，我们将探索 Game Center 成就所提供的一切功能。


    # 4. 成就


    相对较新的游戏概念——成就，其出现时间远晚于排行榜，并且随着微软 Xbox 360 及更新设备的发布而迅速流行起来。成就提供了更基础的游戏排行榜所忽略的更高层次的细节。虽然排行榜显示的是当前谁拥有领先分数，但成就通过奖励玩家完成特定任务、事件或关卡来展示玩家的技能和实力。当成就开始服务于游戏内部目的时，它们就变成了超越其他玩家的“增益”能力。玩家查看他人成就的能力给了玩家一种“炫耀的权利”。正如您毫无疑问所知道的，游戏中的炫耀权可以延长各种类型用户的游戏时间，无论是试图达到
    100%完成度，还是为了保持对同行的领先优势，抑或是将同行从榜首位置拉下来。


    随着支持社交网络的游戏不断普及，成就系统功能的热度更是直线上升。社交游戏中充斥着决心完成 100%游戏进度的特定玩家群体。


    Foursquare 是最早将成就带出游戏世界并引入社交应用领域的应用之一。Foursquare 将它的成就称为“贴纸”（见图 4-1），但其基本概念是相同的。玩家完成任务会获得奖励，但徽章的数量不会影响游戏玩法，或者在此例中，也不会以任何直接方式影响用户使用该应用。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig1_HTML.jpg](img/216283_2_En_4_Fig1_HTML.jpg)


    图 4-1  iPhone 上的 Foursquare 展示成就，在后续版本中更名为贴纸


    Game Center 使得为您的 iOS、Mac 或 Apple TV 应用添加成就系统变得非常简单。在本章中，我们将学习如何为我们的演示游戏 UFOs
    添加成就。您将学习快速轻松地将成就系统完全集成到您的应用中所需要的一切知识。具体来说，您将学习如何：


    - 创建新的成就

    - 显示成就进度

    - 在您的应用中添加成就钩子

    - 推进和重置成就

    - 自定义成就的外观


    ## 为什么要使用成就？


    如果您尚未明确成就能为您的社交应用或游戏带来什么，那么让我们花点时间来回顾一下它的诸多好处：


    - 成就给您的用户带来额外的成就感和奖励感。

    - 成就使用户更频繁地回到您的应用中。用户更有可能返回您的应用以完成更多成就，使完成游戏变成一个更有回报和更有趣的过程。

    - 成就为用户提供了一种与他人分享体验的简单方式。

    - Game Center 中的成就为最终产品提供了精致的外观和感觉。

    - 成就让用户在浏览您的应用或游戏时，获得更强烈的进展感。

    - 成就提供了另一种游戏方式。如果用户不喜欢战役模式，他们可以通过您的成就系统来享受成就感。

    - 成就归因于游戏品牌知名度。当用户在 Twitter、Facebook 和其他社交平台上分享他们的成就时，品牌认知度会提高，从而带动销量。


    ## Game Center 中的成就概述


    成就（在某些圈子中也称为徽章）在 Game Center 中的运作方式与其他平台略有不同。与排行榜一样，成就首先需要在 App Store Connect
    中为每个应用单独配置。您将创建 `GKAchievement` 对象的新实例来报告进度（稍后详细介绍此对象）。与提交分数时创建的排行榜条目不同，成就可以报告增量或部分进度。


    与排行榜（有关排行榜的更多信息，请参见第 3 章）工作的另一个显著区别是，您将使用两种不同类型的对象来提交和检索成就。`GKAchievement` 用于提交新成就或更新成就进度，而
    `GKAchievementDescription` 用于向用户显示成就数据。这与我们在排行榜中看到的情况相反，在排行榜中，`GKScore` 对象既用于提交数据，也用于检索数据。


    与排行榜一样，成就进度可以使用 Apple 自带的图形用户界面 (GUI) 显示，也可以使用更能匹配您应用外观和感觉的自定义 GUI 显示。每种系统的优缺点与排行榜相同。为方便您参考，现将这些优缺点列出如下，并在适当之处添加了细微的成就特定信息。


    ### 使用 Apple 成就 GUI 与自定义 GUI 的对比优势


    以下是使用 Apple 自带的 GUI 处理成就的一些优势：


    - 您的成就的外观和感觉由世界上一些最优秀的设计师打造。

    - GUI 非常简单且易于实现，使得向用户展示成就进度变得非常直接。

    - 用户喜欢他们已经知道如何交互的熟悉界面。

    - 您的应用比自行实现系统更具前瞻性。您的应用会自动受益于 Game Center 用户界面的每次修订。


    以下是在 iOS 设备上处理成就时使用您自己的 GUI 的一些优势：


    - 您的成就进度可以匹配您应用的定制设计。

    - 您对返回的数据拥有更多自由，并且可以使用附加条件进行过滤。

    - 您可以实现自己的自定义缓存行为。

    - 您可以为未完成或进行中的成就使用自定义图像。


    如您所见，与以往一样，每种系统都有其优点和缺点，并且对于您应该使用哪一种，没有唯一正确的答案。在本章结束时，您将对这些选项有更好的理解，并更有能力决定哪种方法最适合您的应用。


    如本节开头所述，您需要像处理排行榜一样，从 App Store Connect 开始处理成就。'
- fmt: '# Configuring Achievements in App Store Connect


    As we saw with leaderboards, you cannot begin working with achievements without
    first setting up at least one new achievement in App Store Connect. Log in to
    App Store Connect (`http://appstoreconnect.apple.com`) using your Apple connect
    username and password, and select the app that we have already been working with
    from the previous chapters (see Chapter 2 for more information). Once you have
    selected your app from the control panel, return to the Manage Features and then
    Game Center area that was introduced earlier in this book.


    The Game Center portal for your app will have a section labeled “Achievements.”
    You will find a “+” button in the upper left area of the achievement area. This
    button will allow you to set up a new achievement as seen in Figure 4-2.


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig2_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Adding a new achievement through the App Store Connect portal


    You might notice that there are a lot of similarities between this portal page
    and the leaderboard portal page. I break down the attributes in Table 4-1.


    Table 4-1


    Achievement Attributes in iTunes Connect


    | Attribute | Description |

    | --- | --- |

    | Achievement reference name | A string that is not used outside of iTunes Connect;
    this string is used to easily locate and reference this achievement within App
    Store Connect. |

    | Achievement ID | This is the identifier that you will refer to in your code.
    As with leaderboard categories, Apple recommends that you use a reverse DNS system
    such as `com.company.appname.achievementname`. |

    | Hidden | If an achievement is hidden, the user will not see it in the achievement
    list until they have either completed it or increased the progress. |

    | Point value | Achievements can be assigned points. Your app is allocated 1,000
    points. Each completed achievement progresses the user toward that total. Once
    the user has reached 1,000 points, they have unlocked all achievements. You should
    assign more points to achievements that are more difficult to complete. This provides
    the user with a better sense of how valuable the achievement is. Point values
    are optional and can be ignored if you do not want to use them within your app.
    |


    **Tip**


    You aren’t required to have your achievements add up to 1,000 total points, but
    you cannot exceed 1,000 points. Be careful of figuring in any future achievements
    you might want to add. Once an achievement has gone live, it cannot be removed
    from App Store Connect; however, it can be removed and hidden from your game.


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig3_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig3_HTML.jpg)


    Figure 4-3


    The configuration view for new achievements in App Store Connect


    It is now time to make a new achievement. We will create an achievement that will
    be reached when the user abducts 25 cows. We will use “Abduct 25” for the achievement
    name so it will be easy to find when we have dozens of achievements. For our achievement
    ID, we will use `com.dragonforged.ufo.abduct25`. Feel free to use whatever ID
    you want here, but make sure to substitute it for `com.dragonforged.ufo.abduct25`
    in the upcoming examples. We will make this an unhidden achievement and assign
    it a point value of 10.


    **Important**


    No achievement can have more than 100 points awarded for completing it.


    For an achievement to be valid, you must configure at least one language. As you
    can see in Figure 4-4, the localization area of achievements is much different
    than that encountered when creating leaderboards in the previous chapter. Refer
    to Table 4-2 for information on each attribute.


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig4_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig4_HTML.jpg)


    Figure 4-4


    Localizing an achievement in iTunes Connect


    **Note**


    Each game owns its achievement descriptions; you may not share achievement descriptions
    between multiple games.


    Table 4-2


    Localized Achievement Attributes in iTunes Connect


    | Attribute | Description |

    | --- | --- |

    | Language | Select the language in which this achievement will appear. You must
    set up a language for each localization that you will support in your shipping
    product. |

    | Title | This is the title that will appear within the app to describe this achievement.
    |

    | Pre-earned description | This is the description that appears when the achievement
    is unhidden and is unearned or only partially completed. |

    | Earned description | This is the description that is shown when the achievement
    has been fully unlocked and completed. |

    | Image | This is the image that will be displayed to the user when the achievement
    is earned. Apple will supply the unearned image, or you can specify your own when
    working with a custom achievement GUI. This image must be 512 x 512 and 72 DPI.
    |


    For our purposes, we will configure this achievement for English. I will use “Abduct
    25 Cows” as the title, but you may use any title that you prefer. For the pre-earned
    description, I chose “Abduct 25 cows with your UFO.” For the earned description,
    I used “You have mastered the art of cow abduction.” I will also use a cow crossing
    road sign as the image. When you are done, you should have a fully set up achievement,
    which should look similar to the view shown in Figure 4-5.


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig5_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig5_HTML.jpg)


    Figure 4-5


    A new achievement, as shown in iTunes Connect


    We will want to work with a couple of different achievement setups for our game.
    Go ahead and create another new achievement for abducting a single cow; this will
    be our nonprogressive achievement. Then, make a third achievement for five-minute
    playtime and set it to hidden. This last achievement will let us work with timers,
    progressive achievements, and hidden achievements. You may select any point values,
    descriptions, titles, and images you want for these achievements, but make sure
    you remember the achievement IDs.


    You should now have three achievements configured in App Store Connect for our
    game.


    We can now get back into Xcode and begin working with these achievements.'
