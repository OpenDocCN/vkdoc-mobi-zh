    \    gameVC.gcManager = gcManager\n    gameVC.gameIsMultiplayer = true\n    gameVC.peerMatch\
    \ = match\n    navigationController?.pushViewController(gameVC, animated: true)\n\
    }\n```\n\n上述函数中需要重点关注的改动是，将处理传入数据请求的委托设置为我们的 `GameCenterManager` 类。这使我们能够在一个集中的位置处理所有传入的数据；然后从那里，我们可以将数据转发到\
    \ App 的相关部分。\n\n接下来，你需要将以下函数添加到你的 `GameCenterManager` 类中。这个新函数用于处理来自 Game Center\
    \ 的传入数据。该函数假设我们只处理传入的字符串，因为这是我们在处理游戏内发送数据时选择的设计方案。你可以轻松地调整此方法来处理其他类型的对象。此外，我们将扩展这个新函数以处理游戏特定数据。你还可以进一步调整此设置，使用更复杂、更智能的数据解析系统，但对于\
    \ UFO 游戏的需求来说，当前方案已经绰绰有余。\n\n```\nfunc receivedData(_ dataDictionary: [AnyHashable\
    \ : Any]?) {\n    guard let dataDictionary = dataDictionary as? [String: String]\
    \ else { return }\n}\n```\n\n**提示：** 你可以使用 `context` 属性将任意数据传递给 `received` 委托方法。\n\
    \n进一步修改 `receivedData` 函数，以处理游戏中可能出现的所有数据类型：\n\n```\nfunc receivedData(_ dataDictionary:\
    \ [AnyHashable : Any]?) {\n    guard let dataDictionary = dataDictionary as? [String:\
    \ String] else { return }\n    determineHost(dataDictionary)\n}\n```\n\n现在剩下的就是实现我们的函数，以确定哪个玩家是主机；添加一个新的函数，如下面的代码片段所示：\n\
    \n```\nfunc determineHost(_ dataDictionary: [String : String]?) {\n    if Double(dataString\
    \ ?? \"\") ?? 0.0 == randomHostNumber {\n        print(\"主机编号相同，需要重新生成\")\n  \
    \      generateAndSendHostNumber()\n    } else if Double(dataString ?? \"\") ??\
    \ 0.0 > randomHostNumber {\n        isHost = true\n        for _ in 0..<5 {\n\
    \            spawnCow()\n        }\n        updateCowPaths()\n    } else if Double(dataString\
    \ ?? \"\") ?? 0.0 < randomHostNumber {\n        isHost = false\n    }\n}\n```\n\
    \n如果你现在在两个设备上运行游戏，你可以看到每个日志都反映了该设备是否被指定为主机，或者另一台设备是否为主机。不过，`receivedData` 函数存在很大缺陷，因为它只处理主机数据消息。在下一节中，我们将完善这个函数，使其不仅能接受主机消息，还能接受玩家移动、奶牛移动和其他游戏操作等输入。\n\
    \n现在，你已经掌握了在两个不同的 iOS、Mac 或 Apple TV 设备之间发送数据，以及接收、解析这些数据并让系统做出反应的所有基本技能。如果你想在实际操作中尝试这些调用，下一节将引导你在我们的\
    \ UFO 游戏中完成几个发送和接收数据的示例。\n\n## 整合所有内容\n\n在上一节中，我们学习了如何接收发送到设备的数据。在本节中，我们将演练如何将接收到的数据实际用于我们的游戏。我们将添加第二个玩家，允许通过网络发送移动信息，同步两台设备之间的状态数据（例如奶牛移动），追踪每个玩家的得分，并完成与我们特定游戏相关的各种其他必要的后台任务。\n\
    \n### 选择主机\n\n让我们从改进上一节实现的主机选择逻辑开始。现在，我们接收到的任何数据都被假定为主机编号。由于我们接收到的大部分数据并不是主机编号，我们需要找到一种方法来过滤这些数据，以便能够解析它们。修改\
    \ `generateAndSendHostNumber` 函数，使其与以下代码块一致：\n\n```\nfunc generateAndSendHostNumber()\
    \ {\n    randomHostNumber = Double(arc4random())\n    let randomNumberString =\
    \ \"$Host:\\(randomHostNumber)\"\n    gcManager?.sendStringToAllPeers(randomNumberString,\
    \ reliable: true)\n}\n```\n\n如你所见，我们现在在将要发送的消息中添加了一个标识符前缀。在本示例中，我选择了 `$Host:`\
    \ 作为前缀，但你可以使用任何你想要的系统。此外，我们需要修改 `receivedData` 回调以支持新的格式。\n\n```\nfunc receivedData(_\
    \ dataDictionary: [AnyHashable : Any]?) {\n    guard let dataDictionary = dataDictionary\
    \ as? [String: String] else { return }\n    if dataDictionary[\"data\"]?.hasPrefix(\"\
    $Host:\") ?? false {\n        determineHost(dataDictionary)\n    } else {\n  \
    \      print(\"无法确定消息类型：\\(dataDictionary)\")\n    }\n}\n```\n\n如果我们确定该消息是一条主机消息，我们会将其发送给一个名为\
    \ `determineHost` 的新辅助函数，以确定哪个设备是主机。如果我们无法确定消息类型，则会在控制台打印一条警告消息，这将有助于我们后续的调试。我们需要将\
    \ `receivedData` 中的旧代码移动到 `determineHost` 中。除了移动代码外，我们还需要去掉前缀。虽然去除前缀有一定开销，但这是完成此任务最简单的方法。在更复杂的应用程序中，你可能需要设计一个更健壮的消息系统。\n\
    \n```\nfunc determineHost(_ dataDictionary: [String : String]?) {\n    let dataString\
    \ = dataDictionary?[\"data\"]?.replacingOccurrences(of: \"$Host:\", with: \"\"\
    )\n    if Double(dataString ?? \"\") ?? 0.0 == randomHostNumber {\n        print(\"\
    主机编号相同，需要重新生成\")\n        generateAndSendHostNumber()\n    } else if Double(dataString\
    \ ?? \"\") ?? 0.0 > randomHostNumber {\n        isHost = true\n    } else if Double(dataString\
    \ ?? \"\") ?? 0.0 < randomHostNumber {\n        isHost = false\n    }\n}\n```\n\
    \n现在我们仍然可以确定谁是主机，但我们已经打开了大门，能够处理更多类型的数据，而不仅仅是这一种。\n\n下一步是在我们的游戏中传输并显示对手的 UFO。在本章中，我向项目添加了两个新图片：`EnemySaucer1.png`\
    \ 和 `EnemySaucer2.png`。它们的形状与原始图片相同，但使用了不同的配色方案。我们将使用这些新素材来显示对手的飞船。\n"
- fmt: "### Displaying the Enemy UFO\n\nThe first thing we need to do is detect whether\
    \ we are a multiplayer game, and if so, we need to draw the enemy UFO in the `viewDidLoad`\
    \ function of `UFOGameViewController`. You will notice this is the exact same\
    \ code we use for drawing the player in single-player mode except we use a different\
    \ graphic asset.\n\n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
    \    if gameIsMultiplayer {\n        let otherPlayerFrame = CGRect(x: 100, y:\
    \ 70, width: 80, height: 34)\n        otherPlayerImageView = UIImageView(frame:\
    \ otherPlayerFrame)\n        otherPlayerImageView?.animationDuration = 0.75\n\
    \        otherPlayerImageView?.animationRepeatCount = 99999\n        let imageArray\
    \ = [UIImage(named: \"EnemySaucer1.png\"), UIImage(named: \"EnemySaucer2.png\"\
    )]\n        otherPlayerImageView?.animationImages = imageArray.compactMap { $0\
    \ }\n        otherPlayerImageView?.startAnimating()\n        if let otherPlayerImageView\
    \ = otherPlayerImageView {\n            view.addSubview(otherPlayerImageView)\n\
    \        }\n    }\n}\n```\n\nIf we were to run the game on two devices and begin\
    \ a new multiplayer game, we would now see a red enemy UFO that just sits in the\
    \ sky. The next step is to send our movement data to our peer so that they can\
    \ update where the enemy player is. To do so, we add a new code snippet to the\
    \ end of our `movePlayer` function.\n\n```\nfunc movePlayer(_ vertical: double,\
    \ _ horizontal: double) {\n    //...\n    if gameIsMultiplayer {\n        let\
    \ positionString = \"$PlayerPosition: \\(playerFrame?.origin.x ?? 0.0) \\(playerFrame?.origin.y\
    \ ?? 0.0)\"\n        gcManager?.sendStringToAllPeers(positionString, reliable:\
    \ false)\n    }\n}\n```\n\nHere we send your player’s x and y coordinates to the\
    \ peer every time you move. We will be sending the data as unreliable, since if\
    \ we fail, we can just use the next packet. You may remember back to Chapter [7](#216283_2_En_7_Chapter.xhtml)\
    \ that this is one of the benefits of sending the full data instead of the delta\
    \ of the movement. The data will always be updating while the player is moving.\n\
    \nThis would be a great place to use predictive technology, as discussed in Chapter\
    \ [7](#216283_2_En_7_Chapter.xhtml), but for simplicity’s sake, we will be syncing\
    \ every frame. In addition, there are better ways to send the x and y coordinates\
    \ to another device, such as a dictionary or custom data format. However, encoding\
    \ them into a string is the easiest to understand. As you develop your game or\
    \ app, you can design this type of function to be more streamlined with less overhead.\n\
    \n> **Tip**\n> \n> Using `stringWithFormat` carries with it a lot of overhead.\
    \ In practice, you should use methods such as `stringByAppendingString` to further\
    \ optimize this type of code.\n\nWe also need to update our `receivedData` function\
    \ to handle the new type of data we are expecting. Modify that function to match\
    \ the new one as follows. In addition, we add a new function to parse the incoming\
    \ data. Also add a new function called `drawEnemyShipWithData`, as follows:\n\n\
    ```\nfunc receivedData(_ dataDictionary: [AnyHashable : Any]?) {\n    guard let\
    \ dataDictionary = dataDictionary as? [String: String] else { return }\n    if\
    \ dataDictionary[\"data\"]?.hasPrefix(\"$Host:\") ?? false {\n        determineHost(dataDictionary)\n\
    \    } else if dataDictionary[\"data\"]?.hasPrefix(\"$PlayerPosition:\") ?? false\
    \ {\n        drawEnemyShip(withData: dataDictionary)\n    } else {\n        print(\"\
    Unable to determine type of message: \\(dataDictionary)\")\n    }\n}\n\nfunc drawEnemyShip(withData\
    \ dataDictionary: [String : String]?) {\n    let dataArray = dataDictionary?[\"\
    data\"]?.components(separatedBy: \" \")\n    let x = Double(dataArray?[1] ?? \"\
    \") ?? 0.0\n    let y = Double(dataArray?[2] ?? \"\") ?? 0.0\n    otherPlayerImageView?.frame\
    \ = CGRect(x: CGFloat(x), y: CGFloat(y), width: 80, height: 34)\n}\n```\n\nThis\
    \ function parses the incoming data from the network. We pull the x and y coordinates\
    \ out of the string that we received, and we update the enemy player’s frame with\
    \ the new position. This type of approach is syncing the two devices frame by\
    \ frame and is very inefficient. Given more time, this function should be updated\
    \ to use predictive technology to determine where the player is heading and only\
    \ update the feed if the player goes against the prediction. However, for the\
    \ purposes of this demo, it suits our needs. For more information on predictive\
    \ networking, see Chapter [7](#216283_2_En_7_Chapter.xhtml).\n\nIf you were to\
    \ run the game now and begin a new multiplayer game, you would see that each device\
    \ reflects the movement of its partnered device. We still need to spawn the cows,\
    \ add the tractor beam, and update the scores, but we have a functional (albeit\
    \ dull, for the time being) multiplayer game, as shown in Figure [7-1](#216283_2_En_7_Chapter.xhtml#Fig1).\n\
    \n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig1_HTML.jpg](images/216283_2_En_7_Chapter/216283_2_En_7_Fig1_HTML.jpg)\n\
    \n*Figure 7-1. Adding a second player to UFOs. Each player can move around independently\
    \ and is kept in sync through the network.*"
  raw: '### Displaying the Enemy UFO


    The first thing we need to do is detect whether we are a multiplayer game, and
    if so, we need to draw the enemy UFO in the viewDidLoad function of UFOGameViewController.
    You will notice this is the exact same code we use for drawing the player in single-player
    mode except we use a different graphic asset.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    if gameIsMultiplayer {

    let otherPlayerFrame = CGRect(x: 100, y: 70, width: 80, height: 34)

    otherPlayerImageView = UIImageView(frame: otherPlayerFrame)

    otherPlayerImageView?.animationDuration = 0.75

    otherPlayerImageView?.animationRepeatCount = 99999

    let imageArray = [UIImage(named: "EnemySaucer1.png"), UIImage(named: "EnemySaucer2.png")]

    otherPlayerImageView?.animationImages = imageArray.compactMap { $0 }

    otherPlayerImageView?.startAnimating()

    if let otherPlayerImageView = otherPlayerImageView {

    view.addSubview(otherPlayerImageView)

    }

    }

    }

    ```


    If we were to run the game on two devices and begin a new multiplayer game, we
    would now see a red enemy UFO that just sits in the sky. The next step is to send
    our movement data to our peer so that they can update where the enemy player is.
    To do so, we add a new code snippet to the end of our movePlayer function.


    ```

    func movePlayer(_ vertical: double, _ horizontal: double) {

    //...

    if gameIsMultiplayer {

    let positionString = "$PlayerPosition: \(playerFrame?.origin.x ?? 0.0) \(playerFrame?.origin.y
    ?? 0.0)"

    gcManager?.sendStringToAllPeers(positionString, reliable: false)

    }

    }

    ```


    Here we send your player’s x and y coordinates to the peer every time you move.
    We will be sending the data as unreliable, since if we fail, we can just use the
    next packet. You may remember back to Chapter [7](#216283_2_En_7_Chapter.xhtml)
    that this is one of the benefits of sending the full data instead of the delta
    of the movement. The data will always be updating while the player is moving.


    This would be a great place to use predictive technology, as discussed in Chapter
    [7](#216283_2_En_7_Chapter.xhtml), but for simplicity’s sake, we will be syncing
    every frame. In addition, there are better ways to send the x and y coordinates
    to another device, such as a dictionary or custom data format. However, encoding
    them into a string is the easiest to understand. As you develop your game or app,
    you can design this type of function to be more streamlined with less overhead.


    Tip


    Using stringWithFormat carries with it a lot of overhead. In practice, you should
    use methods such as stringByAppendingString to further optimize this type of code.


    We also need to update our receivedData function to handle the new type of data
    we are expecting. Modify that function to match the new one as follows. In addition,
    we add a new function to parse the incoming data. Also add a new function called
    drawEnemyShipWithData, as follows:


    ```

    func receivedData(_ dataDictionary: [AnyHashable : Any]?) {

    guard let dataDictionary = dataDictionary as? [String: String] else { return }

    if dataDictionary["data"]?.hasPrefix("$Host:") ?? false {

    determineHost(dataDictionary)

    } else if dataDictionary["data"]?.hasPrefix("$PlayerPosition:") ?? false {

    drawEnemyShip(withData: dataDictionary)

    else {

    print("Unable to determine type of message: \(dataDictionary)")

    }

    }

    func drawEnemyShip(withData dataDictionary: [String : String]?) {

    let dataArray = dataDictionary?["data"]?.components(separatedBy: " ")

    let x = Double(dataArray?[1] ?? "") ?? 0.0

    let y = Double(dataArray?[2] ?? "") ?? 0.0

    otherPlayerImageView?.frame = CGRect(x: CGFloat(x), y: CGFloat(y), width: 80,
    height: 34)

    }

    ```


    This function parses the incoming data from the network. We pull the x and y coordinates
    out of the string that we received, and we update the enemy player’s frame with
    the new position. This type of approach is syncing the two devices frame by frame
    and is very inefficient. Given more time, this function should be updated to use
    predictive technology to determine where the player is heading and only update
    the feed if the player goes against the prediction. However, for the purposes
    of this demo, it suits our needs. For more information on predictive networking,
    see Chapter [7](#216283_2_En_7_Chapter.xhtml).


    If you were to run the game now and begin a new multiplayer game, you would see
    that each device reflects the movement of its partnered device. We still need
    to spawn the cows, add the tractor beam, and update the scores, but we have a
    functional (albeit dull, for the time being) multiplayer game, as shown in Figure
    [7-1](#216283_2_En_7_Chapter.xhtml#Fig1).


    ![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig1_HTML.jpg](images/216283_2_En_7_Chapter/216283_2_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Adding a second player to UFOs. Each player can move around independently and
    is kept in sync through the network'
  trans: "\n### 显示敌方 UFO\n\n我们首先需要检测当前是否为多人游戏，如果是，则需在 `UFOGameViewController` 的 `viewDidLoad`\
