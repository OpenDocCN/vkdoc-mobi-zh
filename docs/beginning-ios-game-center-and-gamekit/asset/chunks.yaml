- fmt: "# 3. Leaderboards\n\nLeaderboards are older than video games themselves. The\
    \ leaderboard, as we know it, goes back to the days of the original pinball games\
    \ of the 1950s. The makers of these pinball games soon realized that adding a\
    \ high-score list increased competition, which translates to more time played\
    \ and more money earned.\n\nDuring the 1970s, when video games began to emerge,\
    \ leaderboards were quickly adopted into these new games, making their first appearance\
    \ in `Sea Wolf`, released in 1976 (see Figure [3-1](#216283_2_En_3_Chapter.xhtml#Fig1)).\
    \ Since then, they have played an integral part of the gaming culture. Leaderboards\
    \ have become so widespread that, in 2007, *The King of Kong*, a full-length documentary,\
    \ was released about the heated competition over the high score on Nintendo’s\
    \ `Donkey Kong`. *The King of Kong* was so popular that it even led to a musical\
    \ titled *King of Kong: The Musical* and a rumored scripted film adaptation is\
    \ in the works by director Seth Gordon. Leaderboards have become so mainstream\
    \ that they are now an expected part of any video game. They remain one of the\
    \ easiest ways to build in completeness and replayability to a game.\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig1_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig1_HTML.jpg)\n\
    \n**Figure 3-1**  \n`Sea Wolf` (1976), the first video game to feature a high\
    \ score\n\n`Game Center` for iOS, Mac, and Apple TV greatly simplifies adding\
    \ leaderboards to your project. This is a huge improvement when you consider that,\
    \ previously, a developer had to write and maintain a server to hold, push, and\
    \ retrieve the scores from. In this chapter, we examine the steps required to\
    \ implement multiple leaderboards under `Game Center`, as well as all the required\
    \ leaderboard support. You learn how to post scores, retrieve leaderboards, customize\
    \ the graphical user interface (GUI) of leaderboards, and everything else needed\
    \ to create leaderboards that are the right fit for your app.\n\n## Why a Leaderboard?\n\
    \nBefore we get into working with leaderboards themselves, it is important to\
    \ understand why leaderboards are an integral part of your social app or game:\n\
    \n- Leaderboards create a sense of community in an app or game that, otherwise,\
    \ might not allow your user to interact directly with other users.\n- Leaderboards\
    \ drive users to return to your app in an effort to beat their own, their friends,\
    \ or the community at large scores.\n- Leaderboards create a sense of goal and\
    \ accomplishment in an app.\n- Leaderboards make it easier for users to share\
    \ their app experience and progress with their friends, family, and peers.\n-\
    \ Leaderboards in `Game Center` are easy to implement and can make your app quickly\
    \ feel more polished and finished.\n\n## An Overview of Leaderboards in Game Center\n\
    \nA leaderboard, in the sense of `Game Center`, is an array of `GKScore` objects\
    \ related to a specific leaderboard identifier, of which many can exist per app.\
    \ Leaderboards can be retrieved and further filtered based on friend status and\
    \ date submitted.\n\n`GKScore` objects represent each entry on a specific leaderboard.\
    \ A `GKScore` always has a player ID associated with it. When submitting a new\
    \ `GKScore` to a leaderboard, the player ID is set automatically by the API and\
    \ cannot be changed. There are also values for the date and rank that are automatically\
    \ set and updated. You are required to set only the raw score value and leaderboard\
    \ category to which the score belongs.\n\nThere are two ways to retrieve and display\
    \ leaderboards. The most common, and easiest, method is by using Apple’s leaderboard\
    \ GUI. This will be the first approach we learn about in the following sections.\
    \ The second option is to retrieve the raw `GKScore` values and display them in\
    \ your own GUI; this method is also discussed later in this chapter. Leaderboard\
    \ sets were introduced in iOS 7; these sets allow the developer to combine several\
    \ leaders together into a single group. Leaderboard sets are flexible and may\
    \ be used in many different ways, the most popular is to have groups of leaderboards\
    \ for different worlds or difficulties in your game. You can define up to 100\
    \ leaderboard sets each containing up to 100 leaderboards.\n\n**Note**\n\n`Game\
    \ Center` currently has a limit of 100 leaderboards or leaderboard sets per bundle\
    \ ID. When you work with leaderboard sets, the leaderboard limit is increased\
    \ to 500 while still respecting the 100 leaderboards per leaderboard set limit.\n\
    \n### Benefits of Using Apple’s Leaderboard GUI vs. a Custom GUI\n\nBenefits of\
    \ using Apple’s leaderboard GUI include the following:\n\n- The design was created\
    \ by some of the best designers in the world. When Apple updates the designs,\
    \ they will automatically be updated in your app, giving your user interface an\
    \ instant facelift and keeping it feeling more modern, even if you haven’t been\
    \ regularly updating.\n- It is very simple to implement and present the leaderboard.\n\
    - Users will see a familiar interface that they already know how to interact with.\n\
    \nBenefits of using a custom GUI include the following:\n\n- Your leaderboard\
    \ can match the custom design of your app.\n- You have more freedom over the resulting\
    \ data and can filter using additional criteria.\n- You can implement your own\
    \ custom caching behavior.\n\nAs you can see, there are advantages and disadvantages\
    \ of each system, and there is no right answer in which one you should be using.\
    \ At the end of this chapter, you will have a strong background in both options\
    \ and will be able to make the correct decision on which method to implement based\
    \ on the specific needs of your app."
  raw: '# 3. Leaderboards


    Leaderboards are older than video games themselves. The leaderboard, as we know
    it, goes back to the days of the original pinball games of the 1950s. The makers
    of these pinball games soon realized that adding a high-score list increased competition,
    which translates to more time played and more money earned.


    During the 1970s, when video games began to emerge, leaderboards were quickly
    adopted into these new games, making their first appearance in Sea Wolf, released
    in 1976 (see Figure [3-1](#216283_2_En_3_Chapter.xhtml#Fig1)). Since then, they
    have played an integral part of the gaming culture. Leaderboards have become so
    widespread that, in 2007, *The King of Kong*, a full-length documentary, was released
    about the heated competition over the high score on Nintendo’s Donkey Kong. *The
    King of Kong* was so popular that it even led to a musical titled *King of Kong:
    The Musical* and a rumored scripted film adaptation is in the works by director
    Seth Gordon. Leaderboards have become so mainstream that they are now an expected
    part of any video game. They remain one of the easiest ways to build in completeness
    and replayability to a game.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig1_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Sea Wolf (1976), the first video game to feature a high score


    Game Center for iOS, Mac, and Apple TV greatly simplifies adding leaderboards
    to your project. This is a huge improvement when you consider that, previously,
    a developer had to write and maintain a server to hold, push, and retrieve the
    scores from. In this chapter, we examine the steps required to implement multiple
    leaderboards under Game Center, as well as all the required leaderboard support.
    You learn how to post scores, retrieve leaderboards, customize the graphical user
    interface (GUI) of leaderboards, and everything else needed to create leaderboards
    that are the right fit for your app.


    ## Why a Leaderboard?


    Before we get into working with leaderboards themselves, it is important to understand
    why leaderboards are an integral part of your social app or game:


    *   Leaderboards create a sense of community in an app or game that, otherwise,
    might not allow your user to interact directly with other users.


    *   Leaderboards drive users to return to your app in an effort to beat their
    own, their friends, or the community at large scores.


    *   Leaderboards create a sense of goal and accomplishment in an app.


    *   Leaderboards make it easier for users to share their app experience and progress
    with their friends, family, and peers.


    *   Leaderboards in Game Center are easy to implement and can make your app quickly
    feel more polished and finished.


    ## An Overview of Leaderboards in Game Center


    A leaderboard, in the sense of Game Center, is an array of GKScore objects related
    to a specific leaderboard identifier, of which many can exist per app. Leaderboards
    can be retrieved and further filtered based on friend status and date submitted.


    GKScore objects represent each entry on a specific leaderboard. A GKScore always
    has a player ID associated with it. When submitting a new GKScore to a leaderboard,
    the player ID is set automatically by the API and cannot be changed. There are
    also values for the date and rank that are automatically set and updated. You
    are required to set only the raw score value and leaderboard category to which
    the score belongs.


    There are two ways to retrieve and display leaderboards. The most common, and
    easiest, method is by using Apple’s leaderboard GUI. This will be the first approach
    we learn about in the following sections. The second option is to retrieve the
    raw GKScore values and display them in your own GUI; this method is also discussed
    later in this chapter. Leaderboard sets were introduced in iOS 7; these sets allow
    the developer to combine several leaders together into a single group. Leaderboard
    sets are flexible and may be used in many different ways, the most popular is
    to have groups of leaderboards for different worlds or difficulties in your game.
    You can define up to 100 leaderboard sets each containing up to 100 leaderboards.


    Note


    Game Center currently has a limit of 100 leaderboards or leaderboard sets per
    bundle ID. When you work with Leaderboard sets, the leaderboard limit is increased
    to 500 while still respecting the 100 leaderboards per leaderboard set limit.
    .


    ### Benefits of Using Apple’s Leaderboard GUI vs. a Custom GUI


    Benefits of using Apple’s leaderboard GUI include the following:


    *   The design was created by some of the best designers in the world. When Apple
    updates the designs, they will automatically be updated in your App, giving your
    user interface an instant facelift and keeping it feeling more modern, even if
    you haven’t been regularly updating.


    *   It is very simple to implement and present the leaderboard.


    *   Users will see a familiar interface that they already know how to interact
    with.


    Benefits of using a custom GUI include the following:


    *   Your leaderboard can match the custom design of your app.


    *   You have more freedom over the resulting data and can filter using additional
    criteria.


    *   You can implement your own custom caching behavior.


    As you can see, there are advantages and disadvantages of each system, and there
    is no right answer in which one you should be using. At the end of this chapter,
    you will have a strong background in both options and will be able to make the
    correct decision on which method to implement based on the specific needs of your
    app.'
  trans: "\n# 3. 排行榜\n\n排行榜的历史比电子游戏本身还要悠久。我们熟知的排行榜，可以追溯到 20 世纪 50 年代最初的弹球游戏时代。这些弹球游戏的制造商很快意识到，增加一个最高分列表能提升竞争性，这也就意味着玩家会玩得更久、赚取更多收入。\n\
    \n到了 20 世纪 70 年代，电子游戏开始兴起时，排行榜迅速被这些新游戏采纳，首次出现在 1976 年发布的`Sea Wolf`游戏中（见图 3-1）。从那以后，排行榜便成为游戏文化中不可或缺的一部分。排行榜变得如此普及，以至于\
    \ 2007 年还上映了一部名为《金刚之王》的长篇纪录片，讲述了围绕任天堂`Donkey Kong`最高分展开的激烈竞争。《金刚之王》大受欢迎，甚至催生了一部名为《金刚之王：音乐剧》的音乐剧，并且传闻导演塞斯·戈登正在筹备改编成剧本电影。排行榜已成为主流，如今每款电子游戏都期待它的存在。它仍然是提升游戏完整度和可重玩性最简单的途径之一。\n\
    \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig1_HTML.jpg](img/216283_2_En_3_Fig1_HTML.jpg)\n\
    \n**图 3-1**  \n`Sea Wolf`（1976 年），第一款引入最高分功能的电子游戏\n\niOS、Mac 和 Apple TV 平台下的`Game\
    \ Center`极大简化了在项目中添加排行榜的工作。这是一个巨大的进步，因为在此之前，开发者必须自行编写和维护一个服务器来存储、推送和获取分数。在本章中，我们将探讨在`Game\
    \ Center`中实现多个排行榜所需的步骤，以及所有必要的排行榜支持。你将学习如何提交分数、获取排行榜、自定义排行榜的图形用户界面（GUI），以及创建适合你应用的排行榜所需的所有内容。\n\
    \n## 为什么要使用排行榜？\n\n在着手处理排行榜本身之前，理解排行榜为何能成为社交应用或游戏不可或缺的一部分至关重要：\n\n- 排行榜能在应用或游戏中营造社区感，否则用户可能无法直接与其他用户互动。\n\
    - 排行榜能驱使用户为了超越自己、朋友或整个社区的分数而再次打开你的应用。\n- 排行榜能在应用中营造目标感和成就感。\n- 排行榜让用户更容易与朋友、家人和同伴分享他们的应用体验和进度。\n\
    - `Game Center`中的排行榜易于实现，能让你的应用迅速显得更加精致和完善。\n\n## Game Center 排行榜概览\n\n在`Game\
    \ Center`中，排行榜是与某个特定排行榜标识符相关的一组`GKScore`对象，每个应用可以拥有多个排行榜。可以根据好友状态和提交日期来获取并进一步筛选排行榜。\n\
    \n`GKScore`对象代表特定排行榜上的每一个条目。一个`GKScore`总是关联一个玩家 ID。当向排行榜提交新的`GKScore`时，玩家 ID 由\
    \ API 自动设置且无法更改。日期和排名等数值也会自动设置和更新。你只需设置原始分数值和该分数所属的排行榜类别。\n\n获取和显示排行榜有两种方式。最常见也最简单的方法是使用\
    \ Apple 的排行榜 GUI。这是我们在后续章节中首先学习的方法。第二种方法是获取原始的`GKScore`值，并在你自己的 GUI 中显示它们；本章稍后也会讨论这种方法。排行榜集是在\
    \ iOS 7 中引入的；这些集合允许开发者将多个排行榜组合成一个组。排行榜集非常灵活，可以以多种不同方式使用，最流行的是为游戏中的不同世界或难度级别创建排行榜组。你可以定义多达\
    \ 100 个排行榜集，每个集合最多包含 100 个排行榜。\n\n**注意**\n\n`Game Center`目前对每个捆绑包 ID 的排行榜或排行榜集数量限制为\
    \ 100 个。当你使用排行榜集时，排行榜的限制会提高到 500 个，同时仍然遵守每个排行榜集最多包含 100 个排行榜的限制。\n\n### 使用 Apple\
    \ 排行榜 GUI 与自定义 GUI 的优缺点\n\n使用 Apple 排行榜 GUI 的优点包括：\n\n- 其设计出自世界顶尖设计师之手。当 Apple\
    \ 更新设计时，它们会自动在你的应用中更新，让你的用户界面瞬间焕然一新，并保持更现代的感觉，即使你没有定期更新。\n- 实现和显示排行榜非常简单。\n- 用户会看到一个他们已熟知如何操作的熟悉界面。\n\
    \n使用自定义 GUI 的优点包括：\n\n- 你的排行榜可以与应用的定制设计相匹配。\n- 你对最终数据有更多掌控权，并可以使用额外标准进行筛选。\n-\
    \ 你可以实现自己的自定义缓存逻辑。\n\n如你所见，每种系统都有其优缺点，并没有哪个是绝对正确的选择。在本章结束时，你将掌握这两种方式的坚实基础，并能根据你应用的具体需求，就采用哪种方法做出正确决策。\n"
- fmt: '# Configuring a Leaderboard in App Store Connect


    Before working with the code side of leaderboards, you must first set up a new
    leaderboard in App Store Connect. Log in to App Store Connect ([`https://appstoreconnect.apple.com/`](https://appstoreconnect.apple.com/)),
    and select the app that we have already been working with from Chapters [1](#216283_2_En_1_Chapter.xhtml)
    and [2](#216283_2_En_2_Chapter.xhtml). Once you have selected your app from the
    control panel, go to the Features area, and then select Game Center.


    The Game Center portal for your app will have a section labeled “Leaderboards.”
    Once you are in the leaderboard section (see Figure [3-2](#216283_2_En_3_Chapter.xhtml#Fig2)),
    select the “+” button in the upper left-hand corner of the leaderboard section.
    You will be prompted to select either a Classic Leaderboard or a Recurring Leaderboard.
    A Classic Leaderboard will build a list of scores which are permanent to your
    game and will never reset. Alternatively, a Recurring Leaderboard will have a
    fixed amount of time specified that the leaderboard will automatically reset,
    such as weekly.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig2_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Adding a new leaderboard in App Store Connect


    We begin by creating a new classic leaderboard, as shown in Figure [3-3](#216283_2_En_3_Chapter.xhtml#Fig3).
    The first thing you need to enter is the Leaderboard Reference Name. This value
    is used solely as a reference within App Store Connect. The reference name is
    designed to help you quickly find leaderboards within App Store Connect; the user
    never sees it. For this example, you can use the reference name `Leaderboard Foo`.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig3_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig3_HTML.jpg)


    Figure 3-3


    Creating a new classic leaderboard in App Store Connect


    The next field is the Leaderboard ID, the value you will query in your code to
    retrieve a particular leaderboard. Apple recommends that you use a reverse DNS-type
    entry for this field, such as `com.company.appname.leaderboardname`. Fill in the
    appropriate values for your app here; it is not important what they are, but you
    will need to remember them throughout the remainder of this chapter.


    The score format type is also required when creating a new leaderboard. Select
    the score format that meets the requirements for your score data. For information
    on score data formats, see Table [3-1](#216283_2_En_3_Chapter.xhtml#Tab1).


    Table 3-1


    Score Format Types for Adding a New Leaderboard in App Store Connect


    | Score Format Type | Example Output |

    | --- | --- |

    | Integer | 12,345 |

    | Fixed point, to 1 decimal | 12,345.1 |

    | Fixed point, to 2 decimals | 12,345.12 |

    | Fixed point, to 3 decimals | 12,345.123 |

    | Elapsed time, to the minute | 3:45 |

    | Elapsed time, to the second | 3:45:55 |

    | Elapsed time, to the hundredth of a Second | 3:45:55.82 |

    | Money, whole numbers | $182,121 |

    | Money, to 2 decimals | $182,121.68 |


    **Tip**


    If none of the provided format types match your requirements, select the one that
    best matches your needs. Later in this chapter, you will see how to customize
    these values by retrieving the raw score values.


    The next field is for the Score Submission Type; there are two options available:
    Best Score and Most Recent Score. Select Best Score if you want the best score
    displayed first. Select Most Recent Score if you want the most recent score displayed
    first.


    You also need to select whether you want the leaderboard to sort by ascending
    or descending order. Ascending order will display the lowest score first, as in
    a golf game or a lap around a track. Descending order will show the highest scores
    first, as in a game of football or a typical score in a first-person shooter.


    There is also an optional score range field. This prevents users from submitting
    scores outside of the approved range; for example, if you have a golf game, you
    can’t reasonably expect someone to submit a score of under 18 for an 18-hole game;
    likewise you probably don’t want someone to be able to submit a score of 100,000.
    This field is optional but can prevent out-of-whack leaderboard caused by mischievous
    user behavior.


    The last thing that needs to be done when creating a new classic leaderboard is
    entering the localized score information, as shown in Figure [3-4](#216283_2_En_3_Chapter.xhtml#Fig4).
    App Store Connect contains built-in localization support for Game Center; you
    will need to create a new entry for each language you want to support. You can
    also add a unique image to be displayed along with your localized leaderboard.


    The Name field is the display name for your leaderboard in the chosen language.
    The Score Format field will vary depending on the score format type you selected
    on the previous screen. (See Figure [3-4](#216283_2_En_3_Chapter.xhtml#Fig4) for
    an example of money formatting.) You also need to provide a score format suffix.
    This string will be appended to the end of your score value when retrieving the
    formatted score property.


    **Caution**


    You will need to add at least one language for every leaderboard you create before
    it can be considered valid.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig4_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig4_HTML.jpg)


    Figure 3-4


    Editing the localization information on a new leaderboard


    **Tip**


    If you want a space to appear between the score and the score format suffix in
    the formatted score value, don’t forget to add a space before the beginning of
    the score suffix.


    You now have a classic leaderboard configured for your app. There may be situations
    in which you want to create a leaderboard set, or a group of leaderboards that
    have a common attribute. For example, your game has several different worlds with
    each world containing several leaderboards for most coins collected, highest score
    obtained, and most enemies killed. In order to enable a leaderboard set, we need
    at least two leaderboards that share the same type of score format. Go ahead and
    create a second classic leaderboard now.


    Once you have two leaderboards that share the same score format type, you can
    create a leaderboard set. Once you have two leaderboards created, an option labeled
    `More` will appear at the top right portion of the Leaderboard interface section.
    The option `Move All Leaderboards Into Leaderboard Set` will begin the process
    of setting up a leaderboard set. The main difference is that you need to select
    the leaderboards you want to combine, as shown in Figure [3-5](#216283_2_En_3_Chapter.xhtml#Fig5).
    You will need to create a new leaderboard ID, as well as specify the localization
    data for the new combined leaderboard.


    **Note**


    `Move All Leaderboards Into Leaderboard Set` is labeled in a confusing manner;
    you will not be required to move all existing leaderboards into a new set and
    will still have the option of selectively picking those that should be in a set
    together.


    ![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig5_HTML.jpg](images/216283_2_En_3_Chapter/216283_2_En_3_Fig5_HTML.jpg)


    Figure 3-5


    Creating a combined leaderboard


    We will also add one last single leaderboard to let us work with a single uncombined
    leaderboard, as the two previous leaderboards that we had created are now `Attached`-type
    leaderboards. Your leaderboard panel should now have four leaderboards in it:
    two attached, one combined, and one single leaderboard. Now that we have a handful
    of valid leaderboards to work with, we can move back to Xcode and begin to work
    with the leaderboard-specific code.


    **Important**


    Once a leaderboard has gone live in a shipping app, it can never be removed, so
    double-check your leaderboard information before shipping an app.'
