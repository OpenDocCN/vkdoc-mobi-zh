  raw: '## Snapshotting


    It may become necessary to create a snapshot of the controller input state. This
    can be useful not only for debugging but also for creating playback profiles or
    sending the controller data over a network. Snapshots are stored through an NSData
    representation.


    ```

    let snapshot = controller.capture()

    ```


    You can check if a controller is a snapshot using the isSnapshot property, seen
    in the following brief code snippet:


    ```

    snapshot.isSnapshot // returns true

    ```


    ## Virtual Controllers


    Virtual controllers were introduced to the iOS platform as part of the iOS 15
    updates. Virtual Controllers provide functionality and standardization of on-screen
    touch controllers. While virtual controllers are not new technology, prior to
    the release of iOS 15, users were responsible for rolling their own solution or
    deploying a third-party solution.


    ![../images/216283_2_En_11_Chapter/216283_2_En_11_Fig1_HTML.jpg](images/216283_2_En_11_Chapter/216283_2_En_11_Fig1_HTML.jpg)


    Figure 11-1


    From the WWDC announcement of virtual controllers


    In order to display a new virtual controller, a new instance of GCVirtualController
    needs to be created.


    ```

    let configuration = GCVirtualController.Configuration()

    configuration.elements = [GCInputDirectionPad, GCInputButtonA, GCInputButtonB]

    let virtual = GCVirtualController(configuration: configuration)

    ```


    Once created, it is possible to customize the image shown on a button.


    ```

    let customButtonPath1 = UIBezierPath(rect: .zero)

    virtual.updateConfiguration(forElement: GCInputButtonA) { configuration in

    configuration.path = customButtonPath1

    return configuration

    }

    ```


    There may be instances where it makes sense to hide the controller button temporarily,
    such as when accessing a menu or while paused. This can be done with a quick call
    to the isHidden property as seen in the following snippet:


    ```

    virtual.updateConfiguration(forElement: GCInputButtonB) { configuration in

    configuration.isHidden = true

    return configuration

    }

    ```


    In order to connect the controller and display it on screen, a simple call to
    connect on the controller is performed. Once it is connected, the new handlers
    for the input need to be set up.


    ```

    virtual.connect { error in

    guard let extendedGamepad = virtual.controller?.extendedGamepad else {

    return

    }

    extendedGamepad.dpad.valueChangedHandler = { dpad, xValue, yValue in

    print("DPad value did change: \(xValue), \(yValue)")

    }

    extendedGamepad.buttonA.pressedChangedHandler = buttonHandler

    extendedGamepad.buttonA.pressedChangedHandler = buttonHandler

    }

    ```


    When it is time to disconnect the controller, the virtual controller object accepts
    a call of disconnect.


    ```

    virtual.disconnect()

    ```


    These are all the steps required to create, display, interact with, and clean
    up a virtual controller. Apple has once again gone to great lengths to make implementing
    and working with this technology as easy and straightforward as possible. If your
    game would benefit from access to on-screen controllers, there is little reason
    not to implement this functionality.


    ## Summary


    In this chapter you learned about the Game Controller functionality from both
    physical and virtual controllers, beginning with the requirements of the framework
    to connecting and reading data. This chapter also covered topics such as pausing,
    player indicator lights, and snapshotting data. Game Controllers can be deployed
    using the same principles discussed on iOS, Mac, and Apple TV projects. You should
    now have a strong comfort level with this technology and how it can be quickly
    and easily deployed into your projects to give your users a standardized and universal
    means of input beyond the standard controls that come with the device.


