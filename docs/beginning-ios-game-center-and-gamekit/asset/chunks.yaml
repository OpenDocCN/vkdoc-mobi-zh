- fmt: '### Custom Achievement GUI


    There might be times when you will want to customize the appearance of your achievement
    system to match the custom GUI in your App or game. As we saw with leaderboards
    in the previous chapter, we have the ability to work with the raw data and present
    it in whatever fashion we choose. This section focuses on adding achievements
    to your app using your own GUI. As with the leaderboard section, the first thing
    that we need to do is to add a new button to get to our custom achievement progress
    view. Add a new button and associated action, as shown in Figure [4-11](#216283_2_En_4_Chapter.xhtml#Fig11).


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig11_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig11_HTML.jpg)


    *Figure 4-11* Adding a custom achievement button in Xcode


    We will need to create a new class to handle processing and displaying the achievement
    progress information. Create a new class named `UFOAchievementViewController`,
    and make it a subclass of `UIViewController`. Set up actions and outlets in the
    storyboard for a table view, a navigation bar, and a dismiss button. Don''t forget
    to set the data source and delegate for the table view as well.


    We also want to create an array that will be used to hold onto the achievement
    data. Create a new `NSArray` object and name it `achievementArray`. We also want
    to import the `GameCenterManager` header and conform to its protocol.


    Now, hook up the action to present our new `UFOAchievementViewController` class.
    Edit the action that was created in `UFOViewController` to reflect the following
    changes:


    ```

    @IBAction func customAchievementButtonPressed() {

    let achievementViewController = UFOAchievementViewController()

    achievementViewController.gcManager = gcManager

    present(achievementViewController, animated: true)

    }

    ```


    Let''s take a minute to switch over to the file for `UFOAchievementViewController`.
    We need a dismiss action; add that function as well.


    ```

    @IBAction func dismissAction() {

    dismiss(animated: true, completion: nil)

    }

    ```


    If you were to run the app now, you should see a plain and boring table view,
    similar to the one shown in Figure [4-12](#216283_2_En_4_Chapter.xhtml#Fig12).
    In addition, the dismiss button should now be working.


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig12_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig12_HTML.jpg)


    *Figure 4-12* The blank custom table that we will be using for our custom achievements


    Before we can go on with our `UFOAchievementViewController`, we need to move back
    into our `GameCenterManager` class. Add the following method as an optional protocol
    to the `GameCenterManagerDelegate`:


    ```

    func achievementDescriptionsLoaded(_ descriptions: [GKAchievementDescription]?,
    error: Error?)

    ```


    Then add the following new method to the implementation of `GameCenterManager`:


    ```

    func retrieveAchievmentMetadata() {

    GKAchievementDescription.loadAchievementDescriptions { (descriptions, error) in

    if let error = error {

    print("An error occurred while loading achievement descriptions: \(error.localizedDescription)")

    }

    DispatchQueue.main.async {

    self.delegate?.achievementDescriptionsLoaded(descriptions, error: error)

    }

    }

    }

    ```


    This function will return all the `GKAchievementDescription`s that are found on
    the Game Center server. We can now move back to our `UFOAchievementViewController`
    class and finish implementing the custom achievement table.


    **Important**: The `retrieveAchievementMetadata` function will return hidden achievements
    as well. If you want to hide these from the user, you will have to filter them
    out of the results.


    In addition, add the new protocol that we created earlier. If we do not encounter
    any errors, we simply set the returned descriptions to our local array. When we
    get the new data, we will also want to refresh the table to show the data to the
    user.


    ```

    func achievementDescriptionsLoaded(_ descriptions: [GKAchievementDescription]?,
    error: Error?) {

    if error == nil {

    achievementArray = descriptions

    } else {

    print("An error occurred when retrieving the achievement descriptions: \(error?.localizedDescription
    ?? "")")

    }

    achievementTableView.reloadData()

    }

    }

    ```


    For our `numberOfRowsInSection` method, we simply return the count on the `achievementArray`,
    as follows:


    ```

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    self.achievementArray?.count ?? 0

    }

    ```


    We also need to implement a `cellForRowAtIndexPath` method. Add the following
    method to the implementation as well. After it is added, we will look at it in
    more detail:


    ```

    static let tableViewCellIdentifier = "Cell"

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    var cell = tableView.dequeueReusableCell(withIdentifier: UFOAchievementViewController.tableViewCellIdentifier)

    if cell == nil {

    cell = UITableViewCell(style: .default, reuseIdentifier: UFOAchievementViewController.tableViewCellIdentifier)

    cell?.selectionStyle = .none

    }

    let achievementDescription = achievementArray?[indexPath.row]

    if let percentage = gcManager?.percentageCompleteOfAchievement(withIdentifier:
    achievementDescription?.identifier) {

    cell?.textLabel?.text = (achievementDescription?.title ?? "")

    }

    achievementDescription?.loadImage(completionHandler: { (image, error) in

    if image != nil {

    cell?.imageView?.image = image

    } else {

    cell?.imageView?.image = GKAchievementDescription.placeholderCompletedAchievementImage()

    }

    })

    return cell!

    }

    ```


    The first half of this function is rather standard; we create a new table cell
    or we use one from our reusable collection. We are using the default built-in
    table cell to save some time as well. We create a new `GKAchievementDescription`
    and populate it based on the row number from our `achievementArray`.


    The first property we work with is the title, which we use to set the `textLabel`
    of the cell. In most circumstances, you will want to use the `achievedDescription`
    or `unachievedDescription` as well as the title. For the sake of simplicity, we
    use only the title here. Next, we need to set the image for the achievement. This
    is slightly more complex.


    `GKAchievementDescription` has an image property associated with it, which is
    `nil` until you populate it. First, check to see whether the property is populated;
    we can accomplish this with a simple `nil` check. If it is populated, we set the
    cell image to the one that we have cached. If not, we need to load an image from
    the Game Center servers. To populate it, we call `loadImageWithCompletionHandler`
    on the `GKAchievementDescription` object. This returns the earned image. Notice
    that we used the default placeholder image, which we can access through a class
    method on `GKAchievementDescription`.


    **Tip**: When setting an image in the `UITableViewCellStyleDefault` cell, do not
    set the image to `nil`. This will cause the cell to left align the text and remove
    the image view. If we then use our block to load the image, it wouldn''t appear
    until the cell or table has been reloaded. This is the reason we set the placeholder
    image first.


    If we were to run the app and visit our custom achievement view, it should look
    similar to the one shown in Figure [4-13](#216283_2_En_4_Chapter.xhtml#Fig13).


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig13_HTML.png](images/216283_2_En_4_Chapter/216283_2_En_4_Fig13_HTML.png)


    *Figure 4-13* Achievement data, as displayed in a custom GUI'
  raw: '### Custom Achievement GUI


    There might be times when you will want to customize the appearance of your achievement
    system to match the custom GUI in your App or game. As we saw with leaderboards
    in the previous chapter, we have the ability to work with the raw data and present
    it in whatever fashion we choose. This section focuses on adding achievements
    to your app using your own GUI. As with the leaderboard section, the first thing
    that we need to do is to add a new button to get to our custom achievement progress
    view. Add a new button and associated action, as shown in Figure [4-11](#216283_2_En_4_Chapter.xhtml#Fig11).


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig11_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig11_HTML.jpg)


    Figure 4-11


    Adding a custom achievement button in Xcode


    We will need to create a new class to handle processing and displaying the achievement
    progress information. Create a new class named UFOAchievementViewController, and
    make it a subclass of UIViewController. Set up actions and outlets in the storyboard
    for a table view, a navigation bar, and a dismiss button. Don’t forget to set
    the data source and delegate for the table view as well.


    We also want to create an array that will be used to hold onto the achievement
    data. Create a new NSArray object and name it achievementArray. We also want to
    import the GameCenterManager header and conform to its protocol.


    Now, hook up the action to present our new UFOAchievementViewController class.
    Edit the action that was created in UFOViewController to reflect the following
    changes:


    ```

    @IBAction func customAchievementButtonPressed() {

    let achievementViewController = UFOAchievementViewController()

    achievementViewController.gcManager = gcManager

    present(achievementViewController, animated: true)

    }

    ```


    Let’s take a minute to switch over to the file for UFOAchievementViewController.
    We need a dismiss action; add that function as well.


    ```

    @IBAction func dismissAction() {

    dismiss(animated: true, completion: nil)

    }

    ```


    If you were to run the app now, you should see a plain and boring table view,
    similar to the one shown in Figure [4-12](#216283_2_En_4_Chapter.xhtml#Fig12).
    In addition, the dismiss button should now be working.


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig12_HTML.jpg](images/216283_2_En_4_Chapter/216283_2_En_4_Fig12_HTML.jpg)


    Figure 4-12


    The blank custom table that we will be using for our custom achievements


    Before we can go on with our UFOAchievementViewController, we need to move back
    into our GameCenterManager class. Add the following method as an optional protocol
    to the GameCenterManagerDelegate:


    ```

    func achievementDescriptionsLoaded(_ descriptions: [GKAchievementDescription]?,
    error: Error?)

    ```


    Then add the following new method to the implementation of GameCenterManager:


    ```

    func retrieveAchievmentMetadata() {

    GKAchievementDescription.loadAchievementDescriptions { (descriptions, error) in

    if let error = error {

    print("An error occurred while loading achievement descriptions: \(error.localizedDescription)")

    }

    DispatchQueue.main.async {

    self.delegate?.achievementDescriptionsLoaded(descriptions, error: error)

    }

    }

    }

    ```


    This function will return all the GKAchievementDescriptions that are found on
    the Game Center server. We can now move back to our UFOAchievementViewController
    class and finish implementing the custom achievement table.


    Important


    The retrieveAchievementMetadata function will return hidden achievements as well.
    If you want to hide these from the user, you will have to filter them out of the
    results.


    In addition, add the new protocol that we created earlier. If we do not encounter
    any errors, we simply set the returned descriptions to our local array. When we
    get the new data, we will also want to refresh the table to show the data to the
    user.


    ```

    func achievementDescriptionsLoaded(_ descriptions: [GKAchievementDescription]?,
    error: Error?) {

    if error == nil {

    achievementArray = descriptions

    } else {

    print("An error occurred when retrieving the achievement descriptions: \(error?.localizedDescription
    ?? "")")

    }

    achievementTableView.reloadData()

    }

    }

    ```


    For our numberOfRowsInSection method, we simply return the count on the achievementArray,
    as follows:


    ```

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    self.achievementArray?.count ?? 0

    }

    ```


    We also need to implement a cellForRowAtIndexPath method. Add the following method
    to the implementation as well. After it is added, we will look at it in more detail:


    ```

    static let tableViewCellIdentifier = "Cell"

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    var cell = tableView.dequeueReusableCell(withIdentifier: UFOAchievementViewController.tableViewCellIdentifier)

    if cell == nil {

    cell = UITableViewCell(style: .default, reuseIdentifier: UFOAchievementViewController.tableViewCellIdentifier)

    cell?.selectionStyle = .none

    }

    let achievementDescription = achievementArray?[indexPath.row]

    if let percentage = gcManager?.percentageCompleteOfAchievement(withIdentifier:
    achievementDescription?.identifier) {

    cell?.textLabel?.text = (achievementDescription?.title ?? "")

    }

    achievementDescription?.loadImage(completionHandler: { (image, error) in

    if image != nil {

    cell?.imageView?.image = image

    } else {

    cell?.imageView?.image = GKAchievementDescription.placeholderCompletedAchievementImage()

    }

    })

    return cell!

    }

    ```


    The first half of this function is rather standard; we create a new table cell
    or we use one from our reusable collection. We are using the default built-in
    table cell to save some time as well. We create a new GKAchievementDescription
    and populate it based on the row number from our achievementArray.


    The first property we work with is the title, which we use to set the textLabel
    of the cell. In most circumstances, you will want to use the achievedDescription
    or unachievedDescription as well as the title. For the sake of simplicity, we
    use only the title here. Next, we need to set the image for the achievement. This
    is slightly more complex.


    GKAchievementDescription has an image property associated with it, which is nil
    until you populate it. First, check to see whether the property is populated;
    we can accomplish this with a simple nil check. If it is populated, we set the
    cell image to the one that we have cached. If not, we need to load an image from
    the Game Center servers. To populate it, we call loadImageWithCompletionHandler
    on the GKAchievementDescription object. This returns the earned image. Notice
    that we used the default placeholder image, which we can access through a class
    method on GKAchievementDescription.


    Tip


    When setting an image in the UITableViewCellStyleDefault cell, do not set the
    image to nil. This will cause the cell to left align the text and remove the image
    view. If we then use our block to load the image, it wouldn’t appear until the
    cell or table has been reloaded. This is the reason we set the placeholder image
    first.


    If we were to run the app and visit our custom achievement view, it should look
    similar to the one shown in Figure [4-13](#216283_2_En_4_Chapter.xhtml#Fig13).


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig13_HTML.png](images/216283_2_En_4_Chapter/216283_2_En_4_Fig13_HTML.png)


    Figure 4-13


    Achievement data, as displayed in a custom GUI'
  trans: '

    ### 自定义成就界面


    有时你可能希望自定义成就系统的外观，以匹配应用或游戏中的自定义界面。正如上一章中我们通过排行榜所看到的，我们可以处理原始数据并以任意形式呈现。本节将重点介绍如何使用你自己的
    GUI 在应用中添加成就。与排行榜部分类似，我们首先需要添加一个按钮，以便进入自定义成就进度视图。请添加一个新按钮及其关联操作，如图 4-11 所示。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig11_HTML.jpg](img/216283_2_En_4_Fig11_HTML.jpg)


    *图 4-11* 在 Xcode 中添加自定义成就按钮


    我们需要创建一个新类来处理成就进度信息的处理和显示。创建一个名为 `UFOAchievementViewController` 的新类，并使其成为 `UIViewController`
    的子类。在故事板中为表格视图、导航栏和关闭按钮设置操作和输出口。不要忘记同时为表格视图设置数据源和委托。


    我们还需要创建一个数组来存储成就数据。创建一个新的 `NSArray` 对象，并命名为 `achievementArray`。同时，导入 `GameCenterManager`
    头文件并遵循其协议。


    现在，将操作连接到我们新创建的 `UFOAchievementViewController` 类。编辑在 `UFOViewController` 中创建的操作，以反映以下更改：


    ```

    @IBAction func customAchievementButtonPressed() {

    let achievementViewController = UFOAchievementViewController()

    achievementViewController.gcManager = gcManager

    present(achievementViewController, animated: true)

    }

    ```


    让我们花点时间切换到 `UFOAchievementViewController` 的文件。我们需要一个关闭操作；请同时添加该函数。


    ```

    @IBAction func dismissAction() {

    dismiss(animated: true, completion: nil)

    }

    ```


    如果你现在运行应用，应该会看到一个朴素而单调的表格视图，类似于图 4-12 中所示。此外，关闭按钮现在应该能够正常工作。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig12_HTML.jpg](img/216283_2_En_4_Fig12_HTML.jpg)


    *图 4-12* 我们将用于自定义成就的空白表格


    在继续实现 `UFOAchievementViewController` 之前，我们需要回到 `GameCenterManager` 类。将以下方法作为可选协议添加到
    `GameCenterManagerDelegate` 中：


    ```

    func achievementDescriptionsLoaded(_ descriptions: [GKAchievementDescription]?,
    error: Error?)

    ```


    然后在 `GameCenterManager` 的实现中添加以下新方法：


    ```

    func retrieveAchievmentMetadata() {

    GKAchievementDescription.loadAchievementDescriptions { (descriptions, error) in

    if let error = error {

    print("加载成就描述时发生错误：\(error.localizedDescription)")

    }

    DispatchQueue.main.async {

    self.delegate?.achievementDescriptionsLoaded(descriptions, error: error)

    }

    }

    }

    ```


    此函数将返回 Game Center 服务器上找到的所有 `GKAchievementDescription`。现在，我们可以回到 `UFOAchievementViewController`
    类，完成自定义成就表格的实现。


    **重要提示**： `retrieveAchievementMetadata` 函数也会返回隐藏的成就。如果你想对用户隐藏这些成就，则必须从结果中将其过滤掉。


    此外，请添加我们之前创建的新协议。如果没有遇到任何错误，我们只需将返回的描述设置到本地数组中。当获取到新数据时，我们还需要刷新表格以向用户显示数据。


    ```

    func achievementDescriptionsLoaded(_ descriptions: [GKAchievementDescription]?,
    error: Error?) {

    if error == nil {

    achievementArray = descriptions

    } else {

    print("检索成就描述时发生错误：\(error?.localizedDescription ?? "")")

    }

    achievementTableView.reloadData()

    }

    ```


    对于 `numberOfRowsInSection` 方法，我们只需返回 `achievementArray` 的计数，如下所示：


    ```

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    self.achievementArray?.count ?? 0

    }

    ```


    我们还需要实现一个 `cellForRowAtIndexPath` 方法。请将以下方法添加到实现中。添加后，我们将更详细地分析它：


    ```

    static let tableViewCellIdentifier = "Cell"

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    var cell = tableView.dequeueReusableCell(withIdentifier: UFOAchievementViewController.tableViewCellIdentifier)

    if cell == nil {

    cell = UITableViewCell(style: .default, reuseIdentifier: UFOAchievementViewController.tableViewCellIdentifier)

    cell?.selectionStyle = .none

    }

    let achievementDescription = achievementArray?[indexPath.row]

    if let percentage = gcManager?.percentageCompleteOfAchievement(withIdentifier:
    achievementDescription?.identifier) {

    cell?.textLabel?.text = (achievementDescription?.title ?? "")

    }

    achievementDescription?.loadImage(completionHandler: { (image, error) in

    if image != nil {

    cell?.imageView?.image = image

    } else {

    cell?.imageView?.image = GKAchievementDescription.placeholderCompletedAchievementImage()

    }

    })

    return cell!

    }

    ```


    该函数的前半部分相当标准：我们创建新的表格单元格，或者从可重用集合中获取一个。为了节省时间，我们使用了默认的内置表格单元格。我们创建一个新的 `GKAchievementDescription`，并根据
    `achievementArray` 中的行号为其填充数据。


    我们处理的第一个属性是标题，用于设置单元格的 `textLabel`。在大多数情况下，你可能希望同时使用 `achievedDescription` 或 `unachievedDescription`
    以及标题。为简单起见，我们在此仅使用标题。接下来，我们需要设置成就的图像。这部分稍微复杂一些。


    `GKAchievementDescription` 有一个与之关联的图像属性，在填充之前该属性为 `nil`。首先，检查该属性是否已填充；我们可以通过简单的
    `nil` 检查来实现。如果已填充，我们将单元格图像设置为我们缓存的那一个。如果没有，我们需要从 Game Center 服务器加载图像。为此，我们在 `GKAchievementDescription`
    对象上调用 `loadImageWithCompletionHandler`。这将返回已获得的图像。请注意，我们使用了默认占位图像，可以通过 `GKAchievementDescription`
    上的类方法访问它。


    **提示**：在 `UITableViewCellStyleDefault` 单元格中设置图像时，不要将图像设置为 `nil`。这会导致文本左对齐并移除图像视图。如果我们随后使用块来加载图像，则直到单元格或表格被重新加载时，图像才会出现。这就是我们首先设置占位图像的原因。


    如果我们运行应用并访问自定义成就视图，它应该类似于图 4-13 中所示的样子。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig13_HTML.png](img/216283_2_En_4_Fig13_HTML.png)


    *图 4-13* 在自定义 GUI 中显示的成就数据

    '
- fmt: 'We are able to view only a list of achievements and associated images, but
    not how far the user has progressed toward unlocking the achievements. If you
    recall, earlier in this chapter, we wrote a few convenience functions, which can
    be useful here. We have two functions that will return just the progress for the
    achievement, `percentageCompleteOfAchievementWithIdentifier:` and `achievementWithIdentifierIsComplete`.
    In addition, if we want access to the entire `GKAchievement` object, we can use
    `achievementForIdentifier`. Let’s use the `percentageCompleteOfAchievementWithIdentifier:`
    to display the percentage complete here. Modify the section of code in the `cellForRowAtIndexPath:`
    that sets the text label of the cell. The new code snippet should look like the
    following:


    ```

    if let percentage = gcManager?.percentageCompleteOfAchievement(withIdentifier:
    achievementDescription?.identifier) {

    let percentageCompleteString = String(format: " %.1f%% Complete", percentage)

    cell?.textLabel?.text = (achievementDescription?.title ?? "") + percentageCompleteString

    }

    ```


    If you run the game again, you will notice a more helpful output, as shown in
    Figure [4-14](#216283_2_En_4_Chapter.xhtml#Fig14).


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig14_HTML.png](images/216283_2_En_4_Chapter/216283_2_En_4_Fig14_HTML.png)


    **Figure 4-14** Achievements with custom GUI and completion percentage


    ### Recovering from a Submit Failure


    You as the developer are solely responsible for handling achievement-submitting
    failures. You do not want your users to lose any achievement progress. Losing
    an achievement is very frustrating to your users and should be avoided at all
    cost. To prevent this, take the same approach that we used when working with score
    failures. The primary difference is that there is no need to store the `GKAchievement`
    object because it does not contain any date information or time-sensitive information.
    We just need to store the `percentageComplete`. We will create a new method to
    handle this behavior for us. Add the following method to the `GameCenterManager`
    class:


    ```

    func storeAchievementToSubmitLater(_ achievement: GKAchievement) {

    let defaults = UserDefaults()

    let savedAchievementsKey = "savedAchievements"

    var achievementsDictionary = defaults.dictionary(forKey: savedAchievementsKey)
    as? [String: Double] ?? [:]

    let achievementKey = achievement.identifier

    let achievementProgress = achievement.percentComplete

    let storedProgress = achievementsDictionary[achievementKey] ?? 0

    if achievementProgress > storedProgress {

    achievementsDictionary[achievementKey] = achievementProgress

    defaults.setValue(achievementsDictionary, forKey: savedAchievementsKey)

    }

    }

    ```


    This function will treat an achievement as an argument and verify whether it is
    not already stored as a reference in our achievements that have failed to be properly
    submitted. If it has, then we need to see which one is progressed further so we
    do not have any instances in which we delete a user’s progress. Once that is done,
    we store it into `userDefaults` as a dictionary, using the identifier as the key
    and the percentage completed as the value. We add a call to this method from an
    error in the `submitAchievement:PercentComplete:` function.


    **Tip** I recommend informing your users their achievement could not be submitted
    at this time, but it has been saved and will be submitted later. This lets the
    user know that any progress has not been lost.


    We also need a new function that will check to see whether we have uncommitted
    achievement progress. There is no right answer for when it is a good time to call
    this function. You can typically get away with calling it after a user authenticates
    with Game Center, but you may want to add additional methods that it is called
    from, such as whenever the reachability status is updated. Add the following method
    to your `GameCenterManager` class:


    ```

    func submitAllSavedAchievements() {

    let defaults = UserDefaults()

    let savedAchievementsKey = "savedAchievements"

    if let achievementsDictionary = defaults.dictionary(forKey: savedAchievementsKey)
    as? [String: Double] {

    achievementsDictionary.forEach { key, value in

    submitAchievement(key, percentComplete: value)

    }

    defaults.removeObject(forKey: savedAchievementsKey)

    }

    }

    ```


    This function loads a copy of our unsubmitted progress and loops through each
    item, attempting to resubmit them as they go. In the event that they fail to be
    submitted again, they will be added back to our saved data.


    ## Summary


    You now have all the tools you need to add rich and complex achievements into
    your Game Center–enabled iOS, Mac, or Apple TV app. You now know the value of
    adding achievements, as well as how to set up and configure them in the App Store
    Connect portal. We have discussed the pros and cons of using both Apple’s default
    GUI and a custom GUI that you have designed. You now know how to expand our `GameCenterManager`
    class to include posting achievement progress, getting achievement feedback, and
    resetting achievement progress all together.


    The most important step completed in this chapter is expanding the reusable `GameCenterManager`
    class, which will allow you to easily add achievements in future projects. In
    the next chapter, we will explore Game Center’s matchmaking and invitation systems
    so you can add multiplayer capabilities and other networking features.


    # 5. Matchmaking and Invitations


    Beginning with this chapter, and through the next few chapters, we will discuss
    how to add networking and multiplayer capabilities with Game Center, and later
    GameKit, into your app or game. Adding networking capability to your app is almost
    considered essential technology in the modern era. Virtually all modern software
    has some sort of networking component associated with it today, whether it is
    talking to an online service to retrieve or post information or talking directly
    to a peer device to exchange data.


    In the following chapters, we will discuss communicating with other peer devices,
    although not all of our networking configurations will be direct peer to peer
    (see Chapter [6](#216283_2_En_6_Chapter.xhtml) for details on network design).


    This chapter, in particular, explores how to use Game Center to find and invite
    peers into your app using Game Center’s integrated invitation system.


    Game Center provides an amazingly undervalued marketing and distribution tool
    to the developer for very historically low overhead, in regards to handling invitations.
    When inviting local or Internet users to begin a multiplayer experience in your
    game or app, you have the option to invite any of your Game Center friends. If
    the friends that you invite do not currently have the app installed, they will
    be prompted to purchase the app instantly and begin playing. Even after a decade
    of Game Center, there are no other methods on iOS to send a “buy now” link to
    another user in this manner. This functionality provides a great way to grow your
    user base—just let your users do the selling for you.'
