    let leaderboardController = GKGameCenterViewController(state: .leaderboards)

    leaderboardController.gameCenterDelegate = self

    present(leaderboardController, animated: true)

    }

    ```


    If you were to now run the app again, you would see output similar to that shown
    in Figure [3-12](#216283_2_En_3_Chapter.xhtml#Fig12). The number of scores, the
