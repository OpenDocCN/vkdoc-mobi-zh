  raw: '### Processing a Transaction


    After your user has requested a purchase, there are several steps that you need
    to take in order to ensure that their purchase is completed successfully. First,
    we implement the required method from the SKPaymentTransactionObserver. As you
    can see in the following code example, we test the current transaction state and
    then call some new functions, depending on whether the transaction succeeded,
    failed, or restored:


    ```

    extension UFOStoreViewController: SKPaymentTransactionObserver {

    func paymentQueue(_ queue: SKPaymentQueue, updatedTransactions transactions: [SKPaymentTransaction])
    {

    for transaction in transactions {

    switch transaction.transactionState {

    case .purchasing:

    print("Purchasing:", transaction)

    case .purchased:

    transactionDidComplete(transaction)

    case .failed:

    transactionDidFail(transaction)

    case .restored:

    transactionDidRestore(transaction)

    case .deferred:

    print("Deferred:", transaction)

    @unknown default:

    print("Unhandled case:", transaction)

    }

    }

    }

    }

    ```


    We need to implement some convenience functions to help streamline the process.
    If a transaction completed successfully or is restored, we need to record the
    transaction event, unlock the content that the user purchased, and perform some
    cleanup. If the transaction failed or was cancelled, we just need to perform the
    cleanup and probably notify the user that something went wrong.


    ```

    func transactionDidComplete(_ transaction: SKPaymentTransaction) {

    unlockContent(transaction.payment.productIdentifier)

    finish(transaction, withSuccess: true)

    }

    func transactionDidRestore(_ transaction: SKPaymentTransaction) {

    unlockContent(transaction.original?.payment.productIdentifier)

    finish(transaction, withSuccess: true)

    }

    func transactionDidFail(_ transaction: SKPaymentTransaction) {

    if let error = transaction.error as? SKError, error.code == SKError.Code.paymentCancelled
    {

    SKPaymentQueue.default().finishTransaction(transaction)

    } else {

    finish(transaction, withSuccess: false)

    }

    }

    ```


    Next, we take a look at the unlockContent function. This is where things could
    differ in your actual app. In this example, we set a flag in the NSUserDefaults
    that we can check against to see whether the user has purchased a feature. Depending
    on how your app is structured, you might want to take a different approach, but
    no matter what approach you take, remember that you need to preserve the unlocked
    content through app restarts. See the section “Tying Everything Together in UFOs”
    for a sample on how to implement this approach.


    ```

    func unlockContent(_ productId: String?) {

    switch productId {

    case "com.dragonforged.ufo.newShip1":

    UserDefaults.standard.set(true, forKey: "shipPlusAvailable")

    case "com.dragonforged.ufo.subscription":

    UserDefaults.standard.set(true, forKey: "subscriptionAvailable")

    case .some(let unknown):

    print("Unrecognized productId:", unknown)

    case .none:

    break

    }

    }

    ```


    The last step that we take for both successful and unsuccessful purchases is to
    perform a bit of cleanup on our transaction. The most important step in the following
    method is to call the finishTransaction method. We also log the results of the
    transaction for debugging purposes. Until you have called finishTransaction, the
    transaction remains open and in the system.


    ```

    func finish(_ transaction: SKPaymentTransaction, withSuccess success: Bool) {

    SKPaymentQueue.default().finishTransaction(transaction)

    if success {

    print("Transaction was successful:", transaction)

    } else {

    print("Transaction was unsuccessful:", transaction)

    }

    }

    ```


    ### Restoring Previously Completed Transactions


    Often, your users will need to restore purchases that they have previously made.
    This could happen if they have reinstalled your app or have begun using it on
    a different device. It is important to always add a path for your user to download
    all of their content and unlock any purchases that they have previously made.
    Luckily, Apple has planned ahead for this scenario and has provided a simple method
    for restoring the user’s purchases.


    ```

    SKPaymentQueue.default().restoreCompletedTransactions()

    ```


    This will repurchase all of your content as if the user had selected it from your
    store. You will receive appropriate callbacks to the paymentQueue(_:updatedTransactions:)
    method and can use your existing code to unlock content.


    ## Test Accounts and Testing Purchases


    If you were to try and purchase one of your items in the sandbox now, you would
    receive an account error. You need to first create a new test account in order
    to be able to test purchases without being charged for them.


    To set up a new test user, you need to log in to App Store Connect ([`http://appstoreconnect.apple.com`](http://appstoreconnect.apple.com)).
    Select the Manage User section from the main screen of App Store Connect; from
    here, select the option for a new Test User.


    Test users do not need to use a real e-mail address, and you will want to select
    something quick to type and easy to remember, such as `abc@def.com`. Although
    you do need to enter a date of birth and other identifying information, there
    is no reason you cannot fabricate this data. Make sure to select the App Store
    as the one to test your localization against. You can make a new account for each
    region that you will test with.


    ### Signing In with a Test Account


    You cannot simply sign in with your test account in the Settings App. Doing so
    would result in you being forced to agree to the standard user agreement and being
    prompted to enter a credit card number. In order to resolve this issue, you need
    to use the Settings App to log out of your existing App Store account. After you
    are logged out of an account, you will be prompted to log in or create a new account
    during a purchase attempt. This is where you will enter your test account credentials.


    Note


    If you are testing on your primary device, don’t forget to revisit the Settings
    App to log out of your test account before making real purchases or downloading
    updates.


    ## Submitting a Purchase GUI Screenshot


    We talked briefly about this step in the earlier sections of this chapter. Apple
    requires that you submit a screenshot of your in-app purchase before it will clear
    it for sale. There is some confusion about what Apple is specifically looking
    for in this screenshot. Apple is looking, in the simplest terms, for a screen
    capture proving that your in-app purchase is working as intended. For unlockable
    content, this would be a screenshot of the item being used, such as the user playing
    a purchased level or using a purchased item. However, sometimes your product might
    not be visible while being used. In cases such as these, Apple has accepted a
    screenshot of the store showing that the item has been purchased.


    Note


    You will not be required to submit a screenshot until you have finished writing
    and debugging your app and are ready to submit it for review.


    ## Developer Approval


    The last step that you need to take before your in-app purchase is ready to go
    is developer approval. Return to App Store Connect in your web browser, and navigate
    to the Manage In-App Purchase section of your app review page. There will be a
    new green button in the upper right-hand corner of the screen.


    You will be prompted on how to submit your product. The following two options
    are available:


    *   Submit with Binary: This option will turn on in-app purchase with your next
    binary upload.


    *   Submit Now: This will allow you to submit a new product to an existing app.'
  trans: '

    ### 处理交易


    在用户请求购买后，你需要执行几个步骤来确保其购买成功完成。首先，我们要实现 `SKPaymentTransactionObserver` 协议中所需的方法。正如下面的代码示例所示，我们检测当前交易状态，然后根据交易是成功、失败还是恢复来调用一些新函数：


    ```swift

    extension UFOStoreViewController: SKPaymentTransactionObserver {

    func paymentQueue(_ queue: SKPaymentQueue, updatedTransactions transactions: [SKPaymentTransaction])
    {

    for transaction in transactions {

    switch transaction.transactionState {

    case .purchasing:

    print("购买中:", transaction)

    case .purchased:

    transactionDidComplete(transaction)

    case .failed:

    transactionDidFail(transaction)

    case .restored:

    transactionDidRestore(transaction)

    case .deferred:

    print("延迟:", transaction)

    @unknown default:

    print("未处理的情况:", transaction)

    }

    }

    }

    }

    ```


    我们需要实现一些便捷函数来帮助简化流程。如果交易成功完成或被恢复，我们需要记录交易事件、解锁用户购买的内容并执行一些清理工作。如果交易失败或被取消，我们只需要执行清理工作，并可能通知用户出现了问题。


    ```swift

    func transactionDidComplete(_ transaction: SKPaymentTransaction) {

    unlockContent(transaction.payment.productIdentifier)

    finish(transaction, withSuccess: true)

    }

    func transactionDidRestore(_ transaction: SKPaymentTransaction) {

    unlockContent(transaction.original?.payment.productIdentifier)

    finish(transaction, withSuccess: true)

    }

    func transactionDidFail(_ transaction: SKPaymentTransaction) {

    if let error = transaction.error as? SKError, error.code == SKError.Code.paymentCancelled
    {

    SKPaymentQueue.default().finishTransaction(transaction)

    } else {

    finish(transaction, withSuccess: false)

    }

    }

    ```


    接下来，我们来看一下 `unlockContent` 函数。这是你的实际应用中可能有所不同之处。在这个示例中，我们在 `NSUserDefaults` 中设置一个标志位，我们可以通过检查该标志位来判断用户是否已购买某个功能。根据你的应用结构，你可能会采取不同的方法，但无论采用何种方法，请记住，你需要通过应用重启来保留已解锁的内容。有关如何实现此方法的示例，请参阅“在
    UFO 中将一切整合在一起”一节。


    ```swift

    func unlockContent(_ productId: String?) {

    switch productId {

    case "com.dragonforged.ufo.newShip1":

    UserDefaults.standard.set(true, forKey: "shipPlusAvailable")

    case "com.dragonforged.ufo.subscription":

    UserDefaults.standard.set(true, forKey: "subscriptionAvailable")

    case .some(let unknown):

    print("无法识别的产品 ID:", unknown)

    case .none:

    break

    }

    }

    ```


    对于成功和不成功的购买，我们采取的最后一步是对我们的交易执行一些清理工作。以下方法中最重要的一步是调用 `finishTransaction` 方法。我们还会记录交易结果用于调试。在你调用
    `finishTransaction` 之前，该交易将保持打开状态并存在于系统中。


    ```swift

    func finish(_ transaction: SKPaymentTransaction, withSuccess success: Bool) {

    SKPaymentQueue.default().finishTransaction(transaction)

    if success {

    print("交易成功:", transaction)

    } else {

    print("交易失败:", transaction)

    }

    }

    ```


    ### 恢复之前完成的交易


    通常，你的用户需要恢复他们之前进行的购买。如果他们重新安装了你的应用或开始在另一台设备上使用它，就可能发生这种情况。始终为用户提供一条路径来下载所有内容并解锁他们之前进行的任何购买，这一点非常重要。幸运的是，Apple
    已经为此场景提前做了规划，并提供了一个简单的方法来恢复用户的购买。


    ```swift

    SKPaymentQueue.default().restoreCompletedTransactions()

    ```


    这将重新“购买”你的所有内容，就像用户从你的商店中选择了它们一样。你将收到对 `paymentQueue(_:updatedTransactions:)`
    方法的相应回调，并可以使用现有代码解锁内容。


    ## 测试帐户与测试购买


    如果你现在尝试在沙盒环境中购买你的某个商品，你将收到一个帐户错误。你需要首先创建一个新的测试帐户，以便能够在无需付费的情况下测试购买。


    要设置一个新的测试用户，你需要登录到 App Store Connect ([`http://appstoreconnect.apple.com`](http://appstoreconnect.apple.com))。从
    App Store Connect 的主屏幕选择“管理用户”部分；然后在此处选择“新测试用户”选项。


    测试用户不需要使用真实的电子邮件地址，你应选择一个易于输入且容易记住的地址，例如 `abc@def.com`。虽然你需要输入出生日期和其他身份信息，但完全没有理由不能虚构这些数据。确保选择“App
    Store”作为您测试本地化的商店。你可以为你将要测试的每个地区创建一个新帐户。


    ### 使用测试帐户登录


    你无法直接在“设置”应用中登录你的测试帐户。这样做会导致你被迫同意标准用户协议并被提示输入信用卡号。为了解决此问题，您需要使用“设置”应用退出您现有的 App
    Store 帐户。退出帐户后，在尝试购买时，系统会提示您登录或创建新帐户。此时，您应在此处输入测试帐户凭据。


    > **注**

    > 如果您在主设备上进行测试，在进行真实购买或下载更新之前，请不要忘记返回“设置”应用退出您的测试帐户。


    ## 提交购买 GUI 截图


    我们在本章前面的部分简要讨论过此步骤。Apple 要求您提交应用内购买的屏幕截图，然后才会批准其销售。关于 Apple 在此截图中具体寻找什么，存在一些混淆。简而言之，Apple
    想要的是一个屏幕截图，证明您的应用内购买按预期工作。对于可解锁内容，这将是正在使用该物品的截图，例如用户正在玩已购买的关卡或使用已购买的道具。然而，有时您的产品在使用时可能不可见。在这种情况下，Apple
    已接受显示该商品已被购买的商店截图。


    > **注**

    > 在您完成应用程序的编写和调试并准备提交审核之前，您不需要提交截图。


    ## 开发者审批


    在您的应用内购买准备就绪之前，您需要完成的最后一步是开发者审批。在您的网页浏览器中返回到 App Store Connect，并导航到应用审核页面的“管理应用内购买”部分。屏幕的右上角将出现一个新的绿色按钮。


    系统将提示您如何提交产品。有以下两种选项可用：


    *   **随二进制文件提交：** 此选项将在您下次上传二进制文件时启用应用内购买。

    *   **立即提交：** 这将允许您向现有应用提交新产品。

