  raw: '### Presenting Your Products to the User


    We begin by adding a table view to our store view controller. Don’t forget to
    hook up the data source and delegates, as required. We also add a new property
    to our class to hold on to the products. Create a new array property named productArray.


    ```

    var productArray: [SKProduct]?

    ```


    Set the product results to it and reload the table in the productsRequest method.


    ```

    productArray = response.products

    storeTable.reloadData()

    ```


    Add the two required table view delegate and data source functions to your class,
    as shown in the following code snippets:


    ```

    extension UFOStoreViewController: UITableViewDataSource {

    static var currencyFormatter: NumberFormatter = {

    let currencyFormatter = NumberFormatter()

    currencyFormatter.numberStyle = .currency

    return currencyFormatter

    }()

    func tableView(_ tableView: UITableView, numberOfRowsInSection section: Int) ->
    Int {

    return productArray?.count ?? 0

    }

    func tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath) ->
    UITableViewCell {

    var cell: UITableViewCell

    if let dequeuedCell = tableView.dequeueReusableCell(withIdentifier: "Cell") {

    cell = dequeuedCell

    } else {

    let subtitleCell = UITableViewCell(style: .subtitle, reuseIdentifier: "Cell")

    subtitleCell.selectionStyle = .none

    cell = subtitleCell

    }

    let cellText: String

    let cellDetailText: String

    if let product = productArray?[indexPath.row] {

    Self.currencyFormatter.locale = product.priceLocale

    let priceText = Self.currencyFormatter.string(from: product.price)

    let titleComponents = [product.localizedTitle, priceText]

    cellText = titleComponents.compactMap{ $0 }.joined(separator: " - ")

    cellDetailText = product.localizedDescription

    } else {

    cellText = "Unknown Product"

    cellDetailText = ""

    }

    cell.textLabel?.text = cellText

    cell.detailTextLabel?.text = cellDetailText

    return cell

    }

    }

    ```


    The var at the top configures the currency formatter that will be used by cells
    to format product prices. The first function simply returns the number of products
    that we retrieved from Apple’s servers for the number of rows in the table. When
    we display them as a cell, we use the built-in `.subtitle style`. We set the main
    label to the product title and price and use the detail label to display the description.
    All that is left is to add a reload table method to the end of the productsRequest
    method. Upon running the game again, you should have a table view that correctly
    list the two in app purchases that were previously set up in App Store Connect.


    Note


    Although the API returns a localized title and description, it doesn’t localize
    the price. You need to take this extra step yourself in international apps.


    ## Purchasing a Product


    In the previous section, we learned how to add products to your app. Without the
    ability to purchase these products, our implementation is only partially complete.
    In this section, we look at how to handle purchasing products directly through
    your app.


    ### Purchasing Code


    The first thing that we need to do is make our store’s view controller class conform
    to the SKPaymentTransactionObserver protocol. After that is done, we modify our
    existing viewDidLoad method. We add ourselves as a new transaction observer. Additionally,
    we perform a test to make sure that we can make payments on this device and, if
    not, display a UIAlert to inform the user.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    SKPaymentQueue.default().add(self)

    guard SKPaymentQueue.canMakePayments() else {

    let alert = UIAlertController.init(title: "", message: "Unable to make purchases
    with this device.", preferredStyle: .alert)

    self.present(alert, animated: true, completion: nil)

    return

    }

    let productIdentifiers: Set = [

    "com.dragonforged.ufo.newShip1",

    "com.dragonforged.ufo.subscription",

    "com.dragonforged.ufo.newShip2"

    ]

    let productsRequest = SKProductsRequest(productIdentifiers: productIdentifiers)

    productsRequest.delegate = self

    productsRequest.start()

    self.productsRequest = productsRequest

    }

    ```


    Next, we need to add a didSelectRowAtIndexPath function to register selection
    events in our table view.


    ```

    extension UFOStoreViewController: UITableViewDelegate {

    func tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)
    {

    guard let product = productArray?[indexPath.row] else {

    return

    }

    let payment = SKPayment(product: product)

    SKPaymentQueue.default().add(payment)

    }

    }

    ```


    If you were to run the app now and select a table row, you would get a confirmation
    alert. However, we have not yet written any code to process this transaction,
    nor have you set up a test user, so this is as far as you can currently get.


    ### Purchasing Multiple Items


    Apple has made it easy to allow your users to purchase multiple items at a time.
    The following code snippet can be used to bulk purchase multiple quantities of
    an item at one time, such as a user purchasing five packs of 100 gold.


    ```

    if let product = productArray?.first(where: { $0.productIdentifier == "com.dragonforged.rpg.100gold"
    }) {

    let payment = SKMutablePayment(product: product)

    payment.quantity = 5

    SKPaymentQueue.default().add(payment)

    }

    ```'
