- fmt: "### Tying Everything Together in `UFOs`\n\nDepending on the complexity of\
    \ your in-app purchase, it could be very easy or very difficult to integrate it\
    \ into your code. In `UFOs`, we have a very simple product, in which paying a\
    \ one-time fee unlocks a different colored ship. When the user purchases the product,\
    \ we store a key in our user defaults to reflect that. To unlock this purchase\
    \ in code, we simply check for that key and then perform the required steps. To\
    \ do this, we need to add some new art assets to the project. These have already\
    \ been included in the Chapter [10](#216283_2_En_10_Chapter.xhtml) sample code\
    \ (available at the Apress website).\n\nAfter this is done, we need to modify\
    \ our `viewDidLoad` function to change the ship’s image. The following code snippet\
    \ shows those changes:\n\n```\noverride func viewDidLoad() {\n    purchasedUpgrade\
    \ = UserDefaults.standard.bool(forKey: \"shipPlusAvailable\")\n    let playerFrame\
    \ = CGRect(x: 100, y: 70, width: 80, height: 34)\n    myPlayerImageView = UIImageView(frame:\
    \ playerFrame)\n    myPlayerImageView?.animationDuration = 0.75\n    myPlayerImageView?.animationRepeatCount\
    \ = 99999\n    var imageArray: [UIImage]\n    if purchasedUpgrade {\n        imageArray\
    \ = [UIImage(named: \"Ship1.png\"), UIImage(named: \"Ship2.png\")].compactMap\
    \ { $0 }\n    } else {\n        imageArray = [UIImage(named: \"Saucer1.png\"),\
    \ UIImage(named: \"Saucer2.png\")].compactMap { $0 }\n    }\n    myPlayerImageView?.animationImages\
    \ = imageArray\n    myPlayerImageView?.startAnimating()\n    if let myPlayerImageView\
    \ = myPlayerImageView {\n        view.addSubview(myPlayerImageView)\n    }\n}\n\
    ```\n\n### Summary\n\nIn this chapter, we covered StoreKit and in-app purchases.\
    \ By leveraging StoreKit, you gain a number of ways to monetize your app, from\
    \ expandable content to special upgrades for your users.\n\nYou should now feel\
    \ confident adding a variety of products to your own in-app store. Although StoreKit\
    \ isn’t directly a part of Game Center or GameKit, you will undoubtedly find an\
    \ in-app store an invaluable addition to your iOS, Mac, or Apple TV software.\n\
    \nWe spent some time talking about ngmoco:) and its experiments and successes\
    \ with the Freemium model. You should now feel confident with App Store Connect\
    \ and all the actions that are required to fully set up an in-app purchase product,\
    \ as well as the required code to get that purchase to display.\n\nWe looked at\
    \ how to handle failures with purchasing and also the path of a success. We also\
    \ explored some of the advanced topics, such as multiple purchases at once. Lastly,\
    \ we saw how we integrated the entire experience into our `UFOs` demo app.\n\n\
    # 11. Game Controllers\n\nTo say the least, Apple has had a long and complicated\
    \ history with gaming on its platforms. When the iPhone first began to gain traction\
    \ and the world was handed the first native SDK, gaming was clearly not a priority.\
    \ Since that time and demonstrated by the technologies this very book is written\
    \ about, Apple has come a long way. iOS Game Controllers were first announced\
    \ at WWDC 2013 as part of iOS 7. Focusing on the screen while not being able to\
    \ feel where gaming controls were proved difficult. Beginning with iOS 15, Apple\
    \ would introduce new SDKs to handle on-screen Game Controllers.\n\n## Types of\
    \ Physical Game Controllers\n\nThere are two general types of Physical Game Controllers,\
    \ micro and extended. These may also be made available in wired (dock connector)\
    \ or wireless (Bluetooth) models. Regardless of other physical and layout differences,\
    \ all controllers will conform to the same types of input. It is important to\
    \ note that extended controllers have more input controls than the standard controllers.\n\
    \nMicro controllers feature a directional D-pad, two primary buttons (A, X), and\
    \ a menu button. Extended controllers feature a directional D-pad, four primary\
    \ buttons (A, B, X, Y), three additional buttons (Menu, Options, Home), two sets\
    \ of shoulder buttons, and two directional thumb sticks. Wireless controllers\
    \ also feature a player indicator LED, which has four positions. Beginning with\
    \ iOS 15, software controller functionality has been added to the platform, which\
    \ is addressed later in this chapter.\n\n> **Note**  \n> While a Game Controller\
    \ can add a lot of functionality to your iOS, Mac, or Apple TV game, it is important\
    \ to remember that they must be optional. In addition to any Game Controller support,\
    \ the game must also contain all the required functionality through the touch\
    \ screen, standard controls, or accelerometer where applicable.\n\nWhen Game Controllers\
    \ were first announced, very few companies were manufacturing them. By the time\
    \ iOS 15 was being released, there were dozens of available options on the market\
    \ from big names like Logitech and Razer to smaller companies and startups. Game\
    \ Controllers with Apple compatibility now come in all shapes, sizes, and styles.\n\
    \n## Connecting to Game Controllers\n\nWhen a non-wireless controller (dock connector)\
    \ is connected to a device, it is automatically detected. However, to detect a\
    \ wireless controller, the app must specifically begin looking for one. The sample\
    \ app adds a new button in the upper left-hand corner of the menu screen to toggle\
    \ searching for a wireless controller.\n\nA new `IBAction` is created for the\
    \ “Find Wireless Controller” button. When the user first taps the button, the\
    \ function `startWirelessControllerDiscovery` is invoked. The second toggle will\
    \ end the search process with the class method `stopWirelessControllerDiscovery`.\n\
    \n```\n@IBAction func findWirelessController() {\n    findingWirelessController.toggle()\n\
    \    if findingWirelessController {\n        GCController.startWirelessControllerDiscovery\
    \ {\n            print(\"Wireless controller searching has finished\")\n     \
    \   }\n    } else {\n        GCController.stopWirelessControllerDiscovery()\n\
    \        print(\"Wireless controller stopped by user\")\n    }\n}\n```\n\nWhen\
    \ a new controller is detected, whether it is wireless or physically connected,\
    \ a notification is fired, `GCControllerDidConnectNotification`. This notification\
    \ and the partner notification for a Game Controller being disconnected should\
    \ be registered at the first chance possible. In the sample project, this is done\
    \ in the `viewDidLoad:` method of the `UFOViewController` class.\n\n```\nNotificationCenter.default.addObserver(self,\
    \ selector: #selector(setupControllers), name: Notification.Name.GCControllerDidConnect\
    \ , object: nil)\nNotificationCenter.default.addObserver(self, selector: #selector(setupControllers),\
    \ name: Notification.Name.GCControllerDidDisconnect , object: nil)\n```\n\n> **Note**\
    \  \n> When a controller is disconnected, it is recommended that the game automatically\
    \ pause to allow the player to either correct the issue with the controller or\
    \ return to touch-based gameplay. Do not forget to test disconnecting controllers\
    \ during gameplay as part of the quality assurance process.\n\nUpon receiving\
    \ either of these notifications, a new function will be called `setupControllers:`;\
    \ this method allows the app to keep track of which controllers, as there may\
    \ be more than one, are connected at any given time. The Game Controllers are\
    \ available via the `controllers` function on the `GCController` object; this\
    \ function will return an array of all the connected controllers. The value of\
    \ the controller array is also saved to an array property for later use in the\
    \ sample app.\n\n```\n@objc func setupControllers(_ notification: Notification)\
    \ {\n    gameControllerArray = GCController.controllers()\n    if gameControllerArray.isEmpty\
    \ {\n        print(\"No game controllers found\")\n    } else {\n        print(\"\
    Game Controllers Found\", gameControllerArray.count)\n    }\n}\n```\n\n> **Note**\
    \  \n> It is possible for the controllers to be detected before the notification\
    \ is set up; it is therefore important to check the contents of the controller\
    \ array when the notification is added to determine if there are any currently\
    \ connected controllers."
