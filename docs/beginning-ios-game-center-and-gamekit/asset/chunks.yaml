    }

    ```


    This function loads a copy of our unsubmitted progress and loops through each
    item, attempting to resubmit them as they go. In the event that they fail to be
    submitted again, they will be added back to our saved data.


    ## Summary


    You now have all the tools you need to add rich and complex achievements into
    your Game Center–enabled iOS, Mac, or Apple TV app. You now know the value of
    adding achievements, as well as how to set up and configure them in the App Store
    Connect portal. We have discussed the pros and cons of using both Apple’s default
    GUI and a custom GUI that you have designed. You now know how to expand our GameCenterManager
    class to include posting achievement progress, getting achievement feedback, and
    resetting achievement progress all together.


    The most important step completed in this chapter is expanding the reusable GameCenterManager
    class, which will allow you to easily add achievements in future projects. In
    the next chapter, we will explore Game Center’s matchmaking and invitation systems
    so you can add multiplayer capabilities and other networking features.


    # 5. Matchmaking and Invitations


    Beginning with this chapter, and through the next few chapters, we will discuss
    how to add networking and multiplayer capabilities with Game Center, and later
    GameKit, into your app or game. Adding networking capability to your app is almost
    considered essential technology in the modern era. Virtually all modern software
    has some sort of networking component associated with it today, whether it is
    talking to an online service to retrieve or post information or talking directly
    to a peer device to exchange data.


    In the following chapters, we will discuss communicating with other peer devices,
    although not all of our networking configurations will be direct peer to peer
    (see Chapter [6](#216283_2_En_6_Chapter.xhtml) for details on network design).


    This chapter, in particular, explores how to use Game Center to find and invite
    peers into your app using Game Center’s integrated invitation system.


    Game Center provides an amazingly undervalued marketing and distribution tool
    to the developer for very historically low overhead, in regards to handling invitations.
    When inviting local or Internet users to begin a multiplayer experience in your
    game or app, you have the option to invite any of your Game Center friends. If
    the friends that you invite do not currently have the app installed, they will
    be prompted to purchase the app instantly and begin playing. Even after a decade
    of Game Center, there are no other methods on iOS to send a “buy now” link to
    another user in this manner. This functionality provides a great way to grow your
    user base—just let your users do the selling for you.'
  trans: '

    我们目前只能查看成就列表及关联图片，而无法了解用户距离解锁成就还有多少进度。回想一下，本章前面部分我们编写了几个便捷函数，此处正好可以派上用场。我们有两个函数可以返回成就的进度信息：`percentageCompleteOfAchievementWithIdentifier:`
    和 `achievementWithIdentifierIsComplete`。此外，若想获取完整的 `GKAchievement` 对象，可使用 `achievementForIdentifier`。接下来，我们使用
    `percentageCompleteOfAchievementWithIdentifier:` 来显示完成百分比。请修改 `cellForRowAtIndexPath:`
    中设置单元格文本标签的代码段。修改后的代码片段应如下所示：


    ```

    if let percentage = gcManager?.percentageCompleteOfAchievement(withIdentifier:
    achievementDescription?.identifier) {

    let percentageCompleteString = String(format: " %.1f%% Complete", percentage)

    cell?.textLabel?.text = (achievementDescription?.title ?? "") + percentageCompleteString

    }

    ```


    再次运行游戏，你会发现输出信息更有帮助，如图 4-14 所示。


    ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig14_HTML.png](img/216283_2_En_4_Fig14_HTML.png)


    **图 4-14** 带有自定义 GUI 和完成百分比的成就


    ### 从提交失败中恢复


    作为开发者，您需要全权负责处理成就提交失败的情况。您一定不希望用户丢失任何成就进度。丢失成就会让用户感到非常沮丧，必须不惜一切代价避免这种情况。为防止此类问题，我们可以采用之前处理分数失败时的相同方法。主要区别在于，由于
    `GKAchievement` 对象不包含任何日期或时效性信息，因此无需存储该对象。我们只需要存储 `percentageComplete` 即可。我们将创建一个新方法来处理这一行为。请将以下方法添加到
    `GameCenterManager` 类中：


    ```

    func storeAchievementToSubmitLater(_ achievement: GKAchievement) {

    let defaults = UserDefaults()

    let savedAchievementsKey = "savedAchievements"

    var achievementsDictionary = defaults.dictionary(forKey: savedAchievementsKey)
    as? [String: Double] ?? [:]

    let achievementKey = achievement.identifier

    let achievementProgress = achievement.percentComplete

    let storedProgress = achievementsDictionary[achievementKey] ?? 0

    if achievementProgress > storedProgress {

    achievementsDictionary[achievementKey] = achievementProgress

    defaults.setValue(achievementsDictionary, forKey: savedAchievementsKey)

    }

    }

    ```


    此函数将成就作为参数，并检查其是否尚未作为引用存储在我们未能成功提交的成就字典中。如果已存储，则需要比较两者进度，取进度更大者，以避免删除用户的任何进度。完成后，将其作为字典存储到
    `userDefaults` 中，使用标识符作为键，完成百分比作为值。我们还需要在 `submitAchievement:PercentComplete:`
    函数的错误处理中调用此方法。


    **提示** 我建议告知用户，当前无法提交其成就，但已保存，稍后会进行提交。这能让用户知道任何进度都未被丢失。


    我们还需要一个新函数来检查是否有未提交的成就进度。至于何时调用此函数最为合适，并没有标准答案。通常可以在用户通过 Game Center 认证后调用，但您可能还希望从其他位置调用它，例如每当网络可达性状态更新时。请将以下方法添加到
    `GameCenterManager` 类中：


    ```

    func submitAllSavedAchievements() {

    let defaults = UserDefaults()

    let savedAchievementsKey = "savedAchievements"

    if let achievementsDictionary = defaults.dictionary(forKey: savedAchievementsKey)
    as? [String: Double] {

    achievementsDictionary.forEach { key, value in

    submitAchievement(key, percentComplete: value)

    }

    defaults.removeObject(forKey: savedAchievementsKey)

    }

    }

    ```


    此函数加载一份未提交进度的副本，并遍历每个项目，尝试逐个重新提交。如果再次提交失败，它们将被重新添加回已保存数据中。


    ## 总结


    至此，您已掌握所有必要工具，可以为支持 Game Center 的 iOS、Mac 或 Apple TV 应用添加丰富且复杂的成就系统。您现在了解了添加成就的价值，以及如何在
    App Store Connect 门户中设置和配置成就。我们讨论了使用 Apple 默认 GUI 与自定义 GUI 各自的优缺点。现在您已经知道如何扩展
    `GameCenterManager` 类，以包含发布成就进度、获取成就反馈以及重置成就进度等功能。


    本章完成的最重要步骤是扩展可复用的 `GameCenterManager` 类，这将使您能够在未来的项目中轻松添加成就。在下一章中，我们将探讨 Game Center
    的匹配和邀请系统，以便您添加多人游戏功能及其他网络功能。


    # 5. 匹配与邀请


    从本章开始，直至接下来的几章，我们将讨论如何通过 Game Center（以及后续的 GameKit）为您的应用或游戏添加网络和多人游戏功能。为应用添加网络功能在当代几乎被认为是一项基础技术。实际上，如今几乎所有现代软件都带有某种网络组件，无论是与在线服务通信以获取或发布信息，还是直接与对等设备交换数据。


    在接下来的章节中，我们将讨论与其他对等设备的通信，但并非所有网络配置都是点对点直连（有关网络设计的详细信息，请参阅第 6 章）。


    具体而言，本章将探讨如何利用 Game Center 内置的邀请系统来查找并邀请对等用户进入您的应用。


    从历史角度看，Game Center 为开发者提供了一种被严重低估的市场营销和分发工具，尤其是在处理邀请方面，其开销非常低。在邀请本地或互联网用户开始您游戏或应用中的多人体验时，您可以选择邀请任意
    Game Center 好友。如果您邀请的好友尚未安装该应用，系统会提示他们立即购买并开始游戏。即使 Game Center 已推出超过十年，iOS 上也没有其他方法能以这种方式向其他用户发送“立即购买”链接。此功能为扩大用户群提供了绝佳途径——只需让您的用户为您推销即可。

