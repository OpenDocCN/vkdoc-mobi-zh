- "# GameKit 和 Game Center 入门\n\n欢迎阅读《Beginning iOS Game Center and GameKit》！本书旨在引导您将\
  \ `GameKit` 和 `Game Center` 功能集成到您的 iOS、Mac 或 Apple TV 应用和游戏中。本书围绕一个为 iOS 构建的示例游戏展开，您将在本章稍后部分接触到它。您会发现，大部分说明在各个平台间是通用的；但是，如果存在\
  \ iOS 之外的特定平台行为，我们会在文中注明。\n\n如果您已有想要添加 `GameKit` 或 `Game Center` 功能的现有应用或游戏，您可以用该项目进行替换；在接下来的章节中，我将尽量采用最通用的方法，以便于您轻松实现相关功能。\n\
  \n本书旨在作为一本参考书和资源，帮助您为 iOS、Mac 或 Apple TV 应用添加社交游戏功能。虽然我建议您从头到尾通读本书，以获得对所涵盖技术最全面的了解，但这并非强制要求。每一章都是独立的。您可以跳转到与您项目相关的章节，并快速将其内容应用到您的软件中。\n\
  \n当 Apple 于 2009 年 3 月 17 日发布 `GameKit` 时，它被作为 iOS 设备上通常令人沮丧的游戏风格网络问题的解决方案，而在此之前，这个问题至少可以说是充满挑战的。`GameKit`\
  \ 增加了对蓝牙和局域网 (LAN) 以及语音聊天服务的支持。不久之后，Apple 宣布在 iOS 4.0 中为 `GameKit` 添加了 `Game Center`。借助新的\
  \ SDK，Apple 带来了大量新功能——其中 `Game Center` 对本书的范畴最为重要。`Game Center` 在很长一段时间内没有重大更新，直到\
  \ 2020 年 Apple 对 `GameKit` 和 `Game Center` 框架进行了重大升级。\n\n社区中的开发者往往认为 `Game Center`\
  \ 是一套独立的应用程序编程接口 (API)。这是一种误解。`Game Center` 是 `GameKit` 不可或缺的一部分。两者相辅相成，携手合作。在接下来的章节中，您将看到大量证据。就本书而言，我们将把这两项技术统称为\
  \ `GameKit`；但在提及 Game Center 特有功能时，我们仍可能使用其正式名称。\n\n> **注意**  \n> 尽管名称如此，`GameKit`\
  \ 和 `Game Center` 并非仅为游戏而设计。Apple 过去曾严厉打击在非游戏应用中使用 `Game Center` 技术的行为。一些开发者收到过类似下面这样的\
  \ Apple 拒绝邮件：  \n> *“Game Center 的预期用途是补充游戏应用或应用内的游戏功能。然而，我们注意到您的应用不包含任何游戏玩法或游戏特性。”*\
  \  \n> 这些拒绝似乎主要针对在非游戏应用中使用排行榜和成就系统的情况。您可以很容易地争辩说，在您的应用中加入排行榜或成就系统增加了一个游戏化元素。如果您碰巧收到这样的拒绝，您仍然有申诉的机会。据我所知，没有任何因在任何应用中使用\
  \ `GameKit` 网络功能而被拒绝的实例。然而，在处理 App Store 审核指南时，您应始终查阅 Apple 提供的最新开发者指南。\n\n\n\n\
  ## GameKit 概述\n\n`GameKit` 可划分为三个独立的功能模块：网络、Game Center 和语音聊天。尽管这些服务共同协作以创造一个无缝集成的环境，但逐一审视每个模块会更有帮助。虽然各模块之间可能存在重叠，例如网络与\
  \ Game Center 部分，但 `GameKit` 的每个模块都可归结为一个主要类别。尽管 API 中并未对这些模块进行区分，但在学习 `GameKit`\
  \ 开发时，将它们分开来思考或许会对你有所帮助。\n\n### 网络\n\n`GameKit` 网络功能允许你在“对等节点”之间发送和接收数据。`GameKit`\
  \ 网络还提供了一套连接协议，用于连接在你的 Wi-Fi 网络上或通过蓝牙在本地发现的客户端。\n\n`GameKit` 支持在两台 iOS 设备之间创建临时的蓝牙或本地无线网络；Game\
  \ Center 匹配功能也支持通过互联网进行网络连接，最多可同时支持 16 名玩家。`GameKit` 网络功能在第 6、7 和 8 章中介绍。Game Center\
  \ 匹配功能在第 5 章中介绍。\n\n### Game Center\n\nGame Center 本身处理身份验证、好友、排行榜、成就和邀请。从某种意义上说，Game\
  \ Center 提供了与社交互动相关的服务器服务。也可以认为 Game Center 包含了自己的网络系统。虽然确实如此，但我们将在前文关于网络的章节中对这一主题进行分组讨论，该部分在第\
  \ 5 章中有详细阐述。Game Center 技术，例如排行榜和成就，将在第 3 和 4 章中介绍。\n\n> **注意**  \n> 在各种印刷品和参考文档中，“Game\
  \ Center”有时既指 Game Center API 的集合，也指 Game Center 应用本身。\n\n### 语音聊天\n\n苹果公司常称之为“Game\
  \ Voice”的功能，允许任何应用（不仅仅是游戏）通过网络连接提供语音通信，通常称为 VOIP。这些 API 负责处理用户音频输入的监听与回放，并提供处理连接、通信、错误和断连的服务。该技术将在第\
  \ 10 章中讨论。\n\n## 示例游戏：UFOs\n\n根据我的经验，大多数开发者都属于“体验型”学习者。这意味着他们通过动手实践而非观看或聆听来学习效果最佳。当我最初学习编程时，会从代码杂志中逐行将源代码抄写到\
  \ Commodore 64 上。我相信，正是这种逐行输入代码的亲身经历让知识得以牢固掌握。而听讲座或看别人写代码则让我难以记住大量信息。如果讲座和演示是我唯一的学习方式，我简直无法想象自己能坚持走这条职业道路。本书正是为其他体验型学习者量身打造的。\n\
  \n在深入 `GameKit` 之前，我们首先要处理的是附带的示例游戏。这个我们称之为“UFOs”的游戏，设计目标并非成为一款获奖连连、令人上瘾的游戏，而是简单到可以被视为任何一个通用项目。我已竭尽全力将代码量控制在\
  \ 300 行以内。尽管游戏本身很简单，但我认为每位读者都能像自己亲手编写的那样理解这些代码至关重要。这样，作为读者，你就能从项目本身抽离出来，专注于 `GameKit`\
  \ 特有的信息。我们将从体验游戏开始，然后查看源代码。\n\n> **注意**  \n> 所有章节的源代码以及示例项目均可从 [`www.apress.com`](http://www.apress.com)\
  \ 获取。\n\n### UFOs：理解游戏\n\n首先，你需要打开从 [apress.​com](http://apress.com) 下载的基础项目。图 1-1\
  \ 展示了项目的文件结构。我们快速运行一下游戏，看看它的样子。\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig1_HTML.jpg](img/216283_2_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1：Finder 中显示的 UFO 示例项目的文件结构\n\n要运行游戏，请从“产品”菜单栏选择“运行”。游戏将启动并显示一个通用屏幕，上面只有一个标有“Play”的按钮。继续操作，选择“Play”按钮。你将进入游戏画面，如图\
  \ 1-2 所示；此画面可能根据你选择的测试设备略有不同。\n\n游戏目标既典型又简单：上下或左右倾斜设备，让你的飞船在屏幕上移动。当飞船定位到一头奶牛上方后，点击屏幕任意位置并按住，直到奶牛被劫持。每劫持一头奶牛，你将获得一分。和所有最棒的游戏一样，这款游戏没有结局，也无法“获胜”。每次你劫持一头奶牛，都会有一头新奶牛生成。\n\
  \n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig2_HTML.jpg](img/216283_2_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2：UFOs 示例项目的游戏画面视图\n\n现在你已经了解了游戏玩法，可以看看实现这一切的源代码了。\n\n### UFOs：检查源代码\n\n在你的文件组树中，你会看到我们将要使用的四个类文件：`AppDelegate.swift`、`SceneDelegate.swift`、`GameViewController.swift`\
  \ 和 `HomeViewController.swift`。文件组树如图 1-3 所示。你还会注意到一个包含项目用户界面元素的 `Main.storyboard`\
  \ 文件。\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig3_HTML.jpg](img/216283_2_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3：从 Xcode 中看到的示例项目的文件组树结构\n\n首先，查看 `AppDelegate.swift` 和 `SceneDelegate.swift`\
  \ 文件。这些文件应该会让你联想到其他 Swift 开发工作。它们只不过是基础的 `UIApplicationDelegate` 和 `UIWindowSceneDelegate`\
  \ 子类。如果你需要熟悉这里的代码，可以查看 Apple 为新项目提供的示例代码。\n\n下一组文件也相对简单：查看 `UFOViewController.h`\
  \ 和 `UFOViewController.m`。这些是与着陆屏或主屏幕关联的类。目前这里只有一个“Play”按钮，但随着本书的深入，我们将在此视图中添加排行榜、成就和多人游戏控件。\n\
  \n最后，我们将处理 `UFOGameViewController.m`。这是驱动所有游戏玩法的主类，并且大部分 `GameKit` 功能都将添加到这里。\n\n\
  \n\n#### 设置加速计代理\n\n我们的示例项目需要做的第一件事是设置自身以检测加速计运动；游戏将利用这种运动来移动玩家的飞船。相关代码位于 `GameViewController`\
  \ 文件的顶部。请看以下代码片段，下面对其进行详细说明：\n\n```\nprivate let motionManager = CMMotionManager()\n\
  override func viewDidLoad() {\nsuper.viewDidLoad()\nmotionManager.accelerometerUpdateInterval\
  \ = 0.05\nmotionManager.startAccelerometerUpdates(to: OperationQueue.current!) {\
  \ (accelerometerData, error) in\nself.motionOccurred(with: accelerometerData ??\
  \ CMAccelerometerData())\nif error != nil {\nprint(error.debugDescription)\n}\n\
  }\n}\n```\n\n我们做的第一件事是将 `motionManager` 设置为 `CMMotionManager()`；这为我们提供了一个方便的主 `CMMotionManager`\
  \ 引用。接下来，重写 `viewDidLoad` 并添加代码，将加速计设置为每 1/20 秒检测一次新的运动数据，然后使用更新后的数据调用 `motionOccurred`，我们稍后将讨论这个问题。如果有任何错误，它们将被打印到控制台。\n\
  \n接下来，看一下附加的变量定义。让我们将其分解为几个部分，以准确理解这里发生了什么：\n\n```\nprivate var movementSpeed =\
  \ 15.0\nprivate var accelerometerDamp = 0.3\nprivate var accelerometer0Angle = 0.6\n\
  ```\n\n这里我们设置了一些类变量，用于保存我们开始处理加速计输入时所需的一些数据。当我们开始处理飞船移动时，我们将再次使用这些变量。目前，你无需完全理解它们的作用，只需知道它们已被设置即可。\n\
  \n#### 将玩家绘制到视图\n\n接下来，我们需要创建“玩家”。在类文件的顶部，你会找到 `playerImageView` 的定义，其中首先定义了共享内容和初始起始位置。\n\
  \n```\nprivate let myPlayerImageView = UIImageView(frame: CGRect(x: 100, y: 70,\
  \ width: 80, height: 34))\n```\n\n将注意力转回 `viewDidLoad` 函数，你会发现以下附加代码片段：\n\n```\n\
  myPlayerImageView.animationDuration = 0.75\nmyPlayerImageView.animationImages =\
  \ [\nUIImage(named: \"Saucer1\")!,\nUIImage(named: \"Saucer2\")!\n]\nmyPlayerImageView.startAnimating()\n\
  view.addSubview(myPlayerImageView)\n```\n\n接下来的四行代码是 `UIImageView` 中鲜为人知但非常有用的部分。我们正在设置一组图像，`UIImageView`\
  \ 将循环显示这些图像。在这个例子中，我们设置了两个图像来回切换。我们还指定了完整动画所需的时间（这里设为 3/4 秒）以及动画需要重复的次数。设置好动画细节后，我们在\
  \ `myPlayerImageView` 这个 `UIImageView` 上调用 `startAnimating()`。然后，我们只需将 `UIImageView`\
  \ 子视图添加到主视图中即可。现在，我们有了一个正在动画显示的玩家！\n\n#### 设置奶牛、光束和分数\n\n我们需要初始化一些对象，并设置分数标签。\n\n\
  ```\nprivate var cows: [UIImageView] = []\nprivate let tractorBeamImageView = UIImageView()\n\
  private var score = 0\n```\n\n变量设置好之后，我们可以再次将注意力转向 `viewDidLoad` 函数，并将刚刚定义的分数变量设置为在界面文件中创建的标签。\n\
  \n```\nscoreLabel.text = formatted(score: score)\nfor _ in 0..<7 { spawnCow() }\n\
  updateCowPaths()\n```\n\n在 `viewDidLoad` 函数中，我们需要做的最后一件事是创建一些奶牛并放置在屏幕上。我创建了一个辅助函数来生成这些奶牛。每次调用它时，都会创建一个新奶牛并将其放置在屏幕上。我们将在本节稍后部分讨论这个问题。我们还调用了另一个辅助函数来更新奶牛的行走路径。同样，稍后我们将更详细地查看这个函数。\n\
  \n#### 添加玩家移动\n\n这样就处理完了所有的初始化和设置代码。现在我们可以进入游戏中更令人兴奋的部分了。首先，我们查看用户输入和操作，然后是游戏玩法功能。\n\
  \n```\nfunc movePlayer(_ vertical: Double, _ horizontal: Double) {\nvar vertical\
  \ = vertical\nvar horizontal = horizontal\nvertical += accelerometer0Angle\nif vertical\
  \ > 0.50 {\nvertical = 0.50\n} else if vertical < -0.50 {\nvertical = -0.50\n}\n\
  if horizontal > 0.50 {\nhorizontal = 0.50\n} else if horizontal < -0.50 {\nhorizontal\
  \ = -0.50\n}\nif (vertical < 0 && (playerFrame?.origin.y ?? 0.0) < 500) || (vertical\
  \ > 0 && (playerFrame?.origin.y ?? 0.0) > 20) {\nplayerFrame?.origin.y -= CGFloat(vertical\
  \ * movementSpeed)\n}\nif (horizontal < 0 && (playerFrame?.origin.x ?? 0.0) < 300)\
  \ || (horizontal > 0 && (playerFrame?.origin.x ?? 0.0) > 0) {\nplayerFrame?.origin.x\
  \ -= CGFloat(horizontal * movementSpeed)\n}\nmyPlayerImageView?.frame = playerFrame\
  \ ?? CGRect.zero\n}\n```\n\n上面的函数比初看起来要简单得多。第一段代码设置了我们的最大速度；我们不想让玩家在屏幕上飞得太快。下一段代码确保用户无法将他们的\
  \ UFO 移出屏幕。确认完这两个安全限制后，我们更新玩家的框架并移动 UFO。\n\n\n\n#### 监听触摸事件\n\n我们需要关注的游戏下一个方面是触摸事件。我们将通过触摸来启动和控制牵引光束。第一步是重写\
  \ `touchesBegan` 事件。\n\n```\noverride func touchesBegan(_ touches: Set, with event:\
  \ UIEvent?) {\ncurrentAbductee = nil\ntractorBeamOn = true\nif gameIsMultiplayer\
  \ {\ngcManager?.sendStringToAllPeers(\"$beginTractorBeam\", reliable: true)\n}\n\
  tractorBeamImageView?.frame = CGRect(x: (myPlayerImageView?.frame.origin.x ?? 0.0)\
  \ + 25, y: (myPlayerImageView?.frame.origin.y ?? 0.0) + 10, width: 28, height: 318)\n\
  tractorBeamImageView?.animationDuration = 0.5\ntractorBeamImageView?.animationRepeatCount\
  \ = 99999\nlet imageArray = [UIImage(named: \"Tractor1.png\"), UIImage(named: \"\
  Tractor2.png\")]\ntractorBeamImageView?.animationImages = imageArray.compactMap\
  \ { $0 }\ntractorBeamImageView?.startAnimating()\nif let tractorBeamImageView =\
  \ tractorBeamImageView {\nview.insertSubview(tractorBeamImageView, at: 4)\n}\nlet\
  \ cowImageView = hitTest()\nif let cowImageView = cowImageView {\ncurrentAbductee\
  \ = cowImageView\nabductCow(cowImageView)\n}\n}\n```\n\n我们首先清除指向当前被绑架奶牛的指针。这个值应该已经是\
  \ `nil`，但最好保持严谨。然后我们将一个表示牵引光束是否开启的布尔值设为 true/yes。此时，我们需要绘制牵引光束。为此，我们将 `tractorBeamImageView`\
  \ 的 frame 设置为玩家 UFO 当前所在的位置。我们将使用本节前面演示过的相同动画快捷方式来为牵引光束制作动画。接着，我们将牵引光束的 `imageView`\
  \ 添加到主视图中；这里使用 `insertSubview` 函数来确保牵引光束位于奶牛层下方，但位于背景层上方。然后我们调用 `hitTest` 函数，该函数将在本章稍后部分介绍。如果\
  \ `hitTest` 返回了结果，我们就调用 `abductCow` 函数。\n\n在继续讲解 `hitTest` 和 `abductCow` 函数之前，我们必须先完成触摸事件的处理。此时我们关心的另一个触摸事件是\
  \ `touchesEnded` 委托调用。当用户将手指从屏幕上移开时，我们需要将牵引光束从视图中移除，并让用户恢复移动。\n\n```\noverride func\
  \ touchesEnded(_ touches: Set, with event: UIEvent?) {\ntractorBeamOn = false\n\
  if gameIsMultiplayer {\ngcManager?.sendStringToAllPeers(\"$endTractorBeam\", reliable:\
  \ true)\n}\ntractorBeamImageView?.removeFromSuperview()\nif let currentAbductee\
  \ = currentAbductee {\nUIView.animate(\nwithDuration: 1.0,\ndelay: 0,\noptions:\
  \ [.curveEaseIn, .beginFromCurrentState],\nanimations: {\nvar frame = currentAbductee.frame\n\
  frame.origin.y = 260\nframe.origin.x = (self.myPlayerImageView?.frame.origin.x ??\
  \ 0.0) + 15\ncurrentAbductee.frame = frame\n}\n)\n}\ncurrentAbductee = nil\n}\n\
  ```\n\n将 `tractorBeamOn` 的状态变量设置为 `NO`。然后我们可以将牵引光束图像从视图中移除。接下来的代码段是将奶牛放回地面（如果它正悬在半空中）。为此，我们只需启动一个简单的动画，将奶牛送回地面。最后需要做的是将\
  \ `currentAbductee` 指针重置为 `nil`。\n\n#### 生成与移动奶牛\n\n正如本章前面所述，我们还有一个便捷函数用于生成新奶牛。这个函数在\
  \ `viewDidLoad` 中被调用，用于为玩家提供一定数量的基础奶牛进行绑架尝试；同时，每当我们完成一次绑架操作后也会调用它。\n\n```\nfunc\
  \ spawnCow() {\nlet x = Int(arc4random() % 480)\nlet cowImageView = UIImageView(frame:\
  \ CGRect(x: CGFloat(x), y: 260, width: 64, height: 42))\ncowImageView.image = UIImage(named:\
  \ \"Cow1.png\")\nview.addSubview(cowImageView)\ncowArray?.append(cowImageView)\n\
  }\n```\n\n**提示**\n\n`Arc4Random()` 会像 `rand()` 或 `random()` 一样返回一个随机数，但如果是第一次调用，它会自动进行种子初始化。\n\
  \n我们创建一个代表奶牛的新 `imageView`。然后使用 `arc4Random()` 函数生成一个随机的 x 坐标位置。设置奶牛将使用的图像，并将其添加到主视图中。最后需要将\
  \ `imageView` 添加到我们的奶牛数组中。这个数组将用于碰撞检测以及后续更新移动路径。\n\n虽然 UFO 游戏的设计并非极具挑战性，但我们确实希望在玩法上增加一些难度元素。以下函数将使我们的奶牛在屏幕上随机游荡：\n\
  \n```\nfunc updateCowPaths() {\nfor x in 0..<cowArray?.count ?? 0 {\nlet tempCow\
  \ = cowArray?[x] as? UIImageView\nguard let currentX = tempCow?.frame.origin.x else\
  \ { return }\nvar newX = currentX + CGFloat(arc4random() % 100) - 50\nif newX >\
  \ 480 {\nnewX = 480\n}\nif newX < 0 {\nnewX = 0\n}\nif tempCow != currentAbductee\
  \ {\nUIView.animate(\nwithDuration: 3.0,\ndelay: 0,\noptions: [.curveLinear],\n\
  animations: {\ntempCow?.frame = CGRect(x: CGFloat(newX), y: 260, width: 64, height:\
  \ 42)\n}\n)\n}\ntempCow?.animationDuration = 0.75\ntempCow?.animationRepeatCount\
  \ = 99999\n//翻转奶牛\nif newX < currentX {\nlet flippedCowImageArray = [UIImage(named:\
  \ \"Cow1Reversed.png\"), UIImage(named: \"Cow2Reversed.png\"), UIImage(named: \"\
  Cow3Reversed.png\")]\ntempCow?.animationImages = flippedCowImageArray.compactMap\
  \ { $0 }\n} else {\nlet cowImageArray = [UIImage(named: \"Cow1.png\"), UIImage(named:\
  \ \"Cow2.png\"), UIImage(named: \"Cow3.png\")]\ntempCow?.animationImages = cowImageArray.compactMap\
  \ { $0 }\n}\ntempCow?.startAnimating()\n}\n}\n//每 3 秒改变一次奶牛的路径\nDispatchQueue.main.asyncAfter(deadline:\
  \ .now() + 3, execute: {\nself.updateCowPaths()\n})\n}\n```\n\n我们需要遍历奶牛对象数组。我们在上述函数的第一行完成了这个操作。然后为奶牛随机生成一个新的\
  \ x 坐标。通过快速检查确保我们不会指示奶牛走出屏幕。然后提交动画。我们还需要处理奶牛的方向变化。\n\n**注意**\n\n我们用来处理该事件的代码并不是翻转图像最高效的方式，但如果你是这类游戏的新手，它是最容易学习的。\n\
  \n正如之前对牵引光束和 UFO 图像所做的处理一样，我们将添加一些动画帧，使奶牛走得更逼真。最后要做的是调用带有三秒延迟的 `performSelector`。这将每三秒更新一次奶牛的路径，增加一种更真实的随机移动外观。\n\
  \n\n\n#### 对 `UIImage` 执行命中检测\n\n在考虑如何设置绑架奶牛之前，我们需要先完成一些准备工作。首先，我们必须实现一个 `hitTest`\
  \ 函数，该函数此前会在本节前面讨论的 `touchesBegan` 事件中被调用。\n\n```\nfunc hitTest() -> UIImageView?\
  \ {\n    if !tractorBeamOn {\n        return nil\n    }\n    for x in 0..<(cowArray?.count\
  \ ?? 0) {\n        let tempCow = cowArray?[x] as? UIImageView\n        let cowLayer\
  \ = tempCow?.layer.presentation()\n        let cowFrame = cowLayer?.frame\n    \
  \    if cowFrame?.intersects(tractorBeamImageView?.frame ?? CGRect.zero) ?? false\
  \ {\n            tempCow?.frame = cowLayer?.frame ?? CGRect.zero\n            tempCow?.layer.removeAllAnimations()\n\
  \            if gameIsMultiplayer {\n                gcManager?.sendStringToAllPeers(String(format:\
  \ \"$abductCowAtIndex:%i\", x), reliable: true)\n            }\n            return\
  \ tempCow\n        }\n    }\n    return nil\n}\n```\n\n第一行代码是另一项合理性检查，确保我们在牵引光束未打开时不会调用\
  \ `hitTest` 函数。确认需要进行碰撞检测后，我们遍历奶牛对象数组。由于奶牛正在播放动画，我们不能依赖 `frame` 中的数据，因为它显示的是奶牛最终会移动到的位置，而非其当前位置。\n\
  \n要确定奶牛当前的位置，我们需要获取 `presentationLayer`。Core Graphics 提供了一个用于测试两个 `GCRects` 是否相交的有用函数，这正是我们要使用的。如果命中了某头奶牛，我们就返回该对象。如果遍历完整个循环仍未通过命中检测，则返回\
  \ `nil`，这表示牵引光束没有击中任何奶牛。\n\n> **提示：** 可以在任何 `CALayer` 上调用 `presentationLayer`，以提供对正在动画过程中图层当前值的最佳估算。虽然它不能绝对保证动画的当前位置，但为我们的游戏提供了足够好的解决方案。\n\
  \n#### 绑架奶牛\n\n在我们的 `touchesBegan` 函数中，我们测试了 `hitTest` 是否返回了一头奶牛。如果是，我们就调用 `abductCow`\
  \ 函数，并将返回的对象作为参数传入。现在，我们来仔细看看这个函数。\n\n```\nfunc abductCow(_ cowImageView: UIImageView?)\
  \ {\n    UIView.animate(\n        withDuration: 4.0,\n        delay: 0,\n      \
  \  options: [.curveEaseIn, .beginFromCurrentState],\n        animations: {\n   \
  \         var frame = cowImageView?.frame\n            frame?.origin.y = self.myPlayerImageView?.frame.origin.y\
  \ ?? 0.0\n            cowImageView?.frame = frame ?? CGRect.zero\n        },\n \
  \       completion: finishAbducting\n    )\n}\n```\n\n我们在奶牛对象（即一个 `imageView`）上启动动画事件。我们还设置了一个\
  \ `completion handler`（完成处理程序），它将在动画完成后被调用。我们将奶牛的 Y 轴新坐标设置为 UFO 当前的 Y 轴坐标，然后开始播放动画。\n\
  \n动画停止后，我们会收到 `finishAbducting` 的回调。这使我们能够增加分数、清理绑架代码，并生成一头新奶牛。\n\n```\nfunc finishAbducting(_\
  \ finished: Bool) {\n    if currentAbductee == nil || !tractorBeamOn {\n       \
  \ return\n    }\n    cowArray = cowArray?.filter({ ($0) as AnyObject !== (currentAbductee)\
  \ as AnyObject })\n    tractorBeamImageView?.removeFromSuperview()\n    tractorBeamOn\
  \ = false\n    score += 1\n    scoreLabel.text = String(format: \"SCORE %05.0f\"\
  , score)\n    currentAbductee?.layer.removeAllAnimations()\n    currentAbductee?.removeFromSuperview()\n\
  \    currentAbductee = nil\n    spawnCow()\n}\n```\n\n在函数开头，我们检查牵引光束是否仍然打开并且我们是否还有一个被绑架对象，这同样是出于额外的合理性和错误检查。正如我们在用户从屏幕上松开手指时所做的那样，我们也需要从视图中移除牵引光束图像，并正确设置状态变量。每绑架一头奶牛，我们就奖励用户\
  \ 1 分，并相应地更新 `scoreLabel`。我们清理旧奶牛图像，并将其设置回 `nil`。然后生成一头新奶牛来替换被绑架的奶牛。\n\n#### 在 App\
  \ Store Connect 中配置 Game Center\n\n在你的 Swift 应用程序或游戏能够访问任何 Game Center 功能之前，需要先在\
  \ App Store Connect（曾用名 iTunes Connect）中进行配置。Apple 使用这个门户网站作为其主要的应用配置来源。诸如应用内购买\
  \ (IAP)、TestFlight 和 Game Center 等功能都需要 App Store Connect 配置。\n\n> **注意：** 你仍然可以在不为应用设置\
  \ Game Center 的情况下，使用任何独立的 GameKit 功能。有关 GameKit 独立功能的更多信息，请参见第 6、7、8 和 10 章。\n\n\
  #### App Store Connect 入门\n\n如果你从未向 App Store 上传过应用，可能对 App Store Connect 门户不太熟悉。然而，如果你之前使用过\
  \ App Store Connect，可以跳到下一节，因为这里的内容对你来说是复习。\n\nApp Store Connect 是一个网页门户，可以通过任何网页浏览器在\
  \ [`https://appstoreconnect.apple.com`](https://appstoreconnect.apple.com) 访问。你需要使用已注册为开发者的现有\
  \ AppleID 来访问该门户。当你想要在 App Store 上架销售新应用，或对现有应用进行任何修改（如价格或描述）时，你也将使用这个相同的 Web 应用程序。App\
  \ Store Connect 的登录页面视图如图 1-4 所示。\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig4_HTML.png](img/216283_2_En_1_Fig4_HTML.png)\n\
  *图 1-4 – 2020 年 11 月拍摄的 App Store Connect 界面视图*\n\n登录 App Store Connect 后，你会看到大量的选项。其中最重要的是设置你的合同、税务和银行信息。虽然这些要求本身与\
  \ Game Center 无关，但最好尽早处理它们。\n\nApple 处理这些信息可能需要数周时间，因此请尽快提交。在这些信息被处理并批准之前，你将无法在\
  \ App Store 上发布软件。完成此部分下的所有要求信息后，你就可以专注于应用开发本身了。\n\n> **注意：** 如果你计划仅发布免费应用，则无需完成付费应用合同。但是，如果你将来计划发布任何付费软件，应尽快完成这些合同的填写。\n\
  \n在访问任何 Game Center 特定信息之前，你需要创建一个新的应用（或使用现有应用）。这是一个直接在 App Store Connect 中引导你完成的简单流程。你从“我的\
  \ App”部分开始；在那里，你会在网页标题左上角附近找到一个小加号按钮。其余操作应该相当直观易懂。\n\n如果你尚未准备好上传应用，可以在此处创建占位数据，以便访问\
  \ Game Center 门户。一旦在 App Store Connect 中创建了应用，你就可以开始配置 Game Center 的特定信息了。\n\n>\
  \ **警告：** 如果你创建了一个应用但在 90 天内未能上传一个发布版本，Apple 将删除该应用信息，并限制你将来使用相同名称创建新应用。这是为了防止有人“域名抢注”应用名称。\n\
  \n\n\n#### 在 App Store Connect 中配置 Game Center\n\n在 App Store Connect 中选定应用后，你将看到类似本小节后文图\
  \ 1-5 截图的视图。将注意力转向导航栏时，你会注意到 **Features**（功能）选项；这里就是配置 Game Center 项目的地方。\n\n如果你之前熟悉应用内购买（IAP）的配置流程，那么这个界面会让你感到非常熟悉。配置\
  \ IAP 的流程与配置 Game Center 类似。\n\n进入应用的 **Features** 区域后，你将可以选择添加挑战、新的排行榜或成就。我们将在后续章节中更详细地介绍这些选项（第\
  \ 3 章介绍排行榜，第 4 章介绍成就）。目前，我们只需要确保应用已设置完毕，随时可以添加 Game Center 功能。\n\n![../images/216283_2_En_1_Chapter/216283_2_En_1_Fig5_HTML.jpg](img/216283_2_En_1_Fig5_HTML.jpg)\n\
  \n**图 1-5** — 新应用的 Game Center 门户初始视图\n\n请务必在第一个标签页（新应用中的 \"App Store\"）的 **General\
  \ App Information**（通用应用信息）下勾选 Game Center 功能，否则你的应用可能无法注册为已启用 Game Center 功能。\n\
  \n**提示：** 如果你的应用无法识别 Game Center，最可能的原因通常是以下两个常见问题之一。请确保你的应用使用的 Bundle ID 与应用信息页面显示的\
  \ Bundle ID 一致。第二个问题可能是你等待的时间不够长。在 App Store Connect 中对 Game Center 做出更改，到应用检测到这些更改之间，可能存在长达\
  \ 30 分钟的延迟。\n\n### 本章小结\n\n现在，你应该对 GameKit 和 Game Center 的功能有了基本了解，同时也深入理解了本书后续内容中将使用的示例项目。此外，你现在应该能够轻松地在\
  \ App Store Connect 中创建一个新应用，并为其配置 Game Center 功能。\n\n在接下来的章节中，你将学习如何将 Game Center\
  \ 和 GameKit 的全部功能集成到应用中。在下一章中，你将学习如何将 Game Center 整合到项目中。\n\n---\n\n"
- "# 2. Game Center：配置与入门\n\n在上一章中，我们学习了如何在 App Store Connect 中配置 Game Center，并开始使用示例项目\
  \ *UFOs*。在本章中，我们将讨论如何将 Game Center 集成到我们的应用中，并动手编写一些代码。\n\n你将学习如何检测 Game Center\
  \ 兼容性、探索沙盒的限制、验证本地玩家、处理会话以及检索好友列表。你还将创建 `GameCenterManager` 类，我们将在本书剩余部分使用并扩展这个类。\n\
  \n## 创建 Game Center 管理器类\n\n在 Game Center 刚发布时，实施功能前测试兼容性非常重要；然而，多年来 Game Center\
  \ 已广泛应用于我们所有平台，除非你计划支持非常旧的设备，否则不再需要检查设备是否运行该功能。在实现 Game Center 功能的过程中，要执行此检查，首先需要创建新的\
  \ `GameCenterManager` 类。在本书剩余部分，我们将使用这个类将 Game Center 功能集中在一个易于访问的类中。这个类将包含所有 Game\
  \ Center 特定的代码和回调，并且可以轻松地在你的所有应用中共享和重用。\n\n首先，在 Xcode 中创建一个新的 Swift 文件；将新类命名为 `GameCenterManager`，如图\
  \ 2-1 所示。同时，你需要将 `GameKit.framework` 添加到项目中，并在新创建的 `GameCenterManager` 类顶部添加 `import\
  \ GameKit` 代码行。\n\n![../images/216283_2_En_2_Chapter/216283_2_En_2_Fig1_HTML.jpg](img/216283_2_En_2_Fig1_HTML.jpg)\n\
  \n**图 2-1** — 创建 `GameCenterManager` 类\n\n## 通过 Game Center 进行身份验证\n\n在使用 Game Center\
  \ 做任何操作之前，首先需要验证用户身份。使用 Game Center 进行身份验证的用户将始终被称为*本地玩家*，并由 `GKLocalPlayer` 类表示。如果在调用其他\
  \ Game Center 功能之前未能验证本地用户，将导致错误和其他未定义行为。\n\nApple 建议在应用中尽早通过 Game Center 进行身份验证。在用户需要访问任何\
  \ Game Center 行为之前进行身份验证的主要原因是，确保用户在执行 Game Center 操作时无需等待网络回调来验证身份。提前验证还可以确保用户在游戏过程中不会突然弹出登录提示，从而影响用户体验。在用户可能需要之前进行身份验证还有其他好处，我们将在后续章节中探讨，例如重新提交之前未能成功提交的高分。\n\
  \n### 修改 GameCenterManager 类\n\n处理身份验证需要向 `GameCenterManager` 类添加额外代码。这通过扩展 `GameCenterManager`\
  \ 结构体来实现。第一步是定义一个处理身份验证的新函数；我们将其命名为 `authenticateLocalUser`。完成处理程序被定义为调用视图控制器；这将允许我们向主游戏报告错误和成功。接下来，进行一个快速检查以确保本地玩家身份验证处理程序尚未定义，然后将其定义为调用视图控制器。\n\
  \n```swift\nclass GameCenterManager: UIViewController, GKMatchmakerViewControllerDelegate,\
  \ GKLocalPlayerListener, UIAlertViewDelegate {\n    func authenticateLocalUser(_\
  \ controller: UIViewController?) {\n        let localPlayer = GKLocalPlayer.local\n\
  \        if localPlayer.isAuthenticated == false {\n            localPlayer.authenticateHandler\
  \ = { [weak self] viewController, error in\n                guard let self = self\
  \ else {\n                    return\n                }\n                if let\
  \ viewController = viewController {\n                    controller?.present(viewController,\
  \ animated: true)\n                }\n                if localPlayer.isAuthenticated\
  \ {\n                    localPlayer.unregisterListener(self)\n                \
  \    self.submitAllSavedScores()\n                    self.submitAllSavedAchievements()\n\
  \                    DispatchQueue.main.asyncAfter(deadline: .now() + 3) { [weak\
  \ self] in\n                        self?.populateAchievementCache(nil)\n      \
  \              }\n                    GKLocalPlayer.local.register(self)\n     \
  \           }\n                self.playerDelegate?.processGameCenterAuthentication(error)\n\
  \            }\n        }\n    }\n}\n```\n\n**提示：** 别忘记导入 `GameKit` 框架，否则 `GKLocalPlayer`\
  \ 将无法被识别。\n\n\n\n### 从 UFOViewController 进行身份验证\n\n前面的函数将作为通过 Game Center 进行身份验证的辅助函数。虽然\
  \ Game Center Manager 代码已配置为让玩家登录，但你的应用需要调用这个新函数。你需要将注意力转回 `HomeViewController`，这是游戏启动后、任何游戏开始前所显示的视图控制器。可以将以下代码添加到\
  \ `viewDidLoad` 函数中：\n\n```\nfunc authenticateLocalUser(_ controller: UIViewController?)\
  \ {\nlet localPlayer = GKLocalPlayer.local\nif localPlayer.isAuthenticated == false\
  \ {\nlocalPlayer.authenticateHandler = { [weak self] viewController, error in\n\
  guard let self = self else {\nreturn\n}\nif let viewController = viewController\
  \ {\ncontroller?.present(viewController, animated: true)\n}\nif localPlayer.isAuthenticated\
  \ {\nlocalPlayer.unregisterListener(self)\nself.submitAllSavedScores()\nself.submitAllSavedAchievements()\n\
  DispatchQueue.main.asyncAfter(deadline: .now() + 3) { [weak self] in\nself?.populateAchievementCache(nil)\n\
  }\nGKLocalPlayer.local.register(self)\n}\nself.playerDelegate?.processGameCenterAuthentication(error)\n\
  }\n}\n}\n```\n\n第一行代码调用了 Game Center Manager 中的 `authenticateLocalUser` 函数。之后，在显示登录视图控制器之前，会执行一次错误检查。如果遇到错误，我们会向用户显示一个警告窗口，告知他们错误信息。如果没有错误，则会显示\
  \ Game Center 登录界面。\n\nGame Center 会在此处处理所需的登录视图、身份验证以及任何账户创建流程。然而，我们确实需要关注身份验证完成处理程序，以便捕获身份验证过程中遇到的任何错误。\n\
  \n> **注意**\n> 如果你在某个应用内取消 Game Center 登录三次或更多次，那么在前往 `GameCenter.app` 并登录之前，你将无法再从该应用登录。这是一种未记录的行为，如果你不清楚自己在查找什么，追踪起来会非常麻烦。此外，如果你发现即使在\
  \ `GameCenter.app` 中也无法登录，可以通过重置模拟器或恢复设备来解决这些问题。你的应用用户很少会遇到这些问题，但作为开发者，频繁的调试和错误测试很可能会让你陷入意料之外的*行为状态*。\n\
  \n> **提示**\n> 如果遇到“Game Center 无法识别此游戏”的错误，请确保检查你的 bundle identifier，并且它与你在 App\
  \ Store Connect 中设置的应用相匹配。\n\n这里有必要花点时间讨论一下线程安全。线程安全可能是一个你非常熟悉的术语，也可能是在我们的资料中简要提到过的概念，甚至对你来说可能是一个全新的术语。虽然深入探讨线程超出了本书的范围，但至少对其技术有一个初步的了解是很重要的。\n\
  \n当应用执行和运行时，它可以沿着单个线程按顺序执行，这意味着下一个任务必须等前一个任务完成后才能开始。这被称为同步执行。另一方面，你也可以让多个任务同时运行，并以它们各自完成时的顺序结束；这被称为异步执行。异步运行代码通常更快，因为现代设备拥有多个核心，每个核心可以同时处理一个或多个任务。然而，不知道任务何时结束、任务在其它任务之前完成，或者试图让两个任务同时修改同一个对象，都可能导致错误、意外行为，甚至难以追踪的竞争条件。\n\
  \n你可能已经注意到，在查阅示例代码、框架、方法或函数时，作者有时会注明某些内容是否是线程安全的、不是线程安全的，或者需要在主线程上执行。这些标注将帮助你做出明智的决策，以编写最优化的代码，并引导你避免错误和崩溃。作为一般经验法则，如果你正在更新界面元素，例如显示一个按钮、弹出警告或更改屏幕上某个内容的颜色，该操作必须在主线程上执行。\n\
  \nGame Center 和 GameKit 的许多功能都要求代码在主线程上执行。由于我们不是在后台线程上运行本地用户的身份验证，因此示例应用中不需要做任何更改。但是，如果你正在设计一个将从后台线程进行身份验证的应用，请确保通过主线程访问身份验证函数；虽然有很多方法可以实现这一点，但最简单（尽管可能不是最优）的方法如下：\n\
  \n```\nDispatchQueue.main.async { [unowned self] in\nself.yourCodeHere()\n}\n```\n\
  \n无论用户是否已登录 Game Center，你的应用都应继续正常运行，但在成功登录后，可能有必要设置一些标志或执行一些其他操作。\n\n你可以将以下代码片段添加到\
  \ `authenticateLocalUser` 完成处理程序的末尾：\n\n```\nif (GKLocalPlayer.local.isAuthenticated)\n\
  {\nprint(\"成功通过身份验证\")\n}\n```\n\n现在，当你登录时，你应该会在控制台中看到“成功通过身份验证”的输出，以及图 2-2 中显示的图像（其中显示的是你的\
  \ Game Center 名称）。\n\n> **注意**\n> 为测试目的登录 Game Center 时，请始终创建一个新的 Apple ID。切勿使用现有的\
  \ Apple ID 从沙盒环境登录 Game Center。历史上有过用户账户在测试期间损坏的事例，处理主 Apple ID 上的损坏账户可能会非常麻烦。\n\
  \n![../images/216283_2_En_2_Chapter/216283_2_En_2_Fig2_HTML.jpg](img/216283_2_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2** – 用户登录 Game Center 时将看到的标准欢迎回来消息\n\n> **提示**\n> 如果你在登录时遇到问题，请确保 `info.plist`\
  \ 中的 bundle ID 与 App Store Connect 中启用了 Game Center 的 bundle ID 相匹配。有关在 App Store\
  \ Connect 中配置 Game Center 的更多信息，请参阅第 1 章。\n\n## 监听状态变化\n\n由于多个应用在后台运行，并且取决于设备并排运行的情况，身份验证可能会变得稍微复杂一些，因为用户会通过不同的应用登录和注销。例如，当你的应用在后台时，用户可能会注销\
  \ Game Center，甚至以不同用户身份登录。因此，通过 `NSNotification` 系统监听本地用户的变化至关重要。\n\n在 `UFOViewController.m`\
  \ 的 `viewDidLoad` 中，紧接在验证 Game Center 是否可用的测试之后，添加以下代码片段：\n\n```\nNotificationCenter.default.addObserver(self,\
  \ selector: #selector(localUserAuthenticationChanged(_:)), name: NSNotification.Name.GKPlayerAuthenticationDidChangeNotificationName,\
  \ object: nil)\n```\n\n你还需要向 `UFOViewController` 添加一个新函数。每当玩家身份验证状态改变时，都会调用此函数。\n\
  \n```\n@objc private func localUserAuthenticationChanged(_ notification: Notification)\
  \ {\nprint(\"身份验证已更改: \\(notification.object ?? \"()\")\")\n}\n```\n\n这个新函数将在身份验证更改时打印新的\
  \ `GKLocalPlayer` 的描述。你需要确定在你的应用中需要采取哪些特殊步骤来处理本地玩家的更改。\n\n> **提示**\n> 在发布应用之前，不要忘记测试用户切换，因为苹果会在审核阶段进行此项测试。\n\
  \n\n\n## 使用 `GKLocalPlayer`\n\n`GKLocalPlayer` 在使用 Game Center 认证后始终存在且非空；此对象是用户的表示形式。你无需创建\
  \ `GKLocalPlayer` 的实例，这通过类方法 `localPlayer` 处理。`localPlayer` 单例是你与 `localPlayer`\
  \ 交互的唯一方式。\n\n`GKLocalPlayer` 具有以下几个相关属性：`authenticated`、`underage`、`isMultiplayerGamingRestricted`\
  \ 和 `isPersonalizedCommunicationRestricted`。我们将在下一节中处理 `friends` 属性。我们在前几节的认证代码中已经使用过\
  \ `authenticated` 布尔值。\n\n`underage`、`isMultiplayerGamingRestricted` 和 `isPersonalizedCommunicationRestricted`\
  \ 属性可用于限制支持 Game Center 的应用程序中的内容。以下代码执行年龄限制检查；类似代码也可用于多人游戏或通信限制：\n\n```\nif (GKLocalPlayer.local.isUnderage)\n\
  {\nprint(\"用户年龄不足\")\n}\n```\n\n### Game Center 好友\n\n当 Game Center 首次发布时，大量重点放在了构建和管理个人好友列表上。多年来，这已不再是苹果的重点关注对象。本地用户的\
  \ `friends` 属性已在 iOS 8 中弃用，并被 `loadFriendPlayers` 取代，而后者又在 iOS 10 中弃用。最终，`loadRecentPlayers`\
  \ 被引入，并仍在 iOS 14 中可用。你可能会注意到此函数不包含“friends”一词；但文档提供了更多信息。以异步方式将可挑战的好友列表加载为 `GKPlayer`\
  \ 数组。可挑战的玩家是好友等级为 1 和 2（即 FL1 和 FL2）的玩家。此函数在完成时调用 `completionHandler`。成功时 error\
  \ 为 nil。设置应用中的 Game Center 控件仍然允许你添加好友。\n\n虽然可玩好友在 Game Center 的新更新中仍然不被优先考虑，但获取已通过身份验证的本地用户的好友\
  \ `GKPlayer` 列表的功能仍然存在。\n\n为了检索所有现有 Game Center 好友的列表，可以使用以下函数：\n\n```\nfunc retrieveFriendsList()\
  \ {\nif GKLocalPlayer.local.isAuthenticated == true {\nGKLocalPlayer.local.loadRecentPlayers(completionHandler:\
  \ { [weak self] recentPlayers, error in\nDispatchQueue.main.async { [weak self]\
  \ in\nself?.playerDelegate?.friendsFinishedLoading(recentPlayers, error: error)\n\
  }\n})\n} else {\nprint(\"您必须先进行验证\")\n}\n}\n```\n\n此方法将在数据完全检索后回调 `friendsFinishedLoading`。在以下代码片段中，你可以看到该函数可能的实现方式：\n\
  \n```\nfunc friendsFinishedLoading(_ friends: [GKPlayer]?, error: Error?) {\nif\
  \ let error = error {\nprint(\"好友列表请求期间发生错误：\\(error.localizedDescription)\")\n\
  } else if let friends = friends {\nplayerDataLoaded(friends, error: error)\n}\n\
  }\n```\n\n一旦数据从服务器加载完毕，将实现一个最终函数将数据打印到控制台。\n\n```\nfunc playerDataLoaded(_ players:\
  \ [GKPlayer]?, error: Error?) {\nif let error = error {\nprint(\"玩家查找期间发生错误：\\(error.localizedDescription)\"\
  )\n} else {\nprint(\"加载的玩家：\\(players ?? [])\")\n}\n}\n```\n\n### 使用玩家\n\nGame Center\
  \ 的核心是一种社交服务，因此它围绕玩家展开，无论是挑战、多人游戏、排行榜还是争夺成就。你需要了解与 `GKPlayer` 对象相关的属性。有三个属性处理玩家名称：`gamePlayerID`\
  \ 和 `teamPlayerID`，它们是标识玩家的唯一标识符。`gamePlayerID` 是静态的，对于同一游戏始终指向同一玩家，而 `teamPlayerID`\
  \ 对于你开发者帐户中所有游戏中的该玩家是唯一的。因此，`teamPlayerID` 允许你在多个应用中识别同一玩家，这对于营销和交叉推广非常有用。`gamePlayerID`\
  \ 和 `teamPlayerID` 字符串绝不应在你的应用中向用户显示；它们仅用于内部参考。另一方面，`alias` 或 `displayName` 是动态的，用户可以随时更改。Game\
  \ Center 用户可以随时设置新别名；`alias` 属性将始终显示别名；如果你使用 `displayName`，它通常会显示别名，除非用户是好友，此时它将显示其真实姓名。`alias`\
  \ 和 `displayName` 绝不应用于验证用户身份，但它们应是向应用用户标识该玩家的唯一字符串。同样重要的是要记住，别名不是唯一的，多个玩家可能拥有相同的别名或\
  \ `displayName`。\n\n注意\n\n请勿对玩家标识符字符串的结构做任何假设。其格式和长度可能会发生变化。\n\n在查看 Game Center\
  \ 中的任何玩家 ID 列表时，我们不会从 `GKPlayer` 对象开始，而是一个用户 ID 数组。为了帮助我们使用玩家，我们将添加两个额外的便捷方法，将玩家\
  \ ID 转换为 `GKPlayer` 对象。\n\n我们需要创建两个新函数：一个处理玩家 ID 数组，另一个处理单个玩家 ID。这将为我们未来的工作节省额外精力。我们将这些辅助方法添加到\
  \ `GameCenterManager` 类中。\n\n我们将向 `GameCenterManager` 类添加以下两个函数方法：\n\n```\nfunc\
  \ playersForIDs(_ playerIDs: [String]) {\nGKPlayer.loadPlayers(forIdentifiers: playerIDs)\
  \ { [weak self] players, error in\nDispatchQueue.main.async {\nself?.playerDelegate?.playerDataLoaded(players,\
  \ error: error)\n}\n}\n}\nfunc playerForID(_ playerID: String) {\nplayersForIDs([playerID])\n\
  }\n```\n\n现在，当应用运行时（假设你的 Game Center 账户关联了好友），它将拉取好友的玩家 ID 列表，然后执行查找并将 `GKPlayer`\
  \ 描述打印到控制台。你的输出应类似于以下内容：\n\n```\nUFOs[4038:207] 认证已更改：(playerID: G:1092793231, alias:\
  \ the_other_kyle, status: (null), rid:(null)) UFOs[4038:207] 加载的玩家：\n(\"(playerID:\
  \ G:1093075676, alias: johncash, status: (null),4-rid:(null))\"\n)\n```\n\n## 总结\n\
  \n在本章中，你学习了如何测试 Game Center 兼容性以及如何认证本地用户。现在，你应该已经牢固掌握了如何使用 `GameCenterManager`\
  \ 类，以及它对于创建干净、易于在多个项目中重复使用的代码环境所带来的好处。\n\n在下一章中，我们将深入研究排行榜，并扩展本章所学的主题。如果你对本章讨论的任何内容有疑问，请记住，附带的示例代码包含了所有讨论主题的工作示例。\n\
  \n\n\n"
- "# 3. 排行榜\n\n排行榜的历史比电子游戏本身还要悠久。我们熟知的排行榜，可以追溯到 20 世纪 50 年代最初的弹球游戏时代。这些弹球游戏的制造商很快意识到，增加一个最高分列表能提升竞争性，这也就意味着玩家会玩得更久、赚取更多收入。\n\
  \n到了 20 世纪 70 年代，电子游戏开始兴起时，排行榜迅速被这些新游戏采纳，首次出现在 1976 年发布的`Sea Wolf`游戏中（见图 3-1）。从那以后，排行榜便成为游戏文化中不可或缺的一部分。排行榜变得如此普及，以至于\
  \ 2007 年还上映了一部名为《金刚之王》的长篇纪录片，讲述了围绕任天堂`Donkey Kong`最高分展开的激烈竞争。《金刚之王》大受欢迎，甚至催生了一部名为《金刚之王：音乐剧》的音乐剧，并且传闻导演塞斯·戈登正在筹备改编成剧本电影。排行榜已成为主流，如今每款电子游戏都期待它的存在。它仍然是提升游戏完整度和可重玩性最简单的途径之一。\n\
  \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig1_HTML.jpg](img/216283_2_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1**  \n`Sea Wolf`（1976 年），第一款引入最高分功能的电子游戏\n\niOS、Mac 和 Apple TV 平台下的`Game\
  \ Center`极大简化了在项目中添加排行榜的工作。这是一个巨大的进步，因为在此之前，开发者必须自行编写和维护一个服务器来存储、推送和获取分数。在本章中，我们将探讨在`Game\
  \ Center`中实现多个排行榜所需的步骤，以及所有必要的排行榜支持。你将学习如何提交分数、获取排行榜、自定义排行榜的图形用户界面（GUI），以及创建适合你应用的排行榜所需的所有内容。\n\
  \n## 为什么要使用排行榜？\n\n在着手处理排行榜本身之前，理解排行榜为何能成为社交应用或游戏不可或缺的一部分至关重要：\n\n- 排行榜能在应用或游戏中营造社区感，否则用户可能无法直接与其他用户互动。\n\
  - 排行榜能驱使用户为了超越自己、朋友或整个社区的分数而再次打开你的应用。\n- 排行榜能在应用中营造目标感和成就感。\n- 排行榜让用户更容易与朋友、家人和同伴分享他们的应用体验和进度。\n\
  - `Game Center`中的排行榜易于实现，能让你的应用迅速显得更加精致和完善。\n\n## Game Center 排行榜概览\n\n在`Game Center`中，排行榜是与某个特定排行榜标识符相关的一组`GKScore`对象，每个应用可以拥有多个排行榜。可以根据好友状态和提交日期来获取并进一步筛选排行榜。\n\
  \n`GKScore`对象代表特定排行榜上的每一个条目。一个`GKScore`总是关联一个玩家 ID。当向排行榜提交新的`GKScore`时，玩家 ID 由 API\
  \ 自动设置且无法更改。日期和排名等数值也会自动设置和更新。你只需设置原始分数值和该分数所属的排行榜类别。\n\n获取和显示排行榜有两种方式。最常见也最简单的方法是使用\
  \ Apple 的排行榜 GUI。这是我们在后续章节中首先学习的方法。第二种方法是获取原始的`GKScore`值，并在你自己的 GUI 中显示它们；本章稍后也会讨论这种方法。排行榜集是在\
  \ iOS 7 中引入的；这些集合允许开发者将多个排行榜组合成一个组。排行榜集非常灵活，可以以多种不同方式使用，最流行的是为游戏中的不同世界或难度级别创建排行榜组。你可以定义多达\
  \ 100 个排行榜集，每个集合最多包含 100 个排行榜。\n\n**注意**\n\n`Game Center`目前对每个捆绑包 ID 的排行榜或排行榜集数量限制为\
  \ 100 个。当你使用排行榜集时，排行榜的限制会提高到 500 个，同时仍然遵守每个排行榜集最多包含 100 个排行榜的限制。\n\n### 使用 Apple\
  \ 排行榜 GUI 与自定义 GUI 的优缺点\n\n使用 Apple 排行榜 GUI 的优点包括：\n\n- 其设计出自世界顶尖设计师之手。当 Apple 更新设计时，它们会自动在你的应用中更新，让你的用户界面瞬间焕然一新，并保持更现代的感觉，即使你没有定期更新。\n\
  - 实现和显示排行榜非常简单。\n- 用户会看到一个他们已熟知如何操作的熟悉界面。\n\n使用自定义 GUI 的优点包括：\n\n- 你的排行榜可以与应用的定制设计相匹配。\n\
  - 你对最终数据有更多掌控权，并可以使用额外标准进行筛选。\n- 你可以实现自己的自定义缓存逻辑。\n\n如你所见，每种系统都有其优缺点，并没有哪个是绝对正确的选择。在本章结束时，你将掌握这两种方式的坚实基础，并能根据你应用的具体需求，就采用哪种方法做出正确决策。\n\
  \n\n\n## 在 App Store Connect 中配置排行榜\n\n在处理排行榜的代码部分之前，必须先在 App Store Connect 中设置一个新的排行榜。登录\
  \ App Store Connect（[`https://appstoreconnect.apple.com/`](https://appstoreconnect.apple.com/)），然后选择我们在第\
  \ 1 章和第 2 章中一直在处理的应用程序。从控制面板中选择应用后，进入“功能”区域，然后选择“Game Center”。\n\n应用的 Game Center\
  \ 门户会有一个标有“排行榜”的部分。进入排行榜部分后（见图 3-2），点击排行榜部分左上角的“+”按钮。系统会提示您选择“经典排行榜”或“定期排行榜”。经典排行榜将构建一个分数列表，该列表对您的游戏是永久性的，且永远不会重置。而定期排行榜则会指定一个固定的时间长度，排行榜会在此时间后自动重置，例如每周一次。\n\
  \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig2_HTML.jpg](img/216283_2_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2\n\n在 App Store Connect 中添加新的排行榜\n\n我们首先创建一个新的经典排行榜，如图 3-3 所示。第一个需要输入的是“排行榜引用名称”。此值仅用作\
  \ App Store Connect 内部的引用。引用名称旨在帮助您快速在 App Store Connect 中找到排行榜，用户永远不会看到它。在本示例中，您可以使用引用名称\
  \ `Leaderboard Foo`。\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig3_HTML.jpg](img/216283_2_En_3_Fig3_HTML.jpg)\n\
  \n图 3-3\n\n在 App Store Connect 中创建一个新的经典排行榜\n\n下一个字段是“排行榜 ID”，您将在代码中查询此值以检索特定的排行榜。Apple\
  \ 建议对此字段使用反向 DNS 类型的条目，例如 `com.company.appname.leaderboardname`。请在此处为您的应用填写适当的值；具体内容不重要，但您需要在本章剩余部分记住它们。\n\
  \n创建新排行榜时，还需要选择“分数格式类型”。选择符合您分数数据要求的分数格式。有关分数数据格式的信息，请参见表 3-1。\n\n表 3-1\n\n在 App\
  \ Store Connect 中添加新排行榜的分数格式类型\n\n| 分数格式类型 | 示例输出 |\n| --- | --- |\n| 整数 | 12,345\
  \ |\n| 定点数，保留 1 位小数 | 12,345.1 |\n| 定点数，保留 2 位小数 | 12,345.12 |\n| 定点数，保留 3 位小数 |\
  \ 12,345.123 |\n| 已用时间，精确到分钟 | 3:45 |\n| 已用时间，精确到秒 | 3:45:55 |\n| 已用时间，精确到百分之一秒\
  \ | 3:45:55.82 |\n| 货币，整数部分 | $182,121 |\n| 货币，保留 2 位小数 | $182,121.68 |\n\n**提示**\n\
  \n如果提供的格式类型都不符合您的要求，请选择与您需求最匹配的一个。在本章后续部分，您将看到如何通过检索原始分数值来自定义这些值。\n\n下一个字段是“分数提交类型”；有两个选项可供选择：“最佳分数”和“最近分数”。如果您希望最佳分数优先显示，请选择“最佳分数”。如果您希望最近分数优先显示，请选择“最近分数”。\n\
  \n您还需要选择排行榜是按升序还是降序排序。升序将显示最低分数优先，例如在高尔夫比赛或赛道圈速中。降序将显示最高分数优先，例如在足球比赛或第一人称射击游戏的典型分数中。\n\
  \n还有一个可选的“分数范围”字段。这可以防止用户提交超出批准范围的分数；例如，如果您有一个高尔夫游戏，合理情况下您不会期望有人为 18 洞比赛提交低于 18\
  \ 杆的分数；同样，您可能也不希望有人能够提交 100,000 分。此字段为可选，但可以防止因恶意用户行为导致排行榜数据异常。\n\n创建新经典排行榜时需要完成的最后一项是输入本地化分数信息，如图\
  \ 3-4 所示。App Store Connect 内置了对 Game Center 的本地化支持；您需要为要支持的每种语言创建一个新条目。您还可以添加一个独特的图像，与本地化的排行榜一同显示。\n\
  \n“名称”字段是排行榜在所选语言中的显示名称。“分数格式”字段会根据您在前一屏幕上选择的分数格式类型而变化。（货币格式的示例请参见图 3-4。）您还需要提供一个分数格式后缀。在检索格式化的分数属性时，该字符串将附加到您的分数值末尾。\n\
  \n**注意**\n\n您需要为您创建的每个排行榜至少添加一种语言，然后它才能被视为有效。\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig4_HTML.jpg](img/216283_2_En_3_Fig4_HTML.jpg)\n\
  \n图 3-4\n\n编辑新排行榜的本地化信息\n\n**提示**\n\n如果您希望在格式化的分数值中，分数和分数格式后缀之间出现一个空格，请不要忘记在分数后缀的开头添加一个空格。\n\
  \n现在，您已经为您的应用配置了一个经典排行榜。有时您可能希望创建一个排行榜集合，即一组具有共同属性的排行榜。例如，您的游戏有多个不同的世界，每个世界包含多个排行榜，分别针对收集最多金币、获得最高分数和击杀最多敌人。要启用排行榜集合，我们需要至少两个共享相同分数格式类型的排行榜。现在，请继续创建第二个经典排行榜。\n\
  \n一旦您拥有两个共享相同分数格式类型的排行榜，就可以创建一个排行榜集合。在您创建了两个排行榜后，排行榜界面部分的右上角会出现一个标有 `More` 的选项。`Move\
  \ All Leaderboards Into Leaderboard Set` 选项将启动设置排行榜集合的流程。主要区别在于，您需要选择要合并的排行榜，如图\
  \ 3-5 所示。您需要创建一个新的排行榜 ID，并为新的合并后的排行榜指定本地化数据。\n\n**注意**\n\n`Move All Leaderboards\
  \ Into Leaderboard Set` 的表述方式容易令人困惑；您不需要将所有现有的排行榜都移入一个新的集合中，您仍然可以选择性地挑选那些应该放在同一个集合中的排行榜。\n\
  \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig5_HTML.jpg](img/216283_2_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5\n\n创建一个合并排行榜\n\n我们还将添加最后一个单独的排行榜，以便与一个未合并的排行榜一起工作，因为我们之前创建的两个排行榜现在已成为“已附加”类型的排行榜。现在，您的排行榜面板中应该有四个排行榜：两个已附加的、一个合并的，以及一个单独的排行榜。既然我们已经有了一些有效的排行榜可供使用，我们可以回到\
  \ Xcode 并开始处理排行榜相关的代码。\n\n**重要**\n\n一旦排行榜在已发布的应用中上线，就永远无法删除，因此在发布应用之前，请仔细核对您的排行榜信息。\n\
  \n\n\n## 周期性排行榜\n\n苹果最近扩展了排行榜功能，允许创建限时排行榜，称为周期性排行榜。它们的添加方式与经典排行榜相同，只是在提示时需选择周期性选项。周期性排行榜将新增三个选项：第一个是排行榜首次对用户可用的日期和时间，第二个是排行榜的有效持续时间，最后一个是排行榜重置并重新可用的延迟时间。参考图\
  \ 3-6，新排行榜将于 2021 年 6 月 7 日开始生效，并收集 24 小时的分数；每 7 天排行榜将重置所有分数，并在接下来的 24 小时内再次开放。\n\
  \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig6_HTML.jpg](img/216283_2_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6\n\n创建周期性排行榜\n\n## 提交分数\n\n在排行榜提供任何实用功能之前，我们需要用一些分数数据来填充它。我们通过再次修改`GameCenterManager`类来开始这一过程。在实现中添加以下函数；它看起来应该非常熟悉，因为其遵循的模式与我们实现认证方法时使用的相同：\n\
  \n```\nfunc reportScore(_ score: Int, forCategory category: String) {\n    GKLeaderboard.submitScore(score,\
  \ context: 0, player: GKLocalPlayer.local, leaderboardIDs: [category]) { [weak self]\
  \ error in\n        if let error = error {\n            print(\"提交分数时发生错误。数据将保存到\
  \ UserDefaults：\\(error.localizedDescription)\")\n            let savedScore = SavedScore(score:\
  \ score, category: category)\n            self?.storeScoreForLater(savedScore)\n\
  \        }\n        DispatchQueue.main.async { [weak self] in\n            self?.gameDelegate?.scoreReported(error)\n\
  \        }\n    }\n}\n```\n\n这个新方法接收一个整数作为分数和一个`GKLeaderboard`对象。日期和用户值已由 API 自动设置。当在`GKLeaderboard`上调用`submitScore`时，它接受分数、玩家上下文和提交分数的玩家（应始终是本地玩家）。\n\
  \n至此，我们对`GameCenterManager`类的所有必要修改已完成。现在我们可以将注意力转回游戏本身。首先需要实现一些新的游戏机制来处理高分。\n\n\
  ### 向 UFO 游戏添加分数提交功能\n\n在我们的 UFO 游戏中，有两种明显的计分方式。第一种是实现一个系统，统计被劫持的奶牛数量，并将其作为分数提交。虽然这种方法对我们来说最容易实现，但游戏体验并不有趣，因为游戏没有合理的结束点。第二种高分方法实现起来更复杂，但更有意义。它会记录用户劫持十头奶牛所用的时间；用时最短的用户获胜。\n\
  \n对于你自己的应用来说，这些是需要仔细考虑的主题；有时最直接的高分方法对用户来说并不有趣。为本书的目的，我们将演示第一种方法，即被劫持的奶牛数量作为用户分数。如果你要实现一个基于计时器的系统，方法非常相似：在回合开始时启动计时器，当十头奶牛被劫持后，提交计时器上的秒数作为分数。\n\
  \n为了实现这个基于分数的系统，我们需要增加玩家结束游戏的途径。在实际游戏中，这可以通过角色死亡或时间限制来实现。但为示例起见，我们只需添加一个退出按钮。这将允许用户模拟游戏结束事件，同时保持代码专注于\
  \ Game Center 而不增加额外复杂性。\n\n我们在`UFOGameViewController.xib`中添加一个退出按钮，如图 3-7 所示。我们还需要为退出按钮创建新的`IBAction`。将以下代码添加到`UFOGameViewController`中，并将退出按钮连接到它。暂时，我们只需让导航控制器返回到根视图：\n\
  \n```\n@IBAction func exitAction(_ sender: Any) {\n    navigationController?.popViewController(animated:\
  \ true)\n}\n```\n\n**注意：** 你不必等到游戏结束才提交新分数，但通常认为这是好习惯。如果可能，应避免在游戏中多次提交新分数。\n\n一个明显的例外可能是连续的角色扮演游戏，其中分数不断更新，且没有合适的结束点来提交分数。\n\
  \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig7_HTML.jpg](img/216283_2_En_3_Fig7_HTML.jpg)\n\
  \n图 3-7\n\n添加退出游戏功能以便提交高分\n\n剩下的最后一步是实际向 Game Center 提交分数；你可能还记得，我们已经在`GameCenterManager`类中编写了处理此操作的方法。我们已在`UFOViewController`中使用了`GameCenterManager`类的实例来认证用户。\n\
  \n我们还需要修改`exitAction`方法以便直接提交分数。为此，用以下代码替换旧的`exitAction`函数。注意我们使用的是在 App Store Connect\
  \ 中设置的排行榜 ID；请确保使用你输入的那个 ID，因为它很可能与示例不匹配：\n\n```\n@IBAction func exitAction(_ sender:\
  \ Any) {\n    navigationController?.popViewController(animated: true)\n    gcManager?.reportScore(Int64(score),\
  \ forCategory: \"com.dragonforged.ufo.single\")\n}\n```\n\n现在当你运行游戏并点击退出时，应该会看到类似以下输出的控制台信息：\n\
  \n```\n2011-02-10 12:32:47.629 UFOs[15092:207] Score submitted\n```\n\n> **提示：**\
  \ 关于更复杂但用户友好的分数提交方法，请参见本章末尾的“更好的方法”一节。\n\n现在我们已经向排行榜提交了分数，在接下来的章节中，我们将学习如何将这些数据呈现给用户。为了尽可能简化本节内容，此操作已大大简化。这并非你希望为用户提供的用户体验；我们只是在等待网络回调时将用户困在游戏画面中。实际上，你需要在之前的视图中处理委托回调。这可以确保用户在无需等待时不会等待。为简单起见，我们将继续使用更易理解的方法。\n\
  \n> **提示：** 每个玩家在每个排行榜类别中只能提交一个分数。你可能会注意到提交的分数从未出现在排行榜上。如果遇到这种情况，请确保你提交的分数高于该玩家的最高分数。\n\
  \n\n\n## 处理提交分数时的失败情况\n\n如果分数提交失败，作为开发者的您需要全权负责存储该分数，并在错误解决后重新提交。没有什么比用户取得新高分却因网络故障甚至崩溃而丢失更令人沮丧的了。这也是苹果在应用审核时喜欢测试的一个环节，因此请记住，如果您未能妥善实现，可能会被拒绝。\n\
  \n存储分数信息以便后续重新提交的方法有很多种；不过，我认为以下方法对于新手来说是最容易实现的。如果您认为提供的方法不适合您的应用需求，请随意实现您自己的系统。\n\
  \n要处理并从分数提交失败中恢复，需要完成三个步骤。第一步是保存分数数据。虽然在此示例中我们不会通知用户失败，但建议告知用户其分数当前无法提交，并说明您稍后将自动重试。请修改`GameCenterManager`中的以下函数，使其与以下代码一致：\n\
  \n```\nstatic func reportScore(score: Int, to leaderboard: GKLeaderboard, using\
  \ context: Int, completion: ((Error?) -> ())?) {\n    leaderboard.submitScore(score,\
  \ context: context, player: GKLocalPlayer.local) { (error) in\n        if error\
  \ != nil {\n            self.storeScoreForLater(\n                with: StoredScore(\n\
  \                    score: score,\n                    leaderboardId: leaderboard.baseLeaderboardID,\n\
  \                    context: context,\n                    playerId: GKLocalPlayer.local.gamePlayerID\n\
  \                )\n            )\n        }\n        if let completion = completion\
  \ {\n            completion(error)\n        }\n    }\n}\n```\n\n我们添加了几行额外的代码，当检测到错误时会运行；如果检测到错误，则捕获并保存`GKScore`中的`NSData`。稍后我们将从该`NSData`中检索`GKScore`。我们还调用了一个名为`storeScoreForLater`的新函数。现在让我们看看这个函数；请将以下函数添加到`GameCenterManager`类的实现中：\n\
  \n```\nprivate static func storeScoreForLater(with score: StoredScore) {\n    var\
  \ savedScores: [StoredScore] = []\n    if let data = UserDefaults.standard.data(forKey:\
  \ savedScoresKey) {\n        savedScores = (try? JSONDecoder().decode([StoredScore].self,\
  \ from: data)) ?? []\n    }\n    savedScores.append(score)\n    UserDefaults.standard.setValue(try?\
  \ JSONEncoder().encode(savedScores), forKey: savedScoresKey)\n}\n```\n\n这段代码会将表示分数的`NSData`保存到用户默认设置中。您也可以将这些数据写入文件，甚至存储在\
  \ Core Data 中。切勿假设用户只有一个未提交的分数；他们在离线游戏时，可能会在多个不同的排行榜上累积许多分数。\n\n我们已经捕获了发布失败的情况，并将分数保存到磁盘以供稍后重试。剩下的最后一步是尝试将分数重新提交到\
  \ Game Center。这一步可能非常复杂，具体取决于您希望系统有多智能。大多数分数提交失败的问题与网络访问有关，但也可能由 Game Center 宕机甚至\
  \ DNS 问题引起。\n\n关于何时重新提交分数并没有标准答案，但原则是不要让可以提交的分数被搁置。在考虑将重试失败分数的方法挂接在何处之前，我们先来实现一个重试分数发布的方法。请将以下方法添加到您的`GameCenterManager`类中：\n\
  \n```\nfunc submitAllSavedScores() {\n    let defaults = UserDefaults.standard\n\
  \    if let savedScoresData = defaults.data(forKey: Self.savedScoresKey) {\n   \
  \     defaults.removeObject(forKey: Self.savedScoresKey)\n        if let savedScores\
  \ = try? JSONDecoder().decode([SavedScore].self, from: savedScoresData) {\n    \
  \        savedScores.forEach { savedScore in\n                GKLeaderboard.submitScore(savedScore.score,\
  \ context: 0, player: GKLocalPlayer.local, leaderboardIDs: [savedScore.category])\
  \ { [weak self] error in\n                    if let error = error {\n         \
  \               print(\"提交分数时发生错误。数据将保存到 UserDefaults：\\(error.localizedDescription)\"\
  )\n                        self?.storeScoreForLater(savedScore)\n              \
  \      } else {\n                        print(\"已提交保存的分数\")\n                 \
  \   }\n                }\n            }\n        }\n    }\n}\n```\n\n上述代码将遍历所有已保存的分数，并尝试重新提交它们。我们只是简单地记录成功和失败的情况，以便将失败的分数重新添加到未提交分数数组中，供稍后再次重试。\n\
  \n如前所述，有很多方法可以挂接重试失败分数的逻辑。为简单起见，我们在成功通过 Game Center 进行身份验证后，添加对`submitAllSavedScores`的调用。请修改`GameCenterManager`的`authenticateLocalUser`方法，使其与以下代码一致：\n\
  \n```\nstatic func authenticateLocalUser(completion: ((UIViewController?, Error?)\
  \ -> ())?) {\n    guard GKLocalPlayer.local.authenticateHandler == nil else {\n\
  \        return\n    }\n    GKLocalPlayer.local.authenticateHandler = { (viewController,\
  \ error) in\n        if error != nil {\n            if let completion = completion\
  \ {\n                completion(nil, error)\n                return\n          \
  \  }\n        } else {\n            if let completion = completion, let viewController\
  \ = viewController {\n                completion(viewController, nil)\n        \
  \    }\n            self.submitAllSavedScores()\n        }\n    }\n}\n```\n\n\n\
  \  \n## 展示排行榜\n\n现在，我们已在 App Store Connect 中配置好排行榜，并向其中录入了一个分数，是时候将排行榜展示给用户了。展示方式有两种：第一种是使用\
  \ Apple 的 GUI（图形用户界面），第二种是使用自定义 GUI。本节将介绍如何通过 Apple 的 GUI 实现排行榜展示。在下一节中，你将学习如何直接访问排行榜的原始数据，从而以自定义图形的方式展示排行榜。\n\
  \n在开始之前，我们需要创建一个新按钮，用于触发排行榜的显示。我们希望这个按钮放在游戏屏幕之外，因为你不希望用户在游戏进行中被拖拽出去查看排行榜。首先，在 `UFOViewController`\
  \ 视图中添加一个新按钮，如图 3-8 所示。\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig8_HTML.jpg](img/216283_2_En_3_Fig8_HTML.jpg)\n\
  \n*图 3-8 – 添加排行榜按钮*\n\n将按钮连接到如下所示的新操作上。当排行榜功能首次引入 Game Center 时，必须指定要启动的排行榜。而在较新版本的\
  \ Game Center 中，排行榜共享一个统一的排行榜界面，用户可以在其中导航到他们想查看的任何排行榜。\n\n```swift\n@IBAction func\
  \ leaderboardButtonTapped(sender: UIButton) {\n    let leaderboardController = GKGameCenterViewController(state:\
  \ .leaderboards)\n    leaderboardController.gameCenterDelegate = self\n    present(leaderboardController,\
  \ animated: true)\n}\n```\n\n运行程序并点击新添加的排行榜按钮时，结果应类似于图 3-9 中的图像。值得注意的是，虽然 GameKit\
  \ 和 Game Center 的底层 API 更新频率不高，但 Apple 用于呈现 Game Center 的 UI 变化迅速且频繁。不仅界面会改变，一些导航方式在过去也有所不同。例如，在最初的排行榜版本中，用户会直接被带到他们正在访问的游戏排行榜；而在当前实现中，用户会被带到当前游戏排行榜的概览部分。\n\
  \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig9_HTML.png](img/216283_2_En_3_Fig9_HTML.png)\n\
  \n*图 3-9 – 使用 Apple GUI 展示的排行榜*\n\n该 GUI 提供了一个返回按钮，可以带我们进入应用已配置的所有排行榜列表（参见图 3-10\
  \ 中的初始视图）。如果在创建 `GKLeaderboardViewController` 实例时省略了类别输入，则会显示在 App Store Connect\
  \ 中被选为默认排行榜的那个排行榜。\n\n以上就是使用 Apple GUI 创建和展示排行榜的全部内容。下一节，我们将探讨如何自定义排行榜，使其与你自己的 GUI\
  \ 相匹配。\n\n> **注意**\n> 请记住，在本地用户通过身份验证之前，你无法访问任何 Game Center 功能，包括排行榜。如果尝试访问，你将收到\
  \ `GKErrorNotAuthenticated` 错误。\n\n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig10_HTML.png](img/216283_2_En_3_Fig10_HTML.png)\n\
  \n*图 3-10 – 使用 Apple GUI 展示的排行榜集合*\n\n> **提示**\n> 你可以通过在 App Store Connect 中上下拖动排行榜条目，来更改排行榜的显示顺序（参见图\
  \ 3-10）。\n\n### 自定义排行榜\n\n正如上一节所示，向用户展示排行榜是直截了当的。但是，如果你想自定义排行榜的外观呢？在本节中，你将逐步了解如何获取原始排行榜信息，以便在应用中按照你需要的任何方式呈现它。\n\
  \n我们开始添加自定义排行榜的过程：先在 `UFOViewController` 中添加一个新按钮及其关联操作。在上一个排行榜按钮旁边添加一个新按钮，并为其创建一个新操作。\n\
  \n在上一个示例中，Apple 为我们提供了一个视图控制器。当我们处理自己的自定义排行榜时，需要创建一个视图控制器来处理展示。创建一个 `UIViewController`\
  \ 的新子类，并将其命名为 `UFOLeaderboardViewController`。修改新自定义排行榜按钮的操作，使其呈现一个新的 `UFOLeaderboardViewController`\
  \ 实例，如下面代码片段所示：\n\n```swift\n@IBAction func customLeaderboardButtonPressed() {\n\
  \    let leaderboardViewController = UFOLeaderboardViewController()\n    leaderboardViewController.gcManager\
  \ = gcManager\n    present(leaderboardViewController, animated: true)\n}\n```\n\n\
  下一步是为新的 `UFOLeaderboardViewController` 设置 storyboard。我们将使用如图 3-11 所示的设置；不过，你可以在这里进行任何你想要的定制。创建如图中所示的输出口和对象，并为所有对象连接好关联，包括表格的代理和数据源。\n\
  \n![../images/216283_2_En_3_Chapter/216283_2_En_3_Fig11_HTML.jpg](img/216283_2_En_3_Fig11_HTML.jpg)\n\
  \n*图 3-11 – 为自定义排行榜创建 xib*\n\n如果此时运行应用并点击“自定义排行榜”按钮，它应该会以正确的方向启动一个空白表格，并允许你关闭它以返回第一个视图。\n\
  \n既然我们已经处理了视图控制器的开销，就可以开始专注于 Game Center 特有的功能了。首先，设置我们将要使用的表格视图代理和数据源方法。我们需要创建一个新的类属性来保存用于显示的分数数据。创建一个新的\
  \ `NSArray` 对象并将其命名为 `scoreArray`。在你的实现中添加以下两个函数：\n\n```swift\nextension UFOLeaderboardViewController:\
  \ UITableViewDataSource {\n    func tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\n        return scoreArray?.count ?? 0\n    }\n    \n \
  \   static let tableViewCellIdentifier = \"Cell\"\n    \n    func tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\n       \
  \ var cell = tableView.dequeueReusableCell(withIdentifier: UFOLeaderboardViewController.tableViewCellIdentifier)\n\
  \        if cell == nil {\n            cell = UITableViewCell(style: .subtitle,\
  \ reuseIdentifier: UFOLeaderboardViewController.tableViewCellIdentifier)\n     \
  \       cell?.selectionStyle = .none\n        }\n        \n        let score = scoreArray?[indexPath.row]\
  \ as? GKLeaderboard.Entry\n        let playerName = score?.player.alias\n      \
  \  \n        if playerName == nil {\n            cell?.textLabel?.text = \"正在加载名称...\"\
  \n        } else {\n            cell?.textLabel?.text = playerName\n        }\n\
  \        \n        cell?.detailTextLabel?.text = score?.formattedScore\n       \
  \ return cell!\n    }\n}\n```\n\n第一个函数返回表格视图中的项目数量。本例中我们只处理一个分区，因此行数始终等于数组中分数的数量。下一个函数将分数显示到单元格中。本例中我们使用了\
  \ `UITableViewCellStyleSubtitle`，但在大多数情况下，你会希望创建一个更自定义的单元格。主标签设置为玩家别名，副标签设置为格式化后的分数值。在上一章中曾指出，你永远不应向用户显示玩家\
  \ ID。\n\n\n\n## 修改 GameCenterManager\n\n现在让我们把注意力转到 `GameCenterManager` 类。我们创建一个新函数，用于从\
  \ Game Center 服务器获取分数。请在 `GameCenterManager` 类中添加以下方法：\n\n```\nstatic func retrieveScores(from\
  \ leaderboard: GKLeaderboard, playerScope: GKLeaderboard.PlayerScope, timeScope:\
  \ GKLeaderboard.TimeScope, range: ClosedRange, completion: ((GKLeaderboard.Entry?,\
  \ [GKLeaderboard.Entry]?, Int, Error?) -> ())?) {\n    leaderboard.loadEntries(for:\
  \ playerScope, timeScope: timeScope, range: NSRange(range.clamped(to: 1...100)))\
  \ { (localPlayerEntry, entries, totalPlayerCount, error) in\n        if let completion\
  \ = completion {\n            completion(localPlayerEntry, entries, totalPlayerCount,\
  \ error)\n        }\n    }\n}\n```\n\n我们希望这个调用尽可能通用，因为 `GameCenterManager` 类的最终目标是成为一个可复用类，能够轻松地集成到你未来的任何项目中。\n\
  \n上述方法接收了创建新的 `GKLeaderboard` 对象所需的所有参数。一旦我们创建了该对象并设置了所需的属性，就可以在 `GKLeaderboard`\
  \ 对象上调用 `loadScoresWithCompletionHandler` 方法。\n\n本节对 `GameCenterManager` 类所做的修改就这些。\n\
  \n## 在自定义排行榜上过滤结果\n\n让我们将注意力重新转回到 `UFOLeaderboardViewController` 类。接下来，我们要为分段控制器添加一个操作。这将允许用户在全局分数和仅好友分数之间切换。请将以下方法连接到分段控制器的\
  \ `valueChanged` 操作：\n\n```\n@IBAction func scopeChanged(_ sender: UISegmentedControl)\
  \ {\n    scores = []\n    if let leaderboard = GameCenterManager.leaderboard {\n\
  \        GameCenterManager.retrieveScores(from: leaderboard, playerScope: scopeSegmentedControl.selectedSegmentIndex\
  \ == 0 ? .friendsOnly : .global, timeScope: .allTime, range: 1...50) { (localPlayerEntry,\
  \ entries, totalPlayerCount, error) in\n            if let error = error {\n   \
  \             print(\"An error occurred: \\(error.localizedDescription)\")\n   \
  \         } else {\n                self.scores = entries ?? []\n            }\n\
  \            self.tableView.reloadData()\n        }\n    }\n}\n```\n\n此方法调用 `GameCenterManager`\
  \ 的方法来获取分数列表。分段控制器有两个值：一个用于好友，一个用于所有人（全局）。你也可以轻松修改上述代码以获取不同的时间范围，但在本例中，我们只请求全部时间范围。这里有一个容易忽略的重要步骤：将数组设置为空数组并重新加载表格。这样做会在分段控制器值改变时清除表格中现有的分数。\n\
  \n`retrieveScores` 调用相当直接。我们使用在 App Store Connect 中为要获取的排行榜设置的类别，并设置时间和玩家范围。该方法最后一个参数是一个范围。在上一个示例中，我们返回从第\
  \ 1 名到第 50 名的分数。\n\n**注意**\n\n分数范围始终从索引 1 开始。你可以将前述示例修改为使用新范围 `NSMakeRange(50,50)`；这将获取从第\
  \ 50 名到第 100 名的分数。确保不要一次请求过多的分数，因为获取分数数据所需的时间与你尝试获取的分数数量有关。\n\n### 显示自定义排行榜\n\n\
  如果你现在运行此项目，会发现表格始终是空白的。这是由于遗漏所致。要解决这个问题，请修改现有的 `IBAction` 方法，将 `gameCenterDelegate`\
  \ 的属性设置为 `UFOViewController` 中存在的实例。你的代码应如下例所示：\n\n```\n@IBAction func leaderboardButtonTapped(sender:\
  \ UIButton) {\n    let leaderboardController = GKGameCenterViewController(state:\
  \ .leaderboards)\n    leaderboardController.gameCenterDelegate = self\n    present(leaderboardController,\
  \ animated: true)\n}\n```\n\n如果你现在再次运行该应用，你会看到类似于图 3-12 所示的输出。分数的数量、具体数值以及玩家别名会有所不同，但你应该能看到至少一个分数被列出。\n\
  \n![图 3-12：自定义排行榜的初始视图](img/216283_2_En_3_Fig12_HTML.jpg)\n\n**重要提示**\n\n无法保证排行榜请求不会返回缓存数据。你应假定获取的数据是缓存的，可能不是最新的。\n\
  \n## 本地玩家分数\n\n很多时候，你会想知道本地玩家在给定排行榜上的分数。也许你想在他们的排行榜顶部显示其分数，或者你可能想获取一个显示与本地玩家分数相近的其他玩家分数的排行榜。你甚至可能想在用户打破自己之前的最高分时在游戏中发布一个动作。\n\
  \n苹果提供了简便的技术来确定本地玩家的分数。一旦你获得了要查找本地分数的排行榜引用，只需查询 `localPlayerScore` 属性即可。\n\n```\n\
  print(leaderboard.localPlayerScore)\n```\n\n## 更佳方法\n\n在本章前面的“发布分数”一节中，我们学习了如何向\
  \ Game Center 发布新分数。我们的方法虽然简单，但从用户交互的角度来看并非最佳方案。现在是时候重构发布新分数的代码以提升可用性了。这种方法更复杂，但性能更好，对用户的影响也更小。\n\
  \n我们需要做的第一件事是将 `scoreReported` 函数从 `UFOGameViewController` 移到 `UFOViewController`。同时，我们还要修改\
  \ `UFOViewController` 中的退出操作，以便将分数报告给 Game Center。\n\n这使我们能够退出游戏，而无需等待来自 Game Center\
  \ 代理的网络回调。\n\n## Game Center 组\n\nGame Center 功能的一个较新添加是 Game Center 组，更简洁地说，就是跨多个不同应用共享排行榜或成就。在迁移到\
  \ Game Center 组之前，存在一些需要注意的限定条件；最值得注意的是，所有应用必须存在于同一个 App Store Connect 账户下；没有办法在不同账户的应用之间设置\
  \ Game Center 组。\n\n要设置一个新的 Game Center 组，你必须首先打开你想要添加到组中的第一个应用的 App Store Connect\
  \ 门户中的 Game Center 区域。那里有一个用于设置新组的小区域；见图 3-13。\n\n**重要提示**\n\n如果你的应用已有排行榜，其排行榜 ID\
  \ 将带有“grp.”前缀。在设置时，你可以保持 ID 不变，也可以创建一个新的。\n\n![图 3-13：设置 Game Center 组](img/216283_2_En_3_Fig13_HTML.jpg)\n\
  \n你可以有选择地挑选哪些排行榜和成就将成为每组的一部分，并且该过程是可逆的，如果你以后需要，甚至可以删除整个组。如果你的应用已有排行榜（或成就），则必须决定是否将这些项目与组项目合并。当然，你也可以创建新的特定于组的排行榜和成就。\n\
  \nGame Center 组的所有功能都通过 App Store Connect 门户进行控制，它将引导你完成合并和控制排行榜及成就的过程，就像处理非组排行榜或成就一样。\n\
  \n从你的应用内部访问排行榜的方式，无论是否属于组，都是完全相同的；你只需要让应用成为相应组的一部分，并引用提供的（或创建的）排行榜 ID 即可。\n\n\n\n\
  ### 摘要\n\n本章介绍了 Game Center 中的排行榜。我们涵盖了使用排行榜的优势，以及两种可用的类型。我们学习了如何提交分数，以及如何处理提交过程中出现的任何错误。我们还探讨了在应用中使用\
  \ Apple 提供的 GUI 或自定义 GUI 来启动并运行排行榜所需满足的要求。\n\n在本章中，我们持续构建了 `GameCenterManager` 类，添加了所需的方法来提交分数、获取本地和全局分数，以及显示自定义和内置排行榜。现在，您应该已经能够自信地为任何现有或新的\
  \ iOS 应用添加排行榜了。在下一章中，我们将探索 Game Center 成就所提供的一切功能。\n\n"
- "# 4. 成就\n\n相对较新的游戏概念——成就，其出现时间远晚于排行榜，并且随着微软 Xbox 360 及更新设备的发布而迅速流行起来。成就提供了更基础的游戏排行榜所忽略的更高层次的细节。虽然排行榜显示的是当前谁拥有领先分数，但成就通过奖励玩家完成特定任务、事件或关卡来展示玩家的技能和实力。当成就开始服务于游戏内部目的时，它们就变成了超越其他玩家的“增益”能力。玩家查看他人成就的能力给了玩家一种“炫耀的权利”。正如您毫无疑问所知道的，游戏中的炫耀权可以延长各种类型用户的游戏时间，无论是试图达到\
  \ 100%完成度，还是为了保持对同行的领先优势，抑或是将同行从榜首位置拉下来。\n\n随着支持社交网络的游戏不断普及，成就系统功能的热度更是直线上升。社交游戏中充斥着决心完成\
  \ 100%游戏进度的特定玩家群体。\n\nFoursquare 是最早将成就带出游戏世界并引入社交应用领域的应用之一。Foursquare 将它的成就称为“贴纸”（见图\
  \ 4-1），但其基本概念是相同的。玩家完成任务会获得奖励，但徽章的数量不会影响游戏玩法，或者在此例中，也不会以任何直接方式影响用户使用该应用。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig1_HTML.jpg](img/216283_2_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1  iPhone 上的 Foursquare 展示成就，在后续版本中更名为贴纸\n\nGame Center 使得为您的 iOS、Mac 或 Apple\
  \ TV 应用添加成就系统变得非常简单。在本章中，我们将学习如何为我们的演示游戏 UFOs 添加成就。您将学习快速轻松地将成就系统完全集成到您的应用中所需要的一切知识。具体来说，您将学习如何：\n\
  \n- 创建新的成就\n- 显示成就进度\n- 在您的应用中添加成就钩子\n- 推进和重置成就\n- 自定义成就的外观\n\n## 为什么要使用成就？\n\n\
  如果您尚未明确成就能为您的社交应用或游戏带来什么，那么让我们花点时间来回顾一下它的诸多好处：\n\n- 成就给您的用户带来额外的成就感和奖励感。\n- 成就使用户更频繁地回到您的应用中。用户更有可能返回您的应用以完成更多成就，使完成游戏变成一个更有回报和更有趣的过程。\n\
  - 成就为用户提供了一种与他人分享体验的简单方式。\n- Game Center 中的成就为最终产品提供了精致的外观和感觉。\n- 成就让用户在浏览您的应用或游戏时，获得更强烈的进展感。\n\
  - 成就提供了另一种游戏方式。如果用户不喜欢战役模式，他们可以通过您的成就系统来享受成就感。\n- 成就归因于游戏品牌知名度。当用户在 Twitter、Facebook\
  \ 和其他社交平台上分享他们的成就时，品牌认知度会提高，从而带动销量。\n\n## Game Center 中的成就概述\n\n成就（在某些圈子中也称为徽章）在\
  \ Game Center 中的运作方式与其他平台略有不同。与排行榜一样，成就首先需要在 App Store Connect 中为每个应用单独配置。您将创建 `GKAchievement`\
  \ 对象的新实例来报告进度（稍后详细介绍此对象）。与提交分数时创建的排行榜条目不同，成就可以报告增量或部分进度。\n\n与排行榜（有关排行榜的更多信息，请参见第\
  \ 3 章）工作的另一个显著区别是，您将使用两种不同类型的对象来提交和检索成就。`GKAchievement` 用于提交新成就或更新成就进度，而 `GKAchievementDescription`\
  \ 用于向用户显示成就数据。这与我们在排行榜中看到的情况相反，在排行榜中，`GKScore` 对象既用于提交数据，也用于检索数据。\n\n与排行榜一样，成就进度可以使用\
  \ Apple 自带的图形用户界面 (GUI) 显示，也可以使用更能匹配您应用外观和感觉的自定义 GUI 显示。每种系统的优缺点与排行榜相同。为方便您参考，现将这些优缺点列出如下，并在适当之处添加了细微的成就特定信息。\n\
  \n### 使用 Apple 成就 GUI 与自定义 GUI 的对比优势\n\n以下是使用 Apple 自带的 GUI 处理成就的一些优势：\n\n- 您的成就的外观和感觉由世界上一些最优秀的设计师打造。\n\
  - GUI 非常简单且易于实现，使得向用户展示成就进度变得非常直接。\n- 用户喜欢他们已经知道如何交互的熟悉界面。\n- 您的应用比自行实现系统更具前瞻性。您的应用会自动受益于\
  \ Game Center 用户界面的每次修订。\n\n以下是在 iOS 设备上处理成就时使用您自己的 GUI 的一些优势：\n\n- 您的成就进度可以匹配您应用的定制设计。\n\
  - 您对返回的数据拥有更多自由，并且可以使用附加条件进行过滤。\n- 您可以实现自己的自定义缓存行为。\n- 您可以为未完成或进行中的成就使用自定义图像。\n\n\
  如您所见，与以往一样，每种系统都有其优点和缺点，并且对于您应该使用哪一种，没有唯一正确的答案。在本章结束时，您将对这些选项有更好的理解，并更有能力决定哪种方法最适合您的应用。\n\
  \n如本节开头所述，您需要像处理排行榜一样，从 App Store Connect 开始处理成就。\n\n\n## 在 App Store Connect 中配置成就\n\
  \n正如我们在排行榜中看到的那样，如果不先在 App Store Connect 中至少设置一个新成就，你就无法开始处理成就。使用你的 Apple Connect\
  \ 用户名和密码登录 App Store Connect（`http://appstoreconnect.apple.com`），并选择我们在之前章节中已经处理过的应用（更多信息请参见第\
  \ 2 章）。从控制面板中选择应用后，返回“管理功能”区域，然后进入本书前面介绍的 Game Center 区域。\n\n你的应用的 Game Center 门户会有一个标有“成就”的部分。你会在成就区域的左上方找到一个“+”按钮。此按钮允许你设置一个新成就，如图\
  \ 4-2 所示。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig2_HTML.jpg](img/216283_2_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2\n\n通过 App Store Connect 门户添加新成就\n\n你可能会注意到，这个门户页面与排行榜门户页面有很多相似之处。我在表 4-1\
  \ 中分解了这些属性。\n\n表 4-1\n\niTunes Connect 中的成就属性\n\n| 属性 | 描述 |\n| --- | --- |\n| 成就参考名称\
  \ | 一个在 iTunes Connect 外部不使用的字符串；该字符串用于在 App Store Connect 内轻松定位和引用此成就。 |\n| 成就\
  \ ID | 这是你将在代码中引用的标识符。与排行榜类别类似，Apple 建议你使用反向 DNS 系统，例如 `com.company.appname.achievementname`。\
  \ |\n| 隐藏 | 如果某个成就是隐藏的，用户只有在完成它或增加进度后才能在成就列表中看到它。 |\n| 分值 | 成就可以分配分数。你的应用被分配了 1,000\
  \ 分。每个完成的成就都会使用户朝着该总分前进。一旦用户达到 1,000 分，他们就解锁了所有成就。你应该为更难以完成的成就分配更多的分数。这能为用户提供更好的成就感，让他们了解成就的价值。分值是可选的，如果你不想在应用中使用它们，可以忽略。\
  \ |\n\n**提示**\n\n你不必让你的成就总分加起来正好达到 1,000 分，但你不能超过 1,000 分。要小心考虑你可能想要添加的任何未来成就。一旦某个成就上线，就无法从\
  \ App Store Connect 中移除；但是，你可以在游戏中将其移除并隐藏。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig3_HTML.jpg](img/216283_2_En_4_Fig3_HTML.jpg)\n\
  \n图 4-3\n\nApp Store Connect 中新成就的配置视图\n\n现在是时候创建一个新成就了。我们将创建一个在用户绑架 25 头牛时达到的成就。我们将使用“绑架\
  \ 25”作为成就名称，这样当有几十个成就时很容易找到。对于我们的成就 ID，我们将使用 `com.dragonforged.ufo.abduct25`。你可以随意使用你想要的任何\
  \ ID，但请确保在接下来的示例中将其替换为 `com.dragonforged.ufo.abduct25`。我们将把这个成就设为非隐藏成就，并为其分配 10\
  \ 分。\n\n**重要**\n\n任何成就完成时获得的分数都不能超过 100 分。\n\n要使成就有效，你必须至少配置一种语言。如图 4-4 所示，成就的本地化区域与上一章创建排行榜时遇到的情况大不相同。请参考表\
  \ 4-2 了解每个属性的信息。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig4_HTML.jpg](img/216283_2_En_4_Fig4_HTML.jpg)\n\
  \n图 4-4\n\n在 iTunes Connect 中本地化成就\n\n**注意**\n\n每个游戏拥有自己的成就描述；你不能在多个游戏之间共享成就描述。\n\
  \n表 4-2\n\niTunes Connect 中的本地化成就属性\n\n| 属性 | 描述 |\n| --- | --- |\n| 语言 | 选择此成就将显示的语言。你必须为你发布的产品中将支持的每种本地化设置一种语言。\
  \ |\n| 标题 | 这是在应用内显示以描述此成就的标题。 |\n| 达成前描述 | 这是当成就处于非隐藏状态但尚未获得或仅部分完成时显示的描述。 |\n|\
  \ 达成后描述 | 这是当成就已完全解锁并完成时显示的描述。 |\n| 图片 | 这是当成就获得时将显示给用户的图片。Apple 将提供未获得时的图片，或者在使用自定义成就\
  \ GUI 时，你可以指定自己的图片。此图片必须为 512 x 512 和 72 DPI。 |\n\n就我们而言，我们将为此成就配置英语。我将使用“绑架 25\
  \ 头牛”作为标题，但你可以使用你喜欢的任何标题。对于达成前描述，我选择了“用你的 UFO 绑架 25 头牛。”对于达成后描述，我使用了“你已经掌握了绑架牛的艺术。”我还将使用一个牛过路标志作为图片。完成后，你应该有一个设置完整的成就，它看起来应该类似于图\
  \ 4-5 中显示的视图。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig5_HTML.jpg](img/216283_2_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5\n\n一个新成就，显示在 iTunes Connect 中\n\n我们将为我们的游戏处理几个不同的成就设置。继续创建另一个新成就，用于绑架一头牛；这将是我们非渐进式的成就。然后，创建第三个成就，用于五分钟的游戏时间，并将其设置为隐藏。这最后一个成就将让我们处理计时器、渐进式成就和隐藏成就。你可以为这些成就选择任何你想要的分值、描述、标题和图片，但请务必记住成就\
  \ ID。\n\n现在，你应该在 App Store Connect 中为我们的游戏配置了三个成就。\n\n我们现在可以回到 Xcode 并开始处理这些成就了。\n\
  \n\n\n### 呈现成就\n\n与排行榜不同，在将用户数据填充到成就系统之前，有很多 GUI 方面的内容需要预览。查看修改成就对默认 GUI 显示效果的影响会很有帮助。在本章的剩余部分，我们将首先展示苹果的成就\
  \ GUI，然后继续讲解如何提交用户数据。我们还将介绍自定义 GUI 成就。\n\n在开始之前，我们需要创建一个新的 `UIbutton` 来触发成就视图。我们很可能希望像处理排行榜按钮那样，将此按钮放置在游戏画面之外。我们从在\
  \ `UFOViewController` 视图中添加一个新按钮开始，如图 4-6 所示。\n\n你还需要创建并连接一个 `IBAction` 到我们新的成就按钮上。将以下代码插入到你连接到成就按钮的操作中：\n\
  \n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig6_HTML.jpg](img/216283_2_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6：添加一个新按钮来触发我们的成就视图\n\n```\n@IBAction func achievementButtonPressed() {\n\
  \    var achievementViewController: GKGameCenterViewController? = nil\n    if let\
  \ state = GKGameCenterViewControllerState(rawValue: 1) {\n        achievementViewController\
  \ = GKGameCenterViewController(state: state)\n    }\n    achievementViewController?.gameCenterDelegate\
  \ = self\n    if let achievementViewController = achievementViewController {\n \
  \       present(achievementViewController, animated: true)\n    }\n}\n```\n\n如果你运行该\
  \ App 并点击成就按钮，你将会看到一个类似于图 4-7 所示的视图。显示的成就使用的是苹果的未获得图像。苹果建议你始终使用其未获得图像，但在使用自定义成就\
  \ GUI 时，你可以覆盖此图像并返回你自己的图像。\n\n接下来，回顾一下我们设置了三个成就，其中一个是隐藏的。正如你在图 4-7 中所见，提供的视图只显示了两个成就。由于我们没有向第三个成就提交任何进度，其详细信息对用户是隐藏的。不过，你可以看到顶部信息行显示有一个隐藏成就（0/3\
  \ 成就）。另请注意，成就使用的是在 iTunes Connect 中设定的本地化未获得描述。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig7_HTML.png](img/216283_2_En_4_Fig7_HTML.png)\n\
  \n图 4-7：我们的成就，以苹果默认 GUI 显示\n\n这些就是通过苹果内置 GUI 向用户展示其成就进度的必要步骤。在下一节中，我们将探讨如何更新和推进这些成就。在本章稍后部分，你将学习如何使用自定义\
  \ GUI 呈现成就。\n\n> **注意：** 用户始终可以在 Game Center 中查看自己的成就进度，但建议您也让用户能够在您的应用内查看其进度。\n\
  \n### 修改成就进度\n\n与排行榜条目不同，成就可以通过用户交互不断修改和推进。与我们处理的其他 Game Center 功能类似，我们将在 `GameCenterManager`\
  \ 类中创建一个新方法来处理与成就的交互。添加以下方法后，我们将对该方法进行回顾，以准确理解其运作方式。\n\n> **提示：** 请记住，所有这些源代码都可以在网上获取。处理大型函数时，从\
  \ [apress.com](http://apress.com) 下载的源代码中复制可能更为简便。\n\n```\nfunc submitAchievement(_\
  \ identifier: String, percentComplete: Double) {\n    if GKLocalPlayer.local.isAuthenticated\
  \ == false {\n        return\n    }\n    guard earnedAchievementCache != nil else\
  \ {\n        populateAchievementCache() {\n            self.submitAchievement(identifier,\
  \ percentComplete: percentComplete)\n        }\n        return\n    }\n    if let\
  \ achievement = achievement(forIdentifier: identifier) {\n        let storedProgress\
  \ = achievement.percentComplete\n        guard percentComplete > storedProgress\
  \ else {\n            return\n        }\n        achievement.percentComplete = percentComplete\n\
  \        GKAchievement.report([achievement], withCompletionHandler: { [weak self]\
  \ error in\n            if let error = error {\n                print(\"向成就报告时发生错误。数据将保存到\
  \ UserDefaults: \\(error.localizedDescription)\")\n                self?.storeAchievementToSubmitLater(achievement)\n\
  \            }\n            if percentComplete >= 100 {\n                GKAchievementDescription.loadAchievementDescriptions(completionHandler:\
  \ { [weak self] achievementDescriptions, error in\n                    if let error\
  \ = error {\n                        print(\"加载成就描述时发生错误: \\(error.localizedDescription)\"\
  )\n                    }\n                    achievementDescriptions?.forEach{\
  \ achievementDescription in\n                        if achievement.identifier ==\
  \ achievementDescription.identifier {\n                            self?.gameDelegate?.achievementEarned(achievementDescription)\n\
  \                        }\n                    }\n                })\n        \
  \    }\n            DispatchQueue.main.async { [weak self] in\n                self?.gameDelegate?.achievementSubmitted(achievement,\
  \ error: error)\n            }\n        })\n    }\n}\n```\n\n现在来看看我们添加的 `submitAchievement:percentComplete:`\
  \ 函数。这里有两个主要的 if/else 块。第一个块在 `earnedAchievementCache` 为 `nil` 时执行，这段代码第一次运行时总会是这种情况。现在让我们来看看这段代码。\n\
  \n```\nGKAchievement.loadAchievements(completionHandler: { achievements, error in\n\
  \    if error == nil {\n        var tempCache: [String: GKAchievement] = [:]\n \
  \       for achievement in achievements ?? [] {\n            tempCache[achievement.identifier]\
  \ = achievement\n        }\n        self.earnedAchievementCache = tempCache as?\
  \ NSMutableDictionary\n        self.submitAchievement(identifier, percentComplete:\
  \ percentComplete)\n    } else {\n        DispatchQueue.main.async {\n         \
  \   self.delegate?.achievementSubmitted?(nil, error: error)\n        }\n    }\n\
  })\n```\n\n> **重要提示：** 由 `loadAchievementsWithCompletionHandler` 返回的数组不会显示任何尚未提交\
  \ `percentageCompleted` 的成就。\n\n这段代码片段的主要功能是将成就列表加载到 `earnedAchievementCache` 中。我们在\
  \ `GKAchievement` 上调用 `loadAchievementsWithCompletionHandler`。此调用会返回一个数组，其中包含在 App\
  \ Store Connect 中设置的所有成就。然后，我们将 `GKAchievement` 对象存储到字典中，以标识符作为键。此时，代码会再次调用 `submitAchievement:percentComplete`。这次，`earnedAchievementCache`\
  \ 不为 `nil`，因此会执行第二段代码。如果在此过程中遇到错误，我们将使用标准的委托回调将错误发送回我们的委托。\n\n你需要为 `GameCenterManager`\
  \ 添加新的函数来处理此委托回调；现在是添加的好时机。将以下可选协议添加到头文件中：\n\n```\nfunc achievementSubmitted(_ achievement:\
  \ GKAchievement?, error: Error?)\n```\n\n现在让我们来看第二段代码。以下代码成功执行后，会向 Game Center 服务器提交成就：\n\
  \n\n```swift\nvar achievement = earnedAchievementCache?[identifier ?? \"\"] as?\
  \ GKAchievement\nif achievement != nil {\nif ((achievement?.percentComplete ?? 0.0)\
  \ >= 100.0) || ((achievement?.percentComplete ?? 0.0) >= percentComplete) {\nachievement\
  \ = nil\n}\nachievement?.percentComplete = percentComplete\n} else {\nachievement\
  \ = GKAchievement(identifier: identifier ?? \"\")\nachievement?.percentComplete\
  \ = percentComplete\nearnedAchievementCache?.setValue(achievement, forKey: achievement?.identifier\
  \ ?? \"\")\n}\nif let achievement = achievement {\nGKAchievement.report([achievement],\
  \ withCompletionHandler: { error in\nif error != nil {\nself.storeAchievement(toSubmitLater:\
  \ achievement)\n}\nif percentComplete >= 100 {\nGKAchievement.loadAchievements(completionHandler:\
  \ { achievements, error in\nfor achievementDescription in achievements ?? [] {\n\
  if achievement.identifier == self.from(achievementDescription).identifier {\nself.delegate?.achievementEarned?(self.from(achievementDescription))\n\
  }\n}\n})\n}\nDispatchQueue.main.async {\nself.delegate?.achievementSubmitted?(achievement,\
  \ error: error)\n}\n})\n}\n```\n\n第一行代码根据传入函数的标识字符串，从我们的 `earnedAchievementCache`\
  \ 中检索一个 `GKAchievement` 对象。如果成就已完成，或所报告进度与 Game Center 服务器上已有数据相同，我们将成就对象设为 `nil`。这样可以避免我们提交那些会被忽略的进度，从而节省网络时间。我们还将\
  \ `GKAchievement` 对象上的 `percentComplete` 属性设置为传递给该方法的双精度浮点数。\n\n如果缓存中不存在该成就，我们会创建一个新的实例。在这种情况下，我们还需要将其添加到本地成就缓存中。\n\
  \n在完成 `nil` 检查后，最后一步是提交成就。我们在成就对象上调用 `reportAchievementWithCompletionHandler`，然后通过现有协议将结果返回给委托对象。\n\
  \n> **注**  \n> 所有成就都有一个 `percentageComplete` 属性，无论它们是否允许分阶段完成进度。如果你的成就只能整体获得或未获得，那么对于已获得的成就，需要传入\
  \ `100`。\n\n本部分最后要做的事情是在 `UFOGameViewController` 中实现我们的协议方法。将以下方法添加到该文件的实现中；现在只需关注将错误和成功信息打印到控制台即可。\n\
  \n```swift\nfunc achievementSubmitted(_ achievement: GKAchievement?, error: Error?)\
  \ {\nif let error = error {\nprint(\"报告成就时出现错误：\\(error.localizedDescription)\"\
  )\n} else {\nprint(\"成就已提交\")\n}\n}\n```\n\n## 重置成就\n\n在某些情况下，你可能需要重置用户成就。除了在调试时极其有用外，你可能会发现为用户提供重置选项也很有用。你可能想增加一个\"\
  威望\"模式，或让用户有机会从头开始游戏。\n\n```swift\nfunc resetAchievements()\n{\nGKAchievement.resetAchievementsWithCompletionHandler()\
  \ {(error) in\nself.lastError = error\n}\n}\n```\n\n> **重要**  \n> 不要忘记移除已缓存的成就信息，否则除非重新启动应用，否则你将无法推进已重置的成就。\n\
  \n## 添加成就钩子\n\n在应用中实现成就的最大挑战，是在正常流程中添加用于激活和推进这些成就的钩子。根据我的个人经验，我发现在程序接近完成时添加这些钩子，比边开发边添加更容易。在本节中，我将提供多个如何嵌入成就的例子；你自己的应用可能与示例有很大差异，但你应该能轻松调整示例以满足需求。\n\
  \n为了更轻松地获取成就进度详情，我们首先在 `GameCenterManager` 类中添加几个便捷函数。这是我们用来填充本地成就缓存的第一个方法。\n\n\
  ```swift\nfunc populateAchievementCache(_ completion: (() -> Void)? = nil) {\nguard\
  \ earnedAchievementCache == nil else {\ncompletion?()\nreturn\n}\nGKAchievement.loadAchievements\
  \ { [weak self] achievements, error in\nif let error = error {\nprint(\"加载成就时出现错误：\\\
  (error.localizedDescription)\")\n} else {\nif let achievements = achievements {\n\
  self?.earnedAchievementCache = achievements.reduce(into: [:], { result, achievement\
  \ in\nresult[achievement.identifier] = achievement\n})\n} else {\nself?.earnedAchievementCache\
  \ = [:]\n}\ncompletion?()\n}\n}\n}\n```\n\n上述函数与上一节预览的提交成就进度方法中的缓存填充代码非常相似。我们需要填充本地缓存，以便使用另外两个便捷函数。我们希望在身份认证后尽快调用\
  \ `populateAchievementCache`。我已经在 `GameCenterManager` 的本地玩家身份认证函数中添加了对它的调用。同时添加以下函数：\n\
  \n```swift\nfunc percentageCompleteOfAchievement(withIdentifier identifier: String?)\
  \ -> Double {\nif GKLocalPlayer.local.isAuthenticated == false {\nreturn -1\n}\n\
  if earnedAchievementCache == nil {\nprint(\"无法确定成就进度，本地缓存为空\")\n} else {\nlet achievement\
  \ = earnedAchievementCache?[identifier ?? \"\"]\nif let achievement = achievement\
  \ {\nreturn achievement.percentComplete\n} else {\nreturn 0\n}\n}\nreturn -1\n}\n\
  ```\n\n上述函数返回与传入标识符对应的成就完成百分比的双精度浮点数。如果在本地缓存中找不到该成就的副本，我们可以假定完成百分比为 `0`。下一个函数使用上述函数返回布尔值，指示成就是否已完成。\n\
  \n```swift\nfunc achievement(withIdentifierIsComplete identifier: String?) -> Bool\
  \ {\nif percentageCompleteOfAchievement(withIdentifier: identifier) >= 100 {\nreturn\
  \ true\n} else {\nreturn false\n}\n}\n```\n\n> **注**  \n> 身份认证后请尽快调用 `populateAchievementCache`，否则这些便捷方法将不会返回正确的信息。\n\
  \n现在我们已经有了几个辅助函数，可以开始为 UFO 连接成就钩子了。我们需要关联三个不同的成就。前两个都与我们绑架的奶牛数量有关，因此先从这里开始。修改 `UFOGameViewController`\
  \ 的 `finishAbducting` 函数，使其与以下代码一致：\n\n```swift\nfunc finishAbducting() {\n    if\
  \ currentAbductee == nil || !tractorBeamOn {\n        return\n    }\n    cowArray\
  \ = cowArray?.filter({ ($0) as AnyObject !== (currentAbductee) as AnyObject })\n\
  \    tractorBeamImageView?.removeFromSuperview()\n    tractorBeamOn = false\n  \
  \  score += 1\n    scoreLabel.text = String(format: \"SCORE %05.0f\", score)\n \
  \   if gameIsMultiplayer {\n        gcManager?.sendStringToAllPeers(\"$score:\\\
  (score)\", reliable: true)\n    }\n    currentAbductee?.layer.removeAllAnimations()\n\
  \    currentAbductee?.removeFromSuperview()\n    currentAbductee = nil\n    if isHost\
  \ {\n        spawnCow()\n    }\n    if (gcManager?.achievement(withIdentifierIsComplete:\
  \ \"com.dragonforged.ufo.aduct1\") == false) {\n        gcManager?.submitAchievement(\"\
  com.dragonforged.ufo.aduct1\", percentComplete: 100)\n    }\n    if (gcManager?.achievement(withIdentifierIsComplete:\
  \ \"com.dragonforged.ufo.abduct25\") == false) {\n        var percentComplete =\
  \ gcManager?.percentageCompleteOfAchievement(withIdentifier: \"com.dragonforged.ufo.abduct25\"\
  ) ?? 0.0\n        percentComplete += 4\n        gcManager?.submitAchievement(\"\
  com.dragonforged.ufo.abduct25\", percentComplete: percentComplete)\n    }\n}\n```\n\
  \n目前我们只关注这个方法的最后几行。首先，我们在单次绑架的标识字符串上调用便利函数 `achievementWithIdentifierIsComplete`。由于这是一个是否已获得的成就，我们无需关心当前的完成百分比。要将该成就标记为已完成，我们将其完成百分比设置为\
  \ `100`。\n\n> **注意：** 如果示例中的标识字符串与你用于单次绑架的 App Store Connect 标识字符串不同，请务必进行更改。\n\n\
  下一个成就的接入方式类似，唯一的区别在于我们使用了增量进度。请看下面这段新添加到 `finishAbducting` 函数末尾的代码：\n\n```swift\n\
  if (gcManager?.achievement(withIdentifierIsComplete: \"com.dragonforged.ufo.abduct25\"\
  ) == false) {\n    var percentComplete = gcManager?.percentageCompleteOfAchievement(withIdentifier:\
  \ \"com.dragonforged.ufo.abduct25\") ?? 0.0\n    percentComplete += 4\n    gcManager?.submitAchievement(\"\
  com.dragonforged.ufo.abduct25\", percentComplete: percentComplete)\n}\n```\n\n在上述代码中，我们沿用了提交完整成就的方法，但有一个主要区别：我们首先需要确定该成就的当前进度，然后在此基础上加上\
  \ `4`，因为 `25` 的 `4%` 就是 `1`。要实现在 25 次中递增 1 次绑架，每次捕获一头新牛时就需要增加 `4%`。\n\n> **提示：**\
  \ 别忘记我们在 `GameCenterManager` 中添加的 `resetAchievement` 方法。它在调试提交代码时非常有用。建议在 `didAuthenticate`\
  \ 部分保留对此方法的调用，以便在调试期间始终将应用恢复到干净状态。\n\n接下来运行游戏并绑架几头牛。完成后，你会注意到成就界面现在会显示进度，类似于图 4-8\
  \ 所示。如果你至少绑架了一头牛，就会获得一个完成的成就；如果绑架了少于 25 头牛，则会有一个处于进行中的成就。请注意，用户完成成就时并不会收到通知；我们将在后面的“成就完成反馈”一节讨论一种通知方法。\n\
  \n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig8_HTML.jpg](img/216283_2_En_4_Fig8_HTML.jpg)\n\
  \n**图 4-8** 正在进行的成就\n\n我们为此项目添加的最后一个钩子用于处理五分钟成就。你的第一反应可能是跟踪游戏时长，并在用户退出游戏时将其作为进度提交。但这可能不是最佳方法。我们希望用户在完成成就时得到通知，而不必等到游戏结束才能看到他们获得了哪些成就。解决这个问题有多种方法。在本例中，我们将每三秒（即五分钟的\
  \ `1%`）触发一个 `NSTimer`，并更新成就进度。将以下代码添加到 `UFOGameViewController` 中：\n\n```swift\n\
  func tickThreeSeconds() {\n    if gcManager?.achievement(withIdentifierIsComplete:\
  \ \"com.dragonforged.ufo.play5\") == true {\n        return\n    } else {\n    \
  \    var percentComplete = gcManager?.percentageCompleteOfAchievement(withIdentifier:\
  \ \"com.dragonforged.ufo.play5\") ?? 0.0\n        percentComplete += 1\n       \
  \ gcManager?.submitAchievement(\"com.dragonforged.ufo.play5\", percentComplete:\
  \ percentComplete)\n    }\n}\n```\n\n与修改 `viewDidAppear` 和 `ViewWillDisappear` 函数以匹配以下代码类似，我们将启动一个三秒定时器。每次定时器触发时，我们调用\
  \ `tickThreeSeconds`，获取成就当前进度，加上 `1%`，然后提交回服务器。如果成就已经完成，则直接返回。\n\n```swift\noverride\
  \ func viewDidAppear(_ animated: Bool) {\n    super.viewDidAppear(animated)\n  \
  \  timer = Timer.scheduledTimer(\n        timeInterval: 3.0,\n        target: self,\n\
  \        selector: #selector(tickThreeSeconds),\n        userInfo: nil,\n      \
  \  repeats: true)\n}\n\noverride func viewWillDisappear(_ animated: Bool) {\n  \
  \  super.viewWillDisappear(animated)\n    timer?.invalidate()\n    timer = nil\n\
  }\n```\n\n\n### 成就完成反馈\n\n及时告知用户已完成某项成就非常重要。但你不应仅仅弹出 `UIAlertView`，因为大多数成就都是在游戏进行中（例如在赛车游戏中完成\
  \ 20 圈）达成的，这种方式会严重干扰操作。为了不打断用户的交互，我们需要一个更好的系统。我一直很喜欢从屏幕底部或顶部滑入的小型视图来通知用户达成成就——这与登录\
  \ Game Center 时获得反馈的方式非常相似。\n\n要实现反馈系统，我们首先需要在 `GameCenterManager` 中添加一个新的协议方法。我们将用这个方法通知代理：某项成就是首次被完成。将以下函数作为可选协议添加到项目中：\n\
  \n```\nfunc achievementEarned(_ achievement: GKAchievementDescription?)\n```\n\n\
  此外，我们需要修改现有的 `submitAchievement:percentComplete:` 方法。请查看该函数的最后一个 `if` 语句块。我们要按如下方式修改它，但需添加一个\
  \ `if` 语句来判断 `percentageComplete` 是否超过 100，从而调用我们的新协议。另请注意，我们使用的是 `GKAchievementDescription`\
  \ 而非 `GKAchievement`。我们将在下一节“自定义成就 GUI”中进一步讨论这一点。\n\n```\nif percentComplete >=\
  \ 100 {\nGKAchievementDescription.loadAchievementDescriptions(completionHandler:\
  \ { [weak self] achievementDescriptions, error in\nif let error = error {\nprint(\"\
  加载成就描述时发生错误：\\(error.localizedDescription)\")\n}\nachievementDescriptions?.forEach{\
  \ achievementDescription in\nif achievement.identifier == achievementDescription.identifier\
  \ {\nself?.delegate?.achievementEarned(achievementDescription)\n}\n}\n})\n}\n```\n\
  \n至此，我们对 `GameCenterManager` 类的修改就完成了。现在，我们需要为用户连接视觉反馈。回到 `UFOGameViewController.swift`，并添加我们的新函数\
  \ `achievementEarned`。你可以在此处添加任何类型的反馈，包括标准的 `UIAlertView`，但在本节中，我们将探索一些更友好的方式。\n\
  \n我们需要创建一些新的 `IBOutlet` 作为 `UFOGameViewController` 的一部分。创建一个新视图，然后将视图的背景设置为黑色，透明度为\
  \ 70%。我们还要创建一个新标签，将其放置在此视图的中心，并将文本对齐方式设置为居中。你的视图应类似于图 4-9 所示。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig9_HTML.jpg](img/216283_2_En_4_Fig9_HTML.jpg)\n\
  \n*图 4-9 成就达成视图和标签*\n\n首先，为完成视图创建一个新框架，然后将其作为子视图添加到游戏视图中。\n\n```\nfunc achievementEarned(_\
  \ achievement: GKAchievementDescription?) {\nachievementCompletionView.frame = CGRect(x:\
  \ 0, y: 320, width: 480, height: 25)\nview.addSubview(achievementCompletionView)\n\
  achievementcompletionLabel.text = achievement?.achievedDescription\nUIView.animate(\n\
  withDuration: 0.5,\nanimations: {\nself.achievementCompletionView.frame = CGRect(x:\
  \ 0, y: 295, width: 480, height: 25)\n},\ncompletion: achievementEarnedAnimationDone\n\
  )\n}\n```\n\n这两个函数都相当简单。当完成成就并收到代理回调时，我们将 `achievementCompletionView` 添加到游戏视图中。然后，我们通过动画将其移动到视图底部。经过五秒延迟后，我们再通过动画将其移出视图。你还可以访问\
  \ `GKAchievementDescription` 中使用的图像。我们将在下一节中进一步研究这些属性。\n\n**提示：** 你可能需要重置成就才能看到完成进度。创建一个用于重置成就的新按钮在测试时会很有帮助。\n\
  \n如果你现在运行应用并绑架一头牛（假设你尚未完成该成就），你应该会看到与图 4-10 非常相似的输出。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig10_HTML.jpg](img/216283_2_En_4_Fig10_HTML.jpg)\n\
  \n*图 4-10 首次完成新成就后可见的成就通知横幅*\n\n\n\n### 自定义成就界面\n\n有时你可能希望自定义成就系统的外观，以匹配应用或游戏中的自定义界面。正如上一章中我们通过排行榜所看到的，我们可以处理原始数据并以任意形式呈现。本节将重点介绍如何使用你自己的\
  \ GUI 在应用中添加成就。与排行榜部分类似，我们首先需要添加一个按钮，以便进入自定义成就进度视图。请添加一个新按钮及其关联操作，如图 4-11 所示。\n\n\
  ![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig11_HTML.jpg](img/216283_2_En_4_Fig11_HTML.jpg)\n\
  \n*图 4-11* 在 Xcode 中添加自定义成就按钮\n\n我们需要创建一个新类来处理成就进度信息的处理和显示。创建一个名为 `UFOAchievementViewController`\
  \ 的新类，并使其成为 `UIViewController` 的子类。在故事板中为表格视图、导航栏和关闭按钮设置操作和输出口。不要忘记同时为表格视图设置数据源和委托。\n\
  \n我们还需要创建一个数组来存储成就数据。创建一个新的 `NSArray` 对象，并命名为 `achievementArray`。同时，导入 `GameCenterManager`\
  \ 头文件并遵循其协议。\n\n现在，将操作连接到我们新创建的 `UFOAchievementViewController` 类。编辑在 `UFOViewController`\
  \ 中创建的操作，以反映以下更改：\n\n```\n@IBAction func customAchievementButtonPressed() {\nlet\
  \ achievementViewController = UFOAchievementViewController()\nachievementViewController.gcManager\
  \ = gcManager\npresent(achievementViewController, animated: true)\n}\n```\n\n让我们花点时间切换到\
  \ `UFOAchievementViewController` 的文件。我们需要一个关闭操作；请同时添加该函数。\n\n```\n@IBAction func\
  \ dismissAction() {\ndismiss(animated: true, completion: nil)\n}\n```\n\n如果你现在运行应用，应该会看到一个朴素而单调的表格视图，类似于图\
  \ 4-12 中所示。此外，关闭按钮现在应该能够正常工作。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig12_HTML.jpg](img/216283_2_En_4_Fig12_HTML.jpg)\n\
  \n*图 4-12* 我们将用于自定义成就的空白表格\n\n在继续实现 `UFOAchievementViewController` 之前，我们需要回到 `GameCenterManager`\
  \ 类。将以下方法作为可选协议添加到 `GameCenterManagerDelegate` 中：\n\n```\nfunc achievementDescriptionsLoaded(_\
  \ descriptions: [GKAchievementDescription]?, error: Error?)\n```\n\n然后在 `GameCenterManager`\
  \ 的实现中添加以下新方法：\n\n```\nfunc retrieveAchievmentMetadata() {\nGKAchievementDescription.loadAchievementDescriptions\
  \ { (descriptions, error) in\nif let error = error {\nprint(\"加载成就描述时发生错误：\\(error.localizedDescription)\"\
  )\n}\nDispatchQueue.main.async {\nself.delegate?.achievementDescriptionsLoaded(descriptions,\
  \ error: error)\n}\n}\n}\n```\n\n此函数将返回 Game Center 服务器上找到的所有 `GKAchievementDescription`。现在，我们可以回到\
  \ `UFOAchievementViewController` 类，完成自定义成就表格的实现。\n\n**重要提示**： `retrieveAchievementMetadata`\
  \ 函数也会返回隐藏的成就。如果你想对用户隐藏这些成就，则必须从结果中将其过滤掉。\n\n此外，请添加我们之前创建的新协议。如果没有遇到任何错误，我们只需将返回的描述设置到本地数组中。当获取到新数据时，我们还需要刷新表格以向用户显示数据。\n\
  \n```\nfunc achievementDescriptionsLoaded(_ descriptions: [GKAchievementDescription]?,\
  \ error: Error?) {\nif error == nil {\nachievementArray = descriptions\n} else {\n\
  print(\"检索成就描述时发生错误：\\(error?.localizedDescription ?? \"\")\")\n}\nachievementTableView.reloadData()\n\
  }\n```\n\n对于 `numberOfRowsInSection` 方法，我们只需返回 `achievementArray` 的计数，如下所示：\n\n\
  ```\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection section: Int)\
  \ -> Int {\nself.achievementArray?.count ?? 0\n}\n```\n\n我们还需要实现一个 `cellForRowAtIndexPath`\
  \ 方法。请将以下方法添加到实现中。添加后，我们将更详细地分析它：\n\n```\nstatic let tableViewCellIdentifier = \"\
  Cell\"\nfunc tableView(_ tableView: UITableView, cellForRowAt indexPath: IndexPath)\
  \ -> UITableViewCell {\nvar cell = tableView.dequeueReusableCell(withIdentifier:\
  \ UFOAchievementViewController.tableViewCellIdentifier)\nif cell == nil {\ncell\
  \ = UITableViewCell(style: .default, reuseIdentifier: UFOAchievementViewController.tableViewCellIdentifier)\n\
  cell?.selectionStyle = .none\n}\nlet achievementDescription = achievementArray?[indexPath.row]\n\
  if let percentage = gcManager?.percentageCompleteOfAchievement(withIdentifier: achievementDescription?.identifier)\
  \ {\ncell?.textLabel?.text = (achievementDescription?.title ?? \"\")\n}\nachievementDescription?.loadImage(completionHandler:\
  \ { (image, error) in\nif image != nil {\ncell?.imageView?.image = image\n} else\
  \ {\ncell?.imageView?.image = GKAchievementDescription.placeholderCompletedAchievementImage()\n\
  }\n})\nreturn cell!\n}\n```\n\n该函数的前半部分相当标准：我们创建新的表格单元格，或者从可重用集合中获取一个。为了节省时间，我们使用了默认的内置表格单元格。我们创建一个新的\
  \ `GKAchievementDescription`，并根据 `achievementArray` 中的行号为其填充数据。\n\n我们处理的第一个属性是标题，用于设置单元格的\
  \ `textLabel`。在大多数情况下，你可能希望同时使用 `achievedDescription` 或 `unachievedDescription`\
  \ 以及标题。为简单起见，我们在此仅使用标题。接下来，我们需要设置成就的图像。这部分稍微复杂一些。\n\n`GKAchievementDescription`\
  \ 有一个与之关联的图像属性，在填充之前该属性为 `nil`。首先，检查该属性是否已填充；我们可以通过简单的 `nil` 检查来实现。如果已填充，我们将单元格图像设置为我们缓存的那一个。如果没有，我们需要从\
  \ Game Center 服务器加载图像。为此，我们在 `GKAchievementDescription` 对象上调用 `loadImageWithCompletionHandler`。这将返回已获得的图像。请注意，我们使用了默认占位图像，可以通过\
  \ `GKAchievementDescription` 上的类方法访问它。\n\n**提示**：在 `UITableViewCellStyleDefault`\
  \ 单元格中设置图像时，不要将图像设置为 `nil`。这会导致文本左对齐并移除图像视图。如果我们随后使用块来加载图像，则直到单元格或表格被重新加载时，图像才会出现。这就是我们首先设置占位图像的原因。\n\
  \n如果我们运行应用并访问自定义成就视图，它应该类似于图 4-13 中所示的样子。\n\n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig13_HTML.png](img/216283_2_En_4_Fig13_HTML.png)\n\
  \n*图 4-13* 在自定义 GUI 中显示的成就数据\n\n\n\n我们目前只能查看成就列表及关联图片，而无法了解用户距离解锁成就还有多少进度。回想一下，本章前面部分我们编写了几个便捷函数，此处正好可以派上用场。我们有两个函数可以返回成就的进度信息：`percentageCompleteOfAchievementWithIdentifier:`\
  \ 和 `achievementWithIdentifierIsComplete`。此外，若想获取完整的 `GKAchievement` 对象，可使用 `achievementForIdentifier`。接下来，我们使用\
  \ `percentageCompleteOfAchievementWithIdentifier:` 来显示完成百分比。请修改 `cellForRowAtIndexPath:`\
  \ 中设置单元格文本标签的代码段。修改后的代码片段应如下所示：\n\n```\nif let percentage = gcManager?.percentageCompleteOfAchievement(withIdentifier:\
  \ achievementDescription?.identifier) {\nlet percentageCompleteString = String(format:\
  \ \" %.1f%% Complete\", percentage)\ncell?.textLabel?.text = (achievementDescription?.title\
  \ ?? \"\") + percentageCompleteString\n}\n```\n\n再次运行游戏，你会发现输出信息更有帮助，如图 4-14 所示。\n\
  \n![../images/216283_2_En_4_Chapter/216283_2_En_4_Fig14_HTML.png](img/216283_2_En_4_Fig14_HTML.png)\n\
  \n**图 4-14** 带有自定义 GUI 和完成百分比的成就\n\n### 从提交失败中恢复\n\n作为开发者，您需要全权负责处理成就提交失败的情况。您一定不希望用户丢失任何成就进度。丢失成就会让用户感到非常沮丧，必须不惜一切代价避免这种情况。为防止此类问题，我们可以采用之前处理分数失败时的相同方法。主要区别在于，由于\
  \ `GKAchievement` 对象不包含任何日期或时效性信息，因此无需存储该对象。我们只需要存储 `percentageComplete` 即可。我们将创建一个新方法来处理这一行为。请将以下方法添加到\
  \ `GameCenterManager` 类中：\n\n```\nfunc storeAchievementToSubmitLater(_ achievement:\
  \ GKAchievement) {\nlet defaults = UserDefaults()\nlet savedAchievementsKey = \"\
  savedAchievements\"\nvar achievementsDictionary = defaults.dictionary(forKey: savedAchievementsKey)\
  \ as? [String: Double] ?? [:]\nlet achievementKey = achievement.identifier\nlet\
  \ achievementProgress = achievement.percentComplete\nlet storedProgress = achievementsDictionary[achievementKey]\
  \ ?? 0\nif achievementProgress > storedProgress {\nachievementsDictionary[achievementKey]\
  \ = achievementProgress\ndefaults.setValue(achievementsDictionary, forKey: savedAchievementsKey)\n\
  }\n}\n```\n\n此函数将成就作为参数，并检查其是否尚未作为引用存储在我们未能成功提交的成就字典中。如果已存储，则需要比较两者进度，取进度更大者，以避免删除用户的任何进度。完成后，将其作为字典存储到\
  \ `userDefaults` 中，使用标识符作为键，完成百分比作为值。我们还需要在 `submitAchievement:PercentComplete:`\
  \ 函数的错误处理中调用此方法。\n\n**提示** 我建议告知用户，当前无法提交其成就，但已保存，稍后会进行提交。这能让用户知道任何进度都未被丢失。\n\n\
  我们还需要一个新函数来检查是否有未提交的成就进度。至于何时调用此函数最为合适，并没有标准答案。通常可以在用户通过 Game Center 认证后调用，但您可能还希望从其他位置调用它，例如每当网络可达性状态更新时。请将以下方法添加到\
  \ `GameCenterManager` 类中：\n\n```\nfunc submitAllSavedAchievements() {\nlet defaults\
  \ = UserDefaults()\nlet savedAchievementsKey = \"savedAchievements\"\nif let achievementsDictionary\
  \ = defaults.dictionary(forKey: savedAchievementsKey) as? [String: Double] {\nachievementsDictionary.forEach\
  \ { key, value in\nsubmitAchievement(key, percentComplete: value)\n}\ndefaults.removeObject(forKey:\
  \ savedAchievementsKey)\n}\n}\n```\n\n此函数加载一份未提交进度的副本，并遍历每个项目，尝试逐个重新提交。如果再次提交失败，它们将被重新添加回已保存数据中。\n\
  \n## 总结\n\n至此，您已掌握所有必要工具，可以为支持 Game Center 的 iOS、Mac 或 Apple TV 应用添加丰富且复杂的成就系统。您现在了解了添加成就的价值，以及如何在\
  \ App Store Connect 门户中设置和配置成就。我们讨论了使用 Apple 默认 GUI 与自定义 GUI 各自的优缺点。现在您已经知道如何扩展\
  \ `GameCenterManager` 类，以包含发布成就进度、获取成就反馈以及重置成就进度等功能。\n\n本章完成的最重要步骤是扩展可复用的 `GameCenterManager`\
  \ 类，这将使您能够在未来的项目中轻松添加成就。在下一章中，我们将探讨 Game Center 的匹配和邀请系统，以便您添加多人游戏功能及其他网络功能。\n\n"
- "# 5. 匹配与邀请\n\n从本章开始，直至接下来的几章，我们将讨论如何通过 Game Center（以及后续的 GameKit）为您的应用或游戏添加网络和多人游戏功能。为应用添加网络功能在当代几乎被认为是一项基础技术。实际上，如今几乎所有现代软件都带有某种网络组件，无论是与在线服务通信以获取或发布信息，还是直接与对等设备交换数据。\n\
  \n在接下来的章节中，我们将讨论与其他对等设备的通信，但并非所有网络配置都是点对点直连（有关网络设计的详细信息，请参阅第 6 章）。\n\n具体而言，本章将探讨如何利用\
  \ Game Center 内置的邀请系统来查找并邀请对等用户进入您的应用。\n\n从历史角度看，Game Center 为开发者提供了一种被严重低估的市场营销和分发工具，尤其是在处理邀请方面，其开销非常低。在邀请本地或互联网用户开始您游戏或应用中的多人体验时，您可以选择邀请任意\
  \ Game Center 好友。如果您邀请的好友尚未安装该应用，系统会提示他们立即购买并开始游戏。即使 Game Center 已推出超过十年，iOS 上也没有其他方法能以这种方式向其他用户发送“立即购买”链接。此功能为扩大用户群提供了绝佳途径——只需让您的用户为您推销即可。\n\
  \n\n\n## 为何要在你的应用中添加匹配与邀请功能？\n\n查看近些年任何一年 PC 或主机游戏销量前十的榜单，你会发现榜单上绝大多数都是注重多人互动体验的游戏。我们来快速浏览一下\
  \ 2021 年销量第一的 PC 游戏《*使命召唤：黑色行动冷战*》。虽然这款游戏确实包含单人模式，但这更像是游戏的附加内容，而非主要卖点。其核心显然是多人游戏，即便为此牺牲了单人战役模式。近年来，行业的重心已从打造丰富而深刻的单人战役模式，转向了在多人游戏上投入更多精力。这一新趋势有一个非常合理的解释：投入在多人模式上的资金能带来更大的回报。不过，这并不意味着可以完全忽视单人游戏；实际上，对单人游戏和同屏合作游戏的需求正在增长。\n\
  \n人类本质上是社会性动物。我们渴望社交互动来保持健康的心理发展。电子游戏和其他社交软件正日益成为这种互动的出口。无论你是否认同这一观点中的社会学论断，但事实是多人游戏正变得越来越受欢迎。软件用户越来越喜欢多人互动，无论是大型多人在线角色扮演游戏，还是带有网络大厅的常见第一人称射击游戏，皆是如此。\n\
  \n为你的游戏添加多人元素，可以将用户的游玩时间延长百倍。如需证据，看看《*雷神之锤 III 竞技场*》或《*虚幻竞技场*》吧——这两款游戏均于 1999 年发布，多年后仍有用户登录；甚至在\
  \ 20 多年后的今天，依然有一个活跃的社区。如果这些游戏只专注于单人模式，它们很可能就不会拥有如此忠诚的粉丝群。以下列出了一些其他原因，说明为何通过 Game\
  \ Center 添加匹配和邀请功能，无论你考虑何种平台，都应为你的产品做出简单明了的商业决策：\n\n-   为游戏添加多人组件是提升品质的绝佳方式。根据你正在开发的游戏类型，添加多人元素可能只需要很少的额外工作量。\n\
  -   用户已经期望 App Store 中的顶级游戏具备多人功能。\n-   如果你拥有精心制作的多人组件，就可以合理地为产品设定更高的售价。\n-   没有比自动购买邀请系统更能让用户即刻下载你的应用的方式了。如果你能让潜在用户处于被邀请玩游戏并可以立即购买的状态，那么你完成销售的机会就会大得多；这些新用户自己也会带来更多的用户。\n\
  -   如果你使用广告支持系统，则可以在你的应用或游戏中增加游戏时间或使用时间。这将带来更多收入。如果你销售付费应用，用户会觉得他们的钱花得更值。\n-   人类喜欢竞争，所以鼓励你的用户去做他们喜欢的事情。多人模式或许不适合所有人，但对许多人来说，这是他们在寻找新游戏时唯一感兴趣的部分。\n\
  \n> **提示**  \n> 在可能的情况下，也为你的游戏用户提供单人游戏选项，因为依然有相当一部分用户群体偏好单人战役。\n\n### 常见的匹配场景\n\n\
  在我们开始处理匹配和邀请本身之前，理解在尝试为你的 iOS 应用或游戏实现多人网络功能时可能遇到的一些场景非常重要：\n\n-   你可能会遇到的第一个（可能也是最常见的）场景是，玩家已经进入你的应用，并希望创建一个自动匹配的游戏。双方玩家都已安装并加载了应用，并且都处于期望与对方开始网络会话的状态。被邀请的玩家会收到一个通知，询问他们是否想与邀请者一起加入游戏。当双方都同意后，匹配\
  \ GUI 会关闭，并创建一个新的比赛。\n-   你可能会遇到的另一个常见场景是，用户创建一个新的匹配事件，并从他们的 Game Center 好友列表中邀请其他玩家。被邀请的好友会收到一个推送通知，告知他们已被邀请加入游戏；如果他们已安装游戏并接受邀请，游戏将会启动。一旦所有被邀请的玩家都进入比赛，游戏就会开始。如果他们尚未安装游戏，系统会提示他们安装，并且在安装成功后，游戏会自动启动。\n\
  -   如果被邀请的好友尚未安装应用但决定安装，则会触发一个略有不同的事件流程。安装过程结束后，应用会自动启动，然后你可以继续匹配事件的正常流程。\n-   玩家也可以直接从\
  \ Game Center 应用内部创建一个新的匹配事件。在此场景中，所有玩家都会被启动到应用中，并收到加入比赛的邀请。此场景的妙处在于，如果你的应用已经支持邀请功能，你无需编写任何额外代码来支持此场景。\n\
  -   玩家还可以邀请一个或多个好友，并通过自动匹配器填充剩余的空位。这是前两种场景的混合体，如果前两种场景的支持都已添加，那么对于此场景，你无需额外的编程工作。\n\
  -   你可能会遇到的最后一个场景（可选）是以编程方式自动匹配玩家。在这种情况下，会向 Game Center 服务器发送请求，然后会为你返回比赛结果。玩家不会看到任何标准\
  \ GUI，你可以选择实现自己的界面。\n\n> **注意**  \n> 匹配只能在同一应用的两个实例之间进行。如果 bundle identifier 不匹配，应用将无法通过匹配系统进行通信。\n\
  \n\n\n## 创建新的比赛请求\n\n要创建一场新比赛，首先需要创建一个新的 `GKMatchRequest` 对象。该对象代表了你即将创建的比赛所需的参数。无论是在展示图形界面时，还是通过编程方式创建比赛时，都会用到\
  \ `GKMatchRequest`。使用图形界面时，你需要将 `GKMatchRequest` 对象传递给 `GKMatchmakerViewController`\
  \ 的新实例；而如果你是以编程方式处理配对，则需要将该对象传递给 `GKMatchmaker` 的实例。有关编程式比赛交互的更多细节，请参考后续章节。现在，我们先将注意力集中在如何在代码中创建新的比赛请求。请看以下代码片段：\n\
  \n```\nlet request = GKMatchRequest()\nrequest.minPlayers = 2\nrequest.maxPlayers\
  \ = 2\n```\n\n这个示例是创建新比赛的最简单演示。你必须指定最大和最小玩家数量。在这个例子中，我们创建了一个恰好需要两名玩家的新请求。\n\n`GKMatchRequest`\
  \ 还有一个名为 `playersToInvite` 的属性，你可以使用一个 `GKPlayer` 标识符数组来自动填充到新比赛中。当你连续进行多场关联游戏，并希望保持同一组玩家时，这个属性会非常有用。此外，当你的应用通过\
  \ Game Center.app 被邀请你的玩家启动时，该属性会被预填充。\n\n> **注意：** 接受好友的比赛邀请时，事件由 Game Center 应用处理，并且\
  \ `playersToInvite` 属性会被填充。\n\n`GKMatchRequest` 还有另外两个属性，你将在本章后续部分用到它们：`playerAttributes`\
  \ 和 `playerGroup`。这两个属性将在以其命名的章节中详细讨论。\n\n> **注意：** 如果你使用 Game Center 作为托管游戏的服务端，玩家数量上限为四人。然而，如果你按照本章“使用你自己的服务器”部分的描述实现了自己的服务器，则最多可以包含\
  \ 16 名玩家。\n\n## 展示比赛图形界面\n\n我们首先采用最简单的路径，即使用 Apple 提供的标准配对图形界面。首先添加一个新按钮，用于在测试游戏主屏幕上展示视图。我还提前把原来的\
  \ **Play**（游戏）按钮重命名为 **Single Player**（单人游戏），并创建了一个名为 **Multiplayer**（多人游戏）的新按钮（见图\
  \ 5-1）。我们将让 `UFOViewController` 类充当配对行为的委托，因此需要让视图控制器遵循 `GKMatchmakerViewControllerDelegate`\
  \ 协议。此外，修改我们刚刚添加的多人游戏按钮的动作函数，使其与以下代码匹配：\n\n```\n@IBAction func multiplayerButtonPressed()\
  \ {\n    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
  \ = 2\n    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:\
  \ request) else {\n        print(\"创建配对视图控制器时出错。\")\n        return\n    }\n   \
  \ matchmakerViewController.matchmakerDelegate = self\n    present(matchmakerViewController,\
  \ animated: true)\n}\n```\n\n我们创建了一个新的 `GKMatchRequest` 实例，如同上一节所做的那样。我们的演示游戏恰好需要两名玩家，因此我们将最大值和最小值都设置为\
  \ 2。\n\n![在 UFOViewController 故事板中为多人游戏添加新按钮](img/216283_2_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1** – 在 UFOViewController 故事板中为多人游戏添加新按钮\n\n在代码片段的下一部分，我们使用刚刚创建的 `GKMatchRequest`\
  \ 创建了一个新的 `GKMatchViewController` 实例。\n\n我们还将委托设置为 `UFOViewController` 类。完成后，我们像展示其他任何模态视图一样展示它。你应该会看到类似于图\
  \ 5-2 所示的输出。\n\n如果你还没有这样做，那么现在正是填充你的沙盒 Game Center 账户好友列表的好时机。为此准备几个未使用过的电子邮件地址会很有帮助，因为你不想使用任何之前在\
  \ iTunes Connect 或 Game Center 中使用过的邮箱。一旦你添加了一两个好友，就可以继续点击图 5-2 中所示的 **Invite Friend**（邀请好友）按钮。现在你应该能看到你的好友列表，并且能够邀请他们进入你的应用，如图\
  \ 5-3 所示。\n\n> **提醒：** 创建沙盒账户时，不要使用你在 iTunes Connect 或 Game Center 中曾经使用过的任何电子邮件地址，否则可能导致奇怪且不可预期的行为。\n\
  \n> **提示：** 许多电子邮件提供商允许你在邮箱地址末尾添加 `+` 作为别名。例如，`GameCenterRocks@Gmail.com` 和 `GameCenterRocks+new@Gmail.com`\
  \ 都会发送到同一个收件箱，但 Apple 会将它们视为两个不同的邮箱地址。\n\n![从你的 Game Center 好友列表中邀请好友](img/216283_2_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** – 从你的 Game Center 好友列表中邀请好友\n\n![MatchmakerViewController 为两名玩家创建新的比赛图形界面](img/216283_2_En_5_Fig2_HTML.jpg)\n\
  \n**图 5-2** – MatchmakerViewController 为两名玩家创建新的比赛图形界面\n\n在继续之前，我们需要实现 `GKMatchmakerViewController`\
  \ 必需的委托函数。在继续处理配对之前，我们需要实现以下三个函数：\n\n```\nfunc matchmakerViewControllerWasCancelled(_\
  \ viewController: GKMatchmakerViewController) {\n    dismiss(animated: true, completion:\
  \ nil)\n}\n\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
  \ didFailWithError error: Error) {\n    dismiss(animated: true, completion: nil)\n\
  \    let alert = UIAlertController.init(title: \"\", message: \"发生错误：\\(error.localizedDescription)\"\
  , preferredStyle: .alert)\n    let defaultAction = UIAlertAction(title: \"关闭\",\
  \ style: .default, handler: { action in\n        self.dismiss(animated: true, completion:\
  \ nil)\n    })\n    alert.addAction(defaultAction)\n    present(alert, animated:\
  \ true, completion: nil)\n}\n\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
  \ didFind match: GKMatch) {\n    dismiss(animated: true, completion: nil)\n}\n```\n\
  \n前两个方法处理用户取消和失败的情况，而第三个方法处理成功的情况。最后一个方法在成功时会返回一个 `GKMatch` 对象；我们将在后续章节中使用该对象来开始一场新比赛。\n\
  \n当每场比赛允许的玩家数量可变时，用户将能够通过配对视图控制器添加或移除玩家位置，如图 5-4 所示。在邀请好友加入 Game Center 比赛时，你可以选择提供一条简短消息与邀请一同显示，如图\
  \ 5-5 所示。\n\n![向好友发送邀请消息，请求他们与你开始一场比赛。此消息将以 iMessage 形式发送](img/216283_2_En_5_Fig5_HTML.png)\n\
  \n**图 5-5** – 向好友发送邀请消息，请求他们与你开始一场比赛。此消息将以 iMessage 形式发送\n\n![一个包含可变玩家数量的配对屏幕](img/216283_2_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4** – 一个包含可变玩家数量的配对屏幕\n\n\n\n## 处理收到的邀请\n\n在你的应用中实现玩家匹配功能时，还需要实现一个处理好友邀请的系统。被邀请的设备会收到推送通知，告知他们有好友邀请他们一起玩游戏。假设他们已经安装了游戏并接受了邀请，你需要通过建立新的比赛来连接两位玩家。如果被邀请者尚未安装该应用或游戏，系统会提示他们进行下载。下载完成后，将按照正常的邀请流程处理。\n\
  \n**注意**  \n你还需要处理来自 Game Center 中新建比赛的邀请。大概率无需编写任何额外代码；不过，建议你彻底测试这一交互路径。\n\n我们将通过邀请处理器（特别感谢\
  \ Apple 的命名）来处理邀请。`GKInviteEventListener` 协议中的两个不同的委托方法将负责处理邀请流程。\n\n**重要**  \n\
  在沙盒模式下处理邀请时，可能会遇到一些怪异情况。如果你发现自己始终收不到邀请推送通知，可以在两台设备上都打开应用，并让双方互相邀请对方。完成一次这个操作后，通常就能恢复从桌面发起邀请测试的功能。\n\
  \n既然我们已经了解了需要处理的参数类型以及可能遇到的各种场景，就可以开始编写新的邀请处理器了。为保持简洁清晰，我们在 `GameCenterManager`\
  \ 类中将其封装成一个独立方法。请在 `GameCenterManager` 中添加以下新方法：\n\n```\npublic func player(_ player:\
  \ GKPlayer, didAccept invite: GKInvite) {\n    guard let matchmakerViewController\
  \ = GKMatchmakerViewController(invite: invite) else {\n        print(\"创建匹配视图控制器时出错。\"\
  )\n        return\n    }\n    matchmakerViewController.matchmakerDelegate = self\n\
  \    present(matchmakerViewController, animated: true)\n}\n\npublic func player(_\
  \ player: GKPlayer, didRequestMatchWithRecipients recipientPlayers: [GKPlayer])\
  \ {\n    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
  \ = 2\n    request.recipients = recipientPlayers\n    guard let matchmakerViewController\
  \ = GKMatchmakerViewController(matchRequest: request) else {\n        print(\"创建匹配视图控制器时出错。\"\
  )\n        return\n    }\n    matchmakerViewController.matchmakerDelegate = self\n\
  \    present(matchmakerViewController, animated: true)\n}\n```\n\n我们来逐步解析这两个函数，看看每一步具体做了什么。首先，我们使用传入的邀请对象创建了\
  \ `GKMatchmakerViewController`。将匹配处理器的委托设置为 `self`，并将界面展示给用户。\n\n**重要**  \n在通过 Game\
  \ Center 完成本地用户身份验证之前，你无法正式接受或处理邀请。因此，在验证成功后，尽快注册邀请处理器非常重要。\n\n由于我们希望验证成功后能尽快调用此方法，因此在完成身份验证后添加了对这个新方法的调用。请修改\
  \ `UFOViewController` 中的 `processGameCenterAuthentication` 方法，使其与下列代码一致：\n\n```\n\
  func processGameCenterAuthentication(_ error: Error?) {\n    if let error = error\
  \ {\n        print(\"身份验证期间发生错误：\\(error.localizedDescription)\")\n    }\n}\n```\n\
  \n**提示**  \n如果没有两台设备来测试邀请，可以使用模拟器作为其中一台设备。别忘了用两个不同的 Game Center 账号分别登录模拟器和你的设备，否则双方无法互相邀请。\n\
  \n我们会将自身上下文对象（`UFOViewController`）作为邀请处理器的委托。如果你已经按照上一节《展示匹配界面》的要求完成了必需的委托调用，则无需再对该类进行其他修改。\n\
  \n恭喜！你现在已经能够处理应用收到的邀请。在下一节中，我们将探讨如何配置自动匹配功能，以便为你自动填充被邀请者。\n\n**注意**  \n邀请的“立即购买”功能无法在沙盒环境中测试，仅能在正式版应用中使用。在沙盒环境下测试邀请时，每台测试设备都必须安装该应用。\n\
  \n## 自动匹配\n\n在使用 Game Center 时，自动匹配是一项无需额外工作即可享用的优秀功能。Game Center 会维护一个在线队列，记录等待加入你应用中多人游戏的玩家。如果你在新建比赛请求中没有填满所有受邀好友，自动匹配功能将自动用其他在线未匹配玩家填充剩余空位。\n\
  \n请记住，自动匹配的效果完全取决于你游戏的热度；如果你没有足够多的玩家基础来支持自动匹配，用户可能会尝试加入游戏，但在等待片刻后因未能匹配成功而退出。\n\n\
  你可以使用玩家分组和玩家属性来筛选自动匹配的结果，这些内容将在本章后续部分讨论。此外，你还可以查询任何活跃玩家分组的活动情况，以了解匹配新对手的平均等待时间，这部分内容也将在后面章节中进一步讨论。\n\
  \n## 程序化匹配\n\n你的应用也可以在不使用匹配界面的情况下，以编程方式寻找比赛。你可以利用这种方法实现自定义的匹配界面，或者创建“即时匹配”类型的操作，让用户自动配对并直接开始游戏，无需其他用户交互。我们的演示应用不会使用这种匹配方式，但以下方法可以帮助你以编程方式实现匹配：\n\
  \n```\nfunc findProgrammaticMatch() {\n    let request = GKMatchRequest()\n    request.minPlayers\
  \ = 2\n    request.maxPlayers = 4\n    GKMatchmaker.shared().findMatch(for: request,\
  \ withCompletionHandler: { match, error in\n        if let error = error {\n   \
  \         print(\"寻找匹配过程中发生错误：\\(error.localizedDescription)\")\n        } else\
  \ if let match = match {\n            print(\"已找到匹配：\\(match)\")\n        }\n  \
  \  })\n}\n```\n\n上述代码非常简单。我们创建了一个新的 `GKMatchRequest`，并将最小玩家数设为两人，最大玩家数设为四人。然后调用一个新方法\
  \ `findMatch`，并传入我们新建的 `GKMatchRequest` 对象副本。当找到匹配时，会调用这个闭包；因此，如果匹配结果没有及时返回，最好显示一个活动指示器。获得\
  \ `GKMatch` 对象后，就可以按照后续章节所述开始一个新的多人游戏了。\n\n在使用程序化添加的匹配时，如果匹配耗时过长或用户改变了主意，务必为用户提供取消匹配请求的途径。可通过以下代码行实现这一操作：\n\
  \n```\nGKMatchmaker.shared().cancel()\n```\n\n\n\n## 向比赛中添加玩家\n\n在比赛创建后，有时你可能需要向其中添加新玩家。例如，也许有玩家中途掉线，你希望在不用重新开始比赛的情况下替换他；或者游戏开始后某位玩家未能成功连接，你想找一名替补。以下函数将利用自动匹配行为，自动向比赛中添加新玩家：\n\
  \n```\nfunc addPlayer(to match: GKMatch?, with request: GKMatchRequest?) {\nif let\
  \ match = match, let request = request {\nGKMatchmaker.shared().addPlayers(to: match,\
  \ matchRequest: request, completionHandler: { error in\nif let error = error {\n\
  print(\"向比赛中添加玩家时发生错误：\\(error.localizedDescription)\")\n} else {\nprint(\"已向比赛添加一名玩家\"\
  )\n}\n})\n}\n}\n```\n\n玩家被添加至比赛后，你需要让该玩家与当前比赛同步。添加玩家后，该玩家将可以接收和发送数据，但无法访问比赛中已发送过的历史数据。\n\
  \n## 重新邀请\n\nGame Center 具有自动尝试重新邀请断线玩家的功能。此方法仅支持两人模式的 Game Center 比赛。当玩家断线时，会调用以下函数；Game\
  \ Center 将自动尝试重新连接该玩家。如果成功，你会额外收到一次对 `match(_:player:didChange:)` 的调用：\n\n```\n\
  func match(_ match: GKMatch, shouldReinviteDisconnectedPlayer player: GKPlayer)\
  \ -> Bool {\ntrue\n}\n```\n\n## 玩家分组\n\n玩家分组允许你为每位玩家指定不同的分类。默认情况下，Game Center 会自行匹配所有玩家到同一组。通过玩家分组，你可以指定某些玩家只寻找包含同组其他玩家的队伍。\n\
  \n例如，想要挑战特定难度地牢或特定赛道的玩家会被分到同一组，使他们能与其他有相同游戏意愿的玩家配对。玩家分组可用于将玩家划分到多种不同类型的群体中，例如：\n\
  \n-   希望玩同一关卡地图（如赛道）、RPG 中的特定区域、第一人称射击游戏中的地图、或动作游戏中某一关的玩家。\n\n-   根据技能等级区分玩家。既可以由玩家自行选择想玩的技能等级，也可以根据过往表现或连胜记录自动判定其技能等级。\n\
  \n-   正在进行的游戏类型。例如，可依据玩家想玩“夺旗模式”、“团队死斗”、“占领模式”还是“孤军奋战”进行划分。\n\n-   希望共同游戏的同一部落、公会、战队或网络内的玩家。\n\
  \n-   已购买额外应用内内容，且因故无法再与未拥有相同内容的玩家配对的玩家。\n\n玩家分组并不局限于这些类别，你可以根据应用需求以任何方式将玩家分组。玩家分组通过\
  \ `GKMatchRequest` 的 `playerGroup` 属性来表示。该属性唯一的限制是必须为 `Int` 类型。指定 `playerGroup`\
  \ 的方法相当直接，如下方代码片段所示：\n\n```\nlet myForestMap = 123456789\nlet request = GKMatchRequest()\n\
  request.minPlayers = 2\nrequest.maxPlayers = 4\nrequest.playerGroup = myForestMap\n\
  ```\n\n在大多数情况下，你应该让用户自行选择他们所属的 `playerGroup`；但也有一些例外情况，比如自动判定玩家的技能等级。\n\n**注意：**\
  \ 一旦将 `playerGroup` 设置为任何非零值，玩家将只会与同组的其他玩家进行匹配。\n\n## 玩家属性\n\n与玩家分组类似，玩家属性在匹配过程中用于缩小可供用户选择的游戏范围。玩家属性通常与玩家分组功能相同，但处理某些事情的方式有所不同。玩家属性的诸多用途包括以下几种：\n\
  \n-   在角色扮演游戏中，角色通常会选择职业。为了完成任务，通常需要一支包含多种职业的队伍——例如治疗者、战士和法师。\n\n-   体育游戏中通常有各种场上位置，如守门员、后卫、中场和前锋。一支队伍需要这些位置的混合才能进行比赛。\n\
  \n-   在潜艇模拟游戏中，你也可以安排不同角色的玩家，如舰长、声纳操作员、领航员和武器系统操作员。\n\n-   在第一人称射击游戏中，你可能需要担任近距离战斗专家、狙击手、医疗兵和排长等角色的玩家。\n\
  \n### 了解玩家属性的限制\n\n玩家属性可用于给每位玩家分配这些值，从而使你能够平衡包含所需角色的队伍。然而，使用玩家属性时存在若干限制；在开始使用玩家属性之前，务必熟悉以下几点：\n\
  \n-   每个角色只能由一名玩家担任。例如，你不能在一场足球比赛中要求三名中场球员。\n\n-   所有角色都必须被填满后，游戏才会被认为可以开始。例如，根据前述例子，第一人称射击游戏不能没有狙击手。\n\
  \n-   每位玩家一次只能担任一个角色；玩家不能以同时满足多个角色的身份加入游戏。例如，你不能让一位第一人称射击游戏的玩家既愿意当狙击手又愿意当医疗兵；他们需要在匹配请求确定之前选择一个。\n\
  \n-   玩家属性在自动匹配过程中使用。如果你邀请朋友加入游戏，系统不会检查他们是否符合需要填补的角色。相反，他们会被自动分配一个随机且未被占用的角色。简言之，朋友无法选择自己的玩家属性。\n\
  \n-   玩家属性不会显示在标准匹配界面的任何位置。你需要在进入该视图之前实现自己的系统，以便让用户选择角色。\n\n-   `GKMatch` 对象不包含关于哪些玩家被分配了哪些角色的信息。你需要在比赛连接后自行实现系统来判断谁在扮演哪个角色。\n\
  \n-   没有现成系统可以判断哪些角色供过于求，或哪些角色更难找到比赛。例如，在角色扮演游戏中可能每个人都想玩法师，而没人愿意当治疗者；因此，法师玩家找公开比赛会困难得多，而治疗者则能轻易找到比赛。\n\
  \n\n\n### 使用玩家属性\n\n不要让一长串限制让你对玩家属性望而却步。即使存在这些限制，它们在创建更好的多人游戏体验方面仍然极具价值。我们来看一个如何使用玩家属性构建比赛的示例：\n\
  \n```\nstruct PlayerClass: OptionSet {\nlet rawValue: UInt32\nstatic let squadLeader\
  \     = PlayerClass(rawValue: 0xFF000000)\nstatic let breacher        = PlayerClass(rawValue:\
  \ 0x00FF0000)\nstatic let grenadier       = PlayerClass(rawValue: 0x0000FF00)\n\
  static let lightMachineGun = PlayerClass(rawValue: 0x000000FF)\n}\n```\n\n首先，我们为每个玩家属性定义一个掩码，在本节剩余部分将其称为“职业”。这个示例代表了一个现代军事风格游戏中的标准小队。每个职业被分配了一个不同的掩码值。Game\
  \ Center 使用一种算法，根据以下规则将这些玩家匹配在一起。\n\n-   比赛的掩码始终以邀请玩家的掩码开始。\n-   如果邀请玩家已设置了玩家属性掩码，Game\
  \ Center 将忽略所有未设置玩家属性掩码的玩家。\n-   只有当玩家的玩家属性掩码与比赛中已邀请的任何玩家的掩码的任何部分都不重叠时，该玩家才会被添加到比赛中。\n\
  -   将玩家添加到比赛后，该玩家的属性值将逻辑上**或**到比赛的掩码中。\n-   如果比赛的掩码值等于 `FFFFFFFFh`，则认为比赛已满员并可以开始；如果掩码不等于\
  \ `FFFFFFFFh`，则 Game Center 将继续搜索可以填补比赛的玩家。\n-   无法查询 Game Center 以查看当前仍在等待哪个玩家。\n\
  \n以下内容基于我们刚刚定义的职业。一个空白的比赛将拥有如图 5-6 所示的玩家属性掩码。\n\n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig6_HTML.jpg](img/216283_2_En_5_Fig6_HTML.jpg)\n\
  \n**图 5-6** 一个空的玩家属性掩码 (`0x00000000`)\n\n玩家 1 开始一场新比赛，并选择“班长”作为他的职业。当该玩家创建比赛时，比赛的玩家属性掩码将如图\
  \ 5-7 所示。\n\n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig7_HTML.jpg](img/216283_2_En_5_Fig7_HTML.jpg)\n\
  \n**图 5-7** 代表“班长”职业的玩家属性掩码 (`0xFF000000`)\n\n现在，比赛的创建者使用 Game Center 自动匹配新玩家。Game\
  \ Center 找到的第一个玩家选择了“掷弹兵”职业。“掷弹兵”的掩码将如图 5-8 所示。\n\n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig8_HTML.jpg](img/216283_2_En_5_Fig8_HTML.jpg)\n\
  \n**图 5-8** 代表“掷弹兵”职业的玩家属性掩码 (`0x0000FF00`)\n\n将其与已有的比赛掩码（如图 5-9 所示）比较，我们可以看到没有重叠，因此该玩家可以被邀请加入游戏。\n\
  \n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig9_HTML.jpg](img/216283_2_En_5_Fig9_HTML.jpg)\n\
  \n**图 5-9** 比较 `0xFF000000` 和 `0x0000FF00`\n\n当这些掩码合并形成新的比赛掩码时，它将如图 5-10 所示。\n\n\
  ![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig10_HTML.jpg](img/216283_2_En_5_Fig10_HTML.jpg)\n\
  \n**图 5-10** 一个新的比赛掩码，代表两名玩家 (`0xFF00FF00`)\n\n玩家 3 选择“突击手”作为他的职业并搜索游戏。Game Center\
  \ 找到了我们一直在处理的那个比赛，并通过比较比赛掩码和“突击手”掩码确定有空位，如图 5-11 所示。\n\n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig11_HTML.jpg](img/216283_2_En_5_Fig11_HTML.jpg)\n\
  \n**图 5-11** 上方是当前比赛的掩码 (`0xFF00FF00`)，下方是“突击手”的掩码 (`0x00FF0000`)\n\n由于掩码之间没有重叠，因此“突击手”可以被邀请加入游戏。玩家\
  \ 4 选择了“掷弹兵”职业，并让 Game Center 寻找比赛。Game Center 再次找到了我们正在进行的比赛，并试图将新玩家加入其中。\n\n由于玩家\
  \ 4 提供的掩码与比赛掩码的一部分重叠（见图 5-12），因此不允许该玩家加入。如果 Game Center 无法为该玩家找到开放的比赛，它将开始寻找新玩家来填补该玩家比赛的缺口。\n\
  \n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig12_HTML.jpg](img/216283_2_En_5_Fig12_HTML.jpg)\n\
  \n**图 5-12** 上方是当前比赛的掩码 (`0xFFFFFF00`)，下方是“掷弹兵”的掩码 (`0x0000FF00`)\n\n玩家 5 选择“轻机枪手”作为他的掩码并开始寻找要加入的游戏。Game\
  \ Center 将他的掩码与当前比赛的掩码进行比较，如图 5-13 所示。\n\n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig13_HTML.jpg](img/216283_2_En_5_Fig13_HTML.jpg)\n\
  \n**图 5-13** 上方是当前比赛的掩码 (`0xFFFFFF00`)，下方是“轻机枪手”的掩码 (`0x000000FF`)\n\n由于两组掩码之间没有重叠，玩家\
  \ 5 可以加入比赛。这将为比赛创建一个完整的玩家属性掩码，如图 5-14 所示。\n\n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig14_HTML.jpg](img/216283_2_En_5_Fig14_HTML.jpg)\n\
  \n**图 5-14** 一个已满员的比赛掩码 (`0xFFFFFFFF`)\n\n如果玩家 5 从未加入游戏，而最初的邀请者想用 Game Center 上的一个朋友来填补这个空位，那么被邀请的朋友将无法选择他的职业。在这种情况下，比赛将拥有一个如图\
  \ 5-15 所示的掩码。然后，被邀请的朋友会被分配一个如图 5-16 所示的掩码，这将补全比赛的掩码，从而完成所有玩家属性掩码并允许游戏开始。\n\n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig16_HTML.jpg](img/216283_2_En_5_Fig16_HTML.jpg)\n\
  \n**图 5-16** 完成比赛掩码所需的“机枪手”掩码 (`0x000000FF`)\n\n![../images/216283_2_En_5_Chapter/216283_2_En_5_Fig15_HTML.jpg](img/216283_2_En_5_Fig15_HTML.jpg)\n\
  \n**图 5-15** 当前比赛的掩码 (`0xFFFFFF0`) [注：原文疑似笔误，但保留]\n\n设置玩家属性非常简单，如以下代码片段所示：\n\n```\n\
  struct PlayerClass: OptionSet {\nlet rawValue: UInt32\nstatic let squadLeader  \
  \   = PlayerClass(rawValue: 0xFF000000)\nstatic let breacher        = PlayerClass(rawValue:\
  \ 0x00FF0000)\nstatic let grenadier       = PlayerClass(rawValue: 0x0000FF00)\n\
  static let lightMachineGun = PlayerClass(rawValue: 0x000000FF)\n}\n...\nlet request\
  \ = GKMatchRequest()\nrequest.minPlayers = 4\nrequest.maxPlayers = 4\nrequest.playerAttributes\
  \ = PlayerClass.squadLeader.rawValue\n```\n\n\n\n## 玩家活动\n\nGame Center 提供了一种查询近期玩家活动的方法。你的用户通常希望尽可能了解他们在寻找多人比赛时可能需要等待多长时间。需要明确的是，玩家活动指的是近期活动，而非当前活动。苹果没有提供任何方法来精确判断有多少玩家正在等待比赛，但确实提供了一种方式来确定近期有多少用户寻找过比赛。让我们来看看获取玩家活动所需的源代码。将以下两个新函数添加到你的\
  \ `GameCenterManager` 类的实现文件中：\n\n```\nfunc findAllActivity() {\n    GKMatchmaker.shared().queryActivity\
  \ { activity, error in\n        DispatchQueue.main.async {\n            self.delegate?.playerActivity?(activity\
  \ as NSNumber, error: error)\n        }\n    }\n}\n\nfunc findActivityForPlayerGroup(_\
  \ playerGroup: Int) {\n    GKMatchmaker.shared().queryPlayerGroupActivity(playerGroup)\
  \ { activity, error in\n        let activityDictionary = [\n            \"activity\"\
  : activity,\n            \"playerGroup\": playerGroup,\n        ]\n        DispatchQueue.main.async\
  \ {\n            self.delegate?.playerActivity?(forGroup: activityDictionary, error:\
  \ error)\n        }\n    }\n}\n```\n\n我们还需要在 `GameCenterManager.swift` 的 `GameCenterManagerPlayerDelegate`\
  \ 中添加两个新的协议方法。添加以下两个函数：\n\n```\nfunc playerActivity(_ activity: Int?, error: Error?)\n\
  func playerActivity(forGroup activityDict: [AnyHashable : Any]?, error: Error?)\n\
  ```\n\n当你在 `UFOViewController` 中实现这些新的协议方法，如下所示：\n\n```\nfunc playerActivity(_ activity:\
  \ Int?, error: Error?) {\n    if let error = error {\n        print(\"查询玩家活动时发生错误：\\\
  (error.localizedDescription)\")\n    } else {\n        print(\"所有近期玩家活动：\\(activity\
  \ ?? 0)\")\n    }\n}\n\nfunc playerActivity(forGroup activityDict: [AnyHashable\
  \ : Any]?, error: Error?) {\n    if let error = error {\n        print(\"查询玩家活动时发生错误：\\\
  (error.localizedDescription)\")\n    } else {\n        if let activity = activityDict?[\"\
  activity\"],\n           let playerGroup = activityDict?[\"playerGroup\"] {\n  \
  \          print(\"所有近期玩家活动：\\(activity) 分组：\\(playerGroup)\")\n        }\n    }\n\
  }\n```\n\n你应该能得到类似以下的输出：\n\n```\n2021-03-08 11:11:04.007 UFOs[3000:207] 所有近期玩家活动：3\
  \ 分组：12345\n2021-03-08 11:11:04.008 UFOs[3000:207] 所有近期玩家活动：3\n```\n\n现在我们获得了指定玩家分组的活动数据，但这些数字究竟意味着什么？苹果从未明确说明这些数字的确切含义，但通过仔细研究，它们似乎代表了过去一到三分钟内尝试使用自动匹配功能连接游戏的用户数量。这些数字似乎会在该时间范围内的某个不可确定的间隔内重置。此外，从用户尝试加入比赛到新数字反映出来，似乎存在\
  \ 15 到 30 秒的延迟。\n\n尽管存在这些由玩家活动机制带来的限制，但它仍然是一个非常有价值的工具，可以帮助你判断用户找到比赛的可能等待时间。不过，你需要确保这些信息仅供参考，因为它们往往不够可靠，不足以作为决策依据。\n\
  \n**注意：** 如果苹果系统提供的玩家活动信息不足以满足你的应用需求，你可以自行实现服务器系统来精确追踪有多少玩家正在等待比赛。\n\n## 使用自有服务器（托管比赛）\n\
  \n在正常情况下，Game Center 会为你托管比赛；然而，苹果也提供了一种实现自有服务器来托管比赛的技术。这种方法被称为“托管比赛”，可以在任何应用中实现，以增加基于\
  \ Game Center 的多人在线网络的灵活性。\n\n当使用 Game Center 托管比赛时，连接到该比赛的每台设备都会创建一个 `GKMatch`\
  \ 实例。`GKMatch` 类负责处理连接、握手、发送和接收数据以及处理错误等所有繁重工作。但有时你需要实现自己的服务器，特别是当你想允许同一时间超过四人连接到同一比赛时。在这种情况下，你可以使用\
  \ Game Center 为你的比赛寻找同伴，并使用自己的服务器来连接这些同伴。\n\n**提示：** 使用托管比赛可以连接多达 16 位用户，而使用 Game\
  \ Center 托管时最多只能连接四人。\n\n然而，使用自有服务器也有一些缺点，最显著的是，你现在需要负责以前由 Game Center 免费提供的所有繁重工作，具体包括以下几点：\n\
  \n-   你必须自行设计和实现所有网络代码来连接同伴。Game Center 会为你寻找比赛，但其作用仅止于此。\n-   如果你的应用使用的是标准匹配界面，那么你的服务器必须在新的同伴成功连接时通知应用，以便更新图形用户界面。\n\
  \n为了在设备端支持托管比赛，我们需要对代码库进行一些细微的修改。我们从修改本章前面设置的多人游戏按钮操作方法开始。\n\n```\n@IBAction func\
  \ multiplayerButtonPressed() {\n    let request = GKMatchRequest()\n    request.minPlayers\
  \ = 2\n    request.maxPlayers = 4\n    guard let matchmakerViewController = GKMatchmakerViewController(matchRequest:\
  \ request) else {\n        print(\"创建匹配视图控制器时出错。\")\n        return\n    }\n   \
  \ matchmakerViewController.matchmakerDelegate = self\n    matchmakerViewController.isHosted\
  \ = true\n    present(matchmakerViewController, animated: true)\n}\n```\n\n如你所见，我们添加了一行新代码\
  \ `matchmakerViewController.isHosted = true`，这告诉匹配图形用户界面，此比赛将在我们自己的服务器上托管。除了将 `matchMakerViewController`\
  \ 设置为托管模式外，你还需要让每台设备连接到你的服务器。本节不涉及如何编写服务器代码，因为这里可以使用数十种语言和方法。但是，在设备连接到你的服务器后，它需要针对加入的玩家调用以下代码：\n\
  \n```\nmatchmakerViewController.setHostedPlayer(player, didConnect: true)\n```\n\
  \n这将会更新所有已连接玩家屏幕上的图形用户界面，通知他们新玩家已准备好开始比赛。当所有玩家都连接到你的服务器并确认准备就绪后，你的委托方法将被调用来开始游戏。在使用\
  \ Game Center 比赛时，我们使用委托回调 `matchmakerViewController(_:didFind:)` 来开始比赛。然而，对于托管比赛，我们使用以下方法：\n\
  \n```\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
  \ didFindPlayers playerIDs: [String]) {\n    dismiss(animated: true, completion:\
  \ nil)\n    print(\"玩家：\\(playerIDs)\")\n    //开始托管比赛\n}\n```\n\n此时，你可以开始游戏，由你的服务器处理已连接玩家之间的通信。此外，你也可以像本章前面看到的\
  \ Game Center 托管比赛那样，通过编程方式开始一个托管比赛。\n\n```\nfunc findProgrammaticHostedMatch()\
  \ {\n    let request = GKMatchRequest()\n    request.minPlayers = 2\n    request.maxPlayers\
  \ = 16\n    GKMatchmaker.shared().findPlayers(forHostedRequest: request) { players,\
  \ error in\n        if let error = error {\n            print(\"寻找比赛时发生错误：\\(error.localizedDescription)\"\
  )\n        } else if let players = players {\n            print(\"已为比赛找到玩家：\\(players)\"\
  )\n        }\n    }\n}\n```\n\n如你所见，这与之前的方法非常相似；不过，我们返回的不是一个 `GKMatch` 对象，而是一个玩家数组。你还会注意到，我们还可以将最大玩家数增加到\
  \ 16 人。\n\n\n\n## 总结\n\n本章介绍了匹配与邀请的概念。我们讨论了为你的 iOS、Mac 或 Apple TV 应用或游戏添加多人模式带来的巨大优势，以及在此过程中可能遇到的一些障碍。我们探索了从展示标准\
  \ Apple 界面到使用玩家群组和玩家属性实现高度自定义匹配的整个匹配流程。我们回顾了如何在各种可能场景下处理邀请，以及如何查询玩家活动。最后，我们发现了如何通过实现自己的服务器来消除\
  \ Game Center 的一些限制。我们还扩展了可复用的 Game Center 管理器，使其能够处理匹配、邀请及所需的开销，从而让你能快速为应用添加多人模式功能。\n\
  \n在本章中，我们深入探讨了如何创建比赛并用玩家填充比赛。在接下来的章节中，我们不仅会学习玩家之间如何通信，还会探索寻找可通信玩家的新方法。下一章将介绍如何为你的游戏或应用设计网络环境。\n\
  \n"
- "# 6. 网络设计概述\n\n在前几章中，我们学习了如何通过使用 Game Center 和 GameKit 的多种方法来查找玩家并建立连接。在本章中，我们将探讨如何为现代电脑游戏设计网络体验。本章的撰写和布局与你之前阅读的章节略有不同。主要区别在于，本章不涉及相关源代码，我们仅会简要提及\
  \ GameKit 网络主题本身。本章将从学术角度聚焦于网络设计的概念，而非实际实现网络本身。在下一章中，你将了解如何将所有内容整合起来，让玩家之间开始相互通信。\n\
  \n虽然完全可以（并且也经常发生）不经过任何计划或思考就直接开始编写网络逻辑，但这可能并非一个好主意。毕竟，你不会在事先不规划好逻辑如何运行的情况下就开始编写一个新应用或游戏。网络设计是一个复杂的主题，你应该有计划地进行；否则，你可能会在投入大量工作后发现自己需要从头重写整个系统。你肯定不希望因为所采用的方法限制了未来扩展的可能性而陷入困境。就像软件开发一样，你不应该在第一天就急着写代码。你应该先做一些白板推演，感受一下项目的需求。\n\
  \n以一款名为 Clan Lord 的桌面角色扮演游戏为例，它于 20 世纪 90 年代末期为 Mac 编写。Clan Lord 拥有一个非常忠实的粉丝群，使得这款游戏至今仍保持活跃。然而，在游戏最初编写时，许多与网络相关的问题似乎并未为这样一款二十多年后仍会被游玩的游戏做充分考量。\n\
  \nClan Lord 对其所有网络调用都采用逐帧同步。这意味着每一帧，玩家屏幕上的每个可见元素都必须被传输。当游戏规模小、用户基数小、功能复杂度有限时，这种方法能良好运作。然而，在设计软件时，你不能对未来抱有限制性的愿景。始终要未雨绸缪，规划最好的情况，或者，取决于你的视角，规划最坏的情况。在设计网络时，你必须考虑到六个月、一年甚至十年后你希望你的游戏或应用做什么。软件远超预期寿命并持续运行远超最初开发者设想的年代，这种情况屡见不鲜；只需看看“千年虫”问题，我们就能看到这一点。每个开发者都认为很快会有更好的东西来取代他们正在做的工作；但通常他们都错了，产品会长期存续下去，远远超过让它们继续运行的实际意义。\n\
  \nClan Lord 现在饱受根深蒂固的问题困扰，例如每秒五帧的渲染引擎，这是因为在普通家庭网络上，每秒无法同步超过五帧的完整数据。如果在项目启动之初就在客户端中实现一些逻辑，这原本是可以避免的；例如，将对象的位置及其移动时间告知客户端，而不是每帧都完全同步所有内容，效率会高得多。此外，由于玩家动作必须同步回服务器，玩家移动被限制在每秒四到五帧，这使得对事件做出反应变得困难。这原本也可以通过使用本章稍后讨论的预测算法来避免，该算法用于确定玩家在移动过程中最终会到达的位置。\n\
  \nClan Lord 是一个例子，它比计划中更受欢迎（或者说至少拥有一个更忠诚的粉丝群），并且生命周期远超所有人的预期。遗憾的是，当这种情况发生时，你就会受到项目启动之初所定下的愿景和设计的限制。以后撤销某些东西比一开始就做好要困难得多。在设计你的网络时，请花时间仔细并有目的地进行，因为它可能会在很长一段时间内困扰你和你开发的应用程序。\n\
  \n## 三种网络类型\n\n尽管存在多种不同的网络设计类型，但在设计网络基础设施时，你可以实现三种实用且主流的网络。选择一种主要的网络类型是一个好的起点，因为它将引导你进入设计过程的下一步。\n\
  \n我们将重点讨论这三种主要的网络设计类型，但请记住，还有数十种其他知名的网络配置，我们将在本节中简要提及其中一些。我们将在本章中详细讨论的三种网络类型是：点对点网络、客户端-主机网络和环形网络。\n\
  \n\n\n### 对等网络\n\n对等网络（见图 6-1）是 iOS/Mac 平台上最常见的一种网络。其中没有任何一台设备会被区别对待，每台设备都负责向它希望通信的其他所有对等节点发送和接收数据。尽管这种网络看起来可能很复杂，但它却是将多台设备连接在一起进行通信的最简单直接的方法之一。\n\
  \n![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig1_HTML.jpg](img/216283_2_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1：使用六台 iOS 设备的对等网络示意图\n\n对等网络常用于处理 Game Center 网络连接，因为它是该平台上最容易实现的方式。虽然这种方法具有设置极其简单的优点，但它同样也存在不少缺点。首先，它会产生大量冗余的开销。每个对等节点都需要将其操作告知其他所有对等节点。在如图\
  \ 6-1 所示的六路网络中，这意味着每台设备每次想要更新游戏状态时，都需要发送五条消息。此外，如果你正在实现一个需要每个对等节点确认消息成功接收的系统，那么每次事件你还需要接收五条确认消息。\n\
  \n对等网络的另一个缺点是，当处理大量对等节点时，可能会变得非常混乱。正如你从图 6-1 中看到的那样，事情很快就会变得杂乱无章。与我们在本节中讨论的其他主要网络类型不同，对等网络是唯一一种没有清晰数据流的网络。根据定义，每个对等节点都可以向任何其他对等节点发送消息。这也意味着你必须要追踪每个对等节点需要了解什么信息。在大多数情况下，这是一种完全可以接受的方法。然而，当你开始处理更复杂的网络类型以及需要发送和接收的信息时，这种配置可能就不再理想了。\n\
  \n此外，没有哪一台设备控制着游戏的状态。如果存在人工智能组件，那么你将需要设计一个系统，使其能够在所有设备之间保持同步。\n\n### 客户端-主机网络\n\n\
  客户端-主机网络会指定一台设备作为主机，或者如果你喜欢这个术语，也可以称为服务器。这台设备负责向所有已连接的客户端发送信息。客户端之间从不直接通信；它们只与主机通信，随后主机再将所需的信息转发给其他客户端。图\
  \ 6-2 展示了客户端-主机设置的一个示例。\n\n![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig2_HTML.jpg](img/216283_2_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2：使用五台 iOS 设备的客户端-主机网络示意图\n\n客户端-服务器网络简化了数据流。每个对等节点或客户端只需要关心自身和主机即可；它们无需知道网络上可能存在的其他设备。这种网络的好处在于，由一台设备来保持所有内容的同步并处理信息流；这使得它成为一个非常安全的网络（在反作弊意义上）。不过，在\
  \ iOS 平台上作弊并不是一个大问题，因为它本身就是一个沙盒系统；Mac 的状态虽然更开放一些，但通常除非游戏变得非常成功，否则这也不是主要问题。\n\n这种系统还有其他好处，例如只需要一台设备来管理网络状态，并且这台唯一的设备负责控制网络行为。这种网络类型简化了诸如连接、断开连接、传输错误以及其他状态变化（例如由计算机控制的对象，如人工智能）等事件的处理。然而，同样的设置在\
  \ iOS 平台上可能会带来麻烦；如果主机设备需要处理过多的信息，这台设备的运行速度可能会变慢，或者耗电更快。这种方法还需要两套独立的逻辑处理程序，一套用于客户端，一套用于主机。在更大的环境中，当不再需要某位玩家担任主机时，这种类型的系统就变成了专用的服务器系统。\n\
  \n### 环形网络\n\n环形网络（见图 6-3）没有主机，也没有客户端。它的工作方式类似于对等网络，但每个对等节点只负责与一个指定的对等节点通信，并且只从另一个单独定义的对等节点接收信息。信息以环状在一组设备中流动，因此得名。\n\
  \n这种网络在 iOS 平台上并不常见，因为通常它提供的用于处理断开连接的对等节点的冗余性，并没有太多必要。Apple 已经做了大量基础工作来确保网络保持活跃和稳定，而无需开发者花费额外的设计时间来确保不会出现对等节点与当前已连接的其他对等节点失去联系的情况。不过，有时你在\
  \ iOS 平台上设计网络时，可能会发现这种配置很有用。请记住，当你在环形网络中增加额外的客户端时，信息完成一次环回路所需的时间会随之增加，并且特别容易受到一个或多个延迟设备的拖累。\n\
  \n![../images/216283_2_En_6_Chapter/216283_2_En_6_Fig3_HTML.jpg](img/216283_2_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3：使用六台 iOS 设备的环形网络示意图。请注意，相比图 6-1 所示的对等网络，此图看起来要简洁得多\n\n\n\n## 较少常见的网络\n\n\
  计算机科学中还有许多其他类型的网络设计可用。有些方案比其他方案更实用，有些则主要停留在理论层面。在本节中，我们将介绍一些比较知名的“不常见”网络。尽管其中一些网络可以在\
  \ iOS 设备上实现，但对普通项目而言，大多数网络可能并不会带来实际的好处：\n\n- **无头客户端**：该客户端完全没有数据，并由主机设备控制。你可以将这种设置视为一种从服务器磁盘启动的计算机终端。\n\
  \n- **专用服务器**：此示例中的主机不参与游戏或活动，专门负责向对等端发送信息并收集新的输入。这通常见于大型公司为了创建游戏社区而部署的场景。专用服务器系统可被视为客户端-主机设置的扩展，其中的主机变成了一台专用机器。\n\
  \n- **网状/部分网状网络**：这是一种点对点网络，其中每个对等端可能不知道网络上存在的其他对等端。数据包带有目标地址标签，每一跳都试图让数据包更接近目标。全网状网络意味着每个对等端都相互连接，实际上这与点对点网络几乎相同。\n\
  \n- **树形网络**：这种网络由一个对等端组成的树结构构成，它们彼此互联，并各自受一个中心节点控制。中心节点将消息传递给其他中心节点，而每个树的分支则沿着该分支来回传递消息。\n\
  \n- **混合网络**：这种网络结合了两种或多种技术，例如通过一个中心服务器将两组对等端连接在一起。\n\n以上涵盖了你在软件工程职业生涯中可能会遇到的大部分网络。网络设计的类型实际上没有限制，每年都会有更好的设计和流程出现。如果你对这个主题特别感兴趣，网上有很多优秀的资源可以更深入地探讨网络设计。在下一节中，我们将研究实际在网络上发送和接收的数据包。\n\
  \n## 可靠数据与不可靠数据\n\n在处理网络设计时，数据包可靠性是一个重要话题。当讨论数据包可靠性时，我们特指数据的优先级、数据包的顺序以及重试判定因素。在我们深入探讨在\
  \ Apple 平台上实现的具体细节之前，让我们先分别看看所有这些属性以及它们与网络设计的关系（参见表 6-1）。\n\n**表 6-1.** 常见的数据包属性及其对网络行为的影响\n\
  \n| 属性 | 与网络设计的关系 |\n|---|---|\n| 优先级 | 当你处理底层网络时，你是在与数据包打交道。每个数据包都有预定的大小，并包含你想发送给另一个对等端的事件信息。数据包通常被送入队列，然后发送给它们所寻址的对等端。但由于网络并不精确（尤其是当你试图获得最低延迟时），数据包可能不会总是按照生成的顺序被接收。例如，在一个标准的在线游戏中，你可能传递两种信息：游戏状态变化和聊天信息。显然，你的角色请求一个动作（例如攻击敌人或躲避攻击）比一条聊天信息更需要及时处理。解决这类问题的方法是设置数据包的优先级。对等端会循环遍历所有待处理的消息，并优先发送最高优先级的消息。这使得关键消息在失败时能够首先被重试，同时也能将重要的数据包提升到队列的顶部。\
  \ |\n| 排序 | 数据包被接收的顺序可能至关重要。例如，如果你发送了 10 个数据包，它们共同组成一条很长的聊天消息，或者共同组成游戏状态，那么这些数据包被接收的顺序对于接收方对等端来说就很重要。如果数据包没有按顺序被接收和处理，你的消息可能会显得杂乱无章。当状态机发生这种情况时，可能会导致非常不可预测的行为。然而，确保数据包有序会带来一定的开销成本。如果你正在等待第\
  \ 1 个（共 10 个）数据包，那么你无法对可能已经接收到的其他数据包进行任何处理。这会造成一种局面，即你的网络速度受限于最慢的那个数据包。如果排序对于网络的正常运行并非关键，那么你就不必担心顺序问题。请记住，维护排序开销很高；只在确实需要的地方才要求它。\
  \ |\n| 重试 | 网络本质上就是不可靠的。即使是连接到专用网络的台式机也会出现数据包丢失和其他故障。当你在移动设备上处理网络可靠性问题时，你唯一可以可靠依赖的就是故障。当你向另一个对等端发送一个数据包时，你可以通过两种方式处理：第一种是“发送即忘”系统；第二种是“发送并验证”系统。在第一种方法中，你发送一个数据包，但并不真正关心它是否到达。让我澄清一下：你确实关心，但如果它失败了，你对此也无能为力。这种可接受的失败的一个很好的例子是语音聊天数据包。如果它未能成功到达线路终点，重新发送它只会导致不同步；更好的做法是继续传输数据。结果当然会短暂地丢失语音，但总比替代方案要好。在第二种方法中，数据包被认为是至关重要的，例如玩家打开宝箱、搜索被击倒的敌人寻找宝藏或更新他们的移动方向。对等端需要发送这些数据才能继续流畅地执行命令。如果你跳过这个数据包，用户会感到沮丧，因为他们将不得不自己重试该操作，而不是让网络为他们重试。\
  \ |\n\n现在我们已经涵盖了将实际数据包从一个设备发送到另一个设备时的重要问题，我们可以看看这些原则如何应用于 Apple 平台本身。\n\n使用 GameKit\
  \ 发送数据有两种模式：第一种是 `GKSendDataReliable`；第二种自然是 `GKSendDataUnreliable`。让我们看看这两种模式分别为我们做了什么，以及它们如何与我们刚刚讨论的主题相匹配。参见表\
  \ 6-2。\n\n**表 6-2.** 数据包属性及其在 Game Center 中的应用\n\n| 属性 | `GKSendDataReliable` |\
  \ `GKSendDataUnreliable` |\n|---|---|---|\n| 优先级 | GameKit 网络在处理数据包时不会考虑任何类型的优先级。数据包按照它们被送入系统的顺序发送。\
  \ | GameKit 网络在处理数据包时不会考虑任何类型的优先级。数据包按照它们被送入系统的顺序发送。 |\n| 排序 | 数据包将按照它们被发送的顺序被接收。\
  \ | 使用此方法的数据包不保证按照它们被发送的相同顺序被接收。 |\n| 重试 | 数据包将持续重试，直到被成功接收。在第一个数据包被确认接收之前，不会发送下一个数据包。\
  \ | 数据包被发送后即从队列中移除。API 在发送下一个数据包之前，不会等待接收到已接收的通知。这自然比在每个数据包之间等待响应要快。 |\n\n\n\n##\
  \ 仅发送必要数据\n\n初涉网络设计时最容易犯的重大错误之一就是发送过多数据。把一切数据都发出去固然简单。本章开头提到的那个游戏就暴露了这个问题。\n\n>\
  \ *如果我有更多时间，就会写一封更简短的信。*\n> \n> ——布莱兹·帕斯卡\n\n这句常被误引的名言，放在网络数据包上同样贴切。数据包的大小与网络的速率、稳定性和可扩展性直接相关。花时间弄清楚究竟哪些是必须发送的数据，这一点至关重要。同样值得投入时间的是，思考如何压缩你已有的数据。\n\
  \n来看一个你设计游戏时可能会遇到的假设案例。假设你正在开发一款角色扮演游戏：玩家操控英雄，引导其闯过一系列地牢。在这些地牢中，你可以与物品互动，遭遇各种敌人，并与它们实时战斗。\n\
  \n我们知道会有一些静态数据。例如，地牢的布局在玩家身处其中时通常不会改变，因此我们不应每帧或定期将地图瓦片发送给客户端，而应在玩家首次进入该区域时发送这些数据。可能会有些元素是动态的，但我们可以无限期地预测其行为，比如流动的河流或闪烁的火把。这些元素也可以在加载时一并带上保持同步所需的信息。此外，还要考虑这些元素是否需要与服务端保持同步：火把的闪烁可能并不需要所有客户端同时同步。\n\
  \n当然，在玩家探索地牢的过程中，有些数据需要持续更新。玩家自身的数据需要在用户每次执行新操作时更新。例如，如果你正向东奔跑，你可以在每一帧都发送一个数据包，告诉服务端你正在东行。然而，更高效的处理方式是告诉服务端“以全速开始向东移动”，当你停止东行时，再通知服务端“想要停止”。这种交互方式大幅减少了完成相同任务所需发送的消息数量。正是由于这类优化，你在玩现代游戏时，有时会看到断线的玩家撞墙——因为客户端在断线前从未收到过“停止奔跑”指令。同样，由于这些优化，你有时会看到一个严重卡顿的玩家在多个不同方向之间跳来跳去。\n\
  \n花点时间仔细设计网络数据的结构。你随时可以添加更多信息，但随着网络设计的深入，想要移除数据会变得非常困难。始终寻找减小数据包大小的方法，因为数据包太小没有任何坏处，而数据包太大则会在日后给你带来诸多麻烦。\n\
  \n## 预测与外推\n\n再来看另一个例子：这次是一款赛车游戏。每位玩家控制一辆赛车在赛道上行驶。我们知道每辆车在比赛开始时的位置。同时我们也知道，由于网络往返延迟，我们发送给服务端的任何消息都会带有固有延迟。那我们是否应该等到服务端告知后才更新赛车位置？那样会导致游戏画面非常卡顿。为了解决这个常见问题，我们使用了预测技术。\n\
  \n我们知道赛车在接下来的几帧内很可能会继续沿当前路线行驶。我们假设一切事物都会保持当前状态，直到服务端告诉我们情况有变；如果用户轻微向左或向右转向，当服务端通知我们更新时，我们只需进行微小的修正。运动中的物体在不受外力作用时保持运动状态，这不仅是物理定律，也是设计预测型网络的第一条法则。\n\
  \n物体完全逆转当前运动方向的可能性，远小于其轻微改变当前运动方向的可能性。因此，如果服务端告知你某些状态已不同步，处理微小变化会更容易。万一玩家确实完全改变了方向，或者打破了你对后续动作的预测，你的偏差最多只相当于当前的延迟时间——通常只是几分之一秒。如果一个物体很可能会继续它当前的行为——例如玩家移动、下落中的物体、子弹轨迹或任何类型的物理模拟——最佳策略就是假设这些动作将持续下去，直到服务端通知你它们已发生变化。\n\
  \n## 消息格式化\n\n当你为游戏或类游戏应用设计网络时，你必然会接触到至少两种消息类型。它们通常被称为状态消息和服务端消息。状态消息是直接影响游戏引擎的消息，例如玩家移动或打开宝箱。服务端消息则处理维系整个系统运转的“粘合剂”，例如连接、断开连接、心跳检测和错误信息。\n\
  \n快速将这些消息分类到不同的处理程序非常重要。一个良好的设计模式是将这些消息的解析工作放在不同的位置。毕竟，你不会希望在处理第一人称射击游戏的聊天消息时，还要同时扫描客户端超时消息。有多种方法可以实现这种分离，但我发现使用简单的消息前缀在大多数情况下是合适的。如果你用服务端消息中不会出现的字符作为所有状态消息的前缀，那么你可以快速检查接收消息的第一个字符，确保它们被送到正确的解析器。如果你在设计更复杂的网络，可以使用大量可能的前缀来确保消息到达正确的位置。在第八章\
  \ 8 中，当我们开始收发数据时，会看到消息格式化的实际示例。\n\n\n\n## 预防作弊与超时断线\n\n在 iOS 平台上，目前尚未引起广泛关注的问题之一是网络漏洞作弊。同样地，Mac\
  \ App Store 也相对较少出现作弊和滥用行为。如果你是一名在线游戏玩家，可能对这种行为再熟悉不过了。精明的用户会摸清网络行为模式，然后发送客户端本身永远不会发出的指令，例如`将生命值上限拉满`或`将重生时间减至零`。虽然你可能需要让服务器对诸如“增加”或“减少”生命值的请求做出响应，但务必确保服务器掌握控制权。例如，不要允许客户端发送“将移动速度提高到五十”，而应将消息设计为“请求提高移动速度”，再由服务器返回新的速度值。如果让客户端掌控变量，迟早会有人钻空子利用你的系统。在设计网络架构时，最佳实践是永远不要信任客户端提供的游戏状态信息。你需要尽可能减少对客户端所传达事件或世界状态的依赖。\n\
  \n如果你的客户端没有任何需要发送给服务器或对等端的更新，良好的做法是发送一条表明“我还在线，不要断开我的连接”的消息，这被称为“心跳”消息。虽然在 GameKit\
  \ 平台上无需担心超时断线问题，但在空闲对等端之间保持通信线路畅通仍然是个好主意。\n\n在设计消息架构时，你可以将其视为设计一个 API；两者有很多相似之处，必须遵循相同的准则。如果你在第一版应用中发布了允许用户查询移动速度的命令，那么在第二版中就不能轻易删除该命令，因为旧版客户端可能仍在依赖它。遵循\
  \ API 开发者所遵循的准则：全面测试所有内容，因为一旦发布到公开环境中，要收回就非常困难了。\n\n### 当一切方法都失效时该怎么办\n\n长期从事网络开发后，必然会遇到一个问题：当设计好的系统不再满足需求时该怎么办。我们来讨论一个或许上过逻辑学或商业课程的人熟悉的概念：一种被称为“沉没成本谬误”的思维定势，即人们会将时间等不可退还的成本与可退还的成本等量齐观。\n\
  \n请看以下公式：\n\n`回报 = 项目收入 - 已投入成本`\n\n现在我们用实际数据来看同一个例子。1968 年，诺克斯和英克斯特调查了 141 名赛马投注者：其中\
  \ 72 人刚在过去 30 秒内下注了 2 美元，69 人即将在未来 30 秒内下注 2 美元。他们的假设是：刚刚做出决策的人会通过比之前更坚定地相信自己选对了马，来减少决策后的认知失调。诺克斯和英克斯特要求投注者按照\
  \ 7 分制给他们的马匹获胜几率打分。结果发现：即将下注的人给马匹获胜几率打出的平均分是 3.48，对应“有一定获胜机会”；而刚刚下注的人打出的平均分是 4.81，对应“有很大获胜机会”。这一假设得到了证实：在做出\
  \ 2 美元的承诺后，人们变得更加确信自己的赌注会赢。诺克斯和英克斯特还对赛马场上的顾客进行了辅助测试，几乎得到了完全相同的结果。^(¹)\n\n我们在这里谈论的是：接受何时应该放弃并重新开始。放弃从来不是受欢迎的解决方案；我们的大脑天生抗拒它。我们会盯着不可退还的成本，并将其计算为对我们有利的因素。一旦你已经投入了，就更容易证明这种投入的合理性并试图维护它。没人愿意成为那个叫停项目、抛弃所有已投入时间和资金的人；然而，当你花费时间和资源在一个开发项目上时，这些投入已经花掉，无法挽回。你无法仅仅因为已经花了时间就证明继续投入更多时间是合理的。\n\
  \n何时该放弃并重新开始，没有绝对正确的答案，也没有绝对错误的答案。你唯一能做的就是客观看待问题。如果你尚未对这个问题进行投入，你会选择哪种解决方案？\n\n\
  最佳方法是在实现任何功能之前，始终彻底思考架构决策。然而，开发者常常花时间试图修复某个东西，而不是重新开始。在网络开发中，构建一个设计很容易，但修改和调整现有解决方案则困难得多。有时候，最佳行动方案就是推倒重来，从零开始。\n\
  \n### 本章小结\n\n在本章中，我们着眼于实际网络的设计，而不是本书其他部分讨论的平台特定信息。即便没有本章的内容，凭借常识和直觉，你也能轻松设计出一个可用的网络，但请记住本章的教训：能用不代表好用。设计网络很容易；但正确地设计网络非常困难。\n\
  \n关于网络设计的信息非常丰富，很难仅用一章甚至一本书的篇幅涵盖。如果非要留下最后一条建议：当你开始构思网络结构时，边推进边全面思考所有细节，且永远不要觉得第一个解决方案就足够好。\n\
  \n在下一章中，我们终于要开始处理将消息从一台设备发送到另一台设备的具体工作了。第 9 章还将对该技术进行扩展，探讨如何为你的应用添加语音聊天服务。\n\n脚注\
  \ 1\n\n"
- "# 7. 数据交换\n\n在前一章中，我们探讨了如何通过各种方法连接到对等端。到目前为止，我们还无法利用这种连接做太多事情。在本章中，我们将学习使用 GameKit\
  \ 和 Game Center 网络在多个对等端之间交换数据的全部知识。我们已经在 UFO 游戏中添加了使用 Game Center 查找对等端的功能。现在，我们将添加实际进行多人比赛的功能。\n\
  \n由于之前章节已经做好了所有准备工作，关于数据交换我们只需关注两件事：第一，发送实际数据；第二，在接收端接收并处理这些数据。除了部分断线逻辑之外，其他需要完成的工作都已经就绪。让我们直接开始，修改第\
  \ 5 章中的源代码。\n\n\n\n## 修改单人游戏\n\n为了将单人游戏转变为多人游戏，我们需要进行以下几项修改：\n\n- 一旦连接到新对等端，游戏就需要开始。我们还需要一种方式通知现有游戏引擎，新游戏是多人模式。\n\
  - 需要指定一台设备为主机设备。我们将让这唯一的一台设备控制奶牛的行动，因为两台设备无法同时控制奶牛移动。如果希望两台设备画面保持同步，这一步至关重要。\n-\
  \ 每个对等端需要告知其他对等端自身的操作，例如移动和牵引光束的使用。\n- 每个对等端需要解析其他对等端的设备状态，并更新自己的游戏状态，以确保两台设备相互同步。\n\
  \n这些步骤代表了将单人游戏转变为多人游戏通常所需的最低要求。你的具体游戏或应用可能会复杂得多。例如，你的多人游戏体验可能与单人游戏完全不同，以至于无法为两种模式复用同一个类。另一方面，你的游戏也可能更简单。例如，在多人海战游戏中，不需要指定任何一台设备为主机，因为不存在需要你追踪管理的电脑控制元素。\n\
  \n## 为多人游戏设置引擎\n\n我们首先要做的是让游戏引擎知晓状态应设置为多人模式还是单人模式。实现这一点有复杂的方式，也有简单的方式。根据你的需求，很可能只需要一个简单的状态变量即可。\n\
  \n我们将在示例中使用状态变量这种方法，因为我们的游戏非常简单直接。在`UFOGameViewController.swift`文件中，我们创建一个新的`Bool`属性，该属性将用于告知类当前是单人模式还是多人模式。请在已有文件中添加以下几行代码：\n\
  \n```\nclass UFOGameViewController: UIViewController {\nvar gameIsMultiplayer =\
  \ false\n}\n```\n\n我们将在整个代码库中使用此属性来判断游戏是否运行在多人模式下。\n\n在`UFOViewController`中，我们有一个现有函数，当游戏开始新的多人比赛时会被调用。Game\
  \ Center 会返回一个`GKMatch`对象来帮助我们识别游戏。我们还将为`GameCenterManager`类添加一些新方法，用于处理与此系统的通信。目前，我们只需专注于让游戏在新的状态下启动并运行。\n\
  \n```\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
  \ didFind match: GKMatch) {\ndismiss(animated: true, completion: nil)\n}\n```\n\n\
  接下来，我们在该函数的末尾添加一段代码，以便在找到想要对战的对等端后，开始新的多人游戏。请将以下代码片段添加到每个方法中：\n\n```\nlet gameVC\
  \ = UFOGameViewController()\ngameVC.gcManager = gcManager\ngameVC.gameIsMultiplayer\
  \ = true\nnavigationController?.pushViewController(gameVC, animated: true)\n```\n\
  \n我们还需要持有代表对等端的`GKMatch`。在`UFOGameViewController`中创建两个新属性，命名为`peerIDString`和`peerMatch`。按照与设置`gameIsMultiplayer`属性相同的方式设置它们。你的头部文件的新部分应类似下面的抽象代码片段：\n\
  \n```\nclass UFOGameViewController: UIViewController {\n//...\nvar peerIDString:\
  \ String?\nvar peerMatch: GKMatch?\n}\n```\n\n现在，我们需要添加逻辑来设置这些属性，以便开始新的多人游戏。这些函数现在应如下所示。\n\
  \n当加载游戏视图控制器时，我们就能知道它是否是多人模式，并且拥有对等端的引用。现在，我们的`GameViewController`拥有了开始新多人游戏所需的所有信息。\n\
  \n```\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
  \ didFind match: GKMatch) {\ndismiss(animated: true, completion: nil)\nlet gameVC\
  \ = UFOGameViewController()\ngameVC.gcManager = gcManager\ngameVC.gameIsMultiplayer\
  \ = true\ngameVC.peerIDString = nil\ngameVC.peerMatch = match\nnavigationController?.pushViewController(gameVC,\
  \ animated: true)\n}\n```\n\n### 选择主机\n\n选择哪台设备作为主机比听起来要困难。两台设备首次连接时，被视为对等设备。那么我们如何决定哪台设备将拥有比另一台更多的控制权呢？\n\
  \n我使用过的最简单且最可靠的方法是让每台设备生成一个随机数。拥有最大随机数的设备成为主机。在极少数情况下，如果两台设备生成了相同的随机数，我们只需再次尝试生成两个新的随机数。\n\
  \n在确定随机数之后——即某台设备为自己争取成为主机机会所选的数字——我们需要将该数据发送给另一台设备。另一方面，我们需要处理数据，并使两台设备就哪台被选为主机达成一致结论。本节仅处理生成主机编号；接下来的两节将处理如何发送和接收这些数据。现在我们向`UFOGameViewController`类添加以下函数：\n\
  \n```\nfunc generateAndSendHostNumber() {\nlet randomHostNumber = Double(arc4random())\n\
  let randomNumberString = \"$Host:\\(randomHostNumber)\"\ngcManager?.sendString(toAllPeers:\
  \ randomNumberString, reliable: true)\n}\n```\n\n针对这个特定的示例，我们将使用字符串来来回发送数据。你当然也可以将它作为`Int`发送，但无论发送什么，首先都需要转换为数据，这将在下一节中介绍。此外，我们需要确保在处理多人游戏时调用此方法。为此，我们需要在`viewDidLoad`方法的末尾添加以下代码。我们还需要稍微修改生成奶牛的逻辑。如果是多人游戏，只有主机负责生成和更新奶牛路径。\n\
  \n> **提示**  \n> 当开始处理更复杂的网络通信时，切换到一种能够轻松存储更多数据且解析量更少的数据类型（如字典或数组）通常会更有益处。\n\n```\n\
  override func viewDidLoad() {\n//...\ngenerateAndSendHostNumber()\nif gameIsMultiplayer\
  \ == false {\nfor _ in 0..<5 {\nspawnCow()\n}\nupdateCowPaths()\n}\n}\n```\n\n\n\
  \n### 发送数据\n\n我们将使用两个主要函数来向其他已连接的节点发送数据。一个函数用于向所有已连接的节点发送数据，另一个则仅向特定节点（例如队友或其他玩家组）发送数据。首先，在我们的`GameCenterManager`类中添加以下两个方法：\n\
  \n```\nfunc sendStringToAllPeers(_ dataString: String, reliable: Bool)\nfunc sendString(_\
  \ dataString: String, toPeers peers: [String] reliable: Bool)\n```\n\n我们将使用这些函数来来回回地发送字符串，但你可以添加额外的方法，以接受你针对特定游戏想使用的任何输入类型。请记住，所有内容在传输过程中都需要转换为数据。你或许还会注意到，第一个函数与我们之前从`generateAndSendHostNumber`调用的方法相同。\n\
  \n**提示**\n\n如果你计划构建一个可复用的`Game Center`类，最好实现用于处理数组和字典的函数。在处理网络消息时，这两种都是非常常见的数据类型。\n\
  \n在真正开始来回发送数据之前，我们需要知道为多人游戏创建的`GKMatch`。为此，我们在`GameCenterManager`类中创建一个新的属性。我们将其命名为`matchOrSession`，并将其设置为一个\
  \ ID 类型。在开始新的多人游戏之前，在获取到新的`GKSession`或`GKMatch`之后，我们需要设置此属性。首先，让我们看看如何向所有节点发送数据。新方法如下所示。在你查看完它之后，我们将进行更详细的讨论：\n\
  \n```\nfunc sendStringToAllPeers(_ dataString: String, reliable: Bool) {\n    guard\
  \ matchOrSession != nil else {\n        print(\"Game Center Manager 的 matchOrSession\
  \ 属性尚未设置，在发送或接收数据前，需要使用 GKMatch 或 GKSession 进行设置\")\n        return\n    }\n   \
  \ guard let dataToSend = dataString.data(using: .utf8) else {\n        print(\"\
  Game Center Manager 的 dataString 无法转换为 Data。\")\n        return\n    }\n    var\
  \ sendError: Error?\n    if let session = matchOrSession as? MCSession {\n     \
  \   let peers = session.connectedPeers\n        let mode: MCSessionSendDataMode\
  \ = reliable ? .reliable : .unreliable\n        do {\n            try session.send(dataToSend,\
  \ toPeers: peers, with: mode)\n        } catch {\n            sendError = error\n\
  \        }\n    } else if let match = matchOrSession as? GKMatch {\n        let\
  \ mode: GKMatch.SendDataMode = reliable ? .reliable : .unreliable\n        do {\n\
  \            try match.sendData(toAllPlayers: dataToSend, with: mode)\n        }\
  \ catch {\n            sendError = error\n        }\n    } else {\n        print(\"\
  Game Center Manager 的 matchOrSession 既不是 GKMatch 也不是 GKSession，我们无法发送数据。\")\n  \
  \  }\n    if let sendError = sendError {\n        print(\"发送数据时发生错误：\\(sendError.localizedDescription)\"\
  )\n    }\n}\n```\n\n我们需要确保已正确设置`matchOrSession`属性。如果没有设置，我们将无法继续，因为我们将使用此对象来发送数据。确保我们拥有正确的信息以继续之后，我们将`NSString`转换为`NSData`对象。这会将字符串编码为适合通过网络发送的格式。我们还需要设置可靠性模式，正如第\
  \ 7 章中所讨论的那样。\n\n现在一切就绪，可以实际发送数据了。我们首先检测当前处理的是来自 Game Center 类型连接的`GKMatch`，还是来自\
  \ Peer Picker 类型连接的`GKSession`。剩下的就是使用`GameKit` API 发送数据。\n\n现在我们最好来看看如何有选择地向特定节点发送数据。我们可以基于已构建的向所有节点发送数据的示例进行扩展。让我们看看`sendString`函数：\n\
  \n```\nfunc sendString(_ dataString: String, toPeers peers: [Any], reliable: Bool)\
  \ {\n    guard matchOrSession != nil else {\n        print(\"Game Center Manager\
  \ 的 matchOrSession 属性尚未设置，在发送或接收数据前，需要使用 GKMatch 或 GKSession 进行设置\")\n        return\n\
  \    }\n    guard let dataToSend = dataString.data(using: .utf8) else {\n      \
  \  print(\"Game Center Manager 的 dataString 无法转换为 Data。\")\n        return\n   \
  \ }\n    var sendError: Error?\n    if let session = matchOrSession as? MCSession,\
  \ let peerIDs = peers as? [MCPeerID] {\n        let mode: MCSessionSendDataMode\
  \ = reliable ? .reliable : .unreliable\n        do {\n            try session.send(dataToSend,\
  \ toPeers: peerIDs, with: mode)\n        } catch {\n            sendError = error\n\
  \        }\n    } else if let match = matchOrSession as? GKMatch, let players =\
  \ peers as? [GKPlayer] {\n        let mode: GKMatch.SendDataMode = reliable ? .reliable\
  \ : .unreliable\n        do {\n            try match.send(dataToSend, to: players,\
  \ dataMode: mode)\n        } catch {\n            sendError = error\n        }\n\
  \    } else {\n        print(\"Game Center Manager 的 matchOrSession 既不是 GKMatch\
  \ 也不是 GKSession，或者 peers 不是正确的数组类型，我们无法发送数据。\")\n    }\n    if let sendError = sendError\
  \ {\n        print(\"发送数据时发生错误：\\(sendError.localizedDescription)\")\n    }\n}\n\
  ```\n\n此方法与向所有节点发送数据的方法非常相似。主要区别在于我们使用了一个新的 API 调用，并传入了一个节点 ID 或玩家的数组。当然，你可以修改这些方法，使其在发送数据时接受字符串以外的内容，但为了我们测试游戏的简便性，仅用字符串就足够了。\n\
  \n以上内容包含了你在两个或更多 iOS、Mac 或 Apple TV 设备之间发送数据所需了解的全部知识。在下一节中，我们将探讨如何接收并解析从另一个节点获取的数据。\n\
  \n\n\n### 接收数据\n\n`GKMatch` 拥有自己的系统，用于接收传入数据的委托回调。Game Center 沿用了我们在第 5 章中用于邀请处理程序的同一个委托。我们将从修改该现有函数开始。\n\
  \n设置我们的 App 以接收数据的第一步是，将接收数据委托设置给我们的 `GameCenterManager` 类。我们将使用 `GameCenterManager`\
  \ 类作为过滤点，将数据传回游戏。虽然你可以直接在游戏控制器中接收数据，但如果我们将所有数据都通过 `GameCenterManager` 进行管道传输，那么将来将这个类接入其他\
  \ App 会容易得多。\n\n修改 `UFOViewController.swift` 中的 `matchmakerViewController` 函数，使其与以下内容一致：\n\
  \n```\nfunc matchmakerViewController(_ viewController: GKMatchmakerViewController,\
  \ didFind match: GKMatch) {\n    dismiss(animated: true, completion: nil)\n    gcManager?.matchOrSession\
  \ = .match(match)\n    let gameVC = UFOGameViewController()\n    gameVC.gcManager\
  \ = gcManager\n    gameVC.gameIsMultiplayer = true\n    gameVC.peerMatch = match\n\
  \    navigationController?.pushViewController(gameVC, animated: true)\n}\n```\n\n\
  上述函数中需要重点关注的改动是，将处理传入数据请求的委托设置为我们的 `GameCenterManager` 类。这使我们能够在一个集中的位置处理所有传入的数据；然后从那里，我们可以将数据转发到\
  \ App 的相关部分。\n\n接下来，你需要将以下函数添加到你的 `GameCenterManager` 类中。这个新函数用于处理来自 Game Center\
  \ 的传入数据。该函数假设我们只处理传入的字符串，因为这是我们在处理游戏内发送数据时选择的设计方案。你可以轻松地调整此方法来处理其他类型的对象。此外，我们将扩展这个新函数以处理游戏特定数据。你还可以进一步调整此设置，使用更复杂、更智能的数据解析系统，但对于\
  \ UFO 游戏的需求来说，当前方案已经绰绰有余。\n\n```\nfunc receivedData(_ dataDictionary: [AnyHashable\
  \ : Any]?) {\n    guard let dataDictionary = dataDictionary as? [String: String]\
  \ else { return }\n}\n```\n\n**提示：** 你可以使用 `context` 属性将任意数据传递给 `received` 委托方法。\n\
  \n进一步修改 `receivedData` 函数，以处理游戏中可能出现的所有数据类型：\n\n```\nfunc receivedData(_ dataDictionary:\
  \ [AnyHashable : Any]?) {\n    guard let dataDictionary = dataDictionary as? [String:\
  \ String] else { return }\n    determineHost(dataDictionary)\n}\n```\n\n现在剩下的就是实现我们的函数，以确定哪个玩家是主机；添加一个新的函数，如下面的代码片段所示：\n\
  \n```\nfunc determineHost(_ dataDictionary: [String : String]?) {\n    if Double(dataString\
  \ ?? \"\") ?? 0.0 == randomHostNumber {\n        print(\"主机编号相同，需要重新生成\")\n    \
  \    generateAndSendHostNumber()\n    } else if Double(dataString ?? \"\") ?? 0.0\
  \ > randomHostNumber {\n        isHost = true\n        for _ in 0..<5 {\n      \
  \      spawnCow()\n        }\n        updateCowPaths()\n    } else if Double(dataString\
  \ ?? \"\") ?? 0.0 < randomHostNumber {\n        isHost = false\n    }\n}\n```\n\n\
  如果你现在在两个设备上运行游戏，你可以看到每个日志都反映了该设备是否被指定为主机，或者另一台设备是否为主机。不过，`receivedData` 函数存在很大缺陷，因为它只处理主机数据消息。在下一节中，我们将完善这个函数，使其不仅能接受主机消息，还能接受玩家移动、奶牛移动和其他游戏操作等输入。\n\
  \n现在，你已经掌握了在两个不同的 iOS、Mac 或 Apple TV 设备之间发送数据，以及接收、解析这些数据并让系统做出反应的所有基本技能。如果你想在实际操作中尝试这些调用，下一节将引导你在我们的\
  \ UFO 游戏中完成几个发送和接收数据的示例。\n\n## 整合所有内容\n\n在上一节中，我们学习了如何接收发送到设备的数据。在本节中，我们将演练如何将接收到的数据实际用于我们的游戏。我们将添加第二个玩家，允许通过网络发送移动信息，同步两台设备之间的状态数据（例如奶牛移动），追踪每个玩家的得分，并完成与我们特定游戏相关的各种其他必要的后台任务。\n\
  \n### 选择主机\n\n让我们从改进上一节实现的主机选择逻辑开始。现在，我们接收到的任何数据都被假定为主机编号。由于我们接收到的大部分数据并不是主机编号，我们需要找到一种方法来过滤这些数据，以便能够解析它们。修改\
  \ `generateAndSendHostNumber` 函数，使其与以下代码块一致：\n\n```\nfunc generateAndSendHostNumber()\
  \ {\n    randomHostNumber = Double(arc4random())\n    let randomNumberString = \"\
  $Host:\\(randomHostNumber)\"\n    gcManager?.sendStringToAllPeers(randomNumberString,\
  \ reliable: true)\n}\n```\n\n如你所见，我们现在在将要发送的消息中添加了一个标识符前缀。在本示例中，我选择了 `$Host:` 作为前缀，但你可以使用任何你想要的系统。此外，我们需要修改\
  \ `receivedData` 回调以支持新的格式。\n\n```\nfunc receivedData(_ dataDictionary: [AnyHashable\
  \ : Any]?) {\n    guard let dataDictionary = dataDictionary as? [String: String]\
  \ else { return }\n    if dataDictionary[\"data\"]?.hasPrefix(\"$Host:\") ?? false\
  \ {\n        determineHost(dataDictionary)\n    } else {\n        print(\"无法确定消息类型：\\\
  (dataDictionary)\")\n    }\n}\n```\n\n如果我们确定该消息是一条主机消息，我们会将其发送给一个名为 `determineHost`\
  \ 的新辅助函数，以确定哪个设备是主机。如果我们无法确定消息类型，则会在控制台打印一条警告消息，这将有助于我们后续的调试。我们需要将 `receivedData`\
  \ 中的旧代码移动到 `determineHost` 中。除了移动代码外，我们还需要去掉前缀。虽然去除前缀有一定开销，但这是完成此任务最简单的方法。在更复杂的应用程序中，你可能需要设计一个更健壮的消息系统。\n\
  \n```\nfunc determineHost(_ dataDictionary: [String : String]?) {\n    let dataString\
  \ = dataDictionary?[\"data\"]?.replacingOccurrences(of: \"$Host:\", with: \"\")\n\
  \    if Double(dataString ?? \"\") ?? 0.0 == randomHostNumber {\n        print(\"\
  主机编号相同，需要重新生成\")\n        generateAndSendHostNumber()\n    } else if Double(dataString\
  \ ?? \"\") ?? 0.0 > randomHostNumber {\n        isHost = true\n    } else if Double(dataString\
  \ ?? \"\") ?? 0.0 < randomHostNumber {\n        isHost = false\n    }\n}\n```\n\n\
  现在我们仍然可以确定谁是主机，但我们已经打开了大门，能够处理更多类型的数据，而不仅仅是这一种。\n\n下一步是在我们的游戏中传输并显示对手的 UFO。在本章中，我向项目添加了两个新图片：`EnemySaucer1.png`\
  \ 和 `EnemySaucer2.png`。它们的形状与原始图片相同，但使用了不同的配色方案。我们将使用这些新素材来显示对手的飞船。\n\n\n\n### 显示敌方\
  \ UFO\n\n我们首先需要检测当前是否为多人游戏，如果是，则需在 `UFOGameViewController` 的 `viewDidLoad` 函数中绘制敌方\
  \ UFO。你会注意到，这段代码与我们在单人模式下绘制玩家的代码完全相同，唯一的区别是使用了不同的图形资源。\n\n```\noverride func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    if gameIsMultiplayer {\n        let otherPlayerFrame\
  \ = CGRect(x: 100, y: 70, width: 80, height: 34)\n        otherPlayerImageView =\
  \ UIImageView(frame: otherPlayerFrame)\n        otherPlayerImageView?.animationDuration\
  \ = 0.75\n        otherPlayerImageView?.animationRepeatCount = 99999\n        let\
  \ imageArray = [UIImage(named: \"EnemySaucer1.png\"), UIImage(named: \"EnemySaucer2.png\"\
  )]\n        otherPlayerImageView?.animationImages = imageArray.compactMap { $0 }\n\
  \        otherPlayerImageView?.startAnimating()\n        if let otherPlayerImageView\
  \ = otherPlayerImageView {\n            view.addSubview(otherPlayerImageView)\n\
  \        }\n    }\n}\n```\n\n如果我们在两台设备上运行游戏并开始一局新的多人游戏，我们就会看到一个红色的敌方 UFO 静止在天空中。下一步，我们需要将移动数据发送给同伴，以便他们能够更新敌方玩家的位置。为此，我们在\
  \ `movePlayer` 函数的末尾添加一段新代码。\n\n```\nfunc movePlayer(_ vertical: double, _ horizontal:\
  \ double) {\n    //...\n    if gameIsMultiplayer {\n        let positionString =\
  \ \"$PlayerPosition: \\(playerFrame?.origin.x ?? 0.0) \\(playerFrame?.origin.y ??\
  \ 0.0)\"\n        gcManager?.sendStringToAllPeers(positionString, reliable: false)\n\
  \    }\n}\n```\n\n在这里，每次移动时都会将玩家坐标发送给同伴。我们选择以不可靠方式发送数据，因为即使发送失败，我们也可以使用下一个数据包。回想一下第\
  \ 7 章的内容，这是发送完整数据而非增量移动数据的好处之一。当玩家移动时，数据会持续更新。\n\n如第 7 章所述，这里非常适合使用预测技术，但为简单起见，我们将逐帧进行同步。此外，将\
  \ x 和 y 坐标发送到另一台设备有更好的方法，例如使用字典或自定义数据格式。然而，将它们编码为字符串是最容易理解的方式。随着游戏或应用的开发，你可以设计此类函数使其更精简、开销更小。\n\
  \n> **提示**\n> \n> 使用 `stringWithFormat` 会产生大量开销。在实践中，应使用 `stringByAppendingString`\
  \ 等方法进一步优化此类代码。\n\n我们还需要更新 `receivedData` 函数，以处理即将接收的新数据类型。请按如下方式修改该函数。此外，我们添加一个新函数来解析传入的数据，同时新增一个名为\
  \ `drawEnemyShipWithData` 的函数，具体如下：\n\n```\nfunc receivedData(_ dataDictionary:\
  \ [AnyHashable : Any]?) {\n    guard let dataDictionary = dataDictionary as? [String:\
  \ String] else { return }\n    if dataDictionary[\"data\"]?.hasPrefix(\"$Host:\"\
  ) ?? false {\n        determineHost(dataDictionary)\n    } else if dataDictionary[\"\
  data\"]?.hasPrefix(\"$PlayerPosition:\") ?? false {\n        drawEnemyShip(withData:\
  \ dataDictionary)\n    } else {\n        print(\"无法确定消息类型：\\(dataDictionary)\")\n\
  \    }\n}\n\nfunc drawEnemyShip(withData dataDictionary: [String : String]?) {\n\
  \    let dataArray = dataDictionary?[\"data\"]?.components(separatedBy: \" \")\n\
  \    let x = Double(dataArray?[1] ?? \"\") ?? 0.0\n    let y = Double(dataArray?[2]\
  \ ?? \"\") ?? 0.0\n    otherPlayerImageView?.frame = CGRect(x: CGFloat(x), y: CGFloat(y),\
  \ width: 80, height: 34)\n}\n```\n\n该函数解析来自网络的传入数据。我们从接收到的字符串中提取 x 和 y 坐标，并用新位置更新敌方玩家的显示区域。这种逐帧同步两台设备的方法效率非常低下。如果有更多时间，应更新此函数，使用预测技术来判断玩家的移动方向，并且仅在玩家偏离预测时更新数据。不过，对于本演示而言，它已经满足需求。关于预测网络技术的更多信息，请参阅第\
  \ 7 章。\n\n如果现在运行游戏并开始一局新的多人游戏，你会看到每台设备都会反映其配对设备的移动情况。我们还需要生成奶牛、添加牵引光束并更新分数，但我们已经拥有一个功能完备（虽然目前略显单调）的多人游戏，如图\
  \ 7-1 所示。\n\n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig1_HTML.jpg](img/216283_2_En_7_Fig1_HTML.jpg)\n\
  \n*图 7-1. 在 UFO 游戏中添加第二名玩家。每个玩家可独立移动，并通过网络保持同步。*\n\n\n\n### 生成奶牛\n\n为了让奶牛的运动在不同设备间同步，我们需要指定一台设备来处理奶牛的生成和移动路径。我们已经选定了主机设备，因此将由主机决定奶牛放置的位置。首先修改\
  \ `determineHost` 函数。如下代码所示，如果我们是主机，就开始执行正常的奶牛生成流程：\n\n```\nfunc determineHost(_\
  \ dataDictionary: [String : String]?) {\n    let dataString = dataDictionary?[\"\
  data\"]?.replacingOccurrences(of: \"$Host:\", with: \"\")\n    if Double(dataString\
  \ ?? \"\") ?? 0.0 == randomHostNumber {\n        print(\"主机数字相同，需要重新生成\")\n    \
  \    generateAndSendHostNumber()\n    } else if Double(dataString ?? \"\") ?? 0.0\
  \ > randomHostNumber {\n        isHost = true\n        for _ in 0..<5 {\n      \
  \      spawnCow()\n        }\n        updateCowPaths()\n    } else if Double(dataString\
  \ ?? \"\") ?? 0.0 < randomHostNumber {\n        isHost = false\n    }\n}\n```\n\n\
  我们还需要修改 `spawnCow` 函数以支持新的网络行为。这里所做的只是判断当前是否为网络游戏以及我们是否为主机，然后将数据发送给网络处理器。\n\n```\n\
  func spawnCow() {\n    let x = Int(arc4random() % 480)\n    let cowImageView = UIImageView(frame:\
  \ CGRect(x: CGFloat(x), y: 260, width: 64, height: 42))\n    cowImageView.image\
  \ = UIImage(named: \"Cow1.png\")\n    view.addSubview(cowImageView)\n    cowArray?.append(cowImageView)\n\
  \    if isHost && gameIsMultiplayer {\n        gcManager?.sendStringToAllPeers(String(format:\
  \ \"$spawnCow:%i\", x), reliable: true)\n    }\n}\n```\n\n修改 `receivedData` 函数以支持新的\
  \ `$spawnCow` 消息类型。我们还需要从消息中提取 X 轴起点坐标，并将其传递给一个用于处理通过网络生成奶牛的新方法。接下来展示了这两个功能：\n\n\
  ```\nelse if dataDictionary[\"data\"]?.hasPrefix(\"$spawnCow:\") ?? false {\n  \
  \  let x = Int(dataDictionary[\"data\"]?.replacingOccurrences(of: \"$spawnCow:\"\
  , with: \"\") ?? \"\") ?? 0\n    spawnCow(fromNetwork: x)\n}\n```\n\n**提示**  \n\
  主机无需传递奶牛的 Y 轴坐标，因为它们始终在相同的 Y 轴上生成。如果你能从数据包中删除不必要的数据，总是有益的，因为这类无关数据会不断累积。\n\n如果现在运行游戏，你会看到两台设备都在完全相同的位置生成了奶牛，但只有主机设备能驱动奶牛移动的动画。\n\
  \n下一步是添加共享奶牛动画控制的逻辑。修改现有的 `updateCowPaths` 方法，使其发送我们要更新的 `newX` 坐标和数组位置。以下新代码应添加到\
  \ `for` 循环的末尾：\n\n```\nif gameIsMultiplayer {\n    let dataString = String(format:\
  \ \"$cowMove:%i:%f\", x, newX)\n    gcManager?.sendStringToAllPeers(dataString,\
  \ reliable: true)\n}\n```\n\n**注意**  \n由于我们将生成奶牛的数据调用设置为可靠模式，因此可以保证数据按发送顺序接收。这意味着我们可以确保两台设备上的\
  \ `cowArray` 中的对象顺序相同。\n\n我们还需要在 `receivedData` 函数中添加一个新的数据处理程序。将整个字典传递给新的 `updateCowPathsFromNetwork`\
  \ 函数。\n\n```\nelse if dataDictionary[\"data\"]?.hasPrefix(\"$cowMove:\") ?? false\
  \ {\n    updateCowPaths(fromNetwork: dataDictionary)\n}\n\nfunc updateCowPaths(fromNetwork\
  \ dataDictionary: [String : String]?) {\n    let dataArray = dataDictionary?[\"\
  data\"]?.components(separatedBy: \":\")\n    let placeInArray = Int(dataArray?[1]\
  \ ?? \"\") ?? 0\n    let tempCow = cowArray?[placeInArray] as? UIImageView\n   \
  \ let currentX = Double(tempCow?.frame.origin.x ?? 0.0)\n    let newX = Double(Int(dataArray?[2]\
  \ ?? \"\") ?? 0)\n    if tempCow != currentAbductee {\n        UIView.animate(\n\
  \            withDuration: 3.0,\n            delay: 0,\n            options: [.curveLinear],\n\
  \            animations: {\n                tempCow?.frame = CGRect(x: CGFloat(newX),\
  \ y: 260, width: 64, height: 42)\n            }\n        )\n    }\n    tempCow?.animationDuration\
  \ = 0.75\n    tempCow?.animationRepeatCount = 99999\n    //翻转奶牛\n    if newX < currentX\
  \ {\n        let flippedCowImageArray = [UIImage(named: \"Cow1Reversed.png\"), UIImage(named:\
  \ \"Cow2Reversed.png\"), UIImage(named: \"Cow3Reversed.png\")]\n        tempCow?.animationImages\
  \ = flippedCowImageArray.compactMap { $0 }\n    } else {\n        let cowImageArray\
  \ = [UIImage(named: \"Cow1.png\"), UIImage(named: \"Cow2.png\"), UIImage(named:\
  \ \"Cow3.png\")]\n        tempCow?.animationImages = cowImageArray.compactMap {\
  \ $0 }\n    }\n    tempCow?.startAnimating()\n}\n```\n\n这个函数与我们现有的更新奶牛路径函数非常相似。两个区别在于：我们从网络获取数组中的位置，并且不随机生成\
  \ `newX` 坐标。如果再次运行游戏，你会看到两边的奶牛现在彼此同步。当一头奶牛改变位置时，两台设备上的变化完全一致。图 7-2 展示了游戏的当前状态。\n\
  \n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig2_HTML.jpg](img/216283_2_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2** – 在两台 iOS 设备之间通过网络同步奶牛运动\n\n现在每位玩家都可以劫持奶牛并增加自己的分数。然而，仍然有两个问题需要解决。第一个是设备间没有共享分数，第二个是我们没有显示其他玩家的牵引光束，也没有在劫持过程中将奶牛动画化地移入\
  \ UFO。我们先从添加分数支持开始。\n\n### 共享分数\n\n当分数增加时，我们将这些数据发送给同伴。在 `finishAbducting` 函数中，在分数增加之后立即添加以下代码片段：\n\
  \n```\nif gameIsMultiplayer {\n    gcManager?.sendStringToAllPeers(\"$score:\\(score)\"\
  , reliable: true)\n}\n```\n\n我们再次需要修改 `receivedData` 方法以支持新的 `$score` 消息。我选择在 `receivedData`\
  \ 方法中增加敌方分数。当然，你也可以编写一个新方法来实现此功能。此外，我们需要为敌方分数添加一个新标签。它将放置在本地玩家分数的正下方。图 7-3 展示了分数显示效果。\n\
  \n```\nelse if dataDictionary[\"data\"]?.hasPrefix(\"$score:\") ?? false {\n   \
  \ let enemyScore = Float(dataDictionary[\"data\"]?.replacingOccurrences(of: \"$score:\"\
  , with: \"\") ?? \"\") ?? 0.0\n    enemeyScoreLabel.text = String(format: \"ENEMY\
  \ %05.0f\", enemyScore)\n}\n```\n\n**提示**  \n从技术上讲，你无需在网络调用中传递分数值，因为分数总是每次增加 1；我们可以假设收到新的分数消息就意味着将数值加\
  \ 1。\n\n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig3_HTML.jpg](img/216283_2_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3** – 为网络玩家添加分数\n\n**练习**  \n当任何一名玩家得分达到十分时，添加逻辑来宣布游戏获胜者会非常容易。尝试自己将这一逻辑添加到游戏中。\n\
  \n\n\n### 添加网络劫持代码\n\n最后需要处理的是为劫持代码提供网络支持。我们需要在奶牛被劫持时正确地移除和重生它们，同时显示敌方 UFO 使用牵引光束并将奶牛移入飞船的动画。\n\
  \n让我们从在每个设备上显示和隐藏牵引光束开始。由于用户每次触摸屏幕时都会启动牵引光束，并在松开触摸时结束它，我们可以从这里入手。这里没有需要传输的值值；我们唯一需要注意的就是启动和停止动画本身。修改`touchesBegan`和`touchesEnd`方法，向对等设备发送消息。修改后的方法如下所示：\n\
  \n```\noverride func touchesBegan(_ touches: Set, with event: UIEvent?) {\n    currentAbductee\
  \ = nil\n    tractorBeamOn = true\n    if gameIsMultiplayer {\n        gcManager?.sendStringToAllPeers(\"\
  $beginTractorBeam\", reliable: true)\n    }\n    tractorBeamImageView?.frame = CGRect(x:\
  \ (myPlayerImageView?.frame.origin.x ?? 0.0) + 25, y: (myPlayerImageView?.frame.origin.y\
  \ ?? 0.0) + 10, width: 28, height: 318)\n    tractorBeamImageView?.animationDuration\
  \ = 0.5\n    tractorBeamImageView?.animationRepeatCount = 99999\n    let imageArray\
  \ = [UIImage(named: \"Tractor1.png\"), UIImage(named: \"Tractor2.png\")]\n    tractorBeamImageView?.animationImages\
  \ = imageArray.compactMap { $0 }\n    tractorBeamImageView?.startAnimating()\n \
  \   if let tractorBeamImageView = tractorBeamImageView {\n        view.insertSubview(tractorBeamImageView,\
  \ at: 4)\n    }\n    let cowImageView = hitTest()\n    if let cowImageView = cowImageView\
  \ {\n        currentAbductee = cowImageView\n        abductCow(cowImageView)\n \
  \   }\n}\n\noverride func touchesEnded(_ touches: Set, with event: UIEvent?) {\n\
  \    tractorBeamOn = false\n    if gameIsMultiplayer {\n        gcManager?.sendStringToAllPeers(\"\
  $endTractorBeam\", reliable: true)\n    }\n    tractorBeamImageView?.removeFromSuperview()\n\
  \    if let currentAbductee = currentAbductee {\n        UIView.animate(\n     \
  \       withDuration: 1.0,\n            delay: 0,\n            options: [.curveEaseIn,\
  \ .beginFromCurrentState],\n            animations: {\n                var frame\
  \ = currentAbductee.frame\n                frame.origin.y = 260\n              \
  \  frame.origin.x = (self.myPlayerImageView?.frame.origin.x ?? 0.0) + 15\n     \
  \           currentAbductee.frame = frame\n            }\n        )\n    }\n   \
  \ currentAbductee = nil\n}\n```\n\n如您所见，我们只是检查确保这是一个网络游戏，然后传递消息来开始或结束牵引光束。接下来，我们在`receivedData`函数中添加一个处理程序，用于调用两个新方法，这些方法将在对等设备上显示并动画化牵引光束。这两个函数是对我们当前牵引光束动画方法的修改，为方便参考，如下所示：\n\
  \n```\nfunc beginTractorFromNetwork() {\n    otherPlayerTractorBeamImageView?.frame\
  \ = CGRect(x: (otherPlayerImageView?.frame.origin.x ?? 0.0) + 25, y: (otherPlayerImageView?.frame.origin.y\
  \ ?? 0.0) + 10, width: 28, height: 318)\n    otherPlayerTractorBeamImageView?.animationDuration\
  \ = 0.5\n    otherPlayerTractorBeamImageView?.animationRepeatCount = 99999\n   \
  \ let imageArray = [UIImage(named: \"Tractor1.png\"), UIImage(named: \"Tractor2.png\"\
  )]\n    otherPlayerTractorBeamImageView?.animationImages = imageArray.compactMap\
  \ { $0 }\n    otherPlayerTractorBeamImageView?.startAnimating()\n    if let otherPlayerTractorBeamImageView\
  \ = otherPlayerTractorBeamImageView {\n        view.insertSubview(otherPlayerTractorBeamImageView,\
  \ at: 4)\n    }\n}\n\nfunc endTractorFromNetwork() {\n    otherPlayerTractorBeamImageView?.removeFromSuperview()\n\
  }\n```\n\n如果现在运行游戏，您会看到当每个用户触摸屏幕时，牵引光束会出现在两个设备上。我们无需担心在牵引光束开启时锁定 UFO 的移动，因为这在单人游戏中已经处理好了，并且只有在单人模式允许的情况下，移动才会传输到另一台设备。接下来，我们需要添加额外代码来处理碰撞检测，因此修改`hitTest`函数，如下所示：\n\
  \n```\nfunc hitTest() -> UIImageView? {\n    if !tractorBeamOn {\n        return\
  \ nil\n    }\n    for x in 0..<(cowArray?.count ?? 0) {\n        let tempCow = cowArray?[x]\
  \ as? UIImageView\n        let cowLayer = tempCow?.layer.presentation()\n      \
  \  let cowFrame = cowLayer?.frame\n        if cowFrame?.intersects(tractorBeamImageView?.frame\
  \ ?? CGRect.zero) ?? false {\n            tempCow?.frame = cowLayer?.frame ?? CGRect.zero\n\
  \            tempCow?.layer.removeAllAnimations()\n            if gameIsMultiplayer\
  \ {\n                gcManager?.sendStringToAllPeers(String(format: \"$abductCowAtIndex:%i\"\
  , x), reliable: true)\n            }\n            return tempCow\n        }\n  \
  \  }\n    return nil\n}\n```\n\n这里我们使用了之前填充奶牛数组时用到的相同技巧。由于我们可靠地发送了数据以将对象放入数组，我们知道数组顺序始终保持一致。由于知道了数组的顺序，我们可以传递要修改的奶牛的索引。除了发送数据外，我们还需要编写一个新的`if`语句来捕获此消息，如下所示。您可以看到这个方法的设置很像分数方法，我们从中提取感兴趣的值并调用一个新的方法来使用它：\n\
  \n```\nelse if dataDictionary[\"data\"]?.hasPrefix(\"$abductCowAtIndex:\") ?? false\
  \ {\n    let index = Int(dataDictionary[\"data\"]?.replacingOccurrences(of: \"$abductCowAtIndex:\"\
  , with: \"\") ?? \"\") ?? 0\n    abductCowFromNetwork(at: index)\n}\n```\n\n以下两个函数处理通过网络接收到的劫持动画。它们与我们用于在单人模式下动画化劫持的函数非常相似。您甚至可以通过使用一个标志来指示它们来自远程设备，从而修改现有函数以处理网络行为。\n\
  \n```\nfunc abductCowFromNetwork(at x: Int) {\n    otherPlayerCurrentAbductee =\
  \ cowArray?[x] as? UIImageView\n    //otherPlayerCurrentAbductee?.frame = otherPlayerCurrentAbductee?.frame\
  \    // 跳过冗余的自身初始化\n    otherPlayerCurrentAbductee?.layer.removeAllAnimations()\n\
  \    UIView.animate(\n        withDuration: 4.0,\n        delay: 0,\n        options:\
  \ [.curveEaseIn, .beginFromCurrentState],\n        animations: {\n            var\
  \ frame = self.otherPlayerCurrentAbductee?.frame\n            frame?.origin.y =\
  \ self.otherPlayerImageView?.frame.origin.y ?? 0.0\n            self.otherPlayerCurrentAbductee?.frame\
  \ = frame ?? CGRect.zero\n        },\n        completion: finishAbductingFromNetwork\n\
  \    )\n}\n\nfunc finishAbductingFromNetwork(_ finished: Bool) {\n    cowArray =\
  \ cowArray?.filter({ ($0) as AnyObject !== (otherPlayerCurrentAbductee) as AnyObject\
  \ })\n    endTractorFromNetwork()\n    otherPlayerCurrentAbductee?.layer.removeAllAnimations()\n\
  \    otherPlayerCurrentAbductee?.removeFromSuperview()\n    otherPlayerCurrentAbductee\
  \ = nil\n    if isHost {\n        spawnCow()\n    }\n}\n```\n\n我们还需要做一些额外的工作以确保不会引入新的错误。例如，我们添加一个新的指针来追踪敌人当前正在劫持的奶牛（如果有的话）。如果您还记得，在`updateCowPaths`方法中，我们不想更新正在被劫持的奶牛的路径，因为这会破坏用于劫持的动画。我们需要修改该方法，使其也忽略敌人可能正在劫持的任何奶牛。如果您再次运行游戏，您现在会注意到我们拥有一个功能完整的多人游戏，如图\
  \ 7-4 所示。\n\n![../images/216283_2_En_7_Chapter/216283_2_En_7_Fig4_HTML.jpg](img/216283_2_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4** 一个功能完整的多人 UFO 游戏，两人通过蓝牙连接进行游戏\n\n\n\n## 断线处理\n\n在处理多人游戏支持时，最后一步需要添加逻辑来处理断线及其他不可恢复的故障。幸运的是，Apple\
  \ 的 API 已帮我们完成了大部分繁重工作。但我们仍希望在 `GameCenterManager` 类中添加一个更通用的调用来简化操作。\n\n```\nfunc\
  \ disconnect() {\n    switch matchOrSession {\n    case .match(let match):\n   \
  \     match.disconnect()\n    case .session(let session):\n        session.disconnect()\n\
  \    case .none:\n        break\n    }\n}\n```\n\n当你希望结束一场多人游戏时，应调用此方法。它将确保对等方安全断开连接，并避免许多难以排查的问题。\n\
  \n### 本章小结\n\n在本章中，我们以高度浓缩的方式涵盖了大量信息。你学习了如何利用 Game Center 网络在多个 iOS、Mac 或 Apple\
  \ TV 设备之间发送和接收数据。此外，你还掌握了如何处理网络状态变化（例如断线）。我们将本章所学原理应用于 UFO 游戏，在不到七章的篇幅内从零构建了一款多人\
  \ iOS 游戏。下一章，我们将探索 Game Center 的回合制游戏 API，其运作方式与实时游戏截然不同，因此需要构建全新的示例项目和游戏。\n\n"
- "# 8. 使用 Game Center 实现回合制游戏\n\n在 Game Center 首次发布后不久，Apple 便对该框架进行了更新，除了你从前几章熟悉的实时游戏功能外，还增加了回合制游戏支持。借助回合制游戏，你现在可以为用户提供异步游戏体验。回合制游戏泛指所有玩家轮流上场的游戏，典型示例包括井字棋、国际象棋、海战棋以及龙与地下城。\n\
  \n在过去几年中，iOS、Mac 和 Apple TV 上的回合制游戏变得非常流行，其开端可以说源于超级热门游戏《与朋友拼词》。《与朋友拼词》（如图 8-1 所示）是一款类似\
  \ Scrabble 的异步文字游戏。每位玩家会收到一组字母，轮流在棋盘上拼出单词。根据单词的难度以及棋盘布局，系统会为玩家评分。传统上，回合制游戏采用存储转发式平台：服务器会保存游戏数据，直到下一位玩家登录并获取数据。异步游戏通常更偏向休闲风格，不要求所有玩家时刻在线——尽管某些游戏确实需要即时响应和操作。\n\
  \n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig1_HTML.jpg](img/216283_2_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1** Zynga 出品的《与朋友拼词》\n\n在回合制游戏推出之前，Game Center 仅提供实时游戏，要求所有参与设备在整个多人游戏过程中始终保持活动状态并持续登录。回合制游戏则带来了更轻松的体验，允许玩家同时运行多达\
  \ 20 场比赛，并且仅在轮到自己的回合时进行游戏。\n\n在这些改进之前，编写此类游戏需要你自行编写并部署服务器来处理游戏交互。而现在，你只需不到一天的时间就能完成回合制游戏的网络组件搭建并投入运行。在本章中，我们将探讨如何利用\
  \ Game Center 的回合制游戏 API 编写一个简单的井字棋游戏。\n\n## 新的示例项目\n\n遗憾的是，我们现有的 UFO 示例游戏并不适合测试回合制游戏。如果让每个玩家移动一步后就等待对方跟上，这显然不合理。幸运的是，我们还可以围绕另一种非常简单的游戏类型来构建项目：井字棋。这款经典的儿童游戏几乎所有人都玩过，我们对其规则和策略都已相当熟悉。\n\
  \n我们首先创建一个基于 storyboard 的新 iOS App 项目。在整个项目中，将涉及三个视图：\n\n* **主视图**：该视图仅包含一个按钮，用于启动我们将要创建的\
  \ `HomeViewController`。\n* **GKTurnBasedMatchmakerViewController**：这是 Apple 提供的视图，用于创建和恢复回合制游戏。你无需自行创建此视图。\n\
  * **GameViewController**：该类负责处理用户输入、判断胜负与平局，并在每回合开始时更新游戏棋盘。\n\n我们先从主视图开始处理。当你创建新项目时，这些文件会自动生成。首先需要做的是确保导入正确的\
  \ GameKit 框架，并添加本书一直在使用的可复用 `GameCenterManager` 类；你可以直接引入第 8 章中的现有版本。此外，我们还需要在视图中创建一个按钮，用于开始新游戏，如图\
  \ 8-2 所示。\n\n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig2_HTML.jpg](img/216283_2_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2** 新井字棋游戏的主视图\n\n新的主视图控制器类文件应与以下代码片段一致。我们需要遵循 `GameCenterManagerDelegate`\
  \ 和 `GKTurnBasedMatchmakerViewController` 协议。与之前章节类似，我们还需要创建一个 `GameCenterManager`\
  \ 的类实例。最后需要添加的是一个用于开始新游戏的 `IBAction`。请确保在 storyboard 中将“开始新游戏”按钮与 `IBAction` 连接起来。\n\
  \n我们还需要修改 `viewDidLoad` 函数，以检查并通过 Game Center 验证本地用户。这与我们在第 2 章中采用的方法相同。\n\n```\n\
  class HomeViewController: UIViewController {\n    var gcManager: GameCenterManager?\n\
  \    \n    override func viewDidLoad() {\n        super.viewDidLoad()\n        NotificationCenter.default.addObserver(\n\
  \            self,\n            selector: #selector(localUserAuthenticationChanged(_:)),\n\
  \            name: .GKPlayerAuthenticationDidChangeNotificationName,\n         \
  \   object: nil)\n        gcManager = GameCenterManager()\n        gcManager?.authenticateLocalUser(self)\n\
  \    }\n}\n```\n\n我们还需要实现一个委托函数来监控成功验证和本地用户变化。我们使用此函数输出一些调试信息。\n\n```\n@objc func\
  \ localUserAuthenticationChanged(_ notification: Notification?) {\n    if let object\
  \ = notification?.object {\n        print(\"Authentication Changed: \\(object)\"\
  )\n    }\n}\n```\n\n在下一节中，我们将了解如何调用 `GKTurnBasedMatchmakerViewController`，以及如何处理所需的委托函数，以便处理错误并恢复或创建新的比赛。\n\
  \n\n\n## GKTurnBasedMatchmakerViewController\n\nApple 提供了一个默认类，用于呈现创建新回合制比赛的图形界面。如需以编程方式创建比赛，请参阅后面的“程序化比赛”部分。\n\
  \n首先，我们在上一节创建的单个按钮的 IBAction 中操作一个新的比赛匹配对象。我们在此处使用的方法与 Game Center 的比赛匹配非常相似。请看以下示例代码。此函数与之前处理实时游戏和比赛匹配的示例非常相似，显著的变化是切换到了\
  \ `GKTurnBasedMatchmakerViewController` 和 `turnBasedMatchmakerDelegate`，而不是其实时对应的类。用户将看到一个类似于图\
  \ 8-3 所示的视图。\n\n```swift\n@IBAction func showMatchmaker() {\n    let match = GKMatchRequest()\n\
  \    match.minPlayers = 2\n    match.maxPlayers = 2\n    let turnMatchmakerVC =\
  \ GKTurnBasedMatchmakerViewController(matchRequest: match)\n    turnMatchmakerVC.turnBasedMatchmakerDelegate\
  \ = self\n    present(turnMatchmakerVC, animated: true)\n}\n```\n\n> **注意：** 与所有\
  \ Game Center 功能一样，必须先通过 Game Center 进行身份验证，然后才能创建新的回合制游戏比赛。\n\n您需要实现四个委托函数来遵循 `GKTurnBasedMatchmakerViewControllerDelegate`。第一个函数处理用户在比赛匹配器中取消操作。此处唯一的任务是调用游戏选择器模态视图的\
  \ `dismiss` 方法。您可以根据应用需要，添加额外的逻辑。\n\n```swift\nextension HomeViewController: GKTurnBasedMatchmakerViewControllerDelegate\
  \ {\n    func turnBasedMatchmakerViewControllerWasCancelled(_ viewController: GKTurnBasedMatchmakerViewController)\
  \ {\n        dismiss(animated: true)\n    }\n}\n```\n\n> **重要：** 当前游戏列表只有在您关闭并重新打开\
  \ `GKTurnBasedMatchmakerViewController` 后才会更新。\n\n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig3_HTML.jpg](img/216283_2_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3** – 开始新的回合制比赛\n\n我们还需要实现一个委托函数来捕获此阶段发生的任何错误。每当比赛匹配过程中遇到错误时，都会调用以下函数。为了调试，我们会在控制台打印错误信息；但您应该告知用户发生了错误。\n\
  \n```swift\nfunc turnBasedMatchmakerViewController(_ viewController: GKTurnBasedMatchmakerViewController,\
  \ didFailWithError error: Error) {\n    print(\"Turn Based Matchmaker Failed with\
  \ Error: \\(error.localizedDescription)\")\n}\n```\n\n我们在本节中讨论的最后一个委托函数处理用户在比赛匹配器界面退出比赛的情况。这是通过在游戏上从右向左滑动并选择退出选项来实现的。我们传入的逻辑是：退出的玩家将是比赛的失败方，而远程玩家将被标记为获胜者。如果您在此处没有调用正确的函数，您将能够退出游戏，但它会在几秒钟后重新出现。\n\
  \n```swift\nfunc turnBasedMatchmakerViewController(_ viewController: GKTurnBasedMatchmakerViewController,\
  \ playerQuitFor match: GKTurnBasedMatch) {\n    guard let localParticipant = match.participants.first(where:\
  \ { $0.player == GKLocalPlayer.local }),\n          let otherParticipant = match.participants.first(where:\
  \ { $0 != localParticipant }) else {\n        return\n    }\n    localParticipant.matchOutcome\
  \ = .quit\n    otherParticipant.matchOutcome = .won\n    match.endMatchInTurn(withMatch:\
  \ match.matchData ?? Data()) { error in\n        if let error = error {\n      \
  \      print(\"An error occurred ending match: \\(error.localizedDescription)\"\
  )\n        }\n    }\n}\n```\n\n最后一个必需的函数 `didFindMatch` 将在下一节“开始新游戏”中讨论。\n\n###\
  \ 建立游戏状态\n\n在我们真正深入新游戏之前，打好一些基础以使后续工作更轻松是非常重要的。我们要做的第一件事是设置游戏可能的状态。井字棋是一个非常简单的游戏，但仍然可能存在几种活跃状态；前两种状态适用于任何回合制游戏，涵盖了我们当前正在等待哪位玩家进行移动。以下三种状态涵盖了游戏结束的状态：本地玩家获胜、远程玩家获胜或平局：\n\
  \n```swift\nprivate enum GameStatus {\n    case waitingForLocalPlayer\n    case\
  \ waitingForOtherPlayer\n    case localPlayerWon\n    case otherPlayerWon\n    case\
  \ playersTied\n}\n```\n\n接下来需要完成的另一项基础工作是启用检测当前游戏状态的功能。我们需要确定游戏中的获胜组合，以便检测它们在游戏过程中是否出现。我们将使用一种暴力方法检查是否有获胜者，即检查所有行和列是否存在三个相同玩家的棋子。如果没有任何可移动的位置，我们还需要检查是否平局。\n\
  \n```swift\nprivate var currentGameStatus: GameStatus {\n    if let localParticipant\
  \ = localParticipant {\n        switch localParticipant.matchOutcome {\n       \
  \ case .none:\n            break\n        case .quit, .lost, .timeExpired:\n   \
  \         return .otherPlayerWon\n        case .won, .first, .second, .third, .fourth,\
  \ .customRange:\n            return .localPlayerWon\n        case .tied:\n     \
  \       return .playersTied\n        @unknown default:\n            print(\"Unknown\
  \ GKTurnBasedParticipant.matchOutcome received. Assuming game is in progress.\"\
  )\n        }\n    }\n    let winningCombinations = [\n        // 水平\n        [0,\
  \ 1, 2],\n        [3, 4, 5],\n        [6, 7, 8],\n        // 垂直\n        [0, 3,\
  \ 6],\n        [1, 4, 7],\n        [2, 5, 8],\n        // 对角线\n        [0, 4, 8],\n\
  \        [2, 4, 6],\n    ]\n    let winningCombination = winningCombinations.first\
  \ { combo in\n        let filledSquares: [Player] = combo.compactMap { gameBoard[$0]\
  \ }.filter { $0 != .none }\n        guard filledSquares.count == combo.count else\
  \ { return false }\n        let uniquePlayers = Set(filledSquares)\n        return\
  \ uniquePlayers.count == 1\n    }\n    guard let winningPlayerIndex = winningCombination?[0],\
  \ let winningPlayer = gameBoard[winningPlayerIndex] else {\n        guard gameBoard.count\
  \ != 9 else { return .playersTied }\n        return localPlayerIsCurrentParticipant\
  \ ? .waitingForLocalPlayer : .waitingForOtherPlayer\n    }\n    return winningPlayer\
  \ == localPlayer ? .localPlayerWon : .otherPlayerWon\n}\n```\n\n最后，我们需要设置一些函数来编码和存储游戏板的状态。这可以通过将按钮标签存储到\
  \ `JSONEncoder` 中来实现。这既便于安全地存储信息，也便于在游戏需要时轻松地进行网络传输。\n\n```swift\nprivate typealias\
  \ GameBoard = [Int: Player]\nprivate var gameBoard: GameBoard = [:] {\n    didSet\
  \ {\n        logGameBoard(\"didSet\")\n    }\n}\nprivate var gameBoardData: Data?\
  \ {\n    logGameBoard(\"Serializing\")\n    return try? JSONEncoder().encode(gameBoard)\n\
  }\nprivate func logGameBoard(_ label: String) {\n    print(([\"\\(label):\"] + gameBoard.map\
  \ { \"\\($0.key): \\($0.value.buttonTitle ?? \"\")\" }).joined(separator: \"\\n\"\
  ))\n}\nprivate var logError: (Error?) -> Void = { error in\n    guard let error\
  \ = error else { return }\n    print(\"An error occurred updating turn: \\(error.localizedDescription)\"\
  )\n}\n```\n\n\n\n### 开始新游戏\n\n以回合制方式开始新比赛是一个非常直接简单的过程。为此，您需要作为委托的一部分实现以下函数。这个新函数会关闭`GKTurnBasedMatchmakerViewController`，然后将比赛对象的副本传递给您的游戏控制器。以下代码片段是我们为井字棋游戏遵循的流程：\n\
  \n```\nfunc turnBasedMatchmakerViewController(_ viewController: GKTurnBasedMatchmakerViewController,\
  \ didFind match: GKTurnBasedMatch) {\n    performSegue(withIdentifier: \"PlayGame\"\
  , sender: match)\n    dismiss(animated: true)\n}\n```\n\n然后，我们在转场准备就绪时将比赛对象传递给目标控制器。\n\
  \n```\noverride func prepare(for segue: UIStoryboardSegue, sender: Any?) {\n   \
  \ guard\n        segue.identifier == \"PlayGame\",\n        let match = sender as?\
  \ GKTurnBasedMatch,\n        let game = segue.destination as? GameViewController\n\
  \    else { return }\n    game.match = match\n}\n```\n\n现在让我们将注意力转向`GameViewController`类。\n\
  \n**重要**\n\n每个新回合中您只能传递 **4k** 大小的数据。如果无法将游戏数据限制在 4k 以内，您可以使用指向持有完整数据集的服务器 URL。或者，您也可以仅传递游戏状态的增量，并将现有数据本地存储。\n\
  \n```\nclass GameViewController: UIViewController {\n    var match: GKTurnBasedMatch?\
  \ {\n        didSet {\n            loadMatchData()\n        }\n    }\n    @IBOutlet\
  \ private var buttons: [UIButton]!\n    @IBOutlet private var teamLabel: UILabel!\n\
  \    @IBOutlet private var statusLabel: UILabel!\n    @IBOutlet private var forfeitButton:\
  \ UIButton!\n    @IBAction private func makeMove(_ sender: UIButton) {\n    }\n\
  \    @IBAction func forfeitTapped() {\n    }\n}\n```\n\n我们首先需要配置实际的游戏视图（`GameViewController`）。在井字棋游戏中，我们需要九个位置供用户落子，以及一个认输选项和两个用于通知玩家轮到谁的标签。\n\
  \n我们使用简单的`UIButton`来处理用户输入。使用与图 8-4 所示类似的布局修改故事板。您需要为每个按钮和标签创建`IBOutlet`，并为落子和认输创建新的`IBAction`函数。将所有棋盘按钮连接到您之前创建的`makeMove`函数。我们还需要为`UIButton`设置标签以帮助定位。从左上角的标签\
  \ 1 开始，从左到右、从上到下进行编号。\n\n![../images/216283_2_En_8_Chapter/216283_2_En_8_Fig4_HTML.jpg](img/216283_2_En_8_Fig4_HTML.jpg)\n\
  \n*图 8-4 – 从故事板编辑器看到的游戏棋盘视图*\n\n现在您的游戏视图控制器中有了两个新函数，以及九个按钮出口和一个标签出口。这涵盖了如何开始新的回合制游戏比赛。在下一节中，我们将介绍如何落子并将控制权传递给下一位玩家。\n\
  \n### 进行第一步操作\n\n在基于回合的新游戏中，我们需要做的第一件事是确定玩家代表哪一方。在我们的示例游戏中，有两方：X 和 O。我们将设置第一位玩家始终代表\
  \ X，第二位始终代表 O。这意味着 X 将始终先手。通过这种设置，使用以下代码和便捷函数可以轻松确定当前玩家代表哪一方。\n\n前四段代码声明了私有变量，以便更轻松地获取本地玩家、远程玩家、当前玩家和下一位玩家。之后，为玩家创建了一个新的结构体，便于存储游戏进度的状态信息。最后，设置了一些额外的变量，以便轻松处理当前玩家和下一位玩家。\n\
  \n```\nprivate var localParticipant: GKTurnBasedParticipant? {\n    match?.participants.first{\
  \ $0.player == GKLocalPlayer.local }\n}\nprivate var otherParticipant: GKTurnBasedParticipant?\
  \ {\n    guard let localParticipant = localParticipant else { return nil }\n   \
  \ return match?.participants.first{ $0 != localParticipant }\n}\nprivate var localPlayerIsCurrentParticipant:\
  \ Bool {\n    guard let localParticipant = localParticipant else { return false\
  \ }\n    return match?.currentParticipant == localParticipant\n}\nprivate var nextParticipant:\
  \ GKTurnBasedParticipant? {\n    guard let localParticipant = localParticipant else\
  \ { return nil }\n    return localPlayerIsCurrentParticipant ? otherParticipant\
  \ : localParticipant\n}\nprivate enum Player: String, Codable {\n    case none\n\
  \    case x\n    case o\n    var title: String {\n        switch self {\n      \
  \  case .none: return \"unknown\"\n        case .x: return \"❌\"\n        case .o:\
  \ return \"⭕\"\n        }\n    }\n    var buttonTitle: String? {\n        switch\
  \ self {\n        case .none: return nil\n        case .x, .o: return title\n  \
  \      }\n    }\n}\nprivate var localPlayer: Player = .none\nprivate var otherPlayer:\
  \ Player {\n    switch localPlayer {\n    case .none: return .none\n    case .x:\
  \ return .o\n    case .o: return .x\n    }\n}\nprivate var currentPlayer: Player\
  \ {\n    if let currentParticipant = match?.currentParticipant, let firstParticipant\
  \ = match?.participants.first {\n        return currentParticipant == firstParticipant\
  \ ? .x : .o\n    }\n    return .none\n}\nprivate var nextPlayer: Player {\n    switch\
  \ currentPlayer {\n    case .x: return .o\n    case .o, .none: return .x\n    }\n\
  }\n```\n\n确定了用户身份后，我们就可以允许他们落子了。我们将修改与九个游戏按钮相连的操作代码。首先，让我们看看点击落子空格时会调用的函数。\n\n```\n\
  @IBAction private func makeMove(_ sender: UIButton) {\n    guard let index = buttons.firstIndex(of:\
  \ sender) else { return }\n    gameBoard[index] = localPlayer\n    sendMatchData()\n\
  }\n```\n\n接下来，调用`sendMatchData`函数，在该函数中判断当前游戏状态：是本地玩家完成落子结束回合、本地玩家获胜从而结束比赛、玩家平局从而结束比赛，还是正在等待远程玩家。\n\
  \n```\nprivate func sendMatchData() {\n    switch currentGameStatus {\n    case\
  \ .waitingForLocalPlayer:\n        endTurn()\n    case .localPlayerWon:\n      \
  \  endMatchInTurn(participantOutcome: .won, nextParticipantOutcome: .lost)\n   \
  \ case .playersTied:\n        endMatchInTurn(participantOutcome: .tied, nextParticipantOutcome:\
  \ .tied)\n    case .waitingForOtherPlayer, .otherPlayerWon:\n        break\n   \
  \ }\n}\n```\n\n如果游戏状态判定轮到下一位玩家，则调用`endTurn`。一旦为比赛设置了适当的变量，就会调用下一位玩家和当前棋盘数据`match.endTurn`，并更新视图。这将通知\
  \ Game Center 轮到远程玩家操作了。\n\n\n\n```swift\nprivate func endTurn() {\n    guard let\
  \ match = match, let nextParticipant = nextParticipant, let gameBoardData = gameBoardData\
  \ else { return }\n    match.endTurn(withNextParticipants: [nextParticipant], turnTimeout:\
  \ GKTurnTimeoutDefault, match: gameBoardData) { [weak self] error in\n        self?.logError(error)\n\
  \        self?.updateView()\n    }\n}\n```\n\n如果游戏以平局或胜利结束，则会调用 `endMatchInTurn`。根据游戏状态，将胜负结果（`win`\
  \ 或 `tie`）作为 `participantOutcome` 参数传入函数。该变量还有其他可选值，例如 `quit`（退出）、`lost`（失败）、`timeExpired`（超时）以及自定义值，这些值在我们的简易井字棋示例中未使用，但可能适用于你的游戏。\n\
  \n```swift\nprivate func endMatchInTurn(participantOutcome: GKTurnBasedMatch.Outcome,\
  \ nextParticipantOutcome: GKTurnBasedMatch.Outcome?) {\n    guard let match = match,\n\
  \          let currentParticipant = match.currentParticipant,\n          let nextParticipant\
  \ = nextParticipant,\n          let gameBoardData = gameBoardData else { return\
  \ }\n    currentParticipant.matchOutcome = participantOutcome\n    if let nextParticipantOutcome\
  \ = nextParticipantOutcome {\n        nextParticipant.matchOutcome = nextParticipantOutcome\n\
  \    }\n    match.endMatchInTurn(withMatch: gameBoardData) { [weak self] error in\n\
  \        self?.logError(error)\n        self?.loadMatchData()\n    }\n}\n```\n\n\
  > **注意：** 参与者数组的大小和顺序在比赛首次开始时确定，并在整个比赛过程中及每台设备上保持一致。\n\n> **提示：** 你可能会注意到参与者数组中存在空对象；这些是为未匹配玩家预留的位置。Game\
  \ Center 只会在轮到未匹配玩家行动时才会匹配新玩家。这意味着每次自动匹配完成后，都将轮到你进行操作。\n\n每次落子结束时要做的最后一件事，就是将新的游戏数据发送给下一位玩家。该玩家随后更新游戏状态，并将其发送给下一位玩家（恰好又轮到第一位玩家）。\n\
  \n### GKLocalPlayerListener 扩展\n\n我们将添加两个 `GKLocalPlayerListener` 扩展函数，用于监控回合事件的变化以及比赛的结束。这些扩展还能让我们在游戏进行过程中更新比赛数据。\n\
  \n```swift\nextension GameViewController: GKLocalPlayerListener {\n    func player(_\
  \ player: GKPlayer, receivedTurnEventFor match: GKTurnBasedMatch, didBecomeActive:\
  \ Bool) {\n        guard match.matchID == self.match?.matchID else { return }\n\
  \        self.match = match\n    }\n\n    func player(_ player: GKPlayer, matchEnded\
  \ match: GKTurnBasedMatch) {\n        guard match.matchID == self.match?.matchID\
  \ else { return }\n        self.match = match\n    }\n}\n```\n\n### 继续进行中的游戏\n\n\
  当你在下一轮恢复游戏时（假设不是比赛的第一轮），需要先将游戏状态恢复到当前进度。为此，我们首先修改 `viewDidLoad` 函数以获取当前比赛数据，然后调用\
  \ `updateView` 函数来设置当前的游戏棋盘。此过程的第一步是确定当前的游戏状态。除了其他事项外，我们还能在此判断游戏是否已结束；如果尚未结束，则判断当前轮到谁。我们还需要解析游戏棋盘数据，填入当前的\
  \ X 和 O，以匹配游戏历史记录。\n\n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n\
  \    GKLocalPlayer.local.register(self)\n    updateView()\n}\n\nprivate func updateView()\
  \ {\n    teamLabel.text = \"你正在扮演 \\(localPlayer.title)。\"\n    let statusText:\
  \ String\n    let forfeitButtonEnabled: Bool\n    switch currentGameStatus {\n \
  \   case .waitingForLocalPlayer:\n        statusText = \"该你走了。\"\n        forfeitButtonEnabled\
  \ = true\n    case .waitingForOtherPlayer:\n        statusText = \"轮到 \\(otherPlayer.title)\
  \ 了。\"\n        forfeitButtonEnabled = true\n    case .localPlayerWon:\n       \
  \ statusText = \"你赢了！\"\n        forfeitButtonEnabled = false\n    case .otherPlayerWon:\n\
  \        statusText = \"你输了。\"\n        forfeitButtonEnabled = false\n    case .playersTied:\n\
  \        statusText = \"平局。\"\n        forfeitButtonEnabled = false\n    }\n   \
  \ statusLabel.text = statusText\n    forfeitButton.isEnabled = forfeitButtonEnabled\n\
  \n    for index in 0..<9 {\n        let player = gameBoard[index] ?? .none\n   \
  \     let button = buttons[index]\n        button.setTitle(player.buttonTitle, for:\
  \ .normal)\n        button.isEnabled = localPlayerIsCurrentParticipant && player\
  \ == .none\n    }\n}\n\nprivate func loadMatchData() {\n    guard let match = match,\
  \ let firstMatchParticipant = match.participants.first else {\n        localPlayer\
  \ = .none\n        gameBoard = GameBoard()\n        updateView()\n        return\n\
  \    }\n    localPlayer = firstMatchParticipant.player == GKLocalPlayer.local ?\
  \ .x : .o\n    match.loadMatchData { (data, error) in\n        if let error = error\
  \ {\n            print(\"加载比赛数据时出错：\\(error.localizedDescription)\")\n         \
  \   return\n        }\n        if self.otherParticipant?.matchOutcome == .quit,\
  \ self.localParticipant?.matchOutcome != .won {\n            self.endMatchInTurn(participantOutcome:\
  \ .won, nextParticipantOutcome: nil)\n            return\n        }\n        guard\
  \ let data = data else { return }\n        do {\n            self.gameBoard = try\
  \ JSONDecoder().decode(GameBoard.self, from: data)\n        } catch {\n        \
  \    self.gameBoard = GameBoard()\n        }\n        self.updateView()\n    }\n\
  }\n```\n\n> **提示：** 如果你在本地持久化游戏状态，则只需更新自上次操作以来发生的回合变化。这种方法有助于你将数据包大小控制在 4k 限制以内。\n\
  \n完成上述代码后，你现在可以使用两个 Game Center 账号进行一局完整的井字棋游戏了；但是，游戏永远不会检测到胜者或平局。在下一节中，我们将探讨检测游戏结束所需的逻辑。\n\
  \n### 退出与投降\n\n玩家可以通过在匹配视图控制器中滑动来随时退出比赛。不过，你可能希望为用户提供从游戏内部投降或退出的途径。要允许玩家投降比赛，请使用以下代码片段。这样即使当前不是该玩家的回合，也能允许其退出游戏：\n\
  \n```swift\n@IBAction func forfeitTapped() {\n    if localPlayerIsCurrentParticipant\
  \ {\n        endMatchInTurn(participantOutcome: .quit, nextParticipantOutcome: .won)\n\
  \    } else {\n        quitMatchOutOfTurn()\n    }\n}\n\nprivate func quitMatchOutOfTurn()\
  \ {\n    guard let match = match else { return }\n    match.participantQuitOutOfTurn(with:\
  \ .quit) { [weak self] error in\n        self?.logError(error)\n        self?.loadMatchData()\n\
  \    }\n}\n```\n\n### 编程式匹配\n\n如果你想绕过 `GKTurnBasedMatchmakerViewController` 并实现自己的图形界面，也可以做到。使用以下函数可以创建一个新比赛，而无需用户通过匹配器：\n\
  \n```swift\nfunc findMatch() {\n    let match = GKMatchRequest()\n    match.minPlayers\
  \ = 2\n    match.maxPlayers = 2\n    GKTurnBasedMatch.find(for: match) { match,\
  \ error in\n        if let error = error {\n            print(\"查找比赛时发生错误：\\(error.localizedDescription)\"\
  )\n            return\n        }\n        // 使用返回的比赛开始新游戏。\n    }\n}\n```\n\n除了创建游戏，你还需要能够为本地用户加载现有游戏列表。你可以通过以下函数实现：\n\
  \n```swift\nfunc loadMatches() {\n    GKTurnBasedMatch.loadMatches { matches, error\
  \ in\n        if let error = error {\n            print(\"加载比赛时发生错误：\\(error.localizedDescription)\"\
  )\n            return\n        }\n        print(\"现有比赛：\\(matches ?? [])\")\n  \
  \  }\n}\n```\n\n> **注意：** 由于这两个函数都使用后台任务来处理请求，因此你在代码块中实现的代码需要保证线程安全。\n\n\n\n## `GKTurnBasedEventHandler`\n\
  \n`GKTurnBasedEventHandler`是一个委托协议，负责处理与回合制游戏相关的重要消息。要为事件设置委托，请使用以下代码：\n\n```\n\
  [[GKTurnBasedEventHandler sharedTurnBasedEventHandler] setDelegate: self];\n```\n\
  \n该协议包含三个可选函数。\n\n*   `handleInviteFromGameCenter`：当您的委托接收到此函数时，它应使用通过函数传入的`playersToInvite`填充新的`GKMatchRequest`。然后，您需要开始新的比赛或展示匹配器\
  \ GUI。当用户接受来自朋友的比赛邀请时，将调用此函数。\n\n*   `handleTurnEventForMatch`：当用户接受进行中比赛的推送通知时，您的委托会接收到此消息。您需要结束当前正在执行的任务，并为通过此函数传入的比赛显示游戏。\n\
  \n*   `handleMatchEnded`：当您的委托接收到此消息时，它应向玩家显示比赛结果和游戏结束视图，并允许玩家选择从 Game Center 中删除比赛数据。\n\
  \n## 总结\n\n在本章中，我们学习了 Game Center 中新增的回合制游戏功能。我们使用了现有的`GameCenterManager`类，并编写了一个全新的示例游戏来配合回合制技术。现在，您应该已经牢固掌握了如何创建新的回合制游戏，以及在点对点之间保留和发送回合数据。通过本章学习的技能，您现在应该能够在几小时内轻松启动并运行回合制游戏的网络组件。\n\
  \n在下一章中，我们将探讨另一个激动人心的话题：语音聊天。Apple 投入了大量精力，使得在 iOS、Mac 和 Apple TV 应用中轻松使用 IP 语音（VOIP），我们将探索如何快速在您的\
  \ Game Center 或 GameKit 应用中启用 VOIP。\n\n"
- '# 9. 语音聊天


  语音聊天，作为 Game Center 提供的服务之一，远比其它服务更能证明 Apple 的工程实力。Apple 将其他平台上最复杂的功能之一，转变成了在 iOS、Mac
  和 Apple TV 设备上最容易实现的功能。在其他平台上处理 IP 语音时，这通常是整个项目中最复杂、最令人生畏的任务。在本章中，我们将探讨如何将语音聊天服务添加到
  UFO 项目或任何 Apple 平台应用中。本章的简短篇幅充分证明了 Apple 为降低这项技术的门槛所付出的巨大努力，即使是新手开发者也能轻松掌握。


  注意


  在本章中，我们将回到 UFO 项目。井字棋项目已经完成。


  ## Game Center 的语音聊天


  我们首先来看看 Game Center 的语音聊天。使用`GKMatch`来创建语音聊天会话有许多优点，例如易用性、快速实现，以及与使用 GameKit 或自行实现系统相比，减少了所需的开销。一个`GKMatch`语音聊天可以有多个频道，每个频道都有一个关联的接收者列表。例如，在第一人称射击游戏中，您可以为队友设置一个频道，为所有玩家设置另一个频道。这样，您就可以在不向其他队伍泄露信息的情况下，讨论赢得比赛的策略。


  注意


  使用`GKMatch`的语音聊天仅适用于通过 Wi-Fi 连接到互联网的参与者；语音聊天不支持蜂窝网络。


  ### 创建音频会话


  在开始使用语音聊天之前，您首先需要创建一个新的音频会话。在任何聊天服务开始之前执行此操作非常重要。如果您在创建聊天会话之后才创建音频会话，您将无法发送或接收语音数据。在下面的示例中，我们创建了一个新的音频会话，允许我们的应用播放和录制音频，然后将其设置为激活状态。


  提示


  您的应用可能已经有一个用于播放音效的音频会话；如果您已经创建了音频会话，则无需创建新的会话。如果重复使用现有的音频会话，请确保将其设置为允许播放和录制功能。


  ```

  var error: Error? = nil

  let audioSession = AVAudioSession.sharedInstance()

  do {

  try audioSession.setCategory(.playAndRecord)

  } catch (let err){

  error = err

  }

  do {

  try audioSession.setActive(true)

  } catch (let err) {

  error = err

  }

  if let error = error {

  print("An error occurred while starting audio session: \(error.localizedDescription)")

  }

  ```


  ### 创建新的语音频道


  您的应用中可以拥有任意数量的语音聊天频道，每个对等方都可以注册加入任意数量的频道。频道通过名称字符串进行创建和组织。这将决定我们希望用户加入哪些频道。当两个或多个对等方加入同名的频道时，它们将连接到同一个聊天。


  下面的代码片段展示了如何创建三个不同频道的示例。请注意，这些频道是使用当我们开始一个新的基于 Game Center 的网络游戏时返回给我们的`GKMatch`对象创建的：


  ```

  let allChannel = match.voiceChat(withName: "allPlayers")

  let teamChannel = match.voiceChat(withName: "blueTeam")

  let squadChannel = match.voiceChat(withName: "BlueTeamSquad2")

  ```


  在此示例中，我们有一个与所有玩家通信的频道、一个与整个队伍通信的频道，以及第三个用于与小队通话的频道。仅仅创建了频道并不意味着它们会自动开启。在下一节中，我们将探讨如何在特定频道上启动和停止通信。


  ### 启动和停止语音聊天


  在上一节中，我们创建了三个新的语音频道，用于 Game Center 类型的语音聊天。当您想要在这些频道上发送和接收语音时，需要首先告诉 API 您想开始使用该频道。连接到频道后，您就可以通过该频道发送和接收数据。如果您想连接到一个频道但不想发送任何语音音频，请参阅下一节关于麦克风静音的内容。


  要开始使用语音频道，您需要调用上一节创建的`GKVoiceChat`对象上的`start`方法。


  ```

  allChannel?.start()

  teamChannel?.start()

  ```


  当您想离开频道时，只需调用`stop`方法。这比简单地将频道中的所有参与者静音要好，因为应用程序将不再需要接收额外的网络数据。已停止的频道可以随时重新启动。


  ```

  allChannel?.stop()

  teamChannel?.stop()

  ```


  提示


  强烈建议您在传输语音数据时提供视觉和音频指示（例如红灯和咔嗒声）。这样可以降低用户在无意中传输语音数据的可能性。请始终记住，用户的麦克风和传输的语音应被视为敏感数据。从
  iOS 14 开始，iPhone 刘海区域中有一个小的指示灯，用于指示麦克风当前处于活动状态。




  ### 聊天音量和静音


  语音聊天的音量是按频道设置的。每个频道都有一个关联属性，可用于降低该聊天的整体音量。您无法将音量提高到用户当前设备音量之上。若要修改频道的音量，请添加以下代码行：


  ```

  allChannel?.volume = 0.5 //最大音量的一半

  ```


  此外，您可以通过引用单个玩家的 `GKPlayer` 来将其静音。可以使用以下两行代码对玩家进行静音和取消静音：


  ```

  teamChannel?.setPlayer(player, muted: true)

  teamChannel?.setPlayer(player, muted: false)

  ```


  在某些情况下，您可能不希望始终传输用户的语音。默认情况下，用户加入聊天时处于静音状态。您需要在用户开始传输语音数据之前对其进行取消静音操作。


  ```

  squadChannel?.isActive = true

  ```


  **注意：** 一个用户一次只能在一个频道上传输语音；如果您对某个频道取消静音，API 会自动将所有其他频道静音。


  要在基于 Game Center 的网络应用中完全启用语音聊天，这些就是全部所需。其他所有内容，包括发送和接收数据，均由 API 为您处理。


  ### 监控玩家状态


  我在本章前面提到过，让用户知道他们当前正在传输数据非常重要。让玩家看到谁在说话也是一个重要步骤。通过监控玩家状态变化，您可以确定哪些用户当前正在传输语音，并在玩家列表中高亮显示他们，或执行其他类型的指示来表明哪个玩家正在说话。在您开始聊天时，以下代码块很容易设置，并且可以避免您进行轮询或委托回调：


  ```

  guard let allChannel = allChannel else {

  return

  }

  allChannel.playerVoiceChatStateDidChangeHandler = { player, state in

  switch state {

  case .connected:

  print("频道", allChannel.name, "已连接。")

  case .disconnected:

  print("频道", allChannel.name, "已断开连接。")

  case .speaking:

  showSpeakingPlayer(player)

  case .silent:

  stopShowingSpeakingPlayer(player)

  case .connecting:

  print("频道", allChannel.name, "正在连接中。")

  @unknown default:

  print("频道", allChannel.name, "收到未知状态", state, "。")

  }

  }

  ```


  **注意：** 玩家状态更新是按频道处理的。您需要为每个希望监控变化的频道配置一个这样的处理程序。


  ## 整合


  在本章中，我们将修改第 8 章中的现有代码库。首先，为您的语音聊天服务创建一个新的音频会话。将以下代码块添加到 `UFOGameViewController.swift`
  文件的 `viewDidLoad()` 方法中。此外，您需要将 `AVFoundation.framework` 添加到您的项目中。将 `viewDidLoad`
  方法的相关部分修改为以下内容：


  ```

  if gameIsMultiplayer == false {

  for _ in 0..<5 {

  spawnCow()

  }

  updateCowPaths()

  } else {

  generateAndSendHostNumber()

  var error: Error? = nil

  let audioSession = AVAudioSession.sharedInstance()

  do {

  try audioSession.setCategory(.playAndRecord)

  } catch (let err){

  error = err

  }

  do {

  try audioSession.setActive(true)

  } catch (let err) {

  error = err

  }

  if let error = error {

  print("启动音频会话时发生错误：\(error.localizedDescription)")

  }

  setupVoiceChat()

  }

  ```


  **警告：** 确保您构建的目标设备既有可用的扬声器也有麦克风。


  您还需要添加一个名为 `setupVoiceChat` 的新方法。此方法将处理基本配置。


  ```

  func setupVoiceChat() {

  mainChannel = peerMatch?.voiceChat(withName: "main")

  mainChannel?.start()

  mainChannel?.volume = 1.0

  mainChannel?.isActive = false

  }

  ```


  ## 连接用户界面


  最后一步，我们需要连接一个操作来打开和关闭麦克风。对于 UFO 项目，我决定采用一个简单的切换按钮，但您可能觉得需要实现不同的方法。新增一个按钮，如图 9-1
  所示，并将下面贴出的新操作连接上去。


  ![../images/216283_2_En_9_Chapter/216283_2_En_9_Fig1_HTML.jpg](img/216283_2_En_9_Fig1_HTML.jpg)


  *图 9-1：在我们的 UFO 游戏演示中添加麦克风按钮*


  ```

  @IBAction func startVoice(_ sender: Any) {

  micOn = !micOn

  if micOn {

  micButton.setTitle("麦克风开", for: .normal)

  mainChannel?.isActive = true

  } else {

  micButton.setTitle("麦克风关", for: .normal)

  mainChannel?.isActive = false

  }

  }

  ```


  此方法确定麦克风的当前状态（开/关），并将其切换到新状态。当切换发生时，我们会更新按钮标题，并根据我们使用的网络类型打开或关闭麦克风。


  这些是将语音聊天功能添加到我们的 UFO 示例项目中所需的所有步骤。如果您在两台设备上运行游戏，您就可以通过语音进行双向交流了。


  ## 总结


  在本章中，我们学习了如何用很少的工作量将一项传统上非常复杂的技术集成到我们的 iOS 应用中。我们探讨了在 GameKit 和 Game Center 中使用语音聊天的区别，并在
  UFO 演示游戏中实现了两种系统的示例。现在，您已经具备了为任何 iPhone 或 iPad 应用添加功能完整的 VOIP 技术所需的技能。如果您一直从本书开头跟随阅读，那么您现在已具备将
  GameKit 和 Game Center 的各个方面集成到您的应用中的所有技能。


  在下一章中，我们将学习 iOS 游戏或应用开发中的另一项重要技术——StoreKit。通过使用 StoreKit 技术，我们将学习如何销售附加功能和产品扩展。




  '
- "# 使用 StoreKit 实现应用内购买\n\n在本书中，我们一直使用 Game Center 和 GameKit 为你的 iOS、Mac 及 Apple\
  \ TV 应用添加丰富的社交功能。然而，还有另一个重要功能正在现代软件中迅速普及：应用内购买。允许用户直接在应用内购买升级或额外内容，将为你开辟一个潜在的重要收入来源。过去十年中，一种名为“免费增值”（Freemium）的新商业模式应运而生。免费增值是一种免费提供给用户，但通过销售附加内容实现盈利的游戏或产品。\n\
  \n我们将以 ngmoco:) 公司的《We Rule》为例。这款游戏最初为 iPhone 和 iPad 玩家免费提供。每个用户管理一个虚拟王国，负责建造建筑和种植庄稼。用户会随时间累积“魔力”（mojo），并可以利用这种应用内货币来建造新建筑和农场。然而，由于魔力积累缓慢且具有限制性，有些用户希望以超出常规允许的速度进行建造。这些高级用户可以访问应用内商店批量购买更多魔力。商店提供了从非常实惠到惊人高价的一系列购买选项。在处理可销售附加内容时，满足这两类用户的需求至关重要。你的部分用户可能偶尔有兴趣花一、两美元，而另一些高级用户则可能一次想花一百美元甚至更多。\n\
  \n免费增值已成为一种如此强大的商业模式，以至于 ngmoco:) 已停止开发不符合该模式的游戏，甚至在中途取消了《Rolando 3》的开发，因为它无法适应这种模式。这种模式似乎为\
  \ ngmoco:) 带来了丰厚回报。如图 10-1 所示，当前《We Rule》商店中销量最高的商品售价为 9.99 美元。这一项应用内购买的零售价就已超过大多数独立\
  \ iOS 游戏，而它能吸引该顾客的原因，是先用一款免费游戏吸引了他们。\n\n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig1_HTML.jpg](img/216283_2_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1 – ngmoco:) 公司《We Rule》中当前最畅销的应用内购买列表\n\n并非所有支持应用内购买的游戏或应用都必须是免费的。你也可以轻松地为付费游戏添加额外功能或解锁内容，例如《愤怒的小鸟》中的“神鹰”。应用内购买也不仅限于游戏。几乎任何软件都能从中受益，无论是解锁专业级功能，还是向用户收取推送通知支持的费用。在本章中，我们将探索如何为你的\
  \ iOS、Mac 和 Apple TV 软件添加一个功能完备的应用内商店。\n\n## 在 App Store Connect 中设置你的应用\n\n与 Game\
  \ Center 类似，我们需要先在 App Store Connect 中开始处理应用内购买：\n\n1.  登录 App Store Connect（[`https://appstoreconnect.apple.com/login`](https://appstoreconnect.apple.com/login)），如第\
  \ 2 章所述。你需要一个现有项目进行操作。如果你尚未在 App Store Connect 中创建项目，请先创建一个。\n\n2.  选择你要添加应用内购买支持的项目。然后，点击“应用内购买”部分下的“管理”按钮。\n\
  \n**重要提示**：从创建应用起，你有 90 天的时间上传二进制文件以供审核。请确保在项目完成前 90 天内保存应用内购买配置。\n\n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig2_HTML.jpg](img/216283_2_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2 – 在 App Store Connect 中设置你的第一个应用内购买\n\n1.  点击“管理”按钮将带你进入设置新产品的界面，如图 10-2\
  \ 所示。进入后，点击加号（+）按钮。\n\n你可以配置多种类型的应用内购买产品。为了方便起见，这里详细介绍如下：\n\n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig3_HTML.jpg](img/216283_2_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3 – App Store Connect 中消耗型与非消耗型购买的设置界面\n\n*   **消耗型**：用户在每次下载消耗型应用内购买商品时都必须重新购买。这包括游戏内货币，正如我们在上一节《We\
  \ Rule》示例中看到的那样。图 10-3 显示了消耗型购买的设置界面。\n\n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig4_HTML.jpg](img/216283_2_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4 – App Store Connect 中自动续期订阅的设置界面\n\n*   **非消耗型**：非消耗型购买每个用户只需购买一次，通常用于可解锁功能。非消耗型购买的示例包括额外关卡、可重复使用的道具或额外内容。\n\
  \n*   **自动续期订阅**：自动续期订阅允许用户在设定的时间段内购买应用内内容。在该时间段结束时，订阅将自动续期并向用户收费，除非用户选择退出。杂志和报纸采用这种模式，每周或每月发布新一期，直到用户退出。图\
  \ 10-4 显示了自动续期订阅购买的设置界面。\n\n*   **非续期订阅**：在很大程度上，自动续期订阅已取代了对此模式的需求。非续期订阅的功能与自动续期订阅相同，区别在于每次订阅到期时，用户需要手动续订。\n\
  \n**注意**：自动续期订阅将同步到与用户 Apple ID 关联的所有设备。\n\n我们将从添加一个非消耗型购买开始。我们将在示例的 UFO 游戏中使用此商品。\n\
  \n我们要添加的第一项商品是当前飞船的付费升级；将此商品命名为 `com.dragonforged.ufo.newShip1`。我使用了相同的标题作为产品 ID\
  \ 和参考名称。参考名称仅用于在 App Store Connect 中搜索时做参考，而产品 ID 将在你的代码库中用于标识此商品。\n\n创建新商品后，你需要至少添加一个本地化描述和标题，如图\
  \ 10-5 所示。最后要做的，是为该商品选择一个定价等级。你可能还注意到有一个用于上传截图的区域；我们将在后面的“提交购买 GUI 截图”一节中讨论。\n\n\
  ![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig5_HTML.jpg](img/216283_2_En_10_Fig5_HTML.jpg)\n\
  \n\n\n### 图 10-5\n\n在 `App Store Connect` 中为产品添加本地化描述\n\n添加消耗型产品的流程与非消耗型产品相同。如果你想添加基于订阅的产品，则需要留意几个新的字段，如图\
  \ 10-6 所示。配置订阅时，你需要定义持续时间。`iTunes Connect` 允许你设置以下任一选项：一周、一个月、两个月、三个月、六个月或一年。此外，如果用户同意参与营销活动（例如提供其电子邮件地址），你还可以提供免费订阅。\n\
  \n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig6_HTML.jpg](img/216283_2_En_10_Fig6_HTML.jpg)\n\
  \n### 图 10-6\n\n在 `iTunes Connect` 中配置订阅持续时间\n\n现在，你应该至少配置好了一个用于应用内购买的产品。你在 `App\
  \ Store Connect` 中的界面应类似于图 10-7。至此，我们在 `App Store Connect` 中为使应用内购买正常运行所需的初始配置就完成了。在下一节中，我们将开始编写在设备上完成购买所需的代码。\n\
  \n> **注**\n>\n> 暂时不必担心“缺少元数据”错误；这将在后续流程中处理。在等待上传截图期间，你仍然可以测试购买功能。\n\n![../images/216283_2_En_10_Chapter/216283_2_En_10_Fig7_HTML.jpg](img/216283_2_En_10_Fig7_HTML.jpg)\n\
  \n### 图 10-7\n\n产品已设置完毕，可在我们的应用中使用\n\n## 向应用添加产品\n\n与 `Game Center` 不同，苹果并未为应用内购买提供预设计的\
  \ GUI。你需要作为开发者为用户设计一个商店界面。在本节中，我们将学习如何获取你在 `iTunes Connect` 中添加的产品，使其在你的应用中显示为可购买状态。\n\
  \n> **注**\n>\n> 新的购买项或更改可能需要数小时才能生效。如果你反复检查一切无误但仍未看到产品，请等待几小时后再试。\n\n## App ID 与应用内购买\n\
  \n在使用应用内购买功能时，苹果要求你的 `App ID` 不能包含通配符，例如 `76P4G6KX56.*`。你必须使用唯一的 `App ID`，例如 `76P4G6KX56.com.dragonforged.ufo`。如果你没有唯一的\
  \ `App ID`，则需要创建一个。请按照以下步骤创建新的唯一 `App ID`：\n\n1.  在网页浏览器中导航至 [`https://appstoreconnect.apple.com/`](https://appstoreconnect.apple.com/)，然后从列表中选择你的应用。\n\
  2.  从左侧栏中选择 `App Information`。\n3.  填写关于你应用的必填信息。\n4.  点击 `Submit`。\n5.  点击列表旁边的\
  \ `Configure`，确保 `In-App Purchase` 已开启（默认应已开启）。\n\n## 设置\n\n我们首先从应用中请求一个产品列表。首先，将\
  \ `StoreKit` 框架添加到你的项目中。我们将修改上一章中现有的 `UFO` 项目；如果更方便，你也可以在自己的项目中跟随操作。\n\n> **重要**\n\
  >\n> `In-App Purchase` 在模拟器上无法工作；所有测试都必须在设备上进行。\n\n创建一个名为 `UFOStoreViewController`\
  \ 的新类。我们将使用这个类向用户展示一个商店。将源代码文件设置为匹配以下内容：\n\n```swift\nimport UIKit\nimport StoreKit\n\
  class UFOStoreViewController: UIViewController {\n    var productsRequest: SKProductsRequest?\n\
  \    @IBOutlet var storeTable: UITableView!\n}\nextension UFOStoreViewController:\
  \ SKProductsRequestDelegate {\n}\n```\n\n如你所见，我们导入了 `StoreKit` 头文件。设置 `SKProductsRequestDelegate`，并创建一个新对象来持有产品请求。我们需要创建一种让用户访问商店的方式，因此请继续在主屏幕上添加一个按钮以及呈现新视图控制器的相关代码。\n\
  \n## 检索产品列表\n\n修改我们新商店视图控制器的 `viewDidLoad` 函数，使用我们在 `App Store Connect` 中设置的产品标识符启动一个新的商店请求。你可能需要修改你的产品标识符，使其与你上一节中设置的一致。\n\
  \n```swift\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    let productIdentifiers:\
  \ Set = [\n        \"com.dragonforged.ufo.newShip1\",\n        \"com.dragonforged.ufo.subscription\"\
  ,\n        \"com.dragonforged.ufo.newShip2\"\n    ]\n    let productsRequest = SKProductsRequest(productIdentifiers:\
  \ productIdentifiers)\n    productsRequest.delegate = self\n    productsRequest.start()\n\
  \    self.productsRequest = productsRequest\n}\n```\n\n产品请求在委托回调中释放，如下所示。目前，此方法只是将你的产品信息打印到控制台，并记录任何无效产品。\n\
  \n```swift\nfunc productsRequest(_ request: SKProductsRequest, didReceive response:\
  \ SKProductsResponse) {\n    for product in response.products {\n        print(\"\
  Product title:\", product.localizedTitle)\n        print(\"Product description:\"\
  , product.localizedDescription)\n        print(\"Product price:\", product.price)\n\
  \        print(\"Product id:\", product.productIdentifier)\n        print(\"\\n\\\
  n\")\n    }\n    for invalidProduct in response.invalidProductIdentifiers {\n  \
  \      print(\"Invalid product identifier: \\(invalidProduct)\")\n    }\n    productsRequest\
  \ = nil\n}\n```\n\n> **注**\n>\n> 虽然你可以使用本节中的代码检索无效产品标识符列表，但并没有关联的错误信息来确定产品为何被标记为无效。在大多数情况下，产品\
  \ ID 输入有误，或者产品尚未被足够的时间分发到服务器。\n\n如果你现在运行游戏并导航至商店，应该会得到类似于以下内容的输出：\n\n```\nProduct\
  \ title: Ship+\nProduct description: Paint your ship and show off to your friends\n\
  Product price: 8.99\nProduct id: com.dragonforged.ufo.newShip1\nProduct title: Subscription\n\
  Product description: A subscription service\nProduct price: 1.99\nProduct id: com.dragonforged.ufo.subscription\n\
  ```\n\n> **注**\n>\n> 从产品请求获取响应可能需要几秒钟。最佳实践要求你应该向用户显示某种加载指示器。\n\n以上是从苹果服务器检索产品所需的所有步骤。在下一节中，我们将使用标准表格视图向用户展示这些数据。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将按照您的要求，对给定的英文文本进行翻译。\n\n\n### 向用户展示你的产品\n\n我们首先在商店视图控制器中添加一个表格视图。别忘了按要求连接数据源和委托。同时，我们为类添加一个新属性来持有产品。创建一个名为\
  \ `productArray` 的新数组属性。\n\n```\nvar productArray: [SKProduct]?\n```\n\n将产品结果设置给它，并在\
  \ `productsRequest` 方法中重新加载表格。\n\n```\nproductArray = response.products\nstoreTable.reloadData()\n\
  ```\n\n将两个必需的表格视图委托和数据源函数添加到你的类中，如下面的代码片段所示：\n\n```\nextension UFOStoreViewController:\
  \ UITableViewDataSource {\nstatic var currencyFormatter: NumberFormatter = {\nlet\
  \ currencyFormatter = NumberFormatter()\ncurrencyFormatter.numberStyle = .currency\n\
  return currencyFormatter\n}()\nfunc tableView(_ tableView: UITableView, numberOfRowsInSection\
  \ section: Int) -> Int {\nreturn productArray?.count ?? 0\n}\nfunc tableView(_ tableView:\
  \ UITableView, cellForRowAt indexPath: IndexPath) -> UITableViewCell {\nvar cell:\
  \ UITableViewCell\nif let dequeuedCell = tableView.dequeueReusableCell(withIdentifier:\
  \ \"Cell\") {\ncell = dequeuedCell\n} else {\nlet subtitleCell = UITableViewCell(style:\
  \ .subtitle, reuseIdentifier: \"Cell\")\nsubtitleCell.selectionStyle = .none\ncell\
  \ = subtitleCell\n}\nlet cellText: String\nlet cellDetailText: String\nif let product\
  \ = productArray?[indexPath.row] {\nSelf.currencyFormatter.locale = product.priceLocale\n\
  let priceText = Self.currencyFormatter.string(from: product.price)\nlet titleComponents\
  \ = [product.localizedTitle, priceText]\ncellText = titleComponents.compactMap{\
  \ $0 }.joined(separator: \" - \")\ncellDetailText = product.localizedDescription\n\
  } else {\ncellText = \"Unknown Product\"\ncellDetailText = \"\"\n}\ncell.textLabel?.text\
  \ = cellText\ncell.detailTextLabel?.text = cellDetailText\nreturn cell\n}\n}\n```\n\
  \n顶部的 `var` 配置了货币格式化器，单元格将用它来格式化产品价格。第一个函数简单地返回我们从苹果服务器检索到的产品数量，作为表格的行数。当我们以单元格形式显示它们时，我们使用了内置的\
  \ `.subtitle` 样式。我们将主标签设置为产品标题和价格，并使用详细标签显示描述。剩下的就是在 `productsRequest` 方法的末尾添加一个\
  \ `reloadTable` 方法。再次运行游戏后，你应该会看到一个表格视图，它能正确列出之前在 App Store Connect 中设置的两个应用内购买项。\n\
  \n> **注意**  \n> 虽然 API 返回了本地化的标题和描述，但它不会本地化价格。在国际化应用中，你需要自行完成这额外的一步。\n\n## 购买产品\n\
  \n在上一节中，我们学习了如何将产品添加到你的应用中。但如果没有购买这些产品的能力，我们的实现就只完成了一部分。在本节中，我们将探讨如何通过你的应用直接处理产品购买。\n\
  \n### 购买代码\n\n我们需要做的第一件事是让商店的视图控制器类遵循 `SKPaymentTransactionObserver` 协议。完成之后，我们修改现有的\
  \ `viewDidLoad` 方法。我们将自己添加为一个新的交易观察者。此外，我们执行一个测试来确认我们能否在此设备上付款，如果不能，则显示一个 `UIAlert`\
  \ 来通知用户。\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\nSKPaymentQueue.default().add(self)\n\
  guard SKPaymentQueue.canMakePayments() else {\nlet alert = UIAlertController.init(title:\
  \ \"\", message: \"Unable to make purchases with this device.\", preferredStyle:\
  \ .alert)\nself.present(alert, animated: true, completion: nil)\nreturn\n}\nlet\
  \ productIdentifiers: Set = [\n\"com.dragonforged.ufo.newShip1\",\n\"com.dragonforged.ufo.subscription\"\
  ,\n\"com.dragonforged.ufo.newShip2\"\n]\nlet productsRequest = SKProductsRequest(productIdentifiers:\
  \ productIdentifiers)\nproductsRequest.delegate = self\nproductsRequest.start()\n\
  self.productsRequest = productsRequest\n}\n```\n\n接下来，我们需要添加一个 `didSelectRowAtIndexPath`\
  \ 函数来注册我们表格视图中的选择事件。\n\n```\nextension UFOStoreViewController: UITableViewDelegate\
  \ {\nfunc tableView(_ tableView: UITableView, didSelectRowAt indexPath: IndexPath)\
  \ {\nguard let product = productArray?[indexPath.row] else {\nreturn\n}\nlet payment\
  \ = SKPayment(product: product)\nSKPaymentQueue.default().add(payment)\n}\n}\n```\n\
  \n如果你现在运行应用并选择一个表格行，你会收到一个确认提示。然而，我们还没有编写任何处理此交易的代码，也没有设置测试用户，所以目前你只能做到这一步。\n\n\
  ### 购买多个商品\n\n苹果让用户一次购买多个商品变得非常简单。以下代码片段可用于一次批量购买某个商品的多个数量，例如用户购买五包 100 金币。\n\n\
  ```\nif let product = productArray?.first(where: { $0.productIdentifier == \"com.dragonforged.rpg.100gold\"\
  \ }) {\nlet payment = SKMutablePayment(product: product)\npayment.quantity = 5\n\
  SKPaymentQueue.default().add(payment)\n}\n```\n\n\n\n### 处理交易\n\n在用户请求购买后，你需要执行几个步骤来确保其购买成功完成。首先，我们要实现\
  \ `SKPaymentTransactionObserver` 协议中所需的方法。正如下面的代码示例所示，我们检测当前交易状态，然后根据交易是成功、失败还是恢复来调用一些新函数：\n\
  \n```swift\nextension UFOStoreViewController: SKPaymentTransactionObserver {\nfunc\
  \ paymentQueue(_ queue: SKPaymentQueue, updatedTransactions transactions: [SKPaymentTransaction])\
  \ {\nfor transaction in transactions {\nswitch transaction.transactionState {\n\
  case .purchasing:\nprint(\"购买中:\", transaction)\ncase .purchased:\ntransactionDidComplete(transaction)\n\
  case .failed:\ntransactionDidFail(transaction)\ncase .restored:\ntransactionDidRestore(transaction)\n\
  case .deferred:\nprint(\"延迟:\", transaction)\n@unknown default:\nprint(\"未处理的情况:\"\
  , transaction)\n}\n}\n}\n}\n```\n\n我们需要实现一些便捷函数来帮助简化流程。如果交易成功完成或被恢复，我们需要记录交易事件、解锁用户购买的内容并执行一些清理工作。如果交易失败或被取消，我们只需要执行清理工作，并可能通知用户出现了问题。\n\
  \n```swift\nfunc transactionDidComplete(_ transaction: SKPaymentTransaction) {\n\
  unlockContent(transaction.payment.productIdentifier)\nfinish(transaction, withSuccess:\
  \ true)\n}\nfunc transactionDidRestore(_ transaction: SKPaymentTransaction) {\n\
  unlockContent(transaction.original?.payment.productIdentifier)\nfinish(transaction,\
  \ withSuccess: true)\n}\nfunc transactionDidFail(_ transaction: SKPaymentTransaction)\
  \ {\nif let error = transaction.error as? SKError, error.code == SKError.Code.paymentCancelled\
  \ {\nSKPaymentQueue.default().finishTransaction(transaction)\n} else {\nfinish(transaction,\
  \ withSuccess: false)\n}\n}\n```\n\n接下来，我们来看一下 `unlockContent` 函数。这是你的实际应用中可能有所不同之处。在这个示例中，我们在\
  \ `NSUserDefaults` 中设置一个标志位，我们可以通过检查该标志位来判断用户是否已购买某个功能。根据你的应用结构，你可能会采取不同的方法，但无论采用何种方法，请记住，你需要通过应用重启来保留已解锁的内容。有关如何实现此方法的示例，请参阅“在\
  \ UFO 中将一切整合在一起”一节。\n\n```swift\nfunc unlockContent(_ productId: String?) {\nswitch\
  \ productId {\ncase \"com.dragonforged.ufo.newShip1\":\nUserDefaults.standard.set(true,\
  \ forKey: \"shipPlusAvailable\")\ncase \"com.dragonforged.ufo.subscription\":\n\
  UserDefaults.standard.set(true, forKey: \"subscriptionAvailable\")\ncase .some(let\
  \ unknown):\nprint(\"无法识别的产品 ID:\", unknown)\ncase .none:\nbreak\n}\n}\n```\n\n\
  对于成功和不成功的购买，我们采取的最后一步是对我们的交易执行一些清理工作。以下方法中最重要的一步是调用 `finishTransaction` 方法。我们还会记录交易结果用于调试。在你调用\
  \ `finishTransaction` 之前，该交易将保持打开状态并存在于系统中。\n\n```swift\nfunc finish(_ transaction:\
  \ SKPaymentTransaction, withSuccess success: Bool) {\nSKPaymentQueue.default().finishTransaction(transaction)\n\
  if success {\nprint(\"交易成功:\", transaction)\n} else {\nprint(\"交易失败:\", transaction)\n\
  }\n}\n```\n\n### 恢复之前完成的交易\n\n通常，你的用户需要恢复他们之前进行的购买。如果他们重新安装了你的应用或开始在另一台设备上使用它，就可能发生这种情况。始终为用户提供一条路径来下载所有内容并解锁他们之前进行的任何购买，这一点非常重要。幸运的是，Apple\
  \ 已经为此场景提前做了规划，并提供了一个简单的方法来恢复用户的购买。\n\n```swift\nSKPaymentQueue.default().restoreCompletedTransactions()\n\
  ```\n\n这将重新“购买”你的所有内容，就像用户从你的商店中选择了它们一样。你将收到对 `paymentQueue(_:updatedTransactions:)`\
  \ 方法的相应回调，并可以使用现有代码解锁内容。\n\n## 测试帐户与测试购买\n\n如果你现在尝试在沙盒环境中购买你的某个商品，你将收到一个帐户错误。你需要首先创建一个新的测试帐户，以便能够在无需付费的情况下测试购买。\n\
  \n要设置一个新的测试用户，你需要登录到 App Store Connect ([`http://appstoreconnect.apple.com`](http://appstoreconnect.apple.com))。从\
  \ App Store Connect 的主屏幕选择“管理用户”部分；然后在此处选择“新测试用户”选项。\n\n测试用户不需要使用真实的电子邮件地址，你应选择一个易于输入且容易记住的地址，例如\
  \ `abc@def.com`。虽然你需要输入出生日期和其他身份信息，但完全没有理由不能虚构这些数据。确保选择“App Store”作为您测试本地化的商店。你可以为你将要测试的每个地区创建一个新帐户。\n\
  \n### 使用测试帐户登录\n\n你无法直接在“设置”应用中登录你的测试帐户。这样做会导致你被迫同意标准用户协议并被提示输入信用卡号。为了解决此问题，您需要使用“设置”应用退出您现有的\
  \ App Store 帐户。退出帐户后，在尝试购买时，系统会提示您登录或创建新帐户。此时，您应在此处输入测试帐户凭据。\n\n> **注**\n> 如果您在主设备上进行测试，在进行真实购买或下载更新之前，请不要忘记返回“设置”应用退出您的测试帐户。\n\
  \n## 提交购买 GUI 截图\n\n我们在本章前面的部分简要讨论过此步骤。Apple 要求您提交应用内购买的屏幕截图，然后才会批准其销售。关于 Apple\
  \ 在此截图中具体寻找什么，存在一些混淆。简而言之，Apple 想要的是一个屏幕截图，证明您的应用内购买按预期工作。对于可解锁内容，这将是正在使用该物品的截图，例如用户正在玩已购买的关卡或使用已购买的道具。然而，有时您的产品在使用时可能不可见。在这种情况下，Apple\
  \ 已接受显示该商品已被购买的商店截图。\n\n> **注**\n> 在您完成应用程序的编写和调试并准备提交审核之前，您不需要提交截图。\n\n## 开发者审批\n\
  \n在您的应用内购买准备就绪之前，您需要完成的最后一步是开发者审批。在您的网页浏览器中返回到 App Store Connect，并导航到应用审核页面的“管理应用内购买”部分。屏幕的右上角将出现一个新的绿色按钮。\n\
  \n系统将提示您如何提交产品。有以下两种选项可用：\n\n*   **随二进制文件提交：** 此选项将在您下次上传二进制文件时启用应用内购买。\n*   **立即提交：**\
  \ 这将允许您向现有应用提交新产品。\n\n\n\n### 在 `UFOs` 中整合所有元素\n\n根据应用内购买的复杂程度，将其集成到代码中有可能非常简单，也可能非常困难。在\
  \ `UFOs` 中，我们有一个非常简单的产品：用户只需支付一次性费用，就能解锁一艘不同颜色的飞船。当用户购买该产品后，我们会在用户默认设置中存储一个键值来记录这一操作。要在代码中解锁这个购买项，我们只需检查这个键值，然后执行所需的步骤即可。为此，我们需要向项目中添加一些新的美术资源。这些资源已包含在第\
  \ 10 章的示例代码中（可从 Apress 网站获取）。\n\n完成这一步后，我们需要修改 `viewDidLoad` 函数来更改飞船的图像。以下代码片段展示了这些改动：\n\
  \n```\noverride func viewDidLoad() {\n    purchasedUpgrade = UserDefaults.standard.bool(forKey:\
  \ \"shipPlusAvailable\")\n    let playerFrame = CGRect(x: 100, y: 70, width: 80,\
  \ height: 34)\n    myPlayerImageView = UIImageView(frame: playerFrame)\n    myPlayerImageView?.animationDuration\
  \ = 0.75\n    myPlayerImageView?.animationRepeatCount = 99999\n    var imageArray:\
  \ [UIImage]\n    if purchasedUpgrade {\n        imageArray = [UIImage(named: \"\
  Ship1.png\"), UIImage(named: \"Ship2.png\")].compactMap { $0 }\n    } else {\n \
  \       imageArray = [UIImage(named: \"Saucer1.png\"), UIImage(named: \"Saucer2.png\"\
  )].compactMap { $0 }\n    }\n    myPlayerImageView?.animationImages = imageArray\n\
  \    myPlayerImageView?.startAnimating()\n    if let myPlayerImageView = myPlayerImageView\
  \ {\n        view.addSubview(myPlayerImageView)\n    }\n}\n```\n\n### 本章小结\n\n在本章中，我们介绍了\
  \ StoreKit 和应用内购买。通过利用 StoreKit，你获得了多种将应用变现的方式，从可扩展的内容到为用户提供的特殊升级功能。\n\n现在，你应该有信心在自己的应用内商店中添加各种产品了。尽管\
  \ StoreKit 并非 Game Center 或 GameKit 的直接组成部分，但你无疑会发现，应用内商店是你 iOS、Mac 或 Apple TV 软件中不可或缺的补充。\n\
  \n我们花了一些时间讨论了 ngmoco:) 及其在 Freemium 模式上的实验与成功经验。现在，你应该能够自信地使用 App Store Connect，并完成完全设置一个应用内购买产品所需的所有操作，以及让该购买项显示出来所需的代码。\n\
  \n我们探讨了如何处理购买失败的情况以及成功购买后的流程。此外，我们还探索了一些高级主题，例如一次完成多次购买。最后，我们看到了如何将整个体验集成到我们的 `UFOs`\
  \ 演示应用中。\n\n"
- "# 11. 游戏控制器\n\n至少可以说，苹果在其平台上的游戏领域有着漫长而复杂的历史。当 iPhone 刚开始获得关注，并且世界迎来了首个原生 SDK 时，游戏显然并非优先考虑的事项。但从那时起，通过本书所描述的这些技术可以证明，苹果已经取得了长足的进步。iOS\
  \ 游戏控制器最初是在 2013 年的 WWDC 上作为 iOS 7 的一部分发布的。将注意力集中在屏幕上，却又无法感知游戏控制器的位置，这被证明是困难的。从\
  \ iOS 15 开始，苹果引入了新的 SDK 来处理屏幕上的游戏控制器。\n\n## 实体游戏控制器的类型\n\n实体游戏控制器通常有两种类型：微型和扩展型。它们也可能以有线（底座连接器）或无线（蓝牙）型号提供。无论其他物理和布局上的差异如何，所有控制器都将遵循相同的输入类型。重要的是要注意，扩展型控制器比标准控制器拥有更多的输入控件。\n\
  \n微型控制器配备了一个方向 D-pad（方向键）、两个主要按钮（A、X）和一个菜单按钮。扩展型控制器配备了一个方向 D-pad、四个主要按钮（A、B、X、Y）、三个附加按钮（菜单、选项、主页）、两组肩部按钮以及两个方向摇杆。无线控制器还带有一个玩家指示灯\
  \ LED，该指示灯有四个位置。从 iOS 15 开始，该平台增加了软件控制器的功能，本章稍后将对此进行介绍。\n\n> **注意**  \n> 虽然游戏控制器可以为你的\
  \ iOS、Mac 或 Apple TV 游戏增添大量功能，但必须记住，它们应当是可选功能。除了对游戏控制器的支持外，游戏还必须通过触摸屏、标准控件或在适用情况下通过加速计，包含所有必需的功能。\n\
  \n游戏控制器首次发布时，很少有公司进行生产。到 iOS 15 发布时，市场上已有数十种可选产品，从罗技和雷蛇这样的大品牌，到较小的公司和初创企业，不一而足。兼容苹果设备的游戏控制器现在形状、尺寸和风格各异。\n\
  \n## 连接游戏控制器\n\n当非无线控制器（底座连接器）连接到设备时，它会自动被检测到。然而，要检测无线控制器，应用必须专门开始搜索。示例应用在菜单屏幕的左上角添加了一个新按钮，用于切换是否搜索无线控制器。\n\
  \n为“查找无线控制器”按钮创建了一个新的 `IBAction`。当用户首次点击该按钮时，会调用 `startWirelessControllerDiscovery`\
  \ 函数。第二次切换将通过类方法 `stopWirelessControllerDiscovery` 结束搜索过程。\n\n```\n@IBAction func\
  \ findWirelessController() {\n    findingWirelessController.toggle()\n    if findingWirelessController\
  \ {\n        GCController.startWirelessControllerDiscovery {\n            print(\"\
  无线控制器搜索已完成\")\n        }\n    } else {\n        GCController.stopWirelessControllerDiscovery()\n\
  \        print(\"用户已停止搜索无线控制器\")\n    }\n}\n```\n\n当检测到新控制器时，无论是无线的还是有线连接的，都会触发一个通知：`GCControllerDidConnectNotification`。这个通知以及与之对应的用于游戏控制器断开连接的通知，应尽早注册。在示例项目中，这是在\
  \ `UFOViewController` 类的 `viewDidLoad:` 方法中完成的。\n\n```\nNotificationCenter.default.addObserver(self,\
  \ selector: #selector(setupControllers), name: Notification.Name.GCControllerDidConnect\
  \ , object: nil)\nNotificationCenter.default.addObserver(self, selector: #selector(setupControllers),\
  \ name: Notification.Name.GCControllerDidDisconnect , object: nil)\n```\n\n> **注意**\
  \  \n> 当控制器断开连接时，建议游戏自动暂停，以便玩家可以解决控制器的问题，或返回基于触摸的游戏操作。作为质量保证流程的一部分，不要忘记在游戏过程中测试控制器断开连接的情况。\n\
  \n收到任一通知后，将调用一个新函数 `setupControllers:`；此方法允许应用随时追踪哪些控制器（可能不止一个）已连接。游戏控制器可通过 `GCController`\
  \ 对象上的 `controllers` 函数获取；该函数会返回一个包含所有已连接控制器的数组。在示例应用中，该控制器数组的值也会保存到一个数组属性中，供后续使用。\n\
  \n```\n@objc func setupControllers(_ notification: Notification) {\n    gameControllerArray\
  \ = GCController.controllers()\n    if gameControllerArray.isEmpty {\n        print(\"\
  未找到游戏控制器\")\n    } else {\n        print(\"找到的游戏控制器数量\", gameControllerArray.count)\n\
  \    }\n}\n```\n\n> **注意**  \n> 控制器有可能在通知设置好之前就被检测到；因此，在添加通知时检查控制器数组的内容以确定当前是否有任何已连接的控制器，这一点非常重要。\n\
  \n\n\n### 通过轮询读取数据\n\n控制器与设备连接后，需要读取该控制器的输入。在示例应用 UFOs 中，加速度计数据每 0.05 秒读取一次。由于并非所有用户都能使用游戏控制器，因此即使添加了游戏控制器支持，仍需要保留这一行为。这使得加速度计轮询方法成为从游戏控制器读取数据的理想方式。修改\
  \ UFOs 中现有的 `motionOccurred:` 函数以添加游戏控制器功能。\n\n首先，游戏必须判断玩家是否正在使用游戏控制器；这通过确定设备当前是否已连接任何游戏控制器来实现。在实际应用中，你可能希望为用户提供一个选项。当连接了一个或多个游戏控制器时，会使用数组中的最后一个。在你自己的应用中，允许用户选择他们想要使用的控制器也可能是有益的。创建一个新的控制器对象，并将数组中的最后一个控制器存储到其中。\n\
  \nUFOs 游戏有两个主要功能：第一个是启动牵引光束动作，第二个是在屏幕上将飞船从一个位置移动到另一个位置。出于演示目的，将使用控制器上的 Y 按钮来启动牵引光束。由于只要持续按下按钮，牵引光束就会保持开启状态，因此会创建一个布尔值来跟踪按钮当前是按下还是松开。\n\
  \n按钮的操作被简单地传递给 `touchesBegan` 函数，该函数与处理触摸事件时控制牵引光束的函数相同。这种方法的好处是，即使连接了控制器，触摸事件仍然可以工作。由于标准版和加强版游戏控制器都有\
  \ Y 按钮，因此无需编写特定代码来处理不同的控制器。\n\n使用标准控制器时，方向键将用于移动。然而，加强版游戏控制器上的摇杆方向键在控制飞船时能提供更好的体验，因此应用会在可用时使用这些摇杆。这通过\
  \ `extendedGamePad` 属性实现；如果该值非 nil，则表示当前连接了加强版控制器。\n\n与 A、B、X、Y 按钮类似，方向键的值可以通过 `GCController`\
  \ 对象的一个属性来访问。但是，方向键为 X 和 Y 轴返回 0.0 到 1.0 的浮点值。这个值可以用来替代未连接游戏控制器时使用的加速度计值。连接加强版游戏控制器的摇杆值几乎相同，但它们存储在\
  \ `extendedGamepad` 下，而不是根 `gamepad` 属性下。\n\n```\nfunc motionOccurred(_ accelerometerData:\
  \ CMAccelerometerData) {\nif let controller = /*parentViewController.*/gameControllerArray.last\
  \ {\n//Testing for button press\nlet pressed = controller.microGamepad?.buttonX.isPressed\n\
  if pressed == true && gameControllerXHit == false {\ngameControllerXHit = true\n\
  xButtonAction()\n} else if pressed == false && gameControllerXHit == true {\ngameControllerXHit\
  \ = false\nxButtonAction()\n}\nif let extendedGamepad = controller.extendedGamepad\
  \ {\naccel[0] = extendedGamepad.leftThumbstick.xAxis.value * accelerometerDamp +\
  \ accel[0] * (1.0 - accelerometerDamp)\naccel[1] = extendedGamepad.leftThumbstick.yAxis.value\
  \ * accelerometerDamp + accel[1] * (1.0 - accelerometerDamp)\n} else if let microGamePad\
  \ = controller.microGamepad {\naccel[0] = microGamePad.leftThumbstick.xAxis.value\
  \ * accelerometerDamp + accel[0] * (1.0 - accelerometerDamp)\naccel[1] = microGamePad.leftThumbstick.yAxis.value\
  \ * accelerometerDamp + accel[1] * (1.0 - accelerometerDamp)\n}\n} else {\naccel[0]\
  \ = accelerometerData.acceleration.x * accelerometerDamp + accel[0] * (1.0 - accelerometerDamp)\n\
  accel[1] = accelerometerData.acceleration.y * accelerometerDamp + accel[1] * (1.0\
  \ - accelerometerDamp)\naccel[2] = accelerometerData.acceleration.z * accelerometerDamp\
  \ + accel[2] * (1.0 - accelerometerDamp)\n}\n}\n```\n\n**注意**  \n0.0 值表示方向键或摇杆处于静止状态；在游戏控制器框架出现之前，开发者发现有必要在静止位置周围设计一个“死区”；使用游戏控制器后，这已不再必要，任何大于\
  \ 0.0 的值都应被视为预期的移动。\n\n### 数据回调\n\n在许多情况下，在游戏循环的每次迭代中都轮询游戏控制器的输入是不合理的。幸运的是，Apple\
  \ 提供了回调功能，可以在游戏控制器上任何物理按钮的值发生变化时设置这些回调。在下面的代码片段中，为右肩键设置了一个处理器。当按钮值发生变化时，此函数将调用 `rightShoulderButtonAction`：\n\
  \n```\ncontroller.extendedGamepad?.rightShoulder.valueChangedHandler = { [weak self]\
  \ button, value, pressed in\nif pressed {\nself?.rightShoulderButtonAction()\n}\n\
  }\n```\n\n除了为每个动作设置回调外，回调还可以同时在多个按钮之间共享。这可以通过创建一个新的代码块并按照以下代码片段所示进行设置来实现。这将导致 A、B、X\
  \ 和 Y 按钮上的任何动作都会输出日志语句：\n\n```\nlet buttonHandler:  GCControllerButtonValueChangedHandler\
  \ = { button, value, pressed in\nprint(\"Handle action for \\(button) pressed: \\\
  (pressed), with value: \\(value)\")\n}\ncontroller.extendedGamepad?.buttonA.pressedChangedHandler\
  \ = buttonHandler\ncontroller.extendedGamepad?.buttonB.pressedChangedHandler = buttonHandler\n\
  controller.extendedGamepad?.buttonX.pressedChangedHandler = buttonHandler\ncontroller.extendedGamepad?.buttonY.pressedChangedHandler\
  \ = buttonHandler\n```\n\n也可以设置数据回调来处理方向键或摇杆的轴值变化。这可以通过以下代码片段实现：\n\n```\ncontroller.extendedGamepad?.rightThumbstick.valueChangedHandler\
  \ = { stick, xValue, yValue in\nprint(\"Right Thumb Stick value did change: \\(xValue),\
  \ \\(yValue)\")\n}\n```\n\n### 暂停\n\n如果你的游戏支持游戏控制器，那么它也必须支持所有游戏控制器上都有的暂停按钮。即使你的游戏之前不支持暂停，连接游戏控制器后这也成为一项要求。处理游戏控制器上的暂停按钮非常简单，只需要额外几行代码。\n\
  \n```\ncontroller.extendedGamepad?.buttonMenu.pressedChangedHandler = { [weak self]\
  \ button, value, pressed in\nself?.togglePauseState()\n}\n```\n\n### 玩家指示灯\n\n无线游戏控制器还具有玩家指示灯功能，因为游戏控制器框架支持将多个控制器连接到单个设备。你的游戏可以通过额外的无线控制器，在单个设备上支持多人游戏功能。每个无线控制器都会有四个\
  \ LED 灯，用于指示玩家编号。这些灯也用于让用户知道他们已成功连接无线控制器，即使在单人模式下也是如此。要照亮无线控制器的第一个灯，让玩家知道他们已成功连接，可以使用以下代码：\n\
  \n```\nif controller.playerIndex == .indexUnset {\ncontroller.playerIndex = .index1\n\
  }\n```\n\n`playerIndex` 属性也可用于照亮其他玩家索引值，范围从 0 到 3。每个控制器一次只能点亮一个玩家指示灯。\n\n\n\n##\
  \ 快照\n\n有时可能需要对控制器的输入状态创建快照。这不仅有助于调试，还可用于创建回放配置文件或通过网络传输控制器数据。快照通过`NSData`表示形式进行存储。\n\
  \n```\nlet snapshot = controller.capture()\n```\n\n你可以通过`isSnapshot`属性检查控制器是否为快照，如下方简短的代码片段所示：\n\
  \n```\nsnapshot.isSnapshot // 返回 true\n```\n\n## 虚拟控制器\n\n虚拟控制器是作为 iOS 15 更新的一部分引入\
  \ iOS 平台的。虚拟控制器提供了屏幕触摸控制器的功能与标准化。虽然虚拟控制器并非新技术，但在 iOS 15 发布之前，用户需要自行开发解决方案或部署第三方方案。\n\
  \n![../images/216283_2_En_11_Chapter/216283_2_En_11_Fig1_HTML.jpg](img/216283_2_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n\n来自 WWDC 关于虚拟控制器的公告\n\n为了显示一个新的虚拟控制器，需要创建`GCVirtualController`的新实例。\n\
  \n```\nlet configuration = GCVirtualController.Configuration()\nconfiguration.elements\
  \ = [GCInputDirectionPad, GCInputButtonA, GCInputButtonB]\nlet virtual = GCVirtualController(configuration:\
  \ configuration)\n```\n\n创建完成后，可以自定义按钮上显示的图像。\n\n```\nlet customButtonPath1 = UIBezierPath(rect:\
  \ .zero)\nvirtual.updateConfiguration(forElement: GCInputButtonA) { configuration\
  \ in\n    configuration.path = customButtonPath1\n    return configuration\n}\n\
  ```\n\n在某些情况下，暂时隐藏控制器按钮是合理的，例如在访问菜单或暂停时。这可以通过快速调用`isHidden`属性来实现，如下方代码片段所示：\n\n\
  ```\nvirtual.updateConfiguration(forElement: GCInputButtonB) { configuration in\n\
  \    configuration.isHidden = true\n    return configuration\n}\n```\n\n为了连接控制器并将其显示在屏幕上，只需对控制器执行简单的`connect`调用。连接成功后，需要设置新的输入处理程序。\n\
  \n```\nvirtual.connect { error in\n    guard let extendedGamepad = virtual.controller?.extendedGamepad\
  \ else {\n        return\n    }\n    extendedGamepad.dpad.valueChangedHandler =\
  \ { dpad, xValue, yValue in\n        print(\"方向键值已变更：\\(xValue), \\(yValue)\")\n\
  \    }\n    extendedGamepad.buttonA.pressedChangedHandler = buttonHandler\n    extendedGamepad.buttonA.pressedChangedHandler\
  \ = buttonHandler\n}\n```\n\n当需要断开控制器时，虚拟控制器对象接受`disconnect`调用。\n\n```\nvirtual.disconnect()\n\
  ```\n\n以上就是创建、显示、交互以及清理虚拟控制器所需的全部步骤。苹果再次不遗余力地使这项技术的实现与使用变得尽可能简单直接。如果你的游戏能从屏幕控制器中受益，那么几乎没有理由不实现此功能。\n\
  \n## 总结\n\n在本章中，你了解了物理控制器和虚拟控制器的游戏控制器功能，涵盖了从框架要求到连接和读取数据的全部内容。本章还涉及了诸如暂停、玩家指示灯和快照数据等主题。游戏控制器可以运用在\
  \ iOS、Mac 和 Apple TV 项目中讨论的相同原则进行部署。现在你应该对这项技术有了充分的掌握，并了解如何将其快速、轻松地部署到你的项目中，从而为你的用户提供一种超越设备自带标准控制的标准化、通用化的输入方式。\n\
