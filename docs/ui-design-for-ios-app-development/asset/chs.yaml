- "# 12. 通过协调器从 UIKit 获取数据\n\n在上一章中，我们了解了如何在 SwiftUI 中使用 `UIView`。在我们的项目中，我们使用了 `UITextView`。这类视图允许应用显示文本。同时，它也允许用户编辑应用需要知晓的文本内容。\n\
  \nUIKit 提供了多种从 UI 获取用户数据的选项。在某些情况下，控件会使用带有目标/动作模式的事件。在其他情况下，例如文本视图，我们也有基于委托模式的机制。\n\
  \n上一章向我们展示了如何显示信息。在本章中，我们将探讨如何将 UIKit 控件的用户输入获取到 SwiftUI 代码中。\n\n## UIViewPresentable\
  \ 协议\n\n你在上一章查看 `UIViewPresentable` 协议时，可能还注意到了其他一些东西。如果我们再次审视，会看到提到了 `Coordinator`\
  \ 以及创建它的函数，如图 12-1 所示。\n\n![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig1_HTML.jpg](img/497312_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1\n\n`UIViewPresentable` 中的 `Coordinator` 和 `makeCoordinator`\n\n`makeCoordinator`\
  \ 的定义返回一个 `Self.Coordinator`。你可以在上面的代码中看到 `Coordinator` 被类型别名为 `Void`。然而，在我们的代码中，我们将定义一个实际的\
  \ `Coordinator` 类。我们对 `makeCoordinator` 函数的实现将返回我们定义的类型。\n\n## 协调器\n\n协调器用于实现在 UIKit\
  \ 中你可能熟悉的常见模式。它在 UIViews 和 SwiftUI 之间进行协调。通过使用协调器，我们可以采用 UIKit 中的委托、数据源以及目标/动作模式。\n\
  \n那么，我们需要我们的协调器做什么呢？在我们的 `ListProject` 应用中，我们使用了一个 `UITextView`。我们需要知道用户何时更改了文本视图中的文本。为此，我们可以使用\
  \ `UITextView` 的委托。\n\n通常，你会将委托赋值给你的 `ViewController` 并实现 `UITextViewDelegate`。然后，你的控制器可以实现\
  \ `textViewDidChange` 函数并访问 `text` 属性。\n\n在 SwiftUI 中，我们将让协调器作为委托。这意味着我们新的 `Coordinator`\
  \ 类需要遵守该委托，并实现 `textViewDidChange`（以及可能的其他）函数。\n\n我们类的声明可能像这样：\n\n```\nclass Coordinator:\
  \ UITextViewDelegate {...}\n```\n\n> **注意：** 我将我的 `Coordinator` 定义为一个**位于** `TextView`\
  \ 结构体**内部**的类。\n\n如果我们添加这个，会立即得到一个错误。`UITextViewDelegate` 继承自 `UIScrollViewDelegate`，而后者继承自\
  \ `NSObjectProtocol`。我们的 `Coordinator` 并不遵守 `NSObjectProtocol`。\n\n我们可以添加大量代码来遵守\
  \ `NSObjectProtocol`，或者我们可以选择继承自 `NSObject`。由于我们的 `Coordinator` 并未继承自其他类，我们将选择后者。\n\
  \n```\nclass Coordinator: NSObject, UITextViewDelegate {...}\n```\n\n问题解决了。\n\n\
  ## 绑定属性包装器\n\n现在，我们的 `TextView` 有了一个协调器。我们的 `TextView` 实例对传入的文本有一个绑定。我们需要这个 `String`\
  \ 在用户输入时被更新。这就是我们协调器的工作。\n\n作为委托，`Coordinator` 将实现 `textViewDidChange`，并且需要存储更新后的文本。所以，我们的\
  \ `Coordinator` 类也需要一个对文本的绑定。\n\n```\n@Binding var text: String\n```\n\n为了确保属性被设置，我们需要一个将绑定作为参数的初始化器。我们之前接触的都是自动拥有成员逐一构造器的结构体。但我们的\
  \ `Coordinator` 不是这样，因为它是一个类。\n\n不过，将绑定作为参数传入的语法略有不同。`@Binding` 属性包装器本身只是一个带有泛型的结构体。因此，我们的参数类型可以这样明确地写出初始化器。\n\
  \n```\ninit(text: Binding<String>) {...}\n```\n\n现在，我们的参数类型是 `Binding<String>`，但我们的属性是一个带有属性包装器的\
  \ `String`。如果我们尝试赋值给 `self.text`，会得到一个错误，提示我们无法将参数赋值给一个 `String`。\n\n作为属性包装器，编译器会合成对应的后备存储属性。所以，我们的\
  \ \"text\" 属性有一个名为 \"`_text`\" 的后备存储属性，我们可以访问它。\n\n```\ninit(text: Binding<String>)\
  \ {\n    _text = text\n}\n```\n\n我们的协调器有一个绑定属性，并且在初始化器中进行了设置。由于我们声称遵守 `UITextViewDelegate`，我们可以实现我们感兴趣的函数：`textViewDidChange`。在函数中，我们可以设置属性包装器的包装值。\n\
  \n```\nfunc textViewDidChange(_ textView: UITextView) {\n    _text.wrappedValue\
  \ = textView.text\n}\n```\n\n当文本改变时，我们设置该属性的包装值。\n\n## 将协调器作为委托\n\n现在，我们有了一个能完成我们所需工作的协调器。我们需要实现\
  \ `makeCoordinator`。如果我们实现了它，它将在 `makeUIView` 之前被调用。协调器被设置为传递给 `makeUIView` 的 `Context`\
  \ 上的一个属性。通过访问我们的 `Coordinator` 实例，我们可以将其设置为我们的 `UITextView` 的委托属性。\n\n```\nfunc\
  \ makeUIView(context: Context) -> UITextView {\n    let tv = UITextView()\n    tv.delegate\
  \ = context.coordinator\n    return tv\n}\n```\n\n> **注意：** 下面的返回类型是 `TextView.Coordinator`，因为\
  \ `Coordinator` 类被定义在 `TextView` 结构体**内部**。\n\n```\nfunc makeCoordinator() -> TextView.Coordinator\
  \ {\n    Coordinator(text: $text)\n}\n```\n\n关键是，我们定义的 `Coordinator` 类就是 `UITextView`\
  \ 的委托。创建协调器的机制通过协议函数 `makeCoordinator` 内建。访问已创建的 `Coordinator` 的机制由 `Context` 提供。\n\
  \n`Context` 还具有用于 `Transaction` 和 `Environment` 的属性。`Transaction` 包含动画信息。`Environment`\
  \ 包含环境变量。这样，你的 `UIView` 就能像 SwiftUI 一样访问这些值。\n\n\n\n## 替代语法\n\n如果直接访问底层存储属性感觉不太对劲，那也没关系。还有另一种传入和访问属性的方法。对于\
  \ `text` 属性，我们可以不使用 `@Binding` 语法，而是采用与 `init` 参数相同的语法。\n\n```\nclass Coordinator:\
  \ NSObject, UITextViewDelegate {\nvar text: Binding\n```\n\n然后，初始化器和 `textViewDidChange`\
  \ 可以更直接地使用该属性。\n\n```\ninit(text: Binding) {\nself.text = text\n}\nfunc textViewDidChange(_\
  \ textView: UITextView) {\ntext.wrappedValue = textView.text\n}\n```\n\n无论是哪种情况，我们的\
  \ `TextView` 都不必有所变化。两种方式都可行，但现在代码感觉更清爽了。我们就在练习中使用这个版本吧。\n\n## `TextView` 的协调器\n\
  \n我们将为 `TextView` 添加一个协调器。它将作为我们创建的 `UITextView` 的委托。`Coordinator` 将是一个独立的类，并在 `makeCoordinator`\
  \ 协议函数中实例化。\n\n**注意** 如果你一直在跟着更新代码，那么你已经完成了这个练习。否则，以下步骤将阐明 `TextView` 的 `Coordinator`\
  \ 所需的更改。\n\n1.  在 `TextView` 内部声明 `Coordinator` 类，使其继承自 `NSObject` 并遵循 `UITextViewDelegate`\
  \ 协议。\n\n1.  为 `Coordinator` 添加一个 `Binding<String>` 类型的 `text` 属性。\n\n```\nclass\
  \ Coordinator: NSObject, UITextViewDelegate {}\n```\n\n1.  在 `Coordinator` 中实现一个初始化器，该初始化器接收一个\
  \ `Binding<String>` 参数并将其赋值给类属性。\n\n```\nclass Coordinator: NSObject, UITextViewDelegate\
  \ {\nvar text: Binding\n}\n```\n\n1.  在 `Coordinator` 中实现 `textViewDidChange` 以设置封装值。\n\
  \n```\ninit(text: Binding) {\nself.text = text\n}\n```\n\n1.  在 `TextView` 类中实现\
  \ `makeCoordinator`。\n\n```\nfunc textViewDidChange(_ textView: UITextView) {\n\
