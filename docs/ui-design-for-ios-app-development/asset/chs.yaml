  \n以下是这些更改后的代码：\n\n```\nText(\"Hello, SwiftUI!\")\n.font(.largeTitle)\n.fontWeight(.bold)\n\
  .foregroundColor(Color.purple)\n.padding(30.0)\n.frame(width: 200.0, height: 400.0)\n\
  .background(Color.orange)\n.cornerRadius(40.0)\n```\n\n再次强调，请熟练使用这些控件，并将更改与代码和 UI\
  \ 关联起来。接下来，我们将研究完成这些任务的其他一些方法。\n\n### 属性检查器\n\n你可以像在代码中操作 `Text` 一样，`⌃⌥` + 点击 UI\
  \ 项目。不过，SwiftUI 检查器可能看起来不一样。\n\n请注意，在这种情况下，弹出菜单中只有几个可用的选项（图 2-10）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig10_HTML.jpg](img/497312_1_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10\n\n画布中的弹出菜单\n\n要查看之前看到的所有相同修饰符，属性检查器是一个可靠的选择。\n\n**属性检查器**\n\n在这个练习中，我们将看到相同的修饰符可以通过画布中的可视化\
  \ UI 设计进行访问。但是，无需将你的思维从“在代码中工作”切换到“在 UI 中工作”。它们是一样的。代码就是 UI。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig11_HTML.jpg](img/497312_1_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11\n\n检查器面板按钮\n\n1.  使用 Xcode 窗口右上角的这个按钮打开检查器面板（右侧）（图 2-11）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig12_HTML.jpg](img/497312_1_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12\n\n属性检查器标签页\n\n1.  选择检查器面板顶部的属性检查器（图 2-12）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig13_HTML.jpg](img/497312_1_En_2_Fig13_HTML.jpg)\n\
  \n图 2-13\n\n属性检查器\n\n1.  点击 UI 或代码中的“Hello, SwiftUI!” `Text` 项目，以便在属性检查器中显示其属性（图\
  \ 2-13）。\n\n如果并非所有修饰符都显示出来，请点击代码中的该项目。\n\n注意这些值与之前相同。另外，“添加修饰符”下拉列表也是可用的。\n\n从这里开始，你就可以进行相同的选择和修改了。\n\
  \n1.  更改背景颜色、文本和其他设置，并在 UI 和代码中验证更改。\n\n你可能已经看到，有多种方式可以完成相同的事情。你可以编辑代码，在 SwiftUI\
  \ 检查器和属性检查器中进行修改。\n\n希望你正将代码和 UI 视为一体：理想情况下，代码 *就是* UI。\n\n## 堆叠中的堆叠\n\n一个应用中只有一个元素的屏幕算不上什么用户界面，也不常见。但计算属性\
  \ `body` 只能返回一个元素。我们该怎么办呢？\n\n大多数情况下，我们返回的这一个项目会包含许多其他项目。所以它是一个其他项目的容器。而且，正如我们将看到的，它常常是一个包含其他项目容器的容器，以此类推。\n\
  \n我们将会遇到的两个常见容器是水平堆栈（`HStack`）和垂直堆栈（`VStack`）。\n\n水平堆栈是水平堆叠。你可能已经猜到垂直堆栈是垂直堆叠。如果你熟悉\
  \ Interface Builder 中的堆栈视图，你可能已经知道我要说什么了。\n\n将一个项目嵌入堆栈的一种简单方法是通过 `⌘` + 点击的弹出菜单（见图\
  \ 2-14）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig14_HTML.jpg](img/497312_1_En_2_Fig14_HTML.jpg)\n\
  \n图 2-14\n\n带有嵌入选项的上下文弹出菜单\n\n这只是在代码中用相应的 `HStack` 或 `VStack` 代码包裹一个项目。将其包裹在 `VStack`\
  \ 中看起来是这样的：\n\n```\nvar body: some View {\nVStack {\nText(\"Hello, Swift\")\n.font(.largeTitle)\n\
  .fontWeight(.bold)\n.foregroundColor(Color.blue)\n.padding(30.0)\n.frame(width:\
  \ 200.0, height: 400.0)\n.background(Color.green)\n.cornerRadius(40.0)\n}\n}\n```\n\
  \n你应该不会注意到 UI 有任何变化，因为堆栈里只有一个项目。我们之前只有一个项目的 UI 会将其居中放置。新的堆栈也是如此。\n\n然而，如果我们添加更多项目（例如，在当前项目下方再添加一个\
  \ `Text` 项目），它就会将它们垂直堆叠起来。\n\n如果我在当前项目下方再添加一个 `Text` 项目，它看起来会像图 2-15 那样。\n\n\n\n\
  ## 重点来了\n\n我希望你已经开始明白这部分是如何运作的了。代码和用户界面 —— 砰 —— 合为一体！用户界面由代码构建而成，而不是像过去那样，你实例化一个按钮、设置其属性，然后将其添加到屏幕上（图\
  \ 2-15）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig15_HTML.jpg](img/497312_1_En_2_Fig15_HTML.jpg)\n\
  \n**图 2-15** – 底部带有附加文本的用户界面\n\n现在，框架内嵌了代码，期望你通过代码来实现用户界面。由于 `View` 协议等机制的存在，一个计算属性\
  \ `body` 会返回“`some View`”，并且该视图会被显示出来。\n\n因此，我们必须实现该协议，返回一个符合 `View` 协议的内容。`Text`\
  \ 和其他元素都符合该协议，所以我们可以创建这些元素并返回它们。\n\n此外，单表达式闭包会自动返回该表达式的结果。所以，我们直接开始编码吧！\n\n无论我们创建一个\
  \ `Text` 元素，还是一个包含子元素的 `VStack` 或 `HStack`，它们都会被返回。\n\n对于创建的元素，我们可以添加修改器来更改颜色、间距、字体、内边距等。这些修改既可以在代码中添加，也可以通过检查器面板完成。\n\
  \n`SwiftUI Inspector` 可以通过菜单栏使用 **⌘ + 点击** 来显示，或者直接使用 **⌃⌥ + 点击** 打开。\n\n`Attributes\
  \ Inspector` 通过右侧面板（检查器）显示，并选中 `Attributes Inspector` 标签页按钮。在用户界面或代码中选中的每个元素，都会显示其相关的属性。在某些情况下，在代码中选中元素效果最佳。\n\
  \n## 用户界面练习\n\n我希望你使用现有的项目（或者创建一个新项目），并使用户界面看起来像下图所示（图 2-16）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig16_HTML.jpg](img/497312_1_En_2_Fig16_HTML.jpg)\n\
  \n**图 2-16** – 练习的用户界面\n\n接下来，我会给你一些提示，然后给出解决方案。但首先，请尝试通过添加元素和修改器来重现这个界面，看看你是否能调整出正确的效果。\n\
  \n文本本身也包含一些提示。\n\n以下是提示：\n\n*   所有三个元素都是 `Text` 元素。这一点没有新意。\n*   第二个元素只有一个修改器：`.border`\n\
  *   第三个元素有两个文本中提到的修改器：`.padding` 和 `.opacity`\n*   三个元素都包含在一个 `VStack` 中。\n\n我希望你在添加元素和修改器的练习中有所收获。我想鼓励你总是去尝试。试着添加像\
  \ `Blur` 或 `Shadow` 这样的修改器，看看效果如何。\n\n以下是解决方案代码：\n\n```\nVStack {\nText(\"Notes\"\
  )\n.fontWeight(.bold)\n.foregroundColor(Color.white)\n.padding(30.0)\n.frame(width:\
  \ 300.0, height: 50.0)\n.background(Color.blue)\n.cornerRadius(15.0) Text(\"This\
  \ has a red border.\")\n.border(Color.red, width: 1)\nText(\"This has a black background\
  \ but opacity of 0.5\\. It has multiple lines but doesn't go off the screen and\
  \ is left justified. It also has some padding to keep from the edges and the item\
  \ above.\")\n.foregroundColor(Color.white)\n.background(Color.black)\n.multilineTextAlignment(.leading)\n\
  .opacity(0.5)\n.padding(45)\n}\n```\n\n### 章节总结\n\n在本章中，我们探讨了从其他概念转向 SwiftUI 时所需的思想转变。SwiftUI\
  \ 的代码*就是*用户界面，就像过去的 nib/xib/storyboard XML 是用户界面一样。\n\n我们学习了 `View` 协议以及该类型中定义的\
  \ `body` 计算属性。\n\n我们检查了一个单视图应用的模板定义。`ContentView` 结构体通过一个包含 `Text` 元素的单表达式闭包实现了\
  \ `View` 协议。\n\n使用 `SwiftUI Inspector` 和 `Attributes Inspector`，我们看到了如何在修改器上添加和更改值。并且，通过弹出菜单，我们了解了如何将一个元素嵌入到\
  \ `VStack` 或 `HStack` 中。\n\n在下一章中，我们将超越基础的 `Text` 元素，使用更广泛的、为 UI 开发提供的各种 UI 元素。\n\
  \n"
- "# 3. SwiftUI 构建块\n\n在本章中，我们将介绍 SwiftUI 提供的各种构建块。与 UIKit 一样，SwiftUI 也提供了各种元素，我们可以用来构建用户界面。我们已经见过了\
  \ `Text` UI 元素。那仅仅是个开始。\n\n## 老友与新交\n\n如果你之前使用过 Xcode 进行开发，你可能已经熟悉许多标准的 UI 元素。`Switch`、`Segmented\
  \ Control`、`Picker View` 等长期以来一直是我们的好朋友。\n\n别担心——你依然会见到它们。不过，你将用不同的方式来创建它们。当然，是的，它会在代码中完成。但它也将采用更声明式的方法。所谓声明式，是指你将告诉\
  \ SwiftUI *做什么*，但不一定需要告诉它*怎么做*。\n\n让我们来看看 `Button`。\n\n\n## 按钮\n\n几乎每个用户界面都包含按钮。用户点击它，代码就会执行。很简单。它在某种程度上体现了功能。按钮主要需要两样东西：点击时要调用的代码以及在按钮上显示的内容（文本、图片或两者兼具）。\n\
  \n那么现在就开始吧！\n\n### 在用户界面中创建一个按钮\n\n在本练习中，我们将使用关键字 `Button` 向用户界面添加一个按钮。我们将调用一个初始化器来传入要调用的代码以及在按钮上显示的内容。在本例中，我们将使用文本。\n\
  \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig2_HTML.jpg](img/497312_1_En_3_Fig2_HTML.jpg)\n\
  \n**图 3-2：** 按钮自动补全代码\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig1_HTML.jpg](img/497312_1_En_3_Fig1_HTML.jpg)\n\
  \n**图 3-1：** 计算属性 Body 内容\n\n1. 打开一个项目（新建或现有），点击 `ContentView.swift` 文件进行编辑。我使用的是现有代码，我的\
  \ `body` 属性当前看起来像图 3-1。我有一个 `VStack`，垂直包裹两个 `Text` 项。\n\n我想在两个 `Text` 项之间添加一个按钮，并在定义它的位置直接内联调用代码。你也可以提供一个方法名称来调用，而不是创建一个闭包。\n\
  \n2. 在第 21 行下方输入 `Button(ac`（这看起来有些奇怪的文本指定了我们想要的用于代码补全的 `Button` 初始化器）（图 3-2）。注意\
  \ `action`（要调用的代码）和 `label`（要显示的内容 – 实现了我们在前一章讨论过的 `View` 协议）这两个参数。按 Return 键自动补全代码。\n\
  \n对于代码，我们将其内联定义，因此按 Tab 键直至代码占位符（`() -> Void`）被高亮（在我的编辑器里是蓝色显示），然后按 Return 键来生成闭包模板。\n\
  \n我们还不想运行任何实际功能，所以只放一些虚拟代码。\n\n3. 在闭包的主体中输入 `print(\"tapped!\")`（替换 `code` 占位符）。\n\
  \n第二个参数 `Label` 是 `Button` 中的一个泛型，需要实现 `View` 协议。我们在上一章通过 `Text` 项看到了这一点。类似地，它的修饰符会返回该类型，因此我们可以将它们链式调用。\n\
  \n我们可能想在按钮上显示一张图片或各种其他项。但文本很常见，所以我们使用一个 `Text` 元素。\n\n4. 将第二个参数占位符替换为一个返回 `Text`\
  \ 项的单表达式闭包。这实现了 `View` 协议，因此它符合返回类型。\n\n现在两个之前的 `Text` 项之间的代码应如下所示：\n\n```\nButton(action:\
  \ {\nprint (\"tapped!\")\n}, label: { Text(\"Tap Me\") })\n```\n\n预览现在也应包含一个位于两个已有\
  \ `Text` 项之间的按钮。注意 `VStack` 只是按从上到下的顺序放置这些项。\n\n我们可以预期，如果在模拟器或设备上运行此代码 (⌘R)，我们可以点击这个新按钮（图\
  \ 3-3）。此外，我们应该会看到输出（`tapped!`）打印到调试输出控制台。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig3_HTML.jpg](img/497312_1_En_3_Fig3_HTML.jpg)\n\
  \n**图 3-3：** 按设计实现的用户界面\n\n5. 试试看！运行它并点击按钮以查看输出。\n\n### 本练习中我们做了什么？\n\n在一个现有（或新建）项目中，我们添加了一个按钮。为了创建按钮，我们使用了带有两个参数的\
  \ `Button` 结构体初始化器。\n\n第一个参数是不接受参数且无返回值的闭包（内联或方法名）。第二个参数实现了 `View` – 这是按钮的可视化部分。我们使用了\
  \ `Text`，正如我们在前一章中看到的，它满足了这个要求。\n\n预览显示我们的新按钮，并且执行代码允许我们点击该按钮并查看输出。很简单！\n\n**额外提示**：我鼓励你尝试使用按钮上的各种修饰符。你可以将修饰符应用于按钮本身或第二个参数的\
  \ UI 项（在我们的例子中是 `Text` 项）。看看旋转效果 (`.rotationEffect`) 做了什么 – 你可以使用 `.degrees` 来创建需要传入的角度。\n\
  \n### 按钮参数\n\n我们看到一个 `Button` 接受两个参数：`action` 和 `label`。`Action` 是点击按钮时要执行的代码的闭包。`Label`\
  \ 是一个返回要在 `Button` 上显示的 UI（实现了 `View` 协议的内容，通常是 `Text` 或 `Image`）的闭包。\n\n接下来我们看看\
  \ `Image`。\n\n## 图像\n\n另一个常见的用户界面项是用于显示图像的东西。在 UIKit 中，它是 `UIImageView`。在 SwiftUI\
  \ 中，它被命名为 `Image` 并实现了 `View` 协议。就像 `Text` 或 `Button` 项一样，`Image` 可以作为 `View` 返回类型返回。\n\
  \n### SF Symbols\n\n要显示图像，我们首先输入 `Image`。之后我们有几个选项，包括提供 `name`（来自 Assets 目录的图像文件名）和\
  \ `systemName`（在此处查看关于 SF Symbols 的更多信息：[`developer.apple.com/design/human-interface-guidelines/sf-symbols/overview/`](https://developer.apple.com/design/human-interface-guidelines/sf-symbols/overview/)）。\n\
  \n让我们使用系统名称 `camera` 创建一个 `Image` 项。\n\n#### 添加一个图像\n\n在本练习中，我们将使用 `Image` 结构体向我们的用户界面添加一个图像。这就像我们之前看到的项一样，实现了\
  \ `View` 协议。\n\n1. 打开一个项目（新建或现有），点击 `ContentView.swift` 文件进行编辑。我使用上一个练习中的现有代码。\n\
  \n2. 在 `body` 属性的底部添加一个 `Image` 项，使用接受系统图像名称的初始化器。传入 `camera` 作为参数值。代码应如下所示：\n\n\
  ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig4_HTML.jpg](img/497312_1_En_3_Fig4_HTML.jpg)\n\
  \n**图 3-4：** 用户界面中的相机图像\n\n3. 如有需要，恢复预览并验证图像已显示（图 3-4）。\n\n```\nImage(systemName:\
  \ \"camera\")\n```\n\n你的 UI 现在应显示一个图像。如果你使用了现有代码，你的 UI 应将图像放在其他可视化元素的下方。\n\n可以随意添加更多\
  \ `Image` 项并使用其他系统图像名称。将一个图像添加到你的 `Assets.xcassets` 目录，并用如下代码显示它：\n\n```\nImage(\"\
  brainwashIcon\")\n```\n\n你可能还想设置其尺寸。使用 `Resizable` 修饰符，然后使用 `Frame` 修饰符来设置尺寸：\n\n\
  ```\nImage(\"brainwashIcon\")\n.resizable()\n.frame(width: 100, height: 100,\nalignment:\
  \ .center)\n```\n\n另外，尝试使用各种修饰符。查看 `Color Invert` 修饰符 (`.colorInvert()`)。注意 `Image`\
  \ 有一些初始化器接受其他值，包括 `Text`。看看它们会做什么！\n\n### 图像创建\n\n显示图像的核心能力基于指定要显示哪个图像。我们使用一个系统名称（SF\
  \ Symbols）创建了一个图像。你也可以使用来自 Assets 目录的图像名称创建图像。还有其他选项和修饰符可用于自定义外观。\n\n\n\n## 开关\n\
  \n`Toggle` 是展示 SwiftUI 声明式特性的绝佳示例。创建开关时，我们不会使用 \"Switch\" 或 \"UISwitch\"。而是直击本质，以声明式的方式说明\"\
  要做什么\"，而非关注\"如何做\"。因此我们使用 `Toggle`。\n\n使用 toggle 这个术语告诉系统我们想要做什么：为用户提供一个开/关类型的控件。这里可以看到一个接受两个参数的初始化器（图\
  \ 3-5）。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig5_HTML.jpg](img/497312_1_En_3_Fig5_HTML.jpg)\n\
  \n图 3-5：Toggle 自动补全\n\n该声明展示了初始化器的更多细节：\n\n```\npublic init(isOn: Binding,\n@ViewBuilder\
  \ label: () -> Label)\n```\n\n第一个参数是开关的初始状态：开或关。但请注意，它不仅仅是一个 `Bool`。参数类型是 `Binding`，指定所使用的泛型是\
  \ `Bool`。\n\n第二个参数与 `Button` 类似，是一个名为 `Label` 的泛型。`Toggle` 代码定义了这个泛型必须遵循 `View`\
  \ 协议。\n\n### 绑定\n\n我们将在后续章节中深入探讨其工作原理。现在，只需理解它是将传入的参数绑定到 UI。因此，如果属性（例如 `isReady`）的值发生变化，`Toggle`\
  \ 也需要相应更新。\n\n此外，如果 `Toggle` 需要更新，那么 UI 也需要更新，以便重新创建并重新显示。\n\n因此，`Toggle` 和属性是绑定在一起的。当一方改变时，另一方也随之改变。\n\
  \n我们像这样声明属性：\n\n```\n@State private var isReady : Bool = false\n```\n\n### `@State`\
  \ 属性包装器\n\n为了将我们的属性 `isReady` 绑定到 UI 元素，我们需要使用 `@State` 属性包装器。这为我们完成了以下几件事。\n\n\
  它为属性创建了一个包装器。因此，虽然 `isReady` 被设置为 false，甚至被声明为 `Bool` 类型，但访问它时需要通过包装器。实际上，如果在执行期间深入查看\
  \ `isReady`，你会看到类似图 3-6 所示的内容。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig6_HTML.jpg](img/497312_1_En_3_Fig6_HTML.jpg)\n\
  \n图 3-6：调试器中的属性包装器\n\n注意类型是 `State<Bool>`。值存储在其下方。此外，位置显示为 `SwiftUI`。这是因为 UI 负责存储和管理该值。\n\
  \n`@State` 旨在为特定于某个视图的值创建\"数据源\"。这就是为什么我们也看到它被标记为 `private` —— 它仅用于此视图。这是推荐的做法。\n\
  \n要在 UI 中创建绑定，例如为我们的 `Toggle`，需要在属性前加上 `$` 前缀（例如 `$isReady`）。在其他情况下，比如检查值或以编程方式设置值，则像往常一样操作（例如，有点像可选类型：`isReady\
  \ = true`）。\n\n这里需要理解的关键点是，我们不是通过 `Toggle` 上的操作来设置值，而是绑定值。因此，我们将自己的值交给了 `Toggle`\
  \ 来更新。此外，如果值通过其他方式发生变化，`Toggle` 会在视觉上得到更新。\n\n### Toggle 标签\n\n第二个参数是一个标签。这基本上与我们之前在\
  \ `Button` 中看到的一样。第二个参数是要显示的内容。在这种情况下，它显示在 `Toggle` 旁边，而不是像 `Button` 那样显示在上面。\n\n\
  如果你查看 `Label` 参数的声明，你会看到这样一条注释：\n\n```\n一个描述切换 `isOn` 效果的视图。\n```\n\n这太棒了！它让我们能够利用现有元素的定义和外观。如果标准\
  \ `Toggle` 日后发生更改或用于其他设备，它可以根据该系统进行适配。如果你是为 iPhone 设计的，但后来要为 Apple Watch 构建，UI 会自动适配。\n\
  \n我们只需声明我们想要什么（即 `Toggle`），并将其绑定到它所代表的属性（即 `isReady`），以及我们想要显示的任何描述切换效果的 UI（例如 `Text`）。\n\
  \n我们真正想要提供的是与开关一起用来描述其功能的东西。那么……让我们……\n\n## Toggle 练习\n\n在本练习中，我们将向 UI 添加一个 `Toggle`。它将绑定到一个属性，因此我们将把它作为\
  \ `isReady` 添加到 `ContentView` 中，该属性将是一个 `Bool`。\n\n1. 打开一个项目（现有或新建），点击 `ContentView.swift`\
  \ 文件进行编辑。\n\n2. 在 \"`var body...`\" 属性行上方添加一个属性：\n\n   ```\n   @State private var\
  \ isReady = false\n   ```\n\n   这将为 `isReady` 的 `Bool` 值创建一个属性包装器，初始值为 false。\n\n\
  3. 编辑 `body` 计算属性，并在返回值的底部添加一个 `Toggle`。它有两个参数：\n\n   - `isOn` – 传入 `isReady` 的绑定，使用\
  \ `$isReady`\n   - `label` – 传入一个 `Text` 项，用于在 `Toggle` 上显示。你的 Toggle 代码可能如下所示：\n\
  \n     ```\n     Toggle(isOn: $isReady,\n     label: {\n         Text(\"Ready: \"\
  \ + (isReady ? \"Yes\" : \"No\"))\n     })\n     ```\n\n   在这种情况下，`Text` 还会指示该设置的值。在实际应用中这可能是多余的，但就我们目前的目的而言，这是对值的验证。\n\
  \n   ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig7_HTML.jpg](img/497312_1_En_3_Fig7_HTML.jpg)\n\
  \n   图 3-7：Toggle 设置为关/False\n\n4. 运行你的应用，并验证初始时 Toggle 处于关闭状态，因为 `isReady` 为 false（图\
  \ 3-7）。\n\n   ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig8_HTML.jpg](img/497312_1_En_3_Fig8_HTML.jpg)\n\
  \n   图 3-8：Toggle 设置为开/True\n\n5. 将 Toggle 打开，并验证 `Text` 元素已更新，包含 \"Yes\"（如果你定义了类似于上面的\
  \ `Text` 元素）（图 3-8）。\n\n6. 添加一个 `Button`（或修改现有的 `Button`），并在按钮被点击时切换 `isReady` 的值。\n\
  \n7. 运行应用，并验证当按钮被点击时，UI 会根据切换后的值进行更新。\n\n希望你能轻松完成这个练习，并看到相同乃至更多的结果！\n\n### 当前代码\n\
  \n以下是我在完成所有这些练习后，`body` 属性的当前代码，其中包括我资源目录中一个 png 文件的 `Image`：\n\n```\nvar body:\
  \ some View {\n    VStack {\n        Text(\"Hello, Swift\")\n            .font(.largeTitle)\n\
  \            .fontWeight(.bold)\n            .foregroundColor(Color.blue)\n    \
  \        .padding(30.0)\n            .frame(width: 200.0, height: 400.0)\n     \
  \       .background(Color.green)\n            .cornerRadius(40.0)\n        Button(action:\
  \ {\n            print (\"tapped!\")\n            self.isReady.toggle()\n      \
  \  }, label: { Text(\"Tap Me\") })\n        Text(\"another item\")\n        Image(systemName:\
  \ \"camera\")\n        Image(\"brainwashIcon\")\n            .resizable()\n    \
  \        .frame(width: 100, height: 100, alignment: .center)\n            .colorInvert()\n\
  \        Toggle(isOn: $isReady,\n               label: {\n                   Text(\"\
  Ready: \" +\n                       (isReady ? \"Yes\" : \"No\"))\n            \
  \   })\n            .padding([.leading, .trailing], 100.0)\n    }\n}\n```\n\n图 3-9\
  \ 展示了它在预览中的样子。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig9_HTML.jpg](img/497312_1_En_3_Fig9_HTML.jpg)\n\
  \n图 3-9：画布中的当前 SwiftUI 代码\n\n几点值得注意：\n\n- `Button` 操作会打印 \"tapped!\" 并切换 `isReady`\
  \ 的值。\n- 第二个 `Image` 项上有三个修饰符。`resizable` 修饰符的输出上调用了 `.frame`。\n- 我还在同一个 `Image`\
  \ 上调用了 `.colorInvert`。这可以在 `Image` 上调用，但其返回类型不响应 `.resizable()`。在某些情况下，顺序很重要。\n\
  - `Toggle` 对 `isOn` 值使用了绑定，但除此之外，`isReady` 被视为普通属性。\n- 我在 `Toggle` 上使用了 `.padding`\
  \ 使其远离边缘。\n\n\n\n## TextField\n\n另一个非常常见的控件是 `TextField`。它允许用户输入姓名、电子邮件、电话号码、密码或其他基于文本的值。\n\
  \n还有其他用于用户输入的 UI 控件，但我们已经介绍过的控件加上 `TextField` 可能是最广泛使用的。\n\n如果我们打开视图库（右上角的 + 按钮，见图\
  \ 3-10）或使用快捷键 ⌘⇧L，我们可以添加一个 `TextField`。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig10_HTML.jpg](img/497312_1_En_3_Fig10_HTML.jpg)\n\
  \n**图 3-10** — 对象库按钮\n\n接下来，搜索“text”，我们会看到 `Text` 和 `TextField` 条目。然后，我们可以通过预览窗格（图\
  \ 3-11）将 `TextField` 拖入我们的 UI。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig12_HTML.jpg](img/497312_1_En_3_Fig12_HTML.jpg)\n\
  \n**图 3-12** — 用户界面中的 `TextField`\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig11_HTML.jpg](img/497312_1_En_3_Fig11_HTML.jpg)\n\
  \n**图 3-11** — 对象库中的 `TextField`\n\n代码会根据 UI 元素拖放的顺序更新，包含以下内容：\n\n```\nTextField(\"\
  Placeholder\", text:Value)\n```\n\n这个 `Value` 是一个占位符。如果你在其他编辑器中查看 `.swift` 文件，你会看到其中包含一些\
  \ Xcode 的标记语言。这个 `Value` 占位符会解析为一个空字符串（`\"\"`）。在这种情况下，你实际上可以直接编译并运行此代码而无需任何修改：\n\
  \n```\nTextField(/*@START_MENU_TOKEN@*/\"Placeholder\"/\n*@END_MENU_TOKEN@*/, text:\
  \ /*@START_MENU_TOKEN@*//\n*@PLACEHOLDER=Value@*/.constant(\"\")/\n*@END_MENU_TOKEN@*/)\n\
  ```\n\n我将 `TextField` 放在了 `VStack` 的顶部，这样键盘就不会遮挡它（见图 3-12）。\n\n我想做几件事让这个 `TextField`\
  \ 更符合我们的预期。首先，我想替换占位符文本。我会将占位符改为类似“Name”、“Email”或类似的内容。其次，我想添加一些内边距使其离两侧稍远一点。最后，我想将属性值绑定到文本上。\n\
  \n这种绑定与 `Toggle` 非常相似。我们将创建一个带有 `@State` 属性包装器的 `String` 属性。然后使用 `$` 前缀将其绑定到 `TextField`\
  \ 的 `text` 参数。\n\n让我们把它作为一个练习来尝试。我会列出要做什么，你试试看能否不按步骤完成……\n\n### 添加一个 `TextField`\n\
  \n以下是此练习的目标列表。首先，试着不看步骤完成这些目标。无论你是否完成，准备好后查看下面的详细步骤。\n\n目标：\n\n1. 打开你正在进行的项目（或创建一个新项目）。\n\
  2. 在 `ContentView` 结构体中添加一个属性。它应该满足：\n    - 带有 `@State` 属性包装器\n    - 声明为 `private`\n\
  \    - 是一个变量\n    - 类型为字符串\n    - 命名为 `username`\n    - 默认值为空字符串（`\"\"`）\n3. 从视图库中拖入一个\
  \ `TextField`。\n4. 将 `TextField` 的占位符设置为“Username”。\n5. 将 `TextField` 初始化器的 `text`\
  \ 参数设置为 `username` 属性的绑定。\n6. 为 `TextField` 添加内边距，值为 30。\n7. 奖励：在另一个 UI 元素上使用 `.disabled(Bool)`\
  \ 修饰符。传入的 `Bool` 值为 `self.username` 的长度是否为 0（即，如果没有用户输入，则禁用其他控件）。\n\n希望你没有遇到太多困难就完成了这个练习。我们正在将越来越多的项目和概念组合在一起。我们将继续在此基础上逐步构建。\n\
  \n根据你的起点，你的 UI 可能类似于图 3-13。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig13_HTML.jpg](img/497312_1_En_3_Fig13_HTML.jpg)\n\
  \n**图 3-13** — 练习的起始 UI\n\n它看起来实际上与一个毫无意义的 `TextField` 没有太大区别。但我们知道，在幕后，它绑定到了 `username`\
  \ 属性。因此，如果该属性发生变化，我们的 `TextField` 需要更新，整个 UI 将重新渲染。\n\n另外请注意，“Tap Me”按钮是禁用的。这是因为\
  \ `username` 的长度为 0。一旦用户在 `TextField` 中输入内容（或者 `username` 值以其他方式变为非空），该按钮将启用。\n\n\
  以下是详细步骤：\n\n1. 像这样添加属性：\n\n```\n@State private var username = \"\"\n```\n\n2. 打开视图库（⌘⇧L），搜索“text”，并将其拖到预览画布上。代码应该如下所示：\n\
  \n```\nTextField(\"Placeholder\", text:Value)\n```\n\n3. 将“Placeholder”文本改为“Username”。\n\
  4. 将第二个参数（当前为“Value”）改为对 `username` 属性的绑定，如下所示：\n\n```\nTextField(\"Username\",\
  \ text: $username)\n```\n\n5. 使用 `.padding(30)` 添加内边距修饰符。\n6. 在下方添加一个 `Text` 项，用于显示输入时的值。\n\
  \n```\nText(username)\n```\n\n7. 对于其他某个控件，添加 `.disabled` 修饰符。传入的 `Bool` 值为 `self.username.count\
  \ == 0`。\n\n最终代码应如下所示：\n\n```\n@State private var username = \"\"\nvar body: some\
  \ View {\n    VStack {\n        TextField(\"Username\", text: $username)\n     \
  \       .padding(30)\n        Text(\"Hello, Swift\")\n            .font(.largeTitle)\n\
  \            .fontWeight(.bold)\n            .foregroundColor(Color.blue)\n    \
  \        .padding(30.0)\n            .frame(width: 200.0, height:400.0)\n      \
  \      .background(Color.green)\n            .cornerRadius(40.0)\n        Button(action:\
  \ {\n            print (\"tapped!\")\n            self.isReady.toggle()\n      \
  \  }, label: { Text(\"Tap Me\") })\n            .disabled(self.username.count ==\
  \ 0)\n    }\n}\n```\n\n要在实时预览中运行应用，请点击画布中 UI 上方的图标栏中的播放按钮（图 3-14）。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig14_HTML.jpg](img/497312_1_En_3_Fig14_HTML.jpg)\n\
  \n**图 3-14** — 画布中的按钮栏\n\n如果你按照步骤操作，应该可以在 `TextField` 中输入内容，并在下方的 `Text` 项中看到相同的值（图\
  \ 3-15）。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig15_HTML.jpg](img/497312_1_En_3_Fig15_HTML.jpg)\n\
  \n**图 3-15** — 练习的最终 UI\n\n此外，“Tap Me”按钮只有在 `TextField` 中有文本时才应启用。\n\n### 章节总结\n\
  \n我们在本章中探讨的每个控件在 SwiftUI 开发中都非常常见。熟悉它们及其修饰符非常重要。\n\n随着我们覆盖更多内容，我们将看到一些控件如何组合和重叠，以及我们拥有的其他修饰符、手势、事件等。\n\
  \n我们还将介绍更多概念，例如来自 Combine 框架的绑定。`@State` 属性包装器和绑定只是其中的一小部分。这可能是一个新概念并且容易混淆，所以我们会循序渐进。但它也非常强大，是真正掌握\
  \ SwiftUI 的关键概念。\n\n我想鼓励你对我们本章所做的一切进行更多练习。启动一个新项目，添加各种 UI 元素，探索修饰符，从视图库中拖入项目，并普遍练习我们所学的内容。\n\
  \n"
- "# 4. 绑定数据源\n\n我们在上一章介绍了 `@State`。这里我们将简要回顾一下，并讨论更多关于 SwiftUI 中数据流的概念。\n\n\n\n##\
  \ 数据驱动 UI\n\n在应用开发中，UI 通常代表数据与状态。当用户点击按钮或拨动开关时，事件会触发一个方法调用。在该方法中，我们通常编写用于更新当前数据的代码。\n\
  \n上一章中，我们了解了如何使用 `@State` 为切换开关指定数据源。通过将 `isReady` 布尔变量绑定到开关，我们发现拨动开关会更新该值。这一点通过标签文本的更新得到了验证。\n\
  \n同时，更改数据源（即 `isReady`）的值也会触发 UI 重新渲染。这包括让开关反映来自数据源的新布尔值。\n\n通过属性包装器（Property Wrapper），将此数据源（值）与\
  \ UI 绑定，可使两者自动保持同步。\n\n## 流程步骤\n\n上述过程包含几个步骤。这些步骤对用户和开发者来说大多是后台自动完成的。\n\n让我们再次快速查看状态变量和绑定的代码：\n\
  \n```\n@State private var isReady = false\nToggle(isOn: $isReady,\nlabel: {\nText(\"\
  Ready: \" + (isReady ? \"Yes\" : \"No\"))\n})\n```\n\n`isReady` 变量是`Toggle`的数据源。当其值变化时，UI\
  \ 会重新渲染，这会导致开关以及`Text`标签都得到更新。\n\n该过程的步骤如下：\n\n1. 用户操作 – 点击开关。\n2. 值更新 – `isReady`\
  \ 被切换。\n3. 视图更新 – `Toggle`和`Text`发生变化。\n4. UI 显示 – 界面在屏幕上渲染。\n\n每当绑定的属性发生变化时，UI\
  \ 就会在屏幕上渲染出更新后的内容。框架负责管理这种依赖关系。\n\n我们来看看如何使用`Stepper`（步进器）。`Stepper`可以接受多个闭包——一个用于处理用户点击减号(`-`)递减，一个用于处理点击加号(`+`)递增。以下是一个使用`Stepper`对属性进行增减的示例（图\
  \ 4-1）。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig1_HTML.jpg](img/497312_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** Stepper 代码\n\n在这个例子中，我们有一个`Stepper`和一个显示当前计数的标签。由于`Stepper`是唯一的 UI 元素，它不需要放在`VStack`中。但假设后续会添加更多\
  \ UI 元素，那么很可能在某个时候需要某种形式的堆栈。应用运行时，界面如图 4-2 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig2_HTML.jpg](img/497312_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2** Stepper UI\n\n然而，我们无需在闭包中编写值更改的逻辑，而是可以直接将计数器属性绑定到`Stepper`上。\n\n###\
  \ UI 中的计数器更新\n\n在本练习中，我们将添加代码，将一个`@State`属性绑定到`Stepper`上。这将使用一个不同的初始化器。我们需要的初始化器接收要绑定的值。\n\
  \n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig3_HTML.jpg](img/497312_1_En_4_Fig3_HTML.jpg)\n\
  \n**图 4-3** Stepper 初始化器\n\n1. 打开一个项目（现有或新建），点击`ContentView.swift`文件进行编辑。我们从一个空的`ContentView`的\
  \ body 定义开始。\n2. 创建一个`Stepper`实例，并注意代码补全的选项（图 4-3）。\n\n之前的示例使用了第一个初始化器。它接受两个闭包和一个标签参数。这次，我们将使用接受`StringProtocol`类型、一个值和一个范围的初始化器。该范围是`Stepper`值的闭区间数字。\n\
  \n代码如下所示：\n\n```\nStepper(\"\\(counter)\", value: $counter, in: 0...9)\n```\n\n\
  这段代码为我们做了几件事：\n\n1.  在`Stepper`旁边显示当前的计数器值。\n2.  将计数器作为数据源绑定到`Stepper`的值上。\n3. \
  \ 将`Stepper`的值限制在 0 到 9 之间。\n\nUI 看起来与之前几乎相同。功能也一样。但是，我们不再需要在代码中维护计数器值的更新逻辑。\n\n\
  框架为我们完成了更新状态并在 UI 中渲染变更的工作。\n\n## 可步进类型 (Strideable)\n\n你可能已经注意到，初始化器的 value 参数接受一个`Binding`类型。这就是为我们管理`@State`值的属性包装器。\n\
  \n`Binding`是一个包装值的结构体。被包装的值必须遵循`Strideable`协议。`Strideable`扩展了`Comparable`协议，而`Comparable`又扩展了`Equatable`协议。\n\
  \n因此，值属性必须实现以下所有方法：\n\n*   `==` (`Equatable`)\n*   `<` (`Comparable`)\n*   `<=`\
  \ (`Comparable`)\n*   `>` (`Comparable`)\n*   `>=` (`Comparable`)\n*   `distance(to\
  \ other: Self) -> Self.Stride`\n*   `advanced(by n: Self.Stride) -> Self`\n\n相等性比较和比较运算符非常直观。`distance`和`advanced`函数来自`Strideable`协议。\n\
  \n`distance`函数接收一个与`@State`绑定变量相同类型的值（例如，在我们的例子中是`Int`），并返回与另一个值之间的“距离”。`Int`是遵循`Strideable`的，所以\
  \ `5.distance(to: 100)` 返回 `95`。\n\n`Strideable` 有一个关联类型 `Stride`，它被定义为实现了 `Comparable`\
  \ 和 `SignedNumeric` 的类型。因此，从 `distance` 返回 `Self.Stride` 将是一个数字。对于 `Int` 的 `Strideable`\
  \ 实现，`Stride` 类型也是 `Int`：\n\n```\npublic typealias Stride = Int\n```\n\n`advanced`\
  \ 函数返回与其被调用值相同的类型（例如，在 `Int` 上调用 `advanced` 返回一个 `Int`）。它接收一个 `Self.Stride` 参数，该参数同样由该类型定义。所以对于\
  \ `Int`，调用 `advanced` 需要传入一个 `Int`，并返回一个按该值递增后的 `Int`。因此 `5.advanced(by: 5)` 返回\
  \ `10`。\n\n我们的计数器属性是一个 `Int`，它实现了所有这些方法，并且完全适用于我们的值参数。其他 Swift 数值类型如 `Double`、`Float`\
  \ 和 `Decimal` 也实现了 `Strideable`。\n\n其他控件也使用绑定，但 `Binding` 包装的类型可能是其他类型。例如，`Textfield`\
  \ 接受一个包装 `String` 的 `Binding`。这是我们熟知的一种类型！\n\n## 属性包装器 (Property Wrapper)\n\n`@State`\
  \ 属性包装器背后的类型是 `Binding`。如果你深入研究其定义，你会发现它是一个结构体，泛型参数 `Value` 即它所包装的值。和可选类型类似，它定义了各种初始化器、函数和扩展。\n\
  \n然而，由于我们将让框架来管理属性包装器的内存和处理，我们通常除了进行绑定之外，无需做其他事情。后续的值的包装和解包都将由系统处理。我们可以设置值（或者让 UI\
  \ 元素来设置），剩下的工作就由系统代劳了。\n\n\n\n### `@Binding`\n\n另一个用于绑定的指令是`@Binding`。这允许你指定另一个对象中的属性，以绑定到传入的内容。\n\
  \n我们可能希望将一个或多个 UI 元素提取到单独的结构体中。这样可以在整个代码中重用。但我们也可能希望该值基于使用我们新元素的上下文进行绑定。\n\n例如，如果我们想要像练习中设计的那样实现步进器控件，我们可以这样做。我们只需要创建一个实现`View`协议的新结构体，并将步进器控件放入其中，如图\
  \ 4-4 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig4_HTML.jpg](img/497312_1_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4**  \nMyStepper 结构体\n\n这里，我们有一个名为`MyStepper`的新结构体。它可以位于同一个文件或另一个文件中。在我们原始的`ContentView`中，可以通过`MyStepper()`在\
  \ UI 中包含此结构体，以替代我们之前的步进器代码。\n\n你可以像使用`Button`、`Text`或其他任何视图一样，在代码中包含任意数量的此类自定义视图类型。这有助于编写更清晰、更易于维护的代码，并且非常适合复用。\n\
  \n然而，在图 4-4 中，我们将计数器作为本地属性。我们真正想要的是能够将计数器基于外部数据源。\n\n`@State`适用于给定结构体内部。在这种情况下，数据源位于`MyStepper`实现之外。为此，我们使用`@Binding`指令。\n\
  \n因此，我们将`@State`替换为`@Binding`，从这样：\n\n```\n@State private var counter : Int = 0\n\
  ```\n\n变成这样：\n\n```\n@Binding var counter : Int\n```\n\n我们不需要提供默认值，因为它将在创建`MyStepper`时传入。注意，它不再是私有的，因为它需要被外部访问。Swift\
  \ 中的结构体会自动生成一个成员逐一初始化器。在我们的例子中，这个初始化器包含`counter`值。因此，创建`MyStepper`时的代码补全看起来像图 4-5\
  \ 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig5_HTML.jpg](img/497312_1_En_4_Fig5_HTML.jpg)\n\
  \n**图 4-5**  \n带有`counter`参数的 MyStepper 初始化器\n\n该属性的类型是一个`Binding<Int>`（属性包装器）。就像使用可选类型一样，我们可以直接传入类型（`Int`）。在我们的代码中，可以像这样传入原始的`counter`属性：\n\
  \n```\nMyStepper(counter: $counter)\n```\n\n现在，我们的`counter`属性作为属性包装器传入`MyStepper`并由系统管理。通过`MyStepper`更改值会更新我们本地的`counter`属性。\n\
  \n如果我们想要两个步进器呢？我们可以像添加第一个一样，精确地添加第二个`MyStepper`。\n\n如果我们将`counter`绑定到这两个步进器，会发生什么？试试看。提示：使用`VStack`或类似容器来对`MyStepper`实例进行分组。\n\
  \n```\nMyStepper(counter: $counter)\nMyStepper(counter: $counter)\n```\n\n由于两个`MyStepper`实例绑定到同一个值，它们都会更新同一个数据源。更新其中一个将会改变另一个的值。UI\
  \ 渲染将反映这些变化，如图 4-6 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig6_HTML.jpg](img/497312_1_En_4_Fig6_HTML.jpg)\n\
  \n**图 4-6**  \n具有相同绑定的 MyStepper 实例\n\n我将内边距改为仅在水平方向上，以使它们更靠近。除此之外，UI 符合预期：两个`MyStepper`通过同一个绑定保持同步。\n\
  \n那么文本输入框（`TextField`）的绑定呢？如前所述，`TextField`使用`String`而不是数值。这有什么不同吗？从表面和实践来看，并无区别。参数类型不再是`Binding<Strideable>`，而是`Binding<String>`。\n\
  \n让我们尝试创建另一个包含`TextField`的视图类型，并从`ContentView`进行绑定。\n\n**文本输入结构体**\n\n在这个练习中，我们将在\
  \ UI 中添加一个`TextField`。我们将创建另一个名为`MyTextInput`的结构体（可以在同一个文件或另一个文件中）。它需要一个文本输入框和一个用于绑定的属性。\n\
  \n创建一个名为`MyInput`的新结构体（在同一个文件或另一个文件中），如下所示：\n\n```\nstruct MyInput : View {\n}\n\
  ```\n\n它需要包含两部分：计算属性`body`和在创建时用于绑定的属性。\n\n在结构体声明下方添加绑定属性，如下所示：\n\n```\n@Binding\
  \ var stringVal : String\n```\n\n现在，在其下方开始编写`body`属性，如下所示：\n\n```\nvar body: some\
  \ View {\n}\n```\n\n使用至少包含标题和绑定的`TextField`元素来充实`body`属性，如下所示：\n\n```\nTextField(\"\
  Enter Value:\",\ntext: $stringVal,\nonEditingChanged: { (changed) in\nprint(changed)\n\
  }) {\nprint(\"commit: \\(self.stringVal)\")\n}\n```\n\n注意，这里提供了多个初始化器可供选择。其中包括一些带有闭包的初始化器，用于处理编辑状态的变化（开始编辑和结束编辑）。这个`onEditingChanged`闭包接受一个`Bool`参数，其中`true`表示值正在被编辑，`false`表示编辑结束。\n\
  \n另一个闭包是`onCommit`，当用户点击回车键时被调用。\n\n可选地为元素添加一些内边距，以匹配`MyStepper`的外观。\n\n```\n.padding(.horizontal,\
  \ 100)\n```\n\n在`ContentView`中添加一个`String`属性，用于绑定到`MyInput`。\n\n```\n@State private\
  \ var username = \"\"\n```\n\n在 UI 中，将带有`String`属性的`MyInput`添加到`MyStepper`下方。\n\n\
  ```\nMyInput(stringVal: $username)\n```\n\n在 UI 中，在`MyInput`下方添加一个显示该`String`属性的`Text`元素。\n\
  \n```\nText(username)\n```\n\n代码（不包括`MyStepper`部分）应类似于图 4-7 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig7_HTML.jpg](img/497312_1_En_4_Fig7_HTML.jpg)\n\
  \n**图 4-7**  \nMyInput 结构体及更新后的 ContentView body 属性\n\nUI 应类似于图 4-8 所示，文本输入框中的文本会显示在`Text`标签中。\n\
  \n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig8_HTML.jpg](img/497312_1_En_4_Fig8_HTML.jpg)\n\
  \n**图 4-8**  \n包含 MyStepper、MyInput 和 Text 的 UI\n\n我们可以看到，可以通过从创建它们的元素处进行绑定，来创建额外的\
  \ UI 元素。当然，我们也可以将多个 UI 元素绑定到我们创建的同一个绑定。\n\n### 章节总结\n\n在本章中，我们回顾了在给定结构体中使用`@State`作为属性包装器的概念。使用内置\
  \ UI 元素来管理和同步值可以减少编码工作，并避免因数据未同步而产生的 bug。\n\n我们还了解了数值类型的绑定如何与`Binding`结构体及其`Strideable`和`Stride`类型配合工作。同时，我们对`TextField`使用了`String`类型的绑定。\n\
  \n`@State`和`@Binding`有助于将值保存在单一数据源中。无需复制、更新或同步值。当用户更新其输入时，这些值会自动更新，UI 会重新创建，渲染显示出新的状态。\n\
  \n让框架为我们完成这些工作，可以减少编码时间和代码量。同时，代码也更具可维护性，并能受益于框架未来的更新。\n\n我希望你同意，以这些方式使用绑定是简化 UI\
  \ 及其与相关值之间关系的良好开端。\n\n我们将在后续内容中继续构建这些概念。我鼓励你练习我们所学的内容，并探索更多选项。尝试其他 UI 元素，如`Slider`、`Button`、`Toggle`、`Image`等。\n\
  \n\n\n"
- "# 5. 可观察对象\n\n在前面的章节中，我们使用了独立的属性来存储值。但在实际开发中，我们通常会遇到更复杂的模型。我们通常需要处理包含多个属性、用于表示数据的结构体或类。\n\
  \n在本章中，我们将探讨如何观察引用类型对象的属性更新。当属性发生变化时，用户界面将收到通知并进行更新。\n\n为了实现这一点，我们将使用 Combine 框架的部分功能。我们会在后面的章节中更详细地介绍该框架。现在，我们只需了解它如何满足我们绑定的需求。\n\
  \n我们将继续在 `SUINotes` 项目中进行开发。我们会在现有代码中添加一些新对象。对于 `ContentView` 结构体，我们将移除当前的属性和 body\
  \ 实现，然后重新开始。\n\n## 典型模型\n\n我们都熟悉结构体和类。下面是一个表示笔记对象的典型类：\n\n```\nenum Priority : Int\
  \ {\ncase low, medium, high\n}\nclass Note {\nvar text = \"\"\nvar updateAtTime\
  \ = Date()\nvar priority = Priority.medium\n}\n```\n\n这里，我们定义了一个 `Note` 类，它包含三个属性，类型分别为\
  \ `String`、`Date` 和 `Priority`。`Priority` 被定义为一个枚举，包含 low、medium 和 high 三个值。它还有一个底层类型\
  \ `Int`，因此 low、medium 和 high 分别映射到 0、1 和 2。这有助于进行优先级值的比较。\n\n另外，`Note` 的所有属性都有默认值，所以我们不需要定义初始化器。\n\
  \n我们希望在用户界面上显示笔记对象的内容，因此需要一个 `Note` 实例。由于 `Note` 类包含一个 `Date` 属性，我们还需要创建一个 `DateFormatter`。\n\
  \n在移除所有之前的属性后，`ContentView.swift` 中的 `ContentView` 结构体属性如下所示：\n\n```\nstruct ContentView:\
  \ View {\nvar note = Note()\nvar df = DateFormatter()\n...\n```\n\n但是我们需要为 `df`\
  \ 实例设置样式。为此，我们将为 `ContentView` 创建一个初始化器。它看起来像这样：\n\n```\ninit() {\ndf.dateStyle\
  \ = .none\ndf.timeStyle = .medium\nnote.text = \"Note Text\"\n}\n```\n\n注意，我还将 `note.text`\
  \ 属性设置为一个非空字符串值。这样，用户界面上就有内容可以显示了。\n\n显示 `Note` 实例的内容相当简单。我们可以使用两个 `Text` 项来显示文本和\
  \ `createdAt` 属性。`DateFormatter` 会为我们的 `Date` 生成一个格式美观的 `String`。\n\n### 构建笔记界面\n\
  \n在本练习中，我们将按照当前定义的方式来构建显示模型的用户界面。这包括两个 `Text` 项作为起始。\n\n1.  如果尚未定义，请按前面所示定义 `Priority`\
  \ 枚举和 `Note` 类。\n\n2.  将 body 实现替换为 `VStack` 中的两个 `Text` 项：一个用于显示文本，另一个用于显示 `updatedAtTime`。\n\
  \n代码如下：\n\n```\nvar body: some View {\nVStack {\nText(note.text)\nText(df.string(from:\
  \ note.updatedAtTime))\n}\n}\n```\n\n对于优先级，我们希望使用比纯文本更具视觉表现力的方式。让我们使用星形图像。SF Symbols\
  \ 为此提供了多种选项。我们将使用 `star.circle` 图像。\n\n3.  为优先级的 `star.circle` 图像添加一个 `HStack`：\n\
  \n```\nHStack {\nImage(systemName: \"star.circle\")\nImage(systemName: note.priority.rawValue\
  \ > 0\n? \"star.circle\" : \"circle\")\nImage(systemName: note.priority.rawValue\
  \ > 1\n? \"star.circle\" : \"circle\")\n}\n```\n\n4.  运行应用程序 (`⌘+r`) 并验证用户界面是否按预期显示。\n\
  \n对于默认优先级为 `.medium` 的笔记，用户界面将如图 5-1 所示。\n\n![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig1_HTML.jpg](img/497312_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1 笔记界面\n\n你可以随意调整用户界面，使其以不同的方式显示。这将是我们后续实现模型变化时更新用户界面的基础。\n\n如果笔记发生变化，我们希望显示这些变化。这些变化可能是文本、日期或优先级。我们将为\
  \ `Note` 的文本和优先级属性添加观察者：\n\n```\nclass Note : ObservableObject {\nvar text = \"\"\
  \ {\ndidSet {\nself.updatedAtTime = Date()\n}\n}\nvar updatedAtTime = Date()\nvar\
  \ priority = Priority.medium {\ndidSet {\nself.updatedAtTime = Date()\n}\n}\n}\n\
  ```\n\n每当文本或优先级发生变化时，`updatedAtTime` 也会随之更新。\n\n让我们添加一个按钮来更新笔记的文本：\n\n```\nButton(action:\
  \ {\nlet newTime = self.df.string(from:Date())\nself.note.text = \"now \\(newTime)\"\
  \nprint(self.note.text)\n}) {\nText(\"Update\")\n}\n```\n\n现在用户界面如图 5-2 所示。\n\n\
  ![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig2_HTML.jpg](img/497312_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2 带更新按钮的笔记界面\n\n我还会打印出新的文本值，以验证它是否正在更新。\n\n如果我们运行它，会看到输出显示 `updatedAtTime`\
  \ 被设置为当前时间（例如，“now 4:53:39 PM”），但用户界面并没有更新。这是为什么呢？\n\n## 绑定？\n\n你可能认为这是因为没有绑定到该值。确实如此。然而，与\
  \ `Toggle` 或类似控件不同，`ContentView` 并没有一个需要传递的值。更重要的是，`Note` 可能由其他对象创建并传入 `ContentView`。\n\
  \n如果你在处理现有代码库，模型可能已经定义并实现了。我们不想开始要求类变成结构体，某些值带有 `@Binding` 并被传入，可能还需要新的初始化器等等。\n\
  \n不，相反，我们希望尽可能少地改动模型。\n\n## 观察引用对象\n\n这就是 Combine 框架的用武之地。我们稍后会花更多时间研究它。现在，我们只需要理解它可以用于发布更新。\n\
  \n当你拥有可以在整个代码中传递的**引用类型**时，这非常有用。它可能在你不知情的情况下随时发生变化。但是通过使用 `ObservableObject`，你的用户界面可以保持最新状态。\n\
  \n当我们研究 `State`/`Binding` 时，数据源位于我们的 `ContentView` 中。我们使用属性包装器将该值传递给另一个对象。变化发生在其他代码中，但数据源仍然是源并得到更新。\n\
  \n对于绑定对象，情况实际上是相反的。相关的对象是数据源，我们想知道何时发生了变化。怎么做呢？\n\n`ObservableObject` 协议就是答案。在我们的例子中，就是\
  \ `Note` 类——这也是我们使用类对象来表示 `Note` 的部分原因。它需要是一个引用类型。\n\n## ObservableObject 协议\n\n\
  `ObservableObject` 协议继承自 `AnyObject` 协议。这意味着它只能由类（而不是结构体或枚举）实现。\n\n因此，让我们声明 `Note`\
  \ 类遵循 `ObservableObject`。首先，我们需要在文件顶部导入 Combine 框架：\n\n```\nimport Combine\n```\n\
  \n然后，我们像这样更新 `Note` 类代码：\n\n```\nclass Note : ObservableObject {...\n```\n\n注意，你不会收到任何警告或错误。这总是件好事。`ObservableObject`\
  \ 中没有必需的、同时又没有提供默认实现的东西。\n\n对 `Note` 的更改需要发布，并且系统已经为我们创建了一个默认的发布者！\n\n我们还需要修改 `ContentView`\
  \ 中的 note 属性。这里我们将像使用 `State` 和 `Binding` 一样使用另一个属性包装器。它叫做 `ObservedObject`，我们需要像这样将它添加到我们的\
  \ note 属性上：\n\n```\n@ObservedObject var note = Note()\n```\n\n我们已经告诉编译器，`Note` 类是可观察的。当然，没有人强制要求观察它。我们的\
  \ `ContentView` 想要观察它，并且已经如此声明了。现在只差最后一步了。\n\n\n\n### 发布更新\n\n有两种简单的方法可以接收对`ObservedObject`上值变更的更新。这两种方法都由实现`ObservableObject`的对象控制。\n\
  \n这意味着`ObservableObject`控制着发布什么内容以及何时发布。\n\n在我们的示例中，我们最关心的是`Note`中`text`属性的变化。我之前提过，`ObservableObject`对其所需的组成部分有默认实现。其中之一是一个发布器，属性名为`objectWillChange`。\n\
  \n利用这个默认发布器，我们可以在任何内容发生变化时发送新值。我们在`Note`的`text`属性上已经有一个`didSet`观察器。那是发布变更的理想位置。代码如下所示：\n\
  \n```\nvar text = \"\" {\n    didSet {\n        self.updatedAtTime = Date()\n  \
  \      self.objectWillChange.send()\n    }\n}\n```\n\n现在当我们点击更新按钮时，`text`和`updatedAtTime`的文本框都会更新。更新效果如图\
  \ 5-3 所示。\n\n![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig3_HTML.jpg](img/497312_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3**  \n带有更新的 Note 界面\n\n在发布器上调用`.send`无疑是发送更新的简便方法。当你只希望在关键时间点发布变更时，这种方法尤其出色。也许你想等到特定事件发生（比如写入数据库）之后才发布值。\n\
  \n你可能有一个类只在特定时间间隔发布更新。或者你可能只想在属性达到某个阈值或其他条件满足时才发布。在这些情况下，发布器上的`.send`调用非常有用。\n\n\
  在我们的例子中，我们希望每当设置新`text`值时都能发布。在`didSet`观察器中调用`.send`可以很好地满足这个需求。另一个针对属性所有变更的处理方式是使用`@Published`属性。\n\
  \n## @Published\n\n属性上的`@Published`属性会创建一个该类型的发布器。我们可以将此属性添加到`Note`中的`text`属性上。同时，我们现在可以移除`didSet`观察器中对`.send`的调用。\n\
  \n在我们的示例中，结果将是相同的。在界面中点击更新按钮将更新`text`，随后发布该更新，界面也会随之更新。\n\n现在的代码如下所示：\n\n```\n@Published\
  \ var text = \"\" {\n    didSet {\n        self.updatedAtTime = Date()\n    }\n\
  }\n```\n\n我们可能还想为其他属性添加`@Published`。在我们的示例中，发布`priority`是合理的。而发布`updatedAtTime`可能是最有意义的做法。这种情况下，如果代码编写得当，只要对象被更新，它就会发布。\n\
  \n让我们尝试点别的。\n\n**用于更改优先级的定时器**\n\n让我们修改`Note`类，使其在特定时间后自动创建优先级。我们将为`Note`添加一个带有`Timer`的`init`方法。当定时器触发时，每次会将优先级提升一级。\n\
  \n1.  将`Note`的默认优先级更改为`.low`：\n\n2.  为`Note`类添加一个初始化器：\n\n    ```\n    init() {\n\
  \    }\n    ```\n\n3.  在`init`中添加一个`Timer`，每隔 X 秒（例如 10 秒）触发一次并重复执行。`Timer`闭包的主体应将优先级提升一级。\n\
  \n    ```\n    Timer.scheduledTimer(withTimeInterval: 10.0,\n                  \
  \       repeats: true) { (timer) in\n        self.priority = Priority(rawValue:\n\
  \            self.priority.rawValue + 1) ??\n            Priority.high\n       \
  \ if self.priority == .high {\n            timer.invalidate()\n        }\n    }\n\
  \    ```\n\n```\nvar priority = Priority.low {...\n```\n\n每 10 秒，定时器会触发一次。它会根据当前优先级的原始值加\
  \ 1 来创建一个新的优先级。如果该数值过高，则默认为 `Priority.high`。\n\n如果优先级设置为 `.high`，定时器将失效。我们可能希望保持定时器运行，以防用户将优先级设回较低级别。当前界面中没有此功能，因此暂时无需考虑。\n\
  \n1.  运行应用并验证优先级是否每 10 秒增加一次，直到变为高优先级。\n\n第一个和最后一个结果应如图 5-4 所示。\n\n![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig4_HTML.jpg](img/497312_1_En_5_Fig4_HTML.jpg)\n\
  \n**图 5-4**  \n自动更新界面：初始和最终状态\n\n通过这个练习，我们看到无论变更是由用户交互还是其他方式触发，这些变更都会被发布。\n\n##\
  \ 本章小结\n\n使用 `ObservableObject` 协议允许引用类型对象发布其更改。你可以通过少量修改，让新的或现有的模型类实现 `ObservableObject`。\n\
  \n这使得对现有代码的改动非常微小。如果你曾经给遗留代码添加过 `Codable` 协议，你就知道这能有多简单。\n\n对于需要关注更新的代码，添加的内容也很少。可能只需为属性添加`@ObservedObject`属性。\n\
  \n本章我们介绍了一些结合 Combine 的复杂概念。虽然幕后有很多操作，但我们只需执行几个步骤：\n\n1.  导入 Combine。\n2.  为 `Note`\
  \ 添加 `@ObservableObject`。\n3.  为 `note` 属性添加 `@ObservedObject`。\n4.  决定是：\n    -\
  \ 在发布器上调用 `.send`，还是\n    - 为属性添加 `@Published`\n\n"
- "# 6. 环境值\n\n到目前为止，我们已经了解了如何在给定视图中使用`State`属性包装器处理值。我们还了解了如何通过`Binding`将局部值绑定到外部变量。\n\
  \n在这两种情况下，我们的代码都需要创建和控制这些值。这些值通过属性包装器进行传递。以这种方式使用属性包装器可以保持数据源的孤立性和同步性。\n\n但是，那些可能在别处创建的值呢？那些可能影响整个应用或设备的值呢？\n\
  \nSwiftUI 也通过环境值和对象提供了解决方案。\n\n\n\n## 环境值\n\n使用 SwiftUI 可以轻松获取各种环境值。如果您的界面基于这些值，那么更改这些值将使当前视图失效。这意味着会为用户创建并渲染一个新视图。综上所述，这意味着您界面中使用的值的更改将触发必要的更新。\n\
  \nSwiftUI 提供了可从环境中访问的丰富值列表。这些值涵盖辅助功能设置、配色方案、控件属性，甚至 CoreData 等领域。\n\n您可以在此处查看 SwiftUI\
  \ 中所有可用的变量：[`https://developer.apple.com/documentation/swiftui/environmentvalues`](https://developer.apple.com/documentation/swiftui/environmentvalues)。\n\
  \n让我们以配色方案为例进行简单说明。要在代码中访问该值，我们需要为变量使用 `@Environment` 属性包装器。我们指定所需特定值的键路径。代码如下所示：\n\
  \n```\n@Environment(\\.colorScheme) var lightOrDark\n```\n\n现在，我们将配色方案值存储在一个名为 `lightOrDark`\
  \ 的属性中。在我们的界面中，我们可以根据此值调整界面。然后，如果该值发生变化，我们的界面就会更新。\n\n假设我们希望按钮标题“更新”在普通模式下为蓝色，在深色模式下为绿色。现在，我们可以使用\
  \ `lightOrDark` 的值来确定这一点。\n\n使用上一章的项目，我将使用 `lightOrDark` 来设置强调色。\n\n```\nText (\"\
  更新\")\n.accentColor(lightOrDark == .light ?\n.blue : .green)\n```\n\n在模拟器中运行时，如果深色模式关闭，界面将显示一个蓝色标题的按钮。如果我们在支持深色模式的模拟器/设备上切换到深色模式（⇧⌘A），按钮将切换到绿色，如图\
  \ 6-1 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig1_HTML.jpg](img/497312_1_En_6_Fig1_HTML.jpg)\n\
  \n图 6-1\n\n界面更新为深色模式\n\n我们的 `Text` 项目是使用默认设置创建的。默认情况下，它使用系统标签颜色。该颜色会根据深色模式设置而变化。如果您检查或打印出\
  \ `UIColor.label.cgColor`，它也会根据当前的深色模式设置而变化。\n\n这两个 `Text` 项目会自动更新。按钮文本项目也是如此。因此，默认情况下，这些项目会根据深色模式设置进行更新。或者，我们也可以像前面的代码那样，以自定义方式处理。\n\
  \n### 每个视图的设置\n\n每个视图都继承其父视图的环境设置。但是，您可以在创建视图时覆盖这些设置。\n\n我们的 `Button` 有一个用于标题的 `Text`\
  \ 项目。在上一节中，我们根据 `lightOrDark` 值设置了该标题的颜色。对于当前我们整个（小型）应用，我们都在使用相同的环境设置。\n\n当我们的 `ContentView`\
  \ 被创建时，环境被继承并传播到它的所有视图：`Text`、`Button` 等等。但是，我们可以改变这一点。我们可以在创建视图时修改环境。\n\n要修改环境，我们在视图创建的返回值上使用\
  \ `.environment` 修饰符。假设我们想强制我们的顶部 `Text` 项目始终处于深色模式。当然，当背景为白色时，白色文本将不可见，因此我还会添加一个灰色的背景修饰符。\n\
  \n```\nText(note.text)\n.environment(\\.colorScheme, .dark)\n.background(Color.gray)\n\
  ```\n\n我使用 `.environment` 修饰符指定配色方案的键路径和一个值（即 `.dark`）。该枚举的另一个值选项是 `.light`。现在，界面强制此\
  \ `Text` 使用深色模式。运行应用并切换到深色模式，看起来如图 6-2 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig2_HTML.jpg](img/497312_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2\n\n界面更新为深色模式\n\n使用方法链，我们可以同时调用 `.environment` 和 `.background` 修饰符。类似地，我们可以调用多个\
  \ `.environment` 修饰符并更改不同的值。\n\n这些更改随后将被该视图创建的所有子视图继承。在我们的例子中，这似乎不适用。然而，我们无法控制 `Text`，也不知道它创建了什么。如果我们查看视图层次结构渲染（调试\
  \ ➤ 视图调试… ➤ 捕获视图层次结构），如图 6-3 所示，我们会发现 `Text` 项目可能比我们想象的更复杂。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig3_HTML.jpg](img/497312_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n界面的 3D 渲染\n\n这里值得学习的一点是，外观可能比看起来更复杂。因此，虽然仅设置一个值（例如 `accentColor`）可能看似可行，但您应该考虑核心更改应该是什么（例如\
  \ `colorScheme`）。\n\n早些时候，我们研究了将环境设置传递到 `Text` 元素中。如果我们先将界面的一部分提取到单独的结构体中，也可以做同样的事情。\n\
  \n注意 带环境的视图\n\n在本练习中，我们将提取显示 `Note` 的界面项。我们将它们放入一个新的 `View` 中，并让该结构体控制笔记详细信息的显示。\n\
  \n然而，我们希望创建元素（即我们应用中的 `ContentView`）来控制环境。除了 `Note` 实例和 `.environment` 修饰符之外，我们不希望\
  \ `ContentView` 控制新创建的 `NoteView` 的界面其他方面。\n\n在浅色（左）和深色（右）模式下，我们希望界面看起来如图 6-4 所示。\n\
  \n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig4_HTML.jpg](img/497312_1_En_6_Fig4_HTML.jpg)\n\
  \n图 6-4\n\n浅色（左）和深色（右）模式下的 NoteView\n\n您可以尝试在查看以下步骤和代码之前自行解决。简而言之，您需要将与 `Note` 相关的界面元素放入一个符合\
  \ `View` 协议的新 `NoteView` 结构体中。将 `.environment` 修饰符分开，并在新创建的 `NoteView` 元素上调用它。\n\
  \n1.  创建一个名为 `NoteView` 的新结构体，使其符合 `View`：\n\n```\n    struct NoteView : View {\n\
  \    }\n```\n\n2.  在 `NoteView` 中添加一个包含 `VStack` 的计算属性 `body`：\n\n```\n    var body:\
  \ some View {\n    VStack {\n    }\n    }\n```\n\n3.  在 `VStack` 的底部，添加 `.background`\
  \ 修饰符：\n\n1.  将 `ContentView` 的 `body` 中的两个 `Text` 元素和包含 `Image` 项目的 `HStack` 剪切并粘贴到\
  \ `NoteView` 的 `VStack` 中。\n\n\n\n```swift\nText(note.text)\nText(df.string(from:\
  \ note.updatedAtTime))\nHStack {\n    Image(systemName: \"star.circle\")\n    Image(systemName:\
  \ note.priority.rawValue > 0\n        ? \"star.circle\" : \"circle\")\n    Image(systemName:\
  \ note.priority.rawValue > 1\n        ? \"star.circle\" : \"circle\")\n}\n```\n\n\
  ```swift\n}.background(Color.gray)\n```\n\n\"Update\"按钮位于`ContentView`的 body 中。\n\
  \n1. 向`NoteView`添加一个`Note`属性：\n\n```swift\nvar note : Note\n```\n\n该属性将被传入，因此不要将其设置为任何值。\n\
  \n2. 类似地，添加一个将被传入的`DateFormatter`属性：\n\n```swift\nvar df : DateFormatter\n```\n\n\
  `NoteView`结构体已定义并可投入使用（图 6-5）。它包含了`Note`和`DateFormatter`这两个属性。我们在`ContentView`中已经有了这些属性。我们将使用`ContentView`中的这两个值来创建`NoteView`。\n\
  \n![图 6-5](img/497312_1_En_6_Fig5_HTML.jpg)\n\n*图 6-5：NoteView 及其属性和从 ContentView\
  \ 的 VStack 中移出的 UI 元素*\n\n3. 在`ContentView`的 body 属性中，创建一个新的`NoteView`实例。它应该放在之前`NoteView`的\
  \ body 中放置两个`Text`项和`Image`的`HStack`的位置（就在`Button`上方）：\n\n```swift\nNoteView(note:\
  \ self.note, df: df)\n```\n\n现在我们已经定义了自己的 UI 元素。我们可以像之前对`Text`所做的那样，将环境设置传递给我们的`NoteView`。\n\
  \n![图 6-6](img/497312_1_En_6_Fig6_HTML.jpg)\n\n*图 6-6：NoteView UI*\n\n4. 将之前应用于`Text`项的相同`.environment`修饰符添加到`NoteView`上。步骤\
  \ 7 和 8 合并后如下所示：\n\n```swift\nNoteView(note: self.note, df: df)\n    .environment(\\\
  .colorScheme, .dark)\n```\n\n5. 更新 Canvas 中`NoteView`的预览，它应该看起来像图 6-6。\n\n基本上，这就是我们想要的效果。我们展示了可以创建一个`NoteView`来自我控制，同时让父视图控制其环境。\n\
  \n然而，有两个问题。底部的内边距不太美观。此外，如果你在模拟器中运行它，可能会注意到优先级星星不再更新。\n\n这两个问题都很容易解决。对于内边距问题，我们仍然可以通过`.padding`修饰符在`NoteView`中控制\
  \ UI。如果我们在`NoteView`的`VStack`上添加内边距，它会在底部产生一个白色空间。这是因为内边距位于视图外部。这不是我们想要的效果。\n\n\
  相反，如果我们将内边距添加到最后一个 UI 项（即如下代码中的`HStack`），它就会显示正确：\n\n```swift\nHStack {\n    Image(systemName:\
  \ \"star.circle\")\n    Image(systemName: note.priority.rawValue > 0\n        ?\
  \ \"star.circle\" : \"circle\")\n    Image(systemName: note.priority.rawValue >\
  \ 1\n        ? \"star.circle\" : \"circle\")\n}\n.padding(.bottom)\n```\n\n为了使`Note`的优先级更新，我们需要在\
  \ UI 中使用与在`ContentView`中创建的相同的`Note`实例。我们可以在`NoteView`中使用`ObservedObject`属性包装器。\n\
  \n6. 在`NoteView`中添加一个`ObservedObject`：\n\n```swift\n@ObservedObject var note : Note\n\
  ```\n\n既然我们现在让`NoteView`控制 UI 以更新笔记实例，我们可以从`ContentView`的属性中移除`@ObservedObject`：\n\
  \n```swift\nstruct ContentView: View {\n    var note = Note()\n```\n\n一旦我们创建了`Note`（如上）并将其传递给`NoteView`，更改将发布到`NoteView`而不是`ContentView`。\n\
  \n![图 6-7](img/497312_1_En_6_Fig7_HTML.jpg)\n\n*图 6-7：带优先级更新的 NoteView*\n\n7. 再次运行应用程序，验证优先级星星是否如图\
  \ 6-7 所示更新。\n\n暗黑模式的变化也已处理，如图 6-8 所示。请确保你使用的是支持暗黑模式的模拟器/设备。\n\n![图 6-8](img/497312_1_En_6_Fig8_HTML.jpg)\n\
  \n*图 6-8：暗黑模式下的 NoteView UI*\n\n**加分项**：作为额外练习，在`colorScheme`设置之后添加另一个`.environment`修饰符。尝试使用`\\\
  .font`键路径并为`NoteView`的环境设置字体。你可以将其设置为类似：\n\n```swift\nFont.system(.largeTitle)\n\
  ```\n\n在这个练习中，我们看到了如何让一个给定的视图控制自己的 UI。但我们也可以从父视图通过`.environment`修饰符来控制环境。\n\n###\
  \ 应用环境\n\n就像我们在创建`NoteView`时调用`.environment`修饰符一样，我们也可以在其他地方这样做。在模板为你创建的`SUINotesApp.swift`文件（根据项目名称命名）中，我们的`ContentView`被创建用于在模拟器/设备上运行应用程序（与\
  \ Canvas 相对）。\n\n就像我们创建`NoteView`一样，我们也可以为`ContentView`设置一些环境设置。因此，如果我们希望应用程序在暗黑模式下运行、使用固定字体、设置截断模式或其他各种设置，我们都可以在那个地方完成。\n\
  \n但请记住，这意味着你正在为该视图及其子视图设置环境。如果你将`colorScheme`设置为暗黑（或明亮）而系统处于明亮（或暗黑）模式，你只是为你的`ContentView`及其子视图更改了它——而不是为整个设备更改。但你的应用程序会一直以暗黑模式运行，无论用户如何设置设备。\n\
  \n或者，在你的`ContentView`实例上，你可以设置像`Font`这样的属性，它将会传播：\n\n```swift\nContentView()\n \
  \   .environment(\\.font, Font.system(.largeTitle))\n```\n\n如果你在`ContentView_Previews`代码中这样创建`ContentView`，你的预览将在\
  \ Canvas 中使用此设置。\n\n如果你在`SUINotesApp.swift`文件的`ContentView`创建代码中这样做，那么在模拟器或设备上运行时将使用这些设置。\n\
  \n\n\n## `EnvironmentObject` 属性包装器\n\n有时，你想要监视变化的对象并非直接来自父视图。如果为了将其传递到最终的目标视图而经过多层视图传递，可能是一种糟糕的设计。\n\
  \n在我们的应用中，`Note` 实例是在 `ContentView` 中创建的，但这可能并非最佳或正确的位置。也许我们有一个在其他地方管理的模型。`ContentView`\
  \ 可能没有理由处理它，更不用说创建它了。\n\n在这种情况下，我们可以在 `NoteView` 中对 `Note` 使用 `@EnvironmentObject`\
  \ 属性包装器。我们的 `NoteView` 可以像之前一样请求 `Note` 实例。`ContentView` 就无需再处理 `Note` 了。\n\n这意味着我们可以从\
  \ `ContentView` 中移除 `note` 属性。此外，我们还需要从 `ContentView` 结构体代码中删除所有对它的引用。至此，我们的 `ContentView`\
  \ 变得相当精简，如图 6-9 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig9_HTML.jpg](img/497312_1_En_6_Fig9_HTML.jpg)\n\
  \n图 6-9  \n不含 `Note` 的 `ContentView` 代码\n\n类似地，我们可以将 `DateFormatter` 移到 `NoteView`（下方）中，`ContentView`\
  \ 则变得更加精简，如图 6-10 所示。如果你之前添加了 `lightOrDark` 属性，也可以一并移除。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig10_HTML.jpg](img/497312_1_En_6_Fig10_HTML.jpg)\n\
  \n图 6-10  \n不含 `DateFormatter` 的 `ContentView` 代码\n\n我们的 `NoteView` 因为加入了 `DateFormatter`\
  \ 而变得稍显臃肿，但这可能正是它该在的位置——具体取决于需求（见图 6-11）。由于创建 `NoteView` 时没有传入 `note`，也没有通过初始化器设置它，我们遇到了一个错误。我们将通过更改属性包装器，以及设置\
  \ `note` 属性的方式来解决这个问题。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig11_HTML.jpg](img/497312_1_En_6_Fig11_HTML.jpg)\n\
  \n图 6-11  \n包含 `DateFormatter` 且报错的 `NoteView`\n\n`ContentView` 与模型 `Note` 实例无关。然而，`NoteView`\
  \ 需要它，因此我们遇到了编译错误。这就是 `@EnvironmentObject` 发挥作用的地方。我们将告诉 `NoteView` 从环境中获取它。\n\n\
  因此，在我们的 `note` 声明中添加属性包装器：\n\n```\n@EnvironmentObject var note : Note\n```\n\n我们将在第\
  \ 15 章详细讨论这一点。简而言之，由于 `Note` 结构体已经被定义为 `ObservableObject`，因此使用 `@EnvironmentObject`\
  \ 包装器声明它的属性是可行的。\n\n现在，`NoteView` 中的 `note` 已经处理好了。但是，`Note` 实例实际上从未被设置。如果我们运行应用，它会因以下错误而崩溃：\n\
  \n```\nFatal error: No ObservableObject of type\nNote found. A View.environmentObject(_:)\n\
  for Note may be missing as an ancestor of\nthis view.: file SwiftUI, line 0\n```\n\
  \n我们需要在环境中设置一个 `Note`。它不再由创建者传入。这意味着我们可以在 `NoteView` 创建之前的任何时候在环境中定义和设置它。这可以在模型管理类或结构体中完成，或者在任何其他地方进行。为了演示，我们换一个地方来定义和设置它。\n\
  \n我们将在 `SUINotesApp.swift` 中使用 `.environmentObject` 修饰器来完成。首先，我们创建一个 `Note` 实例作为\
  \ `SUINotesApp` 结构体的属性：\n\n```\nstruct SUINotesApp: App {\nvar note : Note {\nlet\
  \ aNote = Note()\naNote.text = \"SUINotesApp.swift\"\nreturn aNote\n}\n```\n\n在\
  \ body 属性的 `WindowGroup` 中，我们将像之前一样创建我们的 `ContentView`，但要为 `Note` 实例添加 `.environmentObject`\
  \ 调用：\n\n```\nContentView()\n.environment(\\.font,\nFont.system(.largeTitle))\n\
  .environmentObject(note)\n```\n\n如果我们现在在模拟器或设备（而非 Canvas 预览）中运行应用，它会使用来自环境的这个 `note`。由于我们在\
  \ `SUINotesApp` 结构体中执行此操作，这些更改不会影响 Canvas 中的预览。要实现预览同步，我们需要在 `CodeView_Previews`\
  \ 中添加类似的代码，我们将在下一节中完成。\n\n更新（例如，优先级星标）仍然会传递到 UI，如图 6-12 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig12_HTML.jpg](img/497312_1_En_6_Fig12_HTML.jpg)\n\
  \n图 6-12  \n使用环境中 `Note` 的 UI\n\n你注意到什么隐藏细节了吗？我们刚刚在环境中设置了一个 `Note`，`NoteView` 就获取到了它。没有键值，没有访问器。它就这样获取到了我们想要的那个实例。\n\
  \n还记得我们之前看到的错误信息吗？它说“找不到类型为 `Note` 的 `ObservableObject`。”它是“按类型”查找的。所以当 `NoteView`\
  \ 被创建时，它获取了类型为 `Note` 的那个（唯一的）条目。\n\n因此，如果我们稍后替换它，或者在 `ContentView` 中运行 `.environmentObject`\
  \ 修饰器来覆盖通常继承的环境，`NoteView` 将获取到新的那个。\n\n如果你需要多个笔记，你可能需要在环境中添加一个数组、管理器类或某个单例。或者你会发现，将条目存储在环境中并不适合你的需求。\n\
  \n### 预览环境\n\n你可能也注意到你的预览无法工作了。由于我们现在是在 `SUINotesApp` 结构体中创建 `Note`，我们的 `ContentView_Previews`\
  \ 无法获得那个环境设置。\n\n我们可以在 `ContentPreview` 的预览计算属性中设置它，但这有点棘手。\n\n一方面，`previews` 属性是静态的。如果\
  \ `Note` 实例是在它外部创建的，那么这个实例也需要是静态的，如下所示：\n\n```\nstruct ContentView_Previews: PreviewProvider\
  \ {\nstatic var note = Note()\nstatic var previews: some View {\nContentView()\n\
  .environmentObject(note)\n}\n}\n```\n\n但由于它是静态的，我们没有机会初始化 `note` 的 `text` 属性。所以在这个例子中，文本项将是空的。\n\
  \n也可以像下面这样将其定义为静态的计算属性：\n\n```\nstatic var note : Note {\nlet note = Note()\nnote.text\
  \ = \"Static Computed\"\nreturn note\n}\n```\n\n你也可以在 `.environmentObject` 调用中直接创建实例，如下所示：\n\
  \n```\n.environmentObject(Note())\n```\n\n根据你希望预览呈现的效果，你有多种选择。类似地，我们已经看到在选择何时创建对象、如何传递或访问它、什么是事实来源以及其他相关可能性方面，也存在多种选项。\n\
  \n\n\n### 用法\n\n接下来要探讨的问题是，在何种情况下应使用哪种类型的属性包装器和可观察绑定。\n\n`@State` 属性包装器最适合用于单个视图内的值。如果你有一个计数器或计时器的起始值，并且希望\
  \ UI 保持同步，那么 `@State` 可能正好合适。\n\n`@Binding` 适用于数据真实来源位于其他位置的情况。`MyStepper` 视图使用此属性包装器来修改自身外部的数据真实来源。任何创建\
  \ `MyStepper` 实例的对象都需要使用 `$` 符号来传递数据真实来源以进行绑定。\n\n`@ObservedObject` 适用于声明为遵循 `ObservableObject`\
  \ 协议的引用类型（例如类）。如果你使用 `@ObservedObject` 包装器声明属性实例，则需要编写类的实现代码来发布更新。这可以通过调用发布者（例如\
  \ `self.objectWillChange.send()`）或使用 `@Published` 声明属性来实现。\n\n因此，`@ObservedObject`\
  \ 最适合用于需要监控更新以刷新 UI 的引用类型。如果你的应用中已有引用类型模型，并且正在转换为 SwiftUI，这也是一个不错的选择。它对现有模型代码的改动要求很小。\n\
  \n`@Environment` 适合根据内置键路径常量（如 `.colorScheme`）来获取和设置环境变量。这些设置在视图创建时会向下传递。视图的环境设置可以在创建时通过视图上的\
  \ `.environment` 修改器进行设置。\n\n环境设置非常适合跨应用或沿应用路径访问值。它们不需要专门传递——只需继承即可。\n\n`@EnvironmentObject`\
  \ 用于声明一个按“类型”从环境中加载的对象。关键的是，这个值必须实际设置，否则应用会崩溃。与环境设置类似，这些值可以在视图创建时设置，并通过继承向下传递。环境对象通过\
  \ `.environmentObject` 修改器进行设置。\n\n环境对象与环境设置类似。如果你需要在应用的多个位置访问某个对象，但又不便四处传递该对象，环境对象是一个不错的选择。\n\
  \n## 自定义环境值\n\n向环境中添加自己的值并不困难。你需要一个遵循 `EnvironmentKey` 的结构体，该结构体有一个必需的、只读的静态计算属性：\n\
  \n```\nstatic var defaultValue: Self.Value { get }\n```\n\n实现该属性后，只需让 `defaultValue`\
  \ 返回默认值即可。如果我们想存储 `Note` 文本字段的默认值，其类型应为 `String`。那么我们的环境键可以这样写：\n\n```\nstruct NoteInitialTextEnvironmentKey:\
  \ EnvironmentKey{\n    static var defaultValue: String = \"Default Note\"\n}\n```\n\
  \n在扩展的 `EnvironmentValues` 中，我们可以添加一个计算属性，使用该键来获取和设置我们的值。我们给该属性起的名字就是我们用来访问它的键路径。我们将其命名为\
  \ `defaultNoteText`：\n\n```\nextension EnvironmentValues {\n    var defaultNoteText:\
  \ String {\n    }\n}\n```\n\n我们在此定义的键将用于 `EnvironmentValues` 的下标访问中：\n\n```\nget\
  \ {\n    return self[NoteInitialTextEnvironmentKey.self]\n}\nset {\n    self[NoteInitialTextEnvironmentKey.self]\
  \ = newValue\n}\n```\n\n定义好上述代码后，我们可以使用 `.environment` 修改器设置默认的 Note 文本：\n\n```\n\
  .environment(\\.defaultNoteText, \"New Default\")\n```\n\n并且我们可以像获取其他环境属性一样获取该值：\n\
  \n```\n@Environment(\\.defaultNoteText) var defaultText: String\n```\n\n或者直接使用 `EnvironmentValues`\
  \ 实例上的下标来获取它，如下所示：\n\n```\nEnvironmentValues()[NoteInitialTextEnvironmentKey.self]\n\
  ```\n\n如果你觉得只为可能被一个类需要的值在环境中存储这么一大段代码工作量不小，我同意这种看法。在这种情况下，使用一个简单的常量，或者在 `UserDefaults`\
  \ 中设置一个值，就足够了。\n\n但希望你能理解其工作原理。这样，当它更适用时，你就会明白如何在代码中使用它。\n\n现在我们已经有了一个默认值，我们的 note\
  \ 实例在创建时就拥有了一个非空的 `String` 值。这也修复了预览中空白的 Textfield。\n\n### 章节总结\n\n在本章中，我们学习了环境。它是一个方便的地方，可以找到应用运行环境的各种值。你也可以设置自己的自定义值。要注意避免过度设计，将\
  \ `Environment` 和 `EnvironmentValues` 用在不必要的地方。\n\n我们了解了 `.environment` 修改器的设置是如何沿视图层级向下传播给创建的视图。\n\
  \n`.environmentObject` 修改器也用于在环境中设置引用类型的对象。请记住，这些对象是按类型访问的。这一特性有两个重要影响。首先，如果这个值在关联环境中未设置，应用将崩溃。其次，如果再次设置该值，它将被替换。\n\
  \nSwiftUI 为我们提供了多种通过框架访问值的工具。在许多情况下，框架替我们完成工作非常有用。但重要的是要根据数据的需求以及特定情况下哪种机制最合适来做出选择。\n\
  \n"
- "# 7. 项目列表\n\n在本章中，我们将把注意力转回 UI 的可视元素方面。我们已经了解了如何添加像 `Text` 和 `Button` 这样的简单元素。现在，我们将研究如何列出项目。\n\
  \n如果你以前使用过 UIKit，那么你一定对 `UITableView` 及其一系列相关类非常熟悉：`UITableViewController`、`UITableViewDataSource`、`UITableViewDelegate`\
  \ 和 `UITableViewCell`。\n\n在 SwiftUI 中，我们将使用 `List` 来替代 `UITableView`。对于行，我们将像之前一样使用视图。听起来是不是简单多了？不需要原型单元格。没有来回的表格询问单元格、你的代码请求出列单元格以及在其他地方返回单元格高度这样的操作。\n\
  \n## List\n\n创建一个视觉上的项目列表，感觉更像是在写一个循环，而不是创建 UI。这是因为它会遍历你告诉它的值。循环的每次迭代都会创建一个要显示的视图。\n\
  \n让我们在一个新的 iOS 应用项目中从一个简单的例子开始。创建项目时，接口选择 SwiftUI，生命周期选择 SwiftUI App。你的 `ContentView`\
  \ 代码应该如图 7-1 所示。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig1_HTML.jpg](img/497312_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1：默认的新项目代码\n\n让我们创建一个包含若干项目的简单列表。首先，我们删除“Hello, World!”的 `Text` 项目。在它的位置，我们添加一个列表，如下所示：\n\
  \n```\nvar body: some View {\n    List(0..<19) { index in\n        Text(\"\\(index)\"\
  )\n    }\n}\n```\n\n这会创建一个包含 20 个项目的列表。每个创建的项目都是一个 `Text` UI 元素，显示循环中的索引编号 (`Int`)。预览画布的顶部如图\
  \ 7-2 所示。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig2_HTML.jpg](img/497312_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2：带有数字的文本项列表\n\n这个概念与我们之前看到的非常相似。与使用 `HStack` 或 `VStack` 不同，我们的 body 属性返回一个\
  \ `List`。我们向 `List` 传递一个范围 `0..<19`，每次遍历都会创建一个 `Text` 元素。\n\n我们传递给 `List` 调用的闭包接受一个参数，我将其命名为\
  \ `index`。它是 `Int` 类型，表示当前迭代在范围内的数字。\n\n很简单。没有在 Interface Builder 中定义的单元格、索引路径或出列的原型单元格。\n\
  \n但如果我们想要更复杂的东西呢？我们可以创建任何我们想要的，而不只是 `Text` 元素。我们一直在处理 `Note` 对象，所以让我们创建一个包含它们的列表。\n\
  \n\n\n### NoteRow 视图\n\n我们将从为独立视图创建一个新文件开始。这有助于我们在设计行时预览其效果。\n\n右键点击项目的主文件夹，选择“新建文件…”，如图\
  \ 7-3 所示。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig3_HTML.jpg](img/497312_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n\n新建文件…\n\n在弹出的窗口中，筛选视图类型并选择 SwiftUI View，如图 7-4 所示。点击“下一步”，将其命名为 `NoteRow`，然后点击“创建”。\n\
  \n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig4_HTML.jpg](img/497312_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n\nSwiftUI View\n\n初始状态下，`NoteRow` 的 `body` 属性会是另一个显示“Hello, World!”的 `Text`。我们将把它替换成更符合列表行风格的内容。\n\
  \n当然，我们的 `NoteRow` 需要引用一个 `Note` 对象，但该对象尚未在此项目中定义（假设你和我一样使用了新项目）。我将基于前几章的内容定义一个\
  \ `Note` 类。它看起来会很像图 7-5 所示。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig5_HTML.jpg](img/497312_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\n\n在 `NoteRow.swift` 中定义的 `Note`\n\n这是对我们之前使用版本的略微简化和清理。对于当前任务来说，它足够好用。\n\
  \n如果 `NoteRow` 视图拥有一个 `Note` 实例，它就能生成一个在笔记列表中看起来不错的视图。在之前的项目中，`NoteView` 的布局并不适合列表。它更偏向方形和厚重感。我们更希望得到一个宽度大于高度、并且在滚动浏览时视觉效果良好的布局。\n\
  \n我们甚至可能不会选择展示 `Note` 的全部信息。根据应用的不同，`updatedAtTime` 对用户来说可能并不实用。在本例中，我们会将所有信息展示在界面上，但实际情况并不总是如此。\n\
  \n## 创建笔记列表\n\n我们需要创建 `NoteRow` 来展示 `Note` 的所需数据。一旦我们得到了满意的效果，就可以用 `NoteRows` 来替换\
  \ `List` 的创建。\n\n1. 像这样为 `NoteRow` 添加属性和初始化器：\n\n```\n    var note : Note\n    let\
  \ df = DateFormatter()\n    init() {\n    df.dateStyle = .none\n    df.timeStyle\
  \ = .medium\n    }\n```\n\n与之前一样，这会强制要求创建 `NoteRow` 时必须传入一个 `Note`。很好。\n\n2. 从 `NoteRow`\
  \ 的 `body` 属性中删除 `Text` 项。\n\n此时你会看到一些错误，但我们很快就会解决它们。\n\n3. 在 `body` 属性内，创建一个 `VStack`，其中包含一个用于显示笔记文本的\
  \ `Text` 项：\n\n```\n    var body: some View {\n    VStack {\n    Text(note.text)\n\
  \    }\n    }\n```\n\n此时，`body` 属性是有效的，但预览却无法工作。这是因为 `NoteRow_Previews` 中创建 `NoteRow`\
  \ 时没有传入 `Note`。\n\n4. 更新 `NoteRow_Previews`，传入一个 `Note`：\n\n```\nNoteRow(note: Note())\n\
  ```\n\n如果你重新开始预览，应该会看到“New Note”而不是“Hello, World!”。\n\n这对于一个 `List` 来说技术上是足够的，但在进入列表之前，让我们再完善一下。当然，随时欢迎你自行尝试！\n\
  \n5. 在 `NoteRow` 的 `body` 中文本项的下方，像之前一样添加一个包含优先级星形图片的 `HStack`：\n\n```\n    HStack\
  \ {\n    Image(systemName: \"star.circle\")\n    Image(systemName: note.priority.rawValue\
  \ > 0 ?\n    \"star.circle\" : \"circle\")\n    Image(systemName: note.priority.rawValue\
  \ > 1 ?\n    \"star.circle\" : \"circle\")\n    }\n```\n\n6. 在第 5 步添加的图片下方，再添加一个用于显示\
  \ `Date` 值的 `Text` 项：\n\n```\nText(df.string(from: note.updatedAtTime))\n```\n\n\
  现在，我们已经准备好创建 `List` 了！\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig6_HTML.jpg](img/497312_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n\n笔记列表\n\n7. 回到 `ContentView`，从 `body` 中的 `List` 里删除 `Text` 项，并替换为创建 `NoteRow`\
  \ 的代码：\n\n```\n    var body: some View {\n    List(0..<19) { index in\n    NoteRow(note:\
  \ Note(), df: self.df)\n    }\n    }\n```\n\n如果你运行应用或更新预览，它应该会像图 7-6 所示。\n\n成功啦！我们有了一个包含\
  \ `Note` 项的 `List`。代码清晰明了地表达了所做的事，而 `List` 的代码基本上只有一行。\n\n但它当然还能更好看。笔记文本最好左对齐。优先级和更新时间之间有些间距也会更好看。\n\
  \n让我们回到 `NoteRow`，根据这些想法做一些修改。\n\n8. 回到 `NoteRow` 的 `VStack`，让我们添加一个对齐参数：\n\n9.\
  \ 在最后一张星形图片和用于显示日期的 `Text` 项之间添加一个 `Spacer`：\n\n```\nVStack(alignment: .leading)\
  \ {\n```\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig7_HTML.jpg](img/497312_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n\n使用更新后的 `NoteRow` 的笔记列表\n\n10. 运行应用或回到 `ContentView` 刷新预览。它应该会像图 7-7 所示。\n\
  \n```\nSpacer()\n```\n\n这才像样。一个真正的列表！它算不上惊艳，但相当酷且易于制作。我们基本上是将已经掌握的许多技术，通过循环调用 `List`\
  \ 的方式组合运用了起来。\n\n\n\n### 模型列表\n\n虽然你不需要经常列出数字循环，但列出 `Array` 中的项目却是常见需求。我们无需向 `List`\
  \ 传入一个数字范围，而是可以传入一个 `Note` 实例的集合。\n\n`List` 有多种带有不同参数的初始化器。让我们修改应用，使用 `Note` 的 `Array`。为此，我们需要添加一个\
  \ `Note` 数组作为属性。\n\n接下来，我们在 `Note` 对象上创建一个 `createTestNotes` 函数。我们将它设为静态方法，这样就能在类上调用：\n\
  \n```swift\nstatic func createTestNotes() -> [Note] {\n    var items = [Note]()\n\
  \    for i in 0..<19 {\n        let note = Note()\n        note.text = \"\\(i)\"\
  \n        items.append(note)\n    }\n    return items\n}\n```\n\n将这个数组的生成逻辑放在 `ContentView`\
  \ 外部，可以避免 `ContentView` 结构体的可变性问题。\n\n现在我们可以为 `ContentView` 添加一个属性来持有这些 `Note`。我们希望该属性使用\
  \ `@State` 属性包装器，这样对列表的更新就能实时反映出来。\n\n```swift\nstruct ContentView: View {\n   \
  \ let df = DateFormatter()\n    @State private var notes = Note.createTestNotes()\n\
  ```\n\n现在我们可以更新 `List`，让其使用 `notes` 数组。`List` 的第一个参数是我们的数组：`notes` 属性。第二个参数是一个闭包。该闭包会为每个元素调用一次，并将对应的\
  \ `Note` 传入闭包。我们只需创建 `NoteRow`，这部分我们已经知道如何操作：\n\n```swift\nList(notes) { note in\n\
  \    NoteRow(note: note, df: self.df)\n}\n```\n\n这会产生错误，因为 `Note` 元素需要是可识别的。`List`\
  \ 要求其元素支持随机访问。我们只需要让 `Note` 遵循 `Identifiable` 协议即可。\n\n该协议要求提供一个 `id` 属性。我们将添加该属性，并将其初始化为一个\
  \ `UUID`。\n\n```swift\nclass Note : Identifiable { \n    var id = UUID()\n```\n\n\
  现在编译就干净无错了。我们的代码与上次运行时看起来略有不同，但用户界面是一样的（除了便签文本内容）。\n\n然而，现实需求往往更复杂。通常，当你看到自己创建的数据列表（比如便签）时，你期望能够从中删除内容。`List`\
  \ 本身没有用于处理删除的修饰符，但 `ForEach` 提供了。让我们看看具体如何实现。\n\n## 在列表中删除项目\n\n我们仍然会使用 `List`，但不会让它来遍历我们的元素。之前，我们使用\
  \ `List` 为数组中的每个项目创建 `NoteRow`。现在我们仍会用 `List` 来显示所有创建的行，但会通过另一种迭代方式来创建它们。\n\n1.\
  \  将 `List` 的调用改为 `ForEach`：\n\n    ```swift\n    ForEach(notes) { note in\n   \
  \     NoteRow(note: note, df: self.df)\n    }\n    ```\n\n    这一步应该仍能编译和运行，但效果不太好看。:)\n\
  \n2.  将 `ForEach` 调用包裹在一个新的 `List` 调用中：\n\n    ```swift\n    List {\n        ForEach(notes)\
  \ { note in\n            NoteRow(note: note, df: self.df)\n        }\n    }\n  \
  \  ```\n\n    现在应用和预览应该看起来好多了。接下来实现删除功能！\n\n    如我之前提到的，`List` 没有用于删除元素的修饰符，但 `ForEach`\
  \ 有。我们可以添加 `onDelete` 修饰符，它会传入要删除元素的偏移量。恰好，我们的数组有一个接受该偏移量的 `remove` 函数。\n\n3.  为\
  \ `ForEach` 添加 `onDelete` 修饰符：\n\n    ```swift\n    ForEach(notes, id: \\.id) {\
  \ note in\n        NoteRow(note: note, df: self.df)\n    }\n    .onDelete { offsets\
  \ in\n        self.notes.remove(atOffsets: offsets)\n    }\n    ```\n\n借助 `ForEach`\
  \ 处理删除操作，系统会像图 7-8 一样，在左滑时提供“删除”选项。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig8_HTML.jpg](img/497312_1_En_7_Fig8_HTML.jpg)\n\
  \n图 7-8 – 列表行上的删除操作\n\n点击“删除”会触发 `onDelete` 定义中传入闭包的调用。这将从 `notes` 数组中移除对应行。由于我们的\
  \ `notes` 数组使用了 `@State` 属性包装器，`List` 会重新渲染显示。\n\n请注意，动画会自动执行，整个过程流畅且效果出色！\n\n##\
  \ 本章小结\n\n在本章中，我们学习了 `List` 视图结构。通过定义属性的模型，添加 `List` 变得非常容易。其核心代码就是遍历数组并为每个元素创建一个视图。\n\
  \n我们的 `Note` 对象与前面章节中的非常相似。不过，我们通过添加 `id` 属性使其遵循了 `Identifiable` 协议。此外，我们还添加了一个静态方法来创建测试用的\
  \ `Note` 实例数组。\n\n我们创建了一个用于在 `List` 中显示的 `NoteRow` 视图。这可以是任何实现了 `View` 的组件。理想情况下，它会是一个在列表中看起来效果不错的视图。\n\
  \n通过将 `List` 的实现改为使用 `ForEach`，我们能够轻松地添加删除处理功能。一旦 `notes` 数组使用了 `@State` 属性包装器，删除元素就能让用户界面与模型保持同步。\n\
  \n`List` 功能强大，用途广泛，在大多数应用中像表格视图一样被使用。为了更好地发挥其全部效能，建议多学习 `List` 的各种修饰符和选项。\n\n"
- "# 8. SwiftUI Canvas 预览\n\n设计出色的用户界面可能不是你的任务。但既然你在阅读本书，那么用 SwiftUI 代码实现用户界面设计很可能就是你的工作。如果你过去使用过\
  \ Interface Builder 甚至纯代码进行开发，很可能用过 Storyboard 的预览功能。它能展示用户界面在各种设备上的呈现效果。\n\n然而，更常见的情况是，你会通过运行模拟器或真机来测试真实数据和交互。当然，这需要更多时间：编译、安装、运行、导航，然后修改界面或代码，再重复以上流程。\n\
  \nCanvas 预览功能让你能在代码旁边直接看到用户界面。不仅如此，它还会实际编译你的代码，并展示运行时界面将如何呈现。这包括用于确定用户界面的数据和功能。这个过程被称为“动态替换”。\n\
  \n预览显示在 Canvas 中。后续我将继续把这两个术语混用。\n\n让我们详细了解 Canvas/预览的细节。\n\n## 编译\n\n如前所述，Xcode\
  \ 会编译你的实际代码来在 Canvas 中创建并显示预览。Xcode 知道你正在处理哪个文件以及哪些更改需要编译。它只编译必要部分，以尽可能加快过程。\n\n\
  在某些情况下，比如更改字面量值，甚至无需重新编译，更改会非常快速且自动完成。\n\n对于更重大的更改，例如向相关对象添加属性，自动更新会暂停。在这些情况下，你会在\
  \ Canvas 左上角看到类似图 8-1 的消息。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig1_HTML.jpg](img/497312_1_En_8_Fig1_HTML.jpg)\n\
  \n图 8-1 – 预览更新已暂停\n\n要继续更新预览，请点击弹出消息中的“恢复”按钮，或点击 Canvas 右上角的“恢复”按钮。\n\n这个预览的绝妙之处在于，它*实际上*就是用户界面。这是你编译后的\
  \ SwiftUI 代码生成的预览。这意味着，它就是你运行时使用所有与呈现相关的数据和功能后，界面实际会呈现的样子。\n\n在你进行更改时，预览会实时反映这些变化。无需再经历构建、运行、点击等繁琐流程。\n\
  \n\n\n## 预览提供器\n\n在上一章中，我们处理了一个包含 `Note` 项目的 `List`。当我们使用默认的 `ContentView` 结构体创建项目时，系统还会在其下方自动提供一个\
  \ `ContentView_Previews` 结构体：\n\n```swift\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n我们的 `NoteRow` 也是如此。Xcode 正是通过这些结构体来指导预览的具体编译和渲染。\n\n`PreviewProvider` 是一个协议，它要求实现一个名为\
  \ `previews` 的计算属性。这与我们之前使用的 `View` 协议所要求定义的计算属性非常相似。\n\n我们的 `previews` 属性需要返回一个实现了\
  \ `View` 协议的内容，就像 `body` 属性一样。因此，一个简单的方法（默认实现也是这样做的）就是返回我们结构体的一个实例（例如 `ContentView`）。\n\
  \n如果初始化器需要参数（就像我们的 `NoteRow` 那样），我们也可以传入这些参数：\n\n```swift\nstruct NoteRow_Previews:\
  \ PreviewProvider {\n    static var previews: some View {\n        NoteRow(note:\
  \ Note(), df: DateFormatter())\n    }\n}\n```\n\n## 预览设备\n\n改变画布中预览的一种方法是更改运行目标。你可以从活动方案（Xcode\
  \ 左上角）右侧的下拉菜单中选择不同的模拟器，以指定预览中使用的设备（见图 8-2）。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig2_HTML.jpg](img/497312_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2 运行目标选择\n\n在这里选择不同的模拟器将更新画布中的预览，使其使用该设备。这是一种在不同设备尺寸上快速检查 UI 的简便方法。\n\n然而，预览\
  \ API 也允许你通过 `.previewDevice` 修饰符在代码中实现同样的效果。\n\n我当前选择了 iPhone 11 Pro Max，但我想看看它在\
  \ iPhone 8 上的效果。只需在预览代码中的 `ContentView()` 上添加 `.previewDevice` 修饰符：\n\n```swift\n\
  struct ContentView_Previews: PreviewProvider {\n    static var previews: some View\
  \ {\n        ContentView()\n            .previewDevice(\"iPhone 8\")\n    }\n}\n\
  ```\n\n现在，我的预览在画布中显示为 iPhone 8，如图 8-3 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig3_HTML.jpg](img/497312_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3 iPhone 8 预览\n\n类似地，你可以将多个 `ContentView` 实例包装在一个 `Group` 中，在画布中同时显示多种设备类型。这样你就可以实时看到\
  \ UI 在不同设备上的表现。\n\n将项目嵌入 `Group` 的快捷方式是按下 ⌘ + 点击，然后选择 Group 选项。\n\n现在，你的预览可以返回一个包含多个\
  \ `ContentView` 的组，每个都使用不同的预览设备。\n\n如果我想同时预览 iPhone 8 和 iPhone 11，可以在代码中分别为这两个 `ContentView`\
  \ 实例使用 `.previewDevice` 修饰符，如下所示：\n\n```swift\nGroup {\n    ContentView()\n    \
  \    .previewDevice(\"iPhone 8\")\n    ContentView()\n        .previewDevice(\"\
  iPhone 11\")\n}\n```\n\n现在，我可以在画布中看到这两种设备，并在修改 SwiftUI 代码时实时查看更新。当你处理占据整个屏幕的 UI\
  \ 部分时，这尤其有用。\n\n然而，有时显示整个设备并非最有帮助的方式。\n\n## 环境\n\n除了多种设备，我们可能还想了解各种环境设置对 UI 的影响。同时查看深色模式等多种选项会非常方便。\n\
  \n就像我们串联使用 `.previewDevice` 一样，我们也可以串联调用 `.environment`。我将为代码中的其中一个设备添加深色模式：\n\n\
  ```swift\nContentView()\n    .previewDevice(\"iPhone 8\")\n    .environment(\\.colorScheme,\
  \ .dark)\nContentView()\n    .previewDevice(\"iPhone 11\")\n```\n\n现在，我的 iPhone\
  \ 8 预览将显示为深色模式。\n\n你可能还想了解 UI 在不同文字大小选择下的样子；你可以像这样模拟其他文字大小：\n\n```swift\n.environment(\\\
  .sizeCategory, .extraExtraExtraLarge)\n```\n\n通过使用多种设置的不同 `ContentView` 预览，你可以在设计阶段准确地了解应用运行时的\
  \ UI 外观。\n\n如果你有一组值，例如 `colorScheme` 和 `ContentSizeCategory`，你可能希望全部查看。正如我们在 `List`\
  \ 中看到的，我们可以使用 `ForEach`。和我们使用过的许多其他东西一样，`ForEach` 实际上返回一个 `View`。\n\n`ForEach` 的每次迭代都需要返回一个\
  \ `View`，然后用于 UI。之前，我们在 `List` 中使用了它。每次迭代返回一个 `NoteRow`。现在，我们可以在预览中使用它。\n\n```swift\n\
  ForEach(ContentSizeCategory.allCases,\n        id: \\.self) { sizeCat in\n    ContentView()\n\
  \        .environment(\\.colorScheme, .dark)\n        .environment(\\.sizeCategory,\
  \ sizeCat)\n}\n```\n\n与之前在 `List` 中使用 `ForEach` 一样，我们必须为每个项目提供一种标识方式。在这种情况下，这一点尤其关键，因为\
  \ Xcode 需要知道根据情况更新哪个预览。我们将使用 `.self` 作为标识。\n\n使用 `List` 时，我们将 `ForEach` 每次返回的内容（一个\
  \ `NoteRow`）都包含在列表中。在上面的代码中，我们为 `ContentSizeCategory` 中的每个值创建了一个完整的预览。这意味着系统文本可设置的每种字号（超过十种预览），在画布中都将会有一个对应的预览。\n\
  \n对于这种实际上仅在 `NoteRow` 视图上发生的文字变化，用这么多完整的 UI 预览显得有些过头了。因此，更好的做法是将这种变化添加到 `NoteView`\
  \ 的预览中，而不是 `ContentView`。\n\n\n\n### 预览布局\n\n当您处理一个仅占屏幕一部分的视图时，您只会希望看到这部分内容。在我们的例子中，`NoteRow`\
  \ 在画布中并不需要整个设备的屏幕。同时显示多个设备也没有帮助。\n\n在这些情况下，使用 `.previewLayout` 修改器效果可能更好。您可能不仅不希望看到多个设备版本，甚至可能根本不需要设备。\n\
  \n我们的 `NoteRow` 就是一个很好的例子。我们实际上并不需要看到整个设备（或多个设备）才能了解 `NoteRow` 的外观。\n\n我修改了 `NoteRow_Previews`\
  \ 的代码，为 `DateFormatter` 添加了一个静态计算属性。\n\n```\nstatic var dateFormatter : DateFormatter\
  \ {\nlet df = DateFormatter()\ndf.dateStyle = .none\ndf.timeStyle = .medium\nreturn\
  \ df\n}\n```\n\n现在，我的预览在创建 `NoteRow` 时可以传入这个新属性。我在 `NoteRow_Previews` 中的预览只需返回：\n\
  \n```\nNoteRow(note: Note(),\ndf: dateFormatter)\n```\n\nUI 看起来如图 8-4 所示。对于一个列表中的行来说，这显得有点多余。让我们使用\
  \ `.previewLayout` 来使其更合理，并更精确地符合我们的设计。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig4_HTML.jpg](img/497312_1_En_8_Fig4_HTML.jpg)\n\
  \n**图 8-4** 预览中的 NoteRow\n\n在预览属性中创建 `NoteRow` 之后，我们将调用 `.previewLayout`，并选择其三个参数选项之一，如图\
  \ 8-5 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig5_HTML.jpg](img/497312_1_En_8_Fig5_HTML.jpg)\n\
  \n**图 8-5** 预览布局自动补全选项\n\n如您所见，当选择了设备选项时，描述说明它将在预览中居中显示在设备上。这基本上就是我们一直以来的效果。如果您深入查看\
  \ `.previewDevice`，可以看到支持的设备列表，例如：\n\n```\n/// \"iPhone 7\"\n/// \"iPhone 7 Plus\"\
  \n/// \"iPhone 8\"\n/// \"iPhone 8 Plus\"\n/// \"iPhone SE\"\n/// \"iPhone X\"\n\
  /// \"iPhone Xs\"\n/// \"iPhone Xs Max\"\n/// \"iPhone Xʀ\"\n/// \"iPad mini 4\"\
  \n/// \"iPad Air 2\"\n/// \"iPad Pro (9.7-inch)\"\n```\n\n固定选项（fixed）需要指定宽度和高度。这对于为您的项目指定具体的宽度和高度非常有用。如果您知道正在设计的元素将是固定大小，那么这是您按实际大小预览它的方法。\n\
  \n如果我设置宽度为 200、高度为 80，我的 `NoteRow` 将如图 8-6 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig6_HTML.jpg](img/497312_1_En_8_Fig6_HTML.jpg)\n\
  \n**图 8-6** 固定宽度和高度的 NoteRow\n\n```\nNoteRow(note: Note(), df: dateFormatter)\n\
  .previewLayout(.fixed(width: 200, height: 80))\n```\n\n实际上，我可能希望它更宽一些，但您明白我的意思。我可以给它一个更大的宽度并继续设计。我会选择一种有助于我将其视为列表元素的外观。\n\
  \n这个尺寸的一个特定问题是 `Spacer` 没有太大作用。我无法判断它会扩展并对设计产生更大影响。\n\n另一个选项是 `PreviewLayout` 的\
  \ `sizeThatFits` 值。当然，这个选项会让预览使用创建视图所需的尺寸。\n\n```\nNoteRow(note: Note(), df: dateFormatter)\n\
  .previewLayout(.sizeThatFits)\n```\n\n如果我使用这个选项，UI 预览看起来如图 8-7 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig7_HTML.jpg](img/497312_1_En_8_Fig7_HTML.jpg)\n\
  \n**图 8-7** 使用 sizeThatFits 的预览布局\n\n您可能想知道它是如何确定宽度的。我们有一个 `Spacer`，所以理论上宽度可以是任何尺寸。它使用了我们选择的模拟器。如果我们为运行目标选择\
  \ iPad，`NoteRow` 将会宽得多。\n\n而 `.environment` 修改器允许我们指定用户可能使用的环境设置的其他变体。\n\n让我们在我们的\
  \ `NoteRow` 视图中将这些功能结合起来使用。\n\n## NoteRow 中的文本大小\n\n在本练习中，我们将在 `NoteRow` 中添加一个 `ForEach`，以便查看它在每个内容大小类别值下的预览。\n\
  \n1.  在 `NoteRow_Previews` 中添加一个 `ForEach`：\n\n    1.  将闭包参数设置为 `sizeCat`：\n\n```\n\
  ForEach(ContentSizeCategory.allCases,\nid: \\.self) {\n}\n```\n\n    1.  在闭包内部，创建\
  \ `NoteRow`：\n\n```\nForEach(ContentSizeCategory.allCases,\nid: \\.self) { sizeCat\
  \ in\n}\n```\n\n    1.  为 `NoteRow` 添加 `.previewLayout` 并设置为 `.sizeThatFits`：\n\n\
  ```\nForEach(ContentSizeCategory.allCases,\nid: \\.self) { sizeCat in\nNoteRow(note:\
  \ Note(), df: dateFormatter)\n}\n```\n\n    1.  使用 `sizeCat` 参数为 `.sizeCategory`\
  \ 键路径添加环境设置：\n\n```\nNoteRow(note: Note(), df: dateFormatter)\n.previewLayout(.sizeThatFits)\n\
  ```\n\n```\nNoteRow(note: Note(), df: dateFormatter)\n.previewLayout(.sizeThatFits)\n\
  .environment(\\.sizeCategory, sizeCat)\n```\n\n更新预览以确保显示多个 `NoteRow` —— 每个大小类别各一个。\n\
  \n让我们更进一步，为画布中的每个项添加一个显示名称来区分它们。\n\n1.  链式调用 `.previewDisplayName`，并再次传入 `sizeCat`。\n\
  \n```\n.previewDisplayName(\"\\(sizeCat)\")\n```\n\n部分显示效果如图 8-8 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig8_HTML.jpg](img/497312_1_En_8_Fig8_HTML.jpg)\n\
  \n**图 8-8** 具有各种文本大小的 NoteRow\n\n我们已经隔离了一个可以在整个应用中使用的 UI 元素。通过在预览元素中使用修改器，我们可以看到多种显示方式。\n\
  \n## 固定预览\n\n从所有这些选项中，我们可能想要做一些更改。如果可能，您希望在所有情况下都让 UI 看起来很棒。这可能需要对 `NoteRow` 或 `ContentView`\
  \ 进行修改。\n\n通常，在画布中查看 `ContentView` 预览的同时看到 `NoteRow` 的变化会很有帮助。这可以通过固定预览来实现。\n\n\
  要固定预览，请在画布中保持想要保留的预览。然后点击画布左下角的“固定预览”按钮，如图 8-9 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig9_HTML.jpg](img/497312_1_En_8_Fig9_HTML.jpg)\n\
  \n**图 8-9** 固定预览按钮\n\n当预览被固定时，图标会变为蓝色（或您为 macOS 系统高亮色设置的任何颜色）。您可以通过再次点击来取消固定预览，即使是在其他预览中也可以。\n\
  \n这将导致在您导航到其他视图元素时，`ContentView` 预览会保持在画布顶部。当您对 `NoteRow` 进行更改时，您将看到它在 `NoteRow`\
  \ 本身以及 `ContentView` 列表中的外观。\n\n如果我更改 `updatedAtTime` 文本，为其添加 `.thin` 字体修改器，我可以看到它在\
  \ `ContentView` 列表中的显示效果，如图 8-10 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig10_HTML.jpg](img/497312_1_En_8_Fig10_HTML.jpg)\n\
  \n**图 8-10** ContentView 预览中更新后的 NoteRow\n\n```\nText(df.string(from: note.updatedAtTime))\n\
  .fontWeight(.thin)\n```\n\n### 章节总结\n\n在本章中，我们了解了如何为各种视图项创建预览项。使用修改器可以让我们看到 UI 在不同设备、环境和布局中的显示效果。\n\
  \n我们还使用了 `ForEach` 来为画布中的项展示多种预览。这可以通过避免在构建、安装、运行和导航检查用户界面上花费时间，大大加快开发速度。只需少量代码，您就可以看到\
  \ UI 在不同配色方案、文本大小、区域设置等下的效果。\n\n通过将数据（一个 `Note` 实例）传递给我们的 `NoteRow`，我们为行提供了数据。然而，每次传入的都是相同的数据。接下来，我们将研究如何使用预览内容（Preview\
  \ Content）和其他工具来使用更真实的数据。\n\n\n\n## 为预览而设计\n\n`Canvas` 是设计应用用户界面时的强大工具。然而，它的功能远不止于此。由于\
  \ `Canvas` 中显示的预览就是实际的用户界面，因此不应将其视为传统意义上的“预览”。同样地，由于它运行相关代码，也不应仅将其视为用户界面。\n\n`Canvas`\
  \ 中的预览比过去的模拟器更接近真实状态。过去使用 `Interface Builder` 时，用户界面仅仅是界面的设计稿，而以往的预览也只是一个毫无生命力的界面呈现。\n\
  \n正如在 `SwiftUI` 中用户界面设计已被转化为代码一样，`Canvas` 将模拟器引入了开发流程。这不仅改变了你开发应用视觉元素的方式，更应改变你组织代码的思维方式。\n\
  \n我们需要在开发代码时充分考虑预览功能，才能充分发挥预览的强大能力。\n\n### 预览内容\n\n迄今为止，在我们的应用中一直在使用默认数据。我们的预览也体现了这一局限性。如果使用更真实的数据，效果不是更好吗？但我们现在可能还无法访问数据库或服务器\
  \ API。即便能访问，我们真的希望在 `Canvas` 中每次渲染界面时都使用这些数据吗？答案很可能是否定的。\n\n`SwiftUI` 在新项目中提供了一个名为“Preview\
  \ Content”的组（见图 9-1）。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig1_HTML.jpg](img/497312_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1：项目中的 `Preview Content` 组\n\n> **注意**：  \n> 对于多平台项目，不存在此组。\n\n`Preview Content`\
  \ 组内已创建了一个素材目录。你可以将用于预览的图片放入此目录。也可以将其他与预览相关的文件放入 `Preview Content` 中供预览使用。\n\n默认情况下，根据构建设置，此组不会包含在\
  \ `Debug` 和 `Release` 构建中（见图 9-2）。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig2_HTML.jpg](img/497312_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2：开发资源的构建设置\n\n注意，被排除构建的是 `Preview Content` 组。因此，你在该组下添加的任何内容（例如文件、其他组、更多素材目录）都不会包含在测试版或发布版的构建中。\n\
  \n### 预览 JSON\n\n模拟数据（尤其是来自 API 的数据）的一个好方法是使用 JSON 文件。我们可以向 `Preview Content` 中添加一个\
  \ JSON 文件供预览使用。这样我们就拥有了随时可用的数据来构建预览，并且这些数据会自动从构建中排除。\n\n以下是一些可用于我们笔记的 JSON 数据：\n\
  \n```json\n[\n{\n  \"id\": \"FAF80C6A-F1C3-44D9-9539-D6113777520C\",\n  \"text\"\
  : \"我是笔记 0\",\n  \"updatedAtTime\": 1000,\n  \"priority\": 2,\n  \"image\": \"note1\"\
  ,\n  \"dueDate\": 1598923198\n},\n{\n  \"id\": \"FAF80C6A-F1C3-44D9-9539-D6113777520B\"\
  ,\n  \"text\": \"我是笔记 1\",\n  \"updatedAtTime\": 2000,\n  \"priority\": 1,\n  \"\
  image\": \"note2\",\n  \"dueDate\": 620606310\n}\n]\n```\n\n你可能注意到，其中有一些字段是我们当前的\
  \ `Note` 类中没有的。新增的字段是 `image` 和 `dueDate`。\n\n这些字段之前未被用于我们的界面，因此我们不需要它们，但现在我们要将它们添加进来。我们可以将其创建为文本文件并添加到项目中，或者通过右键点击\
  \ `Preview Content` 选择“New File…”菜单选项来创建（此例中选择 Empty File）。我将其命名为 `Data.json`。\n\
  \n### 模型\n\n我们需要对模型稍作修改以反映这些新增内容。我们需要添加一个 `String` 类型的 `image` 属性和一个 `Date` 类型的\
  \ `dueDate` 属性。\n\n我们可以将它们初始化为空字符串（`\"\"`）和一个遥远的未来日期（`Date.distantFuture`）。\n\n\
  趁此机会，我们还可以删除 `CreateTestNotes` 函数，如图 9-3 所示。接下来我们将以不同的方式加载测试笔记。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig3_HTML.jpg](img/497312_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3：作为模型的 `Note` 类\n\n由于我们要根据 JSON 文件加载 `Note` 对象的实例，我们需要让它们遵循 `Codable` 协议。属性名称与\
  \ JSON 字段名称已经匹配，因此我们只需在声明中指定即可。\n\n我们的 `Priority` 枚举也需要通过简单地向声明中添加协议来使其遵循 `Codable`：\n\
  \n```swift\nenum Priority : Int, Codable\n```\n\n当然，`isPastDue` 属性是计算属性。它不在 JSON\
  \ 中，也不会从数据文件中解析。\n\n现在我们的模型只关注数据。我们正在尝试将模型和视图进一步分离。这将使我们能够隔离模型、视图以及要显示的数据：即视图模型。\n\
  \n在处理枚举时，让我们为其添加 `CaseIterable` 协议的实现。该协议使我们能够通过名为 `allCases` 的数组属性访问枚举的各个值。我们可以用它来返回枚举的最大值。\n\
  \n```swift\nenum Priority : Int, Codable, CaseIterable {\n    case low, medium,\
  \ high\n    static var max : Int {\n        Priority.init(rawValue:\n          \
  \  Priority.allCases.count - 1)!\n            .rawValue\n    }\n}\n```\n\n\n\n###\
  \ 视图模型\n\n视图模型负责将模型中的数据映射为要显示的数据。例如，我们的优先级是一个枚举，分别映射为 0、1 和 2，对应低、中、高三个等级。但在视觉上，我们希望将其显示为星形和圆形图片。视图模型将完成这一映射工作。\n\
  \n新的 `NoteViewModel` 类将包含与 `Note`（模型）类相关的属性。这些属性将有效定义模型数据到视图的映射。例如，我们不再使用 priority\
  \ 属性，而是使用 `priorityImages` 属性。它是一个字符串数组，代表 UI 要显示的图片名称。\n\n此外，由于视图模型负责映射各种值，因此我们可以在此处存储\
  \ `DateFormatter`。这些属性的定义如图 9-4 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig4_HTML.jpg](img/497312_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n\n`NoteViewModel` 作为视图模型类\n\n我们将遍历一个 `NoteViewModel` 实例数组，因此它需要遵循 `Identifiable`\
  \ 协议，并包含一个 UUID 字符串类型的 `id` 属性。\n\n注意 `renderingColor` 属性。我们将根据笔记中的 `isPastDue`\
  \ 值来设置此值。默认的渲染颜色是 `UIColor.label`。这样可以使渲染在浅色模式下为深色，反之亦然。\n\n显然，`NoteViewModel` 的初始化方法需要传入一个\
  \ `Note` 实例：\n\n```\ninit(model : Note) {\n    text = model.text\n    time = NoteViewModel.dateFormatter.string(from:\
  \ model.updatedAtTime)\n    renderingColor = model.isPastDue ? Color.red : renderingColor\n\
  \    imageName = model.image\n    priorityImages = Array(repeating: \"star.circle\"\
  , count: model.priority.rawValue + 1)\n    priorityImages += Array(repeating: \"\
  circle\", count: Priority.max – model.priority.rawValue)\n}\n```\n\n我们的初始化方法会存储传入的模型（`Note`）中的\
  \ `text` 属性。然后，它会根据 `Note` 中的 `updatedAtTime` 来格式化并设置 `time` 属性。\n\n`renderingColor`\
  \ 的值基于 `isPastDue`。如果已超过截止日期，则为红色；否则使用现有的默认颜色。\n\n图片值存储在 `imageName` 属性中。\n\n对于\
  \ `priorityImages`，我们希望重复 `star.circle` 图片，重复次数为优先级的原始值加一。因此，对于低优先级（0），我们想要一颗星。然后，用圆圈填充剩余部分（最大值减去优先级原始值）。\n\
  \n视图模型最后需要的是一个加载 JSON 数据的方法。我们可以在代码的其他位置执行此操作，但由于我们的目标是生成用于测试的 `NoteViewModel` 实例，因此我倾向于将其放在\
  \ `NoteViewModel` 类中，如图 9-5 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig5_HTML.jpg](img/497312_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5\n\n将测试数据加载到视图模型实例中\n\n类似地，所有这些类、结构体和枚举都可以组织到其他文件中。你可能希望将模型类放在它们自己的组中。视图模型对象也可以放在\
  \ `ViewModel` 组中。\n\n此方法会获取文件的 URL，将其加载到 `Data` 实例中，解析为 `Note` 实例，并将这些 `Note` 映射为\
  \ `NoteViewModel` 实例的数组。\n\n这是一个静态函数，因此无需拥有 `NoteViewModel` 实例即可调用。\n\n另外，请注意 `#if\
  \ DEBUG` 编译条件。Swift 没有预处理器，但它在编译期间确实会处理相同的标志。在这种情况下，我们不希望将此函数包含在发布版本中。\n\n现在我们已加载模型（`Note`）并将其转换为我们的视图模型（`NoteViewModel`）。我们需要更新视图（`NoteRow`）以使用模型视图。\n\
  \n### 视图\n\n我们的 `NoteRow` 无论是所需的数据，还是将数据转换为 UI 的过程，都将得到简化。它不再需要 `DateFormatter`\
  \ 对象。它只需要一个 `NoteViewModel`：\n\n```\nstruct NoteRow: View {\n    var noteVM : NoteViewModel\n\
  ```\n\nUI 仍将包含相同的项目：文本、优先级星形、间隔符以及更新时间。但是，现在 `NoteRow` 只需从 `NoteViewModel` 获取所需内容，并仅就布局做出决策。\n\
  \n使用其 `NoteViewModel` 属性，它可以获取 `text`，显示 `priorityImages` 中的三张图片，并从视图模型的 `time`\
  \ 属性设置 `time`。\n\n`NoteRow` 还将对星形和时间使用 `renderingColor`。视图模型已根据其自身逻辑确定了颜色。`body`\
  \ 属性代码如下所示，如图 9-6 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig6_HTML.jpg](img/497312_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6\n\n使用 `NoteViewModel` 属性的 `NoteRow` 的 `body` 属性\n\n再次注意，`NoteRow` 仅根据 UI\
  \ 的布局做出决策：`VStack`、`HStack`、`ForEach`、`Spacer` 等。\n\n所有这些工作都是为了根据模型、视图和视图模型的角色来分离类。目前看来我们的收获似乎不大，但在预览方面，我们确实有所收获。\n\
  \n### 预览\n\n我们的 `NoteRow_Previews` 可以变得相当简单，并且对模型和视图模型保持无关性。它基本上只需要关联并返回它们。\n\n\
  此外，我们可以在 `ForEach` 循环中为 JSON 数据中的每个项目创建一行。这有什么好处呢？这意味着我们可以在测试数据中创建模拟真实数据可能出现的各种变化。当数据出现新的变化（例如，一个新的优先级值）时，我们可以创建测试数据来表示它，并查看\
  \ UI 如何反应。\n\n## 预览测试数据\n\n在本练习中，我们将更新 `NoteRow_Previews` 结构体，以显示我们的测试 JSON 数据。我们需要加载该数据，并为文件中的每个项目创建一个\
  \ `NoteRow`。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig7_HTML.jpg](img/497312_1_En_9_Fig7_HTML.jpg)\n\
  \n图 9-7\n\n`NoteRow_Previews` 的预览\n\n1.  验证预览在画布中的显示是否符合预期，如图 9-7 所示。\n\n2.  清除\
  \ `NoteRow_Previews` 中的预览计算属性：\n\n    ```\n    static var previews: some View {\n\
  \    }\n    ```\n\n3.  使用 `NoteViewModel.loadTestData()` 调用添加一个 `ForEach`：\n\n \
  \   ```\n    ForEach(NoteViewModel.loadTestData(), id: \\.id)\n    { (noteVM) in\
  \ }\n    ```\n\n4.  在 `ForEach` 循环中，传入视图模型创建 `NoteRow` 实例：\n\n    ```\n    { (noteVM)\
  \ in\n        NoteRow(noteVM: noteVM)\n    }\n    ```\n\n5.  使用 `previewLayout`（和/或其他修饰符）按需要显示每一行：\n\
  \n    ```\n    NoteRow(noteVM: noteVM)\n        .previewLayout(.sizeThatFits)\n\
  \    ```\n\n    **注意**：你可能需要注释掉 `ContentView` 的大部分内容才能使项目编译。对于你的 `body` 和预览计算属性，你可以暂时只返回一个\
  \ `Text` 项目。\n\n在我的测试数据中，我使用了这样的日期：我的第一条笔记未过期，但第二条笔记已过期。\n\n现在，我们已经加载了测试数据，并将其渲染到\
  \ `NoteRow` 的预览中。你可以创建更多的 JSON 项目，以在画布中查看行的更多变化。\n\n\n\n### 预览资源\n\n你可能已经意识到我们还没有使用\
  \ JSON 数据中的图片值。为了实现这一点，我们需要图片。我的测试数据包含两个 `Note` 项目，其图片值分别为 `note1` 和 `note2`。我们希望在行中也显示它们。\n\
  \n首先，我们需要在项目中包含这些名称的图片。我们将它们添加到预览内容组中的“Preview Assets.xcassets”目录中。这样，这些图片将不会包含在用于测试和发布的构建中。\n\
  \n我拖放了两张图片到“Preview Assets.xcassets”中，分别命名为 `note1` 和 `note2`，如图 9-8 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig8_HTML.jpg](img/497312_1_En_9_Fig8_HTML.jpg)\n\
  \n图 9-8\n\n位于“Preview Assets.xcassets”中的 `Note1` 和 `Note2` 图片\n\n对于我的 UI，我希望图片出现在行的左侧。为此，我将把\
  \ `VStack` 嵌入到 `HStack` 中。我可以使用 ⌘ + 单击 `VStack`，然后选择“Embed in HStack”，如图 9-9 所示。\n\
  \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig9_HTML.jpg](img/497312_1_En_9_Fig9_HTML.jpg)\n\
  \n图 9-9\n\n将 `VStack` 嵌入 `HStack`\n\n在已嵌入的 `VStack` 上方，我将基于 `NoteViewModel` 的 `imageName`\
  \ 属性添加图片。\n\n```swift\nImage(noteVM.imageName)\n```\n\n由于我的两张图片尺寸不同，预览在画布中看起来有些错位，如图\
  \ 9-10 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig10_HTML.jpg](img/497312_1_En_9_Fig10_HTML.jpg)\n\
  \n图 9-10\n\n`NoteRow` 中的图片\n\n我们可以对 `Image` 使用一些修饰符来使其更统一。首先，我们需要让图片可调整大小。这将确保当我们改变图片的框架时，图片也会随之调整大小。我们可以选择性地传入一些内边距和调整模式，但我们这里使用默认值。可以随意尝试这些参数。\n\
  \n`Resizable` 是 `Image` 元素的一个修饰符，所以我们需要先调用它。\n\n```swift\nImage(noteVM.imageName)\n\
  .resizable()\n.frame(width: 100.0,height:100)\n```\n\n从 `resizable` 返回的 `Image`\
  \ 也遵循 `View` 协议，因此我们可以对其使用 `.frame` 修饰符。将宽度和高度设置为合理的值将使行再次看起来很好，如图 9-11 所示。\n\n\
  ![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig11_HTML.jpg](img/497312_1_En_9_Fig11_HTML.jpg)\n\
  \n图 9-11\n\n`NoteRow` 中图片尺寸均匀\n\n现在，我们只需要在 `ContentView` 中使用它！\n\n## 在 ContentView\
  \ 中使用 NoteRow\n\n我们将基本上重新开始编写 `ContentView`。起始代码可以如下所示：\n\n```swift\nstruct ContentView:\
  \ View {\n    var body: some View {\n    }\n}\n\nstruct ContentView_Previews: PreviewProvider\
  \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
  \n我们的代码将相当简单。`ContentView` 需要显示的数据。我们将使用一个 `NoteViewModel` 实例的数组。`body` 将根据数组中的视图模型创建\
  \ `NoteRow` 的 `List`。\n\n1. 在 `ContentView` 中创建一个属性，用于存储 `NoteViewModel` 实例的数组。\n\
  2. 在 `body` 中，创建一个 `List` 项，并在其中使用 `ForEach` 循环遍历步骤 1 中的数组属性。\n\n```swift\nList\
  \ {\n    ForEach(items, id: \\.id)\n    { }\n}\n```\n\n3. 在 `ForEach` 的闭包中，使用从循环传入的\
  \ `NoteViewModel`（我使用简写参数名，即 `$0`）创建 `NoteRow` 的实例。\n\n```swift\nForEach(items,\
  \ id: \\.id)\n{ NoteRow(noteVM: $0) }\n```\n\n```swift\n@State private var items\
  \ = [NoteViewModel]()\n```\n\n更新你的预览。注意没有行显示。为什么？我们没有加载测试数据。我们可以在 `ContentView_Previews`\
  \ 中初始化数据，但该属性是私有的。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig12_HTML.jpg](img/497312_1_En_9_Fig12_HTML.jpg)\n\
  \n图 9-12\n\n包含 `NoteRows` 的 `ContentView` 预览\n\n4. 为你的 `ForEach` 添加一个 `.onDelete`\
  \ 修饰符。\n\n```swift\nForEach(items, id: \\.id)\n{ NoteRow(noteVM: $0) }\n.onDelete\
  \ { offsets in\n    self.items.remove(atOffsets: offsets)\n}\n```\n\n5. 使用编译条件初始化\
  \ `NoteViewModel` 实例。\n\n```swift\n#if DEBUG\n@State private var items =\n    NoteViewModel.loadTestData()\n\
  #else\n@State private var items = [NoteViewModel]()\n#endif\n```\n\n现在，当我们在调试模式下运行\
  \ App 时，它将加载测试数据。用于测试和发布的构建不会包含此编译内容，因此没有风险。\n\n稍后，当你想针对真实数据进行测试时，可以删除或相应修改此代码。\n\
  \n6. 刷新预览并查看生成的单元格，如图 9-12 所示。\n\n这看起来开始像一个真正的 App 了！它基于测试数据，但谁能说我们的数据不会存储在 App\
  \ 内的一个 JSON 文件中呢？在 `ContentView` 中看到它，我们现在已经实现了 Model、View 和 View Model 的端到端工作。\n\
  \n## 实时模式\n\n如果我们想看到它的实际运行效果，可以点击“实时预览”按钮。该按钮位于预览上方图标栏的右侧。它显示为一个播放按钮，如图 9-13 所示。\n\
  \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig13_HTML.jpg](img/497312_1_En_9_Fig13_HTML.jpg)\n\
  \n图 9-13\n\n图标栏中的实时预览按钮\n\n预览的变化不大。实时预览按钮从“播放”图标变为“停止”图标。但预览本身是实时的。我们可以像在模拟器或物理设备上一样与之交互。\n\
  \n我们可以通过滑动来删除项目，如图 9-14 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig14_HTML.jpg](img/497312_1_En_9_Fig14_HTML.jpg)\n\
  \n图 9-14\n\n实时预览交互\n\n### 章节总结\n\n在本章中，我们向项目中的“预览内容”组添加了内容、图片和数据。我们在预览中使用了这些数据，但它不会包含在我们的构建中。正如其名称所示，它仅用于预览。\n\
  \n我们重构了代码，将需要从 JSON 文件存储的数据拆分到我们的 Model 类 `Note` 中。这个类与任何功能关系不大，并且与 UI 完全无关。\n\n\
  我们新的 `NoteViewModel` 类包含了要由 UI 显示的数据版本。这个类对属性进行了一些处理，以用于正确的视觉元素。在我们的例子中，我们将 `Note`\
  \ 中的优先级设置存储为一系列用于星星/圆形图片的字符串。它还根据 `Note` 中的 `isPastDue` 确定渲染颜色。\n\n我们的 `NoteViewModel`\
  \ 通过一个 `Note` 实例创建，以获取其所需的所有数据。其 `loadTestData` 函数加载 JSON 文件数据，并创建 notes 和 `NoteViewModels`\
  \ 以供预览。\n\n我们类似地重构了 `NoteRow`，使其专注于 UI 方面。它所做的决策仅与 UI 相关。所有数据都由 View Model 提供。\n\
  \n现在，`NoteRow_Previews` 只是加载测试数据，并根据 View Model 实例创建 `NoteRows`。\n\n`ContentView`\
  \ 受益于这一切，现在只需拥有一个 `NoteViewModels` 数组，循环遍历它并在 `List` 中创建 `NoteRows`。\n\n通过分离模型、视图模型和视图组件，我们可以更轻松地分别关注每个部分。这使我们能够编辑和预览各个部分，就像它们将在各自的预览中显示一样。正如我们所看到的，预览（尤其是实时模式）基本上就是\
  \ App 本身。\n\n这带来了一些思维方式的转变。我们不再需要将开发 App 视为 UI、功能和执行。我们基本上可以同时完成这三件事。\n\n通过专注于为预览设计代码，我们正在以精简且无缝的方式处理整个\
  \ App。\n\n\n\n"
- '# 10. SwiftUI 导航


  我们通常不希望仅仅列出项目。我们希望允许用户点击这些项目，以显示详情或编辑项目。以我们的备忘录应用为例，我们希望在点击列表项时显示详情。


  毫无疑问，你对应用中的常见导航约定已经很熟悉了。我们将探讨两种最常见的方式。首先，我们来看看如何点击一行项目，并从底部以模态方式向上滑出一个视图。


  其次，我们将研究如何为应用添加导航视图。这将允许视图从右侧滑入进行导航。这是查看选中项详情的标准“下钻”导航方式。


  在两种情况下，我们都需要知道用户点击的是哪一行。


  ## 点击手势


  要允许视图向上滑出，我们需要知道用户何时点击了某个项目。然后，根据选中的项目，我们需要显示相关信息。


  这可以分为三个步骤：点击、识别被点击的数据，以及显示数据。


  对于点击操作，我们可以在创建每一行时添加 `.onTapGesture` 修饰符。此时上下文仍在作用域内。因此，在点击手势的代码中，我们可以访问用于创建该行的相同数据。


  在我们的 `ListProject ContentView` 中，有一个 `List`。为 `NoteRow` 添加点击手势的代码如下所示：


  ```

  ForEach(items, id: \.id) { (noteVM)  in

  NoteRow(noteVM: noteVM)

  .onTapGesture {

  self.selectedNoteVM = noteVM

  }

  }

  ```


  注意，我们现在在点击手势代码中访问了备忘视图模型项目。因此，简写的参数名（`$0`）不再同时适用于两个作用域，所以我添加了 `noteVM` 参数名。


  前面的代码还将 `noteVM` 存储到了 `ContentView` 的一个属性中。我们现在正是通过这个属性来保存用户所选的数据。在我们的代码中，可以像这样添加该属性：


  ```

  var selectedNoteVM : NoteViewModel?

  ```


  你会注意到，现在会出现一个编译错误。错误提示是“self”是不可变的。确实如此。那我们该怎么办？


  幸运的是，我们最终希望基于这次点击来更新 UI。这意味着我们希望 UI 根据这次点击失效并重新渲染。简而言之，我们希望状态发生改变，以便界面得到更新。


  正如我们之前所见，这里真正应该使用的是属性的绑定包装器，而不是属性本身。首先，我们需要指定该属性是选中项的数据源。


  ```

  @State var selectedNoteVM : NoteViewModel?

  ```


  到目前为止，代码的整体改动非常基础。我们添加了一个新属性，并在创建 `NoteRow` 时添加了点击手势，如图 10-1 所示。


