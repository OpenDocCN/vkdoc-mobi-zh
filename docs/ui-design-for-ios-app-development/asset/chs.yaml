  预览不会显示，因为我们在需要创建 `UIHostingController` 的 `TimerListVC.swift` 代码中遇到了一个错误。\n\n现在，我们可以在\
  \ `TimerListVC` 的 segue 动作中创建它并显示出来。\n\n当用户在表格视图中选择一行时，会调用这个 segue。这意味着我们可以从表格视图中获取该行的行号。\n\
  \n8. 创建一个 `let` 常量，用于从数组中存储 `TimerItem`，并使用选中的行进行赋值。\n\n9. 使用数组中的 timer 创建 `TimerView`\
  \ 实例。\n\n```\n@IBSegueAction func timerDetails(_ coder: NSCoder)\n    -> UIViewController?\
  \ {\n    let timer =\n        timers[tableView.indexPathForSelectedRow!.row]\n}\n\
  ```\n\n10. 返回使用 `coder` 和已创建的 `tView` 创建的 `UIHostingController` 实例（完整函数如下所示）。\n\n\
  ```\n@IBSegueAction func timerDetails(_ coder: NSCoder)\n    -> UIViewController?\
  \ {\n    let timer =\n        timers[tableView.indexPathForSelectedRow!.row]\n \
  \   let tView = TimerView(timer: timer)\n    return UIHostingController(coder: coder,\n\
  \        rootView: tView)\n}\n```\n\n既然我们已经添加了 `UIHostingController` 代码，那么就需要 SwiftUI。因此，我们需要导入\
  \ SwiftUI。\n\n11. 取消文件顶部 SwiftUI 导入语句的注释。\n\n```\nlet tView = TimerView(timer: timer)\n\
  ```\n\n现在运行应用，当点击某一行时会显示详情。UI 非常基础（见图 14-9），但这正是我们设计的。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig9_HTML.jpg](img/497312_1_En_14_Fig9_HTML.jpg)\n\
  \n图 14-9：模拟器中的 `MySwiftUIView`\n\n这很简单，对吧？我们只是添加了托管视图控制器，并为 Storyboard 创建了 segue\
  \ 动作。我们设计了一个简单的 SwiftUI 视图，用计时器创建了它，并返回了 `UIHostingController`。\n\n\n\n### 传递 ObservableObject\n\
  \n你可能还记得，我们曾希望计时器能在 SwiftUI 视图上实时更新。此外，我们还想要一个“开始/暂停”按钮。如果你运行这个应用，会发现计时器并没有在我们新的视图中更新。\n\
  \n在之前的一些练习中，我们使用绑定（binding）来解决这类问题。但我们的 `TimerListVC` 中的模型是 `TimerItem` 实例。如果将其改为某种绑定类型，大量代码都需要修改。\n\
  \n绑定仅适用于值类型（结构体、枚举），而我们的 `TimerItem` 是引用类型（类）。\n\n将 `TimerItem` 改为结构体以实现绑定，可能会对我们的代码产生诸多影响。有些代码可能依赖于通过传递引用来实现变更。\n\
  \n我们将保留其作为类。`ObservableObject` 协议就是为引用类型设计的，因此我们将使用它。\n\n## 使 TimerItem 可观察\n\n\
  为此我们只需进行少量修改。我们需要声明 `TimerItem` 遵循 `ObservableObject` 协议。这样一来，我们可以通过 `@Published`\
  \ 包装器声明要发布的属性。同时，我们需要在代码中告知何时发送变更。\n\n`TimerView` 也需要进行更新，将其属性标记为 `ObservedObject`。我们还可以通过“开始/暂停”按钮来更新界面。\n\
  \n1. 打开 `TimerItem.swift` 文件，声明其实现 `ObservableObject` 协议。\n\n1. 将 `timeString` 属性标记为“已发布”。\n\
  \n```\nclass TimerItem : ObservableObject {\n```\n\n1. 在 `start` 函数中，在定时器闭包的顶部（例如第\
  \ 69 行），添加发送函数调用。\n\n```\n@Published var timeString = \"\"\n```\n\n```\nself.objectWillChange.send()\n\
  ```\n\n现在 `TimerItem` 已经是可观察对象了，我们可以在 `TimerView` 中进行声明。\n\n1. 在 `TimerView` 中，将\
  \ `timer` 属性声明为被观察对象。\n\n```\n@ObservedObject var timer : TimerItem\n```\n\n至此，计时器的持续时间将在\
  \ `TimerView` 中实时更新。不过，你需要在表格视图中启动计时器，然后才能查看其详情。\n\n接下来，我们在 `TimerView` 中添加“开始/暂停”按钮。可以将其放在两个文本项下方。`Button`\
  \ 需要提供一个操作以及按钮视觉部分显示的内容。\n\n该操作可以检查计时器的 `isRunning` 属性。如果正在运行，则暂停计时器；否则，启动计时器。\n\
  \n对于标签参数，我们可以使用 `Text` 元素。\n\n1. 在 `TimerView` 中，在两个 `Text` 项下方添加一个 `Button`。对于操作，检查\
  \ `isRunning` 参数，并根据其状态暂停或启动计时器。对于标签，创建一个 `Text` 元素。\n\n```\n    Button(action:\
  \ {\n        if self.timer.isRunning {\n            self.timer.pause()\n       \
  \ }\n        else {\n            self.timer.start()\n        }\n    }) {\n     \
  \   Text(timer.isRunning ? \"暂停\" : \"开始\")\n    }\n```\n\n为了稍微美化格式，我们对显示剩余时间的计时器添加几个修饰器。\n\
  \n1. 在第二个文本项（用于 `timer.timeString`）上，添加字体和间距修饰器。\n\n```\n    Text(timer.timeString)\n\
  \        .font(.largeTitle)\n        .padding()\n```\n\n现在查看计时器详情时，我们可以启动/暂停计时器。启动后，可以看到计时器倒计时显示剩余时间，如图\
  \ 14-10 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig10_HTML.jpg](img/497312_1_En_14_Fig10_HTML.jpg)\n\
  \n图 14-10\n\n带按钮和剩余时间的计时器详情界面\n\n请注意，当你点击“暂停”时，它并不会更新为“开始”。你认为这是为什么？`TimerItem`\
  \ 中的 `pause` 函数会使定时器失效。但我们是在定时器的闭包中发布变更。\n\n这可以通过两种方式修复：在 `pause` 函数中发送更新，或者将 `isRunning`\
  \ 属性标记为 `@Published`。请尝试这些方法。\n\n为界面添加变更更新的能力并没有花费太多修改。我们需要将 `TimerItem` 指定为 `ObservableObject`，然后将\
  \ `timeString` 标记为已发布，并调用 `send` 函数。\n\n完成这些修改后，我们只需在 `TimerView` 中将该属性指定为被观察对象。我们还添加了“开始/暂停”按钮，并为\
  \ `Text` 项添加了修饰器。\n\n## 本章小结\n\n在本章中，我们重点探讨了如何在现有的基于 Storyboard 的项目中使用 SwiftUI 视图。提供的\
  \ `Hosting View Controller` 和转场动作使得这一过程变得简单。\n\n通过将 `Hosting View Controller` 放入\
  \ Storyboard 并创建转场，我们在代码中实现了转场动作。该动作会传递一个编码器。我们需要创建 SwiftUI 视图实例。利用编码器和我们的视图，我们创建了\
  \ `Hosting View Controller`，并将其从转场动作中返回。\n\n请注意，我们创建了要返回的视图控制器。这意味着我们可以在一处设置视图或视图控制器的其他属性。无需实现\
  \ `prepare(for:sender:)` 转场函数。\n\n为了让 SwiftUI 能够动态更新，还需要进行一些额外的修改。由于我们的 `TimerItem`\
  \ 是引用类型（类），我们选择使用 `ObservableObject` 协议。\n\n我们声明它实现了该协议，指定了已发布的属性，并在必要时调用 `send`\
  \ 函数。\n\n剩下的工作就是将 `TimerView` 的属性标记为被观察对象。\n\n在本章的第一个练习中，我们发现将 SwiftUI 显示在 UIKit\
  \ 项目中只需极少的工作。第二个练习表明，即使界面更新和交互也不需要太多工作。\n\n这种方法使得现有项目能够无缝受益于新的 SwiftUI 用户界面开发。\n\
  \n"
- "# 15. Combine 框架入门\n\n我们其实已经大量使用了 Combine 框架。现在我们将暂时搁置 SwiftUI，更深入地研究一下 Combine。\n\
  \n苹果公司将该框架描述为“一个统一的、声明式的 API，用于随时间处理值”。我想重点强调的是“随时间处理值”这一部分。\n\n我们目前正是这样使用 Combine\
  \ 的。随着值随时间变化，我们的界面也随之更新。我们使用了 `@State`、`@Binding`、`@Published` 等。\n\n在 SwiftUI 中使用这些包装器确实促进了界面中的变更反映。但很容易将\
  \ Combine 框架的这些方面与 SwiftUI 混淆。\n\nCombine 框架可以在没有 SwiftUI 的情况下使用。这有助于你现有的应用，即使你不使用\
  \ SwiftUI。理解这个框架将全面提升你的应用。此外，它还能为你将来在更新现有应用时添加 SwiftUI 奠定基础。\n\n## 常见概念\n\n应用的构建基于一个基本概念：向用户显示界面。用户的输入存储在应用中，功能由这些操作和数据驱动。这一点我们都清楚。\n\
  \n因此，将用户的文本输入存储在 `String` 属性中是一种常见的模式。同样，我们可能会在完成某些功能后显示这些数据或其某种版本。\n\n让我们看一个简单的例子。\n\
  \n假设我们有一个基本的界面设计，包含一个文本框和一个标签。我们在视图控制器中创建了它们的输出口。文本框还有一个 `editingChanged` 的动作。该函数会存储输入的文本并将其放入标签中。代码如图\
  \ 15-1 所示。\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig1_HTML.jpg](img/497312_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n\n使用文本框变更更新标签的基本界面视图控制器代码\n\n如果你运行这个应用，当你输入文本框时，标签会实时更新。让我们看看如何使用 Combine\
  \ 框架的概念来实现这一点。\n\n\n\n### 发布者与订阅者\n\nCombine 框架引入了发布者（Publisher）和订阅者（Subscriber）的概念。你可能对\
  \ `NotificationCenter` 并不陌生——它可以发送通知，而针对该通知名称添加的所有观察者都会通过调用关联函数收到通知。\n\n发布者定义了其特定的输出类型（Output），即它在发布时发送的值。订阅者则定义了其特定的输入类型（Input），即它从发布者接收的数据类型。这两个类型必须匹配。后续我们会探讨当类型不匹配时如何对值进行映射。\n\
  \n发布者和订阅者各自还需要定义一个失败类型（Failure），这两个失败类型也必须匹配才能建立关联。\n\n创建发布者有多种方式。我们首先看的是使用 `NotificationCenter`\
  \ 的方式。这对许多人来说是一个熟悉的机制，因此是一个很好的起点。\n\n一旦有了发布者，我们就可以为其添加订阅者，订阅者负责处理发布时传递的数据。\n\n##\
  \ 转换至 Combine\n\n这个示例未必会更高效，代码量也不会减少——实际上代码量会更多。但目的是用一个熟悉的概念，演示它在全新概念下如何运作。\n\n\
  首先，我们需要将 Combine 框架导入代码中。然后从 `NotificationCenter` 获取一个发布者。我们将让 `ViewController`\
  \ 订阅更新，因此它需要遵循 `Subscriber` 协议，并实现相应的各种要求。\n\n在 `Subscriber` 的实现中，我们将获取输入的新文本值，并更新\
  \ UI。\n\n我在 `Ch15_BOC_CombineFW.zip` 文件中提供了本示例的初始代码，它其实就是本章前面讨论的代码。\n\n1.  将 Combine\
  \ 框架导入代码。\n2.  在 `viewDidLoad` 中从 `NotificationCenter` 获取一个发布者。\n\n```swift\nlet\
  \ publisher = NotificationCenter\n    .default\n    .publisher(for:\n        UITextField.textDidChangeNotification,\n\
  \        object: tf)\n```\n\n```swift\nimport Combine\n```\n\n这将返回一个针对文本框的发布者。每当文本框内容变化时，它就会发布新值。\n\
  \n3.  让 `ViewController` 订阅该发布者。由于我们要更新 UI，因此希望在主线程上接收更新。\n\n```swift\npublisher\n\
  \    .receive(on: DispatchQueue.main)\n    .subscribe(self)\n```\n\n另一种做法是在主线程上订阅，然后调用\
  \ `receive` 并传入订阅者。但我更喜欢上面的写法，因为它清晰明了：我打算在主线程上接收更新（用于 UI 更新），并订阅传入的指定实例。\n\n至此，我们有了发布者并完成了订阅。基本上是。但我们的\
  \ `ViewController` 尚未实现 `Subscriber` 协议。\n\n4.  在声明中添加 `Subscriber` 协议。\n\n```swift\n\
  class ViewController: UIViewController, Subscriber {\n```\n\n5.  使用编译错误消息中的“修复”按钮快速生成存根代码。这通常只会添加所需的类型别名：`Input`\
  \ 和 `Failure`。\n\n```swift\ntypealias Input = type\ntypealias Failure = type\n```\n\
  \n我们需要确定这两个类型的具体值。如果深入查看 `.publisher` 调用，会发现它返回的是 `NotificationCenter.Publisher`。跳转到该类型（就在发布者函数声明下方即可看到），会发现其输出类型是\
  \ `Notification`，失败类型是 `Never`。\n\n我们的 `Input` 和 `Failure` 需要与之匹配。\n\n```swift\n\
  typealias Input = Notification\ntypealias Failure = Never\n```\n\n此时仍有编译错误。再次使用“修复”按钮，它会生成所需的函数存根。\n\
  \n6.  实现 `receive(subscription:)` 函数，指定无限量的数据更新请求。\n\n```swift\nfunc receive(subscription:\
  \ Subscription) {\n    subscription.request(.unlimited)\n}\n```\n\n7.  实现 `receive(_:)`\
  \ 输入处理函数。\n\n```swift\nfunc receive(_ input: Input) -> Subscribers.Demand {\n  \
  \  if let textField = input.object as? UITextField {\n        userText = textField.text\n\
  \        lbl.text = userText\n    }\n    return .unlimited\n}\n```\n\n由于我们的 `Input`\
  \ 类型别名指定为 `Notification`，因此可以按此类型使用。当前我们处于 UI 线程，更新操作可以正常工作。\n\n返回 `.unlimited`\
  \ 表示希望继续接收无限量的响应。\n\n8.  实现 `receive(completion:)` 函数。\n\n```swift\nfunc receive(completion:\n\
  \    Subscribers.Completion) {\n    print(completion)\n}\n```\n\n在我们的场景中无需做任何处理，但在某些情况下，你可能需要在此时完成应用的某些收尾工作。\n\
  \n至此，我们的 `ViewController` 已订阅了针对文本框的 `NotificationCenter` 更新。运行应用，当我们在文本框中输入时，标签文本应随之更新。UI\
  \ 应如图 15-2 所示。\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig2_HTML.jpg](img/497312_1_En_15_Fig2_HTML.jpg)\n\
  \n*图 15-2 —— 将 TextField 输入内容设置为标签文本*\n\n相信你会同意，这种方式比最初的解决方案更繁琐、代码量更大、复杂度更高。但再次强调，本示例的目的是引导我们熟悉\
  \ Combine 框架中发布者和订阅者的概念。后续会有更精炼的改进方案。\n\n解决方案保存在 `CombineFW-Ex15-1.zip` 文件中。\n\n\
  ## 改进优化\n\n我们可以对代码做的一个简单改进，是在 `viewDidLoad` 中将 `subscribe` 调用与发布者调用链式连接起来。\n\n```swift\n\
  NotificationCenter\n    .default\n    .publisher(for:\n        UITextField.textDidChangeNotification,\n\
  \        object: tf)\n    .receive(on: DispatchQueue.main)\n    .subscribe(self)\n\
  ```\n\n这样我们就不再需要存储发布者变量。但还有更好的方法！\n\nCombine 提供了两个现成的订阅者，我们可以直接使用，而不必自定义类。它们会自动匹配所关联发布者的输出类型和失败类型。这其中的魔法是什么？就是\
  \ `sink` 和 `assign`。\n\n## Sink 订阅者\n\n`sink` 订阅者接受两个闭包。第一个闭包类似于我们之前编写的 `receive(completion:)`\
  \ 函数。第二个闭包则类似于我们编写的获取更新值的函数。在我们的场景中，这个更新值是一个 `Notification` 实例。\n\n`sink` 会自动请求无限量的更新，就像我们在\
  \ `receive(subscription:)` 函数中所做的那样。而且当 Combine 创建你的订阅者时，它会使用变更发生的线程。在我们的场景中，变更发生在\
  \ UI 上，因此它已经处于主线程。\n\n如果使用 `sink`，我们可以移除对 `receive(on:)` 和 `subscribe` 的调用。不过，`sink`\
  \ 有一个返回值需要考虑：它返回一个 `AnyCancellable` 实例。\n\n我们可以将此实例存储在类属性中，确保它不会超出作用域而被从内存中移除。如果我们想取消订阅，只需对该实例调用\
  \ `.cancel` 方法。一旦超出作用域，它会被清理，并在其 `deinit` 中自动调用 `.cancel`。非常干净。\n\n因此我们需要一个属性。\n\
  \n```swift\nvar subscriber: AnyCancellable?\n```\n\n然后我们在创建发布者和订阅者时使用它。\n\n```swift\n\
  subscriber = NotificationCenter\n    .default\n    .publisher(for:\n        UITextField.textDidChangeNotification,\n\
  \        object: tf)\n    .sink(receiveCompletion: { print($0) })\n    { (notification)\
  \ in\n        if let textField = notification.object\n            as? UITextField\
  \ {\n            self.userText = textField.text\n            self.lbl.text = self.userText\n\
  \        }\n    }\n```\n\n我们像之前一样获取发布者，现在调用它的 `sink` 方法。`receiveCompletion` 闭包只是打印参数。更新值闭包所做的操作与之前一致（但属性访问时增加了\
  \ `self` 作用域指定）。\n\n最好的地方在于：我们的 `ViewController` 不再需要实现 `Subscriber` 协议，我们可以移除所有相关代码！整个代码库瞬间简洁了许多，如图\
  \ 15-3 所示（特别是当我们像我所做的那样，删除了 Storyboard 中文本框的连接之后）。\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig3_HTML.jpg](img/497312_1_En_15_Fig3_HTML.jpg)\n\
  \n*图 15-3 —— 移除 Subscriber 协议并使用 Sink 后的 ViewController*\n\n`sink` 还提供了一个不接受完成闭包的版本。所以如果你不需要处理完成事件，代码可以变得更简洁。\n\
  \n\n\n### 分配订阅者\n\nCombine 提供的第二个订阅者是 `assign`。`Assign` 接受两个参数。第一个是某个属性的键路径，第二个是拥有该键路径的实例。\n\
  \n在我们项目中，键路径指向 `UILabel` 的文本元素。当然，第二个参数就是该标签本身。我们可以使用 `assign` 代替 `sink`，将值赋给属性。\n\
  \n```\n.assign(to: \\.userText, on: self)\n```\n\n现在我们的订阅者接收到发布的值，并将其赋给 `userText`\
  \ 属性。但有一个问题：我们发布的值是一个通知，而不是 `String`。\n\n要获取 `String` 值，我们必须从通知中提取对象。这个对象是 `UITextField`，从中我们可以获得文本。因此我们需要一个中间步骤。\n\
  \n## 操作符\n\n幸运的是，Combine 中的 `Publisher` 拥有大量操作符。如果你熟悉标准的高阶函数，你会感到得心应手。\n\n`Publisher`\
  \ 提供了许多操作符，如 `map`、`flatMap`、`reduce`、`contains` 等。你可以在 Apple 关于 `Publisher` 的文档（[`developer.apple.com/documentation/combine/publisher`](https://developer.apple.com/documentation/combine/publisher)）中看到一长串列表。\n\
  \n在我们的发布者上，我们可以添加一个 `map` 来深入 `Notification` 内部，获取所需内容。\n\n```\n.map { notif in\n\
  \  guard let tf = notif.object as? UITextField\n  else { return \"\" }\n  return\
  \ tf.text ?? \"\"\n}\n.assign(to: \\.userText, on: self)\n```\n\n现在当值被发布时，我们可以通过\
  \ `guard` 语句绑定文本字段，然后返回文本字段的值。由于我们的 `userText` 属性是可选类型，我们只需返回 `UITextField` 的文本。\n\
  \n`map` 返回 `Publisher`，因此它适合链式调用。但与具有闭包的 `sink` 不同，我们仅对 `userText` 进行赋值，标签并不会被更新。\n\
  \n`assign` 返回一个订阅者，因此我们无法为标签添加第二个 `assign` 调用。这正好引出另一个发布者示例的绝佳机会。\n\n## @Published\
  \ 属性包装器\n\n我们已经在 SwiftUI 中使用过 `@Published` 属性包装器。不过，它也是 Combine 框架的一部分，因此我们也可以在此处使用。\n\
  \n这个属性包装器为任何属性添加了一个发布者！所以我们将创建第二个发布者和第二个订阅者。\n\n1. 为 `userText` 属性添加 `@Published`\
  \ 属性包装器。同时为其设置默认值，避免其为 `nil`。\n2. 添加另一个订阅者属性，类型为 `AnyCancellable` 可选值。\n\n```\n\
  @Published var userText : String? = \"\"\n```\n\n```\nvar subscriber2 : AnyCancellable?\n\
  ```\n\n现在，我们需要使用该发布者并对其进行订阅。我们将再次使用 `assign`。它将创建一个订阅者，将 `userText` 属性中的值赋给标签。\n\
  \n3. 在 `viewDidLoad` 中创建发布者和订阅者。\n\n```\nsubscriber2 = $userText\n  .assign(to:\
  \ \\.text, on: lbl)\n```\n\n就是这样！`$` 让我们能访问被包装的发布者。然后我们通过 `.assign` 指定键路径和对象来创建订阅者。\n\
  \n在这种情况下，发布的值是 `String` 可选类型，而这正是 `UILabel` 的 `text` 属性原本的类型。\n\n功能已恢复至我们使用 `sink`\
  \ 时的状态。根据代码不同，某一种方式可能比另一种更有意义。\n\n### 章节总结\n\n我们在此介绍了 Combine 框架中的一些重要概念。`Publisher`\
  \ 发布更新后的值，`Subscriber` 接收更新后的值。再次回到 Apple 对 Combine 的描述：我们正在“随时间处理值”。\n\n`Publisher`\
  \ 有输出，`Subscriber` 有输入，两者的类型必须匹配。它们还定义了 `Failure` 类型，也必须匹配。我们在 `ViewController`\
  \ 中实现了 `Subscriber` 并使其类型匹配。同时，我们还学习了 `sink` 和 `assign`，它们会自动匹配所创建的订阅者中的类型。\n\n\
  你需要保留对以 `AnyCancellable` 形式创建的订阅者的引用。这样可以在需要时取消订阅，同时也可避免手动清理订阅。`AnyCancellable`\
  \ 会在其 `deinit` 方法中自动为你处理。\n\n我们还看到 `Publisher` 支持多种操作符，如 `map`、`reduce` 等。它们返回相同的发布者，因此可以在创建订阅者之前进行链式调用。当需要将更新后的值转换为特定形式时，操作符尤其有用。\n\
  \n`@Published` 属性包装器为任何属性添加了发布者。要访问它，请在属性前使用 `$` 并继续调用。你可以像对待其他发布者一样添加操作符并进行订阅。\n\
  \n这些概念已经帮助我们在 SwiftUI 中进行了开发。但希望你也认同，这些概念在任何项目中都很有用。\n\n"
- "# 16. URLSession 发布者\n\n虽然这不是一本关于 Combine 的书，但我确实想再介绍框架中的一些内容。希望本章能让你了解如何使用 Combine。同时，我也希望你能看到一条更直接的学习路径，以更好地掌握这个强大的框架。\n\
  \n在本章中，我们将讨论数据获取。我们将为此使用发布者和订阅者，从服务器获取数据，并更新 UI。为了测试/预览，我们也会从文件中加载数据。\n\n## URLSession\
  \ 发布者\n\n如果你以前用过 `URLSession`，你会熟悉创建数据任务。`URLSession` 也提供了一个数据任务发布者。它接受一个 `URL`\
  \ 作为参数，并返回发布者。\n\n我们已经见过这在 `NotificationCenter` 和 `@Published` 包装属性中的工作方式。从这个意义上说，概念并不新鲜，但现在我们处理的是返回的数据。在我们的案例中，数据将代表\
  \ JSON。\n\n解码 JSON 时可能会发生错误，因此我们也必须处理这些错误。\n\n我提供了一个 `Ch16_BOC_StatusTracker.zip`\
  \ 项目作为本章的起点。让我们看看代码。\n\n\n\n### 状态跟踪器项目\n\n我们将从 JSON 加载用户状态数据。JSON 中有三个字段：`id`、`username`\
  \ 和 `status`。状态可以取三个值之一：`offline`、`paused` 和 `live`。\n\n我们希望能够在列表中显示这些项目。我们还希望能够按状态值进行过滤。UI\
  \ 将如图 16-1 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig1_HTML.jpg](img/497312_1_En_16_Fig1_HTML.jpg)\n\
  \n图 16-1  \n状态跟踪器应用 UI 设计\n\n用户名将与它们关联的状态一起列出。状态选项显示在顶部的 `Picker`（类似于 UIKit 的 `Segmented\
  \ Control`）中。\n\n对于状态值，我们有一个枚举。数据模型是一个 `UserStatus` 结构体。两者都遵循 `Codable` 协议，如图 16-2\
  \ 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig2_HTML.jpg](img/497312_1_En_16_Fig2_HTML.jpg)\n\
  \n图 16-2  \n模型代码\n\n请注意，顶部我们导入了 `Combine`。它目前尚未使用，但我们知道我们会朝这个方向走。\n\n`Status` 的底层类型是\
  \ `Int`。这可以在几个方面提供帮助。我们可以根据 `Picker` 所选索引创建 `Status` 值。此外，我们可以在 JSON 中存储整数，而不是传递字符串。\n\
  \n`Status` 也遵循 `Codable` 和 `CaseIterable` 协议。`CaseIterable` 允许我们访问值的 `allCases`\
  \ 数组。访问 `allCases` 有助于遍历这些值或获取总数。我创建了一个 `totalNum` 计算属性来知道我们有多少个值。\n\n请注意枚举中有一个\
  \ \"all\" 值。它应该仅用于过滤。\n\n`description` 属性将值转换为 `String`。\n\n这只是实现 `Status` 枚举的一种方式。我发现它清晰、有用且易于维护。\n\
  \n`UserStatus` 结构体有三个值，与 JSON 中的键匹配，如图 16-3 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig3_HTML.jpg](img/497312_1_En_16_Fig3_HTML.jpg)\n\
  \n图 16-3  \nJSON 数据\n\n项目中包含一个类似文件用于测试数据。我们将从中加载数据，也会从服务器加载数据。\n\n### 状态跟踪器 UI\n\
  \n状态跟踪器的 UI 使用了一些我们已经熟悉的元素和一个新的元素：`Picker`。这些元素位于一个 `VStack` 中，首先是一个 `Text` 元素。\n\
  \n`VStack` 中的第二个元素是 `Picker`。`Picker` 接收一个 `StringProtocol`、一个用于存储选择的选择项，以及用于选择的各个项。\n\
  \n我们还需要为选择器指定一个样式。如果不设置样式，它默认为 `WheelPickerStyle`，这类似于 UIKit 中的 `Picker View`。我们需要分段选择器样式。\n\
  \n最后是我们的列表。它将使用 `.filter` 遍历状态项目，以根据 `Picker` 中的选择仅查找我们感兴趣的项目。然后它为每个状态数组元素创建一个 `HStack`\
  \ 和两个文本项。`ContentView` 代码如图 16-4 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig4_HTML.jpg](img/497312_1_En_16_Fig4_HTML.jpg)\n\
  \n图 16-4  \nContentView 代码\n\n请注意，`filterIndex` 有一个 `@State` 属性包装器，而 `Picker` 使用了这个绑定。当用户更改\
  \ `Picker` 选择时，这个 `Int` 将会更新。\n\n`filterStatus` 属性是一个基于用户筛选选择的计算属性。它主要用于在用户列表的 `.filter`\
  \ 调用中轻松检查。\n\n预览代码与生成的代码相同。\n\n### 模型管理器\n\n我们的 `ContentView` 中的第一个属性是一个 `UserStatusMgr`\
  \ 实例。它使用了该类中定义的单例。唯一使用它的地方是在我们 `List` 项的 `ForEach` 中。\n\n如果我们只是遍历 `mgr.userStatus`\
  \ 属性，它会列出所有项目。但我们希望匹配用户选择的筛选条件。我们遍历 `.filter` 中的项目，如果状态匹配或用户在选择器中选择了 \"全部\"，则包含它们。\n\
  \n当前的 `UserStatusMgr` 代码只有几个属性。\n\n```\nclass UserStatusMgr {\n    static let instance\
  \ = UserStatusMgr()\n    var userStatus = [UserStatus]()\n}\n```\n\n它有单例属性和用于 `UserStatus`\
  \ 项目的数组。我们需要添加用于从服务器加载数据的代码。\n\n## 使用发布者获取数据\n\n我们希望发布 `userStatus` 属性来更新 UI。因此，我们必须向该类添加\
  \ `ObservableObject` 协议，并使用 `@Published` 标记该属性。然后我们可以在 UI 中将该类设置为一个 `ObservedObject`。\n\
  \n我们还需要从服务器获取数据。然后我们可以解析它并更新 `userStatus` 属性以进行发布。\n\n1.  声明 `UserStatusMgr` 类遵循\
  \ `ObservableObject` 协议。\n\n1.  将 `@Published` 包装器添加到 `userStatus` 属性。\n\n```\n\
  class UserStatusMgr : ObservableObject {\n```\n\n1.  为单例创建一个私有的 `init`，该初始化方法调用状态数据的更新函数（待编写）。\n\
  \n```\n    private init() {\n        updateStatusData()\n    }\n```\n\n1.  创建一个名为\
  \ `updateStatusData` 的函数，用于创建 `URL` 实例。\n\n```\n    func updateStatusData() {\n\
  \        guard let url = URL(string: \"https://brainwashinc.com/Status.json\")\n\
  \        else { return }\n    }\n```\n\n1.  在上述 `updateStatusData` 函数的 `guard` 之后，创建\
  \ `URLSession` 发布者。\n\n```\n    URLSession.shared\n        .dataTaskPublisher(for:\
  \ url)\n```\n\n`URLSession` 数据任务发布者的发布者定义了其输出和失败类型。输出是一个 `Data` 和 `URLResponse`\
  \ 的元组。名称分别是 `data` 和 `response`。失败类型是 `URLError`。\n\n在这种情况下，我们只想获取数据，但这只是元组的一部分。我们可以使用\
  \ `.map` 来稍微处理一下数据。\n\n1.  向发布者添加 `.map`，以将响应元组转换为仅数据项。\n\n```\n    URLSession.shared\n\
  \        .dataTaskPublisher(for: url)\n        .map { $0.data }\n```\n\n```\n@Published\
  \ var userStatus = [UserStatus]()\n```\n\n`map` 的结果是一个仅向下游传递 `Data` 项的发布者。我们想要解码那个\
  \ `Data`，因为它是 JSON。由于这是一种常见操作，Combine 提供了一个 `.decode` 运算符。\n\n1.  在 `.map` 之后添加\
  \ `.decode` 运算符。\n\n```\nURLSession.shared\n    .dataTaskPublisher(for: url)\n \
  \   .map { $0.data }\n    .decode(type: [UserStatus].self,\n            decoder:\
  \ JSONDecoder())\n```\n\n`decode` 返回一个向下游传递 `Decodable` 的发布者，这很棒。但它的 `Failure` 类型是\
  \ `Error`。由于 JSON 解析可能失败，我们必须处理这种情况。\n\n有多种方法可以处理这个问题。这里我们看一种简单的方法。使用 `.sink` 是另一个有用的选项，我鼓励你研究一下。\n\
  \n1.  在解码之后添加 `.replaceError`。\n\n```\nURLSession.shared\n    .dataTaskPublisher(for:\
  \ url)\n    .map { $0.data }\n    .decode(type: [UserStatus].self,\n           \
  \ decoder: JSONDecoder())\n    .replaceError(with: self.userStatus)\n```\n\n现在，如果\
  \ `JSONDecoder` 出错，我们只需使用 `self.userStatus` 的当前值继续执行。这仍然返回一个发布者，所以我们需要继续到订阅者。\n\n\
  1.  添加 `.receive` 以在主线程上发布。\n\n```\n    URLSession.shared\n        .dataTaskPublisher(for:\
  \ url)\n        .map { $0.data }\n        .decode(type: [UserStatus].self,\n   \
  \             decoder: JSONDecoder())\n        .replaceError(with: self.userStatus)\n\
  \        .receive(on: DispatchQueue.main)\n```\n\n现在我们到达了发布者链的末端，需要创建订阅。\n\n1. \
  \ 创建一个名为 `subscriber` 的 `AnyCancellable` 作为 `UserStatusMgr` 类的属性。\n\n\n\n1.  添加一个`.assign`修饰符来分配值，并将结果存储在第\
  \ 10 步的属性中。\n\n```\nvar subscriber : AnyCancellable?\n```\n\n```\nsubscriber = URLSession.shared\n\
  .dataTaskPublisher(for: url)\n.map { $0.data }\n.decode(type: [UserStatus].self,\n\
  decoder: JSONDecoder())\n.replaceError(with: self.userStatus)\n.receive(on: DispatchQueue.main)\n\
  .assign(to: \\.userStatus, on: self)\n```\n\n此时运行应用程序可以工作，但它不会将数据加载到 UI 中。这是因为我们使用`UserStatusMgr`的初始值`userStatus`（为空）创建了\
  \ UI。\n\n我们需要将`ContentView`的`mgr`属性标记为`ObservedObject`。这样当`userStatus`属性被发布时，我们就会收到更新，从而触发\
  \ UI 更新。\n\n2.  在`ContentView`中为`mgr`属性添加`@ObservedObject`。\n\n```\n    struct ContentView:\
  \ View {\n    @ObservedObject var mgr = UserStatusMgr.instance\n    ```\n\n现在，应用程序会显示\
  \ UI，并在获取数据后得到更新。使用过滤器也能正常工作，如图 16-5 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig5_HTML.jpg](img/497312_1_En_16_Fig5_HTML.jpg)\n\
  \n**图 16-5**  \n带筛选列表的应用程序运行界面\n\n这个发布者只运行一次。任务运行、发布然后停止。如果你再次调用`updateStatusData`，它会获取新数据并继续执行。\n\
  \n我们不仅了解了如何用发布者获取数据，还接触了一些其他操作符。我鼓励你自行研究 Combine 中的操作符，以了解所有可用的功能。\n\n## 调试数据\n\n\
  在开发和测试过程中，我们可能不希望每次都访问服务器。相反，我们可以编写代码从项目包中读取测试文件。\n\n一种选择是直接加载文件数据并将其解析到`userStatus`属性中。这种方法完全可以正常工作。\n\
  \n以下是一个解决方案，它在后台为调试构建加载数据，并在 UI 线程上发布。如果这段代码位于`updateStatusData`的顶部，它将针对调试构建运行。\n\
  \n**注意**：稍后我们会在项目中添加此代码的一个变体。除非你想尝试，否则现在无需添加。\n\n```\n#if DEBUG\nguard let urlLocal\
  \ = Bundle.main.url(\nforResource: \"Status\",\nwithExtension: \"json\")\nelse {\
  \ return }\nDispatchQueue.global().async {\nif let data = try? Data(contentsOf:\
  \ urlLocal) {\nDispatchQueue.main.async {\nself.userStatus = (try? JSONDecoder()\n\
  .decode([UserStatus].self,\nfrom: data))\n?? self.userStatus\n}\n}\n}\nreturn\n\
  #endif\n```\n\n这段代码创建了包 URL，读取数据（在后台），并解码 JSON。当`userStatus`更新时，它会被发布。这没问题，但有点冗余，并且在测试时不会用到我们现有的代码。\n\
  \n我们可以想出一个更有趣的解决方案，使用另一个订阅。\n\n首先，这将给我们一个机会来处理更多发布者-订阅者的例子。其次，我们可能能够重用代码，从而在测试中更多地去检验我们的生产代码。\n\
  \n让我们将加载的数据（服务器或本地）存储在一个属性中，并创建一个该属性的订阅者。在新的订阅者中，我们可以处理 JSON 数据并更新`userStatus`属性。\n\
  \n**使用本地测试数据**\n\n我们需要一个新的属性来存储`Data`实例。另外，我们还需要另一个订阅者属性。我们可以更新`updateStatusData`，使其在调试构建时使用本地文件路径，以避免访问服务器。\n\
  \n1.  在`UserStatusMgr`中，创建两个新属性：`statusData`（类型为`Data`并初始化）和`subscriberData`（类型为`AnyCancellable?`）。\n\
  \n```\n@Published var statusData = Data()\nvar subscriberData : AnyCancellable?\n\
  ```\n\n我们将 JSON 数据存储在`statusData`中。由于它是已发布的，我们可以为其创建订阅。然后，每当它被更新时，我们就处理新数据。\n\n\
  2.  在`UserStatusMgr`中创建一个新函数来创建发布者-订阅者。\n\n```\n    func createSubscription() {\n\
  \    $statusData\n    }\n    ```\n\n我之前提到过，还有其他方法可以处理`decode`的错误。一种方法是使用`.catch`操作符。这里的问题是，如果它捕获到错误，它会通过用一个新的发布者替换当前发布者来取消订阅。在我们的例子中，这可能没问题，因为我们的发布者应该只执行一次任务。\n\
  \n然而，如果我们想要支持持续的发布，我们不想让它被取消。相反，我们可以使用`.flatMap`。`.flatMap`调用接收上游的输入并返回一个发布者。在其中我们可以进行解码。如果解码失败，我们可以捕获它。\n\
  \n我们将在这里使用`.flatMap`来了解它的工作原理。\n\n1.  向发布者添加`.flatMap`。\n\n```\n    func createSubscription()\
  \ {\n    $statusData\n    .flatMap{ data in return Just(data)\n    }\n    }\n  \
  \  ```\n\n此时，`flatMap`只获取数据并使用`Just`创建一个新的发布者。`Just`简单地发布数据并结束。\n\n我们将在`Just`上添加操作符来解码\
  \ JSON 并捕获错误。如果有错误，我们可以使用另一个`Just`来发布`userStatus`的当前值。\n\n1.  添加解码 JSON 和捕获可能错误的调用。\n\
  \n```\n    func createSubscription() {\n    $statusData\n    .flatMap{ data in\n\
  \    return Just(data)\n    .decode(type: [UserStatus].self,\n    decoder: JSONDecoder())\n\
  \    .catch { _ in\n    return Just(self.userStatus)\n    }\n    }\n    }\n    ```\n\
  \n现在我们拥有了我们想要的发布者。我们获取`statusData`属性的发布者，并使用`.flatMap`创建一个发布者。`.flatMap`获取数据并使用`Just`创建另一个发布者。该发布者上的操作符解码\
  \ JSON。\n\n\n\n### 排版后的文本\n\n如果解码数据时出现错误，我们会发布当前的 `self.userStatus`。 `catch` 会将当前的发布者（第一个\
  \ `Just`）替换为另一个 `Just`。\n\n4. 添加 `.receive` 来创建我们发布者的最终版本。\n\n1. 添加 `.assign` 来创建订阅。将订阅存储在步骤\
  \ 1 中创建的新 `AnyCancellable` 属性中。\n\n```\ncreateSubscription() {\n$statusData\n.flatMap{\
  \ data in\nreturn Just(data)\n.decode(type: [UserStatus].self,\ndecoder: JSONDecoder())\n\
  .catch { _ in\nreturn Just(self.userStatus)\n}\n}\n.receive(on: DispatchQueue.main)\n\
  }\n```\n\n```\ncreateSubscription() {\nsubscriberData =\n$statusData\n.flatMap{\
  \ data in\nreturn Just(data)\n.decode(type: [UserStatus].self,\ndecoder: JSONDecoder())\n\
  .catch { _ in\nreturn Just(self.userStatus)\n}\n}\n.receive(on: DispatchQueue.main)\n\
  .assign(to: \\.userStatus, on: self)\n}\n```\n\n基于来自 `.assign` 的结果发布者，我们创建了订阅。现在，一旦数据处理完毕，我们就会保存\
  \ `userStatus` 数组。这是一个已发布的属性，UI 将会随之更新。\n\n回到我们的 `updateStatusData` 函数，我们不再需要设置\
  \ `userStatus`。相反，我们只使用 `Data` 值来设置 `statusData`。然后，我们创建的针对 `statusData` 的订阅将处理它，并且\
  \ `userStatus` 将会被发布。\n\n`updateUserStatus` 中的订阅只需接收数据、进行映射、处理错误，并赋值给该属性。此外，由于我们不再触发\
  \ UI 数据的发布，因此不再需要 `.receive` 修饰符。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig6_HTML.jpg](img/497312_1_En_16_Fig6_HTML.jpg)\n\
  \n图 16-6\n\n当前的 `updateStatusData` 函数\n\n1. 更新 `updateStatusData` 函数，移除 JSON 解析和\
  \ `.receive` 修饰符。由于我们现在处理的是数据，`.assign` 需要设置 `statusData`（而不是 `userStatus`）。更新后的代码如图\
  \ 16-6 所示。\n\n我们需要确保调用了创建订阅的函数。\n\n1. 在 `init` 中添加对 `createSubscription` 的调用。\n\n\
  ```\n    private init() {\n    createSubscription()\n    updateStatusData()\n  \
  \  }\n```\n\n如果你现在运行这个应用，它应该像以前一样工作，只不过现在有两个订阅。我们在 `updateStatusData` 中的原始订阅者仍然会接收服务器数据。但是，现在它只是将数据存储在\
  \ `statusData` 属性中。\n\n`createSubscription` 中的新订阅者接收该 `Data` 实例并解析它。解析后的数据现在存储在我们的\
  \ `userStatus` 数组中，该数组在主线程上发布。\n\n到目前为止，此练习中的步骤已将数据加载过程分为两部分。第一部分获取数据。第二部分解析数据。\n\
  \n现在我们可以添加从本地加载数据的选项。在调试构建时，这将替换第一部分中的服务器请求。第二部分的操作方式保持不变。当数据被存储时，针对它的订阅将解析数据并将其设置到数组中。\n\
  \n2. 在 `updateStatusData` 中，在函数顶部添加测试代码，以在 `DEBUG` 条件语句内从文件加载 JSON 数据。\n\n```\n\
  \    func updateStatusData() {\n    #if DEBUG\n    guard let urlLocal = Bundle.main.url(\n\
  \    forResource: \"Status\",\n    withExtension: \"json\")\n    else { return }\n\
  \    if let data = try? Data(contentsOf: urlLocal) {\n    DispatchQueue.global().async\
  \ {\n    self.statusData = data\n    }\n    }\n    return\n    #endif\n    ...\n\
  ```\n\n对于生产构建，我们有一个订阅来接收数据。对于调试，我们只需本地加载数据。无论数据是从服务器还是本地文件获取，解析都是通过对数据属性的订阅来完成的。\n\
  \n**注意** 为了避免编译器警告，你可以删除前面代码中的 `return`，将 `#endif` 改为 `#else`，并在函数末尾加上 `#endif`。详情请参阅本章的\
  \ EOC 代码。\n\n如果你现在运行该应用，数据应该从文件加载并且 UI 会更新。本地数据在用户名后附加了“-test”，以区分加载的是哪部分数据，如图 16-7\
  \ 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig7_HTML.jpg](img/497312_1_En_16_Fig7_HTML.jpg)\n\
  \n图 16-7\n\n使用本地测试数据的 UI\n\n生产构建将忽略 `DEBUG` 条件语句，并从服务器加载数据。\n\n### 章节总结\n\n在本章的代码中，我们探讨了许多变化。我们看到了如何从\
  \ `URLSession` 创建一个发布者。生成的数据任务发布者可以像其他发布者一样使用运算符进行修改。我们可以映射数据、解码、替换错误、赋值等等。\n\n\
  我们还为本地测试数据创建了一个变体。此路径使用 `flatMap` 来解码数据并捕获任何错误。它在几个地方使用了 `Just`，并且还避免了在发生错误时取消订阅。\n\
  \n最后，我们有了两个已发布的属性和两个订阅者。\n\n我们的 `ContentView` 将 `UserStatusMgr` 属性声明为被观察对象。这样，当更新发生时，我们的\
  \ UI 将反映这些变化。\n\n第二个订阅者针对的是 `statusData` 属性。无论是通过本地数据加载还是服务器返回数据来更改它，我们的第二个订阅者都会处理它。现在我们有了一个统一的地方来解析数据、设置\
  \ `userStatus` 并发布给 UI。\n\n正如我希望你理解的那样，有多种方法可以完成你需要做的事情。哪种解决方案最佳取决于你的具体需求。我的意图是向你展示多种方法。但是，重申一下，这不是一本关于\
  \ Combine 的书。\n\n我们只看了运算符列表的一部分。通过进一步学习，其中一些会变得很熟悉，比如 `map`、`filter`、`reduce`、`compactMap`、`count`、`max`、`contains`、`drop`\
  \ 等等。还有一些运算符与带有“try”前缀的运算符相关，例如 `tryMap`、`tryFilter`、`tryReduce` 等等。\n\n一些运算符对你来说可能是新的，比如\
  \ `sink`、`zip`、`combineLatest` 和 `merge`。我希望你把它们都研究一下！\n\n"
- "# 17. 过渡与动画\n\n通常，当我亲自教授 iOS 开发时，我们会讨论各种 UI 动画的实现方式。动画领域有大量的方法和选项。然而，大多数时候，我们实际上并不试图做太复杂的事情。\n\
  \n我主要是为那些有业务需求的客户进行开发。这可能是一个面向客户的应用程序，一个他们网站的配套应用，或者一个用于查看数据的应用程序。\n\n通常，动画的发挥空间很小。我可能会为了显示而淡入/淡出某些内容。有时，我需要移动菜单或类似元素。但华丽的动画通常不在考虑范围之内。\n\
  \n我之所以说这些，是因为虽然我想向大家展示如何在 SwiftUI 中制作动画，但重点应该放在选项上。本章希望能提供一些工具，让你了解一些可能的实现方式以及如何深入研究。只是不要以为我们会构建一个\
  \ 3D 游戏或类似的东西。\n\n\n\n### 过渡效果\n\n过渡效果控制视觉元素如何从视图中插入或移除。插入和移除操作默认不会自动动画化，但可以通过设置实现动画效果。\n\
  \nSwiftUI 内置了一些常见展示效果的过渡动画，其中包括 `opacity`（透明度）、`move`（移动）、`scale`（缩放）和 `slide`（滑动）。`move`\
  \ 过渡需要指定一个 `Edge`（边缘）值，以确定移动起始位置：`top`（顶部）、`bottom`（底部）、`leading`（前导）或 `trailing`（后沿）。\n\
  \n接下来，我们添加一些 UI 元素来观察过渡效果的实际运作。\n\n## 文本的过渡效果\n\n我们将从创建一个新的 SwiftUI 项目开始。首先添加一个\
  \ `Button`（按钮）来切换某个布尔值，然后根据该值在 UI 中添加一个 `Text`（文本）元素，最后为这个文本元素设置插入和移除时的过渡效果。\n\n\
  ![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig1_HTML.png](img/497312_1_En_17_Fig1_HTML.png)\n\
  \n图 17-1 新建项目选项\n\n1.  新建一个 SwiftUI 项目（我将其命名为 `VariousUI`），界面框架选择 SwiftUI，生命周期选择\
  \ SwiftUI App（见图 17-1）。\n2.  在 `ContentView.swift` 文件的 `ContentView` 结构体中添加一个切换属性。\n\
  \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig2_HTML.jpg](img/497312_1_En_17_Fig2_HTML.jpg)\n\
  \n图 17-2 切换按钮与文本\n\n3.  在 `ContentView` 的 `body` 计算属性中，将默认内容替换为 `VStack`。\n\n  \
  \  ```\n    var body: some View {\n    VStack {\n    }\n    }\n    ```\n\n4.  在\
  \ `VStack` 中，创建一个用于切换值的 `Button`。\n\n    ```\n    Button(action: {\n    self.isToggled.toggle()\n\
  \    }) {\n    Text(\"Toggle\")\n    }\n    ```\n\n5.  在按钮下方添加另一个 `Text`，当属性值为 `true`\
  \ 时显示“Toggled”。\n\n    ```\n    if isToggled {\n    Text(\"Toggled\")\n    }\n \
  \   ```\n\n    现在运行应用，屏幕上会显示一个“Toggle”按钮。点击按钮后，会显示一个`Textfield`文本字段，如图 17-2 所示。\n\
  \n```\n@State var isToggled = false\n```\n\n接下来，我们将为 `Text` 元素添加过渡效果，使其以不同方式呈现。\n\
  \n1.  为 `Text` 元素添加过渡效果。\n\n    ```\n    Text(\"Toggled\")\n    .transition(.move(edge:\
  \ .top))\n    ```\n\n    如果现在运行应用，你仍然会看到 `Text` 元素突然出现和消失。我们需要添加一些动画效果。\n\n2.  为\
  \ `Text` 元素添加动画。\n\n    ```\n    Text(\"Toggled\")\n    .transition(.move(edge:\
  \ .top))\n    .animation(.easeInOut)\n    ```\n\n`Animation` 提供了多种选项，如图 17-3 所示。\n\
  \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig3_HTML.jpg](img/497312_1_En_17_Fig3_HTML.jpg)\n\
  \n图 17-3 动画部分列表\n\n欢迎尝试不同类型的动画。我个人非常喜欢 `spring`（弹簧动画）。\n\n现在运行应用（或启用实时预览模式），你应该会看到\
  \ `Text` 元素在添加时从顶部移入，在移除时也移向顶部。\n\n### 非对称过渡\n\n通常，我们希望元素以某种方式进入屏幕，却以不同的方式离开屏幕。为此，我们可以创建非对称过渡。创建非对称过渡的函数需要两个参数：`insertion`（插入）和\
  \ `removal`（移除）。这里只涉及两种过渡。\n\n因此，如果我们想用 `opacity`（淡入）插入一个 UI 元素，但用 `scale`（缩放）将其移除，这完全可行。\n\
  \n### 非对称过渡\n\n让我们为 `Text` 元素创建一个非对称过渡。如果你之前尝试过不同的过渡效果，应该已经见过 `opacity` 和 `scale`。我们将使用这两个效果。\n\
  \n1.  将之前使用的过渡（即 `move(edge: .top)`）替换为调用 `.asymmetric`。\n2.  对于 `insertion`，我们使用\
  \ `opacity`；对于 `removal`，传入 `slide`。\n\n    ```\n    Text(\"Toggled\")\n    .transition(\n\
  \    .asymmetric(\n    insertion: .opacity,\n    removal: .slide))\n    ```\n\n\
  ```\nText(\"Toggled\")\n.transition(\n.asymmetric(\n```\n\n运行应用。发生了什么？动画效果消失了！在这种隐式动画中，过渡效果不会自动产生动画。我们需要使用显式动画。\n\
  \n1.  在 `Button` 的 action 中，使用 `withAnimation` 为切换值的操作添加隐式动画。\n\n    ```\n    Button(action:\
  \ {\n    withAnimation(.easeInOut(duration: 1)) {\n    self.isToggled.toggle()\n\
  \    }\n    ```\n\n    这里我们传入了一秒作为动画时长。你可以自由传入你喜欢的任何时长（或者像之前那样不传参）。\n\n    现在，过渡效果应该可以正常工作和动画化了。但如果我们希望元素淡入并移动，或者使用其他组合过渡呢？我们可以将它们组合起来。\n\
  \n2.  在 `opacity` 过渡上调用 `combine`，并传入一个 `move` 过渡。\n\n    ```\n    Text(\"Toggled\"\
  )\n    .transition(\n    .asymmetric(\n    insertion: AnyTransition\n    .opacity\n\
  \    .combined(with:\n    .move(edge: .top)),\n    removal: .slide))\n    ```\n\n\
  现在过渡效果已按我们期望的方式工作，接下来进行代码清理。我们将为创建的过渡效果定义一个独立的过渡类型，可以通过扩展 `AnyTransition` 结构体来实现。\n\
  \n1.  创建 `AnyTransition` 的扩展（放在同一个文件中即可）。\n\n    ```\n    extension AnyTransition\
  \ {\n    }\n    ```\n\n2.  声明一个名为 `textTransition` 的静态变量，类型为 `AnyTransition`。\n\
  3.  实现 `textTransition` 的 `get`（无需关键字）方法，以创建我们在代码中使用的过渡效果。\n\n    ```\n    static\
  \ var textTransition : AnyTransition {\n    AnyTransition\n    .asymmetric(\n  \
  \  insertion: AnyTransition\n    .opacity\n    .combined(with:\n    .move(edge:\
  \ .top)),\n    removal: .slide)\n    }\n    ```\n\n4.  现在使用新定义的过渡效果，替换掉原先移动到 `textTransition`\
  \ 中的多行代码。\n\n    ```\n    Text(\"Toggled\")\n    .transition(.textTransition)\n\
  \    ```\n\n```\nstatic var textTransition : AnyTransition\n```\n\n运行代码，验证过渡效果是否与之前一致。\n\
  \n通过这个练习，我们不仅组合了多种过渡效果，还创建了一个自定义过渡，以便在其他地方复用。\n\n\n\n### 动画\n\n我们已经了解了一点关于过渡动画的内容。还有一些其他动画效果我们也想探讨一下。\n\
  \n各种修饰符的更改都可以进行动画化。一些常见的属性包括尺寸/缩放、颜色、阴影、旋转和模糊。\n\n修饰符的动画可以通过隐式或显式动画来实现。此外，你还可以针对不同的更改设置不同的隐式动画修饰符。\n\
  \n## 为更改添加动画\n\n在本练习中，我们将研究如何对 UI 元素的各项更改进行动画处理。\n\n1.  在 `VStack` 的底部，向 UI 添加一个圆形。\n\
  2.  将圆形的颜色设置为红色。\n\n```\nCircle()\n.foregroundColor(.red)\n```\n\n```\nCircle()\n\
  ```\n\n在预览中，你应该会在 UI 中看到一个大的红色圆形，如图 17-4 所示。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig4_HTML.jpg](img/497312_1_En_17_Fig4_HTML.jpg)\n\
  \n图 17-4：已添加到 UI 中的圆形\n\n3.  为圆形添加 `shadow`、`scaleEffect` 和 `blur` 修饰符，所有这些都基于 `isToggle`\
  \ 的值。\n\n```\nCircle()\n.foregroundColor(.red)\n.shadow(radius: isToggled ? 10 :\
  \ 50)\n.scaleEffect(isToggled ? 0.75 : 1)\n.blur(radius: isToggled ? 5 : 0)\n```\n\
  \n现在，当你运行应用并切换该值时，你应该会看到一个带有阴影、尺寸较小且应用了模糊效果的红色圆形，如图 17-5 所示。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig5_HTML.jpg](img/497312_1_En_17_Fig5_HTML.jpg)\n\
  \n图 17-5：切换值为 True 影响 UI\n\n这样做效果不错，并且有了动画。但对于一个鲜红色的球体来说，看起来似乎不够生动。让我们添加一个动画修饰符来赋予它一些活力。\n\
  \n4.  在 `scaleEffect` 修饰符之后，添加一个动画修饰符。使用 `spring` 并传入阻尼分数 `0.5`。\n\n```\nCircle()\n\
  .foregroundColor(.red)\n.shadow(radius: isToggled ? 10 : 50)\n.scaleEffect(isToggled\
  \ ? 0.5 : 1)\n.animation(.spring(dampingFraction : 0.5))\n.blur(radius: isToggled\
  \ ? 5 : 0)\n```\n\n阻尼分数是应用于被动画属性的拖拽力大小。默认值是 `0.825`，不会产生太多弹跳效果。我们设置的 `0.5` 效果相当不错。如果将其设置成一个很小的值，比如\
  \ `0.15`，会使它在最终值附近振荡好几次。你可以尝试一下。\n\n`spring` 还有许多其他参数可供传入。我鼓励你将来去查看一下。\n\n运行应用时，你应该会注意到阴影和缩放的动画使用了弹簧动画，并且它们使用了自身的计时。显式调用的\
  \ `withAnimation` 仍然持续一秒，并应用于 `blur`。如果不明显，可以将 `withAnimation` 的持续时间设为五秒来测试一下。\n\
  \n## ViewModifier 协议\n\n我们的红色圆形上应用了几个修饰符。如果我们喜欢这个组合，可能希望将其保存起来，以便在代码的其他地方使用。\n\n\
  对于我们的 `Transition`，我们是将其作为 `AnyTransition` 的一个扩展来实现的。我们声明的静态计算属性类型是 `AnyTransition`。对于我们的修饰符，它将是一个遵循\
  \ `ViewModifier` 协议的结构体。\n\n`ViewModifier` 协议与 `View` 非常相似。然而，它的 `body` 是一个函数而不是一个属性。这个\
  \ `body` 函数接收一个 `Content` 并返回一个 `View`。这里的 `Content` 就是应用该修饰符的值。在我们的例子中，它是一个实现了\
  \ `View` 的类型。\n\n### 创建视图修饰符\n\n我们将创建一个实现了 `ViewModifier` 的结构体。我们有一个必需的 `body` 函数，它接收一个\
  \ `Content`（在我们的例子中，是一个实现 `View` 的类型）并返回一个 `View`。\n\n1.  声明该结构体（在同一文件中即可）。\n\n\
  ```\nstruct BouncyModifier : ViewModifier {\n}\n```\n\n2.  声明一个用于控制 `View` 模糊量的属性。\n\
  \n```\nstruct BouncyModifier : ViewModifier {\n    var blurFactor : CGFloat\n}\n\
  ```\n\n3.  声明 `body` 函数。\n\n```\nstruct BouncyModifier : ViewModifier {\n    var\
  \ blurFactor : CGFloat\n    func body(content: Content) -> some View {\n    }\n\
  }\n```\n\n4.  实现 `body` 函数，将修饰符添加到传入的参数上。\n\n```\nreturn content\n    .shadow(radius:\
  \ blurFactor > 0 ? 10 : 50)\n    .scaleEffect(blurFactor > 0 ? 0.5 : 1.0)\n    .animation(\n\
  \        .spring(dampingFraction : 0.15))\n    .blur(radius: blurFactor)\n```\n\n\
  5.  使用新的修饰符替换之前的一串修饰符。\n\n```\nCircle()\n    .foregroundColor(.red)\n    .modifier(BouncyModifier(blurFactor:\n\
  \        isToggled ? 5 : 0))\n```\n\n运行应用，你会发现动画效果相同，但弹跳感更强了一点。\n\n除了使用 `.modifier`\
  \ 来创建 `ViewModifier`，还有另一种选择。我们可以为 `View` 创建一个扩展来帮我们做到这一点。\n\n最终，两者的作用是相同的，只是代码位置不同。这也有助于保持\
  \ `View` 代码的整洁。\n\n6.  为 `View` 定义一个扩展（在同一文件中即可）。\n\n```\nextension View {\n}\n\
  ```\n\n7.  定义一个 `bouncy` 函数，它接收一个 `CGFloat` 并返回一个 `View`。\n\n```\nextension View\
  \ {\n    func bouncy(blurFactor: CGFloat)\n        -> some View {\n    }\n}\n```\n\
  \n8.  返回一个使用传入参数创建的 `BouncyModifier` 修饰符。\n\n```\nextension View {\n    func bouncy(blurFactor:\
  \ CGFloat)\n        -> some View {\n        self.modifier(\n            BouncyModifier(blurFactor:\
  \ blurFactor))\n    }\n}\n```\n\n9.  在你的 `Circle` 上使用这个函数，而不是使用 `.modifier` 配合 `BouncyModifier`。\n\
  \n```\nCircle()\n    .foregroundColor(.red)\n    .bouncy(blurFactor: isToggled ?\
  \ 5 : 0)\n```\n\n通过创建 `ViewModifier` 和 `View` 的扩展，我们的代码变得更整洁了。我们可以在项目的其他地方复用这两者。此外，我们可以在一处进行更改，从而影响整个应用中的弹跳动画效果。\n\
  \n正如我所提到的，有一些动画函数可以影响动画的性能。其中一些用于控制动画时间的曲线。这些函数，`easeIn`、`easeOut`、`easeInOut` 和\
  \ `linear`，都提供了接受一个 `Double` 类型持续时间参数的形式。持续时间以秒为单位。\n\n`timingCurve` 函数允许开发者将时间曲线指定为贝塞尔路径坐标和持续时间。\n\
  \n我们已经看到 `spring` 及其默认值 `response`、`dampingFraction` 和 `blendDuration`。还有 `interactiveSpring`。它基本相同，但为交互式动画提供了不同的默认值。`interpolatingSpring`\
  \ 允许你指定（弹簧的）质量和刚度，以及阻尼和初始速度。\n\n其他函数包括 `delay`、`speed`，以及两个用于重复动画的函数：`repeatCount`\
  \ 和 `repeatForever`。\n\n所有这些函数都允许你自定义动画。说实话，在我使用动画的大部分时间里，我都可以坚持使用很多默认值。有时，我需要一个特定的持续时间。在这些情况下，我通常会使用\
  \ `0.37`，这与许多系统动画（如键盘弹出）的持续时间匹配。我使用的另一个变化差不多只有 `spring`，用来增加一些弹跳效果。\n\n\n### 渐变\n\
  \n让我们为圆形添加一些颜色。我们可以创建一个渐变来填充圆形。创建 `Gradient` 实例的一个简单方法是传入一些颜色。生成的 `Gradient` 会在颜色之间进行插值过渡。\n\
  \n要填充我们的圆形，我们将使用 `.fill` 修饰符。我们传入一个符合 `ShapeStyle` 协议的内容。`Color` 符合该协议，因此我们可以将一个颜色传入\
  \ `.fill`。\n\n```\nCircle().fill(Color.blue)\n```\n\n其他实现了 `ShapeStyle` 协议的结构体包括\
  \ `ForegroundStyle`、`ImagePaint`、`LinearGradient`、`RadialGradient` 和 `AngularGradient`。\n\
  \n## 为圆形添加颜色\n\n我们将创建一个渐变并填充圆形。现在，通过为元素增加一些细节定义，我们的动画会变得更有活力。\n\n1.  在 `ContentView`\
  \ 中创建一个渐变属性。\n\n    ```\n    struct ContentView: View {\n    @State var isToggled\
  \ = false\n    let gradient = Gradient(colors:\n    [.purple, .yellow,\n    .green])\n\
  \    ```\n\n2.  在 `body` 的顶部，`VStack` 之上，添加一个 `RadialGradient`。\n\n    ```\n   \
  \ var body: some View {\n    let radialGradient = RadialGradient(gradient:\n   \
  \ gradient,\n    center: .center,\n    startRadius: 1.0,\n    endRadius: 250.0)\n\
  \    VStack {...\n    ```\n\n3.  使用上一步创建的径向渐变，在 `Circle` 的 `.fill` 修饰符中替换掉 `.foreground`。\n\
  \n    ```\n    Circle()\n    .fill(radialGradient)\n    .bouncy(blurFactor: isToggled\
  \ ? 5 : 0)\n    ```\n\n运行应用，查看如图 17-6 所示的颜色效果。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig6_HTML.jpg](img/497312_1_En_17_Fig6_HTML.jpg)\n\
  \n图 17-6 — 动画后的径向渐变圆形\n\n1.  在第二步的 `radialGradient` 下方，创建一个 `AngularGradient`。\n\
  \n    ```\n    let angularGradient = AngularGradient(gradient:\n    gradient,\n\
  \    center: .center,\n    angle: .degrees(0))\n    ```\n\n2.  在 `.fill` 中使用这个新的\
  \ `angularGradient`。\n\n    ```\n    Circle()\n    .fill(angularGradient)\n    ```\n\
  \n运行应用，查看如图 17-7 所示的新颜色填充效果。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig7_HTML.jpg](img/497312_1_En_17_Fig7_HTML.jpg)\n\
  \n图 17-7 — 动画后的径向渐变圆形\n\n现在我们的圆形有了更多颜色，使其更具活力。\n\n## 旋转\n\n旋转 UI 元素是另一种常见的变换。它也是动画的一个很好的变化点。我们可以使用两个修饰符来轻松旋转圆形。\n\
  \n`rotationEffect` 修饰符接受两个参数。第一个参数是旋转的角度。第二个参数是可选的旋转中心点。默认的中心点是圆心。\n\n```\n.rotationEffect(.degrees(90))\n\
  ```\n\n注意：我们将在下一个练习中将这些旋转效果添加到代码中。\n\n`rotation3DEffect` 同样接受旋转角度和旋转轴。`anchor`（默认为中心）、`anchorZ`（默认为\
  \ 0）和 `perspective`（默认为 1）都有默认值，因此不是必需的。\n\n轴参数指定要围绕旋转的一个或多个轴。如果我们只指定 Z 轴，它的行为将和\
  \ `.rotationEffect` 一样。\n\n```\n.rotation3DEffect(Angle(degrees: 90),\naxis: (x:\
  \ 0, y: 0, z: 1))\n```\n\nZ 轴是前后方向。X 轴是左右方向。Y 轴是上下方向。\n\n让我们尝试一些操作。\n\n### 添加旋转效果\n\
  \n我们首先添加旋转来让圆形旋转起来。然后我们再添加 3D 旋转，看看真正的效果。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig8_HTML.jpg](img/497312_1_En_17_Fig8_HTML.jpg)\n\
  \n图 17-8 — 动画后的圆形\n\n1.  在我们自定义的 `.bouncy` 修饰符之后添加 `.rotationEffect`。\n\n    基于\
  \ `isToggled` 属性进行旋转。\n\n    ```\n        Circle()\n        .fill(angularGradient)\n\
  \        .bouncy(blurFactor: isToggled ? 5 : 0)\n        .rotationEffect(.degrees(isToggled\
  \ ? 90 : 0))\n    ```\n\n    运行应用，可以看到圆形像图 17-8 那样旋转了。\n\n2.  移除 `.rotationEffect`，改用\
  \ `.rotation3DEffect`，但仅针对 Z 轴。\n\n    ```\n    .rotation3DEffect(Angle(degrees:\
  \ isToggled ? 90 : 0),\n    axis: (x: 0, y: 0, z: 1))\n    ```\n\n    运行应用，结果应该与图\
  \ 17-7 看起来一样。\n\n3.  将轴改为 X 轴（其他两个轴设为 0）。\n\n    ```\n        .rotation3DEffect(Angle(degrees:\
  \ isToggled ? 90 : 0),\n        axis: (x: 1, y: 0, z: 0))\n    ```\n\n    如果你运行应用，会看到动画将圆形部分翻转，使其变平并不可见。\n\
  \n    使用 Y 轴会产生相同的效果，只是它会向另一个方向翻转。\n\n4.  在旋转调用中使用所有三个轴，并将角度改为 300。\n\n    ```\n\
  \        .rotation3DEffect(Angle(degrees:\n        isToggled ? 300 : 0),\n     \
  \   axis: (x: 1, y: 1, z: 1))\n    ```\n\n    现在运行代码会显示出更多的动作。它有点快，所以我们来放慢速度。\n\n\
  5.  在 `.rotation3DEffect` 之后添加一个带有 `.spring` 和速度设置的动画。\n\n    ```\n    .animation(.spring().speed(0.1))\n\
  \    ```\n\n    如果出现错误，是因为编译器无法确定上下文。在 `.spring` 前面加上 `Animation` 来帮助解决。\n\n   \
  \ ```\n    .animation(Animation.spring().speed(0.1))\n    ```\n\n    `speed` 接收一个动画时间乘数。使用\
  \ `0.10` 会使动画耗时变为与动画本身速度相关的 10%。默认动画耗时是 `0.37` 秒，所以我们的旋转应该大约需要 4 秒钟。\n\n最终结果应该如图\
  \ 17-9 所示。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig9_HTML.jpg](img/497312_1_En_17_Fig9_HTML.jpg)\n\
  \n图 17-9 — 3D 旋转后的圆形\n\n现在我们应用中有三个动画。第一个是在按钮动作中的隐式动画，用于为切换属性的变化添加动画效果。这为“Toggled”元素的文本添加了动画。\n\
  \n另一个动画处理了 `BouncyModifier`。它使用带阻尼分数参数的 `.spring`。\n\n第三个动画作用于我们的 3D 旋转效果，我们使用了\
  \ `.spring` 和 `.speed`。\n\n让我们对旋转动画再做一处修改。\n\n6.  将 `.spring` 和 `.speed` 调用改为一个持续时间为\
  \ `0.75` 秒的 `.linear`。\n\n    ```\n        Circle()\n        .fill(angularGradient)\n\
  \        .bouncy(blurFactor: isToggled ? 5 : 0)\n        .rotation3DEffect(Angle(degrees:\n\
  \        isToggled ? 300 : 0),\n        axis: (x: 1, y: 1, z: 1))\n        .animation(.linear(duration:\
  \ 0.75))\n    ```\n\n动画结束时的外观和之前一样。然而，动画耗时是固定的（不是带乘数的相对时间）。你可能会注意到旋转的开始和停止略显生硬。线性动画在动画过程中不会加速或减速。\n\
  \n\n\n## `DrawingGroup`\n\n我们的圆形绘制和动画效果很好，但若同时运行大量动画，性能可能会下降。\n\n假设我们在屏幕上放置 100\
  \ 个圆形。这将涉及大量动画：旋转、阴影、缩放和模糊。\n\n此时，使用绘图组（Drawing Group）有助于提升性能。将所有圆形放入一个绘图组后，它会先在屏幕外渲染`View`，再将结果呈现在屏幕上。这是一种更快的渲染方法。\n\
  \n此外，绘图组在底层使用 Metal 框架。它能更直接地与 GPU 协作，实现更快的图形处理。\n\n### 在 SWIFT 中使用 METAL\n\n在本练习中，我们将向用户界面添加\
  \ 100 个圆形。我们会将它们分两列排列，但其余代码保持不变。动画过程中性能将显著下降。我们将通过使用绘图组来解决这个问题。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig10_HTML.jpg](img/497312_1_En_17_Fig10_HTML.jpg)\n\
  \n图 17-10  \n用户界面中的一百个圆形\n\n1.  用 100 个圆形替换单个圆形。为此，使用一个`VStack`，其中包含一个范围为 0 到 9\
  \ 的`ForEach`。在`VStack`内部，创建一个`HStack`，其中包含另一个 0 到 9 的`ForEach`。在嵌套的`ForEach`内部，创建圆形。\n\
  \n    ```swift\n    VStack {\n        ForEach(0..<10, id: \\.self) { index in\n\
  \            HStack {\n                ForEach(0..<10, id: \\.self) { index2 in\n\
  \                    Circle()\n                        .fill(angularGradient)\n\
  \                        .bouncy(blurFactor: self.isToggled ? 5 : 0)\n         \
  \               .rotation3DEffect(Angle(degrees: self.isToggled ? 300 : 0), axis:\
  \ (x: 1, y: 1, z: 1))\n                        .animation(.linear(duration: 0.75))\n\
  \                }\n            }\n        }\n    }\n    ```\n\n    运行应用程序，确认如图\
  \ 17-10 所示，100 个圆形已添加到用户界面。你会注意到圆形小了很多。然而，我们的阴影设置仍然很高。这导致阴影相互融合，覆盖了屏幕的大部分区域。\n\n\
  \    如果你点击“Toggle”按钮，请注意动画的抖动现象。\n\n2.  将`.drawingGroup`添加到步骤 1 中创建的圆形外层`VStack`（从步骤\
  \ 1 创建）。\n\n    ```swift\n    ...}.drawingGroup()\n    ```\n\n    再次运行应用程序，注意动画变得多么流畅。\n\
  \n### 章节总结\n\n在本章中，我们探讨了许多用户界面方面的内容。我们首先学习了用于在用户界面中添加/移除元素的过渡（Transitions）。为了给过渡添加动画效果，我们研究了各种类型的过渡以及`.animation`修饰符。\n\
  \n为了组合动画，我们在`Transition`上使用了非对称过渡和`.combine`函数。当过渡效果达到预期后，我们将其移入了`AnyTransition`扩展中的一个静态计算属性。\n\
  \n我们通过`Circle`扩展了用户界面，并学习了一些用于缩放、阴影和模糊的新修饰符。通过`.animation`调用来基于切换值对这些修饰符进行动画处理。\n\
  \n我们将组合的修饰符移入了一个名为`BouncyModifier`的`ViewModifier`结构体。我们还在`View`的扩展中定义了一个函数来创建`BouncyModifier`。该修饰符被添加到了我们的`Circle`上，而不是将代码直接写在原地。\n\
  \n使用`ViewModifier`还使得这些效果可以在代码的其他地方复用。\n\n定义和使用渐变让我们的圆形更具立体感。而添加动画则让它更生动。我们探索了动画的各种选项，包括曲线、时间、弹簧以及三维空间中的坐标轴。\n\
  \n我们通过使用 Metal 框架的绘图组改进了 100 个圆形的性能。\n\n综合所有这些内容，展示了你可以对 UI 元素进行的各种动画处理方法和更改。相同类型的修饰符和动画可以应用于`Text`、`Button`或其他视觉元素。\n\
  \n"
- "# 18. 包含 WatchKit 的应用\n\n在本章中，我们将构建一个功能完整的小型应用。我们希望通过此练习来确保能够端到端地完成开发。\n\n我们将构建一个小费计算器。这通常是我的“首选”项目——部分原因是其需求基本已体现在名称中。\n\
  \n这是一个很好的练习，需要获取用户输入、以某种方式处理输入（功能性），并更新用户界面。当然，我们需要的输入数据是账单金额和小费百分比。\n\n我们可以通过多种方式从用户处获取这些信息：文本字段（TextField）、选择器（Picker）、滑块（Slider）等。我们计划使用`TextField`输入账单金额，使用`Picker`选择小费百分比。\n\
  \n功能将非常简单。事实上，我们甚至不需要通常意义上的函数或闭包。我们可以使用计算属性来代替。\n\n我们希望用户界面如图 18-1 所示。\n\n![../images/497312_1_En_18_Chapter/497312_1_En_18_Fig1_HTML.jpg](img/497312_1_En_18_Fig1_HTML.jpg)\n\
  \n图 18-1  \n小费计算器用户界面\n\n你可以尝试不往下看，直接编写应用。或者先阅读接下来的属性和 UI 设计部分，然后再尝试。看看你是否能应用学到的绑定（Binding）、UI\
  \ 元素等知识。\n\n### 属性\n\n如前所述，我们需要两个输入：账单金额和小费百分比。这些将是用`@State`属性包装器包装的属性，并随着输入变化而更新。\n\
  \n我们还将有一个属性来存储供用户选择的小费百分比数组。\n\n向用户显示数值意味着我们需要计算这些值。这可以通过计算属性完成。我们至少需要两个计算属性：小费金额和总计。\n\
  \n此外，输出应显示为货币格式。`NumberFormatter`类非常适合此用途。我们可以再创建一个计算属性来创建和配置`NumberFormatter`。\n\
  \n\n\n### UI 设计\n\n我们可以使用 `Text` 项来放置标题和两个输出区域。剩下的只有输入部分。我们可以使用之前提到的 `TextField`\
  \ 和 `Picker`。它们各自通过绑定（binding）关联到相关属性。\n\n在许多地方，我们会添加一些间距、内边距、字体粗细等，以使 UI 看起来更美观。\n\
  \n## 小费计算器\n\n首先，我们需要创建一个新项目。接着，我们将属性添加到 `ContentView` 中。最后，我们将创建 `body` 计算属性的内容。\n\
  \n![images/497312_1_En_18_Chapter/497312_1_En_18_Fig2_HTML.jpg](img/497312_1_En_18_Fig2_HTML.jpg)\n\
  \n**图 18-2** iOS App with Watch App 模板\n\n1.  创建一个名为 `TC` 的新项目，使用 watchOS 的“iOS\
  \ App with Watch App”模板，如图 18-2 所示。界面使用 `SwiftUI`，生命周期使用 `SwiftUI App`。\n\n2.  添加两个属性，作为用户输入的来源（source\
  \ of truth）。\n\n    ```\n    struct ContentView: View {\n    @State private var\
  \ tipSelected = 1\n    @State private var billInput = \"\"\n    ```\n\n3.  添加用户选择的小费百分比。\n\
  \n4.  添加一个数字格式化器的计算属性。\n\n    ```\n    private var numFormatter : NumberFormatter\
  \ {\n    let nf = NumberFormatter()\n    nf.numberStyle = .currency\n    nf.isLenient\
  \ = true\n    return nf\n    }\n    ```\n\n5.  创建一个 `billAmount` 的计算属性（输入的账单金额的双精度值）。\n\
  \n    ```\n    private var billAmount : Double {\n    numFormatter.number(from:\n\
  \    billInput)?\n    .doubleValue ?? 0.0\n    }\n    ```\n\n6.  使用第 5 步中定义的 `billAmount`，创建一个小费金额的计算属性。\n\
  \n    ```\n    private var tipAmount : Double {\n    billAmount * tipPercentages[tipSelected]\
  \ }\n    ```\n\n7.  使用第 5 步的 `billAmount` 和第 6 步的 `tipAmount`，创建一个总金额的计算属性。\n\n\
  \    ```\n    private var tipPercentages = [0.1, 0.15,\n    0.2, 0.25]\n    ```\n\
  \n8.  用 `VStack` 和包含最后内边距的应用标题替换默认的 `body` 内容。\n\n    ```\n    var body: some View\
