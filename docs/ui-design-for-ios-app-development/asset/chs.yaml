  \n图 2-9\n\n更新后的 UI 预览\n\n你可以轻松地看到有几项发生了变化：\n\n1.  文本（`“Hello, SwiftUI!”`）\n2.  字体颜色\n\
  3.  字体大小\n4.  字重\n5.  单词间距\n6.  `Text` 的大小\n7.  背景颜色\n8.  圆角半径\n\n请随意尝试各种修饰符及其值的设置。通过这些类型的实践，你会更熟练、更自然地进行这些修改。\n\
  \n理想情况下，你最终会达到无需停下来思考、疑惑和搜索正确设置的程度。\n\n以下是我在 SwiftUI 检查器中使用的、以达到我想要的 `Text` 项目效果的设置：\n\
  \n我在“字体”区域做了三项更改：字体本身、字重和颜色。\n\n我将内边距更改为 30（你可以直接点击数字进行编辑）。\n\n我还手动将框架的宽度和高度分别更改为\
