  \ 13-6 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig6_HTML.jpg](img/497312_1_En_13_Fig6_HTML.jpg)\n\
  \n**图 13-6** 使用 PriorityStarButtons 的用户界面\n\n### 添加协调器\n\n目前，我们只是将 `UIView` 包裹在了新结构体中。我们希望更新代码，以便使用协调器来处理按钮的目标。除此之外，如果用户点击了星形按钮，我们还想更新\
  \ `NoteViewModel`。\n\n理想情况下，无论我们是在主列表界面还是笔记详情页，我们都希望传播这个更改。这意味着我们需要添加绑定。\n\n`PriorityStarButtons`\
  \ 结构体和 `ButtonView` 类都有一个 `NoteViewModel` 属性。可以将其改为绑定类型。然后访问它会需要一些代码修改。\n\n`PriorityStarButtons`\
  \ 结构体遵循 `UIViewRepresentable` 协议。我们将在这里创建协调器。然后，协调器可以被传递给 `ButtonsView`，以建立按钮的目标关系。\n\
  \n**SWIFT 中的动作/目标**\n\n在本练习中，我们将准备新的类和结构体，以处理 `NoteViewModel` 的绑定。然后，我们可以创建协调器并将其传递给\
  \ `ButtonsView` 作为目标。最后，我们将在协调器中处理按钮点击事件以更新模型。这也会导致用户界面得到更新。\n\n1.  在 `NoteRow.swift`\
  \ 文件中，将 `PriorityStarButtons` 的属性改为绑定类型。\n\n```\nvar noteVM : Binding<NoteViewModel>\n\
  ```\n\n上述更改会导致一连串的错误。为了解决这个问题，我们需要传播被设置属性和被传递参数的类型。\n\n2.  将 `PriorityStarButtons`\
  \ 的 `init` 方法改为接受与步骤 1 中更改的属性相同的类型。\n\n```\ninit(noteViewModel : Binding<NoteViewModel>)\
  \ {\n    noteVM = noteViewModel\n}\n```\n\n在我们创建 `PriorityStarButtons` 实例的地方，需要更新\
  \ `NotePriorityAndTime`。目前，它在调用 `PriorityStarButtons` 的 `init` 方法时没有使用绑定。\n\n3.\
  \  更改 `PriorityStarButtons` 的初始化调用，以传入笔记视图模型的绑定。\n\n4.  在 `ButtonView` 中，更改属性和初始化参数的类型。\n\
  \n```\nPriorityStarButtons(noteViewModel: self.$noteVM)\n```\n\n```\nclass ButtonView\
  \ : UIView {\n    var noteVM : Binding<NoteViewModel>?\n    \n    init(rect : CGRect,\n\
  \         noteVM : Binding<NoteViewModel>) {\n        // ...\n    }\n}\n```\n\n\
  这应该能修复之前引起的编译错误。现在我们可以继续修复新的错误。\n\n5.  在 `ButtonView` 的 `configUI` 方法中，访问 `renderingColor`\
  \ 的包装值。\n\n6.  并访问 `priorityImage` 数组元素的包装值。\n\n```\nlet renderColor =\n    nvm.renderingColor.wrappedValue\n\
  \    == .red ? UIColor.red : UIColor.label\n```\n\n```\nlet img = UIImage(systemName:\n\
  \    noteVM!.priorityImages[btnIndex].wrappedValue)\n```\n\n此时，我们拥有的基本上和之前一样，只是多了绑定。功能应该没有改变。运行你的应用程序，确保其外观仍然相同。\n\
  \n现在让我们创建协调器。这个新类也可以接受一个指向 `NoteViewModel` 的绑定。不过，为了有所变化，我们只对关心的特定值使用绑定：图片字符串和时间字符串。\n\
  \n7.  在 `PriorityStarButtons` 类内部，为协调器声明一个新类。同时也包含那两个绑定属性。\n\n8.  为 `Coordinator`\
  \ 类创建一个初始化器，该初始化器接受两个将要存储在属性绑定中的值。\n\n```\nclass Coordinator : NSObject {\n    var\
  \ images : Binding<[String]>\n    var time : Binding<String>\n}\n```\n\n```\ninit(images\
  \ : Binding<[String]>,\n     time : Binding<String>) {\n    self.images = images\n\
  \    self.time = time\n}\n```\n\n既然我们知道协调器类将作为按钮的目标，我们现在可以实现需要的方法了。\n\n这个函数需要一个参数来表示按钮。另外，它需要暴露给\
  \ Objective-C，以便传入 `addTarget` 函数。\n\n这个方法的功能将更新协调器属性中绑定的值。\n\n9.  在协调器中创建一个函数，用于处理用户点击按钮时的事件。\n\
  \n```\n@objc func priorityChange(sender : UIButton) {\n    time.wrappedValue =\n\
  \        NoteViewModel.dateFormatter.string(from: Date())\n    let newPrority =\
  \ Priority(rawValue: sender.tag)!\n    images.wrappedValue =\n        NoteViewModel.handlePriority(priority:\
  \ newPrority)\n}\n```\n\n\n\n我们将时间包裹值设置为一个新字符串。我们重用了`NoteViewModel`中的静态日期格式化器来创建当前更新时间。\n\
  \n我们使用`UIButton`的`tag`值创建一个新的优先级。然后，我们在`NoteViewModel`上使用一个新函数来处理新的优先级。该函数根据优先级重新创建图片名称字符串并返回它们。将这个逻辑放在单独的方法中，允许我们在创建新的`NoteViewModel`之外更改图片名称绑定。\n\
  \n1. 在`makeCoordinator`中创建协调器。\n\n```\nfunc makeCoordinator() -> Coordinator {\n\
  \    return Coordinator(images: self.noteVM.priorityImages, time: self.noteVM.time)\n\
  }\n```\n\n现在，`noteVM`属性是一个绑定，我们可以在创建协调器时传入这些值。\n\n目前，我们的`ButtonView`对协调器一无所知。当创建`ButtonView`时，它需要`Coordinator`实例来为按钮添加目标。\n\
  \n1. 在`makeUIView`方法中将协调器添加到`ButtonView`的创建中。\n\n```\nreturn ButtonView(rect: rect,\
  \ noteVM: noteVM, coordinator: context.coordinator)\n```\n\n现在，我们需要在`ButtonView`的初始化器中接收协调器，并将其传递给`configUI`。\n\
  \n1. 将`Coordinator`参数添加到初始化器和对`configUI`的调用中。\n\n1. 将`Coordinator`作为参数添加到`ButtonView`的`configUI`中。\n\
  \n```\ninit(rect: CGRect, noteVM: Binding<NoteViewModel>, coordinator: PriorityStarButtons.Coordinator)\
  \ {\n    super.init(frame: rect)\n    self.noteVM = noteVM\n    configUI(coordinator:\
  \ coordinator)\n}\n```\n\n1. 使用我们定义的选择器和`touchUpInside`事件，将按钮的目标设置为协调器。\n\n```\n\
  func configUI(coordinator: PriorityStarButtons.Coordinator) {\n    // ...\n    btn.addTarget(coordinator,\
  \ action: #selector(PriorityStarButtons.Coordinator.priorityChange(sender:)), for:\
  \ .touchUpInside)\n}\n```\n\n剩下的唯一事情是实现`updateUIView`。它的第一个参数是一个`UIView`。我们知道这是`ButtonView`，可以通过一个`guard`语句来验证。\n\
  \n一旦我们有了类型转换后的`ButtonView`，就可以更新 UI。然而，我们不想重新创建 UI。让我们在`ButtonView`中添加一个函数，基于`tag`更新按钮图片。\n\
  \n`tag`可以作为图片名称字符串数组中的索引。如果图片名称已正确更新，这将正常工作。\n\n1. 在`ButtonView`中创建一个函数来更新按钮图片。\n\
  \n```\nfunc configPriorityImages() {\n    subviews.forEach { (btn) in\n        guard\
  \ let btn = btn as? UIButton else { return }\n        let imageIndex = btn.tag\n\
  \        let imageName = noteVM!.priorityImages[imageIndex].wrappedValue\n     \
  \   let img = UIImage(systemName: imageName)\n        btn.setImage(img, for: .normal)\n\
  \    }\n}\n```\n\n调用此函数时，它会遍历子视图，查找`UIButton`。然后获取`tag`，并使用它从`priorityImages`数组中获取图片名称。它根据该名称创建一个图片，并将其设置在按钮上。\n\
  \n现在，我们只需在需要时调用该函数来更新 UI。\n\n1. 在`updateUIView`中更新 UI。\n\n```\nfunc updateUIView(_\
  \ uiView: UIView, context: Context) {\n    guard let v = uiView as? ButtonView else\
  \ { return }\n    v.configPriorityImages()\n}\n```\n\n此函数通过`guard`语句验证`UIView`是否为`ButtonView`，然后调用其`configPriorityImages`方法。\n\
  \n这工作量真不小！我们获取了一个现有的`UIView`（即`ButtonView`），并将其包装在一个名为`PriorityStarButtons`的结构体中，该结构体实现了`UIViewRepresentable`。\n\
  \n该结构体有一个绑定类型的`NoteViewModel`，在其初始化器中设置。它的`makeUIView`函数创建一个`CGRect`，并用该矩形实例化`ButtonView`。它还将`NoteViewModel`绑定和来自上下文的协调器传入。\n\
  \n`ButtonView`的初始化器将绑定存储在`noteVM`中，并将协调器传递给`configUI`。该调用设置了 UI，包括为`Coordinator`向按钮添加目标。\n\
  \n`PriorityStarButtons`在`makeCoordinator`中创建协调器。它将优先级图片名称和时间（均来自`NoteViewModel`）传入。\n\
  \n`Coordinator`有两个绑定：`images`（字符串数组）和`time`（字符串）。这些都在初始化器中设置。它还有一个用于按钮动作调用的函数。这被作为目标添加到现有按钮上。\n\
  \n该目标函数更新时间与图片名称。这会导致 UI 更新，进而调用`updateUIView`，然后调用`configPriorityImages`来更新图片。\n\
  \n简而言之，`PriorityStarButtons`创建`ButtonView`，为其提供模型和协调器，并告诉`ButtonView`何时更新。\n\n`ButtonView`创建其按钮，向协调器添加目标，并在收到指令时更新按钮图片。\n\
  \n由于我们使用绑定来传递数据，无论你是在列表还是详情屏幕中更改优先级，都会保持同步。\n\n如果你运行应用，它应该会在你点击按钮时更新。如果你查看详情，它也应该如此。还要注意时间会更新，如图\
  \ 13-7 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig7_HTML.jpg](img/497312_1_En_13_Fig7_HTML.jpg)\n\
  \n**图 13-7** 当前 UI 与更新的时间\n\n我们在本练习中做了很多工作。但我希望你能看到清晰的区分。正如我们之前所见，`UIViewRepresentable`结构体负责创建和更新\
  \ UI。\n\n`Coordinator`是一个相当开放的类，作为协议函数的一部分被创建，并在上下文中传递。除此之外，它非常灵活。\n\n我们对`ButtonView`的主要更改是将属性改为绑定，并向协调器添加目标。如果该\
  \ UI 是在代码中创建的，很可能已经包含了`addTarget`调用。我们只需要更改它。\n\n### 章节总结\n\n在本章中，我们了解了如何使用现有的`UIView`。我们将其包装在一个遵循`UIViewRepresentable`的结构体中。我们创建并更新了它，作为协议函数的一部分。\n\
  \n我们创建了一个协调器，它包含绑定和一个可用于`addTarget`选择器的函数。\n\n为了让`ButtonView`不必了解`Coordinator`，它可以作为代码中定义的自定义协议传入。根据你具体的应用需求，你可以对这个概念进行多种变通。\n\
  \n我希望你记住几个要点。`UIViewRepresentable`负责创建和管理它所包装的`UIView`。如果需要绑定，没问题。我们现在对此已经很熟悉了。\n\
  \n协调器几乎可以是任何东西，并能满足你需要的任何目的。它在`makeCoordinator`中创建，从该函数返回，然后在上下文中传递。\n\n现在，我们知道如何使用带有委托和目标/动作模式的`UIView`了！\n\
  \n"
- "# 14. SwiftUI in UIKit\n\n我们研究了如何在 SwiftUI 中使用现有的 UIKit 视图。现在，我们将研究如何在 UIKit 中使用\
  \ SwiftUI。\n\n你可能有一个现有项目，希望使用 SwiftUI 添加新的 UI。因此，你已经为所有界面和导航设置了 Storyboard。实际上，将\
  \ SwiftUI 视图添加到项目中非常容易。\n\n当我们在应用中集成一个`UIView`时，我们使用了`UIViewRepresentable`。该协议帮助我们创建`UIView`实例。\n\
  \nUIKit 提供了一种反向操作的机制。有一个名为`UIHostingController`的`UIViewController`子类。同样，对于 macOS\
  \ 开发，有`NSHostingController`。WatchKit 版本名为`WKHostingController`。\n\n`UIHostingController`在初始化器中接受一个\
  \ SwiftUI `View`。因此，你需要负责创建新的 SwiftUI `View`。你用它创建`UIHostingController`实例并呈现它。\n\
  \n在本章中，我们将研究如何做到这一点，包括与 Storyboard 的集成。\n\n\n\n## `UIHostingController`\n\n这个新控制器已包含在对象库中。这意味着你可以轻松地将其添加到现有的\
  \ Storyboard 中。它与其他控制器一起列在对象库中，如图 14-1 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig1_HTML.jpg](img/497312_1_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1 — 对象库中的 Hosting View Controller\n\n用这个视图控制器更新 Storyboard 的方式与其他任何控制器相同。只需从对象库中将其拖放到\
  \ Interface Builder 中的 Storyboard 上即可。\n\n创建指向这个新控制器的 segue 也是一样的。只需按住 Control 键，从按钮或表格视图拖拽到你的新视图控制器上。它就像其他任何视图控制器一样完美契合，如图\
  \ 14-2 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig2_HTML.jpg](img/497312_1_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2 — 从 Storyboard 中的表格单元格到 Hosting Controller 的 Segue\n\nXcode 允许你按住 Control\
  \ 键从 Storyboard 拖拽到源视图控制器的代码中。这会在 segue 触发时创建一个 `IBSegueAction`。这个 segue 动作的返回类型期望返回一个视图控制器。\n\
  \n```\n@IBSegueAction func showDetails(_ coder: NSCoder)\n-> UIViewController? {\n\
  return UIHostingController(coder: coder,\nrootView: swiftUIView)\n}\n```\n\n你生成的代码的返回类型可能没有设置为\
  \ `UIViewController`。如果是这样，你需要将其改为 `UIViewController`。\n\n在实现中，你需要创建一个 `UIHostingController`\
  \ 的实例。你需要传入被调用函数所接收的 `coder` 参数。第二个参数是你新建的 SwiftUI 视图。\n\n上述代码仅展示了以 SwiftUI 视图占位符创建\
  \ `UIHostingController` 的过程。具体如何实例化，取决于你设计的视图。\n\n## 向 UIKit 添加 SwiftUI 视图\n\n让我们从一个基础练习开始。我们将创建一个简单的\
  \ Storyboard 应用，并添加一个 SwiftUI 视图。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig3_HTML.jpg](img/497312_1_En_14_Fig3_HTML.jpg)\n\
  \n图 14-3 — 使用 Storyboard 界面创建新的 iOS 应用项目\n\n1.  使用 Storyboard 创建一个新的 iOS 应用模板项目，并将其命名为\
  \ `Simple14`，如图 14-3 所示。\n\n2.  从对象库中向你的初始视图控制器添加一个按钮。\n\n3.  从对象库中将一个 Hosting View\
  \ Controller 拖放到你的 Storyboard 上，位于初始视图控制器的右侧。\n\n4.  按住 Control 键，从按钮拖拽到你的 Hosting\
  \ View Controller。\n\n当你在 Hosting View Controller 上释放鼠标时，在 segue 选项弹出菜单的顶部选择“显示”（Show）。\n\
  \n你的 Storyboard 中的界面应该如图 14-4 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig4_HTML.jpg](img/497312_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4 — 从 Storyboard 中的初始视图控制器到 Hosting Controller 的 Segue\n\n接下来，我们需要在代码中创建这个\
  \ segue 动作。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig5_HTML.jpg](img/497312_1_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5 — 命名 Segue 动作\n\n1.  打开辅助编辑器（编辑器 ➤ 辅助编辑器 或 ⌃⌥⌘⏎）以在右侧显示 `ViewController`\
  \ 代码。\n\n2.  按住 Control 键，从 segue 拖拽到 `ViewController` 代码中最后一个闭合大括号（`}`）的上方，然后释放鼠标。\n\
  \n3.  在出现的弹出窗口中，给你的 segue 动作函数命名（例如 `showSwiftUI`），如图 14-5 所示。\n\n4.  点击“连接”（Connect）按钮并查看生成的代码。\n\
  \n至此，我们已经完成了 Storyboard 的操作，可以将其关闭。接下来，我们需要创建 SwiftUI 视图，以便有内容可以显示。\n\n5.  向你的项目添加一个新文件（⌘+n）——选择“SwiftUI\
  \ 视图”（SwiftUI View）类型，然后点击“下一步”（Next）。\n\n6.  将文件命名为 `MySwiftUI`，然后点击“创建”（Create）。\n\
  \n预览不会工作，因为存在编译错误。我们的 segue 动作尚未实现。现在让我们回到 `ViewController` 类中修复它。\n\n7.  打开 `ViewController.swift`，在\
  \ `ViewController` 类声明之前导入 `SwiftUI`。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig6_HTML.jpg](img/497312_1_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6 — 模拟器中显示的 `MySwiftUIView`\n\n8.  实现 `showSwiftUI` 函数，使其返回一个 `UIHostingController`\
  \ 实例。传入 coder 和你新建的 `MySwiftUI` 结构体的实例。\n\n```\n    @IBSegueAction func showSwiftUI(_\
  \ coder: NSCoder)\n    -> UIViewController? {\n    return UIHostingController(coder:\
  \ coder,\n    rootView: MySwiftUI())\n    }\n```\n\n9.  运行应用并点击按钮。SwiftUI 视图应该会显示出来，如图\
  \ 14-6 所示。\n\n```\nimport SwiftUI\n```\n\n恭喜！你已经成功地将一个 SwiftUI 视图集成到了 UIKit/Storyboard\
  \ 应用中。\n\n对于一个简单的项目来说，这很容易，对吧？对于复杂的项目，流程也差不多。这实际上完全取决于你创建的 SwiftUI 视图。如果它需要交互或数据，则会有更多内容需要处理。\n\
  \n接下来，我们将探讨类似这样的实现。\n\n## 现有项目\n\n我为你提供了一个章节开始（BOC）项目：`Ch14_BOC_Timers.zip`。该项目允许用户创建计时器。一个计时器包含名称和时长。用户可以启动和暂停计时器。\n\
  \n当计时器结束时，如果用户已授权，它会弹出一个本地通知。\n\n向右滑动可以删除计时器。而向右轻扫会显示启动/暂停按钮，如图 14-7 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig7_HTML.jpg](img/497312_1_En_14_Fig7_HTML.jpg)\n\
  \n图 14-7 — 通过向右滑动启动计时器\n\n+ 按钮允许用户创建新的计时器。该代码中包含了一些为调试构建自动创建的测试计时器。\n\n这是我们的起点。但是，我们想使用\
  \ SwiftUI 来添加界面。当用户点击列表中的某个计时器时，我们希望显示其详细信息。这个简单的详情界面将包含名称、时间以及启动/暂停按钮。\n\n此外，随着计时器秒数的流逝，界面应该实时更新。\n\
  \n\n\n### 添加 SwiftUI\n\n如同我们在上一个练习中所做的那样，我们需要在 Storyboard 中添加一个托管视图控制器。然后在 `TimerListVC`\
  \ 代码中创建 segue 动作。在本例中，我们将从表格视图单元格开始操作。\n\n再次与上一个练习相同，我们在 Storyboard 中只需完成这些操作。\n\
  \n生成的 segue 动作函数需要返回一个 `UIViewController`。与前次一样，我们将创建 SwiftUI 视图的实例。该实例以及传入的代码将用于创建要返回的托管视图控制器。因此，我们需要创建一个\
  \ SwiftUI 视图！\n\n我们之前已经看到，`View` 结构体会获得一个成员逐一初始化器。在 Timers 项目中，这将包含用于显示详情的 `TimerItem`。\n\
  \n两个不太明显的部分是：更新时间的 UI，以及用于启动/暂停计时器的按钮。而且这些操作一点也不复杂。\n\n## 将计时器视图添加到 UIKit\n\n打开提供的\
  \ BOC 项目 `Ch14_BOC_Timers.zip`，并导航到 Storyboard。\n\n1. 从对象库中向 Storyboard 添加一个托管视图控制器。\n\
  \n2. 按住 Control 键从表格视图单元格拖拽到新的托管视图控制器，松开鼠标，然后从弹出菜单中选择 Show。\n\n你的 Storyboard 应该如图\
  \ 14-8 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig8_HTML.jpg](img/497312_1_En_14_Fig8_HTML.jpg)\n\
  \n图 14-8：包含托管视图控制器和 Segue 的 Storyboard\n\n3. 打开助理编辑器（Editor ➤ Assistant 或 ⌃⌥⌘⏎）。\n\
  \n4. 按住 Control 键从 segue 拖拽到 `TimerListVC.swift` 代码中（位于 `makeTimer` 函数下方），松开鼠标，并将函数命名为\
  \ `timerDetails`。\n\n现在我们需要创建 `TimerView` 来显示计时器详情。\n\n5. 向项目中添加一个新的 SwiftUI 视图文件，命名为\
  \ `TimerView.swift`。\n\n我们将用计时器详情替换 `body` 属性中的内容。当然，我们需要一个 `TimerItem` 来提供详情。\n\
  \n6. 添加 `TimerItem` 属性和 body 内容。\n\n```\nstruct TimerView: View {\n    var timer\
  \ : TimerItem\n    var body: some View {\n        VStack {\n            Text(timer.name)\n\
  \            Text(timer.timeString)\n        }\n    }\n}\n```\n\n7. 更新 `TimerView_Previews`，使其传入一个\
  \ `TimerItem`。\n\n```\nstruct TimerView_Previews: PreviewProvider {\n    static\
  \ var timer = TimerItem(name: \"Test Timer\",\n        seconds: 12)\n    static\
