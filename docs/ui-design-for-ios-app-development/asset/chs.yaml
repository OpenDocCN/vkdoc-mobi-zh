  \ `NoteRow` 的项前面加一个 `$` 符号即可。\n\n```\nNoteRow(noteVM: self.$items[noteIndex])\n\
  ```\n\n现在，当我们运行应用并编辑一个笔记时，它将反映在 `List` 中，如图 12-4 所示。\n\n![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig4_HTML.jpg](img/497312_1_En_12_Fig4_HTML.jpg)\n\
  \n**图 12-4** — 更新后的笔记\n\n## 本章小结\n\n通过使用 `UIViewRepresentable` 协议中的 `Coordinator`\
  \ 机制，我们现在可以编辑笔记了。此更改也会反映在主 `ContentView` 的 `List` 中。\n\n协调器的概念已内置于协议以及传递给相关函数的 `Context`\
  \ 中。然而，我们创建的类能够满足我们的需求。在我们的例子中，它需要遵循 `UITextViewDelegate` 协议。这还需要遵循 `NSObjectProtocol`\
  \ 协议，因此我们继承了 `NSObject`。\n\n我们需要 `text` 属性来进行绑定，但我们也可以选择是否绑定其他属性。我们还可以实现其他协议，或者将该类用作其他\
  \ `UIView` 实例的委托或数据源。\n\n就我们的用途而言，我们只是按规则行事。我们在需要时创建了协调器，将其设置为委托，并处理了文本更改。\n\n你可能和我一样在想，如果在\
  \ `makeUIView` 中直接创建一个 `Coordinator` 实例并将其设置为委托，会怎么样？能行得通吗？答案是：既行得通也行不通。\n\n问题在于文本视图的委托属性是弱引用。这意味着在\
  \ `makeUIView` 调用返回后，它会被立即释放。\n\n如果我让协调器成为 `TextView` 的一个属性呢？可以，但是你无法在其中声明中实例化它，因为它需要\
  \ `text` 属性。\n\n如果我让它成为一个可选属性，并在 `makeUIView` 中实例化它呢？可以，但这样你就修改了 `self` 的成员。而且如果你将\
  \ `makeUIView` 标记为 `mutating`，你就破坏了与 `UIViewRepresentable` 协议的适配。\n\n如果我让 `Coordinator`\
  \ 成为 `TextView` 外部的变量——也许是全局变量或类似的呢？是的，这也可以。虽然过程比较麻烦，但确实可行。如果你想传入一个 `Coordinator`，这或许是可行的方法。\n\
  \n这确实说明了一个有趣的点：我们使用的 `Coordinator` 设置并非必须的。可以通过其他方式实现。然而，协调器函数确实提供了帮助。此外，任何熟悉 `UIViewRepresentable`\
  \ 的人可能都会预期采用这种路径。\n\n既然我们已经看到了 UIKit 中的委托模式的使用，接下来我们将研究目标/动作模式。\n\n"
- "# 13. SwiftUI 中的目标/动作模式\n\n在上一章中，我们使用 `Coordinator` 作为 `UITextView` 的委托。但我们也意识到协调器的设置只是一个有用的机制。\n\
  \n我们本可以为委托创建一个新类。或者我们本可以让协调器实现更多协议。我们命名为 `Coordinate` 的这个类也可以取别的名字。它可以继承自另一个类并实现我们所需的功能。\n\
  \n那么，我们可以将同样的机制用于目标/动作模式吗？答案是肯定的。\n\n如果你有一个现有的 `UIView`，我们已经看到你可以通过 `UIViewRepresentable`\
  \ 协议来使用它。像往常一样声明其属性（可能是绑定属性）。实现 `makeUIView` 来创建你的 `UIView` 实例并返回它。实现 `updateUIView`\
  \ 来根据需要更新 UI。\n\n如果你需要一个协调器，实现 `makeCoordinator` 来返回你的协调器类的一个实例。它将作为协调器属性在 `Context`\
  \ 中传递。\n\n总的来说，我认为最好将类名保留为 `Coordinator`。我的重点是，重要的是概念本身——而不是具体的名称、父类或你的协调器类遵循的协议。\n\
  \n我已经对代码做了相当多的更新。没什么特别有趣的，但你或许想要从本章的代码库开始。概念是相同的。然而，我将一些东西移到了它们自己的方法中。这将有助于重用和 UI\
  \ 更新。下面我将回顾关键的更改。\n\n让我们看看如何使用目标/动作模式和协调器。\n\n\n\n### 目标/动作\n\n如果你曾经在代码中创建过 UIKit\
  \ 的按钮、滑块、开关等元素，你可能会对 `addTarget` 函数很熟悉。这里的唯一技巧是，协调器（coordinator）将成为动作的目标。这意味着要调用的函数也将位于协调器上。\n\
  \n如果你觉得这算不上什么技巧，那你是对的。每当你在 Swift 中添加目标时，你都需要指定实例、选择器和事件。这里并没有什么新东西。\n\n同样，这里也没什么特别的。我们定义一个类，然后从\
  \ `makeCoordinator` 方法中返回它的一个实例。通读代码可能会让你觉得复杂，但其核心设置你很可能已经很熟悉了。\n\n### ButtonView\n\
  \n在 `ListProject` 项目中，我在 `NoteRow.swift` 文件里有一个名为 `ButtonView` 的 `UIView` 子类。这将是我们从现有代码中导入视图的示例。它的声明和初始化方法如图\
  \ 13-1 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig1_HTML.jpg](img/497312_1_En_13_Fig1_HTML.jpg)\n\
  \n**图 13-1** ButtonView 声明与初始化器\n\n我们有一个用于按钮高度和宽度的 `let` 常量、一个 `NoteViewModel` 属性以及一个初始化器。`init`\
  \ 方法先调用父类的初始化方法，接着设置属性，然后调用 `configUI` 方法（见图 13-2）。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig2_HTML.jpg](img/497312_1_En_13_Fig2_HTML.jpg)\n\
  \n**图 13-2** configUI 方法\n\n此方法会遍历并根据 `NoteViewModel` 属性的优先级图片创建三个按钮。它使用循环索引来设置按钮的\
  \ `tag` 属性。这在之后计算新优先级时会派上用场。\n\n通常，我们也会向 `UIButton` 实例添加目标。不过，我们将使用协调器，这样代码就不会出现在前面的函数中。\n\
  \n还有一个用于 Storyboard 的必需 `init` 方法。由于我们并未使用 Storyboard，它只是如图 13-3 所示的样板代码。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig3_HTML.jpg](img/497312_1_En_13_Fig3_HTML.jpg)\n\
  \n**图 13-3** 必需的初始化方法（未使用）\n\n因此，我们现在有了需要复用到 SwiftUI 代码中的 `UIView`。\n\n### SwiftUI\
  \ 中的 UIView\n\n和之前一样，我们将创建一个实现 `UIViewRepresentable` 协议的结构体。我将其命名为 `PriorityStarButtons`。这个结构体将在\
