    # 1. Introducing SwiftUI


    First, thank you for reading at least this much of the first chapter. It’s tempting
    to skip it. However, I’m the type of person that reads the foreword, the preface,
    and so on. Someone thought it important enough to write and include it; maybe
    it’s worth it.


    When learning a new IDE, language, or user interface design tool, it can be hard
    to know where to start. I’ll say this: if you don’t know Swift, learning SwiftUI
    will be very tough. In fact, if you don’t know about Xcode, iOS development, and
    the various frameworks related to it, learning SwiftUI isn’t the best place to
    start (see Figure [1-1](#497312_1_En_1_Chapter.xhtml#Fig1)).


    This isn’t a book on Swift, Xcode, iOS frameworks, or UIKit. Being familiar with
    those is important if not required.


    ![../images/497312_1_En_1_Chapter/497312_1_En_1_Fig1_HTML.jpg](images/497312_1_En_1_Chapter/497312_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    SwiftUI Interface Example


    ## Exercises


    I’ve included one or more exercises per chapter. Some are shorter and some are
    longer. In each case, there is also one or more End of Chapter (EOC) zip file
    of the code for you to review.


    Many chapters build on the same code throughout the chapter. So there’s only one
    EOC file with the full result.


    The point of each exercise is practice. I want you to go through the process of
    employing what you’re learning. I highly recommend experimenting with variations
    of the exercises as your curiosity prompts you.


    I also strongly encourage repetition. If you repeat an exercise a handful of times
    to the point that you can just knock it out with familiarity, you’ll be better
    off when you’re done with this book.


    ## Concepts


    Much of SwiftUI will feel like Swift. That’s good if you know Swift. You’ll feel
    somewhat comfortable passing closures, chaining calls, handling optionals, and
    so on.


    However, SwiftUI has a very state-driven concept to the UI. The user interface
    is a display of the state. If a value (the state) changes, the UI should reflect
    that so it needs to render again.


    If the value displayed in a TextField is updated, the interface should display
    the new value. This is done automatically in SwiftUI with binding. We’ll use property
    wrappers (similar to how Optional is a type with a wrapped value) to pass these
    values into controls like the TextField.


    The TextField will be updated if the value changes. But also changes in the TextField
    will be stored in the same place as the item passed in. No more getting the text
    property and storing – SwiftUI cuts out the middle step and just changes the property!


    ## Source of Truth


    The concept of these property wrappers is tied to the idea of the “source of truth.”
    If we have the username or email address stored in a property, that can be the
    source of truth. If the property changes, the UI is updated. If the user types
    in a new value, it’s stored in that same property.


    There are different ways of using this concept on value types (e.g., structs)
    vs. reference types (e.g., classes). We’ll explore these in detail in this book.


    ## Old Friends


    We’ll also look at how to use an existing UI in a SwiftUI-based app. You may have
    some existing code that works great, and you want to reuse it. No sense in throwing
    it away if it’s still good.


    Or you may just not have time to re-create the whole UI in one effort.


    ## New Friends


    Of course, we’ll look at developing interface designs in SwiftUI. But we’ll also
    look at how to use SwiftUI in Storyboard projects. You may want to migrate to
    SwiftUI starting in your current UIKit app.


    However you decide or need to start using SwiftUI, I hope this book helps get
    you there.


    ## Combine


    If you haven’t used the Combine framework yet, you will in this book. This is
    not a book on Combine, but parts of it are tightly integrated in things we need
    to do in SwiftUI.


    There are Combine aspects sprinkled throughout this book. There’s also a chapter
    specifically intended to go a little deeper into Combine. That framework probably
    deserves its own book, but we’ll dig a bit deeper at times to understand what
    we’re doing and using.


    ## It’s All Good


    As mentioned, the code is the UI. It doesn’t get stored as XML or something, for
    the UI to get generated from.


    But also, the Canvas is the simulator. When you go into Live mode, it’s effectively
    the same as the simulator. It’s not perfect, but you can be sure it’s close. Also,
    it’s much more than just viewing a rendering of how it’s designed without the
    underlying code (like the Storyboard Preview).


    You can even design your preview to display for various color schemes, devices,
    and so on (see Figure [1-2](#497312_1_En_1_Chapter.xhtml#Fig2)).


    ![../images/497312_1_En_1_Chapter/497312_1_En_1_Fig2_HTML.jpg](images/497312_1_En_1_Chapter/497312_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Multiple Previews of One Element


    The key thing for me here is that we need to rethink how we think of the user
    interface. Instead of creating items with attributes, we call modifiers on those
    items. They in turn return items, and we repeat as we chain the calls together.


    Our UI is tied to our state, and they stay in sync. Changes to the state update
    the UI. Changes in the UI update the state.


    If you’re not careful, that may mean everything is tightly coupled. But we’re
    going to break things down and use a lot of functionality built into SwiftUI.
    In the end, we’ll see that many aspects of the interface work the same. So in
    the past, what took several building blocks can now be done with one or two.


    ## Platforms


    We’ll be focusing on iOS development with SwiftUI. However, in many cases, the
    code is the same for the Apple Watch, macOS, iPadOS, Apple TV, and who knows what’s
    coming.


    We’ll look at a couple examples of the UI from iOS copied into a watch project.
    The changes will be minimal to get it to work. SwiftUI is a bit more abstracted.
    Tell it to render a Picker, and it will figure out what that means given the platform.


    ## Let’s Get to Codin’


