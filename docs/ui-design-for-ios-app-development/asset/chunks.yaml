    HStack {\n    Image(systemName: \"star.circle\")\n    Image(systemName: note.priority.rawValue\
    \ > 0\n        ? \"star.circle\" : \"circle\")\n    Image(systemName: note.priority.rawValue\
    \ > 1\n        ? \"star.circle\" : \"circle\")\n}\n```\n\n```swift\n}.background(Color.gray)\n\
    ```\n\n\"Update\"按钮位于`ContentView`的 body 中。\n\n1. 向`NoteView`添加一个`Note`属性：\n\n\
    ```swift\nvar note : Note\n```\n\n该属性将被传入，因此不要将其设置为任何值。\n\n2. 类似地，添加一个将被传入的`DateFormatter`属性：\n\
    \n```swift\nvar df : DateFormatter\n```\n\n`NoteView`结构体已定义并可投入使用（图 6-5）。它包含了`Note`和`DateFormatter`这两个属性。我们在`ContentView`中已经有了这些属性。我们将使用`ContentView`中的这两个值来创建`NoteView`。\n\
    \n![图 6-5](img/497312_1_En_6_Fig5_HTML.jpg)\n\n*图 6-5：NoteView 及其属性和从 ContentView\
    \ 的 VStack 中移出的 UI 元素*\n\n3. 在`ContentView`的 body 属性中，创建一个新的`NoteView`实例。它应该放在之前`NoteView`的\
    \ body 中放置两个`Text`项和`Image`的`HStack`的位置（就在`Button`上方）：\n\n```swift\nNoteView(note:\
    \ self.note, df: df)\n```\n\n现在我们已经定义了自己的 UI 元素。我们可以像之前对`Text`所做的那样，将环境设置传递给我们的`NoteView`。\n\
    \n![图 6-6](img/497312_1_En_6_Fig6_HTML.jpg)\n\n*图 6-6：NoteView UI*\n\n4. 将之前应用于`Text`项的相同`.environment`修饰符添加到`NoteView`上。步骤\
    \ 7 和 8 合并后如下所示：\n\n```swift\nNoteView(note: self.note, df: df)\n    .environment(\\\
    .colorScheme, .dark)\n```\n\n5. 更新 Canvas 中`NoteView`的预览，它应该看起来像图 6-6。\n\n基本上，这就是我们想要的效果。我们展示了可以创建一个`NoteView`来自我控制，同时让父视图控制其环境。\n\
    \n然而，有两个问题。底部的内边距不太美观。此外，如果你在模拟器中运行它，可能会注意到优先级星星不再更新。\n\n这两个问题都很容易解决。对于内边距问题，我们仍然可以通过`.padding`修饰符在`NoteView`中控制\
    \ UI。如果我们在`NoteView`的`VStack`上添加内边距，它会在底部产生一个白色空间。这是因为内边距位于视图外部。这不是我们想要的效果。\n\n\
    相反，如果我们将内边距添加到最后一个 UI 项（即如下代码中的`HStack`），它就会显示正确：\n\n```swift\nHStack {\n    Image(systemName:\
    \ \"star.circle\")\n    Image(systemName: note.priority.rawValue > 0\n       \
    \ ? \"star.circle\" : \"circle\")\n    Image(systemName: note.priority.rawValue\
    \ > 1\n        ? \"star.circle\" : \"circle\")\n}\n.padding(.bottom)\n```\n\n\
    为了使`Note`的优先级更新，我们需要在 UI 中使用与在`ContentView`中创建的相同的`Note`实例。我们可以在`NoteView`中使用`ObservedObject`属性包装器。\n\
    \n6. 在`NoteView`中添加一个`ObservedObject`：\n\n```swift\n@ObservedObject var note :\
    \ Note\n```\n\n既然我们现在让`NoteView`控制 UI 以更新笔记实例，我们可以从`ContentView`的属性中移除`@ObservedObject`：\n\
    \n```swift\nstruct ContentView: View {\n    var note = Note()\n```\n\n一旦我们创建了`Note`（如上）并将其传递给`NoteView`，更改将发布到`NoteView`而不是`ContentView`。\n\
    \n![图 6-7](img/497312_1_En_6_Fig7_HTML.jpg)\n\n*图 6-7：带优先级更新的 NoteView*\n\n7.\
    \ 再次运行应用程序，验证优先级星星是否如图 6-7 所示更新。\n\n暗黑模式的变化也已处理，如图 6-8 所示。请确保你使用的是支持暗黑模式的模拟器/设备。\n\
    \n![图 6-8](img/497312_1_En_6_Fig8_HTML.jpg)\n\n*图 6-8：暗黑模式下的 NoteView UI*\n\n\
    **加分项**：作为额外练习，在`colorScheme`设置之后添加另一个`.environment`修饰符。尝试使用`\\.font`键路径并为`NoteView`的环境设置字体。你可以将其设置为类似：\n\
    \n```swift\nFont.system(.largeTitle)\n```\n\n在这个练习中，我们看到了如何让一个给定的视图控制自己的 UI。但我们也可以从父视图通过`.environment`修饰符来控制环境。\n\
    \n## 应用环境\n\n就像我们在创建`NoteView`时调用`.environment`修饰符一样，我们也可以在其他地方这样做。在模板为你创建的`SUINotesApp.swift`文件（根据项目名称命名）中，我们的`ContentView`被创建用于在模拟器/设备上运行应用程序（与\
    \ Canvas 相对）。\n\n就像我们创建`NoteView`一样，我们也可以为`ContentView`设置一些环境设置。因此，如果我们希望应用程序在暗黑模式下运行、使用固定字体、设置截断模式或其他各种设置，我们都可以在那个地方完成。\n\
    \n但请记住，这意味着你正在为该视图及其子视图设置环境。如果你将`colorScheme`设置为暗黑（或明亮）而系统处于明亮（或暗黑）模式，你只是为你的`ContentView`及其子视图更改了它——而不是为整个设备更改。但你的应用程序会一直以暗黑模式运行，无论用户如何设置设备。\n\
    \n或者，在你的`ContentView`实例上，你可以设置像`Font`这样的属性，它将会传播：\n\n```swift\nContentView()\n\
    \    .environment(\\.font, Font.system(.largeTitle))\n```\n\n如果你在`ContentView_Previews`代码中这样创建`ContentView`，你的预览将在\
    \ Canvas 中使用此设置。\n\n如果你在`SUINotesApp.swift`文件的`ContentView`创建代码中这样做，那么在模拟器或设备上运行时将使用这些设置。\n"
- fmt: "# `EnvironmentObject` Property Wrapper\n\nSometimes, the object you want to\
    \ monitor for changes doesn’t come directly from the parent. It might be a bad\
    \ design to pass it down through various views to get to the final view you’re\
    \ interested in.\n\nIn our app, the `Note` instance is created in the `ContentView`,\
    \ but that might not be the best or right place. Maybe we have a model that is\
    \ managed somewhere else. `ContentView` may have no business handling it much\
    \ less creating it.\n\nIn that case, we can use the `@EnvironmentObject` property\
    \ wrapper on the `Note` in `NoteView`. Our `NoteView` can ask for the `Note` instance\
    \ just like before. `ContentView` is out of the mix as far as `Note` goes.\n\n\
    This means we can remove the `note` property from our `ContentView`. Further,\
    \ we need to remove all references to it from the `ContentView` struct code. Our\
    \ `ContentView` is getting pretty lean at this point as in Figure [6-9](#497312_1_En_6_Chapter.xhtml#Fig9).\n\
    \n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig9_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9  \n`ContentView` Code Without `Note`\n\nSimilarly, we could move\
    \ the `DateFormatter` into `NoteView` (below), and `ContentView` gets even leaner\
    \ as in Figure [6-10](#497312_1_En_6_Chapter.xhtml#Fig10). If you had added the\
    \ `lightOrDark` property, you can remove that too.\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig10_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig10_HTML.jpg)\n\
    \nFigure 6-10  \n`ContentView` Code Without `DateFormatter`\n\nOur `NoteView`\
    \ gets a bit heftier with the `DateFormatter`, but that may be where it belongs\
    \ depending on the requirements (see Figure [6-11](#497312_1_En_6_Chapter.xhtml#Fig11)).\
    \ Without the `note` passed into the `NoteView` creation nor the initializer setting\
    \ it, we have an error. We’ll fix that by changing the property wrapper and, by\
    \ doing that, the way the `note` property is set.\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig11_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig11_HTML.jpg)\n\
    \nFigure 6-11  \n`NoteView` with `DateFormatter` with Error\n\n`ContentView` has\
    \ nothing to do with the model `Note` instance. `NoteView`, however, needs it,\
    \ and we have a compile error due to that. This is where `@EnvironmentObject`\
    \ comes in. We’ll tell `NoteView` to get it from the environment.\n\nSo add the\
    \ property wrapper to our `note` declaration:\n\n```\n@EnvironmentObject var note\
    \ : Note\n```\n\nWe’ll discuss this in more detail in Chapter [15](#497312_1_En_15_Chapter.xhtml).\
    \ The short version is since the `Note` struct is already defined as an `ObservableObject`,\
    \ it’s fine to declare a property of it with the `@EnvironmentObject` wrapper.\n\
    \nNow the `note` is taken care of in `NoteView`. But a `Note` instance is never\
    \ actually set. If we run the app, it crashes with this error:\n\n```\nFatal error:\
    \ No ObservableObject of type\nNote found. A View.environmentObject(_:)\nfor Note\
    \ may be missing as an ancestor of\nthis view.: file SwiftUI, line 0\n```\n\n\
    We need to set a `Note` in the environment. It’s no longer passed in by its creator.\
    \ That means it can be defined and set in the environment anytime before the `NoteView`\
    \ is created. It could be done in a Model management class or struct or wherever.\
    \ Let’s define and set it somewhere else for demonstration purposes.\n\nWe’ll\
    \ do it in `SUINotesApp.swift` with the `.environmentObject` modifier. First,\
    \ we’ll create a `Note` instance as a property of the `SUINotesApp` struct:\n\n\
    ```\nstruct SUINotesApp: App {\nvar note : Note {\nlet aNote = Note()\naNote.text\
    \ = \"SUINotesApp.swift\"\nreturn aNote\n}\n```\n\nIn the body property’s `WindowGroup`,\
    \ we’ll create our `ContentView` as before but add the `.environmentObject` call\
    \ for the `Note` instance:\n\n```\nContentView()\n.environment(\\.font,\nFont.system(.largeTitle))\n\
    .environmentObject(note)\n```\n\nIf we run the app in the simulator or device\
    \ (not the Canvas preview), it now uses this `note` from the environment. Since\
    \ we’re doing this in the `SUINotesApp` struct, these changes don’t affect the\
    \ preview in the Canvas. To do that, we’d need similar code in the `CodeView_Previews`\
    \ which we’ll do in the next section.\n\nThe updates (e.g., priority stars) still\
    \ get propagated to the UI like in Figure [6-12](#497312_1_En_6_Chapter.xhtml#Fig12).\n\
    \n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig12_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig12_HTML.jpg)\n\
    \nFigure 6-12  \nUI Using `Note` from the Environment\n\nDid you notice anything\
    \ sneaky about this? We just set a `Note` in the environment, and `NoteView` got\
    \ it. No key value. No accessor. It just got the one we wanted.\n\nRemember the\
    \ error message we got earlier? It said “No `ObservableObject` of type `Note`\
    \ found.” It’s looking for it “by type.” So when `NoteView` is created, it gets\
    \ the (one and only) item of type `Note`.\n\nSo if we replace it later or run\
    \ the `.environmentObject` modifier in `ContentView` to override the normally\
    \ inherited environment, `NoteView` will get that one.\n\nIf you need multiple\
    \ notes, you might need to add an array, manager class, or some singleton to the\
    \ environment. Or you might find that storing items in the environment isn’t the\
    \ right choice for what you need to do.\n\n## Preview Environment\n\nYou may have\
    \ also noticed your preview quit working. Since we are creating the `Note` in\
    \ the `SUINotesApp` struct now, our `ContentView_Previews` isn’t getting that\
    \ environment setting.\n\nWe can set it in the `ContentPreview` previews computed\
    \ property, but it’s a little tricky.\n\nFor one thing, the `previews` property\
    \ is static. If the `Note` instance is created outside of that, it needs to be\
    \ static as well like this:\n\n```\nstruct ContentView_Previews: PreviewProvider\
    \ {\nstatic var note = Note()\nstatic var previews: some View {\nContentView()\n\
    .environmentObject(note)\n}\n}\n```\n\nBut since it’s static, we don’t have the\
    \ opportunity to initialize the `text` property of the `note`. So in our case,\
    \ the text item will be blank.\n\nIt could be defined as static as a computed\
    \ property like this code:\n\n```\nstatic var note : Note {\nlet note = Note()\n\
    note.text = \"Static Computed\"\nreturn note\n}\n```\n\nYou can also create the\
    \ instance in the `.environmentObject` call like this:\n\n```\n.environmentObject(Note())\n\
    ```\n\nDepending on how you want the preview to appear, you have options. Similarly,\
    \ we’ve seen there are options about when to create something, how to pass it\
    \ around or access it, what is the source of truth, and other related possibilities."
  raw: '## EnvironmentObject Property Wrapper


    Sometimes, the object you want to monitor for changes doesn’t come directly from
    the parent. It might be a bad design to pass it down through various views to
    get to the final view you’re interested in.


    In our app, the Note instance is created in the ContentView, but that might not
    be the best or right place. Maybe we have a model that is managed somewhere else.
    ContentView may have no business handling it much less creating it.


    In that case, we can use the @EnvironmentObject property wrapper on the Note in
    NoteView. Our NoteView can ask for the Note instance just like before. ContentView
    is out of the mix as far as Note goes.


    This means we can remove the note property from our ContentView. Further, we need
    to remove all references to it from the ContentView struct code. Our ContentView
    is getting pretty lean at this point as in Figure [6-9](#497312_1_En_6_Chapter.xhtml#Fig9).


    ![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig9_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    ContentView Code Without Note


    Similarly, we could move the DateFormatter into NoteView (below), and ContentView
    gets even leaner as in Figure [6-10](#497312_1_En_6_Chapter.xhtml#Fig10). If you
    had added the lightOrDark property, you can remove that too.


    ![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig10_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    ContentView Code Without DateFormatter


    Our NoteView gets a bit heftier with the DateFormatter, but that may be where
    it belongs depending on the requirements (see Figure [6-11](#497312_1_En_6_Chapter.xhtml#Fig11)).
    Without the note passed into the NoteView creation nor the initializer setting
    it, we have an error. We’ll fix that by changing the property wrapper and, by
    doing that, the way the note property is set.


    ![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig11_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    NoteView with DateFormatter with Error


    ContentView has nothing to do with the model Note instance. NoteView, however,
    needs it, and we have a compile error due to that. This is where @EnvironmentObject
    comes in. We’ll tell NoteView to get it from the environment.


    So add the property wrapper to our note declaration:


    ```

    @EnvironmentObject var note : Note

    ```


    We’ll discuss this in more detail in Chapter [15](#497312_1_En_15_Chapter.xhtml).
    The short version is since the Note struct is already defined as an ObservableObject,
    it’s fine to declare a property of it with the `@EnvironmentObject wrapper`.


    Now the note is taken care of in NoteView. But a Note instance is never actually
    set. If we run the app, it crashes with this error:


    ```

    Fatal error: No ObservableObject of type

    Note found. A View.environmentObject(_:)

    for Note may be missing as an ancestor of

    this view.: file SwiftUI, line 0

    ```


    We need to set a Note in the environment. It’s no longer passed in by its creator.
    That means it can be defined and set in the environment anytime before the NoteView
    is created. It could be done in a Model management class or struct or wherever.
    Let’s define and set it somewhere else for demonstration purposes.


    We’ll do it in SUINotesApp.swift with the .environmentObject modifier. First,
    we’ll create a Note instance as a property of the SUINotesApp struct:


    ```

    struct SUINotesApp: App {

    var note : Note {

    let aNote = Note()

    aNote.text = "SUINotesApp.swift"

    return aNote

    }

    ```


    In the body property’s WindowGroup, we’ll create our ContentView as before but
    add the .environmentObject call for the Note instance:


    ```

    ContentView()

    .environment(\.font,

    Font.system(.largeTitle))

    .environmentObject(note)

    ```


    If we run the app in the simulator or device (not the Canvas preview), it now
    uses this note from the environment. Since we’re doing this in the SUINotesApp
    struct, these changes don’t affect the preview in the Canvas. To do that, we’d
    need similar code in the CodeView_Previews which we’ll do in the next section.


    The updates (e.g., priority stars) still get propagated to the UI like in Figure
    [6-12](#497312_1_En_6_Chapter.xhtml#Fig12).


    ![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig12_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    UI Using Note from the Environment


    Did you notice anything sneaky about this? We just set a Note in the environment,
    and NoteView got it. No key value. No accessor. It just got the one we wanted.


    Remember the error message we got earlier? It said “No ObservableObject of type
    Note found.” It’s looking for it “by type.” So when NoteView is created, it gets
    the (one and only) item of type Note.


    So if we replace it later or run the .environmentObject modifier in ContentView
    to override the normally inherited environment, NoteView will get that one.


    If you need multiple notes, you might need to add an array, manager class, or
    some singleton to the environment. Or you might find that storing items in the
    environment isn’t the right choice for what you need to do.


    ## Preview Environment


    You may have also noticed your preview quit working. Since we are creating the
    Note in the SUINotesApp struct now, our ContentView_Previews isn’t getting that
    environment setting.


    We can set it in the ContentPreview previews computed property, but it’s a little
    tricky.


    For one thing, the previews property is static. If the Note instance is created
    outside of that, it needs to be static as well like this:


    ```

    struct ContentView_Previews: PreviewProvider {

    static var note = Note()

    static var previews: some View {

    ContentView()

    .environmentObject(note)

    }

    }

    ```


    But since it’s static, we don’t have the opportunity to initialize the text property
    of the note. So in our case, the text item will be blank.


    It could be defined as static as a computed property like this code:


    ```

    static var note : Note {

    let note = Note()

    note.text = "Static Computed"

    return note

    }

    ```


    You can also create the instance in the .environmentObject call like this:


    ```

    .environmentObject(Note())

    ```


    Depending on how you want the preview to appear, you have options. Similarly,
    we’ve seen there are options about when to create something, how to pass it around
    or access it, what is the source of truth, and other related possibilities.'
  trans: "\n# `EnvironmentObject` 属性包装器\n\n有时，你想要监视变化的对象并非直接来自父视图。如果为了将其传递到最终的目标视图而经过多层视图传递，可能是一种糟糕的设计。\n\
    \n在我们的应用中，`Note` 实例是在 `ContentView` 中创建的，但这可能并非最佳或正确的位置。也许我们有一个在其他地方管理的模型。`ContentView`\
    \ 可能没有理由处理它，更不用说创建它了。\n\n在这种情况下，我们可以在 `NoteView` 中对 `Note` 使用 `@EnvironmentObject`\
    \ 属性包装器。我们的 `NoteView` 可以像之前一样请求 `Note` 实例。`ContentView` 就无需再处理 `Note` 了。\n\n\
    这意味着我们可以从 `ContentView` 中移除 `note` 属性。此外，我们还需要从 `ContentView` 结构体代码中删除所有对它的引用。至此，我们的\
    \ `ContentView` 变得相当精简，如图 6-9 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig9_HTML.jpg](img/497312_1_En_6_Fig9_HTML.jpg)\n\
    \n图 6-9  \n不含 `Note` 的 `ContentView` 代码\n\n类似地，我们可以将 `DateFormatter` 移到 `NoteView`（下方）中，`ContentView`\
    \ 则变得更加精简，如图 6-10 所示。如果你之前添加了 `lightOrDark` 属性，也可以一并移除。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig10_HTML.jpg](img/497312_1_En_6_Fig10_HTML.jpg)\n\
    \n图 6-10  \n不含 `DateFormatter` 的 `ContentView` 代码\n\n我们的 `NoteView` 因为加入了 `DateFormatter`\
    \ 而变得稍显臃肿，但这可能正是它该在的位置——具体取决于需求（见图 6-11）。由于创建 `NoteView` 时没有传入 `note`，也没有通过初始化器设置它，我们遇到了一个错误。我们将通过更改属性包装器，以及设置\
    \ `note` 属性的方式来解决这个问题。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig11_HTML.jpg](img/497312_1_En_6_Fig11_HTML.jpg)\n\
    \n图 6-11  \n包含 `DateFormatter` 且报错的 `NoteView`\n\n`ContentView` 与模型 `Note` 实例无关。然而，`NoteView`\
    \ 需要它，因此我们遇到了编译错误。这就是 `@EnvironmentObject` 发挥作用的地方。我们将告诉 `NoteView` 从环境中获取它。\n\
    \n因此，在我们的 `note` 声明中添加属性包装器：\n\n```\n@EnvironmentObject var note : Note\n```\n\
    \n我们将在第 15 章详细讨论这一点。简而言之，由于 `Note` 结构体已经被定义为 `ObservableObject`，因此使用 `@EnvironmentObject`\
    \ 包装器声明它的属性是可行的。\n\n现在，`NoteView` 中的 `note` 已经处理好了。但是，`Note` 实例实际上从未被设置。如果我们运行应用，它会因以下错误而崩溃：\n\
    \n```\nFatal error: No ObservableObject of type\nNote found. A View.environmentObject(_:)\n\
    for Note may be missing as an ancestor of\nthis view.: file SwiftUI, line 0\n\
    ```\n\n我们需要在环境中设置一个 `Note`。它不再由创建者传入。这意味着我们可以在 `NoteView` 创建之前的任何时候在环境中定义和设置它。这可以在模型管理类或结构体中完成，或者在任何其他地方进行。为了演示，我们换一个地方来定义和设置它。\n\
    \n我们将在 `SUINotesApp.swift` 中使用 `.environmentObject` 修饰器来完成。首先，我们创建一个 `Note` 实例作为\
    \ `SUINotesApp` 结构体的属性：\n\n```\nstruct SUINotesApp: App {\nvar note : Note {\n\
    let aNote = Note()\naNote.text = \"SUINotesApp.swift\"\nreturn aNote\n}\n```\n\
    \n在 body 属性的 `WindowGroup` 中，我们将像之前一样创建我们的 `ContentView`，但要为 `Note` 实例添加 `.environmentObject`\
    \ 调用：\n\n```\nContentView()\n.environment(\\.font,\nFont.system(.largeTitle))\n\
    .environmentObject(note)\n```\n\n如果我们现在在模拟器或设备（而非 Canvas 预览）中运行应用，它会使用来自环境的这个\
    \ `note`。由于我们在 `SUINotesApp` 结构体中执行此操作，这些更改不会影响 Canvas 中的预览。要实现预览同步，我们需要在 `CodeView_Previews`\
    \ 中添加类似的代码，我们将在下一节中完成。\n\n更新（例如，优先级星标）仍然会传递到 UI，如图 6-12 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig12_HTML.jpg](img/497312_1_En_6_Fig12_HTML.jpg)\n\
    \n图 6-12  \n使用环境中 `Note` 的 UI\n\n你注意到什么隐藏细节了吗？我们刚刚在环境中设置了一个 `Note`，`NoteView`\
    \ 就获取到了它。没有键值，没有访问器。它就这样获取到了我们想要的那个实例。\n\n还记得我们之前看到的错误信息吗？它说“找不到类型为 `Note` 的 `ObservableObject`。”它是“按类型”查找的。所以当\
    \ `NoteView` 被创建时，它获取了类型为 `Note` 的那个（唯一的）条目。\n\n因此，如果我们稍后替换它，或者在 `ContentView`\
    \ 中运行 `.environmentObject` 修饰器来覆盖通常继承的环境，`NoteView` 将获取到新的那个。\n\n如果你需要多个笔记，你可能需要在环境中添加一个数组、管理器类或某个单例。或者你会发现，将条目存储在环境中并不适合你的需求。\n\
    \n## 预览环境\n\n你可能也注意到你的预览无法工作了。由于我们现在是在 `SUINotesApp` 结构体中创建 `Note`，我们的 `ContentView_Previews`\
    \ 无法获得那个环境设置。\n\n我们可以在 `ContentPreview` 的预览计算属性中设置它，但这有点棘手。\n\n一方面，`previews`\
    \ 属性是静态的。如果 `Note` 实例是在它外部创建的，那么这个实例也需要是静态的，如下所示：\n\n```\nstruct ContentView_Previews:\
    \ PreviewProvider {\nstatic var note = Note()\nstatic var previews: some View\
    \ {\nContentView()\n.environmentObject(note)\n}\n}\n```\n\n但由于它是静态的，我们没有机会初始化\
    \ `note` 的 `text` 属性。所以在这个例子中，文本项将是空的。\n\n也可以像下面这样将其定义为静态的计算属性：\n\n```\nstatic\
    \ var note : Note {\nlet note = Note()\nnote.text = \"Static Computed\"\nreturn\
    \ note\n}\n```\n\n你也可以在 `.environmentObject` 调用中直接创建实例，如下所示：\n\n```\n.environmentObject(Note())\n\
    ```\n\n根据你希望预览呈现的效果，你有多种选择。类似地，我们已经看到在选择何时创建对象、如何传递或访问它、什么是事实来源以及其他相关可能性方面，也存在多种选项。\n"
- fmt: "# Usage\n\nThe question then comes up of when do you use which type of property\
    \ wrapper and observable binding.\n\nThe `@State` property wrapper is best for\
    \ values within a single view. If you have a counter or timer start value and\
    \ you want the UI to stay in sync, `@State` might be just right.\n\n`@Binding`\
    \ is when the source of truth is somewhere else. The `MyStepper` view used this\
    \ property wrapper to modify the source of truth outside of itself. Anything creating\
    \ an instance of `MyStepper` needs to pass in the source of truth using the `$`\
    \ for binding.\n\n`@ObservedObject` is for reference types (e.g., classes) that\
    \ are declared to conform to the `ObservableObject` protocol. If you declare your\
    \ property instance with the `@ObservedObject` wrapper, the implementation of\
    \ the class now needs to be coded to publish the updates. This is done either\
    \ through calls on a publisher (e.g., `self.objectWillChange.send()`) or by declaring\
    \ the properties with `@Published`.\n\nSo `@ObservedObject` is best used when\
    \ you have reference types that need to be monitored for updates to the UI. This\
    \ is also a good option if you already have a reference type model in your app\
    \ and you’re converting to SwiftUI. It requires little change to the existing\
    \ model code.\n\n`@Environment` is good for getting and setting environment variables\
    \ based on built-in key path constants like `.colorScheme`. The settings are passed\
    \ down into views when created. Environment settings for views can be set via\
    \ the `.environment` modifier on the view when created.\n\nEnvironment settings\
    \ are good for accessing values across your app or down paths of your app. They\
    \ don’t need to be specifically passed around – just inherited.\n\n`@EnvironmentObject`\
    \ is for declaring an object to be loaded from the environment “by type.” It’s\
    \ vital that this value is actually set or the app will crash. Like environment\
    \ settings, these values can be set on views when created and passed down through\
    \ inheritance. Environment objects are set with the `.environmentObject` modifier.\n\
    \nEnvironment objects are good similar to environment settings. If you need access\
    \ to an object in various places of your app but it doesn’t make sense to pass\
    \ them around all over, environment objects are a good choice.\n\n## Custom Environment\
    \ Values\n\nIt’s not difficult to add your own values to the environment. You\
    \ need a struct that conforms to `EnvironmentKey` which has one required static\
    \ computed property that’s read only:\n\n```\nstatic var defaultValue: Self.Value\
    \ { get }\n```\n\nWhen you implement that, you just need the `defaultValue` to\
    \ return the default value. If we want to store the default value for the `Note`\
    \ textfield, the type will be a `String`. So our environment key could look like\
    \ this:\n\n```\nstruct NoteInitialTextEnvironmentKey: EnvironmentKey{\n    static\
    \ var defaultValue: String = \"Default Note\"\n}\n```\n\nIn extended `EnvironmentValues`,\
    \ we can add a computed property that uses that key to get and set our value.\
    \ Whatever we name the property will be the key path we use to access it. We’ll\
    \ call ours `defaultNoteText`:\n\n```\nextension EnvironmentValues {\n    var\
    \ defaultNoteText: String {\n    }\n}\n```\n\nThe key we defined here will be\
    \ used in the subscript of the `EnvironmentValues`:\n\n```\nget {\n    return\
    \ self[NoteInitialTextEnvironmentKey.self]\n}\nset {\n    self[NoteInitialTextEnvironmentKey.self]\
    \ = newValue\n}\n```\n\nWith the preceding code defined, we can set the default\
    \ Note text with the `.environment` modifier:\n\n```\n.environment(\\.defaultNoteText,\
    \ \"New Default\")\n```\n\nAnd we can retrieve the value like any other environment\
    \ property:\n\n```\n@Environment(\\.defaultNoteText) var defaultText: String\n\
    ```\n\nOr get it directly using the subscript on an `EnvironmentValues` instance\
    \ like this:\n\n```\nEnvironmentValues()[NoteInitialTextEnvironmentKey.self]\n\
    ```\n\nIf you’re thinking that’s a good bit of work to store a value in the environment\
    \ when only one class may need it, I agree. In this case, a simple constant or\
    \ possibly a setting in `UserDefaults` would be fine.\n\nBut hopefully you see\
    \ how it works. Then, when it’s more applicable, you’ll understand how you can\
    \ employ it in your code.\n\nNow that we have a default value, our note instance\
    \ has a nonempty `String` value when it is created. This also fixed our blank\
    \ Textfield in the preview.\n\n## Chapter Summary\n\nIn this chapter, we learned\
    \ about the Environment. It’s a handy place to find a variety of values for the\
    \ environment your app is running in. You can also set your own custom values.\
    \ Watch out for the temptation to use `Environment` and `EnvironmentValues` where\
    \ it’s really overengineering.\n\nWe saw how settings with the `.environment`\
    \ modifier propagate to created views down the hierarchy.\n\nThe `.environmentObject`\
    \ modifier is useful for setting reference type objects in the environment too.\
    \ Remember, these are accessed by type. There are two big effects of this fact.\
    \ First, if this value isn’t set in the associated environment, the app will crash.\
    \ Second, the value will be replaced if set again.\n\nSwiftUI gives us a variety\
    \ of tools for accessing a value via the framework. In many cases, the framework\
    \ doing the work for us is very helpful. But it’s important to consider the need\
    \ for the data and which mechanism is best for a given case.\n\n# 7. List of Items\n\
    \nIn this chapter, we’ll turn our attention back to the UI as far as visual elements\
    \ go. We’ve seen how to add simple elements like `Text` and `Button`. Now we’ll\
    \ look at listing items.\n\nIf you’ve used UIKit in the past, you’re undoubtedly\
    \ familiar with `UITableView` and its assortment of relatives: `UITableViewController`,\
    \ `UITableViewDataSource`, `UITableViewDelegate`, and `UITableViewCell`.\n\nIn\
    \ SwiftUI, we’ll use a `List` in place of the `UITableView`. For the rows, we’ll\
    \ use Views just like we have been using. Doesn’t that sound much more simple?\
    \ No prototype cells. No back and forth of the table asking for a cell and your\
    \ code asking for a dequeued cell and the height of the cell returned somewhere\
    \ else.\n\n## List\n\nCreating a visual list of items will feel more like a loop\
    \ than creating a UI. That’s because it will loop over the values you tell it\
    \ to. Each iteration of the loop will create a View to be displayed.\n\nLet’s\
    \ start with a simple example in a new iOS app project. Create your project with\
    \ options for SwiftUI for the interface and SwiftUI App for the life cycle. Your\
    \ `ContentView` code should look like Figure 7-1.\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig1_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1: Default New Project Code\n\nLet’s create a simple list of some number\
    \ of items. First, we’ll delete the “Hello, World!” `Text` item. In its place,\
    \ we’ll add our list like this:\n\n```\nvar body: some View {\n    List(0..<19)\
    \ { index in\n        Text(\"\\(index)\")\n    }\n}\n```\n\nThis creates a list\
    \ of 20 items. Each item created is a `Text` UI element with the index number\
    \ (`Int`) for the loop. The top of the preview canvas looks like Figure 7-2.\n\
    \n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig2_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2: List of Text Items with a Number\n\nThe concept is very similar\
    \ to what we’ve already seen. Instead of an `HStack` or `VStack`, our body property\
    \ returns a `List`. We pass into the `List` a range of `0..<19`, and for each\
    \ pass it creates a `Text` element.\n\nThe closure we pass into the `List` call\
    \ takes a parameter which I named `index`. It’s an `Int` and it is the number\
    \ in the range of the current iteration.\n\nEasy. No cells, index path, or dequeuing\
    \ prototype cells defined in Interface Builder.\n\nBut what if we want something\
    \ more complex? Instead of a `Text` element, we can create whatever we want. We’ve\
    \ been dealing with our `Note` objects so let’s make a list of them."
  raw: '## Usage


    The question then comes up of when do you use which type of property wrapper and
    observable binding.


    The @State property wrapper is best for values within a single view. If you have
    a counter or timer start value and you want the UI to stay in sync, @State might
    be just right.


    @Binding is when the source of truth is somewhere else. The MyStepper view used
    this property wrapper to modify the source of truth outside of itself. Anything
    creating an instance of MyStepper needs to pass in the source of truth using the
    $ for binding.


    @ObservedObject is for reference types (e.g., classes) that are declared to conform
    to the ObservableObject protocol. If you declare your property instance with the
    @ObservedObject wrapper, the implementation of the class now needs to be coded
    to publish the updates. This is done either through calls on a publisher (e.g.,
    self.objectWillChange.send()) or by declaring the properties with @Published.


    So @ObservedObject is best used when you have reference types that need to be
    monitored for updates to the UI. This is also a good option if you already have
    a reference type model in your app and you’re converting to SwiftUI. It requires
    little change to the existing model code.


    @Environment is good for getting and setting environment variables based on built-in
    key path constants like .colorScheme. The settings are passed down into views
    when created. Environment settings for views can be set via the .environment modifier
    on the view when created.


    Environment settings are good for accessing values across your app or down paths
    of your app. They don’t need to be specifically passed around – just inherited.


    @EnvironmentObject is for declaring an object to be loaded from the environment
    “by type.” It’s vital that this value is actually set or the app will crash. Like
    environment settings, these values can be set on views when created and passed
    down through inheritance. Environment objects are set with the .environmentObject
    modifier.


    Environment objects are good similar to environment settings. If you need access
    to an object in various places of your app but it doesn’t make sense to pass them
    around all over, environment objects are a good choice.


    ## Custom Environment Values


    It’s not difficult to add your own values to the environment. You need a struct
    that conforms to EnvironmentKey which has one required static computed property
    that’s read only:


    ```

    static var defaultValue: Self.Value { get }

    ```


    When you implement that, you just need the defaultValue to return the default
    value. If we want to store the default value for the Note textfield, the type
    will be a String. So our environment key could look like this:


    ```

    struct NoteInitialTextEnvironmentKey: EnvironmentKey{

    static var defaultValue: String = "Default Note"

    }

    ```


    In extended EnvironmentValues, we can add a computed property that uses that key
    to get and set our value. Whatever we name the property will be the key path we
    use to access it. We’ll call ours defaultNoteText:


    ```

    extension EnvironmentValues {

    var defaultNoteText: String {

    }

    }

    ```


    The key we defined here will be used in the subscript of the EnvironmentValues:


    ```

    get {

    return

    self[NoteInitialTextEnvironmentKey.self]

    }

    set {

    self[NoteInitialTextEnvironmentKey.self] =

    newValue

    }

    ```


    With the preceding code defined, we can set the default Note text with the .environment
    modifier:


    ```

    .environment(\.defaultNoteText, "New Default")

    ```


    And we can retrieve the value like any other environment property:


    ```

    @Environment(\.defaultNoteText) var defaultText

    : String

    ```


    Or get it directly using the subscript on an EnvironmentValues instance like this:


    ```

    EnvironmentValues()

    [NoteInitialTextEnvironmentKey.self]

    ```


    If you’re thinking that’s a good bit of work to store a value in the environment
    when only one class may need it, I agree. In this case, a simple constant or possibly
    a setting in UserDefaults would be fine.


    But hopefully you see how it works. Then, when it’s more applicable, you’ll understand
    how you can employ it in your code.


    Now that we have a default value, our note instance has a nonempty String value
    when it is created. This also fixed our blank Textfield in the preview.


    ## Chapter Summary


    In this chapter, we learned about the Environment. It’s a handy place to find
    a variety of values for the environment your app is running in. You can also set
    your own custom values. Watch out for the temptation to use Environment and EnvironmentValues
    where it’s really overengineering.


    We saw how settings with the .environment modifier propagate to created views
    down the hierarchy.


    The .environmentObject modifier is useful for setting reference type objects in
    the environment too. Remember, these are accessed by type. There are two big effects
    of this fact. First, if this value isn’t set in the associated environment, the
    app will crash. Second, the value will be replaced if set again.


    SwiftUI gives us a variety of tools for accessing a value via the framework. In
    many cases, the framework doing the work for us is very helpful. But it’s important
    to consider the need for the data and which mechanism is best for a given case.


    # 7. List of Items


    In this chapter, we’ll turn our attention back to the UI as far as visual elements
    go. We’ve seen how to add simple elements like Text and Button. Now we’ll look
    at listing items.


    If you’ve used UIKit in the past, you’re undoubtedly familiar with UITableView
    and its assortment of relatives: UITableViewController, UITableViewDataSource,
    UITableViewDelegate, and UITableViewCell.


    In SwiftUI, we’ll use a List in place of the UITableView. For the rows, we’ll
    use Views just like we have been using. Doesn’t that sound much more simple? No
    prototype cells. No back and forth of the table asking for a cell and your code
    asking for a dequeued cell and the height of the cell returned somewhere else.


    ## List


    Creating a visual list of items will feel more like a loop than creating a UI.
    That’s because it will loop over the values you tell it to. Each iteration of
    the loop will create a View to be displayed.


    Let’s start with a simple example in a new iOS app project. Create your project
    with options for SwiftUI for the interface and SwiftUI App for the life cycle.
    Your ContentView code should look like Figure [7-1](#497312_1_En_7_Chapter.xhtml#Fig1).


    ![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig1_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    Default New Project Code


    Let’s create a simple list of some number of items. First, we’ll delete the “Hello,
    World!” Text item. In its place, we’ll add our list like this:


    ```

    var body: some View {

    List(0..<19) { index in

    Text("\(index)")

    }

    }

    ```


    This creates a list of 20 items. Each item created is a Text UI element with the
    index number (Int) for the loop. The top of the preview canvas looks like Figure
    [7-2](#497312_1_En_7_Chapter.xhtml#Fig2).


    ![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig2_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    List of Text Items with a Number


    The concept is very similar to what we’ve already seen. Instead of an HStack or
    VStack, our body property returns a List. We pass into the List a range of 0..<19,
    and for each pass it creates a Text element.


    The closure we pass into the List call takes a parameter which I named index.
    It’s an Int and it is the number in the range of the current iteration.


    Easy. No cells, index path, or dequeuing prototype cells defined in Interface
    Builder.


    But what if we want something more complex? Instead of a Text element, we can
    create whatever we want. We’ve been dealing with our Note objects so let’s make
    a list of them.'
  trans: "\n# 用法\n\n接下来要探讨的问题是，在何种情况下应使用哪种类型的属性包装器和可观察绑定。\n\n`@State` 属性包装器最适合用于单个视图内的值。如果你有一个计数器或计时器的起始值，并且希望\
    \ UI 保持同步，那么 `@State` 可能正好合适。\n\n`@Binding` 适用于数据真实来源位于其他位置的情况。`MyStepper` 视图使用此属性包装器来修改自身外部的数据真实来源。任何创建\
    \ `MyStepper` 实例的对象都需要使用 `$` 符号来传递数据真实来源以进行绑定。\n\n`@ObservedObject` 适用于声明为遵循 `ObservableObject`\
    \ 协议的引用类型（例如类）。如果你使用 `@ObservedObject` 包装器声明属性实例，则需要编写类的实现代码来发布更新。这可以通过调用发布者（例如\
    \ `self.objectWillChange.send()`）或使用 `@Published` 声明属性来实现。\n\n因此，`@ObservedObject`\
    \ 最适合用于需要监控更新以刷新 UI 的引用类型。如果你的应用中已有引用类型模型，并且正在转换为 SwiftUI，这也是一个不错的选择。它对现有模型代码的改动要求很小。\n\
    \n`@Environment` 适合根据内置键路径常量（如 `.colorScheme`）来获取和设置环境变量。这些设置在视图创建时会向下传递。视图的环境设置可以在创建时通过视图上的\
    \ `.environment` 修改器进行设置。\n\n环境设置非常适合跨应用或沿应用路径访问值。它们不需要专门传递——只需继承即可。\n\n`@EnvironmentObject`\
    \ 用于声明一个按“类型”从环境中加载的对象。关键的是，这个值必须实际设置，否则应用会崩溃。与环境设置类似，这些值可以在视图创建时设置，并通过继承向下传递。环境对象通过\
    \ `.environmentObject` 修改器进行设置。\n\n环境对象与环境设置类似。如果你需要在应用的多个位置访问某个对象，但又不便四处传递该对象，环境对象是一个不错的选择。\n\
    \n## 自定义环境值\n\n向环境中添加自己的值并不困难。你需要一个遵循 `EnvironmentKey` 的结构体，该结构体有一个必需的、只读的静态计算属性：\n\
    \n```\nstatic var defaultValue: Self.Value { get }\n```\n\n实现该属性后，只需让 `defaultValue`\
    \ 返回默认值即可。如果我们想存储 `Note` 文本字段的默认值，其类型应为 `String`。那么我们的环境键可以这样写：\n\n```\nstruct\
    \ NoteInitialTextEnvironmentKey: EnvironmentKey{\n    static var defaultValue:\
    \ String = \"Default Note\"\n}\n```\n\n在扩展的 `EnvironmentValues` 中，我们可以添加一个计算属性，使用该键来获取和设置我们的值。我们给该属性起的名字就是我们用来访问它的键路径。我们将其命名为\
    \ `defaultNoteText`：\n\n```\nextension EnvironmentValues {\n    var defaultNoteText:\
    \ String {\n    }\n}\n```\n\n我们在此定义的键将用于 `EnvironmentValues` 的下标访问中：\n\n```\n\
    get {\n    return self[NoteInitialTextEnvironmentKey.self]\n}\nset {\n    self[NoteInitialTextEnvironmentKey.self]\
    \ = newValue\n}\n```\n\n定义好上述代码后，我们可以使用 `.environment` 修改器设置默认的 Note 文本：\n\n```\n\
    .environment(\\.defaultNoteText, \"New Default\")\n```\n\n并且我们可以像获取其他环境属性一样获取该值：\n\
    \n```\n@Environment(\\.defaultNoteText) var defaultText: String\n```\n\n或者直接使用\
    \ `EnvironmentValues` 实例上的下标来获取它，如下所示：\n\n```\nEnvironmentValues()[NoteInitialTextEnvironmentKey.self]\n\
    ```\n\n如果你觉得只为可能被一个类需要的值在环境中存储这么一大段代码工作量不小，我同意这种看法。在这种情况下，使用一个简单的常量，或者在 `UserDefaults`\
    \ 中设置一个值，就足够了。\n\n但希望你能理解其工作原理。这样，当它更适用时，你就会明白如何在代码中使用它。\n\n现在我们已经有了一个默认值，我们的\
    \ note 实例在创建时就拥有了一个非空的 `String` 值。这也修复了预览中空白的 Textfield。\n\n## 章节总结\n\n在本章中，我们学习了环境。它是一个方便的地方，可以找到应用运行环境的各种值。你也可以设置自己的自定义值。要注意避免过度设计，将\
    \ `Environment` 和 `EnvironmentValues` 用在不必要的地方。\n\n我们了解了 `.environment` 修改器的设置是如何沿视图层级向下传播给创建的视图。\n\
    \n`.environmentObject` 修改器也用于在环境中设置引用类型的对象。请记住，这些对象是按类型访问的。这一特性有两个重要影响。首先，如果这个值在关联环境中未设置，应用将崩溃。其次，如果再次设置该值，它将被替换。\n\
    \nSwiftUI 为我们提供了多种通过框架访问值的工具。在许多情况下，框架替我们完成工作非常有用。但重要的是要根据数据的需求以及特定情况下哪种机制最合适来做出选择。\n\
    \n# 7. 项目列表\n\n在本章中，我们将把注意力转回 UI 的可视元素方面。我们已经了解了如何添加像 `Text` 和 `Button` 这样的简单元素。现在，我们将研究如何列出项目。\n\
    \n如果你以前使用过 UIKit，那么你一定对 `UITableView` 及其一系列相关类非常熟悉：`UITableViewController`、`UITableViewDataSource`、`UITableViewDelegate`\
    \ 和 `UITableViewCell`。\n\n在 SwiftUI 中，我们将使用 `List` 来替代 `UITableView`。对于行，我们将像之前一样使用视图。听起来是不是简单多了？不需要原型单元格。没有来回的表格询问单元格、你的代码请求出列单元格以及在其他地方返回单元格高度这样的操作。\n\
    \n## List\n\n创建一个视觉上的项目列表，感觉更像是在写一个循环，而不是创建 UI。这是因为它会遍历你告诉它的值。循环的每次迭代都会创建一个要显示的视图。\n\
    \n让我们在一个新的 iOS 应用项目中从一个简单的例子开始。创建项目时，接口选择 SwiftUI，生命周期选择 SwiftUI App。你的 `ContentView`\
    \ 代码应该如图 7-1 所示。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig1_HTML.jpg](img/497312_1_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1：默认的新项目代码\n\n让我们创建一个包含若干项目的简单列表。首先，我们删除“Hello, World!”的 `Text` 项目。在它的位置，我们添加一个列表，如下所示：\n\
    \n```\nvar body: some View {\n    List(0..<19) { index in\n        Text(\"\\(index)\"\
    )\n    }\n}\n```\n\n这会创建一个包含 20 个项目的列表。每个创建的项目都是一个 `Text` UI 元素，显示循环中的索引编号 (`Int`)。预览画布的顶部如图\
    \ 7-2 所示。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig2_HTML.jpg](img/497312_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2：带有数字的文本项列表\n\n这个概念与我们之前看到的非常相似。与使用 `HStack` 或 `VStack` 不同，我们的 body 属性返回一个\
    \ `List`。我们向 `List` 传递一个范围 `0..<19`，每次遍历都会创建一个 `Text` 元素。\n\n我们传递给 `List` 调用的闭包接受一个参数，我将其命名为\
    \ `index`。它是 `Int` 类型，表示当前迭代在范围内的数字。\n\n很简单。没有在 Interface Builder 中定义的单元格、索引路径或出列的原型单元格。\n\
    \n但如果我们想要更复杂的东西呢？我们可以创建任何我们想要的，而不只是 `Text` 元素。我们一直在处理 `Note` 对象，所以让我们创建一个包含它们的列表。\n"
- fmt: "# NoteRow View\n\nWe’ll start by creating a new file for our separate view.\
    \ This will help with the preview of the row as we design it.\n\nRight-click your\
    \ main folder of your project and select “New File…” as in Figure [7-3](#497312_1_En_7_Chapter.xhtml#Fig3).\n\
    \n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig3_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\n\nNew File…\n\nIn the pop-up, filter for view and select SwiftUI\
    \ View as in Figure [7-4](#497312_1_En_7_Chapter.xhtml#Fig4). Click Next, name\
    \ it `NoteRow`, and click Create.\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig4_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nSwiftUI View\n\nInitially, the `NoteRow` body property will be\
    \ another `Text` with “Hello, World!”. We’ll replace that with something more\
    \ along the lines of a row in a list.\n\nOf course, our `NoteRow` needs a `Note`\
    \ which hasn’t been defined in this project (assuming you used a new project like\
    \ I did). I’ll define a `Note` class based on what we’ve done in previous chapters.\
    \ It will look familiar as in Figure [7-5](#497312_1_En_7_Chapter.xhtml#Fig5).\n\
    \n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig5_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nNote Defined in `NoteRow.swift`\n\nIt’s a slightly simplified\
    \ and cleaned version of what we’ve been using. It’s good for what we’ll be doing\
    \ here.\n\nIf the `NoteRow` view has a `Note` instance, it can create a view that\
    \ will look good in a list of notes. In our previous projects, the `NoteView`\
    \ was not a great layout for a list. It was more square and chunky. We’d rather\
    \ have something wider than tall and laid out in such a way that looks good when\
    \ scrolling through the items.\n\nWe may not even choose to include all of the\
    \ information about a `Note`. Depending on the app, having the `updatedAtTime`\
    \ may not be useful to the user. For our example here, we’ll put all of the information\
    \ on the UI, but that’s not always the case.\n\n## Creating a List of Notes\n\n\
    We need to create `NoteRow` to display desired data about the `Note`. Once we\
    \ have what we like, we can change out the `List` creation with `NoteRows`.\n\n\
    1. Add properties and an initializer to the `NoteRow` like this:\n\n```\n    var\
    \ note : Note\n    let df = DateFormatter()\n    init() {\n    df.dateStyle =\
    \ .none\n    df.timeStyle = .medium\n    }\n```\n\nAs in the past, this will force\
    \ the creation of the `NoteRow` to require a `Note` to be passed in. Good.\n\n\
    2. Delete the `Text` item from the `NoteRow` body property.\n\nYou’ll get some\
    \ errors at this point, but we’ll get rid of them quickly.\n\n3. Within the body\
    \ property, create a `VStack` with a `Text` item for the note’s textfield:\n\n\
    ```\n    var body: some View {\n    VStack {\n    Text(note.text)\n    }\n   \
    \ }\n```\n\nAt this point, our body property is valid, but our preview doesn’t\
    \ work. That’s because the creation of `NoteRow` in the `NoteRow_Previews` doesn’t\
    \ pass in a `Note`.\n\n4. Update the `NoteRow_Previews` to pass in a note:\n\n\
    ```\nNoteRow(note: Note())\n```\n\nIf you resume your preview, you should see\
    \ “New Note” instead of “Hello, World!”.\n\nThis is technically enough for a `List`,\
    \ but let’s flesh it out a bit more before jumping to that. But always feel free\
    \ to experiment!\n\n5. Under the text item in `NoteRow`’s body, add an `HStack`\
    \ with the priority star images like we had before:\n\n```\n    HStack {\n   \
    \ Image(systemName: \"star.circle\")\n    Image(systemName: note.priority.rawValue\
    \ > 0 ?\n    \"star.circle\" : \"circle\")\n    Image(systemName: note.priority.rawValue\
    \ > 1 ?\n    \"star.circle\" : \"circle\")\n    }\n```\n\n6. Below the images\
    \ you added in step 5, add another `Text` item for the `Date` value:\n\n```\n\
    Text(df.string(from: note.updatedAtTime))\n```\n\nNow we’re ready to create our\
    \ `List`!\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig6_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6\n\nList of Notes\n\n7. Back in `ContentView`, remove the `Text` item\
