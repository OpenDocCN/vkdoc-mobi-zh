- fmt: "# WatchKit\n\nAnother cool thing, as we saw before, is that this UI works\
    \ on the Watch as well. It requires just a few changes but looks like Figure [19-7](#497312_1_En_19_Chapter.xhtml#Fig7).\n\
    \n![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig7_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig7_HTML.jpg)\n\
    \nFigure 19-7 UI on Watch\n\n`WatchKit` doesn't support `NavigationView` so that\
    \ needs to be commented out or removed. Similarly, there's no keyboard support\
    \ so the keyboard type and content type need to be removed.\n\n# Chapter Summary\n\
    \nIn this app, we had a bit of a UI design to aim for. We needed to create an\
    \ app that allowed users to enter values. The code stores the values with bindings.\n\
    \nBeyond storing the values, we saw how `TextField` can have an associated formatter\
    \ like date or number formatter.\n\nWe also used a `Form` to display our mechanism\
    \ for user input. We used `Section`s in our `Form` that are displayed in a table\
    \ view.\n\nA horizontal scroll view made one option for selecting a state pretty\
    \ easy. We used an `HStack` with `Text` items. The `onTapGesture` for those set\
    \ the selection.\n\nA `Picker` combined with a `NavigationView` allowed us to\
    \ drill down into a list for State selection.\n\nWe could probably break apart\
    \ a lot of these pieces into their own structs that conform to a `View`. That's\
    \ an exercise left up to the reader.\n\n# 20. Presenting Popups\n\nIt's easy to\
    \ understand that we need ways for users to enter data. We have textfields, pickers,\
    \ buttons, and many more ways for users to see and select items.\n\nWe also need\
    \ ways to alert the user of information. If they enter an invalid email, we want\
    \ to tell them. We may need to display some information or help to the user. So\
    \ there are some ways of presenting messages to the user that we'll use.\n\n`Alert`,\
    \ `ActionSheet`, `Sheet`, and `Popover` are great ways to present the UI to the\
    \ users without it being part of the base interface of the app. Each has their\
    \ own aspects and user interaction.\n\n## Alert Modifier\n\nThe `.alert` modifier\
    \ takes a binding and a closure. The binding parameter can be for a boolean (argument\
    \ label `isPresented` as in the following code) or an optional item (argument\
    \ label `item`) that implements `Identifiable`.\n\nIf called with a boolean, the\
    \ alert modifier's closure is called if the value changes to `true`. If instead\
    \ of a boolean binding it uses a binding to an optional, the closure is called\
    \ when the optional is set to a non-nil value.\n\nIn either case, the closure\
    \ returns an `Alert` instance.\n\n```\n.alert(isPresented: $showAlert) { () ->\
    \ Alert in\n    Alert(title: Text(\"Alert!\"))\n}\n```\n\nALERT MODIFIER\n\nWe're\
    \ going to create a new project and add various types of alerts and pop-ups to\
    \ it.\n\n1.  Create a new iOS App template project named `Pop-ups` with SwiftUI\
    \ for the interface and SwiftUI App for the life cycle.\n\nWe want to create alerts\
    \ based on various conditions. First, we'll create one based on a boolean value.\n\
    \n2.  Add a boolean property called `alert` to the `ContentView` struct.\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig1_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig1_HTML.jpg)\n\
    \nFigure 20-1 Alert Initializers' Code Complete\n\n1.  Replace the current implementation\
    \ of the `body` computed property with a `Button`. The action of the button will\
    \ change the value of the `alert` property.\n\n```\nButton(\"Alert!\") {\n   \
    \ $alert.wrappedValue = true\n}\n```\n\n2.  Add an `.alert` modifier to the end\
    \ of the button with the `isPresented` bound to the `$alert`.\n\n```\nButton(\"\
    Alert!\") {\n    $alert.wrappedValue = true\n}\n.alert(isPresented: $alert, content:\
    \ {\n})\n```\n\nFor the content, we want to return an `Alert` instance. `Alert`\
    \ has a variety of initializers as you can see in Figure [20-1](#497312_1_En_20_Chapter.xhtml#Fig1).\n\
    \n```\n@State var alert = false\n```\n\nIf you just need to present some text\
    \ with a default button, you only need to provide a title which is of type `Text`.\
    \ If you also want to present a message, it's a `Text` also.\n\nFor any buttons\
    \ you want to present, you can use the built-in `Alert.Button` types of `default`,\
    \ `destructive`, and `cancel`. Each takes a `Text` and an optional action closure.\n\
    \n1.  Return an `Alert` from the content closure.\n\n```\n.alert(isPresented:\
    \ $alert, content: {\n    Alert(title: Text(\"Alert!\"),\n          message: Text(\"\
    You tapped the button.\"),\n          primaryButton: .default(Text(\"OK\")),\n\
    \          secondaryButton: .cancel({\n              print (alert)\n         \
    \ })\n    )\n})\n```\n\nWhen the button is tapped, the Alert looks like Figure\
    \ [20-2](#497312_1_En_20_Chapter.xhtml#Fig2).\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig2_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig2_HTML.jpg)\n\
    \nFigure 20-2 Alert with Two Buttons\n\nNotice that the secondary button is `cancel`.\
    \ When it's tapped, it will print the `alert` value. It will always print `false`.\
    \ The alert appears because we set the value to `true`. When one of the buttons\
    \ is tapped, it will disappear and set the `alert` to `false`.\n\nA `destructive`\
    \ button uses red text to notify danger. If your alert is confirming a deletion\
    \ or something similar, the destructive type button should be used.\n\nAlerts\
    \ are meant to give the user some information and possibly prompt them to make\
    \ a decision or respond to a question. The decision should be based around the\
    \ user providing input or just alerting them to some information.\n\nBesides binding\
    \ the `.alert` modifier to a boolean, it can be bound to an optional. When the\
    \ optional is set to non-nil, the alert will display.\n\n### Alert with Object\
    \ Binding\n\nMostly this is similar to the `.alert` modifier with `isPresented`.\
    \ However, we'll use an optional. When it's set to non-nil, the Alert will be\
    \ presented. As with the boolean, when the user taps a button to dismiss the Alert,\
    \ the value will be set back to `nil`.\n\n1.  Open the same project from the previous\
    \ exercise.\n\n2.  Embed the `Button` in the `body` property in a `VStack`.\n\n\
    3.  Below the Button's `.alert` modifier, add a `Text` item.\n\n```\nText(\"Second\"\
    )\n```"
  raw: "## WatchKit\n\nAnother cool thing, as we saw before, is that this UI works\
    \ on the Watch as well. It requires just a few changes but looks like Figure [19-7](#497312_1_En_19_Chapter.xhtml#Fig7).\n\
    \n![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig7_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig7_HTML.jpg)\n\
    \nFigure 19-7\n\nUI on Watch\n\nWatchKit doesn’t support NavigationView so that\
    \ needs to be commented out or removed. Similarly, there’s no keyboard support\
    \ so the keyboard type and content type need to be removed.\n\n## Chapter Summary\n\
    \nIn this app, we had a bit of a UI design to aim for. We needed to create an\
    \ app that allowed users to enter values. The code stores the values with bindings.\n\
    \nBeyond storing the values, we saw how TextField can have an associated formatter\
    \ like date or number formatter.\n\nWe also used a Form to display our mechanism\
    \ for user input. We used Sections in our Form that are displayed in a table view.\n\
    \nA horizontal scroll view made one option for selecting a state pretty easy.\
    \ We used an HStack with Text items. The onTapGesture for those set the selection.\n\
    \nA Picker combined with a NavigationView allowed us to drill down into a list\
    \ for State selection.\n\nWe could probably break apart a lot of these pieces\
    \ into their own structs that conform to a View. That’s an exercise left up to\
    \ the reader.\n\n# 20. Presenting Popups\n\nIt’s easy to understand that we need\
    \ ways for users to enter data. We have textfields, pickers, buttons, and many\
    \ more ways for users to see and select items.\n\nWe also need ways to alert the\
    \ user of information. If they enter an invalid email, we want to tell them. We\
    \ may need to display some information or help to the user. So there are some\
    \ ways of presenting messages to the user that we’ll use.\n\nAlerts, Action Sheets,\
    \ Sheets, and Popovers are great ways to present the UI to the users without it\
    \ being part of the base interface of the app. Each has their own aspects and\
    \ user interaction.\n\n## Alert Modifier\n\nThe .alert modifier takes a binding\
    \ and a closure. The binding parameter can be for a boolean (argument label isPresented\
    \ as in the following code) or an optional item (argument label item) that implements\
    \ Identifiable.\n\nIf called with a boolean, the alert modifier’s closure is called\
    \ if the value changes to true. If instead of a boolean binding it uses a binding\
    \ to an optional, the closure is called when the optional is set to a non-nil\
    \ value.\n\nIn either case, the closure returns an Alert instance.\n\n```\n.alert(isPresented:\
    \ $showAlert) { () -> Alert in\nAlert(title: Text(\"Alert!\"))\n}\n```\n\nALERT\
    \ MODIFIER\n\nWe’re going to create a new project and add various types of alerts\
    \ and pop-ups to it.\n\n1.  Create a new iOS App template project named Pop-ups\
    \ with SwiftUI for the interface and SwiftUI App for the life cycle.\n\nWe want\
    \ to create alerts based on various conditions. First, we’ll create one based\
    \ on a boolean value.\n\n2.  Add a boolean property called alert to the ContentView\
    \ struct.\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig1_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig1_HTML.jpg)\n\
    \nFigure 20-1\n\nAlert Initializers’ Code Complete\n\n1.  Replace the current\
    \ implementation of the body computed property with a Button. The action of the\
    \ button will change the value of the alert property.\n\n```\n    Button(\"Alert!\"\
    ) {\n    $alert.wrappedValue = true\n    }\n    ```\n\n2.  Add an .alert modifier\
    \ to the end of the button with the isPresented bound to the $alert.\n\n```\n\
    \    Button(\"Alert!\") {\n    $alert.wrappedValue = true\n    }\n    .alert(isPresented:\
    \ $alert, content: {\n    })\n    ```\n\nFor the content, we want to return an\
    \ Alert instance. Alert has a variety of initializers as you can see in Figure\
    \ [20-1](#497312_1_En_20_Chapter.xhtml#Fig1).\n\n```\n@State var alert = false\n\
    ```\n\nIf you just need to present some text with a default button, you only need\
    \ to provide a title which is of type Text. If you also want to present a message,\
    \ it’s a Text also.\n\nFor any buttons you want to present, you can use the built-in\
    \ Alert.Button types of default, destructive, and cancel. Each takes a Text and\
    \ an optional action closure.\n\n1.  Return an Alert from the content closure.\n\
    \n```\n    .alert(isPresented: $alert, content: {\n    Alert(title: Text(\"Alert!\"\
    ),\n    message: Text(\"You tapped the button.\"),\n    primaryButton: .default(Text(\"\
    OK\")),\n    secondaryButton: .cancel({\n    print (alert)\n    })\n    )\n  \
    \  })\n    ```\n\nWhen the button is tapped, the Alert looks like Figure [20-2](#497312_1_En_20_Chapter.xhtml#Fig2).\n\
    \n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig2_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig2_HTML.jpg)\n\
    \nFigure 20-2\n\nAlert with Two Buttons\n\nNotice that the secondary button is\
    \ cancel. When it’s tapped, it will print the alert value. It will always print\
    \ false. The alert appears because we set the value to true. When one of the buttons\
    \ is tapped, it will disappear and set the alert to false.\n\nA destructive button\
    \ uses red text to notify danger. If your alert is confirming a deletion or something\
    \ similar, the destructive type button should be used.\n\nAlerts are meant to\
    \ give the user some information and possibly prompt them to make a decision or\
    \ respond to a question. The decision should be based around the user providing\
    \ input or just alerting them to some information.\n\nBesides binding the .alert\
    \ modifier to a boolean, it can be bound to an optional. When the optional is\
    \ set to non-nil, the alert will display.\n\nALERT WITH OBJECT BINDING\n\nMostly\
    \ this is similar to the .alert modifier with isPresented. However, we’ll use\
    \ an optional. When it’s set to non-nil, the Alert will be presented. As with\
    \ the boolean, when the user taps a button to dismiss the Alert, the value will\
    \ be set back to nil.\n\n1.  Open the same project from the previous exercise.\n\
    \n2.  Embed the Button in the body property in a VStack.\n\n3.  Below the Button’s\
    \ .alert modifier, add a Text item.\n\n```\nText(\"Second\")\n```"
  trans: "\n# WatchKit\n\n另一个很酷的地方是，我们之前看到的这个界面也能在手表上运行。只需进行少量修改，效果就如图 19-7 所示。\n\n\
    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig7_HTML.jpg](img/497312_1_En_19_Fig7_HTML.jpg)\n\
    \n图 19-7 手表上的界面\n\n`WatchKit` 不支持 `NavigationView`，因此需要将其注释掉或移除。同样，由于没有键盘支持，键盘类型和内容类型也需要移除。\n\
    \n# 章节总结\n\n在这个应用中，我们有一个明确的设计目标。我们需要创建一个允许用户输入数值的应用。代码通过绑定来存储这些值。\n\n除了存储值，我们还看到了\
    \ `TextField` 如何与日期或数字格式化器之类的关联格式化器配合使用。\n\n我们还使用了 `Form` 来展示用户输入的机制。我们在 `Form`\
    \ 中使用了 `Section`，它们以表格视图的形式呈现。\n\n一个水平滚动视图让选择一个州的操作变得非常简单。我们使用了一个包含 `Text` 项的\
    \ `HStack`。这些项上的 `onTapGesture` 用于设置选择。\n\n`Picker` 与 `NavigationView` 结合使用，让我们能够深入列表进行州的选择。\n\
    \n我们可能可以将这些组件中的许多拆分成各自遵循 `View` 协议的结构体。这留给读者作为练习。\n\n# 20. 呈现弹出窗口\n\n很容易理解，我们需要让用户输入数据的方式。我们有文本字段、选择器、按钮以及更多让用户查看和选择项目的方法。\n\
    \n我们还需要向用户发出信息提醒的方式。如果用户输入了无效的电子邮件，我们需要告诉他们。我们可能需要向用户显示一些信息或帮助。因此，我们将使用一些向用户呈现消息的方法。\n\
    \n`Alert`、`ActionSheet`、`Sheet` 和 `Popover` 是将界面呈现给用户的绝佳方式，这些界面不属于应用的基础界面。它们各自有其特点和用户交互方式。\n\
    \n## 警告修饰器\n\n`.alert` 修饰器接收一个绑定和一个闭包。绑定参数可以是布尔值（参数标签为 `isPresented`，如以下代码所示），也可以是实现\
    \ `Identifiable` 协议的可选项（参数标签为 `item`）。\n\n如果使用布尔值调用，当该值变为 `true` 时，警告修饰器的闭包会被调用。如果使用可选项绑定而不是布尔值绑定，则当可选项被设置为非\
    \ nil 值时，闭包会被调用。\n\n无论哪种情况，闭包都会返回一个 `Alert` 实例。\n\n```\n.alert(isPresented: $showAlert)\
    \ { () -> Alert in\n    Alert(title: Text(\"Alert!\"))\n}\n```\n\n警告修饰器\n\n我们将创建一个新项目，并向其中添加各种类型的警告和弹出窗口。\n\
    \n1.  创建一个名为 `Pop-ups` 的新 iOS App 模板项目，界面使用 SwiftUI，生命周期使用 SwiftUI App。\n\n我们想基于各种条件创建警告。首先，我们将基于一个布尔值创建一个警告。\n\
    \n2.  在 `ContentView` 结构体中添加一个名为 `alert` 的布尔属性。\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig1_HTML.jpg](img/497312_1_En_20_Fig1_HTML.jpg)\n\
    \n图 20-1 警告初始化器的代码补全\n\n1.  将 `body` 计算属性的当前实现替换为一个 `Button`。按钮的操作将改变 `alert`\
    \ 属性的值。\n\n```\nButton(\"Alert!\") {\n    $alert.wrappedValue = true\n}\n```\n\
    \n2.  在按钮末尾添加一个 `.alert` 修饰器，并将其 `isPresented` 绑定到 `$alert`。\n\n```\nButton(\"\
    Alert!\") {\n    $alert.wrappedValue = true\n}\n.alert(isPresented: $alert, content:\
    \ {\n})\n```\n\n对于内容，我们需要返回一个 `Alert` 实例。如图 20-1 所示，`Alert` 有各种初始化器。\n\n```\n\
    @State var alert = false\n```\n\n如果你只需要用默认按钮显示一些文本，只需提供一个 `Text` 类型的标题。如果你还想显示一条消息，那也是\
    \ `Text` 类型。\n\n对于要显示的任何按钮，你可以使用内置的 `Alert.Button` 类型：`default`、`destructive`\
    \ 和 `cancel`。每个按钮都接受一个 `Text` 和一个可选的 action 闭包。\n\n1.  从内容闭包中返回一个 `Alert`。\n\n\
    ```\n.alert(isPresented: $alert, content: {\n    Alert(title: Text(\"Alert!\"\
    ),\n          message: Text(\"You tapped the button.\"),\n          primaryButton:\
    \ .default(Text(\"OK\")),\n          secondaryButton: .cancel({\n            \
    \  print (alert)\n          })\n    )\n})\n```\n\n当按钮被点击时，警告显示如图 20-2 所示。\n\n\
    ![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig2_HTML.jpg](img/497312_1_En_20_Fig2_HTML.jpg)\n\
    \n图 20-2 带有两个按钮的警告\n\n请注意，次要按钮是 `cancel`。当它被点击时，它会打印 `alert` 值。它会始终打印 `false`。警告之所以出现，是因为我们将值设置为\
    \ `true`。当其中一个按钮被点击时，警告会消失并将 `alert` 设置为 `false`。\n\n`destructive` 按钮使用红色文本以指示危险。如果你的警告是确认删除或类似操作，则应使用\
    \ destructive 类型按钮。\n\n警告旨在向用户提供一些信息，并可能提示他们做出决定或回答问题。决策应围绕用户提供输入或仅提醒他们某些信息展开。\n\
    \n除了将 `.alert` 修饰器绑定到布尔值，它还可以绑定到一个可选项。当可选项被设置为非 nil 时，警告会显示。\n\n### 带对象绑定的警告\n\
    \n这基本类似于使用 `isPresented` 的 `.alert` 修饰器。不过，我们将使用一个可选项。当它被设置为非 nil 时，警告会显示。与布尔值一样，当用户点击按钮解除警告时，该值会被设置回\
    \ `nil`。\n\n1.  打开上一练习中的同一个项目。\n\n2.  将 `body` 属性中的 `Button` 嵌入到一个 `VStack` 中。\n\
    \n3.  在按钮的 `.alert` 修饰器下方，添加一个 `Text` 项。\n\n```\nText(\"Second\")\n```\n"
- fmt: "We’ll add the `.alert` modifier to this `Text` item. Instead of the `isPresented`,\
    \ we’ll use the initializer that takes an `item`. The `item` needs to conform\
    \ to the `Identifiable` protocol. Let’s make a struct that does that.\n\n1.  Above\
    \ the `ContentView` struct, create a new struct called `User` that implements\
    \ `Identifiable`.\n\n```\nstruct User : Identifiable {\n    var id = UUID()\n\
    \    var name = \"Test\"\n}\n```\n\nNow that we have a type, we can use it as\
    \ an `Optional` property in our `ContentView`.\n\n2.  Add an `Optional User` type\
    \ property to the `ContentView` struct.\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig3_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig3_HTML.jpg)\n\
    \nFigure 20-3\n\nCode with Two Alerts\n\n1.  Set the `user` to an instance of\
    \ `User` in the previous Alert’s cancel button.\n\n```\nAlert(title: Text(\"Alert!\"\
    ),\n    message: Text(\"You tapped the button.\"),\n    primaryButton: .default(Text(\"\
    OK\")),\n    secondaryButton: .cancel({\n        self.user = User()\n    })\n\
    ```\n\nThe pieces in the last three steps lay the groundwork for our alert. We’ll\
    \ add a `.alert` modifier to the `Text` item using the `user` property as the\
    \ binding. When it’s set to non-nil in the cancel closure, the alert will trigger.\n\
    \n2.  Add the `.alert` modifier to the `Text` item.\n\n```\nText(\"Second\")\n\
    .alert(item: $user) { (theUser) -> Alert in\n    Alert(title: Text(\"Cancel?\"\
    ),\n          message: Text(\"\\(theUser.name)\")\n    )\n}\n```\n\nThe body property\
    \ code now looks like Figure 20-3.\n\n```\n@State var user : User?\n```\n\nWe\
    \ have an `.alert` modifier bound to the `user`. When it’s set to non-nil, the\
    \ closure will get called to create the `Alert`. The `user` is passed in as the\
    \ parameter: `theUser`.\n\nThe title is “Cancel?” and we set the message to the\
    \ user’s name. The `Alert` will use an automatically provided \"OK\" button to\
    \ dismiss.\n\nSince the `User` struct has a default value of `Test` for the `name`\
    \ property, the alert looks like Figure 20-4.\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig4_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig4_HTML.jpg)\n\
    \nFigure 20-4\n\nAlert with Default OK Button\n\nNow we’ve seen both binding types\
    \ for the `.alert` modifier and a couple variations of `Alert`.\n\n## Action Sheet\
    \ Modifier\n\nThe `.actionSheet` modifier is very similar to the `.alert` modifier.\
    \ It can use a binding for a `bool` (`isPresented`) or optional (`item`). The\
    \ second parameter is a closure, but it returns an `ActionSheet` instead of an\
    \ `Alert`.\n\nThe closure will be called if the binding value goes `true` (for\
    \ Boolean binding) or non-nil (for optional binding).\n\n## Action Sheet\n\nCreating\
    \ an `ActionSheet` is similar to an `Alert`. You can pass in a `Text` item as\
    \ the `title` parameter. If you only provide a `title` parameter value, the action\
    \ sheet automatically includes a Cancel button to remove the action sheet.\n\n\
    The `message` parameter is also a `Text` and is optional. The last parameter is\
    \ an array of buttons. There are variations of the button you can use as in Figure\
    \ 20-5.\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig5_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig5_HTML.jpg)\n\
    \nFigure 20-5\n\nVariations of Action Sheet Buttons\n\nThe cancel button without\
    \ parameters simply removes the action sheet from the UI. The `action` parameter\
    \ allows you to pass in a closure to be called when the button is tapped. All\
    \ other variations of the buttons require a `Text` item to display on the button\
    \ and an optional closure to call when the button is tapped.\n\nACTION SHEET MODIFIER\n\
    \nThis exercise is built on top of the previous exercise and uses the same project.\
    \ However, a new project would also work since this exercise doesn’t rely on anything\
    \ previously done.\n\n1.  Add a new boolean property to the `ContentView`.\n\n\
    2.  In the `VStack` (or the body if a new project), add a `Button`. The action\
    \ of the button sets the property from step 1 to `true`.\n\n```\nButton(\"Action\
    \ Sheet\") {\n    $actionSheet.wrappedValue = true\n}\n```\n\n3.  Add an `.actionSheet`\
    \ modifier at the end of the `Button`.\n\n```\n.actionSheet(isPresented: $actionSheet,\
    \ content: {\n})\n```\n\n4.  Return an `ActionSheet` from the content closure\
    \ of the `.actionSheet`.\n\n```\n.actionSheet(isPresented: $actionSheet, content:\
    \ {\n    ActionSheet(title: Text(\"Action\"),\n                message: Text(\"\
    Go!\"),\n                buttons:\n                    [.destructive(Text(\"Delete\"\
    ))]\n    )\n})\n```\n\n```\n@State var actionSheet = false\n```\n\nRunning the\
    \ code presents a button titled \"Action Sheet.\" When it’s tapped, the `actionSheet`\
    \ property is set to `true`.\n\nThe `.actionSheet` modifier is bound to that property\
    \ and will be triggered.\n\nThe `ActionSheet` created is then displayed with the\
    \ buttons, in this case one destructive button, on the screen as in Figure 20-6.\n\
    \n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig6_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig6_HTML.jpg)\n\
    \nFigure 20-6\n\nActionSheet with One Button\n\nThere is a small but meaningful\
    \ difference between an alert and an action sheet. An alert is limited to one\
    \ or two buttons and usually focused on providing information. An action sheet\
    \ should result in some “action” taking place: saving data, sending information\
    \ online, deleting a user account, and other functionality based on the user’s\
    \ selection.\n\n## Sheet Modifier\n\nSheet is similar to what we’ve already seen\
    \ with `Alert` and `ActionSheet`. It takes a binding to a boolean (`isPresented`)\
    \ or optional (`item`). It also has an optional closure called `onDismiss`. This\
    \ closure, if passed in, will be called when the action sheet is removed from\
    \ the UI.\n\nThe final parameter is a closure to define the UI on the sheet. This\
    \ closure, like the `body` parameter, returns an item implementing a `View`. So\
    \ it’s not a specific UI element like `Alert` or `ActionSheet`. It’s anything\
    \ that implements a `View`.\n\nSHEET MODIFIER\n\nAgain, this is building on the\
    \ previous project but isn’t necessary.\n\n1.  Add a boolean property to `ContentView`\
    \ to bind to the sheet.\n\n2.  Add a button that sets the property to `true`.\n\
    \n```\nButton(\"Sheet\") {\n    $sheet.wrappedValue = true\n}\n```\n\n3.  Add\
    \ a `.sheet` modifier bound to the property and that returns a `VStack`.\n\n```\n\
    .sheet(isPresented: $sheet, content: {\n    VStack {\n    }\n})\n```\n\n4.  In\
    \ the `VStack`, add a `Text` and `Button` to set the property back to `false`.\n\
    \n```\n.sheet(isPresented: $sheet, content: {\n    VStack {\n        Text (\"\
    Tap to Dismiss\")\n        Button(\"Dismiss\") {\n            $sheet.wrappedValue\
    \ = false\n        }\n    }\n})\n```\n\n```\n@State var sheet = false\n```\n\n\
    Setting the property back to `false` will cause the sheet to dismiss. The UI will\
    \ adapt to the device/screen space it’s running on. On the iPhone, it will look\
    \ like Figure 20-7. In this case, dragging down will also dismiss the sheet’s\
    \ UI.\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig7_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig7_HTML.jpg)\n\
    \nFigure 20-7\n\nSheet UI Displayed on iPhone and iPad\n\nSheet is a good option\
    \ for displaying the UI more modal/fullscreen compared to `Alert` and `ActionSheet`.\
    \ It can certainly be much more custom since it just needs to implement a `View`."
