  raw: "## NoteRow View\n\nWe’ll start by creating a new file for our separate view.\
    \ This will help with the preview of the row as we design it.\n\nRight-click your\
    \ main folder of your project and select “New File…” as in Figure [7-3](#497312_1_En_7_Chapter.xhtml#Fig3).\n\
    \n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig3_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig3_HTML.jpg)\n\
    \nFigure 7-3\n\nNew File…\n\nIn the pop-up, filter for view and select SwiftUI\
    \ View as in Figure [7-4](#497312_1_En_7_Chapter.xhtml#Fig4). Click Next, name\
    \ it NoteRow, and click Create.\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig4_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig4_HTML.jpg)\n\
    \nFigure 7-4\n\nSwiftUI View\n\nInitially, the NoteRow body property will be another\
    \ Text with “Hello, World!”. We’ll replace that with something more along the\
    \ lines of a row in a list.\n\nOf course, our NoteRow needs a Note which hasn’t\
    \ been defined in this project (assuming you used a new project like I did). I’ll\
    \ define a Note class based on what we’ve done in previous chapters. It will look\
    \ familiar as in Figure [7-5](#497312_1_En_7_Chapter.xhtml#Fig5).\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig5_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5\n\nNote Defined in NoteRow.swift\n\nIt’s a slightly simplified and\
    \ cleaned version of what we’ve been using. It’s good for what we’ll be doing\
    \ here.\n\nIf the NoteRow view has a Note instance, it can create a view that\
    \ will look good in a list of notes. In our previous projects, the NoteView was\
    \ not a great layout for a list. It was more square and chunky. We’d rather have\
    \ something wider than tall and laid out in such a way that looks good when scrolling\
    \ through the items.\n\nWe may not even choose to include all of the information\
    \ about a Note. Depending on the app, having the updatedAtTime may not be useful\
    \ to the user. For our example here, we’ll put all of the information on the UI,\
    \ but that’s not always the case.\n\nCREATING A LIST OF NOTES\n\nWe need to create\
    \ NoteRow to display desired data about the Note. Once we have what we like, we\
    \ can change out the List creation with NoteRows.\n\n1.  Add properties and an\
    \ initializer to the NoteRow like this:\n\n```\n    var note : Note\n    let df\
    \ = DateFormatter()\n    init() {\n    df.dateStyle = .none\n    df.timeStyle\
    \ = .medium\n    }\n    ```\n\nAs in the past, this will force the creation of\
    \ the NoteRow to require a Note to be passed in. Good.\n\n2.  Delete the Text\
    \ item from the NoteRow body property.\n\nYou’ll get some errors at this point,\
    \ but we’ll get rid of them quickly.\n\n1.  Within the body property, create a\
    \ VStack with a Text item for the note’s textfield:\n\n```\n    var body: some\
    \ View {\n    VStack {\n    Text(note.text)\n    }\n    }\n    ```\n\nAt this\
    \ point, our body property is valid, but our preview doesn’t work. That’s because\
    \ the creation of NoteRow in the NoteRow_Previews doesn’t pass in a Note.\n\n\
    1.  Update the NoteRow_Previews to pass in a note:\n\n```\nNoteRow(note: Note())\n\
    ```\n\nIf you resume your preview, you should see “New Note” instead of “Hello,\
    \ World!”.\n\nThis is technically enough for a List, but let’s flesh it out a\
    \ bit more before jumping to that. But always feel free to experiment!\n\n1. \
    \ Under the text item in NoteRow’s body, add an HStack with the priority star\
    \ images like we had before:\n\n```\n    HStack {\n    Image(systemName: \"star.circle\"\
    )\n    Image(systemName: note.priority.rawValue > 0 ?\n    \"star.circle\" : \"\
    circle\")\n    Image(systemName: note.priority.rawValue > 1 ?\n    \"star.circle\"\
    \ : \"circle\")\n    }\n    ```\n\n2.  Below the images you added in step 5, add\
    \ another Text item for the Date value:\n\n```\nText(df.string(from: note.updatedAtTime))\n\
    ```\n\nNow we’re ready to create our List!\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig6_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6\n\nList of Notes\n\n1.  Back in ContentView, remove the Text item\
    \ from the List in the body and replace it with creations of the NoteRow:\n\n\
    ```\n    var body: some View {\n    List(0..<19) { index in\n    NoteRow(note:\
    \ Note(), df: self.df)\n    }\n    }\n    ```\n\nIf you run the app or update\
    \ the preview, it should look like Figure [7-6](#497312_1_En_7_Chapter.xhtml#Fig6).\n\
    \nWe did it! We have a List of Note items. The code is clear about what’s being\
    \ done, and the List code is basically just one line of code.\n\nBut it can certainly\
    \ look better. The note text should ideally be left justified. And some space\
    \ between the priority and the update time would look good.\n\nLet’s head back\
    \ to the NoteRow and make some changes based on these ideas.\n\n1.  Back in NoteRow’s\
    \ VStack, let’s add an alignment parameter:\n\n1.  Add a Spacer between the last\
    \ star image and the Text item for the date:\n\n```\nVStack(alignment: .leading)\
    \ {\n```\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig7_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig7_HTML.jpg)\n\
    \nFigure 7-7\n\nList of Notes with Updated NoteRow\n\n1.  Run the app or go back\
    \ to the ContentView and refresh the preview. It should look like Figure [7-7](#497312_1_En_7_Chapter.xhtml#Fig7).\n\
    \n```\nSpacer()\n```\n\nThat’s more like it. A real list! It’s not too amazing,\
    \ but it’s pretty cool and quite easy to make. We basically took many of the things\
    \ we already knew how to do and did them in a loop with a call to a List."
  trans: "\n# NoteRow 视图\n\n我们将从为独立视图创建一个新文件开始。这有助于我们在设计行时预览其效果。\n\n右键点击项目的主文件夹，选择“新建文件…”，如图\
    \ 7-3 所示。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig3_HTML.jpg](img/497312_1_En_7_Fig3_HTML.jpg)\n\
    \n图 7-3\n\n新建文件…\n\n在弹出的窗口中，筛选视图类型并选择 SwiftUI View，如图 7-4 所示。点击“下一步”，将其命名为 `NoteRow`，然后点击“创建”。\n\
    \n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig4_HTML.jpg](img/497312_1_En_7_Fig4_HTML.jpg)\n\
    \n图 7-4\n\nSwiftUI View\n\n初始状态下，`NoteRow` 的 `body` 属性会是另一个显示“Hello, World!”的\
    \ `Text`。我们将把它替换成更符合列表行风格的内容。\n\n当然，我们的 `NoteRow` 需要引用一个 `Note` 对象，但该对象尚未在此项目中定义（假设你和我一样使用了新项目）。我将基于前几章的内容定义一个\
    \ `Note` 类。它看起来会很像图 7-5 所示。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig5_HTML.jpg](img/497312_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5\n\n在 `NoteRow.swift` 中定义的 `Note`\n\n这是对我们之前使用版本的略微简化和清理。对于当前任务来说，它足够好用。\n\
    \n如果 `NoteRow` 视图拥有一个 `Note` 实例，它就能生成一个在笔记列表中看起来不错的视图。在之前的项目中，`NoteView` 的布局并不适合列表。它更偏向方形和厚重感。我们更希望得到一个宽度大于高度、并且在滚动浏览时视觉效果良好的布局。\n\
    \n我们甚至可能不会选择展示 `Note` 的全部信息。根据应用的不同，`updatedAtTime` 对用户来说可能并不实用。在本例中，我们会将所有信息展示在界面上，但实际情况并不总是如此。\n\
    \n## 创建笔记列表\n\n我们需要创建 `NoteRow` 来展示 `Note` 的所需数据。一旦我们得到了满意的效果，就可以用 `NoteRows`\
    \ 来替换 `List` 的创建。\n\n1. 像这样为 `NoteRow` 添加属性和初始化器：\n\n```\n    var note : Note\n\
    \    let df = DateFormatter()\n    init() {\n    df.dateStyle = .none\n    df.timeStyle\
    \ = .medium\n    }\n```\n\n与之前一样，这会强制要求创建 `NoteRow` 时必须传入一个 `Note`。很好。\n\n2. 从\
    \ `NoteRow` 的 `body` 属性中删除 `Text` 项。\n\n此时你会看到一些错误，但我们很快就会解决它们。\n\n3. 在 `body`\
    \ 属性内，创建一个 `VStack`，其中包含一个用于显示笔记文本的 `Text` 项：\n\n```\n    var body: some View\
    \ {\n    VStack {\n    Text(note.text)\n    }\n    }\n```\n\n此时，`body` 属性是有效的，但预览却无法工作。这是因为\
    \ `NoteRow_Previews` 中创建 `NoteRow` 时没有传入 `Note`。\n\n4. 更新 `NoteRow_Previews`，传入一个\
    \ `Note`：\n\n```\nNoteRow(note: Note())\n```\n\n如果你重新开始预览，应该会看到“New Note”而不是“Hello,\
    \ World!”。\n\n这对于一个 `List` 来说技术上是足够的，但在进入列表之前，让我们再完善一下。当然，随时欢迎你自行尝试！\n\n5. 在 `NoteRow`\
    \ 的 `body` 中文本项的下方，像之前一样添加一个包含优先级星形图片的 `HStack`：\n\n```\n    HStack {\n    Image(systemName:\
    \ \"star.circle\")\n    Image(systemName: note.priority.rawValue > 0 ?\n    \"\
    star.circle\" : \"circle\")\n    Image(systemName: note.priority.rawValue > 1\
    \ ?\n    \"star.circle\" : \"circle\")\n    }\n```\n\n6. 在第 5 步添加的图片下方，再添加一个用于显示\
    \ `Date` 值的 `Text` 项：\n\n```\nText(df.string(from: note.updatedAtTime))\n```\n\
    \n现在，我们已经准备好创建 `List` 了！\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig6_HTML.jpg](img/497312_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6\n\n笔记列表\n\n7. 回到 `ContentView`，从 `body` 中的 `List` 里删除 `Text` 项，并替换为创建\
    \ `NoteRow` 的代码：\n\n```\n    var body: some View {\n    List(0..<19) { index in\n\
    \    NoteRow(note: Note(), df: self.df)\n    }\n    }\n```\n\n如果你运行应用或更新预览，它应该会像图\
    \ 7-6 所示。\n\n成功啦！我们有了一个包含 `Note` 项的 `List`。代码清晰明了地表达了所做的事，而 `List` 的代码基本上只有一行。\n\
    \n但它当然还能更好看。笔记文本最好左对齐。优先级和更新时间之间有些间距也会更好看。\n\n让我们回到 `NoteRow`，根据这些想法做一些修改。\n\n\
    8. 回到 `NoteRow` 的 `VStack`，让我们添加一个对齐参数：\n\n9. 在最后一张星形图片和用于显示日期的 `Text` 项之间添加一个\
    \ `Spacer`：\n\n```\nVStack(alignment: .leading) {\n```\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig7_HTML.jpg](img/497312_1_En_7_Fig7_HTML.jpg)\n\
    \n图 7-7\n\n使用更新后的 `NoteRow` 的笔记列表\n\n10. 运行应用或回到 `ContentView` 刷新预览。它应该会像图 7-7\
    \ 所示。\n\n```\nSpacer()\n```\n\n这才像样。一个真正的列表！它算不上惊艳，但相当酷且易于制作。我们基本上是将已经掌握的许多技术，通过循环调用\
    \ `List` 的方式组合运用了起来。\n"
- fmt: "# Model Listing\n\nIt’s not very often you need to list a loop of numbers.\
    \ Of course, what is common is listing an `Array` of items. Instead of passing\
    \ in a range of numbers to a `List`, we can pass in a collection of `Note` instances.\n\
    \nA `List` has a variety of initializers with various parameters. Let’s change\
    \ our app to use an `Array` of `Note`s. For that, we’ll need to add an array of\
    \ `Note`s as a property.\n\nLet’s create a `createTestNotes` function on our `Note`\
    \ object. We’ll make it static so it can be called on the class:\n\n```swift\n\
    static func createTestNotes() -> [Note] {\n    var items = [Note]()\n    for i\
    \ in 0..<19 {\n        let note = Note()\n        note.text = \"\\(i)\"\n    \
    \    items.append(note)\n    }\n    return items\n}\n```\n\nBy keeping the generation\
    \ of this array outside of the `ContentView`, we avoid any mutating issues of\
    \ the `ContentView` struct.\n\nNow we can add a property to our `ContentView`\
    \ to hold the `Note`s. We want this to have an `@State` property wrapper so updates\
    \ get reflected in the `List`.\n\n```swift\nstruct ContentView: View {\n    let\
    \ df = DateFormatter()\n    @State private var notes = Note.createTestNotes()\n\
    ```\n\nNow we can update our `List` to use our `notes` array. The first parameter\
    \ for the `List` will be our array: the `notes` property. The second parameter\
    \ is a closure. The closure is called once for each item, and that `Note` is passed\
    \ into the closure. We just need to create the `NoteRow`, and we already know\
    \ how to do that:\n\n```swift\nList(notes) { note in\n    NoteRow(note: note,\
    \ df: self.df)\n}\n```\n\nThis produced an error because the `Note` items need\
    \ to be identifiable. The `List` requires that the items are random access. All\
    \ we need to do is have the `Note` conform to the `Identifiable` protocol.\n\n\
    That protocol requires an `id` property. We’ll add one and initialize it to a\
    \ `UUID`.\n\n```swift\nclass Note : Identifiable { \n    var id = UUID()\n```\n\
    \nNow we get a clean build. Our code looks a little different from the last time\
    \ we ran it, but the UI is the same (except for the note text value).\n\nOnce\
    \ again, reality gets in the way. Typically, when you see a list of data you created,\
    \ like notes, you expect to be able to delete from the list. The list doesn’t\
    \ have a modifier to handle this, but `ForEach` does. Let’s see how that looks.\n\
    \n## Delete Items in List\n\nWe’re still going to use a `List`, but we won’t have\
    \ it iterate our items. Previously, we used `List` to create a `NoteRow` for each\
    \ of our array items. We’ll still use `List` to display all the rows we create,\
    \ but we’ll create them in a different iteration.\n\n1.  Change the call of the\
    \ `List` to `ForEach`:\n\n    ```swift\n    ForEach(notes) { note in\n       \
    \ NoteRow(note: note, df: self.df)\n    }\n    ```\n\n    This should compile\
    \ and run still, but it won’t look very good. :)\n\n2.  Wrap the `ForEach` call\
    \ in a new `List` call:\n\n    ```swift\n    List {\n        ForEach(notes) {\
    \ note in\n            NoteRow(note: note, df: self.df)\n        }\n    }\n  \
    \  ```\n\n    The app and preview should look better now. On to the deletion!\n\
    \n    As I mentioned, the `List` doesn’t have a modifier for deleting an item,\
    \ but `ForEach` does. We can add the modifier which gets passed in the offset\
    \ of the items to delete. And it just so happens that our array has a `remove`\
    \ function that takes just that.\n\n3.  Add the `onDelete` modifier to the `ForEach`:\n\
    \n    ```swift\n    ForEach(notes, id: \\.id) { note in\n        NoteRow(note:\
    \ note, df: self.df)\n    }\n    .onDelete { offsets in\n        self.notes.remove(atOffsets:\
    \ offsets)\n    }\n    ```\n\nWith the `ForEach` handling the delete, the system\
    \ provides the left swipe action with the “Delete” option like Figure 7-8.\n\n\
    ![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig8_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8 – Delete Action on the List Row\n\nTapping Delete causes the call\
    \ on the closure passed into the `onDelete` definition. That will remove the row\
    \ from the `notes` array. Since our `notes` array has an `@State` property wrapper,\
    \ the `List` is redisplayed.\n\nNotice that the animation is automatically performed,\
    \ and it all works and looks great!\n\n## Chapter Summary\n\nIn this chapter,\
    \ we learned about the `List` view struct. With a property-defined model, adding\
    \ a `List` is very easy. At its core, the code is just looping over the array\
    \ and creating a view for each item.\n\nOur `Note` object is very similar to as\
    \ it has been in previous chapters. However, we did make it conform to `Identifiable`\
    \ by adding an `id` property. Also, we added a static method to create an array\
    \ of test `Note` instances.\n\nWe created a `NoteRow` view to be displayed in\
    \ the `List`. This could be really anything that implements a `View`. Ideally,\
    \ this is going to be a view that looks good in a list.\n\nBy changing our `List`\
    \ implementation to use a `ForEach`, we were able to easily add the deletion handling.\
    \ Once our `notes` array had an `@State` property wrapper, deleting an item kept\
    \ the UI in sync with the model.\n\nA `List` has a lot of powerful uses and is\
    \ used, like a table view, in most apps. It’s a good idea to learn more of the\
    \ modifiers and options for a `List` to use it to its full capacity.\n\n# 8. SwiftUI\
    \ Canvas Preview\n\nDesigning a great UI may not be your task. Developing the\
    \ UI design in SwiftUI code likely is since you’re reading this book. If you’ve\
    \ done it in the past with Interface Builder or even in code, you likely used\
    \ Preview for your Storyboard. It shows you how the UI will look on a variety\
    \ of devices.\n\nHowever, you more likely ran the app in the simulator or on a\
    \ device to have both real data and interaction. Of course, that takes more time:\
    \ compiling, installing, running, and navigating. Then make a change to the UI\
    \ or code and repeat.\n\nThe Canvas Preview allows you to see the UI right alongside\
    \ your code. Not only that, but it actually compiles your code and shows you just\
    \ how it will look at runtime. This includes data and functionality used in determining\
    \ your user interface. This process is called “dynamic replacement.”\n\nThe Preview\
    \ is shown in the Canvas. I will continue to use those two terms together and\
    \ interchangeably.\n\nLet’s look at the details of the Canvas/Preview.\n\n## Compiling\n\
    \nAs I mentioned earlier, Xcode compiles your actual code to create and display\
    \ the preview in the Canvas. Xcode knows what file you’re working on and what\
    \ changes need to be compiled. It only compiles what’s necessary to make the process\
    \ as quick as possible.\n\nIn some cases, like changing a literal value, it doesn’t\
    \ even need to compile, and changes are done quite fast and automatically.\n\n\
    For more significant changes, like adding a property to a related object, the\
    \ automatic updates are paused. In those cases, you’ll see a message at the top\
    \ left of the Canvas like Figure 8-1.\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig1_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1 – Preview Updating Paused\n\nTo continue updating the preview, click\
    \ the Resume button in the pop-up message or on the top right of the Canvas.\n\
    \nThe great thing about this preview is that it is *actually* the UI. This is\
    \ your compiled SwiftUI code generating this preview. This means this is what\
    \ your UI will look like at runtime using all of the data and functionality related\
    \ to its presentation.\n\nChanges are reflected in the preview as you make them.\
    \ No more having to build, run, click/tap, and so on."
  raw: "## Model Listing\n\nIt’s not very often you need to list a loop of numbers.\
    \ Of course, what is common is listing an Array of items. Instead of passing in\
    \ a range of numbers to a List, we can pass in a collection of Note instances.\n\
    \nA List has a variety of initializers with various parameters. Let’s change our\
    \ app to use an Array of Notes. For that, we’ll need to add an array of Notes\
    \ as a property.\n\nLet’s create a createTestNotes function on our Note object.\
    \ We’ll make it static so it can be called on the class:\n\n```\nstatic func createTestNotes()\
    \ -> [Note] {\nvar items = [Note]()\nfor i in 0..<19 {\nlet note = Note()\nnote.text\
    \ = \"\\(i)\"\nitems.append(note)\n}\nreturn items\n}\n```\n\nBy keeping the generation\
    \ of this array outside of the ContentView, we avoid any mutating issues of the\
    \ ContentView struct.\n\nNow we can add a property to our ContentView to hold\
    \ the Notes. We want this to have an @State property wrapper so updates get reflected\
    \ in the List.\n\n```\nstruct ContentView: View {\nlet df = DateFormatter()\n\
    @State private var notes = Note.createTestNotes()\n```\n\nNow we can update our\
    \ List to use our notes array. The first parameter for the List will be our array:\
    \ the notes property. The second parameter is a closure. The closure is called\
    \ once for each item, and that Note is passed into the closure. We just need to\
    \ create the NoteRow, and we already know how to do that:\n\n```\nList(notes)\
    \ { note in\nNoteRow(note: note, df: self.df)\n}\n```\n\nThis produced an error\
    \ because the Note items need to be identifiable. The List requires that the items\
    \ are random access. All we need to do is have the Note conform to the Identifiable\
    \ protocol.\n\nThat protocol requires an id property. We’ll add one and initialize\
    \ it to a UUID.\n\n```\nclass Note : Identifiable { var id = UUID()\n```\n\nNow\
    \ we get a clean build. Our code looks a little different from the last time we\
    \ ran it, but the UI is the same (except for the note text value).\n\nOnce again,\
    \ reality gets in the way. Typically, when you see a list of data you created,\
    \ like notes, you expect to be able to delete from the list. The list doesn’t\
    \ have a modifier to handle this, but ForEach does. Let’s see how that looks.\n\
    \nDELETE ITEMS IN LIST\n\nWe’re still going to use a List, but we won’t have it\
    \ iterate our items. Previously, we used List to create a NoteRow for each of\
    \ our array items. We’ll still use List to display all the rows we create, but\
    \ we’ll create them in a different iteration.\n\n1.  Change the call of the List\
    \ to ForEach:\n\n    ```\n    ForEach(notes) { note in\n    NoteRow(note: note,\
    \ df: self.df)\n    }\n    ```\n\nThis should compile and run still, but it won’t\
    \ look very good. :)\n\n1.  Wrap the ForEach call in a new List call:\n\n    ```\n\
    \    List {\n    ForEach(notes) { note in\n    NoteRow(note: note, df: self.df)\n\
    \    }\n    }\n    ```\n\n    The app and preview should look better now. On to\
    \ the deletion!\n\n    As I mentioned, the List doesn’t have a modifier for deleting\
    \ an item, but ForEach does. We can add the modifier which gets passed in the\
    \ offset of the items to delete. And it just so happens that our array has a remove\
    \ function that takes just that.\n\n2.  Add the onDelete modifier to the ForEach:\n\
    \n    ```\n    ForEach(notes, id: \\.id) { note in\n    NoteRow(note: note, df:\
    \ self.df)\n    }\n    .onDelete { offsets in\n    self.notes.remove(atOffsets:\
    \ offsets)\n    }\n    ```\n\nWith the ForEach handling the delete, the system\
    \ provides the left swipe action with the “Delete” option like Figure [7-8](#497312_1_En_7_Chapter.xhtml#Fig8).\n\
    \n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig8_HTML.jpg](images/497312_1_En_7_Chapter/497312_1_En_7_Fig8_HTML.jpg)\n\
    \nFigure 7-8\n\nDelete Action on the List Row\n\nTapping Delete causes the call\
    \ on the closure passed into the onDelete definition. That will remove the row\
    \ from the notes array. Since our notes array has an @State property wrapper,\
    \ the List is redisplayed.\n\nNotice that the animation is automatically performed,\
    \ and it all works and looks great!\n\n## Chapter Summary\n\nIn this chapter,\
    \ we learned about the List view struct. With a property-defined model, adding\
    \ a List is very easy. At its core, the code is just looping over the array and\
    \ creating a view for each item.\n\nOur Note object is very similar to as it has\
    \ been in previous chapters. However, we did make it conform to Identifiable by\
    \ adding an id property. Also, we added a static method to create an array of\
    \ test Note instances.\n\nWe created a NoteRow view to be displayed in the List.\
    \ This could be really anything that implements a View. Ideally, this is going\
    \ to be a view that looks good in a list.\n\nBy changing our List implementation\
    \ to use a ForEach, we were able to easily add the deletion handling. Once our\
    \ notes array had an @State property wrapper, deleting an item kept the UI in\
    \ sync with the model.\n\nA List has a lot of powerful uses and is used, like\
    \ a table view, in most apps. It’s a good idea to learn more of the modifiers\
    \ and options for a List to use it to its full capacity.\n\n# 8. SwiftUI Canvas\
    \ Preview\n\nDesigning a great UI may not be your task. Developing the UI design\
    \ in SwiftUI code likely is since you’re reading this book. If you’ve done it\
    \ in the past with Interface Builder or even in code, you likely used Preview\
    \ for your Storyboard. It shows you how the UI will look on a variety of devices.\n\
    \nHowever, you more likely ran the app in the simulator or on a device to have\
    \ both real data and interaction. Of course, that takes more time: compiling,\
    \ installing, running, and navigating. Then make a change to the UI or code and\
    \ repeat.\n\nThe Canvas Preview allows you to see the UI right alongside your\
    \ code. Not only that, but it actually compiles your code and shows you just how\
    \ it will look at runtime. This includes data and functionality used in determining\
    \ your user interface. This process is called “dynamic replacement.”\n\nThe Preview\
    \ is shown in the Canvas. I will continue to use those two terms together and\
    \ interchangeably.\n\nLet’s look at the details of the Canvas/Preview.\n\n## Compiling\n\
    \nAs I mentioned earlier, Xcode compiles your actual code to create and display\
    \ the preview in the Canvas. Xcode knows what file you’re working on and what\
    \ changes need to be compiled. It only compiles what’s necessary to make the process\
    \ as quick as possible.\n\nIn some cases, like changing a literal value, it doesn’t\
    \ even need to compile, and changes are done quite fast and automatically.\n\n\
    For more significant changes, like adding a property to a related object, the\
    \ automatic updates are paused. In those cases, you’ll see a message at the top\
    \ left of the Canvas like Figure [8-1](#497312_1_En_8_Chapter.xhtml#Fig1).\n\n\
    ![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig1_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1\n\nPreview Updating Paused\n\nTo continue updating the preview, click\
    \ the Resume button in the pop-up message or on the top right of the Canvas.\n\
    \nThe great thing about this preview is that it is *actually* the UI. This is\
    \ your compiled SwiftUI code generating this preview. This means this is what\
    \ your UI will look like at runtime using all of the data and functionality related\
    \ to its presentation.\n\nChanges are reflected in the preview as you make them.\
    \ No more having to build, run, click/tap, and so on."
  trans: "\n# 模型列表\n\n虽然你不需要经常列出数字循环，但列出 `Array` 中的项目却是常见需求。我们无需向 `List` 传入一个数字范围，而是可以传入一个\
    \ `Note` 实例的集合。\n\n`List` 有多种带有不同参数的初始化器。让我们修改应用，使用 `Note` 的 `Array`。为此，我们需要添加一个\
    \ `Note` 数组作为属性。\n\n接下来，我们在 `Note` 对象上创建一个 `createTestNotes` 函数。我们将它设为静态方法，这样就能在类上调用：\n\
    \n```swift\nstatic func createTestNotes() -> [Note] {\n    var items = [Note]()\n\
    \    for i in 0..<19 {\n        let note = Note()\n        note.text = \"\\(i)\"\
    \n        items.append(note)\n    }\n    return items\n}\n```\n\n将这个数组的生成逻辑放在\
    \ `ContentView` 外部，可以避免 `ContentView` 结构体的可变性问题。\n\n现在我们可以为 `ContentView` 添加一个属性来持有这些\
    \ `Note`。我们希望该属性使用 `@State` 属性包装器，这样对列表的更新就能实时反映出来。\n\n```swift\nstruct ContentView:\
    \ View {\n    let df = DateFormatter()\n    @State private var notes = Note.createTestNotes()\n\
    ```\n\n现在我们可以更新 `List`，让其使用 `notes` 数组。`List` 的第一个参数是我们的数组：`notes` 属性。第二个参数是一个闭包。该闭包会为每个元素调用一次，并将对应的\
    \ `Note` 传入闭包。我们只需创建 `NoteRow`，这部分我们已经知道如何操作：\n\n```swift\nList(notes) { note\
    \ in\n    NoteRow(note: note, df: self.df)\n}\n```\n\n这会产生错误，因为 `Note` 元素需要是可识别的。`List`\
    \ 要求其元素支持随机访问。我们只需要让 `Note` 遵循 `Identifiable` 协议即可。\n\n该协议要求提供一个 `id` 属性。我们将添加该属性，并将其初始化为一个\
    \ `UUID`。\n\n```swift\nclass Note : Identifiable { \n    var id = UUID()\n```\n\
    \n现在编译就干净无错了。我们的代码与上次运行时看起来略有不同，但用户界面是一样的（除了便签文本内容）。\n\n然而，现实需求往往更复杂。通常，当你看到自己创建的数据列表（比如便签）时，你期望能够从中删除内容。`List`\
    \ 本身没有用于处理删除的修饰符，但 `ForEach` 提供了。让我们看看具体如何实现。\n\n## 在列表中删除项目\n\n我们仍然会使用 `List`，但不会让它来遍历我们的元素。之前，我们使用\
    \ `List` 为数组中的每个项目创建 `NoteRow`。现在我们仍会用 `List` 来显示所有创建的行，但会通过另一种迭代方式来创建它们。\n\n\
    1.  将 `List` 的调用改为 `ForEach`：\n\n    ```swift\n    ForEach(notes) { note in\n\
    \        NoteRow(note: note, df: self.df)\n    }\n    ```\n\n    这一步应该仍能编译和运行，但效果不太好看。:)\n\
    \n2.  将 `ForEach` 调用包裹在一个新的 `List` 调用中：\n\n    ```swift\n    List {\n        ForEach(notes)\
    \ { note in\n            NoteRow(note: note, df: self.df)\n        }\n    }\n\
    \    ```\n\n    现在应用和预览应该看起来好多了。接下来实现删除功能！\n\n    如我之前提到的，`List` 没有用于删除元素的修饰符，但\
    \ `ForEach` 有。我们可以添加 `onDelete` 修饰符，它会传入要删除元素的偏移量。恰好，我们的数组有一个接受该偏移量的 `remove`\
    \ 函数。\n\n3.  为 `ForEach` 添加 `onDelete` 修饰符：\n\n    ```swift\n    ForEach(notes,\
    \ id: \\.id) { note in\n        NoteRow(note: note, df: self.df)\n    }\n    .onDelete\
    \ { offsets in\n        self.notes.remove(atOffsets: offsets)\n    }\n    ```\n\
    \n借助 `ForEach` 处理删除操作，系统会像图 7-8 一样，在左滑时提供“删除”选项。\n\n![../images/497312_1_En_7_Chapter/497312_1_En_7_Fig8_HTML.jpg](img/497312_1_En_7_Fig8_HTML.jpg)\n\
    \n图 7-8 – 列表行上的删除操作\n\n点击“删除”会触发 `onDelete` 定义中传入闭包的调用。这将从 `notes` 数组中移除对应行。由于我们的\
    \ `notes` 数组使用了 `@State` 属性包装器，`List` 会重新渲染显示。\n\n请注意，动画会自动执行，整个过程流畅且效果出色！\n\n\
    ## 本章小结\n\n在本章中，我们学习了 `List` 视图结构。通过定义属性的模型，添加 `List` 变得非常容易。其核心代码就是遍历数组并为每个元素创建一个视图。\n\
    \n我们的 `Note` 对象与前面章节中的非常相似。不过，我们通过添加 `id` 属性使其遵循了 `Identifiable` 协议。此外，我们还添加了一个静态方法来创建测试用的\
    \ `Note` 实例数组。\n\n我们创建了一个用于在 `List` 中显示的 `NoteRow` 视图。这可以是任何实现了 `View` 的组件。理想情况下，它会是一个在列表中看起来效果不错的视图。\n\
    \n通过将 `List` 的实现改为使用 `ForEach`，我们能够轻松地添加删除处理功能。一旦 `notes` 数组使用了 `@State` 属性包装器，删除元素就能让用户界面与模型保持同步。\n\
    \n`List` 功能强大，用途广泛，在大多数应用中像表格视图一样被使用。为了更好地发挥其全部效能，建议多学习 `List` 的各种修饰符和选项。\n\n\
    # 8. SwiftUI Canvas 预览\n\n设计出色的用户界面可能不是你的任务。但既然你在阅读本书，那么用 SwiftUI 代码实现用户界面设计很可能就是你的工作。如果你过去使用过\
    \ Interface Builder 甚至纯代码进行开发，很可能用过 Storyboard 的预览功能。它能展示用户界面在各种设备上的呈现效果。\n\n\
    然而，更常见的情况是，你会通过运行模拟器或真机来测试真实数据和交互。当然，这需要更多时间：编译、安装、运行、导航，然后修改界面或代码，再重复以上流程。\n\n\
    Canvas 预览功能让你能在代码旁边直接看到用户界面。不仅如此，它还会实际编译你的代码，并展示运行时界面将如何呈现。这包括用于确定用户界面的数据和功能。这个过程被称为“动态替换”。\n\
    \n预览显示在 Canvas 中。后续我将继续把这两个术语混用。\n\n让我们详细了解 Canvas/预览的细节。\n\n## 编译\n\n如前所述，Xcode\
    \ 会编译你的实际代码来在 Canvas 中创建并显示预览。Xcode 知道你正在处理哪个文件以及哪些更改需要编译。它只编译必要部分，以尽可能加快过程。\n\
    \n在某些情况下，比如更改字面量值，甚至无需重新编译，更改会非常快速且自动完成。\n\n对于更重大的更改，例如向相关对象添加属性，自动更新会暂停。在这些情况下，你会在\
    \ Canvas 左上角看到类似图 8-1 的消息。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig1_HTML.jpg](img/497312_1_En_8_Fig1_HTML.jpg)\n\
    \n图 8-1 – 预览更新已暂停\n\n要继续更新预览，请点击弹出消息中的“恢复”按钮，或点击 Canvas 右上角的“恢复”按钮。\n\n这个预览的绝妙之处在于，它*实际上*就是用户界面。这是你编译后的\
    \ SwiftUI 代码生成的预览。这意味着，它就是你运行时使用所有与呈现相关的数据和功能后，界面实际会呈现的样子。\n\n在你进行更改时，预览会实时反映这些变化。无需再经历构建、运行、点击等繁琐流程。\n"
- fmt: "## Preview Provider\n\nIn the previous chapter, we were working with a `List`\
    \ of `Note` items. When we created the project with our default `ContentView`\
    \ struct, we were also given a `ContentView_Previews` struct below it:\n\n```swift\n\
    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\nThe same is true for our `NoteRow`.\
    \ These are what Xcode uses to direct the specific compiling and rendering of\
    \ our preview.\n\n`PreviewProvider` is a protocol with a required computed property\
    \ called `previews`. It’s very similar to the required computed property defined\
    \ by the `View` protocol we’ve been using.\n\nOur `previews` property needs to\
    \ return something that implements the `View` protocol just like the `body` property.\
    \ So one easy way to do that, as the default implementation does, is to return\
    \ an instance of our struct (e.g., `ContentView`).\n\nIf the initializer takes\
    \ parameters, as our `NoteRow` does, we can pass those in as well:\n\n```swift\n\
    struct NoteRow_Previews: PreviewProvider {\n    static var previews: some View\
    \ {\n        NoteRow(note: Note(), df: DateFormatter())\n    }\n}\n```\n\n## Preview\
    \ Device\n\nOne way to change the preview in the Canvas is by changing the run\
    \ destination. You can select various simulators from the drop-down to the right\
    \ of the active scheme (top left in Xcode) for what device to use in the preview\
    \ (see Figure 8-2).\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig2_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2 Run Destination Selection\n\nSelecting a different simulator here\
    \ will update the preview to use that device in the Canvas. This is a quick and\
    \ easy way to check the UI on various device sizes.\n\nHowever, the Preview API\
    \ allows for you to do this in the code as well with the `.previewDevice` modifier.\n\
    \nI have iPhone 11 Pro Max selected, but I want to see how it looks on the iPhone\
    \ 8. I simply add the `.previewDevice` modifier to the `ContentView()` in my previews\
    \ code:\n\n```swift\nstruct ContentView_Previews: PreviewProvider {\n    static\
    \ var previews: some View {\n        ContentView()\n            .previewDevice(\"\
    iPhone 8\")\n    }\n}\n```\n\nMy preview now displays the iPhone 8 in the Canvas\
    \ like Figure 8-3.\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig3_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3 iPhone 8 Preview\n\nSimilarly, you can wrap multiple `ContentView`\
    \ instances in a `Group` and display multiple device types in the Canvas. This\
    \ allows you to see how your UI will look on various devices, in real time at\
    \ the same time.\n\nA shortcut for embedding an item(s) into a `Group` is with\
    \ the ⌘ + click and select the Group option.\n\nNow your preview can return a\
    \ group of `ContentView`s each with a different preview device.\n\nIf I want to\
    \ preview an iPhone 8 and iPhone 11 at the same time, I can use each one of those\
    \ in the `.previewDevice` modifier for my two `ContentView` instances like this\
    \ in the code:\n\n```swift\nGroup {\n    ContentView()\n        .previewDevice(\"\
    iPhone 8\")\n    ContentView()\n        .previewDevice(\"iPhone 11\")\n}\n```\n\
    \nNow I see both devices in the Canvas and can view my updates as I change the\
    \ SwiftUI code. This is particularly helpful when you’re working on parts of your\
    \ UI that take up the entire screen.\n\nSometimes, however, seeing the entire\
    \ device isn’t really what helps the most.\n\n## Environment\n\nAlong with multiple\
    \ devices, we may want to see how various environment settings affect the UI.\
    \ Seeing multiple options for things like dark mode at the same time can be very\
    \ convenient.\n\nJust like we chained the `.previewDevice`, we can chain a call\
    \ to `.environment`. I’ll add dark mode to one of my devices in the code:\n\n\
    ```swift\nContentView()\n    .previewDevice(\"iPhone 8\")\n    .environment(\\\
    .colorScheme, .dark)\nContentView()\n    .previewDevice(\"iPhone 11\")\n```\n\n\
    Now my iPhone 8 preview will be in dark mode.\n\nYou may also want to see what\
    \ your UI will look like with different text size selections; you can simulate\
    \ other text size like this:\n\n```swift\n.environment(\\.sizeCategory, .extraExtraExtraLarge)\n\
    ```\n\nUsing a variety of `ContentView` previews with various settings can allow\
    \ you to see at design time exactly how your UI will look when your app is executed.\n\
    \nIf you have a collection of values, such as `colorScheme` and `ContentSizeCategory`,\
    \ you may want to view them all. As we saw with `List`, we can use `ForEach`.\
    \ Just like so many other things we’ve used, `ForEach` actually returns a `View`.\n\
    \nEach iteration of `ForEach` needs to return a `View` that is then used in the\
    \ UI. Previously, we used it in a `List`. Each iteration returned a `NoteRow`.\
    \ Now we can use it in the preview.\n\n```swift\nForEach(ContentSizeCategory.allCases,\n\
    \        id: \\.self) { sizeCat in\n    ContentView()\n        .environment(\\\
    .colorScheme, .dark)\n        .environment(\\.sizeCategory, sizeCat)\n}\n```\n\
    \nAs with the `ForEach` in the `List` previously, we have to provide a way for\
    \ each item to be identified. This is particularly key in this case because Xcode\
    \ needs to know which preview to update as necessary. We’ll use the `.self` as\
    \ the identity.\n\nWhen using the `List`, we included each return of the `ForEach`\
    \ (a `NoteRow`) in the list. In the preceding code, we’re creating a full preview\
    \ for each value in the `ContentSizeCategory`. That means we’ll have a preview\
    \ in the Canvas for each size the system text can be set to (over ten previews).\n\
    \nThis is a lot of previews of the full UI for the text change that’s really on\
    \ the `NoteRow` View. Therefore, it would probably be better to add this type\
    \ of variation to the `NoteView` preview instead of the `ContentView`."
  raw: '## Preview Provider


    In the previous chapter, we were working with a List of Note items. When we created
    the project with our default ContentView struct, we were also given a ContentView_Previews
    struct below it:


    ```

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    }

    }

    ```


    The same is true for our NoteRow. These are what Xcode uses to direct the specific
    compiling and rendering of our preview.


    PreviewProvider is a protocol with a required computed property called previews.
    It’s very similar to the required computed property defined by the View protocol
    we’ve been using.


    Our previews property needs to return something that implements the View protocol
    just like the body property. So one easy way to do that, as the default implementation
    does, is to return an instance of our struct (e.g., ContentView).


    If the initializer takes parameters, as our NoteRow does, we can pass those in
    as well:


    ```

    struct NoteRow_Previews: PreviewProvider {

    static var previews: some View {

    NoteRow(note: Note(), df: DateFormatter())

    }

    }

    ```


    ## Preview Device


    One way to change the preview in the Canvas is by changing the run destination.
    You can select various simulators from the drop-down to the right of the active
    scheme (top left in Xcode) for what device to use in the preview (see Figure [8-2](#497312_1_En_8_Chapter.xhtml#Fig2)).


    ![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig2_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Run Destination Selection


    Selecting a different simulator here will update the preview to use that device
    in the Canvas.


    This is a quick and easy way to check the UI on various device sizes.


    However, the Preview API allows for you to do this in the code as well with the
    .previewDevice modifier.


    I have iPhone 11 Pro Max selected, but I want to see how it looks on the iPhone
    8\. I simply add the .previewDevice modifier to the ContentView() in my previews
    code:


    ```

    struct ContentView_Previews: PreviewProvider {

    static var previews: some View {

    ContentView()

    .previewDevice("iPhone 8")

    }

    }

    ```


    My preview now displays the iPhone 8 in the Canvas like Figure [8-3](#497312_1_En_8_Chapter.xhtml#Fig3).


    ![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig3_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    iPhone 8 Preview


    Similarly , you can wrap multiple ContentView instances in a Group and display
    multiple device types in the Canvas.


    This allows you to see how your UI will look on various devices, in real time
    at the same time.


    A shortcut for embedding an item(s) into a Group is with the ⌘ + click and select
    the Group option.


    Now your preview can return a group of ContentViews each with a different preview
    device.


    If I want to preview an iPhone 8 and iPhone 11 at the same time, I can use each
    one of those in the .previewDevice modifier for my two ContentView instances like
    this in the code:


    ```

    Group {

    ContentView()

    .previewDevice("iPhone 8")

    ContentView()

    .previewDevice("iPhone 11")

    }

    ```


    Now I see both devices in the Canvas and can view my updates as I change the SwiftUI
    code. This is particularly helpful when you’re working on parts of your UI that
    take up the entire screen.


    Sometimes, however, seeing the entire device isn’t really what helps the most.


    ## Environment


    Along with multiple devices, we may want to see how various environment settings
    affect the UI. Seeing multiple options for things like dark mode at the same time
    can be very convenient.


    Just like we chained the .previewDevice, we can chain a call to .environment.
    I’ll add dark mode to one of my devices in the code:


    ```

    ContentView()

    .previewDevice("iPhone 8")

    .environment(\.colorScheme, .dark)

    ContentView()

    .previewDevice("iPhone 11")

    ```


    Now my iPhone 8 preview will be in dark mode.


    You may also want to see what your UI will look like with different text size
    selections; you can simulate other text size like this:


    ```

    .environment(\.sizeCategory, .extraExtraExtraLarge)

    ```


    Using a variety of ContentView previews with various settings can allow you to
    see at design time exactly how your UI will look when your app is executed.


    If you have a collection of values, such as colorScheme and ContentSizeCategory,
    you may want to view them all. As we saw with List, we can use ForEach. Just like
    so many other things we’ve used, ForEach actually returns a View.


    Each iteration of ForEach needs to return a View that is then used in the UI.
    Previously, we used it in a List. Each iteration returned a NoteRow. Now we can
    use it in the preview.


    ```

    ForEach(ContentSizeCategory.allCases,

    id: \.self) { sizeCat in

    ContentView()

    .environment(\.colorScheme, .dark)

    .environment(\.sizeCategory, sizeCat)

    }

    ```


    As with the ForEach in the List previously, we have to provide a way for each
    item to be identified. This is particularly key in this case because Xcode needs
    to know which preview to update as necessary. We’ll use the .self as the identity.


    When using the List, we included each return of the ForEach (a NoteRow) in the
    list. In the preceding code, we’re creating a full preview for each value in the
    ContentSizeCategory. That means we’ll have a preview in the Canvas for each size
    the system text can be set to (over ten previews).


    This is a lot of previews of the full UI for the text change that’s really on
    the NoteRow View. Therefore, it would probably be better to add this type of variation
    to the NoteView preview instead of the ContentView.'
  trans: "\n## 预览提供器\n\n在上一章中，我们处理了一个包含 `Note` 项目的 `List`。当我们使用默认的 `ContentView` 结构体创建项目时，系统还会在其下方自动提供一个\
    \ `ContentView_Previews` 结构体：\n\n```swift\nstruct ContentView_Previews: PreviewProvider\
    \ {\n    static var previews: some View {\n        ContentView()\n    }\n}\n```\n\
    \n我们的 `NoteRow` 也是如此。Xcode 正是通过这些结构体来指导预览的具体编译和渲染。\n\n`PreviewProvider` 是一个协议，它要求实现一个名为\
    \ `previews` 的计算属性。这与我们之前使用的 `View` 协议所要求定义的计算属性非常相似。\n\n我们的 `previews` 属性需要返回一个实现了\
    \ `View` 协议的内容，就像 `body` 属性一样。因此，一个简单的方法（默认实现也是这样做的）就是返回我们结构体的一个实例（例如 `ContentView`）。\n\
    \n如果初始化器需要参数（就像我们的 `NoteRow` 那样），我们也可以传入这些参数：\n\n```swift\nstruct NoteRow_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        NoteRow(note:\
    \ Note(), df: DateFormatter())\n    }\n}\n```\n\n## 预览设备\n\n改变画布中预览的一种方法是更改运行目标。你可以从活动方案（Xcode\
    \ 左上角）右侧的下拉菜单中选择不同的模拟器，以指定预览中使用的设备（见图 8-2）。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig2_HTML.jpg](img/497312_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2 运行目标选择\n\n在这里选择不同的模拟器将更新画布中的预览，使其使用该设备。这是一种在不同设备尺寸上快速检查 UI 的简便方法。\n\n\
    然而，预览 API 也允许你通过 `.previewDevice` 修饰符在代码中实现同样的效果。\n\n我当前选择了 iPhone 11 Pro Max，但我想看看它在\
    \ iPhone 8 上的效果。只需在预览代码中的 `ContentView()` 上添加 `.previewDevice` 修饰符：\n\n```swift\n\
    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n            .previewDevice(\"iPhone 8\")\n  \
    \  }\n}\n```\n\n现在，我的预览在画布中显示为 iPhone 8，如图 8-3 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig3_HTML.jpg](img/497312_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3 iPhone 8 预览\n\n类似地，你可以将多个 `ContentView` 实例包装在一个 `Group` 中，在画布中同时显示多种设备类型。这样你就可以实时看到\
    \ UI 在不同设备上的表现。\n\n将项目嵌入 `Group` 的快捷方式是按下 ⌘ + 点击，然后选择 Group 选项。\n\n现在，你的预览可以返回一个包含多个\
    \ `ContentView` 的组，每个都使用不同的预览设备。\n\n如果我想同时预览 iPhone 8 和 iPhone 11，可以在代码中分别为这两个\
    \ `ContentView` 实例使用 `.previewDevice` 修饰符，如下所示：\n\n```swift\nGroup {\n    ContentView()\n\
    \        .previewDevice(\"iPhone 8\")\n    ContentView()\n        .previewDevice(\"\
    iPhone 11\")\n}\n```\n\n现在，我可以在画布中看到这两种设备，并在修改 SwiftUI 代码时实时查看更新。当你处理占据整个屏幕的 UI\
    \ 部分时，这尤其有用。\n\n然而，有时显示整个设备并非最有帮助的方式。\n\n## 环境\n\n除了多种设备，我们可能还想了解各种环境设置对 UI 的影响。同时查看深色模式等多种选项会非常方便。\n\
    \n就像我们串联使用 `.previewDevice` 一样，我们也可以串联调用 `.environment`。我将为代码中的其中一个设备添加深色模式：\n\
    \n```swift\nContentView()\n    .previewDevice(\"iPhone 8\")\n    .environment(\\\
    .colorScheme, .dark)\nContentView()\n    .previewDevice(\"iPhone 11\")\n```\n\n\
    现在，我的 iPhone 8 预览将显示为深色模式。\n\n你可能还想了解 UI 在不同文字大小选择下的样子；你可以像这样模拟其他文字大小：\n\n```swift\n\
    .environment(\\.sizeCategory, .extraExtraExtraLarge)\n```\n\n通过使用多种设置的不同 `ContentView`\
    \ 预览，你可以在设计阶段准确地了解应用运行时的 UI 外观。\n\n如果你有一组值，例如 `colorScheme` 和 `ContentSizeCategory`，你可能希望全部查看。正如我们在\
    \ `List` 中看到的，我们可以使用 `ForEach`。和我们使用过的许多其他东西一样，`ForEach` 实际上返回一个 `View`。\n\n`ForEach`\
    \ 的每次迭代都需要返回一个 `View`，然后用于 UI。之前，我们在 `List` 中使用了它。每次迭代返回一个 `NoteRow`。现在，我们可以在预览中使用它。\n\
    \n```swift\nForEach(ContentSizeCategory.allCases,\n        id: \\.self) { sizeCat\
    \ in\n    ContentView()\n        .environment(\\.colorScheme, .dark)\n       \
    \ .environment(\\.sizeCategory, sizeCat)\n}\n```\n\n与之前在 `List` 中使用 `ForEach`\
    \ 一样，我们必须为每个项目提供一种标识方式。在这种情况下，这一点尤其关键，因为 Xcode 需要知道根据情况更新哪个预览。我们将使用 `.self` 作为标识。\n\
    \n使用 `List` 时，我们将 `ForEach` 每次返回的内容（一个 `NoteRow`）都包含在列表中。在上面的代码中，我们为 `ContentSizeCategory`\
    \ 中的每个值创建了一个完整的预览。这意味着系统文本可设置的每种字号（超过十种预览），在画布中都将会有一个对应的预览。\n\n对于这种实际上仅在 `NoteRow`\
    \ 视图上发生的文字变化，用这么多完整的 UI 预览显得有些过头了。因此，更好的做法是将这种变化添加到 `NoteView` 的预览中，而不是 `ContentView`。\n"
- fmt: "# Preview Layout\n\nWhen you’re working on a View that is only part of the\
    \ screen, that’s all you want to see. In our case, the `NoteRow` doesn’t need\
    \ the entire device screen in the Canvas. And having multiple of them doesn’t\
    \ help either.\n\nIn those cases, the `.previewLayout` modifier may work better.\
    \ Not only do you not want multiple versions of the device, you may not want a\
    \ device at all.\n\nOur `NoteRow` is a good example of this. We don’t really need\
    \ to see the entire device (or multiple devices) to see what a `NoteRow` will\
    \ look like.\n\nI’ve changed the `NoteRow_Previews` code to include a static computed\
    \ property for a `DateFormatter`.\n\n```\nstatic var dateFormatter : DateFormatter\
    \ {\nlet df = DateFormatter()\ndf.dateStyle = .none\ndf.timeStyle = .medium\n\
    return df\n}\n```\n\nNow my preview can pass in this new property when creating\
    \ a `NoteRow`. My previews in `NoteRow_Previews` just returns\n\n```\nNoteRow(note:\
    \ Note(),\ndf: dateFormatter)\n```\n\nAnd the UI looks like Figure [8-4](#497312_1_En_8_Chapter.xhtml#Fig4).\
    \ This is a bit much for just a row for a list. Let’s use `.previewLayout` to\
    \ make it more reasonable and accurate to what we’ve designed.\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig4_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig4_HTML.jpg)\n\
    \n**Figure 8-4** NoteRow in Preview\n\nAfter our `NoteRow` creation in the previews\
    \ property, we’ll call `.previewLayout` with one of its three parameter options\
    \ as we see in Figure [8-5](#497312_1_En_8_Chapter.xhtml#Fig5).\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig5_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig5_HTML.jpg)\n\
    \n**Figure 8-5** Preview Layout Auto-complete Options\n\nAs you can see with the\
    \ device option selected, the description says it will be centered in the device\
    \ in the preview. That’s basically what we’ve been seeing all along. If you drill\
    \ into `.previewDevice`, you can see a list of the supported devices such as\n\
    \n```\n/// \"iPhone 7\"\n/// \"iPhone 7 Plus\"\n/// \"iPhone 8\"\n/// \"iPhone\
    \ 8 Plus\"\n/// \"iPhone SE\"\n/// \"iPhone X\"\n/// \"iPhone Xs\"\n/// \"iPhone\
    \ Xs Max\"\n/// \"iPhone Xʀ\"\n/// \"iPad mini 4\"\n/// \"iPad Air 2\"\n/// \"\
    iPad Pro (9.7-inch)\"\n```\n\nThe fixed option takes a width and height. This\
    \ is great for specifying a concrete width and height for your item. If you know\
    \ the element you’re designing will be a fixed size, this is how you can preview\
    \ it just as it will be.\n\nIf I put in a width of 200 and height of 80, my `NoteRow`\
    \ will look like Figure [8-6](#497312_1_En_8_Chapter.xhtml#Fig6).\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig6_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig6_HTML.jpg)\n\
    \n**Figure 8-6** NoteRow with Fixed Width and Height\n\n```\nNoteRow(note: Note(),\
    \ df: dateFormatter)\n.previewLayout(.fixed(width: 200, height: 80))\n```\n\n\
    In reality, I’d probably want it to be wider, but you get the idea. I could give\
    \ it a larger width and continue designing. I’d want to pick something that goes\
    \ along with the look that helps me see it as a List element.\n\nOne issue specifically\
    \ with this size is that the `Spacer` doesn’t have much effect. I can’t tell that\
    \ it will expand and have more of an impact on the design.\n\nAnother option is\
    \ the `sizeThatFits` value for `PreviewLayout`. This option, of course, causes\
    \ the preview to use the size necessary for the View being created.\n\n```\nNoteRow(note:\
    \ Note(), df: dateFormatter)\n.previewLayout(.sizeThatFits)\n```\n\nIf I use this\
    \ option, the UI preview looks like Figure [8-7](#497312_1_En_8_Chapter.xhtml#Fig7).\n\
    \n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig7_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig7_HTML.jpg)\n\
    \n**Figure 8-7** Preview Layout with sizeThatFits\n\nYou may be wondering how\
    \ it determined the width. We have a `Spacer` so in theory the width could be\
    \ any size. It’s using the simulator we picked. If we pick an iPad for the run\
    \ destination, the `NoteRow` would be considerably wider.\n\nAnd the `.environment`\
    \ modifier allows us to specify other variations of the environment settings that\
    \ might be in place for the user.\n\nLet’s put a lot of these to work together\
    \ in our `NoteRow` View.\n\n## Text Sizes in NoteRow\n\nIn this exercise, we’re\
    \ going to add a `ForEach` to the `NoteRow` to see its preview with each of the\
    \ content size category values.\n\n1.  Add a `ForEach` to the `NoteRow_Previews`:\n\
    \n    1.  Set the closure parameter to be `sizeCat`:\n\n```\nForEach(ContentSizeCategory.allCases,\n\
    id: \\.self) {\n}\n```\n\n    1.  Inside the closure, create the `NoteRow`:\n\n\
    ```\nForEach(ContentSizeCategory.allCases,\nid: \\.self) { sizeCat in\n}\n```\n\
    \n    1.  Add the `.previewLayout` with `.sizeThatFits` for the `NoteRow`:\n\n\
    ```\nForEach(ContentSizeCategory.allCases,\nid: \\.self) { sizeCat in\nNoteRow(note:\
    \ Note(), df: dateFormatter)\n}\n```\n\n    1.  Add the environment setting for\
    \ the `.sizeCategory` key path using the `sizeCat` parameter:\n\n```\nNoteRow(note:\
    \ Note(), df: dateFormatter)\n.previewLayout(.sizeThatFits)\n```\n\n```\nNoteRow(note:\
    \ Note(), df: dateFormatter)\n.previewLayout(.sizeThatFits)\n.environment(\\.sizeCategory,\
    \ sizeCat)\n```\n\nUpdate the preview to make sure several `NoteRow`s are displayed\
    \ – one for each size category.\n\nLet’s take it one step further and distinguish\
    \ each item in the Canvas with a display name.\n\n1.  Chain a call to `.previewDisplayName`\
    \ and pass in the `sizeCat` again.\n\n```\n.previewDisplayName(\"\\(sizeCat)\"\
    )\n```\n\nA partial version of the display is in Figure [8-8](#497312_1_En_8_Chapter.xhtml#Fig8).\n\
    \n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig8_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig8_HTML.jpg)\n\
    \n**Figure 8-8** NoteRow with Various Text Sizes\n\nWe’ve isolated one UI element\
    \ that can be used across our app. By using modifiers in the preview element,\
    \ we can see a variety of ways it could be displayed.\n\n## Pin Preview\n\nFrom\
    \ all of these options, we may want to make some changes. If possible, you want\
    \ to make your UI look great in all cases. That may require changes to the `NoteRow`\
    \ or the `ContentView`.\n\nOften, it’s helpful to see the `NoteRow` changes while\
    \ viewing the `ContentView` preview in the Canvas. This can be done by pinning\
    \ the preview.\n\nTo pin the preview, have the preview up you want to remain in\
    \ the Canvas. Then click the “Pin Preview” button on the bottom left of the Canvas\
    \ as in Figure [8-9](#497312_1_En_8_Chapter.xhtml#Fig9).\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig9_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig9_HTML.jpg)\n\
    \n**Figure 8-9** Pin Preview Button\n\nWhen a preview is pinned, the icon will\
    \ be blue (or whatever color you have set for your macOS system highlight color).\
    \ You can unpin the preview, even from other previews, by clicking it again.\n\
    \nThis will cause the `ContentView` preview to remain at the top of the Canvas\
    \ as you navigate to other View elements. As you make changes to your `NoteRow`,\
    \ you will see how it looks both as the `NoteRow` and within the `ContentView`\
    \ List.\n\nIf I change my `updatedAtTime` text to have a font modifier for `.thin`,\
    \ I can see it as it will appear in the `ContentView` List as in Figure [8-10](#497312_1_En_8_Chapter.xhtml#Fig10).\n\
    \n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig10_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig10_HTML.jpg)\n\
    \n**Figure 8-10** NoteRow Updated in the ContentView Preview\n\n```\nText(df.string(from:\
    \ note.updatedAtTime))\n.fontWeight(.thin)\n```\n\n## Chapter Summary\n\nIn this\
    \ chapter, we’ve seen how a preview item is created for our various View items.\
    \ Using modifiers can allow us to see how the UI will display in different devices,\
    \ environments, and layouts.\n\nWe also used `ForEach` to show a variety of previews\
    \ for our item in the Canvas. This can greatly speed up development by avoiding\
    \ time in builds, installs, execution, and navigation to check the user interface.\
    \ With a small amount of code, you can see your UI with different color schemes,\
    \ text sizes, locales, and more.\n\nBy passing in data, a `Note` instance, to\
    \ our `NoteRow`, we provided the data to the row. However, it was the same data\
    \ each time. Next, we’ll look at using Preview Content and other tools to use\
    \ more realistic data."
  raw: '## Preview Layout


    When you’re working on a View that is only part of the screen, that’s all you
    want to see. In our case, the NoteRow doesn’t need the entire device screen in
    the Canvas. And having multiple of them doesn’t help either.


    In those cases, the .previewLayout modifier may work better. Not only do you not
    want multiple versions of the device, you may not want a device at all.


    Our NoteRow is a good example of this. We don’t really need to see the entire
    device (or multiple devices) to see what a NoteRow will look like.


    I’ve changed the NoteRow_Previews code to include a static computed property for
    a DateFormatter.


    ```

    static var dateFormatter : DateFormatter {

    let df = DateFormatter()

    df.dateStyle = .none

    df.timeStyle = .medium

    return df

    }

    ```


    Now my preview can pass in this new property when creating a NoteRow. My previews
    in NoteRow_Previews just returns


    ```

    NoteRow(note: Note(),

    df: dateFormatter)

    ```


    And the UI looks like Figure [8-4](#497312_1_En_8_Chapter.xhtml#Fig4). This is
    a bit much for just a row for a list. Let’s use .previewLayout to make it more
    reasonable and accurate to what we’ve designed.


    ![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig4_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    NoteRow in Preview


