    \ updates of the data.\n\n```\n    func receive(subscription: Subscription) {\n\
    \    subscription.request(.unlimited)\n    }\n    ```\n\n2.  Implement the receive\
    \ input function.\n\n```\n    func receive(_ input: Input) -> Subscribers.Demand\
    \ {\n    if let textField = input.object as? UITextField {\n    userText = textField.text\n\
    \    lbl.text = userText\n    }\n    return .unlimited\n    }\n    ```\n\nSince\
    \ our Input type alias specified it is a Notification, we can use it that way.\
    \ We’re on the UI thread so updates work fine.\n\nReturn .unlimited indicating\
    \ that we want to continue with unlimited responses.\n\n3.  Implement the receive\
