- fmt: '# Here’s the Point


    I hope you’re starting to see how this part is working. We have the code and UI
    – boom – as one! The UI is built off of the code, not like in the past where you
    instantiate a button, set its attributes, and add it to the screen (Figure [2-15](#497312_1_En_2_Chapter.xhtml#Fig15)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig15_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig15_HTML.jpg)


    **Figure 2-15** – UI with Additional Text at the Bottom


    Now we have code built into the framework that is expecting you to do the UI via
    code. Because of things like the `View` protocol, a `body` computed property returns
    “`some View`”, and that is displayed.


    So we have to implement that to return something that adopts the `View` protocol.
    `Text` and other items do, so we can create those to return.


    Also, single-expression closures automatically return the result of that expression.
    So we can just get to codin’!


    Whether we create a `Text` item or a `VStack` or `HStack` with items in them,
    it will get returned.


    For the items we create, we can add modifiers to change the colors, spacing, font,
    padding, and so on. These can be added in the code or via the Inspectors.


    The `SwiftUI Inspector` can be displayed via the menu with **⌘ + click** or opened
    directly with **⌃⌥ + click**.


    The `Attributes Inspector` is displayed via the right pane (Inspectors) with the
    `Attributes Inspector` tab button selected. Each item selected in the UI or code
    will show the attributes related to that item. In some cases, selecting the item
    in the code is best.


    # USER INTERFACE EXERCISE


    I want you to use your existing project (or feel free to create a new one) and
    make the UI look like the image (Figure [2-16](#497312_1_En_2_Chapter.xhtml#Fig16)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig16_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig16_HTML.jpg)


    **Figure 2-16** – UI for the Exercise


    In the following, I’ll give you some hints and after that the solution. But first,
    try to recreate this look by adding items and modifiers to see if you can get
    the look right.


    There are also some hints in the text itself.


    Here are the hints:


    * All three items are `Text` items. Nothing new there.

    * The second item only has one modifier: `.border`

    * The third item has two modifiers mentioned in the text: `.padding` and `.opacity`

    * The three items are contained within a `VStack`.


    I hope you got some good exercise adding items and modifiers. I want to encourage
    you to always experiment. Try adding modifiers like `Blur` or `Shadow` and see
    how it works.


    Here’s the solution code:


    ```

    VStack {

    Text("Notes")

    .fontWeight(.bold)

    .foregroundColor(Color.white)

    .padding(30.0)

    .frame(width: 300.0, height: 50.0)

    .background(Color.blue)

    .cornerRadius(15.0) Text("This has a red border.")

    .border(Color.red, width: 1)

    Text("This has a black background but opacity of 0.5\. It has multiple lines but
    doesn''t go off the screen and is left justified. It also has some padding to
    keep from the edges and the item above.")

    .foregroundColor(Color.white)

    .background(Color.black)

    .multilineTextAlignment(.leading)

    .opacity(0.5)

    .padding(45)

    }

    ```


    # Chapter Summary


    In this chapter, we considered the mind shift related to SwiftUI coming from other
    concepts. SwiftUI code *is* the UI just as much as a nib/xib/storyboard XML was
    the UI in the past.


    We looked at the `View` protocol and the defined computed property of the `body`
    of that type.


    We inspected a template definition of a single-view app. The `ContentView` struct
    implements the `View` protocol with a single-expression closure of a `Text` element.


    Using the `SwiftUI Inspector` and `Attributes Inspector`, we saw how to add and
    change values on modifiers. And using the pop-up menu, we saw how to embed an
    item in a `VStack` or `HStack`.


    In the next chapter, we’ll move beyond just the basic `Text` element and use a
    wider selection of the various UI elements provided to us for UI development.


    # 3. SwiftUI Building Blocks


    In this chapter, we’ll look at the variety of building blocks provided by SwiftUI.
    SwiftUI, like UIKit, provides various elements we can use to build out our UI.
    We’ve already seen the `Text` UI element. That’s just the start.


    ## Old Friends and New


    If you’ve worked with Xcode development before, you’re probably familiar with
    many of the standard UI elements. `Switch`, `Segmented Control`, `Picker View`,
    and others have been good friends for a long time.


    Don’t worry – you’ll still be seeing them. However, you’ll create them differently.
    Of course, yes, it will be in code. But it will also take a more declarative approach.
    Declarative in the sense that you’ll tell SwiftUI what to do, but not necessarily
    how to do it.


    Let’s take a look at `Button`.'
