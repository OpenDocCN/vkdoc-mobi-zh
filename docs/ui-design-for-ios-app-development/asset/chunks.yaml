- fmt: "## Toggle\n\n`Toggle` is a great place to point out the declarative nature\
    \ of SwiftUI. When creating a switch, we don't use \"Switch\" or \"UISwitch.\"\
    \ We cut to the declarative version of \"what to do\" over how to do it. So we\
    \ use `Toggle`.\n\nUsing the term toggle tells the system what we're trying to\
    \ do: provide an on/off-type control to the user. Here, you see there's an initializer\
    \ that takes two parameters (Figure [3-5](#497312_1_En_3_Chapter.xhtml#Fig5)).\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig5_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig5_HTML.jpg)\n\
    \nFigure 3-5: Toggle Auto-complete\n\nThe declaration shows more details of the\
    \ initializer:\n\n```\npublic init(isOn: Binding,\n@ViewBuilder label: () -> Label)\n\
    ```\n\nThe first parameter is the initial state of the toggle: on or off. But\
    \ notice it's not just a `Bool`. The parameter type is `Binding` specifying the\
    \ generic being used is a `Bool`.\n\nThe second parameter, like with the `Button`,\
    \ is a generic named `Label`. The `Toggle` code defines that this generic conforms\
    \ to the `View` protocol.\n\n## Binding\n\nWe'll get into how this works in later\
    \ chapters. For now, understand that it's binding the parameter passed in to the\
    \ UI. So if the value of the property (e.g., `isReady`) changes, the `Toggle`\
    \ needs to update too.\n\nFurther, if the `Toggle` needs to update, the UI needs\
    \ to update so it's re-created and redisplayed.\n\nSo the `Toggle` and the property\
    \ are bound together. When one changes, the other changes.\n\nWe declare the property\
    \ like this:\n\n```\n@State private var isReady : Bool = false\n```\n\n## `@State`\
    \ Property Wrapper\n\nIn order to bind our property, `isReady`, to UI elements,\
    \ we need to use the `@State` property wrapper. This does a few things for us.\n\
    \nIt creates a wrapper for the property. So, while `isReady` is set to false and\
    \ even declared as a `Bool`, accessing it is done via the wrapper. In fact, if\
    \ you drill down into `isReady` during execution, you'll see something like Figure\
    \ [3-6](#497312_1_En_3_Chapter.xhtml#Fig6).\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig6_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig6_HTML.jpg)\n\
    \nFigure 3-6: Property Wrapper in the Debugger\n\nNotice the `State<Bool>` as\
    \ the type. The value is stored below that. Also, the location is stated as `SwiftUI`.\
    \ That's because the UI is storing and managing the value.\n\n`@State` is meant\
    \ for creating a \"source of truth\" for a value that is specific to one view.\
    \ That's why we also see it marked as `private` – it's only for this view. That's\
    \ recommended.\n\nTo create the binding in the UI, like for our `Toggle`, you\
    \ add the prefix `$` to the property (e.g., `$isReady`). In other ways, like checking\
    \ the value or setting it programmatically, you do it as usual (e.g., somewhat\
    \ like an Optional: `isReady = true`).\n\nThe key thing to understand here is\
    \ that instead of the action on a `Toggle` setting a value, we're binding the\
    \ value. So we've handed to the `Toggle` our value to update. Moreover, if the\
    \ value changes otherwise, the `Toggle` is updated visually.\n\n## Toggle Label\n\
    \nThe second parameter is a label. This is basically the same thing as we saw\
    \ with the `Button`. The second parameter is what to show. In this case, it displays\
    \ it next to the `Toggle` as opposed to on it like the `Button` did.\n\nIf you\
    \ look at the declaration of that `Label` parameter, you'll see this comment:\n\
    \n```\nA view that describes the effect of toggling `isOn`.\n```\n\nThis is great!\
    \ It's letting us benefit from the existing element definitions and appearance.\
    \ If the standard `Toggle` changes later or is used on another device, it can\
    \ adapt based on that system. If you design this for an iPhone but build it for\
    \ an Apple Watch later, the UI will adapt.\n\nWe just need to declare what we\
    \ want (i.e., `Toggle`) and bind it to the property it represents (i.e., `isReady`)\
    \ and whatever UI we want displayed describing the effect of toggling (e.g., `Text`).\n\
    \nWhat we're really trying to provide is something that goes along with the toggle\
    \ to describe what it does. So… let's…\n\n## Toggle Exercise\n\nIn this exercise,\
    \ we'll add a `Toggle` to our UI. It's going to be bound to a property so we'll\
    \ add that to our `ContentView` as `isReady` which will be a `Bool`.\n\n1. Open\
    \ a project (existing or new) and click the `ContentView.swift` file for editing.\n\
    \n2. Add a property just above the \"`var body...`\" property line:\n\n   ```\n\
    \   @State private var isReady = false\n   ```\n\n   This creates a property wrapper\
    \ for `isReady`'s `Bool` value with an initial value of false.\n\n3. Edit the\
    \ `body` computed property and add a `Toggle` at the bottom of the returned value.\
    \ It has two parameters:\n\n   - `isOn` – Passes in the binding of `isReady` with\
    \ `$isReady`\n   - `label` – Passes in a `Text` item to display for the `Toggle`.\
    \ Your Toggle code may look something like this:\n\n     ```\n     Toggle(isOn:\
    \ $isReady,\n     label: {\n         Text(\"Ready: \" + (isReady ? \"Yes\" : \"\
    No\"))\n     })\n     ```\n\n   In this case, the `Text` will also indicate the\
    \ value of the setting. That would probably be redundant in an actual app, but\
    \ for our purposes, it's the verification of the value.\n\n   ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig7_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig7_HTML.jpg)\n\
    \n   Figure 3-7: Toggle Set to Off/False\n\n4. Run your app and verify that initially\
    \ the Toggle is off because `isReady` is false (Figure [3-7](#497312_1_En_3_Chapter.xhtml#Fig7)).\n\
    \n   ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig8_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig8_HTML.jpg)\n\
    \n   Figure 3-8: Toggle Set to On/True\n\n5. Turn the Toggle on and verify the\
    \ `Text` element is updated to include \"Yes\" (if you defined a similar `Text`\
    \ element to the above) (Figure [3-8](#497312_1_En_3_Chapter.xhtml#Fig8)).\n\n\
    6. Add a `Button` (or modify an existing `Button`) and toggle the `isReady` value\
    \ when the button is tapped.\n\n7. Run the app and verify that when the button\
    \ is tapped, the UI updates with the toggled value.\n\nHopefully, you were able\
    \ to complete this exercise easily and saw the same results and more!\n\n## Code\
    \ as of Now\n\nHere's my current code for my `body` property through all of these\
    \ exercises including an `Image` for a png file in my assets catalog:\n\n```\n\
    var body: some View {\n    VStack {\n        Text(\"Hello, Swift\")\n        \
    \    .font(.largeTitle)\n            .fontWeight(.bold)\n            .foregroundColor(Color.blue)\n\
    \            .padding(30.0)\n            .frame(width: 200.0, height: 400.0)\n\
    \            .background(Color.green)\n            .cornerRadius(40.0)\n     \
    \   Button(action: {\n            print (\"tapped!\")\n            self.isReady.toggle()\n\
    \        }, label: { Text(\"Tap Me\") })\n        Text(\"another item\")\n   \
    \     Image(systemName: \"camera\")\n        Image(\"brainwashIcon\")\n      \
    \      .resizable()\n            .frame(width: 100, height: 100, alignment: .center)\n\
    \            .colorInvert()\n        Toggle(isOn: $isReady,\n               label:\
    \ {\n                   Text(\"Ready: \" +\n                       (isReady ?\
    \ \"Yes\" : \"No\"))\n               })\n            .padding([.leading, .trailing],\
    \ 100.0)\n    }\n}\n```\n\nAnd Figure [3-9](#497312_1_En_3_Chapter.xhtml#Fig9)\
    \ shows what it looks like in the preview.\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig9_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9: Current SwiftUI Code in a Canvas\n\nA few things worth noting:\n\
    \n- The `Button` action prints \"tapped!\" and toggles the `isReady` value.\n\
    - The second `Image` item has three modifiers on it. The `resizable` modifier's\
    \ output has `.frame` called on it.\n- I also called `.colorInvert` on the same\
    \ `Image`. This can be called on the `Image`, but its return type doesn't respond\
    \ to `.resizable()`. In some cases, the order matters.\n- The `Toggle` uses binding\
    \ for the `isOn` value, but otherwise `isReady` is treated like a normal property.\n\
    - I used `.padding` on the `Toggle` to get it away from the sides."
