  trans: "\n# 添加 SwiftUI\n\n如同我们在上一个练习中所做的那样，我们需要在 Storyboard 中添加一个托管视图控制器。然后在 `TimerListVC`\
    \ 代码中创建 segue 动作。在本例中，我们将从表格视图单元格开始操作。\n\n再次与上一个练习相同，我们在 Storyboard 中只需完成这些操作。\n\
    \n生成的 segue 动作函数需要返回一个 `UIViewController`。与前次一样，我们将创建 SwiftUI 视图的实例。该实例以及传入的代码将用于创建要返回的托管视图控制器。因此，我们需要创建一个\
    \ SwiftUI 视图！\n\n我们之前已经看到，`View` 结构体会获得一个成员逐一初始化器。在 Timers 项目中，这将包含用于显示详情的 `TimerItem`。\n\
    \n两个不太明显的部分是：更新时间的 UI，以及用于启动/暂停计时器的按钮。而且这些操作一点也不复杂。\n\n## 将计时器视图添加到 UIKit\n\n\
    打开提供的 BOC 项目 `Ch14_BOC_Timers.zip`，并导航到 Storyboard。\n\n1. 从对象库中向 Storyboard 添加一个托管视图控制器。\n\
    \n2. 按住 Control 键从表格视图单元格拖拽到新的托管视图控制器，松开鼠标，然后从弹出菜单中选择 Show。\n\n你的 Storyboard 应该如图\
    \ 14-8 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig8_HTML.jpg](img/497312_1_En_14_Fig8_HTML.jpg)\n\
    \n图 14-8：包含托管视图控制器和 Segue 的 Storyboard\n\n3. 打开助理编辑器（Editor ➤ Assistant 或 ⌃⌥⌘⏎）。\n\
    \n4. 按住 Control 键从 segue 拖拽到 `TimerListVC.swift` 代码中（位于 `makeTimer` 函数下方），松开鼠标，并将函数命名为\
    \ `timerDetails`。\n\n现在我们需要创建 `TimerView` 来显示计时器详情。\n\n5. 向项目中添加一个新的 SwiftUI 视图文件，命名为\
    \ `TimerView.swift`。\n\n我们将用计时器详情替换 `body` 属性中的内容。当然，我们需要一个 `TimerItem` 来提供详情。\n\
    \n6. 添加 `TimerItem` 属性和 body 内容。\n\n```\nstruct TimerView: View {\n    var timer\
    \ : TimerItem\n    var body: some View {\n        VStack {\n            Text(timer.name)\n\
    \            Text(timer.timeString)\n        }\n    }\n}\n```\n\n7. 更新 `TimerView_Previews`，使其传入一个\
    \ `TimerItem`。\n\n```\nstruct TimerView_Previews: PreviewProvider {\n    static\
    \ var timer = TimerItem(name: \"Test Timer\",\n        seconds: 12)\n    static\
    \ var previews: some View {\n        TimerView(timer: timer)\n    }\n}\n```\n\n\
    预览不会显示，因为我们在需要创建 `UIHostingController` 的 `TimerListVC.swift` 代码中遇到了一个错误。\n\n现在，我们可以在\
    \ `TimerListVC` 的 segue 动作中创建它并显示出来。\n\n当用户在表格视图中选择一行时，会调用这个 segue。这意味着我们可以从表格视图中获取该行的行号。\n\
    \n8. 创建一个 `let` 常量，用于从数组中存储 `TimerItem`，并使用选中的行进行赋值。\n\n9. 使用数组中的 timer 创建 `TimerView`\
    \ 实例。\n\n```\n@IBSegueAction func timerDetails(_ coder: NSCoder)\n    -> UIViewController?\
    \ {\n    let timer =\n        timers[tableView.indexPathForSelectedRow!.row]\n\
    }\n```\n\n10. 返回使用 `coder` 和已创建的 `tView` 创建的 `UIHostingController` 实例（完整函数如下所示）。\n\
    \n```\n@IBSegueAction func timerDetails(_ coder: NSCoder)\n    -> UIViewController?\
    \ {\n    let timer =\n        timers[tableView.indexPathForSelectedRow!.row]\n\
    \    let tView = TimerView(timer: timer)\n    return UIHostingController(coder:\
    \ coder,\n        rootView: tView)\n}\n```\n\n既然我们已经添加了 `UIHostingController`\
    \ 代码，那么就需要 SwiftUI。因此，我们需要导入 SwiftUI。\n\n11. 取消文件顶部 SwiftUI 导入语句的注释。\n\n```\n\
    let tView = TimerView(timer: timer)\n```\n\n现在运行应用，当点击某一行时会显示详情。UI 非常基础（见图 14-9），但这正是我们设计的。\n\
    \n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig9_HTML.jpg](img/497312_1_En_14_Fig9_HTML.jpg)\n\
    \n图 14-9：模拟器中的 `MySwiftUIView`\n\n这很简单，对吧？我们只是添加了托管视图控制器，并为 Storyboard 创建了 segue\
    \ 动作。我们设计了一个简单的 SwiftUI 视图，用计时器创建了它，并返回了 `UIHostingController`。\n"
- fmt: "# Passing ObservableObject\n\nYou may remember we wanted to have the timer\
    \ update on the SwiftUI view. Also, we want a Start/Pause button. If you run the\
    \ app, you’ll notice the timer doesn’t update in our new view.\n\nIn some of our\
    \ exercises, we used binding to solve this type of challenge. But our model in\
    \ `TimerListVC` is `TimerItem` instances. If we changed that to some type of binding,\
    \ a lot of code would have to change.\n\nBinding only works on value types (structs,\
    \ enums), and our `TimerItem` is a reference type (class).\n\nChanging the `TimerItem`\
    \ to a struct for binding could have a lot of implications in our code. Some code\
    \ may rely on passing the reference around for changes.\n\nWe’ll keep it as a\
    \ class. The `ObservableObject` protocol is made for reference types so we’ll\
    \ use that.\n\n## Making Timer Item Observable\n\nWe only need a few changes for\
    \ this. We have to declare `TimerItem` conforms to `ObservableObject`. With that,\
    \ we can declare what property or properties to publish with the `@Published`\
    \ wrapper. And we need to tell the code when to send changes.\n\nThe `TimerView`\
    \ also needs to be updated to mark the property as an `ObservedObject`. We can\
    \ also update the UI with the Start/Pause button.\n\n1. Open the `TimerItem.swift`\
    \ code and declare it implements the `ObservableObject` protocol.\n\n1. Mark the\
    \ `timeString` property as published.\n\n```\nclass TimerItem : ObservableObject\
    \ {\n```\n\n1. In the `start` function, at the top of the scheduled timer closure\
    \ (e.g., line 69), add the send function call.\n\n```\n@Published var timeString\
    \ = \"\"\n```\n\n```\nself.objectWillChange.send()\n```\n\nNow that the `TimerItem`\
    \ is observable, we can declare that in the `TimerView`.\n\n1. In `TimerView`,\
    \ declare the `timer` property as an observed object.\n\n```\n@ObservedObject\
    \ var timer : TimerItem\n```\n\nAt this point, the timer duration will update\
    \ in the `TimerView`. However, you have to start the timer in the table view before\
    \ viewing its details.\n\nLet’s add the Start/Pause button in our `TimerView`.\
    \ We can add that under the two text items. The `Button` needs an action and what\
    \ to display for the visual part of the button.\n\nThe action can check the `isRunning`\
    \ property on the timer. If it’s running, it can pause the timer. Otherwise, it\
    \ can start the timer.\n\nFor the label parameter, we can use a `Text` element.\n\
    \n1. In `TimerView`, add a `Button` below the two `Text` items. For the action,\
    \ check the `isRunning` parameter and pause or start the timer based on its setting.\
    \ For the label, create a `Text` element.\n\n```\n    Button(action: {\n    if\
    \ self.timer.isRunning {\n    self.timer.pause()\n    }\n    else {\n    self.timer.start()\n\
    \    }\n    }) {\n    Text(timer.isRunning ? \"Pause\" : \"Start\")\n    }\n```\n\
    \nJust to make it a little more formatted, let’s add a couple modifiers to the\
    \ timer displaying the remaining duration.\n\n1. On the second text item, for\
    \ `timer.timeString`, add font and padding modifiers.\n\n```\n    Text(timer.timeString)\n\
    \    .font(.largeTitle)\n    .padding()\n```\n\nNow viewing a timer’s details\
    \ allows us to start/pause the timer. When started, we can see the timer count\
    \ down the remaining time as in Figure [14-10](#497312_1_En_14_Chapter.xhtml#Fig10).\n\
    \n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig10_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig10_HTML.jpg)\n\
    \nFigure 14-10\n\nTimer Details UI with Button and Time Remaining\n\nNotice that\
    \ when you tap Pause, it doesn’t update to Start. Why do you think that is? The\
    \ `pause` function in `TimerItem` invalidates the timer. But the timer’s closure\
    \ is when we publish the changes.\n\nThis can be fixed in two ways: send the updates\
    \ out in the `pause` function or mark the `isRunning` property with `@Published`.\
    \ Try those out.\n\nTo add the ability to update our UI with changes didn’t take\
    \ too many changes. We had to specify the `TimerItem` was an `ObservableObject`.\
    \ Then we had to mark the `timeString` as published and call the `send` function.\n\
    \nWith those changes, we just had to specify the property in `TimerView` as an\
    \ observed object. We also added the Start/Pause button and modifiers to a `Text`\
    \ item.\n\n## Chapter Summary\n\nIn this chapter, we focused on using SwiftUI\
    \ views in an existing Storyboard-based project. The provided `Hosting View Controller`\
    \ and segue action allowed for this to be easy.\n\nWith the `Hosting View Controller`\
    \ in our Storyboard and a segue, we created the segue action in our code. That\
    \ gets passed a coder. We needed to create our SwiftUI view instance. With the\
    \ coder and our view, we created the `Hosting View Controller` and returned it\
    \ from the segue action.\n\nNotice that we created the view controller to return.\
    \ That means we have access to set other properties on our view or the view controller\
    \ in one place. There’s no need to implement the `prepare(for:sender:)` segue\
    \ function.\n\nTo allow the SwiftUI to update dynamically, it needed a couple\
    \ more changes. We chose to use the `ObservableObject` protocol since our `TimerItem`\
    \ was a reference type (class).\n\nWe declared it implements the protocol, specified\
    \ the published property, and called the `send` function when necessary.\n\nThe\
    \ only thing left was to mark the `TimerView` property as an observed object.\n\
    \nIn our first exercise in this chapter, we saw that it takes very little work\
    \ to display SwiftUI in a UIKit project. The second exercise shows even UI updates\
    \ and interaction don’t take much.\n\nThis methodology allows for existing projects\
    \ to benefit seamlessly from new SwiftUI user interface development.\n\n# 15.\
    \ Introduction to Combine\n\nWe’ve already been using the Combine framework a\
    \ good bit. Now we’re going to pause on SwiftUI and look a bit more closely at\
    \ Combine.\n\nApple describes the framework as “a unified, declarative API for\
    \ processing values over time.” The part I want to focus on is the “processing\
    \ values over time.”\n\nThat’s how we’ve been using Combine so far. As our values\
    \ have changed over time, our UI has updated. We used `@State`, `@Binding`, `@Published`,\
    \ and more.\n\nUsing these wrappers in SwiftUI has really facilitated changes\
    \ reflected in our UI. But it can be easy to confuse these Combine framework aspects\
    \ with SwiftUI.\n\nThe Combine framework can be used without SwiftUI. This can\
    \ help your existing apps even without using SwiftUI. Understanding this framework\
    \ will improve your apps across the board. Also, it will set you up to set the\
    \ stage for adding SwiftUI as you update your current apps.\n\n## Common Concepts\n\
    \nApps are built using the basic concept of displaying an interface to the user.\
    \ The user’s input is stored in the app, and the functionality is driven by these\
    \ actions and data. We know this.\n\nSo it’s a common paradigm to store the user’s\
    \ text input in a `String` property. Similarly, we may display that data or a\
    \ version of it after some functionality.\n\nLet’s look at a simple example.\n\
    \nLet’s say we have a basic UI design of a textfield and label. We have outlets\
    \ to them in our view controller. There’s also an action on the textfield for\
    \ `editingChanged`. That function stores the entered text and puts it in the label.\
    \ The code is in Figure [15-1](#497312_1_En_15_Chapter.xhtml#Fig1).\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig1_HTML.jpg](images/497312_1_En_15_Chapter/497312_1_En_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1\n\nBasic UI ViewController Code to Update a Label with TextField\
    \ Changes\n\nIf you run this app, the label will update as you type in the textfield.\
    \ Let’s look at a way to do this using Combine framework concepts."
