    \ > 0\n        ? \"star.circle\" : \"circle\")\n    Image(systemName: note.priority.rawValue\
    \ > 1\n        ? \"star.circle\" : \"circle\")\n}\n```\n\n```swift\n}.background(Color.gray)\n\
    ```\n\nThe \"Update\" button stays in the `ContentView` body.\n\n1. Add a `Note`\
    \ property to the `NoteView`:\n\n```swift\nvar note : Note\n```\n\nThis property\
    \ will be passed in so do not set it equal to anything.\n\n2. Similarly, add a\
    \ `DateFormatter` property which will be passed in:\n\n```swift\nvar df : DateFormatter\n\
    ```\n\nThe `NoteView` struct is defined and ready to be used (Figure 6-5). It\
    \ has the two properties of `Note` and `DateFormatter`. We have those in our `ContentView`.\
    \ Those are the two values in the `ContentView` we’ll use to create our `NoteView`.\n\
    \n![Figure 6-5](images/497312_1_En_6_Chapter/497312_1_En_6_Fig5_HTML.jpg)\n\n\
    *Figure 6-5: NoteView with Properties and UI Items Moved from ContentView’s VStack*\n\
    \n3. In `ContentView`'s body property, create a new `NoteView` instance. It should\
    \ go where you previously had the two `Text` items and `HStack` of `Image`s in\
    \ the body of the `NoteView` (just above the `Button`):\n\n```swift\nNoteView(note:\
    \ self.note, df: df)\n```\n\nNow we have our own UI element defined. We can pass\
    \ in environment settings to our `NoteView` as we have done previously to `Text`.\n\
    \n![Figure 6-6](images/497312_1_En_6_Chapter/497312_1_En_6_Fig6_HTML.jpg)\n\n\
    *Figure 6-6: NoteView UI*\n\n4. Add the same `.environment` modifier you had before\
    \ on the `Text` item now to the `NoteView`. Steps 7 and 8 combined look like this:\n\
    \n```swift\nNoteView(note: self.note, df: df)\n    .environment(\\.colorScheme,\
    \ .dark)\n```\n\n5. Update the preview in the Canvas for `NoteView`, and it should\
    \ look like Figure 6-6.\n\nBasically, this is what we want. We’ve shown that we\
    \ can create a `NoteView` to control itself while having the parent view control\
    \ the environment.\n\nHowever, there are two problems. The padding isn’t very\
    \ appealing on the bottom. Also, if you ran it in the simulator, you may have\
    \ noticed the priority stars aren’t updating anymore.\n\nBoth of these issues\
    \ are easily fixed. For the padding, we can still control the UI in the `NoteView`\
    \ with a `.padding` modifier. If we put padding on the `VStack` in `NoteView`,\
    \ it will have a bottom space that’s white. That’s because the padding is outside\
    \ of the views. Not what we want.\n\nInstead, if we put the padding on the last\
    \ UI item (i.e., the `HStack` as in the following code), it will look correct:\n\
    \n```swift\nHStack {\n    Image(systemName: \"star.circle\")\n    Image(systemName:\
    \ note.priority.rawValue > 0\n        ? \"star.circle\" : \"circle\")\n    Image(systemName:\
    \ note.priority.rawValue > 1\n        ? \"star.circle\" : \"circle\")\n}\n.padding(.bottom)\n\
    ```\n\nFor making the `Note`'s priority update, we need to use the same `Note`\
    \ instance in the UI as we created in the `ContentView`. We can use the `ObservedObject`\
    \ property wrapper in the `NoteView`.\n\n6. Add an `ObservedObject` in the `NoteView`:\n\
    \n```swift\n@ObservedObject var note : Note\n```\n\nSince we now have the `NoteView`\
    \ controlling the UI for updates to the note instance, we can remove the `@ObservedObject`\
    \ from our `ContentView` property:\n\n```swift\nstruct ContentView: View {\n \
    \   var note = Note()\n```\n\nOnce we create the `Note` (above) and pass it into\
    \ the `NoteView`, changes will be published to `NoteView` instead of `ContentView`.\n\
    \n![Figure 6-7](images/497312_1_En_6_Chapter/497312_1_En_6_Fig7_HTML.jpg)\n\n\
    *Figure 6-7: NoteView with Priority Updates*\n\n7. Run the app again and verify\
    \ the priority stars are updated as in Figure 6-7.\n\nThe dark mode changes are\
    \ handled as well as in Figure 6-8. Be sure you’re using a simulator/device that\
    \ supports dark mode.\n\n![Figure 6-8](images/497312_1_En_6_Chapter/497312_1_En_6_Fig8_HTML.jpg)\n\
    \n*Figure 6-8: NoteView UI in Dark Mode*\n\n**Bonus**: For extra practice, add\
    \ another `.environment` modifier after the `colorScheme` setting. Try using the\
    \ `\\.font` key path and set the font for the `NoteView`'s environment. You can\
    \ set it to something like:\n\n```swift\nFont.system(.largeTitle)\n```\n\nIn this\
    \ exercise, we saw that we can allow a given View to control its own UI. But we\
    \ can also control the environment from the parent via the `.environment` modifier.\n\
    \n## App Environment\n\nJust like we called the `.environment` modifier when we\
    \ created the `NoteView`, we can do it in other places. In the `SUINotesApp.swift`\
    \ file created for you by the templates (named based on our project name), our\
    \ `ContentView` is created for running the app in the simulator/device (as opposed\
    \ to the Canvas).\n\nJust like where we created our `NoteView`, we can set some\
    \ environment settings for our `ContentView`. So if we wanted our app to run in\
    \ dark mode, have a set font, or have a set truncation mode or various other settings,\
    \ we can do it in that one place.\n\nBut remember, this means you are setting\
    \ the environment for that view and its children. If you set the `colorScheme`\
    \ to dark (or light) and the system is in light (or dark), you’re only changing\
    \ it for your `ContentView` and its children – not for the whole device. But your\
    \ app would always run in dark mode despite the device settings by the user.\n\
    \nOr, on your `ContentView` instance, you can set things like the `Font` which\
    \ will propagate:\n\n```swift\nContentView()\n    .environment(\\.font, Font.system(.largeTitle))\n\
    ```\n\nIf you create the `ContentView` like this in the `ContentView_Previews`\
    \ code, your preview will use this setting in the Canvas.\n\nIf you do this in\
    \ the `SUINotesApp.swift` file’s creation of `ContentView`, it will use those\
    \ settings when run in the simulator or device."
