    拥有选定状态时的 UI 应如图 19-4 所示。


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig4_HTML.jpg](img/497312_1_En_19_Fig4_HTML.jpg)


    图 19-4


    包含选定状态的 UI


    选择州的另一个选项是使用 `Picker`。我们将定义一个选择器，同时还要添加一个 `NavigationView` 来实现向下钻取。


