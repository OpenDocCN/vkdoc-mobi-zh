    \ appended to the usernames to tell which data is loaded as in Figure [16-7](#497312_1_En_16_Chapter.xhtml#Fig7)\
    \ .\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig7_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig7_HTML.jpg)\n\
    \nFigure 16-7\n\nUI with Local Test Data\n\nProduction builds will disregard the\
    \ DEBUG conditional and load data from the server.\n\n## Chapter Summary\n\nWe\
    \ went through a lot of variations in this chapter’s code. We saw how to create\
    \ a publisher from a URLSession. The resulting data task publisher can be modified\
    \ with operators like other publishers. We can map the data, decode, replace errors,\
    \ assign, and more.\n\nWe also created a variation for local test data. This route\
    \ used flatMap to decode the data and catch any errors. It uses Just in a couple\
    \ of places and also avoided a cancelled subscription if an error occurred.\n\n\
    In the end, we had two published properties and two subscribers.\n\nOur ContentView\
    \ declared the UserStatusMgr property as an observed object. This is for when\
