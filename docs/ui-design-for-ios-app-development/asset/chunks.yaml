    \ Figure [13-5](#497312_1_En_13_Chapter.xhtml#Fig5).\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig5_HTML.jpg](images/497312_1_En_13_Chapter/497312_1_En_13_Fig5_HTML.jpg)\n\
    \n**Figure 13-5** NotePriorityAndTime Using PriorityStarButtons\n\nRunning the\
    \ app should still look similar but with a slight change to the star images. They’re\
