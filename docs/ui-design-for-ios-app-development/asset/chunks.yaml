- fmt: "# 2\\. Take It Easy\n\nIn this chapter, we’ll ease into SwiftUI by seeing\
    \ it in action. If it feels slow, good! The beginning is the only time to lay\
    \ a foundation and that needs to be solid. Rock solid. Like math, a spoken language,\
    \ or many other skills, if we don’t get this down now, we’ll be lost later.\n\n\
    ## Code + UI\n\nIf you’ve done UI development in Xcode in the past, you know that\
    \ combining the UI design and code is possible. However, they aren’t hot swappable.\
    \ You don’t change a background color to red in the code and then open Interface\
    \ Builder and see that change. At least, now without some special coding.\n\n\
    With SwiftUI, you can think of the code and the UI as one thing. Effectively,\
    \ it is. In the past, the UI was translated into XML. That wasn’t very readable\
    \ nor easy to edit correctly. Now the UI is generated from the SwiftUI code. As\
    \ you make changes to the code, the preview is updated to show the changes.\n\n\
    Moreover, if you modify the UI in the preview canvas, it updates the code. Let’s\
    \ look at an example starting with a new project.\n\n## Your First SwiftUI App\n\
    \nWe’re going to start by creating a project from a template, analyzing what’s\
    \ created, and changing the UI for our purposes.\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig1_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1\n\nCreate New Project Option in Xcode\n\n1.  Open Xcode and start\
    \ a new project (Figure [2-1](#497312_1_En_2_Chapter.xhtml#Fig1)).\n\nIf Xcode\
    \ is already running, select `File ➤ New… ➤ Project` (`⇧⌘N`).\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig2_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2\n\niOS App Template\n\n1.  Select the iOS App template and click\
    \ Next (Figure [2-2](#497312_1_En_2_Chapter.xhtml#Fig2)).\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig3_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\n\nProject Options\n\n1.  Set your product name and other details\
    \ including the Language (`Swift`), User Interface (`SwiftUI`), and Life Cycle\
    \ (`SwiftUI App`) (Figure [2-3](#497312_1_En_2_Chapter.xhtml#Fig3)).\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig4_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4\n\nResume Automatic Preview\n\n1.  When your project is created,\
    \ preview updating may be paused. If so, click the Resume button (Figure [2-4](#497312_1_En_2_Chapter.xhtml#Fig4)).\n\
    \nOnce the preview updates, you’ll see your first SwiftUI. Congrats. No one is\
    \ more proud of you than me.\n\n## Hello SwiftUI\n\nOf course, this is the typical\
    \ “Hello World” example. Let’s look just briefly at what we have line by line.\n\
    \nWe’re importing `SwiftUI` on line 9\\. That’s new. That’s where the various\
    \ SwiftUI items are defined obviously.\n\nOn line 11 is the first line of code\
    \ for our new app. We have a struct called `ContentView` which implements a protocol\
    \ named `View`. We can see the definition of view with `⌃⌘ + click \"View\"`.\n\
    \nSo anything implementing `View` needs to have a property called `body`. That\
    \ property must have a getter that returns the type specified by the associatedtype\
    \ of the `Body`: something that implements `View`.\n\nBack in our code, we see\
    \ that `ContentView` implements `View`. The return type is `some View`, and the\
    \ body of that computed body property is a `Text`.\n\n> **Note**  \n> We’ll get\
    \ into the `some View` and opaque types later. For now, just know that whatever\
    \ is returned from our body computed property must implement `View`.\n\nYou’ve\
    \ probably already guessed that `Text` is like a label. We create it with a `String`,\
    \ and there it is on the UI.\n\n## Modifiers\n\nAs with other methods of UI development,\
    \ SwiftUI elements can be modified. `Text` has modifiers like font, color, alignment,\
    \ and so on.\n\nWe can add a modifier to our `Text` element to make the font red\
    \ like this (Figure [2-5](#497312_1_En_2_Chapter.xhtml#Fig5)):\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig5_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig5_HTML.jpg)\n\
    \nFigure 2-5\n\nText with Red Foreground\n\n```\nText(\"Hello, World!\")\n.foregroundColor(.red)\n\
    ```\n\nAnd you’ll notice the UI updates in the preview.\n\nSimilarly, we can bold\
    \ our text by chaining another modifier. We may want to split these onto multiple\
    \ lines for the sake of cleanliness (Figure [2-6](#497312_1_En_2_Chapter.xhtml#Fig6)).\n\
    \n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig6_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig6_HTML.jpg)\n\
    \nFigure 2-6\n\nText with Bold, Red Foreground\n\n```\nText(\"Hello, World!\"\
    )\n.foregroundColor(.red)\n.bold()\n```\n\nAs you can imagine, there are many\
    \ visual variations you can have on a given UI item. That translates to a lot\
    \ of modifiers with many parameters. It’s a lot to learn and remember."
  raw: '# 2. Take It Easy


    In this chapter, we’ll ease into SwiftUI by seeing it in action. If it feels slow,
    good! The beginning is the only time to lay a foundation and that needs to be
    solid. Rock solid. Like math, a spoken language, or many other skills, if we don’t
    get this down now, we’ll be lost later.


    ## Code + UI


    If you’ve done UI development in Xcode in the past, you know that combining the
    UI design and code is possible. However, they aren’t hot swappable. You don’t
    change a background color to red in the code and then open Interface Builder and
    see that change. At least, now without some special coding.


    With SwiftUI, you can think of the code and the UI as one thing. Effectively,
    it is. In the past, the UI was translated into XML. That wasn’t very readable
    nor easy to edit correctly. Now the UI is generated from the SwiftUI code. As
    you make changes to the code, the preview is updated to show the changes.


    Moreover, if you modify the UI in the preview canvas, it updates the code. Let’s
    look at an example starting with a new project.


    YOUR FIRST SWIFTUI APP


    We’re going to start by creating a project from a template, analyzing what’s created,
    and changing the UI for our purposes.


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig1_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Create New Project Option in Xcode


    1.  Open Xcode and start a new project (Figure [2-1](#497312_1_En_2_Chapter.xhtml#Fig1)).


    If Xcode is already running, select File ➤ New… ➤ Project (⇧⌘N).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig2_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    iOS App Template


    1.  Select the iOS App template and click Next (Figure [2-2](#497312_1_En_2_Chapter.xhtml#Fig2)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig3_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Project Options


    1.  Set your product name and other details including the Language (Swift), User
    Interface (SwiftUI), and Life Cycle (SwiftUI App) (Figure [2-3](#497312_1_En_2_Chapter.xhtml#Fig3)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig4_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    Resume Automatic Preview


    1.  When your project is created, preview updating may be paused. If so, click
    the Resume button (Figure [2-4](#497312_1_En_2_Chapter.xhtml#Fig4)).


    Once the preview updates, ytou’ll see your first SwiftUI. Congrats. No one is
    more proud of you than me.


    ## Hello SwiftUI


    Of course, this is the typical “Hello World” example. Let’s look just briefly
    at what we have line by line.


    We’re importing SwiftUI on line 9\. That’s new. That’s where the various SwiftUI
    items are defined obviously.


    On line 11 is the first line of code for our new app. We have a struct called
    ContentView which implements a protocol named View. We can see the definition
    of view with ⌃⌘ + click “View.”


    So anything implementing View needs to have a property called “body.” That property
    must have a getter that returns the type specified by the associatedtype of the
    Body: something that implements View.


    Back in our code, we see that ContentView implements View. The return type is
    “some View,” and the body of that computed body property is a Text.


    Note


    We’ll get into the “some View” and opaque types later. For now, just know that
    whatever is returned from our body computed property must implement View.


    You’ve probably already guessed that Text is like a label. We create it with a
    String, and there it is on the UI.


    ## Modifiers


    As with other methods of UI development, SwiftUI elements can be modified. Text
    has modifiers like font, color, alignment, and so on.


    We can add a modifier to our Text element to make the font red like this (Figure
    [2-5](#497312_1_En_2_Chapter.xhtml#Fig5)):


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig5_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig5_HTML.jpg)


    Figure 2-5


    Text with Red Foreground


    ```

    Text("Hello, World!")

    .foregroundColor(.red)

    ```


    And you’ll notice the UI updates in the preview.


    Similarly, we can bold our text by chaining another modifier. We may want to split
    these onto multiple lines for the sake of cleanliness (Figure [2-6](#497312_1_En_2_Chapter.xhtml#Fig6)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig6_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig6_HTML.jpg)


    Figure 2-6


    Text with Bold, Red Foreground


    ```

    Text("Hello, World!")

    .foregroundColor(.red)

    .bold()

    ```


    As you can imagine, there are many visual variations you can have on a given UI
    item. That translates to a lot of modifiers with many parameters. It’s a lot to
    learn and remember.'
  trans: "\n# 2\\. 放轻松\n\n本章我们将通过实际操作来轻松入门 SwiftUI。如果觉得节奏慢，那很好！打好基础的最佳时机就是刚开始的时候，而且基础必须扎实——坚如磐石。就像数学、口语或其他许多技能一样，如果现在不打好基础，后面就会迷失方向。\n\
    \n## 代码 + 界面\n\n如果你过去曾在 Xcode 中进行过界面开发，你就会知道将界面设计与代码结合起来是可行的。然而，它们并不能热替换。你无法在代码中将背景颜色改为红色，然后打开\
    \ Interface Builder 就看到那个变化。至少，在没有特殊编码的情况下不行。\n\n使用 SwiftUI，你可以将代码和界面视为一体。实际上，它们就是一体。过去，界面会被转换成\
    \ XML，这种格式既不易读，也难以正确编辑。现在，界面是由 SwiftUI 代码生成的。当你修改代码时，预览会同步更新以显示更改。\n\n此外，如果你在预览画布中修改界面，代码也会同步更新。让我们从一个新项目开始，来看一个例子。\n\
    \n## 你的第一个 SwiftUI 应用\n\n我们将从模板创建一个项目开始，分析创建的内容，然后根据自己的需求更改界面。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig1_HTML.jpg](img/497312_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1\n\n在 Xcode 中创建新项目选项\n\n1.  打开 Xcode 并开始一个新项目（图 2-1）。\n\n如果 Xcode 已经在运行，请选择\
    \ `File ➤ New… ➤ Project`（`⇧⌘N`）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig2_HTML.jpg](img/497312_1_En_2_Fig2_HTML.jpg)\n\
    \n图 2-2\n\niOS App 模板\n\n1.  选择 iOS App 模板，然后点击 Next（图 2-2）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig3_HTML.jpg](img/497312_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3\n\n项目选项\n\n1.  设置你的产品名称和其他详细信息，包括语言（`Swift`）、用户界面（`SwiftUI`）和生命周期（`SwiftUI\
    \ App`）（图 2-3）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig4_HTML.jpg](img/497312_1_En_2_Fig4_HTML.jpg)\n\
    \n图 2-4\n\n恢复自动预览\n\n1.  项目创建后，预览更新可能会暂停。如果是这样，请点击 Resume 按钮（图 2-4）。\n\n预览更新后，你将看到你的第一个\
    \ SwiftUI 应用。恭喜。没人比我更以你为傲。\n\n## 你好，SwiftUI\n\n当然，这是典型的“Hello World”示例。让我们简单逐行看一下我们得到了什么。\n\
    \n我们在第 9 行导入了 `SwiftUI`。这是新内容。显然，各种 SwiftUI 组件都在此定义。\n\n第 11 行是我们新应用的第一行代码。我们有一个名为\
    \ `ContentView` 的结构体，它实现了一个名为 `View` 的协议。我们可以通过 `⌃⌘ + 点击 \"View\"` 来查看该协议的定义。\n\
    \n所以，任何实现 `View` 的类型都需要有一个名为 `body` 的属性。该属性必须有一个 getter，其返回类型由 `Body` 的关联类型指定：即某种实现了\
    \ `View` 的类型。\n\n回到代码中，我们看到 `ContentView` 实现了 `View`。返回类型是 `some View`，而这个计算属性\
    \ `body` 的主体是一个 `Text`。\n\n> **注意**  \n> 我们将在后面深入讲解 `some View` 和不透明类型。现在，只需知道从我们的\
    \ `body` 计算属性返回的任何内容都必须实现 `View`。\n\n你可能已经猜到 `Text` 类似于一个标签。我们用一个 `String` 来创建它，然后它就会显示在界面上。\n\
    \n## 修饰符\n\n与其他界面开发方法一样，SwiftUI 元素可以被修饰。`Text` 拥有诸如字体、颜色、对齐等修饰符。\n\n我们可以为 `Text`\
    \ 元素添加一个修饰符来将字体变成红色，如下所示（图 2-5）：\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig5_HTML.jpg](img/497312_1_En_2_Fig5_HTML.jpg)\n\
    \n图 2-5\n\n带有红色前景色的 Text\n\n```\nText(\"Hello, World!\")\n.foregroundColor(.red)\n\
    ```\n\n你会注意到预览中的界面同步更新了。\n\n类似地，我们可以通过链式调用另一个修饰符来将文本加粗。为了代码整洁，我们可能希望将它们分成多行（图\
    \ 2-6）。\n\n![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig6_HTML.jpg](img/497312_1_En_2_Fig6_HTML.jpg)\n\
    \n图 2-6\n\n带有加粗、红色前景色的 Text\n\n```\nText(\"Hello, World!\")\n.foregroundColor(.red)\n\
    .bold()\n```\n\n可想而知，你可以在给定的界面元素上实现多种视觉变化。这意味着有大量的修饰符以及许多参数。这需要学习和记忆的内容非常多。\n"
- fmt: '# SwiftUI Inspector


    Fortunately, you don’t have to remember all of the modifiers. Xcode is here to
    help!


    If you `⌘` + click the `Text` item, you’ll see a pop-up menu. From that, select
    “Show SwiftUI Inspector…” (Figure [2-7](#497312_1_En_2_Chapter.xhtml#Fig7)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig7_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig7_HTML.jpg)


    Figure 2-7


    SwiftUI Inspector Menu Item


    > **Note:** You can alternatively `⌃⌥` + click the `Text` and go right to the
    SwiftUI Inspector.


    Once the SwiftUI Inspector is displayed, we see that there are a variety of attributes
    we can set with modifiers.


    Not only that, but we can add modifiers with the drop-down at the bottom (Figure
    [2-8](#497312_1_En_2_Chapter.xhtml#Fig8)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig8_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig8_HTML.jpg)


    Figure 2-8


    SwiftUI Inspector


    As you make selections on these controls for the modifiers, your code is updated
    to reflect the choices you make.


    Note the empty section titled Bold. That’s there because we manually put in that
    modifier, but there are no settings for it.


    The better way to bold the text would be through modifiers in the Font section
    of the inspector.


    Exercise time!


    **MODIFY WITH MODIFIERS**


    In this exercise, I want you to use modifiers in the SwiftUI Inspector to get
    your “Hello World” text to match the following example. Give it a shot on your
    own before reviewing the steps. Also, remove the `.bold()` line of code to have
    a better starting place.


    ```

    Text("Hello, World!")

    .foregroundColor(Color.red)

    ```


    Here’s what I want your text to look like by only using the SwiftUI Inspector
    (Figure [2-9](#497312_1_En_2_Chapter.xhtml#Fig9)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig9_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig9_HTML.jpg)


    Figure 2-9


    Updated UI Preview


    You can easily see several things have changed:


    1.  Text (`“Hello, SwiftUI!”`)

    2.  Font color

    3.  Font size

    4.  Font weight

    5.  Spacing of the words

    6.  Size of the `Text`

    7.  Background color

    8.  Corner radius


    Feel free to play around with the various modifiers and settings of their values.
    Practice with these types of things will make you more comfortable and natural
    in making these changes.


    Ideally, you’ll get to where you don’t have to stop, think, wonder, and search
    for the right settings.


    Here’s the resulting settings in the SwiftUI Inspector I used to get the `Text`
    item the way I wanted it:


    I made three changes in the Font area: the font itself, the weight, and the color.


    I changed the padding to 30 (you can edit the number directly by clicking it).


    I also changed the frame’s width and height manually to 200 and 400, respectively.


    I used the Add Modifier drop-down list to add two other modifiers: Background
    and Corner Radius. Once added, I was able to set their values.


    Here’s what the code looks like after these changes:


    ```

    Text("Hello, SwiftUI!")

    .font(.largeTitle)

    .fontWeight(.bold)

    .foregroundColor(Color.purple)

    .padding(30.0)

    .frame(width: 200.0, height: 400.0)

    .background(Color.orange)

    .cornerRadius(40.0)

    ```


    Again, please get comfortable using these controls and associating the changes
    with the code and UI. Next, we’ll look at some other ways to do these tasks.


    ## Attributes Inspector


    You can `⌃⌥` + click the UI item like you can on the `Text` in the code. However,
    the SwiftUI Inspector may not look the same.


    Notice, in this case, there’s only a couple of options available in the pop-up
    (Figure [2-10](#497312_1_En_2_Chapter.xhtml#Fig10)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig10_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Pop-up Menu in the Canvas


    To see all of the same modifiers you saw before, the Attributes Inspector is a
    reliable option.


    **ATTRIBUTES INSPECTOR**


    In this exercise, we’ll see that the same modifiers can be accessed via the visual
    UI design in the Canvas. However, there’s no need to shift your mind from “working
    in code” to “working in the UI.” They are the same. The code is the UI.


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig11_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Inspector Pane Button


    1.  Open the Inspector Pane (on the right) with this button on the top right of
    the Xcode window (Figure [2-11](#497312_1_En_2_Chapter.xhtml#Fig11)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig12_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Attributes Inspector Tab


    1.  Select the Attributes Inspector at the top of the Inspector Pane (Figure [2-12](#497312_1_En_2_Chapter.xhtml#Fig12)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig13_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Attributes Inspector


    1.  Click the “Hello, SwiftUI!” `Text` item in the UI or in the code to have the
    attributes show up in the Attributes Inspector (Figure [2-13](#497312_1_En_2_Chapter.xhtml#Fig13)).


    If not all of the modifiers show up, click the item in the code.


    Notice that the values are the same as before. Also, the Add Modifier drop-down
    list is available.


    From here, you can make the same choice and changes.


    1.  Change the background color, text, and other settings and verify the changes
    in the UI and code.


    You probably see that there are various ways to do the same things. You can edit
    code, make changes in the SwiftUI Inspector and in the Attributes Inspector.


    And hopefully you’re thinking of the code and the UI as one thing: ideally that
    the code *is* the UI.


    ## Stacks of Stacks


    A screen in an app with only one element isn’t much of a user interface. Nor is
    it common. But there’s only one element returned from the computed `body` property.
    What are we to do?


    Most of the time, the one item we return will contain many other items. So it’s
    a container of other items. And as we’ll see, it’s often a container of containers
    of items and so on.


    Two common containers we’ll see are horizontal stacks (`HStack`) and vertical
    stacks (`VStack`).


    Horizontal stacks stack horizontally. You can probably guess that vertical stacks
    stack vertically. If you’re familiar with the stack view from Interface Builder,
    you’re probably already where I’m going.


    One easy way to embed an item into a stack is via the pop-up menu from `⌘` + click
    (see Figure [2-14](#497312_1_En_2_Chapter.xhtml#Fig14)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig14_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Context Pop-up Menu with Embed Options


    This simply wraps an item in the code with applicable `HStack` or `VStack` code.
    This is what it looks like to wrap it in a `VStack`:


    ```

    var body: some View {

    VStack {

    Text("Hello, Swift")

    .font(.largeTitle)

    .fontWeight(.bold)

    .foregroundColor(Color.blue)

    .padding(30.0)

    .frame(width: 200.0, height: 400.0)

    .background(Color.green)

    .cornerRadius(40.0)

    }

    }

    ```


    You shouldn’t notice a change in the UI we had before because there’s only one
    item in the stack. The way we had the UI before with one item would put it in
    the center. The same is true for the new stack.


    However, if we add more items (e.g., another `Text` item below the current one),
    it will stack them vertically.


    If I add another `Text` item below the current one, it would look something like
    Figure [2-15](#497312_1_En_2_Chapter.xhtml#Fig15).'
