    \ [15-2](#497312_1_En_15_Chapter.xhtml#Fig2).\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig2_HTML.jpg](images/497312_1_En_15_Chapter/497312_1_En_15_Fig2_HTML.jpg)\n\
