  trans: "\n## `UIHostingController`\n\n这个新控制器已包含在对象库中。这意味着你可以轻松地将其添加到现有的 Storyboard\
    \ 中。它与其他控制器一起列在对象库中，如图 14-1 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig1_HTML.jpg](img/497312_1_En_14_Fig1_HTML.jpg)\n\
    \n图 14-1 — 对象库中的 Hosting View Controller\n\n用这个视图控制器更新 Storyboard 的方式与其他任何控制器相同。只需从对象库中将其拖放到\
    \ Interface Builder 中的 Storyboard 上即可。\n\n创建指向这个新控制器的 segue 也是一样的。只需按住 Control\
    \ 键，从按钮或表格视图拖拽到你的新视图控制器上。它就像其他任何视图控制器一样完美契合，如图 14-2 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig2_HTML.jpg](img/497312_1_En_14_Fig2_HTML.jpg)\n\
    \n图 14-2 — 从 Storyboard 中的表格单元格到 Hosting Controller 的 Segue\n\nXcode 允许你按住 Control\
    \ 键从 Storyboard 拖拽到源视图控制器的代码中。这会在 segue 触发时创建一个 `IBSegueAction`。这个 segue 动作的返回类型期望返回一个视图控制器。\n\
    \n```\n@IBSegueAction func showDetails(_ coder: NSCoder)\n-> UIViewController?\
    \ {\nreturn UIHostingController(coder: coder,\nrootView: swiftUIView)\n}\n```\n\
    \n你生成的代码的返回类型可能没有设置为 `UIViewController`。如果是这样，你需要将其改为 `UIViewController`。\n\n\
    在实现中，你需要创建一个 `UIHostingController` 的实例。你需要传入被调用函数所接收的 `coder` 参数。第二个参数是你新建的 SwiftUI\
    \ 视图。\n\n上述代码仅展示了以 SwiftUI 视图占位符创建 `UIHostingController` 的过程。具体如何实例化，取决于你设计的视图。\n\
    \n## 向 UIKit 添加 SwiftUI 视图\n\n让我们从一个基础练习开始。我们将创建一个简单的 Storyboard 应用，并添加一个 SwiftUI\
    \ 视图。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig3_HTML.jpg](img/497312_1_En_14_Fig3_HTML.jpg)\n\
    \n图 14-3 — 使用 Storyboard 界面创建新的 iOS 应用项目\n\n1.  使用 Storyboard 创建一个新的 iOS 应用模板项目，并将其命名为\
    \ `Simple14`，如图 14-3 所示。\n\n2.  从对象库中向你的初始视图控制器添加一个按钮。\n\n3.  从对象库中将一个 Hosting\
    \ View Controller 拖放到你的 Storyboard 上，位于初始视图控制器的右侧。\n\n4.  按住 Control 键，从按钮拖拽到你的\
    \ Hosting View Controller。\n\n当你在 Hosting View Controller 上释放鼠标时，在 segue 选项弹出菜单的顶部选择“显示”（Show）。\n\
    \n你的 Storyboard 中的界面应该如图 14-4 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig4_HTML.jpg](img/497312_1_En_14_Fig4_HTML.jpg)\n\
    \n图 14-4 — 从 Storyboard 中的初始视图控制器到 Hosting Controller 的 Segue\n\n接下来，我们需要在代码中创建这个\
    \ segue 动作。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig5_HTML.jpg](img/497312_1_En_14_Fig5_HTML.jpg)\n\
    \n图 14-5 — 命名 Segue 动作\n\n1.  打开辅助编辑器（编辑器 ➤ 辅助编辑器 或 ⌃⌥⌘⏎）以在右侧显示 `ViewController`\
    \ 代码。\n\n2.  按住 Control 键，从 segue 拖拽到 `ViewController` 代码中最后一个闭合大括号（`}`）的上方，然后释放鼠标。\n\
    \n3.  在出现的弹出窗口中，给你的 segue 动作函数命名（例如 `showSwiftUI`），如图 14-5 所示。\n\n4.  点击“连接”（Connect）按钮并查看生成的代码。\n\
    \n至此，我们已经完成了 Storyboard 的操作，可以将其关闭。接下来，我们需要创建 SwiftUI 视图，以便有内容可以显示。\n\n5.  向你的项目添加一个新文件（⌘+n）——选择“SwiftUI\
    \ 视图”（SwiftUI View）类型，然后点击“下一步”（Next）。\n\n6.  将文件命名为 `MySwiftUI`，然后点击“创建”（Create）。\n\
    \n预览不会工作，因为存在编译错误。我们的 segue 动作尚未实现。现在让我们回到 `ViewController` 类中修复它。\n\n7.  打开 `ViewController.swift`，在\
    \ `ViewController` 类声明之前导入 `SwiftUI`。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig6_HTML.jpg](img/497312_1_En_14_Fig6_HTML.jpg)\n\
    \n图 14-6 — 模拟器中显示的 `MySwiftUIView`\n\n8.  实现 `showSwiftUI` 函数，使其返回一个 `UIHostingController`\
    \ 实例。传入 coder 和你新建的 `MySwiftUI` 结构体的实例。\n\n```\n    @IBSegueAction func showSwiftUI(_\
    \ coder: NSCoder)\n    -> UIViewController? {\n    return UIHostingController(coder:\
    \ coder,\n    rootView: MySwiftUI())\n    }\n```\n\n9.  运行应用并点击按钮。SwiftUI 视图应该会显示出来，如图\
    \ 14-6 所示。\n\n```\nimport SwiftUI\n```\n\n恭喜！你已经成功地将一个 SwiftUI 视图集成到了 UIKit/Storyboard\
    \ 应用中。\n\n对于一个简单的项目来说，这很容易，对吧？对于复杂的项目，流程也差不多。这实际上完全取决于你创建的 SwiftUI 视图。如果它需要交互或数据，则会有更多内容需要处理。\n\
    \n接下来，我们将探讨类似这样的实现。\n\n## 现有项目\n\n我为你提供了一个章节开始（BOC）项目：`Ch14_BOC_Timers.zip`。该项目允许用户创建计时器。一个计时器包含名称和时长。用户可以启动和暂停计时器。\n\
    \n当计时器结束时，如果用户已授权，它会弹出一个本地通知。\n\n向右滑动可以删除计时器。而向右轻扫会显示启动/暂停按钮，如图 14-7 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig7_HTML.jpg](img/497312_1_En_14_Fig7_HTML.jpg)\n\
    \n图 14-7 — 通过向右滑动启动计时器\n\n+ 按钮允许用户创建新的计时器。该代码中包含了一些为调试构建自动创建的测试计时器。\n\n这是我们的起点。但是，我们想使用\
    \ SwiftUI 来添加界面。当用户点击列表中的某个计时器时，我们希望显示其详细信息。这个简单的详情界面将包含名称、时间以及启动/暂停按钮。\n\n此外，随着计时器秒数的流逝，界面应该实时更新。\n"
- fmt: "# Adding SwiftUI\n\nAs we did in the previous exercise, we need to add a Hosting\
    \ View Controller to our Storyboard. Then we create the segue action into the\
    \ code: `TimerListVC`. In this case, we’ll do it from the table view cell.\n\n\
    Again, as in the last exercise, that’s all we’ll do in the Storyboard.\n\nThe\
    \ segue action function generated needs a `UIViewController` returned. Once again,\
    \ like before, we’ll create an instance of our SwiftUI view. That and the code\
    \ passed in will be used to create the Hosting View Controller to return. So we\
    \ need a SwiftUI view to create!\n\nWe’ve seen before how our `View` struct gets\
    \ a member-wise initializer. In the case of the Timers project, that will include\
    \ the `TimerItem` for the details to display.\n\nThe two nonobvious parts are\
    \ updating the UI for the time and the button to start/pause the timer. And those\
    \ aren’t tricky at all.\n\n## Adding Timer View to UIKit\n\nOpen the provided\
    \ BOC project, `Ch14_BOC_Timers.zip`, and navigate to the Storyboard.\n\n1. Add\
    \ a Hosting View Controller to the Storyboard from the Object Library.\n\n2. Control-drag\
    \ from the table view cell to the new Hosting View Controller, release, and select\
    \ Show from the pop-up menu.\n\nYour Storyboard should look like Figure 14-8.\n\
    \n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig8_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig8_HTML.jpg)\n\
    \nFigure 14-8: Storyboard with Hosting View Controller and Segue\n\n3. Open the\
    \ Assistant (Editor ➤ Assistant or ⌃⌥⌘⏎).\n\n4. Control-drag from the segue into\
    \ the `TimerListVC.swift` code (below the `makeTimer` function), release, and\
    \ name the function `timerDetails`.\n\nNow we need to create our `TimerView` to\
    \ display our timer details.\n\n5. Add a new SwiftUI View file to your project\
    \ named `TimerView.swift`.\n\nWe’ll replace the `body` property contents with\
    \ the Timer details. Of course, we need a `TimerItem` for the details.\n\n6. Add\
    \ the `TimerItem` property and body contents.\n\n```\nstruct TimerView: View {\n\
    \    var timer : TimerItem\n    var body: some View {\n        VStack {\n    \
    \        Text(timer.name)\n            Text(timer.timeString)\n        }\n   \
    \ }\n}\n```\n\n7. Update the `TimerView_Previews` to pass in a `TimerItem`.\n\n\
    ```\nstruct TimerView_Previews: PreviewProvider {\n    static var timer = TimerItem(name:\
    \ \"Test Timer\",\n        seconds: 12)\n    static var previews: some View {\n\
    \        TimerView(timer: timer)\n    }\n}\n```\n\nThe preview won’t display because\
    \ we have an error back where we need to create the `UIHostingController` in `TimerListVC.swift`.\n\
    \nNow we can create this in our segue action back in `TimerListVC` and display\
    \ it.\n\nThis segue is called when the user selects a row in the table view. That\
    \ means we can get that row number from the table view.\n\n8. Create a `let` to\
    \ store the `TimerItem` from the array and assign it using the selected row.\n\
    \n9. Create the `TimerView` instance using the timer from the array.\n\n```\n\
    @IBSegueAction func timerDetails(_ coder: NSCoder)\n    -> UIViewController? {\n\
    \    let timer =\n        timers[tableView.indexPathForSelectedRow!.row]\n}\n\
    ```\n\n10. Return the `UIHostingController` instance created with the `coder`\
    \ and `tView` created (the whole function is as follows).\n\n```\n@IBSegueAction\
    \ func timerDetails(_ coder: NSCoder)\n    -> UIViewController? {\n    let timer\
    \ =\n        timers[tableView.indexPathForSelectedRow!.row]\n    let tView = TimerView(timer:\
    \ timer)\n    return UIHostingController(coder: coder,\n        rootView: tView)\n\
    }\n```\n\nNow that we’ve added the `UIHostingController` code, we need SwiftUI.\
    \ So we need to import SwiftUI.\n\n11. Uncomment out the SwiftUI import at the\
    \ top of the file.\n\n```\nlet tView = TimerView(timer: timer)\n```\n\nRunning\
    \ the app now displays the details when a row is tapped. The UI is very basic\
    \ (see Figure 14-9), but that’s what we designed.\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig9_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig9_HTML.jpg)\n\
    \nFigure 14-9: `MySwiftUIView` in the Simulator\n\nThat was easy, right? We just\
    \ added the Hosting View Controller and created the segue action for our Storyboard.\
    \ We designed a simple SwiftUI View, created it with a timer, and returned the\
    \ `UIHostingController`."
