    centered in the device in the preview. That’s basically what we’ve been seeing
    all along. If you drill into .previewDevice, you can see a list of the supported
    devices such as


    ```

    /// "iPhone 7"

    /// "iPhone 7 Plus"

    /// "iPhone 8"

    /// "iPhone 8 Plus"

    /// "iPhone SE"

    /// "iPhone X"

    /// "iPhone Xs"

    /// "iPhone Xs Max"

    /// "iPhone Xʀ"

    /// "iPad mini 4"

    /// "iPad Air 2"

    /// "iPad Pro (9.7-inch)"

    ```


    The fixed option takes a width and height. This is great for specifying a concrete
    width and height for your item. If you know the element you’re designing will
    be a fixed size, this is how you can preview it just as it will be.


    If I put in a width of 200 and height of 80, my NoteRow will look like Figure
    [8-6](#497312_1_En_8_Chapter.xhtml#Fig6).


    ![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig6_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig6_HTML.jpg)


    Figure 8-6


