    \ bindings for the specific values we care about: image strings and time string.\n\
    \n7.  Within the `PriorityStarButtons` class, declare a new class for the coordinator.\
    \ Include the two binding properties also.\n\n8.  Create an initializer for the\
    \ `Coordinator` class that takes the two values to be stored in the property bindings.\n\
    \n```\nclass Coordinator : NSObject {\n    var images : Binding<[String]>\n  \
