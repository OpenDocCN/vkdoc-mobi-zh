    \ such as tryMap, tryFilter, tryReduce, and more.\n\nSome operators may be new\
    \ to you like sink, zip, combineLatest, and merge. I hope you check them all out!\n\
    \n# 17. Transitions and Animation\n\nOften, when I’m teaching iOS development\
    \ in person, we discuss various ways to animate the UI. There are plenty of ways\
    \ and options in animation. However, most of the time, we really aren’t trying\
    \ to do something too complex.\n\nI primarily develop for clients who need something\
    \ for their business. It might be a customer-facing app, a companion to their\
