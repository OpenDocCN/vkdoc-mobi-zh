  trans: "\n# 分配订阅者\n\nCombine 提供的第二个订阅者是 `assign`。`Assign` 接受两个参数。第一个是某个属性的键路径，第二个是拥有该键路径的实例。\n\
    \n在我们项目中，键路径指向 `UILabel` 的文本元素。当然，第二个参数就是该标签本身。我们可以使用 `assign` 代替 `sink`，将值赋给属性。\n\
    \n```\n.assign(to: \\.userText, on: self)\n```\n\n现在我们的订阅者接收到发布的值，并将其赋给 `userText`\
    \ 属性。但有一个问题：我们发布的值是一个通知，而不是 `String`。\n\n要获取 `String` 值，我们必须从通知中提取对象。这个对象是 `UITextField`，从中我们可以获得文本。因此我们需要一个中间步骤。\n\
    \n## 操作符\n\n幸运的是，Combine 中的 `Publisher` 拥有大量操作符。如果你熟悉标准的高阶函数，你会感到得心应手。\n\n`Publisher`\
    \ 提供了许多操作符，如 `map`、`flatMap`、`reduce`、`contains` 等。你可以在 Apple 关于 `Publisher` 的文档（[`developer.apple.com/documentation/combine/publisher`](https://developer.apple.com/documentation/combine/publisher)）中看到一长串列表。\n\
    \n在我们的发布者上，我们可以添加一个 `map` 来深入 `Notification` 内部，获取所需内容。\n\n```\n.map { notif in\n\
    \  guard let tf = notif.object as? UITextField\n  else { return \"\" }\n  return\
    \ tf.text ?? \"\"\n}\n.assign(to: \\.userText, on: self)\n```\n\n现在当值被发布时，我们可以通过\
    \ `guard` 语句绑定文本字段，然后返回文本字段的值。由于我们的 `userText` 属性是可选类型，我们只需返回 `UITextField` 的文本。\n\
    \n`map` 返回 `Publisher`，因此它适合链式调用。但与具有闭包的 `sink` 不同，我们仅对 `userText` 进行赋值，标签并不会被更新。\n\
    \n`assign` 返回一个订阅者，因此我们无法为标签添加第二个 `assign` 调用。这正好引出另一个发布者示例的绝佳机会。\n\n## @Published\
    \ 属性包装器\n\n我们已经在 SwiftUI 中使用过 `@Published` 属性包装器。不过，它也是 Combine 框架的一部分，因此我们也可以在此处使用。\n\
    \n这个属性包装器为任何属性添加了一个发布者！所以我们将创建第二个发布者和第二个订阅者。\n\n1. 为 `userText` 属性添加 `@Published`\
    \ 属性包装器。同时为其设置默认值，避免其为 `nil`。\n2. 添加另一个订阅者属性，类型为 `AnyCancellable` 可选值。\n\n```\n\
    @Published var userText : String? = \"\"\n```\n\n```\nvar subscriber2 : AnyCancellable?\n\
    ```\n\n现在，我们需要使用该发布者并对其进行订阅。我们将再次使用 `assign`。它将创建一个订阅者，将 `userText` 属性中的值赋给标签。\n\
    \n3. 在 `viewDidLoad` 中创建发布者和订阅者。\n\n```\nsubscriber2 = $userText\n  .assign(to:\
    \ \\.text, on: lbl)\n```\n\n就是这样！`$` 让我们能访问被包装的发布者。然后我们通过 `.assign` 指定键路径和对象来创建订阅者。\n\
    \n在这种情况下，发布的值是 `String` 可选类型，而这正是 `UILabel` 的 `text` 属性原本的类型。\n\n功能已恢复至我们使用 `sink`\
    \ 时的状态。根据代码不同，某一种方式可能比另一种更有意义。\n\n## 章节总结\n\n我们在此介绍了 Combine 框架中的一些重要概念。`Publisher`\
    \ 发布更新后的值，`Subscriber` 接收更新后的值。再次回到 Apple 对 Combine 的描述：我们正在“随时间处理值”。\n\n`Publisher`\
    \ 有输出，`Subscriber` 有输入，两者的类型必须匹配。它们还定义了 `Failure` 类型，也必须匹配。我们在 `ViewController`\
    \ 中实现了 `Subscriber` 并使其类型匹配。同时，我们还学习了 `sink` 和 `assign`，它们会自动匹配所创建的订阅者中的类型。\n\n\
    你需要保留对以 `AnyCancellable` 形式创建的订阅者的引用。这样可以在需要时取消订阅，同时也可避免手动清理订阅。`AnyCancellable`\
    \ 会在其 `deinit` 方法中自动为你处理。\n\n我们还看到 `Publisher` 支持多种操作符，如 `map`、`reduce` 等。它们返回相同的发布者，因此可以在创建订阅者之前进行链式调用。当需要将更新后的值转换为特定形式时，操作符尤其有用。\n\
    \n`@Published` 属性包装器为任何属性添加了发布者。要访问它，请在属性前使用 `$` 并继续调用。你可以像对待其他发布者一样添加操作符并进行订阅。\n\
    \n这些概念已经帮助我们在 SwiftUI 中进行了开发。但希望你也认同，这些概念在任何项目中都很有用。\n\n# 16. URLSession 发布者\n\
    \n虽然这不是一本关于 Combine 的书，但我确实想再介绍框架中的一些内容。希望本章能让你了解如何使用 Combine。同时，我也希望你能看到一条更直接的学习路径，以更好地掌握这个强大的框架。\n\
    \n在本章中，我们将讨论数据获取。我们将为此使用发布者和订阅者，从服务器获取数据，并更新 UI。为了测试/预览，我们也会从文件中加载数据。\n\n## URLSession\
    \ 发布者\n\n如果你以前用过 `URLSession`，你会熟悉创建数据任务。`URLSession` 也提供了一个数据任务发布者。它接受一个 `URL`\
    \ 作为参数，并返回发布者。\n\n我们已经见过这在 `NotificationCenter` 和 `@Published` 包装属性中的工作方式。从这个意义上说，概念并不新鲜，但现在我们处理的是返回的数据。在我们的案例中，数据将代表\
    \ JSON。\n\n解码 JSON 时可能会发生错误，因此我们也必须处理这些错误。\n\n我提供了一个 `Ch16_BOC_StatusTracker.zip`\
    \ 项目作为本章的起点。让我们看看代码。\n"
- fmt: "# Status Tracker Project\n\nWe're going to be loading user status data in\
    \ JSON. There are three fields in the JSON: `id`, `username`, and `status`. Status\
    \ can be one of three values: `offline`, `paused`, and `live`.\n\nWe want to be\
    \ able to display the items in a list. We also want to be able to filter by the\
    \ status value. The UI will look like Figure [16-1](#497312_1_En_16_Chapter.xhtml#Fig1).\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig1_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1  \nStatus Tracker App UI Design\n\nThe usernames will be listed\
    \ along with their associated status. The status options are listed at the top\
    \ in a `Picker` (similar to a UIKit `Segmented Control`).\n\nFor the status value,\
    \ we have an enumeration. The model for the data is a `UserStatus` struct. Both\
    \ of these conform to `Codable` as you can see in Figure [16-2](#497312_1_En_16_Chapter.xhtml#Fig2).\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig2_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2  \nModel Code\n\nNotice that at the top, we import `Combine`. That\
    \ isn't used yet, but we know we're heading that way.\n\nThe underlying type for\
    \ the `Status` is an `Int`. This can help in a few ways. We can create the `Status`\
    \ value based on the selected index of the `Picker`. Also, we can store ints in\
    \ our JSON instead of passing strings.\n\n`Status` also conforms to `Codable`\
    \ and `CaseIterable`. `CaseIterable` allows us to access the `allCases` array\
    \ of the values. Accessing `allCases` helps iterating over the values or getting\
    \ the total. I created a `totalNum` computed property to know how many values\
    \ we have.\n\nNotice there is an \"all\" value in the enum. This should only be\
    \ used for the filtering.\n\nThe `description` property converts the values to\
    \ a `String`.\n\nThis is just one option for implementing the `Status` enum. I\
    \ find it to be clear, useful, and maintainable.\n\nThe `UserStatus` struct has\
    \ the three values matching the keys in JSON that you can see in Figure [16-3](#497312_1_En_16_Chapter.xhtml#Fig3).\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig3_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3  \nJSON Data\n\nA similar file is included in the project for test\
    \ data. We'll load it from there but also from the server.\n\n# Status Tracker\
    \ UI\n\nThe UI for the status tracker uses some elements we're familiar with and\
    \ a new one: `Picker`. The elements are in a `VStack` with a `Text` element first.\n\
    \nThe second element in the `VStack` is the `Picker`. The `Picker` takes a `StringProtocol`,\
    \ a selection item to store the selection, and the items for selection.\n\nWe\
    \ also need to specify a style for the picker. Without setting the style, it defaults\
    \ to `WheelPickerStyle` which is like a `Picker View` in UIKit. We want a segmented\
    \ picker style.\n\nFinally, we have our list. It will loop over the status items\
    \ with a `.filter` to find only the items we're interested in based on the selection\
    \ in the `Picker`. Then it creates an `HStack` and two text items for each status\
    \ array element. The `ContentView` code is in Figure [16-4](#497312_1_En_16_Chapter.xhtml#Fig4).\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig4_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig4_HTML.jpg)\n\
    \nFigure 16-4  \nContentView Code\n\nNotice that the `filterIndex` has a `@State`\
    \ property wrapper, and the `Picker` uses this binding. When the user changes\
    \ the `Picker` selection, this `Int` will be updated.\n\nThe `filterStatus` property\
    \ is a computed property based on the user's filter selection. It's mostly just\
    \ for easy checking in the `.filter` call for the list of users.\n\nThe preview\
    \ code is unchanged from the generated code.\n\n# Model Manager\n\nThe first property\
    \ in our `ContentView` is a `UserStatusMgr` instance. It uses a singleton defined\
    \ in that class. The only place it's used is in the `ForEach` for our `List` item.\n\
    \nIf we just looped over the `mgr.userStatus` property, it would list all the\
    \ items. But we want to match the user's selected filter. We loop through the\
    \ items in a `.filter` and include them if the status matches or if the user selected\
    \ \"All\" in the picker.\n\nThe current `UserStatusMgr` code is just a couple\
    \ of properties.\n\n```\nclass UserStatusMgr {\n    static let instance = UserStatusMgr()\n\
    \    var userStatus = [UserStatus]()\n}\n```\n\nIt has the singleton property\
    \ and the array for `UserStatus` items. We need to add the code to load the data\
    \ from the server.\n\n## Fetching Data with a Publisher\n\nWe want to publish\
    \ the `userStatus` property for updating the UI. So we have to add the `ObservableObject`\
    \ protocol to the class and mark the property with `@Published`. Then we can set\
    \ the class to be an `ObservedObject` in our UI.\n\nWe also need to fetch the\
    \ data from the server. Then we can parse it and update the `userStatus` property\
    \ to get published.\n\n1. Declare the `UserStatusMgr` class as conforming to the\
    \ `ObservableObject` protocol.\n\n1. Add the `@Published` wrapper to the `userStatus`\
    \ property.\n\n```\nclass UserStatusMgr : ObservableObject {\n```\n\n1. Create\
    \ a private `init` for the singleton that calls the update function for the status\
    \ data (to be written next).\n\n```\n    private init() {\n        updateStatusData()\n\
    \    }\n```\n\n1. Create a function named `updateStatusData` that creates the\
    \ `URL` instance.\n\n```\n    func updateStatusData() {\n        guard let url\
    \ = URL(string: \"https://brainwashinc.com/Status.json\")\n        else { return\
    \ }\n    }\n```\n\n1. After the `guard` in the preceding `updateStatusData` function,\
    \ create the `URLSession` publisher.\n\n```\n    URLSession.shared\n        .dataTaskPublisher(for:\
    \ url)\n```\n\nThe publisher for a `URLSession` data task publisher defines its\
    \ output and failure. The output is a tuple of `Data` and `URLResponse`. The names\
    \ are `data` and `response`, respectively. The failure is a `URLError`.\n\nIn\
    \ this case, we just want to get the data, but that's just part of the tuple.\
    \ We can use `.map` to massage the data a bit.\n\n1. Add `.map` to the publisher\
    \ to convert the response tuple to just the data item.\n\n```\n    URLSession.shared\n\
    \        .dataTaskPublisher(for: url)\n        .map { $0.data }\n```\n\n```\n\
    @Published var userStatus = [UserStatus]()\n```\n\nThe result of the `map` is\
    \ a publisher that just passes the `Data` item downstream. We want to decode that\
    \ `Data` since it's JSON. Since this is such a common action, Combine provides\
    \ a `.decode` operator.\n\n1. Add the `.decode` operator after `.map`.\n\n```\n\
    URLSession.shared\n    .dataTaskPublisher(for: url)\n    .map { $0.data }\n  \
    \  .decode(type: [UserStatus].self,\n            decoder: JSONDecoder())\n```\n\
    \nThe `decode` returns a publisher that passes a `Decodable` downstream, which\
    \ is great. But it also has a `Failure` of `Error`. Since JSON parsing may not\
    \ work, we have to deal with this case.\n\nThere are various ways to handle this.\
    \ We'll look at a simple one here. Using `.sink` is another useful option I encourage\
    \ you to look into.\n\n1. Add the `.replaceError` after the decode.\n\n```\nURLSession.shared\n\
    \    .dataTaskPublisher(for: url)\n    .map { $0.data }\n    .decode(type: [UserStatus].self,\n\
    \            decoder: JSONDecoder())\n    .replaceError(with: self.userStatus)\n\
    ```\n\nNow if the `JSONDecoder` has an error, we just continue on with the current\
    \ value of `self.userStatus`. This still returns a publisher so we need to move\
    \ on to the subscriber.\n\n1. Add `.receive` to publish on the main thread.\n\n\
    ```\n    URLSession.shared\n        .dataTaskPublisher(for: url)\n        .map\
    \ { $0.data }\n        .decode(type: [UserStatus].self,\n                decoder:\
    \ JSONDecoder())\n        .replaceError(with: self.userStatus)\n        .receive(on:\
    \ DispatchQueue.main)\n```\n\nNow we're at the end of the publisher chain and\
    \ need to create the subscription.\n\n1. Create an `AnyCancellable` named `subscriber`\
    \ as a property of the `UserStatusMgr` class."
  raw: "## Status Tracker Project\n\nWe’re going to be loading user status data in\
    \ JSON. There are three fields in the JSON: id, username, and status. Status can\
    \ be one of three values: offline, paused, and live.\n\nWe want to be able to\
    \ display the items in a list. We also want to be able to filter by the status\
    \ value. The UI will look like Figure [16-1](#497312_1_En_16_Chapter.xhtml#Fig1).\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig1_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1\n\nStatus Tracker App UI Design\n\nThe usernames will be listed\
    \ along with their associated status. The status options are listed at the top\
    \ in a Picker (similar to a UIKit Segmented Control).\n\nFor the status value,\
    \ we have an enumeration. The model for the data is a UserStatus struct. Both\
    \ of these conform to Codable as you can see in Figure [16-2](#497312_1_En_16_Chapter.xhtml#Fig2).\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig2_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2\n\nModel Code\n\nNotice that at the top, we import Combine. That\
    \ isn’t used yet, but we know we’re heading that way.\n\nThe underlying type for\
    \ the Status is an Int. This can help in a few ways. We can create the Status\
    \ value based on the selected index of the Picker. Also, we can store ints in\
    \ our JSON instead of passing strings.\n\nStatus also conforms to Codable and\
    \ CaseIterable. CaseIterable allows us to access the allCases array of the values.\
    \ Accessing allCases helps iterating over the values or getting the total. I created\
    \ a totalNum computed property to know how many values we have.\n\nNotice there\
    \ is an “all” value in the enum. This should only be used for the filtering.\n\
    \nThe description property converts the values to a String.\n\nThis is just one\
    \ option for implementing the Status enum. I find it to be clear, useful, and\
    \ maintainable.\n\nThe UserStatus struct has the three values matching the keys\
    \ in JSON that you can see in Figure [16-3](#497312_1_En_16_Chapter.xhtml#Fig3).\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig3_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3\n\nJSON Data\n\nA similar file is included in the project for test\
    \ data. We’ll load it from there but also from the server.\n\n## Status Tracker\
    \ UI\n\nThe UI for the status tracker uses some elements we’re familiar with and\
    \ a new one: Picker. The elements are in a VStack with a Text element first.\n\
    \nThe second element in the VStack is the Picker. The Picker takes a StringProtocol,\
    \ a selection item to store the selection, and the items for selection.\n\nWe\
    \ also need to specify a style for the picker. Without setting the style, it defaults\
    \ to WheelPickerStyle which is like a Picker View in UIKit. We want a segmented\
    \ picker style.\n\nFinally, we have our list. It will loop over the status items\
    \ with a .filter to find only the items we’re interested in based on the selection\
    \ in the Picker. Then it creates an HStack and two text items for each status\
    \ array element. The ContentView code is in Figure [16-4](#497312_1_En_16_Chapter.xhtml#Fig4).\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig4_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig4_HTML.jpg)\n\
    \nFigure 16-4\n\nContentView Code\n\nNotice that the filterIndex has a @State\
    \ property wrapper, and the Picker uses this binding. When the user changes the\
    \ Picker selection, this Int will be updated.\n\nThe filterStatus property is\
    \ a computed property based on the user’s filter selection. It’s mostly just for\
    \ easy checking in the .filter call for the list of users.\n\nThe preview code\
    \ is unchanged from the generated code.\n\n## Model Manager\n\nThe first property\
    \ in our ContentView is a UserStatusMgr instance. It uses a singleton defined\
    \ in that class. The only place it’s used is in the ForEach for our List item.\n\
    \nIf we just looped over the mgr.userStatus property, it would list all the items.\
    \ But we want to match the user’s selected filter. We loop through the items in\
    \ a .filter and include them if the status matches or if the user selected “All”\
    \ in the picker.\n\nThe current UserStatusMgr code is just a couple of properties.\n\
    \n```\nclass UserStatusMgr {\nstatic let instance = UserStatusMgr()\nvar userStatus\
    \ = [UserStatus]()\n}\n```\n\nIt has the singleton property and the array for\
    \ UserStatus items. We need to add the code to load the data from the server.\n\
    \nFETCHING DATA WITH A PUBLISHER\n\nWe want to publish the userStatus property\
    \ for updating the UI. So we have to add the ObservableObject protocol to the\
    \ class and mark the property with @Published. Then we can set the class to be\
    \ an ObservedObject in our UI.\n\nWe also need to fetch the data from the server.\
    \ Then we can parse it and update the userStatus property to get published.\n\n\
    1.  Declare the UserStatusMgr class as conforming to the ObservableObject protocol.\n\
    \n1.  Add the @Published wrapper to the userStatus property.\n\n```\nclass UserStatusMgr\
    \ : ObservableObject {\n```\n\n1.  Create a private init for the singleton that\
    \ calls the update function for the status data (to be written next).\n\n```\n\
    \    private init() {\n    updateStatusData()\n    }\n    ```\n\n2.  Create a\
    \ function named updateStatus data that creates the URL instance.\n\n```\n   \
    \ func updateStatusData() {\n    guard let url =\n    URL(string:\n    \"https://brainwashinc.com/Status.json\"\
    )\n    else { return }\n    }\n    ```\n\n3.  After the guard in the preceding\
    \ updateStatusData function, create the URLSession publisher.\n\n```\n    URLSession.shared\n\
    \    .dataTaskPublisher(for: url)\n    ```\n\nThe publisher for a URLSession data\
    \ task publisher defines its output and failure. The output is a tuple of Data\
    \ and URLResponse. The names are data and response, respectively. The failure\
    \ is a URLError.\n\nIn this case, we just want to get the data, but that’s just\
    \ part of the tuple. We can use .map to massage the data a bit.\n\n4.  Add .map\
    \ to the publisher to convert the response tuple to just the data item.\n\n```\n\
    \    URLSession.shared\n    .dataTaskPublisher(for: url)\n    .map { $0.data }\n\
    \    ```\n\n```\n@Published var userStatus = [UserStatus]()\n```\n\nThe result\
    \ of the map is a publisher that just passes the Data item downstream. We want\
    \ to decode that Data since it’s JSON. Since this is such a common action, Combine\
    \ provides a .decode operator.\n\n1.  Add the .decode operator after .map.\n\n\
    ```\nURLSession.shared\n.dataTaskPublisher(for: url)\n.map { $0.data }\n.decode(type:\
    \ [UserStatus].self,\ndecoder: JSONDecoder())\n```\n\nThe decode returns a publisher\
    \ that passes a Decodable downstream, which is great. But it also has a Failure\
    \ of Error. Since JSON parsing may not work, we have to deal with this case.\n\
    \nThere are various ways to handle this. We’ll look at a simple one here. Using\
    \ .sink is another useful option I encourage you to look into.\n\n1.  Add the\
    \ .replaceError after the decode.\n\n```\nURLSession.shared\n.dataTaskPublisher(for:\
    \ url)\n.map { $0.data }\n.decode(type: [UserStatus].self,\ndecoder: JSONDecoder())\n\
    .replaceError(with: self.userStatus)\n```\n\nNow if the JSONDecoder has an error,\
    \ we just continue on with the current value of self.userStatus. This still returns\
    \ a publisher so we need to move on to the subscriber.\n\n1.  Add .receive to\
    \ publish on the main thread.\n\n```\n    URLSession.shared\n    .dataTaskPublisher(for:\
    \ url)\n    .map { $0.data }\n    .decode(type: [UserStatus].self,\n    decoder:\
    \ JSONDecoder())\n    .replaceError(with: self.userStatus)\n    .receive(on: DispatchQueue.main)\n\
    \    ```\n\nNow we’re at the end of the publisher chain and need to create the\
    \ subscription.\n\n2.  Create an AnyCancellable named subscriber as a property\
    \ of the UserStatusMgr class."
  trans: "\n# 状态跟踪器项目\n\n我们将从 JSON 加载用户状态数据。JSON 中有三个字段：`id`、`username` 和 `status`。状态可以取三个值之一：`offline`、`paused`\
    \ 和 `live`。\n\n我们希望能够在列表中显示这些项目。我们还希望能够按状态值进行过滤。UI 将如图 16-1 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig1_HTML.jpg](img/497312_1_En_16_Fig1_HTML.jpg)\n\
    \n图 16-1  \n状态跟踪器应用 UI 设计\n\n用户名将与它们关联的状态一起列出。状态选项显示在顶部的 `Picker`（类似于 UIKit 的\
    \ `Segmented Control`）中。\n\n对于状态值，我们有一个枚举。数据模型是一个 `UserStatus` 结构体。两者都遵循 `Codable`\
    \ 协议，如图 16-2 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig2_HTML.jpg](img/497312_1_En_16_Fig2_HTML.jpg)\n\
    \n图 16-2  \n模型代码\n\n请注意，顶部我们导入了 `Combine`。它目前尚未使用，但我们知道我们会朝这个方向走。\n\n`Status`\
    \ 的底层类型是 `Int`。这可以在几个方面提供帮助。我们可以根据 `Picker` 所选索引创建 `Status` 值。此外，我们可以在 JSON 中存储整数，而不是传递字符串。\n\
    \n`Status` 也遵循 `Codable` 和 `CaseIterable` 协议。`CaseIterable` 允许我们访问值的 `allCases`\
    \ 数组。访问 `allCases` 有助于遍历这些值或获取总数。我创建了一个 `totalNum` 计算属性来知道我们有多少个值。\n\n请注意枚举中有一个\
    \ \"all\" 值。它应该仅用于过滤。\n\n`description` 属性将值转换为 `String`。\n\n这只是实现 `Status` 枚举的一种方式。我发现它清晰、有用且易于维护。\n\
    \n`UserStatus` 结构体有三个值，与 JSON 中的键匹配，如图 16-3 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig3_HTML.jpg](img/497312_1_En_16_Fig3_HTML.jpg)\n\
    \n图 16-3  \nJSON 数据\n\n项目中包含一个类似文件用于测试数据。我们将从中加载数据，也会从服务器加载数据。\n\n# 状态跟踪器 UI\n\
    \n状态跟踪器的 UI 使用了一些我们已经熟悉的元素和一个新的元素：`Picker`。这些元素位于一个 `VStack` 中，首先是一个 `Text` 元素。\n\
    \n`VStack` 中的第二个元素是 `Picker`。`Picker` 接收一个 `StringProtocol`、一个用于存储选择的选择项，以及用于选择的各个项。\n\
    \n我们还需要为选择器指定一个样式。如果不设置样式，它默认为 `WheelPickerStyle`，这类似于 UIKit 中的 `Picker View`。我们需要分段选择器样式。\n\
    \n最后是我们的列表。它将使用 `.filter` 遍历状态项目，以根据 `Picker` 中的选择仅查找我们感兴趣的项目。然后它为每个状态数组元素创建一个\
    \ `HStack` 和两个文本项。`ContentView` 代码如图 16-4 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig4_HTML.jpg](img/497312_1_En_16_Fig4_HTML.jpg)\n\
    \n图 16-4  \nContentView 代码\n\n请注意，`filterIndex` 有一个 `@State` 属性包装器，而 `Picker`\
    \ 使用了这个绑定。当用户更改 `Picker` 选择时，这个 `Int` 将会更新。\n\n`filterStatus` 属性是一个基于用户筛选选择的计算属性。它主要用于在用户列表的\
    \ `.filter` 调用中轻松检查。\n\n预览代码与生成的代码相同。\n\n# 模型管理器\n\n我们的 `ContentView` 中的第一个属性是一个\
    \ `UserStatusMgr` 实例。它使用了该类中定义的单例。唯一使用它的地方是在我们 `List` 项的 `ForEach` 中。\n\n如果我们只是遍历\
    \ `mgr.userStatus` 属性，它会列出所有项目。但我们希望匹配用户选择的筛选条件。我们遍历 `.filter` 中的项目，如果状态匹配或用户在选择器中选择了\
    \ \"全部\"，则包含它们。\n\n当前的 `UserStatusMgr` 代码只有几个属性。\n\n```\nclass UserStatusMgr {\n\
    \    static let instance = UserStatusMgr()\n    var userStatus = [UserStatus]()\n\
    }\n```\n\n它有单例属性和用于 `UserStatus` 项目的数组。我们需要添加用于从服务器加载数据的代码。\n\n## 使用发布者获取数据\n\n\
    我们希望发布 `userStatus` 属性来更新 UI。因此，我们必须向该类添加 `ObservableObject` 协议，并使用 `@Published`\
    \ 标记该属性。然后我们可以在 UI 中将该类设置为一个 `ObservedObject`。\n\n我们还需要从服务器获取数据。然后我们可以解析它并更新 `userStatus`\
    \ 属性以进行发布。\n\n1.  声明 `UserStatusMgr` 类遵循 `ObservableObject` 协议。\n\n1.  将 `@Published`\
    \ 包装器添加到 `userStatus` 属性。\n\n```\nclass UserStatusMgr : ObservableObject {\n```\n\
    \n1.  为单例创建一个私有的 `init`，该初始化方法调用状态数据的更新函数（待编写）。\n\n```\n    private init() {\n\
    \        updateStatusData()\n    }\n```\n\n1.  创建一个名为 `updateStatusData` 的函数，用于创建\
    \ `URL` 实例。\n\n```\n    func updateStatusData() {\n        guard let url = URL(string:\
    \ \"https://brainwashinc.com/Status.json\")\n        else { return }\n    }\n\
    ```\n\n1.  在上述 `updateStatusData` 函数的 `guard` 之后，创建 `URLSession` 发布者。\n\n```\n\
    \    URLSession.shared\n        .dataTaskPublisher(for: url)\n```\n\n`URLSession`\
    \ 数据任务发布者的发布者定义了其输出和失败类型。输出是一个 `Data` 和 `URLResponse` 的元组。名称分别是 `data` 和 `response`。失败类型是\
    \ `URLError`。\n\n在这种情况下，我们只想获取数据，但这只是元组的一部分。我们可以使用 `.map` 来稍微处理一下数据。\n\n1.  向发布者添加\
    \ `.map`，以将响应元组转换为仅数据项。\n\n```\n    URLSession.shared\n        .dataTaskPublisher(for:\
    \ url)\n        .map { $0.data }\n```\n\n```\n@Published var userStatus = [UserStatus]()\n\
    ```\n\n`map` 的结果是一个仅向下游传递 `Data` 项的发布者。我们想要解码那个 `Data`，因为它是 JSON。由于这是一种常见操作，Combine\
    \ 提供了一个 `.decode` 运算符。\n\n1.  在 `.map` 之后添加 `.decode` 运算符。\n\n```\nURLSession.shared\n\
    \    .dataTaskPublisher(for: url)\n    .map { $0.data }\n    .decode(type: [UserStatus].self,\n\
    \            decoder: JSONDecoder())\n```\n\n`decode` 返回一个向下游传递 `Decodable` 的发布者，这很棒。但它的\
    \ `Failure` 类型是 `Error`。由于 JSON 解析可能失败，我们必须处理这种情况。\n\n有多种方法可以处理这个问题。这里我们看一种简单的方法。使用\
    \ `.sink` 是另一个有用的选项，我鼓励你研究一下。\n\n1.  在解码之后添加 `.replaceError`。\n\n```\nURLSession.shared\n\
    \    .dataTaskPublisher(for: url)\n    .map { $0.data }\n    .decode(type: [UserStatus].self,\n\
    \            decoder: JSONDecoder())\n    .replaceError(with: self.userStatus)\n\
    ```\n\n现在，如果 `JSONDecoder` 出错，我们只需使用 `self.userStatus` 的当前值继续执行。这仍然返回一个发布者，所以我们需要继续到订阅者。\n\
    \n1.  添加 `.receive` 以在主线程上发布。\n\n```\n    URLSession.shared\n        .dataTaskPublisher(for:\
    \ url)\n        .map { $0.data }\n        .decode(type: [UserStatus].self,\n \
    \               decoder: JSONDecoder())\n        .replaceError(with: self.userStatus)\n\
    \        .receive(on: DispatchQueue.main)\n```\n\n现在我们到达了发布者链的末端，需要创建订阅。\n\n1.\
    \  创建一个名为 `subscriber` 的 `AnyCancellable` 作为 `UserStatusMgr` 类的属性。\n"
- fmt: "1.  添加一个`.assign`修饰符来分配值，并将结果存储在第10步的属性中。\n\n```\nvar subscriber : AnyCancellable?\n\
    ```\n\n```\nsubscriber = URLSession.shared\n.dataTaskPublisher(for: url)\n.map\
    \ { $0.data }\n.decode(type: [UserStatus].self,\ndecoder: JSONDecoder())\n.replaceError(with:\
    \ self.userStatus)\n.receive(on: DispatchQueue.main)\n.assign(to: \\.userStatus,\
    \ on: self)\n```\n\n此时运行应用程序可以工作，但它不会将数据加载到UI中。这是因为我们使用`UserStatusMgr`的初始值`userStatus`（为空）创建了UI。\n\
    \n我们需要将`ContentView`的`mgr`属性标记为`ObservedObject`。这样当`userStatus`属性被发布时，我们就会收到更新，从而触发UI更新。\n\
    \n2.  在`ContentView`中为`mgr`属性添加`@ObservedObject`。\n\n```\n    struct ContentView:\
    \ View {\n    @ObservedObject var mgr = UserStatusMgr.instance\n    ```\n\n现在，应用程序会显示UI，并在获取数据后得到更新。使用过滤器也能正常工作，如图[16-5](#497312_1_En_16_Chapter.xhtml#Fig5)所示。\n\
    \n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig5_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig5_HTML.jpg)\n\
    \n**Figure 16-5**  \nApp Running with Filtered List\n\n这个发布者只运行一次。任务运行、发布然后停止。如果你再次调用`updateStatusData`，它会获取新数据并继续执行。\n\
