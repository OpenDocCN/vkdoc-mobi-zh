    \nTRANSITION ON TEXT\n\nWe’re going to start with a new SwiftUI project. We’re\
    \ going to add a Button to toggle a value. Based on that value, we’ll add a Text\
    \ item to the UI. We’ll then add a transition to that item for inserting and removing\
    \ it.\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig1_HTML.png](images/497312_1_En_17_Chapter/497312_1_En_17_Fig1_HTML.png)\n\
    \nFigure 17-1\n\nNew Project Options\n\n1.  Create a new SwiftUI project (I named\
    \ mine VariousUI) with SwiftUI for the interface and SwiftUI App for the life\
    \ cycle (see Figure [17-1](#497312_1_En_17_Chapter.xhtml#Fig1)).\n\n1.  Add a\
    \ toggle property to the ContentView in ContentView.swift.\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig2_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig2_HTML.jpg)\n\
    \nFigure 17-2\n\nToggle Button and Text\n\n1.  In the body computed property of\
    \ ContentView, replace the default content with a VStack.\n\n    ```\n    var\
    \ body: some View {\n    VStack {\n    }\n    }\n    ```\n\n2.  In the VStack,\
    \ create a Button to toggle the value.\n\n    ```\n    Button(action: {\n    self.isToggled.toggle()\n\
    \    }) {\n    Text(\"Toggle\")\n    }\n    ```\n\n3.  We’ll add another Text\
    \ item, below the button, for “Toggled” if the property is set to true.\n\n  \
    \  ```\n    if isToggled {\n    Text(\"Toggled\")\n    }\n    ```\n\n    Running\
    \ the app now shows a “Toggle” button. If you tap the button, a Textfield is displayed\
    \ like Figure [17-2](#497312_1_En_17_Chapter.xhtml#Fig2).\n\n```\n@State var isToggled\
    \ = false\n```\n\nNext, we’ll add a transition to have the Text appear in a different\
    \ way.\n\n1.  Add a transition to the Text item.\n\n    ```\n    Text(\"Toggled\"\
    )\n    .transition(.move(edge: .top))\n    ```\n\n    If you run the app now,\
    \ you will still see the Text pop on and off the screen. We need to add some animation.\n\
    \n2.  Add animation to the Text item.\n\n    ```\n    Text(\"Toggled\")\n    .transition(.move(edge:\
    \ .top))\n    .animation(.easeInOut)\n    ```\n\nAnimation has a variety of options\
    \ as you can see in Figure [17-3](#497312_1_En_17_Chapter.xhtml#Fig3).\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig3_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig3_HTML.jpg)\n\
    \nFigure 17-3\n\nPartial List of Animations\n\nFeel free to try different types\
    \ of animations. I like spring a lot.\n\nNow when you run the app (or Live mode\
    \ preview), you should see the Text item move from the top when added. It should\
    \ also move to the top when removed.\n\n## Asymmetric Transitions\n\nOften we\
    \ want to transition something on the screen one way but off the screen a different\
    \ way. For that, we create an asymmetric transition . The function to create one\
    \ takes two parameters: insertion and removal. There are just two transitions.\n\
    \nSo if we want to insert a UI element with opacity but use a scale to remove\
    \ it, that’s not a problem.\n\nASYMMETRIC TRANSITION\n\nLet’s create an asymmetric\
    \ transition for our Text item. If you experimented with the different transitions\
    \ already, you’ve seen opacity and scale. We’ll use those.\n\n1.  Replace the\
    \ transition used before (i.e., move(edge: .top)) with a call to .asymmetric.\n\
    \n1.  For insertion, we’ll use opacity. For removal, pass in a slide.\n\n    ```\n\
    \    Text(\"Toggled\")\n    .transition(\n    .asymmetric(\n    insertion: .opacity,\n\
    \    removal: .slide))\n    ```\n\n```\nText(\"Toggled\")\n.transition(\n.asymmetric(\n\
    ```\n\nRun the app. What happened? It’s not animated anymore! Transitions don’t\
    \ animate in implicit animations like this. We need to use an explicit animation.\n\
    \n1.  Add an implicit animation using withAnimation around the toggle value change\
    \ in the Button action.\n\n    ```\n    Button(action: {\n    withAnimation(.easeInOut(duration:\
    \ 1)) {\n    self.isToggled.toggle()\n    }\n    ```\n\n    One second is being\
    \ passed in as the duration. Feel free to pass in whatever duration you like (or\
    \ none as we did before).\n\n    Now the transition should work and animate. But\
    \ what if we want it to fade in and move or some other transition? We can combine\
    \ them .\n\n2.  Call combine on the opacity transition and pass in a move.\n\n\
    \    ```\n    Text(\"Toggled\")\n    .transition(\n    .asymmetric(\n    insertion:\
    \ AnyTransition\n    .opacity\n    .combined(with:\n    .move(edge: .top)),\n\
    \    removal: .slide))\n    ```\n\nNow that we have it working the way we’d like,\
    \ let’s clean it up. We’ll create a separate transition for what we’ve created.\
    \ We can do that as an extension of the AnyTransition struct.\n\n1.  Create an\
    \ extension of AnyTransition (it’s fine to have it in the same file).\n\n    ```\n\
    \    extension AnyTransition {\n    }\n    ```\n\n2.  Declare a static var named\
    \ textTransition of type AnyTransition.\n\n1.  Implement the get (no keyword needed)\
    \ of the textTransition to create the transition we created in our code.\n\n \
    \   ```\n    static var textTransition : AnyTransition {\n    AnyTransition\n\
    \    .asymmetric(\n    insertion: AnyTransition\n    .opacity\n    .combined(with:\n\
    \    .move(edge: .top)),\n    removal: .slide)\n    }\n    ```\n\n2.  Now use\
    \ the newly defined transition instead of the several lines of code we moved to\
    \ textTransition.\n\n    ```\n    Text(\"Toggled\")\n    .transition(.textTransition)\n\
    \    ```\n\n```\nstatic var textTransition : AnyTransition\n```\n\nRun the code\
    \ and verify the transition is the same as before.\n\nIn this exercise, not only\
    \ did we combine transitions, we also created a custom one to use in other places."
  trans: "\n# 过渡效果\n\n过渡效果控制视觉元素如何从视图中插入或移除。插入和移除操作默认不会自动动画化，但可以通过设置实现动画效果。\n\nSwiftUI\
    \ 内置了一些常见展示效果的过渡动画，其中包括 `opacity`（透明度）、`move`（移动）、`scale`（缩放）和 `slide`（滑动）。`move`\
    \ 过渡需要指定一个 `Edge`（边缘）值，以确定移动起始位置：`top`（顶部）、`bottom`（底部）、`leading`（前导）或 `trailing`（后沿）。\n\
    \n接下来，我们添加一些 UI 元素来观察过渡效果的实际运作。\n\n## 文本的过渡效果\n\n我们将从创建一个新的 SwiftUI 项目开始。首先添加一个\
    \ `Button`（按钮）来切换某个布尔值，然后根据该值在 UI 中添加一个 `Text`（文本）元素，最后为这个文本元素设置插入和移除时的过渡效果。\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig1_HTML.png](img/497312_1_En_17_Fig1_HTML.png)\n\
    \n图 17-1 新建项目选项\n\n1.  新建一个 SwiftUI 项目（我将其命名为 `VariousUI`），界面框架选择 SwiftUI，生命周期选择\
    \ SwiftUI App（见图 17-1）。\n2.  在 `ContentView.swift` 文件的 `ContentView` 结构体中添加一个切换属性。\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig2_HTML.jpg](img/497312_1_En_17_Fig2_HTML.jpg)\n\
    \n图 17-2 切换按钮与文本\n\n3.  在 `ContentView` 的 `body` 计算属性中，将默认内容替换为 `VStack`。\n\n\
    \    ```\n    var body: some View {\n    VStack {\n    }\n    }\n    ```\n\n4.\
    \  在 `VStack` 中，创建一个用于切换值的 `Button`。\n\n    ```\n    Button(action: {\n    self.isToggled.toggle()\n\
    \    }) {\n    Text(\"Toggle\")\n    }\n    ```\n\n5.  在按钮下方添加另一个 `Text`，当属性值为\
    \ `true` 时显示“Toggled”。\n\n    ```\n    if isToggled {\n    Text(\"Toggled\")\n\
    \    }\n    ```\n\n    现在运行应用，屏幕上会显示一个“Toggle”按钮。点击按钮后，会显示一个`Textfield`文本字段，如图\
    \ 17-2 所示。\n\n```\n@State var isToggled = false\n```\n\n接下来，我们将为 `Text` 元素添加过渡效果，使其以不同方式呈现。\n\
    \n1.  为 `Text` 元素添加过渡效果。\n\n    ```\n    Text(\"Toggled\")\n    .transition(.move(edge:\
    \ .top))\n    ```\n\n    如果现在运行应用，你仍然会看到 `Text` 元素突然出现和消失。我们需要添加一些动画效果。\n\n2.\
    \  为 `Text` 元素添加动画。\n\n    ```\n    Text(\"Toggled\")\n    .transition(.move(edge:\
    \ .top))\n    .animation(.easeInOut)\n    ```\n\n`Animation` 提供了多种选项，如图 17-3 所示。\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig3_HTML.jpg](img/497312_1_En_17_Fig3_HTML.jpg)\n\
    \n图 17-3 动画部分列表\n\n欢迎尝试不同类型的动画。我个人非常喜欢 `spring`（弹簧动画）。\n\n现在运行应用（或启用实时预览模式），你应该会看到\
    \ `Text` 元素在添加时从顶部移入，在移除时也移向顶部。\n\n## 非对称过渡\n\n通常，我们希望元素以某种方式进入屏幕，却以不同的方式离开屏幕。为此，我们可以创建非对称过渡。创建非对称过渡的函数需要两个参数：`insertion`（插入）和\
    \ `removal`（移除）。这里只涉及两种过渡。\n\n因此，如果我们想用 `opacity`（淡入）插入一个 UI 元素，但用 `scale`（缩放）将其移除，这完全可行。\n\
    \n### 非对称过渡\n\n让我们为 `Text` 元素创建一个非对称过渡。如果你之前尝试过不同的过渡效果，应该已经见过 `opacity` 和 `scale`。我们将使用这两个效果。\n\
    \n1.  将之前使用的过渡（即 `move(edge: .top)`）替换为调用 `.asymmetric`。\n2.  对于 `insertion`，我们使用\
    \ `opacity`；对于 `removal`，传入 `slide`。\n\n    ```\n    Text(\"Toggled\")\n    .transition(\n\
    \    .asymmetric(\n    insertion: .opacity,\n    removal: .slide))\n    ```\n\n\
    ```\nText(\"Toggled\")\n.transition(\n.asymmetric(\n```\n\n运行应用。发生了什么？动画效果消失了！在这种隐式动画中，过渡效果不会自动产生动画。我们需要使用显式动画。\n\
    \n1.  在 `Button` 的 action 中，使用 `withAnimation` 为切换值的操作添加隐式动画。\n\n    ```\n   \
    \ Button(action: {\n    withAnimation(.easeInOut(duration: 1)) {\n    self.isToggled.toggle()\n\
    \    }\n    ```\n\n    这里我们传入了一秒作为动画时长。你可以自由传入你喜欢的任何时长（或者像之前那样不传参）。\n\n    现在，过渡效果应该可以正常工作和动画化了。但如果我们希望元素淡入并移动，或者使用其他组合过渡呢？我们可以将它们组合起来。\n\
    \n2.  在 `opacity` 过渡上调用 `combine`，并传入一个 `move` 过渡。\n\n    ```\n    Text(\"Toggled\"\
    )\n    .transition(\n    .asymmetric(\n    insertion: AnyTransition\n    .opacity\n\
    \    .combined(with:\n    .move(edge: .top)),\n    removal: .slide))\n    ```\n\
    \n现在过渡效果已按我们期望的方式工作，接下来进行代码清理。我们将为创建的过渡效果定义一个独立的过渡类型，可以通过扩展 `AnyTransition` 结构体来实现。\n\
    \n1.  创建 `AnyTransition` 的扩展（放在同一个文件中即可）。\n\n    ```\n    extension AnyTransition\
    \ {\n    }\n    ```\n\n2.  声明一个名为 `textTransition` 的静态变量，类型为 `AnyTransition`。\n\
    3.  实现 `textTransition` 的 `get`（无需关键字）方法，以创建我们在代码中使用的过渡效果。\n\n    ```\n    static\
    \ var textTransition : AnyTransition {\n    AnyTransition\n    .asymmetric(\n\
    \    insertion: AnyTransition\n    .opacity\n    .combined(with:\n    .move(edge:\
    \ .top)),\n    removal: .slide)\n    }\n    ```\n\n4.  现在使用新定义的过渡效果，替换掉原先移动到 `textTransition`\
    \ 中的多行代码。\n\n    ```\n    Text(\"Toggled\")\n    .transition(.textTransition)\n\
    \    ```\n\n```\nstatic var textTransition : AnyTransition\n```\n\n运行代码，验证过渡效果是否与之前一致。\n\
    \n通过这个练习，我们不仅组合了多种过渡效果，还创建了一个自定义过渡，以便在其他地方复用。\n"
- fmt: "# Animations\n\nWe’ve already seen a little about animating a transition.\
    \ There’s a few other things we want to look at animating.\n\nVarious modifier\
    \ changes can be animated. Some common ones might be size/scale, color, shadow,\
    \ rotation, and blur.\n\nAnimations on modifiers can be done with implicit or\
    \ explicit animations. Also, you can set different implicit animation modifiers\
    \ on different changes.\n\n## Animating Changes\n\nIn this exercise, we’ll look\
    \ at animating various changes to UI elements.\n\n1. At the bottom of the `VStack`,\
    \ add a circle to the UI.\n2. Make the color of the circle red.\n\n```\nCircle()\n\
    .foregroundColor(.red)\n```\n\n```\nCircle()\n```\n\nIn the preview, you should\
    \ see a big red circle in the UI as in Figure 17-4.\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig4_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig4_HTML.jpg)\n\
    \nFigure 17-4: Circle Added to the UI\n\n3. Add `shadow`, `scaleEffect`, and `blur`\
    \ modifiers to the circle all based on the `isToggle` value.\n\n```\nCircle()\n\
    .foregroundColor(.red)\n.shadow(radius: isToggled ? 10 : 50)\n.scaleEffect(isToggled\
    \ ? 0.75 : 1)\n.blur(radius: isToggled ? 5 : 0)\n```\n\nNow when you run the app\
    \ and toggle the value, you should see a shadowed, smaller red circle that’s blurred\
    \ like Figure 17-5.\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig5_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig5_HTML.jpg)\n\
    \nFigure 17-5: Toggle Value True Affecting the UI\n\nThis works fine and is animated.\
    \ But it doesn’t seem very lively for a bright red ball. Let’s add an animation\
    \ modifier to give it some life.\n\n4. After the `scaleEffect` modifier, add an\
    \ animation modifier. Use `spring` and pass in a damping fraction of `0.5`.\n\n\
    ```\nCircle()\n.foregroundColor(.red)\n.shadow(radius: isToggled ? 10 : 50)\n\
    .scaleEffect(isToggled ? 0.5 : 1)\n.animation(.spring(dampingFraction : 0.5))\n\
    .blur(radius: isToggled ? 5 : 0)\n```\n\nThe damping fraction is the amount of\
    \ drag applied to the value being animated. The default is `0.825` and doesn’t\
    \ provide as much bounce. Our `0.5` is pretty good. Setting it to something small\
    \ like `0.15` makes it oscillate around the final value several times. Try it\
    \ out.\n\n`spring` has other parameters you can pass in as well. I encourage you\
    \ to check those out sometime.\n\nAs you run the app, you should notice that the\
    \ animation for the shadow and scale use the spring animation. This also uses\
    \ its own timing. The explicit `withAnimation` call is still one second and applied\
    \ to the `blur`. If it’s not noticeable, make the `withAnimation` duration five\
    \ seconds and test it out.\n\n## ViewModifier Protocol\n\nWe have several modifiers\
    \ on our red circle. If we like this combination, we might want to save it as\
    \ something to use in other places in our code.\n\nFor our `Transition`, we did\
    \ that as an extension of `AnyTransition`. Our static computed property was declared\
    \ as a type of `AnyTransition`. For our modifiers, it will be a struct that conforms\
    \ to the `ViewModifier` protocol.\n\nThe `ViewModifier` protocol is very similar\
    \ to the `View`. However, the `body` is a function instead of a property. This\
    \ `body` function takes a `Content` and returns a `View`. The `Content` is the\
    \ value the modifier is used on. In our case, it’s a type that implements `View`.\n\
    \n### Create a View Modifier\n\nWe are going to create a struct that implements\
    \ `ViewModifier`. We have a required function of the `body` that takes a `Content`\
    \ (in our case, a type that implements `View`) and returns a `View`.\n\n1. Declare\
    \ the struct (in the same file is fine).\n\n```\nstruct BouncyModifier : ViewModifier\
    \ {\n}\n```\n\n2. Declare a property for the amount to blur the `View`.\n\n```\n\
    struct BouncyModifier : ViewModifier {\n    var blurFactor : CGFloat\n}\n```\n\
    \n3. Declare the `body` function.\n\n```\nstruct BouncyModifier : ViewModifier\
    \ {\n    var blurFactor : CGFloat\n    func body(content: Content) -> some View\
    \ {\n    }\n}\n```\n\n4. Implement the `body` function to add the modifiers to\
    \ the parameter passed in.\n\n```\nreturn content\n    .shadow(radius: blurFactor\
    \ > 0 ? 10 : 50)\n    .scaleEffect(blurFactor > 0 ? 0.5 : 1.0)\n    .animation(\n\
    \        .spring(dampingFraction : 0.15))\n    .blur(radius: blurFactor)\n```\n\
    \n5. Use the new modifier instead of the previous list of modifiers.\n\n```\n\
    Circle()\n    .foregroundColor(.red)\n    .modifier(BouncyModifier(blurFactor:\n\
    \        isToggled ? 5 : 0))\n```\n\nRun the app and notice that the animation\
    \ is the same but with a little more spring.\n\nThere’s another option rather\
    \ than using the `.modifier` to create the `ViewModifier`. We can create an extension\
    \ on `View` to do it for us.\n\nIn the end, it’s the same thing, just in a different\
    \ place. It can help keep the `View` code clean too.\n\n6. Define an extension\
    \ of `View` (in the same file is fine).\n\n```\nextension View {\n}\n```\n\n7.\
    \ Define a `bouncy` function that takes a `CGFloat` and returns a `View`.\n\n\
    ```\nextension View {\n    func bouncy(blurFactor: CGFloat)\n        -> some View\
    \ {\n    }\n}\n```\n\n8. Return a modifier that creates a `BouncyModifier` created\
    \ with the parameter passed in.\n\n```\nextension View {\n    func bouncy(blurFactor:\
    \ CGFloat)\n        -> some View {\n        self.modifier(\n            BouncyModifier(blurFactor:\
    \ blurFactor))\n    }\n}\n```\n\n9. Use this function on your `Circle` instead\
    \ of the `.modifier` with `BouncyModifier`.\n\n```\nCircle()\n    .foregroundColor(.red)\n\
    \    .bouncy(blurFactor: isToggled ? 5 : 0)\n```\n\nBy creating a `ViewModifier`\
    \ and extension on `View`, our code is cleaner. We can reuse either of these in\
    \ other places in our project. Also, we can make changes in one place that affect\
    \ our bouncy animation throughout our app.\n\nAs I mentioned, there are animation\
    \ functions for affecting the performance of animations. Several of these are\
    \ for the curve of the animation timing. These functions, `easeIn`, `easeOut`,\
    \ `easeInOut`, and `linear`, have forms that take a `Double` for duration. The\
    \ duration is the number of seconds for the animation.\n\nThe `timingCurve` function\
    \ allows the developer to specify the timing curve as a Bézier path coordinate\
    \ and a duration.\n\nWe’ve seen `spring` with its default values for `response`,\
    \ `dampingFraction`, and `blendDuration`. There’s also `interactiveSpring`. It’s\
    \ basically the same but with different default values for interactive animations.\
    \ The `interpolatingSpring` allows you to specify mass and stiffness (of the spring)\
    \ along with damping and initial velocity.\n\nOther functions are `delay`, `speed`,\
    \ and two for repeating: `repeatCount` and `repeatForever`.\n\nAll of these functions\
    \ allow you to customize your animations. Honestly, most of the time that I use\
    \ animations, I can stick to a lot of defaults. Sometimes, I need a specific duration.\
    \ In those cases, I usually use `0.37` which matches a lot of system animations\
    \ such as displaying the keyboard. About the only other variation I use is `spring`\
    \ to give some bounce."
