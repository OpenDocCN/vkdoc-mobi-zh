  raw: "## Popover Modifier\n\nPopover is created similar to what we’ve already seen\
    \ with alert, action sheet, and sheet. Like a Sheet, it takes a binding either\
    \ boolean (isPresented) or optional (item). It also takes a closure to return\
    \ the UI to display.\n\nOptionally, .popover takes an anchor point and arrow edge\
    \ parameters. The anchor point defines where the popover is attached. It can be\
    \ a point or a rect. The arrow edge specifies where the arrow of the popover is\
    \ displayed.\n\nFor smaller UI devices (e.g., iPhone), the popover will be displayed\
    \ modally and look like the Sheet in Figure [20-7](#497312_1_En_20_Chapter.xhtml#Fig7).\
    \ This is the case regardless of values for the anchor and arrow.\n\nIn some cases,\
    \ the layout will prevent the UI from respecting the anchor and arrow settings.\
    \ In that case, or if they aren’t provided, the system will decide how to display\
    \ the popover.\n\nPOPOVER MODIFIER\n\nAgain, using the same project, we’ll create\
    \ a new property, button, and popover modifier.\n\n1.  Add a new boolean property\
    \ to ContentView for binding to the .popover modifier.\n\n1.  Add a Button in\
    \ the body VStack to set the property to true.\n\n    ```\n    Button(\"Popover\"\
    ) {\n    $popover.wrappedValue = true\n    }\n    ```\n\n2.  Add a .popover modifier\
    \ to the Button bound to the new property with settings for the attachment anchor,\
    \ arrow edge, and content that returns a View conforming to the UI item.\n\n \
    \   ```\n    .popover(isPresented: $popover,\n    attachmentAnchor: .point(.trailing),\n\
    \    arrowEdge: .leading,\n    content: {\n    Text(\"Popover! Here we are just...\"\
    )\n    .lineLimit(2)\n    .frame(width: 300, height: 300,\n    alignment: .center)\n\
    \    })\n    ```\n\n```\n@State var popover = false\n```\n\nOn iPhone and small\
    \ devices/screens, it looks like a Sheet, but on iPad/larger screens, it pops\
    \ up with a context arrow as in Figure [20-8](#497312_1_En_20_Chapter.xhtml#Fig8).\n\
    \n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig8_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig8_HTML.jpg)\n\
    \nFigure 20-8\n\nPopover Displayed on iPhone and iPad\n\nPopovers are great for\
    \ displaying information contextually. If you have a message for the user based\
    \ on something in the UI, popover gives you a great option especially for the\
    \ iPad.\n\n## Chapter Summary\n\nAlerts, Action Sheets, Sheets, and Popovers are\
    \ all bound to a value and presented based on that value whether it’s a boolean\
    \ or Identifiable.\n\nThere’s a variety of options for how these items are displayed\
    \ in your app.\n\nThe .alert modifier returns an Alert. It can have one or two\
    \ buttons with or without closures.\n\nThe .actionSheet modifier returns an ActionSheet\
    \ which can have many buttons. If there are too many for the screen size, it will\
    \ scroll.\n\nFor the .sheet modifier, we have an onDismiss closure. The UI for\
    \ the .sheet isn’t a specific type. It’s just something that implements a View\
    \ so it can be an HStack, VStack, Text, or various other elements.\n\nSimilar\
    \ to .sheet, .popover has a closure that returns something that conforms to View.\
    \ In cases where the UI is smaller (e.g., iPhone or iPad with only partial screen\
    \ display), .popover and .sheet will appear the same. But on larger UI instances,\
    \ popover will be displayed near the tapped UI like a callout. It may be to the\
    \ side or top/bottom and have an arrow to the initiating element.\n\nIndex A ActionSheet\
