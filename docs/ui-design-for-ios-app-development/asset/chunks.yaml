    \ look at ways to map the values when they don’t match.\n\nBoth the publisher\
    \ and subscriber each define a failure type. The failure types must also match\
    \ to set up the relationship.\n\nThere are multiple ways to create a publisher.\
    \ The first one we’ll look at uses the NotificationCenter. This is a familiar\
    \ dynamic to many so it’s a good place to start.\n\nOnce we have a publisher,\
    \ we can add a subscriber to it. This will handle the data when it’s published.\n\
