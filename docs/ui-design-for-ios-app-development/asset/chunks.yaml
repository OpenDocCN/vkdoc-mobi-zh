    \ to the note property in our ContentView as well. We’ll use another property\
    \ wrapper here like we did with State and Binding. It’s called ObservedObject,\
    \ and we need to add it to our note like this:\n\n```\n@ObservedObject var note\
    \ = Note()\n```\n\nWe’ve told the compiler that our Note class can be observed.\
    \ Of course, nothing is required to observe it. Our ContentView wants to observe\
    \ it, and it declared it so. There’s only one piece left."
