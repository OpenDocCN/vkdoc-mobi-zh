    # 导航链接


    对于模态导航，我们使用了 `.onTapGesture` 修饰符。在相关的闭包中，我们设置了一个状态属性。这将调用 `.sheet` 修饰符，并显示其闭包返回的视图。


    对于 `NavigationView`，我们将创建 `NavigationLink`。`NavigationLink` 遵循 `View` 协议。这意味着我们可以在
    `List` 中使用它。我们将返回 `NavigationLink` 实例，而不是 `NoteRow`。并且每个 `NoteRow` 都将位于 `NavigationLink`
    内部。


    `NavigationLink` 的初始化方法允许设置多个参数。具体来说，它们接收目标（destination）和标签（label）。目标是在点击项目时显示的视图。在我们的
    `ListProject` 中，我们希望显示选中笔记行的一些详细信息。


    标签参数是一个闭包。该闭包返回一个视图，作为可点击的项目来显示。在我们的例子中，这个视图就是行本身。


    ## 为 ListProject 添加导航


    本练习将逐步指导你为 `ListProject` 应用程序添加导航。添加的导航将从右侧滑入以显示详细信息。


    我们将在本练习中使用 `NavigationView` 和 `NavigationLink`。


    前两个步骤是实现前面讨论过的内容。如果你一直在跟随学习，可能已经完成了这些步骤。


    1.  将现有的 `List` 项包裹在 `NavigationView` 中（除非你之前跟随学习时已经这样做了）。


    1.  为 `List` 视图添加导航栏标题修饰符（除非你之前跟随学习时已经这样做了）。


    ```

    NavigationView {

    List {

    ForEach(items, id: \.id) { (noteVM)   in

    NoteRow(noteVM: noteVM)

    }

    .onDelete { offsets in

    self.items.remove(atOffsets: offsets)

    }

    }

    }

    ```


    1.  更新预览，并验证其看起来是否与图 10-5 相似。


    2.  在 `List` 的 `ForEach` 内部，创建一个 `NavigationLink`，其目标是一个 `Text` 视图，标签闭包返回 `NoteRow`。


    ```

    NavigationView {

    List {

    ForEach(items, id: \.id) { (noteVM)   in

    NoteRow(noteVM: noteVM)

    }

    .onDelete { offsets in

    self.items.remove(atOffsets: offsets)

    }

    }.navigationTitle("笔记")

    }

    ```


    ![../images/497312_1_En_10_Chapter/497312_1_En_10_Fig6_HTML.jpg](img/497312_1_En_10_Fig6_HTML.jpg)


    图 10-6：应用内导航


    1.  运行应用程序（模拟器、真机或实时预览模式），验证点击项目是否显示如图 10-6 所示的详细信息。


    ```

    NavigationLink(destination: Text(noteVM.text)) {

    NoteRow(noteVM: noteVM)

    }

    ```


    请注意，导航会自动包含返回按钮。并且返回按钮的标题与导航栏标题相同。


    正如你所期望的，点击返回按钮会返回到上一个视图。


    本练习展示了如何快速便捷地将导航从 `List`（或其他视图）添加到应用程序中。


    ## 章节总结


    在本章中，我们探讨了应用中两种常见的导航方式。对于模态导航，我们使用了 `.sheet` 修饰符。我们将此修饰符添加到了 body 参数返回的视图上。


    `.sheet` 修饰符通过绑定到一个属性来确定何时显示。我们使用了一个 `@State` 属性包装器来包装笔记视图模型，以设置此条件。


    为了确定用户何时点击了某一行，我们在每一行上使用了 `.onTapGesture` 修饰符。这提供了一种重新显示用户界面并将必要数据传递给 `.sheet`
    闭包的方法。


    对于使用视图栈的分层/下钻式导航，我们使用了 `NavigationView`。`NavigationView` 中包含的视图使用 `.navigationTitle`
    修饰符来设置视图的标题。


    `NavigationView` 提供了导航的手段。`NavigationLink` 提供了用户交互能力。列表项的 `ForEach` 创建行视图。`NavigationLink`
    也实现了 `View` 协议，可以作为行项使用。


    `NavigationLink` 需要知道显示什么标签（视图）供用户点击。它还需要一个目标（视图），在点击时显示。我们使用 `NoteRow` 作为可点击区域。当被点击时，我们提供一个包含笔记文本的
    `Text` 项来显示。


    我们提供了一个简单的视图（即 `Text`）作为目标。当然，你也可以使用更有用、更有趣的视图来代替。


    # SwiftUI 中的 UIKit


    由于各种原因，你可能会有在 SwiftUI 应用中使用 UIKit 的时候。这没问题。


    你可能有一个需要使用的现有 UI。也许你没有时间更新它，或者根本不想更新它。无论是现有的视图还是你自定义的视图，都可以实现。此外，任何现有的约束都会得到尊重。


    在本章中，我们将探讨如何将现有的 UIKit 类整合到 SwiftUI 中。这已经为你考虑过了。这不是一个临时的解决方案，甚至也不被反对。


    虽然有一些工作要做，但步骤已经为你规划好了。


    ## `UIViewRepresentable`


    SwiftUI 提供了一个专门用于将 `UIView` 实例纳入代码的协议。基本上，我们将创建一个视图结构体，它返回一个 `UIView` 类。


    `UIViewRepresentable` 协议继承了 `View`。然而，它指定要成为一个不实现 `body` 计算属性的视图。所以它是一个视图，但和我们之前见过的不同。


    相反，该协议定义了一个需要实现的函数。`makeUIView` 函数将 UIKit 类整合到 SwiftUI 中，需要返回一个 `UIView`。就这么简单。


    它还接收一个上下文（Context）参数，用于检索你可能需要的任何值。


    当状态发生变化并且需要更新 UI 时，还有另一个函数：`updateUIView`。当任何绑定发生变化时，会调用此函数。在函数代码中，你将根据这些变化以编程方式更新
    UI。


    可选地，你可以实现 `dismantleUIView`。这在清理内存时被调用。如果你需要在 `UIView` 被移除时执行任何最后时刻的操作，这正是时机。


    我们不再在点击行时显示笔记的文本，而是显示笔记的详细信息。


    如果你在 macOS 上工作，类似的协议是 `NSViewRepresentable`。类似地，WatchKit 视图可以与 `WKInterfaceObjectRepresentable`
    一起使用。

    '
- fmt: '# `NoteView`


    I’ve added a `NoteView` to the project. It’s a basic `View` struct that displays
    some of the `Note` information; see Figure [11-1](#497312_1_En_11_Chapter.xhtml#Fig1).


    ![../images/497312_1_En_11_Chapter/497312_1_En_11_Fig1_HTML.jpg](images/497312_1_En_11_Chapter/497312_1_En_11_Fig1_HTML.jpg)


    **Figure 11-1** `NoteView` Code


    `NoteView` has a binding property for a `NoteViewModel`. This is used in the body
    to display the details. A `VStack` contains `Text` items for the updated at time
    and the note’s text and an `Image` item for the related image.


    The preview code loads the test data and displays an item. The code is in Figure
    [11-2](#497312_1_En_11_Chapter.xhtml#Fig2).


    ![../images/497312_1_En_11_Chapter/497312_1_En_11_Fig2_HTML.jpg](images/497312_1_En_11_Chapter/497312_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2** `NoteView` Preview Code


    The preview in the Canvas looks like Figure [11-3](#497312_1_En_11_Chapter.xhtml#Fig3).


    ![../images/497312_1_En_11_Chapter/497312_1_En_11_Fig3_HTML.jpg](images/497312_1_En_11_Chapter/497312_1_En_11_Fig3_HTML.jpg)


    **Figure 11-3** `NoteView`


    Now let’s use this when a row is tapped in our `List`.


    # Display Details with `NoteView`


    Currently, our `ForEach` in the `ContentView` uses a `Text` item to display the
    note text when a row is tapped. We want to change that to use `NoteView`.


    However, if you just change the destination to `NoteView`, you’ll get an error.


    ```

    NavigationLink(destination:

    NoteView(noteVM: noteVM)) {

    NoteRow(noteVM: noteVM)

    }

    ```


    This is because the `noteVM` in the `ForEach` isn’t bindable. It’s just a locally
    scoped parameter. It needs to be the instance from the binding we have in the
    items array property.


    1. Change the `ForEach` to iterate over the indices of the array.


    2. Change the destination parameter to be a `NoteView`.


    ```

    NavigationLink(destination:

    NoteView(noteVM: self.$items[noteIndex])) {

    NoteRow(noteVM: noteVM)

    }

    ```


    3. Change the `NoteRow` creation to use the index.


    ```

    NavigationLink(destination:

    NoteView(noteVM: self.$items[noteIndex])) {

    NoteRow(noteVM: self.items[noteIndex])

    }

    ```


    4. Run the app and verify the list looks the same and the details look like Figure
    [11-3](#497312_1_En_11_Chapter.xhtml#Fig3).


    ```

    ForEach(items.indices) { (noteIndex) in

    ```


    By creating a fairly simple new view, we can display the details of a `Note`.
    We had to change the `ForEach` to use the model data so that the binding would
    work.


    # Extracting a View


    One thing missing from our note details is the priority. It would be nice to have
    that, of course. But it would be better if we could reuse the code we already
    wrote.


    We can do that by extracting that part of `NoteRow` into its own `View` struct.
    In `NoteRow`, we have an `HStack` that includes the priority star images and the
    updated at time. If we command-click (⌘ + click) the `HStack`, we see a menu as
    in Figure [11-4](#497312_1_En_11_Chapter.xhtml#Fig4).


    ![../images/497312_1_En_11_Chapter/497312_1_En_11_Fig4_HTML.jpg](images/497312_1_En_11_Chapter/497312_1_En_11_Fig4_HTML.jpg)


    **Figure 11-4** Command-Click Menu


    We want to extract the view, and there’s a menu item just for that. If we click
    that item, it will extract the code and allow us to set a name for the new `View`
    struct. I’ll name mine `NotePriorityAndTime`.


    However, we have a compile error since our new `View` doesn’t have access to the
    `noteVM` value. No problem. We can add that property to the view and the call
    to create it. Our new struct’s code is in Figure [11-5](#497312_1_En_11_Chapter.xhtml#Fig5).


    ![../images/497312_1_En_11_Chapter/497312_1_En_11_Fig5_HTML.jpg](images/497312_1_En_11_Chapter/497312_1_En_11_Fig5_HTML.jpg)


    **Figure 11-5** `NotePriorityAndTime` View Struct


    Remember to update the creation with the new `noteVM` parameter back in `NoteRow`’s
    `VStack`.


    ```

    NotePriorityAndTime(noteVM: noteVM)

    ```


    If you run the app now, it should look the same as before. Also, we now have a
    new `View` we can include in our `NoteView` UI. You may want to create a new file
    for this `View` depending on how you choose to organize your code.


    In `NoteView`, let’s replace the current `HStack` code.


    ```

    HStack {

    Spacer()

    Text("Updated At: \(noteVM.time)")

    }

    ```


    We can replace the entire `HStack` with the new `View` we created.


    ```

    NotePriorityAndTime(noteVM: noteVM)

    ```


    Where we had just the time before, we now have the priority and time using the
    rendering color as in Figure [11-6](#497312_1_En_11_Chapter.xhtml#Fig6).


    ![../images/497312_1_En_11_Chapter/497312_1_En_11_Fig6_HTML.jpg](images/497312_1_En_11_Chapter/497312_1_En_11_Fig6_HTML.jpg)


    **Figure 11-6** `NotePriorityAndTime` in `NoteView` Preview


    If we run the app and tap on a row, we see the details of the note. It includes
    the priority and time now with the text and image as in Figure [11-7](#497312_1_En_11_Chapter.xhtml#Fig7).


    ![../images/497312_1_En_11_Chapter/497312_1_En_11_Fig7_HTML.jpg](images/497312_1_En_11_Chapter/497312_1_En_11_Fig7_HTML.jpg)


    **Figure 11-7** Current Note Detail UI


    This might be OK for displaying the details, but it’s not great. And it doesn’t
    allow for editing the note. Let’s get back to `UIViewRepresentable` to use a `UITextView`
    for the note text.


    # `UIView` in SwiftUI


    Our current `NoteView` uses a `Text` for displaying the text of the note view
    model. That doesn’t allow the user to edit text in the app. Swift has a `TextEditor`
    for that purpose. However, it’s only available in iOS 14.


    In order to be backward compatible, let’s use a solution that will work in iOS
    13 as well. We’ll use the `UITextView`. Since that’s in UIKit, we can use `UIViewRepresentable`
    and wrap it in a `View` struct.


    ## `UITextView` in SwiftUI


    In order to use `UIView` subclasses in SwiftUI, we need to use `UIViewRepresentable`.
    So we’ll create a new struct that conforms to that protocol.


    1. Create a new `TextView` struct (this can be in the same file as `NoteView`
    or another file).


    2. Create a `@Binding` property for the text to be displayed.


    ```

    struct TextView: UIViewRepresentable {

    @Binding var text: String

    }

    ```


    3. Implement the `makeUIView` function to return the `UITextView`.


    ```

    func makeUIView(context: Context) -> UITextView {

    return UITextView()

    }

    ```


    ```

    struct TextView: UIViewRepresentable {}

    ```


    Optionally, we can set other properties on the text view before returning it:
    font, colors, and so on.


    4. Implement the `updateUIView` to update the UI if the text property is updated
    outside the struct.


    ```

    func updateUIView(_ tvNote: UITextView,

    context: Context) {

    tvNote.text = text

    }

    ```


    5. Replace the `Text` item in the `NoteView` body with `TextView`.


    ![../images/497312_1_En_11_Chapter/497312_1_En_11_Fig8_HTML.png](images/497312_1_En_11_Chapter/497312_1_En_11_Fig8_HTML.png)


    **Figure 11-8** `NoteView` with `UITextView`


    6. Preview or run the app and see that the UI appears the same as Figure [11-8](#497312_1_En_11_Chapter.xhtml#Fig8).


    ```

    TextView(text: $noteVM.text)

    ```


    In this exercise, we added a `UITextView` to our SwiftUI. By creating a new struct
    that implements `UIViewRepresentable`, we wrapped our `UIView` in a `View`. By
    implementing the protocol, we provided the `UIView` (i.e., `UITextView`) and also
    updated the UI when the value might change.


    You may notice that you can also edit the text in the text view. However, the
    changes aren’t reflected in the previous view. That’s because we’re using a binding
    property wrapper in the `NoteRow`. Because of that, changes don’t invalidate that
    UI to get recreated. We’ll update that in the next chapter.'
