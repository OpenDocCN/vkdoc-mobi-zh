    \ now looks like Figure [20-3](#497312_1_En_20_Chapter.xhtml#Fig3).\n\n```\n@State\
    \ var user : User?\n```\n\nWe have an .alert modifier bound to the user. When\
    \ it’s set to non-nil, the closure will get called to create the Alert. The user\
    \ is passed in as the parameter: theUser.\n\nThe title is “Cancel?” and we set\
    \ the message to the user’s name. The Alert will use an automatically provided\
    \ \"OK\" button to dismiss.\n\nSince the User struct has a default value of Test\
    \ for the name property, the alert looks like Figure [20-4](#497312_1_En_20_Chapter.xhtml#Fig4).\n\
    \n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig4_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig4_HTML.jpg)\n\
    \nFigure 20-4\n\nAlert with Default OK Button\n\nNow we’ve seen both binding types\
    \ for the .alert modifier and a couple variations of Alert.\n\n## Action Sheet\
    \ Modifier\n\nThe .actionSheet modifier is very similar to the .alert modifier.\
    \ It can use a binding for a bool (isPresented) or optional (item). The second\
    \ parameter is a closure, but it returns an ActionSheet instead of an Alert.\n\
    \nThe closure will be called if the binding value goes true (for Boolean binding)\
    \ or non-nil (for optional binding).\n\n## Action Sheet\n\nCreating an ActionSheet\
    \ is similar to an Alert. You can pass in a Text item as the title parameter.\
    \ If you only provide a title parameter value, the action sheet automatically\
    \ includes a Cancel button to remove the action sheet.\n\nThe message parameter\
    \ is also a Text and is optional. The last parameter is an array of buttons. There\
    \ are variations of the button you can use as in Figure [20-5](#497312_1_En_20_Chapter.xhtml#Fig5).\n\
    \n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig5_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig5_HTML.jpg)\n\
    \nFigure 20-5\n\nVariations of Action Sheet Buttons\n\nThe cancel button without\
    \ parameters simply removes the action sheet from the UI. The action parameter\
    \ allows you to pass in a closure to be called when the button is tapped. All\
    \ other variations of the buttons require a Text item to display on the button\
    \ and an optional closure to call when the button is tapped.\n\nACTION SHEET MODIFIER\n\
    \nThis exercise is built on top of the previous exercise and uses the same project.\
    \ However, a new project would also work since this exercise doesn’t rely on anything\
    \ previously done.\n\n1.  Add a new boolean property to the ContentView.\n\n1.\
    \  In the VStack (or the body if a new project), add a Button. The action of the\
    \ button sets the property from step 1 to true.\n\n    ```\n    Button(\"Action\
    \ Sheet\") {\n    $actionSheet.wrappedValue = true\n    }\n    ```\n\n2.  Add\
    \ an .actionSheet modifier at the end of the Button.\n\n    ```\n    .actionSheet(isPresented:\
    \ $actionSheet, content: {\n    })\n    ```\n\n3.  Return an ActionSheet from\
    \ the content closure of the .actionSheet.\n\n    ```\n    .actionSheet(isPresented:\
    \ $actionSheet, content: {\n    ActionSheet(title: Text(\"Action\"),\n    message:\
    \ Text(\"Go!\"),\n    buttons:\n    [.destructive(Text(\"Delete\"))]\n    )\n\
    \    })\n    ```\n\n```\n@State var actionSheet = false\n```\n\nRunning the code\
    \ presents a button titled \"Action Sheet.\" When it’s tapped, the actionSheet\
    \ property is set to true.\n\nThe .actionSheet modifier is bound to that property\
    \ and will be triggered.\n\nThe ActionSheet created is then displayed with the\
    \ buttons, in this case one destructive button, on the screen as in Figure [20-6](#497312_1_En_20_Chapter.xhtml#Fig6).\n\
    \n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig6_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig6_HTML.jpg)\n\
    \nFigure 20-6\n\nActionSheet with One Button\n\nThere is a small but meaningful\
    \ difference between an alert and an action sheet. An alert is limited to one\
    \ or two buttons and usually focused on providing information. An action sheet\
    \ should result in\n\nsome “action” taking place: saving data, sending information\
    \ online, deleting a user account, and other functionality based on the user’s\
    \ selection.\n\n## Sheet Modifier\n\nSheet is similar to what we’ve already seen\
    \ with Alert and ActionSheet. It takes a binding to a boolean (isPresented) or\
    \ optional (item). It also has an optional closure called onDismiss. This closure,\
    \ if passed in, will be called when the action sheet is removed from the UI.\n\
    \nThe final parameter is a closure to define the UI on the sheet. This closure,\
    \ like the body parameter, returns an item implementing a View. So it’s not a\
    \ specific UI element like Alert or ActionSheet. It’s anything that implements\
    \ a View.\n\nSHEET MODIFIER\n\nAgain, this is building on the previous project\
    \ but isn’t necessary.\n\n1.  Add a boolean property to ContentView to bind to\
    \ the sheet.\n\n1.  Add a button that sets the property to true.\n\n    ```\n\
    \    Button(\"Sheet\") {\n    $sheet.wrappedValue = true\n    }\n    ```\n\n2.\
    \  Add a .sheet modifier bound to the property and that returns a VStack.\n\n\
    \    ```\n    .sheet(isPresented: $sheet, content: {\n    VStack {\n    }\n  \
    \  })\n    ```\n\n3.  In the VStack, add a Text and Button to set the property\
    \ back to false.\n\n    ```\n    .sheet(isPresented: $sheet, content: {\n    VStack\
    \ {\n    Text (\"Tap to Dismiss\")\n    Button(\"Dismiss\") {\n    $sheet.wrappedValue\
    \ = false\n    }\n    }\n    })\n    ```\n\n```\n@State var sheet = false\n```\n\
    \nSetting the property back to false will cause the sheet to dismiss. The UI will\
    \ adapt to the device/screen space it’s running on. On the iPhone, it will look\
    \ like Figure [20-7](#497312_1_En_20_Chapter.xhtml#Fig7). In this case, dragging\
    \ down will also dismiss the sheet’s UI.\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig7_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig7_HTML.jpg)\n\
    \nFigure 20-7\n\nSheet UI Displayed on iPhone and iPad\n\nSheet is a good option\
    \ for displaying the UI more modal/fullscreen compared to Alert and ActionSheet.\
    \ It can certainly be much more custom since it just needs to implement a View."
  trans: "\n我们将向这个 `Text` 元素添加 `.alert` 修饰符。我们将使用接受 `item` 的初始化器，而不是 `isPresented`。该\
    \ `item` 需要遵循 `Identifiable` 协议。让我们创建一个符合该协议的结构体。\n\n1.  在 `ContentView` 结构体上方，创建一个名为\
    \ `User` 的新结构体，该结构体实现了 `Identifiable`。\n\n```\nstruct User : Identifiable {\n\
    \    var id = UUID()\n    var name = \"Test\"\n}\n```\n\n现在我们有了一个类型，可以在 `ContentView`\
    \ 中将其用作 `Optional` 属性。\n\n2.  向 `ContentView` 结构体添加一个可选的 `User` 类型属性。\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig3_HTML.jpg](img/497312_1_En_20_Fig3_HTML.jpg)\n\
    \n**图 20-3**\n\n包含两个警报的代码\n\n1.  在之前警报的取消按钮中，将 `user` 设置为 `User` 的一个实例。\n\n```\n\
    Alert(title: Text(\"警报!\"),\n    message: Text(\"你点击了按钮。\"),\n    primaryButton:\
    \ .default(Text(\"确定\")),\n    secondaryButton: .cancel({\n        self.user =\
    \ User()\n    })\n```\n\n最后三个步骤中的内容为我们创建警报奠定了基础。我们将使用 `user` 属性作为绑定，向 `Text` 元素添加一个\
    \ `.alert` 修饰符。当它在取消闭包中被设置为非 nil 时，警报将被触发。\n\n2.  向 `Text` 元素添加 `.alert` 修饰符。\n\
    \n```\nText(\"第二个\")\n.alert(item: $user) { (theUser) -> Alert in\n    Alert(title:\
    \ Text(\"取消?\"),\n          message: Text(\"\\(theUser.name)\")\n    )\n}\n```\n\
    \n现在 `body` 属性的代码看起来像图 20-3。\n\n```\n@State var user : User?\n```\n\n我们有一个绑定到\
    \ `user` 的 `.alert` 修饰符。当它被设置为非 nil 时，会调用闭包来创建 `Alert`。`user` 作为参数 `theUser` 传入。\n\
    \n标题是“取消?”，我们将消息设置为用户名。`Alert` 将使用自动提供的“确定”按钮来关闭它。\n\n由于 `User` 结构体的 `name` 属性有一个默认值\
    \ `Test`，所以警报看起来像图 20-4。\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig4_HTML.jpg](img/497312_1_En_20_Fig4_HTML.jpg)\n\
    \n**图 20-4**\n\n带有默认“确定”按钮的警报\n\n现在我们已经看到了 `.alert` 修饰符的两种绑定类型以及 `Alert` 的几个变体。\n\
    \n## 操作表修饰符\n\n`.actionSheet` 修饰符与 `.alert` 修饰符非常相似。它可以使用布尔值（`isPresented`）或可选项（`item`）的绑定。第二个参数是一个闭包，但它返回的是\
    \ `ActionSheet` 而不是 `Alert`。\n\n如果绑定值变为 `true`（对于布尔绑定）或非 nil（对于可选绑定），则会调用该闭包。\n\
    \n## 操作表\n\n创建 `ActionSheet` 类似于创建 `Alert`。你可以传入一个 `Text` 元素作为 `title` 参数。如果你只提供了\
    \ `title` 参数值，操作表会自动包含一个取消按钮来移除操作表。\n\n`message` 参数也是可选的 `Text` 类型。最后一个参数是一个按钮数组。你可以使用按钮的多种变体，如图\
    \ 20-5 所示。\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig5_HTML.jpg](img/497312_1_En_20_Fig5_HTML.jpg)\n\
    \n**图 20-5**\n\n操作表按钮的变体\n\n不带参数的取消按钮仅将操作表从用户界面中移除。`action` 参数允许你传入一个闭包，当按钮被点击时调用。其他所有按钮变体都需要一个用于在按钮上显示的\
    \ `Text` 元素，以及一个在按钮被点击时调用的可选闭包。\n\n操作表修饰符\n\n本练习基于上一个练习，并使用相同的项目。不过，新建一个项目也可以，因为本练习不依赖之前完成的任何内容。\n\
    \n1.  向 `ContentView` 添加一个新的布尔属性。\n\n2.  在 `VStack`（如果是新项目则在 `body` 中）添加一个 `Button`。该按钮的操作将步骤\
    \ 1 中的属性设置为 `true`。\n\n```\nButton(\"操作表\") {\n    $actionSheet.wrappedValue =\
    \ true\n}\n```\n\n3.  在 `Button` 的末尾添加一个 `.actionSheet` 修饰符。\n\n```\n.actionSheet(isPresented:\
    \ $actionSheet, content: {\n})\n```\n\n4.  从 `.actionSheet` 的 content 闭包中返回一个\
    \ `ActionSheet`。\n\n```\n.actionSheet(isPresented: $actionSheet, content: {\n\
    \    ActionSheet(title: Text(\"操作\"),\n                message: Text(\"开始!\"),\n\
    \                buttons:\n                    [.destructive(Text(\"删除\"))]\n\
    \    )\n})\n```\n\n```\n@State var actionSheet = false\n```\n\n运行代码会显示一个标题为“操作表”的按钮。当它被点击时，`actionSheet`\
    \ 属性被设置为 `true`。\n\n`.actionSheet` 修饰符绑定到该属性，并将被触发。\n\n然后，创建的 `ActionSheet` 会显示按钮，在本例中只有一个破坏性按钮，显示在屏幕上，如图\
    \ 20-6 所示。\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig6_HTML.jpg](img/497312_1_En_20_Fig6_HTML.jpg)\n\
    \n**图 20-6**\n\n带有一个按钮的操作表\n\n警报和操作表之间有一个虽小但重要的区别。警报通常限制为一到两个按钮，并且侧重于提供信息。操作表应该会导致某种“操作”发生：保存数据、在线发送信息、删除用户帐户，以及基于用户选择的其他功能。\n\
    \n## Sheet 修饰符\n\nSheet 与我们之前看到的 `Alert` 和 `ActionSheet` 类似。它接受一个布尔值（`isPresented`）或可选项（`item`）的绑定。它还有一个可选的闭包，名为\
    \ `onDismiss`。如果传入此闭包，则当操作表从用户界面中移除时，该闭包会被调用。\n\n最后一个参数是一个用于定义 Sheet 上用户界面的闭包。此闭包与\
    \ `body` 参数一样，返回一个实现了 `View` 的元素。所以它不是像 `Alert` 或 `ActionSheet` 这样的特定 UI 元素，而是任何实现了\
    \ `View` 的内容。\n\nSheet 修饰符\n\n同样，这是在之前项目的基础上构建的，但并非必须。\n\n1.  向 `ContentView`\
    \ 添加一个布尔属性，用于绑定到 Sheet。\n\n2.  添加一个按钮，将该属性设置为 `true`。\n\n```\nButton(\"Sheet\"\
    ) {\n    $sheet.wrappedValue = true\n}\n```\n\n3.  添加一个绑定到该属性的 `.sheet` 修饰符，并返回一个\
    \ `VStack`。\n\n```\n.sheet(isPresented: $sheet, content: {\n    VStack {\n   \
    \ }\n})\n```\n\n4.  在 `VStack` 中，添加一个 `Text` 和一个 `Button`，用于将属性设置回 `false`。\n\n\
    ```\n.sheet(isPresented: $sheet, content: {\n    VStack {\n        Text (\"点击以关闭\"\
    )\n        Button(\"关闭\") {\n            $sheet.wrappedValue = false\n       \
    \ }\n    }\n})\n```\n\n```\n@State var sheet = false\n```\n\n将属性设置回 `false` 将使\
    \ Sheet 关闭。UI 会适应其运行所在的设备/屏幕空间。在 iPhone 上，它看起来像图 20-7。在这种情况下，向下滑动也可以关闭 Sheet 的\
    \ UI。\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig7_HTML.jpg](img/497312_1_En_20_Fig7_HTML.jpg)\n\
    \n**图 20-7**\n\n在 iPhone 和 iPad 上显示的 Sheet UI\n\n与 `Alert` 和 `ActionSheet` 相比，Sheet\
    \ 是更模态化/全屏显示 UI 的一个不错选择。由于它只需要实现一个 `View`，因此显然可以更加自定义。\n"
- fmt: "# Popover Modifier\n\nPopover is created similar to what we’ve already seen\
    \ with alert, action sheet, and sheet. Like a `Sheet`, it takes a binding either\
    \ boolean (`isPresented`) or optional (`item`). It also takes a closure to return\
    \ the UI to display.\n\nOptionally, `.popover` takes an anchor point and arrow\
    \ edge parameters. The anchor point defines where the popover is attached. It\
    \ can be a point or a rect. The arrow edge specifies where the arrow of the popover\
    \ is displayed.\n\nFor smaller UI devices (e.g., iPhone), the popover will be\
    \ displayed modally and look like the Sheet in Figure [20-7](#497312_1_En_20_Chapter.xhtml#Fig7).\
    \ This is the case regardless of values for the anchor and arrow.\n\nIn some cases,\
    \ the layout will prevent the UI from respecting the anchor and arrow settings.\
    \ In that case, or if they aren’t provided, the system will decide how to display\
    \ the popover.\n\n**POPOVER MODIFIER**\n\nAgain, using the same project, we’ll\
    \ create a new property, button, and popover modifier.\n\n1. Add a new boolean\
    \ property to `ContentView` for binding to the `.popover` modifier.\n\n2. Add\
    \ a `Button` in the body `VStack` to set the property to `true`.\n\n    ```\n\
    \    Button(\"Popover\") {\n    $popover.wrappedValue = true\n    }\n    ```\n\
    \n3. Add a `.popover` modifier to the `Button` bound to the new property with\
    \ settings for the attachment anchor, arrow edge, and content that returns a `View`\
    \ conforming to the UI item.\n\n    ```\n    .popover(isPresented: $popover,\n\
    \    attachmentAnchor: .point(.trailing),\n    arrowEdge: .leading,\n    content:\
    \ {\n    Text(\"Popover! Here we are just...\")\n    .lineLimit(2)\n    .frame(width:\
    \ 300, height: 300,\n    alignment: .center)\n    })\n    ```\n\n```\n@State var\
    \ popover = false\n```\n\nOn iPhone and small devices/screens, it looks like a\
    \ `Sheet`, but on iPad/larger screens, it pops up with a context arrow as in Figure\
    \ [20-8](#497312_1_En_20_Chapter.xhtml#Fig8).\n\n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig8_HTML.jpg](images/497312_1_En_20_Chapter/497312_1_En_20_Fig8_HTML.jpg)\n\
    \n**Figure 20-8** Popover Displayed on iPhone and iPad\n\nPopovers are great for\
    \ displaying information contextually. If you have a message for the user based\
    \ on something in the UI, popover gives you a great option especially for the\
    \ iPad.\n\n# Chapter Summary\n\nAlerts, Action Sheets, Sheets, and Popovers are\
    \ all bound to a value and presented based on that value whether it’s a boolean\
    \ or `Identifiable`.\n\nThere’s a variety of options for how these items are displayed\
    \ in your app.\n\nThe `.alert` modifier returns an `Alert`. It can have one or\
    \ two buttons with or without closures.\n\nThe `.actionSheet` modifier returns\
    \ an `ActionSheet` which can have many buttons. If there are too many for the\
    \ screen size, it will scroll.\n\nFor the `.sheet` modifier, we have an `onDismiss`\
    \ closure. The UI for the `.sheet` isn’t a specific type. It’s just something\
    \ that implements a `View` so it can be an `HStack`, `VStack`, `Text`, or various\
    \ other elements.\n\nSimilar to `.sheet`, `.popover` has a closure that returns\
    \ something that conforms to `View`. In cases where the UI is smaller (e.g., iPhone\
    \ or iPad with only partial screen display), `.popover` and `.sheet` will appear\
    \ the same. But on larger UI instances, popover will be displayed near the tapped\
    \ UI like a callout. It may be to the side or top/bottom and have an arrow to\
    \ the initiating element.\n\n## Index\n\nA\n- `ActionSheet` modifier variations\n\
    - `.addTarget` function\n- `.alert` modifier\n- `allCases`\n- Animations\n- App\
    \ requirements\n- Asymmetric transition\n\nB\n- `@Binding`\n  - `ContentView`\
