    \ to use in filling in our circle. An easy way to create a Gradient instance is\
    \ by passing in some colors. The resulting Gradient will interpolate the variations\
    \ in between.\n\nTo fill our circle, we’ll use the .fill modifier. We pass in\
    \ something that conforms to the ShapeStyle protocol. Color does that, and we\
    \ can pass a color into .fill.\n\n```\nCircle().fill(Color.blue)\n```\n\nOther\
    \ structs that implement ShapeStyle are ForegroundStyle, ImagePaint, LinearGradient,\
    \ RadialGradient, and AngularGradient.\n\nADDING COLOR TO THE CIRCLE\n\nWe’re\
    \ going to create a gradient and fill in the circle. Now our animation will have\
    \ more life given a bit of definition to our element.\n\n1.  Create a gradient\
    \ as a property of the ContentView.\n\n    ```\n    struct ContentView: View {\n\
    \    @State var isToggled = false\n    let gradient = Gradient(colors:\n    [.purple,\
    \ .yellow,\n    .green])\n    ```\n\n2.  At the top of the body, above the VStack,\
    \ add a RadialGradient.\n\n    ```\n    var body: some View {\n    let radialGradient\
    \ = RadialGradient(gradient:\n    gradient,\n    center: .center,\n    startRadius:\
    \ 1.0,\n    endRadius: 250.0)\n    VStack {...\n    ```\n\n3.  Use the created\
    \ radial gradient in the previous step in a .fill modifier of the Circle instead\
    \ of the .foreground.\n\n    ```\n    Circle()\n    .fill(radialGradient)\n  \
    \  .bouncy(blurFactor: isToggled ? 5 : 0)\n    ```\n\nRun the app and see the\
    \ colors as in Figure [17-6](#497312_1_En_17_Chapter.xhtml#Fig6).\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig6_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig6_HTML.jpg)\n\
    \nFigure 17-6\n\nCircle with Radial Gradient After the Animation\n\n1.  Create\
    \ an AngularGradient below the radialGradient from step 2.\n\n    ```\n    let\
    \ angularGradient = AngularGradient(gradient:\n    gradient,\n    center: .center,\n\
    \    angle: .degrees(0))\n    ```\n\n2.  Use this new angularGradient in the .fill.\n\
    \n    ```\n    Circle()\n    .fill(angularGradient)\n    ```\n\nRun the app and\
    \ see the new color fill as in Figure [17-7](#497312_1_En_17_Chapter.xhtml#Fig7).\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig7_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig7_HTML.jpg)\n\
    \nFigure 17-7\n\nCircle with Radial Gradient After the Animation\n\nNow we have\
    \ more color in our circle to give it even more life.\n\n## Rotation\n\nRotating\
    \ UI elements is another common alteration. It’s also a good change for animation.\
    \ There are two modifiers we can use to rotate our circle easily.\n\nThe rotationEffect\
    \ modifier takes two parameters. The first parameter is the angle of rotation.\
    \ The second parameter is an optional point around which to rotate. The default\
    \ point is the center.\n\n```\n.rotationEffect(.degrees(90))\n```\n\nNOTE\n\n\
    We’ll add these rotation effects to the code in the next exercise.\n\nThe rotation3DEffect\
    \ also takes the angle of rotation and the axis of rotation. The anchor (default\
    \ to center), anchorZ (default to 0), and perspective (default to 1) have defaults\
    \ so they’re not required.\n\nThe axis specifies one or more axes to rotate around.\
    \ If we only specify the Z axis, it will behave just like the .rotationEffect.\n\
    \n```\n.rotation3DEffect(Angle(degrees: 90),\naxis: (x: 0, y: 0, z: 1))\n```\n\
    \nThe Z axis goes front and back. The X axis goes left and right. The Y axis goes\
    \ up and down.\n\nLet’s try some.\n\nADDING ROTATION\n\nWe’ll start with adding\
    \ rotation to spin our circle. Then we’ll add 3D rotation and see some real action.\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig8_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig8_HTML.jpg)\n\
    \nFigure 17-8\n\nCircle After the Animation\n\n1.  Add .rotationEffect after our\
    \ custom .bouncy modifier.\n\nBase the rotation on the isToggled property.\n\n\
    ```\n    Circle()\n    .fill(angularGradient)\n    .bouncy(blurFactor: isToggled\
    \ ? 5 : 0)\n    .rotationEffect(.degrees(isToggled ? 90 : 0))\n    ```\n\nRun\
    \ the app and see that the circle rotated like Figure [17-8](#497312_1_En_17_Chapter.xhtml#Fig8).\n\
    \n1.  Remove the .rotationEffect and use the .rotation3DEffect instead but only\
    \ for the Z axis.\n\n```\n.rotation3DEffect(Angle(degrees: isToggled ? 90 : 0),\n\
    axis: (x: 0, y: 0, z: 1))\n```\n\nRun the app and the result should look the same\
    \ as Figure [17-7](#497312_1_En_17_Chapter.xhtml#Fig7).\n\n1.  Change the axis\
    \ to the X axis (zeroes for the other two).\n\n```\n    .rotation3DEffect(Angle(degrees:\
    \ isToggled ? 90 : 0),\n    axis: (x: 1, y: 0, z: 0))\n    ```\n\nIf you run the\
    \ app, you’ll see the animation partially flips the circle to be flat and not\
    \ visible.\n\nUsing the Y axis does the same except it flips it in the other direction.\n\
    \n2.  Use all three axes in the rotation call and change the angle to 300.\n\n\
    ```\n    .rotation3DEffect(Angle(degrees:\n    isToggled ? 300 : 0),\n    axis:\
    \ (x: 1, y: 1, z: 1))\n    ```\n\nRunning the code now shows a bit more action.\
    \ It’s a bit fast so let’s slow it down.\n\n3.  Add an animation after the .rotation3DEffect\
    \ with spring and a speed setting.\n\n```\n.animation(.spring().speed(0.1))\n\
    ```\n\nIf you get an error, it’s because the compiler can’t determine the context.\
    \ Add “Animation” before .spring to help out.\n\n```\n.animation(Animation.spring().speed(0.1))\n\
    ```\n\nSpeed takes a multiplier for the animation time. Using 0.10 causes the\
    \ animation to take 10% of whatever speed is related to the animation. The default\
    \ animation is 0.37 so our rotation should take about 4 seconds.\n\nThe end result\
    \ should look like Figure [17-9](#497312_1_En_17_Chapter.xhtml#Fig9).\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig9_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig9_HTML.jpg)\n\
    \nFigure 17-9\n\nCircle After a 3D Rotation\n\nWe now have three animations in\
    \ our app. The first is an implicit animation in the Button action to animate\
    \ the change in the toggle property. This animates the Text for the “Toggled”\
    \ element.\n\nAnother animation handles the BouncyModifier. It uses .spring with\
    \ a parameter for the damping fraction.\n\nThe third animation is on our rotation\
    \ 3D effect where we use .spring and .speed.\n\nLet’s make one more change to\
    \ the animation of the rotation.\n\n1.  Change the .spring and .speed calls to\
    \ a .linear with a duration of 0.75 seconds.\n\n```\n    Circle()\n    .fill(angularGradient)\n\
    \    .bouncy(blurFactor: isToggled ? 5 : 0)\n    .rotation3DEffect(Angle(degrees:\n\
    \    isToggled ? 300 : 0),\n    axis: (x: 1, y: 1, z: 1))\n    .animation(.linear(duration:\
    \ 0.75))\n    ```\n\nThe appearance at the end of the animation is the same as\
    \ before. However, the animation is a set time (not relative with a multiplier).\
    \ You may notice the start and stop of the rotation are a bit static. Linear doesn’t\
    \ speed up and slow down during the animation curve."
  trans: "\n# 渐变\n\n让我们为圆形添加一些颜色。我们可以创建一个渐变来填充圆形。创建 `Gradient` 实例的一个简单方法是传入一些颜色。生成的\
    \ `Gradient` 会在颜色之间进行插值过渡。\n\n要填充我们的圆形，我们将使用 `.fill` 修饰符。我们传入一个符合 `ShapeStyle`\
    \ 协议的内容。`Color` 符合该协议，因此我们可以将一个颜色传入 `.fill`。\n\n```\nCircle().fill(Color.blue)\n\
    ```\n\n其他实现了 `ShapeStyle` 协议的结构体包括 `ForegroundStyle`、`ImagePaint`、`LinearGradient`、`RadialGradient`\
    \ 和 `AngularGradient`。\n\n## 为圆形添加颜色\n\n我们将创建一个渐变并填充圆形。现在，通过为元素增加一些细节定义，我们的动画会变得更有活力。\n\
    \n1.  在 `ContentView` 中创建一个渐变属性。\n\n    ```\n    struct ContentView: View {\n\
    \    @State var isToggled = false\n    let gradient = Gradient(colors:\n    [.purple,\
    \ .yellow,\n    .green])\n    ```\n\n2.  在 `body` 的顶部，`VStack` 之上，添加一个 `RadialGradient`。\n\
    \n    ```\n    var body: some View {\n    let radialGradient = RadialGradient(gradient:\n\
    \    gradient,\n    center: .center,\n    startRadius: 1.0,\n    endRadius: 250.0)\n\
    \    VStack {...\n    ```\n\n3.  使用上一步创建的径向渐变，在 `Circle` 的 `.fill` 修饰符中替换掉 `.foreground`。\n\
    \n    ```\n    Circle()\n    .fill(radialGradient)\n    .bouncy(blurFactor: isToggled\
    \ ? 5 : 0)\n    ```\n\n运行应用，查看如图 17-6 所示的颜色效果。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig6_HTML.jpg](img/497312_1_En_17_Fig6_HTML.jpg)\n\
    \n图 17-6 — 动画后的径向渐变圆形\n\n1.  在第二步的 `radialGradient` 下方，创建一个 `AngularGradient`。\n\
    \n    ```\n    let angularGradient = AngularGradient(gradient:\n    gradient,\n\
    \    center: .center,\n    angle: .degrees(0))\n    ```\n\n2.  在 `.fill` 中使用这个新的\
    \ `angularGradient`。\n\n    ```\n    Circle()\n    .fill(angularGradient)\n  \
    \  ```\n\n运行应用，查看如图 17-7 所示的新颜色填充效果。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig7_HTML.jpg](img/497312_1_En_17_Fig7_HTML.jpg)\n\
    \n图 17-7 — 动画后的径向渐变圆形\n\n现在我们的圆形有了更多颜色，使其更具活力。\n\n## 旋转\n\n旋转 UI 元素是另一种常见的变换。它也是动画的一个很好的变化点。我们可以使用两个修饰符来轻松旋转圆形。\n\
    \n`rotationEffect` 修饰符接受两个参数。第一个参数是旋转的角度。第二个参数是可选的旋转中心点。默认的中心点是圆心。\n\n```\n.rotationEffect(.degrees(90))\n\
    ```\n\n注意：我们将在下一个练习中将这些旋转效果添加到代码中。\n\n`rotation3DEffect` 同样接受旋转角度和旋转轴。`anchor`（默认为中心）、`anchorZ`（默认为\
    \ 0）和 `perspective`（默认为 1）都有默认值，因此不是必需的。\n\n轴参数指定要围绕旋转的一个或多个轴。如果我们只指定 Z 轴，它的行为将和\
    \ `.rotationEffect` 一样。\n\n```\n.rotation3DEffect(Angle(degrees: 90),\naxis: (x:\
    \ 0, y: 0, z: 1))\n```\n\nZ 轴是前后方向。X 轴是左右方向。Y 轴是上下方向。\n\n让我们尝试一些操作。\n\n### 添加旋转效果\n\
    \n我们首先添加旋转来让圆形旋转起来。然后我们再添加 3D 旋转，看看真正的效果。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig8_HTML.jpg](img/497312_1_En_17_Fig8_HTML.jpg)\n\
    \n图 17-8 — 动画后的圆形\n\n1.  在我们自定义的 `.bouncy` 修饰符之后添加 `.rotationEffect`。\n\n    基于\
    \ `isToggled` 属性进行旋转。\n\n    ```\n        Circle()\n        .fill(angularGradient)\n\
    \        .bouncy(blurFactor: isToggled ? 5 : 0)\n        .rotationEffect(.degrees(isToggled\
    \ ? 90 : 0))\n    ```\n\n    运行应用，可以看到圆形像图 17-8 那样旋转了。\n\n2.  移除 `.rotationEffect`，改用\
    \ `.rotation3DEffect`，但仅针对 Z 轴。\n\n    ```\n    .rotation3DEffect(Angle(degrees:\
    \ isToggled ? 90 : 0),\n    axis: (x: 0, y: 0, z: 1))\n    ```\n\n    运行应用，结果应该与图\
    \ 17-7 看起来一样。\n\n3.  将轴改为 X 轴（其他两个轴设为 0）。\n\n    ```\n        .rotation3DEffect(Angle(degrees:\
    \ isToggled ? 90 : 0),\n        axis: (x: 1, y: 0, z: 0))\n    ```\n\n    如果你运行应用，会看到动画将圆形部分翻转，使其变平并不可见。\n\
    \n    使用 Y 轴会产生相同的效果，只是它会向另一个方向翻转。\n\n4.  在旋转调用中使用所有三个轴，并将角度改为 300。\n\n    ```\n\
    \        .rotation3DEffect(Angle(degrees:\n        isToggled ? 300 : 0),\n   \
    \     axis: (x: 1, y: 1, z: 1))\n    ```\n\n    现在运行代码会显示出更多的动作。它有点快，所以我们来放慢速度。\n\
    \n5.  在 `.rotation3DEffect` 之后添加一个带有 `.spring` 和速度设置的动画。\n\n    ```\n    .animation(.spring().speed(0.1))\n\
    \    ```\n\n    如果出现错误，是因为编译器无法确定上下文。在 `.spring` 前面加上 `Animation` 来帮助解决。\n\n \
    \   ```\n    .animation(Animation.spring().speed(0.1))\n    ```\n\n    `speed`\
    \ 接收一个动画时间乘数。使用 `0.10` 会使动画耗时变为与动画本身速度相关的 10%。默认动画耗时是 `0.37` 秒，所以我们的旋转应该大约需要 4\
    \ 秒钟。\n\n最终结果应该如图 17-9 所示。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig9_HTML.jpg](img/497312_1_En_17_Fig9_HTML.jpg)\n\
    \n图 17-9 — 3D 旋转后的圆形\n\n现在我们应用中有三个动画。第一个是在按钮动作中的隐式动画，用于为切换属性的变化添加动画效果。这为“Toggled”元素的文本添加了动画。\n\
    \n另一个动画处理了 `BouncyModifier`。它使用带阻尼分数参数的 `.spring`。\n\n第三个动画作用于我们的 3D 旋转效果，我们使用了\
    \ `.spring` 和 `.speed`。\n\n让我们对旋转动画再做一处修改。\n\n6.  将 `.spring` 和 `.speed` 调用改为一个持续时间为\
    \ `0.75` 秒的 `.linear`。\n\n    ```\n        Circle()\n        .fill(angularGradient)\n\
    \        .bouncy(blurFactor: isToggled ? 5 : 0)\n        .rotation3DEffect(Angle(degrees:\n\
    \        isToggled ? 300 : 0),\n        axis: (x: 1, y: 1, z: 1))\n        .animation(.linear(duration:\
    \ 0.75))\n    ```\n\n动画结束时的外观和之前一样。然而，动画耗时是固定的（不是带乘数的相对时间）。你可能会注意到旋转的开始和停止略显生硬。线性动画在动画过程中不会加速或减速。\n"
- fmt: "## `DrawingGroup`\n\nOur circle is drawing and animating very well. However,\
    \ if we’re trying to do a large number of animations at the same time, it may\
    \ take a performance hit.\n\nLet’s say we put 100 of our circles on the screen.\
    \ That’s a lot of animation: rotation, shadow, scale, and blur.\n\nUsing a drawing\
    \ group can help with performance here. If we put all of the circles in a drawing\
    \ group, it will render the `View` offscreen first and then put it on the screen.\
    \ This is a faster method of rendering.\n\nAlso, drawing groups use the Metal\
    \ framework in the background. This works more directly with the GPU for faster\
    \ graphic processing.\n\n### USING METAL IN SWIFT\n\nIn this exercise, we’ll add\
    \ 100 circles to our UI. We’ll do this in two stacks, but otherwise the code will\
    \ stay the same. The performance will take a big hit during the animation. We’ll\
    \ solve this by using a drawing group.\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig10_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig10_HTML.jpg)\n\
    \nFigure 17-10  \nOne Hundred Circles in the UI\n\n1.  Replace your single circle\
    \ with 100 circles. To do this, use a `VStack` with a `ForEach` with a range of\
    \ zero to nine. Inside the `VStack`, create an `HStack` with another zero to nine\
    \ `ForEach`. Inside that nested `ForEach`, create the circle.\n\n    ```swift\n\
    \    VStack {\n        ForEach(0..<10, id: \\.self) { index in\n            HStack\
    \ {\n                ForEach(0..<10, id: \\.self) { index2 in\n              \
    \      Circle()\n                        .fill(angularGradient)\n            \
    \            .bouncy(blurFactor: self.isToggled ? 5 : 0)\n                   \
    \     .rotation3DEffect(Angle(degrees: self.isToggled ? 300 : 0), axis: (x: 1,\
    \ y: 1, z: 1))\n                        .animation(.linear(duration: 0.75))\n\
    \                }\n            }\n        }\n    }\n    ```\n\n    Run the app\
    \ and verify 100 circles are added to the UI as in Figure [17-10](#497312_1_En_17_Chapter.xhtml#Fig10).\
    \ You’ll notice the circles are much smaller. However, our shadow setting is still\
    \ quite high. This causes the shadows to blend together and cover much of the\
    \ screen.\n\n    If you tap the Toggle button, notice the jittery animation.\n\
    \n2.  Add `.drawingGroup` to the outer `VStack` (created in step 1) of the circles\
    \ that you added in step 1.\n\n    ```swift\n    ...}.drawingGroup()\n    ```\n\
    \n    Run the app again and notice how much smoother it animates.\n\n### Chapter\
    \ Summary\n\nIn this chapter, we looked at a lot of UI aspects. We started by\
    \ learning about Transitions for adding/removing items to/from the UI. For animating\
    \ transitions, we looked at various types of Transitions and the `.animation`\
    \ modifier.\n\nTo combine animations, we used asymmetric transitions with the\
    \ `.combine` function on a `Transition`. Once our transition was the way we wanted\
    \ it, we moved it into a static computed property in an extension on `AnyTransition`.\n\
    \nWe expanded our UI with a `Circle` and learned some new modifiers for scaling,\
    \ shadows, and blurring. Animating those based on the toggle value was done via\
    \ the `.animation` call.\n\nOur combination of modifiers was moved to a `ViewModifier`\
    \ struct called `BouncyModifier`. We also defined a function in an extension of\
    \ `View` to create the `BouncyModifier`. That modifier was added to our `Circle`\
    \ instead of all the code right in place.\n\nUsing the `ViewModifier` also makes\
    \ the effects reusable in other places in our code.\n\nDefining and using gradients\
    \ gave our circle more definition. And adding animation gave it more life. We\
    \ explored various options for animation including the curve, timing, spring,\
    \ and axes in 3D space.\n\nWe improved the performance for the 100 circles with\
    \ a drawing group that uses the Metal framework.\n\nPutting this all together\
    \ shows the various approaches to animation and changes you can make to UI elements.\
    \ These same types of modifiers and animation can be applied to a `Text`, `Button`,\
    \ or other visual elements.\n\n# 18. App Including WatchKit\n\nIn this chapter,\
    \ we’re going to build a small but functional app. We want to go through this\
    \ exercise so we know we can do it end to end.\n\nWe’re going to build a tip calculator.\
    \ It’s my “go-to” project most of the time – partially because the requirements\
    \ are basically built into the name.\n\nIt’s a good exercise for having to get\
    \ user input, manipulate it in some way (functionality), and update the UI. Of\
    \ course, the input data we need are the bill amount and tip percentage.\n\nThere\
    \ are many ways we can get this information from the user: textfields, pickers,\
    \ sliders, and more. We’ll use a `TextField` for the bill amount and a `Picker`\
    \ for the tip percentage.\n\nThe functionality will be simple. In fact, we won’t\
    \ even need a function or closure in the normal sense. We can use computed properties\
    \ instead.\n\nWe want the UI to look like Figure [18-1](#497312_1_En_18_Chapter.xhtml#Fig1).\n\
    \n![../images/497312_1_En_18_Chapter/497312_1_En_18_Fig1_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1  \nTip Calculator UI\n\nFeel free to try to write the app now without\
    \ looking further. Or read the next sections on properties and UI design and then\
    \ try it. See if you can apply the binding, UI elements, and other things you’ve\
    \ learned.\n\n### Properties\n\nAs I mentioned earlier, we need two pieces of\
    \ input: bill amount and tip percentage. These will be our properties wrapped\
    \ in `@State` property wrappers and updated as the input changes.\n\nWe’ll also\
    \ have a property for the array of tip percentages for the user to choose from.\n\
    \nDisplaying the values to the users means we have to calculate the values. This\
    \ can be done in computed properties. We need at least two: tip amount and total.\n\
    \nAlso, the output should be displayed as formatted for currency. The `NumberFormatter`\
    \ class works well for this. We can have another computed property to create and\
    \ configure a `NumberFormatter`."
