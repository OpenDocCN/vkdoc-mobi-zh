    \ There’s a few other things we want to look at animating.\n\nVarious modifier\
    \ changes can be animated. Some common ones might be size/scale, color, shadow,\
    \ rotation, and blur.\n\nAnimations on modifiers can be done with implicit or\
    \ explicit animations. Also, you can set different implicit animation modifiers\
    \ on different changes.\n\nANIMATING CHANGES\n\nIn this exercise, we’ll look at\
    \ animating various changes to UI elements.\n\n1.  At the bottom of the VStack,\
