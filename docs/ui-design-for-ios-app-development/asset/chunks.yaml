  trans: "\n# 环境值\n\n使用 SwiftUI 可以轻松获取各种环境值。如果您的界面基于这些值，那么更改这些值将使当前视图失效。这意味着会为用户创建并渲染一个新视图。综上所述，这意味着您界面中使用的值的更改将触发必要的更新。\n\
    \nSwiftUI 提供了可从环境中访问的丰富值列表。这些值涵盖辅助功能设置、配色方案、控件属性，甚至 CoreData 等领域。\n\n您可以在此处查看\
    \ SwiftUI 中所有可用的变量：[`https://developer.apple.com/documentation/swiftui/environmentvalues`](https://developer.apple.com/documentation/swiftui/environmentvalues)。\n\
    \n让我们以配色方案为例进行简单说明。要在代码中访问该值，我们需要为变量使用 `@Environment` 属性包装器。我们指定所需特定值的键路径。代码如下所示：\n\
    \n```\n@Environment(\\.colorScheme) var lightOrDark\n```\n\n现在，我们将配色方案值存储在一个名为\
    \ `lightOrDark` 的属性中。在我们的界面中，我们可以根据此值调整界面。然后，如果该值发生变化，我们的界面就会更新。\n\n假设我们希望按钮标题“更新”在普通模式下为蓝色，在深色模式下为绿色。现在，我们可以使用\
    \ `lightOrDark` 的值来确定这一点。\n\n使用上一章的项目，我将使用 `lightOrDark` 来设置强调色。\n\n```\nText\
    \ (\"更新\")\n.accentColor(lightOrDark == .light ?\n.blue : .green)\n```\n\n在模拟器中运行时，如果深色模式关闭，界面将显示一个蓝色标题的按钮。如果我们在支持深色模式的模拟器/设备上切换到深色模式（⇧⌘A），按钮将切换到绿色，如图\
    \ 6-1 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig1_HTML.jpg](img/497312_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1\n\n界面更新为深色模式\n\n我们的 `Text` 项目是使用默认设置创建的。默认情况下，它使用系统标签颜色。该颜色会根据深色模式设置而变化。如果您检查或打印出\
    \ `UIColor.label.cgColor`，它也会根据当前的深色模式设置而变化。\n\n这两个 `Text` 项目会自动更新。按钮文本项目也是如此。因此，默认情况下，这些项目会根据深色模式设置进行更新。或者，我们也可以像前面的代码那样，以自定义方式处理。\n\
    \n## 每个视图的设置\n\n每个视图都继承其父视图的环境设置。但是，您可以在创建视图时覆盖这些设置。\n\n我们的 `Button` 有一个用于标题的\
    \ `Text` 项目。在上一节中，我们根据 `lightOrDark` 值设置了该标题的颜色。对于当前我们整个（小型）应用，我们都在使用相同的环境设置。\n\
    \n当我们的 `ContentView` 被创建时，环境被继承并传播到它的所有视图：`Text`、`Button` 等等。但是，我们可以改变这一点。我们可以在创建视图时修改环境。\n\
    \n要修改环境，我们在视图创建的返回值上使用 `.environment` 修饰符。假设我们想强制我们的顶部 `Text` 项目始终处于深色模式。当然，当背景为白色时，白色文本将不可见，因此我还会添加一个灰色的背景修饰符。\n\
    \n```\nText(note.text)\n.environment(\\.colorScheme, .dark)\n.background(Color.gray)\n\
    ```\n\n我使用 `.environment` 修饰符指定配色方案的键路径和一个值（即 `.dark`）。该枚举的另一个值选项是 `.light`。现在，界面强制此\
    \ `Text` 使用深色模式。运行应用并切换到深色模式，看起来如图 6-2 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig2_HTML.jpg](img/497312_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2\n\n界面更新为深色模式\n\n使用方法链，我们可以同时调用 `.environment` 和 `.background` 修饰符。类似地，我们可以调用多个\
    \ `.environment` 修饰符并更改不同的值。\n\n这些更改随后将被该视图创建的所有子视图继承。在我们的例子中，这似乎不适用。然而，我们无法控制\
    \ `Text`，也不知道它创建了什么。如果我们查看视图层次结构渲染（调试 ➤ 视图调试… ➤ 捕获视图层次结构），如图 6-3 所示，我们会发现 `Text`\
    \ 项目可能比我们想象的更复杂。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig3_HTML.jpg](img/497312_1_En_6_Fig3_HTML.jpg)\n\
    \n图 6-3\n\n界面的 3D 渲染\n\n这里值得学习的一点是，外观可能比看起来更复杂。因此，虽然仅设置一个值（例如 `accentColor`）可能看似可行，但您应该考虑核心更改应该是什么（例如\
    \ `colorScheme`）。\n\n早些时候，我们研究了将环境设置传递到 `Text` 元素中。如果我们先将界面的一部分提取到单独的结构体中，也可以做同样的事情。\n\
    \n注意 带环境的视图\n\n在本练习中，我们将提取显示 `Note` 的界面项。我们将它们放入一个新的 `View` 中，并让该结构体控制笔记详细信息的显示。\n\
    \n然而，我们希望创建元素（即我们应用中的 `ContentView`）来控制环境。除了 `Note` 实例和 `.environment` 修饰符之外，我们不希望\
    \ `ContentView` 控制新创建的 `NoteView` 的界面其他方面。\n\n在浅色（左）和深色（右）模式下，我们希望界面看起来如图 6-4\
    \ 所示。\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig4_HTML.jpg](img/497312_1_En_6_Fig4_HTML.jpg)\n\
    \n图 6-4\n\n浅色（左）和深色（右）模式下的 NoteView\n\n您可以尝试在查看以下步骤和代码之前自行解决。简而言之，您需要将与 `Note`\
    \ 相关的界面元素放入一个符合 `View` 协议的新 `NoteView` 结构体中。将 `.environment` 修饰符分开，并在新创建的 `NoteView`\
    \ 元素上调用它。\n\n1.  创建一个名为 `NoteView` 的新结构体，使其符合 `View`：\n\n```\n    struct NoteView\
    \ : View {\n    }\n```\n\n2.  在 `NoteView` 中添加一个包含 `VStack` 的计算属性 `body`：\n\n\
    ```\n    var body: some View {\n    VStack {\n    }\n    }\n```\n\n3.  在 `VStack`\
    \ 的底部，添加 `.background` 修饰符：\n\n1.  将 `ContentView` 的 `body` 中的两个 `Text` 元素和包含\
    \ `Image` 项目的 `HStack` 剪切并粘贴到 `NoteView` 的 `VStack` 中。\n"
- fmt: "```swift\nText(note.text)\nText(df.string(from: note.updatedAtTime))\nHStack\
