    # 重点来了


    我希望你已经开始明白这部分是如何运作的了。代码和用户界面 —— 砰 —— 合为一体！用户界面由代码构建而成，而不是像过去那样，你实例化一个按钮、设置其属性，然后将其添加到屏幕上（图
    2-15）。


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig15_HTML.jpg](img/497312_1_En_2_Fig15_HTML.jpg)


    **图 2-15** – 底部带有附加文本的用户界面


    现在，框架内嵌了代码，期望你通过代码来实现用户界面。由于 `View` 协议等机制的存在，一个计算属性 `body` 会返回“`some View`”，并且该视图会被显示出来。


    因此，我们必须实现该协议，返回一个符合 `View` 协议的内容。`Text` 和其他元素都符合该协议，所以我们可以创建这些元素并返回它们。


    此外，单表达式闭包会自动返回该表达式的结果。所以，我们直接开始编码吧！


    无论我们创建一个 `Text` 元素，还是一个包含子元素的 `VStack` 或 `HStack`，它们都会被返回。


    对于创建的元素，我们可以添加修改器来更改颜色、间距、字体、内边距等。这些修改既可以在代码中添加，也可以通过检查器面板完成。


    `SwiftUI Inspector` 可以通过菜单栏使用 **⌘ + 点击** 来显示，或者直接使用 **⌃⌥ + 点击** 打开。


    `Attributes Inspector` 通过右侧面板（检查器）显示，并选中 `Attributes Inspector` 标签页按钮。在用户界面或代码中选中的每个元素，都会显示其相关的属性。在某些情况下，在代码中选中元素效果最佳。


    # 用户界面练习


    我希望你使用现有的项目（或者创建一个新项目），并使用户界面看起来像下图所示（图 2-16）。


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig16_HTML.jpg](img/497312_1_En_2_Fig16_HTML.jpg)


    **图 2-16** – 练习的用户界面


    接下来，我会给你一些提示，然后给出解决方案。但首先，请尝试通过添加元素和修改器来重现这个界面，看看你是否能调整出正确的效果。


    文本本身也包含一些提示。


    以下是提示：


    *   所有三个元素都是 `Text` 元素。这一点没有新意。

    *   第二个元素只有一个修改器：`.border`

    *   第三个元素有两个文本中提到的修改器：`.padding` 和 `.opacity`

    *   三个元素都包含在一个 `VStack` 中。


    我希望你在添加元素和修改器的练习中有所收获。我想鼓励你总是去尝试。试着添加像 `Blur` 或 `Shadow` 这样的修改器，看看效果如何。


    以下是解决方案代码：


    ```

    VStack {

    Text("Notes")

    .fontWeight(.bold)

    .foregroundColor(Color.white)

    .padding(30.0)

    .frame(width: 300.0, height: 50.0)

    .background(Color.blue)

    .cornerRadius(15.0) Text("This has a red border.")

    .border(Color.red, width: 1)

    Text("This has a black background but opacity of 0.5\. It has multiple lines but
    doesn''t go off the screen and is left justified. It also has some padding to
    keep from the edges and the item above.")

    .foregroundColor(Color.white)

    .background(Color.black)

    .multilineTextAlignment(.leading)

    .opacity(0.5)

    .padding(45)

    }

    ```


    # 章节总结


    在本章中，我们探讨了从其他概念转向 SwiftUI 时所需的思想转变。SwiftUI 的代码*就是*用户界面，就像过去的 nib/xib/storyboard
    XML 是用户界面一样。


    我们学习了 `View` 协议以及该类型中定义的 `body` 计算属性。


    我们检查了一个单视图应用的模板定义。`ContentView` 结构体通过一个包含 `Text` 元素的单表达式闭包实现了 `View` 协议。


    使用 `SwiftUI Inspector` 和 `Attributes Inspector`，我们看到了如何在修改器上添加和更改值。并且，通过弹出菜单，我们了解了如何将一个元素嵌入到
    `VStack` 或 `HStack` 中。


    在下一章中，我们将超越基础的 `Text` 元素，使用更广泛的、为 UI 开发提供的各种 UI 元素。


    # 3. SwiftUI 构建块


    在本章中，我们将介绍 SwiftUI 提供的各种构建块。与 UIKit 一样，SwiftUI 也提供了各种元素，我们可以用来构建用户界面。我们已经见过了 `Text`
    UI 元素。那仅仅是个开始。


    ## 老友与新交


    如果你之前使用过 Xcode 进行开发，你可能已经熟悉许多标准的 UI 元素。`Switch`、`Segmented Control`、`Picker View`
    等长期以来一直是我们的好朋友。


    别担心——你依然会见到它们。不过，你将用不同的方式来创建它们。当然，是的，它会在代码中完成。但它也将采用更声明式的方法。所谓声明式，是指你将告诉 SwiftUI
    *做什么*，但不一定需要告诉它*怎么做*。


    让我们来看看 `Button`。'
- fmt: '# Button


    Nearly every UI includes a button somewhere. The user taps on it and code is executed.
    Simple. It implies the functionality to a degree. Buttons primarily need two things:
    what code to call when tapped and what to display on the button (text, image,
    or both).


    So let’s do that now!


    ## Create a Button in the UI


    In this exercise, we’ll add a button to the UI using the keyword `Button`. We’ll
    call an initializer to pass in what code to call and what to display on the button.
    In this case, we’ll use text.


    ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig2_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig2_HTML.jpg)


    Figure 3-2: Button Auto-complete Code


    ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig1_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig1_HTML.jpg)


    Figure 3-1: Computed Property Body Contents


    1. Open a project (existing or new) and click the `ContentView.swift` file for
    editing. I’m using existing code, and my `body` property currently looks like
    Figure 3-1. I have a `VStack` vertically wrapping two `Text` items.


    I want to add a button between the two `Text` items with code to call right inline
    where I define it. You can also provide a method name to call instead of creating
    a closure.


    2. Type `Button(ac` (This awkward looking text specifies which `Button` initializer
    we want for code completion.) below line 21 (Figure 3-2). Notice the two parameters
    for the `action` (code to call) and `label` (what to display – implements protocol
    `View` which we discussed in the previous chapter). Press Return to auto-complete
    the code.


    For the code, we’ll define it inline, so tab until the code placeholder (`() ->
    Void`) is highlighted (blue in my case) and press return to stub out the closure.


    We don’t want to run any real functionality yet so we’ll just put in some dummy
    code.


    3. Type `print("tapped!")` in the body of the closure (replacing the `code` placeholder).


    The second parameter, `Label`, is a generic in `Button` required to implement
    the `View` protocol. We saw this in the last chapter with the `Text` item. Similarly,
    its modifiers return that type so we can chain them together.


    We might want to display an image on the button or a variety of other items. But
    text is common so we’ll use a `Text` element.


    4. Replace the second parameter placeholder with a single expression closure returning
    a `Text` item. This implements the `View` protocol so it matches the return type.


    The code now between the two previous `Text` items should look like this:


    ```

    Button(action: {

    print ("tapped!")

    }, label: { Text("Tap Me") })

    ```


    The preview should also now include a button between the two preexisting `Text`
    items. Notice that the `VStack` is just placing the items in top-down order.


    We can expect that if we run this code (⌘R) in the simulator or on a device, we
    can tap this new button (Figure 3-3). Also, we should see the output (`tapped!`)
    printed to the debug output console.


    ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig3_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig3_HTML.jpg)


    Figure 3-3: UI as Designed


    5. Give it a shot! Run it and tap the button for the output.


    ## What Did We Do in This Exercise?


    In an existing (or new) project, we added a button. To create the button, we used
    the `Button` struct initializer with two parameters.


    The first parameter is the closure (inline or method name) that takes no parameters
    and returns no value. The second parameter implements `View` – this is the visual
    part(s) of the button. We used `Text` which, as we saw in the previous chapter,
    satisfies that requirement.


    The preview shows our new button, and executing the code allows us to tap the
    button and see the output. Easy!


    **Bonus**: I encourage you to play around with the various modifiers on the button.
    You can apply modifiers to the button itself or the second parameter UI item (the
    `Text` item in our case). See what the rotation effect (`.rotationEffect`) does
    – you can use `.degrees` to create the angle to pass in.


    ## Button Parameters


    We saw that a `Button` takes two parameters: `action` and `label`. `Action` is
    the closure for the code to execute when the button is tapped. `Label` is a closure
    that returns the UI (something that implements the `View` protocol) to display
    on the `Button` (typically a `Text` or `Image`).


    Let’s look at `Image` next.


    # Image


    Another common user interface item is something that will display an image. In
    UIKit, it’s `UIImageView`. With SwiftUI, it’s named `Image` and it implements
    the `View` protocol. Just like `Text` or `Button` items, an `Image` can be returned
    as a `View` return type.


    ## SF Symbols


    To display an image, we start by typing `Image`. We have a few options after that
    including providing the `name` (the image file’s name from an Assets catalog)
    and `systemName` (see more information about SF Symbols here: [https://developer.apple.com/design/human-interface-guidelines/sf-symbols/overview/](https://developer.apple.com/design/human-interface-guidelines/sf-symbols/overview/)).


    Let’s create an `Image` item using the system name `camera`.


    ### Add an Image


    In this exercise, we’ll add an image to our UI with the `Image` struct. This,
    like the past items we’ve seen, implements the `View` protocol.


    1. Open a project (existing or new) and click the `ContentView.swift` file for
    editing. I’m using the existing code from the last exercise.


    2. Add an `Image` item at the bottom of the `body` property using the initializer
    that takes a system image name. Pass in `camera` for the parameter value. The
    code should look like this:


    ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig4_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig4_HTML.jpg)


    Figure 3-4: Camera Image in the UI


    3. Resume the preview if necessary and verify the image is displayed (Figure 3-4).


    ```

    Image(systemName: "camera")

    ```


    Your UI should now have an image displayed. If you used the existing code, your
    UI should have the image below the other visual elements.


    Feel free to add more `Image` items and use another system image names. Add an
    image to your `Assets.xcassets` catalog and display it with code like this:


    ```

    Image("brainwashIcon")

    ```


    You may also want to set its size. Use the `Resizable` modifier and then the `Frame`
    modifier to set the size:


    ```

    Image("brainwashIcon")

    .resizable()

    .frame(width: 100, height: 100,

    alignment: .center)

    ```


    Also, experiment with various modifiers. Check out the `Color Invert` modifier
    (`.colorInvert()`). Notice there are initializers for the `Image` that take other
    values including `Text`. See what those do!


    ## Image Creation


    The core ability to display an image is based on specifying which image to display.
    We created an image using a system name (SF Symbols). You can also create an image
    with a name of an image from an assets catalog. There are other options and modifiers
    you can use to customize the appearance.'
