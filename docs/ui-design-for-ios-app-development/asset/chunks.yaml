    $statusData\n.flatMap{ data in\nreturn Just(data)\n.decode(type: [UserStatus].self,\n\
    decoder: JSONDecoder())\n.catch { _ in\nreturn Just(self.userStatus)\n}\n}\n.receive(on:\
    \ DispatchQueue.main)\n}\n```\n\n```\ncreateSubscription() {\nsubscriberData =\n\
    $statusData\n.flatMap{ data in\nreturn Just(data)\n.decode(type: [UserStatus].self,\n\
    decoder: JSONDecoder())\n.catch { _ in\nreturn Just(self.userStatus)\n}\n}\n.receive(on:\
    \ DispatchQueue.main)\n.assign(to: \\.userStatus, on: self)\n}\n```\n\n基于来自 `.assign`\
    \ 的结果发布者，我们创建了订阅。现在，一旦数据处理完毕，我们就会保存 `userStatus` 数组。这是一个已发布的属性，UI 将会随之更新。\n\n\
    回到我们的 `updateStatusData` 函数，我们不再需要设置 `userStatus`。相反，我们只使用 `Data` 值来设置 `statusData`。然后，我们创建的针对\
    \ `statusData` 的订阅将处理它，并且 `userStatus` 将会被发布。\n\n`updateUserStatus` 中的订阅只需接收数据、进行映射、处理错误，并赋值给该属性。此外，由于我们不再触发\
    \ UI 数据的发布，因此不再需要 `.receive` 修饰符。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig6_HTML.jpg](img/497312_1_En_16_Fig6_HTML.jpg)\n\
    \n图 16-6\n\n当前的 `updateStatusData` 函数\n\n1. 更新 `updateStatusData` 函数，移除 JSON 解析和\
    \ `.receive` 修饰符。由于我们现在处理的是数据，`.assign` 需要设置 `statusData`（而不是 `userStatus`）。更新后的代码如图\
    \ 16-6 所示。\n\n我们需要确保调用了创建订阅的函数。\n\n1. 在 `init` 中添加对 `createSubscription` 的调用。\n\
    \n```\n    private init() {\n    createSubscription()\n    updateStatusData()\n\
    \    }\n```\n\n如果你现在运行这个应用，它应该像以前一样工作，只不过现在有两个订阅。我们在 `updateStatusData` 中的原始订阅者仍然会接收服务器数据。但是，现在它只是将数据存储在\
    \ `statusData` 属性中。\n\n`createSubscription` 中的新订阅者接收该 `Data` 实例并解析它。解析后的数据现在存储在我们的\
    \ `userStatus` 数组中，该数组在主线程上发布。\n\n到目前为止，此练习中的步骤已将数据加载过程分为两部分。第一部分获取数据。第二部分解析数据。\n\
    \n现在我们可以添加从本地加载数据的选项。在调试构建时，这将替换第一部分中的服务器请求。第二部分的操作方式保持不变。当数据被存储时，针对它的订阅将解析数据并将其设置到数组中。\n\
    \n2. 在 `updateStatusData` 中，在函数顶部添加测试代码，以在 `DEBUG` 条件语句内从文件加载 JSON 数据。\n\n```\n\
    \    func updateStatusData() {\n    #if DEBUG\n    guard let urlLocal = Bundle.main.url(\n\
    \    forResource: \"Status\",\n    withExtension: \"json\")\n    else { return\
    \ }\n    if let data = try? Data(contentsOf: urlLocal) {\n    DispatchQueue.global().async\
    \ {\n    self.statusData = data\n    }\n    }\n    return\n    #endif\n    ...\n\
    ```\n\n对于生产构建，我们有一个订阅来接收数据。对于调试，我们只需本地加载数据。无论数据是从服务器还是本地文件获取，解析都是通过对数据属性的订阅来完成的。\n\
    \n**注意** 为了避免编译器警告，你可以删除前面代码中的 `return`，将 `#endif` 改为 `#else`，并在函数末尾加上 `#endif`。详情请参阅本章的\
    \ EOC 代码。\n\n如果你现在运行该应用，数据应该从文件加载并且 UI 会更新。本地数据在用户名后附加了“-test”，以区分加载的是哪部分数据，如图\
    \ 16-7 所示。\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig7_HTML.jpg](img/497312_1_En_16_Fig7_HTML.jpg)\n\
    \n图 16-7\n\n使用本地测试数据的 UI\n\n生产构建将忽略 `DEBUG` 条件语句，并从服务器加载数据。\n\n## 章节总结\n\n在本章的代码中，我们探讨了许多变化。我们看到了如何从\
    \ `URLSession` 创建一个发布者。生成的数据任务发布者可以像其他发布者一样使用运算符进行修改。我们可以映射数据、解码、替换错误、赋值等等。\n\n\
    我们还为本地测试数据创建了一个变体。此路径使用 `flatMap` 来解码数据并捕获任何错误。它在几个地方使用了 `Just`，并且还避免了在发生错误时取消订阅。\n\
    \n最后，我们有了两个已发布的属性和两个订阅者。\n\n我们的 `ContentView` 将 `UserStatusMgr` 属性声明为被观察对象。这样，当更新发生时，我们的\
    \ UI 将反映这些变化。\n\n第二个订阅者针对的是 `statusData` 属性。无论是通过本地数据加载还是服务器返回数据来更改它，我们的第二个订阅者都会处理它。现在我们有了一个统一的地方来解析数据、设置\
    \ `userStatus` 并发布给 UI。\n\n正如我希望你理解的那样，有多种方法可以完成你需要做的事情。哪种解决方案最佳取决于你的具体需求。我的意图是向你展示多种方法。但是，重申一下，这不是一本关于\
    \ Combine 的书。\n\n我们只看了运算符列表的一部分。通过进一步学习，其中一些会变得很熟悉，比如 `map`、`filter`、`reduce`、`compactMap`、`count`、`max`、`contains`、`drop`\
    \ 等等。还有一些运算符与带有“try”前缀的运算符相关，例如 `tryMap`、`tryFilter`、`tryReduce` 等等。\n\n一些运算符对你来说可能是新的，比如\
    \ `sink`、`zip`、`combineLatest` 和 `merge`。我希望你把它们都研究一下！\n\n# 17. 过渡与动画\n\n通常，当我亲自教授\
    \ iOS 开发时，我们会讨论各种 UI 动画的实现方式。动画领域有大量的方法和选项。然而，大多数时候，我们实际上并不试图做太复杂的事情。\n\n我主要是为那些有业务需求的客户进行开发。这可能是一个面向客户的应用程序，一个他们网站的配套应用，或者一个用于查看数据的应用程序。\n\
    \n通常，动画的发挥空间很小。我可能会为了显示而淡入/淡出某些内容。有时，我需要移动菜单或类似元素。但华丽的动画通常不在考虑范围之内。\n\n我之所以说这些，是因为虽然我想向大家展示如何在\
    \ SwiftUI 中制作动画，但重点应该放在选项上。本章希望能提供一些工具，让你了解一些可能的实现方式以及如何深入研究。只是不要以为我们会构建一个 3D\
    \ 游戏或类似的东西。\n"
- fmt: "# Transitions\n\nTransitions are what control how a visual element is inserted\
    \ or removed from the view. The insertion and removal aren’t automatically animated,\
    \ but they can be.\n\nThere are built-in transitions that do a variety of presentations\
    \ that are common. Some of these are `opacity`, `move`, `scale`, and `slide`.\
    \ The `move` transition requires an `Edge` value. This lets it know where to start:\
    \ `top`, `bottom`, `leading`, or `trailing`.\n\nLet’s add a few UI items to see\
    \ a transition work.\n\n## Transition on Text\n\nWe’re going to start with a new\
    \ SwiftUI project. We’re going to add a `Button` to toggle a value. Based on that\
    \ value, we’ll add a `Text` item to the UI. We’ll then add a transition to that\
    \ item for inserting and removing it.\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig1_HTML.png](images/497312_1_En_17_Chapter/497312_1_En_17_Fig1_HTML.png)\n\
    \nFigure 17-1 New Project Options\n\n1.  Create a new SwiftUI project (I named\
    \ mine `VariousUI`) with SwiftUI for the interface and SwiftUI App for the life\
    \ cycle (see Figure [17-1](#497312_1_En_17_Chapter.xhtml#Fig1)).\n2.  Add a toggle\
    \ property to the `ContentView` in `ContentView.swift`.\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig2_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig2_HTML.jpg)\n\
    \nFigure 17-2 Toggle Button and Text\n\n3.  In the `body` computed property of\
    \ `ContentView`, replace the default content with a `VStack`.\n\n    ```\n   \
    \ var body: some View {\n    VStack {\n    }\n    }\n    ```\n\n4.  In the `VStack`,\
    \ create a `Button` to toggle the value.\n\n    ```\n    Button(action: {\n  \
    \  self.isToggled.toggle()\n    }) {\n    Text(\"Toggle\")\n    }\n    ```\n\n\
    5.  We’ll add another `Text` item, below the button, for “Toggled” if the property\
    \ is set to `true`.\n\n    ```\n    if isToggled {\n    Text(\"Toggled\")\n  \
    \  }\n    ```\n\n    Running the app now shows a “Toggle” button. If you tap the\
    \ button, a `Textfield` is displayed like Figure [17-2](#497312_1_En_17_Chapter.xhtml#Fig2).\n\
    \n```\n@State var isToggled = false\n```\n\nNext, we’ll add a transition to have\
    \ the `Text` appear in a different way.\n\n1.  Add a transition to the `Text`\
    \ item.\n\n    ```\n    Text(\"Toggled\")\n    .transition(.move(edge: .top))\n\
    \    ```\n\n    If you run the app now, you will still see the `Text` pop on and\
    \ off the screen. We need to add some animation.\n\n2.  Add animation to the `Text`\
    \ item.\n\n    ```\n    Text(\"Toggled\")\n    .transition(.move(edge: .top))\n\
    \    .animation(.easeInOut)\n    ```\n\n`Animation` has a variety of options as\
    \ you can see in Figure [17-3](#497312_1_En_17_Chapter.xhtml#Fig3).\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig3_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig3_HTML.jpg)\n\
    \nFigure 17-3 Partial List of Animations\n\nFeel free to try different types of\
    \ animations. I like `spring` a lot.\n\nNow when you run the app (or Live mode\
    \ preview), you should see the `Text` item move from the top when added. It should\
    \ also move to the top when removed.\n\n## Asymmetric Transitions\n\nOften we\
    \ want to transition something on the screen one way but off the screen a different\
    \ way. For that, we create an asymmetric transition. The function to create one\
    \ takes two parameters: `insertion` and `removal`. There are just two transitions.\n\
    \nSo if we want to insert a UI element with `opacity` but use a `scale` to remove\
    \ it, that’s not a problem.\n\n### Asymmetric Transition\n\nLet’s create an asymmetric\
    \ transition for our `Text` item. If you experimented with the different transitions\
    \ already, you’ve seen `opacity` and `scale`. We’ll use those.\n\n1.  Replace\
    \ the transition used before (i.e., `move(edge: .top)`) with a call to `.asymmetric`.\n\
    2.  For `insertion`, we’ll use `opacity`. For `removal`, pass in a `slide`.\n\n\
    \    ```\n    Text(\"Toggled\")\n    .transition(\n    .asymmetric(\n    insertion:\
    \ .opacity,\n    removal: .slide))\n    ```\n\n```\nText(\"Toggled\")\n.transition(\n\
    .asymmetric(\n```\n\nRun the app. What happened? It’s not animated anymore! Transitions\
    \ don’t animate in implicit animations like this. We need to use an explicit animation.\n\
    \n1.  Add an implicit animation using `withAnimation` around the toggle value\
    \ change in the `Button` action.\n\n    ```\n    Button(action: {\n    withAnimation(.easeInOut(duration:\
    \ 1)) {\n    self.isToggled.toggle()\n    }\n    ```\n\n    One second is being\
    \ passed in as the duration. Feel free to pass in whatever duration you like (or\
    \ none as we did before).\n\n    Now the transition should work and animate. But\
    \ what if we want it to fade in and move or some other transition? We can combine\
    \ them.\n\n2.  Call `combine` on the `opacity` transition and pass in a `move`.\n\
    \n    ```\n    Text(\"Toggled\")\n    .transition(\n    .asymmetric(\n    insertion:\
    \ AnyTransition\n    .opacity\n    .combined(with:\n    .move(edge: .top)),\n\
    \    removal: .slide))\n    ```\n\nNow that we have it working the way we’d like,\
    \ let’s clean it up. We’ll create a separate transition for what we’ve created.\
    \ We can do that as an extension of the `AnyTransition` struct.\n\n1.  Create\
    \ an extension of `AnyTransition` (it’s fine to have it in the same file).\n\n\
    \    ```\n    extension AnyTransition {\n    }\n    ```\n\n2.  Declare a static\
    \ var named `textTransition` of type `AnyTransition`.\n3.  Implement the `get`\
    \ (no keyword needed) of the `textTransition` to create the transition we created\
    \ in our code.\n\n    ```\n    static var textTransition : AnyTransition {\n \
    \   AnyTransition\n    .asymmetric(\n    insertion: AnyTransition\n    .opacity\n\
    \    .combined(with:\n    .move(edge: .top)),\n    removal: .slide)\n    }\n \
    \   ```\n\n4.  Now use the newly defined transition instead of the several lines\
    \ of code we moved to `textTransition`.\n\n    ```\n    Text(\"Toggled\")\n  \
    \  .transition(.textTransition)\n    ```\n\n```\nstatic var textTransition : AnyTransition\n\
    ```\n\nRun the code and verify the transition is the same as before.\n\nIn this\
    \ exercise, not only did we combine transitions, we also created a custom one\
    \ to use in other places."
