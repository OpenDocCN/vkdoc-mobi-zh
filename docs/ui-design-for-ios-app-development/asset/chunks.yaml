- fmt: "# Publishing Updates\n\nThere are two easy ways to receive updates to values\
    \ changed on an `ObservedObject`. And both ways are controlled by the object implementing\
    \ the `ObservableObject`.\n\nThis means that the `ObservableObject` is in control\
    \ of what is published and when it is published.\n\nIn our case, we are most concerned\
    \ with changes to the `text` property on `Note`. I mentioned that `ObservableObject`\
    \ has default implementations for its required pieces. One is a publisher, and\
    \ the property name is `objectWillChange`.\n\nUsing this default publisher, we\
    \ can send out the new values whenever something changes. We already have a `didSet`\
    \ observer on the `text` property in `Note`. That’s a great place to publish the\
    \ change. The code looks like this:\n\n```\nvar text = \"\" {\n    didSet {\n\
    \        self.updatedAtTime = Date()\n        self.objectWillChange.send()\n \
    \   }\n}\n```\n\nNow when we tap the Update button, the textfields for the `text`\
    \ and `updatedAtTime` are both updated. The update looks like Figure [5-3](#497312_1_En_5_Chapter.xhtml#Fig3).\n\
    \n![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig3_HTML.jpg](images/497312_1_En_5_Chapter/497312_1_En_5_Fig3_HTML.jpg)\n\
    \n**Figure 5-3**  \nNote UI with Updates\n\nCalling `.send` on the publisher is\
    \ certainly an easy way to send out the updates. And it’s particularly great when\
    \ you don’t want to publish changes except for key times. Maybe you want to wait\
    \ until something specific happens like a write to the database and then publish\
    \ the values.\n\nYou may have a class that only publishes updates at certain time\
    \ intervals. Maybe you only want to publish when a threshold is set on a property\
    \ or other criteria are met. In those cases, the `.send` call on the publisher\
    \ is very useful.\n\nIn our case, we want the new `text` value published whenever\
    \ it’s set. Calling `.send` in the `didSet` observer works great for that. Another\
    \ way to do it for all changes to a property is the `@Published` attribute.\n\n\
    ## @Published\n\nThe `@Published` attribute on a property creates a publisher\
    \ of that type. We can add that attribute to our `text` property in `Note`. Also,\
    \ we can now remove our call to `.send` in the `didSet` observer.\n\nThe result\
    \ will be the same in our case. Tapping the Update button in the UI will update\
    \ the `text` which will then be published, and the UI is updated.\n\nThe code\
    \ now looks like this:\n\n```\n@Published var text = \"\" {\n    didSet {\n  \
    \      self.updatedAtTime = Date()\n    }\n}\n```\n\nWe may also want to add `@Published`\
    \ to other properties. In our case, it makes sense to publish the `priority`.\
    \ It might make the most sense to publish the `updatedAtTime`. In that case, if\
    \ we wrote our code well, anytime the object is updated, it will publish.\n\n\
    Let’s try something else.\n\n**TIMER TO CHANGE PRIORITY**\n\nLet’s change our\
    \ `Note` class to automatically create the priority after a certain amount of\
    \ time. We’ll add an `init` to the `Note` with a `Timer`. When it fires, it will\
    \ level up the priority by one level each time.\n\n1.  Change the default priority\
    \ of a `Note` to `.low`:\n\n2.  Add an initializer to the `Note` class:\n\n  \
    \  ```\n    init() {\n    }\n    ```\n\n3.  Add a `Timer` in the `init` to fire\
    \ every X seconds (e.g., 10) and to repeat. The body of the `Timer`’s closure\
    \ should set the priority up a level.\n\n    ```\n    Timer.scheduledTimer(withTimeInterval:\
    \ 10.0,\n                         repeats: true) { (timer) in\n        self.priority\
    \ = Priority(rawValue:\n            self.priority.rawValue + 1) ??\n         \
    \   Priority.high\n        if self.priority == .high {\n            timer.invalidate()\n\
    \        }\n    }\n    ```\n\n```\nvar priority = Priority.low {...\n```\n\nEvery\
    \ 10 seconds, the timer will fire. It will create a new priority based on the\
    \ current priority’s raw value + 1. If that number is too high, it defaults to\
    \ `Priority.high`.\n\nIf the priority is set to `.high`, it will invalidate the\
    \ timer. We may want to keep the timer going in case the user sets the priority\
    \ back to a lower setting. We don’t have that in our current UI so there’s no\
    \ need.\n\n1.  Run the app and verify it increases the priority every 10 seconds\
    \ until it’s high.\n\nThe first and last results should look like Figure [5-4](#497312_1_En_5_Chapter.xhtml#Fig4).\n\
    \n![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig4_HTML.jpg](images/497312_1_En_5_Chapter/497312_1_En_5_Fig4_HTML.jpg)\n\
    \n**Figure 5-4**  \nAuto-updating UI: First and Last States\n\nFrom this exercise,\
    \ we see that whether changes happen via user interaction or otherwise, the changes\
    \ are published.\n\n## Chapter Summary\n\nUsing the `ObservableObject` protocol\
    \ allows for reference type objects to publish their changes. You can take new\
    \ or existing model classes and have them implement `ObservableObject` with a\
    \ few small changes.\n\nThat makes the changes to existing code very minor. If\
    \ you’ve ever added the `Codable` protocol to legacy code, you know about how\
    \ easy it can be.\n\nFor code that is interested in the updates, the additions\
    \ are also small. It can be as little as adding the `@ObservedObject` attribute\
    \ to a property.\n\nWe introduced some complex concepts in this chapter with the\
    \ Combine. While a lot is going on behind the scenes, there were only a few steps\
    \ we need to do:\n\n1.  Import Combine.\n2.  Add `@ObservableObject` to `Note`.\n\
    3.  Add `@ObservedObject` to the `note` property.\n4.  Decide if we wanted to\
    \ either:\n    - Call `.send` on the publisher, or\n    - Add `@Published` to\
    \ a property\n\n# 6. Environment Values\n\nSo far, we’ve seen how to use the `State`\
    \ property wrapper for values within a given view. We’ve also seen how to bind\
    \ local values to external variables with `Binding`.\n\nIn both of those cases,\
    \ our code needs to create and control the values. These values, via property\
    \ wrappers, are then passed around. Using property wrappers in this way keeps\
    \ the source of truth both isolated and always in sync.\n\nBut what about values\
    \ that might be created somewhere else? What about values that might affect the\
    \ whole app or device?\n\nSwiftUI has solutions for that as well with Environment\
    \ values and objects."
