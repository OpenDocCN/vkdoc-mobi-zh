    \ ? 10 : 50)\n    .scaleEffect(isToggled ? 0.5 : 1)\n    .animation(.spring(dampingFraction\
    \ : 0.5))\n    .blur(radius: isToggled ? 5 : 0)\n    ```\n\nThe damping fraction\
    \ is the amount of drag applied to the value being animated. The default is 0.825\
    \ and doesn’t provide as much bounce. Our 0.5 is pretty good. Setting it to something\
    \ small like 0.15 makes it oscillate around the final value several times. Try\
    \ it out.\n\nSpring has other parameters you can pass in as well. I encourage\
    \ you to check those out sometime.\n\nAs you run the app, you should notice that\
    \ the animation for the shadow and scale use the spring animation. This also uses\
    \ its only timing. The explicit withAnimation call is still one second and applied\
    \ to the blur. If it’s not noticeable, make the withAnimation duration five seconds\
    \ and test it out.\n\n## ViewModifier Protocol\n\nWe have several modifiers on\
    \ our red circle. If we like this combination, we might want to save it as something\
    \ to use in other places in our code.\n\nFor our Transition, we did that as an\
    \ extension of AnyTransition. Our static computed property was declared as a type\
    \ of AnyTransition. For our modifiers, it will be a struct that conforms to the\
    \ ViewModifier protocol.\n\nThe ViewModifier protocol is very similar to the View.\
    \ However, the body is a function instead of a property. This body function takes\
    \ a Content and returns a View. The Content is the value the modifier is used\
    \ on. In our case, it’s a type that implements View.\n\nCREATE A VIEW MODIFIER\n\
    \nWe are going to create a struct that implements ViewModifier. We have a required\
    \ function of the body that takes a Content (in our case, a type that implements\
    \ View) and returns a View.\n\n1.  Declare the struct (in the same file is fine).\n\
    \n```\n    struct BouncyModifier : ViewModifier {\n    }\n    ```\n\n2.  Declare\
    \ a property for the amount to blur the View.\n\n```\n    struct BouncyModifier\
    \ : ViewModifier {\n    var blurFactor : CGFloat\n    }\n    ```\n\n3.  Declare\
    \ the body function.\n\n```\n    struct BouncyModifier : ViewModifier {\n    var\
    \ blurFactor : CGFloat\n    func body(content: Content) -> some View {\n    }\n\
    \    }\n    ```\n\n4.  Implement the body function to add the modifiers to the\
    \ parameter passed in.\n\n```\n    return content\n    .shadow(radius: blurFactor\
    \ > 0 ? 10 : 50)\n    .scaleEffect(blurFactor > 0 ? 0.5 : 1.0)\n    .animation(\n\
    \    .spring(dampingFraction : 0.15))\n    .blur(radius: blurFactor)\n    ```\n\
    \n5.  Use the new modifier instead of the previous list of modifiers.\n\n```\n\
    \    Circle()\n    .foregroundColor(.red)\n    .modifier(BouncyModifier(blurFactor:\n\
    \    isToggled ? 5 : 0))\n    ```\n\nRun the app and notice that the animation\
    \ is the same but with a little more spring.\n\nThere’s another option rather\
    \ than using the .modifier to create the ViewModifier. We can create an extension\
    \ on View to do it for us.\n\nIn the end, it’s the same thing, just in a different\
    \ place. It can help keep the View code clean too.\n\n6.  Define an extension\
    \ of View (in the same file is fine).\n\n```\n    extension View {\n    }\n  \
    \  ```\n\n7.  Define a “bouncy” function that takes a CGFloat and returns a View.\n\
    \n```\n    extension View {\n    func bouncy(blurFactor: CGFloat)\n    -> some\
    \ View {\n    }\n    }\n    ```\n\n8.  Return a modifier that creates a BouncyModifier\
    \ created with the parameter passed in.\n\n```\n    extension View {\n    func\
    \ bouncy(blurFactor: CGFloat)\n    -> some View {\n    self.modifier(\n    BouncyModifier(blurFactor:\
    \ blurFactor))\n    }\n    }\n    ```\n\n9.  Use this function on your Circle\
    \ instead of the .modifier with BouncyModifier.\n\n```\n    Circle()\n    .foregroundColor(.red)\n\
    \    .bouncy(blurFactor: isToggled ? 5 : 0)\n    ```\n\nBy creating a ViewModifier\
    \ and extension on View, our code is cleaner. We can reuse either of these in\
    \ other places in our project. Also, we can make changes in one place that affect\
    \ our bouncy animation throughout our app.\n\nAs I mentioned, there are animation\
    \ functions for affecting the performance of animations. Several of these are\
    \ for the curve of the animation timing. These functions, easeIn, easeOut, easeInOut,\
    \ and linear, have forms that take a Double for duration. The duration is the\
    \ number of seconds for the animation.\n\nThe timingCurve function allows the\
    \ developer to specify the timing curve as a Bézier path coordinate and a duration.\n\
    \nWe’ve seen spring with its default values for response, dampingFraction and\
    \ blendDuration. There’s also interactiveSpring. It’s basically the same but with\
    \ different default values for interactive animations. The interpolatingSpring\
    \ allows you to specify mass and stiffness (of the spring) along with damping\
    \ and initial velocity.\n\nOther functions are delay, speed, and two for repeating:\
    \ repeatCount and repeatForever.\n\nAll of these functions allow you to customize\
    \ your animations. Honestly, most of the time that I use animations, I can stick\
    \ to a lot of defaults. Sometimes, I need a specific duration. In those cases,\
    \ I usually use 0.37 which matches a lot of system animations such as displaying\
    \ the keyboard. About the only other variation I use is spring to give some bounce."
  trans: "\n# 动画\n\n我们已经了解了一点关于过渡动画的内容。还有一些其他动画效果我们也想探讨一下。\n\n各种修饰符的更改都可以进行动画化。一些常见的属性包括尺寸/缩放、颜色、阴影、旋转和模糊。\n\
    \n修饰符的动画可以通过隐式或显式动画来实现。此外，你还可以针对不同的更改设置不同的隐式动画修饰符。\n\n## 为更改添加动画\n\n在本练习中，我们将研究如何对\
    \ UI 元素的各项更改进行动画处理。\n\n1.  在 `VStack` 的底部，向 UI 添加一个圆形。\n2.  将圆形的颜色设置为红色。\n\n```\n\
    Circle()\n.foregroundColor(.red)\n```\n\n```\nCircle()\n```\n\n在预览中，你应该会在 UI 中看到一个大的红色圆形，如图\
    \ 17-4 所示。\n\n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig4_HTML.jpg](img/497312_1_En_17_Fig4_HTML.jpg)\n\
    \n图 17-4：已添加到 UI 中的圆形\n\n3.  为圆形添加 `shadow`、`scaleEffect` 和 `blur` 修饰符，所有这些都基于\
    \ `isToggle` 的值。\n\n```\nCircle()\n.foregroundColor(.red)\n.shadow(radius: isToggled\
    \ ? 10 : 50)\n.scaleEffect(isToggled ? 0.75 : 1)\n.blur(radius: isToggled ? 5\
    \ : 0)\n```\n\n现在，当你运行应用并切换该值时，你应该会看到一个带有阴影、尺寸较小且应用了模糊效果的红色圆形，如图 17-5 所示。\n\n\
    ![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig5_HTML.jpg](img/497312_1_En_17_Fig5_HTML.jpg)\n\
    \n图 17-5：切换值为 True 影响 UI\n\n这样做效果不错，并且有了动画。但对于一个鲜红色的球体来说，看起来似乎不够生动。让我们添加一个动画修饰符来赋予它一些活力。\n\
    \n4.  在 `scaleEffect` 修饰符之后，添加一个动画修饰符。使用 `spring` 并传入阻尼分数 `0.5`。\n\n```\nCircle()\n\
    .foregroundColor(.red)\n.shadow(radius: isToggled ? 10 : 50)\n.scaleEffect(isToggled\
    \ ? 0.5 : 1)\n.animation(.spring(dampingFraction : 0.5))\n.blur(radius: isToggled\
    \ ? 5 : 0)\n```\n\n阻尼分数是应用于被动画属性的拖拽力大小。默认值是 `0.825`，不会产生太多弹跳效果。我们设置的 `0.5` 效果相当不错。如果将其设置成一个很小的值，比如\
    \ `0.15`，会使它在最终值附近振荡好几次。你可以尝试一下。\n\n`spring` 还有许多其他参数可供传入。我鼓励你将来去查看一下。\n\n运行应用时，你应该会注意到阴影和缩放的动画使用了弹簧动画，并且它们使用了自身的计时。显式调用的\
    \ `withAnimation` 仍然持续一秒，并应用于 `blur`。如果不明显，可以将 `withAnimation` 的持续时间设为五秒来测试一下。\n\
    \n## ViewModifier 协议\n\n我们的红色圆形上应用了几个修饰符。如果我们喜欢这个组合，可能希望将其保存起来，以便在代码的其他地方使用。\n\
    \n对于我们的 `Transition`，我们是将其作为 `AnyTransition` 的一个扩展来实现的。我们声明的静态计算属性类型是 `AnyTransition`。对于我们的修饰符，它将是一个遵循\
    \ `ViewModifier` 协议的结构体。\n\n`ViewModifier` 协议与 `View` 非常相似。然而，它的 `body` 是一个函数而不是一个属性。这个\
    \ `body` 函数接收一个 `Content` 并返回一个 `View`。这里的 `Content` 就是应用该修饰符的值。在我们的例子中，它是一个实现了\
    \ `View` 的类型。\n\n### 创建视图修饰符\n\n我们将创建一个实现了 `ViewModifier` 的结构体。我们有一个必需的 `body`\
    \ 函数，它接收一个 `Content`（在我们的例子中，是一个实现 `View` 的类型）并返回一个 `View`。\n\n1.  声明该结构体（在同一文件中即可）。\n\
    \n```\nstruct BouncyModifier : ViewModifier {\n}\n```\n\n2.  声明一个用于控制 `View` 模糊量的属性。\n\
    \n```\nstruct BouncyModifier : ViewModifier {\n    var blurFactor : CGFloat\n\
    }\n```\n\n3.  声明 `body` 函数。\n\n```\nstruct BouncyModifier : ViewModifier {\n \
    \   var blurFactor : CGFloat\n    func body(content: Content) -> some View {\n\
    \    }\n}\n```\n\n4.  实现 `body` 函数，将修饰符添加到传入的参数上。\n\n```\nreturn content\n   \
    \ .shadow(radius: blurFactor > 0 ? 10 : 50)\n    .scaleEffect(blurFactor > 0 ?\
    \ 0.5 : 1.0)\n    .animation(\n        .spring(dampingFraction : 0.15))\n    .blur(radius:\
    \ blurFactor)\n```\n\n5.  使用新的修饰符替换之前的一串修饰符。\n\n```\nCircle()\n    .foregroundColor(.red)\n\
    \    .modifier(BouncyModifier(blurFactor:\n        isToggled ? 5 : 0))\n```\n\n\
    运行应用，你会发现动画效果相同，但弹跳感更强了一点。\n\n除了使用 `.modifier` 来创建 `ViewModifier`，还有另一种选择。我们可以为\
    \ `View` 创建一个扩展来帮我们做到这一点。\n\n最终，两者的作用是相同的，只是代码位置不同。这也有助于保持 `View` 代码的整洁。\n\n6.\
    \  为 `View` 定义一个扩展（在同一文件中即可）。\n\n```\nextension View {\n}\n```\n\n7.  定义一个 `bouncy`\
    \ 函数，它接收一个 `CGFloat` 并返回一个 `View`。\n\n```\nextension View {\n    func bouncy(blurFactor:\
    \ CGFloat)\n        -> some View {\n    }\n}\n```\n\n8.  返回一个使用传入参数创建的 `BouncyModifier`\
    \ 修饰符。\n\n```\nextension View {\n    func bouncy(blurFactor: CGFloat)\n      \
    \  -> some View {\n        self.modifier(\n            BouncyModifier(blurFactor:\
    \ blurFactor))\n    }\n}\n```\n\n9.  在你的 `Circle` 上使用这个函数，而不是使用 `.modifier` 配合\
    \ `BouncyModifier`。\n\n```\nCircle()\n    .foregroundColor(.red)\n    .bouncy(blurFactor:\
    \ isToggled ? 5 : 0)\n```\n\n通过创建 `ViewModifier` 和 `View` 的扩展，我们的代码变得更整洁了。我们可以在项目的其他地方复用这两者。此外，我们可以在一处进行更改，从而影响整个应用中的弹跳动画效果。\n\
    \n正如我所提到的，有一些动画函数可以影响动画的性能。其中一些用于控制动画时间的曲线。这些函数，`easeIn`、`easeOut`、`easeInOut`\
    \ 和 `linear`，都提供了接受一个 `Double` 类型持续时间参数的形式。持续时间以秒为单位。\n\n`timingCurve` 函数允许开发者将时间曲线指定为贝塞尔路径坐标和持续时间。\n\
    \n我们已经看到 `spring` 及其默认值 `response`、`dampingFraction` 和 `blendDuration`。还有 `interactiveSpring`。它基本相同，但为交互式动画提供了不同的默认值。`interpolatingSpring`\
    \ 允许你指定（弹簧的）质量和刚度，以及阻尼和初始速度。\n\n其他函数包括 `delay`、`speed`，以及两个用于重复动画的函数：`repeatCount`\
    \ 和 `repeatForever`。\n\n所有这些函数都允许你自定义动画。说实话，在我使用动画的大部分时间里，我都可以坚持使用很多默认值。有时，我需要一个特定的持续时间。在这些情况下，我通常会使用\
    \ `0.37`，这与许多系统动画（如键盘弹出）的持续时间匹配。我使用的另一个变化差不多只有 `spring`，用来增加一些弹跳效果。"
- fmt: "# Gradients\n\nLet’s add a little color to our circle. We can create a gradient\
    \ to use in filling in our circle. An easy way to create a `Gradient` instance\
    \ is by passing in some colors. The resulting `Gradient` will interpolate the\
    \ variations in between.\n\nTo fill our circle, we’ll use the `.fill` modifier.\
    \ We pass in something that conforms to the `ShapeStyle` protocol. `Color` does\
    \ that, and we can pass a color into `.fill`.\n\n```\nCircle().fill(Color.blue)\n\
    ```\n\nOther structs that implement `ShapeStyle` are `ForegroundStyle`, `ImagePaint`,\
    \ `LinearGradient`, `RadialGradient`, and `AngularGradient`.\n\n## Adding Color\
    \ to the Circle\n\nWe’re going to create a gradient and fill in the circle. Now\
    \ our animation will have more life given a bit of definition to our element.\n\
    \n1.  Create a gradient as a property of the `ContentView`.\n\n    ```\n    struct\
    \ ContentView: View {\n    @State var isToggled = false\n    let gradient = Gradient(colors:\n\
    \    [.purple, .yellow,\n    .green])\n    ```\n\n2.  At the top of the `body`,\
    \ above the `VStack`, add a `RadialGradient`.\n\n    ```\n    var body: some View\
    \ {\n    let radialGradient = RadialGradient(gradient:\n    gradient,\n    center:\
    \ .center,\n    startRadius: 1.0,\n    endRadius: 250.0)\n    VStack {...\n  \
    \  ```\n\n3.  Use the created radial gradient in the previous step in a `.fill`\
    \ modifier of the `Circle` instead of the `.foreground`.\n\n    ```\n    Circle()\n\
    \    .fill(radialGradient)\n    .bouncy(blurFactor: isToggled ? 5 : 0)\n    ```\n\
    \nRun the app and see the colors as in Figure [17-6](#497312_1_En_17_Chapter.xhtml#Fig6).\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig6_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig6_HTML.jpg)\n\
    \nFigure 17-6 — Circle with Radial Gradient After the Animation\n\n1.  Create\
    \ an `AngularGradient` below the `radialGradient` from step 2.\n\n    ```\n  \
    \  let angularGradient = AngularGradient(gradient:\n    gradient,\n    center:\
    \ .center,\n    angle: .degrees(0))\n    ```\n\n2.  Use this new `angularGradient`\
    \ in the `.fill`.\n\n    ```\n    Circle()\n    .fill(angularGradient)\n    ```\n\
    \nRun the app and see the new color fill as in Figure [17-7](#497312_1_En_17_Chapter.xhtml#Fig7).\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig7_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig7_HTML.jpg)\n\
    \nFigure 17-7 — Circle with Radial Gradient After the Animation\n\nNow we have\
    \ more color in our circle to give it even more life.\n\n## Rotation\n\nRotating\
    \ UI elements is another common alteration. It’s also a good change for animation.\
    \ There are two modifiers we can use to rotate our circle easily.\n\nThe `rotationEffect`\
    \ modifier takes two parameters. The first parameter is the angle of rotation.\
    \ The second parameter is an optional point around which to rotate. The default\
    \ point is the center.\n\n```\n.rotationEffect(.degrees(90))\n```\n\nNOTE: We’ll\
    \ add these rotation effects to the code in the next exercise.\n\nThe `rotation3DEffect`\
    \ also takes the angle of rotation and the axis of rotation. The `anchor` (default\
    \ to center), `anchorZ` (default to 0), and `perspective` (default to 1) have\
    \ defaults so they’re not required.\n\nThe axis specifies one or more axes to\
    \ rotate around. If we only specify the Z axis, it will behave just like the `.rotationEffect`.\n\
    \n```\n.rotation3DEffect(Angle(degrees: 90),\naxis: (x: 0, y: 0, z: 1))\n```\n\
    \nThe Z axis goes front and back. The X axis goes left and right. The Y axis goes\
    \ up and down.\n\nLet’s try some.\n\n### Adding Rotation\n\nWe’ll start with adding\
    \ rotation to spin our circle. Then we’ll add 3D rotation and see some real action.\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig8_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig8_HTML.jpg)\n\
    \nFigure 17-8 — Circle After the Animation\n\n1.  Add `.rotationEffect` after\
    \ our custom `.bouncy` modifier.\n\n    Base the rotation on the `isToggled` property.\n\
    \n    ```\n        Circle()\n        .fill(angularGradient)\n        .bouncy(blurFactor:\
    \ isToggled ? 5 : 0)\n        .rotationEffect(.degrees(isToggled ? 90 : 0))\n\
    \    ```\n\n    Run the app and see that the circle rotated like Figure [17-8](#497312_1_En_17_Chapter.xhtml#Fig8).\n\
    \n2.  Remove the `.rotationEffect` and use the `.rotation3DEffect` instead but\
    \ only for the Z axis.\n\n    ```\n    .rotation3DEffect(Angle(degrees: isToggled\
    \ ? 90 : 0),\n    axis: (x: 0, y: 0, z: 1))\n    ```\n\n    Run the app and the\
    \ result should look the same as Figure [17-7](#497312_1_En_17_Chapter.xhtml#Fig7).\n\
    \n3.  Change the axis to the X axis (zeroes for the other two).\n\n    ```\n \
    \       .rotation3DEffect(Angle(degrees: isToggled ? 90 : 0),\n        axis: (x:\
    \ 1, y: 0, z: 0))\n    ```\n\n    If you run the app, you’ll see the animation\
    \ partially flips the circle to be flat and not visible.\n\n    Using the Y axis\
    \ does the same except it flips it in the other direction.\n\n4.  Use all three\
    \ axes in the rotation call and change the angle to 300.\n\n    ```\n        .rotation3DEffect(Angle(degrees:\n\
    \        isToggled ? 300 : 0),\n        axis: (x: 1, y: 1, z: 1))\n    ```\n\n\
    \    Running the code now shows a bit more action. It’s a bit fast so let’s slow\
    \ it down.\n\n5.  Add an animation after the `.rotation3DEffect` with `.spring`\
    \ and a speed setting.\n\n    ```\n    .animation(.spring().speed(0.1))\n    ```\n\
    \n    If you get an error, it’s because the compiler can’t determine the context.\
    \ Add “Animation” before `.spring` to help out.\n\n    ```\n    .animation(Animation.spring().speed(0.1))\n\
    \    ```\n\n    `speed` takes a multiplier for the animation time. Using `0.10`\
    \ causes the animation to take 10% of whatever speed is related to the animation.\
    \ The default animation is `0.37` so our rotation should take about 4 seconds.\n\
    \nThe end result should look like Figure [17-9](#497312_1_En_17_Chapter.xhtml#Fig9).\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig9_HTML.jpg](images/497312_1_En_17_Chapter/497312_1_En_17_Fig9_HTML.jpg)\n\
    \nFigure 17-9 — Circle After a 3D Rotation\n\nWe now have three animations in\
    \ our app. The first is an implicit animation in the Button action to animate\
    \ the change in the toggle property. This animates the Text for the “Toggled”\
    \ element.\n\nAnother animation handles the `BouncyModifier`. It uses `.spring`\
    \ with a parameter for the damping fraction.\n\nThe third animation is on our\
    \ rotation 3D effect where we use `.spring` and `.speed`.\n\nLet’s make one more\
    \ change to the animation of the rotation.\n\n6.  Change the `.spring` and `.speed`\
    \ calls to a `.linear` with a duration of `0.75` seconds.\n\n    ```\n       \
    \ Circle()\n        .fill(angularGradient)\n        .bouncy(blurFactor: isToggled\
    \ ? 5 : 0)\n        .rotation3DEffect(Angle(degrees:\n        isToggled ? 300\
    \ : 0),\n        axis: (x: 1, y: 1, z: 1))\n        .animation(.linear(duration:\
    \ 0.75))\n    ```\n\nThe appearance at the end of the animation is the same as\
    \ before. However, the animation is a set time (not relative with a multiplier).\
    \ You may notice the start and stop of the rotation are a bit static. Linear doesn’t\
    \ speed up and slow down during the animation curve."
