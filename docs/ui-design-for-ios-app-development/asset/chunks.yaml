    \ The catch will replace the current publisher (the first Just) with another Just.\n\
    \n4.  Add .receive to create the final version of our publisher.\n\n1.  Add .assign\
    \ to create the subscription. Store the subscription in the new AnyCancellable\
    \ property created in step 1.\n\n```\ncreateSubscription() {\n$statusData\n.flatMap{\
    \ data in\nreturn Just(data)\n.decode(type: [UserStatus].self,\ndecoder: JSONDecoder())\n\
    .catch { _ in\nreturn Just(self.userStatus)\n}\n}\n.receive(on: DispatchQueue.main)\n\
    }\n```\n\n```\ncreateSubscription() {\nsubscriberData =\n$statusData\n.flatMap{\
    \ data in\nreturn Just(data)\n.decode(type: [UserStatus].self,\ndecoder: JSONDecoder())\n\
    .catch { _ in\nreturn Just(self.userStatus)\n}\n}\n.receive(on: DispatchQueue.main)\n\
    .assign(to: \\.userStatus, on: self)\n}\n```\n\nOn our resulting publisher from\
    \ .assign, we created our subscription. Now once the data is processed, we save\
    \ the userStatus array. This is a published property, and the UI will get updated.\n\
    \nBack in our updateStatusData function, we no longer want to set userStatus.\
    \ Instead we want to set statusData with just the Data value. Then the subscription\
    \ to statusData we created will process it, and userStatus will be published.\n\
    \nThe subscription in updateUserStatus just needs to receive the data, map it,\
    \ handle the error, and assign to the property. Also, since we’re not causing\
    \ the publication to the UI data, we no longer need the .receive modifier.\n\n\
    ![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig6_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6\n\nCurrent updateStatusData Function\n\n1.  Update the updateStatusData\
    \ function to remove the JSON parsing and .receive modifier. The .assign needs\
    \ to set statusData (instead of userStatus) since we’re dealing with the data\
    \ now. The updated code looks like Figure [16-6](#497312_1_En_16_Chapter.xhtml#Fig6).\n\
    \nWe need to make sure the function to create the subscription is called.\n\n\
    1.  Add a call to createSubscription in init.\n\n```\n    private init() {\n \
    \   createSubscription()\n    updateStatusData()\n    }\n    ```\n\nIf you run\
    \ the app now, it should work as it did before but with two subscriptions. Our\
    \ original subscriber in updateStatusData still receives the server data. However,\
    \ now it just stores it in the statusData property.\n\nThe new subscriber in createSubscription\
    \ receives that Data instance and parses it. The parsed data is now stored in\
    \ our userStatus array which gets published on the main thread.\n\nThe steps in\
    \ this exercise up to this point split out the loading of the data into two parts.\
    \ The first gets the data. The second parses it.\n\nNow we can add the option\
    \ to load the data locally. This replaces the server hit of the first part when\
    \ building for debugging. The second part will still operate the same. When the\
    \ data is stored, the subscription on it will parse and set it in the array.\n\
    \n2.  In updateStatusData, add test code at the top of the function to load the\
    \ JSON data from a file within a DEBUG conditional.\n\n```\n    func updateStatusData()\
    \ {\n    #if DEBUG\n    guard let urlLocal = Bundle.main.url(\n    forResource:\
    \ \"Status\",\n    withExtension: \"json\")\n    else { return }\n    if let data\
    \ = try? Data(contentsOf: urlLocal) {\n    DispatchQueue.global().async {\n  \
    \  self.statusData = data\n    }\n    }\n    return\n    #endif\n    ...\n   \
    \ ```\n\nFor production builds, we have a subscription that receives the data.\
    \ For debug, we just load the data locally. Whether we get the data from the server\
    \ or a local file, the parsing is done via a subscription to the data property.\n\
    \n**Note** To avoid the compiler warning, you can remove the return in the preceding\
    \ code, change the #endif to a #else, and put #endif at the end of the function.\
    \ See the EOC code for this chapter for details.\n\nIf you run the app now, the\
