    \ class has little to do with any functionality and nothing to do with the UI\
    \ directly.\n\nOur new NoteViewModel class houses the version of the data to be\
    \ displayed by the UI. This class does some massaging of the properties for proper\
    \ visual elements. In our case, we stored the priority setting in the Note to\
    \ a series of strings for our star/circle images. It also determines the rendering\
    \ color based on the isPastDue from the Note.\n\nOur NoteViewModel is created\
    \ with a Note instance to have all the data it needs. Its loadTestData function\
    \ loads the JSON file data and creates the notes and NoteViewModels for our previews.\n\
    \nWe similarly refactored our NoteRow to focus on the UI aspects. The only decisions\
    \ it makes are in regard to the UI. The data is all provided by the View Model.\n\
    \nThe NoteRow_Previews now just loads the test data and creates NoteRows from\
    \ the View Model instances.\n\nThe ContentView benefits from all of this by now\
    \ simply having an array of NoteViewModels which loops over to create NoteRows\
    \ in a List.\n\nBy isolating the model, view model, and view pieces, we can more\
    \ easily focus on each part separately. This allows us to edit and preview pieces\
    \ separated out as they will appear in their respective previews. And as we’re\
    \ seeing, the preview (especially in Live mode) basically is the app.\n\nThis\
    \ leads to a bit of a mindset shift. We don’t need to see developing our app as\
    \ UI, functionality, and execution. We can basically do all three at once.\n\n\
    By focusing on designing our code for the preview, we are working on the entire\
    \ app in a streamlined and seamless fashion."
  trans: "\n# 预览资源\n\n你可能已经意识到我们还没有使用 JSON 数据中的图片值。为了实现这一点，我们需要图片。我的测试数据包含两个 `Note`\
    \ 项目，其图片值分别为 `note1` 和 `note2`。我们希望在行中也显示它们。\n\n首先，我们需要在项目中包含这些名称的图片。我们将它们添加到预览内容组中的“Preview\
    \ Assets.xcassets”目录中。这样，这些图片将不会包含在用于测试和发布的构建中。\n\n我拖放了两张图片到“Preview Assets.xcassets”中，分别命名为\
    \ `note1` 和 `note2`，如图 9-8 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig8_HTML.jpg](img/497312_1_En_9_Fig8_HTML.jpg)\n\
    \n图 9-8\n\n位于“Preview Assets.xcassets”中的 `Note1` 和 `Note2` 图片\n\n对于我的 UI，我希望图片出现在行的左侧。为此，我将把\
    \ `VStack` 嵌入到 `HStack` 中。我可以使用 ⌘ + 单击 `VStack`，然后选择“Embed in HStack”，如图 9-9 所示。\n\
    \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig9_HTML.jpg](img/497312_1_En_9_Fig9_HTML.jpg)\n\
    \n图 9-9\n\n将 `VStack` 嵌入 `HStack`\n\n在已嵌入的 `VStack` 上方，我将基于 `NoteViewModel` 的\
    \ `imageName` 属性添加图片。\n\n```swift\nImage(noteVM.imageName)\n```\n\n由于我的两张图片尺寸不同，预览在画布中看起来有些错位，如图\
    \ 9-10 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig10_HTML.jpg](img/497312_1_En_9_Fig10_HTML.jpg)\n\
    \n图 9-10\n\n`NoteRow` 中的图片\n\n我们可以对 `Image` 使用一些修饰符来使其更统一。首先，我们需要让图片可调整大小。这将确保当我们改变图片的框架时，图片也会随之调整大小。我们可以选择性地传入一些内边距和调整模式，但我们这里使用默认值。可以随意尝试这些参数。\n\
    \n`Resizable` 是 `Image` 元素的一个修饰符，所以我们需要先调用它。\n\n```swift\nImage(noteVM.imageName)\n\
    .resizable()\n.frame(width: 100.0,height:100)\n```\n\n从 `resizable` 返回的 `Image`\
    \ 也遵循 `View` 协议，因此我们可以对其使用 `.frame` 修饰符。将宽度和高度设置为合理的值将使行再次看起来很好，如图 9-11 所示。\n\n\
    ![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig11_HTML.jpg](img/497312_1_En_9_Fig11_HTML.jpg)\n\
    \n图 9-11\n\n`NoteRow` 中图片尺寸均匀\n\n现在，我们只需要在 `ContentView` 中使用它！\n\n## 在 ContentView\
    \ 中使用 NoteRow\n\n我们将基本上重新开始编写 `ContentView`。起始代码可以如下所示：\n\n```swift\nstruct ContentView:\
    \ View {\n    var body: some View {\n    }\n}\n\nstruct ContentView_Previews:\
    \ PreviewProvider {\n    static var previews: some View {\n        ContentView()\n\
    \    }\n}\n```\n\n我们的代码将相当简单。`ContentView` 需要显示的数据。我们将使用一个 `NoteViewModel` 实例的数组。`body`\
    \ 将根据数组中的视图模型创建 `NoteRow` 的 `List`。\n\n1. 在 `ContentView` 中创建一个属性，用于存储 `NoteViewModel`\
    \ 实例的数组。\n2. 在 `body` 中，创建一个 `List` 项，并在其中使用 `ForEach` 循环遍历步骤 1 中的数组属性。\n\n```swift\n\
    List {\n    ForEach(items, id: \\.id)\n    { }\n}\n```\n\n3. 在 `ForEach` 的闭包中，使用从循环传入的\
    \ `NoteViewModel`（我使用简写参数名，即 `$0`）创建 `NoteRow` 的实例。\n\n```swift\nForEach(items,\
    \ id: \\.id)\n{ NoteRow(noteVM: $0) }\n```\n\n```swift\n@State private var items\
    \ = [NoteViewModel]()\n```\n\n更新你的预览。注意没有行显示。为什么？我们没有加载测试数据。我们可以在 `ContentView_Previews`\
    \ 中初始化数据，但该属性是私有的。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig12_HTML.jpg](img/497312_1_En_9_Fig12_HTML.jpg)\n\
    \n图 9-12\n\n包含 `NoteRows` 的 `ContentView` 预览\n\n4. 为你的 `ForEach` 添加一个 `.onDelete`\
    \ 修饰符。\n\n```swift\nForEach(items, id: \\.id)\n{ NoteRow(noteVM: $0) }\n.onDelete\
    \ { offsets in\n    self.items.remove(atOffsets: offsets)\n}\n```\n\n5. 使用编译条件初始化\
    \ `NoteViewModel` 实例。\n\n```swift\n#if DEBUG\n@State private var items =\n   \
    \ NoteViewModel.loadTestData()\n#else\n@State private var items = [NoteViewModel]()\n\
    #endif\n```\n\n现在，当我们在调试模式下运行 App 时，它将加载测试数据。用于测试和发布的构建不会包含此编译内容，因此没有风险。\n\n稍后，当你想针对真实数据进行测试时，可以删除或相应修改此代码。\n\
    \n6. 刷新预览并查看生成的单元格，如图 9-12 所示。\n\n这看起来开始像一个真正的 App 了！它基于测试数据，但谁能说我们的数据不会存储在 App\
    \ 内的一个 JSON 文件中呢？在 `ContentView` 中看到它，我们现在已经实现了 Model、View 和 View Model 的端到端工作。\n\
    \n## 实时模式\n\n如果我们想看到它的实际运行效果，可以点击“实时预览”按钮。该按钮位于预览上方图标栏的右侧。它显示为一个播放按钮，如图 9-13 所示。\n\
    \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig13_HTML.jpg](img/497312_1_En_9_Fig13_HTML.jpg)\n\
    \n图 9-13\n\n图标栏中的实时预览按钮\n\n预览的变化不大。实时预览按钮从“播放”图标变为“停止”图标。但预览本身是实时的。我们可以像在模拟器或物理设备上一样与之交互。\n\
    \n我们可以通过滑动来删除项目，如图 9-14 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig14_HTML.jpg](img/497312_1_En_9_Fig14_HTML.jpg)\n\
    \n图 9-14\n\n实时预览交互\n\n## 章节总结\n\n在本章中，我们向项目中的“预览内容”组添加了内容、图片和数据。我们在预览中使用了这些数据，但它不会包含在我们的构建中。正如其名称所示，它仅用于预览。\n\
    \n我们重构了代码，将需要从 JSON 文件存储的数据拆分到我们的 Model 类 `Note` 中。这个类与任何功能关系不大，并且与 UI 完全无关。\n\
    \n我们新的 `NoteViewModel` 类包含了要由 UI 显示的数据版本。这个类对属性进行了一些处理，以用于正确的视觉元素。在我们的例子中，我们将\
    \ `Note` 中的优先级设置存储为一系列用于星星/圆形图片的字符串。它还根据 `Note` 中的 `isPastDue` 确定渲染颜色。\n\n我们的\
    \ `NoteViewModel` 通过一个 `Note` 实例创建，以获取其所需的所有数据。其 `loadTestData` 函数加载 JSON 文件数据，并创建\
    \ notes 和 `NoteViewModels` 以供预览。\n\n我们类似地重构了 `NoteRow`，使其专注于 UI 方面。它所做的决策仅与 UI\
    \ 相关。所有数据都由 View Model 提供。\n\n现在，`NoteRow_Previews` 只是加载测试数据，并根据 View Model 实例创建\
    \ `NoteRows`。\n\n`ContentView` 受益于这一切，现在只需拥有一个 `NoteViewModels` 数组，循环遍历它并在 `List`\
    \ 中创建 `NoteRows`。\n\n通过分离模型、视图模型和视图组件，我们可以更轻松地分别关注每个部分。这使我们能够编辑和预览各个部分，就像它们将在各自的预览中显示一样。正如我们所看到的，预览（尤其是实时模式）基本上就是\
    \ App 本身。\n\n这带来了一些思维方式的转变。我们不再需要将开发 App 视为 UI、功能和执行。我们基本上可以同时完成这三件事。\n\n通过专注于为预览设计代码，我们正在以精简且无缝的方式处理整个\
    \ App。\n"
- fmt: '# 10. SwiftUI Navigation


    We don’t want to just list items usually. We want to allow the user to tap on
    those items and display details or edit items. Using our Notes app, we want to
    display details when a list item is tapped.


    You are, no doubt, familiar with the typical conventions of navigation in an app.
    We’ll look at the two most common. First, we’ll see how to tap a row item and
    display a view modally sliding up from the bottom.


    Second, we’ll look at adding a navigation view to the app. This will allow the
    navigation to slide views in from the right. This is the standard “drill down”
    navigation for viewing details of a selection.


    In both cases, we need to know which row the user tapped.


    ## On Tap Gesture


    To allow a view to slide up, we need to know when a user taps on a given item.
    Then, based on the items selected, we need to display related information.


    This breaks down into three steps: tap, identify data tapped, and display the
    data.


    For the tap, we can add the `.onTapGesture` modifier when we create each row.
    The same context is in scope. So in the code for the tap gesture, we have access
    to the same data used to create the row.


    In our `ListProject ContentView`, we have our `List`. Adding a tap gesture to
    a `NoteRow` looks like this:


    ```

    ForEach(items, id: \.id) { (noteVM)  in

    NoteRow(noteVM: noteVM)

    .onTapGesture {

    self.selectedNoteVM = noteVM

    }

    }

    ```


    Notice we are now accessing the note view model item in the tap gesture code.
    So the shorthand argument name (`$0`) no longer works for both scopes, and I added
    the `noteVM` parameter name.


    The preceding code also stores the `noteVM` in a property of our `ContentView`.
    This is where we are now saving the data based on the user’s selection. In our
    code, we can add the property like this:


    ```

    var selectedNoteVM : NoteViewModel?

    ```


    You’ll notice you get a compile error now. The error states that “self” is immutable.
    That’s true. So what do we do?


    Fortunately, we ultimately want our UI to be updated based on this tap. That means
    we want our UI invalidated and rendered again based on this tap. Boiled down,
    we want the state to change so the interface is updated.


    As we’ve seen before, what we really want to use here is a binding wrapper of
    our property as opposed to the property itself. First, we need to specify that
    our property is the source of truth for the selected item.


    ```

    @State var selectedNoteVM : NoteViewModel?

    ```


    So far, the code changes overall are pretty basic. We added a new property and
    added the tap gesture to the `NoteRow` creation like in Figure 10-1.


    ![../images/497312_1_En_10_Chapter/497312_1_En_10_Fig1_HTML.jpg](images/497312_1_En_10_Chapter/497312_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    On Tap Gesture for List Items


    Now that we have the user’s selected data, we need to display a new view.


    ## Modal Navigation


    For displaying a view modally, we’ll use the `.sheet` modifier. This will be a
    modifier on the `View` item we return. In the case of our `ListProject`, that’s
    the `List` item. So the `.sheet` modifier goes after the closing curly brace of
    our `List` item in the `body` property.


    If you start to type `.sheet` after the `List`’s closing curly brace, you’ll see
    the auto-complete options as in Figure 10-2.


    ![../images/497312_1_En_10_Chapter/497312_1_En_10_Fig2_HTML.jpg](images/497312_1_En_10_Chapter/497312_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    Sheet Modifier Auto-complete Options


    The first parameter is a `Binding` for either an `Identifiable` (item) or a `Bool`
    (`isPresented`). Both require a content closure that returns a `View`. If you
    choose the `Identifiable`, it will also be passed into the content closure.


    They also both have an optional `onDismiss` closure. That closure is called when
    the sheet is dismissed.


    If your `@State` property is a boolean, you can set it to `true` in cases for
    presenting the sheet. Then the content closure is called without a parameter.
    The view returned by the closure would need to be created without data or other
    properties already set.


    In our case, we already have a source of truth binding for our `selectedNoteVM`;
    we can use that as our binding. Once it’s set, the sheet closure is called with
    the binding. In our case, that’s the note view model of the row. We can use that
    to create and return a view.


    For example, we can create a `Text` item with the note view model’s text.


    ```

    .sheet(item: $selectedNoteVM) { (noteVM)

    in Text(noteVM.text)

    }

    ```


    When tapping on a row, `selectedNoteVM` is set in the tap gesture closure. That
    being set causes the `.sheet` closure to be called. The `selectedNoteVM` is passed
    in as the `noteVM` parameter. The new `Text` view is displayed as in Figure 10-3.


    ![../images/497312_1_En_10_Chapter/497312_1_En_10_Fig3_HTML.jpg](images/497312_1_En_10_Chapter/497312_1_En_10_Fig3_HTML.jpg)


    Figure 10-3


    Text Item Displayed After Row Tapped


    We added an `.onTapGesture` modifier to the `NoteRow` view in the `List`. In that
    closure, when called, we store the selected note view model item in a `@State`
    source of truth property.


    When the property is set, the `.sheet` closure is called with the item. That closure
    returns the view, in our case a `Text` item, to display modally. To return to
    the previous view, swipe the view down to dismiss it.


    You may want to display an “about page” or similar where you don’t need data selected.
    In that case, the boolean binding might be a better choice.


    Also, you might want to perform some action when the view is dismissed. In that
    case, you can provide the `onDismiss` closure as a parameter as well.


    But what about navigating for sliding views in from the right? For that, we need
    a `NavigationView`.


    ## Navigation View


    Using a navigation view to display details isn’t complex. However, it’s very different
    from the modal route we saw earlier.


    We won’t use the `.sheet` modifier so we don’t need the `@State` property wrapper.
    Since we don’t need that, we don’t need to set it either. That means we don’t
    need the `.onTapGesture` modifier. So we can remove all of those: `selectedNoteVM`
    property and `.sheet` and `.onTapGesture` modifiers.


    Our `body` property in `ContentView` is back to just the `List` and `ForEach`
    with the `.onDelete` modifier.


    ```

    var body: some View {

    List {

    ForEach(items, id: \.id) { (noteVM) in

    NoteRow(noteVM: noteVM)

    }

    .onDelete { offsets in

    self.items.remove(atOffsets: offsets)

    }

    }

    }

    ```


    We want to wrap whatever we are navigating from in a `NavigationView`. Since it’s
    a `View`, we can return that from our `body` property.


    If we simply wrap our `List` in a `NavigationView`, our preview looks like Figure
    10-4 in the Canvas.


    ![../images/497312_1_En_10_Chapter/497312_1_En_10_Fig4_HTML.jpg](images/497312_1_En_10_Chapter/497312_1_En_10_Fig4_HTML.jpg)


    Figure 10-4


    Navigation View Wrapping the List


    Notice that there is now a navigation bar at the top, but it’s empty. The title
    is added as a modifier on the item contained in the `NavigationView`.


    In the case of our `ListProject`, the `List` is the contained item. We use the
    `.navigationTitle` with a string (e.g., `Notes`) to set the title in the navigation
    bar.


    ```

    NavigationView {

    List {

    ForEach(items, id: \.id) { (noteVM) in

    NoteRow(noteVM: noteVM)

    }

    .onDelete { offsets in

    self.items.remove(atOffsets: offsets)

    }

    }.navigationTitle("Notes")

    }

    ```


    Now our bar has a title as in Figure 10-5.


    ![../images/497312_1_En_10_Chapter/497312_1_En_10_Fig5_HTML.jpg](images/497312_1_En_10_Chapter/497312_1_En_10_Fig5_HTML.jpg)


    Figure 10-5


    Navigation Bar Title


    There are other modifiers for the navigation bar. In addition to the title, there
    are modifiers for setting the style, back button, left/right items, and more.


    Now that we have our `NavigationView`, let’s look at navigating.'
