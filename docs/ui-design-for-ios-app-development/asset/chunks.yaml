  trans: "\n# 视图模型\n\n视图模型负责将模型中的数据映射为要显示的数据。例如，我们的优先级是一个枚举，分别映射为 0、1 和 2，对应低、中、高三个等级。但在视觉上，我们希望将其显示为星形和圆形图片。视图模型将完成这一映射工作。\n\
    \n新的 `NoteViewModel` 类将包含与 `Note`（模型）类相关的属性。这些属性将有效定义模型数据到视图的映射。例如，我们不再使用 priority\
    \ 属性，而是使用 `priorityImages` 属性。它是一个字符串数组，代表 UI 要显示的图片名称。\n\n此外，由于视图模型负责映射各种值，因此我们可以在此处存储\
    \ `DateFormatter`。这些属性的定义如图 9-4 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig4_HTML.jpg](img/497312_1_En_9_Fig4_HTML.jpg)\n\
    \n图 9-4\n\n`NoteViewModel` 作为视图模型类\n\n我们将遍历一个 `NoteViewModel` 实例数组，因此它需要遵循 `Identifiable`\
    \ 协议，并包含一个 UUID 字符串类型的 `id` 属性。\n\n注意 `renderingColor` 属性。我们将根据笔记中的 `isPastDue`\
    \ 值来设置此值。默认的渲染颜色是 `UIColor.label`。这样可以使渲染在浅色模式下为深色，反之亦然。\n\n显然，`NoteViewModel`\
    \ 的初始化方法需要传入一个 `Note` 实例：\n\n```\ninit(model : Note) {\n    text = model.text\n\
    \    time = NoteViewModel.dateFormatter.string(from: model.updatedAtTime)\n  \
    \  renderingColor = model.isPastDue ? Color.red : renderingColor\n    imageName\
    \ = model.image\n    priorityImages = Array(repeating: \"star.circle\", count:\
    \ model.priority.rawValue + 1)\n    priorityImages += Array(repeating: \"circle\"\
    , count: Priority.max – model.priority.rawValue)\n}\n```\n\n我们的初始化方法会存储传入的模型（`Note`）中的\
    \ `text` 属性。然后，它会根据 `Note` 中的 `updatedAtTime` 来格式化并设置 `time` 属性。\n\n`renderingColor`\
    \ 的值基于 `isPastDue`。如果已超过截止日期，则为红色；否则使用现有的默认颜色。\n\n图片值存储在 `imageName` 属性中。\n\n\
    对于 `priorityImages`，我们希望重复 `star.circle` 图片，重复次数为优先级的原始值加一。因此，对于低优先级（0），我们想要一颗星。然后，用圆圈填充剩余部分（最大值减去优先级原始值）。\n\
    \n视图模型最后需要的是一个加载 JSON 数据的方法。我们可以在代码的其他位置执行此操作，但由于我们的目标是生成用于测试的 `NoteViewModel`\
    \ 实例，因此我倾向于将其放在 `NoteViewModel` 类中，如图 9-5 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig5_HTML.jpg](img/497312_1_En_9_Fig5_HTML.jpg)\n\
    \n图 9-5\n\n将测试数据加载到视图模型实例中\n\n类似地，所有这些类、结构体和枚举都可以组织到其他文件中。你可能希望将模型类放在它们自己的组中。视图模型对象也可以放在\
    \ `ViewModel` 组中。\n\n此方法会获取文件的 URL，将其加载到 `Data` 实例中，解析为 `Note` 实例，并将这些 `Note`\
    \ 映射为 `NoteViewModel` 实例的数组。\n\n这是一个静态函数，因此无需拥有 `NoteViewModel` 实例即可调用。\n\n另外，请注意\
    \ `#if DEBUG` 编译条件。Swift 没有预处理器，但它在编译期间确实会处理相同的标志。在这种情况下，我们不希望将此函数包含在发布版本中。\n\n\
    现在我们已加载模型（`Note`）并将其转换为我们的视图模型（`NoteViewModel`）。我们需要更新视图（`NoteRow`）以使用模型视图。\n\n\
    # 视图\n\n我们的 `NoteRow` 无论是所需的数据，还是将数据转换为 UI 的过程，都将得到简化。它不再需要 `DateFormatter` 对象。它只需要一个\
    \ `NoteViewModel`：\n\n```\nstruct NoteRow: View {\n    var noteVM : NoteViewModel\n\
    ```\n\nUI 仍将包含相同的项目：文本、优先级星形、间隔符以及更新时间。但是，现在 `NoteRow` 只需从 `NoteViewModel` 获取所需内容，并仅就布局做出决策。\n\
    \n使用其 `NoteViewModel` 属性，它可以获取 `text`，显示 `priorityImages` 中的三张图片，并从视图模型的 `time`\
    \ 属性设置 `time`。\n\n`NoteRow` 还将对星形和时间使用 `renderingColor`。视图模型已根据其自身逻辑确定了颜色。`body`\
    \ 属性代码如下所示，如图 9-6 所示。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig6_HTML.jpg](img/497312_1_En_9_Fig6_HTML.jpg)\n\
    \n图 9-6\n\n使用 `NoteViewModel` 属性的 `NoteRow` 的 `body` 属性\n\n再次注意，`NoteRow` 仅根据\
    \ UI 的布局做出决策：`VStack`、`HStack`、`ForEach`、`Spacer` 等。\n\n所有这些工作都是为了根据模型、视图和视图模型的角色来分离类。目前看来我们的收获似乎不大，但在预览方面，我们确实有所收获。\n\
    \n# 预览\n\n我们的 `NoteRow_Previews` 可以变得相当简单，并且对模型和视图模型保持无关性。它基本上只需要关联并返回它们。\n\n\
    此外，我们可以在 `ForEach` 循环中为 JSON 数据中的每个项目创建一行。这有什么好处呢？这意味着我们可以在测试数据中创建模拟真实数据可能出现的各种变化。当数据出现新的变化（例如，一个新的优先级值）时，我们可以创建测试数据来表示它，并查看\
    \ UI 如何反应。\n\n## 预览测试数据\n\n在本练习中，我们将更新 `NoteRow_Previews` 结构体，以显示我们的测试 JSON 数据。我们需要加载该数据，并为文件中的每个项目创建一个\
    \ `NoteRow`。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig7_HTML.jpg](img/497312_1_En_9_Fig7_HTML.jpg)\n\
    \n图 9-7\n\n`NoteRow_Previews` 的预览\n\n1.  验证预览在画布中的显示是否符合预期，如图 9-7 所示。\n\n2.  清除\
    \ `NoteRow_Previews` 中的预览计算属性：\n\n    ```\n    static var previews: some View\
    \ {\n    }\n    ```\n\n3.  使用 `NoteViewModel.loadTestData()` 调用添加一个 `ForEach`：\n\
    \n    ```\n    ForEach(NoteViewModel.loadTestData(), id: \\.id)\n    { (noteVM)\
    \ in }\n    ```\n\n4.  在 `ForEach` 循环中，传入视图模型创建 `NoteRow` 实例：\n\n    ```\n   \
    \ { (noteVM) in\n        NoteRow(noteVM: noteVM)\n    }\n    ```\n\n5.  使用 `previewLayout`（和/或其他修饰符）按需要显示每一行：\n\
    \n    ```\n    NoteRow(noteVM: noteVM)\n        .previewLayout(.sizeThatFits)\n\
    \    ```\n\n    **注意**：你可能需要注释掉 `ContentView` 的大部分内容才能使项目编译。对于你的 `body` 和预览计算属性，你可以暂时只返回一个\
    \ `Text` 项目。\n\n在我的测试数据中，我使用了这样的日期：我的第一条笔记未过期，但第二条笔记已过期。\n\n现在，我们已经加载了测试数据，并将其渲染到\
    \ `NoteRow` 的预览中。你可以创建更多的 JSON 项目，以在画布中查看行的更多变化。\n"
- fmt: "# Preview Assets\n\nYou may have realized we aren’t using the image value\
    \ from the JSON data. To do that, we need images. My test data contains two `Note`\
    \ items with image values of `note1` and `note2`. We want to display those in\
    \ our rows too.\n\nFirst, we need to have images with those names in our project.\
    \ We’ll add these to the “Preview Assets.xcassets” catalog in our Preview Content\
    \ group. By doing this, the images won’t be included in our builds for testing\
    \ and release.\n\nI dropped two images in my “Preview Assets.xcassets” named `note1`\
    \ and `note2` as in Figure [9-8](#497312_1_En_9_Chapter.xhtml#Fig8).\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig8_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig8_HTML.jpg)\n\
    \nFigure 9-8\n\nImages `Note1` and `Note2` in “Preview Assets.xcassets”\n\nFor\
    \ my UI, I want the image to appear on the left side of the row. To do that, I’ll\
    \ embed my `VStack` in an `HStack`. I can ⌘ + click the `VStack` and select “Embed\
    \ in HStack” as in Figure [9-9](#497312_1_En_9_Chapter.xhtml#Fig9).\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig9_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig9_HTML.jpg)\n\
    \nFigure 9-9\n\nEmbed `VStack` in an `HStack`\n\nJust above the `VStack` that\
    \ was embedded, I’ll add the images based on the `NoteViewModel` `imageName` property.\n\
    \n```swift\nImage(noteVM.imageName)\n```\n\nBecause my two images aren’t the same\
    \ size, the preview looks a bit off in the Canvas as in Figure [9-10](#497312_1_En_9_Chapter.xhtml#Fig10).\n\
    \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig10_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig10_HTML.jpg)\n\
    \nFigure 9-10\n\nImages in the `NoteRow`\n\nWe can use a few modifiers on the\
    \ `Image` to make it more uniform. First, we need to make the image resizable.\
    \ This will make sure that when we change the frame of the image, the image will\
    \ resize too. Optionally, we can pass in some insets and a resizing mode, but\
    \ we’ll take the defaults. Feel free to play around with those.\n\n`Resizable`\
    \ is a modifier on the `Image` element so we need to call that first.\n\n```swift\n\
    Image(noteVM.imageName)\n.resizable()\n.frame(width: 100.0,height:100)\n```\n\n\
    The returned `Image` from `resizable` also conforms to `View` so we can use the\
    \ `.frame` modifier on that. Setting the width and height to something reasonable\
    \ will make the row look good again like Figure [9-11](#497312_1_En_9_Chapter.xhtml#Fig11).\n\
    \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig11_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig11_HTML.jpg)\n\
    \nFigure 9-11\n\n`NoteRow` with Images Sized Equally\n\nNow we just need to use\
    \ this in our `ContentView`!\n\n## Use NoteRow in ContentView\n\nWe’ll be pretty\
    \ much starting over with our `ContentView`. The starting code can look like this:\n\
    \n```swift\nstruct ContentView: View {\n    var body: some View {\n    }\n}\n\n\
    struct ContentView_Previews: PreviewProvider {\n    static var previews: some\
    \ View {\n        ContentView()\n    }\n}\n```\n\nOur code will be fairly simple.\
    \ The `ContentView` needs the data to be displayed. We’ll use an array of `NoteViewModel`\
    \ instances. The `body` will create a `List` of `NoteRows` based on the view models\
    \ in the array.\n\n1. Create a property in `ContentView` to store the `NoteViewModel`\
    \ instances in an array.\n2. In the `body`, create a `List` item and within that\
    \ a `ForEach` loop over the array property from step 1.\n\n```swift\nList {\n\
    \    ForEach(items, id: \\.id)\n    { }\n}\n```\n\n3. In the closure of the `ForEach`,\
    \ create instances of `NoteRow` using the `NoteViewModel` passed in from the loop\
    \ (I’m using shorthand argument names, i.e., `$0`).\n\n```swift\nForEach(items,\
    \ id: \\.id)\n{ NoteRow(noteVM: $0) }\n```\n\n```swift\n@State private var items\
    \ = [NoteViewModel]()\n```\n\nUpdate your preview. Notice there are no rows. Why?\
    \ We didn’t load the test data. We could initialize the data in our `ContentView_Previews`,\
    \ but the property is private.\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig12_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig12_HTML.jpg)\n\
    \nFigure 9-12\n\n`ContentView` Preview with `NoteRows`\n\n4. Add an `.onDelete`\
    \ modifier to your `ForEach`.\n\n```swift\nForEach(items, id: \\.id)\n{ NoteRow(noteVM:\
    \ $0) }\n.onDelete { offsets in\n    self.items.remove(atOffsets: offsets)\n}\n\
    ```\n\n5. Initialize the `NoteViewModel` instances with a compilation condition.\n\
    \n```swift\n#if DEBUG\n@State private var items =\n    NoteViewModel.loadTestData()\n\
    #else\n@State private var items = [NoteViewModel]()\n#endif\n```\n\nNow when we\
    \ execute the app in debug, it will load the test data. Builds for testing and\
    \ release won’t include this in the compilation so there’s no danger there.\n\n\
    Later when you want to test against live data, you can remove this code or modify\
    \ it accordingly.\n\n6. Refresh the preview and view the cells created as in Figure\
    \ [9-12](#497312_1_En_9_Chapter.xhtml#Fig12).\n\nThis is starting to look like\
    \ a real app! It’s based on test data, but who’s to say our data wouldn’t be stored\
    \ in a JSON file within the app? Seeing it in the `ContentView`, we now have our\
    \ Model, View, and View Model working end to end.\n\n## Live Mode\n\nIf we want\
    \ to see it in action, we can click the Live Preview button. This button is on\
    \ the right side of the icon bar above the preview. It appears as a play button\
    \ as in Figure [9-13](#497312_1_En_9_Chapter.xhtml#Fig13).\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig13_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig13_HTML.jpg)\n\
    \nFigure 9-13\n\nLive Preview Button in the Icon Bar\n\nThe preview doesn’t change\
    \ too much. The Live Preview button changes from a “play” icon to a “stop” icon.\
    \ But the preview itself is live. We can interact with it as we would in the simulator\
    \ or a physical device.\n\nWe can delete items by swiping as in Figure [9-14](#497312_1_En_9_Chapter.xhtml#Fig14).\n\
    \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig14_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig14_HTML.jpg)\n\
    \nFigure 9-14\n\nLive Preview Interaction\n\n## Chapter Summary\n\nIn this chapter,\
    \ we added content, images, and data to our “Preview Content” group in the project.\
    \ We used this data in our previews, but it won’t be included in our builds. It’s\
    \ just for the Preview as it is named.\n\nWe refactored our code to split out\
    \ the data to be stored from the JSON file into our Model class named `Note`.\
    \ This class has little to do with any functionality and nothing to do with the\
    \ UI directly.\n\nOur new `NoteViewModel` class houses the version of the data\
    \ to be displayed by the UI. This class does some massaging of the properties\
    \ for proper visual elements. In our case, we stored the priority setting in the\
    \ `Note` to a series of strings for our star/circle images. It also determines\
    \ the rendering color based on the `isPastDue` from the `Note`.\n\nOur `NoteViewModel`\
    \ is created with a `Note` instance to have all the data it needs. Its `loadTestData`\
    \ function loads the JSON file data and creates the notes and `NoteViewModels`\
    \ for our previews.\n\nWe similarly refactored our `NoteRow` to focus on the UI\
    \ aspects. The only decisions it makes are in regard to the UI. The data is all\
    \ provided by the View Model.\n\nThe `NoteRow_Previews` now just loads the test\
    \ data and creates `NoteRows` from the View Model instances.\n\nThe `ContentView`\
    \ benefits from all of this by now simply having an array of `NoteViewModels`\
    \ which loops over to create `NoteRows` in a `List`.\n\nBy isolating the model,\
    \ view model, and view pieces, we can more easily focus on each part separately.\
    \ This allows us to edit and preview pieces separated out as they will appear\
    \ in their respective previews. And as we’re seeing, the preview (especially in\
    \ Live mode) basically is the app.\n\nThis leads to a bit of a mindset shift.\
    \ We don’t need to see developing our app as UI, functionality, and execution.\
    \ We can basically do all three at once.\n\nBy focusing on designing our code\
    \ for the preview, we are working on the entire app in a streamlined and seamless\
    \ fashion."
