  trans: "\n# 发布者与订阅者\n\nCombine 框架引入了发布者（Publisher）和订阅者（Subscriber）的概念。你可能对 `NotificationCenter`\
    \ 并不陌生——它可以发送通知，而针对该通知名称添加的所有观察者都会通过调用关联函数收到通知。\n\n发布者定义了其特定的输出类型（Output），即它在发布时发送的值。订阅者则定义了其特定的输入类型（Input），即它从发布者接收的数据类型。这两个类型必须匹配。后续我们会探讨当类型不匹配时如何对值进行映射。\n\
    \n发布者和订阅者各自还需要定义一个失败类型（Failure），这两个失败类型也必须匹配才能建立关联。\n\n创建发布者有多种方式。我们首先看的是使用 `NotificationCenter`\
    \ 的方式。这对许多人来说是一个熟悉的机制，因此是一个很好的起点。\n\n一旦有了发布者，我们就可以为其添加订阅者，订阅者负责处理发布时传递的数据。\n\n\
    ## 转换至 Combine\n\n这个示例未必会更高效，代码量也不会减少——实际上代码量会更多。但目的是用一个熟悉的概念，演示它在全新概念下如何运作。\n\
    \n首先，我们需要将 Combine 框架导入代码中。然后从 `NotificationCenter` 获取一个发布者。我们将让 `ViewController`\
    \ 订阅更新，因此它需要遵循 `Subscriber` 协议，并实现相应的各种要求。\n\n在 `Subscriber` 的实现中，我们将获取输入的新文本值，并更新\
    \ UI。\n\n我在 `Ch15_BOC_CombineFW.zip` 文件中提供了本示例的初始代码，它其实就是本章前面讨论的代码。\n\n1.  将 Combine\
    \ 框架导入代码。\n2.  在 `viewDidLoad` 中从 `NotificationCenter` 获取一个发布者。\n\n```swift\n\
    let publisher = NotificationCenter\n    .default\n    .publisher(for:\n      \
    \  UITextField.textDidChangeNotification,\n        object: tf)\n```\n\n```swift\n\
    import Combine\n```\n\n这将返回一个针对文本框的发布者。每当文本框内容变化时，它就会发布新值。\n\n3.  让 `ViewController`\
    \ 订阅该发布者。由于我们要更新 UI，因此希望在主线程上接收更新。\n\n```swift\npublisher\n    .receive(on: DispatchQueue.main)\n\
    \    .subscribe(self)\n```\n\n另一种做法是在主线程上订阅，然后调用 `receive` 并传入订阅者。但我更喜欢上面的写法，因为它清晰明了：我打算在主线程上接收更新（用于\
    \ UI 更新），并订阅传入的指定实例。\n\n至此，我们有了发布者并完成了订阅。基本上是。但我们的 `ViewController` 尚未实现 `Subscriber`\
    \ 协议。\n\n4.  在声明中添加 `Subscriber` 协议。\n\n```swift\nclass ViewController: UIViewController,\
    \ Subscriber {\n```\n\n5.  使用编译错误消息中的“修复”按钮快速生成存根代码。这通常只会添加所需的类型别名：`Input` 和 `Failure`。\n\
    \n```swift\ntypealias Input = type\ntypealias Failure = type\n```\n\n我们需要确定这两个类型的具体值。如果深入查看\
    \ `.publisher` 调用，会发现它返回的是 `NotificationCenter.Publisher`。跳转到该类型（就在发布者函数声明下方即可看到），会发现其输出类型是\
    \ `Notification`，失败类型是 `Never`。\n\n我们的 `Input` 和 `Failure` 需要与之匹配。\n\n```swift\n\
    typealias Input = Notification\ntypealias Failure = Never\n```\n\n此时仍有编译错误。再次使用“修复”按钮，它会生成所需的函数存根。\n\
    \n6.  实现 `receive(subscription:)` 函数，指定无限量的数据更新请求。\n\n```swift\nfunc receive(subscription:\
    \ Subscription) {\n    subscription.request(.unlimited)\n}\n```\n\n7.  实现 `receive(_:)`\
    \ 输入处理函数。\n\n```swift\nfunc receive(_ input: Input) -> Subscribers.Demand {\n\
    \    if let textField = input.object as? UITextField {\n        userText = textField.text\n\
    \        lbl.text = userText\n    }\n    return .unlimited\n}\n```\n\n由于我们的 `Input`\
    \ 类型别名指定为 `Notification`，因此可以按此类型使用。当前我们处于 UI 线程，更新操作可以正常工作。\n\n返回 `.unlimited`\
    \ 表示希望继续接收无限量的响应。\n\n8.  实现 `receive(completion:)` 函数。\n\n```swift\nfunc receive(completion:\n\
    \    Subscribers.Completion) {\n    print(completion)\n}\n```\n\n在我们的场景中无需做任何处理，但在某些情况下，你可能需要在此时完成应用的某些收尾工作。\n\
    \n至此，我们的 `ViewController` 已订阅了针对文本框的 `NotificationCenter` 更新。运行应用，当我们在文本框中输入时，标签文本应随之更新。UI\
    \ 应如图 15-2 所示。\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig2_HTML.jpg](img/497312_1_En_15_Fig2_HTML.jpg)\n\
    \n*图 15-2 —— 将 TextField 输入内容设置为标签文本*\n\n相信你会同意，这种方式比最初的解决方案更繁琐、代码量更大、复杂度更高。但再次强调，本示例的目的是引导我们熟悉\
    \ Combine 框架中发布者和订阅者的概念。后续会有更精炼的改进方案。\n\n解决方案保存在 `CombineFW-Ex15-1.zip` 文件中。\n\
    \n## 改进优化\n\n我们可以对代码做的一个简单改进，是在 `viewDidLoad` 中将 `subscribe` 调用与发布者调用链式连接起来。\n\
    \n```swift\nNotificationCenter\n    .default\n    .publisher(for:\n        UITextField.textDidChangeNotification,\n\
    \        object: tf)\n    .receive(on: DispatchQueue.main)\n    .subscribe(self)\n\
    ```\n\n这样我们就不再需要存储发布者变量。但还有更好的方法！\n\nCombine 提供了两个现成的订阅者，我们可以直接使用，而不必自定义类。它们会自动匹配所关联发布者的输出类型和失败类型。这其中的魔法是什么？就是\
    \ `sink` 和 `assign`。\n\n## Sink 订阅者\n\n`sink` 订阅者接受两个闭包。第一个闭包类似于我们之前编写的 `receive(completion:)`\
    \ 函数。第二个闭包则类似于我们编写的获取更新值的函数。在我们的场景中，这个更新值是一个 `Notification` 实例。\n\n`sink` 会自动请求无限量的更新，就像我们在\
    \ `receive(subscription:)` 函数中所做的那样。而且当 Combine 创建你的订阅者时，它会使用变更发生的线程。在我们的场景中，变更发生在\
    \ UI 上，因此它已经处于主线程。\n\n如果使用 `sink`，我们可以移除对 `receive(on:)` 和 `subscribe` 的调用。不过，`sink`\
    \ 有一个返回值需要考虑：它返回一个 `AnyCancellable` 实例。\n\n我们可以将此实例存储在类属性中，确保它不会超出作用域而被从内存中移除。如果我们想取消订阅，只需对该实例调用\
    \ `.cancel` 方法。一旦超出作用域，它会被清理，并在其 `deinit` 中自动调用 `.cancel`。非常干净。\n\n因此我们需要一个属性。\n\
    \n```swift\nvar subscriber: AnyCancellable?\n```\n\n然后我们在创建发布者和订阅者时使用它。\n\n```swift\n\
    subscriber = NotificationCenter\n    .default\n    .publisher(for:\n        UITextField.textDidChangeNotification,\n\
    \        object: tf)\n    .sink(receiveCompletion: { print($0) })\n    { (notification)\
    \ in\n        if let textField = notification.object\n            as? UITextField\
    \ {\n            self.userText = textField.text\n            self.lbl.text = self.userText\n\
    \        }\n    }\n```\n\n我们像之前一样获取发布者，现在调用它的 `sink` 方法。`receiveCompletion` 闭包只是打印参数。更新值闭包所做的操作与之前一致（但属性访问时增加了\
    \ `self` 作用域指定）。\n\n最好的地方在于：我们的 `ViewController` 不再需要实现 `Subscriber` 协议，我们可以移除所有相关代码！整个代码库瞬间简洁了许多，如图\
    \ 15-3 所示（特别是当我们像我所做的那样，删除了 Storyboard 中文本框的连接之后）。\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig3_HTML.jpg](img/497312_1_En_15_Fig3_HTML.jpg)\n\
    \n*图 15-3 —— 移除 Subscriber 协议并使用 Sink 后的 ViewController*\n\n`sink` 还提供了一个不接受完成闭包的版本。所以如果你不需要处理完成事件，代码可以变得更简洁。\n"
- fmt: "# Assign Subscriber\n\nThe second provided subscriber from Combine is `assign`.\
    \ `Assign` takes two parameters. The first is a key path to a property. The second\
    \ is an instance with that key path.\n\nIn the case of our project, the key path\
    \ is for the text element of the `UILabel`. Of course, the second parameter is\
    \ the label itself. Instead of `sink`, we can use `assign` to make the assignment\
    \ to our property.\n\n```\n.assign(to: \\.userText, on: self)\n```\n\nNow our\
    \ subscriber receives the published value and assigns it to the `userText` property.\
    \ One problem: our published value is a notification and not a `String`.\n\nTo\
    \ get to the `String` value, we have to get the object out of the notification.\
    \ The object is the `UITextField`, and from that we can get the text. We need\
    \ an intermediate step.\n\n## Operators\n\nFortunately for us, `Publisher` in\
    \ Combine has a lot of operators. If you’re familiar with the standard higher-order\
    \ functions, you’ll feel at home.\n\n`Publisher` provides many operators like\
    \ `map`, `flatMap`, `reduce`, `contains`, and more. You can see a long list of\
    \ them in the Apple documentation for `Publisher` ([https://developer.apple.com/documentation/combine/publisher](https://developer.apple.com/documentation/combine/publisher)).\n\
    \nOn our publisher, we can add a `map` to drill down into the `Notification` to\
    \ get what we need.\n\n```\n.map { notif in\n  guard let tf = notif.object as?\
    \ UITextField\n  else { return \"\" }\n  return tf.text ?? \"\"\n}\n.assign(to:\
    \ \\.userText, on: self)\n```\n\nNow when the value is published, we can bind\
    \ the textfield with a `guard` statement. Then we return the textfield value.\
    \ Since our `userText` property is an optional, we can just return the text of\
    \ the `UITextField`.\n\n`map` returns the `Publisher` so it fits right into the\
    \ chaining of these calls. But unlike the `sink` that had a closure, we’re only\
    \ assigning the `userText`. The label won’t be updated.\n\n`assign` returns a\
    \ subscriber so we can’t add a second `assign` call for the label. This brings\
    \ up a great opportunity for another publisher example.\n\n## @Published Property\
    \ Wrapper\n\nWe’ve already used the `@Published` property wrapper in SwiftUI.\
    \ However, that’s part of the Combine framework so we can use it here.\n\nThis\
    \ property wrapper adds a publisher to any property! So we’re going to create\
    \ a second publisher and a second subscriber.\n\n1. Add the `@Published` property\
    \ wrapper to the `userText` property. Also, give it a default value so it’s not\
    \ `nil`.\n2. Add another subscriber property as an `AnyCancellable` Optional.\n\
    \n```\n@Published var userText : String? = \"\"\n```\n\n```\nvar subscriber2 :\
    \ AnyCancellable?\n```\n\nNow we need to use that publisher and subscribe to it.\
    \ We’ll use `assign` again. It will create the subscriber that assigns the value\
    \ in our `userText` property to the label.\n\n3. Create the publisher and subscriber\
    \ in `viewDidLoad`.\n\n```\nsubscriber2 = $userText\n  .assign(to: \\.text, on:\
    \ lbl)\n```\n\nThat’s it! The `$` gives us access to the wrapped publisher. Then\
    \ we create the subscriber with `.assign` specifying the key path and object.\n\
    \nIn this case, the published value is a `String` Optional which is what the `text`\
    \ property on a `UILabel` already is.\n\nThe functionality is back to what it\
    \ was when we used the `sink`. Depending on the code, one route might make more\
    \ sense than another.\n\n## Chapter Summary\n\nWe introduced some heavy concepts\
    \ here with the Combine framework. `Publisher`s publish updated values. `Subscriber`s\
    \ receive updated values. Again, going back to the Apple description of Combine,\
    \ we are “processing values over time.”\n\n`Publisher`s have outputs, and `Subscriber`s\
    \ have inputs. The types of these must match. They also define `Failure` types\
    \ which also must match. We implemented a `Subscriber` in our `ViewController`\
    \ and made the types match. But we also learned about `sink` and `assign` which\
    \ automatically match the types in their created subscribers.\n\nYou want to keep\
    \ a reference to the subscriber created as an `AnyCancellable`. That allows you\
    \ to cancel the subscription when needed. But also it prevents you from having\
    \ to clean up the subscription manually. `AnyCancellable` does that for you in\
    \ its `deinit`.\n\nWe also saw that `Publisher`s support a variety of operators\
    \ like `map`, `reduce`, and more. They return the same publisher so they can be\
    \ chained before the subscriber is created. Operators are particularly helpful\
    \ when you need to massage the updated value into something you need specifically.\n\
    \nThe `@Published` property wrapper adds a publisher to any property. To access\
    \ it, use the `$` before the property and continue. You can add operators and\
    \ subscribe to them like any other publisher.\n\nThese concepts already helped\
    \ us in our SwiftUI work. But hopefully, you agree that using these concepts can\
    \ be useful in any project.\n\n# 16. URLSession Publisher\n\nWhile this isn’t\
    \ a book on Combine, I do want to go through a few more things from the framework.\
    \ Hopefully, this chapter will give you an idea of how to approach using Combine.\
    \ Also, I hope that you’ll see a more direct path for learning more in using this\
    \ powerful framework.\n\nIn this chapter, we’ll look at fetching data. We’ll use\
    \ a publisher and subscriber for that. We’ll fetch data from a server which will\
    \ lead to updating the UI. For testing/preview, we’ll alternatively load data\
    \ from a file also.\n\n## URLSession Publisher\n\nIf you’ve used `URLSession`\
    \ before, you’re familiar with creating a data task. `URLSession` also provides\
    \ a data task publisher. It takes a `URL` as the parameter. It returns the publisher.\n\
    \nWe’ve already seen how this works with the `NotificationCenter` and `@Published`\
    \ wrapped properties. The concept isn’t new in that sense, but we’re now dealing\
    \ with data returned. In our case, it will be data representing JSON.\n\nWhen\
    \ decoding JSON, errors can occur so we’ll have to handle that as well.\n\nI have\
    \ provided a `Ch16_BOC_StatusTracker.zip` project for a starting point for this\
    \ chapter. Let’s look at the code."
