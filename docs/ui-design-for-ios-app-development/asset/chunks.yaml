  trans: "\n# 弹出视图修饰符\n\n弹出视图的创建方式与我们之前看到的警告、操作表和 Sheet 类似。与 `Sheet` 一样，它接受一个布尔值（`isPresented`）或可选值（`item`）的绑定。它还需要一个闭包来返回要显示的\
    \ UI。\n\n可选地，`.popover` 接受锚点（anchor point）和箭头边缘（arrow edge）参数。锚点定义了弹出视图的附着位置。它可以是一个点或一个矩形。箭头边缘则指定了弹出视图的箭头显示位置。\n\
    \n对于较小的 UI 设备（例如 iPhone），弹出视图将以模态方式显示，外观类似于图 20-7 中的 Sheet。无论锚点和箭头的值如何，情况都是如此。\n\
    \n在某些情况下，布局会阻止 UI 遵循锚点和箭头设置。在这种情况下，或者当未提供这些设置时，系统将自行决定如何显示弹出视图。\n\n**弹出视图修饰符**\n\
    \n再次使用同一个项目，我们将创建新的属性、按钮和弹出视图修饰符。\n\n1. 为 `ContentView` 添加一个新的布尔类型属性，用于绑定到 `.popover`\
    \ 修饰符。\n\n2. 在 `body` 的 `VStack` 中添加一个 `Button`，用于将属性设置为 `true`。\n\n    ```\n\
    \    Button(\"Popover\") {\n    $popover.wrappedValue = true\n    }\n    ```\n\
    \n3. 为 `Button` 添加一个 `.popover` 修饰符，该修饰符绑定到新属性，并设置附着锚点、箭头边缘以及返回符合 UI 项目的 `View`\
    \ 的内容。\n\n    ```\n    .popover(isPresented: $popover,\n    attachmentAnchor:\
    \ .point(.trailing),\n    arrowEdge: .leading,\n    content: {\n    Text(\"Popover!\
    \ Here we are just...\")\n    .lineLimit(2)\n    .frame(width: 300, height: 300,\n\
    \    alignment: .center)\n    })\n    ```\n\n```\n@State var popover = false\n\
    ```\n\n在 iPhone 和小型设备/屏幕上，它看起来像一个 `Sheet`，但在 iPad/较大屏幕上，它会像图 20-8 一样带有一个上下文箭头弹出。\n\
    \n![../images/497312_1_En_20_Chapter/497312_1_En_20_Fig8_HTML.jpg](img/497312_1_En_20_Fig8_HTML.jpg)\n\
    \n**图 20-8** 在 iPhone 和 iPad 上显示的弹出视图\n\n弹出视图非常适合根据上下文显示信息。如果您需要根据 UI 中的某些内容向用户显示消息，那么弹出视图为您提供了一个很好的选择，尤其是在\
    \ iPad 上。\n\n# 章节总结\n\n警告、操作表、Sheet 和弹出视图都绑定到一个值，并根据该值（无论是布尔值还是 `Identifiable`）进行呈现。\n\
    \n这些项目在您的应用中有多种显示方式可供选择。\n\n`.alert` 修饰符返回一个 `Alert`。它可以有一个或两个按钮，按钮可以带闭包也可以不带闭包。\n\
    \n`.actionSheet` 修饰符返回一个 `ActionSheet`，它可以包含多个按钮。如果按钮数量超出屏幕大小，它将滚动显示。\n\n对于 `.sheet`\
    \ 修饰符，我们有一个 `onDismiss` 闭包。`.sheet` 的 UI 没有特定的类型。它只是实现了 `View` 的东西，因此它可以是 `HStack`、`VStack`、`Text`\
    \ 或各种其他元素。\n\n与 `.sheet` 类似，`.popover` 有一个闭包，返回符合 `View` 的内容。在 UI 较小的情况下（例如，iPhone\
    \ 或仅部分屏幕显示的 iPad），`.popover` 和 `.sheet` 的显示效果相同。但在较大的 UI 实例上，弹出视图会像标注一样显示在被点击的\
    \ UI 附近。它可能出现在侧面或顶部/底部，并有一个指向触发元素的箭头。\n\n## 索引\n\nA\n- `ActionSheet` 修饰符变体\n-\
