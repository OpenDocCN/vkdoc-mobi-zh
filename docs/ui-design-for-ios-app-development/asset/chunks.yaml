- fmt: "# Chapter Summary\n\nIn some cases, you may need to use UIKit objects. This\
    \ ability is provided by `UIViewRepresentable` in SwiftUI.\n\nBy implementing\
    \ the protocol in a struct, you can implement methods to provide UIViews as a\
    \ `View` object. The `makeUIView` function is called when the `UIView` needs to\
    \ be created. If a binding value is changed, the `updateUIView` function is called.\n\
    \nOptionally, you can implement the `dismantleUIView` to clean up when the `UIView`\
    \ will be removed from the user interface.\n\nWe also practiced extracting a view\
    \ from an existing code.\n\nHopefully, you can see that whether you have existing\
    \ views to use or need a UIKit view, you can easily do that in SwiftUI.\n\nWe’ll\
    \ look at more ways to work with SwiftUI using existing classes going forward.\n\
    \n# 12. Data from UIKit with Coordinator\n\nIn the last chapter, we saw how to\
    \ use a `UIView` in SwiftUI. In our project, we used the `UITextView`. Views like\
    \ that allow the app to display text. However, it also allows users to edit text\
    \ the app needs to know about.\n\nUIKit provides various options for getting user\
    \ data from the UI. In some cases, controls use events with the target/action\
    \ pattern. In other cases, like text view, we also have mechanisms with the delegate\
    \ pattern.\n\nThe last chapter showed us how to display information. In this chapter,\
    \ we’ll look at ways of getting user input from UIKit controls into SwiftUI code.\n\
    \n## UIViewPresentable Protocol\n\nYou may have noticed a couple other things\
    \ when we looked at the `UIViewPresentable` protocol in the last chapter. If we\
    \ look again, we see mention of a `Coordinator` and function to create it as in\
    \ Figure [12-1](#497312_1_En_12_Chapter.xhtml#Fig1).\n\n![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig1_HTML.jpg](images/497312_1_En_12_Chapter/497312_1_En_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1\n\n`Coordinator` and `makeCoordinator` in `UIViewPresentable`\n\n\
    The definition of `makeCoordinator` returns a `Self.Coordinator`. You can see\
    \ above that code that `Coordinator` is type aliased to `Void`. However, in our\
    \ code, we’ll define an actual `Coordinator` class. Our implementation of the\
    \ `makeCoordinator` function will return our defined type.\n\n## Coordinator\n\
    \nThe coordinator is used to implement common patterns you may be familiar with\
    \ in UIKit. It coordinates between the UIViews and SwiftUI. By using a coordinator,\
    \ we can employ the delegate, datasource, and target/action patterns from UIKit.\n\
    \nSo what do we need our coordinator to do? In our `ListProject` app, we are using\
    \ a `UITextView`. We need to know when the user changes the text in the text view.\
    \ For that, we can use the delegate of the `UITextView`.\n\nTypically, you’d make\
    \ the delegate assigned to your `ViewController` and implement `UITextViewDelegate`.\
    \ Then your controller could implement the `textViewDidChange` function and access\
    \ the `text` property.\n\nIn SwiftUI, we’ll make our coordinator the delegate.\
    \ That means our new `Coordinator` class needs to conform to that delegate and\
    \ implement the `textViewDidChange` (and possibly others) function.\n\nThe declaration\
    \ of our class could look something like this:\n\n```\nclass Coordinator: UITextViewDelegate\
    \ {...}\n```\n\n> **Note:** I defined my `Coordinator` as a class **inside** the\
    \ `TextView` struct.\n\nIf we add this, we immediately get an error. `UITextViewDelegate`\
    \ inherits from `UIScrollViewDelegate` which inherits from `NSObjectProtocol`.\
    \ Our `Coordinator` doesn’t conform to `NSObjectProtocol`.\n\nWe can either add\
    \ a ton of code to conform to `NSObjectProtocol` or we can inherit from `NSObject`.\
    \ Since our `Coordinator` doesn’t inherit from another class, we’ll choose the\
    \ latter.\n\n```\nclass Coordinator: NSObject, UITextViewDelegate {...}\n```\n\
    \nProblem solved.\n\n## Binding Property Wrapper\n\nNow our `TextView` has a coordinator.\
    \ Our `TextView` instance has a binding to the text passed in. We need that `String`\
    \ to be updated as the user types. That’s the job of our coordinator.\n\nAs the\
    \ delegate, the `Coordinator` will implement `textViewDidChange` and need to store\
    \ the updated text. So our `Coordinator` class needs a binding to the text also.\n\
    \n```\n@Binding var text: String\n```\n\nTo ensure that the property is set, we\
    \ need an initializer that takes the binding as a parameter. We’ve been dealing\
    \ with Structs that get the automatic member-wise constructor. Not so with our\
    \ `Coordinator` since it’s a class.\n\nHowever, the syntax for passing in a binding\
    \ as a parameter is a bit different. The `@Binding` property wrapper is simply\
    \ a struct with a generic. So our parameter type can be spelled out that way for\
    \ our init.\n\n```\ninit(text: Binding<String>) {...}\n```\n\nOur parameter now\
    \ has the type `Binding<String>`, but our property is a `String` with a property\
    \ wrapper. If we try to assign `self.text`, we’ll get an error that we can’t assign\
    \ our parameter to a `String`.\n\nAs a property wrapper, the compiler synthesizes\
    \ the backing stored property. So our \"text\" property has a backing stored property\
    \ named \"`_text`\" which we can access.\n\n```\ninit(text: Binding<String>) {\n\
    \    _text = text\n}\n```\n\nOur coordinator has a binding property, and it’s\
    \ set in the initializer. Since we claim to conform to `UITextViewDelegate`, we\
    \ can implement the function(s) we’re interested in: `textViewDidChange`. There\
    \ we can set the property wrapper’s wrapped value.\n\n```\nfunc textViewDidChange(_\
    \ textView: UITextView) {\n    _text.wrappedValue = textView.text\n}\n```\n\n\
    When the text changes, we set the wrapped value of the property.\n\n## Coordinator\
    \ as Delegate\n\nNow we have a coordinator that does the job we want. We need\
    \ to implement `makeCoordinator`. If we implement that, it will be called before\
    \ `makeUIView`. The coordinator is set as a property on the `Context` passed to\
    \ `makeUIView`. With access to our `Coordinator` instance, we can set it as our\
    \ `UITextView`'s delegate property.\n\n```\nfunc makeUIView(context: Context)\
    \ -> UITextView {\n    let tv = UITextView()\n    tv.delegate = context.coordinator\n\
    \    return tv\n}\n```\n\n> **Note:** The following return type is `TextView.Coordinator`\
    \ because the `Coordinator` class is defined **inside** the `TextView` struct.\n\
    \n```\nfunc makeCoordinator() -> TextView.Coordinator {\n    Coordinator(text:\
    \ $text)\n}\n```\n\nThe bottom line is that the `Coordinator` class we defined\
    \ is the `UITextView`'s delegate. The mechanism to create the coordinator is built-in\
    \ with the `makeCoordinator` protocol function. The mechanism to access the created\
    \ `Coordinator` is provided by the `Context`.\n\nThe `Context` also has properties\
    \ for `Transaction` and `Environment`. The `Transaction` contains information\
    \ about animations. The `Environment` contains the environment variables. This\
    \ way, your `UIView` can have access to values just like SwiftUI."
  raw: '## Chapter Summary


    In some cases, you may need to use UIKit objects. This ability is provided by
    UIViewRepresentable in SwiftUI.


    By implementing the protocol in a struct, you can implement methods to provide
    UIViews as a View object. The makeUIView function is called when the UIView needs
    to be created. If a binding value is changed, the updateUIView function is called.


    Optionally, you can implement the dismantleUIView to clean up when the UIView
    will be removed from the user interface.


    We also practiced extracting a view from an existing code.


    Hopefully, you can see that whether you have existing views to use or need a UIKit
    view, you can easily do that in SwiftUI.


    We’ll look at more ways to work with SwiftUI using existing classes going forward.


    # 12. Data from UIKit with Coordinator


    In the last chapter, we saw how to use a UIView in SwiftUI. In our project, we
    used the UITextView. Views like that allow the app to display text. However, it
    also allows users to edit text the app needs to know about.


    UIKit provides various options for getting user data from the UI. In some cases,
    controls use events with the target/action pattern. In other cases, like text
    view, we also have mechanisms with the delegate pattern.


    The last chapter showed us how to display information. In this chapter, we’ll
    look at ways of getting user input from UIKit controls into SwiftUI code.


    ## UIViewPresentable Protocol


    You may have noticed a couple other things when we looked at the UIViewPresentable
    protocol in the last chapter. If we look again, we see mention of a Coordinator
    and function to create it as in Figure [12-1](#497312_1_En_12_Chapter.xhtml#Fig1).


    ![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig1_HTML.jpg](images/497312_1_En_12_Chapter/497312_1_En_12_Fig1_HTML.jpg)


    Figure 12-1


    Coordinator and makeCoordinator in UIViewPresentable


    The definition of makeCoordinator returns a Self.Coordinator. You can see above
    that code that Coordinator is type aliased to Void. However, in our code, we’ll
    define an actual Coordinator class. Our implementation of the makeCoordinator
    function will return our defined type.


    ## Coordinator


    The coordinator is used to implement common patterns you may be familiar with
    in UIKit. It coordinates between the UIViews and SwiftUI. By using a coordinator,
    we can employ the delegate, datasource, and target/action patterns from UIKit.


    So what do we need our coordinator to do? In our ListProject app, we are using
    a UITextView. We need to know when the user changes the text in the text view.
    For that, we can use the delegate of the UITextView.


    Typically, you’d make the delegate assigned to your ViewController and implement
    UITextViewDelegate. Then your controller could implement the textViewDidChange
    function and access the text property.


    In SwiftUI, we’ll make our coordinator the delegate. That means our new Coordinator
    class needs to conform to that delegate and implement the textViewDidChange (and
    possibly others) function.


    The declaration of our class could look something like this:


    ```

    class Coordinator: UITextViewDelegate {...}

    ```


    Note


    I defined my Coordinator as a class **inside** the TextView struct.


    If we add this, we immediately get an error. UITextViewDelegate inherits from
    UIScrollViewDelegate which inherits from NSObjectProtocol. Our Coordinator doesn’t
    conform to NSObjectProtocol.


    We can either add a ton of code to conform to NSObjectProtocol or we can inherit
    from NSObject. Since our Coordinator doesn’t inherit from another class, we’ll
    choose the latter.


    ```

    class Coordinator: NSObject, UITextViewDelegate {...}

    ```


    Problem solved.


    ## Binding Property Wrapper


    Now our TextView has a coordinator. Our TextView instance has a binding to the
    text passed in. We need that String to be updated as the user types. That’s the
    job of our coordinator.


    As the delegate, the Coordinator will implement textViewDidChange and need to
    store the updated text. So our Coordinator class needs a binding to the text also.


    ```

    @Binding var text: String

    ```


    To ensure that the property is set, we need an initializer that takes the binding
    as a parameter. We’ve been dealing with Structs that get the automatic member-wise
    constructor. Not so with our Coordinator since it’s a class.


    However, the syntax for passing in a binding as a parameter is a bit different.
    The @Binding property wrapper is simply a struct with a generic. So our parameter
    type can be spelled out that way for our init.


    ```

    init(text: Binding) {...}

    ```


    Our parameter now has the type Binding<String>, but our property is a String with
    a property wrapper. If we try to assign self.text, we’ll get an error that we
    can’t assign our parameter to a String.


    As a property wrapper, the compiler synthesizes the backing stored property. So
    our “text” property has a backing stored property named “_text” which we can access.


    ```

    init(text: Binding) {

    _text = text

    }

    ```


    Our coordinator has a binding property, and it’s set in the initializer. Since
    we claim to conform to UITextViewDelegate, we can implement the function(s) we’re
    interested in: textViewDidChange. There we can set the property wrapper’s wrapped
    value.


    ```

    func textViewDidChange(_ textView: UITextView) {

    _text.wrappedValue = textView.text

    }

    ```


    When the text changes, we set the wrapped value of the property.


    ## Coordinator as Delegate


    Now we have a coordinator that does the job we want. We need to implement makeCoordinator.
    If we implement that, it will be called before makeUIView. The coordinator is
    set as a property on the Context passed to makeUIView. With access to our Coordinator
    instance, we can set it as our UITextView’s delegate property.


    ```

    func makeUIView(context: Context) -> UITextView {

    let tv = UITextView()

    tv.delegate = context.coordinator

    return tv

    }

    ```


    Note


    The following return type is TextView.Coordinator because the Coordinator class
    is defined **inside** the TextView struct.


    ```

    func makeCoordinator() -> TextView.Coordinator {

    Coordinator(text: $text)

    }

    ```


    The bottom line is that the Coordinator class we defined is the UITextView’s delegate.
    The mechanism to create the coordinator is built-in with the makeCoordinator protocol
    function . The mechanism to access the created Coordinator is provided by the
    Context.


    The Context also has properties for Transaction and Environment. The Transaction
    contains information about animations. The Environment contains the environment
    variables. This way, your UIView can have access to values just like SwiftUI.'
  trans: "\n# 章节摘要\n\n在某些情况下，你可能需要使用 UIKit 对象。SwiftUI 通过 `UIViewRepresentable` 提供了这一能力。\n\
    \n通过在结构体中实现该协议，你可以实现相应的方法，将 UIViews 作为 `View` 对象提供。当需要创建 `UIView` 时，会调用 `makeUIView`\
    \ 函数。如果绑定值发生变化，则会调用 `updateUIView` 函数。\n\n作为可选操作，你可以实现 `dismantleUIView`，以便在 `UIView`\
    \ 从用户界面中移除时进行清理。\n\n我们还练习了从现有代码中提取视图。\n\n希望你能明白，无论你是要使用现有的视图，还是需要一个 UIKit 视图，在\
    \ SwiftUI 中都很容易实现。\n\n在接下来的内容中，我们将探讨更多利用现有类与 SwiftUI 协同工作的方法。\n\n# 12. 通过协调器从\
    \ UIKit 获取数据\n\n在上一章中，我们了解了如何在 SwiftUI 中使用 `UIView`。在我们的项目中，我们使用了 `UITextView`。这类视图允许应用显示文本。同时，它也允许用户编辑应用需要知晓的文本内容。\n\
    \nUIKit 提供了多种从 UI 获取用户数据的选项。在某些情况下，控件会使用带有目标/动作模式的事件。在其他情况下，例如文本视图，我们也有基于委托模式的机制。\n\
    \n上一章向我们展示了如何显示信息。在本章中，我们将探讨如何将 UIKit 控件的用户输入获取到 SwiftUI 代码中。\n\n## UIViewPresentable\
    \ 协议\n\n你在上一章查看 `UIViewPresentable` 协议时，可能还注意到了其他一些东西。如果我们再次审视，会看到提到了 `Coordinator`\
    \ 以及创建它的函数，如图 12-1 所示。\n\n![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig1_HTML.jpg](img/497312_1_En_12_Fig1_HTML.jpg)\n\
    \n图 12-1\n\n`UIViewPresentable` 中的 `Coordinator` 和 `makeCoordinator`\n\n`makeCoordinator`\
    \ 的定义返回一个 `Self.Coordinator`。你可以在上面的代码中看到 `Coordinator` 被类型别名为 `Void`。然而，在我们的代码中，我们将定义一个实际的\
    \ `Coordinator` 类。我们对 `makeCoordinator` 函数的实现将返回我们定义的类型。\n\n## 协调器\n\n协调器用于实现在\
    \ UIKit 中你可能熟悉的常见模式。它在 UIViews 和 SwiftUI 之间进行协调。通过使用协调器，我们可以采用 UIKit 中的委托、数据源以及目标/动作模式。\n\
    \n那么，我们需要我们的协调器做什么呢？在我们的 `ListProject` 应用中，我们使用了一个 `UITextView`。我们需要知道用户何时更改了文本视图中的文本。为此，我们可以使用\
    \ `UITextView` 的委托。\n\n通常，你会将委托赋值给你的 `ViewController` 并实现 `UITextViewDelegate`。然后，你的控制器可以实现\
    \ `textViewDidChange` 函数并访问 `text` 属性。\n\n在 SwiftUI 中，我们将让协调器作为委托。这意味着我们新的 `Coordinator`\
    \ 类需要遵守该委托，并实现 `textViewDidChange`（以及可能的其他）函数。\n\n我们类的声明可能像这样：\n\n```\nclass Coordinator:\
    \ UITextViewDelegate {...}\n```\n\n> **注意：** 我将我的 `Coordinator` 定义为一个**位于** `TextView`\
    \ 结构体**内部**的类。\n\n如果我们添加这个，会立即得到一个错误。`UITextViewDelegate` 继承自 `UIScrollViewDelegate`，而后者继承自\
    \ `NSObjectProtocol`。我们的 `Coordinator` 并不遵守 `NSObjectProtocol`。\n\n我们可以添加大量代码来遵守\
    \ `NSObjectProtocol`，或者我们可以选择继承自 `NSObject`。由于我们的 `Coordinator` 并未继承自其他类，我们将选择后者。\n\
    \n```\nclass Coordinator: NSObject, UITextViewDelegate {...}\n```\n\n问题解决了。\n\n\
    ## 绑定属性包装器\n\n现在，我们的 `TextView` 有了一个协调器。我们的 `TextView` 实例对传入的文本有一个绑定。我们需要这个 `String`\
    \ 在用户输入时被更新。这就是我们协调器的工作。\n\n作为委托，`Coordinator` 将实现 `textViewDidChange`，并且需要存储更新后的文本。所以，我们的\
    \ `Coordinator` 类也需要一个对文本的绑定。\n\n```\n@Binding var text: String\n```\n\n为了确保属性被设置，我们需要一个将绑定作为参数的初始化器。我们之前接触的都是自动拥有成员逐一构造器的结构体。但我们的\
    \ `Coordinator` 不是这样，因为它是一个类。\n\n不过，将绑定作为参数传入的语法略有不同。`@Binding` 属性包装器本身只是一个带有泛型的结构体。因此，我们的参数类型可以这样明确地写出初始化器。\n\
    \n```\ninit(text: Binding<String>) {...}\n```\n\n现在，我们的参数类型是 `Binding<String>`，但我们的属性是一个带有属性包装器的\
    \ `String`。如果我们尝试赋值给 `self.text`，会得到一个错误，提示我们无法将参数赋值给一个 `String`。\n\n作为属性包装器，编译器会合成对应的后备存储属性。所以，我们的\
    \ \"text\" 属性有一个名为 \"`_text`\" 的后备存储属性，我们可以访问它。\n\n```\ninit(text: Binding<String>)\
    \ {\n    _text = text\n}\n```\n\n我们的协调器有一个绑定属性，并且在初始化器中进行了设置。由于我们声称遵守 `UITextViewDelegate`，我们可以实现我们感兴趣的函数：`textViewDidChange`。在函数中，我们可以设置属性包装器的包装值。\n\
    \n```\nfunc textViewDidChange(_ textView: UITextView) {\n    _text.wrappedValue\
    \ = textView.text\n}\n```\n\n当文本改变时，我们设置该属性的包装值。\n\n## 将协调器作为委托\n\n现在，我们有了一个能完成我们所需工作的协调器。我们需要实现\
    \ `makeCoordinator`。如果我们实现了它，它将在 `makeUIView` 之前被调用。协调器被设置为传递给 `makeUIView` 的\
    \ `Context` 上的一个属性。通过访问我们的 `Coordinator` 实例，我们可以将其设置为我们的 `UITextView` 的委托属性。\n\
    \n```\nfunc makeUIView(context: Context) -> UITextView {\n    let tv = UITextView()\n\
    \    tv.delegate = context.coordinator\n    return tv\n}\n```\n\n> **注意：** 下面的返回类型是\
    \ `TextView.Coordinator`，因为 `Coordinator` 类被定义在 `TextView` 结构体**内部**。\n\n```\n\
    func makeCoordinator() -> TextView.Coordinator {\n    Coordinator(text: $text)\n\
    }\n```\n\n关键是，我们定义的 `Coordinator` 类就是 `UITextView` 的委托。创建协调器的机制通过协议函数 `makeCoordinator`\
    \ 内建。访问已创建的 `Coordinator` 的机制由 `Context` 提供。\n\n`Context` 还具有用于 `Transaction`\
    \ 和 `Environment` 的属性。`Transaction` 包含动画信息。`Environment` 包含环境变量。这样，你的 `UIView`\
    \ 就能像 SwiftUI 一样访问这些值。\n"
- fmt: '## Alternate Syntax


    If accessing the backing stored property doesn’t feel right, that’s OK. There’s
    another way to pass in and access the property. Instead of using the `@Binding`
    syntax for the `text` property, we can use the same syntax as the `init` parameter.


    ```

    class Coordinator: NSObject, UITextViewDelegate {

    var text: Binding

    ```


    Then the initializer and `textViewDidChange` can use the property more directly.


    ```

    init(text: Binding) {

    self.text = text

    }

    func textViewDidChange(_ textView: UITextView) {

    text.wrappedValue = textView.text

    }

    ```


    Our `TextView` doesn’t have to vary in either case. Either way works, but now
    the code feels a bit cleaner. Let’s use this version in an exercise now.


    ## Coordinator for `TextView`


    We are going to add a coordinator to our `TextView`. It will be the delegate for
    the `UITextView` we create. The `Coordinator` will be a separate class and instantiated
    in the `makeCoordinator` protocol function.


    **Note** If you’ve been updating your code as you follow along, you’ve already
    completed this exercise. Otherwise, the following steps spell out the changes
    necessary for the `TextView`’s `Coordinator`.


    1. Declare the `Coordinator` class inside `TextView` to inherit from `NSObject`
    and conform to `UITextViewDelegate`.


    1. Add the `text` property as a `Binding<String>` to the `Coordinator`.


    ```

    class Coordinator: NSObject, UITextViewDelegate {}

    ```


    1. Implement an initializer in the `Coordinator` that takes a `Binding<String>`
    parameter and sets it to the class property.


    ```

    class Coordinator: NSObject, UITextViewDelegate {

    var text: Binding

    }

    ```


    1. Implement the `textViewDidChange` in the `Coordinator` to set the wrapped value.


    ```

    init(text: Binding) {

    self.text = text

    }

    ```


    1. Implement `makeCoordinator` in the `TextView` class.


    ```

    func textViewDidChange(_ textView: UITextView) {

    text.wrappedValue = textView.text

    }

    ```


    1. Set the coordinator from the context as the created `UITextView`’s delegate.


    ```

    func makeCoordinator() -> TextView.Coordinator {

    Coordinator(text: $text)

    }

    ```


    ```

    func makeUIView(context: Context) -> UITextView {

    let tv = UITextView()

    tv.delegate = context.coordinator

    return tv

    }

    ```


    The entire `TextView` struct code should look like Figure 12-2.


    ![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig2_HTML.jpg](images/497312_1_En_12_Chapter/497312_1_En_12_Fig2_HTML.jpg)


    **Figure 12-2** — `TextView` with a `Coordinator` Class


    1. Run the app and verify, with breakpoints, that each function is called and
    the text is updated.


    Now your UI is updating the `TextView` via the coordinator when the text changes.
    We’re storing that value in the bound property which propagates back to the source
    of truth.


    ## Updating the List


    As noted in the previous chapter, the `List` isn’t updating the rows with the
    edited values. In our `ContentView`’s `List`, we aren’t passing the note items
    to a binding property wrapper.


    We can change the `NoteRow` to have a `@Binding` attribute for the `noteVM` property.
    However, that’s going to break the code in various places. No worries. We can
    do it.


    There’s mainly just two changes. The first is to add `@Binding` to the `NoteRow`
    property.


    ```

    struct NoteRow: View {

    @Binding var noteVM : NoteViewModel

    ```


    This will break the preview of the `NoteRow`. You’ll need to update that code
    to pass in a bound property also. It can mimic the way `ContentView` `ForEach`
    now uses the indices as in Figure 12-3.


    ![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig3_HTML.jpg](images/497312_1_En_12_Chapter/497312_1_En_12_Fig3_HTML.jpg)


    **Figure 12-3** — `NoteRow` Preview Updated


    Notice that the `NoteRow` is now created with a `self.$items` value. This binding
    is what we also need in the `List` in `ContentView`.


    In the `List` for `ContentView`, we need to pass in a binding when it’s created
    in the `List`. We simply put a `$` in front of the item where we create the `NoteRow`.


    ```

    NoteRow(noteVM: self.$items[noteIndex])

    ```


    Now when we run the app and edit a note, it will be reflected in the `List` as
    in Figure 12-4.


    ![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig4_HTML.jpg](images/497312_1_En_12_Chapter/497312_1_En_12_Fig4_HTML.jpg)


    **Figure 12-4** — Updated Note


    ## Chapter Summary


    Using the `Coordinator` mechanism from the `UIViewRepresentable` protocol, we
    now can edit a note. The change is reflected in the main `ContentView`’s `List`
    also.


    The coordinator concept is baked into the protocol and the `Context` passed into
    the related functions. However, the class we create can do what we need. In our
    case, it needed to conform to the `UITextViewDelegate`. That also requires the
    `NSObjectProtocol` so we inherited from `NSObject`.


    We needed the `text` property for binding, but we could do other properties binding
    or not. We could also implement other protocols or use the class as a delegate
    or datasource of other `UIView` instances.


    For our uses, we’re just playing by the rules. We made the coordinate when we
    needed to, set it as the delegate, and handled the text changes.


    You might be wondering, like I was, what if just create a `Coordinator` instance
    in `makeUIView` and set it as the delegate? Can that work? Yes and no.


    The problem is the text view’s delegate property is weak. That means it will immediately
    get released after the `makeUIView` call returns.


    What if I make the coordinator a property of `TextView`? Yes, but you can’t instantiate
    it in the declaration because it needs the `text` property.


    What if I make it an optional property and instantiate it in the `makeUIView`?
    OK, but then you’re mutating a member of the `self`. And if you mark `makeUIView`
    as `mutating`, you break the conformation to `UIViewRepresentable`.


    What if I make the `Coordinator` a variable outside of `TextView` – maybe global
    or similar? Yes, that will work. It’s a long way around the process, but it works.
    And if you want to pass in a `Coordinator`, maybe that’s the way to go.


    It does show an interesting point: the `Coordinator` setup as we used it isn’t
    really required. It can be done other ways. However, the coordinator functions
    are there to help. Also, anyone familiar with the `UIViewRepresentable` may expect
    that route.


    Now that we’ve seen the delegate pattern from UIKit used, we’ll look at the target/action
    pattern next.


    # 13. Target/Action in SwiftUI


    In the previous chapter, we used a `Coordinator` as our delegate for a `UITextView`.
    But we also realized the coordinator setup is just a helpful mechanism.


    We could have made a new class for the delegate. Or we could have made the coordinate
    implement more protocols. The class we named `Coordinate` could have been named
    something else. I can inherit from another class and can implement what we need.


    So can we use this same mechanism for the target/action pattern? Yes.


    If you have an existing `UIView`, we’ve already seen you can use it with the `UIViewRepresentable`
    protocol. Declare its properties as usual (possibly binding). Implement the `makeUIView`
    to create your `UIView` instance and return it. Implement `updateUIView` to update
    the UI as necessary.


    If you need a coordinator, implement `makeCoordinator` to return an instance of
    your coordinator class. It will get pass around in the `Context` as the coordinator
    property.


    Overall, I’d say it’s a good idea to keep the class name as `Coordinator`. My
    point is that the concept is what’s important – not so much the specific name,
    parent class, or protocol of your coordinator class.


    I’ve updated the code quite a bit. Nothing too interesting but you might want
    to start with the code base for this chapter. The concepts are the same. However,
    I moved some things into their own methods. This will help with reuse and UI updating.
    I’ll review the key changes in the following.


    Let’s look at using the target/action pattern and the coordinator.'
