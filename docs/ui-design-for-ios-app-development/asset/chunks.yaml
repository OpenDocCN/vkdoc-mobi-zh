- fmt: "### `@Binding`\n\n另一个用于绑定的指令是`@Binding`。这允许你指定另一个对象中的属性，以绑定到传入的内容。\n\n我们可能希望将一个或多个\
    \ UI 元素提取到单独的结构体中。这样可以在整个代码中重用。但我们也可能希望该值基于使用我们新元素的上下文进行绑定。\n\n例如，如果我们想要像练习中设计的那样实现步进器控件，我们可以这样做。我们只需要创建一个实现`View`协议的新结构体，并将步进器控件放入其中，如图\
    \ 4-4 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig4_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig4_HTML.jpg)\n\
    \n**图 4-4**  \nMyStepper 结构体\n\n这里，我们有一个名为`MyStepper`的新结构体。它可以位于同一个文件或另一个文件中。在我们原始的`ContentView`中，可以通过`MyStepper()`在\
    \ UI 中包含此结构体，以替代我们之前的步进器代码。\n\n你可以像使用`Button`、`Text`或其他任何视图一样，在代码中包含任意数量的此类自定义视图类型。这有助于编写更清晰、更易于维护的代码，并且非常适合复用。\n\
    \n然而，在图 4-4 中，我们将计数器作为本地属性。我们真正想要的是能够将计数器基于外部数据源。\n\n`@State`适用于给定结构体内部。在这种情况下，数据源位于`MyStepper`实现之外。为此，我们使用`@Binding`指令。\n\
    \n因此，我们将`@State`替换为`@Binding`，从这样：\n\n```\n@State private var counter : Int =\
    \ 0\n```\n\n变成这样：\n\n```\n@Binding var counter : Int\n```\n\n我们不需要提供默认值，因为它将在创建`MyStepper`时传入。注意，它不再是私有的，因为它需要被外部访问。Swift\
    \ 中的结构体会自动生成一个成员逐一初始化器。在我们的例子中，这个初始化器包含`counter`值。因此，创建`MyStepper`时的代码补全看起来像图\
    \ 4-5 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig5_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5**  \n带有`counter`参数的 MyStepper 初始化器\n\n该属性的类型是一个`Binding<Int>`（属性包装器）。就像使用可选类型一样，我们可以直接传入类型（`Int`）。在我们的代码中，可以像这样传入原始的`counter`属性：\n\
    \n```\nMyStepper(counter: $counter)\n```\n\n现在，我们的`counter`属性作为属性包装器传入`MyStepper`并由系统管理。通过`MyStepper`更改值会更新我们本地的`counter`属性。\n\
    \n如果我们想要两个步进器呢？我们可以像添加第一个一样，精确地添加第二个`MyStepper`。\n\n如果我们将`counter`绑定到这两个步进器，会发生什么？试试看。提示：使用`VStack`或类似容器来对`MyStepper`实例进行分组。\n\
    \n```\nMyStepper(counter: $counter)\nMyStepper(counter: $counter)\n```\n\n由于两个`MyStepper`实例绑定到同一个值，它们都会更新同一个数据源。更新其中一个将会改变另一个的值。UI\
    \ 渲染将反映这些变化，如图 4-6 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig6_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig6_HTML.jpg)\n\
    \n**图 4-6**  \n具有相同绑定的 MyStepper 实例\n\n我将内边距改为仅在水平方向上，以使它们更靠近。除此之外，UI 符合预期：两个`MyStepper`通过同一个绑定保持同步。\n\
    \n那么文本输入框（`TextField`）的绑定呢？如前所述，`TextField`使用`String`而不是数值。这有什么不同吗？从表面和实践来看，并无区别。参数类型不再是`Binding<Strideable>`，而是`Binding<String>`。\n\
    \n让我们尝试创建另一个包含`TextField`的视图类型，并从`ContentView`进行绑定。\n\n**文本输入结构体**\n\n在这个练习中，我们将在\
    \ UI 中添加一个`TextField`。我们将创建另一个名为`MyTextInput`的结构体（可以在同一个文件或另一个文件中）。它需要一个文本输入框和一个用于绑定的属性。\n\
    \n创建一个名为`MyInput`的新结构体（在同一个文件或另一个文件中），如下所示：\n\n```\nstruct MyInput : View {\n\
    }\n```\n\n它需要包含两部分：计算属性`body`和在创建时用于绑定的属性。\n\n在结构体声明下方添加绑定属性，如下所示：\n\n```\n@Binding\
    \ var stringVal : String\n```\n\n现在，在其下方开始编写`body`属性，如下所示：\n\n```\nvar body: some\
    \ View {\n}\n```\n\n使用至少包含标题和绑定的`TextField`元素来充实`body`属性，如下所示：\n\n```\nTextField(\"\
    Enter Value:\",\ntext: $stringVal,\nonEditingChanged: { (changed) in\nprint(changed)\n\
    }) {\nprint(\"commit: \\(self.stringVal)\")\n}\n```\n\n注意，这里提供了多个初始化器可供选择。其中包括一些带有闭包的初始化器，用于处理编辑状态的变化（开始编辑和结束编辑）。这个`onEditingChanged`闭包接受一个`Bool`参数，其中`true`表示值正在被编辑，`false`表示编辑结束。\n\
    \n另一个闭包是`onCommit`，当用户点击回车键时被调用。\n\n可选地为元素添加一些内边距，以匹配`MyStepper`的外观。\n\n```\n\
    .padding(.horizontal, 100)\n```\n\n在`ContentView`中添加一个`String`属性，用于绑定到`MyInput`。\n\
    \n```\n@State private var username = \"\"\n```\n\n在 UI 中，将带有`String`属性的`MyInput`添加到`MyStepper`下方。\n\
    \n```\nMyInput(stringVal: $username)\n```\n\n在 UI 中，在`MyInput`下方添加一个显示该`String`属性的`Text`元素。\n\
    \n```\nText(username)\n]\n\n代码（不包括`MyStepper`部分）应类似于图 4-7 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig7_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig7_HTML.jpg)\n\
    \n**图 4-7**  \nMyInput 结构体及更新后的 ContentView body 属性\n\nUI 应类似于图 4-8 所示，文本输入框中的文本会显示在`Text`标签中。\n\
    \n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig8_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig8_HTML.jpg)\n\
    \n**图 4-8**  \n包含 MyStepper、MyInput 和 Text 的 UI\n\n我们可以看到，可以通过从创建它们的元素处进行绑定，来创建额外的\
    \ UI 元素。当然，我们也可以将多个 UI 元素绑定到我们创建的同一个绑定。\n\n### 章节总结\n\n在本章中，我们回顾了在给定结构体中使用`@State`作为属性包装器的概念。使用内置\
    \ UI 元素来管理和同步值可以减少编码工作，并避免因数据未同步而产生的 bug。\n\n我们还了解了数值类型的绑定如何与`Binding`结构体及其`Strideable`和`Stride`类型配合工作。同时，我们对`TextField`使用了`String`类型的绑定。\n\
    \n`@State`和`@Binding`有助于将值保存在单一数据源中。无需复制、更新或同步值。当用户更新其输入时，这些值会自动更新，UI 会重新创建，渲染显示出新的状态。\n\
    \n让框架为我们完成这些工作，可以减少编码时间和代码量。同时，代码也更具可维护性，并能受益于框架未来的更新。\n\n我希望你同意，以这些方式使用绑定是简化\
    \ UI 及其与相关值之间关系的良好开端。\n\n我们将在后续内容中继续构建这些概念。我鼓励你练习我们所学的内容，并探索更多选项。尝试其他 UI 元素，如`Slider`、`Button`、`Toggle`、`Image`等。"
  raw: '### @Binding


    Another directive for binding is @Binding. This allows you to specify a property
    in another object to be bound to something passed in.


    We may want to take a UI element(s) and put them in a separate struct. This can
    be reused throughout our code. But we may want the value to be bound based on
    what is using our new element.


    For example, if we want our stepper control as we designed it in the exercise,
    we can do that. We just need a new struct that implements View and have our Stepper
    control in it like Figure [4-4](#497312_1_En_4_Chapter.xhtml#Fig4).


    ![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig4_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig4_HTML.jpg)


    Figure 4-4


    MyStepper Struct


    Here, we have a new struct called MyStepper. It can be in the same file or another
    file. In our original ContentView, we can include this in the UI with MyStepper()
    in place of the Stepper code we had.


    You can have any number of these View types included in your code just like a
    Button, Text, or anything else. It’s good for cleaner, more maintainable code.
    And it’s great for reuse.


    However, in Figure [4-4](#497312_1_En_4_Chapter.xhtml#Fig4), we have the counter
    as a local property. What we really want is to be able to base the counter on
    an external source of truth.


    Using @State is good for within a given struct. In this case, the source of truth
    is outside the MyStepper implementation. For that, we use the @Binding directive.


    So we replace the @State with @Binding, and this


    ```

    @State private var counter : Int = 0

    ```


    becomes this:


    ```

    @Binding var counter : Int

    ```


    We do not need to provide a default value because it will now be passed in during
    the creation of MyStepper. Notice it is no longer private as it needs to be externally
    accessed. Structs in Swift get an automatically generated member-wise initializer.
    In our case, that is the counter value. So the code complete for creating our
    MyStepper looks like Figure [4-5](#497312_1_En_4_Chapter.xhtml#Fig5).


    ![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig5_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig5_HTML.jpg)


    Figure 4-5


    MyStepper Initializer with the counter Parameter


    The type for the property is a Binding (property wrapper) for an Int. Like with
    Optionals, we can pass in the type (Int) directly. For our code, that can be the
    original counter property like this:


    ```

    MyStepper(counter: $counter)

    ```


    Now our counter property is passed into MyStepper as a property wrapper and managed
    for us. Changing the value via MyStepper updates our local counter property.


    What if we needed two steppers? We can add a second MyStepper exactly like we
    added the first one.


    If we bind counter to both, what will happen? Try it out. Note: Use a VStack or
    similar to group the MyStepper instances.


    ```

    MyStepper(counter: $counter)

    MyStepper(counter: $counter)

    ```


    Since both instances of MyStepper have the same value, they both update the same
    source of truth. Updating one will change the value for the other. The UI rendering
    will reflect these changes like Figure [4-6](#497312_1_En_4_Chapter.xhtml#Fig6).


    ![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig6_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig6_HTML.jpg)


    Figure 4-6


    MyStepper Instances with the Same Binding


    I changed the padding to only be horizontal so that they are closer together.
    But otherwise the UI is expected: two MySteppers in sync with the same binding.


    What about binding for a Textfield? As mentioned earlier, Textfield uses a String
    as opposed to a number. Is that different? Not on the surface and not in practice.
    Instead of the parameter type of Binding<Strideable>, it will be Binding<String>.


    Let’s try creating another View type with a Textfield and binding from the ContentView.


    TEXTFIELD INPUT STRUCT


    In this exercise, we’re going to add a TextField to our UI. We will create another
    struct (in the same file or another file) called MyTextInput. It needs a textfield
    and a property for binding.


    Create a new struct (in the same file or another one) named MyInput like this:


    ```

    struct MyInput : View {

    }

    ```


    It needs to have two things: the body computed property and a property for binding
    when it’s created.


    Add the binding property just below the struct line like this:


    ```

    @Binding var stringVal : String

    ```


    Now start the body property below that like this:


    ```

    var body: some View {

    }

    ```


    Flesh out the body property with a Textfield element using at least the title
    and binding like this:


    ```

    TextField("Enter Value:",

    text: $stringVal,

    onEditingChanged: { (changed) in

    print(changed)

    }) {

    print("commit: \(self.stringVal)")

    }

    ```


    Notice there are several initializers to choose from. This includes some with
    closures for when the editing changes (start editing and end editing). This onEditingChanged
    closure takes a Bool where true means the value is currently being edited, and
    false means it ended.


    Another closure is called onCommit which is called when the user taps the return
    key.


    Optionally add some padding to the element to match your MyStepper appearance.


    ```

    .padding(.horizontal, 100)

    ```


    Add a String property in your ContentView that you’ll bind to the MyInput.


    ```

    @State private var username = ""

    ```


    Add the MyInput with the String property item to your UI below the MyStepper.


    ```

    MyInput(stringVal: $username)

    ```


    Add a Text item displaying the String property below the MyInput item in the UI.


    ```

    Text(username)

    ```


    The code (not including the MyStepper) should look similar to Figure [4-7](#497312_1_En_4_Chapter.xhtml#Fig7).


    ![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig7_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig7_HTML.jpg)


    Figure 4-7


    MyInput Struct and Updated ContentView Body


    The UI should look something like Figure [4-8](#497312_1_En_4_Chapter.xhtml#Fig8)
    with the text from the Textfield displayed in the Text label.


    ![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig8_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig8_HTML.jpg)


    Figure 4-8


    UI with MyStepper, MyInput, and Text


    We see that additional UI elements can be created with binding from the items
    creating them. Of course, we could bind multiple items to the same UI element
    we create.


    ## Chapter Summary


    In this chapter, we reviewed the concept of using @State for property wrappers
    in a given struct. Using the built-in UI elements to manage and sync values saves
    coding and avoids bugs with data not being synced.


    We also got an understanding of how binding numeric types works with the Binding
    struct and its Strideable and Stride types. We also used binding of a String for
    a Textfield.


    @State and @Binding help keep the values stored in a single source of truth. No
    need to copy, update, or sync values. As the user updates their input, the values
    get updated, the UI gets recreated, and the rendering shows the new state.


    Allowing the framework to do this work for us creates less coding time and less
    code. It’s also more maintainable and benefits to updates in the framework over
    time.


    I hope you agree that using binding in these ways is a great start to simplifying
    the UI and its relationship to values they relate to.


    We’ll be building on these concepts going forward. I encourage you to practice
    what we’ve done and explore more options. Try other UI elements like Slider, Button,
    Toggle, Image, and more.'
  trans: "\n### `@Binding`\n\n另一个用于绑定的指令是`@Binding`。这允许你指定另一个对象中的属性，以绑定到传入的内容。\n\n\
    我们可能希望将一个或多个 UI 元素提取到单独的结构体中。这样可以在整个代码中重用。但我们也可能希望该值基于使用我们新元素的上下文进行绑定。\n\n例如，如果我们想要像练习中设计的那样实现步进器控件，我们可以这样做。我们只需要创建一个实现`View`协议的新结构体，并将步进器控件放入其中，如图\
    \ 4-4 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig4_HTML.jpg](img/497312_1_En_4_Fig4_HTML.jpg)\n\
    \n**图 4-4**  \nMyStepper 结构体\n\n这里，我们有一个名为`MyStepper`的新结构体。它可以位于同一个文件或另一个文件中。在我们原始的`ContentView`中，可以通过`MyStepper()`在\
    \ UI 中包含此结构体，以替代我们之前的步进器代码。\n\n你可以像使用`Button`、`Text`或其他任何视图一样，在代码中包含任意数量的此类自定义视图类型。这有助于编写更清晰、更易于维护的代码，并且非常适合复用。\n\
    \n然而，在图 4-4 中，我们将计数器作为本地属性。我们真正想要的是能够将计数器基于外部数据源。\n\n`@State`适用于给定结构体内部。在这种情况下，数据源位于`MyStepper`实现之外。为此，我们使用`@Binding`指令。\n\
    \n因此，我们将`@State`替换为`@Binding`，从这样：\n\n```\n@State private var counter : Int =\
    \ 0\n```\n\n变成这样：\n\n```\n@Binding var counter : Int\n```\n\n我们不需要提供默认值，因为它将在创建`MyStepper`时传入。注意，它不再是私有的，因为它需要被外部访问。Swift\
    \ 中的结构体会自动生成一个成员逐一初始化器。在我们的例子中，这个初始化器包含`counter`值。因此，创建`MyStepper`时的代码补全看起来像图\
    \ 4-5 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig5_HTML.jpg](img/497312_1_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5**  \n带有`counter`参数的 MyStepper 初始化器\n\n该属性的类型是一个`Binding<Int>`（属性包装器）。就像使用可选类型一样，我们可以直接传入类型（`Int`）。在我们的代码中，可以像这样传入原始的`counter`属性：\n\
    \n```\nMyStepper(counter: $counter)\n```\n\n现在，我们的`counter`属性作为属性包装器传入`MyStepper`并由系统管理。通过`MyStepper`更改值会更新我们本地的`counter`属性。\n\
    \n如果我们想要两个步进器呢？我们可以像添加第一个一样，精确地添加第二个`MyStepper`。\n\n如果我们将`counter`绑定到这两个步进器，会发生什么？试试看。提示：使用`VStack`或类似容器来对`MyStepper`实例进行分组。\n\
    \n```\nMyStepper(counter: $counter)\nMyStepper(counter: $counter)\n```\n\n由于两个`MyStepper`实例绑定到同一个值，它们都会更新同一个数据源。更新其中一个将会改变另一个的值。UI\
    \ 渲染将反映这些变化，如图 4-6 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig6_HTML.jpg](img/497312_1_En_4_Fig6_HTML.jpg)\n\
    \n**图 4-6**  \n具有相同绑定的 MyStepper 实例\n\n我将内边距改为仅在水平方向上，以使它们更靠近。除此之外，UI 符合预期：两个`MyStepper`通过同一个绑定保持同步。\n\
    \n那么文本输入框（`TextField`）的绑定呢？如前所述，`TextField`使用`String`而不是数值。这有什么不同吗？从表面和实践来看，并无区别。参数类型不再是`Binding<Strideable>`，而是`Binding<String>`。\n\
    \n让我们尝试创建另一个包含`TextField`的视图类型，并从`ContentView`进行绑定。\n\n**文本输入结构体**\n\n在这个练习中，我们将在\
    \ UI 中添加一个`TextField`。我们将创建另一个名为`MyTextInput`的结构体（可以在同一个文件或另一个文件中）。它需要一个文本输入框和一个用于绑定的属性。\n\
    \n创建一个名为`MyInput`的新结构体（在同一个文件或另一个文件中），如下所示：\n\n```\nstruct MyInput : View {\n\
    }\n```\n\n它需要包含两部分：计算属性`body`和在创建时用于绑定的属性。\n\n在结构体声明下方添加绑定属性，如下所示：\n\n```\n@Binding\
    \ var stringVal : String\n```\n\n现在，在其下方开始编写`body`属性，如下所示：\n\n```\nvar body: some\
    \ View {\n}\n```\n\n使用至少包含标题和绑定的`TextField`元素来充实`body`属性，如下所示：\n\n```\nTextField(\"\
    Enter Value:\",\ntext: $stringVal,\nonEditingChanged: { (changed) in\nprint(changed)\n\
    }) {\nprint(\"commit: \\(self.stringVal)\")\n}\n```\n\n注意，这里提供了多个初始化器可供选择。其中包括一些带有闭包的初始化器，用于处理编辑状态的变化（开始编辑和结束编辑）。这个`onEditingChanged`闭包接受一个`Bool`参数，其中`true`表示值正在被编辑，`false`表示编辑结束。\n\
    \n另一个闭包是`onCommit`，当用户点击回车键时被调用。\n\n可选地为元素添加一些内边距，以匹配`MyStepper`的外观。\n\n```\n\
    .padding(.horizontal, 100)\n```\n\n在`ContentView`中添加一个`String`属性，用于绑定到`MyInput`。\n\
    \n```\n@State private var username = \"\"\n```\n\n在 UI 中，将带有`String`属性的`MyInput`添加到`MyStepper`下方。\n\
    \n```\nMyInput(stringVal: $username)\n```\n\n在 UI 中，在`MyInput`下方添加一个显示该`String`属性的`Text`元素。\n\
    \n```\nText(username)\n```\n\n代码（不包括`MyStepper`部分）应类似于图 4-7 所示。\n\n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig7_HTML.jpg](img/497312_1_En_4_Fig7_HTML.jpg)\n\
    \n**图 4-7**  \nMyInput 结构体及更新后的 ContentView body 属性\n\nUI 应类似于图 4-8 所示，文本输入框中的文本会显示在`Text`标签中。\n\
    \n![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig8_HTML.jpg](img/497312_1_En_4_Fig8_HTML.jpg)\n\
    \n**图 4-8**  \n包含 MyStepper、MyInput 和 Text 的 UI\n\n我们可以看到，可以通过从创建它们的元素处进行绑定，来创建额外的\
    \ UI 元素。当然，我们也可以将多个 UI 元素绑定到我们创建的同一个绑定。\n\n### 章节总结\n\n在本章中，我们回顾了在给定结构体中使用`@State`作为属性包装器的概念。使用内置\
    \ UI 元素来管理和同步值可以减少编码工作，并避免因数据未同步而产生的 bug。\n\n我们还了解了数值类型的绑定如何与`Binding`结构体及其`Strideable`和`Stride`类型配合工作。同时，我们对`TextField`使用了`String`类型的绑定。\n\
    \n`@State`和`@Binding`有助于将值保存在单一数据源中。无需复制、更新或同步值。当用户更新其输入时，这些值会自动更新，UI 会重新创建，渲染显示出新的状态。\n\
    \n让框架为我们完成这些工作，可以减少编码时间和代码量。同时，代码也更具可维护性，并能受益于框架未来的更新。\n\n我希望你同意，以这些方式使用绑定是简化\
    \ UI 及其与相关值之间关系的良好开端。\n\n我们将在后续内容中继续构建这些概念。我鼓励你练习我们所学的内容，并探索更多选项。尝试其他 UI 元素，如`Slider`、`Button`、`Toggle`、`Image`等。\n"
- fmt: '# 5. ObservableObjects


    In the previous chapters, we’ve used isolated properties for values. But in development
    we usually have more complex models. We typically deal with structs or classes
    that have multiple properties representing our data.


    In this chapter, we’ll look at how to observe property updates of reference type
    objects. When the properties change, the UI will be notified and updated.


    To accomplish this, we’ll use aspects of the Combine framework. We’ll go into
    more detail of that framework in a later chapter. For now, we’ll see how it works
    for our purposes of binding.


    We will continue to work in our same `SUINotes` project. We’ll be adding some
    new objects in our existing code. For the `ContentView` struct, we’ll remove the
    current properties and body implementation and start fresh.


    ## Typical Model


    We are all familiar with structs and classes. Here’s a typical class representing
    a note object:


    ```

    enum Priority : Int {

    case low, medium, high

    }

    class Note {

    var text = ""

    var updateAtTime = Date()

    var priority = Priority.medium

    }

    ```


    Here, we have a `Note` class with three properties of types `String`, `Date`,
    and `Priority`. `Priority` is defined as an enumeration for low, medium, and high.
    It also has an underlying type of `Int` so low, medium, and high map to 0, 1,
    and 2, respectively. This will help when doing comparisons of the priority values.


    Also, `Note` has default values for all of the properties so we don’t need a defined
    initializer.


    We want to display the note objects’ contents on the UI so we need an instance
    of one. Since the `Note` class contains a `Date` property, we’ll also create a
    `DateFormatter`.


    Here’s how our `ContentView` struct properties look in `ContentView.swift` after
    we remove any previous properties:


    ```

    struct ContentView: View {

    var note = Note()

    var df = DateFormatter()

    ...

    ```


    But we need to set up the styles for our `df` instance. To do that, we’ll create
    an initializer for our `ContentView`. It looks like this:


    ```

    init() {

    df.dateStyle = .none

    df.timeStyle = .medium

    note.text = "Note Text"

    }

    ```


    Notice I also set the `note.text` property to have a nonempty string value. This
    is so there’s something to display in the UI.


    Displaying the contents of our `Note` instance is pretty straightforward. We can
    use two `Text` items to show the text and `createdAt` properties. The `DateFormatter`
    will give us a nice looking `String` for our `Date`.


    ### BUILD THE NOTE UI


    In this exercise, we’re going to build the UI to display the model as we have
    it defined. This includes two `Text` items to start.


    1. Define the `Priority` enumeration and `Note` class as it’s presented earlier,
    if you haven’t already.


    2. Replace the body implementation with two `Text` items in a `VStack`: one for
    the text and one for the `updatedAtTime`.


    Here’s what it looks like:


    ```

    var body: some View {

    VStack {

    Text(note.text)

    Text(df.string(from: note.updatedAtTime))

    }

    }

    ```


    For the priority, we want something a bit more visual than text. Let’s use star
    images. SF Symbols has a variety of options for this. We’ll use the `star.circle`
    image.


    3. Add an `HStack` for the `star.circle` images for priority:


    ```

    HStack {

    Image(systemName: "star.circle")

    Image(systemName: note.priority.rawValue > 0

    ? "star.circle" : "circle")

    Image(systemName: note.priority.rawValue > 1

    ? "star.circle" : "circle")

    }

    ```


    4. Run the app (`⌘+r`) and verify the UI looks as it should.


    For our note with a default priority of `.medium`, the UI will look like Figure
    5-1.


    ![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig1_HTML.jpg](images/497312_1_En_5_Chapter/497312_1_En_5_Fig1_HTML.jpg)


    Figure 5-1 Note UI


    Feel free to play with the UI to have it display differently. This will be the
    bases for moving forward to have the UI update when our model changes.


    If the note changes, we want to display the changes. That might be the text, date,
    or priority. We’ll add observers to the text and priority properties on `Note`:


    ```

    class Note : ObservableObject {

    var text = "" {

    didSet {

    self.updatedAtTime = Date()

    }

    }

    var updatedAtTime = Date()

    var priority = Priority.medium {

    didSet {

    self.updatedAtTime = Date()

    }

    }

    }

    ```


    Whenever the text or priority is changed, the `updatedAtTime` is also updated.


    Let’s add a button to update the text of the note:


    ```

    Button(action: {

    let newTime = self.df.string(from:Date())

    self.note.text = "now \(newTime)"

    print(self.note.text)

    }) {

    Text("Update")

    }

    ```


    The UI looks like Figure 5-2 now.


    ![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig2_HTML.jpg](images/497312_1_En_5_Chapter/497312_1_En_5_Fig2_HTML.jpg)


    Figure 5-2 Note UI with an Update Button


    I’m also printing out the new text value to verify it’s getting updated.


    If we run this, we’ll see the printout shows the `updatedAtTime` is set to the
    current time (e.g., “now 4:53:39 PM”), but the UI doesn’t update. Why not?


    ## Binding?


    You may be thinking it’s because there’s no binding to the value. That’s true.
    However, unlike with a `Toggle` or similar, `ContentView` doesn’t have a value
    it needs to pass along. More than that, the `Note` could be created by some other
    object and passed into `ContentView`.


    If you’re dealing with an existing code base, the model may already be defined
    and implemented. We don’t want to start requiring classes become structs, some
    values have `@Binding` and are passed in, maybe new initializers, and so on.


    No, instead we want to make as few changes to the model as possible.


    ## Observing Reference Objects


    This is where the Combine framework comes up. We’ll spend more time with it later.
    For now, we just need to understand that it can be used to publish updates.


    This is great when you have **reference types** that could be passed around all
    over your code. It may be changed at any point outside of your knowledge. But
    by using an `ObservableObject`, your UI can stay up to date.


    When we looked at `State`/`Binding`, the source of truth was in our `ContentView`.
    We passed that value to another object using a Property Wrapper. Changes were
    made in other code, but the source of truth was still the source and was updated.


    For binding objects, it will effectively be the other way around. The object in
    question is the source of truth, and we want to know when something changes. How?


    The `ObservableObject` protocol is the answer. In our case, that’s the `Note`
    class – hence part of the reason we’re using a class object for the `Note`. It
    needs to be a reference type.


    ## ObservableObject Protocol


    The `ObservableObject` protocol inherits from the `AnyObject` protocol. That means
    it can only be implemented by a class (not a struct or enumeration).


    So let’s declare that our `Note` class conforms to `ObservableObject`. First,
    we need to import the Combine framework at the top with


    ```

    import Combine

    ```


    Then we’ll update our `Note` class code like this:


    ```

    class Note : ObservableObject {...

    ```


    Notice that you don’t get any warnings or errors. That’s always good. There’s
    nothing in `ObservableObject` that is required that doesn’t also provide a default
    implementation.


    The changes to `Note` need to be published, and there’s a default publisher created
    for us!


    We do have to make a change to the note property in our `ContentView` as well.
    We’ll use another property wrapper here like we did with `State` and `Binding`.
    It’s called `ObservedObject`, and we need to add it to our note like this:


    ```

    @ObservedObject var note = Note()

    ```


    We’ve told the compiler that our `Note` class can be observed. Of course, nothing
    is required to observe it. Our `ContentView` wants to observe it, and it declared
    it so. There’s only one piece left.'
