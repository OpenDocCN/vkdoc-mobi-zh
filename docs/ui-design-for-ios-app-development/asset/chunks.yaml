  raw: "1.  Add an .assign modifier to assign the value and store the result in the\
    \ property from step 10.\n\n```\nvar subscriber : AnyCancellable?\n```\n\n```\n\
    subscriber = URLSession.shared\n.dataTaskPublisher(for: url)\n.map { $0.data }\n\
    .decode(type: [UserStatus].self,\ndecoder: JSONDecoder())\n.replaceError(with:\
    \ self.userStatus)\n.receive(on: DispatchQueue.main)\n.assign(to: \\.userStatus,\
    \ on: self)\n```\n\nRunning the app at this point works, but it doesn’t load the\
    \ data into the UI. That’s because we create the UI with the UserStatusMgr’s initial\
    \ values of userStatus which is blank.\n\nWe need to mark the ContentView’s mgr\
    \ property as an Observed Object. Then we’ll get updates when the userStatus property\
    \ is published. That will cause the UI to be updated.\n\n1.  Add @ObservedObject\
    \ to the mgr property in ContentView.\n\n```\n    struct ContentView: View {\n\
    \    @ObservedObject var mgr = UserStatusMgr.instance\n    ```\n\nNow the app\
    \ shows the UI and also gets updated once the data is fetched. Using the filter\
    \ works also as in Figure [16-5](#497312_1_En_16_Chapter.xhtml#Fig5).\n\n![../images/497312_1_En_16_Chapter/497312_1_En_16_Fig5_HTML.jpg](images/497312_1_En_16_Chapter/497312_1_En_16_Fig5_HTML.jpg)\n\
    \nFigure 16-5\n\nApp Running with Filtered List\n\nThis publisher only runs once.\
    \ The task runs and publishes and stops. If you run updateStatusData again, it\
    \ will fetch new data and continue.\n\nNot only did we see how to fetch data with\
    \ a publisher but also some other operators. I encourage you to research the operators\
    \ in Combine on your own to see all that is available.\n\n## Debug Data\n\nFor\
    \ development and testing, we may not want to hit the server every time. Instead\
    \ we can include code to read a test file from our project bundle.\n\nOne option\
    \ is to just load the file data and parse it into the userStatus property. That\
    \ would work fine.\n\nHere’s one solution that loads the data in the background\
    \ for debug builds and publishes on the UI thread. If this code is at the top\
    \ of updateStatusData, it will run for debug builds.\n\nNote\n\nWe’ll add a variation\
    \ of this code to the project later. There’s no need to add it now unless you\
    \ want to experiment.\n\n```\n#if DEBUG\nguard let urlLocal = Bundle.main.url(\n\
    forResource: \"Status\",\nwithExtension: \"json\")\nelse { return }\nDispatchQueue.global().async\
    \ {\nif let data = try? Data(contentsOf: urlLocal) {\nDispatchQueue.main.async\
    \ {\nself.userStatus = (try? JSONDecoder()\n.decode([UserStatus].self,\nfrom:\
    \ data))\n?? self.userStatus\n}\n}\n}\nreturn\n#endif\n```\n\nThis code creates\
    \ the bundle URL, reads the data (background), and decodes the JSON. When the\
    \ userStatus is updated, it will get published. It’s fine, but it’s a bit redundant\
    \ and doesn’t exercise our existing code when testing.\n\nWe can come up with\
    \ a more interesting solution using another subscription.\n\nFor one thing, it\
    \ will give us a chance to work through some more publisher-subscriber examples.\
    \ Also, we will likely be able to reuse code, and that will exercise more of our\
    \ production code in testing.\n\nLet’s set the loaded data (server or local) in\
    \ a property and create a subscriber to that property. In the new subscriber,\
    \ we can process the JSON data and update the userStatus property.\n\nUSING LOCAL\
    \ TEST DATA\n\nWe need a new property to store the Data instance. Also, we need\
    \ another subscriber property. We can update the updateStatusData to use the local\
    \ file route for debug builds to avoid server hits.\n\n1.  In UserStatusMgr, create\
    \ two new properties statusData (of type Data and initialized) and subscriberData\
    \ (of type AnyCancellable Optional).\n\n```\n@Published var statusData = Data()\n\
    var subscriberData : AnyCancellable?\n```\n\nWe will store the JSON data in statusData.\
    \ Since it’s published, we can create a subscription to it. Then, whenever it’s\
    \ updated, we’ll process the new data.\n\n1.  Create a new function in UserStatusMgr\
    \ to create the publisher-subscriber.\n\n```\n    func createSubscription() {\n\
    \    $statusData\n    }\n    ```\n\nI wrote earlier that there are other ways\
    \ to handle the error from the decode. One way is with a .catch operator. The\
    \ problem here is if it does catch an error, it will cancel the subscription by\
    \ replacing the publisher with a new one. In our case, that might be OK since\
    \ our publisher should only execute the task once.\n\nHowever, if we want to support\
    \ ongoing publishing, we don’t want this cancelled. Instead we can use .flatMap.\
    \ The .flatMap call takes the input from the upstream and returns a publisher.\
    \ In there we can do the decode. If it fails, we can catch it.\n\nWe’ll use .flatMap\
    \ here to see how it works.\n\n2.  Add .flatMap to the publisher.\n\n```\n   \
    \ func createSubscription() {\n    $statusData\n    .flatMap{ data in return Just(data)\n\
    \    }\n    }\n    ```\n\nAt this point, flatMap just takes the data and creates\
    \ a new publisher with Just. Just simply publishes the data and ends.\n\nWe’re\
    \ going to add operators to the Just that will decode the JSON and catch the error.\
    \ If there’s an error, we can use another Just to publish the current value of\
    \ userStatus.\n\n3.  Add the call for decoding the JSON and catching the possible\
    \ error.\n\n```\n    func createSubscription() {\n    $statusData\n    .flatMap{\
    \ data in\n    return Just(data)\n    .decode(type: [UserStatus].self,\n    decoder:\
    \ JSONDecoder())\n    .catch { _ in\n    return Just(self.userStatus)\n    }\n\
    \    }\n    }\n    ```\n\nNow we have the publisher we want. We get the publisher\
    \ of the statusData property and create a publisher with .flatMap. That takes\
    \ the data and creates another publisher with Just. Operators on that publisher\
    \ decode the JSON."
