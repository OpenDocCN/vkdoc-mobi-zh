  trans: "\n## 开关\n\n`Toggle` 是展示 SwiftUI 声明式特性的绝佳示例。创建开关时，我们不会使用 \"Switch\" 或 \"\
    UISwitch\"。而是直击本质，以声明式的方式说明\"要做什么\"，而非关注\"如何做\"。因此我们使用 `Toggle`。\n\n使用 toggle\
    \ 这个术语告诉系统我们想要做什么：为用户提供一个开/关类型的控件。这里可以看到一个接受两个参数的初始化器（图 3-5）。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig5_HTML.jpg](img/497312_1_En_3_Fig5_HTML.jpg)\n\
    \n图 3-5：Toggle 自动补全\n\n该声明展示了初始化器的更多细节：\n\n```\npublic init(isOn: Binding,\n@ViewBuilder\
    \ label: () -> Label)\n```\n\n第一个参数是开关的初始状态：开或关。但请注意，它不仅仅是一个 `Bool`。参数类型是 `Binding`，指定所使用的泛型是\
    \ `Bool`。\n\n第二个参数与 `Button` 类似，是一个名为 `Label` 的泛型。`Toggle` 代码定义了这个泛型必须遵循 `View`\
    \ 协议。\n\n## 绑定\n\n我们将在后续章节中深入探讨其工作原理。现在，只需理解它是将传入的参数绑定到 UI。因此，如果属性（例如 `isReady`）的值发生变化，`Toggle`\
    \ 也需要相应更新。\n\n此外，如果 `Toggle` 需要更新，那么 UI 也需要更新，以便重新创建并重新显示。\n\n因此，`Toggle` 和属性是绑定在一起的。当一方改变时，另一方也随之改变。\n\
    \n我们像这样声明属性：\n\n```\n@State private var isReady : Bool = false\n```\n\n## `@State`\
    \ 属性包装器\n\n为了将我们的属性 `isReady` 绑定到 UI 元素，我们需要使用 `@State` 属性包装器。这为我们完成了以下几件事。\n\n\
    它为属性创建了一个包装器。因此，虽然 `isReady` 被设置为 false，甚至被声明为 `Bool` 类型，但访问它时需要通过包装器。实际上，如果在执行期间深入查看\
    \ `isReady`，你会看到类似图 3-6 所示的内容。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig6_HTML.jpg](img/497312_1_En_3_Fig6_HTML.jpg)\n\
    \n图 3-6：调试器中的属性包装器\n\n注意类型是 `State<Bool>`。值存储在其下方。此外，位置显示为 `SwiftUI`。这是因为 UI 负责存储和管理该值。\n\
    \n`@State` 旨在为特定于某个视图的值创建\"数据源\"。这就是为什么我们也看到它被标记为 `private` —— 它仅用于此视图。这是推荐的做法。\n\
    \n要在 UI 中创建绑定，例如为我们的 `Toggle`，需要在属性前加上 `$` 前缀（例如 `$isReady`）。在其他情况下，比如检查值或以编程方式设置值，则像往常一样操作（例如，有点像可选类型：`isReady\
    \ = true`）。\n\n这里需要理解的关键点是，我们不是通过 `Toggle` 上的操作来设置值，而是绑定值。因此，我们将自己的值交给了 `Toggle`\
    \ 来更新。此外，如果值通过其他方式发生变化，`Toggle` 会在视觉上得到更新。\n\n## Toggle 标签\n\n第二个参数是一个标签。这基本上与我们之前在\
    \ `Button` 中看到的一样。第二个参数是要显示的内容。在这种情况下，它显示在 `Toggle` 旁边，而不是像 `Button` 那样显示在上面。\n\
    \n如果你查看 `Label` 参数的声明，你会看到这样一条注释：\n\n```\n一个描述切换 `isOn` 效果的视图。\n```\n\n这太棒了！它让我们能够利用现有元素的定义和外观。如果标准\
    \ `Toggle` 日后发生更改或用于其他设备，它可以根据该系统进行适配。如果你是为 iPhone 设计的，但后来要为 Apple Watch 构建，UI\
    \ 会自动适配。\n\n我们只需声明我们想要什么（即 `Toggle`），并将其绑定到它所代表的属性（即 `isReady`），以及我们想要显示的任何描述切换效果的\
    \ UI（例如 `Text`）。\n\n我们真正想要提供的是与开关一起用来描述其功能的东西。那么……让我们……\n\n## Toggle 练习\n\n在本练习中，我们将向\
    \ UI 添加一个 `Toggle`。它将绑定到一个属性，因此我们将把它作为 `isReady` 添加到 `ContentView` 中，该属性将是一个 `Bool`。\n\
    \n1. 打开一个项目（现有或新建），点击 `ContentView.swift` 文件进行编辑。\n\n2. 在 \"`var body...`\" 属性行上方添加一个属性：\n\
    \n   ```\n   @State private var isReady = false\n   ```\n\n   这将为 `isReady` 的\
    \ `Bool` 值创建一个属性包装器，初始值为 false。\n\n3. 编辑 `body` 计算属性，并在返回值的底部添加一个 `Toggle`。它有两个参数：\n\
    \n   - `isOn` – 传入 `isReady` 的绑定，使用 `$isReady`\n   - `label` – 传入一个 `Text` 项，用于在\
    \ `Toggle` 上显示。你的 Toggle 代码可能如下所示：\n\n     ```\n     Toggle(isOn: $isReady,\n\
    \     label: {\n         Text(\"Ready: \" + (isReady ? \"Yes\" : \"No\"))\n  \
    \   })\n     ```\n\n   在这种情况下，`Text` 还会指示该设置的值。在实际应用中这可能是多余的，但就我们目前的目的而言，这是对值的验证。\n\
    \n   ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig7_HTML.jpg](img/497312_1_En_3_Fig7_HTML.jpg)\n\
    \n   图 3-7：Toggle 设置为关/False\n\n4. 运行你的应用，并验证初始时 Toggle 处于关闭状态，因为 `isReady` 为\
    \ false（图 3-7）。\n\n   ![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig8_HTML.jpg](img/497312_1_En_3_Fig8_HTML.jpg)\n\
    \n   图 3-8：Toggle 设置为开/True\n\n5. 将 Toggle 打开，并验证 `Text` 元素已更新，包含 \"Yes\"（如果你定义了类似于上面的\
    \ `Text` 元素）（图 3-8）。\n\n6. 添加一个 `Button`（或修改现有的 `Button`），并在按钮被点击时切换 `isReady`\
    \ 的值。\n\n7. 运行应用，并验证当按钮被点击时，UI 会根据切换后的值进行更新。\n\n希望你能轻松完成这个练习，并看到相同乃至更多的结果！\n\n\
    ## 当前代码\n\n以下是我在完成所有这些练习后，`body` 属性的当前代码，其中包括我资源目录中一个 png 文件的 `Image`：\n\n```\n\
    var body: some View {\n    VStack {\n        Text(\"Hello, Swift\")\n        \
    \    .font(.largeTitle)\n            .fontWeight(.bold)\n            .foregroundColor(Color.blue)\n\
    \            .padding(30.0)\n            .frame(width: 200.0, height: 400.0)\n\
    \            .background(Color.green)\n            .cornerRadius(40.0)\n     \
    \   Button(action: {\n            print (\"tapped!\")\n            self.isReady.toggle()\n\
    \        }, label: { Text(\"Tap Me\") })\n        Text(\"another item\")\n   \
    \     Image(systemName: \"camera\")\n        Image(\"brainwashIcon\")\n      \
    \      .resizable()\n            .frame(width: 100, height: 100, alignment: .center)\n\
    \            .colorInvert()\n        Toggle(isOn: $isReady,\n               label:\
    \ {\n                   Text(\"Ready: \" +\n                       (isReady ?\
    \ \"Yes\" : \"No\"))\n               })\n            .padding([.leading, .trailing],\
    \ 100.0)\n    }\n}\n```\n\n图 3-9 展示了它在预览中的样子。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig9_HTML.jpg](img/497312_1_En_3_Fig9_HTML.jpg)\n\
    \n图 3-9：画布中的当前 SwiftUI 代码\n\n几点值得注意：\n\n- `Button` 操作会打印 \"tapped!\" 并切换 `isReady`\
    \ 的值。\n- 第二个 `Image` 项上有三个修饰符。`resizable` 修饰符的输出上调用了 `.frame`。\n- 我还在同一个 `Image`\
    \ 上调用了 `.colorInvert`。这可以在 `Image` 上调用，但其返回类型不响应 `.resizable()`。在某些情况下，顺序很重要。\n\
    - `Toggle` 对 `isOn` 值使用了绑定，但除此之外，`isReady` 被视为普通属性。\n- 我在 `Toggle` 上使用了 `.padding`\
    \ 使其远离边缘。\n"
- fmt: "## TextField\n\n另一个非常常见的控件是`TextField`。它允许用户输入姓名、电子邮件、电话号码、密码或其他基于文本的值。\n\n\
    还有其他用于用户输入的UI控件，但我们已经介绍过的控件加上`TextField`可能是最广泛使用的。\n\n如果我们打开视图库（右上角的+按钮，见图[3-10](#497312_1_En_3_Chapter.xhtml#Fig10)）或使用快捷键⌘⇧L，我们可以添加一个`TextField`。\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig10_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig10_HTML.jpg)\n\
    \n图 3-10 — 对象库按钮\n\n接下来，搜索“text”，我们会看到`Text`和`TextField`条目。然后，我们可以通过预览窗格（图[3-11](#497312_1_En_3_Chapter.xhtml#Fig11)）将`TextField`拖入我们的UI。\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig12_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig12_HTML.jpg)\n\
    \n图 3-12 — 用户界面中的`TextField`\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig11_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig11_HTML.jpg)\n\
    \n图 3-11 — 对象库中的`TextField`\n\n代码会根据UI元素拖放的顺序更新，包含以下内容：\n\n```\nTextField(\"Placeholder\"\
    , text:Value)\n```\n\n这个`Value`是一个占位符。如果你在其他编辑器中查看`.swift`文件，你会看到其中包含一些Xcode的标记语言。这个`Value`占位符会解析为一个空字符串（`\"\
    \"`）。在这种情况下，你实际上可以直接编译并运行此代码而无需任何修改：\n\n```\nTextField(/*@START_MENU_TOKEN@*/\"\
    Placeholder\"/\n*@END_MENU_TOKEN@*/, text: /*@START_MENU_TOKEN@*//\n*@PLACEHOLDER=Value@*/.constant(\"\
    \")/\n*@END_MENU_TOKEN@*/)\n```\n\n我将`TextField`放在了`VStack`的顶部，这样键盘就不会遮挡它（见图[3-12](#497312_1_En_3_Chapter.xhtml#Fig12)）。\n\
    \n我想做几件事让这个`TextField`更符合我们的预期。首先，我想替换占位符文本。我会将占位符改为类似“Name”、“Email”或类似的内容。其次，我想添加一些内边距使其离两侧稍远一点。最后，我想将属性值绑定到文本上。\n\
    \n这种绑定与`Toggle`非常相似。我们将创建一个带有`@State`属性包装器的`String`属性。然后使用`$`前缀将其绑定到`TextField`的`text`参数。\n\
    \n让我们把它作为一个练习来尝试。我会列出要做什么，你试试看能否不按步骤完成……\n\n### 添加一个`TextField`\n\n以下是此练习的目标列表。首先，试着不看步骤完成这些目标。无论你是否完成，准备好后查看下面的详细步骤。\n\
    \n目标：\n\n1. 打开你正在进行的项目（或创建一个新项目）。\n2. 在`ContentView`结构体中添加一个属性。它应该满足：\n    - 带有`@State`属性包装器\n\
    \    - 声明为`private`\n    - 是一个变量\n    - 类型为字符串\n    - 命名为`username`\n    - 默认值为空字符串（`\"\
    \"`）\n3. 从视图库中拖入一个`TextField`。\n4. 将`TextField`的占位符设置为“Username”。\n5. 将`TextField`初始化器的`text`参数设置为`username`属性的绑定。\n\
    6. 为`TextField`添加内边距，值为30。\n7. 奖励：在另一个UI元素上使用`.disabled(Bool)`修饰符。传入的`Bool`值为`self.username`的长度是否为0（即，如果没有用户输入，则禁用其他控件）。\n\
    \n希望你没有遇到太多困难就完成了这个练习。我们正在将越来越多的项目和概念组合在一起。我们将继续在此基础上逐步构建。\n\n根据你的起点，你的UI可能类似于图[3-13](#497312_1_En_3_Chapter.xhtml#Fig13)。\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig13_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig13_HTML.jpg)\n\
    \n图 3-13 — 练习的起始UI\n\n它看起来实际上与一个毫无意义的`TextField`没有太大区别。但我们知道，在幕后，它绑定到了`username`属性。因此，如果该属性发生变化，我们的`TextField`需要更新，整个UI将重新渲染。\n\
    \n另外请注意，“Tap Me”按钮是禁用的。这是因为`username`的长度为0。一旦用户在`TextField`中输入内容（或者`username`值以其他方式变为非空），该按钮将启用。\n\
    \n以下是详细步骤：\n\n1. 像这样添加属性：\n\n```\n@State private var username = \"\"\n```\n\n\
    2. 打开视图库（⌘⇧L），搜索“text”，并将其拖到预览画布上。代码应该如下所示：\n\n```\nTextField(\"Placeholder\"\
    , text:Value)\n```\n\n3. 将“Placeholder”文本改为“Username”。\n4. 将第二个参数（当前为“Value”）改为对`username`属性的绑定，如下所示：\n\
    \n```\nTextField(\"Username\", text: $username)\n```\n\n5. 使用`.padding(30)`添加内边距修饰符。\n\
    6. 在下方添加一个`Text`项，用于显示输入时的值。\n\n```\nText(username)\n```\n\n7. 对于其他某个控件，添加`.disabled`修饰符。传入的`Bool`值为`self.username.count\
    \ == 0`。\n\n最终代码应如下所示：\n\n```\n@State private var username = \"\"\nvar body: some\
    \ View {\n    VStack {\n        TextField(\"Username\", text: $username)\n   \
    \         .padding(30)\n        Text(\"Hello, Swift\")\n            .font(.largeTitle)\n\
    \            .fontWeight(.bold)\n            .foregroundColor(Color.blue)\n  \
    \          .padding(30.0)\n            .frame(width: 200.0, height:400.0)\n  \
    \          .background(Color.green)\n            .cornerRadius(40.0)\n       \
    \ Button(action: {\n            print (\"tapped!\")\n            self.isReady.toggle()\n\
    \        }, label: { Text(\"Tap Me\") })\n            .disabled(self.username.count\
    \ == 0)\n    }\n}\n```\n\n要在实时预览中运行应用，请点击画布中UI上方的图标栏中的播放按钮（图[3-14](#497312_1_En_3_Chapter.xhtml#Fig14)）。\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig14_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig14_HTML.jpg)\n\
    \n图 3-14 — 画布中的按钮栏\n\n如果你按照步骤操作，应该可以在`TextField`中输入内容，并在下方的`Text`项中看到相同的值（图[3-15](#497312_1_En_3_Chapter.xhtml#Fig15)）。\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig15_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig15_HTML.jpg)\n\
    \n图 3-15 — 练习的最终UI\n\n此外，“Tap Me”按钮只有在`TextField`中有文本时才应启用。\n\n## 章节总结\n\n我们在本章中探讨的每个控件在SwiftUI开发中都非常常见。熟悉它们及其修饰符非常重要。\n\
    \n随着我们覆盖更多内容，我们将看到一些控件如何组合和重叠，以及我们拥有的其他修饰符、手势、事件等。\n\n我们还将介绍更多概念，例如来自Combine框架的绑定。`@State`属性包装器和绑定只是其中的一小部分。这可能是一个新概念并且容易混淆，所以我们会循序渐进。但它也非常强大，是真正掌握SwiftUI的关键概念。\n\
    \n我想鼓励你对我们本章所做的一切进行更多练习。启动一个新项目，添加各种UI元素，探索修饰符，从视图库中拖入项目，并普遍练习我们所学的内容。\n\n# 4.\
    \ 绑定数据源\n\n我们在上一章介绍了`@State`。这里我们将简要回顾一下，并讨论更多关于SwiftUI中数据流的概念。"
  raw: "## TextField\n\nOne other control that is very common also is the TextField.\
    \ It allows users to type input in whether it’s a name, email, phone number, password,\
    \ or other text-based values.\n\nThere are other UI controls used for user input,\
    \ but the ones we’ve covered plus the TextField are probably the most widely used.\n\
    \nIf we bring up the View Library (+ button on the top right (see Figure [3-10](#497312_1_En_3_Chapter.xhtml#Fig10))\
    \ or ⌘⇧L), we can add a TextField.\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig10_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10\n\nObject Library Button\n\nNext, filter by “text” and we’ll see\
    \ listed the Text item and TextField item. From here, we can drag the TextField\
    \ into our UI via the Preview pane (Figure [3-11](#497312_1_En_3_Chapter.xhtml#Fig11)).\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig12_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12\n\nTextField in the User Interface\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig11_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11\n\nTextField in the Object Library\n\nThe code is updated (based\
    \ on where in the order of UI elements it’s dropped) to include\n\n```\nTextField(\"\
    Placeholder\", text:Value)\n```\n\nThis Value is a placeholder. If you look at\
    \ the .swift file in another editor, you’ll see it contains some markup language\
    \ for Xcode. This Value placeholder resolves to an empty string (“”). In this\
    \ case, you can actually compile and run this code with any changes:\n\n```\n\
    TextField(/*@START_MENU_TOKEN@*/\"Placeholder\"/\n*@END_MENU_TOKEN@*/, text: /*@START_MENU_TOKEN@*//\n\
    *@PLACEHOLDER=Value@*/.constant(\"\")/\n*@END_MENU_TOKEN@*/)\n```\n\nI put the\
    \ TextField at the top of my VStack so that the keyboard would be far away from\
    \ covering it up (See Figure [3-12](#497312_1_En_3_Chapter.xhtml#Fig12)).\n\n\
    I’d like to do a few things to make this TextField more like we’d expect. First,\
    \ I want to replace the placeholder text. I’ll change the Placeholder to something\
    \ like Name, Email, or similar. Also, I want to add some padding to get it a little\
    \ bit away from the sides. Finally, I want to bind a property value to the text.\n\
    \nBinding in this case is very similar to the Toggle. We’ll create a String property\
    \ with a @State property wrapper. Then we’ll use the $ prefix to bind it to the\
    \ text parameter for the TextField.\n\nLet’s try that as an exercise. I’ll list\
    \ out what to do, and you see if you can do it without the steps…\n\nADD A TEXTFIELD\n\
    \nHere are the goals of this exercise in a list. First, try to accomplish these\
    \ things without looking at the steps. Whether you get it done or not, check out\
    \ the following details once you’re ready.\n\nGoals:\n\n1.  Open your ongoing\
    \ project (or create a new one).\n\n2.  Add a property to your ContentView struct.\
    \ It should be\n    1.  An @State property wrapper\n\n2.  Declared as private\n\
    \n3.  A variable\n\n4.  A string\n\n5.  Named username\n\n6.  Defaulted to empty\
    \ string (“”)\n\n3.  Add a TextField by dragging in from the View Library.\n\n\
    4.  Set the placeholder for the TextField to be “Username”.\n\n5.  Set the text\
    \ parameter for the TextField initializer to a binding of the username property.\n\
    \n6.  Add padding to the TextField with a value of 30.\n\n7.  Bonus: Use the .disabled(Bool)\
    \ modifier on another UI element. Pass in as the Bool value that the length of\
    \ self.username be 0 (i.e., if there’s no user input, the other control should\
    \ be disabled).\n\nHopefully, you were able to complete this exercise without\
    \ much trouble. We’re putting together more and more items and concepts. And we’ll\
    \ continue to build on these over time.\n\nDepending on your starting point, your\
    \ UI may look something like Figure [3-13](#497312_1_En_3_Chapter.xhtml#Fig13).\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig13_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13\n\nStarting UI for the Exercise\n\nIt doesn’t look too much different\
    \ really than just a pointless TextField. But we know that behind the scene, it’s\
    \ bound to the username property. So if that property changes, our TextField will\
    \ need updating, and the whole UI will be re-rendered.\n\nAlso notice that the\
    \ “Tap Me” button is disabled. This is because the username length is 0\\. Once\
    \ the user types in the TextField (or the username value changes in some other\
    \ way to not be blank), the button will enable.\n\nHere’s the steps:\n\n1.  Add\
    \ the property like this:\n\n1.  Open the View Library (⌘⇧L), filter for “text”,\
    \ and drag it onto your Preview canvas. The code should look like this:\n\n```\n\
    @State private var username = \"\"\n```\n\n1.  Change the “Placeholder” text to\
    \ “Username.”\n\n2.  Change the second parameter (currently “Value”) to be a binding\
    \ to the username property like this:\n\n```\nTextField(\"Placeholder\", text:Value)\n\
    ```\n\n1.  Add the padding modifier with `.padding(30)`.\n\n2.  Add a Text item\
    \ below that to display the value as it’s typed.\n\n```\nTextField(\"Username\"\
    , text: $username)\n```\n\n1.  For some other control, add the .disabled modifier.\
    \ Pass in as the Bool value self.username.count == 0.\n\n```\nText(username)\n\
    ```\n\nThe resulting code should look like this:\n\n```\n@State private var username\
    \ = \"\"\nvar body: some View {\nVStack {\nTextField(\"Username\", text: $username)\n\
    .padding(30)\nText(\"Hello, Swift\")\n.font(.largeTitle)\n.fontWeight(.bold)\n\
    .foregroundColor(Color.blue)\n.padding(30.0)\n.frame(width: 200.0, height:400.0)\n\
    .background(Color.green)\n.cornerRadius(40.0)\nButton(action: {\nprint (\"tapped!\"\
    )\nself.isReady.toggle()\n}, label: { Text(\"Tap Me\") })\n.disabled(self.username.count\
    \ == 0)\n```\n\nTo run the app in Live Preview, tap the play button in the icon\
    \ bar above the UI in the Canvas (Figure [3-14](#497312_1_En_3_Chapter.xhtml#Fig14)).\n\
    \n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig14_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig14_HTML.jpg)\n\
    \nFigure 3-14\n\nButton Bar in the Canvas\n\nIf you followed the steps, you should\
    \ be able to type in the TextField and see the same value in the Text item below\
    \ it (Figure [3-15](#497312_1_En_3_Chapter.xhtml#Fig15)).\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig15_HTML.jpg](images/497312_1_En_3_Chapter/497312_1_En_3_Fig15_HTML.jpg)\n\
    \nFigure 3-15\n\nEnding UI for the Exercise\n\nAlso, the Tap Me button should\
    \ only be enabled when there is text in the TextField.\n\n## Chapter Summary\n\
    \nEach of the controls we’ve explored in this chapter is very common in SwiftUI\
    \ development. It’s important to be familiar with what they are and their modifiers.\n\
    \nWe’ll see as we cover more ground how some controls can be combined and have\
    \ overlap and what other modifiers, gestures, events, and more that we have provided\
    \ for us.\n\nWe’ll also cover more concepts like binding from the Combine framework.\
    \ The @State property wrapper and binding are a small piece of that. It can be\
    \ new and confusing so we’ll take it slow. But it is also very powerful and a\
    \ key concept to truly mastering SwiftUI.\n\nI want to encourage you to get some\
    \ more practice with everything we’ve done in this chapter. Start a new project,\
    \ add various UI elements, explore the modifiers, drop items in from the View\
    \ Library, and generally practice with what we’ve covered.\n\n# 4. Binding Source\
    \ of Truth\n\nWe introduced @State in the previous chapter. We’ll revisit that\
    \ briefly here as well as discuss more concepts of the flow of data in SwiftUI."
  trans: "\n## TextField\n\n另一个非常常见的控件是 `TextField`。它允许用户输入姓名、电子邮件、电话号码、密码或其他基于文本的值。\n\
    \n还有其他用于用户输入的 UI 控件，但我们已经介绍过的控件加上 `TextField` 可能是最广泛使用的。\n\n如果我们打开视图库（右上角的 + 按钮，见图\
    \ 3-10）或使用快捷键 ⌘⇧L，我们可以添加一个 `TextField`。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig10_HTML.jpg](img/497312_1_En_3_Fig10_HTML.jpg)\n\
    \n**图 3-10** — 对象库按钮\n\n接下来，搜索“text”，我们会看到 `Text` 和 `TextField` 条目。然后，我们可以通过预览窗格（图\
    \ 3-11）将 `TextField` 拖入我们的 UI。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig12_HTML.jpg](img/497312_1_En_3_Fig12_HTML.jpg)\n\
    \n**图 3-12** — 用户界面中的 `TextField`\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig11_HTML.jpg](img/497312_1_En_3_Fig11_HTML.jpg)\n\
    \n**图 3-11** — 对象库中的 `TextField`\n\n代码会根据 UI 元素拖放的顺序更新，包含以下内容：\n\n```\nTextField(\"\
    Placeholder\", text:Value)\n```\n\n这个 `Value` 是一个占位符。如果你在其他编辑器中查看 `.swift` 文件，你会看到其中包含一些\
    \ Xcode 的标记语言。这个 `Value` 占位符会解析为一个空字符串（`\"\"`）。在这种情况下，你实际上可以直接编译并运行此代码而无需任何修改：\n\
    \n```\nTextField(/*@START_MENU_TOKEN@*/\"Placeholder\"/\n*@END_MENU_TOKEN@*/,\
    \ text: /*@START_MENU_TOKEN@*//\n*@PLACEHOLDER=Value@*/.constant(\"\")/\n*@END_MENU_TOKEN@*/)\n\
    ```\n\n我将 `TextField` 放在了 `VStack` 的顶部，这样键盘就不会遮挡它（见图 3-12）。\n\n我想做几件事让这个 `TextField`\
    \ 更符合我们的预期。首先，我想替换占位符文本。我会将占位符改为类似“Name”、“Email”或类似的内容。其次，我想添加一些内边距使其离两侧稍远一点。最后，我想将属性值绑定到文本上。\n\
    \n这种绑定与 `Toggle` 非常相似。我们将创建一个带有 `@State` 属性包装器的 `String` 属性。然后使用 `$` 前缀将其绑定到 `TextField`\
    \ 的 `text` 参数。\n\n让我们把它作为一个练习来尝试。我会列出要做什么，你试试看能否不按步骤完成……\n\n### 添加一个 `TextField`\n\
    \n以下是此练习的目标列表。首先，试着不看步骤完成这些目标。无论你是否完成，准备好后查看下面的详细步骤。\n\n目标：\n\n1. 打开你正在进行的项目（或创建一个新项目）。\n\
    2. 在 `ContentView` 结构体中添加一个属性。它应该满足：\n    - 带有 `@State` 属性包装器\n    - 声明为 `private`\n\
    \    - 是一个变量\n    - 类型为字符串\n    - 命名为 `username`\n    - 默认值为空字符串（`\"\"`）\n3. 从视图库中拖入一个\
    \ `TextField`。\n4. 将 `TextField` 的占位符设置为“Username”。\n5. 将 `TextField` 初始化器的 `text`\
    \ 参数设置为 `username` 属性的绑定。\n6. 为 `TextField` 添加内边距，值为 30。\n7. 奖励：在另一个 UI 元素上使用\
    \ `.disabled(Bool)` 修饰符。传入的 `Bool` 值为 `self.username` 的长度是否为 0（即，如果没有用户输入，则禁用其他控件）。\n\
    \n希望你没有遇到太多困难就完成了这个练习。我们正在将越来越多的项目和概念组合在一起。我们将继续在此基础上逐步构建。\n\n根据你的起点，你的 UI 可能类似于图\
    \ 3-13。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig13_HTML.jpg](img/497312_1_En_3_Fig13_HTML.jpg)\n\
    \n**图 3-13** — 练习的起始 UI\n\n它看起来实际上与一个毫无意义的 `TextField` 没有太大区别。但我们知道，在幕后，它绑定到了\
    \ `username` 属性。因此，如果该属性发生变化，我们的 `TextField` 需要更新，整个 UI 将重新渲染。\n\n另外请注意，“Tap Me”按钮是禁用的。这是因为\
    \ `username` 的长度为 0。一旦用户在 `TextField` 中输入内容（或者 `username` 值以其他方式变为非空），该按钮将启用。\n\
    \n以下是详细步骤：\n\n1. 像这样添加属性：\n\n```\n@State private var username = \"\"\n```\n\n\
    2. 打开视图库（⌘⇧L），搜索“text”，并将其拖到预览画布上。代码应该如下所示：\n\n```\nTextField(\"Placeholder\"\
    , text:Value)\n```\n\n3. 将“Placeholder”文本改为“Username”。\n4. 将第二个参数（当前为“Value”）改为对\
    \ `username` 属性的绑定，如下所示：\n\n```\nTextField(\"Username\", text: $username)\n```\n\
    \n5. 使用 `.padding(30)` 添加内边距修饰符。\n6. 在下方添加一个 `Text` 项，用于显示输入时的值。\n\n```\nText(username)\n\
    ```\n\n7. 对于其他某个控件，添加 `.disabled` 修饰符。传入的 `Bool` 值为 `self.username.count == 0`。\n\
    \n最终代码应如下所示：\n\n```\n@State private var username = \"\"\nvar body: some View {\n\
    \    VStack {\n        TextField(\"Username\", text: $username)\n            .padding(30)\n\
    \        Text(\"Hello, Swift\")\n            .font(.largeTitle)\n            .fontWeight(.bold)\n\
    \            .foregroundColor(Color.blue)\n            .padding(30.0)\n      \
    \      .frame(width: 200.0, height:400.0)\n            .background(Color.green)\n\
    \            .cornerRadius(40.0)\n        Button(action: {\n            print\
    \ (\"tapped!\")\n            self.isReady.toggle()\n        }, label: { Text(\"\
    Tap Me\") })\n            .disabled(self.username.count == 0)\n    }\n}\n```\n\
    \n要在实时预览中运行应用，请点击画布中 UI 上方的图标栏中的播放按钮（图 3-14）。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig14_HTML.jpg](img/497312_1_En_3_Fig14_HTML.jpg)\n\
    \n**图 3-14** — 画布中的按钮栏\n\n如果你按照步骤操作，应该可以在 `TextField` 中输入内容，并在下方的 `Text` 项中看到相同的值（图\
    \ 3-15）。\n\n![../images/497312_1_En_3_Chapter/497312_1_En_3_Fig15_HTML.jpg](img/497312_1_En_3_Fig15_HTML.jpg)\n\
    \n**图 3-15** — 练习的最终 UI\n\n此外，“Tap Me”按钮只有在 `TextField` 中有文本时才应启用。\n\n## 章节总结\n\
    \n我们在本章中探讨的每个控件在 SwiftUI 开发中都非常常见。熟悉它们及其修饰符非常重要。\n\n随着我们覆盖更多内容，我们将看到一些控件如何组合和重叠，以及我们拥有的其他修饰符、手势、事件等。\n\
    \n我们还将介绍更多概念，例如来自 Combine 框架的绑定。`@State` 属性包装器和绑定只是其中的一小部分。这可能是一个新概念并且容易混淆，所以我们会循序渐进。但它也非常强大，是真正掌握\
    \ SwiftUI 的关键概念。\n\n我想鼓励你对我们本章所做的一切进行更多练习。启动一个新项目，添加各种 UI 元素，探索修饰符，从视图库中拖入项目，并普遍练习我们所学的内容。\n\
    \n# 4. 绑定数据源\n\n我们在上一章介绍了 `@State`。这里我们将简要回顾一下，并讨论更多关于 SwiftUI 中数据流的概念。\n"
- fmt: '## Data Drives the UI


    Typically, in app development, the UI represents the data and state. When the
    user taps a button or flips a switch, the event drives a method call. In that
    method, we typically have code that updates the current data.


    In the last chapter, we looked at how we used `@State` to specify the source of
    truth for the toggle switch. By binding the `isReady` boolean variable to the
    toggle, we saw that toggling the switch updated the value. This was evident by
    the label updating its text.


    But also changing the source of truth value, `isReady`, caused a new rendering
    of the UI. This included the toggle to reflect the new boolean value from the
    source of truth.


    Binding this source of truth (value) to the UI keeps both in sync automatically
    via the Property Wrapper.


    ## Flow Steps


    The process stated earlier has a few steps. The steps are mostly behind the scenes
    for the user and the developer.


    Let’s take a quick look again at the code for the state variable and the binding:


    ```

    @State private var isReady = false

    Toggle(isOn: $isReady,

    label: {

    Text("Ready: " + (isReady ? "Yes" : "No"))

    })

    ```


    The `isReady` variable is the source of truth for the `Toggle`. When it changes,
    the UI will be rendered again. That causes the toggle to update as well as the
    `Text` label.


    The steps in that process are:


    1. User action – Tap on the toggle.

    2. Value update – `isReady` toggled.

    3. View update – `Toggle` and `Text` change.

    4. UI displayed – The UI renders on the screen.


    Whenever a bound property changes, the UI will render on the screen with the updates.
    The framework manages the dependency.


    Let’s take a look at using a `Stepper`. A `Stepper` can take multiple closures
    – one to handle when the user taps the minus sign (`-`) for decrement and one
    for the plus (`+`) for increment. Here’s an example of decrementing and incrementing
    a property with the `Stepper` (Figure [4-1](#497312_1_En_4_Chapter.xhtml#Fig1)).


    ![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig1_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig1_HTML.jpg)


    **Figure 4-1** Stepper Code


    In this example, we have a `Stepper` and a label displaying the current count.
    Since the `Stepper` is the only UI element, it doesn’t need to be within a `VStack`.
    Chances are some form of stack will be necessary at some point assuming there
    will be more UI elements. The app, when run, looks like Figure [4-2](#497312_1_En_4_Chapter.xhtml#Fig2).


    ![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig2_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig2_HTML.jpg)


    **Figure 4-2** Stepper UI


    But instead of writing the value changes in closures, we can bind the counter
    property to the `Stepper`.


    ### COUNTER UPDATE IN THE UI


    In this exercise, we’ll add code to bind an `@State` property to the `Stepper`.
    This will use a different initializer. The initializer we want takes the value
    to bind.


    ![../images/497312_1_En_4_Chapter/497312_1_En_4_Fig3_HTML.jpg](images/497312_1_En_4_Chapter/497312_1_En_4_Fig3_HTML.jpg)


    **Figure 4-3** Stepper Initializers


    1. Open a project (existing or new) and click the `ContentView.swift` file for
    editing. We want to start with an empty `ContentView` body definition.

    2. Create a `Stepper` instance and notice the options for code completion (Figure
    [4-3](#497312_1_En_4_Chapter.xhtml#Fig3)).


    The previous example used the first initializer. It takes the two closures and
    a label parameter. This time, we’ll use the initializer that takes a `StringProtocol`
    type, a value, and a range. The range is a closed range of numbers for the `Stepper`’s
    value.


    The code looks like this:


    ```

    Stepper("\(counter)", value: $counter, in: 0...9)

    ```


    This code does a few things for us:


    1. It displays the current counter value next to the `Stepper`.

    2. It binds the counter as the source of truth to the `Stepper`’s value.

    3. It limits the `Stepper`’s values to zero through nine.


    The UI will look nearly identical to what it was before. The functionality is
    the same as well. However, we are no longer using a functionality in our code
    to keep the counter value current.


    The framework is doing the work for us to update the state and render the changes
    in the UI.


    ## Strideable


    You may have noticed that the value parameter of the initializer takes a type
    of `Binding`. That’s the property wrapper for the `@State` value that is managed
    by the framework for us.


    `Binding` is a struct that wraps the value. The wrapped value must conform to
    the `Strideable` protocol. `Strideable` extends the `Comparable` protocol which
    extends the `Equatable` protocol.


    So the value property much implements all of these:


    * `==` (`Equatable`)

    * `<` (`Comparable`)

    * `<=` (`Comparable`)

    * `>` (`Comparable`)

    * `>=` (`Comparable`)

    * `distance(to other: Self) -> Self.Stride`

    * `advanced(by n: Self.Stride) -> Self`


    The equal-equal and comparison operators are pretty straightforward. The `distance`
    and `advanced` functions are from the `Strideable` protocol.


    The `distance` function takes a value of the same type as the `@State` bound variable
    (e.g., `Int` in our case) and returns the “distance” from another value. `Int`
    is `Strideable` so `5.distance(to: 100)` returns `95`.


    `Strideable` has an associatedType of `Stride` which is defined as something that
    implements `Comparable` and `SignedNumeric`. So returning `Self.Stride` from `distance`
    will be a number. For the `Strideable` implementation of `Int`, the `Stride` type
    is also an `Int`:


    ```

    public typealias Stride = Int

    ```


    The `advanced` function returns the same type as what value it’s called on (e.g.,
    calling `advanced` on an `Int` returns an `Int`). It takes a `Self.Stride` which
    is defined by that type as well. So for an `Int`, calling `advanced` requires
    an `Int` passed in and returns an `Int` advanced by that value. So `5.advanced(by:
    5)` returns `10`.


    Our counter property is an `Int` which implements all of these and works perfectly
    for our value parameter. Other Swift numeric types such as `Double`, `Float`,
    and `Decimal` also implement `Strideable`.


    Other controls use binding as well, but the type `Binding` wraps may be another
    type. For example, `Textfield` takes a `Binding` that wraps a `String`. There’s
    a type we know about!


    ## Property Wrapper


    The `@State` property wrapper is the `Binding` type. If you drill into its definition,
    you’ll see it’s a struct with the generic `Value` which it wraps. Like an optional,
    there are various initializers, functions, and extensions defined.


    However, as we will allow the framework to manage the memory and handling of the
    property wrapper, we won’t often need to do anything other than bind it. The system
    will handle it from there for wrapping and unwrapping the value. We can set the
    value (or let the UI element do it), and the rest is taken care of.'
