  trans: "\n# 发布更新\n\n有两种简单的方法可以接收对`ObservedObject`上值变更的更新。这两种方法都由实现`ObservableObject`的对象控制。\n\
    \n这意味着`ObservableObject`控制着发布什么内容以及何时发布。\n\n在我们的示例中，我们最关心的是`Note`中`text`属性的变化。我之前提过，`ObservableObject`对其所需的组成部分有默认实现。其中之一是一个发布器，属性名为`objectWillChange`。\n\
    \n利用这个默认发布器，我们可以在任何内容发生变化时发送新值。我们在`Note`的`text`属性上已经有一个`didSet`观察器。那是发布变更的理想位置。代码如下所示：\n\
    \n```\nvar text = \"\" {\n    didSet {\n        self.updatedAtTime = Date()\n\
    \        self.objectWillChange.send()\n    }\n}\n```\n\n现在当我们点击更新按钮时，`text`和`updatedAtTime`的文本框都会更新。更新效果如图\
    \ 5-3 所示。\n\n![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig3_HTML.jpg](img/497312_1_En_5_Fig3_HTML.jpg)\n\
    \n**图 5-3**  \n带有更新的 Note 界面\n\n在发布器上调用`.send`无疑是发送更新的简便方法。当你只希望在关键时间点发布变更时，这种方法尤其出色。也许你想等到特定事件发生（比如写入数据库）之后才发布值。\n\
    \n你可能有一个类只在特定时间间隔发布更新。或者你可能只想在属性达到某个阈值或其他条件满足时才发布。在这些情况下，发布器上的`.send`调用非常有用。\n\
    \n在我们的例子中，我们希望每当设置新`text`值时都能发布。在`didSet`观察器中调用`.send`可以很好地满足这个需求。另一个针对属性所有变更的处理方式是使用`@Published`属性。\n\
    \n## @Published\n\n属性上的`@Published`属性会创建一个该类型的发布器。我们可以将此属性添加到`Note`中的`text`属性上。同时，我们现在可以移除`didSet`观察器中对`.send`的调用。\n\
    \n在我们的示例中，结果将是相同的。在界面中点击更新按钮将更新`text`，随后发布该更新，界面也会随之更新。\n\n现在的代码如下所示：\n\n```\n\
    @Published var text = \"\" {\n    didSet {\n        self.updatedAtTime = Date()\n\
    \    }\n}\n```\n\n我们可能还想为其他属性添加`@Published`。在我们的示例中，发布`priority`是合理的。而发布`updatedAtTime`可能是最有意义的做法。这种情况下，如果代码编写得当，只要对象被更新，它就会发布。\n\
    \n让我们尝试点别的。\n\n**用于更改优先级的定时器**\n\n让我们修改`Note`类，使其在特定时间后自动创建优先级。我们将为`Note`添加一个带有`Timer`的`init`方法。当定时器触发时，每次会将优先级提升一级。\n\
    \n1.  将`Note`的默认优先级更改为`.low`：\n\n2.  为`Note`类添加一个初始化器：\n\n    ```\n    init()\
    \ {\n    }\n    ```\n\n3.  在`init`中添加一个`Timer`，每隔 X 秒（例如 10 秒）触发一次并重复执行。`Timer`闭包的主体应将优先级提升一级。\n\
    \n    ```\n    Timer.scheduledTimer(withTimeInterval: 10.0,\n                \
    \         repeats: true) { (timer) in\n        self.priority = Priority(rawValue:\n\
    \            self.priority.rawValue + 1) ??\n            Priority.high\n     \
    \   if self.priority == .high {\n            timer.invalidate()\n        }\n \
    \   }\n    ```\n\n```\nvar priority = Priority.low {...\n```\n\n每 10 秒，定时器会触发一次。它会根据当前优先级的原始值加\
    \ 1 来创建一个新的优先级。如果该数值过高，则默认为 `Priority.high`。\n\n如果优先级设置为 `.high`，定时器将失效。我们可能希望保持定时器运行，以防用户将优先级设回较低级别。当前界面中没有此功能，因此暂时无需考虑。\n\
    \n1.  运行应用并验证优先级是否每 10 秒增加一次，直到变为高优先级。\n\n第一个和最后一个结果应如图 5-4 所示。\n\n![../images/497312_1_En_5_Chapter/497312_1_En_5_Fig4_HTML.jpg](img/497312_1_En_5_Fig4_HTML.jpg)\n\
    \n**图 5-4**  \n自动更新界面：初始和最终状态\n\n通过这个练习，我们看到无论变更是由用户交互还是其他方式触发，这些变更都会被发布。\n\n\
    ## 本章小结\n\n使用 `ObservableObject` 协议允许引用类型对象发布其更改。你可以通过少量修改，让新的或现有的模型类实现 `ObservableObject`。\n\
    \n这使得对现有代码的改动非常微小。如果你曾经给遗留代码添加过 `Codable` 协议，你就知道这能有多简单。\n\n对于需要关注更新的代码，添加的内容也很少。可能只需为属性添加`@ObservedObject`属性。\n\
    \n本章我们介绍了一些结合 Combine 的复杂概念。虽然幕后有很多操作，但我们只需执行几个步骤：\n\n1.  导入 Combine。\n2.  为 `Note`\
    \ 添加 `@ObservableObject`。\n3.  为 `note` 属性添加 `@ObservedObject`。\n4.  决定是：\n  \
    \  - 在发布器上调用 `.send`，还是\n    - 为属性添加 `@Published`\n\n# 6. 环境值\n\n到目前为止，我们已经了解了如何在给定视图中使用`State`属性包装器处理值。我们还了解了如何通过`Binding`将局部值绑定到外部变量。\n\
    \n在这两种情况下，我们的代码都需要创建和控制这些值。这些值通过属性包装器进行传递。以这种方式使用属性包装器可以保持数据源的孤立性和同步性。\n\n但是，那些可能在别处创建的值呢？那些可能影响整个应用或设备的值呢？\n\
    \nSwiftUI 也通过环境值和对象提供了解决方案。\n"
- fmt: "# Environment Values\n\nGetting various environment values is easy with SwiftUI.\
    \ And if your UI is based on them, changes will invalidate the current view. That\
    \ means a new one is created and rendered for the user. Put that all together,\
    \ and it means changes to values used in your UI will cause the necessary update.\n\
    \nSwiftUI provides a good list of values to access from the Environment. These\
    \ values include areas such as accessibility settings, color scheme, control attributes,\
    \ and even CoreData.\n\nYou can see all of the available variables from SwiftUI\
    \ here: [`https://developer.apple.com/documentation/swiftui/environmentvalues`](https://developer.apple.com/documentation/swiftui/environmentvalues).\n\
    \nLet’s look at color scheme as a simple example. To access the value in our code,\
    \ we need to use the `@Environment` property wrapper for a variable. We specify\
    \ the key path of the specific value we want. The code looks like this:\n\n```\n\
    @Environment(\\.colorScheme) var lightOrDark\n```\n\nNow we have the color scheme\
    \ value stored in a property named `lightOrDark`. In our UI, we can adapt our\
    \ UI based on this value. Then, if the value changes, our UI will be updated.\n\
    \nLet’s say we want a button title, \"Update,\" to be blue normally but green\
    \ in dark mode. We can now use the value of `lightOrDark` to determine that.\n\
    \nUsing our previous chapter project, I’ll use `lightOrDark` to set the accent\
    \ color.\n\n```\nText (\"Update\")\n.accentColor(lightOrDark == .light ?\n.blue\
    \ : .green)\n```\n\nWhen run in the simulator, if dark mode is off, the UI will\
    \ include the button with a blue title. If we switch to dark mode (⇧⌘A) using\
    \ a simulator/device that supports dark mode, the button will switch to green\
    \ like in Figure [6-1](#497312_1_En_6_Chapter.xhtml#Fig1).\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig1_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig1_HTML.jpg)\n\
    \nFigure 6-1\n\nUI Updated to Dark Mode\n\nOur `Text` items are created with default\
    \ settings. By default, it uses the system label color. That varies depending\
    \ on the dark mode setting. If you inspect or print out the `UIColor.label.cgColor`,\
    \ it will also vary depending on the current dark mode setting.\n\nThose two `Text`\
    \ items are updated for us. The same is true for the button text item. So, by\
    \ default, these items will update based on the dark mode setting. Or we can handle\
    \ it in a custom fashion as in the preceding code.\n\n## Settings Per View\n\n\
    Each view inherits the Environment settings from its parent. However, you can\
    \ override these settings when creating a view.\n\nOur `Button` has a `Text` item\
    \ for the title. In the previous section, we’re setting the color of that title\
    \ based on the `lightOrDark` value. For our whole (small) app right now, we’re\
    \ using all the same settings for the Environment.\n\nWhen our `ContentView` is\
    \ created, the Environment is inherited and is propagated through all of its views:\
    \ `Text`, `Button`, and so on. But we can change that. We can modify the Environment\
    \ when a view is created.\n\nTo modify the Environment, we use the `.environment`\
    \ modifier on the return of the view creation. Let’s say we want to force our\
    \ top `Text` item to always be in dark mode. Of course, when the background is\
    \ white, the white text won’t be visible so I’ll also add a background modifier\
    \ for gray.\n\n```\nText(note.text)\n.environment(\\.colorScheme, .dark)\n.background(Color.gray)\n\
    ```\n\nI use the `.environment` modifier to specify the key path of the color\
    \ scheme and a value (i.e., `.dark`). The other value option for this enumeration\
    \ is `.light`. Now the UI forces dark mode on this `Text`. Running the app and\
    \ switching to dark mode looks like Figure [6-2](#497312_1_En_6_Chapter.xhtml#Fig2).\n\
    \n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig2_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2\n\nUI Updated to Dark Mode\n\nUsing method chaining, we can call\
    \ both the `.environment` and `.background` modifiers. Similarly, we could call\
    \ multiple `.environment` modifiers and change various values.\n\nThese changes\
    \ will then be inherited to any and all views created by that view. In our case,\
    \ it may seem like that doesn’t apply. However, we don’t have any control of the\
    \ `Text` and can’t know what it’s creating. If we look at a view hierarchy rendering\
    \ (Debug ➤ View Debugging… ➤ Capture View Hierarchy) like Figure [6-3](#497312_1_En_6_Chapter.xhtml#Fig3),\
    \ we see there may be more to a `Text` item than we thought.\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig3_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3\n\n3D Rendering of UI\n\nA good thing to learn here is that the appearance\
    \ may be more complicated than it seems. So while just setting one value (e.g.,\
    \ `accentColor`) may seem to do the trick, you should consider what the core change\
    \ should be (e.g., `colorScheme`).\n\nEarlier, we looked at passing environment\
    \ settings into a `Text` element. We can do the same if we first pull out a part\
    \ of our UI into a separate struct.\n\nNOTE VIEW WITH ENVIRONMENT\n\nIn this exercise,\
    \ we’re going to pull out the UI items that display the `Note`. We’ll put them\
    \ into a new `View` and have that struct control displaying the note details.\n\
    \nHowever, we want the creating element (i.e., `ContentView` in our app) to control\
    \ the environment. Other than the `Note` instance and the `.environment` modifier,\
    \ we don’t want `ContentView` to control other aspects of the UI for the newly\
    \ created `NoteView`.\n\nIn light (left) and dark (right) modes, we want the interface\
    \ to look like Figure [6-4](#497312_1_En_6_Chapter.xhtml#Fig4).\n\n![../images/497312_1_En_6_Chapter/497312_1_En_6_Fig4_HTML.jpg](images/497312_1_En_6_Chapter/497312_1_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4\n\nNoteView in Light (Left) and Dark (Right) Modes\n\nFeel free to\
    \ try to tackle this before looking at the following steps and code. In short,\
    \ you need to put the `Note`-related UI elements in a new `NoteView` struct that\
    \ conforms to the `View` protocol. Keep the `.environment` modifier separate and\
    \ call it on the newly created `NoteView` element.\n\n1.  Create a new struct\
    \ called `NoteView` that conforms to the `View`:\n\n```\n    struct NoteView :\
    \ View {\n    }\n```\n\n2.  Add a body computed property to the `NoteView` with\
    \ a `VStack`:\n\n```\n    var body: some View {\n    VStack {\n    }\n    }\n\
    ```\n\n3.  At the bottom of the `VStack`, add the `.background` modifier:\n\n\
    1.  Cut and paste the two `Text` elements and the `HStack` of `Image` items from\
    \ the `ContentView` body into the `VStack` of the `NoteView`."
