    the SwiftUI Inspector may not look the same.


    Notice, in this case, there’s only a couple of options available in the pop-up
    (Figure [2-10](#497312_1_En_2_Chapter.xhtml#Fig10)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig10_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig10_HTML.jpg)


    Figure 2-10


    Pop-up Menu in the Canvas


    To see all of the same modifiers you saw before, the Attributes Inspector is a
    reliable option.


    ATTRIBUTES INSPECTOR


    In this exercise, we’ll see that the same modifiers can be accessed via the visual
    UI design in the Canvas. However, there’s no need to shift your mind from “working
    in code” to “working in the UI.” They are the same. The code is the UI.


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig11_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig11_HTML.jpg)


    Figure 2-11


    Inspector Pane Button


    1.  Open the Inspector Pane (on the right) with this button on the top right of
    the Xcode window (Figure [2-11](#497312_1_En_2_Chapter.xhtml#Fig11)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig12_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig12_HTML.jpg)


    Figure 2-12


    Attributes Inspector Tab


    1.  Select the Attributes Inspector at the top of the Inspector Pane (Figure [2-12](#497312_1_En_2_Chapter.xhtml#Fig12)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig13_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig13_HTML.jpg)


    Figure 2-13


    Attributes Inspector


    1.  Click the “Hello, SwiftUI!” Text item in the UI or in the code to have the
    attributes show up in the Attributes Inspector (Figure [2-13](#497312_1_En_2_Chapter.xhtml#Fig13)).


    If not all of the modifiers show up, click the item in the code.


    Notice that the values are the same as before. Also, the Add Modifier drop-down
    list is available.


    From here, you can make the same choice and changes.


    1.  Change the background color, text, and other settings and verify the changes
    in the UI and code.


    You probably see that there are various ways to do the same things. You can edit
    code, make changes in the SwiftUI Inspector and in the Attributes Inspector.


    And hopefully you’re thinking of the code and the UI as one thing: ideally that
    the code *is* the UI.


    ## Stacks of Stacks


    A screen in an app with only one element isn’t much of a user interface. Nor is
    it common. But there’s only one element returned from the computed body property.
    What are we to do?


    Most of the time, the one item we return will contain many other items. So it’s
    a container of other items. And as we’ll see, it’s often a container of containers
    of items and so on.


    Two common containers we’ll see are horizontal stacks (HStack) and vertical stacks
    (VStack).


    Horizontal stacks stack horizontally. You can probably guess that vertical stacks
    stack vertically. If you’re familiar with the stack view from Interface Builder,
    you’re probably already where I’m going.


    One easy way to embed an item into a stack is via the pop-up menu from ⌘ **+ click**
    (see Figure [2-14](#497312_1_En_2_Chapter.xhtml#Fig14)).


    ![../images/497312_1_En_2_Chapter/497312_1_En_2_Fig14_HTML.jpg](images/497312_1_En_2_Chapter/497312_1_En_2_Fig14_HTML.jpg)


    Figure 2-14


    Context Pop-up Menu with Embed Options


    This simply wraps an item in the code with applicable HStack or VStack code. This
    is what it looks like to wrap it in a VStack:


    ```

    var body: some View {

    VStack {

    Text("Hello, Swift")

    .font(.largeTitle)

    .fontWeight(.bold)

    .foregroundColor(Color.blue)

    .padding(30.0)

    .frame(width: 200.0, height: 400.0)

    .background(Color.green)

    .cornerRadius(40.0)

    }

    }

    ```


    You shouldn’t notice a change in the UI we had before because there’s only one
    item in the stack. The way we had the UI before with one item would put it in
    the center. The same is true for the new stack.


    However, if we add more items (e.g., another Text item below the current one),
    it will stack them vertically.


    If I add another Text item below the current one, it would look something like
    Figure [2-15](#497312_1_En_2_Chapter.xhtml#Fig15).'
