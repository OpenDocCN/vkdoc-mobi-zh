  trans: '

    ## 替代语法


    如果直接访问底层存储属性感觉不太对劲，那也没关系。还有另一种传入和访问属性的方法。对于 `text` 属性，我们可以不使用 `@Binding` 语法，而是采用与
    `init` 参数相同的语法。


    ```

    class Coordinator: NSObject, UITextViewDelegate {

    var text: Binding

    ```


    然后，初始化器和 `textViewDidChange` 可以更直接地使用该属性。


    ```

    init(text: Binding) {

    self.text = text

    }

    func textViewDidChange(_ textView: UITextView) {

    text.wrappedValue = textView.text

    }

    ```


    无论是哪种情况，我们的 `TextView` 都不必有所变化。两种方式都可行，但现在代码感觉更清爽了。我们就在练习中使用这个版本吧。


    ## `TextView` 的协调器


    我们将为 `TextView` 添加一个协调器。它将作为我们创建的 `UITextView` 的委托。`Coordinator` 将是一个独立的类，并在 `makeCoordinator`
    协议函数中实例化。


    **注意** 如果你一直在跟着更新代码，那么你已经完成了这个练习。否则，以下步骤将阐明 `TextView` 的 `Coordinator` 所需的更改。


    1.  在 `TextView` 内部声明 `Coordinator` 类，使其继承自 `NSObject` 并遵循 `UITextViewDelegate`
    协议。


    1.  为 `Coordinator` 添加一个 `Binding<String>` 类型的 `text` 属性。


    ```

    class Coordinator: NSObject, UITextViewDelegate {}

    ```


    1.  在 `Coordinator` 中实现一个初始化器，该初始化器接收一个 `Binding<String>` 参数并将其赋值给类属性。


    ```

    class Coordinator: NSObject, UITextViewDelegate {

    var text: Binding

    }

    ```


    1.  在 `Coordinator` 中实现 `textViewDidChange` 以设置封装值。


    ```

    init(text: Binding) {

    self.text = text

    }

    ```


    1.  在 `TextView` 类中实现 `makeCoordinator`。


    ```

    func textViewDidChange(_ textView: UITextView) {

    text.wrappedValue = textView.text

    }

    ```


    1.  将上下文中的协调器设置为所创建 `UITextView` 的委托。


    ```

    func makeCoordinator() -> TextView.Coordinator {

    Coordinator(text: $text)

    }

    ```


    ```

    func makeUIView(context: Context) -> UITextView {

    let tv = UITextView()

    tv.delegate = context.coordinator

    return tv

    }

    ```


    整个 `TextView` 结构体代码应如图 12-2 所示。


    ![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig2_HTML.jpg](img/497312_1_En_12_Fig2_HTML.jpg)


    **图 12-2** — 包含 `Coordinator` 类的 `TextView`


    1.  运行应用，并使用断点验证每个函数是否被调用以及文本是否更新。


    现在，当文本发生变化时，你的 UI 会通过协调器更新 `TextView`。我们将该值存储在绑定属性中，该属性会传回给真相源。


    ## 更新列表


    如前一章所述，列表并未使用编辑后的值更新行。在我们的 `ContentView` 的 `List` 中，我们并没有将笔记项传递给绑定属性包装器。


    我们可以更改 `NoteRow`，使其 `noteVM` 属性具有 `@Binding` 属性。然而，这会导致代码在多个地方出错。别担心。我们可以做到。


    主要只有两处更改。第一处是给 `NoteRow` 的属性添加 `@Binding`。


    ```

    struct NoteRow: View {

    @Binding var noteVM : NoteViewModel

    ```


    这会破坏 `NoteRow` 的预览。你需要更新那段代码，也传入一个绑定属性。它可以模仿 `ContentView` 的 `ForEach` 现在使用索引的方式，如图
    12-3 所示。


    ![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig3_HTML.jpg](img/497312_1_En_12_Fig3_HTML.jpg)


    **图 12-3** — 更新后的 `NoteRow` 预览


    请注意，现在创建 `NoteRow` 时传入了一个 `self.$items` 值。这个绑定也是我们在 `ContentView` 的 `List` 中所需要的。


    在 `ContentView` 的 `List` 中，我们需要在列表创建时传入一个绑定。我们只需在创建 `NoteRow` 的项前面加一个 `$` 符号即可。


    ```

    NoteRow(noteVM: self.$items[noteIndex])

    ```


    现在，当我们运行应用并编辑一个笔记时，它将反映在 `List` 中，如图 12-4 所示。


    ![../images/497312_1_En_12_Chapter/497312_1_En_12_Fig4_HTML.jpg](img/497312_1_En_12_Fig4_HTML.jpg)


    **图 12-4** — 更新后的笔记


    ## 本章小结


    通过使用 `UIViewRepresentable` 协议中的 `Coordinator` 机制，我们现在可以编辑笔记了。此更改也会反映在主 `ContentView`
    的 `List` 中。


    协调器的概念已内置于协议以及传递给相关函数的 `Context` 中。然而，我们创建的类能够满足我们的需求。在我们的例子中，它需要遵循 `UITextViewDelegate`
    协议。这还需要遵循 `NSObjectProtocol` 协议，因此我们继承了 `NSObject`。


    我们需要 `text` 属性来进行绑定，但我们也可以选择是否绑定其他属性。我们还可以实现其他协议，或者将该类用作其他 `UIView` 实例的委托或数据源。


    就我们的用途而言，我们只是按规则行事。我们在需要时创建了协调器，将其设置为委托，并处理了文本更改。


    你可能和我一样在想，如果在 `makeUIView` 中直接创建一个 `Coordinator` 实例并将其设置为委托，会怎么样？能行得通吗？答案是：既行得通也行不通。


    问题在于文本视图的委托属性是弱引用。这意味着在 `makeUIView` 调用返回后，它会被立即释放。


    如果我让协调器成为 `TextView` 的一个属性呢？可以，但是你无法在其中声明中实例化它，因为它需要 `text` 属性。


    如果我让它成为一个可选属性，并在 `makeUIView` 中实例化它呢？可以，但这样你就修改了 `self` 的成员。而且如果你将 `makeUIView`
    标记为 `mutating`，你就破坏了与 `UIViewRepresentable` 协议的适配。


    如果我让 `Coordinator` 成为 `TextView` 外部的变量——也许是全局变量或类似的呢？是的，这也可以。虽然过程比较麻烦，但确实可行。如果你想传入一个
    `Coordinator`，这或许是可行的方法。


    这确实说明了一个有趣的点：我们使用的 `Coordinator` 设置并非必须的。可以通过其他方式实现。然而，协调器函数确实提供了帮助。此外，任何熟悉 `UIViewRepresentable`
    的人可能都会预期采用这种路径。


    既然我们已经看到了 UIKit 中的委托模式的使用，接下来我们将研究目标/动作模式。


    # 13. SwiftUI 中的目标/动作模式


    在上一章中，我们使用 `Coordinator` 作为 `UITextView` 的委托。但我们也意识到协调器的设置只是一个有用的机制。


    我们本可以为委托创建一个新类。或者我们本可以让协调器实现更多协议。我们命名为 `Coordinate` 的这个类也可以取别的名字。它可以继承自另一个类并实现我们所需的功能。


    那么，我们可以将同样的机制用于目标/动作模式吗？答案是肯定的。


    如果你有一个现有的 `UIView`，我们已经看到你可以通过 `UIViewRepresentable` 协议来使用它。像往常一样声明其属性（可能是绑定属性）。实现
    `makeUIView` 来创建你的 `UIView` 实例并返回它。实现 `updateUIView` 来根据需要更新 UI。


    如果你需要一个协调器，实现 `makeCoordinator` 来返回你的协调器类的一个实例。它将作为协调器属性在 `Context` 中传递。


    总的来说，我认为最好将类名保留为 `Coordinator`。我的重点是，重要的是概念本身——而不是具体的名称、父类或你的协调器类遵循的协议。


    我已经对代码做了相当多的更新。没什么特别有趣的，但你或许想要从本章的代码库开始。概念是相同的。然而，我将一些东西移到了它们自己的方法中。这将有助于重用和 UI
    更新。下面我将回顾关键的更改。


    让我们看看如何使用目标/动作模式和协调器。

    '
