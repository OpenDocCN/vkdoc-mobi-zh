    \ Just don’t think we’re going to build a 3D game or anything like that."
  trans: "\n# 排版后的文本\n\n如果解码数据时出现错误，我们会发布当前的 `self.userStatus`。 `catch` 会将当前的发布者（第一个\
    \ `Just`）替换为另一个 `Just`。\n\n4. 添加 `.receive` 来创建我们发布者的最终版本。\n\n1. 添加 `.assign`\
