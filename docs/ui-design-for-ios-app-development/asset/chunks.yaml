  trans: "\n### 目标/动作\n\n如果你曾经在代码中创建过 UIKit 的按钮、滑块、开关等元素，你可能会对 `addTarget` 函数很熟悉。这里的唯一技巧是，协调器（coordinator）将成为动作的目标。这意味着要调用的函数也将位于协调器上。\n\
    \n如果你觉得这算不上什么技巧，那你是对的。每当你在 Swift 中添加目标时，你都需要指定实例、选择器和事件。这里并没有什么新东西。\n\n同样，这里也没什么特别的。我们定义一个类，然后从\
    \ `makeCoordinator` 方法中返回它的一个实例。通读代码可能会让你觉得复杂，但其核心设置你很可能已经很熟悉了。\n\n### ButtonView\n\
    \n在 `ListProject` 项目中，我在 `NoteRow.swift` 文件里有一个名为 `ButtonView` 的 `UIView` 子类。这将是我们从现有代码中导入视图的示例。它的声明和初始化方法如图\
    \ 13-1 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig1_HTML.jpg](img/497312_1_En_13_Fig1_HTML.jpg)\n\
    \n**图 13-1** ButtonView 声明与初始化器\n\n我们有一个用于按钮高度和宽度的 `let` 常量、一个 `NoteViewModel`\
    \ 属性以及一个初始化器。`init` 方法先调用父类的初始化方法，接着设置属性，然后调用 `configUI` 方法（见图 13-2）。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig2_HTML.jpg](img/497312_1_En_13_Fig2_HTML.jpg)\n\
    \n**图 13-2** configUI 方法\n\n此方法会遍历并根据 `NoteViewModel` 属性的优先级图片创建三个按钮。它使用循环索引来设置按钮的\
    \ `tag` 属性。这在之后计算新优先级时会派上用场。\n\n通常，我们也会向 `UIButton` 实例添加目标。不过，我们将使用协调器，这样代码就不会出现在前面的函数中。\n\
    \n还有一个用于 Storyboard 的必需 `init` 方法。由于我们并未使用 Storyboard，它只是如图 13-3 所示的样板代码。\n\n\
    ![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig3_HTML.jpg](img/497312_1_En_13_Fig3_HTML.jpg)\n\
    \n**图 13-3** 必需的初始化方法（未使用）\n\n因此，我们现在有了需要复用到 SwiftUI 代码中的 `UIView`。\n\n### SwiftUI\
    \ 中的 UIView\n\n和之前一样，我们将创建一个实现 `UIViewRepresentable` 协议的结构体。我将其命名为 `PriorityStarButtons`。这个结构体将在\
    \ `makeUIView` 的实现中创建 `ButtonView`，并在 `updateUIView` 方法中根据需要更新视图。\n\n它还需要一个要发送给\
    \ `ButtonView` 的 `NoteViewModel`。`NoteRow.swift` 中的代码如图 13-4 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig4_HTML.jpg](img/497312_1_En_13_Fig4_HTML.jpg)\n\
    \n**图 13-4** PriorityStarButtons 类\n\n之前我们在 `ForEach` 循环中创建星形图片的地方，现在将使用这个新类。因此，我们可以更新同一个文件中的\
    \ `NotePriorityAndTime`，改为使用我们的 `PriorityStarButtons`，如图 13-5 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig5_HTML.jpg](img/497312_1_En_13_Fig5_HTML.jpg)\n\
    \n**图 13-5** 使用 PriorityStarButtons 的 NotePriorityAndTime\n\n运行应用程序，外观应该仍然相似，但星形图片会有细微变化。它们现在是带有固定大小的按钮，如图\
    \ 13-6 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig6_HTML.jpg](img/497312_1_En_13_Fig6_HTML.jpg)\n\
    \n**图 13-6** 使用 PriorityStarButtons 的用户界面\n\n### 添加协调器\n\n目前，我们只是将 `UIView` 包裹在了新结构体中。我们希望更新代码，以便使用协调器来处理按钮的目标。除此之外，如果用户点击了星形按钮，我们还想更新\
    \ `NoteViewModel`。\n\n理想情况下，无论我们是在主列表界面还是笔记详情页，我们都希望传播这个更改。这意味着我们需要添加绑定。\n\n`PriorityStarButtons`\
    \ 结构体和 `ButtonView` 类都有一个 `NoteViewModel` 属性。可以将其改为绑定类型。然后访问它会需要一些代码修改。\n\n`PriorityStarButtons`\
    \ 结构体遵循 `UIViewRepresentable` 协议。我们将在这里创建协调器。然后，协调器可以被传递给 `ButtonsView`，以建立按钮的目标关系。\n\
    \n**SWIFT 中的动作/目标**\n\n在本练习中，我们将准备新的类和结构体，以处理 `NoteViewModel` 的绑定。然后，我们可以创建协调器并将其传递给\
    \ `ButtonsView` 作为目标。最后，我们将在协调器中处理按钮点击事件以更新模型。这也会导致用户界面得到更新。\n\n1.  在 `NoteRow.swift`\
    \ 文件中，将 `PriorityStarButtons` 的属性改为绑定类型。\n\n```\nvar noteVM : Binding<NoteViewModel>\n\
    ```\n\n上述更改会导致一连串的错误。为了解决这个问题，我们需要传播被设置属性和被传递参数的类型。\n\n2.  将 `PriorityStarButtons`\
    \ 的 `init` 方法改为接受与步骤 1 中更改的属性相同的类型。\n\n```\ninit(noteViewModel : Binding<NoteViewModel>)\
    \ {\n    noteVM = noteViewModel\n}\n```\n\n在我们创建 `PriorityStarButtons` 实例的地方，需要更新\
    \ `NotePriorityAndTime`。目前，它在调用 `PriorityStarButtons` 的 `init` 方法时没有使用绑定。\n\n\
    3.  更改 `PriorityStarButtons` 的初始化调用，以传入笔记视图模型的绑定。\n\n4.  在 `ButtonView` 中，更改属性和初始化参数的类型。\n\
    \n```\nPriorityStarButtons(noteViewModel: self.$noteVM)\n```\n\n```\nclass ButtonView\
    \ : UIView {\n    var noteVM : Binding<NoteViewModel>?\n    \n    init(rect :\
    \ CGRect,\n         noteVM : Binding<NoteViewModel>) {\n        // ...\n    }\n\
    }\n```\n\n这应该能修复之前引起的编译错误。现在我们可以继续修复新的错误。\n\n5.  在 `ButtonView` 的 `configUI` 方法中，访问\
    \ `renderingColor` 的包装值。\n\n6.  并访问 `priorityImage` 数组元素的包装值。\n\n```\nlet renderColor\
    \ =\n    nvm.renderingColor.wrappedValue\n    == .red ? UIColor.red : UIColor.label\n\
    ```\n\n```\nlet img = UIImage(systemName:\n    noteVM!.priorityImages[btnIndex].wrappedValue)\n\
    ```\n\n此时，我们拥有的基本上和之前一样，只是多了绑定。功能应该没有改变。运行你的应用程序，确保其外观仍然相同。\n\n现在让我们创建协调器。这个新类也可以接受一个指向\
    \ `NoteViewModel` 的绑定。不过，为了有所变化，我们只对关心的特定值使用绑定：图片字符串和时间字符串。\n\n7.  在 `PriorityStarButtons`\
    \ 类内部，为协调器声明一个新类。同时也包含那两个绑定属性。\n\n8.  为 `Coordinator` 类创建一个初始化器，该初始化器接受两个将要存储在属性绑定中的值。\n\
    \n```\nclass Coordinator : NSObject {\n    var images : Binding<[String]>\n  \
    \  var time : Binding<String>\n}\n```\n\n```\ninit(images : Binding<[String]>,\n\
    \     time : Binding<String>) {\n    self.images = images\n    self.time = time\n\
    }\n```\n\n既然我们知道协调器类将作为按钮的目标，我们现在可以实现需要的方法了。\n\n这个函数需要一个参数来表示按钮。另外，它需要暴露给 Objective-C，以便传入\
    \ `addTarget` 函数。\n\n这个方法的功能将更新协调器属性中绑定的值。\n\n9.  在协调器中创建一个函数，用于处理用户点击按钮时的事件。\n\
    \n```\n@objc func priorityChange(sender : UIButton) {\n    time.wrappedValue =\n\
    \        NoteViewModel.dateFormatter.string(from: Date())\n    let newPrority\
    \ = Priority(rawValue: sender.tag)!\n    images.wrappedValue =\n        NoteViewModel.handlePriority(priority:\
    \ newPrority)\n}\n```\n"
- fmt: "我们将时间包裹值设置为一个新字符串。我们重用了`NoteViewModel`中的静态日期格式化器来创建当前更新时间。\n\n我们使用`UIButton`的`tag`值创建一个新的优先级。然后，我们在`NoteViewModel`上使用一个新函数来处理新的优先级。该函数根据优先级重新创建图片名称字符串并返回它们。将这个逻辑放在单独的方法中，允许我们在创建新的`NoteViewModel`之外更改图片名称绑定。\n\
    \n1. 在`makeCoordinator`中创建协调器。\n\n```\nfunc makeCoordinator() -> Coordinator {\n\
    \    return Coordinator(images: self.noteVM.priorityImages, time: self.noteVM.time)\n\
    }\n```\n\n现在，`noteVM`属性是一个绑定，我们可以在创建协调器时传入这些值。\n\n目前，我们的`ButtonView`对协调器一无所知。当创建`ButtonView`时，它需要`Coordinator`实例来为按钮添加目标。\n\
    \n1. 在`makeUIView`方法中将协调器添加到`ButtonView`的创建中。\n\n```\nreturn ButtonView(rect:\
    \ rect, noteVM: noteVM, coordinator: context.coordinator)\n```\n\n现在，我们需要在`ButtonView`的初始化器中接收协调器，并将其传递给`configUI`。\n\
    \n1. 将`Coordinator`参数添加到初始化器和对`configUI`的调用中。\n\n1. 将`Coordinator`作为参数添加到`ButtonView`的`configUI`中。\n\
    \n```\ninit(rect: CGRect, noteVM: Binding<NoteViewModel>, coordinator: PriorityStarButtons.Coordinator)\
    \ {\n    super.init(frame: rect)\n    self.noteVM = noteVM\n    configUI(coordinator:\
    \ coordinator)\n}\n```\n\n1. 使用我们定义的选择器和`touchUpInside`事件，将按钮的目标设置为协调器。\n\n```\n\
    func configUI(coordinator: PriorityStarButtons.Coordinator) {\n    // ...\n  \
    \  btn.addTarget(coordinator, action: #selector(PriorityStarButtons.Coordinator.priorityChange(sender:)),\
    \ for: .touchUpInside)\n}\n```\n\n剩下的唯一事情是实现`updateUIView`。它的第一个参数是一个`UIView`。我们知道这是`ButtonView`，可以通过一个`guard`语句来验证。\n\
    \n一旦我们有了类型转换后的`ButtonView`，就可以更新UI。然而，我们不想重新创建UI。让我们在`ButtonView`中添加一个函数，基于`tag`更新按钮图片。\n\
    \n`tag`可以作为图片名称字符串数组中的索引。如果图片名称已正确更新，这将正常工作。\n\n1. 在`ButtonView`中创建一个函数来更新按钮图片。\n\
    \n```\nfunc configPriorityImages() {\n    subviews.forEach { (btn) in\n      \
    \  guard let btn = btn as? UIButton else { return }\n        let imageIndex =\
    \ btn.tag\n        let imageName = noteVM!.priorityImages[imageIndex].wrappedValue\n\
    \        let img = UIImage(systemName: imageName)\n        btn.setImage(img, for:\
    \ .normal)\n    }\n}\n```\n\n调用此函数时，它会遍历子视图，查找`UIButton`。然后获取`tag`，并使用它从`priorityImages`数组中获取图片名称。它根据该名称创建一个图片，并将其设置在按钮上。\n\
    \n现在，我们只需在需要时调用该函数来更新UI。\n\n1. 在`updateUIView`中更新UI。\n\n```\nfunc updateUIView(_\
    \ uiView: UIView, context: Context) {\n    guard let v = uiView as? ButtonView\
    \ else { return }\n    v.configPriorityImages()\n}\n```\n\n此函数通过`guard`语句验证`UIView`是否为`ButtonView`，然后调用其`configPriorityImages`方法。\n\
    \n这工作量真不小！我们获取了一个现有的`UIView`（即`ButtonView`），并将其包装在一个名为`PriorityStarButtons`的结构体中，该结构体实现了`UIViewRepresentable`。\n\
    \n该结构体有一个绑定类型的`NoteViewModel`，在其初始化器中设置。它的`makeUIView`函数创建一个`CGRect`，并用该矩形实例化`ButtonView`。它还将`NoteViewModel`绑定和来自上下文的协调器传入。\n\
    \n`ButtonView`的初始化器将绑定存储在`noteVM`中，并将协调器传递给`configUI`。该调用设置了UI，包括为`Coordinator`向按钮添加目标。\n\
    \n`PriorityStarButtons`在`makeCoordinator`中创建协调器。它将优先级图片名称和时间（均来自`NoteViewModel`）传入。\n\
    \n`Coordinator`有两个绑定：`images`（字符串数组）和`time`（字符串）。这些都在初始化器中设置。它还有一个用于按钮动作调用的函数。这被作为目标添加到现有按钮上。\n\
    \n该目标函数更新时间与图片名称。这会导致UI更新，进而调用`updateUIView`，然后调用`configPriorityImages`来更新图片。\n\
    \n简而言之，`PriorityStarButtons`创建`ButtonView`，为其提供模型和协调器，并告诉`ButtonView`何时更新。\n\n\
    `ButtonView`创建其按钮，向协调器添加目标，并在收到指令时更新按钮图片。\n\n由于我们使用绑定来传递数据，无论你是在列表还是详情屏幕中更改优先级，都会保持同步。\n\
    \n如果你运行应用，它应该会在你点击按钮时更新。如果你查看详情，它也应该如此。还要注意时间会更新，如图 [13-7](#497312_1_En_13_Chapter.xhtml#Fig7)\
    \ 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig7_HTML.jpg](images/497312_1_En_13_Chapter/497312_1_En_13_Fig7_HTML.jpg)\n\
    \n**图 13-7** 当前UI与更新的时间\n\n我们在本练习中做了很多工作。但我希望你能看到清晰的区分。正如我们之前所见，`UIViewRepresentable`结构体负责创建和更新UI。\n\
    \n`Coordinator`是一个相当开放的类，作为协议函数的一部分被创建，并在上下文中传递。除此之外，它非常灵活。\n\n我们对`ButtonView`的主要更改是将属性改为绑定，并向协调器添加目标。如果该UI是在代码中创建的，很可能已经包含了`addTarget`调用。我们只需要更改它。\n\
    \n## 章节总结\n\n在本章中，我们了解了如何使用现有的`UIView`。我们将其包装在一个遵循`UIViewRepresentable`的结构体中。我们创建并更新了它，作为协议函数的一部分。\n\
    \n我们创建了一个协调器，它包含绑定和一个可用于`addTarget`选择器的函数。\n\n为了让`ButtonView`不必了解`Coordinator`，它可以作为代码中定义的自定义协议传入。根据你具体的应用需求，你可以对这个概念进行多种变通。\n\
    \n我希望你记住几个要点。`UIViewRepresentable`负责创建和管理它所包装的`UIView`。如果需要绑定，没问题。我们现在对此已经很熟悉了。\n\
    \n协调器几乎可以是任何东西，并能满足你需要的任何目的。它在`makeCoordinator`中创建，从该函数返回，然后在上下文中传递。\n\n现在，我们知道如何使用带有委托和目标/动作模式的`UIView`了！\n\
    \n# 14. SwiftUI in UIKit\n\n我们研究了如何在SwiftUI中使用现有的UIKit视图。现在，我们将研究如何在UIKit中使用SwiftUI。\n\
    \n你可能有一个现有项目，希望使用SwiftUI添加新的UI。因此，你已经为所有界面和导航设置了Storyboard。实际上，将SwiftUI视图添加到项目中非常容易。\n\
    \n当我们在应用中集成一个`UIView`时，我们使用了`UIViewRepresentable`。该协议帮助我们创建`UIView`实例。\n\nUIKit提供了一种反向操作的机制。有一个名为`UIHostingController`的`UIViewController`子类。同样，对于macOS开发，有`NSHostingController`。WatchKit版本名为`WKHostingController`。\n\
    \n`UIHostingController`在初始化器中接受一个SwiftUI `View`。因此，你需要负责创建新的SwiftUI `View`。你用它创建`UIHostingController`实例并呈现它。\n\
    \n在本章中，我们将研究如何做到这一点，包括与Storyboard的集成。"
  raw: 'We set the time wrapped value to a new string. We reuse the static date formatter
    in NoteViewModel to create a current updated at time.


    We use the UIButton tag value to create a new priority. Then we use a new function
    on NoteViewModel to handle the new priority. This recreates the image name strings
    based on the priority and returns them. Having this in a separate method allows
    us to change the image name bindings outside of creating a new NoteViewModel.


    1.  Create the Coordinator in makeCoordinator.


    ```

    func makeCoordinator() -> Coordinator {

    return Coordinator(images:

    self.noteVM.priorityImages,

    time: self.noteVM.time)

    }

    ```


    Now that the noteVM property is a binding, we can pass in the values when creating
    the coordinator.


    Currently, our ButtonView doesn’t know anything about the Coordinator. When the
    ButtonView is created, it will need the Coordinator instance to add the target
    to the buttons.


    1.  Add the coordinator to the creation of ButtonView in the makeUIView method.


    ```

    return ButtonView(rect: rect,

    noteVM: noteVM,

    coordinator: context.coordinator)

    ```


    Now we need to receive the coordinator in the ButtonView init and pass it into
    the configUI.


    1.  Add the Coordinator parameter to the init and the call to configUI.


    1.  Add the Coordinator as a parameter to configUI in ButtonView.


    ```

    init(rect : CGRect, noteVM : Binding,

    coordinator: PriorityStarButtons.Coordinator) {

    super.init(frame: rect)

    self.noteVM = noteVM

    configUI(coordinator: coordinator)

    }

    ```


    1.  Set the target on the button to the coordinator using the selector we defined
    and the touchUpInside event.


    ```

    func configUI(coordinator:

    PriorityStarButtons.Coordinator) {...

    ```


    ```

    btn.addTarget(coordinator,

    action: #selector(PriorityStarButtons

    .Coordinator.priorityChange(sender:)),

    for: .touchUpInside)

    ```


    The only thing left is to implement the updateUIView. Its first parameter is a
    UIView. We know this is the ButtonView, and we can verify that with a guard statement.


    Once we have the typecast ButtonView, we can update the UI. However, we don’t
    want to recreate the UI. Let’s add a function to ButtonView to update the button
    images based on the tag.


    The tag can serve as the index in the image name string array. If the image names
    have been properly updated, this will work fine.


    1.  Create a function in ButtonView to update the button images.


    ```

    func configPriorityImages() {

    subviews.forEach { (btn) in

    guard let btn = btn as? UIButton else

    { return }

    let imageIndex = btn.tag

    let imageName =

    noteVM!

    .priorityImages[imageIndex].wrappedValue

    let img = UIImage(systemName: imageName)

    btn.setImage(img, for: .normal)

    }

    }

    ```


    This function, when called, loops through the subviews searching for UIButtons.
    It then gets the tag and uses that to get the image name from the priorityImages
    array. It creates an image from that name and sets it on the button.


    Now we just need to call that function to update the UI when necessary.


    1.  Update the UI in updateUIView.


    ```

    func updateUIView(_ uiView: UIView,

    context: Context) {

    guard let v = uiView as? ButtonView

    else { return }

    v.configPriorityImages()

    }

    ```


    This function verifies, with a guard statement, that the UIView is a ButtonView.
    Then it calls configPriorityImages on it.


    That’s a lot of work! We took an existing UIView (i.e., ButtonView) and wrapped
    in a struct named PriorityStarButtons which implements UIViewRepresentable.


    That struct has a binding NoteViewModel which is set in its initializer. Its makeUIView
    function creates a CGRect and instantiates the ButtonView with the rect. It also
    passes in the NoteViewModel binding and coordinator from the context.


    The ButtonView initializer stores the binding in noteVM and passes the coordinator
    into configUI. That call sets up the UI including adding the targets to the buttons
    for the Coordinator.


    PriorityStarButtons creates the coordinator in makeCoordinator. It passes in the
    priority image names and the time – both from the NoteViewModel.


    The Coordinator has two bindings: images (String Array) and time (String). Those
    are set in the initializer. It also has a function to call for a button action.
    This is added as a target to the existing buttons.


    That target function updates the time and image names. That causes the UI to be
    updated which calls updateUIView. That in turn calls configPriorityImages which
    updates the images.


    In short, PriorityStarButtons creates the ButtonView, gives it the model and coordinator,
    and tells ButtonView when to update.


    ButtonView creates its buttons, adds the target to the coordinator, and updates
    the button images when told to.


    Since we’re using bindings to pass the data around, whether you change the priority
    in the List or the details screen, it’s kept in sync.


    If you run the app, it should update as you tap the buttons. And if you view the
    details, it should do the same. Also notice the time updates as in Figure [13-7](#497312_1_En_13_Chapter.xhtml#Fig7).


    ![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig7_HTML.jpg](images/497312_1_En_13_Chapter/497312_1_En_13_Fig7_HTML.jpg)


    Figure 13-7


    Current UI with Updated Time


    We did a lot in this exercise. But I hope you see the clear distinctions. The
    UIViewRepresentable struct creates and updates the UI as we saw before.


    The Coordinator is a fairly open-ended class that gets created as part of the
    protocol functions. And it’s passed around the Context. But other than that, it’s
    pretty open-ended.


    The main changes to our ButtonView were to change the property to a binding and
    add the target to the coordinator. Chances are if that UI was created in code,
    it would have already had the addTarget call. We just needed to change it.


    ## Chapter Summary


    In this chapter, we saw how to use an existing UIView. We wrapped it in a struct
    that conforms to UIViewRepresentable. We created it and updated it as part of
    the protocol functions.


    We created a coordinator that had bindings and a function valid for an addTarget
    selector.


    To keep ButtonView from having to know about the Coordinator, it could be passed
    in as a custom protocol defined in your code. Depending on your specific app requirements,
    there are various twists you can put on this concept.


    There are a few main points I hope you take away. The UIViewRepresentable is responsible
    for creating and updating the UIView it manages. If bindings are needed, no problem.
    We’re comfortable with those now.


    A coordinator can be just about anything and can serve the purposes you need.
    It’s created in the makeCoordinator. It’s returned from that function and then
    passed around in the context.


    Now we know how to use a UIView with the delegate and target/action patterns!


    # 14. SwiftUI in UIKit


    We looked at how to use existing UIKit views in SwiftUI. Now we’ll look at how
    to use SwiftUI in UIKit.


    You may have an existing project that you want to add new UI using SwiftUI. So
    you have your Storyboard setup for all your interface and navigation. It’s actually
    pretty easy to add SwiftUI views to your project.


    When we incorporated a UIView in our app, we used UIViewRepresentable. That protocol
    facilitated creating our UIView instances.


    UIKit provides a mechanism for doing it the other way around. There’s a UIViewController
    subclass called UIHostingController. Similarly, for macOS development, there’s
    NSHostingController. And the WatchKit version is named WKHostingController.


    UIHostingController takes a SwiftUI View in the initializer. So you’re responsible
    for creating your new SwiftUI View. You create the UIHostingController instance
    with that and present it.


    In this chapter, we’ll look at doing this including Storyboard incorporation.'
  trans: "\n我们将时间包裹值设置为一个新字符串。我们重用了`NoteViewModel`中的静态日期格式化器来创建当前更新时间。\n\n我们使用`UIButton`的`tag`值创建一个新的优先级。然后，我们在`NoteViewModel`上使用一个新函数来处理新的优先级。该函数根据优先级重新创建图片名称字符串并返回它们。将这个逻辑放在单独的方法中，允许我们在创建新的`NoteViewModel`之外更改图片名称绑定。\n\
    \n1. 在`makeCoordinator`中创建协调器。\n\n```\nfunc makeCoordinator() -> Coordinator {\n\
    \    return Coordinator(images: self.noteVM.priorityImages, time: self.noteVM.time)\n\
    }\n```\n\n现在，`noteVM`属性是一个绑定，我们可以在创建协调器时传入这些值。\n\n目前，我们的`ButtonView`对协调器一无所知。当创建`ButtonView`时，它需要`Coordinator`实例来为按钮添加目标。\n\
    \n1. 在`makeUIView`方法中将协调器添加到`ButtonView`的创建中。\n\n```\nreturn ButtonView(rect:\
    \ rect, noteVM: noteVM, coordinator: context.coordinator)\n```\n\n现在，我们需要在`ButtonView`的初始化器中接收协调器，并将其传递给`configUI`。\n\
    \n1. 将`Coordinator`参数添加到初始化器和对`configUI`的调用中。\n\n1. 将`Coordinator`作为参数添加到`ButtonView`的`configUI`中。\n\
    \n```\ninit(rect: CGRect, noteVM: Binding<NoteViewModel>, coordinator: PriorityStarButtons.Coordinator)\
    \ {\n    super.init(frame: rect)\n    self.noteVM = noteVM\n    configUI(coordinator:\
    \ coordinator)\n}\n```\n\n1. 使用我们定义的选择器和`touchUpInside`事件，将按钮的目标设置为协调器。\n\n```\n\
    func configUI(coordinator: PriorityStarButtons.Coordinator) {\n    // ...\n  \
    \  btn.addTarget(coordinator, action: #selector(PriorityStarButtons.Coordinator.priorityChange(sender:)),\
    \ for: .touchUpInside)\n}\n```\n\n剩下的唯一事情是实现`updateUIView`。它的第一个参数是一个`UIView`。我们知道这是`ButtonView`，可以通过一个`guard`语句来验证。\n\
    \n一旦我们有了类型转换后的`ButtonView`，就可以更新 UI。然而，我们不想重新创建 UI。让我们在`ButtonView`中添加一个函数，基于`tag`更新按钮图片。\n\
    \n`tag`可以作为图片名称字符串数组中的索引。如果图片名称已正确更新，这将正常工作。\n\n1. 在`ButtonView`中创建一个函数来更新按钮图片。\n\
    \n```\nfunc configPriorityImages() {\n    subviews.forEach { (btn) in\n      \
    \  guard let btn = btn as? UIButton else { return }\n        let imageIndex =\
    \ btn.tag\n        let imageName = noteVM!.priorityImages[imageIndex].wrappedValue\n\
    \        let img = UIImage(systemName: imageName)\n        btn.setImage(img, for:\
    \ .normal)\n    }\n}\n```\n\n调用此函数时，它会遍历子视图，查找`UIButton`。然后获取`tag`，并使用它从`priorityImages`数组中获取图片名称。它根据该名称创建一个图片，并将其设置在按钮上。\n\
    \n现在，我们只需在需要时调用该函数来更新 UI。\n\n1. 在`updateUIView`中更新 UI。\n\n```\nfunc updateUIView(_\
    \ uiView: UIView, context: Context) {\n    guard let v = uiView as? ButtonView\
    \ else { return }\n    v.configPriorityImages()\n}\n```\n\n此函数通过`guard`语句验证`UIView`是否为`ButtonView`，然后调用其`configPriorityImages`方法。\n\
    \n这工作量真不小！我们获取了一个现有的`UIView`（即`ButtonView`），并将其包装在一个名为`PriorityStarButtons`的结构体中，该结构体实现了`UIViewRepresentable`。\n\
    \n该结构体有一个绑定类型的`NoteViewModel`，在其初始化器中设置。它的`makeUIView`函数创建一个`CGRect`，并用该矩形实例化`ButtonView`。它还将`NoteViewModel`绑定和来自上下文的协调器传入。\n\
    \n`ButtonView`的初始化器将绑定存储在`noteVM`中，并将协调器传递给`configUI`。该调用设置了 UI，包括为`Coordinator`向按钮添加目标。\n\
    \n`PriorityStarButtons`在`makeCoordinator`中创建协调器。它将优先级图片名称和时间（均来自`NoteViewModel`）传入。\n\
    \n`Coordinator`有两个绑定：`images`（字符串数组）和`time`（字符串）。这些都在初始化器中设置。它还有一个用于按钮动作调用的函数。这被作为目标添加到现有按钮上。\n\
    \n该目标函数更新时间与图片名称。这会导致 UI 更新，进而调用`updateUIView`，然后调用`configPriorityImages`来更新图片。\n\
    \n简而言之，`PriorityStarButtons`创建`ButtonView`，为其提供模型和协调器，并告诉`ButtonView`何时更新。\n\n\
    `ButtonView`创建其按钮，向协调器添加目标，并在收到指令时更新按钮图片。\n\n由于我们使用绑定来传递数据，无论你是在列表还是详情屏幕中更改优先级，都会保持同步。\n\
    \n如果你运行应用，它应该会在你点击按钮时更新。如果你查看详情，它也应该如此。还要注意时间会更新，如图 13-7 所示。\n\n![../images/497312_1_En_13_Chapter/497312_1_En_13_Fig7_HTML.jpg](img/497312_1_En_13_Fig7_HTML.jpg)\n\
    \n**图 13-7** 当前 UI 与更新的时间\n\n我们在本练习中做了很多工作。但我希望你能看到清晰的区分。正如我们之前所见，`UIViewRepresentable`结构体负责创建和更新\
    \ UI。\n\n`Coordinator`是一个相当开放的类，作为协议函数的一部分被创建，并在上下文中传递。除此之外，它非常灵活。\n\n我们对`ButtonView`的主要更改是将属性改为绑定，并向协调器添加目标。如果该\
    \ UI 是在代码中创建的，很可能已经包含了`addTarget`调用。我们只需要更改它。\n\n## 章节总结\n\n在本章中，我们了解了如何使用现有的`UIView`。我们将其包装在一个遵循`UIViewRepresentable`的结构体中。我们创建并更新了它，作为协议函数的一部分。\n\
    \n我们创建了一个协调器，它包含绑定和一个可用于`addTarget`选择器的函数。\n\n为了让`ButtonView`不必了解`Coordinator`，它可以作为代码中定义的自定义协议传入。根据你具体的应用需求，你可以对这个概念进行多种变通。\n\
    \n我希望你记住几个要点。`UIViewRepresentable`负责创建和管理它所包装的`UIView`。如果需要绑定，没问题。我们现在对此已经很熟悉了。\n\
    \n协调器几乎可以是任何东西，并能满足你需要的任何目的。它在`makeCoordinator`中创建，从该函数返回，然后在上下文中传递。\n\n现在，我们知道如何使用带有委托和目标/动作模式的`UIView`了！\n\
    \n# 14. SwiftUI in UIKit\n\n我们研究了如何在 SwiftUI 中使用现有的 UIKit 视图。现在，我们将研究如何在 UIKit\
    \ 中使用 SwiftUI。\n\n你可能有一个现有项目，希望使用 SwiftUI 添加新的 UI。因此，你已经为所有界面和导航设置了 Storyboard。实际上，将\
    \ SwiftUI 视图添加到项目中非常容易。\n\n当我们在应用中集成一个`UIView`时，我们使用了`UIViewRepresentable`。该协议帮助我们创建`UIView`实例。\n\
    \nUIKit 提供了一种反向操作的机制。有一个名为`UIHostingController`的`UIViewController`子类。同样，对于 macOS\
    \ 开发，有`NSHostingController`。WatchKit 版本名为`WKHostingController`。\n\n`UIHostingController`在初始化器中接受一个\
    \ SwiftUI `View`。因此，你需要负责创建新的 SwiftUI `View`。你用它创建`UIHostingController`实例并呈现它。\n\
    \n在本章中，我们将研究如何做到这一点，包括与 Storyboard 的集成。\n"
- fmt: "## `UIHostingController`\n\nThis new controller is included in the object\
    \ library. That means it’s easy to add to your existing Storyboard. It’s listed\
    \ in the object library along with the other controllers as in Figure [14-1](#497312_1_En_14_Chapter.xhtml#Fig1).\n\
    \n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig1_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1 — Hosting View Controller in the Object Library\n\nUpdating the\
    \ Storyboard with this view controller is the same as any other. Just drag one\
    \ from the object library to your Storyboard in Interface Builder.\n\nCreating\
    \ a segue to this new controller is the same too. Just control-drag from a button\
    \ or table view to your new view controller. It fits right in like any other view\
    \ controller as in Figure [14-2](#497312_1_En_14_Chapter.xhtml#Fig2).\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig2_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2 — Segue from the Table Cell to Hosting Controller in the Storyboard\n\
    \nXcode allows you to control-drag from the Storyboard into the source view controller’s\
    \ code. This creates an `IBSegueAction` called when the segue fires. The segue\
    \ action has a return type that expects a view controller.\n\n```\n@IBSegueAction\
    \ func showDetails(_ coder: NSCoder)\n-> UIViewController? {\nreturn UIHostingController(coder:\
    \ coder,\nrootView: swiftUIView)\n}\n```\n\nThe return type of your generated\
    \ code may have a return type not set to `UIViewController`. If so, you’ll need\
    \ to change that to `UIViewController`.\n\nIn the implementation, you need to\
    \ create an instance of `UIHostingController`. You pass in the `coder` that was\
    \ sent to the function being called. The second parameter is your new SwiftUI\
    \ view.\n\nThe preceding code only shows the creation of the `UIHostingController`\
    \ with a placeholder of SwiftUI view. Depending on the view you design, the instantiation\
    \ of it will vary.\n\n## ADDING A SWIFTUI VIEW TO UIKIT\n\nLet’s start with a\
    \ basic exercise. We’ll create a simple Storyboard app and add a SwiftUI view.\n\
    \n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig3_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3 — New iOS App Project with the Storyboard Interface\n\n1.  Create\
    \ a new iOS App template project using the Storyboard and name it `Simple14` as\
    \ in Figure [14-3](#497312_1_En_14_Chapter.xhtml#Fig3).\n\n2.  Add a button to\
    \ your initial view controller from the Object Library.\n\n3.  Drag a Hosting\
    \ View Controller from the Object Library onto your Storyboard to the right of\
    \ the initial view controller.\n\n4.  Control-drag from the button to your Hosting\
    \ View Controller.\n\nWhen you release over the Hosting View Controller, select\
    \ “Show” at the top of the segue options pop-up menu.\n\nYour UI in the Storyboard\
    \ should look like Figure [14-4](#497312_1_En_14_Chapter.xhtml#Fig4).\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig4_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4 — Segue from the Initial View Controller to Hosting Controller in\
    \ the Storyboard\n\nNext, we need to create the segue action into the code.\n\n\
    ![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig5_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig5_HTML.jpg)\n\
    \nFigure 14-5 — Naming the Segue Action\n\n1.  Open the assistant (Editor ➤ Assistant\
    \ or ⌃⌥⌘⏎) to display the `ViewController` code to the right.\n\n2.  Control-drag\
    \ from the segue into your `ViewController` code above the last closing curly\
    \ brace ( `}` ) and release.\n\n3.  In the resulting pop-up, give your segue action\
    \ function a name (e.g., `showSwiftUI`) as in Figure [14-5](#497312_1_En_14_Chapter.xhtml#Fig5).\n\
    \n4.  Click the Connect button and review the generated code.\n\nAt this point,\
    \ we’re done with the Storyboard and can close that. Next, we need to create our\
    \ SwiftUI view to have something to display.\n\n5.  Add a new file to your project\
    \ (⌘+n) – select the “SwiftUI View” type and click Next.\n\n6.  Name the file\
    \ `MySwiftUI` and click Create.\n\nThe preview won’t work because there’s a compile\
    \ error. Our segue action isn’t implemented. Let’s fix it now back in the `ViewController`\
    \ class.\n\n7.  Open `ViewController.swift` and import `SwiftUI` above the declaration\
    \ of your `ViewController` class.\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig6_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig6_HTML.jpg)\n\
    \nFigure 14-6 — `MySwiftUIView` Displayed in the Simulator\n\n8.  Implement the\
    \ `showSwiftUI` function to return an instance of `UIHostingController`. Pass\
    \ in the code and an instance of your new `MySwiftUI` struct.\n\n```\n    @IBSegueAction\
    \ func showSwiftUI(_ coder: NSCoder)\n    -> UIViewController? {\n    return UIHostingController(coder:\
    \ coder,\n    rootView: MySwiftUI())\n    }\n```\n\n9.  Run the app and tap the\
    \ button. The SwiftUI view should display like Figure [14-6](#497312_1_En_14_Chapter.xhtml#Fig6).\n\
    \n```\nimport SwiftUI\n```\n\nCongrats! You’ve incorporated a SwiftUI view into\
    \ a UIKit/Storyboard app.\n\nFor a simple project, that was easy, right? It’s\
    \ not much more for complicated projects. It really depends on the SwiftUI view\
    \ you create. If it needs interaction or data, there’s more to it.\n\nNext, we’re\
    \ going to look at doing something like that.\n\n## Existing Project\n\nI’ve provided\
    \ a Begin of Chapter (BOC) project for you: `Ch14_BOC_Timers.zip`. This project\
    \ allows the user to create timers. A timer has a name and amount of time. The\
    \ user can start and pause a timer.\n\nWhen a timer runs out, it pops up a local\
    \ notification assuming the user gave the authorization to the app.\n\nSwiping\
    \ to the right gives the option to remove a timer. Right swiping displays the\
    \ start/pause button as in Figure [14-7](#497312_1_En_14_Chapter.xhtml#Fig7).\n\
    \n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig7_HTML.jpg](images/497312_1_En_14_Chapter/497312_1_En_14_Fig7_HTML.jpg)\n\
    \nFigure 14-7 — Starting a Timer with Right Swipe\n\nThe + button allows the user\
    \ to create new timers. The code has some test timers created automatically for\
    \ debug builds.\n\nThis is our starting point. However, we want to add UI using\
    \ SwiftUI. When a user taps on a timer in the list, we want to show details. The\
    \ simple UI of the details will include the name, time, and Start/Pause button.\n\
    \nAlso, the UI should update as the seconds tick away for the timer."
