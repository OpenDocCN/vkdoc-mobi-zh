    \ and learned some new modifiers for scaling, shadows, and blurring. Animating\
    \ those based on the toggle value was done via the .animation call.\n\nOur combination\
    \ of modifiers was moved to a ViewModifier struct called BouncyModifier. We also\
    \ defined a function in an extension of View to create the BouncyModifier. That\
    \ modifier was added to our Circle instead of all the code right in place.\n\n\
    Using the ViewModifier also makes the effects reusable in other places in our\
    \ code.\n\nDefining and using gradients gave our circle more definition. And adding\
    \ animation gave it more life. We explored various options for animation including\
    \ the curve, timing, spring, and axes in 3D space.\n\nWe improved the performance\
    \ for the 100 circles with a drawing group that uses the Metal framework.\n\n\
    Putting this all together shows the various approaches to animation and changes\
    \ you can make to UI elements. These same types of modifiers and animation can\
    \ be applied to a Text, Button, or other visual elements.\n\n# 18. App Including\
    \ WatchKit\n\nIn this chapter, we’re going to build a small but functional app.\
    \ We want to go through this exercise so we know we can do it end to end.\n\n\
    We’re going to build a tip calculator. It’s my “go-to” project most of the time –\
    \ partially because the requirements are basically built into the name.\n\nIt’s\
    \ a good exercise for having to get user input, manipulate it in some way (functionality),\
    \ and update the UI. Of course, the input data we need are the bill amount and\
    \ tip percentage.\n\nThere are many ways we can get this information from the\
    \ user: textfields, pickers, sliders, and more. We’ll use a TextField for the\
    \ bill amount and a Picker for the tip percentage.\n\nThe functionality will be\
    \ simple. In fact, we won’t even need a function or closure in the normal sense.\
    \ We can use computed properties instead.\n\nWe want the UI to look like Figure\
    \ [18-1](#497312_1_En_18_Chapter.xhtml#Fig1).\n\n![../images/497312_1_En_18_Chapter/497312_1_En_18_Fig1_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1\n\nTip Calculator UI\n\nFeel free to try to write the app now without\
    \ looking further. Or read the next sections on properties and UI design and then\
    \ try it. See if you can apply the binding, UI elements, and other things you’ve\
    \ learned.\n\n## Properties\n\nAs I mentioned earlier, we need two pieces of input:\
    \ bill amount and tip percentage. These will be our properties wrapped in @State\
    \ property wrappers and updated as the input changes.\n\nWe’ll also have a property\
    \ for the array of tip percentages for the user to choose from.\n\nDisplaying\
    \ the values to the users means we have to calculate the values. This can be done\
    \ in computed properties. We need at least two: tip amount and total.\n\nAlso,\
    \ the output should be displayed as formatted for currency. The NumberFormatter\
    \ class works well for this. We can have another computed property to create and\
    \ configure a NumberFormatter."
  trans: "\n## `DrawingGroup`\n\n我们的圆形绘制和动画效果很好，但若同时运行大量动画，性能可能会下降。\n\n假设我们在屏幕上放置\
    \ 100 个圆形。这将涉及大量动画：旋转、阴影、缩放和模糊。\n\n此时，使用绘图组（Drawing Group）有助于提升性能。将所有圆形放入一个绘图组后，它会先在屏幕外渲染`View`，再将结果呈现在屏幕上。这是一种更快的渲染方法。\n\
    \n此外，绘图组在底层使用 Metal 框架。它能更直接地与 GPU 协作，实现更快的图形处理。\n\n### 在 SWIFT 中使用 METAL\n\n\
    在本练习中，我们将向用户界面添加 100 个圆形。我们会将它们分两列排列，但其余代码保持不变。动画过程中性能将显著下降。我们将通过使用绘图组来解决这个问题。\n\
    \n![../images/497312_1_En_17_Chapter/497312_1_En_17_Fig10_HTML.jpg](img/497312_1_En_17_Fig10_HTML.jpg)\n\
    \n图 17-10  \n用户界面中的一百个圆形\n\n1.  用 100 个圆形替换单个圆形。为此，使用一个`VStack`，其中包含一个范围为 0 到\
    \ 9 的`ForEach`。在`VStack`内部，创建一个`HStack`，其中包含另一个 0 到 9 的`ForEach`。在嵌套的`ForEach`内部，创建圆形。\n\
    \n    ```swift\n    VStack {\n        ForEach(0..<10, id: \\.self) { index in\n\
    \            HStack {\n                ForEach(0..<10, id: \\.self) { index2 in\n\
    \                    Circle()\n                        .fill(angularGradient)\n\
    \                        .bouncy(blurFactor: self.isToggled ? 5 : 0)\n       \
    \                 .rotation3DEffect(Angle(degrees: self.isToggled ? 300 : 0),\
    \ axis: (x: 1, y: 1, z: 1))\n                        .animation(.linear(duration:\
    \ 0.75))\n                }\n            }\n        }\n    }\n    ```\n\n    运行应用程序，确认如图\
    \ 17-10 所示，100 个圆形已添加到用户界面。你会注意到圆形小了很多。然而，我们的阴影设置仍然很高。这导致阴影相互融合，覆盖了屏幕的大部分区域。\n\
    \n    如果你点击“Toggle”按钮，请注意动画的抖动现象。\n\n2.  将`.drawingGroup`添加到步骤 1 中创建的圆形外层`VStack`（从步骤\
    \ 1 创建）。\n\n    ```swift\n    ...}.drawingGroup()\n    ```\n\n    再次运行应用程序，注意动画变得多么流畅。\n\
    \n### 章节总结\n\n在本章中，我们探讨了许多用户界面方面的内容。我们首先学习了用于在用户界面中添加/移除元素的过渡（Transitions）。为了给过渡添加动画效果，我们研究了各种类型的过渡以及`.animation`修饰符。\n\
    \n为了组合动画，我们在`Transition`上使用了非对称过渡和`.combine`函数。当过渡效果达到预期后，我们将其移入了`AnyTransition`扩展中的一个静态计算属性。\n\
    \n我们通过`Circle`扩展了用户界面，并学习了一些用于缩放、阴影和模糊的新修饰符。通过`.animation`调用来基于切换值对这些修饰符进行动画处理。\n\
    \n我们将组合的修饰符移入了一个名为`BouncyModifier`的`ViewModifier`结构体。我们还在`View`的扩展中定义了一个函数来创建`BouncyModifier`。该修饰符被添加到了我们的`Circle`上，而不是将代码直接写在原地。\n\
    \n使用`ViewModifier`还使得这些效果可以在代码的其他地方复用。\n\n定义和使用渐变让我们的圆形更具立体感。而添加动画则让它更生动。我们探索了动画的各种选项，包括曲线、时间、弹簧以及三维空间中的坐标轴。\n\
    \n我们通过使用 Metal 框架的绘图组改进了 100 个圆形的性能。\n\n综合所有这些内容，展示了你可以对 UI 元素进行的各种动画处理方法和更改。相同类型的修饰符和动画可以应用于`Text`、`Button`或其他视觉元素。\n\
    \n# 18. 包含 WatchKit 的应用\n\n在本章中，我们将构建一个功能完整的小型应用。我们希望通过此练习来确保能够端到端地完成开发。\n\n我们将构建一个小费计算器。这通常是我的“首选”项目——部分原因是其需求基本已体现在名称中。\n\
    \n这是一个很好的练习，需要获取用户输入、以某种方式处理输入（功能性），并更新用户界面。当然，我们需要的输入数据是账单金额和小费百分比。\n\n我们可以通过多种方式从用户处获取这些信息：文本字段（TextField）、选择器（Picker）、滑块（Slider）等。我们计划使用`TextField`输入账单金额，使用`Picker`选择小费百分比。\n\
    \n功能将非常简单。事实上，我们甚至不需要通常意义上的函数或闭包。我们可以使用计算属性来代替。\n\n我们希望用户界面如图 18-1 所示。\n\n![../images/497312_1_En_18_Chapter/497312_1_En_18_Fig1_HTML.jpg](img/497312_1_En_18_Fig1_HTML.jpg)\n\
    \n图 18-1  \n小费计算器用户界面\n\n你可以尝试不往下看，直接编写应用。或者先阅读接下来的属性和 UI 设计部分，然后再尝试。看看你是否能应用学到的绑定（Binding）、UI\
    \ 元素等知识。\n\n### 属性\n\n如前所述，我们需要两个输入：账单金额和小费百分比。这些将是用`@State`属性包装器包装的属性，并随着输入变化而更新。\n\
    \n我们还将有一个属性来存储供用户选择的小费百分比数组。\n\n向用户显示数值意味着我们需要计算这些值。这可以通过计算属性完成。我们至少需要两个计算属性：小费金额和总计。\n\
    \n此外，输出应显示为货币格式。`NumberFormatter`类非常适合此用途。我们可以再创建一个计算属性来创建和配置`NumberFormatter`。\n"
- fmt: "# UI Design\n\n我们可以使用 `Text` 项来放置标题和两个输出区域。剩下的只有输入部分。我们可以使用之前提到的 `TextField`\
    \ 和 `Picker`。它们各自通过绑定（binding）关联到相关属性。\n\n在许多地方，我们会添加一些间距、内边距、字体粗细等，以使 UI 看起来更美观。\n\
    \n## 小费计算器\n\n首先，我们需要创建一个新项目。接着，我们将属性添加到 `ContentView` 中。最后，我们将创建 `body` 计算属性的内容。\n\
    \n![images/497312_1_En_18_Chapter/497312_1_En_18_Fig2_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig2_HTML.jpg)\n\
    \n**图 18-2** iOS App with Watch App 模板\n\n1.  创建一个名为 `TC` 的新项目，使用 watchOS 的“iOS\
    \ App with Watch App”模板，如图 18-2 所示。界面使用 `SwiftUI`，生命周期使用 `SwiftUI App`。\n\n2.\
    \  添加两个属性，作为用户输入的来源（source of truth）。\n\n    ```\n    struct ContentView: View\
    \ {\n    @State private var tipSelected = 1\n    @State private var billInput\
    \ = \"\"\n    ```\n\n3.  添加用户选择的小费百分比。\n\n4.  添加一个数字格式化器的计算属性。\n\n    ```\n  \
    \  private var numFormatter : NumberFormatter {\n    let nf = NumberFormatter()\n\
    \    nf.numberStyle = .currency\n    nf.isLenient = true\n    return nf\n    }\n\
    \    ```\n\n5.  创建一个 `billAmount` 的计算属性（输入的账单金额的双精度值）。\n\n    ```\n    private\
    \ var billAmount : Double {\n    numFormatter.number(from:\n    billInput)?\n\
    \    .doubleValue ?? 0.0\n    }\n    ```\n\n6.  使用第 5 步中定义的 `billAmount`，创建一个小费金额的计算属性。\n\
    \n    ```\n    private var tipAmount : Double {\n    billAmount * tipPercentages[tipSelected]\
    \ }\n    ```\n\n7.  使用第 5 步的 `billAmount` 和第 6 步的 `tipAmount`，创建一个总金额的计算属性。\n\n\
    \    ```\n    private var tipPercentages = [0.1, 0.15,\n    0.2, 0.25]\n    ```\n\
    \n8.  用 `VStack` 和包含最后内边距的应用标题替换默认的 `body` 内容。\n\n    ```\n    var body: some\
    \ View {\n    VStack {\n    Text(\"Tip Calculator\")\n    .fontWeight(.heavy)\n\
    \    }.padding()\n    ```\n\n9.  添加一个绑定到 `billInput` 属性的 `TextField`。\n\n    ```\n\
    \    TextField(\"Bill Amount\", text: $billInput)\n    .textFieldStyle(RoundedBorderTextFieldStyle())\n\
    \    ```\n\n10. 创建一个 `Picker`，基于 `tipPercentages` 数组，通过 `ForEach` 绑定到 `tipSelected`\
    \ 属性。\n\n    ```\n    Picker(\"Tip\", selection: $tipSelected) {\n    ForEach\
    \ (tipPercentages.indices, id: \\.self) {\n    let dbl = Double(self.tipPercentages[$0])\n\
    \    Text(\"\\(Int(dbl * 100.0))%\")\n    }\n    }\n    .pickerStyle(SegmentedPickerStyle())\n\
    \    ```\n\n11. 添加一个包含输出 `Text` 项的 `HStack`，使用数字格式化器。\n\n    ```\n    HStack {\n\
    \    let tipStr = numFormatter.string(for: tipAmount)\n    Text(\"Tip: \\(tipStr\
    \ ?? \"$0.00\")\")\n    Spacer()\n    let totalStr = numFormatter.string(for:\
    \ total)\n    Text(\"Total: \\(totalStr ?? \"$0.00\")\")\n    }\n    Spacer()\n\
    \    ```\n\n    ```\n    private var total : Double { tipAmount + billAmount }\n\
    \    ```\n\n预览应如图 18-1 所示。如果我们运行应用并输入账单金额 20，应该会看到如图 18-3 所示的小费和总金额。\n\n![images/497312_1_En_18_Chapter/497312_1_En_18_Fig3_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig3_HTML.jpg)\n\
    \n**图 18-3** 显示小费和总金额的小费计算器\n\nUI 中添加了一些分隔符等。总的来说，这是一个具有简单 UI 的简单应用，但它能工作。希望每一步都让你感到熟悉和舒适。\n\
    \n# WatchKit\n\n现在，我们希望将这个 UI 应用到 Watch 应用模块中。大多数情况下，这个 UI 在 watchOS 上的工作方式与在\
    \ iOS 上相同。\n\n`SwiftUI` 中的许多 UI 项可以跨平台工作。然而，在某些情况下，某些变体是不存在的。对我们来说，这仅限于 `TextField`\
    \ 和 `Picker`。\n\n**WATCH 应用**\n\n你会注意到，在当前项目中已经有一个“TC WatchKit App”和一个“TC WatchKit\
    \ Extension”。我们将编辑扩展中的 `ContentView.swift` 文件。\n\n![images/497312_1_En_18_Chapter/497312_1_En_18_Fig4_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig4_HTML.jpg)\n\
    \n**图 18-4** WatchKit 应用预览\n\n1.  打开 TC iOS 应用（**不是扩展**）中的 `ContentView.swift`\
    \ 文件。\n\n2.  复制整个文件的内容。\n\n3.  打开 TC WatchKit Extension 中的 `ContentView.swift`\
    \ 文件。\n\n4.  将复制的代码粘贴覆盖整个文件。\n\n    会出现两个错误。这两个错误都关于样式——`TextField` 和 `Picker`。\n\
    \n5.  注释掉样式的代码。\n\n    ```\n    //.textFieldStyle(RoundedBorderTextFieldStyle())\n\
    \    ...\n    //.pickerStyle(SegmentedPickerStyle())\n    ```\n\n6.  刷新预览，画布应显示如图\
    \ 18-4 所示的手表预览。\n\n如果在 Live 模式下运行应用，请确保先在 Xcode（左上角）选择正确的目标和模拟器，如图 18-5 所示。\n\n\
    ![images/497312_1_En_18_Chapter/497312_1_En_18_Fig5_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig5_HTML.jpg)\n\
    \n**图 18-5** WatchKit 的 Xcode 目标和模拟器\n\n“Total”文本有点长，可能需要调整，但 UI 可以编译和显示。多亏了 `SwiftUI`，只需很少的改动，我们就可以拥有一个基于\
    \ iOS UI 的手表 UI。\n\n# 章节总结\n\n这个小费计算器项目让我们在一个小而真实的应用中使用了我们学到的一些东西。通过使用 `@State`\
    \ 属性包装器，我们使用 UI 来更新属性。我们将其他属性用作数据和功能。\n\n通过 `TextField` 和 `Picker`，我们允许用户输入他们的值。`Text`\
    \ 项显示标题以及输出的小费和总金额。\n\n还有少量的内边距、分隔符和其他修饰符来稍微调整 UI。\n\n使用相同的 `SwiftUI` 代码，我们创建了一个\
    \ `WatchKit` UI。只需要两个小的改动就能使其编译通过。然后，我们可能希望稍微更新 UI 以使其更合适。但希望看到相同的代码能为另一个设备构建\
    \ UI 是件有趣的事。\n\n# 19. 用户输入表单\n\n我们已经介绍了多种用于用户输入的项。其中一些将包含在本章中。它们可能会以不同的方式使用，或带有其他选项、参数等。\n\
    \n在本章中，我们将构建一个用户输入表单。我们将专注于各种输入项所需的方面。基于此，我们将创建用户界面。\n\n输入基于应用中使用的常见数据类型。\n\n\
    *   电子邮件字符串\n*   货币数字（显示为字符串/货币）\n*   日期（显示为字符串/日期）\n*   从列表中选择\n\n这里的一个关键因素是，这些值不仅仅是普通的字符串和数字。它们需要被验证、格式化、列出以及进行其他处理。\n\
    \n我们的用户界面将是一个供人们输入信息的表单，如图 19-1 所示。\n\n![images/497312_1_En_19_Chapter/497312_1_En_19_Fig1_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig1_HTML.jpg)\n\
    \n**图 19-1** 表单用户界面\n\n## 表单\n\n`Form` 是一个用于容纳 UI 项的容器。它被定义为一个符合 `View` 协议的结构体。就像\
    \ `HStack`、`VStack`、`Section` 或 `Group` 一样，`Form` 将其他 UI 元素包裹在其中，作为一个分组。\n\n`Form`\
    \ 除了典型的 `SwiftUI` 修饰符外，不接受任何参数或具有其他选项。\n\n`Form` 的独特之处在于它在不同平台上的显示方式。正如 Apple\
    \ 文档所述，`Form` 是一个“用于分组数据输入控件的容器”。\n\n这正是我们在项目中要做的事情。如果一切顺利，我们可以在其他平台的应用中使用相同的代码。"
  raw: "## UI Design\n\nWe can use Text items for the title and two output areas.\
    \ That only leaves the input. We can use a TextField and Picker as mentioned before.\
    \ These each use binding to the related properties.\n\nIn many places, we’ll add\
    \ some spacing, padding, font weight, and so on to make the UI look good.\n\n\
    TIP CALCULATOR\n\nFirst, we need to create a new project. We’ll add our properties\
    \ to the ContentView next. Finally, we’ll create the body computed property contents.\n\
    \n![../images/497312_1_En_18_Chapter/497312_1_En_18_Fig2_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig2_HTML.jpg)\n\
    \nFigure 18-2\n\niOS App with Watch App Template\n\n1.  Create a new project called\
    \ TC using the watchOS template for “iOS App with Watch App” as in Figure [18-2](#497312_1_En_18_Chapter.xhtml#Fig2).\
    \ Use SwiftUI for the interface and SwiftUI App for the life cycle.\n\n1.  Add\
    \ the two properties to be the source of truth for the user’s input.\n\n    ```\n\
    \    struct ContentView: View {\n    @State private var tipSelected = 1\n    @State\
    \ private var billInput = \"\"\n    ```\n\n2.  Add the tip percentages for the\
    \ user selected.\n\n1.  Add a computed property for the number formatter.\n\n\
    \    ```\n    private var numFormatter : NumberFormatter {\n    let nf = NumberFormatter()\n\
    \    nf.numberStyle = .currency\n    nf.isLenient = true\n    return nf\n    }\n\
    \    ```\n\n2.  Create a computed property for the billAmount (double of the entered\
    \ bill amount).\n\n    ```\n    private var billAmount : Double {\n    numFormatter.number(from:\n\
    \    billInput)?\n    .doubleValue ?? 0.0\n    }\n    ```\n\n3.  Create a computed\
    \ property for the tip amount using the billAmount defined in step 5.\n\n    ```\n\
    \    private var tipAmount : Double {\n    billAmount * tipPercentages[tipSelected]\
    \ }\n    ```\n\n4.  Create a computed property for the total using the billAmount\
    \ from step 5 and tipAmount from step 6.\n\n```\nprivate var tipPercentages =\
    \ [0.1, 0.15,\n0.2, 0.25]\n```\n\n1.  Replace the default body contents with a\
    \ VStack and the app title including padding at the end.\n\n    ```\n    var body:\
    \ some View {\n    VStack {\n    Text(\"Tip Calculator\")\n    .fontWeight(.heavy)\n\
    \    }.padding()\n    ```\n\n2.  Add a TextField with binding to the billInput\
    \ property.\n\n    ```\n    TextField(\"Bill Amount\", text: $billInput)\n   \
    \ .textFieldStyle(RoundedBorderTextFieldStyle())\n    ```\n\n3.  Create a Picker\
    \ with binding to the tipSelected property based on the tip percentages array\
    \ in a ForEach.\n\n    ```\n    Picker(\"Tip\", selection: $tipSelected) {\n \
    \   ForEach (tipPercentages.indices, id: \\.self) {\n    let dbl = Double(self.tipPercentages[$0])\n\
    \    Text(\"\\(Int(dbl * 100.0))%\")\n    }\n    }\n    .pickerStyle(SegmentedPickerStyle())\n\
    \    ```\n\n4.  Add an HStack with the Text items for output using the number\
    \ formatter.\n\n    ```\n    HStack {\n    let tipStr = numFormatter.string(for:\
    \ tipAmount)\n    Text(\"Tip: \\(tipStr ?? \"$0.00\")\")\n    Spacer()\n    let\
    \ totalStr = numFormatter.string(for: total)\n    Text(\"Total: \\(totalStr ??\
    \ \"$0.00\")\")\n    }\n    Spacer()\n    ```\n\n```\nprivate var total : Double\
    \ { tipAmount + billAmount }\n```\n\nThe preview should look like Figure [18-1](#497312_1_En_18_Chapter.xhtml#Fig1).\
    \ If we run the app and enter 20 for the bill amount, we should see the tip and\
    \ total displayed as in Figure [18-3](#497312_1_En_18_Chapter.xhtml#Fig3).\n\n\
    ![../images/497312_1_En_18_Chapter/497312_1_En_18_Fig3_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig3_HTML.jpg)\n\
    \nFigure 18-3\n\nTip Calculator with Tip and Total\n\nThere were some spacers\
    \ and such added in there for the UI. Overall, it’s a simple app with a simple\
    \ UI, but it works. I hope each step felt familiar and comfortable.\n\n## WatchKit\n\
    \nNow we want to take this UI and use it in the Watch app module. For the most\
    \ part, the UI will work as it does for iOS.\n\nMany UI items in SwiftUI work\
    \ across platforms. However, in some cases, variations don’t exist. For us, that\
    \ will be limited to the TextField and Picker.\n\nWATCH APP\n\nYou’ll notice in\
    \ the current project that there is already a “TC WatchKit App” and a “TC WatchKit\
    \ Extension.” We’ll be editing the ContentView.swift file in the extension.\n\n\
    ![../images/497312_1_En_18_Chapter/497312_1_En_18_Fig4_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig4_HTML.jpg)\n\
    \nFigure 18-4\n\nWatchKit App Preview\n\n1.  Open the ContentView.swift file in\
    \ the TC iOS app (**not the extension**).\n\n2.  Copy the entire contents of the\
    \ file.\n\n3.  Open the ContentView.swift file in the TC WatchKit Extension.\n\
    \n4.  Paste the copied code over the entire file.\n\n    There will be two errors.\
    \ Both of them are for styles – the TextField and Picker.\n\n5.  Comment out the\
    \ code for the styles.\n\n    ```\n    //.textFieldStyle(RoundedBorderTextFieldStyle())\n\
    \    ...\n    //.pickerStyle(SegmentedPickerStyle())\n    ```\n\n6.  Refresh the\
    \ preview, and the Canvas should display a watch preview like Figure [18-4](#497312_1_En_18_Chapter.xhtml#Fig4).\n\
    \nIf you run the app in Live mode, be sure to first pick the appropriate target\
    \ and simulator in Xcode (top left) as in Figure [18-5](#497312_1_En_18_Chapter.xhtml#Fig5).\n\
    \n![../images/497312_1_En_18_Chapter/497312_1_En_18_Fig5_HTML.jpg](images/497312_1_En_18_Chapter/497312_1_En_18_Fig5_HTML.jpg)\n\
    \nFigure 18-5\n\nXcode Target and Simulator for WatchKit\n\nThe “Total” text is\
    \ a bit long and might need to be tweaked, but the UI compiles and displays. With\
    \ only a few changes, we can have a watch UI based on the iOS UI thanks to SwiftUI.\n\
    \n## Chapter Summary\n\nThis Tip Calculator project allowed us to use some of\
    \ the things we learned in a small but realistic app. By using the @State property\
    \ wrapper, we used the UI to update our properties. We used other properties as\
    \ data and functionality.\n\nWith a TextField and Picker, we allowed the user\
    \ to enter their values. The Text items displayed the title and output tip and\
    \ total.\n\nThere’s a handful of padding, spacers, and other modifiers to tweak\
    \ the UI just a bit.\n\nUsing this same SwiftUI code, we created a WatchKit UI.\
    \ Only two small changes were required to make it compile. From there, we might\
    \ want to update the UI a bit to fit better. But hopefully it was fun to see that\
    \ the same code built a UI for another device.\n\n# 19. User Input Form\n\nWe’ve\
    \ covered a variety of items for user input already. Some of those will be included\
    \ in this chapter. They might be used in a different way or with other options,\
    \ parameters, and so on.\n\nIn this chapter, we’re going to build a user input\
    \ form. We’re going to focus on the aspects required for various pieces of input.\
    \ Based on that, we’ll create the user interface.\n\nThe input is based on some\
    \ common types of data used in apps.\n\n*   Email String\n\n*   Monetary number\
    \ (displayed as a String/currency)\n\n*   Date (displayed as a String/date)\n\n\
    *   Selection from a list\n\nOne key factor here is that these values aren’t just\
    \ regular Strings and numbers. They need to be validated, formatted, listed, and\
    \ otherwise processed.\n\nOur user interface will be a form for people to input\
    \ information like Figure [19-1](#497312_1_En_19_Chapter.xhtml#Fig1).\n\n![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig1_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig1_HTML.jpg)\n\
    \nFigure 19-1\n\nForm User Interface\n\n## Form\n\nA Form is a container for UI\
    \ items. It is defined as a struct that conforms to the View protocol. Just like\
    \ HStack, VStack, Section, or Group, a Form wraps other UI elements inside as\
    \ a grouping.\n\nA Form doesn’t take any parameters or otherwise have options\
    \ other than typical SwiftUI modifiers.\n\nThe unique thing about Form is how\
    \ it is displayed on various platforms. As the Apple documentation describes,\
    \ a Form is a “container for grouping controls used for data entry.”\n\nThat’s\
    \ exactly what we’re doing in our project. If things go well, we could use the\
    \ same code in an app for other platforms."
  trans: "\n# UI 设计\n\n我们可以使用 `Text` 项来放置标题和两个输出区域。剩下的只有输入部分。我们可以使用之前提到的 `TextField`\
    \ 和 `Picker`。它们各自通过绑定（binding）关联到相关属性。\n\n在许多地方，我们会添加一些间距、内边距、字体粗细等，以使 UI 看起来更美观。\n\
    \n## 小费计算器\n\n首先，我们需要创建一个新项目。接着，我们将属性添加到 `ContentView` 中。最后，我们将创建 `body` 计算属性的内容。\n\
    \n![images/497312_1_En_18_Chapter/497312_1_En_18_Fig2_HTML.jpg](img/497312_1_En_18_Fig2_HTML.jpg)\n\
    \n**图 18-2** iOS App with Watch App 模板\n\n1.  创建一个名为 `TC` 的新项目，使用 watchOS 的“iOS\
    \ App with Watch App”模板，如图 18-2 所示。界面使用 `SwiftUI`，生命周期使用 `SwiftUI App`。\n\n2.\
    \  添加两个属性，作为用户输入的来源（source of truth）。\n\n    ```\n    struct ContentView: View\
    \ {\n    @State private var tipSelected = 1\n    @State private var billInput\
    \ = \"\"\n    ```\n\n3.  添加用户选择的小费百分比。\n\n4.  添加一个数字格式化器的计算属性。\n\n    ```\n  \
    \  private var numFormatter : NumberFormatter {\n    let nf = NumberFormatter()\n\
    \    nf.numberStyle = .currency\n    nf.isLenient = true\n    return nf\n    }\n\
    \    ```\n\n5.  创建一个 `billAmount` 的计算属性（输入的账单金额的双精度值）。\n\n    ```\n    private\
    \ var billAmount : Double {\n    numFormatter.number(from:\n    billInput)?\n\
    \    .doubleValue ?? 0.0\n    }\n    ```\n\n6.  使用第 5 步中定义的 `billAmount`，创建一个小费金额的计算属性。\n\
    \n    ```\n    private var tipAmount : Double {\n    billAmount * tipPercentages[tipSelected]\
    \ }\n    ```\n\n7.  使用第 5 步的 `billAmount` 和第 6 步的 `tipAmount`，创建一个总金额的计算属性。\n\n\
    \    ```\n    private var tipPercentages = [0.1, 0.15,\n    0.2, 0.25]\n    ```\n\
    \n8.  用 `VStack` 和包含最后内边距的应用标题替换默认的 `body` 内容。\n\n    ```\n    var body: some\
    \ View {\n    VStack {\n    Text(\"Tip Calculator\")\n    .fontWeight(.heavy)\n\
    \    }.padding()\n    ```\n\n9.  添加一个绑定到 `billInput` 属性的 `TextField`。\n\n    ```\n\
    \    TextField(\"Bill Amount\", text: $billInput)\n    .textFieldStyle(RoundedBorderTextFieldStyle())\n\
    \    ```\n\n10. 创建一个 `Picker`，基于 `tipPercentages` 数组，通过 `ForEach` 绑定到 `tipSelected`\
    \ 属性。\n\n    ```\n    Picker(\"Tip\", selection: $tipSelected) {\n    ForEach\
    \ (tipPercentages.indices, id: \\.self) {\n    let dbl = Double(self.tipPercentages[$0])\n\
    \    Text(\"\\(Int(dbl * 100.0))%\")\n    }\n    }\n    .pickerStyle(SegmentedPickerStyle())\n\
    \    ```\n\n11. 添加一个包含输出 `Text` 项的 `HStack`，使用数字格式化器。\n\n    ```\n    HStack {\n\
    \    let tipStr = numFormatter.string(for: tipAmount)\n    Text(\"Tip: \\(tipStr\
    \ ?? \"$0.00\")\")\n    Spacer()\n    let totalStr = numFormatter.string(for:\
    \ total)\n    Text(\"Total: \\(totalStr ?? \"$0.00\")\")\n    }\n    Spacer()\n\
    \    ```\n\n    ```\n    private var total : Double { tipAmount + billAmount }\n\
    \    ```\n\n预览应如图 18-1 所示。如果我们运行应用并输入账单金额 20，应该会看到如图 18-3 所示的小费和总金额。\n\n![images/497312_1_En_18_Chapter/497312_1_En_18_Fig3_HTML.jpg](img/497312_1_En_18_Fig3_HTML.jpg)\n\
    \n**图 18-3** 显示小费和总金额的小费计算器\n\nUI 中添加了一些分隔符等。总的来说，这是一个具有简单 UI 的简单应用，但它能工作。希望每一步都让你感到熟悉和舒适。\n\
    \n# WatchKit\n\n现在，我们希望将这个 UI 应用到 Watch 应用模块中。大多数情况下，这个 UI 在 watchOS 上的工作方式与在\
    \ iOS 上相同。\n\n`SwiftUI` 中的许多 UI 项可以跨平台工作。然而，在某些情况下，某些变体是不存在的。对我们来说，这仅限于 `TextField`\
    \ 和 `Picker`。\n\n**WATCH 应用**\n\n你会注意到，在当前项目中已经有一个“TC WatchKit App”和一个“TC WatchKit\
    \ Extension”。我们将编辑扩展中的 `ContentView.swift` 文件。\n\n![images/497312_1_En_18_Chapter/497312_1_En_18_Fig4_HTML.jpg](img/497312_1_En_18_Fig4_HTML.jpg)\n\
    \n**图 18-4** WatchKit 应用预览\n\n1.  打开 TC iOS 应用（**不是扩展**）中的 `ContentView.swift`\
    \ 文件。\n\n2.  复制整个文件的内容。\n\n3.  打开 TC WatchKit Extension 中的 `ContentView.swift`\
    \ 文件。\n\n4.  将复制的代码粘贴覆盖整个文件。\n\n    会出现两个错误。这两个错误都关于样式——`TextField` 和 `Picker`。\n\
    \n5.  注释掉样式的代码。\n\n    ```\n    //.textFieldStyle(RoundedBorderTextFieldStyle())\n\
    \    ...\n    //.pickerStyle(SegmentedPickerStyle())\n    ```\n\n6.  刷新预览，画布应显示如图\
    \ 18-4 所示的手表预览。\n\n如果在 Live 模式下运行应用，请确保先在 Xcode（左上角）选择正确的目标和模拟器，如图 18-5 所示。\n\n\
    ![images/497312_1_En_18_Chapter/497312_1_En_18_Fig5_HTML.jpg](img/497312_1_En_18_Fig5_HTML.jpg)\n\
    \n**图 18-5** WatchKit 的 Xcode 目标和模拟器\n\n“Total”文本有点长，可能需要调整，但 UI 可以编译和显示。多亏了 `SwiftUI`，只需很少的改动，我们就可以拥有一个基于\
    \ iOS UI 的手表 UI。\n\n# 章节总结\n\n这个小费计算器项目让我们在一个小而真实的应用中使用了我们学到的一些东西。通过使用 `@State`\
    \ 属性包装器，我们使用 UI 来更新属性。我们将其他属性用作数据和功能。\n\n通过 `TextField` 和 `Picker`，我们允许用户输入他们的值。`Text`\
    \ 项显示标题以及输出的小费和总金额。\n\n还有少量的内边距、分隔符和其他修饰符来稍微调整 UI。\n\n使用相同的 `SwiftUI` 代码，我们创建了一个\
    \ `WatchKit` UI。只需要两个小的改动就能使其编译通过。然后，我们可能希望稍微更新 UI 以使其更合适。但希望看到相同的代码能为另一个设备构建\
    \ UI 是件有趣的事。\n\n# 19. 用户输入表单\n\n我们已经介绍了多种用于用户输入的项。其中一些将包含在本章中。它们可能会以不同的方式使用，或带有其他选项、参数等。\n\
    \n在本章中，我们将构建一个用户输入表单。我们将专注于各种输入项所需的方面。基于此，我们将创建用户界面。\n\n输入基于应用中使用的常见数据类型。\n\n\
    *   电子邮件字符串\n*   货币数字（显示为字符串/货币）\n*   日期（显示为字符串/日期）\n*   从列表中选择\n\n这里的一个关键因素是，这些值不仅仅是普通的字符串和数字。它们需要被验证、格式化、列出以及进行其他处理。\n\
    \n我们的用户界面将是一个供人们输入信息的表单，如图 19-1 所示。\n\n![images/497312_1_En_19_Chapter/497312_1_En_19_Fig1_HTML.jpg](img/497312_1_En_19_Fig1_HTML.jpg)\n\
    \n**图 19-1** 表单用户界面\n\n## 表单\n\n`Form` 是一个用于容纳 UI 项的容器。它被定义为一个符合 `View` 协议的结构体。就像\
    \ `HStack`、`VStack`、`Section` 或 `Group` 一样，`Form` 将其他 UI 元素包裹在其中，作为一个分组。\n\n`Form`\
    \ 除了典型的 `SwiftUI` 修饰符外，不接受任何参数或具有其他选项。\n\n`Form` 的独特之处在于它在不同平台上的显示方式。正如 Apple\
    \ 文档所述，`Form` 是一个“用于分组数据输入控件的容器”。\n\n这正是我们在项目中要做的事情。如果一切顺利，我们可以在其他平台的应用中使用相同的代码。\n"
- fmt: '## Section


    Our form will be broken up into sections. The `Section` item is good for this.
    On the iOS UI, a `Form` looks like a `List`. And a `Section` looks like a section
    in a table view.


    If you look at Figure [19-1](#497312_1_En_19_Chapter.xhtml#Fig1), you’ll see five
    sections. The section for the state selection has two items that appear together
    in one section.


    A section can be created with a header and/or footer. Otherwise, it’s much like
    a `Group` or `Form`: returns a `View` to display.


    Inside our various sections, we’ll create a UI via elements or other groups of
    UI items in `HStack` and such.


    ## App Requirements


    Let’s go over a few of the requirements of our app. We’re entering an email address,
    monetary number, and date and making a selection from a list. We want to validate
    the email address, format the number into currency, and format the date.


    We could use a date picker for the date, but we’re going to use a `String` for
    input but store it as a `Date`.


    For the email, we can write a validation function in an extension on `String`.
    For the currency and date fields, we’ll use a `NumberFormatter` and `DateFormatter`,
    respectively. We can create those as computed properties in an extension on each
    class.


    For the selection from the list, we’ll store the selected index in an array. So
    we need a list of values to choose from.


    I’ve provided a starter project for this exercise titled `InputForm`. It’s in
    a zip file titled `Ch19_BOC_InputForm.zip`. It contains the extensions we’ll use
    for the formatters and for validating a `String` as an email (see Figure [19-2](#497312_1_En_19_Chapter.xhtml#Fig2)).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig2_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig2_HTML.jpg)


    Figure 19-2


    Extensions Provided in the BOC Project


    FORM-BASED USER INTERFACE


    Open the `InputForm` project provided in `Ch19_BOC_InputForm.zip`. Starting from
    there, we’ll create our user input form.


    1.  In the `ContentView` struct, define properties for the list of States to choose
    from and where to store the email, selected state, user income, and date of birth.


    **Note** Only a partial list of states is provided here.


    1.  Replace the current body contents with a `Form`.


    ```

    let states = ["Alabama", "Alaska",

    "American Samoa", "Arizona", "Arkansas",

    "California", "Colorado", "Connecticut",

    "Delaware", "District of Columbia"]

    @State var email = ""

    @State var selectedState = 0

    @State var userIncome = 0.0

    @State var dateOfBirth = Date.distantPast

    ```


    ```

    var body: some View {

    Form {

    }

    }

    ```


    The first `Section` we’ll add is for entering an email address. The `TextField`
    for this value will be pretty basic. The property is already defined; we just
    need the `TextField`.


    1.  Create a `Section` inside the `Form` including a `TextField` with binding
    to `$email`.


    ```

    Section {

    TextField("Email", text: $email)

    { (beingEdited) in

    print (beingEdited)

    } onCommit: {

    }

    }

    ```


    The first closure, `onEditingChanged`, is called when the contents start and end
    editing. The parameter is a boolean for when the textfield contents are being
    edited.


    When the user begins typing in the field, `true` will be printed. It will print
    `false` when they tap return.


    The second closure is when the content is committed (i.e., the return key is tapped
    by the user).


    So far, the UI in the Canvas preview should look like Figure [19-3](#497312_1_En_19_Chapter.xhtml#Fig3).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig3_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig3_HTML.jpg)


    Figure 19-3


    UI with an Email TextField


    In the `onCommit` closure, we can validate the email address.


    1.  Add a check to validate the email entered in the `onCommit` closure.


    ```

    Section {

    TextField("Email", text: $email)

    { (changed) in

    } onCommit: {

    if email.isValidEmail == false {

    $email.wrappedValue = ""

    }

    }

    }

    ```


    This just clears the textfield if the user enters an invalid email address.


    1.  Set the keyboard and content type to be `.emailAddress`.


    1.  Create another `Section` for the income input with the currency formatter
    provided in the `NumberFormatter` extension.


    ```

    Section {

    TextField("Email", text: $email)

    { (changed) in

    } onCommit: {

    if email.isValidEmail == false {

    $email.wrappedValue = ""

    }

    }

    .keyboardType(.emailAddress)

    .textContentType(.emailAddress)

    }

    ```


    ```

    Section {

    HStack {

    TextField("Income", value: $userIncome,

    formatter: NumberFormatter.currencyFormatter)

    }

    }

    ```


    The formatter will keep the number entered as currency.


    1.  Add a `.disabled` modifier to the `TextField` so that it’s only enabled if
    the user has an email address entered.


    1.  Add another `Section` with a textfield using binding to `dateOfBirth` and
    formatter of the `shortDateFormatter` created in the `DateFormatter` extension.


    ```

    TextField("Income", value: $userIncome,

    formatter: NumberFormatter.currencyFormatter)

    .disabled(self.email.count == 0)

    ```


    ```

    Section {

    TextField("DOB", value: $dateOfBirth,

    formatter: DateFormatter.shortDateFormatter)

    }

    ```


    The formatter, in this case, will take the `dateOfBirth` property (`Date`) and
    convert it to a `String` using the short date format and no time style. When the
    user enters a new value, the formatter will be used to convert that `String` to
    a date to store back in the `dateOfBirth` property.


    1.  Add another `Section` with a horizontal scroll view with an `HStack` in it.
    Inside the `HStack`, create `Text` items for each state in the list.


    ```

    Section {

    ScrollView(.horizontal) {

    HStack(spacing: 40) {

    ForEach(states.indices) { index in

    Text(self.states[index])

    }

    }

    }

    }

    ```


    The `HStack` has a spacing value of 40 to keep the `Text` items nicely spaced
    apart.


    1.  Add a tap gesture to the `Text` item in the `ForEach` to set the `selectedState`
    property.


    ```

    Text(self.states[index])

    .onTapGesture {

    self.selectedState = index

    }

    ```


    Now as the user taps on state names, it updates the property to the corresponding
    array index.


    1.  Change the text color for the `selectedState` item.


    ```

    Text(self.states[index])

    .onTapGesture {

    self.selectedState = index

    }.foregroundColor(self.selectedState

    == index ? .black : .gray)

    ```


    The UI with a selected state should look like Figure [19-4](#497312_1_En_19_Chapter.xhtml#Fig4).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig4_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig4_HTML.jpg)


    Figure 19-4


    UI with a Selected State


    Another option for selecting the state is a `Picker`. We’ll define a picker but
    also add a `NavigationView` to drill down into it.


    1.  Create a `Picker` in the same section as the `ScrollView`.


    ```

    Picker(selection: $selectedState,

    label: Text("State")) {

    ForEach(self.states.indices, id: \.self) {

    Text(self.states[$0])

    }

    }

    ```


    Now the interface looks like Figure [19-5](#497312_1_En_19_Chapter.xhtml#Fig5).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig5_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig5_HTML.jpg)


    Figure 19-5


    UI with Two State Items in the Section


    Notice that the second item in the section has a detail indicator (`>`). However,
    if you tap on this, nothing happens. That’s because we haven’t provided a way
    for the app to navigate.


    Let’s add a `NavigationView` to allow the app to drill down into the state selection.
    To do that, we need to embed our `Form` in a `NavigationView`.


    1.  Add a `NavigationView` above the `Form`.


    1.  Add a closing curly brace after the `Form` and a navigation title for our
    input form.


    ```

    var body: some View {

    NavigationView {

    Form {

    ```


    ```

    }.navigationTitle("Account Details")

    ```


    The row for the State leads to a `List` (table view) when tapped as in Figure
    [19-6](#497312_1_En_19_Chapter.xhtml#Fig6).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig6_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig6_HTML.jpg)


    Figure 19-6


    Second State Selection Option


    We now have a form that allows the user to input values. We have multiple text-based
    values. However, each behaves differently based on their formatters and/or validation.'
  raw: '## Section


    Our form will be broken up into sections. The Section item is good for this. On
    the iOS UI, a Form looks like a List. And a Section looks like a section in a
    table view.


    If you look at Figure [19-1](#497312_1_En_19_Chapter.xhtml#Fig1), you’ll see five
    sections. The section for the state selection has two items that appear together
    in one section.


    A section can be created with a header and/or footer. Otherwise, it’s much like
    a Group or Form: returns a View to display.


    Inside our various sections, we’ll create a UI via elements or other groups of
    UI items in HStack and such.


    ## App Requirements


    Let’s go over a few of the requirements of our app. We’re entering an email address,
    monetary number, and date and making a selection from a list. We want to validate
    the email address, format the number into currency, and format the date.


    We could use a date picker for the date, but we’re going to use a String for input
    but store it as a Date.


    For the email, we can write a validation function in an extension on String. For
    the currency and date fields, we’ll use a number formatter and date formatter,
    respectively. We can create those as computed properties in an extension on each
    class.


    For the selection from the list, we’ll store the selected index in an array. So
    we need a list of values to choose from.


    I’ve provided a starter project for this exercise titled InputForm. It’s in a
    zip file titled Ch19_BOC_InputForm.zip. It contains the extensions we’ll use for
    the formatters and for validating a String as an email (see Figure [19-2](#497312_1_En_19_Chapter.xhtml#Fig2)).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig2_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig2_HTML.jpg)


    Figure 19-2


    Extensions Provided in the BOC Project


    FORM-BASED USER INTERFACE


    Open the InputForm project provided in Ch19_BOC_InputForm.zip. Starting from there,
    we’ll create our user input form.


    1.  In the ContentView struct, define properties for the list of States to choose
    from and where to store the email, selected state, user income, and date of birth.


    **Note** Only a partial list of states is provided here.


    1.  Replace the current body contents with a Form.


    ```

    let states = ["Alabama", "Alaska",

    "American Samoa", "Arizona", "Arkansas",

    "California", "Colorado", "Connecticut",

    "Delaware", "District of Columbia"]

    @State var email = ""

    @State var selectedState = 0

    @State var userIncome = 0.0

    @State var dateOfBirth = Date.distantPast

    ```


    ```

    var body: some View {

    Form {

    }

    }

    ```


    The first Section we’ll add is for entering an email address. The TextField for
    this value will be pretty basic. The property is already defined; we just need
    the TextField.


    1.  Create a Section inside the Form including a TextField with binding to $email.


    ```

    Section {

    TextField("Email", text: $email)

    { (beingEdited) in

    print (beingEdited)

    } onCommit: {

    }

    }

    ```


    The first closure, onEditingChanged, is called when the contents start and end
    editing. The parameter is a boolean for when the textfield contents are being
    edited.


    When the user begins typing in the field, true will be printed. It will print
    false when they tap return.


    The second closure is when the content is committed (i.e., the return key is tapped
    by the user).


    So far, the UI in the Canvas preview should look like Figure [19-3](#497312_1_En_19_Chapter.xhtml#Fig3).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig3_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig3_HTML.jpg)


    Figure 19-3


    UI with an Email TextField


    In the onCommit closure, we can validate the email address.


    1.  Add a check to validate the email entered in the onCommit closure.


    ```

    Section {

    TextField("Email", text: $email)

    { (changed) in

    } onCommit: {

    if email.isValidEmail == false {

    $email.wrappedValue = ""

    }

    }

    }

    ```


    This just clears the textfield if the user enters an invalid email address.


    1.  Set the keyboard and content type to be .emailAddress.


    1.  Create another Section for the income input with the currency formatter provided
    in the NumberFormatter extension.


    ```

    Section {

    TextField("Email", text: $email)

    { (changed) in

    } onCommit: {

    if email.isValidEmail == false {

    $email.wrappedValue = ""

    }

    }

    .keyboardType(.emailAddress)

    .textContentType(.emailAddress)

    }

    ```


    ```

    Section {

    HStack {

    TextField("Income", value: $userIncome,

    formatter: NumberFormatter.currencyFormatter)

    }

    }

    ```


    The formatter will keep the number entered as currency.


    1.  Add a .disabled modifier to the TextField so that it’s only enabled if the
    user has an email address entered.


    1.  Add another Section with a textfield using binding to dateOfBirth and formatter
    of the shortDateFormatter created in the DateFormatter extension.


    ```

    TextField("Income", value: $userIncome,

    formatter: NumberFormatter.currencyFormatter)

    .disabled(self.email.count == 0)

    ```


    ```

    Section {

    TextField("DOB", value: $dateOfBirth,

    formatter: DateFormatter.shortDateFormatter)

    }

    ```


    The formatter, in this case, will take the dateOfBirth property (Date) and convert
    it to a String using the short date format and no time style. When the user enters
    a new value, the formatter will be used to convert that String to a date to store
    back in the dateOfBirth property.


    1.  Add another Section with a horizontal scroll view with an HStack in it. Inside
    the HStack, create Text items for each state in the list.


    ```

    Section {

    ScrollView(.horizontal) {

    HStack(spacing: 40) {

    ForEach(states.indices) { index in

    Text(self.states[index])

    }

    }

    }

    }

    ```


    The HStack has a spacing value of 40 to keep the Text items nicely spaced apart.


    1.  Add a tap gesture to the Text item in the ForEach to set the selectedState
    property.


    ```

    Text(self.states[index])

    .onTapGesture {

    self.selectedState = index

    }

    ```


    Now as the user taps on state names, it updates the property to the corresponding
    array index.


    1.  Change the text color for the selectedState item.


    ```

    Text(self.states[index])

    .onTapGesture {

    self.selectedState = index

    }.foregroundColor(self.selectedState

    == index ? .black : .gray)

    ```


    The UI with a selected state should look like Figure [19-4](#497312_1_En_19_Chapter.xhtml#Fig4).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig4_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig4_HTML.jpg)


    Figure 19-4


    UI with a Selected State


    Another option for selecting the state is a Picker. We’ll define a picker but
    also add a NavigationView to drill down into it.


    1.  Create a Picker in the same section as the ScrollView.


    ```

    Picker(selection: $selectedState,

    label: Text("State")) {

    ForEach(self.states.indices, id: \.self) {

    Text(self.states[$0])

    }

    }

    ```


    Now the interface looks like Figure [19-5](#497312_1_En_19_Chapter.xhtml#Fig5).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig5_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig5_HTML.jpg)


    Figure 19-5


    UI with Two State Items in the Section


    Notice that the second item in the section has a detail indicator (>). However,
    if you tap on this, nothing happens. That’s because we haven’t provided a way
    for the app to navigate.


    Let’s add a NavigationView to allow the app to drill down into the state selection.
    To do that, we need to embed our Form in a NavigationView.


    1.  Add a NavigationView above the Form.


    1.  Add a closing curly brace after the Form and a navigation title for our input
    form.


    ```

    var body: some View {

    NavigationView {

    Form {

    ```


    ```

    }.navigationTitle("Account Details")

    ```


    The row for the State leads to a List (table view) when tapped as in Figure [19-6](#497312_1_En_19_Chapter.xhtml#Fig6).


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig6_HTML.jpg](images/497312_1_En_19_Chapter/497312_1_En_19_Fig6_HTML.jpg)


    Figure 19-6


    Second State Selection Option


    We now have a form that allows the user to input values. We have multiple text-based
    values. However, each behaves differently based on their formatters and/or validation.'
  trans: '

    ## 分区


    我们的表单将分为多个分区。`Section` 项正适合此用途。在 iOS 界面中，`Form` 看起来像 `List`，而 `Section` 则类似表格视图中的分区。


    请参见图 19-1，您会看到五个分区。州选择分区中包含了两个项目，它们在同一分区内共同显示。


    创建分区时可以带有页眉和/或页脚。除此之外，它与 `Group` 或 `Form` 非常相似：返回一个 `View` 用于显示。


    在各个分区内部，我们将通过元素或在 `HStack` 等中的其他 UI 项目组来创建界面。


    ## 应用需求


    我们来梳理一下本应用的一些需求。我们将输入电子邮件地址、金额数字和日期，并从列表中进行选择。我们希望验证电子邮件地址、将数字格式化为货币格式，并对日期进行格式化。


    日期字段我们可以使用日期选择器，但这里我们将用一个 `String` 来输入，同时将其存储为 `Date`。


    对于电子邮件，我们可以在 `String` 的扩展中编写一个验证函数。对于货币和日期字段，我们将分别使用 `NumberFormatter` 和 `DateFormatter`。我们可以在各个类的扩展中将其创建为计算属性。


    对于列表选择，我们将选中的索引存储在一个数组中。因此，我们需要一个可供选择的值列表。


    本次练习我提供了一个名为 `InputForm` 的入门项目。它位于名为 `Ch19_BOC_InputForm.zip` 的压缩文件中。其中包含了我们将用于格式化器和验证
    `String` 是否为电子邮件地址的扩展（见图 19-2）。


    ![../images/497312_1_En_19_Chapter/497312_1_En_19_Fig2_HTML.jpg](img/497312_1_En_19_Fig2_HTML.jpg)


