  trans: "\n# 传递 ObservableObject\n\n你可能还记得，我们曾希望计时器能在 SwiftUI 视图上实时更新。此外，我们还想要一个“开始/暂停”按钮。如果你运行这个应用，会发现计时器并没有在我们新的视图中更新。\n\
    \n在之前的一些练习中，我们使用绑定（binding）来解决这类问题。但我们的 `TimerListVC` 中的模型是 `TimerItem` 实例。如果将其改为某种绑定类型，大量代码都需要修改。\n\
    \n绑定仅适用于值类型（结构体、枚举），而我们的 `TimerItem` 是引用类型（类）。\n\n将 `TimerItem` 改为结构体以实现绑定，可能会对我们的代码产生诸多影响。有些代码可能依赖于通过传递引用来实现变更。\n\
    \n我们将保留其作为类。`ObservableObject` 协议就是为引用类型设计的，因此我们将使用它。\n\n## 使 TimerItem 可观察\n\n\
    为此我们只需进行少量修改。我们需要声明 `TimerItem` 遵循 `ObservableObject` 协议。这样一来，我们可以通过 `@Published`\
    \ 包装器声明要发布的属性。同时，我们需要在代码中告知何时发送变更。\n\n`TimerView` 也需要进行更新，将其属性标记为 `ObservedObject`。我们还可以通过“开始/暂停”按钮来更新界面。\n\
    \n1. 打开 `TimerItem.swift` 文件，声明其实现 `ObservableObject` 协议。\n\n1. 将 `timeString`\
    \ 属性标记为“已发布”。\n\n```\nclass TimerItem : ObservableObject {\n```\n\n1. 在 `start`\
    \ 函数中，在定时器闭包的顶部（例如第 69 行），添加发送函数调用。\n\n```\n@Published var timeString = \"\"\n\
    ```\n\n```\nself.objectWillChange.send()\n```\n\n现在 `TimerItem` 已经是可观察对象了，我们可以在\
    \ `TimerView` 中进行声明。\n\n1. 在 `TimerView` 中，将 `timer` 属性声明为被观察对象。\n\n```\n@ObservedObject\
    \ var timer : TimerItem\n```\n\n至此，计时器的持续时间将在 `TimerView` 中实时更新。不过，你需要在表格视图中启动计时器，然后才能查看其详情。\n\
    \n接下来，我们在 `TimerView` 中添加“开始/暂停”按钮。可以将其放在两个文本项下方。`Button` 需要提供一个操作以及按钮视觉部分显示的内容。\n\
    \n该操作可以检查计时器的 `isRunning` 属性。如果正在运行，则暂停计时器；否则，启动计时器。\n\n对于标签参数，我们可以使用 `Text` 元素。\n\
    \n1. 在 `TimerView` 中，在两个 `Text` 项下方添加一个 `Button`。对于操作，检查 `isRunning` 参数，并根据其状态暂停或启动计时器。对于标签，创建一个\
    \ `Text` 元素。\n\n```\n    Button(action: {\n        if self.timer.isRunning {\n\
    \            self.timer.pause()\n        }\n        else {\n            self.timer.start()\n\
    \        }\n    }) {\n        Text(timer.isRunning ? \"暂停\" : \"开始\")\n    }\n\
    ```\n\n为了稍微美化格式，我们对显示剩余时间的计时器添加几个修饰器。\n\n1. 在第二个文本项（用于 `timer.timeString`）上，添加字体和间距修饰器。\n\
    \n```\n    Text(timer.timeString)\n        .font(.largeTitle)\n        .padding()\n\
    ```\n\n现在查看计时器详情时，我们可以启动/暂停计时器。启动后，可以看到计时器倒计时显示剩余时间，如图 14-10 所示。\n\n![../images/497312_1_En_14_Chapter/497312_1_En_14_Fig10_HTML.jpg](img/497312_1_En_14_Fig10_HTML.jpg)\n\
    \n图 14-10\n\n带按钮和剩余时间的计时器详情界面\n\n请注意，当你点击“暂停”时，它并不会更新为“开始”。你认为这是为什么？`TimerItem`\
    \ 中的 `pause` 函数会使定时器失效。但我们是在定时器的闭包中发布变更。\n\n这可以通过两种方式修复：在 `pause` 函数中发送更新，或者将\
    \ `isRunning` 属性标记为 `@Published`。请尝试这些方法。\n\n为界面添加变更更新的能力并没有花费太多修改。我们需要将 `TimerItem`\
    \ 指定为 `ObservableObject`，然后将 `timeString` 标记为已发布，并调用 `send` 函数。\n\n完成这些修改后，我们只需在\
    \ `TimerView` 中将该属性指定为被观察对象。我们还添加了“开始/暂停”按钮，并为 `Text` 项添加了修饰器。\n\n## 本章小结\n\n\
    在本章中，我们重点探讨了如何在现有的基于 Storyboard 的项目中使用 SwiftUI 视图。提供的 `Hosting View Controller`\
    \ 和转场动作使得这一过程变得简单。\n\n通过将 `Hosting View Controller` 放入 Storyboard 并创建转场，我们在代码中实现了转场动作。该动作会传递一个编码器。我们需要创建\
    \ SwiftUI 视图实例。利用编码器和我们的视图，我们创建了 `Hosting View Controller`，并将其从转场动作中返回。\n\n请注意，我们创建了要返回的视图控制器。这意味着我们可以在一处设置视图或视图控制器的其他属性。无需实现\
    \ `prepare(for:sender:)` 转场函数。\n\n为了让 SwiftUI 能够动态更新，还需要进行一些额外的修改。由于我们的 `TimerItem`\
    \ 是引用类型（类），我们选择使用 `ObservableObject` 协议。\n\n我们声明它实现了该协议，指定了已发布的属性，并在必要时调用 `send`\
    \ 函数。\n\n剩下的工作就是将 `TimerView` 的属性标记为被观察对象。\n\n在本章的第一个练习中，我们发现将 SwiftUI 显示在 UIKit\
    \ 项目中只需极少的工作。第二个练习表明，即使界面更新和交互也不需要太多工作。\n\n这种方法使得现有项目能够无缝受益于新的 SwiftUI 用户界面开发。\n\
    \n# 15. Combine 框架入门\n\n我们其实已经大量使用了 Combine 框架。现在我们将暂时搁置 SwiftUI，更深入地研究一下 Combine。\n\
    \n苹果公司将该框架描述为“一个统一的、声明式的 API，用于随时间处理值”。我想重点强调的是“随时间处理值”这一部分。\n\n我们目前正是这样使用 Combine\
    \ 的。随着值随时间变化，我们的界面也随之更新。我们使用了 `@State`、`@Binding`、`@Published` 等。\n\n在 SwiftUI\
    \ 中使用这些包装器确实促进了界面中的变更反映。但很容易将 Combine 框架的这些方面与 SwiftUI 混淆。\n\nCombine 框架可以在没有\
    \ SwiftUI 的情况下使用。这有助于你现有的应用，即使你不使用 SwiftUI。理解这个框架将全面提升你的应用。此外，它还能为你将来在更新现有应用时添加\
    \ SwiftUI 奠定基础。\n\n## 常见概念\n\n应用的构建基于一个基本概念：向用户显示界面。用户的输入存储在应用中，功能由这些操作和数据驱动。这一点我们都清楚。\n\
    \n因此，将用户的文本输入存储在 `String` 属性中是一种常见的模式。同样，我们可能会在完成某些功能后显示这些数据或其某种版本。\n\n让我们看一个简单的例子。\n\
    \n假设我们有一个基本的界面设计，包含一个文本框和一个标签。我们在视图控制器中创建了它们的输出口。文本框还有一个 `editingChanged` 的动作。该函数会存储输入的文本并将其放入标签中。代码如图\
    \ 15-1 所示。\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig1_HTML.jpg](img/497312_1_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1\n\n使用文本框变更更新标签的基本界面视图控制器代码\n\n如果你运行这个应用，当你输入文本框时，标签会实时更新。让我们看看如何使用 Combine\
    \ 框架的概念来实现这一点。\n"
- fmt: "# Publisher and Subscriber\n\nCombine uses the concepts of publisher and subscriber.\
    \ You may be familiar with the `NotificationCenter`. It can post notifications.\
    \ Any observers added for that notification name get notified by calling the associated\
    \ function.\n\nThe publisher defines its specific output type. The output is the\
    \ value it sends when it publishes. The subscriber defines its specific input\
    \ type. The type it receives from publishers. These types must match. Later, we’ll\
    \ look at ways to map the values when they don’t match.\n\nBoth the publisher\
    \ and subscriber each define a failure type. The failure types must also match\
    \ to set up the relationship.\n\nThere are multiple ways to create a publisher.\
    \ The first one we’ll look at uses the `NotificationCenter`. This is a familiar\
    \ dynamic to many so it’s a good place to start.\n\nOnce we have a publisher,\
    \ we can add a subscriber to it. This will handle the data when it’s published.\n\
    \n## Converting to Combine\n\nThis example won’t necessarily do this more efficiently\
    \ nor will it be less code. It will be more code actually. However, the purpose\
    \ is to take a familiar concept and show how it would work in a new concept.\n\
    \nFirst, we need to import the Combine framework into our code. Then we want to\
    \ get a publisher from the `NotificationCenter`. We are going to subscribe our\
    \ `ViewController` to the updates so it needs to conform to the `Subscriber`.\
    \ It, of course, needs to implement the various requirements.\n\nWithin the implementation\
    \ of the `Subscriber`, we’ll get the new text value entered and update the UI.\n\
    \nI have provided a `Ch15_BOC_CombineFW.zip` file with the starting point of this\
    \ code. It is simply the code discussed earlier in this chapter.\n\n1.  Import\
    \ the Combine framework into the code.\n2.  Get a publisher from the `NotificationCenter`\
    \ in `viewDidLoad`.\n\n```swift\nlet publisher = NotificationCenter\n    .default\n\
    \    .publisher(for:\n        UITextField.textDidChangeNotification,\n       \
    \ object: tf)\n```\n\n```swift\nimport Combine\n```\n\nThis returns a publisher\
    \ for the textfield. It will publish whenever the text changes in that field.\n\
    \n3.  Subscribe the `ViewController` to the publisher. Since we’re updating the\
    \ UI, we want to receive the updates on the main thread.\n\n```swift\npublisher\n\
    \    .receive(on: DispatchQueue.main)\n    .subscribe(self)\n```\n\nAlternatively,\
    \ you could subscribe on the main thread and call `receive` with the subscriber.\
    \ I like the code above because of the clarity: I want to receive on the main\
    \ thread (for the UI) and subscribe the given instance passed in.\n\nAt this point,\
    \ we have the publisher and have subscribed. Sort of. Our `ViewController` doesn’t\
    \ implement a `Subscriber`.\n\n4.  Add `Subscriber` to the declaration.\n\n```swift\n\
    class ViewController: UIViewController, Subscriber {\n```\n\n5.  Use the Fix button\
    \ in the compilation error message to stub out the code. It will likely only add\
    \ the type aliases needed: `Input` and `Failure`.\n\n```swift\ntypealias Input\
    \ = type\ntypealias Failure = type\n```\n\nWe need to know what to set these to.\
    \ If we drill down into the `.publisher` call, we see it returns a `NotificationCenter.Publisher`.\
    \ If we navigate to that (it’s just below the publisher function declaration),\
    \ we see the output is `Notification` and failure is `Never`.\n\nOur `Input` and\
    \ `Failure` need to match those.\n\n```swift\ntypealias Input = Notification\n\
    typealias Failure = Never\n```\n\nWe still have a compile error. If we use the\
    \ Fix button again, it stubs out the functions we need.\n\n6.  Implement the `receive(subscription:)`\
    \ function to specify unlimited updates of the data.\n\n```swift\nfunc receive(subscription:\
    \ Subscription) {\n    subscription.request(.unlimited)\n}\n```\n\n7.  Implement\
    \ the `receive(_:)` input function.\n\n```swift\nfunc receive(_ input: Input)\
    \ -> Subscribers.Demand {\n    if let textField = input.object as? UITextField\
    \ {\n        userText = textField.text\n        lbl.text = userText\n    }\n \
    \   return .unlimited\n}\n```\n\nSince our `Input` type alias specified it is\
    \ a `Notification`, we can use it that way. We’re on the UI thread so updates\
    \ work fine.\n\nReturn `.unlimited` indicating that we want to continue with unlimited\
    \ responses.\n\n8.  Implement the `receive(completion:)` function.\n\n```swift\n\
    func receive(completion:\n    Subscribers.Completion) {\n    print(completion)\n\
    }\n```\n\nThere’s nothing we need to do in our case, but in some cases, you may\
    \ want to finalize something in your app at this point.\n\nAt this point, we have\
    \ our `ViewController` subscribed to the `NotificationCenter` updates for our\
    \ textfield. If we run the app, as we type in the textfield, the label should\
    \ be updated. The UI should look like Figure 15-2.\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig2_HTML.jpg](images/497312_1_En_15_Chapter/497312_1_En_15_Fig2_HTML.jpg)\n\
    \n*Figure 15-2 — TextField Input Set as the Label Text*\n\nAs I’m sure you agree,\
    \ this was more work, code, and complexity than the original solution. But, again,\
    \ this example was to walk us through the concepts of publisher and subscriber\
    \ from the Combine framework. More refinement is coming next.\n\nThe solution\
    \ is stored in `CombineFW-Ex15-1.zip`.\n\n## Refinements\n\nOne easy change we\
    \ could make to our code is to chain the `subscribe` call to the publisher call\
    \ in `viewDidLoad`.\n\n```swift\nNotificationCenter\n    .default\n    .publisher(for:\n\
    \        UITextField.textDidChangeNotification,\n        object: tf)\n    .receive(on:\
    \ DispatchQueue.main)\n    .subscribe(self)\n```\n\nNow we don’t need to store\
    \ the publisher at all. But it gets even better!\n\nCombine provides two subscribers\
    \ we can use instead of our own class. They automatically match the output and\
    \ failure types to the publisher they are attached to. What is this magic? `sink`\
    \ and `assign`.\n\n## Sink Subscriber\n\nThe `sink` subscriber takes two closures.\
    \ The first is called just like our `receive(completion:)` function we wrote.\
    \ The second closure is just like the function we wrote to take the updated value.\
    \ That updated value in our case is a `Notification` instance.\n\n`sink` automatically\
    \ requests unlimited number of updates as we did in our `receive(subscription:)`\
    \ function. And when Combine creates your subscriber, it uses the thread the change\
    \ occurred on. In our case, the change is in the UI so it’s already on the main\
    \ thread.\n\nIf we use `sink`, we can remove the calls to `receive(on:)` and `subscribe`.\
    \ However, `sink` has a return value we need to consider. It returns an `AnyCancellable`.\n\
    \nWe can store this in a class property. We don’t want it to go out of scope and\
    \ get removed from memory. If we want to cancel the subscription, we call `.cancel`\
    \ on this value. Once it’s out of scope, it will get cleaned up, and `.cancel`\
    \ will be called automatically in its `deinit`. Clean.\n\nSo we need a property.\n\
    \n```swift\nvar subscriber: AnyCancellable?\n```\n\nAnd we can use it when we\
    \ create our publisher and subscriber.\n\n```swift\nsubscriber = NotificationCenter\n\
    \    .default\n    .publisher(for:\n        UITextField.textDidChangeNotification,\n\
    \        object: tf)\n    .sink(receiveCompletion: { print($0) })\n    { (notification)\
    \ in\n        if let textField = notification.object\n            as? UITextField\
    \ {\n            self.userText = textField.text\n            self.lbl.text = self.userText\n\
    \        }\n    }\n```\n\nWe get the publisher as we did before. Now we’re calling\
    \ `sink` on it. Our `receiveCompletion` closure just prints out the parameter.\
    \ Our updated value closure does the same as before (but with added `self`-scoping\
    \ for the properties).\n\nBest of all, our `ViewController` doesn’t have to be\
    \ a `Subscriber`, and we can remove all of that code! Suddenly our entire code\
    \ base got a lot smaller as in Figure 15-3 (especially if we remove the connection\
    \ from our textfield in the Storyboard as I have done).\n\n![../images/497312_1_En_15_Chapter/497312_1_En_15_Fig3_HTML.jpg](images/497312_1_En_15_Chapter/497312_1_En_15_Fig3_HTML.jpg)\n\
    \n*Figure 15-3 — ViewController Without Subscriber Protocol and with Sink*\n\n\
    `sink` also has a version that doesn’t take a completion closure. So if you don’t\
    \ need that, your code can get even smaller."
  raw: "## Publisher and Subscriber\n\nCombine uses the concepts of publisher and\
