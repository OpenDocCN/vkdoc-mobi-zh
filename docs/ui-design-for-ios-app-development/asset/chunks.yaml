    `String` 转换回日期并存储到 `dateOfBirth` 属性中。


    1.  再添加一个 `Section`，其中包含一个水平滚动视图，视图内放置一个 `HStack`。在 `HStack` 内部，为列表中的每个州创建 `Text`
