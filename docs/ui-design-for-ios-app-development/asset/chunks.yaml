- fmt: '# Navigation Link


    For modal navigation, we used the `.onTapGesture` modifier. In the related closure,
    we set a state property. That caused the `.sheet` modifier to be called and display
    a View returned from its closure.


    For the `NavigationView`, we’ll create `NavigationLink`s. A `NavigationLink` conforms
    to the `View` protocol. That means we can use it in our `List`. We’ll return `NavigationLink`
    instances instead of `NoteRow`s. And each `NoteRow` will be within the `NavigationLink`.


    The `NavigationLink` initializers allow for various parameters. Particularly,
    they receive the destination and label. The destination is the View to display
    when the item is tapped. In our `ListProject`, we want some details of the selected
    note row to be displayed.


    The label parameter is a closure. The closure returns a View to display as the
    item to be tapped. In our case, that’s the row.


    ## Adding Navigation to ListProject


    This exercise will go through the steps to add navigation to the `ListProject`
    app. The navigation to be added will slide in from the right for details.


    We will use the `NavigationView` and `NavigationLink` in this exercise.


    The first two steps are implementing the items discussed earlier. You may have
    already completed them if you were following along.


    1.  Wrap the existing `List` item in a `NavigationView` (unless you already did
    this by following along earlier).


    1.  Add a Navigation Bar Title modifier to the `List` view (unless you already
    did this by following along earlier).


    ```

    NavigationView {

    List {

    ForEach(items, id: \.id) { (noteVM)   in

    NoteRow(noteVM: noteVM)

    }

    .onDelete { offsets in

    self.items.remove(atOffsets: offsets)

    }

    }

    }

    ```


    1.  Update the Preview and verify it looks similar to Figure 10-5.


    2.  Within the `ForEach` of the `List`, create a `NavigationLink` with a `Text`
    destination and `NoteRow` returned from the label closure.


    ```

    NavigationView {

    List {

    ForEach(items, id: \.id) { (noteVM)   in

    NoteRow(noteVM: noteVM)

    }

    .onDelete { offsets in

    self.items.remove(atOffsets: offsets)

    }

    }.navigationTitle("Notes")

    }

    ```


    ![../images/497312_1_En_10_Chapter/497312_1_En_10_Fig6_HTML.jpg](images/497312_1_En_10_Chapter/497312_1_En_10_Fig6_HTML.jpg)


    Figure 10-6: Navigation Within the App


    1.  Run (simulator, device, or Live mode) the app and verify tapping on an item
    displays the details as in Figure 10-6.


    ```

    NavigationLink(destination: Text(noteVM.text)) {

    NoteRow(noteVM: noteVM)

    }

    ```


    Notice that the navigation automatically includes the back button. And that the
    back button is titled the same as the navigation bar title.


    As you’d expect, tapping the back button returns to the previous view.


    This exercise shows how quickly and easily you can add navigation from a `List`
    (or other Views) to an app.


    ## Chapter Summary


    In this chapter, we looked at two common ways to navigate in an app. For modal
    navigation, we used the `.sheet` modifier. We added this modifier to the View
    our body parameter returned.


    The `.sheet` modifier is given a binding to a property to determine when to display.
    We used a `@State` property wrapper for a note view model to set this condition.


    To determine when a user tapped a row, we used the `.onTapGesture` modifier on
    each row. This provides the means to redisplay the UI and provide the necessary
    data to the `.sheet` closure.


    For the hierarchy/drill-down style of navigation with a stack of views, we used
    the `NavigationView`. The contained view in the `NavigationView` uses the `.navigationTitle`
    modifier to set the title of the View.


    The `NavigationView` provides the means of navigation. The `NavigationLink` provides
    the user interaction capabilities. A `List` item’s `ForEach` creates the Views
    for the rows. `NavigationLink` also implements a View and can be used as the row
    items.


    A `NavigationLink` needs to know what label (View) to display for the user tap.
    It also needs a destination (View) it will display when tapped. We used our `NoteRow`
    as the tappable area. When tapped, we provided a `Text` item of the note text
    to display.


    We provided a simple View (i.e., `Text`) as the destination. Of course, more useful
    and interesting Views can be used instead.


    # UIKit in SwiftUI


    There will likely be times for various reasons you’ll want to use UIKit in your
    SwiftUI app. No problem.


    You may have an existing UI you need to use. Maybe you don’t have time to update
    or just don’t want to update it. Whether it’s an existing View or your custom
    view, it can be done. Plus, any existing constraints are respected.


    In this chapter, we’ll look at incorporating existing UIKit classes into SwiftUI.
    This has been considered already for you. It’s not a hack or even discouraged.


    There’s a bit of work to do, but the steps have already been laid out for you.


    ## `UIViewRepresentable`


    SwiftUI provides a protocol specifically for including `UIView` instances into
    your code. Basically, we’re going to create a View struct that returns a `UIView`
    class.


    The `UIViewRepresentable` protocol inherits from `View`. However, it specifies
    it to be a View that doesn’t implement the `body` computed property. So it’s a
    View but not like we’ve seen before.


    Instead the protocol defines a function to be implemented. The `makeUIView` function
    incorporates UIKit classes into SwiftUI needs to return a `UIView`. Simple.


    It’s also passed in a Context for any values you might need to retrieve.


    When the state changes and it’s time to update the UI, there’s another function:
    `updateUIView`. This function is called when there are changes in any bindings.
    In the function code, you will update the UI programmatically based on the changes.


    Optionally, you can implement the `dismantleUIView`. This is called when the memory
    is being cleaned up. If you need to do any last-minute actions as the `UIView`
    is being removed, this is your chance.


    Instead of displaying the note’s text when tapping on a row, we’ll display the
    note details.


    If you are working on macOS, the comparable protocol is `NSViewRepresentable`.
    Similarly, WatchKit views can be used with `WKInterfaceObjectRepresentable`.'
