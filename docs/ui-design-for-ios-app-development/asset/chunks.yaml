    settings that might be in place for the user.


    Let’s put a lot of these to work together in our NoteRow View.


    TEXT SIZES IN NOTEROW


    In this exercise, we’re going to add a ForEach to the NoteRow to see its preview
    with each of the content size category values.


    1.  Add a ForEach to the NoteRow_Previews:


    1.  Set the closure parameter to be sizeCat:


    ```

    ForEach(ContentSizeCategory.allCases,

    id: \.self) {

    }

    ```


    1.  Inside the closure, create the NoteRow:


    ```

    ForEach(ContentSizeCategory.allCases,

    id: \.self) { sizeCat in

    }

    ```


    1.  Add the .previewLayout with .sizeThatFits for the NoteRow:


    ```

    ForEach(ContentSizeCategory.allCases,

    id: \.self) { sizeCat in

    NoteRow(note: Note(), df: dateFormatter)

    }

    ```


    1.  Add the environment setting for the .sizeCategory key path using the sizeCat
    parameter:


    ```

    NoteRow(note: Note(), df: dateFormatter)

    .previewLayout(.sizeThatFits)

    ```


    ```

    NoteRow(note: Note(), df: dateFormatter)

    .previewLayout(.sizeThatFits)

    .environment(\.sizeCategory, sizeCat)

    ```


    Update the preview to make sure several NoteRows are displayed – one for each
    size category.


    Let’s take it one step further and distinguish each item in the Canvas with a
    display name.


    1.  Chain a call to .previewDisplayName and pass in the sizeCat again.


    ```

    .previewDisplayName("\(sizeCat)")

    ```


    A partial version of the display is in Figure [8-8](#497312_1_En_8_Chapter.xhtml#Fig8).


    ![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig8_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig8_HTML.jpg)


    Figure 8-8


    NoteRow with Various Text Sizes


    We’ve isolated one UI element that can be used across our app. By using modifiers
    in the preview element, we can see a variety of ways it could be displayed.


    ## Pin Preview


    From all of these options, we may want to make some changes. If possible, you
    want to make your UI look great in all cases. That may require changes to the
    NoteRow or the ContentView.


    Often, it’s helpful to see the NoteRow changes while viewing the ContentView preview
    in the Canvas. This can be done by pinning the preview.


    To pin the preview, have the preview up you want to remain in the Canvas. Then
    click the “Pin Preview” button on the bottom left of the Canvas as in Figure [8-9](#497312_1_En_8_Chapter.xhtml#Fig9).


    ![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig9_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig9_HTML.jpg)


    Figure 8-9


    Pin Preview Button


    When a preview is pinned, the icon will be blue (or whatever color you have set
    for your macOS system highlight color). You can unpin the preview, even from other
    previews, by clicking it again.


    This will cause the ContentView preview to remain at the top of the Canvas as
    you navigate to other View elements. As you make changes to your NoteRow, you
    will see how it looks both as the NoteRow and within the ContentView List.


    If I change my updatedAtTime text to have a font modifier for .thin, I can see
    it as it will appear in the ContentView List as in Figure [8-10](#497312_1_En_8_Chapter.xhtml#Fig10).


    ![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig10_HTML.jpg](images/497312_1_En_8_Chapter/497312_1_En_8_Fig10_HTML.jpg)


    Figure 8-10


    NoteRow Updated in the ContentView Preview


    ```

    Text(df.string(from: note.updatedAtTime))

    .fontWeight(.thin)

    ```


    ## Chapter Summary


    In this chapter, we’ve seen how a preview item is created for our various View
    items. Using modifiers can allow us to see how the UI will display in different
    devices, environments, and layouts.


    We also used ForEach to show a variety of previews for our item in the Canvas.
    This can greatly speed up development by avoiding time in builds, installs, execution,
    and navigation to check the user interface. With a small amount of code, you can
    see your UI with different color schemes, text sizes, locales, and more.


    By passing in data, a Note instance, to our NoteRow, we provided the data to the
    row. However, it was the same data each time. Next, we’ll look at using Preview
    Content and other tools to use more realistic data.'
  trans: "\n# 预览布局\n\n当您处理一个仅占屏幕一部分的视图时，您只会希望看到这部分内容。在我们的例子中，`NoteRow` 在画布中并不需要整个设备的屏幕。同时显示多个设备也没有帮助。\n\
    \n在这些情况下，使用 `.previewLayout` 修改器效果可能更好。您可能不仅不希望看到多个设备版本，甚至可能根本不需要设备。\n\n我们的 `NoteRow`\
    \ 就是一个很好的例子。我们实际上并不需要看到整个设备（或多个设备）才能了解 `NoteRow` 的外观。\n\n我修改了 `NoteRow_Previews`\
    \ 的代码，为 `DateFormatter` 添加了一个静态计算属性。\n\n```\nstatic var dateFormatter : DateFormatter\
    \ {\nlet df = DateFormatter()\ndf.dateStyle = .none\ndf.timeStyle = .medium\n\
    return df\n}\n```\n\n现在，我的预览在创建 `NoteRow` 时可以传入这个新属性。我在 `NoteRow_Previews` 中的预览只需返回：\n\
    \n```\nNoteRow(note: Note(),\ndf: dateFormatter)\n```\n\nUI 看起来如图 8-4 所示。对于一个列表中的行来说，这显得有点多余。让我们使用\
    \ `.previewLayout` 来使其更合理，并更精确地符合我们的设计。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig4_HTML.jpg](img/497312_1_En_8_Fig4_HTML.jpg)\n\
    \n**图 8-4** 预览中的 NoteRow\n\n在预览属性中创建 `NoteRow` 之后，我们将调用 `.previewLayout`，并选择其三个参数选项之一，如图\
    \ 8-5 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig5_HTML.jpg](img/497312_1_En_8_Fig5_HTML.jpg)\n\
    \n**图 8-5** 预览布局自动补全选项\n\n如您所见，当选择了设备选项时，描述说明它将在预览中居中显示在设备上。这基本上就是我们一直以来的效果。如果您深入查看\
    \ `.previewDevice`，可以看到支持的设备列表，例如：\n\n```\n/// \"iPhone 7\"\n/// \"iPhone 7 Plus\"\
    \n/// \"iPhone 8\"\n/// \"iPhone 8 Plus\"\n/// \"iPhone SE\"\n/// \"iPhone X\"\
    \n/// \"iPhone Xs\"\n/// \"iPhone Xs Max\"\n/// \"iPhone Xʀ\"\n/// \"iPad mini\
    \ 4\"\n/// \"iPad Air 2\"\n/// \"iPad Pro (9.7-inch)\"\n```\n\n固定选项（fixed）需要指定宽度和高度。这对于为您的项目指定具体的宽度和高度非常有用。如果您知道正在设计的元素将是固定大小，那么这是您按实际大小预览它的方法。\n\
    \n如果我设置宽度为 200、高度为 80，我的 `NoteRow` 将如图 8-6 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig6_HTML.jpg](img/497312_1_En_8_Fig6_HTML.jpg)\n\
    \n**图 8-6** 固定宽度和高度的 NoteRow\n\n```\nNoteRow(note: Note(), df: dateFormatter)\n\
    .previewLayout(.fixed(width: 200, height: 80))\n```\n\n实际上，我可能希望它更宽一些，但您明白我的意思。我可以给它一个更大的宽度并继续设计。我会选择一种有助于我将其视为列表元素的外观。\n\
    \n这个尺寸的一个特定问题是 `Spacer` 没有太大作用。我无法判断它会扩展并对设计产生更大影响。\n\n另一个选项是 `PreviewLayout`\
    \ 的 `sizeThatFits` 值。当然，这个选项会让预览使用创建视图所需的尺寸。\n\n```\nNoteRow(note: Note(), df:\
    \ dateFormatter)\n.previewLayout(.sizeThatFits)\n```\n\n如果我使用这个选项，UI 预览看起来如图 8-7\
    \ 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig7_HTML.jpg](img/497312_1_En_8_Fig7_HTML.jpg)\n\
    \n**图 8-7** 使用 sizeThatFits 的预览布局\n\n您可能想知道它是如何确定宽度的。我们有一个 `Spacer`，所以理论上宽度可以是任何尺寸。它使用了我们选择的模拟器。如果我们为运行目标选择\
    \ iPad，`NoteRow` 将会宽得多。\n\n而 `.environment` 修改器允许我们指定用户可能使用的环境设置的其他变体。\n\n让我们在我们的\
    \ `NoteRow` 视图中将这些功能结合起来使用。\n\n## NoteRow 中的文本大小\n\n在本练习中，我们将在 `NoteRow` 中添加一个\
    \ `ForEach`，以便查看它在每个内容大小类别值下的预览。\n\n1.  在 `NoteRow_Previews` 中添加一个 `ForEach`：\n\
    \n    1.  将闭包参数设置为 `sizeCat`：\n\n```\nForEach(ContentSizeCategory.allCases,\n\
    id: \\.self) {\n}\n```\n\n    1.  在闭包内部，创建 `NoteRow`：\n\n```\nForEach(ContentSizeCategory.allCases,\n\
    id: \\.self) { sizeCat in\n}\n```\n\n    1.  为 `NoteRow` 添加 `.previewLayout` 并设置为\
    \ `.sizeThatFits`：\n\n```\nForEach(ContentSizeCategory.allCases,\nid: \\.self)\
    \ { sizeCat in\nNoteRow(note: Note(), df: dateFormatter)\n}\n```\n\n    1.  使用\
    \ `sizeCat` 参数为 `.sizeCategory` 键路径添加环境设置：\n\n```\nNoteRow(note: Note(), df: dateFormatter)\n\
    .previewLayout(.sizeThatFits)\n```\n\n```\nNoteRow(note: Note(), df: dateFormatter)\n\
    .previewLayout(.sizeThatFits)\n.environment(\\.sizeCategory, sizeCat)\n```\n\n\
    更新预览以确保显示多个 `NoteRow` —— 每个大小类别各一个。\n\n让我们更进一步，为画布中的每个项添加一个显示名称来区分它们。\n\n1.  链式调用\
    \ `.previewDisplayName`，并再次传入 `sizeCat`。\n\n```\n.previewDisplayName(\"\\(sizeCat)\"\
    )\n```\n\n部分显示效果如图 8-8 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig8_HTML.jpg](img/497312_1_En_8_Fig8_HTML.jpg)\n\
    \n**图 8-8** 具有各种文本大小的 NoteRow\n\n我们已经隔离了一个可以在整个应用中使用的 UI 元素。通过在预览元素中使用修改器，我们可以看到多种显示方式。\n\
    \n## 固定预览\n\n从所有这些选项中，我们可能想要做一些更改。如果可能，您希望在所有情况下都让 UI 看起来很棒。这可能需要对 `NoteRow` 或\
    \ `ContentView` 进行修改。\n\n通常，在画布中查看 `ContentView` 预览的同时看到 `NoteRow` 的变化会很有帮助。这可以通过固定预览来实现。\n\
    \n要固定预览，请在画布中保持想要保留的预览。然后点击画布左下角的“固定预览”按钮，如图 8-9 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig9_HTML.jpg](img/497312_1_En_8_Fig9_HTML.jpg)\n\
    \n**图 8-9** 固定预览按钮\n\n当预览被固定时，图标会变为蓝色（或您为 macOS 系统高亮色设置的任何颜色）。您可以通过再次点击来取消固定预览，即使是在其他预览中也可以。\n\
    \n这将导致在您导航到其他视图元素时，`ContentView` 预览会保持在画布顶部。当您对 `NoteRow` 进行更改时，您将看到它在 `NoteRow`\
    \ 本身以及 `ContentView` 列表中的外观。\n\n如果我更改 `updatedAtTime` 文本，为其添加 `.thin` 字体修改器，我可以看到它在\
    \ `ContentView` 列表中的显示效果，如图 8-10 所示。\n\n![../images/497312_1_En_8_Chapter/497312_1_En_8_Fig10_HTML.jpg](img/497312_1_En_8_Fig10_HTML.jpg)\n\
    \n**图 8-10** ContentView 预览中更新后的 NoteRow\n\n```\nText(df.string(from: note.updatedAtTime))\n\
    .fontWeight(.thin)\n```\n\n## 章节总结\n\n在本章中，我们了解了如何为各种视图项创建预览项。使用修改器可以让我们看到 UI\
    \ 在不同设备、环境和布局中的显示效果。\n\n我们还使用了 `ForEach` 来为画布中的项展示多种预览。这可以通过避免在构建、安装、运行和导航检查用户界面上花费时间，大大加快开发速度。只需少量代码，您就可以看到\
    \ UI 在不同配色方案、文本大小、区域设置等下的效果。\n\n通过将数据（一个 `Note` 实例）传递给我们的 `NoteRow`，我们为行提供了数据。然而，每次传入的都是相同的数据。接下来，我们将研究如何使用预览内容（Preview\
    \ Content）和其他工具来使用更真实的数据。\n"
- fmt: "# Design for Previews\n\nThe `Canvas` is a powerful tool when designing the\
    \ UI of your app. However, it’s more than that. Since the previews shown in the\
    \ `Canvas` are the actual user interface, it shouldn’t be considered just a “preview”\
    \ in the typical sense. Similarly, since it runs related code, it shouldn’t be\
    \ considered just the UI.\n\nPreviews in the `Canvas` are closer to the simulator\
    \ than the past. With `Interface Builder`, the UI was just the design of the interface.\
    \ And the Preview of the past was a fairly lifeless rendering of that interface.\n\
    \nJust as the user interface design has been changed into code in `SwiftUI`, the\
    \ `Canvas` brings the simulator into the development. This not only changes how\
    \ you develop the visual elements of your app. It should change how you approach\
    \ the organization of your code.\n\nWe need to consider the previews in developing\
    \ our code to take full advantage of the power of previews.\n\n## Preview Content\n\
    \nSo far in our app, we’ve been using default data. Our preview reflects this\
    \ limitation. Wouldn’t it be better to use more realistic data? But we may not\
    \ have access to a database or server API yet. Even if we did, would we want to\
    \ use those for every rendering of the UI in the `Canvas`? Probably not.\n\n`SwiftUI`\
    \ provides a group in new projects called “Preview Content” (see Figure [9-1](#497312_1_En_9_Chapter.xhtml#Fig1)).\n\
    \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig1_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig1_HTML.jpg)\n\
    \nFigure 9-1: `Preview Content` Group in a Project\n\n> **Note**:  \n> This group\
    \ is not there for multiplatform projects.\n\nThe `Preview Content` group has\
    \ an assets catalog already created in it. You can put images to use in previews\
    \ in this catalog. You can put other preview-related files in the `Preview Content`\
    \ to be used for previews as well.\n\nBy default, this group is not included in\
    \ `Debug` and `Release` builds per the Build Settings (see Figure [9-2](#497312_1_En_9_Chapter.xhtml#Fig2)).\n\
    \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig2_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2: Build Settings for Development Assets\n\nNotice that it’s the `Preview\
    \ Content` group that is listed to be excluded. So anything you add under that\
    \ group (e.g., files, other groups, more assets catalogs) won’t be included in\
    \ your builds for testers or release.\n\n## Preview JSON\n\nA great way to simulate\
    \ data (especially from an API) is with a JSON file. We can add a JSON file to\
    \ our `Preview Content` for our previews. Then we know we have readily available\
    \ data to build our previews with, and it will be automatically excluded from\
    \ our builds.\n\nHere’s some JSON data that we can use for our notes:\n\n```json\n\
    [\n{\n  \"id\": \"FAF80C6A-F1C3-44D9-9539-D6113777520C\",\n  \"text\": \"I'm note\
    \ 0\",\n  \"updatedAtTime\": 1000,\n  \"priority\": 2,\n  \"image\": \"note1\"\
    ,\n  \"dueDate\": 1598923198\n},\n{\n  \"id\": \"FAF80C6A-F1C3-44D9-9539-D6113777520B\"\
    ,\n  \"text\": \"I'm note 1\",\n  \"updatedAtTime\": 2000,\n  \"priority\": 1,\n\
    \  \"image\": \"note2\",\n  \"dueDate\": 620606310\n}\n]\n```\n\nYou may notice\
    \ that there’s some fields in there that we don’t have in our current `Note` class.\
    \ The additional fields are `image` and `dueDate`.\n\nThese items weren’t used\
    \ in our UI so we didn’t need them, but now we’re going to add them. So we can\
    \ create this as a text file and add it to our project or create it with the “New\
    \ File…” menu option from right-clicking `Preview Content` (in this case, select\
    \ an Empty File). I’ve named mine `Data.json`.\n\n## Model\n\nWe need to change\
    \ our model just a bit to reflect these additions. We need to add an `image` property\
    \ of type `String` and `dueDate` as a `Date`.\n\nWe can initialize them as empty\
    \ string (`\"\"`) and a distant future date (`Date.distantFuture`).\n\nWhile we’re\
    \ here, let’s also delete the `CreateTestNotes` function as in Figure [9-3](#497312_1_En_9_Chapter.xhtml#Fig3).\
    \ We’re going to load the test notes differently going forward.\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig3_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig3_HTML.jpg)\n\
    \nFigure 9-3: `Note` Class as the Model\n\nSince we’re going to load the instances\
    \ of `Note` objects based on the JSON file, we want them to conform to the `Codable`\
    \ protocol. The property names and JSON field names match already so we just need\
    \ to specify that in the declaration.\n\nOur `Priority` enumeration also needs\
    \ to be `Codable` by simply adding the protocol to the declaration:\n\n```swift\n\
    enum Priority : Int, Codable\n```\n\nOf course, the `isPastDue` property is computed.\
    \ It’s not in the JSON and won’t be parsed from the data file.\n\nOur model now\
    \ focuses on just the data. We’re trying to separate out our model and view a\
    \ bit more. This will allow us to isolate the model, the view, and the data to\
    \ display: view model.\n\nWhile we’re in the enum, let’s add an implementation\
    \ for the `CaseIterable` protocol. The protocol gives us access to the enum values\
    \ in an array property called `allCases`. We can use that to return the max value\
    \ of the enum.\n\n```swift\nenum Priority : Int, Codable, CaseIterable {\n   \
    \ case low, medium, high\n    static var max : Int {\n        Priority.init(rawValue:\n\
    \            Priority.allCases.count - 1)!\n            .rawValue\n    }\n}\n\
    ```"
  raw: '# 9. Design for Previews


    The Canvas is a powerful tool when designing the UI of your app. However, it’s
    more than that. Since the previews shown in the Canvas are the actual user interface,
    it shouldn’t be considered just a “preview” in the typical sense. Similarly, since
    it runs related code, it shouldn’t be considered just the UI.


    Previews in the Canvas are closer to the simulator than the past. With Interface
    Builder, the UI was just the design of the interface. And the Preview of the past
    was a fairly lifeless rendering of that interface.


    Just as the user interface design has been changed into code in SwiftUI, the Canvas
    brings the simulator into the development. This not only changes how you develop
    the visual elements of your app. It should change how you approach the organization
    of your code.


    We need to consider the previews in developing our code to take full advantage
    of the power of previews.


    ## Preview Content


    So far in our app, we’ve been using default data. Our preview reflects this limitation.
    Wouldn’t it be better to use more realistic data? But we may not have access to
    a database or server API yet. Even if we did, would we want to use those for every
    rendering of the UI in the Canvas? Probably not.


    SwiftUI provides a group in new projects called “Preview Content” (see Figure
    [9-1](#497312_1_En_9_Chapter.xhtml#Fig1)).


    ![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig1_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Preview Content Group in a Project


    Note


    This group is not there for multiplatform projects.


    The Preview Content group has an assets catalog already created in it. You can
    put images to use in previews in this catalog. You can put other preview-related
    files in the Preview Content to be used for previews as well.


    By default, this group is not included in Debug and Release builds per the Build
    Settings (see Figure [9-2](#497312_1_En_9_Chapter.xhtml#Fig2)).


    ![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig2_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Build Settings for Development Assets


    Notice that it’s the “Preview Content” group that is listed to be excluded. So
    anything you add under that group (e.g., files, other groups, more assets catalogs)
    won’t be included in your builds for testers or release.


    ## Preview JSON


    A great way to simulate data (especially from an API) is with a JSON file. We
    can add a JSON file to our Preview Content for our previews. Then we know we have
    readily available data to build our previews with, and it will be automatically
    excluded from our builds.


    Here’s some JSON data that we can use for our notes:


    ```

    [

    {

    "id": "FAF80C6A-F1C3-44D9-9539-D6113777520C",

    "text": "I''m note 0", "updatedAtTime": 1000,

    "priority": 2,

    "image": "note1",

    "dueDate": 1598923198

    },

    {

    "id": "FAF80C6A-F1C3-44D9-9539-D6113777520B",

    "text": "I''m note 1",

    "updatedAtTime": 2000,

    "priority": 1,

    "image": "note2",

    "dueDate": 620606310

    }

    ]

    ```


    You may notice that there’s some fields in there that we don’t have in our current
    Note class. The additional fields are image and dueDate.


    These items weren’t used in our UI so we didn’t need them, but now we’re going
    to add them. So we can create this as a text file and add it to our project or
    create it with the “New File…” menu option from right-clicking Preview Content
    (in this case, select an Empty File). I’ve named mine Data.json.


    ## Model


    We need to change our model just a bit to reflect these additions. We need to
    add an image property of type String and dueDate as a Date.


    We can initialize them as empty string (“”) and a distant future date (Date.distantFuture).


    While we’re here, let’s also delete the CreateTestNotes function as in Figure
    [9-3](#497312_1_En_9_Chapter.xhtml#Fig3). We’re going to load the test notes differently
    going forward.


    ![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig3_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Note Class as the Model


    Since we’re going to load the instances of Note objects based on the JSON file,
    we want them to conform to the Codable protocol. The property names and JSON field
    names match already so we just need to specify that in the declaration.


    Our Priority enumeration also needs to be Codable by simply adding the protocol
    to the declaration:


    ```

    enum Priority : Int, Codable

    ```


    Of course, the isPastDue property is computed. It’s not in the JSON and won’t
    be parsed from the data file.


    Our model now focuses on just the data. We’re trying to separate out our model
    and view a bit more. This will allow us to isolate the model, the view, and the
    data to display: view model.


    While we’re in the enum, let’s add an implementation for the CaseIterable protocol
    . The protocol gives us access to the enum values in an array property called
    allCases. We can use that to return the max value of the enum.


    ```

    enum Priority : Int, Codable, CaseIterable {

    case low, medium, high

    static var max : Int {

    Priority.init(rawValue:

    Priority.allCases.count - 1)!

    .rawValue

    }

    }

    ```'
  trans: "\n# 为预览而设计\n\n`Canvas` 是设计应用用户界面时的强大工具。然而，它的功能远不止于此。由于 `Canvas` 中显示的预览就是实际的用户界面，因此不应将其视为传统意义上的“预览”。同样地，由于它运行相关代码，也不应仅将其视为用户界面。\n\
    \n`Canvas` 中的预览比过去的模拟器更接近真实状态。过去使用 `Interface Builder` 时，用户界面仅仅是界面的设计稿，而以往的预览也只是一个毫无生命力的界面呈现。\n\
    \n正如在 `SwiftUI` 中用户界面设计已被转化为代码一样，`Canvas` 将模拟器引入了开发流程。这不仅改变了你开发应用视觉元素的方式，更应改变你组织代码的思维方式。\n\
    \n我们需要在开发代码时充分考虑预览功能，才能充分发挥预览的强大能力。\n\n## 预览内容\n\n迄今为止，在我们的应用中一直在使用默认数据。我们的预览也体现了这一局限性。如果使用更真实的数据，效果不是更好吗？但我们现在可能还无法访问数据库或服务器\
    \ API。即便能访问，我们真的希望在 `Canvas` 中每次渲染界面时都使用这些数据吗？答案很可能是否定的。\n\n`SwiftUI` 在新项目中提供了一个名为“Preview\
    \ Content”的组（见图 9-1）。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig1_HTML.jpg](img/497312_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1：项目中的 `Preview Content` 组\n\n> **注意**：  \n> 对于多平台项目，不存在此组。\n\n`Preview\
    \ Content` 组内已创建了一个素材目录。你可以将用于预览的图片放入此目录。也可以将其他与预览相关的文件放入 `Preview Content` 中供预览使用。\n\
    \n默认情况下，根据构建设置，此组不会包含在 `Debug` 和 `Release` 构建中（见图 9-2）。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig2_HTML.jpg](img/497312_1_En_9_Fig2_HTML.jpg)\n\
    \n图 9-2：开发资源的构建设置\n\n注意，被排除构建的是 `Preview Content` 组。因此，你在该组下添加的任何内容（例如文件、其他组、更多素材目录）都不会包含在测试版或发布版的构建中。\n\
    \n## 预览 JSON\n\n模拟数据（尤其是来自 API 的数据）的一个好方法是使用 JSON 文件。我们可以向 `Preview Content` 中添加一个\
    \ JSON 文件供预览使用。这样我们就拥有了随时可用的数据来构建预览，并且这些数据会自动从构建中排除。\n\n以下是一些可用于我们笔记的 JSON 数据：\n\
    \n```json\n[\n{\n  \"id\": \"FAF80C6A-F1C3-44D9-9539-D6113777520C\",\n  \"text\"\
    : \"我是笔记 0\",\n  \"updatedAtTime\": 1000,\n  \"priority\": 2,\n  \"image\": \"\
    note1\",\n  \"dueDate\": 1598923198\n},\n{\n  \"id\": \"FAF80C6A-F1C3-44D9-9539-D6113777520B\"\
    ,\n  \"text\": \"我是笔记 1\",\n  \"updatedAtTime\": 2000,\n  \"priority\": 1,\n \
    \ \"image\": \"note2\",\n  \"dueDate\": 620606310\n}\n]\n```\n\n你可能注意到，其中有一些字段是我们当前的\
    \ `Note` 类中没有的。新增的字段是 `image` 和 `dueDate`。\n\n这些字段之前未被用于我们的界面，因此我们不需要它们，但现在我们要将它们添加进来。我们可以将其创建为文本文件并添加到项目中，或者通过右键点击\
    \ `Preview Content` 选择“New File…”菜单选项来创建（此例中选择 Empty File）。我将其命名为 `Data.json`。\n\
    \n## 模型\n\n我们需要对模型稍作修改以反映这些新增内容。我们需要添加一个 `String` 类型的 `image` 属性和一个 `Date` 类型的\
    \ `dueDate` 属性。\n\n我们可以将它们初始化为空字符串（`\"\"`）和一个遥远的未来日期（`Date.distantFuture`）。\n\n\
    趁此机会，我们还可以删除 `CreateTestNotes` 函数，如图 9-3 所示。接下来我们将以不同的方式加载测试笔记。\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig3_HTML.jpg](img/497312_1_En_9_Fig3_HTML.jpg)\n\
    \n图 9-3：作为模型的 `Note` 类\n\n由于我们要根据 JSON 文件加载 `Note` 对象的实例，我们需要让它们遵循 `Codable` 协议。属性名称与\
    \ JSON 字段名称已经匹配，因此我们只需在声明中指定即可。\n\n我们的 `Priority` 枚举也需要通过简单地向声明中添加协议来使其遵循 `Codable`：\n\
    \n```swift\nenum Priority : Int, Codable\n```\n\n当然，`isPastDue` 属性是计算属性。它不在 JSON\
    \ 中，也不会从数据文件中解析。\n\n现在我们的模型只关注数据。我们正在尝试将模型和视图进一步分离。这将使我们能够隔离模型、视图以及要显示的数据：即视图模型。\n\
    \n在处理枚举时，让我们为其添加 `CaseIterable` 协议的实现。该协议使我们能够通过名为 `allCases` 的数组属性访问枚举的各个值。我们可以用它来返回枚举的最大值。\n\
    \n```swift\nenum Priority : Int, Codable, CaseIterable {\n    case low, medium,\
    \ high\n    static var max : Int {\n        Priority.init(rawValue:\n        \
    \    Priority.allCases.count - 1)!\n            .rawValue\n    }\n}\n```\n"
- fmt: "# View Model\n\nThe view model is where we will have the data in the model\
    \ mapped to the data to display. For example, our priority is an enumeration mapping\
    \ to 0, 1, and 2 for low, medium, and high, respectively. But visually we want\
    \ to display those as star and circle images. Our view model will do that mapping.\n\
    \nOur new `NoteViewModel` class will have properties related to the `Note` (model)\
    \ class. These properties will effectively define the mapping of the model data\
    \ to the view. For example, instead of a priority property, we have a `priorityImages`\
    \ property. It’s an array of strings representing the names of the images for\
    \ the UI to display.\n\nAlso, since the view model is responsible for mapping\
    \ the various values, this is now where we can store the `DateFormatter`. These\
    \ properties are defined as in Figure [9-4](#497312_1_En_9_Chapter.xhtml#Fig4).\n\
    \n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig4_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4\n\n`NoteViewModel` as the View Model Class\n\nWe will be iterating\
    \ over an array of `NoteViewModel` instances so it conforms to the `Identifiable`\
    \ protocol and has an `id` property of a UUID string.\n\nNotice the `renderingColor`.\
    \ We will set this value based on the `isPastDue` value from the note. The default\
    \ rendering color is `UIColor.label`. This is to make the rendering dark for light\
    \ mode and vice versa.\n\nClearly, a `Note` instance will need to be passed into\
    \ an initializer for `NoteViewModel`:\n\n```\ninit(model : Note) {\n    text =\
    \ model.text\n    time = NoteViewModel.dateFormatter.string(from: model.updatedAtTime)\n\
    \    renderingColor = model.isPastDue ? Color.red : renderingColor\n    imageName\
    \ = model.image\n    priorityImages = Array(repeating: \"star.circle\", count:\
    \ model.priority.rawValue + 1)\n    priorityImages += Array(repeating: \"circle\"\
    , count: Priority.max – model.priority.rawValue)\n}\n```\n\nOur initializer stores\
    \ the `text` from the model (`Note`) passed in. It then formats and sets the `time`\
    \ property based on the `updatedAtTime` from the `Note`.\n\nThe `renderingColor`\
    \ is based off of the `isPastDue` value. It’s red if it’s past the due date. Otherwise,\
    \ it uses the existing, default color.\n\nThe image value is stored in the `imageName`\
    \ property.\n\nFor the `priorityImages`, we want to repeat the `star.circle` image\
    \ as many times as the raw value of the priority plus one. So for low priority\
    \ (0), we want one star. Then we fill in the rest (max – priority raw value) with\
    \ circles.\n\nThe last thing our view model needs is a way to load the JSON data.\
    \ We could do this in other places in the code, but since our goal is to generate\
    \ test `NoteViewModel` instances, I’d like to put it in the `NoteViewModel` class\
    \ as in Figure [9-5](#497312_1_En_9_Chapter.xhtml#Fig5).\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig5_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5\n\nLoading Test Data into View Model Instances\n\nSimilarly, all\
    \ of these classes, structs, and enums could be organized in other files. You\
    \ may want your model classes in their own group. View Model objects could be\
    \ in a `ViewModel` group as well.\n\nThis method gets the URL to the file, loads\
    \ it into a `Data` instance, parses it into `Note` instances, and maps those `Note`s\
    \ into an array of `NoteViewModel` instances.\n\nIt’s a static function so it\
    \ can be called without having a `NoteViewModel` instance.\n\nAlso, note the `#if\
    \ DEBUG` compilation condition. Swift doesn’t have a preprocessor, but it does\
    \ handle the same flags during compilation. In this case, we don’t want this function\
    \ included in our release builds.\n\nNow we have our model (`Note`) loaded and\
    \ converted into our view model (`NoteViewModel`). We need to update our View\
    \ (`NoteRow`) to use the model view.\n\n# View\n\nOur `NoteRow` will be simplified\
    \ both in the data it needs and converting data to the UI. It no longer needs\
    \ a `DateFormatter` object. It only needs a `NoteViewModel`:\n\n```\nstruct NoteRow:\
    \ View {\n    var noteVM : NoteViewModel\n```\n\nThe UI will still contain the\
    \ same items: text, priority stars, spacer, and time it was updated. However,\
    \ now the `NoteRow` can just get what it needs from the `NoteViewModel` and make\
    \ decisions only regarding the layout.\n\nUsing its `NoteViewModel` property,\
    \ it can get the `text`, display the three images in `priorityImages`, and set\
    \ the `time` from the view model’s `time` property.\n\nThe `NoteRow` will also\
    \ use the `renderingColor` on the stars and time. The view model has already determined\
    \ what the color is based on its own logic. The `body` property code looks like\
    \ Figure [9-6](#497312_1_En_9_Chapter.xhtml#Fig6).\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig6_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig6_HTML.jpg)\n\
    \nFigure 9-6\n\n`NoteRow`’s `body` Property Using the `NoteViewModel` Property\n\
    \nAgain, notice that `NoteRow` only makes decisions based on the layout of the\
    \ UI: `VStack`, `HStack`, `ForEach`, `Spacer`, and so on.\n\nAll this work to\
    \ separate out classes based on their roles of the Model, View, and View Model.\
    \ It may not seem like we’ve gained much, but in regard to the preview, we have.\n\
    \n# Preview\n\nOur `NoteRow_Previews` can be a good bit simpler and agnostic to\
    \ the Model and View Model. It basically just has to relate and return them.\n\
    \nAlso, we can create a row in a `ForEach` loop for each item in our JSON data.\
    \ How does that pay off? It means we can create variations in our test data that\
    \ mimic what can happen in real data. When the data has a new variation (e.g.,\
    \ a new priority value), we can create test data to represent it and see how the\
    \ UI reacts.\n\n## Preview the Test Data\n\nIn this exercise, we’ll update our\
    \ `NoteRow_Previews` struct to display our test JSON data. We need to load that\
    \ data and create a `NoteRow` for each item in the file.\n\n![../images/497312_1_En_9_Chapter/497312_1_En_9_Fig7_HTML.jpg](images/497312_1_En_9_Chapter/497312_1_En_9_Fig7_HTML.jpg)\n\
    \nFigure 9-7\n\nPreview of `NoteRow_Previews`\n\n1.  Verify the preview looks\
    \ as you would expect it to in the Canvas as in Figure [9-7](#497312_1_En_9_Chapter.xhtml#Fig7).\n\
    \n2.  Clear out the previews computed property in the `NoteRow_Previews`:\n\n\
    \    ```\n    static var previews: some View {\n    }\n    ```\n\n3.  Add a `ForEach`\
    \ using the `NoteViewModel.loadTestData()` call:\n\n    ```\n    ForEach(NoteViewModel.loadTestData(),\
    \ id: \\.id)\n    { (noteVM) in }\n    ```\n\n4.  In the `ForEach` loop, create\
    \ `NoteRow` instances with the View Model passed in:\n\n    ```\n    { (noteVM)\
    \ in\n        NoteRow(noteVM: noteVM)\n    }\n    ```\n\n5.  Use `previewLayout`\
    \ (and/or other modifiers) to display each row as desired:\n\n    ```\n    NoteRow(noteVM:\
    \ noteVM)\n        .previewLayout(.sizeThatFits)\n    ```\n\n    **Note**: You\
    \ may need to comment out the bulk of your `ContentView` to make your project\
    \ compile. For your `body` and previews computed properties, you can just return\
    \ a `Text` item for now.\n\nIn my test data, I used dates such that my first note\
    \ is not past due but my second note is.\n\nNow we have our test data loading\
    \ and rendered in the preview for our `NoteRow`. You can create more JSON items\
    \ to view more variations of the rows in your Canvas."
