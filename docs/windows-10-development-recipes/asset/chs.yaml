  \ 下拉控件中。\n\n```javascript\nfunction listbox_GetVoices() {\n    /// <summary>\n \
  \   /// 这将根据系统已安装的语音创建选项。然后这些语音将显示在列表框中。\n    /// 这允许用户根据自己的偏好更改应用中合成器的语音。\n   \
