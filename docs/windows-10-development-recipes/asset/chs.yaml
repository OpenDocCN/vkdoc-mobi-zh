  ```\n\n运行应用程序时，您将看到如图 4-9 所示的界面。\n\n![A978-1-4842-0719-2_4_Fig9_HTML.jpg](img/A978-1-4842-0719-2_4_Fig9_HTML.jpg)\n\
  \n图 4-9.\n\n默认视图下的语义缩放\n\n点击屏幕右上角显示的“-”按钮，或使用拉伸手势进行缩小。\n\n替代视图如图 4-10 所示。\n\n![A978-1-4842-0719-2_4_Fig10_HTML.jpg](img/A978-1-4842-0719-2_4_Fig10_HTML.jpg)\n\
  \n图 4-10.\n\n使用语义缩放显示替代的 ListView\n\n## 使用 AppBar 控件\n\n### 问题\n\n你需要提供对与当前页面或当前所选内容相关的常见任务的快速访问。\n\
  \n### 解决方案\n\n你可以通过向页面添加应用栏，来提供对与当前页面或当前所选内容相关的常见任务的快速访问。可以通过为 `div` 元素设置 `data-win-control=\"\
  WinJS.UI.AppBar\"` 属性，将 `AppBar` 控件添加到页面中。\n\n\n\n### 工作原理\n\n应用栏是一个包含图标按钮和省略号的行，位于应用屏幕底部。当用户点击省略号时，会显示可用的带标签图标按钮和菜单项。\n\
  \n以下是将`AppBar`控件添加到 HTML 页面的语法。\n\n```\n<div data-win-control=\"WinJS.UI.AppBar\"\
  ></div>\n```\n\n`AppBar`控件既可以使用 JavaScript 代码添加，也可以使用以下语法添加。\n\n```\nvar object\
  \ = new WinJS.UI.AppBar(element, options);\n```\n\n`AppBarCommand`添加在`AppBar`内部。它本质上是在`AppBar`中显示的命令或按钮。\n\
  \n```\n<button data-win-control=\"WinJS.UI.AppBarCommand\"></button>\n```\n\n通过将控件的`data-win-options`属性的`section`属性设置为`secondary`，可以指定`AppBarCommand`是否应以菜单形式显示。\n\
  \n让我们创建一个应用来演示`AppBar`的功能，其中包括以下功能：\n\n*   `AppBarCommands`（按钮），用于演示“添加”和“删除”选项。\n\
  *   `AppBarCommands`（菜单项），用于演示用户点击省略号时显示的菜单项。\n\n当用户点击按钮或菜单项时，会处理相应的事件并显示相应的消息。\n\
  \n在 Visual Studio 2015 中创建一个新的通用 Windows 项目，并打开 `default.html` 页面。将其内容替换为以下代码。\n\
  \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.7</title>\n\
  \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
  stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
  WinJS/js/ui.js\"></script>\n    <!-- Recipe4.7 references -->\n    <link href=\"\
  /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
  \    <script src=\"/js/appbarevents.js\"></script>\n</head>\n<body class=\"win-type-body\"\
  >\n    <div id=\"appBar\" data-win-control=\"WinJS.UI.AppBar\">\n        <button\
  \ data-win-control=\"WinJS.UI.AppBarCommand\"\n                data-win-options=\"\
  {id:'cmdAdd', label:'Add', icon:'add', section:'primary', tooltip:'Add'}\"></button>\n\
  \        <button data-win-control=\"WinJS.UI.AppBarCommand\"\n                data-win-options=\"\
  {id:'cmdRemove', label:'Remove', icon:'remove', section:'primary', tooltip:'Remove'}\"\
  ></button>\n        <button data-win-control=\"WinJS.UI.AppBarCommand\"\n      \
  \          data-win-options=\"{id:'cmdCamera', label:'Click Photo', icon:'camera',\
  \ section:'secondary', tooltip:'click'}\"></button>\n    </div>\n    <div id=\"\
  Message\"></div>\n</body>\n</html>\n```\n\nHTML 标记在主区域中添加了两个 `AppBarCommands`（添加、删除），并在辅助菜单中添加了一个\
  \ `AppBarCommand`（相机）。`data-win-options` 属性为控件提供了额外的选项。其中一些属性包括：\n\n*   `Id`：唯一标识\
  \ `AppBarCommand`。\n*   `label`：`AppBarCommand` 中显示的内容。\n*   `icon`：`AppBarCommand`\
  \ 的内置图标。\n*   `section`：命令应在 `AppBar` 中显示的区域。该值可以是 `primary` 或 `secondary`。\n* \
  \  `tooltip`：鼠标悬停在命令按钮上时显示的文本。\n\n注意，页面包含对 `appbarevents.js` JavaScript 文件的引用。该文件包含了处理\
  \ `AppBarCommands` 事件的逻辑。让我们在项目的 `js` 文件夹下创建一个新的 JavaScript 文件，并将其命名为 `appbarevents.js`。向其中添加以下代码。\n\
