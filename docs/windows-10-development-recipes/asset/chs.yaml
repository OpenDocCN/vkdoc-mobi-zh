  \    }\n})();\n```\n\n上述 JavaScript 代码处理了 `AppBarCommand` 按钮的点击事件。点击按钮时，会显示一条消息。\n\
  \n在 Windows 上运行该应用。你应该会看到如图 4-11 所示的屏幕。\n\n![A978-1-4842-0719-2_4_Fig11_HTML.jpg](img/A978-1-4842-0719-2_4_Fig11_HTML.jpg)\n\
  \n图 4-11.\n\n包含 `AppBar` 的 Windows 应用\n\n点击应用栏中的省略号按钮，会显示辅助区域，如图 4-12 所示。\n\n![A978-1-4842-0719-2_4_Fig12_HTML.jpg](img/A978-1-4842-0719-2_4_Fig12_HTML.jpg)\n\
  \n图 4-12.\n\n包含 `AppBar` 和辅助区域的 Windows 应用\n\n点击菜单按钮时，会显示相应的消息。\n\n## 使用工具栏控件\n\n\
  ### 问题\n\n你需要显示一组可以出现在任何位置的命令；例如，浮出控件或屏幕顶部的应用栏。\n\n### 解决方案\n\n你可以使用 `ToolBar` 控件在操作区域中显示尽可能多的命令。此控件并不局限于应用内的单个位置。它可以在\
  \ splitView、浮出控件等中找到。\n\n\n\n### 工作原理\n\n在 Visual Studio 2015 中使用 JavaScript 模板创建一个新的通用\
  \ Windows 应用。打开 `default.html` 页面。\n\n将 `default.html` 页面的内容替换为以下代码。\n\n```\n<!DOCTYPE\
  \ html>\n<html>\n<head>\n<meta charset=\"utf-8\" />\n<title>Recipe4.8</title>\n\
  <!-- WinJS references -->\n<link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
  \ />\n<script src=\"WinJS/js/base.js\"></script>\n<script src=\"WinJS/js/ui.js\"\
  ></script>\n<!-- Recipe4.8 references -->\n<link href=\"/css/default.css\" rel=\"\
  stylesheet\" />\n<script src=\"/js/default.js\"></script>\n</head>\n<body class=\"\
  win-type-body\">\n<div class=\"basicToolbar\" data-win-control=\"WinJS.UI.ToolBar\"\
  >\n<!-- Primary commands -->\n<button data-win-control=\"WinJS.UI.Command\" data-win-options=\"\
  {\nid:'cmdAdd',\nlabel:'add',\nsection:'primary',\ntype:'button',\nicon: 'add',\n\
  onclick: recipes.clickcommand}\"></button>\n<button data-win-control=\"WinJS.UI.Command\"\
  \ data-win-options=\"{\nid:'cmdEdit',\nlabel:'Edit',\nsection:'primary',\ntype:'button',\n\
  icon: 'edit',\nonclick: recipes.clickcommand}\"></button>\n<button data-win-control=\"\
  WinJS.UI.Command\" data-win-options=\"{\nid:'cmdDelete',\nlabel:'delete',\nsection:'primary',\n\
  type:'button',\nicon: 'delete',\nonclick: recipes.clickcommand}\"></button>\n<!--\
  \ Secondary command -->\n<button data-win-control=\"WinJS.UI.Command\" data-win-options=\"\
  {\nid:'cmdShare',\nlabel:'share',\nsection:'secondary',\ntype:'button',\nonclick:\
  \ recipes.clickcommand}\"></button>\n</div>\n</body>\n</html>\n```\n\n上述代码片段在主要命令中添加了三个按钮，在次要命令中添加了一个按钮（共享）。次要命令默认是隐藏的，点击省略号按钮时会显示出来。\n\
  \n通过将 `div` 元素的 `data-win-control` 属性设置为 `WinJS.UI.ToolBar` 值来添加工具栏控件。\n\n你可以通过将\
  \ `data-win-control` 属性设置为 `WinJS.UI.Command` 值，在工具栏内部添加按钮。`data-win-options` 属性用于设置命令属性。以下是为命令设置的部分属性。\n\
  \n*   `id`：定义命令的标识符。\n*   `label`：定义命令要显示的文本。\n*   `section`：定义命令在工具栏中应出现的区域。该值可以是\
  \ \"primary\" 或 \"secondary\"。\n*   `type`：该值设置为 \"button\" 以显示按钮控件。\n*   `onClick`：触发并调用相应\
  \ JavaScript 方法的事件。\n*   `icon`：显示命令的内置图标。\n\n注意，我们已经为命令设置了 `OnClick` 事件。现在让我们为其添加事件。\n\
  \n打开项目 `js` 文件夹下的 `default.js` 文件。在 `args.setPromise` 方法之前添加以下代码。\n\n```\nWinJS.Namespace.define(\"\
  recipes\", {\nclickcommand: WinJS.UI.eventHandler(function (ev) {\nvar command =\
  \ ev.currentTarget;\nif (command.winControl) {\nvar message = Windows.UI.Popups.MessageDialog(command.winControl.label);\n\
  message.showAsync();\n}\n})\n});\n```\n\n上述代码片段定义了一个名为 `recipe` 的命名空间，并添加了一个名为 `clickcommand`\
  \ 的事件处理程序。当事件被调用时，它会显示一个 `MessageDialog`。\n\n现在，让我们在 Windows 上运行该应用。你应该会看到如图 4-13\
  \ 所示的屏幕。\n\n![A978-1-4842-0719-2_4_Fig13_HTML.jpg](img/A978-1-4842-0719-2_4_Fig13_HTML.jpg)\n\
  \n图 4-13. Windows 应用中的工具栏\n\n当你点击命令按钮时，会看到一个消息对话框，描述被点击的按钮。\n\n"
- "# 第 5 章：数据绑定与导航\n\n通常，当你查看任何应用程序时，它都由用户界面（UI）和底层业务逻辑组成。数据绑定是一个将应用程序 UI 与业务逻辑连接起来的过程。当数据值发生变化时，绑定到该数据的元素会自动反映这些变化；而当元素值发生变化时，底层数据也会相应更新并反映变化。\n\
  \n## 5.1 数据绑定到简单对象\n\n### 问题\n\n作为应用程序业务逻辑的一部分，你有一个包含数据属性的简单业务对象。你希望将该业务对象的数据属性绑定到\
  \ UI 上的 HTML 元素。\n\n### 解决方案\n\n数据绑定由 `WinJS.Binding` 命名空间提供。它提供了 `processAll()`\
  \ 方法，该方法将对象的值绑定到任何 DOM 元素的值。DOM 元素必须使用 `data-win-bind` 属性，并提供需要绑定的属性名称。\n\n\n\n\
  ### 工作原理\n\n让我们看看如何在应用程序中执行简单的数据绑定。\n\n打开 Visual Studio 2015。依次选择“文件”➤“新建项目”➤“JavaScript”➤“Windows”➤“通用”➤“空白应用（通用\
  \ Windows）”模板（见图 5-1）。\n\n![A978-1-4842-0719-2_5_Fig1_HTML.jpg](img/A978-1-4842-0719-2_5_Fig1_HTML.jpg)\n\
  \n图 5-1。\n\n“新建项目”对话框。Visual Studio 会创建通用 Windows 应用空白项目，并将所有必需的文件添加到解决方案中。打开 `js`\
  \ 文件夹下的 `default.js`。在立即执行函数内部，`'use strict'` 指令之后添加以下代码行：\n\n```\n(function ()\
  \ {\n    \"use strict\";\n    //创建一个 person 对象\n    var person = {\n        name:\
  \ \"John Doe\",\n        age: 36,\n        designation: \"Technical Evangelist\"\
  ,\n        city: \"Boston\",\n    };\n    var app = WinJS.Application;\n    var\
  \ activation = Windows.ApplicationModel.Activation;\n    app.onactivated = function\
  \ (args) {\n        if (args.detail.kind === activation.ActivationKind.launch) {\n\
  \            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll());\n\
  \        }\n    };\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n\
  })();\n```\n\n让我们将 `Person` 对象绑定到 HTML 中的一个 `div` 元素。\n\n打开项目根目录下的 `default.html`。将\
  \ `<body>` 的内容替换为以下内容：\n\n```\n<div id=\"container\">\n    <h3>姓名：</h3>\n    <h2><span\
  \ data-win-bind=\"innerText: name\"></span></h2>\n    <h3>年龄：</h3>\n    <h2><span\
  \ data-win-bind=\"innerText: age\"></span></h2>\n    <h3>职位：</h3>\n    <h2><span\
  \ data-win-bind=\"innerText: designation\"></span></h2>\n    <h3>城市：</h3>\n    <h2><span\
  \ data-win-bind=\"innerText: city\"></span> </h2>\n</div>\n```\n\n你有一个 `span` 元素，并且为其定义了一个\
  \ `data-win-bind` 属性用于数据绑定。你将 `span` 元素的 `innerText` 属性绑定到了你在 `default.js` 中创建的\
  \ `Person` 对象的数据属性。\n\n接下来，你需要修改 `onactivated` 函数并添加数据绑定调用。按如下所示修改 `app.onactivated`：\n\
  \n```\napp.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n                // TODO: 此应用程序已重新启动。请在此处初始化你的应用程序。\n            } else {\n\
  \                // TODO: 此应用程序已从挂起状态重新激活。请在此处恢复应用程序状态。\n            }\n       \
  \     var container = document.querySelector('#container');\n            var prmise\
  \ = WinJS.UI.processAll().then(function () {\n                WinJS.Binding.processAll(container,\
  \ person)\n            })\n            args.setPromise(prmise);\n        }\n   \
  \ };\n```\n\n在 Visual Studio 中按 `F5` 生成并运行该应用程序。图 5-2 显示了 Windows Mobile 屏幕上的输出。\n\
  \n![A978-1-4842-0719-2_5_Fig2_HTML.jpg](img/A978-1-4842-0719-2_5_Fig2_HTML.jpg)\n\
  \n图 5-2。\n\nWindows Mobile 输出快照。\n\n如你所见，你将 `Person` 对象（定义在 `default.js` 中）的值绑定到了\
  \ HTML 元素。这是通过 `WinJS.Binding` 命名空间实现的。如果你还记得，我们在 `onactivated` 函数中调用了 `WinJS.Binding.processAll()`\
  \ 方法。`processAll()` 方法会将对象的值绑定到具有 `data-win-bind` 属性的 DOM 元素的值。在示例代码中，你在输出姓名、年龄、职位和城市信息的\
  \ `div` 元素上设置了 `data-win-bind` 属性。\n\n## 5.2 数据绑定 DOM 元素的样式属性\n\n### 问题\n\nHTML\
  \ 元素可以通过 CSS 定义来设置样式。在运行时，样式属性需要绑定到底层业务对象的数据属性。\n\n### 解决方案\n\n除了提供对 DOM 元素属性的数据绑定之外，`WinJS`\
  \ 数据绑定框架还提供了绑定 DOM 元素样式属性的选项。样式属性可以在 `data-win-bind` 属性中绑定到绑定对象的数据属性。\n\n### 工作原理\n\
  \n打开 Visual Studio 2015。依次选择“文件”➤“新建项目”➤“JavaScript”➤“Windows”➤“通用”➤“空白应用（通用 Windows）”模板。这将创建一个通用\
  \ Windows 应用模板（见图 5-3）。\n\n![A978-1-4842-0719-2_5_Fig3_HTML.jpg](img/A978-1-4842-0719-2_5_Fig3_HTML.jpg)\n\
  \n图 5-3。\n\n“新建项目”对话框。打开 `js` 文件夹中的 `default.js`。在 `'use strict'` 指令之后，在立即执行函数内部添加以下代码：\n\
  \n```\n(function () {\n    \"use strict\";\n    //创建 person 对象\n    var person =\
  \ {\n        name: \"John Doe\",\n        age: 36,\n        designation: \"Technical\
