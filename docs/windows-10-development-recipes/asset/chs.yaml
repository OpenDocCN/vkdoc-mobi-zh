  , GetControl);\n})();\n```\n\n现在，在 `Datastoragedemo.js` 文件中使用以下代码片段添加一个事件方法或函数：\n\
  \n```\nfunction btnCreateRoamingContainerClick(mouseEvent) {\n    var ApplicationData\
