  \n## 10.8 共享自定义数据类型\n\n### 问题\n\n你需要开发一个功能，允许用户共享自定义数据格式，例如人物的姓名和职位。\n\n### 解决方案\n\
  \n使用 `request.data.setData` 函数，如下所示：\n\n```\nrequest.data.setData(\"Schema\", \"\
  ObjectName\");\n```\n\n\n\n### 工作原理\n\n共享合约还允许开发者构建应用来共享自定义格式的数据，例如用于书籍（书名、出版商、作者姓名等）或人物（包含姓名、职位、头像等属性）的数据格式。\n\
  \n在 Windows 10 通用 Windows 应用中支持的自定义格式，可以基于 [`http://schema.org`](http://schema.org)\
  \ 定义的架构，例如 [`http://schema.org/person`](http://schema.org/person) 或 [`http://schema.org/Book`](http://schema.org/Book)。`setData`\
  \ 方法接受两个参数，如下所示：\n\n`request.data.setData(\"http://schema.org/Person\", person);`\n\
  \n第一个参数是架构格式 ID，第二个参数是对象本身。\n\n接下来，让我们在一个通用 Windows 应用中实现共享自定义数据。\n\n使用 Microsoft\
  \ Visual Studio 2015 中的 Windows 通用（空白应用）模板创建一个新项目。\n\n首先，在 `default.html` 中添加以下代码。你需要用以下代码替换\
  \ `body` 标签：\n\n```html\n<body class=\"win-type-body\" style=\"background-color:white\"\
  >\n    <div>\n        <p style=\"color:black\">输入人物姓名：</p>\n        <input class=\"\
  text-box\" id=\"txttitle\" value=\"姓名\" size=\"40\" />\n        <p style=\"color:black\"\
  >输入人物职位：</p>\n        <input class=\"text-box\" id=\"txtjobtitle\" value=\"职位\"\
  \ size=\"40\" />\n        <p style=\"color:black\">输入电话号码：</p>\n        <input class=\"\
  text-box\" id=\"txtphone\" value=\"电话\" size=\"40\" />\n        <br />\n       \
  \ <br />\n    </div>\n</body>\n```\n\n现在，在解决方案资源管理器中右键单击项目，然后选择 **添加 > 新建 JavaScript\
  \ 文件**。为文件提供名称。在此示例中，让我们将文件命名为 `DataSharingDemo.js`。\n\n```javascript\n(function\
  \ () {\n    \"use strict\";\n\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
  \ () {\n            var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
  \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
  \        });\n    }\n\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
  })();\n```\n\n通过复制以下代码来实现 `shareDataHandler` 函数：\n\n```javascript\nfunction shareDataHandler(e)\
  \ {\n    var request = e.request;\n    \n    // request.data.properties.title 是必需的\n\
  \    var name = document.getElementById(\"txttitle\").value;\n    var person = {\n\
  \        \"type\": \"http://schema.org/Person\",\n        \"properties\":\n    \
  \    {\n            \"name\": name,\n            \"jobtitle\": document.getElementById(\"\
  txtjobtitle\").value\n        }\n    };\n    person = JSON.stringify(person);\n\
  \    request.data.properties.title = name;\n    request.data.properties.description\
  \ = name;\n    request.data.setData(\"http://schema.org/Person\", person);\n}\n\
  ```\n\n前面函数中的代码实现了自定义数据的共享。`person` 对象被定义为一个 JSON 字符串，用于设置姓名和职位等属性，因为 `schema.org`\
  \ 同时支持 JSON 和 XML 格式。\n\n现在让我们创建另一个项目，并实现接收自定义数据的代码。\n\n使用 Microsoft Visual Studio\
  \ 2015 中的 Windows 通用（空白应用）模板创建一个新项目。\n\n首先，将以下代码添加到 `default.html` 中。你需要用以下代码替换\
  \ `body` 标签。\n\n```html\n<body class=\"win-type-body\">\n    <textarea class=\"\
  text-box\" id=\"txtconent\" rows=\"4\" cols=\"50\" />\n    <br />\n    <br />\n\
  </body>\n```\n\n现在，在解决方案资源管理器中右键单击项目，然后选择 **添加 > 新建 JavaScript 文件**。为文件提供名称。在此示例中，让我们将文件命名为\
  \ `DataSharingDemo.js`。\n\n```javascript\n(function () {\n    \"use strict\";\n\n\
  \    function GetControl() {\n        WinJS.UI.processAll().done(function () {\n\
  \            // 初始化激活处理程序\n            WinJS.Application.addEventListener(\"activated\"\
  , activatedShareHandler, false);\n        });\n    }\n\n    document.addEventListener(\"\
  DOMContentLoaded\", GetControl);\n})();\n```\n\n通过复制以下代码来实现 `activatedShareHandler`\
  \ 函数：\n\n```javascript\nfunction activatedShareHandler(eventObject) {\n    if (eventObject.detail.kind\
  \ === Windows.ApplicationModel.Activation.ActivationKind.shareTarget) {\n      \
  \  eventObject.setPromise(WinJS.UI.processAll());\n        \n        // ShareOperation\
  \ 对象使用 eventObject 事件参数进行初始化\n        shareOperation = eventObject.detail.shareOperation;\n\
  \        \n        if (shareOperation.data.contains(\"http://schema.org/Person\"\
  )) {\n            shareOperation.data.getTextAsync(\"http://schema.org/Person\"\
  ).done(function (customFormatString) {\n                var customFormatObject =\
  \ JSON.parse(customFormatString);\n                if (customFormatObject) {\n \
  \                   // 此示例期望自定义格式的类型为 http://schema.org/Person\n               \
  \     if (customFormatObject.type === \"http://schema.org/Person\") {\n        \
  \                customFormatString = \"类型: \" + customFormatObject.type;\n    \
  \                    if (customFormatObject.properties) {\n                    \
  \        customFormatString += \"\\n 姓名: \" + customFormatObject.properties.name;\n\
  \                            customFormatString += \"\\n 职位: \" + customFormatObject.properties.jobtitle;\n\
  \                        }\n                    }\n                }\n         \
  \       document.getElementById(\"txtconent\").value = customFormatString;\n   \
  \         }, function (e) {\n            });\n        }\n    }\n}\n```\n\n此代码首先检查事件是否是为共享操作触发的。然后它初始化\
  \ `shareOperation = eventObject.detail.shareOperation`。接着检查 `shareOperation.data.contains(\"\
  http://schema.org/Person\")`。如果包含 Person 对象，则调用 `shareOperation.data.getTextAsync`\
  \ 方法来检索自定义数据属性。在成功方法中，它将 JSON 字符串解析到一个变量中，如下所示：\n\n`var customFormatObject = JSON.parse(customFormatString);`\n\
  \n最后，它读取这些属性并将其显示在文本区域中。你需要使用 Visual Studio 的部署选项来部署此应用。\n\n现在运行共享自定义数据的应用。你将看到一个屏幕，如图\
  \ 10-14 所示。\n\n![A978-1-4842-0719-2_10_Fig14_HTML.jpg](img/A978-1-4842-0719-2_10_Fig14_HTML.jpg)\n\
  \n**图 10-14.** 共享自定义数据格式的应用 UI\n\n现在点击 **共享** 超级按钮或按 Windows 徽标键 ![A978-1-4842-0719-2_10_Figc_HTML.jpg](img/A978-1-4842-0719-2_10_Figc_HTML.jpg)\
  \ + H。当你从列表中选择 **10.7B_ReceiveCustom_data** 应用时，你会看到如图 10-15 所示的屏幕。\n\n![A978-1-4842-0719-2_10_Fig15_HTML.jpg](img/A978-1-4842-0719-2_10_Fig15_HTML.jpg)\n\
  \n**图 10-15.** 共享超级按钮中用于接收自定义数据的接收器应用\n\n当你选择该应用时，你会在共享超级按钮窗口中看到接收器应用的用户界面，如图 10-16\
  \ 所示。\n\n![A978-1-4842-0719-2_10_Fig16_HTML.jpg](img/A978-1-4842-0719-2_10_Fig16_HTML.jpg)\n\
  \n**图 10-16.** 显示了接收到的自定义数据的接收器应用\n\n---\n\n"
- "# 第 11 章：后台任务\n\n在任何应用中，你可能都需要在后台静默地执行某些任务。通用 Windows 平台提供了 **后台任务** 功能，让你可以在后台运行代码。后台任务本质上就是一个由操作系统在后台运行的\
  \ JavaScript 文件。后台任务通常针对你可以订阅的系统触发器来运行。后台任务需要在应用的任务清单中声明。后台任务可以通过特定事件向应用报告进度、完成和取消状态。\n\
  \n## 11.1 用于后台任务的系统事件触发器\n\n### 问题\n\n你已经决定在你的应用中实现一个后台任务。你想了解可以订阅哪些不同的系统事件触发器，并在该触发器发生时运行后台任务。\n\
  \n\n\n### 解决方案\n\n系统事件通过一个名为 `SystemTrigger` 的系统级触发器对象提供。创建新的后台任务时，你需要让操作系统知道要订阅哪个系统触发器。创建\
  \ `SystemTrigger` 的新实例，并在构造函数中传递触发器类型。触发器类型在 `SystemTriggerType` 枚举中定义。表 11-1 列出了这些触发器及其描述。\n\
  \n表 11-1. 系统触发器类型\n\n| 触发器名称 | 描述 |\n| --- | --- |\n| `InternetAvailable` | 网络变为可用\
  \ |\n| `NetworkStateChange` | 网络状态发生变化 |\n| `OnlineIdConnectedStateChange` | 与账户关联的在线\
  \ ID 发生变化 |\n| `SmsReceived` | 收到新的短信 |\n| `TimeZoneChange` | 设备上的时区发生变化 |\n\n##\
  \ 创建并注册后台任务\n\n### 问题\n\n你想为应用创建一个后台任务，并在操作系统中注册它。\n\n### 解决方案\n\n使用 `Windows.ApplicationModel.Background`\
  \ 命名空间中的 `BackgroundTaskBuilder` 来创建新的后台任务并注册它。\n\n\n### 工作原理\n\n打开 Visual Studio\
  \ 2015 Community 版本。选择“文件” ➤ “新建项目”。在“新建项目”对话框中，从“已安装模板”区域选择“模板” ➤ “JavaScript”\
  \ ➤ “Windows” ➤ “通用”（参见图 11-1）。从可用的项目模板中选择“空白应用（通用 Windows）”。为应用提供名称和位置，然后单击“确定”。\n\
  \n![A978-1-4842-0719-2_11_Fig1_HTML.jpg](img/A978-1-4842-0719-2_11_Fig1_HTML.jpg)\n\
  \n图 11-1.\n\n“新建项目”对话框 Visual Studio 会准备项目，完成后将如图 11-2 所示。\n\n![A978-1-4842-0719-2_11_Fig2_HTML.jpg](img/A978-1-4842-0719-2_11_Fig2_HTML.jpg)\n\
  \n图 11-2.\n\n解决方案资源管理器 在你的 `js` 文件夹中创建一个新的 JavaScript 文件。让我们将文件命名为 `mytask.js`。此\
  \ `js` 文件包含你想要执行的后台工作/任务的逻辑。你将使用此 `js` 文件的文件名来注册任务，因此请记下该文件名。\n\n以下是 `mytask.js`\
  \ 文件的骨架代码：\n\n```\n(function () {\n    \"use strict\";\n    //获取后台任务的当前实例\n    var\
  \ backgroundTaskInstance = Windows.UI.WebUI.WebUIBackgroundTaskInstance.current;\n\
  \    var canceled = false,\n        settings = Windows.Storage.ApplicationData.current.localSettings,\n\
  \        key = backgroundTaskInstance.task.name;\n    backgroundTaskInstance.addEventListener(\"\
  canceled\", OnCanceled);\n    //检查后台任务是否被用户取消。\n    if (!canceled) {\n        doWork();\n\
  \    }\n    else {\n        settings.values[key] = \"Canceled\";\n        close();\n\
  \    }\n    //作为后台任务一部分执行主要工作的函数\n    function doWork() {\n        settings.values[key]\
  \ = \"Starting\"\n        //你的后台工作代码\n        //...\n        settings.values[key]\
  \ = \"Succeeded\";\n        settings.values[key] = \"Closing\";\n        //任务完成后调用\
  \ close\n        close();\n    }\n    function OnCanceled(sender, reason) {\n  \
  \      canceled = true;\n    }\n})();\n```\n\n让我们过一遍代码。你使用 `WebUIBackgroundTaskInstance.current`\
  \ 属性获取后台任务的一个实例。然后，你为后台任务的取消附加一个已取消事件处理程序。接着，你定义一个 `doWork()` 函数，该函数作为后台任务的一部分执行实际工作。你利用\
  \ `localSettings` 并更新任务的状态，以便主应用可以读取该状态并在 UI 上执行任何更新。请注意对 `close()` 函数的调用；后台任务应在完成工作后调用此函数。接下来，你注册刚刚创建的任务。\n\
  \n在 `default.js` 中，应用激活后，注册你刚刚创建的 `mytask.js` 后台任务。以下是注册任务所涉及的步骤。使用 `BackgroundTaskRegistration.allTasks`\
  \ 属性遍历所有任务。检查你的任务是否已注册非常重要。如果你不检查这一点而盲目注册，后台任务将被多次注册，这可能导致意外结果。以下是执行此操作的代码片段：\n\n\
  ```\nvar task = null,\n    taskRegistered = false,\n    background = Windows.ApplicationModel.Background,\n\
  \    iter = background.BackgroundTaskRegistration.allTasks.first();\nwhile (iter.hasCurrent)\
  \ {\n    task = iter.current.value;\n    if (task.name === exampleTaskName) {\n\
  \        taskRegistered = true;\n        break;\n    }\n    iter.moveNext();\n}\n\
  ```\n\n如果任务尚未注册，则使用 `BackgroundTaskBuilder` 类执行注册。你需要设置触发任务的系统触发器。在此示例中，你监听 `timeZoneChange`\
  \ 作为后台任务的触发器。以下是代码片段：\n\n```\nif (taskRegistered != true)\n{\n    var builder =\
  \ new\n    Windows.ApplicationModel.Background.BackgroundTaskBuilder();\n    var\
  \ trigger = new Windows.ApplicationModel.Background.SystemTrigger(\n    Windows.ApplicationModel.Background.SystemTriggerType.timeZoneChange,\
  \ false);\n    builder.name = exampleTaskName;\n    builder.taskEntryPoint = \"\
  js\\\\mytask.js\";\n    builder.setTrigger(trigger);\n    task = builder.register();\n\
  }\n```\n\n接下来，你需要处理任务完成。在任务本身上添加一个已完成事件处理程序。以下是代码片段：\n\n```\ntask.addEventListener(\"\
  completed\", function (args) {\n    var settings = Windows.Storage.ApplicationData.current.localSettings;\n\
  \    var key = args.target.name;\n    settings.values[key] = \"Completed\";\n});\n\
  ```\n\n以下是注册后台任务的完整代码片段：\n\n```\napp.onactivated = function (args) {\n    if (args.detail.kind\
  \ === activation.ActivationKind.launch) {\n        if (args.detail.previousExecutionState\
  \ !==\n            activation.ApplicationExecutionState.terminated) {\n        \
  \    var task = null,\n                taskRegistered = false,\n               \
  \ background = Windows.ApplicationModel.Background,\n                iter = background.BackgroundTaskRegistration.allTasks.first();\n\
  \            while (iter.hasCurrent) {\n                task = iter.current.value;\n\
  \                if (task.name === exampleTaskName) {\n                    taskRegistered\
  \ = true;\n                    break;\n                }\n                iter.moveNext();\n\
  \            }\n            if (taskRegistered != true) {\n                var builder\
  \ = new Windows.ApplicationModel.Background.BackgroundTaskBuilder();\n         \
  \       var trigger = new Windows.ApplicationModel.Background.SystemTrigger(\n \
  \               Windows.ApplicationModel.Background.SystemTriggerType.timeZoneChange,\
  \ false);\n                builder.name = exampleTaskName;\n                builder.taskEntryPoint\
  \ = \"js\\\\mytask.js\";\n                builder.setTrigger(trigger);\n       \
  \         task = builder.register();\n            }\n            task.addEventListener(\"\
  completed\", function (args) {\n                var settings = Windows.Storage.ApplicationData.current.localSettings;\n\
  \                var key = args.target.name;\n                settings.values[key]\
  \ = \"Completed\";\n            });\n        } else {\n        }\n        args.setPromise(WinJS.UI.processAll());\n\
  \    }\n};\n```\n\n接下来，你需要在应用程序清单文件中为后台任务添加声明。双击位于应用程序根目录的 `package.appxmanifest`\
  \ 以打开清单文件。\n\n单击“声明”选项卡。从可用的声明下拉列表中选择“后台任务”。单击“添加”按钮添加声明。\n\n在“支持的任务类型”区域，选择“系统事件”。\n\
  \n在“应用设置”区域，在“起始页”条目下，添加 `js\\mytask.js` 作为值。\n\n保存包清单文件。\n\n通过上述代码，你创建了一个自定义后台任务并将其注册到操作系统。你使用了一个系统触发事件，即时区更改事件，来运行该任务。按\
  \ F5 运行应用，然后更改系统的时区设置。时区更改后，后台任务将立即触发。\n\n## 11.3 设置后台任务的运行条件\n\n### 问题\n\n你想要创建并注册一个自定义后台任务。但你希望仅当满足特定条件时才运行后台任务；例如，用户存在或用户不存在，等等。\n\
  \n\n\n### 解决方案\n\n后台任务仅在设定的触发器触发时运行。如前一则解决方案所示，你在创建任务时提供了触发器。如果你的任务需要满足特定条件（即使系统触发器已被触发），你可以创建一个系统条件，并在任务注册期间将其提供给任务生成器。条件通过\
  \ `SystemConditionType` 枚举提供。表 11-2 描述了 UWP 上可用的系统条件类型。\n\n**表 11-2.** 系统条件类型\n\n\
  | 触发器名称 | 值 | 描述 |\n| --- | --- | --- |\n| `invalid` | 0 | 非有效的条件类型 |\n| `userPresent`\
  \ | 1 | 仅当用户在场时任务可运行 |\n| `userNotPresent` | 2 | 仅当用户不在场时任务可运行 |\n| `InternetAvailable`\
  \ | 3 | 仅当互联网可用时任务可运行 |\n| `internetNotAvailable` | 4 | 仅当互联网不可用时任务可运行 |\n| `sessionConnected`\
  \ | 5 | 仅当用户会话已连接时任务可运行 |\n| `sessionDisconnected` | 6 | 仅当用户会话已断开时任务可运行 |\n| `freeNetworkAvailable`\
  \ | 7 | 仅当免费网络（非按流量计费）可用时任务可运行 |\n| `backgroundWorkCostNotHigh` | 8 | 仅当后台工作成本较低时任务可运行\
  \ |\n\n### 实现原理\n\n让我们学习如何在任务上设置系统条件。\n\n创建一个 `SystemCondition` 对象。在注册任务之前，需要构建后台任务运行所需的应用条件。你需要创建一个\
  \ `SystemCondition` 对象来表示该条件。`SystemCondition` 对象的构造函数需要 `SystemConditionType` 枚举值，该值表示在运行任务前需要满足的条件。以下是提供条件的代码片段：\n\
  \n```\nvar internetConditionType = Windows.ApplicationModel.Background.SystemConditionType.InternetAvailable;\n\
  var internetCondition = new Windows.ApplicationModel.Background.SystemCondition(internetConditionType);\n\
  ```\n\n将 `SystemCondition` 对象添加到后台任务。构建系统条件后，下一步是将其添加到任务生成器中。`BackgroundTaskBuilder`\
  \ 提供了一个用于设置条件的 `AddCondition()` 方法。以下是添加条件的代码片段：\n\n```\ntaskBuilder.AddCondition(internetCondition);\n\
  ```\n\n接下来，使用 TaskBuilder 的 `Register()` 方法注册任务。以下是任务注册的代码片段：\n\n```\nvar task =\
  \ builder.Register();\n```\n\n## 11.4 监控后台任务进度与完成\n\n### 问题\n\n你的应用创建并注册了一个后台任务。你希望监控该任务在应用中的进度和完成情况。\n\
  \n### 解决方案\n\n已在系统中注册的任务会触发进度和完成事件。你的应用需要提供事件处理程序，并订阅任务公开的事件。\n\n### 实现原理\n\n处理任务完成。首先，你需要创建一个函数，用于附加到后台任务的\
  \ `Completion` 事件上。该函数接收一个 `BackgroundTaskCompletedEventArgs` 类型的参数。以下是函数的基本结构：\n\
  \n```\nfunction onCompleted(args){\n    //处理任务完成的代码\n}\n```\n\n接下来，你需要将该函数注册到后台任务中。以下是实现此操作的代码片段：\n\
  \n```\ntask = builder.register();\ntask.addEventListener(\"completed\", onCompleted);\n\
  ```\n\n将所有需要在任务完成时执行的代码放入 `onCompleted` 函数中。\n\n处理任务进度。与完成事件类似，任务也会触发进度事件。你需要编写一个函数，用于附加到后台任务的进度事件上。通过订阅进度事件，每当任务触发进度事件时，都会调用附加到该事件的函数。任何进度报告流程都可以在该函数中编写。该函数接收两个参数：一个\
  \ `IBackgroundTaskRegistration` 对象和一个 `BackgroundTaskProgressEventArgs` 对象。以下是处理进度事件的函数基本结构：\n\
  \n```\nfunction onProgress(task, args){\n    //在此处添加执行进度相关流程的代码\n}\n```\n\n接下来，你需要将该函数注册到后台任务的进度事件上。以下是注册函数的代码片段：\n\
  \n```\ntask = builder.register();\ntask.addEventListener(\"progress\", onProgress);\n\
  ```\n\n"
- "# 第 12 章：Windows 应用中的位置与地图\n\n构建 Windows 应用的开发者可以利用 Windows 设备的功能，将位置和地图集成到其应用中。在本章中，你将学习如何在通用\
  \ Windows 运行时应用中使用位置 API 的解决方案。\n\n## 12.1 获取当前位置\n\n### 问题\n\n你不知道自己在哪里。Windows\
  \ 应用需要确定并显示你的当前位置。\n\n### 解决方案\n\n使用 `Windows.Devices.Geolocation` 命名空间中定义的 `Geolocator`\
  \ 类的 `getGeopositionAsync` 方法，从基于 Windows 10 的设备获取当前位置。\n\n\n\n### 工作原理\n\n使用通用\
  \ Windows 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual Studio 2015 的新建项目对话框中的 **JavaScript\
  \ ➤ Windows ➤ Universal** 节点下。这会在 Visual Studio 解决方案中创建一个项目，其中包含开始所需的必要文件。\n\n在应用中集成定位功能的第一步是在项目的\
  \ `package.appxmanifest` 文件中声明定位功能。在 Visual Studio 解决方案资源管理器中，双击 `package.appxmanifest`\
  \ 文件。在 GUI 设计器中，单击“功能”选项卡并选择“位置”，如图 12-1 所示。\n\n![A978-1-4842-0719-2_12_Fig1_HTML.jpg](img/A978-1-4842-0719-2_12_Fig1_HTML.jpg)\n\
  \n图 12-1. Visual Studio 中的“功能”选项卡\n\n打开项目中的 `default.html` 文件，并在每个文件的 `body` 标签下添加以下代码：\n\
  \n```\n<div>\n    <p>获取当前位置</p>\n    <br />\n    <button id=\"btnLocation\">获取位置</button>\
  \ <br />\n</div>\n<br />\n<div>\n    <table>\n        <tr>\n            <td>\n \
  \               纬度\n            </td>\n            <td >\n                <div id=\"\
  latitude\">\n                </div>\n            </td>\n        </tr>\n        <tr>\n\
  \            <td>\n                经度\n            </td>\n            <td>\n   \
  \             <div id=\"longitude\">\n                </div>\n            </td>\n\
  \        </tr>\n        <tr>\n            <td>\n                精度\n           \
  \ </td>\n            <td>\n                <div id=\"accuracy\">\n             \
  \   </div>\n            </td>\n        </tr>\n    </table>\n</div>\n```\n\n打开项目中的\
  \ `default.js` (`/js/default.js`) 文件，并将文件中的代码替换为以下内容：\n\n```\n// 有关空白模板的简介，请参阅以下文档：\n\
  // http://go.microsoft.com/fwlink/?LinkID=392286\n(function () {\n    \"use strict\"\
  ;\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
  \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
  \               done(function ()\n               {\n                   // 为按钮添加事件处理程序。\n\
  \                   document.querySelector(\"#btnLocation\").addEventListener(\"\
  click\",\n                       getLocation);\n               }));\n        }\n\
  \    };\n    var geolocation = null;\n    function getLocation()\n    {\n      \
  \  if (geolocation == null) {\n            geolocation = new Windows.Devices.Geolocation.Geolocator();\n\
  \        }\n        if (geolocation != null) {\n            geolocation.getGeopositionAsync().then(getPosition);\n\
  \        }\n    }\n    function getPosition(position)\n    {\n        document.getElementById('latitude').innerHTML\
  \ = position.coordinate.point.position.latitude;\n        document.getElementById('longitude').innerHTML\
  \ = position.coordinate.point.position.longitude;\n        document.getElementById('accuracy').innerHTML\
  \ = position.coordinate.accuracy;\n    }\n    app.oncheckpoint = function (args)\
  \ {\n    };\n    app.start();\n})();\n```\n\n`document.querySelector` 用于为 `btnLocation`\
  \ 元素添加点击事件处理程序。点击该按钮时，将调用 `getLocation` 方法。\n\n要获取当前位置信息，请创建在 `Windows.Devices.Geolocation`\
  \ 命名空间中定义的 `Geolocator` 类的实例，然后调用 `Geolocator` 类的 `getGeopositionAsync` 方法。获取位置后，需要定义一个操作方法，以便执行一组特定的操作。如上述代码片段所示，`getPosition`\
  \ 方法负责此操作。参数 `position` 的类型是 `Geolocation`，可用于获取当前位置信息，例如纬度、经度、精度等。\n\n下一步是构建项目并在模拟器或本地计算机上运行它。选择“生成”菜单，然后从\
  \ Visual Studio 中选择“生成解决方案”来构建项目。在 Visual Studio 标准工具栏上，从“运行”下拉菜单中选择“移动设备模拟器”。\n\
  \n当你在 Windows 上首次运行该应用时，系统会提示你确认是否允许使用你的位置。单击“允许”，以便应用可以使用位置信息。\n\n在应用程序中，单击“获取位置”按钮以显示当前位置的纬度和经度，如图\
  \ 12-2 所示。\n\n![A978-1-4842-0719-2_12_Fig2_HTML.jpg](img/A978-1-4842-0719-2_12_Fig2_HTML.jpg)\n\
  \n图 12-2. Windows 移动应用中的当前位置\n\n当你在本地计算机上点击该应用时，会收到一条消息提示，如图 12-3 所示。单击“允许”按钮。这将显示当前位置（见图\
  \ 12-4）。\n\n![A978-1-4842-0719-2_12_Fig4_HTML.jpg](img/A978-1-4842-0719-2_12_Fig4_HTML.jpg)\n\
  \n图 12-4. Windows 桌面系列应用中的当前位置\n\n![A978-1-4842-0719-2_12_Fig3_HTML.jpg](img/A978-1-4842-0719-2_12_Fig3_HTML.jpg)\n\
  \n图 12-3. Windows 桌面系列应用中的允许当前位置提示\n\n**注意**  \n请确保在您的 Windows 设备上启用了定位服务，以便获取当前位置。\n\
  \n## 12.2 响应地理定位器位置更新\n\n### 问题\n\n您希望频繁检查应用内位置是否发生变化。\n\n### 解决方案\n\n使用在 `Windows.Devices.Geolocation`\
  \ 命名空间中定义的 `Geolocator` 类的 `getGeopositionAsync` 方法。订阅 `PositionChanged` 和 `LocationChanged`\
  \ 事件，以跟踪位置变化，并从 Windows 移动版或桌面系列应用做出响应。\n\n\n\n### 工作原理\n\n使用通用 Windows 模板创建一个新的通用\
  \ Windows 项目，该模板可在 Microsoft Visual Studio 2015 的“新建项目”对话框中的 `JavaScript` > `Windows`\
  \ > `Universal` 节点下找到。这会在 Visual Studio 解决方案中创建一个单一项目，其中包含入门所需的必要文件。\n\n在项目中的 `package.appxmanifest`\
  \ 文件中启用 `Location` 功能。\n\n从 Visual Studio 解决方案资源管理器中打开 `default.html` 文件，然后在每个文件的\
  \ `body` 标签下添加以下代码。\n\n```html\n<div>\n    <button id=\"start\">开始追踪</button><br\
  \ />\n    <br />\n    <button id=\"stop\">停止追踪</button><br />\n</div>\n<br />\n\
  <div>\n    <table>\n        <tr>\n            <td>\n                纬度\n       \
  \     </td>\n            <td>\n                <div id=\"latitude\">\n         \
  \       </div>\n            </td>\n        </tr>\n        <tr>\n            <td>\n\
  \                经度\n            </td>\n            <td>\n                <div id=\"\
  longitude\">\n                </div>\n            </td>\n        </tr>\n       \
  \ <tr>\n            <td>\n                精确度\n            </td>\n            <td>\n\
  \                <div id=\"accuracy\">\n                </div>\n            </td>\n\
  \        </tr>\n        <tr>\n            <td>\n                <div id=\"Status\"\
  ></div>\n            </td>\n        </tr>\n    </table>\n</div>\n```\n\n上述 HTML\
  \ 代码与方案 12.1 中的代码类似，但增加了一个用于显示状态的 `div` 标签。\n\n从 Visual Studio 解决方案资源管理器中打开项目中的\
  \ `default.js` (`/js/default.js`) 文件，并将文件中的代码替换为以下内容：\n\n```javascript\n(function\
  \ () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var activation\
  \ = Windows.ApplicationModel.Activation;\n    app.onactivated = function (args)\
  \ {\n        if (args.detail.kind === activation.ActivationKind.launch) {\n    \
  \        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
  \                 done(function () {\n                     // 为按钮添加事件处理程序。\n   \
  \                  document.querySelector(\"#start\").addEventListener(\"click\"\
  ,\n                         Starttracking);\n                     // 为按钮添加事件处理程序。\n\
  \                     document.querySelector(\"#stop\").addEventListener(\"click\"\
  ,\n                         Stoptracking);\n                 }));\n        }\n \
  \   };\n    var geolocation = null;\n    // 开始追踪\n    function Starttracking() {\n\
  \        if (geolocation == null)\n        {\n            geolocation = new Windows.Devices.Geolocation.Geolocator();\n\
  \            geolocation.reportInterval = 100;\n        }\n        if (geolocation\
  \ != null)\n        {\n            geolocation.addEventListener(\"positionchanged\"\
  , onPositionChanged);\n            geolocation.addEventListener(\"statuschanged\"\
  , onStatusChanged);\n        }\n    }\n    // 当地理位置改变时，更新用户界面\n    function onPositionChanged(args)\
  \ {\n        document.getElementById('latitude').innerHTML = args.position.coordinate.point.position.latitude;\n\
  \        document.getElementById('longitude').innerHTML = args.position.coordinate.point.position.longitude;\n\
  \        document.getElementById('accuracy').innerHTML = args.position.coordinate.accuracy;\n\
  \    }\n    // 停止追踪\n    function Stoptracking()\n    {\n        if (geolocation\
  \ != null) {\n            geolocation.removeEventListener(\"positionchanged\", onPositionChanged);\n\
  \        }\n    }\n    // 状态改变方法的事件处理程序。\n    function onStatusChanged(args) {\n\
  \        var Status = args.status;\n        document.getElementById('Status').innerHTML\
  \ =\n            getStatus(Status);\n    }\n    // 获取状态\n    function getStatus(Status)\
  \ {\n        switch (Status) {\n            case Windows.Devices.Geolocation.PositionStatus.ready:\n\
  \                return \"就绪\";\n                break;\n            case Windows.Devices.Geolocation.PositionStatus.initializing:\n\
  \                return \"正在初始化\";\n                break;\n            case Windows.Devices.Geolocation.PositionStatus.disabled:\n\
  \                return \"位置功能已禁用。请检查您的设备或 Appxmanifest 文件中的位置设置\";\n          \
  \      break;\n            case Windows.Devices.Geolocation.PositionStatus.notInitialized:\n\
  \                return \"未初始化\";\n            default:\n                return\
  \ \"状态未知\";\n        }\n    }\n    app.oncheckpoint = function (args) {\n    };\n\
  \    app.start();\n})();\n```\n\n第一步是添加“开始追踪”和“停止追踪”按钮的点击事件处理程序。使用 `document.querySelector`\
  \ 来添加事件监听器。\n\n```javascript\ndocument.querySelector(\"#start\").addEventListener(\"\
  click\",Starttracking);\ndocument.querySelector(\"#stop\").addEventListener(\"click\"\
  ,Stoptracking);\n```\n\n在 `Starttracking` 方法中创建了一个新的 `Geolocator` 类实例，并设置了 `reportInterval`。`reportInterval`\
  \ 定义了位置更新之间的最小时间间隔，单位为毫秒。\n\n```javascript\ngeolocation = new Windows.Devices.Geolocation.Geolocator();\n\
  geolocation.reportInterval = 100;\n```\n\n将 `positionchanged` 和 `statuschanged`\
  \ 事件监听器添加到 `geolocation` 实例：\n\n```javascript\ngeolocation.addEventListener(\"positionchanged\"\
  , onPositionChanged);\ngeolocation.addEventListener(\"statuschanged\", onStatusChanged);\n\
  ```\n\n当位置发生变化时，会引发 `positionchanged` 事件。当 `Geolocator` 提供更新位置的能力发生变化时，会引发 `statuschanged`\
  \ 事件；例如，如果位置被禁用或初始化等。`getStatus` 方法根据 `Windows.Devices.Geolocation.PositionStatus`\
  \ 返回相应的消息。\n\n当您不再需要追踪位置时，只需移除 `positionchanged` 事件监听器，如下所示：\n\n```javascript\n\
  geolocation.removeEventListener(\"positionchanged\", onPositionChanged);\n```\n\n\
  现在，生成并在模拟器中运行该项目。\n\n在应用中，单击“开始追踪”按钮。应用通过 `Geolocator` 的 `Onpositionchanged` 事件订阅位置更新，并显示位置信息（见图\
  \ 12-5）。\n\n![A978-1-4842-0719-2_12_Fig5_HTML.jpg](img/A978-1-4842-0719-2_12_Fig5_HTML.jpg)\n\
  \n**图 12-5.** 使用 Windows Mobile 模拟器的附加工具进行位置更新\n\n当使用“本地计算机”选项在 Windows 桌面上运行该应用时，您将看到如图\
  \ 12-6 所示的屏幕。\n\n![A978-1-4842-0719-2_12_Fig6_HTML.jpg](img/A978-1-4842-0719-2_12_Fig6_HTML.jpg)\n\
  \n**图 12-6.** 使用“本地计算机”选项在 Windows 桌面进行位置更新\n\n> **注意**  \n> 如图 12-5 所示，Windows\
  \ Mobile 模拟器提供了附加工具，让开发者在开发期间测试基于位置的应用。\n\n## 12.3 使用 HTML5 检测用户位置\n\n### 问题\n\n\
  您不知道自己身在何处。Windows 应用需要确定并显示您当前的位置。\n\n### 解决方案\n\n除了 Windows 运行时 API 之外，WinJS 应用还可以利用\
  \ W3C Geolocation API，通过 HTML5 从 Windows 应用中检测用户的当前位置。\n\n\n\n### 工作原理\n\n创建一个新的通用\
  \ Windows 项目，使用可以在 Microsoft Visual Studio 2015 的新建项目对话框中的 JavaScript ➤ Windows\
  \ ➤ Universal 节点下找到的通用 Windows 模板。这会在 Visual Studio 解决方案中创建一个单一项目，其中包含开始所需的必要文件。在应用中集成位置功能的第一步是在\
  \ Windows 应用的 `package.appxmanifest` 文件中声明位置功能。在 Visual Studio 解决方案资源管理器中，双击 `package.appxmanifest`\
  \ 文件。在 GUI 设计器中，点击“功能”选项卡并选择“位置”。\n\n打开 Windows 应用的 `default.html` 文件，并在文件的 `body`\
  \ 标签下添加以下代码。\n\n```\n<h1>使用 HTML5 获取当前位置</h1>\n<button id=\"btnLocation\">获取位置</button>\
  \ <br />\n<label>纬度</label> <div id=\"latitude\"></div><br />\n<label>经度</label>\
  \ <div id=\"longitude\"> </div><br />\n<div id=\"status\"> </div><br />\n```\n\n\
  打开项目中的 `default.js`（`/js/default.js`）。将文件中的代码替换为以下内容：\n\n```\n(function () {\n \
  \   \"use strict\";\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
  \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
  \                done(function () {\n                    // 为按钮添加事件处理程序。\n     \
  \               document.querySelector(\"#btnLocation\").addEventListener(\"click\"\
  ,\n                        GetLocation);\n                }));\n        }\n    };\n\
  \    var nav = null;\n    function GetLocation() {\n        if (nav == null) {\n\
  \            nav = window.navigator;\n        }\n        var geoloc = nav.geolocation;\n\
  \        if (geoloc != null) {\n            geoloc.getCurrentPosition(Onsuccess,\
  \ Onerror);\n        }\n    }\n    // 获取位置信息后\n    function Onsuccess(position)\
  \ {\n        document.getElementById(\"latitude\").innerHTML =\n            position.coords.latitude;\n\
  \        document.getElementById(\"longitude\").innerHTML =\n            position.coords.longitude;\n\
  \    }\n    // 尝试获取位置时出错\n    function Onerror(error) {\n        var errorMessage\
  \ = \"\";\n        switch (error.code) {\n            case error.PERMISSION_DENIED:\n\
  \                errorMessage = \"位置已禁用\";\n                break;\n           \
  \ case error.POSITION_UNAVAILABLE:\n                errorMessage = \"数据不可用\";\n\
  \                break;\n            case error.TIMEOUT:\n                errorMessage\
  \ = \"超时错误\";\n                break;\n            default:\n                break;\n\
  \        }\n        document.getElementById(\"status\").innerHTML = errorMessage;\n\
  \    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n})();\n\
  ```\n\n为“获取位置”按钮添加点击事件处理器。使用 `document.querySelector` 获取按钮控件，并使用 `addEventListener`\
  \ 方法添加点击事件并将其映射到 `GetLocation` 方法。\n\n```\ndocument.querySelector(\"#btnLocation\"\
  ).addEventListener(\"click\",\n                         GetLocation);\n```\n\n使用\
  \ `window.navigator.geolocation` 类的 `getCurrentPosition` 方法获取用户当前的位置。\n\n```\nif\
  \ (nav == null) {\n            nav = window.navigator;\n        }\n        var geoloc\
  \ = nav.geolocation;\n        if (geoloc != null) {\n            geoloc.getCurrentPosition(Onsuccess,\
  \ Onerror);\n        }\n```\n\n成功获取当前位置后，控制权移交给 `Onsuccess` 方法来处理坐标并显示它。如果发生错误，则调用\
  \ `Onerror` 方法，该方法在获取位置信息出现问题时显示错误消息。\n\n在本地计算机上生成并运行项目。\n\n点击应用中的“获取位置”按钮，如图 12-7\
  \ 所示。应用会立即提示用户允许应用使用位置 API。点击“允许”后，您应该会立即看到当前位置的纬度和经度。\n\n![A978-1-4842-0719-2_12_Fig7_HTML.jpg](img/A978-1-4842-0719-2_12_Fig7_HTML.jpg)\n\
  \n**图 12-7.** 使用 HTML5 获取 Windows 应用商店应用中的当前位置\n\n**注意**\n\nW3C 地理定位 API 目前仅适用于\
  \ Windows 桌面设备系列应用。当您在 Windows Mobile 模拟器上运行时，状态将显示为“已禁用”。\n\n## 12.4 使用 HTML5 检测位置更新\n\
  \n### 问题\n\n您希望频繁检查应用中的位置是否有任何变化。\n\n### 解决方案\n\n您可以在 HTML5 中使用 W3C 地理定位 API 来检测\
  \ Windows 应用中的位置变化。\n\n\n\n### 工作原理\n\n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板位于\
  \ Microsoft Visual Studio 2015 的“新建项目”对话框中的 JavaScript ➤ Windows ➤ Universal 节点下。这会在\
  \ Visual Studio 解决方案中创建一个单一项目，其中包含开始所需的必要文件。\n\n在应用中集成定位功能的第一步是在 Windows 应用的 `package.appxmanifest`\
  \ 文件中声明位置功能。从 Visual Studio 解决方案资源管理器中，双击 `package.appxmanifest` 文件。在 GUI 设计器中，点击“功能”选项卡，然后勾选“位置”。\n\
  \n打开 Windows 应用的 `default.html` 文件，并在文件的 body 标签下添加以下代码：\n```\n<h1>使用 HTML5 获取当前位置</h1>\n\
  <button id=\"btnstart\">开始</button> <button id=\"btnstop\">停止</button> <br />\n\
  <label>纬度</label> <div id=\"latitude\"></div><br />\n<label>经度</label> <div id=\"\
  longitude\"> </div><br />\n<div id=\"status\"> </div><br />\n```\n\n打开 Windows 项目中的\
  \ `default.js`（`/js/default.js`）文件，并将文件中的代码替换为以下内容：\n```\n(function () {\n    \"\
  use strict\";\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
  \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
  \                done(function () {\n                    document.querySelector(\"\
  #btnstart\").addEventListener(\"click\",\n                        starttracking);\n\
  \                    document.querySelector(\"#btnstop\").addEventListener(\"click\"\
  ,\n                        stoptracking);\n                }));\n        }\n   \
  \ };\n    var geolocation = null;\n    var positionInstance;\n    // 点击开始追踪按钮时\n\
  \    function starttracking() {\n        if (geolocation == null) {\n          \
  \  geolocation = window.navigator.geolocation;\n        }\n        if (geolocation\
  \ != null) {\n            positionInstance = geolocation.watchPosition(onsuccess,\
  \ onerror);\n        }\n    }\n    // 点击停止追踪按钮时\n    function stoptracking() {\n\
  \        geolocation.clearWatch(positionInstance);\n    }\n    // 获取位置成功时\n    function\
  \ onsuccess(pos) {\n        document.getElementById('latitude').innerHTML = pos.coords.latitude;\n\
  \        document.getElementById('longitude').innerHTML = pos.coords.longitude;\n\
  \    }\n    // 尝试获取位置出错时\n    function Onerror(error) {\n        var errorMessage\
  \ = \"\";\n        switch (error.code) {\n            case error.PERMISSION_DENIED:\n\
  \                errorMessage = \"位置功能已禁用\";\n                break;\n         \
  \   case error.POSITION_UNAVAILABLE:\n                errorMessage = \"数据不可用\";\n\
  \                break;\n            case error.TIMEOUT:\n                errorMessage\
  \ = \"超时错误\";\n                break;\n            default:\n                break;\n\
  \        }\n        document.getElementById(\"status\").innerHTML = errorMessage;\n\
  \    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n})();\n\
  ```\n\n为“开始追踪”和“停止追踪”按钮添加点击事件处理程序。使用 `document.querySelector` 获取按钮控件，并使用 `addEventListener`\
  \ 方法为追踪按钮添加点击事件。追踪由 `window.navigator.geolocation` 类的 `watchPosition` 方法处理，如下所示：\n\
  ```\nif (geolocation == null) {\n    geolocation = window.navigator.geolocation;\n\
  }\nif (geolocation != null) {\n    positionInstance = geolocation.watchPosition(onsuccess,\
  \ onerror);\n}\n```\n当获取到坐标时，会调用 `Onsuccess` 方法，该方法用于处理结果并显示。如果获取位置时出现任何问题，则会调用\
  \ `Onerror` 方法，并附带相应的错误代码，开发者可以利用该错误代码为每个错误代码显示用户友好的消息。要停止追踪，需要通过提供最初使用 `watchPosition`\
  \ 函数获取的 `watchid` 参数来调用 `geolocation` 的 `clearWatch` 方法。\n```\ngeolocation.clearWatch(positionInstance);\n\
  ```\n\n在本地计算机上生成并运行该项目。\n\n在应用中，点击“开始”按钮。应用会立即提示用户允许该应用使用位置 API。一旦点击“允许”，您应立即看到当前位置的纬度和经度，并且位置追踪开始，如图\
  \ 12-8 所示。\n\n![A978-1-4842-0719-2_12_Fig8_HTML.jpg](img/A978-1-4842-0719-2_12_Fig8_HTML.jpg)\n\
  \n**图 12-8.** 使用 HTML5 在 Windows 应用商店应用中检测位置更新\n\n> **注意**\n> W3C Geolocation API\
  \ 目前仅适用于 Windows 桌面设备系列。它不受 Windows 10 Mobile 支持。\n\n## 12.5 在内置地图应用中显示地图\n\n###\
