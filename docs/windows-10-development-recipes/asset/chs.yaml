  \  - 解决方案\n  - 实现原理\n- 12.2 响应地理定位器位置更新\n  - 问题\n  - 解决方案\n  - 实现原理\n- [12.3 使用\
  \ HTML5 检测用户位置](#A978-1-\n\n\n\n"
- "# 第一章：Windows 10 应用程序入门\n\nWindows 10 是微软于 2015 年 7 月 29 日发布的新操作系统。自 Windows 8.1\
  \ 以来，人们一直翘首以盼。对于应用程序开发者（应用商店和手机）来说，Windows 8.1 和 Visual Studio 2013 提供了一个独特的编程模型，称为通用\
  \ Windows 8 应用程序。通用 Windows 应用程序能够通过共享的代码库同时面向 Windows 和 Windows Phone。随着 Windows\
  \ 10 的到来，它的目标超越了 Windows 和 Windows Phone，引入了一种名为通用 Windows 平台 (UWP) 的应用。借助这个新平台，您可以确保在各种设备上获得一致的核心\
  \ API 层。在 UWP 上开发的单个软件包可以安装到广泛的设备和设备系列上。设备系列包括桌面操作系统、移动操作系统（手机和平板电脑）、Xbox、物联网 (IoT)\
  \ 设备以及无头设备系列。这意味着您的应用程序可以在各种设备上运行，包括手机、平板电脑、个人电脑、Xbox 主机等等。本章将介绍 Windows 10 通用 Windows\
  \ 平台应用程序开发。\n\n## 1.1 探究通用 Windows 平台\n\n### 问题\n\n您已决定开发一个面向个人电脑、手机、平板电脑和 Xbox\
  \ 的通用 Windows 平台应用程序。您想了解通用 Windows 平台——设备系列和通用控件。\n\n### 解决方案\n\n让我们来了解一下通用 Windows\
  \ 平台的一些亮点。\n\n#### 一个 Windows 平台\n\nWindows 10 带来了一个统一的 Windows 平台（见图 1-1）。在 Windows\
  \ 10 中，操作系统经过了重构，现在在不同的 Windows 10 平台之间拥有了一个通用核心。这意味着您拥有一个通用的 Windows 内核、一个文件 I/O\
  \ 栈和一个应用模型。简而言之，通用 Windows 平台是契约和版本的集合。在开发适用于 Windows Phone 8.1 和 Windows 8.1 的应用程序时，您必须面向特定的操作系统——Windows\
  \ 或 Windows Phone；而对于通用 Windows 平台应用，您面向的是设备。\n\n![A978-1-4842-0719-2_1_Fig1_HTML.jpg](img/A978-1-4842-0719-2_1_Fig1_HTML.jpg)\n\
  \n图 1-1. 通用 Windows 平台应用模型\n\nUWP 应用可以运行在多种具有不同外形和输入机制的设备上。在开发 UWP 应用时，您需要确保针对每种设备量身打造体验，并充分利用各自设备的功能。Windows\
  \ 10 上存在一个通用核心或内核。每个设备都会在基础层上添加自己的 API。因此，要访问设备的独有 API，您需要编写条件代码，以便在应用中提供设备特定的功能。\n\
  \n#### 设备系列\n\nWindows 和 Windows Phone 是开发者针对 Windows 8.1 和 Windows Phone 8 应用程序进行开发的操作系统。但是，随着\
  \ Windows 10 现在可在各种设备上使用，UWP 应用面向的是特定的设备系列。设备系列定义了同一系列内各个设备共有的 API、特性和行为。它还决定了应用可以安装到哪些设备上。图\
  \ 1-2 展示了设备系列的层次结构。\n\n![A978-1-4842-0719-2_1_Fig2_HTML.jpg](img/A978-1-4842-0719-2_1_Fig2_HTML.jpg)\n\
  \n图 1-2. 通用设备系列层次结构\n\n一组 API 拥有一个名称和一个版本号。这是设备系列操作系统的基础。例如，个人电脑运行桌面操作系统，并基于桌面设备系列。另一方面，手机和平板电脑拥有基于移动设备系列的移动操作系统。希望您现在对设备系列有了一个概念。\n\
  \n#### 通用控件\n\n通过 UWP，应用可以在不同的外形尺寸、屏幕分辨率、DPI 以及其他设备特性上运行。应用必须适应这些不同的外形和分辨率。Windows\
  \ 10 提供了新的通用控件、布局和工具，这些将帮助您根据应用运行的设备来调整应用 API。Windows 10 包含新的控件，例如 Calendar 和 Split\
  \ View。原本专用于 Windows Phone 应用的 Pivot 控件，现在也可用于通用 Windows 平台应用。\n\n#### 通用输入处理\n\n\
  对于 UWP 应用，通用控件现在支持各种输入方式，例如鼠标、键盘、触摸、触控笔和控制器（例如 Xbox 控制器）。该平台提供了一些核心 API，可在您的应用中使用来处理各种输入。以下是一些可用的输入\
  \ API。\n\n*   `CoreInput`：允许您使用原始输入。\n*   `PointerInput`：将原始触摸、鼠标和触控笔统一到一个一致的界面中。\n\
  *   `PointerDevice`：一种设备 API，允许您查询设备功能以了解可用的输入类型。\n\n## 1.2 通用 Windows 平台的开发工具\n\
  \n### 问题\n\n您想开始开发通用 Windows 平台应用。您想知道应该使用哪些工具进行开发。\n\n### 解决方案\n\n您的开发机器上需要安装 Windows\
  \ 10 操作系统和 Visual Studio 2015 Community 版。\n\n要安装 Windows 10，请访问微软网站 [`http://windows.microsoft.com/en-us/windows/buy`](http://windows.microsoft.com/en-us/windows/buy)。如果您已经在使用任何\
  \ Windows 操作系统，您都可以免费升级到 Windows 10。\n\n要安装 Visual Studio 2015 (VS 2015) Community\
  \ 版，您可以访问微软网站 [`https://www.visualstudio.com/en-us/downloads/visual-studio-2015-downloads-vs`](https://www.visualstudio.com/en-us/downloads/visual-studio-2015-downloads-vs)。安装\
  \ VS 2015 时，您需要确保选中了通用 Windows 应用开发工具（见图 1-3）。这位于可选功能列表中。\n\n![A978-1-4842-0719-2_1_Fig3_HTML.jpg](img/A978-1-4842-0719-2_1_Fig3_HTML.jpg)\n\
  \n图 1-3. Visual Studio 2015 Community 版安装\n\n## 1.3 创建通用 Windows 平台应用程序\n\n### 问题\n\
  \n您想创建一个简单的通用 Windows 平台应用程序。\n\n### 解决方案\n\nVisual Studio 2015 附带了一个预安装的通用 Windows\
  \ 平台应用程序项目模板。您将使用此模板来创建您的第一个应用程序。\n\n\n\n### 工作原理\n\n让我们看看如何使用 Visual Studio 2015\
  \ 创建一个新的通用 Windows 平台应用。\n\n打开 Visual Studio 2015 Community 版本。选择 **文件 ➤ 新建项目**。在\
  \ **新建项目** 对话框窗口中，从 **已安装模板** 部分选择 **模板 ➤ JavaScript ➤ Windows ➤ 通用**。从可用的项目模板中选择\
  \ **空白应用（通用 Windows）**（见图 1-4）。为应用提供名称和位置，然后点击 **确定**。\n\n![A978-1-4842-0719-2_1_Fig4_HTML.jpg](img/A978-1-4842-0719-2_1_Fig4_HTML.jpg)\n\
  \n**图 1-4.** 新建项目模板\n\nVisual Studio 将准备该项目。图 1-5 显示了新的解决方案的外观。\n\n![A978-1-4842-0719-2_1_Fig5_HTML.jpg](img/A978-1-4842-0719-2_1_Fig5_HTML.jpg)\n\
  \n**图 1-5.** 解决方案资源管理器\n\n作为项目模板的一部分，你会获得 `css`、`images`、`js` 和 `WinJS` 文件夹。你还会有一个预先创建的\
  \ `default.html` 页面来开始工作。\n\n*   `css` 文件夹用于存放你的自定义样式表（`.css` 文件）。\n*   `images`\
  \ 文件夹包含你希望在应用中使用的任何图像。\n*   `js` 是 JavaScript 文件夹，用于存放与应用相关的 `js` 文件。你会看到预先创建的 `default.js`\
  \ 文件，其中包含以下代码。\n\n```\n(function () {\n    \"use strict\";\n    var app = WinJS.Application;\n\
  \    var activation = Windows.ApplicationModel.Activation;\n    app.onactivated\
  \ = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n            if (args.detail.previousExecutionState !==\n            activation.ApplicationExecutionState.terminated)\
  \ {\n                //应用初始化代码\n            } else {\n                //恢复应用会话状态\n\
  \            }\n            args.setPromise(WinJS.UI.processAll());\n        }\n\
  \    };\n    app.oncheckpoint = function (args) {\n        //在此处保存任何应用状态\n    };\n\
  \    app.start();\n})();\n```\n\n该代码创建了一个 `WinJS.Application` 对象实例并启动应用。\n\n在**解决方案资源管理器**中双击\
  \ `default.html` 文件将其打开。以下是你在文件中看到的默认代码：\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n\
  \    <meta charset=\"utf-8\" />\n    <title>Ch1R3</title>\n    <link href=\"WinJS/css/ui-dark.css\"\
  \ rel=\"stylesheet\" />\n    <script src=\"WinJS/js/basejs\"></script>\n    <link\
  \ href=\"/css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"\
  ></script>\n</head>\n<body class=\"win-type-body\">\n    <p>Content goes here</p>\n\
  </body>\n</html>\n```\n\n它几乎是空的，只有一行文本写着“内容写在这里”。将此文本替换为“Hello World!”。这将是我们使用 UWP\
  \ 的 Hello World 应用 ☺。\n\n按下键盘上的 **Ctrl+Shift+B** 或选择 **生成 ➤ 生成解决方案**。Visual Studio\
  \ 将生成该项目。\n\n## 1.4 运行通用 Windows 平台应用\n\n### 问题\n\n你已创建了一个新的 UWP 应用，并且希望运行该应用以查看其实际效果。你想知道如何操作。\n\
  \n### 解决方案\n\nVisual Studio 2015 提供了多种运行 UWP 应用的选项：\n\n*   在 Windows Phone 10 模拟器上运行应用\n\
  *   在 Windows 10 模拟器上运行应用\n*   在本地计算机上运行应用\n*   在设备上运行应用\n\n### 工作原理\n\n当你安装 Visual\
  \ Studio 2015 时，它还会安装 Windows Phone 10 模拟器和 Windows 10 模拟器。这些模拟器模拟了 Windows Phone\
  \ 和 Windows 中的不同设备和屏幕尺寸。Visual Studio 2015 允许你选择其中一个选项来部署你的应用。你也可以直接从 Visual Studio\
  \ 将应用部署到你的机器上，并作为本地应用运行。让我们逐一查看所有这些选项。\n\n#### 在 Windows Phone 10 模拟器上运行应用\n\n在\
  \ Visual Studio 中，从目标组合框中选择一个可用的 Windows 10 模拟器。图 1-6 显示了可用的模拟器列表。\n\n![A978-1-4842-0719-2_1_Fig6_HTML.jpg](img/A978-1-4842-0719-2_1_Fig6_HTML.jpg)\n\
  \n**图 1-6.** 目标 Windows Phone 10 模拟器\n\n按下 **F5** 在选定的 Windows Phone 10 模拟器上运行应用。图\
  \ 1-7 显示了 4 英寸 Windows Phone 10 上的屏幕截图。\n\n![A978-1-4842-0719-2_1_Fig7_HTML.jpg](img/A978-1-4842-0719-2_1_Fig7_HTML.jpg)\n\
  \n**图 1-7.** Windows Phone 10 模拟器上的 UWP 应用\n\n#### 在 Windows 10 模拟器上运行应用\n\n在 Visual\
  \ Studio 中，从目标组合框中选择**模拟器**。此选项允许你将应用部署到 Windows 10 模拟器（见图 1-8）。\n\n![A978-1-4842-0719-2_1_Fig8_HTML.jpg](img/A978-1-4842-0719-2_1_Fig8_HTML.jpg)\n\
  \n**图 1-8.** 目标 Windows 10 模拟器\n\n按下 **F5** 在 Windows 10 模拟器上运行应用。图 1-9 是应用在模拟器上外观的屏幕截图。\n\
  \n![A978-1-4842-0719-2_1_Fig9_HTML.jpg](img/A978-1-4842-0719-2_1_Fig9_HTML.jpg)\n\
  \n**图 1-9.** Windows 10 模拟器上的 UWP 应用\n\n#### 在本地计算机上运行应用\n\n通常，Windows 10 应用需要从\
  \ Windows 商店下载然后安装到你的计算机上。但此工作流仅适用于最终用户，不适用于开发人员。在应用开发期间，开发人员可以直接在其开发机器上部署和运行自己的应用。\n\
  \n在本地计算机上运行应用之前，你需要启用所谓的**开发人员模式**。\n\n在你的计算机上，转到 **设置 ➤ 更新和安全 ➤ 针对开发人员**，如图 1-10\
  \ 所示。\n\n选择 **开发人员模式** 单选按钮。\n\n![A978-1-4842-0719-2_1_Fig10_HTML.jpg](img/A978-1-4842-0719-2_1_Fig10_HTML.jpg)\n\
  \n**图 1-10.** 开发人员功能设置\n\n在 Visual Studio 中，从目标组合框中选择**本地计算机**，如图 1-11 所示。\n\n![A978-1-4842-0719-2_1_Fig11_HTML.jpg](img/A978-1-4842-0719-2_1_Fig11_HTML.jpg)\n\
  \n**图 1-11.** 目标本地计算机\n\n按下 **F5** 在你的开发机器上运行应用。图 1-12 是应用在本地计算机上运行的屏幕截图。\n\n![A978-1-4842-0719-2_1_Fig12_HTML.jpg](img/A978-1-4842-0719-2_1_Fig12_HTML.jpg)\n\
  \n**图 1-12.** 本地计算机上的 UWP 应用\n\n#### 在设备上运行应用\n\n如果你有 Windows 10 Mobile 设备，你可以直接在其上部署和运行你的\
  \ UWP 应用。但是，在你可以直接从 Visual Studio 将应用部署到设备之前，你需要启用你的手机以允许在开发期间安装应用。这也称为旁加载应用。此模式称为**开发人员模式**，并且是手机设置。在你的\
  \ Windows Phone 10 设备上，转到 **设置 ➤ 更新和安全 ➤ 针对开发人员**。选择**开发人员模式**，如图 1-13 所示。完成此步骤后，你的应用就可以直接从\
  \ Visual Studio 部署到你的设备上。\n\n![A978-1-4842-0719-2_1_Fig13_HTML.jpg](img/A978-1-4842-0719-2_1_Fig13_HTML.jpg)\n\
  \n**图 1-13.** Windows Phone 设备上的开发人员模式设置\n\n在 Visual Studio 中，选择**设备**作为你的目标，如图\
  \ 1-14 所示。\n\n![A978-1-4842-0719-2_1_Fig14_HTML.jpg](img/A978-1-4842-0719-2_1_Fig14_HTML.jpg)\n\
  \n**图 1-14.** 目标设备\n\n接下来，按下 **F5** 在你的设备上运行应用。输出应与你在模拟器中看到的类似。\n\n\n\n"
- "# 第 2 章：WinJS 基础\n\n当使用平台库构建应用时，理解该库提供的功能至关重要。在本章中，你将了解 WinJS 为使用 JavaScript、HTML\
  \ 和 CSS 构建 Windows 运行时应用所提供的各种功能。这些功能包括命名空间、模块、承诺和查询选择器。几乎在你使用 WinJS 构建的所有应用程序中都会用到这些功能。通过利用命名空间和模块等特性，你可以让应用更易于维护，而不是将所有内容都添加到全局命名空间下。\n\
  \n## 2.1 JavaScript 中的命名空间\n\n### 问题\n\n在使用 WinJS 库进行开发时，你需要对通用功能进行分组，并防止 JavaScript\
  \ 代码中出现命名冲突。\n\n### 解决方案\n\n命名空间允许开发者更好地对通用功能进行分组或组织。其他编程语言——C#、VB.NET、Java 等——都提供了这一特性。许多\
  \ JavaScript 框架不支持命名空间，但 WinJS 提供了一项功能，开发者可以在其项目中使用命名空间。当你的应用使用了由不同开发者编写的多个库时，命名空间尤其有用。\n\
  \n开发者可以使用 `WinJS.Namespace.define` 方法来声明一个命名空间。\n\n### 工作原理\n\nWinJS 库允许开发者通过使用\
  \ `WinJS.Namespace.define` 方法来声明命名空间。\n\n`WinJS.Namespace.define` 方法接受两个参数。\n\n\
  *   `Name`：这是第一个参数，代表新命名空间的名称。\n*   `Members`：这是第二个参数，完全是可选的。此参数代表需要添加到所定义命名空间中的对象列表。\n\
  \n以下是使用 WinJS 在 Windows 应用商店通用应用中创建新命名空间的步骤。\n\n启动 Visual Studio 2015，然后选择“文件”➤“新建项目”。在“新建项目”对话框中，从“已安装的模板”侧边栏中选择“JavaScript”➤“Windows”➤“通用”。选择“空白应用(通用\
  \ Windows)”模板，并将项目命名为 `ch2.1WinJSFundamentals`。单击“确定”按钮。这会在 Visual Studio 解决方案中创建必要的文件。\n\
  \n在 `ch2.1WinJSFundamentals` 项目中添加一个新的 JavaScript 文件，方法是右键单击项目的 `js` 文件夹，然后选择“添加”➤“新建项”。从“添加新项”对话框中选择“JavaScript\
  \ 文件”，并将文件命名为 `WinJSFundamentals.js`。将以下代码添加到该文件中。\n\n```\n// 定义命名空间 Developerpublish\n\
  WinJS.Namespace.define(\"DeveloperPublish\");\n// 在 DeveloperPublish 命名空间中创建的工具\n\
  DeveloperPublish.Utilities = {\n    DisplayMessage: function () {\n        return\
  \ \"来自 DeveloperPublish 命名空间的消息\";\n    }\n};\n// 定义命名空间 Apress 并在其下创建工具。\nWinJS.Namespace.define(\"\
  Apress\",\n    {\n        Utilities: {\n            DisplayMessage: function ()\
  \ {\n                return \"来自 Apress 命名空间的消息\";\n            }\n        }\n \
  \   });\nconsole.log(DeveloperPublish.Utilities.DisplayMessage());\nconsole.log(Apress.Utilities.DisplayMessage());\n\
  ```\n\n在上面的代码片段中，`DeveloperPublish` 命名空间演示了仅使用一个参数调用 `WinJS.Namespace.define` 方法的用法。对象被添加到命名空间中，形式为“命名空间.对象名称”。\n\
  \n`Apress` 命名空间是使用两个参数创建的。第一个参数是命名空间的名称 `Apress`；而第二个参数是作为 `Apress` 命名空间一部分的对象。\n\
  \n打开 `default.html` 页面，并使用以下代码片段添加对 `WinJSFundamentals.js` 文件的引用：`<script src=\"\
  js/WinJSFundamentals.js\"></script>`\n\n运行 Windows 应用。你会注意到，`Utilities` 类的 `DisplayMessage`\
  \ 返回的字符串显示在控制台窗口中，如图 2-1 所示。\n\n![A978-1-4842-0719-2_2_Fig1_HTML.jpg](img/A978-1-4842-0719-2_2_Fig1_HTML.jpg)\n\
  \n图 2-1. 在 Visual Studio 2015 控制台窗口中显示字符串\n\n`WinJS.Namespace` 是默认的命名空间，它提供了诸如以下功能：\n\
  \n*   `promise` 对象\n*   用于定义命名空间、`log` 和 `xhr` 的函数\n\n以下是 `WinJS.Namespace` 中的对象和函数：\n\
  \n*   `promise`：此对象提供了在 JavaScript 代码中实现异步编程的机制。\n*   `validation`：可以设置此属性来显示验证结果。\n\
  *   `define`：此函数使用指定的名称定义一个新的命名空间。\n*   `defineWithParent`：此函数在指定的父命名空间下使用指定的名称定义一个命名空间。\n\
  *   `log`：此函数将输出写入 Visual Studio 2015 中的 JavaScript 控制台窗口。\n*   `xhr`：此函数将对 `XMLHttpRequest`\
  \ 的调用封装在一个承诺中。\n\n请注意，你不应在命名空间定义之前引用它。当你尝试在命名空间定义之前访问它时，你会收到“命名空间未定义”的错误。\n\nWinJS\
  \ 库中包含命名空间功能，以便更好地处理与作用域相关的问题。WinJS 中命名空间实现的源代码位于你项目 `WinJS/js` 文件夹下的 `base.js`\
  \ 文件中。\n\n## 2.2 向现有命名空间添加子命名空间\n\n### 问题\n\n你需要向现有命名空间添加一个子命名空间，并定义你的功能。\n\n###\
  \ 解决方案\n\n使用 `WinJS.Namespace.defineWithParent` 方法向 WinJS 中的现有命名空间添加子命名空间。\n\n###\
  \ 工作原理\n\n`WinJS.Namespace.defineWithParent` 方法允许开发者向现有命名空间添加一个新命名空间。这类似于 `define`\
  \ 方法；它允许你在现有命名空间下创建一个新命名空间。\n\n`WinJS.Namespace.defineWithParent` 方法接受三个参数：\n\n\
  *   父命名空间：第一个参数是父命名空间的名称。\n*   Name：这是要添加到父命名空间中的子命名空间的名称。\n*   Members：要添加到新命名空间中的对象列表。这是一个可选参数。\n\
  \n让我们使用在方案 2.1 中创建的项目。打开项目中的 `WinJSFundamentals.js` 文件，并将其替换为以下代码片段。\n\n```\nWinJS.Namespace.define(\"\
  Apress\");\nWinJS.Namespace.defineWithParent(Apress, \"Books\" ,\n    {\n      \
  \  Utilities :\n            {\n                DisplayMessage: function () {\n \
  \                   return \"来自 Apress.Books 命名空间的消息\";\n                }\n   \
  \         }\n    }\n);\nconsole.log(Apress.Books.Utilities.DisplayMessage());\n\
  ```\n\n运行 Windows 应用商店项目，你应该会看到字符串“来自 Apress.Books 命名空间的消息”显示在 Visual Studio JavaScript\
  \ 控制台窗口中，如图 2-2 所示。\n\n![A978-1-4842-0719-2_2_Fig2_HTML.jpg](img/A978-1-4842-0719-2_2_Fig2_HTML.jpg)\n\
  \n图 2-2. 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示字符串\n\n请注意，命名空间应仅包含类、函数、常量和其他命名空间。\n\
  \n## 2.3 在 WinJS 中创建类\n\n### 问题\n\n你需要在 Windows 运行时应用的 JavaScript 代码中创建一个类。\n\n\
  ### 解决方案\n\n使用 `WinJS.Class.define` 方法在 WinJS 中创建一个类。\n\n\n\n### 工作原理\n\nC# 和 VB.NET\
  \ 是面向对象的语言。它们对语言中的面向对象概念有良好的实现和支持；其中一项功能就是类的创建。而另一方面，JavaScript 本身并不内置对类创建的支持。在\
  \ JavaScript 中，所有事物都被视为对象。\n\n`WinJS` 允许开发者创建类并在其应用程序中使用这些类。\n\n你可以使用 `WinJS.Class.define`\
  \ 方法在 WinJS 中创建一个新类。\n\n`WinJS.Class.define` 方法接受三个参数。\n\n-   **构造函数**：第一个参数允许开发者初始化一个新对象。\n\
  -   **实例成员**：第二个参数是实例成员的集合，包括属性和方法。\n-   **静态成员**：第三个参数包括静态属性和静态方法。\n\n打开项目中的 `WinJSFundamentals.js`\
  \ 文件，并将其替换为以下代码片段。\n\n```\n// Create a class called Author\n\nvar Author = WinJS.Class.define(\n\
  \n    function (name, title) {\n\n        this.name = name;\n\n        this.title\
  \ = title;\n\n    },\n\n    {\n\n        _Name: undefined,\n\n        _title: undefined,\n\
  \n        name : {\n\n            set :function(value)\n\n            {\n\n    \
  \            this._Name = value;\n\n            },\n\n            get :function()\n\
  \n            {\n\n                return this._Name;\n\n            }\n\n     \
  \   },\n\n        title : {\n\n            set :function(value)\n\n            {\n\
  \n                this._title = value;\n\n            },\n\n            get :function()\n\
  \n            {\n\n                return this._title;\n\n            }\n\n    \
  \    }\n\n    });\n\n// instantiate the author class by invoking the constructor\
  \ with 2 parameters\n\nvar author1 = new Author(\"Senthil\", \"WinJS recipes\");\n\
  \n// display the name and the title  in the console window.\n\nconsole.log(author1.name);\n\
  \nconsole.log(author1.title);\n```\n\n在上述代码片段中，`Author` 类是使用 `WinJS.Class.define`\
  \ 方法创建的。该方法的第一个参数是构造函数，它接受两个参数并初始化 `name` 和 `title`。\n\n`Author` 类有两个属性。\n\n-  \
  \ `title` 及其后备字段 `_title`\n-   `name` 及其后备字段 `_name`\n\n这两个属性都包含一个 getter 方法和一个\
  \ setter 方法。例如，查看以下属性。\n\n```\ntitle : {\n\n            set :function(value)\n\n\
  \            {\n\n                this._title = value;\n\n            },\n\n   \
  \         get :function()\n\n            {\n\n                return this._title;\n\
  \n            }\n\n        }\n```\n\n`title` 属性有一个 `set` 方法，允许开发者设置该属性的值。同样，你可以使用带有\
  \ `get` 方法的 `title` 属性来检索 `_title` 的值。从开发者的角度来看，调用 `<PropertyName>` 对象就足以获取或设置值。\n\
  \n运行 Windows 项目。你将看到实例化对象时使用的名称和标题，如图 2-3 所示。\n\n![A978-1-4842-0719-2_2_Fig3_HTML.jpg](img/A978-1-4842-0719-2_2_Fig3_HTML.jpg)\n\
  \n**图 2-3.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示名称和标题\n\n`WinJS.Class` 命名空间提供了以下用于定义类的辅助函数。\n\
  \n-   `define`：该函数使用指定的构造函数和实例成员来定义一个类。\n-   `derive`：该函数通过原型继承为指定类创建一个子类。\n-  \
  \ `mix`：该函数使用指定的构造函数定义一个类，并合并所有混入对象指定的实例成员集合。\n\n## 2.4 在 WinJS 中派生类\n\n### 问题\n\
  \n你需要在 WinJS 应用程序中应用继承概念。\n\n### 解决方案\n\n使用 `WinJS.Class.derive` 方法在 WinJS 中从一个类派生另一个类。\n\
  \n### 工作原理\n\nWinJS 库提供了 `WinJS.Class.derive` 方法，允许开发者应用继承来从一个类派生另一个类。`WinJS.Class.derive`\
  \ 方法接受以下参数。\n\n-   **基类**：当前类需要继承的类。\n-   **构造函数**：此参数指向一个 `构造函数` 函数，可用于初始化类成员。\n\
  -   **实例成员**：此参数定义实例成员，包括属性和方法。\n-   **静态成员**：此参数定义静态属性和静态方法。\n\n打开 `WinJSFundamentals.js`\
  \ 文件并将代码替换为以下代码片段。\n\n```\n// Create a class called Employee\n\nvar Employee = WinJS.Class.define(\n\
  \n    function () {\n\n        this.name = name;\n\n        this.type = \"Employee\"\
  ;\n\n    },\n\n    {\n\n        _Name: undefined,\n\n        _type: undefined,\n\
  \n        name : {\n\n            set :function(value)\n\n            {\n\n    \
  \            this._Name = value;\n\n            },\n\n            get :function()\n\
  \n            {\n\n                return this._Name;\n\n            }\n\n     \
  \   },\n\n        type: {\n\n            set :function(value)\n\n            {\n\
  \n                this._type = value;\n\n            },\n\n            get :function()\n\
  \n            {\n\n                return this._type;\n\n            }\n\n     \
  \   }\n\n    });\n\nvar ContractEmployee = WinJS.Class.derive(Employee,\n\n    function\
  \ (name) {\n\n        this.name = name;\n\n        this.type = \"Contract Employee\"\
  ;\n\n    });\n\nvar ContractEmployee1 = new ContractEmployee(\"Senthil\");\n\n//\
  \ display the name and the title  in the console window.\n\nconsole.log(ContractEmployee1.name);\n\
  \nconsole.log(ContractEmployee1.type);\n```\n\n此代码片段创建了一个名为 `Employee` 的类。随后，创建了另一个名为\
  \ `ContractEmployee` 的类；它继承自 `Employee` 类。创建了一个合同员工实例，并在控制台窗口中显示了该员工的 `name` 和雇佣\
  \ `type`。\n\n从 Visual Studio 运行 Windows 应用商店项目。这将在 JavaScript 控制台窗口中显示名称和类型，如图 2-4\
  \ 所示。\n\n![A978-1-4842-0719-2_2_Fig4_HTML.jpg](img/A978-1-4842-0719-2_2_Fig4_HTML.jpg)\n\
  \n**图 2-4.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示名称和雇佣类型\n\n`WinJS.Class.derive`\
  \ 函数的行为类似于 `WinJS.Class.define` 函数，不同之处在于它使用基类的原型（通过 `Object.create` 函数）来构造派生类。`Object.create`\
  \ 方法通过原型化父对象从一个类型派生出另一个类型；它还会添加作为子对象一部分的属性。\n\n## 2.5 在 WinJS 中创建混入\n\n### 问题\n\n\
  你需要在不用 `WinJS.Class.derive` 方法的情况下组合多个 JavaScript 对象的方法和属性。\n\n### 解决方案\n\n使用 `WinJS.Class.mix`\
  \ 方法在 WinJS 中组合多个 JavaScript 对象的方法和属性。\n\n\n\n### 工作原理\n\n`WinJS.Class.derive`方法使用原型继承，有其自身的优点和缺点。它需要额外的处理时间并影响性能。这可以通过使用`WinJS.Class.mix`方法来克服。\n\
  \n`WinJS.Class.mix`方法接收两个参数。\n\n*   **构造函数**：第一个参数，用于初始化类成员。\n*   **混入（Mixin）**：第二个参数是包含混入方法的数组。\n\
  \n打开项目中的`WinJSFundamentals.js`文件，并用以下代码片段替换其内容。\n\n```javascript\n// Create a class\
  \ called Employee\nvar Employee = WinJS.Class.define(\n    function () {\n     \
  \   this.name = name;\n        this.type = \"Employee\";\n    },\n    {\n      \
  \  _Name: undefined,\n        _type: undefined,\n        name : {\n            set\
  \ :function(value)\n            {\n                this._Name = value;\n       \
  \     },\n            get :function()\n            {\n                return this._Name;\n\
  \            }\n        },\n        type: {\n            set :function(value)\n\
  \            {\n                this._type = value;\n            },\n          \
  \  get :function()\n            {\n                return this._type;\n        \
  \    }\n        }\n    });\nvar ContractEmployee = WinJS.Class.mix(\n    function\
  \ (name) {\n        this.name = name;\n        this.type = \"Contract Employee\"\
  ;\n    },Employee);\nvar ContractEmployee1 = new ContractEmployee(\"Senthil\");\n\
  // display the name and the title  in the console window.\nconsole.log(ContractEmployee1.name);\n\
  console.log(ContractEmployee1.type);\n```\n\n在此代码示例中，创建了一个`Employee`类，随后又创建了另一个名为`ContractEmployee`的类；它继承自`Employee`类。注意，这里使用了`mix`方法而不是`derive`方法。\n\
  \n代码看起来与使用`derive`方法的代码相似，但混入（mixin）增加了更多功能。其中一项功能就是对多重继承的支持。由于`mixin`方法中的第二个参数是一个混入数组，你可以让`ContractEmployee`类实现来自多个类的功能。\n\
  \n执行此程序时，你将看到员工的姓名和类型，如图 2-5 所示。\n\n![A978-1-4842-0719-2_2_Fig5_HTML.jpg](img/A978-1-4842-0719-2_2_Fig5_HTML.jpg)\n\
  \n**图 2-5.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示姓名和员工类型\n\n混入（Mixin）可用于为你的类型添加功能。混入通常包含已实现的函数，这些函数可以添加到\
  \ WinJS 的许多类型中。\n\n在 WinJS 中，你可以使用以下混入之一来管理事件以及进行绑定。\n\n*   `WinJS.Utilities.eventMixin`：此混入可用于为定义的任何类型添加事件管理功能。它包含诸如`WinJS.Utilities.eventMixin.addEventListener`、`WinJS.Utilities.eventMixin.removeEventListener`和`WinJS.Utilities.eventMixin.dispatchEvent`之类的函数，用于引发和处理你定义的自定义事件。\n\
  *   `WinJS.Binding.dynamicObservableMixin`：此函数用于添加绑定管理功能，开发者可以借此将用户定义的对象绑定到能够在其属性值更改时通知侦听器的控件上。\n\
  \n## 2.6 WinJS 中的封装\n\n### 问题\n\n你想要构建一个库，并且只希望向外部访问公开其中的少数方法。你需要支持 WinJS 应用程序中的封装。\n\
  \n### 解决方案\n\n利用函数和命名空间的功能来实现这一点。变量可以具有全局作用域或函数作用域。可以利用此特性在 JavaScript 中引入封装功能。\n\
  \n### 工作原理\n\n当你创建自己的 JavaScript 库时，你可能希望同时创建公有方法和私有方法。公有方法可以作为 API 公开，供第三方开发者使用。\n\
  \n问题在于 JavaScript 不支持访问修饰符。JavaScript 中的变量具有以下作用域。\n\n*   **全局作用域**：在整个应用程序中可用。\n\
  *   **函数作用域**：仅在函数内部可用。\n\n函数作用域特性被用于 WinJS 中，用来隐藏方法，使其具有一定程度的私有性。通过手动将方法添加到命名空间，可以将方法公开为公有方法。\n\
  \n想象一下，你正在编写一个跟踪页面浏览量并显示每千次展示成本 (CPM) 的库。你希望向用户公开`GetPageViews`方法，但不公开`GetCPMRate`方法。具体操作如下……\n\
  \n打开共享项目中的`WinJSFundamentals.js`文件，并用以下代码片段替换其内容。\n\n```javascript\n(function (global)\
  \ {\n    // public method\n    function GetPageViews()\n    {\n        return 1000;\n\
  \    }\n    //private method.\n    function GetCPMRate()\n    {\n        return\
  \ 1;\n    }\n    WinJS.Namespace.define(\"DeveloperPublish\",\n    {\n        GetPageViews:\
  \ GetPageViews\n    });\n})(this);\nconsole.log(DeveloperPublish.GetPageViews());\n\
  ```\n\n这个自执行的匿名函数包含两个方法：`GetPageViews`和`GetCPMRate`。`DeveloperPublish`命名空间用于暴露或导出`GetPageViews`函数，并为其提供公共访问权限。另一方面，`GetCPMRate`是私有方法。你可以在全局作用域方法内调用`GetCPMRate`方法，但不能通过`DeveloperPublish`命名空间调用。例如，以下代码片段演示了一个场景，其中`GetPageViews`和`GetTotalRate`函数通过`DeveloperPublish`命名空间暴露；而`GetCPMRate`仅在`GetTotalRate`内部使用。\n\
  \n```javascript\n(function (global) {\n    // public method\n    function GetPageViews()\
  \ {\n        return 1000;\n    }\n    //private method.\n    function GetCPMRate()\
  \ {\n        return 2;\n    }\n    function GetTotalRate() {\n        return GetPageViews()\
  \ * GetCPMRate();\n    }\n    WinJS.Namespace.define(\"DeveloperPublish\",\n   \
  \ {\n        GetPageViews: GetPageViews,\n        GetTotalRate: GetTotalRate\n \
  \   });\n})(this);\nconsole.log(DeveloperPublish.GetPageViews());\nconsole.log(DeveloperPublish.GetTotalRate());\n\
  ```\n\n运行 Windows 项目。在图 2-6 中，你会在 Visual Studio JavaScript 控制台窗口中看到`GetPageViews`方法显示\
  \ 1000。\n\n![A978-1-4842-0719-2_2_Fig6_HTML.jpg](img/A978-1-4842-0719-2_2_Fig6_HTML.jpg)\n\
  \n**图 2-6.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示字符串\n\n当你尝试在自执行匿名函数外部访问`GetCPMRate`方法时，会收到以下错误（另请参见图\
  \ 2-7）。\n\n![A978-1-4842-0719-2_2_Fig7_HTML.jpg](img/A978-1-4842-0719-2_2_Fig7_HTML.jpg)\n\
  \n**图 2-7.** 尝试访问私有方法时出错\n\n`0x800a1391: JavaScript runtime error: 'GetCPMRate'\
  \ is undefined.`\n\n这是一个有用的特性，特别是在构建库并希望限制对 WinJS 中某些方法的访问时。\n\n## 2.7 在 WinJS 中使用\
  \ Promise\n\n### 问题\n\n你需要异步执行代码，以便用户界面更具响应性。\n\n### 解决方案\n\n你可以在通用 Windows 应用中使用异步编程，以便某些方法的处理可以异步完成。这样，你的应用程序的\
  \ UI 线程将保持空闲，并能响应用户输入。\n\n\n\n### 工作原理\n\n在 WinJS 和通用 Windows 应用中，异步 API 以 promise\
  \ 的形式呈现。WinJS 中 promise 的常见实现之一是 `xhr` 函数，它将 `XMLHttpRequest` 封装在 promise 中。当你提供\
  \ URL 和响应类型时，`xhr` 函数会返回一个 promise，该 promise 通过返回数据来实现，如果失败则返回错误。\n\n在本教程中，你将构建一个简单的应用，它接受\
  \ URL 作为输入并尝试连接。结果将基于连接显示成功或失败。\n\n在 Visual Studio 2015 中，启动上一个教程中构建的现有通用 Windows\
  \ 应用。打开 `default.html` 页面，并在 body 部分添加以下 `div` 元素。这会在 `inputurl` 文本框中接受 URL，并在输出\
  \ `div` 标签中显示状态。\n\n```html\n<div>\n    <input id=\"inputurl\"/>\n</div>\n<div id=\"\
  output\">\n</div>\n```\n\n你需要为输入元素添加 change 事件处理程序，该处理程序应在用户输入文本并按 Enter 键时触发。你可以将其添加到\
  \ `default.js` 文件中 `app.onactivated` 事件处理程序内的 `WinJS.Utilities.ready` 函数中，如下所示。\n\
  \n```javascript\nWinJS.Utilities.ready(function () {\n    var input = document.getElementById(\"\
  inputurl\");\n    input.addEventListener(\"change\", changeEvent);\n}, false);\n\
  ```\n\n下一步是添加 `changeEvent` 函数，该函数需要通过传递用户输入的 URL 来调用 `xhr` 函数；这将相应地更新结果。`xhr` 函数的返回类型是\
  \ promise，允许开发者使用 promise 的 `then` 函数来异步更新 UI。\n\n`then` 函数最多接受三个参数，包括：\n\n*   如果\
  \ promise 成功执行且无错误，则执行 `completed` 函数\n*   `error` 函数用于处理错误\n*   `progress` 函数用于显示\
  \ promise 的进度\n\n接下来，在 `app.onactivated` 事件之后，将 `changeEvent` 添加到 `default.js` 文件中，如下所示。\n\
  \n```javascript\nfunction changeEvent(e) {\n    var resultDiv = document.getElementById(\"\
  output\");\n    WinJS.xhr({ url: e.target.value }).then(function completed(result)\
  \ {\n        if (result.status === 200) {\n            resultDiv.style.backgroundColor\
  \ = \"Green\";\n            resultDiv.innerText = \"Success\";\n        }\n    },\n\
  \        function error(e) {\n            resultDiv.style.backgroundColor = \"red\"\
  ;\n            resultDiv.innerText = e.statusText;\n        });\n}\n```\n\n此代码包含\
  \ promise 的 `completed` 和 `error` 函数。它根据结果显示文本“Success”或“Error”，并更改输出 `div` 元素的颜色。\n\
  \n在本地计算机上生成并运行应用，输入 URL，然后按 Enter 键。如果 URL 有效，输出 `div` 标签将变为绿色并显示成功消息。如果出现错误，则会显示错误消息并带有红色背景，如图\
  \ 2-8 所示。\n\n![A978-1-4842-0719-2_2_Fig8_HTML.jpg](img/A978-1-4842-0719-2_2_Fig8_HTML.jpg)\n\
  \n**图 2-8.** 使用 `xhr` 函数演示 promise\n\n你可以通过使用 promise 对象的 `cancel` 方法来停止当前正在执行的异步操作。\n\
  \n```javascript\nxhrPromise.cancel();\n```\n\n请注意，你还可以通过在前一个 `then` 函数返回的 promise\
  \ 上调用 `then` 来链式调用 promise 操作。\n\n"
- "# 第 3 章：基本 WinJS 控件\n\n本章概述了 WinJS 库中可用的控件，开发者可以使用这些控件快速构建其 Windows 应用。它探讨了如何向页面添加\
  \ WinJS 控件，以及基本的 WinJS 控件，如 ToggleSwitch、Rating、DatePicker、TimePicker、工具提示、文本控件等。\n\
  \nWinJS 中还有一些高级控件，可用于列出记录、显示菜单或在应用中添加工具栏。（第 4 章涵盖了高级控件，如 ListView、Toolbar 和 AppBar。）\n\
  \n## 3.1 在页面上声明 WinJS 控件\n\n### 问题\n\n你需要在 Windows 应用的页面中添加或声明一个 WinJS 控件。\n\n###\
  \ 解决方案\n\n使用 `div` 标签内的 `data-win-control` 属性在页面上添加 WinJS 控件。\n\n### 工作原理\n\n在 Microsoft\
  \ Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。这将创建一个通用应用，可以在运行 Windows 10 的\
  \ Windows 平板电脑和 Windows Mobile 上运行。\n\n在 Visual Studio 解决方案资源管理器中，打开项目中的 `default.html`\
  \ 页面。\n\n通过使用 `data-win-control` 属性在页面中声明一个 WinJS 控件。例如，要在页面上声明 Rating 控件，请添加以下\
  \ `div` 标签。\n\n```html\n<div id=\"rating\" data-win-control=\"WinJS.UI.Rating\"\
  ></div>\n```\n\n在此代码片段中，`div` 标签充当 WinJS 控件的占位符。`data-win-control` 属性用于指示将要呈现的 WinJS\
  \ 控件。\n\nHTML 页面将如下所示。\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"\
  utf-8\" />\n    <title>Recipe3.1</title>\n    <!-- WinJS references -->\n    <link\
  \ href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"\
  ></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n    <!-- Recipe3.1 references\
  \ -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\" />\n    <script src=\"\
  /js/default.js\"></script>\n</head>\n<body class=\"win-type-body\">\n    <div id=\"\
  rating\" data-win-control=\"WinJS.UI.Rating\"></div>\n</body>\n</html>\n```\n\n\
  在页面上使用 WinJS 控件的主要要求是包含 JavaScript 和 CSS 文件。你应在 HTML 页面的 head 部分添加以下引用。\n\n```html\n\
  <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n<script src=\"WinJS/js/base.js\"\
  ></script>\n<script src=\"WinJS/js/ui.js\"></script>\n```\n\nWinJS 库提供了两个 CSS（层叠样式表）文件：`ui-dark.css`\
  \ 和 `ui-light.css`。你可以分别通过更改为 `ui-light.css` 和 `ui-dark.css` 来在所有控件之间切换浅色主题和深色主题。\n\
  \n`base.js` 和 `ui.js` 文件是需要引用到 HTML 页面中才能使用 WinJS 控件的 JavaScript 文件。WinJS 控件的 JavaScript\
  \ 源代码定义在这些 JavaScript 文件之一中。\n\n在调用 `WinJS.UI.processAll` 方法之前，WinJS 控件（在此示例中为 Rating\
  \ 控件）不会被呈现。此方法定义在项目 `js` 文件夹下的 `default.js` 文件中。`WinJS.UI.processAll` 方法的主要功能是解析\
  \ HTML 页面，识别带有 `data-win-control` 的属性，并相应地生成控件。\n\n因此，有必要在页面上包含对 `default.js` 文件的引用。\n\
  \n现在，让我们生成通用应用并在 Windows 10 和 Windows Mobile 模拟器上运行它。\n\n图 3-1 展示了 Rating 控件在 Windows\
  \ 平板电脑上的外观。图 3-2 展示了 Rating 控件在 Windows Mobile 上的外观。\n\n![A978-1-4842-0719-2_3_Fig2_HTML.jpg](img/A978-1-4842-0719-2_3_Fig2_HTML.jpg)\n\
  \n**图 3-2.** Windows Mobile 模拟器上的 Rating 控件\n\n![A978-1-4842-0719-2_3_Fig1_HTML.jpg](img/A978-1-4842-0719-2_3_Fig1_HTML.jpg)\n\
  \n**图 3-1.** Windows 10 上的 Rating 控件\n\n## 3.2 设置 WinJS 控件的选项\n\n### 问题\n\n你想为 HTML\
  \ 页面上的 WinJS 控件设置附加选项或属性。\n\n### 解决方案\n\n使用 `data-win-options` 属性为控件设置附加选项或属性。\n\
  \n\n\n### 工作原理\n\n大多数 `WinJS` 控件都支持通过 `options` 属性进行设置。例如，在页面上使用 `Rating` 控件时，你可能希望限制用户能够提供的最高评分。\n\
  \n你可以通过 `data-win-options` 属性来指定这一点。例如，以下 HTML 代码演示了如何将 `Rating` 控件的最高评分设置为 4。\n\
  \n```\n<div id=\"rating\" data-win-control=\"WinJS.UI.Rating\"\n     data-win-options=\"\
  {maxRating:4}\">\n</div>\n```\n\n`data-win-options` 接受 JavaScript 格式的选项；传入时需包含属性名称，其值用花括号括起来。\n\
  \n这里的 `maxRating` 是一个属性。也可以同时传入多个属性及其值。例如，如果你需要与 `maxRating` 一起设置 `enableClear`\
  \ 属性，你可以像下面这样通过 `data-win-options` 属性来设置。\n\n```\n<div id=\"rating\" data-win-control=\"\
  WinJS.UI.Rating\"\n         data-win-options=\"{maxRating:4,enableClear:false}\"\
  >\n    </div>\n```\n\n图 3-3 展示了在 Windows Mobile 模拟器上的界面及显示效果。\n\n![A978-1-4842-0719-2_3_Fig3_HTML.jpg](img/A978-1-4842-0719-2_3_Fig3_HTML.jpg)\n\
  \n**图 3-3.** 最高评分为 4 的评分控件\n\n如果 `enableClear` 属性设置为 `true`，那么用户可以向左滑动控件来清除评分值。\n\
  \n## 通过 JavaScript 代码添加 WinJS 控件\n\n### 问题\n\n你需要从 JavaScript 代码中添加一个 `WinJS` 控件，而不是在\
  \ HTML 页面中添加。\n\n### 解决方案\n\n你可以通过命令式地创建控件；即完全使用 JavaScript 来识别 `div` 元素，动态生成控件并将其添加到页面中。\n\
  \n### 工作原理\n\n在 Visual Studio 2015 Community 中使用 Windows Universal (Blank App) 模板创建一个新项目。这会创建一个可以在\
  \ Windows 平板电脑或运行 Windows 10 的 Windows Mobile 上运行的 Windows 通用应用。\n\n在 Visual Studio\
  \ 解决方案资源管理器中打开项目的 `default.html` 页面。在页面主体部分添加一个 `div` 标签，用于呈现控件。\n\n```\n<div id=\"\
  rating\" >\n    </div>\n```\n\n在解决方案资源管理器中，右键单击项目中的 `js` 文件夹。选择 **添加** ➤ **新建 JavaScript\
  \ 文件** 并为文件命名。在本例中，我们将文件命名为 `controldemo.js`。这会将 `controldemo.js` 文件添加到项目的 `js`\
  \ 文件夹下。\n\n将以下代码添加到 `controldemo.js` 文件中。这段代码创建了一个新的 `Rating` 控件，并将其添加到评分 `div`\
  \ 标签中。\n\n```\n(function () {\n    \"use strict\";\n    function AddControl()\n\
  \    {\n        var ratingDiv = document.getElementById(\"rating\");\n        var\
  \ ratingCtrl = new WinJS.UI.Rating(ratingDiv);\n    }\n    document.addEventListener(\"\
  DOMContentLoaded\", AddControl);\n})();\n```\n\n上面的代码创建了一个 `WinJS.UI.Rating` JavaScript\
  \ 类的新实例。它是通过将评分 `div` 元素传递给 `Rating` 类的构造函数来创建的。\n\n现在，你需要在 HTML 页面中添加对 `controldemo.js`\
  \ 文件的引用。打开 `default.html` 文件，将以下代码片段添加到页面的头部区域。\n\n```\n<script src=\"/js/controldemo.js\"\
  ></script>\n```\n\n`default.html` 页面将包含如下所示的代码。\n\n```\n<!DOCTYPE html>\n<html>\n\
  <head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.3</title>\n    <!-- WinJS\
  \ references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n\
  \    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
  ></script>\n    <!-- Recipe3.3 references -->\n    <link href=\"/css/default.css\"\
  \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
  \ src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\">\n\
  \    <div id=\"rating\">\n    </div>\n</body>\n</html>\n```\n\n让我们在 Windows Mobile\
  \ 模拟器上运行应用程序。图 3-4 展示了在 Windows Mobile 上的输出页面。\n\n![A978-1-4842-0719-2_3_Fig4_HTML.jpg](img/A978-1-4842-0719-2_3_Fig4_HTML.jpg)\n\
  \n**图 3-4.** 通过 JavaScript 代码添加的评分控件\n\n控件的选项或属性也可以通过 JavaScript 代码以命令式的方式进行设置。以下展示了如何创建一个\
  \ `Rating` 控件的实例，并通过 JavaScript 代码设置 `maxRating` 属性。\n\n```\n(function () {\n  \
  \  \"use strict\";\n    function AddControl()\n    {\n        var ratingDiv = document.getElementById(\"\
  rating\");\n        var ratingCtrl = new WinJS.UI.Rating(ratingDiv);\n        ratingCtrl.maxRating\
  \ = 4;\n    }\n    document.addEventListener(\"DOMContentLoaded\", AddControl);\n\
  })();\n```\n\n这段代码片段展示了如何在构造函数之外设置 `maxRating` 属性。或者，你也可以通过将其作为第二个参数传入并用花括号括起来来设置它。\n\
  \n图 3-5 演示了在设置 `Rating` 控件属性时，Visual Studio 中的 IntelliSense 支持。\n\n![A978-1-4842-0719-2_3_Fig5_HTML.jpg](img/A978-1-4842-0719-2_3_Fig5_HTML.jpg)\n\
  \n**图 3-5.** Visual Studio 2015 中的 IntelliSense 支持\n\n`IntelliSense` 是 Microsoft\
  \ Visual Studio 中一项出色的功能，它能提高开发人员的工作效率，并根据用户在 IDE 中的输入自动提供建议。\n\n## 从 HTML 文档中获取\
  \ WinJS 控件\n\n### 问题\n\n你想要从 HTML 页面获取控件，并使用 JavaScript 代码设置属性。\n\n### 解决方案\n\n\
  使用 `winControl` 属性从页面的 DOM 元素中获取控件。\n\n\n### 工作原理\n\n在 Visual Studio 2015 Community\
  \ 中使用 Windows 通用（空白应用）模板创建一个新项目。这将创建一个可在运行 Windows 10 的 Windows 平板电脑和 Windows Mobile\
  \ 上运行的 Windows 通用应用。在 Visual Studio 解决方案资源管理器中，打开项目中的 `default.html` 页面。\n\n将 Rating\
  \ 控件添加到页面的 body 区域。\n\n```\n<div id=\"rating\" data-win-control=\"WinJS.UI.Rating\"\
  \ >\n</div>\n```\n\n在解决方案资源管理器中，右键单击项目内的 `js` 文件夹。选择“添加” ➤ “新建 JavaScript 文件”，并为文件命名。在本示例中，我们将文件命名为\
  \ `controldemo.js`。这样会将 `controldemo.js` 文件添加到项目的 `js` 文件夹下。\n\n将以下代码添加到 `controldemo.js`\
  \ 文件中。\n\n```\n(function () {\n    \"use strict\";\n    function GetControl() {\n\
  \        WinJS.UI.processAll().done(function () {\n            var ratingControl\
  \ = document.getElementById(\"rating\").winControl;\n            ratingControl.userRating\
  \ = 2;\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\",\
  \ GetControl);\n})();\n```\n\n当调用 `document.getElementById` 方法时，您会获得 `DOM` 元素。您需要使用\
  \ `winControl` 属性来获取关联的控件。\n\n这段代码需要包裹在 `WinJS.UI.processAll` 方法中，该方法会返回一个 promise。之所以要用\
  \ `processAll` 方法包裹您的逻辑，是因为您必须等待文档中所有控件都创建并解析完成后，才能尝试获取它们。\n\n一旦获取到 Rating 控件，您就可以开始为\
  \ Rating 控件实例的属性设置值。在本示例中，您将用户评分设置为 2。\n\n最后，您需要在 `default.html` 页面中添加对 `controldemo.js`\
  \ 文件的引用。从 Visual Studio 解决方案资源管理器中打开 `default.html` 页面，并将以下代码添加到 head 标签中。\n\n```\n\
  <script src=\"/js/controldemo.js\"></script>\n```\n\n当您在 Windows Mobile 模拟器上运行该应用程序时，应该会看到如图\
  \ 3-6 所示的界面。\n\n![A978-1-4842-0719-2_3_Fig6_HTML.jpg](img/A978-1-4842-0719-2_3_Fig6_HTML.jpg)\n\
  \n**图 3-6.** 显示值为 2 的 Rating 控件的 Windows Mobile 模拟器\n\n## 3.5 ToggleSwitch 控件\n\n\
  ### 问题\n\n您需要为用户提供一个选项，使其能够在屏幕上执行二元操作。例如，您需要为用户提供一个开启或关闭服务的选项。\n\n### 解决方案\n\n使用\
  \ WinJS 中的 ToggleSwitch 控件。它类似于标准的复选框控件，但拥有更好的触摸支持。您只需在 ToggleSwitch 控件上滑动手指，即可选中或取消选中该选项。您可以在页面上使用\
  \ `WinJS.UI.ToggleSwitch` 值作为 `div` 元素的 `data-win-control` 属性来声明 ToggleSwitch 控件。\n\
  \n### 工作原理\n\n以下展示了如何在页面上声明 ToggleSwitch 控件。\n\n```\n<div id=\"locationServices\"\
  \ data-win-control=\"WinJS.UI.ToggleSwitch\"\n         data-win-options=\"{\n  \
  \       title :'Location Services',\n         labelOff: 'Disabled',\n         labelOn:'Enabled',\n\
  \         checked: true\n         }\">\n</div>\n```\n\n在 Windows 平板电脑或 Windows Mobile\
  \ 模拟器上执行时，上述代码片段将显示如图 3-7 所示。\n\n![A978-1-4842-0719-2_3_Fig7_HTML.jpg](img/A978-1-4842-0719-2_3_Fig7_HTML.jpg)\n\
  \n**图 3-7.** Windows Mobile 和 Windows 模拟器上的 ToggleSwitch\n\n`data-win-options` 属性用于为\
  \ ToggleSwitch 控件设置附加属性。在上述示例中，使用了此属性来设置 `title`、`labelOff`、`labelOn` 和 `checked`\
  \ 等属性。\n\n`title` 设置 ToggleSwitch 的标题内容。`labelOff` 和 `labelOn` 属性根据控件的选中（On）和未选中（Off）状态，标识需要在\
  \ ToggleSwitch 旁边显示的文本。\n\nToggleSwitch 的当前状态（选中或未选中）可以通过控件的 `checked` 属性获知。\n\n\
  让我们在项目的 `js` 文件夹中添加一个新的 JavaScript 文件，并将其命名为 `controldemo.js`。打开 `default.html`\
  \ 页面，添加 ToggleSwitch 控件以及一个用于在开关状态改变时显示消息的空 `div` 标签。\n\n`default.html` 页面如下所示。\n\
  \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.5</title>\n\
  \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
  stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
  WinJS/js/ui.js\"></script>\n    <!-- Recipe3.5 references -->\n    <link href=\"\
  /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
  \    <script src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
  >\n    <div id=\"locationServices\" data-win-control=\"WinJS.UI.ToggleSwitch\"\n\
  \         data-win-options=\"{\n         title :'Location Services',\n         labelOff:\
  \ 'Disabled',\n         labelOn:'Enabled',\n         checked: true\n         }\"\
  >\n    </div>\n    <div id=\"info\"></div>\n</body>\n</html>\n```\n\n为了能从 JavaScript\
  \ 代码中识别出状态，您需要连接 ToggleSwitch 控件的 `change` 事件处理程序。当您更改控件的状态时，会触发此事件。\n\n打开 `controldemo.js`\
  \ 文件，并将其替换为以下代码。\n\n```\n(function () {\n    \"use strict\";\n    function GetControl()\
  \ {\n        WinJS.UI.processAll().done(function () {\n            var toggleButton\
  \ = document.getElementById(\"locationServices\").winControl;\n            var InfoElement\
  \ = document.getElementById(\"info\");\n            toggleButton.addEventListener('change',\
  \ function (args) {\n                if (toggleButton.checked) {\n             \
  \       InfoElement.innerHTML = \"Location Services enabled\";\n               \
  \ }\n                else {\n                    InfoElement.innerHTML = \"Location\
  \ Services disabled\";\n                }\n            })\n        });\n    }\n\
  \    document.addEventListener(\"DOMContentLoaded\", GetControl);\n})();\n```\n\n\
  当您在 Windows 10 模拟器和 Windows Mobile 模拟器上运行该应用程序时，将看到如图 3-8 所示的界面。\n\n![A978-1-4842-0719-2_3_Fig8_HTML.jpg](img/A978-1-4842-0719-2_3_Fig8_HTML.jpg)\n\
  \n**图 3-8.** 带有 change 事件的 ToggleSwitch。\n\n当您切换控件时，相应的消息会显示在 `info` `div` 元素中。\n\
  \n## 3.6 DatePicker 控件\n\n### 问题\n\n您希望允许用户从应用程序页面中选择一个日期。\n\n### 解决方案\n\n使用 WinJS\
  \ DatePicker 控件，该控件允许用户选取日期。此控件显示三个列表：分别用于月份、日期和年份。\n\n\n\n### 工作原理\n\n你可以在页面上声明\
  \ `DatePicker` 控件，如下所示。\n\n```\n<div id=\"Birthday\" data-win-control=\"WinJS.UI.DatePicker\"\
  \ ></div>\n```\n\n在本教程中，我们将尝试在页面上添加 `DatePicker` 控件，并在 JavaScript 代码中绑定事件，以在 `div`\
  \ 元素中显示所选日期。\n\n使用 Visual Studio 2015 中的 Windows 通用应用模板创建一个新项目。打开 `default.html`\
  \ 页面，并将其替换为以下内容。\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\"\
  \ />\n    <title>Recipe3.6</title>\n    <!-- WinJS 引用 -->\n    <link href=\"WinJS/css/ui-light.css\"\
  \ rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script\
  \ src=\"WinJS/js/ui.js\"></script>\n    <!-- Recipe3.6 引用 -->\n    <link href=\"\
  /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
  \    <script src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
  >\n    <div id=\"Birthday\" data-win-control=\"WinJS.UI.DatePicker\">\n    </div>\n\
  \    <div id=\"info\"></div>\n</body>\n</html>\n```\n\n`default.html` 页面包含 `DatePicker`\
  \ 控件以及用于显示所选日期的名称信息 `div` 标签。页面引用了接下来要创建的 `controldemo.js` 文件。\n\n在 Visual Studio\
  \ 解决方案资源管理器中，向项目的 js 文件夹添加一个新的 JavaScript 文件，并将其命名为 `controldemo.js`。将以下 JavaScript\
  \ 代码添加到 `controldemo.js` 文件中。\n\n```\n(function () {\n    \"use strict\";\n    function\
  \ GetControl() {\n        WinJS.UI.processAll().done(function () {\n           \
  \ var datepick = document.getElementById(\"Birthday\").winControl;\n           \
  \ var InfoEelement = document.getElementById(\"info\");\n            datepick.addEventListener('change',\
  \ function (args) {\n                InfoEelement.innerHTML = \"所选日期是 \" +\n   \
  \                 datepick.current.toDateString();\n            })\n        });\n\
  \    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n})();\n\
  ```\n\n当您更改日期、月份或年份时，`DatePicker` 会立即触发 `change` 事件。您可以通过处理此事件来获取当前选中的日期。\n\n在 JavaScript\
  \ 代码中，使用 `document.getElementById` 的 `winControl` 属性从 HTML 页面获取 `DatePicker`。然后，从\
  \ `DatePicker` 控件调用 `addEventListener` 方法来订阅 `change` 事件。\n\n选中的日期通过 `DatePicker`\
  \ 的 `current` 属性获取。\n\n在 Windows Mobile 或 Windows 10 上运行应用程序，将显示 `DatePicker` 并展示选中的日期，如图\
  \ 3-9 所示。\n\n![A978-1-4842-0719-2_3_Fig9_HTML.jpg](img/A978-1-4842-0719-2_3_Fig9_HTML.jpg)\n\
  \n图 3-9. DatePicker 控件演示\n\n您可以通过分配格式字符串来控制 `DatePicker` 控件的年、月、日字段的显示外观。\n\n例如，可以将\
  \ `DatePicker` 格式化为显示缩写月份、年份以及两位数的日期，如下所示。\n\n```\n<div id=\"Birthday\" data-win-control=\"\
  WinJS.UI.DatePicker\"\n     data-win-options=\"{\n        monthPattern : '{month.abbreviated}',\n\
  \        datePattern: '{day.integer(2)}',\n        yearPattern: '{year.abbreviated}'\n\
  \     }\">\n</div>\n```\n\n格式通过 `monthPattern`、`datePattern` 和 `yearPattern` 属性设置。\n\
  \n`monthPattern` 属性定义月份的显示模式。您可以使用表 3-1 中所示的值之一来设置月份模式属性。\n\n表 3-1. 日期选择器的月份模式\n\
  \n| 模式 | 描述 |\n| --- | --- |\n| month.full | 显示月份的全名。 |\n| month.abbreviated(n)\
  \ | 您可以使用带或不带参数的 `month.abbreviated`。参数指定月份的字母数。 |\n| month.solo.full | 表示适合独立显示的月份。并且，`month.solo.abbreviated`\
  \ 可以带参数或不带参数使用。 |\n| month.integer(n) | `month.integer` 用于指定月份字段中显示的整数个数。 |\n\n\
  `datePattern` 属性用于获取或设置 `DatePicker` 控件中日期的显示模式。您可以使用表 3-2 中所示的值之一来设置 `datePattern`。\n\
  \n表 3-2. 日期选择器的日期模式\n\n| 模式 | 描述 |\n| --- | --- |\n| day.integer(n) | 您可以使用带或不带参数的\
  \ `day.integer`。参数指定要包含的前导零；例如，如果值为 `day.integer (2)`，则显示 02。 |\n| dayofweek.abbreviated\
  \ | 此属性显示星期几。参数指定要显示的字母数。 |\n\n`yearPattern` 属性获取或设置年份的显示模式。默认的年份模式是 `year.full`。您可以将其修改为表\
  \ 3-3 中所示的任一值。\n\n表 3-3. 日期选择器的年份模式\n\n| 模式 | 描述 |\n| --- | --- |\n| year.full |\
  \ 以数字形式显示完整年份 |\n| year.abbreviated(n) | 显示指定位数集合的年份。 |\n\n## 3.7 TimePicker 控件\n\
  \n### 问题\n\n您希望允许用户从应用程序页面中选择时间。\n\n### 解决方案\n\n使用 WinJS `TimePicker` 控件，该控件允许用户选择时间。此控件显示三个列表：分别对应小时、分钟和时段（上午/下午）。\n\
  \n\n\n### 工作原理\n\n你可以在页面上声明 `DatePicker` 控件，如下所示：\n\n```\n<div id=\"timeSelector\"\
  \ data-win-control=\"WinJS.UI.TimePicker\"></div>\n```\n\n在本节中，我们将尝试在页面上添加 `TimePicker`\
  \ 控件，并在 JavaScript 代码中绑定事件，以在 `div` 元素中显示所选时间。\n\n在 Visual Studio 2015 中使用 Windows\
  \ 通用应用模板创建一个新项目。打开 `default.html` 页面，并将其替换为以下内容：\n\n```\n<!DOCTYPE html>\n<html>\n\
  <head>\n    <meta charset=\"utf-8\" />\n    <title>BasicControls</title>\n    <!--\
  \ WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
  \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
  ></script>\n    <!-- Recipe3.7 references -->\n    <link href=\"/css/default.css\"\
  \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
  \ src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\">\n\
  \    <div id=\"timeSelector\" data-win-control=\"WinJS.UI.TimePicker\"></div>\n\
  \    <div id=\"info\"></div>\n</body>\n</html>\n```\n\n`default.html` 页面包含了 `TimePicker`\
  \ 控件以及用于显示所选时间的名为 `info` 的 `div` 标签。页面中还引用了 `controldemo.js` 文件，你将在下一步中创建该文件。\n\n\
  从 Visual Studio 解决方案资源管理器中，向项目的 `js` 文件夹添加一个新的 JavaScript 文件，并将其命名为 `controldemo.js`。用以下\
  \ JavaScript 代码替换该文件的内容：\n\n```\n(function () {\n    \"use strict\";\n    function\
  \ GetControl() {\n        WinJS.UI.processAll().done(function () {\n           \
  \ var datepick = document.getElementById(\"timeSelector\").winControl;\n       \
  \     var InfoEelement = document.getElementById(\"info\");\n            datepick.addEventListener('change',\
  \ function (args) {\n                InfoEelement.innerHTML = \"The selected time\
  \ is \" +\n                    datepick.current.toTimeString();\n            })\n\
  \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
  })();\n```\n\n当你更改小时、分钟或时段时，`TimePicker` 会立即引发 `change` 事件。你可以通过处理此事件来获取当前所选时间。\n\
  \n在 JavaScript 代码中，使用 `document.getElementById` 的 `winControl` 属性可从 HTML 页面获取 `TimePicker`。然后，从\
  \ `TimePicker` 控件调用 `addEventListener` 方法以订阅 `change` 事件。\n\n所选时间通过 `TimePicker`\
  \ 控件的 `current` 属性获取。\n\n在 Windows Mobile 或 Windows 10 上运行应用程序时，将显示 `TimePicker`\
  \ 并展示所选时间，如图 3-10 所示。\n\n![A978-1-4842-0719-2_3_Fig10_HTML.jpg](img/A978-1-4842-0719-2_3_Fig10_HTML.jpg)\n\
  \n图 3-10.\n\nTimePicker 控件演示\n\n你可以通过使用 `data-win-options` 属性设置 `clock` 属性，使 `TimePicker`\
  \ 支持 24 小时制格式，如下所示：\n\n```\n<div id=\"timeSelector\" data-win-control=\"WinJS.UI.TimePicker\"\
  \n         data-win-options=\"{\n         clock : '24HourClock',\n         minuteIncrement\
  \ : 15\n         }\">\n</div>\n```\n\n分钟列表的增量值可以通过 `minuteIncrement` 属性控制，如下所示。\n\
  \n当你在 Windows 10 或 Windows Mobile 10 上运行该页面时，将看到如图 3-11 所示的界面。\n\n![A978-1-4842-0719-2_3_Fig11_HTML.jpg](img/A978-1-4842-0719-2_3_Fig11_HTML.jpg)\n\
  \n图 3-11.\n\n采用 24 小时制格式并调整时间间隔的 TimePicker\n\n你可以通过指定格式字符串来控制 `TimePicker` 控件的小时、分钟和时段字段的外观。\n\
  \n格式通过 `hourPattern`、`minutePattern` 和 `periodPattern` 属性设置。\n\n`hourPattern` 属性获取或设置小时的显示模式。`hourPattern`\
  \ 属性的默认值为 `hour.integer(2)`，你可以通过更改参数值来修改 `hourPattern` 属性。`minutePattern` 属性获取或设置分钟的显示模式。此属性的默认值为\
  \ `minute.integer(2)`，你可以通过更改参数中的整数位数来修改此模式。`periodPattern` 属性获取或设置时段的显示模式；此属性的默认值为\
  \ `period.abbreviated(2)`。你可以通过更改参数值来修改此属性的模式。\n\n表 3-4.\n\nTimePicker 中小时、分钟和时段的模式\n\
  \n| 模式 | 描述 |\n| --- | --- |\n| `hour.integer(n)` | 显示指定位数的小时。 |\n| `minute.integer(n)`\
  \ | 显示指定位数的分钟。 |\n| `period.abbreviated(n)` | 根据作为参数传递的值显示时段的模式。 |\n\n## 3.8 Tooltip\
  \ 控件\n\n### 问题\n\n当用户悬停在页面上的任何元素上时，你需要显示一个工具提示。\n\n### 解决方案\n\n使用 WinJS `Tooltip`\
  \ 控件在页面上的 HTML 元素上显示工具提示。当你将鼠标悬停在一个元素上时，工具提示会显示指定的秒数。当用户将光标移开该元素时，工具提示应消失。\n\n###\
  \ 工作原理\n\n你可以像这样为按钮添加 `Tooltip` 控件：\n\n```\n<button id=\"btnSave\"\n           \
  \ data-win-control=\"WinJS.UI.Tooltip\"\n            data-win-options=\"{\n    \
  \        innerHTML: 'Saves the <b>Employee</b> record'}\">\n    Save\n</button>\n\
  ```\n\n通过 `data-win-options` 属性设置 `innerHTML` 属性，该属性为工具提示控件设置文本。此文本也可以包含 HTML 标签。\n\
  \n图 3-12 演示了工具提示在 Windows Mobile 10 和 Windows 10 平板电脑上的显示方式。\n\n![A978-1-4842-0719-2_3_Fig12_HTML.jpg](img/A978-1-4842-0719-2_3_Fig12_HTML.jpg)\n\
  \n图 3-12.\n\n在应用内显示的工具提示\n\n你可以通过修改 `win-tooltip` CSS 类来自定义工具提示控件的样式。\n\n从 CSS 文件夹打开\
  \ `default.css` 文件，并将以下代码添加到文件末尾：\n\n```\n.win-tooltip\n{\n    background-color:\
  \ bisque;\n    border-radius:30px;\n    border-color:red;\n}\n```\n\n图 3-13 演示了定义上述样式后工具提示控件的外观。\n\
  \n![A978-1-4842-0719-2_3_Fig13_HTML.jpg](img/A978-1-4842-0719-2_3_Fig13_HTML.jpg)\n\
  \n图 3-13.\n\n应用样式的工具提示\n\n请注意，当使用 `div` 元素作为工具提示的容器时，你需要将其 display 属性设置为 `inline-block`，因为\
  \ `div` 元素默认的 display 设置为 `block`。\n\n## 3.9 显示文本\n\n### 问题\n\n你需要在 Windows 应用的页面上显示文本或标签。\n\
  \n### 解决方案\n\n使用传统的 HTML 元素或标签在 Windows 应用的页面上显示文本。这些元素包括 `div`、`label`、段落、标题等。\n\
  \n\n\n### 工作原理\n\nHTML 元素——如 `label`、`div`、`p`、`h1` 等——是使用 JavaScript 的 Windows\
  \ 通用应用中用于显示只读文本的常见控件之一。\n\n您可以定义一个简单的标签控件并设置其文本，如下所示。\n\n```\n<label>欢迎来到 Windows\
  \ 10 应用开发世界</label>\n```\n\n```\n<div>由 Microsoft MVPs 提供</div>\n```\n\n可通过两种方法之一对显示文本应用样式：内联样式或\
  \ CSS。\n\n以下代码片段演示了如何使用内联样式属性来格式化文本。\n\n```\n<div style=\"font-family:Verdana\"\
  >欢迎来到 Windows 10 应用开发世界</div>\n```\n\n```\n<p style=\"margin:0px; color:blue; font-family:Arial;\
  \ font-size:18px\">欢迎来到 Windows 10 应用开发世界</p>\n```\n\n图 3-14 展示了使用内联样式属性的上述代码的输出结果。\n\
  \n![A978-1-4842-0719-2_3_Fig14_HTML.jpg](img/A978-1-4842-0719-2_3_Fig14_HTML.jpg)\n\
  \n**图 3-14.** 为只读文本设置样式\n\nCSS 允许开发者定义样式（仅一次且在一个位置），并随后将其复用于多个控件。\n\n## 3.10 在应用中编辑文本\n\
  \n### 问题\n\n您需要允许用户在 Windows 应用的页面中输入文本。\n\n### 解决方案\n\n使用 HTML 元素允许用户在页面中输入文本。这包括文本框、文本区域、密码输入框、富文本框等。\n\
  \n### 工作原理\n\n使用 JavaScript 的 Windows 通用应用有四种不同类型的文本输入元素。\n\n*   **文本框：** 此控件允许用户在一行中输入或编辑纯文本。\n\
  *   **文本区域：** 此控件支持多行，允许用户输入或编辑纯文本。\n*   **密码输入框：** 此控件允许用户输入密码。\n*   **富文本框：**\
  \ 此控件允许用户编辑需要格式化的文本。\n\n以下是简单文本框、文本区域和密码输入框的 HTML 代码。\n\n```\n<div><textarea id=\"\
  textarea1\" rows=\"2\"></textarea></div>\n```\n\n```\n<div><input type=\"text\"\
  \ /></div>\n```\n\n```\n<div><input id=\"password\" type=\"password\" placeholder=\"\
  输入密码\" /></div>\n```\n\n图 3-15 展示了这些控件在 Windows Mobile 10 模拟器上的显示效果。\n\n![A978-1-4842-0719-2_3_Fig15_HTML.jpg](img/A978-1-4842-0719-2_3_Fig15_HTML.jpg)\n\
  \n**图 3-15.** 可编辑控件\n\n一旦用户执行某些操作（如按钮点击），您便可以从 JavaScript 代码中获取控件的内容，如方案 3-4 所示。\n\
  \n"
- "# 第 4 章：列表控件、应用栏和工具栏\n\n本章重点介绍与数据集合相关的控件，包括 `Repeater`、`FlipView` 和 `ListView`。本章还涵盖了与菜单相关控件的方案，例如\
  \ `AppBar`、`ToolBar`、`Flyouts`、`ContextMenu` 和 `MenuFlyouts`。\n\n## 4.1 使用 Repeater\
  \ 控件\n\n### 问题\n\n您需要使用 WinJS `Repeater` 控件在用户界面 (UI) 上显示数据集合。\n\n### 解决方案\n\n`Repeater`\
  \ 控件是 WinJS 库中可用于在 UI 上显示数据集合的控件之一。您可以通过将容器的 `data-win-control` 属性设置为 `WinJS.UI.Repeater`\
  \ 值来添加 `Repeater` 控件，然后使用 `data-win-bind` 属性将属性绑定到 UI 中的控件。\n\n\n\n### 工作原理\n\n\
  为了演示 `Repeater` 控件的使用，让我们构建一个通用 Windows 应用，该应用以 HTML 表格形式显示员工列表，如图 4-1 所示。\n\n![A978-1-4842-0719-2_4_Fig1_HTML.jpg](img/A978-1-4842-0719-2_4_Fig1_HTML.jpg)\n\
  \n*图 4-1. 使用 Repeater 控件的 HTML 表格*\n\n启动 Visual Studio 2015，并使用 JavaScript 模板创建一个新的\
  \ Windows 通用项目。\n\n打开 `default.html` 页面，并将其替换为以下代码片段。\n\n```html\n<!DOCTYPE html>\n\
  <html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.1</title>\n \
  \   <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
  stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
  WinJS/js/ui.js\"></script>\n    <link href=\"/css/default.css\" rel=\"stylesheet\"\
  \ />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"/js/data.js\"\
  ></script>\n</head>\n<body style=\"margin:20px\">\n    <h1>Recipe 4.1</h1>\n   \
  \ <table>\n        <thead>\n            <tr>\n                <th> Employee ID</th>\n\
  \                <th> Employee Name</th>\n                <th> Employee Designation</th>\n\
  \            </tr>\n        </thead>\n        <tbody id=\"repeaterData\" data-win-control=\"\
  WinJS.UI.Repeater\">\n            <tr>\n                <td data-win-bind=\"textContent:id\"\
  ></td>\n                <td data-win-bind=\"textContent:name\"></td>\n         \
  \       <td data-win-bind=\"textContent:designation\"></td>\n            </tr>\n\
  \        </tbody>\n    </table>\n</body>\n</html>\n```\n\n在前面的代码片段中，`Repeater` 控件被添加到\
  \ body 部分；而 `Repeater` 控件的内部内容则用作模板。来自 repeater 数据的每一行都会显示在 HTML 表格的 body 部分。\n\n\
  前面的 HTML 页面引用了一个 `data.js` 页面。让我们将此文件添加到项目中。在项目的 `js` 文件夹中添加一个新的 JavaScript 文件，并将其命名为\
  \ `data.js`。以下代码片段包含了为 `Repeater` 控件设置数据源的 JavaScript 代码。\n\n```javascript\n(function\
  \ () {\n    \"use strict\";\n    function Initialize() {\n        WinJS.UI.processAll().done(function\
  \ () {\n            var repeaterControl1 = document.getElementById('repeaterData').winControl;\n\
  \            var Employees = new WinJS.Binding.List([\n                { id: 1,\
  \ name: \"Senthil Kumar\", designation: \"Mobile Developer\" },\n              \
  \  { id: 2, name: \"Lohith GN\", designation: \"Web Developer\" },\n           \
  \     { id: 3, name: \"Vidyasagar\", designation: \"Game Developer\" }\n       \
  \     ]);\n            repeaterControl1.data = Employees;\n        })\n    }\n \
  \   document.addEventListener(\"DOMContentLoaded\", Initialize);\n})();\n```\n\n\
  `WinJS.Binding.List` 用于绑定 `Repeater` 控件。在前面的代码片段中，`Repeater` 控件被绑定到员工列表，该列表表示员工数据的集合。员工对象包含以下属性：`id`、`name`\
  \ 和 `designation`。数据通过 `Repeater` 控件的 `data` 属性进行绑定。\n\n在 Windows Mobile 模拟器上运行该应用程序。你应该会看到如图\
  \ 4-2 所示的屏幕。\n\n![A978-1-4842-0719-2_4_Fig2_HTML.jpg](img/A978-1-4842-0719-2_4_Fig2_HTML.jpg)\n\
  \n*图 4-2. Windows Mobile 10 中的 Repeater 控件*\n\n如果希望 `Repeater` 控件中的项可调用或可选择，一种选择是在\
  \ `Repeater` 控件模板中使用 `ItemContainer` 控件。\n\n以下示例演示了在 `Repeater` 控件中使用 `ItemContainer`\
  \ 的用法，该控件绑定到员工列表。\n\n```html\n<div id=\"repeaterData\" data-win-control=\"WinJS.UI.Repeater\"\
  >\n        <div data-win-control=\"WinJS.UI.ItemContainer\" data-win-bind=\"dataset.name:name\"\
  >\n             <div data-win-bind=\"textContent:name\"></div>\n        </div>\n\
  </div>\n```\n\n`ItemContainer` 有一个名为 `data-win-bind=\"dataset.name: name\"` 的属性，该属性将员工列表中每个项目的名称与\
  \ `ItemContainer` 关联起来。\n\n`Repeater` 控件在 JavaScript 文件中被绑定到员工列表，如下所示。\n\n```javascript\n\
  (function () {\n    \"use strict\";\n    function Initialize() {\n        WinJS.UI.processAll().done(function\
  \ () {\n            var repeaterControl1 = document.getElementById('repeaterData').winControl;\n\
  \            var Employees = new WinJS.Binding.List([\n                { id: 1,\
  \ name: \"Senthil Kumar\", designation: \"Mobile Developer\" },\n              \
  \  { id: 2, name: \"Lohith GN\", designation: \"Web Developer\" },\n           \
  \     { id: 3, name: \"Vidyasagar\", designation: \"Game Developer\" }\n       \
  \     ]);\n            repeaterControl1.data = Employees;\n            repeaterControl1.addEventListener(\"\
  invoked\",function(e)\n            {\n                var name = e.target.dataset.name;\n\
  \                var message = new Windows.UI.Popups.MessageDialog(name);\n    \
  \            message.showAsync();\n            })\n        })\n    }\n    document.addEventListener(\"\
  DOMContentLoaded\", Initialize);\n})();\n```\n\n当你在 Windows 中运行该应用程序时，你会看到三个项目被渲染出来。如果你点击一个项目，会显示一个消息框，其中包含该项目的名称，如图\
  \ 4-3 所示。\n\n![A978-1-4842-0719-2_4_Fig3_HTML.jpg](img/A978-1-4842-0719-2_4_Fig3_HTML.jpg)\n\
  \n*图 4-3. Repeater 控件中可调用的项*\n\n## 4.2 使用 FlipView 控件\n\n### 问题\n\n你需要只显示集合中的单个项目。\n\
  \n### 解决方案\n\n使用 WinJS 中的 `FlipView` 控件，该控件一次只显示集合中的一个项目。`FlipView` 控件的一个用例是照片库应用，用户可以选择一张图片，然后在图片列表中滑动浏览。\n\
  \n尽管一次只显示一个项目，但 `FlipView` 控件会显示箭头，让你可以移动到数据源中的下一个或上一个项目。\n\n你可以通过将 `div` 元素的 `data-win-control`\
  \ 属性设置为 `WinJS.UI.ListView` 来向页面添加 `ListView` 控件。\n\n\n\n### 工作原理\n\n在 Visual Studio\
  \ 2015 中创建一个新的 Windows 通用项目。将新的 JavaScript 文件命名为 `data.js`，并放在 `js` 文件夹下。该 JavaScript\
  \ 文件将包含可在 ListView 中列出的数据。将以下代码片段添加到 `data.js` 文件中。\n\n```\n(function () {\n   \
  \ \"use strict\";\n     var Employees = new WinJS.Binding.List([\n         { id:\
  \ 1, name: \"Senthil Kumar\", designation: \"Mobile Developer\" },\n         { id:\
  \ 2, name: \"Lohith GN\", designation: \"Web Developer\" },\n         { id: 3, name:\
  \ \"Vidyasagar\", designation: \"Game Developer\" }\n         ]);\n     WinJS.Namespace.define(\"\
  recipeData\",\n         {\n             Employees :Employees\n         });\n})();\n\
  ```\n\n前述 JavaScript 代码包含一个员工集合；每个员工拥有 `id`、`name` 和 `designation` 属性。\n\n现在，你希望在你的\
  \ Windows 应用中一次显示一名员工。以下 HTML 代码片段展示了如何使用 FlipView 控件从员工列表中逐个显示员工信息。\n\n请注意，页面引用了\
  \ `data.js` 文件，该文件包含了 FlipView 控件所需的数据。\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n\
  \    <meta charset=\"utf-8\" />\n    <title>Recipe4.2</title>\n    <!-- WinJS references\
  \ -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n    <script\
  \ src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n\
  \    <!-- Recipe4.2 references -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\"\
  \ />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"/js/data.js\"\
  ></script>\n</head>\n<body class=\"win-type-body\" style=\"margin:20px\">\n    <h1>Recipe\
  \ 4.2</h1>\n    <div id=\"template\" data-win-control=\"WinJS.Binding.Template\"\
  >\n        <div>\n            <h4 data-win-bind=\"innerText: name\"></h4>\n    \
  \        <h6 data-win-bind=\"innerText: designation\"></h6>\n        </div>\n  \
  \  </div>\n    <div id=\"flipView1\"\n         data-win-control=\"WinJS.UI.FlipView\"\
  \n         data-win-options=\"{itemTemplate: select('#template') ,\n         itemDataSource\
  \ : recipeData.Employees.dataSource}\">\n    </div>\n</body>\n</html>\n```\n\n当你在\
