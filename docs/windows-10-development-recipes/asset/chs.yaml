  \n图 9-2. 为欢迎语设置创建本地应用数据设置\n\n## 9.3 如何创建和检索本地复合设置\n\n### 问题\n\n您需要在 Windows 10 应用的应用数据存储中创建和读取本地复合值。\n\
  \n### 解决方案\n\n使用 `ApplicationDataCompositeValue` 类创建和读取本地复合值。\n\n### 工作原理\n\n`Windows.Storage.ApplicationDataCompositeValue`\
  \ 类允许您创建可存储在本地设置或漫游设置中的复合设置。复合值类允许您将名称/值对作为应用数据存储在应用数据存储中。假设您想将书籍信息存储为：\n\n```\n\
  book[\"ISBN\"] = 12345;\nbook[\"BookTitle\"] = \"Windows 10 开发\";\n```\n\n要存储复合信息，您可以使用如下代码：\n\
  \n```javascript\nvar applicationData = Windows.Storage.ApplicationData.current;\n\
  var localSettings = applicationData.localSettings;\n// 创建一个 BookInfo 复合设置\nvar bookInfo\
  \ = new Windows.Storage.ApplicationDataCompositeValue();\nbookInfo[\"ISBN\"] = 12345;\n\
  bookInfo[\"Title\"] = \"Windows 10 开发\";\nlocalSettings.values[\"AppLocalSettings\"\
  ] = bookInfo;\n```\n\n要从复合设置中读取数据，您可以使用如下代码：\n\n```javascript\nvar bookInfo = localSettings.values[\"\
  AppLocalSettings\"];\nif (bookInfo) {\n    var ISBN = bookInfo[\"ISBN\"];\n    var\
  \ Title = bookInfo[\"Title\"];\n}\n```\n\n## 9.4 如何创建漫游应用数据存储容器\n\n### 问题\n\n您需要在\
  \ Windows 10 应用的应用数据存储中创建一个漫游应用数据存储容器。\n\n### 解决方案\n\n使用 `roamingSettings.createContainer`\
  \ 在应用数据存储中创建漫游应用设置容器。\n\n\n\n### 工作原理\n\n这与你在应用数据存储中看到的本地设置非常相似，但这里使用的是 `Windows.Storage.ApplicationData.current.roamingSettings`，而非\
  \ `Windows.Storage.ApplicationData.current.LocalSettings`。\n\n在 Microsoft Visual\
  \ Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。在 Visual Studio 解决方案资源管理器中，从项目中打开 `default.html`\
  \ 页面。在 `default.html` 的 body 标签内添加以下 HTML 标记：\n\n```\n<body class=\"win-type-body\"\
  \ style=\"background-color:goldenrod\">\n<div id=\"titleBarContent\" style=\"width:\
  \ 100%;height:30px; background:border-box darkblue; overflow: hidden; z-index: 3\"\
  >\n    <i>用户偏好设置屏幕（这些设置将在设备间同步）</i>\n</div>\n<br />\n<input type=\"button\" value=\"\
  保存用户偏好\" id=\"btnUserPreferenceRoamingData\" />\n<br />\n<span id=\"spantoDisplayRoamingData\"\
  \ style=\"color:white\"></span>\n</body>\n```\n\n右键单击解决方案资源管理器中的项目 `js` 文件夹，选择“添加”\
  \ ➤ “新建 JavaScript 文件”。为文件命名。在本示例中，我们将文件命名为 `DatastorageDemo.js`。\n\n```\n(function\
  \ () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
  \ () {\n            var submitbutton = document.getElementById(\"btnUserPreferenceRoamingData\"\
