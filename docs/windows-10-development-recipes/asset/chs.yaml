  \n图 5-16. Hub 导航输出\n\n## 5.10 在 UWP 应用中使用 ListView 进行主/从导航\n\n### 问题\n\n你已确定通用 Windows\
  \ 平台（UWP）应用的导航结构本质上是层次化的。你希望使用主/从（Master/Detail）导航模式，并已确定 `ListView` 作为导航元素。\n\n\
  ### 解决方案\n\n`ListView` 是一个将数据项列表以垂直堆叠方式展示的控件。你可以将数据源绑定到列表视图，并提供一个模板来渲染每个数据项。\n\n\
  ### 工作原理\n\n打开 Visual Studio 2015。选择 **文件** ➤ **新建项目** ➤ **JavaScript** ➤ **Windows**\
  \ ➤ **通用** ➤ **空白应用（Windows 通用）** 模板。这将创建一个通用 Windows 应用项目（见图 5-17）。\n\n![A978-1-4842-0719-2_5_Fig17_HTML.jpg](img/A978-1-4842-0719-2_5_Fig17_HTML.jpg)\n\
  \n图 5-17.\n\n\n\n打开“新建项目”对话框，打开位于项目根目录的`default.html`。将`body`的内容替换为以下代码片段：\n\n```html\n\
  <h1>ListView Navigation</h1>\n<div id=\"contentHost\"></div>\n```\n\n现在你有了一个`div`，其`id`为`contentHost`。将其用作占位符，以便在运行时显示不同的页面；也就是说，将主页面和详细信息页面渲染到这个`contentHost`的`div`元素中。\n\
  \n接下来，打开位于`js`文件夹中的`default.js`。在`app.onactivated`函数定义之前，添加以下代码片段：\n\n```javascript\n\
  WinJS.Navigation.addEventListener(\"navigating\", function (args) {\n    var url\
  \ = args.detail.location;\n    var host = document.getElementById(\"contentHost\"\
  );\n    host.winControl && host.winControl.unload && host.winControl.unload();\n\
  \    WinJS.Utilities.empty(host);\n    args.detail.setPromise(WinJS.UI.Pages.render(url,\
  \ host, args.detail.state));\n});\n```\n\n通过这段代码，你监听了页面上即将发生的导航事件，并为其提供了事件处理程序。在事件处理程序中，你拦截了导航调用，获取了目标页面的\
  \ URL，获取了内容宿主元素，并在该内容宿主元素内渲染了目标页面。\n\n接下来，按如下方式修改`app.onactivated`方法：\n\n```javascript\n\
  app.onactivated = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n        if (args.detail.previousExecutionState !==\n            activation.ApplicationExecutionState.terminated)\
  \ {\n        } else {\n        }\n        args.setPromise( WinJS.UI.processAll().then(function\
  \ () {\n            return WinJS.Navigation.navigate(\"/master.html\");\n      \
  \  })\n       );\n    }\n};\n```\n\n在激活事件处理程序中，唯一做的事情就是导航到一个名为`master.html`的页面（你将在下一步创建此页面）。因此，当应用加载时，包含`ListView`控件的`master.html`将渲染在内容宿主中。\n\
  \n向项目中添加一个新的 HTML 文件，并将其命名为`master.html`。将`master.html`的内容替换为以下代码片段：\n\n```html\n\
  <!DOCTYPE html>\n<html>\n<head>\n    <title></title>\n    <link href=\"/css/default.css\"\
  \ rel=\"stylesheet\" />\n    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-dark.css\"\
  \ rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script\
  \ src=\"WinJS/js/ui.js\"></script>\n    <script src=\"js/data.js\"></script>\n \
  \   <script src=\"js/master.js\"></script>\n</head>\n<body >\n    <div class=\"\
  smallListIconTextTemplate\"\n         data-win-control=\"WinJS.Binding.Template\"\
  \n         style=\"display: none\">\n        <div class=\"smallListIconTextItem\"\
  >\n            <img src=\"#\" class=\"smallListIconTextItem-Image\"\n          \
  \       data-win-bind=\"src: picture\" />\n            <div class=\"smallListIconTextItem-Detail\"\
  >\n                <h4 class=\"win-h4\" data-win-bind=\"textContent: title\"></h4>\n\
  \                <h6 class=\"win-h6\" data-win-bind=\"textContent: text\"></h6>\n\
  \            </div>\n        </div>\n    </div>\n    <div class=\"listView win-selectionstylefilled\"\
  \n         data-win-control=\"WinJS.UI.ListView\"\n         data-win-options=\"\
  {\n                    itemDataSource: ListViewExample.data.dataSource,\n      \
  \              itemTemplate: select('.smallListIconTextTemplate'),\n           \
  \         tapBehavior: WinJS.UI.TapBehavior.directSelect,\n                    layout:\
  \ { type: WinJS.UI.ListLayout }\n            }\">\n    </div>\n</body>\n</html>\n\
  ```\n\n在`master.html`中，你放置了一个列表视图，为其提供了数据源，并提供了渲染每个项目的项模板。该模板会显示数据项中的图片、标题和文本，这些数据将在运行时绑定。\n\
  \n接下来，在`js`文件夹中创建一个新的 JavaScript 文件，并将其命名为`master.js`。将以下代码片段添加到该 JavaScript 文件中：\n\
  \n```javascript\n(function () {\n    'use strict';\n    WinJS.UI.Pages.define(\"\
  /master.html\", {\n        ready: function (element, options) {\n            var\
  \ that = this;\n            element.addEventListener(\"iteminvoked\", function (evt)\
  \ {\n                evt.detail.itemPromise.then(function (item) {\n           \
  \         WinJS.Application.sessionState.selectedItem = item.data;\n           \
  \         WinJS.Navigation.navigate(\"/detail.html\");\n                });\n  \
  \          });\n        }\n    })\n})();\n```\n\n让我们花点时间来解读这段代码。通过这个新的 JavaScript\
  \ 文件，你为`master.html`创建了一个逻辑文件。使用`WinJS.UI.Pages.define()`方法定义了页面成员。你提供了一个`ready`方法，该方法会在页面加载时被调用。同时，你为`ListView`的项点击事件添加了监听器。当项被点击时，会将选中的项存储在应用程序会话状态中，然后导航到`detail.html`。\n\
  \n接下来，在`js`文件夹中创建一个名为`data.js`的新 JavaScript 文件。该文件为`master.html`中的`ListView`提供数据源。将以下代码片段粘贴到`data.js`中：\n\
  \n```javascript\nvar myData = new WinJS.Binding.List([\n    { title: \"Lemon\",\
  \ text: \"Sorbet\", picture: \"/images/60Lemon.png\" },\n    { title: \"Mint\",\
  \ text: \"Gelato\", picture: \"/images/60Mint.png\" },\n    { title: \"Orange\"\
  , text: \"Sorbet\", picture: \"/images/60Orange.png\" },\n]);\nWinJS.Namespace.define(\"\
  ListViewExample\", {\n        data : myData\n});\n```\n\n现在我们来创建详细信息页面。在项目根目录下添加一个新的\
  \ HTML 文件，并将其命名为`detail.html`。将以下代码片段粘贴到新创建的文件中：\n\n```html\n<!DOCTYPE html>\n<html>\n\
  <head>\n    <title></title>\n    <link href=\"/css/default.css\" rel=\"stylesheet\"\
  \ />\n    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"\
  stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
  WinJS/js/ui.js\"></script>\n    <script src=\"/js/detail.js\"></script>\n</head>\n\
  <body>\n    <div>\n        <button data-win-control=\"WinJS.UI.BackButton\"></button>\n\
  \        <h3>Item Details </h3>\n        <h2><span data-win-bind=\"innerText: title\"\
  ></span></h2>\n        <img data-win-bind=\"src: picture\" />\n        <h2><span\
  \ data-win-bind=\"innerText: text\"></span></h2>\n    </div>\n</body>\n</html>\n\
  ```\n\n在此页面中，只需输出列表视图中选中项的详细信息。请注意，你使用了数据绑定表达式来显示数据项的标题、文本和图片。\n\n现在，你需要为`detail.html`创建逻辑文件。在`js`文件夹中添加一个名为`detail.js`的新\
  \ JavaScript 文件。将以下代码片段粘贴到新创建的文件中：\n\n```javascript\n(function () {\n    'use strict';\n\
  \    WinJS.UI.Pages.define(\"/detail.html\", {\n        processed: function (element,\
  \ options) {\n            var that = this;\n            WinJS.Binding.processAll(element,\
  \ WinJS.Application.sessionState.selectedItem);\n        }\n    })\n})();\n```\n\
  \n当页面加载时，只需对页面调用`Binding.processAll()`，并将选中的项作为需要绑定到元素的数项。\n\n主/详细信息导航所需的所有代码已经完成。现在按\
  \ F5 运行应用。图 5-18 和图 5-19 展示了 Windows Mobile 设备上的输出。\n\n![A978-1-4842-0719-2_5_Fig19_HTML.jpg](img/A978-1-4842-0719-2_5_Fig19_HTML.jpg)\n\
