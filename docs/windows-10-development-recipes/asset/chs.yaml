  \n**图 12-12.** Windows 应用中的导航路线\n\n> **注意**  \n> `bingmaps:` URI 方案是 Windows Phone\
  \ 8 中 `MapsDirectionsTask` 启动器的替代方案。\n\n## 12.7 Windows 应用商店应用中的必应地图控件\n\n### 问题\n\
  \n你希望在 Windows 应用中使用地图，而不是启动内置的地图应用。\n\n### 解决方案\n\n使用 Bing Maps AJAX Control 7.0\
  \ 为使用 WinJS 开发的通用 Windows 应用添加地图功能。\n\n### 工作原理\n\n必应地图是微软提供的一项在线地图服务，它允许用户使用微软的地图解决方案，并利用必应地图的各种功能。Bing\
  \ Maps AJAX Control 7.0 和 Bing Maps REST Services 为开发者提供了独特的机会，可以轻松地将位置和搜索功能集成到他们的移动和\
  \ Web 应用中。\n\n要使用 Bing Maps AJAX Control 7.0，请遵循以下步骤：\n\n1. 从 [`http://go.microsoft.com/fwlink/?LinkID=322092`](http://go.microsoft.com/fwlink/?LinkID=322092)\
  \ 下载并安装适用于 Windows 应用商店应用的必应地图 SDK（适用于 Windows 8.1，也适用于 Windows 10）。\n\n2. 获取必应地图密钥。转到\
  \ [`https://www.bingmapsportal.com`](https://www.bingmapsportal.com) 的必应地图帐户中心，并为该应用创建一个密钥。你必须在\
  \ Windows 应用商店应用中使用此密钥。\n\n3. 在 Microsoft Visual Studio 2013 中使用 Windows 应用商店应用模板创建一个新项目，这将创建一个\
  \ Windows 应用商店应用。\n\n4. 将适用于 JavaScript 的必应地图引用添加到项目中。在解决方案资源管理器中，右键单击项目引用，然后选择“添加引用”和“适用于\
  \ JavaScript 的必应地图”。单击“确定”，如图 12-13 所示。\n\n![A978-1-4842-0719-2_12_Fig13_HTML.jpg](img/A978-1-4842-0719-2_12_Fig13_HTML.jpg)\n\
  \n**图 12-13.**\n\n\n\n### Visual Studio 中必应地图的引用管理器\n\n打开项目中的 `default.html` 文件，并在文件的\
  \ `body` 标签中添加以下代码：`<div id=\"myMap\"></div>`\n\n在 `default.html` 文件中，同时添加对必应地图\
  \ JavaScript 文件的引用：\n\n```html\n<!-- Bing Maps references -->\n<script type=\"text/javascript\"\
  \ src=\"ms-appx:///Bing.Maps.JavaScript//js/veapicore.js\"></script>\n<script type=\"\
  text/javascript\" src=\"ms-appx:///Bing.Maps.JavaScript//js/veapimodules.js\"></script>\n\
  ```\n\n打开 `default.js`（`/js/default.js`）并用以下代码替换文件中的内容：\n\n```javascript\n(function\
  \ () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var activation\
  \ = Windows.ApplicationModel.Activation;\n    app.onactivated = function (args)\
  \ {\n        if (args.detail.kind === activation.ActivationKind.launch) {\n    \
  \        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
  \                done(function () {\n                    Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
  \ { callback: GetMap });\n                }));\n        }\n    };\n    var map;\n\
  \    function GetMap() {\n        //   Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
  \ { callback: GetMap });\n        var loc = new Microsoft.Maps.Location(13.0220,\
  \ 77.4908);\n        // Initialize the map\n        map = new Microsoft.Maps.Map(document.getElementById(\"\
  myMap\"), {\n            credentials: \"Bing Map Key\",\n            zoom: 10\n\
  \        });\n        var pin = new Microsoft.Maps.Pushpin(loc);\n        map.entities.push(pin);\n\
  \        // Center the map on the location\n        map.setView({ center: loc, zoom:\
  \ 10 });\n    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n\
  })();\n```\n\n首先需要调用 `Microsoft.Maps` 函数的 `loadModule` 来加载地图。 `loadModule` 有一个可选的\
  \ `culture` 参数，可用于指定本地化语言和区域。为 `loadModule` 指定了 `GetMap` 回调函数：`Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
  \ { callback: GetMap });`\n\n通过指定容器 `div` 元素和必应地图 API 密钥来创建 `Microsoft.Maps.Map`\
  \ 的实例：\n\n```javascript\n// Initialize the map\nmap = new Microsoft.Maps.Map(document.getElementById(\"\
  myMap\"), {\n    credentials: \"Bing Map API Key\",\n});\n```\n\n使用 `map.entities.push`\
  \ 方法标识地图上要添加图钉的位置：\n\n```javascript\nvar loc = new Microsoft.Maps.Location(13.0220,\
  \ 77.4908);\nvar pin = new Microsoft.Maps.Pushpin(loc);\nmap.entities.push(pin);\n\
  ```\n\n最后，通过将地图中心设置在指定位置并将缩放级别设置为 10 来显示地图。\n\n构建应用程序并在 Windows 模拟器中运行它。您应该能够看到地图以及添加到地图上的图钉，如图\
  \ 12-14 所示。\n\n![A978-1-4842-0719-2_12_Fig14_HTML.jpg](img/A978-1-4842-0719-2_12_Fig14_HTML.jpg)\n\
  \n**图 12-14.** Windows 应用中的必应地图\n\n必应地图 AJAX 控件提供了额外的 API，让开发者能够集成更多地图功能，例如显示交通信息、路线等。\n\
  \n目前，WinJS 库在 SDK 中并未直接提供地图控件，因此必应地图 AJAX 控件是一个很好的替代解决方案。\n\n"
- "# 第 13 章：构建连接到云的应用\n\nMicrosoft Azure 移动服务为开发者提供了一种最简单的方式，将 Windows 应用中的数据存储到云中的\
  \ SQL Azure 数据库。通过使用 Microsoft Azure 移动服务，开发者无需担心创建和托管自己的 Web 服务。大多数事情都由 Microsoft\
  \ Azure 移动服务处理。\n\n本章涵盖了一些关于在 Universal Windows 应用中设置和使用 Microsoft Azure 移动服务进行数据存储和检索的食谱。\n\
  \n## 13.1 在 Microsoft Azure 中创建新的移动服务\n\n### 问题\n\n您需要在 Microsoft Azure 移动服务中创建一个新的移动服务，以便您的\
  \ Universal Windows 应用可以使用它。\n\n### 解决方案\n\n登录到 Microsoft Azure 管理门户，使用移动服务部分创建一个新的移动服务。\n\
  \n\n\n### 工作原理\n\nMicrosoft Azure 移动管理门户为开发者提供了必要的选项来管理虚拟机、移动服务、云服务等各种资源。\n\n请按照以下步骤在\
  \ Microsoft Azure 中创建新的移动服务：\n\n登录 Microsoft Azure 管理门户，访问 [`http://manage.windowsazure.com`](http://manage.windowsazure.com/)\
  \ 并提供你的登录凭据。你可以通过单击底部栏中的 `+New` 按钮，然后依次选择 `Compute` ➤ `Mobile Service` ➤ `Create`\
  \ 来创建新的移动服务，如图 13-1 所示。\n\n![A978-1-4842-0719-2_13_Fig1_HTML.jpg](img/A978-1-4842-0719-2_13_Fig1_HTML.jpg)\n\
  \n图 13-1.\n\n用于创建新移动服务的 Microsoft Azure 仪表板\n\n提供移动服务的详细信息。这包括用于访问移动服务的 URL、订阅、区域、后端等。你可以将移动服务名称设置为\
  \ `winjsrecipes`。目前，Microsoft Azure 支持 JavaScript 和 .NET 后端。在此方案中选择 `JavaScript`，然后单击\
  \ `Next` 按钮，如图 13-2 所示。\n\n![A978-1-4842-0719-2_13_Fig2_HTML.jpg](img/A978-1-4842-0719-2_13_Fig2_HTML.jpg)\n\
  \n图 13-2.\n\n新移动服务对话框\n\n如果你选择了 `Create a new SQL database instance`，则必须提供现有的数据库设置信息，如图\
  \ 13-3 所示。完成移动服务的创建。\n\n![A978-1-4842-0719-2_13_Fig3_HTML.jpg](img/A978-1-4842-0719-2_13_Fig3_HTML.jpg)\n\
  \n图 13-3.\n\n新移动服务数据库设置对话框\n\n几分钟后，移动服务即可就绪，并显示在移动服务概览屏幕中。\n\n你也可以使用 Visual Studio\
  \ 2015 在 Microsoft Azure 中创建移动服务。要从 Visual Studio 2015 创建移动服务，请按照以下步骤操作：\n\n启动 Visual\
  \ Studio 2015，打开 `Server Explorer` 窗口。在 `Server Explorer` 窗口中，右键单击 `Azure`，然后在上下文菜单中选择\
  \ `Connect to Microsoft Azure…`，如图 13-4 所示。提供你的 Microsoft Azure 登录凭据。这会将 Azure 订阅导入到\
  \ Visual Studio。\n\n![A978-1-4842-0719-2_13_Fig4_HTML.jpg](img/A978-1-4842-0719-2_13_Fig4_HTML.jpg)\n\
  \n图 13-4.\n\n从 Visual Studio 服务器资源管理器窗口连接到 Azure\n\n下一步是从 `Server Explorer` 创建移动服务。右键单击\
  \ `Mobile Services`，然后选择 `Create Service`，如图 13-5 所示。\n\n![A978-1-4842-0719-2_13_Fig5_HTML.jpg](img/A978-1-4842-0719-2_13_Fig5_HTML.jpg)\n\
  \n图 13-5.\n\n从 Visual Studio 2015 创建服务\n\n在 `Create Mobile Service` 对话框中，提供要创建的移动服务的必要信息，包括\
  \ URL、区域、数据库信息等。将方案命名为 `winjs`，如图 13-6 所示。\n\n![A978-1-4842-0719-2_13_Fig6_HTML.jpg](img/A978-1-4842-0719-2_13_Fig6_HTML.jpg)\n\
  \n图 13-6.\n\nVisual Studio 2015 中的新移动服务对话框\n\n> **注意**  \n> 你需要拥有一个 Microsoft Azure\
  \ 订阅。如果你尚未订阅，则需要访问 [`http://azure.microsoft.com/en-us/`](http://azure.microsoft.com/en-us/)。如果你想试用\
  \ Microsoft Azure，可以获得一个免费试用帐户。\n\n## 13.2 在移动服务中创建数据库表\n\n### 问题\n\n你需要创建一个表来存储\
  \ Microsoft Azure 中的待办事项，这些事项将由你的通用 Windows 应用使用。\n\n### 解决方案\n\n你可以使用 Microsoft\
  \ Azure 管理门户或 Visual Studio 2015 在 Microsoft Azure 移动服务中创建数据库表。\n\n### 工作原理\n\n\
  ![A978-1-4842-0719-2_13_Fig7_HTML.jpg](img/A978-1-4842-0719-2_13_Fig7_HTML.jpg)\n\
  \n图 13-7.\n\nAzure 移动服务仪表板\n\n要从 Microsoft Azure 移动服务创建表，请使用你的登录凭据登录 Azure 管理门户。在移动服务概览屏幕中，选择你想要在其中创建新表的移动服务。在选定的移动服务中（见图\
  \ 13-7），选择 `DATA` 选项卡，然后单击 `ADD A TABLE` 开始创建新表。\n\n在 `Create New Table` 对话框中，输入表名（将其命名为\
  \ `todo`），并为插入、更新、删除和读取操作保留默认权限 `Anybody with the Application Key`，如图 13-8 所示。单击\
  \ `Submit` 按钮。\n\n![A978-1-4842-0719-2_13_Fig8_HTML.jpg](img/A978-1-4842-0719-2_13_Fig8_HTML.jpg)\n\
  \n图 13-8.\n\n在 Microsoft Azure 的移动服务中创建表\n\n请注意，你并未为 `todo` 表指定列。一种选择是直接从仪表板向表中添加列，这是推荐的做法。另一种选择是使用\
  \ `Dynamic` 架构，该架构会根据你插入的数据动态创建列（这使得开发新的移动服务更加容易）。本方案采用第二种做法。开发者可以随时在仪表板中禁用 `Dynamic`\
  \ 架构。\n\n## 13.3 为 WinJS 客户端库安装移动服务\n\n### 问题\n\n你需要为 WinJS 客户端库安装移动服务，以使你的 Windows\
  \ 应用能够与 Microsoft Azure 移动服务交互。\n\n### 解决方案\n\n使用 NuGet 包管理器控制台，在通用 Windows 项目中执行以下命令，以将移动服务添加到\
  \ WinJS 客户端库：\n\n```\nInstall-Package WindowsAzure.MobileServices.Winjs\n```\n\n\
  ### 工作原理\n\nNuGet 包管理器控制台让开发者能够快速安装库。要添加适用于 WinJS 客户端库的移动服务，请按照以下步骤操作。\n\n启动 Visual\
  \ Studio 2015，并使用 JavaScript 模板创建一个新的通用 Windows 应用。在 Visual Studio 中，依次选择 `Tools`\
  \ ➤ `Library package manager` ➤ `Package Manager Console`，然后输入以下命令：\n\n```\ninstall-package\
  \ WindowsAzure.MobileServices.WinJS\n```\n\n在运行此命令之前，请确保在包管理器控制台中已将正确的项目选为 `Default\
  \ project`（见图 13-9）。\n\n![A978-1-4842-0719-2_13_Fig9_HTML.jpg](img/A978-1-4842-0719-2_13_Fig9_HTML.jpg)\n\
  \n图 13-9.\n\n包管理器控制台中的项目选择\n\n安装成功后，你将在解决方案资源管理器中的项目 `JS` 文件夹下看到新的 JavaScript 文件，如图\
  \ 13-10 所示。\n\n![A978-1-4842-0719-2_13_Fig10_HTML.jpg](img/A978-1-4842-0719-2_13_Fig10_HTML.jpg)\n\
  \n图 13-10.\n\n安装库后解决方案资源管理器中的通用项目\n\n要使用移动服务的 WinJS 库，你必须在 HTML 页面中添加对 `MobileServices.min.js`\
  \ 脚本的引用。\n\n```html\n<script src=\"js/MobileServices.min.js\"></script>\n```\n\n\
  现在，你可以从你的 Windows 应用商店项目访问移动服务客户端库。\n\n## 13.4 执行 CRUD 操作\n\n### 问题\n\n你需要从 Windows\
  \ 应用对 `todo` 表执行创建、读取、更新和删除（CRUD）操作。（`todo` 表的创建已在上一方案中演示过。）\n\n### 解决方案\n\n你可以使用移动服务库公开的方法，对在移动服务中创建的表执行基本的\
  \ CRUD 操作。\n\n\n\n### 工作原理\n\n在前一篇教程中，你创建了一个名为 `winjsrecipes` 的移动服务和一个名为 `todo`\
  \ 的数据表。在本篇教程中，你将学习如何在 Windows 应用中与 `todo` 数据库表进行交互。  \n**Microsoft Azure 移动服务：CRUD\
  \ 操作：**\n\n在 Windows 应用中打开 `default.html` 页面，并在 head 部分添加以下对移动服务库的引用：\n\n```\n<script\
  \ src=\"js/MobileServices.min.js\"></script>\n```\n\n在同一文件中，将以下代码添加到 `body` 标签中：\n\
  \n```\n<div style=\"margin:38px 18px 18px 18px\">\n    <h4 style=\"margin-bottom:18px\"\
  >winjsrecipes</h4>\n    <div>在下方输入一些文本，然后点击“保存”以向数据库插入一个新的 TodoItem 项</div>\n  \
  \  <input type=\"text\" id=\"textInput\" style=\"width:240px;vertical-align:middle;margin-right:10px;\"\
  \ />\n    <button id=\"buttonSave\" style=\"vertical-align:middle\">保存</button>\n\
  \    <div>点击下方的“刷新”以从数据库加载未完成的 TodoItems。使用复选框来完成和更新你的 TodoItems</div>\n    <button\
  \ id=\"buttonRefresh\" style=\"width:100%\">刷新</button>\n    <div id=\"TemplateItem\"\
  \ data-win-control=\"WinJS.Binding.Template\">\n        <input type=\"checkbox\"\
  \ style=\"margin-right:5px\" data-win-bind=\"checked: complete; dataContext: this;\
  \ innerText: text\" />\n    </div>\n    <div id=\"listItems\"\n         data-win-control=\"\
  WinJS.UI.ListView\"\n         data-win-options=\"{ itemTemplate: TemplateItem, layout:\
  \ {type: WinJS.UI.ListLayout} }\">\n    </div>\n</div>\n```\n\n从 `JS` 文件夹中打开 `default.js`\
  \ 文件，并将其替换为以下代码：\n\n```\n// 有关空白模板的简介，请参阅以下文档：\n// http://go.microsoft.com/fwlink/?LinkID=392286\n\
  (function () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var activation\
  \ = Windows.ApplicationModel.Activation;\n    app.onactivated = function (args)\
  \ {\n        if (args.detail.kind === activation.ActivationKind.launch) {\n    \
  \        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll());\n\
  \            var client = new WindowsAzure.MobileServiceClient(\n              \
  \                  \"https://winjsrecipes.azure-mobile.net/\",\n               \
  \                 \"<应用程序密钥 2>\"\n                        );\n            var todoTable\
  \ = client.getTable('todo');\n            var todoItems = new WinJS.Binding.List();\n\
  \            var insertTodoItem = function (todoItem) {\n                todoTable.insert(todoItem).done(function\
  \ (item) {\n                    todoItems.push(item);\n                });\n   \
  \         };\n            var refreshTodoItems = function () {\n               \
  \ todoTable.where({ complete: false })\n                    .read()\n          \
  \          .done(function (results) {\n                        todoItems = new WinJS.Binding.List(results);\n\
  \                        listItems.winControl.itemDataSource = todoItems.dataSource;\n\
  \                    });\n            };\n            var updateCheckedTodoItem\
  \ = function (todoItem) {\n                todoTable.update(todoItem).done(function\
  \ (item) {\n                    todoItems.splice(todoItems.indexOf(item), 1);\n\
  \                });\n            };\n            buttonSave.addEventListener(\"\
  click\", function () {\n                insertTodoItem({\n                    text:\
  \ textInput.value,\n                    complete: false\n                });\n \
  \           });\n            buttonRefresh.addEventListener(\"click\", function\
  \ () {\n                refreshTodoItems();\n            });\n            listItems.addEventListener(\"\
  change\", function (eventArgs) {\n                var todoItem = eventArgs.target.dataContext.backingData;\n\
  \                todoItem.complete = eventArgs.target.checked;\n               \
  \ updateCheckedTodoItem(todoItem);\n            });\n            refreshTodoItems();\n\
  \        }\n    };\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n\
  })();\n```\n\n使用 **本地计算机** 选项在 Windows 桌面上运行应用程序。你应该会看到如图 13-11 所示的屏幕。你应该能够通过应用程序向移动服务添加、删除或更新数据。\n\
  \n![A978-1-4842-0719-2_13_Fig11_HTML.jpg](img/A978-1-4842-0719-2_13_Fig11_HTML.jpg)\n\
  \n**图 13-11.** 带有插入和刷新选项的 Windows 应用\n\n在从 Windows 应用对 Microsoft Azure 移动服务执行任何操作之前，你必须首先连接到该服务并获取对远程服务的访问权限。通过使用\
  \ `MobileServiceClient` 对象可以获取对远程服务客户端的访问。同样，通过使用 `MobileServiceTable` 对象可以获取对远程数据表的访问。\n\
  \n以下是获取 `MobileServiceClient` 和数据表引用的方法：\n\n```\nvar client = new WindowsAzure.MobileServiceClient(\n\
  \                \"https://winjsrecipes.azure-mobile.net/\",\n                \"\
  <输入应用程序密钥>\"\n            );\nvar todoTable = client.getTable('todo');\n```\n\n\
  `MobileServiceClient` 构造函数接受两个参数。第一个参数是你的移动服务的 URL，第二个参数是应用程序密钥。\n\n**注意：**  \n\
  要获取你的移动服务的应用程序密钥，你需要登录到 Microsoft Azure 管理门户，导航到你的移动服务的仪表板，并使用 **管理密钥** 选项来获取应用程序密钥。你需要将此密钥用作移动服务客户端的第二个参数。\n\
  \n可以通过调用 `MobileServiceTable` 对象的 `insert` 方法来执行插入操作。以下代码将新文本插入到 `todo` 数据表中：\n\n\
  ```\ninsertTodoItem({\n    text: textInput.value,\n    complete: false\n});\n\n\
  var insertTodoItem = function (todoItem) {\n    // 此代码向数据库插入一个新的 TodoItem。当操作完成时\n\
  \    todoTable.insert(todoItem).done(function (item) {\n        todoItems.push(item);\n\
  \    });\n};\n```\n\n`insert` 方法的返回类型是 promise。你可以包含 success 和 error 函数来处理 `insert`\
  \ 方法的操作结果。在前面的示例中，一旦插入成功，`todoItems` 列表就会在 UI 中更新。\n\n可以使用 `MobileServiceTable`\
  \ 类中定义的 `update` 方法来更新移动服务中的现有记录。例如，以下演示了如何更新 `todo` 数据表中的一条记录：\n\n```\nvar todoItem\
  \ = { id:1 };\ntodoItem.complete = true;\nupdateCheckedTodoItem(todoItem);\n\nvar\
  \ updateCheckedTodoItem = function (todoItem) {\n    // 此代码获取一个刚刚完成的 TodoItem 并更新数据库。当移动服务\n\
  \    // 响应时，该条目将从列表中移除\n    todoTable.update(todoItem).done(function (item) {\n\
  \        todoItems.splice(todoItems.indexOf(item), 1);\n    });\n};\n```\n\n更新记录时，必须在待更新的记录中包含主键。在此示例中，`id`\
  \ 字段是主键。当创建新的 Azure 移动服务时，会自动创建 `id` 列并将其设为主键。此字段是一个自增列。\n\n可以通过调用 `MobileServiceTable`\
  \ 类的 `del()` 方法来执行记录的删除。例如，以下示例演示了如何从 `todo` 数据表中删除一条记录：\n\n```\nvar deleteItem\
  \ = { id:1 };\ntodoTable.del(deleteItem);\n```\n\n与 `update` 方法类似，`del` 方法也需要传递对象的主键。\n\
  \n\n\n## 13.5 使用分页检索数据\n\n### 问题\n\n你需要控制从 Microsoft Azure 移动服务返回到通用 Windows 应用程序的数据量。\n\
  \n### 解决方案\n\n在客户端使用 `take` 和 `skip` 查询方法，从移动服务中获取指定数量的记录。\n\n### 工作原理\n\n本节将以上一篇教程作为起点。\n\
  \n在应用中更改文本并点击保存按钮，再添加六项待办事项。打开 `default.js` 文件，将 `refreshTodoItems` 方法替换为以下代码。\n\
  \n```\nvar refreshTodoItems = function () {\n    // 定义一个过滤查询，返回前两项\n    todoTable.where({\
  \ complete: false })\n        .take(2)\n        .read()\n        .done(function\
  \ (results) {\n            todoItems = new WinJS.Binding.List(results);\n      \
  \      listItems.winControl.itemDataSource = todoItems.dataSource;\n        });\n\
  };\n```\n\n此示例返回待办事项表中未标记为已完成的前两项。\n\n使用“本地计算机”选项在 Windows 桌面上运行应用程序。你应该会看到服务中的前三项待办事项，如图\
  \ 13-12 所示。\n\n![A978-1-4842-0719-2_13_Fig12_HTML.jpg](img/A978-1-4842-0719-2_13_Fig12_HTML.jpg)\n\
  \n图 13-12. Windows 应用程序使用分页仅显示两条记录\n\n如果你想要跳过表中一定数量的项目，然后返回之后的记录，该怎么办？你可以使用 `skip`\
  \ 方法来实现。\n\n以下是一个代码片段，它跳过前四条记录，并返回之后的四条记录。这类似于可以显示更多四条记录的第二页。\n\n```\nvar refreshTodoItems\
  \ = function () {\n                todoTable.where({ complete: false })\n      \
  \              .skip(4)\n                    .take(4)\n                    .read()\n\
  \                    .done(function (results) {\n                        todoItems\
  \ = new WinJS.Binding.List(results);\n                        listItems.winControl.itemDataSource\
  \ = todoItems.dataSource;\n                    });\n            };\n```\n\n**注意：**\
  \ 移动服务的每个响应自动限制最多 50 个项目。`skip`/`take` 方法有助于在单个响应中检索更多记录（如果需要）。\n\n## 13.6 对来自移动服务的返回数据进行排序\n\
  \n### 问题\n\n你需要对从移动服务返回到通用 Windows 应用程序的数据进行排序。\n\n### 解决方案\n\n你可以在查询中使用 `orderBy`\
  \ 或 `orderByDescending` 函数。\n\n### 工作原理\n\n本节将以上一篇教程作为起点。你将更新 `refreshTodoItems`\
  \ 方法以对记录进行排序。\n\n打开 `default.js` 文件，将 `refreshTodoItems` 方法替换为以下代码，以按文本降序排序。\n\n\
  ```\nvar refreshTodoItems = function () {\n                todoTable.where({ complete:\
  \ false }).orderByDescending(\"text\")\n                    .read()\n          \
  \          .done(function (results) {\n                        todoItems = new WinJS.Binding.List(results);\n\
  \                        listItems.winControl.itemDataSource = todoItems.dataSource;\n\
  \                    });\n            };\n```\n\n当你使用“本地计算机”选项在 Windows 桌面上运行应用程序时，你会注意到列表现在按降序排列，如图\
  \ 13-13 所示。\n\n![A978-1-4842-0719-2_13_Fig13_HTML.jpg](img/A978-1-4842-0719-2_13_Fig13_HTML.jpg)\n\
  \n图 13-13. Windows 应用程序显示来自移动服务的排序数据\n\n若要按升序排序数据，可以使用 `orderBy` 方法指定要对其排序的列。以下示例演示如何按\
  \ `\"text\"` 列对待办事项表进行升序排序。\n\n```\ntodoTable.where({ complete: false }).orderBy(\"\
  text\")\n                    .read()\n```\n\n## 13.7 在服务器脚本中执行验证\n\n### 问题\n\n你希望在\
  \ Microsoft Azure 移动服务的服务器端 JavaScript 中执行验证。\n\n### 解决方案\n\n你可以在服务器脚本（插入、更新、删除等）中定义验证。这可以通过\
  \ Visual Studio 2015 或移动服务仪表板进行修改。\n\n### 工作原理\n\n让我们使用上一篇教程的示例来演示如何在 Azure 移动服务中执行验证，然后在\
  \ Windows 应用程序中显示消息。\n\n假设你希望验证插入新记录时提交的数据长度。你需要注册一个脚本来验证少于六个字符的数据。如果文本长度小于或等于六个字符，你需要显示一条错误消息。\n\
  \n在 Visual Studio 中打开服务器资源管理器窗口，展开移动服务表。双击 `insert.js` 文件，开始在 Visual Studio 中修改它。你也可以右键单击并选择“编辑脚本”选项来编辑文件，如图\
  \ 13-14 所示。请注意，当你修改并保存文件时，该文件会在 Microsoft Azure 中自动更新。\n\n![A978-1-4842-0719-2_13_Fig14_HTML.jpg](img/A978-1-4842-0719-2_13_Fig14_HTML.jpg)\n\
  \n图 13-14. Visual Studio 2015 中用于移动服务的脚本文件\n\n将 `insert.js` 文件替换为以下代码片段。\n\n```\n\
  function insert(item, user, request) {\n    if (item.text.length <= 6) {\n     \
  \   request.respond(statusCodes.BAD_REQUEST, '文本长度必须大于 6 个字符');\n    } else {\n\
  \        request.execute();\n    }\n}\n```\n\n从项目中打开 `default.js` 文件，并将 `insertTodoItem`\
  \ 函数替换为以下内容：\n\n```\nvar insertTodoItem = function (todoItem) {\n              \
  \  todoTable.insert(todoItem).done(function (item) {\n                    todoItems.push(item);\n\
  \                }, function (error) {\n                    // 显示错误消息\n        \
  \            var msg = new Windows.UI.Popups.MessageDialog(\n                  \
  \      error.request.responseText);\n                    msg.showAsync();\n    \
  \            });\n            };\n```\n\n使用“本地计算机”选项在 Windows 桌面上运行该应用，并尝试添加一个少于六个字符的待办事项。点击“保存”按钮。应用程序应显示如图\
  \ 13-15 所示的消息。\n\n![A978-1-4842-0719-2_13_Fig15_HTML.jpg](img/A978-1-4842-0719-2_13_Fig15_HTML.jpg)\n\
  \n图 13-15. Windows 应用程序显示来自移动服务的验证消息\n\n或者，你也可以从“脚本”选项卡修改脚本，该选项卡可以通过在 Azure 管理门户的“数据”选项卡中选择表来找到。\n\
  \n"
- "# 第 14 章：磁贴和通知\n\n众所周知，在 Windows 8 中，微软引入了一种使用磁贴启动应用程序的新方式，磁贴是用户体验的标志性组成部分。在 Windows\
  \ 10 中，还有一些令人兴奋且不同的附加功能。本章概述了 Windows 10 中可用的磁贴和通知。你将探索如何创建不同类型的磁贴和通知。\n\n## 14.1\
  \ 创建默认磁贴\n\n### 问题\n\n你需要在应用程序中添加一个默认磁贴。\n\n### 解决方案\n\n使用 `package.appxmanifest`\
  \ 为 UWP 应用磁贴和显示提供信息。\n\n\n\n### 工作原理\n\n在 Visual Studio 2015 中创建一个新的通用 Windows 应用项目。打开项目的\
  \ `package.appxmanifest` 文件。这将打开清单编辑器窗口，如图 14-1 所示。\n\n![A978-1-4842-0719-2_14_Fig1_HTML.jpg](img/A978-1-4842-0719-2_14_Fig1_HTML.jpg)\n\
  \n图 14-1. 应用程序的 `package.appmanifest` 文件\n\n如果尚未选中，请选择 **应用程序** 选项卡。根据需要更改 **显示名称**\
  \ 的值。显示名称是应用名称，会列在应用列表的已安装/可用应用中，并显示在应用的标题栏里。\n\n在应用清单中，单击 **视觉资产** 选项卡。在 **磁贴和徽标**\
  \ 部分，更换为徽标提供的图像，并在 Windows 清单中选择徽标。更改或输入应用的新 **短名称**，其长度应为 13 个字符，否则将被截断。选择显示短名称的合适磁贴尺寸。您可以以\
  \ W3DC 格式（例如 `#FFFFFF`）输入首选的背景颜色，或使用默认背景颜色。\n\n编译项目并运行应用，以测试通过应用创建的磁贴标题和图像徽标。\n\n\
  ## 创建自适应磁贴\n\n自适应磁贴是 Windows 10 的新增功能。对于自适应磁贴，有新的轻量级 XML 模板，允许开发者根据自身需求设计磁贴通知内容，以支持不同的设备和显示器。\n\
  \n### 问题\n\n您想为 UWP 应用创建自适应磁贴。\n\n### 解决方案\n\n与标准磁贴类似，使用自适应磁贴模板提供磁贴内容。要创建自适应磁贴，可使用自适应磁贴模板来创建不同类型的磁贴。\n\
  \n通知可视化工具 (`https://www.microsoft.com/store/apps/9nblggh5xsl1`) 可帮助开发者设计自适应磁贴。它提供即时的视觉预览，帮助您快速设计和测试自适应磁贴。它还提供了一种简便的方法来配置磁贴属性，如文本、字体、显示颜色、显示名称、背景图像、徽章值等。\n\
  \n自适应模板适用于不同类型的通知和不同外形规格。自适应磁贴的外观取决于应用安装所在的设备以及通知的类型（磁贴或 Toast）。\n\n自适应磁贴的 XML 模式语法如下：\n\
  \n```\n<tile>\n  <visual>\n    <binding template=\"TileMedium\">\n      ...\n  \
  \  </binding>\n    <binding template=\"TileWide\">\n      ...\n    </binding>\n\
  \    <binding template=\"TileLarge\">\n      ...\n    </binding>\n  </visual>\n\
  </tile>\n```\n\n`binding` 元素是关键，其中指定了每个磁贴尺寸的内容。在一个 XML 负载中，您可以指定多个绑定。以下是可以指定在 `binding`\
  \ 的 `template` 参数中的不同磁贴尺寸类型：\n\n- `TileSmall`\n- `TileMedium`\n- `TileWide`\n- `TileLarge`（仅限桌面版）\n\
  \n### 工作原理\n\n自适应磁贴模板基于 XML。让我们使用通知可视化工具生成自适应磁贴的 XML。\n\n在 Visual Studio 2015 中创建一个新的通用\
  \ Windows 应用项目。这将创建一个新的 Windows 应用项目。在 Visual Studio 解决方案资源管理器中，从项目中打开 `default.html`\
  \ 页面。在 `default.html` 的 `body` 标签内添加以下 HTML 标记。\n\n```\n<input type=\"button\" value=\"\
  更新自适应磁贴\" id=\"btnUpdateAdaptiveTile\" />\n```\n\n此 HTML 在 `default.html` 页面上添加了一个简单的\
  \ HTML 按钮，其文本为“更新自适应磁贴”。\n\n现在，右键单击解决方案资源管理器中的项目，然后选择 **添加 ➤ 新建 JavaScript 文件**。为文件命名：`LoadTileandNotifications.js`。添加以下代码：\n\
  \n```\nfunction GetControl() {\n        WinJS.UI.processAll().done(function () {\n\
  \            var adaptiveTilebutton = document.getElementById(\"btnUpdateAdaptiveTile\"\
  );\n            adaptiveTilebutton.addEventListener(\"click\", AddAdaptiveTiles,\
  \ false);\n    }\ndocument.addEventListener(\"DOMContentLoaded\", GetControl);\n\
  ```\n\n在上述代码中，您为 `btnUpdateAdaptiveTile` HTML 按钮添加了一个事件处理程序 `AddAdaptiveTiles()`。然后在\
  \ `default.html` 加载时添加了 `GetControl` 方法。\n\n重新打开 `default.html`，并添加对 `LoadTileandNotifications.js`\
  \ 文件的引用。\n\n```\n<script src=\"/js/LoadTileandNotifications.js\"></script>\n```\n\
  \n现在，让我们使用 `LoadTileandNotifications.js` 文件中的以下代码片段添加一个 `AddAdaptiveTiles()` 事件处理程序方法。\n\
  \n```\n    function AddAdaptiveTiles() {\n        var adaptivetileXml = \"<tile><visual\
  \ displayName=\\\"UWP 食谱\\\" branding=\\\"name\\\">\"\n        + \"<binding template=\\\
  \"TileSmall\\\"><group><subgroup><text hint-style=\\\"subtitle\\\"> Windows 10 应用食谱\
  \ </text><text hint-style=\\\"subtitle\\\">自适应磁贴</text></subgroup></group></binding>\"\
  \n        + \"<binding template=\\\"TileMedium\\\"><group><subgroup><text hint-style=\\\
  \"subtitle\\\"> Windows 10 应用食谱 </text><text hint-style=\\\"subtitle\\\">自适应磁贴</text></subgroup></group></binding>\"\
  \n        + \"<binding template=\\\"TileLarge\\\"><group><subgroup><text hint-style=\\\
  \"subtitle\\\"> Windows 10 应用食谱 </text><text hint-style=\\\"subtitle\\\">自适应磁贴</text></subgroup></group></binding>\"\
  \n        + \"<binding template=\\\"TileWide\\\"><group><subgroup><text hint-style=\\\
  \"subtitle\\\"> Windows 10 应用食谱 </text><text hint-style=\\\"subtitle\\\">自适应磁贴</text></subgroup></group></binding>\"\
  \n        + \"</visual></tile>\";\n\n        var adaptivetileDom = Windows.Data.Xml.Dom.XmlDocument();\n\
  \        adaptivetileDom.loadXml(adaptivetileXml);\n        var notifications =\
  \ Windows.UI.Notifications;\n        var tileNotification = new notifications.TileNotification(adaptivetileDom);\n\
  \        notifications.TileUpdateManager.createTileUpdaterForApplication().update(tileNotification);\n\
  \    }\n```\n\n在此事件监听函数中，您创建了一个 `XmlDocument` 对象 `adaptivetileDom`，用于加载 `adaptivetileXml`。`adaptivetileXml`\
  \ 包含了 `adaptiveTile` 的 XML 负载，其中包含以下自适应磁贴绑定：\n\n- `TileSmall`\n- `TileMedium`\n\
  - `TileLarge`\n- `TileWide`\n\n上述代码中使用了 `Windows.UI.Notifications` 命名空间。\n\n在 `adaptivetileXml`\
  \ 中，所有磁贴都具有以下显示名称：UWP 食谱。下一个参数是 `branding`，设置为 `name`。这会在磁贴底部显示名称值。\n\n`<group>`\
  \ 和 `<subgroup>` 元素用于在语义上对磁贴上显示的内容进行分组。在此例中，先显示“Windows 10 应用食谱”，然后在下一行显示“磁贴中的食谱”。这两个文本元素被组合在一起。\n\
  \n在 `TileLarge` 绑定中，我们还在磁贴中显示了图像以及文本内容。该图像与文本内联显示，但您也可以将其设置为磁贴的背景。\n\n当磁贴中有多列时，`hint-width`\
  \ 属性用于指定列的宽度。\n\n`XmlDocument` 创建后，创建一个类型为 `Windows.UI.Notifications.TileNotification()`\
  \ 的 `tileNotification` 对象，并将 `adaptivetileXml` 作为参数传递给 `TileNotification` 类。`tileNotification`\
  \ 对象用于定义磁贴以及与磁贴相关的视觉元素。\n\n之后，使用 `TileUpdateManager` 类将通知发送到应用的磁贴，该类通过 `createTileUpdaterForApplication().update()`\
  \ 方法更改更新程序所绑定的指定磁贴的内容。\n\n当您在 Windows 10 设备上运行应用程序时，单击 **更新自适应磁贴** 按钮以动态更新磁贴，如图\
  \ 14-2 所示。\n\n![A978-1-4842-0719-2_14_Fig2_HTML.jpg](img/A978-1-4842-0719-2_14_Fig2_HTML.jpg)\n\
  \n图 14-2. 使用 `Windows.UI.Notifications.TileNotification()` 更新 Windows 10 自适应磁贴\n\
  \n\n\n## 14.3 创建包含视觉内容的 Toast 通知\n\n### 问题\n\n希望创建一个交互式 Toast 通知，使其能够显示图像，并覆盖应用徽标和通知中的内联图像缩略图。\n\
  \n### 解决方案\n\nWindows 10 UWP 提供了使用类似自适应磁贴的 XML 模板开发的 Toast 通知。Toast 通知的 XML 主要包含三个关键元素：视觉（visual）、操作（action）和音频（audio）。`ToastNotificationManager`\
  \ 用于发送 Toast 通知。请使用 `ToastNotificationManager` 向应用发送新通知。\n\n### 工作原理\n\n在上一节中，您使用\
  \ XML Schema 创建了一个自适应磁贴。现在，您将以类似的方式创建一个交互式 Toast 通知，用于在 Apress 目录中有新书添加时通知用户。\n\n\
  使用同一个项目。在 `default.html` 的 `<body>` 标签内添加以下 HTML 标记。\n\n```\n<input type=\"button\"\
  \ value=\"显示 Toast\" id=\"btnDisplayToast\" />\n<br />\n```\n\n这将在 `default.html`\
  \ 页面上创建一个简单的“显示 Toast”HTML 按钮。\n\n打开 `LoadTileandNotifications.js`，并在现有的 `GetControl()`\
  \ 方法中添加以下代码：\n\n```\nvar toastNotificationbutton = document.getElementById(\"btnDisplayToast\"\
  );\ntoastNotificationbutton.addEventListener(\"click\", DisplayToastNotification,\
  \ false);\n```\n\n在上述代码中，您获取了 `btnDisplayToast` 按钮的引用，并将点击事件处理程序与 `AddToastNotification()`\
  \ 方法关联。\n\n使用以下代码片段添加一个新的 `AddToastNotification` 事件方法：\n\n```\nfunction AddToastNotification()\n\
  \  {\n      var toastXML = \"<toast><visual>\"\n+ \"<binding template=\\\"ToastGeneric\\\
  \"><text>Apress 目录</text><text>Apress 正在编写新的 Windows 10 指南</text>\"\n+ \"<image\
  \ placement=\\\"appLogoOverride\\\" src=\\\"/images/Alarm.png\\\" /><image placement=\\\
  \"inline\\\" src=\\\"/images/Pattern-Blue-Dots-background.jpg\\\" /></binding>\"\
  \n+ \" </visual>\"\n    + \"</toast>\";\n      var toastNotificationDom = Windows.Data.Xml.Dom.XmlDocument();\n\
  \      toastNotificationDom.loadXml(toastXML);\n      var notifications = Windows.UI.Notifications;\n\
  \      // 获取当前应用的 Toast 通知管理器。\n      var notificationManager = notifications.ToastNotificationManager;\n\
  \      // 从 XML 创建 Toast 通知，然后创建 ToastNotifier 对象\n      // 以发送 Toast。\n      var\
  \ toast = new notifications.ToastNotification(toastNotificationDom);\n      notificationManager.createToastNotifier().show(toast);\n\
  \  }\n```\n\n在上述事件监听方法中，`adaptivetileXml` 变量包含了 Toast 通知的 XML 内容，这与“自适应磁贴”类似，但在\
  \ `<binding>` 元素中，模板值设置为 `ToastGeneric`。\n\n然后创建一个类型为 `ToastNotification` 的新 `toast`\
  \ 对象，并指定 `toastNotificationDom` `XmlDocument`。之后，使用 `ToastNotificationManager` 类将通知发送到应用的磁贴，该类会发送指定\
  \ Toast 的内容。\n\n在模拟器中运行应用，并加载默认页面。点击“显示 Toast”按钮测试输出，如图 14-3 所示。\n\n![A978-1-4842-0719-2_14_Fig3_HTML.jpg](img/A978-1-4842-0719-2_14_Fig3_HTML.jpg)\n\
  \n图 14-3.\n\n来自 UWP 应用的 Toast 通知\n\n您可以创建与应用关联的 Toast 通知，并在应用运行时动态通知用户。在下一个技巧中，您将学习如何为\
  \ Toast 通知添加操作。\n\n## 14.4 创建带操作的 Toast 通知\n\n### 问题\n\n希望创建带有可选操作的交互式 Toast 通知，供用户选择。\n\
  \n### 解决方案\n\n在 Toast 通知的 XML 中添加 `<Actions>` 元素。\n\n### 工作原理\n\n在之前的技巧中，您使用 XML\
  \ Schema 创建了一个自适应 Toast 通知。现在，您将以类似的方式创建一个带有操作的交互式 Toast 通知，当 Apress 目录中有新书时通知用户，并允许用户执行操作。\n\
  \n我们沿用上一个技巧中的项目。打开 `LoadTileandNotifications.js` 文件。添加一个新方法 `AddInteractiveToastNotification()`。\n\
  \n```\nfunction AddInteractiveToastNotification()\n    {\n        var toastXML =\
  \ \"<toast><visual>\"\n+ \"<binding template=\\\"ToastGeneric\\\"><text>Apress 目录</text><text>Apress\
  \ 正在编写新的 Windows 10 指南</text>\"\n+ \"<image placement=\\\"appLogoOverride\\\" src=\\\
  \"/images/Alarm.png\\\" /><image placement=\\\"inline\\\" src=\\\"/images/Pattern-Blue-Dots-background.jpg\\\
  \" /></binding>\"\n+ \" </visual>\"\n+ \"<actions><action content=\\\"查看\\\" arguments=\\\
  \"check\\\" imageUri=\\\"/images/storelogo.png\\\" /><action content=\\\"取消\\\"\
  \ arguments=\\\"cancel\\\" /></actions>\"\n+ \" <audio src=\\\"ms-winsoundevent:Notification.Reminder\\\
  \"/>\"\n+ \"</toast>\";\n        var toastNotificationDom = Windows.Data.Xml.Dom.XmlDocument();\n\
  \        toastNotificationDom.loadXml(toastXML);\n        var notifications = Windows.UI.Notifications;\n\
  \        // 获取当前应用的 Toast 通知管理器。\n        var notificationManager = notifications.ToastNotificationManager;\n\
  \        // 从 XML 创建 Toast 通知，然后创建 ToastNotifier 对象\n        // 以发送 Toast。\n   \
  \     var toast = new notifications.ToastNotification(toastNotificationDom);\n \
  \       notificationManager.createToastNotifier().show(toast);\n    }\n```\n\n在\
  \ `AddInteractiveToastNotification()` 事件处理方法中，唯一的区别在于 XML 内容，您添加了额外的元素以允许用户执行操作。同时，当\
  \ Toast 通知发送到应用时，它还会播放一个通知音效。操作在 `<actions><action>` 元素下指定。\n\n在 `default.html`\
  \ 中，为显示交互式通知事件的新按钮添加以下代码行：\n\n```\n<p>\n        <input type=\"button\" value=\"\
  显示交互式 Toast\" id=\"btnDisplayinteractiveToast\" />\n        <br />\n</p>\n```\n\n\
  这段代码添加了一个新按钮“显示交互式 Toast”。为了将 `AddInteractiveToastNotification()` 方法与 `btnDisplayinteractiveToast`\
  \ 按钮关联，我们在现有的 `GetControl()` 方法中添加以下代码行。\n\n```\nvar toastinteractiveNotificationbutton\
  \ = document.getElementById(\"btnDisplayinteractiveToast\");\ntoastinteractiveNotificationbutton.addEventListener(\"\
  click\", AddInteractiveToastNotification, false);\n```\n\n上述代码与上一个技巧相同，您将按钮点击事件处理程序与一个方法关联。这里，您将带有\
  \ `btnDisplayinteractiveToast` id 的按钮与 `AddInteractiveToastNotification()` 方法关联。\n\
  \n编译项目并在模拟器中运行。当 `default.html` 页面加载后，按下“显示交互式 Toast”按钮。点击按钮后，通知将以两个不同的可选操作展示给用户。同时也会播放一个通知音效，如图\
  \ 14-4 所示。\n\n![A978-1-4842-0719-2_14_Fig4_HTML.jpg](img/A978-1-4842-0719-2_14_Fig4_HTML.jpg)\n\
  \n图 14-4.\n\n来自应用的交互式 Toast 通知\n\n在本技巧中，您学习了如何通过 Toast 通知与用户进行交互。您还学习了如何让用户根据 Toast\
  \ 通知执行操作。\n\n## 14.5 创建定时磁贴和 Toast 通知\n\n### 问题\n\n希望创建一个带有提醒功能的交互式 Toast 通知。\n\n\
  ### 解决方案\n\n在磁贴和 Toast 通知的 XML 中添加 `<Actions>` 元素。\n\n\n\n### 工作原理\n\n在上一节中，你使用\
  \ XML 架构创建了一个自适应 Toast 通知。现在，我们以类似的方式，创建一个包含操作按钮的交互式 Toast 通知，用于通知用户 Apress 目录中新增了书籍，并允许用户执行相应操作。\n\
  \n沿用上一节中的项目。打开 `LoadTileandNotifications.js` 文件，并添加以下 `AddScheduledTileNotification()`\
  \ 方法。\n\n```\nfunction AddScheduledTileNotification() {\n\n        var adaptivetileXml\
  \ = \"<tile><visual displayName=\\\"Future recipes\\\" branding=\\\"name\\\">\"\n\
  + \"<binding template=\\\"TileSmall\\\"><group><subgroup><text hint-style=\\\"subtitle\\\
  \"> Updated Tiles </text><text hint-style=\\\"subtitle\\\">Adaptive Tiles</text></subgroup></group></binding>\"\
  \n+ \"<binding template=\\\"TileMedium\\\"><group><subgroup><text hint-style=\\\"\
  subtitle\\\">  Updated Tiles </text><text hint-style=\\\"subtitle\\\">Adaptive Tiles</text></subgroup></group></binding>\"\
  \n+ \"<binding template=\\\"TileLarge\\\"><group><subgroup><text hint-style=\\\"\
  subtitle\\\">  Updated Tiles </text><text hint-style=\\\"subtitle\\\">Adaptive Tiles</text></subgroup></group></binding>\"\
  \n+ \"<binding template=\\\"TileWide\\\"><group><subgroup><text hint-style=\\\"\
  subtitle\\\">  Updated Tiles </text><text hint-style=\\\"subtitle\\\">Adaptive Tiles</text></subgroup></group></binding>\"\
  \n+ \"</visual></tile>\";\n\n        var adaptivetileDom = Windows.Data.Xml.Dom.XmlDocument();\n\
  \        adaptivetileDom.loadXml(adaptivetileXml);\n\n        var currentTime =\
  \ new Date();\n        //notification should appear in 3 seconds\n        var startTime\
  \ = new Date(currentTime.getTime() + 3 * 1000);\n\n        var scheduledTile = new\
  \ Windows.UI.Notifications.ScheduledTileNotification(adaptivetileDom, startTime);\n\
  \        //Give the scheduled tile notification an ID\n        scheduledTile.id\
  \ = \"Future_Tile\";\n\n        var tileUpdater = Windows.UI.Notifications.TileUpdateManager.createTileUpdaterForApplication();\n\
  \        tileUpdater.addToSchedule(scheduledTile);\n    }\n```\n\n在此方法中，我们在局部变量\
  \ `adaptivetileXml` 中为磁贴设置了新的 XML。然后创建了一个 `XMLDocument` 类型的局部对象 `adaptivetileDom`，并将\
  \ `adaptiveXml` 文本加载到其中。\n\n要向磁贴发送计划更新，首先需要设定计划时间。为此，我们创建了一个局部变量 `startTime`，并将其值设置为当前时间加\
  \ 3 秒。接着，创建一个 `Windows.UI.Notifications.TileUpdateManager.createTileUpdaterForApplication()`\
  \ 类型的 `tileUpdater` 对象，然后调用 `addToSchedule` 方法，在设定的时间发送更新。\n\n为了执行上述方法，需添加一个 HTML\
  \ 按钮，并绑定一个事件处理程序来调用该方法。打开 `default.html`，添加以下 HTML 代码片段，以创建一个文本为“Scheduled Adaptive\
  \ Tile”的 HTML 按钮。\n\n```\n<p>\n        <input type=\"button\" value=\"Scheduled\
  \  Adaptive Tile\" id=\"btnScheduledAdaptiveTile\" />\n        <br />\n    </p>\n\
  ```\n\n接下来，打开 `LoadTileandNotifications.js`，用以下代码行更新现有的 `LoadTileandNotifications()`\
  \ 方法：\n\n```\n     var ScheduledAdaptiveTilebutton = document.getElementById(\"\
  btnScheduledAdaptiveTile\");\n            ScheduledAdaptiveTilebutton.addEventListener(\"\
  click\", AddScheduledTileNotification, false);\n```\n\n这将为 `btnScheduledAdaptiveTile`\
  \ 按钮添加一个新的 `onclick` 事件处理程序，并将 `AddScheduledTileNotification` 方法与按钮点击事件关联起来，以便在点击“Scheduled\
  \ Adaptive Tile”按钮时执行该方法。\n\n若要测试此功能，请编译并运行应用程序。当 `default.html` 页面加载后，点击“Scheduled\
  \ Adaptive Tile”按钮。这会在 3 秒后向磁贴发送一个通知。你可以通过查看磁贴标题和文本来验证效果，它们会在计划时间发生变化。\n\n在本节中，你已成功在计划时间向\
  \ UWP 应用磁贴发送了更新。当需要根据内容变化（例如天气应用、邮件应用、旅行日程应用等）发送动态更新时，计划更新非常有用。\n\n## 14.6 在磁贴上创建或更新徽章\n\
  \n### 问题\n\n你想要向磁贴添加一个徽章。\n\n### 解决方案\n\n在磁贴 XML 负载中使用 `<badge>` 元素来显示徽章。使用 `BadgeNotification`\
  \ 来创建徽章。\n\n### 工作原理\n\n在现有项目中，我们将添加一个额外的方法 `UpdateTileBadge`，以演示如何在磁贴上创建徽章更新。打开\
  \ `LoadTileandNotifications.js` 并添加以下方法：\n\n```\n  function UpdateTileBadge()\n\
  \    {\n        AddAdaptiveTiles();\n\n        var badgeXml = \"<badge value=\\\"\
  alarm\\\"/>\";\n        var badgeDom = Windows.Data.Xml.Dom.XmlDocument();\n   \
  \     badgeDom.loadXml(badgeXml);\n\n        var notifications = Windows.UI.Notifications;\n\
  \        var badgeNotification = new notifications.BadgeNotification(badgeDom);\n\
  \n        notifications.BadgeUpdateManager.createBadgeUpdaterForApplication().update(badgeNotification);\n\
  \    }\n```\n\n在此方法中，我们调用 `AdaptiveTiles()` 方法来显示自适应磁贴。\n\n然后，我们添加 `badgeXML`，其中包含用于在磁贴上显示闹钟徽章的\
  \ XML 负载。在 `badgeXml` 中，我们将徽章的值设置为“Alarm”。\n\n接着，我们创建一个 `Windows.UI.Notifications.BadgeNotification`\
  \ 类型的 `badgeNotifications` 对象，并传入徽章通知的 XML。\n\n之后，调用 `createBadgeUpdaterForApplication.update()`\
  \ 方法，用徽章通知更新磁贴。\n\n现在，打开 `default.html` 并添加一个新按钮，用于测试 `UpdateTileBadge()` 方法更新磁贴徽章的功能。\n\
  \n```\n<p> <input type=\"button\" value=\"Update Badge\" id=\"btnUpdateBadge\" />\n\
  \        <br />\n    </p>\n```\n\n接下来，打开 `LoadTileandNotifications.js`，用以下代码行更新\
  \ `GetControl()` 方法：\n\n```\nvar badgeUpdatebutton = document.getElementById(\"\
  btnUpdateBadge\");\n            badgeUpdatebutton.addEventListener(\"click\", UpdateTileBadge,\
  \ false);\n```\n\n这将为 `btnUpdateBadge` 按钮添加一个新的 `onclick` 事件处理程序，并将 `UpdateTileBadge`\
  \ 方法与按钮点击事件关联起来，以便在点击“Update Badge”按钮时执行该方法。\n\n编译并运行此应用后，在 `default.html` 页面上点击“Update\
  \ Badge”按钮。这将更新磁贴，应用磁贴会显示一个徽章，并在右下角显示一个 Windows 闹钟图标，如图 14-5 所示。\n\n![A978-1-4842-0719-2_14_Fig5_HTML.jpg](img/A978-1-4842-0719-2_14_Fig5_HTML.jpg)\n\
  \n图 14-5.\n\n在 Windows UWP 自适应磁贴上的徽章通知\n\n徽章 XML 中可以指定不同类型的 Windows 图标，例如 alarm（闹钟）、alert（警报）、available（可用）、error（错误）、paused（暂停）、new\
  \ message（新消息）等。\n\n**注意：** 在 UWP 应用中，徽章显示在右下角。\n\n在本章中，你已经学习了 UWP 应用磁贴的相关知识、更新磁贴的多种方法、如何通过磁贴添加通知，以及如何动态更新自适应磁贴的内容。\n\
  \n"
- "# 第 15 章：设备功能\n\n本章概述了 Windows 10 应用中的设备功能。你还将学习如何在 UWP 应用中开发蓝牙、文本转语音、语音转文本以及传感器功能。本章还概述了应用中集成\
  \ Cortana 的相关内容。\n\n## 15.1 如何在应用包清单中指定设备功能\n\n### 问题\n\n你需要指定 Windows 10 应用所需的不同设备功能。\n\
  \n### 解决方案\n\n使用应用包清单文件来指定 `DeviceCapability` 元素及其相关的子元素。\n\n\n\n### 工作原理\n\n在 Visual\
  \ Studio 2015 中打开你正在开发的 Windows 10 应用项目。在解决方案资源管理器中，找到 `Package.appmanifest` 文件。双击该文件将其打开。点击“功能”选项卡。选择你的应用将使用的设备功能。这将在应用程序中添加功能列表（见图\
  \ 15-1）。\n\n![A978-1-4842-0719-2_15_Fig1_HTML.jpg](img/A978-1-4842-0719-2_15_Fig1_HTML.jpg)\n\
  \n图 15-1. 应用 `Package.appmanifest` 文件中的“功能”选项卡\n\n你也可以在 XML 编辑器中打开应用的 `Package.appmanifest`\
  \ 文件，并使用 `<Capabilities>` 元素下的 `<Capability>` 元素来添加设备功能。例如：\n\n```\n<Capabilities>\n\
  \    <Capability Name=\"internetClient\" />\n    <Capability Name=\"allJoyn\" />\n\
  \    <Capability Name=\"codeGeneration\" />\n    <Capability Name=\"internetClientServer\"\
  \ />\n    <uap:Capability Name=\"blockedChatMessages\" />\n    <uap:Capability Name=\"\
  chat\" />\n    <uap:Capability Name=\"videosLibrary\" />\n    <uap:Capability Name=\"\
  phoneCall\" />\n    <uap:Capability Name=\"removableStorage\" />\n    <DeviceCapability\
  \ Name=\"microphone\" />\n    <DeviceCapability Name=\"webcam\" />\n</Capabilities>\n\
  ```\n\n在这个例子中，启用了以下供应用使用的功能：聊天、视频库、电话以及可移动数据存储（例如 USB 驱动器、麦克风和网络摄像头）。请注意，有些功能（如网络摄像头）无法通过\
  \ `Package.manifest` 的可视化界面来指定，而必须通过代码文件来实现。\n\n## 15.2 如何为 Windows 应用的蓝牙指定设备功能\n\
  \n### 问题\n\n你需要在 Windows 10 应用中访问蓝牙设备。\n\n### 解决方案\n\n使用 `Package.manifest` 中的 `DeviceCapability`\
  \ 元素来定义访问蓝牙设备的设备功能。此方法同时适用于蓝牙 Rfcomm 和 Gatt API。\n\n### 工作原理\n\n在 Visual Studio\
  \ 2015 中打开你的 Windows 通用 Windows 应用项目。在解决方案资源管理器中，找到 `Package.appmanifest` 文件。右键单击该文件，在\
  \ XML 编辑器中打开 `Package.appmanifest`。找到 `<Capabilities>` 部分。在 `<Capabilities>` 下添加以下元素：\n\
  \n```\n<DeviceCapability Name=\"bluetooth.rfcomm\">\n  <Device Id=\"any\">\n   \
  \ <Function Type=\"name:obexObjectPush\"/>\n    <Function Type=\"name:serialPort\"\
  />\n    <Function Type=\"name:genericFileTransfer\"/>\n  </Device>\n</DeviceCapability>\n\
  ```\n\n在上述代码中，`<DeviceCapability>` 元素的 `Name` 属性被指定为 `\"bluetooth.rfcomm\"`，用于访问蓝牙\
  \ RFCOMM 设备。`<Device>` 元素设置为 `\"any\"`，以允许访问与 `<function>` 元素中指定的功能类型相匹配的任何设备。\n\
  \n`<DeviceCapability>` 也可用于为蓝牙 GATT 设备指定设备功能，如下面的代码片段所示：\n\n```\n<DeviceCapability\
  \ Name=\"bluetooth.genericAttributeProfile\">\n  <Device Id=\"any\">\n    <Function\
  \ Type=\"name:battery\"/>\n    <Function Type=\"name:bloodPressure\"/>\n    <Function\
  \ Type=\"serviceId:aaaaaaa\"/>\n  </Device>\n</DeviceCapability>\n```\n\n在上述代码中，针对蓝牙\
  \ GATT \"any\" 设备的 `DeviceCapabilities` 支持具有指定服务名称和服务 ID 的所述功能。\n\n## 15.3 如何查找\
  \ UWP 应用可用的设备\n\n### 问题\n\n你希望获取连接到系统的设备列表——无论是外部连接的设备还是对 UWP 应用可用的设备。\n\n### 解决方案\n\
  \n使用 `Windows.Devices.Enumeration.DevicePicker` 类来枚举应用可发现的设备。\n\n### 工作原理\n\n使用\
  \ Microsoft Visual Studio 2015 中的 Windows 通用（空白应用）模板创建新项目。\n\n在 Visual Studio 解决方案资源管理器中，打开项目中的\
  \ `default.html` 页面。添加以下 HTML 标记以显示一个按钮和标签：\n\n```\n<body class=\"win-type-body\"\
  >\n    <div>\n        <h2 id=\"sampleHeader\" class=\"win-type-subheader\">描述：</h2>\n\
  \        <div id=\"scenarioDescription\">\n            演示 DevicePicker 的示例，允许你的应用用户选择设备\n\
  \        </div>\n    </div>\n    <div id=\"scenarioContent\">\n        <button id=\"\
  showDevicePickerButton\" >显示设备选择器</button>\n    </div>\n</body>\n```\n\n在解决方案资源管理器中右键单击\
  \ `js` 文件夹。添加一个名为 `DevicePicker.js` 的 JavaScript 文件。在 `default.html` 中添加对此 `js`\
  \ 文件的引用：\n\n```html\n<script src=\"/js/DevicePicker.js\"></script>\n```\n\n在 Visual\
  \ Studio 中打开 `devicePicker.js`，并添加以下脚本：\n\n```javascript\n(function () {\n    \"\
  use strict\";\n    var DevEnum = Windows.Devices.Enumeration;\n    var devicePicker\
  \ = null;\n    var page = WinJS.UI.Pages.define(\"../default.html\", {\n       \
  \ ready: function (element, options) {\n            // 挂钩按钮事件处理程序\n            document.getElementById(\"\
  showDevicePickerButton\").addEventListener(\"click\", showDevicePicker, false);\n\
  \        }\n    });\n```\n\n在上述代码中，我们声明了一个类型为 `Windows.Devices.Enumeration` 的变量。稍后将使用此对象来创建\
  \ `DevicePicker` 对象。`page` 变量用于在 DOM 加载完成后，将剩余的 `js` 脚本绑定到默认页面。在 `ready()` 函数中，我们将一个名为\
  \ `showDevicePicker` 的事件处理程序绑定到 `showDevicePickerButton` 按钮。\n\n添加以下 `showDevicePicker()`\
  \ 方法，该方法将获取可用的设备：\n\n```javascript\n    function showDevicePicker() {\n        var\
  \ buttonRect;\n        devicePicker = new DevEnum.DevicePicker();\n        buttonRect\
  \ = document.getElementById(\"showDevicePickerButton\").getBoundingClientRect();\n\
  \        var rect = { x: buttonRect.left, y: buttonRect.top, width: buttonRect.width,\
  \ height: buttonRect.height };\n        // 显示选择器\n        devicePicker.show(rect);\n\
  \    }\n})();\n```\n\n在 `showDevicePicker()` 事件处理程序中（该处理程序在点击 `showDevicePickerButton`\
  \ 按钮时被调用），我们创建了一个 `Windows.Devices.Enumeration.DevicePicker` 对象，并创建一个矩形对象来显示选择器\
  \ UI 输出。\n\n编译此项目并使用移动仿真器运行，以获取所有设备的列表，如图 15-2 所示。\n\n![A978-1-4842-0719-2_15_Fig2_HTML.jpg](img/A978-1-4842-0719-2_15_Fig2_HTML.jpg)\n\
  \n图 15-2. 获取系统上应用可用的所有设备的枚举列表\n\n## 15.4 如何创建音频流并基于纯文本输出语音\n\n### 问题\n\n你需要在应用中添加语音功能，使其能够朗读文本。\n\
  \n### 解决方案\n\n使用 `Windows.Media.SpeechSynthesis.SpeechSynthesizer()` 在你的 UWP 应用中基于文本开发音频/语音输出。\n\
  \n\n\n### 工作原理\n\nMicrosoft 提供了预定义的语音，可用于合成单一语言的语音。\n\n使用 Microsoft Visual Studio\
  \ 2015 中的 Windows 通用（空白应用）模板创建一个新项目。在项目 `package.appmanifest` 文件中，单击“功能”选项卡，然后选中“麦克风”和“Internet”复选框。这将允许应用使用音频输入。\n\
  \n在 Visual Studio 的解决方案资源管理器中，打开项目中的 `default.html` 页面。在 `default.html` 的 `<body>`\
  \ 标签内添加以下 HTML 标记。\n\n```html\n<body class=\"win-type-body\">\n    <div id=\"scenarioView\"\
  >\n        <div>\n            <h2 id=\"sampleHeader\" class=\"win-type-subheader\"\
  >将文本转换为语音。</h2>\n        </div>\n        <div id=\"scenarioContent\">\n        \
  \    <button id=\"btnSpeak\" class=\"win-button\">朗读</button>\n            <select\
  \ id=\"voicesSelect\" class=\"win-dropdown\"></select>\n            <textarea id=\"\
  textToSynthesize\" style=\"width: 100%\" name=\"textToSynthesize\" class=\"win-textarea\"\
  > Hello World! 这是 Windows 10 通用 Windows 应用食谱的一个示例</textarea>\n            <p id=\"\
  errorTextArea\"></p>\n        </div>\n    </div>\n    <div id=\"contentWrapper\"\
  >\n        <div id=\"contentHost\"></div>\n        <div id=\"statusBox\">\n    \
  \        状态：\n            <div id=\"statusMessage\"></div>\n        </div>\n   \
  \ </div>\n</body>\n```\n\n在调试模式下于移动模拟器中启动该应用时，将显示图 15-3 所示的内容。\n\n![A978-1-4842-0719-2_15_Fig3_HTML.jpg](img/A978-1-4842-0719-2_15_Fig3_HTML.jpg)\n\
  \n**图 15-3.** 带有用于选择语言的下拉列表的文本转语音图形用户界面\n\n如您所见，添加了四个主要控件：\n\n- 一个**朗读**按钮\n- 一个允许用户选择可用语言的下拉列表\n\
