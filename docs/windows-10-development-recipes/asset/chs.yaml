  \n**图 9-1.** 创建本地应用数据设置容器\n\n## 9.2 如何创建和读取本地应用数据设置\n\n### 问题\n\n你需要在应用数据存储的应用数据设置容器中创建本地应用数据设置。\n\
  \n### 解决方案\n\n使用`ApplicationDataContainer.values`在 Windows 10 应用的本地应用数据存储的应用数据设置容器中创建本地应用数据设置。\n\
  \n\n\n### 工作原理\n\n应用设置是应用中的个性化数据或自定义设置。用户偏好——例如用户是否希望启用或禁用定位服务——即是一种应用设置。通用 Windows\
  \ 应用开发公开了相关 API，允许您将应用设置作为应用数据存储和检索到应用数据存储中。\n\n应用数据存储包含两个不同的设置位置：本地设置和漫游设置。\n\n\
  在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。在 Visual Studio 解决方案资源管理器中打开项目中的\
  \ `default.html` 页面。在 `default.html` 的 `<body>` 标签内，为两个文本框、一个按钮和一个 `<span>` 标签定义\
  \ HTML 标签。\n\n```\n<div id=\"titleBarContent\" style=\"width: 100%;height:30px;\
  \ background:border-box darkblue; overflow: hidden; z-index: 3\">\n    <i>应用设置管理界面（使用此界面配置应用设置）</i>\n\
  </div>\n<br />\n<i>英文欢迎语</i> <input type=\"text\" value=\"\" id=\"txtWelcomeGreetingseng\"\
  \ /><br />\n<i>法文欢迎语</i><input type=\"text\" value=\"\" id=\"txtWelcomeGreetingsfr\"\
  \ /><br />\n<input type=\"button\" value=\"创建本地应用数据演示\" id=\"btnLocalData\" />\n\
  ```\n\n完整的 `default.html` 应如下所示：\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n \
  \   <meta charset=\"utf-8\" />\n    <title>Recipe9.2</title>\n    <!-- WinJS references\
  \ -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\" />\n    <script\
  \ src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n\
  \    <!-- Recipe9.2 references -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\"\
  \ />\n    <script src=\"/js/default.js\"></script>\n</head>\n<body class=\"win-type-body\"\
  >\n    <div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
  \ darkblue; overflow: hidden; z-index: 3\">\n        <i>应用设置管理界面（使用此界面配置应用设置）</i>\n\
  \    </div>\n    <br />\n    <i>英文欢迎语</i> <input type=\"text\" value=\"\" id=\"\
  txtWelcomeGreetingseng\" /><br />\n    <i>法文欢迎语</i><input type=\"text\" value=\"\
  \" id=\"txtWelcomeGreetingsfr\" /><br />\n    <input type=\"button\" value=\"创建本地应用数据演示\"\
  \ id=\"btnLocalData\" />\n</body>\n</html>\n```\n\n右键单击解决方案资源管理器中项目的 `js` 文件夹，选择“添加”\
  \ ➤ “新建 JavaScript 文件”。为文件命名。在本例中，我们将文件命名为 `DataStorageDemo.js`。\n\n```javascript\n\
  (function () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
  \ () {\n            var submitbutton = document.getElementById(\"btnLocalData\"\
  );\n            submitbutton.addEventListener(\"click\", btnLocalDataClick, false);\n\
  \        });\n        GetCurrentSettingValues();\n    }\n    document.addEventListener(\"\
  DOMContentLoaded\", GetControl);\n})();\n```\n\n现在，添加一个函数，用于从容器中检索当前欢迎语设置：\n\n```javascript\n\
  function GetCurrentSettingValues() {\n    var applicationData = Windows.Storage.ApplicationData.current;\n\
  \    var localSettings = applicationData.localSettings;\n    // 创建一个本地设置容器\n   \
