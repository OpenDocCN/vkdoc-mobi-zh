  \ `WinJS.Binding.List` 和 `WinJS.UI.StorageDataSource`。\n\n此外，FlipView 的 `itemTemplate`\
  \ 属性被设置为 ID 为 `template` 的 TemplateControl。该模板用于格式化 ListView 中显示的员工详细信息。在此示例中，模板配置为显示\
  \ `name` 和 `designation`。\n\n## 4.3 使用 ListView 控件\n\n### 问题\n\n你需要在页面上显示一个可交互的项目列表。\n\
  \n### 解决方案\n\n使用 ListView 控件，它为开发者提供了大量选项来列出项目，同时还提供了其他选项，如选择、排序、筛选、分组等。你可以通过将 `data-win-bind`\
  \ 属性设置为 `WinJS.UI.ListView` 值来将 ListView 添加到页面。\n\n\n\n### 工作原理\n\n`ListView`控件是\
  \ Windows 应用程序中最常用的控件之一。你可以将`ListView`控件绑定到实现了`IListDataSource`接口的数据源。目前，`WinJS`有两个实现了`IListDataSource`接口的对象：\n\
  \n- `WinJS.Binding.List`\n- `WinJS.UI.StorageDataSource`\n\n在本教程中，我们将重点介绍如何使用`WinJS.Binding.List`数据源。\n\
  \n让我们看看如何将`ListView`控件与`WinJS.Binding.List`数据源一起使用。\n\n在 Visual Studio 2015 中创建一个新的\
  \ Windows 通用应用，并打开`default.html`页面。用以下代码替换它：\n\n```html\n<!DOCTYPE html>\n<html>\n\
  <head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.3</title>\n    <!-- WinJS\
  \ references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n\
  \    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
  ></script>\n    <!-- Recipe4.3 references -->\n    <link href=\"/css/default.css\"\
  \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
  \ src=\"/js/data.js\"></script>\n</head>\n<body class=\"win-type-body\">\n    <h1>Recipe\
  \ 4.3</h1>\n    <div id=\"template\" data-win-control=\"WinJS.Binding.Template\"\
  >\n        <div>\n            <h4 data-win-bind=\"innerText: name\"></h4>\n    \
  \        <h6 data-win-bind=\"innerText: designation\"></h6>\n        </div>\n  \
  \  </div>\n    <div id=\"listView1\"\n         data-win-control=\"WinJS.UI.ListView\"\
  \n         data-win-options=\"{itemTemplate: select('#template')}\">\n    </div>\n\
  </body>\n</html>\n```\n\n以下代码用于将`ListView`控件添加到页面：\n\n```html\n<div id=\"listView1\"\
  \n     data-win-control=\"WinJS.UI.ListView\"\n     data-win-options=\"{itemTemplate:\
  \ select('#template')}\">\n</div>\n```\n\n上述代码片段中的`ListView`控件使用模板来显示每位员工。\n\n请注意，你已在\
  \ HTML 页面中引用了`data.js`文件。该文件包含员工数组。向项目的`js`文件夹添加一个新的 JavaScript 文件，并将其命名为`data.js`。用以下代码替换`data.js`文件：\n\
  \n```javascript\n(function () {\n    \"use strict\";\n    function Initialize()\
  \ {\n        WinJS.UI.processAll().done(function () {\n            var listControl1\
  \ = document.getElementById('listView1').winControl;\n            var Employees\
  \ = new WinJS.Binding.List([\n                { id: 1, name: \"Senthil Kumar\",\
  \ designation: \"Mobile Developer\" },\n                { id: 2, name: \"Lohith\
  \ GN\", designation: \"Web Developer\" },\n                { id: 3, name: \"Vidyasagar\"\
  , designation: \"Game Developer\" },\n                { id: 4, name: \"Michael\"\
  , designation: \"Architect\" }\n            ]);\n            listControl1.itemDataSource\
  \ = Employees.dataSource;\n            listControl1.addEventListener(\"iteminvoked\"\
  , function (e) {\n                var index = e.detail.itemIndex;\n            \
  \    e.detail.itemPromise.then(function (item) {\n                    var message\
  \ = new Windows.UI.Popups.MessageDialog(item.data.name);\n                    message.showAsync();\n\
  \                })\n            })\n        })\n    }\n    document.addEventListener(\"\
  DOMContentLoaded\", Initialize);\n})();\n```\n\n根据员工数组创建了一个列表，并通过`itemDataSource`属性将其绑定到`ListView`控件。\n\
  \n当你运行应用时，会看到列表视图中显示员工数据。\n\nJavaScript 代码还包含了处理`ListView`的调用事件（invoked event）的代码，该事件会显示从列表中选择的员工。\n\
  \n`ListView`控件在内部为每个`ListView`项使用`ItemContainer`控件。你可以处理`ListView`控件的`item-invoked`事件，以检测何时点击了特定的`ListView`项。\n\
  \n图 4-5 展示了本教程中代码片段在 Windows 中渲染的屏幕。\n\n![A978-1-4842-0719-2_4_Fig5_HTML.jpg](img/A978-1-4842-0719-2_4_Fig5_HTML.jpg)\n\
  \n图 4-5. 带有调用事件处理的 Windows 应用中的`ListView`控件\n\n`ListView`控件支持不同的布局，这些布局决定了控件的整体外观。这些布局包括：\n\
  \n- 网格布局\n- 列表布局\n- 跨单元格布局\n\n网格布局以网格格式（包含行和列）显示`ListView`项。列表布局在单个列表中显示列表项。跨单元格布局以网格布局显示列表项，但支持多列单元格。\n\
  \n要将`ListView`设置为网格布局，需在`data-win-options`属性下将`layout`属性设置为`WinJS.UI.GridLayout`，如下所示：\n\
  \n```html\n<div id=\"listView1\"\n         data-win-control=\"WinJS.UI.ListView\"\
  \n         data-win-options=\"{itemTemplate: select('#template'),\n         layout\
  \ : {type:WinJS.UI.GridLayout,maximumRowsOrColumns : 1}}\">\n    </div>\n```\n\n\
  图 4-6 展示了使用网格布局时渲染的 UI。\n\n![A978-1-4842-0719-2_4_Fig6_HTML.jpg](img/A978-1-4842-0719-2_4_Fig6_HTML.jpg)\n\
  \n图 4-6. `ListView`中的网格布局\n\n你也可以将布局设置为以下值：\n\n- `WinJS.UI.cellSpanningLayout`\n\
  - `WinJS.UI.ListLayout`\n\n## 4.4 在`ListView`控件中筛选项\n\n### 问题\n\n你需要通过从与`ListView`关联的数据源中进行筛选，来筛选`ListView`中显示的项。\n\
  \n### 解决方案\n\n你可以使用设置为数据源的`WinJS.Binding.List`，然后通过`createFiltered`方法创建一个新的筛选列表。`createFiltered`函数根据列表中的输入项创建一个筛选后的投影。\n\
  \n\n\n### 工作原理\n\n接下来演示 `ListView` 控件中的筛选功能。\n\n在 Visual Studio 2015 中使用 JavaScript\
  \ 模板创建一个新的通用 Windows 应用。从解决方案资源管理器中打开 `default.html` 页面，并将其替换为以下代码。\n\n```\n<!DOCTYPE\
  \ html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.4</title>\n\
  \    <!-- WinJS 引用 -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
  \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
  ></script>\n    <!-- Recipe4.4 引用 -->\n    <link href=\"/css/default.css\" rel=\"\
  stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"\
  /js/data.js\"></script>\n</head>\n<body class=\"win-type-body\">\n    <h1>Recipe4.4</h1>\n\
  \    <div>\n        <input id=\"txtSearch\" />\n    </div>\n    <div id=\"template\"\
  \ data-win-control=\"WinJS.Binding.Template\">\n        <h3 data-win-bind=\"innerText:name\"\
  ></h3>\n    </div>\n    <div id=\"lstEmployees\" data-win-control=\"WinJS.UI.ListView\"\
  \n         data-win-options=\"{itemTemplate:select('#template')}\">\n    </div>\n\
  </body>\n</html>\n```\n\n请注意其中包含了 `data.js` 文件，该文件用于设置数据源并执行筛选操作。此 HTML 页面包含一个 ID\
  \ 为 `txtSearch` 的文本框和一个 `ListView` 控件。`ListView` 关联了一个自定义模板，用于以格式化方式显示数据。\n\n接下来，将\
  \ JavaScript 文件添加到项目的 `js` 文件夹中，并将其命名为 `data.js`。将以下代码添加到 `data.js` 文件中。\n\n```\n\
  (function () {\n    \"use strict\";\n    // 用作数据源的员工列表\n    var lstEmployees = new\
  \ WinJS.Binding.List([\n        { id: 1, name: \"Senthil Kumar\" },\n        { id:\
  \ 2, name: \"Lohith GN\" },\n        { id: 3, name: \"Senthil Kumar B\" },\n   \
  \     { id: 4, name: \"Vidyasagar\" },\n    ]);\n\n    function Initialize() {\n\
  \        WinJS.UI.processAll().done(function () {\n            // 从 DOM 中获取 ListView\n\
  \            var lstControl = document.getElementById('lstEmployees').winControl;\n\
  \            // 从 HTML 页面获取搜索文本\n            var filterText = document.getElementById('txtSearch');\n\
  \            lstControl.itemDataSource = lstEmployees.dataSource;\n            filterText.addEventListener(\"\
  keyup\", function () {\n                filterEmployee(lstControl, filterText.value);\n\
  \            });\n        });\n    }\n\n    // 筛选列表的函数\n    function filterEmployee(listEmployee,searchtext)\n\
  \    {\n        var filtereddata = lstEmployees.createFiltered(function (item) {\n\
  \            var result = item.name.toLowerCase().indexOf(searchtext);\n       \
  \     return item.name.toLowerCase().indexOf(searchtext) == 0;\n        });\n  \
  \      listEmployee.itemDataSource = filtereddata.dataSource;\n    }\n\n    document.addEventListener(\"\
  DOMContentLoaded\", Initialize);\n})();\n```\n\n这段 JavaScript 代码包含一个名为 `filterEmployee`\
  \ 的方法，该方法接受一个 `ListView` 控件和一个用于筛选的搜索字符串。此函数对 `ListView` 进行筛选，并显示与搜索字符串匹配的员工信息。\n\
  \n以下是 `createFiltered` 方法中用于筛选 `ListView` 控件数据源的函数：\n\n```\nvar fileteredData =\
  \ lstEmployees.createFiltered(function (item) {\n    var result = item.name.toLowerCase().indexOf(searchtext);\n\
  \            return item.name.toLowerCase().indexOf(searchtext) == 0;\n});\n```\n\
  \n此函数的作用类似于实时筛选器，当项目以搜索文本字符串开头时，它会返回该项目。\n\n在 Windows 上运行该应用。您应该会看到如图 4-7 所示的界面。\n\
  \n![A978-1-4842-0719-2_4_Fig7_HTML.jpg](img/A978-1-4842-0719-2_4_Fig7_HTML.jpg)\n\
  \n图 4-7.\n\n筛选 ListView\n\n当您在文本框中开始输入文本时，您会看到项目被筛选并显示在屏幕上。\n\n## 4.5 在 ListView\
  \ 控件中对项目进行分组\n\n### 问题\n\n需要按类别对 `ListView` 中的项目进行分组，而不是以平面列表形式显示。\n\n### 解决方案\n\
  \n要对 `ListView` 中的项目进行分组，需要使用分组数据源。这可以通过使用 WinJS 中的 `WinJS.Binding.List.createGrouped()`\
  \ 函数来实现。\n\n\n\n### 工作原理\n\n要在 WinJS 中对 `ListView` 控件中的项目进行分组，需要包含两个模板：一个用于组标题，一个用于单个项目。\n\
  \n让我们在 Visual Studio 2015 中创建一个新的 Windows 通用项目，并打开 `default.html` 页面。将其替换为以下代码片段。\n\
  \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.5</title>\n\
  \    <!-- WinJS 引用 -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
  \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
  ></script>\n    <!-- Recipe4.5 引用 -->\n    <link href=\"/css/default.css\" rel=\"\
  stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"\
  /js/data.js\"></script>\n</head>\n<body class=\"win-type-body\">\n    <h1>配方 4.5</h1>\n\
  \    <div id=\"GroupHeader\" data-win-control=\"WinJS.Binding.Template\">\n    \
  \    <h3 data-win-bind=\"innerText: technology\"></h3>\n    </div>\n    <div id=\"\
  employee\" data-win-control=\"WinJS.Binding.Template\">\n        <h4 data-win-bind=\"\
  innerText:name\"></h4>\n    </div>\n    <div id=\"lvEmployees\" data-win-control=\"\
  WinJS.UI.ListView\"\n         data-win-options=\"{\n         itemTemplate: select('#employee'),\n\
  \         groupHeaderTemplate: select('#GroupHeader')\n         }\">\n    </div>\n\
  </body>\n</html>\n```\n\n此代码片段包含一个名为 `lvEmployees` 的 `ListView` 控件，该控件关联了组标题模板和\
  \ `itemTemplate`。\n\n请注意对 `data.js` JavaScript 文件的引用。\n\n在 Visual Studio 2015 解决方案资源管理器中，于\
  \ `js` 文件夹下新建一个 JavaScript 文件，并将其命名为 `data.js`。向其中添加以下代码片段。\n\n```\n(function ()\
  \ {\n    \"use strict\";\n    function Initialize() {\n        WinJS.UI.processAll().done(function\
  \ () {\n            var listView1 = document.getElementById(\"lvEmployees\").winControl;\n\
  \            var employeeList = new WinJS.Binding.List([\n                { id:\
  \ 1, name: \"Senthil Kumar\", technology: \"Mobile\" },\n                { id: 2,\
  \ name: \"Michael\", technology: \"Web\" },\n                { id: 3, name: \"Lohith\"\
  , technology: \"Web\" },\n                { id: 4, name: \"Stephen\", technology:\
  \ \"Mobile\" },\n                { id: 5, name: \"Vidyasagar\", technology: \"Game\"\
  \ },\n                { id: 6, name: \"Joseph\", technology: \"Mobile\" },\n   \
  \         ]);\n            var groupedEmployees = employeeList.createGrouped(\n\
  \                function (item) {\n                    return item.technology;\n\
  \                },\n                function (item) {\n                    return\
  \ { technology: item.technology }\n                },\n                function\
  \ (group1, group2) {\n                    return group1 > group2 ? 1 : -1;\n   \
  \             });\n            listView1.groupDataSource = groupedEmployees.groups.dataSource;\n\
  \            listView1.itemDataSource = groupedEmployees.dataSource;\n        });\n\
  \    }\n    document.addEventListener(\"DOMContentLoaded\", Initialize);\n})();\n\
  ```\n\n此 JavaScript 代码创建了项目数据源以及分组数据源。该列表包含员工记录，每个项目包含 `id`、`name` 和 `technology`\
  \ 属性。\n\n分组数据源是使用 WinJS 的 `createGrouped` 方法创建的，该方法需要传入三个函数作为参数。\n\n*   `GroupKey`：此函数用于将列表中的每个项目与一个组关联起来。前面的示例返回了与每个员工关联的\
  \ `technology` 属性。\n*   `GroupData`：此函数返回由组标题显示的数据项。在前面的示例中，`GroupData` 返回了在标题中显示的该组的\
  \ `technology`。\n*   `GroupSorter`：此函数处理组的排序顺序；例如，按升序列出标题中的组。\n\n请注意，分组数据源是动态的，它同样可以与筛选后的数据源一起使用。\n\
  \n一旦项目数据源和分组数据源准备就绪，就分别将它们设置为 `ListView` 的 `groupDataSource` 属性和 `itemDataSource`\
  \ 属性，如下所示。\n\n```\nlistView1.groupDataSource = groupedEmployees.groups.dataSource;\n\
  listView1.itemDataSource = groupedEmployees.dataSource;\n```\n\n在 Windows 上运行该应用程序时，您将看到如图\
  \ 4-8 所示的界面。\n\n![A978-1-4842-0719-2_4_Fig8_HTML.jpg](img/A978-1-4842-0719-2_4_Fig8_HTML.jpg)\n\
  \n**图 4-8.** 带有分组数据的 ListView\n\n请注意，项目已按技术分组并显示在页面上。\n\n## 4.6 ListView 中的语义缩放\n\
  \n### 问题\n\n您希望在使用 `ListView` 时，为用户提供一个选项，使其能够在两个不同的缩放级别查看数据。\n\n### 解决方案\n\n您可以在应用程序中使用\
  \ WinJS 的 `SemanticZoom` 控件来实现语义缩放功能。`SemanticZoom` 控件允许您在使用 `ListView` 时提供同一数据的两种不同视图。\n\
  \n您可以通过将 `div` 元素的 `data-win-control` 属性设置为 `WinJS.UI.SemanticZoom` 值来添加 `SemanticZoom`。\n\
  \n\n\n### 工作原理\n\n语义缩放功能可通过 WinJS 中的 `SemanticZoom` 控件实现。设想一个场景：你有一个员工列表，可按其使用的技术进行分组。为了让用户能轻松在各项技术之间导航，你可以使用语义缩放功能——默认情况下，用户看到的是按类别分组的员工视图；当缩小视图时，则只显示技术列表。\n\
  \n在 Visual Studio 2015 中创建一个新的通用 Windows 应用，并打开 `default.html` 页面。将现有代码替换为以下内容。\n\
  \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.6</title>\n\
  \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
  stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
  WinJS/js/ui.js\"></script>\n    <!-- Recipe4.6 references -->\n    <link href=\"\
  /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
  \    <script src=\"/js/data.js\"></script>\n</head>\n<body class=\"win-type-body\"\
  >\n    <h1>Recipe 4.6</h1>\n    <!-- 放大视图 -->\n    <div id=\"GroupHeader\" data-win-control=\"\
  WinJS.Binding.Template\">\n        <h1 data-win-bind=\"innerText: technology\"></h1>\n\
  \    </div>\n    <div id=\"EmployeeTemplate\" data-win-control=\"WinJS.Binding.Template\"\
  >\n        <h2 data-win-bind=\"innerText:name\"></h2>\n    </div>\n    <!-- 缩小视图\
  \ -->\n    <div id=\"TechnologyTemplate\" data-win-control=\"WinJS.Binding.Template\"\
  >\n        <h6 data-win-bind=\"innerText: technology\"></h6>\n    </div>\n    <div\
  \ id=\"szEmployee\" data-win-control=\"WinJS.UI.SemanticZoom\">\n        <!-- 放大视图\
  \ -->\n        <div id=\"lvEmployees\" data-win-control=\"WinJS.UI.ListView\"\n\
  \             data-win-options=\"{\n         itemTemplate: select('#EmployeeTemplate'),\n\
  \         groupHeaderTemplate: select('#GroupHeader')\n         }\">\n        </div>\n\
  \        <!-- 缩小视图 -->\n        <div id=\"lvTechnologies\" data-win-control=\"WinJS.UI.ListView\"\
  \n             data-win-options=\"{\n         itemTemplate: select('#TechnologyTemplate')\n\
  \         }\">\n        </div>\n    </div>\n</body>\n</html>\n```\n\n前面的页面包含一个 `SemanticZoom`\
