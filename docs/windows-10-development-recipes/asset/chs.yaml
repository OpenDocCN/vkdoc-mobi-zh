  activated\", activatedHandler, false);\n        });\n    }\n    document.addEventListener(\"\
  DOMContentLoaded\", GetControl);\n})();\n```\n\n上述代码为应用程序对象添加了一个名为 `activated` 的事件侦听器。以下是名为\
  \ `activatedShareHandler` 的事件侦听器函数。将此代码添加到 `js` 文件中。\n\n```\n/// <summary>\n///\
