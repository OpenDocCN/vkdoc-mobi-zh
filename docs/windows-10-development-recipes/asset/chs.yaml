- "# 第 6 章：针对不同屏幕适配 UI\n\n借助通用 Windows 平台（`UWP`），你的应用可以在 Windows 系列的任何设备上运行。该设备系列包括手机、平板电脑、笔记本电脑、Xbox\
  \ 等。设备系列中存在不同的屏幕尺寸。该平台会在幕后施展魔法，确保你的应用用户界面在所有设备上都能正常使用。既然平台已经为你处理了底层细节，你无需对应用进行任何自定义设置就能支持不同的屏幕尺寸。但有时你可能希望为特定屏幕尺寸提供特定的\
  \ UI。例如，当你的应用在手机上运行时，你可能希望采用单列布局；而同样的应用在平板电脑或 PC 上运行时，你则希望采用双列布局。本章将探讨如何根据不同的屏幕尺寸适配\
  \ UI。\n\n如果 `UWP` 应用可以在任何 Windows 10 设备系列的任何屏幕尺寸上运行，那么作为应用开发者，你为什么还需要为特定屏幕尺寸定制 UI\
  \ 呢？\n\n如前所述，平台负责确保你的应用 UI 在所有屏幕尺寸上都能正常使用，但你可能仍然会遇到需要根据应用运行的屏幕进行自定义的情况。以下几点值得注意，它们解释了为什么你需要进行自定义。\n\
  \n*   **有效利用可用空间并减少导航。** 当应用的 UI 针对小屏幕设计时，该应用在 PC 上也能使用，但可能会浪费一些空间。更好的设计是，当屏幕尺寸超过某个大小时显示更多内容。在较大的屏幕上显示更多内容可以减少用户进行的导航操作量。\n\
  *   **设备能力。** 不同设备具有不同的能力。通过为特定设备定制应用，你可以更好地利用该特定设备的可用能力，并据此启用或禁用相关功能。\n*   **输入优化。**\
  \ `UWP` 中的控件库能很好地支持所有输入类型，包括触摸、笔、键盘和鼠标。但你可以针对特定设备优化输入方式。例如，手机应用通常将导航放在屏幕底部；而 PC\
  \ 用户则期望导航位于屏幕顶部。\n\n## 6.1 不同屏幕的设计断点\n\n### 问题\n\n由于你需要在 Windows 10 设备系列下支持各种屏幕尺寸，你希望了解在应用中应针对哪些具体宽度进行设计。\n\
  \n### 解决方案\n\n`断点` 是 `CSS`（层叠样式表）中使用的术语，用于表示屏幕的大小或宽度，并据此编写样式规则。Windows 10 设备系列中有大量的设备类型和屏幕尺寸。但你无需针对每种设备类型或屏幕尺寸优化\
  \ UI。相反，你应该针对关键的屏幕宽度进行设计。这些关键的屏幕宽度也称为断点。让我们看看你需要关注哪些断点。\n\n*   **小屏幕：** `320epx`。这些设备类型/屏幕的有效像素宽度为\
  \ `320`。典型屏幕尺寸为 4 到 6 英寸。通常，这些设备是手机。\n*   **中屏幕：** `720epx`。这些设备类型/屏幕的有效像素宽度为 `720`。典型屏幕尺寸为\
  \ 6 到 12 英寸。通常，这些设备是平板电脑和大屏手机。\n*   **大屏幕：** `1024epx`。这些设备类型/屏幕的有效像素宽度为 `1024`\
  \ 或更高。典型屏幕尺寸为 13 英寸及以上。通常，这些设备是 PC、笔记本电脑、Surface Hub 等。\n\n## 6.2 自适应 UI 技术：重新定位\n\
  \n### 问题\n\n你希望你的应用支持所有设备类型/屏幕尺寸。你希望使 UI 具有自适应性，并根据应用运行的屏幕尺寸重新定位屏幕的某些部分。\n\n###\
  \ 解决方案\n\n让你的应用用户界面适应不同屏幕尺寸的技术之一涉及 `CSS` 媒体查询，但这超出了本书的范围，因此你不会深入探讨它。但你可以在 W3C School\
  \ 网站上（[`http://www.w3schools.com/cssref/css3_pr_mediaquery.asp`](http://www.w3schools.com/cssref/css3_pr_mediaquery.asp)）阅读并了解更多关于媒体查询的内容。你将编写一条媒体查询规则来针对特定屏幕尺寸。该规则将包含根据应用运行的屏幕重新定位\
  \ UI 元素的样式定义。\n\n\n\n### 工作原理\n\n打开 `Visual Studio 2015`。选择 **文件** ➤ **新建项目** ➤\
  \ **JavaScript** ➤ **Windows** ➤ **通用** ➤ **空白应用（通用 Windows）** 模板。这将创建一个通用 Windows\
  \ 应用模板（见图 6-1）。\n\n![A978-1-4842-0719-2_6_Fig1_HTML.jpg](img/A978-1-4842-0719-2_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** 新建项目对话框\n\n打开位于项目根目录下的 `default.html`。在 `<body>` 标签之后，添加以下内容：\n\n```html\n\
  <div class=\"appGrid\">\n    <div class=\"sectionA\">\n        <h1>A</h1>\n    </div>\n\
  \    <div class=\"sectionB\">\n        <h1>B</h1>\n    </div>\n</div>\n```\n\n你已经创建了一组\
  \ `div`。外层的 `div`（`appGrid`）充当容器。接下来，你创建了两个作为应用一部分显示的区块。在小屏幕上，你希望 `sectionA` 和 `sectionB`\
  \ 上下堆叠显示。在中屏和大屏上运行时，将 `sectionA` 和 `sectionB` 并排放置。\n\n接下来，为应用创建必要的样式。打开位于 `css`\
  \ 文件夹中的 `default.css`。将 `default.css` 的内容替换为以下样式规则：\n\n```css\n.appGrid {\n    display:\
  \ -ms-grid;\n    -ms-grid-columns: 2fr 1fr;\n    grid-columns: 2fr 1fr;\n    -ms-grid-rows:\
  \ 1fr;\n    grid-rows: 1fr;\n    width: 100%;\n    height: 100%;\n    margin:24px;\n\
  }\n\n.sectionA {\n    -ms-grid-row: 1;\n    -ms-grid-column: 1;\n    background-color:\
  \ lightgray;\n    width: 100%;\n    height: 100%;\n    padding: 10px;\n    color:\
  \ black;\n}\n\n.sectionB {\n    -ms-grid-row: 1;\n    -ms-grid-column: 2;\n    background-color:\
  \ lightblue;\n    width: 100%;\n    height: 100%;\n    padding: 10px;\n    color:\
  \ black;\n}\n```\n\n我们来过一遍这段代码。你刚刚定义了三条规则。其中一条规则用于外层网格。你使用了基于网格的显示方式，包含两列和一行。`Section\
  \ A` 放在第 1 列，`Section B` 放在第 2 列。由于尚未应用媒体查询，这些规则将始终生效。\n\n现在，你定义一个媒体查询，用于在屏幕最大宽度为\
  \ 320 时处理 UI。当应用在小屏幕上运行时，你希望布局变窄——仅有一列和两行。`Section A` 放在第 1 行，`Section B` 放在第 2\
  \ 行。将 CSS 规则放在同一个 CSS 文件（`default.css`）中。以下是该媒体查询的代码片段：\n\n```css\n@media (max-width:320px){\n\
  \    .appGrid {\n        display: -ms-grid;\n        -ms-grid-columns: 1fr;\n  \
  \      grid-columns: 1fr;\n        -ms-grid-rows: 2fr 1fr;\n        grid-rows: 2fr\
  \ 1fr;\n        width: 100%;\n        height: 100%;\n        margin:12px;\n    }\n\
  \    .sectionA {\n        -ms-grid-row: 1;\n        -ms-grid-column: 1;\n      \
  \  background-color: lightgray;\n        width: 100%;\n        height: 100%;\n \
  \   }\n    .sectionB {\n        -ms-grid-row: 2;\n        -ms-grid-column: 1;\n\
  \        background-color: lightblue;\n        width: 100%;\n        height: 100%;\n\
  \    }\n}\n```\n\n这表明当屏幕尺寸为 320px 或更小时，会应用新的样式规则。作为该样式规则的一部分，应用网格变为一列两行。这重新定位了 `Section\
  \ A` 和 `Section B` 的位置。\n\n接下来，按 `F5` 运行应用。你可以在 Windows 10 Mobile 模拟器上运行应用，也可以在本地计算机上运行。图\
  \ 6-2 和图 6-3 显示了在手机和 PC 上的输出结果。\n\n![A978-1-4842-0719-2_6_Fig3_HTML.jpg](img/A978-1-4842-0719-2_6_Fig3_HTML.jpg)\n\
  \n**图 6-3.** Windows PC 上的输出\n\n![A978-1-4842-0719-2_6_Fig2_HTML.jpg](img/A978-1-4842-0719-2_6_Fig2_HTML.jpg)\n\
  \n**图 6-2.** Windows Mobile 上的输出\n\n## 6.3 自适应 UI 技术：流体布局\n\n### 问题\n\n你创建了一个布局，希望在其中显示列表视图中的项目数量。但你希望列表视图能够适应窄屏以及中屏或大屏。你希望列表视图项根据屏幕大小进行响应。\n\
  \n### 解决方案\n\nUWP 中的 `ListView` 控件用于需要显示大量项目的场景。顾名思义，列表视图在屏幕上渲染一个列表，每个项绑定到一个数据项。可以通过提供模板来自定义列表视图的每个项。`ListView`\
  \ 还有一个称为 `Layout` 的概念。`Layout` 定义了项目在屏幕上的分布方式。它内置支持两种布局：`ListLayout` 和 `GridLayout`。`ListLayout`\
  \ 用于单列/多行渲染。`GridLayout` 渲染基于网格的布局（即行和列占据屏幕上的可用空间）。\n\n### 工作原理\n\n打开 `Visual Studio\
  \ 2015`。选择 **文件** ➤ **新建项目** ➤ **JavaScript** ➤ **Windows 通用** ➤ **空白应用（通用 Windows）**\
  \ 模板。这将创建一个通用 Windows 应用模板（见图 6-4）。\n\n![A978-1-4842-0719-2_6_Fig4_HTML.jpg](img/A978-1-4842-0719-2_6_Fig4_HTML.jpg)\n\
  \n**图 6-4.**\n\n\n\n### 新建项目对话框\n\n在`js`文件夹中创建一个名为`weatherData.js`的新文件，并添加一个立即调用的函数表达式（IIFE）。以下是代码片段：\n\
  \n```javascript\n(function (undefined) {\n    'use strict';\n    // 其余代码写在这里\n})();\n\
  ```\n\n接下来，在函数体中`'use strict'`语句之后，创建一个天气数据数组，如下所示。为了本示例演示，我们构建虚构的天气数据。以下是代码片段：\n\
  \n```javascript\nvar weatherData = [\n    {\n        date: formatDateString(new\
  \ Date().getDate()),\n        imgSrc: \"images/tile-snow.png\",\n        hi: \"\
  32°\",\n        low: \"16°\",\n        temp: \"24°\",\n        feelsLike: \"28°\"\
  ,\n        chanceOfSnow: \"88%\"\n    }\n    // 在此添加更多项目\n];\n```\n\n接下来，创建一个格式化日期的函数。您希望以“Sun\
  \ 10”的模式显示日期。您需要自定义日期字符串以便显示。以下是`formatDateString`函数的代码片段：\n\n```javascript\nfunction\
  \ formatDateString(date) {\n    var daysOfWeek = [\"Sun\",\"Mon\",\"Tues\",\"Wed\"\
  ,\"Thurs\",\"Fri\",\"Sat\"];\n    var nearDays = [\"Yesterday\",\"Today\",\"Tomorrow\"\
  ];\n    var dayDelta = date - new Date().getDate() + 1;\n    var dateString = \"\
  \";\n    if (dayDelta < 3) {\n        dateString = nearDays[dayDelta];\n    }\n\
  \    else {\n        dateString = daysOfWeek[date % 7] +\n        \" <span class='day'>\"\
  \ + date + \"</span>\";\n    }\n    return dateString;\n};\n```\n\n您需要暴露这个`weatherData`数组，以便在`default.html`中使用它并将其绑定到列表视图。创建一个命名空间并暴露`weatherData`，如下所示：\n\
  \n```javascript\nvar weatherDataList = new WinJS.Binding.List(weatherData);\nWinJS.Namespace.define(\"\
  FluidApp.Data\", {\n    weatherData : weatherDataList\n})\n```\n\n您已经创建了一个名为`FluidApp.Data`的命名空间，并将`weatherData`作为公共属性暴露出来，该属性可以绑定到任何`win`控件上。\n\
  \n您需要添加对`weatherData.js`的引用。在`default.html`的`head`部分中添加以下脚本标签。在`default.js`脚本文件引用之前添加此引用：\n\
  \n```html\n<script src=\"/js/weatherData.js\"></script>\n```\n\n接下来，您需要创建用户界面。在`default.html`中，移除`<body>`标签内的默认内容。添加以下用于显示列表视图中每个项目的模板：\n\
  \n```html\n<div id=\"weatherTemplate\" class=\"dayTemplate\" data-win-\ncontrol=\"\
  WinJS.Binding.Template\">\n<div class=\"dayGrid\">\n    <div class=\"win-type-x-large\
  \ dayDate\"\n                data-win-bind=\"innerHTML: date\">\n    </div>\n  \
  \  <div class=\"dayImg\">\n        <img data-win-bind=\"src: imgSrc\" />\n    </div>\n\
  \    <div class=\"win-type-x-large dayHighLow\">\n        <span class=\"dayHigh\"\
  \ data-win-bind=\"innerHTML: hi\"></span>\n        <span>/</span>\n        <span\
  \ class=\"dayLow\" data-win-bind=\"innerHTML: low\"></span>\n    </div>\n    <div\
  \ class=\"dayFeelsLike\">\n        <span>体感温度 </span>\n        <span data-win-bind=\"\
  innerHTML: feelsLike\"></span>\n    </div>\n    <div class=\"dayChanceOfSnow\">\n\
  \        <span>降雪概率 </span>\n        <span data-win-bind=\"innerHTML: chanceOfSnow\"\
  ></span>\n    </div>\n</div>\n</div>\n```\n\n接下来，让我们添加`ListView`控件。将以下代码片段粘贴到上一步创建的模板之后：\n\
  \n```html\n<div id=\"weatherListView\" class=\"weatherListView\"\n    data-win-control=\"\
  WinJS.UI.ListView\"\n    data-win-options=\"{\n      itemDataSource:FluidApp.Data.weatherData.dataSource,\n\
  \      itemTemplate:select('#weatherTemplate'),\n      layout:WinJS.UI.GridLayout}\"\
  ></div>\n```\n\n您已经创建了一个列表视图，并提供了`weatherData`作为项目数据源。您还提供了项目模板。您已将列表视图的布局默认设置为`GridLayout`。您将根据屏幕尺寸调整来更改列表视图的此布局属性。\n\
  \n打开位于`js`文件夹中的`default.js`。使用以下代码片段修改`app.onactivated`函数：\n\n```javascript\napp.onactivated\
  \ = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n        } else {\n        }\n        args.setPromise(WinJS.UI.processAll().then(function\
  \ ready() {\n            var listView = document.querySelector(\"#weatherListView\"\
  );\n            var listViewLayout = new WinJS.UI.GridLayout();\n            if\
  \ (document.body.clientWidth <= 320) {\n                listViewLayout = new WinJS.UI.ListLayout();\n\
  \            }\n            listView.layout = listViewLayout;\n            window.addEventListener(\"\
  resize\", resizeListView, false)\n        }));\n    }\n};\n```\n\n让我们来解读一下这段代码。一旦\
  \ UI 处理完成，首先获取列表视图。然后检查当前运行屏幕的宽度。如果宽度小于或等于 320（即您处于小屏幕上），则相应地更改列表视图的布局。如果处于小屏幕，则使用`ListLayout`；否则，将其设置为`GridLayout`。您还注册了一个事件监听器来监听窗口的调整大小事件。接下来，让我们看看调整大小事件处理程序的作用。\n\
  \n在`app.onactivated`函数之后，创建一个新函数`resizeListView`，并粘贴以下代码片段：\n\n```javascript\nfunction\
  \ resizeListView() {\n    var listview = document.querySelector(\"#weatherListView\"\
  ).winControl;\n    if (document.body.clientWidth <= 320) {\n        if (!(listview.layout\
  \ instanceof WinJS.UI.ListLayout)) {\n            listview.layout = new WinJS.UI.ListLayout();\n\
  \        }\n    }\n    else {\n        if (listview.layout instanceof WinJS.UI.ListLayout)\
  \ {\n            listview.layout = new WinJS.UI.GridLayout();\n        }\n    }\n\
  }\n```\n\n现在，在移动设备或 PC 上运行应用程序以查看输出。按`F5`运行应用程序。图 6-5 所示的屏幕截图是在 Windows 10 移动版上，而图\
  \ 6-6 所示的屏幕截图是在 Windows 10 PC 上。\n\n![A978-1-4842-0719-2_6_Fig6_HTML.jpg](img/A978-1-4842-0719-2_6_Fig6_HTML.jpg)\n\
  \n图 6-6. 在 Windows PC 上的输出\n\n![A978-1-4842-0719-2_6_Fig5_HTML.jpg](img/A978-1-4842-0719-2_6_Fig5_HTML.jpg)\n\
  \n图 6-5. 在 Windows 10 移动版上的输出\n\n您刚刚实现的是针对不同屏幕尺寸量身定制的 UI。您使用了`ListView`布局技术，根据屏幕尺寸显示网格或列表布局。\n\
  \n---\n\n"
- "# 第 7 章：应用程序生命周期和导航\n\n本章介绍通用 Windows 应用程序事件和生命周期，涵盖启动 Windows 应用时引发的标准事件集以及如何处理这些事件。本章介绍开发人员如何处理应用程序的挂起和终止。它同时介绍如何在这些事件期间保存和恢复数据，这有助于开发人员提供更好的用户体验。\n\
  \n本章还介绍了导航模型，并解释了如何构建一个可以包含多个虚拟 HTML 页面的单页应用。\n\n## 7.1 应用程序状态和事件\n\n### 问题\n\n\
  您需要在用户启动、关闭或恢复应用程序时识别并订阅应用程序中的各种事件。\n\n### 解决方案\n\n使用通用 Windows 应用项目中的`default.js`文件来订阅和处理应用程序生命周期中的各种事件。\n\
  \n\n\n### 工作原理\n\n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual Studio\
  \ 2015 的“新建项目”对话框中的“JavaScript ➤ Windows ➤ 通用”节点下。这将在 Visual Studio 解决方案中创建一个项目，并附带所需的文件供您开始使用。\n\
  \n从项目的 `js` 文件夹中，通过 Visual Studio 解决方案资源管理器打开 `default.js` 文件。您会看到默认订阅的两个重要事件。\n\
  \n- `app.onactivated`\n- `app.oncheckpoint`\n\n这些事件的代码如下所示。\n\n```\napp.onactivated\
  \ = function (args)\n{\n                if (args.detail.kind === activation.ActivationKind.launch)\n\
  \             {\n                        if (args.detail.previousExecutionState\
  \ !== activation.ApplicationExecutionState.terminated) {\n                     \
  \   } else {\n                        }\n                        args.setPromise(WinJS.UI.processAll());\n\
  \                }\n        };\napp.oncheckpoint = function (args)\n{\n};\n```\n\
  \n作为开发者，您应处理这些事件，以描述当触发各种执行状态时，应用程序应如何保存和恢复数据。\n\n在通用 Windows 应用中，有三种应用执行状态：\n\n\
  - 未运行\n- 运行中\n- 已挂起\n\n图 7-1 展示了通用 Windows 应用的生命周期。\n\n![A978-1-4842-0719-2_7_Fig1_HTML.jpg](img/A978-1-4842-0719-2_7_Fig1_HTML.jpg)\n\
  \n图 7-1. 应用程序状态与事件\n\n当通用 Windows 应用启动时，WinJS 应用会按以下顺序触发事件。\n\n`WinJS.Application.loaded`\
  \ `WinJS.Application.activated` `WinJS.Application.ready` `WinJS.Application.unload`\n\
  \n当您的应用即将被挂起时，会触发 `WinJS.Application.checkpoint` 事件。\n\n表 7-1 提供了应用程序事件的列表。\n\n\
  表 7-1. 应用程序事件列表\n\n| 事件名称 | 描述 |\n| --- | --- |\n| `WinJS.Application.loaded` |\
  \ 当 HTML 文档完全加载后，此事件由 `DOMContentLoaded` 事件触发。 |\n| `WinJS.Application.activated`\
  \ | 当您的应用程序被激活时触发此事件。 |\n| `WinJS.Application.ready` | 当 `loaded` 和 `activated`\
  \ 事件执行完成后触发此事件。 |\n| `WinJS.Application.unload` | 此事件在页面卸载前由 `beforeunload` 事件触发。\
  \ |\n| `WinJS.Application.checkpoint` | 当您的应用程序被挂起时触发此事件。 |\n\n开发者应处理 `activated`\
  \ 事件和 `checkpoint` 事件，以添加自定义逻辑来保存和恢复应用状态。因此，在创建新项目时，您会看到默认包含这两个事件。\n\n其他事件可以使用 `WinJS.Application.addEventListener`\
  \ 方法进行订阅。\n\n打开 `default.js` 文件，并在 `onactivated` 事件行上方添加以下代码片段。\n\n```\nWinJS.Application.addEventListener(\"\
  loaded\", function(event) {\n    console.log(\"loaded event\");\n});\nWinJS.Application.addEventListener(\"\
  ready\", function (event) {\n    console.log(\"ready event\");\n});\n```\n\n此外，在\
  \ `onactivated` 事件内部添加 `console.log (\"activated\");`。\n\n当您使用“本地计算机”选项在 Windows\
  \ 桌面上运行该应用时，您会看到事件按指定顺序触发，如图 7-2 所示。\n\n![A978-1-4842-0719-2_7_Fig2_HTML.jpg](img/A978-1-4842-0719-2_7_Fig2_HTML.jpg)\n\
  \n图 7-2. JavaScript 控制台窗口中的应用程序事件\n\n注意：在调用 `WinJS.Application.start` 事件之前，这些事件不会被触发。该方法在\
  \ `default.js` 文件中被调用。\n\nWindows 应用必须先安装在设备上才能被激活。这通常可以通过从 Windows 应用商店安装应用，或在开发过程中使用\
  \ Visual Studio 构建和部署通用应用来实现。\n\n当用户从“开始”屏幕或应用列表中点击应用磁贴时，Windows 应用被激活。在此阶段，应用处于“未运行”状态，需考虑以下条件：\n\
  \n- 应用是首次启动。\n- 应用因崩溃而未运行。\n- 应用被挂起，随后被系统终止。\n\n应用可以通过多种方式被激活。可以使用 `ActivationKind`\
  \ 枚举来查明应用是如何被激活的，并确定应用激活的确切原因。\n\n例如，当用户点击应用磁贴时，应用可以被激活。在这种情况下，`ActivationKind`\
  \ 的值为 `launch`。同样，当通过搜索合约激活应用时，`ActivationKind` 的值为 `search`。\n\n以下代码片段展示了如何在 `onactivated`\
  \ 事件中处理此情况。\n\n```\nif (args.detail.kind === activation.ActivationKind.launch) {\n\
  \            console.log(\"launch activation kind\");\n}\nelse if (args.detail.kind\
  \ === activation.ActivationKind.Search) {\n            console.log(\"search activation\
  \ kind\");\n}\n```\n\n表 7-2 展示了一些最常见的激活方法及其枚举值。\n\n表 7-2. 激活方法\n\n| 枚举成员 | 值 | 描述\
  \ |\n| --- | --- | --- |\n| `launch` | 0 | 当用户启动应用或从应用列表中点击磁贴时接收到此值。 |\n| `search`\
  \ | 1 | 当用户希望使用应用通过搜索合约进行搜索时接收到此值。 |\n| `shareTarget` | 2 | 当应用程序通过共享合约被激活时接收到此值。\
  \ |\n| `file` | 3 | 当设备中的另一个应用启动了一个文件，且该文件的文件类型已由应用注册进行处理时接收到此值。 |\n| `protocol`\
  \ | 4 | 当另一个应用启动了一个 URI，该 URI 的方案名称已注册由该应用处理时接收到此值。 |\n| `fileOpenPicker` | 5 |\
  \ 当用户选取由此应用提供的文件时接收到此值。 |\n| `fileSavePicker` | 6 | 当用户尝试保存文件并选择该应用作为位置时接收到此值。 |\n\
  | `cachedFileUpdater` | 7 | 当用户尝试保存一个由该应用提供内容管理的文件时接收到此值。 |\n| `contactPicker` |\
  \ 8 | 当用户选取联系人时接收到此值。 |\n| `device` | 9 | 该应用处理自动播放。 |\n| `voiceCommand` | 16 |\
  \ 当应用因语音命令而被激活时接收到此值。 |\n| `toastNotification` | 1010 | 当用户点击 toast 通知或 toast 通知内的操作后应用被激活时接收到此值。\
  \ |\n\n## 7.2 处理应用中的未处理异常\n\n### 问题\n\n您的应用崩溃，用户立即被带到 Windows 开始屏幕，且没有任何信息。您需要处理此场景以提供更好的用户体验。\n\
  \n### 解决方案\n\n您可以在 `default.js` 文件中处理 `WinJS.Application.error` 事件，以记录错误并向用户显示一条消息。\n\
  \n\n\n### 工作原理\n\n当通用 Windows 应用中出现未处理的异常时，会调用 `MSApp.terminateApp` 函数，之后应用程序关闭，且不会向用户显示任何信息。\n\
  \n在本教程中，我们将处理 `WinJS.Application.error` 事件，并在应用中出现未处理异常时向用户显示一条消息。\n\n使用通用 Windows\
  \ 模板创建一个新的通用 Windows 项目，该模板可以在 Microsoft Visual Studio 2015 的“新建项目”对话框中的 JavaScript\
  \ ➤ Windows ➤ Universal 节点下找到。这将在 Visual Studio 解决方案中创建一个项目，并同时在其中包含必要的文件以开始开发。\n\
  \n从 `js` 文件夹中打开 `default.js` 文件，并将其替换为以下代码片段。\n\n```\n(function () {\n    \"use\
  \ strict\";\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
  \    WinJS.Application.addEventListener(\"error\", function(eventArgs) {\n     \
  \   var errorMessage = new Windows.UI.Popups.MessageDialog(\"应用程序中发生错误，请联系应用程序发布者\"\
  );\n        errorMessage.showAsync();\n        return true;\n    });\n    app.onactivated\
  \ = function (args) {\n        args.setPromise(WinJS.UI.processAll());\n       \
  \ throw new WinJS.ErrorFromName();\n    };\n    app.start();\n})();\n```\n\n此代码片段从\
  \ `onactivated` 事件中抛出一个异常。`WinJS.Application.addEventListener` 函数用于为 error 事件添加侦听器，以处理未处理的异常并向用户显示一条消息。\n\
  \n使用 Visual Studio 2015 中的“本地计算机”选项在 Windows 桌面上运行该应用。您将看到如图 7-3 所示的消息。\n\n![A978-1-4842-0719-2_7_Fig3_HTML.jpg](img/A978-1-4842-0719-2_7_Fig3_HTML.jpg)\n\
  \n**图 7-3.** 在应用出现未处理异常时显示消息\n\n**注意：** 错误处理函数返回 `true`。值 `true` 用于指示错误已被处理，因此不应终止应用。\n\
  \n## 7.3 处理应用的终止和恢复\n\n### 问题\n\n您需要识别应用的先前执行状态，以便在启动时恢复该状态。\n\n### 解决方案\n\n您可以使用激活事件参数的\
  \ `detail.previousExecutionState` 属性来识别应用的状态。此属性确定应用是作为新应用启动的，还是之前被用户关闭的，或者是用户在应用被挂起或终止后启动的。\n\
  \n### 工作原理\n\n`previousExecutionState` 包含指示应用程序先前状态的值。您可以在 activated 事件中使用此值，根据此值加载之前的状态值或初始状态值。\n\
  \n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板可以在 Microsoft Visual Studio 2015 的“新建项目”对话框中的\
  \ JavaScript ➤ Windows ➤ Universal 节点下找到。这将在 Visual Studio 解决方案中创建一个项目，并同时在其中包含必要的文件以开始开发。\n\
  \n从 `js` 文件夹中打开 `default.js` 文件，并将 `onactivated` 事件替换为以下代码片段。\n\n```\napp.onactivated\
  \ = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n        if (args.detail.previousExecutionState === activation.ApplicationExecutionState.notRunning)\
  \ {\n            console.log(\"Previous state is not running\");\n        }\n  \
  \      if (args.detail.previousExecutionState === activation.ApplicationExecutionState.closedByUser)\
  \ {\n            console.log(\"Previous state is closed by the user\");\n      \
  \  }\n        if (args.detail.previousExecutionState === activation.ApplicationExecutionState.terminated)\
  \ {\n            console.log(\"Previous state is terminated\");\n        }\n   \
  \     args.setPromise(WinJS.UI.processAll());\n    }\n};\n```\n\n此代码处理 `onactivated`\
  \ 事件，其中使用 `args.detail.previousExecutionState` 来查找应用的先前状态。`ApplicationExecutionState`\
  \ 枚举用于检查应用的状态。\n\n当您运行应用时，您会在 JavaScript 控制台窗口中看到显示的先前状态，如图 7-4 所示。\n\n![A978-1-4842-0719-2_7_Fig4_HTML.jpg](img/A978-1-4842-0719-2_7_Fig4_HTML.jpg)\n\
  \n**图 7-4.** 在 JavaScript 控制台窗口中显示的 `PreviousExecutionState`\n\n`ApplicationExecutionState`\
  \ 枚举包含的值如表 7-3 所示。\n\n**表 7-3.** `ApplicationExecutionState` 及其枚举值\n\n| 状态 | 描述\
  \ |\n| --- | --- |\n| `notRunning` | 当用户首次启动应用、关闭应用并在 10 秒内重新启动应用，或应用崩溃时，应用的先前状态为\
  \ \"notRunning\"。 |\n| `running` | 如果应用已在运行，并且用户通过合约或辅助磁贴启动应用，则应用的先前状态为 \"running\"\
  。 |\n| `suspended` | 如果应用被挂起，之后通过辅助磁贴或合约激活，则应用的先前状态为 \"suspended\"。 |\n| `terminated`\
  \ | 如果应用之前被操作系统终止，则应用的先前状态为 \"terminated\"。 |\n| `closedByUser` | 如果应用被用户关闭且未在 10\
  \ 秒内重新启动，则应用的先前状态为 \"closedByUser\"。应用可以通过 `Alt`+`F4` 快捷键或使用关闭手势来关闭。 |\n\n## 7.4\
  \ 使用 SessionState 存储状态\n\n### 问题\n\n您需要在应用程序生命周期内存储应用的状态，以便在应用激活时恢复该值。\n\n### 解决方案\n\
  \n使用 `WinJS.Application.sessionState` 将数据存储到应用的状态中，该状态可用于在应用挂起或终止后恢复应用。\n\n\n\n\
  ### 工作原理\n\n`WinJS.Application.sessionState` 对象用于存储应用程序信息，以便在应用程序被挂起或终止后恢复其状态。\n\
  \n当应用程序被挂起然后重新启动时，它不会丢失状态。但是，当应用程序被挂起，随后操作系统因内存不足或其他原因终止该应用程序时，其状态会丢失。应用程序再次启动时将从头开始。\n\
  \n`WinJS.Application.sessionState` 有助于解决此问题。\n\n让我们通过一些代码来演示 `SessionState` 的用法。\n\
  \n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual Studio 2015 中“新建项目”对话框的\
  \ `JavaScript ➤ Windows ➤ Universal` 节点下。这会在 Visual Studio 解决方案中创建一个项目，并在其中包含必要的文件。从\
  \ Visual Studio 解决方案资源管理器中打开 `default.html` 页面，并将其替换为以下代码片段。\n\n```html\n<!DOCTYPE\
  \ html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe7.4</title>\n\
  \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
  stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
  WinJS/js/ui.js\"></script>\n    <!-- Recipe7.4 references -->\n    <link href=\"\
  /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
  </head>\n<body class=\"win-type-body\" style=\"margin: 20px\">\n<div>\n    <input\
  \ id=\"txt1\"/>\n    <input id=\"txt2\"/>\n</div>\n</body>\n</html>\n```\n\n上面的代码片段在页面上添加了两个输入控件，以便用户可以输入数据。\n\
  \n打开 `js` 文件夹中的 `default.js` 文件，并将 `onactivated` 和 `oncheckpoint` 事件替换为以下代码片段。\n\
  \n```javascript\napp.onactivated = function (args) {\n                if (args.detail.kind\
  \ === activation.ActivationKind.launch) {\n                    if (args.detail.previousExecutionState\
  \ === Windows.ApplicationModel.Activation.ApplicationExecutionState.notRunning)\
  \ {\n                        console.log(\"setting the initial values\");\n    \
  \                    document.getElementById(\"txt1\").value = '';\n           \
  \             document.getElementById(\"txt2\").value = '';\n                  \
  \  }\n                    if (args.detail.previousExecutionState === Windows.ApplicationModel.Activation.ApplicationExecutionState.closedByUser)\
  \ {\n                        console.log(\"setting the initial values\");\n    \
  \                    document.getElementById(\"txt1\").value = '';\n           \
  \             document.getElementById(\"txt2\").value = '';\n                  \
  \  }\n                    if (args.detail.previousExecutionState === Windows.ApplicationModel.Activation.ApplicationExecutionState.terminated)\
  \ {\n                        console.log(\"setting the previous state values\");\n\
  \                        document.getElementById(\"txt1\").value = WinJS.Application.sessionState.txt1;\n\
  \                        document.getElementById(\"txt2\").value = WinJS.Application.sessionState.txt2;\n\
  \                    }\n                        args.setPromise(WinJS.UI.processAll());\n\
  \                }\n        };\n        app.oncheckpoint = function (args) {\n \
  \           WinJS.Application.sessionState.txt1 = document.getElementById(\"txt1\"\
  ).value;\n            WinJS.Application.sessionState.txt2 = document.getElementById(\"\
  txt2\").value;\n        };\n```\n\n该代码片段处理 `onactivated` 和 `oncheckpoint` 事件。当应用程序被挂起时，会触发\
  \ `oncheckpoint` 事件。在此阶段，用户在两个文本框中输入的值会被保存到 `sessionState` 中。\n\n如果应用程序的上一个状态是 `terminated`，那么当应用程序重新激活时，将从\
  \ `sessionState` 中恢复值并更新到页面上的文本框中。如果上一个状态是 `notRunning` 或 `closedByUser`，则恢复默认值。\n\
  \n当你运行一个已被挂起并终止的应用程序时，你会看到应用程序数据在页面中恢复，如图 7-5 所示。\n\n![A978-1-4842-0719-2_7_Fig5_HTML.jpg](img/A978-1-4842-0719-2_7_Fig5_HTML.jpg)\n\
  \n**图 7-5.** 显示从 `sessionState` 恢复的数据的页面\n\n你可以测试应用程序状态，并模拟 Visual Studio 2015 中的挂起和终止事件。为此，需要使用“调试位置”工具栏中的“生命周期事件”下拉列表，如图\
  \ 7-6 所示。\n\n![A978-1-4842-0719-2_7_Fig6_HTML.jpg](img/A978-1-4842-0719-2_7_Fig6_HTML.jpg)\n\
  \n**图 7-6.** 用于测试 Visual Studio 中应用程序生命周期事件的工具\n\n可以通过单击 `Suspend` 选项来挂起正在运行的应用程序，然后点击\
  \ `Resume` 选项来恢复应用程序，从而模拟挂起和恢复生命周期事件。单击 `Suspend` 选项时，会触发 `onCheckpoint` 事件。可以通过单击\
  \ `Suspend and shutdown` 按钮来模拟挂起和终止事件。此时，`onCheckpoint` 事件被触发，并且你的应用程序终止。当你再次运行应用程序时，`previousExecutionState`\
  \ 包含值 `terminated`。\n\n## 7.5 使用超链接在页面之间导航\n\n### 问题\n\n你需要以最简单的方式之一在通用 Windows\
  \ 应用程序中的页面之间进行导航。\n\n### 解决方案\n\n使用 HTML 在应用程序内进行页面导航的最简单方法之一是使用超链接。\n\n### 工作原理\n\
  \n假设你的应用程序中有 `default.html` 和 `newpage.html` 文件，如果你想从 `default.html` 导航到 `newpage.html`，在\
  \ `default.html` 中添加以下代码即可实现。\n\n```html\n<p><a href=\"newpage.html\">Navigate to\
  \ page 2</a></p>\n```\n\n代码中的 `href` 是一个指向 `newpage.html` 的相对链接。这是一个属于你通用 Windows\
  \ 应用程序的 HTML 页面，并且应位于项目的根目录。\n\n或者，如果你想指定应用程序中本地文件的 URI，可以使用新的包内容 URI 方案，称为 `ms-appx`。\n\
  \n上述代码可以重写如下：\n\n```html\n<p><a href=\"ms-appx:///newpage.html\">Navigate to New\
  \ page</a></p>\n```\n\n**注意**\n\n尽管此示例执行了顶级导航，但你应该避免在 Windows 应用程序中这样做。这对于网页来说是理想的，但不适用于移动或平板电脑应用程序。有时，当应用程序加载下一页时，屏幕可能会变空白。\n\
  \n微软建议使用单页导航，与顶级导航相比，它提供了更好的性能和更像应用程序的体验。\n\n## 7.6 使用单页导航在页面之间导航\n\n### 问题\n\n\
  你需要使用单页导航模型在通用 Windows 应用程序中的页面之间进行导航。\n\n### 解决方案\n\n在通用 Windows 应用程序中实现单页导航的最简单解决方案之一，是将\
  \ Windows 8.1 导航应用模板中执行导航逻辑所需的文件导入到 Windows 10 项目中。\n\n**注意**\n\n在撰写本文时，Windows\
  \ 10 不提供像 Windows 8.1 中那样的等效导航模板。\n\n\n\n### 工作原理\n\nVisual Studio 2015 并未为 UWP\
  \ 应用提供导航模板，它只提供了 `Blank App` 模板。幸运的是，VS 2015 还包含 Windows 8.1 应用的模板，其中有一个模板包含大量导航逻辑。接下来，我们将必要的文件从\
  \ Windows 8.1 项目添加到通用 Windows 应用中。\n\n启动 Visual Studio 2015，使用 `Navigation App`\
  \ 模板创建一个新的 Windows 8.1 项目，如图 7-7 所示。\n\n![A978-1-4842-0719-2_7_Fig7_HTML.jpg](img/A978-1-4842-0719-2_7_Fig7_HTML.jpg)\n\
  \n**图 7-7.** 使用 `Navigation App` 模板创建 Windows 8.1 项目\n\n该模板会添加 `navigator.js` 文件，并更新\
  \ `default.js` 文件以包含导航逻辑。这些文件位于项目的 `js` 文件夹下。\n\n该模板还会创建一个名为 `pages` 的文件夹，并在其中包含一个\
  \ `home` 子文件夹，内含三个文件：`home.css`、`home.html` 和 `home.js`。\n\n`pages` 文件夹包含所有页面控件，它们就像是\
  \ Windows 应用中的页面。当你启动 `Navigation App` 模板时，默认会加载 `pagecontrol home.html` 文件。此设置在\
  \ `default.html` 页面中定义。\n\n所有加载页面控件的细节均由 `PageControlNavigator` 处理，它是 `navigator.js`\
  \ 文件的一部分。\n\n下一步是创建一个新的通用 Windows 应用，并更新它，使其包含从使用 Windows 8.1 `Navigation` 模板创建的项目中获取的文件。\n\
  \n![A978-1-4842-0719-2_7_Fig8_HTML.jpg](img/A978-1-4842-0719-2_7_Fig8_HTML.jpg)\n\
  \n**图 7-8.** 在 Visual Studio 2015 中将 `js` 文件夹和 `pages` 文件夹包含到 UWP 应用中\n\n使用 `Universal\
  \ Windows` 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual Studio 2015 新建项目对话框的 **JavaScript**\
  \ > **Windows** > **Universal** 节点下。这会在 Visual Studio 解决方案中创建一个单独的项目，并在其中包含启动所需的必要文件。\n\
  \n将先前创建的 Windows 8.1 `Navigation App` 中的整个 `js` 文件夹和 `pages` 文件夹复制并粘贴到新通用项目的根目录下。然后，通过\
  \ Visual Studio 解决方案资源管理器将它们包含到项目中，如图 7-8 所示。\n\n现在，你已准备好修改通用 Windows 应用，以实现在页面之间进行导航。\n\
  \n从 Visual Studio 解决方案资源管理器中打开 `default.html` 页面，并将 body 部分替换为以下代码。\n\n```\n<div\
  \ id=\"contenthost\" data-win-control=\"Application.PageControlNavigator\" data-win-options=\"\
  {home: '/pages/home/home.html'}\"></div>\n```\n\n同时，在 `default.html` 页面中包含对 `navigator.js`\
  \ 的引用。\n\n```\n<script src=\"/js/navigator.js\"></script>\n```\n\n`default.html`\
  \ 页面充当一个外壳，用于加载 `pages` 文件夹中的不同页面控件。默认情况下，它会加载 `pages`/`home` 文件夹中的 `home.html`\
  \ 页面。\n\n`PageControlNavigator` 控件有一个 `id` 为 `content host` 的元素，它充当从页面控件加载的内容的宿主。\n\
  \n下一步是向项目添加一个新的页面控件，以便用户可以从 `home.html` 文件导航到该新页面控件。\n\nMicrosoft Visual Studio\
  \ 提供了 `Page Control` 项模板，使开发者能够轻松创建页面控件。\n\n在 Visual Studio 解决方案资源管理器中右键单击 `pages`\
  \ 文件夹，然后从上下文菜单中选择 **添加** > **新建项**。在 **添加新项** 对话框中，选择 `Page Control`，并将名称指定为 `page2.html`。点击\
  \ **添加** 按钮。\n\n这会将三个文件添加到项目中：\n\n*   `page1.html`\n*   `page1.css`\n*   `page1.js`\n\
  \n`page1.html` 的内容如下所示。\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n<meta charset=\"\
  utf-8\" />\n<title>page1</title>\n<link href=\"page1.css\" rel=\"stylesheet\" />\n\
  <script src=\"page1.js\"></script>\n</head>\n<body>\n<div class=\"page1 fragment\"\
  >\n<header class=\"page-header\" aria-label=\"Header content\" role=\"banner\">\n\
  <button class=\"back-button\" data-win-control=\"WinJS.UI.BackButton\"></button>\n\
  <h1 class=\"titlearea win-type-ellipsis\">\n<span class=\"pagetitle\">Welcome to\
  \ page1</span>\n</h1>\n</header>\n<section class=\"page-section\" aria-label=\"\
  Main content\" role=\"main\">\n<p>The content of page 2</p>\n</section>\n</div>\n\
  </body>\n</html>\n```\n\n`page1.js` 文件的内容如下所示：\n\n```\n// For an introduction to\
  \ the Page Control template, see the following documentation:\n// http://go.microsoft.com/fwlink/?LinkId=232511\n\
  (function () {\n\"use strict\";\nWinJS.UI.Pages.define(\"/pages/page1.html\", {\n\
  // This function is called whenever a user navigates to this page. It\n// populates\
  \ the page elements with the app's data.\nready: function (element, options) {\n\
  },\nunload: function () {\n},\nupdateLayout: function (element) {\n}\n});\n})();\n\
  ```\n\n你只需修改 `page1.html` 的 body 标签，以表明导航到页面 1 成功。\n\n现在，通用应用中包含两个 HTML 页面。第一个页面是\
  \ `home.html`，第二个页面是 `page1.html`。如何在两个页面之间导航？\n\n你可以使用 `WinJS.Navigate.navigate()`\
  \ 方法在页面之间导航。\n\n让我们修改 `home.html`，通过添加以下代码片段来包含一个指向页面 1 的超链接。\n\n```\n<a id=\"lnkPage2\"\
  > Navigate to Page 2</a>\n```\n\n请注意，该超链接包含 `id` 属性，但没有 `href` 属性。\n\n打开 `home.js`\
  \ 文件，并将其内容替换为以下代码片段。\n\n```\n(function () {\n\"use strict\";\nWinJS.UI.Pages.define(\"\
  /pages/home/home.html\", {\n// This function is called whenever a user navigates\
  \ to this page. It\n// populates the page elements with the app's data.\nready:\
  \ function (element, options) {\nvar page2link = document.getElementById('lnkPage2');\n\
  page2link.addEventListener('click', function(eventargs) {\neventargs.preventDefault();\n\
  WinJS.Navigation.navigate(\"/pages/page1.html\");\n});\n}\n});\n})();\n```\n\n该代码在页面的\
  \ `ready` 事件中为超链接设置了点击事件处理程序。点击事件处理程序首先调用 `preventDefault` 函数来阻止常规的链接导航，然后调用 `WinJS.Navigation.navigate`\
  \ 方法导航到 `page1.html`。\n\n当你使用 **本地计算机** 选项在 Windows 桌面运行该应用时，会看到显示有超链接的主页，如图 7-9\
  \ 所示。\n\n![A978-1-4842-0719-2_7_Fig9_HTML.jpg](img/A978-1-4842-0719-2_7_Fig9_HTML.jpg)\n\
  \n**图 7-9.** `home.html` 页面，包含一个导航到页面 2 的超链接\n\n当你点击 **Navigate to Page 2** 链接时，用户将被带到页面\
  \ 2，如图 7-10 所示。查看 `page2.html` 时，请注意 **返回** 按钮，它可以将你带回到上一个页面。\n\n![A978-1-4842-0719-2_7_Fig10_HTML.jpg](img/A978-1-4842-0719-2_7_Fig10_HTML.jpg)\n\
  \n**图 7-10.** 包含 **返回** 按钮的 `Page1.html`\n\n表 7-4 显示了 `WinJS.Navigation` 类中可用的部分方法。\n\
  \n**表 7-4.** `WinJS.Navigation` 类\n\n| 方法名称 | 说明 |\n| --- | --- |\n| `WinJS.Navigation.back()`\
  \ | 该方法导航用户返回历史记录中的上一个页面。 |\n| `WinJS.Navigation.forward()` | 该方法使开发者能够在历史记录中向前导航。\
  \ |\n| `WinJS.Navigation.navigate()` | 该方法使开发者能够导航到指定的页面。 |\n\n\n\n"
- "# 第 8 章：全球化和本地化\n\n你的 Windows 应用可以在近 240 个 Windows 市场中销售。目标受众在文化、地域和语言上各不相同。你的应用用户可能遍布世界各地，他们可能说不同的语言，甚至多种语言。作为应用程序开发者，你需要让你的应用适配多种语言、市场、文化和区域。全球化意味着让应用感知文化、语言和区域。本地化则是将应用的某些方面适配到其所运行的文化中的能力，例如日期、数字或货币格式等。在本章中，你将学习如何对应用进行全球化和本地化的方法。\n\
  \n## 8.1 使用资源字符串\n\n### 问题\n\n当应用在非英语文化环境下使用时，文本无法适配新的文化和语言，用户看到的仍然是英语文本。\n\n###\
  \ 解决方案\n\n为了实现应用的全球化，必须使用资源字符串来代替静态文本。例如，应用程序中的任何标签文本都不应硬编码为静态文本。相反，应该为你需要支持的文化/语言创建一个资源文件。添加能够将文本翻译成对应语言的字符串。标签文本也应使用资源字符串，而非硬编码。\n\
  \n### 工作原理\n\n让我们看看资源字符串在应用程序中的用法，以及如何添加它们。\n\n打开 Visual Studio 2015。选择文件 ➤ 新建项目\
  \ ➤ JavaScript ➤ Windows ➤ 通用，然后选择空白应用（通用 Windows）模板。这将创建一个包含必要文件的通用应用，可在运行 Windows\
  \ 10 的设备上运行。\n\n![A978-1-4842-0719-2_8_Fig1_HTML.jpg](img/A978-1-4842-0719-2_8_Fig1_HTML.jpg)\n\
  \n图 8-1. 在“新建项目”窗口中选择“空白应用（通用 Windows）”模板\n\n在 Visual Studio 解决方案资源管理器中，从项目中打开 `package.appxmanifest`\
  \ 文件。转到“应用程序”选项卡，检查默认语言是否设置为 en-US。创建新项目时，语言默认设置为 en-US（见图 8-2）。\n\n![A978-1-4842-0719-2_8_Fig2_HTML.jpg](img/A978-1-4842-0719-2_8_Fig2_HTML.jpg)\n\
  \n图 8-2. 应用程序清单中的默认语言设置\n\n按如下方式创建一个资源文件夹：\n\n![A978-1-4842-0719-2_8_Fig3_HTML.jpg](img/A978-1-4842-0719-2_8_Fig3_HTML.jpg)\n\
  \n图 8-3. Windows 项目中的 Strings 文件夹\n\n在解决方案资源管理器中，选择通用 Windows 项目并右键单击它。从上下文菜单中选择添加\
  \ ➤ 新建文件夹。将新文件夹命名为 `strings`。你将在此文件夹内创建不同文化/语言的资源文件（见图 8-3）。\n\n按如下方式创建一个子文件夹和一个英语资源文件：在\
  \ `strings` 文件夹（在步骤 3 中创建）中创建一个名为 `en-US` 的文件夹。右键单击 `en-US` 文件夹并选择添加 ➤ 新建项。从模板中选择文本文件，并将文件命名为\
  \ `resources.resjson`。建议在命名资源文件时使用这个默认名称。将文件内容替换为以下内容：\n\n```\n{\n    \"greeting\"\
  \          : \"Hello World!\",\n    \"_greeting.comment\" : \"Hello World Text comment\"\
  ,\n    \"farewell\"          : \"Goodbye\",\n    \"_farewell.comment\" : \"A farewell\
  \ comment.\"\n}\n```\n\n资源文件本质上是一个包含键值对的 JSON 文件。这里，`\"greeting\"` 和 `\"farewell\"\
  ` 标识了将要显示的字符串。其他键——`\"_greeting.comment\"` 和 `\"_farewell.comment\"` 是描述这些字符串本身的注释。为所有字符串添加有意义的注释是一个好习惯。\n\
  \n使用字符串资源标识符执行以下操作：从 Visual Studio 解决方案资源管理器中打开项目中的 `default.js` 文件。该文件位于项目的 `js`\
  \ 文件夹中。将以下代码行添加到 `app.onactivated` 函数中：`WinJS.Resources.processAll();` 完成后的代码如下所示：\n\
  \n```\napp.onactivated = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            WinJS.Resources.processAll();\n        } else {\n        }\n  \
  \      args.setPromise(WinJS.UI.processAll());\n    }\n};\n```\n\n要使用标记中的资源字符串，请打开\
  \ `default.html` 文件，并在 body 中添加以下内容：\n\n```\n<h2>\n <span data-win-res=\"{textContent:\
  \ 'greeting'}\"></span></h2>\n<h2>\n <span data-win-res=\"{textContent: 'farewell'}\"\
  ></span>\n</h2>\n```\n\n添加其他语言资源文件：在项目的 `strings` 文件夹中，添加一个名为 `de-DE` 的文件夹。这用于德语文化。在\
  \ `de-DE` 文件夹中添加一个资源文件。将资源文件命名为 `resources.resjson`。将文件内容替换为以下代码：\n\n```\n{\n  \
  \  \"greeting\"          : \"Hallo Welt!\",\n    \"_greeting.comment\" : \" Hello\
  \ World Text comment.\",\n    \"farewell\"          : \"Auf Wiedersehen\",\n   \
  \ \"_farewell.comment\" : \"A farewell comment.\"\n}\n```\n\n在项目的 `strings` 文件夹中添加另一个文件夹，命名为\
  \ `fr-FR`。这用于法语文化。在 `fr-FR` 文件夹中添加一个资源文件。该资源文件名也应为 `resources.resjson`。将文件内容替换为以下代码：\n\
  \n```\n{\n    \"greeting\"          : \"Salut tout le monde\",\n    \"_greeting.comment\"\
  \ : \"Hello World Text comment.\",\n    \"farewell\"          : \"Au revoir\",\n\
  \    \"_farewell.comment\" : \"A farewell comment.\"\n}\n```\n\n按如下方式运行应用：按 F5 生成并运行应用。问候和告别消息将以用户在设备上设置的首选语言显示。图\
  \ 8-4 显示了使用本地计算机选项在 Windows 屏幕上运行的输出。\n\n![A978-1-4842-0719-2_8_Fig4_HTML.jpg](img/A978-1-4842-0719-2_8_Fig4_HTML.jpg)\n\
  \n图 8-4. 英语文化资源字符串显示\n\n更改设备上的语言设置并再次运行应用。图 8-5 显示了将设备语言设置为法语时显示的相同文本。\n\n![A978-1-4842-0719-2_8_Fig5_HTML.jpg](img/A978-1-4842-0719-2_8_Fig5_HTML.jpg)\n\
  \n图 8-5. 法语文化资源字符串显示\n\n请注意，在 Windows 移动设备上更改语言设置时，必须重新启动设备。\n\n## 8.2 格式化日期、时间、数字和货币\n\
  \n### 问题\n\n当语言更改为非英语文化/语言时，日期、时间、数字和货币仍显示英语文化设置。\n\n### 解决方案\n\n应用程序中的静态文本内容可以通过使用资源字符串进行本地化。但如果你的应用程序需要显示日期、时间、数字或货币，则无法使用资源字符串。相反，你需要使用\
  \ `WinJS.Globalization` 命名空间，它提供了 DateTime、Number 和 Currency 格式化辅助方法的功能。\n\n###\
  \ 工作原理\n\n\n\n### 格式化日期和时间\n\n以下步骤说明如何格式化日期和时间。\n\n使用 `Windows.Globalization.DateTimeFormatting`\
  \ 命名空间中的 `DateTimeFormatter`。通过模板格式创建一个 `DateTimeFormatter` 实例。有关模板格式的列表，可以查看 MSDN\
  \ 文档：[`http://msdn.microsoft.com/en-us/library/windows/apps/windows.globalization.datetimeformatting.datetimeformatter.aspx`](http://msdn.microsoft.com/en-us/library/windows/apps/windows.globalization.datetimeformatting.datetimeformatter.aspx)。\n\
  \n将以下标记添加到 `default.html` 文件的 body 元素内：\n\n```\n<h1>Formatting Demo</h1> <br />\
  \ <h3>Long Date:</h3> <h3 id=\"spnDate\"></h3> <br /> <h3>Long Time:</h3> <h3 id=\"\
  spnTime\"></h3>\n```\n\n按如下方式修改 `default.js` 中的 `onactivated` 方法：\n\n```\napp.onactivated\
  \ = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n            var lang = Windows.System.UserProfile.GlobalizationPreferences.languages[0];\n\
  \            var shortDateFmt = new Windows.Globalization.DateTimeFormatting.DateTimeFormatter(\"\
  longdate\", [lang]);\n            var shortTimeFmt = new Windows.Globalization.DateTimeFormatting.DateTimeFormatter(\"\
  longtime\",[lang]);\n            var currentDateTime = new Date();\n           \
  \ var shortDate = shortDateFmt.format(currentDateTime);\n            var shortTime\
  \ = shortTimeFmt.format(currentDateTime);\n            document.getElementById(\"\
  spnDate\").innerHTML = shortDate;\n            document.getElementById(\"spnTime\"\
  ).innerHTML = shortTime;\n        } else {\n            // TODO: 此应用程序已从挂起状态重新激活。\n\
  \            // 在此处恢复应用程序状态。\n        }\n        args.setPromise(WinJS.UI.processAll());\n\
  \    }\n};\n```\n\n运行应用并验证输出（参见图 8-6 和图 8-7）。\n\n![A978-1-4842-0719-2_8_Fig7_HTML.jpg](img/A978-1-4842-0719-2_8_Fig7_HTML.jpg)\n\
  \n**图 8-7.** 法语区域设置的格式化输出\n\n![A978-1-4842-0719-2_8_Fig6_HTML.jpg](img/A978-1-4842-0719-2_8_Fig6_HTML.jpg)\n\
  \n**图 8-6.** 英语区域设置的格式化输出\n\n图 8-6 显示针对英语区域设置格式化的日期，图 8-7 显示针对法语区域设置格式化的日期。\n\n\
  ### 格式化数字和货币\n\n以下步骤说明如何格式化数字和货币：\n\n应使用 `NumberFormatting` 来显示小数、百分比数字和货币。\n\n\
  将以下标记添加到 `default.html` 的 body 末尾：\n\n```\n<h3>Number Format:</h3> <h3 id=\"spnCurrency\"\
  ></h3>\n```\n\n修改 `default.js` 中的 `onactivated` 方法，并追加以下代码：\n\n```\nvar userCurrency\
  \ = Windows.System.UserProfile\n                    .GlobalizationPreferences.currencies;\n\
  var number = 23456.78\nvar currFmt = new Windows.Globalization.NumberFormatting\n\
  \                    .CurrencyFormatter(userCurrency[0],[lang]);\nvar formattedCurrency\
  \ = currFmt.format(number);\ndocument.getElementById(\"spnCurrency\").innerHTML\
  \ =\n                formattedCurrency;\n```\n\n按 F5 运行应用。更改手机或平板电脑的语言设置，以查看数字和货币格式的效果（参见图\
  \ 8-8 和图 8-9）。\n\n![A978-1-4842-0719-2_8_Fig9_HTML.jpg](img/A978-1-4842-0719-2_8_Fig9_HTML.jpg)\n\
  \n**图 8-9.** 法语区域设置的日期和货币格式化输出\n\n![A978-1-4842-0719-2_8_Fig8_HTML.jpg](img/A978-1-4842-0719-2_8_Fig8_HTML.jpg)\n\
  \n**图 8-8.** 英语区域设置的日期和货币格式化输出\n\n## 8.3 本地化 WinJS 控件\n\n### 问题\n\n当更改区域设置或语言时，WinJS\
  \ 控件不显示本地化字符串。\n\n### 解决方案\n\n通常，控件的属性（如 `label` 或 `title`）是在标记中设置的。这有点像对字符串值进行硬编码。因此，当更改区域设置或语言时，控件不会自适应，而是原样显示硬编码的字符串。通过使用资源文件，可以将\
  \ WinJS 控件属性绑定到本地化字符串。WinJS 提供了灵活性，可以直接将控件属性绑定到资源文件中的资源键。\n\n### 工作原理\n\n以下步骤说明如何本地化\
  \ WinJS 控件：\n\n打开 Visual Studio 2015。选择 **文件** ➤ **新建项目** ➤ **JavaScript** ➤ **Windows**\
  \ ➤ **空白应用(通用 Windows)**。这将创建一个通用应用，它是一个可以在 Windows 10 驱动设备上运行的单一项目。\n\n向项目添加资源文件（有关如何添加资源文件，请参阅配方\
  \ 8.1）。\n\n添加以下字符串键：\n\n```\n{\n    \"ShowMoreTilesTitle\"            : \"显示更多磁贴\"\
  ,\n    \"_ShowMoreTilesTitle.comment\"   : \"显示更多磁贴切换标题\",\n    \"VibrateOnCallTitle\"\
  \            : \"来电时振动\",\n    \"_VibrateOnCallTitle.comment\"   : \"来电时振动切换标题\"\
  ,\n    \"ShowArtistTitle\"            : \"播放音乐时显示艺术家\",\n    \"_ShowArtistTitle.comment\"\
  \   : \"播放音乐时显示艺术家切换标题\",\n    \"ToggleOn\"              : \"是\",\n    \"_ToggleOn.comment\"\
  \     : \"显示更多磁贴开启标签\",\n    \"ToggleOff\"             : \"否\",\n    \"_ToggleOff.comment\"\
  \    : \"显示更多磁贴关闭标签\"\n}\n```\n\n类似地，我还为其他语言添加了字符串。\n\n将以下代码添加到 `default.js` 的 `onactivated`\
  \ 方法中：\n\n```\nWinJS.UI.processAll().then(function(){\n    WinJS.Resources.processAll();\n\
  });\n```\n\n你需要调用 `WinJS.Resource` 类上的 `processAll()`，因为你将在标记中引用资源字符串。\n\n将以下标记添加到\
  \ `default.html` 文件的 body 元素内：\n\n```\n<div>\n    <h1>控件本地化</h1>\n    <br />\n \
  \   <div class=\"toggle\" data-win-control=\"WinJS.UI.ToggleSwitch\"\n        data-win-res=\"\
  {winControl: {labelOn:'ToggleOn',\n                                    labelOff:'ToggleOff',\n\
  \                                    title:'ShowMoreTilesTitle'}}\"\n        data-win-options=\"\
  \">\n    </div>\n    <br />\n    <div class=\"toggle\" data-win-control=\"WinJS.UI.ToggleSwitch\"\
  \n        data-win-res=\"{winControl: {labelOn:'ToggleOn',\n                   \
  \                 labelOff:'ToggleOff',\n                                    title:'VibrateOnCallTitle'}}\"\
  \n        data-win-options=\"\">\n    </div>\n    <br />\n    <div class=\"toggle\"\
  \ data-win-control=\"WinJS.UI.ToggleSwitch\"\n        data-win-res=\"{winControl:\
  \ {labelOn:'ToggleOn',\n                                    labelOff:'ToggleOff',\n\
  \                                    title:'ShowArtistTitle'}}\"\n        data-win-options=\"\
  \">\n    </div>\n</div>\n```\n\n注意，你使用了 `data-win-res` 并通过键名引用资源字符串，并将其分配给控件的属性。通常，其模式如下：\n\
  \n```\ndata-win-res=\"{winControl: {propertyName1:'resourceID1',\n             \
  \               propertyName2:'resourceID2'}}\"\n```\n\n按 F5 并运行应用。最初，你会看到控件使用的英文字符串。更改设备的语言，然后再次运行应用。现在它将选取适当的资源文件并使用适当的资源字符串（参见图\
  \ 8-9 和图 8-10）。\n\n![A978-1-4842-0719-2_8_Fig11_HTML.jpg](img/A978-1-4842-0719-2_8_Fig11_HTML.jpg)\n\
  \n**图 8-11.** 英语区域设置的格式化输出\n\n![A978-1-4842-0719-2_8_Fig10_HTML.jpg](img/A978-1-4842-0719-2_8_Fig10_HTML.jpg)\n\
  \n**图 8-10.** 法语区域设置的格式化输出\n\n\n\n"
- "# 第 9 章：数据存储与应用数据\n\n本章概述了在 Windows 10 应用中存储应用数据的技术。你将学习应用设置、如何将应用设置作为应用数据进行存储和检索，以及如何使用应用数据文件夹。\n\
  \n那么什么是应用数据呢？简单来说，特定于某个应用的数据被称为应用数据。通常，应用数据包括用户偏好、应用配置、应用状态等可变信息。\n\n当你在设备上安装应用时，该应用会创建应用数据。但如果你从设备上移除或卸载该应用会发生什么呢？当应用被卸载时，其应用数据也会从设备上被删除。因此，建议不要将用户数据（如用户照片）存储为应用数据。\n\
  \n你的应用创建的另一种数据类型是用户数据。用户数据是由用户创建的，例如文档、图片、视频文件、音频文件等。\n\n## 9.1 如何创建和删除本地应用数据设置容器\n\
  \n### 问题\n\n你需要在 Windows 10 应用的本地应用数据存储中创建和删除一个容器。\n\n### 解决方案\n\n使用`Windows.Storage.ApplicationData.current.LocalSettings.createContainer`在本地应用数据存储中创建本地应用设置容器。\n\
  \n### 工作原理\n\n容器可以让你组织应用数据设置；例如，你可以创建一个名为`Greeting_Data_Container`的容器来存储应用的所有问候语。再创建另一个名为`UserPreference_Container`的容器来存储应用用户的所有偏好设置。你可以将容器添加到本地设置和漫游设置中。一个容器内部还可以包含另一个容器。通用\
  \ Windows 应用允许你创建最多 32 层嵌套的容器。\n\n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。这将创建一个可以在运行\
  \ Windows 10 的 PC、平板电脑和 Windows Phone 上运行的 Windows 通用应用。在 Visual Studio 解决方案资源管理器中打开项目中的`default.html`页面。在`default.html`的`<body>`标签内定义一个按钮的\
  \ HTML 标签。\n\n```html\n<div id=\"titleBarContent\" style=\"width: 100%;height:30px;\
  \ background:border-box darkblue; overflow: hidden; z-index: 3\">\n    <i>应用设置管理界面</i>\n\
  </div>\n<span>点击按钮创建本地应用数据设置容器</span>\n<input type=\"button\" value=\"本地数据演示\" id=\"\
  btnLocalData\" />\n<h3><span id=\"msgspan\"></span></h3>\n```\n\n完整的`default.html`代码如下所示：\n\
  \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n   \
  \ <title>示例 9.1</title>\n    <!-- WinJS 引用 -->\n    <link href=\"WinJS/css/ui-dark.css\"\
  \ rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script\
  \ src=\"WinJS/js/ui.js\"></script>\n    <!-- 示例 9.1 引用 -->\n    <link href=\"/css/default.css\"\
  \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n</head>\n\
  <body class=\"win-type-body\">\n    <div id=\"titleBarContent\" style=\"width: 100%;height:30px;\
  \ background:border-box darkblue; overflow: hidden; z-index: 3\">\n        <i>应用设置管理界面</i>\n\
  \    </div>\n    <span>点击按钮创建本地应用数据设置容器</span>\n    <input type=\"button\" value=\"\
  本地数据演示\" id=\"btnCreateContainer\" />\n    <h3><span id=\"msgspan\"></span></h3>\n\
