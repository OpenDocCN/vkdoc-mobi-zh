  \ 中检索 `roamingSettings` 并将其存储在 `roamingSettings` 变量中。\n\n接着，它调用 `roamingSettings.containers.hasKey`\
  \ 函数来检查容器是否存在。如果不存在，则使用 `createContainer` 方法创建一个设置容器。前面的示例创建了一个名为 `App_GreetingDataRoamingContainer`\
