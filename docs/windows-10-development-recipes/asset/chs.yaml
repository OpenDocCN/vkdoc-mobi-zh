  \      if (roamingSettings.containers.hasKey(\"UserPreference_RoamingProfile\"))\
  \ {\n            var roamingSettingscontainer = roamingSettings.createContainer(\"\
  UserPreference_RoamingProfile\", Windows.Storage.ApplicationDataCreateDisposition.Always);\n\
  \            var toggleMobileDataButton = document.getElementById(\"UserMobileData\"\
  ).winControl;\n\n            if (toggleMobileDataButton.checked) {\n           \
  \     roamingSettingscontainer.values[\"UseMobileData\"] = \"Yes\";\n          \
  \  } else {\n                roamingSettingscontainer.values[\"UseMobileData\"]\
  \ = \"No\";\n            }\n\n            var toggleLocationDataButton = document.getElementById(\"\
  LocationServices\").winControl;\n\n            if (toggleLocationDataButton.checked)\
  \ {\n                roamingSettingscontainer.values[\"LocationServices\"] = \"\
  Yes\";\n            } else {\n                roamingSettingscontainer.values[\"\
  LocationServices\"] = \"No\";\n            }\n\n            document.getElementById(\"\
  msg\").innerText = \"数据已保存！！\";\n        }\n    }//end of function btnCreateRoamingContainerClick\n\
  })();\n```\n\n就是这样了。漫游数据将在用户访问此 Windows 10 应用的所有设备上可用。\n\n当你在 Windows 10 仿真器或 Windows\
  \ Mobile 上运行该应用程序时，它将如图 9-4 所示。\n\n![A978-1-4842-0719-2_9_Fig4_HTML.jpg](img/A978-1-4842-0719-2_9_Fig4_HTML.jpg)\n\
  \n**图 9-4.** 使用漫游应用数据设置保存用户偏好设置的表单\n\n## 9.6 如何注册数据更改事件\n\n### 问题\n\n您需要注册并实现一个数据更改事件处理程序。\n\
  \n### 解决方案\n\n您可以使用 `ApplicationData.DataChanged` 事件为漫游数据注册数据更改事件。\n\n\n\n### 工作原理\n\
  \n当设备上的漫游数据发生更改时，通用 Windows 应用会将这些漫游数据复制到云端，然后同步到用户安装了该应用的其他设备。假设同步后，您需要确保基于漫游数据的应用数据得到更新。例如，您将用户首选项存储在漫游数据中，当用户首选项发生更改时，您希望根据新首选项更新用户设备上的设置。通用\
  \ Windows 应用允许您注册一个事件，该事件将在应用数据完成从云端同步后执行。\n\n您可以使用 `ApplicationData.DataChanged`\
  \ 事件来注册事件。接下来，让我们实现这个功能。\n\n使用 Microsoft Visual Studio 2015 中的 Windows 通用（空白应用）模板创建一个新项目。这将创建一个可在运行\
  \ Windows 10 的 Windows 平板电脑和 Windows Phone 上运行的 Windows 通用应用。\n在 Visual Studio 解决方案资源管理器中打开项目中的\
  \ `default.html` 页面。\n为应用标题栏定义一个 HTML `div` 标签。\n\n```html\n<body class=\"win-type-body\"\
  >\n\n    <div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
  \ darkblue; overflow: hidden; z-index: 3\">\n\n        <i>自定义标题栏</i>\n\n    </div>\n\
  \n</body>\n```\n\n完整的 `default.html` 代码如下所示：\n\n```html\n<!DOCTYPE html>\n<html>\n\
  <head>\n    <meta charset=\"utf-8\" />\n    <title>_9.7</title>\n    <!-- WinJS\
  \ 引用 -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\" />\n    <script\
  \ src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n\
  \    <!-- _9.7 引用 -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\" />\n\
  \    <script src=\"/js/default.js\"></script>\n    <script src=\"/js/DatastorageDemo.js\"\
  ></script>\n</head>\n<body class=\"win-type-body\">\n    <div id=\"titleBarContent\"\
  \ style=\"width: 100%;height:30px; background:border-box darkblue; overflow: hidden;\
  \ z-index: 3\">\n        <i>自定义标题栏</i>\n    </div>\n</body>\n</html>\n```\n\n右键单击解决方案资源管理器中的项目，然后选择“添加”\
  \ ➤ “新建 JavaScript 文件”。为文件提供一个名称。在此示例中，我们将文件命名为 `DatastorageDemo.js`。\n\n在 `js`\
  \ 文件中添加以下代码。该代码首先使用 `applicationData` 对象注册一个数据更改事件。\n\n```javascript\n(function\
  \ () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
  \ () {\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\",\
  \ GetControl);\n    var applicationData = Windows.Storage.ApplicationData.current;\n\
  \    applicationData.addEventListener(\"datachanged\", datachangeHandler);\n   \
  \ function datachangeHandler(eventArgs) {\n        var applicationData = Windows.Storage.ApplicationData.current;\n\
  \        var roamingSettings = applicationData.roamingSettings;\n        // 创建一个漫游设置容器\n\
  \        var roamingSettingscontainer = roamingSettings.containers (\"App_GreetingDataContainer\"\
  );\n        // 重新读取数据\n        document.getElementById(\"titleBarContent\").innerText\
  \ = roamingSettingscontainer.values[\"App_Heading_English\"];\n    }\n})();\n```\n\
  \n这段代码还在同一个 `js` 文件中定义了数据更改事件处理程序。`datachangeHandler` 事件通过使用 `loopup` 函数从 `applicationData`\
  \ 对象中检索漫游容器。然后，它读取名为 `App_Heading_English` 的漫游设置，并将其分配给标题栏的 `div` 标签。\n\n## 9.7\
  \ 如何创建、写入和读取本地文件\n\n### 问题\n\n您需要在 Windows 10 应用的应用数据存储中创建文件、写入文件以及从文件中读取数据。\n\n\
  ### 解决方案\n\n使用 `Windows.Storage.StorageFile` 类进行文件处理。\n\n### 工作原理\n\n`Windows.Storage.StorageFile`\
  \ 类为通用 Windows 应用中的文件处理提供了必要的方法。您创建的文件可以存储在文件夹、库（图片库）中，并且通用 Windows 应用支持网络位置，例如\
  \ OneDrive 等。\n\n#### 本地文件夹\n\n如您所知，通用 Windows 应用可以在多种设备上运行：Windows Mobile、运行 Windows\
  \ 10 的 PC、Microsoft Surface 平板电脑等。因此，当您在 Windows 商店中部署应用时，您的应用用户可以在一个或多个设备上下载并运行该应用。那么，如何管理特定设备上特定于应用的设置呢？您可以使用本地文件夹来实现。本地文件夹可用于在特定设备上存储本地应用数据。本地文件夹数据仅在其存储的设备上可用，无法与其他设备同步。通用\
  \ Windows 应用将应用数据存储在应用包的 `LocalState` 中。\n\n#### 漫游文件夹\n\n现在，假设您希望存储应用的用户首选项，并确保同一用户首选项在特定用户的所有设备上均可用。您可以使用漫游文件夹来实现这一点。漫游文件夹将应用数据存储在应用包的\
  \ `RoamingState` 中。当应用用户在多个设备上运行应用时，存储在漫游文件夹中的应用数据会在设备之间同步。\n\n\n\n#### 临时文件夹\n\n\
  第三种位置类型是临时文件夹，它允许您短期存储应用数据。存储在临时文件夹中的应用数据在数据不再使用时会被删除。因此，请始终使用此文件夹存储不太重要的数据。通用 Windows\
  \ 应用在应用包的 `TemporaryState` 中存储应用数据。\n\n`StorageFolder` 类提供了许多用于创建文件、读取文件内容以及向文件中写入内容的方法。我们来逐一了解这些方法。\n\
  \n`createFileAsync` 方法在指定位置创建一个新文件。如果文件已存在，则会覆盖该文件。\n\n该函数的使用语法如下：\n\n```\nstorageFolder.createFileAsync(desiredName).done(function\
  \ CreationSuccess(newFileObj))\n{\n    /* 成功回调函数 */\n}, CreationFailed(error))\n\
  {\n    /* 失败回调函数 */\n});\n```\n\n如您所见，`createFileAsync` 方法必须使用成功回调函数和失败回调函数来定义。\n\
  \n在本地文件夹中创建文件的完整代码如下：\n\n```\nfunction btnDataToFileClick(mouseEvent) {\n    var\
  \ ApplicationData = Windows.Storage.ApplicationData.current;\n    var localFolder\
  \ = ApplicationData.localFolder;\n    var newFilePromise = localFolder.createFileAsync(\"\
  MyFile.txt\");\n    newFilePromise.done(\n        function (file) {\n          \
  \  // WinJS.log(\"The file MyFile.txt was created.\", \"sample\", \"status\");\n\
  \            WinJS.log && WinJS.log(\"The file MyFile.txt was created.\", \"sample\"\
  , \"status\");\n        },\n        function (error) {\n        });\n}\n```\n\n\
  当您在 Windows 10 本地设备上运行此应用时，会在本地文件夹中创建一个名为 `MyFile.txt` 的文件，如图 9-5 所示。\n\n![A978-1-4842-0719-2_9_Fig5_HTML.jpg](img/A978-1-4842-0719-2_9_Fig5_HTML.jpg)\n\
  \n图 9-5.\n\n在本地文件夹中创建的文件\n\n本地文件夹的位置是 `C:\\Users\\<<UserName>>\\AppData\\Local\\\
  Packages\\5342d954-ee4c-413c-8ed8-41b3befa6afc_khbmmdtkmdajr\\LocalState`。该文件是空的，因为我们尚未向其中写入内容。\n\
  \n很好。现在我们编写代码来向文件中写入内容。为此，我们首先在 `default.html` 文件中添加一个文本区域框。`default.html` 文件的 body\
  \ 标签如下所示：\n\n```\n<body class=\"win-type-body\" style=\"background-color:goldenrod\"\
  >\n    <div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
  \ darkblue; overflow: hidden; z-index: 3\">\n        <i>文件处理演示</i>\n    </div>\n\
  \    <br />\n       <input type=\"button\" value=\"保存数据到文件\" id=\"btnCreateAFile\"\
  \ />\n    <textarea rows=\"10\" cols=\"100\" id=\"textarea\" class=\"win-textarea\"\
  ></textarea>\n    <input type=\"button\" value=\"保存数据到文件\" id=\"btnDataToFile\"\
  \ />\n</body>\n```\n\n此代码向 `default.html` 文件添加了一个文本区域，以及名为 `btnDataToFile` 和 `btnCreateaFile`\
  \ 的按钮。\n\n在解决方案资源管理器中右键点击项目的 js 文件，然后选择添加 ➤ 新建 JavaScript 文件。为文件提供一个名称。在本示例中，我们将文件命名为\
  \ `DatastorageDemo.js`。\n\n```\n(function () {\n    \"use strict\";\n    function\
  \ GetControl() {\n        WinJS.UI.processAll().done(function () {\n           \
  \ var submitbutton = document.getElementById(\"btnCreateAFile\");\n            submitbutton.addEventListener(\"\
  click\", btnCreateAFileClick, false);\n            var submitbutton = document.getElementById(\"\
  btnDataToFile\");\n            submitbutton.addEventListener(\"click\", btnDataToFileClick,\
  \ false);\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
  , GetControl);\n})();\n```\n\n此代码为两个按钮控件都添加了事件接收器。现在在 `DatastorageDemo.js` 文件中添加事件代码。\n\
  \n```\nfunction btnCreateAFileClick(mouseEvent) {\n    var ApplicationData = Windows.Storage.ApplicationData.current;\n\
  \    var LocalFolder = ApplicationData.localFolder;\n    var newFilePromise = LocalFolder.createFileAsync(\"\
  MyFile.txt\");\n    newFilePromise.done(\n        function (file) {\n          \
  \  // WinJS.log(\"The file MyFile.txt was created.\", \"sample\", \"status\");\n\
  \            WinJS.log && WinJS.log(\"The file MyFile.txt was created.\", \"sample\"\
  , \"status\");\n        },\n        function (error) {\n        });\n    }\n```\n\
  \n此代码用于在本地文件夹上创建一个新文件。您不会在 `DataStorageDemo.js` 文件中为 `btnDataToFile` 的点击事件添加另一个事件。\n\
  \n```\nfunction btnDataToFileClick(mouseEvent) {\n    var ApplicationData = Windows.Storage.ApplicationData.current;\n\
  \    var LocalFolder = ApplicationData.localFolder;\n    // 打开示例文件。\n    var FilePromise\
  \ = LocalFolder.getFileAsync(\"MyFile.txt\");\n    FilePromise.then(function (file)\
  \ {\n        // 如果找到文件 …\n        if (file) {\n            // 写入文件。\n          \
  \  var txtarea = document.getElementById(\"textarea\").innerText;\n            Windows.Storage.FileIO.writeTextAsync(file,\
  \ txtarea).then(function (contents) {\n                WinJS.log && WinJS.log(\"\
  The text was wrttien to file MyFile.txt.\", \"sample\", \"status\");\n         \
  \   });\n        }\n    }, function (error) {\n        // 处理错误。\n    });\n}\n```\n\
  \n此代码使用本地文件夹的 `getFileAsync` 方法获取文件。如果文件存在，则接下来使用 `Windows.Storage.FileIO.writeTextAsync.writeTextAsync`\
  \ 方法向文件中写入内容。\n\n当您在 Visual Studio 中使用本地设备运行此应用时，您会看到默认屏幕，如图 9-6 所示。\n\n![A978-1-4842-0719-2_9_Fig6_HTML.jpg](img/A978-1-4842-0719-2_9_Fig6_HTML.jpg)\n\
  \n图 9-6.\n\n文件处理演示的默认屏幕\n\n“创建文件”按钮会在运行应用的设备的本地文件夹中创建一个文件。文件创建后，在文本区域中键入一些文本。点击“保存数据到文件”会将数据保存到文件中。当您在记事本中打开该文件时，会看到文件的内容，如图\
  \ 9-7 所示。\n\n![A978-1-4842-0719-2_9_Fig7_HTML.jpg](img/A978-1-4842-0719-2_9_Fig7_HTML.jpg)\n\
  \n图 9-7.\n\n本地文件夹中包含内容的文件\n\n类似地，您可以使用 `readTextAsync` 方法来读取文件内容。从文件中读取内容的代码如下：\n\
  \n```\n// 从文件中读取。\n    Windows.Storage.FileIO.readTextAsync(file).then(function\
  \ (contents) {\n            document.getElementById(\"textarea1\").innerText = contents;\n\
  \      });\n```\n\n您可以通过引用正确的位置（例如本地文件夹、漫游文件夹等）以类似方式在任何位置创建文件。\n\n"
- '# 第十章：共享数据


  本章涵盖如何在通用 Windows 平台应用之间共享数据。共享数据使开发人员能够构建功能，允许用户在应用之间分享信息、复制/粘贴以及拖放。例如，用户可能希望从一个应用复制一些文本或图像，然后粘贴到另一个应用中。用户也寻求在社交网站之间分享信息/链接。


  Windows 10 应用以两种不同的方式支持数据共享。


  *   源应用允许用户将数据从该应用共享到其他应用。

  *   目标应用允许用户将一个应用声明为目标应用，该应用可以检索来自其他应用的共享数据。被声明为目标应用的应用允许用户在共享数据时将其选择为目标应用。


  通过使用共享数据选项，用户可以与其他应用共享纯文本、网页链接、照片和视频。在本章中，您将学习如何实现从源应用共享数据以及声明目标应用。




  '
- "# 共享合约\n\n为了实现数据共享或接收数据，每个应用都需要作为源应用或目标应用来实现一份共享合约。数据共享涉及以下三个组件：\n\n- **源应用**：源应用作为数据共享方实现共享合约。该应用注册数据传输管理器，并填充需要共享的数据包。\n\
  - **共享代理**：共享代理是 `Share` 魅力组件，负责实现源应用与目标应用之间的通信。\n- **目标应用**：目标应用作为数据接收方实现共享合约，用于接收其他应用共享的数据。\n\
  \n## 10.1 为源应用的共享选项设置事件处理程序\n\n### 问题\n\n你需要为源应用的共享选项设置一个事件处理程序。\n\n### 解决方案\n\n\
  你需要使用 `Windows.ApplicationModel.DataTransfer.DataTransferManager` 的 `datarequested`\
  \ 事件监听器。\n\n### 工作原理\n\n当用户触发共享操作时，`Windows.ApplicationModel.DataTransfer.DataTransferManager`\
  \ 类的 `datarequested` 事件监听器方法会被触发。该事件可以由用户的操作触发，也可以在特定场景下自动触发；例如，当用户完成一项调查，并且应用想要共享调查结果时。\n\
  \n要使用 `DataTransferManager` 对象注册事件处理程序，你可以使用以下代码：\n\n```\nvar dataTransferManager\
  \ = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
  dataTransferManager.addEventListener(\"datarequested\", dataRequested_Share);\n\
  ```\n\n在上述代码中，首先通过 `DataTransferManager.getForCurrentView()` 函数获取当前页面的 `DataTransferManager`\
  \ 对象。\n\n接下来，第二行代码为 `DataTransferManager` 对象的 `datarequested` 事件添加了一个事件监听器。在上述代码中，`dataRequested_Share`\
  \ 是监听器，`datarequested` 是事件。然后你可以像下面的代码所示定义接收器：\n\n```\nfunction dataRequested_Share\
  \ () {\n   // 用于共享数据的代码\n}\n```\n\n让我们使用上述代码创建一个通用 Windows 应用，为源应用的共享选项设置事件处理程序。\n\
  \n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。\n\n在解决方案资源管理器中右键单击项目的\
  \ `js` 文件夹，选择添加 ➤ 新建 JavaScript 文件。为文件命名。在此示例中，我们将文件命名为 `DataSharingDemo.js`。\n\n\
  ```\n(function () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
  \ () {\n            var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
  \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
  \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
  })();\n\nfunction shareDataHandler(e) {\n    // 用于共享文本、图片等的代码\n}\n```\n\n上述代码通过\
  \ `DataTransferManager.getForCurrentView()` 函数获取当前页面的 `DataTransferManager` 对象，然后为其添加一个事件监听器，如前所述。\n\
  \n现在，将 `DataSharingDemo.js` 的引用添加到 `default.html` 中，如下所示：\n\n```\n<!DOCTYPE html>\n\
  <html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>_10.1</title>\n    <!--\
  \ WinJS 引用 -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\" />\n\
  \    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
  ></script>\n    <!-- _10.1 引用 -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\"\
  \ />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"/js/DataSharingDemo.js\"\
  ></script>\n</head>\n<body class=\"win-type-body\">\n    <p>内容放在此处</p>\n</body>\n\
  </html>\n```\n\n## 10.2 将纯文本数据共享到其他应用\n\n### 问题\n\n你需要开发一个功能，允许用户将纯文本数据共享到其他 Windows\
  \ 10 应用。\n\n### 解决方案\n\n使用 `request.data.setText` 和 `request.Data.Properties.description`\
  \ 来共享数据。`request.data.title` 是必填字段。\n\n\n\n### 工作原理\n\n在之前的教程中，你了解到当用户使用“共享”超级按钮启动共享会话时，会触发\
  \ `datarequested` 事件监听器。因此，我们现在将在此监听器中编写代码来共享数据。该监听器接受一个参数，即事件参数。首先，你需要从事件参数中检索请求对象，如下所示：\n\
  \n```javascript\nfunction shareDataHandler(e) {\n    //开始编写共享数据的代码\n    var request\
  \ = e.request;\n}\n```\n\n你需要为请求对象设置属性。若要共享纯文本，你需要填充以下属性：\n\n```javascript\nrequest.Data.Properties.Title\
  \ = \"数据的标题\";\nrequest.Data.Properties.Description = \"数据的描述\";\n```\n\n太棒了，看起来很简单，不是吗？让我们实现此功能，并观看一个在应用之间共享数据的实时演示。\n\
  \n使用 Microsoft Visual Studio 2015 中的 Windows 通用（空白应用）模板创建一个新项目。\n\n首先，将以下代码添加到 `default.html`\
  \ 中。你需要用以下代码替换 body 标签：\n\n```html\n<body class=\"win-type-body\" style=\"background-color:white\"\
  >\n    <div>\n        <p style=\"color:black\">输入项目标题：</p>\n        <input class=\"\
  text-box\" id=\"txttitle\" value=\"项目标题\" size=\"40\"/>\n        <p style=\"color:black\"\
  >输入项目描述：</p>\n        <input class=\"text-box\" id=\"txtdesc\" value=\"项目描述\" size=\"\
  40\" />\n        <p style=\"color:black\">输入项目周报摘要：</p>\n        <textarea id=\"\
  txttext\" maxlength=\"1000\" style=\"width:50%\">周状态：这是本周状态</textarea>\n       \
  \ <br />\n        <br />\n    </div>\n</body>\n```\n\n此代码定义了共享数据演示的用户界面。该用户界面如图\
  \ 10-1 所示。\n\n![A978-1-4842-0719-2_10_Fig1_HTML.jpg](img/A978-1-4842-0719-2_10_Fig1_HTML.jpg)\n\
  \n**图 10-1.** 共享数据用户界面\n\n现在，在解决方案资源管理器中右键单击项目的 `js` 文件夹，然后选择**添加** > **新建 JavaScript\
