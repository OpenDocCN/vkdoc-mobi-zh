  \ SSML 语言中的文本，并将其传递给 `Windows.Media.SpeechSynthesis.SpeechSynthesizer()` 的对象，以将指定文本转换为音频。\n\
  \n\n\n## 15.5 如何为语音识别指定识别约束\n\n### 问题\n\n你需要创建一个支持语音识别的应用程序。\n\n### 解决方案\n\n使用 `Windows.Media.SpeechRecognition.SpeechRecognizer`\
  \ 对象创建语音识别器，并使用 `Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint`\
  \ 指定不同的语音识别约束。\n\n在 UWP 应用中可以使用三种语音约束：\n\n* `SpeechRecognitionTopicConstraint`：基于预定义语法，需要网络连接。\n\
  * `SpeechRecognitionListConstraint`：基于预定义的单词和短语列表。\n* `SpeechRecognitionGrammarFileConstraint`：添加语音识别语法规范（SRGS）文件，所有约束都在此\
  \ XML 文件中指定。\n\n本方案使用 `SpeechRecognitionListConstraint` 将语音转换为文本。\n\n### 工作原理\n\n\
  在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建新项目。在项目的 `package.appmanifest`\
  \ 文件中，单击“功能”选项卡，然后勾选“麦克风”和“Internet”复选框。这将允许应用使用音频输入。\n\n打开 `default.html` 文件并复制以下代码：\n\
  \n```html\n<body class=\"win-type-body\">\n    <div id=\"scenarioView\">\n     \
  \   <div>\n            <h2 id=\"sampleHeader\" class=\"win-type-subheader\">语音转文本</h2>\n\
  \            <div id=\"scenarioDescription\">\n                <p>使用基于自定义列表语法的语音识别。</p>\n\
  \            </div>\n        </div>\n        <div id=\"scenarioContent\">\n    \
  \        <div>\n                <button id=\"btnSpeak\" class=\"win-button\">说话</button>\n\
  \            </div>\n            <p id=\"errorTextArea\"></p>\n        </div>\n\
  \    </div>\n</body>\n```\n\n在解决方案资源管理器中右键单击项目，选择“添加” ➤ “新建 JavaScript 文件”。为文件命名。在此示例中，我们将其命名为\
  \ `Speechrecognisation.js`。\n\n将以下代码添加到 `Speechrecognisation.js` 文件中：\n\n```javascript\n\
  (function () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
  \ () {\n            var btnSpeak = document.getElementById(\"btnSpeak\");\n    \
  \        btnSpeak.addEventListener(\"click\", buttonSpeechRecognizerListConstraintClick,\
  \ false);\n            var resultTextArea = document.getElementById(resultTextArea);\n\
  \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
  ```\n\n上述代码为 `btnSpeak` 按钮添加了一个事件接收器。现在添加一个 `buttonSpeechRecognizerListConstraintClick`\
  \ 函数，当用户单击用户偏好表单控件上的“说话”按钮时触发该函数。\n\n```javascript\nfunction buttonSpeechRecognizerListConstraintClick()\
  \ {\n    // 创建 SpeechRecognizer 实例。\n    var speechRecognizer =\n      new Windows.Media.SpeechRecognition.SpeechRecognizer();\n\
  \    // 你可以动态创建此数组。\n    var responses = [\"Yes\", \"No\", \"Hello\", \"Hello World\"\
  ];\n    // 向识别器添加网络搜索语法。\n    var listConstraint =\n        new Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint(\n\
  \        responses,\n        \"YesOrNo\");\n    speechRecognizer.uiOptions.audiblePrompt\
  \ = \"说出你要搜索的内容...\";\n    speechRecognizer.uiOptions.exampleText = \"例如：'Yes',\
  \ 'No', 'Hello'\";\n    speechRecognizer.constraints.append(listConstraint);\n \
  \   var resultTextArea = document.getElementById(resultTextArea);\n    // 编译默认听写语法。\n\
  \    speechRecognizer.compileConstraintsAsync().done(\n      // 成功函数。\n      function\
  \ (result) {\n          // 开始识别。\n          speechRecognizer.recognizeWithUIAsync().done(\n\
  \            // 成功函数。\n            function (speechRecognitionResult) {\n      \
  \          // 对识别结果进行处理。\n                speechRecognizer.close();\n          \
  \  },\n            // 错误函数。\n            function (err) {\n                if (typeof\
  \ errorTextArea !== \"undefined\") {\n                    errorTextArea.innerText\
  \ = \"语音识别失败。\";\n                }\n                speechRecognizer.close();\n\
  \            });\n      },\n      // 错误函数。\n      function (err) {\n          if\
  \ (typeof errorTextArea !== \"undefined\") {\n              errorTextArea.innerText\
  \ = err;\n          }\n          speechRecognizer.close();\n      });\n}\n})();\n\
  ```\n\n上述代码声明了一个名为 `speechRecognizer` 的变量。它被赋值给 `Windows.Media.SpeechRecognition.SpeechRecognizer()`\
  \ 类，该类表示语音识别器对象的容器。下一行创建了 `responses` 静态数组变量，用于存储识别到的语音约束值。\n\n然后，它在类型为 `Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint()`\
  \ 的对象实例中被引用，该实例加载了 `responses` 数组中指定的所有值。\n\n以下是语音识别器的 UI 设置。将 `SpeechRecognitionListConstraint\
  \ listcontraint` 传递给 `speechRecognizer` 对象。\n\n接着，我们调用 `speechRecognizer.compileConstraintsAsync()`\
  \ 方法，以异步方式编译 `constraints` 属性指定的所有约束。该方法执行后提供 `SpeechRecognitionCompilationResult`\
  \ 类型的输出，该输出通过 `speechRecognitionResult` 成功函数捕获。我们还捕获错误并使用 `errorTextArea` 元素显示它们。\n\
  \n完成 `Speechrecognisation.js` 文件后，请确保在 `default.html` 中添加引用。\n\n```html\n<script\
  \ src=\"js/Speechrecognisation.js\"></script>\n```\n\n就这样。语音识别基于预定义的约束，并且可在应用中使用。它可用于捕获用户输入。\n\
  \n当你在 Windows Mobile 模拟器中运行该应用程序时，其外观如图 15-5 所示。单击“开始”并说出特定词语，例如“Yes”、“No”或“Hello”。语音识别器将对其进行验证。\n\
  \n![A978-1-4842-0719-2_15_Fig5_HTML.jpg](img/A978-1-4842-0719-2_15_Fig5_HTML.jpg)\n\
  \n**图 15-5.** 基于自定义词语列表的语音识别\n\n## 15.6 如何使用 Cortana 语音命令在前台启动应用\n\n### 问题\n\n你想要让用户能够使用\
  \ Cortana 语音命令在前台启动你的应用。\n\n### 解决方案\n\n使用语音命令定义（VCD）文件来定义包含激活应用命令的语音命令。当应用安装并执行时，VCD\
  \ 文件将安装到 Cortana 中。\n\n用户可以说出 VCD 文件中指定的命令来启动应用。Cortana 借助 Windows 语音平台和云托管的 Microsoft\
  \ 语音识别服务来识别用户语音命令。这两种服务都会尝试识别语音，Cortana 接收到文本后，会通过 `onactivated` 事件启动应用程序及其中的语音命令。\n\
  \n\n\n### 工作原理\n\n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。\n\
  \n在项目中添加一个新的语音命令定义文件 `CortanaVoiceCommands.xml`，并向文件中添加以下 XML 代码：\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"utf-8\" ?>\n<VoiceCommands xmlns=\"http://schemas.microsoft.com/voicecommands/1.2\"\
  >\n  <CommandSet xml:lang=\"en-gb\" Name=\"CortanaVoiceCommandSet\">\n    <AppName>Win10Recipes</AppName>\n\
  \    <Example> Show Win10 Recipes </Example>\n    <Command Name=\"showDevicesAvailableRecipes\"\
  >\n      <Example>Show</Example>\n      <ListenFor RequireAppName=\"BeforeOrAfterPhrase\"\
  >{command}</ListenFor>\n      <ListenFor RequireAppName=\"ExplicitlySpecified\"\
  >Listening to command </ListenFor>\n      <Feedback> Recipes available in App </Feedback>\n\
  \      <Navigate/>\n    </Command>\n    <PhraseList Label=\"command\">\n      <Item>Devices</Item>\n\
  \      <Item>Text to Speech</Item>\n    </PhraseList>\n  </CommandSet>\n</VoiceCommands>\n\
  ```\n\n在此语音命令定义文件中，有几个主要元素。`<CommandSet>` 元素定义了用于激活应用和执行命令的命令。`<CommandSet>` 元素还具有\
  \ `xml:Lang` 属性，用于指定命令语言。在本示例中，我们使用的是英式英语。\n\n`<CommandPrefix>` 是我们应用的唯一名称。它在语音命令中作为前缀或后缀，用于激活应用。`<Command>`\
  \ 元素用于指定用户可以说的命令内容。`<ListenFor>` 元素指定了 Cortana 应识别的文本。`<Feedback>` 元素指定了 Cortana\
  \ 在启动应用时所说的文本。`<Navigate>` 元素表示语音命令用于在前台启动应用。\n\n如果想通过语音命令在后台启动应用，请使用 `<VoiceCommandService>`。\n\
  \n创建 VCD 文件后，需要安装该文件指定的命令。为此，请使用 `installCommandDefinitionsFromStorageFileAsync`\
  \ 方法。\n\n从解决方案资源管理器中打开 `default.js`。在该文件中调用 `onactivated` 方法，并添加以下代码：\n\n```\n//加载\
  \ vcd\nvar storageFile = Windows.Storage.StorageFile;\nvar wap = Windows.ApplicationModel.Package;\n\
  var voiceCommandManager = Windows.ApplicationModel.VoiceCommands.VoiceCommandDefinitionManager;\n\
  \nwap.current.installedLocation.getFileAsync(\"CortanaVoiceCommands.xml\")\n  .then(function\
  \ (file) {\n    voiceCommandManager.installCommandDefinitionsFromStorageFileAsync(file);\n\
  \  });\n\nvar activationKind = args.detail.kind;\nvar activatedEventArgs = args.detail.detail;\n\
  ```\n\n在上面的代码中，我们通过 `Windows.ApplicationModel.Package.current.installedLocation.getFileAsync`\
  \ 方法获取对 VCD 文件的引用。然后调用 `installCommandDefinitionsFromStorageFileAsync` 方法来安装文件中指定的命令。现在，我们需要指定应用如何响应与\
  \ VCD 文件匹配的语音命令。为此，首先要检查 `IActivatedEventArgs.Kind` 是否为 `VoiceCommand`。在 `default.js`\
  \ 的标准代码之后替换以下代码，以检查激活参数类型：\n\n```\nif (args.detail.kind === activation.ActivationKind.launch)\
  \ {\n  if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
  \ {\n    // TODO: 此应用是刚刚启动的。请在此处初始化您的应用。\n  } else {\n    // TODO: 此应用之前被挂起，然后被终止。\n\
  \    // 为了创建流畅的用户体验，请在此处恢复应用状态，使其看起来从未停止运行。\n  }\n  args.setPromise(WinJS.UI.processAll());\n\
  }\nelse if (activationKind == Windows.ApplicationModel.Activation.ActivationKind.voiceCommand)\n\
  {\n  var speechRecognitionResult = activatedEventArgs[0].Result;\n  // 获取语音命令的名称和所说的文本\n\
  \  var voiceCommandName = speechRecognitionResult.RulePath[0];\n  switch(voiceCommandName)\n\
  \  {\n    case \"showDevicesAvailableRecipes\":\n      var textSpoken = speechRecognitionResult.semanticInterpretation.properties[0];\n\
  \      var url = \"Devices.html\";\n      nav.history.backStack.push({ location:\
  \ \"/Devices.html\" })\n      break;\n    default:\n      break;\n  }\n};\n\napp.oncheckpoint\
  \ = function (args) {\n  // TODO: 此应用即将被挂起。请在此处保存任何需要在挂起期间持久化的状态。\n  // 您可以使用 WinJS.Application.sessionState\
  \ 对象，该对象会在挂起期间自动保存和恢复。\n  // 如果在应用挂起前需要完成异步操作，请调用 args.setPromise()。\n};\n\napp.start();\n\
  ```\n\n前面的代码检查了 `Windows.ApplicationModel.Activation.ActivationKind` 的值，该值指定了激活的类型。检查\
  \ `ActivationKind` 是 `voiceCommand` 还是其他方式。如果应用是通过语音命令启动的，则需要将用户所说的内容获取到 `speechRecognitionResult`\
  \ 变量中；要获取该字符串，请使用 `activatedEventArgs`。\n\n`activatedEventArgs` 有一个名为 `Result` 的属性，它提供了\
  \ `SpeechRecognitionResult`。\n\n要获取用户所说的文本，请使用 `speechRecognitionResult.RulePath[0]`\
  \ 并将其存储在 `voiceCommandName` 局部变量中。\n\n使用这个文本 (`voiceCommandName`)，可以决定需要显示应用的哪个页面。为此，使用\
  \ switch case 匹配 `voiceCommandName` 的值与 VCD 文件中指定的命令名称。在 `CortanaVoiceCommands.xml`\
  \ 中，指定了命令名称 `showDevicesAvailableRecipes`。如果匹配成功，则在 `Devices.html` 中向用户显示应用页面。这样，应用就与\
  \ Cortana 集成了。当用户使用语音命令启动应用时，可以进一步增强功能，以启动应用内的各个页面。\n\n> **注意**  \n> 您无法使用 Visual\
  \ Studio Mobile 模拟器测试此方案，因为 Cortana 需要 Microsoft 帐户注册和登录过程，这在 Mobile 模拟器上无法工作。相反，您需要将应用安装到设备上，然后运行\
  \ Cortana 来测试应用在前台启动的情况。\n\n## 第 15 章：其他工具\n\nWindows SDK 和 Microsoft Visual Studio\
  \ 2015 提供了其他工具和功能，让开发人员能够轻松调试和测试其 Windows 应用。本章涵盖其中一些工具，例如 JavaScript 控制台窗口、DOM\
  \ 资源管理器、诊断工具、Windows 10 Mobile 模拟器其他工具。这些工具在测试应用在各种场景下的表现时，极大地方便了开发人员的工作。\n\n##\
  \ 16.1 JavaScript 控制台窗口\n\n### 问题\n\n在调试通用 Windows 平台应用时，您希望查看 JavaScript 错误或写入调试消息。\n\
  \n### 解决方案\n\n在 Visual Studio 2015 中使用 JavaScript 控制台窗口，在调试通用 Windows 平台应用时查看 JavaScript\
  \ 错误或写入调试消息。\n\n\n\n### 工作原理\n\n`Microsoft Visual Studio 2015` 提供了一个名为“`JavaScript\
  \ Console`”窗口的工具，允许开发者执行以下操作：\n\n-   显示和修改变量的值。\n-   运行可在当前上下文中执行的 JavaScript 代码。\n\
  -   查看 JavaScript 错误、异常和消息。\n-   将应用中的消息显示到控制台窗口。\n\n“`JavaScript Console`”窗口在应用运行时显示。或者，您可以从\
  \ `Visual Studio 菜单 调试 ➤ 窗口 ➤ JavaScript 控制台` 中打开“`JavaScript Console`”窗口，如图 16-1\
  \ 所示。\n\n![A978-1-4842-0719-2_16_Fig1_HTML.jpg](img/A978-1-4842-0719-2_16_Fig1_HTML.jpg)\n\
  \n图 16-1. 从 `Visual Studio 2015` 访问“`JavaScript Console`”\n\n要测试此功能，请使用 JavaScript\
  \ 模板从 `Visual Studio 2015` 创建一个新的通用 Windows 平台应用。\n\n生成解决方案，并使用“`本地计算机`”选项运行它。您应该会看到应用在桌面上运行。在应用仍在运行时切换到\
  \ `Visual Studio`。请注意，JavaScript 控制台列出了页面中所有可能的 JavaScript 错误，如图 16-2 所示。\n\n![A978-1-4842-0719-2_16_Fig2_HTML.jpg](img/A978-1-4842-0719-2_16_Fig2_HTML.jpg)\n\
  \n图 16-2. 显示警告和错误列表的“`JavaScript Console`”窗口\n\nJavaScript 控制台提供以下选项：\n\n-   查看错误消息\n\
  -   查看警告消息\n-   查看消息\n-   清除控制台的选项\n\n开发者还可以编写调试消息，这些消息可在应用从 `Visual Studio 2015`\
  \ 以调试模式运行时显示。这通过使用 `console.log` 方法实现。\n\n让我们从项目的 `js` 文件夹中打开 `default.js` 文件，并将以下代码添加到文件的第一行，紧跟在\
  \ `use strict` 选项下方。\n\n```\nconsole.log(\"This is a custom log message\");\n```\n\
  \n当您运行应用并查看“`JavaScript Console`”窗口时，您会看到其中的消息，如图 16-3 所示。\n\n![A978-1-4842-0719-2_16_Fig3_HTML.jpg](img/A978-1-4842-0719-2_16_Fig3_HTML.jpg)\n\
  \n图 16-3. 显示日志消息的“`JavaScript Console`”窗口\n\n表 16-1 列出了一些用于操作控制台窗口中消息的常用命令。\n\n\
  表 16-1. “`JavaScript Console`”窗口命令\n\n| 命令名称 | 描述 |\n| --- | --- |\n| `assert(expression,\
  \ message)` | 如果 `expression` 求值为 `false`，则发送一条消息。 |\n| `clear()` | 清除控制台窗口中的消息。\
  \ |\n| `debug(message)` | 向控制台窗口发送一条消息；与 `console.log` 相同。 |\n| `error(message)`\
  \ | 向控制台窗口发送一条错误消息。消息文本为红色，并包含一个错误符号。 |\n| `info(message)` | 向控制台窗口发送一条消息；消息前会带有信息符号。\
  \ |\n| `log(message)` | 向控制台窗口发送一条消息。 |\n\n## 16.2 DOM 资源管理器\n\n### 问题\n\n您需要检查应用\
  \ HTML 元素的属性，并调试和修改 HTML 及 CSS 样式元素属性。\n\n### 解决方案\n\n使用 `Visual Studio 2015` 中的“`DOM\
  \ 资源管理器`”来检查和修改 HTML 和 CSS 元素的值以进行调试。\n\n### 工作原理\n\nWeb 开发者和 Internet Explorer\
  \ 用户应该熟悉“`DOM 资源管理器`”，它是一个流行的调试工具。`Microsoft Edge` 和 `Internet Explorer` 中的 `F12\
  \ 开发者工具` 也提供了此选项。\n\n由于 UWP 应用支持使用 Web 技术进行开发，UWP 应用以及使用适用于 Apache Cordova 的 `Visual\
  \ Studio` 工具创建的应用都支持“`DOM 资源管理器`”。\n\n开发者可以在 Windows 中使用 `Visual Studio 菜单 调试 ➤\
  \ 窗口 ➤ DOM 资源管理器` 访问“`DOM 资源管理器`”，如图 16-4 所示。\n\n![A978-1-4842-0719-2_16_Fig4_HTML.jpg](img/A978-1-4842-0719-2_16_Fig4_HTML.jpg)\n\
  \n图 16-4. 从 `Visual Studio 2015` 访问“`DOM 资源管理器`”\n\n您可以使用 `Visual Studio` 中的“`DOM\
  \ 资源管理器`”执行以下操作：\n\n-   检查实时 DOM\n-   选择元素\n-   调试 CSS 样式\n-   调试布局\n-   查看 DOM\
  \ 事件监听器\n-   调试 `WebView` 控件\n\n打开一个使用 JavaScript 开发的现有 UWP 应用，并使用“`本地计算机`”选项运行它。\n\
  \n切换到 `Visual Studio` 并选择“`DOM 资源管理器`”选项卡。您可以在应用运行时使用 `F4` 快捷键在 `F12` 开发者工具中显示“`DOM\
  \ 资源管理器`”，如图 16-5 所示。\n\n![A978-1-4842-0719-2_16_Fig5_HTML.jpg](img/A978-1-4842-0719-2_16_Fig5_HTML.jpg)\n\
  \n图 16-5. “`DOM 资源管理器`”\n\n在“`DOM 资源管理器`”窗口中，选择 `body` 标签下的段落元素。双击文本以修改消息。您应该会看到文本在\
  \ UWP 应用上也实时更新。\n\n“`DOM 资源管理器`”中的“`样式`”选项卡允许开发者修改样式元素的值，并查看其在应用页面上的渲染效果。\n\n“`计算`”选项卡显示所选\
  \ DOM 元素每个属性的最终值（见图 16-6）。\n\n![A978-1-4842-0719-2_16_Fig6_HTML.jpg](img/A978-1-4842-0719-2_16_Fig6_HTML.jpg)\n\
  \n图 16-6. “`DOM 资源管理器`”中的“`计算`”选项卡\n\n“`布局`”选项卡显示元素的盒模型，并展示应用的布局外观，其中考虑了偏移和边距（见图\
  \ 16-7）。\n\n![A978-1-4842-0719-2_16_Fig7_HTML.jpg](img/A978-1-4842-0719-2_16_Fig7_HTML.jpg)\n\
  \n图 16-7. “`DOM 资源管理器`”中的“`布局`”选项卡\n\n您还可以在调试时刷新应用。为此，请按照以下步骤操作。\n\n![A978-1-4842-0719-2_16_Fig8_HTML.jpg](img/A978-1-4842-0719-2_16_Fig8_HTML.jpg)\n\
  \n图 16-8. `Visual Studio` 中的“刷新 Windows 应用”按钮\n\n当应用在模拟器中运行时，在 `Visual Studio` 中打开\
  \ `default.html` 文件并修改源代码。\n\n单击“`调试`”工具栏中的“`刷新 Windows 应用`”按钮，或按下 `F4` 快捷键（见图 16-8）。\n\
  \n应用页面将重新加载，并显示在模拟器上看到的新更改。\n\n## 16.3 诊断工具\n\n### 问题\n\n您想要分析 Windows 应用的性能，以识别潜在的瓶颈。您想要分析\
  \ CPU 使用率、UI 响应能力等。\n\n### 解决方案\n\n使用 `Visual Studio 2015` 中的“`诊断工具`”来执行和分析各种因素，例如\
  \ CPU 使用率、GPU 使用率、HTML UI 响应能力、JavaScript 内存和网络。\n\n\n\n### 工作原理\n\nVisual Studio\
  \ 分析器或诊断工具可帮助您查找 Windows 应用中的性能瓶颈。它们会显示应用中代码耗时最多的地方。\n\n您可以通过导航到 `Debug`（调试）菜单并选择\
  \ `Start Diagnostic Tools Without Debugging`（启动诊断工具而不进行调试）来启动 Visual Studio 2015\
  \ 诊断工具，如图 16-9 所示。\n\n![A978-1-4842-0719-2_16_Fig9_HTML.jpg](img/A978-1-4842-0719-2_16_Fig9_HTML.jpg)\n\
  \n图 16-9. 在 Visual Studio 2015 中启动诊断工具\n\nVisual Studio 诊断工具（见图 16-10）为开发者提供了以下用于测试其应用的选项：\n\
  \n![A978-1-4842-0719-2_16_Fig10_HTML.jpg](img/A978-1-4842-0719-2_16_Fig10_HTML.jpg)\n\
  \n图 16-10. 包含不同选项的诊断工具\n\n*   CPU 使用率\n*   GPU 使用情况\n*   HTML UI 响应能力\n*   JavaScript\
  \ 内存\n*   网络\n\n默认情况下，目标是当前项目。可以通过单击 `Change Target`（更改目标）按钮并从提供的列表中选择选项，将其更改为正在运行的应用或已安装的应用等。\n\
  \n您可以在 `Diagnostic`（诊断）对话框的 `Available Tools`（可用工具）部分中选择要分析的工具。\n\n选择好工具后，单击 `Start`（启动）按钮。这将启动应用，Visual\
  \ Studio 会自动启动诊断工具并收集数据以进行分析。\n\n一旦工具完成数据收集，便会显示结果，如图 16-11 所示。\n\n![A978-1-4842-0719-2_16_Fig11_HTML.jpg](img/A978-1-4842-0719-2_16_Fig11_HTML.jpg)\n\
  \n图 16-11. Visual Studio 2015 中诊断工具的结果\n\n了解应用如何使用 CPU 是分析和识别应用中性能问题的一个良好起点。`CPU\
  \ usage`（CPU 使用率）工具会显示 CPU 在何处花费时间执行您的 JavaScript 代码。\n\n在分析 `CPU Usage`（CPU 使用率）报告时，开发者可以检查\
  \ CPU 利用率时间线图表并选择时间线段来查看详细信息。CPU 利用率时间线图表显示设备所有处理器核心的应用 CPU 活动情况。\n\n`UI Responsiveness`（UI\
  \ 响应能力）工具可以帮助开发者识别以下问题：\n\n*   UI 响应能力。如果 UI 线程被阻塞，应用可能会响应缓慢。可能的原因包括过多的同步 JavaScript\
  \ 代码、同步 XHR 请求，甚至是处理器密集型 JavaScript 代码。\n*   由资源引起的加载缓慢问题。\n\n`GPU Usage`（GPU 使用情况）工具检查\
  \ DirectX 应用程序中的 GPU 使用情况。它让开发者能够判断 CPU 还是 GPU 是性能瓶颈的原因。\n\n`JavaScript Memory`（JavaScript\
  \ 内存）工具检查 JavaScript 堆，以发现内存泄漏等问题。\n\n`Network`（网络）工具让开发者能够检查影响 Windows 应用的各种网络操作信息，包括\
  \ HTTP 请求和响应标头、有效负载、Cookie 等。\n\n## 16.4 Windows 10 移动模拟器：附加工具\n\n### 问题\n\n您希望在无需实际设备的情况下，通过模拟与\
  \ Windows 10 移动设备的真实交互来测试应用的功能。这些真实交互包括测试位置感知功能、加速度计等。\n\n### 解决方案\n\n使用 Windows\
  \ 10 移动模拟器，它是通用 Windows 平台工具的一部分。它包括额外的工具，让开发者能够测试与设备的真实交互。\n\n### 工作原理\n\n`Additional\
  \ Tools`（附加工具）是 Windows 10 移动模拟器的一部分。让我们打开上一个方案中创建的应用，并通过选择其中一个 Windows 移动模拟器（而不是\
  \ `Local Machine`（本地计算机））来运行项目。这将在 Windows 10 移动模拟器中启动您的应用。要在模拟器中打开 `Additional\
  \ Tools`（附加工具），请单击工具按钮（`>>` 图标），如图 16-12 所示。\n\n![A978-1-4842-0719-2_16_Fig12_HTML.jpg](img/A978-1-4842-0719-2_16_Fig12_HTML.jpg)\n\
  \n图 16-12. 带有附加工具功能的 Windows 10 移动模拟器\n\n这将打开 `Additional Tools`（附加工具）窗口，开发者可以在其中访问\
  \ `Location`（位置）、`Networking`（网络）和 `Accelerometer`（加速度计）等工具，以在模拟器上进行测试（见图 16-13）。\n\
  \n![A978-1-4842-0719-2_16_Fig13_HTML.jpg](img/A978-1-4842-0719-2_16_Fig13_HTML.jpg)\n\
  \n图 16-13. 模拟器中的附加工具窗口\n\n#### 模拟鼠标输入\n\n您可以单击模拟器工具栏上的鼠标输入按钮来启用鼠标输入。这可确保模拟器内的任何鼠标单击都将作为鼠标事件发送到模拟器的操作系统。如果您的应用配对了可用作输入的鼠标，这个功能非常有用。\n\
  \n#### 近场通信 (NFC)\n\n如果您的应用使用近场通信 (NFC)，`NFC`（近场通信）选项卡（见图 16-14）可能是在接近、点击分享、卡模拟等场景中测试应用的有用工具。\n\
  \n![A978-1-4842-0719-2_16_Fig14_HTML.jpg](img/A978-1-4842-0719-2_16_Fig14_HTML.jpg)\n\
  \n图 16-14. 附加工具中的 NFC 选项卡\n\n您可以通过使用一对模拟器来模拟两部手机相互轻触，从而测试您的应用。\n\nNFC 工具支持以下模式：\n\
  \n*   接近模式\n*   HCE（主机卡模拟）模式\n*   智能卡读卡器模式\n\n当您测试此功能时，`NFC`（近场通信）选项卡会显示以下内容：\n\n\
  *   选定的模式\n*   与轻触和取消轻触事件相关的日志\n*   当前连接上发送和接收的所有消息的记录\n\n请注意，当您在 `NFC`（近场通信）选项卡中首次单击\
  \ `Tap`（轻触）按钮时，您将收到 Windows 防火墙提示。\n\n您需要从 Visual Studio 启动两个不同分辨率的模拟器，以模拟一对手机相互轻触。\n\
  \n选中 `Enable discovery of peer devices`（启用对等设备发现）复选框。对等设备下拉框会显示 Microsoft 模拟器和运行模拟器驱动程序的\
  \ Windows 计算机。\n\n当两个模拟器都在运行时，请按照以下步骤操作：\n\n1. 选择目标模拟器。\n2. 选择 `Send to peer device`（发送到对等设备）选项。\n\
  3. 单击 `Tap`（轻触）按钮，这模拟了两个设备相互轻触。\n4. 单击 `Untap`（取消轻触）按钮断开设备连接。\n   要模拟从设备读取消息，请按照以下步骤操作：\n\
  5. 选择 `Send to self`（发送到自身）单选选项，以测试仅需要一个支持 NFC 的设备的场景。\n6. 单击 `Tap`（轻触）按钮，模拟将设备轻触到标签。您应该会听到通知声音。\n\
  7. 单击 `Untap`（取消轻触）按钮断开连接。\n\n#### 多点触控输入\n\n您可以通过使用 Windows 10 模拟器工具栏上的多点触控输入按钮，来模拟用于捏合、缩放和旋转的多点触控输入。\n\
  \n要模拟多点触控功能，请按照以下步骤操作：\n\n1. 单击模拟器工具栏上的 `Multi-touch Input`（多点触控输入）按钮以启用此功能。\n2.\
  \ 模拟器屏幕上会出现两个点。右键单击并拖动其中一个触控点以定位它。左键单击并拖动另一个触控点以模拟捏合、缩放、旋转等操作。\n3. 您可以单击模拟器工具栏上的\
  \ `Single Point Input`（单点输入）按钮以恢复为正常输入。\n\n#### 加速度计\n\n`Accelerometer`（加速度计）工具让开发者能够测试跟踪手机移动的\
  \ Windows 应用（见图 16-15）。它在模拟器中模拟行为。\n\n![A978-1-4842-0719-2_16_Fig15_HTML.jpg](img/A978-1-4842-0719-2_16_Fig15_HTML.jpg)\n\
  \n图 16-15. 附加工具中的加速度计工具\n\n加速度计传感器可以使用实时输入或预先录制的输入进行测试。它可以使用录制的数据模拟手机的晃动。\n\n从方向下拉列表中选择所需的方向。在加速度计中间，您会看到一个彩色圆点。拖动它以模拟设备在\
  \ 3D 平面中的移动。\n\n\n\n#### 位置\n\n您可以通过使用`Location`选项卡来测试使用了导航和地理围栏的应用。\n\n您可以模拟在不同速度和精度级别下从一个位置移动到另一个位置。`Location`工具（见图\
  \ 16-16）目前支持三种模式：\n\n![A978-1-4842-0719-2_16_Fig16_HTML.jpg](img/A978-1-4842-0719-2_16_Fig16_HTML.jpg)\n\
  \n图 16-16. 附加工具中的 Location 选项卡\n\n- **图钉模式**：在地图上放置图钉。然后您可以点击`播放所有点`，模拟器会按照指定的时间间隔，按顺序将每个图钉的位置发送给模拟器。\n\
  - **实时模式**：当您在地图上放置图钉时，模拟器会随即将该图钉的位置发送给模拟器。\n- **路线模式**：在地图上放置图钉以指示路线点。模拟器会计算路线。\n\
  \n用户还可以在`Location`选项卡中执行以下操作：\n\n- 使用搜索框搜索位置。\n- 放大和缩小地图。\n- 将当前图钉点集合保存到 XML 文件中，以便日后重新加载。\n\
  - 清除所有点。\n- 保存路线，以便下次进入`图钉`和`路线`模式时加载。\n\n#### 网络\n\n`Network`选项卡允许开发者在不同网络速度和信号强度下测试应用。\n\
  \n您可以在各种网络速度下（如 2G、3G 和 4G）以及不同信号强度下（如良好、一般和较差）测试您的应用。\n\n当您的应用调用 Web 服务或传输数据时，此功能特别有用。\n\
  \n"
- "# 第 17 章：旁加载和 Windows 应用认证工具包\n\n在您开发完一个应用后，重要的是在上传到应用商店之前，先将其部署到不同机器上进行测试。本章介绍了如何通过命令提示符生成应用包、在机器上旁加载您应用，以及随后使用`Windows\
  \ 应用认证工具包`来测试该应用是否已达到可发布到 Windows 应用商店的优质标准。第 18 章 包含了如何通过`Visual Studio`交互式生成应用包的方法，因此本章不再赘述。\n\
  \n## 17.1 旁加载您的应用\n\n### 问题\n\n您需要在不将应用提交到 Windows 应用商店的情况下，将其旁加载到 Windows 设备上，以便测试人员能够使用您创建的应用包文件来安装和测试它。\n\
  \n### 解决方案\n\n使用`PowerShell`运行`Add-AppDevPackage`文件（该文件在生成包文件时创建），以将您的应用旁加载到 Windows\
  \ 设备上。\n\n### 工作原理\n\n您的应用用户不能像安装传统桌面应用那样简单地安装通用 Windows 应用。\n\n通用 Windows 应用只能从应用商店下载，然后安装在设备上。如果您有一个应用想要在不通过商店的情况下安装，您可以在设备上旁加载该应用，这样用户就可以安装和测试它了。\n\
  \n您可以通过以下步骤将应用包旁加载到 Windows 10 设备上。\n\n为您的设备启用旁加载功能。使用`PowerShell`安装您的应用。\n\n旁加载应用的第一步是确保您的设备上已启用旁加载功能。您可以在\
  \ Windows 机器上打开`设置`应用，进入`更新和安全`来启用它。选择`开发者模式`按钮，会显示使用开发者功能的各个选项。选择`开发人员模式`以启用设备的旁加载功能（见图\
  \ 17-1）。\n\n![A978-1-4842-0719-2_17_Fig1_HTML.jpg](img/A978-1-4842-0719-2_17_Fig1_HTML.jpg)\n\
  \n图 17-1. 在 Windows 10 中启用旁加载应用和开发人员模式\n\n一旦您选择了`开发人员模式`，会弹出一个确认对话框（见图 17-2），以确认您要开启应用旁加载功能。`旁加载应用`选项允许您安装`.appx`文件以及使用与包一起创建的`PowerShell`脚本运行该应用所需的证书。此选项比`开发人员模式`更安全，因为您不能安装不受信任的应用。但本教程中，我们选择`开发人员模式`并继续。\n\
  \n![A978-1-4842-0719-2_17_Fig2_HTML.jpg](img/A978-1-4842-0719-2_17_Fig2_HTML.jpg)\n\
  \n图 17-2. 启用旁加载的确认对话框\n\n下一步是在机器上安装该应用。为此，请遵循以下步骤。\n\n1. 生成用于安装的包文件。这在第 18 章中介绍。\n\
  2. 将您要安装的包文件的完整文件夹复制到目标机器上。例如，如果您创建了应用捆绑包，文件夹名称将包含版本号和`_test`。如果版本号是 1.0.0.0，项目名称是`Recipe17.1`，目标是`AnyCPU`，则文件夹名为`Recipe17.1_1.0.0.0_AnyCPU_Debug_Test`。\n\
  3. 在您要旁加载应用的目标机器上，打开该文件夹。右键单击`Add-AppDevPackage.ps1`文件，在右键菜单中选择`使用 PowerShell 运行`按钮，如图\
  \ 17-3 所示。\n\n![A978-1-4842-0719-2_17_Fig3_HTML.jpg](img/A978-1-4842-0719-2_17_Fig3_HTML.jpg)\n\
  \n图 17-3. Windows 资源管理器中的`使用 PowerShell 运行`菜单\n\n4. 按照`PowerShell`命令中显示的信息操作。当包成功安装后，您会在命令提示符中看到`您的应用已成功安装`的消息，如图\
  \ 17-4 所示。\n\n![A978-1-4842-0719-2_17_Fig4_HTML.jpg](img/A978-1-4842-0719-2_17_Fig4_HTML.jpg)\n\
  \n图 17-4. `PowerShell`命令中的应用安装消息\n\n现在，点击 Windows 中的`开始`按钮。找到该应用并启动它。\n\n## 17.2\
  \ 分别安装证书和包\n\n### 问题\n\n您需要在 Windows 中分别安装包和证书。\n\n### 解决方案\n\n使用`PowerShell`运行`Add-AppDevPackage`文件（该文件在生成包文件时创建），以将您的应用旁加载到\
  \ Windows 设备上。\n\n\n\n### 工作原理\n\n配方 17.1 演示了如何使用 PowerShell 同时安装应用和证书。但有时你可能希望分别安装证书和包文件。你可以先安装证书，然后使用\
  \ `Add-AppDevPackage` PowerShell 命令来实现。\n\n如果你想在 Windows 桌面端分别安装证书和包文件，需要遵循以下步骤。\n\
  \n打开创建应用包所在的文件夹。理想情况下，该文件夹应包含以下内容：\n\n- `Add-AppDevPackage.resources` 文件夹\n- `Add-AppDevPackage.resources`\
  \ PowerShell 脚本文件\n- `ProjectName_Version_Platform.appx` 文件\n- `ProjectName_Version_Platform.cer`\
  \ 安全或证书文件\n\n双击证书文件 (`.cer`)，然后在“证书”界面上点击**安装证书**按钮（参见图 17-5）。\n\n![A978-1-4842-0719-2_17_Fig5_HTML.jpg](img/A978-1-4842-0719-2_17_Fig5_HTML.jpg)\n\
  \n图 17-5. 安装证书界面\n\n在**证书导入向导**界面上，选择**存储位置**组下的**本地计算机**选项，如图 17-6 所示。点击**下一步**。\n\
  \n![A978-1-4842-0719-2_17_Fig6_HTML.jpg](img/A978-1-4842-0719-2_17_Fig6_HTML.jpg)\n\
  \n图 17-6. 从证书导入向导中选择存储位置\n\n在 UAC 对话框中，点击**确定**按钮继续。\n\n在下一个证书导入界面中，选中**将所有证书放入下列存储**单选按钮，然后点击**浏览**按钮（参见图\
  \ 17-7）。\n\n![A978-1-4842-0719-2_17_Fig7_HTML.jpg](img/A978-1-4842-0719-2_17_Fig7_HTML.jpg)\n\
  \n图 17-7. 选择放置证书的证书存储区\n\n在**选择证书存储**弹出窗口中，选择**受信任人**，然后点击**确定**按钮（参见图 17-8）。\n\n\
  ![A978-1-4842-0719-2_17_Fig8_HTML.jpg](img/A978-1-4842-0719-2_17_Fig8_HTML.jpg)\n\
  \n图 17-8. 选择证书存储界面\n\n在**证书导入向导**中点击**下一步**，然后点击**完成**以完成证书导入（参见图 17-9）。\n\n![A978-1-4842-0719-2_17_Fig9_HTML.jpg](img/A978-1-4842-0719-2_17_Fig9_HTML.jpg)\n\
  \n图 17-9. 完成证书导入过程\n\n这将把证书安装到本地计算机的 Windows 证书存储区中。下一步是按照以下说明，使用 PowerShell 的 `add-appxpackage`\
  \ cmdlet 单独安装应用。\n\n导航到 `AppPackages` 文件夹，找到要安装的包文件 (`.appx`) 的完整路径。\n\n如图 17-10\
  \ 所示，从“开始”菜单打开 Windows PowerShell，并通过指定以下参数来运行 `Add-appxpackage` 命令。\n\n`Add-appxpackage\
  \ –Path <appx 文件的路径>`\n\n![A978-1-4842-0719-2_17_Fig10_HTML.jpg](img/A978-1-4842-0719-2_17_Fig10_HTML.jpg)\n\
  \n图 17-10. PowerShell 中用于安装应用的 `Add-appxpackage` 命令\n\n输入命令后，按下**回车**键。这会将应用安装到你的\
  \ Windows 10 机器上。\n\n现在，你可以从“开始”菜单启动该应用。\n\n---\n\n## 17.3 使用 Windows 应用认证工具包验证你的\
  \ Windows 应用\n\n### 问题\n\n你想通过交互式使用 Windows 应用认证工具包来验证你的通用 Windows 平台应用。\n\n###\
  \ 解决方案\n\n从 Windows“开始”菜单启动 Windows 应用认证工具包，并指定要验证和测试的应用。\n\n### 工作原理\n\n在将应用提交到商店进行认证之前，先在本地进行验证和测试总是更好的。如果包有任何问题，这可以为开发者提供更多信息。\n\
  \nWindows 应用认证工具包是一个很好的工具，可以帮助开发者在本地验证和测试应用。Windows 应用认证工具包包含在适用于 Windows 10 的 Windows\
  \ 软件开发工具包 (SDK) 中。\n\n以下步骤使用 Windows 应用认证工具包验证和测试 Windows 应用。\n\n从 Windows“开始”菜单中，搜索\
  \ **Windows 应用认证工具包**，然后点击 **Windows App Cert Kit** 桌面应用（参见图 17-11）。\n\n![A978-1-4842-0719-2_17_Fig11_HTML.jpg](img/A978-1-4842-0719-2_17_Fig11_HTML.jpg)\n\
  \n图 17-11. 开始菜单中的 Windows 应用认证工具包\n\n在 Windows 应用认证工具包中，选择你要执行的验证类别。例如，如果你正在验证一个\
  \ Windows 应用，请选择**验证商店应用**（参见图 17-12）。\n\n![A978-1-4842-0719-2_17_Fig12_HTML.jpg](img/A978-1-4842-0719-2_17_Fig12_HTML.jpg)\n\
  \n图 17-12. 选择要执行验证的应用类型\n\n选择**商店应用**选项后，你将可以选择已安装在机器上的应用，或选择要验证的包文件。你可以启用**浏览要验证的应用**单选按钮，并点击**浏览**按钮来选择包文件（参见图\
  \ 17-13）。\n\n![A978-1-4842-0719-2_17_Fig13_HTML.jpg](img/A978-1-4842-0719-2_17_Fig13_HTML.jpg)\n\
  \n图 17-13. 选择要验证和测试的应用\n\n选择应用或包文件后，点击**下一步**继续。后续屏幕将显示适用于你正在测试的应用的测试工作流程（参见图 17-14）。如果某个测试不适用于你的应用类型，它会被灰显。\n\
  \n![A978-1-4842-0719-2_17_Fig14_HTML.jpg](img/A978-1-4842-0719-2_17_Fig14_HTML.jpg)\n\
  \n图 17-14. 适用于该应用的测试类型\n\n点击**下一步**。Windows 应用认证工具包开始验证应用，如图 17-15 所示。\n\n![A978-1-4842-0719-2_17_Fig15_HTML.jpg](img/A978-1-4842-0719-2_17_Fig15_HTML.jpg)\n\
  \n图 17-15. Windows 应用认证工具包正在验证应用\n\n验证完成后，系统会提示你将报告保存为 XML 文件格式，该文件显示结果，如图 17-16\
  \ 所示。Windows 应用认证工具包会创建一个 HTML 文件和一个 XML 报告，并将它们保存到指定的文件夹中。\n\n![A978-1-4842-0719-2_17_Fig16_HTML.jpg](img/A978-1-4842-0719-2_17_Fig16_HTML.jpg)\n\
  \n图 17-16. Windows 应用认证工具包的测试结果\n\n---\n\n## 17.4 在远程 Windows 10 设备上验证应用包\n\n###\
  \ 问题\n\n你需要在远程 Windows 10 机器上验证应用包并对其进行测试。\n\n### 解决方案\n\n在远程机器上安装 Visual Studio\
  \ 远程工具和 Windows 应用认证工具包，然后使用**远程机器**选项来验证远程机器上的包。\n\n\n\n### 工作原理\n\n通过 Visual Studio\
  \ 生成包文件时，你还可以选择在远程计算机上对其进行验证。\n\n要在远程计算机上验证包，请遵循以下步骤：\n\n1.  在“设置”应用的“使用开发人员功能”中启用**开发人员模式**，以启用你的\
  \ Windows 10 远程设备进行开发，如图 17-17 所示。请注意，目前不支持在远程 ARM 设备上对 Windows 10 进行验证。\n\n   \
  \ ![A978-1-4842-0719-2_17_Fig17_HTML.jpg](img/A978-1-4842-0719-2_17_Fig17_HTML.jpg)\
  \  \n    *图 17-17. 在“设置”应用中启用开发人员模式*\n\n2.  在远程计算机上下载并安装 Visual Studio 的远程工具。请访问\
  \ `http://www.microsoft.com/en-us/download/details.aspx?id=48155&NavToggle=True`。这些远程工具用于运行\
  \ Windows 应用认证套件。\n\n3.  从 `https://dev.windows.com/en-us/develop/app-certification-kit`\
  \ 下载 Windows 应用认证套件，并将其安装在远程计算机上。\n\n4.  现在，开始从你的 Windows 应用创建包。在“包创建完成”向导中，选择“远程计算机”选项，并单击省略号按钮（参见图\
  \ 17-18）。\n\n    ![A978-1-4842-0719-2_17_Fig18_HTML.jpg](img/A978-1-4842-0719-2_17_Fig18_HTML.jpg)\
  \  \n    *图 17-18. 包创建与远程计算机选项*\n\n5.  输入你的子网/域名服务器 (DNS)/IP 地址。在 Windows 凭据的“身份验证模式”菜单中选择相应的模式（参见图\
  \ 17-19）。\n\n    ![A978-1-4842-0719-2_17_Fig19_HTML.jpg](img/A978-1-4842-0719-2_17_Fig19_HTML.jpg)\
  \  \n    *图 17-19. 远程连接屏幕*\n\n6.  单击“选择”按钮，然后单击“启动 Windows 应用认证套件”按钮。如果远程计算机上正在运行远程工具，你将成功连接，验证测试随即开始。\n\
  \n"
- "# 第 18 章：商店与盈利\n\n到目前为止，你应该已经完成了针对 Windows 10 操作系统的通用 Windows 平台应用程序的开发。你需要生成应用程序并将其上传到\
  \ Windows 商店，用户在那里搜索和下载应用。在本章中，你将了解将应用上架 Windows 商店所需的事项，以及如何通过应用内广告来盈利。\n\n## 18.1\
  \ 创建 Windows 应用开发者帐户\n\n### 问题\n\n你需要生成应用程序并将其上传到 Windows 商店。但要做到这一点，你需要首先使用你的开发者帐户登录\
  \ Windows 开发人员中心。你需要知道如何创建开发者帐户，然后才能开始上传阶段。\n\n### 解决方案\n\n在线创建一个开发者帐户。有两种方法可以开始此过程。\n\
  \n*   直接访问 `http://dev.windows.com`。\n*   通过 Visual Studio 访问帐户注册。\n\n#### 通过 Windows\
  \ 开发人员中心访问帐户注册\n\nWindows 开发人员中心是 Windows 应用开发的一站式门户。该门户提供了开始 Windows 10 应用程序开发所需的工具。这里有代码示例、关于如何开发\
  \ Windows 10 应用的教程，当然，还有提交应用的途径。可以通过 `http://dev.windows.com` 访问 Windows 开发人员中心。导航到该页面时，你会看到一个“获取开发者帐户”链接。单击它并按照屏幕上的说明完成创建你自己的开发者帐户。开发者帐户允许你将应用（适用于所有\
  \ Windows 设备）提交到 Windows 商店。它还允许你管理你的应用，并获取关于你的应用在商店中表现的分析数据。\n\n你可以根据以下类别之一进行注册：\n\
  \n*   **个人**：此帐户类型允许你以个人、学生或非法人团体的身份开发和销售应用。此类型帐户的费用为 19 美元。\n*   **公司**：此帐户类型适用于拥有注册公司名称以开发和销售应用的公司。此类型帐户的费用为\
  \ 99 美元。\n\n你需要提供以下信息来获取帐户：\n\n*   你的联系信息\n*   你想要显示的发布者名称\n*   一种支付方式 (VISA/万事达卡/PayPal)\n\
  \n#### 通过 Visual Studio 访问帐户注册\n\n你也可以通过 Visual Studio 注册成为开发者。\n\n在 Visual Studio\
  \ 中，从“项目”菜单中，选择“商店” ➤ “打开开发者帐户”（参见图 18-1）。\n\n![A978-1-4842-0719-2_18_Fig1_HTML.jpg](img/A978-1-4842-0719-2_18_Fig1_HTML.jpg)\
  \  \n*图 18-1. 从 Visual Studio 打开开发者帐户*\n\n此操作将打开一个新的浏览器窗口，并直接带你进入帐户注册页面。你需要按照屏幕上的说明完成帐户注册。\n\
  \n## 18.2 为 Windows 10 打包通用 Windows 平台应用程序\n\n### 问题\n\n你已经完成了应用的开发。你已经在 Windows\
  \ 开发人员中心完成了帐户注册。现在你想打包你的应用，以便将其提交到商店。\n\n### 解决方案\n\n要销售或分发 Windows 应用，你需要创建一个所谓“应用程序包”或技术上称为\
  \ `appxupload` 包的文件。使用通用 Windows 平台 (UWP)，你生成一个包 (`.appxupload`)。该包被上传到 Windows\
  \ 商店。一旦应用上架，它就可以在任何 Windows 10 设备上安装和运行，包括手机、平板电脑、PC 等。\n\n### 工作原理\n\n打包 Windows\
  \ 10 应用需要分两步完成。首先，使用特定的属性和设置配置包。然后，生成要上传到商店的包。\n\n\n\n#### 配置应用包\n\n要创建应用包，首先需要设置一些描述应用的属性和设置。这些应用属性和设置存储在一个名为应用清单文件（`package.appxmanifest`）的文件中，该文件位于项目根目录。清单中可设置的属性/设置包括用于应用程序磁贴的图像或应用支持的屏幕方向等。\n\
  \n应用程序清单文件是一个 XML 文件。Visual Studio 提供了一个基于 GUI 的清单设计器/编辑器来编辑此文件。使用 GUI 设计器/编辑器可以轻松更改应用程序清单。\n\
  \n以下步骤提供了关于如何配置应用包的说明：\n\n![A978-1-4842-0719-2_18_Fig2_HTML.jpg](img/A978-1-4842-0719-2_18_Fig2_HTML.jpg)\n\
  \n图 18-2.\n\n应用程序包清单编辑 在解决方案资源管理器中，展开应用程序的项目节点。双击 `package.appxmanifest` 文件。Visual\
  \ Studio 将启动清单设计器/编辑器（见图 18-2）。\n\n清单文件有多个选项卡，用于配置应用的不同方面。\n\n- **应用程序**：配置应用的显示名称、起始页、默认语言、描述、支持的屏幕方向、锁屏通知模式以及磁贴更新信息。\n\
  - **视觉资产**：配置应用的视觉资产，例如磁贴图像和徽标、徽章徽标以及初始屏幕（见图 18-3）。\n\n    ![A978-1-4842-0719-2_18_Fig3_HTML.jpg](img/A978-1-4842-0719-2_18_Fig3_HTML.jpg)\n\
  \n    图 18-3.\n\n    视觉资产\n\n- **功能**：应用所需的任何功能都必须在清单文件的此区域进行声明（见图 18-4）。\n\n  \
  \  ![A978-1-4842-0719-2_18_Fig4_HTML.jpg](img/A978-1-4842-0719-2_18_Fig4_HTML.jpg)\n\
  \n    图 18-4.\n\n    功能\n\n- **声明**：用于为应用添加任何声明（例如，协议或共享目标）并设置其属性（见图 18-5）。\n\n\
  \    ![A978-1-4842-0719-2_18_Fig5_HTML.jpg](img/A978-1-4842-0719-2_18_Fig5_HTML.jpg)\n\
  \n    图 18-5.\n\n    声明\n\n- **内容 URI**：指定应用中哪些页面可以被框架导航到，以及在 Web 视图中加载时可以导航到的 URI（见图\
  \ 18-6）。\n\n    ![A978-1-4842-0719-2_18_Fig6_HTML.jpg](img/A978-1-4842-0719-2_18_Fig6_HTML.jpg)\n\
  \n    图 18-6.\n\n    内容 URI\n\n- **打包**：设置包的详细信息，例如包名称（注意：这不是应用程序名称，仅指包名称）、包显示名称、版本详细信息、发布者、发布者显示名称和包系列名称（见图\
  \ 18-7）。\n\n    ![A978-1-4842-0719-2_18_Fig7_HTML.jpg](img/A978-1-4842-0719-2_18_Fig7_HTML.jpg)\n\
  \n    图 18-7.\n\n    打包\n\n#### 创建应用包\n\n使用清单文件配置完应用程序包后，下一步就是生成或创建包。该包是一个 `appxupload`\
  \ 文件。Visual Studio 提供了**创建应用包**向导，接下来你将使用它。请按照以下步骤创建包：\n\n在解决方案资源管理器中，打开通用 Windows\
  \ 应用项目的解决方案。在解决方案资源管理器中打开项目后，右键单击你的项目。从上下文菜单中选择 **应用商店** > **创建应用包**（见图 18-8）。\n\
  \n![A978-1-4842-0719-2_18_Fig8_HTML.jpg](img/A978-1-4842-0719-2_18_Fig8_HTML.jpg)\n\
  \n图 18-8.\n\n**创建应用包** 向导将被调用。在**创建你的包**对话框中，选择**是**来生成包并上传到 Windows 应用商店（见图 18-9）。\n\
  \n![A978-1-4842-0719-2_18_Fig9_HTML.jpg](img/A978-1-4842-0719-2_18_Fig9_HTML.jpg)\n\
  \n图 18-9.\n\n创建应用包向导 如果你选择**否**，Visual Studio 将不会创建提交到应用商店所需的 `.appxupload` 文件。当您只想旁加载应用使其在内部设备上运行时，应使用此选项。\n\
  \n接下来，你需要登录到 Windows 开发人员中心帐户（见图 18-10）。\n\n![A978-1-4842-0719-2_18_Fig10_HTML.jpg](img/A978-1-4842-0719-2_18_Fig10_HTML.jpg)\n\
  \n图 18-10.\n\n创建应用包 开发人员中心登录\n\n接下来，你需要为你的包选择一个名称，或者你也可以从向导中为你的包预留一个名称。你选择的名称需要在\
  \ Windows 应用商店中是唯一的（见图 18-11）。\n\n![A978-1-4842-0719-2_18_Fig11_HTML.jpg](img/A978-1-4842-0719-2_18_Fig11_HTML.jpg)\n\
  \n图 18-11.\n\n选择应用名称\n\n接下来，你需要选择并配置包信息：包的输出位置、版本以及生成的体系结构配置。请确保选择所有三个体系结构选项（见图\
  \ 18-12）。\n\n![A978-1-4842-0719-2_18_Fig12_HTML.jpg](img/A978-1-4842-0719-2_18_Fig12_HTML.jpg)\n\
  \n图 18-12.\n\n配置包详细信息\n\n单击**创建**以生成 `appxupload` 包，该包将生成在所选输出位置。然后你可以将 `appxupload`\
  \ 包提交到应用商店。接下来，你将看到**包创建完成**对话框（见图 18-13）。\n\n![A978-1-4842-0719-2_18_Fig13_HTML.jpg](img/A978-1-4842-0719-2_18_Fig13_HTML.jpg)\n\
  \n图 18-13.\n\n创建完成对话框\n\n在将应用提交到应用商店进行认证之前，验证应用非常重要。可以通过使用已作为 SDK 一部分安装在机器上的 **Windows\
  \ 应用认证工具包 (WACK)** 来进行验证。验证可以在本地机器或远程机器上进行。\n\n要本地验证，请在**包创建完成**对话框中选择**本地机器**单选按钮。单击**启动\
  \ Windows 应用认证工具包**按钮。Windows 应用认证工具包将执行测试并显示结果。\n\n如果你的应用通过了测试，你就可以将应用提交到应用商店了。\n\
  \n## 18.3 向 Windows 应用商店提交应用\n\n### 问题\n\n你已完成创建包。已为你的应用生成了一个 `appxupload` 包。现在你需要将应用提交到应用商店进行认证。\n\
  \n\n\n### 解决方案\n\n为应用创建 `appxupload` 包后，下一步是将其提交至商店进行认证。通过认证后，你的应用便会出现在 Windows\
  \ 商店中，供用户搜索并下载安装。你可以通过 Windows 开发人员中心仪表板将应用包提交至 Windows 商店。以下概述了提交流程。\n\n使用你的开发人员中心账户凭据登录\
  \ Windows 开发人员中心。访问 [`http://dev.windows.com`](http://dev.windows.com) 并登录。点击“仪表板”链接。在仪表板页面，你会看到页面左侧的\
  \ `我的应用` 栏目。在该栏目下，你在创建包时预留的应用名称会以`进行中`状态列出。点击该应用名称（见图 18-14）。\n\n![A978-1-4842-0719-2_18_Fig14_HTML.jpg](img/A978-1-4842-0719-2_18_Fig14_HTML.jpg)\n\
  \n**图 18-14.** Windows 开发人员中心仪表板中的应用列表\n\n接下来，你会进入`应用概览`页面。在此页面，你需要点击`提交`栏目中的`开始提交`按钮。随后，会出现提交屏幕。你需要在此提供与定价、应用属性、应用包、希望应用上架的国家/地区以及任何其他供认证团队参考的说明相关的信息。\n\
  \n- **定价和可用性：** 在此处设置应用定价，或决定将其列为免费应用。你还可以选择希望应用上架的国家/地区。\n- **应用属性：** 在此处提供信息，例如应用所属的类别和子类别，以及年龄分级、任何硬件偏好设置和应用声明。\n\
  - **包：** 在此处提交由 Visual Studio 生成的 `appxupload` 包。\n\n完成提交过程中的所有步骤后，你可以点击`提交到商店`按钮。你的包随后将经历一系列工作流程。应用会先使用证书进行签名，然后认证团队会执行认证测试。通过认证团队的认证后，你的应用便会发布到\
  \ Windows 商店。\n\n## 18.4 在 UWP 应用中使用 Windows Ad Mediation\n\n### 问题\n\n你已经开发了 Windows\
  \ 10 应用，并考虑通过投放广告来实现盈利。你想要注册多家广告提供商，以在应用中显示它们的广告。你需要为应用添加一个广告中介控件。\n\n### 解决方案\n\
  \n应用内广告是实现应用盈利的方式之一。你可以订阅广告提供商，并在应用内运行它们的广告。你将根据应用中显示的广告展示量获得报酬。不同的提供商与广告展示量相关的经济模式各不相同。但要显示广告，你需要先安装\
  \ Windows Ad Mediation，这是一个有助于你显示来自多家提供商广告的控件。让我们来学习如何从 Visual Studio 安装 Ad Mediation\
  \ 控件。\n\n在解决方案资源管理器中打开你的项目。如果项目尚未展开，请展开它。从菜单栏中选择 **工具** > **扩展和更新**（见图 18-15）。\n\
  \n![A978-1-4842-0719-2_18_Fig15_HTML.jpg](img/A978-1-4842-0719-2_18_Fig15_HTML.jpg)\n\
  \n**图 18-15.** 扩展和更新对话框\n\n从左侧树形菜单中选择 `联机`。在对话框的搜索栏中输入 `Windows Ad Mediation`（见图\
  \ 18-16）。\n\n![A978-1-4842-0719-2_18_Fig16_HTML.jpg](img/A978-1-4842-0719-2_18_Fig16_HTML.jpg)\n\
  \n**图 18-16.** Windows 广告中介\n\n点击搜索结果中显示的 Windows 广告中介包上的 `下载`。这会启动浏览器并下载可执行文件。下载完成后，安装\
  \ MSI 并按照屏幕指示操作。安装完成后，重启 Visual Studio。\n\n现在，你可以在应用程序中使用 Windows Ad Mediation 控件了。\n\
  \n## 18.5 在应用中显示广告\n\n### 问题\n\n你已经安装了 Windows Ad Mediation SDK，现在想要开始在应用中显示广告。你希望在应用页面中放置广告。\n\
  \n### 解决方案\n\n为了在应用页面中显示广告，你需要添加对 Windows 广告 SDK 的引用，该 SDK 已在之前安装 Windows Ad Mediation\
  \ 时一起被安装。一旦添加了对 Windows 广告 SDK 的引用，你就可以在任何页面上实例化中介控件并在其中显示广告。以下步骤说明了如何添加中介控件。\n\n\
  在解决方案资源管理器中打开你的项目。如果项目尚未展开，请展开它。右键单击 `引用` 节点，然后从上下文菜单中选择 `添加引用`。在 `引用管理器` 对话框中，选择\
  \ `Microsoft Advertising SDK for JavaScript`，然后点击 `确定`（见图 18-17）。\n\n![A978-1-4842-0719-2_18_Fig17_HTML.jpg](img/A978-1-4842-0719-2_18_Fig17_HTML.jpg)\n\
  \n**图 18-17.** 引用管理器对话框\n\n打开 `default.html` 或任何你想要放置广告的其他文件。在 `<head>` 部分中，在项目的\
  \ `default.css` 和 `default.js` 的 JavaScript 引用之后，添加对 `ad.js` 的引用。\n\n```\n<!-- Microsoft\
  \ Advertising 所需的引用 -->\n<script src=\"/Microsoft.Advertising.JavaScript/ad.js\"\
  \ ></script>\n```\n\n修改 `default.html` 文件（或适合你项目的其他 HTML 文件）中的 `<body>` 部分，以包含以下内容：\n\
  \n```\n<div id=\"myAd\" style=\"position: absolute; top: 50px; left: 0px; width:\
  \ 300px; height: 250px; z-index: 1\"\n     data-win-control=\"MicrosoftNSJS.Advertising.AdControl\"\
  \n     data-win-options=\"{applicationId: 'd25517cb-12d4-4699-8bdc-52040c712cab',\
  \ adUnitId: '10043121'}\">\n</div>\n```\n\n编译并运行应用，即可看到带有广告的应用（见图 18-18）。\n\n![A978-1-4842-0719-2_18_Fig18_HTML.jpg](img/A978-1-4842-0719-2_18_Fig18_HTML.jpg)\n\
  \n**图 18-18.** 带有广告的通用 Windows 应用\n\n**注意：** 上面代码片段中提供的 `applicationId` 和 `adUnitId`\
  \ 是微软提供的测试值，供你在开发期间测试使用。对于测试目的，`applicationId` 保持不变，但有多个不同的测试广告单元可用于测试不同尺寸的广告。微软文档页面\
  \ [`https://msdn.microsoft.com/en-US/library/mt313178(v=msads.30).aspx`](https://msdn.microsoft.com/en-US/library/mt313178(v=msads.30).aspx)\
  \ 提供了关于测试广告单元 ID 的更多信息。\n\n\n\n\n要在生产应用中生成`ApplicationID`和`AdUnitId`，请按照以下步骤操作：\n\
  \n1.  在 Windows 开发人员中心启动商店提交流程。\n2.  确保在“应用属性”部分设置了应用类别。\n3.  接下来，从页面左侧部分的选项中选择“盈利”➤“通过广告盈利”。\n\
  4.  在“通过广告盈利”页面的“Microsoft 广告单元”部分下，点击“显示选项”。\n5.  为你的广告单元输入一个名称。选择广告单元类型以及将展示广告的设备系列。\n\
  6.  点击“创建广告单元”按钮。\n7.  现在，你已经创建了一个广告单元。复制应用程序 ID 和广告单元 ID，并将其粘贴到你应用中的广告控件里。\n8.\
  \  重新生成包，并在提交流程中使用新的包。\n\n"
