  trans: "\n### 工作原理\n\n当你的应用被选为数据共享目标时，会触发 [`Application.OnShareTargetActivated`](https://msdn.microsoft.com/en-us/library/windows/apps/windows.ui.xaml.application.onsharetargetactivated.aspx)\
    \ 事件。你的应用需要实现此事件来接收用户从其他应用共享的数据。\n\n让我们在通用 Windows 应用中实现此事件，以接收来自其他应用的数据。在 Microsoft\
    \ Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。\n\n首先，将以下代码添加到 `default.html`\
    \ 中。你需要用以下代码替换 body 标签：\n\n```html\n<body class=\"win-type-body\">\n    <div>\n\
    \        <br /><br />\n        <div>以下数据来自源应用：</div>\n        <br />\n       \
    \ <h3>数据属性</h3>\n        <strong>标题：</strong><span id=\"txttitle\" data-win-automationId=\"\
    Title\">（无标题）</span><br />\n        <strong>描述：</strong><span id=\"txtdescription\"\
    \ data-win-automationId=\"Description\">（无描述）</span><br />\n        <strong>数据：</strong><span\
    \ id=\"txtdata\" data-win-automationId=\"Description\">（无数据）</span><br />\n  \
    \  </div>\n</body>\n```\n\n此代码定义了共享数据演示的用户界面。该用户界面外观如图 10-10 所示。\n\n![A978-1-4842-0719-2_10_Fig10_HTML.jpg](img/A978-1-4842-0719-2_10_Fig10_HTML.jpg)\n\
    \n**图 10-10.** 共享超级按钮窗口\n\n现在，在解决方案资源管理器中右键单击项目，然后选择 **添加 ➤ 新建 JavaScript 文件**。为文件命名。在本示例中，我们将文件命名为\
    \ `DataSharingDemo.js`。\n\n```javascript\n(function () {\n    \"use strict\";\n\
    \    function GetControl() {\n        WinJS.UI.processAll().done(function () {\n\
    \            // 初始化激活处理程序\n            WinJS.Application.addEventListener(\"activated\"\
    , activatedShareHandler, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\n上述代码为应用程序对象添加了一个 `activated` 事件侦听器。名为\
    \ `activatedShareHandler` 的事件侦听器函数如下所示；请将此函数添加到 `js` 文件中。\n\n```javascript\n///\
    \ <summary>\n/// 处理激活的函数\n/// </summary>\n/// <param name=\"eventArgs\">\n///\
    \ 事件参数。对于共享合约，它包含 ShareOperation\n/// </param>\nfunction activatedShareHandler(eventObject)\
    \ {\n    // 检查本次共享是否由共享合约触发\n    if (eventObject.detail.kind === Windows.ApplicationModel.Activation.ActivationKind.shareTarget)\
    \ {\n        eventObject.setPromise(WinJS.UI.processAll());\n        // 使用 eventObject\
    \ 事件参数初始化 ShareOperation 对象\n        shareOperation = eventObject.detail.shareOperation;\n\
    \        // 检查 shareOperation 是否启用了文本共享，或是否使用了文本共享数据\n        if (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.text))\
    \ {\n            shareOperation.data.getTextAsync().done(function (text) {\n \
    \               dispReceivedContent(text);\n            }, function (e) {\n  \
    \              displayError(\"文本：\", \"检索数据时出错：\" + e);\n            });\n   \
    \     }\n    }\n}\n```\n\n上述代码接收 `activatedShareHandler` 事件侦听器的共享数据。此代码首先检查共享是否由共享合约触发。然后，它从事件参数创建一个\
    \ `shareOperation` 对象，如下所示：\n\n```javascript\n// 使用 eventObject 事件参数初始化 ShareOperation\
    \ 对象\n        shareOperation = eventObject.detail.shareOperation;\n```\n\n接着，代码使用\
    \ `shareOperation.data.getTextAsync` 函数异步获取文本。在异步调用的成功方法中，接收到的文本被传递给 `dispReceivedContent()`\
    \ 函数，该函数随后在目标应用上显示文本。以下是显示共享内容函数的代码：\n\n```javascript\nfunction dispReceivedContent(content)\
    \ {\n    document.getElementById(\"txttitle\").innerText = shareOperation.data.properties.title;\n\
    \    document.getElementById(\"txtdescription\").innerText = shareOperation.data.properties.description;\n\
    \    document.getElementById(\"txtdata\").innerText = content;\n}\n```\n\n`DataSharingDemo.js`\
    \ 文件的完整代码如下所示：\n\n```javascript\n(function () {\n    \"use strict\";\n    function\
    \ GetControl() {\n        WinJS.UI.processAll().done(function () {\n         \
    \   // 初始化激活处理程序\n            WinJS.Application.addEventListener(\"activated\"\
    , activatedShareHandler, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n\n/// <summary>\n/// 处理激活的函数\n/// </summary>\n\
    /// <param name=\"eventArgs\">\n/// 事件参数。对于共享合约，它包含 ShareOperation\n/// </param>\n\
    function activatedShareHandler(eventObject) {\n    // 检查本次共享是否由共享合约触发\n    if\
    \ (eventObject.detail.kind === Windows.ApplicationModel.Activation.ActivationKind.shareTarget)\
    \ {\n        eventObject.setPromise(WinJS.UI.processAll());\n        // 使用 eventObject\
    \ 事件参数初始化 ShareOperation 对象\n        shareOperation = eventObject.detail.shareOperation;\n\
    \        // 检查 shareOperation 是否启用了文本共享，或是否使用了文本共享数据\n        if (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.text))\
    \ {\n            shareOperation.data.getTextAsync().done(function (text) {\n \
    \               dispReceivedContent(text);\n            }, function (e) {\n  \
    \              displayError(\"文本：\", \"检索数据时出错：\" + e);\n            });\n   \
    \     }\n    }\n}\n\nfunction dispReceivedContent(content) {\n    document.getElementById(\"\
    txttitle\").innerText = shareOperation.data.properties.title;\n    document.getElementById(\"\
    txtdescription\").innerText = shareOperation.data.properties.description;\n  \
    \  document.getElementById(\"txtdata\").innerText = content;\n}\n```\n\n当你在 Windows\
    \ 10 中运行源应用时（我们正在运行我们在 10.2 节中开发的另一个应用），你会看到如图 10-11 所示的界面。\n\n![A978-1-4842-0719-2_10_Fig11_HTML.jpg](img/A978-1-4842-0719-2_10_Fig11_HTML.jpg)\n\
    \n**图 10-11.** 显示目标应用的共享超级按钮窗口\n\n如图 10-11 所示，应用 **10.6_ 接收共享数据** 被列在应用的共享超级按钮共享目标列表中。当你选择该应用时，你会看到从源应用共享的数据（标题、描述和文本），如图\
    \ 10-12 中突出显示的部分。\n\n![A978-1-4842-0719-2_10_Fig12_HTML.jpg](img/A978-1-4842-0719-2_10_Fig12_HTML.jpg)\n\
    \n**图 10-12.** 显示目标应用的共享超级按钮窗口\n\n## 10.7 接收其他应用共享的图像\n\n### 问题\n\n你需要开发一个功能，允许用户接收另一个\
    \ Windows 10 应用共享的图像。\n\n### 解决方案\n\n使用 `shareOperation.data.getBitmapAsync` 接收其他应用共享的图像。\n"
- fmt: "### How It Works\n\nThe source app can also share an image with the other\
    \ apps as you saw in Recipe 10.4. To share a bitmap image, the source app uses\
    \ the `request.data.setBitmap(imageStream)` method by passing the image stream\
    \ to set the bitmap image to the request object being shared.\n\nTo receive the\
    \ bitmap image, the target app uses the `shareOperation.data.getBitmapAsync()`\
    \ method of the data packages view. The complete code to receive a bitmap image\
    \ is shown here:\n\n```\n// ShareOperation object in initiliaze with the eventObject\
    \ event arugment\nshareOperation = eventObject.detail.shareOperation;\n\nif (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.bitmap))\
    \ {\n    shareOperation.data.getBitmapAsync().done(function (bitmapStreamReference)\
    \ {\n        bitmapStreamReference.openReadAsync().done(function (bitmapStream)\
    \ {\n            if (bitmapStream) {\n                document.getElementById(\"\
    imageHolder\").src = URL.createObjectURL(bitmapStream, { oneTimeOnly: true });\n\
    \            }\n        }, function (e) {\n            displayError(\"Bitmap:\
    \ \", \"Error reading image stream:  \" + e);\n        });\n    }, function (e)\
    \ {\n        displayError(\"Bitmap: \", \"Error retrieving data: \" + e);\n  \
    \  });\n}\n```\n\nThis code first checks if the `shareOperation` object contains\
    \ a bitmap image. It then invokes the `getBitmapAsync()` method to receive the\
    \ image from the request object. At the end, in the success method of the async\
    \ call, another async call to `bitmapStreamReference.openReadAsync()` is invoked\
    \ to read the stream object. `openReadAsync` returns the stream object. The `URL.createObjectURL(bitmapStream,\
    \ { oneTimeOnly: true })` line of code then creates the URL of the object, which\
    \ is then assigned to the `imageHolder` as a source to the HTML `img` tag.\n\n\
    Let’s implement this event in a Universal Windows app to receive bitmaps from\
    \ other apps.\n\nCreate a new project using the Windows Universal (Blank App)\
    \ template in Microsoft Visual Studio 2015.\n\nFirst, add the following code to\
    \ `default.html`. You need to replace the body tag with the following code:\n\n\
    ```\n<body class=\"win-type-body\" style=\"background-color:white\" >\n    <div>\n\
    \        <br /><br />\n        <div><p style=\"color:black\">The following Data\
    \  was received from the source app:</p></div>\n        <br />\n        <h3 style=\"\
    color:black\">Data Properties</h3>\n        <strong style=\"color:black\">Title:\
    \ </strong><span id=\"txttitle\" data-win-automationId=\"Title\" style=\"color:black\"\
    >(No title)</span><br />\n        <strong style=\"color:black\">Description: </strong><span\
    \ id=\"txtdescription\" data-win-automationId=\"Description\" style=\"color:black\"\
    >(No description)</span><br />\n        <strong style=\"color:black\">Data: </strong><span\
    \ id=\"txtdata\" data-win-automationId=\"Description\" style=\"color:black\">(No\
    \ data)</span><br />\n        <div class=\"imageDiv\">\n            <img class=\"\
    imageHolder\" id=\"imageHolder\" alt=\"image holder\" src=\"\" />\n        </div>\n\
    \    </div>\n</body>\n```\n\nNow, right-click the project in Solution Explorer\
    \ and select Add ➤ New JavaScript file. Provide the name for the file. In this\
    \ example, let’s name the file `DataSharingDemo.js`.\n\n```\n(function () {\n\
    \    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            // Initialize the activation handler\n            WinJS.Application.addEventListener(\"\
    activated\", activatedHandler, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\nThe preceding code adds an event\
    \ listener `activated` to the application object. The following is the event listener\
    \ function named `activatedShareHandler`. Add this code to the `js` file.\n\n\
    ```\n/// <summary>\n/// Function to handle the activation\n/// </summary>\n///\
    \ <param name=\"eventArgs\">\n/// Arguments of the event. In the case of the Share\
    \ contract, it has the ShareOperation\n/// </param>\nfunction activatedShareHandler(eventObject)\
    \ {\n    // Check if the Share Contract was the cuase of this sharing\n    if\
    \ (eventObject.detail.kind === Windows.ApplicationModel.Activation.ActivationKind.shareTarget)\
    \ {\n        eventObject.setPromise(WinJS.UI.processAll());\n        // ShareOperation\
    \ object in initiliaze with the eventObject event arugment\n        shareOperation\
    \ = eventObject.detail.shareOperation;\n        if (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.bitmap))\
    \ {\n            shareOperation.data.getBitmapAsync().done(function (bitmapStreamReference)\
    \ {\n                bitmapStreamReference.openReadAsync().done(function (bitmapStream)\
    \ {\n                    if (bitmapStream) {\n                        document.getElementById(\"\
    imageHolder\").src = URL.createObjectURL(bitmapStream, { oneTimeOnly: true });\n\
    \                    }\n                }, function (e) {\n                  \
    \  displayError(\"Bitmap: \", \"Error reading image stream:  \" + e);\n      \
    \          });\n            }, function (e) {\n                displayError(\"\
    Bitmap: \", \"Error retrieving data: \" + e);\n            });\n        }\n  \
    \  }\n}\n```\n\nFinally, declare this app as a target app by using `package.appxmanifest`,\
    \ as shown in Figure 10-13.\n\n![A978-1-4842-0719-2_10_Fig13_HTML.jpg](A978-1-4842-0719-2_10_Fig13_HTML.jpg)\n\
    \nFigure 10-13. Share Charm windows showing the target app\n\nThat’s it. Now deploy\
    \ the app using the project deploy menu in Visual Studio.\n\nYou do not have to\
    \ run this app to receive the image, as this is the registered target app. The\
    \ Share charm lists this app as a target app in the Share charm windows, and when\
    \ a user selects the app from the list, a new instance is activated for this app.\
    \ The activated event will be invoked, which will then receive the image shared\
    \ by the source app.\n\n## 10.8 Share Custom Data Type\n\n### Problem\n\nYou need\
    \ to develop a feature that allows users to share a custom data format, such as\
    \ a person’s name and job title.\n\n### Solution\n\nUse the `request.data.setData`\
    \ function as follows:\n\n```\nrequest.data.setData(\"Schema\", \"ObjectName\"\
    );\n```"
  raw: '### How It Works


    The source app can also share an image with the other apps as you saw in Recipe
    10.4\. To share a bitmap image, the source app uses the `request.data.setBitmap(imageStream)`
    method by passing the image stream to set the bitmap image to the request object
    being shared.


    To receive the bitmap image, the target app uses the `shareOperation.data.getBitmapAsync()`
    method of the data packages view. The complete code to receive a bitmap image
    is shown here:


    `// ShareOperation object in initiliaze with the eventObject event arugment`


    `shareOperation = eventObject.detail.shareOperation;`


    `if (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.bitmap))
    {`


                `shareOperation.data.getBitmapAsync().done(function (bitmapStreamReference`
    `) {`


                    `bitmapStreamReference.openReadAsync().done(function (bitmapStream)
    {`


                `if (bitmapStream) {`


        `document.getElementById("imageHolder").src = URL.createObjectURL(bitmapStream,
    { oneTimeOnly: true });`


                        `}`


                    `}, function (e) {`


                        `displayError("Bitmap: ", "Error reading image stream:  "
    + e);`


                    `});`


                `}, function (e) {`


                    `displayError("Bitmap: ", "Error retrieving data: " + e);`


                `});`


            `}`


    This code first checks if the `shareOperation` object contains a bitmap image.
    It then invokes the `getBitmapAsync()` method to receive the image from the request
    object. At the end, in the success method of the async call, another async call
    to `bitmapStreamReference.openReadAsync()` is invoked to read the stream object.
    `openReadAsync` returns the stream object. The `URL.createObjectURL(bitmapStream,
    { oneTimeOnly: true })` line of code then creates the URL of the object, which
    is then assigned to the `imageHolder` as a source to the HTML `img` tag.


    Let’s implement this event in a Universal Windows app to receive bitmaps from
    other apps.


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015.


    First, add the following code to `default.html`. You need to replace the body
    tag with the following code:


    `<body class="win-type-body" style="background-color:white" >`


        `<div>`


            `<br /><br />`


            `<div><p style="color:black">The following Data  was received from the
    source app:</p></div>`


            `<br />`


            `<h3 style="color:black">Data Properties</h3>`


            `<strong style="color:black">Title: </strong><span id="txttitle" data-win-automationId="Title"
    style="color:black">(No title)</span><br />`


            `<strong style="color:black">Description: </strong><span id="txtdescription"
    data-win-automationId="Description" style="color:black">(No description)</span><br
    />`


            `<strong style="color:black">Data: </strong><span id="txtdata" data-win-automationId="Description"
    style="color:black">(No data)</span><br />`


            `<div class="imageDiv">`


                `<img class="imageHolder" id="imageHolder" alt="image holder" src=""
    />`


            `</div>`


        `</div>`


    `</body>`


    Now, right-click the project in Solution Explorer and select Add ➤ New JavaScript
    file. Provide the name for the file. In this example, let’s name the file DataSharingDemo.js.


    `(function () {`


        `"use strict";`


        `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


                `// Initialize the activation handler`


                `WinJS.Application.addEventListener("activated", activatedHandler,
    false);`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", GetControl);`


    `})();`


    The preceding code adds an event listener activated to the application object.
    The following is the event listener function named `activatedShareHandler`. Add
    this code to the `js` file.


    `/// <summary>`


    `/// Function to handle the activation`


    `/// </summary>`


    `/// <param name="eventArgs">`


    `/// Arguments of the event. In the case of the Share contract, it has the ShareOperation`


    `/// </param>`


    `function activatedShareHandler(eventObject) {`


        `// Check if the Share Contract was the cuase of this sharing`


        `if (eventObject.detail.kind === Windows.ApplicationModel.Activation.ActivationKind.shareTarget)
    {`


            `eventObject.setPromise(WinJS.UI.processAll());`


            `// ShareOperation object in initiliaze with the eventObject event arugment`


            `shareOperation = eventObject.detail.shareOperation;`


            `if (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.bitmap))
    {`


                `shareOperation.data.getBitmapAsync().done(function (bitmapStreamReference)
    {`


                    `bitmapStreamReference.openReadAsync().done(function (bitmapStream)
    {`


                        `if (bitmapStream) {`


                            `document.getElementById("imageHolder").src = URL.createObjectURL(bitmapStream,
    { oneTimeOnly: true });`


                        `}`


                    `}, function (e) {`


                        `displayError("Bitmap: ", "Error reading image stream:  "
    + e);`


                    `});`


                `}, function (e) {`


                    `displayError("Bitmap: ", "Error retrieving data: " + e);`


                `});`


            `}`


        `}`


    `}`


    Finally, declare this app as a target app by using `package.appxmanifest`, as
    shown in Figure [10-13](#A978-1-4842-0719-2_10_Chapter.html#Fig13).


    ![A978-1-4842-0719-2_10_Fig13_HTML.jpg](A978-1-4842-0719-2_10_Fig13_HTML.jpg)


    Figure 10-13.


    Share Charm windows showing the target app


    That’s it. Now deploy the app using the project deploy menu in Visual Studio.


    You do not have to run this app to receive the image, as this is the registered
    target app. The Share charm lists this app as a target app in the Share charm
    windows, and when a user selects the app from the list, a new instance is activated
    for this app. The activated event will be invoked, which will then receive the
    image shared by the source app.


    ## 10.8 Share Custom Data Type


    ### Problem


    You need to develop a feature that allows users to share a custom data format,
    such as a person’s name and job title.


    ### Solution


    Use the `request.data.setData` function as follows:


    `request.data.setData("Schema", "ObjectName");`'
  trans: "\n### 工作原理\n\n如配方 10.4 所示，源应用也可以与其他应用共享图像。要共享位图图像，源应用使用 `request.data.setBitmap(imageStream)`\
    \ 方法，通过传递图像流将位图图像设置到要共享的请求对象中。\n\n为了接收位图图像，目标应用使用数据包视图的 `shareOperation.data.getBitmapAsync()`\
    \ 方法。接收位图图像的完整代码如下所示：\n\n```\n// 使用 eventObject 事件参数初始化 ShareOperation 对象\nshareOperation\
    \ = eventObject.detail.shareOperation;\n\nif (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.bitmap))\
    \ {\n    shareOperation.data.getBitmapAsync().done(function (bitmapStreamReference)\
    \ {\n        bitmapStreamReference.openReadAsync().done(function (bitmapStream)\
    \ {\n            if (bitmapStream) {\n                document.getElementById(\"\
    imageHolder\").src = URL.createObjectURL(bitmapStream, { oneTimeOnly: true });\n\
    \            }\n        }, function (e) {\n            displayError(\"Bitmap:\
    \ \", \"读取图像流时出错: \" + e);\n        });\n    }, function (e) {\n        displayError(\"\
    Bitmap: \", \"获取数据时出错: \" + e);\n    });\n}\n```\n\n此代码首先检查 `shareOperation` 对象是否包含位图图像。然后调用\
    \ `getBitmapAsync()` 方法从请求对象接收图像。最后，在异步调用的成功方法中，调用另一个异步方法 `bitmapStreamReference.openReadAsync()`\
    \ 来读取流对象。`openReadAsync` 返回流对象。`URL.createObjectURL(bitmapStream, { oneTimeOnly:\
    \ true })` 这行代码随后创建该对象的 URL，并将其分配给 `imageHolder` 作为 HTML `img` 标签的源。\n\n现在，我们在一个通用\
    \ Windows 应用中实现这个事件，以接收来自其他应用的位图。\n\n在 Microsoft Visual Studio 2015 中使用 Windows\
    \ 通用（空白应用）模板创建一个新项目。\n\n首先，将以下代码添加到 `default.html` 中。你需要用以下代码替换 body 标签：\n\n```\n\
    <body class=\"win-type-body\" style=\"background-color:white\" >\n    <div>\n\
    \        <br /><br />\n        <div><p style=\"color:black\">以下数据来自源应用:</p></div>\n\
    \        <br />\n        <h3 style=\"color:black\">数据属性</h3>\n        <strong\
    \ style=\"color:black\">标题: </strong><span id=\"txttitle\" data-win-automationId=\"\
    Title\" style=\"color:black\">(无标题)</span><br />\n        <strong style=\"color:black\"\
    >描述: </strong><span id=\"txtdescription\" data-win-automationId=\"Description\"\
    \ style=\"color:black\">(无描述)</span><br />\n        <strong style=\"color:black\"\
    >数据: </strong><span id=\"txtdata\" data-win-automationId=\"Description\" style=\"\
    color:black\">(无数据)</span><br />\n        <div class=\"imageDiv\">\n         \
    \   <img class=\"imageHolder\" id=\"imageHolder\" alt=\"图像占位符\" src=\"\" />\n\
    \        </div>\n    </div>\n</body>\n```\n\n现在，在解决方案资源管理器中右键单击项目，选择添加 ➤ 新建 JavaScript\
    \ 文件。为文件命名。在本例中，我们将文件命名为 `DataSharingDemo.js`。\n\n```\n(function () {\n    \"\
    use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            // 初始化激活处理程序\n            WinJS.Application.addEventListener(\"\
    activated\", activatedHandler, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\n上述代码为应用程序对象添加了一个名为 `activated`\
    \ 的事件侦听器。以下是名为 `activatedShareHandler` 的事件侦听器函数。将此代码添加到 `js` 文件中。\n\n```\n///\
    \ <summary>\n/// 处理激活的函数\n/// </summary>\n/// <param name=\"eventArgs\">\n///\
    \ 事件参数。在共享合约的情况下，它包含 ShareOperation\n/// </param>\nfunction activatedShareHandler(eventObject)\
    \ {\n    // 检查共享合约是否是此次共享的原因\n    if (eventObject.detail.kind === Windows.ApplicationModel.Activation.ActivationKind.shareTarget)\
    \ {\n        eventObject.setPromise(WinJS.UI.processAll());\n        // 使用 eventObject\
    \ 事件参数初始化 ShareOperation 对象\n        shareOperation = eventObject.detail.shareOperation;\n\
    \        if (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.bitmap))\
    \ {\n            shareOperation.data.getBitmapAsync().done(function (bitmapStreamReference)\
    \ {\n                bitmapStreamReference.openReadAsync().done(function (bitmapStream)\
    \ {\n                    if (bitmapStream) {\n                        document.getElementById(\"\
    imageHolder\").src = URL.createObjectURL(bitmapStream, { oneTimeOnly: true });\n\
    \                    }\n                }, function (e) {\n                  \
    \  displayError(\"Bitmap: \", \"读取图像流时出错: \" + e);\n                });\n    \
    \        }, function (e) {\n                displayError(\"Bitmap: \", \"获取数据时出错:\
    \ \" + e);\n            });\n        }\n    }\n}\n```\n\n最后，使用 `package.appxmanifest`\
    \ 将此应用声明为目标应用，如图 10-13 所示。\n\n![A978-1-4842-0719-2_10_Fig13_HTML.jpg](img/A978-1-4842-0719-2_10_Fig13_HTML.jpg)\n\
    \n图 10-13. 显示目标应用的共享超级按钮窗口\n\n就是这样。现在，使用 Visual Studio 中的项目部署菜单部署该应用。\n\n你无需运行此应用即可接收图像，因为它是一个已注册的目标应用。共享超级按钮会在共享超级按钮窗口中将此应用列为目标应用，当用户从列表中选择该应用时，将为此应用激活一个新实例。激活事件将被调用，进而接收源应用共享的图像。\n\
    \n## 10.8 共享自定义数据类型\n\n### 问题\n\n你需要开发一个功能，允许用户共享自定义数据格式，例如人物的姓名和职位。\n\n### 解决方案\n\
    \n使用 `request.data.setData` 函数，如下所示：\n\n```\nrequest.data.setData(\"Schema\",\
    \ \"ObjectName\");\n```\n"
- fmt: "# How It Works\n\nThe share contract also allows developers to build apps\
    \ to share custom format data, such as for a book (book title, publisher, author\
    \ name, etc.) or a person, with properties like name, job title, profile picture,\
    \ and so forth.\n\nThe custom format supported in a Windows 10 Universal Windows\
    \ app can be based on schema defined by [`http://schema.org`](http://schema.org),\
    \ such as [`http://schema.org/person`](http://schema.org/person) or [`http://schema.org/Book`](http://schema.org/Book).\
    \ The `setData` method accepts two parameters, as follows:\n\n`request.data.setData(\"\
    http://schema.org/Person\", person);`\n\nThe first parameter is the schema format\
    \ ID and the second parameter is the object itself.\n\nLet’s implement sharing\
    \ custom data in a Universal Windows app.\n\nCreate a new project using the Windows\
    \ Universal (Blank App) template in Microsoft Visual Studio 2015.\n\nFirst, add\
    \ the following code in the `default.html`. You need to replace the `body` tag\
    \ with the following code:\n\n```html\n<body class=\"win-type-body\" style=\"\
    background-color:white\">\n    <div>\n        <p style=\"color:black\">Enter Person\
    \ Name:</p>\n        <input class=\"text-box\" id=\"txttitle\" value=\"Name\"\
    \ size=\"40\" />\n        <p style=\"color:black\">Enter Person Title:</p>\n \
    \       <input class=\"text-box\" id=\"txtjobtitle\" value=\"Job Title\" size=\"\
    40\" />\n        <p style=\"color:black\">Enter telephone:</p>\n        <input\
    \ class=\"text-box\" id=\"txtphone\" value=\"Telephone\" size=\"40\" />\n    \
    \    <br />\n        <br />\n    </div>\n</body>\n```\n\nNow, right-click the\
    \ project in Solution Explorer and select **Add > New JavaScript file**. Provide\
    \ the name for the file. In this example, let’s name the file `DataSharingDemo.js`.\n\
    \n```javascript\n(function () {\n    \"use strict\";\n\n    function GetControl()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var dataTransferManager\
    \ = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \        });\n    }\n\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n```\n\nImplement the `shareDataHandler` function by copying the following\
    \ code:\n\n```javascript\nfunction shareDataHandler(e) {\n    var request = e.request;\n\
    \    \n    // The request.data.properties.title is mandate\n    var name = document.getElementById(\"\
    txttitle\").value;\n    var person = {\n        \"type\": \"http://schema.org/Person\"\
    ,\n        \"properties\":\n        {\n            \"name\": name,\n         \
    \   \"jobtitle\": document.getElementById(\"txtjobtitle\").value\n        }\n\
    \    };\n    person = JSON.stringify(person);\n    request.data.properties.title\
    \ = name;\n    request.data.properties.description = name;\n    request.data.setData(\"\
    http://schema.org/Person\", person);\n}\n```\n\nThe code in the preceding function\
    \ implements the sharing of the custom data. The `person` object is defined as\
    \ a JSON string that sets properties like name and job title, as `schema.org`\
    \ supports both JSON and XML format.\n\nNow let’s create another project and implement\
    \ code to receive custom data.\n\nCreate a new project using the Windows Universal\
    \ (Blank App) template in Microsoft Visual Studio 2015.\n\nFirst, add the following\
    \ code to `default.html`. You need to replace the `body` tag with the following\
    \ code.\n\n```html\n<body class=\"win-type-body\">\n    <textarea class=\"text-box\"\
    \ id=\"txtconent\" rows=\"4\" cols=\"50\" />\n    <br />\n    <br />\n</body>\n\
    ```\n\nNow, right-click the project in Solution Explorer and select **Add > New\
    \ JavaScript file**. Provide the name for the file. In this example, let’s name\
    \ the file `DataSharingDemo.js`.\n\n```javascript\n(function () {\n    \"use strict\"\
    ;\n\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            // Initialize the activation handler\n            WinJS.Application.addEventListener(\"\
    activated\", activatedShareHandler, false);\n        });\n    }\n\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\nImplement the `activatedShareHandler`\
    \ function by copying the following code:\n\n```javascript\nfunction activatedShareHandler(eventObject)\
    \ {\n    if (eventObject.detail.kind === Windows.ApplicationModel.Activation.ActivationKind.shareTarget)\
    \ {\n        eventObject.setPromise(WinJS.UI.processAll());\n        \n      \
    \  // ShareOperation object is initialized with the eventObject event argument\n\
    \        shareOperation = eventObject.detail.shareOperation;\n        \n     \
    \   if (shareOperation.data.contains(\"http://schema.org/Person\")) {\n      \
    \      shareOperation.data.getTextAsync(\"http://schema.org/Person\").done(function\
    \ (customFormatString) {\n                var customFormatObject = JSON.parse(customFormatString);\n\
    \                if (customFormatObject) {\n                    // This sample\
    \ expects the custom format to be of type http://schema.org/Person\n         \
    \           if (customFormatObject.type === \"http://schema.org/Person\") {\n\
    \                        customFormatString = \"Type: \" + customFormatObject.type;\n\
    \                        if (customFormatObject.properties) {\n              \
    \              customFormatString += \"\\nName: \" + customFormatObject.properties.name;\n\
    \                            customFormatString += \"\\nNjobtitle: \" + customFormatObject.properties.jobtitle;\n\
    \                        }\n                    }\n                }\n       \
    \         document.getElementById(\"txtconent\").value = customFormatString;\n\
    \            }, function (e) {\n            });\n        }\n    }\n}\n```\n\n\
    This code first checks if the event is fired for the share operation. It then\
    \ initializes `shareOperation = eventObject.detail.shareOperation`. Then it checks\
    \ `shareOperation.data.contains(\"http://schema.org/Person\")`. If it contains\
    \ a Person object, it then calls the `shareOperation.data.getTextAsync` method\
    \ to retrieve the custom data properties. In the success method, it parses the\
    \ JSON string into a variable, as shown here:\n\n`var customFormatObject = JSON.parse(customFormatString);`\n\
    \nFinally, it reads those properties and displays it in the text area. You need\
    \ to deploy this app using the Visual Studio deploy option.\n\nNow run the app,\
    \ which shares the custom data. You are presented with a screen, as shown in Figure\
    \ [10-14](#A978-1-4842-0719-2_10_Chapter.html#Fig14).\n\n![A978-1-4842-0719-2_10_Fig14_HTML.jpg](A978-1-4842-0719-2_10_Fig14_HTML.jpg)\n\
    \n**Figure 10-14.** The app UI that shares a custom data format\n\nNow click the\
    \ **Share** charm or press the Windows logo key ![A978-1-4842-0719-2_10_Figc_HTML.jpg](A978-1-4842-0719-2_10_Figc_HTML.jpg)\
    \ + H. When you select **10.7B_ReceiveCustom_data** app from the list, you see\
    \ the screen shown in Figure [10-15](#A978-1-4842-0719-2_10_Chapter.html#Fig15).\n\
    \n![A978-1-4842-0719-2_10_Fig15_HTML.jpg](A978-1-4842-0719-2_10_Fig15_HTML.jpg)\n\
    \n**Figure 10-15.** The receiver app for the custom data in the Share charm\n\n\
    When you select the app, you are presented with the user interface of the receiver\
    \ app within the Share charm windows, as shown in Figure [10-16](#A978-1-4842-0719-2_10_Chapter.html#Fig16).\n\
    \n![A978-1-4842-0719-2_10_Fig16_HTML.jpg](A978-1-4842-0719-2_10_Fig16_HTML.jpg)\n\
    \n**Figure 10-16.** The receiver app with the received custom data\n\n---\n\n\
    # Chapter 11: Background Tasks\n\nIn any application, you may have to silently\
    \ perform certain tasks in the background. The Universal Windows Platform provides\
    \ a **Background Tasks** feature that lets you run code in the background. A background\
    \ task is nothing but a JavaScript file that the OS runs in the background. A\
    \ background task is usually run against a system trigger that you can subscribe\
    \ to. A background task needs to be declared in the application task. Background\
    \ tasks can report progress, completion, and cancellation to apps through certain\
    \ events.\n\n## 11.1 System Event Triggers for Background Tasks\n\n### Problem\n\
    \nYou have decided to implement a background task in your application. You would\
    \ like to know the various system event triggers that you can subscribe to and\
    \ run a background task when that trigger occurs."
