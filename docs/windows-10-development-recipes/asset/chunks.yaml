    ## 4.2 Using the FlipView Control


    ### Problem


    You need to display only a single item from a collection.


    ### Solution


    Use the FlipView control in WinJS, which displays only a single item from the
    collection at a time. A use case of the FlipView control is a photo gallery app,
    where a user can select an image and then swipe through the list of images.


    Although only one item is displayed at a time, the FlipView control displays arrows,
    which lets you to move to the next or the previous item in the data source.


    You can add the ListView control to the page by setting the `data-win-control`
    attribute of the `div` element with the WinJS.UI.ListView value.'
