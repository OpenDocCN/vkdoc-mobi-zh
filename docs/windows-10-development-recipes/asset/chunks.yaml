    [13-3](#A978-1-4842-0719-2_13_Chapter.html#Fig3). Complete the mobile service
    creation.


    ![A978-1-4842-0719-2_13_Fig3_HTML.jpg](A978-1-4842-0719-2_13_Fig3_HTML.jpg)


    Figure 13-3.


    New Mobile Service database settings dialog   Within a few minutes, the mobile
    service is ready and displayed in the Mobile Service overview screen.  


    You can also use Visual Studio 2015 to create the mobile service in Microsoft
    Azure. To create a mobile service from Visual Studio 2015, follow these steps:


    Launch Visual Studio 2015 and open the Server Explorer window.   In the Server
    Explorer window, right-click Azure and select Connect to Microsoft Azure… in the
    context menu, as seen in Figure [13-4](#A978-1-4842-0719-2_13_Chapter.html#Fig4).
    Provide your Microsoft Azure login credentials. This imports the Azure subscription
    to Visual Studio.


    ![A978-1-4842-0719-2_13_Fig4_HTML.jpg](A978-1-4842-0719-2_13_Fig4_HTML.jpg)


    Figure 13-4.


    Connect to Azure from the Visual Studio Server Explorer window   The next step
    is to create the mobile service from Server Explorer. Right-click Mobile Services
    and select Create Service, as demonstrated in Figure [13-5](#A978-1-4842-0719-2_13_Chapter.html#Fig5).


    ![A978-1-4842-0719-2_13_Fig5_HTML.jpg](A978-1-4842-0719-2_13_Fig5_HTML.jpg)


    Figure 13-5.


    Create a Service from Visual Studio 2015   In the Create Mobile Service dialog,
