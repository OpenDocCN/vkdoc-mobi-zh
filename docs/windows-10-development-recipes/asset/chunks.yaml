    Kumar (project manager, Trivium eSolutions), Jayaprakash (principal engineering
    manager, Cleartrip) who have been very much supportive of me in writing this book.
    I also need to thank my coauthors and friend Lohith GN, and the Apress team.


    > —Senthil Kumar


    To Dad, Mom, my wife, Rashmi, and my son, Adithya.


    > —Lohith GN


    Writing a book was not an easy task for me. It takes a lot of time and lot of
    support. Thanks to my wife for her endless support. I also need to thank coauthor
    and friend Pathik Rawal, and the talented team of editors and reviewers at Apress.
    It would have not been completed without your collaboration.


    > —Pryank Rohilla


    I wish to personally thank the following people for their contributions to my
