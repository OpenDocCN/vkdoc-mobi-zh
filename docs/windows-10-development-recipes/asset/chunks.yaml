    [Chapter 13](#A978-1-4842-0719-2_13_Chapter.html): In this chapter, you learn
    about the integration of Microsoft Azure Mobile Services in your Universal Windows
    Platform app. This includes recipes that explain how to create the mobile services
    back end in Azure and how you can connect from your app to perform CRUD operations.


    [Chapter 14](#A978-1-4842-0719-2_14_Chapter.html): This chapter provides insights
    about the tiles and notifications features of Windows 10\. Here you learn about
    the creation of default tiles, adaptive tiles, and toast notifications.


    [Chapter 15](#A978-1-4842-0719-2_15_Chapter.html): In this chapter, you’ll explore
    the various device capabilities and sensors in your Windows device and how you
    can use them in your UWP app.


    [Chapter 16](#A978-1-4842-0719-2_16_Chapter.html): In this chapter, you’ll learn
    about additional tools, like the JavaScript Console window, DOM Explorer, diagnostic
    tools, the Windows 10 Mobile emulator, and more. These tools let developers easily
    debug and test their Windows apps.


    [Chapter 17](#A978-1-4842-0719-2_17_Chapter.html): In this chapter, you’ll explore
    sideloading and installing your Windows app on devices. You’ll learn about using
    the Windows App Certification Kit to test your app and generate reports to see
    if it is ready for the Windows Store.


    [Chapter 18](#A978-1-4842-0719-2_18_Chapter.html): Once app development is complete,
    you need to submit it to the Windows Store so that users can download your app.
    In this chapter, you’ll learn how to create the application package and submit
    it to the Store. You will also learn how to monetize your Windows app.


    ## Source Code


    The source code for this book can be found at [`www.apress.com/9781484207208`](http://www.apress.com/9781484207208)
    . Scroll down and select the Source Code/Downloads tab to view the Download link.


    Acknowledgments


    Writing a book is a challenging task that takes lot of time and effort. This requires
    tremendous support from family and friends. Thanks to my parents for their endless
