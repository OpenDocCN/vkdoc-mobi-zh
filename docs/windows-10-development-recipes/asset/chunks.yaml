    \ 类型的 `tileUpdater` 对象，然后调用 `addToSchedule` 方法，在设定的时间发送更新。\n\n为了执行上述方法，需添加一个 HTML\
    \ 按钮，并绑定一个事件处理程序来调用该方法。打开 `default.html`，添加以下 HTML 代码片段，以创建一个文本为“Scheduled Adaptive\
