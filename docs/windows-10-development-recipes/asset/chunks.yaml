    data-win-bind="innerText: age"></span></h2>`         `<h3>Designation:</h3>`         `<h2><span
    data-win-bind="innerText: designation"></span></h2>`         `<h3>City:</h3>`
            `<h2><span data-win-bind="innerText: city"></span> </h2>`         `<h3>Fav
    Color:</h3>`         `<div data-win-bind="style.background: favcolor" >`             `<div
