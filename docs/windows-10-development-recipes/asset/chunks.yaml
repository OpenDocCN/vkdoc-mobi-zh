    \n#### 在 Windows Phone 10 模拟器上运行应用\n\n在 Visual Studio 中，从目标组合框中选择一个可用的 Windows\
    \ 10 模拟器。图 1-6 显示了可用的模拟器列表。\n\n![A978-1-4842-0719-2_1_Fig6_HTML.jpg](img/A978-1-4842-0719-2_1_Fig6_HTML.jpg)\n\
    \n**图 1-6.** 目标 Windows Phone 10 模拟器\n\n按下 **F5** 在选定的 Windows Phone 10 模拟器上运行应用。图\
    \ 1-7 显示了 4 英寸 Windows Phone 10 上的屏幕截图。\n\n![A978-1-4842-0719-2_1_Fig7_HTML.jpg](img/A978-1-4842-0719-2_1_Fig7_HTML.jpg)\n\
    \n**图 1-7.** Windows Phone 10 模拟器上的 UWP 应用\n\n#### 在 Windows 10 模拟器上运行应用\n\n在\
    \ Visual Studio 中，从目标组合框中选择**模拟器**。此选项允许你将应用部署到 Windows 10 模拟器（见图 1-8）。\n\n![A978-1-4842-0719-2_1_Fig8_HTML.jpg](img/A978-1-4842-0719-2_1_Fig8_HTML.jpg)\n\
    \n**图 1-8.** 目标 Windows 10 模拟器\n\n按下 **F5** 在 Windows 10 模拟器上运行应用。图 1-9 是应用在模拟器上外观的屏幕截图。\n\
    \n![A978-1-4842-0719-2_1_Fig9_HTML.jpg](img/A978-1-4842-0719-2_1_Fig9_HTML.jpg)\n\
    \n**图 1-9.** Windows 10 模拟器上的 UWP 应用\n\n#### 在本地计算机上运行应用\n\n通常，Windows 10 应用需要从\
    \ Windows 商店下载然后安装到你的计算机上。但此工作流仅适用于最终用户，不适用于开发人员。在应用开发期间，开发人员可以直接在其开发机器上部署和运行自己的应用。\n\
    \n在本地计算机上运行应用之前，你需要启用所谓的**开发人员模式**。\n\n在你的计算机上，转到 **设置 ➤ 更新和安全 ➤ 针对开发人员**，如图 1-10\
    \ 所示。\n\n选择 **开发人员模式** 单选按钮。\n\n![A978-1-4842-0719-2_1_Fig10_HTML.jpg](img/A978-1-4842-0719-2_1_Fig10_HTML.jpg)\n\
    \n**图 1-10.** 开发人员功能设置\n\n在 Visual Studio 中，从目标组合框中选择**本地计算机**，如图 1-11 所示。\n\n\
    ![A978-1-4842-0719-2_1_Fig11_HTML.jpg](img/A978-1-4842-0719-2_1_Fig11_HTML.jpg)\n\
    \n**图 1-11.** 目标本地计算机\n\n按下 **F5** 在你的开发机器上运行应用。图 1-12 是应用在本地计算机上运行的屏幕截图。\n\n\
    ![A978-1-4842-0719-2_1_Fig12_HTML.jpg](img/A978-1-4842-0719-2_1_Fig12_HTML.jpg)\n\
    \n**图 1-12.** 本地计算机上的 UWP 应用\n\n#### 在设备上运行应用\n\n如果你有 Windows 10 Mobile 设备，你可以直接在其上部署和运行你的\
    \ UWP 应用。但是，在你可以直接从 Visual Studio 将应用部署到设备之前，你需要启用你的手机以允许在开发期间安装应用。这也称为旁加载应用。此模式称为**开发人员模式**，并且是手机设置。在你的\
    \ Windows Phone 10 设备上，转到 **设置 ➤ 更新和安全 ➤ 针对开发人员**。选择**开发人员模式**，如图 1-13 所示。完成此步骤后，你的应用就可以直接从\
    \ Visual Studio 部署到你的设备上。\n\n![A978-1-4842-0719-2_1_Fig13_HTML.jpg](img/A978-1-4842-0719-2_1_Fig13_HTML.jpg)\n\
    \n**图 1-13.** Windows Phone 设备上的开发人员模式设置\n\n在 Visual Studio 中，选择**设备**作为你的目标，如图\
    \ 1-14 所示。\n\n![A978-1-4842-0719-2_1_Fig14_HTML.jpg](img/A978-1-4842-0719-2_1_Fig14_HTML.jpg)\n\
    \n**图 1-14.** 目标设备\n\n接下来，按下 **F5** 在你的设备上运行应用。输出应与你在模拟器中看到的类似。\n"
- fmt: "# Chapter 2: WinJS Fundamentals\n\nWhen building an app using a library for\
    \ the platform, it is important to understand the features that the library provides.\
    \ In this chapter, you’ll look at various features that WinJS provides for building\
    \ Windows Runtime apps using JavaScript, HTML, and CSS. These features include\
    \ namespaces, modules, promises, and query selectors. These are features used\
    \ in almost all the applications that you build using WinJS. By taking advantage\
    \ of the features like namespaces and modules, you can make your app easier to\
    \ maintain, instead of adding everything under the global namespace.\n\n## 2.1\
    \ Namespaces in JavaScript\n\n### Problem\n\nYou need to group common functionalities\
    \ and prevent naming collisions in your JavaScript code when developing using\
    \ the WinJS library.\n\n### Solution\n\nNamespaces allow developers to better\
    \ group or organize common functionalities. The other programming languages—C#,\
    \ VB.NET, Java, and so forth—provide this feature. Plenty of JavaScript frameworks\
    \ do not support namespaces, but WinJS provides a feature in which developers\
    \ can utilize the namespaces in their projects. Namespaces can come in handy,\
    \ especially when your app utilizes multiple libraries written by various developers.\n\
    \nDevelopers can use the `WinJS.Namespace.define` method to declare a namespace.\n\
    \n### How It Works\n\nThe WinJS library lets developers declare namespaces by\
    \ using the `WinJS.Namespace.define` method.\n\nThe `WinJS.Namespace.define` method\
    \ takes two parameters.\n\n*   `Name`: This is the first parameter and represents\
    \ the name of the new namespace.\n*   `Members`: This is the second parameter\
    \ and it is completely optional. This parameter represents the list of objects\
    \ that need to be added to the namespace being defined.\n\nThe following are the\
    \ steps to create a new namespace in a Windows Store universal app using WinJS.\n\
    \nLaunch Visual Studio 2015 and select File ➤ New Project. In the New Project\
    \ dialog, select JavaScript ➤ Windows ➤ Universal from the Installed Templates\
    \ sidebar. Select Blank App (Universal Windows) from the template and name the\
    \ project `ch2.1WinJSFundamentals`. Click the OK button. This created the necessary\
    \ files within the Visual Studio solution.\n\nAdd a new JavaScript file in the\
    \ `ch2.1WinJSFundamentals` project by right-clicking the project’s `js` folder\
    \ and selecting the Add ➤ New Item option. Select the JavaScript file from the\
    \ Add New Item dialog and name the file `WinJSFundamentals.js`. Add the following\
    \ code to the file.\n\n```\n// Define the Namespace Developerpublish\nWinJS.Namespace.define(\"\
    DeveloperPublish\");\n// Utilities created in the DeveloperPublish Namespace\n\
    DeveloperPublish.Utilities = {\n    DisplayMessage: function () {\n        return\
    \ \"Message from DeveloperPublish Namespace\";\n    }\n};\n// Define the Namespace\
    \ Apress and create the Utilities under it.\nWinJS.Namespace.define(\"Apress\"\
    ,\n    {\n        Utilities: {\n            DisplayMessage: function () {\n  \
    \              return \"Message from Apress Namespace\";\n            }\n    \
    \    }\n    });\nconsole.log(DeveloperPublish.Utilities.DisplayMessage());\nconsole.log(Apress.Utilities.DisplayMessage());\n\
    ```\n\nIn the preceding code snippet, the `DeveloperPublish` namespace demonstrates\
    \ the usage of the `WinJS.Namespace.define` method with a single parameter. The\
    \ objects are added to the namespaces, with the namespace followed by a period\
    \ and the name of the object.\n\nThe `Apress` namespace is created with the two\
    \ parameters. The first parameter is the name of the namespace, `Apress`; whereas\
    \ the second parameter is the object that is part of the `Apress` namespace.\n\
    \nOpen the `default.html` page and add the reference to the `WinJSFundamentals.js`\
    \ file by using the following code snippet: `<script src=\"js/WinJSFundamentals.js\"\
    ></script>`\n\nRun the Windows app. You will notice that the string that is returned\
    \ from `DisplayMessage` of the `Utilities` class is displayed in the console window,\
    \ as shown in Figure [2-1](#A978-1-4842-0719-2_2_Chapter.html#Fig1).\n\n![A978-1-4842-0719-2_2_Fig1_HTML.jpg](A978-1-4842-0719-2_2_Fig1_HTML.jpg)\n\
    \nFigure 2-1. Display the string in the Visual Studio 2015 console window\n\n\
    `WinJS.Namespace` is the default namespace that provides functionalities like:\n\
    \n*   The `promise` object\n*   Functions to define namespaces, `log`, and `xhr`.\n\
    \nThe following are objects and functions that are part of `WinJS.Namespace`:\n\
    \n*   `promise`: This object provides the mechanism to implement asynchronous\
    \ programming in your JavaScript code.\n*   `validation`: This property can be\
    \ set to display the results of the validation.\n*   `define`: This function defines\
    \ a new namespace with the specified name.\n*   `defineWithParent`: This function\
    \ defines a namespace with a specified name under a specified parent namespace.\n\
    *   `log`: This function writes the output to the JavaScript console window in\
    \ Visual Studio 2015.\n*   `xhr`: This function wraps the calls made to the `XMLHttpRequest`\
    \ in a promise.\n\nNote that you should not refer to a namespace before it is\
    \ defined. When you try to access the namespace before it is defined, you receive\
    \ a “Namespace is undefined” error.\n\nThe Namespace feature is included in the\
    \ WinJS library to better handle problems related to the scope. The source code\
    \ for the Namespaces implementation in WinJS is found in the `base.js` file, which\
    \ is under the `WinJS/js` folder of your project.\n\n## 2.2 Add a Namespace to\
    \ an Existing Namespace\n\n### Problem\n\nYou need to add a namespace to the existing\
    \ namespace and define your functionalities.\n\n### Solution\n\nUse the `WinJS.Namespace.defineWithParent`\
    \ method to add a namespace to an existing namespace in WinJS.\n\n### How It works\n\
    \nThe `WinJS.Namespace.defineWithParent` method lets developers add a new namespace\
    \ to an existing namespace. This is similar to the `define` method; it lets you\
    \ create a new namespace under an existing one.\n\nThe `WinJS.Namespace.defineWithParent`\
    \ method accepts three parameters:\n\n*   Parent namespace: The first parameter\
    \ is the name of the parent namespace.\n*   Name: This is the name of the namespace\
    \ to be added to the parent namespace.\n*   Members: The list of objects to be\
    \ added to the new namespace. This is an optional parameter.\n\nLet’s use the\
    \ recipe created in Recipe 2.1. Open the `WinJSFundamentals.js` file in the project\
    \ and replace it with the following code snippet.\n\n```\nWinJS.Namespace.define(\"\
    Apress\");\nWinJS.Namespace.defineWithParent(Apress, \"Books\" ,\n    {\n    \
    \    Utilities :\n            {\n                DisplayMessage: function () {\n\
    \                    return \"Message from Apress.Books Namespace\";\n       \
    \         }\n            }\n    }\n);\nconsole.log(Apress.Books.Utilities.DisplayMessage());\n\
    ```\n\nRun the Windows Store project and you should see the string “Message from\
    \ Apress.Books Namespace” displayed in the Visual Studio JavaScript console window,\
    \ as shown in Figure [2-2](#A978-1-4842-0719-2_2_Chapter.html#Fig2).\n\n![A978-1-4842-0719-2_2_Fig2_HTML.jpg](A978-1-4842-0719-2_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2. Display the string in the JavaScript console window in Visual Studio\
    \ 2015\n\nNote that the namespaces should only contain classes, functions, constants,\
    \ and other namespaces.\n\n## 2.3 Creating a Class in WinJS\n\n### Problem\n\n\
    You need to create a class in the JavaScript code within your Windows Runtime\
    \ apps.\n\n### Solution\n\nUse the `WinJS.Class.define` method to create a class\
    \ in WinJS."
