    \ 中从一个类派生另一个类。\n\n### 工作原理\n\nWinJS 库提供了 `WinJS.Class.derive` 方法，允许开发者应用继承来从一个类派生另一个类。`WinJS.Class.derive`\
    \ 方法接受以下参数。\n\n-   **基类**：当前类需要继承的类。\n-   **构造函数**：此参数指向一个 `构造函数` 函数，可用于初始化类成员。\n\
    -   **实例成员**：此参数定义实例成员，包括属性和方法。\n-   **静态成员**：此参数定义静态属性和静态方法。\n\n打开 `WinJSFundamentals.js`\
    \ 文件并将代码替换为以下代码片段。\n\n```\n// Create a class called Employee\n\nvar Employee =\
    \ WinJS.Class.define(\n\n    function () {\n\n        this.name = name;\n\n  \
    \      this.type = \"Employee\";\n\n    },\n\n    {\n\n        _Name: undefined,\n\
    \n        _type: undefined,\n\n        name : {\n\n            set :function(value)\n\
    \n            {\n\n                this._Name = value;\n\n            },\n\n \
    \           get :function()\n\n            {\n\n                return this._Name;\n\
    \n            }\n\n        },\n\n        type: {\n\n            set :function(value)\n\
