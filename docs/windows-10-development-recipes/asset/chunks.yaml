    \ select Store ➤ Open Developer Account (see Figure 18-1).\n\n![A978-1-4842-0719-2_18_Fig1_HTML.jpg](A978-1-4842-0719-2_18_Fig1_HTML.jpg)\
    \  \n*Figure 18-1. Open a developer account from Visual Studio*\n\nThis action\
