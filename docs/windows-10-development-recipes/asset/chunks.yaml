    \ = groupedEmployees.groups.dataSource;\n            listView1.itemDataSource\
    \ = groupedEmployees.dataSource;\n            listView2.itemDataSource = groupedEmployees.groups.dataSource;\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", Initialize);\n\
    })();\n```\n\n运行应用程序时，您将看到如图 4-9 所示的界面。\n\n![A978-1-4842-0719-2_4_Fig9_HTML.jpg](img/A978-1-4842-0719-2_4_Fig9_HTML.jpg)\n\
    \n图 4-9.\n\n默认视图下的语义缩放\n\n点击屏幕右上角显示的“-”按钮，或使用拉伸手势进行缩小。\n\n替代视图如图 4-10 所示。\n\n\
    ![A978-1-4842-0719-2_4_Fig10_HTML.jpg](img/A978-1-4842-0719-2_4_Fig10_HTML.jpg)\n\
    \n图 4-10.\n\n使用语义缩放显示替代的 ListView\n\n## 使用 AppBar 控件\n\n### 问题\n\n你需要提供对与当前页面或当前所选内容相关的常见任务的快速访问。\n\
    \n### 解决方案\n\n你可以通过向页面添加应用栏，来提供对与当前页面或当前所选内容相关的常见任务的快速访问。可以通过为 `div` 元素设置 `data-win-control=\"\
    WinJS.UI.AppBar\"` 属性，将 `AppBar` 控件添加到页面中。\n"
- fmt: "# How It Works\n\nThe app bar is a row that contains icon buttons and an ellipsis\
    \ at the bottom of the app screen. When the user taps on the ellipsis, it displays\
    \ the labeled icon buttons and menu items that are available.\n\nThe following\
    \ is the syntax to add the `AppBar` control to the HTML page.\n\n```\n<div data-win-control=\"\
    WinJS.UI.AppBar\"></div>\n```\n\nThe `AppBar` control can be added using JavaScript\
    \ code as well as using the following syntax.\n\n```\nvar object = new WinJS.UI.AppBar(element,\
    \ options);\n```\n\n`AppBarCommand` is added within the `AppBar`. This is simply\
    \ the command or the buttons displayed within the `AppBar`.\n\n```\n<button data-win-control=\"\
    WinJS.UI.AppBarCommand\"></button>\n```\n\nYou can specify if the `AppBarCommand`\
    \ should be displayed as a menu by setting the section property to `secondary`\
    \ for the `data-win-options` attribute of the control.\n\nLet’s create an app\
    \ that demonstrates the functionality of the `AppBar`, which includes the following\
    \ functionalities.\n\n*   `AppBarCommands` (buttons) to demonstrate the Add and\
    \ Remove options.\n*   `AppBarCommands` (menu items) to demonstrate the menu items\
    \ displayed when the user taps on the ellipsis.\n\nWhen the user taps on a button\
    \ or a menu item, the corresponding events are handled and an appropriate message\
    \ is displayed.\n\nCreate a new Universal Windows project in Visual Studio 2015\
    \ and open the `default.html` page. Replace its content with the following code.\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.7</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe4.7 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    \    <script src=\"/js/appbarevents.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <div id=\"appBar\" data-win-control=\"WinJS.UI.AppBar\">\n        <button\
    \ data-win-control=\"WinJS.UI.AppBarCommand\"\n                data-win-options=\"\
    {id:'cmdAdd', label:'Add', icon:'add', section:'primary', tooltip:'Add'}\"></button>\n\
    \        <button data-win-control=\"WinJS.UI.AppBarCommand\"\n               \
    \ data-win-options=\"{id:'cmdRemove', label:'Remove', icon:'remove', section:'primary',\
    \ tooltip:'Remove'}\"></button>\n        <button data-win-control=\"WinJS.UI.AppBarCommand\"\
    \n                data-win-options=\"{id:'cmdCamera', label:'Click Photo', icon:'camera',\
    \ section:'secondary', tooltip:'click'}\"></button>\n    </div>\n    <div id=\"\
    Message\"></div>\n</body>\n</html>\n```\n\nThe HTML markup adds the two `AppBarCommands`\
    \ (Add, Remove) in the primary section and one `AppBarCommand` (Camera) in the\
    \ secondary menu. The `data-win-options` attribute provides additional options\
    \ for the controls. Some of these properties include the following:\n\n*   `Id`:\
    \ This uniquely identifies the `AppBarCommand`.\n*   `label`: The content displayed\
    \ in the `AppBarCommand`.\n*   `icon`: The built-in icons for the `AppBarCommand`.\n\
    *   `section`: The section within the `AppBar` where the command should be displayed.\
    \ This value can be `primary` or `secondary`.\n*   `tooltip`: The text to be displayed\
    \ when you mouse-over the command button.\n\nNote that the page contains the reference\
    \ to the `appbarevents.js` JavaScript file. This contains the logic to handle\
    \ the events on the `AppBarCommands`. Let’s create a new JavaScript file in the\
    \ project under the `js` folder and name it as `appbarevents.js`. Add the following\
    \ code to it.\n\n```\n(function () {\n    \"use strict\";\n    WinJS.UI.Pages.define(\"\
    default.html\", {\n        ready: function (element, options) {\n            element.querySelector(\"\
    #cmdAdd\").addEventListener(\"click\", AddMethod, false);\n            element.querySelector(\"\
    #cmdRemove\").addEventListener(\"click\", RemoveMethod, false);\n            element.querySelector(\"\
    #cmdCamera\").addEventListener(\"click\", CameraMethod, false);\n        }\n \
    \   });\n    // Command button functions\n    function AddMethod() {\n       \
    \ var message = new Windows.UI.Popups.MessageDialog(\"Add Button Pressed\");\n\
    \        message.showAsync();\n    }\n    function RemoveMethod() {\n        var\
    \ message = new Windows.UI.Popups.MessageDialog(\"Remove button pressed\");\n\
    \        message.showAsync();\n    }\n    function CameraMethod() {\n        var\
    \ message = new Windows.UI.Popups.MessageDialog(\"Camera button pressed\");\n\
    \        message.showAsync();\n    }\n})();\n```\n\nThe preceding JavaScript code\
    \ handles the click event of the `AppBarCommand` buttons. On click of the button,\
    \ it displays a message.\n\nRun the app on Windows. You should see the screen\
    \ shown in Figure [4-11](#A978-1-4842-0719-2_4_Chapter.html#Fig11).\n\n![A978-1-4842-0719-2_4_Fig11_HTML.jpg](A978-1-4842-0719-2_4_Fig11_HTML.jpg)\n\
    \nFigure 4-11.\n\nWindows app with the `AppBar`\n\nClick the ellipsis button in\
    \ the app bar, which displays the secondary section, as shown in Figure [4-12](#A978-1-4842-0719-2_4_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0719-2_4_Fig12_HTML.jpg](A978-1-4842-0719-2_4_Fig12_HTML.jpg)\n\
    \nFigure 4-12.\n\nWindows app with the `AppBar` and secondary section\n\nWhen\
    \ you click the menu button, it displays an appropriate message.\n\n## Using the\
    \ ToolBar Control\n\n### Problem\n\nYou need to display a set of commands that\
    \ can appear in any location; for example, flyouts or an app bar at the top of\
    \ the screen.\n\n### Solution\n\nYou can use the `ToolBar` control to display\
    \ as many commands as possible in the action area. This control is not constrained\
    \ to a single location within the app. It can be found in the splitView, Flyouts,\
    \ and so forth."
