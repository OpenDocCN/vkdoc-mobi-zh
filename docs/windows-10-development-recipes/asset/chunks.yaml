    \ 方法负责此操作。参数 `position` 的类型是 `Geolocation`，可用于获取当前位置信息，例如纬度、经度、精度等。\n\n下一步是构建项目并在模拟器或本地计算机上运行它。选择“生成”菜单，然后从\
    \ Visual Studio 中选择“生成解决方案”来构建项目。在 Visual Studio 标准工具栏上，从“运行”下拉菜单中选择“移动设备模拟器”。\n\
    \n当你在 Windows 上首次运行该应用时，系统会提示你确认是否允许使用你的位置。单击“允许”，以便应用可以使用位置信息。\n\n在应用程序中，单击“获取位置”按钮以显示当前位置的纬度和经度，如图\
    \ 12-2 所示。\n\n![A978-1-4842-0719-2_12_Fig2_HTML.jpg](img/A978-1-4842-0719-2_12_Fig2_HTML.jpg)\n\
    \n图 12-2. Windows 移动应用中的当前位置\n\n当你在本地计算机上点击该应用时，会收到一条消息提示，如图 12-3 所示。单击“允许”按钮。这将显示当前位置（见图\
    \ 12-4）。\n\n![A978-1-4842-0719-2_12_Fig4_HTML.jpg](img/A978-1-4842-0719-2_12_Fig4_HTML.jpg)\n\
    \n图 12-4. Windows 桌面系列应用中的当前位置\n\n![A978-1-4842-0719-2_12_Fig3_HTML.jpg](img/A978-1-4842-0719-2_12_Fig3_HTML.jpg)\n\
    \n图 12-3. Windows 桌面系列应用中的允许当前位置提示\n\n**注意**  \n请确保在您的 Windows 设备上启用了定位服务，以便获取当前位置。\n\
    \n## 12.2 响应地理定位器位置更新\n\n### 问题\n\n您希望频繁检查应用内位置是否发生变化。\n\n### 解决方案\n\n使用在 `Windows.Devices.Geolocation`\
    \ 命名空间中定义的 `Geolocator` 类的 `getGeopositionAsync` 方法。订阅 `PositionChanged` 和 `LocationChanged`\
    \ 事件，以跟踪位置变化，并从 Windows 移动版或桌面系列应用做出响应。\n"
- fmt: "### How It Works\n\nCreate a new Universal Windows project using the Universal\
    \ Windows template, which can be found under `JavaScript` > `Windows` > `Universal`\
    \ node of the New Project dialog in Microsoft Visual Studio 2015. This creates\
    \ a single project in the Visual Studio Solution with the necessary files in it\
    \ to start with.\n\nEnable the `Location` capability in the `package.appxmanifest`\
    \ file in the project.\n\nOpen the `default.html` file from Visual Studio Solution\
    \ Explorer, and then add the following code under the `body` tag of each file.\n\
    \n```html\n<div>\n    <button id=\"start\">Start Tracking</button><br />\n   \
    \ <br />\n    <button id=\"stop\">Stop Tracking</button><br />\n</div>\n<br />\n\
    <div>\n    <table>\n        <tr>\n            <td>\n                Latitude\n\
    \            </td>\n            <td>\n                <div id=\"latitude\">\n\
    \                </div>\n            </td>\n        </tr>\n        <tr>\n    \
    \        <td>\n                Longitude\n            </td>\n            <td>\n\
    \                <div id=\"longitude\">\n                </div>\n            </td>\n\
    \        </tr>\n        <tr>\n            <td>\n                Accuracy\n   \
    \         </td>\n            <td>\n                <div id=\"accuracy\">\n   \
    \             </div>\n            </td>\n        </tr>\n        <tr>\n       \
    \     <td>\n                <div id=\"Status\"></div>\n            </td>\n   \
    \     </tr>\n    </table>\n</div>\n```\n\nThe preceding HTML code is similar to\
    \ the code in the Recipe 12.1, but includes an additional `div` tag to display\
    \ the status.\n\nOpen `default.js` (`/js/default.js`) in the project from Visual\
    \ Studio Solution Explorer and replace the code in the file with the following:\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    var app = WinJS.Application;\n\
    \    var activation = Windows.ApplicationModel.Activation;\n    app.onactivated\
    \ = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                 done(function () {\n                     // Add an event handler\
    \ to the button.\n                     document.querySelector(\"#start\").addEventListener(\"\
    click\",\n                         Starttracking);\n                     // Add\
    \ an event handler to the button.\n                     document.querySelector(\"\
    #stop\").addEventListener(\"click\",\n                         Stoptracking);\n\
    \                 }));\n        }\n    };\n    var geolocation = null;\n    //\
    \ Start tracking\n    function Starttracking() {\n        if (geolocation == null)\n\
    \        {\n            geolocation = new Windows.Devices.Geolocation.Geolocator();\n\
    \            geolocation.reportInterval = 100;\n        }\n        if (geolocation\
    \ != null)\n        {\n            geolocation.addEventListener(\"positionchanged\"\
    , onPositionChanged);\n            geolocation.addEventListener(\"statuschanged\"\
    , onStatusChanged);\n        }\n    }\n    // On change of location position ,\
    \ update the UI\n    function onPositionChanged(args) {\n        document.getElementById('latitude').innerHTML\
    \ = args.position.coordinate.point.position.latitude;\n        document.getElementById('longitude').innerHTML\
    \ = args.position.coordinate.point.position.longitude;\n        document.getElementById('accuracy').innerHTML\
    \ = args.position.coordinate.accuracy;\n    }\n    // Stop the tracking\n    function\
    \ Stoptracking()\n    {\n        if (geolocation != null) {\n            geolocation.removeEventListener(\"\
    positionchanged\", onPositionChanged);\n        }\n    }\n    // event handler\
    \ for the Status Changed method.\n    function onStatusChanged(args) {\n     \
    \   var Status = args.status;\n        document.getElementById('Status').innerHTML\
    \ =\n            getStatus(Status);\n    }\n    // Gets the status\n    function\
    \ getStatus(Status) {\n        switch (Status) {\n            case Windows.Devices.Geolocation.PositionStatus.ready:\n\
    \                return \"Ready\";\n                break;\n            case Windows.Devices.Geolocation.PositionStatus.initializing:\n\
    \                return \"Initializing\";\n                break;\n          \
    \  case Windows.Devices.Geolocation.PositionStatus.disabled:\n               \
    \ return \"Location is disabled . Check the Location settings in your device or\
    \ Appxmanifest file\";\n                break;\n            case Windows.Devices.Geolocation.PositionStatus.notInitialized:\n\
    \                return \"Not Initialized\";\n            default:\n         \
    \       return \"Status us unknown\";\n        }\n    }\n    app.oncheckpoint\
    \ = function (args) {\n    };\n    app.start();\n})();\n```\n\nThe first step\
    \ is to add the click event handler for the Start Tracking and the Stop Tracking\
    \ buttons. The `document.querySelector` is used to add the event listener.\n\n\
    ```javascript\ndocument.querySelector(\"#start\").addEventListener(\"click\",Starttracking);\n\
    document.querySelector(\"#stop\").addEventListener(\"click\",Stoptracking);\n\
    ```\n\nA new instance of the `Geolocator` class is created in the `Starttracking`\
    \ method and the `reportInterval` is set. The `reportInterval` defines the minimum\
    \ time interval between location updates, in milliseconds.\n\n```javascript\n\
    geolocation = new Windows.Devices.Geolocation.Geolocator();\ngeolocation.reportInterval\
    \ = 100;\n```\n\nThe `positionchanged` and the `statuschanged` event listeners\
    \ are added to the `geolocation` instance:\n\n```javascript\ngeolocation.addEventListener(\"\
    positionchanged\", onPositionChanged);\ngeolocation.addEventListener(\"statuschanged\"\
    , onStatusChanged);\n```\n\nThe `positionchanged` event is raised when there is\
    \ a change in location. The `statuschanged` event is raised when the ability of\
    \ the `Geolocator` to provide updated location changes; for example, if the location\
    \ is disabled or initialized, and so forth. The `getStatus` method returns the\
    \ message based on the `Windows.Devices.Geolocation.PositionStatus`.\n\nWhen you\
    \ don’t need to track the location, just remove the `positionchanged` event listener,\
    \ as follows:\n\n```javascript\ngeolocation.removeEventListener(\"positionchanged\"\
    , onPositionChanged);\n```\n\nNow, build and run the project in the emulator.\n\
    \nIn the app, click the Start Tracking button. The app subscribes for the location\
    \ updates via the `Geolocator`'s `Onpositionchanged` event and displays the location\
    \ information (see Figure 12-5).\n\n![A978-1-4842-0719-2_12_Fig5_HTML.jpg](A978-1-4842-0719-2_12_Fig5_HTML.jpg)\n\
    \n**Figure 12-5.** Location updates using the Windows Mobile emulator’s additional\
    \ tools\n\nWhen the app is run on Windows desktop using the Local Machine option,\
    \ you should see the screen shown in Figure 12-6.\n\n![A978-1-4842-0719-2_12_Fig6_HTML.jpg](A978-1-4842-0719-2_12_Fig6_HTML.jpg)\n\
    \n**Figure 12-6.** Location updates in Windows desktop using Local Machine option\n\
    \n> **Note**  \n> The Windows Mobile emulator provides additional tools that let\
    \ the developer test location-based apps during development, as shown in Figure\
    \ 12-5.\n\n## 12.3 Detect the User’s Location with HTML5\n\n### Problem\n\nYou\
    \ don’t know where you are. The Windows app needs to determine and display your\
    \ current location.\n\n### Solution\n\nApart from the Windows Runtime API, the\
    \ WinJS app can utilize the W3C Geolocation API to detect a user’s current location\
    \ by using HTML5 from the Windows app."
