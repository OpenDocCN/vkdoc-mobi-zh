- fmt: '### How It Works


    Create a new Universal Windows app in Visual Studio 2015 using the JavaScript
    template. Open the `default.html` page.


    Replace the content of the `default.html` page with the following code.


    ```

    <!DOCTYPE html>

    <html>

    <head>

    <meta charset="utf-8" />

    <title>Recipe4.8</title>

    <!-- WinJS references -->

    <link href="WinJS/css/ui-light.css" rel="stylesheet" />

    <script src="WinJS/js/base.js"></script>

    <script src="WinJS/js/ui.js"></script>

    <!-- Recipe4.8 references -->

    <link href="/css/default.css" rel="stylesheet" />

    <script src="/js/default.js"></script>

    </head>

    <body class="win-type-body">

    <div class="basicToolbar" data-win-control="WinJS.UI.ToolBar">

    <!-- Primary commands -->

    <button data-win-control="WinJS.UI.Command" data-win-options="{

    id:''cmdAdd'',

    label:''add'',

    section:''primary'',

    type:''button'',

    icon: ''add'',

    onclick: recipes.clickcommand}"></button>

    <button data-win-control="WinJS.UI.Command" data-win-options="{

    id:''cmdEdit'',

    label:''Edit'',

    section:''primary'',

    type:''button'',

    icon: ''edit'',

    onclick: recipes.clickcommand}"></button>

    <button data-win-control="WinJS.UI.Command" data-win-options="{

    id:''cmdDelete'',

    label:''delete'',

    section:''primary'',

    type:''button'',

    icon: ''delete'',

    onclick: recipes.clickcommand}"></button>

    <!-- Secondary command -->

    <button data-win-control="WinJS.UI.Command" data-win-options="{

    id:''cmdShare'',

    label:''share'',

    section:''secondary'',

    type:''button'',

    onclick: recipes.clickcommand}"></button>

    </div>

    </body>

    </html>

    ```


    The preceding code snippet adds three buttons in the primary command and one button
    (Share) in the secondary command. The secondary command is hidden by default and
    is displayed when you tap the ellipsis button.


    The ToolBar control is added by setting the `data-win-control` attribute of the
    `div` element to the `WinJS.UI.ToolBar` value.


    You can add the buttons inside the toolbar by setting the `data-win-control` attribute
    to the `WinJS.UI.Command` value. The `data-win-options` attribute is used to set
    the command properties. The following are some of the properties set for the command.


    *   `id`: Defines the identifier for the command.

    *   `label`: Defines the text to be displayed for the command.

    *   `section`: Defines the area in the toolbar where the command should appear.
    This can take a primary or secondary value.

    *   `type`: The value is set to “button” to display a button control.

    *   `onClick`: An event that fires and calls the corresponding JavaScript method.

    *   `icon`: Displays a built-in icon for the command.


    Note that we have set the `OnClick` event for the command. Let’s add the event
    for it.


    Open the `default.js` file found under the `js` folder of the project. Add the
    following code before the `args.setPromise` method.


    ```

    WinJS.Namespace.define("recipes", {

    clickcommand: WinJS.UI.eventHandler(function (ev) {

    var command = ev.currentTarget;

    if (command.winControl) {

    var message = Windows.UI.Popups.MessageDialog(command.winControl.label);

    message.showAsync();

    }

    })

    });

    ```


    The preceding code snippet defines the namespace called `recipe` and adds an event
    handler with the name `clickcommand`. This displays a `MessageDialog` when the
    event is invoked.


    Now, let’s run the app on Windows. You should see the screen shown in Figure [4-13](#A978-1-4842-0719-2_4_Chapter.html#Fig13).


    ![A978-1-4842-0719-2_4_Fig13_HTML.jpg](A978-1-4842-0719-2_4_Fig13_HTML.jpg)


    Figure 4-13. Toolbar in Windows app


    When you click the command button, you see a message dialog describing the button
    that was clicked.


    # Chapter 5: Data Binding and Navigation


    Typically, when you look at any application, it is composed of a user interface
    (UI) and an underlying business logic. Data binding is a process in which you
    connect the application UI and the business logic. When data changes its value,
    the elements that are bound to the data reflect the changes automatically and
    when the element value is changed, the underlying data will also be updated and
    reflect the change.


    ## 5.1 Data Bind to Simple Objects


    ### Problem


    As part of the application business logic, you have a simple business object with
    data properties. You want to bind the data properties of the business object to
    HTML elements on the UI.


    ### Solution


    Data binding is provided by the `WinJS.Binding` namespace. It provides the `processAll()`
    method, which binds the value of an object to the values of any DOM element. The
    DOM element will have to use the `data-win-bind` attribute and provide the property
    name to which it needs to be bound.'
