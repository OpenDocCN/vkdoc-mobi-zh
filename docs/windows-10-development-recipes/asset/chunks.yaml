    ## 6.3 Adaptive UI Technique: Fluid Layouts


    ### Problem


    You have created a layout in which you want to show the number of items in a list
    view. But you want the list view to adapt to narrow screens and medium or large
    screens. You want the list view items to be responsive based on screen size.


    ### Solution


    The ListView control in UWP is used in scenarios where you have a number of items
    to display. As the name implies, a list view renders a list on the screen, with
    each item bound to a data item. Each item of the list view can be customized by
    providing a template. ListView also has a concept called Layout. Layout defines
    how the items should be spread out on the screen. It supports two layouts out
    of the box: ListLayout and GridLayout. ListLayout is used for single-column/multiple
    rows renderings. GridLayout renders grid-based layouts (i.e., rows and columns
    occupy the available space on the screen).


    ### How It Works


    Open Visual Studio 2015\. Select File ➤ New Project ➤ JavaScript ➤ Windows Universal
    ➤ Blank App (Universal Windows) template. This creates a universal Windows app
    template (see Figure [6-4](#A978-1-4842-0719-2_6_Chapter.html#Fig4)).


    ![A978-1-4842-0719-2_6_Fig4_HTML.jpg](A978-1-4842-0719-2_6_Fig4_HTML.jpg)


    Figure 6-4.'
