- fmt: '# Chapter 6: Adapting the UI for Different Screens


    With the Universal Windows Platform (`UWP`), you have the benefit of running your
    app on any device in the Windows family. The device family includes phones, tablets,
    laptops, the Xbox, and so forth. There are different screen sizes in the device
    family. The platform does the magic behind the scenes and makes sure that your
    app’s user interface is functional across all devices. Since the platform handles
    things for you under the hood, you aren’t required to do any customization to
    your app to support different screen sizes. But there may be situations where
    you want to provide a specific UI for a specific screen size. For example, when
    your app runs on a phone, you could want a single-column layout; whereas when
    the same app runs on a tablet or PC, you want a two-column layout. This chapter
    looks at how to adapt your UI for different screen sizes.


    If `UWP` apps can run on any Windows 10 device family with any screen size, why
    should you, as an app developer, worry about a tailor-made UI for a specific screen
    size?


    As stated earlier, the platform takes care of making sure that your app’s UI is
    functional across all screen sizes, but you may still have situations where you
    want to customize per the screen that your app is running on. The following points
    are worth noting. They provide insights on why you would want to customize.


    *   **Make effective use of available space and reduce navigation.** When an app’s
    UI is designed to look good on a small screen, the app will be usable on PCs too.
    But there will probably be some wasted space. A better design would be to show
    more content when the screen size is above a certain size. Having more content
    on a bigger screen size reduces the amount of navigation that a user otherwise
    performs.

    *   **Device capability.** Different devices have different capabilities. By customizing
    your app for a specific device, you can take better advantage of the capabilities
    available on this specific device and you can then enable/disable features around
    this.

    *   **Input optimization.** The Control library in the `UWP` works well with all
    input types, including touch, pen, keyboard, and mouse. But you can optimize the
    input for a specific device. For example, navigation is usually provided at the
    bottom of a screen for a phone-based app; whereas a PC user expects the navigation
    to be available at the top of the screen.


    ## 6.1 Design Breakpoints for Different Screens


    ### Problem


    Since you need to support various screen sizes under the Windows 10 device family,
    you would like to know the specific widths to target in your apps.


    ### Solution


    `Breakpoint` is the terminology used in `CSS` (Cascading Style Sheets) to denote
    the size or width of a screen, against which you write the style rules. There
    are a great many device targets and screen sizes available in Windows 10 device
    families. But you don’t have to optimize your UI for each of these device targets
    or screen sizes. Instead, you should design for key screen widths. These key screen
    widths are also known as breakpoints. Let’s look at the breakpoints that you should
    be concerned with.


    *   **Small:** `320epx`. These device targets/screens have an effective pixel
    width of `320`. The typical screen size is 4 to 6 inches. Typically, these devices
    are phones.

    *   **Medium:** `720epx`. These device targets/screens have an effective pixel
    width of `720`. The typical screen size is 6 to 12 inches. Typically, these devices
    are tablets and phones with a large screen.

    *   **Large:** `1024epx`. These device targets/screens have an effective pixel
    width of `1024` and higher. The typical screen size is 13 inches and higher. Typically,
    these devices are PCs, laptops, Surface Hubs, and so forth.


    ## 6.2 Adaptive UI Technique: Reposition


    ### Problem


    You would like your app to support all device targets/screen sizes. You would
    like to make your UI adaptive and you want to reposition certain portions of your
    screen based on the screen size that your app is running on.


    ### Solution


    One of the techniques to make your app’s user interface adapt to different screen
    sizes involves `CSS` media queries, which are outside the scope of this book,
    and hence, you won’t be delving deeply into it. But you can read and learn more
    about media queries at W3C Schools online at [`http://www.w3schools.com/cssref/css3_pr_mediaquery.asp`](http://www.w3schools.com/cssref/css3_pr_mediaquery.asp).
    You will write a media query rule to target the size of a screen. The rule will
    have styles defined to reposition UI elements according to the screen the app
    is running on.'
  raw: '# Chapter 6: Adapting the UI for Different Screens


    With the Universal Windows Platform (UWP), you have the benefit of running your
    app on any device in the Windows family. The device family includes phones, tablets,
    laptops, the Xbox, and so forth. There are different screen sizes in the device
    family. The platform does the magic behind the scenes and makes sure that your
    app’s user interface is functional across all devices. Since the platform handles
    things for you under the hood, you aren’t required to do any customization to
    your app to support different screen sizes. But there may be situations where
    you want to provide a specific UI for a specific screen size. For example, when
    your app runs on a phone, you could want a single-column layout; whereas when
    the same app runs on a tablet or PC, you want a two-column layout. This chapter
    looks at how to adapt your UI for different screen sizes.


    If UWP apps can run on any Windows 10 device family with any screen size, why
    should you, as an app developer, worry about a tailor-made UI for a specific screen
    size?


    As stated earlier, the platform takes care of making sure that your app’s UI is
    functional across all screen sizes, but you may still have situations where you
    want to customize per the screen that your app is running on. The following points
    are worth noting. They provide insights on why you would want to customize.


    *   Make effective use of available space and reduce navigation. When an app’s
    UI is designed to look good on a small screen, the app will be usable on PCs too.
    But there will probably be some wasted space. A better design would be to show
    more content when the screen size is above a certain size. Having more content
    on a bigger screen size reduces the amount of navigation that a user otherwise
    performs.

    *   Device capability. Different devices have different capabilities. By customizing
    your app for a specific device, you can take better advantage of the capabilities
    available on this specific device and you can then enable/disable features around
    this.

    *   Input optimization. The Control library in the UWP works well with all input
    types, including touch, pen, keyboard, and mouse. But you can optimize the input
    for a specific device. For example, navigation is usually provided at the bottom
    of a screen for a phone-based app; whereas a PC user expects the navigation to
    be available at the top of the screen.


    ## 6.1 Design Breakpoints for Different Screens


    ### Problem


    Since you need to support various screen sizes under the Windows 10 device family,
    you would like to know the specific widths to target in your apps.


    ### Solution


    Breakpoint is the terminology used in CSS (Cascading Style Sheets) to denote the
    size or width of a screen, against which you write the style rules. There are
    a great many device targets and screen sizes available in Windows 10 device families.
    But you don’t have to optimize your UI for each of these device targets or screen
    sizes. Instead, you should design for key screen widths. These key screen widths
    are also known as breakpoints. Let’s look at the breakpoints that you should be
    concerned with.


    *   Small: 320epx. These device targets/screens have an effective pixel width
    of 320\. The typical screen size is 4 to 6 inches. Typically, these devices are
    phones.

    *   Medium: 720epx. These device targets/screens have an effective pixel width
    of 720\. The typical screen size is 6 to 12 inches. Typically, these devices are
    tablets and phones with a large screen.

    *   Large: 1024epx. These device targets/screens have an effective pixel width
    of 1024 and higher. The typical screen size is 13 inches and higher. Typically,
    these devices are PCs, laptops, Surface Hubs, and so forth.


    ## 6.2 Adaptive UI Technique: Reposition


    ### Problem


    You would like your app to support all device targets/screen sizes. You would
    like to make your UI adaptive and you want to reposition certain portions of your
    screen based on the screen size that your app is running on.


    ### Solution


    One of the techniques to make your app’s user interface adapt to different screen
    sizes involves CSS media queries, which are outside the scope of this book, and
    hence, you won’t be delving deeply into it. But you can read and learn more about
    media queries at W3C Schools online at [`http://www.w3schools.com/cssref/css3_pr_mediaquery.asp`](http://www.w3schools.com/cssref/css3_pr_mediaquery.asp)
    . You will write a media query rule to target the size of a screen. The rule will
    have styles defined to reposition UI elements according to the screen the app
    is running on.'
  trans: '

    # 第 6 章：针对不同屏幕适配 UI


    借助通用 Windows 平台（`UWP`），你的应用可以在 Windows 系列的任何设备上运行。该设备系列包括手机、平板电脑、笔记本电脑、Xbox 等。设备系列中存在不同的屏幕尺寸。该平台会在幕后施展魔法，确保你的应用用户界面在所有设备上都能正常使用。既然平台已经为你处理了底层细节，你无需对应用进行任何自定义设置就能支持不同的屏幕尺寸。但有时你可能希望为特定屏幕尺寸提供特定的
    UI。例如，当你的应用在手机上运行时，你可能希望采用单列布局；而同样的应用在平板电脑或 PC 上运行时，你则希望采用双列布局。本章将探讨如何根据不同的屏幕尺寸适配
    UI。


    如果 `UWP` 应用可以在任何 Windows 10 设备系列的任何屏幕尺寸上运行，那么作为应用开发者，你为什么还需要为特定屏幕尺寸定制 UI 呢？


    如前所述，平台负责确保你的应用 UI 在所有屏幕尺寸上都能正常使用，但你可能仍然会遇到需要根据应用运行的屏幕进行自定义的情况。以下几点值得注意，它们解释了为什么你需要进行自定义。


    *   **有效利用可用空间并减少导航。** 当应用的 UI 针对小屏幕设计时，该应用在 PC 上也能使用，但可能会浪费一些空间。更好的设计是，当屏幕尺寸超过某个大小时显示更多内容。在较大的屏幕上显示更多内容可以减少用户进行的导航操作量。

    *   **设备能力。** 不同设备具有不同的能力。通过为特定设备定制应用，你可以更好地利用该特定设备的可用能力，并据此启用或禁用相关功能。

    *   **输入优化。** `UWP` 中的控件库能很好地支持所有输入类型，包括触摸、笔、键盘和鼠标。但你可以针对特定设备优化输入方式。例如，手机应用通常将导航放在屏幕底部；而
    PC 用户则期望导航位于屏幕顶部。


    ## 6.1 不同屏幕的设计断点


    ### 问题


    由于你需要在 Windows 10 设备系列下支持各种屏幕尺寸，你希望了解在应用中应针对哪些具体宽度进行设计。


    ### 解决方案


    `断点` 是 `CSS`（层叠样式表）中使用的术语，用于表示屏幕的大小或宽度，并据此编写样式规则。Windows 10 设备系列中有大量的设备类型和屏幕尺寸。但你无需针对每种设备类型或屏幕尺寸优化
    UI。相反，你应该针对关键的屏幕宽度进行设计。这些关键的屏幕宽度也称为断点。让我们看看你需要关注哪些断点。


    *   **小屏幕：** `320epx`。这些设备类型/屏幕的有效像素宽度为 `320`。典型屏幕尺寸为 4 到 6 英寸。通常，这些设备是手机。

    *   **中屏幕：** `720epx`。这些设备类型/屏幕的有效像素宽度为 `720`。典型屏幕尺寸为 6 到 12 英寸。通常，这些设备是平板电脑和大屏手机。

    *   **大屏幕：** `1024epx`。这些设备类型/屏幕的有效像素宽度为 `1024` 或更高。典型屏幕尺寸为 13 英寸及以上。通常，这些设备是
    PC、笔记本电脑、Surface Hub 等。


    ## 6.2 自适应 UI 技术：重新定位


    ### 问题


    你希望你的应用支持所有设备类型/屏幕尺寸。你希望使 UI 具有自适应性，并根据应用运行的屏幕尺寸重新定位屏幕的某些部分。


    ### 解决方案


    让你的应用用户界面适应不同屏幕尺寸的技术之一涉及 `CSS` 媒体查询，但这超出了本书的范围，因此你不会深入探讨它。但你可以在 W3C School 网站上（[`http://www.w3schools.com/cssref/css3_pr_mediaquery.asp`](http://www.w3schools.com/cssref/css3_pr_mediaquery.asp)）阅读并了解更多关于媒体查询的内容。你将编写一条媒体查询规则来针对特定屏幕尺寸。该规则将包含根据应用运行的屏幕重新定位
    UI 元素的样式定义。

