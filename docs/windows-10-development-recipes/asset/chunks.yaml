            `<div class="sectionA">`             `<h1>A</h1>`         `</div>`         `<div
    class="sectionB">`             `<h1>B</h1>`         `</div>` `</div>` You have
    created a bunch of divs. The outer div (appGrid) acts as a container. Next, you
    have two sections that are displayed as part of the app. On a small screen, you
    want to show sectionA and sectionB one on top of the other. When running on medium
    and large screens, place sectionA and sectionB next to each other.   Next, you
    create the necessary styles for the app. Open default.css, which is found in the
    css folder. Replace the contents of default.css with the following style rules.
    `.appGrid {`     `display: -ms-grid;`     `-ms-grid-columns: 2fr 1fr;`     `grid-columns:
    2fr 1fr;`     `-ms-grid-rows: 1fr;`     `grid-rows: 1fr;`     `width: 100%;`     `height:
    100%;`     `margin:24px;` `}` `.sectionA {`     `-ms-grid-row: 1;`     `-ms-grid-column:
    1;`     `background-color: lightgray;`     `width: 100%;`     `height: 100%;`
        `padding: 10px;`     `color: black;` `}` `.sectionB {`     `-ms-grid-row:
    1;`     `-ms-grid-column: 2;`     `background-color: lightblue;`     `width: 100%;`
        `height: 100%;`     `padding: 10px;`     `color: black;` `}` Let’s go through
    the code once. You have just defined three rules. One of the rules is for the
    outer grid. You are using a grid-based display with two columns and one row. Section
    A is placed in column 1 and Section B is placed in column 2\. Since there is no
    media query applied yet, these rules are applied all the time.   Now you define
    a media query for handling the UI when the max width of the screen is 320\. When
    you are running the app on a small screen, you want the layout to be narrow—only
    one column and two rows. Section A is placed in row 1 and Section B is placed
    in row 2\. You place the CSS rule in the same CSS file (default.css). Here is
    the code snippet for the media query: `@media (max-width:320px){`     `.appGrid
    {`         `display: -ms-grid;`         `-ms-grid-columns: 1fr;`         `grid-columns:
    1fr;`         `-ms-grid-rows: 2fr 1fr;`         `grid-rows: 2fr 1fr;`         `width:
    100%;`         `height: 100%;`         `margin:12px;`     `}`     `.sectionA {`
            `-ms-grid-row: 1;`         `-ms-grid-column: 1;`         `background-color:
    lightgray;`         `width: 100%;`         `height: 100%;`     `}`     `.sectionB
    {`         `-ms-grid-row: 2;`         `-ms-grid-column: 1;`         `background-color:
    lightblue;`         `width: 100%;`         `height: 100%;`     `}` `}` This shows
    that when the screen size is 320px and lower, a new style rule is picked up. As
    part of the style rule, the app grid is now one column and two rows. This repositioned
    the placement of Section A and Section B.   Next, press F5 and run the app. You
    can run the app in a Windows 10 Mobile emulator or you can run it on a local machine.
    Figures [6-2](#A978-1-4842-0719-2_6_Chapter.html#Fig2) and [6-3](#A978-1-4842-0719-2_6_Chapter.html#Fig3)
    show the output from a phone and a PC.


