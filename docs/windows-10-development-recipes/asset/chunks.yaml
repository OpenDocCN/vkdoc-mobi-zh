  trans: "\n### 工作原理\n\n打开 Visual Studio 2015。选择“文件” ➤ “新建项目” ➤ “JavaScript” ➤ “Windows”\
    \ ➤ “通用” ➤ “空白应用（Windows 通用）”模板。这将创建一个通用 Windows 应用项目（见图 5-10）。\n\n![A978-1-4842-0719-2_5_Fig10_HTML.jpg](img/A978-1-4842-0719-2_5_Fig10_HTML.jpg)\n\
    \n图 5-10. 新建项目对话框\n\n打开项目根目录下的 `default.html`。将 `body` 的内容替换为以下内容：\n\n```\n<div\
    \ data-win-control=\"WinJS.UI.Pivot\" data-win-options=\"{ title: 'PIVOT Navigation',\
    \ selectedIndex: 0 }\">\n    <div data-win-control=\"WinJS.UI.PivotItem\" data-win-options=\"\
    { 'header': 'one'}\">\n        <p> Content - Item One </p>\n    </div>\n    <div\
    \ data-win-control=\"WinJS.UI.PivotItem\" data-win-options=\"{ 'header': 'two'}\"\
    >\n        <p> Content - Item Two </p>\n    </div>\n    <div data-win-control=\"\
    WinJS.UI.PivotItem\" data-win-options=\"{ 'header': 'three'}\">\n        <p> Content\
    \ - Item Three </p>\n    </div>\n</div>\n```\n\n您放置了一个 `div` 并将其 `data-win-control`\
    \ 属性设置为 `WinJS.UI.Pivot`。这将把该 `div` 转换为一个枢轴控件。然后，您使用 `data-win-options` 属性向该枢轴控件传递选项。您正在设置枢轴的标题以及将选中的项目。枢轴控件的项目以\
    \ `div` 形式放置，其 `data-win-control` 属性设置为 `WinJS.UI.PivotItem`。每个枢轴项目都有一个标头。使用 `data-win-options`\
    \ 属性设置标头值。您可以根据应用的需要放置任意数量的项目。\n\n接下来，按 F5 运行应用。图 5-11 是 Windows Mobile 输出的截图。\n\
    \n![A978-1-4842-0719-2_5_Fig11_HTML.jpg](img/A978-1-4842-0719-2_5_Fig11_HTML.jpg)\n\
    \n图 5-11. Windows Mobile 输出\n\n如您所见，这里有三个枢轴项目。您可以点击枢轴项目的标头，或从左向右滑动，以导航到相邻的内容/项目。\n\
    \n## 5.8 UWP 应用中的 SplitView 导航\n\n### 问题\n\n在您的应用中，您已确定导航结构是基于对等项的。您希望提供一个包含顶层页面链接的菜单。您希望使用\
    \ SplitView 控件实现导航。\n\n### 解决方案\n\nSplitView 控件包含一个窗格和一个内容区域。窗格可以展开或折叠，而内容区域始终可见。窗格也可以保持打开状态，并且可以灵活地从应用的左侧或右侧显示。通常，导航链接放置在该窗格中。\n\
    \n### 工作原理\n\n打开 Visual Studio 2015。选择“文件” ➤ “新建项目” ➤ “JavaScript” ➤ “Windows”\
    \ ➤ “通用” ➤ “空白应用（Windows 通用）”模板。这将创建一个通用 Windows 应用项目（见图 5-12）。\n\n![A978-1-4842-0719-2_5_Fig12_HTML.jpg](img/A978-1-4842-0719-2_5_Fig12_HTML.jpg)\n\
    \n图 5-12. 新建项目对话框\n\n打开项目根目录下的 `default.html`。将 `body` 的内容替换为以下代码片段：\n\n```\n\
    <div id=\"app\">\n    <div class=\"splitView\"\n         data-win-control=\"WinJS.UI.SplitView\"\
    \n         data-win-options=\"{closedDisplayMode:'none',\n         openedDisplayMode:'overlay'}\"\
    >\n        <!-- 窗格区域 -->\n        <div>\n            <div class=\"header\">\n\
    \                <button class=\"win-splitviewpanetoggle\"\n                 \
    \       data-win-control=\"WinJS.UI.SplitViewPaneToggle\"\n                  \
    \      data-win-options=\"{ splitView: select('.splitView') }\"></button>\n  \
    \              <div class=\"title\">菜单</div>\n            </div>\n           \
    \ <div id='navBar' class=\"nav-commands\">\n                <div data-win-control=\"\
    WinJS.UI.NavBarCommand\"\n                     data-win-options=\"{ onclick:SplitViewHelper.homeClick,\n\
    \                                         label: '主页',\n                     \
    \                    icon: 'home'}\"></div>\n                <div data-win-control=\"\
    WinJS.UI.NavBarCommand\"\n                     data-win-options=\"{ onclick:SplitViewHelper.favClick,\n\
    \                                         label: '收藏夹',\n                    \
    \                     icon: 'favorite'}\"></div>\n                <div data-win-control=\"\
    WinJS.UI.NavBarCommand\"\n                     data-win-options=\"{ onclick:SplitViewHelper.settingsClick,\n\
    \                                         label: '设置',\n                     \
    \                    icon: 'settings'}\"></div>\n            </div>\n        </div>\n\
    \        <!-- 内容区域 -->\n        <button class=\"win-splitviewpanetoggle\"\n  \
    \              data-win-control=\"WinJS.UI.SplitViewPaneToggle\"\n           \
    \     data-win-options=\"{ splitView: select('.splitView') }\"></button>\n   \
    \     <div class=\"contenttext\"><h2>页面内容 </h2> </div>\n    </div>\n</div>\n```\n\
    \n为了使用 SplitView，您需要放置一个 `div` 并将其 `data-win-control` 属性设置为 `SplitView`。然后，您需要创建两个\
    \ `div`。第一个 `div` 将用于导航窗格，第二个 `div` 将用作内容区域。您使用 `WinJS.UI.NavBarCommand` 来放置指向不同页面的链接。您正在侦听导航栏项目的点击事件，点击时将根据被点击的导航链接显示相应的内容。内容页面只是一个\
    \ `div`，在运行时，根据点击的导航链接，您将相应地更新内容。\n\n接下来，打开 `js` 文件夹中的 `default.js`。将 `app.activated`\
    \ 处理程序替换为以下代码片段：\n\n```\napp.onactivated = function (args) {\n    if (args.detail.kind\
    \ === activation.ActivationKind.launch) {\n        if (args.detail.previousExecutionState\
    \ !== activation.ApplicationExecutionState.terminated) {\n        } else {\n \
    \       }\n        args.setPromise(\n            WinJS.UI.processAll().done(function\
    \ () {\n                SplitViewHelper.splitView = document.querySelector(\"\
    .splitView\").winControl;\n                new WinJS.UI._WinKeyboard(SplitViewHelper.splitView.paneElement);\
    \ // 临时解决方法：在 NavBarCommands 上绘制键盘焦点视觉\n            })\n        );\n    }\n};\n\
    ```\n\n接下来，在 IIFE（立即调用函数表达式）声明之后，放置以下代码片段。您正在创建一个小的辅助类来处理导航点击事件。\n\n```\n(function\
    \ () {\n    \"use strict\";\n    // 为简洁起见，省略了其他与应用相关的代码\n})();\n\nWinJS.Namespace.define(\"\
    SplitViewHelper\", {\n    splitView: null,\n    homeClick: WinJS.UI.eventHandler(function\
    \ (ev) {\n        document.querySelector('.contenttext').innerHTML = \"<h2>SplitView\
    \ 内容区域</h2>\";\n    }),\n    favClick: WinJS.UI.eventHandler(function (ev) {\n\
    \        document.querySelector('.contenttext').innerHTML = \"<h2>收藏夹！</h2>\"\
    ;\n    }),\n    settingsClick: WinJS.UI.eventHandler(function (ev) {\n       \
    \ document.querySelector('.contenttext').innerHTML = \"<h2>设置！</h2>\";\n    }),\n\
    });\n```\n\n在本示例中，您正在替换内容 `div` 的内部 HTML。如果您想完全加载一个新页面，可以通过使用 `WinJS.UI.Pages.render('<URI>',<内容宿主元素>);`\
    \ 来实现。\n\n现在，按 F5 运行应用。图 5-13 和图 5-14 显示了 Windows Mobile 上的输出。\n\n![A978-1-4842-0719-2_5_Fig14_HTML.jpg](img/A978-1-4842-0719-2_5_Fig14_HTML.jpg)\n\
    \n图 5-14. 内容区域\n\n![A978-1-4842-0719-2_5_Fig13_HTML.jpg](img/A978-1-4842-0719-2_5_Fig13_HTML.jpg)\n\
    \n图 5-13. 导航窗格\n"
- fmt: "## 5.9 Hub Navigation in UWP Apps\n\n### Problem\n\nYou have identified that\
    \ the navigational structure for your Universal Windows Platform app is hierarchical\
    \ in nature. You want to use `Hub` as the navigational element in your app.\n\n\
    ### Solution\n\nThe `Hub` control is for navigation where the app’s content can\
    \ be separated into distinct, related sections or categories with varying detail\
    \ levels. This is a common pattern used in scenarios such as relational information,\
    \ which needs to be traversed in a preferred sequence. The hierarchical pattern\
    \ of navigation is suitable for applications that provide a variety of experiences\
    \ and content with organization and structure.\n\n### How It Works\n\nOpen Visual\
    \ Studio 2015. Select File ➤ New Project ➤ JavaScript ➤ Windows ➤ Universal ➤\
    \ Blank App (Windows Universal) template. This creates a Universal Windows app\
    \ project (see Figure [5-15](#A978-1-4842-0719-2_5_Chapter.html#Fig15)).\n\n![A978-1-4842-0719-2_5_Fig15_HTML.jpg](A978-1-4842-0719-2_5_Fig15_HTML.jpg)\n\
    \nFigure 5-15. New Project dialog\n\nOpen `default.html`, found in the root of\
    \ the project. Replace the contents after the `<body>` tag with the following\
    \ code snippet:\n\n```html\n<div data-win-control=\"WinJS.UI.Hub\">\n    <div\
    \ class=\"section1\" data-win-control=\"WinJS.UI.HubSection\"\n         data-win-options=\"\
    {header: 'Images', isHeaderStatic: true}\">\n        <div class=\"imagesFlexBox\"\
    >\n            <img class=\"imageItem\" src=\"/images/circle_image1.jpg\" />\n\
    \            <img class=\"imageItem\" src=\"/images/circle_image3.jpg\" />\n \
    \           <img class=\"imageItem\" src=\"/images/circle_image2.jpg\" />\n  \
    \          <img class=\"imageItem\" src=\"/images/circle_image1.jpg\" />\n   \
    \         <img class=\"imageItem\" src=\"/images/circle_image3.jpg\" />\n    \
    \        <img class=\"imageItem\" src=\"/images/circle_image2.jpg\" />\n     \
    \       <img class=\"imageItem\" src=\"/images/circle_image1.jpg\" />\n      \
    \      <img class=\"imageItem\" src=\"/images/circle_image3.jpg\" />\n       \
    \     <img class=\"imageItem\" src=\"/images/circle_image2.jpg\" />\n        </div>\n\
    \    </div>\n    <div id=\"list\" class=\"section2\" data-win-control=\"WinJS.UI.HubSection\"\
    \n         data-win-options=\"{header: 'ListView', isHeaderStatic: true}\">\n\
    \        <div id=\"listView\"\n             class=\"win-selectionstylefilled\"\
    \n             data-win-control=\"WinJS.UI.ListView\"\n             data-win-options=\"\
    {\n                itemDataSource: HubExample.data.dataSource,\n             \
    \   itemTemplate: smallListIconTextTemplate,\n                selectionMode: 'none',\n\
    \                tapBehavior: 'none',\n                swipeBehavior: 'none'\n\
    \            }\">\n        </div>\n    </div>\n</div>\n<div id=\"smallListIconTextTemplate\"\
    \ data-win-control=\"WinJS.Binding.Template\">\n    <div class=\"smallListIconTextItem\"\
    >\n        <img src=\"#\" class=\"smallListIconTextItem-Image\"\n            \
    \ data-win-bind=\"src: picture\" />\n        <div class=\"smallListIconTextItem-Detail\"\
    >\n            <h4 data-win-bind=\"innerText: title\"></h4>\n            <h6 data-win-bind=\"\
    innerText: text\"></h6>\n        </div>\n    </div>\n</div>\n```\n\nTo create\
    \ a `Hub` control, set the `data-win-control` attribute to a value of `WinJS.UI.Hub`\
    \ on a `div`. To create sections inside the `Hub`, create a `div` and set its\
    \ `data-win-control` attribute to `WinJS.UI.HubSection`. Set the header of the\
    \ sections using the `data-win-options` attribute. Set the `header` property on\
    \ the section.\n\nSection 2 in the preceding code makes use of a `ListView`. So\
    \ let’s create a data source for the list view. Open the `default.js` file in\
    \ the `js` folder. Inside the immediately invoked function expression and after\
    \ `'use strict'` statement, copy and paste the following code snippet:\n\n```javascript\n\
    var myData = new WinJS.Binding.List([\n    { title: \"Fire Hydrant\", text: \"\
    Red\", picture: \"/images/circle_list1.jpg\" },\n    { title: \"Fire Hydrant\"\
    , text: \"Yellow\", picture: \"/images/circle_list2.jpg\" },\n    { title: \"\
    Pothole Cover\", text: \"Gray\", picture: \"/images/circle_list3.jpg\" },\n  \
    \  { title: \"Sprinkler\", text: \"Yellow\", picture: \"/images/circle_list4.jpg\"\
    \ },\n    { title: \"Electrical Charger\", text: \"Yellow\", picture: \"/images/circle_list5.jpg\"\
    \ },\n    { title: \"Knob\", text: \"Red\", picture: \"/images/circle_list6.jpg\"\
    \ },\n    { title: \"Fire Hydrant\", text: \"Red\", picture: \"/images/circle_list1.jpg\"\
    \ },\n    { title: \"Fire Hydrant\", text: \"Yellow\", picture: \"/images/circle_list2.jpg\"\
    \ },\n    { title: \"Pothole Cover\", text: \"Gray\", picture: \"/images/circle_list3.jpg\"\
    \ },\n    { title: \"Fire Hydrant\", text: \"Red\", picture: \"/images/circle_list1.jpg\"\
    \ },\n    { title: \"Fire Hydrant\", text: \"Yellow\", picture: \"/images/circle_list2.jpg\"\
    \ },\n    { title: \"Pothole Cover\", text: \"Gray\", picture: \"/images/circle_list3.jpg\"\
    \ }\n]);\nWinJS.Namespace.define(\"HubExample\", {\n    data: myData\n});\n```\n\
    \nTo run the app, press F5 in Visual Studio. Figure [5-16](#A978-1-4842-0719-2_5_Chapter.html#Fig16)\
    \ shows output on a Windows Mobile device.\n\n![A978-1-4842-0719-2_5_Fig16_HTML.jpg](A978-1-4842-0719-2_5_Fig16_HTML.jpg)\n\
    \nFigure 5-16. Hub navigation output\n\n## 5.10 Master/Detail Navigation Using\
    \ ListView in UWP Apps\n\n### Problem\n\nYou have identified that the navigational\
    \ structure for your Universal Windows Platform app is hierarchical in nature.\
    \ You want to use a Master/Detail navigation pattern. You have identified `ListView`\
    \ as the navigational element.\n\n### Solution\n\n`ListView` is a control that\
    \ displays a list of data items in a vertical stack. You can data bind a data\
    \ source to the list view and provide a template for rendering each item.\n\n\
    ### How It Works\n\nOpen Visual Studio 2015. Select File ➤ New Project ➤ JavaScript\
    \ ➤ Windows ➤ Universal ➤ Blank App (Windows Universal) template. This creates\
    \ a Universal Windows app project (see Figure [5-17](#A978-1-4842-0719-2_5_Chapter.html#Fig17)).\n\
    \n![A978-1-4842-0719-2_5_Fig17_HTML.jpg](A978-1-4842-0719-2_5_Fig17_HTML.jpg)\n\
    \nFigure 5-17."
