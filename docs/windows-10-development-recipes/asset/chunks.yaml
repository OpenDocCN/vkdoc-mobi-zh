- fmt: "### Solution\n\nA background task is run only when the set trigger is fired.\
    \ As seen in the previous recipe, you provide the trigger when you create the\
    \ task. If your task requires a certain condition to be met, even after the system\
    \ trigger has been fired, you can create a system condition and provide the condition\
    \ to the task builder during task registration. Conditions are provided using\
    \ the `SystemConditionType` enumeration. Table [11-2](#A978-1-4842-0719-2_11_Chapter.html#Tab2)\
    \ describes the system condition types available on the UWP.\n\n**Table 11-2.**\
    \ System Condition Types\n\n| Trigger Name | Value | Description |\n| --- | ---\
    \ | --- |\n| `invalid` | 0 | Not a valid condition type |\n| `userPresent` | 1\
    \ | Task can run only when user is present |\n| `userNotPresent` | 2 | Task can\
    \ run only when user is not present |\n| `InternetAvailable` | 3 | Task can run\
    \ only when Internet is available |\n| `internetNotAvailable` | 4 | Task can run\
    \ only when Internet is not available |\n| `sessionConnected` | 5 | Task can run\
    \ only when user session is connected |\n| `sessionDisconnected` | 6 | Task can\
    \ run only when user session is disconnected |\n| `freeNetworkAvailable` | 7 |\
    \ Task can run only when a free network (non-metered) is available |\n| `backgroundWorkCostNotHigh`\
    \ | 8 | Task can run only when the cost to do background work is low |\n\n###\
    \ How It Works\n\nLet’s learn how to set a system condition on a task.\n\nCreate\
    \ a `SystemCondition` object. Before registering a task, the condition to apply\
    \ for the background task to run needs to be built. You need to create a `SystemCondition`\
    \ object to represent the condition. The constructor of the `SystemCondition`\
    \ object expects the `SystemConditionType` enumeration value, which is the condition\
    \ that needs to be met before running the task. Here is the code snippet for providing\
    \ the condition:\n\n```\nvar internetConditionType = Windows.ApplicationModel.Background.SystemConditionType.InternetAvailable;\n\
    var internetCondition = new Windows.ApplicationModel.Background.SystemCondition(internetConditionType);\n\
    ```\n\nAdd the `SystemCondition` object to background task. Once you have built\
    \ the system condition, the next step is to add it to the task builder. `BackgroundTaskBuilder`\
    \ provides an `AddCondition()` method that is used to set the condition. Here\
    \ is the code snippet for adding the condition:\n\n```\ntaskBuilder.AddCondition(internetCondition);\n\
    ```\n\nNext, you register the task using the `Register()` method of the TaskBuilder.\
    \ Here is the code snippet for the task registration:\n\n```\nvar task = builder.Register();\n\
    ```\n\n## 11.4 Monitor Background Task Progress and Completion\n\n### Problem\n\
    \nYou have a background task that is created and registered by your app. You want\
    \ to monitor the progress and completion of the task in your app.\n\n### Solution\n\
    \nA task that is registered with the system fires progress and completion events.\
    \ Your app needs to provide event handlers and subscribe to the events exposed\
    \ by the task.\n\n### How It Works\n\nHandle the task completion. First, you need\
    \ to create a function to attach to the `Completion` event of the background task.\
    \ This function takes in a parameter of type `BackgroundTaskCompletedEventArgs`.\
    \ Here is the skeleton of the function:\n\n```\nfunction onCompleted(args){\n\
    \    //code to deal with the completion of the task\n}\n```\n\nNext, you need\
    \ to register the function with the background task. Here is the code snippet\
    \ to do that:\n\n```\ntask = builder.register();\ntask.addEventListener(\"completed\"\
    , onCompleted);\n```\n\nPut any code that needs to be executed upon task completion\
    \ in the `onCompleted` function.\n\nHandle the task progress. Similar to the completion\
    \ event, a task fires a progress event too. You need to write a function that\
    \ can be used to attach to the progress event of the background task. By subscribing\
    \ to the progress event, any time a progress event is fired by the task, the function\
    \ attached to the event is called. Any progress reporting routine can be written\
    \ in the function. The function takes in two parameters: an `IBackgroundTaskRegistration`\
    \ object and a `BackgroundTaskProgressEventArgs` object. Here is the skeleton\
    \ of the function that handles the progress event:\n\n```\nfunction onProgress(task,\
    \ args){\n    //add code to perform progress related routine here\n}\n```\n\n\
    Next, you need to register the function with the progress event of the background\
    \ task. Here is the code snippet to register the function:\n\n```\ntask = builder.register();\n\
    task.addEventListener(\"progress\", onProgress);\n```\n\n# Chapter 12: Location\
    \ and Maps in Windows Apps\n\nDevelopers who build Windows apps can utilize the\
    \ capabilities of the Windows device to integrate the location and maps in their\
    \ apps. In this chapter, you will look at recipes on how to use the location API\
    \ in Universal Windows Runtime apps.\n\n## 12.1 Get the Current Location\n\n###\
    \ Problem\n\nYou don’t know where you are. The Windows app needs to determine\
    \ and display your current location.\n\n### Solution\n\nUse the `getGeopositionAsync`\
    \ method of the `Geolocator` class defined in the `Windows.Devices.Geolocation`\
    \ namespace to get the current location from the devices powered by Windows 10."
  raw: '### Solution


    A background task is run only when the set trigger is fired. As seen in the previous
    recipe, you provide the trigger when you create the task. If your task requires
    a certain condition to be met, even after the system trigger has been fired, you
    can create a system condition and provide the condition to the task builder during
    task registration. Conditions are provided using the `SystemConditionType` enumeration.
    Table [11-2](#A978-1-4842-0719-2_11_Chapter.html#Tab2) describes the system condition
    types available on the UWP.


    Table 11-2.


    System Condition Types


    | Trigger Name | Value | Description |

    | --- | --- | --- |

    | invalid | 0 | Not a valid condition type |

    | userPresent | 1 | Task can run only when user is present |

    | userNotPresent | 2 | Task can run only when user is not present |

    | InternetAvailable | 3 | Task can run only when Internet is available |

    | internetNotAvailable | 4 | Task can run only when Internet is not available
    |

    | sessionConnected | 5 | Task can run only when user session is connected |

    | sessionDisconnected | 6 | Task can run only when user session is disconnected
    |

    | freeNetworkAvailable | 7 | Task can run only when a free network (non-metered)
    is available |

    | backgroundWorkCostNotHigh | 8 | Task can run only when the cost to do background
    work is low |


    ### How It Works


    Let’s learn how to set a system condition on a task.


    Create a `SystemCondition` object. Before registering a task, the condition to
    apply for the background task to run needs to be built. You need to create a `SystemCondition`
    object to represent the condition. The constructor of the `SystemCondition` object
    expects the `SystemConditionType` enumeration value, which is the condition that
    needs to be met before running the task. Here is the code snippet for providing
    the condition: `var internetConditionType = Windows.ApplicationModel.Background.SystemConditionType.InternetAvailable;`
    `var internetCondition = new Windows.ApplicationModel.Background.SystemCondition(internetConditionType);`
      Add the `SystemCondition` object to background task. Once you have built the
    system condition, the next step is to add it to the task builder. `BackgroundTaskBuilder`
    provides an `AddCondition()` method that is used to set the condition. Here is
    the code snippet for adding the condition: `taskBuilder.AddCondition(internetCondition);`
      Next, you register the task using the `Register()` method of the TaskBuilder.
    Here is the code snippet for the task registration: `var task = builder.Register();`


    ## 11.4 Monitor Background Task Progress and Completion


    ### Problem


    You have a background task that is created and registered by your app. You want
    to monitor the progress and completion of the task in your app.


    ### Solution


    A task that is registered with the system fires progress and completion events.
    Your app needs to provide event handlers and subscribe to the events exposed by
    the task.


    ### How It Works


    Handle the task completion. First, you need to create a function to attach to
    the Completion event of the background task. This function takes in a parameter
    of type `BackgroundTaskCompletedEventArgs`. Here is the skeleton of the function:
    `function onCompleted(args){`         `//code to deal with the completion of the
    task` `}`   Next, you need to register the function with the background task.
    Here is the code snippet to do that: `task = builder.register();` `task.addEventListener("completed",onCompleted);`
      Put any code that needs to be executed upon task completion in the `onCompleted`
    function.   Handle the task progress. Similar to the completion event, a task
    fires a progress event too. You need to write a function that can be used to attach
    to the progress event of the background task. By subscribing to the progress event,
    any time a progress event is fired by the task, the function attached to the event
    is called. Any progress reporting routine can be written in the function. The
    function takes in two parameters: an `IBackgroundTaskRegistration` object and
    a `BackgroundTaskProgressEventArgs` object. Here is the skeleton of the function
    that handles the progress event: `function onProgress(task, args){`         `//add
    code to perform progress related routine here` `}`   Next, you need to register
    the function with the progress event of the background task. Here is the code
    snippet to register the function: `task = builder.register();` `task.addEventListener("progress",
    onProgress);`


    # Chapter 12: Location and Maps in Windows Apps


    Developers who build Windows apps can utilize the capabilities of the Windows
    device to integrate the location and maps in their apps. In this chapter, you
    will look at recipes on how to use the location API in Universal Windows Runtime
    apps.


    ## 12.1 Get the Current Location


    ### Problem


    You don’t know where you are. The Windows app needs to determine and display your
    current location.


    ### Solution


    Use the `getGeopositionAsync` method of the `Geolocator` class defined in the
    `Windows.Devices.Geolocation` namespace to get the current location from the devices
    powered by Windows 10.'
  trans: "\n### 解决方案\n\n后台任务仅在设定的触发器触发时运行。如前一则解决方案所示，你在创建任务时提供了触发器。如果你的任务需要满足特定条件（即使系统触发器已被触发），你可以创建一个系统条件，并在任务注册期间将其提供给任务生成器。条件通过\
    \ `SystemConditionType` 枚举提供。表 11-2 描述了 UWP 上可用的系统条件类型。\n\n**表 11-2.** 系统条件类型\n\
    \n| 触发器名称 | 值 | 描述 |\n| --- | --- | --- |\n| `invalid` | 0 | 非有效的条件类型 |\n| `userPresent`\
    \ | 1 | 仅当用户在场时任务可运行 |\n| `userNotPresent` | 2 | 仅当用户不在场时任务可运行 |\n| `InternetAvailable`\
    \ | 3 | 仅当互联网可用时任务可运行 |\n| `internetNotAvailable` | 4 | 仅当互联网不可用时任务可运行 |\n| `sessionConnected`\
    \ | 5 | 仅当用户会话已连接时任务可运行 |\n| `sessionDisconnected` | 6 | 仅当用户会话已断开时任务可运行 |\n|\
    \ `freeNetworkAvailable` | 7 | 仅当免费网络（非按流量计费）可用时任务可运行 |\n| `backgroundWorkCostNotHigh`\
    \ | 8 | 仅当后台工作成本较低时任务可运行 |\n\n### 实现原理\n\n让我们学习如何在任务上设置系统条件。\n\n创建一个 `SystemCondition`\
    \ 对象。在注册任务之前，需要构建后台任务运行所需的应用条件。你需要创建一个 `SystemCondition` 对象来表示该条件。`SystemCondition`\
    \ 对象的构造函数需要 `SystemConditionType` 枚举值，该值表示在运行任务前需要满足的条件。以下是提供条件的代码片段：\n\n```\n\
    var internetConditionType = Windows.ApplicationModel.Background.SystemConditionType.InternetAvailable;\n\
    var internetCondition = new Windows.ApplicationModel.Background.SystemCondition(internetConditionType);\n\
    ```\n\n将 `SystemCondition` 对象添加到后台任务。构建系统条件后，下一步是将其添加到任务生成器中。`BackgroundTaskBuilder`\
    \ 提供了一个用于设置条件的 `AddCondition()` 方法。以下是添加条件的代码片段：\n\n```\ntaskBuilder.AddCondition(internetCondition);\n\
    ```\n\n接下来，使用 TaskBuilder 的 `Register()` 方法注册任务。以下是任务注册的代码片段：\n\n```\nvar task\
    \ = builder.Register();\n```\n\n## 11.4 监控后台任务进度与完成\n\n### 问题\n\n你的应用创建并注册了一个后台任务。你希望监控该任务在应用中的进度和完成情况。\n\
    \n### 解决方案\n\n已在系统中注册的任务会触发进度和完成事件。你的应用需要提供事件处理程序，并订阅任务公开的事件。\n\n### 实现原理\n\n\
    处理任务完成。首先，你需要创建一个函数，用于附加到后台任务的 `Completion` 事件上。该函数接收一个 `BackgroundTaskCompletedEventArgs`\
    \ 类型的参数。以下是函数的基本结构：\n\n```\nfunction onCompleted(args){\n    //处理任务完成的代码\n}\n\
    ```\n\n接下来，你需要将该函数注册到后台任务中。以下是实现此操作的代码片段：\n\n```\ntask = builder.register();\n\
    task.addEventListener(\"completed\", onCompleted);\n```\n\n将所有需要在任务完成时执行的代码放入\
    \ `onCompleted` 函数中。\n\n处理任务进度。与完成事件类似，任务也会触发进度事件。你需要编写一个函数，用于附加到后台任务的进度事件上。通过订阅进度事件，每当任务触发进度事件时，都会调用附加到该事件的函数。任何进度报告流程都可以在该函数中编写。该函数接收两个参数：一个\
    \ `IBackgroundTaskRegistration` 对象和一个 `BackgroundTaskProgressEventArgs` 对象。以下是处理进度事件的函数基本结构：\n\
    \n```\nfunction onProgress(task, args){\n    //在此处添加执行进度相关流程的代码\n}\n```\n\n接下来，你需要将该函数注册到后台任务的进度事件上。以下是注册函数的代码片段：\n\
    \n```\ntask = builder.register();\ntask.addEventListener(\"progress\", onProgress);\n\
    ```\n\n# 第 12 章：Windows 应用中的位置与地图\n\n构建 Windows 应用的开发者可以利用 Windows 设备的功能，将位置和地图集成到其应用中。在本章中，你将学习如何在通用\
    \ Windows 运行时应用中使用位置 API 的解决方案。\n\n## 12.1 获取当前位置\n\n### 问题\n\n你不知道自己在哪里。Windows\
    \ 应用需要确定并显示你的当前位置。\n\n### 解决方案\n\n使用 `Windows.Devices.Geolocation` 命名空间中定义的 `Geolocator`\
    \ 类的 `getGeopositionAsync` 方法，从基于 Windows 10 的设备获取当前位置。\n"
- fmt: "### How It Works\n\nCreate a new Universal Windows project using the Universal\
    \ Windows template, which can be found under the JavaScript ➤ Windows ➤ Universal\
    \ node of the New Project dialog in Microsoft Visual Studio 2015\\. This creates\
    \ a single project in the Visual Studio Solution with the necessary files in it\
    \ to start with.\n\nThe first step to integrate the location functionality in\
    \ the app is to declare the Location capability in the `package.appxmanifest`\
    \ file of the project. From Visual Studio Solution Explorer, double-click the\
    \ `package.appxmanifest` file. In the GUI designer, click the Capabilities tab\
    \ and select Location, as shown in Figure 12-1.\n\n![A978-1-4842-0719-2_12_Fig1_HTML.jpg](A978-1-4842-0719-2_12_Fig1_HTML.jpg)\n\
    \nFigure 12-1. Capabilities tab in Visual Studio\n\nOpen the project `default.html`\
    \ file and add the following code under the `body` tag of each file:\n\n```\n\
    <div>\n    <p>Get the Current Location</p>\n    <br />\n    <button id=\"btnLocation\"\
    >Get Location</button> <br />\n</div>\n<br />\n<div>\n    <table>\n        <tr>\n\
    \            <td>\n                Latitude\n            </td>\n            <td\
    \ >\n                <div id=\"latitude\">\n                </div>\n         \
    \   </td>\n        </tr>\n        <tr>\n            <td>\n                Longitude\n\
    \            </td>\n            <td>\n                <div id=\"longitude\">\n\
    \                </div>\n            </td>\n        </tr>\n        <tr>\n    \
    \        <td>\n                Accuracy\n            </td>\n            <td>\n\
    \                <div id=\"accuracy\">\n                </div>\n            </td>\n\
    \        </tr>\n    </table>\n</div>\n```\n\nOpen `default.js` (`/js/default.js`)\
    \ in the project and replace the code in the file with the following:\n\n```\n\
    // For an introduction to the Blank template, see the following documentation:\n\
    // http://go.microsoft.com/fwlink/?LinkID=392286\n(function () {\n    \"use strict\"\
    ;\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \               done(function ()\n               {\n                   // Add\
    \ an event handler to the button.\n                   document.querySelector(\"\
    #btnLocation\").addEventListener(\"click\",\n                       getLocation);\n\
    \               }));\n        }\n    };\n    var geolocation = null;\n    function\
    \ getLocation()\n    {\n        if (geolocation == null) {\n            geolocation\
    \ = new Windows.Devices.Geolocation.Geolocator();\n        }\n        if (geolocation\
    \ != null) {\n            geolocation.getGeopositionAsync().then(getPosition);\n\
    \        }\n    }\n    function getPosition(position)\n    {\n        document.getElementById('latitude').innerHTML\
    \ = position.coordinate.point.position.latitude;\n        document.getElementById('longitude').innerHTML\
    \ = position.coordinate.point.position.longitude;\n        document.getElementById('accuracy').innerHTML\
    \ = position.coordinate.accuracy;\n    }\n    app.oncheckpoint = function (args)\
    \ {\n    };\n    app.start();\n})();\n```\n\nThe `document.querySelector` is used\
    \ to add the click event handler for the `btnLocation` element. Upon click of\
    \ the button, the `getLocation` method is called.\n\nTo get the current location\
    \ information, create an instance of the `Geolocator` class defined in the `Windows.Devices.Geolocation`\
    \ namespace and then invoke the `getGeopositionAsync` method of the `Geolocator`\
    \ class. Once the location is retrieved, an action method needs to be defined\
    \ to perform a certain set of actions. The `getPosition` method, as shown in the\
    \ preceding code snippet, takes care of this. The parameter `position` is of type\
    \ `Geolocation`, which can be used to get the current location information like\
    \ latitude, longitude, accuracy, and so forth.\n\nThe next step is to build the\
    \ project and run it in the emulator or local machine. Choose the Build menu and\
    \ select Build Solution from Visual Studio to build the project. Select Mobile\
    \ Emulator from the Run drop-down menu in the Visual Studio standard toolbar.\n\
    \nWhen you run the app for the first time on Windows, you are prompted to confirm\
    \ if it is OK to use your location. Click Allow so that the app can use the location.\n\
    \nIn the application, click the Get Location button to display the current location’s\
    \ latitude and longitude, as shown in Figure 12-2.\n\n![A978-1-4842-0719-2_12_Fig2_HTML.jpg](A978-1-4842-0719-2_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2. Current location in Windows Mobile app\n\nWhen you click the app\
    \ on the local machine, you are prompted with a message, as shown in Figure 12-3.\
    \ Click the Allow button. This displays the current location (see Figure 12-4).\n\
    \n![A978-1-4842-0719-2_12_Fig4_HTML.jpg](A978-1-4842-0719-2_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4. Current location in a Windows desktop family app\n\n![A978-1-4842-0719-2_12_Fig3_HTML.jpg](A978-1-4842-0719-2_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3. Allow current location prompt in Windows desktop family app\n\n\
    **Note**  \nEnsure that Location Services is enabled in your Windows device to\
    \ get the current location.\n\n## 12.2 Respond to Geolocator Location Updates\n\
    \n### Problem\n\nYou want to frequently check if there is any change to the location\
    \ within the app.\n\n### Solution\n\nUse the `getGeopositionAsync` method of the\
    \ `Geolocator` class defined in the `Windows.Devices.Geolocation` namespace. Subscribe\
    \ to the `PositionChanged` and the `LocationChanged` events to track the change\
    \ in location and respond from the Windows Mobile or desktop family app."
