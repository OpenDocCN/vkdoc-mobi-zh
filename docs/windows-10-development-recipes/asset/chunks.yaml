    \n        var toggleMobileDataButton = document.getElementById(\"UserMobileData\"\
    ).winControl;\n\n        if (toggleMobileDataButton.checked) {\n            roamingSettingscontainer.values[\"\
    UseMobileData\"] = \"Yes\";\n        }\n        else {\n            roamingSettingscontainer.values[\"\
    UseMobileData\"] = \"No\";\n        }\n\n        var toggleLocationDataButton\
    \ = document.getElementById(\"LocationServices\").winControl;\n\n        if (toggleLocationDataButton.checked)\
    \ {\n            roamingSettingscontainer.values[\"LocationServices\"] = \"Yes\"\
    ;\n        }\n        else {\n            roamingSettingscontainer.values[\"LocationServices\"\
    ] = \"No\";\n        }\n\n        document.getElementById(\"msg\").innerText =\
    \ \"数据已保存！\";\n    }\n\n}//end of function btnCreateRoamingContainerClick\n```\n\
    \n这段代码声明了一个名为 `ApplicationData` 的变量，并将其赋值为 `Windows.Storage.ApplicationData.current`，它表示应用数据存储中的应用设置容器。下一行从\
    \ `ApplicationData` 中检索 `roamingSettings`，并将其存储在 `roamingSettings` 变量中。\n\n然后，它会调用\
    \ `roamingSettings.containers.hasKey` 函数来检查容器是否存在。如果不存在，则使用 `createContainer`\
    \ 方法创建一个设置容器。上面的示例创建了一个名为 `App_GreetingDataRoamingContainer` 的设置容器，并将其存储在 `roamingSettingscontainer`\
    \ 中。`createContainer` 方法接受两个参数：设置容器的名称和 `Windows.Storage.ApplicationDataCreateDisposition.Always`，后者指示始终检查容器是否存在。如果存在，则返回指定的容器；否则，创建一个新的容器。\n\
    \n下一行代码根据切换开关控件是否被选中来检查其值。如果切换开关被选中（\"是\"），则使用 `roamingSettingscontainer.values[\"\
    UseMobileData\"]` 函数存储漫游数据应用设置，该函数使用 `container.value` 方法来设置值。对于定位服务切换开关，也执行相同的操作。\n\
    \n`DataStorageDemo.js` 文件中的完整代码如下所示：\n\n```javascript\n(function () {\n    \"\
    use strict\";\n\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var submitbutton = document.getElementById(\"btnSubmit\");\n\
    \            submitbutton.addEventListener(\"click\", btnCreateRoamingContainerClick,\
    \ false);\n        });\n    }\n\n    document.addEventListener(\"DOMContentLoaded\"\
    , GetControl);\n\n    function btnCreateRoamingContainerClick(mouseEvent) {\n\
    \        var ApplicationData = Windows.Storage.ApplicationData.current;\n    \
    \    var roamingSettings = ApplicationData.roamingSettings;\n\n        // 创建本地设置容器\n\
    \        if (roamingSettings.containers.hasKey(\"UserPreference_RoamingProfile\"\
    )) {\n            var roamingSettingscontainer = roamingSettings.createContainer(\"\
    UserPreference_RoamingProfile\", Windows.Storage.ApplicationDataCreateDisposition.Always);\n\
    \            var toggleMobileDataButton = document.getElementById(\"UserMobileData\"\
    ).winControl;\n\n            if (toggleMobileDataButton.checked) {\n         \
    \       roamingSettingscontainer.values[\"UseMobileData\"] = \"Yes\";\n      \
    \      } else {\n                roamingSettingscontainer.values[\"UseMobileData\"\
    ] = \"No\";\n            }\n\n            var toggleLocationDataButton = document.getElementById(\"\
    LocationServices\").winControl;\n\n            if (toggleLocationDataButton.checked)\
    \ {\n                roamingSettingscontainer.values[\"LocationServices\"] = \"\
    Yes\";\n            } else {\n                roamingSettingscontainer.values[\"\
    LocationServices\"] = \"No\";\n            }\n\n            document.getElementById(\"\
    msg\").innerText = \"数据已保存！！\";\n        }\n    }//end of function btnCreateRoamingContainerClick\n\
    })();\n```\n\n就是这样了。漫游数据将在用户访问此 Windows 10 应用的所有设备上可用。\n\n当你在 Windows 10 仿真器或\
    \ Windows Mobile 上运行该应用程序时，它将如图 9-4 所示。\n\n![A978-1-4842-0719-2_9_Fig4_HTML.jpg](img/A978-1-4842-0719-2_9_Fig4_HTML.jpg)\n\
    \n**图 9-4.** 使用漫游应用数据设置保存用户偏好设置的表单\n\n## 9.6 如何注册数据更改事件\n\n### 问题\n\n您需要注册并实现一个数据更改事件处理程序。\n\
    \n### 解决方案\n\n您可以使用 `ApplicationData.DataChanged` 事件为漫游数据注册数据更改事件。\n"
- fmt: "### How It Works\n\nWhen roaming data are changed on one of device, the Universal\
    \ Windows app replicates the roaming data to cloud and then it synchronizes the\
    \ roaming data to other devices where app is installed by users. Let’s say after\
    \ the synchronization you want to ensure that app data is updated which is based\
    \ on roaming data. For example, you storing user preferences in roaming data and\
    \ when user preferences are changed, you want to change the settings on user’s\
    \ devices as per the new preference. Well, Universal Windows app allows you to\
    \ register an event, which will be executed after the app data has just finished\
    \ syncing from the cloud.\n\nYou can use `ApplicationData.DataChanged` event to\
    \ register an event. So let’s implement this.\n\nCreate a new project using the\
    \ Windows Universal (Blank App) template in Microsoft Visual Studio 2015. This\
    \ creates a Windows Universal app that can run on Windows tablets and Windows\
    \ Phone running Windows 10.  \nOpen the `default.html` page from the project in\
    \ Visual Studio Solution Explorer.  \nDefine an HTML `div` tag for the app title\
    \ bar.  \n\n```html\n<body class=\"win-type-body\">\n\n    <div id=\"titleBarContent\"\
    \ style=\"width: 100%;height:30px; background:border-box darkblue; overflow: hidden;\
    \ z-index: 3\">\n\n        <i>Custom title bar</i>\n\n    </div>\n\n</body>\n\
    ```\n\nThe complete `default.html` code will look like this:\n\n```html\n<!DOCTYPE\
    \ html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>_9.7</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- _9.7 references -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
    \ src=\"/js/DatastorageDemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
    \ darkblue; overflow: hidden; z-index: 3\">\n        <i>Custom title bar</i>\n\
    \    </div>\n</body>\n</html>\n```\n\nRight-click the project in the Solution\
    \ Explorer and select Add ➤ New JavaScript file. Provide a name for the file.\
    \ In this example, let’s name the file `DatastorageDemo.js`.\n\nAdd the following\
    \ code in the `js` file. The code first registers a data changed event with the\
    \ `applicationData` object.\n\n```javascript\n(function () {\n    \"use strict\"\
    ;\n    function GetControl() {\n        WinJS.UI.processAll().done(function ()\
    \ {\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    \    var applicationData = Windows.Storage.ApplicationData.current;\n    applicationData.addEventListener(\"\
    datachanged\", datachangeHandler);\n    function datachangeHandler(eventArgs)\
    \ {\n        var applicationData = Windows.Storage.ApplicationData.current;\n\
    \        var roamingSettings = applicationData.roamingSettings;\n        // Creating\
    \ a roaming settings container\n        var roamingSettingscontainer = roamingSettings.containers\
    \ (\"App_GreetingDataContainer\");\n        //Read the Data again\n        document.getElementById(\"\
    titleBarContent\").innerText = roamingSettingscontainer.values[\"App_Heading_English\"\
    ];\n    }\n})();\n```\n\nThis code also defines the data changed event handler\
    \ in the same `js` file. The `datachangeHandler` event retrieves the roaming container\
    \ from the `applicationData` object by using the `loopup` function. It then reads\
    \ the roaming settings named `App_Heading_English` and assigns that to the `div`\
    \ tab for the title bar.\n\n## 9.7 How to Create, Write, and Read a Local File\n\
    \n### Problem\n\nYou need to create a file, write to a file, and read from a file\
    \ in the app data store in your Windows 10 app.\n\n### Solution\n\nUse the `Windows.Storage.StorageFile`\
    \ class for file handling.\n\n### How It Works\n\nThe `Windows.Storage.StorageFile`\
    \ class provides necessary methods for file handling in a Universal Windows app.\
    \ The file you create can be stored in folders, libraries (picture library) and\
    \ Universal Windows apps support network locations, such as OneDrive and so forth.\n\
    \n#### Local Folder\n\nAs you know, a Universal Windows app can run on many devices:\
    \ Windows Mobile, PCs running Windows 10, the Microsoft Surface tablet, and so\
    \ forth. So when you deploy your app in the Windows Store, your app users can\
    \ download and run you app on one or more devices. So how do you manage app settings\
    \ specific to your app on a particular device? Well, you can use a local folder\
    \ for that. The local folder can be used to store local app data on a particular\
    \ device. The local folder data is available for the device on which it is stored.\
    \ It can’t be synchronized with other devices. A Universal Windows app stores\
    \ app data in the app package’s `LocalState`.\n\n#### Roaming Folder\n\nNow let’s\
    \ say you want to store user preferences for your app and you want to ensure that\
    \ same user preference is available on all devices for a particular user. Well,\
    \ you can achieve this by using the roaming folder for that. It stores the app\
    \ data in the app package’s `RoamingState`. The app data stored in a roaming folder\
    \ is synchronized between devices when app users run apps on multiple devices."
  raw: '### How It Works


    When roaming data are changed on one of device, the Universal Windows app replicates
    the roaming data to cloud and then it synchronizes the roaming data to other devices
    where app is installed by users. Let’s say after the synchronization you want
    to ensure that app data is updated which is based on roaming data. For example,
    you storing user preferences in roaming data and when user preferences are changed,
    you want to change the settings on user’s devices as per the new preference. Well,
    Universal Windows app allows you to register an event, which will be executed
    after the app data has just finished syncing from the cloud.


    You can use `ApplicationData.DataChanged` event to register an event. So let’s
    implement this.


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015. This creates a Windows Universal app that can run on Windows
    tablets and Windows Phone running Windows 10.   Open the default.html page from
    the project in Visual Studio Solution Explorer.   Define an HTML `div` tag for
    the app title bar.  


    `<body class="win-type-body">`


        `<div id="titleBarContent" style="width: 100%;height:30px; background:border-box
    darkblue; overflow: hidden; z-index: 3">`


            `<i>Custom title bar</i>`


        `</div>`


    `</body>`


    The complete `default.html` code will look like this:


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>_9.7</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-dark.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- _9.7 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


        `<script src="/js/DatastorageDemo.js"></script>`


    `</head>`


    `<body class="win-type-body">`


        `<div id="titleBarContent" style="width: 100%;height:30px; background:border-box
    darkblue; overflow: hidden; z-index: 3">`


            `<i>Custom title bar</i>`


        `</div>`


    `</body>`


    `</html>`


    Right-click the project in the Solution Explorer and select Add ➤ New JavaScript
    file. Provide a name for the file. In this example, let’s name the file DatastorageDemo.js.


    Add the following code in the `js` file. The code first registers a data changed
    event with the `applicationData` object.


    `(function () {`


        `"use strict";`


        `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", GetControl);`


        `var applicationData = Windows.Storage.ApplicationData.current;`


        `applicationData.addEventListener("datachanged", datachangeHandler);`


    `function datachangeHandler(eventArgs) {`


            `var applicationData = Windows.Storage.ApplicationData.current;`


            `var roamingSettings = applicationData.roamingSettings;`


            `// Creating a roaming settings container`


            `var roamingSettingscontainer = roamingSettings.containers ("App_GreetingDataContainer");`


            `//Read the Data again`


            `document.getElementById("titleBarContent").innerText = roamingSettingscontainer.values["App_Heading_English"];`


        `}`


    `})();`


    This code also defines the data changed event handler in the same `js` file. The
    `datachangeHandler` event retrieves the roaming container from the `applicationData`
    object by using the `loopup` function. It then reads the roaming settings named
    `App_Heading_English` and assigns that to the `div` tab for the title bar.


    ## 9.7 How to Create, Write, and Read a Local File


    ### Problem


    You need to create a file, write to a file, and read from a file in the app data
    store in your Windows 10 app.


    ### Solution


    Use the `Windows.Storage.StorageFile` class for file handling.


    ### How It Works


    The `Windows.Storage.StorageFile` class provides necessary methods for file handling
    in a Universal Windows app. The file you create can be stored in folders, libraries
    (picture library) and Universal Windows apps support network locations, such as
    OneDrive and so forth.


    #### Local Folder


    As you know, a Universal Windows app can run on many devices: Windows Mobile,
    PCs running Windows 10, the Microsoft Surface tablet, and so forth. So when you
    deploy your app in the Windows Store, your app users can download and run you
    app on one or more devices. So how do you manage app settings specific to your
    app on a particular device? Well, you can use a local folder for that. The local
    folder can be used to store local app data on a particular device. The local folder
    data is available for the device on which it is stored. It can’t be synchronized
    with other devices. A Universal Windows app stores app data in the app package’s
    `LocalState`.


    #### Roaming Folder


    Now let’s say you want to store user preferences for your app and you want to
    ensure that same user preference is available on all devices for a particular
    user. Well, you can achieve this by using the roaming folder for that. It stores
    the app data in the app package’s `RoamingState`. The app data stored in a roaming
    folder is synchronized between devices when app users run apps on multiple devices.'
  trans: "\n### 工作原理\n\n当设备上的漫游数据发生更改时，通用 Windows 应用会将这些漫游数据复制到云端，然后同步到用户安装了该应用的其他设备。假设同步后，您需要确保基于漫游数据的应用数据得到更新。例如，您将用户首选项存储在漫游数据中，当用户首选项发生更改时，您希望根据新首选项更新用户设备上的设置。通用\
    \ Windows 应用允许您注册一个事件，该事件将在应用数据完成从云端同步后执行。\n\n您可以使用 `ApplicationData.DataChanged`\
    \ 事件来注册事件。接下来，让我们实现这个功能。\n\n使用 Microsoft Visual Studio 2015 中的 Windows 通用（空白应用）模板创建一个新项目。这将创建一个可在运行\
    \ Windows 10 的 Windows 平板电脑和 Windows Phone 上运行的 Windows 通用应用。\n在 Visual Studio\
    \ 解决方案资源管理器中打开项目中的 `default.html` 页面。\n为应用标题栏定义一个 HTML `div` 标签。\n\n```html\n\
    <body class=\"win-type-body\">\n\n    <div id=\"titleBarContent\" style=\"width:\
    \ 100%;height:30px; background:border-box darkblue; overflow: hidden; z-index:\
    \ 3\">\n\n        <i>自定义标题栏</i>\n\n    </div>\n\n</body>\n```\n\n完整的 `default.html`\
    \ 代码如下所示：\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\"\
    \ />\n    <title>_9.7</title>\n    <!-- WinJS 引用 -->\n    <link href=\"WinJS/css/ui-dark.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script\
    \ src=\"WinJS/js/ui.js\"></script>\n    <!-- _9.7 引用 -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
    \ src=\"/js/DatastorageDemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
    \ darkblue; overflow: hidden; z-index: 3\">\n        <i>自定义标题栏</i>\n    </div>\n\
    </body>\n</html>\n```\n\n右键单击解决方案资源管理器中的项目，然后选择“添加” ➤ “新建 JavaScript 文件”。为文件提供一个名称。在此示例中，我们将文件命名为\
    \ `DatastorageDemo.js`。\n\n在 `js` 文件中添加以下代码。该代码首先使用 `applicationData` 对象注册一个数据更改事件。\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    function GetControl()\
    \ {\n        WinJS.UI.processAll().done(function () {\n        });\n    }\n  \
    \  document.addEventListener(\"DOMContentLoaded\", GetControl);\n    var applicationData\
    \ = Windows.Storage.ApplicationData.current;\n    applicationData.addEventListener(\"\
    datachanged\", datachangeHandler);\n    function datachangeHandler(eventArgs)\
    \ {\n        var applicationData = Windows.Storage.ApplicationData.current;\n\
    \        var roamingSettings = applicationData.roamingSettings;\n        // 创建一个漫游设置容器\n\
    \        var roamingSettingscontainer = roamingSettings.containers (\"App_GreetingDataContainer\"\
    );\n        // 重新读取数据\n        document.getElementById(\"titleBarContent\").innerText\
    \ = roamingSettingscontainer.values[\"App_Heading_English\"];\n    }\n})();\n\
    ```\n\n这段代码还在同一个 `js` 文件中定义了数据更改事件处理程序。`datachangeHandler` 事件通过使用 `loopup` 函数从\
    \ `applicationData` 对象中检索漫游容器。然后，它读取名为 `App_Heading_English` 的漫游设置，并将其分配给标题栏的\
    \ `div` 标签。\n\n## 9.7 如何创建、写入和读取本地文件\n\n### 问题\n\n您需要在 Windows 10 应用的应用数据存储中创建文件、写入文件以及从文件中读取数据。\n\
    \n### 解决方案\n\n使用 `Windows.Storage.StorageFile` 类进行文件处理。\n\n### 工作原理\n\n`Windows.Storage.StorageFile`\
    \ 类为通用 Windows 应用中的文件处理提供了必要的方法。您创建的文件可以存储在文件夹、库（图片库）中，并且通用 Windows 应用支持网络位置，例如\
    \ OneDrive 等。\n\n#### 本地文件夹\n\n如您所知，通用 Windows 应用可以在多种设备上运行：Windows Mobile、运行\
    \ Windows 10 的 PC、Microsoft Surface 平板电脑等。因此，当您在 Windows 商店中部署应用时，您的应用用户可以在一个或多个设备上下载并运行该应用。那么，如何管理特定设备上特定于应用的设置呢？您可以使用本地文件夹来实现。本地文件夹可用于在特定设备上存储本地应用数据。本地文件夹数据仅在其存储的设备上可用，无法与其他设备同步。通用\
    \ Windows 应用将应用数据存储在应用包的 `LocalState` 中。\n\n#### 漫游文件夹\n\n现在，假设您希望存储应用的用户首选项，并确保同一用户首选项在特定用户的所有设备上均可用。您可以使用漫游文件夹来实现这一点。漫游文件夹将应用数据存储在应用包的\
    \ `RoamingState` 中。当应用用户在多个设备上运行应用时，存储在漫游文件夹中的应用数据会在设备之间同步。\n"
- fmt: "# Temporary Folder\n\nThe third type of location is the temporary folder,\
    \ which allows you to store app data for a short duration. App data stored in\
    \ a temporary folder is deleted once the data is not in use. So always use this\
    \ folder to store data that is less important. A Universal Windows app stores\
    \ app data in the app package's `TemporaryState`.\n\nThe `StorageFolder` class\
    \ exposes many methods for creating files, reading content from a file, and writing\
    \ content to a file. Let's look at each of the methods.\n\nThe `createFileAsync`\
    \ method creates a new file on the specified location. If a file already exists,\
    \ it will overwrite the file.\n\nThe syntax for using the function is given here:\n\
    \n```\nstorageFolder.createFileAsync(desiredName).done(function CreationSuccess(newFileObj))\n\
    {\n    /* Success call back */\n}, CreationFailed(error))\n{\n    Failed call\
    \ back */\n});\n```\n\nAs you see, the `createFileAsync` method has to be defined\
    \ using a success callback function and a failed callback function.\n\nThe complete\
    \ code to create a file in the local folder is given here:\n\n```\nfunction btnDataToFileClick(mouseEvent)\
    \ {\n    var ApplicationData = Windows.Storage.ApplicationData.current;\n    var\
    \ localFolder = ApplicationData.localFolder;\n    var newFilePromise = localFolder.createFileAsync(\"\
    MyFile.txt\");\n    newFilePromise.done(\n        function (file) {\n        \
    \    // WinJS.log(\"The file MyFile.txt was created.\", \"sample\", \"status\"\
    );\n            WinJS.log && WinJS.log(\"The file MyFile.txt was created.\", \"\
    sample\", \"status\");\n        },\n        function (error) {\n        });\n\
    }\n```\n\nWhen you run this application on your Windows 10 local device, a file\
    \ named `MyFile.txt` is created in the local folder, as shown in Figure [9-5](#A978-1-4842-0719-2_9_Chapter.html#Fig5).\n\
    \n![A978-1-4842-0719-2_9_Fig5_HTML.jpg](A978-1-4842-0719-2_9_Fig5_HTML.jpg)\n\n\
    Figure 9-5.\n\nA file created in local folder\n\nThe local folder location is\
    \ `C:\\Users\\<<UserName>>\\AppData\\Local\\Packages\\5342d954-ee4c-413c-8ed8-41b3befa6afc_khbmmdtkmdajr\\\
    LocalState`. This file is empty, as we haven't written into this file yet.\n\n\
    Great. Now let's write code to write content to the file. For that, we first add\
    \ a text area box in the `default.html` file. The `default.html`'s body tag looks\
    \ like this:\n\n```\n<body class=\"win-type-body\" style=\"background-color:goldenrod\"\
    >\n    <div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
    \ darkblue; overflow: hidden; z-index: 3\">\n        <i>File Handling Demo</i>\n\
    \    </div>\n    <br />\n       <input type=\"button\" value=\"Save Data to File\"\
    \ id=\"btnCreateAFile\" />\n    <textarea rows=\"10\" cols=\"100\" id=\"textarea\"\
    \ class=\"win-textarea\"></textarea>\n    <input type=\"button\" value=\"Save\
    \ Data to File\" id=\"btnDataToFile\" />\n</body>\n```\n\nThis code adds a text\
    \ area to the `default.html` file, along with buttons named `btnDataToFile` and\
    \ `btnCreateaFile`.\n\nRight-click the project's js file in Solution Explorer\
    \ and select Add ➤ New JavaScript file. Provide a name for the file. In this example,\
    \ let's name the file `DatastorageDemo.js`.\n\n```\n(function () {\n    \"use\
    \ strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var submitbutton = document.getElementById(\"btnCreateAFile\"\
    );\n            submitbutton.addEventListener(\"click\", btnCreateAFileClick,\
    \ false);\n            var submitbutton = document.getElementById(\"btnDataToFile\"\
    );\n            submitbutton.addEventListener(\"click\", btnDataToFileClick, false);\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n```\n\nThis code adds event receivers to both button controls. Now add\
    \ an event code in the `DatastorageDemo.js` file.\n\n```\nfunction btnCreateAFileClick(mouseEvent)\
    \ {\n    var ApplicationData = Windows.Storage.ApplicationData.current;\n    var\
    \ LocalFolder = ApplicationData.localFolder;\n    var newFilePromise = LocalFolder.createFileAsync(\"\
    MyFile.txt\");\n    newFilePromise.done(\n        function (file) {\n        \
    \    // WinJS.log(\"The file MyFile.txt was created.\", \"sample\", \"status\"\
    );\n            WinJS.log && WinJS.log(\"The file MyFile.txt was created.\", \"\
    sample\", \"status\");\n        },\n        function (error) {\n        });\n\
    \    }\n```\n\nThis code is to create a new file on the local folder. You will\
    \ not add another event to the `DataStorageDemo.js` file for the `btnDataToFile`'s\
    \ click event.\n\n```\nfunction btnDataToFileClick(mouseEvent) {\n    var ApplicationData\
    \ = Windows.Storage.ApplicationData.current;\n    var LocalFolder = ApplicationData.localFolder;\n\
    \    // Open sample file.\n    var FilePromise = LocalFolder.getFileAsync(\"MyFile.txt\"\
    );\n    FilePromise.then(function (file) {\n        // If file found …\n     \
    \   if (file) {\n            // Write to file.\n            var txtarea = document.getElementById(\"\
    textarea\").innerText;\n            Windows.Storage.FileIO.writeTextAsync(file,\
    \ txtarea).then(function (contents) {\n                WinJS.log && WinJS.log(\"\
    The text was wrttien to file MyFile.txt.\", \"sample\", \"status\");\n       \
    \     });\n        }\n    }, function (error) {\n        // Handle error.\n  \
    \  });\n}\n```\n\nThis code gets the file by using the `getFileAsync` method of\
    \ the local folder. If file exists, then it next uses the `Windows.Storage.FileIO.writeTextAsync.writeTextAsync`\
    \ method to write content to the file.\n\nWhen you run this app using a local\
    \ device in Visual Studio, you see the default screen, as shown in Figure [9-6](#A978-1-4842-0719-2_9_Chapter.html#Fig6).\n\
    \n![A978-1-4842-0719-2_9_Fig6_HTML.jpg](A978-1-4842-0719-2_9_Fig6_HTML.jpg)\n\n\
    Figure 9-6.\n\nFile handling demo's default screen\n\nThe Create a File button\
    \ creates a file in the local folder of the device where you are running your\
    \ app. Once the file is created, type some text to the text area. Clicking Save\
    \ Data to File saves data to the file. When you open the file in the in Notepad,\
    \ you see the content of the file, as shown in Figure [9-7](#A978-1-4842-0719-2_9_Chapter.html#Fig7).\n\
    \n![A978-1-4842-0719-2_9_Fig7_HTML.jpg](A978-1-4842-0719-2_9_Fig7_HTML.jpg)\n\n\
    Figure 9-7.\n\nThe file on the local holder with the content\n\nSimilarly, you\
    \ can use the `readTextAsync` method to read the contents of a file. The code\
    \ to read content from a file is given here:\n\n```\n// Read from the file.\n\
    \    Windows.Storage.FileIO.readTextAsync(file).then(function (contents) {\n \
    \           document.getElementById(\"textarea1\").innerText = contents;\n   \
    \   });\n```\n\nYou can create files at any location in a similar way by referring\
    \ to the right location, such as a local folder, a roaming folder, and so forth.\n\
    \n# Chapter 10: Sharing Data\n\nThis chapter covers how to share data between\
    \ Universal Windows Platform apps. Sharing data enables developers to build features\
    \ that allow users to share information, copy/paste, and drag and drop from one\
    \ app to another app. For example, a user might want to copy some text or an image\
    \ from one app and paste it into another app. Users also look for sharing information/links\
    \ to social networking sites.\n\nWindows 10 apps support sharing data in two different\
    \ ways.\n\n*   A source app allows users to share data from the app to other apps.\n\
    *   A target app allows users to declare an app as a target app, which can retrieve\
    \ the shared data from other apps. An app that is declared a target app allows\
    \ the user to select it as a destination app while sharing data.\n\nBy using the\
    \ sharing data options, users can share plain text, web links, photos, and videos\
    \ with other apps. In this chapter, you will learn to implement sharing data from\
    \ a source app and declaring a target app."
