    # 第十章：共享数据\n\n本章涵盖如何在通用 Windows 平台应用之间共享数据。共享数据使开发人员能够构建功能，允许用户在应用之间分享信息、复制/粘贴以及拖放。例如，用户可能希望从一个应用复制一些文本或图像，然后粘贴到另一个应用中。用户也寻求在社交网站之间分享信息/链接。\n\
    \nWindows 10 应用以两种不同的方式支持数据共享。\n\n*   源应用允许用户将数据从该应用共享到其他应用。\n*   目标应用允许用户将一个应用声明为目标应用，该应用可以检索来自其他应用的共享数据。被声明为目标应用的应用允许用户在共享数据时将其选择为目标应用。\n\
    \n通过使用共享数据选项，用户可以与其他应用共享纯文本、网页链接、照片和视频。在本章中，您将学习如何实现从源应用共享数据以及声明目标应用。\n"
- fmt: "# Share Contract\n\nIn order to share data or receive data, every app needs\
    \ to implement a share contract as either a source app or a target app. The data\
    \ sharing involves the following three components:\n\n- **Source app**: The source\
    \ app implements a share contract as a source app to share data. This app registers\
    \ the data transfer manager and fills the data package to be shared.\n- **Share\
    \ broker**: The share broker is the Share charm that enables the communication\
    \ between the source and the target app.\n- **Target app**: The target app implements\
    \ the share contract as a target app to receive data shared by other apps.\n\n\
    ## 10.1 Set up an Event Handler for a Share Option for a Source App\n\n### Problem\n\
    \nYou need to set up an event handler for a share option for a source app.\n\n\
    ### Solution\n\nYou need to use the `datarequested` event listener of `Windows.ApplicationModel.DataTransfer.DataTransferManager`.\n\
    \n### How It Works\n\nThe `datarequested` event listener method of the `Windows.ApplicationModel.DataTransfer.DataTransferManager`\
    \ class is triggered when the user invokes the share. This event can be fired\
    \ by a user’s actions or automatically in a specific scenario; for example, when\
    \ a user completes a survey and the app would like to share the result of the\
    \ survey.\n\nTo register the event handler with the `DataTransferManager` object,\
    \ you can use the following code:\n\n```\nvar dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    dataTransferManager.addEventListener(\"datarequested\", dataRequested_Share);\n\
    ```\n\nIn the preceding code, the first thing you do is get the current page’s\
    \ `DataTransferManager` object using the `DataTransferManager.getForCurrentView()`\
    \ function.\n\nThe next line then adds an event listener for the `datarequested`\
    \ event to the `DataTransferManager` object. In the preceding code, `dataRequested_Share`\
    \ is the listener and `datarequested` is an event. You can then define the receiver,\
    \ as shown in the following code.\n\n```\nfunction dataRequested_Share () {\n\
    \   // Your code for the sharing data\n}\n```\n\nLet’s create a Universal Windows\
    \ app using the preceding code to set up the event handler for the share options\
    \ for a source app.\n\nCreate a new project using the Windows Universal (Blank\
    \ App) template in Microsoft Visual Studio 2015.\n\nRight-click the project’s\
    \ `js` folder in Solution Explorer and select Add ➤ New JavaScript file. Provide\
    \ the name for the file. In this example, let’s name the file `DataSharingDemo.js`.\n\
    \n```\n(function () {\n    \"use strict\";\n    function GetControl() {\n    \
    \    WinJS.UI.processAll().done(function () {\n            var dataTransferManager\
    \ = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n\nfunction shareDataHandler(e) {\n    // Your code to share the text, image\
    \ etc\n}\n```\n\nThe preceding code gets the current page’s `DataTransferManager`\
    \ object using the `DataTransferManager.getForCurrentView()` function and then\
    \ adds an event listener to it, as explained earlier.\n\nNow, add the `DataSharingDemo.js`\
    \ reference to `default.html`, as shown here:\n\n```\n<!DOCTYPE html>\n<html>\n\
    <head>\n    <meta charset=\"utf-8\" />\n    <title>_10.1</title>\n    <!-- WinJS\
    \ references -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- _10.1 references -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
    \ src=\"/js/DataSharingDemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <p>Content goes here</p>\n</body>\n</html>\n```\n\n## 10.2 Share Plain\
    \ Text Data to Other Apps\n\n### Problem\n\nYou need to develop a feature that\
    \ allows users to share plain text data to other Windows 10 apps.\n\n### Solution\n\
    \nUse `request.data.setText` and `request.Data.Properties.description` to share\
    \ the data. The `request.data.title` is the mandatory field."
  raw: '## Share Contract


    In order to share data or receive data, every app needs to implement a share contract
    as either a source app or a target app. The data sharing involves the following
    three components:


    *   Source app: The source app implements a share contract as a source app to
    share data. This app registers the data transfer manager and fills the data package
    to be shared.

    *   Share broker: The share broker is the Share charm that enables the communication
    between the source and the target app.

    *   Target app: The target app implements the share contract as a target app to
    receive data shared by other apps.


    ## 10.1 Set up an Event Handler for a Share Option for a Source App


    ### Problem


    You need to set up an event handler for a share option for a source app.


    ### Solution


    You need to use the `datarequested` event listener of `Windows.ApplicationModel.DataTransfer.DataTransferManager`.


    ### How It Works


    The `datarequested` event listener method of the `Windows.ApplicationModel.DataTransfer.DataTransferManager`
    class is triggered when the user invokes the share. This event can be fired by
    a user’s actions or automatically in a specific scenario; for example, when a
    user completes a survey and the app would like to share the result of the survey.


    To register the event handler with the `DataTransferManager` object, you can use
    the following code:


    `var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();`


    `dataTransferManager.addEventListener("datarequested", dataRequested_Share);`


    In the preceding code, the first thing you do is get the current page’s `DataTransferManager`
    object using the `DataTransferManager.getForCurrentView()` function.


    The next line then adds an event listener for the `datarequested` event to the
    `DataTransferManager` object. In the preceding code, `dataRequested_Share` is
    the listener and `datarequested` is an event. You can then define the receiver,
    as shown in the following code.


    `function dataRequested_Share () {`


       `// Your code for the sharing data`


       `}`


    Let’s create a Universal Windows app using the preceding code to set up the event
    handler for the share options for a source app.


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015.


    Right-click the project’s `js` folder in Solution Explorer and select Add ➤ New
    JavaScript file. Provide the name for the file. In this example, let’s name the
    file DataSharingDemo. js.


    `(function () {`


        `"use strict";`


        `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


    `var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();`


    `dataTransferManager.addEventListener("datarequested", shareDataHandler);`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", GetControl);`


    `})();`


    `function shareDataHandler(e) {`


          `// Your code to share the text, image etc`


        `}`


    The preceding code gets the current page’s `DataTransferManager` object using
    the `DataTransferManager.getForCurrentView()` function and then adds an event
    listener to it, as explained earlier.


    Now, add the `DataSharingDemo.js` reference to `default.html`, as shown here:


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>_10.1</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-dark.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- _10.1 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


        `<script src="/js/DataSharingDemo.js"></script>`


    `</head>`


    `<body class="win-type-body">`


        `<p>Content goes here</p>`


    `</body>`


    `</html>`


    ## 10.2 Share Plain Text Data to Other Apps


    ### Problem


    You need to develop a feature that allows users to share plain text data to other
    Windows 10 apps.


    ### Solution


    Use `request.data.setText` and `request.Data.Properties.description` to share
    the data. The request.data.title is the mandatory field.'
  trans: "\n# 共享合约\n\n为了实现数据共享或接收数据，每个应用都需要作为源应用或目标应用来实现一份共享合约。数据共享涉及以下三个组件：\n\n-\
    \ **源应用**：源应用作为数据共享方实现共享合约。该应用注册数据传输管理器，并填充需要共享的数据包。\n- **共享代理**：共享代理是 `Share`\
    \ 魅力组件，负责实现源应用与目标应用之间的通信。\n- **目标应用**：目标应用作为数据接收方实现共享合约，用于接收其他应用共享的数据。\n\n## 10.1\
    \ 为源应用的共享选项设置事件处理程序\n\n### 问题\n\n你需要为源应用的共享选项设置一个事件处理程序。\n\n### 解决方案\n\n你需要使用\
    \ `Windows.ApplicationModel.DataTransfer.DataTransferManager` 的 `datarequested`\
    \ 事件监听器。\n\n### 工作原理\n\n当用户触发共享操作时，`Windows.ApplicationModel.DataTransfer.DataTransferManager`\
    \ 类的 `datarequested` 事件监听器方法会被触发。该事件可以由用户的操作触发，也可以在特定场景下自动触发；例如，当用户完成一项调查，并且应用想要共享调查结果时。\n\
    \n要使用 `DataTransferManager` 对象注册事件处理程序，你可以使用以下代码：\n\n```\nvar dataTransferManager\
    \ = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    dataTransferManager.addEventListener(\"datarequested\", dataRequested_Share);\n\
    ```\n\n在上述代码中，首先通过 `DataTransferManager.getForCurrentView()` 函数获取当前页面的 `DataTransferManager`\
    \ 对象。\n\n接下来，第二行代码为 `DataTransferManager` 对象的 `datarequested` 事件添加了一个事件监听器。在上述代码中，`dataRequested_Share`\
    \ 是监听器，`datarequested` 是事件。然后你可以像下面的代码所示定义接收器：\n\n```\nfunction dataRequested_Share\
    \ () {\n   // 用于共享数据的代码\n}\n```\n\n让我们使用上述代码创建一个通用 Windows 应用，为源应用的共享选项设置事件处理程序。\n\
    \n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。\n\n在解决方案资源管理器中右键单击项目的\
    \ `js` 文件夹，选择添加 ➤ 新建 JavaScript 文件。为文件命名。在此示例中，我们将文件命名为 `DataSharingDemo.js`。\n\
    \n```\n(function () {\n    \"use strict\";\n    function GetControl() {\n    \
    \    WinJS.UI.processAll().done(function () {\n            var dataTransferManager\
    \ = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n\nfunction shareDataHandler(e) {\n    // 用于共享文本、图片等的代码\n}\n```\n\n上述代码通过\
    \ `DataTransferManager.getForCurrentView()` 函数获取当前页面的 `DataTransferManager` 对象，然后为其添加一个事件监听器，如前所述。\n\
    \n现在，将 `DataSharingDemo.js` 的引用添加到 `default.html` 中，如下所示：\n\n```\n<!DOCTYPE html>\n\
    <html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>_10.1</title>\n   \
    \ <!-- WinJS 引用 -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- _10.1 引用 -->\n    <link href=\"/css/default.css\" rel=\"\
    stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"\
    /js/DataSharingDemo.js\"></script>\n</head>\n<body class=\"win-type-body\">\n\
    \    <p>内容放在此处</p>\n</body>\n</html>\n```\n\n## 10.2 将纯文本数据共享到其他应用\n\n### 问题\n\
    \n你需要开发一个功能，允许用户将纯文本数据共享到其他 Windows 10 应用。\n\n### 解决方案\n\n使用 `request.data.setText`\
    \ 和 `request.Data.Properties.description` 来共享数据。`request.data.title` 是必填字段。\n"
- fmt: "# How It Works\n\nIn the previous recipe, you learned that the `datarequested`\
    \ event listener is fired when a user starts a sharing session by using Share\
    \ charm. So now we will write code in the listener to share data. The listener\
    \ accepts a parameter, which is the event argument. First, you need to retrieve\
    \ the request object from the event argument, as shown here:\n\n```javascript\n\
    function shareDataHandler(e) {\n    //Start your code to share data\n    var request\
    \ = e.request;\n}\n```\n\nYou need to set properties for the request object. In\
    \ order to share plain text you will need to populate the following properties:\n\
    \n```javascript\nrequest.Data.Properties.Title = \"Title of the Data\";\nrequest.Data.Properties.Description\
    \ = \"Description of the Data\";\n```\n\nGreat, it looks simple, doesn’t it? Let’s\
    \ implement this and see a live demo of sharing data between apps.\n\nCreate a\
    \ new project using the Windows Universal (Blank App) template in Microsoft Visual\
    \ Studio 2015.\n\nFirst, add the following code to `default.html`. You need to\
    \ replace the body tag with the following code:\n\n```html\n<body class=\"win-type-body\"\
    \ style=\"background-color:white\">\n    <div>\n        <p style=\"color:black\"\
    >Enter Project Title:</p>\n        <input class=\"text-box\" id=\"txttitle\" value=\"\
    Project Title\" size=\"40\"/>\n        <p style=\"color:black\">Enter Project\
    \ Description:</p>\n        <input class=\"text-box\" id=\"txtdesc\" value=\"\
    Project Desc\" size=\"40\" />\n        <p style=\"color:black\">Enter Project\
    \ Weekly Summary:</p>\n        <textarea id=\"txttext\" maxlength=\"1000\" style=\"\
    width:50%\">Weekly Status: Here is the weekly status</textarea>\n        <br />\n\
    \        <br />\n    </div>\n</body>\n```\n\nThis code defines a user interface\
    \ for the sharing data demo. The user interface looks like what’s shown in Figure\
    \ 10-1.\n\n![A978-1-4842-0719-2_10_Fig1_HTML.jpg](A978-1-4842-0719-2_10_Fig1_HTML.jpg)\n\
    \n**Figure 10-1.** Sharing Data user interface\n\nNow, right-click the project’s\
    \ `js` folder in the Solution Explorer and select **Add** > **New JavaScript file**.\
    \ Provide the name for the file. In this example, let’s name the file `DataSharingDemo.js`.\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    function GetControl()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var dataTransferManager\
    \ = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n```\n\nAlso add the following code to `default.html` to reference the `DataSharingDemo.js`\
    \ file:\n\n```html\n<script src=\"/js/DataSharingDemo.js\"></script>\n```\n\n\
    So you have the user interface for the data you want to share. You have also added\
    \ the event listener for the `datarequested` event. Now the most important piece\
    \ of the sharing data feature is implementing the code to populate the request\
    \ object. So add the following code for the function `shareDataHandler` to the\
    \ `DataSharingDemo.js` file.\n\n```javascript\nfunction shareDataHandler(e) {\n\
    \    var request = e.request;\n    // The request.data.properties.title is mandatory\n\
    \    var ShareInfoTitle = document.getElementById(\"txttitle\").value;\n    if\
    \ (ShareInfoTitle !== \"\") {\n        var ShareInfoDesc = document.getElementById(\"\
    txtdesc\").value;\n        if (ShareInfoDesc !== \"\") {\n            request.data.properties.title\
    \ = ShareInfoTitle;\n            request.data.properties.description = ShareInfoDesc;\n\
    \            var ShareInfoFullText = document.getElementById(\"txttext\").value;\n\
    \            if (ShareInfoFullText !== \"\") {\n                request.data.setText(ShareInfoFullText);\n\
    \            }\n        } else {\n            request.failWithDisplayText(\"Please\
    \ Enter the Project Details you would like to share.\");\n        }\n    } else\
    \ {\n        request.failWithDisplayText(\"Error Occured!!\");\n    }\n}\n```\n\
    \nThe preceding code first retrieves the request object from the event argument.\
    \ This function populates as follows:\n\n```javascript\nrequest.data.properties.title\
    \ = ShareInfoTitle;\nrequest.data.properties.description = ShareInfoDesc;\n```\n\
    \nFinally, add the following code:\n\n```javascript\nrequest.data.setText(ShareInfoFullText);\n\
    ```\n\nThis function checks if the title is empty or not, as the request’s title\
    \ property is mandatory.\n\nWhen you run the application on Windows 10, you see\
    \ the screen shown in Figure 10-2.\n\n![A978-1-4842-0719-2_10_Fig2_HTML.jpg](A978-1-4842-0719-2_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2.** Sharing Data demo\n\nNow click the Share charm or press the\
    \ Windows logo key ![A978-1-4842-0719-2_10_Figa_HTML.jpg](A978-1-4842-0719-2_10_Figa_HTML.jpg)\
    \ + H. You will see the screen shown in Figure 10-3.\n\n![A978-1-4842-0719-2_10_Fig3_HTML.jpg](A978-1-4842-0719-2_10_Fig3_HTML.jpg)\n\
    \n**Figure 10-3.** The Share charm windows showing the project title as a sharing\
    \ data object\n\nNow, click OneNote from the list. You are presented with a screen,\
    \ as shown in Figure 10-4.\n\n![A978-1-4842-0719-2_10_Fig4_HTML.jpg](A978-1-4842-0719-2_10_Fig4_HTML.jpg)\n\
    \n**Figure 10-4.** OneNote showing the shared data from the Universal Windows\
    \ app\n\n## Share Web Links to Other Apps\n\n### Problem\n\nYou need to develop\
    \ a feature that allows users to share web links with other Windows 10 apps.\n\
    \n### Solution\n\nUse `request.data.setWebLink` along with title and description\
    \ fields."
