  trans: "\n# 解决方案\n\n使用简单数据绑定（Simple Data Binding），你可以将数据项绑定到 DOM 元素，该元素会显示数据属性的值。但若要处理项目列表，并允许用户切换查看不同的数据项，你需要使用模板。数据模板充当了蓝图，在运行时，它会绑定到提供的数据项，并在指定的\
    \ DOM 元素上渲染标记。\n\n# 工作原理\n\n打开 Visual Studio 2015。依次选择 “文件” ➤ “新建项目” ➤ “JavaScript”\
    \ ➤ “Windows 通用” ➤ “空白应用（通用 Windows）” 模板。这将创建一个通用 Windows 应用模板（参见图 5-5）。\n\n![A978-1-4842-0719-2_5_Fig5_HTML.jpg](img/A978-1-4842-0719-2_5_Fig5_HTML.jpg)\n\
    \n图 5-5.\n\n“新建项目”对话框\n\n打开 `js` 文件夹中的 `default.js`。在立即调用的函数内部，我们声明一个包含几个属性的 `Person`\
    \ 对象。这次你将使用 `WinJS.Binding.define` 来声明 `Person` 对象。使用 `define` 会使所有属性变得可绑定。以下是\
    \ `Person` 对象的代码片段：\n\n```\n(function () {\n    \"use strict\";\n    var Person\
    \ = WinJS.Binding.define({\n        name: \"\",\n        color: \"\",\n      \
    \  birthday: \"\",\n        petname:\"\",\n        dessert:\"\"\n    });\n   \
    \ //其他应用代码...\n})();\n```\n\n打开项目根目录下的 `default.html`。将 `<body>` 标签中的内容替换为以下代码：\n\
    \n```\n<h1>数据绑定模板</h1>\n<div id=\"templateDiv\" data-win-control=\"WinJS.Binding.Template\"\
    >\n    <div class=\"templateItem\" data-win-bind=\"style.background: color\" style=\"\
    color:white\">\n        <ol>\n            <li><span>姓名：</span><span data-win-bind=\"\
    textContent: name\"></span></li>\n            <li><span>生日：</span><span data-win-bind=\"\
    textContent: birthday\"></span></li>\n            <li><span>宠物名：</span><span data-win-bind=\"\
    textContent: petname\"></span></li>\n            <li><span>甜点：</span><span data-win-bind=\"\
    textContent: dessert\"></span></li>\n        </ol>\n    </div>\n</div>\n<div id=\"\
    renderDiv\"></div>\n```\n\n你定义了一个 `id` 为 `templateDiv` 的 `div`，然后添加了一个值为 `WinJS.Binding.Template`\
    \ 的 `data-win-control` 属性。这定义了可用于数据绑定的模板。接着，你有一个 `id` 为 `renderDiv` 的 `div`。在运行时，你将模板与数据进行数据绑定，并将输出渲染到\
    \ `renderDiv` DOM 元素。\n\n为了本教程的需要，我们创建三个 `Person` 对象，并添加一个下拉列表，以便你可以选择需要显示详细信息的人员。在\
    \ `body` 标签中，紧跟在 `renderDiv` 元素之后，添加以下代码：\n\n```\n<fieldset id=\"templateControlObject\"\
    >\n    <legend>选择姓名：</legend>\n    <select id=\"templateControlObjectSelector\"\
    >\n        <option value=\"0\">显示 John Doe</option>\n        <option value=\"\
    1\">显示 Jane Dow</option>\n        <option value=\"2\">显示 Jake Doe</option>\n \
    \   </select>\n</fieldset>\n```\n\n回到 `default.js` 文件，在 `Person` 对象定义之后，创建一个包含三个\
    \ `Person` 对象的数组，如下所示：\n\n```\n(function () {\n    \"use strict\";\n    var Person\
    \ = WinJS.Binding.define({\n        name: \"\",\n        color: \"\",\n      \
    \  birthday: \"\",\n        petname:\"\",\n        dessert:\"\"\n    })\n    var\
    \ people = [\n        new Person({ name: \"John Doe\", color: \"red\", birthday:\
    \ \"2/2/2002\", petname: \"Spot\", dessert: \"chocolate cake\" }),\n        new\
    \ Person({ name: \"Jane Doe\", color: \"green\", birthday: \"3/3/2003\", petname:\
    \ \"Xena\", dessert: \"cherry pie\" }),\n        new Person({ name: \"Jake Doe\"\
    , color: \"blue\", birthday: \"2/2/2002\", petname: \"Pablo\", dessert: \"ice\
    \ cream\" }),\n    ];\n    //其他应用代码...\n})();\n```\n\n接下来，在 `default.js` 的 `onactivated`\
    \ 方法中，为下拉列表的 `change` 事件添加一个监听器。以下是代码片段：\n\n```\napp.onactivated = function (args)\
    \ {\n    // 其他激活代码...\n    var selector = document.querySelector(\"#templateControlObjectSelector\"\
    );\n          selector.addEventListener(\"change\", handleChange, false);\n  \
    \  args.setPromise(WinJS.UI.processAll());\n}\n```\n\n让我们为下拉列表的更改事件创建事件处理程序。选择包含模板的\
    \ `div` 以及你想要渲染标记的 `div`。在模板控件上调用 `render`。在 `default.js` 中创建一个 `handleChange`\
    \ 函数，代码如下：\n\n```\n(function () {\n    //其他应用代码...\n    function handleChange(evt)\
    \ {\n        var templateElement = document.querySelector(\"#templateDiv\");\n\
    \        var renderElement = document.querySelector(\"#renderDiv\");\n       \
    \ renderElement.innerHTML = \"\";\n        var selected = evt.target.selectedIndex;\n\
    \        var templateControl = templateElement.winControl;\n        templateElement.winControl.render(people[selected],\
    \ renderElement);\n    }\n})();\n```\n\n在 Visual Studio 中按 F5 生成并运行应用。当你在下拉列表中选择一个项目时，相应的数据会显示在其上方的\
    \ `div` 中。图 5-6 显示了 Windows Mobile 屏幕上的输出。\n\n![A978-1-4842-0719-2_5_Fig6_HTML.jpg](img/A978-1-4842-0719-2_5_Fig6_HTML.jpg)\n\
    \n图 5-6.\n\nWindows Mobile 屏幕上的数据绑定模板输出\n\n## 5.4 数据绑定 WinJS 控件\n\n### 问题\n\n\
    你有一个项目列表，并希望将该列表数据绑定到 WinJS 控件（例如 `ListView`）。\n\n### 解决方案\n\n使用 WinJS 数据绑定，你可以将任何\
    \ WinJS 控件绑定到数据源。对于显示每个单独的项目，你需要提供一个数据模板。在运行时，列表会与控件进行数据绑定，每个项目都会根据定义的模板进行渲染。\n"
- fmt: "### How It Works\n\n打开 Visual Studio 2015。选择 **File** ➤ **New Project** ➤\
    \ **JavaScript** ➤ **Windows** ➤ **Universal** ➤ **Blank App (Universal Windows)**\
    \ 模板。这将创建一个通用 Windows 应用模板（见图[5-7](#A978-1-4842-0719-2_5_Chapter.html#Fig7)）。\n\
    \n![A978-1-4842-0719-2_5_Fig7_HTML.jpg](A978-1-4842-0719-2_5_Fig7_HTML.jpg)\n\n\
    **Figure 5-7.** 新建项目对话框\n\n让我们创建一个新的 JavaScript 文件，为`ListView`提供数据。右键点击`js`文件夹。选择\
    \ **Add** ➤ **New Item**。在“新建项”对话框中，选择 JavaScript 文件并将其命名为`data.js`。将以下代码添加到`data.js`文件中：\n\
    \n```\n(function () {\n    var flavors = [\n        { title: \"Basic banana\"\
    , text: \"Low-fat frozen yogurt\" },\n        { title: \"Banana blast\", text:\
    \ \"Ice cream\" },\n        { title: \"Brilliant banana\", text: \"Frozen custard\"\
    \ },\n        { title: \"Orange surprise\", text: \"Sherbet\" },\n        { title:\
    \ \"Original orange\", text: \"Sherbet\" },\n        { title: \"Vanilla\", text:\
    \ \"Ice cream\" },\n        { title: \"Very vanilla\", text: \"Frozen custard\"\
    \ },\n        { title: \"Marvelous mint\", text: \"Gelato\" },\n        { title:\
    \ \"Succulent strawberry\", text: \"Sorbet\" }\n    ];\n    var flavorList = new\
    \ WinJS.Binding.List(flavors);\n    WinJS.Namespace.define(\"DataExample\", {\n\
    \        flavorList: flavorList\n    });\n})();\n```\n\n在项目根目录下的`default.html`中添加对`data.js`文件的引用：\n\
    \n```\n<head>\n    <!-- Other file references ... -->\n    <!-- Your data file.\
    \ -->\n    <script src=\"/js/data.js\"></script>\n</head>\n```\n\n现在，在`default.html`中创建一个`ListView`，并将其绑定到你在`data.js`文件中创建的数据源。同时为列表视图项定义一个项模板。将以下代码添加到`default.html`中：\n\
    \n```\n<h1>ListView Data Binding</h1>\n<div id=\"flavorItemTemplate\" data-win-control=\"\
    WinJS.Binding.Template\">\n    <div id=\"templateContainer\">\n        <div id=\"\
    itemContainer\">\n            <h4 data-win-bind=\"innerText: title\"></h4>\n \
    \           <h6 data-win-bind=\"innerText: text\"></h6>\n        </div>\n    </div>\n\
    </div>\n<div id=\"basicListView\" data-win-control=\"WinJS.UI.ListView\"\n   \
    \  data-win-options=\"{itemDataSource : DataExample.flavorList.dataSource,\n \
    \                       itemTemplate:select('#flavorItemTemplate'),\n        \
    \                selectionMode: 'none',\n                        layout:{type:WinJS.UI.ListLayout}}\"\
    >\n</div>\n```\n\n通过将`data-win-control`属性设置为`WinJS.UI.ListView`值来创建列表视图。使用`data-win-options`属性来设置控制选项，如项数据源、项模板和列表视图的布局。\n\
    \n接下来，你需要为列表视图和列表视图项添加一点样式。打开 Windows 和 Windows Mobile 项目中的`default.css`，并添加以下样式表定义：\n\
    \n```\n#basicListView{\n    height: 100%;\n    margin-top: 10px;\n    margin-right:\
    \ 20px;\n}\n#templateContainer{\n    display: -ms-grid;\n    -ms-grid-columns:\
    \ 1fr;\n    min-height: 150px;\n}\n#itemContainer{\n    background-color:lightgray;\n\
    \    width:100%;\n    padding:10px;\n}\n```\n\n按`F5`在 Visual Studio 中生成并运行应用。图[5-8](#A978-1-4842-0719-2_5_Chapter.html#Fig8)显示了\
    \ Windows Mobile 屏幕上的输出。\n\n![A978-1-4842-0719-2_5_Fig8_HTML.jpg](A978-1-4842-0719-2_5_Fig8_HTML.jpg)\n\
    \n**Figure 5-8.** Windows Mobile 屏幕上的 ListView 数据绑定输出\n\n## 5.5 UWP 应用中的导航结构\n\
    \n### 问题\n\n你想将应用程序拆分为多个页面/屏幕以处理特定功能。你想了解应采用哪些导航结构，以在页面/屏幕间提供最佳体验。\n\n### 解决方案\n\
    \n实际应用很少只有一个页面/屏幕，而是由许多页面/屏幕组成。每个页面/屏幕负责一项特定功能。将应用按功能划分并为每项功能分配专用页面/屏幕始终是更好的做法。UWP\
    \ 应用中的导航基于导航结构、元素和系统级功能。通过在应用中提供正确的导航，你可以在页面之间或内容之间实现直观的用户体验。\n\n应用中的每个页面将包含或满足特定的一组内容或功能。例如，一个联系人管理应用会有一个列出联系人的屏幕、一个创建联系人的屏幕、一个更新联系人的屏幕，以及一个删除联系人的屏幕。应用的导航结构由你如何组织应用的不同屏幕来定义。图[5-9](#A978-1-4842-0719-2_5_Chapter.html#Fig9)展示了\
    \ UWP 应用中可采用的不同导航结构。\n\n![A978-1-4842-0719-2_5_Fig9_HTML.jpg](A978-1-4842-0719-2_5_Fig9_HTML.jpg)\n\
    \n**Figure 5-9.** 导航结构\n\n**层次结构**是一种树状结构。每个子页面只有一个父页面。要到达子页面，你需要经过父页面。\n\n**同级结构**是一种页面并排存在的导航结构。你可以按任意顺序从一个页面导航到另一个页面。\n\
    \n**组合结构**同时使用层次结构和同级结构。页面组被组织为同级或层次结构。\n\n## 5.6 UWP 应用中的导航元素\n\n### 问题\n\n你已经理解了导航结构。你想知道有哪些元素可用于实现应用的导航结构。\n\
    \n### 解决方案\n\n用户可以通过许多导航元素找到他想看的内容。在某些情况下，导航元素会向用户指示内容在应用中的位置。导航元素可以用作内容元素或命令元素。因此，建议使用最适合你导航结构的导航元素。以下是\
    \ UWP 应用可用的部分导航元素：\n\n*   **Pivot**：此控件用于显示指向同级页面的持久链接列表。当你采用同级导航结构时，可以使用此控件。\n\
    *   **SplitView**：此控件用于显示应用中顶级页面的链接列表。在需要同级导航结构的场景中可以使用此控件。\n*   **Hub**：此控件用于显示子页面的预览/摘要。通过页面本身提供的链接或节标题导航到子页面。当你采用层次导航结构时，使用此控件。\n\
    *   **ListView**：此控件用于显示项目摘要的主列表。选择一个项目会在详细信息部分显示该项目的详细信息。这可用于你的层次导航结构场景。\n\n\
    ## 5.7 UWP 应用中的 Pivot 导航\n\n### 问题\n\n在你的应用中，你已经确定导航结构是基于同级的。你想使用`Pivot`控件实现导航。\n\
    \n### 解决方案\n\n当你需要频繁访问不同的内容类别时，可使用`Pivot`控件进行导航。`Pivot`由两个或多个内容窗格组成，每个窗格都有一个对应的类别标题。标题会持续显示在屏幕上，并且选择状态清晰可见，这使得用户易于知道他们选择了哪个类别。用户可以在标题上向左或向右滑动，从而导航到相邻的标题。他们也可以在内容上向左或向右滑动。"
  raw: '### How It Works


    Open Visual Studio 2015\. Select File ➤ New Project ➤ JavaScript ➤ Windows ➤ Universal
    ➤ Blank App (Universal Windows) template. This creates a Universal Windows app
    template (see Figure [5-7](#A978-1-4842-0719-2_5_Chapter.html#Fig7)).


    ![A978-1-4842-0719-2_5_Fig7_HTML.jpg](A978-1-4842-0719-2_5_Fig7_HTML.jpg)


    Figure 5-7.


    New Project dialog   Let’s create a new JavaScript file that will provide data
    to the ListView. Right-click the `js` folder. Select Add ➤ New Item. In the New
    Item dialog, select the JavaScript file and name it data.js. Add the following
    code to the `data.js` file: `(function () {`     `var flavors = [`         `{
    title: "Basic banana", text: "Low-fat frozen yogurt" },`         `{ title: "Banana
    blast", text: "Ice cream" },`         `{ title: "Brilliant banana", text: "Frozen
    custard" },`         `{ title: "Orange surprise", text: "Sherbet" },`         `{
    title: "Original orange", text: "Sherbet" },`         `{ title: "Vanilla", text:
    "Ice cream" },`         `{ title: "Very vanilla", text: "Frozen custard" },`         `{
    title: "Marvelous mint", text: "Gelato" },`         `{ title: "Succulent strawberry",
    text: "Sorbet" }`     `];`     `var flavorList = new WinJS.Binding.List(flavors);`
        `WinJS.Namespace.define("DataExample", {`         `flavorList: flavorList`
        `});` `})();`   Add a reference to the `data.js` file in your `default.html`,
    which is found at the root of the project. `<head>`     `<!-- Other file references
    ... -->`     `<!-- Your data file. -->`     `<script src="/js/data.js"></script>`
    `</head>`   In `default.html`, you will now create a ListView and bind it to the
    data source you have created in the `data.js` file. Also define an item template
    for the list view items. Add the following code to `default.html`. `<h1>ListView
    Data Binding</h1>` `<div id="flavorItemTemplate" data-win-control="WinJS.Binding.Template">`
        `<div id="templateContainer">`         `<div id="itemContainer">`             `<h4
    data-win-bind="innerText: title"></h4>`             `<h6 data-win-bind="innerText:
    text"></h6>`         `</div>`     `</div>` `</div>` `<div id="basicListView" data-win-control="WinJS.UI.ListView"`
         `data-win-options="{itemDataSource : DataExample.flavorList.dataSource,`
                            `itemTemplate:select(''#flavorItemTemplate''),`                         `selectionMode:
    ''none'',`                         `layout:{type:WinJS.UI.ListLayout}}">` `</div>`
    Create the list view by setting the `data-win-control` attribute with a `WinJS.UI.ListView`
    value. Use the `data-win-options` attribute to set control options like item data
    source, item template, and the layout of the list view.   Next, you need to add
