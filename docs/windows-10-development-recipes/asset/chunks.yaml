    When you select the app, you are presented with the user interface of the receiver
    app within the Share charm windows, as shown in Figure [10-16](#A978-1-4842-0719-2_10_Chapter.html#Fig16).


    ![A978-1-4842-0719-2_10_Fig16_HTML.jpg](A978-1-4842-0719-2_10_Fig16_HTML.jpg)


