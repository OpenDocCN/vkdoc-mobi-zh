- fmt: "# How It Works\n\nCreate a new project using the Windows Universal (Blank\
    \ App) template in Microsoft Visual Studio 2015. Open the `default.html` page\
    \ from the project in Visual Studio Solution Explorer. Add a form control to the\
    \ body section of the page. The form control has a few `div` controls to display\
    \ the title bar, input control for email, and a toggle switch control for mobile\
    \ data and location services.\n\n```html\n<body class=\"win-type-body\">\n   \
    \ <div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
    \ darkblue; overflow: hidden; z-index: 3\">\n        <i>User Preferences Settings\
    \ Screen (These settings will be available across devices)</i>\n    </div>\n \
    \   <br />\n    <form id=\"form1\">\n        <fieldset class=\"formSection\">\n\
    \            <legend class=\"formSectionHeading\">User Preferenses</legend>\n\
    \            <div class=\"twoColumnFormContainer\">\n                <div id=\"\
    UserMobileData\" data-win-control=\"WinJS.UI.ToggleSwitch\" data-win-options=\"\
    {title :'Use Mobile Data',labelOff: 'Disabled',belOn:'Enabled',hecked: true}\"\
    >\n                </div>\n                <br />\n                <div id=\"\
    LocationServices\" data-win-control=\"WinJS.UI.ToggleSwitch\" data-win-options=\"\
    {title :'Location Services',labelOff: 'Disabled',belOn:'Enabled',hecked: true}\"\
    >\n                </div>\n                <br />\n                <div id=\"\
    msg\" style=\"color:red\"></div>\n                <br />\n                <div\
    \ class=\"buttons\">\n                    <button type=\"submit\" id=\"btnSubmit\"\
    \ class=\"horizontalButtonLayout win-button\">\n                        Submit\n\
    \                    </button>\n                </div>\n            </div>\n \
    \       </fieldset>\n    </form>\n    <br />\n</body>\n```\n\nRight-click the\
    \ project in Solution Explorer and select Add ➤ New JavaScript file and provide\
    \ the name for the file. In this example, let’s name the file `DataStorageDemo.js`.\n\
    \nAdd the following code to the `DataStorageDemo.js` file:\n\n```javascript\n\
    (function () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var submitbutton = document.getElementById(\"btnSubmit\");\n\
    \            submitbutton.addEventListener(\"click\", btnCreateRoamingContainerClick,\
    \ false);\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , GetControl);\n})();\n```\n\nThe preceding code added an event receiver to the\
    \ `btnSubmit` button. Now add a `btnCreateRoamingContainerClick` function, which\
    \ is triggered when the user clicks the Submit button on the user’s preference\
    \ form control.\n\n```javascript\nfunction btnCreateRoamingContainerClick(mouseEvent)\
    \ {\n\n    var ApplicationData = Windows.Storage.ApplicationData.current;\n\n\
    \    var roamingSettings = ApplicationData.roamingSettings;\n\n    // Creating\
    \ a local settings container\n    if (roamingSettings.containers.hasKey(\"UserPreference_RoamingProfile\"\
    )) {\n\n        var roamingSettingscontainer = roamingSettings.createContainer(\"\
    UserPreference_RoamingProfile\", Windows.Storage.ApplicationDataCreateDisposition.Always);\n\
    \n        var toggleMobileDataButton = document.getElementById(\"UserMobileData\"\
    ).winControl;\n\n        if (toggleMobileDataButton.checked) {\n            roamingSettingscontainer.values[\"\
    UseMobileData\"] = \"Yes\";\n        }\n        else {\n            roamingSettingscontainer.values[\"\
    UseMobileData\"] = \"No\";\n        }\n\n        var toggleLocationDataButton\
    \ = document.getElementById(\"LocationServices\").winControl;\n\n        if (toggleLocationDataButton.checked)\
    \ {\n            roamingSettingscontainer.values[\"LocationServices\"] = \"Yes\"\
    ;\n        }\n        else {\n            roamingSettingscontainer.values[\"LocationServices\"\
    ] = \"No\";\n        }\n\n        document.getElementById(\"msg\").innerText =\
    \ \"Data Saved!!\";\n    }\n\n}//end of function btnCreateRoamingContainerClick\n\
    ```\n\nThis code declares a variable named `ApplicationData`. It is assigned `Windows.Storage.ApplicationData.current`,\
    \ which denotes a container for app settings in the app data store. The next line\
    \ retrieves the `roamingSettings` from `ApplicationData` and stores it in the\
    \ `roamingSettings` variable.\n\nIt then calls the `roamingSettings.containers.hasKey`\
    \ function to check if the container exists. If it does not exist, it uses the\
    \ `createContainer` method to create a settings container. The preceding example\
    \ creates a settings container, `App_GreetingDataRoamingContainer`, and stores\
    \ it in the `roamingSettingscontainer`. The `createContainer` method takes two\
    \ parameters: the name of the settings container and the `Windows.Storage.ApplicationDataCreateDisposition.Always`,\
    \ which directs that it always check if a container exists or not. If it exists,\
    \ return the specified container; else, create a new one.\n\nThe next line of\
    \ code checks the value of the toggle switch control, based on whether it is selected\
    \ or not. If toggle switch is selected \"yes\", it stores the roaming data app\
    \ settings using the `roamingSettingscontainer.values[\"UseMobileData\"]` function,\
    \ which uses the `container.value` method to set the value. It also does the same\
    \ thing for the location service toggle switch.\n\nThe complete code in the `DataStorageDemo.js`\
    \ file looks like this:\n\n```javascript\n(function () {\n    \"use strict\";\n\
    \n    function GetControl() {\n        WinJS.UI.processAll().done(function ()\
    \ {\n            var submitbutton = document.getElementById(\"btnSubmit\");\n\
    \            submitbutton.addEventListener(\"click\", btnCreateRoamingContainerClick,\
    \ false);\n        });\n    }\n\n    document.addEventListener(\"DOMContentLoaded\"\
    , GetControl);\n\n    function btnCreateRoamingContainerClick(mouseEvent) {\n\
    \        var ApplicationData = Windows.Storage.ApplicationData.current;\n    \
    \    var roamingSettings = ApplicationData.roamingSettings;\n\n        // Creating\
    \ a local settings container\n        if (roamingSettings.containers.hasKey(\"\
    UserPreference_RoamingProfile\")) {\n            var roamingSettingscontainer\
    \ = roamingSettings.createContainer(\"UserPreference_RoamingProfile\", Windows.Storage.ApplicationDataCreateDisposition.Always);\n\
    \            var toggleMobileDataButton = document.getElementById(\"UserMobileData\"\
    ).winControl;\n\n            if (toggleMobileDataButton.checked) {\n         \
    \       roamingSettingscontainer.values[\"UseMobileData\"] = \"Yes\";\n      \
    \      } else {\n                roamingSettingscontainer.values[\"UseMobileData\"\
    ] = \"No\";\n            }\n\n            var toggleLocationDataButton = document.getElementById(\"\
    LocationServices\").winControl;\n\n            if (toggleLocationDataButton.checked)\
    \ {\n                roamingSettingscontainer.values[\"LocationServices\"] = \"\
    Yes\";\n            } else {\n                roamingSettingscontainer.values[\"\
    LocationServices\"] = \"No\";\n            }\n\n            document.getElementById(\"\
    msg\").innerText = \"Data Saved!!\";\n        }\n    }//end of function btnCreateRoamingContainerClick\n\
    })();\n```\n\nThat’s it. The roaming data will be available on all the devices\
    \ on which this Win 10 app will be accessed by the user.\n\nWhen you run the application\
    \ on a Windows 10 emulator or Windows Mobile, it will look like what’s shown in\
    \ Figure 9-4.\n\n![A978-1-4842-0719-2_9_Fig4_HTML.jpg](A978-1-4842-0719-2_9_Fig4_HTML.jpg)\n\
    \n**Figure 9-4.** Form to save user preference settings using roaming app data\
    \ settings\n\n## 9.6 How to Register the Data Change Event\n\n### Problem\n\n\
    You need to register and implement a data change event handler.\n\n### Solution\n\
    \nYou can use the `ApplicationData.DataChanged` event to register the data change\
    \ event for roaming data."
