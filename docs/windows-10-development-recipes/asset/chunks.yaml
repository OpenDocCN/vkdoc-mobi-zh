    Create a new project using the Windows Universal (Blank App) template in Visual
    Studio 2015 Community. This creates a Windows universal app that can be run on
    Windows tablets and Windows Mobile running Windows 10.   Open the `default.html`
    page from the project in Visual Studio Solution Explorer.   Add the Rating control
    to the body section of the page. `<div id="rating" data-win-control="WinJS.UI.Rating"
    >`     `</div>`   Right-click on the `js` folder within the project in the Solution
    Explorer. Select Add ➤ New JavaScript File and provide a name for the file. In
    this example, let’s name the file controldemo.js. This adds the `controldemo.js`
    file under the `js` folder of the project.   Add the following code to the `controldemo.js`
    file. `(function () {`     `"use strict";`     `function GetControl() {`         `WinJS.UI.processAll().done(function
    () {`             `var ratingControl = document.getElementById("rating").winControl;`
                `ratingControl.userRating = 2;`         `});`     `}`     `document.addEventListener("DOMContentLoaded",
    GetControl);` `})();`   When you invoke the `document.getElementById` method,
    you get the `DOM` element. You need to use the `winControl` property to get the
    associated control.   This needs to be surrounded by the `WinJS.UI.processAll`
    method, which returns the promise. The reason for surrounding your logic with
    the `processAll` method is that you have to wait until all the controls are created
    and parsed in the document before trying to retrieve it.   Once the Rating control
    is retrieved, you can start setting the values to the properties of the Rating
    control instance. In this example, you are setting the user rating to 2.   Finally,
    you need to add the reference of the `controldemo.js` file in the `default.html`
    page. Open the `default.html` page from Visual Studio Solution Explorer and add
    the following code to the head tag. `<script src="/js/controldemo.js"></script>`
     


    When you run the application on the Windows Mobile emulator, you should see the
    screen shown in Figure [3-6](#A978-1-4842-0719-2_3_Chapter.html#Fig6).


    ![A978-1-4842-0719-2_3_Fig6_HTML.jpg](A978-1-4842-0719-2_3_Fig6_HTML.jpg)


    Figure 3-6.


    Windows Mobile emulator displaying the Rating control with value 2


    ## 3.5 The ToggleSwitch Control


    ### Problem


    You need to provide an option for the user to perform a binary operation on the
    screen. For example, you need to provide the user with an option to turn a service
    on or off.


    ### Solution


    Use the ToggleSwitch control in WinJS. It is similar to the standard check box
    control, but has better touch support. You can simply swipe a finger across the
    ToggleSwitch control to check or uncheck the option. You can declare the ToggleSwitch
    control on the page using the WinJS.UI.ToggleSwitch value to the `data-win-control`
    attribute of the `div` element.


    ### How It Works


    The following shows how you declare the ToggleSwitch control on a page.


    `<div id="locationServices" data-win-control="WinJS.UI.ToggleSwitch"`


             `data-win-options="{`


             `title :''Location Services'',`


             `labelOff: ''Disabled'',`


             `labelOn:''Enabled'',`


             `checked: true`


             `}">`


    `</div>`


    When executed on a Windows tablet or a Windows Mobile emulator, the preceding
    code snippet will look like what’s shown in Figure [3-7](#A978-1-4842-0719-2_3_Chapter.html#Fig7).


    ![A978-1-4842-0719-2_3_Fig7_HTML.jpg](A978-1-4842-0719-2_3_Fig7_HTML.jpg)


    Figure 3-7.


    ToggleSwitch on the Windows Mobile and Windows emulator


    The `data-win-options` attribute is used to set the additional attributes to the
    ToggleSwitch control. In the preceding example, properties like title, `labelOff`,
    `labelOn`, and `Checked` are set using this attribute.


    The title sets the title content for the ToggleSwitch. The `labelOff` and `labelOn`
    properties identify the text that needs to be displayed next to the ToggleSwitch
    based on the checked (On) and unchecked (Off) state of the control.


    The current state (checked or unchecked) of the ToggleSwitch can be found using
    the control’s checked property.


    Let’s add a new JavaScript file to the project’s `js` folder and name it controldemo.js.
    Open the `default.html` page and add the ToggleSwitch control as well as an empty
    `div` tag to display a message on a change of the toggle switch state.


    The `default.html` looks like the following.


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>Recipe3.5</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-light.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- Recipe3.5 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


        `<script src="/js/controldemo.js"></script>`


    `</head>`


    `<body class="win-type-body">`


        `<div id="locationServices" data-win-control="WinJS.UI.ToggleSwitch"`


             `data-win-options="{`


             `title :''Location Services'',`


             `labelOff: ''Disabled'',`


             `labelOn:''Enabled'',`


             `checked: true`


             `}">`


        `</div>`


        `<div id="info"></div>`


    `</body>`


    `</html>`


    To identify the state from the JavaScript code, you need to wire up the change
    event handler of the ToggleSwitch control. This event is triggered when you change
    the state of the control.


    Open the `controldemo.js` file and replace it with the following code.


    `(function () {`


        `"use strict";`


        `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


                `var toggleButton = document.getElementById("locationServices").winControl;`


                `var InfoElement = document.getElementById("info");`


                `toggleButton.addEventListener(''change'', function (args) {`


                    `if (toggleButton.checked) {`


                        `InfoElement.innerHTML = "Location Services enabled";`


                    `}`


                    `else {`


                        `InfoElement.innerHTML = "Location Services disabled";`


                    `}`


                `})`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", GetControl);`


    `})();`


    When you run the application on the Windows 10 emulator and the Windows Mobile
    emulator, you will see the screen as shown in the Figure [3-8](#A978-1-4842-0719-2_3_Chapter.html#Fig8).


    ![A978-1-4842-0719-2_3_Fig8_HTML.jpg](A978-1-4842-0719-2_3_Fig8_HTML.jpg)


    Figure 3-8.


    ToggleSwitch with the change event.


    When you toggle the control, the appropriate message is displayed in the `Info
    div` element.


    ## 3.6 The DatePicker Control


    ### Problem


    You want to allow the user to select a date from the application page.


    ### Solution


    Use the WinJS DatePicker control that allows the user to pick a date. This control
    displays three lists: one each for the month, day, and year.'
