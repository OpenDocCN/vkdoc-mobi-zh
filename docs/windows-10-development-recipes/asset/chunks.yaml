  raw: '### How It Works


    When generating the package file from Visual Studio, you also have the option
    of validating it on a remote machine.


    To validate the package on a remote machine, follow these steps.


    Enable your Windows 10 remote device for development by enabling Developer mode
    in the Use developer features in the Settings app, as shown in Figure [17-17](#A978-1-4842-0719-2_17_Chapter.html#Fig17).
    Note that the validation on the remote ARM device for Windows 10 is currently
    not supported.


    ![A978-1-4842-0719-2_17_Fig17_HTML.jpg](A978-1-4842-0719-2_17_Fig17_HTML.jpg)


    Figure 17-17.


    Enabling Developer mode in the Settings app   Download and install the remote
    tools for Visual Studio on the remote machine. Go to [`http://www.microsoft.com/en-us/download/details.aspx?id=48155&NavToggle=True`](http://www.microsoft.com/en-us/download/details.aspx?id=48155%26NavToggle=True)
    . The remote tools for Visual Studio are used to run the Windows App Certification
    Kit.   Download the Windows App Certification Kit from [`https://dev.windows.com/en-us/develop/app-certification-kit`](https://dev.windows.com/en-us/develop/app-certification-kit)
    and install it on your remote machine.   Now, start creating a package from your
    Windows app. In the Package Creation Completed wizard, select the Remote machine
    option and click the ellipsis button (see Figure [17-18](#A978-1-4842-0719-2_17_Chapter.html#Fig18)).


    ![A978-1-4842-0719-2_17_Fig18_HTML.jpg](A978-1-4842-0719-2_17_Fig18_HTML.jpg)


    Figure 17-18.


    Package creation and the Remote Machine option   Enter your subnet/Domain Name
    Server (DNS)/IP address. Select the appropriate mode in Authentication Mode menu
    of Windows credentials (see Figure [17-19](#A978-1-4842-0719-2_17_Chapter.html#Fig19)).


    ![A978-1-4842-0719-2_17_Fig19_HTML.jpg](A978-1-4842-0719-2_17_Fig19_HTML.jpg)


    Figure 17-19.


    Remote Connection screen   Click the Select button and then the Launch Windows
    App Certification Kit button. If the remote tools are running on the remote machine,
    you are connected and the validation tests should begin.


    # Chapter 18: Store and Monetization


    By now, you should have finished developing your Universal Windows platform application
    targeting the Windows 10 OS. You need to build your application and upload it
    to the Windows Store, where users search for and download apps. In this chapter,
    you will learn the things required to get your app in the Windows Store, and how
    to make money by making use of in-app advertising.


    ## 18.1 Create a Windows App Developer Account


    ### Problem


    You need to build and upload your application to the Windows Store. But to do
    this, you need to first log in to the Windows Dev Center using your developer
    account. You need to know how to create a developer account before you can start
    the upload phase.


    ### Solution


    Create a developer account online. There are two ways to start this process.


    *   Go directly to [`http://dev.windows.com`](http://dev.windows.com) .

    *   Access account registration through Visual Studio.


    #### Access Account Registration Through the Windows Dev Center


    The Windows Dev Center is a one-stop portal for Windows app development. This
    portal provides the tools that you need to get started with Windows 10 application
    development. There are code samples, tutorials on how to develop Windows 10 apps,
    and of course, the provision to submit your apps. The Windows Dev Center can be
    accessed at [`http://dev.windows.com`](http://dev.windows.com) . When you navigate
    to this page, you see a Get a dev account link. Click it and follow the onscreen
    instructions to finish creating your own dev account. A developer account allows
    you to submit your apps (for all Windows devices) to the Windows Store. It also
    allows you to manage your apps and get analytics on how your app is doing in the
    Store.


    You can sign up under one of the following categories:


    *   Individual: This account type lets you develop and sell apps as an individual,
    a student, or an unincorporated group. The fee for this type of account is $19.

    *   Company: This account type is for companies that have a registered business
    name to develop and sell apps. The fee for this type of account is $99.


    You need to provide the following to get an account:


    *   Your contact information

    *   The publisher name that you want displayed

    *   A payment method (VISA/MasterCard/PayPal)


    #### Access Account Registration Through Visual Studio


    You can also register as a developer via Visual Studio.


    In Visual Studio, from the Project menu, select Store ➤ Open Developer Account
    (see Figure [18-1](#A978-1-4842-0719-2_18_Chapter.html#Fig1)).


    ![A978-1-4842-0719-2_18_Fig1_HTML.jpg](A978-1-4842-0719-2_18_Fig1_HTML.jpg)


    Figure 18-1.


    Open a developer account from Visual Studio


    This action opens a new browser window and takes you directly to the account registration
    page. You have to follow the onscreen instructions to finish account registration.


    ## 18.2 Package a Universal Windows Platform Application for Windows 10


    ### Problem


    You have completed the development of your app. You have finished account registration
    in the Windows Dev Center. Now you want to package your app so that you can submit
    it to the Store.


    ### Solution


    To sell or distribute Windows apps, you need to create what is known as an application
    package or an appxupload package, as it is technically termed. With the Universal
    Windows Platform (UWP), you generate one package (`.appxupload`). This package
    is uploaded to the Windows Store. Once the app is in the Store, it can then be
    installed and run on any Windows 10 device, including phones, tablets, PCs, and
    so forth.


    ### How It Works


    Packaging a Windows 10 app needs to be done as a two-step process. First, configure
    the package with certain properties and settings. Then, generate the package to
    upload to the Store.'
  trans: "\n### 工作原理\n\n通过 Visual Studio 生成包文件时，你还可以选择在远程计算机上对其进行验证。\n\n要在远程计算机上验证包，请遵循以下步骤：\n\
    \n1.  在“设置”应用的“使用开发人员功能”中启用**开发人员模式**，以启用你的 Windows 10 远程设备进行开发，如图 17-17 所示。请注意，目前不支持在远程\
    \ ARM 设备上对 Windows 10 进行验证。\n\n    ![A978-1-4842-0719-2_17_Fig17_HTML.jpg](img/A978-1-4842-0719-2_17_Fig17_HTML.jpg)\
    \  \n    *图 17-17. 在“设置”应用中启用开发人员模式*\n\n2.  在远程计算机上下载并安装 Visual Studio 的远程工具。请访问\
