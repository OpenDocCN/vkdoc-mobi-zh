    ## 5.4 Data Bind WinJS Controls


    ### Problem


    You have a list of items and you would like to data bind the list to a WinJS control,
    such as ListView.


    ### Solution


    With WinJS data binding, you can bind any WinJS control to a data source. For
    displaying each individual item, you will provide a data template. At runtime,
    the list gets data bound to the control and each item is rendered according to
