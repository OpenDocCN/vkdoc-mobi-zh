    \n在**解决方案资源管理器**中双击 `default.html` 文件将其打开。以下是你在文件中看到的默认代码：\n\n```\n<!DOCTYPE html>\n\
    <html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Ch1R3</title>\n   \
    \ <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\" />\n    <script src=\"\
    WinJS/js/basejs\"></script>\n    <link href=\"/css/default.css\" rel=\"stylesheet\"\
