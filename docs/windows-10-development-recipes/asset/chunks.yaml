- fmt: "# How It Works\n\nVisual Studio profilers or Diagnostic Tools can help you\
    \ find the performance bottlenecks in your Windows app. They show you where the\
    \ code in your app spends most of the time.\n\nYou can launch Visual Studio 2015\
    \ Diagnostic Tools by navigating to the `Debug` menu and selecting `Start Diagnostic\
    \ Tools Without Debugging`, as shown in Figure [16-9](#A978-1-4842-0719-2_16_Chapter.html#Fig9).\n\
    \n![A978-1-4842-0719-2_16_Fig9_HTML.jpg](A978-1-4842-0719-2_16_Fig9_HTML.jpg)\n\
    \nFigure 16-9. Launching Diagnostic Tools in Visual Studio 2015\n\nThe Visual\
    \ Studio Diagnostic Tools (see Figure [16-10](#A978-1-4842-0719-2_16_Chapter.html#Fig10))\
    \ provide the following options for developers to test on their apps:\n\n![A978-1-4842-0719-2_16_Fig10_HTML.jpg](A978-1-4842-0719-2_16_Fig10_HTML.jpg)\n\
    \nFigure 16-10. Diagnostic Tools with the different options\n\n*   CPU usage\n\
    *   GPU Usage\n*   HTML UI responsiveness\n*   JavaScript memory\n*   Network\n\
    \nBy default, the target is the current project. This can be changed to a running\
    \ app or installed app and so forth by clicking the `Change Target` button and\
    \ selecting the option from the list provided.\n\nYou can select the tools that\
    \ you wish to profile in the `Available Tools` section in the `Diagnostic` dialog.\n\
    \nClick the `Start` button once the tools are selected. This launches the app\
    \ and Visual Studio automatically starts the diagnostic tool and collecting the\
    \ data for analysis.\n\nOnce the tool completes collecting the data, the results\
    \ are displayed, as shown in Figure [16-11](#A978-1-4842-0719-2_16_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0719-2_16_Fig11_HTML.jpg](A978-1-4842-0719-2_16_Fig11_HTML.jpg)\n\
    \nFigure 16-11. Results of the Diagnostic Tools in Visual Studio 2015\n\nUnderstanding\
    \ how the app uses the CPU is a good starting point for analyzing and identifying\
    \ the performance issues in your app. The `CPU usage` tool displays information\
    \ on where the CPU is spending time executing your JavaScript code.\n\nWhen analyzing\
    \ the `CPU Usage` report, developers can check the CPU utilization timeline graph\
    \ and select the timeline segments to view details. The CPU utilization timeline\
    \ graph shows the CPU activity of the app from all the processor cores of the\
    \ device.\n\nThe `UI Responsiveness` tool can help developers identify the following\
    \ issues:\n\n*   UI responsiveness. The app could be slow to respond if the UI\
    \ thread is getting blocked. The possible reasons for this include excessive synchronous\
    \ JavaScript code, synchronous XHR requests, or even processor-intensive JavaScript\
    \ code.\n*   Slow loading time caused by resources.\n\nThe `GPU Usage` tool examines\
    \ the GPU usage in your DirectX application. It lets developers determine whether\
    \ the CPU or GPU is the cause of the performance bottleneck.\n\nThe `JavaScript\
    \ Memory` tool investigates the JavaScript heap to find issues such as memory\
    \ leaks and so forth.\n\nThe `Network` tool lets developers examine information\
    \ about the various network operations impacting your Windows app, including HTTP\
    \ request and response headers, payloads, cookies, and so forth.\n\n## 16.4 Windows\
    \ 10 Mobile Emulator: Additional Tools\n\n### Problem\n\nYou want to test the\
    \ features of your app by simulating real-world interaction with a Windows 10\
    \ Mobile device without the actual device. These real-world interactions include\
    \ testing the location-aware features, the accelerometer, and so forth.\n\n###\
    \ Solution\n\nUse the Windows 10 Mobile emulator, which is part of the Universal\
    \ Windows Platform tools. It includes additional tools that let developers to\
    \ test real-world interactions with the device.\n\n### How It Works\n\n`Additional\
    \ Tools` is part of the Windows 10 Mobile emulator. Let's open the app created\
    \ in the previous recipe and run the project by selecting one of the Windows Mobile\
    \ emulators instead of `Local Machine`. This launches your app in the Windows\
    \ 10 Mobile emulator. To open `Additional Tools` in the emulator, click the tools\
    \ button (the `>>` icon), as shown in Figure [16-12](#A978-1-4842-0719-2_16_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0719-2_16_Fig12_HTML.jpg](A978-1-4842-0719-2_16_Fig12_HTML.jpg)\n\
    \nFigure 16-12. Windows 10 Mobile emulator with Additional Tools feature\n\nThis\
    \ opens the `Additional Tools` window, where developers can access tools like\
    \ `Location`, `Networking`, and `Accelerometer` to test on the emulator (see Figure\
    \ [16-13](#A978-1-4842-0719-2_16_Chapter.html#Fig13)).\n\n![A978-1-4842-0719-2_16_Fig13_HTML.jpg](A978-1-4842-0719-2_16_Fig13_HTML.jpg)\n\
    \nFigure 16-13. Additional Tools window in emulator\n\n#### Simulate Mouse Input\n\
    \nYou can click the mouse input button on the emulator toolbar to enable the mouse\
    \ input. This ensures that any mouse clicks within the emulator will be sent as\
    \ mouse events to the emulator's operating system. This is a very useful feature\
    \ if your app is paired to a mouse that can be used as input.\n\n#### Near Field\
    \ Communications (NFC)\n\nIf your app uses Near Field Communication (NFC), the\
    \ `NFC` tab (see Figure [16-14](#A978-1-4842-0719-2_16_Chapter.html#Fig14)) might\
    \ be a useful tool to test your app in scenarios such as proximity, or tap to\
    \ share, card emulation, and so forth.\n\n![A978-1-4842-0719-2_16_Fig14_HTML.jpg](A978-1-4842-0719-2_16_Fig14_HTML.jpg)\n\
    \nFigure 16-14. NFC tab in Additional Tools\n\nYou can test your app by simulating\
    \ a pair of phones tapping together by using a pair of emulators.\n\nThe NFC tool\
    \ supports the following modes:\n\n*   Proximity mode\n*   HCE (host card emulation)\
    \ mode\n*   Smart card reader mode\n\nThe `NFC` tab displays the following when\
    \ you test this functionality:\n\n*   Mode selected\n*   Logs related to the tap\
    \ and untapped event\n*   A transcript of all messages sent and received over\
    \ the current connection\n\nNote that you will receive a Windows Firewall prompt\
    \ when you click the `Tap` button for the first time in the `NFC` tab.\n\nYou\
    \ need to launch two emulators of different resolutions from Visual Studio to\
    \ simulate a pair of phones tapping together.\n\nSelect the `Enable discovery\
    \ of peer devices` check box. The peer device drop-down box displays the Microsoft\
    \ emulators and the Windows machines running the simulator driver.\n\nWhen both\
    \ the emulators are running, follow these steps:\n\n1. Select the target emulator.\n\
    2. Select the `Send to peer device` option.\n3. Click the `Tap` button, which\
    \ simulates the two devices tapping together.\n4. Click the `Untap` button to\
    \ disconnect the devices.\n   To simulate reading messages from a device, follow\
    \ these steps:\n5. Select the `Send to self` radio option to test scenarios that\
    \ require only one NFC-enabled device.\n6. Click the `Tap` button to simulate\
    \ tapping a device to a tag. You should hear the notification sound.\n7. Click\
    \ the `Untap` button to disconnect.\n\n#### Multi-touch Input\n\nYou can simulate\
    \ multi-touch input for pinching, zooming, and rotating by using the multi-touch\
    \ input button on the Windows 10 emulator toolbar.\n\nTo simulate the multi-touch\
    \ feature, follow these steps:\n\n1. Click the `Multi-touch Input` button on the\
    \ emulator toolbar to enable this feature.\n2. Two points appear on the emulator\
    \ screen. Right-click and drag one of the touch points to position it. Left-click\
    \ and drag the other touch point to simulate pinching, zooming, and rotating,\
    \ and so forth.\n3. You can click the `Single Point Input` button on the emulator\
    \ toolbar to restore the normal input.\n\n#### Accelerometer\n\nThe `Accelerometer`\
    \ tool lets developers test Windows apps that track the movement of the phone\
    \ (see Figure [16-15](#A978-1-4842-0719-2_16_Chapter.html#Fig15)). It simulates\
    \ the behavior in the emulator.\n\n![A978-1-4842-0719-2_16_Fig15_HTML.jpg](A978-1-4842-0719-2_16_Fig15_HTML.jpg)\n\
    \nFigure 16-15. Accelerometer tool in Additional Tools\n\nThe accelerometer sensor\
    \ can be tested with live input or prerecorded input. It can simulate the shaking\
    \ of a phone with the recorded data.\n\nSelect the desired orientation from the\
    \ orientation drop-down list. In the middle of the accelerometer, you see a colored\
    \ dot. Drag it to simulate the movement of the device in a 3D plane."
  raw: '### How It Works


    Visual Studio profilers or Diagnostic Tools can help you find the performance
    bottlenecks in your Windows app. They show you where the code in your app spends
    most of the time.


    You can launch Visual Studio 2015 Diagnostic Tools by navigating to the Debug
    menu and selecting Start Diagnostic Tools Without Debugging, as shown in Figure
    [16-9](#A978-1-4842-0719-2_16_Chapter.html#Fig9).


    ![A978-1-4842-0719-2_16_Fig9_HTML.jpg](A978-1-4842-0719-2_16_Fig9_HTML.jpg)


    Figure 16-9.


    Launching Diagnostic Tools in Visual Studio 2015


    The Visual Studio Diagnostic Tools (see Figure [16-10](#A978-1-4842-0719-2_16_Chapter.html#Fig10))
    provide the following options for developers to test on their apps:


    ![A978-1-4842-0719-2_16_Fig10_HTML.jpg](A978-1-4842-0719-2_16_Fig10_HTML.jpg)


    Figure 16-10.


    Diagnostic Tools with the different options


    *   CPU usage

    *   GPU Usage

    *   HTML UI responsiveness

    *   JavaScript memory

    *   Network


    By default, the target is the current project. This can be changed to a running
    app or installed app and so forth by clicking the Change Target button and selecting
    the option from the list provided.


    You can select the tools that you wish to profile in the Available Tools section
    in the Diagnostic dialog.


    Click the Start button once the tools are selected. This launches the app and
    Visual Studio automatically starts the diagnostic tool and collecting the data
    for analysis.


    Once the tool completes collecting the data, the results are displayed, as shown
    in Figure [16-11](#A978-1-4842-0719-2_16_Chapter.html#Fig11).


    ![A978-1-4842-0719-2_16_Fig11_HTML.jpg](A978-1-4842-0719-2_16_Fig11_HTML.jpg)


    Figure 16-11.


    Results of the Diagnostic Tools in Visual Studio 2015


    Understanding how the app uses the CPU is a good starting point for analyzing
    and identifying the performance issues in your app. The CPU usage tool displays
    information on where the CPU is spending time executing your JavaScript code.


    When analyzing the CPU Usage report, developers can check the CPU utilization
    timeline graph and select the timeline segments to view details. The CPU utilization
    timeline graph shows the CPU activity of the app from all the processor cores
    of the device.


    The UI Responsiveness tool can help developers identify the following issues:


    *   UI responsiveness. The app could be slow to respond if the UI thread is getting
    blocked. The possible reasons for this include excessive synchronous JavaScript
    code, synchronous XHR requests, or even processor-intensive JavaScript code.

    *   Slow loading time caused by resources.


    The GPU Usage tool examines the GPU usage in your DirectX application. It lets
    developers determine whether the CPU or GPU is the cause of the performance bottleneck.


    The JavaScript Memory tool investigates the JavaScript heap to find issues such
    as memory leaks and so forth.


    The Network tool lets developers examine information about the various network
    operations impacting your Windows app, including HTTP request and response headers,
    payloads, cookies, and so forth.


    ## 16.4 Windows 10 Mobile Emulator: Additional Tools


    ### Problem


    You want to test the features of your app by simulating real-world interaction
    with a Windows 10 Mobile device without the actual device. These real-world interactions
    include testing the location-aware features, the accelerometer, and so forth.


    ### Solution


    Use the Windows 10 Mobile emulator, which is part of the Universal Windows Platform
    tools. It includes additional tools that let developers to test real-world interactions
    with the device.


    ### How It Works


    Additional Tools is part of the Windows 10 Mobile emulator. Let’s open the app
    created in the previous recipe and run the project by selecting one of the Windows
    Mobile emulators instead of Local Machine. This launches your app in the Windows
    10 Mobile emulator. To open Additional Tools in the emulator, click the tools
    button (the >> icon), as shown in Figure [16-12](#A978-1-4842-0719-2_16_Chapter.html#Fig12).


    ![A978-1-4842-0719-2_16_Fig12_HTML.jpg](A978-1-4842-0719-2_16_Fig12_HTML.jpg)


    Figure 16-12.


    Windows 10 Mobile emulator with Additional Tools feature


    This opens the Additional Tools window, where developers can access tools like
    Location, Networking, and Accelerometer to test on the emulator (see Figure [16-13](#A978-1-4842-0719-2_16_Chapter.html#Fig13)).


    ![A978-1-4842-0719-2_16_Fig13_HTML.jpg](A978-1-4842-0719-2_16_Fig13_HTML.jpg)


    Figure 16-13.


    Additional Tools window in emulator


    #### Simulate Mouse Input


    You can click the mouse input button on the emulator toolbar to enable the mouse
    input. This ensures that any mouse clicks within the emulator will be sent as
    mouse events to the emulator’s operating system. This is a very useful feature
    if your app is paired to a mouse that can be used as input.


    #### Near Field Communications (NFC)


    If your app uses Near Field Communication (NFC), the NFC tab (see Figure [16-14](#A978-1-4842-0719-2_16_Chapter.html#Fig14))
    might be a useful tool to test your app in scenarios such as proximity, or tap
    to share, card emulation, and so forth.


    ![A978-1-4842-0719-2_16_Fig14_HTML.jpg](A978-1-4842-0719-2_16_Fig14_HTML.jpg)


    Figure 16-14.


    NFC tab in Additional Tools


    You can test your app by simulating a pair of phones tapping together by using
    a pair of emulators.


    The NFC tool supports the following modes:


    *   Proximity mode

    *   HCE (host card emulation) mode

    *   Smart card reader mode


    The NFC tab displays the following when you test this functionality:


    *   Mode selected

    *   Logs related to the tap and untapped event

    *   A transcript of all messages sent and received over the current connection


    Note that you will receive a Windows Firewall prompt when you click the Tap button
    for the first time in the NFC tab.


    You need to launch two emulators of different resolutions from Visual Studio to
    simulate a pair of phones tapping together.


    Select the Enable discovery of peer devices check box. The peer device drop-down
    box displays the Microsoft emulators and the Windows machines running the simulator
    driver.


    When both the emulators are running, follow these steps:


    Select the target emulator.   Select the Send to peer device option.   Click the
    Tap button, which simulates the two devices tapping together.   Click the Untap
    button to disconnect the devices. To simulate reading messages from a device,
    follow these steps:   Select the Send to self radio option to test scenarios that
    require only one NFC-enabled device.   Click the Tap button to simulate tapping
    a device to a tag. You should hear the notification sound.   Click the Untap button
    to disconnect.


    #### Multi-touch Input


    You can simulate multi-touch input for pinching, zooming, and rotating by using
    the multi-touch input button on the Windows 10 emulator toolbar.


    To simulate the multi-touch feature, follow these steps:


    Click the Multi-touch Input button on the emulator toolbar to enable this feature.
      Two points appear on the emulator screen. Right-click and drag one of the touch
    points to position it. Left-click and drag the other touch point to simulate pinching,
    zooming, and rotating, and so forth.   You can click the Single Point Input button
    on the emulator toolbar to restore the normal input.


    #### Accelerometer


    The Accelerometer tool lets developers test Windows apps that track the movement
    of the phone (see Figure [16-15](#A978-1-4842-0719-2_16_Chapter.html#Fig15)).
    It simulates the behavior in the emulator.


    ![A978-1-4842-0719-2_16_Fig15_HTML.jpg](A978-1-4842-0719-2_16_Fig15_HTML.jpg)


    Figure 16-15.


    Accelerometer tool in Additional Tools


    The accelerometer sensor can be tested with live input or prerecorded input. It
    can simulate the shaking of a phone with the recorded data.


    Select the desired orientation from the orientation drop-down list.   In the middle
    of the accelerometer, you see a colored dot. Drag it to simulate the movement
    of the device in a 3D plane.'
  trans: "\n# 工作原理\n\nVisual Studio 分析器或诊断工具可帮助您查找 Windows 应用中的性能瓶颈。它们会显示应用中代码耗时最多的地方。\n\
    \n您可以通过导航到 `Debug`（调试）菜单并选择 `Start Diagnostic Tools Without Debugging`（启动诊断工具而不进行调试）来启动\
    \ Visual Studio 2015 诊断工具，如图 16-9 所示。\n\n![A978-1-4842-0719-2_16_Fig9_HTML.jpg](img/A978-1-4842-0719-2_16_Fig9_HTML.jpg)\n\
    \n图 16-9. 在 Visual Studio 2015 中启动诊断工具\n\nVisual Studio 诊断工具（见图 16-10）为开发者提供了以下用于测试其应用的选项：\n\
    \n![A978-1-4842-0719-2_16_Fig10_HTML.jpg](img/A978-1-4842-0719-2_16_Fig10_HTML.jpg)\n\
    \n图 16-10. 包含不同选项的诊断工具\n\n*   CPU 使用率\n*   GPU 使用情况\n*   HTML UI 响应能力\n*   JavaScript\
    \ 内存\n*   网络\n\n默认情况下，目标是当前项目。可以通过单击 `Change Target`（更改目标）按钮并从提供的列表中选择选项，将其更改为正在运行的应用或已安装的应用等。\n\
    \n您可以在 `Diagnostic`（诊断）对话框的 `Available Tools`（可用工具）部分中选择要分析的工具。\n\n选择好工具后，单击 `Start`（启动）按钮。这将启动应用，Visual\
    \ Studio 会自动启动诊断工具并收集数据以进行分析。\n\n一旦工具完成数据收集，便会显示结果，如图 16-11 所示。\n\n![A978-1-4842-0719-2_16_Fig11_HTML.jpg](img/A978-1-4842-0719-2_16_Fig11_HTML.jpg)\n\
    \n图 16-11. Visual Studio 2015 中诊断工具的结果\n\n了解应用如何使用 CPU 是分析和识别应用中性能问题的一个良好起点。`CPU\
    \ usage`（CPU 使用率）工具会显示 CPU 在何处花费时间执行您的 JavaScript 代码。\n\n在分析 `CPU Usage`（CPU 使用率）报告时，开发者可以检查\
    \ CPU 利用率时间线图表并选择时间线段来查看详细信息。CPU 利用率时间线图表显示设备所有处理器核心的应用 CPU 活动情况。\n\n`UI Responsiveness`（UI\
    \ 响应能力）工具可以帮助开发者识别以下问题：\n\n*   UI 响应能力。如果 UI 线程被阻塞，应用可能会响应缓慢。可能的原因包括过多的同步 JavaScript\
    \ 代码、同步 XHR 请求，甚至是处理器密集型 JavaScript 代码。\n*   由资源引起的加载缓慢问题。\n\n`GPU Usage`（GPU\
    \ 使用情况）工具检查 DirectX 应用程序中的 GPU 使用情况。它让开发者能够判断 CPU 还是 GPU 是性能瓶颈的原因。\n\n`JavaScript\
    \ Memory`（JavaScript 内存）工具检查 JavaScript 堆，以发现内存泄漏等问题。\n\n`Network`（网络）工具让开发者能够检查影响\
    \ Windows 应用的各种网络操作信息，包括 HTTP 请求和响应标头、有效负载、Cookie 等。\n\n## 16.4 Windows 10 移动模拟器：附加工具\n\
    \n### 问题\n\n您希望在无需实际设备的情况下，通过模拟与 Windows 10 移动设备的真实交互来测试应用的功能。这些真实交互包括测试位置感知功能、加速度计等。\n\
    \n### 解决方案\n\n使用 Windows 10 移动模拟器，它是通用 Windows 平台工具的一部分。它包括额外的工具，让开发者能够测试与设备的真实交互。\n\
    \n### 工作原理\n\n`Additional Tools`（附加工具）是 Windows 10 移动模拟器的一部分。让我们打开上一个方案中创建的应用，并通过选择其中一个\
    \ Windows 移动模拟器（而不是 `Local Machine`（本地计算机））来运行项目。这将在 Windows 10 移动模拟器中启动您的应用。要在模拟器中打开\
    \ `Additional Tools`（附加工具），请单击工具按钮（`>>` 图标），如图 16-12 所示。\n\n![A978-1-4842-0719-2_16_Fig12_HTML.jpg](img/A978-1-4842-0719-2_16_Fig12_HTML.jpg)\n\
    \n图 16-12. 带有附加工具功能的 Windows 10 移动模拟器\n\n这将打开 `Additional Tools`（附加工具）窗口，开发者可以在其中访问\
    \ `Location`（位置）、`Networking`（网络）和 `Accelerometer`（加速度计）等工具，以在模拟器上进行测试（见图 16-13）。\n\
    \n![A978-1-4842-0719-2_16_Fig13_HTML.jpg](img/A978-1-4842-0719-2_16_Fig13_HTML.jpg)\n\
    \n图 16-13. 模拟器中的附加工具窗口\n\n#### 模拟鼠标输入\n\n您可以单击模拟器工具栏上的鼠标输入按钮来启用鼠标输入。这可确保模拟器内的任何鼠标单击都将作为鼠标事件发送到模拟器的操作系统。如果您的应用配对了可用作输入的鼠标，这个功能非常有用。\n\
    \n#### 近场通信 (NFC)\n\n如果您的应用使用近场通信 (NFC)，`NFC`（近场通信）选项卡（见图 16-14）可能是在接近、点击分享、卡模拟等场景中测试应用的有用工具。\n\
    \n![A978-1-4842-0719-2_16_Fig14_HTML.jpg](img/A978-1-4842-0719-2_16_Fig14_HTML.jpg)\n\
    \n图 16-14. 附加工具中的 NFC 选项卡\n\n您可以通过使用一对模拟器来模拟两部手机相互轻触，从而测试您的应用。\n\nNFC 工具支持以下模式：\n\
    \n*   接近模式\n*   HCE（主机卡模拟）模式\n*   智能卡读卡器模式\n\n当您测试此功能时，`NFC`（近场通信）选项卡会显示以下内容：\n\
    \n*   选定的模式\n*   与轻触和取消轻触事件相关的日志\n*   当前连接上发送和接收的所有消息的记录\n\n请注意，当您在 `NFC`（近场通信）选项卡中首次单击\
    \ `Tap`（轻触）按钮时，您将收到 Windows 防火墙提示。\n\n您需要从 Visual Studio 启动两个不同分辨率的模拟器，以模拟一对手机相互轻触。\n\
    \n选中 `Enable discovery of peer devices`（启用对等设备发现）复选框。对等设备下拉框会显示 Microsoft 模拟器和运行模拟器驱动程序的\
    \ Windows 计算机。\n\n当两个模拟器都在运行时，请按照以下步骤操作：\n\n1. 选择目标模拟器。\n2. 选择 `Send to peer device`（发送到对等设备）选项。\n\
    3. 单击 `Tap`（轻触）按钮，这模拟了两个设备相互轻触。\n4. 单击 `Untap`（取消轻触）按钮断开设备连接。\n   要模拟从设备读取消息，请按照以下步骤操作：\n\
    5. 选择 `Send to self`（发送到自身）单选选项，以测试仅需要一个支持 NFC 的设备的场景。\n6. 单击 `Tap`（轻触）按钮，模拟将设备轻触到标签。您应该会听到通知声音。\n\
    7. 单击 `Untap`（取消轻触）按钮断开连接。\n\n#### 多点触控输入\n\n您可以通过使用 Windows 10 模拟器工具栏上的多点触控输入按钮，来模拟用于捏合、缩放和旋转的多点触控输入。\n\
    \n要模拟多点触控功能，请按照以下步骤操作：\n\n1. 单击模拟器工具栏上的 `Multi-touch Input`（多点触控输入）按钮以启用此功能。\n\
    2. 模拟器屏幕上会出现两个点。右键单击并拖动其中一个触控点以定位它。左键单击并拖动另一个触控点以模拟捏合、缩放、旋转等操作。\n3. 您可以单击模拟器工具栏上的\
    \ `Single Point Input`（单点输入）按钮以恢复为正常输入。\n\n#### 加速度计\n\n`Accelerometer`（加速度计）工具让开发者能够测试跟踪手机移动的\
    \ Windows 应用（见图 16-15）。它在模拟器中模拟行为。\n\n![A978-1-4842-0719-2_16_Fig15_HTML.jpg](img/A978-1-4842-0719-2_16_Fig15_HTML.jpg)\n\
    \n图 16-15. 附加工具中的加速度计工具\n\n加速度计传感器可以使用实时输入或预先录制的输入进行测试。它可以使用录制的数据模拟手机的晃动。\n\n\
    从方向下拉列表中选择所需的方向。在加速度计中间，您会看到一个彩色圆点。拖动它以模拟设备在 3D 平面中的移动。\n"
- fmt: '#### Location


    You can test apps that use navigation and geo-fencing by using the `Location`
    tab.


    You can simulate the movement from one location to another at different speeds
    and accuracy levels. The `Location` tool (see Figure [16-16](#A978-1-4842-0719-2_16_Chapter.html#Fig16))
    currently supports three modes:


    ![A978-1-4842-0719-2_16_Fig16_HTML.jpg](A978-1-4842-0719-2_16_Fig16_HTML.jpg)


    Figure 16-16. Location tab in Additional Tools


    - **Pin mode**: Place pushpins on the map. You can then click the `Play all points`,
    the simulator sends the location of each pin to the emulator in a sequence at
    the interval specified.

    - **Live mode**: When you place a pushpin on a map, the simulator sends the location
    of the pin to the emulator as you place them.

    - **Route mode**: Place pushpins on a map to indicate the waypoints. The simulator
    calculates the route.


    Users can also do the following in the `Location` tab:


    - Search for a location using the search box.

    - Zoom in and zoom out of a map.

    - Save the current set of pushpin points to an XML file to reload it later.

    - Clear all the points.

    - Save the route and load it the next time you are in the `Pin` and `Route` modes.


    #### Network


    The `Network` tab lets developers test the app at different network speeds and
    signal strengths.


    You can test your app on various network speeds, such as 2G, 3G, and 4G, and at
    different signal strengths, such as good, average, and poor.


    This feature is especially useful when your app makes calls to web services or
    transfers data.


    # Chapter 17: Sideloading and Windows App Certification Kit


    After you develop an app, it is important that you deploy the app and test it
    on various machines before you upload it to the Store. This chapter covers some
    of the recipes on how to generate an app package from command prompts and sideload
    your app on the machine, and later use the `Windows App Certification Kit` to
    test that the app is good enough to be published to the Windows Store. [Chapter
    18](#A978-1-4842-0719-2_18_Chapter.html) includes a recipe to generate the app
    package interactively from `Visual Studio`, hence, that is not covered in this
    chapter.


    ## 17.1 Sideload Your App


    ### Problem


    You need to sideload your app on a Windows device without submitting it to the
    Windows Store so that testers can install and test it using the app package file
    that you have created.


    ### Solution


    Use `PowerShell` to run the `Add-AppDevPackage` file (which was created when generating
    the package file) to sideload your app on a Windows device.


    ### How It Works


    Your app’s users cannot simply install a Universal Windows app the same way that
    they do with traditional desktop apps.


    Universal Windows apps can only be downloaded from the Store and then installed
    on the device. If you have an app that you want to install without going to the
    Store, you can sideload the app on the device so that users can install and test
    it.


    You can sideload the app package to a Windows 10 device by following these steps.


    Enable your device for sideloading. Install your app using `PowerShell`.


    The first step to sideload the app is to ensure that the sideloading is enabled
    on your device. You can enable it on your Windows machine by launching the `Settings`
    app and visiting `Update & Security`. Select the `For developers` button, which
    displays various options for using the developer features. Select `Developer mode`
    to enable the sideloading for the device (see Figure [17-1](#A978-1-4842-0719-2_17_Chapter.html#Fig1)).


    ![A978-1-4842-0719-2_17_Fig1_HTML.jpg](A978-1-4842-0719-2_17_Fig1_HTML.jpg)


    Figure 17-1. Enable Sideload apps and Developer mode in Windows 10


    Once you select `Developer mode`, a confirmation dialog is displayed (see Figure
    [17-2](#A978-1-4842-0719-2_17_Chapter.html#Fig2)) to confirm that you would like
    to turn on app sideloading. The `Sideload apps` option lets you install an `.appx`
    file and the certificate that is needed to run the app with the `PowerShell` script
    that was created along with the package. This option is more secure than `Developer
    mode` because you cannot install apps that are not trusted. But for this recipe,
    let’s select `Developer mode` and proceed.


    ![A978-1-4842-0719-2_17_Fig2_HTML.jpg](A978-1-4842-0719-2_17_Fig2_HTML.jpg)


    Figure 17-2. Confirmation dialog for enabling sideloading


    The next step is to install the app on the machine. To do it, follow these steps.


    1. Generate the package file for installation. This is covered in [Chapter 18](#A978-1-4842-0719-2_18_Chapter.html).

    2. Copy the complete folder of the package file that you want to install onto
    the target machine. For example, if you have created the app bundle, the folder
    name will contain the version number and `_test`. If the version number is 1.0.0.0
    and the project name is `Recipe17.1`, targeting `AnyCPU`, the folder would be
    `Recipe17.1_1.0.0.0_AnyCPU_Debug_Test`.

    3. On the target machine that you want to sideload the app, open the folder. Right-click
    the `Add-AppDevPackage.ps1` file and click the `Run with PowerShell` button on
    the context menu, as shown in Figure [17-3](#A978-1-4842-0719-2_17_Chapter.html#Fig3).


    ![A978-1-4842-0719-2_17_Fig3_HTML.jpg](A978-1-4842-0719-2_17_Fig3_HTML.jpg)


    Figure 17-3. The `Run with PowerShell` menu in Windows Explorer


    4. Follow the information shown in the `PowerShell` command. When the package
    is successfully installed, you will notice the `Your app was successfully installed`
    message in the command prompt, as shown in Figure [17-4](#A978-1-4842-0719-2_17_Chapter.html#Fig4).


    ![A978-1-4842-0719-2_17_Fig4_HTML.jpg](A978-1-4842-0719-2_17_Fig4_HTML.jpg)


    Figure 17-4. App installation message in `PowerShell` command


    Now, click the `Start` button in Windows. Find the app and launch it.


    ## 17.2 Install Certificate and Package Separately


    ### Problem


    You need to install the package and the certificate separately in Windows.


    ### Solution


    Use `PowerShell` to run the `Add-AppDevPackage` file (which was created when generating
    the package file) to sideload your app on the Windows device.'
