  raw: '# Chapter 9: Data Storage and App Data


    This chapter provides an overview of the data storage techniques to store app
    data in a Windows 10 app. You will learn about app settings, how to store and
    retrieve app settings as app data, and working with app data folders.


    So what is app data? Well, the data that is specific to a particular app is known
    as app data. Generally, app data is the user’s preferences, the app’s configuration,
    the app’s state, and so forth, which are alterable.


    When you install an app on a device, the app creates app data on it. But what
    happens when you remove or uninstall the app from the device? Well, when an app
    is uninstalled, the app data is removed from the device. So it is recommended
    not to store the user’s data (such as the user’s pictures) as app data.


    The other type of data that your app creates is user data. User data is created
    by the user, such as documents, pictures, video files, audio files, and so forth.


    ## 9.1 How to Create and Delete a Local App Data Settings Container


    ### Problem


    You need to create and delete a local app data store container in the app data
    store of your Windows 10 app.


    ### Solution


    Use the `Windows.Storage.ApplicationData.current.LocalSettings.createContainer`
    to create the local app settings container in the local app data store.


    ### How It Works


    The container allows you to organize your app data settings; for example, you
    can create a container called `Greeting_Data_Container` to store all the greetings
    for your app. Create another container, called `UserPreference_Container`, to
    store all the user preferences settings for your app users. You can add a container
    to the local settings and the roaming settings. A container can also have another
    container in it. Universal Windows apps allow you to create up to 32 nested levels
    of containers.


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015. This creates a Windows Universal app, which can be run on
    PCs, tablets, and Windows Phones running Windows 10.   Open the default.html page
    from the project in Visual Studio Solution Explorer.   Define an HTML tag for
    a button within the `<body>` tag of default.html. `<div id="titleBarContent" style="width:
    100%;height:30px; background:border-box darkblue; overflow: hidden; z-index: 3">`
            `<i>App Settings Admin Screen</i>`     `</div>` `<span> Click on the button
    to Create a local app data settings container</span>`     `<input type="button"
    value="Local Data Demo" id="btnLocalData" />`    `<h3><span id="msgspan"></span></h3>`
    The complete `default.html` code will look like this: `<!DOCTYPE html>` `<html>`
    `<head>`     `<meta charset="utf-8" />`     `<title>Recipe9.1</title>`     `<!--
    WinJS references -->`     `<link href="WinJS/css/ui-dark.css" rel="stylesheet"
    />`     `<script src="WinJS/js/base.js"></script>`     `<script src="WinJS/js/ui.js"></script>`
        `<!-- Recipe9.1 references -->`     `<link href="/css/default.css" rel="stylesheet"
    />`     `<script src="/js/default.js"></script>` `</head>` `<body class="win-type-body">`
        `<div id="titleBarContent" style="width: 100%;height:30px; background:border-box
    darkblue; overflow: hidden; z-index: 3">`         `<i>App Settings Admin Screen</i>`
        `</div>`         `<span> Click on the button to Create a local app data settings
    container</span>`     `<input type="button" value="Local Data Demo" id="btnCreateContainer"
    />`    `<h3><span id="msgspan"></span></h3>` `</body>` `</html>`   Right-click
    the project’s js folder in Solution Explorer and add a js file in the project’s
    `js` folder by using the Add ➤ New JavaScript file. Provide a name for the file.
    In this example, let’s name the file DatastorageDemo.js.   Refer to this file
    in `default.html` by adding the following code to the `<head>` tag: `<script src="js/DatastorageDemo.js"></script>`
      Add the following code to the newly created `js` file: `(function () {`     `"use
    strict";`     `function GetControl() {`         `WinJS.UI.processAll().done(function
    () {`   `var localSettingsButton = document.getElementById("btnCreateContainer");`
    `localSettingsButton.addEventListener("click", btnCreateContainerClick, false);`
            `});`     `}`     `document.addEventListener("DOMContentLoaded", GetControl);`
    `})();`  


    This code gets the button element and binds an event listener to the button, which
    is fired when user clicks the button. Now, add an event method or function using
    the following code snippet in the `DatastorageDemo.js` file.


    `function btnCreateContainerClick(mouseEvent) {`


       `var applicationData = Windows.Storage.ApplicationData.current;`


       `var localSettings = applicationData.localSettings;`


       `// Creating a local settings container`


       `var localSettingscontainer = localSettings.createContainer("App_GreetingDataContainer",
    Windows.Storage.ApplicationDataCreateDisposition.Always);`


    `document.getElementById("msgspan").innerText = "Container Created, the name of
    the container is :" + localSettingscontainer.name;`


        `}`


    This code declares a variable named `applicationData`. It is assigned `Windows.Storage.ApplicationData.current`,
    which allows you to access the app data store. The app data store can store app
    settings and files. The next line then retrieves the `localSettings` from the
    `ApplicationData` to a variable `localSettings`.


    It then calls the `createContainer` method to create a settings container. The
    preceding example creates a settings container, `App_greetingData`. The `createContainer`
    method takes two parameters: the name of the settings container and `Windows.Storage.ApplicationDataCreateDisposition.Always`,
    which indicates to always check if the container exists or not. If it exists,
    return the specified container; else, create a new one.


    You can also delete a container using the `localSettingscontainer.deleteContainer("<<name>>")`
    method. The `deleteContainer` method deletes the container from the app data store.


    The delete code snippet checks whether a container exists by using the `hasKey`
    function, and then it uses the `deleteContainer` function to delete the container
    by passing the container key.


    The complete code for `DataStorageDemo.js` is given here:


    `(function () {`


        `"use strict";`


        `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


                `var localSettingsButton = document.getElementById("btnCreateContainer");`


                `localSettingsButton.addEventListener("click", btnCreateContainerClick,
    false);`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", GetControl);`


    `})();`


    `function btnCreateContainerClick(mouseEvent) {`


        `var applicationData = Windows.Storage.ApplicationData.current;`


        `var localSettings = applicationData.localSettings;`


        `// Creating a local settings container`


        `var localSettingscontainer = localSettings.createContainer("App_GreetingDataContainer",
    Windows.Storage.ApplicationDataCreateDisposition.Always);`


        `document.getElementById("msgspan").innerText = "Container Created, the name
    of the container is :" + localSettingscontainer.name;`


    `}`


    Now, let’s build the app and run it in Windows 10.


    Figure [9-1](#A978-1-4842-0719-2_9_Chapter.html#Fig1) demonstrates the appearance
    of a button and an `h2` tag. When you click the local data demo button, it executes
    the `btnSaveClick` method, which creates the container and displays a message
    with the name of the container.


    ![A978-1-4842-0719-2_9_Fig1_HTML.jpg](A978-1-4842-0719-2_9_Fig1_HTML.jpg)


    Figure 9-1.


    Creating a local app data settings container


    ## 9.2 How to Create and Read Local App Data Settings


    ### Problem


    You need to create local app data settings in the app data settings container
    in the app data store.


    ### Solution


    Use `ApplicationDataContainer.values` to create local app data settings in the
    app data settings container in the local app data store in your Windows 10 app.'
  trans: "\n# 第 9 章：数据存储与应用数据\n\n本章概述了在 Windows 10 应用中存储应用数据的技术。你将学习应用设置、如何将应用设置作为应用数据进行存储和检索，以及如何使用应用数据文件夹。\n\
    \n那么什么是应用数据呢？简单来说，特定于某个应用的数据被称为应用数据。通常，应用数据包括用户偏好、应用配置、应用状态等可变信息。\n\n当你在设备上安装应用时，该应用会创建应用数据。但如果你从设备上移除或卸载该应用会发生什么呢？当应用被卸载时，其应用数据也会从设备上被删除。因此，建议不要将用户数据（如用户照片）存储为应用数据。\n\
    \n你的应用创建的另一种数据类型是用户数据。用户数据是由用户创建的，例如文档、图片、视频文件、音频文件等。\n\n## 9.1 如何创建和删除本地应用数据设置容器\n\
    \n### 问题\n\n你需要在 Windows 10 应用的本地应用数据存储中创建和删除一个容器。\n\n### 解决方案\n\n使用`Windows.Storage.ApplicationData.current.LocalSettings.createContainer`在本地应用数据存储中创建本地应用设置容器。\n\
    \n### 工作原理\n\n容器可以让你组织应用数据设置；例如，你可以创建一个名为`Greeting_Data_Container`的容器来存储应用的所有问候语。再创建另一个名为`UserPreference_Container`的容器来存储应用用户的所有偏好设置。你可以将容器添加到本地设置和漫游设置中。一个容器内部还可以包含另一个容器。通用\
    \ Windows 应用允许你创建最多 32 层嵌套的容器。\n\n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。这将创建一个可以在运行\
    \ Windows 10 的 PC、平板电脑和 Windows Phone 上运行的 Windows 通用应用。在 Visual Studio 解决方案资源管理器中打开项目中的`default.html`页面。在`default.html`的`<body>`标签内定义一个按钮的\
    \ HTML 标签。\n\n```html\n<div id=\"titleBarContent\" style=\"width: 100%;height:30px;\
    \ background:border-box darkblue; overflow: hidden; z-index: 3\">\n    <i>应用设置管理界面</i>\n\
    </div>\n<span>点击按钮创建本地应用数据设置容器</span>\n<input type=\"button\" value=\"本地数据演示\"\
    \ id=\"btnLocalData\" />\n<h3><span id=\"msgspan\"></span></h3>\n```\n\n完整的`default.html`代码如下所示：\n\
    \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n \
    \   <title>示例 9.1</title>\n    <!-- WinJS 引用 -->\n    <link href=\"WinJS/css/ui-dark.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script\
    \ src=\"WinJS/js/ui.js\"></script>\n    <!-- 示例 9.1 引用 -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    </head>\n<body class=\"win-type-body\">\n    <div id=\"titleBarContent\" style=\"\
    width: 100%;height:30px; background:border-box darkblue; overflow: hidden; z-index:\
    \ 3\">\n        <i>应用设置管理界面</i>\n    </div>\n    <span>点击按钮创建本地应用数据设置容器</span>\n\
    \    <input type=\"button\" value=\"本地数据演示\" id=\"btnCreateContainer\" />\n  \
    \  <h3><span id=\"msgspan\"></span></h3>\n</body>\n</html>\n```\n\n在解决方案资源管理器中右键点击项目的`js`文件夹，选择添加\
    \ ➤ 新建 JavaScript 文件，在项目的`js`文件夹中添加一个`js`文件。为文件命名。在此示例中，我们将文件命名为`DatastorageDemo.js`。通过在`default.html`的`<head>`标签中添加以下代码来引用该文件：\n\
    \n```html\n<script src=\"js/DatastorageDemo.js\"></script>\n```\n\n将以下代码添加到新创建的`js`文件中：\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    function GetControl()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var localSettingsButton\
    \ = document.getElementById(\"btnCreateContainer\");\n            localSettingsButton.addEventListener(\"\
    click\", btnCreateContainerClick, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\n这段代码获取按钮元素，并为按钮绑定一个事件监听器，当用户点击按钮时触发该监听器。现在，在`DatastorageDemo.js`文件中使用以下代码片段添加一个事件方法或函数。\n\
    \n```javascript\nfunction btnCreateContainerClick(mouseEvent) {\n    var applicationData\
    \ = Windows.Storage.ApplicationData.current;\n    var localSettings = applicationData.localSettings;\n\
    \    // 创建一个本地设置容器\n    var localSettingscontainer = localSettings.createContainer(\"\
    App_GreetingDataContainer\", Windows.Storage.ApplicationDataCreateDisposition.Always);\n\
    \    document.getElementById(\"msgspan\").innerText = \"容器已创建，容器名称为：\" + localSettingscontainer.name;\n\
    }\n```\n\n这段代码声明了一个名为`applicationData`的变量。它被赋值为`Windows.Storage.ApplicationData.current`，这允许你访问应用数据存储。应用数据存储可以保存应用设置和文件。下一行从`ApplicationData`中检索`localSettings`并将其赋值给变量`localSettings`。\n\
    \n然后调用`createContainer`方法创建一个设置容器。上述示例创建了一个名为`App_greetingData`的设置容器。`createContainer`方法接受两个参数：设置容器的名称和`Windows.Storage.ApplicationDataCreateDisposition.Always`，后者表示始终检查容器是否存在。如果存在，则返回指定的容器；否则，创建一个新的容器。\n\
    \n你也可以使用`localSettingscontainer.deleteContainer(\"<<名称>>\")`方法删除一个容器。`deleteContainer`方法用于从应用数据存储中删除容器。\n\
    \n删除代码片段使用`hasKey`函数检查容器是否存在，然后通过传递容器键使用`deleteContainer`函数删除容器。\n\n`DataStorageDemo.js`的完整代码如下：\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    function GetControl()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var localSettingsButton\
    \ = document.getElementById(\"btnCreateContainer\");\n            localSettingsButton.addEventListener(\"\
    click\", btnCreateContainerClick, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n\nfunction btnCreateContainerClick(mouseEvent)\
    \ {\n    var applicationData = Windows.Storage.ApplicationData.current;\n    var\
    \ localSettings = applicationData.localSettings;\n    // 创建一个本地设置容器\n    var localSettingscontainer\
    \ = localSettings.createContainer(\"App_GreetingDataContainer\", Windows.Storage.ApplicationDataCreateDisposition.Always);\n\
    \    document.getElementById(\"msgspan\").innerText = \"容器已创建，容器名称为：\" + localSettingscontainer.name;\n\
    }\n```\n\n现在，让我们生成应用并在 Windows 10 中运行它。\n\n图 9-1 展示了一个按钮和`h2`标签的外观。当你点击本地数据演示按钮时，它会执行`btnSaveClick`方法，该方法创建容器并显示一条包含容器名称的消息。\n\
    \n![A978-1-4842-0719-2_9_Fig1_HTML.jpg](img/A978-1-4842-0719-2_9_Fig1_HTML.jpg)\n\
    \n**图 9-1.** 创建本地应用数据设置容器\n\n## 9.2 如何创建和读取本地应用数据设置\n\n### 问题\n\n你需要在应用数据存储的应用数据设置容器中创建本地应用数据设置。\n\
    \n### 解决方案\n\n使用`ApplicationDataContainer.values`在 Windows 10 应用的本地应用数据存储的应用数据设置容器中创建本地应用数据设置。\n"
- fmt: "### How It Works\n\nApp settings are the personalized data or customization\
    \ settings in your app. User preferences—such as whether the user wants to enable\
    \ or disable location services—is an app setting. Universal Windows app development\
    \ exposes APIs, which allows you to store and retrieve app settings as app data\
    \ in the app data store.\n\nThe app store consists of two different settings locations:\
    \ local settings and roaming settings.\n\nCreate a new project using the Windows\
    \ Universal (Blank App) template in Microsoft Visual Studio 2015. Open the `default.html`\
    \ page from the project in Visual Studio Solution Explorer. Define HTML tags for\
    \ two text boxes, a button, and a `<span>` tag within the `<body>` tag of `default.html`.\n\
    \n```\n<div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
    \ darkblue; overflow: hidden; z-index: 3\">\n    <i>App Settings Admin Screen\
    \ (Use this Screen to configure app Settings)</i>\n</div>\n<br />\n<i>Welcome\
    \ Greeting in English</i> <input type=\"text\" value=\"\" id=\"txtWelcomeGreetingseng\"\
    \ /><br />\n<i>Welcome Greeting in French</i><input type=\"text\" value=\"\" id=\"\
    txtWelcomeGreetingsfr\" /><br />\n<input type=\"button\" value=\"Create Local\
    \ App Data Demo\" id=\"btnLocalData\" />\n```\n\nThe complete `default.html` should\
    \ look like this:\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"\
    utf-8\" />\n    <title>Recipe9.2</title>\n    <!-- WinJS references -->\n    <link\
    \ href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"\
    ></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n    <!-- Recipe9.2 references\
    \ -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\" />\n    <script\
    \ src=\"/js/default.js\"></script>\n</head>\n<body class=\"win-type-body\">\n\
    \    <div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
    \ darkblue; overflow: hidden; z-index: 3\">\n        <i>App Settings Admin Screen\
    \ (Use this Screen to configure app Settings)</i>\n    </div>\n    <br />\n  \
    \  <i>Welcome Greeting in English</i> <input type=\"text\" value=\"\" id=\"txtWelcomeGreetingseng\"\
    \ /><br />\n    <i>Welcome Greeting in French</i><input type=\"text\" value=\"\
    \" id=\"txtWelcomeGreetingsfr\" /><br />\n    <input type=\"button\" value=\"\
    Create Local App Data Demo\" id=\"btnLocalData\" />\n</body>\n</html>\n```\n\n\
    Right-click the project’s `js` folder in Solution Explorer and select Add ➤ New\
    \ JavaScript file. Provide a name for the file. In this example, let’s name the\
    \ file `DataStorageDemo.js`.\n\n```javascript\n(function () {\n    \"use strict\"\
    ;\n    function GetControl() {\n        WinJS.UI.processAll().done(function ()\
    \ {\n            var submitbutton = document.getElementById(\"btnLocalData\");\n\
    \            submitbutton.addEventListener(\"click\", btnLocalDataClick, false);\n\
    \        });\n        GetCurrentSettingValues();\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\nNow, add a function to retrieve\
    \ the current greeting settings from the container:\n\n```javascript\nfunction\
    \ GetCurrentSettingValues() {\n    var applicationData = Windows.Storage.ApplicationData.current;\n\
    \    var localSettings = applicationData.localSettings;\n    // Creating a local\
    \ settings container\n    var containerExists = localSettings.containers.hasKey(\"\
    App_GreetingDatalocalContainer\");\n    if (containerExists) {\n        document.getElementById(\"\
    txtWelcomeGreetingseng\").value = localSettings.containers.lookup(\"App_GreetingDatalocalContainer\"\
    ).values[\"App_Heading_English\"];\n        document.getElementById(\"txtWelcomeGreetingsfr\"\
    ).value = localSettings.containers.lookup(\"App_GreetingDatalocalContainer\").values[\"\
    App_Heading_French\"];\n    }\n}\n```\n\nThis code is executed on load of the\
    \ app; it retrieves the local greetings settings from the container. When you\
    \ run this app for the first time, you will not see any values populated, but\
    \ when you run it the next time, it will show settings stored in the container.\n\
    \nNow, add an event method or a function using the following code snippet in the\
    \ `DataStorageDemo.js` file:\n\n```javascript\nfunction btnLocalDataClick(mouseEvent)\
    \ {\n    var applicationData = Windows.Storage.ApplicationData.current;\n    var\
    \ localSettings = applicationData.localSettings;\n    // Creating a local settings\
    \ container\n    var localSettingscontainer = localSettings.createContainer(\"\
    App_GreetingDatalocalContainer\", Windows.Storage.ApplicationDataCreateDisposition.Always);\n\
    \    if (!localSettingscontainer.values.hasKey(\"App_Heading_English\")) {\n \
    \       localSettingscontainer.values[\"App_Heading_English\"] = document.getElementById(\"\
    txtWelcomeGreetingseng\").value;\n    }\n    if (!localSettingscontainer.values.hasKey(\"\
    App_Heading_French\")) {\n        localSettingscontainer.values[\"App_Heading_French\"\
    ] = document.getElementById(\"txtWelcomeGreetingsfr\").value;\n    }\n} //end\
    \ of function btnLocalDataClick\n```\n\nThis code creates `applicationData` and\
    \ `localSettings` variables to reference the `localSettings`. After that, it creates\
    \ a container named `App_GreetingDatalocalContainer` using the `createContainer`\
    \ function. It then uses the `localSettingscontainer.values.hasKey(\"App_Heading_English\"\
    )` to ensure that the setting named `App_Heading_English` exists in the `localSettings`\
    \ container of application data. If the setting doesn’t exist, then it creates\
    \ one by using the `localSettingscontainer.[\"name\"]` function. It also assigns\
    \ a string value from the text box to it by using the following line of code:\n\
    \n```\nlocalSettingscontainer.values[\"App_Heading_English\"] = document.getElementById(\"\
    txtWelcomeGreetingseng\").value;\n```\n\nIt does the same thing for the app heading\
    \ in French.\n\nWhen you run the application on Windows 10, you see the screen\
    \ shown in Figure [9-2](#A978-1-4842-0719-2_9_Chapter.html#Fig2).\n\n![A978-1-4842-0719-2_9_Fig2_HTML.jpg](A978-1-4842-0719-2_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2. Creating local app data settings for the greetings settings\n\n\
    ## 9.3 How to Create and Retrieve Local Composite Settings\n\n### Problem\n\n\
    You need to create and read local composite values in the app data store in your\
    \ Windows 10 app.\n\n### Solution\n\nUse the `ApplicationDataCompositeValue` class\
    \ to create and read local composite values.\n\n### How It Works\n\nThe `Windows.Storage.ApplicationDataCompositeValue`\
    \ class allows you to create composite settings that can be stored in local settings\
    \ or roaming settings. The composite value class allows you to store name value\
    \ pairs as app data in the app data store. Let’s say you want to store book information\
    \ as:\n\n```\nbook[\"ISBN\"] = 12345;\nbook[\"BookTitle\"] = \"Windows 10 Development\"\
    ;\n```\n\nTo store composite information, you can use the code shown here:\n\n\
    ```javascript\nvar applicationData = Windows.Storage.ApplicationData.current;\n\
    var localSettings = applicationData.localSettings;\n// Create a BookInfo Composite\
    \ setting\nvar bookInfo = new Windows.Storage.ApplicationDataCompositeValue();\n\
    bookInfo[\"ISBN\"] = 12345;\nbookInfo[\"Title\"] = \"Windows 10 Development\"\
    ;\nlocalSettings.values[\"AppLocalSettings\"] = bookInfo;\n```\n\nTo read data\
    \ from a composite setting, you can use the code shown here:\n\n```javascript\n\
    var bookInfo = localSettings.values[\"AppLocalSettings\"];\nif (bookInfo) {\n\
    \    var ISBN = bookInfo[\"ISBN\"];\n    var Title = bookInfo[\"Title\"];\n}\n\
    ```\n\n## 9.4 How to Create a Roaming App Data Store Container\n\n### Problem\n\
    \nYou need to create a roaming app data store container in the app data store\
    \ of your Windows 10 app.\n\n### Solution\n\nUse `roamingSettings.createContainer`\
    \ to create the roaming app settings container in the app data store."
  raw: '### How It Works


    App settings are the personalized data or customization settings in your app.
    User preferences—such as whether the user wants to enable or disable location
    services—is an app setting. Universal Windows app development exposes APIs, which
    allows you to store and retrieve app settings as app data in the app data store.


    The app store consists of two different settings locations: local settings and
    roaming settings.


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015.   Open the default.html page from the project in Visual Studio
    Solution Explorer.   Define HTML tags for two text boxes, a button, and a `<span>`
    tag within the `<body>` tag of `default.html`. `<div id="titleBarContent" style="width:
    100%;height:30px; background:border-box darkblue; overflow: hidden; z-index: 3">`
      `<i>App Settings Admin Screen (Use this Screen to configure app Settings)</i>  </div>`
        `<br />`     `<i>Welcome Greeting in English</i> <input type="text" value=""
    id="txtWelcomeGreetingseng" /><br />`     `<i>Welcome Greeting in French</i><input
    type="text" value="" id="txtWelcomeGreetingsfr" /><br />`   `<input type="button"
    value="Create Local App Data Demo" id="btnLocalData" />` The complete `default.html`
    contains should look like this: `<!DOCTYPE html>` `<html>` `<head>`     `<meta
    charset="utf-8" />`     `<title>Recipe9.2</title>`     `<!-- WinJS references
    -->`     `<link href="WinJS/css/ui-dark.css" rel="stylesheet" />`     `<script
    src="WinJS/js/base.js"></script>`     `<script src="WinJS/js/ui.js"></script>`
        `<!-- Recipe9.2 references -->`     `<link href="/css/default.css" rel="stylesheet"
    />`     `<script src="/js/default.js"></script>` `</head>` `<body class="win-type-body">`
        `<div id="titleBarContent" style="width: 100%;height:30px; background:border-box
    darkblue; overflow: hidden; z-index: 3">`         `<i>App Settings Admin Screen
    (Use this Screen to configure app Settings)</i>`     `</div>`     `<br />`     `<i>Welcome
    Greeting in English</i> <input type="text" value="" id="txtWelcomeGreetingseng"
    /><br />`     `<i>Welcome Greeting in French</i><input type="text" value="" id="txtWelcomeGreetingsfr"
    /><br />`     `<input type="button" value="Create Local App Data Demo" id="btnLocalData"
    />` `</body>` `</html>`   Right-click the project’s js folder in Solution Explorer
    and select Add ➤ New JavaScript file. Provide a name for the file. In this example,
    let’s name the file DataStorageDemo.js. `(function () {`     `"use strict";`     `function
    GetControl() {`         `WinJS.UI.processAll().done(function () {`             `var
    submitbutton = document.getElementById("btnLocalData");`             `submitbutton.addEventListener("click",
    btnLocalDataClick, false);`         `});` `GetCurrentSettingValues();`     `}`
        `document.addEventListener("DOMContentLoaded", GetControl);` `})();`   Now,
    add a function to retrieve the current greeting settings from the container: `function
    GetCurrentSettingValues() {`     `var applicationData = Windows.Storage.ApplicationData.current;`
        `var localSettings = applicationData.localSettings;`     `// Creating a local
    settings container`     `var containerExists = localSettings.containers.hasKey("App_GreetingDatalocalContainer");`
        `if (containerExists) {`         `document.getElementById("txtWelcomeGreetingseng").value
    = localSettings.containers.lookup("App_GreetingDatalocalContainer").values["App_Heading_English"];`
            `document.getElementById("txtWelcomeGreetingsfr").value = localSettings.containers.lookup("App_GreetingDatalocalContainer").values["App_Heading_French"];`
        `}` `}`  


    This code is executed on load of the app; it retrieves the local greetings settings
    from the container. When you run this app for the first time, you will not see
    any values populated, but when you run it the next time, it will show settings
    stored in the container.


    Now, add an event method or a function using the following code snippet in the
    `DataStorageDemo.js` file:


    `function btnLocalDataClick(mouseEvent) {`


      `var applicationData = Windows.Storage.ApplicationData.current;`


      `var localSettings = applicationData.localSettings;`


      `// Creating a local settings container`


      `var localSettingscontainer = localSettings.createContainer("App_GreetingDatalocalContainer",
    Windows.Storage.ApplicationDataCreateDisposition.Always);`


      `if (!localSettingscontainer.values.hasKey("App_Heading_English")) {`


          `localSettingscontainer.values["App_Heading_English"] = document.getElementById("txtWelcomeGreetingseng").value;`


        `}`


      `if (!localSettingscontainer.values.hasKey("App_Heading_French")) {`


             `localSettingscontainer.values["App_Heading_French"] = document.getElementById("txtWelcomeGreetingsfr").value;`


            `}`


        `} //end of function btnLocalDataClick`


    This code creates `applicationData` and `localSettings` variables to reference
    the `localSettings`. After that, it creates a container named `App_GreetingDatalocalContainer`
    using the `createContainer` function. It then uses the `localSettingscontainer.values.hasKey("App_Heading_English")`
    to ensure that the setting named `App_Heading_English` exists in the localSettings
    container of application data. If the setting doesn’t exist, then it creates one
    by using the `localSettingscontainer.["name"]` function. It also assigns a string
    value from the text box to it by using the following line of code:


    `localSettingscontainer.values["App_Heading_English"] = document.getElementById("txtWelcomeGreetingseng").value;`


    It does same thing for the app heading in French.


    When you run the application on the Windows 10, you see the screen shown in Figure
    [9-2](#A978-1-4842-0719-2_9_Chapter.html#Fig2).


    ![A978-1-4842-0719-2_9_Fig2_HTML.jpg](A978-1-4842-0719-2_9_Fig2_HTML.jpg)


    Figure 9-2.


    Creating local app data settings for the greetings settings


    ## 9.3 How to Create and Retrieve Local Composite Settings


    ### Problem


    You need to create and read local composite values in the app data store in your
    Windows 10 app.


    ### Solution


    Use the `ApplicationDataCompositeValue` class to create and read local composite
    values.


    ### How It Works


    The `Windows.Storage.ApplicationDataCompositeValue` class allows you to create
    composite settings that can be stored in local settings or roaming settings. The
    composite value class allows you to store name value pairs as app data in the
    app data store. Let’s say you want to store book information as


    `book["ISBN"] = 12345;`


    `book["BookTitle"] = "Windows 10 Development";`


    To store composite information, you can use the code shown here:


    `var applicationData = Windows.Storage.ApplicationData.current;`


    `var localSettings = applicationData.localSettings;`


    `// Create a BookInfo Composite setting`


    `var bookInfo = new Windows.Storage.ApplicationDataCompositeValue();`


    `bookInfo["ISBN"] = 12345;`


    `bookInfo["Title"] = "Windows 10 Development";`


    `localSettings.values["AppLocalSettings"] = bookInfo;`


    To read data from a composite setting, you can use the code shown here:


    `var bookInfo = localSettings.values["AppLocalSettings"];`


    `if (bookInfo)`


    `{`


        `var ISBN = bookInfo["ISBN"];`


        `var Title = bookInfo["Title"]`


    `}`


    ## 9.4 How to Create a Roaming App Data Store Container


    ### Problem


    You need to create a roaming app data store container in the app data store of
    your Windows 10 app.


    ### Solution


    Use `roamingSettings.createContainer` to create the roaming app settings container
    in the app data store.'
  trans: "\n### 工作原理\n\n应用设置是应用中的个性化数据或自定义设置。用户偏好——例如用户是否希望启用或禁用定位服务——即是一种应用设置。通用\
    \ Windows 应用开发公开了相关 API，允许您将应用设置作为应用数据存储和检索到应用数据存储中。\n\n应用数据存储包含两个不同的设置位置：本地设置和漫游设置。\n\
    \n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。在 Visual Studio\
    \ 解决方案资源管理器中打开项目中的 `default.html` 页面。在 `default.html` 的 `<body>` 标签内，为两个文本框、一个按钮和一个\
    \ `<span>` 标签定义 HTML 标签。\n\n```\n<div id=\"titleBarContent\" style=\"width: 100%;height:30px;\
    \ background:border-box darkblue; overflow: hidden; z-index: 3\">\n    <i>应用设置管理界面（使用此界面配置应用设置）</i>\n\
    </div>\n<br />\n<i>英文欢迎语</i> <input type=\"text\" value=\"\" id=\"txtWelcomeGreetingseng\"\
    \ /><br />\n<i>法文欢迎语</i><input type=\"text\" value=\"\" id=\"txtWelcomeGreetingsfr\"\
    \ /><br />\n<input type=\"button\" value=\"创建本地应用数据演示\" id=\"btnLocalData\" />\n\
    ```\n\n完整的 `default.html` 应如下所示：\n\n```html\n<!DOCTYPE html>\n<html>\n<head>\n\
    \    <meta charset=\"utf-8\" />\n    <title>Recipe9.2</title>\n    <!-- WinJS\
    \ references -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- Recipe9.2 references -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n</head>\n\
    <body class=\"win-type-body\">\n    <div id=\"titleBarContent\" style=\"width:\
    \ 100%;height:30px; background:border-box darkblue; overflow: hidden; z-index:\
    \ 3\">\n        <i>应用设置管理界面（使用此界面配置应用设置）</i>\n    </div>\n    <br />\n    <i>英文欢迎语</i>\
    \ <input type=\"text\" value=\"\" id=\"txtWelcomeGreetingseng\" /><br />\n   \
    \ <i>法文欢迎语</i><input type=\"text\" value=\"\" id=\"txtWelcomeGreetingsfr\" /><br\
    \ />\n    <input type=\"button\" value=\"创建本地应用数据演示\" id=\"btnLocalData\" />\n\
    </body>\n</html>\n```\n\n右键单击解决方案资源管理器中项目的 `js` 文件夹，选择“添加” ➤ “新建 JavaScript 文件”。为文件命名。在本例中，我们将文件命名为\
    \ `DataStorageDemo.js`。\n\n```javascript\n(function () {\n    \"use strict\";\n\
    \    function GetControl() {\n        WinJS.UI.processAll().done(function () {\n\
    \            var submitbutton = document.getElementById(\"btnLocalData\");\n \
    \           submitbutton.addEventListener(\"click\", btnLocalDataClick, false);\n\
    \        });\n        GetCurrentSettingValues();\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\n现在，添加一个函数，用于从容器中检索当前欢迎语设置：\n\n\
    ```javascript\nfunction GetCurrentSettingValues() {\n    var applicationData =\
    \ Windows.Storage.ApplicationData.current;\n    var localSettings = applicationData.localSettings;\n\
    \    // 创建一个本地设置容器\n    var containerExists = localSettings.containers.hasKey(\"\
    App_GreetingDatalocalContainer\");\n    if (containerExists) {\n        document.getElementById(\"\
    txtWelcomeGreetingseng\").value = localSettings.containers.lookup(\"App_GreetingDatalocalContainer\"\
    ).values[\"App_Heading_English\"];\n        document.getElementById(\"txtWelcomeGreetingsfr\"\
    ).value = localSettings.containers.lookup(\"App_GreetingDatalocalContainer\").values[\"\
    App_Heading_French\"];\n    }\n}\n```\n\n此代码在应用加载时执行；它从容器中检索本地欢迎语设置。首次运行此应用时，您不会看到任何填充的值，但下次运行时，它将显示存储在容器中的设置。\n\
    \n现在，在 `DataStorageDemo.js` 文件中使用以下代码片段添加一个事件方法或函数：\n\n```javascript\nfunction\
    \ btnLocalDataClick(mouseEvent) {\n    var applicationData = Windows.Storage.ApplicationData.current;\n\
    \    var localSettings = applicationData.localSettings;\n    // 创建一个本地设置容器\n \
    \   var localSettingscontainer = localSettings.createContainer(\"App_GreetingDatalocalContainer\"\
    , Windows.Storage.ApplicationDataCreateDisposition.Always);\n    if (!localSettingscontainer.values.hasKey(\"\
    App_Heading_English\")) {\n        localSettingscontainer.values[\"App_Heading_English\"\
    ] = document.getElementById(\"txtWelcomeGreetingseng\").value;\n    }\n    if\
    \ (!localSettingscontainer.values.hasKey(\"App_Heading_French\")) {\n        localSettingscontainer.values[\"\
    App_Heading_French\"] = document.getElementById(\"txtWelcomeGreetingsfr\").value;\n\
    \    }\n} //btnLocalDataClick 函数结束\n```\n\n此代码创建 `applicationData` 和 `localSettings`\
    \ 变量以引用 `localSettings`。之后，使用 `createContainer` 函数创建一个名为 `App_GreetingDatalocalContainer`\
    \ 的容器。然后，使用 `localSettingscontainer.values.hasKey(\"App_Heading_English\")` 确保名为\
    \ `App_Heading_English` 的设置存在于应用数据的 `localSettings` 容器中。如果设置不存在，则通过 `localSettingscontainer.[\"\
    name\"]` 函数创建一个。它还使用以下代码行将文本框中的字符串值赋给它：\n\n```\nlocalSettingscontainer.values[\"\
    App_Heading_English\"] = document.getElementById(\"txtWelcomeGreetingseng\").value;\n\
    ```\n\n它对法文应用标题执行相同的操作。\n\n在 Windows 10 上运行应用程序时，您将看到如图 9-2 所示的界面。\n\n![A978-1-4842-0719-2_9_Fig2_HTML.jpg](img/A978-1-4842-0719-2_9_Fig2_HTML.jpg)\n\
    \n图 9-2. 为欢迎语设置创建本地应用数据设置\n\n## 9.3 如何创建和检索本地复合设置\n\n### 问题\n\n您需要在 Windows 10\
    \ 应用的应用数据存储中创建和读取本地复合值。\n\n### 解决方案\n\n使用 `ApplicationDataCompositeValue` 类创建和读取本地复合值。\n\
    \n### 工作原理\n\n`Windows.Storage.ApplicationDataCompositeValue` 类允许您创建可存储在本地设置或漫游设置中的复合设置。复合值类允许您将名称/值对作为应用数据存储在应用数据存储中。假设您想将书籍信息存储为：\n\
    \n```\nbook[\"ISBN\"] = 12345;\nbook[\"BookTitle\"] = \"Windows 10 开发\";\n```\n\
    \n要存储复合信息，您可以使用如下代码：\n\n```javascript\nvar applicationData = Windows.Storage.ApplicationData.current;\n\
    var localSettings = applicationData.localSettings;\n// 创建一个 BookInfo 复合设置\nvar\
    \ bookInfo = new Windows.Storage.ApplicationDataCompositeValue();\nbookInfo[\"\
    ISBN\"] = 12345;\nbookInfo[\"Title\"] = \"Windows 10 开发\";\nlocalSettings.values[\"\
    AppLocalSettings\"] = bookInfo;\n```\n\n要从复合设置中读取数据，您可以使用如下代码：\n\n```javascript\n\
    var bookInfo = localSettings.values[\"AppLocalSettings\"];\nif (bookInfo) {\n\
    \    var ISBN = bookInfo[\"ISBN\"];\n    var Title = bookInfo[\"Title\"];\n}\n\
    ```\n\n## 9.4 如何创建漫游应用数据存储容器\n\n### 问题\n\n您需要在 Windows 10 应用的应用数据存储中创建一个漫游应用数据存储容器。\n\
    \n### 解决方案\n\n使用 `roamingSettings.createContainer` 在应用数据存储中创建漫游应用设置容器。\n"
- fmt: "### How It Works\n\nIt’s very similar to what you saw in the local settings\
    \ in the app data store, but instead of using `Windows.Storage.ApplicationData.current.LocalSettings`,\
    \ you use `Windows.Storage.ApplicationData.current.roamingSettings`.\n\nCreate\
    \ a new project using the Windows Universal (Blank App) template in Microsoft\
    \ Visual Studio 2015. Open the `default.html` page from the project in Visual\
    \ Studio Solution Explorer. Add the following HTML markup within the body tag\
    \ of `default.html`:\n\n```\n<body class=\"win-type-body\" style=\"background-color:goldenrod\"\
    >\n<div id=\"titleBarContent\" style=\"width: 100%;height:30px; background:border-box\
    \ darkblue; overflow: hidden; z-index: 3\">\n    <i>User Preferences Settings\
    \ Screen (These settings will be available across devices)</i>\n</div>\n<br />\n\
    <input type=\"button\" value=\"Save User Preference\" id=\"btnUserPreferenceRoamingData\"\
    \ />\n<br />\n<span id=\"spantoDisplayRoamingData\" style=\"color:white\"></span>\n\
    </body>\n```\n\nRight-click the project’s `js` folder in the Solution Explorer\
    \ and select Add ➤ New JavaScript file. Provide the name for the file. In this\
    \ example, let’s name the file `DatastorageDemo.js`.\n\n```\n(function () {\n\
    \    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var submitbutton = document.getElementById(\"btnUserPreferenceRoamingData\"\
    );\n            submitbutton.addEventListener(\"click\", btnCreateRoamingContainerClick,\
    \ false);\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , GetControl);\n})();\n```\n\nNow, add an event method or function using the following\
    \ code snippet in the `Datastoragedemo.js` file:\n\n```\nfunction btnCreateRoamingContainerClick(mouseEvent)\
    \ {\n    var ApplicationData = Windows.Storage.ApplicationData.current;\n    var\
    \ roamingSettings = ApplicationData.roamingSettings;\n    // Creating a local\
    \ settings container\n    if (!roamingSettings.containers.hasKey(\"UserPreference_RoamingProfile\"\
    )) {\n        var roamingSettingscontainer = roamingSettings.createContainer(\"\
    UserPreference_RoamingProfile\", Windows.Storage.ApplicationDataCreateDisposition.Always);\n\
    \        document.getElementById(\"spantoDisplayRoamingData\").innerText = roamingSettingscontainer.name\
    \ + \" User Preference Roaming App Data Container Created!!\";\n    }\n}\n```\n\
    \nThis code declares a variable named `ApplicationData`. It is assigned the `Windows.Storage.ApplicationData.current`,\
    \ which denotes a container for app settings in the app data store. The next line\
    \ then retrieves the `roamingSettings` from the `ApplicationData` and stores it\
    \ in the `roamingSettings` variable.\n\nIt then calls the `roamingSettings.containers.hasKey`\
    \ function to check if the container exists. If it doesn’t exist, then it uses\
    \ `createContainer` method to create a settings container. The preceding example\
    \ creates a settings container, `App_GreetingDataRoamingContainer`, and stores\
    \ it in the `roamingSettingscontainer`. The `createContainer` method takes two\
    \ parameters: the name of the settings container and `Windows.Storage.ApplicationDataCreateDisposition.Always`,\
    \ which directs that it always check if a container exists or not; if it exists,\
    \ return the specified container; else, create a new one.\n\nWhen you run the\
    \ application on a Windows 10 emulator or Windows Mobile, it should look like\
    \ what’s shown in Figure [9-3](#A978-1-4842-0719-2_9_Chapter.html#Fig3).\n\n![A978-1-4842-0719-2_9_Fig3_HTML.jpg](A978-1-4842-0719-2_9_Fig3_HTML.jpg)\n\
    \n**Figure 9-3.** The form to save user preference settings using roaming app\
    \ data settings\n\nGreat. In the preceding code snippet, you learned both the\
    \ `createContainer` and `deleteContainer` methods of the `roamingSettings` object.\n\
    \n## 9.5 How to Create and Read Roaming App Data Settings\n\n### Problem\n\nYou\
    \ need to create and read roaming app data settings in the roaming app data settings\
    \ container in the app data store in your Windows 10 app.\n\n### Solution\n\n\
    Use `ApplicationDataContainer.values` to create roaming app data settings in the\
    \ app data settings container in the app data store in your Windows 10 app."
