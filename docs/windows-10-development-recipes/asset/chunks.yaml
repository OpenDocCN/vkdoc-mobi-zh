    \ Windows 桌面设备系列应用。当您在 Windows Mobile 模拟器上运行时，状态将显示为“已禁用”。\n\n## 12.4 使用 HTML5\
    \ 检测位置更新\n\n### 问题\n\n您希望频繁检查应用中的位置是否有任何变化。\n\n### 解决方案\n\n您可以在 HTML5 中使用 W3C\
    \ 地理定位 API 来检测 Windows 应用中的位置变化。\n"
- fmt: "### How It Works\n\nCreate a new Universal Windows project using the Universal\
    \ Windows template, which can be found under JavaScript ➤ Windows ➤ Universal\
    \ node of the New Project dialog in Microsoft Visual Studio 2015. This creates\
    \ a single project in the Visual Studio Solution with the necessary files in it\
    \ to start with.\n\nThe first step to integrate the location functionality in\
    \ the app is to declare the Location capability in the `package.appxmanifest`\
    \ file of the Windows app. From Visual Studio Solution Explorer, double-click\
    \ the `package.appxmanifest` file. In the GUI designer, click the Capabilities\
    \ tab and check Location.\n\nOpen the `default.html` file of the Windows app and\
    \ add the following code under the body tag of the file:\n```\n<h1>Current Location\
    \ using HTML5</h1>\n<button id=\"btnstart\">Start</button> <button id=\"btnstop\"\
    >Stop</button> <br />\n<label>Latitude</label> <div id=\"latitude\"></div><br\
    \ />\n<label>Longitude</label> <div id=\"longitude\"> </div><br />\n<div id=\"\
    status\"> </div><br />\n```\n\nOpen `default.js` (`/js/default.js`) in the Windows\
    \ project and replace the code in the file with the following:\n```\n(function\
    \ () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var activation\
    \ = Windows.ApplicationModel.Activation;\n    app.onactivated = function (args)\
    \ {\n        if (args.detail.kind === activation.ActivationKind.launch) {\n  \
    \          if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                done(function () {\n                    document.querySelector(\"\
    #btnstart\").addEventListener(\"click\",\n                        starttracking);\n\
    \                    document.querySelector(\"#btnstop\").addEventListener(\"\
    click\",\n                        stoptracking);\n                }));\n     \
    \   }\n    };\n    var geolocation = null;\n    var positionInstance;\n    //\
    \ on click of the start tracking\n    function starttracking() {\n        if (geolocation\
    \ == null) {\n            geolocation = window.navigator.geolocation;\n      \
    \  }\n        if (geolocation != null) {\n            positionInstance = geolocation.watchPosition(onsuccess,\
    \ onerror);\n        }\n    }\n    // on click of the stop tracking button\n \
    \   function stoptracking() {\n        geolocation.clearWatch(positionInstance);\n\
    \    }\n    // on success of getting the location\n    function onsuccess(pos)\
    \ {\n        document.getElementById('latitude').innerHTML = pos.coords.latitude;\n\
    \        document.getElementById('longitude').innerHTML = pos.coords.longitude;\n\
    \    }\n    // On error when trying to get the location\n    function Onerror(error)\
    \ {\n        var errorMessage = \"\";\n        switch (error.code) {\n       \
    \     case error.PERMISSION_DENIED:\n                errorMessage = \"Location\
    \ is disabled\";\n                break;\n            case error.POSITION_UNAVAILABLE:\n\
    \                errorMessage = \"Data unavailable\";\n                break;\n\
    \            case error.TIMEOUT:\n                errorMessage = \"Timeout error\"\
    ;\n                break;\n            default:\n                break;\n    \
    \    }\n        document.getElementById(\"status\").innerHTML = errorMessage;\n\
    \    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n})();\n\
    ```\n\nAdd the click event handler for the Start Tracking and Stop Tracking buttons.\
    \ The `document.querySelector` is used to get the button control and the `addEventListener`\
    \ method is used to add the click event to the tracking buttons. The tracking\
    \ is handled by the `watchPosition` method of the `window.navigator.geolocation`\
    \ class, as follows:\n```\nif (geolocation == null) {\n    geolocation = window.navigator.geolocation;\n\
    }\nif (geolocation != null) {\n    positionInstance = geolocation.watchPosition(onsuccess,\
    \ onerror);\n}\n```\nWhen the coordinates are retrieved, the `Onsuccess` method\
    \ is invoked, which is used to process the result and display it. When there is\
    \ any issue getting the location, the `Onerror` method is invoked with the appropriate\
    \ error code, which can be used by the developer to display a user-friendly message\
    \ for each error code. To stop the track, the `clearWatch` method of the geolocation\
    \ needs to be called by providing the `watchid` parameter that was retrieved initially\
    \ with the `watchPosition` function.\n```\ngeolocation.clearWatch(positionInstance);\n\
    ```\n\nBuild and run the project on the local machine.\n\nIn the app, click the\
    \ Start button. The app immediately prompts the user to allow the app to use the\
    \ location API. Once you click Allow, you should immediately see the latitude\
    \ and the longitude of the current location, and the tracking of the location\
    \ begins, as shown in Figure [12-8](#A978-1-4842-0719-2_12_Chapter.html#Fig8).\n\
    \n![A978-1-4842-0719-2_12_Fig8_HTML.jpg](A978-1-4842-0719-2_12_Fig8_HTML.jpg)\n\
    \n**Figure 12-8.** Detect location updates in Windows Store app using HTML5\n\n\
    > **Note**\n> The W3C Geolocation API currently works only for the Windows desktop\
    \ device family. It is not supported on Windows 10 Mobile.\n\n## 12.5 Display\
    \ Maps in the Built-in Maps App\n\n### Problem\n\nYou want to display a map and\
    \ plot the location in the built-in Maps app.\n\n### Solution\n\nUse the `bingmaps`\
    \ `:` URI scheme from your Universal Windows app to display the map in the built-in\
    \ Maps app."
