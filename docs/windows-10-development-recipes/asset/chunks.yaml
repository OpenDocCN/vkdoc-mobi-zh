  raw: 'To generate ApplicationID and AdUnitId in your production apps, follow these
    steps: Start the store submission process in the Windows Dev Center.   Make sure
    that you set the App Category in the App Properties section.   Next, select Monetization
    ➤ Monetize with ads from the options in the section on the left of the page.  
    On the Monetize with ads page, under the Microsoft Advertising ad units section,
    click Show Options.   Enter a name for your ad unit. Select the Ad unit type and
    the device family where the ad will be shown. Click the Create ad unit button.
      Now you have created an ad unit. Copy the application id and ad unit id and
    paste into the ad control in your app.   Regenerate the package and use the new
    package in your submission process.    Index A Accelerometer tool Adaptive tiles
