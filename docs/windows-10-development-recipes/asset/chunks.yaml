    # 第 4 章：列表控件、应用栏和工具栏


    本章重点介绍与数据集合相关的控件，包括 `Repeater`、`FlipView` 和 `ListView`。本章还涵盖了与菜单相关控件的方案，例如 `AppBar`、`ToolBar`、`Flyouts`、`ContextMenu`
    和 `MenuFlyouts`。


    ## 4.1 使用 Repeater 控件


    ### 问题


    您需要使用 WinJS `Repeater` 控件在用户界面 (UI) 上显示数据集合。


    ### 解决方案


    `Repeater` 控件是 WinJS 库中可用于在 UI 上显示数据集合的控件之一。您可以通过将容器的 `data-win-control` 属性设置为
    `WinJS.UI.Repeater` 值来添加 `Repeater` 控件，然后使用 `data-win-bind` 属性将属性绑定到 UI 中的控件。

    '
- fmt: "### How It Works\n\nTo demonstrate the use of the `Repeater` control, let's\
    \ build a Universal Windows app that displays an HTML table of the employees list,\
    \ as shown in Figure [4-1](#A978-1-4842-0719-2_4_Chapter.html#Fig1).\n\n![A978-1-4842-0719-2_4_Fig1_HTML.jpg](A978-1-4842-0719-2_4_Fig1_HTML.jpg)\n\
    \n*Figure 4-1. HTML table with a Repeater control*\n\nLaunch Visual Studio 2015\
    \ and create a new Windows Universal project using the JavaScript template.\n\n\
    Open the `default.html` page and replace it with the following code snippet.\n\
    \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n \
    \   <title>Recipe4.1</title>\n    <!-- WinJS references -->\n    <link href=\"\
    WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"\
    ></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
    \ src=\"/js/data.js\"></script>\n</head>\n<body style=\"margin:20px\">\n    <h1>Recipe\
    \ 4.1</h1>\n    <table>\n        <thead>\n            <tr>\n                <th>\
    \ Employee ID</th>\n                <th> Employee Name</th>\n                <th>\
    \ Employee Designation</th>\n            </tr>\n        </thead>\n        <tbody\
    \ id=\"repeaterData\" data-win-control=\"WinJS.UI.Repeater\">\n            <tr>\n\
    \                <td data-win-bind=\"textContent:id\"></td>\n                <td\
    \ data-win-bind=\"textContent:name\"></td>\n                <td data-win-bind=\"\
    textContent:designation\"></td>\n            </tr>\n        </tbody>\n    </table>\n\
    </body>\n</html>\n```\n\nIn the preceding code snippet, the `Repeater` control\
    \ is added to the body section; whereas the inner content of the `Repeater` control\
    \ is used as the template. Each row from the repeater data is displayed in the\
    \ body section of the HTML table.\n\nThe preceding HTML page has a reference to\
    \ a `data.js` page. Let's add this file to the project. Add a new JavaScript file\
    \ to the project's `js` folder and name it `data.js`. The following code snippet\
    \ contains the JavaScript code for setting the data source of the `Repeater` control.\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    function Initialize()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var repeaterControl1\
    \ = document.getElementById('repeaterData').winControl;\n            var Employees\
    \ = new WinJS.Binding.List([\n                { id: 1, name: \"Senthil Kumar\"\
    , designation: \"Mobile Developer\" },\n                { id: 2, name: \"Lohith\
    \ GN\", designation: \"Web Developer\" },\n                { id: 3, name: \"Vidyasagar\"\
    , designation: \"Game Developer\" }\n            ]);\n            repeaterControl1.data\
    \ = Employees;\n        })\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , Initialize);\n})();\n```\n\n`WinJS.Binding.List` is used to bind the `Repeater`\
    \ control. In the preceding code snippet, the `Repeater` control is bound to the\
    \ employees list, which represents a collection of employee data. The employee\
    \ object contains the following properties: `id`, `name`, and `designation`. The\
    \ data is bound using the `data` property of the `Repeater` control.\n\nRun the\
    \ application on a Windows Mobile emulator. You should see the screen shown in\
    \ Figure [4-2](#A978-1-4842-0719-2_4_Chapter.html#Fig2).\n\n![A978-1-4842-0719-2_4_Fig2_HTML.jpg](A978-1-4842-0719-2_4_Fig2_HTML.jpg)\n\
    \n*Figure 4-2. Repeater control in Windows Mobile 10*\n\nIf you want the items\
    \ in the `Repeater` control to be invokable or selectable, one of the choices\
    \ is to use `ItemContainer` control within the `Repeater` control template.\n\n\
    The following sample demonstrates the usage of the `ItemContainer` inside the\
    \ `Repeater` control, which is bound to the list of employees.\n\n```html\n<div\
    \ id=\"repeaterData\" data-win-control=\"WinJS.UI.Repeater\">\n        <div data-win-control=\"\
    WinJS.UI.ItemContainer\" data-win-bind=\"dataset.name:name\">\n             <div\
    \ data-win-bind=\"textContent:name\"></div>\n        </div>\n</div>\n```\n\nThe\
    \ `ItemContainer` has a property called the `data-win-bind=\"dataset.name: name\"\
    ` attribute, which associates the name of the each item in the employee list with\
    \ the `ItemContainer`.\n\nThe `Repeater` control is bound to the list of employees\
    \ in the JavaScript file, as shown next.\n\n```javascript\n(function () {\n  \
    \  \"use strict\";\n    function Initialize() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var repeaterControl1 = document.getElementById('repeaterData').winControl;\n\
    \            var Employees = new WinJS.Binding.List([\n                { id: 1,\
    \ name: \"Senthil Kumar\", designation: \"Mobile Developer\" },\n            \
    \    { id: 2, name: \"Lohith GN\", designation: \"Web Developer\" },\n       \
    \         { id: 3, name: \"Vidyasagar\", designation: \"Game Developer\" }\n \
    \           ]);\n            repeaterControl1.data = Employees;\n            repeaterControl1.addEventListener(\"\
    invoked\",function(e)\n            {\n                var name = e.target.dataset.name;\n\
    \                var message = new Windows.UI.Popups.MessageDialog(name);\n  \
    \              message.showAsync();\n            })\n        })\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", Initialize);\n})();\n```\n\nWhen you run the application in\
    \ Windows, you see the three items being rendered. If you click an item, a message\
    \ box is displayed with the name of the item, as shown in Figure [4-3](#A978-1-4842-0719-2_4_Chapter.html#Fig3).\n\
    \n![A978-1-4842-0719-2_4_Fig3_HTML.jpg](A978-1-4842-0719-2_4_Fig3_HTML.jpg)\n\n\
    *Figure 4-3. Item in the Repeater control that is invokable*\n\n## 4.2 Using the\
    \ FlipView Control\n\n### Problem\n\nYou need to display only a single item from\
    \ a collection.\n\n### Solution\n\nUse the `FlipView` control in WinJS, which\
    \ displays only a single item from the collection at a time. A use case of the\
    \ `FlipView` control is a photo gallery app, where a user can select an image\
    \ and then swipe through the list of images.\n\nAlthough only one item is displayed\
    \ at a time, the `FlipView` control displays arrows, which lets you to move to\
    \ the next or the previous item in the data source.\n\nYou can add the `ListView`\
    \ control to the page by setting the `data-win-control` attribute of the `div`\
    \ element with the `WinJS.UI.ListView` value."
  raw: '### How It Works


    To demonstrate the use of the Repeater control, let’s build a Universal Windows
    app that displays an HTML table of the employees list, as shown in Figure [4-1](#A978-1-4842-0719-2_4_Chapter.html#Fig1).


