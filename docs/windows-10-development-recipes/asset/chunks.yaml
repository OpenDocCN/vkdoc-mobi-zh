    the following:


    *   `Id`: This uniquely identifies the AppBarCommand.

    *   `label`: The content displayed in the AppBarCommand.

    *   `icon`: The built-in icons for the AppBarCommand.

    *   `section`: The section within the AppBar where the command should be displayed.
    This value can be primary or secondary.

    *   `tooltip`: The text to be displayed when you mouse-over the command button.


    Note that the page contains the reference to the `appbarevents.js` JavaScript
    file. This contains the logic to handle the events on the AppBarCommands. Let’s
    create a new JavaScript file in the project under the `js` folder and name it
    as appbarevents.js. Add the following code to it.


    `(function () {`


        `"use strict";`


        `WinJS.UI.Pages.define("default.html", {`


            `ready: function (element, options) {`


                `element.querySelector("#cmdAdd").addEventListener("click", AddMethod,
    false);`


                 `element.querySelector("#cmdRemove").addEventListener("click", RemoveMethod,
    false);`


                 `element.querySelector("#cmdCamera").addEventListener("click", CameraMethod,
    false);`


            `}`


        `});`


        `// Command button functions`


        `function AddMethod() {`


            `var message = new Windows.UI.Popups.MessageDialog("Add Button Pressed");`


            `message.showAsync();`


        `}`


        `function RemoveMethod() {`


            `var message = new Windows.UI.Popups.MessageDialog("Remove button pressed");`


            `message.showAsync();`


        `}`


        `function CameraMethod() {`


            `var message = new Windows.UI.Popups.MessageDialog("Camera button pressed");`


            `message.showAsync();`


        `}`


    `})();`


    The preceding JavaScript code handles the click event of the AppBarCommand buttons.
    On click of the button, it displays a message.


    Run the app on Windows. You should see the screen shown in Figure [4-11](#A978-1-4842-0719-2_4_Chapter.html#Fig11).


    ![A978-1-4842-0719-2_4_Fig11_HTML.jpg](A978-1-4842-0719-2_4_Fig11_HTML.jpg)


    Figure 4-11.


    Windows app with the AppBar


    Click the ellipsis button in the app bar, which displays the secondary section,
    as shown in Figure [4-12](#A978-1-4842-0719-2_4_Chapter.html#Fig12).


    ![A978-1-4842-0719-2_4_Fig12_HTML.jpg](A978-1-4842-0719-2_4_Fig12_HTML.jpg)


    Figure 4-12.


    Windows app with the AppBar and secondary section


    When you click the menu button, it displays an appropriate message.


    ## 4.8 Using the ToolBar Control


    ### Problem


    You need to display a set of commands that can appear in any location; for example,
    flyouts or an app bar at the top of the screen.


    ### Solution


    You can use the ToolBar control to display as many commands as possible in the
    action area. This control is not constrained to a single location within the app.
    It can be found in the splitView, Flyouts, and so forth.'
