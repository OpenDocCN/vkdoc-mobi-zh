    \ 页面中添加对 `controldemo.js` 文件的引用。从 Visual Studio 解决方案资源管理器中打开 `default.html` 页面，并将以下代码添加到\
    \ head 标签中。\n\n```\n<script src=\"/js/controldemo.js\"></script>\n```\n\n当您在 Windows\
    \ Mobile 模拟器上运行该应用程序时，应该会看到如图 3-6 所示的界面。\n\n![A978-1-4842-0719-2_3_Fig6_HTML.jpg](img/A978-1-4842-0719-2_3_Fig6_HTML.jpg)\n\
    \n**图 3-6.** 显示值为 2 的 Rating 控件的 Windows Mobile 模拟器\n\n## 3.5 ToggleSwitch 控件\n\
    \n### 问题\n\n您需要为用户提供一个选项，使其能够在屏幕上执行二元操作。例如，您需要为用户提供一个开启或关闭服务的选项。\n\n### 解决方案\n\
    \n使用 WinJS 中的 ToggleSwitch 控件。它类似于标准的复选框控件，但拥有更好的触摸支持。您只需在 ToggleSwitch 控件上滑动手指，即可选中或取消选中该选项。您可以在页面上使用\
    \ `WinJS.UI.ToggleSwitch` 值作为 `div` 元素的 `data-win-control` 属性来声明 ToggleSwitch\
    \ 控件。\n\n### 工作原理\n\n以下展示了如何在页面上声明 ToggleSwitch 控件。\n\n```\n<div id=\"locationServices\"\
    \ data-win-control=\"WinJS.UI.ToggleSwitch\"\n         data-win-options=\"{\n\
    \         title :'Location Services',\n         labelOff: 'Disabled',\n      \
    \   labelOn:'Enabled',\n         checked: true\n         }\">\n</div>\n```\n\n\
    在 Windows 平板电脑或 Windows Mobile 模拟器上执行时，上述代码片段将显示如图 3-7 所示。\n\n![A978-1-4842-0719-2_3_Fig7_HTML.jpg](img/A978-1-4842-0719-2_3_Fig7_HTML.jpg)\n\
    \n**图 3-7.** Windows Mobile 和 Windows 模拟器上的 ToggleSwitch\n\n`data-win-options`\
    \ 属性用于为 ToggleSwitch 控件设置附加属性。在上述示例中，使用了此属性来设置 `title`、`labelOff`、`labelOn` 和\
    \ `checked` 等属性。\n\n`title` 设置 ToggleSwitch 的标题内容。`labelOff` 和 `labelOn` 属性根据控件的选中（On）和未选中（Off）状态，标识需要在\
    \ ToggleSwitch 旁边显示的文本。\n\nToggleSwitch 的当前状态（选中或未选中）可以通过控件的 `checked` 属性获知。\n\
    \n让我们在项目的 `js` 文件夹中添加一个新的 JavaScript 文件，并将其命名为 `controldemo.js`。打开 `default.html`\
    \ 页面，添加 ToggleSwitch 控件以及一个用于在开关状态改变时显示消息的空 `div` 标签。\n\n`default.html` 页面如下所示。\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.5</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe3.5 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    \    <script src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <div id=\"locationServices\" data-win-control=\"WinJS.UI.ToggleSwitch\"\
    \n         data-win-options=\"{\n         title :'Location Services',\n      \
    \   labelOff: 'Disabled',\n         labelOn:'Enabled',\n         checked: true\n\
    \         }\">\n    </div>\n    <div id=\"info\"></div>\n</body>\n</html>\n```\n\
    \n为了能从 JavaScript 代码中识别出状态，您需要连接 ToggleSwitch 控件的 `change` 事件处理程序。当您更改控件的状态时，会触发此事件。\n\
    \n打开 `controldemo.js` 文件，并将其替换为以下代码。\n\n```\n(function () {\n    \"use strict\"\
    ;\n    function GetControl() {\n        WinJS.UI.processAll().done(function ()\
    \ {\n            var toggleButton = document.getElementById(\"locationServices\"\
    ).winControl;\n            var InfoElement = document.getElementById(\"info\"\
    );\n            toggleButton.addEventListener('change', function (args) {\n  \
    \              if (toggleButton.checked) {\n                    InfoElement.innerHTML\
    \ = \"Location Services enabled\";\n                }\n                else {\n\
    \                    InfoElement.innerHTML = \"Location Services disabled\";\n\
    \                }\n            })\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\n当您在 Windows 10 模拟器和 Windows Mobile\
    \ 模拟器上运行该应用程序时，将看到如图 3-8 所示的界面。\n\n![A978-1-4842-0719-2_3_Fig8_HTML.jpg](img/A978-1-4842-0719-2_3_Fig8_HTML.jpg)\n\
    \n**图 3-8.** 带有 change 事件的 ToggleSwitch。\n\n当您切换控件时，相应的消息会显示在 `info` `div` 元素中。\n\
    \n## 3.6 DatePicker 控件\n\n### 问题\n\n您希望允许用户从应用程序页面中选择一个日期。\n\n### 解决方案\n\n使用 WinJS\
    \ DatePicker 控件，该控件允许用户选取日期。此控件显示三个列表：分别用于月份、日期和年份。\n"
- fmt: "### How It Works\n\nYou can declare the `DatePicker` control on the page,\
    \ like this.\n\n```\n<div id=\"Birthday\" data-win-control=\"WinJS.UI.DatePicker\"\
    \ ></div>\n```\n\nIn this recipe, let’s try to add the `DatePicker` control on\
    \ the page and bind the event in the JavaScript code to display the selected date\
    \ in a `div` element.\n\nCreate a new project using the Windows Universal App\
    \ template in Visual Studio 2015. Open the `default.html` page and replace it\
    \ with the following.\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"\
    utf-8\" />\n    <title>Recipe3.6</title>\n    <!-- WinJS references -->\n    <link\
    \ href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"\
    ></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n    <!-- Recipe3.6 references\
    \ -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\" />\n    <script\
    \ src=\"/js/default.js\"></script>\n    <script src=\"/js/controldemo.js\"></script>\n\
    </head>\n<body class=\"win-type-body\">\n    <div id=\"Birthday\" data-win-control=\"\
    WinJS.UI.DatePicker\">\n    </div>\n    <div id=\"info\"></div>\n</body>\n</html>\n\
    ```\n\nThe `default.html` page contains the `DatePicker` control as well as the\
    \ `div` tag with the name information to display the selected date. The `controldemo.js`\
    \ file is referenced, which you create next.\n\nAdd a new JavaScript file to the\
    \ project’s js folder from Visual Studio Solution Explorer and name it `controldemo.js`.\
    \ Add the following JavaScript code to the `controldemo.js` file.\n\n```\n(function\
    \ () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var datepick = document.getElementById(\"Birthday\").winControl;\n\
    \            var InfoEelement = document.getElementById(\"info\");\n         \
    \   datepick.addEventListener('change', function (args) {\n                InfoEelement.innerHTML\
    \ = \"The selected date is \" +\n                    datepick.current.toDateString();\n\
    \            })\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , GetControl);\n})();\n```\n\nThe `DatePicker` raises the `change` event as soon\
    \ as you change the date, or month, or year. You can get the current selected\
    \ date by handling this event.\n\nThe `winControl` property of the `document.getElementById`\
    \ is used to get the `DatePicker` from the HTML page in the JavaScript code. The\
    \ `addEventListener` method is invoked from the `DatePicker` control to subscribe\
    \ to the `change` event.\n\nThe selected date is retrieved using the `current`\
    \ property of the `DatePicker`.\n\nRunning the application on Windows Mobile or\
    \ Windows 10 displays the `DatePicker` and shows the selected date, as demonstrated\
    \ in Figure [3-9](#A978-1-4842-0719-2_3_Chapter.html#Fig9).\n\n![A978-1-4842-0719-2_3_Fig9_HTML.jpg](A978-1-4842-0719-2_3_Fig9_HTML.jpg)\n\
    \nFigure 3-9. DatePicker control demo\n\nYou can control the appearance of the\
    \ year, month, and date fields of the `DatePicker` control by assigning the format\
    \ strings.\n\nFor example, the `DatePicker` can be formatted to display the abbreviated\
    \ month and year, and the date, with a two-digit format, as shown here.\n\n```\n\
    <div id=\"Birthday\" data-win-control=\"WinJS.UI.DatePicker\"\n     data-win-options=\"\
    {\n        monthPattern : '{month.abbreviated}',\n        datePattern: '{day.integer(2)}',\n\
    \        yearPattern: '{year.abbreviated}'\n     }\">\n</div>\n```\n\nThe format\
    \ is set using the `monthPattern`, `datePattern`, and `yearPattern` properties.\n\
    \nThe `monthPattern` property defines the display pattern for the month. You can\
    \ set the month pattern property with one of the values shown in Table [3-1](#A978-1-4842-0719-2_3_Chapter.html#Tab1).\n\
    \nTable 3-1. Month Pattern for the date picker\n\n| Pattern | Description |\n\
    | --- | --- |\n| month.full | This displays the full name of the month. |\n| month.abbreviated(n)\
    \ | You can use the `month.abbreviated` with or without parameters. The parameter\
    \ specifies the number of letters for the month. |\n| month.solo.full | This represents\
    \ the month that is suitable for the stand-alone display. And, `month.solo.abbreviated`\
    \ can be used with or without parameters. |\n| month.integer(n) | The `month.integer`\
    \ is used to specify the number of integers displayed in the month field. |\n\n\
    The `datePattern` property is used to get or set the display pattern for the date\
    \ in the `DatePicker` control. You can set the `datePattern` with one of the values\
    \ shown in Table [3-2](#A978-1-4842-0719-2_3_Chapter.html#Tab2).\n\nTable 3-2.\
    \ Date Pattern for the date picker\n\n| Pattern | Description |\n| --- | --- |\n\
    | day.integer(n) | You can use the `day.integer` with or without parameters. The\
    \ parameter specifies the leading zeroes to be included; for example, 02 is displayed\
    \ if the value is `day.integer (2)`. |\n| dayofweek.abbreviated | This property\
    \ displays the day of the week. The parameter specifies the number of letters\
    \ to be displayed. |\n\nThe `yearPattern` property gets or sets the display pattern\
    \ for the year. The default year pattern is `year.full`. You can modify this to\
    \ either of the values shown in Table [3-3](#A978-1-4842-0719-2_3_Chapter.html#Tab3).\n\
    \nTable 3-3. Year pattern for the date picker\n\n| Pattern | Description |\n|\
    \ --- | --- |\n| year.full | Displays the full year in digits |\n| year.abbreviated(n)\
    \ | Displays the year with the specified set of digits. |\n\n## 3.7 The TimePicker\
    \ Control\n\n### Problem\n\nYou want to allow the user to select a time from the\
    \ application page.\n\n### Solution\n\nUse the WinJS `TimePicker` control that\
    \ allows the user to pick a time. This control displays three lists: one each\
    \ for hour, minute, and period (AM/PM)."
  raw: '### How It Works


    You can declare the DatePicker control on the page, like this.


    `<div id="Birthday" data-win-control="WinJS.UI.DatePicker" >`


    `</div>`


    In this recipe, let’s try to add the DatePicker control on the page and bind the
    event in the JavaScript code to display the selected date in a `div` element.


    Create a new project using the Windows Universal App template in Visual Studio
    2015.   Open the `default.html` page and replace it with the following. `<!DOCTYPE
    html>` `<html>` `<head>`     `<meta charset="utf-8" />`     `<title>Recipe3.6</title>`
        `<!-- WinJS references -->`     `<link href="WinJS/css/ui-light.css" rel="stylesheet"
    />`     `<script src="WinJS/js/base.js"></script>`     `<script src="WinJS/js/ui.js"></script>`
        `<!-- Recipe3.6 references -->`     `<link href="/css/default.css" rel="stylesheet"
    />`     `<script src="/js/default.js"></script>`     `<script src="/js/controldemo.js"></script>`
    `</head>` `<body class="win-type-body">`     `<div id="Birthday" data-win-control="WinJS.UI.DatePicker">`
        `</div>`     `<div id="info"></div>` `</body>` `</html>` The `default.html`
    page contains the DatePicker control as well as the `div` tag with the name information
    to display the selected date. The `controldemo.js` file is referenced, which you
    create next.   Add a new JavaScript file to the project’s js folder from Visual
    Studio Solution Explorer and name it controldemo.js. Add the following JavaScript
    code to the `controldemo.js` file. `(function () {`     `"use strict";`     `function
    GetControl() {`         `WinJS.UI.processAll().done(function () {`             `var
    datepick = document.getElementById("Birthday").winControl;`             `var InfoEelement
    = document.getElementById("info");`             `datepick.addEventListener(''change'',
    function (args) {`                 `InfoEelement.innerHTML = "The selected date
    is " +`                     `datepick.current.toDateString();`             `})`
            `});`     `}`     `document.addEventListener("DOMContentLoaded", GetControl);`
    `})();`  


    The DatePicker raises the change event as soon as you change the date, or month,
    or year. You can get the current selected date by handling this event.


    The `winControl` property of the `document.getElementById` is used to get the
    DatePicker from the HTML page in the JavaScript code. The `addEventListener` method
    is invoked from the DatePicker control to subscribe to the change event.


    The selected date is retrieved using the current property of the DatePicker.


    Running the application on Windows Mobile or Windows 10 displays the DatePicker
    and shows the selected date, as demonstrated in Figure [3-9](#A978-1-4842-0719-2_3_Chapter.html#Fig9).


    ![A978-1-4842-0719-2_3_Fig9_HTML.jpg](A978-1-4842-0719-2_3_Fig9_HTML.jpg)


    Figure 3-9.


    DatePicker control demo


    You can control the appearance of the year, month, and date fields of the DatePicker
    control by assigning the format strings.


    For example, the DatePicker can be formatted to display the abbreviated month
    and year, and the date, with a two-digit format, as shown here.


        `<div id="Birthday" data-win-control="WinJS.UI.DatePicker"`


             `data-win-options="{`


             `monthPattern : ''{month.abbreviated}'',`


             `datePattern: ''{day.integer(2)}'',`


             `yearPattern: ''{year.abbreviated}''`


             `}">`


        `</div>`


    The format is set using the `monthPattern`, `datePattern`, and `yearPattern` properties.


    The `monthPattern` property defines the display pattern for the month. You can
    set the month pattern property with one of the values shown in Table [3-1](#A978-1-4842-0719-2_3_Chapter.html#Tab1).


    Table 3-1.


    Month Pattern for the date picker


    | Pattern | Description |

    | --- | --- |

    | month.full | This displays the full name of the month. |

    | month.abbreviated(n) | You can use the month.abbreviated with or without parameters.
    The parameter specifies the number of letters for the month. |

    | month.solo.full | This represents the month that is suitable for the stand-alone
    display. And, month.solo.abbreviated can be used with or without parameters. |

    | month.integer(n) | The month.integer is used to specify the number of integers
    displayed in the month field. |


    The `datePattern` property is used to get or set the display pattern for the date
    in the DatePicker control. You can set the `datePattern` with one of the values
    shown in Table [3-2](#A978-1-4842-0719-2_3_Chapter.html#Tab2).


    Table 3-2.


    Date Pattern for the date picker


    | Pattern | Description |

    | --- | --- |

    | day.integer(n) | You can use the day.integer with or without parameters. The
    parameter specifies the leading zeroes to be included; for example, 02 is displayed
    if the value is day.integer (2). |

    | dayofweek.abbreviated | This property displays the day of the week. The parameter
    specifies the number of letters to be displayed. |


    The `yearPattern` property gets or sets the display pattern for the year. The
    default year pattern is year.full. You can modify this to either of the values
    shown in Table [3-3](#A978-1-4842-0719-2_3_Chapter.html#Tab3).


    Table 3-3.


    Year pattern for the date picker


    | Pattern | Description |

    | --- | --- |

    | year.full | Displays the full year in digits |

    | year.abbreviated(n) | Displays the year with the specified set of digits. |


    ## 3.7 The TimePicker Control


    ### Problem


    You want to allow the user to select a time from the application page.


    ### Solution


    Use the WinJS TimePicker control that allows the user to pick a time. This control
    displays three lists: one each for hour, minute, and period (AM/PM).'
  trans: "\n### 工作原理\n\n你可以在页面上声明 `DatePicker` 控件，如下所示。\n\n```\n<div id=\"Birthday\"\
    \ data-win-control=\"WinJS.UI.DatePicker\" ></div>\n```\n\n在本教程中，我们将尝试在页面上添加 `DatePicker`\
    \ 控件，并在 JavaScript 代码中绑定事件，以在 `div` 元素中显示所选日期。\n\n使用 Visual Studio 2015 中的 Windows\
    \ 通用应用模板创建一个新项目。打开 `default.html` 页面，并将其替换为以下内容。\n\n```\n<!DOCTYPE html>\n<html>\n\
    <head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.6</title>\n    <!--\
    \ WinJS 引用 -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n\
    \    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- Recipe3.6 引用 -->\n    <link href=\"/css/default.css\" rel=\"\
    stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"\
    /js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\">\n    <div\
    \ id=\"Birthday\" data-win-control=\"WinJS.UI.DatePicker\">\n    </div>\n    <div\
    \ id=\"info\"></div>\n</body>\n</html>\n```\n\n`default.html` 页面包含 `DatePicker`\
    \ 控件以及用于显示所选日期的名称信息 `div` 标签。页面引用了接下来要创建的 `controldemo.js` 文件。\n\n在 Visual Studio\
    \ 解决方案资源管理器中，向项目的 js 文件夹添加一个新的 JavaScript 文件，并将其命名为 `controldemo.js`。将以下 JavaScript\
    \ 代码添加到 `controldemo.js` 文件中。\n\n```\n(function () {\n    \"use strict\";\n  \
    \  function GetControl() {\n        WinJS.UI.processAll().done(function () {\n\
    \            var datepick = document.getElementById(\"Birthday\").winControl;\n\
    \            var InfoEelement = document.getElementById(\"info\");\n         \
    \   datepick.addEventListener('change', function (args) {\n                InfoEelement.innerHTML\
    \ = \"所选日期是 \" +\n                    datepick.current.toDateString();\n     \
    \       })\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , GetControl);\n})();\n```\n\n当您更改日期、月份或年份时，`DatePicker` 会立即触发 `change` 事件。您可以通过处理此事件来获取当前选中的日期。\n\
    \n在 JavaScript 代码中，使用 `document.getElementById` 的 `winControl` 属性从 HTML 页面获取 `DatePicker`。然后，从\
    \ `DatePicker` 控件调用 `addEventListener` 方法来订阅 `change` 事件。\n\n选中的日期通过 `DatePicker`\
    \ 的 `current` 属性获取。\n\n在 Windows Mobile 或 Windows 10 上运行应用程序，将显示 `DatePicker`\
    \ 并展示选中的日期，如图 3-9 所示。\n\n![A978-1-4842-0719-2_3_Fig9_HTML.jpg](img/A978-1-4842-0719-2_3_Fig9_HTML.jpg)\n\
    \n图 3-9. DatePicker 控件演示\n\n您可以通过分配格式字符串来控制 `DatePicker` 控件的年、月、日字段的显示外观。\n\n\
    例如，可以将 `DatePicker` 格式化为显示缩写月份、年份以及两位数的日期，如下所示。\n\n```\n<div id=\"Birthday\" data-win-control=\"\
    WinJS.UI.DatePicker\"\n     data-win-options=\"{\n        monthPattern : '{month.abbreviated}',\n\
    \        datePattern: '{day.integer(2)}',\n        yearPattern: '{year.abbreviated}'\n\
    \     }\">\n</div>\n```\n\n格式通过 `monthPattern`、`datePattern` 和 `yearPattern` 属性设置。\n\
    \n`monthPattern` 属性定义月份的显示模式。您可以使用表 3-1 中所示的值之一来设置月份模式属性。\n\n表 3-1. 日期选择器的月份模式\n\
    \n| 模式 | 描述 |\n| --- | --- |\n| month.full | 显示月份的全名。 |\n| month.abbreviated(n)\
    \ | 您可以使用带或不带参数的 `month.abbreviated`。参数指定月份的字母数。 |\n| month.solo.full | 表示适合独立显示的月份。并且，`month.solo.abbreviated`\
    \ 可以带参数或不带参数使用。 |\n| month.integer(n) | `month.integer` 用于指定月份字段中显示的整数个数。 |\n\n\
    `datePattern` 属性用于获取或设置 `DatePicker` 控件中日期的显示模式。您可以使用表 3-2 中所示的值之一来设置 `datePattern`。\n\
    \n表 3-2. 日期选择器的日期模式\n\n| 模式 | 描述 |\n| --- | --- |\n| day.integer(n) | 您可以使用带或不带参数的\
    \ `day.integer`。参数指定要包含的前导零；例如，如果值为 `day.integer (2)`，则显示 02。 |\n| dayofweek.abbreviated\
    \ | 此属性显示星期几。参数指定要显示的字母数。 |\n\n`yearPattern` 属性获取或设置年份的显示模式。默认的年份模式是 `year.full`。您可以将其修改为表\
    \ 3-3 中所示的任一值。\n\n表 3-3. 日期选择器的年份模式\n\n| 模式 | 描述 |\n| --- | --- |\n| year.full\
    \ | 以数字形式显示完整年份 |\n| year.abbreviated(n) | 显示指定位数集合的年份。 |\n\n## 3.7 TimePicker\
    \ 控件\n\n### 问题\n\n您希望允许用户从应用程序页面中选择时间。\n\n### 解决方案\n\n使用 WinJS `TimePicker` 控件，该控件允许用户选择时间。此控件显示三个列表：分别对应小时、分钟和时段（上午/下午）。\n"
- fmt: "### How It Works\n\nYou can declare the `DatePicker` control on the page,\
    \ like this:\n\n```\n<div id=\"timeSelector\" data-win-control=\"WinJS.UI.TimePicker\"\
    ></div>\n```\n\nIn this recipe, let’s try to add the `TimePicker` control on the\
    \ page and bind the event in the JavaScript code to display the selected time\
    \ in a `div` element.\n\nCreate a new project using the Windows Universal App\
    \ template in Visual Studio 2015. Open the `default.html` page and replace it\
    \ with the following:\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"\
    utf-8\" />\n    <title>BasicControls</title>\n    <!-- WinJS references -->\n\
    \    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n    <script\
    \ src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n\
    \    <!-- Recipe3.7 references -->\n    <link href=\"/css/default.css\" rel=\"\
    stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"\
    /js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\">\n    <div\
    \ id=\"timeSelector\" data-win-control=\"WinJS.UI.TimePicker\"></div>\n    <div\
    \ id=\"info\"></div>\n</body>\n</html>\n```\n\nThe `default.html` page contains\
    \ the `TimePicker` control as well as the `div` tag with the name information\
    \ to display the selected time. The `controldemo.js` file is referenced, which\
    \ you will create in the next step.\n\nAdd a new JavaScript file to the project’s\
    \ `js` folder from the Visual Studio Solution Explorer and name it `controldemo.js`.\
    \ Replace the file with the following JavaScript code:\n\n```\n(function () {\n\
    \    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var datepick = document.getElementById(\"timeSelector\").winControl;\n\
    \            var InfoEelement = document.getElementById(\"info\");\n         \
    \   datepick.addEventListener('change', function (args) {\n                InfoEelement.innerHTML\
    \ = \"The selected time is \" +\n                    datepick.current.toTimeString();\n\
    \            })\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , GetControl);\n})();\n```\n\nThe `TimePicker` raises the `change` event as soon\
    \ as you change the hour, or minute, or period. You can get the current selected\
    \ time by handling this event.\n\nThe `winControl` property of `document.getElementById`\
    \ is used to get the `TimePicker` from the HTML page in the JavaScript code. The\
    \ `addEventListener` method is invoked from the `TimePicker` control to subscribe\
    \ to the `change` event.\n\nThe selected time is retrieved using the `current`\
    \ property of the `TimePicker` control.\n\nRunning the application on Windows\
    \ Mobile or Windows 10 displays the `TimePicker` and shows the selected time,\
    \ as demonstrated in Figure [3-10](#A978-1-4842-0719-2_3_Chapter.html#Fig10).\n\
    \n![A978-1-4842-0719-2_3_Fig10_HTML.jpg](A978-1-4842-0719-2_3_Fig10_HTML.jpg)\n\
    \nFigure 3-10.\n\nTimePicker control demo\n\nYou can set the `TimePicker` to support\
    \ a 24-hour clock format by setting the `clock` property using the `data-win-options`\
    \ attribute, as shown here:\n\n```\n<div id=\"timeSelector\" data-win-control=\"\
    WinJS.UI.TimePicker\"\n         data-win-options=\"{\n         clock : '24HourClock',\n\
    \         minuteIncrement : 15\n         }\">\n</div>\n```\n\nThe increment values\
    \ of the minute list can be controlled with the `minuteIncrement` property, as\
    \ shown next.\n\nWhen you run the page on Windows 10 or Windows Mobile 10, you\
    \ see the screen shown in Figure [3-11](#A978-1-4842-0719-2_3_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0719-2_3_Fig11_HTML.jpg](A978-1-4842-0719-2_3_Fig11_HTML.jpg)\n\
    \nFigure 3-11.\n\nTimePicker with the 24-hour clock format and timeInterval adjustment\n\
    \nYou can control the appearance of the hour, minute, and period fields of the\
    \ `TimePicker` control by assigning the format strings.\n\nThe format is set using\
    \ the `hourPattern`, `minutePattern`, and `periodPattern` properties.\n\nThe `hourPattern`\
    \ property gets or sets the display pattern for the hour. The default value of\
    \ the `hourPattern` property is `hour.integer(2)` and you can modify the `hourPattern`\
    \ property by changing the values of the parameters. The `minutePattern` property\
    \ gets or sets the display pattern for the minute. The default value of this property\
    \ is `minute.integer(2)` and you can modify this pattern by changing the number\
    \ of integers in the parameter. The `periodPattern` property gets or sets the\
    \ display pattern for the period; the default value of this property is `period.abbreviated(2)`.\
    \ You can modify the pattern for this property by changing the values of the parameters.\n\
    \nTable 3-4.\n\nPattern for hours, minutes and period in timepicker\n\n| Pattern\
    \ | Description |\n| --- | --- |\n| `hour.integer(n)` | This displays the specified\
    \ number of digits for hours. |\n| `minute.integer(n)` | This displays the specified\
    \ number of digits for minutes. |\n| `period.abbreviated(n)` | Display pattern\
    \ for the period based on the value passed as parameter. |\n\n## 3.8 The Tooltip\
    \ Control\n\n### Problem\n\nYou need to display a tooltip when the user hovers\
    \ over any element on the page.\n\n### Solution\n\nUse the WinJS `Tooltip` control\
    \ to display the tooltip over the HTML element on the page. When you hover over\
    \ an element, the tooltip appears for a specified number of seconds. The tooltip\
    \ should disappear when the user moves the cursor away from the element.\n\n###\
    \ How It Works\n\nYou add the `Tooltip` control for a button like this:\n\n```\n\
    <button id=\"btnSave\"\n            data-win-control=\"WinJS.UI.Tooltip\"\n  \
    \          data-win-options=\"{\n            innerHTML: 'Saves the <b>Employee</b>\
    \ record'}\">\n    Save\n</button>\n```\n\nThe `innerHTML` property is set via\
    \ the `data-win-options` attribute, which sets the text for the tooltip control.\
    \ This text can contain HTML tags too.\n\nFigure [3-12](#A978-1-4842-0719-2_3_Chapter.html#Fig12)\
    \ demonstrates the way that the tooltip is displayed on Windows Mobile 10 and\
    \ Windows 10 tablets.\n\n![A978-1-4842-0719-2_3_Fig12_HTML.jpg](A978-1-4842-0719-2_3_Fig12_HTML.jpg)\n\
    \nFigure 3-12.\n\nTooltip displayed within the app\n\nYou can customize the styling\
    \ of the tooltip control by modifying the `win-tooltip` CSS class.\n\nOpen the\
    \ `default.css` file from the CSS folder and add the following code to the end\
    \ of the file:\n\n```\n.win-tooltip\n{\n    background-color: bisque;\n    border-radius:30px;\n\
    \    border-color:red;\n}\n```\n\nFigure [3-13](#A978-1-4842-0719-2_3_Chapter.html#Fig13)\
    \ demonstrates the appearance of the tooltip control after defining the style\
    \ mentioned earlier.\n\n![A978-1-4842-0719-2_3_Fig13_HTML.jpg](A978-1-4842-0719-2_3_Fig13_HTML.jpg)\n\
    \nFigure 3-13.\n\nTooltip with styling\n\nNote that when using the `div` element\
    \ as container for the tooltip, you need to set its display property to `inline-block`\
    \ because the `div` element has a display setting of `block` by default.\n\n##\
    \ 3.9 Displaying Text\n\n### Problem\n\nYou need to display text or labels on\
    \ the page of your Windows app.\n\n### Solution\n\nUse traditional HTML elements\
    \ or tags to display the text on the page of your Windows app. These include `div`s,\
    \ `label`s, paragraphs, headings, and so forth."
  raw: '### How It Works


    You can declare the DatePicker control on the page, like this.


    `<div id="timeSelector" data-win-control="WinJS.UI.TimePicker" >`


    `</div>`


    In this recipe, let’s try to add the TimePicker control on the page and bind the
    event in the JavaScript code to display the selected time in a `div` element.


    Create a new project using the Windows Universal App template in Visual Studio
    2015.   Open the `default.html` page and replace it with the following. `<!DOCTYPE
    html>` `<html>` `<head>`     `<meta charset="utf-8" />`     `<title>BasicControls</title>`
        `<!-- WinJS references -->`     `<link href="WinJS/css/ui-light.css" rel="stylesheet"
    />`     `<script src="WinJS/js/base.js"></script>`     `<script src="WinJS/js/ui.js"></script>`
        `<!-- Recipe3.7 references -->`     `<link href="/css/default.css" rel="stylesheet"
    />`     `<script src="/js/default.js"></script>`     `<script src="/js/controldemo.js"></script>`
    `</head>` `<body class="win-type-body">`     `<div id="timeSelector" data-win-control="WinJS.UI.TimePicker">`
        `</div>`     `<div id="info"></div>` `</body>` `</html>` The `default.html`
    page contains the TimePicker control as well as the `div` tag with the name information
    to display the selected time. The `controldemo.js` file is referenced, which you
    will create in the next step.   Add a new JavaScript file to the project’s `js`
    folder from the Visual Studio Solution Explorer and name it controldemo.js. Replace
    the file with the following JavaScript code. `(function () {`     `"use strict";`
        `function GetControl() {`         `WinJS.UI.processAll().done(function ()
    {`             `var datepick = document.getElementById("timeSelector").winControl;`
                `var InfoEelement = document.getElementById("info");`             `datepick.addEventListener(''change'',
    function (args) {`                 `InfoEelement.innerHTML = "The selected time
    is " +`                     `datepick.current.toTimeString();`             `})`
            `});`     `}`     `document.addEventListener("DOMContentLoaded", GetControl);`
    `})();`  


    The TimePicker raises the change event as soon as you change the hour, or minute,
    or period. You can get the current selected time by handling this event.


    The `winControl` property of the `document.getElementById` is used to get the
    TimePicker from the HTML page in the JavaScript code. The `addEventListener` method
    is invoked from the TimePicker control to subscribe to the change event.


    The selected time is retrieved using the current property of the TimePicker control.


    Running the application on Windows Mobile or Windows 10 displays the TimePicker
    and shows the selected time, as demonstrated in Figure [3-10](#A978-1-4842-0719-2_3_Chapter.html#Fig10).


    ![A978-1-4842-0719-2_3_Fig10_HTML.jpg](A978-1-4842-0719-2_3_Fig10_HTML.jpg)


    Figure 3-10.


    TimePicker control demo


    You can set the TimePicker to support a 24-hour clock format by setting the clock
    property using the `data-win-options` attribute, as shown here.


    `<div id="timeSelector" data-win-control="WinJS.UI.TimePicker"`


             `data-win-options="{`


             `clock : ''24HourClock'',`


             `minuteIncrement : 15`


             `}">`


        `</div>`


    The increment values of the minute list can be controlled with the `minuteIncrement`
    property, as shown next.


    When you run the page on Windows 10 or Windows Mobile 10, you see the screen shown
    in Figure [3-11](#A978-1-4842-0719-2_3_Chapter.html#Fig11).


    ![A978-1-4842-0719-2_3_Fig11_HTML.jpg](A978-1-4842-0719-2_3_Fig11_HTML.jpg)


    Figure 3-11.


    TimePicker with the 24-hour clock format and timeInterval adjustment


    You can control the appearance of the hour, minute, and period fields of the TimePicker
    control by assigning the format strings.


    The format is set using the `hourPattern`, `minutePattern`, and `periodPattern`
    properties.


    The `hourPattern` property gets to set the display pattern for the hour. The default
    value of the `hourPattern` property is hour.integer(2) and you can modify the
    `hourPattern` property by changing the values of the parameters. The `minutePattern`
    property gets or sets the display pattern for the minute. The default value of
    this property is minute.integer (2) and you can modify this pattern by changing
    the number of integers in the parameter. The `periodPattern` property gets or
    sets the display pattern for the period; the default value of this property is
    period.abbreviated (2). You can modify the pattern for this property by changing
    the values of the parameters.


    Table 3-4.


    Pattern for hours, minutes and period in timepicker


    | Pattern | Description |

    | --- | --- |

    | hour.integer(n) | This displays the specified number of digits for hours. |

    | {minute.integer(n)} | This displays the specified number of digits for minutes.
    |

    | {period.abbreviated(n)} | Display pattern for the period based on the value
    passed as parameter. |


    ## 3.8 The Tooltip Control


    ### Problem


    You need to display a tooltip when the user hovers over any element on the page.


    ### Solution


    Use the WinJS Tooltip control to display the tooltip over the HTML element on
    the page. When you hover over an element, the tooltip appears for a specified
    number of seconds. The tooltip should disappear when the user moves the cursor
    away from the element.


    ### How It Works


    You add the Tooltip control for a button like this:


    `<button id="btnSave"`


                `data-win-control="WinJS.UI.Tooltip"`


                `data-win-options="{`


                `innerHTML: ''Saves the <b>Employee</b> record''}">`


        `Save`


    `</button>`


    The `innerHTML` property is set via the `data-win-options` attribute, which sets
    the text for the tooltip control. This text can contain HTML tags too.


    Figure [3-12](#A978-1-4842-0719-2_3_Chapter.html#Fig12) demonstrates the way that
    the tooltip is displayed on Windows Mobile 10 and Windows 10 tablets.


    ![A978-1-4842-0719-2_3_Fig12_HTML.jpg](A978-1-4842-0719-2_3_Fig12_HTML.jpg)


    Figure 3-12.


    Tooltip displayed within the app


    You can customize the styling of the tooltip control by modifying the `win-tooltip`
    CSS class.


    Open the `default.css` file from the CSS folder and add the following code to
    the end of the file.


    `.win-tooltip`


    `{`


        `background-color: bisque;`


        `border-radius:30px;`


        `border-color:red;`


    `}`


    Figure [3-13](#A978-1-4842-0719-2_3_Chapter.html#Fig13) demonstrates the appearance
    of the tooltip control after defining the style mentioned earlier.


    ![A978-1-4842-0719-2_3_Fig13_HTML.jpg](A978-1-4842-0719-2_3_Fig13_HTML.jpg)


    Figure 3-13.


    Tooltip with styling


    Note that when using the div element as container for the tooltip, you need to
    set its display property to inline block because the div element has a display
    setting of block by default.


    ## 3.9 Displaying Text


    ### Problem


    You need to display text or labels on the page of your Windows app.


    ### Solution


    Use traditional HTML elements or tags to display the text on the page of your
    Windows app. These include divs, labels, paragraphs, headings, and so forth.'
  trans: "\n### 工作原理\n\n你可以在页面上声明 `DatePicker` 控件，如下所示：\n\n```\n<div id=\"timeSelector\"\
    \ data-win-control=\"WinJS.UI.TimePicker\"></div>\n```\n\n在本节中，我们将尝试在页面上添加 `TimePicker`\
    \ 控件，并在 JavaScript 代码中绑定事件，以在 `div` 元素中显示所选时间。\n\n在 Visual Studio 2015 中使用 Windows\
    \ 通用应用模板创建一个新项目。打开 `default.html` 页面，并将其替换为以下内容：\n\n```\n<!DOCTYPE html>\n<html>\n\
    <head>\n    <meta charset=\"utf-8\" />\n    <title>BasicControls</title>\n   \
    \ <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe3.7 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    \    <script src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <div id=\"timeSelector\" data-win-control=\"WinJS.UI.TimePicker\"></div>\n\
    \    <div id=\"info\"></div>\n</body>\n</html>\n```\n\n`default.html` 页面包含了 `TimePicker`\
    \ 控件以及用于显示所选时间的名为 `info` 的 `div` 标签。页面中还引用了 `controldemo.js` 文件，你将在下一步中创建该文件。\n\
    \n从 Visual Studio 解决方案资源管理器中，向项目的 `js` 文件夹添加一个新的 JavaScript 文件，并将其命名为 `controldemo.js`。用以下\
    \ JavaScript 代码替换该文件的内容：\n\n```\n(function () {\n    \"use strict\";\n    function\
    \ GetControl() {\n        WinJS.UI.processAll().done(function () {\n         \
    \   var datepick = document.getElementById(\"timeSelector\").winControl;\n   \
    \         var InfoEelement = document.getElementById(\"info\");\n            datepick.addEventListener('change',\
    \ function (args) {\n                InfoEelement.innerHTML = \"The selected time\
    \ is \" +\n                    datepick.current.toTimeString();\n            })\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n```\n\n当你更改小时、分钟或时段时，`TimePicker` 会立即引发 `change` 事件。你可以通过处理此事件来获取当前所选时间。\n\
    \n在 JavaScript 代码中，使用 `document.getElementById` 的 `winControl` 属性可从 HTML 页面获取\
    \ `TimePicker`。然后，从 `TimePicker` 控件调用 `addEventListener` 方法以订阅 `change` 事件。\n\n\
    所选时间通过 `TimePicker` 控件的 `current` 属性获取。\n\n在 Windows Mobile 或 Windows 10 上运行应用程序时，将显示\
    \ `TimePicker` 并展示所选时间，如图 3-10 所示。\n\n![A978-1-4842-0719-2_3_Fig10_HTML.jpg](img/A978-1-4842-0719-2_3_Fig10_HTML.jpg)\n\
    \n图 3-10.\n\nTimePicker 控件演示\n\n你可以通过使用 `data-win-options` 属性设置 `clock` 属性，使 `TimePicker`\
    \ 支持 24 小时制格式，如下所示：\n\n```\n<div id=\"timeSelector\" data-win-control=\"WinJS.UI.TimePicker\"\
    \n         data-win-options=\"{\n         clock : '24HourClock',\n         minuteIncrement\
    \ : 15\n         }\">\n</div>\n```\n\n分钟列表的增量值可以通过 `minuteIncrement` 属性控制，如下所示。\n\
    \n当你在 Windows 10 或 Windows Mobile 10 上运行该页面时，将看到如图 3-11 所示的界面。\n\n![A978-1-4842-0719-2_3_Fig11_HTML.jpg](img/A978-1-4842-0719-2_3_Fig11_HTML.jpg)\n\
    \n图 3-11.\n\n采用 24 小时制格式并调整时间间隔的 TimePicker\n\n你可以通过指定格式字符串来控制 `TimePicker` 控件的小时、分钟和时段字段的外观。\n\
    \n格式通过 `hourPattern`、`minutePattern` 和 `periodPattern` 属性设置。\n\n`hourPattern`\
    \ 属性获取或设置小时的显示模式。`hourPattern` 属性的默认值为 `hour.integer(2)`，你可以通过更改参数值来修改 `hourPattern`\
    \ 属性。`minutePattern` 属性获取或设置分钟的显示模式。此属性的默认值为 `minute.integer(2)`，你可以通过更改参数中的整数位数来修改此模式。`periodPattern`\
    \ 属性获取或设置时段的显示模式；此属性的默认值为 `period.abbreviated(2)`。你可以通过更改参数值来修改此属性的模式。\n\n表 3-4.\n\
    \nTimePicker 中小时、分钟和时段的模式\n\n| 模式 | 描述 |\n| --- | --- |\n| `hour.integer(n)` |\
    \ 显示指定位数的小时。 |\n| `minute.integer(n)` | 显示指定位数的分钟。 |\n| `period.abbreviated(n)`\
    \ | 根据作为参数传递的值显示时段的模式。 |\n\n## 3.8 Tooltip 控件\n\n### 问题\n\n当用户悬停在页面上的任何元素上时，你需要显示一个工具提示。\n\
    \n### 解决方案\n\n使用 WinJS `Tooltip` 控件在页面上的 HTML 元素上显示工具提示。当你将鼠标悬停在一个元素上时，工具提示会显示指定的秒数。当用户将光标移开该元素时，工具提示应消失。\n\
    \n### 工作原理\n\n你可以像这样为按钮添加 `Tooltip` 控件：\n\n```\n<button id=\"btnSave\"\n     \
    \       data-win-control=\"WinJS.UI.Tooltip\"\n            data-win-options=\"\
    {\n            innerHTML: 'Saves the <b>Employee</b> record'}\">\n    Save\n</button>\n\
    ```\n\n通过 `data-win-options` 属性设置 `innerHTML` 属性，该属性为工具提示控件设置文本。此文本也可以包含 HTML\
    \ 标签。\n\n图 3-12 演示了工具提示在 Windows Mobile 10 和 Windows 10 平板电脑上的显示方式。\n\n![A978-1-4842-0719-2_3_Fig12_HTML.jpg](img/A978-1-4842-0719-2_3_Fig12_HTML.jpg)\n\
    \n图 3-12.\n\n在应用内显示的工具提示\n\n你可以通过修改 `win-tooltip` CSS 类来自定义工具提示控件的样式。\n\n从 CSS\
    \ 文件夹打开 `default.css` 文件，并将以下代码添加到文件末尾：\n\n```\n.win-tooltip\n{\n    background-color:\
    \ bisque;\n    border-radius:30px;\n    border-color:red;\n}\n```\n\n图 3-13 演示了定义上述样式后工具提示控件的外观。\n\
    \n![A978-1-4842-0719-2_3_Fig13_HTML.jpg](img/A978-1-4842-0719-2_3_Fig13_HTML.jpg)\n\
    \n图 3-13.\n\n应用样式的工具提示\n\n请注意，当使用 `div` 元素作为工具提示的容器时，你需要将其 display 属性设置为 `inline-block`，因为\
    \ `div` 元素默认的 display 设置为 `block`。\n\n## 3.9 显示文本\n\n### 问题\n\n你需要在 Windows 应用的页面上显示文本或标签。\n\
    \n### 解决方案\n\n使用传统的 HTML 元素或标签在 Windows 应用的页面上显示文本。这些元素包括 `div`、`label`、段落、标题等。\n"
- fmt: '### How It Works


    The HTML elements—like the `label`, `div`, `p`, `h1`, and so forth—are some of
    the common controls used for displaying read-only text on Windows universal apps
    using JavaScript.


    You can define a simple label control and set its text, as shown here.


    ```

    <label>Welcome to the Windows 10 App Development World</label>

    ```


    ```

    <div>by Microsoft MVPs</div>

    ```


    The styling can be applied to the display text using one of two approaches: inline
    or CSS.


    The following is a code snippet demonstrating the usage of the inline style attribute
    to format the text.


    ```

    <div style="font-family:Verdana">Welcome to the Windows 10 App Development World</div>

    ```


    ```

    <p style="margin:0px; color:blue; font-family:Arial; font-size:18px">Welcome to
    the Windows 10 App Development World</p>

    ```


    Figure [3-14](#A978-1-4842-0719-2_3_Chapter.html#Fig14) illustrates the output
    of the preceding code using the inline style attributes.


    ![A978-1-4842-0719-2_3_Fig14_HTML.jpg](A978-1-4842-0719-2_3_Fig14_HTML.jpg)


    **Figure 3-14.** Styling the read-only text


    The CSS allows the developers to define a style—once and in a single place—and
    later reuse it for multiple controls.


    ## 3.10 Editing Text in an App


    ### Problem


    You need to allow the user to enter text on the page of your Windows app.


    ### Solution


    Use HTML elements to allow the user to enter text on the page. This includes text
    boxes, text areas, password input boxes, rich text boxes, and so forth.


    ### How It Works


    Windows universal apps using JavaScript has four different types of text entry
    elements.


    *   **Text box:** This control lets the user enter or edit plain text in single
    line.

    *   **Text area:** This control has multiline support and lets the user enter
    or edit plain text.

    *   **Password input box:** This control lets the user enter a password.

