    \ 17-19）。\n\n    ![A978-1-4842-0719-2_17_Fig19_HTML.jpg](img/A978-1-4842-0719-2_17_Fig19_HTML.jpg)\
    \  \n    *图 17-19. 远程连接屏幕*\n\n6.  单击“选择”按钮，然后单击“启动 Windows 应用认证套件”按钮。如果远程计算机上正在运行远程工具，你将成功连接，验证测试随即开始。\n\
    \n# 第 18 章：商店与盈利\n\n到目前为止，你应该已经完成了针对 Windows 10 操作系统的通用 Windows 平台应用程序的开发。你需要生成应用程序并将其上传到\
    \ Windows 商店，用户在那里搜索和下载应用。在本章中，你将了解将应用上架 Windows 商店所需的事项，以及如何通过应用内广告来盈利。\n\n##\
    \ 18.1 创建 Windows 应用开发者帐户\n\n### 问题\n\n你需要生成应用程序并将其上传到 Windows 商店。但要做到这一点，你需要首先使用你的开发者帐户登录\
    \ Windows 开发人员中心。你需要知道如何创建开发者帐户，然后才能开始上传阶段。\n\n### 解决方案\n\n在线创建一个开发者帐户。有两种方法可以开始此过程。\n\
    \n*   直接访问 `http://dev.windows.com`。\n*   通过 Visual Studio 访问帐户注册。\n\n#### 通过\
    \ Windows 开发人员中心访问帐户注册\n\nWindows 开发人员中心是 Windows 应用开发的一站式门户。该门户提供了开始 Windows\
    \ 10 应用程序开发所需的工具。这里有代码示例、关于如何开发 Windows 10 应用的教程，当然，还有提交应用的途径。可以通过 `http://dev.windows.com`\
    \ 访问 Windows 开发人员中心。导航到该页面时，你会看到一个“获取开发者帐户”链接。单击它并按照屏幕上的说明完成创建你自己的开发者帐户。开发者帐户允许你将应用（适用于所有\
    \ Windows 设备）提交到 Windows 商店。它还允许你管理你的应用，并获取关于你的应用在商店中表现的分析数据。\n\n你可以根据以下类别之一进行注册：\n\
    \n*   **个人**：此帐户类型允许你以个人、学生或非法人团体的身份开发和销售应用。此类型帐户的费用为 19 美元。\n*   **公司**：此帐户类型适用于拥有注册公司名称以开发和销售应用的公司。此类型帐户的费用为\
    \ 99 美元。\n\n你需要提供以下信息来获取帐户：\n\n*   你的联系信息\n*   你想要显示的发布者名称\n*   一种支付方式 (VISA/万事达卡/PayPal)\n\
    \n#### 通过 Visual Studio 访问帐户注册\n\n你也可以通过 Visual Studio 注册成为开发者。\n\n在 Visual Studio\
    \ 中，从“项目”菜单中，选择“商店” ➤ “打开开发者帐户”（参见图 18-1）。\n\n![A978-1-4842-0719-2_18_Fig1_HTML.jpg](img/A978-1-4842-0719-2_18_Fig1_HTML.jpg)\
    \  \n*图 18-1. 从 Visual Studio 打开开发者帐户*\n\n此操作将打开一个新的浏览器窗口，并直接带你进入帐户注册页面。你需要按照屏幕上的说明完成帐户注册。\n\
    \n## 18.2 为 Windows 10 打包通用 Windows 平台应用程序\n\n### 问题\n\n你已经完成了应用的开发。你已经在 Windows\
    \ 开发人员中心完成了帐户注册。现在你想打包你的应用，以便将其提交到商店。\n\n### 解决方案\n\n要销售或分发 Windows 应用，你需要创建一个所谓“应用程序包”或技术上称为\
    \ `appxupload` 包的文件。使用通用 Windows 平台 (UWP)，你生成一个包 (`.appxupload`)。该包被上传到 Windows\
    \ 商店。一旦应用上架，它就可以在任何 Windows 10 设备上安装和运行，包括手机、平板电脑、PC 等。\n\n### 工作原理\n\n打包 Windows\
    \ 10 应用需要分两步完成。首先，使用特定的属性和设置配置包。然后，生成要上传到商店的包。\n"
- fmt: "## Configuring an App Package\n\nTo create an app package, you need to first\
    \ set certain properties and settings that describe your app. The app properties\
    \ and settings are stored in a file called the app manifest file, which is in\
    \ the root of your project under the name `package.appxmanifest`. Some of the\
    \ properties/settings you set in the manifest are the images used for the application\
    \ tile or the orientation that the app supports.\n\nThe application manifest file\
    \ is an XML file. Visual Studio provides a GUI-based manifest designer/editor\
    \ to edit this file. With the GUI designer/editor, it is easy to make changes\
    \ to your application manifest.\n\nThe following steps provide instructions on\
    \ how to configure the package:\n\n![A978-1-4842-0719-2_18_Fig2_HTML.jpg](A978-1-4842-0719-2_18_Fig2_HTML.jpg)\n\
    \nFigure 18-2.\n\nApplication package manifest editing In Solution Explorer, expand\
    \ your application’s project node. Double-click the `package.appxmanifest` file.\
    \ Visual Studio will launch the manifest designer/editor (see Figure [18-2](#A978-1-4842-0719-2_18_Chapter.html#Fig2)).\n\
    \nThe manifest file has several tabs to configure different aspects of your app.\n\
    \n- **Application**: Configures your app’s display name, start page, the default\
    \ language, description, supported orientations, lock screen notification mode,\
    \ and tile update information.\n- **Visual Assets**: Configures your app’s visual\
    \ assets, such as tile images and logos, the badge logo, and the splash screen\
    \ (see Figure [18-3](#A978-1-4842-0719-2_18_Chapter.html#Fig3)).\n\n    ![A978-1-4842-0719-2_18_Fig3_HTML.jpg](A978-1-4842-0719-2_18_Fig3_HTML.jpg)\n\
    \n    Figure 18-3.\n\n    Visual Assets\n\n- **Capabilities**: Any capabilities\
    \ that your app needs has to be declared in this area of the manifest file (see\
    \ Figure [18-4](#A978-1-4842-0719-2_18_Chapter.html#Fig4)).\n\n    ![A978-1-4842-0719-2_18_Fig4_HTML.jpg](A978-1-4842-0719-2_18_Fig4_HTML.jpg)\n\
    \n    Figure 18-4.\n\n    Capabilities\n\n- **Declarations**: Use to add any declarations\
    \ (for example, protocol or share target) for your app and sets their properties\
    \ (see Figure [18-5](#A978-1-4842-0719-2_18_Chapter.html#Fig5)).\n\n    ![A978-1-4842-0719-2_18_Fig5_HTML.jpg](A978-1-4842-0719-2_18_Fig5_HTML.jpg)\n\
    \n    Figure 18-5.\n\n    Declarations\n\n- **Content URIs**: Specifies which\
    \ pages in the app can be navigated to by a frame, and URIs that can be navigated\
    \ to when loaded in a web view (see Figure [18-6](#A978-1-4842-0719-2_18_Chapter.html#Fig6)).\n\
    \n    ![A978-1-4842-0719-2_18_Fig6_HTML.jpg](A978-1-4842-0719-2_18_Fig6_HTML.jpg)\n\
    \n    Figure 18-6.\n\n    Content URIs\n\n- **Packaging**: Sets the package details,\
    \ such as package name (note: this is not the application name, rather just the\
    \ package name), package display name, version details, publisher, publisher display\
    \ name, and package family name (see Figure [18-7](#A978-1-4842-0719-2_18_Chapter.html#Fig7)).\n\
    \n    ![A978-1-4842-0719-2_18_Fig7_HTML.jpg](A978-1-4842-0719-2_18_Fig7_HTML.jpg)\n\
    \n    Figure 18-7.\n\n    Packaging\n\n## Creating an App Package\n\nAfter configuring\
    \ the application package using the manifest file, the next thing to do is generate\
    \ or create the package. The package is an `appxupload` file. Visual Studio provides\
    \ the **Create App Package** wizard, which you will use next. Follow these steps\
    \ to create the package:\n\nIn Solution Explorer, open the solution of your Universal\
    \ Windows app project. With the project opened in the Solution Explorer, right-click\
    \ your project. Choose **Store** > **Create App Packages** from the context menu\
    \ (see Figure [18-8](#A978-1-4842-0719-2_18_Chapter.html#Fig8)).\n\n![A978-1-4842-0719-2_18_Fig8_HTML.jpg](A978-1-4842-0719-2_18_Fig8_HTML.jpg)\n\
    \nFigure 18-8.\n\n**Create App Packages** The wizard will be invoked. In the **Create\
    \ Your Packages** dialog, select **Yes** to build packages and upload to the Windows\
    \ Store (see Figure [18-9](#A978-1-4842-0719-2_18_Chapter.html#Fig9)).\n\n![A978-1-4842-0719-2_18_Fig9_HTML.jpg](A978-1-4842-0719-2_18_Fig9_HTML.jpg)\n\
    \nFigure 18-9.\n\nCreate App Package wizard If you chose **No**, Visual Studio\
    \ would not create the required `.appxupload` file required for Store submission.\
    \ This option should be used when you only want to sideload your app to run it\
    \ on an internal device.\n\nNext, you need to sign in to your Windows Dev Center\
    \ account (see Figure [18-10](#A978-1-4842-0719-2_18_Chapter.html#Fig10)).\n\n\
    ![A978-1-4842-0719-2_18_Fig10_HTML.jpg](A978-1-4842-0719-2_18_Fig10_HTML.jpg)\n\
    \nFigure 18-10.\n\nCreate App Package Dev Center Sign in\n\nNext, you need to\
    \ select a name for your package, or you can reserve a name for your package from\
    \ the wizard. The name you select needs to be unique to the Windows Store (see\
    \ Figure [18-11](#A978-1-4842-0719-2_18_Chapter.html#Fig11)).\n\n![A978-1-4842-0719-2_18_Fig11_HTML.jpg](A978-1-4842-0719-2_18_Fig11_HTML.jpg)\n\
    \nFigure 18-11.\n\nSelecting app name\n\nNext, you need to select and configure\
    \ the package information: the output location where the package will be saved,\
    \ and the version and the architecture configuration for the build. Make sure\
    \ to select all three architecture options (see Figure [18-12](#A978-1-4842-0719-2_18_Chapter.html#Fig12)).\n\
    \n![A978-1-4842-0719-2_18_Fig12_HTML.jpg](A978-1-4842-0719-2_18_Fig12_HTML.jpg)\n\
    \nFigure 18-12.\n\nConfiguring package details\n\nClick **Create** to generate\
    \ the `appxupload` package, which is generated at the selected output location.\
    \ You can then submit the `appxupload` package to the Store. Next, you see **Package\
    \ Creation Completed** dialog (see Figure [18-13](#A978-1-4842-0719-2_18_Chapter.html#Fig13)).\n\
    \n![A978-1-4842-0719-2_18_Fig13_HTML.jpg](A978-1-4842-0719-2_18_Fig13_HTML.jpg)\n\
    \nFigure 18-13.\n\nCreation Completion dialog\n\nIt is important that you validate\
    \ your app before submitting it to store for certification. Validation can be\
    \ done by using the **Windows App Certification Kit (WACK)** that is installed\
    \ as part of the SDK on your machine. Validation can be done on your local machine\
    \ or on a remote machine.\n\nTo validate locally, select the **Local machine**\
    \ radio button in the **Package Creation Completed** dialog. Click the **Launch\
    \ Windows App Certification Kit** button. The Windows App Certification Kit performs\
    \ tests and shows you the results.\n\nIf your app has passed the tests, you are\
    \ ready to submit your app to the Store.\n\n## 18.3 Submit an App to the Windows\
    \ Store\n\n### Problem\n\nYou have finished creating the package. An `appxupload`\
    \ package has been generated for your app. You now need to submit the app to the\
    \ Store for certification."
