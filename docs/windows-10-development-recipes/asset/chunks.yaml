    \ 文件中看到该图像，如图 10-6 所示。\n\n![A978-1-4842-0719-2_10_Fig6_HTML.jpg](img/A978-1-4842-0719-2_10_Fig6_HTML.jpg)\n\
    \n图 10-6.\n\n共享图像演示\n\n现在点击“共享”超级按钮或按 Windows 徽标键 ![A978-1-4842-0719-2_10_Figb_HTML.jpg](img/A978-1-4842-0719-2_10_Figb_HTML.jpg)\
    \ + H。当你从列表中选择 OneNote 时，该应用将与 OneNote 共享数据，你将看到类似图 10-7 所示的屏幕。\n\n![A978-1-4842-0719-2_10_Fig7_HTML.jpg](img/A978-1-4842-0719-2_10_Fig7_HTML.jpg)\n\
    \n图 10-7.\n\n图像与项目标题一起共享\n\n## 10.5 将应用声明为共享目标\n\n### 问题\n\n你需要将应用声明为当用户使用“共享”超级按钮功能时，列表中显示的一个共享目标。\n\
    \n### 解决方案\n\n在 `package.appxmanifest` 文件中配置共享目标，这会将共享合约启用为共享目标应用。\n"
- fmt: '### How It Works


    Windows 10 displays a list of possible target apps when the user invokes sharing
    using the Share charm. A target share app is the app that can receive the data
    shared by other apps. You need to declare your app as a target app and implement
    the function to receive the data and store it in the right place or display it
    on the screen. For example, you have two apps: one for time management reporting,
    and other for project listing in an organization. What if you want to share data
    from time management reporting to the project listing app? The time management
    reporting app will become a source app and the project listing app is the target
    app.


    When you declare an app as a target app that can receive the data shared by other
    apps, your app adheres to the share contract. By declaring your app as a target
    app, you are providing a good experience to your app’s users, which enhances social
    connectivity with other apps.


    If you want to receive data or support the share contract from other apps via
    a sharing option, you need to declare your app as a share target.


    To declare your app a share target, follow these guidelines:


    - Open the manifest file (`package.appxmanifest`), which is available in the root
    folder of the project.

    - Click the Declaration tab.

    - From the available declarations, select Share Target.

    - On the right side of the screen, enter Sharing Description.

    - Select the data format by clicking Add new.

    - Define two data formats: Text and Image.


    The declaration settings window should look as shown in Figure [10-8](#A978-1-4842-0719-2_10_Chapter.html#Fig8).


    ![A978-1-4842-0719-2_10_Fig8_HTML.jpg](A978-1-4842-0719-2_10_Fig8_HTML.jpg)


    Figure 10-8.


    Image shared along with project title


    When you run the application in Windows 10 and use the Share charm feature, you
    see that your app appears in the list, as shown in Figure [10-9](#A978-1-4842-0719-2_10_Chapter.html#Fig9).


    ![A978-1-4842-0719-2_10_Fig9_HTML.jpg](A978-1-4842-0719-2_10_Fig9_HTML.jpg)


    Figure 10-9.


    Share Charm windows


    Let’s go over the data types supported by the share contract. Table [10-1](#A978-1-4842-0719-2_10_Chapter.html#Tab1)
    lists the data types supported in the sharing data using the share contract.


    **Table 10-1.** Data Types in Share Contract


    | Data Type | Description |

    | --- | --- |

    | Text | Plain text string |

    | URI | A web link (for example, `http://www.apress.com`) |

    | Image | A bitmap image |

    | HTML | HTML content |

    | Files | Files as storage items |

    | Custom Data | Custom data using JSON format |

    | Rich Text | Rich text–formatted string |


    ## 10.6 Handle Share Activation and Receive Plain Text


    ### Problem


    You need to handle share activation as a share target app.


    ### Solution


    When your app appears in the list of target apps of the Share charm, users can
    select your app from the list to share data. The `Application.OnShareTargetActivated`
    event is fired when the user selects your app to share the data.'
