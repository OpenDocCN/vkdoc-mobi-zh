    is specified for `loadModule`. `Microsoft.Maps.loadModule(''Microsoft.Maps.Map'',
    { callback: GetMap });` An instance of the `Microsoft.Maps.Map` is created by
    specifying the container `div` element and the Bing Map API key. `// Initialize
    the map` `map = new Microsoft.Maps.Map(document.getElementById("myMap"), {`     `credentials:
    "Bing Map API Key",` `});` The location on the map where the pushpin is to be
    added is identified using the `map.entities.push` method. `var loc = new Microsoft.Maps.Location(13.0220,
    77.4908);` `var pin = new Microsoft.Maps.Pushpin(loc);` `map.entities.push(pin);`
    Finally, the map is displayed by setting the location at the center and with a
    zoom level value of 10.   Build the application and run it in the Windows emulator.
    You should be able to view the map and the pushpin added to the map, as shown
    in Figure [12-14](#A978-1-4842-0719-2_12_Chapter.html#Fig14).


    ![A978-1-4842-0719-2_12_Fig14_HTML.jpg](A978-1-4842-0719-2_12_Fig14_HTML.jpg)


    Figure 12-14.


    Bing Maps in Windows app


    The Bing Maps AJAX Control provides additional APIs that let developers integrate
    additional Maps functionalities, such as displaying traffic information, directions,
    and so forth.


    Currently, the WinJS library does not provide the Maps control out of the box
    in the SDK, and hence Bing Maps AJAX Control is a good alternate solution for
    the same.


    # Chapter 13: Building Apps That Connect to the Cloud


    Microsoft Azure Mobile Services provides one of the easiest ways for developers
    to store data from a Windows app to the SQL Azure database in the cloud. By using
    Microsoft Azure Mobile Services, developers need not worry about creating and
    hosting their own web service. Most things are handled by Microsoft Azure Mobile
    Services.


    This chapter covers some of the recipes on setting up and using Microsoft Azure
    Mobile Services from your Universal Windows app for data storage and retrieval.


    ## 13.1 Creating a New Mobile Service in Microsoft Azure


    ### Problem


    You need to create a new mobile service in Microsoft Azure Mobile Services that
    can be utilized by your Universal Windows app.


    ### Solution


    Log in to the Microsoft Azure Management portal and use the Mobile Services section
    to create a new mobile service.'
