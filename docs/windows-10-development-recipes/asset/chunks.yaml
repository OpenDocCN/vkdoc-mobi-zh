- fmt: "### How It Works\n\nWhen your app is selected for sharing data, an [`Application.OnShareTargetActivated`](https://msdn.microsoft.com/en-us/library/windows/apps/windows.ui.xaml.application.onsharetargetactivated.aspx)\
    \ event is triggered. Your app needs to implement this event to receive the data\
    \ that the user is sharing from other apps.\n\nLet’s implement this event in a\
    \ Universal Windows app to receive data from other apps. Create a new project\
    \ using the Windows Universal (Blank App) template in Microsoft Visual Studio\
    \ 2015.\n\nFirst, add the following code to `default.html`. You will need to replace\
    \ the body tag with the following code:\n\n```html\n<body class=\"win-type-body\"\
    >\n    <div>\n        <br /><br />\n        <div>The following Data  was received\
    \ from the source app:</div>\n        <br />\n        <h3>Data Properties</h3>\n\
    \        <strong>Title: </strong><span id=\"txttitle\" data-win-automationId=\"\
    Title\">(No title)</span><br />\n        <strong>Description: </strong><span id=\"\
    txtdescription\" data-win-automationId=\"Description\">(No description)</span><br\
    \ />\n        <strong>Data: </strong><span id=\"txtdata\" data-win-automationId=\"\
    Description\">(No data)</span><br />\n    </div>\n</body>\n```\n\nThis code defines\
    \ a user interface for the sharing data demo. The user interface looks like what’s\
    \ shown in Figure [10-10](#A978-1-4842-0719-2_10_Chapter.html#Fig10).\n\n![A978-1-4842-0719-2_10_Fig10_HTML.jpg](A978-1-4842-0719-2_10_Fig10_HTML.jpg)\n\
    \n**Figure 10-10.** Share Charm windows\n\nNow, right-click the project in Solution\
    \ Explorer and select **Add ➤ New JavaScript file**. Provide the name for the\
    \ file. In this example, let’s name the file `DataSharingDemo.js`.\n\n```javascript\n\
    (function () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            // Initialize the activation handler\n            WinJS.Application.addEventListener(\"\
    activated\", activatedShareHandler, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\nThe preceding code adds an event\
    \ listener `activated` to the application object. The event listener function\
    \ named `activatedShareHandler` is provided as follows; add this function to the\
    \ `js` file.\n\n```javascript\n/// <summary>\n/// Function to handle the activation\n\
    /// </summary>\n/// <param name=\"eventArgs\">\n/// Arguments of the event. In\
    \ the case of the Share contract, it has the ShareOperation\n/// </param>\nfunction\
    \ activatedShareHandler(eventObject) {\n    // Check if the Share Contract was\
    \ the cuase of this sharing\n    if (eventObject.detail.kind === Windows.ApplicationModel.Activation.ActivationKind.shareTarget)\
    \ {\n        eventObject.setPromise(WinJS.UI.processAll());\n        // ShareOperation\
    \ object in initiliaze with the eventObject event arugment\n        shareOperation\
    \ = eventObject.detail.shareOperation;\n        //check if shareOperation has\
    \ text Sharing enable or data shared using text\n        if (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.text))\
    \ {\n            shareOperation.data.getTextAsync().done(function (text) {\n \
    \               dispReceivedContent(text);\n            }, function (e) {\n  \
    \              displayError(\"Text: \", \"Error retrieving data: \" + e);\n  \
    \          });\n        }\n    }\n}\n```\n\nThe preceding code receives the share\
    \ data of the `activatedShareHandler` event listener. This code first checks if\
    \ the sharing is triggered with the share contract. It then creates a `shareOperation`\
    \ object from the event argument, as shown in the following code:\n\n```javascript\n\
    // ShareOperation object in initiliaze with the eventObject event arugment\n \
    \       shareOperation = eventObject.detail.shareOperation;\n```\n\nThe code then\
    \ uses the `shareOperation.data.getTextAsync` function to get the text asynchronously.\
    \ In the success method of the async call, the received text is then passed to\
    \ the `dispReceivedContent()` function, which then displays the text on the target\
    \ app. The following is the code for the display the share content function:\n\
    \n```javascript\nfunction dispReceivedContent(content) {\n    document.getElementById(\"\
    txttitle\").innerText = shareOperation.data.properties.title;\n    document.getElementById(\"\
    txtdescription\").innerText = shareOperation.data.properties.description;\n  \
    \  document.getElementById(\"txtdata\").innerText = content;\n}\n```\n\nThe complete\
    \ code of the `DataSharingDemo.js` file is shown here:\n\n```javascript\n(function\
    \ () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            // Initialize the activation handler\n            WinJS.Application.addEventListener(\"\
    activated\", activatedShareHandler, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n\n/// <summary>\n/// Function to handle\
    \ the activation\n/// </summary>\n/// <param name=\"eventArgs\">\n/// Arguments\
    \ of the event. In the case of the Share contract, it has the ShareOperation\n\
    /// </param>\nfunction activatedShareHandler(eventObject) {\n    // Check if the\
    \ Share Contract was the cause of this sharing\n    if (eventObject.detail.kind\
    \ === Windows.ApplicationModel.Activation.ActivationKind.shareTarget) {\n    \
    \    eventObject.setPromise(WinJS.UI.processAll());\n        // ShareOperation\
    \ object in initiliaze with the eventObject event argument\n        shareOperation\
    \ = eventObject.detail.shareOperation;\n        //check if shareOperation has\
    \ text Sharing enable or data shared using text\n        if (shareOperation.data.contains(Windows.ApplicationModel.DataTransfer.StandardDataFormats.text))\
    \ {\n            shareOperation.data.getTextAsync().done(function (text) {\n \
    \               dispReceivedContent(text);\n            }, function (e) {\n  \
    \              displayError(\"Text: \", \"Error retrieving data: \" + e);\n  \
    \          });\n        }\n    }\n}\n\nfunction dispReceivedContent(content) {\n\
    \    document.getElementById(\"txttitle\").innerText = shareOperation.data.properties.title;\n\
    \    document.getElementById(\"txtdescription\").innerText = shareOperation.data.properties.description;\n\
    \    document.getElementById(\"txtdata\").innerText = content;\n}\n```\n\nWhen\
    \ you run a source app in Windows 10 (we are running another app that we developed\
    \ in Recipe 10.2), you see the screen shown in Figure [10-11](#A978-1-4842-0719-2_10_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0719-2_10_Fig11_HTML.jpg](A978-1-4842-0719-2_10_Fig11_HTML.jpg)\n\
    \n**Figure 10-11.** Share charm windows showing the target app\n\nAs shown in\
    \ Figure [10-11](#A978-1-4842-0719-2_10_Chapter.html#Fig11), the app **10.6_Receive\
    \ Sharing Data** is listed in the app’s Share charm share target list. When you\
    \ select the app, you see the data (title, description, and text) that was shared\
    \ from the source app, as highlighted in Figure [10-12](#A978-1-4842-0719-2_10_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0719-2_10_Fig12_HTML.jpg](A978-1-4842-0719-2_10_Fig12_HTML.jpg)\n\
    \n**Figure 10-12.** Share Charm windows showing the target app\n\n## 10.7 Receive\
    \ Images Shared by Other Apps\n\n### Problem\n\nYou need to develop a feature\
    \ that will allow users to receive an image shared by another Windows 10 app.\n\
    \n### Solution\n\nUse `shareOperation.data.getBitmapAsync` to receive the image\
    \ shared by another app."
  raw: '### How It Works


