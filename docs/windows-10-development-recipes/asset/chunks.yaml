    }\n```\n\n我们来过一遍这段代码。你刚刚定义了三条规则。其中一条规则用于外层网格。你使用了基于网格的显示方式，包含两列和一行。`Section A`\
    \ 放在第 1 列，`Section B` 放在第 2 列。由于尚未应用媒体查询，这些规则将始终生效。\n\n现在，你定义一个媒体查询，用于在屏幕最大宽度为\
    \ 320 时处理 UI。当应用在小屏幕上运行时，你希望布局变窄——仅有一列和两行。`Section A` 放在第 1 行，`Section B` 放在第\
    \ 2 行。将 CSS 规则放在同一个 CSS 文件（`default.css`）中。以下是该媒体查询的代码片段：\n\n```css\n@media (max-width:320px){\n\
    \    .appGrid {\n        display: -ms-grid;\n        -ms-grid-columns: 1fr;\n\
    \        grid-columns: 1fr;\n        -ms-grid-rows: 2fr 1fr;\n        grid-rows:\
    \ 2fr 1fr;\n        width: 100%;\n        height: 100%;\n        margin:12px;\n\
    \    }\n    .sectionA {\n        -ms-grid-row: 1;\n        -ms-grid-column: 1;\n\
    \        background-color: lightgray;\n        width: 100%;\n        height: 100%;\n\
    \    }\n    .sectionB {\n        -ms-grid-row: 2;\n        -ms-grid-column: 1;\n\
    \        background-color: lightblue;\n        width: 100%;\n        height: 100%;\n\
    \    }\n}\n```\n\n这表明当屏幕尺寸为 320px 或更小时，会应用新的样式规则。作为该样式规则的一部分，应用网格变为一列两行。这重新定位了\
    \ `Section A` 和 `Section B` 的位置。\n\n接下来，按 `F5` 运行应用。你可以在 Windows 10 Mobile 模拟器上运行应用，也可以在本地计算机上运行。图\
    \ 6-2 和图 6-3 显示了在手机和 PC 上的输出结果。\n\n![A978-1-4842-0719-2_6_Fig3_HTML.jpg](img/A978-1-4842-0719-2_6_Fig3_HTML.jpg)\n\
    \n**图 6-3.** Windows PC 上的输出\n\n![A978-1-4842-0719-2_6_Fig2_HTML.jpg](img/A978-1-4842-0719-2_6_Fig2_HTML.jpg)\n\
    \n**图 6-2.** Windows Mobile 上的输出\n\n## 6.3 自适应 UI 技术：流体布局\n\n### 问题\n\n你创建了一个布局，希望在其中显示列表视图中的项目数量。但你希望列表视图能够适应窄屏以及中屏或大屏。你希望列表视图项根据屏幕大小进行响应。\n\
    \n### 解决方案\n\nUWP 中的 `ListView` 控件用于需要显示大量项目的场景。顾名思义，列表视图在屏幕上渲染一个列表，每个项绑定到一个数据项。可以通过提供模板来自定义列表视图的每个项。`ListView`\
    \ 还有一个称为 `Layout` 的概念。`Layout` 定义了项目在屏幕上的分布方式。它内置支持两种布局：`ListLayout` 和 `GridLayout`。`ListLayout`\
    \ 用于单列/多行渲染。`GridLayout` 渲染基于网格的布局（即行和列占据屏幕上的可用空间）。\n\n### 工作原理\n\n打开 `Visual\
    \ Studio 2015`。选择 **文件** ➤ **新建项目** ➤ **JavaScript** ➤ **Windows 通用** ➤ **空白应用（通用\
    \ Windows）** 模板。这将创建一个通用 Windows 应用模板（见图 6-4）。\n\n![A978-1-4842-0719-2_6_Fig4_HTML.jpg](img/A978-1-4842-0719-2_6_Fig4_HTML.jpg)\n\
    \n**图 6-4.**\n"
- fmt: "## New Project Dialog\n\n创建一个名为`weatherData.js`的新文件放在`js`文件夹中，添加一个立即调用的函数表达式。以下是代码片段：\n\
    \n```javascript\n(function (undefined) {\n    'use strict';\n    //rest of the\
    \ code here\n})();\n```\n\n接下来，在函数体中的`'use strict'`语句后创建一个天气数据数组，如下所示。为了本示例演示，我们构建虚构的天气数据。以下是代码片段：\n\
    \n```javascript\nvar weatherData = [\n    {\n        date: formatDateString(new\
    \ Date().getDate()),\n        imgSrc: \"images/tile-snow.png\",\n        hi: \"\
    32°\",\n        low: \"16°\",\n        temp: \"24°\",\n        feelsLike: \"28°\"\
    ,\n        chanceOfSnow: \"88%\"\n    }\n    //add more items here\n];\n```\n\n\
    接下来，创建一个格式化日期的函数。你想要以“Sun 10”模式显示日期。你需要自定义日期字符串以便显示。以下是`formatDateString`函数的代码片段：\n\
    \n```javascript\nfunction formatDateString(date) {\n    var daysOfWeek = [\"Sun\"\
    ,\"Mon\",\"Tues\",\"Wed\",\"Thurs\",\"Fri\",\"Sat\"];\n    var nearDays = [\"\
    Yesterday\",\"Today\",\"Tomorrow\"];\n    var dayDelta = date - new Date().getDate()\
    \ + 1;\n    var dateString = \"\";\n    if (dayDelta < 3) {\n        dateString\
    \ = nearDays[dayDelta];\n    }\n    else {\n        dateString = daysOfWeek[date\
    \ % 7] +\n        \" <span class='day'>\" + date + \"</span>\";\n    }\n    return\
    \ dateString;\n};\n```\n\n你需要暴露这个`weatherData`数组，以便在`default.html`中使用它并将其绑定到列表视图。创建一个命名空间并暴露`weatherData`，如下所示：\n\
    \n```javascript\nvar weatherDataList = new WinJS.Binding.List(weatherData);\n\
    WinJS.Namespace.define(\"FluidApp.Data\", {\n    weatherData : weatherDataList\n\
    })\n```\n\n您已经创建了一个名为`FluidApp.Data`的命名空间，并将`weatherData`作为公共属性暴露出来，该属性可以绑定到任何`win`控件上。\n\
    \n你需要添加对`weatherData.js`的引用。在`default.html`的`head`部分中添加以下脚本标签。在`default.js`脚本文件引用之前添加此引用：\n\
    \n```html\n<script src=\"/js/weatherData.js\"></script>\n```\n\n接下来，您需要创建用户界面。在`default.html`中，移除`<body>`标签内的默认内容。添加以下用于显示列表视图中每个项目的模板：\n\
    \n```html\n<div id=\"weatherTemplate\" class=\"dayTemplate\" data-win-\ncontrol=\"\
    WinJS.Binding.Template\">\n<div class=\"dayGrid\">\n    <div class=\"win-type-x-large\
    \ dayDate\"\n                data-win-bind=\"innerHTML: date\">\n    </div>\n\
    \    <div class=\"dayImg\">\n        <img data-win-bind=\"src: imgSrc\" />\n \
    \   </div>\n    <div class=\"win-type-x-large dayHighLow\">\n        <span class=\"\
    dayHigh\" data-win-bind=\"innerHTML: hi\"></span>\n        <span>/</span>\n  \
    \      <span class=\"dayLow\" data-win-bind=\"innerHTML: low\"></span>\n    </div>\n\
    \    <div class=\"dayFeelsLike\">\n        <span>Feels like </span>\n        <span\
    \ data-win-bind=\"innerHTML: feelsLike\"></span>\n    </div>\n    <div class=\"\
    dayChanceOfSnow\">\n        <span>Chance of snow is </span>\n        <span data-win-bind=\"\
    innerHTML: chanceOfSnow\"></span>\n    </div>\n</div>\n</div>\n```\n\n接下来，让我们添加`ListView`控件。将以下代码片段粘贴到上一步创建的模板之后：\n\
    \n```html\n<div id=\"weatherListView\" class=\"weatherListView\"\n    data-win-control=\"\
    WinJS.UI.ListView\"\n    data-win-options=\"{\n      itemDataSource:FluidApp.Data.weatherData.dataSource,\n\
    \      itemTemplate:select('#weatherTemplate'),\n      layout:WinJS.UI.GridLayout}\"\
    ></div>\n```\n\n您已经创建了一个列表视图，并提供了`weatherData`作为项目数据源。您还提供了项目模板。您已将列表视图的布局默认设置为`GridLayout`。您将根据屏幕尺寸调整来更改列表视图的此布局属性。\n\
    \n打开位于`js`文件夹中的`default.js`。使用以下代码片段修改`app.onactivated`函数：\n\n```javascript\n\
    app.onactivated = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n        } else {\n        }\n        args.setPromise(WinJS.UI.processAll().then(function\
    \ ready() {\n            var listView = document.querySelector(\"#weatherListView\"\
    );\n            var listViewLayout = new WinJS.UI.GridLayout();\n            if\
    \ (document.body.clientWidth <= 320) {\n                listViewLayout = new WinJS.UI.ListLayout();\n\
    \            }\n            listView.layout = listViewLayout;\n            window.addEventListener(\"\
    resize\", resizeListView, false)\n        }));\n    }\n};\n```\n\n让我们来解读一下这段代码。一旦\
    \ UI 处理完成，首先获取列表视图。然后检查当前运行屏幕的宽度。如果宽度小于或等于 320（即您处于小屏幕上），则相应地更改列表视图的布局。如果处于小屏幕，则使用`ListLayout`；否则，将其设置为`GridLayout`。您还注册了一个事件监听器来监听窗口的调整大小事件。接下来，让我们看看调整大小事件处理程序的作用。\n\
    \n在`app.onactivated`函数之后，创建一个新函数`resizeListView`，并粘贴以下代码片段：\n\n```javascript\n\
    function resizeListView() {\n    var listview = document.querySelector(\"#weatherListView\"\
    ).winControl;\n    if (document.body.clientWidth <= 320) {\n        if (!(listview.layout\
    \ instanceof WinJS.UI.ListLayout)) {\n            listview.layout = new WinJS.UI.ListLayout();\n\
    \        }\n    }\n    else {\n        if (listview.layout instanceof WinJS.UI.ListLayout)\
    \ {\n            listview.layout = new WinJS.UI.GridLayout();\n        }\n   \
    \ }\n}\n```\n\n现在，在移动设备或 PC 上运行应用程序以查看输出。按`F5`运行应用程序。图[6-5](#A978-1-4842-0719-2_6_Chapter.html#Fig5)所示的屏幕截图是在\
    \ Windows 10 移动版上，而图[6-6](#A978-1-4842-0719-2_6_Chapter.html#Fig6)所示的屏幕截图是在 Windows\
    \ 10 PC 上。\n\n![A978-1-4842-0719-2_6_Fig6_HTML.jpg](A978-1-4842-0719-2_6_Fig6_HTML.jpg)\n\
    \nFigure 6-6. Output on a Windows PC\n\n![A978-1-4842-0719-2_6_Fig5_HTML.jpg](A978-1-4842-0719-2_6_Fig5_HTML.jpg)\n\
    \nFigure 6-5. Output on a Windows 10 Mobile\n\n您刚刚实现的是针对不同屏幕尺寸量身定制的 UI。您使用了`ListView`布局技术，根据屏幕尺寸显示网格或列表布局。\n\
    \n---\n\n# Chapter 7: Application Lifecycle and Navigation\n\n本章介绍通用 Windows 应用程序事件和生命周期，涵盖启动\
    \ Windows 应用时引发的标准事件集以及如何处理这些事件。本章介绍开发人员如何处理应用程序的挂起和终止。它还介绍如何在这些事件期间保存和恢复数据，这有助于开发人员提供更好的用户体验。\n\
    \n本章还介绍了导航模型，并解释了如何构建一个可以包含多个虚拟 HTML 页面的单页应用。\n\n## 7.1 Application States and\
    \ Events\n\n### Problem\n\n您需要在用户启动、关闭或恢复应用程序时识别并订阅应用程序中的各种事件。\n\n### Solution\n\
    \n使用通用 Windows 应用项目中的`default.js`文件来订阅和处理应用程序生命周期中的各种事件。"
