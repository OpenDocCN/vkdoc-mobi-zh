        `// on success of getting the location`     `function onsuccess(pos) {`         `document.getElementById(''latitude'').innerHTML
    = pos.coords.latitude;`         `document.getElementById(''longitude'').innerHTML
    = pos.coords.longitude;`     `}`     `// On error when trying to get the location`
        `function Onerror(error) {`         `var errorMessage = "";`         `switch
    (error.code) {`             `case error.PERMISSION_DENIED:`                 `errorMessage
    = "Location is disabled";`                 `break;`             `case error.POSITION_UNAVAILABLE:`
                    `errorMessage = "Data unavailable";`                 `break;`
                `case error.TIMEOUT:`                 `errorMessage = "Timeout error";`
                    `break;`             `default:`                 `break;`         `}`
            `document.getElementById("status").innerHTML = errorMessage;`     `}`
        `app.oncheckpoint = function (args) {`     `};`     `app.start();` `})();`
      Add the click event handler for the Start Tracking and Stop Tracking buttons.
    The `document.querySelector` is used to get the button control and the `addEventListener`
    method is used to add the click event to the tracking buttons. The tracking is
    handled by the `watchPosition` method of the `window.navigator.geolocation` class,
    as follows: `if (geolocation == null) {`             `geolocation = window.navigator.geolocation;`
    `}` `if (geolocation != null) {`             `positionInstance = geolocation.watchPosition(onsuccess,
    onerror);` `}` When the coordinates are retrieved, the `Onsuccess` method is invoked,
    which is used to process the result and display it. When there is any issue getting
    the location, the `Onerror` method is invoked with the appropriate error code,
    which can be used by the developer to display a user-friendly message for each
    error code. To stop the track, the `clearWatch` method of the geolocation needs
    to be called by providing the `watchid` parameter that was retrieved initially
    with the `watchPosition` function. `geolocation.clearWatch(positionInstance);`
      Build and run the project on the local machine.   In the app, click the Start
    button. The app immediately prompts the user to allow the app to use the location
    API. Once you click Allow, you should immediately see the latitude and the longitude
    of the current location, and the tracking of the location begins, as shown in
    Figure [12-8](#A978-1-4842-0719-2_12_Chapter.html#Fig8).


    ![A978-1-4842-0719-2_12_Fig8_HTML.jpg](A978-1-4842-0719-2_12_Fig8_HTML.jpg)


    Figure 12-8.


    Detect location updates in Windows Store app using HTML5   Note


    The W3C Geolocation API currently works only for the Windows desktop device family.
    It is not supported on Windows 10 Mobile.


    ## 12.5 Display Maps in the Built-in Maps App


    ### Problem


    You want to display a map and plot the location in the built-in Maps app.


    ### Solution


    Use the `bingmaps` `:` URI scheme from your Universal Windows app to display the
    map in the built-in Maps app.'
  trans: "\n### 工作原理\n\n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual\
    \ Studio 2015 的“新建项目”对话框中的 JavaScript ➤ Windows ➤ Universal 节点下。这会在 Visual Studio\
    \ 解决方案中创建一个单一项目，其中包含开始所需的必要文件。\n\n在应用中集成定位功能的第一步是在 Windows 应用的 `package.appxmanifest`\
    \ 文件中声明位置功能。从 Visual Studio 解决方案资源管理器中，双击 `package.appxmanifest` 文件。在 GUI 设计器中，点击“功能”选项卡，然后勾选“位置”。\n\
    \n打开 Windows 应用的 `default.html` 文件，并在文件的 body 标签下添加以下代码：\n```\n<h1>使用 HTML5 获取当前位置</h1>\n\
    <button id=\"btnstart\">开始</button> <button id=\"btnstop\">停止</button> <br />\n\
    <label>纬度</label> <div id=\"latitude\"></div><br />\n<label>经度</label> <div id=\"\
    longitude\"> </div><br />\n<div id=\"status\"> </div><br />\n```\n\n打开 Windows\
    \ 项目中的 `default.js`（`/js/default.js`）文件，并将文件中的代码替换为以下内容：\n```\n(function () {\n\
    \    \"use strict\";\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                done(function () {\n                    document.querySelector(\"\
    #btnstart\").addEventListener(\"click\",\n                        starttracking);\n\
    \                    document.querySelector(\"#btnstop\").addEventListener(\"\
    click\",\n                        stoptracking);\n                }));\n     \
    \   }\n    };\n    var geolocation = null;\n    var positionInstance;\n    //\
    \ 点击开始追踪按钮时\n    function starttracking() {\n        if (geolocation == null)\
    \ {\n            geolocation = window.navigator.geolocation;\n        }\n    \
    \    if (geolocation != null) {\n            positionInstance = geolocation.watchPosition(onsuccess,\
    \ onerror);\n        }\n    }\n    // 点击停止追踪按钮时\n    function stoptracking() {\n\
    \        geolocation.clearWatch(positionInstance);\n    }\n    // 获取位置成功时\n  \
    \  function onsuccess(pos) {\n        document.getElementById('latitude').innerHTML\
    \ = pos.coords.latitude;\n        document.getElementById('longitude').innerHTML\
    \ = pos.coords.longitude;\n    }\n    // 尝试获取位置出错时\n    function Onerror(error)\
    \ {\n        var errorMessage = \"\";\n        switch (error.code) {\n       \
    \     case error.PERMISSION_DENIED:\n                errorMessage = \"位置功能已禁用\"\
    ;\n                break;\n            case error.POSITION_UNAVAILABLE:\n    \
    \            errorMessage = \"数据不可用\";\n                break;\n            case\
    \ error.TIMEOUT:\n                errorMessage = \"超时错误\";\n                break;\n\
    \            default:\n                break;\n        }\n        document.getElementById(\"\
    status\").innerHTML = errorMessage;\n    }\n    app.oncheckpoint = function (args)\
    \ {\n    };\n    app.start();\n})();\n```\n\n为“开始追踪”和“停止追踪”按钮添加点击事件处理程序。使用 `document.querySelector`\
    \ 获取按钮控件，并使用 `addEventListener` 方法为追踪按钮添加点击事件。追踪由 `window.navigator.geolocation`\
    \ 类的 `watchPosition` 方法处理，如下所示：\n```\nif (geolocation == null) {\n    geolocation\
    \ = window.navigator.geolocation;\n}\nif (geolocation != null) {\n    positionInstance\
    \ = geolocation.watchPosition(onsuccess, onerror);\n}\n```\n当获取到坐标时，会调用 `Onsuccess`\
    \ 方法，该方法用于处理结果并显示。如果获取位置时出现任何问题，则会调用 `Onerror` 方法，并附带相应的错误代码，开发者可以利用该错误代码为每个错误代码显示用户友好的消息。要停止追踪，需要通过提供最初使用\
    \ `watchPosition` 函数获取的 `watchid` 参数来调用 `geolocation` 的 `clearWatch` 方法。\n```\n\
    geolocation.clearWatch(positionInstance);\n```\n\n在本地计算机上生成并运行该项目。\n\n在应用中，点击“开始”按钮。应用会立即提示用户允许该应用使用位置\
    \ API。一旦点击“允许”，您应立即看到当前位置的纬度和经度，并且位置追踪开始，如图 12-8 所示。\n\n![A978-1-4842-0719-2_12_Fig8_HTML.jpg](img/A978-1-4842-0719-2_12_Fig8_HTML.jpg)\n\
    \n**图 12-8.** 使用 HTML5 在 Windows 应用商店应用中检测位置更新\n\n> **注意**\n> W3C Geolocation\
    \ API 目前仅适用于 Windows 桌面设备系列。它不受 Windows 10 Mobile 支持。\n\n## 12.5 在内置地图应用中显示地图\n\
    \n### 问题\n\n您希望在内置地图应用中显示地图并绘制位置。\n\n### 解决方案\n\n使用通用 Windows 应用中的 `bingmaps`\
    \ `:` URI 方案在内置地图应用中显示地图。\n"
- fmt: "### How It Works\n\nCreate a new Universal Windows project using the Universal\
    \ Windows template, which can be found under JavaScript ➤ Windows ➤ Universal\
    \ node of the New Project dialog in Microsoft Visual Studio 2015. This creates\
    \ a single project in the Visual Studio Solution with the necessary files in it\
    \ to start with.\n\nOpen the `default.html` file from the project, and add the\
    \ following code under the `<body>` tag of the file:\n\n```html\n<h1>Display Map</h1>\n\
    <button id=\"btnDisplayMap\">Display Map</button> <br />\n```\n\nOpen `default.js`\
    \ (`/js/default.js`) in the project and replace the code in the file with the\
    \ following:\n\n```javascript\n(function () {\n    \"use strict\";\n    var app\
    \ = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().done(function\
    \ () {\n                // Add an event handler to the button.\n             \
    \   document.querySelector(\"#btnDisplayMap\").addEventListener(\"click\", DisplayMap);\n\
    \            }));\n        }\n    };\n    // Method to display the Built-in Map.\n\
    \    function DisplayMap() {\n        var latitude = \"12.917264\";\n        var\
    \ longitude = \"77.634786\";\n        var uri = \"bingmaps:?cp=\" + latitude +\
    \ \"∼\" + longitude + \"lvl=10\";\n        Windows.System.Launcher.launchUriAsync(new\
    \ Windows.Foundation.Uri(uri));\n    }\n    app.oncheckpoint = function (args)\
    \ {\n    };\n    app.start();\n})();\n```\n\nThe `bingmaps:` URI scheme can be\
    \ used to launch the Maps app from your Windows app. The `LaunchUriAsync` method\
    \ is generally used to launch another app from the Windows Store app using the\
    \ URI scheme. In this case, the `bingmaps:` URI scheme is used to launch the Maps\
    \ app.\n\n> **Note**  \n> When using the `LaunchUriAsync` method, the user is\
    \ taken to another app on the device and the user has to manually return to your\
    \ app after using the Maps app.\n\nDevelopers can provide appropriate parameters\
    \ to the URI scheme to display the location, or even to display the route on the\
    \ map. For example, the following URI scheme opens the Bing Maps app and displays\
    \ a map centered over the city of Bangalore in India:\n\n```\nBingmaps:? Cp=12.917264∼77.634786\n\
    ```\n\nDevelopers can use some of the parameters shown in Table 12-1 along with\
    \ the `bingmaps:` URI scheme.\n\n**Table 12-1.** Examples of the Different Parameters\
    \ Used with the `bingmaps:` URI\n\n| Parameter | Example |\n| --- | --- |\n| `cp`\
    \ (Center Point) | `cp=40.726966∼-74.006076` |\n| `bb` (Bounding box) | `bb=39.719_-74.52∼41.71_-73.5`\
    \ |\n| `q` (Query term or search term) | `q=mexican%20restaurants` |\n| `lvl`\
    \ (Zoom Level) | `lvl=10.50` |\n| `trfc` (Specify to include traffic information\
    \ in map) | `trfc=1` |\n| `rtp` (route) | `rtp=adr.One%20Microsoft%20Way,%20Redmond,\
    \ %20WA∼pos.45.23423_-122.1232` |\n\n> **Note**  \n> Bing Maps includes a lot\
    \ of parameters; Table 12-1 shows only a few of them. More information about the\
    \ parameters for Bing Maps can be found at [`http://msdn.microsoft.com/en-us/library/windows/apps/xaml/jj635237.aspx`](http://msdn.microsoft.com/en-us/library/windows/apps/xaml/jj635237.aspx).\n\
    \n![A978-1-4842-0719-2_12_Fig9_HTML.jpg](A978-1-4842-0719-2_12_Fig9_HTML.jpg)\n\
    \n**Figure 12-9.** Built-in maps in the Windows Mobile app\n\nNow, build the project\
    \ and run it. Click the **Display Map** button on the screen. If you are running\
    \ the Windows app on the Windows Mobile emulator, you should see the built-in\
    \ map with the location being plotted, as shown in Figure 12-9.\n\nIf the app\
    \ is run on Windows desktop using the **Local Machine** option, the Maps app shows\
    \ the location (see Figure 12-10).\n\n![A978-1-4842-0719-2_12_Fig10_HTML.jpg](A978-1-4842-0719-2_12_Fig10_HTML.jpg)\n\
    \n**Figure 12-10.** Built-in maps in Windows desktop family\n\n> **Note**  \n\
    > The `bingmaps:` URI scheme is a replacement for the `MapsTask` launcher that\
    \ was available in Windows Phone 8.1 and earlier versions.\n\n## 12.6 Display\
    \ Directions in the Built-in Maps App\n\n### Problem\n\nYou want to display the\
    \ directions or route from one location to another in the built-in Maps apps of\
    \ the Windows device.\n\n### Solution\n\nThe `bingmaps:` URI scheme with the `rtp`\
    \ parameter can be used from your Windows app to display the map in the built-in\
    \ Maps app, as well as show the point-to-point driving directions from one location\
    \ to another."
  raw: '### How It Works


    Create a new Universal Windows project using the Universal Windows template, which
    can be found under JavaScript ➤ Windows ➤ Universal node of the New Project dialog
    in Microsoft Visual Studio 2015\. This creates a single project in the Visual
    Studio Solution with the necessary files in it to start with.   Open the default.html
    file from the project, and add the following code under the body tag of the file:
    `<h1>Display Map</h1>` `<button id="btnDisplayMap">Display Map</button> <br />`
      Open default.js (/js/default.js) in the project and replace the code in the
    file with the following: `(function () {`     `"use strict";`     `var app = WinJS.Application;`
        `var activation = Windows.ApplicationModel.Activation;`     `app.onactivated
    = function (args) {`         `if (args.detail.kind === activation.ActivationKind.launch)
    {`             `if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)
    {`             `} else {`             `}`             `args.setPromise(WinJS.UI.processAll().`
                      `done(function () {`                       `// Add an event
    handler to the button.`                       `document.querySelector("#btnDisplayMap").addEventListener("click",`
                              `DisplayMap);`                   `}));`         `}`
        `};` `// Method to display the Built-in Map.`     `function DisplayMap() {`
            `var latitude = "12.917264";`         `var longitude = "77.634786";`         `var
    uri = "bingmaps:?cp="+ latitude + "∼" + longitude + "lvl=10";`         `Windows.System.Launcher.launchUriAsync(new
    Windows.Foundation.Uri(uri));`     `}`     `app.oncheckpoint = function (args)
    {`     `};`     `app.start();` `})();`  


    The `bingmaps:` URI scheme can be used to launch the Maps app from your Windows
    app. The `LaunchUriAsync` method is generally used to launch another app from
    the Windows Store app using the URI scheme. In this case, the `bingmaps:` URI
    scheme is used to launch the Maps app.


    Note


    When using the `LaunchUriAsync` method, the user is taken to another app on the
    device and the user has to manually return to your app after using the Maps app.


    Developers can provide appropriate parameters to the URI scheme to display the
    location, or even to display the route on the map. For example, the following
    URI scheme opens the Bing Maps app and displays a map centered over the city of
    Bangalore in India:


    `Bingmaps:? Cp=12.917264∼77.634786`


    Developers can use the some of the parameters shown in Table [12-1](#A978-1-4842-0719-2_12_Chapter.html#Tab1)
    along with the `bingmaps:` URI scheme.


    Table 12-1.


    Examples of the Different Parameters Used with the bingmaps: URI


    | Parameter | Example |

    | --- | --- |

    | cp (Center Point) | cp=40.726966∼-74.006076 |

    | bb (Bounding box) | bb=39.719_-74.52∼41.71_-73.5 |

    | q (Query term or search term) | q=mexican%20restaurants |

    | lvl (Zoom Level) | lvl=10.50 |

    | trfc (Specify to include traffic information in map) | trfc=1 |

    | rtp (route) | rtp=adr.One%20Microsoft%20Way,%20Redmond, %20WA∼pos.45.23423_-122.1232
    |


    Note


    Bing Maps includes a lot of parameters; Table [12-1](#A978-1-4842-0719-2_12_Chapter.html#Tab1)
    shows only a few of them. More information about the parameters for Bing Maps
    can be found at [`http://msdn.microsoft.com/en-us/library/windows/apps/xaml/jj635237.aspx`](http://msdn.microsoft.com/en-us/library/windows/apps/xaml/jj635237.aspx)
    .


    ![A978-1-4842-0719-2_12_Fig9_HTML.jpg](A978-1-4842-0719-2_12_Fig9_HTML.jpg)


    Figure 12-9.


    Built-in maps in the Windows Mobile app Now, build the project and run it. Click
    the Display Map button on the screen. If you are running the Windows app on the
    Windows Mobile emulator, you should see the built-in map with the location being
    plotted, as shown in Figure [12-9](#A978-1-4842-0719-2_12_Chapter.html#Fig9).
     


    If the app is run on Windows desktop using the Local Machine option, the Maps
    app shows the location (see Figure [12-10](#A978-1-4842-0719-2_12_Chapter.html#Fig10)).


    ![A978-1-4842-0719-2_12_Fig10_HTML.jpg](A978-1-4842-0719-2_12_Fig10_HTML.jpg)


    Figure 12-10.


    Built-in maps in Windows desktop family Note


    The `bingmaps:` URI scheme is a replacement for the MapsTask launcher that was
    available in Windows Phone 8.1 and earlier versions.


    ## 12.6 Display Directions in the Built-in Maps App


    ### Problem


    You want to display the directions or route from one location to another in the
    built-in Maps apps of the Windows device.


    ### Solution


    The `bingmaps` `:` URI scheme with the `rtp` parameter can be used from your Windows
    app to display the map in the built-in Maps app, as well as show the point-to-point
    driving directions from one location to another.'
  trans: "\n### 工作原理\n\n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板可在 Microsoft Visual\
    \ Studio 2015 的“新建项目”对话框中的“JavaScript ➤ Windows ➤ Universal”节点下找到。这将在 Visual Studio\
    \ 解决方案中创建一个单一项目，其中包含开始项目所需的必要文件。\n\n打开项目中的 `default.html` 文件，并在文件的 `<body>` 标签下添加以下代码：\n\
    \n```html\n<h1>显示地图</h1>\n<button id=\"btnDisplayMap\">显示地图</button> <br />\n\
    ```\n\n打开项目中的 `default.js`（`/js/default.js`）文件，并将文件中的代码替换为以下内容：\n\n```javascript\n\
    (function () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var\
    \ activation = Windows.ApplicationModel.Activation;\n    app.onactivated = function\
    \ (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().done(function\
    \ () {\n                // 为按钮添加事件处理程序。\n                document.querySelector(\"\
    #btnDisplayMap\").addEventListener(\"click\", DisplayMap);\n            }));\n\
    \        }\n    };\n    // 显示内置地图的方法。\n    function DisplayMap() {\n        var\
    \ latitude = \"12.917264\";\n        var longitude = \"77.634786\";\n        var\
    \ uri = \"bingmaps:?cp=\" + latitude + \"∼\" + longitude + \"lvl=10\";\n     \
    \   Windows.System.Launcher.launchUriAsync(new Windows.Foundation.Uri(uri));\n\
    \    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n})();\n\
    ```\n\n`bingmaps:` URI 方案可用于从你的 Windows 应用启动地图应用。`LaunchUriAsync` 方法通常用于通过 URI\
    \ 方案从 Windows 应用商店应用启动另一个应用。在此例中，`bingmaps:` URI 方案用于启动地图应用。\n\n> **注意**  \n>\
    \ 使用 `LaunchUriAsync` 方法时，用户会被带到设备上的另一个应用，并且在使用完地图应用后，必须手动返回你的应用。\n\n开发者可以为 URI\
    \ 方案提供适当的参数来显示位置，甚至在地图上显示路线。例如，以下 URI 方案会打开必应地图应用，并显示以印度班加罗尔市为中心的地图：\n\n```\n\
    Bingmaps:? Cp=12.917264∼77.634786\n```\n\n开发者可以将表 12-1 中显示的一些参数与 `bingmaps:` URI\
    \ 方案一起使用。\n\n**表 12-1.** 与 `bingmaps:` URI 一起使用的不同参数示例\n\n| 参数 | 示例 |\n| --- |\
    \ --- |\n| `cp` (中心点) | `cp=40.726966∼-74.006076` |\n| `bb` (边界框) | `bb=39.719_-74.52∼41.71_-73.5`\
    \ |\n| `q` (查询词或搜索词) | `q=mexican%20restaurants` |\n| `lvl` (缩放级别) | `lvl=10.50`\
    \ |\n| `trfc` (指定在地图中包含交通信息) | `trfc=1` |\n| `rtp` (路线) | `rtp=adr.One%20Microsoft%20Way,%20Redmond,\
    \ %20WA∼pos.45.23423_-122.1232` |\n\n> **注意**  \n> 必应地图包含许多参数；表 12-1 仅显示了其中的一部分。有关必应地图参数的更多信息，请访问\
    \ [`http://msdn.microsoft.com/en-us/library/windows/apps/xaml/jj635237.aspx`](http://msdn.microsoft.com/en-us/library/windows/apps/xaml/jj635237.aspx)。\n\
    \n![A978-1-4842-0719-2_12_Fig9_HTML.jpg](img/A978-1-4842-0719-2_12_Fig9_HTML.jpg)\n\
    \n**图 12-9.** Windows 移动应用中的内置地图\n\n现在，生成项目并运行它。单击屏幕上的 **显示地图** 按钮。如果你在 Windows\
    \ 移动模拟器上运行 Windows 应用，应该会看到内置地图显示定位的位置，如图 12-9 所示。\n\n如果使用 **本地计算机** 选项在 Windows\
    \ 桌面上运行应用，地图应用会显示该位置（参见图 12-10）。\n\n![A978-1-4842-0719-2_12_Fig10_HTML.jpg](img/A978-1-4842-0719-2_12_Fig10_HTML.jpg)\n\
    \n**图 12-10.** Windows 桌面系列中的内置地图\n\n> **注意**  \n> `bingmaps:` URI 方案是 Windows\
    \ Phone 8.1 及更早版本中可用的 `MapsTask` 启动器的替代方案。\n\n## 12.6 在内置地图应用中显示路线\n\n### 问题\n\
    \n你希望在 Windows 设备的内置地图应用中显示从一个位置到另一个位置的路线或方向。\n\n### 解决方案\n\n可以从你的 Windows 应用中使用带有\
    \ `rtp` 参数的 `bingmaps:` URI 方案，在内置地图应用中显示地图，并显示从一处到另一处的点对点驾驶路线。\n"
- fmt: "### How It Works\n\nCreate a new Universal Windows project using the Universal\
    \ Windows template, which can be found under `JavaScript ➤ Windows ➤ Universal`\
    \ node of the New Project dialog in Microsoft Visual Studio 2015. This creates\
    \ a single project in the Visual Studio Solution with the necessary files in it\
    \ to start with.\n\nOpen the `default.html` file from the project using Visual\
    \ Studio Solution Explorer, and add the following code under the `body` tag of\
    \ each file: `<h1>Display Map</h1>` `<button id=\"btnDisplayRoute\">Display Route</button>\
    \ <br />`\n\nOpen `default.js` (`/js/default.js`) in the project and replace the\
    \ code in the file with the following:\n\n```\n(function () {\n    \"use strict\"\
    ;\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                 done(function () {\n                     // Add an event handler\
    \ to the button.\n                     document.querySelector(\"#btnDisplayRoute\"\
    ).addEventListener(\"click\",\n                         DisplayRoute);\n     \
    \            }));\n        }\n    };\n    function DisplayRoute() {\n        var\
    \ fromAddress = \"adr.HSR Layout 5th sector, Bangalore\";\n        var toAddress\
    \ = \"adr.Microsoft India,Signature Building,Bangalore\";\n        var uri = \"\
    bingmaps:?rtp=\" + fromAddress + \"∼\"+ toAddress;\n        Windows.System.Launcher.launchUriAsync(new\
    \ Windows.Foundation.Uri(uri));\n        //Windows.Services.Maps.MapManager.showDownloadedMapsUI()\n\
    \    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n})();\n\
    ```\n\nThe `bingmaps:` URI scheme can be used to launch the Maps app from your\
    \ Windows apps. The `LaunchUriASync` method is generally used to launch another\
    \ app from the Windows app using the URI scheme. In this case, the `bingmaps:`\
    \ URI scheme with the `rtp` parameter is used to launch the built-in map and then\
    \ display the driving directions from the specified address to the specified location.\n\
    \n> **Note**  \n> When the `LaunchUriAsync` method is used, the user is taken\
    \ to another app on the device; the user has to manually return to your app after\
    \ using the Maps app.\n\nDevelopers can include the `trfc=1` parameter along with\
    \ the URI to display the traffic information.\n\n```\n\"bingmaps:?rtp=adr.HSR\
    \ Layout 5th sector, Bangalore∼adr.Microsoft India,Signature Building,Bangalore&trfc=1\"\
    ;\n```\n\nIn the preceding URI scheme, the `adr.` defines the address. The `rtp`\
    \ takes two waypoints to find the route. The `trfc` parameter is provided to display\
    \ the traffic information as well.\n\n![A978-1-4842-0719-2_12_Fig11_HTML.jpg](A978-1-4842-0719-2_12_Fig11_HTML.jpg)\n\
    \n**Figure 12-11.** Directions in Windows Mobile\n\nBuild the project and run\
    \ it. Click the `Display Route` button on the screen. If you are running the Windows\
    \ app on a Windows Mobile emulator, you should see the built-in map with the location\
    \ being plotted, as shown in Figure [12-11](#A978-1-4842-0719-2_12_Chapter.html#Fig11).\n\
    \nIf the Windows app is run on the desktop family, the Maps app is used to show\
    \ the location, as shown in Figure [12-12](#A978-1-4842-0719-2_12_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0719-2_12_Fig12_HTML.jpg](A978-1-4842-0719-2_12_Fig12_HTML.jpg)\n\
    \n**Figure 12-12.** Directions in Windows app\n\n> **Note**  \n> The `bingmaps:`\
    \ URI scheme is a replacement for the `MapsDirectionsTask` launcher in Windows\
    \ Phone 8.\n\n## 12.7 Bing Maps Control in the Windows Store App\n\n### Problem\n\
    \nYou want to use the maps in your Windows app instead of launching the built-in\
    \ Maps app.\n\n### Solution\n\nUse the Bing Maps AJAX Control 7.0 to add map functionality\
    \ within the Universal Windows app developed using WinJS.\n\n### How It Works\n\
    \nBing Maps is an online mapping service from Microsoft that allows users to use\
    \ the map solution from Microsoft and utilize various features of the Bing maps.\
    \ Bing Maps AJAX Control 7.0 and the Bing Maps REST Services provide unique opportunities\
    \ for developers to easily include location and search features into their mobile\
    \ and web applications.\n\nTo use Bing Maps AJAX Control 7.0, follow these steps:\n\
    \n1. Download and install the Bing Maps SDK for Windows Store apps (for Windows\
    \ 8.1, which also works for Windows 10) from [`http://go.microsoft.com/fwlink/?LinkID=322092`](http://go.microsoft.com/fwlink/?LinkID=322092).\n\
    \n2. Get the Bing Maps key. Go to the Bing Maps Account Center at [`https://www.bingmapsportal.com`](https://www.bingmapsportal.com)\
    \ and create a key for the application. You have to use this key in the Windows\
    \ Store app.\n\n3. Create a new project using the Windows Store app template in\
    \ Microsoft Visual Studio 2013, which creates a Windows Store app.\n\n4. Add the\
    \ reference of the Bing Maps for JavaScript to the project. In Solution Explorer,\
    \ right-click the project references and select Add Reference and Bing Maps for\
    \ JavaScript. Click OK, as shown in Figure [12-13](#A978-1-4842-0719-2_12_Chapter.html#Fig13).\n\
    \n![A978-1-4842-0719-2_12_Fig13_HTML.jpg](A978-1-4842-0719-2_12_Fig13_HTML.jpg)\n\
    \n**Figure 12-13.**"
