    DOMContentLoaded\", GetControl);\n})();\n```\n\n上述代码为 `selectImageButton` 控件添加了一个侦听器，如粗体行所示。\n\
    \n除了添加侦听器之外，它还声明了一个名为 `objimgFile` 的变量，该变量保存着你将在以下函数中使用的图像对象。\n\n添加一个 `selectImage`\
    \ 函数，它是“选择图像”按钮点击事件的侦听器。此函数使用 `FileOpenPicker` 方法，允许用户从设备中选择图像。\n\n```\nfunction\
