  raw: '### How It Works


    Semantic zoom can be implemented using the SemanticZoom control in WinJS. Think
    of a scenario where you have a list of employees that can be grouped by the technology
    that they are working with. To allow the user to navigate between the technologies
    easily, you can use the semantic zoom, in which you see the employees grouped
    into categories by default, and when you zoom out, you see only the list of technologies.


    Create a new Universal Windows app in Visual Studio 2015 and open the `default.html`
    page. Replace the existing code with what’s provided next.


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>Recipe4.6</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-light.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- Recipe4.6 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


        `<script src="/js/data.js"></script>`


    `</head>`


    `<body class="win-type-body">`


        `<h1>Recipe 4.6</h1>`


        `<!-- Zoom In-->`


        `<div id="GroupHeader" data-win-control="WinJS.Binding.Template">`


            `<h1 data-win-bind="innerText: technology"></h1>`


        `</div>`


        `<div id="EmployeeTemplate" data-win-control="WinJS.Binding.Template">`


            `<h2 data-win-bind="innerText:name"></h2>`


        `</div>`


        `<!-- Zoom out-->`


        `<div id="TechnologyTemplate" data-win-control="WinJS.Binding.Template">`


            `<h6 data-win-bind="innerText: technology"></h6>`


        `</div>`


        `<div id="szEmployee" data-win-control="WinJS.UI.SemanticZoom">`


            `<!-- Zoom In-->`


            `<div id="lvEmployees" data-win-control="WinJS.UI.ListView"`


                 `data-win-options="{`


             `itemTemplate: select(''#EmployeeTemplate''),`


             `groupHeaderTemplate: select(''#GroupHeader'')`


             `}">`


            `</div>`


            `<!-- Zoom Out-->`


            `<div id="lvTechnologies" data-win-control="WinJS.UI.ListView"`


                 `data-win-options="{`


             `itemTemplate: select(''#TechnologyTemplate'')`


             `}">`


            `</div>`


        `</div>`


    `</body>`


    `</html>`


    The preceding page contains a SemanticZoom control that has two ListView controls.
    The following is code in which the SemanticZoom control and the ListView are used.


    `<div id="szEmployee" data-win-control="WinJS.UI.SemanticZoom">`


            `<!-- Zoom In-->`


            `<div id="lvEmployees" data-win-control="WinJS.UI.ListView"`


                 `data-win-options="{`


             `itemTemplate: select(''#EmployeeTemplate''),`


             `groupHeaderTemplate: select(''#GroupHeader'')`


             `}">`


            `</div>`


            `<!-- Zoom Out-->`


            `<div id="lvTechnologies" data-win-control="WinJS.UI.ListView"`


                 `data-win-options="{`


             `itemTemplate: select(''#TechnologyTemplate'')`


             `}">`


            `</div>`


    `</div>`


    The SemanticZoom control includes two ListView controls with varied zoom levels.
    When the user tries to zoom in or zoom out, the ListView controls are switched
    accordingly.


    Let’s add a new JavaScript file to the project under the `js` folder and name
    it data.js. This file contains the item source and grouped data source for the
    ListView. Add the following code to the `data.js` file.


    `(function () {`


        `"use strict";`


        `function Initialize() {`


            `WinJS.UI.processAll().done(function () {`


                `var listView1 = document.getElementById("lvEmployees").winControl;`


                `var listView2 = document.getElementById("lvTechnologies").winControl;`


                `var employeeList = new WinJS.Binding.List([`


                    `{ id: 1, name: "Senthil Kumar", technology: "Mobile" },`


                    `{ id: 2, name: "Michael", technology: "Web" },`


                    `{ id: 3, name: "Lohith", technology: "Web" },`


                    `{ id: 4, name: "Stephen", technology: "Mobile" },`


                    `{ id: 5, name: "Vidyasagar", technology: "Game" },`


                    `{ id: 6, name: "Joseph", technology: "Mobile" },`


                `]);`


                `// Grouped Datasource`


                `var groupedEmployees = employeeList.createGrouped(`


                    `function (item) {`


                        `return item.technology;`


                    `},`


                    `function (item) {`


                        `return { technology: item.technology }`


                    `},`


                    `function (group1, group2) {`


                        `return group1 > group2 ? 1 : -1;`


                    `});`


                `listView1.groupDataSource = groupedEmployees.groups.dataSource;`


                `listView1.itemDataSource = groupedEmployees.dataSource;`


                `listView2.itemDataSource = groupedEmployees.groups.dataSource;`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", Initialize);`


    `})();`


    When you run the application, you should see the screen shown in Figure [4-9](#A978-1-4842-0719-2_4_Chapter.html#Fig9).


    ![A978-1-4842-0719-2_4_Fig9_HTML.jpg](A978-1-4842-0719-2_4_Fig9_HTML.jpg)


    Figure 4-9.


    SemanticZoom in the default view


    Click the – button that is displayed in the top-right corner of the screen, or
    zoom out using the stretch gesture.


    The alternative view is displayed in Figure [4-10](#A978-1-4842-0719-2_4_Chapter.html#Fig10).


    ![A978-1-4842-0719-2_4_Fig10_HTML.jpg](A978-1-4842-0719-2_4_Fig10_HTML.jpg)


    Figure 4-10.


    Alternate ListView shown using SemanticZoom


    ## 4.7 Using the AppBar Control


    ### Problem


    You need to provide quick access to the common tasks that are relevant to the
    current page or the current selection.


    ### Solution


    You can provide quick access to the common tasks that are relevant to the current
    page or the current selection by adding an app bar to your page. You can add the
    AppBar control to the page by setting the `data-win-control="WinJS.UI.AppBar"`
    attribute for the `div` element.'
  trans: "\n### 工作原理\n\n语义缩放功能可通过 WinJS 中的 `SemanticZoom` 控件实现。设想一个场景：你有一个员工列表，可按其使用的技术进行分组。为了让用户能轻松在各项技术之间导航，你可以使用语义缩放功能——默认情况下，用户看到的是按类别分组的员工视图；当缩小视图时，则只显示技术列表。\n\
    \n在 Visual Studio 2015 中创建一个新的通用 Windows 应用，并打开 `default.html` 页面。将现有代码替换为以下内容。\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.6</title>\n\
