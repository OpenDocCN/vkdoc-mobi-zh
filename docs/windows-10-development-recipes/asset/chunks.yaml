    \ Windows 应用的 `package.appxmanifest` 文件中声明位置功能。在 Visual Studio 解决方案资源管理器中，双击 `package.appxmanifest`\
    \ 文件。在 GUI 设计器中，点击“功能”选项卡并选择“位置”。\n\n打开 Windows 应用的 `default.html` 文件，并在文件的 `body`\
    \ 标签下添加以下代码。\n\n```\n<h1>使用 HTML5 获取当前位置</h1>\n<button id=\"btnLocation\">获取位置</button>\
    \ <br />\n<label>纬度</label> <div id=\"latitude\"></div><br />\n<label>经度</label>\
    \ <div id=\"longitude\"> </div><br />\n<div id=\"status\"> </div><br />\n```\n\
    \n打开项目中的 `default.js`（`/js/default.js`）。将文件中的代码替换为以下内容：\n\n```\n(function () {\n\
    \    \"use strict\";\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                done(function () {\n                    // 为按钮添加事件处理程序。\n   \
    \                 document.querySelector(\"#btnLocation\").addEventListener(\"\
    click\",\n                        GetLocation);\n                }));\n      \
    \  }\n    };\n    var nav = null;\n    function GetLocation() {\n        if (nav\
    \ == null) {\n            nav = window.navigator;\n        }\n        var geoloc\
    \ = nav.geolocation;\n        if (geoloc != null) {\n            geoloc.getCurrentPosition(Onsuccess,\
    \ Onerror);\n        }\n    }\n    // 获取位置信息后\n    function Onsuccess(position)\
    \ {\n        document.getElementById(\"latitude\").innerHTML =\n            position.coords.latitude;\n\
    \        document.getElementById(\"longitude\").innerHTML =\n            position.coords.longitude;\n\
    \    }\n    // 尝试获取位置时出错\n    function Onerror(error) {\n        var errorMessage\
    \ = \"\";\n        switch (error.code) {\n            case error.PERMISSION_DENIED:\n\
    \                errorMessage = \"位置已禁用\";\n                break;\n         \
    \   case error.POSITION_UNAVAILABLE:\n                errorMessage = \"数据不可用\"\
    ;\n                break;\n            case error.TIMEOUT:\n                errorMessage\
    \ = \"超时错误\";\n                break;\n            default:\n                break;\n\
    \        }\n        document.getElementById(\"status\").innerHTML = errorMessage;\n\
    \    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n})();\n\
    ```\n\n为“获取位置”按钮添加点击事件处理器。使用 `document.querySelector` 获取按钮控件，并使用 `addEventListener`\
    \ 方法添加点击事件并将其映射到 `GetLocation` 方法。\n\n```\ndocument.querySelector(\"#btnLocation\"\
    ).addEventListener(\"click\",\n                         GetLocation);\n```\n\n\
    使用 `window.navigator.geolocation` 类的 `getCurrentPosition` 方法获取用户当前的位置。\n\n```\n\
    if (nav == null) {\n            nav = window.navigator;\n        }\n        var\
    \ geoloc = nav.geolocation;\n        if (geoloc != null) {\n            geoloc.getCurrentPosition(Onsuccess,\
    \ Onerror);\n        }\n```\n\n成功获取当前位置后，控制权移交给 `Onsuccess` 方法来处理坐标并显示它。如果发生错误，则调用\
    \ `Onerror` 方法，该方法在获取位置信息出现问题时显示错误消息。\n\n在本地计算机上生成并运行项目。\n\n点击应用中的“获取位置”按钮，如图\
    \ 12-7 所示。应用会立即提示用户允许应用使用位置 API。点击“允许”后，您应该会立即看到当前位置的纬度和经度。\n\n![A978-1-4842-0719-2_12_Fig7_HTML.jpg](img/A978-1-4842-0719-2_12_Fig7_HTML.jpg)\n\
