    ➤ Blank App (Universal Windows) template. This creates a universal Windows app
    template (see Figure [6-1](#A978-1-4842-0719-2_6_Chapter.html#Fig1)).


    ![A978-1-4842-0719-2_6_Fig1_HTML.jpg](A978-1-4842-0719-2_6_Fig1_HTML.jpg)


