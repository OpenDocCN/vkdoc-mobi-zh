    in Windows and Windows Mobile projects, and add the following style sheet definition:
    `#basicListView{`     `height: 100%;`     `margin-top: 10px;`     `margin-right:
    20px;` `}` `#templateContainer{`     `display: -ms-grid;`     `-ms-grid-columns:
    1fr;`     `min-height: 150px;` `}` `#itemContainer{`     `background-color:lightgray;`
        `width:100%;`     `padding:10px;` `}`   Build and run the app by pressing
    F5 in Visual Studio. Figure [5-8](#A978-1-4842-0719-2_5_Chapter.html#Fig8) shows
    the output on a Windows Mobile screen.


    ![A978-1-4842-0719-2_5_Fig8_HTML.jpg](A978-1-4842-0719-2_5_Fig8_HTML.jpg)


    Figure 5-8.


    ListView Data Binding Output on a Windows Mobile Screen


    ## 5.5 Navigational Structures in UWP Apps


    ### Problem


    You want to split your application into multiple pages/screens to handle specific
    functionalities. You want to know what navigation structures should be followed
    to provide the best experience for moving between the pages/screens.


    ### Solution


    A real-world application rarely has just one page/screen, but is made up of many
    pages/screens. Each page/screen is responsible for a specific functionality. It
    is always better to divide your app into functionalities and assign a dedicated
    page/screen for handling that functionality. The navigation in UWP apps are based
    on navigational structures, elements, and system-level features. By providing
    the right navigation in your app, you are enabling an intuitive user experience
    for moving from one page to another or from this content to that content.


    Each page in your app will contain or cater to a specific set of content or functionality.
    For example, a contact management app will have a screen for listing the contacts,
    a screen for creating a contact, a screen for updating the contact, or a screen
    for deleting the contact. The navigation structure of the app is defined by how
    you organize different screens of the application. Figure [5-9](#A978-1-4842-0719-2_5_Chapter.html#Fig9)
    illustrates the different navigation structure that can be employed in an UWP
    app.


    ![A978-1-4842-0719-2_5_Fig9_HTML.jpg](A978-1-4842-0719-2_5_Fig9_HTML.jpg)


    Figure 5-9.


    Navigation structures


    The hierarchy navigation structure is a tree-like structure. Each child page has
    only one parent. To reach a child, you travel through the parent.


    Peer is a navigation structure where pages exist side by side. You can travel
    from one page to another in any order.


    The combination navigation structure uses both hierarchy and peer structures.
    Groups of pages are organized as peers or as hierarchies.


    ## 5.6 Navigational Elements in UWP Apps


    ### Problem


    You understand the navigational structures. You want to know what elements are
    available to achieve the navigation structure for your app.


    ### Solution


    A user can get to the content he wants to see with the help of many navigation
    elements. In some cases, the navigation elements indicate to users where the content
    is within the app. The navigational elements can be used as content or commanding
    elements. Hence, it is advised to use the navigational element that best suits
    your navigational structure. The following are some of the navigation elements
    available for UWP apps:


    *   Pivot: This control is used to display a persistent list of links to pages
    at the same level. This control can be used when you have a Peers navigation structure.

    *   SplitView: This control is used to display a list of links to top-level pages
    in an app. This can be used in a scenario where you need a Peers navigation structure.

    *   Hub: This control is used to display previews/summaries of child pages. Navigation
    to child pages is through links or section headers available in the page itself.
    This control is used when you have a Hierarchy navigation structure.

    *   ListView: This control is used to display a master list of item summaries.
    Selecting an item displays the details of the selected item in the details section.
    This can be used for your Hierarchy navigation structure scenarios.


    ## 5.7 Pivot Navigation in UWP Apps


    ### Problem


    In your app, you have identified that the navigational structure for navigation
    is peer-based. You want to implement the navigation using a Pivot control.


    ### Solution


    The Pivot control is used for navigation when you have frequently accessed distinct
    content categories. Pivot is made up of two or more content panes and each pane
    has a corresponding category header. The headers will persist on-screen and a
    selection state is clearly shown visible, which makes it easy for users to know
    which category they have selected. Users can swipe left or right on the header
    and doing so will allow them to navigate to an adjacent header. They can also
    swipe left or right on the content.'
