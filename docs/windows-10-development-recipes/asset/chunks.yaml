    With Window 10, Microsoft has brought in the concept of a "universal" application
    architecture to Windows, where the apps designed using UWP can run across different
    Windows-powered devices like PCs, tablets, smartphones, Xbox One, iOT, Surface
    Hub, and HoloLens.


    You could develop Universal Windows Platform (UWP) apps using various technologies,
    like C# and XAML, web technologies (HTML, CSS, JavaScript, and WinJS), C++, and
    so forth.


    Examples in the book cover the development of a Universal Windows Platform (UWP)
    app using web development technologies (HTML, JavaScript, and CSS). Once you have
    knowledge of web development technologies and you have mastered the UWP app development
    examples in this book, you will have a head start in building some great Windows
    apps that can run on almost all the devices powered by Windows.


    ## Who This Book Is For


    This book is targeted at developers with some basic knowledge in web development
    technologies like HTML, CSS, and JavaScript and who are interested in developing
    Windows apps. The step-by-step approach taken in the book will help developers
    understand the concepts much easier.'
