    textContent:designation\"></td>\n            </tr>\n        </tbody>\n    </table>\n\
    </body>\n</html>\n```\n\n在前面的代码片段中，`Repeater` 控件被添加到 body 部分；而 `Repeater` 控件的内部内容则用作模板。来自\
    \ repeater 数据的每一行都会显示在 HTML 表格的 body 部分。\n\n前面的 HTML 页面引用了一个 `data.js` 页面。让我们将此文件添加到项目中。在项目的\
    \ `js` 文件夹中添加一个新的 JavaScript 文件，并将其命名为 `data.js`。以下代码片段包含了为 `Repeater` 控件设置数据源的\
    \ JavaScript 代码。\n\n```javascript\n(function () {\n    \"use strict\";\n    function\
    \ Initialize() {\n        WinJS.UI.processAll().done(function () {\n         \
    \   var repeaterControl1 = document.getElementById('repeaterData').winControl;\n\
    \            var Employees = new WinJS.Binding.List([\n                { id: 1,\
    \ name: \"Senthil Kumar\", designation: \"Mobile Developer\" },\n            \
    \    { id: 2, name: \"Lohith GN\", designation: \"Web Developer\" },\n       \
    \         { id: 3, name: \"Vidyasagar\", designation: \"Game Developer\" }\n \
    \           ]);\n            repeaterControl1.data = Employees;\n        })\n\
    \    }\n    document.addEventListener(\"DOMContentLoaded\", Initialize);\n})();\n\
    ```\n\n`WinJS.Binding.List` 用于绑定 `Repeater` 控件。在前面的代码片段中，`Repeater` 控件被绑定到员工列表，该列表表示员工数据的集合。员工对象包含以下属性：`id`、`name`\
    \ 和 `designation`。数据通过 `Repeater` 控件的 `data` 属性进行绑定。\n\n在 Windows Mobile 模拟器上运行该应用程序。你应该会看到如图\
    \ 4-2 所示的屏幕。\n\n![A978-1-4842-0719-2_4_Fig2_HTML.jpg](img/A978-1-4842-0719-2_4_Fig2_HTML.jpg)\n\
    \n*图 4-2. Windows Mobile 10 中的 Repeater 控件*\n\n如果希望 `Repeater` 控件中的项可调用或可选择，一种选择是在\
    \ `Repeater` 控件模板中使用 `ItemContainer` 控件。\n\n以下示例演示了在 `Repeater` 控件中使用 `ItemContainer`\
    \ 的用法，该控件绑定到员工列表。\n\n```html\n<div id=\"repeaterData\" data-win-control=\"WinJS.UI.Repeater\"\
    >\n        <div data-win-control=\"WinJS.UI.ItemContainer\" data-win-bind=\"dataset.name:name\"\
    >\n             <div data-win-bind=\"textContent:name\"></div>\n        </div>\n\
    </div>\n```\n\n`ItemContainer` 有一个名为 `data-win-bind=\"dataset.name: name\"` 的属性，该属性将员工列表中每个项目的名称与\
    \ `ItemContainer` 关联起来。\n\n`Repeater` 控件在 JavaScript 文件中被绑定到员工列表，如下所示。\n\n```javascript\n\
    (function () {\n    \"use strict\";\n    function Initialize() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var repeaterControl1 = document.getElementById('repeaterData').winControl;\n\
    \            var Employees = new WinJS.Binding.List([\n                { id: 1,\
    \ name: \"Senthil Kumar\", designation: \"Mobile Developer\" },\n            \
    \    { id: 2, name: \"Lohith GN\", designation: \"Web Developer\" },\n       \
    \         { id: 3, name: \"Vidyasagar\", designation: \"Game Developer\" }\n \
    \           ]);\n            repeaterControl1.data = Employees;\n            repeaterControl1.addEventListener(\"\
    invoked\",function(e)\n            {\n                var name = e.target.dataset.name;\n\
    \                var message = new Windows.UI.Popups.MessageDialog(name);\n  \
    \              message.showAsync();\n            })\n        })\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", Initialize);\n})();\n```\n\n当你在 Windows 中运行该应用程序时，你会看到三个项目被渲染出来。如果你点击一个项目，会显示一个消息框，其中包含该项目的名称，如图\
    \ 4-3 所示。\n\n![A978-1-4842-0719-2_4_Fig3_HTML.jpg](img/A978-1-4842-0719-2_4_Fig3_HTML.jpg)\n\
    \n*图 4-3. Repeater 控件中可调用的项*\n\n## 4.2 使用 FlipView 控件\n\n### 问题\n\n你需要只显示集合中的单个项目。\n\
    \n### 解决方案\n\n使用 WinJS 中的 `FlipView` 控件，该控件一次只显示集合中的一个项目。`FlipView` 控件的一个用例是照片库应用，用户可以选择一张图片，然后在图片列表中滑动浏览。\n\
    \n尽管一次只显示一个项目，但 `FlipView` 控件会显示箭头，让你可以移动到数据源中的下一个或上一个项目。\n\n你可以通过将 `div` 元素的\
    \ `data-win-control` 属性设置为 `WinJS.UI.ListView` 来向页面添加 `ListView` 控件。\n"
- fmt: "### How It Works\n\nLet’s create a new Windows Universal project in Visual\
    \ Studio 2015. Name the new JavaScript file `data.js` under the `js` folder. This\
    \ JavaScript file will contain data that can be listed in the ListView. Add the\
    \ following code snippet to the `data.js` file.\n\n```\n(function () {\n    \"\
    use strict\";\n     var Employees = new WinJS.Binding.List([\n         { id: 1,\
    \ name: \"Senthil Kumar\", designation: \"Mobile Developer\" },\n         { id:\
    \ 2, name: \"Lohith GN\", designation: \"Web Developer\" },\n         { id: 3,\
    \ name: \"Vidyasagar\", designation: \"Game Developer\" }\n         ]);\n    \
    \ WinJS.Namespace.define(\"recipeData\",\n         {\n             Employees :Employees\n\
    \         });\n})();\n```\n\nThe preceding JavaScript contains a collection of\
    \ employees; each employee has an `id`, a `name`, and a `designation` property.\n\
    \nNow you want to display one employee at a time in your Windows app. The following\
    \ HTML code snippet illustrates how you can use the FlipView control to display\
    \ individual employees from a list of employees.\n\nNote that the page includes\
    \ a reference to the `data.js` file, which contains the data for the FlipView\
    \ control.\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\"\
    \ />\n    <title>Recipe4.2</title>\n    <!-- WinJS references -->\n    <link href=\"\
    WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"\
    ></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n    <!-- Recipe4.2 references\
    \ -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\" />\n    <script\
    \ src=\"/js/default.js\"></script>\n    <script src=\"/js/data.js\"></script>\n\
    </head>\n<body class=\"win-type-body\" style=\"margin:20px\">\n    <h1>Recipe\
    \ 4.2</h1>\n    <div id=\"template\" data-win-control=\"WinJS.Binding.Template\"\
    >\n        <div>\n            <h4 data-win-bind=\"innerText: name\"></h4>\n  \
    \          <h6 data-win-bind=\"innerText: designation\"></h6>\n        </div>\n\
    \    </div>\n    <div id=\"flipView1\"\n         data-win-control=\"WinJS.UI.FlipView\"\
    \n         data-win-options=\"{itemTemplate: select('#template') ,\n         itemDataSource\
    \ : recipeData.Employees.dataSource}\">\n    </div>\n</body>\n</html>\n```\n\n\
    When you run the app on Windows, you should see the page shown in Figure [4-4](#A978-1-4842-0719-2_4_Chapter.html#Fig4).\n\
    \n![A978-1-4842-0719-2_4_Fig4_HTML.jpg](A978-1-4842-0719-2_4_Fig4_HTML.jpg)\n\n\
    Figure 4-4.\n\nFlipView in the WinJS app\n\nThe FlipView is declared with the\
    \ following HTML tag.\n\n```\n<div id=\"flipView1\"\n         data-win-control=\"\
    WinJS.UI.FlipView\"\n         data-win-options=\"{itemTemplate: select('#template')\
    \ ,\n         itemDataSource : recipeData.Employees.dataSource}\">\n</div>\n```\n\
    \nThe FlipView is bound to the employees list using the `itemDataSource` property.\
    \ In the preceding code snippet, the FlipView is bound to the employees list,\
    \ which is of type `WinJS.Binding.List`.\n\nNote that the FlipView displays data\
    \ from the data source that implements the `IListDataSource` interface. An example\
    \ of this includes the `WinJS.Binding.List` and `WinJS.UI.StorageDataSource`.\n\
    \nAdditionally, the FlipView’s `itemTemplate` property is set to the TemplateControl\
    \ with the id `template`. This contains the template that is used to format the\
    \ employee details displayed in the ListView. In this example, the template is\
    \ configured to display the `name` and `designation`.\n\n## 4.3 Using the ListView\
    \ Control\n\n### Problem\n\nYou need to display an interactive list of items on\
    \ the page.\n\n### Solution\n\nUse the ListView control, which provides a lot\
    \ of options for the developers to list the items, as well as other options, like\
    \ selection, sorting, filtering, grouping, and so forth. You can add the ListView\
    \ to the page by setting the `data-win-bind` attribute with the `WinJS.UI.ListView`\
    \ value."
  raw: '### How It Works


    Let’s create a new Windows Universal project in Visual Studio 2015\. Name the
    new JavaScript file data.js under the `js` folder. This JavaScript file will contain
    data that can be listed in the ListView. Add the following code snippet to the
    `data.js` file.


    `(function () {`


        `"use strict";`


         `var Employees = new WinJS.Binding.List([`


             `{ id: 1, name: "Senthil Kumar", designation: "Mobile Developer" },`


             `{ id: 2, name: "Lohith GN", designation: "Web Developer" },`


             `{ id: 3, name: "Vidyasagar", designation: "Game Developer" }`


             `]);`


         `WinJS.Namespace.define("recipeData",`


             `{`


                 `Employees :Employees`


             `});`


    `})();`


    The preceding JavaScript contains a collection of employees; each employee has
    an id, a name, and a designation property.


    Now you want to display one employee at a time in your Windows app. The following
    HTML code snippet illustrates how you can use the FlipView control to display
    individual employees from a list of employees.


    Note that the page includes a reference to the `data.js` file, which contains
    the data for the FlipView control.


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>Recipe4.2</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-light.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- Recipe4.2 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


        `<script src="/js/data.js"></script>`


    `</head>`


    `<body class="win-type-body" style="margin:20px">`


        `<h1>Recipe 4.2</h1>`


        `<div id="template" data-win-control="WinJS.Binding.Template">`


            `<div>`


                `<h4 data-win-bind="innerText: name"></h4>`


                `<h6 data-win-bind="innerText: designation"></h6>`


            `</div>`


        `</div>`


        `<div id="flipView1"`


             `data-win-control="WinJS.UI.FlipView"`


             `data-win-options="{itemTemplate: select(''#template'') ,`


             `itemDataSource : recipeData.Employees.dataSource}">`


        `</div>`


    `</body>`


    `</html>`


    When you run the app on Windows, you should see the page shown in Figure [4-4](#A978-1-4842-0719-2_4_Chapter.html#Fig4).


    ![A978-1-4842-0719-2_4_Fig4_HTML.jpg](A978-1-4842-0719-2_4_Fig4_HTML.jpg)


    Figure 4-4.


    FlipView in the WinJS app


    The FlipView is declared with the following HTML tag.


    `<div id="flipView1"`


             `data-win-control="WinJS.UI.FlipView"`


             `data-win-options="{itemTemplate: select(''#template'') ,`


             `itemDataSource : recipeData.Employees.dataSource}">`


    `</div>`


    The FlipView is bound to the employees list using the `itemDataSource` property.
    In the preceding code snippet, the FlipView is bound to the employees list, which
    is of type WinJS.Binding.List.


    Note that the FlipView displays data from the data source that implements the
    IListDataSource interface. An example of this includes the WinJS.Binding.List
    and WinJS.UI.StorageDataSource.


    Additionally, the FlipView’s `itemTemplate` property is set to the TemplateControl
    with the id `template`. This contains the template that is used to format the
    employee details displayed in the ListView. In this example, the template is configured
    to display the name and designation.


    ## 4.3 Using the ListView Control


    ### Problem


    You need to display an interactive list of items on the page.


    ### Solution


    Use the ListView control, which provides a lot of options for the developers to
    list the items, as well as other options, like selection, sorting, filtering,
    grouping, and so forth. You can add the ListView to the page by setting the `data-win-bind`
    attribute with the WinJS.UI.ListView value.'
  trans: "\n### 工作原理\n\n在 Visual Studio 2015 中创建一个新的 Windows 通用项目。将新的 JavaScript 文件命名为\
    \ `data.js`，并放在 `js` 文件夹下。该 JavaScript 文件将包含可在 ListView 中列出的数据。将以下代码片段添加到 `data.js`\
    \ 文件中。\n\n```\n(function () {\n    \"use strict\";\n     var Employees = new WinJS.Binding.List([\n\
    \         { id: 1, name: \"Senthil Kumar\", designation: \"Mobile Developer\"\
    \ },\n         { id: 2, name: \"Lohith GN\", designation: \"Web Developer\" },\n\
    \         { id: 3, name: \"Vidyasagar\", designation: \"Game Developer\" }\n \
    \        ]);\n     WinJS.Namespace.define(\"recipeData\",\n         {\n      \
    \       Employees :Employees\n         });\n})();\n```\n\n前述 JavaScript 代码包含一个员工集合；每个员工拥有\
    \ `id`、`name` 和 `designation` 属性。\n\n现在，你希望在你的 Windows 应用中一次显示一名员工。以下 HTML 代码片段展示了如何使用\
    \ FlipView 控件从员工列表中逐个显示员工信息。\n\n请注意，页面引用了 `data.js` 文件，该文件包含了 FlipView 控件所需的数据。\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.2</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe4.2 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    \    <script src=\"/js/data.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    \ style=\"margin:20px\">\n    <h1>Recipe 4.2</h1>\n    <div id=\"template\" data-win-control=\"\
    WinJS.Binding.Template\">\n        <div>\n            <h4 data-win-bind=\"innerText:\
    \ name\"></h4>\n            <h6 data-win-bind=\"innerText: designation\"></h6>\n\
    \        </div>\n    </div>\n    <div id=\"flipView1\"\n         data-win-control=\"\
    WinJS.UI.FlipView\"\n         data-win-options=\"{itemTemplate: select('#template')\
    \ ,\n         itemDataSource : recipeData.Employees.dataSource}\">\n    </div>\n\
    </body>\n</html>\n```\n\n当你在 Windows 上运行此应用时，你应该会看到如图 4-4 所示的页面。\n\n![A978-1-4842-0719-2_4_Fig4_HTML.jpg](img/A978-1-4842-0719-2_4_Fig4_HTML.jpg)\n\
    \n图 4-4.\n\nWinJS 应用中的 FlipView\n\nFlipView 通过以下 HTML 标签声明。\n\n```\n<div id=\"\
    flipView1\"\n         data-win-control=\"WinJS.UI.FlipView\"\n         data-win-options=\"\
    {itemTemplate: select('#template') ,\n         itemDataSource : recipeData.Employees.dataSource}\"\
    >\n</div>\n```\n\nFlipView 通过 `itemDataSource` 属性绑定到员工列表。在上述代码片段中，FlipView 绑定到类型为\
    \ `WinJS.Binding.List` 的员工列表。\n\n请注意，FlipView 显示来自实现了 `IListDataSource` 接口的数据源中的数据。此类数据源的示例包括\
    \ `WinJS.Binding.List` 和 `WinJS.UI.StorageDataSource`。\n\n此外，FlipView 的 `itemTemplate`\
    \ 属性被设置为 ID 为 `template` 的 TemplateControl。该模板用于格式化 ListView 中显示的员工详细信息。在此示例中，模板配置为显示\
    \ `name` 和 `designation`。\n\n## 4.3 使用 ListView 控件\n\n### 问题\n\n你需要在页面上显示一个可交互的项目列表。\n\
    \n### 解决方案\n\n使用 ListView 控件，它为开发者提供了大量选项来列出项目，同时还提供了其他选项，如选择、排序、筛选、分组等。你可以通过将\
    \ `data-win-bind` 属性设置为 `WinJS.UI.ListView` 值来将 ListView 添加到页面。\n"
- fmt: "### How It Works\n\n`ListView`控件是Windows应用程序中最常用的控件之一。你可以将`ListView`控件绑定到实现了`IListDataSource`接口的数据源。目前，`WinJS`有两个实现了`IListDataSource`接口的对象：\n\
    \n- `WinJS.Binding.List`\n- `WinJS.UI.StorageDataSource`\n\n在本教程中，我们将重点介绍如何使用`WinJS.Binding.List`数据源。\n\
    \n让我们看看如何将`ListView`控件与`WinJS.Binding.List`数据源一起使用。\n\n在Visual Studio 2015中创建一个新的Windows通用应用，并打开`default.html`页面。用以下代码替换它：\n\
    \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n \
    \   <title>Recipe4.3</title>\n    <!-- WinJS references -->\n    <link href=\"\
    WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"\
    ></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n    <!-- Recipe4.3 references\
    \ -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\" />\n    <script\
    \ src=\"/js/default.js\"></script>\n    <script src=\"/js/data.js\"></script>\n\
    </head>\n<body class=\"win-type-body\">\n    <h1>Recipe 4.3</h1>\n    <div id=\"\
    template\" data-win-control=\"WinJS.Binding.Template\">\n        <div>\n     \
    \       <h4 data-win-bind=\"innerText: name\"></h4>\n            <h6 data-win-bind=\"\
    innerText: designation\"></h6>\n        </div>\n    </div>\n    <div id=\"listView1\"\
    \n         data-win-control=\"WinJS.UI.ListView\"\n         data-win-options=\"\
    {itemTemplate: select('#template')}\">\n    </div>\n</body>\n</html>\n```\n\n\
    以下代码用于将`ListView`控件添加到页面：\n\n```html\n<div id=\"listView1\"\n     data-win-control=\"\
    WinJS.UI.ListView\"\n     data-win-options=\"{itemTemplate: select('#template')}\"\
    >\n</div>\n```\n\n上述代码片段中的`ListView`控件使用模板来显示每位员工。\n\n请注意，你已在HTML页面中引用了`data.js`文件。该文件包含员工数组。向项目的`js`文件夹添加一个新的JavaScript文件，并将其命名为`data.js`。用以下代码替换`data.js`文件：\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    function Initialize()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var listControl1\
    \ = document.getElementById('listView1').winControl;\n            var Employees\
    \ = new WinJS.Binding.List([\n                { id: 1, name: \"Senthil Kumar\"\
    , designation: \"Mobile Developer\" },\n                { id: 2, name: \"Lohith\
    \ GN\", designation: \"Web Developer\" },\n                { id: 3, name: \"Vidyasagar\"\
    , designation: \"Game Developer\" },\n                { id: 4, name: \"Michael\"\
    , designation: \"Architect\" }\n            ]);\n            listControl1.itemDataSource\
    \ = Employees.dataSource;\n            listControl1.addEventListener(\"iteminvoked\"\
    , function (e) {\n                var index = e.detail.itemIndex;\n          \
    \      e.detail.itemPromise.then(function (item) {\n                    var message\
    \ = new Windows.UI.Popups.MessageDialog(item.data.name);\n                   \
    \ message.showAsync();\n                })\n            })\n        })\n    }\n\
    \    document.addEventListener(\"DOMContentLoaded\", Initialize);\n})();\n```\n\
    \n根据员工数组创建了一个列表，并通过`itemDataSource`属性将其绑定到`ListView`控件。\n\n当你运行应用时，会看到列表视图中显示员工数据。\n\
    \nJavaScript代码还包含了处理`ListView`的调用事件（invoked event）的代码，该事件会显示从列表中选择的员工。\n\n`ListView`控件在内部为每个`ListView`项使用`ItemContainer`控件。你可以处理`ListView`控件的`item-invoked`事件，以检测何时点击了特定的`ListView`项。\n\
    \n图[4-5](#A978-1-4842-0719-2_4_Chapter.html#Fig5)展示了本教程中代码片段在Windows中渲染的屏幕。\n\n\
    ![A978-1-4842-0719-2_4_Fig5_HTML.jpg](A978-1-4842-0719-2_4_Fig5_HTML.jpg)\n\n\
    图4-5. 带有调用事件处理的Windows应用中的`ListView`控件\n\n`ListView`控件支持不同的布局，这些布局决定了控件的整体外观。这些布局包括：\n\
    \n- 网格布局\n- 列表布局\n- 跨单元格布局\n\n网格布局以网格格式（包含行和列）显示`ListView`项。列表布局在单个列表中显示列表项。跨单元格布局以网格布局显示列表项，但支持多列单元格。\n\
    \n要将`ListView`设置为网格布局，需在`data-win-options`属性下将`layout`属性设置为`WinJS.UI.GridLayout`，如下所示：\n\
    \n```html\n<div id=\"listView1\"\n         data-win-control=\"WinJS.UI.ListView\"\
    \n         data-win-options=\"{itemTemplate: select('#template'),\n         layout\
    \ : {type:WinJS.UI.GridLayout,maximumRowsOrColumns : 1}}\">\n    </div>\n```\n\
    \n图[4-6](#A978-1-4842-0719-2_4_Chapter.html#Fig6)展示了使用网格布局时渲染的UI。\n\n![A978-1-4842-0719-2_4_Fig6_HTML.jpg](A978-1-4842-0719-2_4_Fig6_HTML.jpg)\n\
    \n图4-6. `ListView`中的网格布局\n\n你也可以将布局设置为以下值：\n\n- `WinJS.UI.cellSpanningLayout`\n\
    - `WinJS.UI.ListLayout`\n\n## 4.4 在`ListView`控件中筛选项\n\n### 问题\n\n你需要通过从与`ListView`关联的数据源中进行筛选，来筛选`ListView`中显示的项。\n\
    \n### 解决方案\n\n你可以使用设置为数据源的`WinJS.Binding.List`，然后通过`createFiltered`方法创建一个新的筛选列表。`createFiltered`函数根据列表中的输入项创建一个筛选后的投影。"
  raw: '### How It Works


    The ListView control is one of the most commonly used controls in a Windows app.
    You can bind the ListView control to the data source that implements the IListDataSource
    interface. Currently, WinJS has two objects that implement the IListDataSource
    interface.


    *   WinJS.Binding.List

    *   WinJS.UI.StorageDataSource


    In this recipe, we will focus on using WinJS.Binding.List data source.


    Let’s look at how to use the ListView control with WinJS.Binding.List data source.


    Create a new Windows Universal app in Visual Studio 2015 and open the `default.html`
    page. Replace it with the following code.


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>Recipe4.3</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-light.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- Recipe4.3 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


        `<script src="/js/data.js"></script>`


    `</head>`


    `<body class="win-type-body">`


        `<h1>Recipe 4.3</h1>`


        `<div id="template" data-win-control="WinJS.Binding.Template">`


            `<div>`


                `<h4 data-win-bind="innerText: name"></h4>`


                `<h6 data-win-bind="innerText: designation"></h6>`


            `</div>`


        `</div>`


        `<div id="listView1"`


             `data-win-control="WinJS.UI.ListView"`


             `data-win-options="{itemTemplate: select(''#template'')}">`


        `</div>`


    `</body>`


    `</html>`


    The following code is used to add the ListView control to the page.


    `<div id="listView1"`


         `data-win-control="WinJS.UI.ListView"`


         `data-win-options="{itemTemplate: select(''#template'')}">`


    `</div>`


    The ListView control shown in the preceding code snippet uses the template to
    display each employee.


    Note that you have referenced the `data.js` file in the HTML page. This file contains
    the array of employees. Add a new JavaScript file to the project’s `js` folder
    and name it data.js. Replace the `data.js` file with the following code.


    `(function () {`


        `"use strict";`


        `function Initialize() {`


            `WinJS.UI.processAll().done(function () {`


                `var listControl1 = document.getElementById(''listView1'').winControl;`


                `var Employees = new WinJS.Binding.List([`


                    `{ id: 1, name: "Senthil Kumar", designation: "Mobile Developer"
    },`


                    `{ id: 2, name: "Lohith GN", designation: "Web Developer" },`


                    `{ id: 3, name: "Vidyasagar", designation: "Game Developer" },`


                    `{ id: 4, name: "Michael", designation: "Architect" }`


                `]);`


                `listControl1.itemDataSource = Employees.dataSource;`


                `listControl1.addEventListener("iteminvoked", function (e) {`


                    `var index = e.detail.itemIndex;`


                    `e.detail.itemPromise.then(function (item) {`


                        `var message = new Windows.UI.Popups.MessageDialog(item.data.name);`


                        `message.showAsync();`


                    `})`


                `})`


            `})`


        `}`


        `document.addEventListener("DOMContentLoaded", Initialize);`


    `})();`


    A list is created from the array of employees, which is bound to the ListView
    control using the `itemDataSource` property.


    When you run the app, you see the employee data shown in list view.


    The JavaScript code also includes the code, which handles the invoked event of
    the ListView, which displays the selected employee from the list.


    The ListView control uses the ItemContainer control for each ListView item internally.
    You can handle the ListView control’s item-invoked event to detect when a particular
    ListView item is clicked.


    Figure [4-5](#A978-1-4842-0719-2_4_Chapter.html#Fig5) illustrates the screen rendered
    in Windows with the code snippet in this recipe.


    ![A978-1-4842-0719-2_4_Fig5_HTML.jpg](A978-1-4842-0719-2_4_Fig5_HTML.jpg)


    Figure 4-5.


    ListView control in Windows app with the invoked event handling


    The ListView control supports different layouts, which can determine the overall
    appearance of the control. These layouts include


    *   The grid layout

    *   The list layout

    *   The cell-spanning layout


    The grid layout shows the ListView items in grid format, with rows and columns.
    The list layout displays the list items in a single list. The cell-spanning layout
    displays the list items as a grid layout, but supports multiple column cells.


    To set the ListView to a grid layout, set the `layout` property to WinJS.UI.GridLayout
    under `the data-win-options` attribute, as shown next.


    `<div id="listView1"`


             `data-win-control="WinJS.UI.ListView"`


             `data-win-options="{itemTemplate: select(''#template''),`


             `layout : {type:WinJS.UI.GridLayout,maximumRowsOrColumns : 1}}">`


        `</div>`


    Figure [4-6](#A978-1-4842-0719-2_4_Chapter.html#Fig6) shows the UI that is rendered
    when using grid layout.


    ![A978-1-4842-0719-2_4_Fig6_HTML.jpg](A978-1-4842-0719-2_4_Fig6_HTML.jpg)


    Figure 4-6.


    Grid layout in ListView


    You can also set the layout to the following values:


    *   WinJS.UI.cellSpanningLayout

    *   WinJS.UI.ListLayout


    ## 4.4 Filtering Items in the ListView Control


    ### Problem


    You need to filter the items displayed in a ListView by filtering it from the
    data source associated with the ListView.


    ### Solution


    You can use the WinJS.Binding.List that is set as the data source and then create
    a new filtered list using the `createFiltered` method. The `createFiltered` function
    creates a filtered projection over the input item from the list.'
  trans: "\n### 工作原理\n\n`ListView`控件是 Windows 应用程序中最常用的控件之一。你可以将`ListView`控件绑定到实现了`IListDataSource`接口的数据源。目前，`WinJS`有两个实现了`IListDataSource`接口的对象：\n\
    \n- `WinJS.Binding.List`\n- `WinJS.UI.StorageDataSource`\n\n在本教程中，我们将重点介绍如何使用`WinJS.Binding.List`数据源。\n\
    \n让我们看看如何将`ListView`控件与`WinJS.Binding.List`数据源一起使用。\n\n在 Visual Studio 2015 中创建一个新的\
    \ Windows 通用应用，并打开`default.html`页面。用以下代码替换它：\n\n```html\n<!DOCTYPE html>\n<html>\n\
    <head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.3</title>\n    <!--\
    \ WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- Recipe4.3 references -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
    \ src=\"/js/data.js\"></script>\n</head>\n<body class=\"win-type-body\">\n   \
    \ <h1>Recipe 4.3</h1>\n    <div id=\"template\" data-win-control=\"WinJS.Binding.Template\"\
    >\n        <div>\n            <h4 data-win-bind=\"innerText: name\"></h4>\n  \
    \          <h6 data-win-bind=\"innerText: designation\"></h6>\n        </div>\n\
    \    </div>\n    <div id=\"listView1\"\n         data-win-control=\"WinJS.UI.ListView\"\
    \n         data-win-options=\"{itemTemplate: select('#template')}\">\n    </div>\n\
    </body>\n</html>\n```\n\n以下代码用于将`ListView`控件添加到页面：\n\n```html\n<div id=\"listView1\"\
    \n     data-win-control=\"WinJS.UI.ListView\"\n     data-win-options=\"{itemTemplate:\
    \ select('#template')}\">\n</div>\n```\n\n上述代码片段中的`ListView`控件使用模板来显示每位员工。\n\n\
    请注意，你已在 HTML 页面中引用了`data.js`文件。该文件包含员工数组。向项目的`js`文件夹添加一个新的 JavaScript 文件，并将其命名为`data.js`。用以下代码替换`data.js`文件：\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    function Initialize()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var listControl1\
    \ = document.getElementById('listView1').winControl;\n            var Employees\
    \ = new WinJS.Binding.List([\n                { id: 1, name: \"Senthil Kumar\"\
    , designation: \"Mobile Developer\" },\n                { id: 2, name: \"Lohith\
    \ GN\", designation: \"Web Developer\" },\n                { id: 3, name: \"Vidyasagar\"\
    , designation: \"Game Developer\" },\n                { id: 4, name: \"Michael\"\
    , designation: \"Architect\" }\n            ]);\n            listControl1.itemDataSource\
    \ = Employees.dataSource;\n            listControl1.addEventListener(\"iteminvoked\"\
    , function (e) {\n                var index = e.detail.itemIndex;\n          \
    \      e.detail.itemPromise.then(function (item) {\n                    var message\
    \ = new Windows.UI.Popups.MessageDialog(item.data.name);\n                   \
    \ message.showAsync();\n                })\n            })\n        })\n    }\n\
    \    document.addEventListener(\"DOMContentLoaded\", Initialize);\n})();\n```\n\
    \n根据员工数组创建了一个列表，并通过`itemDataSource`属性将其绑定到`ListView`控件。\n\n当你运行应用时，会看到列表视图中显示员工数据。\n\
    \nJavaScript 代码还包含了处理`ListView`的调用事件（invoked event）的代码，该事件会显示从列表中选择的员工。\n\n`ListView`控件在内部为每个`ListView`项使用`ItemContainer`控件。你可以处理`ListView`控件的`item-invoked`事件，以检测何时点击了特定的`ListView`项。\n\
    \n图 4-5 展示了本教程中代码片段在 Windows 中渲染的屏幕。\n\n![A978-1-4842-0719-2_4_Fig5_HTML.jpg](img/A978-1-4842-0719-2_4_Fig5_HTML.jpg)\n\
    \n图 4-5. 带有调用事件处理的 Windows 应用中的`ListView`控件\n\n`ListView`控件支持不同的布局，这些布局决定了控件的整体外观。这些布局包括：\n\
    \n- 网格布局\n- 列表布局\n- 跨单元格布局\n\n网格布局以网格格式（包含行和列）显示`ListView`项。列表布局在单个列表中显示列表项。跨单元格布局以网格布局显示列表项，但支持多列单元格。\n\
    \n要将`ListView`设置为网格布局，需在`data-win-options`属性下将`layout`属性设置为`WinJS.UI.GridLayout`，如下所示：\n\
    \n```html\n<div id=\"listView1\"\n         data-win-control=\"WinJS.UI.ListView\"\
    \n         data-win-options=\"{itemTemplate: select('#template'),\n         layout\
    \ : {type:WinJS.UI.GridLayout,maximumRowsOrColumns : 1}}\">\n    </div>\n```\n\
    \n图 4-6 展示了使用网格布局时渲染的 UI。\n\n![A978-1-4842-0719-2_4_Fig6_HTML.jpg](img/A978-1-4842-0719-2_4_Fig6_HTML.jpg)\n\
    \n图 4-6. `ListView`中的网格布局\n\n你也可以将布局设置为以下值：\n\n- `WinJS.UI.cellSpanningLayout`\n\
    - `WinJS.UI.ListLayout`\n\n## 4.4 在`ListView`控件中筛选项\n\n### 问题\n\n你需要通过从与`ListView`关联的数据源中进行筛选，来筛选`ListView`中显示的项。\n\
    \n### 解决方案\n\n你可以使用设置为数据源的`WinJS.Binding.List`，然后通过`createFiltered`方法创建一个新的筛选列表。`createFiltered`函数根据列表中的输入项创建一个筛选后的投影。\n"
- fmt: "### How It Works\n\nLet’s demonstrate the filtering function in the `ListView`\
    \ control.\n\nCreate a new Universal Windows app in Visual Studio 2015 using the\
    \ JavaScript template. Open the `default.html` page from the Solution Explorer\
    \ and replace it with the following code.\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n\
    \    <meta charset=\"utf-8\" />\n    <title>Recipe4.4</title>\n    <!-- WinJS\
    \ references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- Recipe4.4 references -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
    \ src=\"/js/data.js\"></script>\n</head>\n<body class=\"win-type-body\">\n   \
    \ <h1>Recipe4.4</h1>\n    <div>\n        <input id=\"txtSearch\" />\n    </div>\n\
    \    <div id=\"template\" data-win-control=\"WinJS.Binding.Template\">\n     \
    \   <h3 data-win-bind=\"innerText:name\"></h3>\n    </div>\n    <div id=\"lstEmployees\"\
    \ data-win-control=\"WinJS.UI.ListView\"\n         data-win-options=\"{itemTemplate:select('#template')}\"\
    >\n    </div>\n</body>\n</html>\n```\n\nNote the inclusion of the `data.js` file\
    \ where the data source is set and the filtering operation is performed. This\
    \ HTML page contains a simple text box with the id `txtSearch` and a `ListView`\
    \ control. The `ListView` has a custom template associated, which is used to display\
    \ the data in a formatted way.\n\nLet’s add the JavaScript file to the project’s\
    \ `js` folder and name it `data.js`. Add the following code to the `data.js` file.\n\
    \n```\n(function () {\n    \"use strict\";\n    // List of Employees to be used\
    \ a datasource.\n    var lstEmployees = new WinJS.Binding.List([\n        { id:\
    \ 1, name: \"Senthil Kumar\" },\n        { id: 2, name: \"Lohith GN\" },\n   \
    \     { id: 3, name: \"Senthil Kumar B\" },\n        { id: 4, name: \"Vidyasagar\"\
    \ },\n    ]);\n\n    function Initialize() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            // Get the Listview from the DOM\n            var lstControl\
    \ = document.getElementById('lstEmployees').winControl;\n            // Get the\
    \ Search Tex from the HTML Page\n            var filterText = document.getElementById('txtSearch');\n\
    \            lstControl.itemDataSource = lstEmployees.dataSource;\n          \
    \  filterText.addEventListener(\"keyup\", function () {\n                filterEmployee(lstControl,\
    \ filterText.value);\n            });\n        });\n    }\n\n    // Function to\
    \ filter the list\n    function filterEmployee(listEmployee,searchtext)\n    {\n\
    \        var filtereddata = lstEmployees.createFiltered(function (item) {\n  \
    \          var result = item.name.toLowerCase().indexOf(searchtext);\n       \
    \     return item.name.toLowerCase().indexOf(searchtext) == 0;\n        });\n\
    \        listEmployee.itemDataSource = filtereddata.dataSource;\n    }\n\n   \
    \ document.addEventListener(\"DOMContentLoaded\", Initialize);\n})();\n```\n\n\
    This JavaScript code includes a method called `filterEmployee`, which accepts\
    \ a `ListView` control and a search string for filtering. This function filters\
    \ the `ListView` and displays the employees, which match the search string.\n\n\
    Here’s the function within the `createFiltered` method to filter the data source\
    \ in the `ListView` control.\n\n```\nvar fileteredData = lstEmployees.createFiltered(function\
    \ (item) {\n    var result = item.name.toLowerCase().indexOf(searchtext);\n  \
    \          return item.name.toLowerCase().indexOf(searchtext) == 0;\n});\n```\n\
    \nThis function acts like a live filter and returns the item when the item begins\
    \ with the search text string.\n\nRun the app on Windows. You should see the screen\
    \ shown in Figure [4-7](#A978-1-4842-0719-2_4_Chapter.html#Fig7).\n\n![A978-1-4842-0719-2_4_Fig7_HTML.jpg](A978-1-4842-0719-2_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7.\n\nFiltering the ListView\n\nWhen you start entering text in the\
    \ text box, you see the items filtered and displayed on the screen.\n\n## 4.5\
    \ Grouping Items in the ListView Control\n\n### Problem\n\nYou need to group the\
    \ items by category in the `ListView` instead of as a flat list.\n\n### Solution\n\
    \nTo group the items in the `ListView`, you need to use the grouped data source.\
    \ This can be achieved by using the `WinJS.Binding.List.createGrouped()` function\
    \ in WinJS."
  raw: '### How It Works


    Let’s demonstrate the filtering function in the ListView control.


    Create a new Universal Windows app in Visual Studio 2015 using the JavaScript
    template.   Open the `default.html` page from the Solution Explorer and replace
    it with the following code.  


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>Recipe4.4</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-light.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- Recipe4.4 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


        `<script src="/js/data.js"></script>`


    `</head>`


    `<body class="win-type-body">`


        `<h1>Recipe4.4</h1>`


        `<div>`


            `<input id="txtSearch" />`


        `</div>`


        `<div id="template" data-win-control="WinJS.Binding.Template">`


            `<h3 data-win-bind="innerText:name"></h3>`


        `</div>`


        `<div id="lstEmployees" data-win-control="WinJS.UI.ListView"`


             `data-win-options="{itemTemplate:select(''#template'')}">`


        `</div>`


    `</body>`


    `</html>`


    Note the inclusion of the `data.js` file where the data source is set and the
    filtering operation is performed. This HTML page contains a simple text box with
    the id `txtSearch` and a ListView control. The ListView has a custom template
    associated, which is used to display the data in a formatted way.


    Let’s add the JavaScript file to the project’s `js` folder and name it data.js.
    Add the following code to the `data.js` file.


    `(function () {`


        `"use strict";`


        `// List of Employees to be used a datasource.`


        `var lstEmployees = new WinJS.Binding.List([`


            `{ id: 1, name: "Senthil Kumar" },`


            `{ id: 2, name: "Lohith GN" },`


            `{ id: 3, name: "Senthil Kumar B" },`


            `{ id: 4, name: "Vidyasagar" },`


        `]);`


        `function Initialize() {`


            `WinJS.UI.processAll().done(function () {`


                `// Get the Listview from the DOM`


                `var lstControl = document.getElementById(''lstEmployees'').winControl;`


                `// Get the Search Tex from the HTML Page`


                `var filterText = document.getElementById(''txtSearch'');`


                `lstControl.itemDataSource = lstEmployees.dataSource;`


                `filterText.addEventListener("keyup", function () {`


                    `filterEmployee(lstControl, filterText.value);`


                `});`


            `});`


        `}`


        `// Function to filter the list`


        `function filterEmployee(listEmployee,searchtext)`


        `{`


            `var filtereddata = lstEmployees.createFiltered(function (item) {`


                `var result = item.name.toLowerCase().indexOf(searchtext);`


                `return item.name.toLowerCase().indexOf(searchtext) == 0;`


            `});`


            `listEmployee.itemDataSource = filtereddata.dataSource;`


        `}`


        `document.addEventListener("DOMContentLoaded", Initialize);`


    `})();`


    This JavaScript code includes a method called `filterEmployee`, which accepts
    a ListView control and a search string for filtering. This function filters the
    ListView and displays the employees, which match the search string.


    Here’s the function within the `createFiltered` method to filter the data source
    in the ListView control.


    `var fileteredData = lstEmployees.createFiltered(function (item) {`


        `var result = item.name.toLowerCase().indexOf(searchtext);`


                `return item.name.toLowerCase().indexOf(searchtext) == 0;`


    `});`


    This function acts like a live filter and returns the item when the item begins
    with the search text string.


    Run the app on Windows. You should see the screen shown in Figure [4-7](#A978-1-4842-0719-2_4_Chapter.html#Fig7).


    ![A978-1-4842-0719-2_4_Fig7_HTML.jpg](A978-1-4842-0719-2_4_Fig7_HTML.jpg)


    Figure 4-7.


    Filtering the ListView


    When you start entering text in the text box, you see the items filtered and displayed
    on the screen.


    ## 4.5 Grouping Items in the ListView Control


    ### Problem


    You need to group the items by category in the ListView instead of as a flat list.


    ### Solution


    To group the items in the ListView, you need to use the grouped data source. This
    can be achieved by using the `WinJS.Binding.List.createGrouped()` function in
    WinJS.'
