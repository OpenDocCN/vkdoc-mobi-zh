    \   </div>\n    <div class=\"win-type-x-large dayHighLow\">\n        <span class=\"\
    dayHigh\" data-win-bind=\"innerHTML: hi\"></span>\n        <span>/</span>\n  \
    \      <span class=\"dayLow\" data-win-bind=\"innerHTML: low\"></span>\n    </div>\n\
    \    <div class=\"dayFeelsLike\">\n        <span>体感温度 </span>\n        <span data-win-bind=\"\
    innerHTML: feelsLike\"></span>\n    </div>\n    <div class=\"dayChanceOfSnow\"\
    >\n        <span>降雪概率 </span>\n        <span data-win-bind=\"innerHTML: chanceOfSnow\"\
    ></span>\n    </div>\n</div>\n</div>\n```\n\n接下来，让我们添加`ListView`控件。将以下代码片段粘贴到上一步创建的模板之后：\n\
    \n```html\n<div id=\"weatherListView\" class=\"weatherListView\"\n    data-win-control=\"\
    WinJS.UI.ListView\"\n    data-win-options=\"{\n      itemDataSource:FluidApp.Data.weatherData.dataSource,\n\
    \      itemTemplate:select('#weatherTemplate'),\n      layout:WinJS.UI.GridLayout}\"\
    ></div>\n```\n\n您已经创建了一个列表视图，并提供了`weatherData`作为项目数据源。您还提供了项目模板。您已将列表视图的布局默认设置为`GridLayout`。您将根据屏幕尺寸调整来更改列表视图的此布局属性。\n\
    \n打开位于`js`文件夹中的`default.js`。使用以下代码片段修改`app.onactivated`函数：\n\n```javascript\n\
    app.onactivated = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n        } else {\n        }\n        args.setPromise(WinJS.UI.processAll().then(function\
    \ ready() {\n            var listView = document.querySelector(\"#weatherListView\"\
    );\n            var listViewLayout = new WinJS.UI.GridLayout();\n            if\
    \ (document.body.clientWidth <= 320) {\n                listViewLayout = new WinJS.UI.ListLayout();\n\
    \            }\n            listView.layout = listViewLayout;\n            window.addEventListener(\"\
    resize\", resizeListView, false)\n        }));\n    }\n};\n```\n\n让我们来解读一下这段代码。一旦\
    \ UI 处理完成，首先获取列表视图。然后检查当前运行屏幕的宽度。如果宽度小于或等于 320（即您处于小屏幕上），则相应地更改列表视图的布局。如果处于小屏幕，则使用`ListLayout`；否则，将其设置为`GridLayout`。您还注册了一个事件监听器来监听窗口的调整大小事件。接下来，让我们看看调整大小事件处理程序的作用。\n\
    \n在`app.onactivated`函数之后，创建一个新函数`resizeListView`，并粘贴以下代码片段：\n\n```javascript\n\
    function resizeListView() {\n    var listview = document.querySelector(\"#weatherListView\"\
    ).winControl;\n    if (document.body.clientWidth <= 320) {\n        if (!(listview.layout\
    \ instanceof WinJS.UI.ListLayout)) {\n            listview.layout = new WinJS.UI.ListLayout();\n\
    \        }\n    }\n    else {\n        if (listview.layout instanceof WinJS.UI.ListLayout)\
    \ {\n            listview.layout = new WinJS.UI.GridLayout();\n        }\n   \
    \ }\n}\n```\n\n现在，在移动设备或 PC 上运行应用程序以查看输出。按`F5`运行应用程序。图 6-5 所示的屏幕截图是在 Windows 10\
    \ 移动版上，而图 6-6 所示的屏幕截图是在 Windows 10 PC 上。\n\n![A978-1-4842-0719-2_6_Fig6_HTML.jpg](img/A978-1-4842-0719-2_6_Fig6_HTML.jpg)\n\
    \n图 6-6. 在 Windows PC 上的输出\n\n![A978-1-4842-0719-2_6_Fig5_HTML.jpg](img/A978-1-4842-0719-2_6_Fig5_HTML.jpg)\n\
    \n图 6-5. 在 Windows 10 移动版上的输出\n\n您刚刚实现的是针对不同屏幕尺寸量身定制的 UI。您使用了`ListView`布局技术，根据屏幕尺寸显示网格或列表布局。\n\
    \n---\n\n# 第 7 章：应用程序生命周期和导航\n\n本章介绍通用 Windows 应用程序事件和生命周期，涵盖启动 Windows 应用时引发的标准事件集以及如何处理这些事件。本章介绍开发人员如何处理应用程序的挂起和终止。它同时介绍如何在这些事件期间保存和恢复数据，这有助于开发人员提供更好的用户体验。\n\
    \n本章还介绍了导航模型，并解释了如何构建一个可以包含多个虚拟 HTML 页面的单页应用。\n\n## 7.1 应用程序状态和事件\n\n### 问题\n\n\
    您需要在用户启动、关闭或恢复应用程序时识别并订阅应用程序中的各种事件。\n\n### 解决方案\n\n使用通用 Windows 应用项目中的`default.js`文件来订阅和处理应用程序生命周期中的各种事件。\n"
- fmt: "### How It Works\n\nCreate a new Universal Windows project using the Universal\
    \ Windows template, which can be found under the JavaScript ➤ Windows ➤ Universal\
    \ node of the New Project dialog in Microsoft Visual Studio 2015. This creates\
    \ a single project in the Visual Studio Solution along with the necessary files\
    \ in it to start with.\n\nFrom the project’s `js` folder, open the `default.js`\
    \ file from the Visual Studio Solution Explorer. You see two important events\
    \ that are subscribed by default.\n\n- `app.onactivated`\n- `app.oncheckpoint`\n\
    \nThe code for these events looks like the one shown next.\n\n```\napp.onactivated\
    \ = function (args)\n{\n                if (args.detail.kind === activation.ActivationKind.launch)\n\
    \             {\n                        if (args.detail.previousExecutionState\
    \ !== activation.ApplicationExecutionState.terminated) {\n                   \
    \     } else {\n                        }\n                        args.setPromise(WinJS.UI.processAll());\n\
    \                }\n        };\napp.oncheckpoint = function (args)\n{\n};\n```\n\
    \nAs a developer, you should be handling these events to describe how the application\
    \ should save and restore data when various execution states are triggered.\n\n\
    In Universal Windows apps, there are three app execution states:\n\n- Not Running\n\
    - Running\n- Suspended\n\nFigure [7-1](#A978-1-4842-0719-2_7_Chapter.html#Fig1)\
    \ demonstrates the lifecycle of a Universal Windows app.\n\n![A978-1-4842-0719-2_7_Fig1_HTML.jpg](A978-1-4842-0719-2_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1. Application states and events\n\nWhen a Universal Windows app is\
    \ launched, the WinJS app fires the following events in the order shown next.\n\
    \n`WinJS.Application.loaded` `WinJS.Application.activated` `WinJS.Application.ready`\
    \ `WinJS.Application.unload`\n\nWhen your app is about to be suspended, the `WinJS.Application.checkpoint`\
    \ event is triggered.\n\nTable [7-1](#A978-1-4842-0719-2_7_Chapter.html#Tab1)\
    \ provides the list of application events.\n\nTable 7-1. List of Application Events\n\
    \n| Event Name | Description |\n| --- | --- |\n| `WinJS.Application.loaded` |\
    \ This event is triggered by the `DOMContentLoaded` event once the HTML document\
    \ is completely loaded. |\n| `WinJS.Application.activated` | This event is triggered\
    \ when your application is activated. |\n| `WinJS.Application.ready` | This event\
    \ is triggered once the loaded and activated events execution is complete. |\n\
    | `WinJS.Application.unload` | This event is triggered by the `beforeunload` event\
    \ before a page is unloaded. |\n| `WinJS.Application.checkpoint` | This event\
    \ is triggered when your application is suspended. |\n\nThe developers should\
    \ handle the activated event and checkpoint event to add their custom logic to\
    \ save and restore the state of the app, and hence, you would see these two events\
    \ included by default when creating a new project.\n\nThe other events can be\
    \ subscribed using the `WinJS.Application.addEventListener` method.\n\nOpen the\
    \ `default.js` file and add the following code snippet just above the `onactivated`\
    \ event line.\n\n```\nWinJS.Application.addEventListener(\"loaded\", function(event)\
    \ {\n    console.log(\"loaded event\");\n});\nWinJS.Application.addEventListener(\"\
    ready\", function (event) {\n    console.log(\"ready event\");\n});\n```\n\nAdditionally,\
    \ add `console.log (\"activated\");` inside the `onactivated` event.\n\nWhen you\
    \ run the app on Windows desktop using the Local Machine option, you see the events\
    \ raised in the specified order, as shown in the Figure [7-2](#A978-1-4842-0719-2_7_Chapter.html#Fig2).\n\
    \n![A978-1-4842-0719-2_7_Fig2_HTML.jpg](A978-1-4842-0719-2_7_Fig2_HTML.jpg)\n\n\
    Figure 7-2. Application events in the JavaScript console window\n\nNote: The events\
    \ are not raised until the `WinJS.Application.start` event is invoked. This method\
    \ is invoked in the `default.js` file.\n\nThe Windows app must first be installed\
    \ on the device to be activated. This can generally happen by installing the app\
    \ from the Windows Store or using Visual Studio to build and deploy the universal\
    \ application during development.\n\nThe Windows app is activated when the user\
    \ taps on the app tile from the Start screen or from the apps list. At this stage,\
    \ the application is in the NotRunning state, considering the following conditions:\n\
    \n- The app was launched for the first time.\n- The app is not running because\
    \ it crashed.\n- The app was suspended and later terminated by the system.\n\n\
    The app can be activated several ways. The `ActivationKind` enumeration can be\
    \ used to find out how the app was activated and to determine the exact reason\
    \ for the app’s activation.\n\nFor example, the app can be activated when the\
    \ user taps on the application tile. The `ActivationKind` value is `launch` in\
    \ this scenario. Similarly, when the activation of the app is done from the search\
    \ contract, the `ActivationKind` value is `search`.\n\nThe following code snippet\
    \ shows how to handle this within the `onactivated` event.\n\n```\nif (args.detail.kind\
    \ === activation.ActivationKind.launch) {\n            console.log(\"launch activation\
    \ kind\");\n}\nelse if (args.detail.kind === activation.ActivationKind.Search)\
    \ {\n            console.log(\"search activation kind\");\n}\n```\n\nTable [7-2](#A978-1-4842-0719-2_7_Chapter.html#Tab2)\
    \ shows some of the most common activation methods and their enumeration values.\n\
    \nTable 7-2. Activation Methods\n\n| Enum Member | Value | Description |\n| ---\
    \ | --- | --- |\n| `launch` | 0 | This value is received when the user launches\
    \ the app or taps the tile from the app list. |\n| `search` | 1 | This value is\
    \ received when the user wants to search with the app using the search contract.\
    \ |\n| `shareTarget` | 2 | This value is received when the application was activated\
    \ using the share contract. |\n| `file` | 3 | This value is received when another\
    \ app within the device launched a file where the file type is registered by the\
    \ app to handle. |\n| `protocol` | 4 | This value is received when another app\
    \ launches a URI whose scheme name is registered to be handled by the app. |\n\
    | `fileOpenPicker` | 5 | This value is received when the user picks the files\
    \ that are provided by this app. |\n| `fileSavePicker` | 6 | This value is received\
    \ when the user tries to save a file and selects the app as the location. |\n\
    | `cachedFileUpdater` | 7 | This value is received when the user tries to save\
    \ a file that the app provides content management for. |\n| `contactPicker` |\
    \ 8 | This value is received when the user to pick contacts. |\n| `device` | 9\
    \ | The app handles AutoPlay. |\n| `voiceCommand` | 16 | This value is received\
    \ when the app is activated because of the voice command. |\n| `toastNotification`\
    \ | 1010 | This value is received when the app is activated after a user taps\
    \ on a toast notification or on the action inside the toast notification. |\n\n\
    ## 7.2 Handling the Unhandled Exception in Your App\n\n### Problem\n\nYour app\
    \ encounters a crash and the user is immediately taken to the Windows Start screen\
    \ without any information. You need to handle this scenario to provide a better\
    \ user experience.\n\n### Solution\n\nYou can handle the `WinJS.Application.error`\
    \ event in the `default.js` file to log the error and display a message to the\
    \ user."
  raw: '### How It Works


    Create a new Universal Windows project using the Universal Windows template, which
    can be found under the JavaScript ➤ Windows ➤ Universal node of the New Project
    dialog in Microsoft Visual Studio 2015\. This creates a single project in the
    Visual Studio Solution along with the necessary files in it to start with.


    From the project’s `js` folder, open the default.js file from the Visual Studio
    Solution Explorer. You see two important events that are subscribed by default.


    *   `app.onactivated`

    *   `app.oncheckpoint`


    The code for these events looks like the one shown next.


    `app.onactivated = function (args)`


    `{`


                    `if (args.detail.kind === activation.ActivationKind.launch)`


                 `{`


                            `if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)
    {`


                            `} else {`


                            `}`


                            `args.setPromise(WinJS.UI.processAll());`


                    `}`


            `};`


    `app.oncheckpoint = function (args)`


    `{`


    `};`


    As a developer, you should be handling these events to describe how the application
    should save and restore data when various execution states are triggered.


    In Universal Windows apps, there are three app execution states:


    *   Not Running

    *   Running

    *   Suspended


    Figure [7-1](#A978-1-4842-0719-2_7_Chapter.html#Fig1)demonstrates the lifecycle
    of a Universal Windows app.


    ![A978-1-4842-0719-2_7_Fig1_HTML.jpg](A978-1-4842-0719-2_7_Fig1_HTML.jpg)


    Figure 7-1.


    Application states and events


    When a Universal Windows app is launched, the WinJS app fires the following events
    in the order shown next.


    WinJS.Application.loaded   WinJS.Application.activated   WinJS.Application.ready
      WinJS.Application.unload  


    When your app is about to be suspended, the WinJS.Application.checkpoint event
    is triggered.


    Table [7-1](#A978-1-4842-0719-2_7_Chapter.html#Tab1) provides the list of application
    events.


    Table 7-1.


    List of Application Events


    | Event Name | Description |

    | --- | --- |

    | WinJS.Application.loaded | This event is triggered by the `DOMContentLoaded`
    event once the HTML document is completely loaded. |

    | WinJS.Application.activated | This event is triggered when your application
    is activated. |

    | WinJS.Application.ready | This event is triggered once the loaded and activated
    events execution is complete. |

    | WinJS.Application.unload | This event is triggered by the `beforeunload` event
    before a page is unloaded. |

    | WinJS.Application.checkpoint | This event is triggered when your application
    is suspended. |


    The developers should handle the activated event and checkpoint event to add their
    custom logic to save and restore the state of the app, and hence, you would see
    these two events included by default when creating a new project.


    The other events can be subscribed using the `WinJS.Application.addEventListener`
    method.


    Open the `default.js` file and add the following code snippet just above the `onactivated`
    event line.


    `WinJS.Application.addEventListener("loaded", function(event) {`


        `console.log("loaded event");`


    `});`


    `WinJS.Application.addEventListener("ready", function (event) {`


        `console.log("ready event");`


    `});`


    Additionally, add `console.log ("activated");` inside the `onactivated` event.


    When you run the app on Windows desktop using the Local Machine option, you see
    the events raised in the specified order, as shown in the Figure [7-2](#A978-1-4842-0719-2_7_Chapter.html#Fig2).


    ![A978-1-4842-0719-2_7_Fig2_HTML.jpg](A978-1-4842-0719-2_7_Fig2_HTML.jpg)


    Figure 7-2.


    Application events in the JavaScript console window Note


    The events are not raised until the `WinJS.Application.start` event is invoked.
    This method is invoked in the `default.js` file.


    The Windows app must first be installed on the device to be activated. This can
    generally happen by installing the app from the Windows Store or using Visual
    Studio to build and deploy the universal application during development.


    The Windows app is activated when the user taps on the app tile from the Start
    screen or from the apps list. At this stage, the application is in the NotRunning
    state, considering the following conditions:


    *   The app was launched for the first time.

    *   The app is not running because it crashed.

    *   The app was suspended and later terminated by the system.


    The app can be activated several ways. The `ActivationKind` enumeration can be
    used to find out how the app was activated and to determine the exact reason for
    the app’s activation.


    For example, the app can be activated when the user taps on the application tile.
    The ActivationKind value is launched in this scenario. Similarly, when the activation
    of the app is done from the search contract, the ActivationKind value is searched.


    The following code snippet shows how to handle this within the `onactivated` event.


    `if (args.detail.kind === activation.ActivationKind.launch) {`


                `console.log("launch activation kind");`


    `}`


    `else`


    `if (args.detail.kind === activation.ActivationKind.Search) {`


                `console.log("search activation kind");`


    `}`


    Table [7-2](#A978-1-4842-0719-2_7_Chapter.html#Tab2) shows some of the most common
    activation methods and their enumeration values.


    Table 7-2.


    Activation Methods


    | Enum Member | Value | Description |

    | --- | --- | --- |

    | launch | 0 | This value is received when the user launches the app or taps the
    tile from the app list. |

    | search | 1 | This value is received when the user wants to search with the app
    using the search contract. |

    | shareTarget | 2 | This value is received when the application was activated
    using the share contract. |

    | file | 3 | This value is received when another app within the device launched
    a file where the file type is registered by the app to handle. |

    | protocol | 4 | This value is received when another app launches a URI whose
    scheme name is registered to be handled by the app. |

    | fileOpenPicker | 5 | This value is received when the user picks the files that
    are provided by this app. |

    | fileSavePicker | 6 | This value is received when the user tries to save a file
    and selects the app as the location. |

    | cachedFileUpdater | 7 | This value is received when the user tries to save a
    file that the app provides content management for. |

    | contactPicker | 8 | This value is received when the user to pick contacts. |

    | device | 9 | The app handles AutoPlay. |

    | voiceCommand | 16 | This value is received when the app is activated because
    of the voice command. |

    | toastNotification | 1010 | This value is received when the app is activated
    after a user taps on a toast notification or on the action inside the toast notification.
    |


    ## 7.2 Handling the Unhandled Exception in Your App


    ### Problem


    Your app encounters a crash and the user is immediately taken to the Windows Start
    screen without any information. You need to handle this scenario to provide a
    better user experience.


    ### Solution


    You can handle the `WinJS.Application.error` event in the `default.js` file to
    log the error and display a message to the user.'
  trans: "\n### 工作原理\n\n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual\
    \ Studio 2015 的“新建项目”对话框中的“JavaScript ➤ Windows ➤ 通用”节点下。这将在 Visual Studio 解决方案中创建一个项目，并附带所需的文件供您开始使用。\n\
    \n从项目的 `js` 文件夹中，通过 Visual Studio 解决方案资源管理器打开 `default.js` 文件。您会看到默认订阅的两个重要事件。\n\
    \n- `app.onactivated`\n- `app.oncheckpoint`\n\n这些事件的代码如下所示。\n\n```\napp.onactivated\
    \ = function (args)\n{\n                if (args.detail.kind === activation.ActivationKind.launch)\n\
    \             {\n                        if (args.detail.previousExecutionState\
    \ !== activation.ApplicationExecutionState.terminated) {\n                   \
    \     } else {\n                        }\n                        args.setPromise(WinJS.UI.processAll());\n\
    \                }\n        };\napp.oncheckpoint = function (args)\n{\n};\n```\n\
    \n作为开发者，您应处理这些事件，以描述当触发各种执行状态时，应用程序应如何保存和恢复数据。\n\n在通用 Windows 应用中，有三种应用执行状态：\n\
    \n- 未运行\n- 运行中\n- 已挂起\n\n图 7-1 展示了通用 Windows 应用的生命周期。\n\n![A978-1-4842-0719-2_7_Fig1_HTML.jpg](img/A978-1-4842-0719-2_7_Fig1_HTML.jpg)\n\
    \n图 7-1. 应用程序状态与事件\n\n当通用 Windows 应用启动时，WinJS 应用会按以下顺序触发事件。\n\n`WinJS.Application.loaded`\
    \ `WinJS.Application.activated` `WinJS.Application.ready` `WinJS.Application.unload`\n\
    \n当您的应用即将被挂起时，会触发 `WinJS.Application.checkpoint` 事件。\n\n表 7-1 提供了应用程序事件的列表。\n\n\
    表 7-1. 应用程序事件列表\n\n| 事件名称 | 描述 |\n| --- | --- |\n| `WinJS.Application.loaded`\
    \ | 当 HTML 文档完全加载后，此事件由 `DOMContentLoaded` 事件触发。 |\n| `WinJS.Application.activated`\
    \ | 当您的应用程序被激活时触发此事件。 |\n| `WinJS.Application.ready` | 当 `loaded` 和 `activated`\
    \ 事件执行完成后触发此事件。 |\n| `WinJS.Application.unload` | 此事件在页面卸载前由 `beforeunload` 事件触发。\
    \ |\n| `WinJS.Application.checkpoint` | 当您的应用程序被挂起时触发此事件。 |\n\n开发者应处理 `activated`\
    \ 事件和 `checkpoint` 事件，以添加自定义逻辑来保存和恢复应用状态。因此，在创建新项目时，您会看到默认包含这两个事件。\n\n其他事件可以使用\
    \ `WinJS.Application.addEventListener` 方法进行订阅。\n\n打开 `default.js` 文件，并在 `onactivated`\
    \ 事件行上方添加以下代码片段。\n\n```\nWinJS.Application.addEventListener(\"loaded\", function(event)\
    \ {\n    console.log(\"loaded event\");\n});\nWinJS.Application.addEventListener(\"\
    ready\", function (event) {\n    console.log(\"ready event\");\n});\n```\n\n此外，在\
    \ `onactivated` 事件内部添加 `console.log (\"activated\");`。\n\n当您使用“本地计算机”选项在 Windows\
    \ 桌面上运行该应用时，您会看到事件按指定顺序触发，如图 7-2 所示。\n\n![A978-1-4842-0719-2_7_Fig2_HTML.jpg](img/A978-1-4842-0719-2_7_Fig2_HTML.jpg)\n\
    \n图 7-2. JavaScript 控制台窗口中的应用程序事件\n\n注意：在调用 `WinJS.Application.start` 事件之前，这些事件不会被触发。该方法在\
    \ `default.js` 文件中被调用。\n\nWindows 应用必须先安装在设备上才能被激活。这通常可以通过从 Windows 应用商店安装应用，或在开发过程中使用\
    \ Visual Studio 构建和部署通用应用来实现。\n\n当用户从“开始”屏幕或应用列表中点击应用磁贴时，Windows 应用被激活。在此阶段，应用处于“未运行”状态，需考虑以下条件：\n\
    \n- 应用是首次启动。\n- 应用因崩溃而未运行。\n- 应用被挂起，随后被系统终止。\n\n应用可以通过多种方式被激活。可以使用 `ActivationKind`\
    \ 枚举来查明应用是如何被激活的，并确定应用激活的确切原因。\n\n例如，当用户点击应用磁贴时，应用可以被激活。在这种情况下，`ActivationKind`\
    \ 的值为 `launch`。同样，当通过搜索合约激活应用时，`ActivationKind` 的值为 `search`。\n\n以下代码片段展示了如何在\
    \ `onactivated` 事件中处理此情况。\n\n```\nif (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            console.log(\"launch activation kind\");\n}\nelse if (args.detail.kind\
    \ === activation.ActivationKind.Search) {\n            console.log(\"search activation\
    \ kind\");\n}\n```\n\n表 7-2 展示了一些最常见的激活方法及其枚举值。\n\n表 7-2. 激活方法\n\n| 枚举成员 | 值 |\
    \ 描述 |\n| --- | --- | --- |\n| `launch` | 0 | 当用户启动应用或从应用列表中点击磁贴时接收到此值。 |\n| `search`\
    \ | 1 | 当用户希望使用应用通过搜索合约进行搜索时接收到此值。 |\n| `shareTarget` | 2 | 当应用程序通过共享合约被激活时接收到此值。\
    \ |\n| `file` | 3 | 当设备中的另一个应用启动了一个文件，且该文件的文件类型已由应用注册进行处理时接收到此值。 |\n| `protocol`\
    \ | 4 | 当另一个应用启动了一个 URI，该 URI 的方案名称已注册由该应用处理时接收到此值。 |\n| `fileOpenPicker` | 5\
    \ | 当用户选取由此应用提供的文件时接收到此值。 |\n| `fileSavePicker` | 6 | 当用户尝试保存文件并选择该应用作为位置时接收到此值。\
    \ |\n| `cachedFileUpdater` | 7 | 当用户尝试保存一个由该应用提供内容管理的文件时接收到此值。 |\n| `contactPicker`\
    \ | 8 | 当用户选取联系人时接收到此值。 |\n| `device` | 9 | 该应用处理自动播放。 |\n| `voiceCommand` | 16\
    \ | 当应用因语音命令而被激活时接收到此值。 |\n| `toastNotification` | 1010 | 当用户点击 toast 通知或 toast\
    \ 通知内的操作后应用被激活时接收到此值。 |\n\n## 7.2 处理应用中的未处理异常\n\n### 问题\n\n您的应用崩溃，用户立即被带到 Windows\
    \ 开始屏幕，且没有任何信息。您需要处理此场景以提供更好的用户体验。\n\n### 解决方案\n\n您可以在 `default.js` 文件中处理 `WinJS.Application.error`\
    \ 事件，以记录错误并向用户显示一条消息。\n"
- fmt: "### How It Works\n\nWhen there is an unhandled exception in your Universal\
    \ Windows app, the `MSApp.terminateApp` function is invoked, and after which the\
    \ application closes without any information to the user.\n\nIn this recipe, let’s\
    \ handle the `WinJS.Application.error` event and display a message to the user\
    \ when the unhandled exception occurs in the app.\n\nCreate a new Universal Windows\
    \ project using the Universal Windows template, which can be found under the JavaScript\
    \ ➤ Windows ➤ Universal node of the New Project dialog in Microsoft Visual Studio\
    \ 2015. This creates a single project in the Visual Studio Solution along with\
    \ the necessary files in it to start with.\n\nOpen the `default.js` file from\
    \ the `js` folder and replace it with the following code snippet.\n\n```\n(function\
    \ () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var activation\
    \ = Windows.ApplicationModel.Activation;\n    WinJS.Application.addEventListener(\"\
    error\", function(eventArgs) {\n        var errorMessage = new Windows.UI.Popups.MessageDialog(\"\
    There was an error in the app. Kindly contact the app publisher\");\n        errorMessage.showAsync();\n\
    \        return true;\n    });\n    app.onactivated = function (args) {\n    \
    \    args.setPromise(WinJS.UI.processAll());\n        throw new WinJS.ErrorFromName();\n\
    \    };\n    app.start();\n})();\n```\n\nThis code snippet throws an exception\
    \ from the `onactivated` event. The `WinJS.Application.addEventListener` function\
    \ is used to add a listener to the error event to handle the unhandled exception\
    \ and display a message to the user.\n\nRun the app on Windows desktop using the\
    \ Local Machine option in Visual Studio 2015. You see the message displayed in\
    \ Figure 7-3.\n\n![A978-1-4842-0719-2_7_Fig3_HTML.jpg](A978-1-4842-0719-2_7_Fig3_HTML.jpg)\n\
    \n**Figure 7-3.** Displaying a message on an unhandled exception in the app\n\n\
    **Note:** The error handler function returns `true`. The value `true` is used\
    \ to indicate that the error is handled, and hence the app should not be terminated.\n\
    \n## 7.3 Handling the Termination and Resuming of the App\n\n### Problem\n\nYou\
    \ need to identify the previous execution state of the app so that you restore\
    \ it when launching.\n\n### Solution\n\nYou can use the `detail.previousExecutionState`\
    \ property of the activated event’s parameter to identify the state of the app.\
    \ This property determines if the app was launched as a new app, or if it was\
    \ previously closed by the user, or if the user is launching the app after it\
    \ was suspended or terminated.\n\n### How It Works\n\nThe previous `ExecutionState`\
    \ contains the value indicating the previous state of the application. You can\
    \ use this value in the activated event to load the previous state values or the\
    \ initial state values based on this value.\n\nCreate a new Universal Windows\
    \ project using the Universal Windows template, which is found under the JavaScript\
    \ ➤ Windows ➤ Universal node of the New Project dialog in Microsoft Visual Studio\
    \ 2015. This creates a single project in the Visual Studio Solution along with\
    \ the necessary files in it to start with.\n\nOpen the `default.js` file from\
    \ the `js` folder and replace the `onactivated` event with the following code\
    \ snippet.\n\n```\napp.onactivated = function (args) {\n    if (args.detail.kind\
    \ === activation.ActivationKind.launch) {\n        if (args.detail.previousExecutionState\
    \ === activation.ApplicationExecutionState.notRunning) {\n            console.log(\"\
    Previous state is not running\");\n        }\n        if (args.detail.previousExecutionState\
    \ === activation.ApplicationExecutionState.closedByUser) {\n            console.log(\"\
    Previous state is closed by the user\");\n        }\n        if (args.detail.previousExecutionState\
    \ === activation.ApplicationExecutionState.terminated) {\n            console.log(\"\
    Previous state is terminated\");\n        }\n        args.setPromise(WinJS.UI.processAll());\n\
    \    }\n};\n```\n\nThis code handles the `onactivated` event where the `args.detail.previousExecutionState`\
    \ is used to find the previous state of the app. The `ApplicationExecutionState`\
    \ enum is used to check the state of the app.\n\nWhen you run the app, you see\
    \ the previous state displayed in the JavaScript console window, as shown in Figure\
    \ 7-4.\n\n![A978-1-4842-0719-2_7_Fig4_HTML.jpg](A978-1-4842-0719-2_7_Fig4_HTML.jpg)\n\
    \n**Figure 7-4.** `PreviousExecutionState` displayed in the JavaScript console\
    \ window\n\nThe `ApplicationExecutionState` enumeration contains the values, as\
    \ shown in Table 7-3.\n\n**Table 7-3.** `ApplicationExecutionState` and Enumeration\
    \ Values\n\n| State | Description |\n| --- | --- |\n| `notRunning` | This app’s\
    \ previous state is “notRunning” when the user launches the app for the first\
    \ time, closes the app, and launches the app within 10 seconds, or when the app\
    \ crashes. |\n| `running` | The app’s previous state is “running” if the app is\
    \ already running and the user launches the app using the contracts or a secondary\
    \ tile. |\n| `suspended` | The app’s previous state is “suspended” if the app\
    \ is suspended and later activated via the secondary tile or contracts. |\n| `terminated`\
    \ | The app’s previous state is “terminated” if the app was previously terminated\
    \ by the operating system. |\n| `closedByUser` | The app’s previous state is “closedByUser”\
    \ if the app was closed by the user and not restarted within 10 seconds. The app\
    \ could be closed by using the `Alt`+`F4` shortcut key or by using the close gesture.\
    \ |\n\n## 7.4 Using SessionState to Store the State\n\n### Problem\n\nYou need\
    \ to store the state of the app across the application lifecycle so that the value\
    \ can be restored on the app activation.\n\n### Solution\n\nUse the `WinJS.Application.sessionState`\
    \ to store data to an app’s state, which can be used to restore the app after\
    \ it is suspended or terminated."
  raw: '### How It Works


    When there is an unhandled exception in your Universal Windows app, the `MSApp.terminateApp`
    function is invoked, and after which the application closes without any information
    to the user.


    In this recipe, let’s handle the `WinJS.Application.error` event and display a
    message to the user when the unhandled exception occurs in the app.


    Create a new Universal Windows project using the Universal Windows template, which
    can be found under the JavaScript ➤ Windows ➤ Universal node of the New Project
    dialog in Microsoft Visual Studio 2015\. This creates a single project in the
    Visual Studio Solution along with the necessary files in it to start with.


    Open the `default.js` file from the `js` folder and replace it with the following
    code snippet.


    `(function () {`


            `"use strict";`


            `var app = WinJS.Application;`


            `var activation = Windows.ApplicationModel.Activation;`


        `WinJS.Application.addEventListener("error", function(eventArgs) {`


            `var errorMessage = new Windows.UI.Popups.MessageDialog("There was an
    error in the app. Kindly contact the app publisher");`


            `errorMessage.showAsync();`


            `return true;`


        `});`


        `app.onactivated = function (args) {`


            `args.setPromise(WinJS.UI.processAll());`


            `throw new WinJS.ErrorFromName();`


        `};`


            `app.start();`


    `})();`


    This code snippet throws an exception from the `onactivated` event. The `WinJS.Application.addEventListener`
    function is used to add a listener to the error event to handle the unhandled
    exception and display a message to the user.


    Run the app on Windows desktop using the Local Machine option in Visual Studio
    2015\. You see the message displayed in Figure [7-3](#A978-1-4842-0719-2_7_Chapter.html#Fig3).


    ![A978-1-4842-0719-2_7_Fig3_HTML.jpg](A978-1-4842-0719-2_7_Fig3_HTML.jpg)


    Figure 7-3.


    Displaying a message on an unhandled exception in the app Note


    The error handler function returns true. The value true is used to indicate that
    the error is handled, and hence the app should not be terminated.


    ## 7.3 Handling the Termination and Resuming of the App


    ### Problem


    You need to identify the previous execution state of the app so that you restore
    it when launching.


    ### Solution


    You can use the `detail.previousExecutionState` property of the activated event’s
    parameter to identify the state of the app. This property determines if the app
    was launched as a new app, or if it was previously closed by the user, or if the
    user is launching the app after it was suspended or terminated.


    ### How It Works


    The previous ExecutionState contains the value indicating the previous state of
    the application. You can use this value in the activated event to load the previous
    state values or the initial state values based on this value.


    Create a new Universal Windows project using the Universal Windows template, which
    is found under the JavaScript ➤ Windows ➤ Universal node of the New Project dialog
    in Microsoft Visual Studio 2015\. This creates a single project in the Visual
    Studio Solution along with the necessary files in it to start with.


    Open the `default.js` file from the `js` folder and replace the `onactivated`
    event with the following code snippet.


    `app.onactivated = function (args) {`


                `if (args.detail.kind === activation.ActivationKind.launch) {`


                    `if (args.detail.previousExecutionState === activation.ApplicationExecutionState.notRunning)
    {`


                        `console.log("Previous state is not running");`


                    `}`


                    `if (args.detail.previousExecutionState === activation.ApplicationExecutionState.closedByUser)
    {`


                        `console.log("Previous state is closed by the user");`


                    `}`


                            `if (args.detail.previousExecutionState === activation.ApplicationExecutionState.terminated)
    {`


                                `console.log("Previous state is terminated");`


                            `}`


                            `args.setPromise(WinJS.UI.processAll());`


                    `}`


            `};`


    This code handles the `onactivated` event where the `args.detail.previousExecutionState`
    is used to find the previous state of the app. The `ApplicationExecutionState`
    enum is used to check the state of the app.


    When you run the app, you see the previous state displayed in the JavaScript console
    window, as shown in Figure [7-4](#A978-1-4842-0719-2_7_Chapter.html#Fig4).


    ![A978-1-4842-0719-2_7_Fig4_HTML.jpg](A978-1-4842-0719-2_7_Fig4_HTML.jpg)


    Figure 7-4.


    PreviousExecutionState displayed in the JavaScript console window


    The ApplicationExecutionState enumeration contains the values, as shown in Table
    [7-3](#A978-1-4842-0719-2_7_Chapter.html#Tab3).


    Table 7-3.


    ApplicationExecutionState and Enumeration Values


    | State | Description |

    | --- | --- |

    | notRunning | This app’s previous state is “notRunning” when the user launches
    the app for the first time, closes the app, and launches the app within 10 seconds,
    or when the app crashes. |

    | running | The app’s previous state is “running” if the app is already running
    and the user launches the app using the contracts or a secondary tile. |

    | suspended | The app’s previous state is “suspended” if the app is suspended
    and later activated via the secondary tile or contracts. |

    | terminated | The app’s previous state is “terminated” if the app was previously
    terminated by the operating system. |

    | closedByUser | The app’s previous state is “closedByUser” if the app was closed
    by the user and not restarted within 10 seconds. The app could be closed by using
    the Alt+ F4 shortcut key or by using the close gesture. |


    ## 7.4 Using SessionState to Store the State


    ### Problem


    You need to store the state of the app across the application lifecycle so that
    the value can be restored on the app activation.


    ### Solution


    Use the `WinJS.Application.sessionState` to store data to an app’s state, which
    can be used to restore the app after it is suspended or terminated.'
  trans: "\n### 工作原理\n\n当通用 Windows 应用中出现未处理的异常时，会调用 `MSApp.terminateApp` 函数，之后应用程序关闭，且不会向用户显示任何信息。\n\
    \n在本教程中，我们将处理 `WinJS.Application.error` 事件，并在应用中出现未处理异常时向用户显示一条消息。\n\n使用通用 Windows\
    \ 模板创建一个新的通用 Windows 项目，该模板可以在 Microsoft Visual Studio 2015 的“新建项目”对话框中的 JavaScript\
    \ ➤ Windows ➤ Universal 节点下找到。这将在 Visual Studio 解决方案中创建一个项目，并同时在其中包含必要的文件以开始开发。\n\
    \n从 `js` 文件夹中打开 `default.js` 文件，并将其替换为以下代码片段。\n\n```\n(function () {\n    \"use\
    \ strict\";\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    WinJS.Application.addEventListener(\"error\", function(eventArgs) {\n   \
    \     var errorMessage = new Windows.UI.Popups.MessageDialog(\"应用程序中发生错误，请联系应用程序发布者\"\
    );\n        errorMessage.showAsync();\n        return true;\n    });\n    app.onactivated\
    \ = function (args) {\n        args.setPromise(WinJS.UI.processAll());\n     \
    \   throw new WinJS.ErrorFromName();\n    };\n    app.start();\n})();\n```\n\n\
    此代码片段从 `onactivated` 事件中抛出一个异常。`WinJS.Application.addEventListener` 函数用于为 error\
    \ 事件添加侦听器，以处理未处理的异常并向用户显示一条消息。\n\n使用 Visual Studio 2015 中的“本地计算机”选项在 Windows 桌面上运行该应用。您将看到如图\
    \ 7-3 所示的消息。\n\n![A978-1-4842-0719-2_7_Fig3_HTML.jpg](img/A978-1-4842-0719-2_7_Fig3_HTML.jpg)\n\
    \n**图 7-3.** 在应用出现未处理异常时显示消息\n\n**注意：** 错误处理函数返回 `true`。值 `true` 用于指示错误已被处理，因此不应终止应用。\n\
    \n## 7.3 处理应用的终止和恢复\n\n### 问题\n\n您需要识别应用的先前执行状态，以便在启动时恢复该状态。\n\n### 解决方案\n\n您可以使用激活事件参数的\
    \ `detail.previousExecutionState` 属性来识别应用的状态。此属性确定应用是作为新应用启动的，还是之前被用户关闭的，或者是用户在应用被挂起或终止后启动的。\n\
    \n### 工作原理\n\n`previousExecutionState` 包含指示应用程序先前状态的值。您可以在 activated 事件中使用此值，根据此值加载之前的状态值或初始状态值。\n\
    \n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板可以在 Microsoft Visual Studio 2015 的“新建项目”对话框中的\
    \ JavaScript ➤ Windows ➤ Universal 节点下找到。这将在 Visual Studio 解决方案中创建一个项目，并同时在其中包含必要的文件以开始开发。\n\
    \n从 `js` 文件夹中打开 `default.js` 文件，并将 `onactivated` 事件替换为以下代码片段。\n\n```\napp.onactivated\
    \ = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n        if (args.detail.previousExecutionState === activation.ApplicationExecutionState.notRunning)\
    \ {\n            console.log(\"Previous state is not running\");\n        }\n\
    \        if (args.detail.previousExecutionState === activation.ApplicationExecutionState.closedByUser)\
    \ {\n            console.log(\"Previous state is closed by the user\");\n    \
    \    }\n        if (args.detail.previousExecutionState === activation.ApplicationExecutionState.terminated)\
    \ {\n            console.log(\"Previous state is terminated\");\n        }\n \
    \       args.setPromise(WinJS.UI.processAll());\n    }\n};\n```\n\n此代码处理 `onactivated`\
    \ 事件，其中使用 `args.detail.previousExecutionState` 来查找应用的先前状态。`ApplicationExecutionState`\
    \ 枚举用于检查应用的状态。\n\n当您运行应用时，您会在 JavaScript 控制台窗口中看到显示的先前状态，如图 7-4 所示。\n\n![A978-1-4842-0719-2_7_Fig4_HTML.jpg](img/A978-1-4842-0719-2_7_Fig4_HTML.jpg)\n\
    \n**图 7-4.** 在 JavaScript 控制台窗口中显示的 `PreviousExecutionState`\n\n`ApplicationExecutionState`\
    \ 枚举包含的值如表 7-3 所示。\n\n**表 7-3.** `ApplicationExecutionState` 及其枚举值\n\n| 状态 | 描述\
    \ |\n| --- | --- |\n| `notRunning` | 当用户首次启动应用、关闭应用并在 10 秒内重新启动应用，或应用崩溃时，应用的先前状态为\
    \ \"notRunning\"。 |\n| `running` | 如果应用已在运行，并且用户通过合约或辅助磁贴启动应用，则应用的先前状态为 \"running\"\
    。 |\n| `suspended` | 如果应用被挂起，之后通过辅助磁贴或合约激活，则应用的先前状态为 \"suspended\"。 |\n| `terminated`\
    \ | 如果应用之前被操作系统终止，则应用的先前状态为 \"terminated\"。 |\n| `closedByUser` | 如果应用被用户关闭且未在\
    \ 10 秒内重新启动，则应用的先前状态为 \"closedByUser\"。应用可以通过 `Alt`+`F4` 快捷键或使用关闭手势来关闭。 |\n\n\
    ## 7.4 使用 SessionState 存储状态\n\n### 问题\n\n您需要在应用程序生命周期内存储应用的状态，以便在应用激活时恢复该值。\n\n\
    ### 解决方案\n\n使用 `WinJS.Application.sessionState` 将数据存储到应用的状态中，该状态可用于在应用挂起或终止后恢复应用。\n"
- fmt: "### How It Works\n\n`WinJS.Application.sessionState`对象用于存储应用程序信息，以便在应用程序被挂起或终止后恢复其状态。\n\
    \n当应用程序被挂起然后重新启动时，它不会丢失状态。但是，当应用程序被挂起，随后操作系统因内存不足或其他原因终止该应用程序时，其状态会丢失。应用程序再次启动时将从头开始。\n\
    \n`WinJS.Application.sessionState`有助于解决此问题。\n\n让我们通过一些代码来演示`SessionState`的用法。\n\
    \n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual Studio 2015 中“新建项目”对话框的\
    \ `JavaScript ➤ Windows ➤ Universal` 节点下。这会在 Visual Studio 解决方案中创建一个项目，并在其中包含必要的文件。从\
    \ Visual Studio 解决方案资源管理器中打开 `default.html` 页面，并将其替换为以下代码片段。\n\n```html\n<!DOCTYPE\
    \ html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe7.4</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe7.4 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    </head>\n<body class=\"win-type-body\" style=\"margin: 20px\">\n<div>\n    <input\
    \ id=\"txt1\"/>\n    <input id=\"txt2\"/>\n</div>\n</body>\n</html>\n```\n\n上面的代码片段在页面上添加了两个输入控件，以便用户可以输入数据。\n\
    \n打开 `js` 文件夹中的 `default.js` 文件，并将 `onactivated` 和 `oncheckpoint` 事件替换为以下代码片段。\n\
    \n```javascript\napp.onactivated = function (args) {\n                if (args.detail.kind\
    \ === activation.ActivationKind.launch) {\n                    if (args.detail.previousExecutionState\
    \ === Windows.ApplicationModel.Activation.ApplicationExecutionState.notRunning)\
    \ {\n                        console.log(\"setting the initial values\");\n  \
    \                      document.getElementById(\"txt1\").value = '';\n       \
    \                 document.getElementById(\"txt2\").value = '';\n            \
    \        }\n                    if (args.detail.previousExecutionState === Windows.ApplicationModel.Activation.ApplicationExecutionState.closedByUser)\
    \ {\n                        console.log(\"setting the initial values\");\n  \
    \                      document.getElementById(\"txt1\").value = '';\n       \
    \                 document.getElementById(\"txt2\").value = '';\n            \
    \        }\n                    if (args.detail.previousExecutionState === Windows.ApplicationModel.Activation.ApplicationExecutionState.terminated)\
    \ {\n                        console.log(\"setting the previous state values\"\
    );\n                        document.getElementById(\"txt1\").value = WinJS.Application.sessionState.txt1;\n\
    \                        document.getElementById(\"txt2\").value = WinJS.Application.sessionState.txt2;\n\
    \                    }\n                        args.setPromise(WinJS.UI.processAll());\n\
    \                }\n        };\n        app.oncheckpoint = function (args) {\n\
    \            WinJS.Application.sessionState.txt1 = document.getElementById(\"\
    txt1\").value;\n            WinJS.Application.sessionState.txt2 = document.getElementById(\"\
    txt2\").value;\n        };\n```\n\n该代码片段处理 `onactivated` 和 `oncheckpoint` 事件。当应用程序被挂起时，会触发\
    \ `oncheckpoint` 事件。在此阶段，用户在两个文本框中输入的值会被保存到 `sessionState` 中。\n\n如果应用程序的上一个状态是\
    \ `terminated`，那么当应用程序重新激活时，将从 `sessionState` 中恢复值并更新到页面上的文本框中。如果上一个状态是 `notRunning`\
    \ 或 `closedByUser`，则恢复默认值。\n\n当你运行一个已被挂起并终止的应用程序时，你会看到应用程序数据在页面中恢复，如图 [7-5](#A978-1-4842-0719-2_7_Chapter.html#Fig5)\
    \ 所示。\n\n![A978-1-4842-0719-2_7_Fig5_HTML.jpg](A978-1-4842-0719-2_7_Fig5_HTML.jpg)\n\
    \n**图 7-5.** 显示从 `sessionState` 恢复的数据的页面\n\n你可以测试应用程序状态，并模拟 Visual Studio 2015\
    \ 中的挂起和终止事件。为此，需要使用“调试位置”工具栏中的“生命周期事件”下拉列表，如图 [7-6](#A978-1-4842-0719-2_7_Chapter.html#Fig6)\
    \ 所示。\n\n![A978-1-4842-0719-2_7_Fig6_HTML.jpg](A978-1-4842-0719-2_7_Fig6_HTML.jpg)\n\
    \n**图 7-6.** 用于测试 Visual Studio 中应用程序生命周期事件的工具\n\n可以通过单击 `Suspend` 选项来挂起正在运行的应用程序，然后点击\
    \ `Resume` 选项来恢复应用程序，从而模拟挂起和恢复生命周期事件。单击 `Suspend` 选项时，会触发 `onCheckpoint` 事件。可以通过单击\
    \ `Suspend and shutdown` 按钮来模拟挂起和终止事件。此时，`onCheckpoint` 事件被触发，并且你的应用程序终止。当你再次运行应用程序时，`previousExecutionState`\
    \ 包含值 `terminated`。\n\n## 7.5 使用超链接在页面之间导航\n\n### 问题\n\n你需要以最简单的方式之一在通用 Windows\
    \ 应用程序中的页面之间进行导航。\n\n### 解决方案\n\n使用 HTML 在应用程序内进行页面导航的最简单方法之一是使用超链接。\n\n### 工作原理\n\
    \n假设你的应用程序中有 `default.html` 和 `newpage.html` 文件，如果你想从 `default.html` 导航到 `newpage.html`，在\
    \ `default.html` 中添加以下代码即可实现。\n\n```html\n<p><a href=\"newpage.html\">Navigate\
    \ to page 2</a></p>\n```\n\n代码中的 `href` 是一个指向 `newpage.html` 的相对链接。这是一个属于你通用 Windows\
    \ 应用程序的 HTML 页面，并且应位于项目的根目录。\n\n或者，如果你想指定应用程序中本地文件的 URI，可以使用新的包内容 URI 方案，称为 `ms-appx`。\n\
    \n上述代码可以重写如下：\n\n```html\n<p><a href=\"ms-appx:///newpage.html\">Navigate to New\
    \ page</a></p>\n```\n\n**注意**\n\n尽管此示例执行了顶级导航，但你应该避免在 Windows 应用程序中这样做。这对于网页来说是理想的，但不适用于移动或平板电脑应用程序。有时，当应用程序加载下一页时，屏幕可能会变空白。\n\
    \n微软建议使用单页导航，与顶级导航相比，它提供了更好的性能和更像应用程序的体验。\n\n## 7.6 使用单页导航在页面之间导航\n\n### 问题\n\n\
    你需要使用单页导航模型在通用 Windows 应用程序中的页面之间进行导航。\n\n### 解决方案\n\n在通用 Windows 应用程序中实现单页导航的最简单解决方案之一，是将\
    \ Windows 8.1 导航应用模板中执行导航逻辑所需的文件导入到 Windows 10 项目中。\n\n**注意**\n\n在撰写本文时，Windows\
    \ 10 不提供像 Windows 8.1 中那样的等效导航模板。"
  raw: '### How It Works


    The `WinJS.Application.sessionState` object is used to store app information to
    restore the app’s state after the app is suspended or terminated.


    When the app is suspended and then launched back, it does not lose its state.
    But when the app is suspended and later the operating system terminates the app
    due to memory or another reason, the application’s state is lost. The app will
    start from scratch when launched again.


    The `WinJS.Application.sessionState` helps overcome this issue.


    Let’s demonstrate the usage of the SessionState with some code.


    Create a new Universal Windows project using the Universal Windows template, which
    can be found under the JavaScript ➤ Windows ➤ Universal node of the New Project
    dialog in Microsoft Visual Studio 2015\. This creates a single project in the
    Visual Studio Solution along with the necessary files in it to start.   Open the
    default.html page from Visual Studio Solution Explorer and replace it with the
    following code snippet. `<!DOCTYPE html>` `<html>` `<head>`     `<meta charset="utf-8"
    />`     `<title>Recipe7.4</title>`     `<!-- WinJS references -->`     `<link
    href="WinJS/css/ui-light.css" rel="stylesheet" />`     `<script src="WinJS/js/base.js"></script>`
        `<script src="WinJS/js/ui.js"></script>`     `<!-- Recipe7.4 references -->`
        `<link href="/css/default.css" rel="stylesheet" />`     `<script src="/js/default.js"></script>`
    `</head>` `<body class="win-type-body" style="margin: 20px">` `<div>`     `<input
    id="txt1"/>`     `<input id="txt2"/>` `</div>` `</body>` `</html>` The preceding
    code snippet adds two input controls on the page so that the user can enter data.
      Open the default.js file from the `js` folder and replace the `onactivated`
    and `oncheckpoint` events with the following code snippet. `app.onactivated =
    function (args) {`                 `if (args.detail.kind === activation.ActivationKind.launch)
    {`                     `if (args.detail.previousExecutionState === Windows.ApplicationModel.Activation.ApplicationExecutionState.notRunning)
    {`                         `console.log("setting the initial values");`                         `document.getElementById("txt1").value
    = '''';`                         `document.getElementById("txt2").value = '''';`
                        `}`                     `if (args.detail.previousExecutionState
    === Windows.ApplicationModel.Activation.ApplicationExecutionState.closedByUser)
    {`                         `console.log("setting the initial values");`                         `document.getElementById("txt1").value
    = '''';`                         `document.getElementById("txt2").value = '''';`
                        `}`                     `if (args.detail.previousExecutionState
    === Windows.ApplicationModel.Activation.ApplicationExecutionState.terminated)
    {`                         `console.log("setting the previous state values");`
                            `document.getElementById("txt1").value = WinJS.Application.sessionState.txt1;`
                            `document.getElementById("txt2").value = WinJS.Application.sessionState.txt2;`
                        `}`                         `args.setPromise(WinJS.UI.processAll());`
                    `}`         `};`         `app.oncheckpoint = function (args) {`
                `WinJS.Application.sessionState.txt1 = document.getElementById("txt1").value;`
                `WinJS.Application.sessionState.txt2 = document.getElementById("txt2").value;`
            `};`  


    The code snippet handles the `onactivated` and the `oncheckpoint` events. The
    `oncheckpoint` event is triggered when the app is suspended. At this stage, the
    value entered by the user in the two text boxes are saved in the `sessionState`.


    If the previous state of the application was terminated, when the app is reactivated,
    the value from the `sessionState` is restored and updated to the text boxes on
    the page. If the previous state is notRunning or closedByUser, then the default
    values are restored.


    When you run the app that is already suspended and terminated, you see the application
    data restored in the page, as shown in Figure [7-5](#A978-1-4842-0719-2_7_Chapter.html#Fig5).


    ![A978-1-4842-0719-2_7_Fig5_HTML.jpg](A978-1-4842-0719-2_7_Fig5_HTML.jpg)


    Figure 7-5.


    Page displaying the data restored from the sessionState


    You can test the application state and simulate the suspended and terminated events
    from Visual Studio 2015\. To do this, you need to use the Lifecycle Events drop-down
    list in the Debug Location toolbar, as shown in Figure [7-6](#A978-1-4842-0719-2_7_Chapter.html#Fig6).


    ![A978-1-4842-0719-2_7_Fig6_HTML.jpg](A978-1-4842-0719-2_7_Fig6_HTML.jpg)


    Figure 7-6.


    Tool to test the Application Lifecycle events from Visual Studio


    The Suspend and Resume lifecycle events can be simulated by clicking the Suspend
    option to suspend the app when it is running, and then clicking the Resume option
    to resume the app. On clicking the Suspend option, the `onCheckpoint` event is
    raised. The suspension and termination events can be simulated by clicking the
    Suspend and shutdown button. At this time, the `onCheckpoint` event is raised
    and your app terminates. When you run the app again, the `previousExecutionState`
    contains the value terminated.


    ## 7.5 Navigate Between Pages Using Hyperlinks


    ### Problem


    You need to navigate between pages within your Universal Windows app in one of
    the simplest ways.


    ### Solution


    One of the simplest ways to navigate between pages within your app with HTML is
    to use hyperlinks.


    ### How It Works


    Assuming that you have `default.html` and `newpage.html` files in your app, if
    you want to navigate to `newpage.html` from the `default.html`, adding the following
    code in `default.html` will do this.


    `<p><a href="newpage.html">Navigate to page 2</a></p>`


    The `href` in the code is a relative link that refers to `newpage.html`. This
    is a HTML page that is part of your Universal Windows app and should be in the
    root of the project.


    Alternatively, you can use the new package content URI scheme called ms-appx if
    you want to specify the URI of the local file that is part of your application.


    The preceding code can be rewritten as follows:


    `<p><a href="ms-appx:///newpage.html">Navigate to New page</a></p>`


    Note


    Although this recipe performs the top-level navigation, you must avoid doing this
    in a Windows app. This is ideal for a web page but not for a mobile or tablet
    app. There are times when the screen might go blank when the app loads the next
    page.


    Microsoft recommends using the single-page navigation, which provides a better
    performance and a more app-like experience when compared with the top-level navigation.


    ## 7.6 Navigate Between Pages Using Single-Page Navigation


    ### Problem


    You need to navigate between pages within your Universal Windows app using the
    single-page navigation model.


    ### Solution


    One of the simplest solutions to implement the single-page navigation in a Universal
    Windows app is to use the necessary files that perform the navigation logic from
    the Windows 8.1 Navigation App template in to the Windows 10 project.


    Note


    At the time of writing, Windows 10 does not provide an equivalent navigation template
    like the one in Windows 8.1.'
