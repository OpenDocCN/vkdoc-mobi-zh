    Follow these steps to create a new mobile service in Microsoft Azure:


    Log in to the Microsoft Azure Management portal by navigating to [`http://manage.windowsazure.com`](http://manage.windowsazure.com/)
    and providing your login credentials.   You can create a new mobile service by
    clicking the +New button in the bottom bar and then selecting Compute ➤ Mobile
    Service ➤ Create, as shown in Figure [13-1](#A978-1-4842-0719-2_13_Chapter.html#Fig1).


    ![A978-1-4842-0719-2_13_Fig1_HTML.jpg](A978-1-4842-0719-2_13_Fig1_HTML.jpg)


    Figure 13-1.


    Microsoft Azure dashboard for creating a new mobile service   Provide the details
    of the mobile service. This includes the URL to access the mobile service, subscription,
    region, back end, and so forth. You can provide the Mobile Service name as winjsrecipes.
    Currently, Microsoft Azure supports JavaScript and .NET back ends. Select JavaScript
    in this recipe and click the Next button, as shown in Figure [13-2](#A978-1-4842-0719-2_13_Chapter.html#Fig2).


    ![A978-1-4842-0719-2_13_Fig2_HTML.jpg](A978-1-4842-0719-2_13_Fig2_HTML.jpg)


    Figure 13-2.


    New Mobile Service dialog   If you selected Create a new SQL database instance,
