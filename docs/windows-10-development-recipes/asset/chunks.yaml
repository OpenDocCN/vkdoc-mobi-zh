    What you have just achieved is a tailored UI for different screen sizes. You used
    the ListView layout techniques to display a grid or a list layout, depending on
    the size of the screen.


    # Chapter 7: Application Lifecycle and Navigation


    This chapter introduces the Universal Windows app events and lifecycle, covering
    the standard set of events that are raised when you start a Windows app and how
    to handle those events. The chapter covers how developers handle the suspension
    and termination of the app. It also covers how to save and restore the data during
    those events, which help developers provide a better user experience.


    The chapter also covers the navigation model and explains how to build a single-page
    app that can contain multiple virtual HTML pages.


    ## 7.1 Application States and Events


    ### Problem


    You need to identify and subscribe to various events in your app when users start,
    close, or resume the app.


    ### Solution


    Use the `default.js` file in your Universal Windows app project to subscribe to
    and handle various events in the application lifecycle.'
