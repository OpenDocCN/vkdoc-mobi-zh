- fmt: '### How It Works


    Visual Studio 2015 does not provide a navigation template for the UWP apps. It
    only provides the `Blank App` template. Fortunately, VS 2015 also includes the
    templates for the Windows 8.1 app and one of the templates that does a lot of
    navigation logic. Let’s include the necessary files from the Windows 8.1 project
    to the Universal Windows app.


    Launch Visual Studio 2015 and create a new Windows 8.1 project using the `Navigation
    App` template, as shown in Figure [7-7](#A978-1-4842-0719-2_7_Chapter.html#Fig7).


    ![A978-1-4842-0719-2_7_Fig7_HTML.jpg](A978-1-4842-0719-2_7_Fig7_HTML.jpg)


    Figure 7-7. Creating Windows 8.1 project using `Navigation App`


    This template adds the `navigator.js` file as well as updates the `default.js`
    with the navigation logic. These files can be found under the `js` folder of the
    project.


    The template also creates a folder called `pages` and includes a `home` subfolder
    with three files: `home.css`, `home.html`, and `home.js`.


    The `pages` folder contains all the page controls, which are like the pages in
    your Windows app. The `pagecontrol home.html` file is loaded by default when you
    start the `Navigation App` template. This is set in the `default.html` page.


    All the details of loading the page controls are handled by the `PageControlNavigator`,
    which is part of the `navigator.js` file.


    The next step is to create a new Universal Windows app and update it to include
    the files from the project created with the Windows 8.1 `Navigation` template.


    ![A978-1-4842-0719-2_7_Fig8_HTML.jpg](A978-1-4842-0719-2_7_Fig8_HTML.jpg)


    Figure 7-8. Including the `js` folder and `pages` folder to UWP App in Visual
    Studio 2015


    Create a new Universal Windows Project using the `Universal Windows` template,
    which can be found under the **JavaScript** > **Windows** > **Universal** node
    of the New Project dialog in Microsoft Visual Studio 2015. This creates a single
    project in the Visual Studio Solution along with the necessary files in it to
    start.


    Copy the complete `js` folder and the `pages` folder from the Windows 8.1 `Navigation
    App` that was created earlier and paste it into the root of the new Universal
    Project. Include them in the project from Visual Studio Solution Explorer, as
    shown in the Figure [7-8](#A978-1-4842-0719-2_7_Chapter.html#Fig8).


    Now, you are all set to modify the Universal Windows app to perform the navigation
    between pages.


    Open the `default.html` page from Visual Studio Solution Explorer and replace
    the body section with the following code.


    ```

    <div id="contenthost" data-win-control="Application.PageControlNavigator" data-win-options="{home:
    ''/pages/home/home.html''}"></div>

    ```


    Also, include the reference to the `navigator.js` in the `default.html` page.


    ```

    <script src="/js/navigator.js"></script>

    ```


    The `default.html` page acts like a shell for loading different page controls
    from the `pages` folder. By default, it loads the `home.html` page from the `pages`/`home`
    folder.


    The `PageControlNavigator` control has an `id` with a `content host` value that
    acts as host for the content loaded up from the page controls.


    The next step is to add a new page control to the project so that the user can
    navigate from the `home.html` file to the new page control.


    Microsoft Visual Studio provides the `Page Control` item template, which allows
    the developers to easily create page control.


    Right-click the `pages` folder in Visual Studio Solution Explorer and select **Add**
    > **New item** from the context menu. In the **Add New Item** dialog, select `Page
    Control` and provide the name `page2.html`. Click **Add** button.


    This adds three files to the project:


    *   `page1.html`

    *   `page1.css`

    *   `page1.js`


    The content of the `page1.html` is shown next.


    ```

    <!DOCTYPE html>

    <html>

    <head>

    <meta charset="utf-8" />

    <title>page1</title>

    <link href="page1.css" rel="stylesheet" />

    <script src="page1.js"></script>

    </head>

    <body>

    <div class="page1 fragment">

    <header class="page-header" aria-label="Header content" role="banner">

    <button class="back-button" data-win-control="WinJS.UI.BackButton"></button>

    <h1 class="titlearea win-type-ellipsis">

    <span class="pagetitle">Welcome to page1</span>

    </h1>

    </header>

    <section class="page-section" aria-label="Main content" role="main">

    <p>The content of page 2</p>

    </section>

    </div>

    </body>

    </html>

    ```


    The content of `page1.js` file looks like this:


    ```

    // For an introduction to the Page Control template, see the following documentation:

    // http://go.microsoft.com/fwlink/?LinkId=232511

    (function () {

    "use strict";

    WinJS.UI.Pages.define("/pages/page1.html", {

    // This function is called whenever a user navigates to this page. It

    // populates the page elements with the app''s data.

    ready: function (element, options) {

    },

    unload: function () {

    },

    updateLayout: function (element) {

    }

    });

    })();

    ```


    You will only modify the body tag of `page1.html` to show that the navigation
    to page 1 is successful.


    Now, you have two HTML pages within the Universal app. The first page is `home.html`
    and the second page is `page1.html`. How to navigate between the two pages?


    You can navigate between pages using the `WinJS.Navigate.navigate()` method.


    Let’s modify the `home.html` to include a hyperlink to navigate to page 1 by adding
    the following code snippet.


    ```

    <a id="lnkPage2"> Navigate to Page 2</a>

    ```


    Note that the hyperlink has the `id` attribute but not the `href` attribute.


    Open the `home.js` file and replace it with the following code snippet.


    ```

    (function () {

    "use strict";

    WinJS.UI.Pages.define("/pages/home/home.html", {

    // This function is called whenever a user navigates to this page. It

    // populates the page elements with the app''s data.

    ready: function (element, options) {

    var page2link = document.getElementById(''lnkPage2'');

    page2link.addEventListener(''click'', function(eventargs) {

    eventargs.preventDefault();

    WinJS.Navigation.navigate("/pages/page1.html");

    });

    }

    });

    })();

    ```


    The code sets up the click event handler for the hyperlink in the `ready` event
    of the page. The click event handler first invokes the `preventDefault` function
    to prevent the normal link navigation, and then invokes the `WinJS.Navigation.navigate`
    method to navigate to `page1.html`.


    When you run the app on Windows desktop using the **Local Machine** option, you
    see the homepage displayed with a hyperlink, as shown in the Figure [7-9](#A978-1-4842-0719-2_7_Chapter.html#Fig9).


    ![A978-1-4842-0719-2_7_Fig9_HTML.jpg](A978-1-4842-0719-2_7_Fig9_HTML.jpg)


    Figure 7-9. `home.html` page with a hyperlink to navigate to page 2


    When you click the **Navigate to Page 2** link, the user is taken to page 2, as
    shown in Figure [7-10](#A978-1-4842-0719-2_7_Chapter.html#Fig10). When you look
    at `page2.html`, notice the **Back** button, which takes you back to the previous
    page.


    ![A978-1-4842-0719-2_7_Fig10_HTML.jpg](A978-1-4842-0719-2_7_Fig10_HTML.jpg)


    Figure 7-10. `Page1.html` with the **Back** button


    Table [7-4](#A978-1-4842-0719-2_7_Chapter.html#Tab4) shows some of the methods
    that are available in the `WinJS.Navigation` class.


    **Table 7-4.** `WinJS.Navigation` Class


    | Method Name | Description |

    | --- | --- |

    | `WinJS.Navigation.back()` | This method navigates the user back to the previous
    page in the history. |

    | `WinJS.Navigation.forward()` | This method enables the developers to navigate
    forward in the history. |

    | `WinJS.Navigation.navigate()` | This method enables the developers to navigate
    to the specified page. |'
  raw: '### How It Works


    Visual Studio 2015 does not provide a navigation template for the UWP apps. It
    only provides the Blank App template. Fortunately, VS 2015 also includes the templates
    for the Windows 8.1 app and one of the templates that does a lot of navigation
    logic. Let’s include the necessary files from the Windows 8.1 project to the Universal
    Windows app.


    Launch Visual Studio 2015 and create a new Windows 8.1 project using the Navigation
    App template, as shown in Figure [7-7](#A978-1-4842-0719-2_7_Chapter.html#Fig7).


    ![A978-1-4842-0719-2_7_Fig7_HTML.jpg](A978-1-4842-0719-2_7_Fig7_HTML.jpg)


    Figure 7-7.


    Creating Windows 8.1 project using Navigation App


    This template adds the `navigator.js` file as well as updates the `default.js`
    with the navigation logic. These files can be found under the `js` folder of the
    project.


    The template also creates a folder called `pages` and includes a `home` subfolder
    with three files: `home.css`, `home.html`, and `home.js`.


    The `pages` folder contains all the page controls, which are like the pages in
    your Windows app. The `pagecontrol home.html` file is loaded by default when you
    start the Navigation App template. This is set in the `default.html` page.


    All the details of loading the page controls are handled by the `PageControlNavigator`,
    which is part of the `navigator.js` file.


    The next step is to create a new Universal Windows app and update it to include
    the files from the project created with the Windows 8.1 Navigation template.


    ![A978-1-4842-0719-2_7_Fig8_HTML.jpg](A978-1-4842-0719-2_7_Fig8_HTML.jpg)


    Figure 7-8.


    Including the js folder and pages folder to UWP App in Visual Studio 2015 Create
    a new Universal Windows Project using the Universal Windows template, which can
    be found under the JavaScript ➤ Windows ➤ Universal node of the New Project dialog
    in Microsoft Visual Studio 2015\. This creates a single project in the Visual
    Studio Solution along with the necessary files in it to start.   Copy the complete
    `js` folder and the `pages` folder from the Windows 8.1 Navigation App that was
    created earlier and paste it into the root of the new Universal Project. Include
    them in the project from Visual Studio Solution Explorer, as shown in the Figure
    [7-8](#A978-1-4842-0719-2_7_Chapter.html#Fig8).


    Now, you are all set to modify the Universal Windows app to perform the navigation
    between pages.


    Open the `default.html` page from Visual Studio Solution Explorer and replace
    the body section with the following code.


    `<div id="contenthost" data-win-control="Application.PageControlNavigator" data-win-options="{home:
    ''/pages/home/home.html''}"></div>`


    Also, include the reference to the `navigator.js` in the `default.html` page.


    `<script src="/js/navigator.js"></script>`


    The `default.html` page acts like a shell for loading different page controls
    from the `pages` folder. By default, it loads the `home.html` page from the `pages`/`home`
    folder.


    The PageControlNavigator control has an id with a content host value that acts
    as host for the content loaded up from the page controls.


    The next step is to add a new page control to the project so that the user can
    navigate from the `home.html` file to the new page control.


    Microsoft Visual Studio provides the Page Control item template, which allows
    the developers to easily create page control.


    Right-click the `pages` folder in Visual Studio Solution Explorer and select Add
    ➤ New item from the context menu. In the Add New Item dialog, select Page Control
    and provide the name page2.html. Click Add button.


    This adds three files to the project:


    *   `page1.html`

    *   `page1.css`

    *   `page1.js`


    The content of the `page1.html` is shown next.


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


    `<meta charset="utf-8" />`


    `<title>page1</title>`


    `<link href="page1.css" rel="stylesheet" />`


    `<script src="page1.js"></script>`


    `</head>`


    `<body>`


    `<div class="page1 fragment">`


    `<header class="page-header" aria-label="Header content" role="banner">`


    `<button class="back-button" data-win-control="WinJS.UI.BackButton"></button>`


    `<h1 class="titlearea win-type-ellipsis">`


    `<span class="pagetitle">Welcome to page1</span>`


    `</h1>`


    `</header>`


    `<section class="page-section" aria-label="Main content" role="main">`


    `<p>The content of page 2</p>`


    `</section>`


    `</div>`


    `</body>`


    `</html>`


    The content of `page1.js` file looks like this:


    `// For an introduction to the Page Control template, see the following documentation:`


    `//` [`http://go.microsoft.com/fwlink/?LinkId=232511`](http://go.microsoft.com/fwlink/?LinkId=232511)


    `(function () {`


    `"use strict";`


    `WinJS.UI.Pages.define("/pages/page1.html", {`


    `// This function is called whenever a user navigates to this page. It`


    `// populates the page elements with the app''s data.`


    `ready: function (element, options) {`


    `},`


    `unload: function () {`


    `},`


    `updateLayout: function (element) {`


    `}`


    `});`


    `})();`


    You will only modify the body tag of `page1.html` to show that the navigation
    to page 1 is successful.


    Now, you have two HTML pages within the Universal app. The first page is `home.html`
    and the second page is `page1.html`. How to navigate between the two pages?


    You can navigate between pages using the `WinJS.Navigate.navigate()` method.


    Let’s modify the `home.html` to include a hyperlink to navigate to page 1 by adding
    the following code snippet.


    `<a id="lnkPage2"> Navigate to Page 2</a>`


    Note that the hyperlink has the `id` attribute but not the `href` attribute.


    Open the `home.js` file and replace it with the following code snippet.


    `(function () {`


    `"use strict";`


    `WinJS.UI.Pages.define("/pages/home/home.html", {`


    `// This function is called whenever a user navigates to this page. It`


    `// populates the page elements with the app''s data.`


    `ready: function (element, options) {`


    `var page2link = document.getElementById(''lnkPage2'');`


    `page2link.addEventListener(''click'', function(eventargs) {`


    `eventargs.preventDefault();`


    `WinJS.Navigation.navigate("/pages/page1.html");`


    `});`


    `}`


    `});`


    `})();`


    The code sets up the click event handler for the hyperlink in the ready event
    of the page. The click event handler first invokes the `preventDefault` function
    to prevent the normal link navigation, and then invokes the `WinJS.Navigation.navigate`
    method to navigate to `page1.html`.


    When you run the app on Windows desktop using the Local Machine option, you see
    the homepage displayed with a hyperlink, as shown in the Figure [7-9](#A978-1-4842-0719-2_7_Chapter.html#Fig9).


    ![A978-1-4842-0719-2_7_Fig9_HTML.jpg](A978-1-4842-0719-2_7_Fig9_HTML.jpg)


    Figure 7-9.


    home.html page with a hyperlink to navigate to page 2


    When you click the Navigate to Page 2 link, the user is taken to page 2, as shown
    in Figure [7-10](#A978-1-4842-0719-2_7_Chapter.html#Fig10). When you look at `page2.html`,
    notice the Back button, which takes you back to the previous page.


    ![A978-1-4842-0719-2_7_Fig10_HTML.jpg](A978-1-4842-0719-2_7_Fig10_HTML.jpg)


    Figure 7-10.


    Page1.html with the Back button


    Table [7-4](#A978-1-4842-0719-2_7_Chapter.html#Tab4) shows some of the methods
    that are available in the `WinJS.Navigation` class.


    Table 7-4.


    WinJS.Navigation Class


    | Method Name | Description |

    | --- | --- |

    | WinJS.Navigation.back() | This method navigates the user back to the previous
    page in the history. |

    | WinJS.Navigation.forward() | This method enables the developers to navigate
    forward in the history. |

    | WinJS.Navigation.navigate() | This method enables the developers to navigate
    to the specified page. |'
  trans: '

    ### 工作原理


    Visual Studio 2015 并未为 UWP 应用提供导航模板，它只提供了 `Blank App` 模板。幸运的是，VS 2015 还包含 Windows
    8.1 应用的模板，其中有一个模板包含大量导航逻辑。接下来，我们将必要的文件从 Windows 8.1 项目添加到通用 Windows 应用中。


    启动 Visual Studio 2015，使用 `Navigation App` 模板创建一个新的 Windows 8.1 项目，如图 7-7 所示。


    ![A978-1-4842-0719-2_7_Fig7_HTML.jpg](img/A978-1-4842-0719-2_7_Fig7_HTML.jpg)


    **图 7-7.** 使用 `Navigation App` 模板创建 Windows 8.1 项目


    该模板会添加 `navigator.js` 文件，并更新 `default.js` 文件以包含导航逻辑。这些文件位于项目的 `js` 文件夹下。


    该模板还会创建一个名为 `pages` 的文件夹，并在其中包含一个 `home` 子文件夹，内含三个文件：`home.css`、`home.html` 和
    `home.js`。


    `pages` 文件夹包含所有页面控件，它们就像是 Windows 应用中的页面。当你启动 `Navigation App` 模板时，默认会加载 `pagecontrol
    home.html` 文件。此设置在 `default.html` 页面中定义。


    所有加载页面控件的细节均由 `PageControlNavigator` 处理，它是 `navigator.js` 文件的一部分。


    下一步是创建一个新的通用 Windows 应用，并更新它，使其包含从使用 Windows 8.1 `Navigation` 模板创建的项目中获取的文件。


    ![A978-1-4842-0719-2_7_Fig8_HTML.jpg](img/A978-1-4842-0719-2_7_Fig8_HTML.jpg)


    **图 7-8.** 在 Visual Studio 2015 中将 `js` 文件夹和 `pages` 文件夹包含到 UWP 应用中


    使用 `Universal Windows` 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual Studio 2015
    新建项目对话框的 **JavaScript** > **Windows** > **Universal** 节点下。这会在 Visual Studio 解决方案中创建一个单独的项目，并在其中包含启动所需的必要文件。


    将先前创建的 Windows 8.1 `Navigation App` 中的整个 `js` 文件夹和 `pages` 文件夹复制并粘贴到新通用项目的根目录下。然后，通过
    Visual Studio 解决方案资源管理器将它们包含到项目中，如图 7-8 所示。


    现在，你已准备好修改通用 Windows 应用，以实现在页面之间进行导航。


    从 Visual Studio 解决方案资源管理器中打开 `default.html` 页面，并将 body 部分替换为以下代码。


    ```

    <div id="contenthost" data-win-control="Application.PageControlNavigator" data-win-options="{home:
    ''/pages/home/home.html''}"></div>

    ```


    同时，在 `default.html` 页面中包含对 `navigator.js` 的引用。


    ```

    <script src="/js/navigator.js"></script>

    ```


    `default.html` 页面充当一个外壳，用于加载 `pages` 文件夹中的不同页面控件。默认情况下，它会加载 `pages`/`home` 文件夹中的
    `home.html` 页面。


    `PageControlNavigator` 控件有一个 `id` 为 `content host` 的元素，它充当从页面控件加载的内容的宿主。


    下一步是向项目添加一个新的页面控件，以便用户可以从 `home.html` 文件导航到该新页面控件。


    Microsoft Visual Studio 提供了 `Page Control` 项模板，使开发者能够轻松创建页面控件。


    在 Visual Studio 解决方案资源管理器中右键单击 `pages` 文件夹，然后从上下文菜单中选择 **添加** > **新建项**。在 **添加新项**
    对话框中，选择 `Page Control`，并将名称指定为 `page2.html`。点击 **添加** 按钮。


    这会将三个文件添加到项目中：


    *   `page1.html`

    *   `page1.css`

    *   `page1.js`


    `page1.html` 的内容如下所示。


    ```

    <!DOCTYPE html>

    <html>

    <head>

    <meta charset="utf-8" />

    <title>page1</title>

    <link href="page1.css" rel="stylesheet" />

    <script src="page1.js"></script>

    </head>

    <body>

    <div class="page1 fragment">

    <header class="page-header" aria-label="Header content" role="banner">

    <button class="back-button" data-win-control="WinJS.UI.BackButton"></button>

    <h1 class="titlearea win-type-ellipsis">

    <span class="pagetitle">Welcome to page1</span>

    </h1>

    </header>

    <section class="page-section" aria-label="Main content" role="main">

    <p>The content of page 2</p>

    </section>

    </div>

    </body>

    </html>

    ```


    `page1.js` 文件的内容如下所示：


    ```

    // For an introduction to the Page Control template, see the following documentation:

    // http://go.microsoft.com/fwlink/?LinkId=232511

    (function () {

    "use strict";

    WinJS.UI.Pages.define("/pages/page1.html", {

    // This function is called whenever a user navigates to this page. It

    // populates the page elements with the app''s data.

    ready: function (element, options) {

    },

    unload: function () {

    },

    updateLayout: function (element) {

    }

    });

    })();

    ```


    你只需修改 `page1.html` 的 body 标签，以表明导航到页面 1 成功。


    现在，通用应用中包含两个 HTML 页面。第一个页面是 `home.html`，第二个页面是 `page1.html`。如何在两个页面之间导航？


    你可以使用 `WinJS.Navigate.navigate()` 方法在页面之间导航。


    让我们修改 `home.html`，通过添加以下代码片段来包含一个指向页面 1 的超链接。


    ```

    <a id="lnkPage2"> Navigate to Page 2</a>

    ```


    请注意，该超链接包含 `id` 属性，但没有 `href` 属性。


    打开 `home.js` 文件，并将其内容替换为以下代码片段。


    ```

    (function () {

    "use strict";

    WinJS.UI.Pages.define("/pages/home/home.html", {

    // This function is called whenever a user navigates to this page. It

    // populates the page elements with the app''s data.

    ready: function (element, options) {

    var page2link = document.getElementById(''lnkPage2'');

    page2link.addEventListener(''click'', function(eventargs) {

    eventargs.preventDefault();

    WinJS.Navigation.navigate("/pages/page1.html");

    });

    }

    });

    })();

    ```


    该代码在页面的 `ready` 事件中为超链接设置了点击事件处理程序。点击事件处理程序首先调用 `preventDefault` 函数来阻止常规的链接导航，然后调用
    `WinJS.Navigation.navigate` 方法导航到 `page1.html`。


    当你使用 **本地计算机** 选项在 Windows 桌面运行该应用时，会看到显示有超链接的主页，如图 7-9 所示。


    ![A978-1-4842-0719-2_7_Fig9_HTML.jpg](img/A978-1-4842-0719-2_7_Fig9_HTML.jpg)


    **图 7-9.** `home.html` 页面，包含一个导航到页面 2 的超链接


    当你点击 **Navigate to Page 2** 链接时，用户将被带到页面 2，如图 7-10 所示。查看 `page2.html` 时，请注意 **返回**
    按钮，它可以将你带回到上一个页面。


    ![A978-1-4842-0719-2_7_Fig10_HTML.jpg](img/A978-1-4842-0719-2_7_Fig10_HTML.jpg)


    **图 7-10.** 包含 **返回** 按钮的 `Page1.html`


    表 7-4 显示了 `WinJS.Navigation` 类中可用的部分方法。


    **表 7-4.** `WinJS.Navigation` 类


    | 方法名称 | 说明 |

    | --- | --- |

    | `WinJS.Navigation.back()` | 该方法导航用户返回历史记录中的上一个页面。 |

    | `WinJS.Navigation.forward()` | 该方法使开发者能够在历史记录中向前导航。 |

    | `WinJS.Navigation.navigate()` | 该方法使开发者能够导航到指定的页面。 |

