    roamingSettingscontainer = roamingSettings.createContainer("UserPreference_RoamingProfile",
    Windows.Storage.ApplicationDataCreateDisposition.Always);` `document.getElementById("spantoDisplayRoamingData").innerText
    =roamingSettingscontainer.name +" User Preference Roaming App Data Container Created!!";`
       `}` `}`  


    This code declares a variable named `ApplicationData`. It is assigned the `Windows.Storage.ApplicationData.current`,
    which denotes a container for app settings in the app data store. The next line
    then retrieves the `roamingSettings` from the `ApplicationData` and stores it
    in the `roamingSettings` variable.


    It then calls the `roamingSettings.containers.hasKey` function to check if the
    container exists. If it doesn’t exist, then it uses `createContainer` method to
    create a settings container. The preceding example creates a settings container,
    `App_GreetingDataRoamingContainer`, and stores it in the `roamingSettingscontainer`.
    The `createContainer` method takes two parameters: the name of the settings container
    and `Windows.Storage.ApplicationDataCreateDisposition.Always`, which directs that
    it always check if a container exists or not; if it exists, return the specified
    container; else, create a new one.


    When you run the application on a Windows 10 emulator or Windows Mobile, it should
    look like what’s shown in Figure [9-3](#A978-1-4842-0719-2_9_Chapter.html#Fig3).


    ![A978-1-4842-0719-2_9_Fig3_HTML.jpg](A978-1-4842-0719-2_9_Fig3_HTML.jpg)


    Figure 9-3.


    The form to save user preference settings using roaming app data settings


    Great. In the preceding code snippet, you learned both the `createContainer` and
    `deleteContainer` methods of the `roamingSettings` object.


    ## 9.5 How to Create and Read Roaming App Data Settings


    ### Problem


    You need to create and read roaming app data settings in the roaming app data
    settings container in the app data store in your Windows 10 app.


    ### Solution


    Use `ApplicationDataContainer.values` to create roaming app data settings in the
    app data settings container in the app data store in your Windows 10 app.'
  trans: "\n### 工作原理\n\n这与你在应用数据存储中看到的本地设置非常相似，但这里使用的是 `Windows.Storage.ApplicationData.current.roamingSettings`，而非\
    \ `Windows.Storage.ApplicationData.current.LocalSettings`。\n\n在 Microsoft Visual\
