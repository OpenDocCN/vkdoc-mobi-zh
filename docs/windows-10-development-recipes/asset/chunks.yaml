    \nconsole.log(author1.title);\n```\n\n在上述代码片段中，`Author` 类是使用 `WinJS.Class.define`\
    \ 方法创建的。该方法的第一个参数是构造函数，它接受两个参数并初始化 `name` 和 `title`。\n\n`Author` 类有两个属性。\n\n-\
