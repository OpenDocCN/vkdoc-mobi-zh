    \                done(function () {\n                    Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
    \ { callback: GetMap });\n                }));\n        }\n    };\n    var map;\n\
    \    function GetMap() {\n        //   Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
    \ { callback: GetMap });\n        var loc = new Microsoft.Maps.Location(13.0220,\
    \ 77.4908);\n        // Initialize the map\n        map = new Microsoft.Maps.Map(document.getElementById(\"\
    myMap\"), {\n            credentials: \"Bing Map Key\",\n            zoom: 10\n\
    \        });\n        var pin = new Microsoft.Maps.Pushpin(loc);\n        map.entities.push(pin);\n\
    \        // Center the map on the location\n        map.setView({ center: loc,\
    \ zoom: 10 });\n    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n\
    })();\n```\n\n首先需要调用 `Microsoft.Maps` 函数的 `loadModule` 来加载地图。 `loadModule` 有一个可选的\
    \ `culture` 参数，可用于指定本地化语言和区域。为 `loadModule` 指定了 `GetMap` 回调函数：`Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
    \ { callback: GetMap });`\n\n通过指定容器 `div` 元素和必应地图 API 密钥来创建 `Microsoft.Maps.Map`\
    \ 的实例：\n\n```javascript\n// Initialize the map\nmap = new Microsoft.Maps.Map(document.getElementById(\"\
    myMap\"), {\n    credentials: \"Bing Map API Key\",\n});\n```\n\n使用 `map.entities.push`\
    \ 方法标识地图上要添加图钉的位置：\n\n```javascript\nvar loc = new Microsoft.Maps.Location(13.0220,\
    \ 77.4908);\nvar pin = new Microsoft.Maps.Pushpin(loc);\nmap.entities.push(pin);\n\
    ```\n\n最后，通过将地图中心设置在指定位置并将缩放级别设置为 10 来显示地图。\n\n构建应用程序并在 Windows 模拟器中运行它。您应该能够看到地图以及添加到地图上的图钉，如图\
    \ 12-14 所示。\n\n![A978-1-4842-0719-2_12_Fig14_HTML.jpg](img/A978-1-4842-0719-2_12_Fig14_HTML.jpg)\n\
    \n**图 12-14.** Windows 应用中的必应地图\n\n必应地图 AJAX 控件提供了额外的 API，让开发者能够集成更多地图功能，例如显示交通信息、路线等。\n\
    \n目前，WinJS 库在 SDK 中并未直接提供地图控件，因此必应地图 AJAX 控件是一个很好的替代解决方案。\n\n# 第 13 章：构建连接到云的应用\n\
    \nMicrosoft Azure 移动服务为开发者提供了一种最简单的方式，将 Windows 应用中的数据存储到云中的 SQL Azure 数据库。通过使用\
    \ Microsoft Azure 移动服务，开发者无需担心创建和托管自己的 Web 服务。大多数事情都由 Microsoft Azure 移动服务处理。\n\
    \n本章涵盖了一些关于在 Universal Windows 应用中设置和使用 Microsoft Azure 移动服务进行数据存储和检索的食谱。\n\n\
    ## 13.1 在 Microsoft Azure 中创建新的移动服务\n\n### 问题\n\n您需要在 Microsoft Azure 移动服务中创建一个新的移动服务，以便您的\
    \ Universal Windows 应用可以使用它。\n\n### 解决方案\n\n登录到 Microsoft Azure 管理门户，使用移动服务部分创建一个新的移动服务。\n"
- fmt: "### How It Works\n\nThe Microsoft Azure Mobile Management portal provides\
    \ the necessary options for developers to manage various resources, like virtual\
    \ machines, mobile services, cloud services, and so forth.\n\nFollow these steps\
    \ to create a new mobile service in Microsoft Azure:\n\nLog in to the Microsoft\
    \ Azure Management portal by navigating to [`http://manage.windowsazure.com`](http://manage.windowsazure.com/)\
    \ and providing your login credentials. You can create a new mobile service by\
    \ clicking the `+New` button in the bottom bar and then selecting `Compute` ➤\
    \ `Mobile Service` ➤ `Create`, as shown in Figure [13-1](#A978-1-4842-0719-2_13_Chapter.html#Fig1).\n\
    \n![A978-1-4842-0719-2_13_Fig1_HTML.jpg](A978-1-4842-0719-2_13_Fig1_HTML.jpg)\n\
    \nFigure 13-1.\n\nMicrosoft Azure dashboard for creating a new mobile service\n\
    \nProvide the details of the mobile service. This includes the URL to access the\
    \ mobile service, subscription, region, back end, and so forth. You can provide\
    \ the Mobile Service name as `winjsrecipes`. Currently, Microsoft Azure supports\
    \ JavaScript and .NET back ends. Select `JavaScript` in this recipe and click\
    \ the `Next` button, as shown in Figure [13-2](#A978-1-4842-0719-2_13_Chapter.html#Fig2).\n\
    \n![A978-1-4842-0719-2_13_Fig2_HTML.jpg](A978-1-4842-0719-2_13_Fig2_HTML.jpg)\n\
    \nFigure 13-2.\n\nNew Mobile Service dialog\n\nIf you selected `Create a new SQL\
    \ database instance`, you have to provide the existing database settings information,\
    \ as shown in Figure [13-3](#A978-1-4842-0719-2_13_Chapter.html#Fig3). Complete\
    \ the mobile service creation.\n\n![A978-1-4842-0719-2_13_Fig3_HTML.jpg](A978-1-4842-0719-2_13_Fig3_HTML.jpg)\n\
    \nFigure 13-3.\n\nNew Mobile Service database settings dialog\n\nWithin a few\
    \ minutes, the mobile service is ready and displayed in the Mobile Service overview\
    \ screen.\n\nYou can also use Visual Studio 2015 to create the mobile service\
    \ in Microsoft Azure. To create a mobile service from Visual Studio 2015, follow\
    \ these steps:\n\nLaunch Visual Studio 2015 and open the `Server Explorer` window.\
    \ In the `Server Explorer` window, right-click `Azure` and select `Connect to\
    \ Microsoft Azure…` in the context menu, as seen in Figure [13-4](#A978-1-4842-0719-2_13_Chapter.html#Fig4).\
    \ Provide your Microsoft Azure login credentials. This imports the Azure subscription\
    \ to Visual Studio.\n\n![A978-1-4842-0719-2_13_Fig4_HTML.jpg](A978-1-4842-0719-2_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4.\n\nConnect to Azure from the Visual Studio Server Explorer window\n\
    \nThe next step is to create the mobile service from `Server Explorer`. Right-click\
    \ `Mobile Services` and select `Create Service`, as demonstrated in Figure [13-5](#A978-1-4842-0719-2_13_Chapter.html#Fig5).\n\
    \n![A978-1-4842-0719-2_13_Fig5_HTML.jpg](A978-1-4842-0719-2_13_Fig5_HTML.jpg)\n\
    \nFigure 13-5.\n\nCreate a Service from Visual Studio 2015\n\nIn the `Create Mobile\
    \ Service` dialog, provide the necessary information for the mobile service to\
    \ be created, which includes the URL, region, database information, and so forth.\
    \ Name the recipe `winjs`, as shown in Figure [13-6](#A978-1-4842-0719-2_13_Chapter.html#Fig6).\n\
    \n![A978-1-4842-0719-2_13_Fig6_HTML.jpg](A978-1-4842-0719-2_13_Fig6_HTML.jpg)\n\
    \nFigure 13-6.\n\nNew Mobile Service dialog in Visual Studio 2015\n\n> **Note**\
    \  \n> You need to have a Microsoft Azure subscription. If you haven’t yet subscribed\
    \ to it, then you need to visit [`http://azure.microsoft.com/en-us/`](http://azure.microsoft.com/en-us/).\
    \ You can get a free trial account if you want to try Microsoft Azure.\n\n## 13.2\
    \ Creating a Database Table in Mobile Services\n\n### Problem\n\nYou need to create\
    \ a table to store the todo items in Microsoft Azure that will be used by your\
    \ Universal Windows app.\n\n### Solution\n\nYou can use the Microsoft Azure Management\
    \ portal or Visual Studio 2015 to create a database table in Microsoft Azure Mobile\
    \ Services.\n\n### How It Works\n\n![A978-1-4842-0719-2_13_Fig7_HTML.jpg](A978-1-4842-0719-2_13_Fig7_HTML.jpg)\n\
    \nFigure 13-7.\n\nAzure Mobile Service dashboard\n\nTo create a table from Microsoft\
    \ Azure Mobile Services, log in to the Azure Management portal with your login\
    \ credentials. In the Mobile Services overview screen, select the mobile service\
    \ in which you would like to create a new table. In the selected mobile service\
    \ (see Figure [13-7](#A978-1-4842-0719-2_13_Chapter.html#Fig7)), select the `DATA`\
    \ tab and click `ADD A TABLE` to start creating a new table.\n\nIn the `Create\
    \ New Table` dialog, enter the table name (call it `todo`), and keep the `Anybody\
    \ with the Application Key` default permission for the insert, update, delete,\
    \ and read operations, as shown in Figure [13-8](#A978-1-4842-0719-2_13_Chapter.html#Fig8).\
    \ Click the `Submit` button.\n\n![A978-1-4842-0719-2_13_Fig8_HTML.jpg](A978-1-4842-0719-2_13_Fig8_HTML.jpg)\n\
    \nFigure 13-8.\n\nTable creation within the Mobile Services in Microsoft Azure\n\
    \nNote that you did not specify the columns for the `todo` table. One option is\
    \ to go ahead and add the columns to the table from the dashboard, which is a\
    \ preferred option. The other option is to use the `Dynamic` schema, where the\
    \ columns are created dynamically based on the data that you insert (which makes\
    \ it easier to develop a new mobile service). Use the second option in this recipe.\
    \ Developers can disable the `Dynamic` schema from the dashboard.\n\n## 13.3 Installing\
    \ Mobile Services for the WinJS Client Library\n\n### Problem\n\nYou need to install\
    \ the mobile services for the WinJS client library for your Windows app to interact\
    \ with Microsoft Azure Mobile Services.\n\n### Solution\n\nUse the NuGet Package\
    \ Manager Console to execute the following command in the Universal Windows projects\
    \ to add mobile services to the WinJS client library:\n\n```\nInstall-Package\
    \ WindowsAzure.MobileServices.Winjs\n```\n\n### How It Works\n\nThe NuGet Package\
    \ Manager Console lets developers quickly install the library. To add the mobile\
    \ services for the WinJS client library, follow these steps.\n\nLaunch Visual\
    \ Studio 2015 and create a new Universal Windows app using the JavaScript template.\
    \ In Visual Studio, select `Tools` ➤ `Library package manager` ➤ `Package Manager\
    \ Console`, and then enter the following command:\n\n```\ninstall-package WindowsAzure.MobileServices.WinJS\n\
    ```\n\nBefore running this command, ensure that the correct project is selected\
    \ as `Default project` in the Package Manager Console (see Figure [13-9](#A978-1-4842-0719-2_13_Chapter.html#Fig9)).\n\
    \n![A978-1-4842-0719-2_13_Fig9_HTML.jpg](A978-1-4842-0719-2_13_Fig9_HTML.jpg)\n\
    \nFigure 13-9.\n\nProject selection in the Package Manager Console\n\nOnce the\
    \ installation is successful, you will see the new JavaScript files in the `JS`\
    \ folder of the project in the Solution Explorer, as shown in Figure [13-10](#A978-1-4842-0719-2_13_Chapter.html#Fig10).\n\
    \n![A978-1-4842-0719-2_13_Fig10_HTML.jpg](A978-1-4842-0719-2_13_Fig10_HTML.jpg)\n\
    \nFigure 13-10.\n\nUniversal project in Solution Explorer after installation of\
    \ library\n\nTo use the WinJS library for mobile services, you must add a reference\
    \ to the `MobileServices.min.js` script in the HTML page.\n\n```html\n<script\
    \ src=\"js/MobileServices.min.js\"></script>\n```\n\nYou can now access the Mobile\
    \ Services client library from your Windows Store project.\n\n## 13.4 Performing\
    \ the CRUD Operation\n\n### Problem\n\nYou need to create, read, update, and delete\
    \ (CRUD) records in the `todo` table from the Windows app. (The creation of the\
    \ `todo` table was demonstrated in the previous recipe.)\n\n### Solution\n\nYou\
    \ can perform the basic CRUD operations for tables created in the mobile service\
    \ by using the methods exposed via the mobile service library."
