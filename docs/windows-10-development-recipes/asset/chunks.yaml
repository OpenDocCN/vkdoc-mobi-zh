  trans: "\n# 工作原理\n\n在之前的教程中，你了解到当用户使用“共享”超级按钮启动共享会话时，会触发 `datarequested` 事件监听器。因此，我们现在将在此监听器中编写代码来共享数据。该监听器接受一个参数，即事件参数。首先，你需要从事件参数中检索请求对象，如下所示：\n\
    \n```javascript\nfunction shareDataHandler(e) {\n    //开始编写共享数据的代码\n    var request\
    \ = e.request;\n}\n```\n\n你需要为请求对象设置属性。若要共享纯文本，你需要填充以下属性：\n\n```javascript\nrequest.Data.Properties.Title\
    \ = \"数据的标题\";\nrequest.Data.Properties.Description = \"数据的描述\";\n```\n\n太棒了，看起来很简单，不是吗？让我们实现此功能，并观看一个在应用之间共享数据的实时演示。\n\
    \n使用 Microsoft Visual Studio 2015 中的 Windows 通用（空白应用）模板创建一个新项目。\n\n首先，将以下代码添加到\
    \ `default.html` 中。你需要用以下代码替换 body 标签：\n\n```html\n<body class=\"win-type-body\"\
    \ style=\"background-color:white\">\n    <div>\n        <p style=\"color:black\"\
    >输入项目标题：</p>\n        <input class=\"text-box\" id=\"txttitle\" value=\"项目标题\"\
    \ size=\"40\"/>\n        <p style=\"color:black\">输入项目描述：</p>\n        <input\
    \ class=\"text-box\" id=\"txtdesc\" value=\"项目描述\" size=\"40\" />\n        <p\
    \ style=\"color:black\">输入项目周报摘要：</p>\n        <textarea id=\"txttext\" maxlength=\"\
    1000\" style=\"width:50%\">周状态：这是本周状态</textarea>\n        <br />\n        <br\
    \ />\n    </div>\n</body>\n```\n\n此代码定义了共享数据演示的用户界面。该用户界面如图 10-1 所示。\n\n![A978-1-4842-0719-2_10_Fig1_HTML.jpg](img/A978-1-4842-0719-2_10_Fig1_HTML.jpg)\n\
    \n**图 10-1.** 共享数据用户界面\n\n现在，在解决方案资源管理器中右键单击项目的 `js` 文件夹，然后选择**添加** > **新建 JavaScript\
    \ 文件**。提供文件名。在此示例中，我们将文件命名为 `DataSharingDemo.js`。\n\n```javascript\n(function\
    \ () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n```\n\n同时，将以下代码添加到 `default.html` 中以引用 `DataSharingDemo.js` 文件：\n\n```html\n\
    <script src=\"/js/DataSharingDemo.js\"></script>\n```\n\n现在，你已经拥有了要共享的数据的用户界面。并且，你已为\
    \ `datarequested` 事件添加了事件监听器。共享数据功能最重要的部分是实现填充请求对象的代码。因此，将以下 `shareDataHandler`\
    \ 函数的代码添加到 `DataSharingDemo.js` 文件中。\n\n```javascript\nfunction shareDataHandler(e)\
    \ {\n    var request = e.request;\n    // request.data.properties.title 是必填项\n\
    \    var ShareInfoTitle = document.getElementById(\"txttitle\").value;\n    if\
    \ (ShareInfoTitle !== \"\") {\n        var ShareInfoDesc = document.getElementById(\"\
    txtdesc\").value;\n        if (ShareInfoDesc !== \"\") {\n            request.data.properties.title\
    \ = ShareInfoTitle;\n            request.data.properties.description = ShareInfoDesc;\n\
    \            var ShareInfoFullText = document.getElementById(\"txttext\").value;\n\
    \            if (ShareInfoFullText !== \"\") {\n                request.data.setText(ShareInfoFullText);\n\
    \            }\n        } else {\n            request.failWithDisplayText(\"请输入您想要共享的项目详情。\"\
    );\n        }\n    } else {\n        request.failWithDisplayText(\"发生错误！！\");\n\
    \    }\n}\n```\n\n上述代码首先从事件参数中检索请求对象。此函数填充如下：\n\n```javascript\nrequest.data.properties.title\
    \ = ShareInfoTitle;\nrequest.data.properties.description = ShareInfoDesc;\n```\n\
    \n最后，添加以下代码：\n\n```javascript\nrequest.data.setText(ShareInfoFullText);\n```\n\
    \n此函数检查标题是否为空，因为请求的标题属性是必填项。\n\n在 Windows 10 上运行应用程序时，你将看到如图 10-2 所示的屏幕。\n\n![A978-1-4842-0719-2_10_Fig2_HTML.jpg](img/A978-1-4842-0719-2_10_Fig2_HTML.jpg)\n\
    \n**图 10-2.** 共享数据演示\n\n现在，单击“共享”超级按钮或按 Windows 徽标键 ![A978-1-4842-0719-2_10_Figa_HTML.jpg](img/A978-1-4842-0719-2_10_Figa_HTML.jpg)\
    \ + H。你将看到如图 10-3 所示的屏幕。\n\n![A978-1-4842-0719-2_10_Fig3_HTML.jpg](img/A978-1-4842-0719-2_10_Fig3_HTML.jpg)\n\
    \n**图 10-3.** 显示项目标题作为共享数据对象的“共享”超级按钮窗口\n\n现在，从列表中单击 OneNote。你将看到如图 10-4 所示的屏幕。\n\
    \n![A978-1-4842-0719-2_10_Fig4_HTML.jpg](img/A978-1-4842-0719-2_10_Fig4_HTML.jpg)\n\
    \n**图 10-4.** OneNote 显示来自通用 Windows 应用的共享数据\n\n## 向其他应用共享 Web 链接\n\n### 问题\n\n\
    你需要开发一项功能，允许用户向其他 Windows 10 应用共享 Web 链接。\n\n### 解决方案\n\n使用 `request.data.setWebLink`\
    \ 以及标题和描述字段。\n"
- fmt: "### How It Works\n\nTo share web links, you need to use the `request.data.setWebLink()`\
    \ method of the `request` object.\n\nCreate a new project using the Windows Universal\
    \ (Blank App) template in Microsoft Visual Studio 2015.\n\nFirst, add the following\
    \ code to `default.html`. You will need to replace the body tag with the following\
    \ code:\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n\
    \    <title>_10.3</title>\n    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-dark.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script\
    \ src=\"WinJS/js/ui.js\"></script>\n    <!-- _10.3 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    \    <script src=\"/js/DataSharingDemo.js\"></script>\n</head>\n<body class=\"\
    win-type-body\" style=\"background-color:white\">\n    <div>\n        <p style=\"\
    color:black\">Enter Project Title:</p>\n        <input class=\"text-box\" id=\"\
    txttitle\" value=\"Project Title\" size=\"40\" />\n        <p style=\"color:black\"\
    >Enter Project Description:</p>\n        <input class=\"text-box\" id=\"txtdesc\"\
    \ value=\"Project Desc\" size=\"40\" />\n        <p>Enter Project Site URL</p>\n\
    \        <input class=\"text-box\" id=\"txtURL\" value=\"Enter Project Site URL\"\
    \ size=\"40\" />\n        <br />\n        <br />\n    </div>\n</body>\n</html>\n\
    ```\n\nNow, right-click the project's `js` folder in Solution Explorer and select\
    \ Add ➤ New JavaScript file. Provide the name for the file. In this example, let's\
    \ name the file `DataSharingDemo.js`.\n\n```\n(function () {\n    \"use strict\"\
    ;\n    function GetControl() {\n        WinJS.UI.processAll().done(function ()\
    \ {\n            var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n```\n\nAlso add the following code to `default.html` to reference the `DataSharingDemo.js`\
    \ file:\n\n```\n<script src=\"/js/DataSharingDemo.js\"></script>\n```\n\nAdd a\
    \ new `shareDataHandler` function to `DataSharingDemo.js`. The complete `shareDataHandler`\
    \ function will look as follows. The following uses the `request.data.setWebLink()`\
    \ function to set the web links that are being shared.\n\n```\nfunction shareDataHandler(e)\
    \ {\n    var request = e.request;\n    // The request.data.properties.title is\
    \ mandate\n    var ShareInfoTitle = document.getElementById(\"txttitle\").value;\n\
    \    if (ShareInfoTitle !== \"\") {\n        var ShareInfoDesc = document.getElementById(\"\
    txtdesc\").value;\n        if (ShareInfoDesc !== \"\") {\n            request.data.properties.title\
    \ = ShareInfoTitle;\n            request.data.properties.description = ShareInfoDesc;\n\
    \            var ShareURL = document.getElementById(\"txtURL\").value;\n     \
    \       if (ShareURL !== \"\") {\n                request.data.setWebLink(new\
    \ Windows.Foundation.Uri(ShareURL));\n            }\n        } else {\n      \
    \      request.failWithDisplayText(\"Please Enter the Project Details you would\
    \ like to share.\");\n        }\n    } else {\n        request.failWithDisplayText(\"\
    Error Occured!!\");\n    }\n}\n```\n\nThe `request.data.setWebLink()` method accepts\
    \ a parameter of type URI, which is why the conversion from a string to `Windows.Foundation.Uri`\
    \ is necessary before passing it to the function.\n\n## 10.4 Share an Image to\
    \ Other Apps\n\n### Problem\n\nYou need to develop a feature that allows users\
    \ to share an image with other Windows 10 apps.\n\n### Solution\n\nUse `request.data.setStorageItems`\
    \ or `request.data.setBitmap` along with title and description fields. You can\
    \ also use both for sharing an image, as you will not know which one is supported\
    \ by the target app."
  raw: '### How It Works


    To share web links, you need to use the `request.data.setWebLink()` method of
    the `request` object.


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015.


    First, add the following code to `default.html`. You will need to replace the
    body tag with the following code:


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>_10.3</title>`


        `<!-- WinJS references -->`


