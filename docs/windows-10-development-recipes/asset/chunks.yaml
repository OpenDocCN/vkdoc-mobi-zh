    \n         data-win-options=\"{itemTemplate:select('#template')}\">\n    </div>\n\
    </body>\n</html>\n```\n\n请注意其中包含了 `data.js` 文件，该文件用于设置数据源并执行筛选操作。此 HTML 页面包含一个\
    \ ID 为 `txtSearch` 的文本框和一个 `ListView` 控件。`ListView` 关联了一个自定义模板，用于以格式化方式显示数据。\n\
    \n接下来，将 JavaScript 文件添加到项目的 `js` 文件夹中，并将其命名为 `data.js`。将以下代码添加到 `data.js` 文件中。\n\
    \n```\n(function () {\n    \"use strict\";\n    // 用作数据源的员工列表\n    var lstEmployees\
    \ = new WinJS.Binding.List([\n        { id: 1, name: \"Senthil Kumar\" },\n  \
    \      { id: 2, name: \"Lohith GN\" },\n        { id: 3, name: \"Senthil Kumar\
    \ B\" },\n        { id: 4, name: \"Vidyasagar\" },\n    ]);\n\n    function Initialize()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            // 从 DOM 中获取\
    \ ListView\n            var lstControl = document.getElementById('lstEmployees').winControl;\n\
    \            // 从 HTML 页面获取搜索文本\n            var filterText = document.getElementById('txtSearch');\n\
    \            lstControl.itemDataSource = lstEmployees.dataSource;\n          \
    \  filterText.addEventListener(\"keyup\", function () {\n                filterEmployee(lstControl,\
    \ filterText.value);\n            });\n        });\n    }\n\n    // 筛选列表的函数\n\
    \    function filterEmployee(listEmployee,searchtext)\n    {\n        var filtereddata\
    \ = lstEmployees.createFiltered(function (item) {\n            var result = item.name.toLowerCase().indexOf(searchtext);\n\
    \            return item.name.toLowerCase().indexOf(searchtext) == 0;\n      \
    \  });\n        listEmployee.itemDataSource = filtereddata.dataSource;\n    }\n\
    \n    document.addEventListener(\"DOMContentLoaded\", Initialize);\n})();\n```\n\
    \n这段 JavaScript 代码包含一个名为 `filterEmployee` 的方法，该方法接受一个 `ListView` 控件和一个用于筛选的搜索字符串。此函数对\
    \ `ListView` 进行筛选，并显示与搜索字符串匹配的员工信息。\n\n以下是 `createFiltered` 方法中用于筛选 `ListView`\
    \ 控件数据源的函数：\n\n```\nvar fileteredData = lstEmployees.createFiltered(function (item)\
    \ {\n    var result = item.name.toLowerCase().indexOf(searchtext);\n         \
    \   return item.name.toLowerCase().indexOf(searchtext) == 0;\n});\n```\n\n此函数的作用类似于实时筛选器，当项目以搜索文本字符串开头时，它会返回该项目。\n\
    \n在 Windows 上运行该应用。您应该会看到如图 4-7 所示的界面。\n\n![A978-1-4842-0719-2_4_Fig7_HTML.jpg](img/A978-1-4842-0719-2_4_Fig7_HTML.jpg)\n\
    \n图 4-7.\n\n筛选 ListView\n\n当您在文本框中开始输入文本时，您会看到项目被筛选并显示在屏幕上。\n\n## 4.5 在 ListView\
    \ 控件中对项目进行分组\n\n### 问题\n\n需要按类别对 `ListView` 中的项目进行分组，而不是以平面列表形式显示。\n\n### 解决方案\n\
    \n要对 `ListView` 中的项目进行分组，需要使用分组数据源。这可以通过使用 WinJS 中的 `WinJS.Binding.List.createGrouped()`\
    \ 函数来实现。\n"
- fmt: "### How It Works\n\nTo group the items in the `ListView` control in WinJS,\
    \ it is necessary to include two templates: one for the group header and one for\
    \ the individual item.\n\nLet’s create a new Windows Universal project in Visual\
    \ Studio 2015 and open the `default.html` page. Replace it with the following\
    \ code snippet.\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"\
    utf-8\" />\n    <title>Recipe4.5</title>\n    <!-- WinJS references -->\n    <link\
    \ href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n    <script src=\"WinJS/js/base.js\"\
    ></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n    <!-- Recipe4.5 references\
    \ -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\" />\n    <script\
    \ src=\"/js/default.js\"></script>\n    <script src=\"/js/data.js\"></script>\n\
    </head>\n<body class=\"win-type-body\">\n    <h1>Recipe 4.5</h1>\n    <div id=\"\
    GroupHeader\" data-win-control=\"WinJS.Binding.Template\">\n        <h3 data-win-bind=\"\
    innerText: technology\"></h3>\n    </div>\n    <div id=\"employee\" data-win-control=\"\
    WinJS.Binding.Template\">\n        <h4 data-win-bind=\"innerText:name\"></h4>\n\
    \    </div>\n    <div id=\"lvEmployees\" data-win-control=\"WinJS.UI.ListView\"\
    \n         data-win-options=\"{\n         itemTemplate: select('#employee'),\n\
    \         groupHeaderTemplate: select('#GroupHeader')\n         }\">\n    </div>\n\
    </body>\n</html>\n```\n\nThis code snippet included a `ListView` control named\
    \ as `lvEmployees`, which has the group header template and the `itemTemplate`\
    \ associated with it.\n\nNote the reference to the `data.js` JavaScript file.\n\
    \nLet’s create a new JavaScript file in the Visual Studio 2015 Solution Explorer\
    \ under the `js` folder and name it `data.js`. Add the following code snippet\
    \ to it.\n\n```\n(function () {\n    \"use strict\";\n    function Initialize()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var listView1\
    \ = document.getElementById(\"lvEmployees\").winControl;\n            var employeeList\
    \ = new WinJS.Binding.List([\n                { id: 1, name: \"Senthil Kumar\"\
    , technology: \"Mobile\" },\n                { id: 2, name: \"Michael\", technology:\
    \ \"Web\" },\n                { id: 3, name: \"Lohith\", technology: \"Web\" },\n\
    \                { id: 4, name: \"Stephen\", technology: \"Mobile\" },\n     \
    \           { id: 5, name: \"Vidyasagar\", technology: \"Game\" },\n         \
    \       { id: 6, name: \"Joseph\", technology: \"Mobile\" },\n            ]);\n\
    \            var groupedEmployees = employeeList.createGrouped(\n            \
    \    function (item) {\n                    return item.technology;\n        \
    \        },\n                function (item) {\n                    return { technology:\
    \ item.technology }\n                },\n                function (group1, group2)\
    \ {\n                    return group1 > group2 ? 1 : -1;\n                });\n\
    \            listView1.groupDataSource = groupedEmployees.groups.dataSource;\n\
    \            listView1.itemDataSource = groupedEmployees.dataSource;\n       \
    \ });\n    }\n    document.addEventListener(\"DOMContentLoaded\", Initialize);\n\
    })();\n```\n\nThis JavaScript code creates the item data source, as well as the\
    \ grouped data source. The list contains employee records, with each item containing\
    \ the properties `id`, `name`, and `technology`.\n\nThe grouped data source is\
    \ created using WinJS’s `createGrouped` method, which requires three functions\
    \ to be passed as parameters.\n\n*   `GroupKey`: This function is used to associate\
    \ each of the items in the list with a group. The preceding example returned the\
    \ `technology` property associated with each employee.\n*   `GroupData`: This\
    \ function returns the data item displayed by the group header. In the preceding\
    \ example, `GroupData` returns the `technology` for the group that is displayed\
    \ in the header.\n*   `GroupSorter`: This function handles the order of the group;\
    \ for example, listing the groups in the header in ascending order.\n\nNote that\
    \ the grouped data source is live, which can work with a filtered data source\
    \ as well.\n\nOnce the item data source and the grouped data source is prepared,\
    \ they are set to the `ListView`’s `groupDataSource` property and `itemDataSource`\
    \ property, respectively, as shown next.\n\n```\nlistView1.groupDataSource = groupedEmployees.groups.dataSource;\n\
    listView1.itemDataSource = groupedEmployees.dataSource;\n```\n\nWhen you run the\
    \ application on Windows, you should see the screen shown in Figure [4-8](#A978-1-4842-0719-2_4_Chapter.html#Fig8).\n\
    \n![A978-1-4842-0719-2_4_Fig8_HTML.jpg](A978-1-4842-0719-2_4_Fig8_HTML.jpg)\n\n\
    **Figure 4-8.** ListView with grouped data\n\nNotice that the items are grouped\
    \ by the technology and displayed on the page.\n\n## 4.6 Semantic Zoom in ListView\n\
    \n### Problem\n\nYou want to provide an option for the user to view data at two\
    \ different zoom levels when working with the `ListView`.\n\n### Solution\n\n\
    You can use the `SemanticZoom` control in WinJS to bring in the semantic zoom\
    \ functionality within your app. The `SemanticZoom` control enables you to provide\
    \ two different views of the same data when working with the `ListView`.\n\nYou\
    \ can add the `SemanticZoom` by setting the `data-win-control` attribute of the\
    \ `div` element to the `WinJS.UI.SemanticZoom` value."
  raw: '### How It Works


    To group the items in the ListView control in WinJS, it is necessary to include
    two templates: one for the group header and one for the individual item.


    Let’s create a new Windows Universal project in Visual Studio 2015 and open the
    `default.html` page. Replace it with the following code snippet.


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>Recipe4.5</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-light.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- Recipe4.5 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


        `<script src="/js/data.js"></script>`


    `</head>`


    `<body class="win-type-body">`


        `<h1>Recipe 4.5</h1>`


        `<div id="GroupHeader" data-win-control="WinJS.Binding.Template">`


            `<h3 data-win-bind="innerText: technology"></h3>`


        `</div>`


        `<div id="employee" data-win-control="WinJS.Binding.Template">`


            `<h4 data-win-bind="innerText:name"></h4>`


        `</div>`


        `<div id="lvEmployees" data-win-control="WinJS.UI.ListView"`


             `data-win-options="{`


             `itemTemplate: select(''#employee''),`


             `groupHeaderTemplate: select(''#GroupHeader'')`


             `}">`


        `</div>`


    `</body>`


    `</html>`


    This code snippet included a ListView control named as lvEmployees, which has
    the group header template and the `itemTemplate` associated with it.


    Note the reference to the `data.js` JavaScript file.


    Let’s create a new JavaScript file in the Visual Studio 2015 Solution Explorer
    under the `js` folder and name it data.js. Add the following code snippet to it.


    `(function () {`


        `"use strict";`


        `function Initialize() {`


            `WinJS.UI.processAll().done(function () {`


                `var listView1 = document.getElementById("lvEmployees").winControl;`


                `var employeeList = new WinJS.Binding.List([`


                    `{ id: 1, name: "Senthil Kumar", technology: "Mobile" },`


                    `{ id: 2, name: "Michael", technology: "Web" },`


                    `{ id: 3, name: "Lohith", technology: "Web" },`


                    `{ id: 4, name: "Stephen", technology: "Mobile" },`


                    `{ id: 5, name: "Vidyasagar", technology: "Game" },`


                    `{ id: 6, name: "Joseph", technology: "Mobile" },`


                `]);`


                `var groupedEmployees = employeeList.createGrouped(`


                    `function (item) {`


                        `return item.technology;`


                    `},`


                    `function (item) {`


                        `return { technology: item.technology }`


                    `},`


                    `function (group1, group2) {`


                        `return group1 > group2 ? 1 : -1;`


                    `});`


                `listView1.groupDataSource = groupedEmployees.groups.dataSource;`


                `listView1.itemDataSource = groupedEmployees.dataSource;`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", Initialize);`


    `})();`


    This JavaScript code creates the item data source, as well as the grouped data
    source. The list contains employee records, with each item containing the properties
    id, name, and technology.


    The grouped data source is created using WinJS’s `createGrouped` method, which
    requires three functions to be passed as parameters.


    *   `GroupKey`: This function is used to associate each of the items in the list
    with a group. The preceding example returned the technology property associated
    with each employee.

    *   `GroupData`: This function returns the data item displayed by the group header.
    In the preceding example, `GroupData` returns the technology for the group that
    is displayed in the header.

    *   `GroupSorter`: This function handles the order of the group; for example,
    listing the groups in the header in ascending order.


    Note that the grouped data source is live, which can work with a filtered data
    source as well.


    Once the item data source and the grouped data source is prepared, they are set
    to the ListView’s `groupDataSource` property and `itemDataSource` property, respectively,
    as shown next.


    `listView1.groupDataSource = groupedEmployees.groups.dataSource;`


    `listView1.itemDataSource = groupedEmployees.dataSource;`


    When you run the application on Windows, you should see the screen shown in Figure
    [4-8](#A978-1-4842-0719-2_4_Chapter.html#Fig8).


    ![A978-1-4842-0719-2_4_Fig8_HTML.jpg](A978-1-4842-0719-2_4_Fig8_HTML.jpg)


    Figure 4-8.


    ListView with grouped data


    Notice that the items are grouped by the technology and displayed on the page.


    ## 4.6 Semantic Zoom in ListView


    ### Problem


    You want to provide an option for the user to view data at two different zoom
    levels when working with the ListView.


    ### Solution


    You can use the SemanticZoom control in WinJS to bring in the semantic zoom functionality
    within your app. The SemanticZoom control enables you to provide two different
    views of the same data when working with the ListView.


    You can add the SemanticZoom by setting the `data-win-control` attribute of the
    `div` element to the WinJS.UI.SemanticZoom value.'
  trans: "\n### 工作原理\n\n要在 WinJS 中对 `ListView` 控件中的项目进行分组，需要包含两个模板：一个用于组标题，一个用于单个项目。\n\
    \n让我们在 Visual Studio 2015 中创建一个新的 Windows 通用项目，并打开 `default.html` 页面。将其替换为以下代码片段。\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.5</title>\n\
    \    <!-- WinJS 引用 -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- Recipe4.5 引用 -->\n    <link href=\"/css/default.css\" rel=\"\
    stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"\
    /js/data.js\"></script>\n</head>\n<body class=\"win-type-body\">\n    <h1>配方 4.5</h1>\n\
    \    <div id=\"GroupHeader\" data-win-control=\"WinJS.Binding.Template\">\n  \
    \      <h3 data-win-bind=\"innerText: technology\"></h3>\n    </div>\n    <div\
    \ id=\"employee\" data-win-control=\"WinJS.Binding.Template\">\n        <h4 data-win-bind=\"\
    innerText:name\"></h4>\n    </div>\n    <div id=\"lvEmployees\" data-win-control=\"\
    WinJS.UI.ListView\"\n         data-win-options=\"{\n         itemTemplate: select('#employee'),\n\
    \         groupHeaderTemplate: select('#GroupHeader')\n         }\">\n    </div>\n\
    </body>\n</html>\n```\n\n此代码片段包含一个名为 `lvEmployees` 的 `ListView` 控件，该控件关联了组标题模板和\
    \ `itemTemplate`。\n\n请注意对 `data.js` JavaScript 文件的引用。\n\n在 Visual Studio 2015\
    \ 解决方案资源管理器中，于 `js` 文件夹下新建一个 JavaScript 文件，并将其命名为 `data.js`。向其中添加以下代码片段。\n\n```\n\
    (function () {\n    \"use strict\";\n    function Initialize() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var listView1 = document.getElementById(\"lvEmployees\").winControl;\n\
    \            var employeeList = new WinJS.Binding.List([\n                { id:\
    \ 1, name: \"Senthil Kumar\", technology: \"Mobile\" },\n                { id:\
    \ 2, name: \"Michael\", technology: \"Web\" },\n                { id: 3, name:\
    \ \"Lohith\", technology: \"Web\" },\n                { id: 4, name: \"Stephen\"\
    , technology: \"Mobile\" },\n                { id: 5, name: \"Vidyasagar\", technology:\
    \ \"Game\" },\n                { id: 6, name: \"Joseph\", technology: \"Mobile\"\
    \ },\n            ]);\n            var groupedEmployees = employeeList.createGrouped(\n\
    \                function (item) {\n                    return item.technology;\n\
    \                },\n                function (item) {\n                    return\
    \ { technology: item.technology }\n                },\n                function\
    \ (group1, group2) {\n                    return group1 > group2 ? 1 : -1;\n \
    \               });\n            listView1.groupDataSource = groupedEmployees.groups.dataSource;\n\
    \            listView1.itemDataSource = groupedEmployees.dataSource;\n       \
    \ });\n    }\n    document.addEventListener(\"DOMContentLoaded\", Initialize);\n\
    })();\n```\n\n此 JavaScript 代码创建了项目数据源以及分组数据源。该列表包含员工记录，每个项目包含 `id`、`name` 和 `technology`\
    \ 属性。\n\n分组数据源是使用 WinJS 的 `createGrouped` 方法创建的，该方法需要传入三个函数作为参数。\n\n*   `GroupKey`：此函数用于将列表中的每个项目与一个组关联起来。前面的示例返回了与每个员工关联的\
    \ `technology` 属性。\n*   `GroupData`：此函数返回由组标题显示的数据项。在前面的示例中，`GroupData` 返回了在标题中显示的该组的\
    \ `technology`。\n*   `GroupSorter`：此函数处理组的排序顺序；例如，按升序列出标题中的组。\n\n请注意，分组数据源是动态的，它同样可以与筛选后的数据源一起使用。\n\
    \n一旦项目数据源和分组数据源准备就绪，就分别将它们设置为 `ListView` 的 `groupDataSource` 属性和 `itemDataSource`\
    \ 属性，如下所示。\n\n```\nlistView1.groupDataSource = groupedEmployees.groups.dataSource;\n\
    listView1.itemDataSource = groupedEmployees.dataSource;\n```\n\n在 Windows 上运行该应用程序时，您将看到如图\
    \ 4-8 所示的界面。\n\n![A978-1-4842-0719-2_4_Fig8_HTML.jpg](img/A978-1-4842-0719-2_4_Fig8_HTML.jpg)\n\
    \n**图 4-8.** 带有分组数据的 ListView\n\n请注意，项目已按技术分组并显示在页面上。\n\n## 4.6 ListView 中的语义缩放\n\
    \n### 问题\n\n您希望在使用 `ListView` 时，为用户提供一个选项，使其能够在两个不同的缩放级别查看数据。\n\n### 解决方案\n\n\
    您可以在应用程序中使用 WinJS 的 `SemanticZoom` 控件来实现语义缩放功能。`SemanticZoom` 控件允许您在使用 `ListView`\
    \ 时提供同一数据的两种不同视图。\n\n您可以通过将 `div` 元素的 `data-win-control` 属性设置为 `WinJS.UI.SemanticZoom`\
    \ 值来添加 `SemanticZoom`。\n"
- fmt: "### How It Works\n\nSemantic zoom can be implemented using the `SemanticZoom`\
    \ control in WinJS. Think of a scenario where you have a list of employees that\
    \ can be grouped by the technology that they are working with. To allow the user\
    \ to navigate between the technologies easily, you can use the semantic zoom,\
    \ in which you see the employees grouped into categories by default, and when\
    \ you zoom out, you see only the list of technologies.\n\nCreate a new Universal\
    \ Windows app in Visual Studio 2015 and open the `default.html` page. Replace\
    \ the existing code with what’s provided next.\n\n```\n<!DOCTYPE html>\n<html>\n\
    <head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe4.6</title>\n    <!--\
    \ WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- Recipe4.6 references -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n    <script\
    \ src=\"/js/data.js\"></script>\n</head>\n<body class=\"win-type-body\">\n   \
    \ <h1>Recipe 4.6</h1>\n    <!-- Zoom In-->\n    <div id=\"GroupHeader\" data-win-control=\"\
    WinJS.Binding.Template\">\n        <h1 data-win-bind=\"innerText: technology\"\
    ></h1>\n    </div>\n    <div id=\"EmployeeTemplate\" data-win-control=\"WinJS.Binding.Template\"\
    >\n        <h2 data-win-bind=\"innerText:name\"></h2>\n    </div>\n    <!-- Zoom\
    \ out-->\n    <div id=\"TechnologyTemplate\" data-win-control=\"WinJS.Binding.Template\"\
    >\n        <h6 data-win-bind=\"innerText: technology\"></h6>\n    </div>\n   \
    \ <div id=\"szEmployee\" data-win-control=\"WinJS.UI.SemanticZoom\">\n       \
    \ <!-- Zoom In-->\n        <div id=\"lvEmployees\" data-win-control=\"WinJS.UI.ListView\"\
    \n             data-win-options=\"{\n         itemTemplate: select('#EmployeeTemplate'),\n\
    \         groupHeaderTemplate: select('#GroupHeader')\n         }\">\n       \
    \ </div>\n        <!-- Zoom Out-->\n        <div id=\"lvTechnologies\" data-win-control=\"\
    WinJS.UI.ListView\"\n             data-win-options=\"{\n         itemTemplate:\
    \ select('#TechnologyTemplate')\n         }\">\n        </div>\n    </div>\n</body>\n\
    </html>\n```\n\nThe preceding page contains a `SemanticZoom` control that has\
    \ two `ListView` controls. The following is code in which the `SemanticZoom` control\
    \ and the `ListView` are used.\n\n```\n<div id=\"szEmployee\" data-win-control=\"\
    WinJS.UI.SemanticZoom\">\n        <!-- Zoom In-->\n        <div id=\"lvEmployees\"\
    \ data-win-control=\"WinJS.UI.ListView\"\n             data-win-options=\"{\n\
    \         itemTemplate: select('#EmployeeTemplate'),\n         groupHeaderTemplate:\
    \ select('#GroupHeader')\n         }\">\n        </div>\n        <!-- Zoom Out-->\n\
    \        <div id=\"lvTechnologies\" data-win-control=\"WinJS.UI.ListView\"\n \
    \            data-win-options=\"{\n         itemTemplate: select('#TechnologyTemplate')\n\
    \         }\">\n        </div>\n</div>\n```\n\nThe `SemanticZoom` control includes\
    \ two `ListView` controls with varied zoom levels. When the user tries to zoom\
    \ in or zoom out, the `ListView` controls are switched accordingly.\n\nLet’s add\
    \ a new JavaScript file to the project under the `js` folder and name it `data.js`.\
    \ This file contains the item source and grouped data source for the `ListView`.\
    \ Add the following code to the `data.js` file.\n\n```\n(function () {\n    \"\
    use strict\";\n    function Initialize() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var listView1 = document.getElementById(\"lvEmployees\").winControl;\n\
    \            var listView2 = document.getElementById(\"lvTechnologies\").winControl;\n\
    \            var employeeList = new WinJS.Binding.List([\n                { id:\
    \ 1, name: \"Senthil Kumar\", technology: \"Mobile\" },\n                { id:\
    \ 2, name: \"Michael\", technology: \"Web\" },\n                { id: 3, name:\
    \ \"Lohith\", technology: \"Web\" },\n                { id: 4, name: \"Stephen\"\
