    System events are made available through a system-wide trigger object called `SystemTrigger`.
    When creating a new background task, you need to let the OS know which system
    trigger you want to subscribe to. You create a new instance of `SystemTrigger`
    and pass the trigger type in the constructor. The trigger types are defined in
    `SystemTriggerType` enumeration. Table [11-1](#A978-1-4842-0719-2_11_Chapter.html#Tab1)
    lists the triggers with their descriptions.


    Table 11-1.


    System Trigger Types


    | Trigger Name | Description |

    | --- | --- |

    | InternetAvailable | The Internet becomes available |

    | NetworkStateChange | A network change has occurred |

    | OnlineIdConnectedStateChange | Online id associated with the account changes
    |

    | SmsReceived | A new SMS message is received |

    | TimeZoneChange | The time zone changes on the device |


    ## 11.2 Create and Register a Background Task


    ### Problem


    You want to create a background task for your app and register it with the OS.


    ### Solution


    Use the `BackgroundTaskBuilder` found in the `Windows.ApplicationModel.Background`
    namespace to create a new background task and to register it.'
  trans: '

    ### 解决方案


    系统事件通过一个名为 `SystemTrigger` 的系统级触发器对象提供。创建新的后台任务时，你需要让操作系统知道要订阅哪个系统触发器。创建 `SystemTrigger`
    的新实例，并在构造函数中传递触发器类型。触发器类型在 `SystemTriggerType` 枚举中定义。表 11-1 列出了这些触发器及其描述。


    表 11-1. 系统触发器类型


    | 触发器名称 | 描述 |

    | --- | --- |

    | `InternetAvailable` | 网络变为可用 |

    | `NetworkStateChange` | 网络状态发生变化 |

    | `OnlineIdConnectedStateChange` | 与账户关联的在线 ID 发生变化 |

    | `SmsReceived` | 收到新的短信 |

    | `TimeZoneChange` | 设备上的时区发生变化 |


    ## 创建并注册后台任务


    ### 问题


    你想为应用创建一个后台任务，并在操作系统中注册它。


    ### 解决方案


    使用 `Windows.ApplicationModel.Background` 命名空间中的 `BackgroundTaskBuilder` 来创建新的后台任务并注册它。'
- fmt: "### How It Works\n\nOpen Visual Studio 2015 Community edition. Select File\
    \ ➤ New Project. In the New Project dialog window, select Templates ➤ JavaScript\
    \ ➤ Windows ➤ Universal from the Installed Templates section (see Figure [11-1](#A978-1-4842-0719-2_11_Chapter.html#Fig1)).\
    \ Select Blank App (Universal Windows) from the available project templates. Provide\
    \ a name and location for the app and click OK.\n\n![A978-1-4842-0719-2_11_Fig1_HTML.jpg](A978-1-4842-0719-2_11_Fig1_HTML.jpg)\n\
    \nFigure 11-1.\n\nNew Project dialog Visual Studio prepares the project, which\
    \ will look like what’s shown in Figure [11-2](#A978-1-4842-0719-2_11_Chapter.html#Fig2)\
    \ once done.\n\n![A978-1-4842-0719-2_11_Fig2_HTML.jpg](A978-1-4842-0719-2_11_Fig2_HTML.jpg)\n\
    \nFigure 11-2.\n\nSolution Explorer Create a new JavaScript file in your `js`\
    \ folder. Let’s name the file `mytask.js`. This `js` file contains the logic for\
    \ the background work/task that you want to perform. You will use the file name\
    \ of this `js` file to register the task, so keep note of the file name.\n\nHere\
    \ is the skeleton code of the `mytask.js` file:\n\n```\n(function () {\n    \"\
    use strict\";\n    //gets the current instance of the background task\n    var\
    \ backgroundTaskInstance = Windows.UI.WebUI.WebUIBackgroundTaskInstance.current;\n\
    \    var canceled = false,\n        settings = Windows.Storage.ApplicationData.current.localSettings,\n\
    \        key = backgroundTaskInstance.task.name;\n    backgroundTaskInstance.addEventListener(\"\
    canceled\", OnCanceled);\n    //checking if the background task is cancelled by\
    \ the user.\n    if (!canceled) {\n        doWork();\n    }\n    else {\n    \
    \    settings.values[key] = \"Canceled\";\n        close();\n    }\n    //the\
    \ function which performs the main work as part of our background task\n    function\
    \ doWork() {\n        settings.values[key] = \"Starting\"\n        //Your code\
    \ to do work in the background\n        //...\n        settings.values[key] =\
    \ \"Succeeded\";\n        settings.values[key] = \"Closing\";\n        //call\
    \ close when task is done\n        close();\n    }\n    function OnCanceled(sender,\
    \ reason) {\n        canceled = true;\n    }\n})();\n```\n\nLet’s go over the\
    \ code. You get an instance of the background task using the `WebUIBackgroundTaskInstance.current`\
    \ property. You then attach a canceled event handler to the cancellation of the\
    \ background task. You then define a `doWork()` function, which does the actual\
    \ work as part of the background task. You make use of the `localSettings` and\
    \ update state of the task so that the main app can read the same and perform\
    \ any updates on the UI. Notice the call to the `close()` function; a background\
    \ task should call this function once it has finished its work. Next, you register\
    \ the task that you just created.\n\nIn `default.js`, once the app has been activated,\
    \ register the `mytask.js` background task that you just created. The following\
    \ are the steps involved in registering a task. Iterate over all the tasks using\
    \ the `BackgroundTaskRegistration.allTasks` property. It is important to check\
    \ if your task is already registered or not. If you don’t check for this and register\
    \ blindly, the background task is registered multiple times, which may lead to\
    \ unexpected results. Here is the code snippet to do this:\n\n```\nvar task =\
    \ null,\n    taskRegistered = false,\n    background = Windows.ApplicationModel.Background,\n\
    \    iter = background.BackgroundTaskRegistration.allTasks.first();\nwhile (iter.hasCurrent)\
    \ {\n    task = iter.current.value;\n    if (task.name === exampleTaskName) {\n\
    \        taskRegistered = true;\n        break;\n    }\n    iter.moveNext();\n\
    }\n```\n\nIf the task is not already registered, perform the registration by using\
    \ the `BackgroundTaskBuilder` class. You need to set the system trigger on which\
    \ the task should be invoked. In this example, you listen to `timeZoneChange`\
    \ as the trigger for the background task. Here is the code snippet:\n\n```\nif\
    \ (taskRegistered != true)\n{\n    var builder = new\n    Windows.ApplicationModel.Background.BackgroundTaskBuilder();\n\
    \    var trigger = new Windows.ApplicationModel.Background.SystemTrigger(\n  \
    \  Windows.ApplicationModel.Background.SystemTriggerType.timeZoneChange, false);\n\
    \    builder.name = exampleTaskName;\n    builder.taskEntryPoint = \"js\\\\mytask.js\"\
    ;\n    builder.setTrigger(trigger);\n    task = builder.register();\n}\n```\n\n\
    Next, you need to handle the task completion. Add a completed event handler on\
    \ the task itself. Here is the code snippet:\n\n```\ntask.addEventListener(\"\
    completed\", function (args) {\n    var settings = Windows.Storage.ApplicationData.current.localSettings;\n\
    \    var key = args.target.name;\n    settings.values[key] = \"Completed\";\n\
    });\n```\n\nHere is the complete code snippet for registering the background task:\n\
    \n```\napp.onactivated = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
