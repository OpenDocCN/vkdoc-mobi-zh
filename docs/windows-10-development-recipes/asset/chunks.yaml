    \ such as package name (note: this is not the application name, rather just the\
    \ package name), package display name, version details, publisher, publisher display\
    \ name, and package family name (see Figure [18-7](#A978-1-4842-0719-2_18_Chapter.html#Fig7)).\n\
    \n    ![A978-1-4842-0719-2_18_Fig7_HTML.jpg](A978-1-4842-0719-2_18_Fig7_HTML.jpg)\n\
    \n    Figure 18-7.\n\n    Packaging\n\n#### Creating an App Package\n\nAfter configuring\
    \ the application package using the manifest file, the next thing to do is generate\
    \ or create the package. The package is an appxupload file. Visual Studio provides\
    \ the Create App Package wizard, which you will use next. Follow these steps to\
    \ create the package:\n\nIn Solution Explorer, open the solution of your Universal\
    \ Windows app project.   With the project opened in the Solution Explorer, right-click\
    \ your project. Choose Store ➤ Create App Packages from the context menu (see\
    \ Figure [18-8](#A978-1-4842-0719-2_18_Chapter.html#Fig8)).\n\n![A978-1-4842-0719-2_18_Fig8_HTML.jpg](A978-1-4842-0719-2_18_Fig8_HTML.jpg)\n\
    \nFigure 18-8.\n\nCreate App Packages   The wizard will be invoked. In the Create\
    \ Your Packages dialog, select Yes to build packages and upload to the Windows\
    \ Store (see Figure [18-9](#A978-1-4842-0719-2_18_Chapter.html#Fig9)).\n\n![A978-1-4842-0719-2_18_Fig9_HTML.jpg](A978-1-4842-0719-2_18_Fig9_HTML.jpg)\n\
    \nFigure 18-9.\n\nCreate App Package wizard If you chose No, Visual Studio would\
    \ not create the required `.appxupload` file required for Store submission. This\
    \ option should be used when you only want to sideload your app to run it on an\
    \ internal device.   Next, you need to sign in to your Windows Dev Center account\
    \ (see Figure [18-10](#A978-1-4842-0719-2_18_Chapter.html#Fig10)).\n\n![A978-1-4842-0719-2_18_Fig10_HTML.jpg](A978-1-4842-0719-2_18_Fig10_HTML.jpg)\n\
    \nFigure 18-10.\n\nCreate App Package Dev Center Sign in   Next, you need to select\
    \ a name for your package, or you can reserve a name for your package from the\
    \ wizard. The name you select needs to be unique to the Windows Store (see Figure\
    \ [18-11](#A978-1-4842-0719-2_18_Chapter.html#Fig11)).\n\n![A978-1-4842-0719-2_18_Fig11_HTML.jpg](A978-1-4842-0719-2_18_Fig11_HTML.jpg)\n\
    \nFigure 18-11.\n\nSelecting app name   Next, you need to select and configure\
    \ the package information: the output location where the package will be saved,\
    \ and the version and the architecture configuration for the build. Make sure\
    \ to select all three architecture options (see Figure [18-12](#A978-1-4842-0719-2_18_Chapter.html#Fig12)).\n\
    \n![A978-1-4842-0719-2_18_Fig12_HTML.jpg](A978-1-4842-0719-2_18_Fig12_HTML.jpg)\n\
    \nFigure 18-12.\n\nConfiguring package details   Click Create to generate the\
    \ appxupload package, which is generated at the selected output location. You\
    \ can then submit the appxupload package to the Store. Next, you see Package Creation\
    \ Completed dialog (see Figure [18-13](#A978-1-4842-0719-2_18_Chapter.html#Fig13)).\n\
    \n![A978-1-4842-0719-2_18_Fig13_HTML.jpg](A978-1-4842-0719-2_18_Fig13_HTML.jpg)\n\
    \nFigure 18-13.\n\nCreation Completion dialog It is important that you validate\
    \ your app before submitting it to store for certification. Validation can be\
    \ done by using the Windows App Certification Kit (WACK) that is installed as\
    \ part of the SDK on your machine. Validation can be done on your local machine\
    \ or on a remote machine.   To validate locally, select the Local machine radio\
    \ button in the Package Creation Completed dialog. Click the Launch Windows App\
    \ Certification Kit button. The Windows App Certification Kit performs tests and\
    \ shows you the results.   If your app has passed the tests, you are ready to\
    \ submit your app to the Store.\n\n## 18.3 Submit an App to the Windows Store\n\
    \n### Problem\n\nYou have finished creating the package. An appxupload package\
    \ has been generated for your app. You now need to submit the app to the Store\
    \ for certification."
  trans: "\n## 配置应用包\n\n要创建应用包，首先需要设置一些描述应用的属性和设置。这些应用属性和设置存储在一个名为应用清单文件（`package.appxmanifest`）的文件中，该文件位于项目根目录。清单中可设置的属性/设置包括用于应用程序磁贴的图像或应用支持的屏幕方向等。\n\
    \n应用程序清单文件是一个 XML 文件。Visual Studio 提供了一个基于 GUI 的清单设计器/编辑器来编辑此文件。使用 GUI 设计器/编辑器可以轻松更改应用程序清单。\n\
    \n以下步骤提供了关于如何配置应用包的说明：\n\n![A978-1-4842-0719-2_18_Fig2_HTML.jpg](img/A978-1-4842-0719-2_18_Fig2_HTML.jpg)\n\
    \n图 18-2.\n\n应用程序包清单编辑 在解决方案资源管理器中，展开应用程序的项目节点。双击 `package.appxmanifest` 文件。Visual\
    \ Studio 将启动清单设计器/编辑器（见图 18-2）。\n\n清单文件有多个选项卡，用于配置应用的不同方面。\n\n- **应用程序**：配置应用的显示名称、起始页、默认语言、描述、支持的屏幕方向、锁屏通知模式以及磁贴更新信息。\n\
    - **视觉资产**：配置应用的视觉资产，例如磁贴图像和徽标、徽章徽标以及初始屏幕（见图 18-3）。\n\n    ![A978-1-4842-0719-2_18_Fig3_HTML.jpg](img/A978-1-4842-0719-2_18_Fig3_HTML.jpg)\n\
    \n    图 18-3.\n\n    视觉资产\n\n- **功能**：应用所需的任何功能都必须在清单文件的此区域进行声明（见图 18-4）。\n\n\
    \    ![A978-1-4842-0719-2_18_Fig4_HTML.jpg](img/A978-1-4842-0719-2_18_Fig4_HTML.jpg)\n\
    \n    图 18-4.\n\n    功能\n\n- **声明**：用于为应用添加任何声明（例如，协议或共享目标）并设置其属性（见图 18-5）。\n\n\
    \    ![A978-1-4842-0719-2_18_Fig5_HTML.jpg](img/A978-1-4842-0719-2_18_Fig5_HTML.jpg)\n\
    \n    图 18-5.\n\n    声明\n\n- **内容 URI**：指定应用中哪些页面可以被框架导航到，以及在 Web 视图中加载时可以导航到的\
    \ URI（见图 18-6）。\n\n    ![A978-1-4842-0719-2_18_Fig6_HTML.jpg](img/A978-1-4842-0719-2_18_Fig6_HTML.jpg)\n\
    \n    图 18-6.\n\n    内容 URI\n\n- **打包**：设置包的详细信息，例如包名称（注意：这不是应用程序名称，仅指包名称）、包显示名称、版本详细信息、发布者、发布者显示名称和包系列名称（见图\
    \ 18-7）。\n\n    ![A978-1-4842-0719-2_18_Fig7_HTML.jpg](img/A978-1-4842-0719-2_18_Fig7_HTML.jpg)\n\
    \n    图 18-7.\n\n    打包\n\n## 创建应用包\n\n使用清单文件配置完应用程序包后，下一步就是生成或创建包。该包是一个 `appxupload`\
    \ 文件。Visual Studio 提供了**创建应用包**向导，接下来你将使用它。请按照以下步骤创建包：\n\n在解决方案资源管理器中，打开通用 Windows\
    \ 应用项目的解决方案。在解决方案资源管理器中打开项目后，右键单击你的项目。从上下文菜单中选择 **应用商店** > **创建应用包**（见图 18-8）。\n\
    \n![A978-1-4842-0719-2_18_Fig8_HTML.jpg](img/A978-1-4842-0719-2_18_Fig8_HTML.jpg)\n\
    \n图 18-8.\n\n**创建应用包** 向导将被调用。在**创建你的包**对话框中，选择**是**来生成包并上传到 Windows 应用商店（见图 18-9）。\n\
    \n![A978-1-4842-0719-2_18_Fig9_HTML.jpg](img/A978-1-4842-0719-2_18_Fig9_HTML.jpg)\n\
    \n图 18-9.\n\n创建应用包向导 如果你选择**否**，Visual Studio 将不会创建提交到应用商店所需的 `.appxupload` 文件。当您只想旁加载应用使其在内部设备上运行时，应使用此选项。\n\
    \n接下来，你需要登录到 Windows 开发人员中心帐户（见图 18-10）。\n\n![A978-1-4842-0719-2_18_Fig10_HTML.jpg](img/A978-1-4842-0719-2_18_Fig10_HTML.jpg)\n\
    \n图 18-10.\n\n创建应用包 开发人员中心登录\n\n接下来，你需要为你的包选择一个名称，或者你也可以从向导中为你的包预留一个名称。你选择的名称需要在\
    \ Windows 应用商店中是唯一的（见图 18-11）。\n\n![A978-1-4842-0719-2_18_Fig11_HTML.jpg](img/A978-1-4842-0719-2_18_Fig11_HTML.jpg)\n\
    \n图 18-11.\n\n选择应用名称\n\n接下来，你需要选择并配置包信息：包的输出位置、版本以及生成的体系结构配置。请确保选择所有三个体系结构选项（见图\
    \ 18-12）。\n\n![A978-1-4842-0719-2_18_Fig12_HTML.jpg](img/A978-1-4842-0719-2_18_Fig12_HTML.jpg)\n\
    \n图 18-12.\n\n配置包详细信息\n\n单击**创建**以生成 `appxupload` 包，该包将生成在所选输出位置。然后你可以将 `appxupload`\
    \ 包提交到应用商店。接下来，你将看到**包创建完成**对话框（见图 18-13）。\n\n![A978-1-4842-0719-2_18_Fig13_HTML.jpg](img/A978-1-4842-0719-2_18_Fig13_HTML.jpg)\n\
    \n图 18-13.\n\n创建完成对话框\n\n在将应用提交到应用商店进行认证之前，验证应用非常重要。可以通过使用已作为 SDK 一部分安装在机器上的 **Windows\
    \ 应用认证工具包 (WACK)** 来进行验证。验证可以在本地机器或远程机器上进行。\n\n要本地验证，请在**包创建完成**对话框中选择**本地机器**单选按钮。单击**启动\
    \ Windows 应用认证工具包**按钮。Windows 应用认证工具包将执行测试并显示结果。\n\n如果你的应用通过了测试，你就可以将应用提交到应用商店了。\n\
    \n## 18.3 向 Windows 应用商店提交应用\n\n### 问题\n\n你已完成创建包。已为你的应用生成了一个 `appxupload` 包。现在你需要将应用提交到应用商店进行认证。\n"
- fmt: "# Solution\n\nOnce an `appxupload` package has been created for your app,\
    \ the next step is to submit it to the store for certification. Once certified,\
    \ your app is listed on the Windows Store so that users can search for it and\
    \ download it for installation. You submit your app package to the Windows Store\
    \ using the Windows Dev Center dashboard. The following outlines the process of\
    \ submission.\n\nLog in to the Windows Dev Center using your dev center account\
    \ credentials. Head over to [`http://dev.windows.com`](http://dev.windows.com)\
    \ and sign in. Click the Dashboard link. On the dashboard page, you see the `My\
    \ Apps` section on the left-hand side of the page. Under this section, the app\
    \ name you reserved during package creation is listed with an `In progress` status.\
    \ Click the app name (see Figure 18-14).\n\n![A978-1-4842-0719-2_18_Fig14_HTML.jpg](A978-1-4842-0719-2_18_Fig14_HTML.jpg)\n\
    \n**Figure 18-14.** Apps listing in Windows Dev Center dashboard\n\nNext, you\
    \ are presented with the `App Overview` page. Here you need to click the `Start\
    \ your submission` button in the `Submissions` section. Next, you are presented\
    \ with the submission screen. Here you need to provide information related to\
    \ pricing, the application properties, the application package, which countries\
    \ you want your app to be available in, and any other instructions for certification\
    \ team.\n\n- **Pricing and availability:** Here you provide the pricing for your\
    \ app or decide to list it as free. You also have option to choose the countries\
    \ in which you want to list your app.\n- **App Properties:** Here you provide\
    \ information such as the category and subcategories to which your app belongs\
    \ in, as well as the age rating, any hardware preferences, and app declarations.\n\
    - **Packages:** Here you submit the `appxupload` package that was generated by\
    \ Visual Studio.\n\nOnce you have followed all the steps in the submission process,\
    \ you can click the `Submit to the Store` button. Your package will then undergo\
    \ a workflow. Your app is signed with a certificate, and then the certification\
    \ team performs certification tests. Once certified by the certification team,\
    \ your app is published to the Windows Store.\n\n## 18.4 Use Windows Ad Mediation\
    \ in Your UWP Apps\n\n### Problem\n\nYou have developed your Windows 10 app and\
    \ you are thinking of monetizing it by running advertisements. You want to sign\
    \ up with multiple ad providers to show their ads in your app. You need an ad\
    \ mediator control for your app.\n\n### Solution\n\nIn-app advertisements are\
    \ one of the ways in which you can earn money from your app. You can subscribe\
    \ to advertisement providers and run their ads within your app. You get paid for\
    \ impressions of the ads shown in your app. Different providers have different\
    \ economics tied with the ad impressions. But to show ads, you need to first install\
    \ Windows Ad Mediator, a control that helps you to show ads from multiple providers.\
    \ Let’s learn how to install an Ad Mediator control from Visual Studio.\n\nOpen\
    \ your project in Solution Explorer. Expand your project if it is not expanded\
    \ already. From the menu bar, select **Tools** > **Extensions and Updates** (see\
    \ Figure 18-15).\n\n![A978-1-4842-0719-2_18_Fig15_HTML.jpg](A978-1-4842-0719-2_18_Fig15_HTML.jpg)\n\
    \n**Figure 18-15.** Extension and Updates dialog\n\nSelect `Online` from the left\
    \ tree. Type `Windows Ad Mediation` in the dialog search bar (see Figure 18-16).\n\
    \n![A978-1-4842-0719-2_18_Fig16_HTML.jpg](A978-1-4842-0719-2_18_Fig16_HTML.jpg)\n\
    \n**Figure 18-16.** Windows ad mediation\n\nClick `Download` on the Windows ad\
    \ mediation package shown in the search results. This launches a browser and downloads\
    \ the executable. After it downloads, install the MSI and follow the onscreen\
    \ instructions. Restart Visual Studio once installation has finished.\n\nYou are\
    \ now ready to use the Windows Ad Mediation control in your application.\n\n##\
    \ 18.5 Show Ads in Your Application\n\n### Problem\n\nYou have installed the Windows\
    \ Ad Mediation SDK and now you want to start showing ads in your application.\
    \ You would like to put ads in your app pages.\n\n### Solution\n\nIn order to\
    \ show ads in your application pages, you need to add a reference to the Windows\
    \ Advertising SDK, which was installed as part of the Windows Ad Mediation installation\
    \ earlier. Once the reference has been added to the Windows Ad SDK, you can then\
    \ instantiate mediation control on any page and show ads inside it. The following\
    \ steps explain how to add the mediation control.\n\nOpen your project in Solution\
    \ Explorer. Expand your project if it is not expanded already. Right-click the\
    \ `References` node and select `Add Reference` from the context menu. In the `Reference\
    \ Manager` dialog, select `Microsoft Advertising SDK for JavaScript` and click\
    \ `OK` (see Figure 18-17).\n\n![A978-1-4842-0719-2_18_Fig17_HTML.jpg](A978-1-4842-0719-2_18_Fig17_HTML.jpg)\n\
    \n**Figure 18-17.** Reference Manager dialog\n\nOpen the `default.html` or any\
    \ other file where you want to place the ads. In the `<head>` section, after the\
    \ project’s JavaScript references of `default.css` and `default.js`, add the reference\
    \ to `ad.js`.\n\n```\n<!-- Microsoft Advertising required references -->\n<script\
    \ src=\"/Microsoft.Advertising.JavaScript/ad.js\" ></script>\n```\n\nModify the\
    \ `<body>` section in the `default.html` file (or other HTML files, as appropriate\
    \ for your project) to include the following:\n\n```\n<div id=\"myAd\" style=\"\
    position: absolute; top: 50px; left: 0px; width: 300px; height: 250px; z-index:\
    \ 1\"\n     data-win-control=\"MicrosoftNSJS.Advertising.AdControl\"\n     data-win-options=\"\
    {applicationId: 'd25517cb-12d4-4699-8bdc-52040c712cab', adUnitId: '10043121'}\"\
    >\n</div>\n```\n\nCompile and run the app to see it with an ad (see Figure 18-18).\n\
    \n![A978-1-4842-0719-2_18_Fig18_HTML.jpg](A978-1-4842-0719-2_18_Fig18_HTML.jpg)\n\
    \n**Figure 18-18.** Universal Windows app with ads\n\n**Note:** The `applicationId`\
    \ and `adUnitId` provided in the earlier code snippet are the test values that\
    \ Microsoft provides for you to test during development. The `applicationId` will\
    \ be the same for test purposes, but there are different test ad units, which\
    \ can be used to test different ad dimensions. The Microsoft documentation page\
    \ at [`https://msdn.microsoft.com/en-US/library/mt313178(v=msads.30).aspx`](https://msdn.microsoft.com/en-US/library/mt313178(v=msads.30).aspx)\
    \ provides more information about test ad unit ids."
  raw: '### Solution


    Once an appxupload package has been created for your app, the next step is to
    submit it to the store for certification. Once certified, your app is listed on
    the Windows Store so that users can search for it and download it for installation.
    You submit your app package to the Windows Store using the Windows Dev Center
    dashboard. The following outlines the process of submission.


    Log in to the Windows Dev Center using your dev center account credentials. Head
    over to [`http://dev.windows.com`](http://dev.windows.com) and sign in.   Click
    the Dashboard link.   On the dashboard page, you see the My Apps section on the
    left-hand side of the page. Under this section, the app name you reserved during
    package creation is listed with an In progress status. Click the app name (see
    Figure [18-14](#A978-1-4842-0719-2_18_Chapter.html#Fig14)).


    ![A978-1-4842-0719-2_18_Fig14_HTML.jpg](A978-1-4842-0719-2_18_Fig14_HTML.jpg)


    Figure 18-14.


    Apps listing in Windows Dev Center dashboard   Next, you are presented with the
    App Overview page. Here you need to click the Start your submission button in
    the Submissions section.   Next, you are presented with the submission screen.
    Here you need to provide information related to pricing, the application properties,
    the application package, which countries you want your app to be available in,
    and any other instructions for certification team. Pricing and availability: Here
    you provide the pricing for your app or decide to list it as free. You also have
    option to choose the countries in which you want to list your app.   App Properties:
    Here you provide information such as the category and subcategories to which your
    app belongs in, as well as the age rating, any hardware preferences, and app declarations.
      Packages: Here you submit the appxupload package that was generated by Visual
    Studio.     Once you have followed all the steps in the submission process, you
    can click the Submit to the Store button. Your package will then undergo a workflow.
    Your app is signed with a certificate, and then the certification team performs
    certification tests. Once certified by the certification team, your app is published
    to the Windows Store.


    ## 18.4 Use Windows Ad Mediation in Your UWP Apps


    ### Problem


    You have developed your Windows 10 app and you are thinking of monetizing it by
    running advertisements. You want to sign up with multiple ad providers to show
    their ads in your app. You need an ad mediator control for your app.


    ### Solution


    In-app advertisements are one of the ways in which you can earn money from your
    app. You can subscribe to advertisement providers and run their ads within your
    app. You get paid for impressions of the ads shown in your app. Different providers
    have different economics tied with the ad impressions. But to show ads, you need
    to first install Windows Ad Mediator, a control that helps you to show ads from
    multiple providers. Let’s learn how to install an Ad Mediator control from Visual
    Studio.


    Open your project in Solution Explorer. Expand your project if it is not expanded
    already.   From the menu bar, select Tools➤ Extensions and Updates (see Figure
    [18-15](#A978-1-4842-0719-2_18_Chapter.html#Fig15)).


    ![A978-1-4842-0719-2_18_Fig15_HTML.jpg](A978-1-4842-0719-2_18_Fig15_HTML.jpg)


    Figure 18-15.


    Extension and Updates dialog   Select Online from the left tree. Type Windows
    Ad Mediation in the dialog search bar (see Figure [18-16](#A978-1-4842-0719-2_18_Chapter.html#Fig16)).


    ![A978-1-4842-0719-2_18_Fig16_HTML.jpg](A978-1-4842-0719-2_18_Fig16_HTML.jpg)


    Figure 18-16.


    Windows ad mediation   Click Download on the Windows ad mediation package shown
    in the search results. This launches a browser and downloads the executable. After
    it downloads, install the MSI and follow the onscreen instructions. Restart Visual
    Studio once installation has finished.  


    You are now ready to use the Windows Ad Mediation control in your application.


    ## 18.5 Show Ads in Your Application


    ### Problem


    You have installed the Windows Ad Mediation SDK and now you want to start showing
    ads in your application. You would like to put ads in your app pages.


    ### Solution


    In order to show ads in your application pages, you need to add a reference to
    the Windows Advertising SDK, which was installed as part of the Windows Ad Mediation
    installation earlier. Once the reference has been added to the Windows Ad SDK,
    you can then instantiate mediation control on any page and show ads inside it.
    The following steps explain how to add the mediation control.


    Open your project in Solution Explorer. Expand your project if it is not expanded
    already.   Right-click the References node and select Add Reference from the context
    menu.   In the Reference Manager dialog, select Microsoft Advertising SDK for
    JavaScript and click OK (see Figure [18-17](#A978-1-4842-0719-2_18_Chapter.html#Fig17)).


    ![A978-1-4842-0719-2_18_Fig17_HTML.jpg](A978-1-4842-0719-2_18_Fig17_HTML.jpg)


    Figure 18-17.


    Reference Manager dialog   Open the default.html or any other file where you want
    to place the ads.   In the `<head>` section, after the project’s JavaScript references
    of default.css and default.js, add the reference to ad.js. `<!-- Microsoft Advertising
    required references -->` `<script src="/Microsoft.Advertising.JavaScript/ad.js"
    ></script>`   Modify the `<body>` section in the `default.html` file (or other
    HTML files, as appropriate for your project) to include the following: `<div id="myAd"
    style="position: absolute; top: 50px; left: 0px; width: 300px; height: 250px;
    z-index: 1"`       `data-win-control="MicrosoftNSJS.Advertising.AdControl"`       `data-win-options="{applicationId:
    ''d25517cb-12d4-4699-8bdc-52040c712cab'', adUnitId: ''10043121''}">`     `</div>`
      Compile and run the app to see it with an ad (see Figure [18-18](#A978-1-4842-0719-2_18_Chapter.html#Fig18)).


    ![A978-1-4842-0719-2_18_Fig18_HTML.jpg](A978-1-4842-0719-2_18_Fig18_HTML.jpg)


    Figure 18-18.


    Universal Windows app with ads   Note


    The application id and ad unit id provided in the earlier code snippet are the
    test values that Microsoft provides for you to test during development. The application
    id will be the same for test purposes, but there are different test ad units,
    which can be used to test different ad dimensions. The Microsoft documentation
    page at [`https://msdn.microsoft.com/en-US/library/mt313178(v=msads.30).aspx`](https://msdn.microsoft.com/en-US/library/mt313178(v=msads.30).aspx)
    provides more information about test ad unit ids.'
  trans: "\n# 解决方案\n\n为应用创建 `appxupload` 包后，下一步是将其提交至商店进行认证。通过认证后，你的应用便会出现在 Windows\
    \ 商店中，供用户搜索并下载安装。你可以通过 Windows 开发人员中心仪表板将应用包提交至 Windows 商店。以下概述了提交流程。\n\n使用你的开发人员中心账户凭据登录\
    \ Windows 开发人员中心。访问 [`http://dev.windows.com`](http://dev.windows.com) 并登录。点击“仪表板”链接。在仪表板页面，你会看到页面左侧的\
    \ `我的应用` 栏目。在该栏目下，你在创建包时预留的应用名称会以`进行中`状态列出。点击该应用名称（见图 18-14）。\n\n![A978-1-4842-0719-2_18_Fig14_HTML.jpg](img/A978-1-4842-0719-2_18_Fig14_HTML.jpg)\n\
    \n**图 18-14.** Windows 开发人员中心仪表板中的应用列表\n\n接下来，你会进入`应用概览`页面。在此页面，你需要点击`提交`栏目中的`开始提交`按钮。随后，会出现提交屏幕。你需要在此提供与定价、应用属性、应用包、希望应用上架的国家/地区以及任何其他供认证团队参考的说明相关的信息。\n\
    \n- **定价和可用性：** 在此处设置应用定价，或决定将其列为免费应用。你还可以选择希望应用上架的国家/地区。\n- **应用属性：** 在此处提供信息，例如应用所属的类别和子类别，以及年龄分级、任何硬件偏好设置和应用声明。\n\
    - **包：** 在此处提交由 Visual Studio 生成的 `appxupload` 包。\n\n完成提交过程中的所有步骤后，你可以点击`提交到商店`按钮。你的包随后将经历一系列工作流程。应用会先使用证书进行签名，然后认证团队会执行认证测试。通过认证团队的认证后，你的应用便会发布到\
    \ Windows 商店。\n\n## 18.4 在 UWP 应用中使用 Windows Ad Mediation\n\n### 问题\n\n你已经开发了\
    \ Windows 10 应用，并考虑通过投放广告来实现盈利。你想要注册多家广告提供商，以在应用中显示它们的广告。你需要为应用添加一个广告中介控件。\n\n\
    ### 解决方案\n\n应用内广告是实现应用盈利的方式之一。你可以订阅广告提供商，并在应用内运行它们的广告。你将根据应用中显示的广告展示量获得报酬。不同的提供商与广告展示量相关的经济模式各不相同。但要显示广告，你需要先安装\
    \ Windows Ad Mediation，这是一个有助于你显示来自多家提供商广告的控件。让我们来学习如何从 Visual Studio 安装 Ad Mediation\
    \ 控件。\n\n在解决方案资源管理器中打开你的项目。如果项目尚未展开，请展开它。从菜单栏中选择 **工具** > **扩展和更新**（见图 18-15）。\n\
    \n![A978-1-4842-0719-2_18_Fig15_HTML.jpg](img/A978-1-4842-0719-2_18_Fig15_HTML.jpg)\n\
    \n**图 18-15.** 扩展和更新对话框\n\n从左侧树形菜单中选择 `联机`。在对话框的搜索栏中输入 `Windows Ad Mediation`（见图\
    \ 18-16）。\n\n![A978-1-4842-0719-2_18_Fig16_HTML.jpg](img/A978-1-4842-0719-2_18_Fig16_HTML.jpg)\n\
    \n**图 18-16.** Windows 广告中介\n\n点击搜索结果中显示的 Windows 广告中介包上的 `下载`。这会启动浏览器并下载可执行文件。下载完成后，安装\
    \ MSI 并按照屏幕指示操作。安装完成后，重启 Visual Studio。\n\n现在，你可以在应用程序中使用 Windows Ad Mediation\
    \ 控件了。\n\n## 18.5 在应用中显示广告\n\n### 问题\n\n你已经安装了 Windows Ad Mediation SDK，现在想要开始在应用中显示广告。你希望在应用页面中放置广告。\n\
    \n### 解决方案\n\n为了在应用页面中显示广告，你需要添加对 Windows 广告 SDK 的引用，该 SDK 已在之前安装 Windows Ad Mediation\
    \ 时一起被安装。一旦添加了对 Windows 广告 SDK 的引用，你就可以在任何页面上实例化中介控件并在其中显示广告。以下步骤说明了如何添加中介控件。\n\
    \n在解决方案资源管理器中打开你的项目。如果项目尚未展开，请展开它。右键单击 `引用` 节点，然后从上下文菜单中选择 `添加引用`。在 `引用管理器` 对话框中，选择\
    \ `Microsoft Advertising SDK for JavaScript`，然后点击 `确定`（见图 18-17）。\n\n![A978-1-4842-0719-2_18_Fig17_HTML.jpg](img/A978-1-4842-0719-2_18_Fig17_HTML.jpg)\n\
    \n**图 18-17.** 引用管理器对话框\n\n打开 `default.html` 或任何你想要放置广告的其他文件。在 `<head>` 部分中，在项目的\
    \ `default.css` 和 `default.js` 的 JavaScript 引用之后，添加对 `ad.js` 的引用。\n\n```\n<!--\
    \ Microsoft Advertising 所需的引用 -->\n<script src=\"/Microsoft.Advertising.JavaScript/ad.js\"\
    \ ></script>\n```\n\n修改 `default.html` 文件（或适合你项目的其他 HTML 文件）中的 `<body>` 部分，以包含以下内容：\n\
    \n```\n<div id=\"myAd\" style=\"position: absolute; top: 50px; left: 0px; width:\
    \ 300px; height: 250px; z-index: 1\"\n     data-win-control=\"MicrosoftNSJS.Advertising.AdControl\"\
    \n     data-win-options=\"{applicationId: 'd25517cb-12d4-4699-8bdc-52040c712cab',\
    \ adUnitId: '10043121'}\">\n</div>\n```\n\n编译并运行应用，即可看到带有广告的应用（见图 18-18）。\n\n\
    ![A978-1-4842-0719-2_18_Fig18_HTML.jpg](img/A978-1-4842-0719-2_18_Fig18_HTML.jpg)\n\
    \n**图 18-18.** 带有广告的通用 Windows 应用\n\n**注意：** 上面代码片段中提供的 `applicationId` 和 `adUnitId`\
    \ 是微软提供的测试值，供你在开发期间测试使用。对于测试目的，`applicationId` 保持不变，但有多个不同的测试广告单元可用于测试不同尺寸的广告。微软文档页面\
    \ [`https://msdn.microsoft.com/en-US/library/mt313178(v=msads.30).aspx`](https://msdn.microsoft.com/en-US/library/mt313178(v=msads.30).aspx)\
    \ 提供了关于测试广告单元 ID 的更多信息。\n"
- fmt: "\nTo generate `ApplicationID` and `AdUnitId` in your production apps, follow\
    \ these steps:\n\n1. Start the store submission process in the Windows Dev Center.\n\
    2. Make sure that you set the App Category in the App Properties section.\n3.\
    \ Next, select Monetization ➤ Monetize with ads from the options in the section\
    \ on the left of the page.\n4. On the Monetize with ads page, under the Microsoft\
    \ Advertising ad units section, click Show Options.\n5. Enter a name for your\
    \ ad unit. Select the Ad unit type and the device family where the ad will be\
    \ shown.\n6. Click the Create ad unit button.\n7. Now you have created an ad unit.\
    \ Copy the application id and ad unit id and paste into the ad control in your\
    \ app.\n8. Regenerate the package and use the new package in your submission process.\n\
