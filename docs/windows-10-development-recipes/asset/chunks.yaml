- fmt: "### How It Works\n\nOpen Visual Studio 2015. Select File ➤ New Project ➤ JavaScript\
    \ ➤ Windows ➤ Universal ➤ Blank App (Windows Universal) template. This creates\
    \ a Universal Windows app project (see Figure [5-10](#A978-1-4842-0719-2_5_Chapter.html#Fig10)).\n\
    \n![A978-1-4842-0719-2_5_Fig10_HTML.jpg](A978-1-4842-0719-2_5_Fig10_HTML.jpg)\n\
    \nFigure 5-10. New Project dialog\n\nOpen `default.html`, which is found in the\
    \ root of the project. Replace the content of the `body` with the following content:\n\
    \n```\n<div data-win-control=\"WinJS.UI.Pivot\" data-win-options=\"{ title: 'PIVOT\
    \ Navigation', selectedIndex: 0 }\">\n    <div data-win-control=\"WinJS.UI.PivotItem\"\
    \ data-win-options=\"{ 'header': 'one'}\">\n        <p> Content - Item One </p>\n\
    \    </div>\n    <div data-win-control=\"WinJS.UI.PivotItem\" data-win-options=\"\
    { 'header': 'two'}\">\n        <p> Content - Item Two </p>\n    </div>\n    <div\
    \ data-win-control=\"WinJS.UI.PivotItem\" data-win-options=\"{ 'header': 'three'}\"\
    >\n        <p> Content - Item Three </p>\n    </div>\n</div>\n```\n\nYou have\
    \ placed a `div` and set the `data-win-control` attribute to a value of `WinJS.UI.Pivot`.\
    \ This converts the `div` to a Pivot control. You then pass options to the Pivot\
    \ control using the `data-win-options` attribute. You are setting the title of\
    \ the Pivot and the item that will be selected. The items of the pivot control\
    \ are placed as a `div` with the `data-win-control` attribute set to a value of\
    \ `WinJS.UI.PivotItem`. Each pivot item has a header. Set the header value using\
    \ the `data-win-options` attribute. You can place as many items as your app calls\
    \ for.\n\nNext, press F5 and run the app. Figure [5-11](#A978-1-4842-0719-2_5_Chapter.html#Fig11)\
    \ is a screenshot from the Windows Mobile output.\n\n![A978-1-4842-0719-2_5_Fig11_HTML.jpg](A978-1-4842-0719-2_5_Fig11_HTML.jpg)\n\
    \nFigure 5-11. Windows Mobile output\n\nAs you can see, there are three pivot\
    \ items. You can either click the header of the pivot items or swipe left to right\
    \ to navigate to adjacent content/items.\n\n## 5.8 SplitView Navigation in UWP\
    \ Apps\n\n### Problem\n\nIn your app, you have identified that the navigational\
    \ structure for navigation is peer-based. You want to provide a menu with links\
    \ to the top-level page. You want to implement the navigation using the SplitView\
    \ control.\n\n### Solution\n\nThe SplitView control contains one pane and a content\
    \ area. The pane can expand or collapse, whereas the content area is always visible.\
    \ The pane can also remain in an open state and has the flexibility to present\
    \ itself from either the left side or the right side of the app. Usually, navigation\
    \ links are placed in this pane.\n\n### How It Works\n\nOpen Visual Studio 2015.\
    \ Select File ➤ New Project ➤ JavaScript ➤ Windows ➤ Universal ➤ Blank App (Windows\
    \ Universal) template. This creates a Universal Windows app project (see Figure\
    \ [5-12](#A978-1-4842-0719-2_5_Chapter.html#Fig12)).\n\n![A978-1-4842-0719-2_5_Fig12_HTML.jpg](A978-1-4842-0719-2_5_Fig12_HTML.jpg)\n\
    \nFigure 5-12. New Project dialog\n\nOpen `default.html`, which is found in the\
    \ root of the project. Replace the content of the `body` with the following code\
    \ snippet:\n\n```\n<div id=\"app\">\n    <div class=\"splitView\"\n         data-win-control=\"\
    WinJS.UI.SplitView\"\n         data-win-options=\"{closedDisplayMode:'none',\n\
    \         openedDisplayMode:'overlay'}\">\n        <!-- Pane area -->\n      \
    \  <div>\n            <div class=\"header\">\n                <button class=\"\
    win-splitviewpanetoggle\"\n                        data-win-control=\"WinJS.UI.SplitViewPaneToggle\"\
    \n                        data-win-options=\"{ splitView: select('.splitView')\
    \ }\"></button>\n                <div class=\"title\">Menu</div>\n           \
    \ </div>\n            <div id='navBar' class=\"nav-commands\">\n             \
    \   <div data-win-control=\"WinJS.UI.NavBarCommand\"\n                     data-win-options=\"\
    { onclick:SplitViewHelper.homeClick,\n                                       \
    \  label: 'Home',\n                                         icon: 'home'}\"></div>\n\
    \                <div data-win-control=\"WinJS.UI.NavBarCommand\"\n          \
    \           data-win-options=\"{ onclick:SplitViewHelper.favClick,\n         \
    \                                label: 'Favorite',\n                        \
    \                 icon: 'favorite'}\"></div>\n                <div data-win-control=\"\
    WinJS.UI.NavBarCommand\"\n                     data-win-options=\"{ onclick:SplitViewHelper.settingsClick,\n\
    \                                         label: 'Settings',\n               \
    \                          icon: 'settings'}\"></div>\n            </div>\n  \
    \      </div>\n        <!-- Content area -->\n        <button class=\"win-splitviewpanetoggle\"\
    \n                data-win-control=\"WinJS.UI.SplitViewPaneToggle\"\n        \
    \        data-win-options=\"{ splitView: select('.splitView') }\"></button>\n\
    \        <div class=\"contenttext\"><h2>Page Content </h2> </div>\n    </div>\n\
    </div>\n```\n\nIn order to use SplitView, you need to place a `div` and set the\
    \ `data-win-control` attribute to a value of `SplitView`. Then you need to create\
    \ two `div`s. The first `div` will be used for the navigation pane and the second\
    \ `div` will be used as the content area. You use `WinJS.UI.NavBarCommand` to\
    \ place the links for different pages. You are listening for the click event of\
    \ the nav bar items and on click will show content according to the navigation\
    \ link that was clicked. The content page is just a `div`, and at runtime, depending\
    \ on the navigation link clicked, you will update the content accordingly.\n\n\
    Next open `default.js`, found in the `js` folder. Replace the `app.activated`\
    \ handler with the following code snippet:\n\n```\napp.onactivated = function\
    \ (args) {\n    if (args.detail.kind === activation.ActivationKind.launch) {\n\
    \        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n        } else {\n        }\n        args.setPromise(\n            WinJS.UI.processAll().done(function\
    \ () {\n                SplitViewHelper.splitView = document.querySelector(\"\
    .splitView\").winControl;\n                new WinJS.UI._WinKeyboard(SplitViewHelper.splitView.paneElement);\
    \ // Temporary workaround: Draw keyboard focus visuals on NavBarCommands\n   \
    \         })\n        );\n    }\n};\n```\n\nNext, after the IIFE (immediately\
    \ invoked function expression) declaration, place the following code snippet.\
    \ You are creating a small helper class to handle the navigation click event.\n\
    \n```\n(function () {\n    \"use strict\";\n    //other app related code ommitted\
    \ for brevity\n})();\n\nWinJS.Namespace.define(\"SplitViewHelper\", {\n    splitView:\
    \ null,\n    homeClick: WinJS.UI.eventHandler(function (ev) {\n        document.querySelector('.contenttext').innerHTML\
    \ = \"<h2>SplitView Content area</h2>\";\n    }),\n    favClick: WinJS.UI.eventHandler(function\
    \ (ev) {\n        document.querySelector('.contenttext').innerHTML = \"<h2>Favorites!</h2>\"\
    ;\n    }),\n    settingsClick: WinJS.UI.eventHandler(function (ev) {\n       \
    \ document.querySelector('.contenttext').innerHTML = \"<h2>Settings!</h2>\";\n\
    \    }),\n});\n```\n\nYou are replacing the inner HTML of the content `div` in\
    \ this example. If you want to load a new page altogether, you can do so by making\
    \ use of `WinJS.UI.Pages.render('<URI>',<Content Host Elementn>);`.\n\nNow, press\
    \ F5 and run the app. Figures [5-13](#A978-1-4842-0719-2_5_Chapter.html#Fig13)\
    \ and [5-14](#A978-1-4842-0719-2_5_Chapter.html#Fig14) show output on a Windows\
    \ Mobile.\n\n![A978-1-4842-0719-2_5_Fig14_HTML.jpg](A978-1-4842-0719-2_5_Fig14_HTML.jpg)\n\
    \nFigure 5-14. Content area\n\n![A978-1-4842-0719-2_5_Fig13_HTML.jpg](A978-1-4842-0719-2_5_Fig13_HTML.jpg)\n\
    \nFigure 5-13. Navigation pane"
