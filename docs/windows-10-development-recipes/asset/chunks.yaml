- fmt: "### How It Works\n\nLet’s see how to create a new Universal Windows Platform\
    \ app using Visual Studio 2015.\n\nOpen Visual Studio 2015 Community edition.\
    \ Select **File ➤ New Project**. In the **New Project** dialog window, select\
    \ **Templates ➤ JavaScript ➤ Windows ➤ Universal** from the **Installed Templates**\
    \ section. Select **Blank App (Universal Windows)** from the available project\
    \ templates (see Figure [1-4](#A978-1-4842-0719-2_1_Chapter.html#Fig4)). Provide\
    \ a name and location for the app and click **OK**.\n\n![A978-1-4842-0719-2_1_Fig4_HTML.jpg](A978-1-4842-0719-2_1_Fig4_HTML.jpg)\n\
    \n**Figure 1-4.** New project template\n\nVisual Studio will prepare the project.\
    \ Figure [1-5](#A978-1-4842-0719-2_1_Chapter.html#Fig5) shows what the new solution\
    \ looks like.\n\n![A978-1-4842-0719-2_1_Fig5_HTML.jpg](A978-1-4842-0719-2_1_Fig5_HTML.jpg)\n\
    \n**Figure 1-5.** Solution Explorer\n\nAs part of the project template, you get\
    \ `css`, `images`, `js`, and `WinJS` folders. You also have a pre-created `default.html`\
    \ page to get started.\n\n*   The `css` folder is the place to keep your custom\
    \ stylesheets (`.css` files).\n*   The `images` folder contains any images you\
    \ would like to use in your app.\n*   `js` is the JavaScript folder where you\
    \ keep your application-related `js` files. You see the pre-created `default.js`\
    \ file with the following code inside it.\n\n```\n(function () {\n    \"use strict\"\
    ;\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !==\n            activation.ApplicationExecutionState.terminated)\
    \ {\n                //App Initilization code\n            } else {\n        \
    \        //Restore app sessions state\n            }\n            args.setPromise(WinJS.UI.processAll());\n\
    \        }\n    };\n    app.oncheckpoint = function (args) {\n        //save any\
    \ app state here\n    };\n    app.start();\n})();\n```\n\nThe code creates a `WinJS.Application`\
    \ object instance and starts the application.\n\nOpen `default.html` by double-clicking\
    \ the file in **Solution Explorer**. Here is the default code you see in the file:\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Ch1R3</title>\n\
    \    <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\" />\n    <script src=\"\
    WinJS/js/basejs\"></script>\n    <link href=\"/css/default.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"/js/default.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <p>Content goes here</p>\n</body>\n</html>\n```\n\nIt’s pretty much empty\
    \ with just one line of text that reads, “Content goes here.” Replace this text\
    \ with “Hello World!” This will be our Hello World application with UWP ☺.\n\n\
    Press **Ctrl+Shift+B** on your keyboard or select **Build ➤ Build solution**.\
    \ Visual Studio builds the project.\n\n## 1.4 Running Universal Windows Platform\
    \ Apps\n\n### Problem\n\nYou have created a new UWP app and you would like to\
    \ run the app to see it in action. You want to know how to do this.\n\n### Solution\n\
    \nVisual Studio 2015 comes with a lot of options to run your UWP app:\n\n*   Run\
    \ Application on Windows Phone 10 Emulators\n*   Run Application on Windows 10\
    \ Simulator\n*   Run Application on Local Machine\n*   Run Application on Device\n\
    \n### How It Works\n\nWhen you install Visual Studio 2015, it also installs Windows\
    \ Phone 10 emulators and the Windows 10 simulator. These emulators and simulators\
    \ mimic different devices and screen sizes in Windows Phone and Windows. Visual\
    \ Studio 2015 allows you to select one of these options to deploy your app. You\
    \ can also deploy the app on your machine right from Visual Studio and run the\
    \ app as a local app. Let’s look at all of these options, one at a time.\n\n####\
    \ Run Application on Windows Phone 10 Emulator\n\nIn Visual Studio, select one\
    \ of the Windows 10 emulators available from the target combo box. Figure [1-6](#A978-1-4842-0719-2_1_Chapter.html#Fig6)\
    \ shows the list of available emulators.\n\n![A978-1-4842-0719-2_1_Fig6_HTML.jpg](A978-1-4842-0719-2_1_Fig6_HTML.jpg)\n\
    \n**Figure 1-6.** Windows Phone 10 emulators target\n\nPress **F5** to run the\
    \ app on the selected Windows Phone 10 emulator. Figure [1-7](#A978-1-4842-0719-2_1_Chapter.html#Fig7)\
    \ shows a screenshot on a 4-inch Windows Phone 10.\n\n![A978-1-4842-0719-2_1_Fig7_HTML.jpg](A978-1-4842-0719-2_1_Fig7_HTML.jpg)\n\
    \n**Figure 1-7.** UWP app on Windows Phone 10 emulator\n\n#### Run Application\
    \ on Windows 10 Simulator\n\nIn Visual Studio, select **Simulator** from the target\
    \ combo box. This option allows you to deploy your app to a Windows 10 simulator\
    \ (see Figure [1-8](#A978-1-4842-0719-2_1_Chapter.html#Fig8)).\n\n![A978-1-4842-0719-2_1_Fig8_HTML.jpg](A978-1-4842-0719-2_1_Fig8_HTML.jpg)\n\
    \n**Figure 1-8.** Windows 10 simulator target\n\nPress **F5** to run the app on\
    \ the Windows 10 simulator. Figure [1-9](#A978-1-4842-0719-2_1_Chapter.html#Fig9)\
    \ is a screenshot of what the app looks like on a simulator.\n\n![A978-1-4842-0719-2_1_Fig9_HTML.jpg](A978-1-4842-0719-2_1_Fig9_HTML.jpg)\n\
    \n**Figure 1-9.** UWP app on Windows 10 simulator\n\n#### Run Application on Local\
    \ Machine\n\nTypically, Windows 10 apps need to be downloaded from Windows Store\
    \ and then installed on your machine. But this workflow is applicable only for\
    \ end users, not developers. During app development, a developer can directly\
    \ deploy and run their app on their development machine.\n\nBefore running your\
    \ app on your local machine, you need to enable what is known as **Developer Mode**\
    \ on your machine.\n\nOn your machine, go to **Settings ➤ Update & security ➤\
    \ For developers**, as shown in Figure [1-10](#A978-1-4842-0719-2_1_Chapter.html#Fig10).\n\
    \nSelect the **Developer mode** radio button.\n\n![A978-1-4842-0719-2_1_Fig10_HTML.jpg](A978-1-4842-0719-2_1_Fig10_HTML.jpg)\n\
    \n**Figure 1-10.** Developer features settings\n\nIn Visual Studio, select **Local\
    \ Machine** from the target combo box, as shown in Figure [1-11](#A978-1-4842-0719-2_1_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0719-2_1_Fig11_HTML.jpg](A978-1-4842-0719-2_1_Fig11_HTML.jpg)\n\
    \n**Figure 1-11.** Local Machine target\n\nPress **F5** to run the app on your\
    \ development machine. Figure [1-12](#A978-1-4842-0719-2_1_Chapter.html#Fig12)\
    \ is a screenshot of the app running on a local machine.\n\n![A978-1-4842-0719-2_1_Fig12_HTML.jpg](A978-1-4842-0719-2_1_Fig12_HTML.jpg)\n\
    \n**Figure 1-12.** UWP app on local machine\n\n#### Run Application on Device\n\
    \nIf you have a Windows 10 Mobile device, you can deploy and run your UWP app\
    \ directly on it. But, before you can deploy the app directly from Visual Studio\
    \ onto the device, you need to enable your phone to allow apps to be installed\
    \ during development. This is also known as sideloading the apps. This mode is\
    \ called **Developer Mode** and it is a phone setting. On your Windows Phone 10\
    \ device, go to **Settings ➤ Update & security ➤ For developers**. Select **Developer\
    \ mode**, as shown in Figure [1-13](#A978-1-4842-0719-2_1_Chapter.html#Fig13).\
    \ After this step, your apps can be deployed directly onto your device from Visual\
    \ Studio.\n\n![A978-1-4842-0719-2_1_Fig13_HTML.jpg](A978-1-4842-0719-2_1_Fig13_HTML.jpg)\n\
    \n**Figure 1-13.** Developer Mode setting on Windows Phone device\n\nIn Visual\
    \ Studio, select **Device** as your target, as shown in Figure [1-14](#A978-1-4842-0719-2_1_Chapter.html#Fig14).\n\
    \n![A978-1-4842-0719-2_1_Fig14_HTML.jpg](A978-1-4842-0719-2_1_Fig14_HTML.jpg)\n\
    \n**Figure 1-14.** Device target\n\nNext, press **F5** to run the app on your\
    \ device. The output should be similar to what you have seen in the emulator."
  raw: '### How It Works


    Let’s see how to create a new Universal Windows Platform app using Visual Studio
    2015.


    Open Visual Studio 2015 Community edition. Select File ➤ New Project. In the New
    Project dialog window, select Templates ➤ JavaScript ➤ Windows ➤ Universal from
    the Installed Templates section. Select Blank App (Universal Windows) from the
    available project templates (see Figure [1-4](#A978-1-4842-0719-2_1_Chapter.html#Fig4)).
    Provide a name and location for the app and click OK.


    ![A978-1-4842-0719-2_1_Fig4_HTML.jpg](A978-1-4842-0719-2_1_Fig4_HTML.jpg)


    Figure 1-4.


    New project template   Visual Studio will prepare the project. Figure [1-5](#A978-1-4842-0719-2_1_Chapter.html#Fig5)
    shows what the new solution looks like.


    ![A978-1-4842-0719-2_1_Fig5_HTML.jpg](A978-1-4842-0719-2_1_Fig5_HTML.jpg)


    Figure 1-5.


    Solution Explorer As part of the project template, you get `css`, `images`, `js`,
    and `WinJS` folders. You also have a pre-created `default.html` page to get started.


    *   The `css` folder is the place to keep your custom stylesheets (`.css` files).

    *   The `images` folder contains any images you would like to use in your app.

    *   `js` is the JavaScript folder where you keep your application-related js files.
    You see the pre-created `default.js` file with the following code inside it.


    `(function () {`         `"use strict";`         `var app = WinJS.Application;`
            `var activation = Windows.ApplicationModel.Activation;`         `app.onactivated
    = function (args) {`                 `if (args.detail.kind === activation.ActivationKind.launch)
    {`                     `if (args.detail.previousExecutionState !==`                 `activation.ApplicationExecutionState.terminated)
    {`                             `//App Initilization code`                         `}
    else {`                                 `//Restore app sessions state`                         `}`
                            `args.setPromise(WinJS.UI.processAll());`                 `}`
            `};`         `app.oncheckpoint = function (args) {`             `//save
    any app state here`         `};`         `app.start();` `})();`   The code creates
    a `WinJS.Application` object instance and starts the application.   Open default.html
    by double-clicking the file in Solution Explorer. Here is the default code you
    see in the file: `<!DOCTYPE html>` `<html>` `<head>`     `<meta charset="utf-8"
    />`     `<title>Ch1R3</title>`     `<link href="WinJS/css/ui-dark.css" rel="stylesheet"
    />`     `<script src="WinJS/js/basejs"></script>`     `<link href="/css/default.css"
    rel="stylesheet" />`     `<script src="/js/default.js"></script>` `</head>` `<body
    class=”win-type-body”>`     `<p>Content goes here</p>` `</body>` `</html>`   It’s
    pretty much empty with just one line of text that reads, “Content goes here.”
    Replace this text with “Hello World!” This will be our Hello World application
    with UWP ☺.   Press Ctrl+Shift+B on your keyboard or select Build ➤ Build solution.
    Visual Studio builds the project.


    ## 1.4 Running Universal Windows Platform Apps


    ### Problem


    You have created a new UWP app and you would like to run the app to see it in
    action. You want to know how to do this.


    ### Solution


    Visual Studio 2015 comes with a lot of options to run your UWP app:


    *   Run Application on Windows Phone 10 Emulators

    *   Run Application on Windows 10 Simulator

    *   Run Application on Local Machine

    *   Run Application on Device


    ### How It Works


    When you install Visual Studio 2015, it also installs Windows Phone 10 emulators
    and the Windows 10 simulator. These emulators and simulators mimic different devices
    and screen sizes in Windows Phone and Windows. Visual Studio 2015 allows you to
    select one of these options to deploy your app. You can also deploy the app on
    your machine right from Visual Studio and run the app as a local app. Let’s look
    at all of these options, one at a time.


    #### Run Application on Windows Phone 10 Emulator


    In Visual Studio, select one of the Windows 10 emulators available from the target
    combo box. Figure [1-6](#A978-1-4842-0719-2_1_Chapter.html#Fig6) shows the list
    of available emulators.


    ![A978-1-4842-0719-2_1_Fig6_HTML.jpg](A978-1-4842-0719-2_1_Fig6_HTML.jpg)


    Figure 1-6.


    Windows Phone 10 emulators target


    Press F5 to run the app on the selected Windows Phone 10 emulator. Figure [1-7](#A978-1-4842-0719-2_1_Chapter.html#Fig7)
    shows a screenshot on a 4-inch Windows Phone 10.


    ![A978-1-4842-0719-2_1_Fig7_HTML.jpg](A978-1-4842-0719-2_1_Fig7_HTML.jpg)


    Figure 1-7.


    UWP app on Windows Phone 10 emulator


    #### Run Application on Windows 10 Simulator


    In Visual Studio, select Simulator from the target combo box. This option allows
    you to deploy your app to a Windows 10 simulator (see Figure [1-8](#A978-1-4842-0719-2_1_Chapter.html#Fig8)).


    ![A978-1-4842-0719-2_1_Fig8_HTML.jpg](A978-1-4842-0719-2_1_Fig8_HTML.jpg)


    Figure 1-8.


    Windows 10 simulator target


    Press F5 to run the app on the Windows 10 simulator. Figure [1-9](#A978-1-4842-0719-2_1_Chapter.html#Fig9)
    is a screenshot of what the app looks like on a simulator.


    ![A978-1-4842-0719-2_1_Fig9_HTML.jpg](A978-1-4842-0719-2_1_Fig9_HTML.jpg)


    Figure 1-9.


    UWP app on Windows 10 simulator


    #### Run Application on Local Machine


    Typically, Windows 10 apps need to be downloaded from Windows Store and then installed
    on your machine. But this workflow is applicable only for end users, not developers.
    During app development, a developer can directly deploy and run their app on their
    development machine.


    Before running your app on your local machine, you need to enable what is known
    as Developer Mode on your machine.


    On your machine, go to Settings ➤ Update & security ➤ For developers, as shown
    in Figure [1-10](#A978-1-4842-0719-2_1_Chapter.html#Fig10).


    Select the Developer mode radio button.   In Visual Studio, select Local Machine
    from the target combo box, as shown in Figure [1-11](#A978-1-4842-0719-2_1_Chapter.html#Fig11).


    ![A978-1-4842-0719-2_1_Fig11_HTML.jpg](A978-1-4842-0719-2_1_Fig11_HTML.jpg)


    Figure 1-11.


    Local Machine target   Press F5 to run the app on your development machine. Figure
    [1-12](#A978-1-4842-0719-2_1_Chapter.html#Fig12) is a screenshot of the app running
    on a local machine.


    ![A978-1-4842-0719-2_1_Fig12_HTML.jpg](A978-1-4842-0719-2_1_Fig12_HTML.jpg)


    Figure 1-12.


    UWP app on local machine  


    ![A978-1-4842-0719-2_1_Fig10_HTML.jpg](A978-1-4842-0719-2_1_Fig10_HTML.jpg)


    Figure 1-10.


    Developer features settings


    #### Run Application on Device


    If you have a Windows 10 Mobile device, you can deploy and run your UWP app directly
    on it. But, before you can deploy the app directly from Visual Studio onto the
    device, you need to enable your phone to allow apps to be installed during development.
    This is also known as sideloading the apps. This mode is called as Developer Mode
    and it is a phone setting. On your Windows Phone 10 device, go to Settings ➤ Update
    & security ➤ For developers. Select Developer mode, as shown in Figure [1-13](#A978-1-4842-0719-2_1_Chapter.html#Fig13).
    After this step, your apps can be deployed directly onto your device from Visual
    Studio.


    ![A978-1-4842-0719-2_1_Fig13_HTML.jpg](A978-1-4842-0719-2_1_Fig13_HTML.jpg)


    Figure 1-13.


    Developer Mode setting on Windows Phone device


    In Visual Studio, select Device as your target, as shown in Figure [1-14](#A978-1-4842-0719-2_1_Chapter.html#Fig14).


    ![A978-1-4842-0719-2_1_Fig14_HTML.jpg](A978-1-4842-0719-2_1_Fig14_HTML.jpg)


    Figure 1-14.


    Device target


    Next, press F5 to run the app on your device. The output should be similar to
    what you have seen in the emulator.'
