  trans: "\n### 工作原理\n\n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板位于 Microsoft Visual\
    \ Studio 2015“新建项目”对话框的 `JavaScript ➤ Windows ➤ Universal` 节点下。这会在 Visual Studio\
    \ 解决方案中创建一个单项目，其中包含入门所需的文件。\n\n使用 Visual Studio 解决方案资源管理器打开项目中的 `default.html`\
    \ 文件，并在每个文件的 `body` 标签下添加以下代码：`<h1>显示地图</h1>` `<button id=\"btnDisplayRoute\"\
    >显示路线</button> <br />`\n\n打开项目中的 `default.js` (`/js/default.js`)，并将文件中的代码替换为以下内容：\n\
    \n```\n(function () {\n    \"use strict\";\n    var app = WinJS.Application;\n\
    \    var activation = Windows.ApplicationModel.Activation;\n    app.onactivated\
    \ = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                 done(function () {\n                     // 为按钮添加事件处理程序。\n \
    \                    document.querySelector(\"#btnDisplayRoute\").addEventListener(\"\
    click\",\n                         DisplayRoute);\n                 }));\n   \
    \     }\n    };\n    function DisplayRoute() {\n        var fromAddress = \"adr.HSR\
    \ Layout 5th sector, Bangalore\";\n        var toAddress = \"adr.Microsoft India,Signature\
    \ Building,Bangalore\";\n        var uri = \"bingmaps:?rtp=\" + fromAddress +\
    \ \"∼\"+ toAddress;\n        Windows.System.Launcher.launchUriAsync(new Windows.Foundation.Uri(uri));\n\
    \        //Windows.Services.Maps.MapManager.showDownloadedMapsUI()\n    }\n  \
    \  app.oncheckpoint = function (args) {\n    };\n    app.start();\n})();\n```\n\
    \n`bingmaps:` URI 方案可用于从 Windows 应用启动地图应用。`LaunchUriASync` 方法通常用于通过 URI 方案从 Windows\
    \ 应用启动另一个应用。在此例中，使用带有 `rtp` 参数的 `bingmaps:` URI 方案来启动内置地图，然后显示从指定地址到指定位置的驾驶路线。\n\
    \n> **注意**  \n> 使用 `LaunchUriAsync` 方法时，用户将被带到设备上的另一个应用；用户在使用地图应用后必须手动返回到你的应用。\n\
    \n开发者可以在 URI 中包含 `trfc=1` 参数来显示交通信息。\n\n```\n\"bingmaps:?rtp=adr.HSR Layout 5th\
    \ sector, Bangalore∼adr.Microsoft India,Signature Building,Bangalore&trfc=1\"\
    ;\n```\n\n在前面的 URI 方案中，`adr.` 定义了地址。`rtp` 使用两个途经点来查找路线。提供 `trfc` 参数也是为了显示交通信息。\n\
    \n![A978-1-4842-0719-2_12_Fig11_HTML.jpg](img/A978-1-4842-0719-2_12_Fig11_HTML.jpg)\n\
    \n**图 12-11.** Windows Mobile 中的导航路线\n\n生成项目并运行它。单击屏幕上的 `Display Route`（显示路线）按钮。如果你在\
    \ Windows Mobile 模拟器上运行 Windows 应用，你应该会看到内置地图上绘制了位置，如图 12-11 所示。\n\n如果 Windows\
    \ 应用在桌面系列上运行，则会使用“地图”应用来显示位置，如图 12-12 所示。\n\n![A978-1-4842-0719-2_12_Fig12_HTML.jpg](img/A978-1-4842-0719-2_12_Fig12_HTML.jpg)\n\
    \n**图 12-12.** Windows 应用中的导航路线\n\n> **注意**  \n> `bingmaps:` URI 方案是 Windows Phone\
    \ 8 中 `MapsDirectionsTask` 启动器的替代方案。\n\n## 12.7 Windows 应用商店应用中的必应地图控件\n\n###\
    \ 问题\n\n你希望在 Windows 应用中使用地图，而不是启动内置的地图应用。\n\n### 解决方案\n\n使用 Bing Maps AJAX Control\
    \ 7.0 为使用 WinJS 开发的通用 Windows 应用添加地图功能。\n\n### 工作原理\n\n必应地图是微软提供的一项在线地图服务，它允许用户使用微软的地图解决方案，并利用必应地图的各种功能。Bing\
    \ Maps AJAX Control 7.0 和 Bing Maps REST Services 为开发者提供了独特的机会，可以轻松地将位置和搜索功能集成到他们的移动和\
    \ Web 应用中。\n\n要使用 Bing Maps AJAX Control 7.0，请遵循以下步骤：\n\n1. 从 [`http://go.microsoft.com/fwlink/?LinkID=322092`](http://go.microsoft.com/fwlink/?LinkID=322092)\
    \ 下载并安装适用于 Windows 应用商店应用的必应地图 SDK（适用于 Windows 8.1，也适用于 Windows 10）。\n\n2. 获取必应地图密钥。转到\
    \ [`https://www.bingmapsportal.com`](https://www.bingmapsportal.com) 的必应地图帐户中心，并为该应用创建一个密钥。你必须在\
    \ Windows 应用商店应用中使用此密钥。\n\n3. 在 Microsoft Visual Studio 2013 中使用 Windows 应用商店应用模板创建一个新项目，这将创建一个\
    \ Windows 应用商店应用。\n\n4. 将适用于 JavaScript 的必应地图引用添加到项目中。在解决方案资源管理器中，右键单击项目引用，然后选择“添加引用”和“适用于\
    \ JavaScript 的必应地图”。单击“确定”，如图 12-13 所示。\n\n![A978-1-4842-0719-2_12_Fig13_HTML.jpg](img/A978-1-4842-0719-2_12_Fig13_HTML.jpg)\n\
    \n**图 12-13.**\n"
- fmt: "# Reference Manager in Visual Studio for Bing Maps\n\n打开项目中的`default.html`文件，并在文件的`body`标签中添加以下代码：`<div\
    \ id=\"myMap\"></div>`\n\n在`default.html`文件中，同时添加对Bing Maps JavaScript文件的引用：\n\
    \n```html\n<!-- Bing Maps references -->\n<script type=\"text/javascript\" src=\"\
    ms-appx:///Bing.Maps.JavaScript//js/veapicore.js\"></script>\n<script type=\"\
    text/javascript\" src=\"ms-appx:///Bing.Maps.JavaScript//js/veapimodules.js\"\
    ></script>\n```\n\n打开`default.js`（`/js/default.js`）并用以下代码替换文件中的内容：\n\n```javascript\n\
    (function () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var\
    \ activation = Windows.ApplicationModel.Activation;\n    app.onactivated = function\
    \ (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                done(function () {\n                    Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
    \ { callback: GetMap });\n                }));\n        }\n    };\n    var map;\n\
    \    function GetMap() {\n        //   Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
    \ { callback: GetMap });\n        var loc = new Microsoft.Maps.Location(13.0220,\
    \ 77.4908);\n        // Initialize the map\n        map = new Microsoft.Maps.Map(document.getElementById(\"\
    myMap\"), {\n            credentials: \"Bing Map Key\",\n            zoom: 10\n\
    \        });\n        var pin = new Microsoft.Maps.Pushpin(loc);\n        map.entities.push(pin);\n\
    \        // Center the map on the location\n        map.setView({ center: loc,\
    \ zoom: 10 });\n    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n\
    })();\n```\n\n首先需要调用`Microsoft.Maps`函数的`loadModule`来加载地图。`loadModule`有一个可选的`culture`参数，可用于指定本地化语言和区域。为`loadModule`指定了`GetMap`回调函数：`Microsoft.Maps.loadModule('Microsoft.Maps.Map',\
    \ { callback: GetMap });`\n\n通过指定容器`div`元素和Bing Map API密钥来创建`Microsoft.Maps.Map`的实例：\n\
    \n```javascript\n// Initialize the map\nmap = new Microsoft.Maps.Map(document.getElementById(\"\
    myMap\"), {\n    credentials: \"Bing Map API Key\",\n});\n```\n\n使用`map.entities.push`方法标识地图上要添加图钉的位置：\n\
    \n```javascript\nvar loc = new Microsoft.Maps.Location(13.0220, 77.4908);\nvar\
    \ pin = new Microsoft.Maps.Pushpin(loc);\nmap.entities.push(pin);\n```\n\n最后，通过将地图中心设置在指定位置并将缩放级别设置为10来显示地图。\n\
    \n构建应用程序并在Windows模拟器中运行它。您应该能够看到地图以及添加到地图上的图钉，如图[12-14](#A978-1-4842-0719-2_12_Chapter.html#Fig14)所示。\n\
    \n![A978-1-4842-0719-2_12_Fig14_HTML.jpg](A978-1-4842-0719-2_12_Fig14_HTML.jpg)\n\
    \n**Figure 12-14.** Bing Maps in Windows app\n\nBing Maps AJAX Control提供了额外的API，让开发者能够集成更多地图功能，例如显示交通信息、路线等。\n\
    \n目前，WinJS库在SDK中并未直接提供地图控件，因此Bing Maps AJAX Control是一个很好的替代解决方案。\n\n# Chapter\
    \ 13: Building Apps That Connect to the Cloud\n\nMicrosoft Azure Mobile Services为开发者提供了一种最简单的方式，将Windows应用中的数据存储到云中的SQL\
    \ Azure数据库。通过使用Microsoft Azure Mobile Services，开发者无需担心创建和托管自己的Web服务。大多数事情都由Microsoft\
    \ Azure Mobile Services处理。\n\n本章涵盖了一些关于在Universal Windows应用中设置和使用Microsoft Azure\
    \ Mobile Services进行数据存储和检索的食谱。\n\n## 13.1 Creating a New Mobile Service in Microsoft\
    \ Azure\n\n### Problem\n\n您需要在Microsoft Azure Mobile Services中创建一个新的移动服务，以便您的Universal\
    \ Windows应用可以使用它。\n\n### Solution\n\n登录到Microsoft Azure管理门户，使用移动服务部分创建一个新的移动服务。"
