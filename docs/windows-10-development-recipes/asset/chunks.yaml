    \ = groupedEmployees.groups.dataSource;\n            listView1.itemDataSource\
    \ = groupedEmployees.dataSource;\n            listView2.itemDataSource = groupedEmployees.groups.dataSource;\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", Initialize);\n\
