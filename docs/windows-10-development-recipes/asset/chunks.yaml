    `</head>`


    `<body class="win-type-body" style="background-color:white">`


        `<div>`


            `<p style="color:black">Enter Project Title:</p>`


            `<input class="text-box" id="txttitle" value="Project Title" size="40"
    />`


            `<p style="color:black">Enter Project Description:</p>`


            `<input class="text-box" id="txtdesc" value="Project Desc" size="40" />`


            `<p>Enter Project Site URL</p>`


            `<input class="text-box" id="txtURL" value="Enter Project Site URL" size="40"
    />`


            `<br />`


            `<br />`


        `</div>`


    `</body>`


    `</html>`


    Now, right-click the project’s `js` folder in Solution Explorer and select Add
    ➤ New JavaScript file. Provide the name for the file. In this example, let’s name
    the file DataSharingDemo. js.


    `(function () {`


        `"use strict";`


        `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


                `var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();`


                `dataTransferManager.addEventListener("datarequested", shareDataHandler);`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", GetControl);`


    `})();`


    Also add the following code to `default.html` to reference the `DataSharingDemo.js`
    file:


    `<script src="/js/DataSharingDemo.js"></script>`


    Add a new `shareDataHandler` function to `DataSharingDemo.js`. The complete `shareDataHandler`
    function will look as follows. The following uses the `request.data.setWebLink()`
    function to set the web links that are being shared.


    `function shareDataHandler(e) {`


        `var request = e.request;`


        `// The request.data.properties.title is mandate`


        `var ShareInfoTitle = document.getElementById("txttitle").value;`


        `if (ShareInfoTitle !== "") {`


            `var ShareInfoDesc = document.getElementById("txtdesc").value;`


            `if (ShareInfoDesc !== "") {`


                `request.data.properties.title = ShareInfoTitle;`


                `request.data.properties.description = ShareInfoDesc;`


                `var ShareURL = document.getElementById("txtURL").value;`


                `if (ShareURL !== "") {`


                    `request.data.setWebLink(new Windows.Foundation.Uri(ShareURL));`


                `}`


            `} else {`


                `request.failWithDisplayText("Please Enter the Project Details you
    would like to share.");`


            `}`


        `} else {`


            `request.failWithDisplayText("Error Occured!!");`


        `}`


    `}`


    The `request.data.setWebLink()` method accepts a parameter of type URI, which
    is why the conversion from a string to `Windows.Foundation.Uri` is necessary before
    passing it to the function.


    ## 10.4 Share an Image to Other Apps


    ### Problem


    You need to develop a feature that allows users to share an image with other Windows
    10 apps.


    ### Solution


    Use `request.data.setStorageItems` or `request.data.setBitmap` along with title
    and description fields. You can also use both for sharing an image, as you will
    not know which one is supported by the target app.'
  trans: "\n### 工作原理\n\n要共享网页链接，你需要使用 `request` 对象的 `request.data.setWebLink()` 方法。\n\
    \n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。\n\n首先，将以下代码添加到\
    \ `default.html`。你需要用以下代码替换 body 标签：\n\n```\n<!DOCTYPE html>\n<html>\n<head>\n\
    \    <meta charset=\"utf-8\" />\n    <title>_10.3</title>\n    <!-- WinJS 引用 -->\n\
    \    <link href=\"WinJS/css/ui-dark.css\" rel=\"stylesheet\" />\n    <script src=\"\
    WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"></script>\n \
    \   <!-- _10.3 引用 -->\n    <link href=\"/css/default.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"/js/default.js\"></script>\n    <script src=\"/js/DataSharingDemo.js\"\
    ></script>\n</head>\n<body class=\"win-type-body\" style=\"background-color:white\"\
    >\n    <div>\n        <p style=\"color:black\">输入项目标题：</p>\n        <input class=\"\
    text-box\" id=\"txttitle\" value=\"项目标题\" size=\"40\" />\n        <p style=\"\
    color:black\">输入项目描述：</p>\n        <input class=\"text-box\" id=\"txtdesc\" value=\"\
    项目描述\" size=\"40\" />\n        <p>输入项目站点 URL</p>\n        <input class=\"text-box\"\
    \ id=\"txtURL\" value=\"输入项目站点 URL\" size=\"40\" />\n        <br />\n        <br\
    \ />\n    </div>\n</body>\n</html>\n```\n\n现在，在解决方案资源管理器中右键单击项目的 `js` 文件夹，然后选择添加\
    \ ➤ 新建 JavaScript 文件。为文件命名。在此示例中，我们将文件命名为 `DataSharingDemo.js`。\n\n```\n(function\
    \ () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n```\n\n另外，将以下代码添加到 `default.html` 以引用 `DataSharingDemo.js` 文件：\n\n```\n\
    <script src=\"/js/DataSharingDemo.js\"></script>\n```\n\n向 `DataSharingDemo.js`\
    \ 添加一个新的 `shareDataHandler` 函数。完整的 `shareDataHandler` 函数如下所示。以下使用 `request.data.setWebLink()`\
    \ 函数来设置正在共享的网页链接。\n\n```\nfunction shareDataHandler(e) {\n    var request = e.request;\n\
    \    // request.data.properties.title 是必填项\n    var ShareInfoTitle = document.getElementById(\"\
    txttitle\").value;\n    if (ShareInfoTitle !== \"\") {\n        var ShareInfoDesc\
    \ = document.getElementById(\"txtdesc\").value;\n        if (ShareInfoDesc !==\
    \ \"\") {\n            request.data.properties.title = ShareInfoTitle;\n     \
    \       request.data.properties.description = ShareInfoDesc;\n            var\
    \ ShareURL = document.getElementById(\"txtURL\").value;\n            if (ShareURL\
    \ !== \"\") {\n                request.data.setWebLink(new Windows.Foundation.Uri(ShareURL));\n\
    \            }\n        } else {\n            request.failWithDisplayText(\"请输入您要共享的项目详情。\"\
    );\n        }\n    } else {\n        request.failWithDisplayText(\"发生错误！！\");\n\
    \    }\n}\n```\n\n`request.data.setWebLink()` 方法接受一个 URI 类型的参数，这就是为什么在将其传递给函数之前，需要将字符串转换为\
    \ `Windows.Foundation.Uri`。\n\n## 10.4 向其他应用共享图像\n\n### 问题\n\n你需要开发一项功能，允许用户与其他\
    \ Windows 10 应用共享图像。\n\n### 解决方案\n\n使用 `request.data.setStorageItems` 或 `request.data.setBitmap`，同时附带标题和描述字段。你也可以同时使用这两种方法来共享图像，因为你无法确定目标应用支持哪种方法。\n"
- fmt: "### How It Works\n\nUniversal Windows apps also allow you to share an image\
    \ with other apps. You can allow users to select an image from the local device\
    \ and then use the Share charm to share with other apps. Let’s see image sharing\
    \ in action.\n\nFirst, add the following code to `default.html`. You need to replace\
    \ the body tag with the following code:\n\n```\n<body class=\"win-type-body\"\
    \ style=\"background-color:white\">\n    <div>\n        <p style=\"color:black\"\
    >Enter Project Title:</p>\n        <input class=\"text-box\" id=\"txttitle\" value=\"\
    Project Title\" size=\"40\" />\n        <p style=\"color:black\">Enter Project\
    \ Description:</p>\n        <input class=\"text-box\" id=\"txtdesc\" value=\"\
    Project Desc\" size=\"40\" />\n        <p>Select the image to share</p>\n    \
    \    <button class=\"action\" id=\"selectImageButton\">Select image</button>\n\
    \        <br />\n        <br />\n    </div>\n<div class=\"imageDiv\">\n      \
    \  <img class=\"imageHolder\" id=\"imageHolder\" alt=\"image holder\" src=\"\"\
    \ />\n    </div>\n</body>\n```\n\nThe preceding code defines a user interface\
    \ for the sharing image with an image picker button.\n\nNow add the following\
    \ function in the `DataSharingDemo.js` file.\n\n```\n(function () {\n    \"use\
    \ strict\";\n    var objimgFile;\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var objimgFile = null;\n            var dataTransferManager\
    \ = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \            document.getElementById(\"selectImageButton\").addEventListener(\"\
    click\", selectImage, false);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\nThe preceding code adds a listener\
    \ to the `selectImageButton` control, as shown in the bolded lines.\n\nApart from\
    \ adding a listener, it also declares a variable called `objimgFile`, which holds\
    \ the image object that you will use in the following function.\n\nAdd a `selectImage`\
    \ function, which is the listener of the click event of the Select Image button.\
    \ This function uses the `FileOpenPicker` method, which allows users to select\
    \ an image from the device.\n\n```\nfunction selectImage() {\n    var picker =\
    \ new Windows.Storage.Pickers.FileOpenPicker();\n    picker.fileTypeFilter.replaceAll([\"\
    .jpg\", \".bmp\", \".gif\", \".png\"]);\n    picker.viewMode = Windows.Storage.Pickers.PickerViewMode.thumbnail;\n\
    \    picker.pickSingleFileAsync().done(function (file) {\n        if (file) {\n\
    // Display the image to the user\ndocument.getElementById(\"imageHolder\").src\
    \ = URL.createObjectURL(file, { oneTimeOnly: true });\n// The imageFile variable\
    \ will be set to shareValue when the user clicks Set\n         objimgFile = file;\n\
    \        }\n    });\n}\n```\n\nOnce the picker selects the single file successfully,\
    \ it calls the `async` method, which then sets the `src` property.\n\nNow, let’s\
    \ add the `shareDataHandler()` method to the `js` file as follows:\n\n```\nfunction\
    \ shareDataHandler(e) {\n    var request = e.request;\n    // The request.data.properties.title\
    \ is mandate\n    var ShareInfoTitle = document.getElementById(\"txttitle\").value;\n\
    \    if (ShareInfoTitle !== \"\") {\n        var ShareInfoDesc = document.getElementById(\"\
    txtdesc\").value;\n        if (ShareInfoDesc !== \"\") {\n            request.data.properties.title\
    \ = ShareInfoTitle;\n            request.data.properties.description = ShareInfoDesc;\n\
    \            if (objimgFile != null) {\n//Create a stream variable and using randomStreamReference.createFromFile\
    \ //function create the stream for the image file object \"objimgFile\"\n    \
    \            var imageStream = Windows.Storage.Streams.RandomAccessStreamReference.createFromFile(objimgFile);\n\
    \                request.data.setStorageItems([objimgFile]);\n               \
    \ // The setBitmap method requires a stream object\n                request.data.setBitmap(imageStream);\n\
    \            }\n        } else {\n            request.failWithDisplayText(\"Please\
    \ Enter the Project Details you would like to share.\");\n        }\n    } else\
    \ {\n        request.failWithDisplayText(\"Error Occured!!\");\n    }\n}\n```\n\
    \nThe `shareDataHandler` function first sets the title and description of the\
    \ `request.data` object. To set the image, it uses the stream object, as per the\
    \ following code:\n\n```\nvar imageStream = Windows.Storage.Streams.RandomAccessStreamReference.createFromFile(objimgFile);\n\
    ```\n\nThis line creates a stream variable, and using the `createFromFile` function,\
    \ it creates the stream for the image file `objimgFile` object.\n\nThe next line\
    \ calls the `setStorageItems` function of the `request.data` object by passing\
    \ the image object. The `objimgfile` object was set to a file in the `selectImage()`\
    \ folder.\n\n```\nrequest.data.setStorageItems([objimgFile]);\n```\n\nThe next\
    \ line in the preceding code is the `setBitMap` method of the `request.data` object,\
    \ which sets the image to the data object being shared:\n\n```\n// pass the stream\
    \ imageStream to the setBitMap method\nrequest.data.setBitmap(imageStream);\n\
    ```\n\nWhen you run the application on Windows 10 using the Share charm feature,\
    \ you see the Select Image button, as shown in Figure [10-5](#A978-1-4842-0719-2_10_Chapter.html#Fig5).\n\
    \n![A978-1-4842-0719-2_10_Fig5_HTML.jpg](A978-1-4842-0719-2_10_Fig5_HTML.jpg)\n\
    \nFigure 10-5.\n\nSharing image demo\n\nClick the Select Image button and select\
    \ an image from device camera folder or photo folder. Once you select the photo,\
    \ you see the image in your `default.html` file, as shown in Figure [10-6](#A978-1-4842-0719-2_10_Chapter.html#Fig6).\n\
    \n![A978-1-4842-0719-2_10_Fig6_HTML.jpg](A978-1-4842-0719-2_10_Fig6_HTML.jpg)\n\
    \nFigure 10-6.\n\nSharing Image demo\n\nNow click the Share charm or press the\
    \ Windows logo key ![A978-1-4842-0719-2_10_Figb_HTML.jpg](A978-1-4842-0719-2_10_Figb_HTML.jpg)\
    \ + H. When you select OneNote from the list, the app will share data with OneNote\
    \ and you will see a screen like the one shown in Figure [10-7](#A978-1-4842-0719-2_10_Chapter.html#Fig7).\n\
    \n![A978-1-4842-0719-2_10_Fig7_HTML.jpg](A978-1-4842-0719-2_10_Fig7_HTML.jpg)\n\
    \nFigure 10-7.\n\nImage shared along with project title\n\n## 10.5 Declare App\
    \ As a Share Target\n\n### Problem\n\nYou need to declare an app as a share target\
    \ in the list when the user uses the Share charm feature.\n\n### Solution\n\n\
    Configure the share target in the `package.appxmanifest` file, which enables the\
    \ share contract as a share target app."
