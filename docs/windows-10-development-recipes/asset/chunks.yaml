    \ World!”。这将是我们使用 UWP 的 Hello World 应用 ☺。\n\n按下键盘上的 **Ctrl+Shift+B** 或选择 **生成\
    \ ➤ 生成解决方案**。Visual Studio 将生成该项目。\n\n## 1.4 运行通用 Windows 平台应用\n\n### 问题\n\n你已创建了一个新的\
    \ UWP 应用，并且希望运行该应用以查看其实际效果。你想知道如何操作。\n\n### 解决方案\n\nVisual Studio 2015 提供了多种运行\
