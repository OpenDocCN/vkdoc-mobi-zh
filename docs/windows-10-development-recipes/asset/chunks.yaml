  trans: "\n### 工作原理\n\n使用通用 Windows 模板创建一个新的通用 Windows 项目，该模板可在 Microsoft Visual\
    \ Studio 2015 的“新建项目”对话框中的 `JavaScript` > `Windows` > `Universal` 节点下找到。这会在 Visual\
    \ Studio 解决方案中创建一个单一项目，其中包含入门所需的必要文件。\n\n在项目中的 `package.appxmanifest` 文件中启用 `Location`\
    \ 功能。\n\n从 Visual Studio 解决方案资源管理器中打开 `default.html` 文件，然后在每个文件的 `body` 标签下添加以下代码。\n\
    \n```html\n<div>\n    <button id=\"start\">开始追踪</button><br />\n    <br />\n \
    \   <button id=\"stop\">停止追踪</button><br />\n</div>\n<br />\n<div>\n    <table>\n\
    \        <tr>\n            <td>\n                纬度\n            </td>\n     \
    \       <td>\n                <div id=\"latitude\">\n                </div>\n\
    \            </td>\n        </tr>\n        <tr>\n            <td>\n          \
    \      经度\n            </td>\n            <td>\n                <div id=\"longitude\"\
    >\n                </div>\n            </td>\n        </tr>\n        <tr>\n  \
    \          <td>\n                精确度\n            </td>\n            <td>\n  \
    \              <div id=\"accuracy\">\n                </div>\n            </td>\n\
    \        </tr>\n        <tr>\n            <td>\n                <div id=\"Status\"\
    ></div>\n            </td>\n        </tr>\n    </table>\n</div>\n```\n\n上述 HTML\
    \ 代码与方案 12.1 中的代码类似，但增加了一个用于显示状态的 `div` 标签。\n\n从 Visual Studio 解决方案资源管理器中打开项目中的\
    \ `default.js` (`/js/default.js`) 文件，并将文件中的代码替换为以下内容：\n\n```javascript\n(function\
    \ () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var activation\
    \ = Windows.ApplicationModel.Activation;\n    app.onactivated = function (args)\
    \ {\n        if (args.detail.kind === activation.ActivationKind.launch) {\n  \
    \          if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                 done(function () {\n                     // 为按钮添加事件处理程序。\n \
    \                    document.querySelector(\"#start\").addEventListener(\"click\"\
    ,\n                         Starttracking);\n                     // 为按钮添加事件处理程序。\n\
    \                     document.querySelector(\"#stop\").addEventListener(\"click\"\
    ,\n                         Stoptracking);\n                 }));\n        }\n\
    \    };\n    var geolocation = null;\n    // 开始追踪\n    function Starttracking()\
    \ {\n        if (geolocation == null)\n        {\n            geolocation = new\
    \ Windows.Devices.Geolocation.Geolocator();\n            geolocation.reportInterval\
    \ = 100;\n        }\n        if (geolocation != null)\n        {\n           \
    \ geolocation.addEventListener(\"positionchanged\", onPositionChanged);\n    \
    \        geolocation.addEventListener(\"statuschanged\", onStatusChanged);\n \
    \       }\n    }\n    // 当地理位置改变时，更新用户界面\n    function onPositionChanged(args)\
    \ {\n        document.getElementById('latitude').innerHTML = args.position.coordinate.point.position.latitude;\n\
    \        document.getElementById('longitude').innerHTML = args.position.coordinate.point.position.longitude;\n\
    \        document.getElementById('accuracy').innerHTML = args.position.coordinate.accuracy;\n\
    \    }\n    // 停止追踪\n    function Stoptracking()\n    {\n        if (geolocation\
    \ != null) {\n            geolocation.removeEventListener(\"positionchanged\"\
    , onPositionChanged);\n        }\n    }\n    // 状态改变方法的事件处理程序。\n    function onStatusChanged(args)\
    \ {\n        var Status = args.status;\n        document.getElementById('Status').innerHTML\
    \ =\n            getStatus(Status);\n    }\n    // 获取状态\n    function getStatus(Status)\
    \ {\n        switch (Status) {\n            case Windows.Devices.Geolocation.PositionStatus.ready:\n\
    \                return \"就绪\";\n                break;\n            case Windows.Devices.Geolocation.PositionStatus.initializing:\n\
    \                return \"正在初始化\";\n                break;\n            case Windows.Devices.Geolocation.PositionStatus.disabled:\n\
    \                return \"位置功能已禁用。请检查您的设备或 Appxmanifest 文件中的位置设置\";\n        \
    \        break;\n            case Windows.Devices.Geolocation.PositionStatus.notInitialized:\n\
    \                return \"未初始化\";\n            default:\n                return\
    \ \"状态未知\";\n        }\n    }\n    app.oncheckpoint = function (args) {\n    };\n\
    \    app.start();\n})();\n```\n\n第一步是添加“开始追踪”和“停止追踪”按钮的点击事件处理程序。使用 `document.querySelector`\
    \ 来添加事件监听器。\n\n```javascript\ndocument.querySelector(\"#start\").addEventListener(\"\
    click\",Starttracking);\ndocument.querySelector(\"#stop\").addEventListener(\"\
    click\",Stoptracking);\n```\n\n在 `Starttracking` 方法中创建了一个新的 `Geolocator` 类实例，并设置了\
    \ `reportInterval`。`reportInterval` 定义了位置更新之间的最小时间间隔，单位为毫秒。\n\n```javascript\n\
    geolocation = new Windows.Devices.Geolocation.Geolocator();\ngeolocation.reportInterval\
    \ = 100;\n```\n\n将 `positionchanged` 和 `statuschanged` 事件监听器添加到 `geolocation`\
    \ 实例：\n\n```javascript\ngeolocation.addEventListener(\"positionchanged\", onPositionChanged);\n\
    geolocation.addEventListener(\"statuschanged\", onStatusChanged);\n```\n\n当位置发生变化时，会引发\
    \ `positionchanged` 事件。当 `Geolocator` 提供更新位置的能力发生变化时，会引发 `statuschanged` 事件；例如，如果位置被禁用或初始化等。`getStatus`\
    \ 方法根据 `Windows.Devices.Geolocation.PositionStatus` 返回相应的消息。\n\n当您不再需要追踪位置时，只需移除\
    \ `positionchanged` 事件监听器，如下所示：\n\n```javascript\ngeolocation.removeEventListener(\"\
    positionchanged\", onPositionChanged);\n```\n\n现在，生成并在模拟器中运行该项目。\n\n在应用中，单击“开始追踪”按钮。应用通过\
    \ `Geolocator` 的 `Onpositionchanged` 事件订阅位置更新，并显示位置信息（见图 12-5）。\n\n![A978-1-4842-0719-2_12_Fig5_HTML.jpg](img/A978-1-4842-0719-2_12_Fig5_HTML.jpg)\n\
    \n**图 12-5.** 使用 Windows Mobile 模拟器的附加工具进行位置更新\n\n当使用“本地计算机”选项在 Windows 桌面上运行该应用时，您将看到如图\
    \ 12-6 所示的屏幕。\n\n![A978-1-4842-0719-2_12_Fig6_HTML.jpg](img/A978-1-4842-0719-2_12_Fig6_HTML.jpg)\n\
    \n**图 12-6.** 使用“本地计算机”选项在 Windows 桌面进行位置更新\n\n> **注意**  \n> 如图 12-5 所示，Windows\
    \ Mobile 模拟器提供了附加工具，让开发者在开发期间测试基于位置的应用。\n\n## 12.3 使用 HTML5 检测用户位置\n\n### 问题\n\
    \n您不知道自己身在何处。Windows 应用需要确定并显示您当前的位置。\n\n### 解决方案\n\n除了 Windows 运行时 API 之外，WinJS\
    \ 应用还可以利用 W3C Geolocation API，通过 HTML5 从 Windows 应用中检测用户的当前位置。\n"
- fmt: "### How It Works\n\n创建一个新的通用 Windows 项目，使用可以在 Microsoft Visual Studio 2015\
    \ 的新建项目对话框中的 JavaScript ➤ Windows ➤ Universal 节点下找到的通用 Windows 模板。这会在 Visual Studio\
    \ 解决方案中创建一个单一项目，其中包含开始所需的必要文件。在应用中集成位置功能的第一步是在 Windows 应用的`package.appxmanifest`文件中声明位置功能。在\
    \ Visual Studio 解决方案资源管理器中，双击`package.appxmanifest`文件。在 GUI 设计器中，点击“功能”选项卡并选择“位置”。\n\
    \n打开 Windows 应用的`default.html`文件，并在文件的`body`标签下添加以下代码。\n\n```\n<h1>Current Location\
    \ using HTML5</h1>\n<button id=\"btnLocation\">Get Location</button> <br />\n\
    <label>Latitude</label> <div id=\"latitude\"></div><br />\n<label>Longitude</label>\
    \ <div id=\"longitude\"> </div><br />\n<div id=\"status\"> </div><br />\n```\n\
    \n打开项目中的`default.js`（`/js/default.js`）。将文件中的代码替换为以下内容：\n\n```\n(function () {\n\
    \    \"use strict\";\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll().\n\
    \                done(function () {\n                    // Add an event handler\
    \ to the button.\n                    document.querySelector(\"#btnLocation\"\
    ).addEventListener(\"click\",\n                        GetLocation);\n       \
    \         }));\n        }\n    };\n    var nav = null;\n    function GetLocation()\
    \ {\n        if (nav == null) {\n            nav = window.navigator;\n       \
    \ }\n        var geoloc = nav.geolocation;\n        if (geoloc != null) {\n  \
    \          geoloc.getCurrentPosition(Onsuccess, Onerror);\n        }\n    }\n\
    \    // after getting the location information\n    function Onsuccess(position)\
    \ {\n        document.getElementById(\"latitude\").innerHTML =\n            position.coords.latitude;\n\
    \        document.getElementById(\"longitude\").innerHTML =\n            position.coords.longitude;\n\
    \    }\n    // On error when trying to get the location\n    function Onerror(error)\
    \ {\n        var errorMessage = \"\";\n        switch (error.code) {\n       \
    \     case error.PERMISSION_DENIED:\n                errorMessage = \"Location\
    \ is disabled\";\n                break;\n            case error.POSITION_UNAVAILABLE:\n\
    \                errorMessage = \"Data unavailable\";\n                break;\n\
    \            case error.TIMEOUT:\n                errorMessage = \"Timeout error\"\
    ;\n                break;\n            default:\n                break;\n    \
    \    }\n        document.getElementById(\"status\").innerHTML = errorMessage;\n\
    \    }\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n})();\n\
    ```\n\n为“获取位置”按钮添加点击事件处理器。使用`document.querySelector`获取按钮控件，并使用`addEventListener`方法添加点击事件并将其映射到`GetLocation`方法。\n\
    \n```\ndocument.querySelector(\"#btnLocation\").addEventListener(\"click\",\n\
    \                         GetLocation);\n```\n\n使用`window.navigator.geolocation`类的`getCurrentPosition`方法获取用户当前的位置。\n\
    \n```\nif (nav == null) {\n            nav = window.navigator;\n        }\n  \
    \      var geoloc = nav.geolocation;\n        if (geoloc != null) {\n        \
    \    geoloc.getCurrentPosition(Onsuccess, Onerror);\n        }\n```\n\n成功获取当前位置后，控制权移交给`Onsuccess`方法来处理坐标并显示它。如果发生错误，则调用`Onerror`方法，该方法在获取位置信息出现问题时显示错误消息。\n\
    \n在本地计算机上生成并运行项目。\n\n点击应用中的“获取位置”按钮，如图 [12-7](#A978-1-4842-0719-2_12_Chapter.html#Fig7)\
    \ 所示。应用会立即提示用户允许应用使用位置 API。点击“允许”后，您应该会立即看到当前位置的纬度和经度。\n\n![A978-1-4842-0719-2_12_Fig7_HTML.jpg](A978-1-4842-0719-2_12_Fig7_HTML.jpg)\n\
    \n图 12-7. 使用 HTML5 获取 Windows 应用商店应用中的当前位置\n\n注意\n\nW3C 地理定位 API 目前仅适用于 Windows\
    \ 桌面设备系列应用。当您在 Windows Mobile 模拟器上运行时，状态将显示为“已禁用”。\n\n## 12.4 使用 HTML5 检测位置更新\n\
    \n### 问题\n\n您希望频繁检查应用中的位置是否有任何变化。\n\n### 解决方案\n\n您可以在 HTML5 中使用 W3C 地理定位 API 来检测\
    \ Windows 应用中的位置变化。"
