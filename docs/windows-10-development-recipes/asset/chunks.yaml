    ## 5.8 SplitView Navigation in UWP Apps


    ### Problem


    In your app, you have identified that the navigational structure for navigation
    is peer-based. You want to provide a menu with links to the top-level page. You
    want to implement the navigation using the SplitView control.


    ### Solution


    The SplitView control contains one pane and a content area. The pane can expand
    or collapse, whereas the content area is always visible. The pane can also remain
    in an open state and has the flexibility to present itself from either the left
    side or the right side of the app. Usually, navigation links are placed in this
    pane.


