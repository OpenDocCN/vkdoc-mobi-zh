    . You can get a free trial account if you want to try Microsoft Azure.


    ## 13.2 Creating a Database Table in Mobile Services


    ### Problem


    You need to create a table to store the todo items in Microsoft Azure that will
    be used by your Universal Windows app.


    ### Solution


    You can use the Microsoft Azure Management portal or Visual Studio 2015 to create
    a database table in Microsoft Azure Mobile Services.


    ### How It Works


    ![A978-1-4842-0719-2_13_Fig7_HTML.jpg](A978-1-4842-0719-2_13_Fig7_HTML.jpg)


    Figure 13-7.


    Azure Mobile Service dashboard To create a table from Microsoft Azure Mobile Services,
    log in to the Azure Management portal with your login credentials. In the Mobile
    Services overview screen, select the mobile service in which you would like to
    create a new table.   In the selected mobile service (see Figure [13-7](#A978-1-4842-0719-2_13_Chapter.html#Fig7)),
    select the DATA tab and click ADD A TABLE to start creating a new table.  


    In the Create New Table dialog, enter the table name (call it todo), and keep
    the Anybody with the Application Key default permission for the insert, update,
    delete, and read operations, as shown in Figure [13-8](#A978-1-4842-0719-2_13_Chapter.html#Fig8).
    Click the Submit button.


    ![A978-1-4842-0719-2_13_Fig8_HTML.jpg](A978-1-4842-0719-2_13_Fig8_HTML.jpg)


    Figure 13-8.


    Table creation within the Mobile Services in Microsoft Azure


    Note that you did not specify the columns for the todo table. One option is to
    go ahead and add the columns to the table from the dashboard, which is a preferred
    option. The other option is to use the Dynamic schema, where the columns are created
    dynamically based on the data that you insert (which makes it easier to develop
    a new mobile service). Use the second option in this recipe. Developers can disable
    the Dynamic schema from the dashboard.


    ## 13.3 Installing Mobile Services for the WinJS Client Library


    ### Problem


    You need to install the mobile services for the WinJS client library for your
    Windows app to interact with Microsoft Azure Mobile Services.


    ### Solution


    Use the NuGet Package Manager Console to execute the following command in the
    Universal Windows projects to add mobile services to the WinJS client library:


    `Install-Package WindowsAzure.MobileServices.Winjs`


    ### How It Works


    The NuGet Package Manager Console lets developers quickly install the library.
    To add the mobile services for the WinJS client library, follow these steps.


    Launch Visual Studio 2015 and create a new Universal Windows app using the JavaScript
    template.   In Visual Studio, select Tools ➤ Library package manager ➤ Package
    Manager Console, and then enter the following command: `install-package WindowsAzure.MobileServices.WinJS`
      Before running this command, ensure that the correct project is selected as
    Default project in the Package Manager Console (see Figure [13-9](#A978-1-4842-0719-2_13_Chapter.html#Fig9)).


    ![A978-1-4842-0719-2_13_Fig9_HTML.jpg](A978-1-4842-0719-2_13_Fig9_HTML.jpg)


    Figure 13-9.


    Project selection in the Package Manager Console Once the installation is successful,
    you will see the new JavaScript files in the JS folder of the project in the Solution
    Explorer, as shown in Figure [13-10](#A978-1-4842-0719-2_13_Chapter.html#Fig10).


    ![A978-1-4842-0719-2_13_Fig10_HTML.jpg](A978-1-4842-0719-2_13_Fig10_HTML.jpg)


    Figure 13-10.


    Universal project in Solution Explorer after installation of library   To use
    the WinJS library for mobile services, you must add a reference to the `MobileServices.min.js`
    script in the HTML page. `<script src="js/MobileServices.min.js"></script>`  


    You can now access the Mobile Services client library from your Windows Store
    project.


    ## 13.4 Performing the CRUD Operation


    ### Problem


    You need to create, read, update, and delete (CRUD) records in the todo table
    from the Windows app. (The creation of the todo table was demonstrated in the
    previous recipe.)


    ### Solution


    You can perform the basic CRUD operations for tables created in the mobile service
    by using the methods exposed via the mobile service library.'
  trans: "\n### 工作原理\n\nMicrosoft Azure 移动管理门户为开发者提供了必要的选项来管理虚拟机、移动服务、云服务等各种资源。\n\n\
    请按照以下步骤在 Microsoft Azure 中创建新的移动服务：\n\n登录 Microsoft Azure 管理门户，访问 [`http://manage.windowsazure.com`](http://manage.windowsazure.com/)\
    \ 并提供你的登录凭据。你可以通过单击底部栏中的 `+New` 按钮，然后依次选择 `Compute` ➤ `Mobile Service` ➤ `Create`\
    \ 来创建新的移动服务，如图 13-1 所示。\n\n![A978-1-4842-0719-2_13_Fig1_HTML.jpg](img/A978-1-4842-0719-2_13_Fig1_HTML.jpg)\n\
    \n图 13-1.\n\n用于创建新移动服务的 Microsoft Azure 仪表板\n\n提供移动服务的详细信息。这包括用于访问移动服务的 URL、订阅、区域、后端等。你可以将移动服务名称设置为\
    \ `winjsrecipes`。目前，Microsoft Azure 支持 JavaScript 和 .NET 后端。在此方案中选择 `JavaScript`，然后单击\
    \ `Next` 按钮，如图 13-2 所示。\n\n![A978-1-4842-0719-2_13_Fig2_HTML.jpg](img/A978-1-4842-0719-2_13_Fig2_HTML.jpg)\n\
    \n图 13-2.\n\n新移动服务对话框\n\n如果你选择了 `Create a new SQL database instance`，则必须提供现有的数据库设置信息，如图\
    \ 13-3 所示。完成移动服务的创建。\n\n![A978-1-4842-0719-2_13_Fig3_HTML.jpg](img/A978-1-4842-0719-2_13_Fig3_HTML.jpg)\n\
    \n图 13-3.\n\n新移动服务数据库设置对话框\n\n几分钟后，移动服务即可就绪，并显示在移动服务概览屏幕中。\n\n你也可以使用 Visual Studio\
    \ 2015 在 Microsoft Azure 中创建移动服务。要从 Visual Studio 2015 创建移动服务，请按照以下步骤操作：\n\n启动\
    \ Visual Studio 2015，打开 `Server Explorer` 窗口。在 `Server Explorer` 窗口中，右键单击 `Azure`，然后在上下文菜单中选择\
    \ `Connect to Microsoft Azure…`，如图 13-4 所示。提供你的 Microsoft Azure 登录凭据。这会将 Azure\
    \ 订阅导入到 Visual Studio。\n\n![A978-1-4842-0719-2_13_Fig4_HTML.jpg](img/A978-1-4842-0719-2_13_Fig4_HTML.jpg)\n\
    \n图 13-4.\n\n从 Visual Studio 服务器资源管理器窗口连接到 Azure\n\n下一步是从 `Server Explorer` 创建移动服务。右键单击\
    \ `Mobile Services`，然后选择 `Create Service`，如图 13-5 所示。\n\n![A978-1-4842-0719-2_13_Fig5_HTML.jpg](img/A978-1-4842-0719-2_13_Fig5_HTML.jpg)\n\
    \n图 13-5.\n\n从 Visual Studio 2015 创建服务\n\n在 `Create Mobile Service` 对话框中，提供要创建的移动服务的必要信息，包括\
    \ URL、区域、数据库信息等。将方案命名为 `winjs`，如图 13-6 所示。\n\n![A978-1-4842-0719-2_13_Fig6_HTML.jpg](img/A978-1-4842-0719-2_13_Fig6_HTML.jpg)\n\
    \n图 13-6.\n\nVisual Studio 2015 中的新移动服务对话框\n\n> **注意**  \n> 你需要拥有一个 Microsoft\
    \ Azure 订阅。如果你尚未订阅，则需要访问 [`http://azure.microsoft.com/en-us/`](http://azure.microsoft.com/en-us/)。如果你想试用\
    \ Microsoft Azure，可以获得一个免费试用帐户。\n\n## 13.2 在移动服务中创建数据库表\n\n### 问题\n\n你需要创建一个表来存储\
    \ Microsoft Azure 中的待办事项，这些事项将由你的通用 Windows 应用使用。\n\n### 解决方案\n\n你可以使用 Microsoft\
    \ Azure 管理门户或 Visual Studio 2015 在 Microsoft Azure 移动服务中创建数据库表。\n\n### 工作原理\n\n\
    ![A978-1-4842-0719-2_13_Fig7_HTML.jpg](img/A978-1-4842-0719-2_13_Fig7_HTML.jpg)\n\
    \n图 13-7.\n\nAzure 移动服务仪表板\n\n要从 Microsoft Azure 移动服务创建表，请使用你的登录凭据登录 Azure 管理门户。在移动服务概览屏幕中，选择你想要在其中创建新表的移动服务。在选定的移动服务中（见图\
    \ 13-7），选择 `DATA` 选项卡，然后单击 `ADD A TABLE` 开始创建新表。\n\n在 `Create New Table` 对话框中，输入表名（将其命名为\
    \ `todo`），并为插入、更新、删除和读取操作保留默认权限 `Anybody with the Application Key`，如图 13-8 所示。单击\
    \ `Submit` 按钮。\n\n![A978-1-4842-0719-2_13_Fig8_HTML.jpg](img/A978-1-4842-0719-2_13_Fig8_HTML.jpg)\n\
    \n图 13-8.\n\n在 Microsoft Azure 的移动服务中创建表\n\n请注意，你并未为 `todo` 表指定列。一种选择是直接从仪表板向表中添加列，这是推荐的做法。另一种选择是使用\
    \ `Dynamic` 架构，该架构会根据你插入的数据动态创建列（这使得开发新的移动服务更加容易）。本方案采用第二种做法。开发者可以随时在仪表板中禁用 `Dynamic`\
    \ 架构。\n\n## 13.3 为 WinJS 客户端库安装移动服务\n\n### 问题\n\n你需要为 WinJS 客户端库安装移动服务，以使你的 Windows\
    \ 应用能够与 Microsoft Azure 移动服务交互。\n\n### 解决方案\n\n使用 NuGet 包管理器控制台，在通用 Windows 项目中执行以下命令，以将移动服务添加到\
    \ WinJS 客户端库：\n\n```\nInstall-Package WindowsAzure.MobileServices.Winjs\n```\n\
    \n### 工作原理\n\nNuGet 包管理器控制台让开发者能够快速安装库。要添加适用于 WinJS 客户端库的移动服务，请按照以下步骤操作。\n\n启动\
    \ Visual Studio 2015，并使用 JavaScript 模板创建一个新的通用 Windows 应用。在 Visual Studio 中，依次选择\
    \ `Tools` ➤ `Library package manager` ➤ `Package Manager Console`，然后输入以下命令：\n\n\
    ```\ninstall-package WindowsAzure.MobileServices.WinJS\n```\n\n在运行此命令之前，请确保在包管理器控制台中已将正确的项目选为\
    \ `Default project`（见图 13-9）。\n\n![A978-1-4842-0719-2_13_Fig9_HTML.jpg](img/A978-1-4842-0719-2_13_Fig9_HTML.jpg)\n\
    \n图 13-9.\n\n包管理器控制台中的项目选择\n\n安装成功后，你将在解决方案资源管理器中的项目 `JS` 文件夹下看到新的 JavaScript\
    \ 文件，如图 13-10 所示。\n\n![A978-1-4842-0719-2_13_Fig10_HTML.jpg](img/A978-1-4842-0719-2_13_Fig10_HTML.jpg)\n\
    \n图 13-10.\n\n安装库后解决方案资源管理器中的通用项目\n\n要使用移动服务的 WinJS 库，你必须在 HTML 页面中添加对 `MobileServices.min.js`\
    \ 脚本的引用。\n\n```html\n<script src=\"js/MobileServices.min.js\"></script>\n```\n\
    \n现在，你可以从你的 Windows 应用商店项目访问移动服务客户端库。\n\n## 13.4 执行 CRUD 操作\n\n### 问题\n\n你需要从\
    \ Windows 应用对 `todo` 表执行创建、读取、更新和删除（CRUD）操作。（`todo` 表的创建已在上一方案中演示过。）\n\n### 解决方案\n\
    \n你可以使用移动服务库公开的方法，对在移动服务中创建的表执行基本的 CRUD 操作。\n"
- fmt: "### How It Works\n\nIn the previous recipe, you created a mobile service with\
    \ the name `winjsrecipes` and a table called `todo`. In this recipe, you will\
    \ explore how to interact with the `todo` database table from the Windows apps.\
    \  \n**Microsoft Azure Mobile Services: CRUD operations:**\n\nOpen the `default.html`\
    \ page in the Windows app and add the following reference to the mobile service\
    \ library head section:\n\n```\n<script src=\"js/MobileServices.min.js\"></script>\n\
    ```\n\nIn the same file, add the following code to the `body` tag:\n\n```\n<div\
    \ style=\"margin:38px 18px 18px 18px\">\n    <h4 style=\"margin-bottom:18px\"\
    >winjsrecipes</h4>\n    <div>Enter some text below and click Save to insert a\
    \ new TodoItem item into your database</div>\n    <input type=\"text\" id=\"textInput\"\
    \ style=\"width:240px;vertical-align:middle;margin-right:10px;\" />\n    <button\
    \ id=\"buttonSave\" style=\"vertical-align:middle\">Save</button>\n    <div>Click\
    \ refresh below to load the unfinished TodoItems from your database. Use the checkbox\
    \ to complete and update your TodoItems</div>\n    <button id=\"buttonRefresh\"\
    \ style=\"width:100%\">Refresh</button>\n    <div id=\"TemplateItem\" data-win-control=\"\
    WinJS.Binding.Template\">\n        <input type=\"checkbox\" style=\"margin-right:5px\"\
    \ data-win-bind=\"checked: complete; dataContext: this; innerText: text\" />\n\
    \    </div>\n    <div id=\"listItems\"\n         data-win-control=\"WinJS.UI.ListView\"\
    \n         data-win-options=\"{ itemTemplate: TemplateItem, layout: {type: WinJS.UI.ListLayout}\
    \ }\">\n    </div>\n</div>\n```\n\nOpen the `default.js` file from the `JS` folder\
    \ and replace it with the following code:\n\n```\n// For an introduction to the\
    \ Blank template, see the following documentation:\n// http://go.microsoft.com/fwlink/?LinkID=392286\n\
    (function () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var\
    \ activation = Windows.ApplicationModel.Activation;\n    app.onactivated = function\
    \ (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll());\n\
    \            var client = new WindowsAzure.MobileServiceClient(\n            \
    \                    \"https://winjsrecipes.azure-mobile.net/\",\n           \
    \                     \"<Application Key2>\"\n                        );\n   \
    \         var todoTable = client.getTable('todo');\n            var todoItems\
    \ = new WinJS.Binding.List();\n            var insertTodoItem = function (todoItem)\
    \ {\n                todoTable.insert(todoItem).done(function (item) {\n     \
    \               todoItems.push(item);\n                });\n            };\n \
    \           var refreshTodoItems = function () {\n                todoTable.where({\
    \ complete: false })\n                    .read()\n                    .done(function\
    \ (results) {\n                        todoItems = new WinJS.Binding.List(results);\n\
    \                        listItems.winControl.itemDataSource = todoItems.dataSource;\n\
    \                    });\n            };\n            var updateCheckedTodoItem\
    \ = function (todoItem) {\n                todoTable.update(todoItem).done(function\
    \ (item) {\n                    todoItems.splice(todoItems.indexOf(item), 1);\n\
    \                });\n            };\n            buttonSave.addEventListener(\"\
    click\", function () {\n                insertTodoItem({\n                   \
    \ text: textInput.value,\n                    complete: false\n              \
    \  });\n            });\n            buttonRefresh.addEventListener(\"click\"\
    , function () {\n                refreshTodoItems();\n            });\n      \
    \      listItems.addEventListener(\"change\", function (eventArgs) {\n       \
    \         var todoItem = eventArgs.target.dataContext.backingData;\n         \
    \       todoItem.complete = eventArgs.target.checked;\n                updateCheckedTodoItem(todoItem);\n\
    \            });\n            refreshTodoItems();\n        }\n    };\n    app.oncheckpoint\
    \ = function (args) {\n    };\n    app.start();\n})();\n```\n\nRun the application\
    \ on the Windows desktop using the **Local Machine** option. You should see screens\
    \ like the ones shown in Figure 13-11. You should be able to add, delete, or update\
    \ the data from your app to the mobile service.\n\n![A978-1-4842-0719-2_13_Fig11_HTML.jpg](A978-1-4842-0719-2_13_Fig11_HTML.jpg)\n\
    \n**Figure 13-11.** Windows app with insert and refresh options\n\nBefore performing\
    \ any operation on the Microsoft Azure Mobile Services from a Windows app, you\
    \ must first connect to the service and get the access to the remote service.\
    \ Access to the remote service client is available by using the `MobileServiceClient`\
    \ object. Similarly, access to the remote table is available by using the `MobileServiceTable`\
    \ object.\n\nHere’s how to get the `MobileServiceClient` and the table reference:\n\
    \n```\nvar client = new WindowsAzure.MobileServiceClient(\n                \"\
    https://winjsrecipes.azure-mobile.net/\",\n                \"<Enter the Application\
    \ Key>\"\n            );\nvar todoTable = client.getTable('todo');\n```\n\nThe\
    \ `MobileServiceClient` constructor accepts two parameters. The first parameter\
    \ is the URL of your mobile service and the second parameter is the application\
    \ key.\n\n**Note:**  \nTo get the application key of your mobile service, you\
    \ need to log in to the Microsoft Azure Management portal, navigate to the dashboard\
    \ of your mobile service, and use the **Manage Keys** option to get the application\
    \ key. You will need to use this key as the second parameter for the mobile service\
    \ client.\n\nThe insert operation can be performed by invoking the `insert` method\
    \ of the `MobileServiceTable` object. The following code inserts new text into\
    \ the `todo` table:\n\n```\ninsertTodoItem({\n    text: textInput.value,\n   \
    \ complete: false\n});\n\nvar insertTodoItem = function (todoItem) {\n    // This\
    \ code inserts a new TodoItem into the database. When the operation completes\n\
    \    todoTable.insert(todoItem).done(function (item) {\n        todoItems.push(item);\n\
    \    });\n};\n```\n\nThe return type of the `insert` method is the promise. You\
    \ can include success and error functions to handle the operation results of the\
    \ `insert` method. In the preceding example, once the insertion is successful,\
    \ the `todoItems` list is updated in the UI.\n\nThe update of an existing record\
    \ in the mobile service can be performed by using the `update` method defined\
    \ in the `MobileServiceTable` class. For example, the following demonstrates how\
    \ to update a record in the `todo` table:\n\n```\nvar todoItem = { id:1 };\ntodoItem.complete\
    \ = true;\nupdateCheckedTodoItem(todoItem);\n\nvar updateCheckedTodoItem = function\
    \ (todoItem) {\n    // This code takes a freshly completed TodoItem and updates\
    \ the database. When the MobileService\n    // responds, the item is removed from\
    \ the list\n    todoTable.update(todoItem).done(function (item) {\n        todoItems.splice(todoItems.indexOf(item),\
    \ 1);\n    });\n};\n```\n\nWhen updating the record, it is necessary to include\
    \ the primary key in the record to be updated. In this example, the `id` field\
    \ is the primary key. The `id` column is automatically created and made the primary\
    \ key when a new Azure Mobile Services is created. This field is an autoincrement\
    \ column.\n\nThe deletion of a record can be performed by calling the `del()`\
    \ method of the `MobileServiceTable` class. For example, the following example\
    \ demonstrates how to delete a record from the `todo` table:\n\n```\nvar deleteItem\
    \ = { id:1 };\ntodoTable.del(deleteItem);\n```\n\nSimilar to the `update` method,\
    \ the `del` method also requires the primary key of the object to be passed."
