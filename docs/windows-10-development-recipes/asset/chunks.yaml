- fmt: "### How It Works\n\nWhen generating the package file from Visual Studio, you\
    \ also have the option of validating it on a remote machine.\n\nTo validate the\
    \ package on a remote machine, follow these steps:\n\n1.  Enable your Windows\
    \ 10 remote device for development by enabling Developer mode in the Use developer\
    \ features in the Settings app, as shown in Figure 17-17. Note that the validation\
    \ on the remote ARM device for Windows 10 is currently not supported.\n\n    ![A978-1-4842-0719-2_17_Fig17_HTML.jpg](A978-1-4842-0719-2_17_Fig17_HTML.jpg)\
    \  \n    *Figure 17-17. Enabling Developer mode in the Settings app*\n\n2.  Download\
    \ and install the remote tools for Visual Studio on the remote machine. Go to\
    \ `http://www.microsoft.com/en-us/download/details.aspx?id=48155&NavToggle=True`.\
    \ The remote tools for Visual Studio are used to run the Windows App Certification\
    \ Kit.\n\n3.  Download the Windows App Certification Kit from `https://dev.windows.com/en-us/develop/app-certification-kit`\
    \ and install it on your remote machine.\n\n4.  Now, start creating a package\
    \ from your Windows app. In the Package Creation Completed wizard, select the\
    \ Remote machine option and click the ellipsis button (see Figure 17-18).\n\n\
    \    ![A978-1-4842-0719-2_17_Fig18_HTML.jpg](A978-1-4842-0719-2_17_Fig18_HTML.jpg)\
    \  \n    *Figure 17-18. Package creation and the Remote Machine option*\n\n5.\
    \  Enter your subnet/Domain Name Server (DNS)/IP address. Select the appropriate\
    \ mode in Authentication Mode menu of Windows credentials (see Figure 17-19).\n\
    \n    ![A978-1-4842-0719-2_17_Fig19_HTML.jpg](A978-1-4842-0719-2_17_Fig19_HTML.jpg)\
    \  \n    *Figure 17-19. Remote Connection screen*\n\n6.  Click the Select button\
    \ and then the Launch Windows App Certification Kit button. If the remote tools\
    \ are running on the remote machine, you are connected and the validation tests\
    \ should begin.\n\n# Chapter 18: Store and Monetization\n\nBy now, you should\
    \ have finished developing your Universal Windows platform application targeting\
    \ the Windows 10 OS. You need to build your application and upload it to the Windows\
    \ Store, where users search for and download apps. In this chapter, you will learn\
    \ the things required to get your app in the Windows Store, and how to make money\
    \ by making use of in-app advertising.\n\n## 18.1 Create a Windows App Developer\
    \ Account\n\n### Problem\n\nYou need to build and upload your application to the\
    \ Windows Store. But to do this, you need to first log in to the Windows Dev Center\
    \ using your developer account. You need to know how to create a developer account\
    \ before you can start the upload phase.\n\n### Solution\n\nCreate a developer\
    \ account online. There are two ways to start this process.\n\n*   Go directly\
    \ to `http://dev.windows.com`.\n*   Access account registration through Visual\
    \ Studio.\n\n#### Access Account Registration Through the Windows Dev Center\n\
    \nThe Windows Dev Center is a one-stop portal for Windows app development. This\
    \ portal provides the tools that you need to get started with Windows 10 application\
    \ development. There are code samples, tutorials on how to develop Windows 10\
    \ apps, and of course, the provision to submit your apps. The Windows Dev Center\
    \ can be accessed at `http://dev.windows.com`. When you navigate to this page,\
    \ you see a Get a dev account link. Click it and follow the onscreen instructions\
    \ to finish creating your own dev account. A developer account allows you to submit\
    \ your apps (for all Windows devices) to the Windows Store. It also allows you\
    \ to manage your apps and get analytics on how your app is doing in the Store.\n\
    \nYou can sign up under one of the following categories:\n\n*   Individual: This\
    \ account type lets you develop and sell apps as an individual, a student, or\
    \ an unincorporated group. The fee for this type of account is $19.\n*   Company:\
