- fmt: "# Chapter 8: Globalization and Localization\n\nThere are opportunities to\
    \ market your Windows app in nearly 240 Windows marketplaces. The target audiences\
    \ vary in culture, region, and language. Your app’s users may be located anywhere\
    \ in the world. They may speak different languages—or even multiple languages.\
    \ As an application developer, it is necessary for you to adapt your application\
    \ for several languages, markets, cultures, and regions. Globalization means making\
    \ your application culture, language, and region aware. Localization is the ability\
    \ to localize certain aspects of your app to the culture in which it is running;\
    \ for example, date, number, or currency formats, and so forth. In this chapter,\
    \ you will see recipes on how to globalize and localize your apps.\n\n## 8.1 Using\
    \ Resource Strings\n\n### Problem\n\nWhen your app is used in a non-English culture,\
    \ the text does not adapt to the new culture and language; instead, the user sees\
    \ English text.\n\n### Solution\n\nIn order to globalize applications, it is necessary\
    \ to use a resource string in place of static text. For example, any label text\
    \ in the application should not be hard-coded as a static text. Instead, a resource\
    \ file should be created for the culture/language you need to support. Add strings\
    \ that will translate text into the corresponding language. Also use resource\
    \ strings for label text, rather than hard-coding it.\n\n### How It Works\n\n\
    Let’s look at the usage of resource strings in applications, as well as how to\
    \ add them.\n\nOpen Visual Studio 2015. Select File ➤ New Project ➤ JavaScript\
    \ ➤ Windows ➤ Universal and select Blank App (Universal Windows) template. This\
    \ will create a universal app with the necessary files that can run on machines\
    \ powered by Windows 10.\n\n![A978-1-4842-0719-2_8_Fig1_HTML.jpg](A978-1-4842-0719-2_8_Fig1_HTML.jpg)\n\
    \nFigure 8-1. Choosing the Blank App (Universal Windows) template in the New Project\
    \ window\n\nOpen the `package.appxmanifest` file from the project in Visual Studio\
    \ solution explorer. Go to the Application tab and check that the default language\
    \ is set to en-US. When a new project is created, the language is set to en-US\
    \ by default (see Figure 8-2).\n\n![A978-1-4842-0719-2_8_Fig2_HTML.jpg](A978-1-4842-0719-2_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2. Default language settings in the application manifest\n\nCreate\
    \ a resource folder, as follows:\n\n![A978-1-4842-0719-2_8_Fig3_HTML.jpg](A978-1-4842-0719-2_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3. Strings folder in the Windows project\n\nIn the Solution Explorer,\
    \ select the Universal Windows project and right-click on it. Select Add ➤ New\
    \ Folder from the context menu. Name the new folder `strings`. You will create\
    \ different culture/language resource files inside this folder (see Figure 8-3).\n\
    \nCreate a subfolder and an English resource file, as follows: Create a folder\
    \ named `en-US` in the `strings` folder (created in step 3). Right-click the `en-US`\
    \ folder and select Add ➤ New Item. Select Text File from the template and give\
    \ the name `resources.resjson` for the file. It is recommended to use this default\
    \ name when naming the resource file. Replace the content of the file with the\
    \ following content:\n\n```\n{\n    \"greeting\"          : \"Hello World!\",\n\
    \    \"_greeting.comment\" : \"Hello World Text comment\",\n    \"farewell\" \
    \         : \"Goodbye\",\n    \"_farewell.comment\" : \"A farewell comment.\"\n\
    }\n```\n\nThe resource file is nothing but a JSON file with key value pairs. Here,\
    \ `\"greeting\"` and `\"farewell\"` identify the strings that will be displayed.\
    \ The other keys—`\"_greeting.comment\"` and `\"_farewell.comment\"` are comments\
    \ that describe the strings itself. It’s a good practice to have meaningful comments\
    \ for all of your strings.\n\nUse string resource identifiers to do the following:\
    \ Open the `default.js` file in the project from the Visual Studio solution explorer.\
    \ This file can be found in the `js` folder of the project. Add the following\
    \ line of code to the `app.onactivated` function: `WinJS.Resources.processAll();`\
    \ The completed code should look as follows:\n\n```\napp.onactivated = function\
    \ (args) {\n    if (args.detail.kind === activation.ActivationKind.launch) {\n\
    \        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            WinJS.Resources.processAll();\n        } else {\n        }\n\
    \        args.setPromise(WinJS.UI.processAll());\n    }\n};\n```\n\nTo use the\
    \ resource string in your markup, open the `default.html` file and add the following\
    \ content in the body:\n\n```\n<h2>\n <span data-win-res=\"{textContent: 'greeting'}\"\
    ></span></h2>\n<h2>\n <span data-win-res=\"{textContent: 'farewell'}\"></span>\n\
    </h2>\n```\n\nAdd additional language resource files: In the `strings` folder\
    \ of the project, add a folder named `de-DE`. This is for German culture. Add\
    \ a resource file in the `de-DE` folder. Name the resource file `resources.resjson`.\
    \ Replace the content of the file with the following code:\n\n```\n{\n    \"greeting\"\
    \          : \"Hallo Welt!\",\n    \"_greeting.comment\" : \" Hello World Text\
    \ comment.\",\n    \"farewell\"          : \"Auf Wiedersehen\",\n    \"_farewell.comment\"\
    \ : \"A farewell comment.\"\n}\n```\n\nAdd another folder in the `strings` folder\
    \ of the project and name it `fr-FR`. This is for French culture. Add a resource\
    \ file in the `fr-FR` folder. This resource file name should also be `resources.resjson`.\
    \ Replace the content of the file with the following code:\n\n```\n{\n    \"greeting\"\
    \          : \"Salut tout le monde\",\n    \"_greeting.comment\" : \"Hello World\
    \ Text comment.\",\n    \"farewell\"          : \"Au revoir\",\n    \"_farewell.comment\"\
    \ : \"A farewell comment.\"\n}\n```\n\nRun the app, as follows: Build and run\
    \ the app by pressing F5. Greeting and farewell messages are displayed in a user’s\
    \ preferred language, set on the device. Figure 8-4 shows the output on a Windows\
    \ screen run using the Local Machine option.\n\n![A978-1-4842-0719-2_8_Fig4_HTML.jpg](A978-1-4842-0719-2_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4. English culture resource strings display\n\nChange the language\
    \ setting on the device and run the app again. Figure 8-5 shows the same text\
    \ displayed with the language set to French on the device.\n\n![A978-1-4842-0719-2_8_Fig5_HTML.jpg](A978-1-4842-0719-2_8_Fig5_HTML.jpg)\n\
    \nFigure 8-5. French culture resource strings display\n\nNote that you have to\
    \ restart the device when changing the language settings on Windows Mobile.\n\n\
    ## 8.2 Formatting Date, Time, Number, and Currency\n\n### Problem\n\nDate, Time,\
    \ Number, and Currency show English-culture settings when the language is changed\
    \ to a non-English culture/language.\n\n### Solution\n\nStatic text content in\
    \ the application can be localized by making use of resource strings. But if your\
    \ application has to show date, time, numbers, or currencies, you cannot make\
    \ use of the resource strings. Instead you will need to use the `WinJS.Globalization`\
    \ namespace, which provides the capabilities of DateTime, Number, and Currency\
    \ formatting helper methods.\n\n### How It Works"
  raw: '# Chapter 8: Globalization and Localization


    There are opportunities to market your Windows app in nearly 240 Windows marketplaces.
    The target audiences vary in culture, region, and language. Your app’s users may
    be located anywhere in the world. They may speak different languages—or even multiple
    languages. As an application developer, it is necessary for you to adapt your
    application for several languages, markets, cultures, and regions. Globalization
    means making your application culture, language, and region aware. Localization
    is the ability to localize certain aspects of your app to the culture in which
    it is running; for example, date, number, or currency formats, and so forth. In
    this chapter, you will see recipes on how to globalize and localize your apps.


    ## 8.1 Using Resource Strings


    ### Problem


    When your app is used in a non-English culture, the text does not adapt to the
    new culture and language; instead, the user sees English text.


    ### Solution


    In order to globalize applications, it is necessary to use a resource string in
    place of static text. For example, any label text in the application should not
    be hard-coded as a static text. Instead, a resource file should be created for
    the culture/language you need to support. Add strings that will translate text
    into the corresponding language. Also use resource strings for label text, rather
    than hard-coding it.


    ### How It Works


    Let’s look at the usage of resource strings in applications, as well as how to
    add them.


    Open Visual Studio 2015\. Select File ➤ New Project ➤ JavaScript ➤ Windows ➤ Universal
    and select Blank App (Universal Windows) template. This will create a universal
    app with the necessary files that can run on machines powered by Windows 10.


    ![A978-1-4842-0719-2_8_Fig1_HTML.jpg](A978-1-4842-0719-2_8_Fig1_HTML.jpg)


    Figure 8-1.


    Choosing the Blank App (Universal Windows) template in the New Project window
      Open the `package.appxmanifest` file from the project in Visual Studio solution
    explorer. Go to the Application tab and check that the default language is set
    to en-US. When a new project is created, the language is set to en-US by default
    (see Figure [8-2](#A978-1-4842-0719-2_8_Chapter.html#Fig2)).


    ![A978-1-4842-0719-2_8_Fig2_HTML.jpg](A978-1-4842-0719-2_8_Fig2_HTML.jpg)


    Figure 8-2.


    Default language settings in the application manifest   Create a resource folder,
    as follows:


    ![A978-1-4842-0719-2_8_Fig3_HTML.jpg](A978-1-4842-0719-2_8_Fig3_HTML.jpg)


    Figure 8-3.


    Strings folder in the Windows project In the Solution Explorer, select the Universal
    Windows project and right-click on it. Select Add ➤ New Folder from the context
    menu.   Name the new folder strings. You will create different culture/language
    resource files inside this folder (see Figure [8-3](#A978-1-4842-0719-2_8_Chapter.html#Fig3)).
        Create a subfolder and an English resource file, as follows: Create a folder
    named en-US in the `strings` folder (created in step 3).   Right-click the en-US
    folder and select Add ➤ New Item.   Select Text File from the template and give
    the name `resources.resjson` for the file. It is recommended to use this default
    name when naming the resource file.   Replace the content of the file with the
    following content: `{` `"greeting"          : "Hello World!",` `"_greeting.comment"
    : "Hello World Text comment",` `"farewell"          : "Goodbye",` `"_farewell.comment"
    : "A farewell comment."` `}`   The resource file is nothing but a JSON file with
    key value pairs. Here, `"greeting"` and `"farewell"` identify the strings that
    will be displayed. The other keys— `"_greeting.comment"` and `"_farewell.comment"`
    are comments that describe the strings itself. It’s a good practice to have meaningful
    comments for all of your strings.   Use string resource identifiers to do the
    following: Open the `default.js` file in the project from the Visual Studio solution
    explorer. This file can be found in the `js` folder of the project.   Add the
    following line of code to the `app.onactivated` function: `WinJS.Resources.processAll();`
    The completed code should look as follows: `app.onactivated = function (args)
    {`         `if (args.detail.kind === activation.ActivationKind.launch) {`             `if
    (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)
    {`                 `WinJS.Resources.processAll();`             `} else {`             `}`
                `args.setPromise(WinJS.UI.processAll());`         `}`     `};`   To
    use the resource string in your markup, open the `default.html` file and add the
    following content in the body: `<h2>` `<span data-win-res="{textContent: ''greeting''}"></span></h2>`
    `<h2>` `<span data-win-res="{textContent: ''farewell''}"></span>` `</h2>`    
    Add additional language resource files: In the `strings` folder of the project,
    add a folder named de-DE. This is for German culture.   Add a resource file in
    the `de-DE` folder. Name the resource file resources.resjson. Replace the content
    of the file with the following code: `{`         `"greeting"          : "Hallo
    Welt!",`         `"_greeting.comment" : " Hello World Text comment.",`         `"farewell"          :
    "Auf Wiedersehen",`         `"_farewell.comment" : "A farewell comment."` `}`
      Add another folder in the `strings` folder of the project and name it fr-FR.
    This is for French culture.   Add a resource file in the `fr-FR` folder. This
    resource file name should also be `resources.resjson`. Replace the content of
    the file with the following code: `{`         `"greeting"          : "Salut tout
    le monde",`         `"_greeting.comment" : "Hello World Text comment.",`         `"farewell"          :
    "Au revoir",`         `"_farewell.comment" : "A farewell comment."` `}`     Run
    the app, as follows: Build and run the app by pressing F5.   Greeting and farewell
    messages are displayed in a user’s preferred language, set on the device. Figure
    [8-4](#A978-1-4842-0719-2_8_Chapter.html#Fig4) shows the output on a Windows screen
    run using the Local Machine option.


    ![A978-1-4842-0719-2_8_Fig4_HTML.jpg](A978-1-4842-0719-2_8_Fig4_HTML.jpg)


    Figure 8-4.


    English culture resource strings display   Change the language setting on the
    device and run the app again. Figure [8-5](#A978-1-4842-0719-2_8_Chapter.html#Fig5)
    shows the same text displayed with the language set to French on the device.


    ![A978-1-4842-0719-2_8_Fig5_HTML.jpg](A978-1-4842-0719-2_8_Fig5_HTML.jpg)


    Figure 8-5.


    French culture resource strings display.    


    Note that you have to restart the device when changing the language settings on
    Windows Mobile.


    ## 8.2 Formatting Date, Time, Number, and Currency


    ### Problem


    Date, Time, Number, and Currency show English-culture settings when the language
    is changed to a non-English culture/language.


    ### Solution


    Static text content in the application can be localized by making use of resource
    strings. But if your application has to show date, time, numbers, or currencies,
    you cannot make use of the resource strings. Instead you will need to use the
    `WinJS.Globalization` namespace, which provides the capabilities of DateTime,
    Number, and Currency formatting helper methods.


    ### How It Works'
  trans: "\n# 第 8 章：全球化和本地化\n\n你的 Windows 应用可以在近 240 个 Windows 市场中销售。目标受众在文化、地域和语言上各不相同。你的应用用户可能遍布世界各地，他们可能说不同的语言，甚至多种语言。作为应用程序开发者，你需要让你的应用适配多种语言、市场、文化和区域。全球化意味着让应用感知文化、语言和区域。本地化则是将应用的某些方面适配到其所运行的文化中的能力，例如日期、数字或货币格式等。在本章中，你将学习如何对应用进行全球化和本地化的方法。\n\
    \n## 8.1 使用资源字符串\n\n### 问题\n\n当应用在非英语文化环境下使用时，文本无法适配新的文化和语言，用户看到的仍然是英语文本。\n\n\
    ### 解决方案\n\n为了实现应用的全球化，必须使用资源字符串来代替静态文本。例如，应用程序中的任何标签文本都不应硬编码为静态文本。相反，应该为你需要支持的文化/语言创建一个资源文件。添加能够将文本翻译成对应语言的字符串。标签文本也应使用资源字符串，而非硬编码。\n\
    \n### 工作原理\n\n让我们看看资源字符串在应用程序中的用法，以及如何添加它们。\n\n打开 Visual Studio 2015。选择文件 ➤ 新建项目\
    \ ➤ JavaScript ➤ Windows ➤ 通用，然后选择空白应用（通用 Windows）模板。这将创建一个包含必要文件的通用应用，可在运行 Windows\
    \ 10 的设备上运行。\n\n![A978-1-4842-0719-2_8_Fig1_HTML.jpg](img/A978-1-4842-0719-2_8_Fig1_HTML.jpg)\n\
    \n图 8-1. 在“新建项目”窗口中选择“空白应用（通用 Windows）”模板\n\n在 Visual Studio 解决方案资源管理器中，从项目中打开\
    \ `package.appxmanifest` 文件。转到“应用程序”选项卡，检查默认语言是否设置为 en-US。创建新项目时，语言默认设置为 en-US（见图\
    \ 8-2）。\n\n![A978-1-4842-0719-2_8_Fig2_HTML.jpg](img/A978-1-4842-0719-2_8_Fig2_HTML.jpg)\n\
    \n图 8-2. 应用程序清单中的默认语言设置\n\n按如下方式创建一个资源文件夹：\n\n![A978-1-4842-0719-2_8_Fig3_HTML.jpg](img/A978-1-4842-0719-2_8_Fig3_HTML.jpg)\n\
    \n图 8-3. Windows 项目中的 Strings 文件夹\n\n在解决方案资源管理器中，选择通用 Windows 项目并右键单击它。从上下文菜单中选择添加\
    \ ➤ 新建文件夹。将新文件夹命名为 `strings`。你将在此文件夹内创建不同文化/语言的资源文件（见图 8-3）。\n\n按如下方式创建一个子文件夹和一个英语资源文件：在\
    \ `strings` 文件夹（在步骤 3 中创建）中创建一个名为 `en-US` 的文件夹。右键单击 `en-US` 文件夹并选择添加 ➤ 新建项。从模板中选择文本文件，并将文件命名为\
    \ `resources.resjson`。建议在命名资源文件时使用这个默认名称。将文件内容替换为以下内容：\n\n```\n{\n    \"greeting\"\
    \          : \"Hello World!\",\n    \"_greeting.comment\" : \"Hello World Text\
    \ comment\",\n    \"farewell\"          : \"Goodbye\",\n    \"_farewell.comment\"\
    \ : \"A farewell comment.\"\n}\n```\n\n资源文件本质上是一个包含键值对的 JSON 文件。这里，`\"greeting\"\
    ` 和 `\"farewell\"` 标识了将要显示的字符串。其他键——`\"_greeting.comment\"` 和 `\"_farewell.comment\"\
    ` 是描述这些字符串本身的注释。为所有字符串添加有意义的注释是一个好习惯。\n\n使用字符串资源标识符执行以下操作：从 Visual Studio 解决方案资源管理器中打开项目中的\
    \ `default.js` 文件。该文件位于项目的 `js` 文件夹中。将以下代码行添加到 `app.onactivated` 函数中：`WinJS.Resources.processAll();`\
    \ 完成后的代码如下所示：\n\n```\napp.onactivated = function (args) {\n    if (args.detail.kind\
    \ === activation.ActivationKind.launch) {\n        if (args.detail.previousExecutionState\
    \ !== activation.ApplicationExecutionState.terminated) {\n            WinJS.Resources.processAll();\n\
    \        } else {\n        }\n        args.setPromise(WinJS.UI.processAll());\n\
    \    }\n};\n```\n\n要使用标记中的资源字符串，请打开 `default.html` 文件，并在 body 中添加以下内容：\n\n```\n\
    <h2>\n <span data-win-res=\"{textContent: 'greeting'}\"></span></h2>\n<h2>\n <span\
    \ data-win-res=\"{textContent: 'farewell'}\"></span>\n</h2>\n```\n\n添加其他语言资源文件：在项目的\
    \ `strings` 文件夹中，添加一个名为 `de-DE` 的文件夹。这用于德语文化。在 `de-DE` 文件夹中添加一个资源文件。将资源文件命名为 `resources.resjson`。将文件内容替换为以下代码：\n\
    \n```\n{\n    \"greeting\"          : \"Hallo Welt!\",\n    \"_greeting.comment\"\
    \ : \" Hello World Text comment.\",\n    \"farewell\"          : \"Auf Wiedersehen\"\
    ,\n    \"_farewell.comment\" : \"A farewell comment.\"\n}\n```\n\n在项目的 `strings`\
    \ 文件夹中添加另一个文件夹，命名为 `fr-FR`。这用于法语文化。在 `fr-FR` 文件夹中添加一个资源文件。该资源文件名也应为 `resources.resjson`。将文件内容替换为以下代码：\n\
    \n```\n{\n    \"greeting\"          : \"Salut tout le monde\",\n    \"_greeting.comment\"\
    \ : \"Hello World Text comment.\",\n    \"farewell\"          : \"Au revoir\"\
    ,\n    \"_farewell.comment\" : \"A farewell comment.\"\n}\n```\n\n按如下方式运行应用：按\
    \ F5 生成并运行应用。问候和告别消息将以用户在设备上设置的首选语言显示。图 8-4 显示了使用本地计算机选项在 Windows 屏幕上运行的输出。\n\n\
    ![A978-1-4842-0719-2_8_Fig4_HTML.jpg](img/A978-1-4842-0719-2_8_Fig4_HTML.jpg)\n\
    \n图 8-4. 英语文化资源字符串显示\n\n更改设备上的语言设置并再次运行应用。图 8-5 显示了将设备语言设置为法语时显示的相同文本。\n\n![A978-1-4842-0719-2_8_Fig5_HTML.jpg](img/A978-1-4842-0719-2_8_Fig5_HTML.jpg)\n\
    \n图 8-5. 法语文化资源字符串显示\n\n请注意，在 Windows 移动设备上更改语言设置时，必须重新启动设备。\n\n## 8.2 格式化日期、时间、数字和货币\n\
    \n### 问题\n\n当语言更改为非英语文化/语言时，日期、时间、数字和货币仍显示英语文化设置。\n\n### 解决方案\n\n应用程序中的静态文本内容可以通过使用资源字符串进行本地化。但如果你的应用程序需要显示日期、时间、数字或货币，则无法使用资源字符串。相反，你需要使用\
    \ `WinJS.Globalization` 命名空间，它提供了 DateTime、Number 和 Currency 格式化辅助方法的功能。\n\n###\
    \ 工作原理\n"
- fmt: "### Format Date and Time\n\nThe following steps explain how to format the\
    \ date and the time.\n\nUse `DateTimeFormatter` in the `Windows.Globalization.DateTimeFormatting`\
    \ namespace. Create a `DateTimeFormatter` instance with a template format. For\
    \ a list of template formats, you can check the MSDN documentation at [`http://msdn.microsoft.com/en-us/library/windows/apps/windows.globalization.datetimeformatting.datetimeformatter.aspx`](http://msdn.microsoft.com/en-us/library/windows/apps/windows.globalization.datetimeformatting.datetimeformatter.aspx).\n\
    \nAdd the following markup to `default.html` file inside the body element:\n\n\
    ```\n<h1>Formatting Demo</h1> <br /> <h3>Long Date:</h3> <h3 id=\"spnDate\"></h3>\
    \ <br /> <h3>Long Time:</h3> <h3 id=\"spnTime\"></h3>\n```\n\nModify the `onactivated`\
    \ method in `default.js` as follows:\n\n```\napp.onactivated = function (args)\
    \ {\n    if (args.detail.kind === activation.ActivationKind.launch) {\n      \
    \  if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            var lang = Windows.System.UserProfile.GlobalizationPreferences.languages[0];\n\
    \            var shortDateFmt = new Windows.Globalization.DateTimeFormatting.DateTimeFormatter(\"\
    longdate\", [lang]);\n            var shortTimeFmt = new Windows.Globalization.DateTimeFormatting.DateTimeFormatter(\"\
    longtime\",[lang]);\n            var currentDateTime = new Date();\n         \
    \   var shortDate = shortDateFmt.format(currentDateTime);\n            var shortTime\
    \ = shortTimeFmt.format(currentDateTime);\n            document.getElementById(\"\
    spnDate\").innerHTML = shortDate;\n            document.getElementById(\"spnTime\"\
    ).innerHTML = shortTime;\n        } else {\n            // TODO: This application\
    \ has been reactivated from suspension.\n            // Restore application state\
    \ here.\n        }\n        args.setPromise(WinJS.UI.processAll());\n    }\n};\n\
    ```\n\nRun the app and verify the output (see [Figure 8-6](#A978-1-4842-0719-2_8_Chapter.html#Fig6)\
    \ and [Figure 8-7](#A978-1-4842-0719-2_8_Chapter.html#Fig7)).\n\n![A978-1-4842-0719-2_8_Fig7_HTML.jpg](A978-1-4842-0719-2_8_Fig7_HTML.jpg)\n\
    \n**Figure 8-7.** Formatted output for French culture\n\n![A978-1-4842-0719-2_8_Fig6_HTML.jpg](A978-1-4842-0719-2_8_Fig6_HTML.jpg)\n\
    \n**Figure 8-6.** Formatted output for English culture\n\n[Figure 8-6](#A978-1-4842-0719-2_8_Chapter.html#Fig6)\
    \ shows the date formatted for English culture and [Figure 8-7](#A978-1-4842-0719-2_8_Chapter.html#Fig7)\
    \ shows the date formatted for French culture.\n\n### Format Numbers and Currencies\n\
    \nThe following steps explain how to format numbers and currencies:\n\n`NumberFormatting`\
    \ should be used to display decimal and percentage numbers and currencies.\n\n\
    Add the following markup in `default.html` and append to the body:\n\n```\n<h3>Number\
    \ Format:</h3> <h3 id=\"spnCurrency\"></h3>\n```\n\nModify the `onactivated` method\
    \ in `default.js` and append the following code:\n\n```\nvar userCurrency = Windows.System.UserProfile\n\
    \                    .GlobalizationPreferences.currencies;\nvar number = 23456.78\n\
    var currFmt = new Windows.Globalization.NumberFormatting\n                   \
    \ .CurrencyFormatter(userCurrency[0],[lang]);\nvar formattedCurrency = currFmt.format(number);\n\
    document.getElementById(\"spnCurrency\").innerHTML =\n                formattedCurrency;\n\
    ```\n\nRun the app by pressing F5. Change the language settings on your phone\
    \ or tablet to see the number and currency formatting in action (see [Figure 8-8](#A978-1-4842-0719-2_8_Chapter.html#Fig8)\
    \ and [Figure 8-9](#A978-1-4842-0719-2_8_Chapter.html#Fig9)).\n\n![A978-1-4842-0719-2_8_Fig9_HTML.jpg](A978-1-4842-0719-2_8_Fig9_HTML.jpg)\n\
    \n**Figure 8-9.** Date and currency formatted output in French culture\n\n![A978-1-4842-0719-2_8_Fig8_HTML.jpg](A978-1-4842-0719-2_8_Fig8_HTML.jpg)\n\
    \n**Figure 8-8.** Date and currency formatted output in English culture\n\n##\
    \ 8.3 Localizing WinJS Controls\n\n### Problem\n\nWinJS controls do not show a\
    \ localized string when a culture or language is changed.\n\n### Solution\n\n\
    Usually, a controls property like `label` or `title` is set in the markup. It\
    \ is somewhat like hard-coding the string value. Hence, when a culture or language\
    \ is changed, the controls do not adapt, and show the hard coded strings as is.\
    \ By using resource files, it is possible to bind WinJS control properties to\
    \ localized strings. WinJS provides flexibility to directly bind a controls property\
    \ to a resource key from the resource file.\n\n### How It Works\n\nThe following\
    \ steps explain how to localize WinJS controls:\n\nOpen Visual Studio 2015. Select\
    \ **File** ➤ **New Project** ➤ **JavaScript** ➤ **Windows** ➤ **Blank App (Universal\
    \ Windows)**. This will create a universal app which is a single project that\
    \ can run on devices powered by Windows 10.\n\nAdd resource files to the project\
    \ (see Recipe 8.1 on how to add resource files).\n\nAdd the following string keys:\n\
    \n```\n{\n    \"ShowMoreTilesTitle\"            : \"Show more Tiles\",\n    \"\
    _ShowMoreTilesTitle.comment\"   : \"show more tiles toggle title\",\n    \"VibrateOnCallTitle\"\
    \            : \"Vibrate on Call\",\n    \"_VibrateOnCallTitle.comment\"   : \"\
    vibrate on call toggle title\",\n    \"ShowArtistTitle\"            : \"Show artist\
    \ when playing music\",\n    \"_ShowArtistTitle.comment\"   : \"Show artist when\
    \ playing music\n                        toggle title\",\n    \"ToggleOn\"   \
    \           : \"Yes\",\n    \"_ToggleOn.comment\"     : \"show more tiles toggle\
    \ on label\",\n    \"ToggleOff\"             : \"No\",\n    \"_ToggleOff.comment\"\
    \    : \"show more tiles toggle off label\"\n}\n```\n\nSimilarly, I have also\
    \ added strings for other languages.\n\nAdd the following code to the `default.js`\
    \ `onactivated` method:\n\n```\nWinJS.UI.processAll().then(function(){\n    WinJS.Resources.processAll();\n\
    });\n```\n\nYou need to call `processAll()` on the `WinJS.Resource` class because\
    \ you will be referring to the resource strings in the markup.\n\nAdd the following\
    \ markup to `default.html` inside the body element:\n\n```\n<div>\n    <h1>Controls\
    \ Localization</h1>\n    <br />\n    <div class=\"toggle\" data-win-control=\"\
    WinJS.UI.ToggleSwitch\"\n        data-win-res=\"{winControl: {labelOn:'ToggleOn',\n\
    \                                    labelOff:'ToggleOff',\n                 \
    \                   title:'ShowMoreTilesTitle'}}\"\n        data-win-options=\"\
    \">\n    </div>\n    <br />\n    <div class=\"toggle\" data-win-control=\"WinJS.UI.ToggleSwitch\"\
    \n        data-win-res=\"{winControl: {labelOn:'ToggleOn',\n                 \
    \                   labelOff:'ToggleOff',\n                                  \
    \  title:'VibrateOnCallTitle'}}\"\n        data-win-options=\"\">\n    </div>\n\
    \    <br />\n    <div class=\"toggle\" data-win-control=\"WinJS.UI.ToggleSwitch\"\
    \n        data-win-res=\"{winControl: {labelOn:'ToggleOn',\n                 \
    \                   labelOff:'ToggleOff',\n                                  \
    \  title:'ShowArtistTitle'}}\"\n        data-win-options=\"\">\n    </div>\n</div>\n\
    ```\n\nNotice that you use `data-win-res` and refer the resource strings by their\
    \ key names, and assign it to a property of the control. Usually, it is of the\
    \ following pattern:\n\n```\ndata-win-res=\"{winControl: {propertyName1:'resourceID1',\n\
    \                            propertyName2:'resourceID2'}}\"\n```\n\nPress F5\
    \ and run the app. Initially, you will see an English string used by the control.\
    \ Change the Language in the device and then run the app again. Now it will pick\
    \ up the appropriate resource file and use the appropriate resource strings (see\
    \ [Figure 8-9](#A978-1-4842-0719-2_8_Chapter.html#Fig9) and [Figure 8-10](#A978-1-4842-0719-2_8_Chapter.html#Fig10)).\n\
    \n![A978-1-4842-0719-2_8_Fig11_HTML.jpg](A978-1-4842-0719-2_8_Fig11_HTML.jpg)\n\
    \n**Figure 8-11.** Formatted output in English culture\n\n![A978-1-4842-0719-2_8_Fig10_HTML.jpg](A978-1-4842-0719-2_8_Fig10_HTML.jpg)\n\
    \n**Figure 8-10.** Formatted output in French culture"
  raw: '#### Format Date and Time


    The following steps explain how to format the date and the time.


    Use `DateTimeFormatter` in the `Windows.Globalization.DateTimeFormatting` namespace.
    Create a `DateTimeFormatter` instance with a template format. For a list of template
    formats, you can check the MSDN documentation at [`http://msdn.microsoft.com/en-us/library/windows/apps/windows.globalization.datetimeformatting.datetimeformatter.aspx`](http://msdn.microsoft.com/en-us/library/windows/apps/windows.globalization.datetimeformatting.datetimeformatter.aspx)
    .   Add the following markup to `default.html` file inside the body element: `<h1>Formatting
    Demo</h1>` `<br />` `<h3>Long Date:</h3>` `<h3 id="spnDate"></h3>` `<br />` `<h3>Long
    Time:</h3>` `<h3 id="spnTime"></h3>`   Modify the `onactivated` method in `default.js`
    as follows: `app.onactivated = function (args) {`         `if (args.detail.kind
    === activation.ActivationKind.launch) {`             `if (args.detail.previousExecutionState
    !== activation.ApplicationExecutionState.terminated) {`                 `var lang
    = Windows.System.UserProfile.GlobalizationPreferences.languages[0];`                 `var
    shortDateFmt = new Windows.Globalization.DateTimeFormatting.DateTimeFormatter("longdate",
    [lang]);`                 `var shortTimeFmt = new Windows.Globalization.DateTimeFormatting.DateTimeFormatter("longtime",[lang]);`
                    `var currentDateTime = new Date();`                 `var shortDate
    = shortDateFmt.format(currentDateTime);`                 `var shortTime = shortTimeFmt.format(currentDateTime);`
                    `document.getElementById("spnDate").innerHTML = shortDate;`                 `document.getElementById("spnTime").innerHTML
    = shortTime;`             `} else {`                 `// TODO: This application
    has been reactivated from suspension.`                 `// Restore application
    state here.`             `}`             `args.setPromise(WinJS.UI.processAll());`
            `}` `};`   Run the app and verify the output (see Figure [8-6](#A978-1-4842-0719-2_8_Chapter.html#Fig6)
    and Figure [8-7](#A978-1-4842-0719-2_8_Chapter.html#Fig7)).


    ![A978-1-4842-0719-2_8_Fig7_HTML.jpg](A978-1-4842-0719-2_8_Fig7_HTML.jpg)


    Figure 8-7.


    Formatted output for French culture


    ![A978-1-4842-0719-2_8_Fig6_HTML.jpg](A978-1-4842-0719-2_8_Fig6_HTML.jpg)


    Figure 8-6.


    Formatted output for English culture  


    Figure [8-6](#A978-1-4842-0719-2_8_Chapter.html#Fig6) shows the date formatted
    for English culture and Figure [8-7](#A978-1-4842-0719-2_8_Chapter.html#Fig7)
    shows the date formatted for French culture.


    #### Format Numbers and Currencies


    The following steps explain how to format numbers and currencies:


    `NumberFormatting` should be used to display decimal and percentage numbers and
    currencies.   Add the following markup in `default.html` and append to the body:
    `<h3>Number Format:</h3>` `<h3 id="spnCurrency"></h3>`   Modify the `onactivated`
    method in `default.js` and append the following code:    `var userCurrency = Windows.System.UserProfile`
                            `.GlobalizationPreferences.currencies;` `var number =
    23456.78` `var currFmt = new Windows.Globalization.NumberFormatting`                         `.CurrencyFormatter(userCurrency[0],[lang]);`
    `var formattedCurrency = currFmt.format(number);` `document.getElementById("spnCurrency").innerHTML
    =`                 `formattedCurrency;`   Run the app by pressing F5\. Change
    the language settings on your phone or tablet to see the number and currency formatting
    in action (see Figure [8-8](#A978-1-4842-0719-2_8_Chapter.html#Fig8) and Figure
    [8-9](#A978-1-4842-0719-2_8_Chapter.html#Fig9)).


    ![A978-1-4842-0719-2_8_Fig9_HTML.jpg](A978-1-4842-0719-2_8_Fig9_HTML.jpg)


    Figure 8-9.


    Date and currency formatted output in French culture


    ![A978-1-4842-0719-2_8_Fig8_HTML.jpg](A978-1-4842-0719-2_8_Fig8_HTML.jpg)


    Figure 8-8.


    Date and currency formatted output in English culture


    ## 8.3 Localizing WinJS Controls


    ### Problem


    WinJS controls do not show a localized string when a culture or language is changed.


    ### Solution


    Usually, a controls property like `label` or `title` is set in the markup. It
    is somewhat like hard-coding the string value. Hence, when a culture or language
    is changed, the controls do not adapt, and show the hard coded strings as is.
    By using resource files, it is possible to bind WinJS control properties to localized
    strings. WinJS provides flexibility to directly bind a controls property to a
    resource key from the resource file.


    ### How It Works


    The following steps explain how to localize WinJS controls:


    Open Visual Studio 2015\. Select File ➤ New Project ➤ JavaScript ➤ Windows ➤ Blank
    App (Universal Windows). This will create a universal app which is a single project
    that can run on devices powered by Windows 10.   Add resource files to the project
    (see Recipe 8.1 on how to add resource files).   Add the following string keys:
    `{` `"ShowMoreTilesTitle"            : "Show more Tiles",` `"_ShowMoreTilesTitle.comment"   :
    "show more tiles toggle title",` `"VibrateOnCallTitle"            : "Vibrate on
    Call",` `"_VibrateOnCallTitle.comment"   : "vibrate on call toggle title",` `"ShowArtistTitle"            :
    "Show artist when playing music",` `"_ShowArtistTitle.comment"   : "Show artist
    when playing music`                         `toggle title",` `"ToggleOn"              :
    "Yes",` `"_ToggleOn.comment"     : "show more tiles toggle on label",` `"ToggleOff"             :
    "No",` `"_ToggleOff.comment"    : "show more tiles toggle off label"` `}` Similarly,
    I have also added strings for other languages.   Add the following code to the
    `default.js` `onactivated` method: `WinJS.UI.processAll().then(function(){`      `WinJS.Resources.processAll();`
    `});` You need to call `processAll()` on the `WinJS.Resource` class because you
    will be referring to the resource strings in the markup.   Add the following markup
    to `default.html` inside the body element: `<div>` `<h1>Controls Localization</h1>`
    `<br />` `<div class="toggle" data-win-control="WinJS.UI.ToggleSwitch"`      `data-win-res="{winControl:
    {labelOn:''ToggleOn'',`                                  `labelOff:''ToggleOff'',`
                                     `title:''ShowMoreTilesTitle''}}"`      `data-win-options="">`
    `</div>` `<br />` `<div class="toggle" data-win-control="WinJS.UI.ToggleSwitch"`
         `data-win-res="{winControl: {labelOn:''ToggleOn'',`                                  `labelOff:''ToggleOff'',`
                                     `title:''VibrateOnCallTitle''}}"`      `data-win-options="">`
    `</div>` `<br />` `<div class="toggle" data-win-control="WinJS.UI.ToggleSwitch"`
         `data-win-res="{winControl: {labelOn:''ToggleOn'',`                                  `labelOff:''ToggleOff'',`
                                     `title:''ShowArtistTitle''}}"`      `data-win-options="">`
    `</div>` `</div>` Notice that you use `data-win-res` and refer the resource strings
    by their key names, and assign it to a property of the control. Usually, it is
    of the following pattern: `data-win-res="{winControl: {propertyName1:''resourceID1'',`
                                    `propertyName2:''resourceID2''}}"`   Press F5
    and run the app. Initially, you will see an English string used by the control.
    Change the Language in the device and then run the app again. Now it will pick
    up the appropriate resource file and use the appropriate resource strings (see
    Figure [8-9](#A978-1-4842-0719-2_8_Chapter.html#Fig9) and Figure [8-10](#A978-1-4842-0719-2_8_Chapter.html#Fig10)).


    ![A978-1-4842-0719-2_8_Fig11_HTML.jpg](A978-1-4842-0719-2_8_Fig11_HTML.jpg)


    Figure 8-11.


    Formatted output in English culture


    ![A978-1-4842-0719-2_8_Fig10_HTML.jpg](A978-1-4842-0719-2_8_Fig10_HTML.jpg)


    Figure 8-10.


    Formatted output in French culture'
  trans: "\n### 格式化日期和时间\n\n以下步骤说明如何格式化日期和时间。\n\n使用 `Windows.Globalization.DateTimeFormatting`\
    \ 命名空间中的 `DateTimeFormatter`。通过模板格式创建一个 `DateTimeFormatter` 实例。有关模板格式的列表，可以查看\
    \ MSDN 文档：[`http://msdn.microsoft.com/en-us/library/windows/apps/windows.globalization.datetimeformatting.datetimeformatter.aspx`](http://msdn.microsoft.com/en-us/library/windows/apps/windows.globalization.datetimeformatting.datetimeformatter.aspx)。\n\
    \n将以下标记添加到 `default.html` 文件的 body 元素内：\n\n```\n<h1>Formatting Demo</h1> <br />\
    \ <h3>Long Date:</h3> <h3 id=\"spnDate\"></h3> <br /> <h3>Long Time:</h3> <h3\
    \ id=\"spnTime\"></h3>\n```\n\n按如下方式修改 `default.js` 中的 `onactivated` 方法：\n\n```\n\
    app.onactivated = function (args) {\n    if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n        if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            var lang = Windows.System.UserProfile.GlobalizationPreferences.languages[0];\n\
    \            var shortDateFmt = new Windows.Globalization.DateTimeFormatting.DateTimeFormatter(\"\
    longdate\", [lang]);\n            var shortTimeFmt = new Windows.Globalization.DateTimeFormatting.DateTimeFormatter(\"\
    longtime\",[lang]);\n            var currentDateTime = new Date();\n         \
    \   var shortDate = shortDateFmt.format(currentDateTime);\n            var shortTime\
    \ = shortTimeFmt.format(currentDateTime);\n            document.getElementById(\"\
    spnDate\").innerHTML = shortDate;\n            document.getElementById(\"spnTime\"\
    ).innerHTML = shortTime;\n        } else {\n            // TODO: 此应用程序已从挂起状态重新激活。\n\
    \            // 在此处恢复应用程序状态。\n        }\n        args.setPromise(WinJS.UI.processAll());\n\
    \    }\n};\n```\n\n运行应用并验证输出（参见图 8-6 和图 8-7）。\n\n![A978-1-4842-0719-2_8_Fig7_HTML.jpg](img/A978-1-4842-0719-2_8_Fig7_HTML.jpg)\n\
    \n**图 8-7.** 法语区域设置的格式化输出\n\n![A978-1-4842-0719-2_8_Fig6_HTML.jpg](img/A978-1-4842-0719-2_8_Fig6_HTML.jpg)\n\
    \n**图 8-6.** 英语区域设置的格式化输出\n\n图 8-6 显示针对英语区域设置格式化的日期，图 8-7 显示针对法语区域设置格式化的日期。\n\n\
    ### 格式化数字和货币\n\n以下步骤说明如何格式化数字和货币：\n\n应使用 `NumberFormatting` 来显示小数、百分比数字和货币。\n\n\
    将以下标记添加到 `default.html` 的 body 末尾：\n\n```\n<h3>Number Format:</h3> <h3 id=\"spnCurrency\"\
    ></h3>\n```\n\n修改 `default.js` 中的 `onactivated` 方法，并追加以下代码：\n\n```\nvar userCurrency\
    \ = Windows.System.UserProfile\n                    .GlobalizationPreferences.currencies;\n\
    var number = 23456.78\nvar currFmt = new Windows.Globalization.NumberFormatting\n\
    \                    .CurrencyFormatter(userCurrency[0],[lang]);\nvar formattedCurrency\
    \ = currFmt.format(number);\ndocument.getElementById(\"spnCurrency\").innerHTML\
    \ =\n                formattedCurrency;\n```\n\n按 F5 运行应用。更改手机或平板电脑的语言设置，以查看数字和货币格式的效果（参见图\
    \ 8-8 和图 8-9）。\n\n![A978-1-4842-0719-2_8_Fig9_HTML.jpg](img/A978-1-4842-0719-2_8_Fig9_HTML.jpg)\n\
    \n**图 8-9.** 法语区域设置的日期和货币格式化输出\n\n![A978-1-4842-0719-2_8_Fig8_HTML.jpg](img/A978-1-4842-0719-2_8_Fig8_HTML.jpg)\n\
    \n**图 8-8.** 英语区域设置的日期和货币格式化输出\n\n## 8.3 本地化 WinJS 控件\n\n### 问题\n\n当更改区域设置或语言时，WinJS\
    \ 控件不显示本地化字符串。\n\n### 解决方案\n\n通常，控件的属性（如 `label` 或 `title`）是在标记中设置的。这有点像对字符串值进行硬编码。因此，当更改区域设置或语言时，控件不会自适应，而是原样显示硬编码的字符串。通过使用资源文件，可以将\
    \ WinJS 控件属性绑定到本地化字符串。WinJS 提供了灵活性，可以直接将控件属性绑定到资源文件中的资源键。\n\n### 工作原理\n\n以下步骤说明如何本地化\
    \ WinJS 控件：\n\n打开 Visual Studio 2015。选择 **文件** ➤ **新建项目** ➤ **JavaScript** ➤ **Windows**\
    \ ➤ **空白应用(通用 Windows)**。这将创建一个通用应用，它是一个可以在 Windows 10 驱动设备上运行的单一项目。\n\n向项目添加资源文件（有关如何添加资源文件，请参阅配方\
    \ 8.1）。\n\n添加以下字符串键：\n\n```\n{\n    \"ShowMoreTilesTitle\"            : \"显示更多磁贴\"\
    ,\n    \"_ShowMoreTilesTitle.comment\"   : \"显示更多磁贴切换标题\",\n    \"VibrateOnCallTitle\"\
    \            : \"来电时振动\",\n    \"_VibrateOnCallTitle.comment\"   : \"来电时振动切换标题\"\
    ,\n    \"ShowArtistTitle\"            : \"播放音乐时显示艺术家\",\n    \"_ShowArtistTitle.comment\"\
    \   : \"播放音乐时显示艺术家切换标题\",\n    \"ToggleOn\"              : \"是\",\n    \"_ToggleOn.comment\"\
    \     : \"显示更多磁贴开启标签\",\n    \"ToggleOff\"             : \"否\",\n    \"_ToggleOff.comment\"\
    \    : \"显示更多磁贴关闭标签\"\n}\n```\n\n类似地，我还为其他语言添加了字符串。\n\n将以下代码添加到 `default.js` 的\
    \ `onactivated` 方法中：\n\n```\nWinJS.UI.processAll().then(function(){\n    WinJS.Resources.processAll();\n\
    });\n```\n\n你需要调用 `WinJS.Resource` 类上的 `processAll()`，因为你将在标记中引用资源字符串。\n\n将以下标记添加到\
    \ `default.html` 文件的 body 元素内：\n\n```\n<div>\n    <h1>控件本地化</h1>\n    <br />\n\
    \    <div class=\"toggle\" data-win-control=\"WinJS.UI.ToggleSwitch\"\n      \
    \  data-win-res=\"{winControl: {labelOn:'ToggleOn',\n                        \
    \            labelOff:'ToggleOff',\n                                    title:'ShowMoreTilesTitle'}}\"\
    \n        data-win-options=\"\">\n    </div>\n    <br />\n    <div class=\"toggle\"\
    \ data-win-control=\"WinJS.UI.ToggleSwitch\"\n        data-win-res=\"{winControl:\
    \ {labelOn:'ToggleOn',\n                                    labelOff:'ToggleOff',\n\
    \                                    title:'VibrateOnCallTitle'}}\"\n        data-win-options=\"\
    \">\n    </div>\n    <br />\n    <div class=\"toggle\" data-win-control=\"WinJS.UI.ToggleSwitch\"\
    \n        data-win-res=\"{winControl: {labelOn:'ToggleOn',\n                 \
    \                   labelOff:'ToggleOff',\n                                  \
    \  title:'ShowArtistTitle'}}\"\n        data-win-options=\"\">\n    </div>\n</div>\n\
    ```\n\n注意，你使用了 `data-win-res` 并通过键名引用资源字符串，并将其分配给控件的属性。通常，其模式如下：\n\n```\ndata-win-res=\"\
    {winControl: {propertyName1:'resourceID1',\n                            propertyName2:'resourceID2'}}\"\
    \n```\n\n按 F5 并运行应用。最初，你会看到控件使用的英文字符串。更改设备的语言，然后再次运行应用。现在它将选取适当的资源文件并使用适当的资源字符串（参见图\
    \ 8-9 和图 8-10）。\n\n![A978-1-4842-0719-2_8_Fig11_HTML.jpg](img/A978-1-4842-0719-2_8_Fig11_HTML.jpg)\n\
    \n**图 8-11.** 英语区域设置的格式化输出\n\n![A978-1-4842-0719-2_8_Fig10_HTML.jpg](img/A978-1-4842-0719-2_8_Fig10_HTML.jpg)\n\
    \n**图 8-10.** 法语区域设置的格式化输出\n"
- fmt: "# Chapter 9: Data Storage and App Data\n\nThis chapter provides an overview\
    \ of the data storage techniques to store app data in a Windows 10 app. You will\
    \ learn about app settings, how to store and retrieve app settings as app data,\
    \ and working with app data folders.\n\nSo what is app data? Well, the data that\
    \ is specific to a particular app is known as app data. Generally, app data is\
    \ the user’s preferences, the app’s configuration, the app’s state, and so forth,\
    \ which are alterable.\n\nWhen you install an app on a device, the app creates\
    \ app data on it. But what happens when you remove or uninstall the app from the\
    \ device? Well, when an app is uninstalled, the app data is removed from the device.\
    \ So it is recommended not to store the user’s data (such as the user’s pictures)\
    \ as app data.\n\nThe other type of data that your app creates is user data. User\
    \ data is created by the user, such as documents, pictures, video files, audio\
    \ files, and so forth.\n\n## 9.1 How to Create and Delete a Local App Data Settings\
    \ Container\n\n### Problem\n\nYou need to create and delete a local app data store\
    \ container in the app data store of your Windows 10 app.\n\n### Solution\n\n\
    Use `Windows.Storage.ApplicationData.current.LocalSettings.createContainer` to\
    \ create the local app settings container in the local app data store.\n\n###\
    \ How It Works\n\nThe container allows you to organize your app data settings;\
    \ for example, you can create a container called `Greeting_Data_Container` to\
    \ store all the greetings for your app. Create another container, called `UserPreference_Container`,\
    \ to store all the user preferences settings for your app users. You can add a\
    \ container to the local settings and the roaming settings. A container can also\
    \ have another container in it. Universal Windows apps allow you to create up\
    \ to 32 nested levels of containers.\n\nCreate a new project using the Windows\
    \ Universal (Blank App) template in Microsoft Visual Studio 2015. This creates\
    \ a Windows Universal app, which can be run on PCs, tablets, and Windows Phones\
    \ running Windows 10. Open the `default.html` page from the project in Visual\
    \ Studio Solution Explorer. Define an HTML tag for a button within the `<body>`\
    \ tag of `default.html`.\n\n```html\n<div id=\"titleBarContent\" style=\"width:\
    \ 100%;height:30px; background:border-box darkblue; overflow: hidden; z-index:\
    \ 3\">\n    <i>App Settings Admin Screen</i>\n</div>\n<span> Click on the button\
    \ to Create a local app data settings container</span>\n<input type=\"button\"\
    \ value=\"Local Data Demo\" id=\"btnLocalData\" />\n<h3><span id=\"msgspan\"></span></h3>\n\
    ```\n\nThe complete `default.html` code will look like this:\n\n```html\n<!DOCTYPE\
    \ html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe9.1</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-dark.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe9.1 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    </head>\n<body class=\"win-type-body\">\n    <div id=\"titleBarContent\" style=\"\
    width: 100%;height:30px; background:border-box darkblue; overflow: hidden; z-index:\
    \ 3\">\n        <i>App Settings Admin Screen</i>\n    </div>\n    <span> Click\
    \ on the button to Create a local app data settings container</span>\n    <input\
    \ type=\"button\" value=\"Local Data Demo\" id=\"btnCreateContainer\" />\n   \
    \ <h3><span id=\"msgspan\"></span></h3>\n</body>\n</html>\n```\n\nRight-click\
    \ the project’s `js` folder in Solution Explorer and add a `js` file in the project’s\
    \ `js` folder by using the Add ➤ New JavaScript file. Provide a name for the file.\
    \ In this example, let’s name the file `DatastorageDemo.js`. Refer to this file\
    \ in `default.html` by adding the following code to the `<head>` tag:\n\n```html\n\
    <script src=\"js/DatastorageDemo.js\"></script>\n```\n\nAdd the following code\
    \ to the newly created `js` file:\n\n```javascript\n(function () {\n    \"use\
    \ strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var localSettingsButton = document.getElementById(\"btnCreateContainer\"\
    );\n            localSettingsButton.addEventListener(\"click\", btnCreateContainerClick,\
    \ false);\n        });\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , GetControl);\n})();\n```\n\nThis code gets the button element and binds an event\
