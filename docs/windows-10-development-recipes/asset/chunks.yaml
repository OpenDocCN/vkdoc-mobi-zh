    \ Adaptive Tile”按钮。这会在 3 秒后向磁贴发送一个通知。你可以通过查看磁贴标题和文本来验证效果，它们会在计划时间发生变化。\n\n在本节中，你已成功在计划时间向\
    \ UWP 应用磁贴发送了更新。当需要根据内容变化（例如天气应用、邮件应用、旅行日程应用等）发送动态更新时，计划更新非常有用。\n\n## 14.6 在磁贴上创建或更新徽章\n\
    \n### 问题\n\n你想要向磁贴添加一个徽章。\n\n### 解决方案\n\n在磁贴 XML 负载中使用 `<badge>` 元素来显示徽章。使用 `BadgeNotification`\
    \ 来创建徽章。\n\n### 工作原理\n\n在现有项目中，我们将添加一个额外的方法 `UpdateTileBadge`，以演示如何在磁贴上创建徽章更新。打开\
    \ `LoadTileandNotifications.js` 并添加以下方法：\n\n```\n  function UpdateTileBadge()\n\
    \    {\n        AddAdaptiveTiles();\n\n        var badgeXml = \"<badge value=\\\
    \"alarm\\\"/>\";\n        var badgeDom = Windows.Data.Xml.Dom.XmlDocument();\n\
    \        badgeDom.loadXml(badgeXml);\n\n        var notifications = Windows.UI.Notifications;\n\
    \        var badgeNotification = new notifications.BadgeNotification(badgeDom);\n\
    \n        notifications.BadgeUpdateManager.createBadgeUpdaterForApplication().update(badgeNotification);\n\
    \    }\n```\n\n在此方法中，我们调用 `AdaptiveTiles()` 方法来显示自适应磁贴。\n\n然后，我们添加 `badgeXML`，其中包含用于在磁贴上显示闹钟徽章的\
    \ XML 负载。在 `badgeXml` 中，我们将徽章的值设置为“Alarm”。\n\n接着，我们创建一个 `Windows.UI.Notifications.BadgeNotification`\
    \ 类型的 `badgeNotifications` 对象，并传入徽章通知的 XML。\n\n之后，调用 `createBadgeUpdaterForApplication.update()`\
    \ 方法，用徽章通知更新磁贴。\n\n现在，打开 `default.html` 并添加一个新按钮，用于测试 `UpdateTileBadge()` 方法更新磁贴徽章的功能。\n\
    \n```\n<p> <input type=\"button\" value=\"Update Badge\" id=\"btnUpdateBadge\"\
    \ />\n        <br />\n    </p>\n```\n\n接下来，打开 `LoadTileandNotifications.js`，用以下代码行更新\
    \ `GetControl()` 方法：\n\n```\nvar badgeUpdatebutton = document.getElementById(\"\
    btnUpdateBadge\");\n            badgeUpdatebutton.addEventListener(\"click\",\
    \ UpdateTileBadge, false);\n```\n\n这将为 `btnUpdateBadge` 按钮添加一个新的 `onclick` 事件处理程序，并将\
    \ `UpdateTileBadge` 方法与按钮点击事件关联起来，以便在点击“Update Badge”按钮时执行该方法。\n\n编译并运行此应用后，在\
    \ `default.html` 页面上点击“Update Badge”按钮。这将更新磁贴，应用磁贴会显示一个徽章，并在右下角显示一个 Windows 闹钟图标，如图\
    \ 14-5 所示。\n\n![A978-1-4842-0719-2_14_Fig5_HTML.jpg](img/A978-1-4842-0719-2_14_Fig5_HTML.jpg)\n\
    \n图 14-5.\n\n在 Windows UWP 自适应磁贴上的徽章通知\n\n徽章 XML 中可以指定不同类型的 Windows 图标，例如 alarm（闹钟）、alert（警报）、available（可用）、error（错误）、paused（暂停）、new\
    \ message（新消息）等。\n\n**注意：** 在 UWP 应用中，徽章显示在右下角。\n\n在本章中，你已经学习了 UWP 应用磁贴的相关知识、更新磁贴的多种方法、如何通过磁贴添加通知，以及如何动态更新自适应磁贴的内容。\n\
    \n# 第 15 章：设备功能\n\n本章概述了 Windows 10 应用中的设备功能。你还将学习如何在 UWP 应用中开发蓝牙、文本转语音、语音转文本以及传感器功能。本章还概述了应用中集成\
    \ Cortana 的相关内容。\n\n## 15.1 如何在应用包清单中指定设备功能\n\n### 问题\n\n你需要指定 Windows 10 应用所需的不同设备功能。\n\
    \n### 解决方案\n\n使用应用包清单文件来指定 `DeviceCapability` 元素及其相关的子元素。\n"
- fmt: "### How It Works\n\nOpen the project that you are working on for your Windows\
    \ 10 app in Visual Studio 2015. From Solution Explorer, locate the `Package.appmanifest`\
    \ file. Double-click the file to open it. Click the Capabilities tab. Select the\
    \ device capabilities that your app will use. This adds the capabilities list\
    \ in the application (see Figure [15-1](#A978-1-4842-0719-2_15_Chapter.html#Fig1)).\n\
    \n![A978-1-4842-0719-2_15_Fig1_HTML.jpg](A978-1-4842-0719-2_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1. Capabilities tab in app `package.appmanifest` file\n\nYou can also\
    \ open the app `package.appmanifest` file in an XML editor and add the device\
    \ capabilities using the `<Capability>` element under the `<Capabilities>` element;\
    \ for example:\n\n```\n<Capabilities>\n    <Capability Name=\"internetClient\"\
    \ />\n    <Capability Name=\"allJoyn\" />\n    <Capability Name=\"codeGeneration\"\
    \ />\n    <Capability Name=\"internetClientServer\" />\n    <uap:Capability Name=\"\
    blockedChatMessages\" />\n    <uap:Capability Name=\"chat\" />\n    <uap:Capability\
    \ Name=\"videosLibrary\" />\n    <uap:Capability Name=\"phoneCall\" />\n    <uap:Capability\
    \ Name=\"removableStorage\" />\n    <DeviceCapability Name=\"microphone\" />\n\
    \    <DeviceCapability Name=\"webcam\" />\n</Capabilities>\n```\n\nIn this example,\
    \ the following capabilities were enabled for the app to use: chat, video library,\
    \ phone call, and removable data storage such as USB drives, microphones, and\
    \ webcams. Please note that there are a few capabilities, like the webcam, that\
    \ cannot be specified using the `package.manifest` visual interface. You have\
    \ to do this using a code file.\n\n## 15.2 How to Specify Device Capabilities\
    \ for Bluetooth for Windows Apps\n\n### Problem\n\nYou need to access the Bluetooth\
    \ device in your Windows 10 app.\n\n### Solution\n\nUse the `DeviceCapability`\
    \ element of `package.manifest` to define the device capabilities for accessing\
    \ a Bluetooth device. This is for both Bluetooth Rfcomm and Gatt APIs.\n\n###\
    \ How It Works\n\nOpen your Windows Universal Windows app project in Visual Studio\
    \ 2015. From Solution Explorer, locate the `Package.appmanifest` file. Right-click\
    \ and open the `Package.appmanifest` file in the XML editor. Locate the `<Capabilities>`\
    \ section. Add the following elements under `<Capabilities>`:\n\n```\n<DeviceCapability\
    \ Name=\"bluetooth.rfcomm\">\n  <Device Id=\"any\">\n    <Function Type=\"name:obexObjectPush\"\
    />\n    <Function Type=\"name:serialPort\"/>\n    <Function Type=\"name:genericFileTransfer\"\
    />\n  </Device>\n</DeviceCapability>\n```\n\nIn the preceding code, the `<DeviceCapability>`\
    \ element has the `Name` attribute, which is specified as `\"bluetooth.rfcomm\"\
    ` for accessing a Bluetooth RFCOMM device. The `<Device>` element is set to `\"\
    any\"` to allow access to any device that matches the function types specified\
    \ in the `<function>` elements.\n\nThe `<DeviceCapability>` can also be used to\
    \ specify device capabilities for a Bluetooth GATT device, as shown in the following\
    \ code snippet:\n\n```\n<DeviceCapability Name=\"bluetooth.genericAttributeProfile\"\
    >\n  <Device Id=\"any\">\n    <Function Type=\"name:battery\"/>\n    <Function\
    \ Type=\"name:bloodPressure\"/>\n    <Function Type=\"serviceId:aaaaaaa\"/>\n\
    \  </Device>\n</DeviceCapability>\n```\n\nIn the preceding code, `DeviceCapabilities`\
    \ for a Bluetooth GATT \"any\" device support mentioned functions with specified\
    \ service names and service ids.\n\n## 15.3 How to Find Devices Available for\
    \ a UWP App\n\n### Problem\n\nYou want to get a list of devices that are connected\
    \ to a system—externally connected or available for a UWP app.\n\n### Solution\n\
    \nUse the `Windows.Devices.Enumeration.DevicePicker` class to enumerate through\
    \ devices that are discoverable by the app.\n\n### How It Works\n\nCreate a new\
    \ project using the Windows Universal (Blank App) template in Microsoft Visual\
    \ Studio 2015.\n\nOpen the `default.html` page from the project in Visual Studio\
    \ Solution explorer. Add the following HTML markup to display a button and label:\n\
    \n```\n<body class=\"win-type-body\">\n    <div>\n        <h2 id=\"sampleHeader\"\
    \ class=\"win-type-subheader\">Description:</h2>\n        <div id=\"scenarioDescription\"\
    >\n            Recipe to demo DevicePicker to allows users of your app to pick\
    \ a device\n        </div>\n    </div>\n    <div id=\"scenarioContent\">\n   \
    \     <button id=\"showDevicePickerButton\" >Show Device Picker</button>\n   \
    \ </div>\n</body>\n```\n\nRight-click the `js` folder from Solution Explorer.\
    \ Add a `DevicePicker.js` JavaScript file. Add a reference to this `js` file in\
    \ `default.html`:\n\n```html\n<script src=\"/js/DevicePicker.js\"></script>\n\
    ```\n\nOpen the `devicePicker.js` in Visual Studio and add the following script:\n\
    \n```javascript\n(function () {\n    \"use strict\";\n    var DevEnum = Windows.Devices.Enumeration;\n\
    \    var devicePicker = null;\n    var page = WinJS.UI.Pages.define(\"../default.html\"\
    , {\n        ready: function (element, options) {\n            // Hook up button\
    \ event handlers\n            document.getElementById(\"showDevicePickerButton\"\
    ).addEventListener(\"click\", showDevicePicker, false);\n        }\n    });\n\
    ```\n\nIn the preceding code, we have declared a variable of type `Windows.Devices.Enumeration`.\
    \ This object will be later used to create the `DevicePicker` object. The `page`\
    \ variable is used to bind the rest of the `js` script to the default page when\
    \ its DOM is loaded. In the `ready()` function, we bind an event handler, `showDevicePicker`,\
    \ to the `showDevicePickerButton` button.\n\nAdd the following `showDevicePicker()`\
    \ method, which will get the devices available:\n\n```javascript\n    function\
    \ showDevicePicker() {\n        var buttonRect;\n        devicePicker = new DevEnum.DevicePicker();\n\
    \        buttonRect = document.getElementById(\"showDevicePickerButton\").getBoundingClientRect();\n\
    \        var rect = { x: buttonRect.left, y: buttonRect.top, width: buttonRect.width,\
    \ height: buttonRect.height };\n        // Show the picker\n        devicePicker.show(rect);\n\
    \    }\n})();\n```\n\nIn the `showDevicePicker()` event handler, which is called\
    \ on click of `showDevicePickerButton` button, we create a `Windows.Devices.Enumeration.DevicePicker`\
    \ object and create a rectangle object to show the picker UI output.\n\nCompile\
    \ this project and run it using the Mobile emulator to get a list of all the devices,\
    \ as shown in Figure [15-2](#A978-1-4842-0719-2_15_Chapter.html#Fig2).\n\n![A978-1-4842-0719-2_15_Fig2_HTML.jpg](A978-1-4842-0719-2_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2. Get enumeration of all devices available to app on system\n\n##\
    \ 15.4 How to Create an Audio Stream and Output Speech Based on Plain Text\n\n\
    ### Problem\n\nYou need to add a voice facility in your app to allow it to read\
    \ text.\n\n### Solution\n\nUse `Windows.Media.SpeechSynthesis.SpeechSynthesizer()`\
    \ to develop audio/voice output based on text in your UWP app."
  raw: '### How It Works


    Open the project that you are working on for your Windows 10 app in Visual Studio
    2015.


    From Solution Explorer, locate the `Package.appmanifest` file. Double-click the
    file to open it. Click the Capabilities tab. Select the device capabilities that
    your app will use. This adds the capabilities list in the application (see Figure
    [15-1](#A978-1-4842-0719-2_15_Chapter.html#Fig1)).


    ![A978-1-4842-0719-2_15_Fig1_HTML.jpg](A978-1-4842-0719-2_15_Fig1_HTML.jpg)


    Figure 15-1.


    Capabilities tab in app package.appmanifest file


    You can also open the app `package.appmanifest` file in an XML editor and add
    the device capabilities using the `<Capability>` element under the `<Capabilities>`
    element; for example:


    `<Capabilities>`


        `<Capability Name="internetClient" />`


        `<Capability Name="allJoyn" />`


        `<Capability Name="codeGeneration" />`


        `<Capability Name="internetClientServer" />`


        `<uap:Capability Name="blockedChatMessages" />`


        `<uap:Capability Name="chat" />`


        `<uap:Capability Name="videosLibrary" />`


        `<uap:Capability Name="phoneCall" />`


        `<uap:Capability Name="removableStorage" />`


        `<DeviceCapability Name="microphone" />`


        `<DeviceCapability Name="webcam" />`


      `</Capabilities>`


    In this example, the following capabilities were enabled for the app to use: chat,
    video library, phone call, and removable data storage such as USB drives, microphones,
    and webcams. Please note that there are a few capabilities, like the webcam, that
    cannot be specified using the `package.manifest` visual interface. You have to
    do this using a code file.


    ## 15.2 How to Specify Device Capabilities for Bluetooth for Windows Apps


    ### Problem


    You need to access the Bluetooth device in your Windows 10 app.


    ### Solution


    Use the `DeviceCapability` element of `package.manifest` to define the device
    capabilities for accessing a Bluetooth device. This is for both Bluetooth Rfcomm
    and Gatt APIs.


    ### How It Works


    Open your Windows Universal Windows app project in Visual Studio 2015.   From
    Solution Explorer, locate the `Package.appmanifest` file. Right-click and open
    the `Package.appmanifest` file in the XML editor.   Locate the `<Capabilities>`
    section. Add the following elements under `<Capabilities>:`  


    `<DeviceCapability Name="bluetooth.rfcomm">`


      `<Device Id="any">`


        `<Function Type="name:obexObjectPush"/>`


        `<Function Type="name:serialPort"/>`


        `<Function Type="name:genericFileTransfer"/>`


      `</ Device>`


    `</DeviceCapability>`


    In the preceding code, the `<DeviceCapability>` element has the `Name` attribute,
    which is specified as "`bluetooth.rfcomm`" for accessing a Bluetooth RFCOMM device.
    The `<Device>` element is set to `"any"` to allow access to any device that matches
    the function types specified in the `<function>` elements.


    The `<DeviceCapability>` can also be used to specify device capabilities for a
    Bluetooth GATT device, as shown in the following code snippet:


    `<DeviceCapability Name="bluetooth.genericAttributeProfile">`


      `<Device Id="any">`


        `<Function Type="name:battery"/>`


        `<Function Type="name:bloodPressure"/>`


        `<Function Type=”serviceId:aaaaaaa”/>`


      `</ Device>`


    `</DeviceCapability>`


    In the preceding code, DeviceCapabilities for a Bluetooth GATT “any” device support
    mentioned functions with specified service names and service ids.


    ## 15.3 How to Find Devices Available for a UWP App


    ### Problem


    You want to get a list of devices that are connected to a system—externally connected
    or available for a UWP app.


    ### Solution


    Use the `Windows.Devices.Enumeration.DevicePicker` class to enumerate through
    devices that are discoverable by the app.


    ### How It Works


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015.


    Open the default.html page from the project in Visual Studio Solution explorer.
    Add the following HTML markup to display a button and label:


    `<body class="win-type-body">`


        `<div>`


            `<h2 id="sampleHeader" class="win-type-subheader">Description:</h2>`


            `<div id="scenarioDescription">`


                `Recipe to demo DevicePicker to allows users of your app to pick a
    device`


            `</div>`


        `</div>`


        `<div id="scenarioContent">`


            `<button id="showDevicePickerButton" >Show Device Picker</button>`


        `</div>`


    `</body>`


    Right-click the `js` folder from Solution Explorer. Add a `DevicePicker.js` JavaScript
    file. Add a reference to this `js` file in `default.html`.


    `<script src="/js/DevicePicker.js"></script>`


    Open the `devicePicker.js` in Visual Studio and add the following script:


    `(function () {`


        `"use strict";`


        `var DevEnum = Windows.Devices.Enumeration;`


        `var devicePicker = null;`


        `var page = WinJS.UI.Pages.define("../default.html", {`


            `ready: function (element, options) {`


    `// Hook up button event handlers`


                            `document.getElementById("showDevicePickerButton").addEventListener("click",
    showDevicePicker, false);`


    `}`


        `});`


    In the preceding code, we have declared a variable of type `Windows.Devices.Enumeration`.
    This object will be later used to create the `DevicePicker` object.


    The `page` variable is used to bind the rest of the `js` script to the default
    page when its DOM is loaded.


    In the `ready()` function, we bind an event handler, `showDevicePicker`, to the
    `showDevicePickerButton` button.


    Add the following `showDevicePicker()` method, which will get the devices available:


        `function showDevicePicker() {`


              `var buttonRect;`


            `devicePicker = new DevEnum.DevicePicker();`


            `buttonRect = document.getElementById("showDevicePickerButton").getBoundingClientRect();`


            `var rect = { x: buttonRect.left, y: buttonRect.top, width: buttonRect.width,
    height: buttonRect.height };`


                `// Show the picker`


                `devicePicker.show(rect);`


    `}`


    `})();`


    In the `showDevicePicker()`event handler, which is called on click of `showDevicePickerButton`
    button, we create a `Windows.Devices.Enumeration.DevicePicker` object and create
    a rectangle object to show the picker UI output.


    Compile this project and run it using the Mobile emulator to get a list of all
    the devices, as shown in Figure [15-2](#A978-1-4842-0719-2_15_Chapter.html#Fig2).


    ![A978-1-4842-0719-2_15_Fig2_HTML.jpg](A978-1-4842-0719-2_15_Fig2_HTML.jpg)


    Figure 15-2.


    Get enumeration of all devices available to app on system


    ## 15.4 How to Create an Audio Stream and Output Speech Based on Plain Text


    ### Problem


    You need to add a voice facility in your app to allow it to read text.


    ### Solution


    Use `Windows.Media.SpeechSynthesis.SpeechSynthesizer()` to develop audio/voice
    output based on text in your UWP app.'
  trans: "\n### 工作原理\n\n在 Visual Studio 2015 中打开你正在开发的 Windows 10 应用项目。在解决方案资源管理器中，找到\
    \ `Package.appmanifest` 文件。双击该文件将其打开。点击“功能”选项卡。选择你的应用将使用的设备功能。这将在应用程序中添加功能列表（见图\
    \ 15-1）。\n\n![A978-1-4842-0719-2_15_Fig1_HTML.jpg](img/A978-1-4842-0719-2_15_Fig1_HTML.jpg)\n\
    \n图 15-1. 应用 `Package.appmanifest` 文件中的“功能”选项卡\n\n你也可以在 XML 编辑器中打开应用的 `Package.appmanifest`\
    \ 文件，并使用 `<Capabilities>` 元素下的 `<Capability>` 元素来添加设备功能。例如：\n\n```\n<Capabilities>\n\
    \    <Capability Name=\"internetClient\" />\n    <Capability Name=\"allJoyn\"\
    \ />\n    <Capability Name=\"codeGeneration\" />\n    <Capability Name=\"internetClientServer\"\
    \ />\n    <uap:Capability Name=\"blockedChatMessages\" />\n    <uap:Capability\
    \ Name=\"chat\" />\n    <uap:Capability Name=\"videosLibrary\" />\n    <uap:Capability\
    \ Name=\"phoneCall\" />\n    <uap:Capability Name=\"removableStorage\" />\n  \
    \  <DeviceCapability Name=\"microphone\" />\n    <DeviceCapability Name=\"webcam\"\
    \ />\n</Capabilities>\n```\n\n在这个例子中，启用了以下供应用使用的功能：聊天、视频库、电话以及可移动数据存储（例如 USB 驱动器、麦克风和网络摄像头）。请注意，有些功能（如网络摄像头）无法通过\
    \ `Package.manifest` 的可视化界面来指定，而必须通过代码文件来实现。\n\n## 15.2 如何为 Windows 应用的蓝牙指定设备功能\n\
    \n### 问题\n\n你需要在 Windows 10 应用中访问蓝牙设备。\n\n### 解决方案\n\n使用 `Package.manifest` 中的\
    \ `DeviceCapability` 元素来定义访问蓝牙设备的设备功能。此方法同时适用于蓝牙 Rfcomm 和 Gatt API。\n\n### 工作原理\n\
    \n在 Visual Studio 2015 中打开你的 Windows 通用 Windows 应用项目。在解决方案资源管理器中，找到 `Package.appmanifest`\
    \ 文件。右键单击该文件，在 XML 编辑器中打开 `Package.appmanifest`。找到 `<Capabilities>` 部分。在 `<Capabilities>`\
    \ 下添加以下元素：\n\n```\n<DeviceCapability Name=\"bluetooth.rfcomm\">\n  <Device Id=\"\
    any\">\n    <Function Type=\"name:obexObjectPush\"/>\n    <Function Type=\"name:serialPort\"\
    />\n    <Function Type=\"name:genericFileTransfer\"/>\n  </Device>\n</DeviceCapability>\n\
    ```\n\n在上述代码中，`<DeviceCapability>` 元素的 `Name` 属性被指定为 `\"bluetooth.rfcomm\"`，用于访问蓝牙\
    \ RFCOMM 设备。`<Device>` 元素设置为 `\"any\"`，以允许访问与 `<function>` 元素中指定的功能类型相匹配的任何设备。\n\
    \n`<DeviceCapability>` 也可用于为蓝牙 GATT 设备指定设备功能，如下面的代码片段所示：\n\n```\n<DeviceCapability\
    \ Name=\"bluetooth.genericAttributeProfile\">\n  <Device Id=\"any\">\n    <Function\
    \ Type=\"name:battery\"/>\n    <Function Type=\"name:bloodPressure\"/>\n    <Function\
    \ Type=\"serviceId:aaaaaaa\"/>\n  </Device>\n</DeviceCapability>\n```\n\n在上述代码中，针对蓝牙\
    \ GATT \"any\" 设备的 `DeviceCapabilities` 支持具有指定服务名称和服务 ID 的所述功能。\n\n## 15.3 如何查找\
    \ UWP 应用可用的设备\n\n### 问题\n\n你希望获取连接到系统的设备列表——无论是外部连接的设备还是对 UWP 应用可用的设备。\n\n###\
    \ 解决方案\n\n使用 `Windows.Devices.Enumeration.DevicePicker` 类来枚举应用可发现的设备。\n\n### 工作原理\n\
    \n使用 Microsoft Visual Studio 2015 中的 Windows 通用（空白应用）模板创建新项目。\n\n在 Visual Studio\
    \ 解决方案资源管理器中，打开项目中的 `default.html` 页面。添加以下 HTML 标记以显示一个按钮和标签：\n\n```\n<body class=\"\
    win-type-body\">\n    <div>\n        <h2 id=\"sampleHeader\" class=\"win-type-subheader\"\
    >描述：</h2>\n        <div id=\"scenarioDescription\">\n            演示 DevicePicker\
    \ 的示例，允许你的应用用户选择设备\n        </div>\n    </div>\n    <div id=\"scenarioContent\"\
    >\n        <button id=\"showDevicePickerButton\" >显示设备选择器</button>\n    </div>\n\
    </body>\n```\n\n在解决方案资源管理器中右键单击 `js` 文件夹。添加一个名为 `DevicePicker.js` 的 JavaScript\
    \ 文件。在 `default.html` 中添加对此 `js` 文件的引用：\n\n```html\n<script src=\"/js/DevicePicker.js\"\
    ></script>\n```\n\n在 Visual Studio 中打开 `devicePicker.js`，并添加以下脚本：\n\n```javascript\n\
    (function () {\n    \"use strict\";\n    var DevEnum = Windows.Devices.Enumeration;\n\
    \    var devicePicker = null;\n    var page = WinJS.UI.Pages.define(\"../default.html\"\
    , {\n        ready: function (element, options) {\n            // 挂钩按钮事件处理程序\n\
    \            document.getElementById(\"showDevicePickerButton\").addEventListener(\"\
    click\", showDevicePicker, false);\n        }\n    });\n```\n\n在上述代码中，我们声明了一个类型为\
    \ `Windows.Devices.Enumeration` 的变量。稍后将使用此对象来创建 `DevicePicker` 对象。`page` 变量用于在\
    \ DOM 加载完成后，将剩余的 `js` 脚本绑定到默认页面。在 `ready()` 函数中，我们将一个名为 `showDevicePicker` 的事件处理程序绑定到\
    \ `showDevicePickerButton` 按钮。\n\n添加以下 `showDevicePicker()` 方法，该方法将获取可用的设备：\n\n\
    ```javascript\n    function showDevicePicker() {\n        var buttonRect;\n  \
    \      devicePicker = new DevEnum.DevicePicker();\n        buttonRect = document.getElementById(\"\
    showDevicePickerButton\").getBoundingClientRect();\n        var rect = { x: buttonRect.left,\
    \ y: buttonRect.top, width: buttonRect.width, height: buttonRect.height };\n \
    \       // 显示选择器\n        devicePicker.show(rect);\n    }\n})();\n```\n\n在 `showDevicePicker()`\
    \ 事件处理程序中（该处理程序在点击 `showDevicePickerButton` 按钮时被调用），我们创建了一个 `Windows.Devices.Enumeration.DevicePicker`\
    \ 对象，并创建一个矩形对象来显示选择器 UI 输出。\n\n编译此项目并使用移动仿真器运行，以获取所有设备的列表，如图 15-2 所示。\n\n![A978-1-4842-0719-2_15_Fig2_HTML.jpg](img/A978-1-4842-0719-2_15_Fig2_HTML.jpg)\n\
    \n图 15-2. 获取系统上应用可用的所有设备的枚举列表\n\n## 15.4 如何创建音频流并基于纯文本输出语音\n\n### 问题\n\n你需要在应用中添加语音功能，使其能够朗读文本。\n\
    \n### 解决方案\n\n使用 `Windows.Media.SpeechSynthesis.SpeechSynthesizer()` 在你的 UWP 应用中基于文本开发音频/语音输出。\n"
- fmt: "### How It Works\n\nMicrosoft has provided predefined voices that can be used\
    \ to synthesize speech in a single language.\n\nCreate a new project using the\
    \ Windows Universal (Blank App) template in Microsoft Visual Studio 2015. In the\
    \ project `package.appmanifest` file, click the Capabilities tab and select the\
    \ Microphone and Internet check boxes. This allows the app to use the audio feed.\n\
    \nOpen the `default.html` page from the project in Visual Studio Solution Explorer.\
    \ Add the following HTML markup within the `<body>` tag of `default.html`.\n\n\
    ```html\n<body class=\"win-type-body\">\n    <div id=\"scenarioView\">\n     \
    \   <div>\n            <h2 id=\"sampleHeader\" class=\"win-type-subheader\">Convert\
    \ text to speech.</h2>\n        </div>\n        <div id=\"scenarioContent\">\n\
    \            <button id=\"btnSpeak\" class=\"win-button\">Speak</button>\n   \
    \         <select id=\"voicesSelect\" class=\"win-dropdown\"></select>\n     \
    \       <textarea id=\"textToSynthesize\" style=\"width: 100%\" name=\"textToSynthesize\"\
    \ class=\"win-textarea\"> Hello World! This is an example of Windows 10 Universal\
    \ Windows App Recipes</textarea>\n            <p id=\"errorTextArea\"></p>\n \
    \       </div>\n    </div>\n    <div id=\"contentWrapper\">\n        <div id=\"\
    contentHost\"></div>\n        <div id=\"statusBox\">\n            Status:\n  \
    \          <div id=\"statusMessage\"></div>\n        </div>\n    </div>\n</body>\n\
    ```\n\nWhen the app is started in the Mobile emulator in debug mode, what’s shown\
    \ in Figure [15-3](#A978-1-4842-0719-2_15_Chapter.html#Fig3) is displayed.\n\n\
    ![A978-1-4842-0719-2_15_Fig3_HTML.jpg](A978-1-4842-0719-2_15_Fig3_HTML.jpg)\n\n\
    **Figure 15-3.** Text to speech GUI with drop-down list to select the language\n\
    \nAs you can see, four main controls were added:\n\n- A **Speak** button\n- A\
    \ drop-down list to allow users to select available languages\n- A text box that\
    \ contains predefined text. This text is converted to audio by the app\n- A **Status**\
    \ label that displays a message when voice is played and stopped\n\nRight-click\
    \ the project in Solution Explorer and select Add ➤ New JavaScript file. Provide\
    \ a name for the file. In this example, let’s name the file `SpeechSynthesise.js`.\
    \ Add the following code in the file:\n\n```javascript\nvar page = WinJS.UI.Pages.define(\"\
    ../default.html\", {\n    ready: function (element, options) {\n        try {\n\
    \            synthesizer = new Windows.Media.SpeechSynthesis.SpeechSynthesizer();\n\
    \            audio = new Audio();\n            var btnSpeak = document.getElementById(\"\
    btnSpeak\");\n            var voicesSelect = document.getElementById(\"voicesSelect\"\
    );\n            btnSpeak.addEventListener(\"click\", speakFn, false);\n      \
    \      voicesSelect.addEventListener(\"click\", setVoiceFunction, false);\n  \
    \          var rcns = Windows.ApplicationModel.Resources.Core;\n            context\
    \ = new rcns.ResourceContext();\n            context.languages = new Array(synthesizer.voice.language);\n\
    \            listbox_GetVoices();\n            audio_SetUp();\n        } catch\
    \ (exception) {\n            if (exception.number == -2147467263) { // E_NOTIMPL\n\
    \                // If media player components aren't installed (for example,\
    \ when using an N SKU of windows)\n                // this error may occur when\
    \ instantiating the Audio object.\n                statusMessage.innerText = \"\
    Media Player components are not available.\";\n                statusBox.style.backgroundColor\
    \ = \"red\";\n                btnSpeak.disabled = true;\n                textToSynthesize.disabled\
    \ = true;\n            }\n        }\n    },\n    unload: function (element, options)\
    \ {\n        if (audio != null) {\n            audio.onpause = null;\n       \
    \     audio.pause();\n        }\n    }\n});\n```\n\nDeclare the following variables:\n\
    \n```javascript\nvar synthesizer;\nvar audio;\n// localization resources\nvar\
    \ context;\nvar resourceMap;\n```\n\nThe `ready()` function is executed when DOM\
    \ is loaded for the `default.html` page on the device where the app is loaded.\
    \ In this function, create a local `synthesizer` object of type `Windows.Media.SpeechSynthesis.SpeechSynthesizer()`,\
    \ which provides access to the functionality of an installed speech synthesis\
    \ engine on a Microsoft device and controls the speech synthesis engine (voice).\n\
    \nThe second object is `audio`, which is for playing audio. Then we associate\
    \ event listeners for the **Speak** button and `voicesSelect` drop-down HTML controls.\n\
    \nWe also create a local `rcns` object of type `Windows.ApplicationModel.Resources.Core`.\
    \ This object is used to enumerate all available resources in the device. It is\
    \ later used to get installed voices and display them using drop-down controls.\n\
    \nIn the preceding code, we also declare local variables that are used in other\
    \ methods called on-click of the **Speak** button and the `voicesSelect` drop-down\
    \ list. Notice that we are also catching an exception in case the media player\
    \ components are missing in the device and audio cannot be played. If an exception\
    \ occurs, we capture it and display the `StatusMessage` error message in the HTML\
    \ `div` object.\n\nAdd the following method:\n\n```javascript\nfunction audio_SetUp()\
    \ {\n    audio.onplay = function () { // executes when the voice begins playing\n\
    \        statusMessage.innerText = \"Playing\";\n    };\n    audio.onpause = function\
    \ () { // executes when the user presses the stop button\n        statusMessage.innerText\
    \ = \" Audio Completed\";\n        btnSpeak.innerText = \"Speak\";\n    };\n \
    \   audio.onended = function () { // executes when the voice finishes playing\n\
    \        statusMessage.innerText = \"Completed\";\n        btnSpeak.innerText\
    \ = \"Speak\";\n        voicesSelect.disabled = false;\n    };\n}\n```\n\nThe\
    \ `audio_SetUp()` method sets up the voice element's events so the app UI updates\
    \ based on the current state of voice playback.\n\nNext, add the following method:\n\
    \n```javascript\nfunction speakFn() {\n    var btnSpeak = document.getElementById(\"\
    btnSpeak\");\n    if (btnSpeak.innerText == \"Stop\") {\n        voicesSelect.disabled\
    \ = false;\n        audio.pause();\n        return;\n    }\n    // Changes the\
    \ button label. You could also just disable the button if you don't want any user\
    \ control.\n    voicesSelect.disabled = true;\n    btnSpeak.innerText = \"Stop\"\
    ;\n    statusBox.style.backgroundColor = \"green\";\n    // Creates a stream from\
    \ the text. This will be played using an audio element.\n    synthesizer.synthesizeTextToStreamAsync(textToSynthesize.value).done(\n\
    \        function (markersStream) {\n            // Set the source and start playing\
    \ the synthesized audio stream.\n            var blob = MSApp.createBlobFromRandomAccessStream(markersStream.ContentType,\
    \ markersStream);\n            audio.src = URL.createObjectURL(blob, { oneTimeOnly:\
    \ true });\n            markersStream.seek(0);\n            audio.play();\n  \
    \      },\n        function (error) {\n            errorMessage(error.message);\n\
    \        });\n}\n```\n\n`speakFn()` is the main method that is invoked when the\
    \ user clicks on the **Speak/Stop** button on the app. The `synthesizer.synthesizeTextToStreamAsync()`\
    \ method is used for converting the text in the text box into a Blob stream. It\
    \ then plays the stream through audio.\n\nNext, add the following method to allow\
    \ users to select different audio voice options from resources.\n\n```javascript\n\
    function setVoiceFunction() {\n    /// <summary>\n    /// This is called when\
    \ the user selects a voice from the drop down.\n    /// </summary>\n    if (voicesSelect.selectedIndex\
    \ !== -1) {\n        var allVoices = Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices;\n\
    \        // Use the selected index to find the voice.\n        var selectedVoice\
    \ = allVoices[voicesSelect.selectedIndex];\n        synthesizer.voice = selectedVoice;\n\
    \        // change the language of the sample text.\n        context.languages\
    \ = new Array(synthesizer.voice.language);\n    }\n}\n```\n\nIn this method, we\
    \ used `Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices()` to get all\
    \ installed speech synthesis engines (voices) in the `allVoices` object.\n\nNext,\
    \ add the following method to create items out of the device installed voices.\
    \ The voices are then displayed in a `voicesSelect` drop-down control.\n\n```javascript\n\
    function listbox_GetVoices() {\n    /// <summary>\n    /// This creates items\
    \ out of the system installed voices. The voices are then displayed in a listbox.\n\
    \    /// This allows the user to change the voice of the synthesizer in your app\
    \ based on their preference.\n    /// </summary>\n    // Get the list of all of\
    \ the voices installed on this machine.\n    var allVoices = Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices;\n\
    \    // Get the currently selected voice.\n    var defaultVoice = Windows.Media.SpeechSynthesis.SpeechSynthesizer.defaultVoice;\n\
    \    var voicesSelect = document.getElementById(\"voicesSelect\");\n    for (var\
    \ voiceIndex = 0; voiceIndex < allVoices.size; voiceIndex++) {\n        var currVoice\
    \ = allVoices[voiceIndex];\n        var option = document.createElement(\"option\"\
    );\n        option.text = currVoice.displayName + \" (\" + currVoice.language\
    \ + \")\";\n        voicesSelect.add(option, null);\n        // Check to see if\
    \ we're looking at the current voice and set it as selected in the listbox.\n\
    \        if (currVoice.id === defaultVoice.id) {\n            voicesSelect.selectedIndex\
    \ = voiceIndex;\n        }\n    }\n}\n```\n\nLastly, in case of any error message,\
    \ there is a generic `errorMessage()` method to display an error on the `errorTextArea`\
    \ object.\n\n```javascript\nfunction errorMessage(text) {\n    /// <summary>\n\
    \    /// Sets the specified text area with the error message details.\n    ///\
    \ </summary>\n    var errorTextArea = document.getElementById(\"errorTextArea\"\
    );\n    errorTextArea.innerText = text;\n}\n```\n\nOnce you are done creating\
    \ the `SpeechSynthesise.js` file, make sure that you add a reference in the `default.html`\
    \ file.\n\n```html\n<script src=\"/js/SpeechSynthesise.js\"></script>\n```\n\n\
    When you run the application in the Windows 10 Mobile emulator, the app opens\
    \ the `default.html` file. Press the **Speak** button to play the sound in the\
    \ current default voice. Update the value in the Status `div`, as shown in Figure\
    \ [15-4](#A978-1-4842-0719-2_15_Chapter.html#Fig4).\n\n![A978-1-4842-0719-2_15_Fig4_HTML.jpg](A978-1-4842-0719-2_15_Fig4_HTML.jpg)\n\
    \n**Figure 15-4.** Text to speech app\n\nIn this recipe, you learned how to convert\
    \ text to audio using the `Windows SpeechSynthesizer()` class. Note that you can\
    \ also specify text in the SSML language and pass it to an object of `Windows.Media.SpeechSynthesis.SpeechSynthesizer()`\
    \ to convert specified text into audio."
  raw: '### How It Works


    Microsoft has provided predefined voices that can be used to synthesize speech
    in a single language.


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015. In the project `package.appmanifest` file, click the Capabilities
    tab and select the Microphone and Internet check boxes. This allows the app to
    use the audio feed.


    Open the `default.html` page from the project in Visual Studio Solution Explorer.
    Add the following HTML markup within the `<body>` tag of `default.html`.


    `<body class="win-type-body">`


            `<div id="scenarioView">`


                `<div>`


                    `<h2 id="sampleHeader" class="win-type-subheader">>Convert text
    to speech.</h2>`


            `</div>`


        `<div id="scenarioContent">`


            `<button id="btnSpeak" class="win-button">Speak</button>`


            `<select id="voicesSelect" class="win-dropdown"></select>`


            `<textarea id="textToSynthesize" style="width: 100%" name="textToSynthesize"
    class="win-textarea"> Hello World! This is an example of Windows 10 Universal
    Windows App Recipes</textarea>`


            `<p id="errorTextArea"></p>`


        `</div>`


        `</div>`


        `<div id="contentWrapper">`


            `<div id="contentHost"></div>`


            `<div id="statusBox">`


                `Status:`


                `<div id="statusMessage"></div>`


            `</div>`


        `</div>`


    `</body>`


    When the app is started in the Mobile emulator in debug mode, what’s shown in
    Figure [15-3](#A978-1-4842-0719-2_15_Chapter.html#Fig3) is displayed.


    ![A978-1-4842-0719-2_15_Fig3_HTML.jpg](A978-1-4842-0719-2_15_Fig3_HTML.jpg)


    Figure 15-3.


    Text to speech GUI with drop-down list to select the language


    As you can see, four main controls were added:


    *   A Speak button

    *   A drop-down list to allow users to select available languages

    *   A text box that contains predefined text. This text is converted to audio
    by the app

    *   A Status label that displays a message when voice is played and stopped


    Right-click the project in Solution Explorer and select Add ➤ New JavaScript file.
    Provide a name for the file. In this example, let’s name the file SpeechSynthesise.
    js. Add the following code in the file:


    `var page = WinJS.UI.Pages.define("../default.html", {`


            `ready: function (element, options) {`


                `try {`


                    `synthesizer = new Windows.Media.SpeechSynthesis.SpeechSynthesizer();`


                    `audio = new Audio();`


                    `var btnSpeak = document.getElementById("btnSpeak");`


                    `var voicesSelect = document.getElementById("voicesSelect");`


                    `btnSpeak.addEventListener("click", speakFn, false);`


                    `voicesSelect.addEventListener("click", setVoiceFunction, false);`


                    `var rcns = Windows.ApplicationModel.Resources.Core;`


                    `context = new rcns.ResourceContext();`


                    `context.languages = new Array(synthesizer.voice.language);`


                    `listbox_GetVoices();`


                    `audio_SetUp();`


                `} catch (exception) {`


                    `if (exception.number == -2147467263) {// E_NOTIMPL`


                        `// If media player components aren''t installed (for example,
    when using an N SKU of windows)`


                        `// this error may occur when instantiating the Audio object.`


                        `statusMessage.innerText = "Media Player components are not
    available.";`


                        `statusBox.style.backgroundColor = "red";`


                        `btnSpeak.disabled = true;`


                        `textToSynthesize.disabled = true;`


                    `}`


                `}`


            `},`


            `unload: function (element, options) {`


                `if (audio != null) {`


                    `audio.onpause = null;`


                    `audio.pause();`


                `}`


            `}`


        `});`


    Declare the following variables:


    `var synthesizer;`


        `var audio;`


        `// localization resources`


        `var context;`


        `var resourceMap;`


    The `ready(`) function is executed when DOM is loaded for the `default.html` page
    on the device where the app is loaded. In this function, create a local `synthesizer`
    object of type `Windows.Media.SpeechSynthesis.SpeechSynthesizer()`, which provides
    access to the functionality of an installed speech synthesis engine on a Microsoft
    device and controls the speech synthesis engine (voice).


    The second object is `audio`, which is for playing audio. Then we associate event
    listeners for the Speak button and `voicesSelect` drop-down HTML controls.


    We also create a local `rcns` object of type `Windows.ApplicationModel.Resources.Core`.
    This object is used to enumerate all available resources in the device. It is
    later used to get installed voices and display them using drop-down controls.


    In the preceding code, we also declare local variables that are used in other
    methods called on-click of the Speak button and the `voicesSelect` drop-down list.
    Notice that we are also catching an exception in case the media player components
    are missing in the device and audio cannot be played. If an exception occurs,
    we capture it and display the StatusMessage error message in the HTML `div` object.


    Add the following method:


    `function audio_SetUp() {`


            `audio.onplay = function () { // executes when the voice begins playing`


                `statusMessage.innerText = "Playing";`


            `};`


            `audio.onpause = function () { // executes when the user presses the stop
    button`


                `statusMessage.innerText = " Audio Completed";`


                `btnSpeak.innerText = "Speak";`


            `};`


            `audio.onended = function () { // executes when the voice finishes playing`


                `statusMessage.innerText = "Completed";`


                `btnSpeak.innerText = "Speak";`


                `voicesSelect.disabled = false;`


            `};`


        `}`


    `audio_SetUp() method` `Sets up the voice element''s events so the app UI updates
    based on the current state of voice playback.`


    Next, add the following method:


    `function speakFn() {`


            `var btnSpeak = document.getElementById("btnSpeak");`


            `if (btnSpeak.innerText == "Stop") {`


                `voicesSelect.disabled = false;`


                `audio.pause();`


                `return;`


            `}`


            `// Changes the button label. You could also just disable the button if
    you don''t want any user control.`


            `voicesSelect.disabled = true;`


            `btnSpeak.innerText = "Stop";`


            `statusBox.style.backgroundColor = "green";`


            `// Creates a stream from the text. This will be played using an audio
    element.`


            `synthesizer.synthesizeTextToStreamAsync(textToSynthesize.value).done(`


                `function (markersStream) {`


                    `// Set the source and start playing the synthesized audio stream.`


                    `var blob = MSApp.createBlobFromRandomAccessStream(markersStream.ContentType,
    markersStream);`


                    `audio.src = URL.createObjectURL(blob, { oneTimeOnly: true });`


                    `markersStream.seek(0);`


                    `audio.play();`


                `},`


                `function (error) {`


                    `errorMessage(error.message);`


                `});`


        `}`


    `speakFn()` is the main method that is invoked when the user clicks on the Speak/Stop
    button on the app. The `synthesizer.synthesizeTextToStreamAsync()` method is used
    for converting the text in the text box into a Blob stream. It then plays the
    stream through audio.


    Next, add the following method to allow users to select different audio voice
    options from resources.


        `function setVoiceFunction() {`


            `/// <summary>`


            `/// This is called when the user selects a voice from the drop down.`


            `/// </summary>`


            `if (voicesSelect.selectedIndex !== -1) {`


                `var allVoices = Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices;`


                `// Use the selected index to find the voice.`


                `var selectedVoice = allVoices[voicesSelect.selectedIndex];`


                `synthesizer.voice = selectedVoice;`


                `// change the language of the sample text.`


                `context.languages = new Array(synthesizer.voice.language);`


            `}`


        `}`


    In this method, we used `Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices()`
    to get all installed speech synthesis engines (voices) in the `allVoices` object.


    Next, add the following method to create items out of the device installed voices.
    The voices are then displayed in a `voicesSelect` drop-down control.


        `function listbox_GetVoices() {`


            `/// <summary>`


            `/// This creates items out of the system installed voices. The voices
    are then displayed in a listbox.`


            `/// This allows the user to change the voice of the synthesizer in your
    app based on their preference.`


            `/// </summary>`


            `// Get the list of all of the voices installed on this machine.`


            `var allVoices = Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices;`


            `// Get the currently selected voice.`


            `var defaultVoice = Windows.Media.SpeechSynthesis.SpeechSynthesizer.defaultVoice;`


            `var voicesSelect = document.getElementById("voicesSelect");`


            `for (var voiceIndex = 0; voiceIndex < allVoices.size; voiceIndex++) {`


                `var currVoice = allVoices[voiceIndex];`


                `var option = document.createElement("option");`


                `option.text = currVoice.displayName + " (" + currVoice.language +
    ")";`


                `voicesSelect.add(option, null);`


                `// Check to see if we''re looking at the current voice and set it
    as selected in the listbox.`


                `if (currVoice.id === defaultVoice.id) {`


                    `voicesSelect.selectedIndex = voiceIndex;`


                `}`


            `}`


        `}`


    Lastly, in case of any error message, there is a generic `errorMessage()` method
    to display an error on the `errorTextArea` object.


        `function errorMessage(text) {`


            `/// <summary>`


            `/// Sets the specified text area with the error message details.`


            `/// </summary>`


            `var errorTextArea = document.getElementById("errorTextArea");`


            `errorTextArea.innerText = text;`


        `}`


    Once you are done creating the `SpeechSynthesise.js` file, make sure that you
    add a reference in the `default.html` file.


    `<script src="/js/SpeechSynthesise.js"></script>`


    When you run the application in the Windows 10 Mobile emulator, the app opens
    the `default.html` file. Press the Speak button to play the sound in the current
    default voice. Update the value in the `Status div`, as shown in Figure [15-4](#A978-1-4842-0719-2_15_Chapter.html#Fig4).


    ![A978-1-4842-0719-2_15_Fig4_HTML.jpg](A978-1-4842-0719-2_15_Fig4_HTML.jpg)


    Figure 15-4.


    Text to speech app


    In this recipe, you learned how to convert text to audio using the `Windows SpeechSynthesizer()`
    class. Note that you can also specify text in the SSML language and pass it to
    an object of `Windows.Media.SpeechSynthesis.SpeechSynthesizer()` to convert specified
    text into audio.'
  trans: "\n### 工作原理\n\nMicrosoft 提供了预定义的语音，可用于合成单一语言的语音。\n\n使用 Microsoft Visual Studio\
    \ 2015 中的 Windows 通用（空白应用）模板创建一个新项目。在项目 `package.appmanifest` 文件中，单击“功能”选项卡，然后选中“麦克风”和“Internet”复选框。这将允许应用使用音频输入。\n\
    \n在 Visual Studio 的解决方案资源管理器中，打开项目中的 `default.html` 页面。在 `default.html` 的 `<body>`\
    \ 标签内添加以下 HTML 标记。\n\n```html\n<body class=\"win-type-body\">\n    <div id=\"\
    scenarioView\">\n        <div>\n            <h2 id=\"sampleHeader\" class=\"win-type-subheader\"\
    >将文本转换为语音。</h2>\n        </div>\n        <div id=\"scenarioContent\">\n      \
    \      <button id=\"btnSpeak\" class=\"win-button\">朗读</button>\n            <select\
    \ id=\"voicesSelect\" class=\"win-dropdown\"></select>\n            <textarea\
    \ id=\"textToSynthesize\" style=\"width: 100%\" name=\"textToSynthesize\" class=\"\
    win-textarea\"> Hello World! 这是 Windows 10 通用 Windows 应用食谱的一个示例</textarea>\n \
    \           <p id=\"errorTextArea\"></p>\n        </div>\n    </div>\n    <div\
    \ id=\"contentWrapper\">\n        <div id=\"contentHost\"></div>\n        <div\
    \ id=\"statusBox\">\n            状态：\n            <div id=\"statusMessage\"></div>\n\
    \        </div>\n    </div>\n</body>\n```\n\n在调试模式下于移动模拟器中启动该应用时，将显示图 15-3 所示的内容。\n\
    \n![A978-1-4842-0719-2_15_Fig3_HTML.jpg](img/A978-1-4842-0719-2_15_Fig3_HTML.jpg)\n\
    \n**图 15-3.** 带有用于选择语言的下拉列表的文本转语音图形用户界面\n\n如您所见，添加了四个主要控件：\n\n- 一个**朗读**按钮\n-\
    \ 一个允许用户选择可用语言的下拉列表\n- 一个包含预定义文本的文本框。该文本将由应用转换为音频\n- 一个**状态**标签，在播放或停止语音时显示消息\n\
    \n在解决方案资源管理器中右键单击项目，然后选择“添加” ➤ “新建 JavaScript 文件”。为文件提供一个名称。在此示例中，我们将文件命名为 `SpeechSynthesise.js`。在文件中添加以下代码：\n\
    \n```javascript\nvar page = WinJS.UI.Pages.define(\"../default.html\", {\n   \
    \ ready: function (element, options) {\n        try {\n            synthesizer\
    \ = new Windows.Media.SpeechSynthesis.SpeechSynthesizer();\n            audio\
    \ = new Audio();\n            var btnSpeak = document.getElementById(\"btnSpeak\"\
    );\n            var voicesSelect = document.getElementById(\"voicesSelect\");\n\
    \            btnSpeak.addEventListener(\"click\", speakFn, false);\n         \
    \   voicesSelect.addEventListener(\"click\", setVoiceFunction, false);\n     \
    \       var rcns = Windows.ApplicationModel.Resources.Core;\n            context\
    \ = new rcns.ResourceContext();\n            context.languages = new Array(synthesizer.voice.language);\n\
    \            listbox_GetVoices();\n            audio_SetUp();\n        } catch\
    \ (exception) {\n            if (exception.number == -2147467263) { // E_NOTIMPL\n\
    \                // 如果未安装媒体播放器组件（例如，使用 Windows N 版本 SKU 时），\n                //\
    \ 实例化 Audio 对象时可能会发生此错误。\n                statusMessage.innerText = \"媒体播放器组件不可用。\"\
    ;\n                statusBox.style.backgroundColor = \"red\";\n              \
    \  btnSpeak.disabled = true;\n                textToSynthesize.disabled = true;\n\
    \            }\n        }\n    },\n    unload: function (element, options) {\n\
    \        if (audio != null) {\n            audio.onpause = null;\n           \
    \ audio.pause();\n        }\n    }\n});\n```\n\n声明以下变量：\n\n```javascript\nvar\
    \ synthesizer;\nvar audio;\n// 本地化资源\nvar context;\nvar resourceMap;\n```\n\n\
    当在加载了应用的设备上，`default.html` 页面的 DOM 加载完成后，`ready()` 函数将被执行。在此函数中，创建一个类型为 `Windows.Media.SpeechSynthesis.SpeechSynthesizer()`\
    \ 的本地 `synthesizer` 对象，它提供了对 Microsoft 设备上已安装的语音合成引擎功能的访问，并控制该语音合成引擎（语音）。\n\n\
    第二个对象是 `audio`，用于播放音频。然后，我们为**朗读**按钮和 `voicesSelect` 下拉 HTML 控件关联事件侦听器。\n\n我们还创建了一个类型为\
    \ `Windows.ApplicationModel.Resources.Core` 的本地 `rcns` 对象。此对象用于枚举设备中的所有可用资源。稍后将用它来获取已安装的语音，并通过下拉控件进行显示。\n\
    \n在上述代码中，我们还声明了在**朗读**按钮和 `voicesSelect` 下拉列表的单击事件中调用的其他方法所使用的局部变量。请注意，我们还捕获了一个异常，以防设备中缺少媒体播放器组件而无法播放音频。如果发生异常，我们会捕获它，并在\
    \ HTML `div` 对象中显示 `StatusMessage` 错误信息。\n\n添加以下方法：\n\n```javascript\nfunction\
    \ audio_SetUp() {\n    audio.onplay = function () { // 当语音开始播放时执行\n        statusMessage.innerText\
    \ = \"正在播放\";\n    };\n    audio.onpause = function () { // 当用户按下停止按钮时执行\n   \
    \     statusMessage.innerText = \" 音频播放完毕\";\n        btnSpeak.innerText = \"\
    朗读\";\n    };\n    audio.onended = function () { // 当语音播放完成时执行\n        statusMessage.innerText\
    \ = \"已完成\";\n        btnSpeak.innerText = \"朗读\";\n        voicesSelect.disabled\
    \ = false;\n    };\n}\n```\n\n`audio_SetUp()` 方法设置了语音元素的事件，以便应用的用户界面根据语音播放的当前状态进行更新。\n\
    \n接下来，添加以下方法：\n\n```javascript\nfunction speakFn() {\n    var btnSpeak = document.getElementById(\"\
    btnSpeak\");\n    if (btnSpeak.innerText == \"停止\") {\n        voicesSelect.disabled\
    \ = false;\n        audio.pause();\n        return;\n    }\n    // 更改按钮标签。如果您不希望用户控制，也可以禁用该按钮。\n\
    \    voicesSelect.disabled = true;\n    btnSpeak.innerText = \"停止\";\n    statusBox.style.backgroundColor\
    \ = \"green\";\n    // 从文本创建流。将使用音频元素播放该流。\n    synthesizer.synthesizeTextToStreamAsync(textToSynthesize.value).done(\n\
    \        function (markersStream) {\n            // 设置源并开始播放合成的音频流。\n        \
    \    var blob = MSApp.createBlobFromRandomAccessStream(markersStream.ContentType,\
    \ markersStream);\n            audio.src = URL.createObjectURL(blob, { oneTimeOnly:\
    \ true });\n            markersStream.seek(0);\n            audio.play();\n  \
    \      },\n        function (error) {\n            errorMessage(error.message);\n\
    \        });\n}\n```\n\n`speakFn()` 是当用户点击应用上的**朗读/停止**按钮时调用的主要方法。`synthesizer.synthesizeTextToStreamAsync()`\
    \ 方法用于将文本框中的文本转换为 Blob 流。然后通过音频播放该流。\n\n接下来，添加以下方法，允许用户从资源中选择不同的音频语音选项。\n\n```javascript\n\
    function setVoiceFunction() {\n    /// <summary>\n    /// 当用户从下拉列表中选择语音时调用此方法。\n\
    \    /// </summary>\n    if (voicesSelect.selectedIndex !== -1) {\n        var\
    \ allVoices = Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices;\n   \
    \     // 使用所选索引查找语音。\n        var selectedVoice = allVoices[voicesSelect.selectedIndex];\n\
    \        synthesizer.voice = selectedVoice;\n        // 更改示例文本的语言。\n        context.languages\
    \ = new Array(synthesizer.voice.language);\n    }\n}\n```\n\n在此方法中，我们使用 `Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices()`\
    \ 来获取 `allVoices` 对象中所有已安装的语音合成引擎（语音）。\n\n接下来，添加以下方法，根据设备已安装的语音创建选项。这些语音随后将显示在\
    \ `voicesSelect` 下拉控件中。\n\n```javascript\nfunction listbox_GetVoices() {\n   \
    \ /// <summary>\n    /// 这将根据系统已安装的语音创建选项。然后这些语音将显示在列表框中。\n    /// 这允许用户根据自己的偏好更改应用中合成器的语音。\n\
    \    /// </summary>\n    // 获取此机器上安装的所有语音的列表。\n    var allVoices = Windows.Media.SpeechSynthesis.SpeechSynthesizer.allVoices;\n\
    \    // 获取当前选中的语音。\n    var defaultVoice = Windows.Media.SpeechSynthesis.SpeechSynthesizer.defaultVoice;\n\
    \    var voicesSelect = document.getElementById(\"voicesSelect\");\n    for (var\
    \ voiceIndex = 0; voiceIndex < allVoices.size; voiceIndex++) {\n        var currVoice\
    \ = allVoices[voiceIndex];\n        var option = document.createElement(\"option\"\
    );\n        option.text = currVoice.displayName + \" (\" + currVoice.language\
    \ + \")\";\n        voicesSelect.add(option, null);\n        // 检查是否为当前语音，并设置其为列表框中选中的项。\n\
    \        if (currVoice.id === defaultVoice.id) {\n            voicesSelect.selectedIndex\
    \ = voiceIndex;\n        }\n    }\n}\n```\n\n最后，如果出现任何错误信息，有一个通用的 `errorMessage()`\
    \ 方法用于在 `errorTextArea` 对象上显示错误。\n\n```javascript\nfunction errorMessage(text)\
    \ {\n    /// <summary>\n    /// 使用错误消息的详细信息设置指定的文本区域。\n    /// </summary>\n  \
    \  var errorTextArea = document.getElementById(\"errorTextArea\");\n    errorTextArea.innerText\
    \ = text;\n}\n```\n\n完成创建 `SpeechSynthesise.js` 文件后，请确保在 `default.html` 文件中添加引用。\n\
    \n```html\n<script src=\"/js/SpeechSynthesise.js\"></script>\n```\n\n当您在 Windows\
    \ 10 移动模拟器中运行该应用程序时，应用会打开 `default.html` 文件。按下**朗读**按钮，以当前的默认语音播放声音。更新状态 `div`\
    \ 中的值，如图 15-4 所示。\n\n![A978-1-4842-0719-2_15_Fig4_HTML.jpg](img/A978-1-4842-0719-2_15_Fig4_HTML.jpg)\n\
    \n**图 15-4.** 文本转语音应用\n\n在本例程中，您学习了如何使用 `Windows SpeechSynthesizer()` 类将文本转换为音频。请注意，您还可以指定\
    \ SSML 语言中的文本，并将其传递给 `Windows.Media.SpeechSynthesis.SpeechSynthesizer()` 的对象，以将指定文本转换为音频。\n"
- fmt: "# 15.5 How to Specify Recognition Constraints for Speech Recognition\n\n###\
    \ Problem\n\nYou need to create an app that allows speech recognition.\n\n###\
    \ Solution\n\nUse the `Windows.Media.SpeechRecognition.SpeechRecognizer` object\
    \ to create a speech recognizer and use `Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint`\
    \ to specify different speech recognition constraints.\n\nThere are three possible\
    \ speech constraints that can be used in UWP apps.\n\n* `SpeechRecognitionTopicConstraint`:\
    \ Based on predefined grammar and relies on an Internet connection.\n* `SpeechRecognitionListConstraint`:\
    \ Based on a predefined list of words and phrases.\n* `SpeechRecognitionGrammarFileConstraint`:\
    \ A Speech Recognition Grammar Specification (SRGS) file is added and all the\
    \ constraints are specified in this XML file.\n\nThis recipe uses `SpeechRecognitionListConstraint`\
    \ to convert speech to text.\n\n### How It Works\n\nCreate a new project using\
    \ the Windows Universal (Blank App) template in Microsoft Visual Studio 2015.\
    \ In the project `package.appmanifest` file, click the Capabilities tab and select\
    \ the Microphone and Internet check boxes. This allows the app to use the audio\
    \ feed.\n\nOpen the `default.html` file and copy the following code:\n\n```html\n\
    <body class=\"win-type-body\">\n    <div id=\"scenarioView\">\n        <div>\n\
    \            <h2 id=\"sampleHeader\" class=\"win-type-subheader\">Speech to Text</h2>\n\
    \            <div id=\"scenarioDescription\">\n                <p>Speech recognition\
    \ using a custom list-based grammar.</p>\n            </div>\n        </div>\n\
    \        <div id=\"scenarioContent\">\n            <div>\n                <button\
    \ id=\"btnSpeak\" class=\"win-button\">Speak</button>\n            </div>\n  \
    \          <p id=\"errorTextArea\"></p>\n        </div>\n    </div>\n</body>\n\
    ```\n\nRight-click the project in Solution Explorer and select Add ➤ New JavaScript\
    \ file. Provide a name for the file. In this example, let's name it `Speechrecognisation.js`.\n\
    \nAdd the following code to the `Speechrecognisation.js` file:\n\n```javascript\n\
    (function () {\n    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var btnSpeak = document.getElementById(\"btnSpeak\");\n  \
    \          btnSpeak.addEventListener(\"click\", buttonSpeechRecognizerListConstraintClick,\
    \ false);\n            var resultTextArea = document.getElementById(resultTextArea);\n\
    \        });\n    }\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    ```\n\nThe preceding code adds an event receiver to the `btnSpeak` button. Now\
    \ add a `buttonSpeechRecognizerListConstraintClick` function, which is triggered\
    \ when the user clicks the Speak button on the user preference form control.\n\
    \n```javascript\nfunction buttonSpeechRecognizerListConstraintClick() {\n    //\
    \ Create an instance of SpeechRecognizer.\n    var speechRecognizer =\n      new\
    \ Windows.Media.SpeechRecognition.SpeechRecognizer();\n    // You could create\
    \ this array dynamically.\n    var responses = [\"Yes\", \"No\", \"Hello\", \"\
    Hello World\"];\n    // Add a web search grammar to the recognizer.\n    var listConstraint\
    \ =\n        new Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint(\n\
    \        responses,\n        \"YesOrNo\");\n    speechRecognizer.uiOptions.audiblePrompt\
    \ = \"Say what you want to search for…\";\n    speechRecognizer.uiOptions.exampleText\
    \ = \"Ex. 'Yes', 'No', 'Hello'\";\n    speechRecognizer.constraints.append(listConstraint);\n\
    \    var resultTextArea = document.getElementById(resultTextArea);\n    // Compile\
    \ the default dictation grammar.\n    speechRecognizer.compileConstraintsAsync().done(\n\
    \      // Success function.\n      function (result) {\n          // Start recognition.\n\
    \          speechRecognizer.recognizeWithUIAsync().done(\n            // Success\
    \ function.\n            function (speechRecognitionResult) {\n              \
    \  // Do something with the recognition result.\n                speechRecognizer.close();\n\
    \            },\n            // Error function.\n            function (err) {\n\
    \                if (typeof errorTextArea !== \"undefined\") {\n             \
    \       errorTextArea.innerText = \"Speech recognition failed.\";\n          \
    \      }\n                speechRecognizer.close();\n            });\n      },\n\
    \      // Error function.\n      function (err) {\n          if (typeof errorTextArea\
    \ !== \"undefined\") {\n              errorTextArea.innerText = err;\n       \
    \   }\n          speechRecognizer.close();\n      });\n}\n})();\n```\n\nThe preceding\
    \ code declares a variable named `speechRecognizer`. It is assigned to the `Windows.Media.SpeechRecognition.SpeechRecognizer()`\
    \ class, which denotes a container for the speech recognizer object. The next\
    \ line has the `responses` static array variable to store the recognized speech\
    \ constraint values.\n\nIt is then referenced in an object instance of type `Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint()`,\
    \ which loads all the values specified in the `responses` array.\n\nFollowing\
    \ are the UI settings for the speech recognizer. Pass the `SpeechRecognitionListConstraint\
    \ listcontraint` to the `speechRecognizer` object.\n\nThen we call `speechRecognizer.compileConstraintsAsync()`\
    \ method to asynchronously compile all constraints specified by the `constraints`\
    \ property. This method execution provides output of type `SpeechRecognitionCompilationResult`,\
    \ which is captured using the `speechRecognitionResult` success function. We also\
    \ capture errors and display them using the `errorTextArea` element.\n\nOnce you\
    \ done with the `Speechrecognisation.js` file, make sure you add a reference in\
    \ `default.html`.\n\n```html\n<script src=\"js/Speechrecognisation.js\"></script>\n\
    ```\n\nThat's it. The speech recognition is based on predefined constraints and\
    \ is available in the app. It can be used to capture user inputs.\n\nWhen you\
    \ run the application in the Windows Mobile emulator, it looks like what's shown\
    \ in Figure [15-5](#A978-1-4842-0719-2_15_Chapter.html#Fig5). Click Go and say\
    \ specific words, such as \"Yes,\" \"No,\" or \"Hello.\" The speech recognizer\
    \ will validate it.\n\n![A978-1-4842-0719-2_15_Fig5_HTML.jpg](A978-1-4842-0719-2_15_Fig5_HTML.jpg)\n\
    \n**Figure 15-5.** Speech recognition based on a custom list of words\n\n# 15.6\
    \ How to Launch Your App with Cortana Voice Command in Foreground\n\n### Problem\n\
    \nYou want to provide users the ability to use Cortana voice commands to launch\
    \ your app in the foreground.\n\n### Solution\n\nUse the Voice Command Definition\
    \ (VCD) file to define the voice commands, which contain commands to activate\
    \ the app. When the app is installed and executed, the VCD file is installed in\
    \ Cortana.\n\nUsers can speak commands specified in the VCD file to launch the\
    \ app. User voice commands are recognized by Cortana with the help of the Windows\
    \ Speech platform and the cloud-hosted Microsoft Speech Recognition Service. Both\
    \ services try to identify the speech and Cortana receives the text and launches\
    \ the application and voice commands in the application with the `onactivated`\
    \ event."
  raw: '## 15.5 How to Specify Recognition Constraints for Speech Recognition


    ### Problem


    You need to create an app that allows speech recognition.


    ### Solution


    Use the `Windows.Media.SpeechRecognition.SpeechRecognizer` object to create a
    speech recognizer and use `Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint`
    to specify different speech recognition constraints.


    There are three possible speech constraints that can be used in UWP apps.


    *   `SpeechRecognitionTopicConstraint`: Based on predefined grammar and relies
    on an Internet connection.

    *   `SpeechRecognitionListConstraint`: Based on a predefined list of words and
    phrases.

    *   `SpeechRecognitionGrammarFileConstraint`: A Speech Recognition Grammar Specification
    (SRGS) file is added and all the constraints are specified in this XML file.


    This recipe uses `SpeechRecognitionListConstraint` to convert speech to text.


    ### How It Works


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015. In the project `package.appmanifest` file, click the Capabilities
    tab and select the Microphone and Internet check boxes. This allows the app to
    use the audio feed.


    Open the `default.html` file and copy the following code:


    `<body class="win-type-body">`


        `<div id="scenarioView">`


            `<div>`


                `<h2 id="sampleHeader" class="win-type-subheader">Speech to Text</h2>`


                `<div id="scenarioDescription">`


                    `<p>Speech recognition using a custom list-based grammar.</p>`


                `</div>`


            `</div>`


            `<div id="scenarioContent">`


                `<div>`


                    `<button id="btnSpeak" class="win-button">Speak</button>`


                `</div>`


                `<p id="errorTextArea"></p>`


            `</div>`


        `</div>`


    `</body>`


    Right-click the project in Solution Explorer and select Add ➤ New JavaScript file.
    Provide a name for the file. In this example, let’s name it Speechrecognisation.
    js.


    Add the following code to the `Speechrecognisation.js` file:


    `(function () {`


        `"use strict";`


        `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


                `var btnSpeak = document.getElementById("btnSpeak");`


                `btnSpeak.addEventListener("click", buttonSpeechRecognizerListConstraintClick,
    false);`


                `var resultTextArea = document.getElementById(resultTextArea);`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", GetControl);`


    The preceding code adds an event receiver to the btnSpeak button. Now add a `buttonSpeechRecognizerListConstraintClick`
    function, which is triggered when the user clicks the Speak button on the user
    preference form control.


    `function buttonSpeechRecognizerListConstraintClick() {`


        `// Create an instance of SpeechRecognizer.`


        `var speechRecognizer =`


          `new Windows.Media.SpeechRecognition.SpeechRecognizer();`


        `// You could create this array dynamically.`


        `var responses = ["Yes", "No", "Hello", "Hello World"];`


        `// Add a web search grammar to the recognizer.`


        `var listConstraint =`


            `new Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint(`


            `responses,`


            `"YesOrNo");`


        `speechRecognizer.uiOptions.audiblePrompt = "Say what you want to search for…";`


        `speechRecognizer.uiOptions.exampleText = "Ex. ''Yes'', ''No'', ''Hello''";`


        `speechRecognizer.constraints.append(listConstraint);`


        `var resultTextArea = document.getElementById(resultTextArea);`


        `// Compile the default dictation grammar.`


        `speechRecognizer.compileConstraintsAsync().done(`


          `// Success function.`


          `function (result) {`


              `// Start recognition.`


              `speechRecognizer.recognizeWithUIAsync().done(`


                `// Success function.`


                `function (speechRecognitionResult) {`


                    `// Do something with the recognition result.`


                    `speechRecognizer.close();`


                `},`


                `// Error function.`


                `function (err) {`


                    `if (typeof errorTextArea !== "undefined") {`


                        `errorTextArea.innerText = "Speech recognition failed.";`


                    `}`


                    `speechRecognizer.close();`


                `});`


          `},`


          `// Error function.`


          `function (err) {`


              `if (typeof errorTextArea !== "undefined") {`


                  `errorTextArea.innerText = err;`


              `}`


              `speechRecognizer.close();`


          `});`


    `}`


    `})();`


    The preceding code declares a variable named `speechRecognizer`. It is assigned
    to the `Windows.Media.SpeechRecognition.SpeechRecognizer()` class, which denotes
    a container for the speech recognizer object. The next line has the `responses`
    static array variable to store the recognized speech constraint values.


    It is then referenced in an object instance of type `Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint()`,
    which loads all the values specified in the `responses` array.


    Following are the UI settings for the speech recognizer. Pass the `SpeechRecognitionListConstraint
    listcontraint` to the `speechRecognizer` object.


    Then we call `speechRecognizer.compileConstraintsAsync()` method to asynchronously
    compile all constraints specified by the `constraints` property. This method execution
    provides output of type `SpeechRecognitionCompilationResult`, which is captured
    using the `speechRecognitionResult` success function. We also capture errors and
    display them using the `errorTextArea` element.


    Once you done with the `Speechrecognisation.js` file, make sure you add a reference
    in `default.html`.


    `<script src="js/Speechrecognisation.js"></script>`


    That’s it. The speech recognition is based on predefined constraints and is available
    in the app. It can be used to capture user inputs.


    When you run the application in the Windows Mobile emulator, it looks like what’s
    shown in Figure [15-5](#A978-1-4842-0719-2_15_Chapter.html#Fig5). Click Go and
    say specific words, such as “Yes,” “No,” or “Hello.” The speech recognizer will
    validate it.


    ![A978-1-4842-0719-2_15_Fig5_HTML.jpg](A978-1-4842-0719-2_15_Fig5_HTML.jpg)


    Figure 15-5.


    Speech recognition based on a custom list of words


    ## 15.6 How to Launch Your App with Cortana Voice Command in Foreground


    ### Problem


    You want to provide users the ability to use Cortana voice commands to launch
    your app in the foreground.


    ### Solution


    Use the Voice Command Definition (VCD) file to define the voice commands, which
    contain commands to activate the app. When the app is installed and executed,
    the VCD file is installed in Cortana.


    Users can speak commands specified in the VCD file to launch the app. User voice
    commands are recognized by Cortana with the help of the Windows Speech platform
    and the cloud-hosted Microsoft Speech Recognition Service. Both services try to
    identify the speech and Cortana receives the text and launches the application
    and voice commands in the application with the `onactivated` event.'
  trans: "\n# 15.5 如何为语音识别指定识别约束\n\n### 问题\n\n你需要创建一个支持语音识别的应用程序。\n\n### 解决方案\n\n\
    使用 `Windows.Media.SpeechRecognition.SpeechRecognizer` 对象创建语音识别器，并使用 `Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint`\
    \ 指定不同的语音识别约束。\n\n在 UWP 应用中可以使用三种语音约束：\n\n* `SpeechRecognitionTopicConstraint`：基于预定义语法，需要网络连接。\n\
    * `SpeechRecognitionListConstraint`：基于预定义的单词和短语列表。\n* `SpeechRecognitionGrammarFileConstraint`：添加语音识别语法规范（SRGS）文件，所有约束都在此\
    \ XML 文件中指定。\n\n本方案使用 `SpeechRecognitionListConstraint` 将语音转换为文本。\n\n### 工作原理\n\
    \n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建新项目。在项目的 `package.appmanifest`\
    \ 文件中，单击“功能”选项卡，然后勾选“麦克风”和“Internet”复选框。这将允许应用使用音频输入。\n\n打开 `default.html` 文件并复制以下代码：\n\
    \n```html\n<body class=\"win-type-body\">\n    <div id=\"scenarioView\">\n   \
    \     <div>\n            <h2 id=\"sampleHeader\" class=\"win-type-subheader\"\
    >语音转文本</h2>\n            <div id=\"scenarioDescription\">\n                <p>使用基于自定义列表语法的语音识别。</p>\n\
    \            </div>\n        </div>\n        <div id=\"scenarioContent\">\n  \
    \          <div>\n                <button id=\"btnSpeak\" class=\"win-button\"\
    >说话</button>\n            </div>\n            <p id=\"errorTextArea\"></p>\n \
    \       </div>\n    </div>\n</body>\n```\n\n在解决方案资源管理器中右键单击项目，选择“添加” ➤ “新建 JavaScript\
    \ 文件”。为文件命名。在此示例中，我们将其命名为 `Speechrecognisation.js`。\n\n将以下代码添加到 `Speechrecognisation.js`\
    \ 文件中：\n\n```javascript\n(function () {\n    \"use strict\";\n    function GetControl()\
    \ {\n        WinJS.UI.processAll().done(function () {\n            var btnSpeak\
    \ = document.getElementById(\"btnSpeak\");\n            btnSpeak.addEventListener(\"\
    click\", buttonSpeechRecognizerListConstraintClick, false);\n            var resultTextArea\
    \ = document.getElementById(resultTextArea);\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n```\n\n上述代码为 `btnSpeak` 按钮添加了一个事件接收器。现在添加一个\
    \ `buttonSpeechRecognizerListConstraintClick` 函数，当用户单击用户偏好表单控件上的“说话”按钮时触发该函数。\n\
    \n```javascript\nfunction buttonSpeechRecognizerListConstraintClick() {\n    //\
    \ 创建 SpeechRecognizer 实例。\n    var speechRecognizer =\n      new Windows.Media.SpeechRecognition.SpeechRecognizer();\n\
    \    // 你可以动态创建此数组。\n    var responses = [\"Yes\", \"No\", \"Hello\", \"Hello\
    \ World\"];\n    // 向识别器添加网络搜索语法。\n    var listConstraint =\n        new Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint(\n\
    \        responses,\n        \"YesOrNo\");\n    speechRecognizer.uiOptions.audiblePrompt\
    \ = \"说出你要搜索的内容...\";\n    speechRecognizer.uiOptions.exampleText = \"例如：'Yes',\
    \ 'No', 'Hello'\";\n    speechRecognizer.constraints.append(listConstraint);\n\
    \    var resultTextArea = document.getElementById(resultTextArea);\n    // 编译默认听写语法。\n\
    \    speechRecognizer.compileConstraintsAsync().done(\n      // 成功函数。\n      function\
    \ (result) {\n          // 开始识别。\n          speechRecognizer.recognizeWithUIAsync().done(\n\
    \            // 成功函数。\n            function (speechRecognitionResult) {\n    \
    \            // 对识别结果进行处理。\n                speechRecognizer.close();\n      \
    \      },\n            // 错误函数。\n            function (err) {\n              \
    \  if (typeof errorTextArea !== \"undefined\") {\n                    errorTextArea.innerText\
    \ = \"语音识别失败。\";\n                }\n                speechRecognizer.close();\n\
    \            });\n      },\n      // 错误函数。\n      function (err) {\n         \
    \ if (typeof errorTextArea !== \"undefined\") {\n              errorTextArea.innerText\
    \ = err;\n          }\n          speechRecognizer.close();\n      });\n}\n})();\n\
    ```\n\n上述代码声明了一个名为 `speechRecognizer` 的变量。它被赋值给 `Windows.Media.SpeechRecognition.SpeechRecognizer()`\
    \ 类，该类表示语音识别器对象的容器。下一行创建了 `responses` 静态数组变量，用于存储识别到的语音约束值。\n\n然后，它在类型为 `Windows.Media.SpeechRecognition.SpeechRecognitionListConstraint()`\
    \ 的对象实例中被引用，该实例加载了 `responses` 数组中指定的所有值。\n\n以下是语音识别器的 UI 设置。将 `SpeechRecognitionListConstraint\
    \ listcontraint` 传递给 `speechRecognizer` 对象。\n\n接着，我们调用 `speechRecognizer.compileConstraintsAsync()`\
    \ 方法，以异步方式编译 `constraints` 属性指定的所有约束。该方法执行后提供 `SpeechRecognitionCompilationResult`\
    \ 类型的输出，该输出通过 `speechRecognitionResult` 成功函数捕获。我们还捕获错误并使用 `errorTextArea` 元素显示它们。\n\
    \n完成 `Speechrecognisation.js` 文件后，请确保在 `default.html` 中添加引用。\n\n```html\n<script\
    \ src=\"js/Speechrecognisation.js\"></script>\n```\n\n就这样。语音识别基于预定义的约束，并且可在应用中使用。它可用于捕获用户输入。\n\
    \n当你在 Windows Mobile 模拟器中运行该应用程序时，其外观如图 15-5 所示。单击“开始”并说出特定词语，例如“Yes”、“No”或“Hello”。语音识别器将对其进行验证。\n\
    \n![A978-1-4842-0719-2_15_Fig5_HTML.jpg](img/A978-1-4842-0719-2_15_Fig5_HTML.jpg)\n\
    \n**图 15-5.** 基于自定义词语列表的语音识别\n\n# 15.6 如何使用 Cortana 语音命令在前台启动应用\n\n### 问题\n\n\
    你想要让用户能够使用 Cortana 语音命令在前台启动你的应用。\n\n### 解决方案\n\n使用语音命令定义（VCD）文件来定义包含激活应用命令的语音命令。当应用安装并执行时，VCD\
    \ 文件将安装到 Cortana 中。\n\n用户可以说出 VCD 文件中指定的命令来启动应用。Cortana 借助 Windows 语音平台和云托管的 Microsoft\
    \ 语音识别服务来识别用户语音命令。这两种服务都会尝试识别语音，Cortana 接收到文本后，会通过 `onactivated` 事件启动应用程序及其中的语音命令。\n"
- fmt: "### How It Works\n\nCreate a new project using the Windows Universal (Blank\
    \ App) template in Microsoft Visual Studio 2015.\n\nAdd a new video command definition\
    \ file, `CortanaVoiceCommands.xml`, in the project. Add the following XML code\
    \ to the file:\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\" ?>\n<VoiceCommands\
    \ xmlns=\"http://schemas.microsoft.com/voicecommands/1.2\">\n  <CommandSet xml:lang=\"\
    en-gb\" Name=\"CortanaVoiceCommandSet\">\n    <AppName>Win10Recipes</AppName>\n\
    \    <Example> Show Win10 Recipes </Example>\n    <Command Name=\"showDevicesAvailableRecipes\"\
    >\n      <Example>Show</Example>\n      <ListenFor RequireAppName=\"BeforeOrAfterPhrase\"\
    >{command}</ListenFor>\n      <ListenFor RequireAppName=\"ExplicitlySpecified\"\
    >Listening to command </ListenFor>\n      <Feedback> Recipes available in App\
    \ </Feedback>\n      <Navigate/>\n    </Command>\n    <PhraseList Label=\"command\"\
    >\n      <Item>Devices</Item>\n      <Item>Text to Speech</Item>\n    </PhraseList>\n\
    \  </CommandSet>\n</VoiceCommands>\n```\n\nIn this Video Command Definition file,\
    \ there are a few main elements. The `<CommandSet>` element defines the commands\
    \ used to activate your app and execute a command. The `<CommandSet>` element\
    \ also has the `xml:Lang` attribute to specify the command language. In this example,\
    \ we are using GB English.\n\nThe `<CommandPrefix>` is unique name to our application.\
    \ It’s used as a prefix or suffix in the voice command to activate the app. The\
    \ `<Command>` element is for commanding what the user can speak. The `<ListenFor>`\
    \ element specifies the text that should be recognized by Cortana. The `<Feedback>`\
    \ element specifies the text that is spoken by Cortana when launching the app.\
    \ The `<Navigate>` element indicates that the voice command is to launch the app\
    \ in the foreground.\n\nIf you want to launch the app by voice command in the\
    \ background, use `<VoiceCommandService>`.\n\nOnce the VCD file is created, install\
    \ the commands specified by a VCD file. To do this, use the `installCommandDefinitionsFromStorageFileAsync`\
    \ method.\n\nOpen `default.js` from Solution Explorer. In this, call the `onactivated`\
    \ method and add the following code:\n\n```\n//load vcd\nvar storageFile = Windows.Storage.StorageFile;\n\
    var wap = Windows.ApplicationModel.Package;\nvar voiceCommandManager = Windows.ApplicationModel.VoiceCommands.VoiceCommandDefinitionManager;\n\
    \nwap.current.installedLocation.getFileAsync(\"CortanaVoiceCommands.xml\")\n \
    \ .then(function (file) {\n    voiceCommandManager.installCommandDefinitionsFromStorageFileAsync(file);\n\
    \  });\n\nvar activationKind = args.detail.kind;\nvar activatedEventArgs = args.detail.detail;\n\
    ```\n\nIn the preceding code, we used the `Windows.ApplicationModel.Package.current.installedLocation.getFileAsync`\
    \ method to get reference to the VCD file. The `installCommandDefinitionsFromStorageFileAsync`\
    \ method was called to install the commands specified in the file. Now we have\
    \ to specify how the app responds to the voice commands matching the VCD file.\
    \ For this, first check whether `IActivatedEventArgs.Kind` is `VoiceCommand`.\
    \ Replace the following code after the standard code in `default.js` to check\
    \ activation argument types:\n\n```\nif (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n  if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n    // TODO: This application has been newly launched. Initialize your application\
    \ here.\n  } else {\n    // TODO: This application was suspended and then terminated.\n\
    \    // To create a smooth user experience, restore application state here so\
    \ that it looks like the app never stopped running.\n  }\n  args.setPromise(WinJS.UI.processAll());\n\
    }\nelse if (activationKind == Windows.ApplicationModel.Activation.ActivationKind.voiceCommand)\n\
    {\n  var speechRecognitionResult = activatedEventArgs[0].Result;\n  // Get the\
    \ name of the voice command and the text spoken\n  var voiceCommandName = speechRecognitionResult.RulePath[0];\n\
    \  switch(voiceCommandName)\n  {\n    case \"showDevicesAvailableRecipes\":\n\
    \      var textSpoken = speechRecognitionResult.semanticInterpretation.properties[0];\n\
    \      var url = \"Devices.html\";\n      nav.history.backStack.push({ location:\
    \ \"/Devices.html\" })\n      break;\n    default:\n      break;\n  }\n};\n\n\
    app.oncheckpoint = function (args) {\n  // TODO: This application is about to\
    \ be suspended. Save any state that needs to persist across suspensions here.\n\
    \  // You might use the WinJS.Application.sessionState object, which is automatically\
    \ saved and restored across suspension.\n  // If you need to complete an asynchronous\
    \ operation before your application is suspended, call args.setPromise().\n};\n\
    \napp.start();\n```\n\nThe preceding code checked for the `Windows.ApplicationModel.Activation.ActivationKind`\
    \ value, which specifies the kind of activation. Check if `ActivationKind` is\
    \ `voiceCommand` or by any other means. If the app is launched using a voice command,\
    \ then you need to get the text spoken by the user in the `speechRecognitionResult`\
    \ variable; to get the string, use `activatedEventArgs`.\n\nThe `activatedEventArgs`\
    \ has a property called `Result` that provides the `SpeechRecognitionResult`.\n\
    \nTo get text spoken by the user, use `speechRecognitionResult.RulePath[0]` and\
    \ store it in the `voiceCommandName` local variable.\n\nUsing this text (`voiceCommandName`),\
    \ you can decide which app page has to be displayed. For this, switch case and\
    \ match the `voiceCommandName` value with the command name specified in the VCD\
    \ file. In `CortanaVoiceCommands.xml`, you specify command name `showDevicesAvailableRecipes`.\
    \ If this is matched, show the application page to the user in `Devices.html`.\
    \ This way, the application is integrated with Cortana. When the user launches\
    \ the app using voice commands, you can further enhance to launch application\
    \ pages.\n\n> **Note**  \n> You can’t test this recipe using a Visual Studio Mobile\
    \ emulator because Cortana needs a Microsoft account registration and sign in\
    \ process, which does not work on a Mobile emulator. Instead, you need to install\
    \ the app on a device and then run Cortana to test the app launching in the foreground.\n\
    \n## Chapter 15: Additional Tools\n\nThe Windows SDK and Microsoft Visual Studio\
    \ 2015 provide additional tools and features that let developers easily debug\
    \ and test their Windows apps. This chapter covers some of these tools, such as\
    \ the JavaScript Console window, DOM Explorer, Diagnostic Tools, the Windows 10\
    \ Mobile emulator Additional Tools. These tools make a developer’s life much easier\
    \ when it comes to testing an app in various scenarios.\n\n### 16.1 JavaScript\
    \ Console Window\n\n#### Problem\n\nYou want to view the JavaScript errors or\
    \ write debug messages when debugging your Universal Windows Platform app.\n\n\
    #### Solution\n\nUse the JavaScript Console window in Visual Studio 2015 to view\
    \ the JavaScript errors or write debug messages when debugging your Universal\
    \ Windows Platform app."
