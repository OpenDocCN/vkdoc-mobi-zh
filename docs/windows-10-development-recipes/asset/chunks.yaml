- fmt: "### How It Works\n\n打开 `Visual Studio 2015`。选择 **File** ➤ **New Project**\
    \ ➤ **JavaScript** ➤ **Windows** ➤ **Universal** ➤ **Blank App (Universal Windows)**\
    \ 模板。这将创建一个通用 Windows 应用模板（见图 [6-1](#A978-1-4842-0719-2_6_Chapter.html#Fig1)）。\n\
    \n![A978-1-4842-0719-2_6_Fig1_HTML.jpg](A978-1-4842-0719-2_6_Fig1_HTML.jpg)\n\n\
    图 6-1. 新建项目对话框\n\n打开位于项目根目录下的 `default.html`。在 `<body>` 标签之后，添加以下内容：\n\n```html\n\
    <div class=\"appGrid\">\n    <div class=\"sectionA\">\n        <h1>A</h1>\n  \
    \  </div>\n    <div class=\"sectionB\">\n        <h1>B</h1>\n    </div>\n</div>\n\
    ```\n\n你已经创建了一组 `div`。外层的 `div`（`appGrid`）充当容器。接下来，你创建了两个作为应用一部分显示的区块。在小屏幕上，你希望\
    \ `sectionA` 和 `sectionB` 上下堆叠显示。在中屏和大屏上运行时，将 `sectionA` 和 `sectionB` 并排放置。\n\n\
    接下来，为应用创建必要的样式。打开位于 `css` 文件夹中的 `default.css`。将 `default.css` 的内容替换为以下样式规则：\n\n\
    ```css\n.appGrid {\n    display: -ms-grid;\n    -ms-grid-columns: 2fr 1fr;\n \
    \   grid-columns: 2fr 1fr;\n    -ms-grid-rows: 1fr;\n    grid-rows: 1fr;\n   \
    \ width: 100%;\n    height: 100%;\n    margin:24px;\n}\n\n.sectionA {\n    -ms-grid-row:\
    \ 1;\n    -ms-grid-column: 1;\n    background-color: lightgray;\n    width: 100%;\n\
    \    height: 100%;\n    padding: 10px;\n    color: black;\n}\n\n.sectionB {\n\
    \    -ms-grid-row: 1;\n    -ms-grid-column: 2;\n    background-color: lightblue;\n\
    \    width: 100%;\n    height: 100%;\n    padding: 10px;\n    color: black;\n\
    }\n```\n\n我们来过一遍这段代码。你刚刚定义了三条规则。其中一条规则用于外层网格。你使用了基于网格的显示方式，包含两列和一行。`Section A`\
    \ 放在第 1 列，`Section B` 放在第 2 列。由于尚未应用媒体查询，这些规则将始终生效。\n\n现在，你定义一个媒体查询，用于在屏幕最大宽度为\
    \ 320 时处理 UI。当应用在小屏幕上运行时，你希望布局变窄——仅有一列和两行。`Section A` 放在第 1 行，`Section B` 放在第\
    \ 2 行。将 CSS 规则放在同一个 CSS 文件（`default.css`）中。以下是该媒体查询的代码片段：\n\n```css\n@media (max-width:320px){\n\
    \    .appGrid {\n        display: -ms-grid;\n        -ms-grid-columns: 1fr;\n\
    \        grid-columns: 1fr;\n        -ms-grid-rows: 2fr 1fr;\n        grid-rows:\
    \ 2fr 1fr;\n        width: 100%;\n        height: 100%;\n        margin:12px;\n\
    \    }\n    .sectionA {\n        -ms-grid-row: 1;\n        -ms-grid-column: 1;\n\
    \        background-color: lightgray;\n        width: 100%;\n        height: 100%;\n\
    \    }\n    .sectionB {\n        -ms-grid-row: 2;\n        -ms-grid-column: 1;\n\
    \        background-color: lightblue;\n        width: 100%;\n        height: 100%;\n\
    \    }\n}\n```\n\n这表明当屏幕尺寸为 320px 或更小时，会应用新的样式规则。作为该样式规则的一部分，应用网格变为一列两行。这重新定位了\
    \ `Section A` 和 `Section B` 的位置。\n\n接下来，按 `F5` 运行应用。你可以在 Windows 10 Mobile 模拟器上运行应用，也可以在本地计算机上运行。图\
    \ [6-2](#A978-1-4842-0719-2_6_Chapter.html#Fig2) 和图 [6-3](#A978-1-4842-0719-2_6_Chapter.html#Fig3)\
    \ 显示了在手机和 PC 上的输出结果。\n\n![A978-1-4842-0719-2_6_Fig3_HTML.jpg](A978-1-4842-0719-2_6_Fig3_HTML.jpg)\n\
    \n图 6-3. Windows PC 上的输出\n\n![A978-1-4842-0719-2_6_Fig2_HTML.jpg](A978-1-4842-0719-2_6_Fig2_HTML.jpg)\n\
    \n图 6-2. Windows Mobile 上的输出\n\n## 6.3 自适应 UI 技术：流体布局\n\n### 问题\n\n你创建了一个布局，希望在其中显示列表视图中的项目数量。但你希望列表视图能够适应窄屏以及中屏或大屏。你希望列表视图项根据屏幕大小进行响应。\n\
    \n### 解决方案\n\nUWP 中的 `ListView` 控件用于需要显示大量项目的场景。顾名思义，列表视图在屏幕上渲染一个列表，每个项绑定到一个数据项。可以通过提供模板来自定义列表视图的每个项。`ListView`\
    \ 还有一个称为 `Layout` 的概念。`Layout` 定义了项目在屏幕上的分布方式。它内置支持两种布局：`ListLayout` 和 `GridLayout`。`ListLayout`\
    \ 用于单列/多行渲染。`GridLayout` 渲染基于网格的布局（即行和列占据屏幕上的可用空间）。\n\n### 工作原理\n\n打开 `Visual\
    \ Studio 2015`。选择 **File** ➤ **New Project** ➤ **JavaScript** ➤ **Windows Universal**\
    \ ➤ **Blank App (Universal Windows)** 模板。这将创建一个通用 Windows 应用模板（见图 [6-4](#A978-1-4842-0719-2_6_Chapter.html#Fig4)）。\n\
    \n![A978-1-4842-0719-2_6_Fig4_HTML.jpg](A978-1-4842-0719-2_6_Fig4_HTML.jpg)\n\n\
    图 6-4."
