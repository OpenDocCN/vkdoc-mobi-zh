    `title : {`


                `set :function(value)`


                `{`


                    `this._title = value;`


                `},`


                `get :function()`


                `{`


                    `return this._title;`


                `}`


            `}`


    The `title` property has a `set` method, which lets developers set a value to
    the property. Similarly, you can retrieve the value of `_title` using the `title`
    property with the `get` method. From a developer’s perspective, the call to the
    `<PropertyName>` object is good enough to get or set the value.


    Run the Windows project. You should see the name and the title that are used when
    instantiating the object, as shown in Figure [2-3](#A978-1-4842-0719-2_2_Chapter.html#Fig3).


    ![A978-1-4842-0719-2_2_Fig3_HTML.jpg](A978-1-4842-0719-2_2_Fig3_HTML.jpg)


    Figure 2-3.


    Displaying the name and title in the JavaScript console window in Visual Studio
    2015


    The WinJS.Class Namespace provides the following helper functions for defining
    Classes.


    *   `define`: This function defines a class using the specified constructor and
    instance members.

    *   `derive`: This function creates a subclass for the specified class by using
    the prototype inheritance.

    *   `mix`: This function defines a class using the specified constructor and combines
    the set of instance members specified by all the mixin objects.


    ## 2.4 Deriving a Class in WinJS


    ### Problem


    You need to apply the inheritance concept in your WinJS application.


    ### Solution


    Use the `WinJS.Class.derive` method to derive one class from another in WinJS.


    ### How It Works


    The WinJS library provides the `WinJS.Class.derive` method that lets developers
    apply inheritance to derive one class from another. The `WinJS.Class.derive` method
    takes the following parameters.


    *   Base class: The class that the current class needs to inherit from.

    *   Constructor: This parameter refers to the `constructor` function that can
    be used to initialize the class members.

    *   Instance members: This parameter defines instance members, which includes
    properties and methods.

    *   Static members: This parameter defines static properties and static methods.


    Open the `WinJSFundamentals.js` file and replace the code with the following code
    snippet.


    `// Create a class called Employee`


    `var Employee = WinJS.Class.define(`


        `function () {`


            `this.name = name;`


            `this.type = "Employee";`


        `},`


        `{`


            `_Name: undefined,`


            `_type: undefined,`


            `name : {`


                `set :function(value)`


                `{`


                    `this._Name = value;`


                `},`


                `get :function()`


                `{`


                    `return this._Name;`


                `}`


            `},`


            `type: {`


                `set :function(value)`


                `{`


                    `this._type = value;`


                `},`


                `get :function()`


                `{`


                    `return this._type;`


                `}`


            `}`


        `});`


    `var ContractEmployee = WinJS.Class.derive(Employee,`


        `function (name) {`


            `this.name = name;`


            `this.type = "Contract Employee";`


        `});`


    `var ContractEmployee1 = new ContractEmployee("Senthil");`


    `// display the name and the title  in the console window.`


    `console.log(ContractEmployee1.name);`


    `console.log(ContractEmployee1.type);`


    This code snippet creates a class called `Employee`. Later, another class called
    `ContractEmployee` is created; it derives from the `Employee` class. A contract
    employee instance is created and the name and the type of employment is displayed
    in the console window.


    Run the Windows Store project from Visual Studio. This displays the name and the
    type in the JavaScript console window, as shown in Figure [2-4](#A978-1-4842-0719-2_2_Chapter.html#Fig4).


    ![A978-1-4842-0719-2_2_Fig4_HTML.jpg](A978-1-4842-0719-2_2_Fig4_HTML.jpg)


    Figure 2-4.


    Displaying the name and type of employment in the JavaScript console window in
    Visual Studio 2015


    The `WinJS.Class.derive` function behaves like the `WinJS.Class.define` function,
    except that it uses the prototype of the base class using the `Object.create`
    function to construct the derived class. The `Object.create` method derives one
    type from another by prototyping the parent object; it also adds the properties
    that are part of the child object.


    ## 2.5 Create Mixins in WinJS


    ### Problem


    You need to combine methods and properties from multiple JavaScript objects without
    using the `WinJS.Class.derive` method.


    ### Solution


    Use the `WinJS.Class.mix` method to combine methods and properties from multiple
    JavaScript objects in WinJS.'
  trans: "\n### 工作原理\n\nC# 和 VB.NET 是面向对象的语言。它们对语言中的面向对象概念有良好的实现和支持；其中一项功能就是类的创建。而另一方面，JavaScript\
    \ 本身并不内置对类创建的支持。在 JavaScript 中，所有事物都被视为对象。\n\n`WinJS` 允许开发者创建类并在其应用程序中使用这些类。\n\
