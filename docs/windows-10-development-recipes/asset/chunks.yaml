- fmt: '# What You Will Learn


    [Chapter 1](#A978-1-4842-0719-2_1_Chapter.html): Get introduced to the Universal
    Windows Platform, its features, and how to get started with the development of
    a UWP app. You’ll learn about the development tools required for UWP app development
    and how to create the app and run it on a Windows machine.


    [Chapter 2](#A978-1-4842-0719-2_2_Chapter.html): Learn the fundamentals of the
    `WinJS` library. In this chapter, you’ll explore how to use namespaces, class,
    and promise in `WinJS`.


    [Chapter 3](#A978-1-4842-0719-2_3_Chapter.html): In this chapter, you’ll explore
    various controls that are available in the `WinJS` library for building the Windows
    apps. You will learn how to add a `WinJS` control in the HTML page and setting
    its properties. Additionally, you get to explore some of the commonly used `WinJS`
    controls.


    [Chapter 4](#A978-1-4842-0719-2_4_Chapter.html): Learn about `ListControls` like
    `Repeater` Control, `FlipView`, `ListView`, `AppBar`, and `ToolBar`. Explore options
    on how to filter and group items in the `ListView` control.


    [Chapter 5](#A978-1-4842-0719-2_5_Chapter.html): In this chapter, you’ll learn
    about databinding in `WinJS` and the navigation structure used in Universal Windows
    Platform apps.


    [Chapter 6](#A978-1-4842-0719-2_6_Chapter.html): Universal Windows Platform runs
    on various devices with different screen sizes, which provides a challenge for
    developers and designers to adapt their app to these scenarios. In this chapter,
    you will learn how to adapt your UI for different screens.


    [Chapter 7](#A978-1-4842-0719-2_7_Chapter.html): Learn about application states
    and lifecycle events. Also learn how to handle the termination and resumption
    of the app, as well as state management in the app.


    [Chapter 8](#A978-1-4842-0719-2_8_Chapter.html): Are you targeting your UWP app
    for multiple regions and languages? This chapter provides the necessary recipe
    to add globalization and localization support in your UWP app built using `WinJS`.


    [Chapter 9](#A978-1-4842-0719-2_9_Chapter.html): This chapter provides an overview
    of the data storage techniques to store app data in a Windows 10 app. You will
    learn about app settings, how to store and retrieve app settings as app data,
    and working with app data folders.


    [Chapter 10](#A978-1-4842-0719-2_10_Chapter.html): This chapter covers how to
    share data between Universal Windows Platform apps. Sharing data enables developers
    to build features that allow users to share information, copy/paste, and drag
    and drop from one app to another app.


    [Chapter 11](#A978-1-4842-0719-2_11_Chapter.html): Learn about the background
    tasks in UWP. Explore topics like system event triggers, creating and running
    a background task, and more.


    [Chapter 12](#A978-1-4842-0719-2_12_Chapter.html): Do you want to integrate Location
    APIs in your Windows app? This chapter covers topics such as maps and locations
    that can be used by developers to integrate in their UWP JavaScript apps.


    [Chapter 13](#A978-1-4842-0719-2_13_Chapter.html): In this chapter, you learn
    about the integration of Microsoft Azure Mobile Services in your Universal Windows
    Platform app. This includes recipes that explain how to create the mobile services
    back end in Azure and how you can connect from your app to perform CRUD operations.


    [Chapter 14](#A978-1-4842-0719-2_14_Chapter.html): This chapter provides insights
    about the tiles and notifications features of Windows 10. Here you learn about
    the creation of default tiles, adaptive tiles, and toast notifications.


    [Chapter 15](#A978-1-4842-0719-2_15_Chapter.html): In this chapter, you’ll explore
    the various device capabilities and sensors in your Windows device and how you
    can use them in your UWP app.


    [Chapter 16](#A978-1-4842-0719-2_16_Chapter.html): In this chapter, you’ll learn
    about additional tools, like the JavaScript Console window, DOM Explorer, diagnostic
    tools, the Windows 10 Mobile emulator, and more. These tools let developers easily
    debug and test their Windows apps.


    [Chapter 17](#A978-1-4842-0719-2_17_Chapter.html): In this chapter, you’ll explore
    sideloading and installing your Windows app on devices. You’ll learn about using
    the Windows App Certification Kit to test your app and generate reports to see
    if it is ready for the Windows Store.


    [Chapter 18](#A978-1-4842-0719-2_18_Chapter.html): Once app development is complete,
    you need to submit it to the Windows Store so that users can download your app.
    In this chapter, you’ll learn how to create the application package and submit
    it to the Store. You will also learn how to monetize your Windows app.


    ## Source Code


    The source code for this book can be found at [`www.apress.com/9781484207208`](http://www.apress.com/9781484207208).
    Scroll down and select the Source Code/Downloads tab to view the Download link.


    ## Acknowledgments


    Writing a book is a challenging task that takes lot of time and effort. This requires
    tremendous support from family and friends. Thanks to my parents for their endless
    support. Not to forget few of my mentors—Sree Kumar (VP, Trivum eSolutions), Ananda
    Kumar (project manager, Trivium eSolutions), Jayaprakash (principal engineering
    manager, Cleartrip) who have been very much supportive of me in writing this book.
    I also need to thank my coauthors and friend Lohith GN, and the Apress team.


    > —Senthil Kumar


    To Dad, Mom, my wife, Rashmi, and my son, Adithya.


    > —Lohith GN


    Writing a book was not an easy task for me. It takes a lot of time and lot of
    support. Thanks to my wife for her endless support. I also need to thank coauthor
    and friend Pathik Rawal, and the talented team of editors and reviewers at Apress.
    It would have not been completed without your collaboration.


    > —Pryank Rohilla


    I wish to personally thank the following people for their contributions to my
    inspiration and knowledge and other help in creating this book.


    > —Pathik Rawal


    *   Pryank Rohilla (coauthor)

    *   Gwenan Spearing (editor)

    *   Melissa Maldonado (coordinating editor)

    *   Douglas Pundick (development editor)

    *   My family (wife, Mittu, and two kids, Aayu and Jigi)'
