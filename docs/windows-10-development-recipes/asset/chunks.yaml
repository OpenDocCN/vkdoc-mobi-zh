- fmt: '# Chapter 1: Getting Started with Windows 10 Applications


    Windows 10 is the new operating system released by Microsoft on July 29, 2015.
    It has been much awaited since Windows 8.1. For application developers (Store
    and Phone), Windows 8.1 and Visual Studio 2013 gave a unique programming model
    called Universal Windows 8 applications. Universal Windows apps were able to target
    both Windows and Windows Phone from a shared code base. With Windows 10, it goes
    beyond Windows and Windows Phone and introduces what is known as Universal Windows
    Platform (UWP) apps. With the new platform, you are guaranteed a consistent core
    API layer across devices. A single package developed on UWP can be installed on
    a wide range of devices and device families. The device family includes desktop
    OS, Mobile OS (phones and tablets), Xbox, and Internet of Things (IoT) devices
    and headless device families. This means that your apps can run on any variety
    of devices, including phones, tablets, PCs, Xbox consoles, and more. This chapter
    introduces Windows 10 Universal Windows Platform application development.


    ## 1.1 Examining the Universal Windows Platform


    ### Problem


    You have decided to develop a Universal Windows Platform application that targets
    PCs, phones, tablets, and the Xbox. You want to understand the Universal Windows
    Platform—device families and universal controls.


    ### Solution


    Let’s go through some of the highlights of the Universal Windows Platform.


    #### One Windows Platform


    Windows 10 brings one Windows platform to the table (see Figure [1-1](#A978-1-4842-0719-2_1_Chapter.html#Fig1)).
    In Windows 10, the OS has been refactored and now has a common core across different
    Windows 10 platforms. This means that you have a common Windows kernel, one file
    I/O stack, and one app model. Simply put, the Universal Windows Platform is a
    collection of contacts and versions. With Windows Phone 8.1 and Windows 8.1 applications,
    you have to target the OS—either Windows or Windows Phone, whereas with Universal
    Windows Platform apps, you target the devices.


    ![A978-1-4842-0719-2_1_Fig1_HTML.jpg](A978-1-4842-0719-2_1_Fig1_HTML.jpg)


    Figure 1-1. Universal Windows Platform apps model


    UWP apps can run on a variety of devices that have different form factors and
    input mechanisms. When you develop UWP apps, you need to make sure that you tailor
    the experience to each device and take advantage of the respective device’s capabilities.
    There is a common core or kernel on Windows 10. Each device adds its own API to
    the base layer. So to access the devices’ unique APIs, you need to write conditional
    code to provide device-specific features in your apps.


    #### Device Families


    Windows and Windows Phone are the operating systems that developers targeted their
    Windows 8.1 and Windows Phone 8 applications. But with Windows 10 now available
    on various devices, UWP apps target a specific device family. A device family
    identifies APIs, characteristics, and behaviors that are seen across the devices
    within the family. It also determines the set of devices that the app can be installed
    on. Figure [1-2](#A978-1-4842-0719-2_1_Chapter.html#Fig2) showcases the device
    family hierarchy.


    ![A978-1-4842-0719-2_1_Fig2_HTML.jpg](A978-1-4842-0719-2_1_Fig2_HTML.jpg)


    Figure 1-2. Universal device family hierarchy


    A set of APIs have a name and a version number. This is the foundation of a device
    family OS. For example, PCs run the desktop OS and are based on the desktop device
    family. On the other hand, phones and tablets have a mobile OS that is based on
    the mobile device family. I hope you now have an idea of what exactly a device
    family is.


    #### Universal Controls


    With UWP, apps run on different form factors, screen resolutions, DPIs, and other
    device characteristics. Apps have to adapt to these different form factors and
    resolutions. Windows 10 provides new universal controls, layouts, and tooling
    that will help you adapt your app API according to the device on which it is run.
    Windows 10 includes new controls, such as Calendar and Split View. Pivot control,
    which was specific to Windows Phone apps, is now available for Universal Windows
    Platform apps.


    #### Common Input Handling


    With UWP apps, the universal controls now support various inputs, such as the
    mouse, keyboard, touch, pens, and controllers (e.g., the Xbox controller). The
    platform provides some core APIs that can be used in your apps to handle various
    inputs. The following are some of the input APIs that can be used.


    *   `CoreInput`: Allows you to consume raw input.

    *   `PointerInput`: Unifies raw touch, the mouse, and the pen into a single consistent
    interface.

    *   `PointerDevice`: A device API that allows you to query device capabilities
    to understand the available input types.


    ## 1.2 Development Tools for Universal Windows Platform


    ### Problem


    You want to start developing Universal Windows Platform apps. You want to know
    which tools you should use for development.


    ### Solution


    You need to have the Windows 10 operating system and Visual Studio 2015 Community
    Edition installed on your development machine.


    To install Windows 10, visit Microsoft at [`http://windows.microsoft.com/en-us/windows/buy`](http://windows.microsoft.com/en-us/windows/buy).
    If you are already on any Windows OS, you are able to upgrade your OS to Windows
    10 for free.


    To install the Visual Studio 2015 (VS 2015) Community Edition, you can visit the
    Microsoft site at [`https://www.visualstudio.com/en-us/downloads/visual-studio-2015-downloads-vs`](https://www.visualstudio.com/en-us/downloads/visual-studio-2015-downloads-vs).
    When installing VS 2015, you need to make sure that the Universal Windows app
    development tools are selected (see Figure [1-3](#A978-1-4842-0719-2_1_Chapter.html#Fig3)).
    This is in the optional features list.


    ![A978-1-4842-0719-2_1_Fig3_HTML.jpg](A978-1-4842-0719-2_1_Fig3_HTML.jpg)


    Figure 1-3. Visual Studio 2015 Community Edition installation


    ## 1.3 Creating Universal Windows Platform Application


    ### Problem


    You want to create a simple Universal Windows Platform application.


    ### Solution


    Visual Studio 2015 comes with a preinstalled Universal Windows Platform application
    project template. You will use this template to create your first application.'
  raw: '# Chapter 1: Getting Started with Windows 10 Applications


    Windows 10 is the new operating system released by Microsoft on July 29, 2015\.
    It has been much awaited since Windows 8.1\. For application developers (Store
    and Phone), Windows 8.1 and Visual Studio 2013 gave a unique programming model
    called Universal Windows 8 applications. Universal Windows apps were able to target
    both Windows and Windows Phone from a shared code base. With Windows 10, it goes
    beyond Windows and Windows Phone and introduces what is known as Universal Windows
    Platform (UWP) apps. With the new platform, you are guaranteed a consistent core
    API layer across devices. A single package developed on UWP can be installed on
    a wide range of devices and device families. The device family includes desktop
    OS, Mobile OS (phones and tablets), Xbox, and Internet of Things (IoT) devices
    and headless device families. This means that your apps can run on any variety
    of devices, including phones, tablets, PCs, Xbox consoles, and more. This chapter
    introduces Windows 10 Universal Windows Platform application development.


    ## 1.1 Examining the Universal Windows Platform


    ### Problem


    You have decided to develop a Universal Windows Platform application that targets
    PCs, phones, tablets, and the Xbox. You want to understand the Universal Windows
    Platform—device families and universal controls.


    ### Solution


    Let’s go through some of the highlights of the Universal Windows Platform.


    #### One Windows Platform


    Windows 10 brings one Windows platform to the table (see Figure [1-1](#A978-1-4842-0719-2_1_Chapter.html#Fig1)).
    In Windows 10, the OS has been refactored and now has a common core across different
    Windows 10 platforms. This means that you have a common Windows kernel, one file
    I/O stack, and one app model. Simply put, the Universal Windows Platform is a
    collection of contacts and versions. With Windows Phone 8.1 and Windows 8.1 applications,
    you have to target the OS—either Windows or Windows Phone, whereas with Universal
    Windows Platform apps, you target the devices.


    ![A978-1-4842-0719-2_1_Fig1_HTML.jpg](A978-1-4842-0719-2_1_Fig1_HTML.jpg)


    Figure 1-1.


    Universal Windows Platform apps model


    UWP apps can run on a variety of devices that have different form factors and
    input mechanisms. When you develop UWP apps, you need to make sure that you tailor
    the experience to each device and take advantage of the respective device’s capabilities.
    There is a common core or kernel on Windows 10\. Each device adds its own API
    to the base layer. So to access the devices’ unique APIs, you need to write conditional
    code to provide device-specific features in your apps.


    #### Device Families


    Windows and Windows Phone are the operating systems that developers targeted their
    Windows 8.1 and Windows Phone 8 applications. But with Windows 10 now available
    on various devices, UWP apps target a specific device family. A device family
    identifies APIs, characteristics, and behaviors that are seen across the devices
    within the family. It also determines the set of devices that the app can be installed
    on. Figure [1-2](#A978-1-4842-0719-2_1_Chapter.html#Fig2) showcases the device
    family hierarchy.


    ![A978-1-4842-0719-2_1_Fig2_HTML.jpg](A978-1-4842-0719-2_1_Fig2_HTML.jpg)


    Figure 1-2.


    Universal device family hierarchy


    A set of APIs have a name and a version number. This is the foundation of a device
    family OS. For example, PCs run the desktop OS and are based on the desktop device
    family. On the other hand, phones and tablets have a mobile OS that is based on
    the mobile device family. I hope you now have an idea of what exactly a device
    family is.


    #### Universal Controls


    With UWP, apps run on different form factors, screen resolutions, DPIs, and other
    device characteristics. Apps have to adapt to these different form factors and
    resolutions. Windows 10 provides new universal controls, layouts, and tooling
    that will help you adapt your app API according to the device on which it is run.
    Windows 10 includes new controls, such as Calendar and Split View. Pivot control,
    which was specific to Windows Phone apps, is now available for Universal Windows
    Platform apps.


    #### Common Input Handling


    With UWP apps, the universal controls now support various inputs, such as the
    mouse, keyboard, touch, pens, and controllers (e.g., the Xbox controller). The
    platform provides some core APIs that can be used in your apps to handle various
    inputs. The following are some of the input APIs that can be used.


    *   CoreInput: Allows you to consume raw input.

    *   PointerInput: Unifies raw touch, the mouse, and the pen into a single consistent
    interface.

    *   PointerDevice: A device API that allows you to query device capabilities to
    understand the available input types.


    ## 1.2 Development Tools for Universal Windows Platform


    ### Problem


    You want to start developing Universal Windows Platform apps. You want to know
    which tools you should use for development.


    ### Solution


    You need to have the Windows 10 operating system and Visual Studio 2015 Community
    Edition installed on your development machine.


    To install Windows 10, visit Microsoft at [`http://windows.microsoft.com/en-us/windows/buy`](http://windows.microsoft.com/en-us/windows/buy)
    . If you are already on any Windows OS, you are able to upgrade your OS to Windows
    10 for free.


    To install the Visual Studio 2015 (VS 2015) Community Edition, you can visit the
    Microsoft site at [`https://www.visualstudio.com/en-us/downloads/visual-studio-2015-downloads-vs`](https://www.visualstudio.com/en-us/downloads/visual-studio-2015-downloads-vs)
    . When installing VS 2015, you need to make sure that the Universal Windows app
    development tools are selected (see Figure [1-3](#A978-1-4842-0719-2_1_Chapter.html#Fig3)).
    This is in the optional features list.


    ![A978-1-4842-0719-2_1_Fig3_HTML.jpg](A978-1-4842-0719-2_1_Fig3_HTML.jpg)


    Figure 1-3.


    Visual Studio 2015 Community Edition installation


    ## 1.3 Creating Universal Windows Platform Application


    ### Problem


    You want to create a simple Universal Windows Platform application.


    ### Solution


    Visual Studio 2015 comes with a preinstalled Universal Windows Platform application
    project template. You will use this template to create your first application.'
  trans: '

    # 第一章：Windows 10 应用程序入门


    Windows 10 是微软于 2015 年 7 月 29 日发布的新操作系统。自 Windows 8.1 以来，人们一直翘首以盼。对于应用程序开发者（应用商店和手机）来说，Windows
    8.1 和 Visual Studio 2013 提供了一个独特的编程模型，称为通用 Windows 8 应用程序。通用 Windows 应用程序能够通过共享的代码库同时面向
    Windows 和 Windows Phone。随着 Windows 10 的到来，它的目标超越了 Windows 和 Windows Phone，引入了一种名为通用
    Windows 平台 (UWP) 的应用。借助这个新平台，您可以确保在各种设备上获得一致的核心 API 层。在 UWP 上开发的单个软件包可以安装到广泛的设备和设备系列上。设备系列包括桌面操作系统、移动操作系统（手机和平板电脑）、Xbox、物联网
    (IoT) 设备以及无头设备系列。这意味着您的应用程序可以在各种设备上运行，包括手机、平板电脑、个人电脑、Xbox 主机等等。本章将介绍 Windows 10
    通用 Windows 平台应用程序开发。


    ## 1.1 探究通用 Windows 平台


    ### 问题


    您已决定开发一个面向个人电脑、手机、平板电脑和 Xbox 的通用 Windows 平台应用程序。您想了解通用 Windows 平台——设备系列和通用控件。


    ### 解决方案


    让我们来了解一下通用 Windows 平台的一些亮点。


    #### 一个 Windows 平台


    Windows 10 带来了一个统一的 Windows 平台（见图 1-1）。在 Windows 10 中，操作系统经过了重构，现在在不同的 Windows
    10 平台之间拥有了一个通用核心。这意味着您拥有一个通用的 Windows 内核、一个文件 I/O 栈和一个应用模型。简而言之，通用 Windows 平台是契约和版本的集合。在开发适用于
    Windows Phone 8.1 和 Windows 8.1 的应用程序时，您必须面向特定的操作系统——Windows 或 Windows Phone；而对于通用
    Windows 平台应用，您面向的是设备。


    ![A978-1-4842-0719-2_1_Fig1_HTML.jpg](img/A978-1-4842-0719-2_1_Fig1_HTML.jpg)


    图 1-1. 通用 Windows 平台应用模型


    UWP 应用可以运行在多种具有不同外形和输入机制的设备上。在开发 UWP 应用时，您需要确保针对每种设备量身打造体验，并充分利用各自设备的功能。Windows
    10 上存在一个通用核心或内核。每个设备都会在基础层上添加自己的 API。因此，要访问设备的独有 API，您需要编写条件代码，以便在应用中提供设备特定的功能。


    #### 设备系列


    Windows 和 Windows Phone 是开发者针对 Windows 8.1 和 Windows Phone 8 应用程序进行开发的操作系统。但是，随着
    Windows 10 现在可在各种设备上使用，UWP 应用面向的是特定的设备系列。设备系列定义了同一系列内各个设备共有的 API、特性和行为。它还决定了应用可以安装到哪些设备上。图
    1-2 展示了设备系列的层次结构。


    ![A978-1-4842-0719-2_1_Fig2_HTML.jpg](img/A978-1-4842-0719-2_1_Fig2_HTML.jpg)


    图 1-2. 通用设备系列层次结构


    一组 API 拥有一个名称和一个版本号。这是设备系列操作系统的基础。例如，个人电脑运行桌面操作系统，并基于桌面设备系列。另一方面，手机和平板电脑拥有基于移动设备系列的移动操作系统。希望您现在对设备系列有了一个概念。


    #### 通用控件


    通过 UWP，应用可以在不同的外形尺寸、屏幕分辨率、DPI 以及其他设备特性上运行。应用必须适应这些不同的外形和分辨率。Windows 10 提供了新的通用控件、布局和工具，这些将帮助您根据应用运行的设备来调整应用
    API。Windows 10 包含新的控件，例如 Calendar 和 Split View。原本专用于 Windows Phone 应用的 Pivot 控件，现在也可用于通用
    Windows 平台应用。


    #### 通用输入处理


    对于 UWP 应用，通用控件现在支持各种输入方式，例如鼠标、键盘、触摸、触控笔和控制器（例如 Xbox 控制器）。该平台提供了一些核心 API，可在您的应用中使用来处理各种输入。以下是一些可用的输入
    API。


    *   `CoreInput`：允许您使用原始输入。

    *   `PointerInput`：将原始触摸、鼠标和触控笔统一到一个一致的界面中。

    *   `PointerDevice`：一种设备 API，允许您查询设备功能以了解可用的输入类型。


    ## 1.2 通用 Windows 平台的开发工具


    ### 问题


    您想开始开发通用 Windows 平台应用。您想知道应该使用哪些工具进行开发。


    ### 解决方案


    您的开发机器上需要安装 Windows 10 操作系统和 Visual Studio 2015 Community 版。


    要安装 Windows 10，请访问微软网站 [`http://windows.microsoft.com/en-us/windows/buy`](http://windows.microsoft.com/en-us/windows/buy)。如果您已经在使用任何
    Windows 操作系统，您都可以免费升级到 Windows 10。


    要安装 Visual Studio 2015 (VS 2015) Community 版，您可以访问微软网站 [`https://www.visualstudio.com/en-us/downloads/visual-studio-2015-downloads-vs`](https://www.visualstudio.com/en-us/downloads/visual-studio-2015-downloads-vs)。安装
    VS 2015 时，您需要确保选中了通用 Windows 应用开发工具（见图 1-3）。这位于可选功能列表中。


    ![A978-1-4842-0719-2_1_Fig3_HTML.jpg](img/A978-1-4842-0719-2_1_Fig3_HTML.jpg)


    图 1-3. Visual Studio 2015 Community 版安装


    ## 1.3 创建通用 Windows 平台应用程序


    ### 问题


    您想创建一个简单的通用 Windows 平台应用程序。


    ### 解决方案


    Visual Studio 2015 附带了一个预安装的通用 Windows 平台应用程序项目模板。您将使用此模板来创建您的第一个应用程序。

