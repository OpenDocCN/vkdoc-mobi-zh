    When building an app using a library for the platform, it is important to understand
    the features that the library provides. In this chapter, you’ll look at various
    features that WinJS provides for building Windows Runtime apps using JavaScript,
    HTML, and CSS. These features include namespaces, modules, promises, and query
    selectors. These are features used in almost all the applications that you build
    using WinJS. By taking advantage of the features like namespaces and modules,
    you can make your app easier to maintain, instead of adding everything under the
    global namespace.


    ## 2.1 Namespaces in JavaScript


    ### Problem


    You need to group common functionalities and prevent naming collisions in your
    JavaScript code when developing using the WinJS library.


    ### Solution


    Namespaces allow developers to better group or organize common functionalities.
    The other programming languages—C#, VB.NET, Java, and so forth—provide this feature.
    Plenty of JavaScript frameworks do not support namespaces, but WinJS provides
    a feature in which developers can utilize the namespaces in their projects. Namespaces
    can come in handy, especially when your app utilizes multiple libraries written
    by various developers.


    Developers can use the `WinJS.Namespace.define` method to declare a namespace.


    ### How It Works


    The WinJS library lets developers declare namespaces by using the `WinJS.Namespace.define`
    method.


    The `WinJS.Namespace.define` method takes two parameters.


    *   `Name`: This is the first parameter and represents the name of the new namespace.

    *   `Members`: This is the second parameter and it is completely optional. This
    parameter represents the list of objects that need to be added to the namespace
    being defined.


    The following are the steps to create a new namespace in a Windows Store universal
    app using WinJS.


    Launch Visual Studio 2015 and select File ➤ New Project. In the New Project dialog,
    select JavaScript ➤ Windows ➤ Universal from the Installed Templates sidebar.
    Select Blank App (Universal Windows) from the template and name the project ch2.1WinJSFundamentals.
    Click the OK button. This created the necessary files within the Visual Studio
    solution.   Add a new JavaScript file in the ch2.1WinJSFundamentals project by
    right-clicking the project’s js folder and selecting the Add ➤ New Item option.
    Select the JavaScript file from the Add New Item dialog and name the file WinJSFundamentals.js.
    Add the following code to the file.  


    `// Define the Namespace Developerpublish`


    `WinJS.Namespace.define("DeveloperPublish");`


    `// Utilities created in the DeveloperPublish Namespace`


    `DeveloperPublish.Utilities = {`


        `DisplayMessage: function () {`


            `return "Message from DeveloperPublish Namespace";`


        `}`


    `};`


    `// Define the Namespace Apress and create the Utilities under it.`


    `WinJS.Namespace.define("Apress",`


        `{`


            `Utilities: {`


                `DisplayMessage: function () {`


                    `return "Message from Apress Namespace";`


                `}`


            `}`


        `});`


    `console.log(DeveloperPublish.Utilities.DisplayMessage());`


    `console.log(Apress.Utilities.DisplayMessage());`


    In the preceding code snippet, the `DeveloperPublish` namespace demonstrates the
    usage of the `WinJS.Namespace.define` method with a single parameter. The objects
    are added to the namespaces, with the namespace followed by a period and the name
    of the object.


    The Apress namespace is created with the two parameters. The first parameter is
    the name of the namespace, Apress; whereas the second parameter is the object
    that is part of the Apress namespace.


    Open the `default.html` page and add the reference to the `WinJSFundamentals.js`
    file by using the following code snippet: `<script src="js/WinJSFundamentals.js"></script>`
      Run the Windows app. You will notice that the string that is returned from `DisplayMessage`
    of the `Utilities` class is displayed in the console window, as shown in Figure
    [2-1](#A978-1-4842-0719-2_2_Chapter.html#Fig1).


    ![A978-1-4842-0719-2_2_Fig1_HTML.jpg](A978-1-4842-0719-2_2_Fig1_HTML.jpg)


    Figure 2-1.


    Display the string in the Visual Studio 2015 console window  


    `WinJS.Namespace` is the default namespace that provides functionalities like


    *   The `promise` object

    *   Functions to define namespaces, `log`, and `xhr`.


    The following are objects and functions that are part of WinJS.Namespace.


    *   `promise`: This object provides the mechanism to implement asynchronous programming
    in your JavaScript code.

    *   `validation`: This property can be set to display the results of the validation.

    *   `define`: This function defines a new namespace with the specified name.

    *   `defineWithParent`: This function defines a namespace with a specified name
    under a specified parent namespace.

    *   `log`: This function writes the output to the JavaScript console window in
    Visual Studio 2015.

    *   `xhr`: This function wraps the calls made to the XMLHttpRequest in a promise.


    Note that you should not refer to a namespace before it is defined. When you try
    to access the namespace before it is defined, you receive a “Namespace is undefined”
    error.


    The Namespace feature is included in the WinJS library to better handle problems
    related to the scope. The source code for the Namespaces implementation in WinJS
    is found in the `base.js` file, which is under the `WinJS/js` folder of your project.


    ## 2.2 Add a Namespace to an Existing Namespace


    ### Problem


    You need to add a namespace to the existing namespace and define your functionalities.


    ### Solution


    Use the `WinJS.Namespace.defineWithParent` method to add a namespace to an existing
    namespace in WinJS.


    ### How It works


    The `WinJS.Namespace.defineWithParent` method lets developers add a new namespace
    to an existing namespace. This is similar to the `define` method; it lets you
    create a new namespace under an existing one.


    The `WinJS.Namespace.defineWithParent` method accepts three parameters:


    *   Parent namespace: The first parameter is the name of the parent namespace.

    *   Name: This is the name of the namespace to be added to the parent namespace.

    *   Members: The list of objects to be added to the new namespace. This is an
    optional parameter.


    Let’s use the recipe created in Recipe 2.1\. Open the `WinJSFundamentals.js` file
    in the project and replace it with the following code snippet.


    `WinJS.Namespace.define("Apress");`


    `WinJS.Namespace.defineWithParent(Apress, "Books" ,`


        `{`


            `Utilities :`


                `{`


                    `DisplayMessage: function () {`


                        `return "Message from Apress.Books Namespace";`


                    `}`


                `}`


        `}`


    `);`


    `console.log(Apress.Books.Utilities.DisplayMessage());`


    Run the Windows Store project and you should see the string “Message from Apress.Books
    Namespace” displayed in the Visual Studio JavaScript console window, as shown
    in Figure [2-2](#A978-1-4842-0719-2_2_Chapter.html#Fig2).


    ![A978-1-4842-0719-2_2_Fig2_HTML.jpg](A978-1-4842-0719-2_2_Fig2_HTML.jpg)


    Figure 2-2.


    Display the string in the JavaScript console window in Visual Studio 2015


    Note that the namespaces should only contain classes, functions, constants, and
    other namespaces.


    ## 2.3 Creating a Class in WinJS


    ### Problem


    You need to create a class in the JavaScript code within your Windows Runtime
    apps.


    ### Solution


    Use the `WinJS.Class.define` method to create a class in WinJS.'
  trans: "\n# 第 2 章：WinJS 基础\n\n当使用平台库构建应用时，理解该库提供的功能至关重要。在本章中，你将了解 WinJS 为使用 JavaScript、HTML\
    \ 和 CSS 构建 Windows 运行时应用所提供的各种功能。这些功能包括命名空间、模块、承诺和查询选择器。几乎在你使用 WinJS 构建的所有应用程序中都会用到这些功能。通过利用命名空间和模块等特性，你可以让应用更易于维护，而不是将所有内容都添加到全局命名空间下。\n\
    \n## 2.1 JavaScript 中的命名空间\n\n### 问题\n\n在使用 WinJS 库进行开发时，你需要对通用功能进行分组，并防止 JavaScript\
    \ 代码中出现命名冲突。\n\n### 解决方案\n\n命名空间允许开发者更好地对通用功能进行分组或组织。其他编程语言——C#、VB.NET、Java 等——都提供了这一特性。许多\
    \ JavaScript 框架不支持命名空间，但 WinJS 提供了一项功能，开发者可以在其项目中使用命名空间。当你的应用使用了由不同开发者编写的多个库时，命名空间尤其有用。\n\
    \n开发者可以使用 `WinJS.Namespace.define` 方法来声明一个命名空间。\n\n### 工作原理\n\nWinJS 库允许开发者通过使用\
    \ `WinJS.Namespace.define` 方法来声明命名空间。\n\n`WinJS.Namespace.define` 方法接受两个参数。\n\n\
    *   `Name`：这是第一个参数，代表新命名空间的名称。\n*   `Members`：这是第二个参数，完全是可选的。此参数代表需要添加到所定义命名空间中的对象列表。\n\
    \n以下是使用 WinJS 在 Windows 应用商店通用应用中创建新命名空间的步骤。\n\n启动 Visual Studio 2015，然后选择“文件”➤“新建项目”。在“新建项目”对话框中，从“已安装的模板”侧边栏中选择“JavaScript”➤“Windows”➤“通用”。选择“空白应用(通用\
    \ Windows)”模板，并将项目命名为 `ch2.1WinJSFundamentals`。单击“确定”按钮。这会在 Visual Studio 解决方案中创建必要的文件。\n\
    \n在 `ch2.1WinJSFundamentals` 项目中添加一个新的 JavaScript 文件，方法是右键单击项目的 `js` 文件夹，然后选择“添加”➤“新建项”。从“添加新项”对话框中选择“JavaScript\
    \ 文件”，并将文件命名为 `WinJSFundamentals.js`。将以下代码添加到该文件中。\n\n```\n// 定义命名空间 Developerpublish\n\
    WinJS.Namespace.define(\"DeveloperPublish\");\n// 在 DeveloperPublish 命名空间中创建的工具\n\
    DeveloperPublish.Utilities = {\n    DisplayMessage: function () {\n        return\
    \ \"来自 DeveloperPublish 命名空间的消息\";\n    }\n};\n// 定义命名空间 Apress 并在其下创建工具。\nWinJS.Namespace.define(\"\
    Apress\",\n    {\n        Utilities: {\n            DisplayMessage: function ()\
    \ {\n                return \"来自 Apress 命名空间的消息\";\n            }\n        }\n\
    \    });\nconsole.log(DeveloperPublish.Utilities.DisplayMessage());\nconsole.log(Apress.Utilities.DisplayMessage());\n\
    ```\n\n在上面的代码片段中，`DeveloperPublish` 命名空间演示了仅使用一个参数调用 `WinJS.Namespace.define`\
    \ 方法的用法。对象被添加到命名空间中，形式为“命名空间.对象名称”。\n\n`Apress` 命名空间是使用两个参数创建的。第一个参数是命名空间的名称 `Apress`；而第二个参数是作为\
    \ `Apress` 命名空间一部分的对象。\n\n打开 `default.html` 页面，并使用以下代码片段添加对 `WinJSFundamentals.js`\
    \ 文件的引用：`<script src=\"js/WinJSFundamentals.js\"></script>`\n\n运行 Windows 应用。你会注意到，`Utilities`\
    \ 类的 `DisplayMessage` 返回的字符串显示在控制台窗口中，如图 2-1 所示。\n\n![A978-1-4842-0719-2_2_Fig1_HTML.jpg](img/A978-1-4842-0719-2_2_Fig1_HTML.jpg)\n\
    \n图 2-1. 在 Visual Studio 2015 控制台窗口中显示字符串\n\n`WinJS.Namespace` 是默认的命名空间，它提供了诸如以下功能：\n\
    \n*   `promise` 对象\n*   用于定义命名空间、`log` 和 `xhr` 的函数\n\n以下是 `WinJS.Namespace` 中的对象和函数：\n\
    \n*   `promise`：此对象提供了在 JavaScript 代码中实现异步编程的机制。\n*   `validation`：可以设置此属性来显示验证结果。\n\
    *   `define`：此函数使用指定的名称定义一个新的命名空间。\n*   `defineWithParent`：此函数在指定的父命名空间下使用指定的名称定义一个命名空间。\n\
    *   `log`：此函数将输出写入 Visual Studio 2015 中的 JavaScript 控制台窗口。\n*   `xhr`：此函数将对 `XMLHttpRequest`\
    \ 的调用封装在一个承诺中。\n\n请注意，你不应在命名空间定义之前引用它。当你尝试在命名空间定义之前访问它时，你会收到“命名空间未定义”的错误。\n\n\
    WinJS 库中包含命名空间功能，以便更好地处理与作用域相关的问题。WinJS 中命名空间实现的源代码位于你项目 `WinJS/js` 文件夹下的 `base.js`\
    \ 文件中。\n\n## 2.2 向现有命名空间添加子命名空间\n\n### 问题\n\n你需要向现有命名空间添加一个子命名空间，并定义你的功能。\n\n\
    ### 解决方案\n\n使用 `WinJS.Namespace.defineWithParent` 方法向 WinJS 中的现有命名空间添加子命名空间。\n\
    \n### 工作原理\n\n`WinJS.Namespace.defineWithParent` 方法允许开发者向现有命名空间添加一个新命名空间。这类似于\
    \ `define` 方法；它允许你在现有命名空间下创建一个新命名空间。\n\n`WinJS.Namespace.defineWithParent` 方法接受三个参数：\n\
    \n*   父命名空间：第一个参数是父命名空间的名称。\n*   Name：这是要添加到父命名空间中的子命名空间的名称。\n*   Members：要添加到新命名空间中的对象列表。这是一个可选参数。\n\
    \n让我们使用在方案 2.1 中创建的项目。打开项目中的 `WinJSFundamentals.js` 文件，并将其替换为以下代码片段。\n\n```\n\
    WinJS.Namespace.define(\"Apress\");\nWinJS.Namespace.defineWithParent(Apress,\
    \ \"Books\" ,\n    {\n        Utilities :\n            {\n                DisplayMessage:\
    \ function () {\n                    return \"来自 Apress.Books 命名空间的消息\";\n   \
    \             }\n            }\n    }\n);\nconsole.log(Apress.Books.Utilities.DisplayMessage());\n\
    ```\n\n运行 Windows 应用商店项目，你应该会看到字符串“来自 Apress.Books 命名空间的消息”显示在 Visual Studio JavaScript\
    \ 控制台窗口中，如图 2-2 所示。\n\n![A978-1-4842-0719-2_2_Fig2_HTML.jpg](img/A978-1-4842-0719-2_2_Fig2_HTML.jpg)\n\
    \n图 2-2. 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示字符串\n\n请注意，命名空间应仅包含类、函数、常量和其他命名空间。\n\
    \n## 2.3 在 WinJS 中创建类\n\n### 问题\n\n你需要在 Windows 运行时应用的 JavaScript 代码中创建一个类。\n\n\
    ### 解决方案\n\n使用 `WinJS.Class.define` 方法在 WinJS 中创建一个类。\n"
- fmt: "### How It Works\n\nC# and VB.NET are object-oriented languages. They have\
    \ good implementation and support for the object-oriented concepts within the\
    \ language; one such feature is the creation of the class. JavaScript, on the\
    \ other hand, does not have the built-in support for the creation of the class.\
    \ Everything in JavaScript is treated as an object.\n\n`WinJS` lets developers\
    \ create classes and utilize them within their applications.\n\nYou can use the\
    \ `WinJS.Class.define` method to create a new class in WinJS.\n\nThe `WinJS.Class.define`\
    \ method takes three parameters.\n\n- **Constructor**: The first parameter lets\
    \ developers initialize a new object.\n- **Instance members**: The second parameter\
    \ is the collection of instance members, which includes properties and methods.\n\
    - **Static members**: The third parameter includes static properties and static\
    \ methods.\n\nOpen the `WinJSFundamentals.js` file in the project and replace\
    \ it with following code snippet.\n\n```\n// Create a class called Author\n\n\
    var Author = WinJS.Class.define(\n\n    function (name, title) {\n\n        this.name\
    \ = name;\n\n        this.title = title;\n\n    },\n\n    {\n\n        _Name:\
    \ undefined,\n\n        _title: undefined,\n\n        name : {\n\n           \
    \ set :function(value)\n\n            {\n\n                this._Name = value;\n\
    \n            },\n\n            get :function()\n\n            {\n\n         \
    \       return this._Name;\n\n            }\n\n        },\n\n        title : {\n\
    \n            set :function(value)\n\n            {\n\n                this._title\
    \ = value;\n\n            },\n\n            get :function()\n\n            {\n\
    \n                return this._title;\n\n            }\n\n        }\n\n    });\n\
    \n// instantiate the author class by invoking the constructor with 2 parameters\n\
    \nvar author1 = new Author(\"Senthil\", \"WinJS recipes\");\n\n// display the\
    \ name and the title  in the console window.\n\nconsole.log(author1.name);\n\n\
    console.log(author1.title);\n```\n\nIn the preceding code snippet, the `Author`\
    \ class is created using the `WinJS.Class.define` method. The first parameter\
    \ to this method is the constructor, which takes two parameters and initializes\
    \ the `name` and `title`.\n\nThe `Author` class has two properties.\n\n- The `title`\
    \ with its backing field `_title`\n- The `name` with its backing field `_name`\n\
    \nBoth of these properties contain a getter method and a setter method. Look at\
    \ the following property, for example.\n\n```\ntitle : {\n\n            set :function(value)\n\
    \n            {\n\n                this._title = value;\n\n            },\n\n\
    \            get :function()\n\n            {\n\n                return this._title;\n\
    \n            }\n\n        }\n```\n\nThe `title` property has a `set` method,\
    \ which lets developers set a value to the property. Similarly, you can retrieve\
    \ the value of `_title` using the `title` property with the `get` method. From\
    \ a developer’s perspective, the call to the `<PropertyName>` object is good enough\
    \ to get or set the value.\n\nRun the Windows project. You should see the name\
    \ and the title that are used when instantiating the object, as shown in Figure\
    \ [2-3](#A978-1-4842-0719-2_2_Chapter.html#Fig3).\n\n![A978-1-4842-0719-2_2_Fig3_HTML.jpg](A978-1-4842-0719-2_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3.** Displaying the name and title in the JavaScript console window\
    \ in Visual Studio 2015\n\nThe `WinJS.Class` namespace provides the following\
    \ helper functions for defining classes.\n\n- `define`: This function defines\
    \ a class using the specified constructor and instance members.\n- `derive`: This\
    \ function creates a subclass for the specified class by using the prototype inheritance.\n\
    - `mix`: This function defines a class using the specified constructor and combines\
    \ the set of instance members specified by all the mixin objects.\n\n## 2.4 Deriving\
    \ a Class in WinJS\n\n### Problem\n\nYou need to apply the inheritance concept\
    \ in your WinJS application.\n\n### Solution\n\nUse the `WinJS.Class.derive` method\
    \ to derive one class from another in WinJS.\n\n### How It Works\n\nThe WinJS\
    \ library provides the `WinJS.Class.derive` method that lets developers apply\
    \ inheritance to derive one class from another. The `WinJS.Class.derive` method\
    \ takes the following parameters.\n\n- **Base class**: The class that the current\
    \ class needs to inherit from.\n- **Constructor**: This parameter refers to the\
    \ `constructor` function that can be used to initialize the class members.\n-\
    \ **Instance members**: This parameter defines instance members, which includes\
    \ properties and methods.\n- **Static members**: This parameter defines static\
    \ properties and static methods.\n\nOpen the `WinJSFundamentals.js` file and replace\
    \ the code with the following code snippet.\n\n```\n// Create a class called Employee\n\
    \nvar Employee = WinJS.Class.define(\n\n    function () {\n\n        this.name\
    \ = name;\n\n        this.type = \"Employee\";\n\n    },\n\n    {\n\n        _Name:\
    \ undefined,\n\n        _type: undefined,\n\n        name : {\n\n            set\
    \ :function(value)\n\n            {\n\n                this._Name = value;\n\n\
    \            },\n\n            get :function()\n\n            {\n\n          \
    \      return this._Name;\n\n            }\n\n        },\n\n        type: {\n\n\
    \            set :function(value)\n\n            {\n\n                this._type\
    \ = value;\n\n            },\n\n            get :function()\n\n            {\n\
    \n                return this._type;\n\n            }\n\n        }\n\n    });\n\
    \nvar ContractEmployee = WinJS.Class.derive(Employee,\n\n    function (name) {\n\
    \n        this.name = name;\n\n        this.type = \"Contract Employee\";\n\n\
    \    });\n\nvar ContractEmployee1 = new ContractEmployee(\"Senthil\");\n\n// display\
    \ the name and the title  in the console window.\n\nconsole.log(ContractEmployee1.name);\n\
    \nconsole.log(ContractEmployee1.type);\n```\n\nThis code snippet creates a class\
    \ called `Employee`. Later, another class called `ContractEmployee` is created;\
    \ it derives from the `Employee` class. A contract employee instance is created\
    \ and the `name` and the `type` of employment is displayed in the console window.\n\
    \nRun the Windows Store project from Visual Studio. This displays the name and\
    \ the type in the JavaScript console window, as shown in Figure [2-4](#A978-1-4842-0719-2_2_Chapter.html#Fig4).\n\
    \n![A978-1-4842-0719-2_2_Fig4_HTML.jpg](A978-1-4842-0719-2_2_Fig4_HTML.jpg)\n\n\
    **Figure 2-4.** Displaying the name and type of employment in the JavaScript console\
    \ window in Visual Studio 2015\n\nThe `WinJS.Class.derive` function behaves like\
    \ the `WinJS.Class.define` function, except that it uses the prototype of the\
    \ base class using the `Object.create` function to construct the derived class.\
    \ The `Object.create` method derives one type from another by prototyping the\
    \ parent object; it also adds the properties that are part of the child object.\n\
    \n## 2.5 Create Mixins in WinJS\n\n### Problem\n\nYou need to combine methods\
    \ and properties from multiple JavaScript objects without using the `WinJS.Class.derive`\
    \ method.\n\n### Solution\n\nUse the `WinJS.Class.mix` method to combine methods\
    \ and properties from multiple JavaScript objects in WinJS."
