        `"use strict";`


        `var objimgFile;`


        `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


                `var objimgFile = null;`


                `var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();`


                `dataTransferManager.addEventListener("datarequested", shareDataHandler);`


                `document.getElementById("selectImageButton").addEventListener("click",
    selectImage, false);`


            `});`


        `}`


        `document.addEventListener("DOMContentLoaded", GetControl);`


    `})();`


    The preceding code adds a listener to the `selectImageButton` control, as shown
    in the bolded lines.


    Apart from adding a listener, it also declares a variable called `objimgFile`,
    which holds the image object that you will use in the following function.


    Add a `selectImage` function, which is the listener of the click event of the
    Select Image button. This function uses the `FileOpenPicker` method, which allows
    users to select an image from the device.


    `function selectImage() {`


        `var picker = new Windows.Storage.Pickers.FileOpenPicker();`


        `picker.fileTypeFilter.replaceAll([".jpg", ".bmp", ".gif", ".png"]);`


        `picker.viewMode = Windows.Storage.Pickers.PickerViewMode.thumbnail;`


        `picker.pickSingleFileAsync().done(function (file) {`


            `if (file) {`


    `// Display the image to the user`


    `document.getElementById("imageHolder").src = URL.createObjectURL(file, { oneTimeOnly:
    true });`


    `// The imageFile variable will be set to shareValue when the user clicks Set`


             `objimgFile = file;`


            `}`


        `});`


    `}`


    Once the picker selects the single file successfully, it calls the `async` method,
    which then sets the `src` property.


    Now, let’s add the `shareDataHandler()` method to the `js` file as follows:


    `function shareDataHandler(e) {`


        `var request = e.request;`


        `// The request.data.properties.title is mandate`


        `var ShareInfoTitle = document.getElementById("txttitle").value;`


        `if (ShareInfoTitle !== "") {`


            `var ShareInfoDesc = document.getElementById("txtdesc").value;`


            `if (ShareInfoDesc !== "") {`


                `request.data.properties.title = ShareInfoTitle;`


                `request.data.properties.description = ShareInfoDesc;`


                `if (objimgFile != null) {`


    `//Create a stream variable and using randomStreamReference.createFromFile //function
    create the stream for the image file object "objimgFile"`


                    `var imageStream = Windows.Storage.Streams.RandomAccessStreamReference.createFromFile(objimgFile);`


                    `request.data.setStorageItems([objimgFile]);`


                    `// The setBitmap method requires a stream object`


                    `request.data.setBitmap(imageStream);`


                `}`


            `} else {`


                `request.failWithDisplayText("Please Enter the Project Details you
    would like to share.");`


            `}`


        `} else {`


            `request.failWithDisplayText("Error Occured!!");`


        `}`


    `}`


    The `shareDataHandler` function first sets the title and description of the `request.data`
    object. To set the image, it uses the stream object, as per the following code:


    `var imageStream = Windows.Storage.Streams.RandomAccessStreamReference.createFromFile(objimgFile);`


    This line creates a stream variable, and using the `createFromFile` function,
    it creates the stream for the image file `objimgFile` object.


    The next line calls the `setStorageItems` function of the `request.data` object
    by passing the image object. The `objimgfile` object was set to a file in the
    `selectImage()` folder.


    `request.data.setStorageItems([objimgFile]);`


    The next line in the preceding code is the `setBitMap` method of the `request.data`
    object, which sets the image to the data object being shared:


    `// pass the stream imageStream to the setBitMap method`


    `request.data.setBitmap(imageStream);`


    When you run the application on Windows 10 using the Share charm feature, you
    see the Select Image button, as shown in Figure [10-5](#A978-1-4842-0719-2_10_Chapter.html#Fig5).


    ![A978-1-4842-0719-2_10_Fig5_HTML.jpg](A978-1-4842-0719-2_10_Fig5_HTML.jpg)


    Figure 10-5.


    Sharing image demo


    Click the Select Image button and select an image from device camera folder or
    photo folder. Once you select the photo, you see the image in your `default.html`
    file, as shown in Figure [10-6](#A978-1-4842-0719-2_10_Chapter.html#Fig6).


    ![A978-1-4842-0719-2_10_Fig6_HTML.jpg](A978-1-4842-0719-2_10_Fig6_HTML.jpg)


    Figure 10-6.


    Sharing Image demo


    Now click the Share charm or press the Windows logo key ![A978-1-4842-0719-2_10_Figb_HTML.jpg](A978-1-4842-0719-2_10_Figb_HTML.jpg)
    + H. When you select OneNote from the list, the app will share data with OneNote
    and you will see a screen like the one shown in Figure [10-7](#A978-1-4842-0719-2_10_Chapter.html#Fig7).


    ![A978-1-4842-0719-2_10_Fig7_HTML.jpg](A978-1-4842-0719-2_10_Fig7_HTML.jpg)


    Figure 10-7.


    Image shared along with project title


    ## 10.5 Declare App As a Share Target


    ### Problem


    You need to declare an app as a share target in the list when the user uses the
    Share charm feature.


    ### Solution


    Configure the share target in the `package.appxmanifest` file, which enables the
    share contract as a share target app.'
  trans: "\n### 工作原理\n\n通用 Windows 应用还允许你与其他应用共享图像。你可以允许用户从本地设备中选择一张图像，然后使用“共享”超级按钮与其他应用共享。让我们看看图像共享的实际操作。\n\
    \n首先，将以下代码添加到 `default.html` 中。你需要用以下代码替换 body 标签：\n\n```\n<body class=\"win-type-body\"\
    \ style=\"background-color:white\">\n    <div>\n        <p style=\"color:black\"\
    >输入项目标题：</p>\n        <input class=\"text-box\" id=\"txttitle\" value=\"项目标题\"\
