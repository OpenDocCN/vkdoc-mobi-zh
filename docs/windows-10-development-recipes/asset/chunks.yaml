    \         }\">\n        </div>\n        <!-- 缩小视图 -->\n        <div id=\"lvTechnologies\"\
    \ data-win-control=\"WinJS.UI.ListView\"\n             data-win-options=\"{\n\
    \         itemTemplate: select('#TechnologyTemplate')\n         }\">\n       \
    \ </div>\n</div>\n```\n\n`SemanticZoom` 控件包含两个具有不同缩放级别的 `ListView` 控件。当用户尝试放大或缩小时，系统会自动切换对应的\
    \ `ListView` 控件。\n\n在项目的 `js` 文件夹下新建一个 JavaScript 文件，并将其命名为 `data.js`。该文件包含 `ListView`\
    \ 的项目源和分组数据源。将以下代码添加到 `data.js` 文件中。\n\n```\n(function () {\n    \"use strict\"\
