  trans: "\n### 工作原理\n\n在前一篇教程中，你创建了一个名为 `winjsrecipes` 的移动服务和一个名为 `todo` 的数据表。在本篇教程中，你将学习如何在\
    \ Windows 应用中与 `todo` 数据库表进行交互。  \n**Microsoft Azure 移动服务：CRUD 操作：**\n\n在 Windows\
    \ 应用中打开 `default.html` 页面，并在 head 部分添加以下对移动服务库的引用：\n\n```\n<script src=\"js/MobileServices.min.js\"\
    ></script>\n```\n\n在同一文件中，将以下代码添加到 `body` 标签中：\n\n```\n<div style=\"margin:38px\
    \ 18px 18px 18px\">\n    <h4 style=\"margin-bottom:18px\">winjsrecipes</h4>\n\
    \    <div>在下方输入一些文本，然后点击“保存”以向数据库插入一个新的 TodoItem 项</div>\n    <input type=\"text\"\
    \ id=\"textInput\" style=\"width:240px;vertical-align:middle;margin-right:10px;\"\
    \ />\n    <button id=\"buttonSave\" style=\"vertical-align:middle\">保存</button>\n\
    \    <div>点击下方的“刷新”以从数据库加载未完成的 TodoItems。使用复选框来完成和更新你的 TodoItems</div>\n    <button\
    \ id=\"buttonRefresh\" style=\"width:100%\">刷新</button>\n    <div id=\"TemplateItem\"\
    \ data-win-control=\"WinJS.Binding.Template\">\n        <input type=\"checkbox\"\
    \ style=\"margin-right:5px\" data-win-bind=\"checked: complete; dataContext: this;\
    \ innerText: text\" />\n    </div>\n    <div id=\"listItems\"\n         data-win-control=\"\
    WinJS.UI.ListView\"\n         data-win-options=\"{ itemTemplate: TemplateItem,\
    \ layout: {type: WinJS.UI.ListLayout} }\">\n    </div>\n</div>\n```\n\n从 `JS`\
    \ 文件夹中打开 `default.js` 文件，并将其替换为以下代码：\n\n```\n// 有关空白模板的简介，请参阅以下文档：\n// http://go.microsoft.com/fwlink/?LinkID=392286\n\
    (function () {\n    \"use strict\";\n    var app = WinJS.Application;\n    var\
    \ activation = Windows.ApplicationModel.Activation;\n    app.onactivated = function\
    \ (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll());\n\
    \            var client = new WindowsAzure.MobileServiceClient(\n            \
    \                    \"https://winjsrecipes.azure-mobile.net/\",\n           \
    \                     \"<应用程序密钥 2>\"\n                        );\n           \
    \ var todoTable = client.getTable('todo');\n            var todoItems = new WinJS.Binding.List();\n\
    \            var insertTodoItem = function (todoItem) {\n                todoTable.insert(todoItem).done(function\
    \ (item) {\n                    todoItems.push(item);\n                });\n \
    \           };\n            var refreshTodoItems = function () {\n           \
    \     todoTable.where({ complete: false })\n                    .read()\n    \
    \                .done(function (results) {\n                        todoItems\
    \ = new WinJS.Binding.List(results);\n                        listItems.winControl.itemDataSource\
    \ = todoItems.dataSource;\n                    });\n            };\n         \
    \   var updateCheckedTodoItem = function (todoItem) {\n                todoTable.update(todoItem).done(function\
    \ (item) {\n                    todoItems.splice(todoItems.indexOf(item), 1);\n\
    \                });\n            };\n            buttonSave.addEventListener(\"\
    click\", function () {\n                insertTodoItem({\n                   \
    \ text: textInput.value,\n                    complete: false\n              \
    \  });\n            });\n            buttonRefresh.addEventListener(\"click\"\
    , function () {\n                refreshTodoItems();\n            });\n      \
    \      listItems.addEventListener(\"change\", function (eventArgs) {\n       \
    \         var todoItem = eventArgs.target.dataContext.backingData;\n         \
    \       todoItem.complete = eventArgs.target.checked;\n                updateCheckedTodoItem(todoItem);\n\
    \            });\n            refreshTodoItems();\n        }\n    };\n    app.oncheckpoint\
    \ = function (args) {\n    };\n    app.start();\n})();\n```\n\n使用 **本地计算机** 选项在\
    \ Windows 桌面上运行应用程序。你应该会看到如图 13-11 所示的屏幕。你应该能够通过应用程序向移动服务添加、删除或更新数据。\n\n![A978-1-4842-0719-2_13_Fig11_HTML.jpg](img/A978-1-4842-0719-2_13_Fig11_HTML.jpg)\n\
    \n**图 13-11.** 带有插入和刷新选项的 Windows 应用\n\n在从 Windows 应用对 Microsoft Azure 移动服务执行任何操作之前，你必须首先连接到该服务并获取对远程服务的访问权限。通过使用\
    \ `MobileServiceClient` 对象可以获取对远程服务客户端的访问。同样，通过使用 `MobileServiceTable` 对象可以获取对远程数据表的访问。\n\
    \n以下是获取 `MobileServiceClient` 和数据表引用的方法：\n\n```\nvar client = new WindowsAzure.MobileServiceClient(\n\
    \                \"https://winjsrecipes.azure-mobile.net/\",\n               \
    \ \"<输入应用程序密钥>\"\n            );\nvar todoTable = client.getTable('todo');\n```\n\
    \n`MobileServiceClient` 构造函数接受两个参数。第一个参数是你的移动服务的 URL，第二个参数是应用程序密钥。\n\n**注意：**\
    \  \n要获取你的移动服务的应用程序密钥，你需要登录到 Microsoft Azure 管理门户，导航到你的移动服务的仪表板，并使用 **管理密钥** 选项来获取应用程序密钥。你需要将此密钥用作移动服务客户端的第二个参数。\n\
    \n可以通过调用 `MobileServiceTable` 对象的 `insert` 方法来执行插入操作。以下代码将新文本插入到 `todo` 数据表中：\n\
    \n```\ninsertTodoItem({\n    text: textInput.value,\n    complete: false\n});\n\
    \nvar insertTodoItem = function (todoItem) {\n    // 此代码向数据库插入一个新的 TodoItem。当操作完成时\n\
    \    todoTable.insert(todoItem).done(function (item) {\n        todoItems.push(item);\n\
    \    });\n};\n```\n\n`insert` 方法的返回类型是 promise。你可以包含 success 和 error 函数来处理 `insert`\
    \ 方法的操作结果。在前面的示例中，一旦插入成功，`todoItems` 列表就会在 UI 中更新。\n\n可以使用 `MobileServiceTable`\
    \ 类中定义的 `update` 方法来更新移动服务中的现有记录。例如，以下演示了如何更新 `todo` 数据表中的一条记录：\n\n```\nvar todoItem\
    \ = { id:1 };\ntodoItem.complete = true;\nupdateCheckedTodoItem(todoItem);\n\n\
    var updateCheckedTodoItem = function (todoItem) {\n    // 此代码获取一个刚刚完成的 TodoItem\
    \ 并更新数据库。当移动服务\n    // 响应时，该条目将从列表中移除\n    todoTable.update(todoItem).done(function\
    \ (item) {\n        todoItems.splice(todoItems.indexOf(item), 1);\n    });\n};\n\
    ```\n\n更新记录时，必须在待更新的记录中包含主键。在此示例中，`id` 字段是主键。当创建新的 Azure 移动服务时，会自动创建 `id` 列并将其设为主键。此字段是一个自增列。\n\
    \n可以通过调用 `MobileServiceTable` 类的 `del()` 方法来执行记录的删除。例如，以下示例演示了如何从 `todo` 数据表中删除一条记录：\n\
    \n```\nvar deleteItem = { id:1 };\ntodoTable.del(deleteItem);\n```\n\n与 `update`\
    \ 方法类似，`del` 方法也需要传递对象的主键。\n"
- fmt: "# 13.5 Data Retrieval with Paging\n\n## Problem\n\nYou need to control the\
    \ amount of data returned to your Universal Windows app from Microsoft Azure Mobile\
    \ Services.\n\n## Solution\n\nUse the `take` and `skip` query methods on the client\
    \ to get the specific number of records from the mobile service.\n\n## How It\
    \ Works\n\nLet's use the previous recipe as the starting point for this one.\n\
    \nAdd six more todo items from the app by changing the text and clicking the Save\
    \ button. Open the `default.js` file and replace the `refreshTodoItems` method\
    \ with the following code.\n\n```\nvar refreshTodoItems = function () {\n    //\
    \ Define a filtered query that returns the top 2 items.\n    todoTable.where({\
    \ complete: false })\n        .take(2)\n        .read()\n        .done(function\
    \ (results) {\n            todoItems = new WinJS.Binding.List(results);\n    \
    \        listItems.winControl.itemDataSource = todoItems.dataSource;\n       \
    \ });\n};\n```\n\nThis example returns the top two items on the todo table, which\
    \ are not marked as complete.\n\nRun the application in the Windows desktop using\
    \ the Local Machine option. You should see the first three todo items from the\
    \ service, as shown in Figure [13-12](#A978-1-4842-0719-2_13_Chapter.html#Fig12).\n\
    \n![A978-1-4842-0719-2_13_Fig12_HTML.jpg](A978-1-4842-0719-2_13_Fig12_HTML.jpg)\n\
    \nFigure 13-12. Windows app displaying only two records with paging\n\nWhat if\
    \ you want to skip a certain number of items on the table and then return records\
    \ after that? You can use the `skip` method to achieve this.\n\nThe following\
    \ is a code snippet that skips the first four records and returns the four records\
    \ after that. This is similar to the page 2, which can show four more records.\n\
    \n```\nvar refreshTodoItems = function () {\n                todoTable.where({\
    \ complete: false })\n                    .skip(4)\n                    .take(4)\n\
    \                    .read()\n                    .done(function (results) {\n\
    \                        todoItems = new WinJS.Binding.List(results);\n      \
    \                  listItems.winControl.itemDataSource = todoItems.dataSource;\n\
    \                    });\n            };\n```\n\n**Note:** Mobile Services has\
    \ an automatic page limit of up to 50 items in a response. The `skip`/`take` methods\
    \ can help in retrieving more records (if needed) in a single response.\n\n# 13.6\
    \ Sorting Returned Data from the Mobile Service\n\n## Problem\n\nYou need to sort\
    \ the data that is returned by the mobile service from your Universal Windows\
    \ app.\n\n## Solution\n\nYou can use the `orderBy` or `orderByDescending` function\
    \ in the query.\n\n## How It Works\n\nLet's use the previous recipe as the starting\
    \ point for this one. You will be updating the `refreshTodoItems` method to sort\
    \ the records.\n\nOpen the `default.js` file and replace the `refreshTodoItems`\
    \ method with the following code to sort by text in descending order.\n\n```\n\
    var refreshTodoItems = function () {\n                todoTable.where({ complete:\
    \ false }).orderByDescending(\"text\")\n                    .read()\n        \
    \            .done(function (results) {\n                        todoItems = new\
    \ WinJS.Binding.List(results);\n                        listItems.winControl.itemDataSource\
    \ = todoItems.dataSource;\n                    });\n            };\n```\n\nWhen\
    \ you run the application in the Windows desktop using the Local Machine option,\
    \ you will notice that the list is now sorted in descending order, as shown in\
    \ Figure [13-13](#A978-1-4842-0719-2_13_Chapter.html#Fig13).\n\n![A978-1-4842-0719-2_13_Fig13_HTML.jpg](A978-1-4842-0719-2_13_Fig13_HTML.jpg)\n\
    \nFigure 13-13. Windows app displaying sorted data from a mobile service\n\nTo\
    \ sort the data in ascending order, the `orderBy` method can be used to specify\
    \ the column on which to sort the records. The following example demonstrates\
    \ how to sort the todo table by the `\"text\"` column in ascending order.\n\n\
    ```\ntodoTable.where({ complete: false }).orderBy(\"text\")\n                \
    \    .read()\n```\n\n# 13.7 Performing Validation in a Server Script\n\n## Problem\n\
    \nYou want to perform validation in the server-side JavaScript in Microsoft Azure\
    \ Mobile Services.\n\n## Solution\n\nYou can define the validations in the server\
    \ scripts (insert, update, delete, etc.). This can be modified either from Visual\
    \ Studio 2015 or from the Mobile Services dashboard.\n\n## How It Works\n\nLet's\
    \ use the previous recipe sample to demonstrate how validation can be performed\
    \ in Azure Mobile Services and then display a message within the Windows app.\n\
    \nAssume that you want to validate the length of the data that is submitted when\
    \ inserting a new record. You have to register a script that validates data that\
    \ is less than six characters. If the text length is less than or equal to six\
    \ characters, you need to display an error message.\n\nOpen the Server Explorer\
    \ window in Visual Studio and expand the mobile service table. Double-click the\
    \ `insert.js` file to start modifying it within Visual Studio. You can also right-click\
    \ and select the Edit Script option to edit the file, as shown in Figure [13-14](#A978-1-4842-0719-2_13_Chapter.html#Fig14).\
    \ Note that when you modify and save the file, the file is automatically updated\
    \ in Microsoft Azure.\n\n![A978-1-4842-0719-2_13_Fig14_HTML.jpg](A978-1-4842-0719-2_13_Fig14_HTML.jpg)\n\
    \nFigure 13-14. Script files in Visual Studio 2015 for Mobile Services\n\nReplace\
    \ the `insert.js` file with the following code snippet.\n\n```\nfunction insert(item,\
    \ user, request) {\n    if (item.text.length <= 6) {\n        request.respond(statusCodes.BAD_REQUEST,\
    \ 'Text length must be greater than 6 characters');\n    } else {\n        request.execute();\n\
    \    }\n}\n```\n\nOpen the `default.js` file from the project and replace the\
    \ `insertTodoItem` function with the following:\n\n```\nvar insertTodoItem = function\
    \ (todoItem) {\n                todoTable.insert(todoItem).done(function (item)\
    \ {\n                    todoItems.push(item);\n                }, function (error)\
    \ {\n                    // Display the error message\n                    var\
    \ msg = new Windows.UI.Popups.MessageDialog(\n                        error.request.responseText);\n\
    \                    msg.showAsync();\n                });\n            };\n```\n\
    \nRun the app in Windows desktop using the Local Machine option and try to add\
    \ a todo item with less than six characters. Click the Save button. The app should\
    \ display the message shown in Figure [13-15](#A978-1-4842-0719-2_13_Chapter.html#Fig15).\n\
    \n![A978-1-4842-0719-2_13_Fig15_HTML.jpg](A978-1-4842-0719-2_13_Fig15_HTML.jpg)\n\
    \nFigure 13-15. Windows app displaying a validation message from a mobile service\n\
    \nAlternatively, you can modify the scripts from the SCRIPT tab, which can be\
    \ found by selecting the table in the DATA tab in the Azure Management portal.\n\
    \n# Chapter 14: Tiles and Notifications\n\nAs we all know, in Windows 8, Microsoft\
    \ introduced a new way to launch applications using tiles, which are an iconic\
    \ part of the user experience. With Windows 10, there are additional features\
    \ that are exciting and different. This chapter provides an overview of the tiles\
    \ and notifications available in Windows 10. You will explore how to create tiles\
    \ and notifications of different types.\n\n## 14.1 Create a Default Tile\n\n###\
    \ Problem\n\nYou need to add a default tile in your application.\n\n### Solution\n\
    \nUse the `package.appxmanifest` to provide information for the UWP app tiles\
    \ and display."
  raw: '## 13.5 Data Retrieval with Paging


    ### Problem


    You need to control the amount of data returned to your Universal Windows app
    from Microsoft Azure Mobile Services.


    ### Solution


    Use the `take` and `skip` query methods on the client to get the specific number
    of records from the mobile service.


    ### How It Works


    Let’s use the previous recipe as the starting point for this one.


    Add six more todo items from the app by changing the text and clicking the Save
    button.   Open the default.js file and replace the `refreshTodoItems` method with
    the following code. `var refreshTodoItems = function () {`     `// Define a filtered
    query that returns the top 2 items.`     `todoTable.where({ complete: false })`
            `.take(2)`         `.read()`         `.done(function (results) {`             `todoItems
    = new WinJS.Binding.List(results);`             `listItems.winControl.itemDataSource
    = todoItems.dataSource;`         `});` `};` This example returns the top two items
    on the todo table, which are not marked as complete.   Run the application in
    the Windows desktop using the Local Machine option. You should see the first three
    todo items from the service, as shown in Figure [13-12](#A978-1-4842-0719-2_13_Chapter.html#Fig12).


    ![A978-1-4842-0719-2_13_Fig12_HTML.jpg](A978-1-4842-0719-2_13_Fig12_HTML.jpg)


    Figure 13-12.


    Windows app displaying only two records with paging  


    What if you want to skip a certain number of items on the table and then return
    records after that? You can use the `skip` method to achieve this.


    The following is a code snippet that skips the first four records and returns
    the four records after that. This is similar to the page 2, which can show four
    more records.


    `var refreshTodoItems = function () {`


                    `todoTable.where({ complete: false })`


                        `.skip(4)`


                        `.take(4)`


                        `.read()`


                        `.done(function (results) {`


                            `todoItems = new WinJS.Binding.List(results);`


                            `listItems.winControl.itemDataSource = todoItems.dataSource;`


                        `});`


                `};`


    Note


    Mobile Services has an automatic page limit of up to 50 items in a response. The
    `skip`/`take` methods can help in retrieving more records (if needed) in a single
    response.


    ## 13.6 Sorting Returned Data from the Mobile Service


    ### Problem


    You need to sort the data that is returned by the mobile service from your Universal
    Windows app.


    ### Solution


    You can use the `orderBy` or `orderByDescending` function in the query.


    ### How It Works


    Let’s use the previous recipe as the starting point for this one. You will be
    updating the `refreshTodoItems` method to sort the records.


    Open the default.js file and replace the `refreshTodoItems` method with the following
    code to sort by text in descending order.  


    `var refreshTodoItems = function () {`


                    `todoTable.where({ complete: false }).orderByDescending("text")`


                        `.read()`


                        `.done(function (results) {`


                            `todoItems = new WinJS.Binding.List(results);`


                            `listItems.winControl.itemDataSource = todoItems.dataSource;`


                        `});`


                `};`


    When you run the application in the Windows desktop using the Local Machine option,
    you will notice that the list is now sorted in descending order, as shown in Figure
    [13-13](#A978-1-4842-0719-2_13_Chapter.html#Fig13).


    ![A978-1-4842-0719-2_13_Fig13_HTML.jpg](A978-1-4842-0719-2_13_Fig13_HTML.jpg)


    Figure 13-13.


    Windows app displaying sorted data from a mobile service


    To sort the data in ascending order, the `orderBy` method can be used to specify
    the column on which to sort the records. The following example demonstrates how
    to sort the todo table by the `"text"` column in ascending order.


    `todoTable.where({ complete: false }).orderBy("text")`


                        `.read()`


    ## 13.7 Performing Validation in a Server Script


    ### Problem


    You want to perform validation in the server-side JavaScript in Microsoft Azure
    Mobile Services.


    ### Solution


    You can define the validations in the server scripts (insert, update, delete,
    etc.). This can be modified either from Visual Studio 2015 or from the Mobile
    Services dashboard.


    ### How It Works


    Let’s use the previous recipe sample to demonstrate how validation can be performed
    in Azure Mobile Services and then display a message within the Windows app.


    Assume that you want to validate the length of the data that is submitted when
    inserting a new record. You have to register a script that validates data that
    is less than six characters. If the text length is less than or equal to six characters,
    you need to display an error message.


    Open the Server Explorer window in Visual Studio and expand the mobile service
    table.   Double-click the insert.js file to start modifying it within Visual Studio.
    You can also right-click and select the Edit Script option to edit the file, as
    shown in Figure [13-14](#A978-1-4842-0719-2_13_Chapter.html#Fig14). Note that
    when you modify and save the file, the file is automatically updated in Microsoft
    Azure.


    ![A978-1-4842-0719-2_13_Fig14_HTML.jpg](A978-1-4842-0719-2_13_Fig14_HTML.jpg)


    Figure 13-14.


    Script files in Visual Studio 2015 for Mobile Services   Replace the insert.js
    file with the following code snippet. `function insert(item, user, request) {`
        `if (item.text.length <= 6) {`         `request.respond(statusCodes.BAD_REQUEST,
    ''Text length must be greater than 6 characters'');`     `} else {`         `request.execute();`
        `}` `}`   Open the default.js file from the project and replace the `insertTodoItem`
    function with the following: `var insertTodoItem = function (todoItem) {`                 `todoTable.insert(todoItem).done(function
    (item) {`                     `todoItems.push(item);`                 `}, function
    (error) {`                     `// Display the error message`                     `var
    msg = new Windows.UI.Popups.MessageDialog(`                         `error.request.responseText);`
                        `msg.showAsync();`                 `});`             `};`
      Run the app in Windows desktop using the Local Machine option and try to add
    a todo item with less than six characters. Click the Save button. The app should
    display the message shown in Figure [13-15](#A978-1-4842-0719-2_13_Chapter.html#Fig15).


    ![A978-1-4842-0719-2_13_Fig15_HTML.jpg](A978-1-4842-0719-2_13_Fig15_HTML.jpg)


    Figure 13-15.


    Windows app displaying a validation message from a mobile service  


    Alternatively, you can modify the scripts from the SCRIPT tab, which can be found
    by selecting the table in the DATA tab in the Azure Management portal.


    # Chapter 14: Tiles and Notifications


    As we all know, in Windows 8, Microsoft introduced a new way to launch applications
    using tiles, which are an iconic part of the user experience. With Windows 10,
    there are additional features that are exciting and different. This chapter provides
    an overview of the tiles and notifications available in Windows 10\. You will
    explore how to create tiles and notifications of different types.


    ## 14.1 Create a Default Tile


    ### Problem


    You need to add a default tile in your application.


    ### Solution


    Use the `package.appxmanifest` to provide information for the UWP app tiles and
    display.'
  trans: "\n# 13.5 使用分页检索数据\n\n## 问题\n\n你需要控制从 Microsoft Azure 移动服务返回到通用 Windows 应用程序的数据量。\n\
    \n## 解决方案\n\n在客户端使用 `take` 和 `skip` 查询方法，从移动服务中获取指定数量的记录。\n\n## 工作原理\n\n本节将以上一篇教程作为起点。\n\
    \n在应用中更改文本并点击保存按钮，再添加六项待办事项。打开 `default.js` 文件，将 `refreshTodoItems` 方法替换为以下代码。\n\
    \n```\nvar refreshTodoItems = function () {\n    // 定义一个过滤查询，返回前两项\n    todoTable.where({\
    \ complete: false })\n        .take(2)\n        .read()\n        .done(function\
    \ (results) {\n            todoItems = new WinJS.Binding.List(results);\n    \
    \        listItems.winControl.itemDataSource = todoItems.dataSource;\n       \
