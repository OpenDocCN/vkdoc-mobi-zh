    # Chapter 10: Sharing Data


    This chapter covers how to share data between Universal Windows Platform apps.
    Sharing data enables developers to build features that allow users to share information,
    copy/paste, and drag and drop from one app to another app. For example, a user
    might want to copy some text or an image from one app and paste it into another
    app. Users also look for sharing information/links to social networking sites.


    Windows 10 apps support sharing data in two different ways.


    *   A source app allows users to share data from the app to other apps.

    *   A target app allows users to declare an app as a target app, which can retrieve
    the shared data from other apps. An app that is declared a target app allows the
    user to select it as a destination app while sharing data.


    By using the sharing data options, users can share plain text, web links, photos,
    and videos with other apps. In this chapter, you will learn to implement sharing
    data from a source app and declaring a target app.'
