    \       if (args.detail.kind === activation.ActivationKind.launch) {\n       \
    \     if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n                // TODO: 此应用程序已重新启动。请在此处初始化你的应用程序。\n            } else {\n\
    \                // TODO: 此应用程序已从挂起状态重新激活。请在此处恢复应用程序状态。\n            }\n     \
    \       var container = document.querySelector(\"#container\");\n            var\
    \ prmise = WinJS.UI.processAll().then(function () {\n                WinJS.Binding.processAll(container,\
    \ person)\n            })\n            args.setPromise(prmise);\n        }\n \
    \   };\n```\n\n你只需像往常一样在需要进行数据绑定的容器上调用 `WinJS.Binding.processAll()`。\n\n接下来，在\
    \ Visual Studio 中按 `F5` 生成并运行该应用程序。Windows Mobile 屏幕上的输出如图 5-4 所示。\n\n![A978-1-4842-0719-2_5_Fig4_HTML.jpg](img/A978-1-4842-0719-2_5_Fig4_HTML.jpg)\n\
    \n图 5-4。\n\nWindows Mobile 输出快照。\n\n## 5.3 使用模板进行数据绑定\n\n### 问题\n\n简单的数据绑定一次只能绑定一个数据项。当你有一个数据项列表时，简单的数据绑定方法就不够用了。\n"
- fmt: "# Solution\n\nWith simple data binding, you bind a data item to a DOM element\
    \ and the element displays the values of the data properties. In order to work\
    \ with a list of items and to allow users to change the data item they want to\
    \ see, you need a template. The data template acts as a blueprint, and at runtime,\
    \ it binds to the data item provided and renders the markup on a specified DOM\
    \ element.\n\n# How It Works\n\nOpen Visual Studio 2015\\. Select File ➤ New Project\
    \ ➤ JavaScript ➤ Windows Universal ➤ Blank App (Universal Windows) template. This\
    \ creates a Universal Windows app template (see Figure [5-5](#A978-1-4842-0719-2_5_Chapter.html#Fig5)).\n\
    \n![A978-1-4842-0719-2_5_Fig5_HTML.jpg](A978-1-4842-0719-2_5_Fig5_HTML.jpg)\n\n\
    Figure 5-5.\n\nNew Project dialog\n\nOpen `default.js` in `js` folder. Inside\
    \ the immediately invoked function, let’s declare a `Person` object with a couple\
    \ of properties. This time you will use `WinJS.Binding.define` to declare the\
    \ `Person` object. Using `define` will make all the properties bindable. Here\
    \ is the code snippet for a `Person` object:\n\n```\n(function () {\n    \"use\
    \ strict\";\n    var Person = WinJS.Binding.define({\n        name: \"\",\n  \
    \      color: \"\",\n        birthday: \"\",\n        petname:\"\",\n        dessert:\"\
    \"\n    });\n    //other app code ...\n})();\n```\n\nOpen `default.html`, found\
    \ in root of the project. Replace the content of the `<body>` tag with the following\
    \ code:\n\n```\n<h1>Data Binding Template</h1>\n<div id=\"templateDiv\" data-win-control=\"\
    WinJS.Binding.Template\">\n    <div class=\"templateItem\" data-win-bind=\"style.background:\
    \ color\" style=\"color:white\">\n        <ol>\n            <li><span>Name :</span><span\
    \ data-win-bind=\"textContent: name\"></span></li>\n            <li><span>Birthday:</span><span\
    \ data-win-bind=\"textContent: birthday\"></span></li>\n            <li><span>Pet's\
    \ name: </span><span data-win-bind=\"textContent: petname\"></span></li>\n   \
    \         <li><span>Dessert: </span><span data-win-bind=\"textContent: dessert\"\
    ></span></li>\n        </ol>\n    </div>\n</div>\n<div id=\"renderDiv\"></div>\n\
    ```\n\nYou have defined a `div` with the id `templateDiv` and then added a `data-win-control`\
    \ attribute with a `WinJS.Binding.Template` value. This defines the template that\
    \ can be used for data binding. You then have a `div` with the id `renderDiv`.\
    \ At runtime, you data bind the template with data and render the output to the\
    \ `renderDiv` DOM element.\n\nFor the purpose of this recipe, let’s create three\
    \ `Person` objects and add a drop-down list so that you can select the person\
    \ whose details needs to be shown. Inside the body tag, add the following code\
    \ right after the `renderDiv` element:\n\n```\n<fieldset id=\"templateControlObject\"\
    >\n    <legend>Pick a name:</legend>\n    <select id=\"templateControlObjectSelector\"\
    >\n        <option value=\"0\">Show John Doe</option>\n        <option value=\"\
    1\">Show Jane Dow</option>\n        <option value=\"2\">Show Jake Doe</option>\n\
    \    </select>\n</fieldset>\n```\n\nBack in `default.js` file, right after the\
    \ `Person` object definition, create an array of three `Person` objects, as follows:\n\
    \n```\n(function () {\n    \"use strict\";\n    var Person = WinJS.Binding.define({\n\
    \        name: \"\",\n        color: \"\",\n        birthday: \"\",\n        petname:\"\
    \",\n        dessert:\"\"\n    })\n    var people = [\n        new Person({ name:\
    \ \"John Doe\", color: \"red\", birthday: \"2/2/2002\", petname: \"Spot\", dessert:\
    \ \"chocolate cake\" }),\n        new Person({ name: \"Jane Doe\", color: \"green\"\
    , birthday: \"3/3/2003\", petname: \"Xena\", dessert: \"cherry pie\" }),\n   \
    \     new Person({ name: \"Jake Doe\", color: \"blue\", birthday: \"2/2/2002\"\
    , petname: \"Pablo\", dessert: \"ice cream\" }),\n    ];\n    //Other app code\
    \ ...\n})();\n```\n\nNext, add a listener to the change event of the drop-down\
    \ list in the `onactivated` method in `default.js`. Here is the code snippet:\n\
    \n```\napp.onactivated = function (args) {\n    // Other activation code ...\n\
    \    var selector = document.querySelector(\"#templateControlObjectSelector\"\
    );\n          selector.addEventListener(\"change\", handleChange, false);\n  \
    \  args.setPromise(WinJS.UI.processAll());\n}\n```\n\nLet’s create the event handler\
    \ for the drop-down list change event. Select the `div`, which contains the template\
    \ and the `div` where you want to render the markup. Call `render` on the template\
    \ control. Create a `handleChange` function in `default.js` with the following\
    \ code:\n\n```\n(function () {\n    //Other app code...\n    function handleChange(evt)\
    \ {\n        var templateElement = document.querySelector(\"#templateDiv\");\n\
    \        var renderElement = document.querySelector(\"#renderDiv\");\n       \
    \ renderElement.innerHTML = \"\";\n        var selected = evt.target.selectedIndex;\n\
    \        var templateControl = templateElement.winControl;\n        templateElement.winControl.render(people[selected],\
    \ renderElement);\n    }\n})();\n```\n\nBuild and run the app by pressing F5 in\
    \ Visual Studio. When you select an item in the drop-down list, the appropriate\
    \ data is shown in the `div` above it. Figure [5-6](#A978-1-4842-0719-2_5_Chapter.html#Fig6)\
    \ shows the output on a Windows Mobile screen.\n\n![A978-1-4842-0719-2_5_Fig6_HTML.jpg](A978-1-4842-0719-2_5_Fig6_HTML.jpg)\n\
    \nFigure 5-6.\n\nData binding template output on Windows Mobile screen\n\n## 5.4\
    \ Data Bind WinJS Controls\n\n### Problem\n\nYou have a list of items and you\
    \ would like to data bind the list to a WinJS control, such as `ListView`.\n\n\
    ### Solution\n\nWith WinJS data binding, you can bind any WinJS control to a data\
    \ source. For displaying each individual item, you will provide a data template.\
    \ At runtime, the list gets data bound to the control and each item is rendered\
    \ according to the template defined."
