    # Chapter 15: Additional Tools


    The Windows SDK and Microsoft Visual Studio 2015 provide additional tools and
    features that let developers easily debug and test their Windows apps. This chapter
    covers some of these tools, such as the JavaScript Console window, DOM Explorer,
    Diagnostic Tools, the Windows 10 Mobile emulator Additional Tools. These tools
    make a developer’s life much easier when it comes to testing an app in various
    scenarios.


    ## 16.1 JavaScript Console Window


    ### Problem


