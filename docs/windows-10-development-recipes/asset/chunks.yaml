  trans: "\n\n要在生产应用中生成`ApplicationID`和`AdUnitId`，请按照以下步骤操作：\n\n1.  在 Windows 开发人员中心启动商店提交流程。\n\
    2.  确保在“应用属性”部分设置了应用类别。\n3.  接下来，从页面左侧部分的选项中选择“盈利”➤“通过广告盈利”。\n4.  在“通过广告盈利”页面的“Microsoft\
    \ 广告单元”部分下，点击“显示选项”。\n5.  为你的广告单元输入一个名称。选择广告单元类型以及将展示广告的设备系列。\n6.  点击“创建广告单元”按钮。\n\
    7.  现在，你已经创建了一个广告单元。复制应用程序 ID 和广告单元 ID，并将其粘贴到你应用中的广告控件里。\n8.  重新生成包，并在提交流程中使用新的包。\n\
    \n### 索引\n\n- **A**\n  - 加速计工具\n  - 自适应磁贴（`AddAdaptiveTiles()` 事件处理方法、绑定元素、`createTileUpdaterForApplication().update()`\
    \ 方法、`default.html` JavaScript 文件、`LoadTileandNotifications.js` 文件模板、`TileLarge`\
    \ 绑定、UWP 应用 `Windows.UI.Notifications.TileNotification()` 工作流程、`XmlDocument` 对象、XML\
    \ 模式语法、XML 模板）\n  - 自适应 UI 技术（流体布局）\n  - `app.onactivated` 函数\n  - `default.html`\
    \ `formatDateString` 函数\n  - `ListView` 控件（输出屏幕、项目对话框、`resizeListView` 脚本文件引用、`weatherData.js`）\n\
    \  - 重新定位 CSS 文件（CSS 媒体查询、`default.css`、`default.html`、设备目标/屏幕输出、屏幕项目对话框、Windows\
    \ Mobile 工作流程）\n  - 附加工具（加速计工具、附加工具、功能模拟器、功能位置选项卡、模式、多点触控输入、近场通信、网络选项卡、真实世界交互、模拟鼠标输入、步骤、通用\
    \ Windows 平台工具、工作流程）\n  - 广告中介控件\n  - 应用程序清单文件（功能、内容 URI、声明、包编辑、打包步骤、选项卡、可视化资产、XML\
    \ 文件）\n\n- **B**\n  - 后台任务（`BackgroundTaskBuilder` 类、`BackgroundTaskRegistration.allTasks`\
    \ 属性、代码片段、`mytask.js` 文件、`package.appxmanifest`、解决方案资源管理器、系统条件、`SystemTrigger`、任务完成、`WebUIBackgroundTaskInstance.current`\
    \ 属性）\n  - `BackgroundTaskBuilder` 类\n  - `BackgroundTaskProgressEventArgs` 对象\n\
    \  - `BackgroundTaskRegistration.allTasks` 属性\n  - 锁屏提醒通知\n  - 蓝牙设备（`DeviceCapability`\
    \ 元素、GATT 设备、`Package.appmanifest` 文件、Windows 应用）\n  - 内置地图应用（Bing Maps 控件、AJAX\
    \ Control 7.0、`default.html` 文件、`default.js`、`loadModule`、`map.entities.push`\
    \ 方法、移动和 Web 应用、引用管理器、Windows 应用工作流程、`default.html` 文件、`default.js`、桌面窗口、方向指示、`bingmaps`、`default.html`\
    \ 文件、`default.js`、桌面窗口、`LaunchUriASync` 方法、Windows 设备、Windows Mobile 显示地图参数、Windows\
    \ Mobile 应用）\n\n- **C**\n  - 控件\n    - AppBar 控件（`appbarevents.js`、`default.html`、页面功能、属性、语法、Windows\
    \ 应用）\n    - FlipView 控件（创建、`data.js` 文件、`itemDataSource` 属性、WinJS 应用）\n    -\
    \ ListView 控件（单元格跨越布局、创建通用应用、`data.js` 文件、筛选功能、网格布局、分组项目、列表数据源、列表布局、`SemanticZoom`）\n\
    \    - Repeater 控件（`data.js`、`default.html` 页面、HTML 表格、项目列表、员工、Windows Mobile\
    \ 模拟器）\n    - ToolBar 控件（创建、`default.html` 页面、`default.js` 文件、属性、设置、Windows 应用）\n\
    \  - 每千次展示成本 (CPM)\n\n- **D, E**\n  - 数据绑定和导航\n    - 数据绑定系统（业务对象、数据属性、`processAll()`\
    \ 方法、项目对话框 Windows Mobile 输出、工作流程、样式属性数据属性、`default.html`、`default.js`、DOM 元素、项目对话框\
    \ Windows Mobile 输出、模板）\n    - 数据项（`default.html`、`default.js`、DOM 元素、项目对话框 Windows\
    \ Mobile 屏幕、WinJS 控件）\n    - `data.js` 文件（数据模板、`default.html`、`ListView`、项目对话框、样式表定义、Windows\
    \ Mobile 屏幕）\n  - 数据存储技术\n    - 创建和删除应用（`btnSaveClick` 方法、容器、`createContainer`\
    \ 方法、`DataStorageDemo.js` 文件、`default.html`、js 文件、层级、本地应用数据存储、Windows 10 应用）\n\
    \      - 文件处理（`btnDataToFile` 和 `btnCreateAFile`、回调函数、`createFileAsync` 方法、创建、读取和写入选项）\n\
    \      - `DatastorageDemo.js` 文件、`default.html` 文件、默认屏幕、本地文件夹、本地持有文件 `MyFile.txt`、`readTextAsync`\
    \ 方法、漫游文件夹、临时文件夹、通用 Windows 应用、`Windows.Storage.StorageFile` 类概述）\n    - 读取应用数据（`ApplicationDataContainer.values`\
    \ 创建、`DataStorageDemo.js` 文件、`default.html` 页面、函数、存储和检索应用、Windows 10）\n    - 注册和实现（`ApplicationData.DataChanged`\
    \ 事件、`applicationData` 对象、`DatastorageDemo.js`、`default.html` 代码、事件处理程序、工作流程）\n\
    \    - 检索本地复合（`ApplicationDataCompositeValue` 类、复合值类、Windows 10 应用）\n    - 漫游应用数据存储（`ApplicationDataContainer.values`、`btnCreateRoamingContainerClick`\
    \ 函数、创建和读取数据、`createContainer` 方法、`DataStorageDemo.js`、`default.html` 页面、`roamingSettings.containers.hasKey`\
    \ 函数、`roamingSettings.createContainer`、Windows Mobile 输出）\n  - 定义类\n  - 设计断点\n\
    \  - 设备功能\n    - 应用包清单（`app package.appmanifest` 文件、`DeviceCapability` 元素、问题、Visual\
    \ Studio XML 编辑器）\n    - 音频流和输出语音（音频选项、`audio_SetUp()` 方法、控件、调试模式、`default.html`\
    \ 页面、下拉控件、`errorMessage()` 方法、纯文本、`ready()` 函数、`speakFn()` 函数、`SpeechSynthesise.js`\
    \ 文件、`StatusMessage` 错误消息、文本转语音应用、`voicesSelect` 下拉控件、`Windows.Media.SpeechSynthesis.SpeechSynthesizer()`）\n\
    \    - 蓝牙设备（`DeviceCapability` 元素、GATT 设备、`Package.appmanifest` 文件、Windows 应用）\n\
    \    - Cortana 语音命令（`activatedEventArgs`、`default.js`、前台、VCD 文件、工作流程、XML 代码）\n\
    \    - 查找可用性（`default.html` 页面、`DevicePicker.js`、获取枚举、`ready()` 函数、`showDevicePicker()`\
    \ 方法、UWP 应用、`Windows.Devices.Enumeration.DevicePicker` 类、工作流程）\n    - 语音识别（约束条件、`buttonSpeechRecognizerListConstraintClick`\
    \ 函数、创建、自定义列表、`default.html` 文件、`Speechrecognisation.js` 文件、`speechRecognizer.compileConstraintsAsync()`\
    \ 方法、UWP 应用、工作流程）\n  - 诊断工具（调试菜单、不同选项、因素、GPU 使用率工具、UI 响应性工具的结果、Visual Studio 探查器、Windows\
    \ 应用）\n  - 显示文本（DOM 资源管理器、计算选项卡、调试目的、DOM 资源管理器选项卡、HTML 元素、布局选项卡、刷新 Windows 应用、调试时的\
    \ Visual Studio、工作流程）\n\n- **F**\n  - 函数作用域\n\n- **G**\n  - Getter 方法\n  - 获取\
    \ HTML 文档\n  - 全球化\n    - 日期和时间格式化（`DateTimeFormatter`、`default.html` 文件、`onactivated`\
    \ 方法、输出定义）\n    - 数字和货币格式化（`default.html`、`NumberFormatting`、`onactivated` 方法、输出）\n\
    \    - 资源字符串（添加其他语言、`app.onactivated` 函数、`default.html` 文件、`default.js` 文件、默认语言设置英语、资源文件文件夹创建、法语区域性、`package.appxmanifest`\
    \ 文件、运行应用、通用应用）\n  - 全局作用域\n  - `GroupData`\n  - `GroupKey`\n  - `GroupSorter`\n\
    \n- **H**\n  - 中心导航（`default.html`、`default.js` 文件、元素、层次结构模式、输出项目对话框）\n  - 超链接（HTML\
    \ 导航模型、`newpage.html`、工作流程）\n\n- **I**\n  - `IBackgroundTaskRegistration` 对象\n\
    \  - 物联网 (IoT)\n\n- **J, K**\n  - JavaScript 控制台窗口\n    - 命令（`console.log` 方法、控制台窗口、`default.js`\
    \ 文件、开发者、错误/写入调试消息、本地计算机选项、日志消息模板、通用 Windows 平台应用、Visual Studio 菜单调试、警告和错误、工作流程）\n\
    \n- **L**\n  - 标签\n  - `LaunchUriASync` 方法\n  - 生命周期和导航模型\n    - 超链接（HTML、`newpage.html`、工作流程）\n\
