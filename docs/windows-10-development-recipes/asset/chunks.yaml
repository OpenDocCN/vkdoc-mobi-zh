    \n            }\n\n        }\n\n    });\n\nvar ContractEmployee = WinJS.Class.derive(Employee,\n\
    \n    function (name) {\n\n        this.name = name;\n\n        this.type = \"\
    Contract Employee\";\n\n    });\n\nvar ContractEmployee1 = new ContractEmployee(\"\
    Senthil\");\n\n// display the name and the title  in the console window.\n\nconsole.log(ContractEmployee1.name);\n\
    \nconsole.log(ContractEmployee1.type);\n```\n\n此代码片段创建了一个名为 `Employee` 的类。随后，创建了另一个名为\
    \ `ContractEmployee` 的类；它继承自 `Employee` 类。创建了一个合同员工实例，并在控制台窗口中显示了该员工的 `name` 和雇佣\
    \ `type`。\n\n从 Visual Studio 运行 Windows 应用商店项目。这将在 JavaScript 控制台窗口中显示名称和类型，如图\
    \ 2-4 所示。\n\n![A978-1-4842-0719-2_2_Fig4_HTML.jpg](img/A978-1-4842-0719-2_2_Fig4_HTML.jpg)\n\
    \n**图 2-4.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示名称和雇佣类型\n\n`WinJS.Class.derive`\
    \ 函数的行为类似于 `WinJS.Class.define` 函数，不同之处在于它使用基类的原型（通过 `Object.create` 函数）来构造派生类。`Object.create`\
    \ 方法通过原型化父对象从一个类型派生出另一个类型；它还会添加作为子对象一部分的属性。\n\n## 2.5 在 WinJS 中创建混入\n\n### 问题\n\
    \n你需要在不用 `WinJS.Class.derive` 方法的情况下组合多个 JavaScript 对象的方法和属性。\n\n### 解决方案\n\n\
    使用 `WinJS.Class.mix` 方法在 WinJS 中组合多个 JavaScript 对象的方法和属性。\n"
- fmt: "### How It Works\n\n`WinJS.Class.derive`方法使用原型继承，有其自身的优点和缺点。它需要额外的处理时间并影响性能。这可以通过使用`WinJS.Class.mix`方法来克服。\n\
    \n`WinJS.Class.mix`方法接收两个参数。\n\n*   **构造函数**：第一个参数，用于初始化类成员。\n*   **混入（Mixin）**：第二个参数是包含混入方法的数组。\n\
    \n打开项目中的`WinJSFundamentals.js`文件，并用以下代码片段替换其内容。\n\n```javascript\n// Create a\
    \ class called Employee\nvar Employee = WinJS.Class.define(\n    function () {\n\
    \        this.name = name;\n        this.type = \"Employee\";\n    },\n    {\n\
    \        _Name: undefined,\n        _type: undefined,\n        name : {\n    \
    \        set :function(value)\n            {\n                this._Name = value;\n\
    \            },\n            get :function()\n            {\n                return\
    \ this._Name;\n            }\n        },\n        type: {\n            set :function(value)\n\
    \            {\n                this._type = value;\n            },\n        \
    \    get :function()\n            {\n                return this._type;\n    \
    \        }\n        }\n    });\nvar ContractEmployee = WinJS.Class.mix(\n    function\
    \ (name) {\n        this.name = name;\n        this.type = \"Contract Employee\"\
    ;\n    },Employee);\nvar ContractEmployee1 = new ContractEmployee(\"Senthil\"\
    );\n// display the name and the title  in the console window.\nconsole.log(ContractEmployee1.name);\n\
    console.log(ContractEmployee1.type);\n```\n\n在此代码示例中，创建了一个`Employee`类，随后又创建了另一个名为`ContractEmployee`的类；它继承自`Employee`类。注意，这里使用了`mix`方法而不是`derive`方法。\n\
    \n代码看起来与使用`derive`方法的代码相似，但混入（mixin）增加了更多功能。其中一项功能就是对多重继承的支持。由于`mixin`方法中的第二个参数是一个混入数组，你可以让`ContractEmployee`类实现来自多个类的功能。\n\
    \n执行此程序时，你将看到员工的姓名和类型，如图[2-5](#A978-1-4842-0719-2_2_Chapter.html#Fig5)所示。\n\n\
    ![A978-1-4842-0719-2_2_Fig5_HTML.jpg](A978-1-4842-0719-2_2_Fig5_HTML.jpg)\n\n\
    **图 2-5.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示姓名和员工类型\n\n混入（Mixin）可用于为你的类型添加功能。混入通常包含已实现的函数，这些函数可以添加到\
    \ WinJS 的许多类型中。\n\n在 WinJS 中，你可以使用以下混入之一来管理事件以及进行绑定。\n\n*   `WinJS.Utilities.eventMixin`：此混入可用于为定义的任何类型添加事件管理功能。它包含诸如`WinJS.Utilities.eventMixin.addEventListener`、`WinJS.Utilities.eventMixin.removeEventListener`和`WinJS.Utilities.eventMixin.dispatchEvent`之类的函数，用于引发和处理你定义的自定义事件。\n\
    *   `WinJS.Binding.dynamicObservableMixin`：此函数用于添加绑定管理功能，开发者可以借此将用户定义的对象绑定到能够在其属性值更改时通知侦听器的控件上。\n\
    \n## 2.6 WinJS 中的封装\n\n### 问题\n\n你想要构建一个库，并且只希望向外部访问公开其中的少数方法。你需要支持 WinJS 应用程序中的封装。\n\
    \n### 解决方案\n\n利用函数和命名空间的功能来实现这一点。变量可以具有全局作用域或函数作用域。可以利用此特性在 JavaScript 中引入封装功能。\n\
    \n### 工作原理\n\n当你创建自己的 JavaScript 库时，你可能希望同时创建公有方法和私有方法。公有方法可以作为 API 公开，供第三方开发者使用。\n\
    \n问题在于 JavaScript 不支持访问修饰符。JavaScript 中的变量具有以下作用域。\n\n*   **全局作用域**：在整个应用程序中可用。\n\
    *   **函数作用域**：仅在函数内部可用。\n\n函数作用域特性被用于 WinJS 中，用来隐藏方法，使其具有一定程度的私有性。通过手动将方法添加到命名空间，可以将方法公开为公有方法。\n\
    \n想象一下，你正在编写一个跟踪页面浏览量并显示每千次展示成本 (CPM) 的库。你希望向用户公开`GetPageViews`方法，但不公开`GetCPMRate`方法。具体操作如下……\n\
    \n打开共享项目中的`WinJSFundamentals.js`文件，并用以下代码片段替换其内容。\n\n```javascript\n(function\
    \ (global) {\n    // public method\n    function GetPageViews()\n    {\n     \
    \   return 1000;\n    }\n    //private method.\n    function GetCPMRate()\n  \
    \  {\n        return 1;\n    }\n    WinJS.Namespace.define(\"DeveloperPublish\"\
    ,\n    {\n        GetPageViews: GetPageViews\n    });\n})(this);\nconsole.log(DeveloperPublish.GetPageViews());\n\
    ```\n\n这个自执行的匿名函数包含两个方法：`GetPageViews`和`GetCPMRate`。`DeveloperPublish`命名空间用于暴露或导出`GetPageViews`函数，并为其提供公共访问权限。另一方面，`GetCPMRate`是私有方法。你可以在全局作用域方法内调用`GetCPMRate`方法，但不能通过`DeveloperPublish`命名空间调用。例如，以下代码片段演示了一个场景，其中`GetPageViews`和`GetTotalRate`函数通过`DeveloperPublish`命名空间暴露；而`GetCPMRate`仅在`GetTotalRate`内部使用。\n\
    \n```javascript\n(function (global) {\n    // public method\n    function GetPageViews()\
    \ {\n        return 1000;\n    }\n    //private method.\n    function GetCPMRate()\
    \ {\n        return 2;\n    }\n    function GetTotalRate() {\n        return GetPageViews()\
    \ * GetCPMRate();\n    }\n    WinJS.Namespace.define(\"DeveloperPublish\",\n \
    \   {\n        GetPageViews: GetPageViews,\n        GetTotalRate: GetTotalRate\n\
    \    });\n})(this);\nconsole.log(DeveloperPublish.GetPageViews());\nconsole.log(DeveloperPublish.GetTotalRate());\n\
    ```\n\n运行 Windows 项目。在图[2-6](#A978-1-4842-0719-2_2_Chapter.html#Fig6)中，你会在 Visual\
    \ Studio JavaScript 控制台窗口中看到`GetPageViews`方法显示 1000。\n\n![A978-1-4842-0719-2_2_Fig6_HTML.jpg](A978-1-4842-0719-2_2_Fig6_HTML.jpg)\n\
    \n**图 2-6.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示字符串\n\n当你尝试在自执行匿名函数外部访问`GetCPMRate`方法时，会收到以下错误（另请参见图[2-7](#A978-1-4842-0719-2_2_Chapter.html#Fig7)）。\n\
    \n![A978-1-4842-0719-2_2_Fig7_HTML.jpg](A978-1-4842-0719-2_2_Fig7_HTML.jpg)\n\n\
    **图 2-7.** 尝试访问私有方法时出错\n\n`0x800a1391: JavaScript runtime error: 'GetCPMRate'\
    \ is undefined.`\n\n这是一个有用的特性，特别是在构建库并希望限制对 WinJS 中某些方法的访问时。\n\n## 2.7 在 WinJS\
    \ 中使用 Promise\n\n### 问题\n\n你需要异步执行代码，以便用户界面更具响应性。\n\n### 解决方案\n\n你可以在通用 Windows\
    \ 应用中使用异步编程，以便某些方法的处理可以异步完成。这样，你的应用程序的 UI 线程将保持空闲，并能响应用户输入。"
  raw: '### How It Works


    The `WinJS.Class.derive` method uses the prototype inheritance, which has its
    own advantages and disadvantages. It requires additional time to process and has
    a performance impact. This can be overcome by using `WinJS.Class.mix` method.


    The `WinJS.Class.mix` method takes two parameters.


    *   Constructor: The first parameter, which is used to initialize the class members.

    *   Mixin: The second parameter is the array that takes the mixin methods


    Open the `WinJSFundamentals.js` file in the project and replace it with the following
    code snippet.


    `// Create a class called Employee`


    `var Employee = WinJS.Class.define(`


        `function () {`


            `this.name = name;`


            `this.type = "Employee";`


        `},`


        `{`


            `_Name: undefined,`


            `_type: undefined,`


            `name : {`


                `set :function(value)`


                `{`


                    `this._Name = value;`


                `},`


                `get :function()`


                `{`


                    `return this._Name;`


                `}`


            `},`


            `type: {`


                `set :function(value)`


                `{`


                    `this._type = value;`


                `},`


                `get :function()`


                `{`


                    `return this._type;`


                `}`


            `}`


        `});`


    `var ContractEmployee = WinJS.Class.mix(`


        `function (name) {`


            `this.name = name;`


            `this.type = "Contract Employee";`


        `},Employee);`


    `var ContractEmployee1 = new ContractEmployee("Senthil");`


    `// display the name and the title  in the console window.`


    `console.log(ContractEmployee1.name);`


    `console.log(ContractEmployee1.type);`


    In this code sample, an `Employee` class is created and later another class called,
    `ContractEmployee`, is created; it inherits from the `Employee` class. Note that
    you have used the `mix` method instead of the `derive` method.


    Well, the code might look similar to the one that was used with `derive` method,
    but the mixin adds more features. One such feature is the support of multiple
    inheritances. Since the second parameter in the `mixin` method is an array of
    mixins, you could have the `ContractEmployee` class implement the features from
    multiple classes.


    When you execute this program, you see the name and the type of the employee,
    as shown in Figure [2-5](#A978-1-4842-0719-2_2_Chapter.html#Fig5).


    ![A978-1-4842-0719-2_2_Fig5_HTML.jpg](A978-1-4842-0719-2_2_Fig5_HTML.jpg)


    Figure 2-5.


    Displaying the name and employee type in the JavaScript console window in Visual
    Studio 2015


    Mixins can be used to add functionality to your types. Mixins generally contain
    implemented functions that can be added to many types in WinJS.


    In WinJS, you can manage events as well as bind using one of the following mixins.


    *   `WinJS.Utilities.eventMixin`: This mixin can be used to add the event management
    functionality to any type that you define. It includes functions like `WinJS.Utilities.eventMixin.addEventListener`,
    `WinJS.Utilities.eventMixin.removeEventListener`, and `WinJS.Utilities.eventMixin.dispatchEvent`
    to raise and handle custom events that you define.

    *   `WinJS.Binding.dynamicObservableMixin`: This function is used to add binding
    management functionality, in which developers can bind a user-defined object to
    a control that is capable of notifying listeners when the value of a property
    changes.


    ## 2.6 Encapsulation in WinJS


    ### Problem


    You want to build a library and you want to expose only a few methods from it
    to outside access. You need to support encapsulation in the WinJS application.


    ### Solution


    Use the capabilities of the functions and the namespaces to achieve this. The
    variable can have global scope or function scope. This feature can be used to
    bring in the encapsulation functionality in JavaScript.


    ### How It Works


    When you create your own JavaScript library, you might want to create both public
    and private methods. The public methods can be exposed as an API and can be used
    by third-party developers.


    The problem here is that JavaScript does not support access modifiers. A variable
    in JavaScript has the following scope.


    *   Global scope: This is available throughout the application.

    *   Function scope: This is available only within the function.


    The function scope feature is used in WinJS to hide methods to make it somewhat
    private. The methods can be exposed as public by manually adding methods to the
    namespace.


    Imagine a scenario where you are writing a library to track page views and display
    the cost-per-million (CPM) impressions. You want to expose the `GetPageViews`
    method to users but not the `GetCPMRate` method. Here’s how you do it ….


    Open the `WinJSFundamentals.js` file in the shared project and replace it with
    the following code snippet.


    `(function (global) {`


        `// public method`


        `function GetPageViews()`


        `{`


            `return 1000;`


        `}`


        `//private method.`


        `function GetCPMRate()`


        `{`


            `return 1;`


        `}`


        `WinJS.Namespace.define("DeveloperPublish",`


        `{`


            `GetPageViews: GetPageViews`


        `});`


    `})(this);`


    `console.log(DeveloperPublish.GetPageViews());`


    The self-executing anonymous function has two methods: `GetPageViews` and `GetCPMRate`.
    The `DeveloperPublish` namespace is used to expose or export the `GetPageViews`
    function and give it public access. `GetCPMRate`, on the other hand, is a private
    method. You can call the `GetCPMRate` method within the global scope method, but
    not using the `DeveloperPublish` namespace. For example, the following code snippet
    demonstrates a scenario where the `GetPageViews` and `GetTotalRate` functions
    are exposed using the `DeveloperPublish` namespace; the `GetCPMRate` is only used
    within the `GetTotalRate`.


    `(function (global) {`


        `// public method`


        `function GetPageViews() {`


            `return 1000;`


        `}`


        `//private method.`


        `function GetCPMRate() {`


            `return 2;`


        `}`


        `function GetTotalRate() {`


            `return GetPageViews() * GetCPMRate();`


        `}`


        `WinJS.Namespace.define("DeveloperPublish",`


        `{`


            `GetPageViews: GetPageViews,`


            `GetTotalRate: GetTotalRate`


        `});`


    `})(this);`


    `console.log(DeveloperPublish.GetPageViews());`


    `console.log(DeveloperPublish.GetTotalRate());`


    Run the Windows project. In Figure [2-6](#A978-1-4842-0719-2_2_Chapter.html#Fig6),
    you see the `GetPageViews` method displaying 1000 in the Visual Studio JavaScript
    console window.


    ![A978-1-4842-0719-2_2_Fig6_HTML.jpg](A978-1-4842-0719-2_2_Fig6_HTML.jpg)


    Figure 2-6.


    Display the string in the JavaScript console window in Visual Studio 2015


    When you try to access the `GetCPMRate` method outside of the self-executing anonymous
    function, you get the following error (also see Figure [2-7](#A978-1-4842-0719-2_2_Chapter.html#Fig7)).


    ![A978-1-4842-0719-2_2_Fig7_HTML.jpg](A978-1-4842-0719-2_2_Fig7_HTML.jpg)


    Figure 2-7.


    Error when trying to access private methods


       `0x800a1391: JavaScript runtime error: ''GetCPMRate'' is undefined.`


    This is a useful feature, especially when you are building a library and you want
    to restrict access to certain methods in WinJS.


    ## 2.7 Using Promise in WinJS


    ### Problem


    You need to execute the code asynchronously so that the UI is more responsive.


    ### Solution


    You can use the asynchronous programming in your Universal Windows apps so that
    the processing of certain methods can be done asynchronously. This way, your app’s
    UI thread is free and responsive to user input.'
  trans: "\n### 工作原理\n\n`WinJS.Class.derive`方法使用原型继承，有其自身的优点和缺点。它需要额外的处理时间并影响性能。这可以通过使用`WinJS.Class.mix`方法来克服。\n\
    \n`WinJS.Class.mix`方法接收两个参数。\n\n*   **构造函数**：第一个参数，用于初始化类成员。\n*   **混入（Mixin）**：第二个参数是包含混入方法的数组。\n\
    \n打开项目中的`WinJSFundamentals.js`文件，并用以下代码片段替换其内容。\n\n```javascript\n// Create a\
    \ class called Employee\nvar Employee = WinJS.Class.define(\n    function () {\n\
    \        this.name = name;\n        this.type = \"Employee\";\n    },\n    {\n\
    \        _Name: undefined,\n        _type: undefined,\n        name : {\n    \
    \        set :function(value)\n            {\n                this._Name = value;\n\
    \            },\n            get :function()\n            {\n                return\
    \ this._Name;\n            }\n        },\n        type: {\n            set :function(value)\n\
    \            {\n                this._type = value;\n            },\n        \
    \    get :function()\n            {\n                return this._type;\n    \
    \        }\n        }\n    });\nvar ContractEmployee = WinJS.Class.mix(\n    function\
    \ (name) {\n        this.name = name;\n        this.type = \"Contract Employee\"\
    ;\n    },Employee);\nvar ContractEmployee1 = new ContractEmployee(\"Senthil\"\
    );\n// display the name and the title  in the console window.\nconsole.log(ContractEmployee1.name);\n\
    console.log(ContractEmployee1.type);\n```\n\n在此代码示例中，创建了一个`Employee`类，随后又创建了另一个名为`ContractEmployee`的类；它继承自`Employee`类。注意，这里使用了`mix`方法而不是`derive`方法。\n\
    \n代码看起来与使用`derive`方法的代码相似，但混入（mixin）增加了更多功能。其中一项功能就是对多重继承的支持。由于`mixin`方法中的第二个参数是一个混入数组，你可以让`ContractEmployee`类实现来自多个类的功能。\n\
    \n执行此程序时，你将看到员工的姓名和类型，如图 2-5 所示。\n\n![A978-1-4842-0719-2_2_Fig5_HTML.jpg](img/A978-1-4842-0719-2_2_Fig5_HTML.jpg)\n\
    \n**图 2-5.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示姓名和员工类型\n\n混入（Mixin）可用于为你的类型添加功能。混入通常包含已实现的函数，这些函数可以添加到\
    \ WinJS 的许多类型中。\n\n在 WinJS 中，你可以使用以下混入之一来管理事件以及进行绑定。\n\n*   `WinJS.Utilities.eventMixin`：此混入可用于为定义的任何类型添加事件管理功能。它包含诸如`WinJS.Utilities.eventMixin.addEventListener`、`WinJS.Utilities.eventMixin.removeEventListener`和`WinJS.Utilities.eventMixin.dispatchEvent`之类的函数，用于引发和处理你定义的自定义事件。\n\
    *   `WinJS.Binding.dynamicObservableMixin`：此函数用于添加绑定管理功能，开发者可以借此将用户定义的对象绑定到能够在其属性值更改时通知侦听器的控件上。\n\
    \n## 2.6 WinJS 中的封装\n\n### 问题\n\n你想要构建一个库，并且只希望向外部访问公开其中的少数方法。你需要支持 WinJS 应用程序中的封装。\n\
    \n### 解决方案\n\n利用函数和命名空间的功能来实现这一点。变量可以具有全局作用域或函数作用域。可以利用此特性在 JavaScript 中引入封装功能。\n\
    \n### 工作原理\n\n当你创建自己的 JavaScript 库时，你可能希望同时创建公有方法和私有方法。公有方法可以作为 API 公开，供第三方开发者使用。\n\
    \n问题在于 JavaScript 不支持访问修饰符。JavaScript 中的变量具有以下作用域。\n\n*   **全局作用域**：在整个应用程序中可用。\n\
    *   **函数作用域**：仅在函数内部可用。\n\n函数作用域特性被用于 WinJS 中，用来隐藏方法，使其具有一定程度的私有性。通过手动将方法添加到命名空间，可以将方法公开为公有方法。\n\
    \n想象一下，你正在编写一个跟踪页面浏览量并显示每千次展示成本 (CPM) 的库。你希望向用户公开`GetPageViews`方法，但不公开`GetCPMRate`方法。具体操作如下……\n\
    \n打开共享项目中的`WinJSFundamentals.js`文件，并用以下代码片段替换其内容。\n\n```javascript\n(function\
    \ (global) {\n    // public method\n    function GetPageViews()\n    {\n     \
    \   return 1000;\n    }\n    //private method.\n    function GetCPMRate()\n  \
    \  {\n        return 1;\n    }\n    WinJS.Namespace.define(\"DeveloperPublish\"\
    ,\n    {\n        GetPageViews: GetPageViews\n    });\n})(this);\nconsole.log(DeveloperPublish.GetPageViews());\n\
    ```\n\n这个自执行的匿名函数包含两个方法：`GetPageViews`和`GetCPMRate`。`DeveloperPublish`命名空间用于暴露或导出`GetPageViews`函数，并为其提供公共访问权限。另一方面，`GetCPMRate`是私有方法。你可以在全局作用域方法内调用`GetCPMRate`方法，但不能通过`DeveloperPublish`命名空间调用。例如，以下代码片段演示了一个场景，其中`GetPageViews`和`GetTotalRate`函数通过`DeveloperPublish`命名空间暴露；而`GetCPMRate`仅在`GetTotalRate`内部使用。\n\
    \n```javascript\n(function (global) {\n    // public method\n    function GetPageViews()\
    \ {\n        return 1000;\n    }\n    //private method.\n    function GetCPMRate()\
    \ {\n        return 2;\n    }\n    function GetTotalRate() {\n        return GetPageViews()\
    \ * GetCPMRate();\n    }\n    WinJS.Namespace.define(\"DeveloperPublish\",\n \
    \   {\n        GetPageViews: GetPageViews,\n        GetTotalRate: GetTotalRate\n\
    \    });\n})(this);\nconsole.log(DeveloperPublish.GetPageViews());\nconsole.log(DeveloperPublish.GetTotalRate());\n\
    ```\n\n运行 Windows 项目。在图 2-6 中，你会在 Visual Studio JavaScript 控制台窗口中看到`GetPageViews`方法显示\
    \ 1000。\n\n![A978-1-4842-0719-2_2_Fig6_HTML.jpg](img/A978-1-4842-0719-2_2_Fig6_HTML.jpg)\n\
    \n**图 2-6.** 在 Visual Studio 2015 的 JavaScript 控制台窗口中显示字符串\n\n当你尝试在自执行匿名函数外部访问`GetCPMRate`方法时，会收到以下错误（另请参见图\
    \ 2-7）。\n\n![A978-1-4842-0719-2_2_Fig7_HTML.jpg](img/A978-1-4842-0719-2_2_Fig7_HTML.jpg)\n\
    \n**图 2-7.** 尝试访问私有方法时出错\n\n`0x800a1391: JavaScript runtime error: 'GetCPMRate'\
    \ is undefined.`\n\n这是一个有用的特性，特别是在构建库并希望限制对 WinJS 中某些方法的访问时。\n\n## 2.7 在 WinJS\
    \ 中使用 Promise\n\n### 问题\n\n你需要异步执行代码，以便用户界面更具响应性。\n\n### 解决方案\n\n你可以在通用 Windows\
    \ 应用中使用异步编程，以便某些方法的处理可以异步完成。这样，你的应用程序的 UI 线程将保持空闲，并能响应用户输入。\n"
- fmt: "### How It Works\n\nAsynchronous APIs in WinJS and Universal Windows apps\
    \ are represented as promises. One of the common implementations of promise in\
    \ WinJS is the `xhr` function, which wraps the `XMLHttpRequest` in a promise.\
    \ When you provide a URL and the response type, the `xhr` function returns the\
    \ promise, which is fulfilled by returning the data, or it returns an error if\
    \ it fails.\n\nIn this recipe, you are building an app that simply takes the URL\
    \ as input and tries to connect to it. The result is a success or failure based\
    \ on the connection.\n\nIn Visual Studio 2015, launch the existing Universal Windows\
    \ app that was built in the previous recipe. Open the `default.html` page and\
    \ add the following `div` elements under the body section. This accepts the URL\
    \ in the `inputurl` text box and the status is displayed in the output `div` tag.\n\
    \n```html\n<div>\n    <input id=\"inputurl\"/>\n</div>\n<div id=\"output\">\n\
    </div>\n```\n\nYou need to add the change event handler to the input element,\
    \ which should be triggered when the user enters the text and hits the Enter key.\
    \ You can add this within the `WinJS.Utilities.ready` function in the `app.onactivated`\
    \ event handler in the `default.js` file, as shown next.\n\n```javascript\nWinJS.Utilities.ready(function\
    \ () {\n    var input = document.getElementById(\"inputurl\");\n    input.addEventListener(\"\
    change\", changeEvent);\n}, false);\n```\n\nThe next step is to add the `changeEvent`\
    \ function, which needs to call the `xhr` function by passing the URL entered\
    \ by the user; this updates the result accordingly. The return type of the `xhr`\
    \ function is promise, which lets developers use the `then` function of the promise\
    \ to update the UI asynchronously.\n\nThe `then` function takes up to three parameters,\
    \ which includes:\n\n*   The `completed` function that is executed if the promise\
    \ was fulfilled without errors\n*   The `error` function to handle errors\n* \
    \  The `progress` function to display the progress of the promise\n\nLet’s add\
    \ the `changeEvent`, as shown next, to the `default.js` file after the `app.onactivated`\
    \ event.\n\n```javascript\nfunction changeEvent(e) {\n    var resultDiv = document.getElementById(\"\
    output\");\n    WinJS.xhr({ url: e.target.value }).then(function completed(result)\
    \ {\n        if (result.status === 200) {\n            resultDiv.style.backgroundColor\
    \ = \"Green\";\n            resultDiv.innerText = \"Success\";\n        }\n  \
    \  },\n        function error(e) {\n            resultDiv.style.backgroundColor\
    \ = \"red\";\n            resultDiv.innerText = e.statusText;\n        });\n}\n\
    ```\n\nThis code includes the `completed` and `error` functions for the promise.\
    \ It displays the text Success or Error based on the result and changes the color\
    \ of the output `div` element.\n\nBuild and run the app on a local machine, enter\
    \ the URL, and hit the Enter key. If the URL is valid, the output `div` tag turns\
    \ green and displays the Success message. If there is an error, the error message\
    \ is displayed with a red background, as shown in Figure [2-8](#A978-1-4842-0719-2_2_Chapter.html#Fig8).\n\
    \n![A978-1-4842-0719-2_2_Fig8_HTML.jpg](A978-1-4842-0719-2_2_Fig8_HTML.jpg)\n\n\
    **Figure 2-8.** Using the `xhr` function to demonstrate the promise\n\nYou can\
    \ stop the asynchronous operation that is currently in execution by using the\
    \ `cancel` method of the promise object.\n\n```javascript\nxhrPromise.cancel();\n\
    ```\n\nNote that you can also chain promise operations by invoking the `then`\
    \ on the promise that is returned by the previous `then` function.\n\n# Chapter\
    \ 3: Basic WinJS Controls\n\nThis chapter provides an overview of the controls\
    \ that are available in the WinJS library, which can be used by developers to\
    \ quickly build their Windows apps. It explores how to add WinJS controls to a\
    \ page, as well basic WinJS controls like the ToggleSwitch, Rating, DatePicker,\
    \ TimePicker, tooltip, text controls, and more.\n\nThere are advanced controls\
    \ in WinJS that can be used to list records, display menus, or add toolbars in\
    \ an app. ([Chapter 4](#A978-1-4842-0719-2_4_Chapter.html) covers advanced controls\
    \ like ListView, Toolbar, and AppBar.)\n\n## 3.1 Declaring a WinJS Control on\
    \ a Page\n\n### Problem\n\nYou need to add or declare a WinJS control on a page\
    \ of your Windows app.\n\n### Solution\n\nUse the `data-win-control` attribute\
    \ within the `div` tag to add the WinJS control on a page.\n\n### How It Works\n\
    \nCreate a new project using the Windows Universal (Blank App) template in Microsoft\
    \ Visual Studio 2015. This creates a universal app that can be run on Windows\
    \ tablets and Windows Mobile powered by Windows 10.\n\nOpen the `default.html`\
    \ page from the project in Visual Studio Solution Explorer.\n\nDeclare a WinJS\
    \ control on a page by using the `data-win-control` attribute. For example, to\
    \ declare the Rating Control on a page, add the following `div` tag.\n\n```html\n\
    <div id=\"rating\" data-win-control=\"WinJS.UI.Rating\"></div>\n```\n\nIn this\
    \ code snippet, the `div` tag acts like a placeholder for the WinJS control. The\
    \ `data-win-control` attribute is used to indicate the WinJS control that will\
    \ be rendered.\n\nThe HTML page will look like the following.\n\n```html\n<!DOCTYPE\
    \ html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.1</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe3.1 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    </head>\n<body class=\"win-type-body\">\n    <div id=\"rating\" data-win-control=\"\
    WinJS.UI.Rating\"></div>\n</body>\n</html>\n```\n\nThe main requirement for using\
    \ the WinJS controls on the page is to include the JavaScript and the CSS files.\
    \ You should add the following references in the head section of your HTML page.\n\
    \n```html\n<link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\" />\n<script\
    \ src=\"WinJS/js/base.js\"></script>\n<script src=\"WinJS/js/ui.js\"></script>\n\
    ```\n\nThe WinJS library provides two CSS (Cascading Style Sheets) files: `ui-dark.css`\
    \ and `ui-light.css`. You can switch between the light theme and the dark theme\
    \ for all of your controls by changing to `ui-light.css` and `ui-dark.css`, respectively.\n\
    \nThe `base.js` and `ui.js` files are JavaScript files that need to be referenced\
    \ in the HTML page to use the WinJS controls. The JavaScript source codes for\
    \ the WinJS controls are defined in one of these JavaScript files.\n\nThe WinJS\
    \ control (in this example, it’s the Rating control) does not get rendered until\
    \ the `WinJS.UI.processAll` method is called. This method is defined in the `default.js`\
    \ file found under the `js` folder of the project. The main functionality of the\
    \ `WinJS.UI.processAll` method is to parse the HTML page, identify the attributes\
    \ with the `data-win-control`, and generate the control accordingly.\n\nHence,\
    \ it is necessary to include the reference to the `default.js` file on the page.\n\
    \nNow, let’s build the universal app and run it on Windows 10 and the Windows\
    \ Mobile emulator.\n\nFigure [3-1](#A978-1-4842-0719-2_3_Chapter.html#Fig1) demonstrates\
    \ the appearance of the Rating control on a Windows tablet. Figure [3-2](#A978-1-4842-0719-2_3_Chapter.html#Fig2)\
    \ demonstrates the appearance of the Rating control on Windows Mobile.\n\n![A978-1-4842-0719-2_3_Fig2_HTML.jpg](A978-1-4842-0719-2_3_Fig2_HTML.jpg)\n\
    \n**Figure 3-2.** Rating control on Windows Mobile emulator\n\n![A978-1-4842-0719-2_3_Fig1_HTML.jpg](A978-1-4842-0719-2_3_Fig1_HTML.jpg)\n\
    \n**Figure 3-1.** Rating control on Windows 10\n\n## 3.2 Setting Options for WinJS\
    \ Controls\n\n### Problem\n\nYou want to set additional options or properties\
    \ for the WinJS controls on your HTML page.\n\n### Solution\n\nUse the `data-win-options`\
    \ attribute to set additional options or properties for the control."
  raw: '### How It Works


    Asynchronous APIs in WinJS and Universal Windows apps are represented as promises.
    One of the common implementations of promise in WinJS is the `xhr` function, which
    wraps the XMLHttpRequest in a promise. When you provide a URL and the response
    type, the `xhr` function returns the promise, which is fulfilled by returning
    the data, or it returns an error if it fails.


    In this recipe, you are building an app that simply takes the URL as input and
    tries to connect to it. The result is a success or failure based on the connection.


    In Visual Studio 2015, launch the existing Universal Windows app that was built
    in the previous recipe. Open the `default.html` page and add the following `div`
    elements under the body section. This accepts the URL in the `inputurl` text box
    and the status is displayed in the output `div` tag.


    `<div>`


        `<input id="inputurl"/>`


    `</div>`


    `<div id="output">`


    `</div>`


    You need to add the change event handler to the input element, which should be
    triggered when the user enters the text and hits the Enter key. You can add this
    within the `WinJS.Utilities.ready` function in the `app.onactivated` event handler
    in the `default.js` file, as shown next.


    `WinJS.Utilities.ready(function () {`


                        `var input = document.getElementById("inputurl");`


                        `input.addEventListener("change", changeEvent);`


                    `}, false);`


    The next step is to add the `changeEvent` function, which needs to call the `xhr`
    function by passing the URL entered by the user; this updates the result accordingly.
    The return type of the `xhr` function is promise, which lets developers use the
    `then` function of the promise to update the UI asynchronously.


    The `then` function takes up to three parameters, which includes


    *   The `completed` function that is executed if the promise was fulfilled without
    errors

    *   The `error` function to handle errors

    *   The `progress` function to display the progress of the promise


    Let’s add the `changeEvent`, as shown next, to the `default.js` file after the
    `app.onactivated` event.


    `function changeEvent(e) {`


        `var resultDiv = document.getElementById("output");`


        `WinJS.xhr({ url: e.target.value }).then(function completed(result) {`


            `if (result.status === 200) {`


                `resultDiv.style.backgroundColor = "Green";`


                `resultDiv.innerText = "Success";`


            `}`


        `},`


            `function error(e) {`


                `resultDiv.style.backgroundColor = "red";`


                `resultDiv.innerText = e.statusText;`


            `});`


    `}`


    This code includes the `completed` and `error` functions for the promise. It displays
    the text Success or Error based on the result and changes the color of the output
    `div` element.


    Build and run the app on a local machine, enter the URL, and hit the Enter key.
    If the URL is valid, the output `div` tag turns green and displays the Success
    message. If there is an error, the error message is displayed with a red background,
    as shown in Figure [2-8](#A978-1-4842-0719-2_2_Chapter.html#Fig8).


    ![A978-1-4842-0719-2_2_Fig8_HTML.jpg](A978-1-4842-0719-2_2_Fig8_HTML.jpg)


    Figure 2-8.


    Using the xhr function to demonstrate the promise


    You can stop the asynchronous operation that is currently in execution by using
    the `cancel` method of the promise object.


    `xhrPromise.cancel();`


    Note that you can also chain promise operations by invoking the `then` on the
    promise that is returned by the previous `then` function.


    # Chapter 3: Basic WinJS Controls


    This chapter provides an overview of the controls that are available in the WinJS
    library, which can be used by developers to quickly build their Windows apps.
    It explores how to add WinJS controls to a page, as well basic WinJS controls
    like the ToggleSwitch, Rating, DatePicker, TimePicker, tooltip, text controls,
    and more.


    There are advanced controls in WinJS that can be used to list records, display
    menus, or add toolbars in an app. ([Chapter 4](#A978-1-4842-0719-2_4_Chapter.html)
    covers advanced controls like ListView, Toolbar, and AppBar.)


    ## 3.1 Declaring a WinJS Control on a Page


    ### Problem


    You need to add or declare a WinJS control on a page of your Windows app.


    ### Solution


    Use the `data-win-control` attribute within the `div` tag to add the WinJS control
    on a page.


    ### How It Works


    Create a new project using the Windows Universal (Blank App) template in Microsoft
    Visual Studio 2015\. This creates a universal app that can be run on Windows tablets
    and Windows Mobile powered by Windows 10.   Open the `default.html` page from
    the project in Visual Studio Solution Explorer.   Declare a WinJS control on a
    page by using the `data-win-control` attribute. For example, to declare the Rating
    Control on a page, add the following `div` tag.  


    `<div id="rating" data-win-control="WinJS.UI.Rating"></div>`


    In this code snippet, the `div` tag acts like a placeholder for the WinJS control.
    The `data-win-control` attribute is used to indicate the WinJS control that will
    be rendered.


    The HTML page will look like the following.


    `<!DOCTYPE html>`


    `<html>`


    `<head>`


        `<meta charset="utf-8" />`


        `<title>Recipe3.1</title>`


        `<!-- WinJS references -->`


        `<link href="WinJS/css/ui-light.css" rel="stylesheet" />`


        `<script src="WinJS/js/base.js"></script>`


        `<script src="WinJS/js/ui.js"></script>`


        `<!-- Recipe3.1 references -->`


        `<link href="/css/default.css" rel="stylesheet" />`


        `<script src="/js/default.js"></script>`


    `</head>`


    `<body class="win-type-body">`


        `<div id="rating" data-win-control="WinJS.UI.Rating"></div>`


    `</body>`


    `</html>`


    The main requirement for using the WinJS controls on the page is to include the
    JavaScript and the CSS files. You should add the following references in the head
    section of your HTML page.


    `<link href="WinJS/css/ui-light.css" rel="stylesheet" />`


    `<script src="WinJS/js/base.js"></script>`


    `<script src="WinJS/js/ui.js"></script>`


    The WinJS library provides two CSS (Cascading Style Sheets) files: `ui-dark.css`
    and `ui-light.css`. You can switch between the light theme and the dark theme
    for all of your controls by changing to `ui-light.css` and `ui-dark.css`, respectively.


    The `base.js` and `ui.js` files are JavaScript files that need to be referenced
    in the HTML page to use the WinJS controls. The JavaScript source codes for the
    WinJS controls are defined in one of these JavaScript files.


    The WinJS control (in this example, it’s the Rating control) does not get rendered
    until the `WinJS.UI.processAll` method is called. This method is defined in the
    `default.js` file found under the `js` folder of the project. The main functionality
    of the `WinJS.UI.processAll` method is to parse the HTML page, identify the attributes
    with the `data-win-control`, and generate the control accordingly.


    Hence, it is necessary to include the reference to the `default.js` file on the
    page.


    Now, let’s build the universal app and run it on Windows 10 and the Windows Mobile
    emulator.


    Figure [3-1](#A978-1-4842-0719-2_3_Chapter.html#Fig1) demonstrates the appearance
    of the Rating control on a Windows tablet. Figure [3-2](#A978-1-4842-0719-2_3_Chapter.html#Fig2)
    demonstrates the appearance of the Rating control on Windows Mobile.


    ![A978-1-4842-0719-2_3_Fig2_HTML.jpg](A978-1-4842-0719-2_3_Fig2_HTML.jpg)


    Figure 3-2.


    Rating control on Windows Mobile emulator


    ![A978-1-4842-0719-2_3_Fig1_HTML.jpg](A978-1-4842-0719-2_3_Fig1_HTML.jpg)


    Figure 3-1.


    Rating control on Windows 10


    ## 3.2 Setting Options for WinJS Controls


    ### Problem


    You want to set additional options or properties for the WinJS controls on your
    HTML page.


    ### Solution


    Use the `data-win-options` attribute to set additional options or properties for
    the control.'
  trans: "\n### 工作原理\n\n在 WinJS 和通用 Windows 应用中，异步 API 以 promise 的形式呈现。WinJS 中 promise\
    \ 的常见实现之一是 `xhr` 函数，它将 `XMLHttpRequest` 封装在 promise 中。当你提供 URL 和响应类型时，`xhr` 函数会返回一个\
    \ promise，该 promise 通过返回数据来实现，如果失败则返回错误。\n\n在本教程中，你将构建一个简单的应用，它接受 URL 作为输入并尝试连接。结果将基于连接显示成功或失败。\n\
    \n在 Visual Studio 2015 中，启动上一个教程中构建的现有通用 Windows 应用。打开 `default.html` 页面，并在 body\
    \ 部分添加以下 `div` 元素。这会在 `inputurl` 文本框中接受 URL，并在输出 `div` 标签中显示状态。\n\n```html\n<div>\n\
    \    <input id=\"inputurl\"/>\n</div>\n<div id=\"output\">\n</div>\n```\n\n你需要为输入元素添加\
    \ change 事件处理程序，该处理程序应在用户输入文本并按 Enter 键时触发。你可以将其添加到 `default.js` 文件中 `app.onactivated`\
    \ 事件处理程序内的 `WinJS.Utilities.ready` 函数中，如下所示。\n\n```javascript\nWinJS.Utilities.ready(function\
    \ () {\n    var input = document.getElementById(\"inputurl\");\n    input.addEventListener(\"\
    change\", changeEvent);\n}, false);\n```\n\n下一步是添加 `changeEvent` 函数，该函数需要通过传递用户输入的\
    \ URL 来调用 `xhr` 函数；这将相应地更新结果。`xhr` 函数的返回类型是 promise，允许开发者使用 promise 的 `then` 函数来异步更新\
    \ UI。\n\n`then` 函数最多接受三个参数，包括：\n\n*   如果 promise 成功执行且无错误，则执行 `completed` 函数\n\
    *   `error` 函数用于处理错误\n*   `progress` 函数用于显示 promise 的进度\n\n接下来，在 `app.onactivated`\
    \ 事件之后，将 `changeEvent` 添加到 `default.js` 文件中，如下所示。\n\n```javascript\nfunction changeEvent(e)\
    \ {\n    var resultDiv = document.getElementById(\"output\");\n    WinJS.xhr({\
    \ url: e.target.value }).then(function completed(result) {\n        if (result.status\
    \ === 200) {\n            resultDiv.style.backgroundColor = \"Green\";\n     \
    \       resultDiv.innerText = \"Success\";\n        }\n    },\n        function\
    \ error(e) {\n            resultDiv.style.backgroundColor = \"red\";\n       \
    \     resultDiv.innerText = e.statusText;\n        });\n}\n```\n\n此代码包含 promise\
    \ 的 `completed` 和 `error` 函数。它根据结果显示文本“Success”或“Error”，并更改输出 `div` 元素的颜色。\n\n\
    在本地计算机上生成并运行应用，输入 URL，然后按 Enter 键。如果 URL 有效，输出 `div` 标签将变为绿色并显示成功消息。如果出现错误，则会显示错误消息并带有红色背景，如图\
    \ 2-8 所示。\n\n![A978-1-4842-0719-2_2_Fig8_HTML.jpg](img/A978-1-4842-0719-2_2_Fig8_HTML.jpg)\n\
    \n**图 2-8.** 使用 `xhr` 函数演示 promise\n\n你可以通过使用 promise 对象的 `cancel` 方法来停止当前正在执行的异步操作。\n\
    \n```javascript\nxhrPromise.cancel();\n```\n\n请注意，你还可以通过在前一个 `then` 函数返回的 promise\
    \ 上调用 `then` 来链式调用 promise 操作。\n\n# 第 3 章：基本 WinJS 控件\n\n本章概述了 WinJS 库中可用的控件，开发者可以使用这些控件快速构建其\
    \ Windows 应用。它探讨了如何向页面添加 WinJS 控件，以及基本的 WinJS 控件，如 ToggleSwitch、Rating、DatePicker、TimePicker、工具提示、文本控件等。\n\
    \nWinJS 中还有一些高级控件，可用于列出记录、显示菜单或在应用中添加工具栏。（第 4 章涵盖了高级控件，如 ListView、Toolbar 和 AppBar。）\n\
    \n## 3.1 在页面上声明 WinJS 控件\n\n### 问题\n\n你需要在 Windows 应用的页面中添加或声明一个 WinJS 控件。\n\n\
    ### 解决方案\n\n使用 `div` 标签内的 `data-win-control` 属性在页面上添加 WinJS 控件。\n\n### 工作原理\n\n\
    在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。这将创建一个通用应用，可以在运行\
    \ Windows 10 的 Windows 平板电脑和 Windows Mobile 上运行。\n\n在 Visual Studio 解决方案资源管理器中，打开项目中的\
    \ `default.html` 页面。\n\n通过使用 `data-win-control` 属性在页面中声明一个 WinJS 控件。例如，要在页面上声明\
    \ Rating 控件，请添加以下 `div` 标签。\n\n```html\n<div id=\"rating\" data-win-control=\"\
    WinJS.UI.Rating\"></div>\n```\n\n在此代码片段中，`div` 标签充当 WinJS 控件的占位符。`data-win-control`\
    \ 属性用于指示将要呈现的 WinJS 控件。\n\nHTML 页面将如下所示。\n\n```html\n<!DOCTYPE html>\n<html>\n\
    <head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.1</title>\n    <!--\
    \ WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"stylesheet\"\
    \ />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"WinJS/js/ui.js\"\
    ></script>\n    <!-- Recipe3.1 references -->\n    <link href=\"/css/default.css\"\
    \ rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n</head>\n\
    <body class=\"win-type-body\">\n    <div id=\"rating\" data-win-control=\"WinJS.UI.Rating\"\
    ></div>\n</body>\n</html>\n```\n\n在页面上使用 WinJS 控件的主要要求是包含 JavaScript 和 CSS 文件。你应在\
    \ HTML 页面的 head 部分添加以下引用。\n\n```html\n<link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n<script src=\"WinJS/js/base.js\"></script>\n<script src=\"WinJS/js/ui.js\"\
    ></script>\n```\n\nWinJS 库提供了两个 CSS（层叠样式表）文件：`ui-dark.css` 和 `ui-light.css`。你可以分别通过更改为\
    \ `ui-light.css` 和 `ui-dark.css` 来在所有控件之间切换浅色主题和深色主题。\n\n`base.js` 和 `ui.js` 文件是需要引用到\
    \ HTML 页面中才能使用 WinJS 控件的 JavaScript 文件。WinJS 控件的 JavaScript 源代码定义在这些 JavaScript\
    \ 文件之一中。\n\n在调用 `WinJS.UI.processAll` 方法之前，WinJS 控件（在此示例中为 Rating 控件）不会被呈现。此方法定义在项目\
    \ `js` 文件夹下的 `default.js` 文件中。`WinJS.UI.processAll` 方法的主要功能是解析 HTML 页面，识别带有 `data-win-control`\
    \ 的属性，并相应地生成控件。\n\n因此，有必要在页面上包含对 `default.js` 文件的引用。\n\n现在，让我们生成通用应用并在 Windows\
    \ 10 和 Windows Mobile 模拟器上运行它。\n\n图 3-1 展示了 Rating 控件在 Windows 平板电脑上的外观。图 3-2\
    \ 展示了 Rating 控件在 Windows Mobile 上的外观。\n\n![A978-1-4842-0719-2_3_Fig2_HTML.jpg](img/A978-1-4842-0719-2_3_Fig2_HTML.jpg)\n\
    \n**图 3-2.** Windows Mobile 模拟器上的 Rating 控件\n\n![A978-1-4842-0719-2_3_Fig1_HTML.jpg](img/A978-1-4842-0719-2_3_Fig1_HTML.jpg)\n\
    \n**图 3-1.** Windows 10 上的 Rating 控件\n\n## 3.2 设置 WinJS 控件的选项\n\n### 问题\n\n你想为\
    \ HTML 页面上的 WinJS 控件设置附加选项或属性。\n\n### 解决方案\n\n使用 `data-win-options` 属性为控件设置附加选项或属性。\n"
- fmt: "### How It Works\n\nMost `WinJS` controls support the `options` attribute\
    \ to be set. For example, when using the `Rating` control on the page, you might\
    \ want to limit the maximum rating that the user can provide.\n\nYou can specify\
    \ this with the `data-win-options` attribute. For example, the following HTML\
    \ code demonstrates how you can set the `Rating` control’s maximum ratings to\
    \ 4.\n\n```\n<div id=\"rating\" data-win-control=\"WinJS.UI.Rating\"\n     data-win-options=\"\
    {maxRating:4}\">\n</div>\n```\n\n`data-win-options` takes the JavaScript options;\
    \ it is passed with the property names and its value is surrounded by curly braces.\n\
    \nHere, the `maxRating` is a property. Multiple properties, along with their values,\
    \ can be passed as well. For example, if you need to set the `enableClear` property\
    \ along with the `maxRating`, you would set it with the `data-win-options` attribute,\
    \ as follows.\n\n```\n<div id=\"rating\" data-win-control=\"WinJS.UI.Rating\"\n\
    \         data-win-options=\"{maxRating:4,enableClear:false}\">\n    </div>\n\
    ```\n\nFigure [3-3](#A978-1-4842-0719-2_3_Chapter.html#Fig3) demonstrates the\
    \ screen and its display on the Windows Mobile emulator.\n\n![A978-1-4842-0719-2_3_Fig3_HTML.jpg](A978-1-4842-0719-2_3_Fig3_HTML.jpg)\n\
    \n**Figure 3-3.** Rating control with maximum rating of 4\n\nIf the `enableClear`\
    \ property is set to `true`, then the user can slide to the left of the control\
    \ to clear the rating value.\n\n## Adding WinJS Controls from Your JavaScript\
    \ Code\n\n### Problem\n\nYou need to add a `WinJS` control from the JavaScript\
    \ code instead of adding it in the HTML page.\n\n### Solution\n\nYou can create\
    \ a control imperatively; that is, completely use JavaScript to identify the `div`\
    \ element and dynamically generate the control and add it to the page.\n\n###\
    \ How It Works\n\nCreate a new project using the Windows Universal (Blank App)\
    \ template in the Visual Studio 2015 Community. This creates a Windows universal\
    \ app that can be run on Windows tablets or on Windows Mobile running in Windows\
    \ 10.\n\nOpen the project’s `default.html` page from the project in Visual Studio\
    \ Solution Explorer. Add a `div` tag in the body section of the page where you\
    \ want the control to be rendered.\n\n```\n<div id=\"rating\" >\n    </div>\n\
    ```\n\nRight-click the `js` folder within the project in the Solution Explorer.\
    \ Select **Add** ➤ **New JavaScript File** and provide a name for the file. In\
    \ this example, let’s name the file `controldemo.js`. This adds the `controldemo.js`\
    \ file under the `js` folder of the project.\n\nAdd the following code to the\
    \ `controldemo.js` file. This creates a new `Rating` control and adds it to the\
    \ rating `div` tag.\n\n```\n(function () {\n    \"use strict\";\n    function\
    \ AddControl()\n    {\n        var ratingDiv = document.getElementById(\"rating\"\
    );\n        var ratingCtrl = new WinJS.UI.Rating(ratingDiv);\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", AddControl);\n})();\n```\n\nThe preceding code creates a new\
    \ instance of the `WinJS.UI.Rating` JavaScript class. It is created by passing\
    \ the rating `div` element to the constructor of the `Rating` class.\n\nNow you\
    \ need to add a reference to the `controldemo.js` file in the HTML page. Open\
    \ the `default.html` file and add the following code snippet to the head section\
    \ of the page.\n\n```\n<script src=\"/js/controldemo.js\"></script>\n```\n\nThe\
    \ `default.html` page will contain the code, as shown here.\n\n```\n<!DOCTYPE\
    \ html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.3</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe3.3 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    \    <script src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <div id=\"rating\">\n    </div>\n</body>\n</html>\n```\n\nLet’s run the\
    \ application on the Windows Mobile emulator. Figure [3-4](#A978-1-4842-0719-2_3_Chapter.html#Fig4)\
    \ illustrates the output page on Windows Mobile.\n\n![A978-1-4842-0719-2_3_Fig4_HTML.jpg](A978-1-4842-0719-2_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4.** Rating control added from the JavaScript code\n\nThe options\
    \ or properties for the controls can also be set imperatively from the JavaScript\
    \ code. The following shows how you can create an instance of the `Rating` control\
    \ and set the `maxRating` property from the JavaScript code.\n\n```\n(function\
    \ () {\n    \"use strict\";\n    function AddControl()\n    {\n        var ratingDiv\
    \ = document.getElementById(\"rating\");\n        var ratingCtrl = new WinJS.UI.Rating(ratingDiv);\n\
    \        ratingCtrl.maxRating = 4;\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , AddControl);\n})();\n```\n\nThis code snippet shows how to set the `maxRating`\
    \ property without setting it in the constructor. Alternatively, you can also\
    \ set it by passing it to the second parameter, surrounded by curly braces.\n\n\
    Figure [3-5](#A978-1-4842-0719-2_3_Chapter.html#Fig5) demonstrates IntelliSense\
    \ support in Visual Studio when setting `Rating` control properties.\n\n![A978-1-4842-0719-2_3_Fig5_HTML.jpg](A978-1-4842-0719-2_3_Fig5_HTML.jpg)\n\
    \n**Figure 3-5.** IntelliSense support in Visual Studio 2015\n\n`IntelliSense`\
    \ is a great feature in Microsoft Visual Studio that improves developer productivity\
    \ and provides automatic suggestions to developers based on what the user is typing\
    \ in the IDE.\n\n## Getting the WinJS Controls from an HTML Document\n\n### Problem\n\
    \nYou want to get the control from an HTML page and set properties using JavaScript\
    \ code.\n\n### Solution\n\nUse the `winControl` property to get the control from\
    \ the page’s DOM element."
