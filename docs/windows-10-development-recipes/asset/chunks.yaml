- fmt: '### How It Works


    Recipe 17.1 demonstrated using PowerShell to install an app along with the certificate.
    There are instances where you might want to install the certificate and the package
    file separately. You can do that by installing the certificate first and then
    using the `Add-AppDevPackage` PowerShell command.


    The following are the steps that you need to take if you want to install the certificate
    and the package file separately on a Windows desktop.


    Open the folder where the app package was created. Ideally, this folder contains
    the following:


    - `Add-AppDevPackage.resources` folder

    - `Add-AppDevPackage.resources` PowerShell script file

    - `ProjectName_Version_Platform.appx` file

    - `ProjectName_Version_Platform.cer` security or certificate file


    Double-click the certificate file (`.cer`) and then click the **Install Certificate**
    button on the Certificate screen (see Figure 17-5).


    ![A978-1-4842-0719-2_17_Fig5_HTML.jpg](A978-1-4842-0719-2_17_Fig5_HTML.jpg)


    Figure 17-5. Install Certificate screen


    On the **Certificate Import Wizard** screen, select the **Local Machine** option
    under the **Store Location** group, as shown in Figure 17-6. Click **Next**.


    ![A978-1-4842-0719-2_17_Fig6_HTML.jpg](A978-1-4842-0719-2_17_Fig6_HTML.jpg)


    Figure 17-6. Select store location from the Certificate Import Wizard


    In the UAC dialog, click the **OK** button to continue.


    In the next certificate import screen, select the **Place all certificates in
    the following store** radio button and click the **Browse** button (see Figure
    17-7).


    ![A978-1-4842-0719-2_17_Fig7_HTML.jpg](A978-1-4842-0719-2_17_Fig7_HTML.jpg)


    Figure 17-7. Select the certificate store to place the certificate


    In the **Select Certificate Store** pop-up screen, select **Trusted people** and
    click the **OK** button (see Figure 17-8).


    ![A978-1-4842-0719-2_17_Fig8_HTML.jpg](A978-1-4842-0719-2_17_Fig8_HTML.jpg)


    Figure 17-8. Select Certificate Store screen


    Click **Next** in the **Certificate Import Wizard** and then complete the certificate
    by clicking **Finish** (see Figure 17-9).


    ![A978-1-4842-0719-2_17_Fig9_HTML.jpg](A978-1-4842-0719-2_17_Fig9_HTML.jpg)


    Figure 17-9. Completion of the certificate import process


    This installs the certificate to the Windows certificate store on the local machine.
    The next step is to install the app alone using the `add-appxpackage` cmdlet for
    PowerShell, as explained in the following steps.


    Navigate to the `AppPackages` folder and identify the complete path of the package
    file (`.appx`) file that you want to install.


    As shown in Figure 17-10, open Windows PowerShell from the Start menu and run
    the `Add-appxpackage` command by specifying the following parameters.


    `Add-appxpackage –Path <Path to appx file>`


    ![A978-1-4842-0719-2_17_Fig10_HTML.jpg](A978-1-4842-0719-2_17_Fig10_HTML.jpg)


    Figure 17-10. `Add-appxpackage` command in PowerShell to install the app


    Once you enter the command, press the **Enter** key. This installs the app on
    your Windows 10 machine.


    You can now start the app from the Start menu.


    ---


    ## 17.3 Validate Your Windows App Using the Windows App Certification Kit


    ### Problem


    You want to validate your Universal Windows Platform app by interactively using
    the Windows App Certification Kit.


    ### Solution


    Launch the Windows App Certification Kit from the Windows Start menu and specify
    the app that you want to validate and test.


    ### How It Works


    It is always better to validate and test your app locally before you submit it
    to the Store for certification. This provides more information to the developers
    in case the package has any issues.


    The Windows App Certification Kit is a great tool that helps the developers validate
    and test your app locally. The Windows App Certification Kit is included in the
    Windows Software Development Kit (SDK) for Windows 10.


    The following steps validate and test a Windows app using the Windows App Certification
    Kit.


    From the Windows Start menu, search for **Windows app cert kit** and then click
    the **Windows App Cert Kit** desktop app (see Figure 17-11).


    ![A978-1-4842-0719-2_17_Fig11_HTML.jpg](A978-1-4842-0719-2_17_Fig11_HTML.jpg)


    Figure 17-11. Windows App Certification Kit in the Start menu


    In the Windows App Certification Kit, select the validation category that you
    want to perform. For example, if you are validating a Windows app, select **Validate
    Store App** (see Figure 17-12).


    ![A978-1-4842-0719-2_17_Fig12_HTML.jpg](A978-1-4842-0719-2_17_Fig12_HTML.jpg)


    Figure 17-12. Selection of the type of app to perform validation


    Once you select the **Store App** option, you are provided with options to either
    select an app that is already installed on the machine or choose the package file
    that you want to validate. You can enable the **Browse for app you want to validate**
    radio button and click the **Browse** button to select the package file (see Figure
    17-13).


    ![A978-1-4842-0719-2_17_Fig13_HTML.jpg](A978-1-4842-0719-2_17_Fig13_HTML.jpg)


    Figure 17-13. Selection of the app to validate and test


    Once you have selected the app or the package file, click **Next** to continue.
    The subsequent screens display the tests workflows that are applicable for the
    app that you are testing (see Figure 17-14). If a test is not applicable to your
    app type, it is grayed out.


    ![A978-1-4842-0719-2_17_Fig14_HTML.jpg](A978-1-4842-0719-2_17_Fig14_HTML.jpg)


    Figure 17-14. Types of tests applicable for the app


    Click **Next**. The Windows App Certification Kit begins validating the app, as
    shown in Figure 17-15.


    ![A978-1-4842-0719-2_17_Fig15_HTML.jpg](A978-1-4842-0719-2_17_Fig15_HTML.jpg)


    Figure 17-15. Windows App Certification Kit validating the app


    Once the validation is complete, you are prompted to save the report in the XML
    file format, which displays the results, as shown in Figure 17-16. The Windows
    App Certification Kit creates an HTML file along with an XML report and saves
    them in a specified folder.


    ![A978-1-4842-0719-2_17_Fig16_HTML.jpg](A978-1-4842-0719-2_17_Fig16_HTML.jpg)


    Figure 17-16. Test results from the Windows App Certification Kit


    ---


    ## 17.4 Validate an App Package on a Remote Windows 10 Device


    ### Problem


    You need to validate your app package in a remote Windows 10 machine and test
    it.


    ### Solution


    Install the remote tools for Visual Studio and the Windows App Certification Kit
    on a remote machine and use the **Remote Machine** option to validate the package
    on the remote machine.'
