  trans: "\n### 工作原理\n\n在 Microsoft Visual Studio 2015 中使用 Windows 通用（空白应用）模板创建一个新项目。\n\
    \n在项目中添加一个新的语音命令定义文件 `CortanaVoiceCommands.xml`，并向文件中添加以下 XML 代码：\n\n```\n<?xml\
    \ version=\"1.0\" encoding=\"utf-8\" ?>\n<VoiceCommands xmlns=\"http://schemas.microsoft.com/voicecommands/1.2\"\
    >\n  <CommandSet xml:lang=\"en-gb\" Name=\"CortanaVoiceCommandSet\">\n    <AppName>Win10Recipes</AppName>\n\
    \    <Example> Show Win10 Recipes </Example>\n    <Command Name=\"showDevicesAvailableRecipes\"\
    >\n      <Example>Show</Example>\n      <ListenFor RequireAppName=\"BeforeOrAfterPhrase\"\
    >{command}</ListenFor>\n      <ListenFor RequireAppName=\"ExplicitlySpecified\"\
    >Listening to command </ListenFor>\n      <Feedback> Recipes available in App\
    \ </Feedback>\n      <Navigate/>\n    </Command>\n    <PhraseList Label=\"command\"\
    >\n      <Item>Devices</Item>\n      <Item>Text to Speech</Item>\n    </PhraseList>\n\
    \  </CommandSet>\n</VoiceCommands>\n```\n\n在此语音命令定义文件中，有几个主要元素。`<CommandSet>`\
    \ 元素定义了用于激活应用和执行命令的命令。`<CommandSet>` 元素还具有 `xml:Lang` 属性，用于指定命令语言。在本示例中，我们使用的是英式英语。\n\
    \n`<CommandPrefix>` 是我们应用的唯一名称。它在语音命令中作为前缀或后缀，用于激活应用。`<Command>` 元素用于指定用户可以说的命令内容。`<ListenFor>`\
    \ 元素指定了 Cortana 应识别的文本。`<Feedback>` 元素指定了 Cortana 在启动应用时所说的文本。`<Navigate>` 元素表示语音命令用于在前台启动应用。\n\
    \n如果想通过语音命令在后台启动应用，请使用 `<VoiceCommandService>`。\n\n创建 VCD 文件后，需要安装该文件指定的命令。为此，请使用\
    \ `installCommandDefinitionsFromStorageFileAsync` 方法。\n\n从解决方案资源管理器中打开 `default.js`。在该文件中调用\
    \ `onactivated` 方法，并添加以下代码：\n\n```\n//加载 vcd\nvar storageFile = Windows.Storage.StorageFile;\n\
    var wap = Windows.ApplicationModel.Package;\nvar voiceCommandManager = Windows.ApplicationModel.VoiceCommands.VoiceCommandDefinitionManager;\n\
    \nwap.current.installedLocation.getFileAsync(\"CortanaVoiceCommands.xml\")\n \
    \ .then(function (file) {\n    voiceCommandManager.installCommandDefinitionsFromStorageFileAsync(file);\n\
    \  });\n\nvar activationKind = args.detail.kind;\nvar activatedEventArgs = args.detail.detail;\n\
    ```\n\n在上面的代码中，我们通过 `Windows.ApplicationModel.Package.current.installedLocation.getFileAsync`\
    \ 方法获取对 VCD 文件的引用。然后调用 `installCommandDefinitionsFromStorageFileAsync` 方法来安装文件中指定的命令。现在，我们需要指定应用如何响应与\
    \ VCD 文件匹配的语音命令。为此，首先要检查 `IActivatedEventArgs.Kind` 是否为 `VoiceCommand`。在 `default.js`\
    \ 的标准代码之后替换以下代码，以检查激活参数类型：\n\n```\nif (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n  if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n    // TODO: 此应用是刚刚启动的。请在此处初始化您的应用。\n  } else {\n    // TODO: 此应用之前被挂起，然后被终止。\n\
    \    // 为了创建流畅的用户体验，请在此处恢复应用状态，使其看起来从未停止运行。\n  }\n  args.setPromise(WinJS.UI.processAll());\n\
    }\nelse if (activationKind == Windows.ApplicationModel.Activation.ActivationKind.voiceCommand)\n\
    {\n  var speechRecognitionResult = activatedEventArgs[0].Result;\n  // 获取语音命令的名称和所说的文本\n\
    \  var voiceCommandName = speechRecognitionResult.RulePath[0];\n  switch(voiceCommandName)\n\
    \  {\n    case \"showDevicesAvailableRecipes\":\n      var textSpoken = speechRecognitionResult.semanticInterpretation.properties[0];\n\
    \      var url = \"Devices.html\";\n      nav.history.backStack.push({ location:\
    \ \"/Devices.html\" })\n      break;\n    default:\n      break;\n  }\n};\n\n\
    app.oncheckpoint = function (args) {\n  // TODO: 此应用即将被挂起。请在此处保存任何需要在挂起期间持久化的状态。\n\
    \  // 您可以使用 WinJS.Application.sessionState 对象，该对象会在挂起期间自动保存和恢复。\n  // 如果在应用挂起前需要完成异步操作，请调用\
    \ args.setPromise()。\n};\n\napp.start();\n```\n\n前面的代码检查了 `Windows.ApplicationModel.Activation.ActivationKind`\
    \ 的值，该值指定了激活的类型。检查 `ActivationKind` 是 `voiceCommand` 还是其他方式。如果应用是通过语音命令启动的，则需要将用户所说的内容获取到\
    \ `speechRecognitionResult` 变量中；要获取该字符串，请使用 `activatedEventArgs`。\n\n`activatedEventArgs`\
    \ 有一个名为 `Result` 的属性，它提供了 `SpeechRecognitionResult`。\n\n要获取用户所说的文本，请使用 `speechRecognitionResult.RulePath[0]`\
    \ 并将其存储在 `voiceCommandName` 局部变量中。\n\n使用这个文本 (`voiceCommandName`)，可以决定需要显示应用的哪个页面。为此，使用\
    \ switch case 匹配 `voiceCommandName` 的值与 VCD 文件中指定的命令名称。在 `CortanaVoiceCommands.xml`\
    \ 中，指定了命令名称 `showDevicesAvailableRecipes`。如果匹配成功，则在 `Devices.html` 中向用户显示应用页面。这样，应用就与\
    \ Cortana 集成了。当用户使用语音命令启动应用时，可以进一步增强功能，以启动应用内的各个页面。\n\n> **注意**  \n> 您无法使用 Visual\
    \ Studio Mobile 模拟器测试此方案，因为 Cortana 需要 Microsoft 帐户注册和登录过程，这在 Mobile 模拟器上无法工作。相反，您需要将应用安装到设备上，然后运行\
    \ Cortana 来测试应用在前台启动的情况。\n\n## 第 15 章：其他工具\n\nWindows SDK 和 Microsoft Visual Studio\
    \ 2015 提供了其他工具和功能，让开发人员能够轻松调试和测试其 Windows 应用。本章涵盖其中一些工具，例如 JavaScript 控制台窗口、DOM\
    \ 资源管理器、诊断工具、Windows 10 Mobile 模拟器其他工具。这些工具在测试应用在各种场景下的表现时，极大地方便了开发人员的工作。\n\n\
    ### 16.1 JavaScript 控制台窗口\n\n#### 问题\n\n在调试通用 Windows 平台应用时，您希望查看 JavaScript 错误或写入调试消息。\n\
    \n#### 解决方案\n\n在 Visual Studio 2015 中使用 JavaScript 控制台窗口，在调试通用 Windows 平台应用时查看\
    \ JavaScript 错误或写入调试消息。\n"
- fmt: '### How It Works


    `Microsoft Visual Studio 2015` provides a tool called the `JavaScript Console`
    window that allows developers to do the following:


    - Display and modify the value of variables.

    - Run JavaScript code that can execute within the current context.

    - View JavaScript errors, exceptions, and messages.

    - Display the messages from the app to the console window.


    The `JavaScript Console` window is displayed when your app runs. Alternatively,
    you can open the `JavaScript Console` window from `Visual Studio Menu Debug ➤
    Windows ➤ JavaScript Console`, as shown in Figure [16-1](#A978-1-4842-0719-2_16_Chapter.html#Fig1).


    ![A978-1-4842-0719-2_16_Fig1_HTML.jpg](A978-1-4842-0719-2_16_Fig1_HTML.jpg)


    Figure 16-1. Access `JavaScript Console` from `Visual Studio 2015`


    To test this functionality, create a new Universal Windows Platform app from `Visual
    Studio 2015` using the JavaScript template.


    Build the solution and run it using the `Local Machine` option. You should see
    the app running on the desktop. Switch to `Visual Studio` with your app still
    running. Notice the JavaScript console lists all possible JavaScript errors in
    the page, as shown in Figure [16-2](#A978-1-4842-0719-2_16_Chapter.html#Fig2).


    ![A978-1-4842-0719-2_16_Fig2_HTML.jpg](A978-1-4842-0719-2_16_Fig2_HTML.jpg)


    Figure 16-2. `JavaScript Console` window displaying list of warnings and errors


    The JavaScript console provides the following options:


    - View error messages

    - View warning messages

    - View messages

    - Options to clear the console


    Developers can also write debug messages that can be displayed when the app runs
    in debug mode from `Visual Studio 2015`. This is achieved by using the `console.log`
    method.


    Let’s open the `default.js` file from the project’s `js` folder and add the following
    code to the first line of the file, just below the `use strict` option.


    ```

    console.log("This is a custom log message");

    ```


    When you run the app and view the `JavaScript Console` window, you see the message
    in it, as shown in Figure [16-3](#A978-1-4842-0719-2_16_Chapter.html#Fig3).


    ![A978-1-4842-0719-2_16_Fig3_HTML.jpg](A978-1-4842-0719-2_16_Fig3_HTML.jpg)


    Figure 16-3. `JavaScript Console` window displaying the log message


    Table [16-1](#A978-1-4842-0719-2_16_Chapter.html#Tab1) lists some of the common
    commands to manipulate messages in the console window.


    Table 16-1. `JavaScript Console` Window Commands


    | Command Name | Description |

    | --- | --- |

    | `assert(expression, message)` | Sends a message if `expression` evaluates to
    `false`. |

    | `clear()` | Clears the messages from the console window. |

    | `debug(message)` | Sends a message to the console window; it is identical to
    `console.log`. |

    | `error(message)` | Sends an error message to the console window. The message
    text is red and includes an error symbol. |

    | `info(message)` | Sends a message to the console window; the message is prefaced
    with an information symbol. |

    | `log(message)` | Sends a message to the console window. |


    ## 16.2 DOM Explorer


    ### Problem


    You need to inspect the properties of the app’s HTML element, as well as debug
    and modify the HTML and CSS-style element properties.


    ### Solution


    Use `DOM Explorer` in `Visual Studio 2015` to inspect and modify the values of
    the HTML and CSS elements for debugging purposes.


    ### How It Works


    Web developers and Internet Explorer users should be aware of `DOM Explorer`,
    which is a popular debugging tool. The `F12 Developer` tools in `Microsoft Edge`
    and `Internet Explorer` provide this option.


    Since the UWP app supports development with web technologies, `DOM Explorer` is
    supported by UWP apps and apps created using `Visual Studio` tools for Apache
    Cordova.


    Developers can access `DOM Explorer` in Windows using the `Visual Studio Menu
    Debug ➤ Windows ➤ DOM Explorer`, as shown in Figure [16-4](#A978-1-4842-0719-2_16_Chapter.html#Fig4).


    ![A978-1-4842-0719-2_16_Fig4_HTML.jpg](A978-1-4842-0719-2_16_Fig4_HTML.jpg)


    Figure 16-4. Access `DOM Explorer` from `Visual Studio 2015`


    You can do the following using `DOM Explorer` in `Visual Studio`:


    - Inspect the live DOM

    - Select the elements

    - Debug CSS styles

    - Debug the layout

    - View DOM event listeners

    - Debug a `WebView` control


    Open an existing UWP app developed with JavaScript and run it in the `Local Machine`
    option.


    Switch to `Visual Studio` and select the `DOM Explorer` tab. You can use the `F4`
    shortcut key when the app is running to display `DOM Explorer` in `F12` developer
    tools, as shown in Figure [16-5](#A978-1-4842-0719-2_16_Chapter.html#Fig5).


    ![A978-1-4842-0719-2_16_Fig5_HTML.jpg](A978-1-4842-0719-2_16_Fig5_HTML.jpg)


    Figure 16-5. `DOM Explorer`


    In the `DOM Explorer` window, select the paragraph element under the `body` tag.
    Double-click the text to modify the message. You should see the text updating
    live on your UWP app as well.


    The `Styles` tab in `DOM Explorer` lets developers modify the values of style
    elements and see how it is rendered on the app page.


    The `Computed` tab shows the final value for each property of the selected DOM
    element (see Figure [16-6](#A978-1-4842-0719-2_16_Chapter.html#Fig6)).


    ![A978-1-4842-0719-2_16_Fig6_HTML.jpg](A978-1-4842-0719-2_16_Fig6_HTML.jpg)


    Figure 16-6. `Computed` tab in `DOM Explorer`


    The `Layout` tab displays the element’s box model and shows what your app’s layout
    looks like, considering the offset and margin (see Figure [16-7](#A978-1-4842-0719-2_16_Chapter.html#Fig7)).


    ![A978-1-4842-0719-2_16_Fig7_HTML.jpg](A978-1-4842-0719-2_16_Fig7_HTML.jpg)


    Figure 16-7. `Layout` tab in `DOM Explorer`


    You can also refresh your app while debugging. To do this, follow these steps.


    ![A978-1-4842-0719-2_16_Fig8_HTML.jpg](A978-1-4842-0719-2_16_Fig8_HTML.jpg)


    Figure 16-8. Refresh Windows app button in `Visual Studio`


    When the app is running in an emulator, open the `default.html` file in `Visual
    Studio` and modify the source code.


    Click the `Refresh Windows app` button in the `Debug` toolbar or hit the `F4`
    shortcut key (see Figure [16-8](#A978-1-4842-0719-2_16_Chapter.html#Fig8)).


    The app pages reload with the new changes seen on the emulator.


    ## 16.3 Diagnostic Tools


    ### Problem


    You want to analyze the performance of your Windows app to identify the potential
    bottlenecks. You want to analyze the CPU usage, UI responsiveness, and so forth.


    ### Solution


    Use the `Diagnostic Tools` in `Visual Studio 2015` to perform and analyze various
    factors, such as CPU usage, GPU usage, HTML UI responsiveness, JavaScript memory,
    and the network.'
