        `{`


            `var ratingDiv = document.getElementById("rating");`


            `var ratingCtrl = new WinJS.UI.Rating(ratingDiv);`


            `ratingCtrl.maxRating = 4;`


        `}`


        `document.addEventListener("DOMContentLoaded", AddControl);`


    `})();`


    This code snippet shows how to set the `maxRating` property without setting it
    in the constructor. Alternatively, you can also set it by passing it to the second
    parameter, surrounded by curly braces.


    Figure [3-5](#A978-1-4842-0719-2_3_Chapter.html#Fig5) demonstrates IntelliSense
    support in Visual Studio when setting Rating control properties.


    ![A978-1-4842-0719-2_3_Fig5_HTML.jpg](A978-1-4842-0719-2_3_Fig5_HTML.jpg)


    Figure 3-5.


    IntelliSense support in Visual Studio 2015


    Intellisense is a great feature in Microsoft Visual Studio that improves developer
    productivity and provides automatic suggestions to developers based on what the
    user is typing in the IDE.


    ## 3.4 Getting the WinJS Controls from an HTML Document


    ### Problem


    You want to get the control from an HTML page and set properties using JavaScript
    code.


    ### Solution


    Use the `winControl` property to get the control from the page’s `DOM` element.'
  trans: "\n### 工作原理\n\n大多数 `WinJS` 控件都支持通过 `options` 属性进行设置。例如，在页面上使用 `Rating` 控件时，你可能希望限制用户能够提供的最高评分。\n\
    \n你可以通过 `data-win-options` 属性来指定这一点。例如，以下 HTML 代码演示了如何将 `Rating` 控件的最高评分设置为 4。\n\
    \n```\n<div id=\"rating\" data-win-control=\"WinJS.UI.Rating\"\n     data-win-options=\"\
    {maxRating:4}\">\n</div>\n```\n\n`data-win-options` 接受 JavaScript 格式的选项；传入时需包含属性名称，其值用花括号括起来。\n\
    \n这里的 `maxRating` 是一个属性。也可以同时传入多个属性及其值。例如，如果你需要与 `maxRating` 一起设置 `enableClear`\
    \ 属性，你可以像下面这样通过 `data-win-options` 属性来设置。\n\n```\n<div id=\"rating\" data-win-control=\"\
    WinJS.UI.Rating\"\n         data-win-options=\"{maxRating:4,enableClear:false}\"\
    >\n    </div>\n```\n\n图 3-3 展示了在 Windows Mobile 模拟器上的界面及显示效果。\n\n![A978-1-4842-0719-2_3_Fig3_HTML.jpg](img/A978-1-4842-0719-2_3_Fig3_HTML.jpg)\n\
    \n**图 3-3.** 最高评分为 4 的评分控件\n\n如果 `enableClear` 属性设置为 `true`，那么用户可以向左滑动控件来清除评分值。\n\
    \n## 通过 JavaScript 代码添加 WinJS 控件\n\n### 问题\n\n你需要从 JavaScript 代码中添加一个 `WinJS`\
    \ 控件，而不是在 HTML 页面中添加。\n\n### 解决方案\n\n你可以通过命令式地创建控件；即完全使用 JavaScript 来识别 `div`\
    \ 元素，动态生成控件并将其添加到页面中。\n\n### 工作原理\n\n在 Visual Studio 2015 Community 中使用 Windows\
    \ Universal (Blank App) 模板创建一个新项目。这会创建一个可以在 Windows 平板电脑或运行 Windows 10 的 Windows\
    \ Mobile 上运行的 Windows 通用应用。\n\n在 Visual Studio 解决方案资源管理器中打开项目的 `default.html`\
    \ 页面。在页面主体部分添加一个 `div` 标签，用于呈现控件。\n\n```\n<div id=\"rating\" >\n    </div>\n```\n\
    \n在解决方案资源管理器中，右键单击项目中的 `js` 文件夹。选择 **添加** ➤ **新建 JavaScript 文件** 并为文件命名。在本例中，我们将文件命名为\
    \ `controldemo.js`。这会将 `controldemo.js` 文件添加到项目的 `js` 文件夹下。\n\n将以下代码添加到 `controldemo.js`\
    \ 文件中。这段代码创建了一个新的 `Rating` 控件，并将其添加到评分 `div` 标签中。\n\n```\n(function () {\n   \
    \ \"use strict\";\n    function AddControl()\n    {\n        var ratingDiv = document.getElementById(\"\
    rating\");\n        var ratingCtrl = new WinJS.UI.Rating(ratingDiv);\n    }\n\
    \    document.addEventListener(\"DOMContentLoaded\", AddControl);\n})();\n```\n\
    \n上面的代码创建了一个 `WinJS.UI.Rating` JavaScript 类的新实例。它是通过将评分 `div` 元素传递给 `Rating` 类的构造函数来创建的。\n\
    \n现在，你需要在 HTML 页面中添加对 `controldemo.js` 文件的引用。打开 `default.html` 文件，将以下代码片段添加到页面的头部区域。\n\
    \n```\n<script src=\"/js/controldemo.js\"></script>\n```\n\n`default.html` 页面将包含如下所示的代码。\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.3</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe3.3 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    \    <script src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <div id=\"rating\">\n    </div>\n</body>\n</html>\n```\n\n让我们在 Windows\
    \ Mobile 模拟器上运行应用程序。图 3-4 展示了在 Windows Mobile 上的输出页面。\n\n![A978-1-4842-0719-2_3_Fig4_HTML.jpg](img/A978-1-4842-0719-2_3_Fig4_HTML.jpg)\n\
    \n**图 3-4.** 通过 JavaScript 代码添加的评分控件\n\n控件的选项或属性也可以通过 JavaScript 代码以命令式的方式进行设置。以下展示了如何创建一个\
    \ `Rating` 控件的实例，并通过 JavaScript 代码设置 `maxRating` 属性。\n\n```\n(function () {\n\
    \    \"use strict\";\n    function AddControl()\n    {\n        var ratingDiv\
    \ = document.getElementById(\"rating\");\n        var ratingCtrl = new WinJS.UI.Rating(ratingDiv);\n\
    \        ratingCtrl.maxRating = 4;\n    }\n    document.addEventListener(\"DOMContentLoaded\"\
    , AddControl);\n})();\n```\n\n这段代码片段展示了如何在构造函数之外设置 `maxRating` 属性。或者，你也可以通过将其作为第二个参数传入并用花括号括起来来设置它。\n\
    \n图 3-5 演示了在设置 `Rating` 控件属性时，Visual Studio 中的 IntelliSense 支持。\n\n![A978-1-4842-0719-2_3_Fig5_HTML.jpg](img/A978-1-4842-0719-2_3_Fig5_HTML.jpg)\n\
    \n**图 3-5.** Visual Studio 2015 中的 IntelliSense 支持\n\n`IntelliSense` 是 Microsoft\
    \ Visual Studio 中一项出色的功能，它能提高开发人员的工作效率，并根据用户在 IDE 中的输入自动提供建议。\n\n## 从 HTML 文档中获取\
    \ WinJS 控件\n\n### 问题\n\n你想要从 HTML 页面获取控件，并使用 JavaScript 代码设置属性。\n\n### 解决方案\n\n\
    使用 `winControl` 属性从页面的 DOM 元素中获取控件。"
- fmt: "### How It Works\n\nCreate a new project using the Windows Universal (Blank\
    \ App) template in Visual Studio 2015 Community. This creates a Windows universal\
    \ app that can be run on Windows tablets and Windows Mobile running Windows 10.\
    \ Open the `default.html` page from the project in Visual Studio Solution Explorer.\n\
    \nAdd the Rating control to the body section of the page.\n\n```\n<div id=\"rating\"\
    \ data-win-control=\"WinJS.UI.Rating\" >\n</div>\n```\n\nRight-click on the `js`\
    \ folder within the project in the Solution Explorer. Select Add ➤ New JavaScript\
    \ File and provide a name for the file. In this example, let’s name the file `controldemo.js`.\
    \ This adds the `controldemo.js` file under the `js` folder of the project.\n\n\
    Add the following code to the `controldemo.js` file.\n\n```\n(function () {\n\
    \    \"use strict\";\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var ratingControl = document.getElementById(\"rating\").winControl;\n\
    \            ratingControl.userRating = 2;\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\nWhen you invoke the `document.getElementById`\
    \ method, you get the `DOM` element. You need to use the `winControl` property\
    \ to get the associated control.\n\nThis needs to be surrounded by the `WinJS.UI.processAll`\
    \ method, which returns the promise. The reason for surrounding your logic with\
    \ the `processAll` method is that you have to wait until all the controls are\
    \ created and parsed in the document before trying to retrieve it.\n\nOnce the\
    \ Rating control is retrieved, you can start setting the values to the properties\
    \ of the Rating control instance. In this example, you are setting the user rating\
    \ to 2.\n\nFinally, you need to add the reference of the `controldemo.js` file\
    \ in the `default.html` page. Open the `default.html` page from Visual Studio\
    \ Solution Explorer and add the following code to the head tag.\n\n```\n<script\
    \ src=\"/js/controldemo.js\"></script>\n```\n\nWhen you run the application on\
    \ the Windows Mobile emulator, you should see the screen shown in Figure 3-6.\n\
    \n![A978-1-4842-0719-2_3_Fig6_HTML.jpg](A978-1-4842-0719-2_3_Fig6_HTML.jpg)\n\n\
    **Figure 3-6.** Windows Mobile emulator displaying the Rating control with value\
    \ 2\n\n## 3.5 The ToggleSwitch Control\n\n### Problem\n\nYou need to provide an\
    \ option for the user to perform a binary operation on the screen. For example,\
    \ you need to provide the user with an option to turn a service on or off.\n\n\
    ### Solution\n\nUse the ToggleSwitch control in WinJS. It is similar to the standard\
    \ check box control, but has better touch support. You can simply swipe a finger\
    \ across the ToggleSwitch control to check or uncheck the option. You can declare\
    \ the ToggleSwitch control on the page using the `WinJS.UI.ToggleSwitch` value\
    \ to the `data-win-control` attribute of the `div` element.\n\n### How It Works\n\
    \nThe following shows how you declare the ToggleSwitch control on a page.\n\n\
    ```\n<div id=\"locationServices\" data-win-control=\"WinJS.UI.ToggleSwitch\"\n\
    \         data-win-options=\"{\n         title :'Location Services',\n       \
    \  labelOff: 'Disabled',\n         labelOn:'Enabled',\n         checked: true\n\
    \         }\">\n</div>\n```\n\nWhen executed on a Windows tablet or a Windows\
    \ Mobile emulator, the preceding code snippet will look like what’s shown in Figure\
    \ 3-7.\n\n![A978-1-4842-0719-2_3_Fig7_HTML.jpg](A978-1-4842-0719-2_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7.** ToggleSwitch on the Windows Mobile and Windows emulator\n\n\
    The `data-win-options` attribute is used to set the additional attributes to the\
    \ ToggleSwitch control. In the preceding example, properties like `title`, `labelOff`,\
    \ `labelOn`, and `checked` are set using this attribute.\n\nThe `title` sets the\
    \ title content for the ToggleSwitch. The `labelOff` and `labelOn` properties\
    \ identify the text that needs to be displayed next to the ToggleSwitch based\
    \ on the checked (On) and unchecked (Off) state of the control.\n\nThe current\
    \ state (checked or unchecked) of the ToggleSwitch can be found using the control’s\
    \ `checked` property.\n\nLet’s add a new JavaScript file to the project’s `js`\
    \ folder and name it `controldemo.js`. Open the `default.html` page and add the\
    \ ToggleSwitch control as well as an empty `div` tag to display a message on a\
    \ change of the toggle switch state.\n\nThe `default.html` looks like the following.\n\
    \n```\n<!DOCTYPE html>\n<html>\n<head>\n    <meta charset=\"utf-8\" />\n    <title>Recipe3.5</title>\n\
    \    <!-- WinJS references -->\n    <link href=\"WinJS/css/ui-light.css\" rel=\"\
    stylesheet\" />\n    <script src=\"WinJS/js/base.js\"></script>\n    <script src=\"\
    WinJS/js/ui.js\"></script>\n    <!-- Recipe3.5 references -->\n    <link href=\"\
    /css/default.css\" rel=\"stylesheet\" />\n    <script src=\"/js/default.js\"></script>\n\
    \    <script src=\"/js/controldemo.js\"></script>\n</head>\n<body class=\"win-type-body\"\
    >\n    <div id=\"locationServices\" data-win-control=\"WinJS.UI.ToggleSwitch\"\
    \n         data-win-options=\"{\n         title :'Location Services',\n      \
    \   labelOff: 'Disabled',\n         labelOn:'Enabled',\n         checked: true\n\
    \         }\">\n    </div>\n    <div id=\"info\"></div>\n</body>\n</html>\n```\n\
    \nTo identify the state from the JavaScript code, you need to wire up the `change`\
    \ event handler of the ToggleSwitch control. This event is triggered when you\
    \ change the state of the control.\n\nOpen the `controldemo.js` file and replace\
    \ it with the following code.\n\n```\n(function () {\n    \"use strict\";\n  \
    \  function GetControl() {\n        WinJS.UI.processAll().done(function () {\n\
    \            var toggleButton = document.getElementById(\"locationServices\").winControl;\n\
    \            var InfoElement = document.getElementById(\"info\");\n          \
    \  toggleButton.addEventListener('change', function (args) {\n               \
    \ if (toggleButton.checked) {\n                    InfoElement.innerHTML = \"\
    Location Services enabled\";\n                }\n                else {\n    \
    \                InfoElement.innerHTML = \"Location Services disabled\";\n   \
    \             }\n            })\n        });\n    }\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\nWhen you run the application on\
    \ the Windows 10 emulator and the Windows Mobile emulator, you will see the screen\
    \ as shown in Figure 3-8.\n\n![A978-1-4842-0719-2_3_Fig8_HTML.jpg](A978-1-4842-0719-2_3_Fig8_HTML.jpg)\n\
    \n**Figure 3-8.** ToggleSwitch with the change event.\n\nWhen you toggle the control,\
    \ the appropriate message is displayed in the `info` `div` element.\n\n## 3.6\
    \ The DatePicker Control\n\n### Problem\n\nYou want to allow the user to select\
    \ a date from the application page.\n\n### Solution\n\nUse the WinJS DatePicker\
    \ control that allows the user to pick a date. This control displays three lists:\
    \ one each for the month, day, and year."
