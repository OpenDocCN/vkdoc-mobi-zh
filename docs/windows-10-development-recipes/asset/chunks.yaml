    # Chapter 11: Background Tasks


    In any application, you may have to silently perform certain tasks in the background.
    The Universal Windows Platform provides a Background Tasks feature that lets you
    run code in the background. A background task is nothing but a JavaScript file
    that the OS runs in the background. A background task is usually run against a
    system trigger that you can subscribe to. A background task needs to be declared
    in the application task. Background tasks can report progress, completion, and
    cancellation to apps through certain events.


    ## 11.1 System Event Triggers for Background Tasks


    ### Problem


    You have decided to implement a background task in your application. You would
    like to know the various system event triggers that you can subscribe to and run
    a background task when that trigger occurs.'
  trans: "\n# 工作原理\n\n共享合约还允许开发者构建应用来共享自定义格式的数据，例如用于书籍（书名、出版商、作者姓名等）或人物（包含姓名、职位、头像等属性）的数据格式。\n\
    \n在 Windows 10 通用 Windows 应用中支持的自定义格式，可以基于 [`http://schema.org`](http://schema.org)\
    \ 定义的架构，例如 [`http://schema.org/person`](http://schema.org/person) 或 [`http://schema.org/Book`](http://schema.org/Book)。`setData`\
    \ 方法接受两个参数，如下所示：\n\n`request.data.setData(\"http://schema.org/Person\", person);`\n\
    \n第一个参数是架构格式 ID，第二个参数是对象本身。\n\n接下来，让我们在一个通用 Windows 应用中实现共享自定义数据。\n\n使用 Microsoft\
    \ Visual Studio 2015 中的 Windows 通用（空白应用）模板创建一个新项目。\n\n首先，在 `default.html` 中添加以下代码。你需要用以下代码替换\
    \ `body` 标签：\n\n```html\n<body class=\"win-type-body\" style=\"background-color:white\"\
    >\n    <div>\n        <p style=\"color:black\">输入人物姓名：</p>\n        <input class=\"\
    text-box\" id=\"txttitle\" value=\"姓名\" size=\"40\" />\n        <p style=\"color:black\"\
    >输入人物职位：</p>\n        <input class=\"text-box\" id=\"txtjobtitle\" value=\"职位\"\
    \ size=\"40\" />\n        <p style=\"color:black\">输入电话号码：</p>\n        <input\
    \ class=\"text-box\" id=\"txtphone\" value=\"电话\" size=\"40\" />\n        <br\
    \ />\n        <br />\n    </div>\n</body>\n```\n\n现在，在解决方案资源管理器中右键单击项目，然后选择 **添加\
    \ > 新建 JavaScript 文件**。为文件提供名称。在此示例中，让我们将文件命名为 `DataSharingDemo.js`。\n\n```javascript\n\
    (function () {\n    \"use strict\";\n\n    function GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var dataTransferManager = Windows.ApplicationModel.DataTransfer.DataTransferManager.getForCurrentView();\n\
    \            dataTransferManager.addEventListener(\"datarequested\", shareDataHandler);\n\
    \        });\n    }\n\n    document.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    })();\n```\n\n通过复制以下代码来实现 `shareDataHandler` 函数：\n\n```javascript\nfunction shareDataHandler(e)\
    \ {\n    var request = e.request;\n    \n    // request.data.properties.title\
    \ 是必需的\n    var name = document.getElementById(\"txttitle\").value;\n    var person\
    \ = {\n        \"type\": \"http://schema.org/Person\",\n        \"properties\"\
    :\n        {\n            \"name\": name,\n            \"jobtitle\": document.getElementById(\"\
    txtjobtitle\").value\n        }\n    };\n    person = JSON.stringify(person);\n\
    \    request.data.properties.title = name;\n    request.data.properties.description\
    \ = name;\n    request.data.setData(\"http://schema.org/Person\", person);\n}\n\
    ```\n\n前面函数中的代码实现了自定义数据的共享。`person` 对象被定义为一个 JSON 字符串，用于设置姓名和职位等属性，因为 `schema.org`\
    \ 同时支持 JSON 和 XML 格式。\n\n现在让我们创建另一个项目，并实现接收自定义数据的代码。\n\n使用 Microsoft Visual Studio\
    \ 2015 中的 Windows 通用（空白应用）模板创建一个新项目。\n\n首先，将以下代码添加到 `default.html` 中。你需要用以下代码替换\
    \ `body` 标签。\n\n```html\n<body class=\"win-type-body\">\n    <textarea class=\"\
    text-box\" id=\"txtconent\" rows=\"4\" cols=\"50\" />\n    <br />\n    <br />\n\
    </body>\n```\n\n现在，在解决方案资源管理器中右键单击项目，然后选择 **添加 > 新建 JavaScript 文件**。为文件提供名称。在此示例中，让我们将文件命名为\
    \ `DataSharingDemo.js`。\n\n```javascript\n(function () {\n    \"use strict\";\n\
    \n    function GetControl() {\n        WinJS.UI.processAll().done(function ()\
    \ {\n            // 初始化激活处理程序\n            WinJS.Application.addEventListener(\"\
    activated\", activatedShareHandler, false);\n        });\n    }\n\n    document.addEventListener(\"\
    DOMContentLoaded\", GetControl);\n})();\n```\n\n通过复制以下代码来实现 `activatedShareHandler`\
    \ 函数：\n\n```javascript\nfunction activatedShareHandler(eventObject) {\n    if\
    \ (eventObject.detail.kind === Windows.ApplicationModel.Activation.ActivationKind.shareTarget)\
    \ {\n        eventObject.setPromise(WinJS.UI.processAll());\n        \n      \
    \  // ShareOperation 对象使用 eventObject 事件参数进行初始化\n        shareOperation = eventObject.detail.shareOperation;\n\
    \        \n        if (shareOperation.data.contains(\"http://schema.org/Person\"\
    )) {\n            shareOperation.data.getTextAsync(\"http://schema.org/Person\"\
    ).done(function (customFormatString) {\n                var customFormatObject\
    \ = JSON.parse(customFormatString);\n                if (customFormatObject) {\n\
    \                    // 此示例期望自定义格式的类型为 http://schema.org/Person\n            \
    \        if (customFormatObject.type === \"http://schema.org/Person\") {\n   \
    \                     customFormatString = \"类型: \" + customFormatObject.type;\n\
    \                        if (customFormatObject.properties) {\n              \
    \              customFormatString += \"\\n 姓名: \" + customFormatObject.properties.name;\n\
    \                            customFormatString += \"\\n 职位: \" + customFormatObject.properties.jobtitle;\n\
    \                        }\n                    }\n                }\n       \
    \         document.getElementById(\"txtconent\").value = customFormatString;\n\
    \            }, function (e) {\n            });\n        }\n    }\n}\n```\n\n\
    此代码首先检查事件是否是为共享操作触发的。然后它初始化 `shareOperation = eventObject.detail.shareOperation`。接着检查\
    \ `shareOperation.data.contains(\"http://schema.org/Person\")`。如果包含 Person 对象，则调用\
    \ `shareOperation.data.getTextAsync` 方法来检索自定义数据属性。在成功方法中，它将 JSON 字符串解析到一个变量中，如下所示：\n\
    \n`var customFormatObject = JSON.parse(customFormatString);`\n\n最后，它读取这些属性并将其显示在文本区域中。你需要使用\
    \ Visual Studio 的部署选项来部署此应用。\n\n现在运行共享自定义数据的应用。你将看到一个屏幕，如图 10-14 所示。\n\n![A978-1-4842-0719-2_10_Fig14_HTML.jpg](img/A978-1-4842-0719-2_10_Fig14_HTML.jpg)\n\
    \n**图 10-14.** 共享自定义数据格式的应用 UI\n\n现在点击 **共享** 超级按钮或按 Windows 徽标键 ![A978-1-4842-0719-2_10_Figc_HTML.jpg](img/A978-1-4842-0719-2_10_Figc_HTML.jpg)\
    \ + H。当你从列表中选择 **10.7B_ReceiveCustom_data** 应用时，你会看到如图 10-15 所示的屏幕。\n\n![A978-1-4842-0719-2_10_Fig15_HTML.jpg](img/A978-1-4842-0719-2_10_Fig15_HTML.jpg)\n\
    \n**图 10-15.** 共享超级按钮中用于接收自定义数据的接收器应用\n\n当你选择该应用时，你会在共享超级按钮窗口中看到接收器应用的用户界面，如图\
    \ 10-16 所示。\n\n![A978-1-4842-0719-2_10_Fig16_HTML.jpg](img/A978-1-4842-0719-2_10_Fig16_HTML.jpg)\n\
    \n**图 10-16.** 显示了接收到的自定义数据的接收器应用\n\n---\n\n# 第 11 章：后台任务\n\n在任何应用中，你可能都需要在后台静默地执行某些任务。通用\
    \ Windows 平台提供了 **后台任务** 功能，让你可以在后台运行代码。后台任务本质上就是一个由操作系统在后台运行的 JavaScript 文件。后台任务通常针对你可以订阅的系统触发器来运行。后台任务需要在应用的任务清单中声明。后台任务可以通过特定事件向应用报告进度、完成和取消状态。\n\
    \n## 11.1 用于后台任务的系统事件触发器\n\n### 问题\n\n你已经决定在你的应用中实现一个后台任务。你想了解可以订阅哪些不同的系统事件触发器，并在该触发器发生时运行后台任务。\n"
- fmt: '### Solution


    System events are made available through a system-wide trigger object called `SystemTrigger`.
    When creating a new background task, you need to let the OS know which system
    trigger you want to subscribe to. You create a new instance of `SystemTrigger`
    and pass the trigger type in the constructor. The trigger types are defined in
    `SystemTriggerType` enumeration. Table [11-1](#A978-1-4842-0719-2_11_Chapter.html#Tab1)
    lists the triggers with their descriptions.


    Table 11-1. System Trigger Types


    | Trigger Name | Description |

    | --- | --- |

    | `InternetAvailable` | The Internet becomes available |

    | `NetworkStateChange` | A network change has occurred |

    | `OnlineIdConnectedStateChange` | Online id associated with the account changes
    |

    | `SmsReceived` | A new SMS message is received |

    | `TimeZoneChange` | The time zone changes on the device |


    ## Create and Register a Background Task


    ### Problem


    You want to create a background task for your app and register it with the OS.


    ### Solution


    Use the `BackgroundTaskBuilder` found in the `Windows.ApplicationModel.Background`
    namespace to create a new background task and to register it.'
