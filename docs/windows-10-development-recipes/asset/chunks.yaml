    \n## 问题\n\n你需要对从移动服务返回到通用 Windows 应用程序的数据进行排序。\n\n## 解决方案\n\n你可以在查询中使用 `orderBy`\
    \ 或 `orderByDescending` 函数。\n\n## 工作原理\n\n本节将以上一篇教程作为起点。你将更新 `refreshTodoItems`\
    \ 方法以对记录进行排序。\n\n打开 `default.js` 文件，将 `refreshTodoItems` 方法替换为以下代码，以按文本降序排序。\n\
    \n```\nvar refreshTodoItems = function () {\n                todoTable.where({\
    \ complete: false }).orderByDescending(\"text\")\n                    .read()\n\
    \                    .done(function (results) {\n                        todoItems\
    \ = new WinJS.Binding.List(results);\n                        listItems.winControl.itemDataSource\
    \ = todoItems.dataSource;\n                    });\n            };\n```\n\n当你使用“本地计算机”选项在\
    \ Windows 桌面上运行应用程序时，你会注意到列表现在按降序排列，如图 13-13 所示。\n\n![A978-1-4842-0719-2_13_Fig13_HTML.jpg](img/A978-1-4842-0719-2_13_Fig13_HTML.jpg)\n\
    \n图 13-13. Windows 应用程序显示来自移动服务的排序数据\n\n若要按升序排序数据，可以使用 `orderBy` 方法指定要对其排序的列。以下示例演示如何按\
    \ `\"text\"` 列对待办事项表进行升序排序。\n\n```\ntodoTable.where({ complete: false }).orderBy(\"\
    text\")\n                    .read()\n```\n\n# 13.7 在服务器脚本中执行验证\n\n## 问题\n\n你希望在\
    \ Microsoft Azure 移动服务的服务器端 JavaScript 中执行验证。\n\n## 解决方案\n\n你可以在服务器脚本（插入、更新、删除等）中定义验证。这可以通过\
    \ Visual Studio 2015 或移动服务仪表板进行修改。\n\n## 工作原理\n\n让我们使用上一篇教程的示例来演示如何在 Azure 移动服务中执行验证，然后在\
    \ Windows 应用程序中显示消息。\n\n假设你希望验证插入新记录时提交的数据长度。你需要注册一个脚本来验证少于六个字符的数据。如果文本长度小于或等于六个字符，你需要显示一条错误消息。\n\
    \n在 Visual Studio 中打开服务器资源管理器窗口，展开移动服务表。双击 `insert.js` 文件，开始在 Visual Studio 中修改它。你也可以右键单击并选择“编辑脚本”选项来编辑文件，如图\
    \ 13-14 所示。请注意，当你修改并保存文件时，该文件会在 Microsoft Azure 中自动更新。\n\n![A978-1-4842-0719-2_13_Fig14_HTML.jpg](img/A978-1-4842-0719-2_13_Fig14_HTML.jpg)\n\
    \n图 13-14. Visual Studio 2015 中用于移动服务的脚本文件\n\n将 `insert.js` 文件替换为以下代码片段。\n\n```\n\
    function insert(item, user, request) {\n    if (item.text.length <= 6) {\n   \
    \     request.respond(statusCodes.BAD_REQUEST, '文本长度必须大于 6 个字符');\n    } else\
    \ {\n        request.execute();\n    }\n}\n```\n\n从项目中打开 `default.js` 文件，并将 `insertTodoItem`\
    \ 函数替换为以下内容：\n\n```\nvar insertTodoItem = function (todoItem) {\n            \
    \    todoTable.insert(todoItem).done(function (item) {\n                    todoItems.push(item);\n\
    \                }, function (error) {\n                    // 显示错误消息\n      \
    \              var msg = new Windows.UI.Popups.MessageDialog(\n              \
    \          error.request.responseText);\n                    msg.showAsync();\n\
    \                });\n            };\n```\n\n使用“本地计算机”选项在 Windows 桌面上运行该应用，并尝试添加一个少于六个字符的待办事项。点击“保存”按钮。应用程序应显示如图\
    \ 13-15 所示的消息。\n\n![A978-1-4842-0719-2_13_Fig15_HTML.jpg](img/A978-1-4842-0719-2_13_Fig15_HTML.jpg)\n\
    \n图 13-15. Windows 应用程序显示来自移动服务的验证消息\n\n或者，你也可以从“脚本”选项卡修改脚本，该选项卡可以通过在 Azure 管理门户的“数据”选项卡中选择表来找到。\n\
    \n# 第 14 章：磁贴和通知\n\n众所周知，在 Windows 8 中，微软引入了一种使用磁贴启动应用程序的新方式，磁贴是用户体验的标志性组成部分。在\
    \ Windows 10 中，还有一些令人兴奋且不同的附加功能。本章概述了 Windows 10 中可用的磁贴和通知。你将探索如何创建不同类型的磁贴和通知。\n\
    \n## 14.1 创建默认磁贴\n\n### 问题\n\n你需要在应用程序中添加一个默认磁贴。\n\n### 解决方案\n\n使用 `package.appxmanifest`\
    \ 为 UWP 应用磁贴和显示提供信息。\n"
- fmt: "### How It Works\n\nCreate a new Universal Windows app project in Visual Studio\
    \ 2015. Open the `package.appxmanifest` for your project. This opens the manifest\
    \ editor window, as shown in Figure [14-1](#A978-1-4842-0719-2_14_Chapter.html#Fig1).\n\
    \n![A978-1-4842-0719-2_14_Fig1_HTML.jpg](A978-1-4842-0719-2_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1. Application `package.appmanifest`\n\nSelect the **Applications**\
    \ tab, if it is not selected. Change the value of **Display name** if required.\
    \ The display name is the app name that is listed installed/available in the apps\
    \ list and displayed in your app’s title.\n\nIn the app manifest, click the **Visual\
    \ Assets** tab. Under the **Tiles and Logos** section, change the image provided\
    \ for logos and select logos in the Windows manifest. Change or enter a new **ShortName**\
    \ for the app, which should be 13 characters; otherwise, it will be truncated.\
    \ Select the appropriate tile size on which the short name is displayed. You can\
    \ enter your preferred background color in W3DC format (for example, `#FFFFFF`)\
    \ or use the default background color.\n\nCompile the project and run the app\
    \ to test the tile title and images logo created with the app.\n\n## Create Adaptive\
    \ Tiles\n\nAdaptive tiles are a new addition in Windows 10. For adaptive tiles,\
    \ there are new lightweight XML templates that allow developers to design tile\
    \ notification content—based on their own requirements—to support different devices\
    \ and displays.\n\n### Problem\n\nYou want to create adaptive tiles for your UWP\
    \ app.\n\n### Solution\n\nJust like standard tiles, use the adaptive tiles template\
    \ to provide the content of the tile. For creating adaptive tiles, there are adaptive\
    \ tiles templates, which can be used to create different types of tiles.\n\nThe\
    \ Notifications Visualizer (`https://www.microsoft.com/store/apps/9nblggh5xsl1`)\
    \ helps developers design the adaptive tiles. It provides instant visual previews.\
    \ This helps you quickly design the adaptive tiles and test. It provides an easy\
    \ way to configure tile properties like text, font, display colors, show name,\
    \ background images, badge value, and so forth, as well.\n\nAdaptive templates\
    \ work across different types of notifications and different form factors. The\
    \ adaptive tile appearance depends on the device where the app is installed and\
    \ the type of notification—tile or toast.\n\nThe adaptive tile XML Schema syntax\
    \ is as follows:\n\n```\n<tile>\n  <visual>\n    <binding template=\"TileMedium\"\
    >\n      ...\n    </binding>\n    <binding template=\"TileWide\">\n      ...\n\
    \    </binding>\n    <binding template=\"TileLarge\">\n      ...\n    </binding>\n\
    \  </visual>\n</tile>\n```\n\nIn the `binding` element is key, where the content\
    \ of each tile size is specified. In one XML payload, you can specify multiple\
    \ bindings. The following are different types of tile sizes that can be specified\
    \ in the `template` parameter of the `binding`:\n\n- `TileSmall`\n- `TileMedium`\n\
    - `TileWide`\n- `TileLarge` (desktop only)\n\n### How It Works\n\nAdaptive tiles\
    \ templates are based on XML. Let’s use the Notification Visualizer to generate\
    \ the XML for the adaptive tile.\n\nCreate a new Universal Windows app project\
    \ in Visual Studio 2015. This creates a new Windows app project. Open the `default.html`\
    \ page from the project in the Visual Studio Solution Explorer. Add the following\
    \ HTML markup within the `body` tag of `default.html`.\n\n```\n<input type=\"\
    button\" value=\"Update Adaptive Tile\" id=\"btnUpdateAdaptiveTile\" />\n```\n\
    \nThis HTML adds a simple HTML button on the `default.html` page with the text,\
    \ “Update Adaptive Tile”.\n\nNow, right-click the project in the Solution Explorer\
    \ and select **Add ➤ New JavaScript file**. Provide a name for the file: `LoadTileandNotifications.js`.\
    \ Add the following code:\n\n```\nfunction GetControl() {\n        WinJS.UI.processAll().done(function\
    \ () {\n            var adaptiveTilebutton = document.getElementById(\"btnUpdateAdaptiveTile\"\
    );\n            adaptiveTilebutton.addEventListener(\"click\", AddAdaptiveTiles,\
    \ false);\n    }\ndocument.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    ```\n\nIn the preceding code, you added an event handler, `AddAdaptiveTiles()`,\
    \ for the `btnUpdateAdaptiveTile` HTML button. You then added the `GetControl`\
    \ method when `default.html` was loaded.\n\nReopen `default.html` and add a reference\
    \ to the `LoadTileandNotifications.js` file.\n\n```\n<script src=\"/js/LoadTileandNotifications.js\"\
    ></script>\n```\n\nNow, let’s add an `AddAdaptiveTiles()` event handler method\
    \ using the following code snippet in the `LoadTileandNotifications.js` file.\n\
    \n```\n    function AddAdaptiveTiles() {\n        var adaptivetileXml = \"<tile><visual\
    \ displayName=\\\"UWP recipes\\\" branding=\\\"name\\\">\"\n        + \"<binding\
    \ template=\\\"TileSmall\\\"><group><subgroup><text hint-style=\\\"subtitle\\\"\
    > Windows 10 Apps recipes </text><text hint-style=\\\"subtitle\\\">Adaptive Tiles</text></subgroup></group></binding>\"\
    \n        + \"<binding template=\\\"TileMedium\\\"><group><subgroup><text hint-style=\\\
    \"subtitle\\\"> Windows 10 Apps recipes </text><text hint-style=\\\"subtitle\\\
    \">Adaptive Tiles</text></subgroup></group></binding>\"\n        + \"<binding\
    \ template=\\\"TileLarge\\\"><group><subgroup><text hint-style=\\\"subtitle\\\"\
    > Windows 10 Apps recipes </text><text hint-style=\\\"subtitle\\\">Adaptive Tiles</text></subgroup></group></binding>\"\
    \n        + \"<binding template=\\\"TileWide\\\"><group><subgroup><text hint-style=\\\
    \"subtitle\\\"> Windows 10 Apps recipes </text><text hint-style=\\\"subtitle\\\
    \">Adaptive Tiles</text></subgroup></group></binding>\"\n        + \"</visual></tile>\"\
    ;\n\n        var adaptivetileDom = Windows.Data.Xml.Dom.XmlDocument();\n     \
    \   adaptivetileDom.loadXml(adaptivetileXml);\n        var notifications = Windows.UI.Notifications;\n\
    \        var tileNotification = new notifications.TileNotification(adaptivetileDom);\n\
    \        notifications.TileUpdateManager.createTileUpdaterForApplication().update(tileNotification);\n\
    \    }\n```\n\nIn this event listener function, you created an `XmlDocument` object,\
    \ `adaptivetileDom`, which is used to load `adaptivetileXml`. `adaptivetileXml`\
    \ contains the XML payload for `adaptiveTile`, which contains the following adaptive\
    \ tile bindings:\n\n- `TileSmall`\n- `TileMedium`\n- `TileLarge`\n- `TileWide`\n\
    \nIn the preceding code, the `Windows.UI.Notifications` namespace is used.\n\n\
    In `adaptivetileXml`, all tiles have the following display name: UWP recipes.\
    \ The next parameter is `branding`, which is set to `name`. This displays the\
    \ name value at the bottom of the tile.\n\nThe `<group>` and `<subgroup>` elements\
    \ are used to semantically group the content displayed on the tile. In this case,\
    \ “Windows 10 Apps recipes” is displayed first and then “Recipes on Tiles” is\
    \ displayed on the next line. Both text elements are grouped together.\n\nIn the\
    \ `TileLarge` binding, we are also displaying the image in the tile along with\
    \ text content. This image is displayed in line with text, but you can also set\
    \ it to be the background of the tile.\n\nThe `hint-width` attribute is used to\
    \ specify the width of column when there are multiple columns presented in the\
    \ tile.\n\nOnce `XmlDocument` is created, create a `tileNotification` object of\
    \ type `Windows.UI.Notifications.TileNotification()` and pass the `adaptivetileXml`\
    \ as a parameter to the `TileNotification` class. The `tileNotification` object\
    \ is used to define the tile and visual elements related to the tile.\n\nAfter\
    \ this, send the notification to the app’s tile using the `TileUpdateManager`\
    \ class, which changes the content of the specified tiles that the updater is\
    \ bound to by using the `createTileUpdaterForApplication().update()` method.\n\
    \nWhen you run the application on a Windows 10 device, click the **Update Adaptive\
    \ Tile** button to update the tile dynamically, as shown in Figure [14-2](#A978-1-4842-0719-2_14_Chapter.html#Fig2).\n\
    \n![A978-1-4842-0719-2_14_Fig2_HTML.jpg](A978-1-4842-0719-2_14_Fig2_HTML.jpg)\n\
    \nFigure 14-2. Windows 10 adaptive tile update using `Windows.UI.Notifications.TileNotification()`"
  raw: '### How It Works


    Create a new Universal Windows app project in Visual Studio 2015\. Open the `package.appxmanifest`
    for your project. This opens the manifest editor window, as shown in Figure [14-1](#A978-1-4842-0719-2_14_Chapter.html#Fig1).


    ![A978-1-4842-0719-2_14_Fig1_HTML.jpg](A978-1-4842-0719-2_14_Fig1_HTML.jpg)


    Figure 14-1.


    Application package.appmanifest


    Select the Applications tab, if it is not selected. Change the value of Display
    name if required. The display name is the app name that is listed installed/available
    in the apps list and displayed in your app’s title.


    In the app manifest, click the Visual Assets tab. Under the Tiles and Logos section,
    change the image provided for logos and select logos in the Windows manifest.
    Change or enter a new ShortName for the app, which should be 13 characters; otherwise,
    it will be truncated. Select the appropriate tile size on which the short mime
    is displayed. You can enter your preferred background color in W3DC format (for
    example, #FFFFFF) or use the default background color.


    Compile the project and run the app to test the tile title and images logo created
    with the app.


    ## 14.2 Create Adaptive Tiles


    Adaptive tiles are a new addition in Windows 10\. For adaptive tiles, there are
    new lightweight XML templates that allow developers to design tile notification
    content—based on their own requirements—to support different devices and displays.


    ### Problem


    You want to create adaptive tiles for your UWP app.


    ### Solution


    Just like standard tiles, use the adaptive tiles template to provide the content
    of the tile. For creating adaptive tiles, there are adaptive tiles templates,
    which can be used to create different types of tiles.


    The Notifications Visualizer ( [`https://www.microsoft.com/store/apps/9nblggh5xsl1`](https://www.microsoft.com/store/apps/9nblggh5xsl1)
    ) helps developers design the adaptive tiles. It provides instant visual previews.
    This helps you quickly design the adaptive tiles and test. It provides an easy
    way configure tile properties like text, font, display colors, show name, background
    images, badge value, and so forth, as well.


    Adaptive templates work across different types of notifications and different
    form factors. The adaptive tile appearance depends on the device where the app
    is installed and the type of notification—tile or toast.


    The adaptive tile XML Schema syntax is as follows:


    `<tile>`


      `<visual>`


          `<binding template="TileMedium">`


          `...`


        `</binding>`


          `<binding template="TileWide">`


          `...`


        `</binding>`


          `<binding template="TileLarge">`


    `...`


        `</binding>`


        `</visual>`


    `</tile>`


    In the `binding` element is key, where the content of each tile size is specified.
    In one XML payload, you can specify multiple binding. The following are different
    types of tile size that can be specified in the `template` parameter of the `binding`:


    *   `TileSmall`

    *   `TileMedium`

    *   `TileWide`

    *   `TileLarge` (desktop only)


    ### How It Works


    Adaptive tiles templates are based on XML. Let’s use the Notification Visualizer
    to generate the XML for the adaptive tile.


    Create a new Universal Windows app project in Visual Studio 2015\. This creates
    a new Windows app project. Open the default.html page from the project in the
    Visual Studio Solution Explorer. Add the following HTML markup within the body
    tag of `default.html`.


    `<input type="button" value="Update Adaptive Tile" id="btnUpdateAdaptiveTile"
    />`


    This HTML adds a simple HTML button on the `default.html` page with the text,
    “Update Adaptive Tile”.


    Now, right-click the project in the Solution Explorer and select Add ➤ New JavaScript
    file. Provide a name for the file: LoadTileandNotifications.js. Add the following
    code:


    `function GetControl() {`


            `WinJS.UI.processAll().done(function () {`


                `var adaptiveTilebutton = document.getElementById("btnUpdateAdaptiveTile");`


                `adaptiveTilebutton.addEventListener("click", AddAdaptiveTiles, false);`


        `}`


    `document.addEventListener("DOMContentLoaded", GetControl);`


    In the preceding code, you added an event handler, `AddAdaptiveTiles()`, for the
    `btnUpdateAdaptiveTile` HTML button. You then added the `getControl` method when
    `default.html` was loaded.


    Reopen `default.html` and add a reference to the `LoadTileandNotifications.js`
    file.


    `<script src="/js/LoadTileandNotifications.js"></script>`


    Now, let’s add an `AddAdaptiveTiles()`event handler method using the following
    code snippet in the `LoadTileandNotifications.js` file.


        `function AddAdaptiveTiles() {`


            `var adaptivetileXml = "<tile><visual displayName=\"UWP recipes\" branding=\"name\">"`


    `+ "<binding template=\"TileSmall\"><group><subgroup><text hint-style=\"subtitle\">
    Windows 10 Apps receipes </text><text hint-style=\"subtitle\">Adaptive Tiles</text></subgroup></group></binding>"`


    `+ "<binding template=\"TileMedium\"><group><subgroup><text hint-style=\"subtitle\">
    Windows 10 Apps receipes </text><text hint-style=\"subtitle\">Adaptive Tiles</text></subgroup></group></binding>"`


    `+ "<binding template=\"TileLarge\"><group><subgroup><text hint-style=\"subtitle\">
    Windows 10 Apps receipes </text><text hint-style=\"subtitle\">Adaptive Tiles</text></subgroup></group></binding>"`


    `+ "<binding template=\"TileWide\"><group><subgroup><text hint-style=\"subtitle\">
    Windows 10 Apps recipes </text><text hint-style=\"subtitle\">Adaptive Tiles</text></subgroup></group></binding>"`


    `+ "</visual></tile>";`


            `var adaptivetileDom = Windows.Data.Xml.Dom.XmlDocument();`


            `adaptivetileDom.loadXml(adaptivetileXml);`


            `var notifications = Windows.UI.Notifications;`


            `var tileNotification = new notifications.TileNotification(adaptivetileDom);`


            `notifications.TileUpdateManager.createTileUpdaterForApplication().update(tileNotification);`


        `}`


    In this event listener function, you created an XmlDocument object, `adaptivetileDom`,
    which is used to load `adaptivetileXml. adaptiveXml` contains the XML payload
    for `adaptiveTile`, which contains the following adaptive tile bindings:


    *   `TileSmall`

    *   `TileMedium`

    *   `TileLarge`

    *   `TileWide`


    In the preceding code, the `Windows.UI.Notifications` namespace is used.


    In `adaptivetileXml`, all tiles have the following display name: UWP recipes.
    The next parameter is branding, which is set to `Name`. This displays the name
    value at the bottom of the tile.


    The `<group>` and `<subgroup>` elements are used to semantically group the content
    displayed on the tile. In this case, “Windows 10 Apps recipes” is displayed first
    and then “Recipes on Tiles” is displayed on the next line. Both text elements
    are grouped together.


    In the `TileLarge` binding, we are also displaying the image in the tile along
    with text content. This image is displayed in line with text, but you can also
    set it to be the background of the tile.


    The `hint-width` attribute is used to specify the width of column when there are
    multiple columns presented in the tile.


    Once XMLDocument is created, create a `tileNotification` object of type `Windows.UI.Notifications.TileNotification()`
    and pass the `adaptivetileXml` XmlDocument object as a parameter to the `TileNotification`
    class. The `TileNotification` object is used to define the tile and visual elements
    related to the tile.


    After this, send the notification to the app’s tile using the `TileUpdateManager`
    class, which changes the content of the specified tiles that the updater is bound
    to by using the `createTileUpdaterForApplication().update()` method.


    When you run the application on a Windows 10 device, click the Update Adaptive
    Tile button to update the tile dynamically, as shown in Figure [14-2](#A978-1-4842-0719-2_14_Chapter.html#Fig2).


    ![A978-1-4842-0719-2_14_Fig2_HTML.jpg](A978-1-4842-0719-2_14_Fig2_HTML.jpg)


    Figure 14-2.


    Windows 10 adaptive tile update using Windows.UI.Notifications.TileNotification()'
  trans: "\n### 工作原理\n\n在 Visual Studio 2015 中创建一个新的通用 Windows 应用项目。打开项目的 `package.appxmanifest`\
    \ 文件。这将打开清单编辑器窗口，如图 14-1 所示。\n\n![A978-1-4842-0719-2_14_Fig1_HTML.jpg](img/A978-1-4842-0719-2_14_Fig1_HTML.jpg)\n\
    \n图 14-1. 应用程序的 `package.appmanifest` 文件\n\n如果尚未选中，请选择 **应用程序** 选项卡。根据需要更改 **显示名称**\
    \ 的值。显示名称是应用名称，会列在应用列表的已安装/可用应用中，并显示在应用的标题栏里。\n\n在应用清单中，单击 **视觉资产** 选项卡。在 **磁贴和徽标**\
    \ 部分，更换为徽标提供的图像，并在 Windows 清单中选择徽标。更改或输入应用的新 **短名称**，其长度应为 13 个字符，否则将被截断。选择显示短名称的合适磁贴尺寸。您可以以\
    \ W3DC 格式（例如 `#FFFFFF`）输入首选的背景颜色，或使用默认背景颜色。\n\n编译项目并运行应用，以测试通过应用创建的磁贴标题和图像徽标。\n\
    \n## 创建自适应磁贴\n\n自适应磁贴是 Windows 10 的新增功能。对于自适应磁贴，有新的轻量级 XML 模板，允许开发者根据自身需求设计磁贴通知内容，以支持不同的设备和显示器。\n\
    \n### 问题\n\n您想为 UWP 应用创建自适应磁贴。\n\n### 解决方案\n\n与标准磁贴类似，使用自适应磁贴模板提供磁贴内容。要创建自适应磁贴，可使用自适应磁贴模板来创建不同类型的磁贴。\n\
    \n通知可视化工具 (`https://www.microsoft.com/store/apps/9nblggh5xsl1`) 可帮助开发者设计自适应磁贴。它提供即时的视觉预览，帮助您快速设计和测试自适应磁贴。它还提供了一种简便的方法来配置磁贴属性，如文本、字体、显示颜色、显示名称、背景图像、徽章值等。\n\
    \n自适应模板适用于不同类型的通知和不同外形规格。自适应磁贴的外观取决于应用安装所在的设备以及通知的类型（磁贴或 Toast）。\n\n自适应磁贴的 XML\
    \ 模式语法如下：\n\n```\n<tile>\n  <visual>\n    <binding template=\"TileMedium\">\n\
    \      ...\n    </binding>\n    <binding template=\"TileWide\">\n      ...\n \
    \   </binding>\n    <binding template=\"TileLarge\">\n      ...\n    </binding>\n\
    \  </visual>\n</tile>\n```\n\n`binding` 元素是关键，其中指定了每个磁贴尺寸的内容。在一个 XML 负载中，您可以指定多个绑定。以下是可以指定在\
    \ `binding` 的 `template` 参数中的不同磁贴尺寸类型：\n\n- `TileSmall`\n- `TileMedium`\n- `TileWide`\n\
    - `TileLarge`（仅限桌面版）\n\n### 工作原理\n\n自适应磁贴模板基于 XML。让我们使用通知可视化工具生成自适应磁贴的 XML。\n\n\
    在 Visual Studio 2015 中创建一个新的通用 Windows 应用项目。这将创建一个新的 Windows 应用项目。在 Visual Studio\
    \ 解决方案资源管理器中，从项目中打开 `default.html` 页面。在 `default.html` 的 `body` 标签内添加以下 HTML 标记。\n\
    \n```\n<input type=\"button\" value=\"更新自适应磁贴\" id=\"btnUpdateAdaptiveTile\" />\n\
    ```\n\n此 HTML 在 `default.html` 页面上添加了一个简单的 HTML 按钮，其文本为“更新自适应磁贴”。\n\n现在，右键单击解决方案资源管理器中的项目，然后选择\
    \ **添加 ➤ 新建 JavaScript 文件**。为文件命名：`LoadTileandNotifications.js`。添加以下代码：\n\n```\n\
    function GetControl() {\n        WinJS.UI.processAll().done(function () {\n  \
    \          var adaptiveTilebutton = document.getElementById(\"btnUpdateAdaptiveTile\"\
    );\n            adaptiveTilebutton.addEventListener(\"click\", AddAdaptiveTiles,\
    \ false);\n    }\ndocument.addEventListener(\"DOMContentLoaded\", GetControl);\n\
    ```\n\n在上述代码中，您为 `btnUpdateAdaptiveTile` HTML 按钮添加了一个事件处理程序 `AddAdaptiveTiles()`。然后在\
    \ `default.html` 加载时添加了 `GetControl` 方法。\n\n重新打开 `default.html`，并添加对 `LoadTileandNotifications.js`\
    \ 文件的引用。\n\n```\n<script src=\"/js/LoadTileandNotifications.js\"></script>\n```\n\
    \n现在，让我们使用 `LoadTileandNotifications.js` 文件中的以下代码片段添加一个 `AddAdaptiveTiles()` 事件处理程序方法。\n\
    \n```\n    function AddAdaptiveTiles() {\n        var adaptivetileXml = \"<tile><visual\
    \ displayName=\\\"UWP 食谱\\\" branding=\\\"name\\\">\"\n        + \"<binding template=\\\
    \"TileSmall\\\"><group><subgroup><text hint-style=\\\"subtitle\\\"> Windows 10\
    \ 应用食谱 </text><text hint-style=\\\"subtitle\\\">自适应磁贴</text></subgroup></group></binding>\"\
    \n        + \"<binding template=\\\"TileMedium\\\"><group><subgroup><text hint-style=\\\
    \"subtitle\\\"> Windows 10 应用食谱 </text><text hint-style=\\\"subtitle\\\">自适应磁贴</text></subgroup></group></binding>\"\
    \n        + \"<binding template=\\\"TileLarge\\\"><group><subgroup><text hint-style=\\\
    \"subtitle\\\"> Windows 10 应用食谱 </text><text hint-style=\\\"subtitle\\\">自适应磁贴</text></subgroup></group></binding>\"\
    \n        + \"<binding template=\\\"TileWide\\\"><group><subgroup><text hint-style=\\\
    \"subtitle\\\"> Windows 10 应用食谱 </text><text hint-style=\\\"subtitle\\\">自适应磁贴</text></subgroup></group></binding>\"\
    \n        + \"</visual></tile>\";\n\n        var adaptivetileDom = Windows.Data.Xml.Dom.XmlDocument();\n\
    \        adaptivetileDom.loadXml(adaptivetileXml);\n        var notifications\
    \ = Windows.UI.Notifications;\n        var tileNotification = new notifications.TileNotification(adaptivetileDom);\n\
    \        notifications.TileUpdateManager.createTileUpdaterForApplication().update(tileNotification);\n\
    \    }\n```\n\n在此事件监听函数中，您创建了一个 `XmlDocument` 对象 `adaptivetileDom`，用于加载 `adaptivetileXml`。`adaptivetileXml`\
    \ 包含了 `adaptiveTile` 的 XML 负载，其中包含以下自适应磁贴绑定：\n\n- `TileSmall`\n- `TileMedium`\n\
    - `TileLarge`\n- `TileWide`\n\n上述代码中使用了 `Windows.UI.Notifications` 命名空间。\n\n在\
    \ `adaptivetileXml` 中，所有磁贴都具有以下显示名称：UWP 食谱。下一个参数是 `branding`，设置为 `name`。这会在磁贴底部显示名称值。\n\
    \n`<group>` 和 `<subgroup>` 元素用于在语义上对磁贴上显示的内容进行分组。在此例中，先显示“Windows 10 应用食谱”，然后在下一行显示“磁贴中的食谱”。这两个文本元素被组合在一起。\n\
    \n在 `TileLarge` 绑定中，我们还在磁贴中显示了图像以及文本内容。该图像与文本内联显示，但您也可以将其设置为磁贴的背景。\n\n当磁贴中有多列时，`hint-width`\
    \ 属性用于指定列的宽度。\n\n`XmlDocument` 创建后，创建一个类型为 `Windows.UI.Notifications.TileNotification()`\
    \ 的 `tileNotification` 对象，并将 `adaptivetileXml` 作为参数传递给 `TileNotification` 类。`tileNotification`\
    \ 对象用于定义磁贴以及与磁贴相关的视觉元素。\n\n之后，使用 `TileUpdateManager` 类将通知发送到应用的磁贴，该类通过 `createTileUpdaterForApplication().update()`\
    \ 方法更改更新程序所绑定的指定磁贴的内容。\n\n当您在 Windows 10 设备上运行应用程序时，单击 **更新自适应磁贴** 按钮以动态更新磁贴，如图\
    \ 14-2 所示。\n\n![A978-1-4842-0719-2_14_Fig2_HTML.jpg](img/A978-1-4842-0719-2_14_Fig2_HTML.jpg)\n\
    \n图 14-2. 使用 `Windows.UI.Notifications.TileNotification()` 更新 Windows 10 自适应磁贴\n"
- fmt: "# 14.3 Create a Toast Notification with Visual Content\n\n## Problem\n\nYou\
    \ want to create an interactive toast notification, to be displayed with an image,\
    \ to override the application logo and inline image thumbnail in a toast.\n\n\
    ## Solution\n\nWindows 10 UWP provides toast notifications, which are developed\
    \ using an XML template similar to adaptive tiles. Toast notification XML contains\
    \ mainly three key elements: visual, action, and audio. The `ToastNotificationManager`\
    \ is used to send toast notifications. Use the `ToastNotificationManager` to send\
    \ new notifications to the app.\n\n## How It Works\n\nIn the previous section,\
    \ you created an adaptive tile with an XML Schema. In a similar manner, you will\
    \ create an interactive toast notification that notifies the user on a new book\
    \ added in the Apress catalog.\n\nUse the same project. Add the following HTML\
    \ markup within the `<body>` tag of `default.html`.\n\n```\n<input type=\"button\"\
    \ value=\"Display Toast\" id=\"btnDisplayToast\" />\n<br />\n```\n\nThis creates\
    \ a simple Display Toast HTML button on the `default.html` page.\n\nOpen `LoadTileandNotifications.js`\
    \ and add the following code in the existing `GetControl()` method:\n\n```\nvar\
    \ toastNotificationbutton = document.getElementById(\"btnDisplayToast\");\ntoastNotificationbutton.addEventListener(\"\
    click\", DisplayToastNotification, false);\n```\n\nIn the preceding code, you\
    \ basically get a reference to the `btnDisplayToast` button and associate the\
    \ click event handler with the `AddToastNotification()` method.\n\nAdd a new `AddToastNotification`\
    \ event method with the following code snippet:\n\n```\nfunction AddToastNotification()\n\
    \  {\n      var toastXML = \"<toast><visual>\"\n+ \"<binding template=\\\"ToastGeneric\\\
    \"><text>Apress Catalog</text><text>Apress is working on new Windows 10 Receipes\
    \ guide</text>\"\n+ \"<image placement=\\\"appLogoOverride\\\" src=\\\"/images/Alarm.png\\\
    \" /><image placement=\\\"inline\\\" src=\\\"/images/Pattern-Blue-Dots-background.jpg\\\
    \" /></binding>\"\n+ \" </visual>\"\n    + \"</toast>\";\n      var toastNotificationDom\
    \ = Windows.Data.Xml.Dom.XmlDocument();\n      toastNotificationDom.loadXml(toastXML);\n\
    \      var notifications = Windows.UI.Notifications;\n      // Get the toast notification\
    \ manager for the current app.\n      var notificationManager = notifications.ToastNotificationManager;\n\
    \      // Create a toast notification from the XML, then create a ToastNotifier\
    \ object\n      // to send the toast.\n      var toast = new notifications.ToastNotification(toastNotificationDom);\n\
    \      notificationManager.createToastNotifier().show(toast);\n  }\n```\n\nIn\
    \ the preceding event listener method, the `adaptivetileXml` variable contains\
    \ the XML payload for the toast notification, which is similar to “Adaptive Tiles”,\
    \ but in the `<binding>` element, the template value is set to `ToastGeneric`.\n\
    \nThen create a new `toast` object of type `ToastNotification` and specify the\
    \ `toastNotificationDom` `XmlDocument`. After this, send the notification to the\
    \ app’s tile using the `ToastNotificationManager` class, which sends the content\
    \ of the specified toast.\n\nRun the application in the emulator in the default\
    \ page. Click the Display Toast button to test the output, as shown in Figure\
    \ [14-3](#A978-1-4842-0719-2_14_Chapter.html#Fig3).\n\n![A978-1-4842-0719-2_14_Fig3_HTML.jpg](A978-1-4842-0719-2_14_Fig3_HTML.jpg)\n\
    \nFigure 14-3.\n\nToast notification from UWP app\n\nYou can create toast notifications\
    \ associated with your app and notify users dynamically while the app is running.\
    \ In the next recipe, you will learn how to add actions to toast notifications.\n\
    \n# 14.4 Create a Toast Notification with Actions\n\n## Problem\n\nYou want to\
    \ create an interactive toast notification to be displayed with possible actions\
    \ for the user.\n\n## Solution\n\nAdd the `<Actions>` element to the toast notification\
    \ XML.\n\n## How It Works\n\nIn previous recipe, you created an adaptive toast\
    \ notification with XML Schema. In a similar manner, you will create an interactive\
    \ toast notification with actions that will notify users on a new book added in\
    \ the Apress catalog and allow the users to take actions.\n\nLet’s use same project\
    \ as in the previous recipe. Open the `LoadTileandNotifications.js` file. Add\
    \ a new method, `AddInteractiveToastNotification()`.\n\n```\nfunction AddInteractiveToastNotification()\n\
    \    {\n        var toastXML = \"<toast><visual>\"\n+ \"<binding template=\\\"\
    ToastGeneric\\\"><text>Apress Catalog</text><text>Apress is working on new Windows\
    \ 10 Receipes guide</text>\"\n+ \"<image placement=\\\"appLogoOverride\\\" src=\\\
    \"/images/Alarm.png\\\" /><image placement=\\\"inline\\\" src=\\\"/images/Pattern-Blue-Dots-background.jpg\\\
    \" /></binding>\"\n+ \" </visual>\"\n+ \"<actions><action content=\\\"check\\\"\
    \ arguments=\\\"check\\\" imageUri=\\\"/images/storelogo.png\\\" /><action content=\\\
    \"cancel\\\" arguments=\\\"cancel\\\" /></actions>\"\n+ \" <audio src=\\\"ms-winsoundevent:Notification.Reminder\\\
    \"/>\"\n+ \"</toast>\";\n        var toastNotificationDom = Windows.Data.Xml.Dom.XmlDocument();\n\
    \        toastNotificationDom.loadXml(toastXML);\n        var notifications =\
    \ Windows.UI.Notifications;\n        // Get the toast notification manager for\
    \ the current app.\n        var notificationManager = notifications.ToastNotificationManager;\n\
    \        // Create a toast notification from the XML, then create a ToastNotifier\
    \ object\n        // to send the toast.\n        var toast = new notifications.ToastNotification(toastNotificationDom);\n\
    \        notificationManager.createToastNotifier().show(toast);\n    }\n```\n\n\
    In the `AddInteractiveToastNotification()` event handler method, the only difference\
    \ is in XML payload, where you added additional elements to allow users to take\
    \ actions. It also plays a notification sound when the toast notification is sent\
    \ to the app. Actions are specified under the `<actions><action>` element.\n\n\
    In `default.html`, add the following line for a new button to display an interactive\
    \ notification event:\n\n```\n<p>\n        <input type=\"button\" value=\"Display\
    \ interactive Toast\" id=\"btnDisplayinteractiveToast\" />\n        <br />\n</p>\n\
    ```\n\nThis code adds a new button, Display Interactive Toast. To associate the\
    \ `AddInteractiveToastNotification()` method with the `btnDisplayinteractiveToast`\
    \ button, let’s add the following lines of code in the existing `GetControl()`\
    \ method.\n\n```\nvar toastinteractiveNotificationbutton = document.getElementById(\"\
    btnDisplayinteractiveToast\");\ntoastinteractiveNotificationbutton.addEventListener(\"\
    click\", AddInteractiveToastNotification, false);\n```\n\nThe preceding code is\
    \ the same as previous recipe, where you associated a button click event handler\
    \ with a method. In this case, you associate the button with the `btnDisplayinteractiveToast`\
    \ id to the `AddInteractiveToastNotification()` method.\n\nCompile the project\
    \ and run it in the emulator. When the `default.html` page is loaded, press the\
    \ Display Interactive Toast button. On button click notifications are displayed\
    \ to users with two different possible actions. A notification sound is also played,\
    \ as shown in Figure [14-4](#A978-1-4842-0719-2_14_Chapter.html#Fig4).\n\n![A978-1-4842-0719-2_14_Fig4_HTML.jpg](A978-1-4842-0719-2_14_Fig4_HTML.jpg)\n\
    \nFigure 14-4.\n\nInteractive toast notification from app\n\nIn this recipe, you\
    \ learned how to interact with users via toast notifications. You also learned\
    \ how to get users to take actions based on toast notifications.\n\n# 14.5 Create\
    \ a Scheduled Tile and Toast Notification\n\n## Problem\n\nYou want to create\
    \ an interactive toast notification to be displayed with a reminder to the user.\n\
    \n## Solution\n\nAdd an `<Actions>` element in the tile and toast notification\
    \ XML."
  raw: '## 14.3 Create a Toast Notification with Visual Content


    ### Problem


    You want to create an interactive toast notification, to be displayed with an
    image, to override the application logo and inline image thumbnail in a toast.


    ### Solution


    Windows 10 UWP provides toast notifications, which are developed using an XML
    template similar to adaptive tiles. Toast notification XML contains mainly three
    key elements: visual, action, and audio. The `ToastNotificationManager` is used
    to send toast notifications. Use the `ToastNotificationManager` to send new notifications
    to the app.


    ### How It Works


    In the previous section, you created an adaptive tile with an XML Schema. In a
    similar manner, you will create an interactive toast notification that notifies
    the user on a new book added in the Apress catalog.


    Use the same project. Add the following HTML markup within the `<body>` tag of
    `default.html`.


    `<input type="button" value="Display Toast" id="btnDisplayToast" />`


          `<br />`


    This creates a simple Display Toast HTML button on the `default.html` page.


    Open LoadTileandNotifications.js and add the following code in the existing `GetControl()`
    method:


    `var toastNotificationbutton = document.getElementById("btnDisplayToast");`


             `toastNotificationbutton.addEventListener("click", DisplayToastNotification,
    false);`


    In the preceding code, you basically get a reference to the `btnDisplayToast`
    button and associate the click event handler with the `AddToastNotification()`
    method.


    Add a new `AddToastNotification` event method with the following code snippet:


    `function AddToastNotification()`


      `{`


          `var toastXML = "<toast><visual>"`


    `+ "<binding template=\"ToastGeneric\"><text>Apress Catalog</text><text>Apress
    is working on new Windows 10 Receipes guide</text>"`


    `+ "<image placement=\"appLogoOverride\" src=\"/images/Alarm.png\" /><image placement=\"inline\"
    src=\"/images/Pattern-Blue-Dots-background.jpg\" /></binding>"`


    `+ " </visual>"`


        `+ "</toast>";`


          `var toastNotificationDom = Windows.Data.Xml.Dom.XmlDocument();`


          `toastNotificationDom.loadXml(toastXML);`


          `var notifications = Windows.UI.Notifications;`


          `// Get the toast notification manager for the current app.`


          `var notificationManager = notifications.ToastNotificationManager;`


          `// Create a toast notification from the XML, then create a ToastNotifier
    object`


          `// to send the toast.`


          `var toast = new notifications.ToastNotification(toastNotificationDom);`


          `notificationManager.createToastNotifier().show(toast);`


      `}`


    In the preceding event listener method, the `adaptivetileXml` variable contains
    the XML payload for the toast notification, which is similar to “Adaptive Tiles”,
    but in the `<binding>` element, the template value is set to `ToastGeneric`.


    Then create a new `toast` object of type `ToastNotification` and specify the `toastNotificationDom`
    XmlDocument. After this, send the notification to the app’s tile using the `ToastNotificationManager`
    class, which sends the content of the specified toast.


    Run the application in the emulator in the default page. Click the Display Toast
    button to test the output, as shown in Figure [14-3](#A978-1-4842-0719-2_14_Chapter.html#Fig3).


    ![A978-1-4842-0719-2_14_Fig3_HTML.jpg](A978-1-4842-0719-2_14_Fig3_HTML.jpg)


    Figure 14-3.


    Toast notification from UWP app


    You can create toast notifications associated with your app and notify users dynamically
    while the app is running. In the next recipe, you will learn how to add actions
    to toast notifications.


    ## 14.4 Create a Toast Notification with Actions


    ### Problem


    You want to create an interactive toast notification to be displayed with possible
    actions for the user.


    ### Solution


    Add the `<Actions>` element to the toast notification XML.


    ### How It Works


    In previous recipe, you created an adaptive toast notification with XML Schema.
    In a similar manner, you will create an interactive toast notification with actions
    that will notify users on a new book added in the Apress catalog and allow the
    users to take actions.


    Let’s use same project as in the previous recipe. Open the LoadTileandNotifications.js
    file. Add a new method, `AddInteractiveToastNotification()`.


        `function AddInteractiveToastNotification()`


        `{`


            `var toastXML = "<toast><visual>"`


    `+ "<binding template=\"ToastGeneric\"><text>Apress Catalog</text><text>Apress
    is working on new Windows 10 Receipes guide</text>"`


    `+ "<image placement=\"appLogoOverride\" src=\"/images/Alarm.png\" /><image placement=\"inline\"
    src=\"/images/Pattern-Blue-Dots-background.jpg\" /></binding>"`


    `+ " </visual>"`


    `+ "<actions><action content=\"check\" arguments=\"check\" imageUri=\"/images/storelogo.png\"
    /><action content=\"cancel\" arguments=\"cancel\" /></actions>"`


    `+ " <audio src=\"ms-winsoundevent:Notification.Reminder\"/>"`


    `+ "</toast>";`


            `var toastNotificationDom = Windows.Data.Xml.Dom.XmlDocument();`


            `toastNotificationDom.loadXml(toastXML);`


            `var notifications = Windows.UI.Notifications;`


            `// Get the toast notification manager for the current app.`


            `var notificationManager = notifications.ToastNotificationManager;`


            `// Create a toast notification from the XML, then create a ToastNotifier
    object`


            `// to send the toast.`


            `var toast = new notifications.ToastNotification(toastNotificationDom);`


            `notificationManager.createToastNotifier().show(toast);`


        `}`


    In the `AddInteractiveToastNotification()` event handler method, the only difference
    is in XML payload, where you added additional elements to allow users to take
    actions. It also plays a notification sound when the toast notification is sent
    to the app. Actions are specified under the `<actions><action>` element.


    In `default.html`, add the following line for a new button to display an interactive
    notification event:


    `<p>`


            `<input type="button" value="Display interactive Toast" id="btnDisplayinteractiveToast"
    />`


            `<br />`


        `</p>`


    This code adds a new button, Display Interactive Toast. To associate the `AddInteractiveToastNotification()`
    method with the `btnDisplayinteractiveToast` button, let’s add the following lines
    of code in the existing `GetControl()` method.


      `var toastinteractiveNotificationbutton = document.getElementById("btnDisplayinteractiveToast");`


                `toastinteractiveNotificationbutton.addEventListener("click", AddInteractiveToastNotification,
    false);`


    The preceding code is the same as previous recipe, where you associated a button
    click event handler with a method. In this case, you associate the button with
    the `btnDisplayinteractiveToast` id to the `AddInteractiveToastNotification()`
    method.


    Compile the project and run it in the emulator. When the `default.html` page is
    loaded, press the Display Interactive Toast button. On button click notifications
    are displayed to users with two different possible actions. A notification sound
    is also played, as shown in Figure [14-4](#A978-1-4842-0719-2_14_Chapter.html#Fig4).


    ![A978-1-4842-0719-2_14_Fig4_HTML.jpg](A978-1-4842-0719-2_14_Fig4_HTML.jpg)


    Figure 14-4.


    Interactive toast notification from app


    In this recipe, you learned how to interact with users via toast notifications.
    You also learned how to get users to take actions based on toast notifications.


    ## 14.5 Create a Scheduled Tile and Toast Notification


    ### Problem


    You want to create an interactive toast notification to be displayed with a reminder
    to the user.


    ### Solution


    Add an `<Actions>` element in the tile and toast notification XML.'
  trans: "\n# 14.3 创建包含视觉内容的 Toast 通知\n\n## 问题\n\n希望创建一个交互式 Toast 通知，使其能够显示图像，并覆盖应用徽标和通知中的内联图像缩略图。\n\
    \n## 解决方案\n\nWindows 10 UWP 提供了使用类似自适应磁贴的 XML 模板开发的 Toast 通知。Toast 通知的 XML 主要包含三个关键元素：视觉（visual）、操作（action）和音频（audio）。`ToastNotificationManager`\
    \ 用于发送 Toast 通知。请使用 `ToastNotificationManager` 向应用发送新通知。\n\n## 工作原理\n\n在上一节中，您使用\
    \ XML Schema 创建了一个自适应磁贴。现在，您将以类似的方式创建一个交互式 Toast 通知，用于在 Apress 目录中有新书添加时通知用户。\n\
    \n使用同一个项目。在 `default.html` 的 `<body>` 标签内添加以下 HTML 标记。\n\n```\n<input type=\"\
    button\" value=\"显示 Toast\" id=\"btnDisplayToast\" />\n<br />\n```\n\n这将在 `default.html`\
    \ 页面上创建一个简单的“显示 Toast”HTML 按钮。\n\n打开 `LoadTileandNotifications.js`，并在现有的 `GetControl()`\
    \ 方法中添加以下代码：\n\n```\nvar toastNotificationbutton = document.getElementById(\"\
    btnDisplayToast\");\ntoastNotificationbutton.addEventListener(\"click\", DisplayToastNotification,\
    \ false);\n```\n\n在上述代码中，您获取了 `btnDisplayToast` 按钮的引用，并将点击事件处理程序与 `AddToastNotification()`\
    \ 方法关联。\n\n使用以下代码片段添加一个新的 `AddToastNotification` 事件方法：\n\n```\nfunction AddToastNotification()\n\
    \  {\n      var toastXML = \"<toast><visual>\"\n+ \"<binding template=\\\"ToastGeneric\\\
    \"><text>Apress 目录</text><text>Apress 正在编写新的 Windows 10 指南</text>\"\n+ \"<image\
    \ placement=\\\"appLogoOverride\\\" src=\\\"/images/Alarm.png\\\" /><image placement=\\\
    \"inline\\\" src=\\\"/images/Pattern-Blue-Dots-background.jpg\\\" /></binding>\"\
    \n+ \" </visual>\"\n    + \"</toast>\";\n      var toastNotificationDom = Windows.Data.Xml.Dom.XmlDocument();\n\
    \      toastNotificationDom.loadXml(toastXML);\n      var notifications = Windows.UI.Notifications;\n\
    \      // 获取当前应用的 Toast 通知管理器。\n      var notificationManager = notifications.ToastNotificationManager;\n\
    \      // 从 XML 创建 Toast 通知，然后创建 ToastNotifier 对象\n      // 以发送 Toast。\n     \
    \ var toast = new notifications.ToastNotification(toastNotificationDom);\n   \
    \   notificationManager.createToastNotifier().show(toast);\n  }\n```\n\n在上述事件监听方法中，`adaptivetileXml`\
    \ 变量包含了 Toast 通知的 XML 内容，这与“自适应磁贴”类似，但在 `<binding>` 元素中，模板值设置为 `ToastGeneric`。\n\
    \n然后创建一个类型为 `ToastNotification` 的新 `toast` 对象，并指定 `toastNotificationDom` `XmlDocument`。之后，使用\
    \ `ToastNotificationManager` 类将通知发送到应用的磁贴，该类会发送指定 Toast 的内容。\n\n在模拟器中运行应用，并加载默认页面。点击“显示\
    \ Toast”按钮测试输出，如图 14-3 所示。\n\n![A978-1-4842-0719-2_14_Fig3_HTML.jpg](img/A978-1-4842-0719-2_14_Fig3_HTML.jpg)\n\
    \n图 14-3.\n\n来自 UWP 应用的 Toast 通知\n\n您可以创建与应用关联的 Toast 通知，并在应用运行时动态通知用户。在下一个技巧中，您将学习如何为\
    \ Toast 通知添加操作。\n\n# 14.4 创建带操作的 Toast 通知\n\n## 问题\n\n希望创建带有可选操作的交互式 Toast 通知，供用户选择。\n\
    \n## 解决方案\n\n在 Toast 通知的 XML 中添加 `<Actions>` 元素。\n\n## 工作原理\n\n在之前的技巧中，您使用 XML\
    \ Schema 创建了一个自适应 Toast 通知。现在，您将以类似的方式创建一个带有操作的交互式 Toast 通知，当 Apress 目录中有新书时通知用户，并允许用户执行操作。\n\
    \n我们沿用上一个技巧中的项目。打开 `LoadTileandNotifications.js` 文件。添加一个新方法 `AddInteractiveToastNotification()`。\n\
    \n```\nfunction AddInteractiveToastNotification()\n    {\n        var toastXML\
    \ = \"<toast><visual>\"\n+ \"<binding template=\\\"ToastGeneric\\\"><text>Apress\
    \ 目录</text><text>Apress 正在编写新的 Windows 10 指南</text>\"\n+ \"<image placement=\\\
    \"appLogoOverride\\\" src=\\\"/images/Alarm.png\\\" /><image placement=\\\"inline\\\
    \" src=\\\"/images/Pattern-Blue-Dots-background.jpg\\\" /></binding>\"\n+ \" </visual>\"\
    \n+ \"<actions><action content=\\\"查看\\\" arguments=\\\"check\\\" imageUri=\\\"\
    /images/storelogo.png\\\" /><action content=\\\"取消\\\" arguments=\\\"cancel\\\"\
    \ /></actions>\"\n+ \" <audio src=\\\"ms-winsoundevent:Notification.Reminder\\\
    \"/>\"\n+ \"</toast>\";\n        var toastNotificationDom = Windows.Data.Xml.Dom.XmlDocument();\n\
    \        toastNotificationDom.loadXml(toastXML);\n        var notifications =\
    \ Windows.UI.Notifications;\n        // 获取当前应用的 Toast 通知管理器。\n        var notificationManager\
    \ = notifications.ToastNotificationManager;\n        // 从 XML 创建 Toast 通知，然后创建\
    \ ToastNotifier 对象\n        // 以发送 Toast。\n        var toast = new notifications.ToastNotification(toastNotificationDom);\n\
    \        notificationManager.createToastNotifier().show(toast);\n    }\n```\n\n\
    在 `AddInteractiveToastNotification()` 事件处理方法中，唯一的区别在于 XML 内容，您添加了额外的元素以允许用户执行操作。同时，当\
    \ Toast 通知发送到应用时，它还会播放一个通知音效。操作在 `<actions><action>` 元素下指定。\n\n在 `default.html`\
    \ 中，为显示交互式通知事件的新按钮添加以下代码行：\n\n```\n<p>\n        <input type=\"button\" value=\"\
    显示交互式 Toast\" id=\"btnDisplayinteractiveToast\" />\n        <br />\n</p>\n```\n\
    \n这段代码添加了一个新按钮“显示交互式 Toast”。为了将 `AddInteractiveToastNotification()` 方法与 `btnDisplayinteractiveToast`\
    \ 按钮关联，我们在现有的 `GetControl()` 方法中添加以下代码行。\n\n```\nvar toastinteractiveNotificationbutton\
    \ = document.getElementById(\"btnDisplayinteractiveToast\");\ntoastinteractiveNotificationbutton.addEventListener(\"\
    click\", AddInteractiveToastNotification, false);\n```\n\n上述代码与上一个技巧相同，您将按钮点击事件处理程序与一个方法关联。这里，您将带有\
    \ `btnDisplayinteractiveToast` id 的按钮与 `AddInteractiveToastNotification()` 方法关联。\n\
    \n编译项目并在模拟器中运行。当 `default.html` 页面加载后，按下“显示交互式 Toast”按钮。点击按钮后，通知将以两个不同的可选操作展示给用户。同时也会播放一个通知音效，如图\
    \ 14-4 所示。\n\n![A978-1-4842-0719-2_14_Fig4_HTML.jpg](img/A978-1-4842-0719-2_14_Fig4_HTML.jpg)\n\
    \n图 14-4.\n\n来自应用的交互式 Toast 通知\n\n在本技巧中，您学习了如何通过 Toast 通知与用户进行交互。您还学习了如何让用户根据\
    \ Toast 通知执行操作。\n\n# 14.5 创建定时磁贴和 Toast 通知\n\n## 问题\n\n希望创建一个带有提醒功能的交互式 Toast\
    \ 通知。\n\n## 解决方案\n\n在磁贴和 Toast 通知的 XML 中添加 `<Actions>` 元素。\n"
- fmt: "### How It Works\n\nIn the previous recipe, you created an adaptive toast\
    \ notification with XML Schema. In a similar manner, let’s create an interactive\
    \ toast notification with actions that notify users on a new book added in the\
    \ Apress catalog and allow users to take actions.\n\nLet’s use same project as\
    \ in the previous recipe. Open the `LoadTileandNotifications.js` file and add\
    \ the following `AddScheduledTileNotification()` method.\n\n```\nfunction AddScheduledTileNotification()\
    \ {\n\n        var adaptivetileXml = \"<tile><visual displayName=\\\"Future recipes\\\
    \" branding=\\\"name\\\">\"\n+ \"<binding template=\\\"TileSmall\\\"><group><subgroup><text\
    \ hint-style=\\\"subtitle\\\"> Updated Tiles </text><text hint-style=\\\"subtitle\\\
    \">Adaptive Tiles</text></subgroup></group></binding>\"\n+ \"<binding template=\\\
    \"TileMedium\\\"><group><subgroup><text hint-style=\\\"subtitle\\\">  Updated\
    \ Tiles </text><text hint-style=\\\"subtitle\\\">Adaptive Tiles</text></subgroup></group></binding>\"\
    \n+ \"<binding template=\\\"TileLarge\\\"><group><subgroup><text hint-style=\\\
    \"subtitle\\\">  Updated Tiles </text><text hint-style=\\\"subtitle\\\">Adaptive\
    \ Tiles</text></subgroup></group></binding>\"\n+ \"<binding template=\\\"TileWide\\\
    \"><group><subgroup><text hint-style=\\\"subtitle\\\">  Updated Tiles </text><text\
    \ hint-style=\\\"subtitle\\\">Adaptive Tiles</text></subgroup></group></binding>\"\
    \n+ \"</visual></tile>\";\n\n        var adaptivetileDom = Windows.Data.Xml.Dom.XmlDocument();\n\
    \        adaptivetileDom.loadXml(adaptivetileXml);\n\n        var currentTime\
    \ = new Date();\n        //notification should appear in 3 seconds\n        var\
    \ startTime = new Date(currentTime.getTime() + 3 * 1000);\n\n        var scheduledTile\
    \ = new Windows.UI.Notifications.ScheduledTileNotification(adaptivetileDom, startTime);\n\
    \        //Give the scheduled tile notification an ID\n        scheduledTile.id\
    \ = \"Future_Tile\";\n\n        var tileUpdater = Windows.UI.Notifications.TileUpdateManager.createTileUpdaterForApplication();\n\
    \        tileUpdater.addToSchedule(scheduledTile);\n    }\n```\n\nIn this method,\
    \ we set up new XML for the tile in a local variable, `adaptivetileXml`. We then\
    \ created a local object, `adaptivetileDom`, of type `XMLDocument`, in which we\
    \ loaded `adaptiveXml` text.\n\nTo send a scheduled update to tile, we first need\
    \ to set the scheduled time, for which we create a `startTime` local variable\
    \ and set the value to the current time and 3 seconds. For sending a scheduled\
    \ update of the tile, create a `tileUpdater` object of type `Windows.UI.Notifications.TileUpdateManager.createTileUpdaterForApplication()`\
    \ and then call `addToSchedule` method to send the update at a configured time.\n\
    \nTo execute the preceding method, add an HTML button and bind an event handler\
    \ to execute the preceding method. Open `default.html` and add the following HTML\
    \ snippet to add an HTML button with text, Scheduled Adaptive Tile.\n\n```\n<p>\n\
    \        <input type=\"button\" value=\"Scheduled  Adaptive Tile\" id=\"btnScheduledAdaptiveTile\"\
    \ />\n        <br />\n    </p>\n```\n\nNext, open `LoadTileandNotifications.js`\
    \ and update the existing `LoadTileandNotifications()` method with the following\
    \ lines of code:\n\n```\n     var ScheduledAdaptiveTilebutton = document.getElementById(\"\
    btnScheduledAdaptiveTile\");\n            ScheduledAdaptiveTilebutton.addEventListener(\"\
    click\", AddScheduledTileNotification, false);\n```\n\nThis adds a new `onclick`\
    \ event handler to the `btnScheduledAdaptiveTile` button and associates the `AddScheduledTileNotification`\
    \ method to be executed when the Scheduled Adaptive Tile button is clicked.\n\n\
    To test this, compile and run the app. When the `default.html` page is loaded,\
    \ click Scheduled Adaptive Tile button. This sends a notification to the tile\
    \ in 3 seconds. You can validate by checking the tile title and text, which change\
    \ on scheduled time.\n\nIn this recipe, you sent an update to the UWP app tile\
    \ at a scheduled time. Scheduled updates are useful when sending dynamic updated\
    \ based on changes in content, such as with weather apps, email apps, travel schedule\
    \ apps, and so forth.\n\n## 14.6 Create or Update a Badge on a Tile\n\n### Problem\n\
    \nYou want to add a badge to a tile.\n\n### Solution\n\nUse the `<badge>` element\
    \ in the tile XML payload to display a badge. Use `BadgeNotification` to create\
    \ a badge.\n\n### How It Works\n\nIn the existing project, we will add an additional\
    \ method, `UpdateTileBadge`, to show how to create a badge update on a tile. Open\
    \ `LoadTileandNotifications.js` and add the following method:\n\n```\n  function\
    \ UpdateTileBadge()\n    {\n        AddAdaptiveTiles();\n\n        var badgeXml\
    \ = \"<badge value=\\\"alarm\\\"/>\";\n        var badgeDom = Windows.Data.Xml.Dom.XmlDocument();\n\
    \        badgeDom.loadXml(badgeXml);\n\n        var notifications = Windows.UI.Notifications;\n\
    \        var badgeNotification = new notifications.BadgeNotification(badgeDom);\n\
    \n        notifications.BadgeUpdateManager.createBadgeUpdaterForApplication().update(badgeNotification);\n\
    \    }\n```\n\nIn this method, we call the `AdaptiveTiles()` method to display\
    \ adaptive tiles.\n\nThen we add `badgeXML`, which contains the XML payload for\
    \ the badge to display an alarm on the tile. In `badgeXml`, we set the value for\
    \ the badge to “Alarm”.\n\nThen we create a `badgeNotifications` object of type\
    \ `Windows.UI.Notifications.BadgeNotification` and pass the XML for badge notification.\n\
    \nFollowing this, call the `createBadgeUpdaterForApplication.update()` method\
    \ to update the tile with a badge notification.\n\nNow open `default.html` and\
    \ add a new button to test the `UpdateTileBadge()` method for updating the tile\
    \ with a badge.\n\n```\n<p> <input type=\"button\" value=\"Update Badge\" id=\"\
    btnUpdateBadge\" />\n        <br />\n    </p>\n```\n\nNext, open the `LoadTileandNotifications.js`\
    \ and update the `GetControl()` method with the following lines of code:\n\n```\n\
    var badgeUpdatebutton = document.getElementById(\"btnUpdateBadge\");\n       \
    \     badgeUpdatebutton.addEventListener(\"click\", UpdateTileBadge, false);\n\
    ```\n\nThis will add a new `onclick` event handler the `btnUpdateBadge` button\
    \ and associate `UpdateTileBadge` method to be executed when the Update Badge\
    \ button is clicked.\n\nWhen you compile and run this app, click the Update Badge\
    \ button on the `default.html` page. This will update the tile and the app tile\
    \ will display the badge with a Windows alarm glyph displayed in the right-hand\
    \ corner, as shown in Figure [14-5](#A978-1-4842-0719-2_14_Chapter.html#Fig5).\n\
    \n![A978-1-4842-0719-2_14_Fig5_HTML.jpg](A978-1-4842-0719-2_14_Fig5_HTML.jpg)\n\
    \nFigure 14-5.\n\nBadge notification on a Windows UWP adaptive tile\n\nThere are\
    \ different types of Windows glyphs that can be specified in the badge XML, such\
    \ as alarm, alert, available, error, paused, new message, and so forth.\n\n**Note:**\
    \ In UWP apps, badges are displayed in the lower-right corner.\n\nIn this chapter,\
    \ you learned about UWP app tiles and various ways to update tiles, and how to\
    \ add notifications via tiles, and how to dynamically update the content of adaptive\
    \ tiles.\n\n# Chapter 15: Device Capabilities\n\nThis chapter provides an overview\
    \ of the device capabilities in a Windows 10 app. You will also learn about how\
    \ to develop Bluetooth, text to speech, speech to text, and sensor capabilities\
    \ in your UWP apps. The chapter also provides an overview of Cortana integration\
    \ in apps.\n\n## 15.1 How to Specify Device Capabilities in an App Package Manifest\n\
    \n### Problem\n\nYou need to specify different devices’ capabilities required\
    \ by your Windows 10 app.\n\n### Solution\n\nUse the app package manifest file\
    \ to specify the `DeviceCapability` element and associated child elements."
  raw: '### How It Works


    In the previous recipe, you created an adaptive toast notification with XML Schema.
    In a similar manner, let’s create an interactive toast notification with actions
    that notify users on a new book added in the Apress catalog and allow users to
    take actions.


    Let’s use same project as in the previous recipe. Open the LoadTileandNotifications.js
    file and add the following `AddScheduledTileNotification()` method.


    `function AddScheduledTileNotification() {`


            `var adaptivetileXml = "<tile><visual displayName=\"Future recipes\" branding=\"name\">"`


    `+ "<binding template=\"TileSmall\"><group><subgroup><text hint-style=\"subtitle\">
    Updated Tiles </text><text hint-style=\"subtitle\">Adaptive Tiles</text></subgroup></group></binding>"`


    `+ "<binding template=\"TileMedium\"><group><subgroup><text hint-style=\"subtitle\">  Updated
    Tiles </text><text hint-style=\"subtitle\">Adaptive Tiles</text></subgroup></group></binding>"`


    `+ "<binding template=\"TileLarge\"><group><subgroup><text hint-style=\"subtitle\">  Updated
    Tiles </text><text hint-style=\"subtitle\">Adaptive Tiles</text></subgroup></group></binding>"`


    `+ "<binding template=\"TileWide\"><group><subgroup><text hint-style=\"subtitle\">  Updated
    Tiles </text><text hint-style=\"subtitle\">Adaptive Tiles</text></subgroup></group></binding>"`


    `+ "</visual></tile>";`


            `var adaptivetileDom = Windows.Data.Xml.Dom.XmlDocument();`


            `adaptivetileDom.loadXml(adaptivetileXml);`


            `var currentTime = new Date();`


            `//notification should appear in 3 seconds`


            `var startTime = new Date(currentTime.getTime() + 3 * 1000);`


            `var scheduledTile = new Windows.UI.Notifications.ScheduledTileNotification(adaptivetileDom,
    startTime);`


            `//Give the scheduled tile notification an ID`


            `scheduledTile.id = "Future_Tile";`


            `var tileUpdater = Windows.UI.Notifications.TileUpdateManager.createTileUpdaterForApplication();`


            `tileUpdater.addToSchedule(scheduledTile);`


        `}`


    In this method, we set up new XML for the tile in a local variable, `adaptivetileXml`.
    We then created a local object, `adaptivetileDom`, of type XMLDocument, in which
    we loaded `adaptiveXml` text.


    To send a scheduled update to tile, we first need to set the scheduled time, for
    which we create a `startTime` local variable and set the value to the current
    time and 3 seconds. For sending a scheduled update of the tile, create a `tileUpdater`
    object of type `Windows.UI.Notifications.TileUpdateManager.createTileUpdaterForApplication()`
    and then call `addToSchedule` method to send the update at a configured time.


    To execute the preceding method, add an HTML button and bind an event handler
    to execute the preceding method. Open default.html and add the following HTML
    snippet to add an HTML button with text, Scheduled Adaptive Tile.


    `<p>`


            `<input type="button" value="Scheduled  Adaptive Tile" id="btnScheduledAdaptiveTile"
    />`


            `<br />`


        `</p>`


    Next, open LoadTileandNotifications.js and update the existing `LoadTileandNotifications`()
    method with the following lines of code:


         `var ScheduledAdaptiveTilebutton = document.getElementById("btnScheduledAdaptiveTile");`


                `ScheduledAdaptiveTilebutton.addEventListener("click", AddScheduledTileNotification,
    false);`


    This adds a new `onclick` event handler to the `btnScheduledAdaptiveTile` button
    and associates the `AddScheduledTileNotification` method to be executed when the
    Scheduled Adaptive Tile button is clicked.


    To test this, compile and run the app. When the `default.html` page is loaded,
    click Scheduled Adaptive Tile button. This sends a notification to the tile in
    3 seconds. You can validate by checking the tile title and text, which change
    on scheduled time.


    In this recipe, you sent an update to the UWP app tile at a scheduled time. Scheduled
    updates are useful when sending dynamic updated based on changes in content, such
    as with weather apps, email apps, travel schedule apps, and so forth.


    ## 14.6 Create or Update a Badge on a Tile


    ### Problem


    You want to add a badge to a tile.


    ### Solution


    Use the `<badge>` element in the tile XML payload to display a badge. Use `BadgeNotification`
    to create a badge.


    ### How It Works


    In the existing project, we will add an additional method, `UpdateTileBadge`,
    to show how to create a badge update on a tile. Open LoadTileandNotifications.js
    and add the following method:


      `function UpdateTileBadge()`


        `{`


            `AddAdaptiveTiles();`


            `var badgeXml = "<badge value=\"alarm\"/>";`


            `var badgeDom = Windows.Data.Xml.Dom.XmlDocument();`


            `badgeDom.loadXml(badgeXml);`


            `var notifications = Windows.UI.Notifications;`


            `var badgeNotification = new notifications.BadgeNotification(badgeDom);`


            `notifications.BadgeUpdateManager.createBadgeUpdaterForApplication().update(badgeNotification);`


        `}`


    In this method, we call the `AdaptiveTiles()` method to display adaptive tiles.


    Then we add `badgeXML`, which contains the XML payload for the badge to display
    an alarm on the tile. In `badgeXml`, we set the value for the badge to “Alarm”.


    Then we create a `badgeNotifications` object of type `Windows.UI.Notifications.BadgeNotification`
    and pass the XML for badge notification.


    Following this, call the `createBadgeUpdaterForApplication.update()` method to
    update the tile with a badge notification.


    Now open default.html and add a new button to test the `UpdateTileBadge()` method
    for updating the tile with a badge.


    `<p> <input type="button" value="Update Badge" id="btnUpdateBadge" />`


            `<br />`


        `</p>`


    Next, open the LoadTileandNotifications.js and update the `GetControl()` method
    with the following lines of code:


    `var badgeUpdatebutton = document.getElementById("btnUpdateBadge");`


                `badgeUpdatebutton.addEventListener("click", UpdateTileBadge, false);`


    This will add a new onclick event handler the `btnUpdateBadge` button and associate
    `UpdateTileBadge` method to be executed when the Update Badge button is clicked.


    When you compile and run this app, click the Update Badge button on the `default.html`
    page. This will update the tile and the app tile will display the badge with a
    Windows alarm glyph displayed in the right-hand corner, as shown in Figure [14-5](#A978-1-4842-0719-2_14_Chapter.html#Fig5).


    ![A978-1-4842-0719-2_14_Fig5_HTML.jpg](A978-1-4842-0719-2_14_Fig5_HTML.jpg)


    Figure 14-5.


    Badge notification on a Windows UWP adaptive tile


    There are different types of Windows glyphs that can be specified in the badge
    XML, such as alarm, alert, available, error, paused, new message, and so forth.


    Note


    In UWP apps, badges are displayed in the lower-right corner.


    In this chapter, you learned about UWP app tiles and various ways to update tiles,
    and how to add notifications via tiles, and how to dynamically update the content
    of adaptive tiles.


    # Chapter 15: Device Capabilities


    This chapter provides an overview of the device capabilities in a Windows 10 app.
    You will also learn about how to develop Bluetooth, text to speech, speech to
    text, and sensor capabilities in your UWP apps. The chapter also provides an overview
    of Cortana integration in apps.


    ## 15.1 How to Specify Device Capabilities in an App Package Manifest


    ### Problem


    You need to specify different devices’ capabilities required by your Windows 10
    app.


    ### Solution


    Use the app package manifest file to specify the `DeviceCapability` element and
    associated child elements.'
  trans: "\n### 工作原理\n\n在上一节中，你使用 XML 架构创建了一个自适应 Toast 通知。现在，我们以类似的方式，创建一个包含操作按钮的交互式\
