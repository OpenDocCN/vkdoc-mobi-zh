- fmt: "### How It Works\n\nLet’s see how to perform simple data binding in your apps.\n\
    \nOpen Visual Studio 2015. Select File ➤ New Project ➤ JavaScript ➤ Windows ➤\
    \ Universal ➤ Blank App (Universal Windows) template (see Figure [5-1](#A978-1-4842-0719-2_5_Chapter.html#Fig1)).\n\
    \n![A978-1-4842-0719-2_5_Fig1_HTML.jpg](A978-1-4842-0719-2_5_Fig1_HTML.jpg)\n\n\
    Figure 5-1.\n\nNew Project dialog. Visual Studio creates the Universal Windows\
    \ Apps blank project with all the necessary files added to the solution. Open\
    \ `default.js`, which is found under the `js` folder. Add the following lines\
    \ of code inside the immediately invoked function, just after the `'use strict'`\
    \ directive:\n\n```\n(function () {\n    \"use strict\";\n    //create a person\
    \ object\n    var person = {\n        name: \"John Doe\",\n        age: 36,\n\
    \        designation: \"Technical Evangelist\",\n        city: \"Boston\",\n \
    \   };\n    var app = WinJS.Application;\n    var activation = Windows.ApplicationModel.Activation;\n\
    \    app.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n            } else {\n            }\n            args.setPromise(WinJS.UI.processAll());\n\
    \        }\n    };\n    app.oncheckpoint = function (args) {\n    };\n    app.start();\n\
    })();\n```\n\nLet’s bind the `Person` object to a `div` element in the HTML.\n\
    \nOpen `default.html`, which is found in the root of the project. Replace the\
    \ contents of `<body>` with the following:\n\n```\n<div id=\"container\">\n  \
    \  <h3>Name:</h3>\n    <h2><span data-win-bind=\"innerText: name\"></span></h2>\n\
    \    <h3>Age:</h3>\n    <h2><span data-win-bind=\"innerText: age\"></span></h2>\n\
    \    <h3>Designation:</h3>\n    <h2><span data-win-bind=\"innerText: designation\"\
    ></span></h2>\n    <h3>City:</h3>\n    <h2><span data-win-bind=\"innerText: city\"\
    ></span> </h2>\n</div>\n```\n\nYou have a `span` element and you have a defined\
    \ `data-win-bind` attribute for data binding. You are binding the `innerText`\
    \ property of the `span` element with data property of the `Person` object you\
    \ created in `default.js`.\n\nNext, you need to modify the `onactivated` function\
    \ and add the data binding call. Modify `app.onactivated`, as shown here:\n\n\
    ```\napp.onactivated = function (args) {\n        if (args.detail.kind === activation.ActivationKind.launch)\
    \ {\n            if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n                // TODO: This application has been newly launched. Initialize\n\
    \                // your application here.\n            } else {\n           \
    \     // TODO: This application has been reactivated from suspension.\n      \
    \          // Restore application state here.\n            }\n            var\
    \ container = document.querySelector('#container');\n            var prmise =\
    \ WinJS.UI.processAll().then(function () {\n                WinJS.Binding.processAll(container,\
    \ person)\n            })\n            args.setPromise(prmise);\n        }\n \
    \   };\n```\n\nBuild and run the app by pressing `F5` in Visual Studio. Figure\
    \ [5-2](#A978-1-4842-0719-2_5_Chapter.html#Fig2) shows the output on a Windows\
    \ Mobile screen.\n\n![A978-1-4842-0719-2_5_Fig2_HTML.jpg](A978-1-4842-0719-2_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2.\n\nSnapshot of Windows Mobile output.\n\nAs you can see, you have\
    \ the values of the `Person` object (defined in `default.js`) bound to HTML elements.\
    \ This is possible because of the `WinJS.Binding` namespace. If you remember,\
    \ you called the `WinJS.Binding.processAll()` method inside the `onactivated`\
    \ function. The `processAll()` method binds the value of an object to the values\
    \ of a DOM element that has the `data-win-bind` attribute. In the demo code, you\
    \ had set the `data-win-bind` attribute on `div` elements that output name, age,\
    \ designation, and city information.\n\n## 5.2 Data Bind Style Attributes of DOM\
    \ Elements\n\n### Problem\n\nHTML elements can be styled by using CSS definitions.\
    \ At runtime, the style attributes need to be bound to the data properties of\
    \ the underlying business object data properties.\n\n### Solution\n\nApart from\
    \ providing data binding to properties of the DOM element, the `WinJS` data binding\
    \ framework provides options to bind style attributes of DOM elements too. The\
    \ style attributes can be bound to the data property of the bound object in the\
    \ `data-win-bind` attribute.\n\n### How It Works\n\nOpen Visual Studio 2015. Select\
    \ File ➤ New Project ➤ JavaScript ➤ Windows ➤ Universal ➤ Blank App (Universal\
    \ Windows) template. This creates a Universal Windows app template (see Figure\
    \ [5-3](#A978-1-4842-0719-2_5_Chapter.html#Fig3)).\n\n![A978-1-4842-0719-2_5_Fig3_HTML.jpg](A978-1-4842-0719-2_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3.\n\nNew Project dialog. Open `default.js` in the `js` folder. Add\
    \ the following code inside the immediately invoked function after the `'use strict'`\
    \ directive:\n\n```\n(function () {\n    \"use strict\";\n    //create person\
    \ object\n    var person = {\n        name: \"John Doe\",\n        age: 36,\n\
    \        designation: \"Technical Evangelist\",\n        city: \"Boston\",\n \
    \       favcolor: \"orange\"\n    };\n    //Other app set-up code\n})();\n```\n\
    \nYou have added a `favcolor` property to the `Person` object. Let’s bind the\
    \ `favcolor` to a `div` element’s `background-color` style property.\n\nOpen `default.html`,\
    \ which is found in the root of the project. Replace the `<body>` content with\
    \ the following:\n\n```\n<h1>Data Bind Attributes</h1>\n    <br />\n    <div id=\"\
    container\">\n        <h3>Name:</h3>\n        <h2><span data-win-bind=\"innerText:\
    \ name\"></span></h2>\n        <h3>Age:</h3>\n        <h2><span data-win-bind=\"\
    innerText: age\"></span></h2>\n        <h3>Designation:</h3>\n        <h2><span\
    \ data-win-bind=\"innerText: designation\"></span></h2>\n        <h3>City:</h3>\n\
    \        <h2><span data-win-bind=\"innerText: city\"></span> </h2>\n        <h3>Fav\
    \ Color:</h3>\n        <div data-win-bind=\"style.background: favcolor\" >\n \
    \           <div class=\"favcolor\" data-win-bind=\"innerText: favcolor\"></div>\n\
    \        </div>\n    </div>\n```\n\nGo back to the `default.js` file again. Modify\
    \ the `onactivated` method as follows:\n\n```\napp.onactivated = function (args)\
    \ {\n        if (args.detail.kind === activation.ActivationKind.launch) {\n  \
    \          if (args.detail.previousExecutionState !== activation.ApplicationExecutionState.terminated)\
    \ {\n                // TODO: This application has been newly launched. Initialize\n\
    \                // your application here.\n            } else {\n           \
    \     // TODO: This application has been reactivated from suspension.\n      \
    \          // Restore application state here.\n            }\n            var\
    \ container = document.querySelector(\"#container\");\n            var prmise\
    \ = WinJS.UI.processAll().then(function () {\n                WinJS.Binding.processAll(container,\
    \ person)\n            })\n            args.setPromise(prmise);\n        }\n \
    \   };\n```\n\nYou just call the `WinJS.Binding.processAll()` as usual on the\
    \ container that needs to be data bound.\n\nNext, build and run the app by pressing\
    \ `F5` in Visual Studio. The output on a Windows Mobile screen is shown in Figure\
    \ [5-4](#A978-1-4842-0719-2_5_Chapter.html#Fig4).\n\n![A978-1-4842-0719-2_5_Fig4_HTML.jpg](A978-1-4842-0719-2_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4.\n\nSnapshot of Windows Mobile output.\n\n## 5.3 Use Templates for\
    \ Data Binding\n\n### Problem\n\nSimple data binding can bind to only one data\
    \ item at a time. When you have a list of data items, a simple data binding method\
    \ won’t suffice."
