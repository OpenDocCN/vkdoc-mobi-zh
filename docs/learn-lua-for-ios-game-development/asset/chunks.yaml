    \ Gideros Studio 则通过提供插件来填补其空白。虽然在 Gideros Studio 中像在屏幕上显示图像这样的简单任务可能略显复杂，但它允许你维护一个函数库以实现更简单的使用，正如本章示例所示。\n"
- fmt: '# Moai Framework Overview


    In this chapter, we consider another framework: Moai. Among the options for developing
    cross-platform mobile applications, Moai is the tool for professional game developers.
    It is an open source platform that provides C++ classes wrapped in Lua. These
    allow for development of basic 2D and 3D games for a variety of platforms: iOS,
    Android, Windows, Mac OS X, and Chrome. Moai is available as the free-to-use Moai
    SDK, which requires a “Made with Moai” splash screen or a mention in the game’s
    credits. Moai also offers a paid service, Moai Cloud Services, which can be integrated
    in apps built with or without Moai.


    ## What Is Moai?


    The idea of Moai stemmed from its developers, who were veterans in the gaming
    industry. It’s not for hobbyists wanting to make a quick app; the learning curve
    on Moai can be a bit steep. This little hurdle can be overcome somewhat by RapaNui,
    an open source layer that offers Moai via some high-level APIs (discussed in [Chapter
    13](#9781430246626_Ch13.xhtml)). A few commercially available apps have been made
    with Moai, and more are in the works. Nearly all of them have the A-level excellence
    expected from large studios, and most have a large number of downloads. At the
    core of Moai are the C++ libraries that help you write cross-platform applications
    for mobile, browsers, and the desktop. However, the Lua interface takes away the
    need to deal with these complex libraries. These C++ libraries wrapped in Lua
    also allow for access to many low-level functions. Once you have learned the basics
    of app development, specifically gaming, Moai is a logical choice as a professional
    tool set.


    ## Obtaining Moai


    Your first step is to create an account with Moai and then download the SDK. You
    can choose from the following:


    *   SDK release version 1.3 (build 98)

    *   SDK developer build 1.3 (build 102)

    *   Moai source code


    Straight out of the box, Moai has no IDE or tools like Gideros Studio does. However,
    it does contain the `moai` binary to test the Lua code with. When you unpack the
    ZIP file (which is the same for all platforms), the `bin` directory contains the
    libraries for all platforms, and also contains the executables (which act as the
    simulators to test the Moai code) for Windows and Mac OS X.


    ## The Moai SDK


    The first thing you need to start development with Moai is a text editor (some
    alternatives are discussed in [Chapter 13](#9781430246626_Ch13.xhtml)), as there
    is no IDE that integrates development for Moai (however ZeroBrane fills in that
    gap, but is not included with Moai by default).


    The `bin` directory has the executables for Windows and Mac; you can run `moai`
    in the terminal window and pass it the Lua files you want to run. For Windows,
    pass `moai.exe main.lua`; for Mac OS X, pass `moai main.lua`.


    If you run the Hello Moai code from the samples folder, either via `run.bat` or
    `run.sh`, you should see the output on the screen shown in [Figure 10-1](#9781430246626_Ch10.xhtml#Fig1).


    ![9781430246626_Fig10-01.jpg](OEBPS/Images/9781430246626_Fig10-01.jpg)


    [Figure 10-1](#9781430246626_Ch10.xhtml#_Fig1). The Moai simulator running a sample
    app


    ## Hello Moai


    There are a couple of things we need to do to get an app in Moai running. First,
    we need a window to display our application, which will double as the simulator
    on the desktop. We create a window using the `MOAISim` class and call the `openWindow`
    function. The `openWindow` function takes three parameters: a title, a width,
    and a height.


    ```

    MOAISim.openWindow("Hello World Window", 320,480)

    ```


    Then we need to create a viewport. Since Moai uses OpenGL, to create a drawing
    surface, we need to set the size of the surface that we want to use for rendering.
    This rectangular area is called a *viewport*. The viewport needs to be created
    and set before we can start rendering. Here’s how:


    ```

    viewport = MOAIViewport.new()

    viewport:setSize(320,480)

    viewport:setScale(320,480)

    ```


    We can set the size to a specific size or simply use the entire surface by not
    passing any parameters to the `setSize` function. All rendering is based on units;
    these units are not necessarily the same as pixels. However, you can set these
    units using the `setScale` function. These units define the size of the pixels
    rendered by calculating them based on the size of the viewport and the scale setting.
    The size of the pixel is determined with the following two equations:


    ```

    pixelsizeX = viewportSizeWidth / viewportScaleX

    pixelsizeY = viewportSizeHeight / viewportScaleY

    ```


    A size of 320×480 and a scale of 320, 480 sets the pixel size to 1. Setting a
    scale of 10, 15 with a size of 320×480 would give a pixel size of 32×32. The same
    scale of 10, 15 on a surface of size 640×960 would give a pixel size of 64×64.
    In this case, you would see the display stretch to fill in the space.


    The coordinate system in Moai is organized with the origin (0,0) at the center
    of the screen. The y-axis is positive moving up the screen. A point with a value
    of 100 is higher on the screen than a point with a lower value like 20. You can
    invert the axis to have a negative scale by setting the scale with a negative
    value:


    ```

    viewport:setScale(320, -480)

    ```


    The viewport can also be changed using the `setOffset` function. The offset is
    set in a projection space that is set up to be 2×2. Setting the offset as −1,
    1 moves the projection system one half to the left and one half up. This will
    in effect place the origin at the upper-left corner of the screen.


    ```

    viewport:setOffset(-1,1)

    ```


    Moai does not render any sprite, image, or a display object directly; rather,
    these are rendered onto a *layer*. Several layers can be stacked on top of each
    other. Each layer needs to be associated with a viewport.


    ```

    layer = MOAILayer2D.new()

    layer:setViewport(viewport)

    ```


    The layer then needs to be pushed onto a render stack before it can be rendered.


    ```

    MOAISim.pushRenderPass(layer)

    ```


    Once we’ve set up the layer for rendering, we need a display object to display
    on this layer. In Moai, a scene graph object is called a *prop*; this is a combination
    of the location on the surface and the representation of the object. The geometry,
    or the representation of the object (e.g., a triangle, quad, or spline) is held
    in what is called a *deck*. A deck can hold multiple geometry items, and can also
    be called a *set*.


    There are several types of decks to choose from:


    *   `MOAIGfxQuad2D`: This is a single textured quad.

    *   `MOAIGfxQuadDeck2D`: This is an array of textured quads (from one texture).
    This is similar to what we would refer to as a sprite sheet.

    *   `MOAIGfxQuadListDeck2D`: This is an array of lists of textured quads (from
    one texture). This can be used for advanced sprite sheets.

    *   `MOAIMesh`: This is a custom vertex buffer object (used for 3D).

    *   `MOAIStretchPatch2D`: This is a single patch that contains stretchable rows
    and columns.

    *   `MOAITileDeck2D`: This is used for creating a tile map and sprite sheets that
    are accessed via an index. The texture is divided into *n×m* tiles, which are
    all of the same size. It can be used for frame animation.


    We can create a single textured quad using the `MOAIGfxQuad2D` class and load
    an image to use as the quad’s texture:


    ```

    gfxQuad = MOAIGfxQuad2D.new()

    gfxQuad:setTexture("myTile.png")

    gfxQuad:setRect(-32,-32, 32, 32)

    ```


    Once the quad is created, we need to create a prop that will display the quad.
    We set the rect using the `setRect` function or the quad, which is similar to
    setting the dimensions of the quad:


    ```

    prop = MOAIProp2D.new()

    prop:setDeck(gfxQuad)

    prop:setLoc(32,32)

    ```


    Finally, we need to add this prop to the layer so that it is rendered:


    ```

    layer:insertProp(prop)

    ```


    The entire block of code is shown following. When we run it, we see the image
    on the screen.


    ```

    MOAISim.openWindow ( "test", 320, 480 )


    viewport = MOAIViewport.new ()

    viewport:setSize ( 320, 480 )

    viewport:setScale ( 320, 480 )

    ```'
