    \ A = Unpack(Colors[Thecolor])\n  A = A Or 255\n  Theobject:Setfillcolor(R, G,\
    \ B, A) \nEnd \n```\n\n以下是 Gideros Studio 特有的代码：\n\n```lua\nFunction Colorize(Theobject,\
