    \      }\n\nif collides(nRect, pRect) == true then\n        reduceLife()\n   \
    \     break\n      end\n    end\n  end\n  hx, hy = getPosition(survivor)\n  sRect\
    \ = {\n    x = hx,\n    y = hy,\n    wd = hx + survivor.width,\n    ht = hy +\
