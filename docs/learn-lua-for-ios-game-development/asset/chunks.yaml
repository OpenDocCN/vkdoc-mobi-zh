- fmt: '# Lua 入门


    作为一名对开发感兴趣的人，你已经迈出了这段旅程的第一步。你可能是从未开发过的学生，也可能是能在几分钟内构建企业级应用的资深开发者。关键是，无论你的背景如何，你出于某种原因被这门听起来很奇怪的语言——`Lua`（发音为
    *LOO-ah*）所吸引。


    ## 什么是 Lua？


    `Lua` 是一种编程语言，它占用空间小，可跨多个平台运行，并且非常灵活且可扩展。此外，对于想要为移动设备编写应用的开发者来说，`Lua` 是一个颠覆性的工具。它驱动了苹果应用商店中的许多应用和游戏，已故的史蒂夫·乔布斯也曾提及它。它甚至与一种最先进的自复制和变异病毒
    `Flame` 有关联。尽管如此，`Lua` 仍然是一门看起来更像普通英语而非晦涩程序员语言的语言，这使得它的学习曲线较为平缓。


    ## Lua 的历史


    虽然了解 `Lua` 的历史不会让任何人成为更好的程序员，但了解为什么要使用 `Lua` 是很重要的。


    `Lua` 是由巴西里约热内卢天主教大学的 `Roberto Ierusalimschy`、`Luiz Henrique de Figueiredo` 和
    `Waldemar Celes` 创建的，他们是计算机图形技术组的成员。通常，大学研究的资金由工业界提供，工业界也期望解决他们面临的一些问题。巴西石油公司
    `Petrobas` 是该组帮助解决数据录入相关问题的客户之一。石油公司的运营规模庞大，每天需要处理大量数据交易。他们请求该组设计一个图形化前端，以帮助消除数据录入中的错误，尤其是在处理来自固定格式文件的遗留代码时。


    `TeCGraf` 审视了提供给他们的整个屏幕系列，并试图找到某种形式的统一性来帮助找到解决方案。为此，他们提出了一种简单且统一的数据录入语言（`DEL`），用于描述每个数据录入任务中的数据。我认为一个很好的类比是
    `XML`，但没有那么多让人困惑的标签。这样，人们可以定义实体以及限制或规则。这变得非常流行，因为很容易定义实体并创建有助于验证数据的记录。


    随着流行度的增加，功能需求也随之而来。使用 `DEL` 的用户现在要求更多的功能，这促使 `DEL` 从一门描述性语言向编程语言转变，需求包括循环、条件控制等。如果你是一名
    90 年代的软件开发人员，你会意识到许多开发人员花费时间的一个方面是更改数据录入屏幕的颜色和字体。该组创建了另一种专门的描述语言来允许设置这些属性。这被称为简单对象语言（`SOL`），因为它允许用户创建对象并操作对象的颜色、字体和其他特性（*Sol*
    在葡萄牙语中也意为 *太阳*）。


    这种语言的架构更像是一种编译即运行的语言，而不是集成开发环境类型的应用。`API` 作为 `C` 库实现，并链接到主程序。每种类型都可以有一个充当构造函数的回调函数（即，当创建特定类型的对象时调用该函数）。1993
    年，创建者意识到 `DEL` 和 `SOL` 可以合并为一门更强大的语言。这催生了一门名副其实的编程语言，它将拥有所有功能：赋值、控制结构、子程序、函数等。然而，它还必须满足能够提供类似
    `DEL` 或 `SOL` 的数据描述功能的基本要求。他们希望它是一门易于使用的语言，没有晦涩的语法和语义，因为最终用户不一定是专业程序员。最后，他们希望它具有可移植性，能够在任何平台上运行（如果需要的话）。


    因为这原来是 `SOL` 的一个修改版本，创建者将这门新程序称为 *Lua*（在葡萄牙语中意为 *月亮*）。


    ## Lua 时间线


    截至撰写本文时，`Lua` 的版本是 5.2.1。它经历了许多变化，并被广泛应用于企业、娱乐、游戏和应用的众多项目中。对我们许多人来说，得知 `Lua` 几乎每天都在南美家庭中被使用可能会感到惊讶。它为他们的交互式电视提供动力。大学在研究中使用
    `Lua` 来实现快速处理和结果。


    1996 年，在 *Dr. Dobbs* 杂志上发表了一篇文章后，`Lua` 在国际上获得了关注。文章发表后，收到了来自开发者的电子邮件。在一篇论文中，`Roberto`
    讲述了 `LucasArts`（因《冥界狂想曲》而闻名）的首席程序员 `Bret Mogilefsky` 如何想要用 `Lua` 替换他们的脚本语言 `SCUMM`。这引起了其他开发者的兴趣，`Lua`
    开始出现在新闻组中。


    ## 开始使用 Lua


    我在本书中会反复强调一个要点：对于 `Lua` 来说，使用什么框架并不重要；重要的是将所有部分粘合在一起的胶水：`Lua`。在 90 年代，微软正在推动客户端-服务器和三层架构（类似于苹果一直在推动的
    MVC [模型-视图-控制器]）。MVC 背后的理念是它包含三个不同的部分：一个 *模型*，负责处理数据；一个 *视图*，显示来自模型的数据并提供与用户的交互；以及一个
    *控制器*，在模型和视图之间进行通信，因为这两者彼此之间完全不了解对方的存在。控制器是帮助两者相互对话的中介。使用 MVC 最常见的方式是使用一个框架，该框架会为你处理许多细节。


    在本书中，我将介绍几个框架：`CoronaSDK`、`Gideros Studio`、`Moai`、`Codea` 和 `LÖVE`。除 `LÖVE` 之外，所有这些框架都支持在
    iOS 平台上开发和运行应用。基于 `Lua` 的移动应用架构很简单，如图 1-1 所示。


    ![9781430246626_Fig01-01.jpg](OEBPS/Images/9781430246626_Fig01-01.jpg)


    *图 1-1. 在移动设备平台上使用 Lua 的应用架构*


    一个应用由所有资源（图形、音乐、文本等）组成，这些资源与 `Lua` 代码以及框架存根一起编译到应用中。运行时，框架或引擎会创建一个 `OpenGL` 表面，所有图形都在其上显示。这就是所有框架的工作方式，也是它们能够提供跨平台兼容性的原因。对框架的限制主要来自于
    `OpenGL` 或框架引擎本身的限制。'
  raw: 'As a person that has an interest in development, you have made the first step
    in this journey. You could be a student that has never developed before, or you
    could be a guru developer who can whip up an enterprise app in minutes. The point
    is that whatever your background, you are for some reason drawn to this strange-sounding
    language, Lua (pronounced *LOO-ah*.).


    What Is Lua?


    Lua is a programming language that has a small footprint, works across several
    platforms, and is quite flexible and extensible. Further, Lua is a game changer
    for developers that want to write apps for the mobile devices. It has powered
    a lot of apps and games in the Apple App Store, and it has been spoken about by
    the late Steve Jobs. It has even been linked with one of the most advanced self-replicating
    and mutating viruses, the Flame. Despite all of that, Lua remains to be a language
    that seems more like plain English than a cryptic programmer’s language, making
    it a language with a smaller learning curve.


    The History of Lua


    While knowing the history of Lua will not change anything in terms of making anyone
    a better programmer, it important to get an idea of why you’d want to use Lua.


    Lua was created at the Pontifical Catholic University of Rio de Janeiro, Brazil,
    by Roberto Ierusalimschy, Luiz Henrique de Figueiredo, and Waldemar Celes, who
    were members of the Computer Graphics Technology Group (TeCGraf). Generally, funding
    for university research is provided by industry, which also expects solutions
    to some problems that they face. Petrobas, a Brazilian oil company, one of the
    clients this group was helping them resolve issues related to data entry. Operations
    of a petroleum company are large, and a large number of data transactions were
    to be processed on a daily basis. They approached the group to devise a graphical
    front end that would help eliminate errors in data entry, especially when working
    with legacy code from fixed-format files.


    TeCGraf looked at the whole series of screens that were provided to them and tried
    to find some form of uniformity to help find a solution. For this they came up
    with a simple and unified data entry language (DEL), which was used to describe
    the data in each data entry task. I think a good parallel would be that of XML,
    but without the multitude of tags that make it confusing to understand. That way
    one could define the entities and the restrictions or rules. This became very
    popular, as it was easy to define entities and create records that would help
    validate the data.


    With popularity came feature requests, so the users that were using DEL now required
    more functionality, which was pushing DEL from being a descriptive language to
    a programming language with requests such as loops, conditional control, and so
    on. If you were a software developer in the ’90s, you will realize that one of
    the aspects that many developers spent time on was changing the color and font
    of the data entry screens. The group created another specialized description language
    that allowed for setting these attributes. This was called Simple Object Language
    (SOL), as it allowed the user to create an object and manipulate the color, font,
    and other characteristics of the object. (*Sol* also means *sun* in Portuguese.)


    The architecture of this language was made more like that of a compile-and-run-type
    of language than that of an IDE-type application. The API was implemented as a
    C library and linked to the main program. Each type could have a callback function
    that functioned as the constructor (i.e., the function is called when an object
    of a particular type is created). In 1993, the creators realized that DEL and
    SOL could both be combined into a single more powerful language. This led to a
    proper programming language that would have it all: assignment, control structures,
    subroutines, functions, and so on. However, it would also work with the basic
    requirement to be able to offer data-description facilities like those of DEL
    or SOL. They wanted it to be an easy–to-use language without cryptic syntax and
    semantics, as the end users weren’t expected to be professional programmers. Lastly,
    they wanted it to be portable to run on any and every platform (if required).


    Because it was a modified version of SOL, the creators called this new program
    *Lua* (which mean moon in Portuguese).


    Lua Timeline


    As of this writing, Lua is in version 5.2.1\. It has undergone quite a few changes
    and has been used extensively in many projects for enterprise, entertainment,
    games, and apps. For many of us, it might come as a surprise that Lua is used
    in South American homes practically on a daily basis. It powers their interactive
    televisions. Universities use Lua in their research to allow for quick processing
    and results.


    In 1996, Lua got exposure internationally after an article in *Dr. Dobbs*. Following
    the article, there were e-mails from developers. In a paper, Roberto narrates
    about how Bret Mogilefsky, who was the lead programmer at LucasArts (of Grim Fandango
    fame), wanted to replace their scripting language SCUMM with Lua. This drew interest
    from other developers, and Lua started to appear on newsgroups.


    Starting with Lua


    One important point that I’ll make throughout the book is that, with Lua, it doesn’t
    matter what framework you use; what’s important is the glue that holds it all
    together: Lua. In the ’90s, Microsoft was pushing client-server and three-tier
    architecture (similar to what Apple has been pushing as MVC [Model-View-Controller]).
    The idea behind MVC is that it involves three distinct portions: a *model*, which
    takes care of the data; a *view*, which displays the data from the model and provides
    interaction with the user; and a *controller*, which communicates between the
    model and the view, as these two do not have any idea of each other’s existence.
    The controller is the broker that helps the two talk to each other. The most usual
    way to work with MVC is to use a framework, which takes care of a lot of the details
    for you.


    In this book, I shall cover a few frameworks: CoronaSDK, Gideros Studio, Moai,
    Codea, and LÖVE. All of these except LÖVE help develop and run apps on the iOS
    platform. The architecture of a Lua-based mobile app is simple, as the diagram
    in [Figure 1-1](#9781430246626_Ch01.xhtml#Fig1) shows.


    ![9781430246626_Fig01-01.jpg](OEBPS/Images/9781430246626_Fig01-01.jpg)


    [Figure 1-1](#9781430246626_Ch01.xhtml#_Fig1). The architecture of an app using
    Lua on a mobile device platform


    An application is made up of all the resources graphics, music, text, etc.), which
    are compiled into the application,  with the Lua code along with the framework
    stub. When run, the framework or the engine creates an OpenGL surface on which
    all of the graphics are displayed. This is how all of the frameworks work, and
    this is how they can offer cross-platform compatibility. The limitations on the
    framework are imposed mainly due to either the limitations of OpenGL or the framework
    engine.'
