    end\n\nreturn _vec2D\n```\n\n## Summary\n\nThe functions described in this chapter\
    \ represent only a small selection of the functionality you might need when creating\
    \ your games. Some of the most frequently used functions were included here, and\
    \ they can be used in many ways. The tips and tricks mentioned in this section\
    \ are generic and do not rely on any particular framework, which means that they\
    \ will work with every Lua-based framework mentioned in this book. After you finish\
