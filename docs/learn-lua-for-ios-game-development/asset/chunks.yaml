    图 14-23 .  在 PhysicsEditor 中勾勒图像轮廓，以便与物理引擎配合使用


    ### Particle Designer


    - *URL*: [`particledesigner.71squared.com/`](http://particledesigner.71squared.com/)

    - *价格*: $7.99

    - *平台*: Mac OS X

    '
- fmt: '# With the advent of modern devices, gamers are no longer satisfied with simple
    effects. Developers are creating games that are increasingly realistic, and a
    big part of that comes from the use of particle engines. `Particle Designer` is
    a visual tool for creating particle effects. `Particle Designer` allows you to
    experiment and tweak the parameters of your particles, and even save your settings
    as presets (in `PEX` files) to reuse. `Moai` in particular has `API` functions
    for loading and using `PEX` files directly. [Figure 14-24](#9781430246626_Ch14.xhtml#Fig24)
    shows some of the wide variety of effects you can create with `Particle Designer`.


    ![9781430246626_Fig14-24.jpg](OEBPS/Images/9781430246626_Fig14-24.jpg)


    [Figure 14-24](#9781430246626_Ch14.xhtml#_Fig24) . Various effects you can create
    with `Particle Designer`


    ## Glyph Designer


    * *URL*: [http://glyphdesigner.71squared.com/](http://glyphdesigner.71squared.com/)

    * *Price*: $29.99

    * *Platforms*: Mac OS X


    This is another app from the author of `Particle Designer`. `Glyph Designer` facilitates
    creating bitmap fonts. In a couple of clicks, you can generate amazing-looking
    font sheets for use in your apps. Bitmap fonts are supported in most of the frameworks.
    [Figure 14-25](#9781430246626_Ch14.xhtml#Fig25) shows a bitmap font sheet created
    using `Glyph Designer`. `Corona SDK` requires the `Text Candy` library (discussed
    in [Chapter 13](#9781430246626_Ch13.xhtml)) to use fonts created via `Glyph Designer`.
    While `Gideros` and `Moai` have built-in `API` to handle bitmap or glyph fonts,
    `Glyph Designer` has the advantage of being able to create gradient fills, apply
    shadows, and create font textures almost instantly.


    ![9781430246626_Fig14-25.jpg](OEBPS/Images/9781430246626_Fig14-25.jpg)


    [Figure 14-25](#9781430246626_Ch14.xhtml#_Fig25) . Creating a bitmap font in `Glyph
    Designer`


    ## Spriteloq


    * *URL*: [www.loqheart.com/spriteloq](http://www.loqheart.com/spriteloq)

    * *Price*: $49 or $99 (includes 2 hours of premium support)

    * *Platforms*: Mac OS X


    This is another tool that helps create sprite sheets from Flash SWF movies. If
    you create some of your animations in Flash, you can use `Spriteloq` to very easily
    convert them into sprite sheets for animating in your app, as shown in [Figure
    14-26](#9781430246626_Ch14.xhtml#Fig26). Though the `Spriteloq` output is specific
    to `Corona SDK`, the generated files can be parsed and used with any framework.


    ![9781430246626_Fig14-26.jpg](OEBPS/Images/9781430246626_Fig14-26.jpg)


    [Figure 14-26](#9781430246626_Ch14.xhtml#_Fig26) . Creating a sprite sheet from
    a Flash animation (SWF) in `Spriteloq`


    **Note** Lanica has purchased `Spriteloq` and is now called `Animo` ([http://lanica.co/about/animo/](http://lanica.co/about/animo/))
    and the price has gone up to $149.


    ## Zoë


    * *URL*: [http://easeljs.com/zoe.html](http://easeljs.com/zoe.html)

    * *Price*: Free

    * *Platforms*: Mac OS X


    `Zoë` is a free program for creating sprite sheets from Flash movies. The options
    available with `Zoë` are limited in comparison to those of `Spriteloq` and `TexturePacker`,
    but the advantage is that it’s free. [Figure 14-27](#9781430246626_Ch14.xhtml#Fig27)
    shows `Zoë` in action playing an SWF animation frame by frame.


    ![9781430246626_Fig14-27.jpg](OEBPS/Images/9781430246626_Fig14-27.jpg)


    [Figure 14-27](#9781430246626_Ch14.xhtml#_Fig27) . `Zoë` playing a Flash animation


    ## TNT Animator Studio


    * *URL*: [www.tntparticlesengine.com](http://www.tntparticlesengine.com)

    * *Price*: Free

    * *Platforms*: Mac OS X, Windows


    While most of the utilities mentioned previously generate sprite sheets from individual
    images, `TNT Animator Studio` is a tool that generates animations from these sprite
    sheets. The application is currently aimed for use with `Gideros Studio` and includes
    a `Lua` API to load and use these animations. The generated `TAN` files are XML
    files and therefore can be parsed and used with any other framework. [Figure 14-28](#9781430246626_Ch14.xhtml#Fig28)
    shows the simplistic UI of `TNT Animator Studio`.


    ![9781430246626_Fig14-28.jpg](OEBPS/Images/9781430246626_Fig14-28.jpg)


    [Figure 14-28](#9781430246626_Ch14.xhtml#_Fig28) . Creating animations using `TNT
    Animator Studio`


    ## Sound Tools


    A game without sound is just incomplete. Even the most brilliant-looking fireworks
    animation would seem dull if there were no accompanying whiz, bang, pop, and crackle
    sounds. By complementing your graphics, sound plays an important role in the success
    of an app. This section describes some apps that can help you create and manipulate
    sound and effects for your apps.


    ### Audacity


    * *URL*: [http://audacity.sourceforge.net/](http://audacity.sourceforge.net/)

    * *Price*: Free

    * *Platforms*: Mac OS X, Windows


    This is an open source and multiplatform waveform editor. It allows for manipulating
    sound files in various ways, including trimming, extending, adding effects, slowing
    or speeding up the playback, and changing the pitch. `Audacity` is used by many
    for creating audio file markers which are used in audio books. [Figure 14-29](#9781430246626_Ch14.xhtml#Fig29)
    shows an audio waveform being edited in `Audacity`.


    ![9781430246626_Fig14-29.jpg](OEBPS/Images/9781430246626_Fig14-29.jpg)


    [Figure 14-29](#9781430246626_Ch14.xhtml#_Fig29) . Editing a waveform in `Audacity`


    ### Bfxr


    * *URL*: [www.bfxr.net/](http://www.bfxr.net/)

    * *Price*: Free

    * *Platforms*: Web browser, Adobe Air–based desktop version


    This utility allows you to create 8-bit sounds that you can manipulate by tweaking
    various parameters. The resulting sounds can be used for various sound effects
    in your games. `Bfxr` provides a very easy and economical way to create interesting
    sound effects for your games. [Figure 14-30](#9781430246626_Ch14.xhtml#Fig30)
    shows the `Bfxr` interface and the various settings that can be set for your sound
    effects.


    ![9781430246626_Fig14-30.jpg](OEBPS/Images/9781430246626_Fig14-30.jpg)


    [Figure 14-30](#9781430246626_Ch14.xhtml#_Fig30) . `Bfxr`—useful for creating
    8-bit sounds


    ### NodeBeat


    * *URL*: [http://itunes.apple.com/us/app/nodebeat/id428440804?mt=8](http://itunes.apple.com/us/app/nodebeat/id428440804?mt=8)

    * *Price*: $0.99

    * *Platforms*: iOS 4.2+


    `NodeBeat` is an app that runs on iOS and can be used to create random yet interesting
    music. While many musical instrument apps require various amounts of skill and
    knowledge to create music, `NodeBeat` lets you generate random music that you
    can change dynamically while app is playing it. [Figure 14-31](#9781430246626_Ch14.xhtml#Fig31)
    shows a composition in `NodeBeat`. The composition can be recorded to a `wav`
    file and exported via iTunes or email. There is also a free Flash version of `NodeBeat`
    with limited features compared to the iOS version that works for all Windows,
    Mac OS X and Linux. It is available at [http://nodebeat.com/](http://nodebeat.com/).


    ![9781430246626_Fig14-31.jpg](OEBPS/Images/9781430246626_Fig14-31.jpg)


    [Figure 14-31](#9781430246626_Ch14.xhtml#_Fig31) . `NodeBeat`, an iOS app that
    allows you create music visually


    ## Summary


    This chapter presented various third-party tools that can help you in creating
    your app or game. Most of the tools I presented have been tested by many developers
    (or are among the few available for a particular framework). You’ll come across
    many other third-party tools you can experiment with yourself as well. This chapter
    by no means presented a comprehensive list of available tools, and more tools
    and utilities are released every day.


    ## Chapter 15 Sample Source Code


    You have nearly come to the end of this book; I hope you have had a good read
    and learned a lot. In the first part of the book I introduced you to Lua and its
    functions, and in the second part I introduced you to the various Lua-based frameworks
    that you can use to develop for iOS devices. This chapter will provide the complete
    source code for an application called `Chopper Rescue`, which you can use as a
    base for creating your own games.'
