    \ or nme.objType == objects.angryCloud then \n      hx, hy = getPosition(nme.sprite)\n\
    \      nRect = {\n        x = hx,\n        y = hy,\n        wd = nme.sprite.width,\n\
    \        ht = nme.sprite.height,\n      }\n\nif collides(nRect, pRect) == true\
    \ then\n        reduceLife()\n        break\n      end\n    end\n  end\n  hx,\
    \ hy = getPosition(survivor)\n  sRect = {\n    x = hx,\n    y = hy,\n    wd =\
    \ hx + survivor.width,\n    ht = hy + survivor.height,\n  }\n\n-- check if we\
    \ have collected the survivor\n  if collides(sRect, pRect) == true then\n    collected\
    \ = collected + 1\n    updateText(txtSaved, collected)\n    setVisible(survivor,\
    \ false)\n    score = score + 100\n    updateText(txtScore, score)\n    playSound(sounds.collectSurvivor)\n\
