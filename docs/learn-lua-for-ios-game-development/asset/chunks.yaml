    \ starts with `<c:*xxxxxx*>` and ends with `<c>`. The *xxxxxx* is the color in\
    \ hex (in the `RRGGBBAA` format). You can also use `<c:*xxx*>` and `<c:*xxxx*>`\
    \ for lower-precision color codes.\n\n### Text Styles\n\nYou can alter the font,\
    \ size, and color of text. We just discussed using `<c>` tags to change color\
    \ and passing font sizes while creating a `MOAIFont` object. If you wanted to\
