    so:


    local speed = { x = 1, y = 1 }


    Back to Health Bars


    Many real-time strategy and tower-defense games include an indicator that shows
    a character’s remaining health. Each time the character takes a hit, this health
    level is reduced, and the bar may change color to reflect the lost health.


    In this exercise, we’ll create a similar bar. First, we’ll create a bar, color
    it green to indicate full health, and give it a health value of 10\. Each time
    we tap the screen, we’ll reduce the health by 1, and the bar will correspondingly
    get shorter. The bar will also change color from green to orange to red, indicating
    the severity of the situation.


    ```

    local barSize = 200

    local barHeight = 30

    local healthBar = display.newRect ( 10, 100, barSize, barHeight)

      healthBar:setFillColor ( 0, 255, 0 )       -- make this green

      healthBar.health = 10       -- a dynamic var for the healthBar

    --

    function updateHealth()

      local theHealth = healthBar.health - 1

      if theHealth <0 then return end

      healthBar.health = theHealth

      --

      if theHealth > 6 then       --GREEN

        healthBar:setFillColor ( 0, 255, 0 )

      elseif theHealth > 4 then       --ORANGE

        healthBar:setFillColor ( 180, 180, 0 )

      elseif theHealth > 0 then       --RED

        healthBar:setFillColor ( 255, 0, 0 )

      elseif theHealth == 0 then       --BLACK

        healthBar:setFillColor ( 0, 0, 0 )

      end


    if theHealth > 0 then

        healthBar.width = (barSize * theHealth/10)

      end

    end

    Runtime:addEventListener ( "tap", updateHealth )

    ```


    On running this code, as shown in [Figure 8-15](#9781430246626_Ch08.xhtml#Fig15),
    a green bar is displayed on the screen. It gets smaller every time we tap the
    screen and changes color from green to yellow to red. In a real game, this health
    bar might be smaller and linked to each character, and multiple bars might be
    used—one linked to each character.


    ![9781430246626_Fig08-15.jpg](OEBPS/Images/9781430246626_Fig08-15.jpg)


    [Figure 8-15](#9781430246626_Ch08.xhtml#_Fig15) .  A health bar displayed on the
    screen (currently at full capacity)


    To make the bar smaller, you can simply tweak the barSize and barHeight to the
    values of your choice. You can also pass the healthBar to the updateHealth function
    to manage multiple health bars. Finally, you may want to create a healthBar object
    that is self-contained and works with its own set of functions and properties,
    like a widget. I’ll leave these last options for you to try on your own.


    Using Transition Functions


    Next, we’ll look at some *transitions*. These are handy functions that help us
    modify the visible attributes of an object and provide us with the illusion of
    animation.


    **Note**   In the world of Adobe Flash, these types of transitions are called
    *tweens*.


    Transitioning an object is similar to moving an object to a new position over
    a period of time. In the earlier example of the bouncing ball, we could have used
    transitions; however, transitions require a start and an end, so we would have
    had to define those. Transitions are carried out over a specific period of time,
    during which the transitioning code calculates each of the intermediate steps
    between the first state and the last state.


    Let’s move a simple circle from the bottom of the screen to the top of the screen:


    ```

    local ball = display.newCircle ( 160, 480, 50 )

    transition.to ( ball, {time=1000, y = 0})

    ```


    We can slow it down by increasing the time or speed it up by decreasing the time.
    Here, we have called the transition function and asked it to modify the y position
    of the object ball to the position of 0 over a period 1,000 ms (i.e., 1 second).


    The following code colors this ball red, makes it grow as it moves, and makes
    it fade in as it appears, like the morning sun.


    ```

    local ball = display.newCircle ( 160, 480, 50 )

    ball:setFillColor(255,255,0)

    ball.alpha = 0.5

    ball:scale(0.5,0.5)

    transition.to ( ball, {time=2000, y = 80, alpha = 1, xScale = 1.2, yScale = 1.2})

    ```


    We can use a transition to scroll some text on the screen:


    ```

    local theText = display.newText("Hello, hope you are enjoying your journey with
    Lua so far",0,440)

    theText.x = theText.contentWidth

    transition.to(theText,{time=8000, x = -theText.contentWidth})

    --

    ```


    You will see the text scrolling at the bottom of the screen. Also notice that
    the other transitions go about at their own speeds irrespective of the scrolling
    text. In short, they do not affect each other. You can have multiple transitions
    on the screen at the same time, independent of each other.


    In a game, if we use transitions, we also need to also know when they have completed,
    because we might want to do something when the transition is finished. With the
    transition function, there are two parameters that we can use to carry out specific
    actions when the transitions start and end. These are aptly named onStart and
    onComplete.


    In this exercise, we’ll have the sun rise like we did in the preceding code, and
    then after 2 seconds, we’ll make the sun set.


    Since Lua is flexible and not very fussy, you can write the code in several ways.
    To keep it readable and simple, we’ll split the code chunk into a function.'
