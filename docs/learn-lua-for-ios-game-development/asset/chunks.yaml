    \n## 表：快速概览\n\n我之前提到过，表是 Lua 中众多变量类型之一。虽然听起来可能无关紧要，但表是 Lua 的支柱，它们有多种用途：作为数组、哈希表（关联数组）和对象，以及更多其他用途。以下小节将讨论作为数组和哈希表的表。\n\
