    \n# 第 3 章\n\n## 文件操作\n\n在创建应用程序或游戏时，你需要文件 I/O（输入/输出）。你可能不使用数据库，但总会有需要将某些内容保存到磁盘的情况；可能是关卡、高分、玩家解锁的角色，或者与应用内购买相关的信息。\n\
