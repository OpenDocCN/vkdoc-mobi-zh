    , theFunc)\nend\n\nfunction raiseEvent(msg)\n    print(msg)\n    myEvent.data1\
    \ = msg\n    stage:dispatchEvent(myEvent)\nend\n\nstage:addEventListener(\"myEvent\"\
    , theFunc)\n```"
