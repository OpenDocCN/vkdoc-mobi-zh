    \ \n        hx, hy = getPosition(nme.sprite)\n        nRect = {\n          x =\
    \ hx,\n          y = hy,\n          wd = nme.sprite.width,\n          ht = nme.sprite.height,\n\
    \        }\n        if collides(nRect, tRect) == true then\n          -- increment\
    \ score\n          if nme.objType == objects.plane then score = score + 50 end\n\
    \          if nme.objType == objects.balloon then score = score + 30 end\n   \
    \       updateText(txtScore, score)\n          destroyObject(blt.sprite)\n   \
    \       table.remove(bullets,i)\n          blt = nil\n          destroyObject(nme.sprite)\n\
    \          table.remove(scenery,j)\n          nme=nil\n          return\n    \
    \    end\n      elseif nme.objType == objects.angryCloud or \n             nme.objType\
    \ == objects.tallHouse then \n        hx, hy = getPosition(nme.sprite)\n     \
    \   nRect = {\n          x = hx,\n          y = hy,\n          wd = nme.sprite.width,\n\
    \          ht = nme.sprite.height,\n        }\n        if collides(nRect, tRect)\
    \ == true then\n          destroyObject(blt.sprite)\n          table.remove(bullets,i)\n\
    \          blt = nil\n        end \n      end\n      if blt and blt.x > _W then\n\
    \        -- remove it if it is beyond the right-hand side of the screen\n    \
    \    destroyObject(blt.sprite)\n        table.remove(bullets, i)\n        blt\
    \ = nil\n      end \n    end \n  end\nend\n```\n\n碰撞检测基于矩形重叠，这意味着在某些情况下，直升机如果靠近某个物体（即使看起来并没有接触），也会在空中坠毁。[图15-6](#9781430246626_Ch15.xhtml#Fig6)说明了这一点。有一些方法可以进行更精确的碰撞检测，但这超出了本章的范围。有关一些可以提供帮助的函数，请参见第7章。\n\
    \n![9781430246626_Fig15-06.jpg](OEBPS/Images/9781430246626_Fig15-06.jpg)\n\n[图15-6](#9781430246626_Ch15.xhtml#_Fig6).\
    \ 当直升机的矩形与某个场景对象的矩形重叠时，就会发生碰撞。\n\n## 营救幸存者与加油\n\n我们还需要测试直升机与幸存者或加油车接触的条件。对于这两个对象，我们不像场景对象那样频繁生成加油车和幸存者，而是简单地隐藏它们并在需要时显示。这样，检查对象的可见性就变得很重要，因为这将是碰撞计算的关键。\n\
    \n以下是在Corona SDK中检查可见性的方法：\n\n```lua\nfunction isVisible(theObject)\n  if theObject\
    \ == nil then return false end\n  return theObject.isVisible\nend\n```\n\n以下是在Gideros\
    \ Studio中的实现方法：\n\n```lua\nfunction isVisible(theObject)\n  if theObject == nil\
    \ then return false end\n  return theObject:isVisible()\nend\n```\n\n在`moveScenery`函数中，我们可以添加对加油车和幸存者的检查，并如下所示显示它们：\n\
    \n```lua\nif tanker ~= nil and isVisible(tanker) then\n  local tx, ty = getPosition(tanker)\n\
    \  tx = tx - NORMAL\n  ty = baseLine - survivor.height\n  position(tanker, tx,\
    \ ty)\n  if tx < - tanker.width then\n    setVisible(tanker, false)\n    position(tanker,\
    \ _W + random(5,10) * tanker.width, ty)\n  end\nelseif tanker ~= nil and fuel\
    \ <=100 then\n  setVisible(tanker, true)\nend\nif survivor ~= nil then \n  if\
    \ isVisible(survivor) then\n    position(survivor, _W+random(5,10)*survivor.width,\
    \ ty)\n    setVisible(survivor, true)\n  else\n    local tx, ty = getPosition(survivor)\n\
    \    tx = tx - NORMAL\n    ty = baseLine - survivor.height\n    position(survivor,\
    \ tx, ty)\n    if tx < - survivor.width then\n      position(survivor , _W + random(5,10)\
    \ * survivor.width, ty)\n      score = score - 50  -- penalty for not collecting\
    \ a survivor \n      if score < 0 then score = 0 end \n    end\n  end \nend\n\
    ```\n\n## 整合所有代码\n\n前面的代码可以工作，但某些函数需要初始化。为此，我们将以下代码放入`init`函数中：\n\n```lua\nfunction\
    \ init()\n  background = loadImage(\"background.png\") \n  heli = loadImage(\"\
    _chopper.png\", _W/2, _H/2) -- middle of the screen\n  objects =     enumerate{\"\
    plane\", \"balloon\", \"flower\", \"grass\", \"lamppost\",\n   \"house\", \"tallHouse\"\
    , \"cloud1\", \"cloud2\", \"cloud3\", \"angryCloud\"}\n  survivor = loadImage(\"\
    _man.png\")\n  tanker   = loadImage(\"_tanker.png\")\n  setupSound()\n  colors\
    \ = {\n    {0,   0,   255},    -- blue\n    {255, 0,   0},      -- red\n    {0,\
    \   255, 0},      -- green\n    {255, 0,   255},    -- magenta\n    {0,   255,\
    \ 255},    -- cyan\n    {255, 255, 0},      -- yellow\n    {255, 255, 255},  \
    \  -- white\n    {179, 115, 255},    -- orange\n  }\n  createHUDItems()\n  setVisible(txtGameOver,false)\n\
    \  setVisible(tanker,     false)\n  setVisible(survivor,   false)\n  setVisible(txtTapAgain,false)\n\
    end\n```\n\n[图15-7](#9781430246626_Ch15.xhtml#Fig7)展示了游戏的最终版本。\n\n![9781430246626_Fig15-07.jpg](OEBPS/Images/9781430246626_Fig15-07.jpg)\n\
    \n[图15-7](#9781430246626_Ch15.xhtml#_Fig7). 可运行的Chopper Rescue游戏，添加了背景。\n\n**注意**\
    \ 上述代码仅为完整源代码的摘录。虽然它可以运行并演示本章所述的功能，但并非完全功能完备。要体验完整的游戏，请从Apress网站下载完整的源代码并运行。\n\
    \n## 总结\n\n本章向您介绍了创建一个在不同框架之间只需少量修改即可移植的游戏的过程。您可以对代码应用很多优化，但我将把这留作您在进一步学习Lua和本书所涵盖的框架时的练习。大部分逻辑是用Lua编写的，而特定于框架的函数被抽象为可以修改以适应不同SDK的函数。\n\
    \nLua的灵活性和易用性可以帮助您快速开发游戏，并且Lua使您的游戏易于测试、调试和实现。\n\n至此，我们的旅程已接近尾声。期待看到您使用Lua创建的游戏。\n\
    \n索引\n\n![images](OEBPS/Images/square1.jpg) **A**\n\n[Allen库](#9781430246626_Ch13.xhtml#cXXX.596)"
  raw: "-- reposition the tanker off the screen\n      position(tanker, _W + random(3,5)\
    \ * tanker.width, baseLine - tanker.height)\n      playSound(sounds.collectFuel)\n\
        end\n  end\nend \n```\n\nThe function collides is a simple function that checks\
    \ if the rectangles bounding the sprites overlap. This is similar to the *overlappingRectangle*\
    \ function called rectOverlaps, which is discussed in Chapter 7.\n\n```\nfunction\
    \ collides(rect1, rect2)\n  local x,y,w,h = rect1.x,rect1.y, rect1.wd, rect1.ht\n\
      local x2,y2,w2,h2 = rect2.x,rect2.y, rect2.wd, rect2.ht\n\nreturn not ((y+h\
    \ < y2) or (y > y2+h2) or (x > x2+w2) or (x+w < x2))\nend\n```\n\nTo make things\
    \ interesting, we can also show/hide the crash graphic in place of the helicopter\
    \ every time it crashes into an object or the ground, as follows:\n\n```\nhx,\
    \ hy = getPosition(heli)\nsetVisible(heli, false)\nposition(crash, hx, hy)\nsetVisible(crash,\
    \ true)\n```\n\nLater, in the replay screen displayed by the showReplayScreen\
    \ function, we can remove the crash graphic and set the helicopter back to visible,\
    \ as follows:\n\n```\nsetVisible(crash, false)\nsetVisible(heli, true)\nposition(heli,\
    \ _W/2, _H/2)\n```\n\nShooting Planes and Balloons\n\nEarlier, we spawned bullets\
    \ and made them move toward the right side of the screen. Now we have to handle\
    \ cases in which the bullets hit something, in which case we remove the objects\
    \ that are hit. This game only allows us to shoot down planes and balloons, so\
    \ in our moveBullets function, we check if the bullet has collided with any object;\
    \ if it hits the angryCloud or the tallHouse they are absorbed.\n\n```\nlocal\
    \ function moveBullets()\n  local blt\n  for i=#bullets,1,-1 do\n    blt = bullets[i]\n\
        blt.x = blt.x + FAST\n    position(blt.sprite, blt.x, blt.y)\n\ntRect = {\n\
          x=blt.x,\n      y=blt.y,\n      wd=blt.wd,\n      ht=blt.ht,\n      }\n\n\
    for j = #scenery, 1, -1 do\n      local nme = scenery[j]\n      if nme.objType\
    \ == objects.plane or nme.objType == objects.balloon then \n        hx, hy = getPosition(nme.sprite)\n\
            nRect = {\n          x = hx,\n          y = hy,\n          wd = nme.sprite.width,\n\
              ht = nme.sprite.height,\n          }\n\nif collides(nRect, tRect) ==\
    \ true then\n          -- increment score\n          if nme.objType == objects.plane\
    \ then score = score + 50 end\n          if nme.objType == objects.balloon then\
    \ score = score + 30 end\n      updateText(txtScore, score)\n          destroyObject(blt.sprite)\n\
              table.remove(bullets,i)\n          blt = nil\n\ndestroyObject(nme.sprite)\n\
              table.remove(scenery,j)\n          nme=nil\n\nreturn\n        end\n\
          elseif nme.objType == objects.angryCloud or \n             nme.objType ==\
    \ objects.tallHouse then \n        hx, hy = getPosition(nme.sprite)\n        nRect\
    \ = {\n          x = hx,\n          y = hy,\n          wd = nme.sprite.width,\n\
              ht = nme.sprite.height,\n          }\n        if collides(nRect, tRect)\
    \ == true then\n          destroyObject(blt.sprite)\n          table.remove(bullets,i)\n\
              blt = nil\n        end \n    end\n    if blt and blt.x > _W then\n      --\
    \ remove it if it is beyond the right-hand side of the screen\n      destroyObject(blt.sprite)\n\
          table.remove(bullets, i)\n      blt = nil\n    end \n  end \nend\n```\n\n\
    The collisions are based on overlapping rectangles, which means that in some cases,\
    \ the helicopter will crash in the air if it’s close to—but doesn’t necessarily\
    \ appear to be touching—another object. [Figure 15-6](#9781430246626_Ch15.xhtml#Fig6)\
    \ illustrates this. There are ways to perform more precise collision checking,\
    \ but they’re beyond the scope of this chapter. See Chapter 7 for some of the\
    \ functions that can help with this.\n\n![9781430246626_Fig15-06.jpg](OEBPS/Images/9781430246626_Fig15-06.jpg)\n\
    \n[Figure 15-6](#9781430246626_Ch15.xhtml#_Fig6) .  Collisions occur when the\
    \ helicopter’s rectangle overlaps with one of the scenery objects’ rectangles\n\
    \nSaving Survivors and Refueling\n\nWe also need to test for the condition when\
    \ the helicopter comes in contact with a survivor or the fuel tanker. In the case\
    \ of these two objects, rather than spawn tankers and survivors every so often,\
    \ as we do with the scenery objects, we simply hide the objects and display them\
    \ as needed. In this way, it becomes important to check for the visibility of\
    \ the object, as this will be key in our collision calculations.\n\nHere’s how\
    \ we check the visibility in Corona SDK:\n\n```\nfunction isVisible(theObject)\n\
      if theObject == nil then return false end\n  return theObject.isVisible\nend\
    \ \n```\n\nAnd here’s how we do it in Gideros Studio:\n\n```\nfunction isVisible(theObject)\n\
      if theObject == nil then return false end\n  return theObject:isVisible()\n\
    end \n```\n\nIn our moveScenery function, we can include checking for the tanker\
    \ and survivor, and display them as follows:\n\n```\nif tanker~= nil and isVisible(tanker)\
    \ then\n  local tx, ty = getPosition(tanker)\n  tx = tx - NORMAL\n  ty = baseLine\
    \ - survivor.height\n  position(tanker, tx, ty)\n  if tx < - tanker.width then\n\
        setVisible(tanker, false)\n    position(tanker, _W + random(5,10) * tanker.width,\
    \ ty)\n  end\nelseif tanker ~= nil and fuel <=100 then\n    setVisible(tanker,\
    \ true)\nend\nif survivor ~= nil then \n  if isVisible(survivor) then\n    position(survivor,\
    \ _W+random(5,10)*survivor.width, ty)\n    setVisible(survivor, true)\n  else\n\
        local tx, ty = getPosition(survivor)\n    tx = tx - NORMAL\n    ty = baseLine\
    \ - survivor.height\n\nposition(survivor, tx, ty)\n    if tx < - survivor.width\
    \ then\n    position(survivor , _W + random(5,10) * survivor.width, ty)\n      score\
    \ = score - 50  -- penalty for not collecting a survivor \n      if score < 0\
    \ then score = 0 end \n    end\n  end \n```\n\nPutting It All Together\n\nThe\
    \ preceding code works, but some of the functions need to be initialized. To do\
    \ this, we place the code below into the init function:\n\n```\nfunction init()\n\
      background = loadImage(\"background.png\") \n  heli = loadImage(\"_chopper.png\"\
    , _W/2, _H/2) -- middle of the screen\n  objects =     enumerate{\"plane\", \"\
    balloon\", \"flower\", \"grass\", \"lamppost\",\n   \"house\", \"tallHouse\",\
    \ \"cloud1\", \"cloud2\", \"cloud3\", \"angryCloud\"}\n  survivor = loadImage(\"\
    _man.png\")\n  tanker   = loadImage(\"_tanker.png\")\n  setupSound()\n\ncolors\
    \ = {\n    {0,   0,   255},    -- blue\n    {255, 0,   0},      -- red\n    {0,  \
    \ 255, 0},      -- green\n    {255, 0,   255},    -- magenta\n    {0,   255, 255},    --\
    \ cyan\n    {255, 255, 0},      -- yellow\n    {255, 255, 255},    -- white\n\
        {179, 115, 255},    -- orange\n  }\n\ncreateHUDItems()\n  setVisible(txtGameOver,false)\n\
      setVisible(tanker,     false)\n  setVisible(survivor,   false)\n  setVisible(txtTapAgain,false)\n\
    end\n```\n\n[Figure 15-7](#9781430246626_Ch15.xhtml#Fig7) shows the final version\
    \ of the game.\n\n![9781430246626_Fig15-07.jpg](OEBPS/Images/9781430246626_Fig15-07.jpg)\n\
    \n[Figure 15-7](#9781430246626_Ch15.xhtml#_Fig7) .  The working Chopper Rescue\
    \ game, with an added background\n\n**Note**   The preceding code is only an excerpt\
    \ of the full source code. While it will run and demonstrate the features described\
    \ in this chapter, it isn’t fully functional. To enjoy the full game, download\
    \ the complete source code from the Apress web site and run it.\n\nSummary\n\n\
    This chapter walked you through the process of creating a game that can be ported\
    \ between frameworks with very little alteration. There are plenty of optimizations\
    \ you can apply to the code, but I’ll leave that as an exercise for you as you\
    \ learn more about Lua and the frameworks covered in this book. Most of the logic\
    \ is written in Lua, and the framework-specific functions are abstracted into\
    \ functions that can be altered to suit different SDKs.\n\nLua’s flexibility and\
    \ ease of use can help you develop games quite quickly, and Lua makes your games\
    \ easy to test, debug, and implement.\n\nThis brings us to the end of our journey.\
    \ Looking forward to seeing the games you’ve created with Lua.\n\nIndex\n\n![images](OEBPS/Images/square1.jpg)  **A**\n\
