    \ ()\nprop:setDeck ( gfxQuad )\nprop:setLoc ( 0, 80 )\nlayer:insertProp ( prop\
    \ )\n```\n\n## 绘制自定义图像\n\n你可以使用 `MOAIImage` 类创建一个空白图像作为画布，如下所示：\n\n```lua\nlocal\
    \ image = MOAIImage.new()\nimage:init(width, height)\n```\n\n**注意：** 你创建的图像必须是\
    \ 2 的幂次方大小——也就是说，宽度和高度必须是 2 的幂次方数。在动态创建图像时，如果你创建的图像不符合 2 的幂次方要求，可以使用 `padToPow2`\
    \ 函数将图像填充到所需的大小。\n\n创建的这个图像对象随后可用于创建 `Quad2D` 对象，并将其添加到图层中。\n\n```lua\ngfxQuad\
    \ = MOAIGfxQuad2D.new ()\ngfxQuad:setTexture ( image )\ngfxQuad:setRect ( -64,\
    \ -64, 64, 64 )\n\nprop = MOAIProp2D.new ()\nprop:setDeck ( gfxQuad )\nlayer:insertProp\
    \ ( prop )\n```\n\n这段代码不会显示任何内容，因为创建的图像是空白图像。在下面的代码中，我们在内存中创建了一个位图并将其显示到屏幕上。这是通过代码创建动态图像的好方法。\n\
    \n```lua\nlocal image = MOAIImage.new()\nimage:init(25, 40)\nimage:padToPow2()\n\
    image:fillRect(-70,-70,150,150,1,1,1,1)\nimage:fillRect( 20,20,50,50,1,0.6,0,1)\n\
    \ngfxQuad = MOAIGfxQuad2D.new ()\ngfxQuad:setTexture ( image )\ngfxQuad:setRect\
    \ ( -64,-64,64,64 )\n\nprop = MOAIProp2D.new ()\nprop:setDeck ( gfxQuad )\nlayer:insertProp\
    \ ( prop )\n```\n\n## 加载图像\n\n可以使用 `load` 函数将图像加载到 `MOAIImage` 对象中，如下所示：\n\n```lua\n\
    theImage = MOAIImage.new ()\ntheImage:load( \"myImage2.png\" )\n```\n\n加载图像后，你可以对其执行各种操作并应用变换。\n\
    \n## 复制图像\n\n你可以使用 `copyRect` 或 `copyBits` 函数从另一个图像复制图像。请注意，`copyBits` 会复制源图像（此操作无法进行缩放或翻转）；源图像中的矩形区域可以被复制到目标图像的指定位置。以下是使用\
    \ `copyBits` 函数的示例：\n\n```lua\nsrcImage = MOAIImage.new ()\nsrcImage:load ( \"\
    myImage2.png\" )\niWd, iHt = srcImage:getSize()\ndestImage = MOAIImage.new()\n\
    destImage:init(64,64)\ndestImage:copyBits(srcImage,0,0,0,0,iWd, iHt)\n```"
- fmt: "如果你想能够缩放或翻转图像，可以使用`copyRect`函数，该函数将源图像中的一个矩形区域复制到目标图像中。你可以通过反转矩形的最小/最大参数来翻转图像。此函数将按照`srcMin`和`srcMax`指定的尺寸，将源图像绘制到`destMin`和`destMax`指定的目标区域中。如果目标尺寸更大，图像会放大；如果更小，图像会缩小。\n\
    \n```\ncopyRect(source, srcXMin, srcYMin, srcXMax, srcYMax, destXMin, destYMin,\
    \ destXMax, destYMax, filter)\n```\n\n**保存图像**\n\n你可能需要将图像保存到设备或硬盘上以备后用。可以使用`writePNG`函数保存图像：\n\
    \n```\nimage = MOAIImage:new()\nimage:init(64,64)\n-- 此处为绘图代码\nimage:writePNG(\"\
    myimage.png\")\n```\n\n**调整图像大小**\n\n可以使用`resize`或`resizeCanvas`函数调整图像大小。`resize`函数将图像复制到新尺寸的图像，而`resizeCanvas`函数将图像复制到新尺寸的画布。\n\
    \n```\nimage:resize(width, height)\nimage:resizeCanvas(width, height)\n```\n\n\
    **图像像素访问**\n\n通过`x`和`y`坐标，可以使用`getRGBA`函数或`getColor32`函数获取图像中某点的颜色。这两个函数分别以RGBA格式或32位整数格式返回数据。\n\
    \n```\nimage:getRGBA(xPos, yPos)\n```\n\n以及\n\n```\nimage:getColor32(xPos, yPos)\n\
    ```\n\n同样，可以使用`setRGBA`和`setColor32`函数设置像素：\n\n```\nimage:setRGBA(xPos, yPos,\
    \ red, green, blue, alpha)\nimage:setColor32(xPos, yPos, colour)\n```\n\n**动画**\n\
    \n基本的逐帧动画是通过以固定频率改变帧中的图像来实现的。这个频率被称为帧率（`fps`）。然而，对于文本、矩形和圆形等其他对象，随着时间的推移修改它们的属性也能产生动画效果。\n\
    \n要获取或设置`prop`的位置，可以使用`getLoc`或`setLoc`函数。这相当于为`prop`设置一个属性。\n\n```\nx, y = prop:getLoc()\n\
    等同于\nx = prop:getAttr( MOAISprite2D.ATTR_X_LOC )\ny = prop:getAttr( MOAISprite2D.ATTR_Y_LOC\
    \ )\n```\n\n`setLoc`和`getLoc`基本上是用于从`prop`访问属性的便捷方法。另一个非常有用的便捷方法是`moveRot`，它用于在指定的时间段内将对象旋转特定角度。\n\
    \n```\nprop:moveRot(180, 2)\n```\n\n这段代码将在2秒内将`prop`旋转180度。\n\n`MOAIEaseDriver`可以直接操作属性；我们只需指定要操作的对象和属性。`MOAIEaseDriver`对节点属性应用简单的缓动曲线。以下是其使用示例。\n\
    \n```\nease = MOAIEaseDriver.new()\nease:reserveLinks(3)\nease:setLink(1, prop,\
    \ MOAIProp2D.ATTR_X_LOC, 64)\nease:setLink(2, prop, MOAIProp2D.ATTR_Y_LOC, 64)\n\
    ease:setLink(3, prop, MOAIProp2D.ATTR_Z_ROT, 360)\nease:start()\n```\n\n这段代码创建了一个缓动驱动器，然后设置每个通道以定位单个`prop`的特定属性。这将使`prop`从屏幕左上角旋转并移动到新位置。\n\
    \n**注意**：当你设置两个`prop`（称为图节点）之间的父子关系（以及依赖关系）时，父节点会先被更新，然后才是子节点。\n\n**图块组（Tile Decks）**\n\
    \n本章前面我描述了可以使用的各种图块组。在本节中，我们将更深入地了解`MOAITileDeck2D`，它有助于创建逐帧动画。`TileDeck2D`的精灵表要求所有帧的尺寸相同。加载纹理时，需要设置横向的帧数和纵向的帧数。由于所有帧的尺寸相同，因此当你使用`setSize`函数设置尺寸时，精灵表会根据函数指定的参数被等分为若干帧。尺寸的计算方式如下：\n\
    \n```\nframeWidth = spriteSheetWidth / columns\nframeHeight = spriteSheetHeight\
    \ / rows\n```\n\n以下示例展示了如何使用帧动画。代码的结果如图10-6所示。\n\n![9781430246626_Fig10-06.jpg](OEBPS/Images/9781430246626_Fig10-06.jpg)\n\
    \n图10-6. 在Moai中使用单独帧对精灵进行动画\n\n```\n_max_ = 11\n\nMOAISim.openWindow(\"Tiles Deck\
    \ Sample\",320,480)\n\nviewport = MOAIViewport.new()\nviewport:setSize(320,480)\n\
    viewport:setScale(320,-480)\nviewport:setOffset(-1,1)\n\nlayer = MOAILayer2D.new()\n\
    layer:setViewport(viewport)\nMOAISim.pushRenderPass(layer)\n\ntile = MOAITileDeck2D.new()\n\
    tile:setTexture(\"stick.png\")\ntile:setSize(_max_,1)\ntile:setRect(-20,31,20,-31)\n\
    \nprop1 = MOAIProp2D.new()\nprop1:setDeck(tile)\nlayer:insertProp(prop1)\n\ncurve\
    \ = MOAIAnimCurve.new()\ncurve:reserveKeys(_max_)\n\nfor i=1,_max_ do\n curve:setKey(i,\
    \ i*(1/_max_), i, MOAIEaseType.FLAT)\nend\n\nanim = MOAIAnim:new()\nanim:reserveLinks(1)\n\
    anim:setLink(1, curve, prop1, MOAIProp2D.ATTR_INDEX)\nanim:setMode(MOAITimer.LOOP)\n\
    anim:start()\nprop1:setLoc(100,100)\n```\n\n在这个示例中，我们首先创建可用于动画的图块：\n\n```\ntile\
    \ = MOAITileDeck2D.new()\ntile:setTexture(\"stick.png\")\ntile:setSize(11,1)\n\
    tile:setRect(-20,31,20,-31)\n```\n\n我们的精灵表横向有11帧，纵向有1帧（见图10-7）。所有帧的尺寸均为40×62，我们通过`setRect`来设置。\n\
    \n![9781430246626_Fig10-07.jpg](OEBPS/Images/9781430246626_Fig10-07.jpg)\n\n图10-7.\
    \ 我们将用于动画的`stick.png`图像\n\n在`setRect`函数中为矩形尺寸设置负值，会将对象沿值为负的坐标轴翻转。由于Moai的y轴是递增的，我们将比例尺设置为以左上角为原点（0,0），因此我们的图像会沿y轴翻转显示。为了修正这一点，我们使用`tile:setRect(-20,31,20,-31)`而不是`tile:setRect(-20,-31,20,31)`。\n\
    \n```\nprop1 = MOAIProp2D.new()\nprop1:setDeck(tile)\nlayer:insertProp(prop1)\n\
    ```\n\n我们创建一个`MOAIProp2D`对象，将刚创建的图块设置为该`prop`的图块组，然后将该`prop`插入到图层中：\n\n```\ncurve\
    \ = MOAIAnimCurve.new()\n_max_ = 11\ncurve:reserveKeys(_max_)\nfor i=1, _max_\
    \ do\n  curve:setKey(I, I * (1/_max_), I, MOAIEaseType.FLAT)\nend\n```\n\n我们创建一个`MOAIAnimCurve`对象，然后使用`reserveKeys`函数指定帧数。接着创建帧，并为每个帧设置索引和时间索引，以及曲线在该时间索引处的值。时间索引是看待动画的另一种方式，但不是基于索引，而是通过设置时间索引来指定该时间点上的动画/变换。\n\
    \n```\nanim = MOAIAnim:new()\nanim:reserveLinks(1)\nanim:setLink(1, curve, prop1,\
    \ MOAIProp2D.ATTR_INDEX)\nanim:setMode(MOAITimer.LOOP)\nanim:start()\n```\n\n\
    我们使用`MOAIAnim`类来创建动画。我们在`prop1`和`curve`之间建立了一个关于`Index`属性的链接。将模式设置为循环（作为定时器）。然后通过`start`函数启动动画。\n\
    \n最后，我们将`prop1`对象重新定位到屏幕上的（100,100）位置。\n\n我们还可以使用监听器来挂钩动画。可以捕获的监听器有：\n\n*   `MOAITimer.EVENT_TIMER_KEYFRAME`。每次关键帧改变时都会调用此监听器，它是一个回调函数，签名如下：\n\
    \n```\n    onKeyFrame ( MOAITimer_self, number_keyFrame, number_timesExecuted,\
    \ number_time, number_value)\n    ```\n\n*   `MOAITimer.EVENT_TIMER_LOOP`。每次函数循环时都会调用此监听器，其回调签名如下：\n\
    \n```\n    onLoop(MOAITimer_self,  number_timesExecuted)\n    ```"
  raw: "If you want to be able to scale or flip the image, you can use the copyRect\
    \ function, which copies a rectangle from the source image to the destination\
    \ image. You can flip it by reversing the min/max parameter of the rectangle.\
    \ This function will draw the source image with the dimensions specified by srcMin\
    \ and srcMax onto the destination space as specified by destMin and destMax. If\
    \ the destination dimensions are larger, the image is scaled up and if they are\
    \ smaller, the image is scaled down.\n\n```\ncopyRect(source, srcXMin, srcYMin,\
    \ srcXMax, srcYMax, destXMin, destYMin, destXMax, destYMax, filter)\n```\n\nSaving\
    \ Images\n\nYou might need to save an image to the device or hard disk saving\
    \ it for use later. The image can be saved using the writePNG function:\n\n```\n\
    image = MOAIImage:new()\nimage:init(64,64)\n-- Some drawing code here\nimage:writePNG(\"\
    myimage.png\")\n```\n\nResizing Images\n\nImages can be resized using the resize\
    \ or resizeCanvas function. The function resize copies the image to an image with\
    \ a new size and the function resizeCanvas copies the image to a canvas with a\
    \ new size.\n\n```\nimage:resize(width, height)\nimage:resizeCanvas(width, height)\n\
    ```\n\nPixel Access for Images\n\nYou can get the color at a point in the image\
    \ given the x- and y-coordinates using either the getRGBA function or the getColor32\
    \ function. These return the data in RGBA or 32-bit integer format.\n\n```\nimage:getRGBA(xPos,\
    \ yPos)\n```\n\nand\n\n```\nimage:getColor32(xPos, yPos)\n```\n\nSimilarly, the\
    \ pixels can be set using the setRGBA and setColor32 functions:\n\n```\nimage:setRGBA(xPos,\
    \ yPos, red, green, blue, alpha)\nimage:setColor32(xPos, yPos, colour)\n```\n\n\
    Animation\n\nBasic frame-by-frame animation works by changing the image in the\
    \ frame at a set frequency. This is called the fps or the frames per seconds.\
    \ However, with other objects such as text, rectangles, and circles, modifying\
    \ their attributes over time would provide the effect of animation.\n\nTo get\
    \ or set the position of the prop, you can use the getLoc or the setLoc function.\
    \ This is the equivalent of setting an attribute for a prop.\n\n```\nx, y = prop:getLoc()\n\
    is the equivalent of\nx = prop:getAttr( MOAISprite2D.ATTR_X_LOC )\ny = prop:getAttr(\
    \ MOAISprite2D.ATTR_Y_LOC )\n```\n\nsetLoc and getLoc are basically convenience\
    \ methods that are used to access attributes from props. Another convenience method\
    \ that is quite useful is moveRot, which is used to rotate the object by a particular\
    \ angle over a specified period of time.\n\n```\nprop:moveRot(180, 2)\n```\n\n\
    This code will rotate the prop 180 degrees over a period of 2 seconds.\n\nMOAIEaseDriver\
    \ can operate on attributes directly; we can simply specify the objects and attributes\
    \ to operate on. MOAIEaseDriver applies simple ease curves to node attributes.\
    \ Here’s an example of its use.\n\n```\nease = MOAIEaseDriver.new()\nease:reserveLinks(3)\n\
    ease:setLink(1, prop, MOAIProp2D.ATTR_X_LOC, 64)\nease:setLink(2, prop, MOAIProp2D.ATTR_Y_LOC,\
    \ 64)\nease:setLink(3, prop, MOAIProp2D.ATTR_Z_ROT, 360)\nease:start()\n```\n\n\
    This code snippet creates an ease driver, and then sets each channel to target\
    \ a specific attribute of a single prop. This will rotate and move the prop from\
    \ the top-left corner of the screen to a new location.\n\n**Note**   When you\
    \ set the parent–child relation (and also a dependency) between two props (called\
    \ graph nodes), the parent node is updated first and then the child node.\n\n\
    Tile Decks\n\nEarlier in the chapter I described the various types of decks you\
    \ can use. In this section, we’ll take a closer look at MOAITileDeck2D, which\
    \ helps create frame-by-frame animation. The sprite sheet for a TileDeck2D requires\
    \ all of the frames to be of the same size. Then when you load the texture, you\
    \ set the number of frames across and the number of frames down. Since the dimensions\
    \ of all the frames are the same, when you set the size using the setSize function,\
    \ the sprite sheet will be divided into an equal numbers of frames, as specified\
    \ by the function. The dimensions are calculated as follows:\n\n```\nframeWidth\
    \ = spriteSheetWidth / columns\nframeHeight = spriteSheetHeight / rows\n```\n\n\
    The following example shows how you can use frame animation. The results of the\
    \ code are shown in [Figure 10-6](#9781430246626_Ch10.xhtml#Fig6).\n\n![9781430246626_Fig10-06.jpg](OEBPS/Images/9781430246626_Fig10-06.jpg)\n\
    \n[Figure 10-6](#9781430246626_Ch10.xhtml#_Fig6) .  Animating a sprite in Moai\
    \ using individual frames\n\n```\n_max_ = 11\n\nMOAISim.openWindow(\"Tiles Deck\
    \ Sample\",320,480)\n\nviewport = MOAIViewport.new()\nviewport:setSize(320,480)\n\
    viewport:setScale(320,-480)\nviewport:setOffset(-1,1)\n\nlayer = MOAILayer2D.new()\n\
    layer:setViewport(viewport)\nMOAISim.pushRenderPass(layer)\n\ntile = MOAITileDeck2D.new()\n\
    tile:setTexture(\"stick.png\")\ntile:setSize(_max_,1)\ntile:setRect(-20,31,20,-31)\n\
    \nprop1 = MOAIProp2D.new()\nprop1:setDeck(tile)\nlayer:insertProp(prop1)\n\ncurve\
    \ = MOAIAnimCurve.new()\ncurve:reserveKeys(_max_)\n\nfor i=1,_max_ do\n curve:setKey(i,\
    \ i*(1/_max_), i, MOAIEaseType.FLAT)\nend\n\nanim = MOAIAnim:new()\nanim:reserveLinks(1)\n\
    anim:setLink(1, curve, prop1, MOAIProp2D.ATTR_INDEX)\nanim:setMode(MOAITimer.LOOP)\n\
    anim:start()\nprop1:setLoc(100,100)\n```\n\nIn this example, we first create the\
    \ tiles that we can use for our animation:\n\n```\ntile = MOAITileDeck2D.new()\n\
    tile:setTexture(\"stick.png\")\ntile:setSize(11,1)\ntile:setRect(-20,31,20,-31)\n\
    ```\n\nOur sprite sheet has 11 frames across and 1 frame down (see [Figure 10-7](#9781430246626_Ch10.xhtml#Fig7)).\
    \ The dimensions of all the frames are 40×62, which we set with setRect.\n\n![9781430246626_Fig10-07.jpg](OEBPS/Images/9781430246626_Fig10-07.jpg)\n\
    \n[Figure 10-7](#9781430246626_Ch10.xhtml#_Fig7) .  The stick.png image that we\
    \ shall use for the animation\n\nSetting a negative value for the rect dimensions\
    \ in the setRect function flips the object on the axis with the negative value.\
    \ Since Moai has an ascending y-axis, we change the scale to set the top-left\
    \ corner as the origin (0,0), so our images will show up flipped on the y-axis.\
    \ To correct that, we use the setRect function with tile:setRect(-20,31,20,-31)\
    \ instead of tile:setRect(-20,-31,20,31).\n\n```\nprop1 = MOAIProp2D.new()\nprop1:setDeck(tile)\n\
    layer:insertProp(prop1)\n```\n\nWe create a MOAIProp2D object and set the tile\
    \ we just created to the prop’s deck, and then we insert that prop in the layer:\n\
    \n```\ncurve = MOAIAnimCurve.new()\n_max_ = 11\ncurve:reserveKeys(_max_)\nfor\
    \ i=1, _max_ do\n  curve:setKey(I, I * (1/_max_), I, MOAIEaseType.FLAT)\nend\n\
    ```\n\nWe create a MOAIAnimCurve object and then designate the number of frames\
    \ using the reserveKeys function. Then we create the frames and set the index\
    \ and the time index for each of the frames, with the value of the curve at that\
    \ time index. A time index is another way of looking at the animation, but instead\
    \ of it being index based, we set the time index to specify the animation/transform\
    \ at that point in time.\n\n```\nanim = MOAIAnim:new()\nanim:reserveLinks(1)\n\
    anim:setLink(1, curve, prop1, MOAIProp2D.ATTR_INDEX)\nanim:setMode(MOAITimer.LOOP)\n\
    anim:start()\n```\n\nWe use the MOAIAnim class to create our animation. We set\
    \ up a link between prop1 and curve on the Index attribute. We set the mode to\
    \ loop as a timer. Then we start the animation with the start function.\n\nLastly,\
    \ we reposition the prop1 object on the screen at 100,100.\n\nWe can also hook\
    \ into the animation using listeners. The listeners that we can capture are:\n\
    \n*   MOAITimer.EVENT_TIMER_KEYFRAME. *This is called every time the keyframe\
    \ is changed and is a callback function that has the following signature:*\n\n\
    ```\n    onKeyFrame ( MOAITimer_self, number_keyFrame, number_timesExecuted, number_time,\
    \ number_value)\n    ```\n\n*   MOAITimer.EVENT_TIMER_LOOP. *This is called every\
    \ time the function loops and has the following callback signature:*\n\n```\n\
    \    onLoop(MOAITimer_self,  number_timesExecuted)\n    ```"
  trans: "\n如果你想能够缩放或翻转图像，可以使用`copyRect`函数，该函数将源图像中的一个矩形区域复制到目标图像中。你可以通过反转矩形的最小/最大参数来翻转图像。此函数将按照`srcMin`和`srcMax`指定的尺寸，将源图像绘制到`destMin`和`destMax`指定的目标区域中。如果目标尺寸更大，图像会放大；如果更小，图像会缩小。\n\
