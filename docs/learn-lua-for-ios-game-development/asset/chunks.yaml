    这或许是唯一一款能在你在 CoronaSDK 模拟器中运行应用时，进行性能分析的检测工具。它能帮助你判断代码的运行状况。你可以通过应用中的 Lua 命令来启动和停止性能分析器。分析器运行时，会逐行创建分析数据，检查每一行代码或每个函数的执行耗时。虽然它是专为
    Corona SDK 创建的，但其运行依赖于纯 Lua。稍作修改，就能适配任何框架。`Corona Profiler` 的示例输出如图 13-4 所示。


    ![9781430246626_Fig13-04.jpg](img/9781430246626_Fig13-04.jpg)


    图 13-4 . 运行 `Corona Profiler` 后，你的应用的视觉分析/结果


    示例代码


    ```

    profiler = require "Profiler"

    profiler.startProfiler()

    ```


    ## Director


    -   **URL**: [`rauberlabs.blogspot.com.au/2011/08/director-14-books.html`](http://rauberlabs.blogspot.com.au/2011/08/director-14-books.html)

    -   **价格**: 免费

    -   **平台**: Corona SDK


    `Director` 是一个可用的场景管理器库——虽然非常有用且广受欢迎，但正在被逐步淘汰，因为 Corona Labs 正在用其自带的版本 `Storyboard`
    取代它。曾几何时，`Director` 比 Corona SDK 本身还要受欢迎。然而，由于 `Storyboard` 受 Corona Labs 官方支持且提供类似功能，建议你使用
    `Storyboard`（尽管 `Director` 在许多电子书和游戏中仍被广泛使用）。


    示例代码


    ```

    director = require("director")

    local mainGroup = display.newGroup()


    mainGroup :insert(director.directorView)

    director:changeScene("Screen1")

    ```


    请注意，`Screen1.lua` 包含了 `screen1` 的代码和显示逻辑。


    ## Lime


    -   **URL**: [www.justaddli.me](http://www.justaddli.me)

    -   **价格**: 20.00 英镑

    -   **平台**: Corona SDK


