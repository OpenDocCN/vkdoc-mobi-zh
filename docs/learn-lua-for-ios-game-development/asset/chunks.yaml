    Finding the Distance Between Two Points in One or Two Dimensions


    This is almost a no-brainer. When dealing with two points on the same axis, we
    can use simple subtraction to find the distance between them, like so:


    ```

    function getDistance(pos1, pos2)

      return pos1 - pos2

    end

    ```


    However, if we’re trying to find the distance between two points, we have to resort
    to trigonometry. Here’s an example:


    ```

    function getDistanceBetween(ptA, ptB)

      return math.sqrt((ptA.x - ptB.x)^2 + (ptA.y - ptB.y)^2)

    end

    ```


    Determining the Angle Between Two Points


    If you’re creating a tower defense–style game, for example, you might need to
    turn a player, gun, or other object to point in the direction of an approaching
    enemy or rotate a the object to a point where the screen has been touched. To
    do this, you need to determine the angle between two points: the center point
    where the turret or player is, and the point of touch or where the enemy currently
    is. The angle between two points can be determined again using trigonometry, as
    follows:


    ```

    function angleBetween(ptA, ptB)

        local angle = math.deg(math.atan2(ptA.y - ptB.y, ptA.x - ptB.x))

         angle = angle + 90

         return angle

    end

    ```


    Keeping a Number in a Given Range


    There could be a scenario when you might want to keep a value within a given range.
    In this way, rather than having several if...then statements for each value, we
    can create a function that keeps the value within a range.


    ```

    function keepInRange(theVal, low, high)

      return math.min(math.max(low, theVal), high)

    end

    ```


    The alternative method, using if...then statements, looks like this:


    ```

    function _keepInRange(theVal, low, high)

      if theVal < low then

        return low

      end

      if theVal > high then

        return high

      end

      return theVal

    end

    ```


    Performing Linear Interpolation


    No matter what framework you use for your game, the game might have some form
    of transition—for example, a fade in or a movement. The simplest form way to accomplish
    a transition is to apportion a value over time equally (linearly). Using the following
    function, you can retrieve a value over a given time by designating the starting
    and ending values. Here, we are calling the retrieved value thePercent, which
    is a value between 0 and 1, indicating the state of progress—0 being the start
    and 1 being completed.


    ```

    function getLinearInterpolation(theStartValue, theEndValue, thePercent)

      return (theStartValue + (theEndValue - theStartValue) * thePercent)

    end

    ```


    Getting the Sign of a Value


    Sometimes it’s important to determine if a value is a negative number of not.
    It is easy to check whether a number is less than 0, but when performing a calculation,
    it might not be possible to use if...then statements. Instead, you can create
    a function. To keep things organized, you should add it to the math namespace.


    ```

    function math.sign(theValue)

     return theValue > 0 and 1 or theValue < 0 and −1 or 0

    end

    ```


    The preceding function is equivalent to


    ```

    function math.sign(theValue)

      if theValue > 0 then

        return 1

      elseif theValue < 0 then

        return −1

      else

        return 0

      end

    end

    ```


    Collisions


    One of the basic things that you will need for your games is the ability to check
    if two objects on the screen have collided. For example, in PAC-MAN, you would
    need to determine collisions between PAC-MAN and the ghosts and fruit. In Space
    Invaders, you would need to determine collisions between alien bullets and the
    player’s shield and the player itself. However one point to note is that real
    world objects are not rectangular stamps, and therefore are not always rectangular
    in shape. Therefore, we have various methods, described in this section, which
    we can use to check for collisions between two circles, two rectangles, a rectangle
    and a circle, and so on.


    Using isPointInRect


    This is the most commonly used function in the UIs that we use every day. Each
    button in a UI has a rectangular boundary, and programs check whether a touch
    point is inside of this boundary to determine if that button was tapped or not.


    The way it works is that the point defined by x and y should be contained in the
    rectangle—that is the x value should be greater than or equal to the value of
    the rectangle’s x-coordinate, and the point x should be less than or equal to
    the rectangle’s x point plus the width (and similarly on the y axis too).


    ```

    function isPointInRect( x, y, rectX, rectY, rectWidth, rectHeight )

      if x >= rectX and x <= rectX + rectWidth and

         y >= rectY and y<= rectY + rectHeight then

        return true

      end


    return false

    end

    ```


    Using pointInCircle


    In the tower-defense genre of games, each defense tower or structure has a range;
    this range is displayed in the form of a circle around the center of the structure.
    We can check whether the midpoint of the enemy is inside of this circle to determine
    if the enemy is in the range of this structure or not, as follows:


    ```

    function pointInCircle( ptX, ptY, circleX, circleY, radius )

      local dx = ptX - circleX

      local dy = ptY - circleY

      if dx * dx + dy * dy <= radius * radius then

        return true

      end


    return false

    end

    ```


    Determining Whether a Rectangle Is Within Another Rectangle


    This can be useful in games where you have to wait for an object to reach a safe
    zone. in such a case, when the second rectangle is completely contained in the
    first one, it can be determined that the event has taken place.


    ```

    function rectInRect( rect1X, rect1Y, rect1Width, rect1Height, rect2X, rect2Y,
    rect2Width, rect2Height )

      if rect1X >= rect2X and rect1X + rect1Width <= rect2X + rect2Width and

         rect1Y >= rect2Y and rect1Y + rect1Height <= rect2Y + rect2Height then

        return true

      end


    return false

    end

    ```


