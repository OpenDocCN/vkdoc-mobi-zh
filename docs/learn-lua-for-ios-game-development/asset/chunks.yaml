    Downloading Data


    In your app, you may want to download data from the Internet while it’s running—this
    might be data, graphics, or news. The LuaSocket Library is integrated into Codea
    providing functions to work with network data and functionality. The http class
    has a request function that allows for downloading the data from the Internet.


    ```

    function done(theData, status, headers)

      data = theData

      if status == 200 then

        print("YAY!! Done")

        print(theData)

      else

        print("Error downloading the file")

      end

    end


    http.request("http://www.oz-apps.com", done)

    ```


    When we call the request function, we pass it the URL of the data we want to download
    and a function that is called when the download completes. The function gets three
    parameters: theData, status, and the headers table. The status is the http code,
    which is 200 when it succeeds, 404 when the page cannot be found, 403 for forbidden,
    and so on.


    Displaying Web Pages


    In some apps, you might want to browse a web page rather than just download data
    or a file. In such a scenario, we use the openURL function. This starts the mobile
    Safari browser and opens the URL passed.


    ```

    openURL("http://www.oz-apps.com")

    ```


    Physics


    Like all of the frameworks covered in the book, Codea uses Box2D for physics.
    The following example shows how to create a physics body and then update a display
    object based on the position of the physics object:


    ```

    bouncy = 0.5


    function createPhysicsObj(x1, y1, x2, y2)

      local temp = physics.body(EDGE, vec2(x1,t1), vec2(x2,y2))

      temp.type = STATIC

      temp.restitution = bouncy

     return bouncy

    end


    function setup()

    ball.physics.body(CIRCLE, 50)

      ball.x = WIDTH/2

      ball.y = HEIGHT/2

      ball.restitution = bouncy

    ball.sleepingAllowed = false


    createPhysicsObject(0,0,0,HEIGHT)

      createPhysicsObject(0,0,WIDTH,0)

      createPhysicsObject(WIDTH,0,WIDTH,HEIGHT)

      createPhysicsObject(WIDTH,HEIGHT,0,HEIGHT)

    end


    function draw()

      background(40,40,50)

      strokewidth(0)

      fill(255)


    physics.gravity(Gravity)

      ellipse(ball.x, ball.y, ball.radius*2)

    end

    ```


    Now as you tilt the device, you can see the ball moving around (see [Figure 12-6](#9781430246626_Ch12.xhtml#Fig6)).


    ![9781430246626_Fig12-06.jpg](OEBPS/Images/9781430246626_Fig12-06.jpg)


    [Figure 12-6](#9781430246626_Ch12.xhtml#_Fig6) .  The ellipse moves as you tilt
    the device and bounces off the sides of the screen


    As discussed, we can place a display object at the coordinates of the physics
    object at every frame as the positions are updated. In the preceding example,
    we used an ellipse. Here, we can simply replace the line that draws the ellipse
    with one that draws a sprite:


    ```

    sprite("Planet Cute:Character Boy", ball.x, ball.y, ball.radius*2)

    ```


    Not all of the physics functions are available in Codea. The following list describes
    those that Codea allows us to work with:


    *   body.applyForce: This function applies force to the physics body as a vector.

    *   body.applyTorque: This function applies torque to the physics body.

    *   body.destroy: This function destroys the physics body, which is then garbage-collected.

    *   body.getLinearVelocityFromLocalPoint: This function gets the linear velocity
    of the body at a given point in local space.

    *   body.getLinearVelocityFromWorldPoint: This function gets the linear velocity
    of the body at a given point in world space.

    *   body.getLocalPoint: This function returns the point of the physics body in
    local coordinates.

    *   body.getWorldPoint: This function returns the point of the physics body in
    world coordinates.

    *   body.testOverlap: This function tests if the physics body intersects with
    a given physics body.

    *   body.testPoint: This function can be used to determine if a world point is
    inside of the body.


    Vector Math


    Codea has built-in vector math functionality. There are two types of vector structures:
    vec2 and vec3\. The vec2 structure has functions for 2D vector math, and vec3
    has functions for 3D math. The functions available are similar, but vec2 takes
    two arguments while vec3 takes three arguments.


    angleBetween


    The angleBetween function returns the angle in radians, and it takes the other
    point to determine the angle between the two points, as a vec2 point.


    ```

    v1 = vec2(100,100)

    angle = math.deg(v1:angleBetween(vec2(100,200)))

    print(angle)

    ```


    cross


    The cross function returns the cross product between two vec2 types.


    ```

    v1 = vec2(1,1)

    vec = v1:cross(vec2(2,5))

    print(vec)

    ```


    dist


    The dist function returns the distance between the two vectors.


    ```

    v1 = vec2(1,1)

    vec = v1:dist(vec2(2,5))

    print(vec)

    ```


    distSqr


    The distSqr function returns the squared distance between two vectors.


    ```

    v1 = vec2(1,1)

    vec = v1:distSqr(vec2(2,5))

    print(vec)

    ```


    dot


    The dot function returns the dot product of two vectors.


    ```

    v1 = vec2(1,1)

    vec = v1:dot(vec2(2,5))

    print(vec)

    ```


    len


    The len function returns the length of the vector.


    ```

    v1 = vec2(1,1)

    print(vec:len())

    ```


    lenSqr


    The lenSqr function returns the squared length of the vector.


    ```

    v1 = vec2(1,1)

    vec = v1:lenSqr()

    print(vec)

    ```


    normalize


    The normalize function returns the normalized version of the vector.


    ```

    v1 = vec2(1,1)

    vec = v1:normalize()

    print(vec)

    ```


    rotate


    The rotate function returns a rotated copy of the vector. The angle has to be
    in radians.


    ```

    v1 = vec2(1,1)

    vec = v1:rotate(math.rad(45))

    print(vec)

    ```


    rotate90


    The rotate90 function returns a copy of the vector rotated by 90 degrees.


    ```

    v1 = vec2(1,1)

    vec = v1:rotate90()

    print(vec)

    ```


    Summary


    As discussed in this chapter, Codea is the only Lua framework as of now that runs
    on the device itself. This makes it the most accurate simulator of all the existing
    frameworks. The API is based on Processing and covers most of the functions required
    for mobile app development. It has some additional functions that were out of
    the scope of this chapter, but help in rendering complex 2D and 3D graphics. One
    of the functions that allows for advance effects is the mesh object.


    This chapter also discussed how to create videos and generate sound with Codea.
    Codea offers complete access to the iPad hardware, provides you with a substantial
    subset of Box2D physics functionality, and includes built-in 2D and 3D graphics
    capabilities. With the Codea runtime, apps can now be compiled and be uploaded
    for sale to the Mac App Store. Finally, Codea includes the entire API reference
    and IDE on the device itself, making it a great solution for the mobile developer
    on the move.


