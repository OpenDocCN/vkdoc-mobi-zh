    \ the characters on the screen, and the board. Lastly, `updateScreen()` would\
    \ update the score, the lives, the messages, and so on. If this were written in\
    \ C, C++, or similar, this would be fine, but in Lua, the while loops are not\
    \ very stable. Coroutines come in handy to make these routines more responsive.\n\
    \nAnother interesting thing is that although coroutines in Lua are not threads,\
    \ they can be used like threads (i.e., you can define multiple coroutines). Here’s\
    \ an example:\n\n```\nc1 = coroutine.create(function()\n    for i=1,20 do\n  \
    \      print( \"function 1: \", i)\n    end\nend)\nc2 = coroutine.create(function()\n\
    \    for i=1,5 do\n        print( \"function 2: \", i)\n    end\nend)\nc3 = coroutine.create(function()\n\
    \    for i=10,1,-1 do\n        print( \"function 3: \", i)\n    end\nend)\nwhile\
    \ true do\n    co1 = coroutine.resume(c1)\n    co2 = coroutine.resume(c2)\n  \
    \  co3 = coroutine.resume(c3)\n    if coroutine.status(c1)==\"dead\" and coroutine.status(c2)==\"\
    dead\" and coroutine.status(c3)==\"dead\" then break end\nend\n```\n\n### Working\
    \ with Tables\n\nRemember that in Lua, all variables other than numbers and strings\
    \ are memory locations and are passed by reference, which means that if we declare\
    \ table `t` and then assign `b` as `t`, we do not get a copy of `t` in `b`; instead,\
    \ `b` would point to the same table as `t`.\n\n```\nt = {\"One\", \"Two\", \"\
    Three\"}\nb = t\nprint(b[2])\nt[2]=\"Deux\"\nprint(b[2])\n```\n\nIn the case that\
    \ we need to copy the table, not just provide a pointer to the same memory address,\
    \ we need to do what is called a *deep copy*. Here’s an example:\n\n```\nfunction\
    \ deepcopy(t)\n    if type(t) ~= \"table\" then return t end\n    local res =\
    \ {}\n    local mt = getmetatable(t)\n    for k,v in pairs(t) do\n        if type(v)==\"\
    table\" then\n            v = deepcopy(v)\n        end\n        res[k] = v\n \
    \   end\n    setmetatable(res,mt)\n    return res\nend\n```"
