    local text = TextField.new(nil, "Hello World")

    text:setPosition(10,50)

    text:setTextColor(0xff0000)

    stage:addChild(text)

    text:setText("Hello from Gideros Studio")

    -- 修改文本

    text:setScale(2,2)

