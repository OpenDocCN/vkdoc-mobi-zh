    end)\n coroutine.resume(co)\nprint(coroutine.status(co))\ncoroutine.resume(co)\n\
    ...\ncoroutine.resume(co)\n```\n\n### Progress Bars\n\nAnother practical example\
    \ for using coroutines is with progress bars, as in the following example:\n\n\
    ```\nfunction doLongProcessing(a)\n    -- Do something\n    thread1 = coroutine.yield(\"\
    25%\")\n\n-- Do something\n    thread1 = coroutine.yield(\"50%\")\n\n-- Do something\n\
    \    thread1 = coroutine.yield(\"75%\")\n\n-- Do something\n    return \"100%\"\
    \nend\n\nthread = coroutine.create(doLongProcessing)\nwhile coroutine.status(thread)\
    \ ~= \"dead\" do\n    local _, res = coroutine.resume(thread)\n    print( \"Progress\
    \ is now \" .. res )\nend\n```\n\nIn contrast, consider the following code:\n\n\
    ```\ntStep = 1000\nfor i=1,100000 do\n  if i/tStep == math.floor(i/tStep) then\
