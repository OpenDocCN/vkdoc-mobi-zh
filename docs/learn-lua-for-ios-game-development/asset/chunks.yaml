- fmt: '**Note** You can adjust an object’s scale using either the `scale()` function
    or the `xScale` and `yScale` properties, although they work somewhat differently.
    The function scales the object relative to the current scaling, and the properties
    assign absolute scale values to the object.


    In this exercise, we’ll simply use the `xScale` or `yScale` method to scale the
    rectangle. The advantage is that we can scale an object on one axis when required
    with the `scale` property, whereas with the `scale()` function, we need to specify
    the scales for both the x- and y-axis.


    ```

    rect_01.xScale = 0.5

    ```


    Rotating the object is equally simple—we can simply use the `rotation` property
    or the `rotate()` function. Similar to the scaling function and method, `rotate`
    and `rotation` also work with relative or absolute rotation. If we were to call
    the `rotate()` function on the object three times with a value of 30, that would
    rotate the object to 90 degrees (i.e., 30 degrees × 3), whereas calling the `rotation`
    property with 30 any number of times would rotate it to an absolute value of 30
    degrees.


    ```

    rect_01.rotation = 30

    ```


    Here’s the code all together:


    ```

    local rect_01 = display.newRect( 50, 50, 200, 200 )

    rect_01:setFillColor(255,0,0)

    rect_01.strokeWidth = 2

    rect_01:setStrokeColor(0,255,0, 128)

    rect_01.xScale = 0.5

    rect_01.rotation = 30

    ```


    [Figure 8-6](#9781430246626_Ch08.xhtml#Fig6) shows what it would look like after
    applying all of the transformations just described.


    ![9781430246626_Fig08-06.jpg](OEBPS/Images/9781430246626_Fig08-06.jpg)


    [Figure 8-6](#9781430246626_Ch08.xhtml#_Fig6) . Transformations applied to the
    rectangle


    ## Groups


    All display elements can be placed in a group. Think of a group as a container
    that can hold display elements. The advantage of a group is that by manipulating
    the position and display attributes of the group, you can affect all of the display
    elements held in the group together. You can move, rotate, and scale them, and
    you can change their `alpha` property and the visibility.


    ```

    local grp = display.newGroup()

    local text1 = display.newText("One", 10, 10)

    local text2 = display.newText("Two", 10, 30)

    local text3 = display.newText("Cha-Cha Cha", 10, 50)

    ```


    When we run this, three lines of text are displayed on the screen. We can relocate
    any one of them by modifying the `x` or `y` position of the elements. Add the
    following code to the end of the preceding code. To rerun or refresh, simply press
    ![image](OEBPS/Images/flower.jpg) + `R` on the Mac or `Ctrl + R` on Windows. Corona
    SDK also monitors the directory for changes and will offer the option to relaunch
    the project if it is changed.


    ```

    text2.y = 90

    ```


    After running this, “Two” is now displayed below the “Cha-Cha Cha” text, and the
    place where “Two” was displayed is now blank, or empty.


    Let’s add the text “One” to the group:


    ```

    grp:insert(text1)

    ```


    When we refresh, everything should look the same as before. Let’s try to position
    the group that contains the text “One.”


    ```

    grp.x = 100

    grp.y = 20

    ```


    On refreshing the simulator, the text “One” moves, as shown in [Figure 8-7](#9781430246626_Ch08.xhtml#Fig7).
    It is now in the position where the text “Two” used to be, but a bit more to the
    right. Although we modified the position of the group, the text moved because
    it is contained in the group.


    ![9781430246626_Fig08-07.jpg](OEBPS/Images/9781430246626_Fig08-07.jpg)


    [Figure 8-7](#9781430246626_Ch08.xhtml#_Fig7) . Displaying text in a group


    By default, everything has a parent, or a group in which it is contained. The
    root, or parent, group of all elements created is referred to as the *stage*.
    We can access that via the `display.getCurrentStage()` function.


    ## Images


    One of the advantages of choosing Lua over languages such as C, C++, or Objective-C
    is that the need for allocating and deallocating memory is made redundant. The
    wrappers that the frameworks provide allow for easier coding compared to native
    code. When using Corona SDK, we can load and display images on the screen with
    ease.'
