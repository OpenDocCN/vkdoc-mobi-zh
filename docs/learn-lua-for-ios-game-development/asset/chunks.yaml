    \    transition.cancel(theText.trans)\n  end} )\n```\n\n请注意，当太阳到达屏幕顶部的那一刻，过渡会通过取消滚动文本来停止它。\n\
    \n你还可以向这些过渡函数传递另一个参数，即 `delta`。这是一个布尔值，可以是 `true` 或 `false`。默认值为 `false`，它指定传递的值是绝对值还是相对于当前值的相对值。\n\
    \n过渡不必是线性的（即步骤均匀）；例如，你可以让文本滑出屏幕时，在到达目标位置时产生加速或减速的效果。这种加速和减速的行为分别被称为*缓入*和*缓出*。Corona\
    \ SDK 提供了一些可用的缓动选项。\n\n```lua\nlocal theText = display.newText(\"Hello, hope you\
    \ are enjoying your journey with Lua so far\",0,440)\ntheText.x = theText.contentWidth\n\
    theText.trans = transition.to(\n    theText,{time=8000, x=-theText.contentWidth})\n\
    --\nlocal ball = display.newCircle ( 160, 480, 50 )\nball:setFillColor(255,255,0)\n\
    ball.alpha = 0.5\nball:scale(0.5,0.5)\n--\ntransition.to (ball, {time = 2000,\
    \ y = 80,\ntransition = easing.outExpo\n, onComplete=function()\n    transition.cancel(theText.trans)\n\
    \  end} )\n```\n\n在这段代码中，`transition = easing.outExpo` 使得球在向屏幕顶部移动时先减速然后加速。\n\n\
    你也可以通过编写自己的缓动函数来添加其他有趣的效果。这样的函数声明如下：\n\n```lua\neasing.function(t,tMax,start,delta)\n\
    ```\n\n在这个声明中，`t` 是自过渡开始以来的时间，`tMax` 是过渡的总时长，`start` 是初始值，`delta` 是过渡结束时的值变化量。最终值应始终为\
    \ `start` + `delta`。\n\n以下是一个 `easeOutBounce` 的示例，其效果见图 8-16。\n\n```lua\nfunction\
    \ easeOutBounce(t,b,c,d)\n     t,d,b,c= t,b,c,d;\n     t=t/d;\n     if (t<(1/2.75))\
    \ then\n          ret=c*(7.5625*t*t)+b\n     elseif (t<(2/2.75)) then\n      \
    \    t=t-(1.5/2.75)\n          ret=c*(7.5625*(t*t)+.75)+b\n     elseif (t<(2.5/2.75))\
    \ then\n          t=t-2.25/2.75;\n          ret=c*(7.5625*t*t+.9375)+b\n     else\n\
    \          t=t-2.625/2.75;\n          ret=c*(7.5625*t*t+.984375)+b\n     end\n\
    return ret;\nend\n```\n\n该代码取自 logHound 在 GitHub 上创作的 LHTween 库。\n\n![9781430246626_Fig08-16.jpg](img/9781430246626_Fig08-16.jpg)\n\
    \n图 8-16 . `easeOutBounce` 函数的图形走势\n\n## 从屏幕上移除对象\n\n你刚刚学会了如何停止一个过渡。然而，对象仍然停留在屏幕上。例如，如果这是一个显示关卡间分数的屏幕，我们希望它消失。最简单的方法，我们可以通过将\
    \ `isVisible` 属性设置为 `false` 来关闭对象的可见性。但是，通过这种方法，对象仍会保留在内存中（尽管屏幕上看不到），并会被再次创建；如果你玩一个包含大量关卡的游戏，屏幕上会有相当多的对象占用宝贵的内存。\n\
    \n移除这些对象的一个更好的方法是将它们从舞台中移除。当我们创建一个对象时，它会自动添加到舞台或父对象中。要移除一个对象，我们只需将对象句柄传递给 `display`\
    \ 命名空间中的 `remove()` 函数。例如，要移除前面示例中的文本，我们只需像下面这样做：\n\n```lua\ndisplay.remove(theText)\n\
    ```\n\n另一种移除对象的方法——看起来更简单直接——是调用显示对象的 `removeSelf` 函数：\n\n```lua\ntheText:removeSelf()\n\
    ```\n\n**注意：** 如果对象已被移除或为 `nil`，那么 `removeSelf` 函数将会执行失败并报错。然而，`display.remove`\
    \ 函数则会优雅地退出，即使要移除的对象先前已被移除，也不会产生任何错误。\n\n## 创建声音\n"
- fmt: '# 游戏音频与视频处理


    虽然我们已经涵盖了游戏玩法的视觉和触觉部分，但要完善体验，我们需要添加一些声音。这些声音可以很简单，例如触摸屏幕上元素时发出的声音，也可以更复杂，例如爆炸声或跳动的心脏音乐。我们可能还想包含用于广告目的的视频，作为帮助功能的替代，或帮助游戏故事从一个部分过渡到另一个部分。我们将在下一节中讨论创建视频。


    ## 让我们制造一些噪音


    `Corona SDK`有两组可用于音频的命名空间。最初它使用`media`命名空间，但现在正趋向于使`media`冗余，并希望开发人员使用`audio`命名空间配合`OpenAL`（以实现最大的Android兼容性）。`OpenAL`代表开放音频库，一个跨平台的音频库。其API风格和约定类似于`OpenGL`。`OpenAL`还提供多个同时通道来播放声音，因此你可以真正地叠加声音。例如，你可以模拟坐在户外咖啡馆的美好时光——同时听到一个人唱歌和弹吉他、其他人的聊天声、交通噪音等等。


    从基础开始，假设我们想要播放一个点击声，而我们的音频文件是`click.wav`。我们可以简单地使用`media`命名空间中的`playSound`函数：


    ```

    media.playSound ( "click.wav" )

    ```


    我们也可以使用`playEventSound`函数来播放短音（1到3秒之间）。这要求我们在播放之前加载声音。此函数不接受文件名，而是接受已加载声音数据的句柄。


    ```

    local snd = media.newEventSound ( "click.wav" )

    media.playEventSound ( snd )

    ```


    `playSound`函数也可以提供额外的参数，允许声音循环播放或在声音停止播放时调用函数。


    这可以用来创建一个简单的MP3点唱机，如下所示：


    ```

    local listMP3 = {

      "track1.mp3",

      "track2.mp3",

      "track3.mp3",

      "track4.mp3",

      "track5.mp3",

      "track6.mp3"

    }

    local currentTrack = 0

    --

    function getfilename(thisFile)

      local thePath = system.pathForFile( thisFile, system.ResourceDirectory)

      return thePath

    end

    --

    function playNextTrack()

      currentTrack = currentTrack + 1

      if currentTrack > #listMP3 then currentTrack = 1 end

      media.playSound(getfilename(listMP3[currentTrack]), playNextTrack)

    end

    --

    playNextTrack()

    ```


    在这段代码中，我们必须包含另一个函数`getfilename`，它返回曲目的文件路径，而不仅仅是文件名。我们所有的曲目都放在项目的根目录中，然后它们会被放入移动设备上的`ResourceDirectory`。因此，通过`system.pathForFile`函数，我们获得完整路径，将传递的目录前缀添加到文件名之前。该函数根据我们传递的目录名和文件名生成绝对路径。传递的两个参数是文件名和目录名；该函数本质上等同于返回目录名加`/`再加文件名。


    ## 操控声音


    在播放声音时，我们可以暂停或停止它。`media`命名空间提供了简单的方法：


    ```

    media.stopSound()

    media.pauseSound()

    ```


    我们还可以通过以下函数来增大或减小音量：


    ```

    media.getSoundVolume()

    media.setSoundVolume()

    ```


    音量表示为一个实数，范围从0到1.0，其中0表示静音，1.0表示最大音量。以下是一些以10%为增量增加或减少音量的代码：


    ```

    function increaseVolume()

      local currVol = media.getSoundVolume ( )

      if currVol >= 1.0 then return end -- Already at the max volume

      media.setSoundVolume ( currVol+0.1 )

    end

    --

    function decreaseVolume()

      local currVol = media.getSoundVolume ( )

      if currVol <= 0 then return end -- Already at the min volume

      media.setSoundVolume ( currVol-0.1 )

    end

    ```


    作为练习，尝试制作一个UI，可以显示当前正在播放的曲目名称，并在屏幕上放置用于播放、暂停以及跳到上一曲或下一曲的按钮。


    ## 使用 OpenAL 音频


    `audio`命名空间包含`OpenAL`函数，这些函数最终可能会取代`media.playSound`和`media.playEventSound`函数。


    使用`OpenAL`，你需要加载声音，然后在完成后释放它。如果不这样做，你可能会在内存中留下声音，并很快耗尽内存。


    ```

    local snd = audio.loadSound( "click.wav" )

    local channel = audio.play( snd )

    ```


    我们有32个通道可以用来播放声音。每次我们使用`audio.play`函数时，API会寻找一个空闲通道，然后在该通道上开始播放声音，并将通道号返回给我们。正是通过这个通道号，我们可以暂停或停止该通道上的声音播放。我们还可以查询通道以确定通道的状态，使用以下任一方法：


    ```

    audio.isChannelActive

    audio.isChannelPaused

    audio.isChannelPlaying

    ```


    一旦我们播放完声音，我们有责任使用`audio.dispose`函数来释放（释放用于声音的内存）声音：


    ```

    audio.dispose ( snd )

    ```


    ### 设置音量


    使用`OpenAL`，我们不仅可以设置主音量，还可以设置每个通道的音量。与`media`命名空间中的音量类似，音量范围从0（静音）到1.0（最大）。


    ```

    function increaseVolume()

      local currVol = audio.getVolume ( )

      if currVol >= 1.0 then return end -- Already at the max volume

      media.setVolume ( currVol+0.1 )

    end

    --

    function decreaseVolume()

      local currVol = media.getVolume ( )

      if currVol <= 0 then return end -- Already at the min volume

      media.setVolume ( currVol-0.1 )

    end

    ```


    请注意，我们使用了与之前相同的函数名，并用`audio`函数替换了`media`函数来操控音量。这样，如果代码封装在通用函数中，我们可以在应用程序中使用`increaseVolume`和`decreaseVolume`函数。由于这些函数可以针对任何框架编写，我们的代码将非常可移植。许多开发者（尤其是初学者）常犯的一个基本错误是直接访问框架函数。由于代码与框架紧密耦合，导致难以移植。


    ## 使用视频


    我们刚刚了解了如何处理声音；现在让我们看看如何处理视频。`media`命名空间有一个易于使用的API，使得播放视频非常简单：


    ```

    function done(event)

      print( "The video has finished playing" )

    end

    media.playVideo ( "video1.mov", true, done )

    ```


    `playVideo`函数的语法是：


    ```

    media.playVideo(path, showControls, listener)

    ```'
  raw: 'While we’ve covered the visual and tactile parts of game play, to complete
    the experience, we need to have some sound. This sound can be simple, such as
    the sound when an element on the screen is touched, or it can be more complex,
    such as the sound of explosions or pulsating music. We might also want to include
    a video for advertising purposes, as a replacement for a help feature, or for
    helping transition the game’s story from one part to another. We’ll look at creating
    video in the next section.


    Let’s Make Some Noise


    Corona SDK has two sets of namespaces that can be used for audio. Initially it
    used the media namespace, but it’s now pushing toward making media redundant,
    and wants developers to use the audio namespace with OpenAL (for maximum Android
    compatibility). OpenAL stands for Open Audio Library, a cross-platform audio library.
    The API style and conventions resemble those of OpenGL. OpenAL also provides multiple
    simultaneous channels for playing sounds, so you can really layer sounds. For
    example, you could simulate the sound of sitting at a café outside on a lovely
    day—hearing a person singing and playing a guitar, the chatter of other people
    talking, traffic, and so on, all at the same time.


    To start with the basics, let’s say we want to play a click sound, and the audio
    file we have is click.wav. We can simply use the playSound function from the media
    namespace:


    ```

    media.playSound ( "click.wav" )

    ```


    We can also use the playEventSound function to play a short sound (between 1 and
    3 seconds). This requires that we load the sound prior to playing it. This function
    does not take a file name, but instead takes a handle to the loaded sound data.


    ```

    local snd = media.newEventSound ( "click.wav" )

    media.playEventSound ( snd )

    ```


    The playSound function can also be provided additional parameters that allow for
    the sound to be looped or a function be called when the sound stops playing.


    This can be used to create a simple MP3 jukebox, like so:


    ```

    local listMP3 = {

      "track1.mp3",

      "track2.mp3",

      "track3.mp3",

      "track4.mp3",

      "track5.mp3",

      "track6.mp3"

    }

    local currentTrack = 0

    --

    function getfilename(thisFile)

      local thePath = system.pathForFile( thisFile, system.ResourceDirectory)

      return thePath

    end

    --

    function playNextTrack()

      currentTrack = currentTrack + 1

      if currentTrack > #listMP3 then currentTrack = 1 end

      media.playSound(getfilename(listMP3[currentTrack]), playNextTrack)

    end

    --

    playNextTrack()

    ```


    In this code, we had to include another function, getfilename, which returns the
    file path to the track, instead of just the file name. All of our tracks are placed
    in the root directory of the project, and they would then get placed into the
    ResourceDirectory on the mobile device. So, with the system.pathForFile function,
    we get the full path, prefixing the file with the passed directory. The function
    generates an absolute path based on the directory that we pass along with the
    file name. The two arguments passed are the file name and the directory name;
    the function is essentially the equivalent of returning the directory name, plus
    /, plus the file name.


    Manipulating the Sound


    While the sound is playing, we can pause it or stop it. The media namespace offers
    an easy way to do so:


    ```

    media.stopSound()

    media.pauseSound()

    ```


    We can also increase or decrease the volume by using the following functions:


    ```

    media.getSoundVolume()

    media.setSoundVolume()

    ```


    The volume is expressed as a real number that has the range from 0 to 1.0, with
    0 being silent and 1.0 being the loudest possible volume. Here’s some code to
    increase or decrease the volume in increments of 10 percent:


    ```

    function increaseVolume()

      local currVol = media.getSoundVolume ( )

      if currVol >= 1.0 then return end -- Already at the max volume

      media.setSoundVolume ( currVol+0.1 )

    end

    --

    function decreaseVolume()

      local currVol = media.getSoundVolume ( )

      if currVol <= 0 then return end -- Already at the min volume

      media.setSoundVolume ( currVol-0.1 )

    end

    ```


    As an exercise, try to make a UI that can display the name of the current track
    being played, and place some buttons on the screen for playing, pausing, and skipping
    to the next or previous track.


    Using OpenAL Sound


    The audio namespace includes the OpenAL functions, which might eventually replace
    the media.playSound and media.playEventSound functions.


    With OpenAL, you need to load the sound and then dispose of it once you are done.
    If you don’t, you can end up leaving sounds in memory and soon run out of memory.


    ```

    local snd = audio.loadSound( "click.wav" )

    local channel = audio.play( snd )

    ```


    We have 32 channels on which we can play our sounds. Each time we use the function
    audio.play, the API looks for a free channel and starts to play the sound on that
    channel, and it returns the channel number back to us. It is with this channel
    number that we can pause or stop the sound from playing on that channel. We can
    also query the channel to determine the state of the channel, using any of the
    following:


    ```

    audio.isChannelActive

    audio.isChannelPaused

    audio.isChannelPlaying

    ```


    Once we have finished playing the sounds, we are responsible for disposing of
    (freeing up the memory used for) the sound using the audio.dispose function.


    ```

    audio.dispose ( snd )

    ```


    Setting the Volume


    With OpenAL, we can set not only the master volume, but also the volume for each
    of the channels. Similar to the volume in the media namespace, the level ranges
    from 0 (silent) to 1.0 (loudest).


    ```

    function increaseVolume()

      local currVol = audio.getVolume ( )

      if currVol >= 1.0 then return end -- Already at the max volume

      media.setVolume ( currVol+0.1 )

    end

    --

    function decreaseVolume()

      local currVol = media.getVolume ( )

      if currVol <= 0 then return end -- Already at the min volume

      media.setVolume ( currVol-0.1 )

    end

    ```


    Notice that we are using the same name for the function that we used previously,
    and we’re substituting the media functions with the audio functions to manipulate
    the volume. This way, if the code is encapsulated within a generic function, we
    can use the functions increaseVolume and decreaseVolume from our app. Since these
    can be written for any framework, our code will be quite portable. One of the
    basic mistakes a lot of developers (especially those starting off) make is that
    of directly accessing the framework functions. Due to the fact that the code becomes
    tightly integrated with the framework, it becomes difficult to port it.


    Working with Videos


    We have just had a look at how to work with sound; let’s look at how to work with
    video. The media namespace has an easy-to-use API and makes it quite simple to
    play video:


    ```

    function done(event)

      print( "The video has finished playing" )

    end

    media.playVideo ( "video1.mov", true, done )

    ```


    The syntax of the playVideo function is


    ```

    media.playVideo(path, showControls, listener)

    ```'
