    \   end\n  end)\n\ntheTimer:addEventListener(Event.TIMER_COMPLETE,\n  function(event)\n\
    \    print(\"所有定时器循环已完成\")\n  end)\n\ntheTimer:start()\n\nstage:addEventListener(\"\
    hi\",\n  function()\n    print(\"你好\")\n  end)\n```\n\n管理自定义事件的方式是使用 `addEventListener`\
    \ 为特定类型的事件设置事件监听器。使用 `Event` 类通过 `Event.new(eventName)` 创建事件后，当我们想要触发该事件时，可以使用\
    \ `dispatchEvent` 函数。\n\n### 移除事件\n\n事件可以使用 `removeEventListener` 移除，其方式类似于使用\
    \ `addEventListener` 添加事件。要添加事件处理函数，可以使用以下方法：\n\n```\nobject:addEventListener(EventName,\
    \ evtHandler)\n```\n\n同样，以下是移除事件处理函数的方法：\n\n```\nobject:removeEventListener(EventName,\
    \ evtHandler)\n```\n\n还可以向事件添加额外的数据并将其传递给处理函数。以下是一个示例：\n\n```\nlocal myEvent =\
