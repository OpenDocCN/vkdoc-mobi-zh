    \   objType = rnd\n   })\nend\n```\n\n## 移动场景对象\n\n在上一节中，我们生成了 11 个对象，但将其`x`位置设置在屏幕之外。这样，物体会从屏幕外的位置开始，逐渐滚动进入视野，而不是突然出现在屏幕上。然而，我们还没有编写场景滚动的代码。在我们的`update`函数中，需要在`moveBullets`函数之后添加`moveScenery()`。其思路与`moveBullets`函数类似。不过，在这个函数中，除了移动物体以营造直升机在天空中飞行的错觉（物体会从旁掠过）之外，我们还需要更新飞行距离和消耗的燃料。当燃料储备达到临界值\
