    \    print(\"All timer loops completed\")\n  end)\n\ntheTimer:start()\n\nstage:addEventListener(\"\
    hi\",\n  function()\n    print(\"Hello\")\n  end)\n```\n\nThe way to manage custom\
    \ events is to set up an event listener for a particular type of event using `addEventListener`.\
    \ After creating an event using the `Event` class with `Event.new(eventName)`,\
    \ when we want to raise the event, we can use the `dispatchEvent` function.\n\n\
