    最后一行是程序的输出，我们通过代码打印了它。第二行表示代码和资源的上传已完成。Gideros Studio 会将资源复制到播放器（上传到播放器），并在上传过程中逐一显示在输出面板上，打印确认信息，然后执行程序。


    ## 配置项目


    右键单击屏幕左侧的项目名称，选择 `属性` 选项。在此可以设置项目的属性。你可以在这里设置应用的缩放模式、逻辑尺寸、方向、帧率，甚至根据需要设置图像文件的后缀。虽然这是你学习
    Gideros Studio 初期可能不会用到的高级选项，但它非常实用，因此我将在此进行说明。


    第一个选项 `缩放模式` 设置了应用在不同设备上运行时的缩放方式——本章后续内容将对此进行更详细的介绍。逻辑尺寸用于设置应用的基础参数；显示画面将基于这些尺寸，通过缩放模式在不同设备上进行适配。苹果系统使用
    `@2x` 或 `@4x` 后缀来加载新款 iPhone 和 iPad 的视网膜图形。Gideros 作为一个多平台系统，也将这种格式扩展到了 Android
    平台。因此，你可以使用 `@1.5`、`@2`、`@4` 等作为后缀。


    **提示** 缩放后缀不仅可用于高清图形，还可以为每个平台提供对应的图形，而无需编写任何检测特定平台的代码。


    `iOS` 标签页可用于配置 iOS 特定的其他设置；例如，应用是否应将目标设备视为视网膜屏设备，以及是否启用自动旋转。如果逻辑尺寸设置为 `320×480`，并且视网膜显示设置为
