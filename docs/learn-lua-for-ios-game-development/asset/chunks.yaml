    服务器，甚至 `Dropbox`。它支持超过 80 种语言的语法高亮，还支持 `TextMate` 主题和定义。可以通过符号浏览器中的列表浏览文件中的函数并跳转到对应位置。它仅包含
    `HTML` 和 `CSS` 关键字的自动完成功能（目前）。它还提供一个屏幕光标，有助于导航和选择，如图 Figure 14-9 所示。


