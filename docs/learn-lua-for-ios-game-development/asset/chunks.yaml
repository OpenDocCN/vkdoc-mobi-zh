    \ -- a fresh start with every life\n\n-- updateAllText() -- Update the HUD\n  playSound(sounds.crash)\
    \ -- Crash Sound\n  wTime = 2\n  performAfter(1000, -- perform this after a second\n\
        function()\n      -- remove all scenery items\n      for i=#scenery, 1, -1\
    \ do\n        destroyObject(scenery[i].sprite)\n        table.remove(scenery,\
    \ i)\n      end\n      -- remove all bullets\n      for i = #bullets, 1, -1 do\n\
            destroyObject(bullets[i].sprite)\n        table.remove(bullets, i)\n      end\n\
          wTime = 2\n      position(heli,_W/2,_H/2)\n      gameOver = lives <= 0\n\
          setVisible(heli, not gameOver)\n      setVisible(txtGameOver, gameOver)\n\
          setVisible(txtTapAgain, gameOver)\n\nsetVisible(tanker, false)\n      position(tanker,\
    \ _W + random(3,5) * tanker.width, baseLine - tanker.height)\n      if gameOver\
    \ == true then\n        if floor(distance) + score > hiscore then \n          hiscore\
    \ = floor(distance) + score\n        end\n\n-- showReplayScreen()\n      end\n\
        end)\n\nend\n```\n\nSince we need to create a generic set of functions to\
    \ accommodate several frameworks, we have a couple of new functions like setVisible\
    \ and bringToFront, which allows us to show or hide the objects or re-order the\
    \ display of the objects.\n\nHere’s the code for Corona SDK:\n\n```\nfunction\
    \ setVisible(theObject, setHow)\n    if theObject == nil then return end\n  theObject.isVisible\
    \ = setHow or false\nend\n```\n\nAnd here’s the code for Gideros Studio:\n\n```\n\
    function setVisible(theObject, setHow)\n    if theObject == nil then return end\n\
      local setHow = setHow or false\n  theObject:setVisible(setHow)\nend\n```\n\n\
    The bringToFront function is defined as follows in Corona SDK:\n\n```\nfunction\
