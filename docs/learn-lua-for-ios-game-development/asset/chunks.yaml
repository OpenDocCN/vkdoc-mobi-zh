- fmt: "`SvgParser.new(\"myFile.svg\")`\n\n## TNT Particles Library\n\n*   *URL*:\
    \ [www.tntparticlesengine.com/](http://www.tntparticlesengine.com/)\n*   *Price*:\
    \ Free\n*   *Platforms*: Gideros Studio\n\nThis is the only library offering for\
    \ Gideros Studio for working with particles. Best of all, it’s free.\n\n**Sample\
    \ Code**\n\n```\nlocal particleGFX = (Texture.new(\"smoke.png\"))\nlocal cloud1\
    \ = CParticles.new(particleGFX, 5, 12, 12, \"screen\")\ncloud1:setSpeed(10, 40)\n\
    cloud1:setSize(3, 5)\ncloud1:setAlpha(0)\ncloud1:setRotation(0, -10, 360, 10)\n\
    cloud1:setAlphaMorphIn(20, 3)\ncloud1:setAlphaMorphOut(0, 3)\nlocal emitter1 =\
    \ CEmitter.new(cloud1)\nemitter1:start()\n```\n\n## Busted\n\n*   *URL*: [https://github.com/Olivine-Labs/busted/](https://github.com/Olivine-Labs/busted/)\n\
    *   *Price*: Free\n*   *Platforms*: All Lua-based platforms\n\nOne common complaint\
    \ from developers is that Lua does not enable unit-testing functionality. Unit\
    \ testing is quite an important concept, especially when working with abstract\
    \ and predisplay rendered classes. This library is not tied to any framework,\
    \ but instead uses pure Lua functions. The specs for Busted test scripts read\
    \ naturally, like English. The output is quite easy to understand and visually\
    \ comprehensible, as shown in [Figure 13-7](#9781430246626_Ch13.xhtml#Fig7).\n\
    \n![9781430246626_Fig13-07.jpg](OEBPS/Images/9781430246626_Fig13-07.jpg)\n\n[Figure\
    \ 13-7](#9781430246626_Ch13.xhtml#_Fig7) .  Busted running unit tests\n\n**Sample\
