    )\nlocal loader4 = UrlLoader.new(url, UrlLoader.PUT, \"my put data\")\nlocal loader5\
    \ = UrlLoader.new(url, UrlLoader.DELETE)\n\nlocal headers = {\n    [\"Content-Type\"\
    ] = \"application/x-www-form-urlencoded\",\n    [\"User-Agent\"] = \"Gideros Browser\"\
    ,\n}\nlocal loader6 = UrlLoader.new(url, UrlLoader.PUT, headers, \"key=value\"\
    )\n```\n\n我们可以设置监听器来监听进度事件、完成事件和错误事件。每次接收到数据块时，都会触发进度事件，事件对象会传递 `bytesLoaded`\
    \ 和 `bytesTotal`。这可用于跟踪并以字节或百分比形式显示进度。如果出现错误，则会触发错误事件；成功完成后，则会触发完成事件。\n\n## GPS\
    \ 与罗盘\n\n可以查询设备的 GPS 位置和罗盘位置详情。我们可以通过为 GPS 设置 `Event.HEADING_UPDATE` 事件监听器，以及为罗盘设置\
    \ `Event.LOCATION_UPDATE` 事件监听器来获取这些读数，如下所示：\n\n```\nrequire \"geolocation\"\n\
    \nfunction onHeadingUpdate()\n\nend\n\nfunction onLocationUpdate(event)\n  latitude\
