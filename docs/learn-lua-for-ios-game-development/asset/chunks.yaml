    end\n```\n\n# Detecting Whether a String Is a Palindrome\n\nWe can use the `reverse`\
    \ function to check if a string is a palindrome or not. The easiest way do this\
    \ is to check whether the string is the same forward as it is when reversed.\n\
    \n```\nfunction string:isPalindrome( )\n    return self == self:reverse()\nend\n\
    ```\n\n# Splitting a String\n\nEarlier, you learned how to split a string in a\
