    ## Inkscape


    - *URL*: [http://inkscape.org/](http://inkscape.org/)

    - *Price*: Free

    - *Platforms*: Mac OS X, Windows


    With the retina display, Apple has expected that the assets be created in different
    resolutions: normal, `@2x` (for retina devices), and now `@HD` or `@4x` (retina
    iPads). The raster or bitmap graphics can be scaled only so much from normal resolution
    to large HD graphics before you notice the scaling and pixelation. With vector
    graphics, the image can be scaled to suit various resolutions without significant
    loss of detail. Adobe Illustrator and Corel Draw have set the standards in this
    space; however, Inkscape has a large set of tools and is comparable to these programs
    (as shown in the sample image in [Figure 14-16](#9781430246626_Ch14.xhtml#Fig16)).
    Even better, it is open source and free.


    ![9781430246626_Fig14-16.jpg](OEBPS/Images/9781430246626_Fig14-16.jpg)


    [Figure 14-16](#9781430246626_Ch14.xhtml#_Fig16) .  An example of art that can
    be produced with Inkscape using vector objects


    ## Paint.NET


    - *URL*: [www.getpaint.net](http://www.getpaint.net)

    - *Price*: Free

    - *Platforms*: Windows


    This open source paint software for Windows offers layers and functionality like
    Photoshop, but at no price. Paint.NET offers most of the features of Photoshop,
    including the ability to edit multiple images at the same time. It features layers
    that allow for compositing effects and editing. It has an unlimited undo history.
    It runs on the Windows platform and is quite fast. It also has support for plug-ins.
    [Figure 14-17](#9781430246626_Ch14.xhtml#Fig17) shows Paint.NET in action.


    ![9781430246626_Fig14-17.jpg](OEBPS/Images/9781430246626_Fig14-17.jpg)


    [Figure 14-17](#9781430246626_Ch14.xhtml#_Fig17) .  An image in Paint.NET


    ## iConify


    - *URL*: [http://itunes.apple.com/us/app/iconify/id416289784?mt=12](http://itunes.apple.com/us/app/iconify/id416289784?mt=12)

    - *Price*: Free

    - *Platforms*: Mac OS X only


    When you’ve finished creating your game or app, you need to create the icons and
    assets for packaging the app. Apple, in particular, requires you to use a couple
    of icons of specific sizes before you can make your app available in the App Store.
    iConify is one of the many utilities available that can help you create icons
    of the various required sizes. [Figure 14-18](#9781430246626_Ch14.xhtml#Fig18)
    shows the simple interface of iConify.


    ![9781430246626_Fig14-18.jpg](OEBPS/Images/9781430246626_Fig14-18.jpg)


    [Figure 14-18](#9781430246626_Ch14.xhtml#_Fig18) .  Using iConify to create appropriately
    sized icons for iOS devices


    Here are some of its key features:


    - The application is simple to use.

    - You can drag `512×512`-pixel or `1024×1024`-pixel icons to the canvas and have
    all the necessary smaller icons are created for you automatically.


    ## Sprite Animation and Level Creation Tools


    This section describes a variety of tools for creating sprite animations and levels
    in your own games to give them that extra polish and visual appeal.


    ### SpriteHelper


    - *URL*: [http://itunes.apple.com/us/app/spritehelper/id416068717?mt=12](http://itunes.apple.com/us/app/spritehelper/id416068717?mt=12)

    - *Price*: $12.99

    - *Platforms*: Mac OS X


    This is a tool that takes individual frames and creates a single sprite sheet
    texture that contains these frames. SpriteHelper goes a little beyond by also
    including the ability to set the physics object properties to the frame, as shown
    in [Figure 14-19](#9781430246626_Ch14.xhtml#Fig19). Corona SDK is presently the
    only framework that SpriteHelper natively supports. However, it is rather easy
    to adapt SpriteHelper for use with Gideros Studio or Moai. SpriteHelper is available
    only via the Mac App Store. It’s also available as a free lite version that has
    limited functionality, but is good enough for testing out the product.


    ![9781430246626_Fig14-19.jpg](OEBPS/Images/9781430246626_Fig14-19.jpg)


    [Figure 14-19](#9781430246626_Ch14.xhtml#_Fig19) .  Editing the physics boundary
    of a sprite with SpriteHelper


    ### LevelHelper


    - *URL*: [http://itunes.apple.com/us/app/levelhelper/id421740820?mt=12](http://itunes.apple.com/us/app/levelhelper/id421740820?mt=12)

    - *Price*: $19.99

    - *Platforms*: Mac OS X


    Complementary to SpriteHelper, this app helps you create levels for your game.
    It is similar to a tile-based editor, but with the difference that it also allows
    for adding physics objects and shapes to the levels, as shown in [Figure 14-20](#9781430246626_Ch14.xhtml#Fig20).
    It can currently output levels for cocos2D and Corona SDK only. Like SpriteHelper,
    LevelHelper is also available via the Mac App store only and offers a free lite
    version.


    ![9781430246626_Fig14-20.jpg](OEBPS/Images/9781430246626_Fig14-20.jpg)


    [Figure 14-20](#9781430246626_Ch14.xhtml#_Fig20) .  LevelHelper, with a level
    on the screen and simulated on the device


    ### Tiled


    - *URL*: [www.mapeditor.org/](http://www.mapeditor.org/)

    - *Price*: Free

    - *Platforms*: Mac OS X, Windows, `*nix`


    Tiled is a recommended and widely used open source editor for creating tile maps.
    It works by generating `TMX` files that contain map definitions. Gideros Studio
    has a native API to read this format. The generated tile maps can be read in other
    frameworks and used for RPG-style or tile-based games. [Figure 14-21](#9781430246626_Ch14.xhtml#Fig21)
    shows an RPG map being created in Tiled.


    ![9781430246626_Fig14-21.jpg](OEBPS/Images/9781430246626_Fig14-21.jpg)


    [Figure 14-21](#9781430246626_Ch14.xhtml#_Fig21) .  Map editing in the Tiled editor


    ### TexturePacker


    - *URL*: [www.codeandweb.com/texturepacker](http://www.codeandweb.com/texturepacker)

    - *Price*: $24.84

    - *Platforms*: Mac OS X, Windows, Ubuntu


    This utility helps create sprite sheets and texture maps. It can even create sprite
    sheets from `PSD` and `SWF` files. It has versatile output and supports Corona
    SDK, Gideros Studio, and Moai, in addition to some other frameworks, and even
    supports the generic JSON format, which can be used in any framework when parsed.
    The TexturePacker web site has some interesting information about texture packaging,
    plus tutorials and articles to help you understand how to use TexturePacker. TexturePacker
    can also be used to automate with the build process using Xcode, Ant, CMake, and
    so on. [Figure 14-22](#9781430246626_Ch14.xhtml#Fig22) shows a sprite sheet being
    created from a Flash animation (`SWF`) in TexturePacker.


    ![9781430246626_Fig14-22.jpg](OEBPS/Images/9781430246626_Fig14-22.jpg)


    [Figure 14-22](#9781430246626_Ch14.xhtml#_Fig22) .  TexturePacker creating a sprite
    sheet from a Flash animation (`SWF`)


    ### PhysicsEditor


    - *URL*: [www.codeandweb.com/physicseditor](http://www.codeandweb.com/physicseditor)

    - *Price*: $19.87

    - *Platforms*: Mac OS X and Windows


    PhysicsEditor is the complementary app from the author of TexturePacker. PhysicsEditor
    is a tool for defining physics objects for your graphics to include in your game
    framework. It allows you to create realistic collisions and other physics events.
    It even has the facility to create collision masks between objects, and it works
    with a variety of frameworks, including Corona SDK, Gideros Studio, and Moai.
    The author of PhysicsEditor is quite proactive in adapting the tools to work with
    as many frameworks as possible. [Figure 14-23](#9781430246626_Ch14.xhtml#Fig23)
    shows an example of PhysicsEditor at work.


    ![9781430246626_Fig14-23.jpg](OEBPS/Images/9781430246626_Fig14-23.jpg)


    [Figure 14-23](#9781430246626_Ch14.xhtml#_Fig23) .  Outlining an image for use
    with physics engines in PhysicsEditor


    ### Particle Designer


    - *URL*: [http://particledesigner.71squared.com/](http://particledesigner.71squared.com/)

    - *Price*: $7.99

    - *Platforms*: Mac OS X'
