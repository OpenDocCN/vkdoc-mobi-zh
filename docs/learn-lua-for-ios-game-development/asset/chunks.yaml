    \ \n  G = G / 255 \n  B = B / 255 \n  A = A / 255\n\nTheobject:Setcolortransform(R,\
    \ G, B, A)\nEnd \n```\n\n我们可以在生成敌人时为其添加颜色属性来着色，如下所示：\n\n```lua\n  Clr = Random(1,7)\n\
