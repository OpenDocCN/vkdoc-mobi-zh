    \ |\n| 物理 | `BEGIN_CONTACT` `END_CONTACT` `PRE_SOLVE` `POST_SOLVE` |\n\n### 触摸事件\n\
    \n应用程序需要设置事件监听器才能监听特定事件。事件监听器可以附加到任何显示对象上。\n\n```\nlocal image = newImage(\"myImage.png\"\
