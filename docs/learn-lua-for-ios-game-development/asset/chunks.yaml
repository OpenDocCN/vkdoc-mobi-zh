    \ 编写的插件只能用于 iOS。\n\n## 总结\n\nGideros Studio 是一个在 Windows 和 Mac OS X 上完整的开发包，包含一系列用于开发和测试应用程序的工具。如果框架本身不能满足你的需求，或者你想通过添加一些额外代码（例如\
