    \n```lua\nfunction bringToFront(theObject)\n    if theObject == nil then return\
    \ end\n  stage:addChild(theObject, 1)\nend\n```\n\n## 增添一些色彩\n\n我们为游戏创建的图形都是黑白的。为了增加一些变化，我们可以通过代码为对象赋予特定的\
    \ RGB 值来为其着色。我们可以建立一个基本颜色表，然后用它来为图形着色。\n\n```lua\nLocal Colors = {\n  {0,   0,\
    \   255},    -- 蓝色\n  {255, 0,   0},      -- 红色\n  {0,   255, 0},      -- 绿色\n\
