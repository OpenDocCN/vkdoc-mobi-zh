    \ Figure 11-1 所示。\n\n![9781430246626_Fig11-01.jpg](img/9781430246626_Fig11-01.jpg)\n\
    \nFigure 11-1 . LÖVE 的基本架构及其回调函数\n\nLÖVE 基于回调原理工作，回调可以是用户通过代码设置的自定义函数，也可以是作为回调的预定义函数。在\
    \ LÖVE 中，回调用是预定义函数。因此，如果你定义了其中一个函数，它将在适当的时候被调用。\n\n## 安装 LÖVE\n\nLÖVE 运行在桌面上。你可以通过下载源码并构建二进制文件，或者直接下载预构建的二进制文件来安装\
    \ LÖVE。LÖVE 的源码托管在 Bitbucket 上，可以从 [`bitbucket.org/rude/love`](https://bitbucket.org/rude/love)\
    \ 下载。适用于相应平台的预构建二进制文件可以从 [`love2d.org/#download`](https://love2d.org/#download)\
    \ 下载。\n\n## 运行 LÖVE\n\n在 LÖVE 中创建第一个 Hello World 程序与许多其他框架类似。我们创建一个文件夹——称之为 `Love_01`——然后在其中创建一个名为\
    \ `main.lua` 的文本文件，内容如下：\n\n```\nprint(\"Hello World from Love\")\n```\n\n我们可以通过将项目文件夹拖放到\
    \ LÖVE 可执行文件上来启动应用程序。或者，我们可以在终端中输入以下命令：\n\n```\nlove projectdir/main.lua\n```\n\
    \n我们将看到一个空白的窗口，代码中的 `print` 语句显示在终端中。要显示文本，只需在 `main.lua` 文件中添加以下代码并重新运行，你会看到如\
    \ Figure 11-2 所示的输出。\n\n![9781430246626_Fig11-02.jpg](img/9781430246626_Fig11-02.jpg)\n\
    \nFigure 11-2 . 在 LÖVE 中运行的 Hello World\n\n```\nfunction love.draw()\n    love.graphics.print('Hello\
    \ World!', 400, 300)\nend\n```\n\n## 回调函数\n\n本节描述我们可以重写以使 LÖVE 为我们工作的回调函数。\n\n\
    ### `love.load()`\n\n该函数在游戏启动时被调用；它类似于 JavaScript 中的 `window_onLoad` 函数或 C 语言中的\
    \ `main()` 入口点。它只被调用一次，用于执行诸如加载资源、设置特定设置、初始化变量等任务。在面向对象的环境中，可以将其视为构造函数；它在 LÖVE\
    \ 应用程序启动时只运行一次。\n\n### `love.update(dt)`\n\n该函数几乎连续不断地被调用。这就像一个 `enterFrame` 事件或应用程序的心跳。传递给该函数的参数是\
    \ `dt`，即 *增量时间*（delta time）——自上次调用该函数以来经过的时间，以秒为单位。这可能是一个非常小的值——小至 0.025714 秒（取决于你的平台）。帧率也会影响增量时间。\n\
    \n### `love.draw()`\n\n这是所有屏幕绘制工作发生的地方。如果你之前有过使用 Visual C++、MFC、ATL、OWL 或 Objective-C\
    \ 进行开发的经验，你会熟悉这种类型的函数。如果在此函数外部调用任何绘制命令，它们将不会产生任何效果。\n\n### `love.mousepressed(x,\
    \ y, button)`\n\n每当按下鼠标按钮时，都会调用此函数；此函数是鼠标按下事件的处理程序，并传递鼠标按下时所在的 x 和 y 坐标。它还会获取按下了哪个鼠标按钮：左键、右键或中键。\n\
    \n### `love.mousereleased(x, y, button)`\n\n当释放鼠标按钮时，会调用此函数；它充当鼠标释放事件的处理程序，并传递鼠标释放时所在的\
    \ x 和 y 坐标以及释放的鼠标按钮。\n\n### `love.keypressed(key, unicode)`\n\n当按下键盘上的某个键时，会调用此函数；此函数充当按键按下事件的处理程序，并传递键码。`key`\
    \ 参数保存所按下键的字符，`unicode` 参数保存该键的 ASCII 码。如果你按下 `a` 键，那么 `key` 将是 `a`，`unicode`\
    \ 将是 `97`。\n\n### `love.keyreleased(key)`\n"
- fmt: "# LÖVE Functions and Namespaces\n\nThis function is called when a key that\
    \ was pressed is released. This function acts as a handler for the key-release\
    \ event and is passed the key code. A complete reference of the key codes can\
    \ be found at [https://love2d.org/wiki/KeyConstant](https://love2d.org/wiki/KeyConstant).\n\
    \n`love.focus()`\n\nThis function is called when the user clicks on or off (any\
    \ other window or desktop) the LÖVE window. This is most useful for determining\
    \ if the game is in the current window or not; if it isn’t, then you can pause\
    \ the game or limit the processing.\n\n`love.quit()`\n\nThis function is called\
    \ when the user closes the window by clicking the Close button (the X for Windows\
    \ and the red dot for Mac OS X). This can be thought of as the destructor that\
    \ is called when the game has to quit; it can be used to release the memory of\
    \ all loaded objects and even save the game data (if any).\n\n## LÖVE Namespaces\n\
    \nThe LÖVE system has several namespaces, each of which has functions. The functions\
    \ described in the preceding section are part of the global `love` namespace and\
    \ hence are prefixed with `love.` The other namespaces are described in this section.\n\
    \n### `love.audio`\n\nThis namespace provides an interface to output sound from\
    \ the speakers. This namespace plays the actual sounds. All functionality associated\
    \ with audio processing can be found here, including changing the volume, playing,\
    \ pausing, and stopping the sound.\n\n### `love.event`\n\nThis namespace manages\
    \ events, as we learnt earlier. All events (e.g., keypresses, mouse clicks, etc.)\
    \ are part of the `love.event` namespace.\n\nThe *event queue* is used by the\
    \ application to communicate within the application. This is similar to the event\
    \ dispatcher and the event listener.\n\n```\n-- Using an event queue\nfunction\
    \ love.keypressed(k)\n    if k == 'escape' then\n       love.event.push('quit')\
    \ -- Quit the game\n        -- In LÖVE 7.0, you would only push 'q' to the event\
    \ queue\n    end\nend\n\n-- using event.poll\nfor event, arg1, arg2, arg3, arg4\
    \ in love.event.poll() do\n    if event == \"quit\" then -- Quit!\n        --\
    \ In LÖVE 7.0, you would look for 'q'\n    end\nend\n```\n\n`love.event.wait`\
    \ is a blocking function (i.e., it will stop the application and wait till it\
    \ finds an event).\n\n```\nevent, arg1, arg2, arg3 = love.event.wait( )\n```\n\
    \n**Note** There are some differences between LÖVE 0.7.2 and 0.8.0 regarding the\
    \ number of parameters returned in `love.event` functions.\n\n### `love.filesystem`\n\
    \nThis provides an interface to the user’s file system. This is sandboxed, in\
    \ a manner of speaking, and the access is granted to only two directories:\n\n\
    * The root folder of the `.love` archive (or source directory)\n* The root folder\
    \ of the game’s *save directory*.\n\nThe write access is provided to only the\
    \ game’s save directory. This directory can be found in the following places on\
    \ the various operating systems:\n\n* *Windows XP*: `C:\\Documents and Settings\\\
    user\\Application Data\\Love\\` or `%appdata%\\Love\\`\n* *Windows Vista and 7*:\
    \ `C:\\Users\\user\\AppData\\Roaming\\LOVE` or `%appdata%\\Love\\`\n* *Linux*:\
    \ `$XDG_DATA_HOME/love/` or `~/.local/share/love/`\n* *Mac*: `/Users/user/Library/Application\
    \ Support/LOVE/`\n\n### `love.font`\n\nThis provides a series of functions that\
    \ allow for working with fonts. The functions in this namespace allow for creating\
    \ or using custom fonts.\n\n### `love.graphics`\n\nThis namespace provides a very\
    \ large number of graphics-related functions. This is where all the functions\
    \ for graphical functionality reside.\n\n### `love.image`\n\nThe `love.image`\
    \ namespace has a series of functions that can be used to decode and encoded image\
    \ files.\n\n### `love.joystick`\n\nThis namespace houses functions that act similarly\
    \ to the mouse- and touchpad-related functions. The joystick is simply another\
    \ input option.\n\n### `love.mouse`\n\nThis namespace provides an interface to\
    \ the user’s mouse. It has functions that can get the x,y-coordinates or the mouse\
    \ cursor, show and hide the cursor, and determine the state of the mouse (e.g.,\
    \ if a button is pressed or not).\n\n### `love.physics`\n\nThis namespace houses\
    \ the Box2D set of functions for including physics in the app or game. Though\
    \ the interfaces to physics in most of the frameworks are easy, Box2D underneath\
    \ that interface is still massive and complex.\n\n### `love.sound`\n\nNot to be\
    \ confused with the `love.audio` namespace, the functions in the `sound` namespace\
    \ are useful for working with encoded sound files. This namespace provides the\
    \ audio file encoder functions.\n\n### `love.thread`\n\nThis namespace offers\
    \ functions for working with threading.\n\n### `love.timer`\n\nThis namespace\
    \ is home to all the timer-related functions.\n\n## The Graphics Module\n\nThe\
    \ graphics library helps create all of the lines, shapes, text, images and other\
    \ drawable objects. It is also responsible for specialized objects such as particles\
    \ and canvases.\n\nThere are several types of graphics objects that make up LÖVE:\n\
    \n* **Canvas**: This is the offscreen render target.\n* **Drawable**: This comprises\
    \ all the items that can be drawn.\n* **Font**: The characters that can be drawn\
    \ on the screen.\n* **Framebuffer**: This is the offscreen render target.\n* **Image**:\
    \ This is the image that can be drawn.\n* **ParticleSystem**: This is the particle\
    \ system, which you can use to create cool effects.\n* **PixelEffect**: This is\
    \ the pixel shader.\n* **Quad**: This is a quadrilateral with texture information.\n\
    * **SpriteBatch**: This stores the geometry in a buffer for drawing later.\n\n\
    ### Images\n\nWe can load an image using the `newImage` function; however, to\
    \ display them on the screen, the code that does the drawing must be in the `love.draw`\
    \ callback function. The code below will display the output as seen in [Figure\
    \ 11-3](#9781430246626_Ch11.xhtml#Fig3) below.\n\n![9781430246626_Fig11-03.jpg](OEBPS/Images/9781430246626_Fig11-03.jpg)\n\
    \n[Figure 11-3](#9781430246626_Ch11.xhtml#_Fig3). Displaying images with LÖVE\n\
    \n```\nlocal theImage, x, y\nfunction love.load()\n   theImage = love.graphics.newImage(\"\
    myImage.png\")\n   x = 50\n   y = 50\nend\nfunction love.draw()\n   love.graphics.draw(theImage,\
    \ x, y)\nend\n```\n\nIn the following code, we can load an image (a texture as\
    \ it would be called) and we can use this texture and display it several times\
    \ without having to load it again.\n\n```\nimg = love.graphics.newImage(\"myImage.png\"\
    )\nwd, ht = img:getWidth(), img:getHeight()\nfunction love.draw()\n  love.graphics.draw(img,\
    \ 10, 10)\n  love.graphics.draw(img, 10+wd, 10)\n  love.graphics.draw(img, 10,\
    \ 10+ht)\n  love.graphics.draw(img, 10+wd, 10+ht)\nend\n```\n\nYou could use this,\
    \ for example, for tile-based games, where you need to tile or repeat an image.\n\
    \n![9781430246626_Fig11-04.jpg](OEBPS/Images/9781430246626_Fig11-04.jpg)\n\nFigure\
    \ 11-4. Displaying the same image multiple times\n\nIf we want to display the\
    \ silhouette of the image, we can recolor the image black, as shown in [Figure\
    \ 11-5](#9781430246626_Ch11.xhtml#Fig5). This can be done with the simple function\
    \ `setColor`.\n\n![9781430246626_Fig11-05.jpg](OEBPS/Images/9781430246626_Fig11-05.jpg)\n\
    \n[Figure 11-5](#9781430246626_Ch11.xhtml#_Fig5). Coloring an image black to create\
    \ a mask or silhouette\n\n```\nlocal theImage, x, y\nfunction love.load()\n  \
    \ theImage = love.graphics.newImage(\"myImage.png\")\n   x = 50\n   y = 50\n \
    \  love.graphics.setColor(0,0,0,255)\n   love.graphics.setBackgroundColor(255,255,255,255)\n\
    end\nfunction love.draw()\n   love.graphics.draw(theImage, x, y)\nend\n```\n\n\
    You could use this technique in games for children—for example, to have children\
    \ guess what an object is from its black silhouette.\n\n## Moving Around\n\nYou\
    \ learned about the `love.update` function previously, which is the equivalent\
    \ of `enterFrame` in other frameworks. In this exercise, we’ll use this to move\
    \ `myImage2.png` around the screen.\n\n```\nlocal _W, _H = love.graphics.getWidth(),\
    \ love.graphics.getHeight()\nlocal dirX, dirY = 10, 10\n\nlocal theImage, x, y\n\
    function love.load()\n   theImage = love.graphics.newImage(\"myImage2.png\")\n\
    \   x = 50\n   y = 50\n   love.graphics.setColor(0,0,0,255)\n   love.graphics.setBackgroundColor(255,255,255,255)\n\
    end\n\nfunction love.draw()\n   love.graphics.draw(theImage, x, y)\nend\n```"
  raw: 'This function is called when a key that was pressed is released. This function
    acts as a handler for the key-release event and is passed the key code. A complete
    reference of the key codes can be found at [https://love2d.org/wiki/KeyConstant](https://love2d.org/wiki/KeyConstant).


    love.focus ( )


    This function is called when the user clicks on or off (any other window or desktop)
    the LÖVE window. This is most useful for determining if the game is in the current
    window or not; if it isn’t, then you can pause the game or limit the processing.


    love.quit ( )


    This function is called when the user closes the window by clicking the Close
    button (the X for Windows and the red dot for Mac OS X). This can be thought of
    as the destructor that is called when the game has to quit; it can be used to
    release the memory of all loaded objects and even save the game data (if any).


    LÖVE Namespaces


    The LÖVE system has several namespaces, each of which has functions. The functions
    described in the preceding section are part of the global love namespace and hence
    are prefixed with love. The other namespaces are described in this section.


    love.audio


    This namespace provides an interface to output sound from the speakers. This namespace
    plays the actual sounds. All functionality associated with audio processing can
    be found here, including changing the volume, playing, pausing, and stopping the
    sound.


    love.event


    This namespace manages events, as we learnt earlier. All events (e.g., keypresses,
    mouse clicks, etc.) are part of the love.event namespace.


    The *event queue* is used by the application to communicate within the application.
    This is similar to the event dispatcher and the event listener.


    ```

    -- Using an event queue

    function love.keypressed(k)    if k == ''escape'' then       love.event.push(''quit'')
    -- Quit the game

            -- In LÖVE 7.0, you would only push ''q'' to the event queue

        end

    end


    -- using event.poll

    for event, arg1, arg2, arg3, arg4 in love.event.poll() do

        if event == "quit" then -- Quit!

            -- In LÖVE 7.0, you would look for ‘q’

        end

    end

    ```


    love.event.wait is a blocking function (i.e., it will stop the application and
    wait till it finds an event).


    ```

    event, arg1, arg2, arg3 = love.event.wait( )

    ```


    **Note**   There are some differences between LÖVE 0.7.2 and 0.8.0 regarding the
    number of parameters returned in love.event functions.


    love.filesystem


    This provides an interface to the user’s file system. This is sandboxed, in a
    manner of speaking, and the access is granted to only two directories:


    *   The root folder of the .love archive (or source directory)

    *   The root folder of the game’s *save directory*.


    The write access is provided to only the game’s save directory. This directory
    can be found in the following places on the various operating systems:


    *   *Windows XP*: C:\Documents and Settings\user\Application Data\Love\ or %appdata%\Love\

    *   *Windows Vista and 7*: C:\Users\user\AppData\Roaming\LOVE or %appdata%\Love\

    *   *Linux*: $XDG_DATA_HOME/love/ or ~/.local/share/love/

    *   *Mac*: /Users/user/Library/Application Support/LOVE/


    love.font


    This provides a series of functions that allow for working with fonts. The functions
    in this namespace allow for creating or using custom fonts.


    love.graphics


    This namespace provides a very large number of graphics-related functions. This
    is where all the functions for graphical functionality reside.


    love.image


    The love.image namespace has a series of functions that can be used to decode
    and encoded image files.


    love.joystick


    This namespace houses functions that act similarly to the mouse- and touchpad-related
    functions. The joystick is simply another input option.


    love.mouse


    This namespace provides an interface to the user’s mouse. It has functions that
    can get the x,y-coordinates or the mouse cursor, show and hide the cursor, and
    determine the state of the mouse (e.g., if a button is pressed or not).


    love.physics


    This namespace houses the Box2D set of functions for including physics in the
    app or game. Though the interfaces to physics in most of the frameworks are easy,
    Box2D underneath that interface is still massive and complex.


    love.sound


    Not to be confused with the love.audio namespace, the functions in the sound namespace
    are useful for working with encoded sound files. This namespace provides the audio
    file encoder functions.


    love.thread


    This namespace offers functions for working with threading.


    love.timer


    This namespace is home to all the timer-related functions.


    The Graphics Module


    The graphics library helps create all of the lines, shapes, text, images and other
    drawable objects. It is also responsible for specialized objects such as particles
    and canvases.


    There are several types of graphics objects that make up LÖVE:


    *   Canvas: This is the offscreen render target.

    *   Drawable: This comprises all the items that can be drawn.

    *   Font: The characters that can be drawn on the screen.

    *   Framebuffer: This is the offscreen render target.

    *   Image: This is the image that can be drawn.

    *   ParticleSystem: This is the particle system, which you can use to create cool
    effects.

    *   PixelEffect: This is the pixel shader.

    *   Quad: This is a quadrilateral with texture information.

    *   SpriteBatch: This stores the geometry in a buffer for drawing later.


    Images


    We can load an image using the newImage function; however, to display them on
    the screen, the code that does the drawing must be in the love.draw callback function.
    The code below will display the output as seen in [Figure 11-3](#9781430246626_Ch11.xhtml#Fig3)
    below.


    ![9781430246626_Fig11-03.jpg](OEBPS/Images/9781430246626_Fig11-03.jpg)


    [Figure 11-3](#9781430246626_Ch11.xhtml#_Fig3) .  Displaying images with LÖVE


    ```

    local theImage, x, y

    function love.load()

       theImage = love.graphics.newImage("myImage.png")

       x = 50

       y = 50

    end

    function love.draw()

       love.graphics.draw(theImage, x, y)

    end

    ```


    In the following code, we can load an image (a texture as it would be called)
    and we can use this texture and display it several times without having to load
    it again.


    ```

    img = love.graphics.newImage("myImage.png")

    wd, ht = img:getWidth(), img:getHeight()

    function love.draw()

      love.graphics.draw(img, 10, 10)

      love.graphics.draw(img, 10+wd, 10)

      love.graphics.draw(img, 10, 10+ht)

      love.graphics.draw(img, 10+wd, 10+ht)

    end

    ```


    You could use this, for example, for tile-based games, where you need to tile
    or repeat an image.


    ![9781430246626_Fig11-04.jpg](OEBPS/Images/9781430246626_Fig11-04.jpg)


    Figure 11-4 .  Displaying the same image multiple times


    If we want to display the silhouette of the image, we can recolor the image black,
    as shown in [Figure 11-5](#9781430246626_Ch11.xhtml#Fig5). This can be done with
    the simple function setColor.


    ![9781430246626_Fig11-05.jpg](OEBPS/Images/9781430246626_Fig11-05.jpg)


    [Figure 11-5](#9781430246626_Ch11.xhtml#_Fig5) .  Coloring an image black to create
    a mask or silhouette


    ```

    local theImage, x, y

    function love.load()

       theImage = love.graphics.newImage("myImage.png")

       x = 50

       y = 50

       love.graphics.setColor(0,0,0,255)

       love.graphics.setBackgroundColor(255,255,255,255)

    end

    function love.draw()

       love.graphics.draw(theImage, x, y)

    end

    ```


    You could use this technique in games for children—for example, to have children
    guess what an object is from its black silhouette.


    Moving Around


    You learned about the love.update function previously, which is the equivalent
    of enterFrame in other frameworks. In this exercise, we’ll use this to move myImage2.png
    around the screen.


    ```

    local _W, _H = love.graphics.getWidth(), love.graphics.getHeight()

    local dirX, dirY = 10, 10


    local theImage, x, y

    function love.load()

       theImage = love.graphics.newImage("myImage2.png")

       x = 50

       y = 50

       love.graphics.setColor(0,0,0,255)

       love.graphics.setBackgroundColor(255,255,255,255)

    end


    function love.draw()

       love.graphics.draw(theImage, x, y)

    end'
  trans: "\n# LÖVE 函数与命名空间\n\n当按下某个按键被释放时，会调用此函数。此函数作为按键释放事件的处理程序，并接收按键码。按键码的完整参考可以在\
    \ [`love2d.org/wiki/KeyConstant`](https://love2d.org/wiki/KeyConstant) 找到。\n\n\
    `love.focus()`\n\n当用户点击 LÖVE 窗口（或点击到其他任何窗口/桌面）时，会调用此函数。这对于判断游戏是否处于当前窗口非常有用；如果不是，您可以暂停游戏或限制处理进程。\n\
    \n`love.quit()`\n\n当用户通过点击关闭按钮（Windows 下的 X 按钮和 Mac OS X 下的红点）关闭窗口时，会调用此函数。这可以被视为游戏退出时调用的析构函数；它可用于释放所有已加载对象的内存，甚至保存游戏数据（如果有的话）。\n\
    \n## LÖVE 命名空间\n\nLÖVE 系统有多个命名空间，每个命名空间都包含相关函数。前面章节描述的函数属于全局 `love` 命名空间，因此以 `love.`\
    \ 为前缀。其他命名空间将在本节中介绍。\n\n### `love.audio`\n\n此命名空间提供了从扬声器输出音频的接口。该命名空间负责播放实际的声音。所有与音频处理相关的功能都可以在这里找到，包括更改音量、播放、暂停和停止声音。\n\
    \n### `love.event`\n\n正如我们之前所学，此命名空间管理事件。所有事件（例如按键、鼠标点击等）都属于 `love.event` 命名空间。\n\
    \n应用程序使用*事件队列*在应用内部进行通信。这类似于事件分发器和事件监听器。\n\n```lua\n-- 使用事件队列\nfunction love.keypressed(k)\n\
    \    if k == 'escape' then\n       love.event.push('quit') -- 退出游戏\n        --\
    \ 在 LÖVE 7.0 中，你只需将 'q' 压入事件队列\n    end\nend\n\n-- 使用 event.poll\nfor event, arg1,\
    \ arg2, arg3, arg4 in love.event.poll() do\n    if event == \"quit\" then -- 退出！\n\
    \        -- 在 LÖVE 7.0 中，你需要查找 'q'\n    end\nend\n```\n\n`love.event.wait` 是一个阻塞函数（即它会停止应用程序并等待，直到找到一个事件）。\n\
