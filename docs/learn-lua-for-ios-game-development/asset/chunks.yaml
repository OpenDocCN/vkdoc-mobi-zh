    \ its members\n\nIf the user, while keeping the finger touching the screen, drags\
    \ the finger, an event is triggered, but this time the value of `phase` is set\
    \ to `move`. The `target`, `x`, and `y` still contain the values of the object\
    \ touched and the current position of the finger. If the user moves the finger\
    \ across the screen, as shown in [Figure 8-10](#9781430246626_Ch08.xhtml#Fig10),\
    \ a series of touch events are triggered, with `phase` set to `move`, and the\
    \ `x` and `y` will reflect the coordinates as the finger moves across the screen.\n\
    \n![9781430246626_Fig08-10.jpg](OEBPS/Images/9781430246626_Fig08-10.jpg)\n\n[Figure\
    \ 8-10](#9781430246626_Ch08.xhtml#_Fig10) .  The touch “move” event and its members\n\
    \nWhen the user lifts the finger off the screen, a touch event is triggered with\
    \ `phase` set to `ended`, as shown in [Figure 8-11](#9781430246626_Ch08.xhtml#Fig11).\
    \ The other three attributes reflect the target and the `x` and `y` position where\
    \ the touch ended.\n\n![9781430246626_Fig08-11.jpg](OEBPS/Images/9781430246626_Fig08-11.jpg)\n\
    \n[Figure 8-11](#9781430246626_Ch08.xhtml#_Fig11) .  The touch “ended” event and\
    \ its members\n\nThe `cancelled` phase is triggered when a touch event is interrupted\
    \ after it triggers the `began` phase but does not complete with the `ended` phase.\
    \ This interruption can be due to an incoming phone call, a system-triggered message,\
    \ a notification, and so on.\n\nLet’s write some code to display the touch events\
    \ (what we have just read about):\n\n```\nfunction handler( event )\n  print(\
    \ \"touch phase=\" .. event.phase .. \" at x=\" .. event.x .. \", y=\" .. event.y)\n\
    end\nRuntime:addEventListener( \"touch\", handler )\n```\n\nOn running this code,\
    \ we can look at the terminal window for the output.\n\nSimilar to the touch event,\
    \ there is a tap event can be handled. The difference between a touch and tap\
    \ is that a touch starts with the `began` phase and ends with the `ended` phase.\
    \ A tap event, on the other hand, is triggered when the user begins the touch\
    \ and ends it without moving the touch. The tap event has a property `numTaps`\
    \ that indicates the number of taps associated with that touch event.\n\n```\n\
    function onTap( event )\n  print( \"Taps :\".. event.numTaps )\nend\nRuntime:addEventListener(\
    \ \"tap\", onTap )\n```\n\n## Physics\n\nThe feature that brought Corona SDK into\
    \ the limelight and made it popular with developers was its ability to integrate\
