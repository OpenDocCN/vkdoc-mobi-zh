    \ ( currVol+0.1 )\nend\n--\nfunction decreaseVolume()\n  local currVol = media.getSoundVolume\
    \ ( )\n  if currVol <= 0 then return end -- 已处于最小音量\n  media.setSoundVolume (\
    \ currVol-0.1 )\nend\n```\n\n作为练习，尝试制作一个 UI，可以显示当前正在播放的曲目名称，并在屏幕上放置用于播放、暂停以及跳到上一曲或下一曲的按钮。\n\
    \n## 使用 OpenAL 音频\n\n`audio`命名空间包含`OpenAL`函数，这些函数最终可能会取代`media.playSound`和`media.playEventSound`函数。\n\
    \n使用`OpenAL`，你需要加载声音，然后在完成后释放它。如果不这样做，你可能会在内存中留下声音，并很快耗尽内存。\n\n```\nlocal snd\
    \ = audio.loadSound( \"click.wav\" )\nlocal channel = audio.play( snd )\n```\n\
    \n我们有 32 个通道可以用来播放声音。每次我们使用`audio.play`函数时，API 会寻找一个空闲通道，然后在该通道上开始播放声音，并将通道号返回给我们。正是通过这个通道号，我们可以暂停或停止该通道上的声音播放。我们还可以查询通道以确定通道的状态，使用以下任一方法：\n\
    \n```\naudio.isChannelActive\naudio.isChannelPaused\naudio.isChannelPlaying\n\
    ```\n\n一旦我们播放完声音，我们有责任使用`audio.dispose`函数来释放（释放用于声音的内存）声音：\n\n```\naudio.dispose\
    \ ( snd )\n```\n\n### 设置音量\n\n使用`OpenAL`，我们不仅可以设置主音量，还可以设置每个通道的音量。与`media`命名空间中的音量类似，音量范围从\
    \ 0（静音）到 1.0（最大）。\n\n```\nfunction increaseVolume()\n  local currVol = audio.getVolume\
    \ ( )\n  if currVol >= 1.0 then return end -- 已处于最大音量\n  media.setVolume ( currVol+0.1\
    \ )\nend\n--\nfunction decreaseVolume()\n  local currVol = media.getVolume ( )\n\
    \  if currVol <= 0 then return end -- 已处于最小音量\n  media.setVolume ( currVol-0.1\
    \ )\nend\n```\n\n请注意，我们使用了与之前相同的函数名，并用`audio`函数替换了`media`函数来操控音量。这样，如果代码封装在通用函数中，我们可以在应用程序中使用`increaseVolume`和`decreaseVolume`函数。由于这些函数可以针对任何框架编写，我们的代码将非常可移植。许多开发者（尤其是初学者）常犯的一个基本错误是直接访问框架函数。由于代码与框架紧密耦合，导致难以移植。\n\
    \n## 使用视频\n\n我们刚刚了解了如何处理声音；现在让我们看看如何处理视频。`media`命名空间有一个易于使用的 API，使得播放视频非常简单：\n\
    \n```\nfunction done(event)\n  print( \"The video has finished playing\" )\nend\n\
    media.playVideo ( \"video1.mov\", true, done )\n```\n\n`playVideo`函数的语法是：\n\n\
    ```\nmedia.playVideo(path, showControls, listener)\n```\n"
- fmt: "第一个参数是视频文件的路径。第二个参数`showControls`指示是否显示播放界面，用户可以通过点击屏幕显示此界面并调整播放。但将此参数设为`false`会禁用该界面的显示。最后一个参数是播放完成时调用的函数。在iOS平台上，播放视频是异步操作，这意味着视频播放后的任何代码都会在视频播放期间运行。因此你可能需要暂停所有操作并等待视频播放完成，然后再继续执行。例如，在游戏开始时播放介绍视频时，你可能希望这样做，这样游戏直到视频播放完成才会开始运行。\n\
    \nCorona SDK 提供了另一个视频播放API `native.newVideo`，它不跨平台，但允许在iOS平台上进行高级操作。通过此API创建的对象可以旋转、设置为物理体，并作为显示对象进行操作。\n\
    \n```\nlocal video = native.newVideo ( 0, 0, 160, 240 )\n--\nfunction theHandler(\
    \ event )\n  print(event.phase, event.errorCode)\nend\n--\nvideo:load ( \"theVideo.mov\"\
    , system.ResourceDirectory )\nvideo:addEventListener( \"video\", theHandler )\n\
    video:play()\n```\n\n**注意**：此函数可能尚未公开发布，因此如果你使用的是Corona SDK的试用版，可能无法运行这段特定代码。\n\
    \n## 创建电梯\n\n在制作游戏时，你可能会遇到角色需要乘坐电梯移动到不同关卡的情况。虽然这个概念非常简单，但理解具体细节很重要。\n\n在本例中，我们将有四个对象：向上和向下的按钮、平台以及角色/玩家。为简单起见，如图[Figure\
    \ 8-17](#9781430246626_Ch08.xhtml#Fig17)所示，我们将使用矩形。当程序启动时，作为物理体的角色会下落，平台会吸收下落并防止物体弹跳。按钮将控制平台上下移动。\n\
    \n```\nlocal physics = require(\"physics\")\nphysics.start()\n\ndisplay.setStatusBar(display.HiddenStatusBar)\n\
    local beam = display.newRect(50,300,200,50)\nphysics.addBody(beam,\"static\",{friction=1,density=1,bounce=0})\n\
    beam:setFillColor(0,255,0)\nlocal box = display.newRect(120,120,40,40)\nphysics.addBody(box,{friction=1})\n\
    box:setFillColor(255,0,0)\n\nfunction moveUp()\n    box.bodyType=\"static\"\n\
    \    transition.to( box,\n        {time=300, y=-100, delta = true,\n         \
    \ onComplete=function() box.bodyType=\"dynamic\" end})\n    transition.to(beam,{time=300,y=-100,\
    \ delta=true})\nend\nfunction moveDown()\n    box.bodyType=\"static\"\n    transition.to(\
    \ box,\n        {time=300, y=100, delta=true,\n   onComplete=function() box.bodyType=\"\
    dynamic\" end})\n    transition.to(beam,{time=300,y=100, delta=true})\nend\nlocal\
    \ btnUp = display.newRect(10,10,20,40)\nlocal btnDn = display.newRect(10,60,20,40)\n\
    \nbtnDn:addEventListener(\"tap\",moveDown)\n```\n\n`btnUp:addEventListener(\"\
    tap\",moveUp)`\n\n![9781430246626_Fig08-17.jpg](OEBPS/Images/9781430246626_Fig08-17.jpg)\n\
    \n[Figure 8-17](#9781430246626_Ch08.xhtml#_Fig17) — 基于物理的电梯，响应向上和向下按钮\n\n**注意**：使用`delta=true`可以实现相对移动，因此平台将相对于当前位置向上或向下移动100像素。\n\
    \n## 缩放以查看全景\n\n许多游戏使用相机模式显示整个区域，然后放大到玩家开始游戏。我们将尝试重现这种效果。其工作原理是：元素被放置在屏幕上它们应该位于的位置。这个“世界空间”可能比屏幕尺寸大，因此它们可能位于可见屏幕区域之外。我们将允许用户通过触摸屏幕来缩放以查看全景，并在释放触摸时，屏幕将缩放回原始位置。\n\
    \n```\nlocal _H = display.contentHeight\nlocal _W = display.contentWidth\n--\n\
    function position(theObject, xPos, yPos, refPoint)\n  local refPt = refPt or display.TopLeftReferencePoint\n\
    \  theObject:setReferencePoint(refPt)\n  theObject.x = xPos\n  theObject.y = yPos\n\
    end\n--\nlocal back\nlocal function zoomer(event)\n  local phase = event.phase\n\
    \  local target=event.target\n\nif phase==\"began\" then\n display.currentStage:setFocus(target)\n\
    \ transition.to( back,{time=200,xScale=0.5, yScale=0.5} )\n  elseif phase==\"\
    ended\" then\n display.currentStage:setFocus(nil)\n transition.to( back,{time=200,xScale=1,\
    \ yScale=1} )\n  end\nend\n--\nback = display.newGroup()\nlocal wallpaper = display.newImage(\
    \ back, \"wallpaper.jpg\", 0, 0, true )\nlocal i\nfor i=1, 10 do\n  local rect\
    \ = display.newRect( back, i*50, i*50, 40, 40 )\n  rect:setFillColor( 255-(i*10),\
    \ 0, 0 )\nend\nposition ( back, _W/2, _H/2, display.CenterReferencePoint )\nlocal\
    \  button = display.newRect( 10, 400, 50, 50 )\nbutton:setFillColor(255,0,0,100)\n\
    button:addEventListener( \"touch\", zoomer )\n```\n\n我们使用了一些有趣的新的API功能；在讨论它们如何协同工作之前，让我们先看看它们。\n\
    \n每个显示对象都有尺寸；我们可以通过代码使用`height`和`width`属性访问它。当我们缩放对象时，尺寸不会改变。然而，在视觉上，对象会根据缩放因子改变大小。因此，如果我们有一个宽度为100像素的矩形，并通过设置`xScale`为`0.5`来缩放它，矩形的宽度仍然是100，但在屏幕上看起来更小——50像素。当我们需要获取此对象在屏幕上的大小时，`width`不会返回正确的大小。这就是`contentWidth`和`contentHeight`发挥作用的地方。这两个属性反映了应用缩放后对象的实际尺寸。每个显示对象都有这两个属性。`display`命名空间也有`contentHeight`和`contentWidth`属性，它们对应设备屏幕尺寸。`display.contentWidth`在iPhone\
    \ 3上返回320，在iPhone 4上返回640，在iPad上返回768。\n\n在程序开始时，我们将屏幕尺寸的值保存在变量`_H`和`_W`中；然后在整个程序中将它们用作设备屏幕的宽度和高度。\n\
    \n我们可以通过简单地操作`x`和`y`成员来定位对象。然而，每次我们更改`x`或`y`坐标时，对象的参考点会被设置为中心（即，对象围绕此位置居中）。这会导致需要多写几行代码来设置`x`和`y`坐标，然后将`referencePoint`设置为`TopLeft`。管理这个问题的最佳方法是创建一个定位对象的函数。这样，你只需要调用该函数，并且可以在任何框架中使用相同的函数名。\n\
    \n```\nfunction position(theObject, xPos, yPos, refPoint)\n  local refPoint =\
    \ refPoint or display.TopLeftReferencePoint\n  theObject:setReferencePoint(refPoint)\n\
    \  theObject.x = xPos\n  theObject.y = yPos\nend\n```\n\n接下来，我们声明另一个负责缩放的函数：\n\
    \n```\nfunction zoomer (event )\n  local phase = event.phase\n  local target =\
    \ event.target\n  if phase == \"began\"\n    display.currentStage:setFocus(target)\n\
    \    transition.to( back, {time=200, xScale=0.5, yScale=0.5} )\n  elseif phase\
    \ == \"ended\" then\n    display.currentStage:setFocus(nil)\n    transition.to(\
    \ back, {time=200, xScale=1, yScale=1} )\n  end\nend\n```\n\n这个函数基本上是一个触摸事件的事件处理程序；我们关心两个阶段：触摸开始和触摸结束。当触摸开始时，我们将整个显示区域缩放至`0.5`，释放时缩放回`1.0`。如果你在游戏中使用此功能，可以根据需要更改这些值。\n\
    \n现在来看所有显示元素："
  raw: 'The first parameter is the path to the video file. The second parameter, showControls,
    indicates whether the playback UI should be displayed. The user can tap the screen
    to bring up this UI and then adjust the playback. However, setting this to false
    will disable the display of this interface. The last parameter is the function
    that is called when the playback completes. On the iOS platform, playing the video
    is an asynchronous operation, which means that any code following the playing
    of the video will be run while the video is being played. So you might want to
    pause everything and wait for the video to finish playing and then resume execution.
    You would want to do this, for example, when you play an intro video at the start
    of a game and you didn’t want the game to start playing till the video finished
    playing.


    Corona SDK has another video-playing API, which is not cross-platform, but allows
    for advanced manipulation on the iOS platform. This is available as native.newVideo.


    The objects created via this API can be rotated, assigned as a physics body, and
    manipulated as a display object.


    ```

    local video = native.newVideo ( 0, 0, 160, 240 )

    --

    function theHandler( event )

      print(event.phase, event.errorCode)

    end

    --

    video:load ( "theVideo.mov", system.ResourceDirectory )

    video:addEventListener( "video", theHandler )

    video:play()

    ```


    **Note**   This function might not be available as a public release yet, so if
    you have a trial version of Corona SDK, you might not be able to run this particular
    code.


    Creating an Elevator


    You might come across a scenario while making a game where the character has to
    ride an elevator to move to a different level. Though this is conceptually very
    simple, it’s important to understand the specifics.


    For this example, we shall have four objects: the up and down buttons, the platform,
    and the character/player. For simplicity, as shown in [Figure 8-17](#9781430246626_Ch08.xhtml#Fig17),
    we will use rectangles. When the program starts, the character, which is a physics
    body, will fall, and the platform will absorb the fall and prevent the object
    from bouncing. The buttons will move the platform up and down.


    ```

    local physics = require("physics")

    physics.start()


    display.setStatusBar(display.HiddenStatusBar)

    local beam = display.newRect(50,300,200,50)

    physics.addBody(beam,"static",{friction=1,density=1,bounce=0})

    beam:setFillColor(0,255,0)

    local box = display.newRect(120,120,40,40)

    physics.addBody(box,{friction=1})

    box:setFillColor(255,0,0)


    function moveUp()

        box.bodyType="static"

        transition.to( box,

            {time=300, y=-100, delta = true,

              onComplete=function() box.bodyType="dynamic" end})

        transition.to(beam,{time=300,y=-100, delta=true})

    end

    function moveDown()

        box.bodyType="static"

        transition.to( box,

            {time=300, y=100, delta=true,

       onComplete=function() box.bodyType="dynamic" end})

        transition.to(beam,{time=300,y=100, delta=true})

    end

    local btnUp = display.newRect(10,10,20,40)

    local btnDn = display.newRect(10,60,20,40)


    btnDn:addEventListener("tap",moveDown)

    ```


    btnUp:addEventListener("tap",moveUp)


    ![9781430246626_Fig08-17.jpg](OEBPS/Images/9781430246626_Fig08-17.jpg)


    [Figure 8-17](#9781430246626_Ch08.xhtml#_Fig17) .  The physics-based elevator
    that responds to the up and down buttons


    **Note**   The use of delta=true allows for relative movement, so the platform
    will move 100 pixels up or down relative to the current position.


    Zooming Out for an Overview


    Many games use a camera mode to show the entire area, and then zoom in to the
    player to start playing. We’ll attempt to re-create that effect. The way it works
    is that the elements are placed on the screen in the place that they need to be
    at. This world space could be larger than the screen size, so they might reside
    outside of the visible screen area. We’ll allow the user to zoom out for an overview
    by touching the screen, and on releasing the touch, the screen will zoom back
    in to the original position.


    ```

    local _H = display.contentHeight

    local _W = display.contentWidth

    --

    function position(theObject, xPos, yPos, refPoint)

      local refPt = refPt or display.TopLeftReferencePoint

      theObject:setReferencePoint(refPt)

      theObject.x = xPos

      theObject.y = yPos

    end

    --

    local back

    local function zoomer(event)

      local phase = event.phase

      local target=event.target


    if phase=="began" then

     display.currentStage:setFocus(target)

     transition.to( back,{time=200,xScale=0.5, yScale=0.5} )

      elseif phase=="ended" then

     display.currentStage:setFocus(nil)

     transition.to( back,{time=200,xScale=1, yScale=1} )

      end

    end

    --

    back = display.newGroup()

    local wallpaper = display.newImage( back, "wallpaper.jpg", 0, 0, true )

    local i

    for i=1, 10 do

      local rect = display.newRect( back, i*50, i*50, 40, 40 )

      rect:setFillColor( 255-(i*10), 0, 0 )

    end

    position ( back, _W/2, _H/2, display.CenterReferencePoint )

    local  button = display.newRect( 10, 400, 50, 50 )

    button:setFillColor(255,0,0,100)

    button:addEventListener( "touch", zoomer )

    ```


    There are some interesting new API features that we have used; let’s look at them
    first before discussing how it all works together.


    Each of the display objects has a dimension; this is accessible to us via code
    using the height and width properties. When we scale the object, the dimensions
    do not change. However, visually the object changes size based on the scaling
    factor. So, if we have a rectangle that is 100 pixels in width and we scale it
    by setting xScale to 0.5, the width of the rectangle still remains 100, but on
    the screen it looks smaller—50 pixels. When we need to get the size of this object
    on the screen, width does not return the correct size. This is where contentWidth
    and contentHeight come in handy. These two properties reflect the actual dimensions
    of the object with the scaling applied. This is available for every display object.
    The display namespace also has contentHeight and contentWidth properties, which
    correspond to the device screen size. display.contentWidth would return 320 for
    iPhone 3, 640 for iPhone 4, and 768 for the iPad.


    At the start of the program, we save the values of the screen size in the variables
    _H and _W; these are then used throughout the program as the width and height
    of the device screen.


    We can position an object by simply manipulating the x and y members. However,
    each time we change the x- or the y-coordinate, the object’s reference position
    is set to center (i.e., the object is centered around this position). This causes
    extra lines of code where you have to set the x- and y-coordinates and then set
    referencePoint to TopLeft. The best way to manage this is to have a function that
    positions the object. That way, you will only have to call the function, and you
    can use the same function name with any framework.


    ```

    function position(theObject, xPos, yPos, refPoint)

      local refPoint = refPoint or display.TopLeftReferencePoint

      theObject:setReferencePoint(refPoint)

      theObject.x = xPos

      theObject.y = yPos

    end

    ```


    Next, we declare another function that will be responsible for the zooming:


    ```

    function zoomer (event )

      local phase = event.phase

      local target = event.target

      if phase == "began"

        display.currentStage:setFocus(target)

        transition.to( back, {time=200, xScale=0.5, yScale=0.5} )

      elseif phase == "ended" then

        display.currentStage:setFocus(nil)

        transition.to( back, {time=200, xScale=1, yScale=1} )

      end

    end

    ```


    This function is basically an event handler for a touch event; we are interested
    in two phases: when the touch begins and when the touch ends. When the touch starts
    we scale the entire display area to 0.5, and on release we scale it back to 1.0\.
    If you use this in your game, you can change these to whatever best suits you.


    Now for all the display elements:'
