    # Moai 框架概述


    在本章中，我们将介绍另一个框架：Moai。在开发跨平台移动应用程序的众多选项中，Moai 是专业游戏开发者的工具。它是一个开源平台，提供了封装在 Lua 中的
    C++ 类。这些类可用于为多种平台开发基本的 2D 和 3D 游戏：iOS、Android、Windows、Mac OS X 和 Chrome。Moai 以免费使用的
    Moai SDK 形式提供，但需要在应用中显示“Made with Moai”启动画面或在游戏致谢中提及。Moai 还提供付费服务 Moai Cloud Services，可以集成在使用
    Moai 或不使用 Moai 构建的应用中。


    ## 什么是 Moai？


    Moai 的创意源于其开发者，他们都是游戏行业的资深人士。它并不适合只想快速制作应用的个人爱好者；Moai 的学习曲线可能会有些陡峭。不过，这个小小的障碍可以通过
    RapaNui 在某种程度上克服，它是一个开源层，通过一些高级 API 提供 Moai 的功能（详见第 13 章）。一些商业应用已经使用 Moai 开发，还有更多正在开发中。几乎所有这些应用都达到了大工作室所期望的
    A 级卓越水准，并且大多数拥有巨大的下载量。Moai 的核心是 C++ 库，它们帮助你编写适用于移动设备、浏览器和桌面的跨平台应用程序。然而，Lua 接口消除了处理这些复杂库的需要。这些封装在
    Lua 中的 C++ 库还允许访问许多底层函数。一旦你掌握了应用开发（尤其是游戏开发）的基础知识，Moai 便是一个符合逻辑的专业工具集选择。


    ## 获取 Moai


    你的第一步是在 Moai 上创建一个账户，然后下载 SDK。你可以从以下选项中选择：


    *   SDK 发布版本 1.3 (构建 98)

    *   SDK 开发者构建版本 1.3 (构建 102)

    *   Moai 源代码


    开箱即用，Moai 没有像 Gideros Studio 那样的 IDE 或工具。然而，它确实包含了用于测试 Lua 代码的 `moai` 二进制文件。当你解压
    ZIP 文件（所有平台的压缩包相同）后，`bin` 目录包含了所有平台的库，以及用于 Windows 和 Mac OS X 的可执行文件（这些可执行文件充当测试
    Moai 代码的模拟器）。


    ## Moai SDK


    开始使用 Moai 进行开发，你首先需要一个文本编辑器（第 13 章讨论了一些替代方案），因为没有集成 Moai 开发环境的 IDE（不过 ZeroBrane
    填补了这一空白，但 Moai 默认不包含它）。


    `bin` 目录包含用于 Windows 和 Mac 的可执行文件；你可以在终端窗口中运行 `moai`，并将要运行的 Lua 文件传递给它。对于 Windows，传递
    `moai.exe main.lua`；对于 Mac OS X，传递 `moai main.lua`。


    如果你通过 `run.bat` 或 `run.sh` 运行 samples 文件夹中的 Hello Moai 代码，你应该会在屏幕上看到如图 10-1 所示的输出。


    ![9781430246626_Fig10-01.jpg](img/9781430246626_Fig10-01.jpg)


    图 10-1. 正在运行示例应用的 Moai 模拟器


    ## Hello Moai


    要让一个 Moai 应用运行起来，我们需要做几件事。首先，我们需要一个窗口来显示我们的应用程序，这个窗口在桌面上也充当模拟器。我们使用 `MOAISim`
    类创建一个窗口，并调用 `openWindow` 函数。`openWindow` 函数接受三个参数：标题、宽度和高度。


    ```

    MOAISim.openWindow("Hello World 窗口", 320,480)

    ```


    然后我们需要创建一个视口。由于 Moai 使用 OpenGL，要创建一个绘制表面，我们需要设置用于渲染的表面大小。这个矩形区域被称为*视口*。在我们开始渲染之前，需要创建并设置好视口。方法如下：


    ```

    viewport = MOAIViewport.new()

    viewport:setSize(320,480)

    viewport:setScale(320,480)

    ```


    我们可以将大小设置为特定尺寸，或者不向 `setSize` 函数传递任何参数来简单地使用整个表面。所有渲染都基于单位；这些单位不一定与像素相同。但是，您可以使用
    `setScale` 函数来设置这些单位。这些单位通过根据视口的大小和比例设置进行计算来定义渲染像素的大小。像素的大小由以下两个公式确定：


    ```

    pixelsizeX = viewportSizeWidth / viewportScaleX

    pixelsizeY = viewportSizeHeight / viewportScaleY

    ```


    大小为 320×480，比例为 320、480，则将像素大小设置为 1。在大小为 320×480 的表面上设置比例为 10、15，将得到像素大小为 32×32。在大小为
    640×960 的表面上使用相同的比例 10、15，则会得到像素大小为 64×64。在这种情况下，您会看到显示拉伸以填充空间。


    Moai 中的坐标系以原点 (0,0) 位于屏幕中心进行组织。y 轴正方向朝上。值为 100 的点在屏幕上的位置高于像 20 这样的较低值。您可以通过将比例设置为负值来反转轴，从而获得负比例：


    ```

    viewport:setScale(320, -480)

    ```


    还可以使用 `setOffset` 函数更改视口。偏移量是在一个设置为 2×2 的投影空间中设置的。将偏移量设置为 −1, 1 会将投影系统向左移动一半，向上移动一半。这将有效地将原点置于屏幕的左上角。


    ```

    viewport:setOffset(-1,1)

    ```


    Moai 不会直接渲染任何精灵、图像或显示对象；相反，这些对象会被渲染到*图层*上。多个图层可以相互堆叠。每个图层都需要与一个视口关联。


    ```

    layer = MOAILayer2D.new()

    layer:setViewport(viewport)

    ```


    然后，在渲染之前，需要将该图层推入渲染栈。


    ```

    MOAISim.pushRenderPass(layer)

    ```


    一旦我们设置了用于渲染的图层，我们就需要一个显示对象来显示在这个图层上。在 Moai 中，场景图对象被称为*道具*；它是表面上的位置和对象表示的组合。几何体或对象的表示（例如，三角形、四边形或样条曲线）保存在称为*组*的东西中。一个组可以包含多个几何体项目，也可以被称为*集合*。


    有几种类型的组可供选择：


    *   `MOAIGfxQuad2D`：这是一个单纹理四边形。

    *   `MOAIGfxQuadDeck2D`：这是一个纹理四边形数组（来自同一纹理）。这类似于我们所说的精灵表。

    *   `MOAIGfxQuadListDeck2D`：这是一个纹理四边形列表的数组（来自同一纹理）。可用于高级精灵表。

    *   `MOAIMesh`：这是一个自定义顶点缓冲区对象（用于 3D）。

    *   `MOAIStretchPatch2D`：这是一个包含可伸缩行和列的单个补丁。

    *   `MOAITileDeck2D`：用于创建通过索引访问的瓦片地图和精灵表。纹理被分为 *n×m* 个瓦片，所有瓦片大小相同。可用于帧动画。


    我们可以使用 `MOAIGfxQuad2D` 类创建一个单纹理四边形，并加载一个图像作为四边形的纹理：


    ```

    gfxQuad = MOAIGfxQuad2D.new()

    gfxQuad:setTexture("myTile.png")

    gfxQuad:setRect(-32,-32, 32, 32)

    ```


    创建四边形后，我们需要创建一个道具来显示该四边形。我们使用 `setRect` 函数设置矩形区域，这类似于设置四边形的尺寸：


    ```

    prop = MOAIProp2D.new()

    prop:setDeck(gfxQuad)

    prop:setLoc(32,32)

    ```


    最后，我们需要将这个道具添加到图层中，以便渲染：


    ```

    layer:insertProp(prop)

    ```


    完整的代码块如下所示。当我们运行它时，会在屏幕上看到图像。


    ```

    MOAISim.openWindow ( "test", 320, 480 )


    viewport = MOAIViewport.new ()

    viewport:setSize ( 320, 480 )

    viewport:setScale ( 320, 480 )

    ```

