    Copying Non-Array Components


    If you need to copy the non-array component and leave the array alone, then you
    can do so with the following:


    ```

    function copyHash(table 1)

      local res = {}

      local size = #table 1

        for i, j in pairs(table 1) do

          if type(j) ~= "number" or i<= 0 or i> size then

            res[i] = j

          end

        end

      return res

    end

