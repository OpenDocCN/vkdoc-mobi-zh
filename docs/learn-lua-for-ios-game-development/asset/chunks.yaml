    We have the body of our function; now we need to have a loop that will work on
    this.


    ```

    co = coroutine.create(showProgress)

    while coroutine.status(co) ~= "dead" do

        _,res = coroutine.resume(co)

        if res/tStep == math.floor(res/tStep) then print(res/tStep .. " % done") end

    end

    ```


    The facility to resume midway and pass the function new parameters can be very
    useful when dealing with functions that rely on updated data. We shall not look
    at a complex example, but to illustrate the point, here’s a simple one:


    ```

    a = 100

    co = coroutine.create(function()

        print( "we start at ", a)

        a = coroutine.yield(a)

        print("We restart this function with the value of ", a)

    end)

    _, res = coroutine.resume(co)

    print("We stopped or yielded at", res)

    _,res = coroutine.resume(co, 200)

    ```


    Game Loops


    A game in the simplest of terms is a repeating loop that takes inputs and updates
    the screen and characters. So in terms of pseudocode, a game might look like this:


    ```

     while playing do

        getInput()

        updateCharacters()

        updateScreen()

    end

    ```


    In this case, *getInput()* is a function that would get some form of input from
    the player, either from the keyboard or via touch. *updateCharacters()* is the
    function that would update the game play elements, the characters on the screen,
    and the board. Lastly, *updateScreen()* would update the score, the lives, the
    messages, and so on. If this were written in C, C++, or similar, this would be
    fine, but in Lua, the while loops are not very stable. Coroutines come in handy
    to make these routines more responsive.


    Another interesting thing is that although coroutines in Lua are not threads,
    they can be used like threads (i.e., you can define multiple coroutines). Here’s
    an example:


    ```

    c1 = coroutine.create(function()

        for i=1,20 do

            print( "function 1: ", i)

        end

    end)

    c2 = coroutine.create(function()

        for i=1,5 do

            print( "function 2: ", i)

        end

    end)

    c3 = coroutine.create(function()

        for i=10,1,-1 do

            print( "function 3: ", i)

        end

    end)

    while true do

        co1 = coroutine.resume(c1)

        co2 = coroutine.resume(c2)

        co3 = coroutine.resume(c3)

        if coroutine.status(c1)=="dead" and coroutine.status(c2)=="dead" and coroutine.status(c3)=="dead"
    then break end

    end

    ```


    Working with Tables


    Remember that in Lua, all variables other than numbers and strings are memory
    locations and are passed by reference, which means that if we declare table t
    and then assign b as t, we do not get a copy of t in b; instead, b would point
    to the same table as t.


    ```

    t = {"One", "Two", "Three"}

    b = t

    print(b[2])

    t[2]="Deux"

    print(b[2])

    ```


    In the case that we need to copy the table, not just provide a pointer to the
    same memory address, we need to do what is called a *deep copy*. Here’s an example:


    ```

    function deepcopy(t)

        if type(t) ~= "table" then return t end

        local res = {}

        local mt = getmetatable(t)

        for k,v in pairs(t) do

            if type(v)=="table" then

                v = deepcopy(v)

            end

            res[k] = v

        end

        setmetatable(res,mt)

        return res

    end

    ```'
  trans: "\n### Lua 协程函数\n\n#### `coroutine.resume(co, val1, ...)`\n\n该函数用于启动或恢复协程\
    \ `co` 的执行。首次调用时，它会启动协程体的运行。参数 (`val1`, ...) 全部作为主函数的参数传入。该函数返回 `true` 以及传递给 `yield`\
    \ 的值或由协程体函数返回的任何值。如果协程体已执行完毕，或在执行协程体时发生错误，则 `resume` 返回 `false` 以及一条错误消息。\n\n\
    ```\nthread = coroutine.create(function() print(\"Started\") end)\ncoroutine.resume(thread)\n\
    ```\n\n#### `coroutine.running()`\n\n该函数返回正在运行的协程，如果正在运行的协程是主协程，则返回 `nil`。\n\n\
    ```\nprint( coroutine.running(thread))\nthread = coroutine.create( function()\
    \ print(\"Hello\") end)\nprint( coroutine.running(thread))\n```\n\n#### `coroutine.status(co)`\n\
    \n该函数以字符串形式返回协程 `co` 的状态。可能的返回值包括：\n\n- `running`：如果协程正在运行\n- `suspended`：如果协程在调用\
    \ `yield` 时被挂起，或者尚未开始运行\n- `normal`：如果协程处于活动状态但未运行\n- `dead`：如果协程已完成其主体函数或由于错误而停止\n\
    \n```\nprint( coroutine.status(thread))\nthread = coroutine.create( function()\
    \ print(\"Hello\") end)\nprint( coroutine.status(thread))\n```\n\n#### `coroutine.wrap(f)`\n\
    \n该函数创建一个主体为 `f` 的新协程，类似于 `create`。然而，`coroutine.wrap` 返回一个可用于协程的函数。\n\n```\n\
    thread = coroutine.wrap( function() print(\"Hello\") end)\nthread()       -- 启动协程。\n\
    ```\n\n#### `coroutine.yield(...)`\n\n该函数挂起当前调用例程的执行。`yield` 的任何参数都会作为额外的结果传递给\
    \ `resume`。\n\n### 创建新协程\n\n你可以使用以下代码创建一个新协程：\n\n```\nco = coroutine.create(function()\
    \ print(\"hello world\") end)\nprint(co)\nprint(type(co))\ncoroutine.resume(co)\n\
    print(coroutine.status(co))\n```\n\n在这段代码中，我们使用函数 `coroutine.create` 创建了一个新协程，并向它传递了一个函数。请注意，传递的函数并未执行。当我们使用\
    \ `print(co)` 时，可以看到这是一个协程对象。`type(co)` 显示 `co` 是类型为 `thread` 的对象。`coroutine.resume(co)`\
    \ 调用该函数，并在屏幕上打印出 \"hello world\"。最后，`coroutine.status(co)` 显示状态为 \"dead\"。\n\n\
    ### 协程与恢复执行\n\n在以下代码中，我们将了解如何处理协程，包括如何创建和恢复它们，以及让它们返回（yield）。\n\n```\nco = coroutine.create(function()\n\
    \    for i=1, 10 do\n        print(\"循环：\", i)\n        coroutine.yield(i)\n \
    \   end\nend)\n coroutine.resume(co)\nprint(coroutine.status(co))\ncoroutine.resume(co)\n\
    ...\ncoroutine.resume(co)\n```\n\n### 进度条\n\n协程的另一个实际应用案例是进度条，如下例所示：\n\n```\n\
    function doLongProcessing(a)\n    -- 执行某些操作\n    thread1 = coroutine.yield(\"\
    25%\")\n\n-- 执行某些操作\n    thread1 = coroutine.yield(\"50%\")\n\n-- 执行某些操作\n   \
    \ thread1 = coroutine.yield(\"75%\")\n\n-- 执行某些操作\n    return \"100%\"\nend\n\n\
    thread = coroutine.create(doLongProcessing)\nwhile coroutine.status(thread) ~=\
    \ \"dead\" do\n    local _, res = coroutine.resume(thread)\n    print( \"当前进度为\
    \ \" .. res )\nend\n```\n\n相比之下，请考虑以下代码：\n\n```\ntStep = 1000\nfor i=1,100000\
