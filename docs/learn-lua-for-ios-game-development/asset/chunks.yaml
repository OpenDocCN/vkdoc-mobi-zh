    \n```\nbody = world:addBody( MOAIBox2DBody.DYNAMIC)\npoly = {0,-1,1,0,0,1,-1,0}\n\
    \nfixture = body:addPolygon(poly)\nfixture:setDestiny(1)\nfixture:setFriction(0.3)\n\
    fixture:setFilter(0x01)\nfixture:setCollisionHandler(onCollide, MOAIBox2DArbiter.BEGIN\
    \ + MOAIBox2DArbiter.END, 0x02)\nbody:resetMassData()\nbody:applyAngularImpulse(2)\n\
    ```\n\n现在我们创建了一个动态物体，我们创建一个夹具（fixture），它将形状绑定到物体上，并赋予物体材料属性，如密度、摩擦力和弹性。\n\n**注意**　*弹性*涉及物体在碰撞变形后恢复其原始形状或位置的方式。\n\
    \n如果我们运行代码，一个物理盒子将出现在屏幕上，如图 10-12 所示。\n\n![9781430246626_Fig10-12.jpg](img/9781430246626_Fig10-12.jpg)\n\
    \nFigure 10-12. Moai Box2D 物理物体\n\n```\nbody2 = world:addBody(MOAIBox2DBody.STATIC)\n\
    fixture2 = body2:addRect(-5,-5,5,-3)\nfixture2:setFilter(0x02)\nfixture2:setCollisionHandler(onCollide,\
    \ MOAIBox2DArbiter.BEGIN + MOAIBox2DArbiter.END, 0x01)\n```\n\n这将创建一个静态物体，它充当地面，防止动态盒子掉出屏幕。\n"
- fmt: "对于这两个 body fixtures，我们都设置了一个碰撞处理器，该处理器会针对`MOAIBox2DArbiter.BEGIN`和`MOAIBox2DArbiter.END`事件调用`onCollide`函数。`BEGIN`事件在碰撞开始时触发，`END`事件在碰撞结束时触发。我们可以在`onCollide`函数中捕获它。\n\
    \n```\nfunction onCollide(event)\n  if event == MOAIBox2DArbiter.BEGIN then\n\
    \    print(\"Begin!\")\n  elseif event == MOAIBox2DArbiter.END then\n    print(\"\
    End!\")\n  end\nend\n```\n\n我们可以向这个 body 添加一个图像，这样我们看到的就不是方框，而是其位置上的图像：\n\n```\n\
    texture = MOAIGfxQuad2D.new()\ntexture:setTexture(\"moai.png\")\ntexture:setRect(-0.5,\
    \ -0.5, 0.5, 0.5)\n```\n\n现在我们需要将此图像添加到 body：\n\n```\nimage = MOAIProp2D.new()\n\
    image:setDeck(texture)\nimage:setParent(body)\nlayer:insertProp(image)\n```\n\n\
    我们使用`poly`创建的多边形是菱形的；如果我们希望它是正方形，可以使用以下代码：\n\n```\npoly = {-0.5, -0.5, 0.5, -0.5,\
    \ 0.5, 0.5, -0.5, 0.5}\n```\n\n物体在接触地面时不会弹跳。我们可以通过使用`setRestitution`函数设置恢复系数，使两个物体都具有弹性。\n\
    \n```\nfixture:setRestitution(0.5)\n```\n\n和\n\n```\nfixture:setRestitution(0.7)\n\
    ```\n\n为了让这个小代码示例更有趣，我们将世界的重力改为-1，这会使物体表现得像一个气球。为此，我们使用`world:setGravity(0,-1)`。现在物体下落得更慢了。我们还可以添加一个鼠标事件，使物体弹跳。\n\
    \n```\nfunction onClick(down)\n  body:setLinearVelocity(0,0)\n  body:applyLinearImpulse(0,1)\n\
    end\nMOAIInputMgr.device.mouseLeft:setCallback(onClick)\n```\n\n现在，每次我们单击鼠标左键时，都会将速度重置为0，然后施加一个(0,\
    \ 1)的线性冲量，这会在x轴上施加0的冲量，在y轴上施加1的冲量。这使得物体向上跳跃。\n\n## Chipmunk Physics\n\n我们也可以在\
    \ Moai 中使用 Chipmunk 物理引擎。其原理与 Box2D 类似。首先，我们需要使用`MOAICpSpace`类创建 Chipmunk 世界空间：\n\
    \n```\nspace = MOAICpSpace.new()\nspace:setGravity(0,-2000)\nspace:setIterations(5)\n\
    space:start()\n```\n\n`iterations`是用于确定物体之间是否发生碰撞的计算次数。较大的迭代次数将提供更平滑、更好的物理模拟；然而，这会占用大量的\
    \ CPU 时间和处理资源。另一方面，如果我们使用较小的迭代值，所需的 CPU 能力较少，但运动可能看起来过于弹跳和不真实。\n\n要创建物理 body，我们可以使用`MOAICpBody`类，它会返回一个\
    \ Chipmunk 物理 body。然后，我们可以将一个多边形夹具添加到该物理 body。\n\n```\npoly = {-32, 32, 32, 32,\
    \ 32, -32, -32, -32}\nmass = 1\nmoment = MOAICpShape.momentForPolygon (mass, poly)\n\
    body = MOAICpBody.new(1, moment)\nspace:insertPrim(body)\n\nshape = body:addPolygon(\
    \ poly )\nshape:setElasticity( 0.8 )\nshape:setFriction( 0.8 )\nshape:setType(\
    \ 1 )\nspace:insertPrim( shape )\n```\n\n当我们现在运行代码时，物体会直接掉出屏幕。让我们创建一个地板类型的物体，这样物理\
    \ body 就不会掉出屏幕：\n\n```\nbody = space:getStaticBody()\n\nx1,y1,x2,y2 = -320, -240,\
    \ 320, -240\nshape = body:addSegment(x1,y1,x2,y2)\nshape:setElasticity(1)\nshape:setFriction(0.1)\n\
    shape:setType(2)\nspace:insertPrim(shape)\n```\n\n现在，物体到达屏幕底部时将会弹跳。\n\n我们可以添加一些代码来让物体在屏幕上移动，但在此之前，让我们在屏幕的四个角创建一个墙壁，这样当移动物理\
    \ body 时，它不会从屏幕侧面掉出。\n\n```\nfunction addSegment(x1, y1, x2, y2)\n  shape = body:addSegment(x1,y1,x2,y2)\n\
    \  shape:setElasticity(1)\n  shape:setFriction(0.1)\n  shape:setType(2)\n  space:insertPrim(shape)\n\
    end\n\naddSegment(-320, -240, 320, -240)\naddSegment(-320, 240, 320, 240)\naddSegment(-320,\
    \ -240, -320, 240)\naddSegment(320, -240, 320, 240)\n```\n\n我们可以通过使用`space:shapeForPoint`函数来获取给定点处的\
    \ body。我们还可以通过在指针设备上设置回调函数，根据鼠标的位置移动该点。\n\n```\nmouseBody = MOAICpBody.new(MOAICp.INFINITY,\
    \ MOAICp.INFINITY)\nmx, my = 0,0\nfunction onMove(x,y)\n  mx, my = layer:wndToWorld(x,y)\n\
    \  mouseBody:setPos(mx, my)\nend\n```\n\n现在，随着鼠标移动，`mouseBody`对象被放置在指针当前所在的位置。我们还可以为鼠标左键函数设置一个回调，该函数可以帮助拾取和移动物体。\n\
    \n```\nfunction onClick(down)\n  if down then\n    pick = space:shapeForPoint(mx,\
    \ my)\n    if pick then\n      body = pick:getBody()\n      mouseJoint = MOAICpConstraint.newPivotJoint(\n\
    \        mouseBody, body, 0, 0, body:worldToLocal(mx, my))\n      space:insertPrim(mouseJoint)\n\
    \    else\n      if mouseJoint then\n        space:removePrim(mouseJoint)\n  \
    \      mouseJoint = nil\n      end\n    end\n  end\nend\n```\n\n我们还可以通过添加更多可以使用鼠标交互的物理物体来扩展这一点。为此，我们可以创建多个物体。\n\
    \n```\npoly = {-32, 32, 32, 32, 32, -32, -32, -32}\nmass = 1\n\nfunction makeObject()\n\
    \  moment = MOAICpShape.momentForPolygon (mass, poly)\n  body = MOAICpBody.new(1,\
    \ moment)\n  space:insertPrim(body)\n\nshape = body:addPolygon( poly )\n  shape:setElasticity(\
    \ 0.8 )\n  shape:setFriction( 0.8 )\n  shape:setType( 1 )\n  space:insertPrim(\
    \ shape )\nend\n\nfor i=1, 15 do\n  makeObject()\nend\n```\n\n注意物体如何相互交互，以及如何使用鼠标进行操作。我们还可以将图像附加到物理\
    \ body 上；这将显示图像而不是物理 body。\n\n```\nimage = MOAIProp2D.new()\nimage:setDeck(texture)\n\
    image:setParent(body)\nlayer:insertProp(image)\n```\n\n## Moai Cloud\n\n当您登录 Moai\
    \ 帐户时，会看到 Moai 仪表板，您可以在其中设置云帐户并选择其他选项。您可以在此处创建的云服务完全独立于您是否使用 Moai 或任何其他框架或浏览器来使用这些服务。\n\
    \n### 创建 Web 服务\n\n让我们从创建一个 Web 服务开始。您可以通过在 Moai 云服务下单击“创建服务”按钮，从仪表板创建该服务。[图 10-13](#9781430246626_Ch10.xhtml#Fig13)\
    \ 显示了创建服务的屏幕；您主要需要提供一个应用程序名称，同时接受剩余的默认设置。\n\n![9781430246626_Fig10-13.jpg](OEBPS/Images/9781430246626_Fig10-13.jpg)\n\
    \n[图 10-13](#9781430246626_Ch10.xhtml#_Fig13) 在 Moai 仪表板中创建新服务\n\n创建服务后，您会看到一个屏幕，允许您创建另一个服务或编辑现有服务。注意[图\
    \ 10-14](#9781430246626_Ch10.xhtml#Fig14) 中，我们称为`Test01`的服务状态为“未部署”，这意味着它在 Web\
    \ 上不可用。为了能够访问它，我们需要部署它。\n\n![9781430246626_Fig10-14.jpg](OEBPS/Images/9781430246626_Fig10-14.jpg)\n\
    \n[图 10-14](#9781430246626_Ch10.xhtml#_Fig14) 创建服务后的仪表板\n\n首先单击“编辑”按钮以编辑此服务的设置，如[图\
    \ 10-15](#9781430246626_Ch10.xhtml#Fig15) 所示。对于最简单的服务，我们无需更改任何内容；只需单击“部署服务”即可。\n\
    \n![9781430246626_Fig10-15.jpg](OEBPS/Images/9781430246626_Fig10-15.jpg)\n\n[图\
    \ 10-15](#9781430246626_Ch10.xhtml#_Fig15) Moai 云服务的属性\n\n一旦我们单击“部署服务”，该服务即可使用。注意顶部的\
    \ URL；在此示例中，它设置为`http://services.moaicloud.com/USERNAME/test`。您需要为您自己的服务使用该 URL。如果您打开一个新的浏览器窗口并导航到该\
    \ URL，您将看到显示文本“hello world!”。"
  raw: 'For both the body fixtures, we also set a collision handler that calls the
    function onCollide for the events MOAIBox2DArbiter.BEGIN and MOAIBox2DArbiter.END.
    The BEGIN event is triggered when a collision starts to occur and the END event
    is triggered when it ends. We can capture it in the onCollide function.


    ```

    function onCollide(event)

      if event == MOAIBox2DArbiter.BEGIN then

        print("Begin!")

      elseif event == MOAIBox2DArbiter.END then

        print("End!")

      end

    end

    ```


    We can add an image to this body so that we do not see the box, but an image in
    its place:


    ```

    texture = MOAIGfxQuad2D.new()

    texture:setTexture("moai.png")

    texture:setRect(-0.5, -0.5, 0.5, 0.5)

    ```


    Now we need to add this image to the body:


    ```

    image = MOAIProp2D.new()

    image:setDeck(texture)

    image:setParent(body)

    layer:insertProp(image)

    ```


    The polygon that we created using poly is diamond shaped; if we want it to be
    a square, we can use the following:


    ```

    poly = {-0.5, -0.5, 0.5, -0.5, 0.5, 0.5, -0.5, 0.5}

    ```


    The object does not bounce when it comes in contact with the ground. We can make
    both objects bouncy by setting the restitution, using the setRestitution function.


    ```

    fixture:setRestitution(0.5)

    ```


    and


    ```

    fixture:setRestitution(0.7)

    ```


    To make this little code sample more fun, let’s change the gravity of the world
    to −1, which will make the object act like a balloon. To do this, we use world:setGravity(0,-1).
    The object now falls down slower. We can also add a mouse event that will make
    the object bounce.


    ```

    function onClick(down)

      body:setLinearVelocity(0,0)

      body:applyLinearImpulse(0,1)

    end

    MOAIInputMgr.device.mouseLeft:setCallback(onClick)

    ```


    Now every time we click the left mouse button, we reset the velocity to 0 and
    then apply a linear impulse of 0,1, which applies an impulse of 0 on the x-axis
    and 1 on the y-axis. This makes the object jump upward.


    Chipmunk Physics


    We can also use Chipmunk physics in Moai. The principles for this are similar
    to those in Box2D. We first we need to create the Chipmunk world space using the
    MOAICpSpace class:


    ```

    space = MOAICpSpace.new()

    space:setGravity(0,-2000)

    space:setIterations(5)

    space:start()

    ```


    The iterations are the number of calculations performed to determine if bodies
    are in collision with each other. A larger number of iterations will provide a
    much smoother and better physics simulation; however, this will take up a lot
    of CPU time and processing. On the other hand, if we use a smaller value for iterations,
    less CPU power is required, but the motion may seem too bouncy and unrealistic.


    To create a physics body, we can use the MOAICpBody class, which returns a Chipmunk
    physics body. We can then add a fixture as a polygon body to the physics body.


    ```

    poly = {-32, 32, 32, 32, 32, -32, -32, -32}

    mass = 1

    moment = MOAICpShape.momentForPolygon (mass, poly)

    body = MOAICpBody.new(1, moment)

    space:insertPrim(body)


    shape = body:addPolygon( poly )

    shape:setElasticity( 0.8 )

    shape:setFriction( 0.8 )

    shape:setType( 1 )

    space:insertPrim( shape )

    ```


    When we run the code now, the object will fall right off the screen. Let’s create
    a floor-type object so that the physics body doesn’t fall off the screen:


    ```

    body = space:getStaticBody()


    x1,y1,x2,y2 = -320, -240, 320, -240

    shape = body:addSegment(x1,y1,x2,y2)

    shape:setElasticity(1)

    shape:setFriction(0.1)

    shape:setType(2)

    space:insertPrim(shape)

    ```


    The object will now bounce when it reaches the bottom of the screen.


    We can add some code to move the object around the screen, but before that, let’s
    create a wall around the corners of the screen so that the physics body does not
    fall off the side of the screen when we move it.


    ```

    function addSegment(x1, y1, x2, y2)

      shape = body:addSegment(x1,y1,x2,y2)

      shape:setElasticity(1)

      shape:setFriction(0.1)

      shape:setType(2)

      space:insertPrim(shape)

    end


    addSegment(-320, -240, 320, -240)

    addSegment(-320, 240, 320, 240)

    addSegment(-320, -240, -320, 240)

    addSegment(320, -240, 320, 240)

    ```


    We can get the body that is present at a given point by using the function space:shapeForPoint.
    We can also move the point based on where the mouse is by setting a callback function
    on the pointer device.


    ```

    mouseBody = MOAICpBody.new(MOAICp.INFINITY, MOAICp.INFINITY)

    mx, my = 0,0

    function onMove(x,y)

      mx, my = layer:wndToWorld(x,y)

      mouseBody:setPos(mx, my)

    end

    ```


    Now, as the mouse moves, the mouseBody object is placed at the location where
    the pointer currently is. We can also set a callback for the left mouse button
    function that can help pick up and move the object.


    ```

    function onClick(down)

      if down then

        pick = space:shapeForPoint(mx, my)

        if pick then

          body = pick:getBody()

          mouseJoint = MOAICpConstraint.newPivotJoint(

            mouseBody, body, 0, 0, body:worldToLocal(mx, my))

          space:insertPrim(mouseJoint)

        else

          if mouseJoint then

            space:removePrim(mouseJoint)

            mouseJoint = nil

          end

        end

      end

    end

    ```


    We can also extend this by adding more physics objects that we can interact with
    using the mouse. To do so, we can create multiple objects.


    ```

    poly = {-32, 32, 32, 32, 32, -32, -32, -32}

    mass = 1


    function makeObject()

      moment = MOAICpShape.momentForPolygon (mass, poly)

      body = MOAICpBody.new(1, moment)

      space:insertPrim(body)


    shape = body:addPolygon( poly )

      shape:setElasticity( 0.8 )

      shape:setFriction( 0.8 )

      shape:setType( 1 )

      space:insertPrim( shape )

    end


    for i=1, 15 do

      makeObject()

    end

    ```


    Notice how the objects interact with each other and can be manipulated with a
    mouse. We can also attach an image to the physics body; this will display the
    image instead of the physics body.


    ```

    image = MOAIProp2D.new()

    image:setDeck(texture)

    image:setParent(body)

    layer:insertProp(image)

    ```


    Moai Cloud


    When you log into your Moai account, you are greeted with the Moai dashboard,
    where you can set up your cloud account and select other options. The cloud service
    that you can create here is totally independent of whether you use Moai or any
    other framework or browser to consume these services.


    Creating a Web Service


    Let’s start with creating a web service. You can create the service from the dashboard
    by clicking the Create Service button under Moai Cloud Services. [Figure 10-13](#9781430246626_Ch10.xhtml#Fig13)
    shows the screen for creating a service; you mainly need to provide an application
    name while accepting the remaining default settings.


    ![9781430246626_Fig10-13.jpg](OEBPS/Images/9781430246626_Fig10-13.jpg)


    [Figure 10-13](#9781430246626_Ch10.xhtml#_Fig13) .  Creating a new service in
    the Moai dashboard


    After you create a service, you are greeted with a screen that allows you to create
    another service or edit the existing one. Notice in [Figure 10-14](#9781430246626_Ch10.xhtml#Fig14)
    that the service we called Test01 has a status of Undeployed, which means that
    it is unavailable on the Web. To be able to access it, we need to deploy it.


    ![9781430246626_Fig10-14.jpg](OEBPS/Images/9781430246626_Fig10-14.jpg)


    [Figure 10-14](#9781430246626_Ch10.xhtml#_Fig14) .  The dashboard after creating
    a service


    Let’s first click the Edit button to edit the settings for this service, as shown
    in [Figure 10-15](#9781430246626_Ch10.xhtml#Fig15). For the simplest of the services,
    we need not change anything; we can simply click Deploy Service.


    ![9781430246626_Fig10-15.jpg](OEBPS/Images/9781430246626_Fig10-15.jpg)


    [Figure 10-15](#9781430246626_Ch10.xhtml#_Fig15) .  Properties of the Moai cloud
    service


    Once we click Deploy Service, the service is available to use. Note the URL at
    the top; in this example, it is set as [http://services.moaicloud.com/USERNAME/test.](http://services.moaicloud.com/USERNAME/test)
    You need to use the URL for your own services. If you open a new browser window
    and navigate to that URL, you will see the text "hello world!" displayed.'
