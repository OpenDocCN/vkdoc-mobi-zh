    Patterns


    If you are new to development or have not used languages that have built-in pattern
    matching or regex-like functions, then you might be wondering what patterns are.
    There are four fundamental concepts in Lua:


    *   Character class

    *   Pattern item

    *   Pattern

    *   Capture


    Character Class


    A character class is used to represent a set of characters and can be any of the
    following:


    *   x: Represents the character *x* itself, not one of the magic characters ^,
    $, (), %,., [,], *, +, −, or?

    *   .: Functions in same way as the wildcard that represents all characters

    *   %a: Represents all letters

    *   %c: Represents all control characters

    *   %d: Represents all digits

    *   %l: Represents all letters (lowercase)

    *   %p: Represents all punctuation characters

    *   %s: Represents all space characters

    *   %u: Represents all uppercase characters

    *   %w: Represents all alphanumeric characters

    *   %x: Represents all hexadecimal characters

    *   %z: Represents the character with the representation 0

    *   %*x*: Allows you to escape any magic character (note that *x* is not the literal
    character *x*, but any nonalphanumeric character)

    *   [*set* ]: Represents a union of all characters in *set*. The range of characters
    can be specified with a hyphen (−), as in [0–9] or [a–z].

    *   [*^set* ]: Represents the complement of *set*. So, [^0–9] would mean all characters
    that are not in the range 0 to 9.


    For all classes that are represented by a single letter (e.g., %a, %c, %s, and
    so on), the corresponding uppercase letter represents the complement of the class.
    So, %S represents all non-space characters.


    Pattern Item


    A pattern item is a single character class that matches any single character in
    the class.


    There are a few characters that help quantify the matches:


    *   *: This matches zero or more repetitions of characters in the class. This
    will always return the longest possible sequence.

    *   +: This matches one or more repetitions of characters in the class. This will
    return the longest possible sequence.

    *   —: This also matches zero or more repetitions of characters in the class,
    but unlike *, this will match the shortest possible sequence.

    *   ?: This will match zero or one occurrence of a character in the class.


    Pattern


    A pattern is a sequence of pattern items. A caret (^) indicates the beginning
    of a pattern and a $ symbol specifies the end of the pattern. At other positions,
    they have no special meaning, but only represent themselves.


    Capture


    A pattern can contain subpatterns enclosed in parentheses; these are described
    as *captures*. When a match succeeds, the substrings that the match captures are
    stored (captured) for further use. Captures are numbered according to their left
    parentheses. In the pattern "(a*(.)%w(%s*))", the part of the string matching
    "(a*(.)%w(%s*))" is stored as the first capture, the character matching the dot
    (.) is stored as the second, and the part matching the %s* is stored as the third.


    Using the String Functions


    While we can store text as strings and then print them to the screen, we also
    sometimes need to manipulate or transform them. Using some of the Lua functions
    described previously, we can do this.


    Converting Strings to Uppercase


    As described previously, the function that converts strings to uppercase is very
    simple. Here’s a function that makes it even simpler to use:


    ```

    function upper(theString)

        return string.upper(theString)

    end

    ```


    Converting Strings to Lowercase


    This is similar to the previous function.


    ```

    function lower(theString)

        return string.lower(theString)

    end

    ```


    Converting Strings to Title Case


    This function converts a string to title case, in which the first character of
    all words is capitalized:


    ```

    function title_case(theString)

      return (theString:gsub("^%a", string.upper):gsub("%s + %a", string.upper))

    end

    ```


    Alternatively, we can have the function work in an object-oriented manner, where
    we can directly invoke the function as part of the string namespace, like so:


    ```

    tString = "hello how are you?"

    tString:title_case()

    ```


    To achieve that, we need to declare the function as follows:


    ```

    function string:title_case()

        return (self:gsub("^%a", string.upper):gsub("%s + %a", string.upper))

    end

    ```


    Padding a String


    While working with text, sometimes text needs to be padded. This function helps
    to create strings of a particular length by padding them:


    ```

    function pad(s, width, padder)

      padder = string.rep(padder or " ", math.abs(width))

      if width < 0 then return string.sub(padder .. s, width) end

      return string.sub(s .. padder, 1, width)

    end

    ```


    This function caters for both left and right padding. For padding on the left,
    we just need to pass it a negative length, as in the second example in the following
    code:


    ```

    print(pad("hello",20))

    print(pad("hello",-10,"0"))

    ```


    CSV Functionality


    While creating a game, there might be a need to save data in *CSV (comma-separated
    value)* format, in which the data is stored as a long string of values separated
    by commas. CSV functions can help you convert tables to and from CSV format.


    Converting a CSV String to a Table


    This first example parses and converts a CSV-formatted string into a table:


    ```

    -- Convert from CSV string to table (converts a single line of a CSV file)

    function fromCSV (s)

        s = s .. '',''          -- ending comma

        local t = {}        -- table to collect fields

        local fieldstart = 1

        repeat

        -- next field is quoted? (start with `"''?)

        if string.find(s, ''^"'', fieldstart) then

            local a, c

            local i  = fieldstart

            repeat

            -- find closing quote

                  a, i, c = string.find(s, ''"("?)'', i + 1)

            until c ~ = ''"''    -- quote not followed by quote?

            if not i then error(''unmatched "'') end

                local f = string.sub(s, fieldstart + 1, i-1)

                table.insert(t, (string.gsub(f, ''""'', ''"'')))

                fieldstart = string.find(s, '','', i) + 1

            else              -- unquoted; find next comma

                local nexti = string.find(s, '','', fieldstart)

                table.insert(t, string.sub(s, fieldstart, nexti-1))

                fieldstart = nexti + 1

            end

        until fieldstart > string.len(s)

        return t

    end

    ```


    Converting from a Table to CSV


    This next function converts a table into CSV format. This is useful for exporting
    the table data as a file that a spreadsheet program such as Excel can open and
    read.


    ```

    -- Convert from table to CSV string

    function toCSV (tt)

        local s = ""

        for _,p in pairs(tt) do

            s = s .. "," .. escapeCSV(p)

        end

        return string.sub(s, 2)      -- Remove first comma

    end

    ```


    Escaping the CSV


    *Escaping* in this context is not the same as *avoiding*, but instead means replacing
    the characters or altering them to be used as a string. Here’s an example of escaping
    CSV-formatted data:


    ```

    -- Used to escape "''s by toCSV

    function escapeCSV (s)

        if string.find(s, ''[,"]'') then

            s = ''"'' .. string.gsub(s, ''"'', ''""'') .. ''"''

        end

        return s

    end

