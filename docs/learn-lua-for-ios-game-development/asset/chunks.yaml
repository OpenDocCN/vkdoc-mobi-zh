    \ first line of the preceding code and place the `ground` object close to the\
    \ bottom of the screen rather than toward the top of the screen.\n\n```\nlocal\
    \ physics = require \"physics\"\nphysics.start()\nlocal ground = display.newRect(\
    \ 0, 460, 320, 20 )\nlocal rect1 = display.newRect( 140, 0, 40, 40 )\nphysics.addBody(ground)\n\
    physics.addBody(rect1)\n```"
  raw: 'To load an image, we use the newImage function in the display namespace:


    ```

    local img = display.newImage("image1.png")

    ```


    Alternatively, we can also provide the coordinates where we might want the image
    to be located:


    ```

    local img = display.newImage("image1.png", 50, 50)

    ```


    This will now load an image called image1.png and place it at the position 50,
    50 on the screen.


    Event-Based Processing


    In the days of DOS and character-based terminals, when computers were primitive
    even in comparison to digital TV sets, program flow used to be linear. The code
    would run from the first line and continue until it reached the last line and
    the program ended. This worked best for the technology of the times. However,
    with today’s touch screens and GUI-based apps, the linear flow model does not
    fit. We might have a touch or an event at any point in time, so applications are
    no longer necessarily synchronous in their flow. Events can occur and need to
    be handled at various times in an app’s life cycle.


    To enable us to use GUI-based applications, the concept of *event-based programming*was
    introduced. As shown in the diagram in [Figure 8-8](#9781430246626_Ch08.xhtml#Fig8),
    in this type of processing, an event occurs and is passed to the application to
    be processed, and based on the event type, the application does what’s necessary.
    In our case, the most commonly used event that we shall be working with is the
    touch event. That is the primary source of all input to the application. To allow
    the code to listen to the events that occur, the program has to register itself
    as a listener for a particular event and also pass a handler to the program that
    is called when the event occurs.


    ![9781430246626_Fig08-08.jpg](OEBPS/Images/9781430246626_Fig08-08.jpg)


    [Figure 8-8](#9781430246626_Ch08.xhtml#_Fig8) .  Architecture of an event process
    in Corona SDK


    We can register the program to listen to specific events using the addEventListener
    function on the object on which we want to listen to the events, and we can pass
    it a function that will handle the event when passed to it.


    ```

    OBJECT:addEventListener(EVENT

    ,HANDLER

    )

    ```


    In this code, *EVENT* is one of the many events that we can register to listen
    for, and *HANDLER* is the function that is invoked when the event is received.


    Input: Touches


    We can place images and text on the screen using the methods mentioned. However,
    we also need to handle the various forms of input, such as touches on the touch
    screen. These are equivalent to mouse clicks on the desktop. Generally, touch
    events are associated with a display element; you can touch the display element
    and trigger a touch phase. However, Corona SDK also allows you to have a generic
    touch handler that is associated with the Runtime object, which triggers the touch
    event for all objects.


    When the user places a finger on the device, a touch event is triggered. As shown
    in [Figure 8-9](#9781430246626_Ch08.xhtml#Fig9), this touch event has a couple
    of attributes, or members. A touch event starts with the finger touching the screen,
    and the event sets the value of phase to began. It also sets the target to the
    object that has been touched and the x and y to the coordinates of point where
    the user placed the finger on the screen.


    ![9781430246626_Fig08-09.jpg](OEBPS/Images/9781430246626_Fig08-09.jpg)


    [Figure 8-9](#9781430246626_Ch08.xhtml#_Fig9) .  The touch “began” event and its
    members


    If the user, while keeping the finger touching the screen, drags the finger, an
    event is triggered, but this time the value of phase is set to move. The target,
    x, and y still contain the values of the object touched and the current position
    of the finger. If the user moves the finger across the screen, as shown in [Figure
    8-10](#9781430246626_Ch08.xhtml#Fig10), a series of touch events are triggered,
    with phase set to move, and the x and y will reflect the coordinates as the finger
    moves across the screen.


    ![9781430246626_Fig08-10.jpg](OEBPS/Images/9781430246626_Fig08-10.jpg)


    [Figure 8-10](#9781430246626_Ch08.xhtml#_Fig10) .  The touch “move” event and
    its members


    When the user lifts the finger off the screen, a touch event is triggered with
    phase set to ended, as shown in [Figure 8-11](#9781430246626_Ch08.xhtml#Fig11).
    The other three attributes reflect the target and the x and y position where the
    touch ended.


    ![9781430246626_Fig08-11.jpg](OEBPS/Images/9781430246626_Fig08-11.jpg)


    [Figure 8-11](#9781430246626_Ch08.xhtml#_Fig11) .  The touch “ended” event and
    its members


    The cancelled phase is triggered when a touch event is interrupted after it triggers
    the began phase but does not complete with the ended phase. This interruption
    can be due to an incoming phone call, a system-triggered message, a notification,
    and so on.


    Let’s write some code to display the touch events (what we have just read about):


    ```

    function handler( event )

      print( "touch phase=" .. event.phase .. " at x=" .. event.x .. ", y=" .. event.y)

    end

    ```


    Runtime:addEventListener( "touch", handler )


    On running this code, we can look at the terminal window for the output.


    Similar to the touch event, there is a tap event can be handled. The difference
    between a touch and tap is that a touch starts with the began phase and ends with
    the ended phase. A tap event, on the other hand, is triggered when the user begins
    the touch and ends it without moving the touch. The tap event has a property numTaps
    that indicates the number of taps associated with that touch event.


    ```

    function onTap( event )

      print( "Taps :".. event.numTaps )

    end

    Runtime:addEventListener( "tap", onTap )

    ```


    Physics


    The feature that brought Corona SDK into the limelight and made it popular with
    developers was its ability to integrate physics into its code in about eight lines
    or so. You can make any display object into a physics object simply by assigning
    it as a physics body using the function physics.addBody().


    ```

    local ground = display.newRect( 0, 40, 320, 20)

    ```


    On running this code, rectangle is displayed on the screen. In order to make this
    a physics object, we need to include the physics library. I described in earlier
    chapters that the you can include libraries by using the require keyword, like
    so:


    ```

    local physics = require "physics"

    physics.start()

    ```


    These two lines are of utmost importance: the first one gets a handle on the physics
    library, which allows us to call the physics-related functions from the physics
    namespace, and the second line actually starts the physics engine. Making the
    objects physics objects does not make a difference until physics.start is called.
    This is mostly used in games that allow the user to position the objects on the
    screen and then invoke the physics.start function to start the physics simulation
    interacting with the placed objects. Some examples that use this are Bubble Ball
    and Angry Orange (not made with Corona SDK).


    However, even after adding these two lines, the rectangle we created doesn’t yet
    act as a physics body, because we have not as yet marked it as a physics body.
    To do so, add the following line of code:


    ```

    physics.addBody( ground )

    ```


    Upon refreshing the project in the simulator, the rectangle starts to obey gravity
    and falls down, off the screen.


    Let’s create another object that falls; for simplicity’s sake, we’ll create another
    rectangle. To do this, we’ll alter the first line of the preceding code and place
    the ground object close to the bottom of the screen rather than toward the top
    of the screen.


    ```

    local physics = require "physics"

    physics.start()

    local ground = display.newRect( 0, 460, 320, 20 )

    local rect1 = display.newRect( 140, 0, 40, 40 )

    physics.addBody(ground)

    physics.addBody(rect1)

    ```'
  trans: "\n# 要加载图像，我们使用 `display` 命名空间中的 `newImage` 函数：\n\n```\nlocal img = display.newImage(\"\
    image1.png\")\n```\n\n或者，我们也可以提供图像可能所在位置的坐标：\n\n```\nlocal img = display.newImage(\"\
    image1.png\", 50, 50)\n```\n\n这样会加载一个名为 `image1.png` 的图像，并将其放置在屏幕上的 `50, 50` 位置。\n\
    \n## 基于事件的处理\n\n在 DOS 和字符终端时代，即使与数字电视相比，计算机也显得原始，那时的程序流程是线性的。代码从第一行开始运行，一直执行到最后一行，然后程序结束。这非常适用于当时的技术。然而，在当今的触摸屏和基于\
    \ GUI 的应用程序中，线性流程模型已经不再适用。我们可能在任意时刻遇到触摸或某个事件，因此应用程序的流程不再必须是同步的。事件可能在应用程序生命周期的不同时间点发生，并需要被处理。\n\
    \n为了能够使用基于 GUI 的应用程序，引入了*基于事件的编程*概念。如 图 8-8 中的图表所示，在这种处理方式中，事件发生并被传递给应用程序进行处理，应用程序根据事件类型执行必要的操作。在我们的例子中，最常用到的事件是触摸事件。它是应用程序所有输入的主要来源。为了让代码能够监听发生的事件，程序必须将自身注册为特定事件的监听器，并为该事件传递一个处理程序（handler），当事件发生时，该处理程序会被调用。\n\
    \n![9781430246626_Fig08-08.jpg](img/9781430246626_Fig08-08.jpg)\n\n图 8-8 .  Corona\
    \ SDK 中的事件处理架构\n\n我们可以使用 `addEventListener` 函数，在我们想要监听事件的对象上注册程序来监听特定事件，并传递一个函数，该函数将在事件传递给它时处理该事件。\n\
    \n```\nOBJECT:addEventListener(EVENT\n,HANDLER\n)\n```\n\n在这段代码中，`EVENT` 是我们可注册监听的事件之一，而\
    \ `HANDLER` 是接收到事件时被调用的函数。\n\n## 输入：触摸\n\n我们可以使用前面提到的方法在屏幕上放置图像和文本。但是，我们还需要处理各种形式的输入，例如触摸屏上的触摸。这相当于桌面上的鼠标点击。通常，触摸事件与显示元素相关联；你可以触摸显示元素并触发一个触摸阶段。然而，Corona\
    \ SDK 也允许你拥有一个与 `Runtime` 对象关联的通用触摸处理程序，该处理程序会为所有对象触发触摸事件。\n\n当用户将手指放在设备上时，会触发一个触摸事件。如\
    \ 图 8-9 所示，该触摸事件有若干属性或成员。触摸事件始于手指触摸屏幕，事件将 `phase` 的值设置为 `began`。它还将 `target` 设置为被触摸的对象，并将\
    \ `x` 和 `y` 设置为用户手指接触屏幕点的坐标。\n\n![9781430246626_Fig08-09.jpg](img/9781430246626_Fig08-09.jpg)\n\
    \n图 8-9 .  触摸“began”（开始）事件及其成员\n\n如果用户在保持手指触摸屏幕的同时拖动手指，则会触发一个事件，但这次 `phase` 的值被设置为\
    \ `move`。`target`、`x` 和 `y` 仍然包含被触摸对象的值以及手指的当前位置。如果用户的手指在屏幕上移动，如 图 8-10 所示，则会触发一系列触摸事件，其中\
    \ `phase` 设置为 `move`，并且 `x` 和 `y` 会随着手指在屏幕上移动而反映其坐标变化。\n\n![9781430246626_Fig08-10.jpg](img/9781430246626_Fig08-10.jpg)\n\
    \n图 8-10 .  触摸“move”（移动）事件及其成员\n\n当用户将手指从屏幕上抬起时，会触发一个触摸事件，其 `phase` 设置为 `ended`，如\
    \ 图 8-11 所示。其他三个属性反映了触摸结束时的目标对象以及 `x` 和 `y` 位置。\n\n![9781430246626_Fig08-11.jpg](img/9781430246626_Fig08-11.jpg)\n\
    \n图 8-11 .  触摸“ended”（结束）事件及其成员\n\n当触摸事件在触发 `began` 阶段后，但未完成 `ended` 阶段而被中断时，会触发\
    \ `cancelled` 阶段。这种中断可能是由于来电、系统触发的消息、通知等引起的。\n\n让我们编写一些代码来显示触摸事件（即我们刚刚读到内容）：\n\
    \n```\nfunction handler( event )\n  print( \"touch phase=\" .. event.phase ..\
    \ \" at x=\" .. event.x .. \", y=\" .. event.y)\nend\nRuntime:addEventListener(\
    \ \"touch\", handler )\n```\n\n运行这段代码后，我们可以在终端窗口查看输出。\n\n与触摸事件类似，还有一个可以处理的点击事件。触摸和点击之间的区别在于，触摸以\
    \ `began` 阶段开始，以 `ended` 阶段结束。而点击事件则是在用户开始触摸并在没有移动的情况下结束触摸时触发的。点击事件有一个属性 `numTaps`，表示与该触摸事件相关的点击次数。\n\
    \n```\nfunction onTap( event )\n  print( \"Taps :\".. event.numTaps )\nend\nRuntime:addEventListener(\
    \ \"tap\", onTap )\n```\n\n## 物理\n\nCorona SDK 备受瞩目并深受开发者欢迎的特性是它能够在大约八行代码内将物理功能集成到代码中。你可以通过使用\
    \ `physics.addBody()` 函数将任何显示对象指定为物理物体，从而使其成为物理对象。\n\n```\nlocal ground = display.newRect(\
    \ 0, 40, 320, 20)\n```\n\n运行这段代码后，屏幕上会显示一个矩形。为了使其成为物理对象，我们需要引入物理库。我在前面的章节中描述过，你可以使用\
    \ `require` 关键字来包含库，如下所示：\n\n```\nlocal physics = require \"physics\"\nphysics.start()\n\
    ```\n\n这两行代码至关重要：第一行获取了物理库的句柄，允许我们从 `physics` 命名空间调用与物理相关的函数；第二行实际上启动了物理引擎。将对象设置为物理对象并不会产生任何效果，直到调用\
    \ `physics.start`。这在游戏中经常用到，游戏允许用户将对象放置在屏幕上，然后调用 `physics.start` 函数来启动物理模拟，使其与放置的对象进行交互。使用此功能的例子包括《泡泡球》（Bubble\
    \ Ball）和《愤怒的橘子》（Angry Orange）（非 Corona SDK 制作）。\n\n然而，即使添加了这两行代码，我们创建的矩形仍然不会作为物理体运行，因为我们尚未将其标记为物理体。为此，请添加以下代码行：\n\
    \n```\nphysics.addBody( ground )\n```\n\n在模拟器中刷新项目后，矩形开始受重力影响并向下掉落，直至离开屏幕。\n\n\
    让我们创建另一个下落的对象；为简单起见，我们创建另一个矩形。为此，我们将修改前面代码的第一行，将 `ground` 对象放在靠近屏幕底部的位置，而不是靠近顶部的位置。\n\
    \n```\nlocal physics = require \"physics\"\nphysics.start()\nlocal ground = display.newRect(\
    \ 0, 460, 320, 20 )\nlocal rect1 = display.newRect( 140, 0, 40, 40 )\nphysics.addBody(ground)\n\
    physics.addBody(rect1)\n```\n"
- fmt: "请注意，两个物体都开始从屏幕上掉落。然而，我们不希望地面也掉落——如果我们不将其设为物理对象会怎样？它是否会如我们所愿保持不动？如果我们注释掉或移除将地面设置为物理体的那行代码，会发现`rect1`对象会直接穿过地面对象。\n\
    \n在继续之前，我们需要了解一些要点。创建物理体很简单，但我们可以创建几种不同类型的物理体，它们之间的区别很重要。物理体不会与其他显示对象交互，它只能与其他物理体交互。物理体主要有三种类型：`static`（静态）、`dynamic`（动态）和`kinematic`（运动学）。默认的物理对象类型是`dynamic`，这意味着一旦启动物理引擎，该对象就会开始遵循重力规则。第二种类型是`static`，这种类型的对象保持不动且不遵循重力，但仍会与物理对象交互。最后一种类型是`kinematic`，在这种类型中，速度会影响对象，但重力对其没有影响。运动学对象会在其自身速度的影响下移动。\n\
    \n了解了这些知识，我们可以编写以下代码：\n\n```lua\nlocal physics = require \"physics\"\nphysics.start()\n\
    local ground = display.newRect( 0, 460, 320, 20 )\nlocal rect1 = display.newRect(\
    \ 140, 0, 40, 40 )\nphysics.addBody( ground, \"static\")\nphysics.addBody( rect1\
    \ )\n```\n\n现在，如[图8-12](#9781430246626_Ch08.xhtml#Fig12)所示，地面的矩形不会掉出屏幕，而`rect1`矩形在撞击地面时会弹起。\n\
    \n![9781430246626_Fig08-12.jpg](OEBPS/Images/9781430246626_Fig08-12.jpg)\n\n[图8-12](#9781430246626_Ch08.xhtml#_Fig12)\
    \ . 一个动态物理对象与静态物理对象交互\n\n这个矩形可以用一个“贴图”（即图形）替换，这非常简单：\n\n```lua\nlocal physics\
    \ = require \"physics\"\nphysics.start()\n--\nlocal ground = display.newRect(\
    \ 0, 460, 320, 20 )\nlocal rect = display.newImage( \"DominoTile.png\" )\n--\n\
    physics.addBody( ground, \"static\")\nphysics.addBody( rect1 )\n```\n\n--\n\n\
    时机决定一切\n\n许多游戏会为玩家提供特殊能力。例如，《阿肯色oid》（打砖块）这类游戏会提供激光、多个球等能力。在其他游戏中，你可能会在有限时间内获得超速或超强力量，这些能力会以计时器的形式在屏幕上显示，时间一到能力就会消失。如果我们想让自己的游戏也实现类似功能呢？例如，我们希望在一小段时间内追踪或提供某些特殊能力。\n\
    \n计时器就派上用场了。虽然“计时器”这个词可能会让人联想到在指定时间响起的闹钟，但在Lua中，计时器更像是一种心跳——一种我们可以控制其节拍的心跳。我们可以决定在计时器每次“跳动”时让程序做什么。\n\
    \n设置计时器很简单——我们只需使用以下代码：\n\n```lua\nlocal heartbeat = timer.performWithDelay(1000,\n\
    \   function()\n     print(\"tick\")\nend, 0)\n```\n\n运行这段代码时，你会看到`tick`这个词每秒输出到终端一次。该函数位于`Timer`命名空间中，有四个函数：`timer.performWithDelay()`用于创建新计时器，`timer.cancel()`用于取消计时器，`timer.pause()`用于暂停计时器进一步触发，以及`timer.resume()`用于从执行暂停的位置继续执行。\n\
    \n在计时器相关的函数中，`performWithDelay`接受一个参数，即已创建计时器的句柄。当`performWithDelay`函数被调用时，它会返回一个指向将要运行该代码的实例的句柄。该函数接受三个参数：`delay`、`listenerFunction`和`iterations`。第一个参数`delay`指定计时器事件触发的频率，单位是毫秒。通俗地说，这意味着我们应当在每次心跳时做一些事情。第二个参数是`listenerFunction`，它指向一个Lua函数，并且在每次事件发生时被调用。最后一个参数是可选的，默认值为1。它表示该事件应调用此函数的次数。\n\
    \n以下是如何使用计时器打印从1到10的数字列表：\n\n```lua\nlocal counter = 1\n  function printNumber(event)\n\
    \     print(\"Counter is :\".. counter)\n    counter = counter + 1\nend\ntimer.performWithDelay(1000,printNumber,\
    \ 10)\n```\n\n帧\n\n虽然电视和电影的工作原理看起来很复杂，但实际上它们的工作方式非常简单。电影或电视屏幕会快速连续地显示一系列静态图像，速度快到让我们眼睛将这些图像感知为连续运动。这也是动画师制作动画的方式。他们会绘制一组连续的图像帧，当这些图像快速连续播放时，就给我们提供了运动的错觉。如果图像播放得太慢，我们会察觉到帧之间的图像切换；如果播放得太快，一切都会显得异常和加速。那么，这跟开发有什么关系呢？一切都有关系！\n\
    \n大多数动画软件都使用时间线。时间线通常是动画的蓝图，它决定了对象随时间或帧的位置和变换。应用程序从第1帧开始，遍历一定数量的帧来提供运动的错觉，直到到达帧的末尾时停止。然而，在某些情况下，时间线可能会“循环”——即从开头重新开始，仿佛在一个循环中。每秒显示的帧数称为“帧率”。每秒能显示的帧数越多，运动就越平滑。大多数软件使用术语“帧每秒”（`fps`）来描述屏幕上动画对象的帧率。\n\
    \n可以将这视为应用程序的心跳。例如，你可以将心跳设置为`30 fps`或`60 fps`，后者能提供更平滑的动画。然而，更高的帧率会给CPU带来更大负担，尤其是在触发一些处理的应用程序中，因此在某些情况下，较低的帧率是更好的选择。\n\
    \n当你在Lua中创建动画时，Corona SDK允许你将应用设置为`30`或`60 fps`。\n\n为简单起见，我们将编写一个处理程序来捕获事件并仅打印一条消息。\n\
    \n```lua\nfunction ticker( event )\n    print ( \"tick\" )\nend\n--\nRuntime:addEventListener\
    \ ( \"enterFrame\", ticker )\n```\n\n运行时，这将在终端窗口中输出大量显示`tick`的行。\n\n**注意** `enterFrame`事件在屏幕渲染之前触发。\n\
    \n制作生命条\n\n如果你玩过任何即时战略或塔防游戏，你会知道每个角色都有一定的生命值，每次角色被击中，生命条就会减少或改变颜色。\n\n在这个例子中，我们将使用一个矩形来创建生命条，如图[图8-13](#9781430246626_Ch08.xhtml#Fig13)所示。然后我们可以通过`enterFrame`事件中操作矩形的高度来修改矩形的大小。"
  raw: 'Notice that both the objects start to fall off the screen. However, we don’t
    want the ground to fall off the screen—what if we do not make that a physics object?
    Then will it stay as we expect it to? If we comment out or remove the line that
    makes the ground a physics body, notice that the rect1 object simply falls through
    the ground object.


    Before we proceed, we need to know a few things. Creating a physics body is easy,
    but there are a few different types of physics bodies that we can create, and
    their differences are important. A physics body does not interact with other display
    objects; it can only interact with other physics bodies. There are three main
    types of physics bodies: static, dynamic, and kinematic. The default type of physics
    object is *dynamic*, which means that the moment we start the physics engine,
    this object will start to obey the rules of gravity. The second type is *static*;
    objects of this type stay in place and do not obey gravity, but they still interact
    with physics objects. The last type is *kinematic*, in which the velocity affects
    the objects but gravity has no effect on it. A kinematic object moves under the
    influence of its own velocity.


    With this knowledge, we can write the following code:


    ```

    local physics = require "physics"

    physics.start()

    local ground = display.newRect( 0, 460, 320, 20 )

    local rect1 = display.newRect( 140, 0, 40, 40 )

    physics.addBody( ground, "static")

    physics.addBody( rect1 )

    ```


    Now, as shown in [Figure 8-12](#9781430246626_Ch08.xhtml#Fig12), the rectangle
    for the ground does not fall off the screen, and the rect1 rectangle bounces when
    it hits the ground.


    ![9781430246626_Fig08-12.jpg](OEBPS/Images/9781430246626_Fig08-12.jpg)


    [Figure 8-12](#9781430246626_Ch08.xhtml#_Fig12) .  A dynamic physics object interacting
    with a static physics object


    The rectangle can be replaced with a *skin*—that is, a graphic—and this is a very
    easy:


    ```

    local physics = require "physics"

    physics.start()

    --

    local ground = display.newRect( 0, 460, 320, 20 )

    local rect = display.newImage( "DominoTile.png" )

    --

    physics.addBody( ground, "static")

    physics.addBody( rect1 )

    ```


    --


    Timing Is Everything


    Many games offer special powers to their players. For example, games like Arkanoid
    (Breakout) offer get lasers, multiple balls, and so on. In other games, you might
    get super-speed or strength for a limited time, depicted on the screen in the
    form of a timer, whereby the powers disappear when the time is up. What if for
    our game we wanted something similar? For example, say we want to track or provide
    some special abilities for a short period of time.


    The timer comes to our rescue. Though the word *timer* might bring to mind something
    like an alarm that goes off at the end of a specified time, in Lua, the timer
    is more like a heartbeat—one that we can control the beat of. And we can decide
    what we want the program to do when that timer beats.


    Setting up a timer is easy—we simple use the following:


    ```

    local heartbeat = timer.performWithDelay(1000,

       function()

         print("tick")

    end, 0)

    ```


    When you run this, you’ll see the words *tick* outputted to the terminal once
    per second. The function sits in the Timer namespace and has four functions: timer.performWithDelay()
    to create a new timer, timer.cancel() to cancel a timer, timer.pause()to pause
    the timer from firing further, and timer.resume()to continue from the point where
    the execution was paused.


    Of the timer-related functions, performWithDelay takes a single parameter, which
    is the handle to the timer that has been created. The function performWithDelay,
    when called, returns a handle to the instance that shall run that code. The function
    takes three arguments: delay, listenerFunction, and iterations. The first parameter,
    delay, specifies the frequency that the timer event is fired in milliseconds.
    In plain words, this simply means that we should do something every time there
    is a heartbeat. The second parameter is the listenerFunction; this points to a
    Lua function and is the function that is called every time the event occurs. The
    last parameter is optional, and its default value is 1\. It signifies the number
    of times that this event should invoke this function.


    Here’s how to print a list of numbers from 1 to 10 using the timer:


    ```

    local counter = 1

      function printNumber(event)

         print("Counter is :".. counter)

        counter = counter + 1

    end

    timer.performWithDelay(1000,printNumber, 10)

    ```


    Frames


    While the workings of televisions and movies may seem complex, the way they work
    is actually quite simple. The movie or TV screen displays a series of static images
    in rapid succession, fast enough that our eyes perceive these images as continuous
    movement. This is also how animators create animation. They draw a series of frames
    with the images, and when the images are then played back to us in rapid succession,
    it provides us the illusion of movement. If the images are played back too slowly,
    we can catch the changing of images between frames; if they’re played too fast,
    everything appears abnormal and sped up. Now, what does that have to do with development?
    Everything!


    Most animation software works with a timeline. The timeline is generally the blueprint
    of the animation, which determines the position and transformations of the objects
    over time or frames. The app starts at frame 1 and iterates through a set number
    of frames to provide the illusion of movement, till it reaches the end of the
    frames, when it stops. However, in some cases, the timeline may *wrap*—that is,
    start again from the beginning as if in a loop. The numbers of frames that are
    displayed in a second is referred to as the *frame rate*. The more frames you
    can display in a second, the smoother the movement. Most software uses the terminology
    *frames per second (fps)*, which is used to describe the frame rate of animated
    objects on the screen.


    Think of this as the heartbeat of the app. For example, you can set the heartbeat
    to either 30 fps or 60 fps, the latter providing a smoother animation. However,
    a higher frame rate will be harder on the CPU, especially in an app that triggers
    some processing, so in certain cases a lower frame rate is a better choice.


    When you create animations in Lua, Corona SDK allows you to set your app to either
    30 or 60 fps.


    For simplicity’s sake, we’ll write a handler to catch an event and simply print
    a message.


    ```

    function ticker( event )

        print ( "tick" )

    end

    --

    Runtime:addEventListener ( "enterFrame", ticker )

    ```


    When run, this will output a lot of lines that display “tick” in the terminal
    window.


    **Note**   The enterFrame event is dispatched prior to the screen render taking
    place.


    Making a Health Bar


    If you have played any real-time strategy or tower-defense games, you know that
    each character has some amount of health, and every time the character is hit,
    the health bar reduces or changes color.


    In this example, we’ll create a bar using a rectangle, as shown in [Figure 8-13](#9781430246626_Ch08.xhtml#Fig13).
    Then we can modify the size of the rectangle by manipulating the height of the
    rectangle at the enterFrame event.'
