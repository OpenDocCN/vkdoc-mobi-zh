    \  字符类\n*   模式项\n*   模式\n*   捕获\n\n#### 字符类\n\n字符类用于表示一组字符，可以是以下任意一种：\n\n*   `x`：表示字符`x`本身，而不是魔术字符`^`、`$`、`(`、`)`、`%`、`.`、`[`、`]`、`*`、`+`、`-`、`?`\n\
