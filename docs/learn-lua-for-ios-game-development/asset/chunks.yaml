    ## 架构


    Gideros 的架构与其他框架类似。Gideros 核心引擎一方面与 Lua 代码交互，另一方面在后台通过 OpenGL 与设备或桌面端进行交互。图 9-10
    展示了 Gideros Studio 的架构。构成 Gideros Studio 系列的工具还包括一些实用程序；这些在章节开头已经讨论过。

