    ```\napplication:openUrl(\"tel:555-7827-9277\")\n```\n\n在游戏中，你可能想要下载一个文件、一些 JSON\
    \ 数据或一个包含关卡数据的文本文件。这无法通过 `openUrl` 函数实现。不过，我们可以使用 `UrlLoader` 类。以下是一个示例：\n\n```\n\
    local loader = UrlLoader.new(\"http://example.com/image.png \")\n\nlocal function\
    \ onComplete(event)\n    local out = io.open(\"|D|image.png\", \"wb\")\n    out:write(event.data)\n\
    \    out:close()\n\nlocal b = Bitmap.new(Texture.new(\"|D|image.png\"))\n    stage:addChild(b)\n\
    end\n\nlocal function onError()\n    print(\"error\")\nend\n\nlocal function onProgress(event)\n\
    \    print(\"progress: \" .. event.bytesLoaded .. \" of \" .. event.bytesTotal)\n\
    end\n\nloader:addEventListener(Event.COMPLETE, onComplete)\nloader:addEventListener(Event.ERROR,\
    \ onError)\nloader:addEventListener(Event.PROGRESS, onProgress)\n```\n\n在这段代码中，我们首先创建了一个\
    \ `UrlLoader` 的新实例，这将启动下载。`UrlLoader` 的默认方法是 `UrlLoader.GET`。其他选项有 `POST`、`PUT`\
    \ 和 `DELETE`。当使用 `POST` 或 `PUT` 时，可以将头部信息和数据传递给 URL。\n\n```\nlocal url = \" http://www.[yourDomain].com/application.php?userid=gideros&login=guest\"\
    \n\nlocal loader1 = UrlLoader.new(url)\nlocal loader2 = UrlLoader.new(url, UrlLoader.GET)\
