    # 代码片段收集器


    你偶尔可能会遇到一些有趣的功能或例程，但它们当时可能与你的项目无关。之后当你需要用到它们时，却可能对这段代码毫无印象。在这种情况下，代码片段收集器总是一个好用的工具。本节介绍两个有用的收集器。


    ## CodeBox


    - **URL**: [`itunes.apple.com/us/app/codebox/id412536790?mt=12`](http://itunes.apple.com/us/app/codebox/id412536790?mt=12)

    - **价格**: 4.99 美元

    - **平台**: Mac OS X


    这是一个非结构化的代码片段收集器。它允许将代码片段添加到数据文件中。每个代码片段可以有多个表格，每个表格可以有不同的语法语言高亮。你可以混合使用网页和文本文件，如图
    Figure 14-10 所示。这对开发者来说是一个特别有用的工具，因为它没有“一个文件对应一个代码片段”的问题；相反，每个代码片段条目可以存储整个项目。


    ![9781430246626_Fig14-10.jpg](img/9781430246626_Fig14-10.jpg)


    图 14-10 . CodeBox 及其代码片段，包含一个 URL 和一个文本文件


    ## Code Collector Pro


    - **URL**: [www.mcubedsw.com/software/codecollectorpro/](http://www.mcubedsw.com/software/codecollectorpro/)

    - **价格**: 免费（即将开源）

    - **平台**: Mac OS X


    这是较早推出的一款工具，结构感稍强；它看起来类似于电子邮件客户端——也就是说，它包含文件夹，每个文件夹包含一个代码片段，并且可以在底部窗格中预览该代码片段（如图
    Figure 14-11 所示）。每个片段只有一个文本框或标签页，并且可以设置为特定的语言。


    ![9781430246626_Fig14-11.jpg](img/9781430246626_Fig14-11.jpg)


    图 14-11 . Code Collector Pro 中的代码片段


    # 版本控制


    代码总是在演变——在开发或测试过程中，你经常需要在文件中添加或更改数据。因此，采用某种形式的版本控制是好的，这样你可以跟踪更改并在不同代码版本之间来回切换。虽然你可以选择
    `CVS`、`Subversion`、`Mercurial` 和 `Git`，但我发现 `Git` 作为独立版本控制系统效果最好，并且能够扩展到团队仓库。有很多
    `Git` 客户端可以帮助管理桌面端和在线端的 `Git` 仓库。对于在线仓库，你可以从在 `GitHub` 或 `Bitbucket` 上创建仓库开始。


    # 位图编辑器


    大多数非 3D 游戏的卖点通常是图形——大多数用户购买游戏的决定是基于 App Store 中的截图。当然，图形不会自己产生，但并非每个人都能负担得起（甚至需要）`Photoshop`（尽管它已经成为创建图形的实际标准软件）。本节描述了一些备选软件产品，你可以根据需求使用它们来创建图形。


    ## Pixen


    - **URL**: [`pixenapp.com/`](http://pixenapp.com/)

    - **价格**: 9.99 美元（从 Mac App Store 购买）

    - **平台**: Mac OS X


    如果你正在创建 8 位图形或像素图形，那么你需要适合该任务的工具；放大画布并使用网格是一种方法，但位图编辑器是为像素艺术操作等特定任务而设计的，如图 Figure
    14-12 所示。`Pixen` 是一款针对 Mac OS X 的工具，现在可在 Mac App Store 上购买，价格为 9.99 美元；免费版本已从网站上下架。不过，其源代码仍在
    `GitHub` 上可用。


    ![9781430246626_Fig14-12.jpg](img/9781430246626_Fig14-12.jpg)


    图 14-12 . 使用 Pixen 编辑精灵或图像


    ## GraphicsGale


    - **URL**: [www.humanbalance.net/gale/us/](http://www.humanbalance.net/gale/us/)

    - **价格**: 1995 日元（约 25 美元；也提供免费版）

    - **平台**: 仅限 Windows


    `GraphicsGale` 是一款在 Windows 平台上处理 8 位或像素图形的出色工具。虽然你可以使用 `Microsoft Paint` 完成某些任务，例如放大和设置网格，但
    `GraphicsGale` 提供的额外功能使其成为首选工具。它具备洋葱皮功能以辅助单元格动画，并支持多种格式的导出和导入。它是一个单一工具，可以帮助创建动画光标、图标等。图
    14-13 展示了 `GraphicsGale` 的实际应用。


    ![9781430246626_Fig14-13.jpg](img/9781430246626_Fig14-13.jpg)


    图 14-13 . 在 GraphicsGale 中编辑像素精灵


    ## Pixelmator


    - **URL**: [`itunes.apple.com/us/app/pixelmator/id407963104?mt=12`](http://itunes.apple.com/us/app/pixelmator/id407963104?mt=12)

    - **价格**: 14.99 美元（首发价格）

    - **平台**: Mac OS X


    `Pixelmator` 在过去几年中不断进化，是一款在 Mac 上运行的绘画应用程序。它的用户界面非常美观，并提供了许多你可能只期望在更高级程序（如 `Photoshop`）中才有的功能，例如图层、效果、处理多种文件格式、画笔等，而价格却低得多。其名为
    `Cherry` 的新版本是一款功能强大的工具，提供了超过 150 种效果的视觉仓库，这些效果比 `Photoshop` 中的类似功能更快、响应更灵敏（其中一种万花筒效果如图
    Figure 14-14 所示）。它可以处理 `RAW` 文件以及许多其他文件格式。


    ![9781430246626_Fig14-14.jpg](img/9781430246626_Fig14-14.jpg)


    图 14-14 . 在 Pixelmator 中应用了万花筒效果的图像


    ## Axialis IconWorkshop


    - **URL**: [www.axialis.com/iconworkshop/](http://www.axialis.com/iconworkshop/)

    - **价格**: 69.95 美元

    - **平台**: Windows


    这是一款仅限 Windows 的应用程序，主要设计为图标创建工具。它有一些漂亮的视觉模板，你可以用来创建出色的效果。这些图标可以用作标签栏等的图像。图像包甚至包含光泽和高光等效果，因此你可以创建具有与专业图标相同光泽感的图标。图
