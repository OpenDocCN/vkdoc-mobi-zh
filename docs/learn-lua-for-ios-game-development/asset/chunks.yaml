    in many ways: as arrays, hash tables (associative arrays), and objects, and in
    plenty more. The following subsections will discuss tables as arrays and hash
    tables.


    Tables As Arrays


    The Lua equivalent of an array is a table. All arrays in Lua have an index base
    of 1, which means that the first entry starts at 1 (not 0, as in many other languages).
    Arrays need to have a numeric index. These can be multidimensional and do not
    need to be dimensioned at declaration. These can grow and be redimensioned at
    runtime.


    ```

    local theArray = {}

    for i = 1, 10 do

      theArray[i] = "item ". . i

    end

    ```


    Tables As Associative Arrays


    Tables are the Lua equivalent of associative arrays, hash tables, and even NSDictionary
    objects. The difference between an array and an associative array is that, instead
    of having a numeric index to access an element of the array table, an associative
    array can use a string to access the elements.


    ```

    local theTable = {}

    for i = 1, 10 do

      theTable["item"..i] = i

    end

    ```


    **Note**   Lua is very flexible and hence is very forgiving, even if you mix the
    two types of arrays.


    ```

    local theMixedTable = {}

    for i = 1, 5 do

      theMixedTable[i] = "item ".. i

    end

    theMixedTable["name"] = "mixedTable"

    theMixedTable["subject"] = "coding"

    print(theMixedTable.name, theMixedTable[3])

    ```


    Functions: An Advanced Look


    In the previous chapter we had a look at functions and how Lua sees them. Lua
    objects and structures are Lua tables, and the good part is that tables can hold
    functions and other tables, string, and numbers. In effect each object with a
    function is like a namespace that has its own set of functions. To access the
    function of a particular object, you need to access the function with the namespace
    prefixed.


    ```

    myObj = {

        type = "furry",

       name =  "Furry_1",

       description = "Fluffy furry teddybear",

      display = function ()

        print(description)

     end

    }

    myObj.show = function()

     print("Now Showing. . .")

    end

    ```


    To call the function, you use the following:


    ```

    myObj.display()

    myObj.show()

    ```


    Tables As Objects


    As you’ve seen, tables can be used as objects. In this next example, we’ll create
    an object called myObj that has properties of type, name, description, and so
    on. In this example, you’ll create a game that spawns a series of animals, each
    with different strengths and different functions for movement.


    Since some of the functions might overlap, in order to avoid writing the same
    code over and over again, you’ll create a new object based on the parent object,
    such that all of the functions are available to this object. (We shall create
    such objects later in the book.) So, when this object is passed, you can simply
    invoke the move function that is common to the animals, but might be specific
    to each of the animals depending on its type.


    One way to manage this is as follows:


    ```

    local cat_01 = animal.new("cat")

    local mouse_01 = animal.new("mouse")

    animal.move(cat_01)

    animal.move(mouse_01)

    ```


    This might work for some; however, an alternative method to manage this would
    be the following:


    ```

    local cat_01 = animal.new("cat")

    local mouse_01 = animal.new("mouse")

    cat_01:move()

    mouse_01:move()

    ```


    Further, if you had this in an array of animals, you could just about as easily
    have something like this:


    ```

    local i

    for i =  1,#aryAnimals do

      aryAnimals[i]:move()

    end

    ```


    Or you could very well also use something like


    ```

    aryAnimals[i].move(aryAnimals[i])

    ```


    Notice here how the function is invoked using the dot (.) or the colon (:). This
    is something a lot of beginning Lua developers come across, and they often have
    questions about the difference between, say, cat_01:move() and cat_01.move().
    The following section will describe the differences.


    The Difference Between . and :


    In the preceding example, there’s no difference between calling cat_01.move()
    and cat_01:move(). But let’s consider that in the same function we also need to
    pass a parameter speed, which indicates how fast the animal should move. So we
    simply pass the speed as a parameter as


    ```

    cat_01:move(10)

    ```


    or


    ```

    cat_01.move(10)

    ```'
