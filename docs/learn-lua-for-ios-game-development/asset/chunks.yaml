    \n```\nco = coroutine.create(showProgress)\nwhile coroutine.status(co) ~= \"dead\"\
    \ do\n    _,res = coroutine.resume(co)\n    if res/tStep == math.floor(res/tStep)\
    \ then print(res/tStep .. \" % 完成\") end\nend\n```\n\n在处理依赖于更新数据的函数时，能够在中途恢复执行并向函数传递新参数的能力非常有用。我们不会看一个复杂的示例，但为了说明这一点，这里有一个简单的例子：\n\
    \n```\na = 100\nco = coroutine.create(function()\n    print( \"我们从 \", a, \" 开始\"\
    )\n    a = coroutine.yield(a)\n    print(\"我们用值 \", a, \" 重启此函数\")\nend)\n_, res\
    \ = coroutine.resume(co)\nprint(\"我们在 \", res, \" 处停止或返回\")\n_,res = coroutine.resume(co,\
    \ 200)\n```\n\n### 游戏循环\n\n用最简单的话来说，游戏是一个重复的循环，它接收输入并更新屏幕和角色。因此，用伪代码表示，一个游戏可能如下所示：\n\
    \n```\n while playing do\n    getInput()\n    updateCharacters()\n    updateScreen()\n\
    end\n```\n\n在这种情况下，`getInput()` 是一个获取玩家输入的函数，可以来自键盘或触摸屏。`updateCharacters()` 是更新游戏玩法元素、屏幕上角色以及面板的函数。最后，`updateScreen()`\
    \ 会更新分数、生命值、消息等。如果这是用 C、C++ 或类似语言编写的，这没问题，但在 Lua 中，while 循环不太稳定。协程可以方便地使这些例程更具响应性。\n\
    \n另一个有趣的地方是，尽管 Lua 中的协程不是线程，但它们可以像线程一样使用（即，你可以定义多个协程）。这里有一个例子：\n\n```\nc1 = coroutine.create(function()\n\
    \    for i=1,20 do\n        print( \"函数 1: \", i)\n    end\nend)\nc2 = coroutine.create(function()\n\
    \    for i=1,5 do\n        print( \"函数 2: \", i)\n    end\nend)\nc3 = coroutine.create(function()\n\
    \    for i=10,1,-1 do\n        print( \"函数 3: \", i)\n    end\nend)\nwhile true\
    \ do\n    co1 = coroutine.resume(c1)\n    co2 = coroutine.resume(c2)\n    co3\
    \ = coroutine.resume(c3)\n    if coroutine.status(c1)==\"dead\" and coroutine.status(c2)==\"\
    dead\" and coroutine.status(c3)==\"dead\" then break end\nend\n```\n\n### 处理表\n\
    \n请记住，在 Lua 中，除了数字和字符串之外的所有变量都是内存位置，并且通过引用传递，这意味着如果我们声明表 `t`，然后将 `b` 赋值为 `t`，我们并没有在\
    \ `b` 中获得 `t` 的副本；相反，`b` 将指向与 `t` 相同的表。\n\n```\nt = {\"一\", \"二\", \"三\"}\nb =\
    \ t\nprint(b[2])\nt[2]=\"二（法语）\"\nprint(b[2])\n```\n\n在需要复制表，而不仅仅是提供指向同一内存地址的指针的情况下，我们需要进行所谓的*深拷贝*。这里有一个例子：\n\
    \n```\nfunction deepcopy(t)\n    if type(t) ~= \"table\" then return t end\n \
    \   local res = {}\n    local mt = getmetatable(t)\n    for k,v in pairs(t) do\n\
    \        if type(v)==\"table\" then\n            v = deepcopy(v)\n        end\n\
    \        res[k] = v\n    end\n    setmetatable(res,mt)\n    return res\nend\n\
    ```\n"
- fmt: "This code first creates a new blank table object, `res`. Next, it saves the\
    \ metatable signature, which is what identifies a table to be of a particular\
    \ type. When this metatable is modified, the object may fail to be recognized\
    \ as a particular type. Next, it copies all the data into the new table, and if\
    \ the type of an element is another table, it recursively goes through every element\
    \ and subtable present in that table, and when done, saves that data to corresponding\
    \ new table data elements. Then it sets the metatable for this new table object\
    \ and returns it a copy of the table object.\n\n## Customizing the Metatable\n\
    \nRemember that in Lua, one of the most important types of variables is the table.\
    \ As mentioned, arrays, associative arrays, and objects are all basically tables.\
    \ Arrays aren’t very customizable, but objects are—they have some extra functionality\
    \ and functions that arrays don’t. All of this functionality forms a unique fingerprint\
    \ for the object, and that helps identify the object type. Every table in Lua\
    \ can have a metatable. A metatable is nothing more than an ordinary table that\
    \ defines the behavior of the original table and the user data. If we set specific\
    \ fields in the metatable, we can modify the behavior of the object. We can thereby\
    \ create objects and allow them to have custom operations, similar to C++ operator\
    \ overloading. However, there is a limited list of what can be altered in Lua.\n\
    \nThe following subsections describe the keys that help Lua to alter or customize\
    \ the behavior of tables.\n\n### `__index`\n\nWhen we attempt to retrieve the\
    \ value of an element in a Lua table, Lua attempts to locate that element; if\
    \ the element does not exist, then Lua calls the `__index` metafunction. If there\
    \ is no such method, then `nil` is returned.\n\nFor example, say we run the following\
    \ code:\n\n```\nt = {}\nprint(t.name)\nprint(t.age)\n```\n\nThis prints `nil`\
    \ for both the name and the age, because we have not defined them yet. If we modify\
    \ this code to include\n\n```\ndefault = { name =\"Lua\" }\nt = setmetatable(\
    \ {}, {__index=default} )\nprint(t.name)\nprint(t.age)\n```\n\nwe see that the\
    \ first `print` displays “Lua” and the second still prints `nil`.\n\nThe `__index`\
    \ metafunction can be the data in a table, as in the preceding code, or it can\
    \ be a function. When the `__index` function is called, it is passed two parameters:\
    \ the Table and the Key.\n\nWe can see this behavior with the following code:\n\
    \n```\nt = setmetatable({}, {__index=function(theTable, theKey) print(theTable,\
    \ theKey) return\".\" end})\nprint(t.name)\nprint(t.age)\nprint(t[1])\nprint(t[2][3])\n\
    print(t.whatever)\n```\n\nWe are returning a `.` from the function, so we see\
    \ it print the table address and the name of the element that we are trying to\
    \ access, followed by a `.`.\n\n**Note** Every time the table is accessed, the\
    \ `__index` metafunction is invoked.\n\nSo, you have to be careful when accessing\
    \ a table value from inside of the `__index` function. It can lead to a circular\
    \ loop, causing a stack overflow, as shown in the definition following:\n\n```\n\
    __index = function(tbl, key)\n    local a = tbl[key]\n    if a <=0 then a = 0\
    \ end\n    if a > 5 then a = 0 end\n    return a\nend\n```\n\nThough the preceding\
    \ code looks very innocent and tries to keep the value of the element in the table\
    \ within a range, this code will cause problems and circular references. The first\
    \ line in the function, `a = tbl[key]`, will actually trigger another `__index`\
    \ function call, and that in turn will invoke another, and so on.\n\nNow that\
    \ we’ve identified the issue, we still need to resolve it. To do this, we can\
    \ use the Lua function `rawget`, which retrieves the value of the table without\
    \ invoking the `__index` metamethod. So, we could write the same function as\n\
    \n```\n__index = function(tbl, key)\n    local a = rawget(tbl, key)\n    if a<=0\
    \ then a = 0 end\n    if a > 5 then a = 0 end\n    return a\nend\n```\n\n### `__newindex`\n\
    \nThis function is similar to the `__index` function, but is different in the\
    \ way it’s used to set a value; so, when we assign a value to a table, this function\
    \ is called. This gets passed three parameters: the table, the key, and the value.\n\
    \n```\na = setmetatable({},{\n    __newindex = function(t, key, value)\n     \
    \ print(\"Setting  [\" .. key .. \"]=\" .. value)\n      rawset(t, key, value\
    \ )\n    end})\na.year = 2012\na.apps = 15\n```\n\nIn a way similar to the preceding\
    \ example where `table[key]=value` would invoke the `__newindex` function and\
    \ could get into an endless loop and cause errors, this example uses `rawset`\
    \ to set the value of the key.\n\n**Note** This function is called the very first\
    \ time, when the value of the key is not set at all. If the value is set, the\
    \ function is not invoked at all. The value is directly altered.\n\n### `__mode`\n\
    \nIn programming languages like Lua that employ garbage collection, objects are\
    \ said to be *weak* if they cannot prevent themselves from being collected. Lua\
    \ can set the table as a weak table where the keys and the values are weak references.\
    \ If the key or the value of such a table is collected, the entry of the table\
    \ is collected.\n\nThe mode of these weak tables can be set using the `__mode`\
    \ metafunction, and it can be used to set the keys or the values as weak using\
    \ the `k` or `v` parameter, as follows:\n\n```\nlocal weaktable = setmetatable({},\
    \ {__mode=\"k\"})\n```\n\n### `__call`\n\nThis allows the table to be used like\
    \ a function. If the table is followed by parentheses, the metatable tries to\
    \ locate the `__call` function and invoke it; if it is not present, it returns\
    \ an error. Otherwise, it is passed the table and the arguments passed.\n\n```\n\
    t = setmetatable({},{\n    __call = function(t, value)\n            print(\"Calling\
    \ the table with \" .. value)\n    end})\n\nt(\"2012\")\n```\n\n**Note** Every\
    \ time the metatable is set, it overwrites the earlier metatable entries, which\
    \ means that in the preceding example, we do not have an entry for `__newindex`.\
    \ If we had that defined earlier, it would have been removed, and the only function\
    \ set would have been `__call`. You need to define all the relevant keys in one\
    \ go, or get the metatable and then add or alter the new metafunction.\n\n###\
    \ `__metatable`\n\nThis hides the metatable. When the `getmetatable` function\
    \ is used and the table has a `__metatable` string, then the value of that key\
    \ is returned instead of the actual metatable.\n\n### `__tostring`\n\nThis function\
    \ is called when a string representation of a table or object is requested. This\
    \ can be used to provide a description for custom objects.\n\n```\nt=setmetatable({},{__tostring=function()\
    \ return \"This is my custom table\" end})\nprint(t)\nprint(tostring(t))\n```\n\
    \n### `__gc`\n\nThis function is called when the table is set to be garbage collected.\
    \ If `__gc` is pointing to a function, this function is first invoked. This function\
    \ is only available for user data (i.e., usable via the C APIs).\n\n### `__unm`\n\
    \nThis function is the unary minus; it is equivalent to the `-` sign. To convert\
    \ a number into a negative (e.g., 5 to `-5`), we add a `-` sign in front. The\
    \ unary minus function is used to perform this conversion on a table or an object.\
    \ It can be used to perform negation on complex objects; for example, a table\
    \ of values.\n\n```\nt = setmetatable({},{__unm=function() return -3 end})\nprint(t\
    \ - 5)\nprint(5 - -t)\n```\n\n**Note** In this example, we are returning a fixed\
    \ number, `-3`. In your program, you might want to calculate the value to return.\n\
    \n### `__add`\n\nThis function is the normal addition function; it is called when\
    \ adding a variable to a table object using the `+` operator. Overriding this\
    \ can be very useful when trying to add objects that do not have a numeric value\
    \ that can be simply added.\n\nThe first example that comes to mind is that of\
    \ fractions. This is perhaps one of the most common examples of operator overloading\
    \ with C++ and using addition between two objects that are nonnumeric.\n\n```\n\
    t = setmetatable({},{__add=function(tbl, val) return 5+val end})\nprint(t+5)\n\
    ```"
