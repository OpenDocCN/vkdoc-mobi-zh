    \ variant\n```\n\n相比之下，Lua 将变量存储在内存中。Lua 同时存储变量的值和类型。Lua 中的所有变量都是**一等值**。这仅仅意味着这些值可以存储在变量中、作为参数传递给其他函数，以及从函数返回。\n\
    \nLua 中有八种不同类型的变量，下文将逐一介绍。\n\n## `nil`\n\n这与`null`相同。如果某个变量持有一个对最后持有值的引用，而垃圾回收器尚未清理它，则可以将该变量设置为`nil`，以指示该引用空间可以被垃圾回收。\n\
    \n## `boolean`\n\n`boolean`变量就是我们熟悉的`true`和`false`。它们用于检查条件；但需要注意的是，`nil`和`false`都会导致条件为`false`，而任何其他值都会导致条件为`true`。\n\
    \n```lua\ntrusted = false\nif (trusted) then print(\"Yes\") end        -- 不输出任何内容\n\
    trusted = 1\nif (trusted) then print(\"Yes\") end        -- 输出 Yes\ntrusted =\
    \ nil\nif (trusted) then print(\"Yes\") end        -- 不输出任何内容\n```\n\n## `number`\n\
    \n`number`变量是可以表示为小数、长整型、整数、十六进制数和浮点数的数字。Lua 将数字保存为双精度浮点数。\n\n## `string`\n\n\
    Lua 字符串通常是 8 位干净的字符串（即，它们可以包含任何 8 位字符，包括嵌入的零值）。Unicode 变量略有不同，但如果平台支持 Unicode，Lua\
    \ 也可以处理。\n\n## `function`\n\n在 Lua 中，函数也可以作为变量存储和传递。这种将函数作为参数存储和传递的功能，使得 Lua 中的函数成为“**一等函数**”。\n\
    \n## `userdata`\n\n这是一个从 C 语言分配的内存块，允许 C 语言函数存储和访问数据。`userdata`变量不能在 Lua 中创建或操作，只能通过\
    \ C API 进行。\n\n## `thread`\n\n这是一种特殊的变量类型；它指定一个独立的执行线程。这与操作系统线程不同。\n\n## `table`\n\
    \n`table`变量在 Lua 中就是我们所说的数组、关联数组、哈希表、集合、记录、列表、树，甚至是对象。\n\n**注意**：`table`、`function`和`thread`实际上并不持有任何值——只持有对它们的引用。\n\
    \n# 代码块和作用域\n\n在 Lua 中，每个变量都有一个作用域，这意味着其可访问性取决于由作用域决定的生命周期。变量要么是**全局**的，要么是**局部**的。默认情况下，变量定义为全局变量，除非显式定义为局部变量。\n\
    \n在代码中，在`do`和`end`块之间设置的变量在该块外部不可访问，而在该块外部设置的任何局部变量在该块内部是可访问的。\n\n让我们通过一个示例来看：\n\
    \n```lua\ni = 1\nprint(\"i = \", i)\ndo\n  local i = 2\n  print(\"i = \", i)\n\
    end\nprint(\"i = \", i)\n```\n\n**强制转换**是一个简单术语，指的是根据转换规则（如果可能）将字符串转换为数字，以便在字符串和数字之间进行算术运算的过程。\n\
    \n```lua\none = \"1\"\ntwo = 2\nprint(one + two)       -- 输出 3\n```\n\n在许多语言中，尝试在两种不同数据类型（本例中为字符串和数字）之间进行此类算术运算会失败。在其他一些脚本语言中，此代码会将值添加到字符串中，得到字符串`\"\
    12\"`。然而，在 Lua 中，这会输出值`3`，其中`one`被转换为数值`1`，然后与`two`的值相加，输出`3`。\n\n但是，如果我们想要将两个字符串`\"\
    1\"`和`\"2\"`拼接成`\"12\"`，则需要使用所谓的**连接**操作。在 Lua 中，连接运算符是双点（`..`）。它连接两个字符串并返回一个包含这两个字符串的新字符串。\n\
    \n# Lua 运算符\n\nLua 中的运算符可以分为不同类型，包括算术运算符、关系运算符和逻辑运算符等。\n\n## 算术运算符\n\n这些运算符无需过多介绍；它们简单直接。表\
    \ 1-1 列出了它们。\n\n**表 1-1.** 算术运算符\n\n| 运算符 | 描述 |\n| --- | --- |\n| `+` | 加法 |\n\
    | `-` | 减法 |\n| `*` | 乘法 |\n| `/` | 除法 |\n| `%` | 取模 |\n| `^` | 指数 |\n| `-` |\
    \ 一元负号 |\n\n## 关系运算符\n\n这些是用于比较或条件的运算符。它们列在表 1-2 中。\n\n**表 1-2.** 关系运算符\n\n| 运算符\
    \ | 描述 |\n| --- | --- |\n| `==` | 等于（检查两个值是否相等） |\n| `~=` | 不等于（等于的反义） |\n| `<`\
    \ | 小于 |\n| `>` | 大于 |\n| `<=` | 小于等于 |\n| `>=` | 大于等于 |\n\n这些运算符总是返回`true`或`false`。需要注意的是，比较两个数字或值时，使用`==`，而在\
    \ Lua 中单个`=`表示赋值。\n\n## 逻辑运算符\n\nLua 中的逻辑运算符是：\n\n```lua\nand\nor\nnot\n```\n\n\
    `and`和`or`在 Lua 中的工作方式是通过所谓的**短路求值**。它检查一个值，并且仅在需要时才进一步检查。如果第一个参数值为`false`或`nil`，则`and`返回第一个参数；否则返回第二个参数。另一方面，如果第一个结果不为`false`或`nil`，则`or`返回第一个值；如果第一个参数为`false`或`nil`，则返回第二个参数。\n\
    \n`or`的最佳用途是在函数中分配默认值：\n\n```lua\na = a or 5 -- 如果 a 的值为 nil 或 false，可用于将 a 赋值为\
    \ 5\n```\n\n我们可以这样测试它们的工作方式：\n\n```lua\ntesting = nil\nprint(testing)\nprint(testing\
    \ and 5)\nprint(testing or 5)\nprint(not testing)\ntesting = 15\nprint(testing)\n\
    print(testing and 5)\nprint(testing or 5)\nprint(not testing)\n```\n\n## 其他运算符\n\
    \n除了我们讨论过的标准运算符之外，Lua 还为我们提供了其他几个运算符。它们用于连接操作和获取某物的长度等操作；这两个运算符都适用于字符串，不过`#`运算符也可以用于数组。\n\
    \n*   连接运算符：`..`\n*   长度运算符：`#`\n\n如前所述，Lua 中的连接运算符是双点（`..`）。它用于将两个字符串相加，如下所示：\n\
    \n```lua\nprint(\"one, two, \" .. \" buckle my shoe\")\n```\n\n长度运算符返回字符串的长度。\n\
    \n```lua\nprint(#\"this is a long string\")       -- 输出 21 作为字符串的长度\n```\n\n#\
    \ 总结\n\nLua 的可移植性意味着我们可以在各种设备和桌面系统上运行代码。Lua 的小巧体积以及非常灵活且容错的语法，使得快速原型开发和代码测试成为可能。我们已经看到\
    \ Lua 在游戏开发者中越来越受欢迎。在下一章中，我们将更详细地了解标准 Lua 库，这些库提供了构成标准 Lua 的所有命令。\n\n---\n\n**第二章**\n\
    \n# Lua 库\n"
- fmt: '# 基础函数


    Lua 有一些基础函数，它们是 Lua 系统的一部分。我们将在下面的小节中了解它们。这些函数构成了核心库的一部分，通常可用于大多数发行版。


    ## `assert ( v [, message] )`


    此函数类似于 C 语言中使用的`assert`函数；如果参数`v`的值为假（`nil`或`false`），则返回错误。如果提供了`message`，它将作为错误消息显示；如果未提供，则显示默认文本"assertion
    failed!"。


    ```

    assert(money > 0,"you need to have some money to buy something")

    ```


    ## `collectgarbage ( [opt [,arg]] )`


    此函数是垃圾回收器的通用接口。该函数根据参数`opt`的不同而表现不同。您可以作为`opt`传递给此函数的选项有：


    *   `collect`：执行完整的垃圾回收周期。这是默认选项。

    *   `stop`：停止垃圾回收器。

    *   `restart`：重启垃圾回收器。

    *   `count`：返回 Lua 使用的总内存。

    *   `step`：执行一个垃圾回收步骤。步骤大小由`arg`控制。

    *   `setpause`：将`arg`设置为`pause`的新值，并返回`pause`的先前值。

    *   `setstepmul`：将`arg`设置为步进倍数的新值，并返回`step`的先前值。


    **提示** 如果您想知道应用程序的内存使用情况并清除内存和对象，您可以强制垃圾回收器释放并回收已分配的内存，然后使用`print(collectgarbage("count"))`命令打印清理后使用的内存量。


    ## `dofile ( [filename] )`


    您在[第1章](#9781430246626_Ch01.xhtml)中了解到，Lua 以块的形式执行代码。此函数打开指定的文件并执行其内容作为 Lua 块。当不带参数调用时，它从标准输入（`stdin`）执行内容。它返回块返回的所有值。`stdin`在
    iOS 设备上不可用，并且在 CoronaSDK 中该函数被沙盒化（即不允许使用）。


    ```

    dofile("somefile.lua")

    ```


    ## `error ( message [,level] )`


    此函数终止最后一个受保护函数，并将`message`作为错误消息返回。


    ```

    error("This operations is invalid")

    ```


    ## `_G`


    这严格来说不是一个函数，而是一个全局变量。Lua 不使用此变量，但它保存了所有全局变量和函数。


    ## `getfenv ( [f] )`


    此函数返回函数当前使用的环境。函数`f`可以是 Lua 函数或数字。


    ## `getmetatable ( object )`


    此函数检索与对象关联的元表。如果不存在元表，则返回`nil`。这通常用于向对象表添加功能。在某些情况下，这也用作对象的签名。因此，虽然`type`函数无法提供太多信息，但可以将元表与已知元表签名列表进行比较，以获取更多信息。


    ## `ipairs ( t )`


    此函数返回一个函数，该函数返回三个值：一个迭代器函数、表`t`和`0`。它仅适用于数组表。以下代码将迭代到表中第一个缺失的整数键为止：


    ```

    t = {1,2,3,4,test =  "test",5,6}

    t[3] = nil

    for i,v in ipairs(t) do

     -- body

      print(i,v)

    end

    ```


    ## `load ( func [,chunkname] )`


    此函数类似于`dofile`命令；它使用函数`func`加载一个块。每次调用该函数时，它必须返回一个与前一个结果拼接的字符串。当块完成时，它返回`nil`和一个错误消息。`chunkname`用于调试。当函数被调用并发生错误时，Lua
    会显示调试信息，包括错误发生的行号和发生错误的 Lua 文件名。当我们有编译后的块时，没有文件名，因此，出于调试目的，需要由您（开发者）以`chunkname`参数的形式提供该信息。


    ## `loadstring ( string [,chunkname] )`


    此函数类似于`load`，但不是从文件加载编译后的字节码，而是从字符串中获取编译后的代码（块）。


    ```

    loadstring(compiledChunk, "OurChunk")

    ```


    ## `next ( table [,index] )`


    此函数允许程序遍历表中的所有字段。该函数返回多个值。在内部，该函数执行系统命令。


    ```

    t = {"One", "Deux", "Drei", "Quarto"}

    print(next(t, 3))

    ```


    ## `pairs ( t )`


    此函数用于遍历表中的键和值。


    ```

    t = {one =  "Eins",two =  "Zwei", three =  "Drei"}

    for k,v in pairs(t) do

     -- body

      print(k,v)

    end

    ```


    ## `pcall ( f, arg1, … )`


    此函数以保护模式调用函数`f`并传入参数。这意味着函数`f`内部的任何错误都不会传播到函数外部。


    ## `print( … )`


    这是您在开发过程中最常使用的函数。它可以接收任意数量的参数，并将它们的所有值打印到`stdout`。它使用`tostring`和`tonumber`进行转换，并提供了一种快速显示值的简便方法。但是，它不适用于格式化输出。


    ## `rawequal ( v1, v2 )`


    此函数用于检查值`v1`是否等于`v2`。它返回一个布尔值，指示比较的结果。


    ## `rawget ( table, index )`


    此函数返回`table[index]`的值，而不调用任何元方法。`table`必须是一个有效的表，`index`必须是一个非`nil`的值。这等价于：


    ```

    table[index]

    ```


    ## `rawest ( table, index, value )`


    此函数设置`table[index]`的值，而不调用任何元方法。`table`必须是一个有效的表，`index`必须是一个非`nil`的值。这等价于：


    ```

    table[index] = value

    ```


    ## `select ( index, … )`


    此函数返回从指定索引之后开始传递给函数的所有参数。


    ## `setfenv ( f, table )`


    此函数设置要赋予函数`f`的环境。`f`可以是一个 Lua 函数，也可以是一个指定平台值的数字。


    ## `setmetatable ( table, metatable )`


    此函数用于为任何表设置元表。


    ## `tonumber( e [,base] )`


    此函数用于将数字从字符串形式转换为数值形式。如果参数`e`处于可转换的形式，则进行转换并返回；否则返回`nil`。


    ```

    print( tonumber("42") )

    print( tonumber("2A",16))

    ```


    ## `tostring ( e )`


    此函数尝试将给定参数转换为字符串格式。如果传递的参数是数字，则将其转换为字符串。如果它是一个对象并且其元表具有`__tostring`函数，则调用`__tostring`函数来转换传递的参数。


    **注意** Lua 会根据需要（并在可能的情况下）在数字和字符串之间进行转换。然而，调用`tostring`函数是告诉 Lua 将值转换为字符串的一种方式。对象和表不会自动转换为字符串；而是调用`tostring`函数（如果存在），该函数返回对象/表的字符串表示形式。


    ## `type ( v )`'
  raw: 'In the previous chapter, you learned the reasons behind Lua and that Lua is,
    after all, made up of C code libraries. One of the advantages that the developers
    of Lua got from this architecture for Lua was that they could add functionality
    as required. Adding functionality involved writing new functions and making them
    available in Lua. It is quite a surprise that Lua does not have multiple distributions
    and remains as intended by the developers; there are not many modified versions.
    However, many developmental studios do modify, or rather adapt and customize,
    Lua for their own editors and tools.


    In this chapter, we shall look at the standard Lua libraries and namespaces that
    provide us with their functions. Then we’ll have a detailed look at the system-
    and table-related functions.


    Basic Functions


    Lua has some basic functions that are part of the Lua system, we’ll have a look
    at the following subsections. These form part of the core library and are generally
    available to most of the distributions.


    assert ( v [, message] )


    This function is similar to the assert function used with C; it returns an error
    if the value of the argument v is false (either nil or false);. The message, if
    present, is displayed as an error; if absent, the default text “assertion failed!”
    is displayed.


    ```

    assert(money > 0,"you need to have some money to buy something")

    ```


    collectgarbage ( [opt [,arg]] )


    This function is a generic interface to the garbagecollector. The function acts
    differently depending on the parameter opt. The options that you can pass to this
    function as opt are


    *   collect: Performs a full garbage-collection cycle. This is the default option.

    *   stop: Stops the garbage collector.

    *   restart: Restarts the garbage collector.

    *   count: Returns the total memory in use by Lua.

    *   step: Performs a garbage-collection step. The step size is governed by arg.

    *   setpause: Sets arg as the new value for pause and returns the previous value
    of pause.

    *   setstepmul: Sets arg as the new value for the step multiplier and returns
    the previous value for step.


    **Tip**   If you want to know the memory usage of your app and clear up the memory
    and objects, you can force the garbagecollector to free up and reclaim the memory
    allocated and then print the amount of memory used after a cleanup by using the
    print(collectgarbage("count")) command.


    dofile ( [filename] )


    You saw in [Chapter 1](#9781430246626_Ch01.xhtml) that Lua executes the code in
    chunks. This function opens the named file and executes its contents as a Lua
    chunk. When called with no arguments, it executes the contents from the standard
    input (stdin). It returns all values returned by the chunk. stdin is not available
    on iOS devices, and with CoronaSDK the function is sandboxed (i.e., disallowed).


    ```

    dofile("somefile.lua")

    ```


    error ( message [,level] )


    This function terminates the last protected function and returns the message as
    the error message.


    ```

    error("This operations is invalid")

    ```


    _G


    This is not exactly a function, but a global variable. Lua does not use this variable,
    but it holds all the global variables and function.


    getfenv ( [f] )


    This function returns the current environment in use by the function. The function
    f can be a Lua function or number.


    getmetatable ( object )


    This function retrieves the metatable associated with the object. It returns nil
    if there is no metatable present. This is mostly used to add functionality to
    an object table. In some cases, this is also used as a signature of the object.
    So while the type function does not tell you much, the metatables can be compared
    with a list of known metatable signatures to get more information.


    ipairs ( t )


    This function returns a function that returns three values, an iterator function,
    the table t and 0\. It works with the array tables only. The following code will
    iterate over the pairs up to the first integer key missing from the table:


    ```

    t = {1,2,3,4,test =  "test",5,6}

    t[3] = nil

    for i,v in ipairs(t) do

     -- body

      print(i,v)

    end

    ```


    load ( func [,chunkname] )


    This function is similar to the dofile command; it loads a chunk using the function
    func. Each time the function is called, the function must return a string that
    concatenates with the previous result. When the chunk is complete, it returns
    nil and an error message. The chunkname is used for debugging. When the function
    is called and an error occurs, Lua displays debugging information, including the
    line number where the error occurred and the name of the Lua file in which the
    error occurred. When we have compiled chunks, there is no filename and hence,
    for debugging purposes, it is up to you, the developer, to provide that information
    in the form of the chunkname parameter.


    loadstring ( string [,chunkname] )


    This function is similar to load, but instead of loading the compiled bytecode
    from a file, it takes the compiled code (chunk) from a string.


    ```

    loadstring(compiledChunk, "OurChunk")

    ```


    next ( table [,index] )


    This function allows the program to iterate through all the fields of a table.
    The function returns multiple values. Internally, the function takes on system
    commands.


    ```

    t = {"One", "Deux", "Drei", "Quarto"}

    print(next(t, 3))

    ```


    pairs ( t )


    This function is used to iterate through the keys and values in a table.


    ```

    t = {one =  "Eins",two =  "Zwei", three =  "Drei"}

    for k,v in pairs(t) do

     -- body

      print(k,v)

    end

    ```


    pcall ( f, arg1, … )


    This function calls the function f with the arguments in protected mode. This
    means that any errors inside of the function f are not propagated outside of the
