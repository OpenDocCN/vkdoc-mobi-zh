    Events


    Like most frameworks, Gideros has an asynchronous way of processing things. Events
    are raised when certain things happen—for example, when the user touches the screen,
    when the frame is updated, and when system events occur (e.g., when the application
    starts, or is suspended, resumed, or exited). [Table 9-1](#9781430246626_Ch09.xhtml#Tab1)
    lists the events that are handled by Gideros Studio.


    [Table 9-1.](#9781430246626_Ch09.xhtml#_Tab1) Events Handled by Gideros Studio


    | Event Type | Events Handled |

    | --- | --- |

    | Touch | TOUCHES_BEGIN TOUCHES_MOVE

    TOUCHES_END

    TOUCHES_CANCEL |

    | Frame and stage | ENTER_FRAME ADDED_TO_STAGE

    REMOVED_FROM_STAGE |

    | System and application | APPLICATION_START APPLICATION_RESUME

    APPLICATION_SUSPEND

    APPLICATION_EXIT |

    | Sound and timer | COMPLETE TIMER

    TIMER_COMPLETE |

    | Mouse | MOUSE_DOWN MOUSE_UP

    MOUSE_MOVE |

    | URL loader | COMPLETE ERROR

    PROGRESS |

    | Physics | BEGIN_CONTACT END_CONTACT

    PRE_SOLVE

    POST_SOLVE |


    Touch


    An application needs to set an event listener to be able to listen to a particular
    event. The event listener can be attached to any display object.


    ```

    local image = newImage("myImage.png")

    function handler(object, event)

     print("Got an event")

    end


    image:addEventListener(Event.TOUCHES_BEGIN, handler, image)

    ```


    The event listener takes the event, the handler, and an additional parameter that
    allows for passing data to the event handler. The event handler gets two parameters:
    the extra data that we pass to the handler and the event object that contains
    the event-related data.


    **Note**   The parameters passed to the function are different for the mouse events
    than for the touch events. The touch event has a record called touches, which
    is not present in a mouse event. This is mainly because the user can place multiple
    fingers on the screen—so, each touches record has an x,y-coordinates and ID, while
    the mouse event does not.


    The touch event contains two records, touches and allTouches. touches is the current
    touch that contains the x,y-coordinates and the ID, whereas allTouches is an array
    that contains all of the touches records. To get the object that triggered the
    touch event, you can use the function event:getTarget().


    Enter Frame


    You can set the enter frame event to perform a frame-by-frame animation, like
    so:


    ```

    local _W = application:getLogicalWidth()

    local _H = application:getLogicalHeight()


    local xD, yD, speed = 1, 1, 10

    local img = newImage("myImage2.png",0,0)

    local wd, ht = img:getWidth(), img:getHeight()


    function onEnterFrame(event)

    local xP, yP = img:getPosition()

    xP = xP + xD*speed

    yP = yP + yD*speed

    if xP >= _W-wd or xP == 0 then xD = −xD end

    if yP >= _H-ht or yP == 0 then yD = −yD end

    img:setPosition(xP, yP)

    end


    img:addEventListener(Event.ENTER_FRAME, onEnterFrame)

    ```


    The enter frame event has a frameCount property, which returns the number of frames
    that have passed since the start of the application. time returns the time in
    seconds since the start of the application, and deltaTime contains the time difference
    between the last frame and the current frame. This can be used in animation and
    can help to coordinate time-sensitive animation.


    System Events


    The stage object is present for the lifetime of the application. We can set up
    listeners on the stage object just like we can on other display objects. The suggested
    way to manage system events is to set them on the stage object. However, system
    events are like a broadcast, they are sent to every object that sets up a listener,
    not exclusively to one.


    ```

    stage:addEventListener(Event.APPLICATION_START,

        function(event)

          print("Started")

        end)

    ```


    You can also monitor the time when the application is suspended or resumes, so
    you can save the state of your app and then load it again when the app is resumed.


    Timer


    You can set the timer in Gideros Studio by using the Timer.new function and then
    adding an event listener to listen for when the timer fires. You can also listen
    for the timer-complete event, which occurs after all of the timer loops have fired.
    The default value for loops is 0, which is the same as indicating infinite loops
    for the timer.


    ```

    local theTimer = Timer.new(1000, 5)

    theTimer:addEventListener(Event.TIMER,

        function(event)

            print("Timer fired")

        end)

    theTimer:addEventListener(Event.TIMER_COMPLETE,

        function(event)

            print("All timer loops completed")

        end)

    ```


    This code creates a new timer that fires at a set frequency and runs a specified
    number of times. In this case, the frequency is 1,000 ms and the loop runs five
    times. The timer then has to be started using the start function.


    ```

    theTimer:start()

    ```


    Now you can see the results in the output window, showing that the timer fires
    every 1 second (1,000 ms) and completes after firing five times.


    The timer has a currentCount property (a read-only property) that holds the number
    of times the timer has fired. repeatCount holds the number of times the timer
    should repeat, and the timer stops once the currentCount value reaches the repeatCount
    value. We can use the reset function to set the currentCount to 0\. You can set
    repeatCount to use the setRepeatCount function, and you can alter the delay using
    the setDelay function.


    The timer can be finely controlled using the start, pause, and stop functions.
    Further, all of the active timers can be paused, stopped, or resumed using the
    pauseAll, resumeAll, and stopAll functions, respectively. The timer can also be
    queried using the isRunning function, which returns whether the timer is running
    or not.


    If you need to trigger a function after a delay, you can use the Timer.delayedCall
    function. This function takes three parameters: a delay time (after which the
    function is invoked), a function, and a custom parameter that you can pass to
    the function.


    ```

    Timer.delayedCall(1000,

        function(msg)

            print("Hello "..msg)

        end,

        "Gideros")

    ```


    Custom Events


    You can also create your own events that can be dispatched and set up a listener
    for these custom events, as follows:


    ```

    local theTimer = Timer.new(1000, 5)

    theTimer:addEventListener(Event.TIMER,

      function(event)

        theTimer:setRepeatCount(10)

        if theTimer:getCurrentCount() == 4 then

          evt = Event.new("hi")

          stage:dispatchEvent(evt)

        end

      end)


    theTimer:addEventListener(Event.TIMER_COMPLETE,

      function(event)

        print("All timer loops completed")

      end)


    theTimer:start()


    stage:addEventListener("hi",

      function()

        print("Hello")

      end)

    ```


    The way to manage custom events is to set up an event listener for a particular
    type of event using addEventListener. After creating an event using the Event
    class with Event.new(eventName), when we want to raise the event, we can use the
    dispatchEvent function.


    Removing Events


    Events can be removed using removeEventListener in a manner similar to how they’re
    added using addEventListener. To add an event handler, you can use the following:


    ```

    object:addEventListener(EventName, evtHandler)

    ```


