    \    function(event)\n        print(\"所有定时器循环已完成\")\n    end)\n```\n\n这段代码创建了一个新的定时器，它以设定的频率触发并运行指定的次数。在本例中，频率为\
    \ 1000 毫秒，循环运行五次。然后必须使用 `start` 函数启动定时器。\n\n```\ntheTimer:start()\n```\n\n现在你可以在输出窗口中看到结果，显示定时器每\
    \ 1 秒（1000 毫秒）触发一次，并在触发五次后完成。\n\n定时器有一个 `currentCount` 属性（只读属性），用于保存定时器已触发的次数。`repeatCount`\
    \ 保存定时器应重复的次数，当 `currentCount` 值达到 `repeatCount` 值时，定时器停止。我们可以使用 `reset` 函数将 `currentCount`\
    \ 设置为 0。你可以使用 `setRepeatCount` 函数设置 `repeatCount`，并使用 `setDelay` 函数更改延迟时间。\n\n\
    定时器可以通过 `start`、`pause` 和 `stop` 函数进行精细控制。此外，所有活动的定时器可以分别使用 `pauseAll`、`resumeAll`\
    \ 和 `stopAll` 函数暂停、恢复或停止。还可以使用 `isRunning` 函数查询定时器，该函数返回定时器是否正在运行。\n\n如果你需要在延迟后触发一个函数，可以使用\
    \ `Timer.delayedCall` 函数。该函数接受三个参数：延迟时间（之后函数被调用）、一个函数以及一个可以传递给该函数的自定义参数。\n\n```\n\
    Timer.delayedCall(1000,\n    function(msg)\n        print(\"你好 \"..msg)\n    end,\n\
    \    \"Gideros\")\n```\n\n### 自定义事件\n\n你还可以创建自己的事件，这些事件可以被分发，并可以为这些自定义事件设置监听器，如下所示：\n\
    \n```\nlocal theTimer = Timer.new(1000, 5)\ntheTimer:addEventListener(Event.TIMER,\n\
