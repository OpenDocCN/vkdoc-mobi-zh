    # IDE 与文本编辑器概览


    这是 M.Y. Developers 推出的一款功能丰富、跨平台的优秀 IDE（最初名为 Cider）。较新的版本（如图 14-1 所示）支持 Corona
    SDK、Gideros Studio 和 Moai。它具备预览功能，可列出 Lua 文件中的函数和变量，以及它们的类类型和继承成员。此外，它还提供智能的类感知自动补全功能，能在给定上下文中给出最相关的选项。该
    IDE 拥有高级调试特性，如**单步进入**、**单步跳出**、**单步跳过**、**运行到光标处**、**调用堆栈**等。在运行过程中，变量可以被监视，甚至能动态更改。当前
    Glider 中的 Ultimote 功能可在 IDE 中模拟 Corona SDK 硬件事件。它还集成了对 Git、Subversion 和 Mercurial
    的版本控制支持，并包含本地文件历史记录功能，可以保留对文件所做的每一次更改。


    ![9781430246626_Fig14-01.jpg](img/9781430246626_Fig14-01.jpg)


    图 14-1 . Glider IDE


    ## CoronaComplete


    -   *URL*: [`coronacomplete.com`](http://coronacomplete.com)

    -   *价格*: 26.99 美元（Mac App Store 上为 29.99 美元）

    -   *平台*: Mac OS X


    CoronaComplete 是一款仅适用于 Mac OS X 的 IDE（目前仅支持 Corona SDK）。它由 Vladu Bogdan 创建，他也是出色的工具
    SpriteHelper 和 LevelHelper 的作者（本章稍后会提到）。CoronaComplete 包含查看资源的功能，并拥有智能参数，因此你可以使用自动补全来选择函数。它甚至内置了作者添加的文档，因此你无需上网去网站获取
    API 文档。该 IDE 集成了 Corona 调试器，并在调试时提供显示变量、单步执行或跳过代码的功能。它最好的功能之一是可以录制运行中的应用并创建视频，该视频可放置在网站上或用于推广活动。CoronaComplete
    的截图如图 14-2 所示。


    ![9781430246626_Fig14-02.jpg](img/9781430246626_Fig14-02.jpg)


    图 14-2 . 展示项目资源的 CoronaComplete


    **注意**   CoronaComplete 现已由 CodeHelper Pro 取代。


    ## Lua Studio


    -   *URL*: [`lua-studio.luaforge.net`](http://lua-studio.luaforge.net)

    -   *价格*: 免费

    -   *平台*: Windows


    这是一款仅适用于 Windows 的应用程序，是专为 Lua 设计的完整 IDE。它不针对基于 Lua 的框架。Lua Studio 是一款集成度很高的 Lua
    IDE；它会显示局部和全局变量的列表，以及关于调用堆栈的信息（参见图 14-3）。它甚至允许在调试时使用**单步进入**、**单步跳出**和**单步跳过**功能。


    ![9781430246626_Fig14-03.jpg](img/9781430246626_Fig14-03.jpg)


    图 14-3 . 在 Windows 上运行带 Lua 代码调试会话的 Lua Studio


    ## ZeroBrane Studio


    -   *URL*: [`studio.zerobrane.com/`](http://studio.zerobrane.com/)

    -   *价格*: 免费

    -   *平台*: Windows、Mac OS X、Linux


    这是唯一一款用 Lua 编写并支持 Lua 的 IDE，支持我们讨论过的大多数框架，包括 Gideros、Moai 和 LÖVE。它体积小巧、易于使用，提供了开发者期望
    IDE 所具备的大多数专业功能，包括语法高亮、远程调试器、代码分析器、实时编码和调试。它还支持自动补全和用于运行和测试 Lua 代码片段的草稿板。该软件可以从作者网站以二进制格式获取，也可以从他的
    GitHub 账户以源代码形式获取：[`github.com/pkulchenko/zerobranestudio/`](https://github.com/pkulchenko/zerobranestudio/)。


    ## 文本编辑器


    虽然 IDE 提供了完整的开发环境，但随着你的深入，对 IDE 的依赖程度可能会有所不同。很多人会达到一个阶段，他们觉得自己不再需要 IDE，而只需要一个非常好的文本编辑器。Mac
    OS X 和 Windows 上都有一些出色的免费和付费文本编辑器。由于 Lua 是一种非常简单的语言，理论上，类似记事本的文本编辑器就足以编写代码。但是，拥有语法高亮、代码折叠、函数间跳转、动态调试等功能总是有益的。


    ### Notepad++


    -   *URL*: [`notepad-plus-plus.org`](http://notepad-plus-plus.org)

    -   *价格*: 免费

    -   *平台*: Windows


    这是一款仅适用于 Windows 的编辑器；它是开源的，功能相当强大，并且会定期更新。它具有语法高亮、代码折叠和多标签编辑功能（如图 14-4 所示）。它支持除
    Lua 之外的多种语言，并且可以通过插件进行扩展。


    ![9781430246626_Fig14-04.jpg](img/9781430246626_Fig14-04.jpg)


    图 14-4 . Notepad++


    ### TextMate


    -   *URL*: [`macromates.com/`](http://macromates.com/)

    -   *价格*: 50 美元

    -   *平台*: Mac OS X


    TextMate 是为数不多的 Mac 文本编辑器之一，它通过包（用于语法、函数等）来扩展其功能。早期版本 1.5.x 是付费应用，而较新的版本 TextMate
    2.0 是开源的且免费可用。除了基本的 Lua 之外，它还包括为 Corona SDK 和 Gideros Studio 创建的包。图 14-5 显示了在
    TextMate 中编辑 Lua 文件。


    ![9781430246626_Fig14-05.jpg](img/9781430246626_Fig14-05.jpg)


    图 14-5 . 在 TextMate 1.5 中编辑 Lua 文件


    ### TextWrangler


    -   *URL*: [`barebones.com/products/TextWrangler`](http://barebones.com/products/TextWrangler)

    -   *价格*: 免费

    -   *平台*: 仅限 Mac OS X


    TextWrangler 是一款来自 Bare Bones Software 的免费文本编辑器。它有许多功能，包括代码折叠、语法高亮和项目浏览。TextWrangler
    是免费的，本质上是 BBEdit（下文介绍）的轻量版本。TextWrangler 的部分功能如图 14-6 所示。


    ![9781430246626_Fig14-06.jpg](img/9781430246626_Fig14-06.jpg)


    图 14-6 . TextWrangler


    ### BBEdit


    -   *URL*: [`itunes.apple.com/us/app/bbedit/id404009241?mt=12`](http://itunes.apple.com/us/app/bbedit/id404009241?mt=12)

    -   *价格*: 49.99 美元

    -   *平台*: Mac OS X


    BBEdit 是一款功能完整的文本编辑器，同样来自 Bare Bones Software。它包含 TextWrangler 的所有功能，以及自动补全和一些额外的与
    SSH 相关的功能。图 14-7 展示了 BBEdit 中提供的许多功能。


    ![9781430246626_Fig14-07.jpg](img/9781430246626_Fig14-07.jpg)


    图 14-7 . BBEdit 及其功能


    ### Sublime Text 2


    -   *URL*: [www.sublimetext.com](http://www.sublimetext.com)

    -   *价格*: 59 美元

    -   *平台*: 仅限 Mac OS X


