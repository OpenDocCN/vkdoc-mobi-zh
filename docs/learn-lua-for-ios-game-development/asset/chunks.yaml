    \  removeHandler(tapEvent, shoot) \n  addHandler(tapEvent, restartGame)\nend\n\
    ```\n\n而`tapped`处理器可以定义如下：\n\n```\nfunction restartGame(event)\n  -- 通过将大多数值重置为默认值来重新开始游戏\n\
    \  wTime = 2\n  -- 我们可以在这里设置重新初始化代码；例如重置数值、重新定位元素等。\n  setVisible(txtGameOver,\
    \ false)\n  setVisible(txtTapAgain, false)\n  score = 0\n  distance = 0\n  collected\
