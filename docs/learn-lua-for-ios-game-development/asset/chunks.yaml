    \ `gotoAndPlay` 指定的帧开始播放，或在 `gotoAndStop` 指定的帧停止。\n\n## 网络与互联网\n\n在你的游戏中，你可能想打开一个指向你网站的链接，或者上传或下载一些数据。在其他情况下，你可能想发送电子邮件或拨打电话号码。本节将描述如何执行这些操作。\n\
    \n导航到网站最简单的方法是使用函数 `application:openUrl(THE_URL)`，其中 URL 可以是以下任意一种：`http:`、`https:`、`tel:`\
